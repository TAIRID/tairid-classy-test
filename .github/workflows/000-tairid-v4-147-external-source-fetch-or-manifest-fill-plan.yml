              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.147 — External Source Fetch or Manifest Fill Plan")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.146 showed that the next clean move is source/data acquisition, not more pressure. v4.147 records public source targets, attempts lightweight fetch checks, and creates manifest-fill candidates. It does not ingest data, parse covariance, recompute pressure, or validate TAIRID.")
          md.append("")
          md.append("If GitHub can reach the public sources, the artifact will list reachable source pages and raw candidate files. If it cannot, the same artifact still records the source targets and keeps the claim boundary intact.")
          md.append("")
          md.append("## Fetch summary")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---:|")
          md.append(f"| Source targets | `{source_target_count}` |")
          md.append(f"| Fetched | `{fetched_count}` |")
          md.append(f"| Raw candidates | `{raw_candidate_count}` |")
          md.append(f"| Covariance hints | `{covariance_hint_count}` |")
          md.append(f"| fσ8 hints | `{fsigma8_hint_count}` |")
          md.append(f"| Manifest-fill candidate rows | `{manifest_fill_candidate_count}` |")
          md.append("")
          md.append("## Source targets")
          md.append("")
          md.append("| Source | Family | Kind | Manifest use |")
          md.append("|---|---|---|---|")
          for row in SOURCE_TARGETS:
              md.append(f"| `{row['source_id']}` | `{row['source_family']}` | `{row['source_kind']}` | {row['manifest_use']} |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
