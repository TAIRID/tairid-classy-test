              source_fetch_records,
              ["source_id", "url", "source_family", "source_kind", "package_targets", "fetch_ok", "status_code", "content_type", "bytes_read", "sha256_16", "expected_term_score", "covariance_hint", "likelihood_hint", "fsigma8_hint", "raw_file_candidate", "error", "claim_boundary"]
