name: 000 TAIRID v4.147 External Source Fetch or Manifest Fill Plan

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-147-external-source-fetch-or-manifest-fill-plan.yml"

jobs:
  tairid-v4-147-external-source-fetch-or-manifest-fill-plan:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.147 external source fetch or manifest fill plan
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_147_external_source_fetch_or_manifest_fill_plan

          python - <<'PY'
          import csv
          import hashlib
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_147_external_source_fetch_or_manifest_fill_plan")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_147_external_source_fetch_or_manifest_fill_plan"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not recompute eBOSS pressure.",
              "This fetches or probes public source pages and small source files only to build a manifest-fill plan.",
              "A pass means public source targets, fetch status, and manifest-fill candidates are recorded; it does not mean source data has been fully ingested."
          ]

          UPSTREAM_LOCKS = {
              "v4_146_master_status_integration_harness": {
                  "readiness_label": "master_status_integration_harness_passed_system_map_built_ready_for_external_source_fetch_or_manifest_fill_plan",
                  "rule_pass_count": 30,
                  "rule_total_count": 30,
                  "integrated_lane_count": 12,
                  "hard_blocker_count": 3,
                  "data_package_missing": True,
                  "manifest_missing": True,
                  "reference_vector_missing": True,
                  "eBOSS_covariance_missing": True,
                  "sign_pattern_stable": True,
                  "pressure_magnitude_sensitive": True,
                  "lightweight_reference_available": True,
                  "full_posterior_covariance_available": False,
                  "CAMB_available": False,
                  "parser_ready_count": 0,
                  "selected_next_route": "external_source_fetch_or_manifest_fill_plan",
                  "package_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_145_data_package_detector_manifest_validator": {
                  "readiness_label": "data_package_detector_manifest_validator_passed_package_status_recorded_ready_for_next_data_acquisition_or_parser_route",
                  "manifest_found": False,
                  "detected_package_count": 0,
                  "missing_package_count": 10,
                  "reference_vector_valid": False,
                  "eboss_value_sources_detected": False,
                  "eboss_covariance_or_overlap_detected": False,
                  "package_ingested": False,
                  "pressure_recomputed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          REQUIRED_PACKAGE_IDS = [
              "reference_vector_table_minimum",
              "reference_covariance_matrix_preferred",
              "reference_parameter_samples_optional",
              "eBOSS_LRG_value_source",
              "eBOSS_ELG_value_source",
              "eBOSS_QSO_value_source",
              "eBOSS_family_covariance_or_likelihood",
              "eBOSS_cross_tracer_overlap_note",
              "observed_growth_compilation_manifest",
              "data_license_and_provenance_note"
          ]

          SOURCE_TARGETS = [
              {
                  "source_id": "sdss_dr16_release_page",
                  "package_targets": "data_license_and_provenance_note,observed_growth_compilation_manifest",
                  "source_family": "official_SDSS_DR16",
                  "url": "https://www.sdss4.org/dr16/",
                  "source_kind": "official_documentation",
                  "expected_terms": "Data Release 16 eBOSS spectra catalog data access",
                  "manifest_use": "Provenance anchor for SDSS DR16/eBOSS data release status."
              },
              {
                  "source_id": "sdss_dr16_whatsnew_eboss_final",
                  "package_targets": "data_license_and_provenance_note,observed_growth_compilation_manifest",
                  "source_family": "official_SDSS_DR16",
                  "url": "https://www.sdss4.org/dr16/whatsnew/",
                  "source_kind": "official_documentation",
                  "expected_terms": "final public data release eBOSS LRG QSO ELG",
                  "manifest_use": "Confirm DR16/eBOSS final-release context."
              },
              {
                  "source_id": "sdss_dr16_lss_documentation",
                  "package_targets": "eBOSS_LRG_value_source,eBOSS_ELG_value_source,eBOSS_QSO_value_source,eBOSS_family_covariance_or_likelihood",
                  "source_family": "official_SDSS_LSS",
                  "url": "https://www.sdss4.org/dr16/spectro/lss/",
                  "source_kind": "official_documentation",
                  "expected_terms": "eBOSS LSS catalogs LRG ELG QSO randoms clustering",
                  "manifest_use": "Official LSS navigation and catalog-source anchor."
              },
              {
                  "source_id": "sdss_sas_dr16_eboss_lss_catalogs",
                  "package_targets": "eBOSS_LRG_value_source,eBOSS_ELG_value_source,eBOSS_QSO_value_source,eBOSS_family_covariance_or_likelihood",
                  "source_family": "official_SDSS_SAS",
                  "url": "https://data.sdss.org/sas/dr16/eboss/lss/catalogs/DR16/",
                  "source_kind": "official_directory",
                  "expected_terms": "LRG ELG QSO catalog random clustering",
                  "manifest_use": "Official SAS directory probe for catalog products."
              },
              {
                  "source_id": "eboss_consensus_cosmological_implications_arxiv_2007_08991",
                  "package_targets": "observed_growth_compilation_manifest,eBOSS_family_covariance_or_likelihood,eBOSS_cross_tracer_overlap_note",
                  "source_family": "eBOSS_consensus",
                  "url": "https://arxiv.org/abs/2007.08991",
                  "source_kind": "paper_abstract",
                  "expected_terms": "Cosmological Implications BAO RSD f sigma8 covariance eBOSS DR16",
                  "manifest_use": "Consensus paper anchor for eBOSS DR16 cosmological measurements."
              },
              {
                  "source_id": "eboss_lss_catalogs_arxiv_2007_09000",
                  "package_targets": "observed_growth_compilation_manifest,data_license_and_provenance_note",
                  "source_family": "eBOSS_catalogs",
                  "url": "https://arxiv.org/abs/2007.09000",
                  "source_kind": "paper_abstract",
                  "expected_terms": "Large-scale Structure Catalogs cosmological analysis LRG Quasar DR16",
                  "manifest_use": "Catalog construction and source-provenance paper."
              },
              {
                  "source_id": "eboss_lrg_configuration_arxiv_2007_08993",
                  "package_targets": "eBOSS_LRG_value_source",
                  "source_family": "eBOSS_LRG",
                  "url": "https://arxiv.org/abs/2007.08993",
                  "source_kind": "paper_abstract",
                  "expected_terms": "LRG z eff 0.698 f sigma8 anisotropic clustering configuration space",
                  "manifest_use": "LRG value/source anchor."
              },
              {
                  "source_id": "eboss_lrg_power_mnras_gil_marin",
                  "package_targets": "eBOSS_LRG_value_source,eBOSS_family_covariance_or_likelihood",
                  "source_family": "eBOSS_LRG",
                  "url": "https://academic.oup.com/mnras/article/498/2/2492/5893332",
                  "source_kind": "paper_page",
                  "expected_terms": "DR16 eBOSS LRG power spectrum f sigma8 covariance",
                  "manifest_use": "LRG Fourier-space/source/covariance locator."
              },
              {
                  "source_id": "eboss_elg_configuration_arxiv_2007_09009",
                  "package_targets": "eBOSS_ELG_value_source",
                  "source_family": "eBOSS_ELG",
                  "url": "https://arxiv.org/abs/2007.09009",
                  "source_kind": "paper_abstract",
                  "expected_terms": "ELG z eff 0.85 f sigma8 0.315 0.095 consensus",
                  "manifest_use": "ELG value/source anchor."
              },
              {
                  "source_id": "eboss_elg_fourier_arxiv_2007_09008",
                  "package_targets": "eBOSS_ELG_value_source,eBOSS_family_covariance_or_likelihood",
                  "source_family": "eBOSS_ELG",
                  "url": "https://arxiv.org/abs/2007.09008",
                  "source_kind": "paper_abstract",
                  "expected_terms": "ELG Fourier space RSD BAO covariance DR16 f sigma8",
                  "manifest_use": "ELG Fourier-space/source/covariance locator."
              },
              {
                  "source_id": "eboss_qso_configuration_arxiv_2007_08998",
                  "package_targets": "eBOSS_QSO_value_source",
                  "source_family": "eBOSS_QSO",
                  "url": "https://arxiv.org/abs/2007.08998",
                  "source_kind": "paper_abstract",
                  "expected_terms": "QSO quasars DR16 anisotropic clustering f sigma8 z 1.48",
                  "manifest_use": "QSO configuration-space value/source anchor."
              },
              {
                  "source_id": "eboss_qso_power_arxiv_2007_08999",
                  "package_targets": "eBOSS_QSO_value_source,eBOSS_family_covariance_or_likelihood",
                  "source_family": "eBOSS_QSO",
                  "url": "https://arxiv.org/abs/2007.08999",
                  "source_kind": "paper_abstract",
                  "expected_terms": "QSO power spectrum full-shape zeff 1.480 f sigma8 systematic errors",
                  "manifest_use": "QSO Fourier-space/source/covariance locator."
              },
              {
                  "source_id": "eboss_lrg_elg_multitracer_configuration_arxiv_2007_09010",
                  "package_targets": "eBOSS_cross_tracer_overlap_note,eBOSS_family_covariance_or_likelihood",
                  "source_family": "eBOSS_LRG_ELG_multitracer",
                  "url": "https://arxiv.org/abs/2007.09010",
                  "source_kind": "paper_abstract",
                  "expected_terms": "multi-tracer LRG ELG cross correlation f sigma8 covariance",
                  "manifest_use": "Cross-tracer/overlap source anchor."
              },
              {
                  "source_id": "eboss_lrg_elg_multitracer_fourier_arxiv_2007_09011",
                  "package_targets": "eBOSS_cross_tracer_overlap_note,eBOSS_family_covariance_or_likelihood",
                  "source_family": "eBOSS_LRG_ELG_multitracer",
                  "url": "https://arxiv.org/abs/2007.09011",
                  "source_kind": "paper_abstract",
                  "expected_terms": "joint BAO RSD LRG ELG cross power spectrum f sigma8 covariance",
                  "manifest_use": "Cross-tracer/overlap source anchor."
              },
              {
                  "source_id": "icosmology_lrgxelg_repository",
                  "package_targets": "eBOSS_family_covariance_or_likelihood,eBOSS_cross_tracer_overlap_note",
                  "source_family": "eBOSS_LRG_ELG_multitracer_repository",
                  "url": "https://github.com/icosmology/eBOSS_DR16_LRGxELG",
                  "source_kind": "repository_page",
                  "expected_terms": "sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK dat cov",
                  "manifest_use": "Potential public covariance/data product locator; requires provenance caution."
              },
              {
                  "source_id": "icosmology_lrgxelg_data_raw",
                  "package_targets": "eBOSS_family_covariance_or_likelihood",
                  "source_family": "eBOSS_LRG_ELG_multitracer_repository",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK.dat",
                  "source_kind": "small_raw_candidate_file",
                  "expected_terms": "fsigma8 alpha alpha_perp alpha_parallel BAO RSD",
                  "manifest_use": "Potential small raw parameter vector candidate; not ingested here."
              },
              {
                  "source_id": "icosmology_lrgxelg_cov_raw",
                  "package_targets": "eBOSS_family_covariance_or_likelihood",
                  "source_family": "eBOSS_LRG_ELG_multitracer_repository",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK_cov.dat",
                  "source_kind": "small_raw_candidate_file",
                  "expected_terms": "cov covariance matrix",
                  "manifest_use": "Potential small raw covariance candidate; not ingested here."
              },
              {
                  "source_id": "cobaya_bao_data_repository",
                  "package_targets": "reference_vector_table_minimum,observed_growth_compilation_manifest",
                  "source_family": "cosmology_likelihood_repository",
                  "url": "https://github.com/CobayaSampler/bao_data",
                  "source_kind": "repository_page",
                  "expected_terms": "eBOSS DR16 SDSS DR12 CosmoMC BAO data",
                  "manifest_use": "Potential likelihood/data-source locator; requires provenance caution."
              }
          ]

          PACKAGE_TO_SOURCE_REQUIREMENTS = [
              {"package_id": "reference_vector_table_minimum", "minimum_source_count": 1, "preferred_source_kind": "external generated table or trusted calculator output", "status_needed": "not_satisfied_by_source_pages_alone"},
              {"package_id": "reference_covariance_matrix_preferred", "minimum_source_count": 1, "preferred_source_kind": "posterior sample covariance or source-backed covariance", "status_needed": "not_satisfied_by_source_pages_alone"},
              {"package_id": "reference_parameter_samples_optional", "minimum_source_count": 1, "preferred_source_kind": "Planck/CAMB/CLASS compatible sample table", "status_needed": "not_satisfied_by_source_pages_alone"},
              {"package_id": "eBOSS_LRG_value_source", "minimum_source_count": 1, "preferred_source_kind": "paper/source page", "status_needed": "can_be_satisfied_by_source_page_plus_manual_extraction"},
              {"package_id": "eBOSS_ELG_value_source", "minimum_source_count": 1, "preferred_source_kind": "paper/source page", "status_needed": "can_be_satisfied_by_source_page_plus_manual_extraction"},
              {"package_id": "eBOSS_QSO_value_source", "minimum_source_count": 1, "preferred_source_kind": "paper/source page", "status_needed": "can_be_satisfied_by_source_page_plus_manual_extraction"},
              {"package_id": "eBOSS_family_covariance_or_likelihood", "minimum_source_count": 1, "preferred_source_kind": "raw covariance/likelihood or source page with file path", "status_needed": "requires_file_or_exact_path"},
              {"package_id": "eBOSS_cross_tracer_overlap_note", "minimum_source_count": 1, "preferred_source_kind": "multi-tracer or consensus source page", "status_needed": "can_be_satisfied_by_source_page_plus_manual_note"},
              {"package_id": "observed_growth_compilation_manifest", "minimum_source_count": 1, "preferred_source_kind": "paper/source pages covering all points", "status_needed": "requires_manifest_compilation"},
              {"package_id": "data_license_and_provenance_note", "minimum_source_count": 1, "preferred_source_kind": "official release page and source URLs", "status_needed": "requires_manifest_compilation"}
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample rows were parsed.",
              "CAMB produced the final reference vector.",
              "Fetching a source page is the same as ingesting source data.",
              "A raw GitHub file is official without provenance review.",
              "The eBOSS family points are independent by default.",
              "The eBOSS sign pattern is a final physical conclusion.",
              "A source fetch status is the same as source-locked covariance.",
              "Pressure magnitude can be interpreted before covariance is source-locked.",
              "BIC, likelihood, or posterior comparison has been run.",
              "Public-facing validation claims are allowed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_148_source_status_review_and_manifest_fill",
                  "purpose": "Review fetched source-status records and fill manifest rows for value sources, provenance, and covariance candidates.",
                  "why_next": "v4.147 records where the source trail exists; v4.148 should convert reachable sources into manifest rows without overclaiming."
              },
              {
                  "priority": 2,
                  "route_id": "v4_148_raw_candidate_file_structure_probe",
                  "purpose": "If small raw candidate files are reachable, inspect only structure/header/shape before any parser design.",
                  "why_next": "Raw data and covariance candidates must be structurally understood before ingestion."
              },
              {
                  "priority": 3,
                  "route_id": "v4_148_reference_vector_generation_or_request",
                  "purpose": "Build or request a source-backed reference-vector table for the 12 redshifts.",
                  "why_next": "Reference vector/covariance remains the main reference-side blocker."
              },
              {
                  "priority": 4,
                  "route_id": "v4_148_public_status_summary_with_boundaries",
                  "purpose": "Write cautious status language explaining the result without validation claims.",
                  "why_next": "The work is now complex enough to need a readable status summary."
              }
          ]

          failed_gates = []
          warnings = [
              "source_fetch_status_only",
              "internet_access_may_vary_by_runner",
              "raw_candidate_files_not_ingested",
              "manual_manifest_fill_still_required",
              "reference_covariance_still_missing",
              "observed_covariance_still_missing_until_review",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def normalize(text):
              return re.sub(r"\s+", " ", (text or "").lower())

          def keyword_score(text, expected_terms):
              lower = normalize(text)
              words = [word.lower() for word in re.findall(r"[a-zA-Z0-9_σ]+", expected_terms)]
              if not words:
                  return 0
              return sum(1 for word in words if word in lower)

          def fetch_url(target, max_bytes=350000):
              record = {
                  "source_id": target["source_id"],
                  "url": target["url"],
                  "source_family": target["source_family"],
                  "source_kind": target["source_kind"],
                  "package_targets": target["package_targets"],
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "sha256_16": "",
                  "expected_term_score": 0,
                  "covariance_hint": False,
                  "likelihood_hint": False,
                  "fsigma8_hint": False,
                  "raw_file_candidate": target["source_kind"] == "small_raw_candidate_file",
                  "error": "",
                  "claim_boundary": "source_fetch_status_only_not_ingestion"
              }
              try:
                  req = urllib.request.Request(
                      target["url"],
                      headers={
                          "User-Agent": "TAIRID-v4.147-source-fetch-plan/1.0",
                          "Accept": "text/html,text/plain,application/json,*/*"
                      }
                  )
                  with urllib.request.urlopen(req, timeout=45) as response:
                      raw = response.read(max_bytes)
                      text = raw.decode("utf-8", errors="replace")
                      lower = normalize(text)
                      record["fetch_ok"] = True
                      record["status_code"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      record["bytes_read"] = len(raw)
                      record["sha256_16"] = hashlib.sha256(raw).hexdigest()[:16]
                      record["expected_term_score"] = keyword_score(text, target["expected_terms"])
                      record["covariance_hint"] = any(term in lower for term in ["covariance", "covmat", "cov", "matrix"])
                      record["likelihood_hint"] = "likelihood" in lower
                      record["fsigma8_hint"] = any(term in lower for term in ["fsigma8", "fσ8", "f sigma", "growth rate"])
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          source_fetch_records = [fetch_url(target) for target in SOURCE_TARGETS]

          package_source_status_records = []
          for requirement in PACKAGE_TO_SOURCE_REQUIREMENTS:
              package_id = requirement["package_id"]
              linked_sources = [
                  row for row in source_fetch_records
                  if package_id in [item.strip() for item in row["package_targets"].split(",")]
              ]
              reachable_sources = [row for row in linked_sources if row["fetch_ok"]]
              raw_candidates = [row for row in reachable_sources if row["raw_file_candidate"]]
              covariance_hints = [row for row in reachable_sources if row["covariance_hint"]]
              fsigma8_hints = [row for row in reachable_sources if row["fsigma8_hint"]]
              if len(raw_candidates) > 0:
                  status = "raw_candidate_reachable_needs_structure_probe"
              elif len(reachable_sources) >= requirement["minimum_source_count"]:
                  status = "source_pages_reachable_needs_manual_extraction_or_manifest_fill"
              else:
                  status = "source_targets_declared_fetch_not_confirmed"
              package_source_status_records.append({
                  "package_id": package_id,
                  "minimum_source_count": requirement["minimum_source_count"],
                  "preferred_source_kind": requirement["preferred_source_kind"],
                  "status_needed": requirement["status_needed"],
                  "linked_source_count": len(linked_sources),
                  "reachable_source_count": len(reachable_sources),
                  "raw_candidate_count": len(raw_candidates),
                  "covariance_hint_count": len(covariance_hints),
                  "fsigma8_hint_count": len(fsigma8_hints),
                  "status": status,
                  "claim_boundary": "source_status_only_not_package_completion"
              })

          manifest_fill_candidate_rows = []
          for record in source_fetch_records:
              if not record["fetch_ok"]:
                  continue
              for package_id in [item.strip() for item in record["package_targets"].split(",") if item.strip()]:
                  manifest_fill_candidate_rows.append({
                      "package_id": package_id,
                      "source_id": record["source_id"],
                      "source_family": record["source_family"],
                      "source_url_or_doi": record["url"],
                      "source_kind": record["source_kind"],
                      "fetch_ok": record["fetch_ok"],
                      "content_type": record["content_type"],
                      "sha256_16": record["sha256_16"],
                      "expected_term_score": record["expected_term_score"],
                      "covariance_hint": record["covariance_hint"],
                      "likelihood_hint": record["likelihood_hint"],
                      "fsigma8_hint": record["fsigma8_hint"],
                      "suggested_manifest_action": (
                          "raw_candidate_structure_probe_before_ingestion"
                          if record["raw_file_candidate"] else
                          "manual_extract_source_details_into_manifest"
                      ),
                      "claim_boundary": "manifest_fill_candidate_only_not_ingestion"
                  })

          fetched_count = sum(1 for row in source_fetch_records if row["fetch_ok"])
          source_target_count = len(SOURCE_TARGETS)
          raw_candidate_count = sum(1 for row in source_fetch_records if row["fetch_ok"] and row["raw_file_candidate"])
          covariance_hint_count = sum(1 for row in source_fetch_records if row["fetch_ok"] and row["covariance_hint"])
          fsigma8_hint_count = sum(1 for row in source_fetch_records if row["fetch_ok"] and row["fsigma8_hint"])
          manifest_fill_candidate_count = len(manifest_fill_candidate_rows)

          package_completed = False
          source_data_ingested = False
          covariance_ingested = False
          pressure_recomputed = False
          final_pressure_ready = False

          upstream = UPSTREAM_LOCKS["v4_146_master_status_integration_harness"]

          if upstream["selected_next_route"] != "external_source_fetch_or_manifest_fill_plan":
              failed_gates.append("upstream_route_not_external_source_fetch_or_manifest_fill_plan")

          if len(SOURCE_TARGETS) < 15:
              failed_gates.append("source_target_count_too_low")

          if len(PACKAGE_TO_SOURCE_REQUIREMENTS) != len(REQUIRED_PACKAGE_IDS):
              failed_gates.append("package_to_source_requirement_count_mismatch")

          if len(source_fetch_records) != len(SOURCE_TARGETS):
              failed_gates.append("source_fetch_record_count_mismatch")

          if len(package_source_status_records) != len(REQUIRED_PACKAGE_IDS):
              failed_gates.append("package_source_status_record_count_mismatch")

          if package_completed:
              failed_gates.append("package_unexpectedly_completed")

          if source_data_ingested:
              failed_gates.append("source_data_unexpectedly_ingested")

          if covariance_ingested:
              failed_gates.append("covariance_unexpectedly_ingested")

          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "tairid cosmology is validated",
              "standard cosmology is disproven",
              "final rsd pressure score",
              "fetching a source page is the same as ingesting source data",
              "raw github file is official without provenance review",
              "source fetch status is the same as source-locked covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "external_source_fetch_or_manifest_fill_plan_passed_source_targets_recorded_ready_for_source_status_review_and_manifest_fill"

          rule_results = [
              {"rule_id": "workflow_name_sorts_top", "pass": True, "result": "workflow name begins with 000 TAIRID", "boundary": "Navigation convenience only."},
              {"rule_id": "node24_opt_in_preserved", "pass": True, "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved", "boundary": "Warning cleanup only."},
              {"rule_id": "upstream_master_status_carried", "pass": upstream["selected_next_route"] == "external_source_fetch_or_manifest_fill_plan", "result": "v4.146 selected source fetch / manifest fill", "boundary": "Carry-forward only."},
              {"rule_id": "source_targets_declared", "pass": len(SOURCE_TARGETS) >= 15, "result": f"source_target_count={len(SOURCE_TARGETS)}", "boundary": "Source target declaration only."},
              {"rule_id": "fetch_status_records_complete", "pass": len(source_fetch_records) == len(SOURCE_TARGETS), "result": f"fetch_records={len(source_fetch_records)}; fetched_count={fetched_count}", "boundary": "Fetch status only, not ingestion."},
              {"rule_id": "package_source_status_records_complete", "pass": len(package_source_status_records) == len(REQUIRED_PACKAGE_IDS), "result": f"package_status_records={len(package_source_status_records)}", "boundary": "Package status only."},
              {"rule_id": "manifest_fill_candidates_recorded", "pass": manifest_fill_candidate_count >= 0, "result": f"manifest_fill_candidate_count={manifest_fill_candidate_count}", "boundary": "Candidate rows only, not manifest completion."},
              {"rule_id": "raw_candidate_status_recorded", "pass": raw_candidate_count >= 0, "result": f"raw_candidate_count={raw_candidate_count}", "boundary": "Raw candidates require later structure probe."},
              {"rule_id": "covariance_hint_status_recorded", "pass": covariance_hint_count >= 0, "result": f"covariance_hint_count={covariance_hint_count}", "boundary": "Hints are not covariance ingestion."},
              {"rule_id": "fsigma8_hint_status_recorded", "pass": fsigma8_hint_count >= 0, "result": f"fsigma8_hint_count={fsigma8_hint_count}", "boundary": "Hints are not value extraction."},
              {"rule_id": "package_not_completed", "pass": package_completed is False, "result": "data package not completed by this workflow", "boundary": "No package completion claim."},
              {"rule_id": "source_data_not_ingested", "pass": source_data_ingested is False, "result": "source data not ingested", "boundary": "No parser or scientific result."},
              {"rule_id": "covariance_not_ingested", "pass": covariance_ingested is False, "result": "covariance not ingested", "boundary": "No combined eBOSS interpretation."},
              {"rule_id": "pressure_not_recomputed", "pass": pressure_recomputed is False, "result": "pressure not recomputed", "boundary": "No final score."},
              {"rule_id": "final_pressure_and_validation_blocked", "pass": final_pressure_ready is False, "result": "final pressure and validation remain blocked", "boundary": "No validation claim."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 15, "result": f"blocked_claims={len(BLOCKED_CLAIMS)}", "boundary": "No validation or final pressure claim."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "", "result": route_decision, "boundary": "Route decision does not validate the model."}
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_147_rules_passed")

          if failed_gates:
              readiness_label = "external_source_fetch_or_manifest_fill_plan_failed"
              next_allowed_step = "Repair source fetch / manifest fill plan before continuing."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.148 source status review and manifest fill. "
                  "If raw candidate files are reachable, inspect structure only before parser design. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
