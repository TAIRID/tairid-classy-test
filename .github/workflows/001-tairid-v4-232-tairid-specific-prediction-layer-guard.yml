name: 001 TAIRID v4.232 - TAIRID Specific Prediction Layer Guard

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-232-tairid-specific-prediction-layer-guard.yml"

permissions:
  contents: read

jobs:
  tairid-specific-prediction-layer-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.232 TAIRID Specific Prediction Layer Guard is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.232 TAIRID specific prediction layer guard
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.232"
          ROUTE = "tairid_specific_prediction_layer_guard_after_v4_231"
          EXPECTED_RESULT = "v4_232_tairid_specific_prediction_layer_guard_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_233_holdout_plan_or_stronger_lcdm_reference_upgrade"

          OUT = Path("tairid_v4_232_tairid_specific_prediction_layer_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-232-tairid-specific-prediction-layer-guard-output.zip"

          BASE = "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16"

          SOURCE_INPUTS = [
              {
                  "source": "LRG",
                  "surface_id": "lrg_dr16_fsbao_dmdhfs8",
                  "measurement_url": BASE + "/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8.txt",
                  "covariance_url": BASE + "/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8_covtot.txt",
              },
              {
                  "source": "QSO",
                  "surface_id": "qso_dr16_fsbao_dmdhfs8",
                  "measurement_url": BASE + "/qso/sdss_DR16_QSO_FSBAO_DMDHfs8.txt",
                  "covariance_url": BASE + "/qso/sdss_DR16_QSO_FSBAO_DMDHfs8_covtot.txt",
              },
          ]

          AXIS_MAP = {
              "DM_over_rd": ("D_M_over_r_sound", "reach_geometry"),
              "DM_over_rs": ("D_M_over_r_sound", "reach_geometry"),
              "DH_over_rd": ("D_H_over_r_sound", "radial_pacing_geometry"),
              "DH_over_rs": ("D_H_over_r_sound", "radial_pacing_geometry"),
              "f_sigma8": ("f_sigma8", "growth_consolidation"),
          }

          AXIS_ORDER = ["D_M_over_r_sound", "D_H_over_r_sound", "f_sigma8"]

          H0_VALUES = [66.50, 67.36, 69.00]
          OMEGA_M_VALUES = [0.3000, 0.3153, 0.3300]
          SIGMA8_VALUES = [0.7800, 0.8111, 0.8400]
          R_SOUND_VALUES = [146.50, 147.09, 147.50]
          GROWTH_GAMMA = 0.55
          C_LIGHT = 299792.458

          # This prediction layer is written after v4.231, so it is a candidate
          # prediction layer for future holdout tests, not independent evidence.
          PREDICTION_LAYER = [
              {
                  "prediction_id": "pred_001_primary",
                  "source": "QSO",
                  "standard_quantity": "f_sigma8",
                  "predicted_pressure_class": "stable_positive_pressure",
                  "prediction_strength": "primary",
                  "prediction_logic": "High-redshift QSO growth/consolidation should remain positive against the guarded baseline bracket if the TAIRID source-surface pressure lane is real.",
                  "holdout_status": "not_holdout_written_after_v4_231",
              },
              {
                  "prediction_id": "pred_002_secondary",
                  "source": "QSO",
                  "standard_quantity": "D_H_over_r_sound",
                  "predicted_pressure_class": "positive_with_zero_guard_band",
                  "prediction_strength": "secondary",
                  "prediction_logic": "QSO radial pacing should be nonnegative or positive, but this is weaker than the growth prediction.",
                  "holdout_status": "not_holdout_written_after_v4_231",
              },
              {
                  "prediction_id": "pred_003_control",
                  "source": "QSO",
                  "standard_quantity": "D_M_over_r_sound",
                  "predicted_pressure_class": "mixed_or_zero_allowed",
                  "prediction_strength": "control",
                  "prediction_logic": "QSO transverse geometry is not the primary predicted pressure lane and may remain mixed or mostly zero.",
                  "holdout_status": "not_holdout_written_after_v4_231",
              },
              {
                  "prediction_id": "pred_004_control",
                  "source": "LRG",
                  "standard_quantity": "f_sigma8",
                  "predicted_pressure_class": "stable_zero_guard",
                  "prediction_strength": "control",
                  "prediction_logic": "LRG growth should not show the same stable positive pressure as QSO under the current source-surface framing.",
                  "holdout_status": "not_holdout_written_after_v4_231",
              },
              {
                  "prediction_id": "pred_005_control",
                  "source": "LRG",
                  "standard_quantity": "D_M_over_r_sound",
                  "predicted_pressure_class": "mixed_or_zero_allowed",
                  "prediction_strength": "control",
                  "prediction_logic": "LRG transverse geometry may remain baseline-sensitive and should not be promoted to a pressure claim.",
                  "holdout_status": "not_holdout_written_after_v4_231",
              },
              {
                  "prediction_id": "pred_006_secondary",
                  "source": "LRG",
                  "standard_quantity": "D_H_over_r_sound",
                  "predicted_pressure_class": "negative_with_zero_guard_band",
                  "prediction_strength": "secondary",
                  "prediction_logic": "LRG radial geometry may lean negative/zero, but this is treated as secondary and not a TAIRID proof lane.",
                  "holdout_status": "not_holdout_written_after_v4_231",
              },
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def fetch_text(url):
              req = Request(url, headers={"User-Agent": "TAIRID-v4.232-prediction-layer"})
              with urlopen(req, timeout=45) as response:
                  return response.read().decode("utf-8", errors="replace")

          def safe_float(token):
              try:
                  return float(token)
              except Exception:
                  return None

          def numeric_lines(text):
              rows = []
              for line in text.splitlines():
                  raw = line.strip()
                  if not raw or raw.startswith("#"):
                      continue
                  nums = []
                  labels = []
                  for part in raw.replace(",", " ").split():
                      value = safe_float(part)
                      if value is None:
                          labels.append(part)
                      else:
                          nums.append(value)
                  rows.append((nums, labels, raw))
              return rows

          def parse_measurements(text):
              rows = []
              for nums, labels, raw in numeric_lines(text):
                  if len(nums) >= 2 and labels:
                      rows.append({
                          "redshift": nums[0],
                          "value": nums[1],
                          "quantity": labels[-1],
                      })
              return rows

          def parse_matrix(text):
              rows = []
              for nums, labels, raw in numeric_lines(text):
                  if nums:
                      rows.append(nums)
              return rows

          def sigmas_from_covariance(matrix):
              sigmas = []
              for i in range(len(matrix)):
                  diag = matrix[i][i] if i < len(matrix[i]) else float("nan")
                  sigmas.append(math.sqrt(diag) if diag >= 0 else float("nan"))
              return sigmas

          def E_z(z, baseline):
              om = baseline["Omega_m0"]
              ol = 1.0 - om
              return math.sqrt(om * (1.0 + z) ** 3 + ol)

          def omega_m_z(z, baseline):
              om0 = baseline["Omega_m0"]
              return om0 * (1.0 + z) ** 3 / (E_z(z, baseline) ** 2)

          def simpson_integral(f, a, b, n=2000):
              if b == a:
                  return 0.0
              if n % 2:
                  n += 1
              h = (b - a) / n
              total = f(a) + f(b)
              for i in range(1, n):
                  x = a + i * h
                  total += (4 if i % 2 else 2) * f(x)
              return total * h / 3.0

          def dm_over_rsound(z, baseline):
              integral = simpson_integral(lambda zz: 1.0 / E_z(zz, baseline), 0.0, z)
              dm_mpc = (C_LIGHT / baseline["H0_km_s_Mpc"]) * integral
              return dm_mpc / baseline["r_sound_Mpc"]

          def dh_over_rsound(z, baseline):
              dh_mpc = C_LIGHT / (baseline["H0_km_s_Mpc"] * E_z(z, baseline))
              return dh_mpc / baseline["r_sound_Mpc"]

          def growth_suppression_g(z, baseline):
              om = omega_m_z(z, baseline)
              ol = (1.0 - baseline["Omega_m0"]) / (E_z(z, baseline) ** 2)
              denominator = (om ** (4.0 / 7.0)) - ol + (1.0 + om / 2.0) * (1.0 + ol / 70.0)
              return (2.5 * om) / denominator

          def linear_growth_D(z, baseline):
              a = 1.0 / (1.0 + z)
              return a * growth_suppression_g(z, baseline) / growth_suppression_g(0.0, baseline)

          def fsigma8_projection(z, baseline):
              f = omega_m_z(z, baseline) ** baseline["growth_gamma"]
              return f * baseline["sigma8_0"] * linear_growth_D(z, baseline)

          def projected_value(standard_quantity, z, baseline):
              if standard_quantity == "D_M_over_r_sound":
                  return dm_over_rsound(z, baseline)
              if standard_quantity == "D_H_over_r_sound":
                  return dh_over_rsound(z, baseline)
              if standard_quantity == "f_sigma8":
                  return fsigma8_projection(z, baseline)
              return float("nan")

          def median(values):
              values = sorted(values)
              if not values:
                  return float("nan")
              n = len(values)
              mid = n // 2
              if n % 2:
                  return values[mid]
              return 0.5 * (values[mid - 1] + values[mid])

          def classify_pressure(directions):
              counts = {symbol: directions.count(symbol) for symbol in ["+", "-", "0"]}
              if counts["+"] == len(directions):
                  return "stable_positive_pressure"
              if counts["-"] == len(directions):
                  return "stable_negative_pressure"
              if counts["0"] == len(directions):
                  return "stable_zero_guard"
              if counts["+"] > 0 and counts["-"] == 0:
                  return "positive_with_zero_guard_band"
              if counts["-"] > 0 and counts["+"] == 0:
                  return "negative_with_zero_guard_band"
              return "mixed_sign_sensitive"

          def prediction_matches(predicted, observed):
              if predicted == observed:
                  return True
              if predicted == "mixed_or_zero_allowed":
                  return observed in ["mixed_sign_sensitive", "stable_zero_guard", "positive_with_zero_guard_band", "negative_with_zero_guard_band"]
              return False

          baseline_rows = []
          variant_index = 0
          for h0 in H0_VALUES:
              for omega_m in OMEGA_M_VALUES:
                  for sigma8 in SIGMA8_VALUES:
                      for r_sound in R_SOUND_VALUES:
                          variant_index += 1
                          baseline_rows.append({
                              "variant_id": f"baseline_grid_{variant_index:03d}",
                              "H0_km_s_Mpc": h0,
                              "Omega_m0": omega_m,
                              "Omega_lambda0": 1.0 - omega_m,
                              "sigma8_0": sigma8,
                              "growth_gamma": GROWTH_GAMMA,
                              "r_sound_Mpc": r_sound,
                              "baseline_status": "broad_reference_grid_only_not_fit",
                              "proof_status": "not_proof",
                              "validation_status": "not_validation",
                          })

          observed_axis_rows = []

          for item in SOURCE_INPUTS:
              source = item["source"]
              surface_id = item["surface_id"]
              measurements = parse_measurements(fetch_text(item["measurement_url"]))
              covariance = parse_matrix(fetch_text(item["covariance_url"]))
              sigmas = sigmas_from_covariance(covariance)

              for index, measurement in enumerate(measurements):
                  standard_quantity, axis_name = AXIS_MAP.get(measurement["quantity"], (measurement["quantity"], "unmapped_axis"))
                  observed_axis_rows.append({
                      "source": source,
                      "surface_id": surface_id,
                      "axis_index": index,
                      "standard_quantity": standard_quantity,
                      "native_quantity": measurement["quantity"],
                      "axis_name": axis_name,
                      "redshift": measurement["redshift"],
                      "observed_value": measurement["value"],
                      "observed_sigma": sigmas[index] if index < len(sigmas) else "",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          residual_grid_rows = []

          for baseline in baseline_rows:
              for obs in observed_axis_rows:
                  z = float(obs["redshift"])
                  observed_value = float(obs["observed_value"])
                  sigma = float(obs["observed_sigma"])
                  ref = projected_value(obs["standard_quantity"], z, baseline)
                  residual = observed_value - ref
                  z_score = residual / sigma if sigma else float("nan")

                  if math.isnan(z_score) or abs(z_score) < 1.0:
                      direction = "0"
                  elif residual > 0:
                      direction = "+"
                  else:
                      direction = "-"

                  residual_grid_rows.append({
                      "variant_id": baseline["variant_id"],
                      "source": obs["source"],
                      "surface_id": obs["surface_id"],
                      "standard_quantity": obs["standard_quantity"],
                      "native_quantity": obs["native_quantity"],
                      "redshift": z,
                      "observed_value": observed_value,
                      "observed_sigma": sigma,
                      "reference_value": ref,
                      "residual_value": residual,
                      "residual_z_score": z_score,
                      "guarded_residual_direction": direction,
                      "residual_status": "prediction_layer_comparison_preview_only",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          axis_pressure_rows = []

          for source in ["LRG", "QSO"]:
              for standard_quantity in AXIS_ORDER:
                  rows = [
                      row for row in residual_grid_rows
                      if row["source"] == source and row["standard_quantity"] == standard_quantity
                  ]
                  directions = [row["guarded_residual_direction"] for row in rows]
                  z_values = [float(row["residual_z_score"]) for row in rows if not math.isnan(float(row["residual_z_score"]))]
                  counts = {symbol: directions.count(symbol) for symbol in ["+", "-", "0"]}
                  pressure_class = classify_pressure(directions)

                  axis_pressure_rows.append({
                      "source": source,
                      "standard_quantity": standard_quantity,
                      "plus_count": counts["+"],
                      "minus_count": counts["-"],
                      "zero_count": counts["0"],
                      "min_residual_z": min(z_values) if z_values else "",
                      "median_residual_z": median(z_values) if z_values else "",
                      "max_residual_z": max(z_values) if z_values else "",
                      "observed_pressure_class": pressure_class,
                      "allowed_read": "axis pressure location only",
                      "blocked_read": "not proof, not validation, not independent holdout",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          prediction_eval_rows = []

          for prediction in PREDICTION_LAYER:
              match_rows = [
                  row for row in axis_pressure_rows
                  if row["source"] == prediction["source"]
                  and row["standard_quantity"] == prediction["standard_quantity"]
              ]
              observed_class = match_rows[0]["observed_pressure_class"] if match_rows else "missing"
              matched = prediction_matches(prediction["predicted_pressure_class"], observed_class)

              if prediction["prediction_strength"] == "primary":
                  evidence_status = "candidate_layer_primary_match_not_holdout" if matched else "candidate_layer_primary_mismatch"
              elif prediction["prediction_strength"] == "secondary":
                  evidence_status = "candidate_layer_secondary_match_not_holdout" if matched else "candidate_layer_secondary_mismatch"
              else:
                  evidence_status = "control_match_or_allowed" if matched else "control_mismatch"

              prediction_eval_rows.append({
                  "prediction_id": prediction["prediction_id"],
                  "source": prediction["source"],
                  "standard_quantity": prediction["standard_quantity"],
                  "prediction_strength": prediction["prediction_strength"],
                  "predicted_pressure_class": prediction["predicted_pressure_class"],
                  "observed_pressure_class": observed_class,
                  "prediction_matched_current_data": matched,
                  "evidence_status": evidence_status,
                  "holdout_status": prediction["holdout_status"],
                  "blocked_read": "post-v4.231 candidate layer; not independent confirmation",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

          holdout_freeze_rows = [
              {
                  "freeze_id": "holdout_freeze_001",
                  "future_test_target": "independent_high_z_qso_or_qso_like_growth_surface",
                  "frozen_prediction": "f_sigma8 residual pressure should remain positive against a stronger explicit reference if TAIRID source-surface pressure is real.",
                  "failure_condition": "QSO-like high-z growth pressure disappears or reverses under stronger reference and holdout data.",
                  "status": "future_holdout_needed",
              },
              {
                  "freeze_id": "holdout_freeze_002",
                  "future_test_target": "lower_z_lrg_or_lrg_like_growth_surface",
                  "frozen_prediction": "LRG-like growth should not show the same stable positive pressure as QSO-like high-z growth.",
                  "failure_condition": "LRG-like lower-z growth shows the same stable positive pressure pattern across comparable reference brackets.",
                  "status": "future_holdout_needed",
              },
              {
                  "freeze_id": "holdout_freeze_003",
                  "future_test_target": "geometry_compressed_lane",
                  "frozen_prediction": "Compressed geometry alone should not be promoted as the primary TAIRID pressure lane from current data.",
                  "failure_condition": "Future tests treat compressed geometry as primary without source-surface justification.",
                  "status": "guardrail_needed",
              },
          ]

          reference_upgrade_rows = [
              {
                  "upgrade_id": "reference_upgrade_001",
                  "needed_upgrade": "stronger_lcdm_reference",
                  "reason": "Current baseline grid is a rough projection bracket, not a full likelihood reference.",
                  "status": "needed_before_validation_language",
              },
              {
                  "upgrade_id": "reference_upgrade_002",
                  "needed_upgrade": "external_holdout_or_new_source_family",
                  "reason": "Prediction layer is written after v4.231 and cannot count as independent evidence on the same data.",
                  "status": "needed_before_evidence_claim",
              },
              {
                  "upgrade_id": "reference_upgrade_003",
                  "needed_upgrade": "source_surface_covariance_preservation",
                  "reason": "QSO and LRG split-axis covariance can be used, but ELG remains outside the split-axis matrix.",
                  "status": "still_active_guard",
              },
          ]

          decision_rows = []

          primary_eval = next(row for row in prediction_eval_rows if row["prediction_strength"] == "primary")
          if primary_eval["prediction_matched_current_data"]:
              decision_rows.append({
                  "decision_id": "decision_001",
                  "decision": "Candidate TAIRID prediction layer matches the current QSO growth pressure location.",
                  "basis": f"Primary prediction observed {primary_eval['observed_pressure_class']}",
                  "next_action": "Do not call this evidence yet; freeze it for holdout or test against stronger reference.",
                  "claim_status": "candidate_match_not_holdout",
              })
          else:
              decision_rows.append({
                  "decision_id": "decision_001",
                  "decision": "Candidate TAIRID prediction layer does not match the current primary QSO growth pressure expectation.",
                  "basis": f"Primary prediction observed {primary_eval['observed_pressure_class']}",
                  "next_action": "Revise theory layer or upgrade reference before proceeding.",
                  "claim_status": "candidate_mismatch",
              })

          decision_rows.append({
              "decision_id": "decision_002",
              "decision": "Current data cannot be counted as a holdout for this prediction layer.",
              "basis": "Prediction layer was written after v4.231 source-surface pressure review.",
              "next_action": "Use future source family, stronger reference, or frozen holdout route.",
              "claim_status": "not_holdout",
          })

          decision_rows.append({
              "decision_id": "decision_003",
              "decision": "Combined matrix remains blocked.",
              "basis": "ELG still lacks split D_M/D_H/f_sigma8 axes and compressed geometry lane was not the primary pressure lane.",
              "next_action": "Keep source-surface tests separate.",
              "claim_status": "combined_matrix_blocked",
          })

          permission_rows = [
              {
                  "permission_scope": "tairid_candidate_prediction_layer",
                  "permission_status": "allowed_as_posthoc_candidate_layer",
                  "reason": "Prediction layer is explicit and written to be frozen for future tests.",
              },
              {
                  "permission_scope": "independent_evidence_claim",
                  "permission_status": "blocked",
                  "reason": "Current data were already reviewed before this prediction layer was written.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No validation without stronger reference, holdout, and model comparison.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface and ELG split-axis guards.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_233_holdout_plan_for_qso_growth_pressure",
                  "purpose": "freeze the QSO growth prediction and identify independent source surfaces or holdout data",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_233_stronger_lcdm_reference_upgrade",
                  "purpose": "replace rough baseline projection with stronger reference calculation before interpreting pressure",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_233_prediction_layer_failure_conditions",
                  "purpose": "write explicit fail/weakening conditions for the TAIRID prediction layer",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_233_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until source-surface guards pass",
                  "activated": True,
              },
          ]

          prediction_layer_rows = []
          for row in PREDICTION_LAYER:
              out = dict(row)
              out["proof_status"] = "not_proof"
              out["validation_status"] = "not_validation"
              prediction_layer_rows.append(out)

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before prediction layer guard"},
              {"gate": "baseline_rows_equal_81", "passed": len(baseline_rows) == 81, "detail": f"baseline_rows = {len(baseline_rows)}"},
              {"gate": "observed_axis_rows_equal_6", "passed": len(observed_axis_rows) == 6, "detail": f"observed_axis_rows = {len(observed_axis_rows)}"},
              {"gate": "residual_grid_rows_equal_486", "passed": len(residual_grid_rows) == 486, "detail": f"residual_grid_rows = {len(residual_grid_rows)}"},
              {"gate": "axis_pressure_rows_equal_6", "passed": len(axis_pressure_rows) == 6, "detail": f"axis_pressure_rows = {len(axis_pressure_rows)}"},
              {"gate": "prediction_layer_rows_equal_6", "passed": len(prediction_layer_rows) == 6, "detail": f"prediction_layer_rows = {len(prediction_layer_rows)}"},
              {"gate": "prediction_eval_rows_equal_6", "passed": len(prediction_eval_rows) == 6, "detail": f"prediction_eval_rows = {len(prediction_eval_rows)}"},
              {"gate": "primary_prediction_eval_written", "passed": any(row["prediction_strength"] == "primary" for row in prediction_eval_rows), "detail": "primary prediction row written"},
              {"gate": "holdout_freeze_rows_equal_3", "passed": len(holdout_freeze_rows) == 3, "detail": f"holdout_freeze_rows = {len(holdout_freeze_rows)}"},
              {"gate": "reference_upgrade_rows_equal_3", "passed": len(reference_upgrade_rows) == 3, "detail": f"reference_upgrade_rows = {len(reference_upgrade_rows)}"},
              {"gate": "decision_rows_equal_3", "passed": len(decision_rows) == 3, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "candidate_layer_marked_not_holdout", "passed": all(row["holdout_status"] == "not_holdout_written_after_v4_231" for row in prediction_layer_rows), "detail": "all prediction rows marked not holdout"},
              {"gate": "independent_evidence_blocked", "passed": any(row["permission_scope"] == "independent_evidence_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "independent evidence claim blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "cosmology validation claim blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "permission_rows_equal_4", "passed": len(permission_rows) == 4, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_not_holdout", "passed": True, "detail": "candidate prediction layer is not independent holdout evidence"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_233_holdout_plan_or_stronger_lcdm_reference_upgrade", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_232_tairid_specific_prediction_layer_guard_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_232_baseline_grid_rows.csv", baseline_rows)
          write_csv(OUT / "v4_232_observed_axis_rows.csv", observed_axis_rows)
          write_csv(OUT / "v4_232_residual_grid_rows.csv", residual_grid_rows)
          write_csv(OUT / "v4_232_axis_pressure_rows.csv", axis_pressure_rows)
          write_csv(OUT / "v4_232_prediction_layer_rows.csv", prediction_layer_rows)
          write_csv(OUT / "v4_232_prediction_eval_rows.csv", prediction_eval_rows)
          write_csv(OUT / "v4_232_holdout_freeze_rows.csv", holdout_freeze_rows)
          write_csv(OUT / "v4_232_reference_upgrade_rows.csv", reference_upgrade_rows)
          write_csv(OUT / "v4_232_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_232_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_232_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_232_rule_checks.csv", checks)

          prediction_lines = [
              f"{row['prediction_id']} {row['source']} {row['standard_quantity']}: predicted={row['predicted_pressure_class']}, observed={row['observed_pressure_class']}, matched={row['prediction_matched_current_data']}, status={row['evidence_status']}"
              for row in prediction_eval_rows
          ]

          decision_lines = [
              f"{row['decision_id']}: {row['decision']} Next: {row['next_action']}"
              for row in decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "baseline_rows": len(baseline_rows),
              "observed_axis_rows": len(observed_axis_rows),
              "residual_grid_rows": len(residual_grid_rows),
              "axis_pressure_rows": len(axis_pressure_rows),
              "prediction_layer_rows": len(prediction_layer_rows),
              "prediction_eval_rows": len(prediction_eval_rows),
              "holdout_freeze_rows": len(holdout_freeze_rows),
              "reference_upgrade_rows": len(reference_upgrade_rows),
              "decision_rows": len(decision_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "is_cosmology_fit": False,
                  "claims_shared_cause": False,
                  "is_independent_holdout_evidence": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_232_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.232 TAIRID Specific Prediction Layer Guard",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"baseline_rows = {summary['baseline_rows']}",
              f"observed_axis_rows = {summary['observed_axis_rows']}",
              f"residual_grid_rows = {summary['residual_grid_rows']}",
              f"axis_pressure_rows = {summary['axis_pressure_rows']}",
              f"prediction_layer_rows = {summary['prediction_layer_rows']}",
              f"prediction_eval_rows = {summary['prediction_eval_rows']}",
              f"holdout_freeze_rows = {summary['holdout_freeze_rows']}",
              f"reference_upgrade_rows = {summary['reference_upgrade_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Prediction evaluation:",
              *prediction_lines,
              "",
              "Decisions:",
              *decision_lines,
              "",
              "Clean meaning: v4.232 separates baseline pressure from a TAIRID-specific prediction layer. The layer can be frozen for future tests, but it is not independent evidence because it was written after v4.231.",
              "",
              "Truth boundary: no proof, no validation, no fit claim, no shared cause, no independent holdout evidence, no combined matrix.",
          ]
          (OUT / "v4_232_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"baseline_rows = {summary['baseline_rows']}")
          print(f"observed_axis_rows = {summary['observed_axis_rows']}")
          print(f"residual_grid_rows = {summary['residual_grid_rows']}")
          print(f"axis_pressure_rows = {summary['axis_pressure_rows']}")
          print(f"prediction_layer_rows = {summary['prediction_layer_rows']}")
          print(f"prediction_eval_rows = {summary['prediction_eval_rows']}")
          print(f"holdout_freeze_rows = {summary['holdout_freeze_rows']}")
          print(f"reference_upgrade_rows = {summary['reference_upgrade_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no fit, no shared cause, no independent holdout evidence, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.232 TAIRID specific prediction layer guard output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-232-tairid-specific-prediction-layer-guard-output
          path: |
            tairid_v4_232_tairid_specific_prediction_layer_guard_output/
            tairid-v4-232-tairid-specific-prediction-layer-guard-output.zip
