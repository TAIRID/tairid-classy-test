name: 000 TAIRID v4.167 - Limited LRGxELG LCDM Lite Sensitivity Reference Covariance Proxy Lattice Preview With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-167-limited-lrgxelg-lcdm-lite-sensitivity-reference-covariance-proxy-lattice-preview-with-scope-guards.yml"

jobs:
  limited-lrgxelg-lcdm-lite-sensitivity-reference-covariance-proxy-lattice-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib

      - name: Run v4.167 guarded covariance-proxy lattice preview
        run: |
          cat > tairid_v4_167_limited_lrgxelg_sensitivity_covariance_proxy_lattice_preview.py <<'PY'
          import csv
          import json
          import math
          import os
          from pathlib import Path

          import numpy as np
          import pandas as pd

          import matplotlib
          matplotlib.use("Agg")
          import matplotlib.pyplot as plt

          VERSION = "v4.167"
          EXPECTED_RESULT_LABEL = "limited_lrgxelg_lcdm_lite_sensitivity_reference_covariance_proxy_lattice_preview_passed_proxy_lattice_artifacts_written_no_planck_covariance_no_pressure_no_validation"
          CLAIM_BOUNDARY = "lcdm_lite_sensitivity_reference_covariance_proxy_only_no_planck_covariance_no_pressure_no_validation"
          OUTDIR = Path("tairid_v4_167_limited_lrgxelg_sensitivity_reference_covariance_proxy_lattice_preview_output")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          ROWS = [
              (0, "DM_ov_rd_z0p70", 0.700, "DM_over_rd", "geometry_transverse_reach", "dimensionless_ratio_to_rd"),
              (1, "DH_ov_rd_z0p70", 0.700, "DH_over_rd", "geometry_radial_pacing_access", "dimensionless_ratio_to_rd"),
              (2, "fsigma8_z0p70", 0.700, "fsigma8", "growth_consolidation", "dimensionless"),
              (3, "DM_ov_rd_z0p845", 0.845, "DM_over_rd", "geometry_transverse_reach", "dimensionless_ratio_to_rd"),
              (4, "DH_ov_rd_z0p845", 0.845, "DH_over_rd", "geometry_radial_pacing_access", "dimensionless_ratio_to_rd"),
              (5, "fsigma8_z0p845", 0.845, "fsigma8", "growth_consolidation", "dimensionless"),
          ]
          ROW_IDS = [row[1] for row in ROWS]

          OBSERVED_VALUES = {
              "DM_ov_rd_z0p70": 17.954174,
              "DH_ov_rd_z0p70": 21.221161,
              "fsigma8_z0p70": 0.433572,
              "DM_ov_rd_z0p845": 18.896851,
              "DH_ov_rd_z0p845": 20.910056,
              "fsigma8_z0p845": 0.296822,
          }

          BASE_PARAMS = {
              "H0_km_s_Mpc": 67.36,
              "Omega_m": 0.3153,
              "Omega_lambda_flat": 1.0 - 0.3153,
              "sigma8_z0": 0.8111,
              "rd_Mpc": 147.09,
              "growth_index_gamma": 0.55,
              "c_km_s": 299792.458,
              "parameter_label": "Planck_like_LCDM_lite_fixed_parameters_not_posterior_not_covariance",
          }

          PARAMETER_STEPS = [
              {"parameter": "Omega_m", "minus": -0.0100, "plus": 0.0100, "units": "absolute", "reason": "matter-density sensitivity probe"},
              {"parameter": "H0_km_s_Mpc", "minus": -1.0000, "plus": 1.0000, "units": "km/s/Mpc absolute", "reason": "distance-scale sensitivity probe"},
              {"parameter": "rd_Mpc", "minus": -1.0000, "plus": 1.0000, "units": "Mpc absolute", "reason": "sound-horizon ratio sensitivity probe"},
              {"parameter": "sigma8_z0", "minus": -0.0200, "plus": 0.0200, "units": "absolute", "reason": "growth-amplitude sensitivity probe"},
              {"parameter": "growth_index_gamma", "minus": -0.0200, "plus": 0.0200, "units": "absolute", "reason": "growth-index sensitivity probe"},
          ]

          OBSERVED_COVARIANCE = np.array([
              [0.2587881640783336, -0.0132324949413802, 0.0140417933081024, 0.0977965780069563, 0.0134513846030551, 0.0015258919508268],
              [-0.0132324949413802, 1.4344237981407906, -0.0084554951213026, 0.1321989533775232, 1.4746945528204890, -0.0259457409643173],
              [0.0140417933081024, -0.0084554951213026, 0.0025037130000000, 0.0004465092770083, -0.0285244416519470, 0.0006465324000000],
              [0.0977965780069563, 0.1321989533775232, 0.0004465092770083, 0.6026008615719455, -0.7938862302612694, 0.0356493099801940],
              [0.0134513846030551, 1.4746945528204890, -0.0285244416519470, -0.7938862302612694, 8.1893116749972500, -0.1713736172035217],
              [0.0015258919508268, -0.0259457409643173, 0.0006465324000000, 0.0356493099801940, -0.1713736172035217, 0.0066234740000000],
          ], dtype=float)

          def with_flat_lambda(params):
              p = dict(params)
              p["Omega_lambda_flat"] = 1.0 - p["Omega_m"]
              return p

          def e_of_z(z, p):
              return math.sqrt(p["Omega_m"] * (1.0 + z) ** 3 + p["Omega_lambda_flat"])

          def omega_m_of_z(z, p):
              ez2 = e_of_z(z, p) ** 2
              return p["Omega_m"] * (1.0 + z) ** 3 / ez2

          def simpson_integral(func, a, b, n=4000):
              if n % 2:
                  n += 1
              h = (b - a) / n
              s = func(a) + func(b)
              for i in range(1, n):
                  coeff = 4 if i % 2 else 2
                  s += coeff * func(a + i * h)
              return s * h / 3.0

          def comoving_distance_mpc(z, p):
              integral = simpson_integral(lambda zz: 1.0 / e_of_z(zz, p), 0.0, z, n=4000)
              return (p["c_km_s"] / p["H0_km_s_Mpc"]) * integral

          def hubble_distance_mpc(z, p):
              return p["c_km_s"] / (p["H0_km_s_Mpc"] * e_of_z(z, p))

          def e_of_a(a, p):
              return math.sqrt(p["Omega_m"] / (a ** 3) + p["Omega_lambda_flat"])

          def growth_integral_raw(a, p):
              lower = 1.0e-5
              upper = a
              if upper <= lower:
                  return 0.0

              def integrand(ap):
                  return 1.0 / ((ap ** 3) * (e_of_a(ap, p) ** 3))

              return (5.0 * p["Omega_m"] * e_of_a(a, p) / 2.0) * simpson_integral(integrand, lower, upper, n=4000)

          def growth_D_norm(z, p):
              a = 1.0 / (1.0 + z)
              norm = growth_integral_raw(1.0, p)
              return growth_integral_raw(a, p) / norm

          def fsigma8_lite(z, p):
              f = omega_m_of_z(z, p) ** p["growth_index_gamma"]
              return f * p["sigma8_z0"] * growth_D_norm(z, p)

          def reference_value(z, observable, p):
              if observable == "DM_over_rd":
                  return comoving_distance_mpc(z, p) / p["rd_Mpc"]
              if observable == "DH_over_rd":
                  return hubble_distance_mpc(z, p) / p["rd_Mpc"]
              if observable == "fsigma8":
                  return fsigma8_lite(z, p)
              raise ValueError("Unknown observable: " + observable)

          def full_vector(params):
              p = with_flat_lambda(params)
              return np.array([reference_value(row[2], row[3], p) for row in ROWS], dtype=float)

          def matrix_to_frame(matrix):
              return pd.DataFrame(matrix, index=ROW_IDS, columns=ROW_IDS)

          def corr_from_cov(cov):
              diag = np.sqrt(np.clip(np.diag(cov), 0.0, None))
              denom = np.outer(diag, diag)
              with np.errstate(divide="ignore", invalid="ignore"):
                  corr = np.divide(cov, denom, out=np.zeros_like(cov), where=denom != 0.0)
              return corr

          def safe_inverse_spd(matrix):
              eigvals = np.linalg.eigvalsh(matrix)
              if np.min(eigvals) <= 0:
                  jitter = abs(float(np.min(eigvals))) + 1.0e-10
                  return np.linalg.inv(matrix + np.eye(matrix.shape[0]) * jitter)
              return np.linalg.inv(matrix)

          def write_json(path, obj):
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(obj, f, indent=2, sort_keys=True)

          def write_csv(path, fieldnames, rows):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  writer.writerows(rows)

          central_ref = full_vector(BASE_PARAMS)
          observed_vec = np.array([OBSERVED_VALUES[row_id] for row_id in ROW_IDS], dtype=float)
          residual = observed_vec - central_ref

          component_rows = []
          ref_proxy_cov = np.zeros((6, 6), dtype=float)
          half_shift_vectors = {}

          for step in PARAMETER_STEPS:
              param = step["parameter"]
              p_minus = dict(BASE_PARAMS)
              p_plus = dict(BASE_PARAMS)
              p_minus[param] = p_minus[param] + step["minus"]
              p_plus[param] = p_plus[param] + step["plus"]
              v_minus = full_vector(p_minus)
              v_plus = full_vector(p_plus)
              half_shift = (v_plus - v_minus) / 2.0
              half_shift_vectors[param] = half_shift
              component = np.outer(half_shift, half_shift)
              ref_proxy_cov += component

              for i, row_id in enumerate(ROW_IDS):
                  central = central_ref[i]
                  component_rows.append({
                      "parameter": param,
                      "parameter_minus_delta": step["minus"],
                      "parameter_plus_delta": step["plus"],
                      "parameter_units": step["units"],
                      "row_id": row_id,
                      "central_reference_value": central,
                      "minus_value": v_minus[i],
                      "plus_value": v_plus[i],
                      "half_shift_proxy": half_shift[i],
                      "fractional_half_shift_proxy": half_shift[i] / central if central != 0 else np.nan,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

          combined_proxy_cov = OBSERVED_COVARIANCE + ref_proxy_cov

          observed_inv = safe_inverse_spd(OBSERVED_COVARIANCE)
          combined_inv = safe_inverse_spd(combined_proxy_cov)
          observed_norm_preview = float(residual.T @ observed_inv @ residual)
          combined_proxy_norm_preview = float(residual.T @ combined_inv @ residual)

          # Eigenmode preview through combined proxy covariance.
          evals, evecs = np.linalg.eigh(combined_proxy_cov)
          order = np.argsort(evals)
          evals = evals[order]
          evecs = evecs[:, order]
          mode_rows = []
          loading_rows = []
          total_mode_energy = 0.0
          raw_mode_rows = []

          for mi in range(6):
              vec = evecs[:, mi]
              sigma = math.sqrt(max(float(evals[mi]), 0.0))
              projection = float(np.dot(residual, vec))
              units = projection / sigma if sigma > 0 else float("nan")
              energy = units * units if math.isfinite(units) else float("nan")
              total_mode_energy += energy if math.isfinite(energy) else 0.0
              abs_order = np.argsort(np.abs(vec))[::-1]
              raw_mode_rows.append((mi + 1, evals[mi], sigma, projection, units, energy, vec, abs_order))
              for vi, row_id in enumerate(ROW_IDS):
                  loading_rows.append({
                      "mode_number": mi + 1,
                      "row_id": row_id,
                      "loading": vec[vi],
                      "absolute_loading": abs(vec[vi]),
                      "observed_residual": residual[vi],
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

          for mode_number, eig, sigma, projection, units, energy, vec, abs_order in raw_mode_rows:
              frac = energy / total_mode_energy if total_mode_energy > 0 and math.isfinite(energy) else float("nan")
              mode_rows.append({
                  "mode_number": mode_number,
                  "combined_proxy_eigenvalue": eig,
                  "combined_proxy_mode_sigma": sigma,
                  "residual_projection_onto_mode": projection,
                  "mode_sigma_units_preview_not_pressure": units,
                  "absolute_mode_sigma_units_preview_not_pressure": abs(units),
                  "mode_energy_preview_not_pressure": energy,
                  "mode_energy_fraction_preview_not_pressure": frac,
                  "dominant_loading_1": ROW_IDS[int(abs_order[0])],
                  "dominant_loading_1_value": vec[int(abs_order[0])],
                  "dominant_loading_2": ROW_IDS[int(abs_order[1])],
                  "dominant_loading_2_value": vec[int(abs_order[1])],
                  "dominant_loading_3": ROW_IDS[int(abs_order[2])],
                  "dominant_loading_3_value": vec[int(abs_order[2])],
                  "claim_boundary": CLAIM_BOUNDARY,
              })

          mode_df = pd.DataFrame(mode_rows)
          dominant_idx = int(mode_df["mode_energy_fraction_preview_not_pressure"].astype(float).idxmax())
          dominant = mode_df.loc[dominant_idx].to_dict()

          # Write primary numerical artifacts.
          matrix_to_frame(OBSERVED_COVARIANCE).to_csv(OUTDIR / "observed_covariance_reused_v4_167.csv")
          matrix_to_frame(ref_proxy_cov).to_csv(OUTDIR / "lcdm_lite_sensitivity_reference_covariance_proxy_v4_167.csv")
          matrix_to_frame(corr_from_cov(ref_proxy_cov)).to_csv(OUTDIR / "lcdm_lite_sensitivity_reference_correlation_proxy_v4_167.csv")
          matrix_to_frame(combined_proxy_cov).to_csv(OUTDIR / "observed_plus_reference_proxy_covariance_v4_167.csv")
          matrix_to_frame(corr_from_cov(combined_proxy_cov)).to_csv(OUTDIR / "observed_plus_reference_proxy_correlation_v4_167.csv")
          pd.DataFrame(component_rows).to_csv(OUTDIR / "reference_proxy_component_ledger_v4_167.csv", index=False)
          mode_df.to_csv(OUTDIR / "combined_proxy_residual_mode_preview_v4_167.csv", index=False)
          pd.DataFrame(loading_rows).to_csv(OUTDIR / "combined_proxy_mode_variable_loadings_v4_167.csv", index=False)

          residual_rows = []
          for i, (slot_index, row_id, z, observable, role, units) in enumerate(ROWS):
              residual_rows.append({
                  "slot_index": slot_index,
                  "row_id": row_id,
                  "z": z,
                  "observable": observable,
                  "role": role,
                  "observed_value": observed_vec[i],
                  "lcdm_lite_reference_value": central_ref[i],
                  "residual_observed_minus_reference": residual[i],
                  "percent_residual": 100.0 * residual[i] / central_ref[i],
                  "observed_sigma": math.sqrt(OBSERVED_COVARIANCE[i, i]),
                  "observed_sigma_units_preview_not_pressure": residual[i] / math.sqrt(OBSERVED_COVARIANCE[i, i]),
                  "reference_proxy_sigma": math.sqrt(max(ref_proxy_cov[i, i], 0.0)),
                  "combined_proxy_sigma": math.sqrt(max(combined_proxy_cov[i, i], 0.0)),
                  "combined_proxy_diagonal_units_preview_not_pressure": residual[i] / math.sqrt(max(combined_proxy_cov[i, i], 1.0e-99)),
                  "claim_boundary": CLAIM_BOUNDARY,
              })
          pd.DataFrame(residual_rows).to_csv(OUTDIR / "residual_with_proxy_diagonal_context_v4_167.csv", index=False)

          # Lattice tables.
          lattice_nodes = []
          lattice_edges = []

          def add_node(node_id, node_type, label, weight=1.0, notes=""):
              lattice_nodes.append({
                  "node_id": node_id,
                  "node_type": node_type,
                  "label": label,
                  "weight": weight,
                  "notes": notes,
                  "claim_boundary": CLAIM_BOUNDARY,
              })

          def add_edge(source, target, edge_type, weight, notes=""):
              lattice_edges.append({
                  "source": source,
                  "target": target,
                  "edge_type": edge_type,
                  "weight": weight,
                  "notes": notes,
                  "claim_boundary": CLAIM_BOUNDARY,
              })

          for i, row_id in enumerate(ROW_IDS):
              add_node("var_" + row_id, "variable", row_id, abs(residual[i]), "observed variable residual coordinate")
              add_node("res_" + row_id, "residual", "residual " + row_id, residual[i], "observed minus LCDM-lite reference")
              add_edge("var_" + row_id, "res_" + row_id, "has_residual", residual[i], "signed residual")
              add_edge("var_" + row_id, "role_" + ROWS[i][4], "has_role", 1.0, ROWS[i][4])
              z_label = str(ROWS[i][2]).replace(".", "p")
              add_edge("var_" + row_id, "z_" + z_label, "has_redshift", 1.0, f"z={ROWS[i][2]}")

          for role in sorted(set(row[4] for row in ROWS)):
              add_node("role_" + role, "role", role, 1.0, "role grouping")
          for z in sorted(set(row[2] for row in ROWS)):
              add_node("z_" + str(z).replace(".", "p"), "redshift", str(z), 1.0, "redshift layer")
          for mode_row in mode_rows:
              mode_node = f"combined_proxy_mode_{int(mode_row['mode_number'])}"
              add_node(
                  mode_node,
                  "combined_proxy_mode",
                  "combined proxy mode " + str(int(mode_row["mode_number"])),
                  mode_row["mode_energy_fraction_preview_not_pressure"],
                  "covariance proxy mode; not pressure",
              )
              for loading in loading_rows:
                  if int(loading["mode_number"]) == int(mode_row["mode_number"]) and abs(float(loading["loading"])) >= 0.20:
                      add_edge(
                          "var_" + loading["row_id"],
                          mode_node,
                          "loads_on_mode_abs_ge_0p20",
                          float(loading["loading"]),
                          "signed loading above display threshold",
                      )

          pd.DataFrame(lattice_nodes).to_csv(OUTDIR / "proxy_lattice_nodes_v4_167.csv", index=False)
          pd.DataFrame(lattice_edges).to_csv(OUTDIR / "proxy_lattice_edges_v4_167.csv", index=False)

          # Figures. Plain matplotlib defaults; no custom colors.
          fig, ax = plt.subplots(figsize=(9, 6))
          ax.bar(mode_df["mode_number"].astype(str), mode_df["mode_sigma_units_preview_not_pressure"])
          ax.axhline(0.0, linewidth=1)
          ax.set_title("v4.167 residual projection through observed + LCDM-lite sensitivity proxy modes")
          ax.set_xlabel("Combined proxy covariance mode")
          ax.set_ylabel("Mode units preview, not pressure")
          fig.tight_layout()
          fig.savefig(OUTDIR / "combined_proxy_mode_projection_bar_v4_167.png", dpi=160)
          fig.savefig(OUTDIR / "combined_proxy_mode_projection_bar_v4_167.svg")
          plt.close(fig)

          fig, ax = plt.subplots(figsize=(8, 6))
          im = ax.imshow(corr_from_cov(combined_proxy_cov), aspect="auto")
          ax.set_xticks(range(6))
          ax.set_yticks(range(6))
          ax.set_xticklabels(ROW_IDS, rotation=75, ha="right", fontsize=7)
          ax.set_yticklabels(ROW_IDS, fontsize=7)
          ax.set_title("v4.167 observed + reference proxy correlation lattice")
          fig.colorbar(im, ax=ax, fraction=0.046, pad=0.04)
          fig.tight_layout()
          fig.savefig(OUTDIR / "combined_proxy_correlation_lattice_heatmap_v4_167.png", dpi=160)
          fig.savefig(OUTDIR / "combined_proxy_correlation_lattice_heatmap_v4_167.svg")
          plt.close(fig)

          # Grid showing residuals with diagonal proxy context.
          grid_df = pd.DataFrame(residual_rows)
          role_order = ["geometry_transverse_reach", "geometry_radial_pacing_access", "growth_consolidation"]
          z_order = [0.700, 0.845]
          grid = np.zeros((len(role_order), len(z_order)))
          for ri, role in enumerate(role_order):
              for zi, z in enumerate(z_order):
                  val = grid_df[(grid_df["role"] == role) & (np.isclose(grid_df["z"], z))]["combined_proxy_diagonal_units_preview_not_pressure"].iloc[0]
                  grid[ri, zi] = float(val)
          fig, ax = plt.subplots(figsize=(7, 4))
          im = ax.imshow(grid, aspect="auto")
          ax.set_xticks(range(len(z_order)))
          ax.set_yticks(range(len(role_order)))
          ax.set_xticklabels([str(z) for z in z_order])
          ax.set_yticklabels(role_order, fontsize=8)
          ax.set_title("v4.167 role-redshift lattice, combined proxy diagonal units")
          for ri in range(grid.shape[0]):
              for zi in range(grid.shape[1]):
                  ax.text(zi, ri, f"{grid[ri, zi]:.2f}", ha="center", va="center", fontsize=9)
          fig.colorbar(im, ax=ax, fraction=0.046, pad=0.04)
          fig.tight_layout()
          fig.savefig(OUTDIR / "combined_proxy_role_redshift_lattice_grid_v4_167.png", dpi=160)
          fig.savefig(OUTDIR / "combined_proxy_role_redshift_lattice_grid_v4_167.svg")
          plt.close(fig)

          # Summaries and guards.
          proxy_diag = np.sqrt(np.clip(np.diag(ref_proxy_cov), 0.0, None))
          observed_diag = np.sqrt(np.clip(np.diag(OBSERVED_COVARIANCE), 0.0, None))
          ratio_rows = []
          for i, row_id in enumerate(ROW_IDS):
              ratio_rows.append({
                  "row_id": row_id,
                  "observed_sigma": observed_diag[i],
                  "reference_proxy_sigma": proxy_diag[i],
                  "reference_proxy_sigma_over_observed_sigma": proxy_diag[i] / observed_diag[i] if observed_diag[i] > 0 else np.nan,
                  "claim_boundary": CLAIM_BOUNDARY,
              })
          pd.DataFrame(ratio_rows).to_csv(OUTDIR / "reference_proxy_vs_observed_sigma_ratio_v4_167.csv", index=False)

          summary = {
              "version": VERSION,
              "expected_result_label": EXPECTED_RESULT_LABEL,
              "claim_boundary": CLAIM_BOUNDARY,
              "scope": "Limited LRGxELG two-redshift BAO/RSD product only: z=0.70 and z=0.845, six slots.",
              "reference_used": "LCDM-lite v4.159 prototype mean vector plus v4.161 one-at-a-time sensitivity corridor.",
              "observed_covariance_used": True,
              "reference_covariance_used": False,
              "reference_covariance_proxy_used": True,
              "proxy_is_planck_posterior": False,
              "pressure_computed": False,
              "validation_claimed": False,
              "observed_covariance_norm_preview_not_pressure": observed_norm_preview,
              "observed_covariance_radius_preview_not_pressure": math.sqrt(observed_norm_preview),
              "combined_proxy_norm_preview_not_pressure": combined_proxy_norm_preview,
              "combined_proxy_radius_preview_not_pressure": math.sqrt(combined_proxy_norm_preview),
              "norm_change_observed_to_combined_proxy": combined_proxy_norm_preview - observed_norm_preview,
              "dominant_combined_proxy_mode_number": int(dominant["mode_number"]),
              "dominant_combined_proxy_mode_units_preview_not_pressure": float(dominant["mode_sigma_units_preview_not_pressure"]),
              "dominant_combined_proxy_mode_energy_fraction_preview_not_pressure": float(dominant["mode_energy_fraction_preview_not_pressure"]),
              "dominant_combined_proxy_mode_top_loading_1": dominant["dominant_loading_1"],
              "dominant_combined_proxy_mode_top_loading_2": dominant["dominant_loading_2"],
              "dominant_combined_proxy_mode_top_loading_3": dominant["dominant_loading_3"],
              "plain_language_read": "The sensitivity corridor can build a covariance-like proxy lattice from fixed LCDM-lite parameter perturbations, but it is not a real reference covariance. Adding that proxy broadens some reference directions and changes the residual-mode lattice preview without creating final pressure.",
          }
          write_json(OUTDIR / "proxy_lattice_summary_v4_167.json", summary)

          scope_guard_rows = [
              {"guard": "limited_lrgxelg_only", "status": "PASS", "detail": "only six LRGxELG slots at z=0.70 and z=0.845 are used"},
