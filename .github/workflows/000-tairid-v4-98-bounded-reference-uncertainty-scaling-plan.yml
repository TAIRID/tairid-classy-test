name: 000 TAIRID v4.98 Bounded Reference Uncertainty Scaling Plan

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-98-bounded-reference-uncertainty-scaling-plan.yml"

jobs:
  tairid-v4-98-bounded-reference-uncertainty-scaling-plan:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.98 bounded reference uncertainty scaling plan
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_98_bounded_reference_uncertainty_scaling_plan

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_98_bounded_reference_uncertainty_scaling_plan")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_98_bounded_reference_uncertainty_scaling_plan"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse additional chain sample files.",
              "This does not run CAMB.",
              "This does not compute a new weighted mean.",
              "This does not compute a new weighted covariance matrix.",
              "This does not compute Planck reference uncertainty.",
              "This is a scaling plan after v4.97 proved the 64-sample weighted covariance mechanics work.",
              "A pass means the next bounded larger-sample parser route is specified, not that reference uncertainty is final."
          ]

          UPSTREAM_LOCKS = {
              "v4_97_larger_sample_weighted_covariance_mechanics_probe": {
                  "readiness_label": "larger_sample_weighted_covariance_mechanics_probe_passed_ready_for_bounded_reference_uncertainty_scaling_plan",
                  "larger_sample_weighted_covariance_mechanics_computed": True,
                  "accepted_sample_count": 64,
                  "weight_sum": 151.0,
                  "effective_sample_size": 42.30241187384045,
                  "mean_vector_record_count": 10,
                  "covariance_matrix_record_count": 100,
                  "fsigma8_mean_record_count": 5,
                  "fsigma8_covariance_record_count": 25,
                  "full_covariance_rank": 6,
                  "fsigma8_covariance_rank": 4,
                  "rule_pass_count": 13,
                  "rule_total_count": 13,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_96_2_clean_chunked_larger_sample_solver_probe_retry": {
                  "readiness_label": "chunked_larger_sample_solver_probe_retry_passed_ready_for_larger_sample_weighted_covariance_mechanics_probe",
                  "sample_output_vector_count": 64,
                  "solver_record_count": 64,
                  "chunk_solver_record_count": 4,
                  "all_chunks_complete": True,
                  "all_output_vectors_complete": True,
                  "all_weights_preserved": True,
                  "all_orientations_reversed": True,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          SCALING_RATIONALE = [
              {
                  "finding_id": "mechanics_work",
                  "from_v4_97": "64 weighted CAMB output vectors produced weighted mean and covariance mechanics successfully.",
                  "meaning": "The parser solver covariance bridge works mechanically.",
                  "boundary": "Mechanics success is not full posterior support."
              },
              {
                  "finding_id": "effective_sample_size_useful_but_not_final",
                  "from_v4_97": "effective_sample_size = 42.30241187384045",
                  "meaning": "The weighted sample prefix has usable support for a mechanics diagnostic.",
                  "boundary": "This is still too small for final Planck reference uncertainty."
              },
              {
                  "finding_id": "rank_warning_required",
                  "from_v4_97": "full_covariance_rank = 6 and fsigma8_covariance_rank = 4",
                  "meaning": "The tiny covariance is informative for mechanics but limited by sample geometry and sample count.",
                  "boundary": "Rank-limited covariance cannot be used as final RSD reference covariance."
              },
              {
                  "finding_id": "next_step_must_expand_support",
                  "from_v4_97": "all quality gates passed",
                  "meaning": "The next clean move is larger bounded sample support, not final pressure.",
                  "boundary": "No observational RSD combination yet."
              }
          ]

          SCALING_LEVELS = [
              {
                  "level_id": "level_0_completed_micro_mechanics",
                  "valid_rows": 64,
                  "minimum_valid_rows": 64,
                  "sample_source_scope": "one selected chain member prefix",
                  "solver_plan": "completed in v4.96.2",
                  "covariance_plan": "completed as mechanics in v4.97",
                  "claim_allowed": "mechanics diagnostic only",
                  "claim_blocked": "final Planck reference uncertainty"
              },
              {
                  "level_id": "level_1_next_bounded_parser",
                  "valid_rows": 256,
                  "minimum_valid_rows": 128,
                  "sample_source_scope": "bounded larger prefix of the same selected chain member",
                  "solver_plan": "future chunked solver design after parser pass",
                  "covariance_plan": "future larger-sample mechanics probe after solver pass",
                  "claim_allowed": "larger bounded mechanics diagnostic",
                  "claim_blocked": "final Planck reference uncertainty"
              },
              {
                  "level_id": "level_2_cross_chain_support_design",
                  "valid_rows": 512,
                  "minimum_valid_rows": 256,
                  "sample_source_scope": "multiple selected chain members if available under bounded range-read controls",
                  "solver_plan": "chunked solver batch with artifact split",
                  "covariance_plan": "larger reference-covariance diagnostic with chain-source labels",
                  "claim_allowed": "preliminary reference-covariance diagnostic if quality gates pass",
                  "claim_blocked": "final Planck reference uncertainty"
              },
              {
                  "level_id": "level_3_final_reference_candidate",
                  "valid_rows": "1000_plus_or_formally_justified",
                  "minimum_valid_rows": "to_be_defined_after_level_2",
                  "sample_source_scope": "posterior support broad enough to represent the selected Planck root, ideally across chain files",
                  "solver_plan": "bounded batch or external runner plan with reproducibility ledger",
                  "covariance_plan": "candidate Planck fsigma8 reference mean/covariance with quality report",
                  "claim_allowed": "candidate reference uncertainty only after quality and scope review",
                  "claim_blocked": "TAIRID validation and model-comparison claim"
              }
          ]

          NEXT_PARSER_PROBE_CONTRACT = {
              "next_workflow": "v4.99 larger bounded sample parser probe",
              "target_valid_rows": 256,
              "minimum_valid_rows": 128,
              "selected_root": "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE",
              "selected_chain_member": "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE_1.txt",
              "selected_paramnames_member": "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE.paramnames",
              "allowed_actions": [
                  "bounded central-directory/member range reads",
                  "parse paramnames if needed",
                  "parse larger prefix of selected chain member",
                  "write weighted sample packets",
                  "estimate weight sum and effective sample size preview"
              ],
              "blocked_actions": [
                  "full zip download",
                  "full chain import",
                  "CAMB run",
                  "weighted covariance computation",
                  "Planck reference uncertainty computation",
                  "final RSD pressure computation",
                  "TAIRID validation claim"
              ]
          }

          NEXT_SOLVER_SCALING_CONTRACT = [
              {
                  "future_workflow": "v5.00 larger bounded solver batch design",
                  "depends_on": "v4.99 parser pass",
                  "sample_target": 256,
                  "chunk_size_candidate": 32,
                  "chunk_count_candidate": 8,
                  "output_vector_dimension": 10,
                  "locked_orientation": "reversed_raw_order",
                  "run_now": False
              },
              {
                  "future_workflow": "v5.01 larger bounded solver batch probe",
                  "depends_on": "v5.00 design pass",
                  "sample_target": 256,
                  "chunk_size_candidate": 32,
                  "chunk_count_candidate": 8,
                  "output_vector_dimension": 10,
                  "locked_orientation": "reversed_raw_order",
                  "run_now": False
              },
              {
                  "future_workflow": "v5.02 larger bounded weighted covariance diagnostic",
                  "depends_on": "v5.01 solver pass",
                  "sample_target": 256,
                  "expected_covariance_shape": "10x10 plus fsigma8 5x5",
                  "final_reference_allowed": False,
                  "run_now": False
              }
          ]

          QUALITY_THRESHOLDS = [
              {
                  "threshold_id": "minimum_rows_next_probe",
                  "value": 128,
                  "why": "Below this, the next parser expansion did not materially improve over the 64-row mechanics diagnostic.",
                  "failure_action": "Repair parser range length or parsing logic."
              },
              {
                  "threshold_id": "target_rows_next_probe",
                  "value": 256,
                  "why": "A 4x expansion over v4.97 gives a stronger bounded mechanics test while keeping GitHub runtime controlled.",
                  "failure_action": "Accept only if minimum is met; otherwise retry parser."
              },
              {
                  "threshold_id": "effective_sample_size_preview_minimum",
                  "value": 80,
                  "why": "A larger prefix should improve weighted support above the v4.97 N_eff of about 42.3.",
                  "failure_action": "Warn and continue only as parser mechanics, not covariance-ready."
              },
              {
                  "threshold_id": "required_primary_parameters",
                  "value": "omegabh2, omegach2, theta, tau, logA, ns",
                  "why": "Every sample packet must map into the CAMB contract already proven by v4.86-v4.90.",
                  "failure_action": "Do not advance to solver design."
              },
              {
                  "threshold_id": "claim_boundary",
                  "value": "no_final_reference_uncertainty",
                  "why": "Even 256 rows remain bounded support, not full Planck posterior coverage.",
                  "failure_action": "Block final pressure and validation claims."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A new weighted covariance matrix was computed in v4.98.",
              "A new weighted posterior mean vector was computed in v4.98.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The bounded scaling plan validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The 64-sample mechanics diagnostic is enough for final RSD pressure.",
              "The next 256-row parser target will be final Planck reference uncertainty.",
              "Formula or scaling design output is already posterior covariance."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_99_larger_bounded_sample_parser_probe",
                  "purpose": "Parse up to 256 valid weighted sample packets from the selected Planck chain member, with 128 valid rows as the minimum pass threshold.",
                  "why_next": "v4.97 proved covariance mechanics; now the posterior support must be expanded before another solver/covariance pass."
              },
              {
                  "priority": 2,
                  "route_id": "v5_00_larger_bounded_solver_batch_design",
                  "purpose": "Design the chunked solver route for the larger parsed sample set.",
                  "why_next": "CAMB runtime must stay bounded and reproducible."
              },
              {
                  "priority": 3,
                  "route_id": "v5_01_larger_bounded_solver_batch_probe",
                  "purpose": "Run the larger sample set through CAMB in chunks only after the design pass.",
                  "why_next": "Reference covariance needs output vectors for each weighted sample."
              },
              {
                  "priority": 4,
                  "route_id": "v5_02_larger_bounded_weighted_covariance_diagnostic",
                  "purpose": "Compute a larger bounded weighted covariance diagnostic after solver outputs exist.",
                  "why_next": "Only then can mechanics be compared to the v4.97 64-sample covariance."
              }
          ]

          failed_gates = []
          warnings = [
              "scaling_plan_only",
              "no_new_parser_run",
              "no_CAMB_run",
              "no_new_weighted_mean",
              "no_new_covariance",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          if UPSTREAM_LOCKS["v4_97_larger_sample_weighted_covariance_mechanics_probe"]["larger_sample_weighted_covariance_mechanics_computed"] is not True:
              failed_gates.append("upstream_v4_97_mechanics_not_computed")

          if UPSTREAM_LOCKS["v4_97_larger_sample_weighted_covariance_mechanics_probe"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_97_larger_sample_weighted_covariance_mechanics_probe"]["effective_sample_size"] <= 0:
              failed_gates.append("upstream_effective_sample_size_not_positive")

          if NEXT_PARSER_PROBE_CONTRACT["target_valid_rows"] != 256:
              failed_gates.append("next_parser_target_not_256")

          if NEXT_PARSER_PROBE_CONTRACT["minimum_valid_rows"] != 128:
              failed_gates.append("next_parser_minimum_not_128")

          if not any(row["level_id"] == "level_1_next_bounded_parser" and row["valid_rows"] == 256 for row in SCALING_LEVELS):
              failed_gates.append("level_1_256_row_plan_missing")

          if not all(row["run_now"] is False for row in NEXT_SOLVER_SCALING_CONTRACT):
              failed_gates.append("future_solver_contract_marks_run_now")

          if not any(row["threshold_id"] == "effective_sample_size_preview_minimum" for row in QUALITY_THRESHOLDS):
              failed_gates.append("effective_sample_size_threshold_missing")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "new weighted covariance matrix was computed in v4.98",
              "final rsd pressure score",
              "validates tairid cosmology",
              "64-sample mechanics diagnostic is enough for final rsd pressure",
              "next 256-row parser target will be final planck reference uncertainty",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "bounded_reference_uncertainty_scaling_plan_passed_ready_for_larger_bounded_sample_parser_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_v4_97_mechanics_carried",
                  "pass": UPSTREAM_LOCKS["v4_97_larger_sample_weighted_covariance_mechanics_probe"]["larger_sample_weighted_covariance_mechanics_computed"] is True,
                  "result": "64-sample weighted covariance mechanics completed in v4.97",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "reference_uncertainty_still_blocked",
                  "pass": UPSTREAM_LOCKS["v4_97_larger_sample_weighted_covariance_mechanics_probe"]["Planck_reference_uncertainty_computed"] is False,
                  "result": "Planck reference uncertainty remains uncomputed",
                  "boundary": "Scaling plan only."
              },
              {
                  "rule_id": "scaling_rationale_declared",
                  "pass": len(SCALING_RATIONALE) >= 4,
                  "result": f"{len(SCALING_RATIONALE)} rationale rows declared",
                  "boundary": "Interpretation guard only."
              },
              {
                  "rule_id": "scaling_levels_declared",
                  "pass": len(SCALING_LEVELS) >= 4,
                  "result": f"{len(SCALING_LEVELS)} scaling levels declared",
                  "boundary": "No sample expansion yet."
              },
              {
                  "rule_id": "next_parser_contract_locked",
                  "pass": NEXT_PARSER_PROBE_CONTRACT["target_valid_rows"] == 256 and NEXT_PARSER_PROBE_CONTRACT["minimum_valid_rows"] == 128,
                  "result": "next parser target=256 and minimum=128",
                  "boundary": "Parser target only."
              },
              {
                  "rule_id": "future_solver_contract_blocked",
                  "pass": all(row["run_now"] is False for row in NEXT_SOLVER_SCALING_CONTRACT),
                  "result": "future solver/covariance contracts declared but not run",
                  "boundary": "No CAMB or covariance in v4.98."
              },
              {
                  "rule_id": "quality_thresholds_declared",
                  "pass": len(QUALITY_THRESHOLDS) >= 5,
                  "result": f"{len(QUALITY_THRESHOLDS)} quality thresholds declared",
                  "boundary": "Next probe guardrails."
              },
              {
                  "rule_id": "no_new_mean_or_covariance",
                  "pass": True,
                  "result": "v4.98 computes no new mean or covariance",
                  "boundary": "Scaling plan only."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_98_rules_passed")

          if failed_gates:
              readiness_label = "bounded_reference_uncertainty_scaling_plan_failed"
              next_allowed_step = "Repair scaling plan before larger bounded parser probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.99 larger bounded sample parser probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_sample_count": UPSTREAM_LOCKS["v4_97_larger_sample_weighted_covariance_mechanics_probe"]["accepted_sample_count"],
              "upstream_effective_sample_size": UPSTREAM_LOCKS["v4_97_larger_sample_weighted_covariance_mechanics_probe"]["effective_sample_size"],
              "upstream_full_covariance_rank": UPSTREAM_LOCKS["v4_97_larger_sample_weighted_covariance_mechanics_probe"]["full_covariance_rank"],
              "upstream_fsigma8_covariance_rank": UPSTREAM_LOCKS["v4_97_larger_sample_weighted_covariance_mechanics_probe"]["fsigma8_covariance_rank"],
              "next_parser_target_valid_rows": NEXT_PARSER_PROBE_CONTRACT["target_valid_rows"],
              "next_parser_minimum_valid_rows": NEXT_PARSER_PROBE_CONTRACT["minimum_valid_rows"],
              "scaling_level_count": len(SCALING_LEVELS),
              "quality_threshold_count": len(QUALITY_THRESHOLDS),
              "CAMB_run": False,
              "new_sample_rows_parsed": False,
              "new_weighted_mean_vector_computed": False,
              "new_weighted_covariance_matrix_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "scaling_rationale": SCALING_RATIONALE,
              "scaling_levels": SCALING_LEVELS,
              "next_parser_probe_contract": NEXT_PARSER_PROBE_CONTRACT,
              "next_solver_scaling_contract": NEXT_SOLVER_SCALING_CONTRACT,
              "quality_thresholds": QUALITY_THRESHOLDS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "next_parser_target_valid_rows": NEXT_PARSER_PROBE_CONTRACT["target_valid_rows"],
                  "next_parser_minimum_valid_rows": NEXT_PARSER_PROBE_CONTRACT["minimum_valid_rows"],
                  "CAMB_run": False,
                  "new_sample_rows_parsed": False,
                  "new_weighted_mean_vector_computed": False,
                  "new_weighted_covariance_matrix_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_98_bounded_reference_uncertainty_scaling_plan.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "scaling_rationale_v4_98.csv",
              SCALING_RATIONALE,
              ["finding_id", "from_v4_97", "meaning", "boundary"]
          )

          write_csv(
              OUTDIR / "scaling_levels_v4_98.csv",
              SCALING_LEVELS,
              ["level_id", "valid_rows", "minimum_valid_rows", "sample_source_scope", "solver_plan", "covariance_plan", "claim_allowed", "claim_blocked"]
          )

          write_csv(
              OUTDIR / "next_solver_scaling_contract_v4_98.csv",
              NEXT_SOLVER_SCALING_CONTRACT,
              ["future_workflow", "depends_on", "sample_target", "chunk_size_candidate", "chunk_count_candidate", "output_vector_dimension", "locked_orientation", "run_now"]
          )

          write_csv(
              OUTDIR / "quality_thresholds_v4_98.csv",
              QUALITY_THRESHOLDS,
              ["threshold_id", "value", "why", "failure_action"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_98.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_98.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_98.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.98 — Bounded Reference Uncertainty Scaling Plan")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.97 proved the 64-sample weighted mean/covariance mechanics. v4.98 does not compute anything new. It locks the next scaling step: parse a larger bounded sample set before treating the covariance corridor as more than a mechanics diagnostic.")
          md.append("")
          md.append("The next parser target is 256 valid rows, with 128 valid rows as the minimum pass threshold.")
          md.append("")
          md.append("This still does not compute Planck reference uncertainty, final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## Next parser contract")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in NEXT_PARSER_PROBE_CONTRACT.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Scaling levels")
          md.append("")
          md.append("| Level | Valid rows | Minimum | Claim allowed | Claim blocked |")
          md.append("|---|---:|---:|---|---|")
          for row in SCALING_LEVELS:
              md.append(f"| `{row['level_id']}` | `{row['valid_rows']}` | `{row['minimum_valid_rows']}` | `{row['claim_allowed']}` | `{row['claim_blocked']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
