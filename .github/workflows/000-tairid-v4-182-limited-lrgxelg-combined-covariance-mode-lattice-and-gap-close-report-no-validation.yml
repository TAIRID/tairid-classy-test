name: 000 TAIRID v4.182 - Limited LRGxELG Combined Covariance Mode Lattice And Gap Close Report No Validation

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-182-limited-lrgxelg-combined-covariance-mode-lattice-and-gap-close-report-no-validation.yml"

permissions:
  contents: read

jobs:
  v4-182-combined-covariance-mode-lattice-gap-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.182 combined covariance mode lattice and gap report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_182_outputs
          cat > tairid_v4_182_outputs/run_v4_182.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          OUT = Path("tairid_v4_182_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "limited_lrgxelg_combined_covariance_mode_lattice_and_gap_close_report_passed_mode_lattice_and_gap_report_written_no_validation"

          LABELS = [
              "DM_ov_rd_z0p70",
              "DH_ov_rd_z0p70",
              "fsigma8_z0p70",
              "DM_ov_rd_z0p845",
              "DH_ov_rd_z0p845",
              "fsigma8_z0p845",
          ]

          ROLES = {
              "DM_ov_rd_z0p70": "transverse_geometry_reach",
              "DH_ov_rd_z0p70": "radial_geometry_pacing_access",
              "fsigma8_z0p70": "growth_consolidation",
              "DM_ov_rd_z0p845": "transverse_geometry_reach",
              "DH_ov_rd_z0p845": "radial_geometry_pacing_access",
              "fsigma8_z0p845": "growth_consolidation",
          }

          REDSHIFTS = {
              "DM_ov_rd_z0p70": 0.700,
              "DH_ov_rd_z0p70": 0.700,
              "fsigma8_z0p70": 0.700,
              "DM_ov_rd_z0p845": 0.845,
              "DH_ov_rd_z0p845": 0.845,
              "fsigma8_z0p845": 0.845,
          }

          OBSERVED = [
              17.954174,
              21.221161,
              0.433572,
              18.896851,
              20.910056,
              0.296822,
          ]

          PLANCK_CHAIN_REFERENCE_MEAN = [
              17.59943045417609,
              20.2561921544936,
              0.4632289287770681,
              20.410265148910945,
              18.542918948589165,
              0.4492732965578104,
          ]

          OBSERVED_COV = [
              [0.258788, -0.013232, 0.014042, 0.097797, 0.013451, 0.001526],
              [-0.013232, 1.434424, -0.008455, 0.132199, 1.474695, -0.025946],
              [0.014042, -0.008455, 0.002504, 0.000447, -0.028524, 0.000647],
              [0.097797, 0.132199, 0.000447, 0.602601, -0.793886, 0.035649],
              [0.013451, 1.474695, -0.028524, -0.793886, 8.189312, -0.171374],
              [0.001526, -0.025946, 0.000647, 0.035649, -0.171374, 0.006623],
          ]

          PLANCK_CHAIN_REFERENCE_COV = [
              [0.014516, 0.007963, 0.000361, 0.015455, 0.005142, 0.000271],
              [0.007963, 0.004383, 0.000197, 0.008480, 0.002838, 0.000148],
              [0.000361, 0.000197, 0.000023, 0.000384, 0.000127, 0.000021],
              [0.015455, 0.008480, 0.000384, 0.016456, 0.005477, 0.000288],
              [0.005142, 0.002838, 0.000127, 0.005477, 0.001841, 0.000095],
              [0.000271, 0.000148, 0.000021, 0.000288, 0.000095, 0.000018],
          ]

          BLOCKED_CLAIMS = [
              "no TAIRID validation",
              "no LCDM ruled-out claim",
              "no final cosmology claim",
              "no QSO covariance",
              "no full eBOSS covariance",
              "no full tracer-family covariance",
              "no likelihood",
              "no BIC",
              "no posterior model comparison",
              "no publication-grade pressure claim",
              "limited two-redshift LRGxELG preview only",
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def mat_add(A, B):
              return [[A[i][j] + B[i][j] for j in range(len(A[0]))] for i in range(len(A))]

          def mat_to_rows(matrix, row_names, col_names):
              rows = []
              for i, rname in enumerate(row_names):
                  row = {"row_label": rname}
                  for j, cname in enumerate(col_names):
                      row[cname] = matrix[i][j]
                  rows.append(row)
              return rows

          def corr_from_cov(C):
              corr = []
              for i in range(len(C)):
                  row = []
                  for j in range(len(C)):
                      denom = math.sqrt(C[i][i] * C[j][j]) if C[i][i] > 0 and C[j][j] > 0 else 0.0
                      row.append(C[i][j] / denom if denom else "")
                  corr.append(row)
              return corr

          def gaussian_solve(A, b):
              n = len(A)
              M = [list(A[i]) + [b[i]] for i in range(n)]
              for col in range(n):
                  pivot = max(range(col, n), key=lambda r: abs(M[r][col]))
                  if abs(M[pivot][col]) < 1e-15:
                      raise ValueError("singular matrix")
                  if pivot != col:
                      M[col], M[pivot] = M[pivot], M[col]
                  piv = M[col][col]
                  for j in range(col, n + 1):
                      M[col][j] /= piv
                  for r in range(n):
                      if r == col:
                          continue
                      factor = M[r][col]
                      if factor:
                          for j in range(col, n + 1):
                              M[r][j] -= factor * M[col][j]
              return [M[i][n] for i in range(n)]

          def quadratic_form_with_inverse(C, r):
              x = gaussian_solve(C, r)
              return sum(r[i] * x[i] for i in range(len(r)))

          def jacobi_eigen_symmetric(A, max_iter=200, tol=1e-12):
              n = len(A)
              a = [list(row) for row in A]
              v = [[1.0 if i == j else 0.0 for j in range(n)] for i in range(n)]
              for _ in range(max_iter):
                  p = 0
                  q = 1
                  max_val = 0.0
                  for i in range(n):
                      for j in range(i + 1, n):
                          val = abs(a[i][j])
                          if val > max_val:
                              max_val = val
                              p, q = i, j
                  if max_val < tol:
                      break
                  app = a[p][p]
                  aqq = a[q][q]
                  apq = a[p][q]
                  phi = 0.5 * math.atan2(2.0 * apq, aqq - app)
                  c = math.cos(phi)
                  s = math.sin(phi)

                  for k in range(n):
                      if k != p and k != q:
                          aik = a[k][p]
                          akq = a[k][q]
                          a[k][p] = c * aik - s * akq
                          a[p][k] = a[k][p]
                          a[k][q] = s * aik + c * akq
                          a[q][k] = a[k][q]

                  a[p][p] = c*c*app - 2*s*c*apq + s*s*aqq
                  a[q][q] = s*s*app + 2*s*c*apq + c*c*aqq
                  a[p][q] = 0.0
                  a[q][p] = 0.0

                  for k in range(n):
                      vip = v[k][p]
                      viq = v[k][q]
                      v[k][p] = c * vip - s * viq
                      v[k][q] = s * vip + c * viq

              eigenvalues = [a[i][i] for i in range(n)]
              eigenvectors = []
              for j in range(n):
                  vec = [v[i][j] for i in range(n)]
                  norm = math.sqrt(sum(x*x for x in vec))
                  eigenvectors.append([x / norm for x in vec])
              order = sorted(range(n), key=lambda i: eigenvalues[i], reverse=True)
              return [eigenvalues[i] for i in order], [eigenvectors[i] for i in order]

          C_COMBINED = mat_add(OBSERVED_COV, PLANCK_CHAIN_REFERENCE_COV)
          RESIDUAL = [OBSERVED[i] - PLANCK_CHAIN_REFERENCE_MEAN[i] for i in range(6)]

          combined_norm = quadratic_form_with_inverse(C_COMBINED, RESIDUAL)
          combined_radius = math.sqrt(combined_norm) if combined_norm >= 0 else float("nan")

          eigvals, eigvecs = jacobi_eigen_symmetric(C_COMBINED)
          mode_rows = []
          loading_rows = []
          edge_rows = []
          energy_total = 0.0
          raw_mode_records = []

          for m, (eig, vec) in enumerate(zip(eigvals, eigvecs), start=1):
              projection_raw = sum(RESIDUAL[i] * vec[i] for i in range(6))
              sigma = math.sqrt(eig) if eig > 0 else float("nan")
              units = projection_raw / sigma if sigma and math.isfinite(sigma) else float("nan")
              energy = units * units if math.isfinite(units) else 0.0
              energy_total += energy
              role_abs = {}
              for i, label in enumerate(LABELS):
                  role_abs[ROLES[label]] = role_abs.get(ROLES[label], 0.0) + abs(vec[i])
              dominant_role = max(role_abs.items(), key=lambda kv: kv[1])[0]
              raw_mode_records.append({
                  "mode": "M" + str(m),
                  "eigenvalue": eig,
                  "mode_sigma": sigma,
                  "residual_projection_raw": projection_raw,
                  "mode_units_preview_not_validation": units,
                  "mode_energy_preview": energy,
                  "dominant_role_by_abs_loading": dominant_role,
              })
              for i, label in enumerate(LABELS):
                  loading = vec[i]
                  loading_rows.append({
                      "mode": "M" + str(m),
                      "label": label,
                      "z": REDSHIFTS[label],
                      "role": ROLES[label],
                      "loading": loading,
                      "absolute_loading": abs(loading),
                  })
                  if abs(loading) >= 0.20:
                      edge_rows.append({
                          "source": "M" + str(m),
                          "target": label,
                          "edge_type": "mode_loading",
                          "weight": loading,
                          "absolute_weight": abs(loading),
                          "note": "combined covariance mode loading; not causation",
                      })

          for rec in raw_mode_records:
              rec["mode_energy_fraction_preview"] = rec["mode_energy_preview"] / energy_total if energy_total > 0 else ""
              mode_rows.append(rec)

          dominant_mode = max(mode_rows, key=lambda r: r["mode_energy_preview"])

          residual_rows = []
          for i, label in enumerate(LABELS):
              pct = 100.0 * RESIDUAL[i] / PLANCK_CHAIN_REFERENCE_MEAN[i]
              residual_rows.append({
                  "label": label,
                  "z": REDSHIFTS[label],
                  "role": ROLES[label],
                  "observed": OBSERVED[i],
                  "planck_chain_reference_mean": PLANCK_CHAIN_REFERENCE_MEAN[i],
                  "residual": RESIDUAL[i],
                  "percent_residual": pct,
                  "combined_sigma_diagonal": math.sqrt(C_COMBINED[i][i]),
                  "combined_diagonal_units_preview_not_validation": RESIDUAL[i] / math.sqrt(C_COMBINED[i][i]),
              })

          node_rows = []
          for label in LABELS:
              node_rows.append({
                  "node_id": label,
                  "node_type": "observed_variable",
                  "role": ROLES[label],
                  "z": REDSHIFTS[label],
              })
          for row in mode_rows:
              node_rows.append({
                  "node_id": row["mode"],
                  "node_type": "combined_covariance_mode",
                  "role": row["dominant_role_by_abs_loading"],
                  "z": "",
              })

          gap_rows = [
              {
                  "gap": "observed LRGxELG values",
                  "status": "closed_for_limited_product",
                  "what_closed_it": "v4.151-v4.155 parser/source/provenance work",
                  "still_missing": "not full eBOSS family",
              },
              {
                  "gap": "observed LRGxELG covariance",
                  "status": "closed_for_limited_product",
                  "what_closed_it": "v4.153-v4.154 covariance parsing and coupling inspection",
                  "still_missing": "cross-tracer/full-family overlap",
              },
              {
                  "gap": "Planck/reference mean vector",
                  "status": "closed_for_limited_product_preview",
                  "what_closed_it": "v4.177 Planck-summary reference and v4.180 Planck-chain reference ensemble",
                  "still_missing": "full likelihood-grade implementation",
              },
              {
                  "gap": "Planck/reference covariance",
                  "status": "closed_for_limited_product_preview",
                  "what_closed_it": "v4.180 Planck-chain-derived six-slot reference covariance",
                  "still_missing": "external audit and full reference-likelihood treatment",
              },
              {
                  "gap": "combined observed-plus-reference covariance preview",
                  "status": "closed_for_limited_product_preview",
                  "what_closed_it": "v4.181 combined covariance preview and v4.182 mode lattice",
                  "still_missing": "not validation; not final pressure",
              },
              {
                  "gap": "QSO covariance",
                  "status": "open",
                  "what_closed_it": "",
                  "still_missing": "QSO covariance or likelihood source acquisition",
              },
              {
                  "gap": "full eBOSS covariance / overlap model",
                  "status": "open",
                  "what_closed_it": "",
                  "still_missing": "full tracer-family covariance or defensible overlap handling",
              },
              {
                  "gap": "model comparison",
                  "status": "open",
                  "what_closed_it": "",
                  "still_missing": "likelihood/BIC/posterior comparison; not allowed yet",
              },
          ]

          claim_rows = [
              {
                  "claim": "Limited LRGxELG geometry-growth residual shape exists against Planck-chain reference.",
                  "status": "allowed_as_diagnostic_preview",
                  "safe_wording": "The limited LRGxELG product shows a repeated twisted geometry-growth residual pattern.",
                  "forbidden_wording": "TAIRID is validated.",
              },
              {
                  "claim": "The shape survives combined observed plus Planck-chain reference covariance.",
                  "status": "allowed_as_limited_covariance_preview",
                  "safe_wording": "The six-slot preview remains nontrivial after adding Planck-chain reference covariance.",
                  "forbidden_wording": "This is a final pressure result.",
              },
              {
                  "claim": "The result is full eBOSS evidence.",
                  "status": "blocked",
                  "safe_wording": "This is limited LRGxELG only.",
                  "forbidden_wording": "The full eBOSS tracer family supports TAIRID.",
              },
              {
                  "claim": "The result rules out LCDM.",
                  "status": "blocked",
                  "safe_wording": "The preview shows structured tension relative to the Planck-chain reference in this limited product.",
                  "forbidden_wording": "LCDM is ruled out.",
              },
          ]

          write_csv(OUT / "v4_182_residual_context.csv", residual_rows, ["label", "z", "role", "observed", "planck_chain_reference_mean", "residual", "percent_residual", "combined_sigma_diagonal", "combined_diagonal_units_preview_not_validation"])
          write_csv(OUT / "v4_182_combined_covariance.csv", mat_to_rows(C_COMBINED, LABELS, LABELS), ["row_label"] + LABELS)
          write_csv(OUT / "v4_182_combined_correlation.csv", mat_to_rows(corr_from_cov(C_COMBINED), LABELS, LABELS), ["row_label"] + LABELS)
          write_csv(OUT / "v4_182_combined_covariance_modes.csv", mode_rows, ["mode", "eigenvalue", "mode_sigma", "residual_projection_raw", "mode_units_preview_not_validation", "mode_energy_preview", "dominant_role_by_abs_loading", "mode_energy_fraction_preview"])
          write_csv(OUT / "v4_182_mode_variable_loadings.csv", loading_rows, ["mode", "label", "z", "role", "loading", "absolute_loading"])
          write_csv(OUT / "v4_182_lattice_nodes.csv", node_rows, ["node_id", "node_type", "role", "z"])
          write_csv(OUT / "v4_182_lattice_edges.csv", edge_rows, ["source", "target", "edge_type", "weight", "absolute_weight", "note"])
          write_csv(OUT / "v4_182_gap_close_report.csv", gap_rows, ["gap", "status", "what_closed_it", "still_missing"])
          write_csv(OUT / "v4_182_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          selected_next_route = "eboss_qso_covariance_or_likelihood_acquisition_with_scope_guards"

          report = {
              "version": "v4.182",
              "result_label": RESULT_LABEL,
              "combined_norm_preview_not_validation": combined_norm,
              "combined_radius_preview_not_validation": combined_radius,
              "dominant_mode": dominant_mode["mode"],
              "dominant_mode_units_preview_not_validation": dominant_mode["mode_units_preview_not_validation"],
              "dominant_mode_energy_fraction_preview": dominant_mode["mode_energy_fraction_preview"],
              "dominant_mode_role": dominant_mode["dominant_role_by_abs_loading"],
              "selected_next_route": selected_next_route,
              "clean_interpretation": "Limited LRGxELG has reached a covariance-aware diagnostic preview. The next actual gap is no longer this limited product; it is QSO/full eBOSS covariance and tracer-family overlap.",
              "blocked_claims": BLOCKED_CLAIMS,
          }

          (OUT / "v4_182_mode_lattice_summary.json").write_text(json.dumps(report, indent=2), encoding="utf-8")
          (OUT / "v4_182_route_decision.json").write_text(json.dumps({
              "version": "v4.182",
              "result_label": RESULT_LABEL,
              "clean_result": "Combined covariance mode lattice and gap-close report were written for limited LRGxELG only.",
              "selected_next_route": selected_next_route,
              "blocked_claims": BLOCKED_CLAIMS,
          }, indent=2), encoding="utf-8")
          (OUT / "v4_182_scope_guards.json").write_text(json.dumps({
              "scope": "limited LRGxELG combined covariance mode lattice and gap report only",
              "observed_covariance_used": True,
              "planck_chain_reference_covariance_used": True,
              "QSO_covariance_used": False,
              "full_eBOSS_covariance_used": False,
              "likelihood_computed": False,
              "BIC_computed": False,
              "posterior_model_comparison_computed": False,
              "TAIRID_validated": False,
          }, indent=2), encoding="utf-8")
          (OUT / "v4_182_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = []
          summary.append("# TAIRID v4.182 - Combined Covariance Mode Lattice And Gap Close Report")
          summary.append("")
          summary.append("Expected result: `" + RESULT_LABEL + "`")
          summary.append("")
          summary.append("## Clean result")
          summary.append("")
          summary.append("The limited LRGxELG product now has a combined observed-plus-Planck-chain reference covariance preview and a mode-lattice report.")
          summary.append("")
          summary.append("Combined covariance radius preview, not validation: `" + f"{combined_radius:.6f}" + "`")
          summary.append("Dominant mode: `" + dominant_mode["mode"] + "`")
          summary.append("Dominant mode role: `" + dominant_mode["dominant_role_by_abs_loading"] + "`")
          summary.append("Dominant mode energy fraction: `" + f"{dominant_mode['mode_energy_fraction_preview']:.6f}" + "`")
          summary.append("")
          summary.append("## Main gap now")
          summary.append("")
          summary.append("The limited LRGxELG gap is closed enough for diagnostic preview. The next real blocker is QSO covariance/full eBOSS tracer-family covariance or overlap handling.")
          summary.append("")
          summary.append("## Selected next route")
          summary.append("")
          summary.append("`" + selected_next_route + "`")
          summary.append("")
          summary.append("## Boundary")
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_182_summary.md").write_text("\n".join(summary), encoding="utf-8")

          rules = {
              "version_is_v4_182": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "residual_context_written": (OUT / "v4_182_residual_context.csv").exists(),
              "combined_covariance_written": (OUT / "v4_182_combined_covariance.csv").exists(),
              "combined_correlation_written": (OUT / "v4_182_combined_correlation.csv").exists(),
              "modes_written": (OUT / "v4_182_combined_covariance_modes.csv").exists(),
              "loadings_written": (OUT / "v4_182_mode_variable_loadings.csv").exists(),
              "lattice_nodes_written": (OUT / "v4_182_lattice_nodes.csv").exists(),
              "lattice_edges_written": (OUT / "v4_182_lattice_edges.csv").exists(),
              "gap_report_written": (OUT / "v4_182_gap_close_report.csv").exists(),
              "claim_boundary_written": (OUT / "v4_182_claim_boundary_matrix.csv").exists(),
              "mode_lattice_summary_written": (OUT / "v4_182_mode_lattice_summary.json").exists(),
              "route_decision_written": (OUT / "v4_182_route_decision.json").exists(),
              "scope_guards_written": (OUT / "v4_182_scope_guards.json").exists(),
              "blocked_claims_written": (OUT / "v4_182_blocked_claims.json").exists(),
              "summary_written": (OUT / "v4_182_summary.md").exists(),
              "combined_norm_finite": math.isfinite(combined_norm) and combined_norm > 0,
              "dominant_mode_selected": bool(dominant_mode["mode"]),
              "no_QSO_covariance_used": True,
              "no_full_eBOSS_covariance_used": True,
              "no_likelihood_claim": True,
              "no_validation_claim": True,
              "next_route_selected": selected_next_route == "eboss_qso_covariance_or_likelihood_acquisition_with_scope_guards",
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.182",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "combined_radius_preview_not_validation": combined_radius,
              "dominant_mode": dominant_mode["mode"],
              "dominant_mode_role": dominant_mode["dominant_role_by_abs_loading"],
              "selected_next_route": selected_next_route,
              "claim_boundary": "limited_LRGxELG_mode_lattice_and_gap_report_only_no_validation",
          }
          (OUT / "v4_182_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")

          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.182 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_182_outputs/run_v4_182.py

      - name: Upload v4.182 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-182-limited-lrgxelg-combined-covariance-mode-lattice-and-gap-close-report-output
          path: tairid_v4_182_outputs/
