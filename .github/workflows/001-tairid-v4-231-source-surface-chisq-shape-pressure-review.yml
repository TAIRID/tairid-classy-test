name: 001 TAIRID v4.231 - Source Surface Chi-square Shape Pressure Review

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-231-source-surface-chisq-shape-pressure-review.yml"

permissions:
  contents: read

jobs:
  source-surface-chisq-shape-pressure-review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.231 Source Surface Chi-square Shape Pressure Review is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.231 source surface pressure review
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.231"
          ROUTE = "source_surface_chisq_shape_pressure_review_after_v4_230"
          EXPECTED_RESULT = "v4_231_source_surface_chisq_shape_pressure_review_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_232_tairid_specific_prediction_layer_or_stronger_lcdm_reference"

          OUT = Path("tairid_v4_231_source_surface_chisq_shape_pressure_review_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-231-source-surface-chisq-shape-pressure-review-output.zip"

          BASE = "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16"

          SOURCE_INPUTS = [
              {
                  "source": "LRG",
                  "surface_id": "lrg_dr16_fsbao_dmdhfs8",
                  "measurement_url": BASE + "/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8.txt",
                  "covariance_url": BASE + "/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8_covtot.txt",
              },
              {
                  "source": "QSO",
                  "surface_id": "qso_dr16_fsbao_dmdhfs8",
                  "measurement_url": BASE + "/qso/sdss_DR16_QSO_FSBAO_DMDHfs8.txt",
                  "covariance_url": BASE + "/qso/sdss_DR16_QSO_FSBAO_DMDHfs8_covtot.txt",
              },
          ]

          AXIS_MAP = {
              "DM_over_rd": ("D_M_over_r_sound", "reach_geometry"),
              "DM_over_rs": ("D_M_over_r_sound", "reach_geometry"),
              "DH_over_rd": ("D_H_over_r_sound", "radial_pacing_geometry"),
              "DH_over_rs": ("D_H_over_r_sound", "radial_pacing_geometry"),
              "f_sigma8": ("f_sigma8", "growth_consolidation"),
          }

          AXIS_ORDER = ["D_M_over_r_sound", "D_H_over_r_sound", "f_sigma8"]

          H0_VALUES = [66.50, 67.36, 69.00]
          OMEGA_M_VALUES = [0.3000, 0.3153, 0.3300]
          SIGMA8_VALUES = [0.7800, 0.8111, 0.8400]
          R_SOUND_VALUES = [146.50, 147.09, 147.50]
          GROWTH_GAMMA = 0.55
          C_LIGHT = 299792.458

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def fetch_text(url):
              req = Request(url, headers={"User-Agent": "TAIRID-v4.231-pressure-review"})
              with urlopen(req, timeout=45) as response:
                  return response.read().decode("utf-8", errors="replace")

          def safe_float(token):
              try:
                  return float(token)
              except Exception:
                  return None

          def numeric_lines(text):
              rows = []
              for line in text.splitlines():
                  raw = line.strip()
                  if not raw or raw.startswith("#"):
                      continue
                  nums = []
                  labels = []
                  for part in raw.replace(",", " ").split():
                      value = safe_float(part)
                      if value is None:
                          labels.append(part)
                      else:
                          nums.append(value)
                  rows.append((nums, labels, raw))
              return rows

          def parse_measurements(text):
              rows = []
              for nums, labels, raw in numeric_lines(text):
                  if len(nums) >= 2 and labels:
                      rows.append({
                          "redshift": nums[0],
                          "value": nums[1],
                          "quantity": labels[-1],
                      })
              return rows

          def parse_matrix(text):
              rows = []
              for nums, labels, raw in numeric_lines(text):
                  if nums:
                      rows.append(nums)
              return rows

          def sigmas_from_covariance(matrix):
              sigmas = []
              for i in range(len(matrix)):
                  diag = matrix[i][i] if i < len(matrix[i]) else float("nan")
                  sigmas.append(math.sqrt(diag) if diag >= 0 else float("nan"))
              return sigmas

          def det3(m):
              return (
                  m[0][0] * (m[1][1] * m[2][2] - m[1][2] * m[2][1])
                  - m[0][1] * (m[1][0] * m[2][2] - m[1][2] * m[2][0])
                  + m[0][2] * (m[1][0] * m[2][1] - m[1][1] * m[2][0])
              )

          def inverse3(m):
              d = det3(m)
              if abs(d) < 1e-30:
                  return None
              inv = [[0.0 for _ in range(3)] for __ in range(3)]
              inv[0][0] = (m[1][1] * m[2][2] - m[1][2] * m[2][1]) / d
              inv[0][1] = (m[0][2] * m[2][1] - m[0][1] * m[2][2]) / d
              inv[0][2] = (m[0][1] * m[1][2] - m[0][2] * m[1][1]) / d
              inv[1][0] = (m[1][2] * m[2][0] - m[1][0] * m[2][2]) / d
              inv[1][1] = (m[0][0] * m[2][2] - m[0][2] * m[2][0]) / d
              inv[1][2] = (m[0][2] * m[1][0] - m[0][0] * m[1][2]) / d
              inv[2][0] = (m[1][0] * m[2][1] - m[1][1] * m[2][0]) / d
              inv[2][1] = (m[0][1] * m[2][0] - m[0][0] * m[2][1]) / d
              inv[2][2] = (m[0][0] * m[1][1] - m[0][1] * m[1][0]) / d
              return inv

          def quadratic_form(vector, inv):
              total = 0.0
              for i in range(3):
                  for j in range(3):
                      total += vector[i] * inv[i][j] * vector[j]
              return total

          def E_z(z, baseline):
              om = baseline["Omega_m0"]
              ol = 1.0 - om
              return math.sqrt(om * (1.0 + z) ** 3 + ol)

          def omega_m_z(z, baseline):
              om0 = baseline["Omega_m0"]
              return om0 * (1.0 + z) ** 3 / (E_z(z, baseline) ** 2)

          def simpson_integral(f, a, b, n=2000):
              if b == a:
                  return 0.0
              if n % 2:
                  n += 1
              h = (b - a) / n
              total = f(a) + f(b)
              for i in range(1, n):
                  x = a + i * h
                  total += (4 if i % 2 else 2) * f(x)
              return total * h / 3.0

          def dm_over_rsound(z, baseline):
              integral = simpson_integral(lambda zz: 1.0 / E_z(zz, baseline), 0.0, z)
              dm_mpc = (C_LIGHT / baseline["H0_km_s_Mpc"]) * integral
              return dm_mpc / baseline["r_sound_Mpc"]

          def dh_over_rsound(z, baseline):
              dh_mpc = C_LIGHT / (baseline["H0_km_s_Mpc"] * E_z(z, baseline))
              return dh_mpc / baseline["r_sound_Mpc"]

          def growth_suppression_g(z, baseline):
              om = omega_m_z(z, baseline)
              ol = (1.0 - baseline["Omega_m0"]) / (E_z(z, baseline) ** 2)
              denominator = (om ** (4.0 / 7.0)) - ol + (1.0 + om / 2.0) * (1.0 + ol / 70.0)
              return (2.5 * om) / denominator

          def linear_growth_D(z, baseline):
              a = 1.0 / (1.0 + z)
              return a * growth_suppression_g(z, baseline) / growth_suppression_g(0.0, baseline)

          def fsigma8_projection(z, baseline):
              f = omega_m_z(z, baseline) ** baseline["growth_gamma"]
              return f * baseline["sigma8_0"] * linear_growth_D(z, baseline)

          def projected_value(standard_quantity, z, baseline):
              if standard_quantity == "D_M_over_r_sound":
                  return dm_over_rsound(z, baseline)
              if standard_quantity == "D_H_over_r_sound":
                  return dh_over_rsound(z, baseline)
              if standard_quantity == "f_sigma8":
                  return fsigma8_projection(z, baseline)
              return float("nan")

          def median(values):
              values = sorted(values)
              if not values:
                  return float("nan")
              n = len(values)
              mid = n // 2
              if n % 2:
                  return values[mid]
              return 0.5 * (values[mid - 1] + values[mid])

          baseline_rows = []
          variant_index = 0
          for h0 in H0_VALUES:
              for omega_m in OMEGA_M_VALUES:
                  for sigma8 in SIGMA8_VALUES:
                      for r_sound in R_SOUND_VALUES:
                          variant_index += 1
                          baseline_rows.append({
                              "variant_id": f"baseline_grid_{variant_index:03d}",
                              "H0_km_s_Mpc": h0,
                              "Omega_m0": omega_m,
                              "Omega_lambda0": 1.0 - omega_m,
                              "sigma8_0": sigma8,
                              "growth_gamma": GROWTH_GAMMA,
                              "r_sound_Mpc": r_sound,
                              "baseline_status": "broad_reference_grid_only_not_fit",
                              "proof_status": "not_proof",
                              "validation_status": "not_validation",
                          })

          observed_axis_rows = []
          source_inverse = {}
          source_axis_order = {}

          for item in SOURCE_INPUTS:
              source = item["source"]
              surface_id = item["surface_id"]
              measurements = parse_measurements(fetch_text(item["measurement_url"]))
              covariance = parse_matrix(fetch_text(item["covariance_url"]))
              sigmas = sigmas_from_covariance(covariance)
              inv = inverse3(covariance)

              source_inverse[source] = inv
              source_axis_order[source] = []

              for index, measurement in enumerate(measurements):
                  standard_quantity, axis_name = AXIS_MAP.get(measurement["quantity"], (measurement["quantity"], "unmapped_axis"))
                  source_axis_order[source].append(standard_quantity)
                  observed_axis_rows.append({
                      "source": source,
                      "surface_id": surface_id,
                      "axis_index": index,
                      "standard_quantity": standard_quantity,
                      "native_quantity": measurement["quantity"],
                      "axis_name": axis_name,
                      "redshift": measurement["redshift"],
                      "observed_value": measurement["value"],
                      "observed_sigma": sigmas[index] if index < len(sigmas) else "",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          residual_grid_rows = []
          source_chisq_rows = []

          for baseline in baseline_rows:
              for source in ["LRG", "QSO"]:
                  source_obs = [row for row in observed_axis_rows if row["source"] == source]
                  residual_vector = []
                  direction_vector = []

                  for obs in source_obs:
                      z = float(obs["redshift"])
                      observed_value = float(obs["observed_value"])
                      sigma = float(obs["observed_sigma"])
                      ref = projected_value(obs["standard_quantity"], z, baseline)
                      residual = observed_value - ref
                      z_score = residual / sigma if sigma else float("nan")

                      if math.isnan(z_score) or abs(z_score) < 1.0:
                          direction = "0"
                      elif residual > 0:
                          direction = "+"
                      else:
                          direction = "-"

                      residual_vector.append(residual)
                      direction_vector.append(direction)

                      residual_grid_rows.append({
                          "variant_id": baseline["variant_id"],
                          "source": source,
                          "surface_id": obs["surface_id"],
                          "standard_quantity": obs["standard_quantity"],
                          "native_quantity": obs["native_quantity"],
                          "redshift": z,
                          "observed_value": observed_value,
                          "observed_sigma": sigma,
                          "reference_value": ref,
                          "residual_value": residual,
                          "residual_z_score": z_score,
                          "guarded_residual_direction": direction,
                          "residual_status": "broad_baseline_grid_residual_preview_only",
                          "proof_status": "not_proof",
                          "validation_status": "not_validation",
                      })

                  inv = source_inverse[source]
                  chisq = quadratic_form(residual_vector, inv) if inv else float("nan")
                  source_chisq_rows.append({
                      "variant_id": baseline["variant_id"],
                      "source": source,
                      "axis_order": "|".join(source_axis_order[source]),
                      "guarded_signature": "".join(direction_vector),
                      "chisq_3axis": chisq,
                      "dof": 3,
                      "rms_chisq_per_axis": math.sqrt(chisq / 3.0) if chisq >= 0 else float("nan"),
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          chisq_review_rows = []
          for source in ["LRG", "QSO"]:
              rows = [row for row in source_chisq_rows if row["source"] == source]
              chisqs = [float(row["chisq_3axis"]) for row in rows]
              signatures = [row["guarded_signature"] for row in rows]
              signature_counts = {}
              for sig in signatures:
                  signature_counts[sig] = signature_counts.get(sig, 0) + 1
              dominant_signature = sorted(signature_counts.items(), key=lambda item: (-item[1], item[0]))[0][0]
              dominant_signature_count = signature_counts[dominant_signature]

              chisq_review_rows.append({
                  "source": source,
                  "grid_rows": len(rows),
                  "min_chisq_3axis": min(chisqs),
                  "median_chisq_3axis": median(chisqs),
                  "max_chisq_3axis": max(chisqs),
                  "dominant_signature": dominant_signature,
                  "dominant_signature_count": dominant_signature_count,
                  "dominant_signature_fraction": dominant_signature_count / len(rows) if rows else 0,
                  "unique_signature_count": len(signature_counts),
                  "signature_count_map": json.dumps(signature_counts, sort_keys=True),
                  "review_status": "source_surface_pressure_review_only_not_validation",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

          axis_pressure_rows = []
          for source in ["LRG", "QSO"]:
              for standard_quantity in AXIS_ORDER:
                  rows = [
                      row for row in residual_grid_rows
                      if row["source"] == source and row["standard_quantity"] == standard_quantity
                  ]
                  directions = [row["guarded_residual_direction"] for row in rows]
                  z_values = [float(row["residual_z_score"]) for row in rows if not math.isnan(float(row["residual_z_score"]))]
                  counts = {symbol: directions.count(symbol) for symbol in ["+", "-", "0"]}

                  if counts["+"] == len(directions):
                      pressure_class = "stable_positive_pressure"
                  elif counts["-"] == len(directions):
                      pressure_class = "stable_negative_pressure"
                  elif counts["0"] == len(directions):
                      pressure_class = "stable_zero_guard"
                  elif counts["+"] > 0 and counts["-"] == 0:
                      pressure_class = "positive_with_zero_guard_band"
                  elif counts["-"] > 0 and counts["+"] == 0:
                      pressure_class = "negative_with_zero_guard_band"
                  else:
                      pressure_class = "mixed_sign_sensitive"

                  axis_pressure_rows.append({
                      "source": source,
                      "standard_quantity": standard_quantity,
                      "plus_count": counts["+"],
                      "minus_count": counts["-"],
                      "zero_count": counts["0"],
                      "min_residual_z": min(z_values) if z_values else "",
                      "median_residual_z": median(z_values) if z_values else "",
                      "max_residual_z": max(z_values) if z_values else "",
                      "pressure_class": pressure_class,
                      "allowed_read": "axis-level pressure location only",
                      "blocked_read": "not proof, not validation, not shared cause",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          testing_goal_rows = [
              {
                  "goal_id": "goal_001",
                  "goal": "Upgrade reference model before validation language.",
                  "current_status": "rough baseline grid only",
                  "needed_to_close": "stronger LCDM reference or external likelihood engine",
              },
              {
                  "goal_id": "goal_002",
                  "goal": "Separate baseline pressure from TAIRID prediction.",
                  "current_status": "baseline residual pressure located; TAIRID prediction not yet specified",
                  "needed_to_close": "explicit TAIRID correction/sign prediction layer",
              },
              {
                  "goal_id": "goal_003",
                  "goal": "Preserve source surfaces and covariance.",
                  "current_status": "LRG/QSO covariance used; ELG held outside split-axis matrix",
                  "needed_to_close": "source-specific likelihood/covariance handling across more tracers",
              },
              {
                  "goal_id": "goal_004",
                  "goal": "Block combined matrix until guards pass.",
                  "current_status": "combined matrix blocked",
                  "needed_to_close": "full source surface compatibility and axis translation review",
              },
              {
                  "goal_id": "goal_005",
                  "goal": "Build holdout logic before claim.",
                  "current_status": "not yet active",
                  "needed_to_close": "freeze prediction on subset and test without retuning",
              },
          ]

          decision_rows = []

          qso_fsig = next(
              row for row in axis_pressure_rows
              if row["source"] == "QSO" and row["standard_quantity"] == "f_sigma8"
          )
          qso_has_growth_pressure = qso_fsig["pressure_class"] in ["stable_positive_pressure", "positive_with_zero_guard_band"]

          if qso_has_growth_pressure:
              decision_rows.append({
                  "decision_id": "decision_001",
                  "decision": "QSO growth/consolidation axis is the current pressure location.",
                  "basis": f"QSO f_sigma8 pressure_class = {qso_fsig['pressure_class']}, plus_count = {qso_fsig['plus_count']}",
                  "next_action": "Build TAIRID-specific prediction layer or stronger LCDM reference before calling it evidence.",
                  "claim_status": "candidate_pressure_only",
              })
          else:
              decision_rows.append({
                  "decision_id": "decision_001",
                  "decision": "No stable QSO growth pressure promoted.",
                  "basis": f"QSO f_sigma8 pressure_class = {qso_fsig['pressure_class']}",
                  "next_action": "Upgrade baseline reference before interpretation.",
                  "claim_status": "no_pressure_promotion",
              })

          decision_rows.append({
              "decision_id": "decision_002",
              "decision": "Do not run combined LRG/ELG/QSO matrix next.",
              "basis": "ELG is still not a split-axis source and compressed geometry lane was stable zero.",
              "next_action": "Keep ELG held unless a valid axis translation exists.",
              "claim_status": "combined_matrix_blocked",
          })

          decision_rows.append({
              "decision_id": "decision_003",
              "decision": "Next closure gap is TAIRID-specific prediction or stronger LCDM reference.",
              "basis": "Residual pressure relative to LCDM-like baseline is not automatically TAIRID evidence.",
              "next_action": "Choose v4.232 prediction layer or reference-model upgrade.",
              "claim_status": "method_ready_evidence_not_closed",
          })

          permission_rows = [
              {
                  "permission_scope": "source_surface_pressure_review",
                  "permission_status": "allowed_as_diagnostic",
                  "reason": "Pressure is reviewed from explicit baseline bracket and covariance-aware LRG/QSO source surfaces.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No validation without stronger reference and explicit TAIRID prediction.",
              },
              {
                  "permission_scope": "tairid_prediction_claim",
                  "permission_status": "blocked_until_prediction_layer_exists",
                  "reason": "Baseline pressure is not itself a TAIRID prediction.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "ELG remains outside split-axis matrix and compressed geometry lane was stable zero.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_232_tairid_specific_prediction_layer",
                  "purpose": "define what TAIRID predicts before comparing to baseline residual pressure",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_232_stronger_lcdm_reference",
                  "purpose": "replace rough baseline bracket with stronger external/reference model calculation",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_232_qso_growth_pressure_holdout_plan",
                  "purpose": "turn QSO growth pressure into a holdout-ready test design",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_232_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until prediction/reference/source guards pass",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before pressure review"},
              {"gate": "baseline_rows_equal_81", "passed": len(baseline_rows) == 81, "detail": f"baseline_rows = {len(baseline_rows)}"},
              {"gate": "observed_axis_rows_equal_6", "passed": len(observed_axis_rows) == 6, "detail": f"observed_axis_rows = {len(observed_axis_rows)}"},
              {"gate": "source_chisq_rows_equal_162", "passed": len(source_chisq_rows) == 162, "detail": f"source_chisq_rows = {len(source_chisq_rows)}"},
              {"gate": "chisq_review_rows_equal_2", "passed": len(chisq_review_rows) == 2, "detail": f"chisq_review_rows = {len(chisq_review_rows)}"},
              {"gate": "axis_pressure_rows_equal_6", "passed": len(axis_pressure_rows) == 6, "detail": f"axis_pressure_rows = {len(axis_pressure_rows)}"},
              {"gate": "testing_goal_rows_equal_5", "passed": len(testing_goal_rows) == 5, "detail": f"testing_goal_rows = {len(testing_goal_rows)}"},
              {"gate": "decision_rows_equal_3", "passed": len(decision_rows) == 3, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "qso_growth_pressure_review_written", "passed": any(row["source"] == "QSO" and row["standard_quantity"] == "f_sigma8" for row in axis_pressure_rows), "detail": "QSO f_sigma8 pressure row written"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "tairid_prediction_claim_blocked_until_layer_exists", "passed": any(row["permission_scope"] == "tairid_prediction_claim" and row["permission_status"] == "blocked_until_prediction_layer_exists" for row in permission_rows), "detail": "TAIRID prediction claim blocked until layer exists"},
              {"gate": "permission_rows_equal_4", "passed": len(permission_rows) == 4, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_prediction_layer_missing", "passed": True, "detail": "TAIRID-specific prediction layer not yet built"},
              {"gate": "truth_boundary_combined_matrix_blocked", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_232_tairid_specific_prediction_layer_or_stronger_lcdm_reference", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_231_source_surface_chisq_shape_pressure_review_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_231_baseline_grid_rows.csv", baseline_rows)
          write_csv(OUT / "v4_231_observed_axis_rows.csv", observed_axis_rows)
          write_csv(OUT / "v4_231_source_chisq_rows.csv", source_chisq_rows)
          write_csv(OUT / "v4_231_chisq_review_rows.csv", chisq_review_rows)
          write_csv(OUT / "v4_231_axis_pressure_rows.csv", axis_pressure_rows)
          write_csv(OUT / "v4_231_testing_goal_rows.csv", testing_goal_rows)
          write_csv(OUT / "v4_231_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_231_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_231_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_231_rule_checks.csv", checks)

          chisq_lines = [
              f"{row['source']}: min={row['min_chisq_3axis']:.3f}, median={row['median_chisq_3axis']:.3f}, max={row['max_chisq_3axis']:.3f}, dominant={row['dominant_signature']} ({row['dominant_signature_count']}/81)"
              for row in chisq_review_rows
          ]

          pressure_lines = [
              f"{row['source']} {row['standard_quantity']}: {row['pressure_class']} (+={row['plus_count']}, -={row['minus_count']}, 0={row['zero_count']})"
              for row in axis_pressure_rows
          ]

          decision_lines = [
              f"{row['decision_id']}: {row['decision']} Next: {row['next_action']}"
              for row in decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "baseline_rows": len(baseline_rows),
              "observed_axis_rows": len(observed_axis_rows),
              "source_chisq_rows": len(source_chisq_rows),
              "chisq_review_rows": len(chisq_review_rows),
              "axis_pressure_rows": len(axis_pressure_rows),
              "testing_goal_rows": len(testing_goal_rows),
              "decision_rows": len(decision_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "is_cosmology_fit": False,
                  "claims_shared_cause": False,
                  "tairid_specific_prediction_layer_exists": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_231_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.231 Source Surface Chi-square Shape Pressure Review",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"baseline_rows = {summary['baseline_rows']}",
              f"observed_axis_rows = {summary['observed_axis_rows']}",
              f"source_chisq_rows = {summary['source_chisq_rows']}",
              f"chisq_review_rows = {summary['chisq_review_rows']}",
              f"axis_pressure_rows = {summary['axis_pressure_rows']}",
              f"testing_goal_rows = {summary['testing_goal_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Chi-square review:",
              *chisq_lines,
              "",
              "Axis pressure review:",
              *pressure_lines,
              "",
              "Decisions:",
              *decision_lines,
              "",
              "Clean meaning: v4.231 turns the v4.230 output into a source-surface pressure review. It identifies the current pressure location, keeps validation language blocked, and names the next closure gap: either build a TAIRID-specific prediction layer or upgrade the LCDM reference.",
              "",
              "Truth boundary: no proof, no validation, no fit claim, no shared cause, no TAIRID-specific prediction layer yet, no combined matrix.",
          ]
          (OUT / "v4_231_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"baseline_rows = {summary['baseline_rows']}")
          print(f"observed_axis_rows = {summary['observed_axis_rows']}")
          print(f"source_chisq_rows = {summary['source_chisq_rows']}")
          print(f"chisq_review_rows = {summary['chisq_review_rows']}")
          print(f"axis_pressure_rows = {summary['axis_pressure_rows']}")
          print(f"testing_goal_rows = {summary['testing_goal_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no fit, no shared cause, no TAIRID-specific prediction layer yet, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.231 source surface pressure review output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-231-source-surface-pressure-review-output
          path: |
            tairid_v4_231_source_surface_chisq_shape_pressure_review_output/
            tairid-v4-231-source-surface-chisq-shape-pressure-review-output.zip
