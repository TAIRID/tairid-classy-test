name: 000 TAIRID v4.187 - Cross Domain Shape Signature Lock And Transfer Test Harness

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-187-cross-domain-shape-signature-lock-and-transfer-test-harness.yml"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-187-cross-domain-shape-signature:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.187 cross-domain shape signature lock and transfer harness
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_187_outputs
          cat > tairid_v4_187_outputs/run_v4_187.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_187_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "cross_domain_shape_signature_lock_and_transfer_test_harness_passed_signature_locked_templates_written_no_cross_domain_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no claim that cosmology proves cognition",
              "no claim that cognition proves cosmology",
              "no raw numbers moved between fields",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "no TAIRID proof",
              "shape-transfer harness only"
          ]

          LOCKED_COSMOLOGY_SHAPE = [
              {
                  "domain": "cosmology",
                  "subdomain": "LRGxELG",
                  "boundary_or_position": "z0p70",
                  "propagation_reach_direction": "+",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "-",
                  "shape_signature": "++-",
                  "plain_read": "reach high, pacing/radial access high, growth low",
                  "source": "v4.181-v4.185"
              },
              {
                  "domain": "cosmology",
                  "subdomain": "LRGxELG",
                  "boundary_or_position": "z0p845",
                  "propagation_reach_direction": "-",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "-",
                  "shape_signature": "-+-",
                  "plain_read": "reach low, pacing/radial access high, growth low",
                  "source": "v4.181-v4.185"
              },
              {
                  "domain": "cosmology",
                  "subdomain": "QSO",
                  "boundary_or_position": "z1p48",
                  "propagation_reach_direction": "-",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "+",
                  "shape_signature": "-++",
                  "plain_read": "reach low, pacing/radial access high, growth high",
                  "source": "v4.184-v4.185"
              }
          ]

          ROLE_TRANSLATION = [
              {
                  "domain": "cosmology",
                  "propagation_reach": "DM/rd transverse distance",
                  "pacing_access": "DH/rd radial distance",
                  "consolidation_growth": "fσ8 structure growth",
                  "boundary": "redshift and tracer family"
              },
              {
                  "domain": "neurotype_cognition",
                  "propagation_reach": "semantic breadth, association spread, novelty reach",
                  "pacing_access": "update rhythm, task-switch access, processing tempo",
                  "consolidation_growth": "stable output, coherent self-model, retained skill",
                  "boundary": "sensory/social/task/memory demand boundary"
              },
              {
                  "domain": "biology_aging_healing",
                  "propagation_reach": "repair-signal reach, systemic recovery communication",
                  "pacing_access": "metabolic timing, inflammatory cycling, circadian repair window",
                  "consolidation_growth": "tissue stability, retained function, repair consolidation",
                  "boundary": "immune barrier, extracellular matrix, organ/load boundary"
              },
              {
                  "domain": "marginalization_identity_alignment",
                  "propagation_reach": "access to recognition, support, movement through social field",
                  "pacing_access": "feedback/support timing, institutional response rate",
                  "consolidation_growth": "safety, life stability, wellbeing, identity coherence",
                  "boundary": "misrecognition, masking, forced return, institutional gate"
              },
              {
                  "domain": "city_economy",
                  "propagation_reach": "resource flow, infrastructure reach, economic circulation",
                  "pacing_access": "governance response time, service rhythm, permitting tempo",
                  "consolidation_growth": "local stability, housing, schools, retained value",
                  "boundary": "tax capture, ownership leakage, jurisdictional boundary"
              }
          ]

          INPUT_COLUMNS = [
              "domain",
              "case_id",
              "boundary_or_group",
              "propagation_reach_value",
              "pacing_access_value",
              "consolidation_growth_value",
              "reference_or_expected_propagation",
              "reference_or_expected_pacing",
              "reference_or_expected_consolidation",
              "propagation_direction",
              "pacing_direction",
              "consolidation_direction",
              "notes",
              "source_or_dataset"
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def direction(value, ref):
              try:
                  value = float(value)
                  ref = float(ref)
                  if value > ref:
                      return "+"
                  if value < ref:
                      return "-"
                  return "0"
              except Exception:
                  return ""

          def classify(row):
              p = (row.get("propagation_direction") or direction(row.get("propagation_reach_value"), row.get("reference_or_expected_propagation"))).strip()
              t = (row.get("pacing_direction") or direction(row.get("pacing_access_value"), row.get("reference_or_expected_pacing"))).strip()
              c = (row.get("consolidation_direction") or direction(row.get("consolidation_growth_value"), row.get("reference_or_expected_consolidation"))).strip()
              sig = p + t + c if p and t and c else ""
              family_map = {
                  "++-": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low",
                  "-+-": "LRGxELG_z0p845_like_reach_low_pacing_high_growth_low",
                  "-++": "QSO_z1p48_like_reach_low_pacing_high_growth_high"
              }
              family = family_map.get(sig, "other_complete_shape" if sig else "incomplete_shape")
              return p, t, c, sig, family

          def read_inputs():
              rows = []
              for path in [
                  Path("data/cross_domain/cross_domain_shape_test_input.csv"),
                  Path("data/cross_domain/shape_test_input.csv"),
                  Path("data/reference/cross_domain_shape_test_input.csv")
              ]:
                  if path.exists():
                      with open(path, newline="", encoding="utf-8") as f:
                          for row in csv.DictReader(f):
                              row["_source_file"] = str(path)
                              rows.append(row)
              return rows

          write_csv(
              OUT / "v4_187_locked_cosmology_shape_signature.csv",
              LOCKED_COSMOLOGY_SHAPE,
              ["domain", "subdomain", "boundary_or_position", "propagation_reach_direction", "pacing_access_direction", "consolidation_growth_direction", "shape_signature", "plain_read", "source"]
          )

          (OUT / "v4_187_locked_cosmology_shape_signature.json").write_text(
              json.dumps({
                  "version": "v4.187",
                  "status": "locked_reference_signature_not_validation",
                  "signature": LOCKED_COSMOLOGY_SHAPE,
                  "shape_features": {
                      "radial_pacing_access_high_all_available_points": True,
                      "growth_low_in_LRGxELG_but_high_in_QSO": True,
                      "transverse_reach_mixed_or_twisted": True,
                      "block_diagonal_bridge_only": True
                  },
                  "blocked_claims": BLOCKED_CLAIMS
              }, indent=2),
              encoding="utf-8"
          )

          write_csv(
              OUT / "v4_187_cross_domain_role_translation_template.csv",
              ROLE_TRANSLATION,
              ["domain", "propagation_reach", "pacing_access", "consolidation_growth", "boundary"]
          )

          input_template = []
          for item in ROLE_TRANSLATION:
              if item["domain"] != "cosmology":
                  input_template.append({
                      "domain": item["domain"],
                      "case_id": "replace_with_case_or_group",
                      "boundary_or_group": "replace_with_boundary_or_group",
                      "propagation_reach_value": "",
                      "pacing_access_value": "",
                      "consolidation_growth_value": "",
                      "reference_or_expected_propagation": "",
                      "reference_or_expected_pacing": "",
                      "reference_or_expected_consolidation": "",
                      "propagation_direction": "optional + or - or 0",
                      "pacing_direction": "optional + or - or 0",
                      "consolidation_direction": "optional + or - or 0",
                      "notes": "do not claim unit equivalence",
                      "source_or_dataset": "replace with dataset or paper source"
                  })

          write_csv(OUT / "template_cross_domain_shape_test_input.csv", input_template, INPUT_COLUMNS)

          inputs = read_inputs()
          classified = []
          counts = {}
          matches = 0
          for row in inputs:
              p, t, c, sig, family = classify(row)
              match = sig in {"++-", "-+-", "-++"}
              if match:
                  matches += 1
              counts[family] = counts.get(family, 0) + 1
              classified.append({
                  "source_file": row.get("_source_file", ""),
                  "domain": row.get("domain", ""),
                  "case_id": row.get("case_id", ""),
                  "boundary_or_group": row.get("boundary_or_group", ""),
                  "propagation_direction_resolved": p,
                  "pacing_direction_resolved": t,
                  "consolidation_direction_resolved": c,
                  "shape_signature": sig,
                  "shape_family": family,
                  "direct_cosmology_signature_match": match,
                  "notes": row.get("notes", ""),
                  "source_or_dataset": row.get("source_or_dataset", "")
              })

          write_csv(
              OUT / "v4_187_cross_domain_shape_classification_results.csv",
              classified,
              ["source_file", "domain", "case_id", "boundary_or_group", "propagation_direction_resolved", "pacing_direction_resolved", "consolidation_direction_resolved", "shape_signature", "shape_family", "direct_cosmology_signature_match", "notes", "source_or_dataset"]
          )

          write_csv(
              OUT / "v4_187_cross_domain_shape_family_counts.csv",
              [{"shape_family": k, "count": v} for k, v in sorted(counts.items())],
              ["shape_family", "count"]
          )

          guardrails = [
              {"rule": "Move relational geometry, not raw numbers.", "meaning": "No unit equivalence across fields."},
              {"rule": "Name variables before testing.", "meaning": "Every domain needs propagation, pacing, consolidation, and boundary variables."},
              {"rule": "A match is a candidate structural rhyme.", "meaning": "It is not proof of shared cause."},
              {"rule": "A mismatch is useful.", "meaning": "It identifies where TAIRID translation fails or needs revision."},
              {"rule": "Covariance beats isolated signs.", "meaning": "Direction matching is a screen; coupled data is stronger."}
          ]
          write_csv(OUT / "v4_187_scaling_guardrails.csv", guardrails, ["rule", "meaning"])

          next_routes = [
              {"route": "neurotype_cross_domain_shape_input_builder", "why": "Most mature non-cosmology lane.", "needed_input": "ADHD/autism/dyslexia/aphantasia/bipolar/schizotypy summaries."},
              {"route": "aging_healing_shape_input_builder", "why": "Best repair/recovery comparison lane.", "needed_input": "aging and healing variables from public datasets."},
              {"route": "marginalization_alignment_shape_input_builder", "why": "Strong field-balance papers already exist.", "needed_input": "support/integration vs burden/misrecognition variables."},
              {"route": "city_economy_shape_input_builder", "why": "Useful for leakage, governance pacing, local consolidation.", "needed_input": "city finance, housing, schools, infrastructure variables."}
          ]
          write_csv(OUT / "v4_187_next_cross_domain_test_routes.csv", next_routes, ["route", "why", "needed_input"])

          if inputs:
              package_status = "cross_domain_input_rows_classified"
              selected_next_route = "cross_domain_shape_result_review_then_domain_specific_input_builder"
          else:
              package_status = "signature_locked_templates_written_no_cross_domain_input_found"
              selected_next_route = "neurotype_cross_domain_shape_input_builder_with_scope_guards"

          route_decision = {
              "version": "v4.187",
              "result_label": RESULT_LABEL,
              "clean_result": "The current cosmology shape was locked as a relational signature, and a cross-domain transfer harness was written.",
              "input_rows_found": len(inputs),
              "classified_rows": len(classified),
              "direct_cosmology_signature_matches": matches,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "shape-transfer harness only; no unit equivalence and no validation",
              "blocked_claims": BLOCKED_CLAIMS
          }
          (OUT / "v4_187_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")

          (OUT / "v4_187_scope_guards.json").write_text(json.dumps({
              "scope": "cross-domain relational shape lock and test harness only",
              "raw_numbers_moved_across_domains": False,
              "unit_equivalence_claimed": False,
              "cross_domain_validation_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")

          (OUT / "v4_187_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.187 - Cross-Domain Shape Signature Lock And Transfer Test Harness",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "The current cosmology geometry-growth shape was locked so it is not lost, then a cross-domain transfer harness was written.",
              "",
              "Locked shape:",
              "",
              "- LRGxELG z=0.70: `reach + / pacing + / growth -`",
              "- LRGxELG z=0.845: `reach - / pacing + / growth -`",
              "- QSO z=1.48: `reach - / pacing + / growth +`",
              "",
              "Package status: `" + package_status + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_187_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_187_locked_cosmology_shape_signature.csv",
              "v4_187_locked_cosmology_shape_signature.json",
              "v4_187_cross_domain_role_translation_template.csv",
              "template_cross_domain_shape_test_input.csv",
              "v4_187_cross_domain_shape_classification_results.csv",
              "v4_187_cross_domain_shape_family_counts.csv",
              "v4_187_scaling_guardrails.csv",
              "v4_187_next_cross_domain_test_routes.csv",
              "v4_187_route_decision.json",
              "v4_187_scope_guards.json",
              "v4_187_blocked_claims.json",
              "v4_187_summary.md"
          ]

          rules = {
              "version_is_v4_187": True,
              "result_label_present": RESULT_LABEL.endswith("no_cross_domain_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "locked_signature_has_three_points": len(LOCKED_COSMOLOGY_SHAPE) == 3,
              "no_raw_numbers_moved_across_domains": True,
              "no_unit_equivalence_claim": True,
              "no_cross_domain_validation_claim": True,
              "next_route_selected": bool(selected_next_route)
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.187",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "package_status": package_status,
              "input_rows_found": len(inputs),
              "classified_rows": len(classified),
              "selected_next_route": selected_next_route,
              "claim_boundary": "cross_domain_shape_harness_only_no_validation"
          }
          (OUT / "v4_187_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.187 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_187_outputs/run_v4_187.py

      - name: Upload v4.187 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-187-cross-domain-shape-signature-lock-and-transfer-test-harness-output
          path: tairid_v4_187_outputs/
