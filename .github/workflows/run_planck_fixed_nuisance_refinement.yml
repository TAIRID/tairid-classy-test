name: Run TAIRID Planck fixed nuisance refinement

on:
  workflow_dispatch:

jobs:
  run-planck-fixed-nuisance-refinement:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran libgsl-dev liblapack-dev libblas-dev python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel cython numpy scipy matplotlib pyyaml
          python -m pip install classy || python -m pip install classy-community
          python -m pip install cobaya

      - name: Run Planck fixed nuisance refinement
        run: |
          python run_tairid_planck_fixed_nuisance_refinement.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-planck-fixed-nuisance-refinement-output
          path: |
            planck_fixed_nuisance_refinement_outputs/**
