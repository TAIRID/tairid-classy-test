name: "!!! AAA CURRENT - TAIRID v4.374 official covariance source review ingest no support"

on:
  workflow_dispatch:

jobs:
  run-v4-374-official-covariance-source-review-ingest-no-support:
    name: "!!! AAA CURRENT - Run v4.374 official covariance source review ingest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.373 output ZIP and human-filled official source review ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.373 output ZIP..."
          INPUT_373_ZIP="$(ls tairid-v4-373-official-covariance-web-source-manifest-no-values-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_373_ZIP" ]; then
            echo "Could not find v4.373 output ZIP."
            echo "Expected:"
            echo "tairid-v4-373-official-covariance-web-source-manifest-no-values-no-support-output.zip"
            exit 1
          fi

          echo "Finding human-filled v4.373 official source review ZIP..."
          HUMAN_FILLED_OFFICIAL_SOURCE_REVIEW_ZIP="$(ls tairid-v4-373-human-filled-official-covariance-source-review-for-v4-374-no-values-no-support*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_OFFICIAL_SOURCE_REVIEW_ZIP" ]; then
            echo "Could not find human-filled official source review ZIP."
            echo "Expected:"
            echo "tairid-v4-373-human-filled-official-covariance-source-review-for-v4-374-no-values-no-support.zip"
            exit 1
          fi

          echo "Using v4.373 ZIP:"
          echo "$INPUT_373_ZIP"

          echo "Using human-filled review ZIP:"
          echo "$HUMAN_FILLED_OFFICIAL_SOURCE_REVIEW_ZIP"

          echo "INPUT_373_ZIP=$INPUT_373_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_OFFICIAL_SOURCE_REVIEW_ZIP=$HUMAN_FILLED_OFFICIAL_SOURCE_REVIEW_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.374 official source review ingest script
        run: |
          cat > run_v4_374_official_covariance_source_review_ingest_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "official covariance source review ingest only; official source candidates may be accepted for later download/header staging; no download attempted; no source file fetched; no exact covariance file staged; no covariance values loaded; no covariance dimensions confirmed; no observed-row order matched; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          ALLOWED_REVIEW_DECISIONS = {
              "accept_for_later_download_or_header_staging",
              "needs_better_source",
              "reject_source",
              "keep_blocked",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def main():
              input_373 = Path(os.environ["INPUT_373_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_OFFICIAL_SOURCE_REVIEW_ZIP"])

              outdir = Path("tairid_v4_374_official_covariance_source_review_ingest_no_values_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base373 = extract_zip(input_373, "tairid_v4_374_373_")
              basehuman = extract_zip(human_zip, "tairid_v4_374_human_")

              summary373_path = find_one(base373, "v4_373_summary.json")
              official_candidates_path = find_one(base373, "v4_373_official_covariance_source_candidates_NO_DOWNLOAD_NO_VALUES.csv")
              blank_review_path = find_one(base373, "v4_373_HUMAN_FILL_official_covariance_source_review_NO_VALUES_NO_SUPPORT.csv")
              manifest_summary_path = find_one(base373, "v4_373_source_manifest_summary_NO_VALUES.csv")
              next_gate_plan_path = find_one(base373, "v4_373_next_gate_plan_NO_VALUES_NO_SUPPORT.csv")
              limitations373_path = find_one(base373, "v4_373_limitations_after_official_source_manifest.csv")
              gap373_path = find_one(base373, "v4_373_gap_status_after_official_source_manifest.csv")
              web_needed_path = find_one(base373, "v4_373_input_v4_372_web_source_needed_rows_preserved.csv")
              prior_web_manifest_path = find_one(base373, "v4_373_input_v4_372_prior_web_manifest_preserved.csv")
              rules373_path = find_one(base373, "v4_373_rule_checks.csv")

              human_review_path = find_one_suffix(basehuman, "HUMAN_FILLED_official_covariance_source_review_NO_VALUES_NO_SUPPORT.csv")

              summary373 = json.loads(summary373_path.read_text())
              official_candidates = pd.read_csv(official_candidates_path)
              blank_review = pd.read_csv(blank_review_path)
              manifest_summary = pd.read_csv(manifest_summary_path)
              next_gate_plan = pd.read_csv(next_gate_plan_path)
              limitations373 = pd.read_csv(limitations373_path)
              gap373 = pd.read_csv(gap373_path)
              web_needed = pd.read_csv(web_needed_path)
              prior_web_manifest = pd.read_csv(prior_web_manifest_path)
              rules373 = pd.read_csv(rules373_path)
              human_review = pd.read_csv(human_review_path)

              for col in [
                  "human_official_source_review_decision",
                  "human_official_source_review_note",
                  "official_source_accepted_now",
              ]:
                  if col not in human_review.columns:
                      human_review[col] = ""

              ingest_rows = []

              for _, row in human_review.iterrows():
                  decision = clean(row["human_official_source_review_decision"])

                  if decision == "accept_for_later_download_or_header_staging":
                      row_status = "accepted_for_later_download_or_header_staging_no_values"
                      accepted_now = True
                  elif decision == "needs_better_source":
                      row_status = "blocked_needs_better_official_source"
                      accepted_now = False
                  elif decision == "reject_source":
                      row_status = "rejected_official_source_candidate"
                      accepted_now = False
                  elif decision == "keep_blocked":
                      row_status = "kept_blocked_no_download_or_staging"
                      accepted_now = False
                  else:
                      row_status = "invalid_or_missing_official_source_review_decision"
                      accepted_now = False

                  ingest_rows.append({
                      "v4_374_official_source_review_id": f"v4_374_official_source_review_{len(ingest_rows)+1:03d}",
                      "v4_373_official_source_id": clean(row["v4_373_official_source_id"]),
                      "source_label": clean(row["source_label"]),
                      "source_url": clean(row["source_url"]),
                      "source_type": clean(row["source_type"]),
                      "source_role": clean(row["source_role"]),
                      "priority": int(row["priority"]),
                      "candidate_for_exact_covariance": bool(row["candidate_for_exact_covariance"]),
                      "candidate_for_source_index": bool(row["candidate_for_source_index"]),
                      "human_official_source_review_decision": decision,
                      "human_official_source_review_note": clean(row["human_official_source_review_note"]),
                      "row_review_status": row_status,
                      "official_source_accepted_for_later_download_or_header_staging": bool(accepted_now),
                      "download_attempted": False,
                      "source_file_fetched": False,
                      "exact_covariance_file_staged": False,
                      "full_covariance_available": False,
                      "full_covariance_values_loaded": False,
                      "covariance_dimension_confirmed": False,
                      "observed_row_order_matched": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              review_ingest = pd.DataFrame(ingest_rows)

              accepted_sources = review_ingest[
                  review_ingest["official_source_accepted_for_later_download_or_header_staging"].astype(bool)
              ].copy()
              exact_covariance_candidates = accepted_sources[
                  accepted_sources["candidate_for_exact_covariance"].astype(bool)
              ].copy()
              source_index_candidates = accepted_sources[
                  accepted_sources["candidate_for_source_index"].astype(bool)
              ].copy()
              blocked_sources = review_ingest[
                  ~review_ingest["official_source_accepted_for_later_download_or_header_staging"].astype(bool)
              ].copy()
              invalid_rows = review_ingest[
                  review_ingest["row_review_status"] == "invalid_or_missing_official_source_review_decision"
              ].copy()

              download_staging_plan = accepted_sources.copy()
              download_staging_plan["next_staging_action"] = "later_download_or_header_staging_only_no_values"
              download_staging_plan["download_or_header_staging_priority"] = range(1, len(download_staging_plan) + 1)
              download_staging_plan["may_attempt_download_later"] = True
              download_staging_plan["download_attempted_now"] = False
              download_staging_plan["header_or_archive_listing_inspected_now"] = False
              download_staging_plan["covariance_values_loaded"] = False
              download_staging_plan["support_allowed"] = False

              source_review_summary = pd.DataFrame([
                  {
                      "summary_metric": "official_source_review_rows",
                      "value": int(len(review_ingest)),
                      "note": "All official source rows from v4.373 human review were ingested.",
                  },
                  {
                      "summary_metric": "accepted_official_source_rows",
                      "value": int(len(accepted_sources)),
                      "note": "Accepted only for later download/header staging review.",
                  },
                  {
                      "summary_metric": "accepted_exact_covariance_candidate_rows",
                      "value": int(len(exact_covariance_candidates)),
                      "note": "Accepted candidates that may contain exact covariance or likelihood archive material.",
                  },
                  {
                      "summary_metric": "accepted_source_index_candidate_rows",
                      "value": int(len(source_index_candidates)),
                      "note": "Accepted official index/directory candidates for fallback lookup.",
                  },
                  {
                      "summary_metric": "download_attempted_now",
                      "value": 0,
                      "note": "No download attempted in v4.374.",
                  },
                  {
                      "summary_metric": "support_allowed",
                      "value": 0,
                      "note": "No support claim is allowed.",
                  },
              ])

              limitation_update = pd.DataFrame([
                  {
                      "limit_id": "V4_374_LIMIT_001",
                      "limit": "Accepted official sources are not exact covariance approval.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_374_LIMIT_002",
                      "limit": "No official source archive is downloaded or staged in v4.374.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_374_LIMIT_003",
                      "limit": "No covariance values are loaded in v4.374.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_374_LIMIT_004",
                      "limit": "No covariance dimension or observed-row order match is confirmed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_374_LIMIT_005",
                      "limit": "No likelihood, p-values, score, or support claim is allowed.",
                      "status": "blocked_by_design",
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_374_GAP_001",
                      "gap": "Official source review ingested.",
                      "status_after_v4_374": "official_sources_accepted_for_later_download_or_header_staging_no_values",
                      "next_gate": "v4_375_official_source_download_or_header_staging_plan_no_values_no_support",
                  },
                  {
                      "gap_id": "V4_374_GAP_002",
                      "gap": "Exact covariance file remains unstaged.",
                      "status_after_v4_374": "still_open",
                      "next_gate": "later_download_or_header_staging_gate",
                  },
                  {
                      "gap_id": "V4_374_GAP_003",
                      "gap": "Covariance values remain unloaded.",
                      "status_after_v4_374": "still_blocked",
                      "next_gate": "later_after_archive_download_and_header_listing",
                  },
                  {
                      "gap_id": "V4_374_GAP_004",
                      "gap": "Covariance dimensions and observed-row order remain unconfirmed.",
                      "status_after_v4_374": "still_blocked",
                      "next_gate": "later_shape_and_order_gate",
                  },
                  {
                      "gap_id": "V4_374_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_374": "still_blocked",
                      "next_gate": "no_support_claims_allowed_from_v4_374",
                  },
              ])

              hard_checks = {
                  "input_v4_373_summary_found": summary373.get("version") == "v4.373",
                  "input_v4_373_rules_all_passed": summary_rules_all_passed(summary373),
                  "input_v4_373_failed_gates_none": summary373.get("failed_gates") == "none",
                  "input_v4_373_official_candidates_7": summary373.get("official_source_candidate_rows") == 7,
                  "input_v4_373_no_download_attempted": summary373.get("download_attempted") is False,
                  "input_v4_373_no_source_file_fetched": summary373.get("source_file_fetched") is False,
                  "input_v4_373_no_exact_file_staged": summary373.get("exact_covariance_file_staged") is False,
                  "input_v4_373_no_full_covariance": summary373.get("full_covariance_available") is False,
                  "input_v4_373_no_values_loaded": summary373.get("full_covariance_values_loaded") is False,
                  "input_v4_373_no_dimension_confirmed": summary373.get("covariance_dimension_confirmed") is False,
                  "input_v4_373_no_row_order": summary373.get("observed_row_order_matched") is False,
                  "input_v4_373_no_likelihood": summary373.get("likelihood_computed") is False,
                  "input_v4_373_no_p_values": summary373.get("p_values_computed") is False,
                  "input_v4_373_no_score_valid": summary373.get("score_valid") is False,
                  "input_v4_373_no_support_allowed": summary373.get("support_allowed") is False,

                  "rules373_all_passed": passed_column_all(rules373),
                  "official_candidates_rows_match_summary": len(official_candidates) == int(summary373.get("official_source_candidate_rows")),
                  "blank_review_rows_match_candidates": len(blank_review) == len(official_candidates),
                  "human_review_rows_match_candidates": len(human_review) == len(official_candidates),
                  "manifest_summary_rows_equal_5": len(manifest_summary) == 5,
                  "next_gate_plan_rows_equal_3": len(next_gate_plan) == 3,
                  "limitations373_rows_equal_5": len(limitations373) == 5,
                  "gap373_rows_equal_5": len(gap373) == 5,
                  "web_needed_rows_equal_2": len(web_needed) == 2,
                  "prior_web_manifest_rows_equal_2": len(prior_web_manifest) == 2,

                  "human_review_decisions_filled": human_review["human_official_source_review_decision"].apply(clean).ne("").all(),
                  "human_review_decisions_allowed": human_review["human_official_source_review_decision"].apply(clean).isin(ALLOWED_REVIEW_DECISIONS).all(),
                  "review_ingest_rows_equal_human_review": len(review_ingest) == len(human_review),
                  "accepted_sources_equal_7": len(accepted_sources) == 7,
                  "exact_covariance_candidates_at_least_5": len(exact_covariance_candidates) >= 5,
                  "source_index_candidates_at_least_2": len(source_index_candidates) >= 2,
                  "blocked_sources_equal_0": len(blocked_sources) == 0,
                  "invalid_rows_equal_0": len(invalid_rows) == 0,
                  "download_staging_plan_rows_equal_accepted": len(download_staging_plan) == len(accepted_sources),
                  "source_review_summary_rows_equal_6": len(source_review_summary) == 6,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_download_attempted": false_col(review_ingest, "download_attempted"),
                  "no_source_file_fetched": false_col(review_ingest, "source_file_fetched"),
                  "no_exact_covariance_file_staged": false_col(review_ingest, "exact_covariance_file_staged"),
                  "no_full_covariance_available": false_col(review_ingest, "full_covariance_available"),
                  "no_covariance_values_loaded": false_col(review_ingest, "full_covariance_values_loaded") and false_col(download_staging_plan, "covariance_values_loaded"),
                  "no_covariance_dimension_confirmed": false_col(review_ingest, "covariance_dimension_confirmed"),
                  "no_observed_row_order_matched": false_col(review_ingest, "observed_row_order_matched"),
                  "no_likelihood_computed": false_col(review_ingest, "likelihood_computed"),
                  "no_p_values_computed": false_col(review_ingest, "p_values_computed"),
                  "no_score_valid": false_col(review_ingest, "score_valid"),
                  "no_support_allowed": false_col(review_ingest, "support_allowed") and false_col(download_staging_plan, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary374 = {
                  "version": "v4.374",
                  "route_name": "v4_374_official_covariance_source_review_ingest_no_values_no_support_claims",
                  "expected_result": "v4_374_official_covariance_source_review_ingest_passed_sources_accepted_no_download_no_values_no_support_claims",
                  "input_version": "v4.373",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "official_source_review_rows": int(len(review_ingest)),
                  "accepted_official_source_rows": int(len(accepted_sources)),
                  "accepted_exact_covariance_candidate_rows": int(len(exact_covariance_candidates)),
                  "accepted_source_index_candidate_rows": int(len(source_index_candidates)),
                  "download_attempted": False,
                  "source_file_fetched": False,
                  "exact_covariance_file_staged": False,
                  "full_covariance_available": False,
                  "full_covariance_values_loaded": False,
                  "covariance_dimension_confirmed": False,
                  "observed_row_order_matched": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "v4_375_official_source_download_or_header_staging_plan_no_values_no_support_claims",
              }

              review_ingest.to_csv(outdir / "v4_374_official_source_review_ingest_ledger_NO_VALUES_NO_SUPPORT.csv", index=False)
              accepted_sources.to_csv(outdir / "v4_374_ACCEPTED_official_sources_FOR_LATER_DOWNLOAD_OR_HEADER_STAGING_NO_VALUES.csv", index=False)
              exact_covariance_candidates.to_csv(outdir / "v4_374_ACCEPTED_exact_covariance_archive_candidates_NO_VALUES.csv", index=False)
              source_index_candidates.to_csv(outdir / "v4_374_ACCEPTED_source_index_candidates_NO_VALUES.csv", index=False)
              download_staging_plan.to_csv(outdir / "v4_374_download_or_header_staging_plan_NO_VALUES_NO_SUPPORT.csv", index=False)
              source_review_summary.to_csv(outdir / "v4_374_source_review_summary_NO_VALUES.csv", index=False)
              limitation_update.to_csv(outdir / "v4_374_limitations_after_official_source_review.csv", index=False)
              gap_update.to_csv(outdir / "v4_374_gap_status_after_official_source_review.csv", index=False)
              human_review.to_csv(outdir / "v4_374_input_human_filled_official_source_review_preserved.csv", index=False)
              official_candidates.to_csv(outdir / "v4_374_input_v4_373_official_candidates_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_374_rule_checks.csv", index=False)

              (outdir / "v4_374_summary.json").write_text(json.dumps(summary374, indent=2))

              summary_md = f"""# TAIRID v4.374 Official Covariance Source Review Ingest — No Values, No Support Claims

          Expected result: `{summary374["expected_result"]}`

          {summary374["rules_passed"]} / {summary374["rules_total"]} rules passed

          failed_gates = {summary374["failed_gates"]}

          official_source_review_rows = {summary374["official_source_review_rows"]}

          accepted_official_source_rows = {summary374["accepted_official_source_rows"]}

          accepted_exact_covariance_candidate_rows = {summary374["accepted_exact_covariance_candidate_rows"]}

          accepted_source_index_candidate_rows = {summary374["accepted_source_index_candidate_rows"]}

          download_attempted = false

          source_file_fetched = false

          exact_covariance_file_staged = false

          full_covariance_available = false

          full_covariance_values_loaded = false

          covariance_dimension_confirmed = false

          observed_row_order_matched = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step ingests official-source review decisions only.

          It does **not** download or stage source files.

          It does **not** load covariance values.

          It does **not** confirm covariance dimensions or observed-row order.

          It does **not** compute likelihood or p-values.

          It does **not** make support claims.

          Next route: `{summary374["selected_next_route"]}`
          """
              (outdir / "v4_374_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary374, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_374_official_covariance_source_review_ingest_no_support.py

      - name: Run v4.374 official covariance source review ingest no support
        run: |
          python run_v4_374_official_covariance_source_review_ingest_no_support.py

      - name: Upload v4.374 official covariance source review ingest artifact
        uses: actions/upload-artifact@v4
        with:
