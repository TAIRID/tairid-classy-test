          def matrix_rank(matrix, tol=1e-14):
              rows = [[float(x) for x in row] for row in matrix]
              if not rows:
                  return 0
              m = len(rows)
              n = len(rows[0])
              rank = 0
              col = 0
              while rank < m and col < n:
                  pivot = None
                  pivot_abs = tol
                  for r in range(rank, m):
                      value_abs = abs(rows[r][col])
                      if value_abs > pivot_abs:
                          pivot_abs = value_abs
                          pivot = r
                  if pivot is None:
                      col += 1
                      continue
                  rows[rank], rows[pivot] = rows[pivot], rows[rank]
                  pivot_value = rows[rank][col]
                  rows[rank] = [x / pivot_value for x in rows[rank]]
                  for r in range(m):
                      if r != rank:
                          factor = rows[r][col]
                          if abs(factor) > tol:
                              rows[r] = [rv - factor * pv for rv, pv in zip(rows[r], rows[rank])]
                  rank += 1
                  col += 1
              return rank

          def compute_weighted_mechanics(output_rows, vector_key="target_vector_10"):
              clean_rows = []
              for row in output_rows:
                  try:
                      weight = float(row.get("sample_weight", 0.0))
                      vector = [float(x) for x in row.get(vector_key, [])]
                      if weight > 0 and len(vector) == 10 and all(math.isfinite(x) and x > 0 for x in vector):
                          clean_rows.append((weight, vector, row))
                  except Exception:
                      continue

              if not clean_rows:
                  return {
                      "ok": False,
                      "weights": [],
                      "vectors": [],
                      "mean": [],
                      "covariance": [],
                      "fsigma8_mean": [],
                      "fsigma8_covariance": [],
                      "effective_sample_size": 0.0,
                      "weight_sum": 0.0,
                      "rank_full": 0,
                      "rank_fsigma8": 0,
                      "symmetry_max_abs_error_full": "",
                      "symmetry_max_abs_error_fsigma8": "",
                      "diag_min_full": "",
                      "diag_min_fsigma8": ""
                  }

              weights = [row[0] for row in clean_rows]
              vectors = [row[1] for row in clean_rows]
              weight_sum = sum(weights)
              probs = [w / weight_sum for w in weights]
              dim = 10
              mean = [sum(p * v[j] for p, v in zip(probs, vectors)) for j in range(dim)]
              cov = []
              for j in range(dim):
                  row_vals = []
                  for k in range(dim):
                      val = sum(p * (v[j] - mean[j]) * (v[k] - mean[k]) for p, v in zip(probs, vectors))
                      row_vals.append(val)
                  cov.append(row_vals)

              # Symmetrize for numerical hygiene.
              cov_sym = []
              symmetry_max = 0.0
              for j in range(dim):
                  row_vals = []
                  for k in range(dim):
                      symmetry_max = max(symmetry_max, abs(cov[j][k] - cov[k][j]))
                      row_vals.append((cov[j][k] + cov[k][j]) / 2.0)
                  cov_sym.append(row_vals)

              fs_idx = [1, 3, 5, 7, 9]
              fs_mean = [mean[i] for i in fs_idx]
              fs_cov = [[cov_sym[i][j] for j in fs_idx] for i in fs_idx]

              fs_symmetry_max = 0.0
              for j in range(len(fs_idx)):
                  for k in range(len(fs_idx)):
                      fs_symmetry_max = max(fs_symmetry_max, abs(fs_cov[j][k] - fs_cov[k][j]))

              ess = (weight_sum * weight_sum / sum(w * w for w in weights)) if weights and sum(w * w for w in weights) > 0 else 0.0

              return {
                  "ok": True,
                  "weights": weights,
                  "vectors": vectors,
                  "mean": mean,
                  "covariance": cov_sym,
                  "fsigma8_mean": fs_mean,
                  "fsigma8_covariance": fs_cov,
                  "effective_sample_size": ess,
                  "weight_sum": weight_sum,
                  "rank_full": matrix_rank(cov_sym),
                  "rank_fsigma8": matrix_rank(fs_cov),
                  "symmetry_max_abs_error_full": symmetry_max,
                  "symmetry_max_abs_error_fsigma8": fs_symmetry_max,
                  "diag_min_full": min(cov_sym[i][i] for i in range(dim)),
                  "diag_min_fsigma8": min(fs_cov[i][i] for i in range(len(fs_idx)))
              }

          mechanics = compute_weighted_mechanics(sample_output_vectors)

          mean_vector_records = []
          covariance_matrix_records = []
          fsigma8_mean_vector_records = []
          fsigma8_covariance_records = []

