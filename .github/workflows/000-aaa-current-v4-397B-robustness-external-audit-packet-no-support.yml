name: "!!! AAA CURRENT - TAIRID v4.397B robustness external audit packet no support"

on:
  workflow_dispatch:

jobs:
  run-v4-397B-robustness-external-audit-packet-no-support:
    name: "!!! AAA CURRENT - Run v4.397B robustness external audit packet"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.396B input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.396B output ZIP by pattern..."
          INPUT_396B_ZIP="$(ls tairid-v4-396B-alternate-full-covariance-chi-square-dry-run-comparison-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_396B_ZIP" ]; then
            echo "Could not find v4.396B output ZIP."
            echo "Expected:"
            echo "tairid-v4-396B-alternate-full-covariance-chi-square-dry-run-comparison-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.396B ZIP:"
          echo "$INPUT_396B_ZIP"
          echo "INPUT_396B_ZIP=$INPUT_396B_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.397B robustness external audit packet script
        run: |
          cat > run_v4_397B_robustness_external_audit_packet_no_support.py <<'PY'
          #!/usr/bin/env python3
          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd
          
          CLAIM_BOUNDARY = "robustness external audit packet only; primary and alternate full-covariance chi-square dry-run comparison may be audited; no new chi-square computed; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"
          
          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)
          
              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass
          
              return tmp
          
          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]
          
          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()
          
          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()
          
          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False
          
          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()
          
          def main():
              input_396 = Path(os.environ["INPUT_396B_ZIP"])
          
              outdir = Path("tairid_v4_397B_robustness_external_audit_packet_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)
          
              base396 = extract_zip(input_396, "tairid_v4_397B_396B_")
          
              summary396_path = find_one(base396, "v4_396B_summary.json")
              alt_summary_path = find_one(base396, "v4_396B_alternate_full_covariance_chi_square_summary_NO_SUPPORT.csv")
              alt_terms_path = find_one(base396, "v4_396B_alternate_full_covariance_chi_square_terms_NO_SUPPORT.csv")
              inv_cov_path = find_one(base396, "v4_396B_alternate_inverse_covariance_matrices_NO_SUPPORT.csv")
              audit_staging_path = find_one(base396, "v4_396B_external_audit_staging_packet_NO_SUPPORT.csv")
              gap396_path = find_one(base396, "v4_396B_gap_status_after_robustness_comparison.csv")
              primary_terms_path = find_one(base396, "v4_396B_input_v4_389_primary_terms_preserved.csv")
              residual_path = find_one(base396, "v4_396B_input_v4_389_residual_vector_preserved.csv")
              alt_values_path = find_one(base396, "v4_396B_input_v4_395B_alternate_subblock_values_preserved.csv")
              limitations396_path = find_one(base396, "v4_396B_limitations_after_robustness_comparison.csv")
              comparison_path = find_one(base396, "v4_396B_primary_plus_alternate_chi_square_comparison_NO_SUPPORT.csv")
              band_path = find_one(base396, "v4_396B_robustness_chi_square_band_summary_NO_SUPPORT.csv")
              robustness_summary_path = find_one(base396, "v4_396B_robustness_comparison_summary_NO_SUPPORT.csv")
              route_status396_path = find_one(base396, "v4_396B_route_status_summary.csv")
              rules396_path = find_one(base396, "v4_396B_rule_checks.csv")
          
              summary396 = json.loads(summary396_path.read_text())
              alt_summary = pd.read_csv(alt_summary_path)
              alt_terms = pd.read_csv(alt_terms_path)
              inv_cov = pd.read_csv(inv_cov_path)
              audit_staging = pd.read_csv(audit_staging_path)
              gap396 = pd.read_csv(gap396_path)
              primary_terms = pd.read_csv(primary_terms_path)
              residual = pd.read_csv(residual_path)
              alt_values = pd.read_csv(alt_values_path)
              limitations396 = pd.read_csv(limitations396_path)
              comparison = pd.read_csv(comparison_path)
              band = pd.read_csv(band_path)
              robustness_summary = pd.read_csv(robustness_summary_path)
              route_status396 = pd.read_csv(route_status396_path)
              rules396 = pd.read_csv(rules396_path)
          
              primary = float(summary396["primary_dM_Hz_chi_square_dry_run_sum"])
              diagonal = float(summary396["prior_guarded_diagonal_chi_square_sum"])
              min_chi = float(summary396["robustness_min_chi_square"])
              max_chi = float(summary396["robustness_max_chi_square"])
              width = float(summary396["robustness_chi_square_range_width"])
              final_dv = float(summary396["final_consensus_dV_FAP_chi_square"])
              fs_cons = float(summary396["fs_consensus_chi_square"])
          
              audit_findings = pd.DataFrame([
                  {
                      "finding_id": "V4_397B_FINDING_001",
                      "finding": "v4.396B computed an alternate covariance chi-square robustness comparison.",
                      "evidence": f"alternate_chi_square_rows={summary396['alternate_chi_square_rows']}; primary_plus_alternate_comparison_rows={summary396['primary_plus_alternate_comparison_rows']}",
                      "truth_boundary_status": "preserved",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_397B_FINDING_002",
                      "finding": "The primary dM_Hz_fsig covariance-corrected dry-run chi-square is preserved.",
                      "evidence": f"primary_dM_Hz_chi_square_dry_run_sum={primary}",
                      "truth_boundary_status": "diagnostic_only",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_397B_FINDING_003",
                      "finding": "The prior guarded diagonal chi-square remains separately preserved.",
                      "evidence": f"prior_guarded_diagonal_chi_square_sum={diagonal}",
                      "truth_boundary_status": "diagnostic_only",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_397B_FINDING_004",
                      "finding": "The robustness band is narrow across the primary and preserved alternate covariance candidates.",
                      "evidence": f"min={min_chi}; max={max_chi}; range_width={width}",
                      "truth_boundary_status": "diagnostic_only_no_inference",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_397B_FINDING_005",
                      "finding": "The final_consensus dV_FAP_fsig dry-run chi-square matches the primary dM_Hz_fsig dry-run value in this packet.",
                      "evidence": f"final_consensus_dV_FAP_chi_square={final_dv}; primary_dM_Hz_chi_square_dry_run_sum={primary}",
                      "truth_boundary_status": "comparison_only",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_397B_FINDING_006",
                      "finding": "The FS_consensus robustness candidate yields a lower dry-run chi-square than the primary final_consensus value.",
                      "evidence": f"fs_consensus_chi_square={fs_cons}; primary={primary}",
                      "truth_boundary_status": "comparison_only_no_support",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_397B_FINDING_007",
                      "finding": "No likelihood, p-values, validated score, or support claim is allowed.",
                      "evidence": "likelihood_computed=false; p_values_computed=false; score_valid=false; support_allowed=false",
                      "truth_boundary_status": "preserved",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_397B_FINDING_008",
                      "finding": "The packet is ready for external robustness audit before any cautious diagnostic writeup.",
                      "evidence": "selected_next_route=v4_397B_robustness_external_audit_packet_no_support_claims from v4.396B",
                      "truth_boundary_status": "audit_ready_no_support",
                      "support_allowed": False,
                  },
              ])
          
              audit_questions = pd.DataFrame([
                  {
                      "audit_question_id": "AI_AUDIT_001",
                      "question": "Did v4.397B preserve the truth boundary?",
                      "expected_answer": "Yes. This is an external audit packet for robustness comparison only; no likelihood, p-values, score_valid, or support claim is allowed.",
                      "evidence_files": "EXTERNAL_AI_AUDIT_README_v4_397B.md|v4_397B_summary.json|v4_397B_rule_checks.csv",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_002",
                      "question": "Did any file claim TAIRID support?",
                      "expected_answer": "No. support_allowed=false is preserved and support claims are ruled out.",
                      "evidence_files": "v4_397B_guarded_robustness_findings_NO_SUPPORT.csv|v4_397B_ruled_out_and_open_gaps.csv",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_003",
                      "question": "Did the packet compute likelihood or p-values?",
                      "expected_answer": "No. v4.396B computed chi-square dry-run comparisons only. Likelihood and p-values remain false.",
                      "evidence_files": "v4_396B_summary.json|v4_397B_summary.json",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_004",
                      "question": "Did the packet correctly preserve the primary and alternate covariance chi-square values?",
                      "expected_answer": "Yes. It preserves primary dM_Hz, final_consensus dV_FAP, FS_consensus, diagonal reference, and robustness-band values.",
                      "evidence_files": "v4_396B_primary_plus_alternate_chi_square_comparison_NO_SUPPORT.csv|v4_396B_robustness_chi_square_band_summary_NO_SUPPORT.csv",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_005",
                      "question": "What is the strongest honest conclusion?",
                      "expected_answer": "A robustness comparison dry run was computed for primary and alternate covariance candidates. The chi-square dry-run values remain in a narrow band, but this is not a likelihood, p-value, validated score, or support claim.",
                      "evidence_files": "EXTERNAL_AI_AUDIT_README_v4_397B.md|v4_397B_guarded_robustness_findings_NO_SUPPORT.csv",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_006",
                      "question": "What is the strongest honest criticism?",
                      "expected_answer": "This remains a three-row BOSS DR12 diagnostic and robustness comparison, not a full likelihood or broader multi-survey validation.",
                      "evidence_files": "v4_397B_ruled_out_and_open_gaps.csv|v4_397B_limitations_for_external_audit.csv",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_007",
                      "question": "What should the next gate be?",
                      "expected_answer": "External AI audit, then v4.398B audit-response ingest or v4.398A cautious diagnostic writeup packet with no support claims.",
                      "evidence_files": "v4_397B_summary.json|v4_397B_next_route_options.csv",
                  },
              ])
          
              ruled_out_open_gaps = pd.DataFrame([
                  {
                      "item_id": "V4_397B_RULED_OUT_001",
                      "item_type": "ruled_out_claim",
                      "item": "TAIRID is supported by the SDSS/BOSS RSD covariance-repaired diagnostic.",
                      "status": "blocked",
                      "reason": "support_allowed=false; no support interpretation gate has been run.",
                  },
                  {
                      "item_id": "V4_397B_RULED_OUT_002",
                      "item_type": "ruled_out_claim",
                      "item": "The robustness comparison is a likelihood or p-value result.",
                      "status": "blocked",
                      "reason": "likelihood_computed=false and p_values_computed=false.",
                  },
                  {
                      "item_id": "V4_397B_RULED_OUT_003",
                      "item_type": "ruled_out_claim",
                      "item": "score_valid has been validated.",
                      "status": "blocked",
                      "reason": "score_valid=false in v4.396B and v4.397B.",
                  },
                  {
                      "item_id": "V4_397B_OPEN_GAP_001",
                      "item_type": "open_gap",
                      "item": "External robustness audit remains to be completed.",
                      "status": "open",
                      "reason": "v4.397B creates the audit packet only.",
                  },
                  {
                      "item_id": "V4_397B_OPEN_GAP_002",
                      "item_type": "open_gap",
                      "item": "Cautious diagnostic writeup remains deferred until audit response ingest.",
                      "status": "open",
                      "reason": "Robustness result should be externally audited before writeup.",
                  },
                  {
                      "item_id": "V4_397B_OPEN_GAP_003",
                      "item_type": "open_gap",
                      "item": "Broader survey expansion remains open.",
                      "status": "open",
                      "reason": "The current diagnostic still uses three BOSS DR12 redshift rows only.",
                  },
              ])
          
              stage_ledger = pd.DataFrame([
                  {
                      "stage": "v4.389",
                      "status": "completed_guarded",
                      "what_happened": "Primary dM_Hz_fsig covariance-corrected chi-square dry run computed.",
                      "truth_boundary": "No likelihood, no p-values, score_valid=false, support_allowed=false.",
                  },
                  {
                      "stage": "v4.390",
                      "status": "completed_audit_packet",
                      "what_happened": "External audit packet created for the primary covariance-corrected diagnostic.",
                      "truth_boundary": "No support claim allowed.",
                  },
                  {
                      "stage": "v4.391",
                      "status": "completed_audit_response_ingest",
                      "what_happened": "Gemini and DeepSeek audit responses ingested as clean.",
                      "truth_boundary": "No interpretation claim allowed.",
                  },
                  {
                      "stage": "v4.392",
                      "status": "completed_route_decision",
                      "what_happened": "Robustness lane selected before cautious writeup.",
                      "truth_boundary": "No new chi-square and no support claim.",
                  },
                  {
                      "stage": "v4.393B-v4.395B",
                      "status": "completed_robustness_preparation",
                      "what_happened": "Alternate covariance candidates selected, extracted, integrity checked, and row-order checked.",
                      "truth_boundary": "No chi-square until v4.396B.",
                  },
                  {
                      "stage": "v4.396B",
                      "status": "completed_guarded",
                      "what_happened": "Alternate full-covariance chi-square dry-run comparison computed.",
                      "truth_boundary": "No likelihood, no p-values, score_valid=false, support_allowed=false.",
                  },
                  {
                      "stage": "v4.397B",
                      "status": "audit_packet_created",
                      "what_happened": "Robustness external audit packet created.",
                      "truth_boundary": CLAIM_BOUNDARY,
                  },
              ])
          
              limitations = pd.DataFrame([
                  {"limit_id": "V4_397B_LIMIT_001", "limit": "This is a robustness audit packet, not a support interpretation.", "status": "active_limit"},
                  {"limit_id": "V4_397B_LIMIT_002", "limit": "Chi-square dry-run comparisons are not likelihoods or p-values.", "status": "active_limit"},
                  {"limit_id": "V4_397B_LIMIT_003", "limit": "The diagnostic still uses only three BOSS DR12 f_sigma8 rows.", "status": "active_limit"},
                  {"limit_id": "V4_397B_LIMIT_004", "limit": "No multi-survey likelihood or broader covariance model has been run.", "status": "open_limit"},
                  {"limit_id": "V4_397B_LIMIT_005", "limit": "No support claim is allowed.", "status": "blocked_by_design"},
              ])
          
              next_route_options = pd.DataFrame([
                  {
                      "route_id": "V4_397B_NEXT_001",
                      "route": "external_ai_audit_then_v4_398B_audit_response_ingest",
                      "recommendation": "primary",
                      "reason": "Audit the robustness packet before writeup.",
                      "support_allowed": False,
                  },
                  {
                      "route_id": "V4_397B_NEXT_002",
                      "route": "v4_398A_cautious_diagnostic_writeup_packet_no_support",
                      "recommendation": "after_audit_response",
                      "reason": "A bounded writeup can be prepared after robustness audit is clean.",
                      "support_allowed": False,
                  },
                  {
                      "route_id": "V4_397B_NEXT_003",
                      "route": "broader_source_expansion_lane",
                      "recommendation": "later",
                      "reason": "Broader observed-source coverage is needed before stronger scientific interpretation.",
                      "support_allowed": False,
                  },
              ])
          
              readme = f"""# TAIRID v4.397B External AI Audit Packet — Robustness Comparison, No Support Claims
          
          ## Truth boundary
          
          {CLAIM_BOUNDARY}
          
          ## Key values to audit
          
          prior_guarded_diagonal_chi_square_sum = {diagonal}
          
          primary_dM_Hz_chi_square_dry_run_sum = {primary}
          
          final_consensus_dV_FAP_chi_square = {final_dv}
          
          fs_consensus_chi_square = {fs_cons}
          
          robustness_min_chi_square = {min_chi}
          
          robustness_max_chi_square = {max_chi}
          
          robustness_chi_square_range_width = {width}
          
          alternate_chi_square_rows = {summary396["alternate_chi_square_rows"]}
          
          primary_plus_alternate_comparison_rows = {summary396["primary_plus_alternate_comparison_rows"]}
          
