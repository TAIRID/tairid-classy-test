                  "input_likelihood_false": summary396.get("likelihood_computed") is False,
                  "input_p_values_false": summary396.get("p_values_computed") is False,
                  "input_score_valid_false": summary396.get("score_valid") is False,
                  "input_support_allowed_false": summary396.get("support_allowed") is False,
          
                  "rules396_all_passed": passed_column_all(rules396),
