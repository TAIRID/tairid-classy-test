name: Run TAIRID combined Planck evaluate probe

on:
  workflow_dispatch:

jobs:
  run-combined-planck-evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran libgsl-dev liblapack-dev libblas-dev python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel cython numpy scipy matplotlib pyyaml
          python -m pip install classy || python -m pip install classy-community
          python -m pip install cobaya

      - name: Run combined Planck evaluate probe
        run: |
          python run_tairid_combined_planck_evaluate.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-combined-planck-evaluate-output
          path: |
            combined_planck_evaluate_outputs/**
