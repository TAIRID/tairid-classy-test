                  "model_label": pred["model_label"],
                  "redshift": pred["redshift"],
                  "quantity": "f_sigma8",
                  "predicted_value": pred["predicted_fsigma8"],
                  "prediction_source_or_method": "fixed_flat_LCDM_guard_v4_267_internal_reference; Omega_m0=0.3153; sigma8_0=0.8111; flat_GR_growth_integral; not_fit_to_Zhao",
                  "parameter_status": "fixed_before_residual_scoring_not_fit_to_zhao",
                  "approval_status": "reference_candidate_not_scored",
              })

          calculator_validation_rows = [
              {
                  "validation_id": "calc_001",
                  "check": "fixed_parameters_present",
                  "status": "passed",
                  "detail": "Omega_m0, Omega_Lambda0, sigma8_0, and deterministic growth rule are present.",
              },
              {
                  "validation_id": "calc_002",
                  "check": "prediction_rows_equal_4",
                  "status": "passed" if len(lcdm_prediction_rows) == 4 else "failed",
                  "detail": f"prediction rows = {len(lcdm_prediction_rows)}",
              },
              {
                  "validation_id": "calc_003",
                  "check": "predictions_finite_positive",
                  "status": "passed" if all(math.isfinite(row["predicted_fsigma8"]) and 0.0 < row["predicted_fsigma8"] < 2.0 for row in lcdm_prediction_rows) else "failed",
                  "detail": "all predicted f_sigma8 values finite and positive under loose guard",
              },
              {
                  "validation_id": "calc_004",
                  "check": "not_fit_to_zhao",
                  "status": "passed" if all(row["parameter_status"] != "fit_to_zhao_in_this_workflow" for row in reference_manifest_lcdm_rows) else "failed",
                  "detail": "reference rows are marked fixed before residual scoring, not fit to Zhao",
