          route_decision_rows = [
              {"route_id": "route_001", "route": "zhao_reference_manifest_validator_with_lcdm_predictions_no_scoring", "permission_status": "recommended", "reason": "Reference predictions now exist and need schema/scope validation."},
              {"route_id": "route_002", "route": "zhao_inverse_covariance_guard", "permission_status": "blocked_until_reference_validates", "reason": "Covariance inverse should be checked after reference validation."},
              {"route_id": "route_003", "route": "zhao_residual_preview_guard", "permission_status": "blocked", "reason": "Reference manifest has not passed validator yet."},
              {"route_id": "route_004", "route": "external_observed_residual_scoring", "permission_status": "blocked", "reason": "No scoring guard has passed."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.267 is enough history for consolidation if needed."},
          ]

          next_rows = [
              {"priority": 1, "test_id": "v4_268_zhao_reference_manifest_validator_with_lcdm_predictions_no_scoring", "purpose": "validate numeric reference manifest without residuals or scoring", "activated": True},
