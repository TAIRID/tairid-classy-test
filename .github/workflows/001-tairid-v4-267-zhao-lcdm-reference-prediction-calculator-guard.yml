          )
          source_selection_status_rows, source_selection_input_rows = read_manifest_status(
              SOURCE_SELECTION_CANDIDATES, REQUIRED_SOURCE_SELECTION_COLUMNS, "source_selection"
          )

          zhao_observed_rows = [
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_0_978",
                  "redshift": 0.978,
                  "quantity": "f_sigma8",
                  "observed_value": 0.379,
                  "sigma": 0.176,
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_23",
                  "redshift": 1.230,
                  "quantity": "f_sigma8",
                  "observed_value": 0.385,
                  "sigma": 0.099,
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_526",
                  "redshift": 1.526,
                  "quantity": "f_sigma8",
                  "observed_value": 0.342,
                  "sigma": 0.070,
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_944",
                  "redshift": 1.944,
                  "quantity": "f_sigma8",
                  "observed_value": 0.364,
                  "sigma": 0.106,
              },
          ]

          # Fixed calculator-guard parameters.
          # This is a frozen internal flat-LCDM-style reference baseline for software/testing continuity.
          # It is not a current-best-parameter claim and is not fitted to Zhao.
          OMEGA_M0 = 0.3153
          SIGMA8_0 = 0.8111
          OMEGA_L0 = 1.0 - OMEGA_M0

          def E_of_a(a):
              return math.sqrt(OMEGA_M0 / (a ** 3) + OMEGA_L0)

          def growth_unnormalized(a, base_steps=24000):
              eps = 1.0e-5
              if a <= eps:
                  return a
              steps = max(400, int(base_steps * a))
              h = (a - eps) / steps
              def integrand(x):
                  return 1.0 / ((x ** 3) * (E_of_a(x) ** 3))
              total = 0.5 * (integrand(eps) + integrand(a))
              for k in range(1, steps):
                  total += integrand(eps + k * h)
              integral = total * h
              return 2.5 * OMEGA_M0 * E_of_a(a) * integral

          D1 = growth_unnormalized(1.0)

          def D_of_a(a):
              return growth_unnormalized(a) / D1

          def f_growth(a):
              h = 1.0e-4
              amin = a * math.exp(-h)
              aplus = min(1.0, a * math.exp(h))
              if aplus == amin:
                  return 0.0
              return (math.log(D_of_a(aplus)) - math.log(D_of_a(amin))) / (math.log(aplus) - math.log(amin))

          fixed_parameter_rows = [
              {
                  "parameter_id": "param_001",
                  "parameter": "Omega_m0",
                  "value": OMEGA_M0,
                  "source_label": "fixed_flat_LCDM_guard_v4_267_internal_reference_not_fit_to_zhao",
                  "parameter_status": "fixed_before_residual_scoring_not_fit_to_zhao",
              },
              {
                  "parameter_id": "param_002",
                  "parameter": "Omega_Lambda0",
                  "value": OMEGA_L0,
                  "source_label": "flatness_closure_1_minus_Omega_m0",
                  "parameter_status": "derived_from_fixed_Omega_m0_not_fit_to_zhao",
              },
              {
                  "parameter_id": "param_003",
                  "parameter": "sigma8_0",
                  "value": SIGMA8_0,
                  "source_label": "fixed_flat_LCDM_guard_v4_267_internal_reference_not_fit_to_zhao",
                  "parameter_status": "fixed_before_residual_scoring_not_fit_to_zhao",
              },
              {
                  "parameter_id": "param_004",
                  "parameter": "growth_rule",
                  "value": "flat_LCDM_GR_integral_growth_factor_normalized_D_a1_equals_1",
                  "source_label": "deterministic_calculator_guard",
                  "parameter_status": "parameter_free_given_Omega_m0_sigma8_0",
              },
          ]

          lcdm_prediction_rows = []
          for row in zhao_observed_rows:
              z = float(row["redshift"])
              a = 1.0 / (1.0 + z)
              D = D_of_a(a)
              f = f_growth(a)
              fs8 = f * SIGMA8_0 * D
              lcdm_prediction_rows.append({
                  "prediction_id": "pred_" + row["observed_id"],
                  "observed_id": row["observed_id"],
                  "redshift": z,
                  "scale_factor": a,
                  "D_normalized": D,
                  "f_growth": f,
                  "sigma8_z": SIGMA8_0 * D,
                  "predicted_fsigma8": fs8,
                  "model_family": "published_LCDM_or_survey_reference",
                  "model_label": "fixed_flat_LCDM_guard_v4_267_internal_reference",
                  "prediction_status": "computed_reference_candidate_not_scored",
              })

          reference_manifest_lcdm_rows = []
          for pred in lcdm_prediction_rows:
              reference_manifest_lcdm_rows.append({
                  "reference_id": "ref_" + pred["observed_id"],
