name: 001 TAIRID v4.267 - Zhao LCDM Reference Prediction Calculator Guard

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-267-zhao-lcdm-reference-prediction-calculator-guard.yml"
      - "data/cosmology/zhao_reference_model_manifest.csv"
      - "zhao_reference_model_manifest.csv"
      - "data/cosmology/zhao_reference_source_selection.csv"
      - "zhao_reference_source_selection.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-lcdm-reference-prediction-calculator-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.267 Zhao LCDM Reference Prediction Calculator Guard is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.267 Zhao LCDM reference prediction calculator guard
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.267"
          ROUTE = "zhao_lcdm_reference_prediction_calculator_guard_after_v4_266"
          EXPECTED_RESULT = "v4_267_zhao_lcdm_reference_prediction_calculator_guard_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_268_zhao_reference_manifest_validator_with_lcdm_predictions_no_scoring"

          OUT = Path("tairid_v4_267_zhao_lcdm_reference_prediction_calculator_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-267-zhao-lcdm-reference-prediction-calculator-guard-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REFERENCE_MODEL_MANIFEST_CANDIDATES = [
              Path("data/cosmology/zhao_reference_model_manifest.csv"),
              Path("zhao_reference_model_manifest.csv"),
          ]

          SOURCE_SELECTION_CANDIDATES = [
              Path("data/cosmology/zhao_reference_source_selection.csv"),
              Path("zhao_reference_source_selection.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_REFERENCE_COLUMNS = [
              "reference_id",
              "observed_id",
              "model_family",
              "model_label",
              "redshift",
              "quantity",
              "predicted_value",
              "prediction_source_or_method",
              "parameter_status",
              "approval_status",
          ]

          REQUIRED_SOURCE_SELECTION_COLUMNS = [
              "selection_id",
              "model_family",
              "model_label",
              "source_type",
              "source_path_or_citation",
              "freeze_status",
              "parameter_status",
              "reference_values_available",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def safe_float(value):
              try:
                  return float(str(value).strip())
              except Exception:
                  return None

          inherited_v4_266_rows = [
              {
                  "inherited_from": "v4.266",
                  "item": "rules",
                  "value": "50 / 50 passed",
                  "meaning": "Zhao Reference Source Fetch Or Manual Fill Plan passed.",
                  "carry_forward_status": "ready_for_lcdm_reference_calculator_guard",
              },
              {
                  "inherited_from": "v4.266",
                  "item": "zhao_observed_rows",
                  "value": 4,
                  "meaning": "Four Zhao observed candidate rows are ready.",
                  "carry_forward_status": "observed_rows_ready_review_only",
              },
              {
                  "inherited_from": "v4.266",
                  "item": "manual_fill_rows",
                  "value": 4,
                  "meaning": "Four manual-fill prediction rows were written as placeholders.",
                  "carry_forward_status": "reference_template_ready",
              },
              {
                  "inherited_from": "v4.266",
                  "item": "lcdm_spec_rows",
                  "value": 5,
                  "meaning": "LCDM calculator requirements were listed.",
                  "carry_forward_status": "calculator_guard_ready",
              },
              {
                  "inherited_from": "v4.266",
                  "item": "reference_predictions_filled",
                  "value": False,
                  "meaning": "Reference predictions were still missing.",
                  "carry_forward_status": "prediction_gap_active",
              },
              {
                  "inherited_from": "v4.266",
                  "item": "residuals_computed",
                  "value": False,
                  "meaning": "No residuals were computed.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.266",
                  "item": "chi_square_computed",
                  "value": False,
                  "meaning": "No chi-square was computed.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.266",
                  "item": "selected_next_route",
                  "value": "v4_267_zhao_lcdm_reference_prediction_calculator_guard_or_manual_fill_validator",
                  "meaning": "Current route can calculate fixed LCDM-style reference predictions without scoring.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
