name: 000 TAIRID v4.158b - Reference Generation Route Feasibility Package Schema Safe

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/000-tairid-v4-158b-reference-generation-route-feasibility-package-schema-safe.yml'

jobs:
  tairid-v4-158b-reference-package-schema-safe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run TAIRID v4.158b reference package schema safe test
        shell: bash
        run: |
          cat > run_tairid_v4_158b_reference_package_schema_safe.py <<'PY'
          import csv
          import datetime as dt
          import importlib.util
          import json
          import os
          import platform
          import sys
          import zipfile
          from pathlib import Path

          VERSION = "v4.158b"
          TITLE = "000 TAIRID v4.158b - Reference Generation Route Feasibility Package Schema Safe"
          EXPECTED_RESULT = "reference_generation_route_feasibility_package_schema_safe_passed_templates_written_no_ingestion_no_pressure_no_validation"
          OUT = Path("tairid_v4_158b_reference_generation_route_feasibility_package_schema_safe_outputs")
          OUT.mkdir(parents=True, exist_ok=True)
          CREATED_UTC = dt.datetime.now(dt.timezone.utc).isoformat()

          OBSERVED_ORDER = [
              {"slot_index": 0, "row_id": "DM_ov_rd_z0p70", "z": "0.700", "observable": "DM_over_rd", "observed_product_role": "geometry_transverse", "units": "dimensionless_ratio_to_rd"},
              {"slot_index": 1, "row_id": "DH_ov_rd_z0p70", "z": "0.700", "observable": "DH_over_rd", "observed_product_role": "geometry_radial", "units": "dimensionless_ratio_to_rd"},
              {"slot_index": 2, "row_id": "fsigma8_z0p70", "z": "0.700", "observable": "fsigma8", "observed_product_role": "growth", "units": "dimensionless"},
              {"slot_index": 3, "row_id": "DM_ov_rd_z0p845", "z": "0.845", "observable": "DM_over_rd", "observed_product_role": "geometry_transverse", "units": "dimensionless_ratio_to_rd"},
              {"slot_index": 4, "row_id": "DH_ov_rd_z0p845", "z": "0.845", "observable": "DH_over_rd", "observed_product_role": "geometry_radial", "units": "dimensionless_ratio_to_rd"},
              {"slot_index": 5, "row_id": "fsigma8_z0p845", "z": "0.845", "observable": "fsigma8", "observed_product_role": "growth", "units": "dimensionless"},
          ]

          REQUIRED_DEPENDENCIES = [
              {"dependency_id": "limited_lrgxelg_reference_mean_vector_6", "scope": "limited_LRGxELG_two_redshift", "required_content": "reference means for DM/rd, DH/rd, and fsigma8 at z=0.70 and z=0.845 in the six-row order", "acceptable_forms": "CAMB/CLASS calculation with locked cosmology, parameter-chain-derived predictions, or documented published reference vector", "needed_before": "any limited coupled residual or pressure attempt"},
              {"dependency_id": "limited_lrgxelg_reference_covariance_or_samples", "scope": "limited_LRGxELG_two_redshift", "required_content": "reference covariance for the six predicted quantities, or parameter/posterior samples allowing it to be generated", "acceptable_forms": "Planck posterior samples, CLASS/CAMB sample propagation, or documented covariance matrix", "needed_before": "honest coupled residual uncertainty and reference sensitivity"},
              {"dependency_id": "expanded_12_redshift_growth_reference_vector", "scope": "expanded_growth_lane", "required_content": "reference fsigma8-like values at all expanded growth redshift targets used in the previous lane", "acceptable_forms": "stored reference vector, reproducible CAMB/CLASS calculation, or parameter-chain-derived vector", "needed_before": "full growth/RSD pressure interpretation across prior expanded redshift targets"},
              {"dependency_id": "expanded_12_redshift_reference_covariance_or_samples", "scope": "expanded_growth_lane", "required_content": "reference covariance or parameter samples spanning the expanded redshift vector", "acceptable_forms": "Planck posterior samples, documented covariance, or reproducible propagation from samples", "needed_before": "pressure magnitude, correlated uncertainty, and final interpretation guard"},
              {"dependency_id": "qso_covariance_or_likelihood", "scope": "eBOSS_family", "required_content": "QSO value source plus covariance/likelihood and overlap notes with LRG/ELG products", "acceptable_forms": "official SDSS/eBOSS source files, likelihood package, or documented covariance table", "needed_before": "QSO counter-component covariance handling"},
              {"dependency_id": "full_eboss_family_covariance_or_overlap_model", "scope": "eBOSS_family", "required_content": "cross-tracer covariance/overlap treatment or documented independence/combination rule", "acceptable_forms": "official multi-tracer covariance, paper-supported overlap model, or likelihood package", "needed_before": "full LRG/ELG/QSO covariance/overlap interpretation"},
              {"dependency_id": "final_pressure_methodology_spec", "scope": "final_interpretation_guard", "required_content": "predeclared method for residuals, covariance combination, reference uncertainty, thresholds, and forbidden claims", "acceptable_forms": "locked markdown/JSON methodology file with formulas and scope limits", "needed_before": "any future claim about pressure magnitude"},
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A final RSD pressure score was computed.",
              "A residual against LCDM or TAIRID was computed.",
              "A final combined growth covariance was computed.",
              "A generated schema is accepted as scientific data.",
              "A successful software import supplies a reference vector or covariance.",
              "The limited LRGxELG product is full eBOSS covariance.",
              "This workflow provides QSO covariance.",
              "The eBOSS family points are independent by default.",
              "BIC, likelihood, posterior comparison, or model selection has been run.",
              "Public-facing validation claims are allowed.",
          ]

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fieldnames})

          def write_json(path, obj):
              path.write_text(json.dumps(obj, indent=2, sort_keys=True), encoding="utf-8")

          # 1. Six-slot reference mean vector template.
          mean_rows = []
          for item in OBSERVED_ORDER:
              row = dict(item)
              row.update({
                  "reference_mean_value": "FILL_ME_LATER_NOT_INGESTED",
                  "reference_source": "FILL_ME_LATER",
                  "reference_method": "FILL_ME_LATER",
                  "source_url_or_file": "FILL_ME_LATER",
                  "source_commit_version_or_release": "FILL_ME_LATER",
                  "claim_boundary": "template_only_no_scientific_value_ingested",
              })
              mean_rows.append(row)
          write_csv(
              OUT / "limited_lrgxelg_reference_mean_vector_template_v4_158b.csv",
              mean_rows,
              ["slot_index", "row_id", "z", "observable", "observed_product_role", "units", "reference_mean_value", "reference_source", "reference_method", "source_url_or_file", "source_commit_version_or_release", "claim_boundary"],
          )

          # 2. Matrix templates.
          ids = [r["row_id"] for r in OBSERVED_ORDER]
          matrix_rows = []
          corr_rows = []
          for row_id in ids:
              matrix_row = {"row_id": row_id}
              corr_row = {"row_id": row_id}
              for col_id in ids:
                  matrix_row[col_id] = "FILL_ME_LATER_NOT_INGESTED"
                  corr_row[col_id] = "1.0_IF_DIAGONAL_ELSE_FILL_ME_LATER" if row_id == col_id else "FILL_ME_LATER_NOT_INGESTED"
              matrix_rows.append(matrix_row)
              corr_rows.append(corr_row)
          write_csv(OUT / "limited_lrgxelg_reference_covariance_matrix_template_v4_158b.csv", matrix_rows, ["row_id"] + ids)
          write_csv(OUT / "limited_lrgxelg_reference_correlation_matrix_template_optional_v4_158b.csv", corr_rows, ["row_id"] + ids)

          long_rows = []
          for i, a in enumerate(ids):
              for j, b in enumerate(ids):
                  long_rows.append({
                      "row_index": i,
                      "col_index": j,
                      "row_id": a,
                      "col_id": b,
                      "reference_covariance_value": "FILL_ME_LATER_NOT_INGESTED",
                      "claim_boundary": "template_only_no_scientific_value_ingested",
                  })
          write_csv(OUT / "limited_lrgxelg_reference_covariance_long_template_v4_158b.csv", long_rows, ["row_index", "col_index", "row_id", "col_id", "reference_covariance_value", "claim_boundary"])

          sample_rows = []
          for sample_index in range(3):
              row = {"sample_index": sample_index, "sample_source": "FILL_ME_LATER", "sample_weight": "FILL_ME_LATER_OPTIONAL"}
              for row_id in ids:
                  row[row_id] = "FILL_ME_LATER_NOT_INGESTED"
              row["claim_boundary"] = "template_only_no_scientific_value_ingested"
              sample_rows.append(row)
          write_csv(OUT / "limited_lrgxelg_reference_parameter_samples_template_v4_158b.csv", sample_rows, ["sample_index", "sample_source", "sample_weight"] + ids + ["claim_boundary"])

          # 3. Dependency and software route records.
          write_csv(OUT / "reference_dependency_ledger_v4_158b.csv", REQUIRED_DEPENDENCIES, ["dependency_id", "scope", "required_content", "acceptable_forms", "needed_before"])

          software_rows = []
          for module_name, route_label in [("camb", "CAMB_python_route"), ("classy", "CLASS_classy_python_route")]:
              spec = importlib.util.find_spec(module_name)
              software_rows.append({
                  "route_label": route_label,
                  "python_module": module_name,
                  "import_available_without_install": bool(spec),
                  "install_attempted": False,
                  "reference_vector_generated": False,
                  "reference_covariance_generated": False,
                  "claim_boundary": "software_route_check_only_not_scientific_data",
              })
          software_rows.append({
              "route_label": "manual_reference_package_route",
              "python_module": "not_applicable",
              "import_available_without_install": "not_applicable",
              "install_attempted": False,
              "reference_vector_generated": False,
              "reference_covariance_generated": False,
              "claim_boundary": "manual_fill_route_schema_only_not_scientific_data",
          })
          write_csv(OUT / "software_route_feasibility_v4_158b.csv", software_rows, ["route_label", "python_module", "import_available_without_install", "install_attempted", "reference_vector_generated", "reference_covariance_generated", "claim_boundary"])

          # 4. Guard reports.
          scope_rows = [
              {"guard": "scientific_values_ingested", "status": False, "required_status": False, "pass": True, "notes": "No reference values are ingested."},
              {"guard": "reference_vector_generated", "status": False, "required_status": False, "pass": True, "notes": "No reference vector is generated."},
              {"guard": "reference_covariance_generated", "status": False, "required_status": False, "pass": True, "notes": "No reference covariance is generated."},
              {"guard": "pressure_computed", "status": False, "required_status": False, "pass": True, "notes": "No pressure score is computed."},
              {"guard": "residuals_computed", "status": False, "required_status": False, "pass": True, "notes": "No residuals are computed."},
              {"guard": "qso_covariance_supplied", "status": False, "required_status": False, "pass": True, "notes": "No QSO covariance is supplied."},
              {"guard": "full_eboss_covariance_supplied", "status": False, "required_status": False, "pass": True, "notes": "No full eBOSS covariance is supplied."},
              {"guard": "validation_claim_allowed", "status": False, "required_status": False, "pass": True, "notes": "No validation claim is allowed."},
          ]
          write_csv(OUT / "scope_guard_report_v4_158b.csv", scope_rows, ["guard", "status", "required_status", "pass", "notes"])

          blocked_rows = [{"blocked_claim": claim, "blocked": True, "claim_boundary": "explicitly_forbidden_in_v4_158b"} for claim in BLOCKED_CLAIMS]
          write_csv(OUT / "blocked_claims_report_v4_158b.csv", blocked_rows, ["blocked_claim", "blocked", "claim_boundary"])

          rule_rows = [
              {"rule_id": "R01", "rule": "six_reference_slots_templated", "pass": len(mean_rows) == 6},
              {"rule_id": "R02", "rule": "covariance_matrix_template_is_6_by_6", "pass": len(matrix_rows) == 6 and all(len([k for k in r if k != "row_id"]) == 6 for r in matrix_rows)},
              {"rule_id": "R03", "rule": "covariance_long_template_has_36_cells", "pass": len(long_rows) == 36},
              {"rule_id": "R04", "rule": "correlation_template_is_written", "pass": (OUT / "limited_lrgxelg_reference_correlation_matrix_template_optional_v4_158b.csv").exists()},
              {"rule_id": "R05", "rule": "parameter_sample_template_is_written", "pass": (OUT / "limited_lrgxelg_reference_parameter_samples_template_v4_158b.csv").exists()},
              {"rule_id": "R06", "rule": "dependency_ledger_has_seven_blockers", "pass": len(REQUIRED_DEPENDENCIES) == 7},
              {"rule_id": "R07", "rule": "software_route_record_written", "pass": len(software_rows) >= 3},
              {"rule_id": "R08", "rule": "no_scientific_values_ingested", "pass": True},
              {"rule_id": "R09", "rule": "no_pressure_computed", "pass": True},
              {"rule_id": "R10", "rule": "no_validation_claim_allowed", "pass": True},
              {"rule_id": "R11", "rule": "blocked_claims_written", "pass": len(blocked_rows) >= 10},
              {"rule_id": "R12", "rule": "scope_guards_written", "pass": len(scope_rows) >= 8},
          ]
          failed_gates = [r["rule_id"] for r in rule_rows if not r["pass"]]
          pass_count = len(rule_rows) - len(failed_gates)
          write_csv(OUT / "rule_audit_v4_158b.csv", rule_rows, ["rule_id", "rule", "pass"])

          selected_next_route = "manual_reference_package_fill_or_limited_reference_vector_generation_prototype_with_scope_guards"
          health_rows = [
              {"metric": "workflow_version", "value": VERSION, "claim_boundary": "schema_health_only"},
              {"metric": "expected_result_label", "value": EXPECTED_RESULT, "claim_boundary": "schema_health_only"},
              {"metric": "failed_gates", "value": json.dumps(failed_gates), "claim_boundary": "schema_health_only"},
              {"metric": "rule_pass_count", "value": str(pass_count) + " / " + str(len(rule_rows)), "claim_boundary": "schema_health_only"},
              {"metric": "reference_value_slots_templated", "value": len(OBSERVED_ORDER), "claim_boundary": "schema_health_only"},
              {"metric": "covariance_template_dimension", "value": "6x6", "claim_boundary": "schema_health_only"},
              {"metric": "scientific_values_ingested", "value": False, "claim_boundary": "schema_health_only"},
              {"metric": "reference_vector_generated", "value": False, "claim_boundary": "schema_health_only"},
              {"metric": "reference_covariance_generated", "value": False, "claim_boundary": "schema_health_only"},
              {"metric": "pressure_computed", "value": False, "claim_boundary": "schema_health_only"},
              {"metric": "selected_next_route", "value": selected_next_route, "claim_boundary": "schema_health_only"},
          ]
          write_csv(OUT / "parser_health_report_v4_158b.csv", health_rows, ["metric", "value", "claim_boundary"])

          methodology_lines = [
              "# " + TITLE,
              "",
              "Created UTC: `" + CREATED_UTC + "`",
              "",
              "## Status",
              "Expected result label: `" + EXPECTED_RESULT + "`",
              "Failed gates: `" + json.dumps(failed_gates) + "`",
              "Rule pass count: `" + str(pass_count) + " / " + str(len(rule_rows)) + "`",
              "",
              "## Plain-language result",
              "This workflow creates the exact manual reference-package templates needed for the limited LRGxELG two-redshift product and records basic software-route feasibility. It does not ingest scientific reference values, generate a reference vector, generate a reference covariance, compute residuals, compute pressure, compare models, or validate TAIRID.",
              "",
              "## Templates written",
              "- `limited_lrgxelg_reference_mean_vector_template_v4_158b.csv`",
              "- `limited_lrgxelg_reference_covariance_matrix_template_v4_158b.csv`",
              "- `limited_lrgxelg_reference_covariance_long_template_v4_158b.csv`",
              "- `limited_lrgxelg_reference_correlation_matrix_template_optional_v4_158b.csv`",
              "- `limited_lrgxelg_reference_parameter_samples_template_v4_158b.csv`",
              "",
              "## Required limited reference order",
          ]
          for idx, item in enumerate(OBSERVED_ORDER, start=1):
              methodology_lines.append(str(idx) + ". `" + item["row_id"] + "`")
          methodology_lines += [
              "",
              "## Truth boundary",
              "This is progress in scaffolding, not proof. Templates and environment checks are not scientific data. This workflow does not compute final pressure, residuals against LCDM or TAIRID, likelihood, BIC, posterior comparison, QSO covariance, full eBOSS covariance, or validation. It only makes the missing reference package explicit and records whether a future reference-generation route may be practical.",
              "",
              "## Selected next route",
              "`" + selected_next_route + "`",
              "",
          ]
          (OUT / "methodology_and_scope_summary_v4_158b.md").write_text("\n".join(methodology_lines), encoding="utf-8")

          summary = {
              "version": VERSION,
              "title": TITLE,
              "created_utc": CREATED_UTC,
              "expected_result_label": EXPECTED_RESULT,
              "failed_gates": failed_gates,
              "rule_pass_count": str(pass_count) + " / " + str(len(rule_rows)),
              "reference_value_slots_templated": len(OBSERVED_ORDER),
              "covariance_template_dimension": "6x6",
              "scientific_values_ingested": False,
              "reference_vector_generated": False,
              "reference_covariance_generated": False,
              "pressure_computed": False,
              "residuals_computed": False,
              "qso_covariance_supplied": False,
              "full_eboss_covariance_supplied": False,
              "validation_claim_allowed": False,
              "python_version": sys.version,
              "platform": platform.platform(),
              "selected_next_route": selected_next_route,
          }
          write_json(OUT / "summary_v4_158b.json", summary)

          zip_name = "tairid-v4-158b-reference-generation-route-feasibility-package-schema-safe-output.zip"
          with zipfile.ZipFile(zip_name, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.as_posix())

          print("EXPECTED_RESULT=" + EXPECTED_RESULT)
          print("FAILED_GATES=" + json.dumps(failed_gates))
          print("RULE_PASS_COUNT=" + str(pass_count) + " / " + str(len(rule_rows)))
          print("OUTPUT_ZIP=" + zip_name)
          if failed_gates:
              raise SystemExit(1)
          PY
          python run_tairid_v4_158b_reference_package_schema_safe.py

      - name: Upload TAIRID v4.158b outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-158b-reference-generation-route-feasibility-package-schema-safe-output
          path: |
            tairid_v4_158b_reference_generation_route_feasibility_package_schema_safe_outputs/**
            tairid-v4-158b-reference-generation-route-feasibility-package-schema-safe-output.zip
