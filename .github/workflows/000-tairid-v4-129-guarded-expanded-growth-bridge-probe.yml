                  observed_covariance
              )
              bridge_lane_records.append(result)
              lane_lookup[lane["lane_id"]] = result
              indexes = lane["indexes"]
              for i_local, i_full in enumerate(indexes):
                  for j_local, j_full in enumerate(indexes):
                      total_covariance_records.append({
                          "lane_id": lane["lane_id"],
                          "row_index": i_full,
                          "column_index": j_full,
                          "row_target_id": EXPANDED_OBSERVED_VECTOR[i_full]["target_id"],
                          "column_target_id": EXPANDED_OBSERVED_VECTOR[j_full]["target_id"],
                          "total_covariance_value": total_cov[i_local][j_local],
                          "record_scope": "guarded_expanded_growth_bridge_diagnostic_not_final_pressure"
                      })

          family_pressure_records = []
          for lane in bridge_lane_records:
              local_pressure_flag = bool(abs(float(lane["pressure_z"])) > 0.0)
              family_pressure_records.append({
                  "lane_id": lane["lane_id"],
                  "lane_family": lane["lane_family"],
                  "chi2": lane["chi2"],
                  "dof": lane["dof"],
                  "pressure_z": lane["pressure_z"],
                  "local_pressure_flag": local_pressure_flag,
                  "interpretation": (
                      "family_slice_or_lane_pressure_flag_needs_sensitivity_audit"
                      if local_pressure_flag
                      else "no_pressure_flag_in_this_lane"
                  )
              })

          lane_comparison_records = [
              {
                  "comparison_id": "low_z_plus_BOSS_minus_BOSS_core",
                  "base_lane": "low_z_plus_BOSS_expanded_primary_candidate",
                  "comparison_lane": "verified_BOSS_core_control",
                  "delta_chi2": lane_lookup["low_z_plus_BOSS_expanded_primary_candidate"]["chi2"] - lane_lookup["verified_BOSS_core_control"]["chi2"],
                  "delta_pressure_z": lane_lookup["low_z_plus_BOSS_expanded_primary_candidate"]["pressure_z"] - lane_lookup["verified_BOSS_core_control"]["pressure_z"],
                  "interpretation": "Effect of low-z expansion relative to verified BOSS core."
              },
              {
                  "comparison_id": "WiggleZ_slice_minus_BOSS_core",
                  "base_lane": "WiggleZ_family_slice_candidate",
                  "comparison_lane": "verified_BOSS_core_control",
                  "delta_chi2": lane_lookup["WiggleZ_family_slice_candidate"]["chi2"] - lane_lookup["verified_BOSS_core_control"]["chi2"],
                  "delta_pressure_z": lane_lookup["WiggleZ_family_slice_candidate"]["pressure_z"] - lane_lookup["verified_BOSS_core_control"]["pressure_z"],
                  "interpretation": "Effect of independent WiggleZ family slice."
              },
              {
                  "comparison_id": "eBOSS_slice_minus_BOSS_core",
                  "base_lane": "eBOSS_high_mid_z_family_slice_candidate",
                  "comparison_lane": "verified_BOSS_core_control",
                  "delta_chi2": lane_lookup["eBOSS_high_mid_z_family_slice_candidate"]["chi2"] - lane_lookup["verified_BOSS_core_control"]["chi2"],
                  "delta_pressure_z": lane_lookup["eBOSS_high_mid_z_family_slice_candidate"]["pressure_z"] - lane_lookup["verified_BOSS_core_control"]["pressure_z"],
                  "interpretation": "Effect of eBOSS same-program higher-redshift family slice."
              },
              {
                  "comparison_id": "expanded_all_minus_low_z_plus_BOSS",
                  "base_lane": "expanded_all_source_candidate_sensitivity",
                  "comparison_lane": "low_z_plus_BOSS_expanded_primary_candidate",
                  "delta_chi2": lane_lookup["expanded_all_source_candidate_sensitivity"]["chi2"] - lane_lookup["low_z_plus_BOSS_expanded_primary_candidate"]["chi2"],
                  "delta_pressure_z": lane_lookup["expanded_all_source_candidate_sensitivity"]["pressure_z"] - lane_lookup["low_z_plus_BOSS_expanded_primary_candidate"]["pressure_z"],
                  "interpretation": "Effect of adding all expanded source candidates under fallback covariance."
              }
          ]

          observed_reference_records = []
          for obs, ref in zip(EXPANDED_OBSERVED_VECTOR, REFERENCE_TARGET_RECORDS):
              observed_reference_records.append({
                  "index": obs["index"],
                  "target_id": obs["target_id"],
                  "z": obs["z"],
                  "observed_fsigma8": obs["observed_fsigma8"],
                  "observed_sigma": obs["observed_sigma"],
                  "reference_fsigma8_support": ref["reference_fsigma8_support"],
                  "reference_variance_support": ref["reference_variance_support"],
                  "residual_observed_minus_reference": obs["observed_fsigma8"] - ref["reference_fsigma8_support"],
                  "observed_covariance_status": obs["observed_covariance_status"],
                  "reference_support_status": ref["support_status"],
                  "reference_variance_status": ref["variance_status"],
                  "claim_scope": obs["claim_scope"]
              })

          bridge_pressure_computed = all(row["computed"] is True and math.isfinite(float(row["chi2"])) for row in bridge_lane_records)
          all_total_covariances_rank_ok = all(row["rank_total_covariance"] == row["dof"] for row in bridge_lane_records)
          all_total_covariances_symmetric = all(float(row["symmetry_error_total_covariance"]) <= 1e-12 for row in bridge_lane_records)
          all_total_covariance_diagonal_positive = all(float(row["diag_min_total_covariance"]) > 0 for row in bridge_lane_records)

          pressure_lanes = [row for row in bridge_lane_records if abs(float(row["pressure_z"])) > 0.0]
          no_pressure_lanes = [row for row in bridge_lane_records if abs(float(row["pressure_z"])) == 0.0]
          eBOSS_pressure_recorded = any(row["lane_id"] == "eBOSS_high_mid_z_family_slice_candidate" and abs(float(row["pressure_z"])) > 0.0 for row in bridge_lane_records)
          expanded_all_non_pressure = lane_lookup["expanded_all_source_candidate_sensitivity"]["chi2"] < lane_lookup["expanded_all_source_candidate_sensitivity"]["dof"] and abs(lane_lookup["expanded_all_source_candidate_sensitivity"]["pressure_z"]) == 0.0
          BOSS_core_non_pressure = lane_lookup["verified_BOSS_core_control"]["chi2"] < lane_lookup["verified_BOSS_core_control"]["dof"] and abs(lane_lookup["verified_BOSS_core_control"]["pressure_z"]) == 0.0
          low_z_plus_BOSS_non_pressure = lane_lookup["low_z_plus_BOSS_expanded_primary_candidate"]["chi2"] < lane_lookup["low_z_plus_BOSS_expanded_primary_candidate"]["dof"] and abs(lane_lookup["low_z_plus_BOSS_expanded_primary_candidate"]["pressure_z"]) == 0.0

          interpolation_fallback_active = any("interpolation_fallback" in row["support_status"] for row in REFERENCE_TARGET_RECORDS)
          full_planck_posterior_available = False
          final_pressure_ready = False

          if UPSTREAM_LOCKS["v4_128_expanded_reference_target_support_probe"]["expanded_reference_target_support_exists"] is not True:
              failed_gates.append("upstream_reference_support_not_carried")

          if UPSTREAM_LOCKS["v4_128_expanded_reference_target_support_probe"]["full_planck_posterior_available"] is not False:
              failed_gates.append("upstream_full_planck_boundary_not_carried")

          if not bridge_pressure_computed:
              failed_gates.append("expanded_bridge_pressure_not_computed")

          if not all_total_covariances_rank_ok:
              failed_gates.append("not_all_total_covariances_full_rank_for_lane")

          if not all_total_covariances_symmetric:
              failed_gates.append("not_all_total_covariances_symmetric")

          if not all_total_covariance_diagonal_positive:
              failed_gates.append("not_all_total_covariance_diagonals_positive")

          if not BOSS_core_non_pressure:
              failed_gates.append("BOSS_core_control_pressure_unexpected")

          if not low_z_plus_BOSS_non_pressure:
              failed_gates.append("low_z_plus_BOSS_pressure_unexpected")

          if not expanded_all_non_pressure:
              failed_gates.append("expanded_all_lane_pressure_unexpected")

          if not eBOSS_pressure_recorded:
              failed_gates.append("eBOSS_family_pressure_flag_not_recorded")

          if not interpolation_fallback_active:
              failed_gates.append("interpolation_fallback_warning_not_carried")

          if full_planck_posterior_available:
              failed_gates.append("full_planck_posterior_unexpectedly_available")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_allowed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "expanded reference covariance is a full planck posterior covariance",
              "family-slice pressure flag is a final model failure or success",
              "zero pressure-z proves tairid",
              "no expanded growth sensitivity audit is needed",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "guarded_expanded_growth_bridge_probe_passed_eBOSS_family_pressure_localized_not_final_ready_for_expanded_growth_sensitivity_audit"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_reference_support_carried",
                  "pass": UPSTREAM_LOCKS["v4_128_expanded_reference_target_support_probe"]["expanded_reference_target_support_exists"] is True,
                  "result": "v4.128 expanded reference support carried",
                  "boundary": "Reference support is fallback, not full posterior."
              },
              {
                  "rule_id": "expanded_bridge_lanes_computed",
                  "pass": bridge_pressure_computed and len(bridge_lane_records) == 6,
                  "result": f"bridge_lanes={len(bridge_lane_records)}",
                  "boundary": "Diagnostic lanes only."
              },
              {
                  "rule_id": "numerical_covariance_health_passed",
                  "pass": all_total_covariances_rank_ok and all_total_covariances_symmetric and all_total_covariance_diagonal_positive,
                  "result": "all lane covariance matrices are full-rank for lane dimension, symmetric, and positive diagonal",
                  "boundary": "Numerical health only."
              },
              {
                  "rule_id": "BOSS_and_low_z_control_remain_non_pressure",
                  "pass": BOSS_core_non_pressure and low_z_plus_BOSS_non_pressure,
                  "result": f"BOSS_core_chi2={lane_lookup['verified_BOSS_core_control']['chi2']}; low_z_plus_BOSS_chi2={lane_lookup['low_z_plus_BOSS_expanded_primary_candidate']['chi2']}",
                  "boundary": "Diagnostic non-pressure flag only."
              },
              {
                  "rule_id": "expanded_all_lane_remains_non_pressure",
                  "pass": expanded_all_non_pressure,
                  "result": f"expanded_all_chi2={lane_lookup['expanded_all_source_candidate_sensitivity']['chi2']}; dof={lane_lookup['expanded_all_source_candidate_sensitivity']['dof']}",
                  "boundary": "Mixed fallback lane, not final pressure."
              },
              {
                  "rule_id": "eBOSS_family_pressure_localized",
                  "pass": eBOSS_pressure_recorded,
                  "result": f"eBOSS_pressure_z={lane_lookup['eBOSS_high_mid_z_family_slice_candidate']['pressure_z']}; chi2={lane_lookup['eBOSS_high_mid_z_family_slice_candidate']['chi2']}",
                  "boundary": "Family-local diagnostic flag requiring sensitivity/source review."
              },
              {
                  "rule_id": "interpolation_fallback_boundary_carried",
                  "pass": interpolation_fallback_active and full_planck_posterior_available is False,
                  "result": "expanded reference support uses interpolation/sensitivity fallback, not full posterior covariance",
                  "boundary": "Blocks final pressure."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_129_rules_passed")

          if failed_gates:
              readiness_label = "guarded_expanded_growth_bridge_probe_failed"
              next_allowed_step = "Repair guarded expanded growth bridge probe before expanded growth sensitivity audit."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.130 expanded growth sensitivity audit. "
                  "Audit family-local pressure, interpolation fallback, source/covariance limits, and expanded-all behavior. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "expanded_bridge_pressure_computed": bridge_pressure_computed,
              "expanded_reference_target_support_exists": True,
              "full_planck_posterior_available": full_planck_posterior_available,
              "interpolation_fallback_active": interpolation_fallback_active,
              "bridge_lane_count": len(bridge_lane_records),
              "pressure_lane_count": len(pressure_lanes),
              "no_pressure_lane_count": len(no_pressure_lanes),
              "BOSS_core_non_pressure": BOSS_core_non_pressure,
              "low_z_plus_BOSS_non_pressure": low_z_plus_BOSS_non_pressure,
              "expanded_all_non_pressure": expanded_all_non_pressure,
              "eBOSS_family_pressure_recorded": eBOSS_pressure_recorded,
              "eBOSS_pressure_z": lane_lookup["eBOSS_high_mid_z_family_slice_candidate"]["pressure_z"],
              "eBOSS_chi2": lane_lookup["eBOSS_high_mid_z_family_slice_candidate"]["chi2"],
              "expanded_all_chi2": lane_lookup["expanded_all_source_candidate_sensitivity"]["chi2"],
              "expanded_all_dof": lane_lookup["expanded_all_source_candidate_sensitivity"]["dof"],
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "expanded_observed_vector": EXPANDED_OBSERVED_VECTOR,
              "reference_target_records": REFERENCE_TARGET_RECORDS,
              "BOSS_verified_fsigma8_subblock": BOSS_VERIFIED_FSIGMA8_SUBBLOCK,
              "observed_covariance_used": observed_covariance,
              "reference_covariance_used": reference_covariance,
              "expanded_lane_plan": EXPANDED_LANE_PLAN,
              "observed_reference_records": observed_reference_records,
              "bridge_lane_records": bridge_lane_records,
              "family_pressure_records": family_pressure_records,
              "lane_comparison_records": lane_comparison_records,
              "total_covariance_records": total_covariance_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "expanded_bridge_pressure_computed": bridge_pressure_computed,
                  "eBOSS_family_pressure_recorded": eBOSS_pressure_recorded,
                  "expanded_all_non_pressure": expanded_all_non_pressure,
                  "full_planck_posterior_available": full_planck_posterior_available,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_129_guarded_expanded_growth_bridge_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "observed_reference_records_v4_129.csv",
              observed_reference_records,
              ["index", "target_id", "z", "observed_fsigma8", "observed_sigma", "reference_fsigma8_support", "reference_variance_support", "residual_observed_minus_reference", "observed_covariance_status", "reference_support_status", "reference_variance_status", "claim_scope"]
          )

          write_csv(
              OUTDIR / "bridge_lane_records_v4_129.csv",
              bridge_lane_records,
              ["lane_id", "indexes", "target_ids", "redshifts", "lane_family", "lane_status", "chi2", "dof", "pressure_z", "abs_pressure_z", "residual_mean", "rank_total_covariance", "symmetry_error_total_covariance", "diag_min_total_covariance", "condition_proxy_total_covariance", "computed", "claim_scope"]
          )

          write_csv(
              OUTDIR / "family_pressure_records_v4_129.csv",
              family_pressure_records,
              ["lane_id", "lane_family", "chi2", "dof", "pressure_z", "local_pressure_flag", "interpretation"]
          )

          write_csv(
              OUTDIR / "lane_comparison_records_v4_129.csv",
              lane_comparison_records,
              ["comparison_id", "base_lane", "comparison_lane", "delta_chi2", "delta_pressure_z", "interpretation"]
          )

          write_csv(
              OUTDIR / "total_covariance_records_v4_129.csv",
              total_covariance_records,
              ["lane_id", "row_index", "column_index", "row_target_id", "column_target_id", "total_covariance_value", "record_scope"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_129.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_129.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_129.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.129 — Guarded Expanded Growth Bridge Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.129 computes guarded expanded growth lanes using the v4.128 reference target ledger. The calculation remains diagnostic because the expanded reference support uses interpolation and sensitivity fallback, not full Planck posterior covariance.")
          md.append("")
          md.append("The expected useful thing here is not a final score. It is to see whether a pressure signal stays absent across the full expanded lane or appears locally inside a source family that then needs source/covariance review.")
          md.append("")
          md.append("## Bridge lanes")
          md.append("")
          md.append("| Lane | chi2 | dof | pressure_z |")
          md.append("|---|---:|---:|---:|")
          for row in bridge_lane_records:
              md.append(f"| `{row['lane_id']}` | `{row['chi2']}` | `{row['dof']}` | `{row['pressure_z']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_129_guarded_expanded_growth_bridge_probe.json",
              "tairid_v4_129_guarded_expanded_growth_bridge_probe.md",
              "observed_reference_records_v4_129.csv",
              "bridge_lane_records_v4_129.csv",
              "family_pressure_records_v4_129.csv",
              "lane_comparison_records_v4_129.csv",
              "total_covariance_records_v4_129.csv",
              "blocked_claims_v4_129.csv",
              "next_route_options_v4_129.csv",
              "rule_results_v4_129.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_129_guarded_expanded_growth_bridge_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

