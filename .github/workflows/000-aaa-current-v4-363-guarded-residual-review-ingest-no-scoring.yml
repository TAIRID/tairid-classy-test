name: "!!! AAA CURRENT - TAIRID v4.363 guarded residual review ingest no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-363-guarded-residual-review-ingest-no-scoring:
    name: "!!! AAA CURRENT - Run v4.363 guarded residual review ingest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.362 output ZIP and human-filled residual review ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.362 output ZIP..."
          INPUT_362_ZIP="$(ls tairid-v4-362-guarded-residual-dry-run-no-chi-square-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_362_ZIP" ]; then
            echo "Could not find v4.362 output ZIP."
            echo "Expected:"
            echo "tairid-v4-362-guarded-residual-dry-run-no-chi-square-no-scoring-output.zip"
            exit 1
          fi

          echo "Finding human-filled residual review ZIP..."
          HUMAN_FILLED_RESIDUAL_REVIEW_ZIP="$(ls tairid-v4-362-human-filled-guarded-residual-review-for-v4-363-no-chi-square-no-scoring*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_RESIDUAL_REVIEW_ZIP" ]; then
            echo "Could not find human-filled residual review ZIP."
            echo "Expected:"
            echo "tairid-v4-362-human-filled-guarded-residual-review-for-v4-363-no-chi-square-no-scoring.zip"
            exit 1
          fi

          echo "Using v4.362 ZIP:"
          echo "$INPUT_362_ZIP"

          echo "Using human-filled residual review ZIP:"
          echo "$HUMAN_FILLED_RESIDUAL_REVIEW_ZIP"

          echo "INPUT_362_ZIP=$INPUT_362_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_RESIDUAL_REVIEW_ZIP=$HUMAN_FILLED_RESIDUAL_REVIEW_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.363 residual review ingest script
        run: |
          cat > run_v4_363_guarded_residual_review_ingest_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values approved; numeric baseline approved; observed values loaded; definition/covariance guarded readiness confirmed; baseline predictions computed; residuals computed; residual review may be ingested here; no chi-square; no likelihood; no p-values; no scoring; no support claims"

          ALLOWED_RESIDUAL_REVIEW_DECISIONS = {
              "approve_residuals_for_later_guarded_chi_square_readiness",
              "needs_prediction_repair",
              "needs_observed_value_repair",
              "needs_full_covariance_first",
              "keep_blocked",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def main():
              input_362 = Path(os.environ["INPUT_362_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_RESIDUAL_REVIEW_ZIP"])

              outdir = Path("tairid_v4_363_guarded_residual_review_ingest_no_chi_square_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base362 = extract_zip(input_362, "tairid_v4_363_362_")
              basehuman = extract_zip(human_zip, "tairid_v4_363_human_")

              summary362_path = find_one(base362, "v4_362_summary.json")
              residual_dry_run_path = find_one(base362, "v4_362_guarded_residual_DRY_RUN_NO_CHI_SQUARE_NO_SCORING.csv")
              computed_residuals_path = find_one(base362, "v4_362_COMPUTED_RESIDUALS_NO_CHI_SQUARE_NO_SCORING.csv")
              residual_summary_path = find_one(base362, "v4_362_residual_summary_NO_SCORE.csv")
              blank_review_path = find_one(base362, "v4_362_HUMAN_FILL_guarded_residual_review_NO_CHI_SQUARE_NO_SCORING.csv")
              boundary362_path = find_one(base362, "v4_362_residual_boundary_no_chi_square_no_score.csv")
              next_packet362_path = find_one(base362, "v4_362_next_gate_packet_no_chi_square_no_scoring.csv")
              gap362_path = find_one(base362, "v4_362_gap_status_after_residual_dry_run.csv")
              prediction_input_path = find_one(base362, "v4_362_input_v4_361_prediction_dry_run_preserved.csv")
              rules362_path = find_one(base362, "v4_362_rule_checks.csv")

              human_review_path = find_one_suffix(basehuman, "HUMAN_FILLED_guarded_residual_review_NO_CHI_SQUARE_NO_SCORING.csv")

              summary362 = json.loads(summary362_path.read_text())
              residual_dry_run = pd.read_csv(residual_dry_run_path)
              computed_residuals = pd.read_csv(computed_residuals_path)
              residual_summary = pd.read_csv(residual_summary_path)
              blank_review = pd.read_csv(blank_review_path)
              boundary362 = pd.read_csv(boundary362_path)
              next_packet362 = pd.read_csv(next_packet362_path)
              gap362 = pd.read_csv(gap362_path)
              prediction_input = pd.read_csv(prediction_input_path)
              rules362 = pd.read_csv(rules362_path)
              human_review = pd.read_csv(human_review_path)

              for col in [
                  "human_residual_review_decision",
                  "human_residual_review_note",
                  "human_guarded_diagonal_warning_acknowledgement",
                  "residuals_approved_for_later_chi_square_readiness_now",
              ]:
                  if col not in human_review.columns:
                      human_review[col] = ""

              ingest_rows = []

              for _, row in human_review.iterrows():
                  decision = clean(row["human_residual_review_decision"])

                  if decision == "approve_residuals_for_later_guarded_chi_square_readiness":
                      row_status = "residuals_approved_for_later_guarded_chi_square_readiness_not_chi_square"
                      residuals_approved = True
                      ready_for_chi_square_readiness = True
                  elif decision == "needs_prediction_repair":
                      row_status = "blocked_needs_prediction_repair"
                      residuals_approved = False
                      ready_for_chi_square_readiness = False
                  elif decision == "needs_observed_value_repair":
                      row_status = "blocked_needs_observed_value_repair"
                      residuals_approved = False
                      ready_for_chi_square_readiness = False
                  elif decision == "needs_full_covariance_first":
                      row_status = "blocked_needs_full_covariance_first"
                      residuals_approved = False
                      ready_for_chi_square_readiness = False
                  elif decision == "keep_blocked":
                      row_status = "blocked_by_human_review"
                      residuals_approved = False
                      ready_for_chi_square_readiness = False
                  else:
                      row_status = "invalid_or_missing_residual_review_decision"
                      residuals_approved = False
                      ready_for_chi_square_readiness = False

                  ingest_rows.append({
                      "v4_363_residual_review_ingest_id": f"v4_363_residual_review_ingest_{len(ingest_rows)+1:03d}",
                      "v4_362_residual_dry_run_id": clean(row["v4_362_residual_dry_run_id"]),
                      "v4_357_observed_value_id": clean(row["v4_357_observed_value_id"]),

                      "survey_or_source": clean(row["survey_or_source"]),
                      "tracer_or_sample": clean(row["tracer_or_sample"]),
                      "effective_redshift_z": float(row["effective_redshift_z"]),
                      "observed_fsigma8": float(row["observed_fsigma8"]),
                      "observed_fsigma8_uncertainty": float(row["observed_fsigma8_uncertainty"]),
                      "baseline_fsigma8_prediction": float(row["baseline_fsigma8_prediction"]),
                      "residual_baseline_minus_observed": float(row["residual_baseline_minus_observed"]),
                      "residual_observed_minus_baseline": float(row["residual_observed_minus_baseline"]),
                      "normalized_residual_baseline_minus_observed": float(row["normalized_residual_baseline_minus_observed"]),
                      "absolute_normalized_residual": float(row["absolute_normalized_residual"]),

                      "human_residual_review_decision": decision,
                      "human_residual_review_note": clean(row["human_residual_review_note"]),
                      "human_guarded_diagonal_warning_acknowledgement": clean(row["human_guarded_diagonal_warning_acknowledgement"]),

                      "row_residual_review_status": row_status,
                      "residuals_approved_for_later_chi_square_readiness": residuals_approved,
                      "ready_for_guarded_chi_square_readiness_not_chi_square": ready_for_chi_square_readiness,

                      "chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              ingest = pd.DataFrame(ingest_rows)
              approved_rows = ingest[ingest["ready_for_guarded_chi_square_readiness_not_chi_square"].astype(bool)].copy()
              invalid_rows = ingest[ingest["row_residual_review_status"] == "invalid_or_missing_residual_review_decision"].copy()
              blocked_rows = ingest[~ingest["ready_for_guarded_chi_square_readiness_not_chi_square"].astype(bool)].copy()

              chi_square_readiness_packet = approved_rows.copy()
              chi_square_readiness_packet["chi_square_readiness_status"] = "ready_for_guarded_chi_square_readiness_packet_not_chi_square"
              chi_square_readiness_packet["guarded_diagonal_only"] = True
              chi_square_readiness_packet["full_covariance_available"] = False
              chi_square_readiness_packet["chi_square_computed"] = False
              chi_square_readiness_packet["likelihood_computed"] = False
              chi_square_readiness_packet["p_values_computed"] = False
              chi_square_readiness_packet["score_valid"] = False
              chi_square_readiness_packet["support_allowed"] = False

              boundary_update = pd.DataFrame([
                  {
                      "boundary_id": "V4_363_BOUNDARY_001",
                      "boundary": "Residuals are approved only for later guarded chi-square readiness.",
                      "status": "approved_for_next_readiness_gate",
                  },
                  {
                      "boundary_id": "V4_363_BOUNDARY_002",
                      "boundary": "No chi-square is computed in v4.363.",
                      "status": "blocked_by_design",
                  },
                  {
                      "boundary_id": "V4_363_BOUNDARY_003",
                      "boundary": "No likelihood or p-values are computed in v4.363.",
                      "status": "blocked_by_design",
                  },
                  {
                      "boundary_id": "V4_363_BOUNDARY_004",
                      "boundary": "Full covariance remains unavailable; this is still guarded diagonal only.",
                      "status": "guarded_diagonal_only",
                  },
                  {
                      "boundary_id": "V4_363_BOUNDARY_005",
                      "boundary": "No support claim is allowed from residual review approval.",
                      "status": "blocked_by_design",
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_363_GAP_001",
                      "gap": "Guarded residual review ingested.",
                      "status_after_v4_363": "residuals_approved_for_later_chi_square_readiness" if len(approved_rows) == len(ingest) else "blocked_or_partial",
                      "next_gate": "v4_364_guarded_chi_square_readiness_packet_no_chi_square_no_scoring",
                  },
                  {
                      "gap_id": "V4_363_GAP_002",
                      "gap": "Chi-square remains uncomputed.",
                      "status_after_v4_363": "still_blocked",
                      "next_gate": "v4_364_guarded_chi_square_readiness_packet",
                  },
                  {
                      "gap_id": "V4_363_GAP_003",
                      "gap": "Likelihood and p-values remain uncomputed.",
                      "status_after_v4_363": "still_blocked",
                      "next_gate": "later_likelihood_or_p_value_gate_if_allowed",
                  },
                  {
                      "gap_id": "V4_363_GAP_004",
                      "gap": "Full covariance remains unavailable.",
                      "status_after_v4_363": "guarded_diagonal_only",
                      "next_gate": "full_covariance_repair_lane_if_needed",
                  },
                  {
                      "gap_id": "V4_363_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_363": "still_blocked",
                      "next_gate": "later_support_interpretation_gate_only_after_scoring",
                  },
              ])

              hard_checks = {
                  "input_v4_362_summary_found": summary362.get("version") == "v4.362",
                  "input_v4_362_rules_all_passed": summary_rules_all_passed(summary362),
                  "input_v4_362_failed_gates_none": summary362.get("failed_gates") == "none",
                  "input_v4_362_readiness_residuals_computed": summary362.get("readiness_status") == "guarded_residuals_computed_no_chi_square_no_scoring",
                  "input_v4_362_residuals_computed_true": summary362.get("residuals_computed") is True,
                  "input_v4_362_residual_rows_3": summary362.get("residuals_computed_rows") == 3,
                  "input_v4_362_normalized_residuals_true": summary362.get("normalized_residuals_computed") is True,
                  "input_v4_362_no_chi_square": summary362.get("chi_square_computed") is False,
                  "input_v4_362_no_likelihood": summary362.get("likelihood_computed") is False,
                  "input_v4_362_no_p_values": summary362.get("p_values_computed") is False,
                  "input_v4_362_no_score_valid": summary362.get("score_valid") is False,
                  "input_v4_362_no_support_allowed": summary362.get("support_allowed") is False,

                  "rules362_all_passed": rules362["passed"].astype(bool).all(),
                  "residual_rows_match_summary": len(residual_dry_run) == int(summary362.get("residual_rows")),
                  "computed_residuals_match_summary": len(computed_residuals) == int(summary362.get("residuals_computed_rows")),
                  "residual_summary_rows_equal_4": len(residual_summary) == 4,
                  "blank_review_rows_match_residuals": len(blank_review) == len(residual_dry_run),
                  "boundary362_rows_equal_5": len(boundary362) == 5,
                  "next_packet362_rows_equal_1": len(next_packet362) == 1,
                  "gap362_rows_equal_5": len(gap362) == 5,
                  "prediction_input_rows_match_residuals": len(prediction_input) == len(residual_dry_run),

                  "human_review_rows_match_blank": len(human_review) == len(blank_review),
                  "residual_review_decisions_filled": human_review["human_residual_review_decision"].apply(clean).ne("").all(),
                  "residual_review_decisions_allowed": human_review["human_residual_review_decision"].apply(clean).isin(ALLOWED_RESIDUAL_REVIEW_DECISIONS).all(),
                  "warning_acknowledged_all_rows": human_review["human_guarded_diagonal_warning_acknowledgement"].apply(clean).ne("").all(),
                  "ingest_rows_match_residuals": len(ingest) == len(residual_dry_run),
                  "approved_rows_equal_all": len(approved_rows) == len(ingest),
                  "invalid_rows_equal_0": len(invalid_rows) == 0,
                  "blocked_rows_equal_0": len(blocked_rows) == 0,
                  "chi_square_readiness_rows_equal_approved": len(chi_square_readiness_packet) == len(approved_rows),

                  "chi_square_computed_false": false_col(ingest, "chi_square_computed") and false_col(chi_square_readiness_packet, "chi_square_computed"),
                  "likelihood_computed_false": false_col(ingest, "likelihood_computed") and false_col(chi_square_readiness_packet, "likelihood_computed"),
                  "p_values_computed_false": false_col(ingest, "p_values_computed") and false_col(chi_square_readiness_packet, "p_values_computed"),
                  "score_valid_false": false_col(ingest, "score_valid") and false_col(chi_square_readiness_packet, "score_valid"),
                  "support_allowed_false": false_col(ingest, "support_allowed") and false_col(chi_square_readiness_packet, "support_allowed"),
                  "boundary_update_rows_equal_5": len(boundary_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              if len(approved_rows) == len(ingest):
                  readiness_status = "residuals_approved_for_guarded_chi_square_readiness_not_chi_square"
                  selected_next_route = "v4_364_guarded_chi_square_readiness_packet_no_chi_square_no_scoring_no_support_claims"
              else:
                  readiness_status = "blocked_or_partial_residual_review"
                  selected_next_route = "repair_v4_362_human_residual_review_then_rerun_v4_363"

              summary363 = {
                  "version": "v4.363",
                  "route_name": "v4_363_guarded_residual_review_ingest_no_chi_square_no_scoring_no_support_claims",
                  "expected_result": "v4_363_guarded_residual_review_ingest_passed_residuals_approved_no_chi_square_no_scoring_no_claims",
                  "input_version": "v4.362",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "readiness_status": readiness_status,
                  "residual_review_rows": int(len(ingest)),
                  "residuals_approved_for_later_chi_square_readiness_rows": int(len(approved_rows)),
                  "chi_square_readiness_rows": int(len(chi_square_readiness_packet)),
                  "residuals_computed": True,
                  "normalized_residuals_computed": True,
                  "chi_square_computed": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": selected_next_route,
              }

              ingest.to_csv(outdir / "v4_363_guarded_residual_review_ingest_ledger_NO_CHI_SQUARE_NO_SCORING.csv", index=False)
              approved_rows.to_csv(outdir / "v4_363_RESIDUALS_APPROVED_FOR_CHI_SQUARE_READINESS_NOT_CHI_SQUARE.csv", index=False)
              chi_square_readiness_packet.to_csv(outdir / "v4_363_guarded_chi_square_readiness_packet_NOT_CHI_SQUARE_NOT_SCORING.csv", index=False)
              boundary_update.to_csv(outdir / "v4_363_boundary_no_chi_square_no_score.csv", index=False)
              gap_update.to_csv(outdir / "v4_363_gap_status_after_residual_review_ingest.csv", index=False)
              human_review.to_csv(outdir / "v4_363_input_human_filled_residual_review_preserved.csv", index=False)
              computed_residuals.to_csv(outdir / "v4_363_input_v4_362_computed_residuals_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_363_rule_checks.csv", index=False)

              (outdir / "v4_363_summary.json").write_text(json.dumps(summary363, indent=2))

              summary_md = f"""# TAIRID v4.363 Guarded Residual Review Ingest — No Chi-Square, No Scoring

          Expected result: `{summary363["expected_result"]}`

          {summary363["rules_passed"]} / {summary363["rules_total"]} rules passed

          failed_gates = {summary363["failed_gates"]}

          readiness_status = `{summary363["readiness_status"]}`

          residual_review_rows = {summary363["residual_review_rows"]}

          residuals_approved_for_later_chi_square_readiness_rows = {summary363["residuals_approved_for_later_chi_square_readiness_rows"]}

          chi_square_readiness_rows = {summary363["chi_square_readiness_rows"]}

          chi_square_computed = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step ingests human residual review and approves residuals only for later guarded chi-square readiness.

          It does **not** compute chi-square.

          It does **not** compute likelihood.

          It does **not** compute p-values.

          It does **not** create a valid score.

          It does **not** make support claims.

          Next route: `{selected_next_route}`
          """
              (outdir / "v4_363_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary363, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_363_guarded_residual_review_ingest_no_scoring.py

      - name: Run v4.363 guarded residual review ingest no scoring
        run: |
          python run_v4_363_guarded_residual_review_ingest_no_scoring.py

      - name: Upload v4.363 guarded residual review ingest artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-363-guarded-residual-review-ingest-no-chi-square-no-scoring-output
          path: |
            tairid_v4_363_guarded_residual_review_ingest_no_chi_square_no_scoring_output/
            tairid_v4_363_guarded_residual_review_ingest_no_chi_square_no_scoring_output.zip
