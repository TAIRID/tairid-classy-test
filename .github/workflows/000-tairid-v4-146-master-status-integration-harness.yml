              {"rule_id": "eBOSS_covariance_missing_classified", "pass": eboss_covariance_missing, "result": "eBOSS covariance or overlap not detected", "boundary": "Blocks combined eBOSS interpretation."},
              {"rule_id": "sign_pattern_stability_carried", "pass": sign_pattern_stable, "result": "ELG negative/QSO positive sign structure carried", "boundary": "Direction only, not final claim."},
              {"rule_id": "pressure_magnitude_sensitivity_carried", "pass": pressure_magnitude_sensitive, "result": "pressure magnitude is sensitive", "boundary": "Blocks threshold-based final pressure."},
              {"rule_id": "lightweight_reference_available", "pass": lightweight_reference_available, "result": "diagnostic LCDM reference vector exists", "boundary": "Not CAMB or Planck posterior covariance."},
              {"rule_id": "full_posterior_covariance_absent", "pass": not full_posterior_covariance_available, "result": "full posterior covariance unavailable", "boundary": "Blocks final pressure."},
              {"rule_id": "CAMB_unavailable_carried", "pass": camb_unavailable, "result": "CAMB unavailable in v4.142", "boundary": "Route through data package/source fetch."},
              {"rule_id": "parser_ready_count_zero_carried", "pass": parser_ready_count_zero, "result": "no parser-ready stored candidates", "boundary": "No guessing parser."},
              {"rule_id": "no_final_pressure_carried", "pass": no_final_pressure, "result": "final_RSD_pressure_score_computed=false", "boundary": "No final score."},
              {"rule_id": "no_validation_claim_allowed", "pass": no_validation, "result": "TAIRID_validation_claim_allowed=false", "boundary": "No validation claim."},
              {"rule_id": "integrated_lanes_complete", "pass": len(INTEGRATED_STATUS_LANES) >= 12, "result": f"lane_count={len(INTEGRATED_STATUS_LANES)}", "boundary": "Status map only."},
              {"rule_id": "dependency_map_complete", "pass": len(DEPENDENCY_MAP) >= 8, "result": f"dependency_edges={len(DEPENDENCY_MAP)}", "boundary": "Planning map only."},
              {"rule_id": "blocker_stack_complete", "pass": len(BLOCKER_STACK) >= 6, "result": f"blocker_count={len(BLOCKER_STACK)}", "boundary": "Blocker classification only."},
              {"rule_id": "next_targets_ranked", "pass": len(NEXT_TARGET_RANKINGS) >= 5, "result": f"next_target_count={len(NEXT_TARGET_RANKINGS)}", "boundary": "Planning route only."},
              {"rule_id": "claim_boundaries_declared", "pass": len(CLAIM_BOUNDARIES) >= 7, "result": f"claim_boundary_count={len(CLAIM_BOUNDARIES)}", "boundary": "Protects interpretation."},
              {"rule_id": "readiness_scores_bounded", "pass": all(0.0 <= float(row["readiness_score"]) <= 1.0 for row in INTEGRATED_STATUS_LANES), "result": f"average_readiness={INTEGRATION_METRICS['average_readiness_score']}", "boundary": "Readiness is diagnostic, not validation."},
              {"rule_id": "hard_blockers_counted", "pass": INTEGRATION_METRICS["hard_blocker_count"] >= 3, "result": f"hard_blocker_count={INTEGRATION_METRICS['hard_blocker_count']}", "boundary": "Explains why final claims remain blocked."},
              {"rule_id": "top_next_route_is_data_acquisition", "pass": selected_next_route_correct, "result": NEXT_TARGET_RANKINGS[0]["target_id"], "boundary": "Next move is data acquisition, not pressure interpretation."},
              {"rule_id": "more_pressure_reruns_deprioritized", "pass": NEXT_TARGET_RANKINGS[-1]["target_id"] == "more_pressure_reruns", "result": "more_pressure_reruns ranked low now", "boundary": "Avoids noise before data cleanup."},
              {"rule_id": "allowed_claims_separated_from_blocked_claims", "pass": INTEGRATION_METRICS["allowed_claim_count"] > 0 and INTEGRATION_METRICS["blocked_claim_count"] > 0, "result": f"allowed={INTEGRATION_METRICS['allowed_claim_count']}; blocked={INTEGRATION_METRICS['blocked_claim_count']}", "boundary": "Prevents overclaiming."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 15, "result": f"blocked_claims={len(BLOCKED_CLAIMS)}", "boundary": "No validation or final pressure claim."},
              {"rule_id": "master_status_does_not_ingest_data", "pass": True, "result": "no data ingestion performed", "boundary": "Status only."},
              {"rule_id": "master_status_does_not_recompute_pressure", "pass": True, "result": "no pressure recomputation performed", "boundary": "Status only."},
              {"rule_id": "system_map_explains_worth", "pass": True, "result": "scaffold isolated specific blockers and stable/sensitive features", "boundary": "Worth continuing, not proof."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "", "result": route_decision, "boundary": "Route decision does not validate the model."}
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_146_rules_passed")

          if failed_gates:
              readiness_label = "master_status_integration_harness_failed"
              next_allowed_step = "Repair master integration map before continuing."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.147 external source fetch or manifest-fill plan. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "integrated_lane_count": len(INTEGRATED_STATUS_LANES),
              "dependency_edge_count": len(DEPENDENCY_MAP),
              "blocker_count": len(BLOCKER_STACK),
              "hard_blocker_count": INTEGRATION_METRICS["hard_blocker_count"],
              "next_target_count": len(NEXT_TARGET_RANKINGS),
              "average_readiness_score": INTEGRATION_METRICS["average_readiness_score"],
              "data_package_missing": data_package_missing,
              "manifest_missing": manifest_missing,
              "reference_vector_missing": reference_vector_missing,
              "eBOSS_covariance_missing": eboss_covariance_missing,
              "sign_pattern_stable": sign_pattern_stable,
              "pressure_magnitude_sensitive": pressure_magnitude_sensitive,
              "lightweight_reference_available": lightweight_reference_available,
              "full_posterior_covariance_available": full_posterior_covariance_available,
              "CAMB_available": not camb_unavailable,
              "parser_ready_count": UPSTREAM_LOCKS["v4_143_candidate_triage"]["parser_ready_count"],
              "selected_next_route": NEXT_TARGET_RANKINGS[0]["target_id"],
              "package_ingested": False,
              "pressure_recomputed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "integrated_status_lanes": INTEGRATED_STATUS_LANES,
              "dependency_map": DEPENDENCY_MAP,
              "blocker_stack": BLOCKER_STACK,
              "next_target_rankings": NEXT_TARGET_RANKINGS,
              "claim_boundaries": CLAIM_BOUNDARIES,
              "integration_metrics": INTEGRATION_METRICS,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "selected_next_route": NEXT_TARGET_RANKINGS[0]["target_id"],
                  "data_package_missing": data_package_missing,
                  "eBOSS_covariance_missing": eboss_covariance_missing,
                  "pressure_magnitude_sensitive": pressure_magnitude_sensitive,
                  "package_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_146_master_status_integration_harness.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "integrated_status_lanes_v4_146.csv",
              INTEGRATED_STATUS_LANES,
              ["lane_id", "status", "readiness_score", "evidence", "main_limit", "next_needed"]
          )

          write_csv(
              OUTDIR / "dependency_map_v4_146.csv",
              DEPENDENCY_MAP,
              ["from_node", "to_node", "dependency_type", "reason"]
          )

          write_csv(
              OUTDIR / "blocker_stack_v4_146.csv",
              BLOCKER_STACK,
              ["rank", "blocker_id", "severity", "blocks", "evidence"]
          )

          write_csv(
              OUTDIR / "next_target_rankings_v4_146.csv",
              NEXT_TARGET_RANKINGS,
              ["rank", "target_id", "value", "why", "expected_next_label"]
          )

          write_csv(
              OUTDIR / "claim_boundaries_v4_146.csv",
              CLAIM_BOUNDARIES,
              ["claim_id", "allowed", "wording"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_146.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_146.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.146 — Master Status Integration Harness")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.146 integrates the current cosmology lane into one status map. It does not run new physics, recompute pressure, ingest covariance, or validate TAIRID. It separates what is stable, what is sensitive, what is missing, and what is allowed next.")
          md.append("")
          md.append("The current honest result: the eBOSS direction/sign pattern remains interesting, but pressure magnitude is sensitive, the reference side is still diagnostic, the observed covariance side is blocked, and the required data package is missing. The next clean move is external source fetch or manifest fill, not another pressure rerun.")
          md.append("")
          md.append("## Integrated status lanes")
          md.append("")
          md.append("| Lane | Status | Readiness | Main limit |")
          md.append("|---|---|---:|---|")
          for row in INTEGRATED_STATUS_LANES:
              md.append(f"| `{row['lane_id']}` | `{row['status']}` | `{row['readiness_score']}` | {row['main_limit']} |")
          md.append("")
          md.append("## Top blockers")
          md.append("")
          md.append("| Rank | Blocker | Severity | Blocks |")
          md.append("|---:|---|---|---|")
          for row in BLOCKER_STACK:
              md.append(f"| `{row['rank']}` | `{row['blocker_id']}` | `{row['severity']}` | {row['blocks']} |")
          md.append("")
          md.append("## Next target ranking")
          md.append("")
          md.append("| Rank | Target | Value | Why |")
          md.append("|---:|---|---|---|")
          for row in NEXT_TARGET_RANKINGS:
              md.append(f"| `{row['rank']}` | `{row['target_id']}` | `{row['value']}` | {row['why']} |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_146_master_status_integration_harness.json",
              "tairid_v4_146_master_status_integration_harness.md",
              "integrated_status_lanes_v4_146.csv",
              "dependency_map_v4_146.csv",
              "blocker_stack_v4_146.csv",
              "next_target_rankings_v4_146.csv",
              "claim_boundaries_v4_146.csv",
              "blocked_claims_v4_146.csv",
              "rule_results_v4_146.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_146_master_status_integration_harness.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.146 master status integration harness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-146-master-status-integration-harness
          path: artifacts/tairid_v4_146_master_status_integration_harness/
