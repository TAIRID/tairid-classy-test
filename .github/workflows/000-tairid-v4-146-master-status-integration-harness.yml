name: 000 TAIRID v4.146 Master Status Integration Harness

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-146-master-status-integration-harness.yml"

jobs:
  tairid-v4-146-master-status-integration-harness:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
