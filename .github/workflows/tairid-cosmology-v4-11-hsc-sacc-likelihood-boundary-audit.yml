name: TAIRID Cosmology v4.11 HSC SACC Likelihood Boundary Audit

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-11-hsc-sacc-likelihood-boundary-audit.yml"
      - "scripts/tairid_cosmology_v4_11_hsc_sacc_likelihood_boundary_audit.py"

jobs:
  hsc-sacc-likelihood-boundary-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.11 HSC SACC likelihood boundary audit
        shell: bash
        run: |
          python scripts/tairid_cosmology_v4_11_hsc_sacc_likelihood_boundary_audit.py

      - name: Upload TAIRID v4.11 HSC SACC likelihood boundary audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v4-11-hsc-sacc-likelihood-boundary-audit
          path: artifacts/tairid_cosmology_v4_11_hsc_sacc_likelihood_boundary_audit/
