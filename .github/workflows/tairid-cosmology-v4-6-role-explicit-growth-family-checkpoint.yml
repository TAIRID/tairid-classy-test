name: TAIRID Cosmology v4.6 Role Explicit Growth Family Checkpoint

on:
  workflow_dispatch:

jobs:
  role-explicit-growth-family-checkpoint:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.6 role explicit growth family checkpoint
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_6_role_explicit_growth_family_checkpoint

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_6_role_explicit_growth_family_checkpoint")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_6_role_explicit_growth_family_checkpoint"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine KiDS, DES, and HSC into one posterior.",
              "This does not promote any survey into a model anchor.",
              "This checkpoint keeps lensing-only, 3x2pt, and decomposition rows role-explicit.",
              "A pass means the growth/consolidation diagnostic direction repeats under role-explicit row handling, not that TAIRID is validated."
          ]

          SOURCE_LEDGER = [
              {
                  "source_id": "v4_1_des_hsc_growth_family_repair",
                  "family": "KiDS_DES_HSC",
                  "source_type": "prior_artifact",
                  "used_for": "Original growth-family S8 rows and family-strength warnings."
              },
              {
                  "source_id": "v4_2_s8_sigma8_omegam_decomposition",
                  "family": "DES_and_Planck",
                  "source_type": "prior_artifact",
                  "used_for": "DES S8/Omega_m/reconstructed sigma8 decomposition and Planck chain axis reference."
              },
              {
                  "source_id": "v4_4_3_kids_readme_guided_parser_fallback",
                  "family": "KiDS",
                  "source_type": "prior_artifact",
                  "used_for": "Direct KiDS 3x2pt S8, sigma8, and Omega_m chain axes."
              },
              {
                  "source_id": "v4_5_kids_role_boundary_pressure_replacement_audit",
                  "family": "KiDS",
                  "source_type": "prior_artifact",
                  "used_for": "Role boundary policy separating KiDS cosmic shear from KiDS direct 3x2pt."
              }
          ]

          PLANCK_AXIS_REFERENCE = {
              "S8": {"q50": 0.824821, "sigma_68": 0.012218},
              "sigma8": {"q50": 0.810123, "sigma_68": 0.006639},
              "Omega_m": {"q50": 0.310797, "sigma_68": 0.006153}
          }

          ROLE_BOUNDARIES = [
              {
                  "boundary_id": "lensing_only_rows_are_not_3x2pt_rows",
                  "status": "enforced",
                  "rule": "Cosmic-shear-only rows stay in the lensing-only lane."
              },
              {
                  "boundary_id": "three_by_two_rows_are_not_lensing_only_rows",
                  "status": "enforced",
                  "rule": "3x2pt rows stay in the multiprobe lane."
              },
              {
                  "boundary_id": "direct_chain_axes_preferred_for_decomposition",
                  "status": "enforced",
                  "rule": "Direct parsed chain axes are preferred for sigma8/Omega_m decomposition when available."
              },
              {
                  "boundary_id": "no_hidden_kids_replacement",
                  "status": "enforced",
                  "rule": "KiDS direct 3x2pt may replace only the older carried KiDS 3x2pt row, not the published cosmic-shear-only row."
              },
              {
                  "boundary_id": "no_survey_combined_posterior",
                  "status": "enforced",
                  "rule": "This checkpoint does not combine KiDS, DES, and HSC into a new posterior."
              }
          ]

          # Role-explicit growth rows.
          # For summary rows with asymmetric uncertainty, the directional sigma points toward Planck.
          INPUT_ROWS = [
              {
                  "row_id": "kids1000_published_cosmic_shear_only",
                  "family": "KiDS",
                  "lane": "lensing_only_growth",
                  "row_role": "cosmic_shear_only_lensing_growth",
                  "observable_scope": "cosmic_shear_only",
                  "product_type": "published_summary",
                  "axis": "S8",
                  "value": 0.759,
                  "sigma_minus": 0.021,
                  "sigma_plus": 0.024,
                  "source_status": "role_distinct_summary_row",
                  "family_count_policy": "counts_once_for_KiDS_in_lensing_only_lane"
              },
              {
                  "row_id": "des_y3_cosmic_shear_only",
                  "family": "DES",
                  "lane": "lensing_only_growth",
                  "row_role": "cosmic_shear_only_lensing_growth",
                  "observable_scope": "cosmic_shear_only",
                  "product_type": "published_summary",
                  "axis": "S8",
                  "value": 0.772,
                  "sigma_minus": 0.017,
                  "sigma_plus": 0.018,
                  "source_status": "role_distinct_summary_row",
                  "family_count_policy": "counts_once_for_DES_in_lensing_only_lane"
              },
              {
                  "row_id": "hsc_y3_cosmic_shear_power_spectra",
                  "family": "HSC",
                  "lane": "lensing_only_growth",
                  "row_role": "cosmic_shear_only_lensing_growth",
                  "observable_scope": "cosmic_shear_only",
                  "product_type": "published_summary",
                  "axis": "S8",
                  "value": 0.776,
                  "sigma_minus": 0.033,
                  "sigma_plus": 0.032,
                  "source_status": "role_distinct_summary_row",
                  "family_count_policy": "counts_once_for_HSC_in_lensing_only_lane"
              },
              {
                  "row_id": "kids1000_direct_3x2pt_fiducial_chain",
                  "family": "KiDS",
                  "lane": "three_by_two_growth",
                  "row_role": "fiducial_3x2pt_cosmic_shear_ggl_galaxy_clustering",
                  "observable_scope": "cosmic_shear_plus_ggl_plus_galaxy_clustering",
                  "product_type": "direct_chain_parse",
                  "axis": "S8",
                  "value": 0.7645649990442438,
                  "sigma_68": 0.01632059899225302,
                  "source_status": "direct_chain_row",
                  "family_count_policy": "counts_once_for_KiDS_in_3x2pt_lane"
              },
              {
                  "row_id": "des_y3_3x2pt_combined",
                  "family": "DES",
                  "lane": "three_by_two_growth",
                  "row_role": "3x2pt_combined_growth",
                  "observable_scope": "galaxy_clustering_plus_ggl_plus_cosmic_shear",
                  "product_type": "published_summary",
                  "axis": "S8",
                  "value": 0.776,
                  "sigma_minus": 0.017,
                  "sigma_plus": 0.017,
                  "source_status": "published_summary_row",
                  "family_count_policy": "counts_once_for_DES_in_3x2pt_lane"
              },
              {
                  "row_id": "kids1000_direct_3x2pt_fiducial_chain_sigma8",
                  "family": "KiDS",
                  "lane": "decomposition",
                  "row_role": "fiducial_3x2pt_direct_sigma8_axis",
                  "observable_scope": "cosmic_shear_plus_ggl_plus_galaxy_clustering",
                  "product_type": "direct_chain_parse",
                  "axis": "sigma8",
                  "value": 0.758678356712955,
                  "sigma_68": 0.02158338779753677,
                  "source_status": "direct_chain_decomposition_axis",
                  "family_count_policy": "decomposition_axis_not_extra_family_surface"
              },
              {
                  "row_id": "kids1000_direct_3x2pt_fiducial_chain_omegam",
                  "family": "KiDS",
                  "lane": "decomposition",
                  "row_role": "fiducial_3x2pt_direct_omegam_axis",
                  "observable_scope": "cosmic_shear_plus_ggl_plus_galaxy_clustering",
                  "product_type": "direct_chain_parse",
                  "axis": "Omega_m",
                  "value": 0.3048090486225367,
                  "sigma_68": 0.012390754602697285,
                  "source_status": "direct_chain_decomposition_axis",
                  "family_count_policy": "decomposition_axis_not_extra_family_surface"
              },
              {
                  "row_id": "des_y3_3x2pt_reconstructed_sigma8",
                  "family": "DES",
                  "lane": "decomposition",
                  "row_role": "3x2pt_reconstructed_sigma8_from_S8_and_Omega_m",
                  "observable_scope": "galaxy_clustering_plus_ggl_plus_cosmic_shear",
                  "product_type": "published_summary_reconstruction",
                  "axis": "sigma8",
                  "value": "",
                  "s8": 0.776,
                  "s8_sigma_minus": 0.017,
                  "s8_sigma_plus": 0.017,
                  "omegam": 0.339,
                  "omegam_sigma_minus": 0.031,
                  "omegam_sigma_plus": 0.032,
                  "source_status": "reconstructed_from_published_summary_not_direct_chain",
                  "family_count_policy": "decomposition_axis_not_extra_family_surface"
              },
              {
                  "row_id": "des_y3_3x2pt_omegam",
                  "family": "DES",
                  "lane": "decomposition",
                  "row_role": "3x2pt_published_omegam_axis",
                  "observable_scope": "galaxy_clustering_plus_ggl_plus_cosmic_shear",
                  "product_type": "published_summary",
                  "axis": "Omega_m",
                  "value": 0.339,
                  "sigma_minus": 0.031,
                  "sigma_plus": 0.032,
                  "source_status": "published_summary_decomposition_axis",
                  "family_count_policy": "decomposition_axis_not_extra_family_surface"
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def directional_sigma(value, sigma_minus, sigma_plus, reference_value):
              if reference_value >= value:
                  return float(sigma_plus)
              return float(sigma_minus)

          def reconstruct_sigma8(s8, omega_m):
              return float(s8) / math.sqrt(float(omega_m) / 0.3)

          def reconstruct_sigma8_uncertainty(row):
              center = reconstruct_sigma8(row["s8"], row["omegam"])

              corners = []
              for s8_candidate in [row["s8"] - row["s8_sigma_minus"], row["s8"] + row["s8_sigma_plus"]]:
                  for om_candidate in [row["omegam"] - row["omegam_sigma_minus"], row["omegam"] + row["omegam_sigma_plus"]]:
                      if om_candidate > 0:
                          corners.append(reconstruct_sigma8(s8_candidate, om_candidate))

              sigma_minus = center - min(corners)
              sigma_plus = max(corners) - center

              return center, max(0.0, sigma_minus), max(0.0, sigma_plus)

          def pressure(value, sigma, axis):
              ref = PLANCK_AXIS_REFERENCE[axis]
              delta = float(value) - float(ref["q50"])
              combined = math.sqrt(float(sigma) ** 2 + float(ref["sigma_68"]) ** 2)
              z = delta / combined if combined > 0 else float("nan")

              if delta < 0:
                  direction = "negative"
              elif delta > 0:
                  direction = "positive"
              else:
                  direction = "zero"

              abs_z = abs(z)
              if abs_z >= 2.5:
                  strength = "strong"
              elif abs_z >= 1.5:
                  strength = "moderate"
              elif abs_z >= 0.25:
                  strength = "weak"
              else:
                  strength = "near_zero"

              return {
                  "planck_value": ref["q50"],
                  "planck_sigma": ref["sigma_68"],
                  "delta_observable_minus_planck": delta,
                  "combined_sigma": combined,
                  "pressure_z": z,
                  "direction": direction,
                  "strength": strength
              }

          pressure_rows = []

          for row in INPUT_ROWS:
              row = dict(row)
              axis = row["axis"]

              if row["row_id"] == "des_y3_3x2pt_reconstructed_sigma8":
                  center, sigma_minus, sigma_plus = reconstruct_sigma8_uncertainty(row)
                  row["value"] = center
                  row["sigma_minus"] = sigma_minus
                  row["sigma_plus"] = sigma_plus

              if "sigma_68" in row:
                  sigma_used = float(row["sigma_68"])
                  sigma_logic = "direct_symmetric_68_width"
              else:
                  sigma_used = directional_sigma(
                      float(row["value"]),
                      float(row["sigma_minus"]),
                      float(row["sigma_plus"]),
                      PLANCK_AXIS_REFERENCE[axis]["q50"]
                  )
                  sigma_logic = "directional_summary_width_toward_planck"

              result = pressure(row["value"], sigma_used, axis)

              pressure_rows.append({
                  "row_id": row["row_id"],
                  "family": row["family"],
                  "lane": row["lane"],
                  "row_role": row["row_role"],
                  "observable_scope": row["observable_scope"],
                  "product_type": row["product_type"],
                  "axis": axis,
                  "observable_value": row["value"],
                  "observable_sigma": sigma_used,
                  "sigma_logic": sigma_logic,
                  "planck_value": result["planck_value"],
                  "planck_sigma": result["planck_sigma"],
                  "delta_observable_minus_planck": result["delta_observable_minus_planck"],
                  "combined_sigma": result["combined_sigma"],
                  "pressure_z": result["pressure_z"],
                  "direction": result["direction"],
                  "strength": result["strength"],
                  "source_status": row["source_status"],
                  "family_count_policy": row["family_count_policy"]
              })

          def summarize_lane(lane, axis="S8"):
              rows = [
                  row for row in pressure_rows
                  if row["lane"] == lane and row["axis"] == axis
              ]

              families = sorted(set(row["family"] for row in rows))
              negative_count = sum(1 for row in rows if row["direction"] == "negative")
              flipped_count = sum(1 for row in rows if row["direction"] == "positive")
              strong_count = sum(1 for row in rows if row["strength"] == "strong")
              moderate_or_stronger_count = sum(1 for row in rows if row["strength"] in ["moderate", "strong"])
              weak_or_near_zero_count = sum(1 for row in rows if row["strength"] in ["weak", "near_zero"])

              if flipped_count > 0:
                  lane_status = "lane_failed_one_or_more_rows_flipped_positive"
              elif negative_count == len(rows) and moderate_or_stronger_count == len(rows):
                  lane_status = "lane_negative_all_rows_moderate_or_stronger"
              elif negative_count == len(rows) and moderate_or_stronger_count >= 2:
                  lane_status = "lane_negative_all_rows_with_strength_warning"
              elif negative_count == len(rows):
                  lane_status = "lane_negative_all_rows_weak_overall"
              else:
                  lane_status = "lane_not_classified"

              best_row = None
              if rows:
                  best_row = max(rows, key=lambda r: abs(r["pressure_z"]))

              return {
                  "lane": lane,
                  "axis": axis,
                  "row_count": len(rows),
                  "family_count": len(families),
                  "families": ";".join(families),
                  "negative_count": negative_count,
                  "flipped_count": flipped_count,
                  "strong_count": strong_count,
                  "moderate_or_stronger_count": moderate_or_stronger_count,
                  "weak_or_near_zero_count": weak_or_near_zero_count,
                  "lane_status": lane_status,
                  "representative_row_id": best_row["row_id"] if best_row else "",
                  "representative_pressure_z": best_row["pressure_z"] if best_row else "",
                  "representative_strength": best_row["strength"] if best_row else ""
              }

          lane_summary_rows = [
              summarize_lane("lensing_only_growth", "S8"),
              summarize_lane("three_by_two_growth", "S8")
          ]

          decomposition_rows = [
              row for row in pressure_rows
              if row["lane"] == "decomposition"
          ]

          sigma8_rows = [row for row in decomposition_rows if row["axis"] == "sigma8"]
          omegam_rows = [row for row in decomposition_rows if row["axis"] == "Omega_m"]

          sigma8_negative_count = sum(1 for row in sigma8_rows if row["direction"] == "negative")
          omegam_strong_or_moderate_count = sum(1 for row in omegam_rows if row["strength"] in ["moderate", "strong"])
          omegam_negative_count = sum(1 for row in omegam_rows if row["direction"] == "negative")
          omegam_positive_count = sum(1 for row in omegam_rows if row["direction"] == "positive")

          if sigma8_negative_count == len(sigma8_rows) and len(sigma8_rows) >= 2 and omegam_strong_or_moderate_count == 0:
              decomposition_status = "amplitude_side_pressure_supported_over_pure_omegam_pressure"
          elif sigma8_negative_count >= 1:
              decomposition_status = "partial_amplitude_side_pressure_supported"
          else:
              decomposition_status = "decomposition_inconclusive"

          decomposition_summary = {
              "decomposition_status": decomposition_status,
              "sigma8_row_count": len(sigma8_rows),
              "sigma8_negative_count": sigma8_negative_count,
              "omegam_row_count": len(omegam_rows),
              "omegam_negative_count": omegam_negative_count,
              "omegam_positive_count": omegam_positive_count,
              "omegam_strong_or_moderate_count": omegam_strong_or_moderate_count
          }

          failed_gates = []
          warnings = []

          role_boundaries_enforced = all(row["status"] == "enforced" for row in ROLE_BOUNDARIES)

          if not role_boundaries_enforced:
              failed_gates.append("role_boundaries_not_enforced")

          for lane_summary in lane_summary_rows:
              if lane_summary["flipped_count"] > 0:
                  failed_gates.append(f"{lane_summary['lane']}_has_positive_flip")

              if lane_summary["negative_count"] != lane_summary["row_count"]:
                  failed_gates.append(f"{lane_summary['lane']}_not_all_rows_negative")

              if lane_summary["moderate_or_stronger_count"] < 2:
                  failed_gates.append(f"{lane_summary['lane']}_fewer_than_two_rows_moderate_or_stronger")

              if lane_summary["weak_or_near_zero_count"] > 0:
                  warnings.append(f"{lane_summary['lane']}_has_weak_or_near_zero_rows")

              if lane_summary["strong_count"] < lane_summary["row_count"]:
                  warnings.append(f"{lane_summary['lane']}_not_all_rows_strong")

          if decomposition_status != "amplitude_side_pressure_supported_over_pure_omegam_pressure":
              warnings.append("decomposition_does_not_cleanly_support_amplitude_side_over_omegam")

          if failed_gates:
              readiness_label = "role_explicit_growth_family_checkpoint_failed"
              next_step = "Repair role-explicit growth rows before parser expansion."
          else:
              readiness_label = "role_explicit_growth_family_checkpoint_passed_with_strength_warnings"
              next_step = (
                  "Proceed to v4.7 DES/HSC direct product repair. "
                  "The role-explicit growth checkpoint passed, but DES/HSC still need cleaner direct posterior products."
              )

          interpretation = (
              "The role-explicit checkpoint preserves the negative growth/consolidation direction without mixing KiDS row roles. "
              "The lensing-only lane is negative across KiDS, DES, and HSC, with HSC weaker. "
              "The 3x2pt lane is negative across KiDS and DES. "
              "The decomposition lane supports an amplitude-side reading because KiDS and DES sigma8-side rows are negative while Omega_m is not carrying a strong common pressure."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_ledger": SOURCE_LEDGER,
              "planck_axis_reference": PLANCK_AXIS_REFERENCE,
              "role_boundaries": ROLE_BOUNDARIES,
              "pressure_rows": pressure_rows,
              "lane_summary_rows": lane_summary_rows,
              "decomposition_summary": decomposition_summary,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_growth_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "model_anchor_promotion_allowed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "role_boundaries_enforced": role_boundaries_enforced,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "combined_posterior_allowed": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "role_explicit_growth_pressure_rows_v4_6.csv",
              pressure_rows,
              [
                  "row_id",
                  "family",
                  "lane",
                  "row_role",
                  "observable_scope",
                  "product_type",
                  "axis",
                  "observable_value",
                  "observable_sigma",
                  "sigma_logic",
                  "planck_value",
                  "planck_sigma",
                  "delta_observable_minus_planck",
                  "combined_sigma",
                  "pressure_z",
                  "direction",
                  "strength",
                  "source_status",
                  "family_count_policy"
              ]
          )

          write_csv(
              OUTDIR / "growth_lane_summary_v4_6.csv",
              lane_summary_rows,
              [
                  "lane",
                  "axis",
                  "row_count",
                  "family_count",
                  "families",
                  "negative_count",
                  "flipped_count",
                  "strong_count",
                  "moderate_or_stronger_count",
                  "weak_or_near_zero_count",
                  "lane_status",
                  "representative_row_id",
                  "representative_pressure_z",
                  "representative_strength"
              ]
          )

          write_csv(
              OUTDIR / "role_boundaries_v4_6.csv",
              ROLE_BOUNDARIES,
              ["boundary_id", "status", "rule"]
          )

          write_csv(
              OUTDIR / "decomposition_summary_v4_6.csv",
              [decomposition_summary],
              [
                  "decomposition_status",
                  "sigma8_row_count",
                  "sigma8_negative_count",
                  "omegam_row_count",
                  "omegam_negative_count",
                  "omegam_positive_count",
                  "omegam_strong_or_moderate_count"
              ]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_role_explicit_growth_checkpoint",
                  "status": "allowed_with_boundary",
                  "wording": "The growth-family checkpoint was rebuilt with explicit row roles and separate lanes.",
                  "boundary": "Diagnostic checkpoint only, not validation."
              },
              {
                  "interpretation_id": "allowed_lensing_lane_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The lensing-only S8 lane is negative across KiDS, DES, and HSC, with uneven strength.",
                  "boundary": "This is not a combined posterior or model proof."
              },
              {
                  "interpretation_id": "allowed_3x2pt_lane_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The 3x2pt S8 lane is negative across KiDS direct chain and DES summary rows.",
                  "boundary": "KiDS direct chain and DES summary rows have different product status."
              },
              {
                  "interpretation_id": "allowed_decomposition_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Available decomposition rows support an amplitude-side pressure reading over a pure Omega_m pressure reading.",
                  "boundary": "Diagnostic decomposition only; DES/HSC still need cleaner direct posterior products."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID is validated.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_model_comparison_claim",
                  "status": "forbidden",
                  "wording": "A likelihood, BIC, or model comparison was run.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_combined_posterior_claim",
                  "status": "forbidden",
                  "wording": "KiDS, DES, and HSC were combined into a posterior.",
                  "boundary": "Blocked."
              }
          ]

          write_csv(
              OUTDIR / "interpretation_boundaries_v4_6.csv",
              interpretation_rows,
              ["interpretation_id", "status", "wording", "boundary"]
          )

          json_path = OUTDIR / "tairid_cosmology_v4_6_role_explicit_growth_family_checkpoint.json"
