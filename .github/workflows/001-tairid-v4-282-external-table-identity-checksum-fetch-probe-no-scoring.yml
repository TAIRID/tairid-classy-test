              {"gate": "all_source_coverage_no_validated_scoring_table", "passed": all(row["source_has_validated_scoring_table"] is False for row in source_table_coverage_rows), "detail": "no source has validated scoring table"},
              {"gate": "all_source_coverage_no_score", "passed": all(row["score_allowed"] is False for row in source_table_coverage_rows), "detail": "source coverage score blocked"},
              {"gate": "checksum_policy_blocks_evidence", "passed": any(row["object"] == "documentation_endpoint_hash" and "evidence" in row["blocked_use"] for row in checksum_policy_rows), "detail": "documentation hash evidence blocked"},
              {"gate": "raw_file_hash_policy_guarded", "passed": any(row["object"] == "raw_file_hash" and "parser contract" in row["blocked_use"] for row in checksum_policy_rows), "detail": "raw file hash guarded"},
              {"gate": "parser_needs_present_for_bao", "passed": any(row["source_kind"] == "external_geometry_BAO" for row in parser_contract_need_rows), "detail": "BAO parser need present"},
