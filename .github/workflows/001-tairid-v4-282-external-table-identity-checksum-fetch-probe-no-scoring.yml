name: 001 TAIRID v4.282 - External Table Identity Checksum Fetch Probe No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-282-external-table-identity-checksum-fetch-probe-no-scoring.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  external-table-identity-checksum-fetch-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.282 External Table Identity Checksum Fetch Probe No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.282 external table identity checksum fetch probe no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import urllib.request
          import urllib.error
          import zipfile

          VERSION = "v4.282"
          ROUTE = "external_table_identity_checksum_fetch_probe_no_scoring_after_v4_281"
          EXPECTED_RESULT = "v4_282_external_table_identity_checksum_fetch_probe_no_scoring_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_283_external_table_selection_and_parser_contract_no_scoring"

          OUT = Path("tairid_v4_282_external_table_identity_checksum_fetch_probe_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-282-external-table-identity-checksum-fetch-probe-output.zip"
          MAX_PROBE_BYTES = 524288

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def probe_url_bytes(url, max_bytes=MAX_PROBE_BYTES, timeout=10):
              row = {
                  "url": url,
                  "fetch_probe_attempted": True,
                  "fetch_probe_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "probe_sha256_first_bytes": "",
                  "error": "",
                  "probe_status": "nonbinding_endpoint_probe_only",
              }
              try:
                  req = urllib.request.Request(
                      url,
                      method="GET",
                      headers={
                          "User-Agent": "TAIRID-v4.282-no-scoring-probe",
                          "Range": f"bytes=0-{max_bytes-1}",
                      },
                  )
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      row["status_code"] = getattr(resp, "status", "")
                      row["content_type"] = resp.headers.get("Content-Type", "")
                      row["content_length_header"] = resp.headers.get("Content-Length", "")
                      row["final_url"] = resp.geturl()
                      row["bytes_read"] = len(data)
                      row["probe_sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      row["fetch_probe_ok"] = True
                      return row
              except Exception as exc:
                  row["error"] = f"{type(exc).__name__}: {exc}"
                  return row

