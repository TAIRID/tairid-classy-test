              {"gate": "inherited_v4_281_rows_equal_10", "passed": len(inherited_v4_281_rows) == 10, "detail": f"inherited_v4_281_rows = {len(inherited_v4_281_rows)}"},
              {"gate": "frozen_precommit_card_rows_equal_6", "passed": len(frozen_precommit_card_rows) == 6, "detail": f"frozen_precommit_card_rows = {len(frozen_precommit_card_rows)}"},
              {"gate": "table_identity_candidate_rows_equal_10", "passed": len(table_identity_candidate_rows) == 10, "detail": f"table_identity_candidate_rows = {len(table_identity_candidate_rows)}"},
              {"gate": "fetch_probe_rows_equal_10", "passed": len(fetch_probe_rows) == 10, "detail": f"fetch_probe_rows = {len(fetch_probe_rows)}"},
              {"gate": "table_identity_status_rows_equal_10", "passed": len(table_identity_status_rows) == 10, "detail": f"table_identity_status_rows = {len(table_identity_status_rows)}"},
