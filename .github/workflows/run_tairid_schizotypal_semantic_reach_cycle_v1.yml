name: Run TAIRID schizotypal semantic reach cycle v1

on:
  workflow_dispatch:

jobs:
  run-tairid-schizotypal-semantic-reach-cycle-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy pandas matplotlib openpyxl pyreadstat pyreadr

      - name: Run TAIRID schizotypal semantic reach cycle v1
        run: |
          python run_tairid_schizotypal_semantic_reach_cycle_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-schizotypal-semantic-reach-cycle-v1-output
          path: |
            tairid_schizotypal_semantic_reach_cycle_v1_outputs/**
