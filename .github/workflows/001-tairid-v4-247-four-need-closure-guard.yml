name: 001 TAIRID v4.247 - Four Need Closure Guard

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-247-four-need-closure-guard.yml"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  four-need-closure-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.247 Four Need Closure Guard is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.247 four need closure guard
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import zipfile

          VERSION = "v4.247"
          ROUTE = "parameter_freeze_guard_external_observed_manifest_builder_secondary_control_review_combined_matrix_recheck_after_v4_246"
          EXPECTED_RESULT = "v4_247_four_need_closure_guard_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_248_four_need_closure_review_or_external_source_search"

          OUT = Path("tairid_v4_247_four_need_closure_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-247-four-need-closure-guard-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          FROZEN_PRIOR_GATE = {
              "gate_id": "prior_joint_gate_v0_1",
              "A": 0.6580586049,
              "z_t": 0.2224541370,
              "p": 2.0,
              "formula": "G(z)=exp[-A*(z/(z+z_t))^p]",
              "origin_status": "prior_frozen_supernova_bao_gate_not_refit_here",
          }

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def safe_float(value):
              try:
                  return float(value)
              except Exception:
                  return None

          def is_placeholder(value):
              text = str(value or "").strip().lower()
              return (
                  not text
                  or text.startswith("put_")
                  or "put_" in text
                  or text.startswith("do_not_fill")
                  or text in ["todo", "none", "na", "n/a", "template_not_filled"]
              )

          inherited_v4_246_rows = [
              {
                  "inherited_from": "v4.246",
                  "item": "rules",
                  "value": "29 / 29 passed",
                  "meaning": "Correction contract review and observed manifest guard passed.",
                  "carry_forward_status": "ready_for_four_need_closure",
              },
              {
                  "inherited_from": "v4.246",
                  "item": "correction_contract_review_rows",
                  "value": 6,
                  "meaning": "Symbolic correction contract reviewed as non-scoring.",
                  "carry_forward_status": "contract_ready_not_numeric_fit",
              },
              {
                  "inherited_from": "v4.246",
                  "item": "parameter_freeze_rule_rows",
                  "value": 5,
                  "meaning": "Parameter-freeze rules exist but need a stricter freeze/lock packet.",
                  "carry_forward_status": "needs_v4_247_freeze_guard",
              },
              {
                  "inherited_from": "v4.246",
                  "item": "observed_manifest_input_rows",
                  "value": 0,
                  "meaning": "No external observed rows were present.",
                  "carry_forward_status": "manifest_builder_needed",
              },
              {
                  "inherited_from": "v4.246",
                  "item": "primary_qso_holdout",
                  "value": "missing",
                  "meaning": "No clean primary QSO growth holdout source exists.",
                  "carry_forward_status": "primary_evidence_lane_blocked",
              },
              {
                  "inherited_from": "v4.246",
                  "item": "selected_next_route",
                  "value": "v4_247_parameter_freeze_guard_or_external_observed_manifest_builder",
                  "meaning": "Current route should close freeze/manifest/review/matrix guards together.",
                  "carry_forward_status": "current_route",
              },
          ]

          parameter_freeze_lock_rows = [
              {
                  "freeze_id": "freeze_lock_001_theta",
                  "object_to_freeze": "theta",
                  "current_status": "not_set",
                  "freeze_status": "blocked_from_numeric_fit",
                  "allowed_next_step": "may define allowed symbolic range only before observed scoring exists",
                  "blocked_action": "fit theta to current same-data QSO/LRG pressure",
              },
              {
                  "freeze_id": "freeze_lock_002_w_axis",
                  "object_to_freeze": "W_axis(q)",
                  "current_status": "direction_contract_only",
                  "freeze_status": "must_be_frozen_before_any_scoring",
                  "allowed_next_step": "manual pre-score axis table only",
                  "blocked_action": "change axis weights after observing future residuals",
              },
              {
                  "freeze_id": "freeze_lock_003_s_source",
                  "object_to_freeze": "S_source(s)",
                  "current_status": "source_role_contract_only",
                  "freeze_status": "must_be_frozen_before_any_scoring",
                  "allowed_next_step": "manual pre-score source-role table only",
                  "blocked_action": "relabel source role after seeing result",
              },
              {
                  "freeze_id": "freeze_lock_004_prior_gate",
                  "object_to_freeze": "G(z)",
                  "current_status": "prior_frozen_gate_v0_1",
                  "freeze_status": "frozen_not_refit",
                  "allowed_next_step": "carry fixed or replace only with explicitly new pre-score version",
