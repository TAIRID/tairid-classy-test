name: 001 TAIRID v4.246 - Correction Contract Review Observed Manifest Guard

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-246-correction-contract-review-observed-manifest-guard.yml"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  correction-contract-review-observed-manifest-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.246 Correction Contract Review Observed Manifest Guard is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.246 correction contract review observed manifest guard
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.246"
          ROUTE = "correction_contract_review_or_external_observed_manifest_fill_guard_after_v4_245"
          EXPECTED_RESULT = "v4_246_correction_contract_review_observed_manifest_guard_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_247_parameter_freeze_guard_or_external_observed_manifest_builder"

          OUT = Path("tairid_v4_246_correction_contract_review_observed_manifest_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-246-correction-contract-review-observed-manifest-guard-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "approval_status",
          ]

          FROZEN_PRIOR_GATE = {
              "gate_id": "prior_joint_gate_v0_1",
              "A": 0.6580586049,
              "z_t": 0.2224541370,
              "p": 2.0,
              "formula": "G(z)=exp[-A*(z/(z+z_t))^p]",
              "origin_status": "prior_frozen_supernova_bao_gate_not_refit_here",
          }

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def safe_float(value):
              try:
                  return float(value)
              except Exception:
                  return None

          def is_placeholder(value):
              text = str(value or "").strip().lower()
              return (
                  not text
                  or text.startswith("put_")
                  or "put_" in text
                  or text.startswith("do_not_fill")
                  or text in ["todo", "none", "na", "n/a", "template_not_filled"]
              )

          def gate_value(z, A=FROZEN_PRIOR_GATE["A"], z_t=FROZEN_PRIOR_GATE["z_t"], p=FROZEN_PRIOR_GATE["p"]):
              z = float(z)
              return math.exp(-A * ((z / (z + z_t)) ** p)) if z + z_t != 0 else float("nan")

          inherited_v4_245_rows = [
              {
                  "inherited_from": "v4.245",
                  "item": "rules",
                  "value": "29 / 29 passed",
                  "meaning": "TAIRID correction formula scaffold passed.",
                  "carry_forward_status": "ready_for_contract_review_only",
              },
              {
                  "inherited_from": "v4.245",
                  "item": "correction_formula_rows",
                  "value": 6,
                  "meaning": "Formula rows exist: gate, residual, symbolic correction, corrected reference, direction check, failure check.",
                  "carry_forward_status": "symbolic_only_not_numeric_fit",
              },
              {
                  "inherited_from": "v4.245",
                  "item": "prior_frozen_gate",
                  "value": "G(z)=exp[-0.6580586049*(z/(z+0.2224541370))^2]",
                  "meaning": "Prior gate is carried only as a frozen scaffold component.",
                  "carry_forward_status": "not_refit_here",
              },
              {
                  "inherited_from": "v4.245",
                  "item": "observed_manifest_status_rows",
                  "value": 1,
                  "meaning": "Observed manifest status was checked, but no scored external observed rows were used.",
                  "carry_forward_status": "observed_scoring_blocked",
              },
              {
                  "inherited_from": "v4.245",
                  "item": "primary_qso_holdout",
                  "value": "missing",
                  "meaning": "No clean primary QSO growth holdout source exists.",
                  "carry_forward_status": "primary_evidence_lane_blocked",
              },
              {
                  "inherited_from": "v4.245",
                  "item": "selected_next_route",
                  "value": "v4_246_correction_contract_review_or_external_observed_manifest_fill_guard",
                  "meaning": "Current route reviews the contract and guards manual observed manifest filling.",
                  "carry_forward_status": "current_route",
              },
          ]

          correction_contract_review_rows = [
              {
                  "contract_id": "contract_001_gate",
                  "contract_item": "Prior gate may be used only as a frozen scaffold component.",
                  "required_status": "not_refit_here",
                  "actual_status": FROZEN_PRIOR_GATE["origin_status"],
                  "passed": FROZEN_PRIOR_GATE["origin_status"] == "prior_frozen_supernova_bao_gate_not_refit_here",
                  "blocked_use": "proof, validation, or new fit claim",
              },
              {
                  "contract_id": "contract_002_residual",
                  "contract_item": "Observed residual Delta_obs requires observed value and LCDM reference value.",
                  "required_status": "blocked_until_external_observed_rows_and_reference_join",
                  "actual_status": "no_reference_join_scoring_in_this_workflow",
                  "passed": True,
                  "blocked_use": "residual scoring from reference rows alone",
              },
              {
                  "contract_id": "contract_003_symbolic_correction",
                  "contract_item": "C_TAIRID(q,z,s)=theta*G(z)*W_axis(q)*S_source(s) remains symbolic.",
                  "required_status": "symbolic_contract_only",
                  "actual_status": "symbolic_contract_only",
                  "passed": True,
                  "blocked_use": "numeric correction fit",
              },
              {
                  "contract_id": "contract_004_corrected_reference",
                  "contract_item": "R_TAIRID is a future model-comparison scaffold only.",
                  "required_status": "future_only",
                  "actual_status": "future_model_comparison_scaffold_only",
                  "passed": True,
                  "blocked_use": "current model-vs-model comparison",
              },
              {
                  "contract_id": "contract_005_direction_check",
                  "contract_item": "Sign-direction check requires independent observed residuals.",
                  "required_status": "future_holdout_check_only",
                  "actual_status": "no_independent_observed_residuals",
                  "passed": True,
                  "blocked_use": "current evidence claim",
              },
              {
                  "contract_id": "contract_006_failure_check",
                  "contract_item": "Failure conditions must remain frozen before scoring.",
                  "required_status": "guardrail_only",
                  "actual_status": "failure_rows_carried_forward",
                  "passed": True,
                  "blocked_use": "posthoc success criteria",
              },
          ]

          parameter_freeze_rule_rows = [
              {
                  "freeze_rule_id": "freeze_rule_001",
                  "parameter_or_rule": "theta",
                  "current_status": "not_set",
                  "allowed_next_status": "may_be_symbolically_described_but_not_fit",
                  "blocked_action": "fit theta to current same-data pressure",
              },
              {
                  "freeze_rule_id": "freeze_rule_002",
                  "parameter_or_rule": "W_axis(q)",
                  "current_status": "direction_contract_only",
                  "allowed_next_status": "manual freeze before any future scoring",
                  "blocked_action": "change axis weights after observing holdout result",
              },
              {
                  "freeze_rule_id": "freeze_rule_003",
                  "parameter_or_rule": "S_source(s)",
                  "current_status": "source_role_contract_only",
                  "allowed_next_status": "manual freeze before any future scoring",
                  "blocked_action": "relabel source family after scoring",
              },
              {
                  "freeze_rule_id": "freeze_rule_004",
                  "parameter_or_rule": "G(z) prior gate",
                  "current_status": "frozen_prior_not_refit",
                  "allowed_next_status": "carry as fixed scaffold or replace only with explicitly versioned new pre-score gate",
                  "blocked_action": "silently refit gate to QSO/LRG residuals",
              },
              {
                  "freeze_rule_id": "freeze_rule_005",
                  "parameter_or_rule": "failure conditions",
                  "current_status": "frozen_rows_available",
                  "allowed_next_status": "carry forward unchanged or version before scoring",
                  "blocked_action": "edit failure conditions after scoring",
              },
          ]

          axis_contract_review_rows = [
              {
                  "axis_contract_id": "axis_contract_001",
                  "source_family": "QSO_or_QSO_like",
                  "observable": "f_sigma8",
                  "axis_role": "primary_growth_pressure_candidate",
                  "review_result": "blocked_until_primary_holdout_exists",
                  "blocked_use": "current primary evidence",
              },
              {
                  "axis_contract_id": "axis_contract_002",
                  "source_family": "QSO_or_QSO_like",
                  "observable": "D_H_over_r_sound",
                  "axis_role": "secondary_radial_pacing_candidate",
                  "review_result": "secondary_only",
                  "blocked_use": "primary growth evidence",
              },
              {
                  "axis_contract_id": "axis_contract_003",
                  "source_family": "LRG_or_LRG_like",
                  "observable": "f_sigma8",
                  "axis_role": "growth_control",
                  "review_result": "control_only",
                  "blocked_use": "primary QSO growth evidence",
              },
              {
                  "axis_contract_id": "axis_contract_004",
                  "source_family": "BAO_or_geometry_only",
                  "observable": "D_V_or_geometry",
                  "axis_role": "compressed_geometry_control",
                  "review_result": "geometry_control_only",
                  "blocked_use": "growth evidence",
              },
          ]

          observed_manifest_template_rows = [
              {
                  "observed_id": "obs_001_primary_qso_growth",
                  "target_id": "PUT_REVIEWED_TARGET_ID_HERE",
                  "source_family": "QSO_or_QSO_like",
                  "source_role": "primary_qso_growth_holdout",
                  "redshift": "PUT_REDSHIFT_HERE",
                  "quantity": "f_sigma8_or_comparable_growth",
                  "observed_value": "PUT_OBSERVED_VALUE_HERE",
                  "observed_sigma_or_likelihood": "PUT_SIGMA_OR_LIKELIHOOD_REFERENCE_HERE",
                  "data_path_or_url": "PUT_REVIEWED_DATA_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "approval_status": "blocked_until_reviewed_primary_holdout_exists",
              },
              {
                  "observed_id": "obs_002_qso_radial_secondary",
                  "target_id": "PUT_REVIEWED_TARGET_ID_HERE",
                  "source_family": "QSO_or_QSO_like",
                  "source_role": "qso_radial_secondary",
                  "redshift": "PUT_REDSHIFT_HERE",
                  "quantity": "D_H_over_r_sound_or_equivalent",
                  "observed_value": "PUT_OBSERVED_VALUE_HERE",
                  "observed_sigma_or_likelihood": "PUT_SIGMA_OR_LIKELIHOOD_REFERENCE_HERE",
                  "data_path_or_url": "PUT_REVIEWED_SECONDARY_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "approval_status": "manual_review_required_secondary_only",
              },
              {
                  "observed_id": "obs_003_lrg_growth_control",
                  "target_id": "PUT_REVIEWED_TARGET_ID_HERE",
                  "source_family": "LRG_or_LRG_like",
                  "source_role": "lrg_growth_control",
                  "redshift": "PUT_REDSHIFT_HERE",
                  "quantity": "f_sigma8_or_comparable_growth",
                  "observed_value": "PUT_OBSERVED_VALUE_HERE",
                  "observed_sigma_or_likelihood": "PUT_SIGMA_OR_LIKELIHOOD_REFERENCE_HERE",
                  "data_path_or_url": "PUT_REVIEWED_CONTROL_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "approval_status": "manual_review_required_control_only",
              },
              {
                  "observed_id": "obs_004_geometry_control",
                  "target_id": "PUT_REVIEWED_TARGET_ID_HERE",
                  "source_family": "BAO_or_geometry_only",
                  "source_role": "geometry_control",
                  "redshift": "PUT_REDSHIFT_HERE",
                  "quantity": "D_V_D_M_D_H_or_likelihood_coordinate",
                  "observed_value": "PUT_OBSERVED_VALUE_HERE",
                  "observed_sigma_or_likelihood": "PUT_SIGMA_OR_LIKELIHOOD_REFERENCE_HERE",
                  "data_path_or_url": "PUT_REVIEWED_GEOMETRY_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "approval_status": "manual_review_required_geometry_control_only",
              },
          ]

          observed_manifest_status_rows = []
          observed_manifest_input_rows = []
          found_manifests = [path for path in OBSERVED_MANIFEST_CANDIDATES if path.exists()]

          if not found_manifests:
              observed_manifest_status_rows.append({
                  "manifest_path": "",
                  "manifest_status": "missing",
                  "observed_rows": 0,
                  "detail": "No external observed manifest found. Template rows written only.",
              })
          else:
              for path in found_manifests:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in REQUIRED_OBSERVED_COLUMNS if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          "observed_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          for row in rows:
                              observed_manifest_input_rows.append({col: row.get(col, "") for col in REQUIRED_OBSERVED_COLUMNS})
                  except Exception as exc:
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          "observed_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })

          observed_manifest_validation_rows = []
          for row in observed_manifest_input_rows:
              issues = []
              z = safe_float(row.get("redshift"))
              val = safe_float(row.get("observed_value"))
              if not row.get("observed_id"):
                  issues.append("missing_observed_id")
              if not row.get("target_id"):
                  issues.append("missing_target_id")
              if z is None or z < 0:
                  issues.append("bad_redshift")
              if val is None:
                  issues.append("bad_observed_value")
              if is_placeholder(row.get("data_path_or_url")):
                  issues.append("data_source_placeholder")
              if is_placeholder(row.get("covariance_path_or_url")):
                  issues.append("covariance_placeholder")
              if row.get("source_role") == "primary_qso_growth_holdout" and row.get("approval_status") != "reviewed_primary_holdout_not_scored":
                  issues.append("primary_holdout_not_reviewed")
              if row.get("approval_status") in ["approved_for_scoring", "approved", "evidence"]:
                  issues.append("approval_status_too_strong_for_guard")

              observed_manifest_validation_rows.append({
                  "observed_id": row.get("observed_id", ""),
                  "source_family": row.get("source_family", ""),
                  "source_role": row.get("source_role", ""),
                  "quantity": row.get("quantity", ""),
                  "redshift": row.get("redshift", ""),
                  "validation_issues": "|".join(issues) if issues else "none",
                  "review_status": "reviewable_not_scored" if not issues else "blocked_by_manifest_issues",
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          failure_condition_rows = [
              {
                  "failure_condition_id": "failure_001",
                  "target": "QSO f_sigma8 primary pressure",
                  "machine_condition": "if holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened",
                  "status": "active_but_not_testable_without_primary_holdout",
              },
              {
                  "failure_condition_id": "failure_002",
                  "target": "QSO versus LRG growth contrast",
                  "machine_condition": "if lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened",
                  "status": "active_for_future_control_review",
              },
              {
                  "failure_condition_id": "failure_003",
                  "target": "QSO radial secondary support",
                  "machine_condition": "if qso_radial_direction == '-' then secondary_support_weakened",
                  "status": "active_for_future_secondary_review",
              },
              {
                  "failure_condition_id": "failure_004",
                  "target": "geometry compressed lane non-primary",
                  "machine_condition": "if compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed",
                  "status": "active_for_future_geometry_review",
              },
              {
                  "failure_condition_id": "failure_005",
                  "target": "external likelihood robustness",
                  "machine_condition": "if external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover then baseline_pressure_not_tairid_specific",
                  "status": "active_for_future_model_comparison",
              },
          ]

          gate_review_rows = []
          for target_id, z in [
              ("lrg_reference", 0.698),
              ("elg_reference", 0.845),
              ("qso_reference", 1.48),
              ("future_qso_template", 1.50),
              ("lowz_control_template", 0.35),
              ("highz_control_template", 2.00),
          ]:
              gate_review_rows.append({
                  "target_id": target_id,
                  "redshift": z,
                  "gate_id": FROZEN_PRIOR_GATE["gate_id"],
                  "gate_value": gate_value(z),
                  "review_status": "frozen_gate_value_for_contract_review_only",
              })

          readiness_rows = [
              {
                  "readiness_id": "readiness_001",
                  "requirement": "correction_contract_review",
                  "status": "ready",
                  "blocks": "nothing",
              },
              {
                  "readiness_id": "readiness_002",
                  "requirement": "parameter_freeze",
                  "status": "not_ready",
                  "blocks": "numeric correction fitting",
              },
              {
                  "readiness_id": "readiness_003",
                  "requirement": "external_observed_manifest",
                  "status": "missing" if not found_manifests else "present_needs_review",
                  "blocks": "observed residual scoring",
              },
              {
                  "readiness_id": "readiness_004",
                  "requirement": "primary_qso_growth_holdout",
                  "status": "missing",
                  "blocks": "primary evidence lane",
              },
              {
                  "readiness_id": "readiness_005",
                  "requirement": "external_likelihood_fit",
                  "status": "not_run",
                  "blocks": "validation language",
              },
              {
                  "readiness_id": "readiness_006",
                  "requirement": "combined_matrix_permission",
                  "status": "blocked",
                  "blocks": "combined LRG/ELG/QSO matrix",
              },
          ]

          decision_rows = []
          reviewable_rows = [row for row in observed_manifest_validation_rows if row["review_status"] == "reviewable_not_scored"]

          decision_rows.append({
              "decision_id": "decision_001",
              "decision": "Correction contract review passed as a guard.",
              "basis": "Symbolic formulas, gate status, axis contracts, and failure conditions are reviewable and locked as non-scoring.",
              "next_action": "Do not fit numeric correction yet.",
              "claim_status": "contract_ready_not_evidence",
          })

          if reviewable_rows:
              decision_rows.append({
                  "decision_id": "decision_002",
                  "decision": "Observed manifest has reviewable rows, but scoring is still blocked.",
                  "basis": f"reviewable_not_scored rows = {len(reviewable_rows)}",
                  "next_action": "Build a separate parser/scoring guard only after parameter freeze.",
                  "claim_status": "reviewable_not_scored",
              })
          else:
              decision_rows.append({
                  "decision_id": "decision_002",
                  "decision": "Observed manifest is missing or has no reviewable rows.",
                  "basis": "No external observed rows can be joined to reference rows.",
                  "next_action": "Use observed manifest template or continue source review.",
                  "claim_status": "observed_scoring_blocked",
              })

          decision_rows.append({
              "decision_id": "decision_003",
              "decision": "Primary QSO growth evidence remains blocked.",
              "basis": "No clean primary QSO growth holdout source exists.",
              "next_action": "Move to v4.247 parameter freeze guard or external observed manifest builder.",
              "claim_status": "primary_holdout_missing",
          })

          permission_rows = [
              {
                  "permission_scope": "correction_contract_review",
                  "permission_status": "allowed",
                  "reason": "Symbolic formulas and guardrails can be reviewed.",
              },
              {
                  "permission_scope": "external_observed_manifest_template",
                  "permission_status": "written",
                  "reason": "Template rows can be used for future manual fill.",
              },
              {
                  "permission_scope": "observed_manifest_validation",
                  "permission_status": "allowed_without_scoring",
                  "reason": "Manifest schema and review status may be checked.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "Parameter freeze and observed manifest are not ready.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No reviewed observed/reference join is allowed in this workflow.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "No primary QSO holdout exists.",
              },
              {
                  "permission_scope": "automatic_evidence_claim",
                  "permission_status": "blocked",
                  "reason": "Contract review is not evidence.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Source-surface compatibility has not passed.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_247_parameter_freeze_guard",
                  "purpose": "define what must be frozen before any numeric correction or model comparison can run",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_247_external_observed_manifest_builder",
                  "purpose": "write safer manual observed manifest files without scoring",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_247_secondary_control_source_review",
                  "purpose": "review secondary/control sources without primary evidence language",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_247_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until source-surface guards pass",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before contract review"},
              {"gate": "inherited_v4_245_rows_equal_6", "passed": len(inherited_v4_245_rows) == 6, "detail": f"inherited_v4_245_rows = {len(inherited_v4_245_rows)}"},
              {"gate": "correction_contract_review_rows_equal_6", "passed": len(correction_contract_review_rows) == 6, "detail": f"correction_contract_review_rows = {len(correction_contract_review_rows)}"},
              {"gate": "all_contract_reviews_passed", "passed": all(bool(row["passed"]) for row in correction_contract_review_rows), "detail": "all correction contract review rows passed"},
              {"gate": "parameter_freeze_rule_rows_equal_5", "passed": len(parameter_freeze_rule_rows) == 5, "detail": f"parameter_freeze_rule_rows = {len(parameter_freeze_rule_rows)}"},
              {"gate": "axis_contract_review_rows_equal_4", "passed": len(axis_contract_review_rows) == 4, "detail": f"axis_contract_review_rows = {len(axis_contract_review_rows)}"},
              {"gate": "observed_manifest_template_rows_equal_4", "passed": len(observed_manifest_template_rows) == 4, "detail": f"observed_manifest_template_rows = {len(observed_manifest_template_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "observed_manifest_validation_rows_match_inputs", "passed": len(observed_manifest_validation_rows) == len(observed_manifest_input_rows), "detail": f"observed_manifest_validation_rows = {len(observed_manifest_validation_rows)}, observed_manifest_input_rows = {len(observed_manifest_input_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "gate_review_rows_equal_6", "passed": len(gate_review_rows) == 6, "detail": f"gate_review_rows = {len(gate_review_rows)}"},
              {"gate": "readiness_rows_equal_6", "passed": len(readiness_rows) == 6, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "decision_rows_equal_3", "passed": len(decision_rows) == 3, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "permission_rows_equal_9", "passed": len(permission_rows) == 9, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "numeric_correction_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric correction fit blocked"},
              {"gate": "external_observed_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external observed residual scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO growth evidence blocked"},
              {"gate": "automatic_evidence_blocked", "passed": any(row["permission_scope"] == "automatic_evidence_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "automatic evidence claim blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "prior_gate_not_refit", "passed": FROZEN_PRIOR_GATE["origin_status"] == "prior_frozen_supernova_bao_gate_not_refit_here", "detail": "prior gate not refit"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric correction fit"},
              {"gate": "truth_boundary_no_external_scoring", "passed": True, "detail": "no external observed scoring"},
              {"gate": "truth_boundary_no_primary_holdout", "passed": True, "detail": "no primary holdout"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_247_parameter_freeze_guard_or_external_observed_manifest_builder", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_246_correction_contract_review_observed_manifest_guard_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_246_inherited_v4_245_rows.csv", inherited_v4_245_rows)
          write_csv(OUT / "v4_246_correction_contract_review_rows.csv", correction_contract_review_rows)
          write_csv(OUT / "v4_246_parameter_freeze_rule_rows.csv", parameter_freeze_rule_rows)
          write_csv(OUT / "v4_246_axis_contract_review_rows.csv", axis_contract_review_rows)
          write_csv(OUT / "v4_246_observed_manifest_template_rows.csv", observed_manifest_template_rows)
          write_csv(OUT / "v4_246_observed_manifest_status_rows.csv", observed_manifest_status_rows)
          write_csv(OUT / "v4_246_observed_manifest_validation_rows.csv", observed_manifest_validation_rows)
          write_csv(OUT / "v4_246_failure_condition_rows.csv", failure_condition_rows)
          write_csv(OUT / "v4_246_gate_review_rows.csv", gate_review_rows)
          write_csv(OUT / "v4_246_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_246_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_246_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_246_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_246_rule_checks.csv", checks)

          contract_lines = [
              f"{row['contract_id']}: passed={row['passed']} — {row['required_status']}"
              for row in correction_contract_review_rows
          ]

          freeze_lines = [
              f"{row['parameter_or_rule']}: {row['current_status']} -> {row['allowed_next_status']}"
              for row in parameter_freeze_rule_rows
          ]

          decision_lines = [
              f"{row['decision_id']}: {row['decision']} Next: {row['next_action']}"
              for row in decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_245_rows": len(inherited_v4_245_rows),
              "correction_contract_review_rows": len(correction_contract_review_rows),
              "parameter_freeze_rule_rows": len(parameter_freeze_rule_rows),
              "axis_contract_review_rows": len(axis_contract_review_rows),
              "observed_manifest_template_rows": len(observed_manifest_template_rows),
              "observed_manifest_status_rows": len(observed_manifest_status_rows),
              "observed_manifest_input_rows": len(observed_manifest_input_rows),
              "observed_manifest_validation_rows": len(observed_manifest_validation_rows),
              "failure_condition_rows": len(failure_condition_rows),
              "gate_review_rows": len(gate_review_rows),
              "readiness_rows": len(readiness_rows),
              "decision_rows": len(decision_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "primary_holdout_exists": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_246_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.246 Correction Contract Review Observed Manifest Guard",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_245_rows = {summary['inherited_v4_245_rows']}",
              f"correction_contract_review_rows = {summary['correction_contract_review_rows']}",
              f"parameter_freeze_rule_rows = {summary['parameter_freeze_rule_rows']}",
              f"axis_contract_review_rows = {summary['axis_contract_review_rows']}",
              f"observed_manifest_template_rows = {summary['observed_manifest_template_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"observed_manifest_input_rows = {summary['observed_manifest_input_rows']}",
              f"observed_manifest_validation_rows = {summary['observed_manifest_validation_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"gate_review_rows = {summary['gate_review_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Correction contract review:",
              *contract_lines,
              "",
              "Parameter freeze rules:",
              *freeze_lines,
              "",
              "Decisions:",
              *decision_lines,
              "",
              "Clean meaning: v4.246 reviews the symbolic correction contract, keeps the prior gate frozen and not refit, writes the observed-manifest guard, and blocks numeric correction fitting or external observed residual scoring.",
              "",
              "Truth boundary: no proof, no validation, no numeric correction fit, no external observed scoring, no primary holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_246_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_245_rows = {summary['inherited_v4_245_rows']}")
          print(f"correction_contract_review_rows = {summary['correction_contract_review_rows']}")
          print(f"parameter_freeze_rule_rows = {summary['parameter_freeze_rule_rows']}")
          print(f"axis_contract_review_rows = {summary['axis_contract_review_rows']}")
          print(f"observed_manifest_template_rows = {summary['observed_manifest_template_rows']}")
          print(f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}")
          print(f"observed_manifest_input_rows = {summary['observed_manifest_input_rows']}")
          print(f"observed_manifest_validation_rows = {summary['observed_manifest_validation_rows']}")
          print(f"failure_condition_rows = {summary['failure_condition_rows']}")
          print(f"gate_review_rows = {summary['gate_review_rows']}")
          print(f"readiness_rows = {summary['readiness_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no numeric correction fit, no external observed scoring, no primary holdout source, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.246 correction contract review observed manifest guard output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-246-correction-contract-review-observed-manifest-guard-output
          path: |
            tairid_v4_246_correction_contract_review_observed_manifest_guard_output/
            tairid-v4-246-correction-contract-review-observed-manifest-guard-output.zip
