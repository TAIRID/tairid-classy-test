          )

          write_csv(
              OUTDIR / "blocked_claims_v4_44.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_44.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_44.csv",
              [system_health],
              [
                  "partial_scope",
                  "partial_row_count",
                  "negative_residual_count",
