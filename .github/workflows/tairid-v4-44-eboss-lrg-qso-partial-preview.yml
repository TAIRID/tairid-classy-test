          md.append("ELG was excluded as parser-needed. WiggleZ covariance remains unresolved. Reference uncertainty is still missing. This is not a final RSD pressure score.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Partial residual rows")
