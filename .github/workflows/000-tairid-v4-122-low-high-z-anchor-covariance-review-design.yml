name: 000 TAIRID v4.122 Low High z Anchor Covariance Review Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-122-low-high-z-anchor-covariance-review-design.yml"

jobs:
  tairid-v4-122-low-high-z-anchor-covariance-review-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.122 low high z anchor covariance review design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_122_low_high_z_anchor_covariance_review_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_122_low_high_z_anchor_covariance_review_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_122_low_high_z_anchor_covariance_review_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This does not fetch low-z or high-z covariance files yet.",
              "This designs the source-status and covariance review for the remaining z=0.15 and z=2.33 edge anchors.",
              "A pass means the edge-anchor review routes, fallback rules, primary/sensitivity-lane decisions, and blocked claims are explicit for the next probe."
          ]

          UPSTREAM_LOCKS = {
              "v4_121_verified_bridge_sensitivity_audit": {
                  "readiness_label": "verified_bridge_sensitivity_audit_passed_pressure_stable_source_choice_material_not_final_ready_for_low_high_z_anchor_covariance_review_design",
                  "verified_BOSS_covariance_inserted": True,
                  "primary_verified_chi2": 1.721941483224999,
                  "baseline_diagonal_chi2": 1.8857450832335483,
                  "v4_117_first_candidate_chi2": 1.2943386544372018,
                  "source_choice_delta_chi2": 0.4276028287877973,
                  "baseline_delta_chi2": 0.1638036000085492,
                  "reference_structure_delta_chi2": 0.020160613515171955,
                  "reference_contribution_delta_chi2": 0.003332042800859414,
                  "max_abs_delta_pressure_z": 0.0,
                  "max_abs_lane_pressure_z": 0.0,
                  "pressure_z_all_zero": True,
                  "diagnostic_pressure_stable": True,
                  "source_choice_material": True,
                  "edge_anchor_covariance_incomplete": True,
                  "low_z_anchor_source_covariance_complete": False,
                  "high_z_anchor_source_covariance_complete": False,
                  "final_pressure_ready": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_120_verified_observed_covariance_bridge_probe": {
                  "readiness_label": "verified_observed_covariance_bridge_probe_passed_diagnostic_only_ready_for_verified_bridge_sensitivity_audit",
                  "verified_BOSS_covariance_inserted": True,
                  "observed_covariance_status": "BOSS_verified_positions_1_2_3_low_high_z_diagonal_fallback",
                  "bridge_pressure_computed": True,
                  "primary_verified_chi2": 1.721941483224999,
                  "primary_verified_pressure_z": 0.0,
                  "pressure_z_all_zero": True,
                  "low_z_anchor_source_covariance_complete": False,
                  "high_z_anchor_source_covariance_complete": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          EDGE_ANCHOR_REVIEW_TARGETS = [
              {
                  "anchor_id": "low_z_anchor_z015",
                  "z": 0.15,
                  "current_bridge_position": 0,
                  "current_source_family": "SDSS_DR7_MGS",
                  "current_value_label": "MGS-style fσ8 z_eff=0.15 diagnostic anchor",
                  "current_covariance_status": "diagonal_fallback_source_covariance_not_locked",
                  "review_priority": 1,
                  "primary_question": "Can this low-z point be source-locked with a clear value, uncertainty, and covariance/error model?",
                  "allowed_outcomes": "source_covariance_found | literature_error_model_locked | diagonal_fallback_preserved | move_to_sensitivity_only | park_anchor",
                  "blocks_final_pressure": True
              },
              {
                  "anchor_id": "high_z_anchor_z233",
                  "z": 2.33,
                  "current_bridge_position": 4,
                  "current_source_family": "high_z_LyA_compilation_anchor",
                  "current_value_label": "high-z LyA/eBOSS-style fσ8 z=2.33 diagnostic anchor",
                  "current_covariance_status": "diagonal_fallback_source_covariance_not_locked",
                  "review_priority": 2,
                  "primary_question": "Should this high-z point remain in the primary bridge, move to sensitivity-only, or be replaced by a better source-locked growth anchor?",
                  "allowed_outcomes": "source_covariance_found | literature_error_model_locked | diagonal_fallback_preserved | move_to_sensitivity_only | replace_anchor | park_anchor",
                  "blocks_final_pressure": True
              }
          ]

          CURRENT_VERIFIED_BRIDGE_STATUS = [
              {
                  "position": 0,
                  "z": 0.15,
                  "role": "low_z_edge_anchor",
                  "covariance_status": "diagonal_fallback_unverified",
                  "review_status": "required_next"
              },
              {
                  "position": 1,
                  "z": 0.38,
                  "role": "central_BOSS_verified",
                  "covariance_status": "verified_BOSS_consensus_covtot_subblock",
                  "review_status": "locked_from_v4_119_v4_120"
              },
              {
                  "position": 2,
                  "z": 0.51,
                  "role": "central_BOSS_verified",
                  "covariance_status": "verified_BOSS_consensus_covtot_subblock",
                  "review_status": "locked_from_v4_119_v4_120"
              },
              {
                  "position": 3,
                  "z": 0.61,
                  "role": "central_BOSS_verified",
                  "covariance_status": "verified_BOSS_consensus_covtot_subblock",
                  "review_status": "locked_from_v4_119_v4_120"
              },
              {
                  "position": 4,
                  "z": 2.33,
                  "role": "high_z_edge_anchor",
                  "covariance_status": "diagonal_fallback_unverified",
                  "review_status": "required_next"
              }
          ]

          EDGE_REVIEW_POLICY = [
              {
                  "policy_id": "do_not_disturb_verified_BOSS_core",
                  "requirement": "The v4.119/v4.120 BOSS covariance block for z=0.38, 0.51, 0.61 remains locked unless a later source audit explicitly overturns it.",
                  "reason": "The current problem is the edge anchors, not the central BOSS covariance.",
                  "applied_now": False
              },
              {
                  "policy_id": "source_covariance_preferred_for_edges",
                  "requirement": "For z=0.15 and z=2.33, prefer source-provided covariance or a source-documented covariance/error model over diagonal fallback.",
                  "reason": "The bridge cannot be strengthened while edge anchors remain unverified diagonal fallback.",
                  "applied_now": False
              },
              {
                  "policy_id": "primary_vs_sensitivity_decision_required",
                  "requirement": "Each edge anchor must be classified as primary, sensitivity-only, replaced, or parked after review.",
                  "reason": "A weak edge anchor should not silently control a primary five-slot bridge.",
                  "applied_now": False
              },
              {
                  "policy_id": "central_BOSS_only_control_lane_required",
                  "requirement": "The next probe must preserve or design a central-BOSS-only three-slot control lane.",
                  "reason": "If edge anchors remain weak, the verified central BOSS block should be tested independently.",
                  "applied_now": False
              },
              {
                  "policy_id": "edge_sensitivity_lanes_required",
                  "requirement": "The next probe must include low-edge-only, high-edge-only, both-edges, and no-edge control/sensitivity lanes where computable.",
                  "reason": "This reveals whether the no-pressure result depends on either edge anchor.",
                  "applied_now": False
              },
              {
                  "policy_id": "claim_boundary_preserved",
                  "requirement": "No edge-anchor review may convert a diagnostic bridge into final RSD pressure or validation.",
                  "reason": "Final pressure remains blocked until all source/covariance and sensitivity checks are complete.",
                  "applied_now": False
              }
          ]

          NEXT_PROBE_DESIGN = {
              "next_probe_name": "v4.123 edge anchor review probe",
              "allowed_to_fetch_or_locator_check_edge_sources": True,
              "allowed_to_record_source_status": True,
              "allowed_to_build_edge_covariance_status_matrix": True,
              "allowed_to_recompute_guarded_bridge_lanes_if_edge_status_changes": True,
              "allowed_to_create_primary_vs_sensitivity_lane_decision": True,
              "allowed_to_compute_final_RSD_pressure": False,
              "allowed_to_validate_TAIRID": False,
              "primary_success_condition": "Both edge anchors receive explicit source/covariance status and primary/sensitivity/park decisions.",
              "fallback_success_condition": "If edge covariance cannot be found, fallback status remains explicit and routes to broader growth-family expansion rather than final claims."
          }

          NEXT_PROBE_INPUT_SCHEMA = [
              {"field": "anchor_id", "required": True, "purpose": "low_z_anchor_z015 or high_z_anchor_z233"},
              {"field": "z", "required": True, "purpose": "Anchor redshift"},
              {"field": "current_value", "required": True, "purpose": "Current fσ8 value used in the bridge"},
              {"field": "current_sigma", "required": True, "purpose": "Current one-sigma fallback uncertainty"},
              {"field": "source_family", "required": True, "purpose": "Survey/source family"},
              {"field": "source_url_or_locator", "required": True, "purpose": "Official URL, data locator, paper table, or manual locator note"},
              {"field": "fetch_or_locator_status", "required": True, "purpose": "found, fetched, parsed, unavailable, manual_needed, or parked"},
              {"field": "covariance_status", "required": True, "purpose": "source_covariance, literature_error_model, diagonal_fallback, sensitivity_only, replaced, or parked"},
              {"field": "primary_bridge_decision", "required": True, "purpose": "primary, sensitivity_only, replace, or park"},
              {"field": "claim_boundary", "required": True, "purpose": "diagnostic_only or parked"}
          ]

          QUALITY_GATES_FOR_NEXT_PROBE = [
              {
                  "gate_id": "both_edge_anchors_reviewed",
                  "requirement": "The next probe must produce a status record for z=0.15 and z=2.33.",
                  "failure_action": "Do not proceed to broader-family expansion or claim review."
              },
              {
                  "gate_id": "central_BOSS_core_preserved",
                  "requirement": "The verified BOSS covariance block must remain untouched as the central control unless explicitly revised.",
                  "failure_action": "Fail the edge review probe."
              },
              {
                  "gate_id": "edge_primary_decision_recorded",
                  "requirement": "Each edge anchor must be marked primary, sensitivity-only, replace, or park.",
                  "failure_action": "Fail the edge review probe."
              },
              {
                  "gate_id": "fallback_labeled",
                  "requirement": "Any unresolved edge anchor must remain explicitly labeled as diagonal fallback or parked.",
                  "failure_action": "Fail claim-boundary gate."
              },
              {
                  "gate_id": "control_lanes_declared",
                  "requirement": "Next route must preserve central-BOSS-only, full-five-slot, low-edge-only, and high-edge-only comparison lanes where computable.",
                  "failure_action": "Fail sensitivity visibility."
              },
              {
                  "gate_id": "no_final_claims",
                  "requirement": "No edge review may call the diagnostic final RSD pressure, likelihood, BIC, posterior comparison, or validation.",
                  "failure_action": "Fail claim-boundary gate."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The low/high-z anchor covariance review design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The verified bridge pressure is final.",
              "Zero pressure-z proves TAIRID.",
              "The low-z and high-z diagonal fallback anchors are source-covariance complete.",
              "No edge-anchor covariance review is needed.",
              "The central BOSS-only bridge is automatically final.",
              "The edge-anchor design is a publication-grade cosmology result."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_123_edge_anchor_review_probe",
                  "purpose": "Attempt source/covariance status review for z=0.15 and z=2.33, then classify each edge anchor as primary, sensitivity-only, replace, or park.",
                  "why_next": "v4.122 locks the edge-anchor review design and gate structure."
              },
              {
                  "priority": 2,
                  "route_id": "v4_124_edge_anchor_sensitivity_bridge_probe",
                  "purpose": "Rerun guarded bridge lanes with central-BOSS-only, full-five-slot, low-edge-only, and high-edge-only comparisons.",
                  "why_next": "The edge review should be tested by sensitivity lanes before interpretation."
              },
              {
                  "priority": 3,
                  "route_id": "v4_125_growth_family_expansion_design",
                  "purpose": "Design additional observed growth-family coverage beyond the current five-slot bridge.",
                  "why_next": "If edge anchors remain weak or parked, broader independent growth-family coverage becomes the next clean route."
              },
              {
                  "priority": 4,
                  "route_id": "v4_126_claim_boundary_review_handoff",
                  "purpose": "Create a human-readable status handoff after edge-anchor review and sensitivity bridge.",
                  "why_next": "The result needs careful interpretation before public-facing language."
              }
          ]

          failed_gates = []
          warnings = [
              "design_only",
              "edge_anchor_covariance_review_required",
              "central_BOSS_covariance_locked",
              "no_edge_source_fetch_yet",
              "no_bridge_pressure_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_121_verified_bridge_sensitivity_audit"]

          if upstream["diagnostic_pressure_stable"] is not True:
              failed_gates.append("upstream_diagnostic_stability_not_carried")

          if upstream["edge_anchor_covariance_incomplete"] is not True:
              failed_gates.append("upstream_edge_anchor_incomplete_status_not_carried")

          if upstream["low_z_anchor_source_covariance_complete"] is not False:
              failed_gates.append("low_z_incomplete_status_not_carried")

          if upstream["high_z_anchor_source_covariance_complete"] is not False:
              failed_gates.append("high_z_incomplete_status_not_carried")

          if len(EDGE_ANCHOR_REVIEW_TARGETS) != 2:
              failed_gates.append("edge_anchor_review_target_count_incorrect")

          if not all(row["blocks_final_pressure"] is True for row in EDGE_ANCHOR_REVIEW_TARGETS):
              failed_gates.append("edge_anchor_final_pressure_boundary_missing")

          if len(CURRENT_VERIFIED_BRIDGE_STATUS) != 5:
              failed_gates.append("current_verified_bridge_status_not_5")

          if not all(row["review_status"] == "locked_from_v4_119_v4_120" for row in CURRENT_VERIFIED_BRIDGE_STATUS if row["role"] == "central_BOSS_verified"):
              failed_gates.append("central_BOSS_core_not_locked")

          if len(EDGE_REVIEW_POLICY) < 6:
              failed_gates.append("edge_review_policy_incomplete")

          if NEXT_PROBE_DESIGN["allowed_to_compute_final_RSD_pressure"] is not False:
              failed_gates.append("next_probe_final_pressure_allowed_too_early")

          if NEXT_PROBE_DESIGN["allowed_to_validate_TAIRID"] is not False:
              failed_gates.append("next_probe_validation_allowed_too_early")

          required_schema_fields = {
              "anchor_id",
              "z",
              "current_value",
              "current_sigma",
              "source_family",
              "source_url_or_locator",
              "fetch_or_locator_status",
              "covariance_status",
              "primary_bridge_decision",
              "claim_boundary"
          }
          schema_fields = {row["field"] for row in NEXT_PROBE_INPUT_SCHEMA}
          if schema_fields != required_schema_fields:
              failed_gates.append("next_probe_input_schema_incomplete")

          if len(QUALITY_GATES_FOR_NEXT_PROBE) < 6:
              failed_gates.append("quality_gates_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "verified bridge pressure is final",
              "zero pressure-z proves tairid",
              "low-z and high-z diagonal fallback anchors are source-covariance complete",
              "no edge-anchor covariance review is needed",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "low_high_z_anchor_covariance_review_design_passed_ready_for_edge_anchor_review_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_verified_bridge_stability_carried",
                  "pass": upstream["diagnostic_pressure_stable"] is True and upstream["pressure_z_all_zero"] is True,
                  "result": "v4.121 verified bridge stability carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "edge_anchor_incomplete_status_carried",
                  "pass": upstream["edge_anchor_covariance_incomplete"] is True,
                  "result": "low-z and high-z edge anchors remain incomplete",
                  "boundary": "Blocks final pressure."
              },
              {
                  "rule_id": "edge_anchor_targets_declared",
                  "pass": len(EDGE_ANCHOR_REVIEW_TARGETS) == 2,
                  "result": "z=0.15 and z=2.33 review targets declared",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "central_BOSS_core_preserved",
                  "pass": all(row["review_status"] == "locked_from_v4_119_v4_120" for row in CURRENT_VERIFIED_BRIDGE_STATUS if row["role"] == "central_BOSS_verified"),
                  "result": "central BOSS z=0.38/0.51/0.61 covariance remains locked",
                  "boundary": "Do not disturb verified core."
              },
              {
                  "rule_id": "edge_review_policy_declared",
                  "pass": len(EDGE_REVIEW_POLICY) >= 6,
                  "result": f"{len(EDGE_REVIEW_POLICY)} edge-review policies declared",
                  "boundary": "No source fetch yet."
              },
              {
                  "rule_id": "next_probe_schema_locked",
                  "pass": schema_fields == required_schema_fields,
                  "result": f"{len(NEXT_PROBE_INPUT_SCHEMA)} next-probe schema fields declared",
                  "boundary": "Schema only."
              },
              {
                  "rule_id": "quality_gates_declared",
                  "pass": len(QUALITY_GATES_FOR_NEXT_PROBE) >= 6,
                  "result": f"{len(QUALITY_GATES_FOR_NEXT_PROBE)} quality gates declared",
                  "boundary": "No bridge pressure computed."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": NEXT_PROBE_DESIGN["allowed_to_compute_final_RSD_pressure"] is False and NEXT_PROBE_DESIGN["allowed_to_validate_TAIRID"] is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_122_rules_passed")

          if failed_gates:
              readiness_label = "low_high_z_anchor_covariance_review_design_failed"
              next_allowed_step = "Repair low/high-z anchor covariance review design before edge-anchor review probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.123 edge anchor review probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_verified_bridge_stable": upstream["diagnostic_pressure_stable"],
              "upstream_pressure_z_all_zero": upstream["pressure_z_all_zero"],
              "central_BOSS_covariance_locked": True,
              "edge_anchor_covariance_incomplete": upstream["edge_anchor_covariance_incomplete"],
              "low_z_anchor_source_covariance_complete": False,
              "high_z_anchor_source_covariance_complete": False,
              "edge_anchor_review_target_count": len(EDGE_ANCHOR_REVIEW_TARGETS),
              "current_verified_bridge_status_count": len(CURRENT_VERIFIED_BRIDGE_STATUS),
              "edge_review_policy_count": len(EDGE_REVIEW_POLICY),
              "next_probe_input_schema_field_count": len(NEXT_PROBE_INPUT_SCHEMA),
              "quality_gate_count": len(QUALITY_GATES_FOR_NEXT_PROBE),
              "edge_source_fetch_performed": False,
              "bridge_pressure_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "edge_anchor_review_targets": EDGE_ANCHOR_REVIEW_TARGETS,
              "current_verified_bridge_status": CURRENT_VERIFIED_BRIDGE_STATUS,
              "edge_review_policy": EDGE_REVIEW_POLICY,
              "next_probe_design": NEXT_PROBE_DESIGN,
              "next_probe_input_schema": NEXT_PROBE_INPUT_SCHEMA,
              "quality_gates_for_next_probe": QUALITY_GATES_FOR_NEXT_PROBE,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "edge_anchor_covariance_review_design_passed": not bool(failed_gates),
                  "central_BOSS_covariance_locked": True,
                  "low_z_anchor_source_covariance_complete": False,
                  "high_z_anchor_source_covariance_complete": False,
                  "edge_source_fetch_performed": False,
                  "bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_122_low_high_z_anchor_covariance_review_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "edge_anchor_review_targets_v4_122.csv",
              EDGE_ANCHOR_REVIEW_TARGETS,
              ["anchor_id", "z", "current_bridge_position", "current_source_family", "current_value_label", "current_covariance_status", "review_priority", "primary_question", "allowed_outcomes", "blocks_final_pressure"]
          )

          write_csv(
              OUTDIR / "current_verified_bridge_status_v4_122.csv",
              CURRENT_VERIFIED_BRIDGE_STATUS,
              ["position", "z", "role", "covariance_status", "review_status"]
          )

          write_csv(
              OUTDIR / "edge_review_policy_v4_122.csv",
              EDGE_REVIEW_POLICY,
              ["policy_id", "requirement", "reason", "applied_now"]
          )

          write_csv(
