          for row in EDGE_ANCHOR_REVIEW_TARGETS:
              md.append(f"| `{row['anchor_id']}` | `{row['z']}` | `{row['current_covariance_status']}` | `{row['review_priority']}` |")
          md.append("")
          md.append("## System health")
