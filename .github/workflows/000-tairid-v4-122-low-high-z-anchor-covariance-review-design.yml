          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_122_low_high_z_anchor_covariance_review_design.json",
              "tairid_v4_122_low_high_z_anchor_covariance_review_design.md",
              "edge_anchor_review_targets_v4_122.csv",
              "current_verified_bridge_status_v4_122.csv",
              "edge_review_policy_v4_122.csv",
              "next_probe_input_schema_v4_122.csv",
              "quality_gates_for_next_probe_v4_122.csv",
              "blocked_claims_v4_122.csv",
              "next_route_options_v4_122.csv",
              "rule_results_v4_122.csv"
