name: 000 TAIRID v4.104 Multi File Broader Chain Coverage Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-104-multi-file-broader-chain-coverage-design.yml"

jobs:
  tairid-v4-104-multi-file-broader-chain-coverage-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.104 multi-file broader chain coverage design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_104_multi_file_broader_chain_coverage_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_104_multi_file_broader_chain_coverage_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_104_multi_file_broader_chain_coverage_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse chain sample rows.",
              "This does not run CAMB.",
              "This does not compute weighted mean values.",
              "This does not compute a weighted covariance matrix.",
              "This does not compute Planck reference uncertainty.",
              "This designs broader multi-file or multi-segment Planck chain coverage after v4.103 rejected the 256-row one-file-prefix covariance as final reference uncertainty.",
              "A pass means the broader chain coverage route is specified and ready for a bounded parser probe."
          ]

          UPSTREAM_LOCKS = {
              "v4_103_reference_uncertainty_sufficiency_gate": {
                  "readiness_label": "reference_uncertainty_sufficiency_gate_passed_not_final_ready_for_multi_file_broader_chain_coverage_design",
                  "mechanics_gate_passed": True,
                  "final_reference_uncertainty_sufficient": False,
                  "final_reference_uncertainty_rejected": True,
                  "upstream_sample_output_vector_count": 256,
                  "upstream_effective_sample_size": 156.27004909983634,
                  "upstream_full_covariance_dimension": 10,
                  "upstream_full_covariance_rank": 4,
                  "upstream_fsigma8_covariance_dimension": 5,
                  "upstream_fsigma8_covariance_rank": 3,
                  "recommended_next_target_valid_rows": 1024,
                  "recommended_next_minimum_valid_rows": 512,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_102_1_larger_bounded_weighted_covariance_mechanics_probe": {
                  "readiness_label": "larger_bounded_weighted_covariance_mechanics_probe_passed_ready_for_reference_uncertainty_sufficiency_gate",
                  "sample_output_vector_count": 256,
                  "weighted_mean_vector_computed": True,
                  "weighted_covariance_matrix_computed": True,
                  "fsigma8_covariance_matrix_computed": True,
                  "effective_sample_size": 156.27004909983634,
                  "full_covariance_rank": 4,
                  "fsigma8_covariance_rank": 3,
                  "Planck_reference_uncertainty_computed": False
              },
              "v4_101_larger_bounded_parse_plus_solver_probe": {
                  "readiness_label": "larger_bounded_parse_plus_solver_probe_passed_ready_for_larger_bounded_weighted_covariance_mechanics_probe",
                  "valid_sample_row_count": 256,
                  "solved_sample_count": 256,
                  "sample_output_vector_count": 256,
                  "all_output_vectors_complete": True,
                  "all_weights_preserved": True,
                  "all_orientations_reversed": True
              }
          }

          SELECTED_ROOT = "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE"

          BROADER_COVERAGE_TARGETS = {
              "target_valid_rows_next_probe": 1024,
              "minimum_valid_rows_next_probe": 512,
              "preferred_sample_member_count": 4,
              "minimum_sample_member_count": 2,
              "preferred_rows_per_member": 256,
              "minimum_rows_per_member_when_available": 128,
              "chunk_size_for_later_solver": 16,
              "expected_output_vector_dimension": 10,
              "locked_output_orientation": "reversed_raw_order",
              "parse_now": False,
              "run_CAMB_now": False,
              "compute_covariance_now": False,
              "compute_final_pressure_now": False
          }

          CANDIDATE_CHAIN_MEMBER_DESIGN = [
              {
                  "member_order": 1,
                  "member_role": "primary_chain_member_1",
                  "member_template": SELECTED_ROOT + "_1.txt",
                  "target_valid_rows": 256,
                  "minimum_valid_rows": 128,
                  "selection_status": "candidate_required_if_present",
                  "parse_now": False
              },
              {
                  "member_order": 2,
                  "member_role": "primary_chain_member_2",
                  "member_template": SELECTED_ROOT + "_2.txt",
                  "target_valid_rows": 256,
                  "minimum_valid_rows": 128,
                  "selection_status": "candidate_required_if_present",
                  "parse_now": False
              },
              {
                  "member_order": 3,
                  "member_role": "primary_chain_member_3",
                  "member_template": SELECTED_ROOT + "_3.txt",
                  "target_valid_rows": 256,
                  "minimum_valid_rows": 128,
                  "selection_status": "candidate_required_if_present",
                  "parse_now": False
              },
              {
                  "member_order": 4,
                  "member_role": "primary_chain_member_4",
                  "member_template": SELECTED_ROOT + "_4.txt",
                  "target_valid_rows": 256,
                  "minimum_valid_rows": 128,
                  "selection_status": "candidate_required_if_present",
                  "parse_now": False
              }
          ]

          COVERAGE_POLICY = [
              {
                  "policy_id": "central_directory_verification_first",
                  "requirement": "v4.105 must re-read the bounded ZIP64 central directory and verify which selected-root chain members actually exist.",
                  "reason": "Do not assume member count from prior design text alone."
              },
              {
                  "policy_id": "multi_file_preferred",
                  "requirement": "Prefer samples spread across at least four chain members when those members exist.",
                  "reason": "The v4.103 insufficiency gate rejected one-file-prefix coverage."
              },
              {
                  "policy_id": "minimum_two_file_coverage",
                  "requirement": "If fewer than two chain sample members are available, the parser may still write artifacts but must fail the broader-coverage gate.",
                  "reason": "One file cannot repair the one-file-prefix limitation."
              },
              {
                  "policy_id": "target_1024_minimum_512",
                  "requirement": "The next parser should target 1024 valid rows and pass only if at least 512 valid rows are parsed with acceptable member coverage.",
                  "reason": "A larger effective sample and broader coverage are needed before stronger covariance mechanics."
              },
              {
                  "policy_id": "weights_and_primary_inputs_required",
                  "requirement": "Every sample packet must preserve sample weight, loglike proxy, omegabh2, omegach2, theta, tau, logA, ns, CAMB theta, and As.",
                  "reason": "Later solver batches require reproducible CAMB inputs."
              },
              {
                  "policy_id": "dedupe_guard",
                  "requirement": "Sample packets must carry member name, line number, and line hash so duplicate rows can be identified.",
                  "reason": "Broader coverage must not be fake coverage through duplicate sample packets."
              }
          ]

          PARSER_PROBE_CONTRACT = [
              {
                  "step": 1,
                  "action": "Fetch the locked Planck fullGrid ZIP64 central directory using bounded range reads.",
                  "output": "Manifest table filtered to selected-root chain sample members.",
                  "hard_boundary": "No full ZIP download."
              },
              {
                  "step": 2,
                  "action": "Fetch the selected .paramnames member and map required primary parameters.",
                  "output": "Column map for omegabh2, omegach2, theta, tau, logA, ns.",
                  "hard_boundary": "No posterior inference."
              },
              {
                  "step": 3,
                  "action": "Fetch bounded compressed prefixes from each selected-root chain sample member.",
                  "output": "Candidate sample rows from multiple chain members.",
                  "hard_boundary": "No full chain-file import."
              },
              {
                  "step": 4,
                  "action": "Parse valid numeric rows and build sample packets with weights and primary CAMB inputs.",
                  "output": "Broader sample packet CSV.",
                  "hard_boundary": "No CAMB run in parser probe."
              },
              {
                  "step": 5,
                  "action": "Enforce member coverage, row-count, finite-weight, primary-value, and dedupe guards.",
                  "output": "Coverage gate pass/fail and route decision.",
                  "hard_boundary": "No final reference uncertainty claim."
              }
          ]

          SAMPLE_PACKET_SCHEMA = [
              {"field": "sample_number", "required": True, "purpose": "Sequential parser output index."},
              {"field": "member_name", "required": True, "purpose": "Source chain member for coverage and dedupe."},
              {"field": "source_line_number", "required": True, "purpose": "Source line inside chain member."},
              {"field": "line_sha256_16", "required": True, "purpose": "Dedupe and provenance guard."},
              {"field": "sample_weight", "required": True, "purpose": "Posterior sample weighting."},
              {"field": "minus_loglike_or_proxy", "required": True, "purpose": "Likelihood diagnostic column to preserve."},
              {"field": "omegabh2", "required": True, "purpose": "CAMB baryon density input."},
              {"field": "omegach2", "required": True, "purpose": "CAMB cold dark matter density input."},
              {"field": "theta", "required": True, "purpose": "Planck chain theta/100theta source value."},
              {"field": "tau", "required": True, "purpose": "CAMB optical depth input."},
              {"field": "logA", "required": True, "purpose": "Converted into As = exp(logA)/1e10."},
              {"field": "ns", "required": True, "purpose": "CAMB scalar spectral index input."},
              {"field": "cosmomc_theta_for_future_CAMB", "required": True, "purpose": "Converted theta value for CAMB."},
              {"field": "As_for_future_CAMB", "required": True, "purpose": "Converted scalar amplitude for CAMB."}
          ]

          SUFFICIENCY_WARNINGS_TO_CARRY = [
              {
                  "warning_id": "not_final_reference_uncertainty",
                  "meaning": "Even 1024 parsed rows would still be a bounded diagnostic until broader representativeness is justified."
              },
              {
                  "warning_id": "rank_must_be_rechecked_after_solver",
                  "meaning": "Covariance rank must be re-evaluated after the larger solved batch."
              },
              {
                  "warning_id": "effective_sample_size_must_be_recomputed",
                  "meaning": "Effective sample size must be recomputed from the broader sample weights."
              },
              {
                  "warning_id": "member_coverage_must_be_reported",
                  "meaning": "The number of contributing chain members must be explicit in later artifacts."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A weighted covariance matrix was computed in v4.104.",
              "A weighted posterior mean vector was computed in v4.104.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The multi-file coverage design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "A 1024-row parser target is the same as final Planck reference uncertainty.",
              "The next parser probe will be enough for final RSD pressure.",
              "Design output is already posterior covariance."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_105_multi_file_broader_sample_parser_probe",
                  "purpose": "Parse a larger/multi-file bounded sample set with target 1024 valid rows and minimum 512.",
                  "why_next": "v4.103 rejected one-file-prefix coverage and asked for broader chain coverage."
              },
              {
                  "priority": 2,
                  "route_id": "v4_106_larger_broader_solver_batch_design",
                  "purpose": "Design chunked CAMB solving for the broader parsed sample set.",
                  "why_next": "Solver scale should follow parser success."
              },
              {
                  "priority": 3,
                  "route_id": "v4_107_larger_broader_solver_probe",
                  "purpose": "Run CAMB over the larger broader parsed sample set in bounded chunks.",
                  "why_next": "Reference covariance mechanics need solved output vectors."
              },
              {
                  "priority": 4,
                  "route_id": "v4_108_broader_covariance_mechanics_probe",
                  "purpose": "Compute a broader weighted covariance mechanics diagnostic after solver output exists.",
                  "why_next": "Sufficiency must be judged after broader coverage and solver output."
              }
          ]

          failed_gates = []
          warnings = [
              "coverage_design_only",
              "no_chain_rows_parsed",
              "no_CAMB_run",
              "no_weighted_mean_computed",
              "no_covariance_computed",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          target_rows = BROADER_COVERAGE_TARGETS["target_valid_rows_next_probe"]
          min_rows = BROADER_COVERAGE_TARGETS["minimum_valid_rows_next_probe"]
          preferred_members = BROADER_COVERAGE_TARGETS["preferred_sample_member_count"]
          minimum_members = BROADER_COVERAGE_TARGETS["minimum_sample_member_count"]

          if UPSTREAM_LOCKS["v4_103_reference_uncertainty_sufficiency_gate"]["final_reference_uncertainty_rejected"] is not True:
              failed_gates.append("upstream_final_reference_uncertainty_rejection_not_carried")

          if UPSTREAM_LOCKS["v4_103_reference_uncertainty_sufficiency_gate"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          if target_rows != 1024:
              failed_gates.append("target_rows_not_1024")

          if min_rows != 512:
              failed_gates.append("minimum_rows_not_512")

          if min_rows > target_rows:
              failed_gates.append("minimum_rows_exceed_target_rows")

          if preferred_members < 4:
              failed_gates.append("preferred_member_count_less_than_4")

          if minimum_members < 2:
              failed_gates.append("minimum_member_count_less_than_2")

          if len(CANDIDATE_CHAIN_MEMBER_DESIGN) < 4:
              failed_gates.append("candidate_chain_member_design_less_than_4")

          total_candidate_target = sum(row["target_valid_rows"] for row in CANDIDATE_CHAIN_MEMBER_DESIGN)
          if total_candidate_target != target_rows:
              failed_gates.append("candidate_target_rows_do_not_sum_to_1024")

          schema_fields = {row["field"] for row in SAMPLE_PACKET_SCHEMA}
          required_schema_fields = {
              "sample_number",
              "member_name",
              "source_line_number",
              "line_sha256_16",
              "sample_weight",
              "minus_loglike_or_proxy",
              "omegabh2",
              "omegach2",
              "theta",
              "tau",
              "logA",
              "ns",
              "cosmomc_theta_for_future_CAMB",
              "As_for_future_CAMB"
          }
          if schema_fields != required_schema_fields:
              failed_gates.append("sample_packet_schema_incomplete")

          if len(PARSER_PROBE_CONTRACT) < 5:
              failed_gates.append("parser_probe_contract_incomplete")

          if len(COVERAGE_POLICY) < 6:
              failed_gates.append("coverage_policy_incomplete")

          if any(row["parse_now"] is not False for row in CANDIDATE_CHAIN_MEMBER_DESIGN):
              failed_gates.append("candidate_member_marked_parse_now_too_early")

          if BROADER_COVERAGE_TARGETS["run_CAMB_now"] is not False:
              failed_gates.append("CAMB_run_allowed_too_early")

          if BROADER_COVERAGE_TARGETS["compute_covariance_now"] is not False:
              failed_gates.append("covariance_computed_too_early")

          if BROADER_COVERAGE_TARGETS["compute_final_pressure_now"] is not False:
              failed_gates.append("final_pressure_allowed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "weighted covariance matrix was computed in v4.104",
              "weighted posterior mean vector was computed in v4.104",
              "final rsd pressure score",
              "validates tairid cosmology",
              "1024-row parser target is the same as final planck reference uncertainty",
              "next parser probe will be enough for final rsd pressure",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "multi_file_broader_chain_coverage_design_passed_ready_for_multi_file_broader_sample_parser_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_sufficiency_rejection_carried",
                  "pass": UPSTREAM_LOCKS["v4_103_reference_uncertainty_sufficiency_gate"]["final_reference_uncertainty_rejected"] is True,
                  "result": "v4.103 rejected final reference uncertainty and requested broader coverage",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "next_row_targets_locked",
                  "pass": target_rows == 1024 and min_rows == 512,
                  "result": "target=1024 valid rows; minimum=512 valid rows",
                  "boundary": "Parser target only."
              },
              {
                  "rule_id": "multi_file_coverage_policy_declared",
                  "pass": preferred_members >= 4 and minimum_members >= 2,
                  "result": f"preferred_members={preferred_members}; minimum_members={minimum_members}",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "candidate_chain_members_declared",
                  "pass": len(CANDIDATE_CHAIN_MEMBER_DESIGN) >= 4 and total_candidate_target == target_rows,
                  "result": f"{len(CANDIDATE_CHAIN_MEMBER_DESIGN)} candidate members; target sum={total_candidate_target}",
                  "boundary": "Presence verified in next parser."
              },
              {
                  "rule_id": "parser_probe_contract_declared",
                  "pass": len(PARSER_PROBE_CONTRACT) >= 5,
                  "result": f"{len(PARSER_PROBE_CONTRACT)} parser probe steps declared",
                  "boundary": "No rows parsed."
              },
              {
                  "rule_id": "sample_packet_schema_declared",
                  "pass": schema_fields == required_schema_fields,
                  "result": f"{len(SAMPLE_PACKET_SCHEMA)} sample packet fields declared",
                  "boundary": "No sample packets created."
              },
              {
                  "rule_id": "dedupe_and_provenance_policy_preserved",
                  "pass": "line_sha256_16" in schema_fields and "member_name" in schema_fields,
                  "result": "member_name and line_sha256_16 required",
                  "boundary": "Provenance guard only."
              },
              {
                  "rule_id": "CAMB_and_covariance_still_blocked",
                  "pass": BROADER_COVERAGE_TARGETS["run_CAMB_now"] is False and BROADER_COVERAGE_TARGETS["compute_covariance_now"] is False,
                  "result": "no CAMB run and no covariance computation in v4.104",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "final_pressure_still_blocked",
                  "pass": BROADER_COVERAGE_TARGETS["compute_final_pressure_now"] is False,
                  "result": "final RSD pressure remains blocked",
                  "boundary": "No final pressure score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_104_rules_passed")

          if failed_gates:
              readiness_label = "multi_file_broader_chain_coverage_design_failed"
              next_allowed_step = "Repair multi-file coverage design before a broader parser probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.105 multi-file broader sample parser probe. "
                  "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "selected_root": SELECTED_ROOT,
              "upstream_final_reference_uncertainty_rejected": True,
              "upstream_sample_output_vector_count": UPSTREAM_LOCKS["v4_103_reference_uncertainty_sufficiency_gate"]["upstream_sample_output_vector_count"],
              "upstream_effective_sample_size": UPSTREAM_LOCKS["v4_103_reference_uncertainty_sufficiency_gate"]["upstream_effective_sample_size"],
              "upstream_full_covariance_rank": UPSTREAM_LOCKS["v4_103_reference_uncertainty_sufficiency_gate"]["upstream_full_covariance_rank"],
              "upstream_fsigma8_covariance_rank": UPSTREAM_LOCKS["v4_103_reference_uncertainty_sufficiency_gate"]["upstream_fsigma8_covariance_rank"],
              "target_valid_rows_next_probe": target_rows,
              "minimum_valid_rows_next_probe": min_rows,
              "candidate_chain_member_count": len(CANDIDATE_CHAIN_MEMBER_DESIGN),
              "preferred_sample_member_count": preferred_members,
              "minimum_sample_member_count": minimum_members,
              "candidate_target_rows_sum": total_candidate_target,
              "parser_probe_step_count": len(PARSER_PROBE_CONTRACT),
              "coverage_policy_count": len(COVERAGE_POLICY),
              "sample_packet_schema_field_count": len(SAMPLE_PACKET_SCHEMA),
              "chain_rows_parsed": False,
              "sample_packets_created": False,
              "CAMB_run": False,
              "weighted_mean_vector_computed": False,
              "weighted_covariance_matrix_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "selected_root": SELECTED_ROOT,
              "broader_coverage_targets": BROADER_COVERAGE_TARGETS,
              "candidate_chain_member_design": CANDIDATE_CHAIN_MEMBER_DESIGN,
              "coverage_policy": COVERAGE_POLICY,
              "parser_probe_contract": PARSER_PROBE_CONTRACT,
              "sample_packet_schema": SAMPLE_PACKET_SCHEMA,
              "sufficiency_warnings_to_carry": SUFFICIENCY_WARNINGS_TO_CARRY,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "target_valid_rows_next_probe": target_rows,
                  "minimum_valid_rows_next_probe": min_rows,
                  "preferred_sample_member_count": preferred_members,
                  "minimum_sample_member_count": minimum_members,
                  "chain_rows_parsed": False,
                  "sample_packets_created": False,
                  "CAMB_run": False,
                  "weighted_mean_vector_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_104_multi_file_broader_chain_coverage_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
