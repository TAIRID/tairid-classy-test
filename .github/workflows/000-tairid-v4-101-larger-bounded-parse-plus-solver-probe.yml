                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "larger_bounded_parse_plus_solver_probe_passed_ready_for_larger_bounded_weighted_covariance_mechanics_probe"

          rule_results = [
