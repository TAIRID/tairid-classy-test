          if len(vector_component_records) != output_vector_count * OUTPUT_VECTOR_DIMENSION:
              failed_gates.append("vector_component_count_mismatch")
          if target_solver_samples_reached and not all_chunks_complete:
              failed_gates.append("not_all_chunks_complete_for_target_batch")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
