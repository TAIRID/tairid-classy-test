              timeout_seconds=21600,
              env=env
          )

          runner_output = {
              "python_executable": "",
              "python_version": "",
              "user_site": user_site,
              "sys_path_head": [],
              "numpy_imported": False,
              "numpy_version": "",
              "camb_imported": False,
              "camb_version": "",
              "chunk_solver_records": [],
              "sample_solver_records": [],
              "sample_output_vectors": [],
              "top_error": ""
          }

          if runner_json_path.exists():
              try:
                  runner_output = json.loads(runner_json_path.read_text(encoding="utf-8"))
              except Exception as exc:
                  failed_gates.append("runner_json_read_failed")
                  runner_output["top_error"] = f"{type(exc).__name__}: {exc}"
          else:
              failed_gates.append("runner_json_missing")

          chunk_solver_records = runner_output.get("chunk_solver_records", [])
          sample_solver_records = runner_output.get("sample_solver_records", [])
          sample_output_vectors = runner_output.get("sample_output_vectors", [])

          vector_component_records = []
          for row in sample_output_vectors:
              vector = row.get("target_vector_10", [])
              for schema in OUTPUT_VECTOR_SCHEMA:
                  position = int(schema["position"])
                  vector_component_records.append({
                      "chunk_index": row.get("chunk_index", ""),
