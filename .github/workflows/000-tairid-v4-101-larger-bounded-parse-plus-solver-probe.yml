          )
          target_solver_samples_reached = solved_sample_count >= TARGET_VALID_SAMPLE_ROWS
          minimum_solver_samples_reached = solved_sample_count >= MINIMUM_VALID_SAMPLE_ROWS

          all_solver_records_complete = (
              solver_record_count == sample_count
              and all(row.get("complete_arrays") is True for row in sample_solver_records)
