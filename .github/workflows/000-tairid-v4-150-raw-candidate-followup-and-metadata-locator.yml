                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_150_raw_candidate_followup_and_metadata_locator.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "raw_fetch_records_v4_150.csv",
              raw_fetch_records,
              ["source_id", "url", "fetch_ok", "status_code", "content_type", "bytes_read", "sha256_16", "error", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "raw_text_structure_records_v4_150.csv",
              raw_text_records,
              ["source_id", "expected_role", "total_line_count", "nonempty_line_count", "numeric_row_count", "text_row_count", "column_count_set", "min_numeric_columns", "max_numeric_columns", "uniform_numeric_width", "square_matrix_hint", "matrix_symmetric_hint", "max_abs_asymmetry", "positive_definite_hint", "cholesky_status", "min_cholesky_pivot", "diagonal_values", "keyword_hits", "preview_lines", "structure_class", "claim_boundary"]
          )

          write_csv(
