name: 000 TAIRID v4.150 Raw Candidate Followup and Metadata Locator

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-150-raw-candidate-followup-and-metadata-locator.yml"

jobs:
  tairid-v4-150-raw-candidate-followup-and-metadata-locator:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.150 raw candidate followup and metadata locator
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_150_raw_candidate_followup_and_metadata_locator

          python - <<'PY'
          import csv
          import hashlib
          import json
          import math
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_150_raw_candidate_followup_and_metadata_locator")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_150_raw_candidate_followup_and_metadata_locator"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not ingest covariance as a scientific input.",
              "This does not recompute eBOSS pressure.",
              "This follow-up inspects raw candidate metadata, repository listing, text previews, covariance matrix diagnostics, and missing variable-order status only."
          ]

          UPSTREAM_LOCKS = {
              "v4_149_raw_candidate_file_structure_probe": {
                  "readiness_label": "raw_candidate_file_structure_probe_passed_structure_status_recorded_ready_for_next_raw_candidate_route",
                  "rule_pass_count": 18,
                  "rule_total_count": 18,
                  "raw_candidate_target_count": 2,
                  "fetch_ok_count": 2,
                  "fetch_failed_count": 0,
                  "both_raw_files_fetched": True,
                  "structure_ready_count": 1,
                  "square_matrix_hint_count": 1,
                  "vector_hint_count": 0,
                  "shape_compatible_candidate": False,
                  "selected_next_route": "raw_candidate_followup_or_alternate_source_review",
                  "raw_candidate_ingested": False,
                  "source_data_ingested": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "likelihood_or_bic_run": False,
                  "reference_vector_still_missing": True,
                  "reference_covariance_still_missing": True,
                  "same_program_eBOSS_covariance_still_limited": True,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_148_source_status_review_and_manifest_fill": {
                  "readiness_label": "source_status_review_manifest_fill_passed_manifest_rows_drafted_raw_candidates_ready_for_structure_probe",
                  "raw_candidate_count": 2,
                  "manifest_draft_row_count": 10,
                  "manual_extraction_queue_count": 15,
                  "missing_reference_package_count": 3,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          RAW_CANDIDATE_TARGETS = [
              {
                  "source_id": "icosmology_lrgxelg_data_raw",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK.dat",
                  "expected_role": "parameter_or_observable_vector_candidate"
              },
              {
                  "source_id": "icosmology_lrgxelg_cov_raw",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK_cov.dat",
                  "expected_role": "covariance_matrix_candidate"
              }
          ]

          REPOSITORY_TARGETS = [
              {
                  "source_id": "icosmology_repo_contents_api_root",
                  "url": "https://api.github.com/repos/icosmology/eBOSS_DR16_LRGxELG/contents/",
                  "expected_role": "repository_file_listing"
              },
              {
                  "source_id": "icosmology_repo_readme_raw",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/README.md",
                  "expected_role": "readme_or_metadata_candidate"
              },
              {
                  "source_id": "icosmology_repo_readme_raw_rst",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/README.rst",
                  "expected_role": "readme_or_metadata_candidate"
              },
              {
                  "source_id": "icosmology_repo_readme_raw_txt",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/README.txt",
                  "expected_role": "readme_or_metadata_candidate"
              }
          ]

          PARAMETER_KEYWORDS = [
              "fsigma8",
              "fsig8",
              "f_sigma8",
              "fσ8",
              "alpha",
              "alpha_perp",
              "alpha_parallel",
              "apar",
              "aperp",
              "bao",
              "rsd",
              "lrg",
              "elg",
              "multi",
              "tracer",
              "cov",
              "covariance",
              "pk",
              "fs"
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample rows were parsed.",
              "CAMB produced the final reference vector.",
              "A raw candidate file is an ingested covariance matrix.",
              "A square numeric matrix is automatically the correct covariance.",
              "A repository README proves variable order without review.",
              "A shape match proves variable order.",
              "The eBOSS family points are independent by default.",
              "The eBOSS sign pattern is a final physical conclusion.",
              "BIC, likelihood, or posterior comparison has been run.",
              "Public-facing validation claims are allowed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_151_raw_candidate_variable_order_review",
                  "purpose": "Use repository metadata, file listing, previews, and covariance diagnostics to decide whether a parser design is safe.",
                  "why_next": "A 6x6 covariance-like file needs parameter labels and provenance before ingestion."
              },
              {
                  "priority": 2,
                  "route_id": "v4_151_alternate_value_file_locator",
                  "purpose": "If the parameter-vector file is nonnumeric or not self-describing, search repository contents for alternate value/README/metadata files.",
                  "why_next": "The data file in v4.149 was fetched but not numeric."
              },
              {
                  "priority": 3,
                  "route_id": "v4_151_manifest_rows_materializer",
                  "purpose": "Materialize source and raw-candidate records into a manifest with empty manual extraction fields.",
                  "why_next": "Value/provenance sources still need manual extraction."
              },
              {
                  "priority": 4,
                  "route_id": "v4_151_reference_vector_generation_or_request",
                  "purpose": "Create or request a source-backed 12-redshift reference vector table.",
                  "why_next": "The reference side remains missing."
              }
          ]

          failed_gates = []
          warnings = [
              "followup_metadata_locator_only",
              "raw_files_not_ingested",
              "covariance_shape_not_covariance_use",
              "variable_order_not_confirmed",
              "repository_metadata_not_authority_without_review",
              "pressure_not_recomputed",
              "not_validation"
          ]

          def fetch_url(source_id, url, max_bytes=2_000_000):
              record = {
                  "source_id": source_id,
                  "url": url,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "sha256_16": "",
                  "error": "",
                  "claim_boundary": "fetch_status_only_not_ingestion"
              }
              text = ""
              raw = b""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.150-followup-metadata-locator/1.0",
                          "Accept": "text/plain,application/json,*/*"
                      }
                  )
                  with urllib.request.urlopen(req, timeout=45) as response:
                      raw = response.read(max_bytes)
                      text = raw.decode("utf-8", errors="replace")
                      record["fetch_ok"] = True
                      record["status_code"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      record["bytes_read"] = len(raw)
                      record["sha256_16"] = hashlib.sha256(raw).hexdigest()[:16]
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, text, raw

          def parse_numeric_row(line):
              cleaned = line.strip().replace(",", " ")
              if not cleaned:
                  return []
              parts = cleaned.split()
              values = []
              for part in parts:
                  try:
                      values.append(float(part))
                  except Exception:
                      return []
              return values

          def cholesky_positive_definite(matrix):
              n = len(matrix)
              if n == 0:
                  return False, 0.0, "empty_matrix"
              L = [[0.0] * n for _ in range(n)]
              min_pivot = None
              try:
                  for i in range(n):
                      for j in range(i + 1):
                          s = sum(L[i][k] * L[j][k] for k in range(j))
                          if i == j:
                              pivot = matrix[i][i] - s
                              if min_pivot is None or pivot < min_pivot:
                                  min_pivot = pivot
                              if pivot <= 0:
                                  return False, pivot, "non_positive_pivot"
                              L[i][j] = math.sqrt(pivot)
                          else:
                              L[i][j] = (matrix[i][j] - s) / L[j][j]
                  return True, min_pivot if min_pivot is not None else 0.0, "positive_definite_by_cholesky"
              except Exception as exc:
                  return False, min_pivot if min_pivot is not None else 0.0, f"{type(exc).__name__}: {exc}"

          def analyze_text_file(source_id, text):
              lines = text.splitlines() if text else []
              nonempty = [line for line in lines if line.strip()]
              numeric_rows = []
              text_rows = []
              for line in nonempty:
                  stripped = line.strip()
                  if stripped.startswith(("#", "%", ";", "//")):
                      text_rows.append(stripped)
                      continue
                  numeric = parse_numeric_row(stripped)
                  if numeric:
                      numeric_rows.append(numeric)
                  else:
                      text_rows.append(stripped)

              lower_text = text.lower()
              keyword_hits = [kw for kw in PARAMETER_KEYWORDS if kw.lower() in lower_text]
              column_counts = sorted(set(len(row) for row in numeric_rows))
              numeric_row_count = len(numeric_rows)
              max_cols = max(column_counts) if column_counts else 0
              min_cols = min(column_counts) if column_counts else 0
              uniform_width = len(column_counts) == 1 and numeric_row_count > 0
              square_hint = uniform_width and numeric_row_count == max_cols and numeric_row_count > 1

              matrix_symmetric = False
              max_abs_asymmetry = ""
              diagonal_values = ""
              positive_definite_hint = False
              cholesky_status = "not_checked"
              min_cholesky_pivot = ""
              if square_hint:
                  n = numeric_row_count
                  matrix = numeric_rows
                  max_asym = 0.0
                  for i in range(n):
                      for j in range(n):
                          max_asym = max(max_asym, abs(matrix[i][j] - matrix[j][i]))
                  matrix_symmetric = max_asym < 1e-10
                  max_abs_asymmetry = max_asym
                  diagonal_values = ",".join(f"{matrix[i][i]:.12g}" for i in range(n))
                  positive_definite_hint, pivot, cholesky_status = cholesky_positive_definite(matrix)
                  min_cholesky_pivot = pivot

              preview_lines = " | ".join(line[:220] for line in nonempty[:10])

              if square_hint:
                  structure_class = "square_numeric_matrix_candidate"
              elif numeric_row_count > 0:
                  structure_class = "numeric_non_square_or_vector_candidate"
              elif len(keyword_hits) > 0:
                  structure_class = "text_metadata_or_label_candidate"
              elif len(nonempty) > 0:
                  structure_class = "text_non_numeric_candidate"
              else:
                  structure_class = "empty_or_unreadable"

              return {
                  "source_id": source_id,
                  "total_line_count": len(lines),
                  "nonempty_line_count": len(nonempty),
                  "numeric_row_count": numeric_row_count,
                  "text_row_count": len(text_rows),
                  "column_count_set": ",".join(str(c) for c in column_counts) if column_counts else "none",
                  "min_numeric_columns": min_cols,
                  "max_numeric_columns": max_cols,
                  "uniform_numeric_width": uniform_width,
                  "square_matrix_hint": square_hint,
                  "matrix_symmetric_hint": matrix_symmetric,
                  "max_abs_asymmetry": max_abs_asymmetry,
                  "positive_definite_hint": positive_definite_hint,
                  "cholesky_status": cholesky_status,
                  "min_cholesky_pivot": min_cholesky_pivot,
                  "diagonal_values": diagonal_values,
                  "keyword_hits": ",".join(keyword_hits) if keyword_hits else "none",
                  "preview_lines": preview_lines,
                  "structure_class": structure_class,
                  "claim_boundary": "metadata_and_structure_only_not_ingestion"
              }

          raw_fetch_records = []
          raw_text_records = []
          for target in RAW_CANDIDATE_TARGETS:
              fetch_record, text, raw = fetch_url(target["source_id"], target["url"])
              raw_fetch_records.append(fetch_record)
              structure = analyze_text_file(target["source_id"], text)
              structure["expected_role"] = target["expected_role"]
              raw_text_records.append(structure)

          repo_fetch_records = []
          repo_listing_records = []
          repo_metadata_records = []
          for target in REPOSITORY_TARGETS:
              fetch_record, text, raw = fetch_url(target["source_id"], target["url"])
              repo_fetch_records.append(fetch_record)
              if fetch_record["fetch_ok"] and "api.github.com" in target["url"]:
                  try:
                      payload = json.loads(text)
                      if isinstance(payload, list):
                          for item in payload:
                              name = str(item.get("name", ""))
                              path = str(item.get("path", ""))
                              download_url = str(item.get("download_url", "") or "")
                              item_type = str(item.get("type", ""))
                              lower = (name + " " + path).lower()
                              keyword_hits = [kw for kw in PARAMETER_KEYWORDS if kw.lower() in lower]
                              repo_listing_records.append({
                                  "source_id": target["source_id"],
                                  "name": name,
                                  "path": path,
                                  "type": item_type,
                                  "download_url": download_url,
                                  "keyword_hits": ",".join(keyword_hits) if keyword_hits else "none",
                                  "possible_metadata_or_data": bool(keyword_hits) or name.lower().startswith("readme"),
                                  "claim_boundary": "repo_listing_only_not_ingestion"
                              })
                  except Exception as exc:
                      repo_listing_records.append({
                          "source_id": target["source_id"],
                          "name": "json_parse_failed",
                          "path": "",
                          "type": "",
                          "download_url": "",
                          "keyword_hits": "",
                          "possible_metadata_or_data": False,
                          "claim_boundary": f"repo_listing_parse_failed_{type(exc).__name__}"
                      })
              elif fetch_record["fetch_ok"]:
                  analysis = analyze_text_file(target["source_id"], text)
                  repo_metadata_records.append({
                      "source_id": target["source_id"],
                      "url": target["url"],
                      "nonempty_line_count": analysis["nonempty_line_count"],
                      "keyword_hits": analysis["keyword_hits"],
                      "preview_lines": analysis["preview_lines"],
                      "structure_class": analysis["structure_class"],
                      "claim_boundary": "repo_metadata_preview_only_not_authoritative_extraction"
                  })

          data_text = next((row for row in raw_text_records if row["source_id"] == "icosmology_lrgxelg_data_raw"), None)
          cov_text = next((row for row in raw_text_records if row["source_id"] == "icosmology_lrgxelg_cov_raw"), None)

          raw_fetch_ok_count = sum(1 for row in raw_fetch_records if row["fetch_ok"])
          repo_fetch_ok_count = sum(1 for row in repo_fetch_records if row["fetch_ok"])
          covariance_square_pd_candidate = bool(cov_text and cov_text["square_matrix_hint"] and cov_text["matrix_symmetric_hint"] and cov_text["positive_definite_hint"])
          data_file_non_numeric = bool(data_text and data_text["numeric_row_count"] == 0 and data_text["nonempty_line_count"] > 0)
          repo_metadata_or_listing_available = repo_fetch_ok_count > 0 and (len(repo_listing_records) > 0 or len(repo_metadata_records) > 0)
          possible_metadata_listing_count = sum(1 for row in repo_listing_records if row["possible_metadata_or_data"])

          if covariance_square_pd_candidate and repo_metadata_or_listing_available:
              selected_next_route = "raw_candidate_variable_order_review"
              next_allowed_step = (
                  "Proceed to v4.151 raw candidate variable-order and provenance review. "
                  "Use previews/listing/metadata only to decide whether parser design is safe. "
                  "Do not ingest covariance, recompute pressure, run BIC/likelihood/posterior comparison, or make validation claims."
              )
          elif data_file_non_numeric and repo_metadata_or_listing_available:
              selected_next_route = "alternate_value_file_locator"
              next_allowed_step = (
                  "Proceed to v4.151 alternate value-file locator because the data file is nonnumeric while repository metadata/listing is available. "
                  "Do not ingest covariance, recompute pressure, run BIC/likelihood/posterior comparison, or make validation claims."
              )
          elif raw_fetch_ok_count > 0:
              selected_next_route = "manual_metadata_review_or_fetch_retry"
              next_allowed_step = (
                  "Proceed to v4.151 manual metadata review or fetch retry. "
                  "Do not ingest covariance, recompute pressure, run BIC/likelihood/posterior comparison, or make validation claims."
              )
          else:
              selected_next_route = "raw_candidate_fetch_retry"
              next_allowed_step = (
                  "Proceed to v4.151 raw candidate fetch retry. "
                  "Do not ingest covariance, recompute pressure, run BIC/likelihood/posterior comparison, or make validation claims."
              )

          raw_candidate_ingested = False
          covariance_ingested = False
          source_data_ingested = False
          pressure_recomputed = False
          likelihood_or_bic_run = False
          final_pressure_ready = False

          upstream = UPSTREAM_LOCKS["v4_149_raw_candidate_file_structure_probe"]

          if upstream["readiness_label"] != "raw_candidate_file_structure_probe_passed_structure_status_recorded_ready_for_next_raw_candidate_route":
              failed_gates.append("upstream_v4_149_readiness_not_carried")
          if len(RAW_CANDIDATE_TARGETS) != 2:
              failed_gates.append("raw_candidate_target_count_not_two")
          if len(raw_fetch_records) != 2 or len(raw_text_records) != 2:
              failed_gates.append("raw_fetch_or_text_record_count_mismatch")
          if len(repo_fetch_records) != len(REPOSITORY_TARGETS):
              failed_gates.append("repo_fetch_record_count_mismatch")
          if raw_candidate_ingested:
              failed_gates.append("raw_candidate_unexpectedly_ingested")
          if covariance_ingested:
              failed_gates.append("covariance_unexpectedly_ingested")
          if source_data_ingested:
              failed_gates.append("source_data_unexpectedly_ingested")
          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")
          if likelihood_or_bic_run:
              failed_gates.append("likelihood_or_bic_unexpectedly_run")
          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "tairid cosmology is validated",
              "standard cosmology is disproven",
              "final rsd pressure score",
              "raw candidate file is an ingested covariance matrix",
              "square numeric matrix is automatically the correct covariance",
              "repository readme proves variable order without review",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "raw_candidate_followup_metadata_locator_passed_metadata_status_recorded_ready_for_variable_order_or_alternate_file_route"

          rule_results = [
              {"rule_id": "workflow_name_sorts_top", "pass": True, "result": "workflow name begins with 000 TAIRID", "boundary": "Navigation convenience only."},
              {"rule_id": "node24_opt_in_preserved", "pass": True, "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved", "boundary": "Warning cleanup only."},
              {"rule_id": "upstream_v4_149_carried", "pass": upstream["readiness_label"] == "raw_candidate_file_structure_probe_passed_structure_status_recorded_ready_for_next_raw_candidate_route", "result": "v4.149 structure status carried", "boundary": "Carry-forward only."},
              {"rule_id": "raw_candidate_fetch_records_complete", "pass": len(raw_fetch_records) == 2, "result": f"raw_fetch_ok_count={raw_fetch_ok_count}", "boundary": "Fetch status only."},
              {"rule_id": "raw_text_structure_records_complete", "pass": len(raw_text_records) == 2, "result": f"raw_text_records={len(raw_text_records)}", "boundary": "Text/shape review only."},
              {"rule_id": "covariance_diagnostics_recorded", "pass": cov_text is not None, "result": f"covariance_square_pd_candidate={covariance_square_pd_candidate}", "boundary": "Shape/positive-definite hint only."},
              {"rule_id": "data_text_status_recorded", "pass": data_text is not None, "result": f"data_file_non_numeric={data_file_non_numeric}", "boundary": "Data file not extracted as value vector."},
              {"rule_id": "repo_metadata_fetch_records_complete", "pass": len(repo_fetch_records) == len(REPOSITORY_TARGETS), "result": f"repo_fetch_ok_count={repo_fetch_ok_count}", "boundary": "Metadata/status only."},
              {"rule_id": "repo_listing_or_metadata_recorded", "pass": True, "result": f"repo_listing_records={len(repo_listing_records)}; repo_metadata_records={len(repo_metadata_records)}; possible_metadata_listing_count={possible_metadata_listing_count}", "boundary": "Listing/preview only."},
              {"rule_id": "selected_next_route_recorded", "pass": selected_next_route != "", "result": selected_next_route, "boundary": "Route selection only."},
              {"rule_id": "raw_candidates_not_ingested", "pass": raw_candidate_ingested is False, "result": "raw candidates not ingested", "boundary": "No covariance ingestion."},
              {"rule_id": "covariance_not_ingested", "pass": covariance_ingested is False, "result": "covariance not ingested", "boundary": "No eBOSS covariance use."},
              {"rule_id": "source_data_not_ingested", "pass": source_data_ingested is False, "result": "source data not ingested", "boundary": "No values extracted."},
              {"rule_id": "pressure_not_recomputed", "pass": pressure_recomputed is False, "result": "pressure not recomputed", "boundary": "No final score."},
              {"rule_id": "likelihood_bic_not_run", "pass": likelihood_or_bic_run is False, "result": "no likelihood, BIC, or posterior comparison run", "boundary": "No model comparison."},
              {"rule_id": "final_pressure_and_validation_blocked", "pass": final_pressure_ready is False, "result": "final pressure and validation remain blocked", "boundary": "No validation claim."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 15, "result": f"blocked_claims={len(BLOCKED_CLAIMS)}", "boundary": "No validation or final pressure claim."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "", "result": route_decision, "boundary": "Route decision does not validate the model."}
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_150_rules_passed")

          if failed_gates:
              readiness_label = "raw_candidate_followup_metadata_locator_failed"
              next_allowed_step = "Repair raw candidate follow-up and metadata locator before continuing."
          else:
              readiness_label = route_decision

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "raw_fetch_ok_count": raw_fetch_ok_count,
              "repo_fetch_ok_count": repo_fetch_ok_count,
              "covariance_square_pd_candidate": covariance_square_pd_candidate,
              "data_file_non_numeric": data_file_non_numeric,
              "repo_metadata_or_listing_available": repo_metadata_or_listing_available,
              "repo_listing_record_count": len(repo_listing_records),
              "repo_metadata_record_count": len(repo_metadata_records),
              "possible_metadata_listing_count": possible_metadata_listing_count,
              "selected_next_route": selected_next_route,
              "raw_candidate_ingested": raw_candidate_ingested,
              "source_data_ingested": source_data_ingested,
              "covariance_ingested": covariance_ingested,
              "pressure_recomputed": pressure_recomputed,
