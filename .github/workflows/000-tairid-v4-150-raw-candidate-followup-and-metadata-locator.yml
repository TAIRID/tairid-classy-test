              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_150.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_150.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.150 — Raw Candidate Follow-up and Metadata Locator")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.150 follows up on v4.149. It checks whether the candidate data file is actually numeric or metadata-like, whether the covariance-like file is symmetric/positive-definite by shape diagnostics, and whether repository listing/README metadata may help resolve variable order.")
          md.append("")
          md.append("This still does not ingest covariance, extract values, recompute pressure, run likelihood/BIC/posterior comparison, or validate TAIRID.")
          md.append("")
          md.append("## Raw file status")
          md.append("")
          md.append("| Source | Fetch OK | Structure | Keyword hits |")
          md.append("|---|---:|---|---|")
          fetch_lookup = {row["source_id"]: row for row in raw_fetch_records}
          for row in raw_text_records:
              md.append(f"| `{row['source_id']}` | `{fetch_lookup.get(row['source_id'], {}).get('fetch_ok', False)}` | `{row['structure_class']}` | `{row['keyword_hits']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_150_raw_candidate_followup_and_metadata_locator.json",
              "tairid_v4_150_raw_candidate_followup_and_metadata_locator.md",
              "raw_fetch_records_v4_150.csv",
              "raw_text_structure_records_v4_150.csv",
              "repo_fetch_records_v4_150.csv",
              "repo_listing_records_v4_150.csv",
              "repo_metadata_records_v4_150.csv",
              "next_route_options_v4_150.csv",
              "blocked_claims_v4_150.csv",
              "rule_results_v4_150.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_150_raw_candidate_followup_and_metadata_locator.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

