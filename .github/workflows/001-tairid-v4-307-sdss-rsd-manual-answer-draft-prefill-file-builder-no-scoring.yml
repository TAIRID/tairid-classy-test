name: 001 TAIRID v4.307 - SDSS RSD Manual Answer Draft Prefill File Builder No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-307-sdss-rsd-manual-answer-draft-prefill-file-builder-no-scoring.yml"
      - ".github/workflows/**"
      - "github/workflows/**"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-manual-answer-draft-prefill-file-builder-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.307 SDSS RSD Manual Answer Draft Prefill File Builder No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.307 SDSS RSD manual answer draft prefill file builder no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import html
          import re
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.307"
          ROUTE = "sdss_rsd_manual_answer_draft_prefill_file_builder_no_scoring_after_v4_306"
          EXPECTED_RESULT = "v4_307_sdss_rsd_manual_answer_draft_prefill_file_builder_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_308_sdss_rsd_draft_prefill_human_review_packet_no_scoring"

          OUT = Path("tairid_v4_307_sdss_rsd_manual_answer_draft_prefill_file_builder_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-307-sdss-rsd-manual-answer-draft-prefill-file-builder-output.zip"

          SOURCE_URLS = [
              "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/",
              "https://www.sdss4.org/science/final-bao-and-rsd-measurements/",
              "https://www.sdss4.org/dr16/",
              "https://arxiv.org/abs/2007.08991",
              "https://arxiv.org/abs/2007.08997",
              "https://arxiv.org/abs/2007.09004",
          ]

          REQUIRED_FIELDS = [
              "answer_id",
              "target_id",
              "source_url_or_citation",
              "quoted_or_precise_source_text",
              "answer_summary",
              "approval_request",
              "claim_limit",
          ]

          MANUAL_ANSWER_PATTERNS = [
              r"sdss[_-]rsd[_-]manual[_-]answers[_-]v4[_-]300(?:[-_]\d+)?\.csv$",
              r"SDSS[_-]RSD[_-]MANUAL[_-]ANSWERS[_-]v4[_-]300(?:[-_]\d+)?\.csv$",
              r"data[_-]sdss[_-]rsd[_-]manual[_-]answers[_-]v4[_-]300(?:[-_]\d+)?\.csv$",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=2_000_000, timeout=15):
              row = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.307-draft-prefill-builder-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      row["status_code"] = getattr(resp, "status", "")
                      row["content_type"] = resp.headers.get("Content-Type", "")
                      row["final_url"] = resp.geturl()
                      row["bytes_read"] = len(data)
                      row["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      row["fetch_ok"] = True
              except Exception as exc:
                  row["error"] = f"{type(exc).__name__}: {exc}"
              return row, data

          def strip_html_text(data):
              if not data:
                  return ""
              text = data.decode("utf-8", errors="replace")
              text = re.sub(r"<script.*?</script>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<[^>]+>", " ", text)
              return html.unescape(" ".join(text.split()))

          def window_around_terms(text, terms, width=420, limit=1200):
              lower = text.lower()
              starts = []
              for term in terms:
                  idx = lower.find(term.lower())
                  if idx >= 0:
                      starts.append(idx)
              if not starts:
                  return ""
              idx = min(starts)
              return text[max(0, idx-width):idx+width].replace("\n", " ")[:limit]

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              try:
                  fields["z_eff"] = float(fields["z_eff_text"])
              except Exception:
                  fields["z_eff"] = ""
              return fields

          def parse_column_contract_rows(tables):
              out = []
              for table_idx, table in enumerate(tables):
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      row_type = "redshift_function_row_candidate" if "(z)" in label_norm else "final_or_consensus_row_candidate"
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for value, sigma in measurement_pairs(cell):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              out.append({
                                  "contract_id": f"column_contract_bound_{len(out)+1:02d}",
                                  "bound_id": f"bound_{len(out)+1:02d}",
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "z_eff": fields["z_eff"],
                                  "z_range_text": fields["z_range_text"],
                                  "observable": "f_sigma8",
                                  "observed_value": value,
                                  "observed_sigma": sigma,
                                  "score_allowed": False,
                              })
              return out

          def safe_read_csv(path):
              try:
                  with path.open("r", encoding="utf-8-sig", newline="") as f:
                      reader = csv.DictReader(f)
                      rows = list(reader)
                      fields = reader.fieldnames or []
                  return True, fields, rows, ""
              except Exception as exc:
                  return False, [], [], f"{type(exc).__name__}: {exc}"

          def find_manual_answer_file():
              candidates = []
              for path in Path(".").rglob("*"):
                  if not path.is_file() or path.suffix.lower() != ".csv":
                      continue
                  raw = path.as_posix().lstrip("./")
                  name = path.name
                  pattern_match = any(re.search(pattern, name, re.I) for pattern in MANUAL_ANSWER_PATTERNS)
                  semantic_match = all(term in raw.lower() for term in ["sdss", "rsd", "manual", "answer"])
                  if pattern_match or semantic_match:
                      read_ok, fields, rows, error = safe_read_csv(path)
                      has_required = all(field in set(fields) for field in REQUIRED_FIELDS)
                      duplicate_suffix = bool(re.search(r"[-_]\d+\.csv$", name))
                      candidates.append({
                          "path": raw,
                          "filename": name,
                          "pattern_match": pattern_match,
                          "semantic_match": semantic_match,
                          "duplicate_download_suffix_detected": duplicate_suffix,
                          "read_ok": read_ok,
                          "row_count": len(rows),
                          "field_count": len(fields),
                          "has_required_fields": has_required,
                          "error": error,
                          "score_allowed": False,
                          "support_allowed": False,
                      })
              readable = [c for c in candidates if c["read_ok"] and c["has_required_fields"]]
              readable = sorted(readable, key=lambda r: (not r["duplicate_download_suffix_detected"], r["path"]))
              selected = readable[0]["path"] if readable else ""
              selected_rows = []
              selected_fields = []
              if selected:
                  _, selected_fields, selected_rows, _ = safe_read_csv(Path(selected))
              return candidates, selected, selected_fields, selected_rows

          def norm(value):
              return str(value or "").strip()

          def review_answer(row, idx, source_path):
              source = norm(row.get("source_url_or_citation"))
              precise = norm(row.get("quoted_or_precise_source_text"))
              summary = norm(row.get("answer_summary"))
              approval = norm(row.get("approval_request")).lower()
              claim = norm(row.get("claim_limit")).lower()
              missing = [field for field in REQUIRED_FIELDS if not norm(row.get(field))]
              is_blank = not source and not precise and not summary
              reviewable = (
                  not missing
                  and len(source) > 0
                  and len(precise) >= 12
                  and len(summary) >= 8
                  and approval in ["row_meaning_confirm", "baseline_candidate", "definition_match", "reject", "keep_blocked"]
                  and claim in ["no_scoring", "no_claims", "no_scoring/no_claims", "keep_blocked"]
              )
              return {
                  "manual_review_id": f"manual_review_{idx+1:03d}",
                  "source_path": source_path,
                  "answer_id": norm(row.get("answer_id")),
                  "target_id": norm(row.get("target_id")),
                  "target_class": norm(row.get("target_class")),
                  "target_object": norm(row.get("target_object")),
                  "missing_required_fields": "|".join(missing),
                  "is_blank_template_row": is_blank,
                  "reviewable_for_future_gate": reviewable,
                  "review_status": "reviewable_for_future_gate_not_approved" if reviewable else ("blank_template_row" if is_blank else "incomplete_or_invalid"),
                  "score_allowed": False,
                  "support_allowed": False,
                  "row_meaning_confirmed": False,
                  "baseline_approved": False,
                  "definition_match_confirmed": False,
              }

          def first_quote(source_quote_rows, target_class):
              preferred = [q for q in source_quote_rows if q["quote_class"] == target_class and q["candidate_quote_window"]]
              if not preferred and target_class == "row_family":
                  preferred = [q for q in source_quote_rows if q["quote_class"] == "row_meaning" and q["candidate_quote_window"]]
              if not preferred and target_class == "definition_match":
                  preferred = [q for q in source_quote_rows if q["quote_class"] in ["definition_match", "row_meaning"] and q["candidate_quote_window"]]
              return preferred[0] if preferred else {"source_url": "", "candidate_quote_window": ""}

          def summarize_candidate(target_class, quote):
              if not quote:
                  return ""
              if target_class == "row_meaning":
                  return "DRAFT ONLY: candidate source window appears relevant to SDSS RSD f_sigma8 row meaning, but it requires human review before any gate can pass."
              if target_class == "row_family":
                  return "DRAFT ONLY: candidate source window may help distinguish the f_sigma8 row family, but it requires human review before row-family selection."
              if target_class == "baseline":
                  return "DRAFT ONLY: candidate source window may contain baseline/comparator context, but it is not an approved baseline value."
              if target_class == "definition_match":
                  return "DRAFT ONLY: candidate source window may help map row/tracer/redshift/observable meaning, but it is not a confirmed definition match."
              return "DRAFT ONLY: candidate source window needs human review."

          def candidate_quality(target_class, quote, source_url):
              has_source = bool(source_url)
              has_quote = len(quote) >= 80
              quote_mentions_fsigma = bool(re.search(r"f\s*σ\s*8|f\s*sigma\s*8|fsigma8|f\\sigma", quote, re.I))
              quote_mentions_table_or_measurement = any(term in quote.lower() for term in ["table", "measurement", "measurements", "redshift", "sample", "growth", "rsd"])
              quote_mentions_baseline_terms = any(term in quote.lower() for term in ["lcdm", "fiducial", "model", "cosmological", "prediction"])
              quality = 0
              quality += 1 if has_source else 0
              quality += 1 if has_quote else 0
              quality += 1 if quote_mentions_fsigma else 0
              quality += 1 if quote_mentions_table_or_measurement else 0
              if target_class == "baseline":
                  quality += 1 if quote_mentions_baseline_terms else 0
              return quality

          inherited_v4_306_rows = [
              {"inherited_from": "v4.306", "item": "rules", "value": "46 / 46 passed", "meaning": "Candidate prefill review passed.", "carry_forward_status": "ready_for_draft_prefill_builder"},
              {"inherited_from": "v4.306", "item": "source_fetch_ok_rows", "value": 6, "meaning": "GitHub fetched all six sources.", "carry_forward_status": "sources_available"},
              {"inherited_from": "v4.306", "item": "source_quote_rows", "value": 25, "meaning": "Candidate quote windows existed.", "carry_forward_status": "quote_windows_available"},
              {"inherited_from": "v4.306", "item": "selected_manual_path", "value": "sdss_rsd_manual_answers_v4_300-1.csv", "meaning": "Manual answer file path found.", "carry_forward_status": "file_path_resolved"},
              {"inherited_from": "v4.306", "item": "manual_answer_rows", "value": 20, "meaning": "Twenty manual-answer rows were present.", "carry_forward_status": "blank_template_ready"},
              {"inherited_from": "v4.306", "item": "usable_candidate_rows", "value": 20, "meaning": "GitHub had candidate rows usable for draft review.", "carry_forward_status": "draft_possible"},
              {"inherited_from": "v4.306", "item": "gate_approval_rows", "value": 0, "meaning": "No gate approval.", "carry_forward_status": "no_approval"},
              {"inherited_from": "v4.306", "item": "selected_next_route", "value": "v4_307_sdss_rsd_manual_answer_draft_prefill_file_builder_no_scoring", "meaning": "Current route creates draft prefill file.", "carry_forward_status": "current_route"},
          ]

          source_fetch_rows = []
          source_quote_rows = []
          for url in SOURCE_URLS:
              fetch, data = fetch_url(url)
              source_fetch_rows.append({**fetch, "score_allowed": False, "support_allowed": False})
              text = strip_html_text(data)
              quote_specs = [
                  ("row_meaning", ["f σ 8", "fσ8", "fsigma8", "f sigma", "redshift-space distortion", "measurement"]),
                  ("row_family", ["f σ 8", "fσ8", "fsigma8", "consensus", "combined", "final"]),
                  ("baseline", ["LCDM", "fiducial", "model", "prediction", "growth rate", "cosmological parameters"]),
                  ("definition_match", ["redshift", "sample", "tracer", "fiducial", "measurement", "table"]),
                  ("covariance_limit", ["covariance", "likelihood", "correlation", "full covariance"]),
              ]
              for quote_class, terms in quote_specs:
                  window = window_around_terms(text, terms)
                  if window:
                      source_quote_rows.append({
                          "quote_id": f"quote_{len(source_quote_rows)+1:03d}",
                          "quote_class": quote_class,
                          "source_url": url,
                          "candidate_quote_window": window,
                          "quote_status": "candidate_window_for_draft_prefill_not_approval",
                          "score_allowed": False,
                          "support_allowed": False,
                      })

          parser = SimpleTableParser()
          first_fetch, first_data = fetch_url(SOURCE_URLS[0])
          if first_data:
              parser.feed(first_data.decode("utf-8", errors="replace"))
          column_contract_rows = parse_column_contract_rows(parser.tables)

          fuzzy_candidate_rows, selected_manual_path, selected_fields, selected_manual_rows = find_manual_answer_file()
          manual_answer_review_rows = [review_answer(row, idx, selected_manual_path) for idx, row in enumerate(selected_manual_rows)]
          blank_rows = [r for r in manual_answer_review_rows if r["is_blank_template_row"]]
          reviewable_answer_rows = [r for r in manual_answer_review_rows if r["reviewable_for_future_gate"]]

          # Build target list. It mirrors v4.305/v4.306, but writes an actual DRAFT review file.
          content_target_rows = [
              ("answer_001", "row_meaning_001", "row_meaning", "f_sigma8_z_row_role", "row_meaning_confirm", "row_meaning"),
              ("answer_002", "row_meaning_002", "row_meaning", "f_sigma8_row_role", "row_meaning_confirm", "row_family"),
              ("answer_003", "row_meaning_003", "row_meaning", "two_row_relationship", "row_meaning_confirm", "row_family"),
              ("answer_004", "row_meaning_004", "row_family", "row_family_selection_basis", "row_meaning_confirm", "row_family"),
              ("answer_005", "baseline_001", "baseline", "standard_comparator_values", "baseline_candidate", "baseline"),
              ("answer_006", "baseline_002", "baseline", "baseline_source_mapping", "baseline_candidate", "baseline"),
              ("answer_007", "baseline_003", "baseline", "baseline_uncertainty_policy", "baseline_candidate", "baseline"),
              ("answer_008", "baseline_004", "baseline", "baseline_equal_or_better_null", "keep_blocked", "covariance_limit"),
          ]

          if column_contract_rows:
              next_idx = 9
              for contract in column_contract_rows:
                  content_target_rows.append((
                      f"answer_{next_idx:03d}",
                      f"definition_match_{contract['bound_id']}",
                      "definition_match",
                      f"{contract['row_label']} {contract['sample_or_tracer']} z_eff={contract['z_eff']}",
                      "definition_match",
                      "definition_match",
                  ))
                  next_idx += 1
          else:
              for i in range(1, 5):
                  content_target_rows.append((
                      f"answer_{8+i:03d}",
                      f"definition_match_placeholder_{i:02d}",
                      "definition_match",
                      "placeholder_no_live_contract_rows",
                      "definition_match",
                      "definition_match",
                  ))

          draft_prefill_rows = []
          draft_audit_rows = []
          for answer_id, target_id, target_class, target_object, approval_request, quote_class in content_target_rows:
              q = first_quote(source_quote_rows, quote_class)
              quote = q["candidate_quote_window"]
              source_url = q["source_url"]
              quality = candidate_quality(target_class, quote, source_url)
              use_candidate = quality >= 2
              draft_prefill_rows.append({
                  "answer_id": answer_id,
                  "target_id": target_id,
                  "target_class": target_class,
                  "target_object": target_object,
                  "source_url_or_citation": source_url if use_candidate else "",
                  "quoted_or_precise_source_text": quote if use_candidate else "",
                  "answer_summary": summarize_candidate(target_class, quote) if use_candidate else "",
                  "approval_request": approval_request,
                  "claim_limit": "no_scoring/no_claims",
                  "draft_status": "DRAFT_PREFILL_HUMAN_REVIEW_ONLY_NOT_APPROVED" if use_candidate else "DRAFT_EMPTY_WEAK_OR_MISSING_CANDIDATE",
                  "human_review_required": True,
                  "gate_approval_allowed": False,
                  "score_allowed": False,
                  "support_allowed": False,
              })
              draft_audit_rows.append({
                  "audit_id": f"draft_audit_{len(draft_audit_rows)+1:03d}",
                  "answer_id": answer_id,
                  "target_id": target_id,
                  "target_class": target_class,
                  "source_url_candidate": source_url,
                  "candidate_quality_score_0_5": quality,
                  "used_in_draft": use_candidate,
                  "human_review_required": True,
                  "approval_status": "not_approved",
                  "reason": "Candidate source text copied into draft only for easier human review; not a confirmed answer.",
                  "score_allowed": False,
                  "support_allowed": False,
              })

          draft_filled_rows = [r for r in draft_prefill_rows if r["draft_status"] == "DRAFT_PREFILL_HUMAN_REVIEW_ONLY_NOT_APPROVED"]
          draft_empty_rows = [r for r in draft_prefill_rows if r["draft_status"] != "DRAFT_PREFILL_HUMAN_REVIEW_ONLY_NOT_APPROVED"]

          gate_decision_rows = [
              {"gate_id": "gate_001", "gate_object": "manual_answer_file_located", "gate_passed": bool(selected_manual_path), "gate_status": "located" if selected_manual_path else "not_located", "reason": selected_manual_path or "No manual-answer CSV found."},
              {"gate_id": "gate_002", "gate_object": "draft_prefill_file_written", "gate_passed": len(draft_prefill_rows) >= 8, "gate_status": "written" if len(draft_prefill_rows) >= 8 else "too_few_rows", "reason": "Draft file written for human review only."},
