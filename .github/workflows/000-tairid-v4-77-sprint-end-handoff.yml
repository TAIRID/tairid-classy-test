name: 000 TAIRID v4.77 Sprint-End Handoff

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-77-sprint-end-handoff.yml"

jobs:
  tairid-v4-77-sprint-end-handoff:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.77 sprint-end handoff
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_77_sprint_end_handoff

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_77_sprint_end_handoff")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_77_sprint_end_handoff"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not import Planck chains.",
              "This does not compute Planck reference uncertainty.",
              "This does not make ELG or WiggleZ covariance-ready.",
              "This does not merge KiDS/S8 into RSD covariance.",
              "This is a sprint-end handoff only.",
              "A pass means the sprint is summarized and bounded, not that the growth/RSD lane is solved."
          ]

          SPRINT_RANGE = {
              "sprint_start_checkpoint": "v4.50 Growth Lane Status Handoff",
              "sprint_end_checkpoint": "v4.76.1 Planck Reference Upload Repair",
              "handoff_checkpoint": "v4.77 Sprint-End Handoff",
              "main_lane": "TAIRID cosmology / growth-RSD lane",
              "current_truth_status": "bounded_nonfinal_diagnostic_pipeline",
              "final_RSD_pressure_allowed": False,
              "TAIRID_validation_claim_allowed": False
          }

          COMPLETED_CHECKPOINTS = [
              {
                  "checkpoint": "v4.50",
                  "name": "Growth Lane Status Handoff",
                  "status": "passed",
                  "main_result": "Growth/RSD lane checkpointed as mixed and nonfinal.",
                  "readiness": "ready_for_Planck_external_manifest_source_packet_or_reference_uncertainty_parser_design"
              },
              {
                  "checkpoint": "v4.57",
                  "name": "Planck ZIP64 Central Directory Probe",
                  "status": "passed",
                  "main_result": "Planck fullGrid ZIP64 manifest structure was parsed without full download.",
                  "readiness": "manifest_members_and_verified_roots_available"
              },
              {
                  "checkpoint": "v4.58-v4.60",
                  "name": "Planck Paramnames and Target Location Audits",
                  "status": "passed",
                  "main_result": "Direct fsigma8z chain-column route blocked; fsigma8z appears as sidecar-derived output.",
                  "readiness": "sidecar_fixture_route_identified_not_uncertainty"
              },
              {
                  "checkpoint": "v4.61-v4.63",
                  "name": "Sidecar Growth and Calculator Contract Audits",
                  "status": "passed",
                  "main_result": "Minimum sidecars worked as point fixtures for growth-ratio/gamma/calculator sanity checks.",
                  "readiness": "growth_calculator_contract_guarded"
              },
              {
                  "checkpoint": "v4.65.1",
                  "name": "Paramnames Primary Column Boundary Audit",
                  "status": "passed",
                  "main_result": "Direct omegam + sigma8 route unavailable; primary-density route available.",
                  "readiness": "primary_density_route_or_external_reference_required"
              },
              {
                  "checkpoint": "v4.66",
                  "name": "Guarded Chain Row Shape Probe",
                  "status": "passed",
                  "main_result": "Bounded chain-prefix row shapes passed for selected roots.",
                  "readiness": "primary_density_background_contract_design"
              },
              {
                  "checkpoint": "v4.67-v4.68",
                  "name": "Primary Density and Solver Feasibility Audits",
                  "status": "passed",
                  "main_result": "Do not fake H0/theta, sigma8/logA, or omegam/physical-density conversions; no local CAMB/CLASS route available.",
                  "readiness": "external_reference_packet_or_solver_install_branch"
              },
              {
                  "checkpoint": "v4.69-v4.71",
                  "name": "External Reference Source and Literature Expansion",
                  "status": "passed",
                  "main_result": "Source anchors and candidate literature expanded, but no source accepted as Planck covariance.",
                  "readiness": "deep_candidate_review_or_solver_branch"
              },
              {
                  "checkpoint": "v4.72",
                  "name": "Cross-Family Combination Policy Design",
                  "status": "passed",
                  "main_result": "Final combination blocked until reference covariance, ELG/WiggleZ policies, and duplication rules are solved.",
                  "readiness": "ELG_WiggleZ_reference_or_nonfinal_vector_next"
              },
              {
                  "checkpoint": "v4.73",
                  "name": "Nonfinal Pressure Vector Builder",
                  "status": "passed",
                  "main_result": "Readable nonfinal dashboard built for BOSS, eBOSS LRG/QSO, ELG, WiggleZ, Planck, and KiDS.",
                  "readiness": "ELG_parser_or_exclusion_policy"
              },
              {
                  "checkpoint": "v4.74",
                  "name": "ELG Parser or Exclusion Policy",
                  "status": "passed",
                  "main_result": "ELG carried as visible/parser-feasible but not simple covariance-ready; parked with parser backlog.",
                  "readiness": "WiggleZ_source_or_exclusion_policy"
              },
              {
                  "checkpoint": "v4.75",
                  "name": "WiggleZ Source or Exclusion Policy",
                  "status": "passed",
                  "main_result": "WiggleZ source anchors exist, but no product/covariance route accepted; parked with product-mapping backlog.",
                  "readiness": "Planck_reference_deep_route"
              },
              {
                  "checkpoint": "v4.76",
                  "name": "Planck Reference Deep Route Decision Audit",
                  "status": "passed_with_upload_warning_later_repaired",
                  "main_result": "Planck reference route remains bounded but unsolved.",
                  "readiness": "sprint_end_handoff_after_upload_repair"
              },
              {
                  "checkpoint": "v4.76.1",
                  "name": "Planck Reference Upload Repair",
                  "status": "passed",
                  "main_result": "Artifact upload path repaired; Node24 opt-in added; Planck reference uncertainty still missing.",
                  "readiness": "sprint_end_handoff"
              }
          ]

          CURRENT_FAMILY_STATUS = [
              {
                  "family_id": "BOSS_DR12",
                  "lane": "RSD_growth",
                  "current_status": "partial_BOSS_only_covariance_preview",
                  "direction": "mixed",
                  "safe_claim": "BOSS partial preview is mixed: 2 negative rows, 1 positive row.",
                  "main_blocker": "BOSS-only scope, missing Planck reference uncertainty, and final combination policy not complete.",
                  "final_score_allowed": False
              },
              {
                  "family_id": "eBOSS_LRG_QSO",
                  "lane": "RSD_growth",
                  "current_status": "partial_LRG_QSO_covariance_preview_ELG_excluded",
                  "direction": "positive_partial",
                  "safe_claim": "eBOSS LRG/QSO partial preview is positive relative to the declared reference.",
                  "main_blocker": "ELG excluded and Planck reference uncertainty missing.",
                  "final_score_allowed": False
              },
              {
                  "family_id": "eBOSS_ELG",
                  "lane": "RSD_growth",
                  "current_status": "visible_parser_feasible_but_parked",
                  "direction": "unknown",
                  "safe_claim": "ELG is visible and parser-feasible, but not simple covariance-ready.",
                  "main_blocker": "Needs ELG grid parser or continued formal exclusion.",
                  "final_score_allowed": False
              },
              {
                  "family_id": "WiggleZ",
                  "lane": "RSD_growth",
                  "current_status": "source_anchors_exist_but_product_mapping_unresolved",
                  "direction": "unknown",
                  "safe_claim": "WiggleZ has source anchors, but no covariance/product route is accepted in the pipeline.",
                  "main_blocker": "Needs exact product mapping or continued formal exclusion.",
                  "final_score_allowed": False
              },
              {
                  "family_id": "Planck_reference",
                  "lane": "reference_uncertainty",
                  "current_status": "bounded_but_unsolved",
                  "direction": "reference_missing",
                  "safe_claim": "Planck reference uncertainty remains missing.",
                  "main_blocker": "Needs external verified covariance/source or solver/container route.",
                  "final_score_allowed": False
              },
              {
                  "family_id": "KiDS_weak_lensing",
                  "lane": "separate_consolidation_pressure_context",
                  "current_status": "separate_context_not_RSD_combined",
                  "direction": "separate_context",
                  "safe_claim": "KiDS/S8 remains separate consolidation-pressure context.",
                  "main_blocker": "Needs cross-observable bridge before any merge with RSD.",
                  "final_score_allowed": False
              }
          ]

          WHAT_WE_ACCOMPLISHED = [
              {
                  "item_id": "bounded_growth_lane",
                  "summary": "The growth/RSD lane is now a bounded diagnostic pipeline instead of a loose idea."
              },
              {
                  "item_id": "Planck_fullGrid_structure",
                  "summary": "Planck fullGrid internal structure was inspected through bounded ZIP64 manifest logic without full download."
              },
              {
                  "item_id": "fsigma8_location",
                  "summary": "fsigma8z targets were found as sidecar-derived outputs, not direct chain columns."
              },
              {
                  "item_id": "sidecar_fixture_use",
                  "summary": ".minimum files were useful point fixtures but remain blocked as covariance."
              },
              {
                  "item_id": "simple_chain_route_blocked",
                  "summary": "Direct omegam + sigma8 chain-column route is blocked in selected roots."
              },
              {
                  "item_id": "primary_chain_route_identified",
                  "summary": "Primary density columns and bounded chain row shapes are readable."
              },
              {
                  "item_id": "solver_boundary",
                  "summary": "No local CAMB/CLASS solver route was available, so solver/container branch remains future work."
              },
              {
                  "item_id": "external_reference_boundary",
                  "summary": "External source anchors were expanded, but no source was accepted as Planck reference covariance."
              },
              {
                  "item_id": "combination_policy",
                  "summary": "Cross-family combination is blocked until duplication, independence, and reference covariance are solved."
              },
              {
                  "item_id": "ELG_WiggleZ_boundaries",
                  "summary": "ELG and WiggleZ are now parked with explicit parser/product-mapping backlogs."
              }
          ]

          OPEN_BLOCKERS = [
              {
                  "blocker_id": "Planck_reference_uncertainty",
                  "severity": "highest",
                  "status": "missing",
                  "needed_next": "External verified posterior/covariance source, solver/container branch, or fullGrid primary-chain parser plus solver."
              },
              {
                  "blocker_id": "ELG_grid_parser",
                  "severity": "high",
                  "status": "parked_with_backlog",
                  "needed_next": "Locate grid member/shape, define axes and likelihood semantics, then parser design."
              },
              {
                  "blocker_id": "WiggleZ_product_mapping",
                  "severity": "high",
                  "status": "parked_with_backlog",
                  "needed_next": "Find exact product/module/covariance files or keep excluded."
              },
              {
                  "blocker_id": "cross_family_independence",
                  "severity": "high",
                  "status": "policy_declared_not_solved",
                  "needed_next": "Define survey/tracer/redshift duplication rules before combination."
              },
              {
                  "blocker_id": "RSD_vs_KiDS_bridge",
                  "severity": "medium",
                  "status": "separate_context",
                  "needed_next": "Declare cross-observable bridge before merging weak lensing with RSD."
              }
          ]

          ALLOWED_CLAIMS = [
              "The growth/RSD lane is now structurally bounded and source-aware.",
              "The lane is mixed and role-dependent, not all-negative.",
              "BOSS partial preview is mixed.",
              "eBOSS LRG/QSO partial preview is positive relative to the declared reference.",
              "ELG is visible but parser-needed or parked.",
              "WiggleZ has source anchors but remains product-mapping unresolved.",
              "Planck reference uncertainty remains missing.",
              "KiDS/S8 remains separate context, not part of RSD covariance.",
              "No final RSD pressure score has been computed."
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Planck chains were fully imported.",
              "CAMB or CLASS was run.",
              "ELG is covariance-ready.",
              "WiggleZ is covariance-ready.",
              "BOSS and eBOSS were treated as independent by default.",
              "All growth data point negative.",
              "KiDS proves the full growth lane.",
              "eBOSS disproves KiDS.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_SPRINT_ROUTES = [
              {
                  "priority": 1,
                  "route_id": "v4_78_Planck_reference_solver_container_or_external_deep_review",
                  "purpose": "Attack the largest remaining blocker: Planck reference uncertainty.",
                  "recommended_first": True
              },
              {
                  "priority": 2,
                  "route_id": "v4_78_ELG_grid_member_probe",
                  "purpose": "Turn ELG backlog into a concrete grid-member/shape probe.",
                  "recommended_first": False
              },
              {
                  "priority": 3,
                  "route_id": "v4_78_WiggleZ_product_locator_followup",
                  "purpose": "Turn WiggleZ backlog into exact product/covariance/module search.",
                  "recommended_first": False
              },
              {
                  "priority": 4,
                  "route_id": "v4_78_cross_family_independence_audit",
                  "purpose": "Begin formal independence/duplication ledger for BOSS/eBOSS/ELG/WiggleZ.",
                  "recommended_first": False
              }
          ]

          failed_gates = []
          warnings = [
              "sprint_end_handoff_only",
              "no_final_RSD_pressure",
              "no_combined_covariance",
              "Planck_reference_uncertainty_missing",
              "ELG_parked_with_parser_backlog",
              "WiggleZ_parked_with_product_mapping_backlog",
              "mixed_direction_caution_required",
              "not_validation"
          ]

          required_family_ids = {
              "BOSS_DR12",
              "eBOSS_LRG_QSO",
              "eBOSS_ELG",
              "WiggleZ",
              "Planck_reference",
              "KiDS_weak_lensing"
          }

          present_family_ids = {row["family_id"] for row in CURRENT_FAMILY_STATUS}
          missing_family_ids = sorted(required_family_ids - present_family_ids)

          if missing_family_ids:
              failed_gates.append("missing_current_family_status_" + "_".join(missing_family_ids))

          if SPRINT_RANGE["final_RSD_pressure_allowed"] is not False:
              failed_gates.append("final_RSD_pressure_allowed_too_early")

          if SPRINT_RANGE["TAIRID_validation_claim_allowed"] is not False:
              failed_gates.append("validation_claim_allowed_too_early")

          if any(row["final_score_allowed"] is not False for row in CURRENT_FAMILY_STATUS):
              failed_gates.append("current_family_allowed_final_score_too_early")

          if not any(row["family_id"] == "Planck_reference" and row["current_status"] == "bounded_but_unsolved" for row in CURRENT_FAMILY_STATUS):
              failed_gates.append("Planck_reference_missing_status_not_preserved")

          if not any(row["family_id"] == "eBOSS_ELG" and "parked" in row["current_status"] for row in CURRENT_FAMILY_STATUS):
              failed_gates.append("ELG_parked_status_not_preserved")

          if not any(row["family_id"] == "WiggleZ" and "unresolved" in row["current_status"] for row in CURRENT_FAMILY_STATUS):
              failed_gates.append("WiggleZ_unresolved_status_not_preserved")

          if not any(row["family_id"] == "BOSS_DR12" and row["direction"] == "mixed" for row in CURRENT_FAMILY_STATUS):
              failed_gates.append("BOSS_mixed_direction_not_preserved")

          if not any(row["family_id"] == "eBOSS_LRG_QSO" and row["direction"] == "positive_partial" for row in CURRENT_FAMILY_STATUS):
              failed_gates.append("eBOSS_positive_partial_direction_not_preserved")

          if len(OPEN_BLOCKERS) < 5:
              failed_gates.append("open_blocker_list_incomplete")

          if len(NEXT_SPRINT_ROUTES) < 4:
              failed_gates.append("next_sprint_routes_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "tairid cosmology is validated",
              "standard cosmology is disproven",
              "final rsd pressure score",
              "combined growth covariance",
              "planck reference uncertainty is included",
              "elg is covariance-ready",
              "wigglez is covariance-ready",
              "all growth data point negative",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "sprint_end_handoff_passed_ready_for_next_sprint_Planck_reference_ELG_WiggleZ_or_independence_routes"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "completed_checkpoints_listed",
                  "pass": len(COMPLETED_CHECKPOINTS) >= 14,
                  "result": f"{len(COMPLETED_CHECKPOINTS)} completed checkpoint rows listed",
                  "boundary": "Summary only."
              },
              {
                  "rule_id": "current_family_status_complete",
                  "pass": len(missing_family_ids) == 0,
                  "result": f"{len(CURRENT_FAMILY_STATUS)} current family status rows present",
                  "boundary": "No final combination."
              },
              {
                  "rule_id": "all_current_families_block_final_score",
                  "pass": all(row["final_score_allowed"] is False for row in CURRENT_FAMILY_STATUS),
                  "result": "all current families remain blocked from final score",
                  "boundary": "No final RSD pressure."
              },
              {
                  "rule_id": "mixed_direction_preserved",
                  "pass": (
                      any(row["family_id"] == "BOSS_DR12" and row["direction"] == "mixed" for row in CURRENT_FAMILY_STATUS)
                      and any(row["family_id"] == "eBOSS_LRG_QSO" and row["direction"] == "positive_partial" for row in CURRENT_FAMILY_STATUS)
                  ),
                  "result": "BOSS mixed and eBOSS LRG/QSO positive-partial directions preserved",
                  "boundary": "No all-negative growth story."
              },
              {
                  "rule_id": "Planck_reference_missing_preserved",
                  "pass": any(row["family_id"] == "Planck_reference" and row["current_status"] == "bounded_but_unsolved" for row in CURRENT_FAMILY_STATUS),
                  "result": "Planck reference uncertainty remains bounded but unsolved",
                  "boundary": "No final RSD pressure."
              },
              {
                  "rule_id": "ELG_and_WiggleZ_backlogs_preserved",
                  "pass": (
                      any(row["family_id"] == "eBOSS_ELG" and "parked" in row["current_status"] for row in CURRENT_FAMILY_STATUS)
                      and any(row["family_id"] == "WiggleZ" and "unresolved" in row["current_status"] for row in CURRENT_FAMILY_STATUS)
                  ),
                  "result": "ELG and WiggleZ backlog boundaries preserved",
                  "boundary": "No forced inclusion."
              },
              {
                  "rule_id": "open_blockers_listed",
                  "pass": len(OPEN_BLOCKERS) >= 5,
                  "result": f"{len(OPEN_BLOCKERS)} open blockers listed",
                  "boundary": "Blockers remain unresolved."
              },
              {
                  "rule_id": "next_sprint_routes_declared",
                  "pass": len(NEXT_SPRINT_ROUTES) >= 4,
                  "result": f"{len(NEXT_SPRINT_ROUTES)} next sprint routes declared",
                  "boundary": "Future work only."
              },
              {
                  "rule_id": "allowed_and_blocked_claims_declared",
                  "pass": len(ALLOWED_CLAIMS) >= 9 and len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(ALLOWED_CLAIMS)} allowed claims and {len(BLOCKED_CLAIMS)} blocked claims declared",
                  "boundary": "Truth boundary preserved."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Sprint-end handoff only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_77_rules_passed")

          if failed_gates:
              readiness_label = "sprint_end_handoff_failed"
              next_allowed_step = "Repair sprint-end handoff before opening the next sprint."
          else:
              readiness_label = "sprint_end_handoff_passed_ready_for_next_sprint_Planck_reference_ELG_WiggleZ_or_independence_routes"
              next_allowed_step = (
                  "Start next sprint with one of the declared routes. Recommended first route: Planck reference solver/container or external deep review. "
                  "Continue to block final RSD pressure until reference uncertainty and data-family readiness are solved."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "completed_checkpoint_count": len(COMPLETED_CHECKPOINTS),
              "current_family_status_count": len(CURRENT_FAMILY_STATUS),
              "missing_current_family_count": len(missing_family_ids),
              "what_we_accomplished_count": len(WHAT_WE_ACCOMPLISHED),
              "open_blocker_count": len(OPEN_BLOCKERS),
              "allowed_claim_count": len(ALLOWED_CLAIMS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "next_sprint_route_count": len(NEXT_SPRINT_ROUTES),
              "Planck_reference_uncertainty_computed": False,
              "ELG_covariance_ready": False,
              "WiggleZ_covariance_ready": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "all_negative_growth_story_allowed": False,
              "TAIRID_validation_claim_allowed": False,
              "route_decision": route_decision,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "sprint_range": SPRINT_RANGE,
              "completed_checkpoints": COMPLETED_CHECKPOINTS,
              "current_family_status": CURRENT_FAMILY_STATUS,
              "what_we_accomplished": WHAT_WE_ACCOMPLISHED,
              "open_blockers": OPEN_BLOCKERS,
              "allowed_claims": ALLOWED_CLAIMS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_sprint_routes": NEXT_SPRINT_ROUTES,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "Planck_reference_uncertainty_computed": False,
                  "ELG_covariance_ready": False,
                  "WiggleZ_covariance_ready": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "all_negative_growth_story_allowed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_77_sprint_end_handoff.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "completed_checkpoints_v4_77.csv",
              COMPLETED_CHECKPOINTS,
              ["checkpoint", "name", "status", "main_result", "readiness"]
          )

          write_csv(
              OUTDIR / "current_family_status_v4_77.csv",
              CURRENT_FAMILY_STATUS,
              ["family_id", "lane", "current_status", "direction", "safe_claim", "main_blocker", "final_score_allowed"]
          )

          write_csv(
              OUTDIR / "what_we_accomplished_v4_77.csv",
              WHAT_WE_ACCOMPLISHED,
              ["item_id", "summary"]
          )

          write_csv(
              OUTDIR / "open_blockers_v4_77.csv",
              OPEN_BLOCKERS,
              ["blocker_id", "severity", "status", "needed_next"]
          )

          write_csv(
