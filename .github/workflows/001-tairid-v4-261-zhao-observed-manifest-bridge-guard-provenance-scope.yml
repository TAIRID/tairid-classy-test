name: 001 TAIRID v4.261 - Zhao Observed Manifest Bridge Guard Provenance Scope

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-261-zhao-observed-manifest-bridge-guard-provenance-scope.yml"
      - "data/cosmology/qso_literature_extraction_manifest.csv"
      - "qso_literature_extraction_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-observed-manifest-bridge-guard-provenance-scope:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.261 Zhao Observed Manifest Bridge Guard Provenance Scope is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.261 Zhao observed manifest bridge guard with provenance scope
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.261"
          ROUTE = "zhao_observed_manifest_bridge_guard_with_provenance_scope_after_v4_260"
          EXPECTED_RESULT = "v4_261_zhao_observed_manifest_bridge_guard_with_provenance_scope_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_262_zhao_candidate_observed_manifest_staging_validator_or_handoff"

          OUT = Path("tairid_v4_261_zhao_observed_manifest_bridge_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-261-zhao-observed-manifest-bridge-guard-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          EXTRACTION_MANIFEST_CANDIDATES = [
              Path("data/cosmology/qso_literature_extraction_manifest.csv"),
              Path("qso_literature_extraction_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_EXTRACTION_COLUMNS = [
              "extraction_id",
              "candidate_id",
              "paper_or_source_url",
              "measurement_label",
              "redshift",
              "observable",
              "observed_value",
              "uncertainty_or_covariance_reference",
              "data_vector_reference",
              "source_role",
              "provenance_status",
              "extraction_status",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          inherited_v4_260_rows = [
              {
                  "inherited_from": "v4.260",
                  "item": "rules",
                  "value": "46 / 46 passed",
                  "meaning": "Zhao covariance reconstruction guard passed.",
                  "carry_forward_status": "ready_for_bridge_guard",
              },
              {
                  "inherited_from": "v4.260",
                  "item": "zhao_value_rows",
                  "value": 4,
                  "meaning": "Four Zhao table-labeled f_sigma8 values were available.",
                  "carry_forward_status": "candidate_values_ready_not_scored",
              },
              {
                  "inherited_from": "v4.260",
                  "item": "zhao_fsigma8_correlation_rows",
                  "value": 16,
                  "meaning": "Four-bin f_sigma8 correlation subset was reconstructed.",
                  "carry_forward_status": "correlation_support_ready_not_scored",
              },
              {
                  "inherited_from": "v4.260",
                  "item": "zhao_fsigma8_covariance_rows",
                  "value": 16,
                  "meaning": "Four-bin f_sigma8 covariance subset was reconstructed.",
                  "carry_forward_status": "covariance_support_ready_not_scored",
              },
              {
                  "inherited_from": "v4.260",
                  "item": "correlation_min_principal_minor",
                  "value": 0.3073715923023327,
                  "meaning": "Correlation subset passed principal-minor structure guard.",
                  "carry_forward_status": "matrix_structure_ok_review_only",
              },
              {
                  "inherited_from": "v4.260",
                  "item": "covariance_min_principal_minor",
                  "value": 5.137682502539644e-09,
                  "meaning": "Covariance subset passed principal-minor structure guard.",
                  "carry_forward_status": "matrix_structure_ok_review_only",
              },
              {
                  "inherited_from": "v4.260",
                  "item": "provenance_scope_rows",
                  "value": 3,
                  "meaning": "Provenance was flagged as same-survey-family/cross-release needing review.",
                  "carry_forward_status": "not_full_holdout",
              },
              {
                  "inherited_from": "v4.260",
                  "item": "manifest_fill_allowed",
                  "value": False,
                  "meaning": "Manifest fill stayed blocked.",
                  "carry_forward_status": "bridge_needed",
              },
              {
                  "inherited_from": "v4.260",
                  "item": "scoring_allowed",
                  "value": False,
                  "meaning": "Scoring stayed blocked.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.260",
                  "item": "selected_next_route",
                  "value": "v4_261_zhao_observed_manifest_bridge_guard_with_provenance_scope_or_handoff",
                  "meaning": "Current route should decide candidate observed-manifest bridge scope.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          extraction_manifest_status_rows, extraction_manifest_input_rows = read_manifest_status(
              EXTRACTION_MANIFEST_CANDIDATES, REQUIRED_EXTRACTION_COLUMNS, "extraction"
          )

          zhao_value_rows = [
              {"bin": 1, "redshift": 0.978, "value": 0.379, "sigma": 0.176},
              {"bin": 2, "redshift": 1.230, "value": 0.385, "sigma": 0.099},
              {"bin": 3, "redshift": 1.526, "value": 0.342, "sigma": 0.070},
              {"bin": 4, "redshift": 1.944, "value": 0.364, "sigma": 0.106},
          ]

          corr = [
              [1.0000, 0.5118, 0.2667, -0.0113],
              [0.5118, 1.0000, 0.6288, 0.0722],
              [0.2667, 0.6288, 1.0000, 0.4721],
              [-0.0113, 0.0722, 0.4721, 1.0000],
          ]

          cov = []
          for i, row in enumerate(zhao_value_rows):
              cov_row = []
              for j, col in enumerate(zhao_value_rows):
                  cov_row.append(corr[i][j] * row["sigma"] * col["sigma"])
              cov.append(cov_row)

          zhao_bridge_candidate_rows = []
          for row in zhao_value_rows:
              label = str(row["redshift"]).replace(".", "_")
              zhao_bridge_candidate_rows.append({
                  "observed_id": f"zhao_dr14_tomographic_fsigma8_z_{label}",
                  "target_id": f"future_qso_zhao_dr14_fsigma8_z_{label}",
                  "source_family": "QSO",
                  "source_role": "same_survey_family_cross_release_candidate_not_full_holdout",
                  "redshift": row["redshift"],
                  "quantity": "f_sigma8",
                  "observed_value": row["value"],
                  "observed_sigma_or_likelihood": f"quoted_sigma={row['sigma']}; covariance_subset=v4_260_reconstructed_review_only",
                  "data_path_or_url": "https://arxiv.org/abs/1801.03043 ; widetable1 row fsigma_8",
                  "covariance_path_or_url": "v4_260_zhao_fsigma8_covariance_rows.csv ; reconstructed from widetable2 and widetable1 sigma",
                  "reference_model_path_or_method": "future_reference_model_required_not_supplied_here",
                  "failure_condition_id": "failure_001",
                  "approval_status": "candidate_bridge_not_scored_not_evidence_not_full_holdout",
                  "bridge_status": "candidate_staging_allowed_review_only",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          zhao_covariance_bridge_rows = []
          for i in range(4):
              for j in range(4):
                  zhao_covariance_bridge_rows.append({
                      "row_index": i + 1,
                      "col_index": j + 1,
                      "row_observed_id": zhao_bridge_candidate_rows[i]["observed_id"],
                      "col_observed_id": zhao_bridge_candidate_rows[j]["observed_id"],
                      "correlation_value": corr[i][j],
                      "covariance_value": cov[i][j],
                      "covariance_status": "candidate_bridge_support_review_only",
                      "scoring_allowed": False,
                  })

          provenance_scope_decision_rows = [
              {
                  "scope_id": "scope_001",
                  "scope_question": "Is Zhao DR14 independent enough to be called a full external holdout against prior QSO context?",
                  "scope_answer": "no_not_yet",
                  "provenance_label": "same_survey_family_cross_release_candidate",
                  "allowed_language": "candidate support / cross-release pressure check",
                  "blocked_language": "full independent holdout / validation / proof",
              },
              {
                  "scope_id": "scope_002",
                  "scope_question": "Can Zhao rows be staged as non-scoring observed manifest candidates?",
                  "scope_answer": "yes_candidate_staging_only",
                  "provenance_label": "candidate_bridge_not_scored",
                  "allowed_language": "candidate observed manifest bridge rows",
                  "blocked_language": "scored observed data / evidence row",
              },
              {
                  "scope_id": "scope_003",
                  "scope_question": "Can Zhao rows be combined directly with LRG/ELG/QSO current matrices?",
                  "scope_answer": "no",
                  "provenance_label": "source_surface_separation_required",
                  "allowed_language": "source-separated candidate lane",
                  "blocked_language": "combined cosmology matrix",
              },
              {
                  "scope_id": "scope_004",
                  "scope_question": "Can a later scoring test use these rows if a reference model and explicit scoring guard are added?",
                  "scope_answer": "possible_later_not_now",
                  "provenance_label": "future_scoring_guard_required",
                  "allowed_language": "future diagnostic input after guard",
                  "blocked_language": "current scoring",
              },
          ]

          observed_manifest_candidate_packet_rows = []
          for row in zhao_bridge_candidate_rows:
              observed_manifest_candidate_packet_rows.append({
                  "observed_id": row["observed_id"],
                  "target_id": row["target_id"],
                  "source_family": row["source_family"],
                  "source_role": row["source_role"],
                  "redshift": row["redshift"],
                  "quantity": row["quantity"],
                  "observed_value": row["observed_value"],
                  "observed_sigma_or_likelihood": row["observed_sigma_or_likelihood"],
                  "data_path_or_url": row["data_path_or_url"],
                  "covariance_path_or_url": row["covariance_path_or_url"],
                  "reference_model_path_or_method": row["reference_model_path_or_method"],
                  "failure_condition_id": row["failure_condition_id"],
                  "approval_status": row["approval_status"],
              })

          bridge_gate_rows = [
              {
                  "gate_id": "bridge_001_values_present",
                  "question": "Are four Zhao f_sigma8 values present?",
                  "answer": "yes",
                  "gate_status": "passed_review_only",
              },
              {
                  "gate_id": "bridge_002_covariance_present",
                  "question": "Is a 4x4 covariance subset present?",
                  "answer": "yes",
                  "gate_status": "passed_review_only",
              },
              {
                  "gate_id": "bridge_003_matrix_structure",
                  "question": "Did the v4.260 principal-minor structure guard pass?",
                  "answer": "yes",
                  "gate_status": "passed_review_only",
              },
              {
                  "gate_id": "bridge_004_provenance",
                  "question": "Is full holdout provenance approved?",
                  "answer": "no",
                  "gate_status": "blocked_full_holdout_language",
              },
              {
                  "gate_id": "bridge_005_reference_model",
                  "question": "Is a reference model supplied for residual scoring?",
                  "answer": "no",
                  "gate_status": "blocked_scoring",
              },
              {
                  "gate_id": "bridge_006_claim_language",
                  "question": "Can this workflow validate cosmology or TAIRID?",
                  "answer": "no",
                  "gate_status": "blocked_claim_inflation",
              },
          ]

          candidate_staging_policy_rows = [
              {
                  "policy_id": "policy_001",
                  "policy": "Candidate observed rows may be written as review-only output artifacts.",
                  "allowed": True,
                  "blocked": "placing them in the live external_observed_manifest as scored/evidence rows",
              },
              {
                  "policy_id": "policy_002",
                  "policy": "Covariance rows may be carried as candidate support.",
                  "allowed": True,
                  "blocked": "likelihood scoring before a scoring guard",
              },
              {
                  "policy_id": "policy_003",
                  "policy": "Provenance label must remain same-survey-family/cross-release candidate.",
                  "allowed": True,
                  "blocked": "full independent holdout language",
              },
              {
                  "policy_id": "policy_004",
                  "policy": "Next validator may check staging schema only.",
                  "allowed": True,
                  "blocked": "reference-model residual scoring",
              },
          ]

          value_direction_preview_rows = [
              {
                  "preview_id": "preview_001",
                  "quantity": "f_sigma8",
                  "redshift_min": min(row["redshift"] for row in zhao_value_rows),
                  "redshift_max": max(row["redshift"] for row in zhao_value_rows),
                  "value_min": min(row["value"] for row in zhao_value_rows),
                  "value_mean": sum(row["value"] for row in zhao_value_rows) / len(zhao_value_rows),
                  "value_max": max(row["value"] for row in zhao_value_rows),
                  "preview_status": "descriptive_only_no_reference_model_no_residual",
              },
              {
                  "preview_id": "preview_002",
                  "quantity": "covariance",
                  "diag_min": min(cov[i][i] for i in range(4)),
                  "diag_max": max(cov[i][i] for i in range(4)),
                  "offdiag_min": min(cov[i][j] for i in range(4) for j in range(4) if i != j),
                  "offdiag_max": max(cov[i][j] for i in range(4) for j in range(4) if i != j),
                  "preview_status": "descriptive_only_no_chi_square",
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "zhao_candidate_observed_manifest_packet",
                  "permission_status": "written_review_only",
                  "reason": "Candidate observed rows are written as output artifacts only.",
              },
              {
                  "permission_scope": "zhao_candidate_covariance_packet",
                  "permission_status": "written_review_only",
                  "reason": "Covariance support rows are written as output artifacts only.",
              },
              {
                  "permission_scope": "live_external_observed_manifest_fill",
                  "permission_status": "blocked",
                  "reason": "This workflow does not modify or approve the live observed manifest.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No reference model or scoring guard exists in this workflow.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "Same-family cross-release candidate rows are not evidence.",
              },
              {
                  "permission_scope": "full_independent_holdout_language",
                  "permission_status": "blocked",
                  "reason": "Provenance is not approved as full holdout.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No approved observed manifest or parameter values are ready.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
          ]

          readiness_rows = [
              {"readiness_id": "readiness_001", "requirement": "candidate_observed_manifest_packet", "status": "ready_review_only", "blocks": "nothing"},
              {"readiness_id": "readiness_002", "requirement": "candidate_covariance_packet", "status": "ready_review_only", "blocks": "nothing"},
              {"readiness_id": "readiness_003", "requirement": "staging_schema_validator", "status": "next_needed", "blocks": "live staging"},
              {"readiness_id": "readiness_004", "requirement": "provenance_upgrade", "status": "not_ready", "blocks": "holdout label"},
              {"readiness_id": "readiness_005", "requirement": "reference_model", "status": "not_ready", "blocks": "residual scoring"},
              {"readiness_id": "readiness_006", "requirement": "numeric_correction_fit", "status": "blocked", "blocks": "model comparison"},
              {"readiness_id": "readiness_007", "requirement": "combined_matrix_permission", "status": "blocked", "blocks": "combined matrix"},
          ]

          failure_condition_rows = [
              {"failure_condition_id": "failure_001", "target": "QSO f_sigma8 primary pressure", "machine_condition": "if holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened", "status": "active_but_not_testable_without_approved_holdout_and_covariance"},
              {"failure_condition_id": "failure_002", "target": "QSO versus LRG growth contrast", "machine_condition": "if lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened", "status": "active_for_future_control_review"},
              {"failure_condition_id": "failure_003", "target": "QSO radial secondary support", "machine_condition": "if qso_radial_direction == '-' then secondary_support_weakened", "status": "active_for_future_secondary_review"},
              {"failure_condition_id": "failure_004", "target": "geometry compressed lane non-primary", "machine_condition": "if compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed", "status": "active_for_future_geometry_review"},
              {"failure_condition_id": "failure_005", "target": "external likelihood robustness", "machine_condition": "if external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover then baseline_pressure_not_tairid_specific", "status": "active_for_future_model_comparison"},
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "Zhao can now be packaged as a candidate observed-manifest bridge artifact.",
                  "basis": "Values, quoted uncertainties, and reconstructed covariance support exist from v4.260.",
                  "next_action": "Validate candidate staging schema in v4.262.",
                  "claim_status": "candidate_review_only",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "Zhao cannot be called a full independent holdout yet.",
                  "basis": "The provenance scope remains same-survey-family/cross-release candidate.",
                  "next_action": "Keep source_role and approval_status guarded.",
                  "claim_status": "holdout_not_approved",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "No residual scoring can occur yet.",
                  "basis": "No reference model or scoring guard has been supplied.",
                  "next_action": "Do schema/staging validation only.",
                  "claim_status": "scoring_blocked",
              },
              {
                  "decision_id": "decision_004",
                  "decision": "Next route should validate the candidate staging packet.",
                  "basis": "Bridge rows exist as output artifacts but not as approved live observed data.",
                  "next_action": "Proceed to v4.262.",
                  "claim_status": "no_validation",
              },
          ]

          route_decision_rows = [
              {"route_id": "route_001", "route": "zhao_candidate_observed_manifest_staging_validator", "permission_status": "recommended", "reason": "Candidate bridge rows now need schema/scope validation."},
              {"route_id": "route_002", "route": "zhao_reference_model_residual_guard", "permission_status": "blocked_until_staging_validates", "reason": "Reference-model residuals are not ready."},
              {"route_id": "route_003", "route": "external_observed_residual_scoring", "permission_status": "blocked", "reason": "No scoring guard has passed."},
              {"route_id": "route_004", "route": "numeric_correction_fit", "permission_status": "blocked", "reason": "No approved observed manifest exists."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.261 is enough history for consolidation if needed."},
          ]

          next_rows = [
              {"priority": 1, "test_id": "v4_262_zhao_candidate_observed_manifest_staging_validator", "purpose": "validate candidate observed rows/covariance packet without scoring", "activated": True},
              {"priority": 2, "test_id": "v4_262_zhao_reference_model_residual_guard", "purpose": "future residual guard only after staging validates", "activated": False},
              {"priority": 3, "test_id": "v4_262_external_observed_residual_scoring", "purpose": "score only after a later scoring guard", "activated": False},
              {"priority": 4, "test_id": "v4_262_handoff_if_needed", "purpose": "consolidate v4.203-v4.261 if thread length is risky", "activated": True},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before bridge guard"},
              {"gate": "inherited_v4_260_rows_equal_10", "passed": len(inherited_v4_260_rows) == 10, "detail": f"inherited_v4_260_rows = {len(inherited_v4_260_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "extraction_manifest_status_rows_at_least_1", "passed": len(extraction_manifest_status_rows) >= 1, "detail": f"extraction_manifest_status_rows = {len(extraction_manifest_status_rows)}"},
              {"gate": "zhao_bridge_candidate_rows_equal_4", "passed": len(zhao_bridge_candidate_rows) == 4, "detail": f"zhao_bridge_candidate_rows = {len(zhao_bridge_candidate_rows)}"},
              {"gate": "zhao_covariance_bridge_rows_equal_16", "passed": len(zhao_covariance_bridge_rows) == 16, "detail": f"zhao_covariance_bridge_rows = {len(zhao_covariance_bridge_rows)}"},
              {"gate": "provenance_scope_decision_rows_equal_4", "passed": len(provenance_scope_decision_rows) == 4, "detail": f"provenance_scope_decision_rows = {len(provenance_scope_decision_rows)}"},
              {"gate": "observed_manifest_candidate_packet_rows_equal_4", "passed": len(observed_manifest_candidate_packet_rows) == 4, "detail": f"observed_manifest_candidate_packet_rows = {len(observed_manifest_candidate_packet_rows)}"},
              {"gate": "bridge_gate_rows_equal_6", "passed": len(bridge_gate_rows) == 6, "detail": f"bridge_gate_rows = {len(bridge_gate_rows)}"},
              {"gate": "candidate_staging_policy_rows_equal_4", "passed": len(candidate_staging_policy_rows) == 4, "detail": f"candidate_staging_policy_rows = {len(candidate_staging_policy_rows)}"},
              {"gate": "value_direction_preview_rows_equal_2", "passed": len(value_direction_preview_rows) == 2, "detail": f"value_direction_preview_rows = {len(value_direction_preview_rows)}"},
              {"gate": "permission_rows_equal_9", "passed": len(permission_rows) == 9, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_7", "passed": len(readiness_rows) == 7, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "all_candidate_rows_non_scoring", "passed": all(row["scoring_allowed"] is False and row["evidence_allowed"] is False for row in zhao_bridge_candidate_rows), "detail": "candidate rows non-scoring"},
              {"gate": "all_covariance_rows_non_scoring", "passed": all(row["scoring_allowed"] is False for row in zhao_covariance_bridge_rows), "detail": "covariance rows non-scoring"},
              {"gate": "all_candidate_approval_status_guarded", "passed": all(row["approval_status"] == "candidate_bridge_not_scored_not_evidence_not_full_holdout" for row in zhao_bridge_candidate_rows), "detail": "approval statuses guarded"},
              {"gate": "same_family_provenance_label_present", "passed": all("same_survey_family_cross_release" in row["source_role"] for row in zhao_bridge_candidate_rows), "detail": "same-family cross-release label present"},
              {"gate": "full_holdout_language_blocked", "passed": any(row["permission_scope"] == "full_independent_holdout_language" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "full holdout language blocked"},
              {"gate": "live_external_manifest_fill_blocked", "passed": any(row["permission_scope"] == "live_external_observed_manifest_fill" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "live observed manifest fill blocked"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external observed scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO evidence blocked"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric correction fit blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "staging_validator_route_recommended", "passed": any(row["route"] == "zhao_candidate_observed_manifest_staging_validator" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "v4.262 staging validator route recommended"},
              {"gate": "reference_model_residual_guard_not_activated", "passed": any(row["test_id"] == "v4_262_zhao_reference_model_residual_guard" and row["activated"] is False for row in next_rows), "detail": "reference residual guard not activated"},
              {"gate": "external_scoring_next_not_activated", "passed": any(row["test_id"] == "v4_262_external_observed_residual_scoring" and row["activated"] is False for row in next_rows), "detail": "external scoring not activated"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no external observed scoring"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout approval"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_262_zhao_candidate_observed_manifest_staging_validator_or_handoff", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_261_zhao_observed_manifest_bridge_guard_with_provenance_scope_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_261_inherited_v4_260_rows.csv", inherited_v4_260_rows)
          write_csv(OUT / "v4_261_observed_manifest_status_rows.csv", observed_manifest_status_rows)
          write_csv(OUT / "v4_261_extraction_manifest_status_rows.csv", extraction_manifest_status_rows)
          write_csv(OUT / "v4_261_zhao_bridge_candidate_rows.csv", zhao_bridge_candidate_rows)
          write_csv(OUT / "v4_261_zhao_covariance_bridge_rows.csv", zhao_covariance_bridge_rows)
          write_csv(OUT / "v4_261_provenance_scope_decision_rows.csv", provenance_scope_decision_rows)
          write_csv(OUT / "v4_261_observed_manifest_candidate_packet_rows.csv", observed_manifest_candidate_packet_rows)
          write_csv(OUT / "external_observed_manifest_CANDIDATE_ZHAO_v4_261_NOT_SCORED.csv", observed_manifest_candidate_packet_rows)
          write_csv(OUT / "v4_261_bridge_gate_rows.csv", bridge_gate_rows)
          write_csv(OUT / "v4_261_candidate_staging_policy_rows.csv", candidate_staging_policy_rows)
          write_csv(OUT / "v4_261_value_direction_preview_rows.csv", value_direction_preview_rows)
          write_csv(OUT / "v4_261_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_261_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_261_failure_condition_rows.csv", failure_condition_rows)
          write_csv(OUT / "v4_261_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_261_route_decision_rows.csv", route_decision_rows)
          write_csv(OUT / "v4_261_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_261_rule_checks.csv", checks)

          value_lines = [
              f"z={row['redshift']}: f_sigma8={row['observed_value']} ({row['approval_status']})"
              for row in zhao_bridge_candidate_rows
          ]

          provenance_lines = [
              f"{row['scope_id']}: {row['scope_answer']} — allowed: {row['allowed_language']} / blocked: {row['blocked_language']}"
              for row in provenance_scope_decision_rows
          ]

          route_lines = [
              f"{row['route']}: {row['permission_status']} — {row['reason']}"
              for row in route_decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_260_rows": len(inherited_v4_260_rows),
              "observed_manifest_status_rows": len(observed_manifest_status_rows),
              "extraction_manifest_status_rows": len(extraction_manifest_status_rows),
              "zhao_bridge_candidate_rows": len(zhao_bridge_candidate_rows),
              "zhao_covariance_bridge_rows": len(zhao_covariance_bridge_rows),
              "provenance_scope_decision_rows": len(provenance_scope_decision_rows),
              "observed_manifest_candidate_packet_rows": len(observed_manifest_candidate_packet_rows),
              "bridge_gate_rows": len(bridge_gate_rows),
              "candidate_staging_policy_rows": len(candidate_staging_policy_rows),
              "value_direction_preview_rows": len(value_direction_preview_rows),
              "permission_rows": len(permission_rows),
              "readiness_rows": len(readiness_rows),
              "failure_condition_rows": len(failure_condition_rows),
              "decision_rows": len(decision_rows),
              "route_decision_rows": len(route_decision_rows),
              "next_rows": len(next_rows),
              "candidate_packet_written": True,
              "live_observed_manifest_fill_allowed": False,
              "scoring_allowed": False,
              "approved_holdout_sources": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_261_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.261 Zhao Observed Manifest Bridge Guard With Provenance Scope",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_260_rows = {summary['inherited_v4_260_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"extraction_manifest_status_rows = {summary['extraction_manifest_status_rows']}",
              f"zhao_bridge_candidate_rows = {summary['zhao_bridge_candidate_rows']}",
              f"zhao_covariance_bridge_rows = {summary['zhao_covariance_bridge_rows']}",
              f"provenance_scope_decision_rows = {summary['provenance_scope_decision_rows']}",
              f"observed_manifest_candidate_packet_rows = {summary['observed_manifest_candidate_packet_rows']}",
              f"bridge_gate_rows = {summary['bridge_gate_rows']}",
              f"candidate_staging_policy_rows = {summary['candidate_staging_policy_rows']}",
              f"value_direction_preview_rows = {summary['value_direction_preview_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"route_decision_rows = {summary['route_decision_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"candidate_packet_written = {summary['candidate_packet_written']}",
              f"live_observed_manifest_fill_allowed = {summary['live_observed_manifest_fill_allowed']}",
              f"scoring_allowed = {summary['scoring_allowed']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Candidate Zhao bridge rows:",
              *value_lines,
              "",
              "Provenance scope:",
              *provenance_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.261 creates a candidate observed-manifest bridge packet for Zhao as review-only output. It does not fill the live observed manifest, does not score residuals, does not approve Zhao as a full independent holdout, and does not allow validation language.",
              "",
              "Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_261_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_260_rows = {summary['inherited_v4_260_rows']}")
          print(f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}")
          print(f"extraction_manifest_status_rows = {summary['extraction_manifest_status_rows']}")
          print(f"zhao_bridge_candidate_rows = {summary['zhao_bridge_candidate_rows']}")
          print(f"zhao_covariance_bridge_rows = {summary['zhao_covariance_bridge_rows']}")
          print(f"provenance_scope_decision_rows = {summary['provenance_scope_decision_rows']}")
          print(f"observed_manifest_candidate_packet_rows = {summary['observed_manifest_candidate_packet_rows']}")
          print(f"bridge_gate_rows = {summary['bridge_gate_rows']}")
          print(f"candidate_staging_policy_rows = {summary['candidate_staging_policy_rows']}")
          print(f"value_direction_preview_rows = {summary['value_direction_preview_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"readiness_rows = {summary['readiness_rows']}")
          print(f"failure_condition_rows = {summary['failure_condition_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"route_decision_rows = {summary['route_decision_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"candidate_packet_written = {summary['candidate_packet_written']}")
          print(f"live_observed_manifest_fill_allowed = {summary['live_observed_manifest_fill_allowed']}")
          print(f"scoring_allowed = {summary['scoring_allowed']}")
          print(f"approved_holdout_sources = {summary['approved_holdout_sources']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.261 Zhao observed manifest bridge guard output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-261-zhao-observed-manifest-bridge-guard-output
          path: |
            tairid_v4_261_zhao_observed_manifest_bridge_guard_output/
            tairid-v4-261-zhao-observed-manifest-bridge-guard-output.zip
