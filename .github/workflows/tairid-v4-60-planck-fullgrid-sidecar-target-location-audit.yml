name: TAIRID v4.60 Planck FullGrid Sidecar Target Location Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-60-planck-fullgrid-sidecar-target-location-audit.yml"

jobs:
  tairid-v4-60-planck-fullgrid-sidecar-target-location-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.60 Planck fullGrid sidecar target location audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_60_planck_fullgrid_sidecar_target_location_audit

          python - <<'PY'
          import csv
          import json
          import re
          import struct
          import urllib.request
          import hashlib
          import zlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_60_planck_fullgrid_sidecar_target_location_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_60_planck_fullgrid_sidecar_target_location_audit"

          FULL_GRID_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip"

          # Locked from v4.57 successful ZIP64 central-directory probe.
          FULLGRID_CONTENT_LENGTH_EXPECTED = 11805855817
          ZIP64_CENTRAL_DIRECTORY_OFFSET = 11803187830
          ZIP64_CENTRAL_DIRECTORY_SIZE = 2667889

          MAX_RANGE_READ_BYTES = 5_000_000
          MAX_SIDECAR_COMPRESSED_BYTES = 400_000
          MAX_SELECTED_ROOTS = 60

          SELECTED_PREFIXES = [
              "base/plikHM_TTTEEE_lowl_lowE/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing/",
              "base/plikHM_TT_lowl_lowE/",
              "base/plikHM_TT_lowl_lowE_lensing/",
              "base/plikHM_TTTEEE_lowl_lowE_BAO/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing_BAO/"
          ]

          SIDECAR_SUFFIXES = [
              ".paramnames",
              ".minimum",
              ".bestfit",
              ".likestats",
              ".ranges",
              ".converge"
          ]

          TARGET_PARAMS = [
              "fsigma8z015",
              "fsigma8z038",
              "fsigma8z051",
              "fsigma8z061",
              "fsigma8z233",
              "sigma8z015",
              "sigma8z038",
              "sigma8z051",
              "sigma8z061",
              "sigma8z233",
              "sigma8",
              "S8",
              "omegam",
              "H0"
          ]

          FSIGMA8_TARGETS = [
              "fsigma8z015",
              "fsigma8z038",
              "fsigma8z051",
              "fsigma8z061",
              "fsigma8z233"
          ]

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import Planck chains.",
              "This does not parse chain sample rows.",
              "This does not compute Planck reference uncertainty.",
              "This only reads bounded byte ranges for selected small sidecar files.",
              "This audits where fsigma8 and sigma8 target names live across sidecars.",
              "A pass means the target-location boundary is documented, not that uncertainty is computed."
          ]

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }

              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={
                          "User-Agent": "TAIRID-v4.60-sidecar-target-location/1.0",
                          "Accept": "*/*"
                      }
                  )

                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }

              data = b""

              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.60-sidecar-target-location/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )

                  with urllib.request.urlopen(req, timeout=180) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)

                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record, data

          def classify_member(name):
              lower = name.lower()

              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".paramnames"):
                  return "paramnames"
              if re.search(r"_\d+\.txt$", name):
                  return "chain_sample_text_member_not_read"
              if lower.endswith(".minimum"):
                  return "minimum"
              if lower.endswith(".bestfit"):
                  return "bestfit"
              if lower.endswith(".likestats"):
                  return "likestats"
              if lower.endswith(".ranges"):
                  return "ranges"
              if lower.endswith(".converge"):
                  return "converge"
              if lower.endswith(".txt"):
                  return "other_text_not_read"
              if lower.endswith(".pdf"):
                  return "pdf_not_read"
              return "other"

          def parse_zip64_extra(extra_bytes, need_uncompressed, need_compressed, need_local_offset):
              result = {}
              pos = 0

              while pos + 4 <= len(extra_bytes):
                  header_id, data_size = struct.unpack_from("<HH", extra_bytes, pos)
                  data_start = pos + 4
                  data_end = data_start + data_size

                  if data_end > len(extra_bytes):
                      break

                  data = extra_bytes[data_start:data_end]

                  if header_id == 0x0001:
                      subpos = 0

                      if need_uncompressed and subpos + 8 <= len(data):
                          result["uncompressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8

                      if need_compressed and subpos + 8 <= len(data):
                          result["compressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8

                      if need_local_offset and subpos + 8 <= len(data):
                          result["local_header_offset"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8

                  pos = data_end

              return result

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0

              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break

                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)

                      compression_method = fields[4]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      extra_start = name_end
                      extra_end = extra_start + extra_len
                      comment_end = extra_end + comment_len

                      if comment_end > len(cd_bytes):
                          break

                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")
                      extra = cd_bytes[extra_start:extra_end]

                      zip64_extra = parse_zip64_extra(
                          extra,
                          need_uncompressed=uncompressed_size == 0xFFFFFFFF,
                          need_compressed=compressed_size == 0xFFFFFFFF,
                          need_local_offset=local_header_offset == 0xFFFFFFFF
                      )

                      true_compressed_size = zip64_extra.get("compressed_size", compressed_size)
                      true_uncompressed_size = zip64_extra.get("uncompressed_size", uncompressed_size)
                      true_local_header_offset = zip64_extra.get("local_header_offset", local_header_offset)

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compression_method": compression_method,
                          "compressed_size": true_compressed_size,
                          "uncompressed_size": true_uncompressed_size,
                          "local_header_offset": true_local_header_offset,
                          "zip64_extra_used": bool(zip64_extra)
                      })

                      pos = comment_end

                  except Exception:
                      break

              return records

          def root_for_sidecar(name):
              for suffix in SIDECAR_SUFFIXES:
                  if name.endswith(suffix):
                      return name[:-len(suffix)]
              return None

          def sidecar_suffix(name):
              for suffix in SIDECAR_SUFFIXES:
                  if name.endswith(suffix):
                      return suffix
              return ""

          def fetch_member_bytes(member_record):
              offset = int(member_record["local_header_offset"])
              compressed_size = int(member_record["compressed_size"])

              if compressed_size <= 0:
                  raise RuntimeError("compressed_size_not_positive")

              if compressed_size > MAX_SIDECAR_COMPRESSED_BYTES:
                  raise RuntimeError("sidecar_member_too_large_for_guarded_fetch")

              header_record, header_data = range_probe(
                  "local_header_probe",
                  FULL_GRID_URL,
                  f"bytes={offset}-{offset + 4095}",
                  4096
              )

              if not header_record["ok"] or not header_record["server_honored_range"]:
                  raise RuntimeError("local_header_range_not_available")

              if len(header_data) < 30:
                  raise RuntimeError("local_header_too_short")

              if header_data[:4] != b"PK\x03\x04":
                  raise RuntimeError("local_header_signature_not_found")

              fields = struct.unpack_from("<4s5H3L2H", header_data, 0)

              compression_method = fields[3]
              file_name_len = fields[9]
              extra_len = fields[10]

              data_start = offset + 30 + file_name_len + extra_len
              data_end = data_start + compressed_size - 1

              data_record, compressed_data = range_probe(
                  "member_payload_probe",
                  FULL_GRID_URL,
                  f"bytes={data_start}-{data_end}",
                  compressed_size + 1024
              )

              if not data_record["ok"] or not data_record["server_honored_range"]:
                  raise RuntimeError("member_payload_range_not_available")

              if data_record["truncated_by_guard"]:
                  raise RuntimeError("member_payload_truncated_by_guard")

              if len(compressed_data) != compressed_size:
                  raise RuntimeError(f"member_payload_size_mismatch_expected_{compressed_size}_got_{len(compressed_data)}")

              if compression_method == 0:
                  return compressed_data, compression_method

              if compression_method == 8:
                  return zlib.decompress(compressed_data, -15), compression_method

              raise RuntimeError(f"unsupported_compression_method_{compression_method}")

          def parse_paramnames_targets(text):
              names = []

              for raw_line in text.splitlines():
                  line = raw_line.strip()

                  if not line or line.startswith("#"):
                      continue

                  first = line.split()[0]

                  if first:
                      names.append(first)

              hits = [target for target in TARGET_PARAMS if target in names]
              return hits, names

          def parse_text_targets(text):
              hits = []
              numeric_values = []

              pattern = re.compile(
                  r"^\s*(\d+)\s+([+-]?(?:\d+\.\d*|\.\d+|\d+)(?:[Ee][+-]?\d+)?)\s+([A-Za-z0-9_]+)\b(.*)$",
                  re.MULTILINE
              )

              for index, value, name, label in pattern.findall(text):
                  if name in TARGET_PARAMS:
                      hits.append(name)
                      numeric_values.append({
                          "target_name": name,
                          "target_index": int(index),
                          "target_value": float(value),
                          "target_label": label.strip()
                      })

              for target in TARGET_PARAMS:
                  if target in text and target not in hits:
                      hits.append(target)

              return sorted(set(hits), key=lambda value: value.lower()), numeric_values

          failed_gates = []
          warnings = [
              "sidecar_target_location_audit_only",
              "full_grid_not_downloaded",
              "chain_sample_rows_not_read",
              "reference_uncertainty_not_computed",
              "final_RSD_pressure_not_computed",
              "not_validation"
          ]

          head_record = head_probe("full_grid_head", FULL_GRID_URL)

          if not head_record["ok"]:
              failed_gates.append("full_grid_head_probe_failed")

          if head_record.get("content_length") and head_record["content_length"] != FULLGRID_CONTENT_LENGTH_EXPECTED:
              warnings.append("fullgrid_content_length_differs_from_v4_57_locked_value")

          cd_start = ZIP64_CENTRAL_DIRECTORY_OFFSET
          cd_end = ZIP64_CENTRAL_DIRECTORY_OFFSET + ZIP64_CENTRAL_DIRECTORY_SIZE - 1

          cd_record, cd_data = range_probe(
              "full_grid_locked_zip64_central_directory_fetch",
              FULL_GRID_URL,
              f"bytes={cd_start}-{cd_end}",
              MAX_RANGE_READ_BYTES
          )

          if not cd_record["ok"]:
              failed_gates.append("central_directory_fetch_failed")

          if not cd_record.get("server_honored_range"):
              failed_gates.append("central_directory_range_not_honored")

          if cd_record.get("truncated_by_guard"):
              failed_gates.append("central_directory_truncated_by_guard")

          manifest_records = parse_central_directory(cd_data) if cd_data else []

          if not manifest_records:
              failed_gates.append("central_directory_manifest_records_not_parsed")

          by_member_name = {row["member_name"]: row for row in manifest_records}

          selected_minimum_roots = []

          for row in manifest_records:
              name = row["member_name"]

              if row["member_type"] == "minimum" and any(name.startswith(prefix) for prefix in SELECTED_PREFIXES):
                  root = root_for_sidecar(name)
                  if root:
                      selected_minimum_roots.append(root)

          selected_roots = sorted(set(selected_minimum_roots))[:MAX_SELECTED_ROOTS]

          if not selected_roots:
              failed_gates.append("no_selected_roots_from_minimum_sidecars")

          sidecar_records = []
          target_value_records = []

          root_location_summary = []

          for root in selected_roots:
              root_hits = {
                  "root": root,
                  "paramnames_targets": [],
                  "minimum_targets": [],
                  "bestfit_targets": [],
                  "likestats_targets": [],
                  "ranges_targets": [],
                  "converge_targets": []
              }

              for suffix in SIDECAR_SUFFIXES:
                  member_name = root + suffix
                  member = by_member_name.get(member_name)

                  record = {
                      "root": root,
                      "member_name": member_name,
                      "sidecar_suffix": suffix,
                      "member_exists": bool(member),
                      "member_type": classify_member(member_name),
                      "compressed_size": member["compressed_size"] if member else "",
                      "uncompressed_size": member["uncompressed_size"] if member else "",
                      "local_header_offset": member["local_header_offset"] if member else "",
                      "extraction_ok": False,
                      "compression_method": "",
                      "target_hits": "",
                      "fsigma8_hits": "",
                      "sigma8z_hits": "",
                      "scalar_hits": "",
                      "target_count": 0,
                      "error": ""
                  }

                  if member:
                      try:
                          payload, method = fetch_member_bytes(member)
                          text = payload.decode("utf-8", errors="replace")

                          if suffix == ".paramnames":
                              hits, names = parse_paramnames_targets(text)
                              record["parameter_count_or_line_count"] = len(names)
                          else:
                              hits, numeric_values = parse_text_targets(text)
                              record["parameter_count_or_line_count"] = len(text.splitlines())

                              for value_row in numeric_values:
                                  saved = {
                                      "root": root,
                                      "member_name": member_name,
                                      "sidecar_suffix": suffix
                                  }
                                  saved.update(value_row)
                                  target_value_records.append(saved)

                          fsigma8_hits = sorted([hit for hit in hits if hit.startswith("fsigma8z")])
                          sigma8z_hits = sorted([hit for hit in hits if hit.startswith("sigma8z")])
                          scalar_hits = sorted([hit for hit in hits if hit in {"H0", "omegam", "sigma8", "S8"}])

                          record["extraction_ok"] = True
                          record["compression_method"] = method
                          record["target_hits"] = ", ".join(hits)
                          record["fsigma8_hits"] = ", ".join(fsigma8_hits)
                          record["sigma8z_hits"] = ", ".join(sigma8z_hits)
                          record["scalar_hits"] = ", ".join(scalar_hits)
                          record["target_count"] = len(hits)

                          location_key = suffix.strip(".") + "_targets"
                          if location_key in root_hits:
                              root_hits[location_key].extend(hits)

                      except Exception as exc:
                          record["error"] = f"{type(exc).__name__}: {exc}"

                  sidecar_records.append(record)

              root_location_summary.append({
                  "root": root,
                  "paramnames_target_count": len(set(root_hits["paramnames_targets"])),
                  "minimum_target_count": len(set(root_hits["minimum_targets"])),
                  "bestfit_target_count": len(set(root_hits["bestfit_targets"])),
                  "likestats_target_count": len(set(root_hits["likestats_targets"])),
                  "ranges_target_count": len(set(root_hits["ranges_targets"])),
                  "converge_target_count": len(set(root_hits["converge_targets"])),
                  "paramnames_fsigma8_count": len([x for x in set(root_hits["paramnames_targets"]) if x.startswith("fsigma8z")]),
                  "minimum_fsigma8_count": len([x for x in set(root_hits["minimum_targets"]) if x.startswith("fsigma8z")]),
                  "bestfit_fsigma8_count": len([x for x in set(root_hits["bestfit_targets"]) if x.startswith("fsigma8z")]),
                  "likestats_fsigma8_count": len([x for x in set(root_hits["likestats_targets"]) if x.startswith("fsigma8z")]),
                  "target_location_pattern": ""
              })

          for row in root_location_summary:
              if row["paramnames_fsigma8_count"] > 0:
                  row["target_location_pattern"] = "direct_chain_column_candidate"
              elif row["minimum_fsigma8_count"] > 0 or row["bestfit_fsigma8_count"] > 0 or row["likestats_fsigma8_count"] > 0:
                  row["target_location_pattern"] = "derived_sidecar_output_not_direct_chain_column"
              else:
                  row["target_location_pattern"] = "RSD_targets_not_visible_in_audited_sidecars"

          extraction_ok_count = sum(1 for row in sidecar_records if row["extraction_ok"])
          extraction_fail_count = sum(1 for row in sidecar_records if row["member_exists"] and not row["extraction_ok"])

          paramnames_fsigma8_root_count = sum(1 for row in root_location_summary if row["paramnames_fsigma8_count"] > 0)
          minimum_fsigma8_root_count = sum(1 for row in root_location_summary if row["minimum_fsigma8_count"] > 0)
          bestfit_fsigma8_root_count = sum(1 for row in root_location_summary if row["bestfit_fsigma8_count"] > 0)
          likestats_fsigma8_root_count = sum(1 for row in root_location_summary if row["likestats_fsigma8_count"] > 0)

          derived_sidecar_output_root_count = sum(
              1 for row in root_location_summary
              if row["target_location_pattern"] == "derived_sidecar_output_not_direct_chain_column"
          )

          direct_chain_column_candidate_root_count = sum(
              1 for row in root_location_summary
              if row["target_location_pattern"] == "direct_chain_column_candidate"
          )

          if extraction_ok_count == 0:
              failed_gates.append("no_sidecar_files_extracted_successfully")

          if extraction_fail_count > 0:
              warnings.append("some_sidecar_files_failed_to_extract")

          if minimum_fsigma8_root_count == 0:
              failed_gates.append("minimum_fsigma8_targets_not_confirmed")

          if paramnames_fsigma8_root_count == 0 and minimum_fsigma8_root_count > 0:
              route_decision = "fsigma8_targets_are_derived_sidecar_outputs_not_direct_chain_columns"
          elif paramnames_fsigma8_root_count > 0:
              route_decision = "fsigma8_targets_present_in_paramnames_guarded_chain_column_contract_possible"
          else:
              route_decision = "fsigma8_target_location_unresolved_external_reference_or_derived_route_required"

          RULE_RESULTS = [
              {
                  "rule_id": "fullgrid_not_downloaded",
                  "pass": True,
                  "result": "only_bounded_ranges_read",
                  "boundary": "No fullGrid download."
              },
              {
                  "rule_id": "central_directory_fetched_from_v4_57_offsets",
                  "pass": cd_record["ok"] and cd_record["server_honored_range"] and not cd_record["truncated_by_guard"],
                  "result": f"central_directory_bytes_read_{cd_record.get('bytes_read')}",
                  "boundary": "Central directory only."
              },
              {
                  "rule_id": "selected_roots_identified",
                  "pass": bool(selected_roots),
                  "result": f"{len(selected_roots)} selected roots identified",
                  "boundary": "Root selection only."
              },
              {
                  "rule_id": "sidecars_extracted",
                  "pass": extraction_ok_count > 0,
                  "result": f"{extraction_ok_count} sidecar files extracted",
                  "boundary": "No chain sample rows read."
              },
              {
                  "rule_id": "minimum_fsigma8_confirmed",
                  "pass": minimum_fsigma8_root_count > 0,
                  "result": f"{minimum_fsigma8_root_count} roots have fsigma8 in minimum sidecar",
                  "boundary": "Minimum values are not posterior samples."
              },
              {
                  "rule_id": "target_location_route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Location audit only; no uncertainty."
              },
              {
                  "rule_id": "sidecars_not_treated_as_uncertainty",
                  "pass": True,
                  "result": "sidecar_outputs_flagged_as_diagnostic_or_metadata_not_covariance",
                  "boundary": "Do not compute covariance from sidecars."
              },
              {
                  "rule_id": "no_chain_sample_rows_read",
                  "pass": True,
                  "result": "no_chain_samples_imported_or_read",
                  "boundary": "No Planck posterior samples used."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Sidecar target-location audit only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_60_rules_passed")

          if failed_gates:
              readiness_label = "planck_fullgrid_sidecar_target_location_audit_failed"
              next_allowed_step = "Repair sidecar target-location audit before derived-growth or external-reference route design."
          else:
              readiness_label = "planck_fullgrid_sidecar_target_location_audit_passed_ready_for_derived_growth_contract_or_external_reference_route"
              next_allowed_step = (
                  "Proceed according to route_decision. If fsigma8 targets are sidecar-derived outputs and not direct chain columns, "
                  "do not import chains expecting fsigma8 columns. Next design must choose a derived-growth calculator contract from chain parameters "
                  "or an external verified reference route. Do not compute reference uncertainty or final RSD pressure yet."
              )

          system_health = {
              "head_ok": head_record["ok"],
