          md.append("This test fetches only selected small sidecar files from the Planck fullGrid ZIP using bounded byte ranges and v4.57 ZIP64 central-directory offsets.")
          md.append("")
          md.append("It audits whether `fsigma8z*` targets live in `.paramnames` as chain columns or only in derived sidecar outputs such as `.minimum`, `.bestfit`, or `.likestats`.")
          md.append("")
