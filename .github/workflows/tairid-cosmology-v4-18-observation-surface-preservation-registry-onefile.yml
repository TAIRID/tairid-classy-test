name: TAIRID Cosmology v4.18 Observation Surface Preservation Registry Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-18-observation-surface-preservation-registry-onefile.yml"

jobs:
  observation-surface-preservation-registry-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.18 observation surface preservation registry onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_18_observation_surface_preservation_registry_onefile

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_18_observation_surface_preservation_registry_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_18_observation_surface_preservation_registry_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine CMB, supernovae, BAO, KiDS, DES, HSC, or H0LiCOW into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run CMB, supernova, BAO, DES, HSC, KiDS, or H0LiCOW likelihoods.",
              "This creates an observation-surface preservation registry so TAIRID language cannot drift into tired-light, static-light, or broken-propagation claims.",
              "A pass means the observation-surface role is safely mapped for future tests, not that TAIRID cosmology is validated."
          ]

          PRESERVATION_REQUIREMENTS = [
              {
                  "requirement_id": "cmb_last_scattering_surface",
                  "standard_observable": "CMB last-scattering surface",
                  "standard_role": "The early universe becomes transparent enough for photons to free-stream and preserve a measurable surface.",
                  "tairid_translation": "A stable observation surface forms when information can persist, propagate, and remain measurable across time.",
                  "must_preserve": "Photon decoupling / last-scattering surface must remain a real observational boundary.",
                  "failure_mode": "TAIRID language treats the CMB as optional metaphor rather than a physical observational surface.",
                  "evidence_status": "conceptual_mapping_only",
                  "next_test": "cmb_surface_role_requirement_ledger",
                  "blocked_claim": "TAIRID does not replace the CMB explanation."
              },
              {
                  "requirement_id": "supernova_time_dilation",
                  "standard_observable": "Type Ia supernova light-curve time dilation",
                  "standard_role": "Distant supernova light curves are stretched with redshift in expanding-spacetime cosmology.",
                  "tairid_translation": "Observation surfaces must preserve propagation pacing effects across cosmological distance.",
                  "must_preserve": "Any TAIRID cosmology must allow supernova time dilation rather than erase it.",
                  "failure_mode": "TAIRID drifts into static-light or tired-light behavior that cannot preserve time dilation.",
                  "evidence_status": "not_tested_here",
                  "next_test": "supernova_time_dilation_preservation_inventory",
                  "blocked_claim": "TAIRID does not reject expansion evidence."
              },
              {
                  "requirement_id": "tolman_surface_brightness",
                  "standard_observable": "Tolman surface-brightness dimming",
                  "standard_role": "Surface brightness changes with redshift in a way tied to expansion and photon propagation.",
                  "tairid_translation": "Observation surfaces must preserve intensity, pacing, and propagation-cost effects rather than treating redshift as only energy loss.",
                  "must_preserve": "Tolman dimming must remain a required preservation check.",
                  "failure_mode": "TAIRID collapses into a simple energy-loss model and fails surface-brightness behavior.",
                  "evidence_status": "not_tested_here",
                  "next_test": "tolman_dimming_preservation_inventory",
                  "blocked_claim": "TAIRID does not become tired-light."
              },
              {
                  "requirement_id": "distance_duality",
                  "standard_observable": "Etherington distance duality / luminosity-distance and angular-diameter-distance relation",
                  "standard_role": "Distance measures must remain mutually constrained when photon number and metric propagation assumptions hold.",
                  "tairid_translation": "Observation surfaces must keep reach, visibility, and measured distance relations coherent.",
                  "must_preserve": "Distance duality must be treated as a boundary guard before any new propagation claim.",
                  "failure_mode": "TAIRID allows distance measures to drift independently without an explicit boundary condition.",
                  "evidence_status": "not_tested_here",
                  "next_test": "distance_duality_boundary_inventory",
                  "blocked_claim": "TAIRID does not freely redefine distance without preserving observational constraints."
              },
              {
                  "requirement_id": "bao_auxiliary_boundary",
                  "standard_observable": "BAO ruler / acoustic-scale boundary",
                  "standard_role": "BAO acts as a standard-ruler constraint and calibration boundary.",
                  "tairid_translation": "BAO remains a boundary/ruler guard, not a global reach anchor.",
                  "must_preserve": "BAO must not be promoted into one universal correction surface.",
                  "failure_mode": "TAIRID uses BAO to force reach and growth into one combined surface.",
                  "evidence_status": "prior_diagnostic_review",
                  "next_test": "bao_distance_duality_boundary_preservation_audit",
                  "blocked_claim": "BAO does not validate TAIRID or confirm the reach surface."
              }
          ]

          OBSERVATION_SURFACE_ROLE = {
              "role_id": "observation_surface",
              "definition": "A stable physical or informational surface where structure, signal, or state can persist, propagate, interact, and remain measurable later.",
              "current_status": "conceptual_mapping_only_with_preservation_requirements",
              "safe_use": "Use as a translation layer for how information-bearing surfaces emerge and remain observable.",
              "unsafe_use": "Do not use as proof that TAIRID replaces CMB, metric expansion, or standard propagation evidence.",
              "promotion_condition": "At least CMB surface role, supernova time dilation, Tolman dimming, distance duality, and BAO boundary behavior must be preserved before stronger claims."
          }

          BLOCKED_INTERPRETATIONS = [
              {
                  "claim": "TAIRID proves cosmology.",
                  "status": "blocked",
                  "reason": "This is only a preservation registry."
              },
              {
                  "claim": "TAIRID replaces the CMB explanation.",
                  "status": "blocked",
                  "reason": "The CMB surface is a preservation requirement, not a replaced object."
              },
              {
                  "claim": "TAIRID rejects expansion evidence.",
                  "status": "blocked",
                  "reason": "Supernova time dilation and Tolman dimming must be preserved before any propagation reinterpretation."
              },
              {
                  "claim": "TAIRID is a tired-light model.",
                  "status": "blocked",
                  "reason": "Tired-light/static-light drift is explicitly treated as a failure mode."
              },
              {
                  "claim": "BAO confirms the reach surface.",
                  "status": "blocked",
                  "reason": "BAO remains auxiliary boundary/ruler guard only."
              },
              {
                  "claim": "Distance can be freely redefined.",
                  "status": "blocked",
                  "reason": "Distance duality and propagation consistency remain required boundary checks."
              }
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_19_supernova_time_dilation_and_tolman_preservation_inventory",
                  "role_focus": "observation_surface",
                  "purpose": "Inventory public evidence lanes for supernova time dilation and Tolman surface-brightness dimming before any TAIRID propagation reinterpretation.",
                  "why_next": "This is the strongest guard against tired-light/static-light drift.",
                  "must_include": "SN time dilation, Tolman dimming, source/product status, blocked claims.",
                  "must_not_include": "rejecting expansion evidence or claiming TAIRID validation."
              },
              {
                  "priority": 2,
                  "next_test": "v4_20_distance_duality_and_bao_boundary_registry",
                  "role_focus": "observation_surface_and_boundary_ruler",
                  "purpose": "Preserve distance-duality and BAO ruler-boundary roles before any reach reinterpretation.",
                  "why_next": "Distance relations and BAO boundaries constrain what TAIRID is allowed to say about reach.",
                  "must_include": "luminosity distance, angular diameter distance, BAO auxiliary status.",
                  "must_not_include": "one-surface collapse or BAO validation claim."
              },
              {
                  "priority": 3,
                  "next_test": "v4_21_growth_expansion_RSD_cluster_CMB_lensing_inventory",
                  "role_focus": "consolidation_growth",
                  "purpose": "Return to growth/consolidation pressure with RSD, cluster, and CMB-lensing inventories after observation-surface safeguards are active.",
                  "why_next": "Growth expansion should happen after propagation and observation-surface failure modes are guarded.",
                  "must_include": "source/product status, direct-vs-summary labels, no combined posterior claim.",
                  "must_not_include": "full likelihood fitting or validation language."
              },
              {
                  "priority": 4,
                  "next_test": "v4_22_inflation_jobs_requirement_ledger",
                  "role_focus": "viability_space_expansion",
                  "purpose": "List the required jobs inflation performs before TAIRID viability-space expansion can become more than a conceptual mapping.",
                  "why_next": "The inflation plate is promising but must be forced through standard requirements.",
                  "must_include": "smoothness, flatness, primordial spectrum, acoustic peaks, tensor bounds.",
                  "must_not_include": "claiming TAIRID replaces inflation."
              }
          ]

          failed_gates = []
          warnings = []

          required_ids = {
              "cmb_last_scattering_surface",
              "supernova_time_dilation",
              "tolman_surface_brightness",
              "distance_duality",
              "bao_auxiliary_boundary"
          }

          present_ids = {row["requirement_id"] for row in PRESERVATION_REQUIREMENTS}

          missing = sorted(required_ids - present_ids)
          if missing:
              failed_gates.append("missing_required_preservation_requirements:" + ",".join(missing))

          for row in PRESERVATION_REQUIREMENTS:
              for field in [
                  "requirement_id",
                  "standard_observable",
                  "standard_role",
                  "tairid_translation",
                  "must_preserve",
                  "failure_mode",
                  "evidence_status",
                  "next_test",
                  "blocked_claim"
              ]:
                  if not row.get(field):
                      failed_gates.append(f"{row.get('requirement_id', 'unknown')}_missing_{field}")

          # Guard against bad cosmology drift.
          time_dilation_row = next(row for row in PRESERVATION_REQUIREMENTS if row["requirement_id"] == "supernova_time_dilation")
          tolman_row = next(row for row in PRESERVATION_REQUIREMENTS if row["requirement_id"] == "tolman_surface_brightness")
          bao_row = next(row for row in PRESERVATION_REQUIREMENTS if row["requirement_id"] == "bao_auxiliary_boundary")

          if "tired-light" not in tolman_row["failure_mode"] and "tired" not in tolman_row["blocked_claim"].lower():
              failed_gates.append("tolman_tired_light_failure_guard_missing")

          if "time dilation" not in time_dilation_row["must_preserve"].lower():
              failed_gates.append("supernova_time_dilation_preservation_guard_missing")

          if "not be promoted" not in bao_row["must_preserve"].lower() and "auxiliary" not in bao_row["tairid_translation"].lower():
              failed_gates.append("bao_auxiliary_boundary_guard_missing")

          if NEXT_TEST_LADDER[0]["role_focus"] != "observation_surface":
              failed_gates.append("next_test_ladder_does_not_prioritize_observation_surface")

          if "validation" in OBSERVATION_SURFACE_ROLE["safe_use"].lower():
              failed_gates.append("safe_use_contains_validation_language")

          warnings.append("observation_surface_registry_is_preservation_gate_not_data_test")
          warnings.append("standard_observables_must_be_preserved_before_tairid_reinterpretation")

          if failed_gates:
              readiness_label = "observation_surface_preservation_registry_failed"
              next_step = "Repair missing preservation requirements or failure-mode guards before moving to data inventories."
          else:
              readiness_label = "observation_surface_preservation_registry_passed_ready_for_time_dilation_tolman_inventory"
              next_step = (
                  "Proceed to v4.19 supernova time-dilation and Tolman-dimming preservation inventory. "
                  "Do not claim TAIRID replaces expansion evidence; the next test is a preservation inventory."
              )

          status_counts = {}
          for row in PRESERVATION_REQUIREMENTS:
              status = row["evidence_status"]
              status_counts[status] = status_counts.get(status, 0) + 1

          system_health = {
              "required_preservation_requirements_present": len(missing) == 0,
              "cmb_surface_guard_present": "cmb_last_scattering_surface" in present_ids,
              "supernova_time_dilation_guard_present": "supernova_time_dilation" in present_ids,
              "tolman_dimming_guard_present": "tolman_surface_brightness" in present_ids,
              "distance_duality_guard_present": "distance_duality" in present_ids,
              "bao_auxiliary_boundary_guard_present": "bao_auxiliary_boundary" in present_ids,
              "tired_light_drift_blocked": True,
              "static_light_drift_blocked": True,
              "validation_claim_allowed": False,
              "model_replacement_claim_allowed": False
          }

          interpretation = (
              "v4.18 creates the observation-surface preservation registry. "
              "This is a safety checkpoint: TAIRID can use observation-surface language only if it preserves standard observational structures such as the CMB last-scattering surface, supernova time dilation, Tolman dimming, distance duality, and BAO boundary behavior. "
              "The registry blocks tired-light/static-light drift and prevents the atlas from being treated as evidence."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "observation_surface_role": OBSERVATION_SURFACE_ROLE,
              "preservation_requirements": PRESERVATION_REQUIREMENTS,
              "blocked_interpretations": BLOCKED_INTERPRETATIONS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "status_counts": status_counts,
              "system_health": system_health,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "inflation_replacement_claim_allowed": False,
                  "tired_light_claim_allowed": False,
                  "static_light_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "combined_posterior_allowed": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "observation_surface_preservation_requirements_v4_18.csv",
              PRESERVATION_REQUIREMENTS,
              [
                  "requirement_id",
                  "standard_observable",
                  "standard_role",
                  "tairid_translation",
                  "must_preserve",
                  "failure_mode",
                  "evidence_status",
                  "next_test",
                  "blocked_claim"
              ]
          )

          write_csv(
              OUTDIR / "blocked_interpretations_v4_18.csv",
              BLOCKED_INTERPRETATIONS,
              ["claim", "status", "reason"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_18.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "why_next", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "status_counts_v4_18.csv",
              [{"status": key, "count": value} for key, value in sorted(status_counts.items())],
              ["status", "count"]
          )

          write_csv(
              OUTDIR / "system_health_v4_18.csv",
              [system_health],
              [
                  "required_preservation_requirements_present",
                  "cmb_surface_guard_present",
                  "supernova_time_dilation_guard_present",
                  "tolman_dimming_guard_present",
                  "distance_duality_guard_present",
                  "bao_auxiliary_boundary_guard_present",
                  "tired_light_drift_blocked",
                  "static_light_drift_blocked",
                  "validation_claim_allowed",
                  "model_replacement_claim_allowed"
              ]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_observation_surface_registry",
                  "status": "allowed_with_boundary",
                  "wording": "Observation-surface language is now mapped to required standard-cosmology preservation checks.",
                  "boundary": "Preservation registry only, not validation."
              },
              {
                  "interpretation_id": "allowed_cmb_surface_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The CMB last-scattering surface is treated as a required observational boundary to preserve.",
                  "boundary": "No CMB replacement claim."
              },
              {
                  "interpretation_id": "allowed_time_dilation_tolman_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Supernova time dilation and Tolman dimming are required guards against tired-light/static-light drift.",
                  "boundary": "No rejection of expansion evidence."
              },
              {
                  "interpretation_id": "allowed_bao_boundary_statement",
                  "status": "allowed_with_boundary",
                  "wording": "BAO remains an auxiliary ruler boundary and is not promoted into a global reach anchor.",
                  "boundary": "No BAO validation claim."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID cosmology is validated.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_tired_light_claim",
                  "status": "forbidden",
                  "wording": "TAIRID can ignore supernova time dilation or Tolman dimming.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_standard_cosmology_disproof",
                  "status": "forbidden",
                  "wording": "Standard cosmology is disproven.",
                  "boundary": "Blocked."
              }
          ]

          write_csv(
              OUTDIR / "interpretation_boundaries_v4_18.csv",
              interpretation_rows,
              ["interpretation_id", "status", "wording", "boundary"]
          )

          json_path = OUTDIR / "tairid_cosmology_v4_18_observation_surface_preservation_registry_onefile.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v4.18 — Observation-Surface Preservation Registry")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("The observation-surface role is now guarded. TAIRID may use observation-surface language only if it preserves standard observational structures instead of replacing or ignoring them.")
          md.append("")
          md.append("This is the protection layer against tired-light, static-light, or broken-propagation drift.")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## Observation-surface role")
          md.append("")
          md.append(f"Definition: {OBSERVATION_SURFACE_ROLE['definition']}")
          md.append("")
          md.append(f"Safe use: {OBSERVATION_SURFACE_ROLE['safe_use']}")
          md.append("")
          md.append(f"Unsafe use: {OBSERVATION_SURFACE_ROLE['unsafe_use']}")
          md.append("")
          md.append("## Preservation requirements")
          md.append("")
          md.append("| Requirement | Standard observable | Evidence status | Must preserve | Blocked claim |")
          md.append("|---|---|---|---|---|")
          for row in PRESERVATION_REQUIREMENTS:
              md.append(
                  f"| `{row['requirement_id']}` | {row['standard_observable']} | `{row['evidence_status']}` | "
                  f"{row['must_preserve']} | {row['blocked_claim']} |"
              )
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Blocked interpretations")
          md.append("")
          for row in BLOCKED_INTERPRETATIONS:
              md.append(f"- {row['claim']} — {row['reason']}")
          md.append("")
          md.append("## Next test ladder")
          md.append("")
          md.append("| Priority | Next test | Role focus | Why next |")
          md.append("|---:|---|---|---|")
          for row in NEXT_TEST_LADDER:
              md.append(f"| `{row['priority']}` | `{row['next_test']}` | `{row['role_focus']}` | {row['why_next']} |")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          md.append(interpretation)
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `observation_surface_preservation_requirements_v4_18.csv`")
          md.append("- `blocked_interpretations_v4_18.csv`")
          md.append("- `next_test_ladder_v4_18.csv`")
          md.append("- `status_counts_v4_18.csv`")
          md.append("- `system_health_v4_18.csv`")
          md.append("- `interpretation_boundaries_v4_18.csv`")
          md.append("- `tairid_cosmology_v4_18_observation_surface_preservation_registry_onefile.json`")
          md.append("- `tairid_cosmology_v4_18_observation_surface_preservation_registry_onefile.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v4_18_observation_surface_preservation_registry_onefile.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.18 observation surface preservation registry onefile artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v4-18-observation-surface-preservation-registry-onefile
          path: artifacts/tairid_cosmology_v4_18_observation_surface_preservation_registry_onefile/
