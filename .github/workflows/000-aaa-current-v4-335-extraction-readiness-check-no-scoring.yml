name: "!!! AAA CURRENT - TAIRID v4.335 extraction readiness check no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-335-extraction-readiness-check-no-scoring:
    name: "!!! AAA CURRENT - Run v4.335 extraction readiness check"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.334 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.334 output ZIP by pattern..."
          INPUT_334_ZIP="$(ls tairid-v4-334-parameter-value-extraction-worksheet-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_334_ZIP" ]; then
            echo "Could not find v4.334 output ZIP."
            echo "Expected a file like:"
            echo "tairid-v4-334-parameter-value-extraction-worksheet-no-scoring-output.zip"
            exit 1
          fi

          echo "Using v4.334 ZIP:"
          echo "$INPUT_334_ZIP"
          echo "INPUT_334_ZIP=$INPUT_334_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.335 readiness script
        run: |
          cat > run_v4_335_extraction_readiness_check_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          TRUTH_BOUNDARY = "no observed scoring; no parameter approval; no numeric baseline approval; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def blank_count(df, col):
              return int(df[col].apply(clean).eq("").sum())

          def filled_count(df, col):
              return int(df[col].apply(clean).ne("").sum())

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def main():
              input_334 = Path(os.environ["INPUT_334_ZIP"])

              outdir = Path("tairid_v4_335_extraction_readiness_check_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base334 = extract_zip(input_334, "tairid_v4_335_334_")

              summary334_path = find_one(base334, "v4_334_summary.json")
              worksheet_path = find_one(base334, "v4_334_HUMAN_FILL_parameter_value_extraction_worksheet_NO_APPROVAL_NO_SCORING.csv")
              gap_status_path = find_one(base334, "v4_334_value_extraction_gap_status_no_scoring.csv")
              rules334_path = find_one(base334, "v4_334_rule_checks.csv")
              open_gaps_path = find_one(base334, "v4_334_input_open_gaps_preserved.csv")
              blocked_gates_path = find_one(base334, "v4_334_input_blocked_gates_preserved.csv")
              ruled_out_path = find_one(base334, "v4_334_input_ruled_out_claims_preserved.csv")

              summary334 = json.loads(summary334_path.read_text())
              worksheet = pd.read_csv(worksheet_path)
              gap_status = pd.read_csv(gap_status_path)
              rules334 = pd.read_csv(rules334_path)
              open_gaps = pd.read_csv(open_gaps_path)
              blocked_gates = pd.read_csv(blocked_gates_path)
              ruled_out = pd.read_csv(ruled_out_path)

              exact_quote_filled = filled_count(worksheet, "human_exact_quote_selected")
              value_text_filled = filled_count(worksheet, "human_candidate_value_text_as_written")
              numeric_value_filled = filled_count(worksheet, "human_candidate_numeric_value_if_applicable")
              extraction_decision_filled = filled_count(worksheet, "human_extraction_decision")

              total_human_filled_signals = (
                  exact_quote_filled
                  + value_text_filled
                  + numeric_value_filled
                  + extraction_decision_filled
              )

              if total_human_filled_signals == 0:
                  readiness_status = "blocked_pending_human_extraction_fill"
                  selected_next_route = "human_fill_v4_334_extraction_worksheet_then_rerun_v4_335"
              elif extraction_decision_filled < len(worksheet):
                  readiness_status = "blocked_partial_human_extraction_fill"
                  selected_next_route = "finish_human_extraction_worksheet_then_rerun_v4_335"
              else:
                  readiness_status = "ready_for_later_extraction_ingest_no_value_approval_no_scoring"
                  selected_next_route = "v4_336_extraction_ingest_no_value_approval_no_scoring"

              readiness_rows = []
              for _, row in worksheet.iterrows():
                  human_fields_filled = {
                      "human_exact_quote_selected": clean(row["human_exact_quote_selected"]) != "",
                      "human_source_url_for_selected_quote": clean(row["human_source_url_for_selected_quote"]) != "",
                      "human_source_page_section_or_table": clean(row["human_source_page_section_or_table"]) != "",
                      "human_candidate_value_text_as_written": clean(row["human_candidate_value_text_as_written"]) != "",
                      "human_candidate_numeric_value_if_applicable": clean(row["human_candidate_numeric_value_if_applicable"]) != "",
                      "human_candidate_uncertainty_if_applicable": clean(row["human_candidate_uncertainty_if_applicable"]) != "",
                      "human_candidate_units_or_definition": clean(row["human_candidate_units_or_definition"]) != "",
                      "human_context_note": clean(row["human_context_note"]) != "",
                      "human_extraction_decision": clean(row["human_extraction_decision"]) != "",
                      "human_reviewer_note": clean(row["human_reviewer_note"]) != "",
                  }

                  readiness_rows.append({
                      "v4_334_extraction_id": row["v4_334_extraction_id"],
                      "question_id": row["question_id"],
                      "parameter_or_method": row["parameter_or_method"],
                      "extraction_category": row["extraction_category"],
                      "human_exact_quote_filled": human_fields_filled["human_exact_quote_selected"],
                      "human_value_text_filled": human_fields_filled["human_candidate_value_text_as_written"],
                      "human_numeric_value_filled": human_fields_filled["human_candidate_numeric_value_if_applicable"],
                      "human_extraction_decision_filled": human_fields_filled["human_extraction_decision"],
                      "row_ready_for_later_ingest": (
                          human_fields_filled["human_exact_quote_selected"]
                          and human_fields_filled["human_extraction_decision"]
                      ),
                      "readiness_scope": "readiness_check_only_no_value_approval_no_scoring",
                      "parameter_value_approved_now": False,
                      "numeric_baseline_approved_now": False,
                      "observed_values_loaded": False,
                      "definition_match_confirmed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": TRUTH_BOUNDARY,
                  })

              readiness = pd.DataFrame(readiness_rows)

              updated_gaps = pd.DataFrame([
                  {
                      "gap_id": "OPEN_GAP_001",
                      "gap": "Parameter-value extraction worksheet exists, but human extraction is not complete unless all required quote/decision fields are filled.",
                      "status_after_v4_335": readiness_status,
                      "blocks": "parameter_value_approval",
                  },
                  {
                      "gap_id": "OPEN_GAP_002",
                      "gap": "Numeric LCDM baseline remains unapproved.",
                      "status_after_v4_335": "still_blocked",
                      "blocks": "numeric_baseline_approval",
                  },
                  {
                      "gap_id": "OPEN_GAP_003",
                      "gap": "Observed SDSS RSD values remain unloaded.",
                      "status_after_v4_335": "still_blocked",
                      "blocks": "observed_scoring",
                  },
                  {
                      "gap_id": "OPEN_GAP_004",
                      "gap": "Definition matching remains unconfirmed.",
                      "status_after_v4_335": "still_blocked",
                      "blocks": "score_valid",
                  },
                  {
                      "gap_id": "OPEN_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_335": "still_blocked",
                      "blocks": "support_allowed",
                  },
              ])

              hard_checks = {
                  "input_v4_334_summary_found": summary334.get("version") == "v4.334",
                  "input_v4_334_rules_29_of_29": summary334.get("rules_passed") == 29 and summary334.get("rules_total") == 29,
                  "input_v4_334_failed_gates_none": summary334.get("failed_gates") == "none",
                  "input_v4_334_no_parameter_approval": summary334.get("parameter_values_approved") is False,
                  "input_v4_334_no_numeric_baseline_approval": summary334.get("numeric_baseline_values_filled") is False and summary334.get("approved_baseline_values") == 0,
                  "input_v4_334_no_observed_values_loaded": summary334.get("observed_values_loaded") is False,
                  "input_v4_334_no_definition_match_confirmed": summary334.get("definition_match_confirmed") is False,
                  "input_v4_334_no_score_valid": summary334.get("score_valid") is False,
                  "input_v4_334_no_support_allowed": summary334.get("support_allowed") is False,

                  "worksheet_rows_equal_6": len(worksheet) == 6,
                  "gap_status_rows_equal_5": len(gap_status) == 5,
                  "rules334_all_passed": rules334["passed"].astype(bool).all(),
                  "readiness_rows_equal_6": len(readiness) == 6,

                  "parameter_value_approved_false": false_col(readiness, "parameter_value_approved_now"),
                  "numeric_baseline_approved_false": false_col(readiness, "numeric_baseline_approved_now"),
                  "observed_values_loaded_false": false_col(readiness, "observed_values_loaded"),
                  "definition_match_confirmed_false": false_col(readiness, "definition_match_confirmed"),
                  "score_valid_false": false_col(readiness, "score_valid"),
                  "support_allowed_false": false_col(readiness, "support_allowed"),

                  "open_gaps_preserved": len(open_gaps) >= 7,
                  "blocked_gates_preserved": len(blocked_gates) >= 6,
                  "ruled_out_preserved": len(ruled_out) >= 5,
                  "updated_gap_rows_equal_5": len(updated_gaps) == 5,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary335 = {
                  "version": "v4.335",
                  "route_name": "v4_335_extraction_readiness_check_no_value_approval_no_scoring",
                  "expected_result": "v4_335_extraction_readiness_check_no_value_approval_no_scoring_passed_no_claims",
                  "input_version": "v4.334",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "worksheet_rows": int(len(worksheet)),
                  "readiness_rows": int(len(readiness)),
                  "readiness_status": readiness_status,
                  "human_exact_quote_filled_rows": int(exact_quote_filled),
                  "human_value_text_filled_rows": int(value_text_filled),
                  "human_numeric_value_filled_rows": int(numeric_value_filled),
                  "human_extraction_decision_filled_rows": int(extraction_decision_filled),
                  "extraction_completed_rows": 0,
                  "parameter_values_approved": False,
                  "numeric_baseline_values_filled": False,
                  "approved_baseline_values": 0,
                  "observed_values_loaded": False,
                  "definition_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": TRUTH_BOUNDARY,
                  "selected_next_route": selected_next_route,
              }

              readiness.to_csv(outdir / "v4_335_extraction_readiness_status_no_value_approval_no_scoring.csv", index=False)
              updated_gaps.to_csv(outdir / "v4_335_updated_open_gap_status_no_scoring.csv", index=False)
              worksheet.to_csv(outdir / "v4_335_input_v4_334_extraction_worksheet_preserved.csv", index=False)
              open_gaps.to_csv(outdir / "v4_335_input_open_gaps_preserved.csv", index=False)
              blocked_gates.to_csv(outdir / "v4_335_input_blocked_gates_preserved.csv", index=False)
              ruled_out.to_csv(outdir / "v4_335_input_ruled_out_claims_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_335_rule_checks.csv", index=False)

              (outdir / "v4_335_summary.json").write_text(json.dumps(summary335, indent=2))

              summary_md = f"""# TAIRID v4.335 Extraction Readiness Check — No Scoring

          Expected result: `{summary335["expected_result"]}`

          {summary335["rules_passed"]} / {summary335["rules_total"]} rules passed

          failed_gates = {summary335["failed_gates"]}

          readiness_status = `{readiness_status}`

          human_exact_quote_filled_rows = {exact_quote_filled}

          human_value_text_filled_rows = {value_text_filled}

          human_numeric_value_filled_rows = {numeric_value_filled}

          human_extraction_decision_filled_rows = {extraction_decision_filled}

          Truth boundary: {TRUTH_BOUNDARY}.

          This step checks whether the v4.334 human extraction worksheet is ready for later ingest.

          It does **not** approve parameter values.

          It does **not** approve a numeric baseline.

          It does **not** load observed SDSS RSD values.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{selected_next_route}`
          """
              (outdir / "v4_335_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary335, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_335_extraction_readiness_check_no_scoring.py

      - name: Run v4.335 extraction readiness check no scoring
        run: |
          python run_v4_335_extraction_readiness_check_no_scoring.py

      - name: Upload v4.335 extraction readiness check artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-335-extraction-readiness-check-no-scoring-output
          path: |
            tairid_v4_335_extraction_readiness_check_no_scoring_output/
            tairid_v4_335_extraction_readiness_check_no_scoring_output.zip
