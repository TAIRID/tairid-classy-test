name: 000 TAIRID v4.206 - G1 ETDD70 Public Source Acquisition Manifest With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-206-g1-etdd70-public-source-acquisition-manifest-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"
      - "data/public_sources/**"

permissions:
  contents: read

jobs:
  v4-206-g1-etdd70-public-source-acquisition:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.206 G1 ETDD70 public source acquisition manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_206_outputs
          cat > tairid_v4_206_outputs/run_v4_206.py <<'PY'
          import csv
          import json
          import re
          import time
          import urllib.request
          import urllib.error
          from pathlib import Path

          OUT = Path("tairid_v4_206_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "g1_etdd70_public_source_acquisition_manifest_passed_source_manifest_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no dyslexia validation",
              "no clinical diagnosis claim",
              "no claim that ETDD70 proves TAIRID",
              "no raw numbers moved between domains",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "source acquisition is not validation",
              "metadata discovery is not subject-axis parsing",
              "TAIRID not proved"
          ]

          V4_205_STATUS = {
              "version": "v4.205",
              "rule_pass_count": 11,
              "rule_total_count": 11,
              "failed_gates": [],
              "files_scanned": 0,
              "candidate_match_rows": 0,
              "ready_candidate_count": 0,
              "missing_candidate_count": 4,
              "target_templates_written": 4,
              "package_status": "real_numeric_source_locator_written_no_validation",
              "selected_next_route": "upload_real_numeric_tables_or_fill_templates_with_scope_guards"
          }

          SOURCES = [
              {
                  "source_id": "ETDD70_Zenodo_13332134",
                  "gap_id": "G1",
                  "lane": "Dyslexia",
                  "record_api_url": "https://zenodo.org/api/records/13332134",
                  "record_page_url": "https://zenodo.org/records/13332134",
                  "expected_dataset": "ETDD70 Eye-Tracking Dyslexia Dataset",
                  "target_canonical_file": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "purpose": "public-source acquisition route for dyslexia subject/group axis rows",
                  "claim_boundary": "source metadata only until files are downloaded and parsed"
              }
          ]

          TARGET_SCHEMA = [
              {
                  "target_file": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "lane": "Dyslexia",
                  "needed_columns": "lane;subject_id;group_or_condition;boundary_or_task;propagation_reach_value;pacing_access_value;consolidation_growth_value;viability_or_outcome_value;source_or_dataset;notes",
                  "axis_mapping_plan": "propagation=s_A or scan/scale expansion; pacing=lambda_R or timing/load; consolidation=rho_R or re-entry/accuracy; viability=V_data or reading outcome",
                  "minimum_preview_rows": 4,
                  "truth_boundary": "subject/group axis rows required before covariance or correlation"
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def fetch_json(url, timeout=30):
              req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.206-source-manifest/1.0"})
              try:
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read()
                      return json.loads(data.decode("utf-8")), "ok", ""
              except Exception as exc:
                  return {}, "fetch_failed", type(exc).__name__ + ": " + str(exc)[:300]

          def classify_file(name, size):
              lower = name.lower()
              if any(x in lower for x in ["readme", "metadata", "participant", "questionnaire", "subject"]):
                  role = "metadata_or_subject_index_candidate"
              elif any(x in lower for x in ["fixation", "saccade", "gaze", "eye", "raw", "recording"]):
                  role = "eye_tracking_measure_candidate"
              elif any(lower.endswith(ext) for ext in [".csv", ".tsv", ".xlsx", ".json"]):
                  role = "tabular_candidate"
              elif any(lower.endswith(ext) for ext in [".zip", ".7z", ".tar", ".gz"]):
                  role = "archive_candidate"
              else:
                  role = "unknown_candidate"

              if size is None:
                  size_class = "unknown_size"
              elif size < 5_000_000:
                  size_class = "small"
              elif size < 100_000_000:
                  size_class = "medium"
              else:
                  size_class = "large"

              return role, size_class

          source_rows = []
          file_rows = []
          acquisition_rows = []
          fetch_ok_count = 0
          file_count = 0

          for source in SOURCES:
              record, status, error = fetch_json(source["record_api_url"])
              if status == "ok":
                  fetch_ok_count += 1
              metadata = record.get("metadata", {}) if record else {}
              files = record.get("files", []) if record else []
              file_count += len(files)

              source_rows.append({
                  "source_id": source["source_id"],
                  "gap_id": source["gap_id"],
                  "lane": source["lane"],
                  "record_api_url": source["record_api_url"],
                  "record_page_url": source["record_page_url"],
                  "fetch_status": status,
                  "fetch_error": error,
                  "title": metadata.get("title", ""),
                  "doi": metadata.get("doi", ""),
                  "publication_date": metadata.get("publication_date", ""),
                  "version": metadata.get("version", ""),
                  "file_count": len(files),
                  "target_canonical_file": source["target_canonical_file"],
                  "purpose": source["purpose"],
                  "claim_boundary": source["claim_boundary"]
              })

              for item in files:
                  name = item.get("key", "") or item.get("filename", "")
                  size = item.get("size")
                  links = item.get("links", {})
                  download_url = links.get("self", "") or links.get("download", "")
                  role, size_class = classify_file(name, size)
                  file_rows.append({
                      "source_id": source["source_id"],
                      "gap_id": source["gap_id"],
                      "file_name": name,
                      "file_size_bytes": size if size is not None else "",
                      "size_class": size_class,
                      "file_role_guess": role,
                      "download_url": download_url,
                      "safe_next_action": "review_or_download_in_next_workflow",
                      "claim_boundary": "file listing only; not parsed data"
                  })

              # Build acquisition route from file listing.
              if status == "ok" and files:
                  acquisition_status = "metadata_fetched_files_listed"
                  selected_next = "etdd70_file_download_and_structure_probe_with_scope_guards"
              elif status == "ok" and not files:
                  acquisition_status = "metadata_fetched_no_files_listed"
                  selected_next = "etdd70_source_record_manual_review_with_scope_guards"
              else:
                  acquisition_status = "metadata_fetch_failed"
                  selected_next = "etdd70_source_url_or_network_retry_with_scope_guards"

              acquisition_rows.append({
                  "source_id": source["source_id"],
                  "gap_id": source["gap_id"],
                  "lane": source["lane"],
                  "acquisition_status": acquisition_status,
                  "selected_next": selected_next,
                  "target_canonical_file": source["target_canonical_file"],
                  "truth_boundary": "acquisition manifest only; no subject-axis parsing yet"
              })

          # Candidate download plan: choose metadata/small/tabular first; archives later.
          ranked_files = []
          for row in file_rows:
              score = 0
              if row["size_class"] == "small":
                  score += 4
              elif row["size_class"] == "medium":
                  score += 2
              elif row["size_class"] == "large":
                  score -= 2
              if "metadata" in row["file_role_guess"]:
                  score += 5
              if "tabular" in row["file_role_guess"]:
                  score += 4
              if "eye_tracking" in row["file_role_guess"]:
                  score += 2
              if "archive" in row["file_role_guess"]:
                  score += 1
              ranked = dict(row)
              ranked["download_priority_score_not_validation"] = score
              ranked_files.append(ranked)
          ranked_files.sort(key=lambda r: (-r["download_priority_score_not_validation"], str(r["file_name"])))

          write_csv(OUT / "v4_206_v4_205_status_review.csv", [V4_205_STATUS], list(V4_205_STATUS.keys()))
          (OUT / "v4_206_v4_205_status_review.json").write_text(json.dumps(V4_205_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_206_public_source_manifest.csv", source_rows, [
              "source_id", "gap_id", "lane", "record_api_url", "record_page_url",
              "fetch_status", "fetch_error", "title", "doi", "publication_date",
              "version", "file_count", "target_canonical_file", "purpose", "claim_boundary"
          ])
          write_csv(OUT / "v4_206_public_source_file_inventory.csv", file_rows, [
              "source_id", "gap_id", "file_name", "file_size_bytes", "size_class",
              "file_role_guess", "download_url", "safe_next_action", "claim_boundary"
          ])
          write_csv(OUT / "v4_206_ranked_download_plan.csv", ranked_files, [
              "source_id", "gap_id", "file_name", "file_size_bytes", "size_class",
              "file_role_guess", "download_url", "download_priority_score_not_validation",
              "safe_next_action", "claim_boundary"
          ])
          write_csv(OUT / "v4_206_acquisition_route_decisions.csv", acquisition_rows, [
              "source_id", "gap_id", "lane", "acquisition_status",
              "selected_next", "target_canonical_file", "truth_boundary"
          ])
          write_csv(OUT / "v4_206_target_axis_schema.csv", TARGET_SCHEMA, [
              "target_file", "lane", "needed_columns", "axis_mapping_plan",
              "minimum_preview_rows", "truth_boundary"
          ])

          claim_rows = [
              {
                  "claim": "Fetching ETDD70 metadata validates the dyslexia lane.",
                  "status": "blocked",
                  "safe_wording": "Metadata fetch only confirms a source route exists.",
                  "forbidden_wording": "The source proves TAIRID or dyslexia geometry."
              },
              {
                  "claim": "A file listing is parsed subject data.",
                  "status": "blocked",
                  "safe_wording": "A file listing only tells us what can be downloaded next.",
                  "forbidden_wording": "The file listing closes G1."
              },
              {
                  "claim": "Next step is file download and structure probe if files are listed.",
                  "status": "allowed",
                  "safe_wording": "If files are listed, the next workflow can download and inspect structure under size guards.",
                  "forbidden_wording": "We already have usable subject-axis rows."
              }
          ]
          write_csv(OUT / "v4_206_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          if fetch_ok_count and file_count:
              selected_next_route = "etdd70_file_download_and_structure_probe_with_scope_guards"
              package_status = "etdd70_metadata_fetched_files_listed_no_parsing"
          elif fetch_ok_count:
              selected_next_route = "etdd70_source_record_manual_review_with_scope_guards"
              package_status = "etdd70_metadata_fetched_no_files_listed"
          else:
              selected_next_route = "etdd70_source_url_or_network_retry_with_scope_guards"
              package_status = "etdd70_metadata_fetch_failed_manifest_written"

          route_decision = {
              "version": "v4.206",
              "result_label": RESULT_LABEL,
              "clean_result": "The workflow creates a public-source acquisition manifest for the G1 dyslexia half of the dyslexia/aphantasia gap by querying the ETDD70 Zenodo record when network access is available.",
              "sources_checked": len(SOURCES),
              "metadata_fetch_ok_count": fetch_ok_count,
              "source_file_count": file_count,
              "ranked_download_rows": len(ranked_files),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "public source acquisition manifest only; not subject-axis parsing, not covariance, not validation",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_206_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_206_scope_guards.json").write_text(json.dumps({
              "scope": "G1 ETDD70 public source acquisition manifest",
              "metadata_fetch_is_validation": False,
              "file_listing_is_subject_axis_data": False,
              "source_acquisition_closes_covariance_gap": False,
              "raw_numbers_moved_between_domains": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_206_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.206 - G1 ETDD70 Public Source Acquisition Manifest",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.205 found no numeric source files inside the repo. v4.206 starts public-source acquisition for G1 by querying the ETDD70 Zenodo record and writing a ranked download plan if files are listed.",
              "",
              "Sources checked: `" + str(len(SOURCES)) + "`",
              "Metadata fetch OK count: `" + str(fetch_ok_count) + "`",
              "Source file count: `" + str(file_count) + "`",
              "Ranked download rows: `" + str(len(ranked_files)) + "`",
              "",
              "Package status: `" + package_status + "`",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_206_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_206_v4_205_status_review.csv",
              "v4_206_v4_205_status_review.json",
              "v4_206_public_source_manifest.csv",
              "v4_206_public_source_file_inventory.csv",
              "v4_206_ranked_download_plan.csv",
              "v4_206_acquisition_route_decisions.csv",
              "v4_206_target_axis_schema.csv",
              "v4_206_claim_boundary_matrix.csv",
              "v4_206_route_decision.json",
              "v4_206_scope_guards.json",
              "v4_206_blocked_claims.json",
              "v4_206_summary.md"
          ]

          rules = {
              "version_is_v4_206": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_205_status_reviewed": V4_205_STATUS["rule_pass_count"] == 11,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "source_manifest_written": (OUT / "v4_206_public_source_manifest.csv").exists(),
              "ranked_download_plan_written": (OUT / "v4_206_ranked_download_plan.csv").exists(),
              "target_schema_written": (OUT / "v4_206_target_axis_schema.csv").exists(),
              "selected_route_present": bool(selected_next_route),
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.206",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "sources_checked": len(SOURCES),
              "metadata_fetch_ok_count": fetch_ok_count,
              "source_file_count": file_count,
              "ranked_download_rows": len(ranked_files),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "public_source_acquisition_manifest_only_no_validation"
          }

          (OUT / "v4_206_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.206 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_206_outputs/run_v4_206.py

      - name: Upload v4.206 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-206-g1-etdd70-public-source-acquisition-manifest-output
          path: tairid_v4_206_outputs/
