name: TAIRID v4.33 RSD Row Mapping Audit

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-33-rsd-row-mapping-audit.yml"

jobs:
  tairid-v4-33-rsd-row-mapping-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.33 RSD row mapping audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_33_rsd_row_mapping_audit

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_33_rsd_row_mapping_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_33_rsd_row_mapping_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run an RSD likelihood.",
              "This does not compute a final RSD pressure score.",
              "This does not import or apply an RSD covariance matrix.",
              "This audits whether candidate products can map to the current f_sigma8 rows.",
              "A pass means row-mapping status is classified, not that covariance-aware testing has been completed."
          ]

          CURRENT_RSD_ROWS = [
              {
                  "row_id": "boss_dr12_z038_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.38,
                  "observable_axis": "f_sigma8",
                  "value": 0.497,
                  "sigma": 0.045,
                  "bao_bundled": True,
                  "current_status": "value_ready_published_summary"
              },
              {
                  "row_id": "boss_dr12_z051_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.51,
                  "observable_axis": "f_sigma8",
                  "value": 0.458,
                  "sigma": 0.038,
                  "bao_bundled": True,
                  "current_status": "value_ready_published_summary"
              },
              {
                  "row_id": "boss_dr12_z061_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.61,
                  "observable_axis": "f_sigma8",
                  "value": 0.436,
                  "sigma": 0.034,
                  "bao_bundled": True,
                  "current_status": "value_ready_published_summary"
              },
              {
                  "row_id": "wigglez_z044_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.44,
                  "observable_axis": "f_sigma8",
                  "value": 0.413,
                  "sigma": 0.080,
                  "bao_bundled": False,
                  "current_status": "value_ready_published_summary_covariance_unresolved"
              },
              {
                  "row_id": "wigglez_z060_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.60,
                  "observable_axis": "f_sigma8",
                  "value": 0.390,
                  "sigma": 0.063,
                  "bao_bundled": False,
                  "current_status": "value_ready_published_summary_covariance_unresolved"
              },
              {
                  "row_id": "wigglez_z073_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.73,
                  "observable_axis": "f_sigma8",
                  "value": 0.437,
                  "sigma": 0.072,
                  "bao_bundled": False,
                  "current_status": "value_ready_published_summary_covariance_unresolved"
              },
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "LRG",
                  "z_eff": 0.70,
                  "observable_axis": "f_sigma8",
                  "value": 0.473,
                  "sigma": 0.041,
                  "bao_bundled": True,
                  "current_status": "value_ready_published_summary_value_reviewed"
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "ELG",
                  "z_eff": 0.85,
                  "observable_axis": "f_sigma8",
                  "value": 0.315,
                  "sigma": 0.095,
                  "bao_bundled": True,
                  "current_status": "value_ready_published_summary_value_reviewed"
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "QSO",
                  "z_eff": 1.48,
                  "observable_axis": "f_sigma8",
                  "value": 0.462,
                  "sigma": 0.045,
                  "bao_bundled": True,
                  "current_status": "value_ready_published_summary_value_reviewed"
              }
          ]

          CANDIDATE_PRODUCTS = [
              {
                  "candidate_id": "sdss_dr16_cosmo_root",
                  "survey_family": "SDSS_BOSS_eBOSS",
                  "candidate_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/",
                  "candidate_kind": "directory_root",
                  "expected_contents": "final SDSS/eBOSS cosmology likelihoods covariance matrices chains or compressed products",
                  "v4_32_mapping_status": "root_found_child_product_selection_needed"
              },
              {
                  "candidate_id": "boss_dr12_consensus_gaussian_constraints",
                  "survey_family": "BOSS_DR12",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/ALAM_ET_AL_2016_consensus_and_individual_Gaussian_constraints.tar.gz",
                  "candidate_kind": "compressed_likelihood_constraints_candidate",
                  "expected_contents": "DR12 consensus and individual Gaussian constraints",
                  "v4_32_mapping_status": "candidate_exact_path_found_row_mapping_needed"
              },
              {
                  "candidate_id": "boss_dr12_corrfunc_fullshape_multipoles",
                  "survey_family": "BOSS_DR12",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Satpathy_etal_2016_COMBINEDDR12_full_shape_corrfunc_multipoles.zip",
                  "candidate_kind": "full_shape_measurement_covariance_candidate",
                  "expected_contents": "correlation function multipoles and covariance matrices",
                  "v4_32_mapping_status": "candidate_exact_path_found_not_same_as_compressed_fsigma8_rows_until_mapped"
              },
              {
                  "candidate_id": "boss_dr12_power_spectrum_fullshape",
                  "survey_family": "BOSS_DR12",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Beutler_etal_DR12COMBINED_fullshape_powspec.tar.gz",
                  "candidate_kind": "full_shape_power_spectrum_candidate",
                  "expected_contents": "Fourier-space multipoles covariance matrices and window functions",
                  "v4_32_mapping_status": "candidate_exact_path_found_not_same_as_compressed_fsigma8_rows_until_mapped"
              },
              {
                  "candidate_id": "boss_dr12_wedges_configuration_space",
                  "survey_family": "BOSS_DR12",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Sanchez_etal_2016a_COMBINEDDR12_fullshape_wedges.tar.gz",
                  "candidate_kind": "full_shape_wedges_candidate",
                  "expected_contents": "configuration-space wedges and covariance matrices",
                  "v4_32_mapping_status": "candidate_exact_path_found_not_same_as_compressed_fsigma8_rows_until_mapped"
              },
              {
                  "candidate_id": "boss_dr12_power_spectrum_wedges",
                  "survey_family": "BOSS_DR12",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/GRIEB_ET_AL_2016_COMBINEDDR12_power_spectrum_wedges.tar.gz",
                  "candidate_kind": "full_shape_wedges_candidate",
                  "expected_contents": "Fourier-space wedges covariance matrices and window functions",
                  "v4_32_mapping_status": "candidate_exact_path_found_not_same_as_compressed_fsigma8_rows_until_mapped"
              },
              {
                  "candidate_id": "boss_dr12_bao_corrfunc_boundary_product",
                  "survey_family": "BOSS_DR12",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Ross_etal_2016_COMBINEDDR12_corrfunc.zip",
                  "candidate_kind": "BAO_boundary_product_candidate",
                  "expected_contents": "BAO correlation-function measurements and covariance matrices",
                  "v4_32_mapping_status": "candidate_exact_path_found_BAO_boundary_not_RSD_growth"
              },
              {
                  "candidate_id": "wigglez_product_unresolved",
                  "survey_family": "WiggleZ",
                  "candidate_url": "",
                  "candidate_kind": "unresolved_product_path",
                  "expected_contents": "WiggleZ covariance for z=0.44,0.60,0.73 f_sigma8 rows",
                  "v4_32_mapping_status": "unresolved_remains_nonfinal_preview_only"
              }
          ]

          ROW_MAPPING_POLICY = [
              {
                  "policy_id": "compressed_fsigma8_requires_compressed_product",
                  "description": "The current RSD rows are compressed f_sigma8 summary rows, so a matching covariance product must map to compressed constraints, not raw full-shape measurements unless a conversion/mapping step is declared.",
                  "hard_requirement": True
              },
              {
                  "policy_id": "full_shape_products_do_not_auto_map",
                  "description": "Full-shape multipoles, wedges, power spectra, and correlation functions do not automatically map to the current compressed f_sigma8 rows.",
                  "hard_requirement": True
              },
              {
                  "policy_id": "bao_boundary_not_growth_mapping",
                  "description": "BAO-only or BAO-dominant products are boundary/ruler products and must not be mapped as growth-pressure covariance.",
                  "hard_requirement": True
              },
              {
                  "policy_id": "directory_root_requires_child_selection",
                  "description": "A directory root is not itself a selected covariance product; child files must be identified before mapping.",
                  "hard_requirement": True
              },
              {
                  "policy_id": "wigglez_unresolved_stays_nonfinal",
                  "description": "WiggleZ remains non-final preview only until a product path and mapping are found.",
                  "hard_requirement": True
              },
              {
                  "policy_id": "no_covariance_or_pressure_in_mapping_audit",
                  "description": "This audit classifies mapping status only and does not import covariance or compute pressure.",
                  "hard_requirement": True
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "An RSD covariance matrix was imported.",
              "A candidate product automatically maps to the current f_sigma8 rows.",
              "Full-shape products are identical to compressed f_sigma8 rows without mapping.",
              "BAO products are growth-pressure products.",
              "A directory root is an already-selected covariance matrix.",
              "WiggleZ is covariance-ready without a product path.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_34_BOSS_DR12_consensus_package_inspection",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Inspect the BOSS DR12 consensus Gaussian constraints package contents and determine whether it contains compressed f_sigma8 rows/covariance that can map to the current BOSS rows.",
                  "must_include": "package contents, row labels, covariance files if present, BAO/RSD boundary, no pressure score.",
                  "must_not_include": "covariance-aware pressure claim, likelihood refit, validation claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_35_SDSS_DR16_child_product_selection",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Inspect or list SDSS DR16 final cosmology directory children and identify candidate eBOSS covariance/likelihood products.",
                  "must_include": "child product paths, tracer labels, row mapping status, published-summary boundary.",
                  "must_not_include": "final pressure score or direct chain claim without parsing."
              },
              {
                  "priority": 3,
                  "next_test": "v4_36_RSD_reference_uncertainty_boundary_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Define how reference-model uncertainty would need to enter before stronger RSD comparison.",
                  "must_include": "reference parameter uncertainty, Planck-chain boundary, growth curve uncertainty.",
                  "must_not_include": "treating approximate reference curve as full posterior."
              }
          ]

          def classify_mapping(candidate):
              cid = candidate["candidate_id"]
              kind = candidate["candidate_kind"]

              if cid == "boss_dr12_consensus_gaussian_constraints":
                  return {
                      "mapping_class": "possible_compressed_constraint_match_needs_package_inspection",
                      "maps_to_current_rows_now": False,
                      "recommended_next_action": "inspect_package_contents",
                      "reason": "This is the most plausible BOSS compressed constraint candidate, but row labels and covariance structure must be inspected first."
                  }

              if candidate["survey_family"] == "BOSS_DR12" and "full_shape" in kind:
                  return {
                      "mapping_class": "full_shape_product_not_current_compressed_row_mapping",
                      "maps_to_current_rows_now": False,
                      "recommended_next_action": "park_for_possible_later_full_shape_lane",
                      "reason": "Full-shape products may be useful later but do not automatically map to compressed f_sigma8 rows."
                  }

              if "BAO_boundary" in kind:
                  return {
                      "mapping_class": "BAO_boundary_product_not_RSD_growth_mapping",
                      "maps_to_current_rows_now": False,
                      "recommended_next_action": "keep_as_BAO_boundary_product",
                      "reason": "BAO products stay ruler/boundary products, not growth-pressure covariance."
                  }

              if cid == "sdss_dr16_cosmo_root":
                  return {
                      "mapping_class": "directory_root_child_selection_needed",
                      "maps_to_current_rows_now": False,
                      "recommended_next_action": "inspect_directory_children",
                      "reason": "The root may contain relevant eBOSS products, but child files must be selected before mapping."
                  }

              if candidate["survey_family"] == "WiggleZ":
                  return {
                      "mapping_class": "unresolved_no_product_path",
                      "maps_to_current_rows_now": False,
                      "recommended_next_action": "keep_nonfinal_until_product_found",
                      "reason": "WiggleZ covariance/product path is still unresolved."
                  }

              return {
                  "mapping_class": "manual_review_needed",
                  "maps_to_current_rows_now": False,
                  "recommended_next_action": "manual_product_review",
                  "reason": "No safe automatic mapping is available."
              }

          failed_gates = []
          warnings = []

          mapping_rows = []
          for candidate in CANDIDATE_PRODUCTS:
              classification = classify_mapping(candidate)
              mapping_rows.append({
                  "candidate_id": candidate["candidate_id"],
                  "survey_family": candidate["survey_family"],
                  "candidate_kind": candidate["candidate_kind"],
                  "candidate_url": candidate["candidate_url"],
                  "v4_32_mapping_status": candidate["v4_32_mapping_status"],
                  "mapping_class": classification["mapping_class"],
                  "maps_to_current_rows_now": classification["maps_to_current_rows_now"],
                  "recommended_next_action": classification["recommended_next_action"],
                  "reason": classification["reason"],
                  "covariance_imported_now": False,
                  "pressure_score_allowed_now": False,
                  "validation_claim_allowed": False
              })

          boss_current_rows = [row for row in CURRENT_RSD_ROWS if row["survey_family"] == "BOSS_DR12"]
          wigglez_current_rows = [row for row in CURRENT_RSD_ROWS if row["survey_family"] == "WiggleZ"]
          eboss_current_rows = [row for row in CURRENT_RSD_ROWS if row["survey_family"] == "eBOSS_DR16"]

          possible_boss_match = [
              row for row in mapping_rows
              if row["candidate_id"] == "boss_dr12_consensus_gaussian_constraints"
              and row["mapping_class"] == "possible_compressed_constraint_match_needs_package_inspection"
          ]

          unsafe_auto_maps = [
              row for row in mapping_rows
              if row["maps_to_current_rows_now"] is True
          ]

          if unsafe_auto_maps:
              failed_gates.append("candidate_mapped_to_current_rows_without_inspection")

          if not possible_boss_match:
              failed_gates.append("boss_consensus_package_not_identified_as_next_inspection_candidate")

          if not any(row["mapping_class"] == "directory_root_child_selection_needed" for row in mapping_rows):
              failed_gates.append("sdss_dr16_root_not_marked_child_selection_needed")

          if not any(row["mapping_class"] == "unresolved_no_product_path" for row in mapping_rows):
              failed_gates.append("wigglez_unresolved_mapping_status_missing")

          if not any(row["mapping_class"] == "BAO_boundary_product_not_RSD_growth_mapping" for row in mapping_rows):
              failed_gates.append("BAO_boundary_product_not_preserved")

          for row in mapping_rows:
              if row["covariance_imported_now"] is not False:
                  failed_gates.append(row["candidate_id"] + "_covariance_imported_violation")
              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append(row["candidate_id"] + "_pressure_score_allowed_violation")
              if row["validation_claim_allowed"] is not False:
                  failed_gates.append(row["candidate_id"] + "_validation_claim_allowed_violation")

          needed_policy_ids = {
              "compressed_fsigma8_requires_compressed_product",
              "full_shape_products_do_not_auto_map",
              "bao_boundary_not_growth_mapping",
              "directory_root_requires_child_selection",
              "wigglez_unresolved_stays_nonfinal",
              "no_covariance_or_pressure_in_mapping_audit"
          }

          present_policy_ids = {row["policy_id"] for row in ROW_MAPPING_POLICY if row["hard_requirement"] is True}
          missing_policy_ids = sorted(needed_policy_ids - present_policy_ids)

          for policy_id in missing_policy_ids:
              failed_gates.append("missing_policy_" + policy_id)

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "covariance matrix was imported",
              "automatically maps",
              "full-shape products",
              "bao products",
              "directory root",
              "wigglez",
              "likelihood"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          warnings.append("row_mapping_audit_does_not_import_covariance")
          warnings.append("no_candidate_maps_to_current_rows_without_inspection")
          warnings.append("BOSS_consensus_package_is_best_next_inspection_candidate")
          warnings.append("SDSS_DR16_root_requires_child_product_selection")
          warnings.append("WiggleZ_remains_unresolved")
          warnings.append("full_shape_products_parked_until_separate_mapping")
          warnings.append("v4_29_RSD_preview_remains_nonfinal")

          rule_results = [
              {
                  "rule_id": "no_candidate_auto_maps",
                  "pass": len(unsafe_auto_maps) == 0,
                  "result": "no_candidate_maps_without_inspection",
                  "boundary": "Candidate products do not automatically map to current f_sigma8 rows."
              },
              {
                  "rule_id": "BOSS_consensus_package_selected_for_inspection",
                  "pass": len(possible_boss_match) == 1,
                  "result": "BOSS_consensus_package_is_next_best_candidate",
                  "boundary": "Inspection is needed before covariance use."
              },
              {
                  "rule_id": "full_shape_products_parked",
                  "pass": all(
                      row["mapping_class"] != "full_shape_product_not_current_compressed_row_mapping"
                      or row["recommended_next_action"] == "park_for_possible_later_full_shape_lane"
                      for row in mapping_rows
                  ),
                  "result": "full_shape_products_not_mapped_to_compressed_rows",
                  "boundary": "Full-shape products are separate lanes unless mapped."
              },
              {
                  "rule_id": "BAO_boundary_product_preserved",
                  "pass": any(row["mapping_class"] == "BAO_boundary_product_not_RSD_growth_mapping" for row in mapping_rows),
                  "result": "BAO_product_kept_as_boundary",
                  "boundary": "BAO does not become growth covariance."
              },
              {
                  "rule_id": "SDSS_DR16_root_requires_child_selection",
                  "pass": any(row["mapping_class"] == "directory_root_child_selection_needed" for row in mapping_rows),
                  "result": "SDSS_DR16_root_not_treated_as_product",
                  "boundary": "Directory root is not an applied covariance product."
              },
              {
                  "rule_id": "WiggleZ_unresolved_preserved",
                  "pass": any(row["mapping_class"] == "unresolved_no_product_path" for row in mapping_rows),
                  "result": "WiggleZ_remains_nonfinal_preview_only",
                  "boundary": "WiggleZ cannot be covariance-ready yet."
              },
              {
                  "rule_id": "no_covariance_or_pressure_now",
                  "pass": all(
                      row["covariance_imported_now"] is False
                      and row["pressure_score_allowed_now"] is False
                      and row["validation_claim_allowed"] is False
                      for row in mapping_rows
                  ),
                  "result": "no_covariance_pressure_or_validation_in_mapping_audit",
                  "boundary": "v4.33 is mapping only."
              },
              {
                  "rule_id": "mapping_policy_complete",
                  "pass": len(missing_policy_ids) == 0,
                  "result": "all_mapping_policies_present",
                  "boundary": "Compressed rows, full-shape products, BAO products, roots, and WiggleZ are separated."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_row_mapping_rules_passed")

          if failed_gates:
              readiness_label = "rsd_row_mapping_audit_failed"
              next_step = "Repair row mapping policy before inspecting product package contents."
          else:
              readiness_label = "rsd_row_mapping_audit_passed_ready_for_BOSS_consensus_package_inspection"
              next_step = (
                  "Proceed to v4.34 BOSS DR12 consensus package inspection. "
                  "Do not import covariance for pressure yet; first inspect package contents and determine whether row labels/covariance map to current BOSS f_sigma8 rows."
              )

          system_health = {
              "current_rsd_row_count": len(CURRENT_RSD_ROWS),
              "boss_current_row_count": len(boss_current_rows),
              "wigglez_current_row_count": len(wigglez_current_rows),
              "eboss_current_row_count": len(eboss_current_rows),
              "candidate_product_count": len(CANDIDATE_PRODUCTS),
              "mapping_row_count": len(mapping_rows),
              "auto_mapped_candidate_count": len(unsafe_auto_maps),
              "possible_boss_consensus_match_count": len(possible_boss_match),
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "covariance_imported": False,
              "row_mapping_complete": False,
              "pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "next_candidate_for_inspection": "boss_dr12_consensus_gaussian_constraints"
          }

          interpretation = (
              "v4.33 audits row mapping between the current nine RSD f_sigma8 rows and the candidate covariance/product paths from v4.32. "
              "No candidate is allowed to auto-map to the current rows. "
              "The BOSS DR12 consensus Gaussian constraints package is selected as the best next inspection candidate because it is the most plausible compressed-constraint product. "
              "Full-shape products are parked unless a separate mapping is built. "
              "The SDSS DR16 root needs child product selection, and WiggleZ remains unresolved."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "current_rsd_rows": CURRENT_RSD_ROWS,
              "candidate_products": CANDIDATE_PRODUCTS,
              "mapping_rows": mapping_rows,
              "row_mapping_policy": ROW_MAPPING_POLICY,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_final_pressure_score_built": False,
                  "covariance_imported": False,
                  "row_mapping_complete": False,
                  "likelihood_run": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "current_rsd_rows_v4_33.csv",
              CURRENT_RSD_ROWS,
              [
                  "row_id",
                  "survey_family",
                  "tracer_or_sample",
                  "z_eff",
                  "observable_axis",
                  "value",
                  "sigma",
                  "bao_bundled",
                  "current_status"
              ]
          )

          write_csv(
              OUTDIR / "row_mapping_candidates_v4_33.csv",
              mapping_rows,
              [
                  "candidate_id",
                  "survey_family",
                  "candidate_kind",
                  "candidate_url",
                  "v4_32_mapping_status",
                  "mapping_class",
                  "maps_to_current_rows_now",
                  "recommended_next_action",
                  "reason",
                  "covariance_imported_now",
                  "pressure_score_allowed_now",
                  "validation_claim_allowed"
              ]
          )

          write_csv(
              OUTDIR / "row_mapping_policy_v4_33.csv",
              ROW_MAPPING_POLICY,
              ["policy_id", "description", "hard_requirement"]
          )

          write_csv(
              OUTDIR / "row_mapping_rule_results_v4_33.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_33.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_33.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_33.csv",
              [system_health],
              [
                  "current_rsd_row_count",
                  "boss_current_row_count",
                  "wigglez_current_row_count",
                  "eboss_current_row_count",
                  "candidate_product_count",
                  "mapping_row_count",
                  "auto_mapped_candidate_count",
                  "possible_boss_consensus_match_count",
                  "rule_pass_count",
                  "rule_total_count",
                  "covariance_imported",
                  "row_mapping_complete",
                  "pressure_score_allowed_now",
                  "validation_claim_allowed",
                  "next_candidate_for_inspection"
              ]
          )

          json_path = OUTDIR / "tairid_v4_33_rsd_row_mapping_audit.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.33 — RSD Row Mapping Audit")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("Candidate covariance/product paths were checked against the current nine RSD f_sigma8 rows.")
          md.append("")
          md.append("No product is allowed to auto-map yet. The BOSS DR12 consensus Gaussian constraints package is the best next inspection candidate.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Mapping candidates")
          md.append("")
          md.append("| Candidate | Survey | Mapping class | Maps now | Next action |")
          md.append("|---|---|---|---:|---|")
          for row in mapping_rows:
              md.append(
                  f"| `{row['candidate_id']}` | `{row['survey_family']}` | `{row['mapping_class']}` | "
                  f"`{row['maps_to_current_rows_now']}` | `{row['recommended_next_action']}` |"
              )
          md.append("")
          md.append("## Rule results")
          md.append("")
          md.append("| Rule | Pass | Result | Boundary |")
          md.append("|---|---:|---|---|")
          for row in rule_results:
              md.append(f"| `{row['rule_id']}` | `{row['pass']}` | `{row['result']}` | {row['boundary']} |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `current_rsd_rows_v4_33.csv`")
          md.append("- `row_mapping_candidates_v4_33.csv`")
          md.append("- `row_mapping_policy_v4_33.csv`")
          md.append("- `row_mapping_rule_results_v4_33.csv`")
          md.append("- `blocked_claims_v4_33.csv`")
          md.append("- `next_test_ladder_v4_33.csv`")
          md.append("- `system_health_v4_33.csv`")
          md.append("- `tairid_v4_33_rsd_row_mapping_audit.json`")
          md.append("- `tairid_v4_33_rsd_row_mapping_audit.md`")
          md.append("")

          md_path = OUTDIR / "tairid_v4_33_rsd_row_mapping_audit.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.33 RSD row mapping audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-33-rsd-row-mapping-audit
          path: artifacts/tairid_v4_33_rsd_row_mapping_audit/
