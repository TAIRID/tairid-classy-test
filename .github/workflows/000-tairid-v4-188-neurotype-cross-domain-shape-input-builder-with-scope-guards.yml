name: 000 TAIRID v4.188 - Neurotype Cross Domain Shape Input Builder With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-188-neurotype-cross-domain-shape-input-builder-with-scope-guards.yml"
      - "data/cross_domain/**"
      - "data/neurotype/**"

permissions:
  contents: read

jobs:
  v4-188-neurotype-cross-domain-shape-input-builder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.188 neurotype cross-domain shape input builder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_188_outputs
          cat > tairid_v4_188_outputs/run_v4_188.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_188_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "neurotype_cross_domain_shape_input_builder_passed_seed_shape_matrix_written_no_empirical_validation"

          BLOCKED_CLAIMS = [
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "seed shape matrix only unless empirical input is supplied",
              "TAIRID not proved"
          ]

          COSMOLOGY_SIGNATURES = {
              "++-": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low",
              "-+-": "LRGxELG_z0p845_like_reach_low_pacing_high_growth_low",
              "-++": "QSO_z1p48_like_reach_low_pacing_high_growth_high"
          }

          # These are TAIRID-theory seed rows, not empirical proof rows.
          # They are used to test whether the shape-language can be made explicit enough
          # to later compare against data.
          SEEDED_NEUROTYPE_ROWS = [
              {
                  "domain": "neurotype_cognition",
                  "case_id": "ADHD_width_over_depth_seed",
                  "boundary_or_group": "novelty/task-switch demand",
                  "propagation_reach_value": "",
                  "pacing_access_value": "",
                  "consolidation_growth_value": "",
                  "reference_or_expected_propagation": "",
                  "reference_or_expected_pacing": "",
                  "reference_or_expected_consolidation": "",
                  "propagation_direction": "+",
                  "pacing_direction": "+",
                  "consolidation_direction": "-",
                  "notes": "theory seed: broad reach and high update pressure with weaker depth/consolidation under sustained task constraint",
                  "source_or_dataset": "TAIRID ADHD width-over-depth paper lane; empirical dataset not yet attached"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "autism_local_depth_update_cost_seed",
                  "boundary_or_group": "social/sensory update boundary",
                  "propagation_reach_value": "",
                  "pacing_access_value": "",
                  "consolidation_growth_value": "",
                  "reference_or_expected_propagation": "",
                  "reference_or_expected_pacing": "",
                  "reference_or_expected_consolidation": "",
                  "propagation_direction": "-",
                  "pacing_direction": "-",
                  "consolidation_direction": "+",
                  "notes": "theory seed: lower outward social/update reach under mismatch, high local consolidation/depth; expected to be a useful mismatch against cosmology signatures",
                  "source_or_dataset": "TAIRID autism reference-field organization lane; empirical dataset not yet attached"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "dyslexia_rerouting_timing_seed",
                  "boundary_or_group": "standard text-decoding timing boundary",
                  "propagation_reach_value": "",
                  "pacing_access_value": "",
                  "consolidation_growth_value": "",
                  "reference_or_expected_propagation": "",
                  "reference_or_expected_pacing": "",
                  "reference_or_expected_consolidation": "",
                  "propagation_direction": "+",
                  "pacing_direction": "-",
                  "consolidation_direction": "-",
                  "notes": "theory seed: alternate-route propagation but timing/access drag under text boundary; consolidation looks low under standard decoding measures",
                  "source_or_dataset": "ETDD70/dyslexia lane; empirical summary not yet attached"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "aphantasia_nonvisual_reconstruction_seed",
                  "boundary_or_group": "visual imagery demand boundary",
                  "propagation_reach_value": "",
                  "pacing_access_value": "",
                  "consolidation_growth_value": "",
                  "reference_or_expected_propagation": "",
                  "reference_or_expected_pacing": "",
                  "reference_or_expected_consolidation": "",
                  "propagation_direction": "-",
                  "pacing_direction": "+",
                  "consolidation_direction": "+",
                  "notes": "theory seed: visual reach low, but nonvisual reconstruction can preserve pacing/access and stable conceptual consolidation",
                  "source_or_dataset": "TAIRID aphantasia reconstruction geometry lane; empirical summary not yet attached"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "bipolar_mania_phase_seed",
                  "boundary_or_group": "mania/hypomania propagation phase",
                  "propagation_reach_value": "",
                  "pacing_access_value": "",
                  "consolidation_growth_value": "",
                  "reference_or_expected_propagation": "",
                  "reference_or_expected_pacing": "",
                  "reference_or_expected_consolidation": "",
                  "propagation_direction": "+",
                  "pacing_direction": "+",
                  "consolidation_direction": "-",
                  "notes": "theory seed: propagation and pacing rise faster than consolidation can stabilize",
                  "source_or_dataset": "TAIRID bipolar phase-cycling lane; empirical summary not yet attached"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "bipolar_depression_phase_seed",
                  "boundary_or_group": "depression consolidation-heavy phase",
                  "propagation_reach_value": "",
                  "pacing_access_value": "",
                  "consolidation_growth_value": "",
                  "reference_or_expected_propagation": "",
                  "reference_or_expected_pacing": "",
                  "reference_or_expected_consolidation": "",
                  "propagation_direction": "-",
                  "pacing_direction": "-",
                  "consolidation_direction": "+",
                  "notes": "theory seed: propagation and update access fall while stuck consolidation/load dominates",
                  "source_or_dataset": "TAIRID bipolar phase-cycling lane; empirical summary not yet attached"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "schizotypy_reference_overreach_seed",
                  "boundary_or_group": "reference-field overreach boundary",
                  "propagation_reach_value": "",
                  "pacing_access_value": "",
                  "consolidation_growth_value": "",
                  "reference_or_expected_propagation": "",
                  "reference_or_expected_pacing": "",
                  "reference_or_expected_consolidation": "",
                  "propagation_direction": "+",
                  "pacing_direction": "+",
                  "consolidation_direction": "-",
                  "notes": "theory seed: high semantic/reference reach with insufficient anchoring/consolidation under overreach",
                  "source_or_dataset": "TAIRID schizotypal reference-field overreach lane; empirical summary not yet attached"
              }
          ]

          INPUT_COLUMNS = [
              "domain",
              "case_id",
              "boundary_or_group",
              "propagation_reach_value",
              "pacing_access_value",
              "consolidation_growth_value",
              "reference_or_expected_propagation",
              "reference_or_expected_pacing",
              "reference_or_expected_consolidation",
              "propagation_direction",
              "pacing_direction",
              "consolidation_direction",
              "notes",
              "source_or_dataset"
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def direction(value, ref):
              try:
                  value = float(value)
                  ref = float(ref)
                  if value > ref:
                      return "+"
                  if value < ref:
                      return "-"
                  return "0"
              except Exception:
                  return ""

          def classify(row):
              p = (row.get("propagation_direction") or direction(row.get("propagation_reach_value"), row.get("reference_or_expected_propagation"))).strip()
              t = (row.get("pacing_direction") or direction(row.get("pacing_access_value"), row.get("reference_or_expected_pacing"))).strip()
              c = (row.get("consolidation_direction") or direction(row.get("consolidation_growth_value"), row.get("reference_or_expected_consolidation"))).strip()
              signature = p + t + c if p and t and c else ""
              family = COSMOLOGY_SIGNATURES.get(signature)
              if not family:
                  if signature:
                      if p == "+" and c == "-":
                          family = "high_reach_low_consolidation_non_cosmology_exact_variant"
                      elif p == "-" and c == "+":
                          family = "low_reach_high_consolidation_non_cosmology_exact_variant"
                      else:
                          family = "other_complete_shape"
                  else:
                      family = "incomplete_shape"
              return p, t, c, signature, family

          def read_empirical_inputs():
              rows = []
              paths = [
                  Path("data/neurotype/neurotype_shape_empirical_input.csv"),
                  Path("data/cross_domain/neurotype_shape_empirical_input.csv"),
                  Path("data/cross_domain/cross_domain_shape_test_input.csv")
              ]
              for path in paths:
                  if path.exists():
                      with open(path, newline="", encoding="utf-8") as f:
                          for row in csv.DictReader(f):
                              row["_source_file"] = str(path)
                              row["_input_kind"] = "empirical_or_user_supplied"
                              rows.append(row)
              return rows

          def classify_rows(rows, input_kind):
              out = []
              for row in rows:
                  p, t, c, signature, family = classify(row)
                  out.append({
                      "input_kind": row.get("_input_kind", input_kind),
                      "source_file": row.get("_source_file", "seeded_by_workflow"),
                      "domain": row.get("domain", ""),
                      "case_id": row.get("case_id", ""),
                      "boundary_or_group": row.get("boundary_or_group", ""),
                      "propagation_direction_resolved": p,
                      "pacing_direction_resolved": t,
                      "consolidation_direction_resolved": c,
                      "shape_signature": signature,
                      "shape_family": family,
                      "direct_cosmology_signature_match": signature in COSMOLOGY_SIGNATURES,
                      "notes": row.get("notes", ""),
                      "source_or_dataset": row.get("source_or_dataset", "")
                  })
              return out

          seed_classified = classify_rows(SEEDED_NEUROTYPE_ROWS, "theory_seed_not_empirical")
          empirical_rows = read_empirical_inputs()
          empirical_classified = classify_rows(empirical_rows, "empirical_or_user_supplied")

          all_classified = seed_classified + empirical_classified

          family_counts = {}
          for row in all_classified:
              key = row["shape_family"]
              family_counts[key] = family_counts.get(key, 0) + 1

          exact_seed_matches = sum(1 for r in seed_classified if r["direct_cosmology_signature_match"])
          exact_empirical_matches = sum(1 for r in empirical_classified if r["direct_cosmology_signature_match"])

          write_csv(OUT / "v4_188_neurotype_seed_shape_input.csv", SEEDED_NEUROTYPE_ROWS, INPUT_COLUMNS)
          write_csv(
              OUT / "v4_188_neurotype_seed_shape_classification.csv",
              seed_classified,
              ["input_kind", "source_file", "domain", "case_id", "boundary_or_group", "propagation_direction_resolved", "pacing_direction_resolved", "consolidation_direction_resolved", "shape_signature", "shape_family", "direct_cosmology_signature_match", "notes", "source_or_dataset"]
          )
          write_csv(
              OUT / "v4_188_neurotype_empirical_shape_classification.csv",
              empirical_classified,
              ["input_kind", "source_file", "domain", "case_id", "boundary_or_group", "propagation_direction_resolved", "pacing_direction_resolved", "consolidation_direction_resolved", "shape_signature", "shape_family", "direct_cosmology_signature_match", "notes", "source_or_dataset"]
          )
          write_csv(
              OUT / "v4_188_neurotype_all_shape_classification.csv",
              all_classified,
              ["input_kind", "source_file", "domain", "case_id", "boundary_or_group", "propagation_direction_resolved", "pacing_direction_resolved", "consolidation_direction_resolved", "shape_signature", "shape_family", "direct_cosmology_signature_match", "notes", "source_or_dataset"]
          )
          write_csv(
              OUT / "v4_188_shape_family_counts.csv",
              [{"shape_family": k, "count": v} for k, v in sorted(family_counts.items())],
              ["shape_family", "count"]
          )

          empirical_template = []
          for case in ["ADHD", "autism", "dyslexia", "aphantasia", "bipolar", "schizotypy"]:
              empirical_template.append({
                  "domain": "neurotype_cognition",
                  "case_id": case + "_replace_with_empirical_group",
                  "boundary_or_group": "replace_with_task_or_measure_boundary",
                  "propagation_reach_value": "",
                  "pacing_access_value": "",
                  "consolidation_growth_value": "",
                  "reference_or_expected_propagation": "",
                  "reference_or_expected_pacing": "",
                  "reference_or_expected_consolidation": "",
                  "propagation_direction": "optional + or - or 0",
                  "pacing_direction": "optional + or - or 0",
                  "consolidation_direction": "optional + or - or 0",
                  "notes": "empirical row only; do not copy seed directions unless data justify them",
                  "source_or_dataset": "replace with dataset/paper/output artifact"
              })
          write_csv(OUT / "template_neurotype_empirical_shape_input.csv", empirical_template, INPUT_COLUMNS)

          measurement_map = [
              {
                  "neurotype_lane": "ADHD",
                  "propagation_reach_measure_options": "novelty seeking, association breadth, response variability, exploration width",
                  "pacing_access_measure_options": "reaction-time variability, switch cost, update frequency, delay sensitivity",
                  "consolidation_growth_measure_options": "sustained attention, task completion, retained sequence performance",
                  "best_next_data_source": "OpenNeuro/task data or ADHD paper summary tables"
              },
              {
                  "neurotype_lane": "autism",
                  "propagation_reach_measure_options": "social inference breadth, gaze/social stimulus reach, flexibility/generalization",
                  "pacing_access_measure_options": "update cost, sensory timing, transition cost, prediction-error response",
                  "consolidation_growth_measure_options": "local consistency, repeated pattern stability, detail retention",
                  "best_next_data_source": "autism eye-tracking/stimulus-social pass outputs"
              },
              {
                  "neurotype_lane": "dyslexia",
                  "propagation_reach_measure_options": "alternate-route compensation, scan-path spread, reread/recovery paths",
                  "pacing_access_measure_options": "fixation duration, saccade timing, decoding delay",
                  "consolidation_growth_measure_options": "reading accuracy, comprehension retention, stable word-form output",
                  "best_next_data_source": "ETDD70 dyslexia eye-tracking outputs"
              },
              {
                  "neurotype_lane": "aphantasia",
                  "propagation_reach_measure_options": "visual imagery score inverse, object/spatial strategy range, reconstruction route diversity",
                  "pacing_access_measure_options": "nonvisual reconstruction efficiency, task response timing",
                  "consolidation_growth_measure_options": "memory accuracy, drawing/task stability, conceptual consistency",
                  "best_next_data_source": "aphantasia questionnaire/drawing dataset outputs"
              },
              {
                  "neurotype_lane": "bipolar",
                  "propagation_reach_measure_options": "mania/hypomania activation, idea flight, goal-directed activity",
                  "pacing_access_measure_options": "sleep/rhythm disruption, phase cycling speed, activity tempo",
                  "consolidation_growth_measure_options": "stability of function, regulated output, recovery consolidation",
                  "best_next_data_source": "bipolar phase-cycling paper summary tables"
              },
              {
                  "neurotype_lane": "schizotypy",
                  "propagation_reach_measure_options": "semantic reach, unusual association breadth, reference-field spread",
                  "pacing_access_measure_options": "salience update rate, ambiguity response, reference switching",
                  "consolidation_growth_measure_options": "anchor specificity, reality-testing stability, coherent interpretation",
                  "best_next_data_source": "schizotypal reference-field overreach paper tables"
              }
          ]
          write_csv(
              OUT / "v4_188_neurotype_measurement_map.csv",
              measurement_map,
              ["neurotype_lane", "propagation_reach_measure_options", "pacing_access_measure_options", "consolidation_growth_measure_options", "best_next_data_source"]
          )

          guardrails = [
              {"rule": "Seed rows are theory translations, not empirical findings.", "meaning": "They are used to make the shape test explicit before data."},
              {"rule": "Empirical rows must override seed rows.", "meaning": "If data disagree with the seed, the data win."},
              {"rule": "Exact shape match is not validation.", "meaning": "A match only says the relational geometry is worth testing further."},
              {"rule": "Mismatch is useful.", "meaning": "It tells us where neurotype geometry does not scale like cosmology."},
              {"rule": "Do not force one neurotype into one signature.", "meaning": "Bipolar and other lanes may have multiple phase-specific shapes."}
          ]
          write_csv(OUT / "v4_188_neurotype_shape_guardrails.csv", guardrails, ["rule", "meaning"])

          if empirical_rows:
              package_status = "seed_shapes_written_empirical_rows_classified"
              selected_next_route = "neurotype_empirical_shape_result_review_and_covariance_input_design_with_scope_guards"
          else:
              package_status = "seed_shapes_written_no_empirical_neurotype_input_found"
              selected_next_route = "neurotype_empirical_summary_input_acquisition_or_upload_with_scope_guards"

          route_decision = {
              "version": "v4.188",
              "result_label": RESULT_LABEL,
              "clean_result": "Neurotype theory-seed shape rows were written and classified against the locked cosmology signature. Empirical validation was not claimed.",
              "seed_rows": len(SEEDED_NEUROTYPE_ROWS),
              "seed_direct_cosmology_signature_matches": exact_seed_matches,
              "empirical_rows_found": len(empirical_rows),
              "empirical_direct_cosmology_signature_matches": exact_empirical_matches,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "neurotype seed shape matrix only unless empirical input is supplied",
              "blocked_claims": BLOCKED_CLAIMS
          }
          (OUT / "v4_188_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_188_scope_guards.json").write_text(json.dumps({
              "scope": "neurotype cross-domain seed shape builder and optional empirical classifier",
              "seed_rows_are_empirical": False,
              "empirical_input_rows_found": len(empirical_rows),
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "neurotype_validation_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_188_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.188 - Neurotype Cross-Domain Shape Input Builder",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "This workflow builds a neurotype shape matrix against the locked cosmology relational signature. The seed rows are theory translations, not empirical validation.",
              "",
              "Seed rows: `" + str(len(SEEDED_NEUROTYPE_ROWS)) + "`",
              "Seed rows matching locked cosmology signatures: `" + str(exact_seed_matches) + "`",
              "Empirical rows found: `" + str(len(empirical_rows)) + "`",
              "",
              "Package status: `" + package_status + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_188_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_188_neurotype_seed_shape_input.csv",
              "v4_188_neurotype_seed_shape_classification.csv",
              "v4_188_neurotype_empirical_shape_classification.csv",
              "v4_188_neurotype_all_shape_classification.csv",
              "v4_188_shape_family_counts.csv",
              "template_neurotype_empirical_shape_input.csv",
              "v4_188_neurotype_measurement_map.csv",
              "v4_188_neurotype_shape_guardrails.csv",
              "v4_188_route_decision.json",
              "v4_188_scope_guards.json",
              "v4_188_blocked_claims.json",
              "v4_188_summary.md"
          ]

          rules = {
              "version_is_v4_188": True,
              "result_label_present": RESULT_LABEL.endswith("no_empirical_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "seed_rows_present": len(SEEDED_NEUROTYPE_ROWS) >= 6,
              "seed_classification_present": len(seed_classified) == len(SEEDED_NEUROTYPE_ROWS),
              "no_empirical_validation_claim": True,
              "no_unit_equivalence_claim": True,
              "next_route_selected": bool(selected_next_route)
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.188",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "package_status": package_status,
              "seed_rows": len(SEEDED_NEUROTYPE_ROWS),
              "seed_direct_cosmology_signature_matches": exact_seed_matches,
              "empirical_rows_found": len(empirical_rows),
              "selected_next_route": selected_next_route,
              "claim_boundary": "neurotype_seed_shape_builder_only_no_empirical_validation"
          }
          (OUT / "v4_188_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.188 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_188_outputs/run_v4_188.py

      - name: Upload v4.188 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-188-neurotype-cross-domain-shape-input-builder-output
          path: tairid_v4_188_outputs/
