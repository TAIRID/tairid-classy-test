name: Run TAIRID combined matrix scan v2

on:
  workflow_dispatch:

jobs:
  run-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran libgsl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel cython numpy scipy matplotlib
          python -m pip install classy || python -m pip install classy-community

      - name: Run CDM baseline
        run: |
          python run_tairid_matrix_case_v2.py --name cdm_baseline --warm-fraction 0.0

      - name: Upload baseline output
        uses: actions/upload-artifact@v4
        with:
          name: case-cdm-baseline-v2
          path: |
            matrix_case_outputs/**

  run-grid:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    strategy:
      fail-fast: false
      matrix:
        warm_fraction: ["0.005", "0.010", "0.0125", "0.015", "0.0175", "0.020", "0.0225", "0.025"]
        m_ncdm_eV: ["7.5", "10.0", "12.5", "15.0", "20.0", "25.0"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran libgsl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel cython numpy scipy matplotlib
          python -m pip install classy || python -m pip install classy-community

      - name: Run matrix case
        run: |
          python run_tairid_matrix_case_v2.py --warm-fraction "${{ matrix.warm_fraction }}" --m-ncdm-ev "${{ matrix.m_ncdm_eV }}"

      - name: Upload case output
        uses: actions/upload-artifact@v4
        with:
          name: case-v2-f${{ matrix.warm_fraction }}-m${{ matrix.m_ncdm_eV }}
          path: |
            matrix_case_outputs/**

  reduce-results:
    runs-on: ubuntu-latest
    needs: [run-baseline, run-grid]
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download all case artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_case_artifacts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install reducer dependencies
        run: |
          python -m pip install --upgrade pip numpy matplotlib

      - name: Aggregate combined matrix scan
        run: |
          python aggregate_tairid_combined_matrix_scan.py all_case_artifacts

      - name: Upload combined matrix outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-combined-matrix-scan-v2-output
          path: |
            combined_matrix_outputs/**
