name: 000 TAIRID v4.183 - eBOSS QSO Covariance Or Likelihood Acquisition With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-183-eboss-qso-covariance-or-likelihood-acquisition-with-scope-guards.yml"

permissions:
  contents: read

jobs:
  v4-183-eboss-qso-covariance-or-likelihood-acquisition:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.183 eBOSS QSO covariance or likelihood acquisition
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_183_outputs
          cat > tairid_v4_183_outputs/run_v4_183.py <<'PY'
          import csv
          import hashlib
          import io
          import json
          import math
          import os
          import re
          import tarfile
          import urllib.request
          import zipfile
          from pathlib import Path
          from urllib.parse import urljoin, urlparse

          OUT = Path("tairid_v4_183_outputs")
          TMP = OUT / "tmp_downloads"
          TMP.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "eboss_qso_covariance_or_likelihood_acquisition_passed_candidate_inventory_written_no_pressure_no_validation"

          ROOT_TARGETS = [
              {
                  "target_id": "sdss_final_bao_rsd_page",
                  "url": "https://www.sdss4.org/science/final-bao-and-rsd-measurements/",
                  "source_family": "official_sdss_summary_page",
              },
              {
                  "target_id": "sdss_dr16cosmo_svn_root",
                  "url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/",
                  "source_family": "official_sdss_dr16cosmo_svn",
              },
          ]

          QSO_ARXIV_CONTEXT = [
              {
                  "target_id": "qso_configuration_space_paper",
                  "url": "https://arxiv.org/abs/2007.08998",
                  "source_family": "qso_paper_context",
              },
              {
                  "target_id": "qso_power_spectrum_paper",
                  "url": "https://arxiv.org/abs/2007.08999",
                  "source_family": "qso_paper_context",
              },
          ]

          QSO_KEYWORDS = [
              "qso", "quasar", "quasars", "z1.48", "z_1.48", "zeff1.48", "1.48",
              "bao", "rsd", "fsigma8", "fsig8", "fsigma", "growth",
              "dm", "dh", "dv", "rd", "cov", "covariance", "covmat",
              "likelihood", "likelihoods", "chain", "cosmomc", "consensus",
              "combined", "final", "dr16", "eboss", "clustering",
          ]

          FILE_EXTENSIONS = [
              ".txt", ".dat", ".csv", ".json", ".yaml", ".yml", ".cov", ".covmat",
              ".gz", ".zip", ".tar", ".tgz", ".tar.gz"
          ]

          BLOCKED_CLAIMS = [
              "no QSO covariance accepted yet",
              "no full eBOSS covariance accepted yet",
              "no full tracer-family covariance",
              "no observed-plus-QSO combined test",
              "no pressure computed",
              "no final chi-square",
              "no likelihood computed",
              "no BIC",
              "no posterior model comparison",
              "no LCDM ruled-out claim",
              "no TAIRID validation",
          ]

          MAX_CRAWL_PAGES = int(os.environ.get("TAIRID_MAX_CRAWL_PAGES", "120"))
          MAX_DEPTH = int(os.environ.get("TAIRID_MAX_DEPTH", "4"))
          MAX_DOWNLOAD_BYTES = int(os.environ.get("TAIRID_MAX_DOWNLOAD_BYTES", str(120 * 1024 * 1024)))
          MAX_PREVIEW_BYTES = int(os.environ.get("TAIRID_MAX_PREVIEW_BYTES", "250000"))
          MAX_CANDIDATE_DOWNLOADS = int(os.environ.get("TAIRID_MAX_CANDIDATE_DOWNLOADS", "18"))

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames)
                  w.writeheader()
                  for row in rows:
                      w.writerow(row)

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def fetch_text(url, max_bytes=500000, timeout=18):
              rec = {"url": url, "ok": False, "status_code": "", "content_type": "", "bytes_read": 0, "error": "", "text": ""}
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.183-qso-acquisition/1.0"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      rec["ok"] = True
                      rec["status_code"] = getattr(resp, "status", "")
                      rec["content_type"] = resp.headers.get("Content-Type", "")
                      rec["bytes_read"] = len(data)
                      rec["text"] = data.decode("utf-8", errors="replace")
              except Exception as exc:
                  rec["error"] = type(exc).__name__ + ": " + str(exc)[:240]
              return rec

          def head_probe(url, timeout=14):
              rec = {"url": url, "head_ok": False, "status_code": "", "content_type": "", "content_length": "", "last_modified": "", "error": ""}
              try:
                  req = urllib.request.Request(url, method="HEAD", headers={"User-Agent": "TAIRID-v4.183-qso-head/1.0"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      rec["head_ok"] = True
                      rec["status_code"] = getattr(resp, "status", "")
                      rec["content_type"] = resp.headers.get("Content-Type", "")
                      rec["content_length"] = resp.headers.get("Content-Length", "")
                      rec["last_modified"] = resp.headers.get("Last-Modified", "")
              except Exception as exc:
                  rec["error"] = type(exc).__name__ + ": " + str(exc)[:240]
              return rec

          def extract_links(base_url, text):
              links = set()
              href_pattern = r"(?:href|src)\s*=\s*[\"']([^\"']+)[\"']"
              loose_pattern = r"https?://[^\s\"'<>]+"
              for m in re.finditer(href_pattern, text, re.IGNORECASE):
                  href = m.group(1)
                  if href.startswith("#") or href.startswith("mailto:"):
                      continue
                  links.add(urljoin(base_url, href))
              for m in re.finditer(loose_pattern, text):
                  links.add(m.group(0).rstrip(").,;"))
              return sorted(links)

          def same_relevant_domain(url):
              host = urlparse(url).netloc.lower()
              return any(host.endswith(h) for h in ["sdss.org", "svn.sdss.org", "data.sdss.org", "arxiv.org"])

          def qso_score(url, text_hint=""):
              hay = (url + " " + text_hint).lower()
              score = 0
              reasons = []
              for kw in QSO_KEYWORDS:
                  if kw.lower() in hay:
                      score += 1
                      reasons.append(kw)
              if "qso" in hay or "quasar" in hay:
                  score += 10
                  reasons.append("qso_priority")
              if "cov" in hay or "covariance" in hay or "covmat" in hay:
                  score += 8
                  reasons.append("covariance_priority")
              if "likelihood" in hay:
                  score += 8
                  reasons.append("likelihood_priority")
              if "consensus" in hay:
                  score += 5
                  reasons.append("consensus_priority")
              if "ly" in hay and not ("qso" in hay or "quasar" in hay):
                  score -= 3
                  reasons.append("lyman_not_qso_penalty")
              if "lrgxelg" in hay or "lrgxelg" in hay:
                  score -= 5
                  reasons.append("already_closed_lrgxelg_penalty")
              return score, ";".join(sorted(set(reasons)))

          def looks_like_data_file(url):
              lower = url.lower()
              return any(lower.endswith(ext) for ext in FILE_EXTENSIONS)

          def safe_filename(url, prefix):
              name = re.sub(r"[^A-Za-z0-9_.-]+", "_", url.split("/")[-1] or "download")
              if len(name) > 120:
                  name = name[:120]
              return prefix + "_" + name

          def download_with_cap(url, out_path, cap_bytes):
              rec = {"url": url, "download_attempted": True, "download_ok": False, "downloaded_bytes": 0, "sha256": "", "error": "", "skipped_reason": ""}
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.183-qso-download/1.0"})
                  with urllib.request.urlopen(req, timeout=45) as resp, open(out_path, "wb") as f:
                      total = 0
                      while True:
                          chunk = resp.read(1024 * 1024)
                          if not chunk:
                              break
                          total += len(chunk)
                          if total > cap_bytes:
                              rec["downloaded_bytes"] = total
                              rec["skipped_reason"] = "download exceeded cap " + str(cap_bytes)
                              try:
                                  f.close()
                                  out_path.unlink(missing_ok=True)
                              except Exception:
                                  pass
                              return rec
                          f.write(chunk)
                  rec["downloaded_bytes"] = out_path.stat().st_size
                  rec["sha256"] = sha256_file(out_path)
                  rec["download_ok"] = True
              except Exception as exc:
                  rec["error"] = type(exc).__name__ + ": " + str(exc)[:240]
                  try:
                      out_path.unlink(missing_ok=True)
                  except Exception:
                      pass
              return rec

          def preview_file(path, max_bytes=MAX_PREVIEW_BYTES):
              try:
                  data = path.read_bytes()[:max_bytes]
                  return data.decode("utf-8", errors="replace")
              except Exception as exc:
                  return "PREVIEW_ERROR: " + type(exc).__name__ + ": " + str(exc)[:200]

          def inventory_archive(path):
              rows = []
              previews = []
              try:
                  if zipfile.is_zipfile(path):
                      with zipfile.ZipFile(path) as zf:
                          for info in zf.infolist():
                              if info.is_dir():
                                  continue
                              rows.append({"archive": path.name, "member_name": info.filename, "member_size": info.file_size, "kind": "zip_member"})
                              lower = info.filename.lower()
                              if info.file_size <= MAX_PREVIEW_BYTES and any(k in lower for k in ["qso", "quasar", "cov", "likelihood", "bao", "rsd", "consensus"]):
                                  try:
                                      text = zf.read(info.filename)[:MAX_PREVIEW_BYTES].decode("utf-8", errors="replace")
                                  except Exception as exc:
                                      text = "PREVIEW_ERROR: " + type(exc).__name__ + ": " + str(exc)[:200]
                                  score, reasons = qso_score(info.filename, text[:2000])
                                  previews.append({
                                      "archive": path.name,
                                      "member_name": info.filename,
                                      "member_size": info.file_size,
                                      "score": score,
                                      "reasons": reasons,
                                      "first_1200_chars": text[:1200].replace("\n", "\\n").replace("\r", "\\r"),
                                      "preview_status": "archive_member_preview_only_not_science_ingestion",
                                  })
                  elif tarfile.is_tarfile(path):
                      with tarfile.open(path) as tf:
                          for m in tf.getmembers():
                              if not m.isfile():
                                  continue
                              rows.append({"archive": path.name, "member_name": m.name, "member_size": m.size, "kind": "tar_member"})
                              lower = m.name.lower()
                              if m.size <= MAX_PREVIEW_BYTES and any(k in lower for k in ["qso", "quasar", "cov", "likelihood", "bao", "rsd", "consensus"]):
                                  f = tf.extractfile(m)
                                  if f:
                                      text = f.read(MAX_PREVIEW_BYTES).decode("utf-8", errors="replace")
                                      score, reasons = qso_score(m.name, text[:2000])
                                      previews.append({
                                          "archive": path.name,
                                          "member_name": m.name,
                                          "member_size": m.size,
                                          "score": score,
                                          "reasons": reasons,
                                          "first_1200_chars": text[:1200].replace("\n", "\\n").replace("\r", "\\r"),
                                          "preview_status": "archive_member_preview_only_not_science_ingestion",
                                      })
              except Exception as exc:
                  rows.append({"archive": path.name, "member_name": "", "member_size": "", "kind": "archive_error:" + type(exc).__name__ + ":" + str(exc)[:180]})
              return rows, previews

          crawl_rows = []
          candidate_rows = []
          seen_pages = set()
          queue = []
          for target in ROOT_TARGETS + QSO_ARXIV_CONTEXT:
              queue.append((target["url"], 0, target["target_id"], target["source_family"]))

          while queue and len(seen_pages) < MAX_CRAWL_PAGES:
              url, depth, target_id, family = queue.pop(0)
              if url in seen_pages or depth > MAX_DEPTH or not same_relevant_domain(url):
                  continue
              seen_pages.add(url)
              fetched = fetch_text(url)
              crawl_rows.append({
                  "target_id": target_id,
                  "source_family": family,
                  "url": url,
                  "depth": depth,
                  "ok": fetched["ok"],
                  "status_code": fetched["status_code"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"],
              })
              if not fetched["ok"]:
                  continue
              text = fetched["text"]
              page_score, page_reasons = qso_score(url, text[:5000])
              if page_score > 0:
                  candidate_rows.append({
                      "source_page": url,
                      "candidate_url": url,
                      "depth": depth,
                      "candidate_kind": "page_candidate",
                      "score": page_score,
                      "reasons": page_reasons,
                      "status": "page_candidate_not_downloaded",
                  })

              links = extract_links(url, text)
              for link in links:
                  if not same_relevant_domain(link):
                      continue
                  score, reasons = qso_score(link)
                  if looks_like_data_file(link) or score > 0:
                      candidate_rows.append({
                          "source_page": url,
                          "candidate_url": link,
                          "depth": depth,
                          "candidate_kind": "data_or_keyword_link" if looks_like_data_file(link) else "keyword_link",
                          "score": score,
                          "reasons": reasons,
                          "status": "candidate_not_ingested",
                      })
                  # Crawl directory-ish / html-ish links.
                  lower = link.lower()
                  if depth + 1 <= MAX_DEPTH and (lower.endswith("/") or "svn.sdss.org" in lower or "sdss4.org/science" in lower):
                      if link not in seen_pages and len(seen_pages) + len(queue) < MAX_CRAWL_PAGES * 2:
                          queue.append((link, depth + 1, target_id, family))

          # Deduplicate candidates by URL and keep highest score.
          dedup = {}
          for row in candidate_rows:
              key = row["candidate_url"]
              if key not in dedup or int(row["score"]) > int(dedup[key]["score"]):
                  dedup[key] = row
          ranked = sorted(dedup.values(), key=lambda r: (-int(r["score"]), r["candidate_url"]))

          write_csv(OUT / "v4_183_crawl_report.csv", crawl_rows, ["target_id", "source_family", "url", "depth", "ok", "status_code", "content_type", "bytes_read", "error"])
          write_csv(OUT / "v4_183_ranked_qso_candidate_links.csv", ranked, ["source_page", "candidate_url", "depth", "candidate_kind", "score", "reasons", "status"])

          probe_rows = []
          download_rows = []
          file_preview_rows = []
          archive_member_rows = []
          archive_preview_rows = []
          downloaded_count = 0

          for idx, row in enumerate(ranked[:80], start=1):
              url = row["candidate_url"]
              head = head_probe(url)
              probe_row = dict(row)
              probe_row.update(head)
              probe_rows.append(probe_row)

              lower = url.lower()
              clen = None
              try:
                  clen = int(head.get("content_length") or "")
              except Exception:
                  clen = None
              if downloaded_count >= MAX_CANDIDATE_DOWNLOADS:
                  continue
              # Download only likely data files/archives that are not huge by HEAD.
              likely_download = looks_like_data_file(url) and int(row["score"]) >= 6
              if not likely_download:
                  continue
              if clen is not None and clen > MAX_DOWNLOAD_BYTES:
                  download_rows.append({
                      "candidate_url": url,
                      "download_attempted": False,
                      "download_ok": False,
                      "downloaded_bytes": 0,
                      "sha256": "",
                      "error": "",
                      "skipped_reason": "content_length exceeds cap",
                  })
                  continue
              local_path = TMP / safe_filename(url, f"cand{idx}")
              dl = download_with_cap(url, local_path, MAX_DOWNLOAD_BYTES)
              dl_row = {"candidate_url": url}
              dl_row.update(dl)
              download_rows.append(dl_row)
              if dl["download_ok"]:
                  downloaded_count += 1
                  if zipfile.is_zipfile(local_path) or tarfile.is_tarfile(local_path):
                      rows, previews = inventory_archive(local_path)
                      for r in rows:
                          r["candidate_url"] = url
                      for p in previews:
                          p["candidate_url"] = url
                      archive_member_rows.extend(rows)
                      archive_preview_rows.extend(previews)
                  else:
                      text = preview_file(local_path)
                      score, reasons = qso_score(url, text[:5000])
                      file_preview_rows.append({
                          "candidate_url": url,
                          "local_name": local_path.name,
                          "downloaded_bytes": dl["downloaded_bytes"],
                          "score_with_content_preview": score,
                          "reasons": reasons,
                          "first_1600_chars": text[:1600].replace("\n", "\\n").replace("\r", "\\r"),
                          "preview_status": "small_file_preview_only_not_science_ingestion",
                      })
                  try:
                      local_path.unlink(missing_ok=True)
                  except Exception:
                      pass

          write_csv(OUT / "v4_183_candidate_head_probe.csv", probe_rows, ["source_page", "candidate_url", "depth", "candidate_kind", "score", "reasons", "status", "url", "head_ok", "status_code", "content_type", "content_length", "last_modified", "error"])
          write_csv(OUT / "v4_183_candidate_download_attempts.csv", download_rows, ["candidate_url", "url", "download_attempted", "download_ok", "downloaded_bytes", "sha256", "error", "skipped_reason"])
          write_csv(OUT / "v4_183_small_file_previews.csv", file_preview_rows, ["candidate_url", "local_name", "downloaded_bytes", "score_with_content_preview", "reasons", "first_1600_chars", "preview_status"])
          write_csv(OUT / "v4_183_archive_member_inventory.csv", archive_member_rows, ["candidate_url", "archive", "member_name", "member_size", "kind"])
          write_csv(OUT / "v4_183_archive_member_previews.csv", archive_preview_rows, ["candidate_url", "archive", "member_name", "member_size", "score", "reasons", "first_1200_chars", "preview_status"])

          # Decide what we found, without accepting it as final covariance.
          combined_preview_count = len(file_preview_rows) + len(archive_preview_rows)
          best_direct = ranked[0] if ranked else {"candidate_url": "", "score": 0, "reasons": ""}
          found_covariance_like = any(("cov" in (r.get("reasons","").lower() + " " + r.get("candidate_url","").lower())) for r in ranked[:50]) or any("cov" in p.get("reasons","").lower() for p in archive_preview_rows + file_preview_rows)
          found_likelihood_like = any("likelihood" in (r.get("reasons","").lower() + " " + r.get("candidate_url","").lower()) for r in ranked[:50]) or any("likelihood" in p.get("reasons","").lower() for p in archive_preview_rows + file_preview_rows)
          found_qso_like = any(("qso" in (r.get("reasons","").lower() + " " + r.get("candidate_url","").lower()) or "quasar" in (r.get("candidate_url","").lower())) for r in ranked[:50])

          if combined_preview_count > 0 and (found_covariance_like or found_likelihood_like) and found_qso_like:
              package_status = "qso_covariance_or_likelihood_candidates_previewed"
              selected_next_route = "eboss_qso_candidate_package_parser_design_with_scope_guards"
          elif ranked:
              package_status = "qso_candidate_links_found_need_manual_or_deeper_probe"
              selected_next_route = "eboss_qso_candidate_deeper_inventory_or_manual_selection_with_scope_guards"
          else:
              package_status = "no_qso_candidate_links_found"
              selected_next_route = "eboss_qso_source_route_repair_with_scope_guards"

          gap_rows = [
              {
                  "gap": "limited LRGxELG covariance-aware preview",
                  "status": "closed_enough_for_diagnostic_preview",
                  "next_action": "do not keep squeezing this product",
              },
              {
                  "gap": "QSO covariance or likelihood",
                  "status": package_status,
                  "next_action": selected_next_route,
              },
              {
                  "gap": "full eBOSS tracer-family covariance / overlap",
                  "status": "still_open",
                  "next_action": "requires QSO plus tracer-family overlap handling after QSO candidate route",
              },
              {
                  "gap": "likelihood / BIC / posterior comparison",
                  "status": "blocked",
                  "next_action": "blocked until tracer-family covariance/likelihood sources are available",
              },
          ]
          write_csv(OUT / "v4_183_gap_status_update.csv", gap_rows, ["gap", "status", "next_action"])

          route_decision = {
              "version": "v4.183",
              "result_label": RESULT_LABEL,
              "clean_result": "QSO covariance/likelihood source routes were crawled, ranked, and lightly previewed. No QSO covariance was accepted and no pressure was computed.",
              "pages_crawled": len(crawl_rows),
              "candidate_link_count": len(ranked),
              "head_probe_count": len(probe_rows),
              "download_attempt_count": len(download_rows),
              "small_file_preview_count": len(file_preview_rows),
              "archive_member_count": len(archive_member_rows),
              "archive_member_preview_count": len(archive_preview_rows),
              "best_candidate_url": best_direct["candidate_url"],
              "best_candidate_score": best_direct["score"],
              "best_candidate_reasons": best_direct["reasons"],
              "found_covariance_like": found_covariance_like,
              "found_likelihood_like": found_likelihood_like,
              "found_qso_like": found_qso_like,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "blocked_claims": BLOCKED_CLAIMS,
          }
          (OUT / "v4_183_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")

          (OUT / "v4_183_scope_guards.json").write_text(json.dumps({
              "scope": "eBOSS QSO covariance or likelihood acquisition only",
              "qso_covariance_accepted": False,
              "full_eBOSS_covariance_accepted": False,
              "observed_plus_qso_combined_test": False,
              "pressure_computed": False,
              "likelihood_computed": False,
              "BIC_computed": False,
              "posterior_model_comparison_computed": False,
              "TAIRID_validated": False,
          }, indent=2), encoding="utf-8")
          (OUT / "v4_183_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = []
          summary.append("# TAIRID v4.183 - eBOSS QSO Covariance Or Likelihood Acquisition")
          summary.append("")
          summary.append("Expected result: `" + RESULT_LABEL + "`")
          summary.append("")
          summary.append("## Clean result")
          summary.append("")
          summary.append("This workflow moves from the closed-enough limited LRGxELG lane toward the next actual blocker: QSO covariance or likelihood sources.")
          summary.append("")
          summary.append("Candidate link count: `" + str(len(ranked)) + "`")
          summary.append("Head probe count: `" + str(len(probe_rows)) + "`")
          summary.append("Download attempt count: `" + str(len(download_rows)) + "`")
          summary.append("Package status: `" + package_status + "`")
          summary.append("")
          summary.append("Best candidate: `" + str(best_direct["candidate_url"]) + "`")
          summary.append("")
          summary.append("Selected next route: `" + selected_next_route + "`")
          summary.append("")
          summary.append("## Boundary")
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_183_summary.md").write_text("\n".join(summary), encoding="utf-8")

          rules = {
              "version_is_v4_183": True,
              "result_label_present": RESULT_LABEL.endswith("no_pressure_no_validation"),
              "crawl_report_written": (OUT / "v4_183_crawl_report.csv").exists(),
              "candidate_links_written": (OUT / "v4_183_ranked_qso_candidate_links.csv").exists(),
              "head_probe_written": (OUT / "v4_183_candidate_head_probe.csv").exists(),
              "download_attempts_written": (OUT / "v4_183_candidate_download_attempts.csv").exists(),
              "small_previews_written": (OUT / "v4_183_small_file_previews.csv").exists(),
              "archive_inventory_written": (OUT / "v4_183_archive_member_inventory.csv").exists(),
              "archive_previews_written": (OUT / "v4_183_archive_member_previews.csv").exists(),
              "gap_update_written": (OUT / "v4_183_gap_status_update.csv").exists(),
              "route_decision_written": (OUT / "v4_183_route_decision.json").exists(),
              "scope_guards_written": (OUT / "v4_183_scope_guards.json").exists(),
              "blocked_claims_written": (OUT / "v4_183_blocked_claims.json").exists(),
              "summary_written": (OUT / "v4_183_summary.md").exists(),
              "next_route_selected": bool(selected_next_route),
              "no_qso_covariance_accepted": True,
              "no_full_eboss_covariance_accepted": True,
              "no_pressure_computed": True,
              "no_likelihood_computed": True,
              "no_validation_claimed": True,
          }
          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.183",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "candidate_link_count": len(ranked),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "QSO_source_acquisition_only_no_pressure_no_validation",
          }
          (OUT / "v4_183_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.183 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_183_outputs/run_v4_183.py

