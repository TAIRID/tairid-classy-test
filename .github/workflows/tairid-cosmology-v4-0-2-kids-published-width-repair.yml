name: TAIRID Cosmology v4.0.2 KiDS Published Width Repair

on:
  workflow_dispatch:

jobs:
  kids-published-width-repair:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.0.2 KiDS published width repair
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_0_2_kids_published_width

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_0_2_kids_published_width")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_0_2_kids_published_width_repair"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior, or model comparison.",
              "This does not parse the full KiDS posterior chain.",
              "This is a KiDS-side uncertainty repair using the published KiDS-1000 cosmic-shear S8 uncertainty.",
              "A pass means the KiDS/Planck consolidation-negative pressure direction survives this published-width repair, not that TAIRID is validated."
          ]

          # Carried from v4.0.1 Planck-chain S8 upgrade.
          PLANCK_CHAIN_S8_Q16 = 0.8128646
          PLANCK_CHAIN_S8_Q50 = 0.8248208
          PLANCK_CHAIN_S8_Q84 = 0.8373030
          PLANCK_CHAIN_S8_SIGMA = 0.012219199999999986

          # Carried from v3.58 / v4.0.1 compact row.
          KIDS_CARRIED_S8_Q50 = 0.764565
          KIDS_PORTABLE_SIGMA_USED_IN_V4_0_1 = 0.01845
          V4_0_1_PRESSURE_Z = -2.7228816965170095
          V4_0_1_SURVIVAL_GRADE = "strong_diagnostic_survival"

          # Published KiDS-1000 cosmic-shear fiducial result.
          # Source note: KiDS-1000 cosmic shear reports S8 = 0.759 +0.024 -0.021.
          KIDS_PUBLISHED_S8_Q50 = 0.759
          KIDS_PUBLISHED_SIGMA_MINUS = 0.021
          KIDS_PUBLISHED_SIGMA_PLUS = 0.024
          KIDS_PUBLISHED_SIGMA_SYMMETRIC = (KIDS_PUBLISHED_SIGMA_MINUS + KIDS_PUBLISHED_SIGMA_PLUS) / 2.0

          SOURCE_LEDGER = [
              {
                  "source_id": "kids_1000_cosmic_shear_public_page",
                  "source_name": "KiDS-1000 cosmic shear cosmology public page",
                  "source_url": "https://kids.strw.leidenuniv.nl/DR4/KiDS-1000_cosmicshear.php",
                  "used_for": "Published fiducial KiDS-1000 cosmic-shear S8 = 0.759 +0.024 -0.021."
              },
              {
                  "source_id": "v4_0_1_planck_chain_s8_artifact",
                  "source_name": "Prior TAIRID v4.0.1 GitHub artifact",
                  "source_url": "local_prior_run_artifact",
                  "used_for": "Planck chain-derived S8 q16/q50/q84 and sigma carried forward."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def pressure_z(kids_s8, kids_sigma, planck_s8, planck_sigma):
              combined_sigma = math.sqrt(kids_sigma ** 2 + planck_sigma ** 2)
              return {
                  "delta_kids_minus_planck": kids_s8 - planck_s8,
                  "combined_sigma": combined_sigma,
                  "pressure_z": (kids_s8 - planck_s8) / combined_sigma
              }

          def classify_pressure(delta, z):
              abs_z = abs(z)

              if abs(delta) < 1e-6 or abs_z < 0.25:
                  return "near_zero_pressure_not_robust"

              if delta > 0:
                  return "flipped_positive_consolidation_negative_pattern_fails"

              if abs_z >= 2.5:
                  return "strong_diagnostic_survival"

              if abs_z >= 1.5:
                  return "direction_survives_strength_weakens"

              return "weak_diagnostic_only"

          rows = []

          def add_row(row_id, description, kids_s8, kids_sigma, sigma_logic):
              result = pressure_z(
                  kids_s8=kids_s8,
                  kids_sigma=kids_sigma,
                  planck_s8=PLANCK_CHAIN_S8_Q50,
                  planck_sigma=PLANCK_CHAIN_S8_SIGMA
              )
              grade = classify_pressure(result["delta_kids_minus_planck"], result["pressure_z"])

              rows.append({
                  "row_id": row_id,
                  "description": description,
                  "kids_s8": kids_s8,
                  "kids_sigma": kids_sigma,
                  "kids_sigma_logic": sigma_logic,
                  "planck_s8_q50": PLANCK_CHAIN_S8_Q50,
                  "planck_sigma": PLANCK_CHAIN_S8_SIGMA,
                  "delta_kids_minus_planck": result["delta_kids_minus_planck"],
                  "combined_sigma": result["combined_sigma"],
                  "pressure_z": result["pressure_z"],
                  "direction": "negative_consolidation_growth_pressure" if result["delta_kids_minus_planck"] < 0 else "non_negative_or_flipped",
                  "survival_grade": grade
              })

          add_row(
              row_id="v4_0_1_carried_portable_kids_sigma",
              description="Prior v4.0.1 carried row using KiDS q50 0.764565 and portable sigma 0.01845.",
              kids_s8=KIDS_CARRIED_S8_Q50,
              kids_sigma=KIDS_PORTABLE_SIGMA_USED_IN_V4_0_1,
              sigma_logic="portable_prior_sigma"
          )

          add_row(
              row_id="published_kids_directional_asymmetric_width",
              description="Published KiDS S8 median using the upper uncertainty because Planck lies above KiDS.",
              kids_s8=KIDS_PUBLISHED_S8_Q50,
              kids_sigma=KIDS_PUBLISHED_SIGMA_PLUS,
              sigma_logic="published_plus_sigma_directional"
          )

          add_row(
              row_id="published_kids_symmetric_average_width",
              description="Published KiDS S8 median using the average of +0.024 and -0.021.",
              kids_s8=KIDS_PUBLISHED_S8_Q50,
              kids_sigma=KIDS_PUBLISHED_SIGMA_SYMMETRIC,
              sigma_logic="published_symmetric_average_sigma"
          )

          add_row(
              row_id="published_kids_strict_lower_width",
              description="Published KiDS S8 median using the smaller lower uncertainty as a strict sensitivity check.",
              kids_s8=KIDS_PUBLISHED_S8_Q50,
              kids_sigma=KIDS_PUBLISHED_SIGMA_MINUS,
              sigma_logic="published_minus_sigma_strict_check"
          )

          add_row(
              row_id="carried_kids_q50_with_published_directional_width",
              description="Carried v3.58/v4.0.1 KiDS q50 using published directional upper uncertainty.",
              kids_s8=KIDS_CARRIED_S8_Q50,
              kids_sigma=KIDS_PUBLISHED_SIGMA_PLUS,
              sigma_logic="carried_q50_with_published_plus_sigma"
          )

          main_row = next(row for row in rows if row["row_id"] == "published_kids_directional_asymmetric_width")

          failed_gates = []
          warnings = []

          if main_row["direction"] != "negative_consolidation_growth_pressure":
              failed_gates.append("published_width_direction_not_negative")

          if abs(main_row["pressure_z"]) < 1.5:
              failed_gates.append("published_width_pressure_below_direction_survival_threshold")

          if abs(main_row["pressure_z"]) < 2.5:
              warnings.append("published_directional_width_reduces_pressure_below_strong_2_5_sigma_threshold")

          if main_row["survival_grade"] == "flipped_positive_consolidation_negative_pattern_fails":
              failed_gates.append("consolidation_negative_pattern_flipped")

          if main_row["survival_grade"] == "near_zero_pressure_not_robust":
              failed_gates.append("pressure_near_zero_not_robust")

          if failed_gates:
              readiness_label = "kids_published_width_repair_failed_or_needs_followup"
              next_step = (
                  "Do not widen to DES/HSC yet. Inspect KiDS source handling and recover direct posterior chain q16/q50/q84."
              )
          else:
              if warnings:
                  readiness_label = "kids_published_width_repair_passed_direction_survives_strength_weakened"
                  next_step = (
                      "Proceed cautiously to v4.1 DES/HSC growth-family repair. "
                      "The KiDS/Planck direction survived, but the published directional width reduced the pressure below the strong 2.5 sigma line."
                  )
              else:
                  readiness_label = "kids_published_width_repair_passed_strong_survival"
                  next_step = (
                      "Proceed to v4.1 DES/HSC growth-family repair. The KiDS/Planck row survived the published-width repair strongly."
                  )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_ledger": SOURCE_LEDGER,
              "carried_planck_chain_result_from_v4_0_1": {
                  "planck_chain_s8_q16": PLANCK_CHAIN_S8_Q16,
                  "planck_chain_s8_q50": PLANCK_CHAIN_S8_Q50,
                  "planck_chain_s8_q84": PLANCK_CHAIN_S8_Q84,
                  "planck_chain_s8_sigma": PLANCK_CHAIN_S8_SIGMA
              },
              "kids_inputs": {
                  "kids_carried_s8_q50": KIDS_CARRIED_S8_Q50,
                  "kids_portable_sigma_used_in_v4_0_1": KIDS_PORTABLE_SIGMA_USED_IN_V4_0_1,
                  "kids_published_s8_q50": KIDS_PUBLISHED_S8_Q50,
                  "kids_published_sigma_minus": KIDS_PUBLISHED_SIGMA_MINUS,
                  "kids_published_sigma_plus": KIDS_PUBLISHED_SIGMA_PLUS,
                  "kids_published_sigma_symmetric": KIDS_PUBLISHED_SIGMA_SYMMETRIC
              },
              "pressure_rows": rows,
              "main_result": main_row,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "full_kids_chain_parsed": False,
                  "new_cosmological_model_fit": False
              },
              "gate_result": {
                  "failed_gates": failed_gates,
                  "warnings": warnings,
                  "readiness_label": readiness_label,
                  "main_pressure_z": main_row["pressure_z"],
                  "main_survival_grade": main_row["survival_grade"],
                  "main_direction": main_row["direction"],
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False
              }
          }

          json_path = OUTDIR / "tairid_cosmology_v4_0_2_kids_published_width_repair.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          with (OUTDIR / "kids_published_width_pressure_rows_v4_0_2.csv").open("w", newline="", encoding="utf-8") as f:
              fieldnames = [
                  "row_id",
                  "description",
                  "kids_s8",
                  "kids_sigma",
                  "kids_sigma_logic",
                  "planck_s8_q50",
                  "planck_sigma",
                  "delta_kids_minus_planck",
                  "combined_sigma",
                  "pressure_z",
                  "direction",
                  "survival_grade"
              ]
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              for row in rows:
                  writer.writerow(row)

          with (OUTDIR / "source_ledger_v4_0_2.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["source_id", "source_name", "source_url", "used_for"])
              writer.writeheader()
              for row in SOURCE_LEDGER:
                  writer.writerow(row)

          with (OUTDIR / "interpretation_boundaries_v4_0_2.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["interpretation_id", "status", "wording", "boundary"])
              writer.writeheader()
              writer.writerows([
                  {
                      "interpretation_id": "allowed_kids_published_width_repair",
                      "status": "allowed_with_boundary",
                      "wording": "The KiDS/Planck pressure row was retested using published KiDS-1000 S8 uncertainty.",
                      "boundary": "Published-width repair only, not validation."
                  },
                  {
                      "interpretation_id": "allowed_direction_survival_statement",
                      "status": "allowed_with_boundary",
                      "wording": "If pressure remains negative and above 1.5 sigma, the consolidation-negative direction survives this repair.",
                      "boundary": "This is one diagnostic row only."
                  },
                  {
                      "interpretation_id": "allowed_strength_warning",
                      "status": "allowed_with_boundary",
                      "wording": "If pressure drops below 2.5 sigma, the direction survives but strength weakens.",
                      "boundary": "This warns against overclaiming the row as strong."
                  },
                  {
                      "interpretation_id": "forbidden_validation_claim",
                      "status": "forbidden",
                      "wording": "TAIRID is validated.",
                      "boundary": "Blocked."
                  },
                  {
                      "interpretation_id": "forbidden_h0_solution_claim",
                      "status": "forbidden",
                      "wording": "The H0 tension is solved.",
                      "boundary": "Blocked."
                  },
                  {
                      "interpretation_id": "forbidden_standard_cosmology_disproof",
                      "status": "forbidden",
                      "wording": "Standard cosmology is disproven.",
                      "boundary": "Blocked."
                  }
              ])

          md = []
          md.append("# TAIRID Cosmology v4.0.2 — KiDS Published-Width Repair")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(failed_gates) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(warnings) if warnings else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v4.0.1 repaired the Planck side by using Planck chain-derived S8.")
          md.append("")
          md.append("v4.0.2 repairs the KiDS side by checking the pressure row against the published KiDS-1000 cosmic-shear S8 uncertainty:")
          md.append("")
          md.append("`S8 = 0.759 +0.024 / -0.021`")
          md.append("")
          md.append("This is not a full KiDS posterior-chain parser. It is a published-width robustness repair.")
          md.append("")
          md.append("## Main result")
          md.append("")
          md.append("The main row uses the published KiDS median and the published upper uncertainty, because Planck lies above KiDS in this comparison.")
          md.append("")
          md.append("| Field | Value |")
          md.append("|---|---:|")
          md.append(f"| KiDS published S8 | `{KIDS_PUBLISHED_S8_Q50:.12f}` |")
          md.append(f"| KiDS directional sigma | `{KIDS_PUBLISHED_SIGMA_PLUS:.12f}` |")
          md.append(f"| Planck chain S8 median | `{PLANCK_CHAIN_S8_Q50:.12f}` |")
          md.append(f"| Planck chain sigma | `{PLANCK_CHAIN_S8_SIGMA:.12f}` |")
          md.append(f"| Delta KiDS - Planck | `{main_row['delta_kids_minus_planck']:.12f}` |")
          md.append(f"| Combined sigma | `{main_row['combined_sigma']:.12f}` |")
          md.append(f"| Pressure z | `{main_row['pressure_z']:.12f}` |")
          md.append("")
          md.append(f"Direction: `{main_row['direction']}`")
          md.append("")
          md.append(f"Survival grade: `{main_row['survival_grade']}`")
          md.append("")
          md.append("## Sensitivity rows")
          md.append("")
          md.append("| Row | Pressure z | Grade |")
          md.append("|---|---:|---|")
          for row in rows:
              md.append(f"| `{row['row_id']}` | `{row['pressure_z']:.12f}` | `{row['survival_grade']}` |")
          md.append("")
          md.append("## How to read the result")
          md.append("")
          md.append("- `strong_diagnostic_survival`: still negative and at least about 2.5 sigma in magnitude.")
          md.append("- `direction_survives_strength_weakens`: still negative, but weaker, roughly 1.5 to 2.5 sigma.")
          md.append("- `weak_diagnostic_only`: still negative, but below about 1.5 sigma.")
          md.append("- `near_zero_pressure_not_robust`: pressure is basically not stable.")
          md.append("- `flipped_positive_consolidation_negative_pattern_fails`: the consolidation-negative row fails this comparison.")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          if failed_gates:
              md.append("The published-width repair did not preserve the row strongly enough to continue safely. Inspect KiDS source handling before widening to DES/HSC.")
          elif warnings:
              md.append("The published-width repair passed, but with a strength warning. The consolidation-negative direction survives, but the main directional row is weaker than the prior portable-sigma result.")
          else:
              md.append("The published-width repair passed without warnings. The consolidation-negative row remains strong under this check.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `kids_published_width_pressure_rows_v4_0_2.csv`")
          md.append("- `source_ledger_v4_0_2.csv`")
          md.append("- `interpretation_boundaries_v4_0_2.csv`")
          md.append("- `tairid_cosmology_v4_0_2_kids_published_width_repair.json`")
          md.append("- `tairid_cosmology_v4_0_2_kids_published_width_repair.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v4_0_2_kids_published_width_repair.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("Main result:")
          print(json.dumps(main_row, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.0.2 KiDS published width repair artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v4-0-2-kids-published-width-repair
          path: artifacts/tairid_cosmology_v4_0_2_kids_published_width/
