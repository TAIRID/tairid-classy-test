name: Run TAIRID Table2 F160W quantile bands v1.5.1

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-table2-f160w-quantile-bands-v1-5-1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy matplotlib astropy

      - name: Confirm files exist
        run: |
          pwd
          ls -la
          test -f run_tairid_table2_f160w_quantile_bands_v1_5.py
          test -f repair_and_run_tairid_table2_f160w_quantile_bands_v1_5_1.py
          echo "Source script and repair runner found."

      - name: Repair and run TAIRID Table2 F160W quantile bands v1.5.1
        run: |
          python repair_and_run_tairid_table2_f160w_quantile_bands_v1_5_1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-table2-f160w-quantile-bands-v1-5-1-output
          path: |
            tairid_table2_f160w_quantile_bands_v1_5_outputs/**
            tairid_table2_f160w_quantile_bands_v1_5_1_repair_outputs/**
            run_tairid_table2_f160w_quantile_bands_v1_5_cleaned_runtime.py
