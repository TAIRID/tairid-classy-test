name: Run TAIRID SH0ES ladder source inventory v1

on:
  workflow_dispatch:

jobs:
  run-shoes-ladder-source-inventory-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy pandas matplotlib requests

      - name: Run SH0ES ladder source inventory v1
        run: |
          python run_tairid_shoes_ladder_source_inventory_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-ladder-source-inventory-v1-output
          path: |
            shoes_ladder_source_inventory_v1_outputs/**
