name: Run TAIRID SH0ES Downstream Bridge Audit v2.5 Fresh

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-downstream-bridge-audit-v2-5-fresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Confirm fresh script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_downstream_bridge_audit_v2_5_fresh.py
          echo "v2.5 FRESH SH0ES downstream bridge audit found."

      - name: Run TAIRID SH0ES Downstream Bridge Audit v2.5 Fresh
        run: |
          python run_tairid_shoes_downstream_bridge_audit_v2_5_fresh.py

      - name: Upload fresh outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-downstream-bridge-audit-v2-5-fresh-output
          path: |
            tairid_shoes_downstream_bridge_audit_v2_5_fresh_outputs/**
