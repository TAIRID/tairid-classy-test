name: TAIRID Queue Probe v1

on:
  push:
    paths:
      - "tairid_queue_probe_v1.py"
      - ".github/workflows/tairid_queue_probe_v1.yml"

jobs:
  queue-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show working folder
        run: |
          pwd
          ls -la

      - name: Run queue probe
        run: |
          python tairid_queue_probe_v1.py

      - name: Upload queue probe output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-queue-probe-v1-output
          path: |
            tairid_queue_probe_v1_outputs/**
