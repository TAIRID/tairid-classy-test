name: Run TAIRID Table2 F160W within-host v1.7

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-table2-f160w-within-host-v1-7:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy matplotlib astropy

      - name: Confirm scripts exist
        run: |
          pwd
          ls -la
          test -f run_tairid_table2_f160w_quantile_bands_v1_5.py
          test -f run_tairid_table2_f160w_faint_tail_host_field_v1_6.py
          test -f run_tairid_table2_f160w_within_host_v1_7.py
          echo "v1.5, v1.6, and v1.7 scripts found."

      - name: Run TAIRID Table2 F160W within-host v1.7
        run: |
          python run_tairid_table2_f160w_within_host_v1_7.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-table2-f160w-within-host-v1-7-output
          path: |
            tairid_table2_f160w_within_host_v1_7_outputs/**
            run_tairid_table2_f160w_quantile_bands_v1_5_importable_for_v1_6.py
