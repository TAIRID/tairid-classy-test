name: "!!! AAA CURRENT - TAIRID v4.400 broader source expansion manifest no support"

on:
  workflow_dispatch:

jobs:
  run-v4-400-broader-source-expansion-manifest-no-support:
    name: "!!! AAA CURRENT - Run v4.400 broader source expansion manifest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.399A input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.399A output ZIP by pattern..."
          INPUT_399A_ZIP="$(ls tairid-v4-399A-cautious-diagnostic-writeup-packet-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_399A_ZIP" ]; then
            echo "Could not find v4.399A output ZIP."
            echo "Expected:"
            echo "tairid-v4-399A-cautious-diagnostic-writeup-packet-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.399A ZIP:"
          echo "$INPUT_399A_ZIP"
          echo "INPUT_399A_ZIP=$INPUT_399A_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.400 broader source expansion manifest script
        run: |
          cat > run_v4_400_broader_source_expansion_manifest_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "broader source expansion manifest only; previously audited BOSS DR12 three-row diagnostic may be used as current anchor; no new observed values loaded; no covariance values loaded; no new chi-square computed; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def main():
              input_399a = Path(os.environ["INPUT_399A_ZIP"])

              outdir = Path("tairid_v4_400_broader_source_expansion_manifest_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base399a = extract_zip(input_399a, "tairid_v4_400_399a_")

              summary399a_path = find_one(base399a, "v4_399A_summary.json")
              diagnostic_values_path = find_one(base399a, "v4_399A_diagnostic_values_summary_NO_SUPPORT.csv")
              findings_path = find_one(base399a, "v4_399A_cautious_writeup_findings_NO_SUPPORT.csv")
              limitations_path = find_one(base399a, "v4_399A_limitations_for_cautious_writeup.csv")
              next_routes_path = find_one(base399a, "v4_399A_next_route_options_NO_SUPPORT.csv")
              status_path = find_one(base399a, "v4_399A_writeup_status_summary_NO_SUPPORT.csv")
              writeup_sections_path = find_one(base399a, "v4_399A_required_writeup_sections_NO_SUPPORT.csv")
              rule399a_path = find_one(base399a, "v4_399A_rule_checks.csv")

              summary399a = json.loads(summary399a_path.read_text())
              diagnostic_values = pd.read_csv(diagnostic_values_path)
              findings = pd.read_csv(findings_path)
              limitations = pd.read_csv(limitations_path)
              next_routes = pd.read_csv(next_routes_path)
              status = pd.read_csv(status_path)
              writeup_sections = pd.read_csv(writeup_sections_path)
              rules399a = pd.read_csv(rule399a_path)

              expansion_candidates = pd.DataFrame([
                  {
                      "v4_400_candidate_id": "V4_400_SOURCE_001",
                      "candidate_family": "current_anchor_BOSS_DR12_combined_fsigma8_three_rows",
                      "candidate_role": "retain as audited anchor, not a new expansion source",
                      "survey_or_release_family": "BOSS_DR12",
                      "tracer_or_sample_family": "combined_galaxy_sample",
                      "redshift_or_range_hint": "z0.38|z0.51|z0.61",
                      "source_lane_type": "current_anchor",
                      "priority": 0,
                      "expected_next_action": "preserve_as_reference_anchor_only",
                      "requires_new_source_discovery": False,
                      "requires_observed_value_ingest": False,
                      "requires_covariance_repair": False,
                      "new_data_loaded_now": False,
                      "new_chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_400_candidate_id": "V4_400_SOURCE_002",
                      "candidate_family": "eBOSS_LRG_fsigma8_expansion",
                      "candidate_role": "extend beyond BOSS DR12 anchor with later official-source and covariance review",
                      "survey_or_release_family": "eBOSS",
                      "tracer_or_sample_family": "LRG",
                      "redshift_or_range_hint": "later_source_review_required",
                      "source_lane_type": "broader_sdss_eboss_tracer",
                      "priority": 1,
                      "expected_next_action": "source_inventory_then_value_and_covariance_gate",
                      "requires_new_source_discovery": True,
                      "requires_observed_value_ingest": True,
                      "requires_covariance_repair": True,
                      "new_data_loaded_now": False,
                      "new_chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_400_candidate_id": "V4_400_SOURCE_003",
                      "candidate_family": "eBOSS_ELG_fsigma8_expansion",
                      "candidate_role": "test higher-redshift emission-line-galaxy lane after official-source review",
                      "survey_or_release_family": "eBOSS",
                      "tracer_or_sample_family": "ELG",
                      "redshift_or_range_hint": "later_source_review_required",
                      "source_lane_type": "broader_sdss_eboss_tracer",
                      "priority": 2,
                      "expected_next_action": "source_inventory_then_value_and_covariance_gate",
                      "requires_new_source_discovery": True,
                      "requires_observed_value_ingest": True,
                      "requires_covariance_repair": True,
                      "new_data_loaded_now": False,
                      "new_chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_400_candidate_id": "V4_400_SOURCE_004",
                      "candidate_family": "eBOSS_QSO_fsigma8_expansion",
                      "candidate_role": "test quasar-lane extension only after matching definitions and covariance review",
                      "survey_or_release_family": "eBOSS",
                      "tracer_or_sample_family": "QSO",
                      "redshift_or_range_hint": "later_source_review_required",
                      "source_lane_type": "broader_sdss_eboss_tracer",
                      "priority": 3,
                      "expected_next_action": "source_inventory_then_value_and_covariance_gate",
                      "requires_new_source_discovery": True,
                      "requires_observed_value_ingest": True,
                      "requires_covariance_repair": True,
                      "new_data_loaded_now": False,
                      "new_chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_400_candidate_id": "V4_400_SOURCE_005",
                      "candidate_family": "WiggleZ_fsigma8_expansion",
                      "candidate_role": "independent survey-family comparison lane after source and covariance gating",
                      "survey_or_release_family": "WiggleZ",
                      "tracer_or_sample_family": "emission_line_galaxies",
                      "redshift_or_range_hint": "later_source_review_required",
                      "source_lane_type": "independent_survey_family",
                      "priority": 4,
                      "expected_next_action": "source_inventory_then_value_and_covariance_gate",
                      "requires_new_source_discovery": True,
                      "requires_observed_value_ingest": True,
                      "requires_covariance_repair": True,
                      "new_data_loaded_now": False,
                      "new_chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_400_candidate_id": "V4_400_SOURCE_006",
                      "candidate_family": "6dFGS_low_redshift_fsigma8_expansion",
                      "candidate_role": "low-redshift anchor extension after definition and covariance gating",
                      "survey_or_release_family": "6dFGS",
                      "tracer_or_sample_family": "low_redshift_galaxies",
                      "redshift_or_range_hint": "later_source_review_required",
                      "source_lane_type": "low_redshift_anchor_family",
                      "priority": 5,
                      "expected_next_action": "source_inventory_then_value_and_covariance_gate",
                      "requires_new_source_discovery": True,
                      "requires_observed_value_ingest": True,
                      "requires_covariance_repair": True,
                      "new_data_loaded_now": False,
                      "new_chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_400_candidate_id": "V4_400_SOURCE_007",
                      "candidate_family": "SDSS_MGS_low_redshift_fsigma8_expansion",
                      "candidate_role": "main-galaxy-sample low-redshift comparison after source and covariance gating",
                      "survey_or_release_family": "SDSS_MGS",
                      "tracer_or_sample_family": "main_galaxy_sample",
                      "redshift_or_range_hint": "later_source_review_required",
                      "source_lane_type": "low_redshift_anchor_family",
                      "priority": 6,
                      "expected_next_action": "source_inventory_then_value_and_covariance_gate",
                      "requires_new_source_discovery": True,
                      "requires_observed_value_ingest": True,
                      "requires_covariance_repair": True,
                      "new_data_loaded_now": False,
                      "new_chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_400_candidate_id": "V4_400_SOURCE_008",
                      "candidate_family": "VIPERS_fsigma8_expansion",
                      "candidate_role": "independent higher-redshift comparison lane after source and covariance gating",
                      "survey_or_release_family": "VIPERS",
                      "tracer_or_sample_family": "galaxy_sample",
                      "redshift_or_range_hint": "later_source_review_required",
                      "source_lane_type": "independent_survey_family",
                      "priority": 7,
                      "expected_next_action": "source_inventory_then_value_and_covariance_gate",
                      "requires_new_source_discovery": True,
                      "requires_observed_value_ingest": True,
                      "requires_covariance_repair": True,
                      "new_data_loaded_now": False,
                      "new_chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_400_candidate_id": "V4_400_SOURCE_009",
                      "candidate_family": "GAMA_fsigma8_expansion",
                      "candidate_role": "intermediate/low-redshift comparison lane after source and covariance gating",
                      "survey_or_release_family": "GAMA",
                      "tracer_or_sample_family": "galaxy_sample",
                      "redshift_or_range_hint": "later_source_review_required",
                      "source_lane_type": "independent_survey_family",
                      "priority": 8,
                      "expected_next_action": "source_inventory_then_value_and_covariance_gate",
                      "requires_new_source_discovery": True,
                      "requires_observed_value_ingest": True,
                      "requires_covariance_repair": True,
                      "new_data_loaded_now": False,
                      "new_chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
              ])

              review_packet = expansion_candidates[
                  expansion_candidates["source_lane_type"] != "current_anchor"
              ].copy()
              review_packet["human_source_expansion_decision"] = ""
              review_packet["allowed_human_source_expansion_decisions"] = "approve_for_source_inventory|defer_until_later|reject_for_current_lane|keep_blocked"
              review_packet["human_source_expansion_note"] = ""
              review_packet["source_inventory_approved_now"] = False
              review_packet["new_data_loaded_now"] = False
              review_packet["new_chi_square_computed"] = False
              review_packet["score_valid"] = False
              review_packet["support_allowed"] = False

              lane_summary = pd.DataFrame([
                  {
                      "lane_summary_id": "V4_400_LANE_001",
                      "lane": "current_anchor",
                      "candidate_rows": int((expansion_candidates["source_lane_type"] == "current_anchor").sum()),
                      "role": "preserve the audited BOSS DR12 three-row diagnostic as reference anchor",
                      "new_data_loaded_now": False,
                      "support_allowed": False,
                  },
                  {
                      "lane_summary_id": "V4_400_LANE_002",
                      "lane": "broader_sdss_eboss_tracer",
                      "candidate_rows": int((expansion_candidates["source_lane_type"] == "broader_sdss_eboss_tracer").sum()),
                      "role": "expand within SDSS/eBOSS tracer families before independent survey claims",
                      "new_data_loaded_now": False,
                      "support_allowed": False,
                  },
                  {
                      "lane_summary_id": "V4_400_LANE_003",
                      "lane": "low_redshift_anchor_family",
                      "candidate_rows": int((expansion_candidates["source_lane_type"] == "low_redshift_anchor_family").sum()),
                      "role": "add low-redshift anchor families after source/covariance review",
                      "new_data_loaded_now": False,
                      "support_allowed": False,
                  },
                  {
                      "lane_summary_id": "V4_400_LANE_004",
                      "lane": "independent_survey_family",
                      "candidate_rows": int((expansion_candidates["source_lane_type"] == "independent_survey_family").sum()),
                      "role": "add independent surveys only through later source inventory and covariance gates",
                      "new_data_loaded_now": False,
                      "support_allowed": False,
                  },
              ])

              expansion_status = pd.DataFrame([
                  {
                      "status_id": "V4_400_STATUS_001",
                      "status": "broader_source_expansion_manifest_created",
                      "detail": f"{len(review_packet)} expansion candidates prepared for human source-inventory review.",
                  },
                  {
                      "status_id": "V4_400_STATUS_002",
                      "status": "cautious_writeup_preserved",
                      "detail": "v4.399A writeup packet remains a bounded milestone, not a support claim.",
                  },
                  {
                      "status_id": "V4_400_STATUS_003",
                      "status": "no_new_computation",
                      "detail": "No new chi-square, likelihood, p-values, or score validation is performed in v4.400.",
                  },
                  {
                      "status_id": "V4_400_STATUS_004",
                      "status": "support_still_blocked",
                      "detail": "support_allowed=false remains active.",
                  },
              ])

              expansion_summary = pd.DataFrame([
                  {"summary_metric": "broader_source_candidate_rows", "value": int(len(expansion_candidates)), "note": "Includes current anchor plus expansion candidates."},
                  {"summary_metric": "source_expansion_review_packet_rows", "value": int(len(review_packet)), "note": "Human-review rows for later source inventory."},
                  {"summary_metric": "current_anchor_rows", "value": int((expansion_candidates["source_lane_type"] == "current_anchor").sum()), "note": "Audited BOSS DR12 three-row anchor retained."},
                  {"summary_metric": "eboss_tracer_candidate_rows", "value": int((expansion_candidates["source_lane_type"] == "broader_sdss_eboss_tracer").sum()), "note": "eBOSS LRG, ELG, QSO lanes."},
                  {"summary_metric": "independent_survey_candidate_rows", "value": int((expansion_candidates["source_lane_type"] == "independent_survey_family").sum()), "note": "WiggleZ, VIPERS, GAMA lanes."},
                  {"summary_metric": "new_data_loaded_now", "value": 0, "note": "No new observed values loaded."},
                  {"summary_metric": "new_chi_square_computed", "value": 0, "note": "No new chi-square computed."},
                  {"summary_metric": "support_allowed", "value": 0, "note": "No support claim is allowed."},
              ])

              limitation_update = pd.DataFrame([
                  {"limit_id": "V4_400_LIMIT_001", "limit": "This is a manifest only, not a broader-source test.", "status": "active_limit"},
                  {"limit_id": "V4_400_LIMIT_002", "limit": "No new observed values or covariance values are loaded in v4.400.", "status": "blocked_by_design"},
                  {"limit_id": "V4_400_LIMIT_003", "limit": "Every expansion family requires later source inventory, definition matching, and covariance gating.", "status": "active_limit"},
                  {"limit_id": "V4_400_LIMIT_004", "limit": "No likelihood, p-values, score, or support claim is allowed.", "status": "blocked_by_design"},
                  {"limit_id": "V4_400_LIMIT_005", "limit": "The existing BOSS DR12 diagnostic remains narrow and cannot be generalized by this manifest.", "status": "active_limit"},
              ])

              gap_update = pd.DataFrame([
                  {"gap_id": "V4_400_GAP_001", "gap": "Broader source expansion manifest created.", "status_after_v4_400": "manifest_created_no_values", "next_gate": "human_source_expansion_review_then_v4_401_source_expansion_review_ingest"},
                  {"gap_id": "V4_400_GAP_002", "gap": "Official source inventory for expanded lanes remains open.", "status_after_v4_400": "still_open", "next_gate": "v4_401_review_ingest_then_source_inventory_lanes"},
                  {"gap_id": "V4_400_GAP_003", "gap": "New observed-value and covariance ingest remains blocked.", "status_after_v4_400": "still_blocked", "next_gate": "later_source_specific_gates"},
                  {"gap_id": "V4_400_GAP_004", "gap": "Multi-survey likelihood remains unbuilt.", "status_after_v4_400": "still_blocked", "next_gate": "later_after_broader_source_and_covariance_repair"},
                  {"gap_id": "V4_400_GAP_005", "gap": "Support claims remain blocked.", "status_after_v4_400": "still_blocked", "next_gate": "no_support_claims_allowed_from_v4_400"},
              ])

              hard_checks = {
                  "input_v4_399a_summary_found": summary399a.get("version") == "v4.399A",
                  "input_v4_399a_rules_all_passed": summary_rules_all_passed(summary399a),
                  "input_v4_399a_failed_gates_none": summary399a.get("failed_gates") == "none",
                  "input_v4_399a_writeup_created": summary399a.get("diagnostic_writeup_created") is True,
                  "input_v4_399a_forbidden_hits_zero": summary399a.get("forbidden_phrase_hits") == 0,
                  "input_v4_399a_prior_diagonal_locked": summary399a.get("prior_guarded_diagonal_chi_square_sum") == 1.362038876169214,
                  "input_v4_399a_primary_chisq_locked": summary399a.get("primary_dM_Hz_chi_square_dry_run_sum") == 1.384804886905097,
                  "input_v4_399a_robustness_min_locked": summary399a.get("robustness_min_chi_square") == 1.2298323467773977,
                  "input_v4_399a_robustness_max_locked": summary399a.get("robustness_max_chi_square") == 1.384804886905097,
                  "input_v4_399a_no_new_chisq": summary399a.get("new_chi_square_computed") is False,
                  "input_v4_399a_no_likelihood": summary399a.get("likelihood_computed") is False,
                  "input_v4_399a_no_p_values": summary399a.get("p_values_computed") is False,
                  "input_v4_399a_no_score_valid": summary399a.get("score_valid") is False,
                  "input_v4_399a_no_support": summary399a.get("support_allowed") is False,

                  "rules399a_all_passed": passed_column_all(rules399a),
                  "diagnostic_values_rows_equal_7": len(diagnostic_values) == 7,
                  "findings_rows_equal_6": len(findings) == 6,
                  "limitations_rows_equal_6": len(limitations) == 6,
                  "next_routes_rows_at_least_2": len(next_routes) >= 2,
                  "writeup_status_rows_at_least_4": len(status) >= 4,
                  "writeup_sections_rows_equal_6": len(writeup_sections) == 6,

                  "expansion_candidates_rows_equal_9": len(expansion_candidates) == 9,
                  "review_packet_rows_equal_8": len(review_packet) == 8,
                  "current_anchor_rows_equal_1": int((expansion_candidates["source_lane_type"] == "current_anchor").sum()) == 1,
                  "eboss_candidate_rows_equal_3": int((expansion_candidates["source_lane_type"] == "broader_sdss_eboss_tracer").sum()) == 3,
                  "lowz_anchor_candidate_rows_equal_2": int((expansion_candidates["source_lane_type"] == "low_redshift_anchor_family").sum()) == 2,
                  "independent_candidate_rows_equal_3": int((expansion_candidates["source_lane_type"] == "independent_survey_family").sum()) == 3,
                  "lane_summary_rows_equal_4": len(lane_summary) == 4,
                  "expansion_status_rows_equal_4": len(expansion_status) == 4,
                  "expansion_summary_rows_equal_8": len(expansion_summary) == 8,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_new_data_loaded_candidates": false_col(expansion_candidates, "new_data_loaded_now") and false_col(review_packet, "new_data_loaded_now"),
                  "no_new_chi_square_candidates": false_col(expansion_candidates, "new_chi_square_computed") and false_col(review_packet, "new_chi_square_computed"),
                  "no_score_valid": false_col(expansion_candidates, "score_valid") and false_col(review_packet, "score_valid"),
                  "no_support_allowed": false_col(expansion_candidates, "support_allowed") and false_col(review_packet, "support_allowed") and false_col(lane_summary, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary400 = {
                  "version": "v4.400",
                  "route_name": "v4_400_broader_source_expansion_manifest_no_support_claims",
                  "expected_result": "v4_400_broader_source_expansion_manifest_passed_no_values_no_support_claims",
                  "input_version": "v4.399A",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "broader_source_candidate_rows": int(len(expansion_candidates)),
                  "source_expansion_review_packet_rows": int(len(review_packet)),
