name: 000 TAIRID v4.103 Reference Uncertainty Sufficiency Gate

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-103-reference-uncertainty-sufficiency-gate.yml"

jobs:
  tairid-v4-103-reference-uncertainty-sufficiency-gate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.103 reference uncertainty sufficiency gate
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_103_reference_uncertainty_sufficiency_gate

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_103_reference_uncertainty_sufficiency_gate")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_103_reference_uncertainty_sufficiency_gate"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse additional chain sample files.",
              "This does not run CAMB.",
              "This does not compute a new covariance matrix.",
              "This does not compute final Planck reference uncertainty.",
              "This checks whether the v4.102.1 256-sample one-file-prefix covariance mechanics diagnostic is sufficient to become a final reference uncertainty.",
              "A pass may mean the sufficiency gate correctly refuses finalization and routes to broader sample coverage."
          ]

          UPSTREAM_LOCKS = {
              "v4_102_1_larger_bounded_weighted_covariance_mechanics_probe_rank_warning_repair": {
                  "readiness_label": "larger_bounded_weighted_covariance_mechanics_probe_passed_ready_for_reference_uncertainty_sufficiency_gate",
                  "valid_sample_row_count": 256,
                  "solved_sample_count": 256,
                  "sample_output_vector_count": 256,
                  "vector_component_record_count": 2560,
                  "effective_sample_size": 156.27004909983634,
                  "weighted_mean_vector_computed": True,
                  "weighted_covariance_matrix_computed": True,
                  "fsigma8_covariance_matrix_computed": True,
                  "full_covariance_rank": 4,
                  "fsigma8_covariance_rank": 3,
                  "full_covariance_dimension": 10,
                  "fsigma8_covariance_dimension": 5,
                  "source_coverage": "one_file_prefix_only",
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "full_chain_sample_files_parsed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_98_bounded_reference_uncertainty_scaling_plan": {
                  "readiness_label": "bounded_reference_uncertainty_scaling_plan_passed_ready_for_larger_bounded_sample_parser_probe",
                  "next_parser_target_valid_rows": 256,
                  "next_parser_minimum_valid_rows": 128,
                  "final_reference_uncertainty_allowed": False
              }
          }

          SUFFICIENCY_CRITERIA = [
              {
                  "criterion_id": "mechanics_outputs_exist",
                  "requirement": "Weighted mean and covariance mechanics exist from a solved sample batch.",
                  "required_for_final": True,
                  "current_value": "weighted_mean=True; covariance=True; fsigma8_covariance=True",
                  "pass_for_mechanics": True,
                  "pass_for_final_reference": True
              },
              {
                  "criterion_id": "sample_count_floor",
                  "requirement": "A bounded diagnostic should have at least 256 solved samples before judging scaling direction.",
                  "required_for_final": False,
                  "current_value": "256 solved samples",
                  "pass_for_mechanics": True,
                  "pass_for_final_reference": True
              },
              {
                  "criterion_id": "effective_sample_size_floor",
                  "requirement": "A final reference covariance needs a much larger effective sample size than the current prefix diagnostic.",
                  "required_for_final": True,
                  "current_value": "effective sample size = 156.27004909983634",
                  "pass_for_mechanics": True,
                  "pass_for_final_reference": False
              },
              {
                  "criterion_id": "full_covariance_rank",
                  "requirement": "A final 10D covariance should not be treated as sufficient when rank is far below dimension.",
                  "required_for_final": True,
                  "current_value": "rank 4 of 10",
                  "pass_for_mechanics": True,
                  "pass_for_final_reference": False
              },
              {
                  "criterion_id": "fsigma8_covariance_rank",
                  "requirement": "A final 5D fsigma8 covariance should not be treated as sufficient when rank is below dimension.",
                  "required_for_final": True,
                  "current_value": "rank 3 of 5",
                  "pass_for_mechanics": True,
                  "pass_for_final_reference": False
              },
              {
                  "criterion_id": "chain_file_coverage",
                  "requirement": "A final Planck reference uncertainty should not come from one chain-file prefix only.",
                  "required_for_final": True,
                  "current_value": "one_file_prefix_only",
                  "pass_for_mechanics": True,
                  "pass_for_final_reference": False
              },
              {
                  "criterion_id": "full_chain_status",
                  "requirement": "A final reference uncertainty requires explicit full-chain or justified representative multi-file coverage.",
                  "required_for_final": True,
                  "current_value": "full_chain_sample_files_parsed = false",
                  "pass_for_mechanics": True,
                  "pass_for_final_reference": False
              },
              {
                  "criterion_id": "claim_boundary",
                  "requirement": "Final pressure and validation claims must remain blocked.",
                  "required_for_final": True,
                  "current_value": "final pressure=false; validation=false",
                  "pass_for_mechanics": True,
                  "pass_for_final_reference": True
              }
          ]

          GATE_DECISION_RECORD = {
              "mechanics_gate_passed": True,
              "final_reference_uncertainty_sufficient": False,
              "final_reference_uncertainty_rejection_reason": (
                  "The v4.102.1 256-sample covariance mechanics diagnostic works, but it is still one-file-prefix only; "
                  "effective sample size is about 156; full covariance rank is 4 of 10; fsigma8 covariance rank is 3 of 5. "
                  "This is not enough to call final Planck reference uncertainty."
              ),
              "allowed_next_route": "broader multi-file or larger-chain coverage design",
              "recommended_next_target_valid_rows": 1024,
              "recommended_next_minimum_valid_rows": 512,
              "recommended_chain_member_strategy": "parse a broader bounded span across multiple base chain sample members if available, rather than only extending one prefix",
              "allowed_to_compute_final_RSD_pressure": False,
              "allowed_to_claim_TAIRID_validation": False,
              "allowed_to_call_v4_102_1_final_Planck_reference_uncertainty": False
          }

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_104_multi_file_broader_chain_coverage_design",
                  "purpose": "Design a broader Planck chain coverage route using multiple chain members or a larger representative bounded slice.",
                  "why_next": "The 256-sample one-file-prefix covariance mechanics works but is not sufficient for final reference uncertainty."
              },
              {
                  "priority": 2,
                  "route_id": "v4_105_multi_file_broader_sample_parser_probe",
                  "purpose": "Parse a larger/multi-file bounded sample set with a target of 1024 valid rows and minimum of 512.",
                  "why_next": "Higher effective sample size and broader chain coverage are needed before a stronger covariance diagnostic."
              },
              {
                  "priority": 3,
                  "route_id": "v4_106_larger_broader_solver_batch_design",
                  "purpose": "Design chunked CAMB solving for the broader parsed sample set.",
                  "why_next": "Solver batch must scale cautiously after parsing succeeds."
              },
              {
                  "priority": 4,
                  "route_id": "v4_107_ELG_or_WiggleZ_parallel_backlog",
                  "purpose": "Parallel route for parked growth-family incompleteness.",
                  "why_next": "Planck reference uncertainty is only one blocker; ELG and WiggleZ remain incomplete."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "The v4.102.1 256-sample covariance is final Planck reference uncertainty.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The reference uncertainty sufficiency gate validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The one-file-prefix covariance is enough for final RSD pressure.",
              "Low covariance rank can be ignored for final use.",
              "The next larger sample run may be treated as validation."
          ]

          failed_gates = []
          warnings = [
              "sufficiency_gate_only",
              "v4_102_1_covariance_mechanics_passed",
              "final_reference_uncertainty_rejected",
              "one_file_prefix_only",
              "effective_sample_size_still_limited",
              "full_covariance_rank_low",
              "fsigma8_covariance_rank_low",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          mechanics_pass = all(row["pass_for_mechanics"] for row in SUFFICIENCY_CRITERIA)
          final_pass = all(row["pass_for_final_reference"] for row in SUFFICIENCY_CRITERIA)

          if not UPSTREAM_LOCKS["v4_102_1_larger_bounded_weighted_covariance_mechanics_probe_rank_warning_repair"]["weighted_covariance_matrix_computed"]:
              failed_gates.append("upstream_weighted_covariance_mechanics_missing")

          if not mechanics_pass:
              failed_gates.append("mechanics_gate_not_passed")

          if final_pass:
              failed_gates.append("final_reference_sufficiency_unexpectedly_true")

          if GATE_DECISION_RECORD["final_reference_uncertainty_sufficient"] is not False:
              failed_gates.append("final_reference_uncertainty_marked_sufficient_too_early")

          if GATE_DECISION_RECORD["allowed_to_compute_final_RSD_pressure"] is not False:
              failed_gates.append("final_RSD_pressure_allowed_too_early")

          if GATE_DECISION_RECORD["allowed_to_claim_TAIRID_validation"] is not False:
              failed_gates.append("validation_claim_allowed_too_early")

          if GATE_DECISION_RECORD["recommended_next_target_valid_rows"] < 1024:
              failed_gates.append("next_target_rows_too_low")

          if GATE_DECISION_RECORD["recommended_next_minimum_valid_rows"] < 512:
              failed_gates.append("next_minimum_rows_too_low")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "v4.102.1 256-sample covariance is final planck reference uncertainty",
              "full planck chains were imported",
              "final rsd pressure score",
              "validates tairid cosmology",
              "one-file-prefix covariance is enough for final rsd pressure",
              "low covariance rank can be ignored for final use",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "reference_uncertainty_sufficiency_gate_passed_not_final_ready_for_multi_file_broader_chain_coverage_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_256_sample_covariance_mechanics_carried",
                  "pass": UPSTREAM_LOCKS["v4_102_1_larger_bounded_weighted_covariance_mechanics_probe_rank_warning_repair"]["sample_output_vector_count"] == 256,
                  "result": "v4.102.1 produced 256 sample output vectors and covariance mechanics",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "mechanics_gate_passed",
                  "pass": mechanics_pass,
                  "result": "All mechanics criteria pass.",
                  "boundary": "Mechanics pass is not final reference uncertainty."
              },
              {
                  "rule_id": "final_reference_uncertainty_rejected",
                  "pass": final_pass is False,
                  "result": "Final reference uncertainty is rejected at this gate.",
                  "boundary": "This rejection is the correct safe result."
              },
              {
                  "rule_id": "rank_limit_recorded",
                  "pass": True,
                  "result": "full rank 4/10 and fsigma8 rank 3/5 recorded as insufficiency signals",
                  "boundary": "Rank limit is not a mechanics failure."
              },
              {
                  "rule_id": "one_file_prefix_boundary_preserved",
                  "pass": UPSTREAM_LOCKS["v4_102_1_larger_bounded_weighted_covariance_mechanics_probe_rank_warning_repair"]["source_coverage"] == "one_file_prefix_only",
                  "result": "source coverage is one_file_prefix_only",
                  "boundary": "Not final posterior coverage."
              },
              {
                  "rule_id": "next_target_rows_declared",
                  "pass": GATE_DECISION_RECORD["recommended_next_target_valid_rows"] >= 1024 and GATE_DECISION_RECORD["recommended_next_minimum_valid_rows"] >= 512,
                  "result": "next target 1024 valid rows with minimum 512",
                  "boundary": "Design target only."
              },
              {
                  "rule_id": "final_pressure_still_blocked",
                  "pass": GATE_DECISION_RECORD["allowed_to_compute_final_RSD_pressure"] is False,
                  "result": "final RSD pressure remains blocked",
                  "boundary": "No final pressure score."
              },
              {
                  "rule_id": "validation_still_blocked",
                  "pass": GATE_DECISION_RECORD["allowed_to_claim_TAIRID_validation"] is False,
                  "result": "TAIRID validation claim remains blocked",
                  "boundary": "No validation claim."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 13,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No overclaim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_103_rules_passed")

          if failed_gates:
              readiness_label = "reference_uncertainty_sufficiency_gate_failed"
              next_allowed_step = "Repair sufficiency logic before broadening chain coverage."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.104 multi-file broader chain coverage design. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_sample_output_vector_count": 256,
              "upstream_effective_sample_size": 156.27004909983634,
              "upstream_full_covariance_rank": 4,
              "upstream_full_covariance_dimension": 10,
              "upstream_fsigma8_covariance_rank": 3,
              "upstream_fsigma8_covariance_dimension": 5,
              "mechanics_gate_passed": mechanics_pass,
              "final_reference_uncertainty_sufficient": False,
              "final_reference_uncertainty_rejected": True,
              "recommended_next_target_valid_rows": GATE_DECISION_RECORD["recommended_next_target_valid_rows"],
              "recommended_next_minimum_valid_rows": GATE_DECISION_RECORD["recommended_next_minimum_valid_rows"],
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "sufficiency_criteria": SUFFICIENCY_CRITERIA,
              "gate_decision_record": GATE_DECISION_RECORD,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "mechanics_gate_passed": mechanics_pass,
                  "final_reference_uncertainty_sufficient": False,
                  "final_reference_uncertainty_rejected": True,
                  "recommended_next_target_valid_rows": GATE_DECISION_RECORD["recommended_next_target_valid_rows"],
                  "recommended_next_minimum_valid_rows": GATE_DECISION_RECORD["recommended_next_minimum_valid_rows"],
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_103_reference_uncertainty_sufficiency_gate.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "sufficiency_criteria_v4_103.csv",
              SUFFICIENCY_CRITERIA,
              ["criterion_id", "requirement", "required_for_final", "current_value", "pass_for_mechanics", "pass_for_final_reference"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_103.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_103.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_103.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.103 — Reference Uncertainty Sufficiency Gate")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.102.1 proved that the 256-sample covariance mechanics work. v4.103 asks whether that is enough to become final Planck reference uncertainty.")
          md.append("")
          md.append("The safe answer is no. The current covariance is one-file-prefix only, has effective sample size about 156, full covariance rank 4 of 10, and fsigma8 covariance rank 3 of 5.")
          md.append("")
          md.append("That means the mechanics passed, but final reference uncertainty remains blocked. The next move is broader chain coverage.")
          md.append("")
          md.append("## Gate decision")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in GATE_DECISION_RECORD.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Sufficiency criteria")
          md.append("")
          md.append("| Criterion | Mechanics | Final reference | Current value |")
          md.append("|---|---|---|---|")
          for row in SUFFICIENCY_CRITERIA:
              md.append(f"| `{row['criterion_id']}` | `{row['pass_for_mechanics']}` | `{row['pass_for_final_reference']}` | `{row['current_value']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_103_reference_uncertainty_sufficiency_gate.json",
              "tairid_v4_103_reference_uncertainty_sufficiency_gate.md",
              "sufficiency_criteria_v4_103.csv",
              "blocked_claims_v4_103.csv",
              "next_route_options_v4_103.csv",
              "rule_results_v4_103.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_103_reference_uncertainty_sufficiency_gate.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.103 reference uncertainty sufficiency gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-103-reference-uncertainty-sufficiency-gate
          path: artifacts/tairid_v4_103_reference_uncertainty_sufficiency_gate/
