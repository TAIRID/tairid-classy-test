name: Run TAIRID SH0ES equation edge likelihood v2.1

on:
  workflow_dispatch:

jobs:
  run-tairid-shoes-equation-edge-likelihood-v2-1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy matplotlib astropy pandas

      - name: Run TAIRID SH0ES equation edge likelihood v2.1
        run: |
          python run_tairid_shoes_equation_edge_likelihood_v2_1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-equation-edge-likelihood-v2-1-output
          path: |
            tairid_shoes_equation_edge_likelihood_v2_1_outputs/**
