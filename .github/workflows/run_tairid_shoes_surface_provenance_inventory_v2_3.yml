name: Run TAIRID SH0ES Surface Provenance Inventory v2.3

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-surface-provenance-inventory-v2-3:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_surface_provenance_inventory_v2_3.py
          echo "v2.3 SH0ES surface provenance inventory found."

      - name: Run TAIRID SH0ES Surface Provenance Inventory v2.3
        run: |
          python run_tairid_shoes_surface_provenance_inventory_v2_3.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-surface-provenance-inventory-v2-3-output
          path: |
            tairid_shoes_surface_provenance_inventory_v2_3_outputs/**
