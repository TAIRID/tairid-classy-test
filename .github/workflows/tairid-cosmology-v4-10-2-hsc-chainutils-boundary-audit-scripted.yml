name: TAIRID Cosmology v4.10.2 HSC Chainutils Boundary Audit Scripted

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-10-2-hsc-chainutils-boundary-audit-scripted.yml"
      - "scripts/tairid_cosmology_v4_10_2_hsc_chainutils_boundary_audit.py"

jobs:
  hsc-chainutils-boundary-audit-scripted:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.10.2 HSC chainutils boundary audit scripted
        shell: bash
        run: |
          python scripts/tairid_cosmology_v4_10_2_hsc_chainutils_boundary_audit.py

      - name: Upload TAIRID v4.10.2 HSC chainutils boundary audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v4-10-2-hsc-chainutils-boundary-audit-scripted
          path: artifacts/tairid_cosmology_v4_10_2_hsc_chainutils_boundary_audit_scripted/
