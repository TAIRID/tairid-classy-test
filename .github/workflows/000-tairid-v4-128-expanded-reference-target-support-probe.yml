          md.append("| Target | z | Method | Support status |")
          md.append("|---|---:|---|---|")
          for row in reference_target_records:
              md.append(f"| `{row['target_id']}` | `{row['z']}` | `{row['support_method']}` | `{row['support_status']}` |")
          md.append("")
          md.append("## System health")
