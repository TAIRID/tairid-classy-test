name: 000 TAIRID v4.128 Expanded Reference Target Support Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-128-expanded-reference-target-support-probe.yml"

jobs:
  tairid-v4-128-expanded-reference-target-support-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.128 expanded reference target support probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_128_expanded_reference_target_support_probe

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_128_expanded_reference_target_support_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_128_expanded_reference_target_support_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This does not compute expanded observed pressure.",
              "This builds an expanded reference target-support ledger using the carried five-slot reference and an explicitly labeled interpolation/sensitivity fallback.",
              "A pass means every expanded observed redshift has reference-target support, but not final Planck posterior covariance."
          ]

          UPSTREAM_LOCKS = {
              "v4_127_expanded_growth_bridge_design": {
                  "readiness_label": "expanded_growth_bridge_design_passed_ready_for_expanded_reference_target_support_probe",
                  "upstream_source_inventory_performed": True,
                  "upstream_candidate_inventory_count": 9,
                  "expanded_candidate_count": 13,
                  "expanded_lane_count": 7,
                  "reference_target_requirement_count": 4,
                  "observed_covariance_limit_count": 4,
                  "verified_BOSS_core_preserved": True,
                  "non_BOSS_candidate_values_finalized": False,
                  "expanded_reference_target_support_exists": False,
                  "expanded_bridge_pressure_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_126_growth_family_source_inventory_probe": {
                  "readiness_label": "growth_family_source_inventory_probe_passed_ready_for_expanded_growth_bridge_design",
                  "source_inventory_performed": True,
                  "candidate_inventory_count": 9,
                  "growth_family_count": 5,
                  "fetched_source_count": 8,
                  "primary_candidate_count": 8,
                  "sensitivity_or_park_count": 1,
                  "expanded_bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          # Carried from the prior five-slot reference bridge. These are the only directly carried
          # reference means/covariance entries in this probe.
          PRIOR_REFERENCE_REDSHIFTS = [0.15, 0.38, 0.51, 0.61, 2.33]
          PRIOR_REFERENCE_FSIGMA8_MEAN = [
              0.4618473025984107,
              0.47880399561515946,
              0.4766635460319918,
              0.4711826988812538,
              0.29766798079042817
          ]
          PRIOR_REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED = [
              [5.562209100820247e-05, 4.4037586707431904e-05, 3.754755889442331e-05, 3.297837710717998e-05, 4.737025053749357e-06],
              [4.4037586707431904e-05, 3.5891627510371965e-05, 3.12227605615546e-05, 2.789979758962016e-05, 6.095691128632226e-06],
              [3.754755889442331e-05, 3.12227605615546e-05, 2.752609243243442e-05, 2.4871160721047073e-05, 6.61700580879124e-06],
              [3.297837710717998e-05, 2.789979758962016e-05, 2.4871160721047073e-05, 2.2676250563482697e-05, 6.9020814479945925e-06],
              [4.737025053749357e-06, 6.095691128632226e-06, 6.61700580879124e-06, 6.9020814479945925e-06, 5.771821619405124e-06]
          ]

          EXPANDED_REFERENCE_TARGETS = [
              {"target_id": "z0067_6dFGS", "z": 0.067, "source_role": "new_low_z_independent_anchor"},
              {"target_id": "z0150_MGS", "z": 0.15, "source_role": "carried_existing_low_z_anchor"},
              {"target_id": "z0380_BOSS", "z": 0.38, "source_role": "carried_verified_BOSS_core"},
              {"target_id": "z0440_WiggleZ", "z": 0.44, "source_role": "new_WiggleZ_mid_z"},
              {"target_id": "z0510_BOSS", "z": 0.51, "source_role": "carried_verified_BOSS_core"},
              {"target_id": "z0600_WiggleZ", "z": 0.60, "source_role": "new_WiggleZ_mid_z"},
              {"target_id": "z0610_BOSS", "z": 0.61, "source_role": "carried_verified_BOSS_core"},
              {"target_id": "z0698_eBOSS_LRG", "z": 0.698, "source_role": "new_eBOSS_LRG"},
              {"target_id": "z0730_WiggleZ", "z": 0.73, "source_role": "new_WiggleZ_mid_z"},
              {"target_id": "z0800_VIPERS", "z": 0.80, "source_role": "new_VIPERS_high_mid_z"},
              {"target_id": "z0850_eBOSS_ELG", "z": 0.85, "source_role": "new_eBOSS_ELG"},
              {"target_id": "z1480_eBOSS_QSO", "z": 1.48, "source_role": "new_eBOSS_QSO"}
          ]

          REFERENCE_SUPPORT_POLICY = [
              {
                  "policy_id": "prior_five_slot_values_are_carried",
                  "requirement": "Reference values at z=0.15, 0.38, 0.51, 0.61, and 2.33 are carried from the prior regularized reference bridge.",
                  "reason": "These are the only reference targets currently supported by the carried covariance."
              },
              {
                  "policy_id": "new_targets_use_interpolation_support",
                  "requirement": "New redshift targets use an explicit interpolation/extrapolation sensitivity fallback, not a final Planck posterior.",
                  "reason": "Expanded reference values cannot be treated as final until a CAMB/chain-based expanded vector exists."
              },
              {
                  "policy_id": "expanded_covariance_is_sensitivity_fallback",
                  "requirement": "Expanded covariance support is diagonal sensitivity fallback plus exact carried variances at matched redshifts.",
                  "reason": "The old five-slot covariance cannot be silently stretched into a full expanded posterior covariance."
              },
              {
                  "policy_id": "expanded_pressure_not_allowed",
                  "requirement": "This probe may declare target support but cannot compute expanded observed pressure.",
                  "reason": "Pressure comes only after reference support and bridge design agree."
              },
              {
                  "policy_id": "next_probe_may_compute_guarded_expanded_bridge",
                  "requirement": "The next probe may compute diagnostic expanded lanes only if it carries the interpolation-fallback warning.",
                  "reason": "The next bridge remains diagnostic, not final."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The expanded reference target support probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "Expanded reference covariance is a full Planck posterior covariance.",
              "Interpolated reference targets are the same as CAMB chain outputs.",
              "Expanded bridge pressure is final.",
              "Zero pressure-z proves TAIRID.",
              "No expanded sensitivity audit is needed.",
              "Candidate growth values are publication-grade final inputs."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_129_expanded_growth_bridge_probe",
                  "purpose": "Compute guarded expanded growth bridge lanes using expanded reference target support and explicit interpolation/covariance fallback warnings.",
                  "why_next": "v4.128 gives every expanded redshift a reference target, but not final covariance."
              },
              {
                  "priority": 2,
                  "route_id": "v4_130_expanded_growth_sensitivity_audit",
                  "purpose": "Audit whether expanded family choices alter pressure or only chi-square.",
                  "why_next": "Any expanded bridge must be sensitivity-audited before interpretation."
              },
              {
                  "priority": 3,
                  "route_id": "v4_131_CMB_or_CAMB_reference_upgrade_design",
                  "purpose": "Design a stronger reference-support route using CAMB/chain outputs for all expanded redshifts.",
                  "why_next": "Interpolation fallback is not final Planck posterior support."
              },
              {
                  "priority": 4,
                  "route_id": "v4_132_external_standard_cosmology_comparison_plan",
                  "purpose": "Design comparison language against normal ΛCDM growth pipelines and literature constraints.",
                  "why_next": "Diagnostic stability must be contextualized before public-facing claims."
              }
          ]

          failed_gates = []
          warnings = [
              "reference_support_probe_only",
              "new_reference_targets_use_interpolation_fallback",
              "expanded_covariance_is_sensitivity_fallback_not_full_posterior",
              "no_expanded_bridge_pressure_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def linear_interp_or_extrapolate(x, xs, ys):
              pairs = sorted(zip(xs, ys), key=lambda p: p[0])
              if x in xs:
                  return ys[xs.index(x)], "carried_exact_prior_reference"
              if x < pairs[0][0]:
                  x0, y0 = pairs[0]
                  x1, y1 = pairs[1]
                  method = "linear_extrapolation_below_prior_range"
              elif x > pairs[-1][0]:
                  x0, y0 = pairs[-2]
                  x1, y1 = pairs[-1]
                  method = "linear_extrapolation_above_prior_range"
              else:
                  method = "linear_interpolation_between_prior_targets"
                  x0 = y0 = x1 = y1 = None
                  for i in range(len(pairs) - 1):
                      if pairs[i][0] <= x <= pairs[i + 1][0]:
                          x0, y0 = pairs[i]
                          x1, y1 = pairs[i + 1]
                          break
              slope = (y1 - y0) / (x1 - x0)
              return y0 + slope * (x - x0), method

          def nearest_prior_variance(x):
              distances = [abs(x - z) for z in PRIOR_REFERENCE_REDSHIFTS]
              index = distances.index(min(distances))
              nearest_z = PRIOR_REFERENCE_REDSHIFTS[index]
              nearest_var = PRIOR_REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED[index][index]
              return nearest_z, nearest_var

          reference_target_records = []
          for target in EXPANDED_REFERENCE_TARGETS:
              z = float(target["z"])
              value, method = linear_interp_or_extrapolate(
                  z,
                  PRIOR_REFERENCE_REDSHIFTS,
                  PRIOR_REFERENCE_FSIGMA8_MEAN
              )
              nearest_z, nearest_var = nearest_prior_variance(z)

              if method == "carried_exact_prior_reference":
                  support_status = "carried_exact_prior_reference"
                  variance_status = "carried_prior_regularized_variance"
                  variance_inflation = 1.0
              elif "extrapolation" in method:
                  support_status = "interpolation_fallback_extrapolated_not_final"
                  variance_status = "nearest_prior_variance_inflated_sensitivity_fallback"
                  variance_inflation = 4.0
              else:
                  support_status = "interpolation_fallback_not_final"
                  variance_status = "nearest_prior_variance_inflated_sensitivity_fallback"
                  variance_inflation = 2.0

              variance = nearest_var * variance_inflation

              reference_target_records.append({
                  "target_id": target["target_id"],
                  "z": z,
                  "source_role": target["source_role"],
                  "reference_fsigma8_support": value,
                  "support_method": method,
                  "support_status": support_status,
                  "nearest_prior_z": nearest_z,
                  "nearest_prior_variance": nearest_var,
                  "variance_inflation": variance_inflation,
                  "reference_variance_support": variance,
                  "variance_status": variance_status,
                  "claim_boundary": "diagnostic_reference_support_only_not_final_posterior"
              })

          n = len(reference_target_records)
          expanded_covariance_records = []
          for i in range(n):
              for j in range(n):
                  if i == j:
                      value = reference_target_records[i]["reference_variance_support"]
                      status = reference_target_records[i]["variance_status"]
                  else:
                      value = 0.0
                      status = "off_diagonal_not_available_zeroed_sensitivity_fallback"
                  expanded_covariance_records.append({
                      "row_target_id": reference_target_records[i]["target_id"],
                      "column_target_id": reference_target_records[j]["target_id"],
                      "row_z": reference_target_records[i]["z"],
                      "column_z": reference_target_records[j]["z"],
                      "covariance_value": value,
                      "covariance_status": status,
                      "record_scope": "expanded_reference_sensitivity_fallback_not_full_posterior"
                  })

          exact_count = sum(1 for row in reference_target_records if row["support_method"] == "carried_exact_prior_reference")
          interpolated_count = sum(1 for row in reference_target_records if row["support_method"] == "linear_interpolation_between_prior_targets")
          extrapolated_count = sum(1 for row in reference_target_records if "extrapolation" in row["support_method"])
          all_targets_have_support = all(row["reference_fsigma8_support"] != "" for row in reference_target_records)
          all_targets_have_variance = all(row["reference_variance_support"] > 0 for row in reference_target_records)
          expanded_reference_vector_complete = len(reference_target_records) == len(EXPANDED_REFERENCE_TARGETS)
          expanded_covariance_sensitivity_matrix_complete = len(expanded_covariance_records) == n * n
          full_planck_posterior_available = False
          expanded_bridge_pressure_allowed_next = True
          final_pressure_ready = False

          if UPSTREAM_LOCKS["v4_127_expanded_growth_bridge_design"]["expanded_reference_target_support_exists"] is not False:
              failed_gates.append("upstream_reference_support_unexpectedly_exists")

          if not expanded_reference_vector_complete:
              failed_gates.append("expanded_reference_vector_incomplete")

          if not all_targets_have_support:
              failed_gates.append("not_all_targets_have_reference_support")

          if not all_targets_have_variance:
              failed_gates.append("not_all_targets_have_variance_support")

          if exact_count < 4:
              failed_gates.append("too_few_exact_carried_prior_targets")

          if interpolated_count < 6:
              failed_gates.append("too_few_interpolation_targets")

          if extrapolated_count < 1:
              failed_gates.append("extrapolation_warning_not_triggered")

          if not expanded_covariance_sensitivity_matrix_complete:
              failed_gates.append("expanded_covariance_sensitivity_matrix_incomplete")

          if full_planck_posterior_available:
              failed_gates.append("full_planck_posterior_unexpectedly_available")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "expanded reference covariance is a full planck posterior covariance",
              "interpolated reference targets are the same as camb chain outputs",
              "expanded bridge pressure is final",
              "zero pressure-z proves tairid",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "expanded_reference_target_support_probe_passed_interpolation_fallback_ready_for_guarded_expanded_growth_bridge_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_expanded_design_carried",
                  "pass": UPSTREAM_LOCKS["v4_127_expanded_growth_bridge_design"]["readiness_label"] == "expanded_growth_bridge_design_passed_ready_for_expanded_reference_target_support_probe",
                  "result": "v4.127 expanded bridge design carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "expanded_reference_targets_complete",
                  "pass": expanded_reference_vector_complete and all_targets_have_support,
                  "result": f"target_count={len(reference_target_records)}",
                  "boundary": "Reference support only, not pressure."
              },
              {
                  "rule_id": "exact_prior_targets_carried",
                  "pass": exact_count >= 4,
                  "result": f"exact_count={exact_count}",
                  "boundary": "Only prior redshifts are exact."
              },
              {
                  "rule_id": "interpolation_and_extrapolation_labeled",
                  "pass": interpolated_count >= 6 and extrapolated_count >= 1,
                  "result": f"interpolated={interpolated_count}; extrapolated={extrapolated_count}",
                  "boundary": "Fallback support, not CAMB/chain support."
              },
              {
                  "rule_id": "expanded_covariance_sensitivity_matrix_declared",
                  "pass": expanded_covariance_sensitivity_matrix_complete and all_targets_have_variance,
                  "result": f"covariance_records={len(expanded_covariance_records)}",
                  "boundary": "Diagonal sensitivity fallback, not full posterior covariance."
              },
              {
                  "rule_id": "full_planck_posterior_blocked",
                  "pass": full_planck_posterior_available is False,
                  "result": "full Planck posterior covariance remains unavailable for expanded vector",
                  "boundary": "Blocks final pressure."
              },
              {
                  "rule_id": "guarded_expanded_bridge_allowed_next",
                  "pass": expanded_bridge_pressure_allowed_next is True and final_pressure_ready is False,
                  "result": "next probe may compute guarded diagnostic expanded bridge, not final pressure",
                  "boundary": "Diagnostic only."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_128_rules_passed")

          if failed_gates:
              readiness_label = "expanded_reference_target_support_probe_failed"
              next_allowed_step = "Repair expanded reference target support before expanded bridge probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.129 guarded expanded growth bridge probe. "
                  "Carry interpolation/covariance fallback warnings. Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "expanded_reference_target_count": len(reference_target_records),
              "exact_prior_target_count": exact_count,
              "interpolated_target_count": interpolated_count,
              "extrapolated_target_count": extrapolated_count,
              "all_targets_have_support": all_targets_have_support,
              "all_targets_have_variance": all_targets_have_variance,
              "expanded_covariance_record_count": len(expanded_covariance_records),
              "expanded_reference_vector_complete": expanded_reference_vector_complete,
              "expanded_covariance_sensitivity_matrix_complete": expanded_covariance_sensitivity_matrix_complete,
              "full_planck_posterior_available": full_planck_posterior_available,
              "expanded_reference_target_support_exists": not bool(failed_gates),
              "expanded_bridge_pressure_allowed_next": expanded_bridge_pressure_allowed_next,
              "expanded_bridge_pressure_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "prior_reference_redshifts": PRIOR_REFERENCE_REDSHIFTS,
              "prior_reference_fsigma8_mean": PRIOR_REFERENCE_FSIGMA8_MEAN,
              "prior_reference_fsigma8_covariance_regularized": PRIOR_REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED,
              "expanded_reference_targets": EXPANDED_REFERENCE_TARGETS,
              "reference_support_policy": REFERENCE_SUPPORT_POLICY,
              "reference_target_records": reference_target_records,
              "expanded_covariance_records": expanded_covariance_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "expanded_reference_target_support_exists": not bool(failed_gates),
                  "expanded_reference_vector_complete": expanded_reference_vector_complete,
                  "expanded_covariance_sensitivity_matrix_complete": expanded_covariance_sensitivity_matrix_complete,
                  "expanded_bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_128_expanded_reference_target_support_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "reference_target_records_v4_128.csv",
              reference_target_records,
              ["target_id", "z", "source_role", "reference_fsigma8_support", "support_method", "support_status", "nearest_prior_z", "nearest_prior_variance", "variance_inflation", "reference_variance_support", "variance_status", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "expanded_covariance_records_v4_128.csv",
              expanded_covariance_records,
              ["row_target_id", "column_target_id", "row_z", "column_z", "covariance_value", "covariance_status", "record_scope"]
          )

          write_csv(
              OUTDIR / "reference_support_policy_v4_128.csv",
              REFERENCE_SUPPORT_POLICY,
              ["policy_id", "requirement", "reason"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_128.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_128.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_128.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.128 — Expanded Reference Target Support Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
