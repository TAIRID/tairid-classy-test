name: 000 TAIRID v4.217 - Return To Cosmology Covariance Shape Method Transfer With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-217-return-to-cosmology-covariance-shape-method-transfer-with-scope-guards.yml"
      - "data/**"
      - "outputs/**"
      - "artifacts/**"

permissions:
  contents: read

jobs:
  v4-217-return-to-cosmology-method-transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.217 return to cosmology covariance-shape method transfer
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_217_outputs
          cat > tairid_v4_217_outputs/run_v4_217.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_217_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "return_to_cosmology_covariance_shape_method_transfer_passed_method_transfer_audit_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cosmology validation",
              "no neurotype validation",
              "no cross-domain validation",
              "no claim that neurotype data proves cosmology",
              "no claim that G1 proves TAIRID",
              "no claim that shared signature means shared cause",
              "no raw numbers moved between domains",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "method transfer is not validation",
              "cosmology tracer roles are not interchangeable",
              "combined cosmology matrices must be diagnostic until covariance and source surfaces are handled",
              "TAIRID not proved"
          ]

          V4_216_STATUS = {
              "version": "v4.216",
              "result_label": "shape_lattice_update_after_g1_candidate_covariance_preview_passed_lattice_update_written_no_validation",
              "rule_pass_count": 13,
              "rule_total_count": 13,
              "failed_gates": [],
              "g1_delta_rows": 5,
              "correlation_signature_rows": 3,
              "eigenmode_summary_rows": 3,
              "updated_lattice_nodes": 15,
              "updated_lattice_edges": 17,
              "signature_clusters": 3,
              "package_status": "g1_shape_lattice_update_written_ready_for_cosmology_method_transfer",
              "selected_next_route": "return_to_cosmology_covariance_shape_method_transfer_with_scope_guards"
          }

          G1_METHOD_LESSONS = [
              {
                  "lesson_id": "L1",
                  "lesson": "separate source surfaces before interpreting mixed matrices",
                  "g1_evidence": "mixed G1 matrix was diagnostic only because dyslexia and aphantasia surfaces differ",
                  "cosmology_transfer": "separate tracer/source roles before reading combined growth or geometry matrices",
                  "cosmology_guard": "LRG, ELG, QSO, BAO, CMB, SNe, and lensing sources must not be treated as one interchangeable surface",
                  "claim_boundary": "method transfer only"
              },
              {
                  "lesson_id": "L2",
                  "lesson": "delta signatures and covariance modes answer different questions",
                  "g1_evidence": "dyslexia and aphantasia signatures stayed distinct while covariance/eigenmodes described internal axis coupling",
                  "cosmology_transfer": "separate residual direction, covariance coupling, tracer role, and redshift position",
                  "cosmology_guard": "do not treat one z-score or one residual as the whole cosmology signal",
                  "claim_boundary": "method transfer only"
              },
              {
                  "lesson_id": "L3",
                  "lesson": "constructed or dependent axes must be flagged",
                  "g1_evidence": "aphantasia pacing was inverse VVIQ by construction",
                  "cosmology_transfer": "flag derived cosmology quantities before interpreting covariance as independent structure",
                  "cosmology_guard": "derived parameters, reused fiducial assumptions, compressed likelihoods, and shared covariance must be dependency-audited",
                  "claim_boundary": "dependency guard only"
              },
              {
                  "lesson_id": "L4",
                  "lesson": "same shape does not mean same cause",
                  "g1_evidence": "G1 Dyslexia and LRGxELG z=0.70 both show ++-, but this is relational proximity only",
                  "cosmology_transfer": "use shape proximity to prioritize cosmology tests, not to declare mechanism",
                  "cosmology_guard": "same signature cannot be used as proof of shared physical cause",
                  "claim_boundary": "no shared cause claim"
              }
          ]

          COSMO_SHAPE_REGISTRY = [
              {
                  "cosmo_node": "LRGxELG_z0p70",
                  "redshift": "0.70",
                  "tracer_or_source_surface": "LRGxELG cross-tracer growth/geometry preview",
                  "current_signature": "++-",
                  "paired_g1_signature": "++-",
                  "nearest_g1_numeric_node": "G1 Dyslexia all-task candidate covariance preview",
                  "source_surface_guard": "cross-tracer cosmology surface; compare shape only, not units",
                  "open_gap": "needs covariance/source-role recheck",
                  "claim_boundary": "cosmology preview only; not validation"
              },
              {
                  "cosmo_node": "LRGxELG_z0p845",
                  "redshift": "0.845",
                  "tracer_or_source_surface": "LRGxELG cross-tracer growth/geometry preview",
                  "current_signature": "-+-",
                  "paired_g1_signature": "-+-",
                  "nearest_g1_numeric_node": "G1 Aphantasia questionnaire candidate covariance preview",
                  "source_surface_guard": "cross-tracer cosmology surface; compare shape only, not units",
                  "open_gap": "needs covariance/source-role recheck",
                  "claim_boundary": "cosmology preview only; not validation"
              },
              {
                  "cosmo_node": "QSO_z1p48",
                  "redshift": "1.48",
                  "tracer_or_source_surface": "QSO high-redshift growth/geometry preview",
                  "current_signature": "-++",
                  "paired_g1_signature": "",
                  "nearest_g1_numeric_node": "",
                  "source_surface_guard": "high-redshift QSO surface may not share the same role as LRG/ELG",
                  "open_gap": "needs QSO-specific covariance and tracer-role handling",
                  "claim_boundary": "cosmology preview only; not validation"
              }
          ]

          COSMO_AXIS_TRANSLATION_LEDGER = [
              {
                  "local_axis": "propagation_reach",
                  "neurotype_g1_example": "reading scan volume / visual imagery reach",
                  "cosmology_candidate_translation": "observable reach or propagation-access displacement in tracer/redshift surface",
                  "allowed_use": "shape comparison after local cosmology variables are defined",
                  "blocked_use": "copying neurotype values or units into cosmology",
                  "claim_boundary": "axis analogy only"
              },
              {
                  "local_axis": "pacing_access",
                  "neurotype_g1_example": "reading timing load / inverse visual access burden",
                  "cosmology_candidate_translation": "access pressure, timing tension, or rate mismatch in growth/geometry surface",
                  "allowed_use": "test whether residual/covariance modes show access-pressure-like behavior",
                  "blocked_use": "claiming subjective burden equals physical timing",
                  "claim_boundary": "axis analogy only"
              },
              {
                  "local_axis": "consolidation_growth",
                  "neurotype_g1_example": "clean reading return / imagery support",
                  "cosmology_candidate_translation": "growth consolidation, structure retention, or stable return in tracer surface",
                  "allowed_use": "local cosmology growth quantities only after covariance handling",
                  "blocked_use": "claiming clinical consolidation equals cosmological growth",
                  "claim_boundary": "axis analogy only"
              },
              {
                  "local_axis": "viability_outcome",
                  "neurotype_g1_example": "reading viability / questionnaire support",
                  "cosmology_candidate_translation": "model viability, fit stability, or residual penalty under a defined source surface",
                  "allowed_use": "diagnostic fit/pressure axis inside a specific cosmology test",
                  "blocked_use": "treating viability as proof of model truth",
                  "claim_boundary": "diagnostic only"
              }
          ]

          COSMO_TEST_DESIGN_RULES = [
              {
                  "rule_id": "C1",
                  "rule": "never combine tracer families before writing a source-surface ledger",
                  "reason": "G1 mixed matrix was diagnostic only because surfaces differed",
                  "next_test_requirement": "write LRG/ELG/QSO source-surface ledger before a combined matrix",
                  "failure_if_missing": "combined matrix is uninterpretable beyond diagnostic preview"
              },
              {
                  "rule_id": "C2",
                  "rule": "separate residual direction from covariance coupling",
                  "reason": "G1 delta signs and eigenmodes gave different but compatible information",
                  "next_test_requirement": "write residual-sign table, covariance table, and eigenmode table separately",
                  "failure_if_missing": "single pressure number hides structure"
              },
              {
                  "rule_id": "C3",
                  "rule": "flag derived or dependent quantities",
                  "reason": "G1 aphantasia pacing was inverse VVIQ by construction",
                  "next_test_requirement": "mark derived cosmology variables and reused fiducial assumptions",
                  "failure_if_missing": "covariance may be read as independent when it is partly constructed"
              },
              {
                  "rule_id": "C4",
                  "rule": "same signature can prioritize a test but cannot validate a mechanism",
                  "reason": "G1 and cosmology share relational signatures only",
                  "next_test_requirement": "write shape-proximity rows with no proof language",
                  "failure_if_missing": "cross-domain overclaim"
              }
          ]

          NEXT_COSMO_GAP_TESTS = [
              {
                  "priority": 1,
                  "test_name": "cosmology_tracer_source_surface_ledger_for_lrg_elg_qso",
                  "purpose": "separate LRG, ELG, QSO roles before combined covariance reading",
                  "expected_artifacts": "source_surface_ledger.csv; tracer_role_table.csv; blocked_claims.json",
                  "why_now": "direct transfer from G1 mixed-surface warning",
                  "claim_boundary": "design audit only"
              },
              {
                  "priority": 2,
                  "test_name": "cosmology_residual_direction_vs_covariance_mode_split",
                  "purpose": "separate sign/residual direction from covariance/eigenmode behavior",
                  "expected_artifacts": "residual_signature_table.csv; covariance_mode_table.csv; comparison_ledger.csv",
                  "why_now": "G1 showed signatures and eigenmodes are not the same layer",
                  "claim_boundary": "diagnostic only"
              },
              {
                  "priority": 3,
                  "test_name": "cosmology_derived_quantity_dependency_audit",
                  "purpose": "flag variables that are mathematically derived, fiducial-dependent, or covariance-compressed",
                  "expected_artifacts": "dependency_ledger.csv; derived_axis_guard.csv",
                  "why_now": "G1 aphantasia had a constructed inverse axis, so cosmology needs the same guard",
                  "claim_boundary": "dependency audit only"
              },
              {
                  "priority": 4,
                  "test_name": "cosmology_shape_persistence_under_source_surface_split",
                  "purpose": "ask whether ++-, -+-, or -++ persist after source-surface separation",
                  "expected_artifacts": "shape_persistence_table.csv; persistence_failures.csv; next_data_needs.csv",
                  "why_now": "only after source-surface and dependency ledgers exist",
                  "claim_boundary": "persistence preview only"
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          # Build a compact readiness scorecard.
          readiness_rows = [
              {
                  "check": "g1_method_lessons_available",
                  "status": len(G1_METHOD_LESSONS) == 4,
                  "value": len(G1_METHOD_LESSONS),
                  "required": 4,
                  "claim_boundary": "method transfer only"
              },
              {
                  "check": "cosmology_shape_registry_available",
                  "status": len(COSMO_SHAPE_REGISTRY) >= 3,
                  "value": len(COSMO_SHAPE_REGISTRY),
                  "required": "at least 3 locked preview nodes",
                  "claim_boundary": "registry only"
              },
              {
                  "check": "source_surface_guard_present",
                  "status": all(row["source_surface_guard"] for row in COSMO_SHAPE_REGISTRY),
                  "value": "present",
                  "required": "all cosmology rows guarded",
                  "claim_boundary": "prevents tracer equivalence overclaim"
              },
              {
                  "check": "axis_translation_boundaries_present",
                  "status": all(row["blocked_use"] for row in COSMO_AXIS_TRANSLATION_LEDGER),
                  "value": len(COSMO_AXIS_TRANSLATION_LEDGER),
                  "required": 4,
                  "claim_boundary": "prevents moving raw numbers across domains"
              },
              {
                  "check": "next_cosmology_gap_tests_prioritized",
                  "status": len(NEXT_COSMO_GAP_TESTS) >= 4,
                  "value": len(NEXT_COSMO_GAP_TESTS),
                  "required": 4,
                  "claim_boundary": "test planning only"
              }
          ]

          claim_rows = [
              {
                  "claim": "G1 method transfer validates cosmology.",
                  "status": "blocked",
                  "safe_wording": "G1 gives rules for cleaner cosmology tests.",
                  "forbidden_wording": "G1 proves cosmology."
              },
              {
                  "claim": "Same signature means same cause.",
                  "status": "blocked",
                  "safe_wording": "Same signature means relational proximity in selected axes only.",
                  "forbidden_wording": "Same shape means same mechanism."
              },
              {
                  "claim": "Tracer families are interchangeable.",
                  "status": "blocked",
                  "safe_wording": "LRG, ELG, and QSO must be handled as different source surfaces until proven otherwise.",
                  "forbidden_wording": "All tracers can be combined directly."
              },
              {
                  "claim": "A method-transfer audit is a physics result.",
                  "status": "blocked",
                  "safe_wording": "This is a workflow design audit for later cosmology tests.",
                  "forbidden_wording": "This establishes a cosmology result."
              }
          ]

          next_routes = [
              {
                  "priority": 1,
                  "route": "cosmology_tracer_source_surface_ledger_for_lrg_elg_qso_with_scope_guards",
                  "condition": "method transfer audit complete",
                  "next_action": "Create the tracer/source-surface ledger before any new combined cosmology matrix."
              },
              {
                  "priority": 2,
                  "route": "cosmology_residual_direction_vs_covariance_mode_split_with_scope_guards",
                  "condition": "after tracer/source-surface ledger exists",
                  "next_action": "Separate residual signatures, covariance modes, and eigenmodes."
              },
              {
                  "priority": 3,
                  "route": "cosmology_derived_quantity_dependency_audit_with_scope_guards",
                  "condition": "before interpreting covariance as independent evidence",
                  "next_action": "Flag derived, compressed, or fiducial-dependent cosmology quantities."
              }
          ]

          package_status = "cosmology_method_transfer_audit_written_ready_for_tracer_source_surface_ledger"
          selected_next_route = "cosmology_tracer_source_surface_ledger_for_lrg_elg_qso_with_scope_guards"

          write_csv(OUT / "v4_217_v4_216_status_review.csv", [V4_216_STATUS], list(V4_216_STATUS.keys()))
          (OUT / "v4_217_v4_216_status_review.json").write_text(json.dumps(V4_216_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_217_g1_to_cosmology_method_transfer_ledger.csv", G1_METHOD_LESSONS, [
              "lesson_id", "lesson", "g1_evidence", "cosmology_transfer",
              "cosmology_guard", "claim_boundary"
          ])
          write_csv(OUT / "v4_217_cosmology_shape_registry.csv", COSMO_SHAPE_REGISTRY, [
              "cosmo_node", "redshift", "tracer_or_source_surface",
              "current_signature", "paired_g1_signature", "nearest_g1_numeric_node",
              "source_surface_guard", "open_gap", "claim_boundary"
          ])
          write_csv(OUT / "v4_217_cosmology_axis_translation_ledger.csv", COSMO_AXIS_TRANSLATION_LEDGER, [
              "local_axis", "neurotype_g1_example", "cosmology_candidate_translation",
              "allowed_use", "blocked_use", "claim_boundary"
          ])
          write_csv(OUT / "v4_217_cosmology_test_design_rules.csv", COSMO_TEST_DESIGN_RULES, [
              "rule_id", "rule", "reason", "next_test_requirement", "failure_if_missing"
          ])
          write_csv(OUT / "v4_217_prioritized_cosmology_gap_tests.csv", NEXT_COSMO_GAP_TESTS, [
              "priority", "test_name", "purpose", "expected_artifacts",
              "why_now", "claim_boundary"
          ])
          write_csv(OUT / "v4_217_readiness_scorecard.csv", readiness_rows, [
              "check", "status", "value", "required", "claim_boundary"
          ])
          write_csv(OUT / "v4_217_claim_boundary_matrix.csv", claim_rows, [
              "claim", "status", "safe_wording", "forbidden_wording"
          ])
          write_csv(OUT / "v4_217_next_routes.csv", next_routes, [
              "priority", "route", "condition", "next_action"
          ])

          route_decision = {
              "version": "v4.217",
              "result_label": RESULT_LABEL,
              "clean_result": "The G1 lattice/covariance lesson was translated into a guarded cosmology method-transfer audit. The audit prioritizes tracer/source-surface separation before any new combined cosmology matrix.",
              "method_lessons": len(G1_METHOD_LESSONS),
              "cosmology_registry_rows": len(COSMO_SHAPE_REGISTRY),
              "axis_translation_rows": len(COSMO_AXIS_TRANSLATION_LEDGER),
              "test_design_rules": len(COSMO_TEST_DESIGN_RULES),
              "prioritized_gap_tests": len(NEXT_COSMO_GAP_TESTS),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "method transfer audit only; not cosmology validation, not cross-domain proof",
              "blocked_claims": BLOCKED_CLAIMS
          }
          (OUT / "v4_217_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_217_scope_guards.json").write_text(json.dumps({
              "scope": "return to cosmology covariance-shape method transfer",
              "method_transfer_is_validation": False,
              "g1_proves_cosmology": False,
              "same_signature_is_same_cause": False,
              "raw_numbers_moved_between_domains": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "tracer_families_interchangeable": False,
              "next_required_move": "cosmology tracer/source-surface ledger for LRG/ELG/QSO",
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_217_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.217 - Return To Cosmology Covariance Shape Method Transfer",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.216 updated the lattice after the G1 candidate covariance preview. v4.217 translates that lesson back into the cosmology lane without claiming proof: separate source surfaces, separate residual direction from covariance modes, flag derived/dependent quantities, and treat same-signature proximity as test priority only.",
              "",
              "Method lessons: `" + str(len(G1_METHOD_LESSONS)) + "`",
              "Cosmology registry rows: `" + str(len(COSMO_SHAPE_REGISTRY)) + "`",
              "Axis translation rows: `" + str(len(COSMO_AXIS_TRANSLATION_LEDGER)) + "`",
              "Test design rules: `" + str(len(COSMO_TEST_DESIGN_RULES)) + "`",
              "Prioritized gap tests: `" + str(len(NEXT_COSMO_GAP_TESTS)) + "`",
              "",
              "Package status: `" + package_status + "`",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_217_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_217_v4_216_status_review.csv",
              "v4_217_v4_216_status_review.json",
              "v4_217_g1_to_cosmology_method_transfer_ledger.csv",
              "v4_217_cosmology_shape_registry.csv",
              "v4_217_cosmology_axis_translation_ledger.csv",
              "v4_217_cosmology_test_design_rules.csv",
              "v4_217_prioritized_cosmology_gap_tests.csv",
              "v4_217_readiness_scorecard.csv",
              "v4_217_claim_boundary_matrix.csv",
              "v4_217_next_routes.csv",
              "v4_217_route_decision.json",
              "v4_217_scope_guards.json",
              "v4_217_blocked_claims.json",
              "v4_217_summary.md"
          ]

          rules = {
              "version_is_v4_217": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_216_status_reviewed": V4_216_STATUS["rule_pass_count"] == 13,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "method_transfer_ledger_written": (OUT / "v4_217_g1_to_cosmology_method_transfer_ledger.csv").exists(),
              "cosmology_registry_written": (OUT / "v4_217_cosmology_shape_registry.csv").exists(),
              "axis_translation_written": (OUT / "v4_217_cosmology_axis_translation_ledger.csv").exists(),
              "test_design_rules_written": (OUT / "v4_217_cosmology_test_design_rules.csv").exists(),
              "prioritized_gap_tests_written": (OUT / "v4_217_prioritized_cosmology_gap_tests.csv").exists(),
              "selected_route_present": bool(selected_next_route),
              "no_cosmology_validation_claim": True,
              "no_cross_domain_proof_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.217",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "method_lessons": len(G1_METHOD_LESSONS),
              "cosmology_registry_rows": len(COSMO_SHAPE_REGISTRY),
              "axis_translation_rows": len(COSMO_AXIS_TRANSLATION_LEDGER),
              "test_design_rules": len(COSMO_TEST_DESIGN_RULES),
              "prioritized_gap_tests": len(NEXT_COSMO_GAP_TESTS),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "cosmology_method_transfer_audit_only_no_validation"
          }
          (OUT / "v4_217_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.217 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_217_outputs/run_v4_217.py

      - name: Upload v4.217 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-217-return-to-cosmology-covariance-shape-method-transfer-output
          path: tairid_v4_217_outputs/
