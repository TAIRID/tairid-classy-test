name: 000 TAIRID v4.84.3 CAMB External Runner JSON Decode Repair

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-84-3-camb-external-runner-json-decode-repair.yml"

jobs:
  tairid-v4-84-3-camb-external-runner-json-decode-repair:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.84.3 CAMB external runner JSON decode repair
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_84_3_camb_external_runner_json_decode_repair

          python - <<'PY'
          import csv
          import json
          import math
          import os
          import site
          import subprocess
          import sys
          import textwrap
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_84_3_camb_external_runner_json_decode_repair")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_84_3_camb_external_runner_json_decode_repair"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This repairs the v4.84.2 external-runner JSON double-encoding bug.",
              "This may run one tiny CAMB diagnostic fixture only to confirm usable sigma8 and fsigma8 arrays.",
              "This does not accept any solver output as a formal residual audit.",
              "A pass means the repaired runner produced an actionable route, not that Planck reference uncertainty or TAIRID validation exists."
          ]

          UPSTREAM_LOCKS = {
              "v4_84_2_camb_import_repair_external_runner": {
                  "readiness_label": "CAMB_import_repair_passed_need_set_cosmology_mapping_api_repair",
                  "numpy_imported": True,
                  "CAMB_imported": True,
                  "CAMB_version": "1.6.6",
                  "variant_count": 0,
                  "known_issue": "SOURCE_FIXTURE was double-encoded as a JSON string, causing TypeError: string indices must be integers.",
                  "formal_residual_audit_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_83_camb_tiny_single_fixture_mapping_contract": {
                  "readiness_label": "CAMB_tiny_single_fixture_mapping_contract_passed_ready_for_CAMB_tiny_single_fixture_smoke_run",
                  "mapping_contract_complete": True,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              }
          }

          SOURCE_FIXTURE = {
              "root": "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE",
              "primary_inputs": {
                  "omegabh2": 0.02237737,
                  "omegach2": 0.1201035,
                  "theta_100theta_MC": 1.04092,
                  "tau": 0.05430138,
                  "logA": 3.044726,
                  "ns": 0.9658923
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015", "sigma8_expected": 0.7498653, "fsigma8_expected": 0.4605277},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038", "sigma8_expected": 0.6642308, "fsigma8_expected": 0.4779339},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051", "sigma8_expected": 0.6214160, "fsigma8_expected": 0.4760216},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061", "sigma8_expected": 0.5911708, "fsigma8_expected": 0.4706936},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233", "sigma8_expected": 0.3069371, "fsigma8_expected": 0.2979012}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The CAMB JSON decode repair validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "A diagnostic CAMB output is a final residual audit.",
              "A single point fixture is Planck reference uncertainty."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_85_single_fixture_output_shape_and_orientation_lock",
                  "purpose": "If CAMB returns complete sigma8/fsigma8 arrays, lock output ordering against the five redshift targets.",
                  "why_next": "Solver output ordering must be known before residuals."
              },
              {
                  "priority": 2,
                  "route_id": "v4_84_4_CAMB_set_cosmology_or_output_method_probe",
                  "purpose": "If CAMB imports but the variants fail, inspect the exact API failure stage.",
                  "why_next": "The next repair should be based on the actual stage: set_cosmology, get_results, get_sigma8, or get_fsigma8."
              },
              {
                  "priority": 3,
                  "route_id": "v4_86_single_fixture_residual_audit",
                  "purpose": "Only after orientation is locked, compare CAMB point output to sidecar point targets.",
                  "why_next": "Residuals require confirmed orientation."
              },
              {
                  "priority": 4,
                  "route_id": "v4_87_reference_uncertainty_chain_sample_design",
                  "purpose": "Design posterior-sample path after the point fixture works.",
                  "why_next": "A point fixture is not reference uncertainty."
              }
          ]

          failed_gates = []
          warnings = [
              "CAMB_external_runner_JSON_decode_repair",
              "fresh_python_subprocess_after_install",
              "diagnostic_fixture_only",
              "no_formal_residual_audit",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          install_records = []

          def run_command(command, label, timeout_seconds=900, env=None):
              record = {
                  "label": label,
                  "command": " ".join(command),
                  "returncode": "",
                  "ok": False,
                  "stdout_tail": "",
                  "stderr_tail": "",
                  "error": ""
              }
              try:
                  completed = subprocess.run(
                      command,
                      text=True,
                      capture_output=True,
                      timeout=timeout_seconds,
                      check=False,
                      env=env
                  )
                  record["returncode"] = completed.returncode
                  record["ok"] = completed.returncode == 0
                  record["stdout_tail"] = completed.stdout[-5000:]
                  record["stderr_tail"] = completed.stderr[-5000:]
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          pip_upgrade = run_command(
              [sys.executable, "-m", "pip", "install", "--upgrade", "pip"],
              "pip_upgrade"
          )
          install_records.append(pip_upgrade)

          dependency_install = run_command(
              [
                  sys.executable,
                  "-m",
                  "pip",
                  "install",
                  "--prefer-binary",
                  "numpy",
                  "scipy",
                  "sympy",
                  "packaging",
                  "camb"
              ],
              "pip_install_numpy_scipy_sympy_packaging_camb"
          )
          install_records.append(dependency_install)

          user_site = site.getusersitepackages()
          runner_path = OUTDIR / "camb_external_runner_v4_84_3.py"
          runner_json_path = OUTDIR / "camb_external_runner_output_v4_84_3.json"

          runner_code = f'''
          import json
          import math
          import site
          import sys
          import traceback
          from pathlib import Path

          OUT = Path({str(runner_json_path)!r})

          SOURCE_FIXTURE = json.loads({json.dumps(SOURCE_FIXTURE)!r})
          TARGET_REDSHIFTS = json.loads({json.dumps(TARGET_REDSHIFTS)!r})

          report = {{
              "python_executable": sys.executable,
              "python_version": sys.version,
              "user_site": "",
              "sys_path_head": [],
              "source_fixture_type": str(type(SOURCE_FIXTURE)),
              "target_redshifts_type": str(type(TARGET_REDSHIFTS)),
              "json_decode_repair_ok": isinstance(SOURCE_FIXTURE, dict) and isinstance(TARGET_REDSHIFTS, list),
              "numpy_imported": False,
              "numpy_version": "",
              "camb_imported": False,
              "camb_version": "",
              "variants": [],
              "top_error": ""
          }}

          def finite_positive_list(values, expected_len):
              try:
                  if len(values) != expected_len:
                      return False
                  return all(math.isfinite(float(x)) and float(x) > 0 for x in values)
              except Exception:
                  return False

          def run_variant(camb, np, label, mode):
              record = {{
                  "variant_label": label,
                  "mode": mode,
                  "set_cosmology_ok": False,
                  "init_power_ok": False,
                  "set_matter_power_ok": False,
                  "get_results_ok": False,
                  "get_sigma8_ok": False,
                  "get_fsigma8_ok": False,
                  "sigma8_len": 0,
                  "fsigma8_len": 0,
                  "sigma8_values": [],
                  "fsigma8_values": [],
                  "complete_arrays": False,
                  "H0_recorded": "",
                  "Omega_m_recorded": "",
                  "error_stage": "",
                  "error_tail": ""
              }}

              try:
                  primary = SOURCE_FIXTURE["primary_inputs"]
                  ombh2 = primary["omegabh2"]
                  omch2 = primary["omegach2"]
                  theta_for_camb = primary["theta_100theta_MC"] / 100.0
                  tau = primary["tau"]
                  As = math.exp(primary["logA"]) / 1.0e10
                  ns = primary["ns"]
                  target_z = [row["z"] for row in TARGET_REDSHIFTS]

                  pars = camb.CAMBparams()

                  if mode == "theta_h0_none":
                      pars.set_cosmology(
                          H0=None,
                          ombh2=ombh2,
                          omch2=omch2,
                          cosmomc_theta=theta_for_camb,
                          tau=tau,
                          omk=0.0,
                          mnu=0.06,
                      )
                  elif mode == "theta_h0_omitted":
                      pars.set_cosmology(
                          ombh2=ombh2,
                          omch2=omch2,
                          cosmomc_theta=theta_for_camb,
                          tau=tau,
                          omk=0.0,
                          mnu=0.06,
                      )
                  elif mode == "diagnostic_h0_fixed_not_fixture_acceptance":
                      pars.set_cosmology(
                          H0=67.36,
                          ombh2=ombh2,
                          omch2=omch2,
                          tau=tau,
                          omk=0.0,
                          mnu=0.06,
                      )
                  else:
                      raise RuntimeError("unknown variant mode")

                  record["set_cosmology_ok"] = True

                  try:
                      record["H0_recorded"] = float(pars.H0)
                  except Exception:
                      record["H0_recorded"] = ""

                  pars.InitPower.set_params(
                      As=As,
                      ns=ns,
                  )
                  record["init_power_ok"] = True

                  try:
                      pars.NonLinear = camb.model.NonLinear_none
                  except Exception:
                      pass

                  pars.set_matter_power(
                      redshifts=target_z,
                      kmax=2.0,
                      nonlinear=False,
                  )
                  record["set_matter_power_ok"] = True

                  results = camb.get_results(pars)
                  record["get_results_ok"] = True

                  try:
                      sigma8_values = [float(x) for x in np.atleast_1d(results.get_sigma8()).tolist()]
                      record["get_sigma8_ok"] = True
                      record["sigma8_len"] = len(sigma8_values)
                      record["sigma8_values"] = sigma8_values
                  except Exception:
                      record["error_stage"] = "get_sigma8"
                      record["error_tail"] = traceback.format_exc()[-4000:]
                      sigma8_values = []

                  try:
                      fsigma8_values = [float(x) for x in np.atleast_1d(results.get_fsigma8()).tolist()]
                      record["get_fsigma8_ok"] = True
                      record["fsigma8_len"] = len(fsigma8_values)
                      record["fsigma8_values"] = fsigma8_values
                  except Exception:
                      if not record["error_stage"]:
                          record["error_stage"] = "get_fsigma8"
                          record["error_tail"] = traceback.format_exc()[-4000:]
                      fsigma8_values = []

                  try:
                      record["Omega_m_recorded"] = float(results.get_Omega("matter", 0))
                  except Exception:
                      record["Omega_m_recorded"] = ""

                  record["complete_arrays"] = (
                      finite_positive_list(sigma8_values, len(TARGET_REDSHIFTS))
                      and finite_positive_list(fsigma8_values, len(TARGET_REDSHIFTS))
                  )

              except Exception:
                  if not record["error_stage"]:
                      record["error_stage"] = "variant_exception"
                  record["error_tail"] = traceback.format_exc()[-4000:]

              return record

          try:
              try:
                  user_site = site.getusersitepackages()
                  report["user_site"] = user_site
                  if user_site and user_site not in sys.path:
                      site.addsitedir(user_site)
              except Exception:
                  pass

              report["sys_path_head"] = sys.path[:12]

              import numpy as np
              report["numpy_imported"] = True
              report["numpy_version"] = getattr(np, "__version__", "")

              import camb
              report["camb_imported"] = True
              report["camb_version"] = getattr(camb, "__version__", "")

              for label, mode in [
                  ("theta_h0_none_contract_path", "theta_h0_none"),
                  ("theta_h0_omitted_api_probe", "theta_h0_omitted"),
                  ("diagnostic_h0_fixed_not_fixture_acceptance", "diagnostic_h0_fixed_not_fixture_acceptance")
              ]:
                  report["variants"].append(run_variant(camb, np, label, mode))

          except Exception:
              report["top_error"] = traceback.format_exc()[-4000:]

          OUT.write_text(json.dumps(report, indent=2, sort_keys=True), encoding="utf-8")
          print(json.dumps(report, indent=2, sort_keys=True))
          '''

          runner_path.write_text(textwrap.dedent(runner_code), encoding="utf-8")

          env = dict(os.environ)
          if user_site:
              env["PYTHONPATH"] = user_site + os.pathsep + env.get("PYTHONPATH", "")

          runner_record = run_command(
              [sys.executable, str(runner_path)],
              "fresh_python_camb_external_runner_json_decode_repair",
              timeout_seconds=900,
              env=env
          )

          runner_output = {
              "python_executable": "",
              "python_version": "",
              "user_site": user_site,
              "sys_path_head": [],
              "source_fixture_type": "",
              "target_redshifts_type": "",
              "json_decode_repair_ok": False,
              "numpy_imported": False,
              "numpy_version": "",
              "camb_imported": False,
              "camb_version": "",
              "variants": [],
              "top_error": ""
          }

          if runner_json_path.exists():
              try:
                  runner_output = json.loads(runner_json_path.read_text(encoding="utf-8"))
              except Exception as exc:
                  failed_gates.append("runner_json_read_failed")
                  runner_output["top_error"] = f"{type(exc).__name__}: {exc}"
          else:
              failed_gates.append("runner_json_missing")

          variants = runner_output.get("variants", [])

          json_decode_repair_ok = runner_output.get("json_decode_repair_ok") is True
          numpy_imported = runner_output.get("numpy_imported") is True
          camb_imported = runner_output.get("camb_imported") is True
          any_variant_set_cosmology = any(row.get("set_cosmology_ok") for row in variants)
          any_variant_get_results = any(row.get("get_results_ok") for row in variants)
          any_variant_sigma8 = any(row.get("get_sigma8_ok") for row in variants)
          any_variant_fsigma8 = any(row.get("get_fsigma8_ok") for row in variants)
          any_variant_complete_arrays = any(row.get("complete_arrays") for row in variants)

          output_preview_records = []
          orientation_preview_records = []

          successful_variants = [row for row in variants if row.get("complete_arrays")]

          for variant in successful_variants:
              sigma8_values = variant.get("sigma8_values", [])
              fsigma8_values = variant.get("fsigma8_values", [])

              for index, zrow in enumerate(TARGET_REDSHIFTS):
                  output_preview_records.append({
                      "variant_label": variant.get("variant_label", ""),
                      "mode": variant.get("mode", ""),
                      "orientation": "raw_return_order",
                      "index": index,
                      "z": zrow["z"],
                      "sigma8_camb_raw": sigma8_values[index],
                      "fsigma8_camb_raw": fsigma8_values[index],
                      "comparison_status": "diagnostic_output_preview_only_not_residual_audit"
                  })

              for orientation, sigma_seq, fsigma_seq in [
                  ("direct_raw_order", sigma8_values, fsigma8_values),
                  ("reversed_raw_order", list(reversed(sigma8_values)), list(reversed(fsigma8_values)))
              ]:
                  for index, zrow in enumerate(TARGET_REDSHIFTS):
                      sigma_delta = float(sigma_seq[index]) - float(zrow["sigma8_expected"])
                      fsigma_delta = float(fsigma_seq[index]) - float(zrow["fsigma8_expected"])
                      orientation_preview_records.append({
                          "variant_label": variant.get("variant_label", ""),
                          "mode": variant.get("mode", ""),
                          "orientation": orientation,
                          "index": index,
                          "z": zrow["z"],
                          "sigma8_camb": float(sigma_seq[index]),
                          "sigma8_expected_sidecar": zrow["sigma8_expected"],
                          "sigma8_delta_preview": sigma_delta,
                          "fsigma8_camb": float(fsigma_seq[index]),
                          "fsigma8_expected_sidecar": zrow["fsigma8_expected"],
                          "fsigma8_delta_preview": fsigma_delta,
                          "comparison_status": "orientation_preview_only_not_formal_residual"
                      })

          orientation_summary_records = []
          for variant in successful_variants:
              for orientation in ["direct_raw_order", "reversed_raw_order"]:
                  rows = [
                      row for row in orientation_preview_records
                      if row["variant_label"] == variant.get("variant_label", "")
                      and row["orientation"] == orientation
                  ]
                  if rows:
                      vals = []
                      for row in rows:
                          vals.append(float(row["sigma8_delta_preview"]))
                          vals.append(float(row["fsigma8_delta_preview"]))
                      rms = math.sqrt(sum(v * v for v in vals) / len(vals))
                      orientation_summary_records.append({
                          "variant_label": variant.get("variant_label", ""),
                          "mode": variant.get("mode", ""),
                          "orientation": orientation,
                          "rms_preview": rms,
                          "status": "preview_only_not_formal_residual"
                      })

          if not dependency_install["ok"]:
              failed_gates.append("dependency_install_failed")

          if not runner_record["ok"]:
              warnings.append("external_runner_returned_nonzero_but_json_may_still_be_actionable")

          if not runner_json_path.exists():
              failed_gates.append("external_runner_output_missing")

          if not json_decode_repair_ok:
              failed_gates.append("json_decode_repair_not_confirmed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "validates tairid cosmology",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          if any_variant_complete_arrays:
              route_decision = "CAMB_external_runner_JSON_decode_repair_passed_complete_arrays_ready_for_output_shape_and_orientation_lock"
              next_allowed_step = (
                  "Proceed to v4.85 single fixture output shape and orientation lock. "
                  "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, or validation yet."
              )
          elif camb_imported and any_variant_get_results and any_variant_sigma8 and not any_variant_fsigma8:
              route_decision = "CAMB_JSON_decode_repair_passed_need_fsigma8_output_method_probe"
              next_allowed_step = (
                  "Proceed to v4.84.4 CAMB fsigma8 output method probe. "
                  "Do not run a residual audit yet."
              )
          elif camb_imported and any_variant_get_results and not any_variant_sigma8:
              route_decision = "CAMB_JSON_decode_repair_passed_need_sigma8_output_method_probe"
              next_allowed_step = (
                  "Proceed to v4.84.4 CAMB sigma8 output method probe. "
                  "Do not run a residual audit yet."
              )
          elif camb_imported and any_variant_set_cosmology and not any_variant_get_results:
              route_decision = "CAMB_JSON_decode_repair_passed_need_get_results_repair"
              next_allowed_step = (
                  "Proceed to v4.84.4 CAMB get_results repair. "
                  "Keep this as a smoke-run repair, not a residual audit."
              )
          elif camb_imported and not any_variant_set_cosmology:
              route_decision = "CAMB_JSON_decode_repair_passed_need_set_cosmology_mapping_API_repair"
              next_allowed_step = (
                  "Proceed to v4.84.4 CAMB set_cosmology mapping API repair. "
                  "Check theta/H0 handling before another smoke run."
              )
          elif numpy_imported and not camb_imported:
              route_decision = "JSON_decode_repaired_but_CAMB_import_failed"
              next_allowed_step = "Proceed to v4.84.4 CAMB import-specific repair."
          else:
              route_decision = "CAMB_JSON_decode_repair_incomplete_dependency_visibility_or_runner_failed"
              next_allowed_step = "Proceed to v4.84.4 dependency visibility or runner repair."

          if failed_gates:
              readiness_label = "CAMB_external_runner_JSON_decode_repair_failed"
          else:
              readiness_label = route_decision

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_json_bug_carried",
                  "pass": True,
                  "result": "v4.84.2 double-encoded SOURCE_FIXTURE as a string",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "dependencies_installed",
                  "pass": dependency_install["ok"],
                  "result": str(dependency_install["ok"]),
                  "boundary": "Dependency repair only."
              },
              {
                  "rule_id": "fresh_external_runner_executed",
                  "pass": runner_json_path.exists(),
                  "result": f"runner_json_exists={runner_json_path.exists()}",
                  "boundary": "Fresh subprocess repair."
              },
              {
                  "rule_id": "json_decode_repair_confirmed",
                  "pass": json_decode_repair_ok,
                  "result": f"source_fixture_type={runner_output.get('source_fixture_type', '')}; target_redshifts_type={runner_output.get('target_redshifts_type', '')}",
                  "boundary": "Code repair only."
              },
              {
                  "rule_id": "numpy_import_status_recorded",
                  "pass": True,
                  "result": f"numpy_imported={numpy_imported}",
                  "boundary": "Import visibility check only."
              },
              {
                  "rule_id": "CAMB_import_status_recorded",
                  "pass": True,
                  "result": f"camb_imported={camb_imported}",
                  "boundary": "Import visibility check only."
              },
              {
                  "rule_id": "variant_route_status_recorded",
                  "pass": True,
                  "result": f"variants={len(variants)} complete_arrays={any_variant_complete_arrays}",
                  "boundary": "Diagnostic variants only."
              },
              {
                  "rule_id": "no_formal_residual_audit",
                  "pass": True,
                  "result": "no formal residual audit run",
                  "boundary": "Orientation preview only if arrays exist."
              },
              {
                  "rule_id": "reference_uncertainty_still_blocked",
                  "pass": True,
                  "result": "Planck reference uncertainty not computed",
                  "boundary": "No posterior covariance."
              },
              {
                  "rule_id": "blocked_claims_preserved",
