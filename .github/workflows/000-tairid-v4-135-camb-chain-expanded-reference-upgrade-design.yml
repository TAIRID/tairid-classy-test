name: 000 TAIRID v4.135 CAMB Chain Expanded Reference Upgrade Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-135-camb-chain-expanded-reference-upgrade-design.yml"

jobs:
  tairid-v4-135-camb-chain-expanded-reference-upgrade-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.135 CAMB chain expanded reference upgrade design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_135_camb_chain_expanded_reference_upgrade_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_135_camb_chain_expanded_reference_upgrade_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_135_camb_chain_expanded_reference_upgrade_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This does not recompute eBOSS pressure.",
              "This designs the expanded reference upgrade route after v4.134 recorded eBOSS covariance locator status but did not ingest covariance.",
              "A pass means the CAMB/chain/stored-reference upgrade requirements, redshift targets, fallback rules, and next feasibility probe are explicit."
          ]

          UPSTREAM_LOCKS = {
              "v4_134_eBOSS_covariance_locator_probe": {
                  "readiness_label": "eBOSS_covariance_locator_probe_passed_locator_status_recorded_covariance_not_ingested_ready_for_reference_upgrade_design",
                  "upstream_two_driver_split_classified": True,
                  "locator_target_count": 8,
                  "fetch_record_count": 8,
                  "fetched_count": 8,
                  "status_record_count": 8,
                  "all_targets_have_status": True,
                  "covariance_hint_count": 3,
                  "likelihood_hint_count": 0,
                  "matrix_or_file_hint_count": 2,
                  "manual_needed_count": 0,
                  "covariance_ingested": False,
                  "usable_covariance_locked": False,
                  "same_program_covariance_still_limited": True,
                  "reference_fallback_still_active": True,
                  "pressure_recomputed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_133_eBOSS_leave_one_out_sensitivity_audit": {
                  "readiness_label": "eBOSS_leave_one_out_sensitivity_audit_passed_two_driver_split_classified_ready_for_eBOSS_covariance_locator_probe",
                  "two_driver_split_classified": True,
                  "LRG_damper_confirmed": True,
                  "ELG_negative_direction_confirmed": True,
                  "QSO_positive_counter_confirmed": True,
                  "covariance_limit_preserved": True,
                  "reference_fallback_preserved": True,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          EXPANDED_REFERENCE_TARGETS = [
              {"target_id": "z0067_6dFGS", "z": 0.067, "role": "low_z_independent_anchor", "current_support": "linear_extrapolation_below_prior_range"},
              {"target_id": "z0150_MGS", "z": 0.150, "role": "existing_low_z_anchor", "current_support": "carried_exact_prior_reference"},
              {"target_id": "z0380_BOSS", "z": 0.380, "role": "BOSS_core", "current_support": "carried_exact_prior_reference"},
              {"target_id": "z0440_WiggleZ", "z": 0.440, "role": "WiggleZ_mid_z", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0510_BOSS", "z": 0.510, "role": "BOSS_core", "current_support": "carried_exact_prior_reference"},
              {"target_id": "z0600_WiggleZ", "z": 0.600, "role": "WiggleZ_mid_z", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0610_BOSS", "z": 0.610, "role": "BOSS_core", "current_support": "carried_exact_prior_reference"},
              {"target_id": "z0698_eBOSS_LRG", "z": 0.698, "role": "eBOSS_LRG_two_driver_split_review", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0730_WiggleZ", "z": 0.730, "role": "WiggleZ_mid_z", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0800_VIPERS", "z": 0.800, "role": "VIPERS_high_mid_z", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0850_eBOSS_ELG", "z": 0.850, "role": "eBOSS_ELG_negative_component", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z1480_eBOSS_QSO", "z": 1.480, "role": "eBOSS_QSO_positive_counter_component", "current_support": "linear_interpolation_between_prior_targets"}
          ]

          REFERENCE_UPGRADE_OPTIONS = [
              {
                  "option_id": "stored_chain_table_upgrade",
                  "rank": 1,
                  "method": "Use already-downloaded or future small stored chain/sample outputs to evaluate fσ8 at every expanded redshift.",
                  "requirements": "Chain rows or parameter samples; growth model evaluation function; target redshift vector; covariance calculation.",
                  "strength": "Can produce reference mean and covariance across all expanded redshifts without relying on simple interpolation.",
                  "limitation": "Requires accessible chain/sample data or a trusted precomputed table."
              },
              {
                  "option_id": "CAMB_batch_reference_upgrade",
                  "rank": 2,
                  "method": "Run CAMB or a CAMB-like growth evaluator for a bounded sample set and compute expanded fσ8 reference vector.",
                  "requirements": "CAMB install or cached environment; cosmological parameter draws; runtime budget; target redshift vector.",
                  "strength": "Closest route to a clean ΛCDM reference prediction for the full expanded vector.",
                  "limitation": "GitHub runtime and dependency fragility remain possible."
              },
              {
                  "option_id": "LCDM_growth_approximation_upgrade",
                  "rank": 3,
                  "method": "Use a documented ΛCDM growth approximation as an interim reference upgrade before CAMB/chain support.",
                  "requirements": "Explicit approximation equations; parameter values; uncertainty rules; comparison against carried exact prior points.",
                  "strength": "More controlled than raw linear interpolation and easier to run in GitHub.",
                  "limitation": "Still not a full Planck posterior covariance."
              },
              {
                  "option_id": "carry_interpolation_fallback",
                  "rank": 4,
                  "method": "Keep current interpolation/extrapolation fallback with stronger labels and no final pressure.",
                  "requirements": "None beyond current v4.128/v4.129 artifacts.",
                  "strength": "Safe fallback if no upgrade is feasible immediately.",
                  "limitation": "Cannot support interpretation of eBOSS component split."
              }
          ]

          UPGRADE_DATA_REQUIREMENTS = [
              {
                  "requirement_id": "expanded_redshift_vector",
                  "needed": True,
                  "status": "available",
                  "detail": "The expanded target vector has 12 redshifts from z=0.067 to z=1.48."
              },
              {
                  "requirement_id": "reference_mean_vector",
                  "needed": True,
                  "status": "upgrade_required",
                  "detail": "Current vector is partly exact prior and partly interpolation/extrapolation fallback."
              },
              {
                  "requirement_id": "reference_covariance_matrix",
                  "needed": True,
                  "status": "upgrade_required",
                  "detail": "Current expanded covariance is diagonal sensitivity fallback, not full posterior covariance."
              },
              {
                  "requirement_id": "eBOSS_target_priority",
                  "needed": True,
                  "status": "available",
                  "detail": "Priority redshifts are z=0.698, 0.85, and 1.48 due to the two-driver eBOSS split."
              },
              {
                  "requirement_id": "fallback_comparison_to_prior_exact_points",
                  "needed": True,
                  "status": "required_next",
                  "detail": "Any approximation upgrade must compare against the carried exact prior points at z=0.15, 0.38, 0.51, and 0.61."
              },
              {
                  "requirement_id": "claim_boundary",
                  "needed": True,
                  "status": "available",
                  "detail": "No final pressure, validation, BIC, likelihood, or posterior comparison is allowed at this stage."
              }
          ]

          UPGRADE_GATE_PLAN = [
              {
                  "gate_id": "method_selected",
                  "requirement": "Choose one reference-upgrade path: stored chain table, CAMB batch, ΛCDM approximation, or fallback carry.",
                  "failure_action": "Do not recompute eBOSS pressure."
              },
              {
                  "gate_id": "all_targets_supported",
                  "requirement": "Every expanded redshift must receive a mean reference value from the same declared method.",
                  "failure_action": "Keep only partial diagnostic support."
              },
              {
                  "gate_id": "covariance_status_declared",
                  "requirement": "The reference covariance must be declared full posterior, sample covariance, approximation covariance, diagonal fallback, or unavailable.",
                  "failure_action": "Block final pressure."
              },
              {
                  "gate_id": "prior_exact_alignment_checked",
                  "requirement": "The upgraded method must be compared against the carried prior exact reference points.",
                  "failure_action": "Do not trust the upgrade."
              },
              {
                  "gate_id": "eBOSS_redshifts_supported",
                  "requirement": "z=0.698, z=0.85, and z=1.48 must receive reference support strong enough to rerun the component split.",
                  "failure_action": "Keep eBOSS review fallback-limited."
              },
              {
                  "gate_id": "final_claims_blocked",
                  "requirement": "Even a successful reference upgrade cannot become final pressure without observed covariance/overlap review.",
                  "failure_action": "Fail claim-boundary gate."
              }
          ]

          NEXT_PROBE_DESIGN = {
              "next_probe_name": "v4.136 reference upgrade feasibility probe",
              "allowed_to_check_repository_for_existing_chain_or_reference_files": True,
              "allowed_to_try_lightweight_LCDM_growth_approximation": True,
              "allowed_to_design_CAMB_install_probe": True,
              "allowed_to_compute_final_RSD_pressure": False,
              "allowed_to_validate_TAIRID": False,
              "primary_success_condition": "Select the strongest feasible reference upgrade path and record whether every expanded target can be supported.",
              "fallback_success_condition": "If no stronger path is feasible in GitHub, preserve interpolation fallback and route to manual/reference package work."
          }

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "CAMB was run.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The CAMB/chain expanded reference upgrade design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "A reference-upgrade design is the same as upgraded reference data.",
              "Interpolation fallback is equivalent to full CAMB/chain reference support.",
              "The eBOSS two-driver split is a final result.",
              "Same-program eBOSS covariance is resolved.",
              "No observed covariance review is needed after reference upgrade."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_136_reference_upgrade_feasibility_probe",
                  "purpose": "Check which reference upgrade path is feasible in the current GitHub repository: stored chain table, CAMB batch, ΛCDM approximation, or fallback carry.",
                  "why_next": "v4.135 is design-only; v4.136 should test feasibility without final claims."
              },
              {
                  "priority": 2,
                  "route_id": "v4_137_lightweight_LCDM_growth_reference_probe",
                  "purpose": "If CAMB/chain support is not immediately feasible, compute a documented approximate ΛCDM reference vector for all expanded redshifts.",
                  "why_next": "This would be stronger than raw interpolation while still labeled non-final."
              },
              {
                  "priority": 3,
                  "route_id": "v4_138_eBOSS_component_rerun_after_reference_upgrade",
                  "purpose": "Rerun eBOSS component lanes after reference support improves.",
                  "why_next": "The two-driver split may shift when reference support is upgraded."
              },
              {
                  "priority": 4,
                  "route_id": "v4_139_eBOSS_covariance_manual_extraction_checklist",
                  "purpose": "Create a human-readable checklist for extracting eBOSS covariance/likelihood support from SDSS/arXiv products.",
                  "why_next": "Observed-side covariance still needs manual or direct data-product handling."
              }
          ]

          failed_gates = []
          warnings = [
              "design_only",
              "reference_upgrade_not_yet_computed",
              "CAMB_not_run",
              "full_planck_chains_not_imported",
              "eBOSS_covariance_still_limited",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_134_eBOSS_covariance_locator_probe"]

          if upstream["covariance_ingested"] is not False:
              failed_gates.append("upstream_covariance_ingested_unexpected")

          if upstream["usable_covariance_locked"] is not False:
              failed_gates.append("upstream_covariance_lock_unexpected")

          if upstream["reference_fallback_still_active"] is not True:
              failed_gates.append("upstream_reference_fallback_not_carried")

          if len(EXPANDED_REFERENCE_TARGETS) != 12:
              failed_gates.append("expanded_reference_target_count_incorrect")

          if not any(row["target_id"] == "z0850_eBOSS_ELG" for row in EXPANDED_REFERENCE_TARGETS):
              failed_gates.append("eBOSS_ELG_target_missing")

          if len(REFERENCE_UPGRADE_OPTIONS) < 4:
              failed_gates.append("reference_upgrade_options_incomplete")

          if len(UPGRADE_DATA_REQUIREMENTS) < 6:
              failed_gates.append("upgrade_data_requirements_incomplete")

          if len(UPGRADE_GATE_PLAN) < 6:
              failed_gates.append("upgrade_gate_plan_incomplete")

          if NEXT_PROBE_DESIGN["allowed_to_compute_final_RSD_pressure"] is not False:
              failed_gates.append("next_probe_final_pressure_allowed_too_early")

          if NEXT_PROBE_DESIGN["allowed_to_validate_TAIRID"] is not False:
              failed_gates.append("next_probe_validation_allowed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "camb was run",
              "final rsd pressure score",
              "validates tairid cosmology",
              "reference-upgrade design is the same as upgraded reference data",
              "same-program eboss covariance is resolved",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "CAMB_chain_expanded_reference_upgrade_design_passed_ready_for_reference_upgrade_feasibility_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_covariance_locator_carried",
                  "pass": upstream["covariance_ingested"] is False and upstream["usable_covariance_locked"] is False,
                  "result": "v4.134 locator status carried; covariance not ingested",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "expanded_reference_targets_declared",
                  "pass": len(EXPANDED_REFERENCE_TARGETS) == 12,
                  "result": f"expanded_reference_target_count={len(EXPANDED_REFERENCE_TARGETS)}",
                  "boundary": "Target vector only."
              },
              {
                  "rule_id": "eBOSS_priority_targets_present",
                  "pass": all(target in [row["target_id"] for row in EXPANDED_REFERENCE_TARGETS] for target in ["z0698_eBOSS_LRG", "z0850_eBOSS_ELG", "z1480_eBOSS_QSO"]),
                  "result": "eBOSS LRG, ELG, and QSO reference targets present",
                  "boundary": "Reference design only."
              },
              {
                  "rule_id": "reference_upgrade_options_declared",
                  "pass": len(REFERENCE_UPGRADE_OPTIONS) >= 4,
                  "result": f"option_count={len(REFERENCE_UPGRADE_OPTIONS)}",
                  "boundary": "No upgrade computed."
              },
              {
                  "rule_id": "upgrade_requirements_declared",
                  "pass": len(UPGRADE_DATA_REQUIREMENTS) >= 6 and len(UPGRADE_GATE_PLAN) >= 6,
                  "result": f"requirements={len(UPGRADE_DATA_REQUIREMENTS)}; gates={len(UPGRADE_GATE_PLAN)}",
                  "boundary": "Feasibility next."
              },
              {
                  "rule_id": "next_probe_is_feasibility_not_pressure",
                  "pass": NEXT_PROBE_DESIGN["allowed_to_compute_final_RSD_pressure"] is False,
                  "result": "next probe checks feasibility and cannot compute final RSD pressure",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "observed_covariance_limit_preserved",
                  "pass": upstream["same_program_covariance_still_limited"] is True,
                  "result": "same-program eBOSS covariance remains limited after reference design",
                  "boundary": "Reference upgrade alone cannot finalize eBOSS."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": True,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_135_rules_passed")

          if failed_gates:
              readiness_label = "CAMB_chain_expanded_reference_upgrade_design_failed"
              next_allowed_step = "Repair reference upgrade design before feasibility probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.136 reference upgrade feasibility probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_covariance_ingested": upstream["covariance_ingested"],
              "upstream_usable_covariance_locked": upstream["usable_covariance_locked"],
              "upstream_reference_fallback_still_active": upstream["reference_fallback_still_active"],
              "expanded_reference_target_count": len(EXPANDED_REFERENCE_TARGETS),
              "reference_upgrade_option_count": len(REFERENCE_UPGRADE_OPTIONS),
              "upgrade_requirement_count": len(UPGRADE_DATA_REQUIREMENTS),
              "upgrade_gate_count": len(UPGRADE_GATE_PLAN),
              "eBOSS_priority_targets_present": True,
              "CAMB_run": False,
              "full_planck_chains_imported": False,
              "reference_upgrade_computed": False,
              "reference_covariance_upgraded": False,
              "observed_eBOSS_covariance_still_limited": True,
              "pressure_recomputed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "expanded_reference_targets": EXPANDED_REFERENCE_TARGETS,
              "reference_upgrade_options": REFERENCE_UPGRADE_OPTIONS,
              "upgrade_data_requirements": UPGRADE_DATA_REQUIREMENTS,
              "upgrade_gate_plan": UPGRADE_GATE_PLAN,
              "next_probe_design": NEXT_PROBE_DESIGN,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "reference_upgrade_computed": False,
                  "reference_covariance_upgraded": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_135_camb_chain_expanded_reference_upgrade_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "expanded_reference_targets_v4_135.csv",
              EXPANDED_REFERENCE_TARGETS,
              ["target_id", "z", "role", "current_support"]
          )

          write_csv(
              OUTDIR / "reference_upgrade_options_v4_135.csv",
              REFERENCE_UPGRADE_OPTIONS,
              ["option_id", "rank", "method", "requirements", "strength", "limitation"]
          )

          write_csv(
              OUTDIR / "upgrade_data_requirements_v4_135.csv",
              UPGRADE_DATA_REQUIREMENTS,
              ["requirement_id", "needed", "status", "detail"]
          )

          write_csv(
              OUTDIR / "upgrade_gate_plan_v4_135.csv",
              UPGRADE_GATE_PLAN,
              ["gate_id", "requirement", "failure_action"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_135.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_135.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_135.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.135 — CAMB / Chain Expanded Reference Upgrade Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.134 recorded locator status for eBOSS covariance and likelihood paths but did not ingest a usable same-program covariance. v4.135 therefore designs the reference-side upgrade route instead of pretending the eBOSS two-driver split is final.")
          md.append("")
          md.append("The target is to replace interpolation fallback for the expanded growth redshift vector, especially the eBOSS LRG, ELG, and QSO points. This design does not run CAMB, import chains, compute pressure, or validate TAIRID.")
          md.append("")
          md.append("## Reference upgrade options")
          md.append("")
          md.append("| Rank | Option | Limitation |")
          md.append("|---:|---|---|")
          for row in REFERENCE_UPGRADE_OPTIONS:
              md.append(f"| `{row['rank']}` | `{row['option_id']}` | `{row['limitation']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_135_camb_chain_expanded_reference_upgrade_design.json",
