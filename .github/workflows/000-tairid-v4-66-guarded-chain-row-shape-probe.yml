name: 000 TAIRID v4.66 Guarded Chain Row Shape Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-66-guarded-chain-row-shape-probe.yml"

jobs:
  tairid-v4-66-guarded-chain-row-shape-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.66 guarded chain row shape probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_66_guarded_chain_row_shape_probe

          python - <<'PY'
          import csv
          import json
          import re
          import struct
          import urllib.request
          import hashlib
          import zlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_66_guarded_chain_row_shape_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_66_guarded_chain_row_shape_probe"

          FULL_GRID_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip"

          # Locked from v4.57 successful ZIP64 central-directory probe.
          FULLGRID_CONTENT_LENGTH_EXPECTED = 11805855817
          ZIP64_CENTRAL_DIRECTORY_OFFSET = 11803187830
          ZIP64_CENTRAL_DIRECTORY_SIZE = 2667889

          MAX_RANGE_READ_BYTES = 5_000_000
          MAX_PARAMNAMES_COMPRESSED_BYTES = 50_000
          MAX_CHAIN_COMPRESSED_PREFIX_BYTES = 1_000_000
          MAX_SELECTED_ROOTS = 12
          MAX_ROWS_PER_CHAIN = 5

          SELECTED_PREFIXES = [
              "base/plikHM_TTTEEE_lowl_lowE/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing/",
              "base/plikHM_TT_lowl_lowE/",
              "base/plikHM_TT_lowl_lowE_lensing/",
              "base/plikHM_TTTEEE_lowl_lowE_BAO/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing_BAO/"
          ]

          TRACKED_COLUMNS = [
              "omegabh2",
              "omegach2",
              "theta",
              "tau",
              "logA",
              "ns"
          ]

          BLOCKED_DIRECT_INPUTS = [
              "fsigma8z015",
              "fsigma8z038",
              "fsigma8z051",
              "fsigma8z061",
              "fsigma8z233"
          ]

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This reads only a bounded prefix of selected chain members to validate row shape and column alignment.",
              "A pass means the chain row shape is compatible with a guarded future parser, not that uncertainty is computed."
          ]

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }

              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={
                          "User-Agent": "TAIRID-v4.66-chain-row-shape/1.0",
                          "Accept": "*/*"
                      }
                  )

                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }

              data = b""

              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.66-chain-row-shape/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )

                  with urllib.request.urlopen(req, timeout=180) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)

                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record, data

          def classify_member(name):
              lower = name.lower()

              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".paramnames"):
                  return "paramnames"
              if re.search(r"_\d+\.txt$", name):
                  return "chain_sample_text_member_prefix_only"
              if lower.endswith(".minimum"):
                  return "minimum"
              if lower.endswith(".bestfit"):
                  return "bestfit"
              if lower.endswith(".likestats"):
                  return "likestats"
              if lower.endswith(".ranges"):
                  return "ranges"
              if lower.endswith(".converge"):
                  return "converge"
              if lower.endswith(".txt"):
                  return "other_text_not_read"
              return "other"

          def parse_zip64_extra(extra_bytes, need_uncompressed, need_compressed, need_local_offset):
              result = {}
              pos = 0

              while pos + 4 <= len(extra_bytes):
                  header_id, data_size = struct.unpack_from("<HH", extra_bytes, pos)
                  data_start = pos + 4
                  data_end = data_start + data_size

                  if data_end > len(extra_bytes):
                      break

                  data = extra_bytes[data_start:data_end]

                  if header_id == 0x0001:
                      subpos = 0

                      if need_uncompressed and subpos + 8 <= len(data):
                          result["uncompressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8

                      if need_compressed and subpos + 8 <= len(data):
                          result["compressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8

                      if need_local_offset and subpos + 8 <= len(data):
                          result["local_header_offset"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8

                  pos = data_end

              return result

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0

              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break

                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)

                      compression_method = fields[4]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      extra_start = name_end
                      extra_end = extra_start + extra_len
                      comment_end = extra_end + comment_len

                      if comment_end > len(cd_bytes):
                          break

                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")
                      extra = cd_bytes[extra_start:extra_end]

                      zip64_extra = parse_zip64_extra(
                          extra,
                          need_uncompressed=uncompressed_size == 0xFFFFFFFF,
                          need_compressed=compressed_size == 0xFFFFFFFF,
                          need_local_offset=local_header_offset == 0xFFFFFFFF
                      )

                      true_compressed_size = zip64_extra.get("compressed_size", compressed_size)
                      true_uncompressed_size = zip64_extra.get("uncompressed_size", uncompressed_size)
                      true_local_header_offset = zip64_extra.get("local_header_offset", local_header_offset)

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compression_method": compression_method,
                          "compressed_size": true_compressed_size,
                          "uncompressed_size": true_uncompressed_size,
                          "local_header_offset": true_local_header_offset,
                          "zip64_extra_used": bool(zip64_extra)
                      })

                      pos = comment_end

                  except Exception:
                      break

              return records

          def root_from_paramnames(name):
              if name.endswith(".paramnames"):
                  return name[:-len(".paramnames")]
              return name

          def root_from_chain(name):
              match = re.match(r"^(.*)_\d+\.txt$", name)
              return match.group(1) if match else None

          def parse_paramnames_text(text):
              rows = []
              names = []

              for raw_line in text.splitlines():
                  line = raw_line.strip()

                  if not line or line.startswith("#"):
                      continue

                  parts = line.split(None, 1)
                  name = parts[0]
                  label = parts[1] if len(parts) > 1 else ""

                  rows.append({
                      "name": name,
                      "label": label
                  })
                  names.append(name)

              return rows, names

          def build_column_index(param_names):
              # Chain text assumed: col0 weight, col1 minus loglike, parameters start col2.
              return {name: index + 2 for index, name in enumerate(param_names)}

          def fetch_member_bytes(member_record, max_member_compressed_bytes):
              offset = int(member_record["local_header_offset"])
              compressed_size = int(member_record["compressed_size"])
              compression_method_from_cd = int(member_record["compression_method"])

              if compressed_size <= 0:
                  raise RuntimeError("compressed_size_not_positive")

              header_record, header_data = range_probe(
                  "local_header_probe",
                  FULL_GRID_URL,
                  f"bytes={offset}-{offset + 4095}",
                  4096
              )

              if not header_record["ok"] or not header_record["server_honored_range"]:
                  raise RuntimeError("local_header_range_not_available")

              if len(header_data) < 30:
                  raise RuntimeError("local_header_too_short")

              if header_data[:4] != b"PK\x03\x04":
                  raise RuntimeError("local_header_signature_not_found")

              fields = struct.unpack_from("<4s5H3L2H", header_data, 0)

              compression_method = fields[3]
              file_name_len = fields[9]
              extra_len = fields[10]

              data_start = offset + 30 + file_name_len + extra_len

              bytes_to_fetch = min(compressed_size, max_member_compressed_bytes)
              data_end = data_start + bytes_to_fetch - 1

              data_record, compressed_data = range_probe(
                  "member_payload_prefix_probe",
                  FULL_GRID_URL,
                  f"bytes={data_start}-{data_end}",
                  bytes_to_fetch + 1024
              )

              if not data_record["ok"] or not data_record["server_honored_range"]:
                  raise RuntimeError("member_payload_range_not_available")

              if data_record["truncated_by_guard"]:
                  raise RuntimeError("member_payload_truncated_by_guard")

              if compression_method == 0:
                  payload = compressed_data
              elif compression_method == 8:
                  decompressor = zlib.decompressobj(-15)
                  payload = decompressor.decompress(compressed_data)
              else:
                  raise RuntimeError(f"unsupported_compression_method_{compression_method}")

              return payload, compression_method, data_record

          def selected_roots_from_manifest(manifest_records):
              paramnames_by_root = {}
              chain_members_by_root = {}

              for row in manifest_records:
                  name = row["member_name"]

                  if row["member_type"] == "paramnames" and any(name.startswith(prefix) for prefix in SELECTED_PREFIXES):
                      root = root_from_paramnames(name)
                      paramnames_by_root[root] = row

                  if row["member_type"] == "chain_sample_text_member_prefix_only" and any(name.startswith(prefix) for prefix in SELECTED_PREFIXES):
                      root = root_from_chain(name)
                      if root:
                          chain_members_by_root.setdefault(root, []).append(row)

              roots = []

              for root, param_member in sorted(paramnames_by_root.items()):
                  chain_members = sorted(chain_members_by_root.get(root, []), key=lambda row: row["member_name"])
                  if chain_members:
                      roots.append({
                          "root": root,
                          "paramnames_member": param_member,
                          "chain_member": chain_members[0],
                          "chain_member_count": len(chain_members)
                      })

              return roots[:MAX_SELECTED_ROOTS]

          def parse_chain_rows_from_text(text, max_rows):
              rows = []

              for raw_line in text.splitlines():
                  line = raw_line.strip()

                  if not line or line.startswith("#"):
                      continue

                  parts = line.split()

                  try:
                      numeric = [float(x) for x in parts]
                  except ValueError:
                      continue

                  rows.append(numeric)

                  if len(rows) >= max_rows:
                      break

              return rows

          failed_gates = []
          warnings = [
              "guarded_chain_row_shape_probe_only",
              "bounded_prefix_only",
              "full_grid_not_downloaded",
              "full_chains_not_imported",
              "reference_uncertainty_not_computed",
              "final_RSD_pressure_not_computed",
              "not_validation"
          ]

          head_record = head_probe("full_grid_head", FULL_GRID_URL)

          if not head_record["ok"]:
              failed_gates.append("full_grid_head_probe_failed")

          if head_record.get("content_length") and head_record["content_length"] != FULLGRID_CONTENT_LENGTH_EXPECTED:
              warnings.append("fullgrid_content_length_differs_from_v4_57_locked_value")

          cd_start = ZIP64_CENTRAL_DIRECTORY_OFFSET
          cd_end = ZIP64_CENTRAL_DIRECTORY_OFFSET + ZIP64_CENTRAL_DIRECTORY_SIZE - 1

          cd_record, cd_data = range_probe(
              "full_grid_locked_zip64_central_directory_fetch",
              FULL_GRID_URL,
              f"bytes={cd_start}-{cd_end}",
              MAX_RANGE_READ_BYTES
          )

          if not cd_record["ok"]:
              failed_gates.append("central_directory_fetch_failed")

          if not cd_record.get("server_honored_range"):
              failed_gates.append("central_directory_range_not_honored")

          if cd_record.get("truncated_by_guard"):
              failed_gates.append("central_directory_truncated_by_guard")

          manifest_records = parse_central_directory(cd_data) if cd_data else []

          if not manifest_records:
              failed_gates.append("central_directory_manifest_records_not_parsed")

          selected_roots = selected_roots_from_manifest(manifest_records)

          if not selected_roots:
              failed_gates.append("no_selected_roots_with_paramnames_and_chain_members")

          paramnames_records = []
          chain_shape_records = []
          tracked_value_records = []

          roots_with_shape_pass = []
          roots_with_required_primary_values = []

          for selected in selected_roots:
              root = selected["root"]
              param_member = selected["paramnames_member"]
              chain_member = selected["chain_member"]

              param_record = {
                  "root": root,
                  "paramnames_member_name": param_member["member_name"],
                  "paramnames_ok": False,
                  "parameter_count": 0,
                  "tracked_columns_found": "",
                  "blocked_direct_inputs_found": "",
                  "error": ""
              }

              chain_record = {
                  "root": root,
                  "chain_member_name": chain_member["member_name"],
                  "chain_member_count_for_root": selected["chain_member_count"],
                  "chain_prefix_probe_ok": False,
                  "compressed_size": chain_member["compressed_size"],
                  "uncompressed_size": chain_member["uncompressed_size"],
                  "compressed_prefix_bytes_requested": min(chain_member["compressed_size"], MAX_CHAIN_COMPRESSED_PREFIX_BYTES),
                  "decompressed_prefix_bytes": 0,
                  "parsed_row_count": 0,
                  "expected_column_count": "",
                  "observed_column_counts": "",
                  "row_shape_pass": False,
                  "positive_weight_rows": 0,
                  "finite_loglike_rows": 0,
                  "error": ""
              }

              try:
                  param_payload, method, payload_record = fetch_member_bytes(param_member, MAX_PARAMNAMES_COMPRESSED_BYTES)
                  param_text = param_payload.decode("utf-8", errors="replace")
                  param_rows, param_names = parse_paramnames_text(param_text)
                  column_index = build_column_index(param_names)

                  tracked_found = [name for name in TRACKED_COLUMNS if name in column_index]
                  blocked_found = [name for name in BLOCKED_DIRECT_INPUTS if name in column_index]

                  param_record["paramnames_ok"] = True
                  param_record["parameter_count"] = len(param_names)
                  param_record["tracked_columns_found"] = ", ".join(tracked_found)
                  param_record["blocked_direct_inputs_found"] = ", ".join(blocked_found)

                  expected_column_count = len(param_names) + 2

                  chain_payload, chain_method, chain_payload_record = fetch_member_bytes(chain_member, MAX_CHAIN_COMPRESSED_PREFIX_BYTES)
                  chain_text = chain_payload.decode("utf-8", errors="replace")
                  parsed_rows = parse_chain_rows_from_text(chain_text, MAX_ROWS_PER_CHAIN)

                  observed_counts = [len(row) for row in parsed_rows]
                  shape_pass = bool(parsed_rows) and all(count == expected_column_count for count in observed_counts)

                  positive_weight_rows = 0
                  finite_loglike_rows = 0

                  for row_index, numeric_row in enumerate(parsed_rows):
                      if len(numeric_row) >= 2:
                          if numeric_row[0] > 0:
                              positive_weight_rows += 1
                          if numeric_row[1] == numeric_row[1]:
                              finite_loglike_rows += 1

                      for tracked_name in TRACKED_COLUMNS:
                          col = column_index.get(tracked_name)
                          if col is not None and col < len(numeric_row):
                              tracked_value_records.append({
                                  "root": root,
                                  "chain_member_name": chain_member["member_name"],
                                  "row_index_in_probe": row_index,
                                  "parameter_name": tracked_name,
                                  "chain_column_zero_based": col,
                                  "value": numeric_row[col],
                                  "source_status": "bounded_prefix_shape_probe_not_uncertainty"
                              })

                  chain_record["chain_prefix_probe_ok"] = True
                  chain_record["decompressed_prefix_bytes"] = len(chain_payload)
                  chain_record["parsed_row_count"] = len(parsed_rows)
                  chain_record["expected_column_count"] = expected_column_count
                  chain_record["observed_column_counts"] = ", ".join(str(x) for x in observed_counts)
                  chain_record["row_shape_pass"] = shape_pass
                  chain_record["positive_weight_rows"] = positive_weight_rows
                  chain_record["finite_loglike_rows"] = finite_loglike_rows

                  if shape_pass:
                      roots_with_shape_pass.append(root)

                  required_primary = {"omegabh2", "omegach2", "theta"}
                  if required_primary.issubset(set(tracked_found)) and shape_pass:
                      roots_with_required_primary_values.append(root)

              except Exception as exc:
                  chain_record["error"] = f"{type(exc).__name__}: {exc}"
                  if not param_record["paramnames_ok"]:
                      param_record["error"] = f"{type(exc).__name__}: {exc}"

              paramnames_records.append(param_record)
              chain_shape_records.append(chain_record)

          paramnames_ok_count = sum(1 for row in paramnames_records if row["paramnames_ok"])
          chain_probe_ok_count = sum(1 for row in chain_shape_records if row["chain_prefix_probe_ok"])
          row_shape_pass_count = sum(1 for row in chain_shape_records if row["row_shape_pass"])
          row_shape_fail_count = chain_probe_ok_count - row_shape_pass_count

          roots_with_shape_pass_count = len(set(roots_with_shape_pass))
          roots_with_required_primary_values_count = len(set(roots_with_required_primary_values))

          if paramnames_ok_count == 0:
              failed_gates.append("no_paramnames_extracted_successfully")

          if chain_probe_ok_count == 0:
              failed_gates.append("no_chain_prefix_probe_succeeded")

          if row_shape_pass_count == 0:
              failed_gates.append("no_chain_row_shapes_passed")

          if row_shape_fail_count > 0:
              warnings.append("some_chain_row_shapes_failed")

          if roots_with_required_primary_values_count == 0:
              failed_gates.append("no_roots_with_primary_density_row_values")

          route_decision = (
              "guarded_chain_row_shape_probe_passed_ready_for_primary_density_background_contract_design"
              if not failed_gates
              else "guarded_chain_row_shape_probe_incomplete"
          )

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "fullgrid_not_downloaded",
                  "pass": True,
                  "result": "only bounded ranges read",
                  "boundary": "No fullGrid download."
              },
              {
                  "rule_id": "central_directory_fetched_from_v4_57_offsets",
                  "pass": cd_record["ok"] and cd_record["server_honored_range"] and not cd_record["truncated_by_guard"],
                  "result": f"central_directory_bytes_read_{cd_record.get('bytes_read')}",
                  "boundary": "Central directory only."
              },
              {
                  "rule_id": "selected_roots_found",
                  "pass": bool(selected_roots),
                  "result": f"{len(selected_roots)} selected roots with paramnames and chain members",
                  "boundary": "Root selection only."
              },
              {
                  "rule_id": "paramnames_extracted",
                  "pass": paramnames_ok_count > 0,
                  "result": f"{paramnames_ok_count} paramnames files extracted",
                  "boundary": "Small paramnames only."
              },
              {
                  "rule_id": "chain_prefix_rows_parsed",
                  "pass": chain_probe_ok_count > 0,
                  "result": f"{chain_probe_ok_count} chain prefix probes parsed",
                  "boundary": "Bounded prefix rows only, not full chain import."
              },
              {
                  "rule_id": "row_shape_validated",
                  "pass": row_shape_pass_count > 0,
                  "result": f"{row_shape_pass_count} chain prefix probes passed row shape",
                  "boundary": "Shape validation only."
              },
              {
                  "rule_id": "primary_density_values_available",
                  "pass": roots_with_required_primary_values_count > 0,
                  "result": f"{roots_with_required_primary_values_count} roots have primary density tracked values",
                  "boundary": "No uncertainty computed."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute uncertainty."
              },
              {
                  "rule_id": "no_reference_uncertainty_or_final_pressure",
                  "pass": True,
                  "result": "no_reference_uncertainty_no_final_RSD_pressure",
                  "boundary": "Probe only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_66_rules_passed")

          if failed_gates:
              readiness_label = "guarded_chain_row_shape_probe_failed"
              next_allowed_step = "Repair chain-row shape probe before primary-density background contract design."
          else:
              readiness_label = "guarded_chain_row_shape_probe_passed_ready_for_primary_density_background_contract_design"
              next_allowed_step = (
                  "Proceed to v4.67 primary-density background contract design. "
                  "Do not compute reference uncertainty or final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "head_ok": head_record["ok"],
              "head_content_length": head_record.get("content_length"),
              "central_directory_bytes_read": cd_record.get("bytes_read"),
              "manifest_member_count": len(manifest_records),
              "selected_root_count": len(selected_roots),
              "paramnames_ok_count": paramnames_ok_count,
              "chain_prefix_probe_ok_count": chain_probe_ok_count,
