name: 000 TAIRID v4.123 Edge Anchor Review Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-123-edge-anchor-review-probe.yml"

jobs:
  tairid-v4-123-edge-anchor-review-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.123 edge anchor review probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_123_edge_anchor_review_probe

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_123_edge_anchor_review_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_123_edge_anchor_review_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This reviews only the two edge anchors at z=0.15 and z=2.33.",
              "This preserves the verified central BOSS covariance block from v4.119 through v4.121.",
              "This may lock a literature error model or move an edge anchor to sensitivity-only, but it does not compute final pressure."
          ]

          UPSTREAM_LOCKS = {
              "v4_122_low_high_z_anchor_covariance_review_design": {
                  "readiness_label": "low_high_z_anchor_covariance_review_design_passed_ready_for_edge_anchor_review_probe",
                  "upstream_verified_bridge_stable": True,
                  "upstream_pressure_z_all_zero": True,
                  "central_BOSS_covariance_locked": True,
                  "edge_anchor_covariance_incomplete": True,
                  "low_z_anchor_source_covariance_complete": False,
                  "high_z_anchor_source_covariance_complete": False,
                  "edge_anchor_review_target_count": 2,
                  "edge_source_fetch_performed": False,
                  "bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_121_verified_bridge_sensitivity_audit": {
                  "readiness_label": "verified_bridge_sensitivity_audit_passed_pressure_stable_source_choice_material_not_final_ready_for_low_high_z_anchor_covariance_review_design",
                  "verified_BOSS_covariance_inserted": True,
                  "primary_verified_chi2": 1.721941483224999,
                  "primary_verified_pressure_z": 0.0,
                  "pressure_z_all_zero": True,
                  "diagnostic_pressure_stable": True,
                  "edge_anchor_covariance_incomplete": True,
                  "low_z_anchor_source_covariance_complete": False,
                  "high_z_anchor_source_covariance_complete": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          EDGE_ANCHOR_INPUTS = [
              {
                  "anchor_id": "low_z_anchor_z015",
                  "z": 0.15,
                  "current_value": 0.49,
                  "current_sigma": 0.145,
                  "current_sigma_basis": "average_of_asymmetric_0.14_0.15",
                  "source_family": "SDSS_DR7_MGS",
                  "current_covariance_status": "diagonal_fallback_source_covariance_not_locked",
                  "source_url_or_locator": "https://arxiv.org/abs/1409.3238",
                  "intended_review": "source-lock value and literature error model; keep fallback label because no bridge covariance matrix is ingested",
                  "starting_primary_bridge_decision": "primary_pending_review"
              },
              {
                  "anchor_id": "high_z_anchor_z233",
                  "z": 2.33,
                  "current_value": 0.364,
                  "current_sigma": 0.106,
                  "current_sigma_basis": "current_diagnostic_high_z_anchor_uncertainty",
                  "source_family": "high_z_LyA_compilation_anchor",
                  "current_covariance_status": "diagonal_fallback_source_covariance_not_locked",
                  "source_url_or_locator": "manual_locator_required_high_z_growth_anchor",
                  "intended_review": "do not keep in primary bridge unless source, observable definition, and covariance/error model are source-locked",
                  "starting_primary_bridge_decision": "primary_pending_review"
              }
          ]

          VERIFIED_CENTRAL_BOSS_CORE = [
              {"position": 1, "z": 0.38, "covariance_status": "verified_BOSS_consensus_covtot_subblock", "locked": True},
              {"position": 2, "z": 0.51, "covariance_status": "verified_BOSS_consensus_covtot_subblock", "locked": True},
              {"position": 3, "z": 0.61, "covariance_status": "verified_BOSS_consensus_covtot_subblock", "locked": True}
          ]

          LOW_Z_SOURCE_LOCK_EXPECTATIONS = [
              {
                  "expectation_id": "low_z_arxiv_fetches",
                  "description": "The Howlett/Ross/Samushia/Percival/Manera MGS RSD arXiv page should fetch.",
                  "required_for_low_z_literature_lock": True
              },
              {
                  "expectation_id": "low_z_redshift_present",
                  "description": "The source page should contain z_eff=0.15 or equivalent 0.15 language.",
                  "required_for_low_z_literature_lock": True
              },
              {
                  "expectation_id": "low_z_fsigma8_value_present",
                  "description": "The source page should contain the fσ8 value 0.49 or equivalent.",
                  "required_for_low_z_literature_lock": True
              },
              {
                  "expectation_id": "low_z_error_present",
                  "description": "The source page should contain the asymmetric uncertainty values 0.14 and 0.15 or equivalent.",
                  "required_for_low_z_literature_lock": True
              },
              {
                  "expectation_id": "low_z_mock_error_context_present",
                  "description": "The source page should mention mocks or mock catalogues used to derive/validate errors.",
                  "required_for_low_z_literature_lock": False
              }
          ]

          HIGH_Z_SOURCE_LOCK_EXPECTATIONS = [
              {
                  "expectation_id": "high_z_manual_locator_declared",
                  "description": "High-z anchor remains manual/source-lock-needed in this probe.",
                  "required_for_high_z_primary_status": True
              },
              {
                  "expectation_id": "high_z_not_promoted_without_source",
                  "description": "High-z z=2.33 anchor must not remain primary unless source and covariance/error model are locked.",
                  "required_for_high_z_primary_status": True
              }
          ]

          EDGE_DECISION_POLICY = [
              {
                  "decision_id": "low_z_keep_primary_with_literature_error_model",
                  "anchor_id": "low_z_anchor_z015",
                  "decision": "primary_literature_error_model_diagonal_fallback_labeled",
                  "reason": "The low-z MGS value and asymmetric uncertainty are source-lockable, but no full observed covariance matrix is ingested here.",
                  "blocks_final_pressure": True
              },
              {
                  "decision_id": "high_z_move_to_sensitivity_only_pending_source_lock",
                  "anchor_id": "high_z_anchor_z233",
                  "decision": "sensitivity_only_pending_source_lock",
                  "reason": "The high-z point should not control the primary bridge until its source, observable definition, and covariance/error model are source-locked.",
                  "blocks_final_pressure": True
              },
              {
                  "decision_id": "central_BOSS_only_control_lane_required",
                  "anchor_id": "central_BOSS_core",
                  "decision": "preserve_control_lane",
                  "reason": "The verified BOSS core is the cleanest currently locked observed covariance block.",
                  "blocks_final_pressure": False
              },
              {
                  "decision_id": "primary_bridge_next_shape",
                  "anchor_id": "next_primary_bridge",
                  "decision": "primary_next_should_compare_low_z_plus_BOSS_against_BOSS_only_and_full_five_sensitivity",
                  "reason": "The next bridge should show whether edge decisions change pressure or chi-square.",
                  "blocks_final_pressure": True
              }
          ]

          NEXT_BRIDGE_LANE_PLAN = [
              {
                  "lane_id": "central_BOSS_only_verified_control",
                  "positions": "1,2,3",
                  "redshifts": "0.38,0.51,0.61",
                  "edge_status": "no_edges",
                  "purpose": "Clean verified BOSS covariance core control lane.",
                  "required_next": True
              },
              {
                  "lane_id": "low_z_plus_verified_BOSS_primary",
                  "positions": "0,1,2,3",
                  "redshifts": "0.15,0.38,0.51,0.61",
                  "edge_status": "low_z_primary_literature_error_model",
                  "purpose": "Primary next bridge if low-z remains source-locked but diagonal-fallback labeled.",
                  "required_next": True
              },
              {
                  "lane_id": "full_five_with_high_z_sensitivity",
                  "positions": "0,1,2,3,4",
                  "redshifts": "0.15,0.38,0.51,0.61,2.33",
                  "edge_status": "high_z_sensitivity_only_pending_source_lock",
                  "purpose": "Compare to previous five-slot bridge while keeping high-z sensitivity-only.",
                  "required_next": True
              },
              {
                  "lane_id": "high_z_only_edge_sensitivity",
                  "positions": "1,2,3,4",
                  "redshifts": "0.38,0.51,0.61,2.33",
                  "edge_status": "high_z_edge_without_low_z",
                  "purpose": "Reveal whether high-z anchor alone changes diagnostic pressure.",
                  "required_next": False
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The edge anchor review probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The edge-reviewed bridge pressure is final.",
              "Zero pressure-z proves TAIRID.",
              "The low-z and high-z anchors are both source-covariance complete.",
              "The high-z anchor is primary-ready without source lock.",
              "The central BOSS-only bridge is automatically final.",
              "No edge-anchor sensitivity bridge is needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_124_edge_anchor_sensitivity_bridge_probe",
                  "purpose": "Compute guarded bridge lanes for central-BOSS-only, low-z-plus-BOSS primary, full-five high-z sensitivity, and high-z-only edge sensitivity where possible.",
                  "why_next": "v4.123 decides edge-anchor status; v4.124 tests whether those decisions change the diagnostic."
              },
              {
                  "priority": 2,
                  "route_id": "v4_125_growth_family_expansion_design",
                  "purpose": "Design additional observed growth-family coverage beyond the current bridge.",
                  "why_next": "If high-z remains weak or sensitivity-only, broader independent observed growth families become the next clean route."
              },
              {
                  "priority": 3,
                  "route_id": "v4_126_high_z_manual_source_locator",
                  "purpose": "Create a targeted manual locator for the z=2.33 high-z anchor if it remains scientifically important.",
                  "why_next": "The high-z point is not primary-ready without a source lock."
              },
              {
                  "priority": 4,
                  "route_id": "v4_127_claim_boundary_review_handoff",
                  "purpose": "Create a human-readable handoff after the edge-anchor sensitivity bridge.",
                  "why_next": "The result needs careful interpretation before public-facing language."
              }
          ]

          failed_gates = []
          warnings = [
              "edge_anchor_review_only",
              "low_z_literature_error_model_not_full_covariance",
              "high_z_moved_to_sensitivity_only_pending_source_lock",
              "central_BOSS_core_preserved",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def fetch_text(url, max_bytes=500000):
              record = {
                  "url": url,
                  "ok": False,
                  "status": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "error": ""
              }
              text = ""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={"User-Agent": "TAIRID-v4.123-edge-anchor-review/1.0", "Accept": "text/html,text/plain,*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=120) as response:
                      record["status"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      raw = response.read(max_bytes)
                      record["bytes_read"] = len(raw)
                      text = raw.decode("utf-8", errors="replace")
                      record["ok"] = True
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, text

          source_fetch_records = []
          source_check_records = []
          edge_status_records = []

          low_z_fetch_record, low_z_text = fetch_text("https://arxiv.org/abs/1409.3238")
          low_z_fetch_record["anchor_id"] = "low_z_anchor_z015"
          low_z_fetch_record["source_role"] = "low_z_arxiv_abs"
          source_fetch_records.append(low_z_fetch_record)

          low_text_lower = low_z_text.lower()
          low_z_checks = {
              "low_z_arxiv_fetches": low_z_fetch_record["ok"],
              "low_z_redshift_present": ("0.15" in low_text_lower or "z_eff" in low_text_lower or "zeff" in low_text_lower),
              "low_z_fsigma8_value_present": ("0.49" in low_text_lower and ("sigma" in low_text_lower or "f\\sigma" in low_text_lower or "fσ" in low_text_lower)),
              "low_z_error_present": ("0.14" in low_text_lower and "0.15" in low_text_lower),
              "low_z_mock_error_context_present": ("mock" in low_text_lower)
          }

          for expectation in LOW_Z_SOURCE_LOCK_EXPECTATIONS:
              expectation_id = expectation["expectation_id"]
              source_check_records.append({
                  "anchor_id": "low_z_anchor_z015",
                  "check_id": expectation_id,
                  "description": expectation["description"],
                  "required": expectation["required_for_low_z_literature_lock"],
                  "pass": bool(low_z_checks[expectation_id])
              })

          low_z_required_checks_pass = all(
              row["pass"] for row in source_check_records
              if row["anchor_id"] == "low_z_anchor_z015" and row["required"] is True
          )

          for expectation in HIGH_Z_SOURCE_LOCK_EXPECTATIONS:
              source_check_records.append({
                  "anchor_id": "high_z_anchor_z233",
                  "check_id": expectation["expectation_id"],
                  "description": expectation["description"],
                  "required": expectation["required_for_high_z_primary_status"],
                  "pass": True
              })

          high_z_required_checks_pass = True

          low_z_status = {
              "anchor_id": "low_z_anchor_z015",
              "z": 0.15,
              "current_value": 0.49,
              "current_sigma": 0.145,
              "source_family": "SDSS_DR7_MGS",
              "fetch_or_locator_status": "fetched_and_source_locked" if low_z_required_checks_pass else "manual_needed",
              "covariance_status": "literature_error_model_diagonal_fallback_labeled" if low_z_required_checks_pass else "diagonal_fallback_manual_needed",
              "primary_bridge_decision": "primary_with_literature_error_model" if low_z_required_checks_pass else "sensitivity_only_until_source_lock",
              "claim_boundary": "diagnostic_only_not_full_covariance",
              "source_lock_passed": low_z_required_checks_pass,
              "blocks_final_pressure": True
          }

          high_z_status = {
              "anchor_id": "high_z_anchor_z233",
              "z": 2.33,
              "current_value": 0.364,
              "current_sigma": 0.106,
              "source_family": "high_z_LyA_compilation_anchor",
              "fetch_or_locator_status": "manual_locator_required",
              "covariance_status": "not_source_locked_sensitivity_only",
              "primary_bridge_decision": "sensitivity_only_pending_source_lock",
              "claim_boundary": "diagnostic_only_not_primary_ready",
              "source_lock_passed": False,
              "blocks_final_pressure": True
          }

          edge_status_records.extend([low_z_status, high_z_status])

          central_BOSS_core_preserved = all(row["locked"] is True for row in VERIFIED_CENTRAL_BOSS_CORE)
          low_z_literature_locked = low_z_status["source_lock_passed"] is True
          high_z_moved_sensitivity = high_z_status["primary_bridge_decision"] == "sensitivity_only_pending_source_lock"
          both_edge_decisions_recorded = len(edge_status_records) == 2 and all(row["primary_bridge_decision"] != "" for row in edge_status_records)
          required_bridge_lanes_declared = len([row for row in NEXT_BRIDGE_LANE_PLAN if row["required_next"] is True]) >= 3

          if UPSTREAM_LOCKS["v4_122_low_high_z_anchor_covariance_review_design"]["central_BOSS_covariance_locked"] is not True:
              failed_gates.append("upstream_central_BOSS_lock_not_carried")

          if UPSTREAM_LOCKS["v4_122_low_high_z_anchor_covariance_review_design"]["edge_anchor_covariance_incomplete"] is not True:
              failed_gates.append("upstream_edge_incomplete_status_not_carried")

          if not central_BOSS_core_preserved:
              failed_gates.append("central_BOSS_core_not_preserved")

          if not both_edge_decisions_recorded:
              failed_gates.append("edge_decisions_not_recorded")

          if not low_z_literature_locked:
              failed_gates.append("low_z_literature_source_lock_failed")

          if not high_z_moved_sensitivity:
              failed_gates.append("high_z_not_moved_to_sensitivity_only")

          if not required_bridge_lanes_declared:
              failed_gates.append("next_bridge_lanes_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "edge-reviewed bridge pressure is final",
              "zero pressure-z proves tairid",
              "high-z anchor is primary-ready without source lock",
              "no edge-anchor sensitivity bridge is needed",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "edge_anchor_review_probe_passed_low_z_literature_locked_high_z_sensitivity_only_ready_for_edge_anchor_sensitivity_bridge_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_edge_review_design_carried",
                  "pass": UPSTREAM_LOCKS["v4_122_low_high_z_anchor_covariance_review_design"]["edge_anchor_covariance_incomplete"] is True,
                  "result": "v4.122 edge-review design carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "central_BOSS_core_preserved",
                  "pass": central_BOSS_core_preserved,
                  "result": "verified central BOSS covariance core preserved",
                  "boundary": "Do not disturb verified core."
              },
              {
                  "rule_id": "low_z_literature_error_model_locked",
                  "pass": low_z_literature_locked,
                  "result": low_z_status["covariance_status"],
                  "boundary": "Literature error model, not full covariance."
              },
              {
                  "rule_id": "high_z_moved_to_sensitivity_only",
                  "pass": high_z_moved_sensitivity,
                  "result": high_z_status["primary_bridge_decision"],
                  "boundary": "High-z is not primary-ready."
              },
              {
                  "rule_id": "edge_decisions_recorded",
                  "pass": both_edge_decisions_recorded,
                  "result": f"edge_status_records={len(edge_status_records)}",
                  "boundary": "Decision record only."
              },
              {
                  "rule_id": "next_bridge_lanes_declared",
                  "pass": required_bridge_lanes_declared,
                  "result": f"next_bridge_lane_count={len(NEXT_BRIDGE_LANE_PLAN)}",
                  "boundary": "Design for next bridge."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": True,
                  "result": "final RSD pressure and TAIRID validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_123_rules_passed")

          if failed_gates:
              readiness_label = "edge_anchor_review_probe_failed"
              next_allowed_step = "Repair edge anchor review probe before edge-anchor sensitivity bridge."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.124 edge anchor sensitivity bridge probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "central_BOSS_core_preserved": central_BOSS_core_preserved,
              "low_z_arxiv_fetch_ok": low_z_fetch_record["ok"],
              "low_z_literature_locked": low_z_literature_locked,
              "low_z_primary_bridge_decision": low_z_status["primary_bridge_decision"],
              "low_z_covariance_status": low_z_status["covariance_status"],
              "high_z_source_lock_passed": high_z_status["source_lock_passed"],
              "high_z_primary_bridge_decision": high_z_status["primary_bridge_decision"],
              "high_z_covariance_status": high_z_status["covariance_status"],
              "both_edge_decisions_recorded": both_edge_decisions_recorded,
              "next_bridge_lane_count": len(NEXT_BRIDGE_LANE_PLAN),
              "edge_source_fetch_performed": True,
              "bridge_pressure_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "edge_anchor_inputs": EDGE_ANCHOR_INPUTS,
              "verified_central_BOSS_core": VERIFIED_CENTRAL_BOSS_CORE,
              "source_fetch_records": source_fetch_records,
              "source_check_records": source_check_records,
              "edge_status_records": edge_status_records,
              "edge_decision_policy": EDGE_DECISION_POLICY,
              "next_bridge_lane_plan": NEXT_BRIDGE_LANE_PLAN,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "central_BOSS_core_preserved": central_BOSS_core_preserved,
                  "low_z_literature_locked": low_z_literature_locked,
                  "high_z_moved_sensitivity_only": high_z_moved_sensitivity,
                  "both_edge_decisions_recorded": both_edge_decisions_recorded,
                  "bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_123_edge_anchor_review_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "source_fetch_records_v4_123.csv",
              source_fetch_records,
              ["anchor_id", "source_role", "url", "ok", "status", "content_type", "bytes_read", "error"]
          )

          write_csv(
              OUTDIR / "source_check_records_v4_123.csv",
              source_check_records,
              ["anchor_id", "check_id", "description", "required", "pass"]
          )

          write_csv(
              OUTDIR / "edge_status_records_v4_123.csv",
              edge_status_records,
              ["anchor_id", "z", "current_value", "current_sigma", "source_family", "fetch_or_locator_status", "covariance_status", "primary_bridge_decision", "claim_boundary", "source_lock_passed", "blocks_final_pressure"]
          )

          write_csv(
              OUTDIR / "edge_decision_policy_v4_123.csv",
              EDGE_DECISION_POLICY,
              ["decision_id", "anchor_id", "decision", "reason", "blocks_final_pressure"]
          )

          write_csv(
              OUTDIR / "next_bridge_lane_plan_v4_123.csv",
              NEXT_BRIDGE_LANE_PLAN,
              ["lane_id", "positions", "redshifts", "edge_status", "purpose", "required_next"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_123.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_123.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_123.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.123 — Edge Anchor Review Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.123 reviews the two edge anchors without disturbing the verified central BOSS covariance block.")
          md.append("")
          md.append("The low-z z=0.15 MGS anchor is kept as primary only as a literature error-model / diagonal-fallback-labeled point. The high-z z=2.33 anchor is moved to sensitivity-only pending a source lock.")
          md.append("")
          md.append("This does not compute final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## Edge decisions")
          md.append("")
          md.append("| Anchor | z | Decision | Covariance status |")
          md.append("|---|---:|---|---|")
          for row in edge_status_records:
              md.append(f"| `{row['anchor_id']}` | `{row['z']}` | `{row['primary_bridge_decision']}` | `{row['covariance_status']}` |")
          md.append("")
          md.append("## Next bridge lanes")
          md.append("")
          md.append("| Lane | Positions | Required |")
          md.append("|---|---|---|")
          for row in NEXT_BRIDGE_LANE_PLAN:
              md.append(f"| `{row['lane_id']}` | `{row['positions']}` | `{row['required_next']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_123_edge_anchor_review_probe.json",
              "tairid_v4_123_edge_anchor_review_probe.md",
              "source_fetch_records_v4_123.csv",
              "source_check_records_v4_123.csv",
              "edge_status_records_v4_123.csv",
              "edge_decision_policy_v4_123.csv",
              "next_bridge_lane_plan_v4_123.csv",
              "blocked_claims_v4_123.csv",
              "next_route_options_v4_123.csv",
              "rule_results_v4_123.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_123_edge_anchor_review_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.123 edge anchor review probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-123-edge-anchor-review-probe
          path: artifacts/tairid_v4_123_edge_anchor_review_probe/
