name: 000 TAIRID v4.158 — Reference Generation Route Feasibility and Package Schema With Scope Guards

on:
  workflow_dispatch:

jobs:
  tairid-v4-158-reference-generation-route-feasibility-and-package-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run TAIRID v4.158 reference-generation route feasibility and package-schema guard
        shell: bash
        run: |
          cat > run_tairid_v4_158_reference_generation_route_feasibility_and_package_schema.py <<'PY'
          import csv
          import datetime as dt
          import hashlib
          import importlib.util
          import json
          import os
          import platform
          import shutil
          import subprocess
          import sys
          import time
          import zipfile
          from pathlib import Path

          VERSION = "v4.158"
          TITLE = "000 TAIRID v4.158 — Reference Generation Route Feasibility and Package Schema With Scope Guards"
          EXPECTED_RESULT = "reference_generation_route_feasibility_and_package_schema_passed_templates_written_no_ingestion_no_pressure_no_validation"
          OUT = Path("tairid_v4_158_reference_generation_route_feasibility_and_package_schema_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          CREATED_UTC = dt.datetime.now(dt.timezone.utc).isoformat()

          OBSERVED_ORDER = [
              {"slot_index": 0, "row_id": "DM_ov_rd_z0p70", "z": "0.700", "observable": "DM_over_rd", "observed_product_role": "geometry_transverse"},
              {"slot_index": 1, "row_id": "DH_ov_rd_z0p70", "z": "0.700", "observable": "DH_over_rd", "observed_product_role": "geometry_radial"},
              {"slot_index": 2, "row_id": "fsigma8_z0p70", "z": "0.700", "observable": "fsigma8", "observed_product_role": "growth"},
              {"slot_index": 3, "row_id": "DM_ov_rd_z0p845", "z": "0.845", "observable": "DM_over_rd", "observed_product_role": "geometry_transverse"},
              {"slot_index": 4, "row_id": "DH_ov_rd_z0p845", "z": "0.845", "observable": "DH_over_rd", "observed_product_role": "geometry_radial"},
              {"slot_index": 5, "row_id": "fsigma8_z0p845", "z": "0.845", "observable": "fsigma8", "observed_product_role": "growth"},
          ]

          REQUIRED_DEPENDENCIES = [
              {
                  "dependency_id": "limited_lrgxelg_reference_mean_vector_6",
                  "scope": "limited_LRGxELG_two_redshift",
                  "required_content": "model/reference means for DM/rd, DH/rd, and fsigma8 at z=0.70 and z=0.845 in the observed six-row order",
                  "acceptable_forms": "CAMB/CLASS calculation with frozen cosmology; parameter-chain-derived predictions; documented published reference vector",
                  "needed_before": "any limited coupled residual or pressure attempt",
              },
              {
                  "dependency_id": "limited_lrgxelg_reference_covariance_or_samples",
                  "scope": "limited_LRGxELG_two_redshift",
                  "required_content": "reference covariance for the six predicted quantities, or parameter/posterior samples allowing it to be generated",
                  "acceptable_forms": "Planck posterior samples; CLASS/CAMB sample propagation; documented covariance matrix",
                  "needed_before": "honest coupled residual uncertainty and reference sensitivity",
              },
              {
                  "dependency_id": "expanded_12_redshift_growth_reference_vector",
                  "scope": "expanded_growth_lane",
                  "required_content": "reference fsigma8-like values at all expanded growth redshift targets used in the previous lane",
                  "acceptable_forms": "stored reference vector; reproducible CAMB/CLASS calculation; parameter-chain-derived vector",
                  "needed_before": "full growth/RSD pressure interpretation across prior expanded redshift targets",
              },
              {
                  "dependency_id": "expanded_12_redshift_reference_covariance_or_samples",
                  "scope": "expanded_growth_lane",
                  "required_content": "reference covariance or parameter samples spanning the expanded redshift vector",
                  "acceptable_forms": "Planck posterior samples; documented covariance; reproducible propagation from samples",
                  "needed_before": "pressure magnitude, correlated uncertainty, and final interpretation guard",
              },
              {
                  "dependency_id": "qso_covariance_or_likelihood",
                  "scope": "eBOSS_family",
                  "required_content": "QSO value source plus covariance/likelihood and overlap notes with LRG/ELG products",
                  "acceptable_forms": "official SDSS/eBOSS source files; likelihood package; documented covariance table",
                  "needed_before": "QSO counter-component covariance handling",
              },
              {
                  "dependency_id": "full_eboss_family_covariance_or_overlap_model",
                  "scope": "eBOSS_family",
                  "required_content": "cross-tracer covariance/overlap treatment or documented independence/combination rule",
                  "acceptable_forms": "official multi-tracer covariance; paper/language-supported overlap model; likelihood package",
                  "needed_before": "full LRG/ELG/QSO covariance/overlap interpretation",
              },
              {
                  "dependency_id": "final_pressure_methodology_spec",
                  "scope": "final_interpretation_guard",
                  "required_content": "predeclared method for residuals, covariance combination, reference uncertainty, thresholds, and forbidden claims",
                  "acceptable_forms": "locked markdown/JSON methodology file with formulas and scope limits",
                  "needed_before": "any future claim about pressure magnitude",
              },
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A final RSD pressure score was computed.",
              "A residual against LCDM or TAIRID was computed.",
              "A final combined growth covariance was computed.",
              "A generated schema is accepted as scientific data.",
              "A successful software import supplies a reference vector or covariance.",
              "The limited LRGxELG product is full eBOSS covariance.",
              "This workflow provides QSO covariance.",
              "The eBOSS family points are independent by default.",
              "BIC, likelihood, posterior comparison, or model selection has been run.",
              "Public-facing validation claims are allowed.",
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames)
                  w.writeheader()
                  for row in rows:
                      w.writerow(row)

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def import_status(module_name):
              spec = importlib.util.find_spec(module_name)
              return spec is not None

          def run_cmd(cmd, timeout_seconds=180):
              start = time.time()
              try:
                  proc = subprocess.run(
                      cmd,
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      timeout=timeout_seconds,
                      check=False,
                  )
                  return {
                      "returncode": proc.returncode,
                      "stdout_tail": proc.stdout[-3000:],
                      "stderr_tail": proc.stderr[-3000:],
                      "elapsed_seconds": round(time.time() - start, 3),
                      "timed_out": False,
                  }
              except subprocess.TimeoutExpired as exc:
                  return {
                      "returncode": "timeout",
                      "stdout_tail": (exc.stdout or "")[-3000:] if isinstance(exc.stdout, str) else "",
                      "stderr_tail": (exc.stderr or "")[-3000:] if isinstance(exc.stderr, str) else "",
                      "elapsed_seconds": round(time.time() - start, 3),
                      "timed_out": True,
                  }
              except Exception as exc:
                  return {
                      "returncode": "exception",
                      "stdout_tail": "",
                      "stderr_tail": repr(exc),
                      "elapsed_seconds": round(time.time() - start, 3),
                      "timed_out": False,
                  }

          # Manual reference package templates.
          value_template_rows = []
          for row in OBSERVED_ORDER:
              value_template_rows.append({
                  **row,
                  "required_reference_mean": "FILL_REQUIRED",
                  "optional_reference_sigma": "FILL_IF_AVAILABLE",
                  "reference_units": "dimensionless_for_DM_over_rd_DH_over_rd_and_fsigma8",
                  "reference_source": "FILL_REQUIRED",
                  "reference_method": "FILL_REQUIRED_CAMB_CLASS_chain_or_published_vector",
                  "cosmology_or_chain_id": "FILL_REQUIRED",
                  "notes": "do_not_use_until_source_provenance_and_method_are_locked",
              })
          write_csv(
              OUT / "limited_lrgxelg_reference_mean_vector_template_v4_158.csv",
              value_template_rows,
              ["slot_index", "row_id", "z", "observable", "observed_product_role", "required_reference_mean", "optional_reference_sigma", "reference_units", "reference_source", "reference_method", "cosmology_or_chain_id", "notes"],
          )

          matrix_headers = [r["row_id"] for r in OBSERVED_ORDER]
          cov_rows = []
          corr_rows = []
          for r in matrix_headers:
              cov_row = {"row_id": r}
              corr_row = {"row_id": r}
              for c in matrix_headers:
                  cov_row[c] = "FILL_REQUIRED"
                  corr_row[c] = "OPTIONAL_DERIVED_OR_FILL_IF_AVAILABLE"
              cov_rows.append(cov_row)
              corr_rows.append(corr_row)
          write_csv(OUT / "limited_lrgxelg_reference_covariance_matrix_template_v4_158.csv", cov_rows, ["row_id"] + matrix_headers)
          write_csv(OUT / "limited_lrgxelg_reference_correlation_matrix_template_optional_v4_158.csv", corr_rows, ["row_id"] + matrix_headers)

          long_cov_rows = []
          for i, a in enumerate(matrix_headers):
              for j, b in enumerate(matrix_headers):
                  long_cov_rows.append({
                      "row_index": i,
                      "col_index": j,
                      "row_id": a,
                      "col_id": b,
                      "required_reference_covariance": "FILL_REQUIRED",
                      "source_or_generation_method": "FILL_REQUIRED",
                      "notes": "symmetric_6x6_required_before_any_coupled_residual_or_pressure",
                  })
          write_csv(OUT / "limited_lrgxelg_reference_covariance_long_template_v4_158.csv", long_cov_rows, ["row_index", "col_index", "row_id", "col_id", "required_reference_covariance", "source_or_generation_method", "notes"])

          samples_columns = [
              "sample_id", "chain_or_source_id", "weight", "H0", "omegam", "ombh2", "omch2", "sigma8", "ns", "rd", "notes",
              "DM_ov_rd_z0p70", "DH_ov_rd_z0p70", "fsigma8_z0p70", "DM_ov_rd_z0p845", "DH_ov_rd_z0p845", "fsigma8_z0p845",
          ]
          write_csv(
              OUT / "limited_lrgxelg_reference_parameter_samples_template_v4_158.csv",
              [{c: "FILL_IF_USING_SAMPLE_ROUTE" for c in samples_columns}],
              samples_columns,
          )

          write_csv(
              OUT / "required_reference_dependencies_v4_158.csv",
              REQUIRED_DEPENDENCIES,
              ["dependency_id", "scope", "required_content", "acceptable_forms", "needed_before"],
          )

          # Software route feasibility: this is a best-effort environment check, not a scientific computation.
          install_attempts = []
          software_routes = []
          package_specs = [
              {"route_id": "camb_python_package", "module_name": "camb", "pip_name": "camb", "purpose": "possible CAMB-based reference generation route"},
              {"route_id": "classy_python_package", "module_name": "classy", "pip_name": "classy", "purpose": "possible CLASS/classy-based reference generation route"},
          ]
          for spec in package_specs:
              before = import_status(spec["module_name"])
              install_result = None
              after = before
              install_attempted = False
              if not before:
                  install_attempted = True
                  install_result = run_cmd([sys.executable, "-m", "pip", "install", "--disable-pip-version-check", spec["pip_name"]], timeout_seconds=240)
                  after = import_status(spec["module_name"])
              record = {
                  "route_id": spec["route_id"],
                  "module_name": spec["module_name"],
                  "pip_name": spec["pip_name"],
                  "purpose": spec["purpose"],
                  "import_available_before_install": before,
                  "install_attempted": install_attempted,
                  "import_available_after_install": after,
                  "scientific_values_generated": False,
                  "reference_vector_generated": False,
                  "reference_covariance_generated": False,
                  "claim_boundary": "software_feasibility_only_no_scientific_computation",
              }
              software_routes.append(record)
              if install_result is not None:
                  install_attempts.append({
                      "route_id": spec["route_id"],
                      "pip_name": spec["pip_name"],
                      "returncode": install_result["returncode"],
                      "timed_out": install_result["timed_out"],
                      "elapsed_seconds": install_result["elapsed_seconds"],
                      "stdout_tail": install_result["stdout_tail"],
                      "stderr_tail": install_result["stderr_tail"],
                      "claim_boundary": "install_log_only_no_scientific_computation",
                  })
          write_csv(
              OUT / "reference_generation_software_feasibility_v4_158.csv",
              software_routes,
              ["route_id", "module_name", "pip_name", "purpose", "import_available_before_install", "install_attempted", "import_available_after_install", "scientific_values_generated", "reference_vector_generated", "reference_covariance_generated", "claim_boundary"],
          )
          write_csv(
              OUT / "reference_generation_install_attempts_v4_158.csv",
              install_attempts if install_attempts else [{"route_id": "none_needed_or_no_attempt", "pip_name": "none", "returncode": "not_applicable", "timed_out": False, "elapsed_seconds": 0, "stdout_tail": "", "stderr_tail": "", "claim_boundary": "install_log_only_no_scientific_computation"}],
              ["route_id", "pip_name", "returncode", "timed_out", "elapsed_seconds", "stdout_tail", "stderr_tail", "claim_boundary"],
          )

          camb_available = any(r["route_id"] == "camb_python_package" and r["import_available_after_install"] for r in software_routes)
          classy_available = any(r["route_id"] == "classy_python_package" and r["import_available_after_install"] for r in software_routes)

          route_plan_rows = [
              {
                  "route_id": "manual_reference_package_upload",
                  "route_status": "schema_written_ready_for_human_or_external_package_fill",
                  "can_generate_values_in_this_workflow": False,
                  "allowed_next_step": "upload completed reference vector and covariance/samples package, then run package triage",
                  "blocked_use": "do_not_compute_pressure_from_blank_templates",
                  "claim_boundary": "route_plan_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "route_id": "camb_generation_route",
                  "route_status": "software_import_available_after_best_effort_install" if camb_available else "software_not_available_or_install_failed_in_this_runner",
                  "can_generate_values_in_this_workflow": False,
                  "allowed_next_step": "if available, build a separate predeclared CAMB reference-vector prototype using locked cosmology and no pressure",
                  "blocked_use": "successful_import_is_not_reference_data",
                  "claim_boundary": "route_plan_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "route_id": "class_generation_route",
                  "route_status": "software_import_available_after_best_effort_install" if classy_available else "software_not_available_or_install_failed_in_this_runner",
                  "can_generate_values_in_this_workflow": False,
                  "allowed_next_step": "if available, build a separate predeclared CLASS reference-vector prototype using locked cosmology and no pressure",
                  "blocked_use": "successful_import_is_not_reference_data",
                  "claim_boundary": "route_plan_only_no_ingestion_no_pressure_no_validation",
              },
          ]
          write_csv(
              OUT / "reference_generation_route_plan_v4_158.csv",
              route_plan_rows,
              ["route_id", "route_status", "can_generate_values_in_this_workflow", "allowed_next_step", "blocked_use", "claim_boundary"],
          )

          acceptance_gate_rows = [
              {"gate_id": "six_reference_means_present", "required_before_pressure": True, "status_now": False, "detail": "six blank reference slots were templated, not filled", "claim_boundary": "acceptance_gate_only"},
              {"gate_id": "reference_covariance_or_samples_present", "required_before_pressure": True, "status_now": False, "detail": "blank covariance and sample templates were written, not filled", "claim_boundary": "acceptance_gate_only"},
              {"gate_id": "source_provenance_locked_for_reference", "required_before_pressure": True, "status_now": False, "detail": "no filled reference source was ingested", "claim_boundary": "acceptance_gate_only"},
              {"gate_id": "qso_covariance_present", "required_before_full_family_pressure": True, "status_now": False, "detail": "still missing", "claim_boundary": "acceptance_gate_only"},
              {"gate_id": "full_eboss_covariance_or_overlap_present", "required_before_full_family_pressure": True, "status_now": False, "detail": "still missing", "claim_boundary": "acceptance_gate_only"},
              {"gate_id": "final_pressure_methodology_locked", "required_before_pressure": True, "status_now": False, "detail": "still missing", "claim_boundary": "acceptance_gate_only"},
          ]
          write_csv(
              OUT / "reference_package_acceptance_gates_v4_158.csv",
              acceptance_gate_rows,
              ["gate_id", "required_before_pressure", "required_before_full_family_pressure", "status_now", "detail", "claim_boundary"],
          )

          scope_guard_rows = [
              {"guard_id": "schema_only", "allowed": True, "blocked_use": "scientific_ingestion_or_pressure", "guard_text": "This workflow writes schemas/templates and route feasibility only; it does not ingest scientific reference values.", "claim_boundary": "reference_route_schema_only_no_pressure_no_validation"},
              {"guard_id": "blank_templates_not_data", "allowed": False, "blocked_use": "treating_templates_as_reference_vector", "guard_text": "Blank templates are not reference data and cannot support residuals or pressure.", "claim_boundary": "reference_route_schema_only_no_pressure_no_validation"},
              {"guard_id": "software_import_not_science", "allowed": False, "blocked_use": "treating_CAMB_CLASS_import_as_prediction", "guard_text": "A software import or install check is only environment feasibility, not a computed reference prediction.", "claim_boundary": "reference_route_schema_only_no_pressure_no_validation"},
              {"guard_id": "no_final_pressure", "allowed": False, "blocked_use": "final_RSD_pressure", "guard_text": "Reference mean vector and reference covariance/parameter samples remain required before pressure interpretation.", "claim_boundary": "reference_route_schema_only_no_pressure_no_validation"},
              {"guard_id": "not_qso_covariance", "allowed": False, "blocked_use": "QSO_covariance_claim", "guard_text": "This workflow does not provide or ingest QSO covariance.", "claim_boundary": "reference_route_schema_only_no_pressure_no_validation"},
              {"guard_id": "not_full_eboss_covariance", "allowed": False, "blocked_use": "full_eBOSS_family_covariance_or_overlap_solution", "guard_text": "This workflow does not solve full eBOSS covariance or cross-tracer overlap.", "claim_boundary": "reference_route_schema_only_no_pressure_no_validation"},
              {"guard_id": "not_model_comparison", "allowed": False, "blocked_use": "BIC_likelihood_posterior_comparison", "guard_text": "No BIC, likelihood, posterior comparison, model selection, or validation claim is allowed.", "claim_boundary": "reference_route_schema_only_no_pressure_no_validation"},
          ]
          write_csv(OUT / "scope_guard_report_v4_158.csv", scope_guard_rows, ["guard_id", "allowed", "blocked_use", "guard_text", "claim_boundary"])

          blocked_rows = [{"blocked_claim": c, "claim_boundary": "blocked_claim_preserved_v4_158"} for c in BLOCKED_CLAIMS]
          write_csv(OUT / "blocked_claims_v4_158.csv", blocked_rows, ["blocked_claim", "claim_boundary"])

          next_actions = [
              {"condition": "manual reference package can be filled", "next_action": "fill the generated vector/covariance/sample templates from a documented source, then run reference_package_acceptance_triage_with_scope_guards", "allowed": True, "claim_boundary": "next_action_only_no_pressure"},
              {"condition": "CAMB import is available after this feasibility check", "next_action": "build a separate CAMB limited-reference-vector prototype with locked cosmology and no pressure", "allowed": True, "claim_boundary": "next_action_only_no_pressure"},
              {"condition": "CLASS/classy import is available after this feasibility check", "next_action": "build a separate CLASS limited-reference-vector prototype with locked cosmology and no pressure", "allowed": True, "claim_boundary": "next_action_only_no_pressure"},
              {"condition": "no route is executable and no manual package is filled", "next_action": "do not compute pressure; continue source/package acquisition", "allowed": True, "claim_boundary": "next_action_only_no_pressure"},
          ]
          write_csv(OUT / "next_action_recommendations_v4_158.csv", next_actions, ["condition", "next_action", "allowed", "claim_boundary"])

          rule_rows = [
              {"rule": "reference_value_template_written", "pass": (OUT / "limited_lrgxelg_reference_mean_vector_template_v4_158.csv").exists(), "detail": "six ordered blank reference slots written", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "reference_covariance_templates_written", "pass": (OUT / "limited_lrgxelg_reference_covariance_matrix_template_v4_158.csv").exists() and (OUT / "limited_lrgxelg_reference_covariance_long_template_v4_158.csv").exists(), "detail": "6x6 matrix and 36-row long covariance templates written", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "reference_samples_template_written", "pass": (OUT / "limited_lrgxelg_reference_parameter_samples_template_v4_158.csv").exists(), "detail": "sample-route template written", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "required_dependencies_carried_forward", "pass": len(REQUIRED_DEPENDENCIES) == 7, "detail": f"required_dependency_count={len(REQUIRED_DEPENDENCIES)}", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "software_feasibility_recorded", "pass": len(software_routes) == 2, "detail": f"routes_recorded={len(software_routes)}; camb_available={camb_available}; classy_available={classy_available}", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "no_scientific_ingestion", "pass": True, "detail": "No scientific reference values are parsed or accepted.", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "no_reference_vector_generated", "pass": True, "detail": "No reference vector is generated in this workflow.", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "no_reference_covariance_generated", "pass": True, "detail": "No reference covariance is generated in this workflow.", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "no_pressure_computed", "pass": True, "detail": "No pressure calculation is performed.", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "no_residuals_computed", "pass": True, "detail": "No residuals are computed.", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "no_likelihood_or_bic_run", "pass": True, "detail": "No likelihood, BIC, or model comparison is run.", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "no_posterior_comparison_run", "pass": True, "detail": "No posterior comparison is run.", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
              {"rule": "no_validation_claim_allowed", "pass": True, "detail": "Public-facing validation claims remain blocked.", "claim_boundary": "templates_and_feasibility_only_no_pressure_no_validation"},
          ]
          write_csv(OUT / "rule_results_v4_158.csv", rule_rows, ["rule", "pass", "detail", "claim_boundary"])

          failed_rules = [r for r in rule_rows if not bool(r["pass"])]
          failed_gates = "none" if not failed_rules else ";".join(r["rule"] for r in failed_rules)
          pass_count = sum(1 for r in rule_rows if bool(r["pass"]))
          selected_next_route = "manual_reference_package_triage_or_camb_class_limited_reference_vector_prototype_with_scope_guards"

          health_rows = [
              {"metric": "workflow_version", "value": VERSION, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "expected_result_label", "value": EXPECTED_RESULT, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "failed_gates", "value": failed_gates, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "rule_pass_count", "value": f"{pass_count} / {len(rule_rows)}", "claim_boundary": "route_feasibility_health_only"},
              {"metric": "reference_value_slots_templated", "value": len(OBSERVED_ORDER), "claim_boundary": "route_feasibility_health_only"},
              {"metric": "covariance_template_dimension", "value": "6x6", "claim_boundary": "route_feasibility_health_only"},
              {"metric": "camb_import_available_after_best_effort_install", "value": camb_available, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "classy_import_available_after_best_effort_install", "value": classy_available, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "scientific_values_ingested", "value": False, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "reference_vector_generated", "value": False, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "reference_covariance_generated", "value": False, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "pressure_computed", "value": False, "claim_boundary": "route_feasibility_health_only"},
