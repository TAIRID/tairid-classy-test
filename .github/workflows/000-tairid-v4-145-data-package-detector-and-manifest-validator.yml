name: 000 TAIRID v4.145 Data Package Detector and Manifest Validator

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-145-data-package-detector-and-manifest-validator.yml"
      - "data/tairid/v4_144/**"
      - "data/tairid/v4_145/**"
      - "data/**v4_144**"
      - "data/**v4_145**"

jobs:
  tairid-v4-145-data-package-detector-and-manifest-validator:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.145 data package detector and manifest validator
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_145_data_package_detector_and_manifest_validator

          python - <<'PY'
          import csv
          import json
          import re
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_145_data_package_detector_and_manifest_validator")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_145_data_package_detector_and_manifest_validator"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not recompute eBOSS pressure.",
              "This detects whether the v4.144 requested data package exists and validates manifest completeness if present.",
              "A pass means package presence or absence is honestly classified; it does not mean data has been ingested or used."
          ]

          UPSTREAM_LOCKS = {
              "v4_144_data_manifest_request": {
                  "readiness_label": "data_manifest_request_passed_required_reference_and_covariance_files_listed_ready_for_data_package_detector_and_manifest_validator",
                  "upstream_parser_ready_count": 0,
                  "upstream_selected_next_route": "data_manifest_request",
                  "reference_target_count": 12,
                  "required_package_count": 10,
                  "reference_package_count": 3,
                  "observed_value_package_count": 4,
                  "observed_covariance_package_count": 2,
                  "manifest_template_row_count": 10,
                  "acceptance_rule_count": 6,
                  "package_provided": False,
                  "package_ingested": False,
                  "pressure_recomputed": False,
                  "same_program_eBOSS_covariance_still_limited": True,
                  "CAMB_run": False,
                  "full_planck_chains_imported": False,
                  "full_planck_chain_sample_rows_parsed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_143_stored_chain_reference_candidate_triage": {
                  "readiness_label": "stored_chain_reference_candidate_triage_passed_candidates_classified_ready_for_next_reference_data_route",
                  "candidate_count": 276,
                  "workflow_false_positive_count": 276,
                  "parser_ready_count": 0,
                  "selected_next_route": "data_manifest_request",
                  "full_chain_rows_parsed": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          EXPECTED_REFERENCE_TARGETS = [
              "z0067_6dFGS",
              "z0150_MGS",
              "z0380_BOSS",
              "z0440_WiggleZ",
              "z0510_BOSS",
              "z0600_WiggleZ",
              "z0610_BOSS",
              "z0698_eBOSS_LRG",
              "z0730_WiggleZ",
              "z0800_VIPERS",
              "z0850_eBOSS_ELG",
              "z1480_eBOSS_QSO"
          ]

          REQUIRED_DATA_PACKAGES = [
              {"package_id": "reference_vector_table_minimum", "priority": 1, "package_type": "reference_support", "minimum_file": "lcdm_fsigma8_reference_vector_v4_144.csv", "required_columns": "target_id,z,fsigma8_reference_mean,fsigma8_reference_sigma,method,parameter_source"},
              {"package_id": "reference_covariance_matrix_preferred", "priority": 2, "package_type": "reference_support", "minimum_file": "lcdm_fsigma8_reference_covariance_v4_144.csv", "required_columns": "row_target_id,column_target_id,covariance"},
              {"package_id": "reference_parameter_samples_optional", "priority": 3, "package_type": "reference_support", "minimum_file": "lcdm_parameter_samples_v4_144.csv", "required_columns": "Omega_m,sigma8,H0,ombh2,omch2,ns,As"},
              {"package_id": "eBOSS_LRG_value_source", "priority": 4, "package_type": "observed_value_source", "minimum_file": "eboss_lrg_value_source_v4_144.csv", "required_columns": "source_url_or_doi,effective_redshift,observable,value,sigma,notes"},
              {"package_id": "eBOSS_ELG_value_source", "priority": 5, "package_type": "observed_value_source", "minimum_file": "eboss_elg_value_source_v4_144.csv", "required_columns": "source_url_or_doi,effective_redshift,observable,value,sigma,notes"},
              {"package_id": "eBOSS_QSO_value_source", "priority": 6, "package_type": "observed_value_source", "minimum_file": "eboss_qso_value_source_v4_144.csv", "required_columns": "source_url_or_doi,effective_redshift,observable,value,sigma,notes"},
              {"package_id": "eBOSS_family_covariance_or_likelihood", "priority": 7, "package_type": "observed_covariance", "minimum_file": "eboss_family_covariance_v4_144.csv", "required_columns": "row_parameter,column_parameter,covariance"},
              {"package_id": "eBOSS_cross_tracer_overlap_note", "priority": 8, "package_type": "observed_covariance", "minimum_file": "eboss_cross_tracer_overlap_note_v4_144.md", "required_columns": "markdown_note"},
              {"package_id": "observed_growth_compilation_manifest", "priority": 9, "package_type": "observed_value_source", "minimum_file": "growth_observation_manifest_v4_144.csv", "required_columns": "target_id,z,source_family,observable,value,sigma,covariance_status,source_url_or_doi"},
              {"package_id": "data_license_and_provenance_note", "priority": 10, "package_type": "provenance", "minimum_file": "data_license_and_provenance_v4_144.md", "required_columns": "markdown_note"}
          ]

          MANIFEST_FILE_CANDIDATES = [
              "data/tairid/v4_144/manifest_template_rows_v4_144.csv",
              "data/tairid/v4_145/manifest_template_rows_v4_144.csv",
              "data/manifest_template_rows_v4_144.csv",
              "manifest_template_rows_v4_144.csv",
              "data/tairid/v4_144/data_package_manifest_v4_145.csv",
              "data/tairid/v4_145/data_package_manifest_v4_145.csv",
              "data/data_package_manifest_v4_145.csv"
          ]

          DATA_SEARCH_ROOTS = [
              "data/tairid/v4_144",
              "data/tairid/v4_145",
              "data",
              "."
          ]

          ACCEPTABLE_FILE_SUFFIXES = [".csv", ".md", ".txt", ".json", ".dat", ".fits", ".zip", ".covmat"]

          ACCEPTANCE_RULES = [
              {"rule_id": "reference_vector_complete", "requirement": "reference_vector_table_minimum has all 12 targets with numeric fσ8 mean and sigma", "blocks": "reference_parser"},
              {"rule_id": "source_locked_eBOSS_values", "requirement": "LRG, ELG, and QSO value-source files exist with source_url_or_doi and numeric value/sigma", "blocks": "observed_value_upgrade"},
              {"rule_id": "eBOSS_covariance_or_overlap_declared", "requirement": "covariance/likelihood file or overlap note exists with declared status", "blocks": "eBOSS_family_combination"},
              {"rule_id": "provenance_declared", "requirement": "data_license_and_provenance_note exists", "blocks": "source_clean_ingestion"},
              {"rule_id": "manifest_rows_ingestion_ready", "requirement": "manifest rows for provided packages mark ingestion_ready true only when paths and required structures are present", "blocks": "automatic_ingestion"},
              {"rule_id": "no_final_claims", "requirement": "no package validation may create final pressure, validation, BIC, or posterior comparison", "blocks": "public_claims"}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample rows were parsed.",
              "CAMB produced the final reference vector.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The data package detector and manifest validator validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "Detecting a file is the same as ingesting the file.",
              "A valid manifest is the same as final pressure.",
              "A reference vector table is the same as full Planck posterior covariance.",
              "Same-program eBOSS covariance is resolved.",
              "Observed covariance review is no longer needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_146_reference_vector_parser_design_if_reference_vector_present",
                  "purpose": "Design a parser only if the reference-vector table exists and validates.",
                  "why_next": "This is the safest first ingestion candidate if supplied."
              },
              {
                  "priority": 2,
                  "route_id": "v4_146_external_source_fetch_design",
                  "purpose": "Create a source-fetch design for public URLs when the manifest provides exact source URLs but files are absent.",
                  "why_next": "The current repository may not contain the requested files yet."
              },
              {
                  "priority": 3,
                  "route_id": "v4_146_manifest_fill_instructions",
                  "purpose": "Give exact file names and required columns for the user to add the missing package.",
                  "why_next": "No parser or fetcher should guess missing data."
              },
              {
                  "priority": 4,
                  "route_id": "v4_146_external_standard_cosmology_comparison_plan",
                  "purpose": "Prepare careful comparison language against normal ΛCDM/eBOSS growth work.",
                  "why_next": "The test lane remains limitation-bound."
              }
          ]

          failed_gates = []
          warnings = [
              "detector_validator_only",
              "no_data_ingestion",
              "pressure_not_recomputed",
              "package_may_be_absent",
              "manifest_may_be_absent",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def safe_read_csv(path):
              try:
                  with path.open("r", encoding="utf-8", newline="") as f:
                      reader = csv.DictReader(f)
                      return list(reader), list(reader.fieldnames or [])
              except Exception as exc:
                  return [], []

          def clean(value):
              return str(value or "").strip()

          def is_true(value):
              return clean(value).lower() in ["true", "yes", "1", "y"]

          def numeric(value):
              try:
                  float(clean(value))
                  return True
              except Exception:
                  return False

          def find_existing_file(filename):
              candidates = []
              for root in DATA_SEARCH_ROOTS:
                  root_path = Path(root)
                  if not root_path.exists():
                      continue
                  try:
                      for path in root_path.rglob(filename):
                          if path.is_file():
                              candidates.append(str(path).replace("\\", "/"))
                  except Exception:
                      pass
              # preserve deterministic unique order
              seen = set()
              out = []
              for item in candidates:
                  if item not in seen:
                      seen.add(item)
                      out.append(item)
              return out

          def find_manifest_file():
              for candidate in MANIFEST_FILE_CANDIDATES:
                  path = Path(candidate)
                  if path.exists() and path.is_file():
                      return str(path).replace("\\", "/")
              return ""

          manifest_path = find_manifest_file()
          manifest_found = bool(manifest_path)
          manifest_rows = []
          manifest_columns = []
          if manifest_found:
              manifest_rows, manifest_columns = safe_read_csv(Path(manifest_path))

          package_detection_records = []
          for package in REQUIRED_DATA_PACKAGES:
              found_paths = find_existing_file(package["minimum_file"])
              found = len(found_paths) > 0
              package_detection_records.append({
                  "package_id": package["package_id"],
                  "priority": package["priority"],
                  "package_type": package["package_type"],
                  "minimum_file": package["minimum_file"],
                  "required_columns": package["required_columns"],
                  "found": found,
                  "found_path_count": len(found_paths),
                  "found_paths": " | ".join(found_paths),
                  "claim_boundary": "detected_only_not_ingested"
              })

          detected_package_count = sum(1 for row in package_detection_records if row["found"])
          missing_package_count = len(package_detection_records) - detected_package_count

          file_validation_records = []

          def validate_reference_vector(path_string, package_id):
              rows, cols = safe_read_csv(Path(path_string))
              required = ["target_id", "z", "fsigma8_reference_mean", "fsigma8_reference_sigma", "method", "parameter_source"]
              missing_cols = [col for col in required if col not in cols]
              targets = [clean(row.get("target_id")) for row in rows]
              missing_targets = [target for target in EXPECTED_REFERENCE_TARGETS if target not in targets]
              numeric_ok = all(numeric(row.get("z")) and numeric(row.get("fsigma8_reference_mean")) and numeric(row.get("fsigma8_reference_sigma")) for row in rows) if rows else False
              return {
                  "package_id": package_id,
                  "file_path": path_string,
                  "row_count": len(rows),
                  "column_count": len(cols),
                  "missing_columns": ",".join(missing_cols) if missing_cols else "none",
                  "missing_targets": ",".join(missing_targets) if missing_targets else "none",
                  "numeric_check_passed": numeric_ok,
                  "validation_passed": len(missing_cols) == 0 and len(missing_targets) == 0 and numeric_ok,
                  "validation_scope": "reference_vector_structure_only_not_ingestion"
              }

          def validate_generic_csv(path_string, package_id, required_columns_text):
              rows, cols = safe_read_csv(Path(path_string))
              required = [clean(col) for col in required_columns_text.split(",") if clean(col)]
              missing_cols = [col for col in required if col not in cols]
              return {
                  "package_id": package_id,
                  "file_path": path_string,
                  "row_count": len(rows),
                  "column_count": len(cols),
                  "missing_columns": ",".join(missing_cols) if missing_cols else "none",
                  "missing_targets": "not_applicable",
                  "numeric_check_passed": "not_checked",
                  "validation_passed": len(missing_cols) == 0 and len(rows) > 0,
                  "validation_scope": "generic_csv_structure_only_not_ingestion"
              }

          def validate_text_file(path_string, package_id):
              path = Path(path_string)
              try:
                  text = path.read_text(encoding="utf-8", errors="replace")
              except Exception:
                  text = ""
              return {
                  "package_id": package_id,
                  "file_path": path_string,
                  "row_count": 1 if text.strip() else 0,
                  "column_count": "not_applicable",
                  "missing_columns": "not_applicable",
                  "missing_targets": "not_applicable",
                  "numeric_check_passed": "not_applicable",
                  "validation_passed": bool(text.strip()),
                  "validation_scope": "text_presence_only_not_ingestion"
              }

          for package in REQUIRED_DATA_PACKAGES:
              detection = next(row for row in package_detection_records if row["package_id"] == package["package_id"])
              if not detection["found"]:
                  continue
              for path_string in detection["found_paths"].split(" | "):
                  if not path_string:
                      continue
                  suffix = Path(path_string).suffix.lower()
                  if package["package_id"] == "reference_vector_table_minimum":
                      file_validation_records.append(validate_reference_vector(path_string, package["package_id"]))
                  elif suffix == ".csv":
                      file_validation_records.append(validate_generic_csv(path_string, package["package_id"], package["required_columns"]))
                  elif suffix in [".md", ".txt"]:
                      file_validation_records.append(validate_text_file(path_string, package["package_id"]))
                  else:
                      file_validation_records.append({
                          "package_id": package["package_id"],
                          "file_path": path_string,
                          "row_count": "not_checked",
                          "column_count": "not_checked",
                          "missing_columns": "not_checked",
                          "missing_targets": "not_checked",
                          "numeric_check_passed": "not_checked",
                          "validation_passed": False,
                          "validation_scope": "unsupported_file_suffix_for_automatic_validation"
                      })

          manifest_validation_records = []
          if manifest_found:
              required_manifest_columns = [
                  "package_id",
                  "provided_file_path",
                  "source_url_or_doi",
                  "file_format",
                  "required_columns_or_structure",
                  "variable_order",
                  "units_or_normalization",
                  "coverage",
                  "ingestion_ready",
                  "claim_boundary"
              ]
              missing_manifest_columns = [col for col in required_manifest_columns if col not in manifest_columns]
              for row in manifest_rows:
                  package_id = clean(row.get("package_id"))
                  provided_file_path = clean(row.get("provided_file_path"))
                  ingestion_ready = is_true(row.get("ingestion_ready"))
                  path_exists = bool(provided_file_path) and Path(provided_file_path).exists()
                  source_or_path_present = bool(clean(row.get("source_url_or_doi"))) or bool(provided_file_path)
                  structure_present = bool(clean(row.get("required_columns_or_structure")))
                  variable_order_present = bool(clean(row.get("variable_order"))) or "markdown" in clean(row.get("file_format")).lower()
                  units_present = bool(clean(row.get("units_or_normalization"))) or "markdown" in clean(row.get("file_format")).lower()
                  valid_ready = ingestion_ready and path_exists and source_or_path_present and structure_present and variable_order_present and units_present and len(missing_manifest_columns) == 0
                  manifest_validation_records.append({
                      "package_id": package_id,
                      "provided_file_path": provided_file_path,
                      "ingestion_ready_flag": ingestion_ready,
                      "path_exists": path_exists,
                      "source_or_path_present": source_or_path_present,
                      "structure_present": structure_present,
                      "variable_order_present": variable_order_present,
                      "units_present": units_present,
                      "missing_manifest_columns": ",".join(missing_manifest_columns) if missing_manifest_columns else "none",
                      "manifest_row_valid_for_future_ingestion": valid_ready,
                      "claim_boundary": "manifest_validation_only_not_ingestion"
                  })

          valid_file_count = sum(1 for row in file_validation_records if row["validation_passed"] is True)
          invalid_file_count = len(file_validation_records) - valid_file_count
          manifest_ready_count = sum(1 for row in manifest_validation_records if row["manifest_row_valid_for_future_ingestion"] is True)

          reference_vector_detected = any(row["package_id"] == "reference_vector_table_minimum" and row["found"] for row in package_detection_records)
          reference_vector_valid = any(row["package_id"] == "reference_vector_table_minimum" and row["validation_passed"] is True for row in file_validation_records)
          eboss_value_sources_detected = all(
              any(row["package_id"] == package_id and row["found"] for row in package_detection_records)
              for package_id in ["eBOSS_LRG_value_source", "eBOSS_ELG_value_source", "eBOSS_QSO_value_source"]
          )
          eboss_covariance_or_overlap_detected = any(
              row["package_id"] in ["eBOSS_family_covariance_or_likelihood", "eBOSS_cross_tracer_overlap_note"] and row["found"]
              for row in package_detection_records
          )
          provenance_detected = any(row["package_id"] == "data_license_and_provenance_note" and row["found"] for row in package_detection_records)

          if reference_vector_valid:
              selected_next_route = "reference_vector_parser_design"
              next_allowed_step = (
                  "Proceed to v4.146 reference-vector parser design using the validated reference-vector table only. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )
          elif manifest_found and manifest_ready_count > 0:
              selected_next_route = "manifest_based_parser_design"
              next_allowed_step = (
                  "Proceed to v4.146 manifest-based parser design for rows marked valid for future ingestion. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )
          elif manifest_found:
              selected_next_route = "manifest_completion_needed"
              next_allowed_step = (
                  "Complete the manifest fields and add the listed files, then rerun v4.145. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )
          else:
              selected_next_route = "external_source_fetch_or_manifest_fill_needed"
              next_allowed_step = (
                  "Proceed to v4.146 external source fetch design or fill the v4.144 manifest template with files/URLs. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          package_ingested = False
          pressure_recomputed = False
          final_pressure_ready = False

          upstream = UPSTREAM_LOCKS["v4_144_data_manifest_request"]

          if upstream["required_package_count"] != 10:
              failed_gates.append("upstream_required_package_count_not_carried")

          if len(REQUIRED_DATA_PACKAGES) != 10:
              failed_gates.append("required_data_package_count_incorrect")

          if len(EXPECTED_REFERENCE_TARGETS) != 12:
              failed_gates.append("expected_reference_target_count_incorrect")

          if len(package_detection_records) != len(REQUIRED_DATA_PACKAGES):
              failed_gates.append("package_detection_record_count_mismatch")

          if package_ingested:
              failed_gates.append("package_unexpectedly_ingested")

          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "detecting a file is the same as ingesting the file",
              "valid manifest is the same as final pressure",
              "reference vector table is the same as full planck posterior covariance",
              "final rsd pressure score",
              "validates tairid cosmology",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "data_package_detector_manifest_validator_passed_package_status_recorded_ready_for_next_data_acquisition_or_parser_route"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_manifest_request_carried",
                  "pass": upstream["readiness_label"] == "data_manifest_request_passed_required_reference_and_covariance_files_listed_ready_for_data_package_detector_and_manifest_validator",
                  "result": "v4.144 data manifest request carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "package_detection_completed",
                  "pass": len(package_detection_records) == len(REQUIRED_DATA_PACKAGES),
                  "result": f"detected={detected_package_count}; missing={missing_package_count}",
                  "boundary": "Detection only, not ingestion."
              },
              {
                  "rule_id": "manifest_status_recorded",
                  "pass": True,
                  "result": f"manifest_found={manifest_found}; manifest_path={manifest_path or 'none'}; manifest_ready_count={manifest_ready_count}",
                  "boundary": "Manifest validation only."
              },
              {
                  "rule_id": "file_validation_status_recorded",
                  "pass": True,
                  "result": f"file_validations={len(file_validation_records)}; valid_files={valid_file_count}; invalid_files={invalid_file_count}",
                  "boundary": "Structural validation only."
              },
              {
                  "rule_id": "reference_vector_status_recorded",
                  "pass": True,
                  "result": f"reference_vector_detected={reference_vector_detected}; reference_vector_valid={reference_vector_valid}",
                  "boundary": "Reference table status only."
              },
              {
                  "rule_id": "eboss_covariance_status_recorded",
                  "pass": True,
                  "result": f"eboss_value_sources_detected={eboss_value_sources_detected}; eboss_covariance_or_overlap_detected={eboss_covariance_or_overlap_detected}",
                  "boundary": "Observed-side status only."
              },
              {
                  "rule_id": "no_package_ingestion_or_pressure",
                  "pass": package_ingested is False and pressure_recomputed is False,
                  "result": "no package ingested and pressure not recomputed",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_145_rules_passed")

          if failed_gates:
              readiness_label = "data_package_detector_manifest_validator_failed"
              next_allowed_step = "Repair package detector/manifest validator before continuing."
          else:
              readiness_label = route_decision

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "manifest_found": manifest_found,
              "manifest_path": manifest_path or "none",
              "manifest_row_count": len(manifest_rows),
              "manifest_ready_count": manifest_ready_count,
              "required_package_count": len(REQUIRED_DATA_PACKAGES),
              "detected_package_count": detected_package_count,
              "missing_package_count": missing_package_count,
              "file_validation_count": len(file_validation_records),
              "valid_file_count": valid_file_count,
              "invalid_file_count": invalid_file_count,
              "reference_vector_detected": reference_vector_detected,
              "reference_vector_valid": reference_vector_valid,
              "eboss_value_sources_detected": eboss_value_sources_detected,
              "eboss_covariance_or_overlap_detected": eboss_covariance_or_overlap_detected,
              "provenance_detected": provenance_detected,
              "selected_next_route": selected_next_route,
              "package_ingested": package_ingested,
              "pressure_recomputed": pressure_recomputed,
              "same_program_eBOSS_covariance_still_limited": not eboss_covariance_or_overlap_detected,
              "CAMB_run": False,
              "full_planck_chains_imported": False,
              "full_planck_chain_sample_rows_parsed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "expected_reference_targets": EXPECTED_REFERENCE_TARGETS,
              "required_data_packages": REQUIRED_DATA_PACKAGES,
              "manifest_file_candidates": MANIFEST_FILE_CANDIDATES,
              "data_search_roots": DATA_SEARCH_ROOTS,
              "acceptance_rules": ACCEPTANCE_RULES,
              "package_detection_records": package_detection_records,
              "manifest_validation_records": manifest_validation_records,
              "file_validation_records": file_validation_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "selected_next_route": selected_next_route,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "selected_next_route": selected_next_route,
                  "manifest_found": manifest_found,
                  "detected_package_count": detected_package_count,
                  "reference_vector_valid": reference_vector_valid,
                  "package_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_145_data_package_detector_and_manifest_validator.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "required_data_packages_v4_145.csv",
              REQUIRED_DATA_PACKAGES,
              ["package_id", "priority", "package_type", "minimum_file", "required_columns"]
          )

          write_csv(
              OUTDIR / "package_detection_records_v4_145.csv",
              package_detection_records,
              ["package_id", "priority", "package_type", "minimum_file", "required_columns", "found", "found_path_count", "found_paths", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "manifest_validation_records_v4_145.csv",
              manifest_validation_records,
              ["package_id", "provided_file_path", "ingestion_ready_flag", "path_exists", "source_or_path_present", "structure_present", "variable_order_present", "units_present", "missing_manifest_columns", "manifest_row_valid_for_future_ingestion", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "file_validation_records_v4_145.csv",
              file_validation_records,
              ["package_id", "file_path", "row_count", "column_count", "missing_columns", "missing_targets", "numeric_check_passed", "validation_passed", "validation_scope"]
          )

          write_csv(
              OUTDIR / "acceptance_rules_v4_145.csv",
              ACCEPTANCE_RULES,
              ["rule_id", "requirement", "blocks"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_145.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_145.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_145.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.145 — Data Package Detector and Manifest Validator")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.145 checks whether the v4.144 requested data package exists in the repository. It validates only file presence, manifest completeness, and simple table structure. It does not ingest data, compute pressure, run CAMB, or validate TAIRID.")
          md.append("")
          md.append(f"Selected next route: `{selected_next_route}`")
          md.append("")
          md.append("## Package status")
          md.append("")
          md.append("| Package | Found | Found paths |")
          md.append("|---|---:|---|")
          for row in package_detection_records:
              md.append(f"| `{row['package_id']}` | `{row['found']}` | `{row['found_paths'] or 'none'}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_145_data_package_detector_and_manifest_validator.json",
              "tairid_v4_145_data_package_detector_and_manifest_validator.md",
              "required_data_packages_v4_145.csv",
              "package_detection_records_v4_145.csv",
              "manifest_validation_records_v4_145.csv",
              "file_validation_records_v4_145.csv",
              "acceptance_rules_v4_145.csv",
              "next_route_options_v4_145.csv",
              "blocked_claims_v4_145.csv",
              "rule_results_v4_145.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_145_data_package_detector_and_manifest_validator.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.145 data package detector and manifest validator artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-145-data-package-detector-and-manifest-validator
          path: artifacts/tairid_v4_145_data_package_detector_and_manifest_validator/
