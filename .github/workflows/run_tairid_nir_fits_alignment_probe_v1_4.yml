name: Run TAIRID NIR FITS Alignment Probe v1.4

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-nir-fits-alignment-probe-v1-4:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy matplotlib

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_nir_fits_alignment_probe_v1_4.py
          echo "v1.4 FITS alignment probe found."

      - name: Run TAIRID NIR FITS Alignment Probe v1.4
        run: |
          python run_tairid_nir_fits_alignment_probe_v1_4.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-nir-fits-alignment-probe-v1-4-output
          path: |
            tairid_nir_fits_alignment_probe_v1_4_outputs/**
