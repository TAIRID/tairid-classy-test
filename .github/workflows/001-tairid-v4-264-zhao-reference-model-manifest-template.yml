name: 001 TAIRID v4.264 - Zhao Reference Model Manifest Template

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-264-zhao-reference-model-manifest-template.yml"
      - "data/cosmology/zhao_reference_model_manifest.csv"
      - "zhao_reference_model_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-reference-model-manifest-template:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.264 Zhao Reference Model Manifest Template is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.264 Zhao reference model manifest template
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.264"
          ROUTE = "zhao_reference_model_manifest_template_after_v4_263"
          EXPECTED_RESULT = "v4_264_zhao_reference_model_manifest_template_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_265_zhao_reference_manifest_validator_or_reference_source_selection_guard"

          OUT = Path("tairid_v4_264_zhao_reference_model_manifest_template_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-264-zhao-reference-model-manifest-template-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REFERENCE_MODEL_MANIFEST_CANDIDATES = [
              Path("data/cosmology/zhao_reference_model_manifest.csv"),
              Path("zhao_reference_model_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_REFERENCE_COLUMNS = [
              "reference_id",
              "observed_id",
              "model_family",
              "model_label",
              "redshift",
              "quantity",
              "predicted_value",
              "prediction_source_or_method",
              "parameter_status",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def safe_float(value):
              try:
                  return float(str(value).strip())
              except Exception:
                  return None

          inherited_v4_263_rows = [
              {
                  "inherited_from": "v4.263",
                  "item": "rules",
                  "value": "47 / 47 passed",
                  "meaning": "Zhao Reference Model Residual Guard Design passed.",
                  "carry_forward_status": "ready_for_reference_model_template",
              },
              {
                  "inherited_from": "v4.263",
                  "item": "zhao_candidate_rows",
                  "value": 4,
                  "meaning": "Four Zhao candidate observed rows are ready as review-only input.",
                  "carry_forward_status": "candidate_observed_rows_ready",
              },
              {
                  "inherited_from": "v4.263",
                  "item": "reference_model_requirement_rows",
                  "value": 4,
                  "meaning": "Reference model requirements were defined.",
                  "carry_forward_status": "requirements_ready",
              },
              {
                  "inherited_from": "v4.263",
                  "item": "reference_model_manifest_template_rows",
                  "value": 4,
                  "meaning": "A first reference template was written.",
                  "carry_forward_status": "template_to_be_made_copy_paste_ready",
              },
              {
                  "inherited_from": "v4.263",
                  "item": "residual_guard_design_rows",
                  "value": 5,
                  "meaning": "Residual objects were defined but blocked.",
                  "carry_forward_status": "residual_design_ready_no_scoring",
              },
              {
                  "inherited_from": "v4.263",
                  "item": "reference_model_manifest_input_rows",
                  "value": 0,
                  "meaning": "No filled reference manifest existed yet.",
                  "carry_forward_status": "reference_predictions_missing",
              },
              {
                  "inherited_from": "v4.263",
                  "item": "residuals_computed",
                  "value": False,
                  "meaning": "No residuals were computed.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.263",
                  "item": "chi_square_computed",
                  "value": False,
                  "meaning": "No chi-square was computed.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.263",
                  "item": "selected_next_route",
                  "value": "v4_264_zhao_reference_model_manifest_template_or_handoff",
                  "meaning": "Current route should create the reference model manifest template.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          reference_model_manifest_status_rows, reference_model_manifest_input_rows = read_manifest_status(
              REFERENCE_MODEL_MANIFEST_CANDIDATES, REQUIRED_REFERENCE_COLUMNS, "reference"
          )

          zhao_candidate_rows = [
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_0_978",
                  "redshift": 0.978,
                  "quantity": "f_sigma8",
                  "observed_value": 0.379,
                  "sigma": 0.176,
                  "source_role": "same_survey_family_cross_release_candidate_not_full_holdout",
                  "approval_status": "candidate_bridge_not_scored_not_evidence_not_full_holdout",
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_23",
                  "redshift": 1.230,
                  "quantity": "f_sigma8",
                  "observed_value": 0.385,
                  "sigma": 0.099,
                  "source_role": "same_survey_family_cross_release_candidate_not_full_holdout",
                  "approval_status": "candidate_bridge_not_scored_not_evidence_not_full_holdout",
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_526",
                  "redshift": 1.526,
                  "quantity": "f_sigma8",
                  "observed_value": 0.342,
                  "sigma": 0.070,
                  "source_role": "same_survey_family_cross_release_candidate_not_full_holdout",
                  "approval_status": "candidate_bridge_not_scored_not_evidence_not_full_holdout",
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_944",
                  "redshift": 1.944,
                  "quantity": "f_sigma8",
                  "observed_value": 0.364,
                  "sigma": 0.106,
                  "source_role": "same_survey_family_cross_release_candidate_not_full_holdout",
                  "approval_status": "candidate_bridge_not_scored_not_evidence_not_full_holdout",
              },
          ]

          reference_template_rows = []
          for row in zhao_candidate_rows:
              reference_template_rows.append({
                  "reference_id": "ref_" + row["observed_id"],
                  "observed_id": row["observed_id"],
                  "model_family": "FILL_MODEL_FAMILY_LATER_NO_FIT_HERE",
                  "model_label": "FILL_MODEL_LABEL_LATER",
                  "redshift": row["redshift"],
                  "quantity": row["quantity"],
                  "predicted_value": "FILL_PREDICTED_VALUE_LATER",
                  "prediction_source_or_method": "FILL_SOURCE_OR_METHOD_LATER",
                  "parameter_status": "not_fit_in_this_workflow",
                  "approval_status": "reference_candidate_not_scored",
              })

          reference_template_instruction_rows = [
              {
                  "instruction_id": "inst_001",
                  "field": "model_family",
                  "allowed_fill": "published_LCDM_or_survey_reference / prior_pipeline_prediction / TAIRID_candidate_model / software_only_mock",
                  "blocked_fill": "unstated_model / tuned_after_zhao / evidence_claim",
                  "reason": "model family must be explicit",
              },
              {
                  "instruction_id": "inst_002",
                  "field": "predicted_value",
                  "allowed_fill": "numeric predicted f_sigma8 value copied from a pre-frozen or external method",
                  "blocked_fill": "value fit inside this workflow",
                  "reason": "residuals require predictions fixed before scoring",
              },
              {
                  "instruction_id": "inst_003",
                  "field": "prediction_source_or_method",
                  "allowed_fill": "citation, prior frozen file, or named deterministic method",
                  "blocked_fill": "blank / trust me / adjusted to match observations",
                  "reason": "source trail must be inspectable",
              },
              {
                  "instruction_id": "inst_004",
                  "field": "parameter_status",
                  "allowed_fill": "external_source / pre_frozen / parameter_free / software_only",
                  "blocked_fill": "fit_to_zhao_in_this_workflow",
                  "reason": "avoid circular fit",
              },
              {
                  "instruction_id": "inst_005",
                  "field": "approval_status",
                  "allowed_fill": "reference_candidate_not_scored",
                  "blocked_fill": "approved_for_scoring / evidence / validation / proof",
                  "reason": "reference rows are not scoring permission",
              },
          ]

          reference_source_option_rows = [
              {
                  "option_id": "source_option_001",
                  "source_type": "published_reference",
                  "description": "Use published predicted f_sigma8 values or a published baseline model method.",
                  "allowed_next": "fill template if source is clearly documented",
                  "risk": "must not silently change baseline",
              },
              {
                  "option_id": "source_option_002",
                  "source_type": "pre_frozen_pipeline",
                  "description": "Use a prediction vector from a prior frozen workflow or file.",
                  "allowed_next": "fill template if freeze record exists",
                  "risk": "must not be tuned after seeing Zhao residuals",
              },
              {
                  "option_id": "source_option_003",
                  "source_type": "deterministic_formula",
                  "description": "Use a stated formula that produces predicted values without fitting Zhao.",
                  "allowed_next": "fill template if all inputs are named",
                  "risk": "formula cannot be adjusted after scoring",
              },
              {
                  "option_id": "source_option_004",
                  "source_type": "software_mock",
                  "description": "Use made-up values only to test the pipeline mechanics.",
                  "allowed_next": "software test only",
                  "risk": "cannot be used for scientific interpretation",
              },
          ]

          template_validation_preview_rows = []
          for row in reference_template_rows:
              missing = [col for col in REQUIRED_REFERENCE_COLUMNS if col not in row or str(row[col]).strip() == ""]
              placeholder_ok = str(row["predicted_value"]) == "FILL_PREDICTED_VALUE_LATER"
              status_ok = row["approval_status"] == "reference_candidate_not_scored"
              no_scoring = row["parameter_status"] == "not_fit_in_this_workflow"
              template_validation_preview_rows.append({
                  "reference_id": row["reference_id"],
                  "observed_id": row["observed_id"],
                  "missing_columns": "|".join(missing) if missing else "none",
                  "redshift_ok": safe_float(row["redshift"]) is not None,
                  "placeholder_value_expected": placeholder_ok,
                  "approval_status_ok": status_ok,
                  "parameter_status_ok": no_scoring,
                  "template_status": "template_pass_not_filled_not_scored" if not missing and placeholder_ok and status_ok and no_scoring else "template_issue",
              })

          future_reference_validator_contract_rows = [
              {
                  "contract_id": "contract_001",
                  "future_gate": "schema_check",
                  "future_requirement": "all REQUIRED_REFERENCE_COLUMNS present",
                  "current_status": "template_ready",
              },
              {
                  "contract_id": "contract_002",
                  "future_gate": "numeric_prediction_check",
                  "future_requirement": "predicted_value numeric for all four rows",
                  "current_status": "blocked_placeholder_values",
              },
              {
                  "contract_id": "contract_003",
                  "future_gate": "observed_id_join_check",
                  "future_requirement": "reference observed_id values match Zhao candidate observed_id values exactly",
                  "current_status": "template_ready",
              },
              {
                  "contract_id": "contract_004",
                  "future_gate": "anti_fit_check",
                  "future_requirement": "parameter_status must not be fit_to_zhao_in_this_workflow",
                  "current_status": "policy_defined",
              },
              {
                  "contract_id": "contract_005",
                  "future_gate": "claim_language_check",
                  "future_requirement": "approval_status remains reference_candidate_not_scored",
                  "current_status": "policy_defined",
              },
          ]

          residual_block_rows = [
              {
                  "blocked_id": "blocked_001",
                  "object": "residual_vector",
                  "formula": "r_i = observed_value_i - predicted_value_i",
                  "blocked_reason": "predicted_value placeholders are not numeric",
                  "currently_computed": False,
              },
              {
                  "blocked_id": "blocked_002",
                  "object": "normalized_residual_vector",
                  "formula": "n_i = r_i / sigma_i",
                  "blocked_reason": "residual vector is blocked",
                  "currently_computed": False,
              },
              {
                  "blocked_id": "blocked_003",
                  "object": "covariance_weighted_chi_square",
                  "formula": "chi2 = r^T C^{-1} r",
                  "blocked_reason": "reference vector and inverse covariance guard are not active",
                  "currently_computed": False,
              },
              {
                  "blocked_id": "blocked_004",
                  "object": "direction_signature",
                  "formula": "sign(r_i)",
                  "blocked_reason": "residual direction requires a reference vector",
                  "currently_computed": False,
              },
          ]

          next_gap_rows = [
              {
                  "gap_id": "gap_001",
                  "gap": "filled_reference_model_manifest",
                  "plain_meaning": "we need four predicted f_sigma8 values",
                  "next_action": "choose a source or model family and fill the template",
              },
              {
                  "gap_id": "gap_002",
                  "gap": "reference_source_selection",
                  "plain_meaning": "we must decide whether the comparison is LCDM/published, pre-frozen pipeline, TAIRID candidate, or software mock",
                  "next_action": "select reference source lane before validation",
              },
              {
                  "gap_id": "gap_003",
                  "gap": "inverse_covariance_guard",
                  "plain_meaning": "before chi-square, the covariance inverse needs its own numerical safety guard",
                  "next_action": "run only after reference rows validate",
              },
              {
                  "gap_id": "gap_004",
                  "gap": "residual_preview_scope",
                  "plain_meaning": "even with residuals, Zhao remains same-family cross-release unless provenance is upgraded",
                  "next_action": "keep scope labels guarded",
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "reference_model_manifest_template",
                  "permission_status": "written_template_only",
                  "reason": "Four placeholder reference rows are written.",
              },
              {
                  "permission_scope": "reference_source_selection",
                  "permission_status": "needed_next",
                  "reason": "The model/source family must be selected before filling predictions.",
              },
              {
                  "permission_scope": "reference_manifest_validator",
                  "permission_status": "blocked_until_template_filled",
                  "reason": "Validator requires numeric predicted values.",
              },
              {
                  "permission_scope": "residual_preview",
                  "permission_status": "blocked",
                  "reason": "Predicted values are placeholders.",
              },
              {
                  "permission_scope": "chi_square",
                  "permission_status": "blocked",
                  "reason": "Reference vector and inverse covariance guard are missing.",
              },
              {
                  "permission_scope": "live_external_observed_manifest_fill",
                  "permission_status": "blocked",
                  "reason": "This workflow does not approve live manifest fill.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No scoring guard exists.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "A template is not evidence.",
              },
              {
                  "permission_scope": "full_independent_holdout_language",
                  "permission_status": "blocked",
                  "reason": "Provenance remains same-family/cross-release candidate.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No residual scoring or approved manifest exists.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
          ]

          readiness_rows = [
              {"readiness_id": "readiness_001", "requirement": "candidate_observed_rows", "status": "ready_review_only", "blocks": "nothing"},
              {"readiness_id": "readiness_002", "requirement": "reference_model_template", "status": "ready_template_only", "blocks": "nothing"},
              {"readiness_id": "readiness_003", "requirement": "reference_source_selection", "status": "needed_next", "blocks": "filled reference model"},
              {"readiness_id": "readiness_004", "requirement": "filled_numeric_predictions", "status": "missing", "blocks": "residual preview"},
              {"readiness_id": "readiness_005", "requirement": "reference_manifest_validator", "status": "blocked_until_filled", "blocks": "residual preview"},
              {"readiness_id": "readiness_006", "requirement": "inverse_covariance_guard", "status": "blocked", "blocks": "chi-square"},
              {"readiness_id": "readiness_007", "requirement": "numeric_correction_fit", "status": "blocked", "blocks": "model comparison"},
              {"readiness_id": "readiness_008", "requirement": "combined_matrix_permission", "status": "blocked", "blocks": "combined matrix"},
          ]

          failure_condition_rows = [
              {"failure_condition_id": "failure_001", "target": "QSO f_sigma8 primary pressure", "machine_condition": "if holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_002", "target": "QSO versus LRG growth contrast", "machine_condition": "if lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_003", "target": "QSO radial secondary support", "machine_condition": "if qso_radial_direction == '-' then secondary_support_weakened", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_004", "target": "geometry compressed lane non-primary", "machine_condition": "if compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_005", "target": "external likelihood robustness", "machine_condition": "if external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover then baseline_pressure_not_tairid_specific", "status": "defined_for_future_not_tested"},
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "Reference model manifest template is now cleanly written.",
                  "basis": "Four placeholder rows match the Zhao observed_id values and required reference schema.",
                  "next_action": "Choose a reference source lane before filling predictions.",
                  "claim_status": "template_only",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "No predicted values are supplied by this workflow.",
                  "basis": "Predicted values remain FILL_PREDICTED_VALUE_LATER.",
                  "next_action": "Do not compute residuals.",
                  "claim_status": "scoring_blocked",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "Reference source selection is the next true gap.",
                  "basis": "The template can accept LCDM/published, pre-frozen, TAIRID candidate, or mock values, but the lane must be explicit.",
                  "next_action": "Proceed to v4.265 source selection or validator if user fills template.",
                  "claim_status": "no_validation",
              },
              {
                  "decision_id": "decision_004",
                  "decision": "All risky operations remain blocked.",
                  "basis": "Residuals, chi-square, correction fitting, holdout language, and validation language are blocked.",
                  "next_action": "Continue with source selection.",
                  "claim_status": "safe_to_continue",
              },
          ]

          route_decision_rows = [
              {"route_id": "route_001", "route": "zhao_reference_source_selection_guard", "permission_status": "recommended", "reason": "The template exists; now choose where prediction values come from."},
              {"route_id": "route_002", "route": "zhao_reference_manifest_validator", "permission_status": "allowed_if_user_fills_template", "reason": "Validate only after predicted values are filled."},
              {"route_id": "route_003", "route": "zhao_residual_preview_guard", "permission_status": "blocked", "reason": "No numeric predictions yet."},
              {"route_id": "route_004", "route": "external_observed_residual_scoring", "permission_status": "blocked", "reason": "No scoring guard has passed."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.264 is enough history for consolidation if needed."},
          ]

          next_rows = [
              {"priority": 1, "test_id": "v4_265_zhao_reference_source_selection_guard", "purpose": "choose/police the source lane for predicted f_sigma8 values without scoring", "activated": True},
              {"priority": 2, "test_id": "v4_265_zhao_reference_manifest_validator", "purpose": "validate filled template only if user supplies numeric predictions", "activated": False},
              {"priority": 3, "test_id": "v4_265_zhao_residual_preview_guard", "purpose": "still blocked until reference manifest validates", "activated": False},
              {"priority": 4, "test_id": "v4_265_handoff_if_needed", "purpose": "consolidate v4.203-v4.264 if thread length is risky", "activated": True},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before reference template"},
              {"gate": "inherited_v4_263_rows_equal_9", "passed": len(inherited_v4_263_rows) == 9, "detail": f"inherited_v4_263_rows = {len(inherited_v4_263_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "reference_model_manifest_status_rows_at_least_1", "passed": len(reference_model_manifest_status_rows) >= 1, "detail": f"reference_model_manifest_status_rows = {len(reference_model_manifest_status_rows)}"},
              {"gate": "zhao_candidate_rows_equal_4", "passed": len(zhao_candidate_rows) == 4, "detail": f"zhao_candidate_rows = {len(zhao_candidate_rows)}"},
              {"gate": "reference_template_rows_equal_4", "passed": len(reference_template_rows) == 4, "detail": f"reference_template_rows = {len(reference_template_rows)}"},
              {"gate": "reference_template_instruction_rows_equal_5", "passed": len(reference_template_instruction_rows) == 5, "detail": f"reference_template_instruction_rows = {len(reference_template_instruction_rows)}"},
              {"gate": "reference_source_option_rows_equal_4", "passed": len(reference_source_option_rows) == 4, "detail": f"reference_source_option_rows = {len(reference_source_option_rows)}"},
              {"gate": "template_validation_preview_rows_equal_4", "passed": len(template_validation_preview_rows) == 4, "detail": f"template_validation_preview_rows = {len(template_validation_preview_rows)}"},
              {"gate": "all_template_rows_pass_preview", "passed": all(row["template_status"] == "template_pass_not_filled_not_scored" for row in template_validation_preview_rows), "detail": "all template rows pass preview"},
              {"gate": "future_reference_validator_contract_rows_equal_5", "passed": len(future_reference_validator_contract_rows) == 5, "detail": f"future_reference_validator_contract_rows = {len(future_reference_validator_contract_rows)}"},
              {"gate": "residual_block_rows_equal_4", "passed": len(residual_block_rows) == 4, "detail": f"residual_block_rows = {len(residual_block_rows)}"},
              {"gate": "next_gap_rows_equal_4", "passed": len(next_gap_rows) == 4, "detail": f"next_gap_rows = {len(next_gap_rows)}"},
              {"gate": "permission_rows_equal_12", "passed": len(permission_rows) == 12, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_8", "passed": len(readiness_rows) == 8, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "predicted_values_are_placeholders", "passed": all(row["predicted_value"] == "FILL_PREDICTED_VALUE_LATER" for row in reference_template_rows), "detail": "predictions remain placeholders"},
              {"gate": "reference_rows_not_scored", "passed": all(row["approval_status"] == "reference_candidate_not_scored" for row in reference_template_rows), "detail": "reference rows non-scoring"},
              {"gate": "reference_rows_not_fit_here", "passed": all(row["parameter_status"] == "not_fit_in_this_workflow" for row in reference_template_rows), "detail": "reference rows not fit here"},
              {"gate": "all_residual_objects_blocked", "passed": all(row["currently_computed"] is False for row in residual_block_rows), "detail": "residual objects blocked"},
              {"gate": "reference_source_selection_needed", "passed": any(row["permission_scope"] == "reference_source_selection" and row["permission_status"] == "needed_next" for row in permission_rows), "detail": "source selection needed"},
              {"gate": "reference_validator_blocked_until_filled", "passed": any(row["permission_scope"] == "reference_manifest_validator" and row["permission_status"] == "blocked_until_template_filled" for row in permission_rows), "detail": "validator blocked until filled"},
              {"gate": "residual_preview_blocked", "passed": any(row["permission_scope"] == "residual_preview" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "residual preview blocked"},
              {"gate": "chi_square_blocked", "passed": any(row["permission_scope"] == "chi_square" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "chi-square blocked"},
              {"gate": "live_manifest_fill_blocked", "passed": any(row["permission_scope"] == "live_external_observed_manifest_fill" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "live manifest fill blocked"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO evidence blocked"},
              {"gate": "full_holdout_language_blocked", "passed": any(row["permission_scope"] == "full_independent_holdout_language" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "full holdout language blocked"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric fit blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "source_selection_route_recommended", "passed": any(row["route"] == "zhao_reference_source_selection_guard" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "v4.265 source route recommended"},
              {"gate": "reference_validator_not_activated", "passed": any(row["test_id"] == "v4_265_zhao_reference_manifest_validator" and row["activated"] is False for row in next_rows), "detail": "reference validator not activated"},
              {"gate": "residual_preview_not_activated", "passed": any(row["test_id"] == "v4_265_zhao_residual_preview_guard" and row["activated"] is False for row in next_rows), "detail": "residual preview not activated"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no external observed scoring"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout approval"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_265_zhao_reference_manifest_validator_or_reference_source_selection_guard", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_264_zhao_reference_model_manifest_template_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_264_inherited_v4_263_rows.csv", inherited_v4_263_rows)
          write_csv(OUT / "v4_264_observed_manifest_status_rows.csv", observed_manifest_status_rows)
          write_csv(OUT / "v4_264_reference_model_manifest_status_rows.csv", reference_model_manifest_status_rows)
          write_csv(OUT / "v4_264_zhao_candidate_rows.csv", zhao_candidate_rows)
          write_csv(OUT / "v4_264_reference_model_manifest_template_rows.csv", reference_template_rows)
          write_csv(OUT / "zhao_reference_model_manifest_TEMPLATE_v4_264_NOT_SCORED.csv", reference_template_rows)
          write_csv(OUT / "v4_264_reference_template_instruction_rows.csv", reference_template_instruction_rows)
          write_csv(OUT / "v4_264_reference_source_option_rows.csv", reference_source_option_rows)
          write_csv(OUT / "v4_264_template_validation_preview_rows.csv", template_validation_preview_rows)
          write_csv(OUT / "v4_264_future_reference_validator_contract_rows.csv", future_reference_validator_contract_rows)
          write_csv(OUT / "v4_264_residual_block_rows.csv", residual_block_rows)
          write_csv(OUT / "v4_264_next_gap_rows.csv", next_gap_rows)
          write_csv(OUT / "v4_264_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_264_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_264_failure_condition_rows.csv", failure_condition_rows)
          write_csv(OUT / "v4_264_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_264_route_decision_rows.csv", route_decision_rows)
          write_csv(OUT / "v4_264_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_264_rule_checks.csv", checks)

          instruction_lines = [
              f"{row['field']}: allowed={row['allowed_fill']} / blocked={row['blocked_fill']}"
              for row in reference_template_instruction_rows
          ]

          gap_lines = [
              f"{row['gap']}: {row['plain_meaning']} -> {row['next_action']}"
              for row in next_gap_rows
          ]

          route_lines = [
              f"{row['route']}: {row['permission_status']} — {row['reason']}"
              for row in route_decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_263_rows": len(inherited_v4_263_rows),
              "observed_manifest_status_rows": len(observed_manifest_status_rows),
              "reference_model_manifest_status_rows": len(reference_model_manifest_status_rows),
              "reference_model_manifest_input_rows": len(reference_model_manifest_input_rows),
              "zhao_candidate_rows": len(zhao_candidate_rows),
              "reference_template_rows": len(reference_template_rows),
              "reference_template_instruction_rows": len(reference_template_instruction_rows),
              "reference_source_option_rows": len(reference_source_option_rows),
              "template_validation_preview_rows": len(template_validation_preview_rows),
              "future_reference_validator_contract_rows": len(future_reference_validator_contract_rows),
              "residual_block_rows": len(residual_block_rows),
              "next_gap_rows": len(next_gap_rows),
              "permission_rows": len(permission_rows),
              "readiness_rows": len(readiness_rows),
              "failure_condition_rows": len(failure_condition_rows),
              "decision_rows": len(decision_rows),
              "route_decision_rows": len(route_decision_rows),
              "next_rows": len(next_rows),
              "reference_model_template_written": True,
              "reference_predictions_filled": False,
              "residuals_computed": False,
              "chi_square_computed": False,
              "live_observed_manifest_fill_allowed": False,
              "scoring_allowed": False,
              "approved_holdout_sources": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_264_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.264 Zhao Reference Model Manifest Template",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_263_rows = {summary['inherited_v4_263_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"reference_model_manifest_status_rows = {summary['reference_model_manifest_status_rows']}",
              f"reference_model_manifest_input_rows = {summary['reference_model_manifest_input_rows']}",
              f"zhao_candidate_rows = {summary['zhao_candidate_rows']}",
              f"reference_template_rows = {summary['reference_template_rows']}",
              f"reference_template_instruction_rows = {summary['reference_template_instruction_rows']}",
              f"reference_source_option_rows = {summary['reference_source_option_rows']}",
              f"template_validation_preview_rows = {summary['template_validation_preview_rows']}",
              f"future_reference_validator_contract_rows = {summary['future_reference_validator_contract_rows']}",
              f"residual_block_rows = {summary['residual_block_rows']}",
              f"next_gap_rows = {summary['next_gap_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"route_decision_rows = {summary['route_decision_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"reference_model_template_written = {summary['reference_model_template_written']}",
              f"reference_predictions_filled = {summary['reference_predictions_filled']}",
              f"residuals_computed = {summary['residuals_computed']}",
              f"chi_square_computed = {summary['chi_square_computed']}",
              f"live_observed_manifest_fill_allowed = {summary['live_observed_manifest_fill_allowed']}",
              f"scoring_allowed = {summary['scoring_allowed']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Reference template instructions:",
              *instruction_lines,
              "",
              "Remaining gaps:",
              *gap_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.264 writes the Zhao reference-model manifest template and keeps all prediction values as placeholders. It closes the file-structure gap for the reference side, but it does not fill predictions, does not compute residuals, does not compute chi-square, and does not permit validation language.",
              "",
              "Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_264_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_263_rows = {summary['inherited_v4_263_rows']}")
          print(f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}")
          print(f"reference_model_manifest_status_rows = {summary['reference_model_manifest_status_rows']}")
          print(f"reference_model_manifest_input_rows = {summary['reference_model_manifest_input_rows']}")
          print(f"zhao_candidate_rows = {summary['zhao_candidate_rows']}")
          print(f"reference_template_rows = {summary['reference_template_rows']}")
          print(f"reference_template_instruction_rows = {summary['reference_template_instruction_rows']}")
          print(f"reference_source_option_rows = {summary['reference_source_option_rows']}")
          print(f"template_validation_preview_rows = {summary['template_validation_preview_rows']}")
          print(f"future_reference_validator_contract_rows = {summary['future_reference_validator_contract_rows']}")
          print(f"residual_block_rows = {summary['residual_block_rows']}")
          print(f"next_gap_rows = {summary['next_gap_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"readiness_rows = {summary['readiness_rows']}")
          print(f"failure_condition_rows = {summary['failure_condition_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"route_decision_rows = {summary['route_decision_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"reference_model_template_written = {summary['reference_model_template_written']}")
          print(f"reference_predictions_filled = {summary['reference_predictions_filled']}")
          print(f"residuals_computed = {summary['residuals_computed']}")
          print(f"chi_square_computed = {summary['chi_square_computed']}")
          print(f"live_observed_manifest_fill_allowed = {summary['live_observed_manifest_fill_allowed']}")
          print(f"scoring_allowed = {summary['scoring_allowed']}")
          print(f"approved_holdout_sources = {summary['approved_holdout_sources']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.264 Zhao reference model manifest template output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-264-zhao-reference-model-manifest-template-output
          path: |
            tairid_v4_264_zhao_reference_model_manifest_template_output/
            tairid-v4-264-zhao-reference-model-manifest-template-output.zip
