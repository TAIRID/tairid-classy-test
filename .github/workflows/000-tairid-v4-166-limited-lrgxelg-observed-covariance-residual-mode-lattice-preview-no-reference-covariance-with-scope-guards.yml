name: 000 TAIRID v4.166 - Limited LRGxELG Observed Covariance Residual Mode Lattice Preview No Reference Covariance With Scope Guards

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  limited-lrgxelg-observed-covariance-residual-mode-lattice-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python packages
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib

      - name: Run guarded observed-covariance residual mode lattice preview
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/tairid_v4_166_limited_lrgxelg_mode_lattice_preview
          cat > /tmp/tairid_v4_166_mode_lattice_preview.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          import numpy as np
          import pandas as pd
          import matplotlib
          matplotlib.use("Agg")
          import matplotlib.pyplot as plt

          VERSION = "v4.166"
          OUT = Path("artifacts/tairid_v4_166_limited_lrgxelg_mode_lattice_preview")
          OUT.mkdir(parents=True, exist_ok=True)

          EXPECTED_RESULT_LABEL = "limited_lrgxelg_observed_covariance_residual_mode_lattice_preview_passed_mode_and_lattice_artifacts_written_no_reference_covariance_no_pressure_no_validation"
          CLAIM_BOUNDARY = "observed_covariance_mode_lattice_preview_only_no_reference_covariance_no_pressure_no_validation"
          SCOPE = "Limited LRGxELG two-redshift BAO/RSD product only: z=0.70 and z=0.845, six slots."

          labels = [
              "DM_ov_rd_z0p70",
              "DH_ov_rd_z0p70",
              "fsigma8_z0p70",
              "DM_ov_rd_z0p845",
              "DH_ov_rd_z0p845",
              "fsigma8_z0p845",
          ]

          meta = {
              "DM_ov_rd_z0p70": {"z": 0.700, "observable": "DM/rd", "role": "geometry_transverse_reach", "display_role": "transverse geometry / reach"},
              "DH_ov_rd_z0p70": {"z": 0.700, "observable": "DH/rd", "role": "geometry_radial_pacing_access", "display_role": "radial geometry / pacing access"},
              "fsigma8_z0p70": {"z": 0.700, "observable": "f_sigma8", "role": "growth_consolidation", "display_role": "growth / consolidation"},
              "DM_ov_rd_z0p845": {"z": 0.845, "observable": "DM/rd", "role": "geometry_transverse_reach", "display_role": "transverse geometry / reach"},
              "DH_ov_rd_z0p845": {"z": 0.845, "observable": "DH/rd", "role": "geometry_radial_pacing_access", "display_role": "radial geometry / pacing access"},
              "fsigma8_z0p845": {"z": 0.845, "observable": "f_sigma8", "role": "growth_consolidation", "display_role": "growth / consolidation"},
          }

          observed = np.array([17.954174, 21.221161, 0.433572, 18.896851, 20.910056, 0.296822], dtype=float)
          lcdm_lite = np.array([17.5805195461, 20.2449335870, 0.4618546966, 20.3899796593, 18.5350397709, 0.4480660425], dtype=float)
          residual = observed - lcdm_lite
          fractional_residual = residual / lcdm_lite

          observed_covariance = np.array([
              [0.25878816407833366, -0.013232494941380247, 0.014041793308102417, 0.09779657800695639, 0.013451384603055151, 0.0015258919508268738],
              [-0.013232494941380247, 1.4344237981407906, -0.008455495121302605, 0.13219895337752324, 1.474694552820489, -0.025945740964317322],
              [0.014041793308102417, -0.008455495121302605, 0.002503713, 0.0004465092770083046, -0.028524441651947022, 0.0006465324],
              [0.09779657800695639, 0.13219895337752324, 0.0004465092770083046, 0.6026008615719455, -0.7938862302612694, 0.03564930998019409],
              [0.013451384603055151, 1.474694552820489, -0.028524441651947022, -0.7938862302612694, 8.18931167499725, -0.17137361720352173],
              [0.0015258919508268738, -0.025945740964317322, 0.0006465324, 0.03564930998019409, -0.17137361720352173, 0.006623474],
          ], dtype=float)

          observed_sigma = np.sqrt(np.diag(observed_covariance))
          observed_sigma_units_preview_not_pressure = residual / observed_sigma
          corr = observed_covariance / np.sqrt(np.outer(np.diag(observed_covariance), np.diag(observed_covariance)))

          eigenvalues, eigenvectors = np.linalg.eigh(observed_covariance)
          order = np.argsort(eigenvalues)
          eigenvalues = eigenvalues[order]
          eigenvectors = eigenvectors[:, order]
          mode_sigmas = np.sqrt(eigenvalues)
          mode_projections = eigenvectors.T @ residual
          mode_sigma_units = mode_projections / mode_sigmas
          observed_covariance_norm_preview_not_pressure = float(np.sum(mode_sigma_units ** 2))
          observed_covariance_norm_radius_preview_not_pressure = float(math.sqrt(observed_covariance_norm_preview_not_pressure))
          mode_energy = mode_sigma_units ** 2
          mode_energy_fraction = mode_energy / mode_energy.sum()
          dominant_mode_index_zero = int(np.argmax(np.abs(mode_sigma_units)))
          dominant_mode_number = dominant_mode_index_zero + 1

          input_rows = []
          for i, label in enumerate(labels):
              row = {
                  "order": i + 1,
                  "label": label,
                  "z": meta[label]["z"],
                  "observable": meta[label]["observable"],
                  "role": meta[label]["role"],
                  "observed_value": float(observed[i]),
                  "lcdm_lite_reference_value": float(lcdm_lite[i]),
                  "residual_observed_minus_lcdm_lite": float(residual[i]),
                  "percent_residual": float(100.0 * fractional_residual[i]),
                  "observed_sigma_from_observed_covariance": float(observed_sigma[i]),
                  "observed_sigma_units_preview_not_pressure": float(observed_sigma_units_preview_not_pressure[i]),
                  "claim_boundary": CLAIM_BOUNDARY,
              }
              input_rows.append(row)

          pd.DataFrame(input_rows).to_csv(OUT / "residual_input_table_v4_166.csv", index=False)
          (OUT / "residual_input_table_v4_166.json").write_text(json.dumps(input_rows, indent=2, sort_keys=True), encoding="utf-8")

          pd.DataFrame(observed_covariance, index=labels, columns=labels).to_csv(OUT / "observed_covariance_matrix_v4_166.csv")
          pd.DataFrame(corr, index=labels, columns=labels).to_csv(OUT / "observed_correlation_matrix_v4_166.csv")

          mode_rows = []
          loading_rows = []
          for m in range(6):
              loadings = []
              for i, label in enumerate(labels):
                  loading = float(eigenvectors[i, m])
                  signed_residual_contribution = float(loading * mode_projections[m])
                  loading_rows.append({
                      "mode_number": m + 1,
                      "label": label,
                      "z": meta[label]["z"],
                      "observable": meta[label]["observable"],
                      "role": meta[label]["role"],
                      "eigenvector_loading": loading,
                      "absolute_loading": abs(loading),
                      "signed_residual_contribution_in_mode_units": signed_residual_contribution,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })
                  loadings.append((label, loading))
              top_loadings = sorted(loadings, key=lambda x: abs(x[1]), reverse=True)[:3]
              mode_rows.append({
                  "mode_number": m + 1,
                  "observed_covariance_eigenvalue": float(eigenvalues[m]),
                  "mode_sigma": float(mode_sigmas[m]),
                  "residual_projection_onto_mode": float(mode_projections[m]),
                  "mode_sigma_units_preview_not_pressure": float(mode_sigma_units[m]),
                  "absolute_mode_sigma_units_preview_not_pressure": float(abs(mode_sigma_units[m])),
                  "mode_energy_preview_not_pressure": float(mode_energy[m]),
                  "mode_energy_fraction_preview_not_pressure": float(mode_energy_fraction[m]),
                  "dominant_loading_1": top_loadings[0][0],
                  "dominant_loading_1_value": float(top_loadings[0][1]),
                  "dominant_loading_2": top_loadings[1][0],
                  "dominant_loading_2_value": float(top_loadings[1][1]),
                  "dominant_loading_3": top_loadings[2][0],
                  "dominant_loading_3_value": float(top_loadings[2][1]),
                  "claim_boundary": CLAIM_BOUNDARY,
              })

          pd.DataFrame(mode_rows).to_csv(OUT / "observed_covariance_residual_mode_preview_v4_166.csv", index=False)
          pd.DataFrame(loading_rows).to_csv(OUT / "mode_variable_loadings_v4_166.csv", index=False)
          (OUT / "observed_covariance_residual_mode_preview_v4_166.json").write_text(json.dumps(mode_rows, indent=2, sort_keys=True), encoding="utf-8")

          # Build a small data-lattice representation. This is not a claim about physical lattice structure.
          nodes = []
          edges = []
          for i, label in enumerate(labels):
              nodes.append({"node_id": f"var_{label}", "node_label": label, "layer": "observed_variable", "z": meta[label]["z"], "role": meta[label]["role"], "value": float(observed[i]), "claim_boundary": CLAIM_BOUNDARY})
              nodes.append({"node_id": f"res_{label}", "node_label": f"residual_{label}", "layer": "residual_coordinate", "z": meta[label]["z"], "role": meta[label]["role"], "value": float(residual[i]), "claim_boundary": CLAIM_BOUNDARY})
              edges.append({"source": f"var_{label}", "target": f"res_{label}", "edge_type": "observed_minus_reference_residual", "weight": float(residual[i]), "absolute_weight": float(abs(residual[i])), "claim_boundary": CLAIM_BOUNDARY})

          for role in sorted(set(meta[label]["role"] for label in labels)):
              nodes.append({"node_id": f"role_{role}", "node_label": role, "layer": "role_group", "z": "mixed", "role": role, "value": "", "claim_boundary": CLAIM_BOUNDARY})
          for z in sorted(set(meta[label]["z"] for label in labels)):
              nodes.append({"node_id": f"z_{str(z).replace('.', 'p')}", "node_label": f"z={z}", "layer": "redshift_slice", "z": z, "role": "mixed", "value": "", "claim_boundary": CLAIM_BOUNDARY})

          for i, label in enumerate(labels):
              role = meta[label]["role"]
              znode = f"z_{str(meta[label]['z']).replace('.', 'p')}"
              edges.append({"source": f"var_{label}", "target": f"role_{role}", "edge_type": "variable_to_role", "weight": 1.0, "absolute_weight": 1.0, "claim_boundary": CLAIM_BOUNDARY})
              edges.append({"source": f"var_{label}", "target": znode, "edge_type": "variable_to_redshift", "weight": 1.0, "absolute_weight": 1.0, "claim_boundary": CLAIM_BOUNDARY})

          for m in range(6):
              nodes.append({"node_id": f"mode_{m+1}", "node_label": f"covariance_mode_{m+1}", "layer": "observed_covariance_mode", "z": "mixed", "role": "mixed", "value": float(mode_sigma_units[m]), "claim_boundary": CLAIM_BOUNDARY})
              for i, label in enumerate(labels):
                  weight = float(eigenvectors[i, m] * mode_sigma_units[m])
                  edges.append({"source": f"res_{label}", "target": f"mode_{m+1}", "edge_type": "residual_to_covariance_mode_loading_x_mode_units", "weight": weight, "absolute_weight": abs(weight), "claim_boundary": CLAIM_BOUNDARY})

          pd.DataFrame(nodes).to_csv(OUT / "lattice_nodes_v4_166.csv", index=False)
          pd.DataFrame(edges).to_csv(OUT / "lattice_edges_v4_166.csv", index=False)

          # Role/redshift residual grid.
          role_order = ["geometry_transverse_reach", "geometry_radial_pacing_access", "growth_consolidation"]
          z_order = [0.700, 0.845]
          grid = np.zeros((len(role_order), len(z_order)))
          for i, label in enumerate(labels):
              grid[role_order.index(meta[label]["role"]), z_order.index(meta[label]["z"])] = fractional_residual[i] * 100.0

          fig, ax = plt.subplots(figsize=(8, 4.8))
          im = ax.imshow(grid, aspect="auto")
          ax.set_xticks(range(len(z_order)))
          ax.set_xticklabels([str(z) for z in z_order])
          ax.set_yticks(range(len(role_order)))
          ax.set_yticklabels(["DM/rd reach", "DH/rd pacing", "f_sigma8 growth"])
          ax.set_title("v4.166 residual lattice grid: observed minus LCDM-lite (%)")
          for y in range(grid.shape[0]):
              for x in range(grid.shape[1]):
                  ax.text(x, y, f"{grid[y, x]:+.1f}%", ha="center", va="center")
          fig.colorbar(im, ax=ax, label="percent residual")
          fig.tight_layout()
          fig.savefig(OUT / "residual_role_redshift_lattice_grid_v4_166.png", dpi=160)
          fig.savefig(OUT / "residual_role_redshift_lattice_grid_v4_166.svg")
          plt.close(fig)

          fig, ax = plt.subplots(figsize=(8, 4.8))
          ax.bar([f"M{m+1}" for m in range(6)], mode_sigma_units)
          ax.axhline(0, linewidth=1)
          ax.set_title("v4.166 residual projection through observed covariance modes")
          ax.set_ylabel("mode sigma-units preview, not pressure")
          ax.set_xlabel("observed covariance eigenmode")
          for m, val in enumerate(mode_sigma_units):
              ax.text(m, val, f"{val:+.2f}", ha="center", va="bottom" if val >= 0 else "top")
          fig.tight_layout()
          fig.savefig(OUT / "observed_covariance_mode_projection_bar_v4_166.png", dpi=160)
          fig.savefig(OUT / "observed_covariance_mode_projection_bar_v4_166.svg")
          plt.close(fig)

          fig, ax = plt.subplots(figsize=(9, 5.5))
          heat = eigenvectors * mode_sigma_units.reshape(1, -1)
          im = ax.imshow(heat, aspect="auto")
          ax.set_xticks(range(6))
          ax.set_xticklabels([f"M{m+1}" for m in range(6)])
          ax.set_yticks(range(6))
          ax.set_yticklabels(labels)
          ax.set_title("v4.166 residual-to-mode lattice weights")
          for y in range(6):
              for x in range(6):
                  ax.text(x, y, f"{heat[y, x]:+.2f}", ha="center", va="center", fontsize=8)
          fig.colorbar(im, ax=ax, label="loading × mode units")
          fig.tight_layout()
          fig.savefig(OUT / "residual_mode_lattice_heatmap_v4_166.png", dpi=160)
          fig.savefig(OUT / "residual_mode_lattice_heatmap_v4_166.svg")
          plt.close(fig)

          # Simple network preview with variables on left, modes on right.
          fig, ax = plt.subplots(figsize=(11, 6))
          y_left = np.linspace(0.9, 0.1, 6)
          y_right = np.linspace(0.9, 0.1, 6)
          x_left = 0.1
          x_right = 0.9
          for i, label in enumerate(labels):
              ax.scatter([x_left], [y_left[i]], s=80)
              ax.text(x_left - 0.03, y_left[i], label, ha="right", va="center", fontsize=8)
          for m in range(6):
              ax.scatter([x_right], [y_right[m]], s=80)
              ax.text(x_right + 0.03, y_right[m], f"M{m+1}: {mode_sigma_units[m]:+.2f}", ha="left", va="center", fontsize=8)
          abs_heat = np.abs(heat)
          threshold = np.quantile(abs_heat, 0.70)
          for i in range(6):
              for m in range(6):
                  if abs_heat[i, m] >= threshold:
                      lw = 0.5 + 3.0 * abs_heat[i, m] / abs_heat.max()
                      ax.plot([x_left, x_right], [y_left[i], y_right[m]], linewidth=lw, alpha=0.55)
          ax.set_xlim(0, 1)
          ax.set_ylim(0, 1)
          ax.axis("off")
          ax.set_title("v4.166 lattice preview: strongest variable-to-mode links")
          fig.tight_layout()
          fig.savefig(OUT / "variable_mode_lattice_network_preview_v4_166.png", dpi=160)
          fig.savefig(OUT / "variable_mode_lattice_network_preview_v4_166.svg")
          plt.close(fig)

          lattice_summary = {
              "version": VERSION,
              "expected_result_label": EXPECTED_RESULT_LABEL,
              "scope": SCOPE,
              "claim_boundary": CLAIM_BOUNDARY,
              "reference_used": "LCDM-lite v4.159 prototype mean vector only",
              "observed_covariance_used": True,
              "reference_covariance_used": False,
              "pressure_computed": False,
              "validation_claimed": False,
              "observed_covariance_norm_preview_not_pressure": observed_covariance_norm_preview_not_pressure,
              "observed_covariance_norm_radius_preview_not_pressure": observed_covariance_norm_radius_preview_not_pressure,
              "dominant_mode_number": dominant_mode_number,
              "dominant_mode_sigma_units_preview_not_pressure": float(mode_sigma_units[dominant_mode_index_zero]),
              "dominant_mode_energy_fraction_preview_not_pressure": float(mode_energy_fraction[dominant_mode_index_zero]),
              "dominant_mode_top_loading_1": mode_rows[dominant_mode_index_zero]["dominant_loading_1"],
              "dominant_mode_top_loading_2": mode_rows[dominant_mode_index_zero]["dominant_loading_2"],
              "dominant_mode_top_loading_3": mode_rows[dominant_mode_index_zero]["dominant_loading_3"],
              "plain_language_read": "The residual vector is decomposed through the observed covariance into a small six-mode lattice. This shows which coupled observed modes the residual points through, but it is not final pressure because reference covariance is missing.",
          }
          (OUT / "lattice_summary_v4_166.json").write_text(json.dumps(lattice_summary, indent=2, sort_keys=True), encoding="utf-8")

          scope_guards = [
              {"guard": "limited_lrgxelg_only", "status": "PASS", "detail": SCOPE},
              {"guard": "uses_lcdm_lite_reference_mean_only", "status": "PASS", "detail": "No Planck posterior or CAMB/CLASS reference product is claimed."},
              {"guard": "observed_covariance_used_for_mode_preview_only", "status": "PASS", "detail": "Observed covariance is used for eigenmode and lattice diagnostics only."},
              {"guard": "reference_covariance_missing", "status": "PASS", "detail": "Reference covariance remains missing and is not invented."},
              {"guard": "no_final_pressure", "status": "PASS", "detail": "No final pressure or validation statistic is computed."},
              {"guard": "no_qso_or_full_family_covariance", "status": "PASS", "detail": "No QSO or full eBOSS family covariance is inferred."},
          ]
          pd.DataFrame(scope_guards).to_csv(OUT / "scope_guard_report_v4_166.csv", index=False)

          blocked_claims = [
              "TAIRID is validated by this result",
              "This is final cosmological pressure",
              "This is a Planck posterior comparison",
              "This includes reference covariance",
              "This includes QSO covariance",
              "This is full eBOSS covariance",
              "This is a likelihood, BIC, posterior, or public proof claim",
              "The data lattice is a literal physical lattice of the universe",
          ]
          pd.DataFrame([{"blocked_claim": c, "status": "BLOCKED", "reason": CLAIM_BOUNDARY} for c in blocked_claims]).to_csv(OUT / "blocked_claims_v4_166.csv", index=False)

          rule_checks = []
          def add_rule(name, passed, detail):
              rule_checks.append({"rule": name, "passed": bool(passed), "detail": detail})

          add_rule("expected_row_count_is_6", len(labels) == 6, str(len(labels)))
          add_rule("observed_values_finite", bool(np.all(np.isfinite(observed))), "all observed values finite")
          add_rule("lcdm_lite_values_finite", bool(np.all(np.isfinite(lcdm_lite))), "all prototype reference values finite")
          add_rule("residuals_finite", bool(np.all(np.isfinite(residual))), "all residuals finite")
          add_rule("covariance_shape_is_6x6", observed_covariance.shape == (6, 6), str(observed_covariance.shape))
          add_rule("covariance_symmetric", bool(np.allclose(observed_covariance, observed_covariance.T, atol=1e-12)), "symmetric within tolerance")
          add_rule("covariance_positive_definite", bool(np.all(eigenvalues > 0)), f"min eigenvalue {float(eigenvalues.min())}")
          add_rule("correlation_diagonal_one", bool(np.allclose(np.diag(corr), np.ones(6), atol=1e-12)), "correlation diagonal equals 1")
          add_rule("mode_count_is_6", len(mode_rows) == 6, str(len(mode_rows)))
          add_rule("loading_record_count_is_36", len(loading_rows) == 36, str(len(loading_rows)))
          add_rule("mode_units_finite", bool(np.all(np.isfinite(mode_sigma_units))), "all mode units finite")
          add_rule("norm_preview_positive", observed_covariance_norm_preview_not_pressure > 0, str(observed_covariance_norm_preview_not_pressure))
          add_rule("dominant_mode_found", 1 <= dominant_mode_number <= 6, str(dominant_mode_number))
          add_rule("lattice_nodes_written", len(nodes) == 23, str(len(nodes)))
          add_rule("lattice_edges_written", len(edges) == 54, str(len(edges)))
          add_rule("scope_guards_written", len(scope_guards) >= 6, str(len(scope_guards)))
          add_rule("blocked_claims_written", len(blocked_claims) >= 8, str(len(blocked_claims)))
          add_rule("reference_covariance_not_used", lattice_summary["reference_covariance_used"] is False, "reference covariance not used")
          add_rule("pressure_not_computed", lattice_summary["pressure_computed"] is False, "pressure not computed")
          add_rule("validation_not_claimed", lattice_summary["validation_claimed"] is False, "validation not claimed")
          add_rule("expected_label_set", lattice_summary["expected_result_label"] == EXPECTED_RESULT_LABEL, EXPECTED_RESULT_LABEL)
          add_rule("figures_written", all((OUT / name).exists() for name in [
              "residual_role_redshift_lattice_grid_v4_166.png",
              "observed_covariance_mode_projection_bar_v4_166.png",
              "residual_mode_lattice_heatmap_v4_166.png",
              "variable_mode_lattice_network_preview_v4_166.png",
          ]), "four PNG figure outputs written")

          pd.DataFrame(rule_checks).to_csv(OUT / "rule_results_v4_166.csv", index=False)
          passed_count = sum(1 for r in rule_checks if r["passed"])
          failed = [r for r in rule_checks if not r["passed"]]

          parser_health = {
              "version": VERSION,
              "expected_result_label": EXPECTED_RESULT_LABEL,
              "rule_pass_count": passed_count,
              "rule_total_count": len(rule_checks),
              "failed_gates": [r["rule"] for r in failed],
              "status": EXPECTED_RESULT_LABEL if not failed else "failed_scope_or_rule_check",
              "claim_boundary": CLAIM_BOUNDARY,
          }
          (OUT / "parser_health_report_v4_166.json").write_text(json.dumps(parser_health, indent=2, sort_keys=True), encoding="utf-8")
          pd.DataFrame([parser_health]).to_csv(OUT / "parser_health_report_v4_166.csv", index=False)

          md = []
          md.append("# TAIRID v4.166 — Limited LRGxELG Observed Covariance Residual Mode Lattice Preview")
          md.append("")
          md.append(f"Expected result: `{EXPECTED_RESULT_LABEL}`")
          md.append("")
          md.append(f"Rule result: **{passed_count} / {len(rule_checks)} passed**.")
          md.append("")
          md.append("## Clean result")
          md.append("")
          md.append("The six-slot residual vector was projected through the observed covariance eigenmodes and converted into a guarded data-lattice preview.")
          md.append("")
          md.append("This is the first step that shows which coupled covariance modes the residual shape points through. It is not final pressure because reference covariance is still missing.")
          md.append("")
          md.append("## Key numbers")
          md.append("")
          md.append(f"Observed-covariance norm preview, not pressure: `{observed_covariance_norm_preview_not_pressure:.6f}`")
          md.append(f"Observed-covariance radius preview, not pressure: `{observed_covariance_norm_radius_preview_not_pressure:.6f}`")
          md.append(f"Dominant observed covariance mode: `M{dominant_mode_number}`")
          md.append(f"Dominant mode units, not pressure: `{mode_sigma_units[dominant_mode_index_zero]:+.6f}`")
          md.append(f"Dominant mode energy fraction, not pressure: `{mode_energy_fraction[dominant_mode_index_zero]:.6f}`")
          md.append("")
          md.append("## Boundary")
          md.append("")
          md.append("No reference covariance, QSO covariance, full eBOSS covariance, likelihood, BIC, posterior comparison, final pressure, or validation claim is made.")
          (OUT / "tairid_v4_166_lattice_summary.md").write_text("\n".join(md) + "\n", encoding="utf-8")

          if failed:
