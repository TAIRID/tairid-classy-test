name: 000 TAIRID v4.70 Reference Candidate Review

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-70-reference-candidate-review.yml"

jobs:
  tairid-v4-70-reference-candidate-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.70 reference candidate review
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_70_reference_candidate_review

          python - <<'PY'
          import csv
          import json
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_70_reference_candidate_review")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_70_reference_candidate_review"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This reviews external reference candidates from v4.69 against the reference requirements.",
              "A pass means the candidate-review boundary is documented, not that any source has been accepted as Planck RSD reference uncertainty."
          ]

          UPSTREAM_LOCKS = {
              "v4_68": {
                  "readiness_label": "solver_feasibility_audit_passed_ready_for_external_reference_packet_or_solver_install_branch",
                  "camb_available": False,
                  "classy_available": False,
                  "boltzmann_solver_available": False,
                  "recommended_next_route": "v4.69_external_verified_reference_source_packet",
                  "solver_run": False,
                  "reference_uncertainty_computed": False
              },
              "v4_69": {
                  "readiness_label": "external_verified_reference_source_packet_passed_ready_for_reference_candidate_review_or_solver_install_branch",
                  "source_candidate_count": 5,
                  "reachable_source_count": 5,
                  "official_reachable_source_count": 4,
                  "candidate_accepted_as_reference_uncertainty_now_count": 0,
                  "external_reference_imported": False,
                  "reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_allowed_now": False
              }
          }

          SOURCE_CANDIDATES = [
              {
                  "source_id": "planck_pr3_irsa_cosmoparams_index",
                  "source_type": "official_data_index",
                  "url": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/",
                  "role": "Official Planck PR3 cosmological-parameters product index.",
                  "candidate_kind": "anchor_index"
              },
              {
                  "source_id": "planck_pr3_fullgrid_zip_head_only",
                  "source_type": "official_data_container",
                  "url": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip",
                  "role": "Official fullGrid posterior-chain container previously parsed by bounded ZIP64 central-directory probes.",
                  "candidate_kind": "chain_container_requires_parser_or_solver"
              },
              {
                  "source_id": "planck_pr3_parameter_tables_zip",
                  "source_type": "official_summary_tables",
                  "url": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_parameter-tables_R3.01.zip",
                  "role": "Official summary/reference table product already bounded as not posterior covariance.",
                  "candidate_kind": "summary_tables_not_covariance"
              },
              {
                  "source_id": "planck_2018_cosmological_parameters_arxiv",
                  "source_type": "primary_publication",
                  "url": "https://arxiv.org/abs/1807.06209",
                  "role": "Planck 2018 cosmological-parameters paper anchor.",
                  "candidate_kind": "publication_anchor"
              },
              {
                  "source_id": "esa_pr3_cosmology_products_page",
                  "source_type": "official_product_page",
                  "url": "https://esdcdoi.esac.esa.int/doi/html/data/astronomy/planck/Cosmology.html",
                  "role": "ESA PR3 cosmology product page anchor.",
                  "candidate_kind": "official_product_page"
              }
          ]

          REFERENCE_REQUIREMENTS = [
              {
                  "requirement_id": "same_target_redshifts",
                  "required": True,
                  "definition": "Reference must provide or allow reproducible derivation at z = 0.15, 0.38, 0.51, 0.61, 2.33."
              },
              {
                  "requirement_id": "posterior_uncertainty_or_samples",
                  "required": True,
                  "definition": "Reference must provide posterior samples, covariance, or a reproducible way to compute covariance."
              },
              {
                  "requirement_id": "Planck_model_identity",
                  "required": True,
                  "definition": "Reference must state Planck likelihood/root/model assumptions clearly."
              },
              {
                  "requirement_id": "weights_preserved",
                  "required": True,
                  "definition": "If samples are used, sample weights must be preserved."
              },
              {
                  "requirement_id": "not_minimum_sidecars",
                  "required": True,
                  "definition": "Point/minimum sidecars cannot be treated as posterior covariance."
              },
              {
                  "requirement_id": "not_parameter_tables_only",
                  "required": True,
                  "definition": "Summary parameter tables alone are not enough for redshift covariance."
              }
          ]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          CANDIDATE_REVIEW_POLICY = [
              {
                  "candidate_kind": "anchor_index",
                  "accept_as_reference_uncertainty_now": False,
                  "reason": "An index can identify products, but it is not itself posterior samples or covariance."
              },
              {
                  "candidate_kind": "chain_container_requires_parser_or_solver",
                  "accept_as_reference_uncertainty_now": False,
                  "reason": "The container is official and useful, but v4.68 showed no local solver route yet; full chains are not imported."
              },
              {
                  "candidate_kind": "summary_tables_not_covariance",
                  "accept_as_reference_uncertainty_now": False,
                  "reason": "v4.55 bounded parameter tables as summary/reference material, not posterior uncertainty."
              },
              {
                  "candidate_kind": "publication_anchor",
                  "accept_as_reference_uncertainty_now": False,
                  "reason": "A paper anchor is necessary for provenance, but not enough as machine-readable posterior covariance."
              },
              {
                  "candidate_kind": "official_product_page",
                  "accept_as_reference_uncertainty_now": False,
                  "reason": "A product page is useful for provenance, but not itself a redshift covariance packet."
              }
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "route_id": "v4_71_external_literature_expansion",
                  "status": "recommended_lightweight_next",
                  "purpose": "Search or source-anchor candidate external publications/data products that explicitly provide Planck-derived growth or fsigma8 posterior information.",
                  "why": "Current v4.69 anchors are valid provenance anchors, but none is a ready covariance source."
              },
              {
                  "route_id": "v4_71_solver_install_or_container_feasibility",
                  "status": "valid_heavier_branch",
                  "purpose": "Try a pinned solver/container route for CAMB/CLASS, then validate against Planck sidecar fixtures.",
                  "why": "The internal fullGrid route likely needs a solver if no external posterior reference is found."
              },
              {
                  "route_id": "v4_71_hold_reference_uncertainty_until_sprint_end",
                  "status": "valid_pause_option",
                  "purpose": "Freeze the current boundary and continue other RSD blockers such as combination policy.",
                  "why": "Reference uncertainty is bounded but not solved."
              }
          ]

          BLOCKED_CLAIMS = [
              "A reference candidate was accepted as Planck RSD covariance.",
              "External reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "A final RSD pressure score was computed.",
              "TAIRID cosmology is validated.",
              "Full Planck chains were imported.",
              "Full chain sample files were parsed.",
              "CAMB or CLASS was installed.",
              "A solver was run.",
              "Minimum sidecars were treated as posterior covariance.",
              "Parameter tables were treated as posterior covariance.",
              "A source page was treated as covariance.",
              "A publication abstract was treated as covariance.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          def source_probe(source):
              record = {
                  "source_id": source["source_id"],
                  "source_type": source["source_type"],
                  "candidate_kind": source["candidate_kind"],
                  "url": source["url"],
                  "ok": False,
                  "method_used": "",
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "bytes_sampled": 0,
                  "contains_planck_text": False,
                  "contains_fsigma8_text": False,
                  "contains_covariance_text": False,
                  "contains_posterior_text": False,
                  "error": ""
              }

              headers = {
                  "User-Agent": "TAIRID-v4.70-reference-candidate-review/1.0",
                  "Accept": "*/*"
              }

              try:
                  req = urllib.request.Request(source["url"], method="HEAD", headers=headers)
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["method_used"] = "HEAD"
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

              except Exception as head_exc:
                  try:
                      req = urllib.request.Request(source["url"], headers=headers)
                      with urllib.request.urlopen(req, timeout=90) as response:
                          record["ok"] = True
                          record["method_used"] = "GET_PREFIX"
                          record["status"] = getattr(response, "status", None)
                          record["content_type"] = response.headers.get("Content-Type")
                          content_length = response.headers.get("Content-Length")
                          record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

                          data = response.read(200000)
                          text = data.decode("utf-8", errors="replace").lower()
                          record["bytes_sampled"] = len(data)
                          record["contains_planck_text"] = "planck" in text
                          record["contains_fsigma8_text"] = "fsigma8" in text or "fσ8" in text or "f sigma" in text
                          record["contains_covariance_text"] = "covariance" in text
                          record["contains_posterior_text"] = "posterior" in text

                  except Exception as get_exc:
                      record["error"] = f"HEAD failed: {type(head_exc).__name__}: {head_exc}; GET failed: {type(get_exc).__name__}: {get_exc}"

              return record

          failed_gates = []
          warnings = [
              "reference_candidate_review_only",
              "source_reachability_not_source_acceptance",
              "no_reference_candidate_accepted_as_uncertainty",
              "no_external_reference_imported",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          policy_by_kind = {row["candidate_kind"]: row for row in CANDIDATE_REVIEW_POLICY}
          source_records = [source_probe(source) for source in SOURCE_CANDIDATES]

          candidate_review_records = []
          for source in SOURCE_CANDIDATES:
              policy = policy_by_kind[source["candidate_kind"]]
              probe = next(row for row in source_records if row["source_id"] == source["source_id"])

              candidate_review_records.append({
                  "source_id": source["source_id"],
                  "source_type": source["source_type"],
                  "candidate_kind": source["candidate_kind"],
                  "role": source["role"],
                  "reachable": probe["ok"],
                  "accept_as_reference_uncertainty_now": policy["accept_as_reference_uncertainty_now"],
                  "review_reason": policy["reason"],
                  "manual_review_still_required": True,
                  "reference_uncertainty_imported": False
              })

          reachable_count = sum(1 for row in source_records if row["ok"])
          accepted_now_count = sum(1 for row in candidate_review_records if row["accept_as_reference_uncertainty_now"] is True)
          manual_review_count = sum(1 for row in candidate_review_records if row["manual_review_still_required"] is True)

          if UPSTREAM_LOCKS["v4_69"]["readiness_label"] != "external_verified_reference_source_packet_passed_ready_for_reference_candidate_review_or_solver_install_branch":
              failed_gates.append("v4_69_readiness_not_carried")

          if UPSTREAM_LOCKS["v4_69"]["candidate_accepted_as_reference_uncertainty_now_count"] != 0:
              failed_gates.append("v4_69_candidate_acceptance_boundary_not_carried")

          if len(SOURCE_CANDIDATES) < 5:
              failed_gates.append("source_candidate_count_too_low")

          if reachable_count == 0:
              failed_gates.append("no_reference_candidates_reachable")

          if accepted_now_count != 0:
              failed_gates.append("candidate_accepted_as_uncertainty_too_early")

          if len(REFERENCE_REQUIREMENTS) < 6:
              failed_gates.append("reference_requirements_incomplete")

          if len(CANDIDATE_REVIEW_POLICY) != len({row["candidate_kind"] for row in SOURCE_CANDIDATES}):
              failed_gates.append("candidate_review_policy_does_not_cover_all_kinds")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "accepted as planck rsd covariance",
              "external reference uncertainty is included",
              "reference uncertainty is computed",
              "final rsd pressure",
              "validated",
              "full planck chains were imported",
              "solver was run",
              "parameter tables were treated as posterior covariance",
              "publication abstract was treated as covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = (
              "reference_candidate_review_passed_no_candidate_accepted_ready_for_external_literature_expansion_or_solver_branch"
          )

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "upstream_v4_69_boundary_carried",
                  "pass": UPSTREAM_LOCKS["v4_69"]["candidate_accepted_as_reference_uncertainty_now_count"] == 0,
                  "result": "v4.69 accepted no source as uncertainty",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "candidate_sources_reviewed",
                  "pass": len(candidate_review_records) >= 5,
                  "result": f"{len(candidate_review_records)} candidates reviewed",
                  "boundary": "Review is not acceptance."
              },
              {
                  "rule_id": "candidate_reachability_checked",
                  "pass": reachable_count > 0,
                  "result": f"{reachable_count} candidates reachable",
                  "boundary": "Reachability is not posterior covariance."
              },
              {
                  "rule_id": "no_candidate_accepted_too_early",
                  "pass": accepted_now_count == 0,
                  "result": "0 candidates accepted as reference uncertainty now",
                  "boundary": "Manual review and source expansion still required."
              },
              {
                  "rule_id": "reference_requirements_preserved",
                  "pass": len(REFERENCE_REQUIREMENTS) >= 6,
                  "result": f"{len(REFERENCE_REQUIREMENTS)} reference requirements preserved",
                  "boundary": "No uncertainty imported."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "Candidate review only."
              },
              {
                  "rule_id": "next_route_options_declared",
                  "pass": len(NEXT_ROUTE_OPTIONS) >= 3,
                  "result": f"{len(NEXT_ROUTE_OPTIONS)} next route options declared",
                  "boundary": "No route computes uncertainty now."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 14,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final pressure claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute uncertainty."
              },
              {
                  "rule_id": "no_reference_uncertainty_or_final_pressure",
                  "pass": True,
                  "result": "no_reference_uncertainty_no_final_RSD_pressure",
                  "boundary": "Candidate review only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_70_rules_passed")

          if failed_gates:
              readiness_label = "reference_candidate_review_failed"
              next_allowed_step = "Repair candidate review before expanding sources or choosing solver branch."
          else:
              readiness_label = "reference_candidate_review_passed_ready_for_external_literature_expansion_or_solver_install_branch"
              next_allowed_step = (
                  "Proceed to v4.71 external literature/source expansion or v4.71 solver install/container branch. "
                  "Do not compute reference uncertainty or final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "source_candidate_count": len(SOURCE_CANDIDATES),
              "reachable_candidate_count": reachable_count,
              "candidate_review_record_count": len(candidate_review_records),
              "accepted_reference_uncertainty_now_count": accepted_now_count,
              "manual_review_still_required_count": manual_review_count,
              "reference_requirement_count": len(REFERENCE_REQUIREMENTS),
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "next_route_option_count": len(NEXT_ROUTE_OPTIONS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "route_decision": route_decision,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "solver_installed": False,
              "solver_run": False,
              "external_reference_imported": False,
              "reference_uncertainty_computed": False,
              "final_RSD_pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "source_candidates": SOURCE_CANDIDATES,
              "source_reachability_records": source_records,
              "reference_requirements": REFERENCE_REQUIREMENTS,
              "candidate_review_policy": CANDIDATE_REVIEW_POLICY,
              "candidate_review_records": candidate_review_records,
              "target_redshifts": TARGET_REDSHIFTS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "full_chain_sample_files_parsed": False,
                  "solver_installed": False,
                  "solver_run": False,
                  "external_reference_imported": False,
                  "reference_uncertainty_computed": False,
                  "final_RSD_pressure_computed": False,
                  "validation_claim_allowed": False
              }
          }

          json_path = OUTDIR / "tairid_v4_70_reference_candidate_review.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "source_reachability_records_v4_70.csv",
              source_records,
              [
                  "source_id",
                  "source_type",
                  "candidate_kind",
                  "url",
                  "ok",
                  "method_used",
                  "status",
                  "content_type",
                  "content_length",
                  "bytes_sampled",
                  "contains_planck_text",
                  "contains_fsigma8_text",
                  "contains_covariance_text",
                  "contains_posterior_text",
                  "error"
              ]
          )

          write_csv(
              OUTDIR / "candidate_review_records_v4_70.csv",
              candidate_review_records,
              [
                  "source_id",
                  "source_type",
                  "candidate_kind",
                  "role",
                  "reachable",
                  "accept_as_reference_uncertainty_now",
                  "review_reason",
                  "manual_review_still_required",
                  "reference_uncertainty_imported"
              ]
          )

          write_csv(
              OUTDIR / "reference_requirements_v4_70.csv",
              REFERENCE_REQUIREMENTS,
              ["requirement_id", "required", "definition"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_70.csv",
              NEXT_ROUTE_OPTIONS,
              ["route_id", "status", "purpose", "why"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_70.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_70.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.70 — Reference Candidate Review")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This test reviews the v4.69 reference candidates and asks whether any can honestly become the Planck RSD reference uncertainty source now.")
          md.append("")
          md.append("The expected honest outcome is that the current candidates are useful anchors or products, but none is accepted as posterior covariance yet.")
          md.append("")
          md.append("It does not download fullGrid, import full chains, install or run a solver, compute reference uncertainty, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Key boundary")
          md.append("")
          md.append("- Official source reachability is not the same as posterior covariance.")
          md.append("- The fullGrid container is useful, but still requires a parser/solver route before uncertainty.")
          md.append("- Parameter tables and sidecars cannot be treated as posterior covariance.")
          md.append("- The next useful move is external source expansion or a solver/container branch.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_70_reference_candidate_review.json`")
          md.append("- `tairid_v4_70_reference_candidate_review.md`")
