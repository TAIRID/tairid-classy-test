name: 000 TAIRID v4.204 - Real Numeric Input Staging Validator With Placeholder Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-204-real-numeric-input-staging-validator-with-placeholder-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-204-real-numeric-input-staging-validator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.204 real numeric input staging validator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_204_outputs
          cat > tairid_v4_204_outputs/run_v4_204.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_204_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "real_numeric_input_staging_validator_passed_placeholder_guard_reports_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no cosmology validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved between domains",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "staged input readiness is not validation",
              "template rows are not empirical subject data",
              "manual rows are not empirical subject data",
              "TAIRID not proved"
          ]

          V4_203_STATUS = {
              "version": "v4.203",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "required_gap_files": 4,
              "ready_gap_count": 0,
              "missing_gap_count": 4,
              "incomplete_gap_count": 0,
              "candidate_templates_written": 4,
              "package_status": "real_numeric_gap_closure_workbench_written_no_validation",
              "selected_next_route": "fill_or_upload_real_numeric_gap_tables_with_scope_guards"
          }

          FILE_SPECS = [
              {
                  "gap_id": "G1",
                  "lane_group": "Dyslexia / Aphantasia",
                  "canonical_path": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "required_columns": [
                      "lane", "subject_id", "group_or_condition", "boundary_or_task",
                      "propagation_reach_value", "pacing_access_value",
                      "consolidation_growth_value", "viability_or_outcome_value",
                      "source_or_dataset", "notes"
                  ],
                  "numeric_columns": [
                      "propagation_reach_value", "pacing_access_value",
                      "consolidation_growth_value", "viability_or_outcome_value"
                  ],
                  "minimum_complete_rows": 4,
                  "ready_rerun": "v4.195",
                  "purpose": "subject/group axis covariance for dyslexia and aphantasia"
              },
              {
                  "gap_id": "G2",
                  "lane_group": "ADHD / Autism / Schizotypy",
                  "canonical_path": "data/neurotype/adhd_autism_schizotypy_numeric_delta_input.csv",
                  "required_columns": [
                      "lane", "case_id", "group_or_condition", "boundary_or_task",
                      "propagation_reach_value", "reference_propagation_reach_value",
                      "pacing_access_value", "reference_pacing_access_value",
                      "consolidation_growth_value", "reference_consolidation_growth_value",
                      "source_or_dataset", "notes"
                  ],
                  "numeric_columns": [
                      "propagation_reach_value", "reference_propagation_reach_value",
                      "pacing_access_value", "reference_pacing_access_value",
                      "consolidation_growth_value", "reference_consolidation_growth_value"
                  ],
                  "minimum_complete_rows": 3,
                  "ready_rerun": "v4.197",
                  "purpose": "real numeric deltas for ADHD, autism, and schizotypy"
              },
              {
                  "gap_id": "G3",
                  "lane_group": "Bipolar phase surfaces",
                  "canonical_path": "data/neurotype/bipolar_phase_numeric_surface_input.csv",
                  "required_columns": [
                      "phase_label", "subject_id", "group_or_condition", "boundary_or_task",
                      "propagation_value", "reference_propagation_value",
                      "pacing_value", "reference_pacing_value",
                      "consolidation_value", "reference_consolidation_value",
                      "viability_value", "reference_viability_value",
                      "source_or_dataset", "notes"
                  ],
                  "numeric_columns": [
                      "propagation_value", "reference_propagation_value",
                      "pacing_value", "reference_pacing_value",
                      "consolidation_value", "reference_consolidation_value",
                      "viability_value", "reference_viability_value"
                  ],
                  "minimum_complete_rows": 4,
                  "ready_rerun": "v4.199",
                  "purpose": "measured bipolar phase surfaces"
              },
              {
                  "gap_id": "G4",
                  "lane_group": "Holdout surface tests",
                  "canonical_path": "data/neurotype/holdout_surface_test_design_input.csv",
                  "required_columns": [
                      "holdout_id", "target_surface", "reason_held_out",
                      "propagation_candidate", "pacing_candidate", "consolidation_candidate",
                      "viability_candidate", "needed_dataset_or_task",
                      "source_or_dataset", "notes"
                  ],
                  "numeric_columns": [],
                  "minimum_complete_rows": 3,
                  "ready_rerun": "holdout_surface_test_design",
                  "purpose": "targeted designs for held-out surfaces"
              }
          ]

          PLACEHOLDER_PATTERNS = [
              "replace_with",
              "numeric value",
              "to be filled",
              "same subject/control reference",
              "control/reference",
              "TD/reference",
              "reference metric",
              "paper output table",
              "uploaded dyslexia table",
              "aphantasia questionnaire",
              "bipolar depression-side output table",
              "schizotypy paper output table",
              "manual_relative",
              "manual_phase",
              "manual_group",
              "not_subject_data",
              "not empirical",
              "placeholder"
          ]

          def read_csv(path):
              if not path.exists():
                  return [], []
              with open(path, newline="", encoding="utf-8") as f:
                  reader = csv.DictReader(f)
                  return list(reader), reader.fieldnames or []

          def is_number(value):
              try:
                  if value is None or str(value).strip() == "":
                      return False
                  float(value)
                  return True
              except Exception:
                  return False

          def has_placeholder(row):
              blob = " | ".join(str(v) for v in row.values()).lower()
              return any(pattern.lower() in blob for pattern in PLACEHOLDER_PATTERNS)

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          staging_rows = []
          row_issue_rows = []
          rerun_rows = []

          for spec in FILE_SPECS:
              path = Path(spec["canonical_path"])
              rows, cols = read_csv(path)
              missing_columns = [c for c in spec["required_columns"] if c not in cols]
              complete_required_rows = 0
              numeric_complete_rows = 0
              placeholder_rows = 0

              for i, row in enumerate(rows, start=1):
                  required_complete = all(str(row.get(c, "")).strip() != "" for c in spec["required_columns"])
                  numeric_complete = all(is_number(row.get(c)) for c in spec["numeric_columns"]) if spec["numeric_columns"] else required_complete
                  placeholder = has_placeholder(row)
                  if required_complete:
                      complete_required_rows += 1
                  if numeric_complete:
                      numeric_complete_rows += 1
                  if placeholder:
                      placeholder_rows += 1
                  if missing_columns or not required_complete or not numeric_complete or placeholder:
                      row_issue_rows.append({
                          "gap_id": spec["gap_id"],
                          "file_path": spec["canonical_path"],
                          "row_number": i,
                          "missing_columns": ";".join(missing_columns),
                          "required_complete": required_complete,
                          "numeric_complete": numeric_complete,
                          "placeholder_or_manual_marker": placeholder,
                          "notes": "Fix row before treating as ready input."
                      })

              if not path.exists():
                  status = "missing"
                  readiness = False
                  next_action = "create this file at " + spec["canonical_path"] + " using the candidate template from v4.203/v4.204, then replace placeholders with real values"
              elif missing_columns:
                  status = "columns_missing"
                  readiness = False
                  next_action = "add missing columns: " + ";".join(missing_columns)
              elif placeholder_rows > 0:
                  status = "placeholder_or_manual_rows_present"
                  readiness = False
                  next_action = "replace placeholder/manual rows with real numeric/source-grounded rows"
              elif numeric_complete_rows < spec["minimum_complete_rows"]:
                  status = "not_enough_complete_numeric_rows"
                  readiness = False
                  next_action = "add more complete numeric rows; minimum for preview is " + str(spec["minimum_complete_rows"])
              else:
                  status = "ready_for_preview_rerun"
                  readiness = True
                  next_action = "rerun " + spec["ready_rerun"]

              staging_rows.append({
                  "gap_id": spec["gap_id"],
                  "lane_group": spec["lane_group"],
                  "file_path": spec["canonical_path"],
                  "file_exists": path.exists(),
                  "rows_loaded": len(rows),
                  "required_columns": len(spec["required_columns"]),
                  "missing_column_count": len(missing_columns),
                  "complete_required_rows": complete_required_rows,
                  "numeric_complete_rows": numeric_complete_rows,
                  "placeholder_or_manual_rows": placeholder_rows,
                  "minimum_complete_rows": spec["minimum_complete_rows"],
                  "status": status,
                  "ready_for_preview_rerun": readiness,
                  "ready_rerun": spec["ready_rerun"],
                  "next_action": next_action,
                  "purpose": spec["purpose"]
              })

              if readiness:
                  rerun_rows.append({
                      "gap_id": spec["gap_id"],
                      "ready_file": spec["canonical_path"],
                      "rerun_workflow": spec["ready_rerun"],
                      "claim_boundary": "ready for preview rerun only; not validation"
                  })

          ready_count = sum(1 for r in staging_rows if r["ready_for_preview_rerun"] is True)
          missing_count = sum(1 for r in staging_rows if r["status"] == "missing")
          placeholder_count = sum(1 for r in staging_rows if r["status"] == "placeholder_or_manual_rows_present")
          incomplete_count = sum(1 for r in staging_rows if r["status"] in ["columns_missing", "not_enough_complete_numeric_rows"])

          write_csv(OUT / "v4_204_v4_203_status_review.csv", [V4_203_STATUS], list(V4_203_STATUS.keys()))
          (OUT / "v4_204_v4_203_status_review.json").write_text(json.dumps(V4_203_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_204_real_numeric_input_staging_status.csv", staging_rows, [
              "gap_id", "lane_group", "file_path", "file_exists", "rows_loaded",
              "required_columns", "missing_column_count", "complete_required_rows",
              "numeric_complete_rows", "placeholder_or_manual_rows", "minimum_complete_rows",
              "status", "ready_for_preview_rerun", "ready_rerun", "next_action", "purpose"
          ])
          write_csv(OUT / "v4_204_row_issue_report.csv", row_issue_rows, [
              "gap_id", "file_path", "row_number", "missing_columns",
              "required_complete", "numeric_complete", "placeholder_or_manual_marker", "notes"
          ])
          write_csv(OUT / "v4_204_ready_rerun_manifest.csv", rerun_rows, [
              "gap_id", "ready_file", "rerun_workflow", "claim_boundary"
          ])

          claim_rows = [
              {
                  "claim": "A file being staged means the theory is supported.",
                  "status": "blocked",
                  "safe_wording": "Staged only means the file can be checked or rerun.",
                  "forbidden_wording": "Staging proves TAIRID."
              },
              {
                  "claim": "Placeholder rows are acceptable as real data.",
                  "status": "blocked",
                  "safe_wording": "Placeholder/manual rows must be replaced before preview reruns are treated as measured-input reruns.",
                  "forbidden_wording": "Template rows are measured rows."
              },
              {
                  "claim": "Ready rerun means validation.",
                  "status": "blocked",
                  "safe_wording": "Ready rerun means the next classifier can be run on staged numeric inputs.",
                  "forbidden_wording": "Ready rerun validates the shape."
              }
          ]
          write_csv(OUT / "v4_204_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          next_routes = []
          if ready_count:
              next_routes.append({
                  "priority": 1,
                  "route": "rerun_ready_numeric_classifiers_with_scope_guards",
                  "condition": "one or more real numeric input files passed staging",
                  "next_action": "rerun workflows listed in v4_204_ready_rerun_manifest.csv"
              })
          next_routes.append({
              "priority": 2 if ready_count else 1,
              "route": "fill_missing_or_placeholder_numeric_inputs_with_scope_guards",
              "condition": "files are missing, incomplete, or contain placeholders/manual rows",
              "next_action": "create or edit the files listed in v4_204_real_numeric_input_staging_status.csv"
          })
          next_routes.append({
              "priority": 3,
              "route": "shape_lattice_update_after_real_inputs_with_scope_guards",
              "condition": "after v4.195/v4.197/v4.199 have been rerun on real numeric inputs",
              "next_action": "update lattice and compare manual vs measured rows"
          })
          write_csv(OUT / "v4_204_next_routes.csv", next_routes, ["priority", "route", "condition", "next_action"])

          selected_next_route = (
              "rerun_ready_numeric_classifiers_with_scope_guards"
              if ready_count
              else "fill_missing_or_placeholder_numeric_inputs_with_scope_guards"
          )

          route_decision = {
              "version": "v4.204",
              "result_label": RESULT_LABEL,
              "clean_result": "The real numeric input staging validator checked the four required files for existence, required columns, numeric completeness, and placeholder/manual-row markers.",
              "files_checked": len(FILE_SPECS),
              "ready_count": ready_count,
              "missing_count": missing_count,
              "placeholder_or_manual_file_count": placeholder_count,
              "incomplete_file_count": incomplete_count,
              "row_issue_count": len(row_issue_rows),
              "selected_next_route": selected_next_route,
              "truth_boundary": "input staging readiness only; not validation, not unit equivalence, not causal equivalence",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_204_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_204_scope_guards.json").write_text(json.dumps({
              "scope": "real numeric input staging validation with placeholder/manual-row guards",
              "staging_readiness_is_validation": False,
              "template_rows_are_data": False,
              "manual_rows_are_subject_data": False,
              "raw_numbers_moved_between_domains": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_204_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.204 - Real Numeric Input Staging Validator",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.203 wrote the gap-closure workbench. v4.204 checks whether the four required real numeric files are actually staged and whether they still contain placeholders or manual rows.",
              "",
              "Files checked: `" + str(len(FILE_SPECS)) + "`",
              "Ready count: `" + str(ready_count) + "`",
              "Missing count: `" + str(missing_count) + "`",
              "Placeholder/manual file count: `" + str(placeholder_count) + "`",
              "Incomplete file count: `" + str(incomplete_count) + "`",
              "Row issue count: `" + str(len(row_issue_rows)) + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_204_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_204_v4_203_status_review.csv",
              "v4_204_v4_203_status_review.json",
              "v4_204_real_numeric_input_staging_status.csv",
              "v4_204_row_issue_report.csv",
              "v4_204_ready_rerun_manifest.csv",
              "v4_204_claim_boundary_matrix.csv",
              "v4_204_next_routes.csv",
              "v4_204_route_decision.json",
              "v4_204_scope_guards.json",
              "v4_204_blocked_claims.json",
              "v4_204_summary.md"
          ]

          rules = {
              "version_is_v4_204": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_203_status_reviewed": V4_203_STATUS["rule_pass_count"] == 10,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "four_files_checked": len(staging_rows) == 4,
              "staging_status_written": (OUT / "v4_204_real_numeric_input_staging_status.csv").exists(),
              "placeholder_guard_active": len(PLACEHOLDER_PATTERNS) >= 10,
              "selected_route_present": bool(selected_next_route),
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.204",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "files_checked": len(FILE_SPECS),
              "ready_count": ready_count,
              "missing_count": missing_count,
              "placeholder_or_manual_file_count": placeholder_count,
              "incomplete_file_count": incomplete_count,
              "row_issue_count": len(row_issue_rows),
              "package_status": "real_numeric_input_staging_validator_written_no_validation",
              "selected_next_route": selected_next_route,
              "claim_boundary": "input_staging_readiness_only_no_validation"
          }

          (OUT / "v4_204_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.204 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_204_outputs/run_v4_204.py

      - name: Upload v4.204 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-204-real-numeric-input-staging-validator-output
          path: tairid_v4_204_outputs/
