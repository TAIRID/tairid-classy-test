name: 000 TAIRID v4.100 Larger Bounded Solver Batch Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-100-larger-bounded-solver-batch-design.yml"

jobs:
  tairid-v4-100-larger-bounded-solver-batch-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.100 larger bounded solver batch design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_100_larger_bounded_solver_batch_design

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_100_larger_bounded_solver_batch_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_100_larger_bounded_solver_batch_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse additional chain sample files now.",
              "This does not run CAMB now.",
              "This does not compute weighted mean values now.",
              "This does not compute a weighted covariance matrix now.",
              "This does not compute Planck reference uncertainty.",
              "This designs the larger bounded solver batch after v4.99.1 parsed 256 valid weighted sample packets.",
              "A pass means the 256-sample solver-batch route is specified and ready for a bounded parse-plus-solve probe."
          ]

          UPSTREAM_LOCKS = {
              "v4_99_1_larger_bounded_sample_parser_probe_claim_guard_repair": {
                  "readiness_label": "larger_bounded_sample_parser_probe_passed_ready_for_larger_bounded_solver_batch_design",
                  "larger_samples_parsed": True,
                  "valid_sample_row_count": 256,
                  "target_valid_rows_reached": True,
                  "minimum_valid_rows_reached": True,
                  "target_valid_sample_rows": 256,
                  "minimum_required_valid_sample_rows": 128,
                  "effective_sample_size_preview": 156.27004909983634,
                  "sample_weight_sum_preview": 618.0,
                  "expected_parameter_count": 93,
                  "expected_column_count": 95,
                  "required_primary_present": True,
                  "sample_weights_ok": True,
                  "sample_loglike_ok": True,
                  "sample_primary_values_ok": True,
                  "future_CAMB_run_blocked": True,
                  "CAMB_run": False,
                  "weighted_mean_vector_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_97_larger_sample_weighted_covariance_mechanics_probe": {
                  "readiness_label": "larger_sample_weighted_covariance_mechanics_probe_passed_ready_for_bounded_reference_uncertainty_scaling_plan",
                  "accepted_sample_count": 64,
                  "effective_sample_size": 42.30241187384045,
                  "weighted_mean_vector_computed": True,
                  "weighted_covariance_matrix_computed": True,
                  "fsigma8_covariance_matrix_computed": True,
                  "full_covariance_rank": 6,
                  "fsigma8_covariance_rank": 4,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_96_2_chunked_larger_sample_solver_probe_retry": {
                  "readiness_label": "chunked_larger_sample_solver_probe_retry_passed_ready_for_larger_sample_weighted_covariance_mechanics_probe",
                  "sample_output_vector_count": 64,
                  "solver_record_count": 64,
                  "chunk_solver_record_count": 4,
                  "all_chunks_complete": True,
                  "all_output_vectors_complete": True,
                  "all_weights_preserved": True,
                  "all_orientations_reversed": True,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          SELECTED_ROOT = "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE"
          PARAMNAMES_MEMBER = SELECTED_ROOT + ".paramnames"
          CHAIN_SAMPLE_MEMBER_1 = SELECTED_ROOT + "_1.txt"

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015"},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038"},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051"},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061"},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233"}
          ]

          OUTPUT_VECTOR_SCHEMA = [
              {"position": 0, "quantity": "sigma8z", "z": 0.15, "target_name": "sigma8z015"},
              {"position": 1, "quantity": "fsigma8", "z": 0.15, "target_name": "fsigma8z015"},
              {"position": 2, "quantity": "sigma8z", "z": 0.38, "target_name": "sigma8z038"},
              {"position": 3, "quantity": "fsigma8", "z": 0.38, "target_name": "fsigma8z038"},
              {"position": 4, "quantity": "sigma8z", "z": 0.51, "target_name": "sigma8z051"},
              {"position": 5, "quantity": "fsigma8", "z": 0.51, "target_name": "fsigma8z051"},
              {"position": 6, "quantity": "sigma8z", "z": 0.61, "target_name": "sigma8z061"},
              {"position": 7, "quantity": "fsigma8", "z": 0.61, "target_name": "fsigma8z061"},
              {"position": 8, "quantity": "sigma8z", "z": 2.33, "target_name": "sigma8z233"},
              {"position": 9, "quantity": "fsigma8", "z": 2.33, "target_name": "fsigma8z233"}
          ]

          LARGER_SOLVER_BATCH_PLAN = {
              "plan_status": "design_only_not_run",
              "selected_root": SELECTED_ROOT,
              "parser_source_member": CHAIN_SAMPLE_MEMBER_1,
              "target_valid_rows_to_reparse_in_solver_probe": 256,
              "minimum_valid_rows_to_reparse_in_solver_probe": 128,
              "solver_sample_target_if_available": 256,
              "chunk_size": 16,
              "chunk_count": 16,
              "max_solver_samples_next_probe": 256,
              "expected_output_vector_dimension": 10,
              "expected_vector_component_records": 2560,
              "locked_output_orientation": "reversed_raw_order",
              "raw_CAMB_arrays_must_be_reversed": True,
              "fresh_python_runner_required": True,
              "install_dependencies_in_runner": ["numpy", "scipy", "sympy", "packaging", "camb"],
              "run_CAMB_now": False,
              "compute_weighted_mean_now": False,
              "compute_covariance_now": False,
              "compute_reference_uncertainty_now": False,
              "compute_final_pressure_now": False
          }

          CHUNK_PLAN = []
          for chunk_id in range(1, LARGER_SOLVER_BATCH_PLAN["chunk_count"] + 1):
              start_sample = (chunk_id - 1) * LARGER_SOLVER_BATCH_PLAN["chunk_size"] + 1
              end_sample = chunk_id * LARGER_SOLVER_BATCH_PLAN["chunk_size"]
              CHUNK_PLAN.append({
                  "chunk_id": chunk_id,
                  "start_sample_number": start_sample,
                  "end_sample_number": end_sample,
                  "planned_sample_count": LARGER_SOLVER_BATCH_PLAN["chunk_size"],
                  "expected_output_vectors": LARGER_SOLVER_BATCH_PLAN["chunk_size"],
                  "expected_vector_components": LARGER_SOLVER_BATCH_PLAN["chunk_size"] * 10,
                  "run_now": False
              })

          PARSE_PLUS_SOLVE_ROUTE = [
              {
                  "step": 1,
                  "action": "Repeat the bounded parser from v4.99.1 inside the next solver workflow.",
                  "output": "256 valid weighted sample packets, if the same bounded prefix remains available.",
                  "boundary": "No full zip download and no full chain import."
              },
              {
                  "step": 2,
                  "action": "Validate sample weights, loglike proxy, and six primary CAMB inputs.",
                  "output": "Per-sample validation table.",
                  "boundary": "Do not silently accept malformed rows."
              },
              {
                  "step": 3,
                  "action": "Install CAMB dependencies and launch a fresh external Python runner.",
                  "output": "Dependency and runner-status records.",
                  "boundary": "Avoid the package visibility problem found earlier."
              },
              {
                  "step": 4,
                  "action": "Run CAMB in 16 chunks of 16 samples.",
                  "output": "Per-chunk solver records and per-sample sigma8/fsigma8 arrays.",
                  "boundary": "Bounded 256-sample probe only."
              },
              {
                  "step": 5,
                  "action": "Reverse raw CAMB arrays using the locked orientation and build 10-dimensional target vectors.",
                  "output": "256 target vectors and 2560 vector-component records.",
                  "boundary": "No covariance in the solver probe."
              },
              {
                  "step": 6,
                  "action": "Preserve sample weights beside output vectors for later mechanics covariance.",
                  "output": "Weighted vector packets.",
                  "boundary": "Do not compute final Planck reference uncertainty."
              }
          ]

          QUALITY_GATES_FOR_NEXT_PROBE = [
              {
                  "gate_id": "reparse_target_or_minimum",
                  "requirement": "Target 256 valid sample packets; allow probe pass only if at least 128 valid packets are recovered.",
                  "failure_action": "Repair parser/range window before solver run."
              },
              {
                  "gate_id": "all_solver_chunks_complete",
                  "requirement": "Every planned chunk must complete or produce an explicit failure record.",
                  "failure_action": "Do not advance to covariance mechanics."
              },
              {
                  "gate_id": "all_output_vectors_complete",
                  "requirement": "Every solved sample must produce a 10-value finite positive target vector.",
                  "failure_action": "Inspect CAMB output and orientation."
              },
              {
                  "gate_id": "weights_preserved",
                  "requirement": "All sample weights must remain paired with their vectors.",
                  "failure_action": "Do not compute weighted covariance."
              },
              {
                  "gate_id": "orientation_preserved",
                  "requirement": "Every sample must apply reversed_raw_order before vector construction.",
                  "failure_action": "Reject output vectors."
              },
              {
                  "gate_id": "no_covariance_in_solver_probe",
                  "requirement": "The next solver workflow may compute output vectors only.",
                  "failure_action": "Split covariance into the following mechanics probe."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A weighted covariance matrix was computed in v4.100.",
              "A weighted posterior mean vector was computed in v4.100.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The larger bounded solver batch design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The 256-sample parser output is the same as full Planck reference uncertainty.",
              "The 256-sample solver batch has already been run.",
              "A 256-sample covariance diagnostic is enough for final RSD pressure.",
              "Formula planning output is already posterior covariance."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_101_larger_bounded_parse_plus_solver_probe",
                  "purpose": "Reparse the 256 bounded sample packets and run CAMB in 16 chunks of 16, producing one 10-dimensional vector per sample.",
                  "why_next": "v4.99.1 proved the 256 parser route; v4.100 locks how to run the solver batch without embedding a large sample table."
              },
              {
                  "priority": 2,
                  "route_id": "v4_102_larger_bounded_weighted_covariance_mechanics_probe",
                  "purpose": "Compute the weighted mean/covariance mechanics diagnostic from the 256-sample output vectors after the solver probe.",
                  "why_next": "Covariance should only happen after output vectors exist."
              },
              {
                  "priority": 3,
                  "route_id": "v4_103_reference_uncertainty_adequacy_audit",
                  "purpose": "Audit rank, effective sample size, stability, and whether more samples/files are required before any reference-uncertainty claim.",
                  "why_next": "A larger diagnostic still may not equal final Planck reference uncertainty."
              },
              {
                  "priority": 4,
                  "route_id": "v4_104_growth_lane_integration_boundary",
                  "purpose": "Define what additional conditions must be met before RSD observed covariance can be combined with reference covariance.",
                  "why_next": "Final pressure requires both observed and reference covariance plus combination rules."
              }
          ]

          failed_gates = []
          warnings = [
              "solver_batch_design_only",
              "no_CAMB_run",
              "no_weighted_mean",
              "no_covariance_computation",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation",
              "next_solver_probe_should_reparse_256_rows_to_avoid_embedding_large_yaml_tables"
          ]

          # Derived checks
          expected_chunk_count = math.ceil(
              LARGER_SOLVER_BATCH_PLAN["solver_sample_target_if_available"]
              / LARGER_SOLVER_BATCH_PLAN["chunk_size"]
          )
          expected_components = (
              LARGER_SOLVER_BATCH_PLAN["solver_sample_target_if_available"]
              * LARGER_SOLVER_BATCH_PLAN["expected_output_vector_dimension"]
          )

          output_positions = {row["position"] for row in OUTPUT_VECTOR_SCHEMA}
          fsigma8_positions = [row["position"] for row in OUTPUT_VECTOR_SCHEMA if row["quantity"] == "fsigma8"]
          sigma8_positions = [row["position"] for row in OUTPUT_VECTOR_SCHEMA if row["quantity"] == "sigma8z"]

          if UPSTREAM_LOCKS["v4_99_1_larger_bounded_sample_parser_probe_claim_guard_repair"]["valid_sample_row_count"] != 256:
              failed_gates.append("upstream_valid_sample_row_count_not_256")

          if UPSTREAM_LOCKS["v4_99_1_larger_bounded_sample_parser_probe_claim_guard_repair"]["future_CAMB_run_blocked"] is not True:
              failed_gates.append("upstream_future_CAMB_block_not_carried")

          if UPSTREAM_LOCKS["v4_99_1_larger_bounded_sample_parser_probe_claim_guard_repair"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          if LARGER_SOLVER_BATCH_PLAN["target_valid_rows_to_reparse_in_solver_probe"] != 256:
              failed_gates.append("target_valid_rows_not_256")

          if LARGER_SOLVER_BATCH_PLAN["minimum_valid_rows_to_reparse_in_solver_probe"] != 128:
              failed_gates.append("minimum_valid_rows_not_128")

          if LARGER_SOLVER_BATCH_PLAN["chunk_size"] != 16:
              failed_gates.append("chunk_size_not_16")

          if LARGER_SOLVER_BATCH_PLAN["chunk_count"] != expected_chunk_count:
              failed_gates.append("chunk_count_not_expected")

          if len(CHUNK_PLAN) != 16:
              failed_gates.append("chunk_plan_count_not_16")

          if any(row["planned_sample_count"] != 16 for row in CHUNK_PLAN):
              failed_gates.append("chunk_plan_not_uniform_16")

          if LARGER_SOLVER_BATCH_PLAN["expected_output_vector_dimension"] != 10:
              failed_gates.append("output_vector_dimension_not_10")

          if LARGER_SOLVER_BATCH_PLAN["expected_vector_component_records"] != expected_components:
              failed_gates.append("expected_vector_component_count_mismatch")

          if output_positions != set(range(10)):
              failed_gates.append("output_vector_positions_not_0_to_9")

          if sigma8_positions != [0, 2, 4, 6, 8]:
              failed_gates.append("sigma8_positions_not_locked")

          if fsigma8_positions != [1, 3, 5, 7, 9]:
              failed_gates.append("fsigma8_positions_not_locked")

          if LARGER_SOLVER_BATCH_PLAN["locked_output_orientation"] != "reversed_raw_order":
              failed_gates.append("locked_orientation_not_reversed_raw_order")

          if not LARGER_SOLVER_BATCH_PLAN["fresh_python_runner_required"]:
              failed_gates.append("fresh_python_runner_not_required")

          if LARGER_SOLVER_BATCH_PLAN["run_CAMB_now"] is not False:
              failed_gates.append("CAMB_run_marked_allowed_too_early")

          if LARGER_SOLVER_BATCH_PLAN["compute_weighted_mean_now"] is not False:
              failed_gates.append("weighted_mean_marked_computed_too_early")

          if LARGER_SOLVER_BATCH_PLAN["compute_covariance_now"] is not False:
              failed_gates.append("covariance_marked_computed_too_early")

          if LARGER_SOLVER_BATCH_PLAN["compute_reference_uncertainty_now"] is not False:
              failed_gates.append("reference_uncertainty_marked_computed_too_early")

          if len(PARSE_PLUS_SOLVE_ROUTE) < 6:
              failed_gates.append("parse_plus_solve_route_incomplete")

          if len(QUALITY_GATES_FOR_NEXT_PROBE) < 6:
              failed_gates.append("quality_gates_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "weighted covariance matrix was computed in v4.100",
              "weighted posterior mean vector was computed in v4.100",
              "final rsd pressure score",
              "validates tairid cosmology",
              "256-sample solver batch has already been run",
              "256-sample covariance diagnostic is enough for final rsd pressure",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "larger_bounded_solver_batch_design_passed_ready_for_larger_bounded_parse_plus_solver_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_256_parser_pass_carried",
                  "pass": UPSTREAM_LOCKS["v4_99_1_larger_bounded_sample_parser_probe_claim_guard_repair"]["valid_sample_row_count"] == 256,
                  "result": "v4.99.1 parsed 256 valid sample packets",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "reference_boundary_preserved",
                  "pass": UPSTREAM_LOCKS["v4_99_1_larger_bounded_sample_parser_probe_claim_guard_repair"]["Planck_reference_uncertainty_computed"] is False,
                  "result": "Planck reference uncertainty remains uncomputed",
                  "boundary": "No final reference claim."
              },
              {
                  "rule_id": "solver_batch_size_locked",
                  "pass": LARGER_SOLVER_BATCH_PLAN["solver_sample_target_if_available"] == 256 and LARGER_SOLVER_BATCH_PLAN["minimum_valid_rows_to_reparse_in_solver_probe"] == 128,
                  "result": "target 256 samples, minimum 128 samples",
                  "boundary": "Bounded solver design only."
              },
              {
                  "rule_id": "chunk_plan_locked",
                  "pass": len(CHUNK_PLAN) == 16 and all(row["planned_sample_count"] == 16 for row in CHUNK_PLAN),
                  "result": "16 chunks of 16 samples each",
                  "boundary": "No CAMB run."
              },
              {
                  "rule_id": "output_vector_schema_locked",
                  "pass": output_positions == set(range(10)) and fsigma8_positions == [1, 3, 5, 7, 9],
                  "result": "10-dimensional interleaved sigma8z/fsigma8 vector with fsigma8 at positions 1,3,5,7,9",
                  "boundary": "No vector values computed."
              },
              {
                  "rule_id": "orientation_lock_preserved",
                  "pass": LARGER_SOLVER_BATCH_PLAN["locked_output_orientation"] == "reversed_raw_order",
                  "result": "raw CAMB arrays must be reversed before vectorization",
                  "boundary": "Orientation application only."
              },
              {
                  "rule_id": "parse_plus_solve_route_declared",
                  "pass": len(PARSE_PLUS_SOLVE_ROUTE) >= 6,
                  "result": f"{len(PARSE_PLUS_SOLVE_ROUTE)} route steps declared",
                  "boundary": "Next workflow route only."
              },
              {
                  "rule_id": "quality_gates_declared",
                  "pass": len(QUALITY_GATES_FOR_NEXT_PROBE) >= 6,
                  "result": f"{len(QUALITY_GATES_FOR_NEXT_PROBE)} quality gates declared",
                  "boundary": "No solver output yet."
              },
              {
                  "rule_id": "CAMB_run_still_blocked",
                  "pass": LARGER_SOLVER_BATCH_PLAN["run_CAMB_now"] is False,
                  "result": "CAMB run reserved for v4.101",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "mean_covariance_still_blocked",
                  "pass": LARGER_SOLVER_BATCH_PLAN["compute_weighted_mean_now"] is False and LARGER_SOLVER_BATCH_PLAN["compute_covariance_now"] is False,
                  "result": "weighted mean and covariance not computed",
                  "boundary": "No reference uncertainty."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 16,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_100_rules_passed")

          if failed_gates:
              readiness_label = "larger_bounded_solver_batch_design_failed"
              next_allowed_step = "Repair the 256-sample solver batch design before running any larger CAMB solver probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.101 larger bounded parse-plus-solver probe. "
                  "Do not compute weighted covariance, Planck reference uncertainty, final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_valid_sample_row_count": UPSTREAM_LOCKS["v4_99_1_larger_bounded_sample_parser_probe_claim_guard_repair"]["valid_sample_row_count"],
              "upstream_effective_sample_size_preview": UPSTREAM_LOCKS["v4_99_1_larger_bounded_sample_parser_probe_claim_guard_repair"]["effective_sample_size_preview"],
              "solver_batch_target_samples": LARGER_SOLVER_BATCH_PLAN["solver_sample_target_if_available"],
              "solver_batch_minimum_samples": LARGER_SOLVER_BATCH_PLAN["minimum_valid_rows_to_reparse_in_solver_probe"],
              "chunk_size": LARGER_SOLVER_BATCH_PLAN["chunk_size"],
              "chunk_count": LARGER_SOLVER_BATCH_PLAN["chunk_count"],
              "chunk_plan_count": len(CHUNK_PLAN),
              "expected_output_vector_dimension": LARGER_SOLVER_BATCH_PLAN["expected_output_vector_dimension"],
              "expected_vector_component_records": LARGER_SOLVER_BATCH_PLAN["expected_vector_component_records"],
              "locked_output_orientation": LARGER_SOLVER_BATCH_PLAN["locked_output_orientation"],
              "fresh_python_runner_required": LARGER_SOLVER_BATCH_PLAN["fresh_python_runner_required"],
              "route_step_count": len(PARSE_PLUS_SOLVE_ROUTE),
              "quality_gate_count": len(QUALITY_GATES_FOR_NEXT_PROBE),
              "CAMB_run": False,
              "sample_output_vectors_computed": False,
              "weighted_mean_vector_computed": False,
              "weighted_covariance_matrix_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "selected_root": SELECTED_ROOT,
              "selected_members": {
                  "paramnames_member": PARAMNAMES_MEMBER,
                  "chain_sample_member_1": CHAIN_SAMPLE_MEMBER_1
              },
              "target_redshifts": TARGET_REDSHIFTS,
              "output_vector_schema": OUTPUT_VECTOR_SCHEMA,
              "larger_solver_batch_plan": LARGER_SOLVER_BATCH_PLAN,
              "chunk_plan": CHUNK_PLAN,
              "parse_plus_solve_route": PARSE_PLUS_SOLVE_ROUTE,
              "quality_gates_for_next_probe": QUALITY_GATES_FOR_NEXT_PROBE,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "CAMB_run": False,
                  "sample_output_vectors_computed": False,
                  "weighted_mean_vector_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_100_larger_bounded_solver_batch_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "chunk_plan_v4_100.csv",
              CHUNK_PLAN,
              [
                  "chunk_id",
                  "start_sample_number",
                  "end_sample_number",
                  "planned_sample_count",
                  "expected_output_vectors",
                  "expected_vector_components",
                  "run_now"
              ]
          )

          write_csv(
              OUTDIR / "output_vector_schema_v4_100.csv",
              OUTPUT_VECTOR_SCHEMA,
              ["position", "quantity", "z", "target_name"]
          )

          write_csv(
              OUTDIR / "parse_plus_solve_route_v4_100.csv",
              PARSE_PLUS_SOLVE_ROUTE,
              ["step", "action", "output", "boundary"]
          )

          write_csv(
              OUTDIR / "quality_gates_for_next_probe_v4_100.csv",
              QUALITY_GATES_FOR_NEXT_PROBE,
              ["gate_id", "requirement", "failure_action"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_100.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_100.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_100.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.100 — Larger Bounded Solver Batch Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.99.1 proved the bounded parser can produce 256 valid weighted Planck sample packets. v4.100 does not run CAMB. It locks the next solver route: reparse the bounded 256-sample packet set and run CAMB in 16 chunks of 16 samples.")
          md.append("")
          md.append("The next solver workflow should produce 256 ten-dimensional sigma8z/fsigma8 target vectors, but it should not compute covariance, Planck reference uncertainty, final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## Larger solver batch plan")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in LARGER_SOLVER_BATCH_PLAN.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Chunk plan")
          md.append("")
          md.append("| Chunk | Start sample | End sample | Count |")
          md.append("|---:|---:|---:|---:|")
          for row in CHUNK_PLAN:
              md.append(f"| `{row['chunk_id']}` | `{row['start_sample_number']}` | `{row['end_sample_number']}` | `{row['planned_sample_count']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_100_larger_bounded_solver_batch_design.json",
              "tairid_v4_100_larger_bounded_solver_batch_design.md",
              "chunk_plan_v4_100.csv",
              "output_vector_schema_v4_100.csv",
              "parse_plus_solve_route_v4_100.csv",
              "quality_gates_for_next_probe_v4_100.csv",
              "blocked_claims_v4_100.csv",
              "next_route_options_v4_100.csv",
              "rule_results_v4_100.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_100_larger_bounded_solver_batch_design.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

