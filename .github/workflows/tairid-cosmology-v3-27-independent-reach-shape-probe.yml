              },
              {
                  "source": "SDSS_eBOSS_DR16",
                  "lane": "pre_DESI_bao_likelihoods",
                  "surface": "reach_geometry",
                  "expected_role": "eboss_dr16_qso_bao_cov",
                  "url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR16_QSO_BAO_DMDH_covtot.txt"
              },
              {
                  "source": "SDSS_eBOSS_DR16",
                  "lane": "pre_DESI_bao_likelihoods",
                  "surface": "reach_geometry",
