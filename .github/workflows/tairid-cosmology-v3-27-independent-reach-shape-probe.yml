              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a cosmological model.",
              "This does not run a two-surface refit.",
              "This is a targeted shape probe for independent non-DESI reach/geometry products.",
              "DESI is intentionally excluded because v3.25 already showed the mapped DESI reach rows are scaled counterparts.",
              "Passing a shape probe does not make a product a model anchor.",
              "A pass only means one or more independent reach lanes are ready for targeted ingestion.",
              "No diagnostic-only row may be promoted to a model claim."
