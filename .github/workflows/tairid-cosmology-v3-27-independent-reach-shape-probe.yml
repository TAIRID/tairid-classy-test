name: TAIRID Cosmology v3.27 Independent Reach Shape Probe

on:
  workflow_dispatch:

jobs:
  independent-reach-shape-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v3.27 independent reach shape probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_27

          python - <<'PY'
