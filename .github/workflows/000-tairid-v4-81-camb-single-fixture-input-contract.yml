name: 000 TAIRID v4.81 CAMB Single Fixture Input Contract

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-81-camb-single-fixture-input-contract.yml"

jobs:
  tairid-v4-81-camb-single-fixture-input-contract:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.81 CAMB single fixture input contract
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_81_camb_single_fixture_input_contract

          python - <<'PY'
          import csv
          import json
          import importlib.util
          import inspect
          import math
          import platform
          import subprocess
          import sys
          import time
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_81_camb_single_fixture_input_contract")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_81_camb_single_fixture_input_contract"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This may install/import CAMB and inspect input signatures only.",
              "This does not run CAMB cosmological calculations.",
              "This does not derive H0, Omega_m, sigma8, sigma8z, or fsigma8z.",
              "This locks the future single-fixture input contract before any CAMB fixture run.",
              "A pass means the fixture input contract is bounded and ready for value extraction or tiny fixture preparation, not that reference uncertainty is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_80_camb_smoke_fixture_contract": {
                  "readiness_label": "CAMB_smoke_fixture_contract_passed_ready_for_single_fixture_input_contract",
                  "camb_install_ok": True,
                  "camb_import_ok": True,
                  "camb_version": "1.6.6",
                  "required_api_available": True,
                  "solver_cosmology_run": False,
                  "H0_derived": False,
                  "Omega_m_derived": False,
                  "sigma8_derived": False,
                  "fsigma8_derived": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_66_chain_row_shape": {
                  "selected_roots": 12,
                  "row_shape_pass": 12,
                  "primary_tracked_values_available": 12,
                  "tracked_columns": "omegabh2, omegach2, theta, tau, logA, ns",
                  "full_chains_imported": False,
                  "reference_uncertainty_computed": False
              },
              "v4_63_sidecar_fixture_contract": {
                  "calculator_pairs_checked": 110,
                  "calculator_pairs_passed": 110,
                  "sidecars_are_fixtures_not_covariance": True,
                  "reference_uncertainty_computed": False
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          FUTURE_SINGLE_FIXTURE_INPUT_CONTRACT = [
              {
                  "input_name": "omegabh2",
                  "source_status": "confirmed_primary_chain_column_from_prior_prefix_probe",
                  "future_camb_mapping": "CAMBparams.set_cosmology(ombh2=...)",
                  "transform_required": False,
                  "value_extracted_now": False,
                  "ready_for_fixture_run_now": False,
                  "guard": "Do not run until exact fixture root/value is extracted."
              },
              {
                  "input_name": "omegach2",
                  "source_status": "confirmed_primary_chain_column_from_prior_prefix_probe",
                  "future_camb_mapping": "CAMBparams.set_cosmology(omch2=...)",
                  "transform_required": False,
                  "value_extracted_now": False,
                  "ready_for_fixture_run_now": False,
                  "guard": "Do not run until exact fixture root/value is extracted."
              },
              {
                  "input_name": "theta",
                  "source_status": "confirmed_primary_chain_column_but_unit_scaling_must_be_verified",
                  "future_camb_mapping": "prefer cosmomc_theta/thetastar route if paramnames label and units confirm it; otherwise solve H0 outside this step",
                  "transform_required": True,
                  "value_extracted_now": False,
                  "ready_for_fixture_run_now": False,
                  "guard": "Do not fake H0 from theta. Verify whether theta is theta_MC, 100theta_MC, cosmomc_theta, or another scaled value."
              },
              {
                  "input_name": "tau",
                  "source_status": "confirmed_primary_chain_column_from_prior_prefix_probe",
                  "future_camb_mapping": "CAMBparams.set_cosmology(tau=...)",
                  "transform_required": False,
                  "value_extracted_now": False,
                  "ready_for_fixture_run_now": False,
                  "guard": "Do not run until exact fixture root/value is extracted."
              },
              {
                  "input_name": "logA",
                  "source_status": "confirmed_primary_chain_column_but_As_conversion_must_be_verified",
                  "future_camb_mapping": "InitPower.set_params(As=exp(logA)/1e10, ns=...) only if logA means log(10^10 A_s)",
                  "transform_required": True,
                  "value_extracted_now": False,
                  "ready_for_fixture_run_now": False,
                  "guard": "Do not fake sigma8 from logA. logA only maps to primordial As after definition is verified."
              },
              {
                  "input_name": "ns",
                  "source_status": "confirmed_primary_chain_column_from_prior_prefix_probe",
                  "future_camb_mapping": "InitPower.set_params(ns=...)",
                  "transform_required": False,
                  "value_extracted_now": False,
                  "ready_for_fixture_run_now": False,
                  "guard": "Do not run until exact fixture root/value is extracted."
              }
          ]

          FIXTURE_OUTPUT_CONTRACT = [
              {
                  "output_name": "sigma8z015",
                  "z": 0.15,
                  "future_role": "sidecar point fixture comparison only",
                  "computed_now": False,
                  "covariance_now": False
              },
              {
                  "output_name": "fsigma8z015",
                  "z": 0.15,
                  "future_role": "sidecar point fixture comparison only",
                  "computed_now": False,
                  "covariance_now": False
              },
              {
                  "output_name": "sigma8z038",
                  "z": 0.38,
                  "future_role": "sidecar point fixture comparison only",
                  "computed_now": False,
                  "covariance_now": False
              },
              {
                  "output_name": "fsigma8z038",
                  "z": 0.38,
                  "future_role": "sidecar point fixture comparison only",
                  "computed_now": False,
                  "covariance_now": False
              },
              {
                  "output_name": "sigma8z051",
                  "z": 0.51,
                  "future_role": "sidecar point fixture comparison only",
                  "computed_now": False,
                  "covariance_now": False
              },
              {
                  "output_name": "fsigma8z051",
                  "z": 0.51,
                  "future_role": "sidecar point fixture comparison only",
                  "computed_now": False,
                  "covariance_now": False
              },
              {
                  "output_name": "sigma8z061",
                  "z": 0.61,
                  "future_role": "sidecar point fixture comparison only",
                  "computed_now": False,
                  "covariance_now": False
              },
              {
                  "output_name": "fsigma8z061",
                  "z": 0.61,
                  "future_role": "sidecar point fixture comparison only",
                  "computed_now": False,
                  "covariance_now": False
              },
              {
                  "output_name": "sigma8z233",
                  "z": 2.33,
                  "future_role": "sidecar point fixture comparison only",
                  "computed_now": False,
                  "covariance_now": False
              },
              {
                  "output_name": "fsigma8z233",
                  "z": 2.33,
                  "future_role": "sidecar point fixture comparison only",
                  "computed_now": False,
                  "covariance_now": False
              }
          ]

          PRE_RUN_GATES_FOR_TINY_FIXTURE = [
              {
                  "gate_id": "single_root_selected",
                  "current_pass": False,
                  "needed_next": "Choose one Planck root/member pair from prior manifest/sidecar results."
              },
              {
                  "gate_id": "paramnames_label_verified",
                  "current_pass": False,
                  "needed_next": "Verify theta and logA labels from the exact .paramnames file."
              },
              {
                  "gate_id": "single_chain_row_or_minimum_values_extracted",
                  "current_pass": False,
                  "needed_next": "Extract exact primary input values for one fixture root."
              },
              {
                  "gate_id": "sidecar_target_values_extracted",
                  "current_pass": False,
                  "needed_next": "Extract exact sigma8z/fsigma8z sidecar fixture outputs for the same root."
              },
              {
                  "gate_id": "theta_scaling_contract_locked",
                  "current_pass": False,
                  "needed_next": "Lock whether theta maps to cosmomc_theta, thetastar, 100theta, or requires H0 solving."
              },
              {
                  "gate_id": "logA_to_As_contract_locked",
                  "current_pass": False,
                  "needed_next": "Lock As = exp(logA)/1e10 only after label definition is confirmed."
              },
              {
                  "gate_id": "CAMB_api_available",
                  "current_pass": True,
                  "needed_next": "Already checked by v4.80 and rechecked here."
              }
          ]

          BLOCKED_SHORTCUTS = [
              {"shortcut": "run_CAMB_before_fixture_values", "status": "blocked", "reason": "No exact root/value pair is selected in this contract step."},
              {"shortcut": "theta_to_H0_without_scaling_check", "status": "blocked", "reason": "Theta label/unit scaling must be verified first."},
              {"shortcut": "logA_to_sigma8_directly", "status": "blocked", "reason": "logA is not sigma8; it only helps set primordial As after definition is confirmed."},
              {"shortcut": "sidecar_minimum_as_covariance", "status": "blocked", "reason": "Sidecar values are point fixtures only."},
              {"shortcut": "single_fixture_pass_equals_reference_uncertainty", "status": "blocked", "reason": "Even a later fixture pass would not be posterior covariance."}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "CAMB was used to compute fsigma8.",
              "CAMB produced cosmology outputs.",
              "A CAMB fixture was run.",
              "H0 was derived.",
              "Omega_m was derived.",
              "sigma8 was derived.",
              "fsigma8 was derived.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_82_single_fixture_value_extraction",
                  "purpose": "Extract one exact root's primary inputs, paramnames labels, and sidecar fixture outputs without running CAMB.",
                  "why_next": "The input contract is ready, but exact values and labels must be extracted before a tiny fixture run."
              },
              {
                  "priority": 2,
                  "route_id": "v4_83_CAMB_tiny_single_fixture_run",
                  "purpose": "Run one tiny CAMB fixture only after v4.82 verifies exact inputs and sidecar targets.",
                  "why_next": "Fixture run must come after value extraction and label verification."
              },
              {
                  "priority": 3,
                  "route_id": "v4_82_ELG_grid_member_probe",
                  "purpose": "Parallel route: continue the parked ELG grid backlog.",
                  "why_next": "Full eBOSS remains incomplete without ELG handling."
              },
              {
                  "priority": 4,
                  "route_id": "v4_82_WiggleZ_product_locator_followup",
                  "purpose": "Parallel route: continue the parked WiggleZ product-mapping backlog.",
                  "why_next": "WiggleZ remains unresolved."
              }
          ]

          failed_gates = []
          warnings = [
              "single_fixture_input_contract_only",
              "no_solver_cosmology_run",
              "no_fixture_run",
              "no_derived_cosmology_outputs",
              "no_full_chain_import",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def tail_text(value, limit=1200):
              if value is None:
                  return ""
              value = str(value)
              return value[-limit:]

          def install_and_import_camb():
              target = Path("/tmp/tairid_v4_81_camb_target")
              target.mkdir(parents=True, exist_ok=True)

              record = {
                  "package": "camb",
                  "preinstalled": False,
                  "install_attempted": False,
                  "install_ok": False,
                  "import_ok": False,
                  "version": "",
                  "timeout_seconds": 180,
                  "returncode": "",
                  "elapsed_seconds": "",
                  "stdout_tail": "",
                  "stderr_tail": "",
                  "error": ""
              }

              if importlib.util.find_spec("camb") is not None:
                  record["preinstalled"] = True
                  try:
                      import camb
                      record["import_ok"] = True
                      record["version"] = getattr(camb, "__version__", "")
                      return record, camb
                  except Exception as exc:
                      record["error"] = f"{type(exc).__name__}: {exc}"
                      return record, None

              record["install_attempted"] = True
              cmd = [
                  sys.executable,
                  "-m",
                  "pip",
                  "install",
                  "--disable-pip-version-check",
                  "--no-input",
                  "--target",
                  str(target),
                  "camb"
              ]

              start = time.time()
              try:
                  proc = subprocess.run(
                      cmd,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      text=True,
                      timeout=record["timeout_seconds"]
                  )
                  record["elapsed_seconds"] = round(time.time() - start, 3)
                  record["returncode"] = proc.returncode
                  record["stdout_tail"] = tail_text(proc.stdout)
                  record["stderr_tail"] = tail_text(proc.stderr)
                  record["install_ok"] = proc.returncode == 0

                  if record["install_ok"]:
                      sys.path.insert(0, str(target))
                      import camb
                      record["import_ok"] = True
                      record["version"] = getattr(camb, "__version__", "")
                      return record, camb

              except subprocess.TimeoutExpired as exc:
                  record["elapsed_seconds"] = round(time.time() - start, 3)
                  record["error"] = f"TimeoutExpired after {record['timeout_seconds']} seconds"
                  record["stdout_tail"] = tail_text(getattr(exc, "stdout", ""))
                  record["stderr_tail"] = tail_text(getattr(exc, "stderr", ""))

              except Exception as exc:
                  record["elapsed_seconds"] = round(time.time() - start, 3)
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record, None

          camb_record, camb_module = install_and_import_camb()

          camb_signature_records = []
          camb_import_ok = camb_record["import_ok"] is True
          params_instantiated = False
          set_cosmology_signature = ""
          initpower_signature = ""
          set_cosmology_has_ombh2 = False
          set_cosmology_has_omch2 = False
          set_cosmology_has_tau = False
          set_cosmology_has_H0 = False
          set_cosmology_has_cosmomc_theta = False
          set_cosmology_has_thetastar = False
          initpower_has_As = False
          initpower_has_ns = False

          if camb_module is not None:
              try:
                  params = camb_module.CAMBparams()
                  params_instantiated = True

                  if hasattr(params, "set_cosmology"):
                      sig = inspect.signature(params.set_cosmology)
                      set_cosmology_signature = str(sig)
                      names = set(sig.parameters.keys())
                      set_cosmology_has_ombh2 = "ombh2" in names
                      set_cosmology_has_omch2 = "omch2" in names
                      set_cosmology_has_tau = "tau" in names
                      set_cosmology_has_H0 = "H0" in names
                      set_cosmology_has_cosmomc_theta = "cosmomc_theta" in names
                      set_cosmology_has_thetastar = "thetastar" in names

                      camb_signature_records.append({
                          "signature_id": "CAMBparams.set_cosmology",
                          "available": True,
                          "signature_text": set_cosmology_signature,
                          "notes": "Signature inspected only; method not called."
                      })

                  if hasattr(params, "InitPower") and hasattr(params.InitPower, "set_params"):
                      sig = inspect.signature(params.InitPower.set_params)
                      initpower_signature = str(sig)
                      names = set(sig.parameters.keys())
                      initpower_has_As = "As" in names
                      initpower_has_ns = "ns" in names

                      camb_signature_records.append({
                          "signature_id": "CAMBparams.InitPower.set_params",
                          "available": True,
                          "signature_text": initpower_signature,
                          "notes": "Signature inspected only; method not called."
                      })

              except Exception as exc:
                  camb_signature_records.append({
                      "signature_id": "inspection_error",
                      "available": False,
                      "signature_text": "",
                      "notes": f"{type(exc).__name__}: {exc}"
                  })

          h0_or_theta_route_available = set_cosmology_has_H0 or set_cosmology_has_cosmomc_theta or set_cosmology_has_thetastar
          primary_density_api_available = set_cosmology_has_ombh2 and set_cosmology_has_omch2
          initpower_api_available = initpower_has_As and initpower_has_ns
          required_contract_api_available = camb_import_ok and params_instantiated and primary_density_api_available and h0_or_theta_route_available and initpower_api_available

          input_contract_record = {
              "camb_import_ok": camb_import_ok,
              "params_instantiated": params_instantiated,
              "primary_density_api_available": primary_density_api_available,
              "h0_or_theta_route_available": h0_or_theta_route_available,
              "set_cosmology_has_H0": set_cosmology_has_H0,
              "set_cosmology_has_cosmomc_theta": set_cosmology_has_cosmomc_theta,
              "set_cosmology_has_thetastar": set_cosmology_has_thetastar,
              "set_cosmology_has_tau": set_cosmology_has_tau,
              "initpower_api_available": initpower_api_available,
              "initpower_has_As": initpower_has_As,
              "initpower_has_ns": initpower_has_ns,
              "required_contract_api_available": required_contract_api_available,
              "fixture_values_extracted": False,
              "fixture_run_allowed_now": False,
              "reference_uncertainty_computed": False
          }

          if UPSTREAM_LOCKS["v4_80_camb_smoke_fixture_contract"]["camb_import_ok"] is not True:
              failed_gates.append("v4_80_camb_import_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_80_camb_smoke_fixture_contract"]["required_api_available"] is not True:
              failed_gates.append("v4_80_required_api_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_80_camb_smoke_fixture_contract"]["solver_cosmology_run"] is not False:
              failed_gates.append("v4_80_solver_run_boundary_not_carried")

          if not camb_import_ok:
              failed_gates.append("camb_import_failed_in_v4_81")

          if not required_contract_api_available:
              failed_gates.append("required_contract_api_not_available")

          if any(row["value_extracted_now"] is not False for row in FUTURE_SINGLE_FIXTURE_INPUT_CONTRACT):
              failed_gates.append("fixture_input_value_extracted_too_early")

          if any(row["ready_for_fixture_run_now"] is not False for row in FUTURE_SINGLE_FIXTURE_INPUT_CONTRACT):
              failed_gates.append("fixture_input_marked_ready_too_early")

          if any(row["computed_now"] is not False for row in FIXTURE_OUTPUT_CONTRACT):
              failed_gates.append("fixture_output_computed_too_early")

          if any(row["covariance_now"] is not False for row in FIXTURE_OUTPUT_CONTRACT):
              failed_gates.append("fixture_output_marked_covariance_too_early")

          if not any(row["gate_id"] == "CAMB_api_available" and row["current_pass"] is True for row in PRE_RUN_GATES_FOR_TINY_FIXTURE):
              failed_gates.append("CAMB_api_gate_missing")

          if any(row["gate_id"] != "CAMB_api_available" and row["current_pass"] is True for row in PRE_RUN_GATES_FOR_TINY_FIXTURE):
              failed_gates.append("pre_run_gate_passed_too_early")

          if any(row["status"] != "blocked" for row in BLOCKED_SHORTCUTS):
              failed_gates.append("not_all_shortcuts_blocked")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "planck reference uncertainty is computed",
              "camb was used to compute fsigma8",
              "camb produced cosmology outputs",
              "a camb fixture was run",
              "full planck chains were imported",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "CAMB_single_fixture_input_contract_passed_ready_for_single_fixture_value_extraction"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_camb_contract_carried",
                  "pass": UPSTREAM_LOCKS["v4_80_camb_smoke_fixture_contract"]["camb_import_ok"] is True,
                  "result": "v4.80 CAMB import/API route carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "camb_contract_api_available",
                  "pass": required_contract_api_available,
                  "result": f"primary_density_api={primary_density_api_available}; h0_or_theta_route={h0_or_theta_route_available}; initpower_api={initpower_api_available}",
                  "boundary": "API/signature inspection only; no solver calculation."
              },
              {
                  "rule_id": "fixture_input_contract_declared",
                  "pass": len(FUTURE_SINGLE_FIXTURE_INPUT_CONTRACT) >= 6,
                  "result": f"{len(FUTURE_SINGLE_FIXTURE_INPUT_CONTRACT)} future fixture input rows declared",
                  "boundary": "Values not extracted now."
              },
              {
                  "rule_id": "fixture_output_contract_declared",
                  "pass": len(FIXTURE_OUTPUT_CONTRACT) >= 10,
                  "result": f"{len(FIXTURE_OUTPUT_CONTRACT)} future fixture output rows declared",
                  "boundary": "Outputs not computed now."
              },
              {
                  "rule_id": "pre_run_gates_declared",
                  "pass": len(PRE_RUN_GATES_FOR_TINY_FIXTURE) >= 7,
                  "result": f"{len(PRE_RUN_GATES_FOR_TINY_FIXTURE)} pre-run gates declared",
                  "boundary": "Only CAMB API gate is currently passed."
              },
              {
                  "rule_id": "fixture_run_blocked_now",
                  "pass": input_contract_record["fixture_run_allowed_now"] is False,
                  "result": "fixture run remains blocked until exact values and labels are extracted",
                  "boundary": "No CAMB cosmology calculation."
              },
              {
                  "rule_id": "blocked_shortcuts_preserved",
                  "pass": all(row["status"] == "blocked" for row in BLOCKED_SHORTCUTS),
                  "result": f"{len(BLOCKED_SHORTCUTS)} blocked shortcuts preserved",
                  "boundary": "No fake parameter conversion."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "No fsigma8 calculation."
              },
              {
                  "rule_id": "next_route_options_declared",
                  "pass": len(NEXT_ROUTE_OPTIONS) >= 4,
                  "result": f"{len(NEXT_ROUTE_OPTIONS)} next route options declared",
                  "boundary": "Future work only."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 17,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Single fixture input contract only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_81_rules_passed")

          if failed_gates:
              readiness_label = "CAMB_single_fixture_input_contract_failed"
              next_allowed_step = "Repair CAMB single fixture input contract before value extraction or tiny fixture run."
          else:
