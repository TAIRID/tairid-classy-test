name: Run TAIRID LCDM comparison fixed

on:
  workflow_dispatch:

jobs:
  run-comparison:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran libgsl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel cython numpy scipy matplotlib
          python -m pip install classy || python -m pip install classy-community

      - name: Run TAIRID vs LCDM comparison
        run: |
          python run_tairid_lcdm_comparison_fixed.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-lcdm-comparison-fixed-output
          path: |
            *.txt
            *.csv
            *.json
            *.png
