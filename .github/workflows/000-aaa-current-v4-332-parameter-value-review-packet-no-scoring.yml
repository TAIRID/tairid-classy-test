name: "!!! AAA CURRENT - TAIRID v4.332 parameter value review packet no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-332-parameter-value-review-packet-no-scoring:
    name: "!!! AAA CURRENT - Run v4.332 parameter value review packet"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.331C input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.331C output ZIP by pattern..."
          INPUT_331C_ZIP="$(ls tairid-v4-331c-audit-and-gaps-ledger-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_331C_ZIP" ]; then
            echo "Could not find v4.331C output ZIP."
            echo "Expected a file like:"
            echo "tairid-v4-331c-audit-and-gaps-ledger-no-scoring-output.zip"
            exit 1
          fi

          echo "Using v4.331C ZIP:"
          echo "$INPUT_331C_ZIP"
          echo "INPUT_331C_ZIP=$INPUT_331C_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.332 parameter value review packet script
        run: |
          cat > run_v4_332_parameter_value_review_packet_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          TRUTH_BOUNDARY = "no observed scoring; no parameter approval; no numeric baseline approval; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def all_blank(series):
              return series.apply(clean).eq("").all()

          def main():
              input_331c = Path(os.environ["INPUT_331C_ZIP"])

              outdir = Path("tairid_v4_332_parameter_value_review_packet_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base331c = extract_zip(input_331c, "tairid_v4_332_331c_")

              summary331c_path = find_one(base331c, "v4_331c_summary.json")
              ledger330_path = find_one(base331c, "v4_330_candidate_decision_ingest_ledger_no_values_no_scoring.csv")
              open_gaps_path = find_one(base331c, "v4_331c_open_gaps_ledger.csv")
              blocked_gates_path = find_one(base331c, "v4_331c_blocked_gates_ledger.csv")
              ruled_out_path = find_one(base331c, "v4_331c_ruled_out_claims_ledger.csv")
              stage_ledger_path = find_one(base331c, "v4_331c_stage_gap_resolution_ledger.csv")

              summary331c = json.loads(summary331c_path.read_text())
              accepted_source_ledger = pd.read_csv(ledger330_path)
              open_gaps = pd.read_csv(open_gaps_path)
              blocked_gates = pd.read_csv(blocked_gates_path)
              ruled_out = pd.read_csv(ruled_out_path)
              stage_ledger = pd.read_csv(stage_ledger_path)

              review_rows = []

              for _, row in accepted_source_ledger.iterrows():
                  parameter_or_method = clean(row["parameter_or_method"])
                  question_id = clean(row["question_id"])
                  accepted_candidate_ids = clean(row["accepted_candidate_ids_for_later_value_review"])

                  if parameter_or_method in ["omega_m0", "sigma8_0", "growth_index_gamma"]:
                      review_kind = "numeric_parameter_value_review_needed_later"
                      requested_output_type = "candidate_numeric_value_plus_source_quote_later"
                  else:
                      review_kind = "method_or_policy_context_review_needed_later"
                      requested_output_type = "candidate_method_context_plus_source_quote_later"

                  review_rows.append({
                      "v4_332_review_id": f"v4_332_review_{len(review_rows) + 1:03d}",
                      "question_id": question_id,
                      "parameter_or_method": parameter_or_method,
                      "accepted_human_decision_from_v4_330": clean(row["accepted_human_decision"]),
                      "accepted_candidate_ids_for_review": accepted_candidate_ids,
                      "accepted_answer_summary_no_values_from_v4_330": clean(row["accepted_answer_summary_no_values"]),
                      "v4_332_review_kind": review_kind,
                      "requested_output_type": requested_output_type,

                      "source_quote_for_value_or_context": "",
                      "source_page_or_section": "",
                      "candidate_value_text_as_written_in_source": "",
                      "candidate_numeric_value_to_review_later": "",
                      "candidate_units_or_definition": "",
                      "candidate_uncertainty_text_if_any": "",
                      "candidate_prior_or_model_context": "",

                      "human_value_review_decision": "",
                      "allowed_human_value_review_decisions": "advance_value_candidate_to_later_baseline_review|needs_exact_quote|needs_better_source|reject_value_candidate|context_only_not_value|keep_blocked",
                      "human_reviewer_note": "",

                      "parameter_value_approved_now": False,
                      "numeric_baseline_approved_now": False,
                      "observed_values_loaded": False,
                      "definition_match_confirmed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": TRUTH_BOUNDARY,
                  })

              value_review_template = pd.DataFrame(review_rows)

              source_trace_rows = []
              for _, row in value_review_template.iterrows():
                  candidate_ids = [x for x in clean(row["accepted_candidate_ids_for_review"]).split("|") if x]
                  for cid in candidate_ids:
                      source_trace_rows.append({
                          "v4_332_review_id": row["v4_332_review_id"],
                          "question_id": row["question_id"],
                          "parameter_or_method": row["parameter_or_method"],
                          "accepted_candidate_id": cid,
                          "source_trace_status": "accepted_source_candidate_for_later_value_or_context_review",
                          "value_extracted_now": False,
                          "value_approved_now": False,
                          "baseline_approved_now": False,
                          "observed_scoring_allowed": False,
                          "support_allowed": False,
                      })

              source_trace = pd.DataFrame(source_trace_rows)

              gap_update_rows = []
              for _, gap in open_gaps.iterrows():
                  gap_id = clean(gap["gap_id"])
                  open_gap = clean(gap["open_gap"])
                  if gap_id == "OPEN_GAP_001":
                      updated_status = "partially_addressed_by_v4_332_packet_prepared_but_values_not_reviewed_or_approved"
                  else:
                      updated_status = "still_open"
                  gap_update_rows.append({
                      "gap_id": gap_id,
                      "open_gap": open_gap,
                      "v4_332_gap_status": updated_status,
                      "v4_332_note": "v4.332 prepares review structure only; it does not approve values, approve baselines, load observed data, score, or support TAIRID.",
                  })

              gap_update = pd.DataFrame(gap_update_rows)

              next_gate_checklist = pd.DataFrame([
                  {
                      "check_id": "VALUE_REVIEW_CHECK_001",
                      "check": "Does the source quote directly contain the proposed value or method context?",
                      "required_before_value_acceptance": True,
                  },
                  {
                      "check_id": "VALUE_REVIEW_CHECK_002",
                      "check": "Is the parameter definition clear enough to compare to the intended LCDM calculator field?",
                      "required_before_value_acceptance": True,
                  },
                  {
                      "check_id": "VALUE_REVIEW_CHECK_003",
                      "check": "Is the value copied exactly from the source, with uncertainty/context preserved?",
                      "required_before_value_acceptance": True,
                  },
                  {
                      "check_id": "VALUE_REVIEW_CHECK_004",
                      "check": "Does the reviewer avoid treating context-only sources as approved numeric values?",
                      "required_before_value_acceptance": True,
                  },
                  {
                      "check_id": "VALUE_REVIEW_CHECK_005",
                      "check": "Does the reviewer preserve the no observed scoring and no support claims boundary?",
                      "required_before_value_acceptance": True,
                  },
                  {
                      "check_id": "VALUE_REVIEW_CHECK_006",
                      "check": "Does any later baseline review remain blocked until candidate values are reviewed and explicitly accepted?",
                      "required_before_value_acceptance": True,
                  },
              ])

              hard_checks = {
                  "input_v4_331c_summary_found": summary331c.get("version") == "v4.331C",
                  "input_v4_331c_rules_19_of_19": summary331c.get("rules_passed") == 19 and summary331c.get("rules_total") == 19,
                  "input_v4_331c_failed_gates_none": summary331c.get("failed_gates") == "none",
                  "input_v4_331c_human_acceptance_recorded_true": summary331c.get("human_acceptance_recorded") is True,
                  "input_v4_331c_accepted_candidate_decision_rows_6": summary331c.get("accepted_candidate_decision_rows") == 6,

                  "input_v4_331c_no_parameter_approval": summary331c.get("parameter_values_approved") is False,
                  "input_v4_331c_no_numeric_baseline_approval": summary331c.get("numeric_baseline_values_filled") is False and summary331c.get("approved_baseline_values") == 0,
                  "input_v4_331c_no_observed_values_loaded": summary331c.get("observed_values_loaded") is False,
                  "input_v4_331c_no_definition_match_confirmed": summary331c.get("definition_match_confirmed") is False,
                  "input_v4_331c_no_score_valid": summary331c.get("score_valid") is False,
                  "input_v4_331c_no_support_allowed": summary331c.get("support_allowed") is False,

                  "accepted_source_ledger_rows_equal_6": len(accepted_source_ledger) == 6,
                  "value_review_template_rows_equal_6": len(value_review_template) == 6,
                  "source_trace_rows_at_least_6": len(source_trace) >= 6,
                  "open_gaps_rows_equal_7": len(open_gaps) == 7,
                  "blocked_gates_rows_equal_6": len(blocked_gates) == 6,
                  "ruled_out_rows_equal_5": len(ruled_out) == 5,
                  "stage_ledger_rows_at_least_8": len(stage_ledger) >= 8,

                  "candidate_value_fields_blank": all_blank(value_review_template["candidate_numeric_value_to_review_later"]),
                  "candidate_value_text_fields_blank": all_blank(value_review_template["candidate_value_text_as_written_in_source"]),
                  "source_quote_fields_blank": all_blank(value_review_template["source_quote_for_value_or_context"]),
                  "human_value_review_decisions_blank": all_blank(value_review_template["human_value_review_decision"]),

                  "parameter_value_approved_false": not value_review_template["parameter_value_approved_now"].astype(bool).any(),
                  "numeric_baseline_approved_false": not value_review_template["numeric_baseline_approved_now"].astype(bool).any(),
                  "observed_values_loaded_false": not value_review_template["observed_values_loaded"].astype(bool).any(),
                  "definition_match_confirmed_false": not value_review_template["definition_match_confirmed"].astype(bool).any(),
                  "score_valid_false": not value_review_template["score_valid"].astype(bool).any(),
                  "support_allowed_false": not value_review_template["support_allowed"].astype(bool).any(),

                  "core_numeric_parameters_present": set(["omega_m0", "sigma8_0", "growth_index_gamma"]).issubset(set(value_review_template["parameter_or_method"])),
                  "next_gate_checklist_rows_equal_6": len(next_gate_checklist) == 6,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary332 = {
                  "version": "v4.332",
                  "route_name": "v4_332_parameter_value_review_packet_from_accepted_sources_no_scoring",
                  "expected_result": "v4_332_parameter_value_review_packet_from_accepted_sources_no_scoring_passed_no_claims",
                  "input_version": "v4.331C",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),

                  "accepted_source_decision_rows": int(len(accepted_source_ledger)),
                  "value_review_template_rows": int(len(value_review_template)),
                  "source_trace_rows": int(len(source_trace)),
                  "gap_update_rows": int(len(gap_update)),

                  "parameter_values_approved": False,
                  "numeric_baseline_values_filled": False,
                  "approved_baseline_values": 0,
                  "observed_values_loaded": False,
                  "definition_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": TRUTH_BOUNDARY,
                  "selected_next_route": "v4_333_human_fill_parameter_value_review_template_no_observed_scoring_no_baseline_approval",
              }

              value_review_template.to_csv(outdir / "v4_332_PARAMETER_VALUE_REVIEW_TEMPLATE_FILLABLE_NO_APPROVAL_NO_SCORING.csv", index=False)
              source_trace.to_csv(outdir / "v4_332_accepted_source_trace_for_value_review_no_approval.csv", index=False)
              gap_update.to_csv(outdir / "v4_332_open_gap_status_update_no_scoring.csv", index=False)
              next_gate_checklist.to_csv(outdir / "v4_332_parameter_value_review_checklist.csv", index=False)

              accepted_source_ledger.to_csv(outdir / "v4_332_input_v4_330_accepted_source_ledger_preserved.csv", index=False)
              open_gaps.to_csv(outdir / "v4_332_input_open_gaps_preserved.csv", index=False)
              blocked_gates.to_csv(outdir / "v4_332_input_blocked_gates_preserved.csv", index=False)
              ruled_out.to_csv(outdir / "v4_332_input_ruled_out_claims_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_332_rule_checks.csv", index=False)

              (outdir / "v4_332_summary.json").write_text(json.dumps(summary332, indent=2))

              summary_md = f"""# TAIRID v4.332 Parameter Value Review Packet From Accepted Sources — No Scoring

          Expected result: `{summary332["expected_result"]}`

          {summary332["rules_passed"]} / {summary332["rules_total"]} rules passed

          failed_gates = {summary332["failed_gates"]}

          accepted_source_decision_rows = {summary332["accepted_source_decision_rows"]}

          value_review_template_rows = {summary332["value_review_template_rows"]}

          source_trace_rows = {summary332["source_trace_rows"]}

          Truth boundary: {TRUTH_BOUNDARY}.

          This packet prepares a fillable parameter-value review structure from the accepted source candidates.

          It does **not** approve parameter values.

          It does **not** approve a numeric baseline.

          It does **not** load observed SDSS RSD values.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{summary332["selected_next_route"]}`
          """
              (outdir / "v4_332_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary332, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_332_parameter_value_review_packet_no_scoring.py

      - name: Run v4.332 parameter value review packet no scoring
        run: |
          python run_v4_332_parameter_value_review_packet_no_scoring.py

      - name: Upload v4.332 parameter value review packet artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-332-parameter-value-review-packet-no-scoring-output
          path: |
            tairid_v4_332_parameter_value_review_packet_no_scoring_output/
            tairid_v4_332_parameter_value_review_packet_no_scoring_output.zip
