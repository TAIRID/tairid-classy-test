name: Run TAIRID SH0ES Frozen Replay Robustness Stress v2.0

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-frozen-replay-robustness-stress-v2-0:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_frozen_replay_robustness_stress_v2_0.py
          echo "v2.0 SH0ES frozen replay robustness stress found."

      - name: Run TAIRID SH0ES Frozen Replay Robustness Stress v2.0
        run: |
          python run_tairid_shoes_frozen_replay_robustness_stress_v2_0.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-frozen-replay-robustness-stress-v2-0-output
          path: |
            tairid_shoes_frozen_replay_robustness_stress_v2_0_outputs/**
