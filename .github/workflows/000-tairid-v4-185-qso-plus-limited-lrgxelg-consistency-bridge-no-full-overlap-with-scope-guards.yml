name: 000 TAIRID v4.185 - QSO Plus Limited LRGxELG Consistency Bridge No Full Overlap With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-185-qso-plus-limited-lrgxelg-consistency-bridge-no-full-overlap-with-scope-guards.yml"

permissions:
  contents: read

jobs:
  v4-185-qso-plus-limited-lrgxelg-consistency-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.185 QSO plus limited LRGxELG consistency bridge
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_185_outputs
          cat > tairid_v4_185_outputs/run_v4_185.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          OUT = Path("tairid_v4_185_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "qso_plus_limited_lrgxelg_consistency_bridge_passed_block_diagonal_bridge_artifacts_written_no_full_overlap_no_validation"

          LRG_LABELS = [
              "LRGxELG_DM_ov_rd_z0p70",
              "LRGxELG_DH_ov_rd_z0p70",
              "LRGxELG_fsigma8_z0p70",
              "LRGxELG_DM_ov_rd_z0p845",
              "LRGxELG_DH_ov_rd_z0p845",
              "LRGxELG_fsigma8_z0p845",
          ]

          QSO_LABELS = [
              "QSO_DM_ov_rd_z1p48",
              "QSO_DH_ov_rd_z1p48",
              "QSO_fsigma8_z1p48",
          ]

          LABELS = LRG_LABELS + QSO_LABELS

          ROLE_BY_LABEL = {
              "LRGxELG_DM_ov_rd_z0p70": "transverse_geometry_reach",
              "LRGxELG_DH_ov_rd_z0p70": "radial_geometry_pacing_access",
              "LRGxELG_fsigma8_z0p70": "growth_consolidation",
              "LRGxELG_DM_ov_rd_z0p845": "transverse_geometry_reach",
              "LRGxELG_DH_ov_rd_z0p845": "radial_geometry_pacing_access",
              "LRGxELG_fsigma8_z0p845": "growth_consolidation",
              "QSO_DM_ov_rd_z1p48": "transverse_geometry_reach",
              "QSO_DH_ov_rd_z1p48": "radial_geometry_pacing_access",
              "QSO_fsigma8_z1p48": "growth_consolidation",
          }

          Z_BY_LABEL = {
              "LRGxELG_DM_ov_rd_z0p70": 0.700,
              "LRGxELG_DH_ov_rd_z0p70": 0.700,
              "LRGxELG_fsigma8_z0p70": 0.700,
              "LRGxELG_DM_ov_rd_z0p845": 0.845,
              "LRGxELG_DH_ov_rd_z0p845": 0.845,
              "LRGxELG_fsigma8_z0p845": 0.845,
              "QSO_DM_ov_rd_z1p48": 1.480,
              "QSO_DH_ov_rd_z1p48": 1.480,
              "QSO_fsigma8_z1p48": 1.480,
          }

          # v4.181 limited LRGxELG observed values and Planck-chain reference.
          LRG_OBS = [
              17.954174,
              21.221161,
              0.433572,
              18.896851,
              20.910056,
              0.296822,
          ]
          LRG_REF = [
              17.59943045417609,
              20.2561921544936,
              0.4632289287770681,
              20.410265148910945,
              18.542918948589165,
              0.4492732965578104,
          ]
          LRG_OBS_COV = [
              [0.258788, -0.013232, 0.014042, 0.097797, 0.013451, 0.001526],
              [-0.013232, 1.434424, -0.008455, 0.132199, 1.474695, -0.025946],
              [0.014042, -0.008455, 0.002504, 0.000447, -0.028524, 0.000647],
              [0.097797, 0.132199, 0.000447, 0.602601, -0.793886, 0.035649],
              [0.013451, 1.474695, -0.028524, -0.793886, 8.189312, -0.171374],
              [0.001526, -0.025946, 0.000647, 0.035649, -0.171374, 0.006623],
          ]
          LRG_REF_COV = [
              [0.014516, 0.007963, 0.000361, 0.015455, 0.005142, 0.000271],
              [0.007963, 0.004383, 0.000197, 0.008480, 0.002838, 0.000148],
              [0.000361, 0.000197, 0.000023, 0.000384, 0.000127, 0.000021],
              [0.015455, 0.008480, 0.000384, 0.016456, 0.005477, 0.000288],
              [0.005142, 0.002838, 0.000127, 0.005477, 0.001841, 0.000095],
              [0.000271, 0.000148, 0.000021, 0.000288, 0.000095, 0.000018],
          ]

          # v4.184 QSO BAO-plus observed values and Planck-chain reference.
          QSO_OBS = [
              30.210,
              13.230,
              0.462,
          ]
          QSO_REF = [
              30.249071,
              12.910148,
              0.377114,
          ]
          QSO_OBS_COV = [
              [0.62274104, 0.01424418, 0.02256840],
              [0.01424418, 0.21952648, -0.00731532],
              [0.02256840, -0.00731532, 0.00201957],
          ]
          QSO_REF_COV = [
              [0.018862, -0.000444, 0.000059],
              [-0.000444, 0.000034, -0.000002],
              [0.000059, -0.000002, 0.000010],
          ]

          BLOCKED_CLAIMS = [
              "no TAIRID validation",
              "no LCDM ruled-out claim",
              "no final cosmology claim",
              "no full eBOSS covariance",
              "no full tracer-family covariance",
              "no QSO-plus-LRGxELG cross-covariance",
              "no cross-tracer overlap model",
              "no likelihood computed",
              "no BIC",
              "no posterior model comparison",
              "no publication-grade pressure claim",
              "block-diagonal consistency bridge only",
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def mat_add(A, B):
              return [[A[i][j] + B[i][j] for j in range(len(A[0]))] for i in range(len(A))]

          def block_diag(A, B):
              n = len(A)
              m = len(B)
              out = [[0.0 for _ in range(n + m)] for __ in range(n + m)]
              for i in range(n):
                  for j in range(n):
                      out[i][j] = A[i][j]
              for i in range(m):
                  for j in range(m):
                      out[n + i][n + j] = B[i][j]
              return out

          def mat_to_rows(matrix, row_names, col_names):
              rows = []
              for i, rname in enumerate(row_names):
                  row = {"row_label": rname}
                  for j, cname in enumerate(col_names):
                      row[cname] = matrix[i][j] if i < len(matrix) and j < len(matrix[i]) else ""
                  rows.append(row)
              return rows

          def corr_from_cov(C):
              rows = []
              for i in range(len(C)):
                  row = []
                  for j in range(len(C)):
                      denom = math.sqrt(C[i][i] * C[j][j]) if C[i][i] > 0 and C[j][j] > 0 else 0.0
                      row.append(C[i][j] / denom if denom else "")
                  rows.append(row)
              return rows

          def gaussian_solve(A, b):
              n = len(A)
              M = [list(A[i]) + [b[i]] for i in range(n)]
              for col in range(n):
                  pivot = max(range(col, n), key=lambda r: abs(M[r][col]))
                  if abs(M[pivot][col]) < 1e-15:
                      raise ValueError("singular matrix")
                  if pivot != col:
                      M[col], M[pivot] = M[pivot], M[col]
                  piv = M[col][col]
                  for j in range(col, n + 1):
                      M[col][j] /= piv
                  for r in range(n):
                      if r == col:
                          continue
                      factor = M[r][col]
                      if factor:
                          for j in range(col, n + 1):
                              M[r][j] -= factor * M[col][j]
              return [M[i][n] for i in range(n)]

          def quadratic_form_with_inverse(C, r):
              x = gaussian_solve(C, r)
              return sum(r[i] * x[i] for i in range(len(r)))

          def jacobi_eigen_symmetric(A, max_iter=250, tol=1e-12):
              n = len(A)
              a = [list(row) for row in A]
              v = [[1.0 if i == j else 0.0 for j in range(n)] for i in range(n)]
              for _ in range(max_iter):
                  p = 0
                  q = 1
                  max_val = 0.0
                  for i in range(n):
                      for j in range(i + 1, n):
                          val = abs(a[i][j])
                          if val > max_val:
                              max_val = val
                              p, q = i, j
                  if max_val < tol:
                      break
                  app = a[p][p]
                  aqq = a[q][q]
                  apq = a[p][q]
                  phi = 0.5 * math.atan2(2.0 * apq, aqq - app)
                  c = math.cos(phi)
                  s = math.sin(phi)
                  for k in range(n):
                      if k != p and k != q:
                          aik = a[k][p]
                          akq = a[k][q]
                          a[k][p] = c * aik - s * akq
                          a[p][k] = a[k][p]
                          a[k][q] = s * aik + c * akq
                          a[q][k] = a[k][q]
                  a[p][p] = c*c*app - 2*s*c*apq + s*s*aqq
                  a[q][q] = s*s*app + 2*s*c*apq + c*c*aqq
                  a[p][q] = 0.0
                  a[q][p] = 0.0
                  for k in range(n):
                      vip = v[k][p]
                      viq = v[k][q]
                      v[k][p] = c * vip - s * viq
                      v[k][q] = s * vip + c * viq
              eigenvalues = [a[i][i] for i in range(n)]
              eigenvectors = []
              for j in range(n):
                  vec = [v[i][j] for i in range(n)]
                  norm = math.sqrt(sum(x*x for x in vec))
                  eigenvectors.append([x / norm for x in vec])
              order = sorted(range(n), key=lambda i: eigenvalues[i], reverse=True)
              return [eigenvalues[i] for i in order], [eigenvectors[i] for i in order]

          LRG_COMBINED_COV = mat_add(LRG_OBS_COV, LRG_REF_COV)
          QSO_COMBINED_COV = mat_add(QSO_OBS_COV, QSO_REF_COV)
          NINE_COV = block_diag(LRG_COMBINED_COV, QSO_COMBINED_COV)

          OBS = LRG_OBS + QSO_OBS
          REF = LRG_REF + QSO_REF
          RESIDUAL = [OBS[i] - REF[i] for i in range(len(OBS))]

          LRG_RESIDUAL = [LRG_OBS[i] - LRG_REF[i] for i in range(6)]
          QSO_RESIDUAL = [QSO_OBS[i] - QSO_REF[i] for i in range(3)]

          lrg_norm = quadratic_form_with_inverse(LRG_COMBINED_COV, LRG_RESIDUAL)
          qso_norm = quadratic_form_with_inverse(QSO_COMBINED_COV, QSO_RESIDUAL)
          nine_norm = quadratic_form_with_inverse(NINE_COV, RESIDUAL)

          lrg_radius = math.sqrt(lrg_norm)
          qso_radius = math.sqrt(qso_norm)
          nine_radius = math.sqrt(nine_norm)

          residual_rows = []
          for i, label in enumerate(LABELS):
              combined_sigma = math.sqrt(NINE_COV[i][i])
              residual_rows.append({
                  "label": label,
                  "tracer_block": "LRGxELG" if i < 6 else "QSO",
                  "z": Z_BY_LABEL[label],
                  "role": ROLE_BY_LABEL[label],
                  "observed": OBS[i],
                  "planck_chain_reference": REF[i],
                  "residual_observed_minus_reference": RESIDUAL[i],
                  "percent_residual": 100.0 * RESIDUAL[i] / REF[i],
                  "block_diagonal_combined_sigma": combined_sigma,
                  "block_diagonal_sigma_units_preview_not_validation": RESIDUAL[i] / combined_sigma,
              })

          # Pattern bridge across redshift/tracer.
          growth_rows = [r for r in residual_rows if r["role"] == "growth_consolidation"]
          radial_rows = [r for r in residual_rows if r["role"] == "radial_geometry_pacing_access"]
          transverse_rows = [r for r in residual_rows if r["role"] == "transverse_geometry_reach"]

          pattern_summary = {
              "LRGxELG_growth_low_at_z0p70_and_z0p845": LRG_RESIDUAL[2] < 0 and LRG_RESIDUAL[5] < 0,
              "QSO_growth_high_at_z1p48": QSO_RESIDUAL[2] > 0,
              "growth_sign_reversal_between_LRGxELG_and_QSO": (LRG_RESIDUAL[2] < 0 and LRG_RESIDUAL[5] < 0 and QSO_RESIDUAL[2] > 0),
              "radial_geometry_high_in_all_three_available_redshift_points": all(r["residual_observed_minus_reference"] > 0 for r in radial_rows),
              "transverse_geometry_has_mixed_sign_across_available_redshift_points": len(set(1 if r["residual_observed_minus_reference"] > 0 else -1 for r in transverse_rows)) > 1,
              "largest_percent_residual_label": max(residual_rows, key=lambda r: abs(r["percent_residual"]))["label"],
              "largest_percent_residual": max(residual_rows, key=lambda r: abs(r["percent_residual"]))["percent_residual"],
              "largest_block_diagonal_sigma_units_label": max(residual_rows, key=lambda r: abs(r["block_diagonal_sigma_units_preview_not_validation"]))["label"],
              "largest_block_diagonal_sigma_units": max(residual_rows, key=lambda r: abs(r["block_diagonal_sigma_units_preview_not_validation"]))["block_diagonal_sigma_units_preview_not_validation"],
          }

          # Modes of the block diagonal preview.
          eigvals, eigvecs = jacobi_eigen_symmetric(NINE_COV)
          mode_rows = []
          loading_rows = []
          edge_rows = []
          energy_total = 0.0
          raw_records = []
          for idx, (eig, vec) in enumerate(zip(eigvals, eigvecs), start=1):
              proj = sum(RESIDUAL[i] * vec[i] for i in range(len(LABELS)))
              sigma = math.sqrt(eig) if eig > 0 else float("nan")
              units = proj / sigma if sigma and math.isfinite(sigma) else float("nan")
              energy = units * units if math.isfinite(units) else 0.0
              energy_total += energy
              role_abs = {}
              tracer_abs = {}
              for i, label in enumerate(LABELS):
                  role = ROLE_BY_LABEL[label]
                  tracer = "LRGxELG" if i < 6 else "QSO"
                  role_abs[role] = role_abs.get(role, 0.0) + abs(vec[i])
                  tracer_abs[tracer] = tracer_abs.get(tracer, 0.0) + abs(vec[i])
              dominant_role = max(role_abs.items(), key=lambda kv: kv[1])[0]
              dominant_tracer = max(tracer_abs.items(), key=lambda kv: kv[1])[0]
              raw_records.append({
                  "mode": "M" + str(idx),
                  "eigenvalue": eig,
                  "mode_sigma": sigma,
                  "residual_projection_raw": proj,
                  "mode_units_preview_not_validation": units,
                  "mode_energy_preview": energy,
                  "dominant_role_by_abs_loading": dominant_role,
                  "dominant_tracer_by_abs_loading": dominant_tracer,
              })
              for i, label in enumerate(LABELS):
                  loading_rows.append({
                      "mode": "M" + str(idx),
                      "label": label,
                      "tracer_block": "LRGxELG" if i < 6 else "QSO",
                      "z": Z_BY_LABEL[label],
                      "role": ROLE_BY_LABEL[label],
                      "loading": vec[i],
                      "absolute_loading": abs(vec[i]),
                  })
                  if abs(vec[i]) >= 0.20:
                      edge_rows.append({
                          "source": "M" + str(idx),
                          "target": label,
                          "edge_type": "mode_loading",
                          "weight": vec[i],
                          "absolute_weight": abs(vec[i]),
                          "note": "block diagonal consistency bridge loading; cross-tracer covariance omitted",
                      })
          for rec in raw_records:
              rec["mode_energy_fraction_preview"] = rec["mode_energy_preview"] / energy_total if energy_total > 0 else ""
              mode_rows.append(rec)
          dominant_mode = max(mode_rows, key=lambda r: r["mode_energy_preview"])

          gap_rows = [
              {
                  "gap": "limited LRGxELG observed/reference covariance",
                  "status": "closed_for_diagnostic_preview",
                  "meaning": "v4.181-v4.182 established limited LRGxELG combined covariance preview.",
                  "remaining_blocker": "not full tracer family",
              },
              {
                  "gap": "QSO observed/reference covariance",
                  "status": "closed_for_single_tracer_preview",
                  "meaning": "v4.184 parsed QSO BAO-plus observed covariance and Planck-chain reference covariance.",
                  "remaining_blocker": "not combined with LRGxELG through real cross-covariance",
              },
              {
                  "gap": "QSO plus LRGxELG bridge",
                  "status": "block_diagonal_preview_only",
                  "meaning": "v4.185 compares the two available tracer products without cross-overlap terms.",
                  "remaining_blocker": "cross-tracer covariance/overlap model",
              },
              {
                  "gap": "full eBOSS covariance / likelihood",
                  "status": "open",
                  "meaning": "required before likelihood/BIC/posterior or publication-grade pressure.",
                  "remaining_blocker": "find full tracer-family covariance or official likelihood route",
              },
          ]

          claim_rows = [
              {
                  "claim": "LRGxELG and QSO both show nontrivial covariance-aware residual previews.",
                  "status": "allowed_as_diagnostic_preview",
                  "safe_wording": "Both single-product previews remain nontrivial against Planck-chain references.",
                  "forbidden_wording": "The full eBOSS tracer family validates TAIRID.",
              },
              {
                  "claim": "Growth behavior changes sign between lower-z LRGxELG and higher-z QSO.",
                  "status": "allowed_as_pattern_observation",
                  "safe_wording": "In this preview, LRGxELG growth sits below reference while QSO growth sits above reference.",
                  "forbidden_wording": "This proves a TAIRID phase transition.",
              },
              {
                  "claim": "The 9-slot radius is final pressure.",
                  "status": "blocked",
                  "safe_wording": "The 9-slot radius is a block-diagonal bridge preview only.",
                  "forbidden_wording": "This is final pressure.",
              },
              {
                  "claim": "Cross-tracer covariance has been handled.",
                  "status": "blocked",
                  "safe_wording": "Cross-tracer covariance is explicitly omitted and remains the next gap.",
                  "forbidden_wording": "QSO and LRGxELG are fully combined.",
              },
          ]

          write_csv(OUT / "v4_185_residual_bridge_table.csv", residual_rows, ["label", "tracer_block", "z", "role", "observed", "planck_chain_reference", "residual_observed_minus_reference", "percent_residual", "block_diagonal_combined_sigma", "block_diagonal_sigma_units_preview_not_validation"])
          write_csv(OUT / "v4_185_block_diagonal_combined_covariance.csv", mat_to_rows(NINE_COV, LABELS, LABELS), ["row_label"] + LABELS)
          write_csv(OUT / "v4_185_block_diagonal_combined_correlation.csv", mat_to_rows(corr_from_cov(NINE_COV), LABELS, LABELS), ["row_label"] + LABELS)
          write_csv(OUT / "v4_185_mode_table.csv", mode_rows, ["mode", "eigenvalue", "mode_sigma", "residual_projection_raw", "mode_units_preview_not_validation", "mode_energy_preview", "dominant_role_by_abs_loading", "dominant_tracer_by_abs_loading", "mode_energy_fraction_preview"])
          write_csv(OUT / "v4_185_mode_variable_loadings.csv", loading_rows, ["mode", "label", "tracer_block", "z", "role", "loading", "absolute_loading"])
          write_csv(OUT / "v4_185_lattice_edges.csv", edge_rows, ["source", "target", "edge_type", "weight", "absolute_weight", "note"])
          write_csv(OUT / "v4_185_gap_status_report.csv", gap_rows, ["gap", "status", "meaning", "remaining_blocker"])
          write_csv(OUT / "v4_185_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          selected_next_route = "full_eboss_covariance_or_cross_tracer_overlap_acquisition_with_scope_guards"

          summary_packet = {
              "version": "v4.185",
              "result_label": RESULT_LABEL,
              "lrgxelg_combined_norm_preview_not_validation": lrg_norm,
              "lrgxelg_combined_radius_preview_not_validation": lrg_radius,
              "qso_combined_norm_preview_not_validation": qso_norm,
              "qso_combined_radius_preview_not_validation": qso_radius,
              "block_diagonal_9slot_norm_preview_not_validation": nine_norm,
              "block_diagonal_9slot_radius_preview_not_validation": nine_radius,
              "pattern_summary": pattern_summary,
              "dominant_mode": dominant_mode,
              "selected_next_route": selected_next_route,
              "truth_boundary": "block-diagonal consistency bridge only; no cross-tracer covariance and no validation",
              "blocked_claims": BLOCKED_CLAIMS,
          }

          (OUT / "v4_185_consistency_bridge_summary.json").write_text(json.dumps(summary_packet, indent=2), encoding="utf-8")
          (OUT / "v4_185_route_decision.json").write_text(json.dumps({
              "version": "v4.185",
              "result_label": RESULT_LABEL,
              "clean_result": "LRGxELG and QSO single-product previews were bridged with block-diagonal covariance only. Cross-tracer covariance remains open.",
              "selected_next_route": selected_next_route,
              "blocked_claims": BLOCKED_CLAIMS,
          }, indent=2), encoding="utf-8")
          (OUT / "v4_185_scope_guards.json").write_text(json.dumps({
              "scope": "QSO plus limited LRGxELG block-diagonal consistency bridge only",
              "LRGxELG_combined_covariance_used": True,
              "QSO_combined_covariance_used": True,
              "cross_tracer_covariance_used": False,
              "full_eBOSS_covariance_used": False,
              "likelihood_computed": False,
              "BIC_computed": False,
              "posterior_model_comparison_computed": False,
              "TAIRID_validated": False,
          }, indent=2), encoding="utf-8")
          (OUT / "v4_185_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = []
          summary.append("# TAIRID v4.185 - QSO Plus Limited LRGxELG Consistency Bridge")
          summary.append("")
          summary.append("Expected result: `" + RESULT_LABEL + "`")
          summary.append("")
          summary.append("## Clean result")
          summary.append("")
          summary.append("This workflow bridges the limited LRGxELG and QSO single-product previews using block-diagonal covariance only.")
          summary.append("")
          summary.append("LRGxELG radius preview: `" + f"{lrg_radius:.6f}" + "`")
          summary.append("QSO radius preview: `" + f"{qso_radius:.6f}" + "`")
          summary.append("9-slot block-diagonal radius preview: `" + f"{nine_radius:.6f}" + "`")
          summary.append("")
          summary.append("## Main pattern")
          summary.append("")
          summary.append("- LRGxELG growth below reference at z=0.70 and z=0.845: `" + str(pattern_summary["LRGxELG_growth_low_at_z0p70_and_z0p845"]) + "`")
          summary.append("- QSO growth above reference at z=1.48: `" + str(pattern_summary["QSO_growth_high_at_z1p48"]) + "`")
          summary.append("- Growth sign reversal between LRGxELG and QSO: `" + str(pattern_summary["growth_sign_reversal_between_LRGxELG_and_QSO"]) + "`")
          summary.append("- Radial geometry high at all three available redshift points: `" + str(pattern_summary["radial_geometry_high_in_all_three_available_redshift_points"]) + "`")
          summary.append("")
          summary.append("## Selected next route")
          summary.append("")
          summary.append("`" + selected_next_route + "`")
          summary.append("")
          summary.append("## Boundary")
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_185_summary.md").write_text("\n".join(summary), encoding="utf-8")

          rules = {
              "version_is_v4_185": True,
              "result_label_present": RESULT_LABEL.endswith("no_full_overlap_no_validation"),
              "residual_bridge_written": (OUT / "v4_185_residual_bridge_table.csv").exists(),
              "block_covariance_written": (OUT / "v4_185_block_diagonal_combined_covariance.csv").exists(),
              "block_correlation_written": (OUT / "v4_185_block_diagonal_combined_correlation.csv").exists(),
              "mode_table_written": (OUT / "v4_185_mode_table.csv").exists(),
              "loadings_written": (OUT / "v4_185_mode_variable_loadings.csv").exists(),
              "lattice_edges_written": (OUT / "v4_185_lattice_edges.csv").exists(),
              "gap_report_written": (OUT / "v4_185_gap_status_report.csv").exists(),
              "claim_matrix_written": (OUT / "v4_185_claim_boundary_matrix.csv").exists(),
              "summary_packet_written": (OUT / "v4_185_consistency_bridge_summary.json").exists(),
              "route_decision_written": (OUT / "v4_185_route_decision.json").exists(),
              "scope_guards_written": (OUT / "v4_185_scope_guards.json").exists(),
              "blocked_claims_written": (OUT / "v4_185_blocked_claims.json").exists(),
              "summary_written": (OUT / "v4_185_summary.md").exists(),
              "lrg_radius_finite": math.isfinite(lrg_radius) and lrg_radius > 0,
              "qso_radius_finite": math.isfinite(qso_radius) and qso_radius > 0,
              "nine_radius_finite": math.isfinite(nine_radius) and nine_radius > 0,
              "growth_reversal_flag_written": pattern_summary["growth_sign_reversal_between_LRGxELG_and_QSO"],
              "no_cross_tracer_covariance_used": True,
              "no_full_eBOSS_covariance_used": True,
              "no_likelihood_claim": True,
              "no_validation_claim": True,
              "next_route_selected": selected_next_route == "full_eboss_covariance_or_cross_tracer_overlap_acquisition_with_scope_guards",
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.185",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "lrgxelg_radius_preview_not_validation": lrg_radius,
              "qso_radius_preview_not_validation": qso_radius,
              "block_diagonal_9slot_radius_preview_not_validation": nine_radius,
              "growth_sign_reversal_between_LRGxELG_and_QSO": pattern_summary["growth_sign_reversal_between_LRGxELG_and_QSO"],
              "selected_next_route": selected_next_route,
              "claim_boundary": "block_diagonal_bridge_only_no_full_overlap_no_validation",
          }

          (OUT / "v4_185_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.185 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_185_outputs/run_v4_185.py

