              "Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.",
          ]
          (OUT / "v4_285_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"source_url = {SOURCE_URL}")
          print(f"fetch_ok = {summary['fetch_ok']}")
          print(f"fetch_status_code = {summary['fetch_status_code']}")
          print(f"bytes_read = {summary['bytes_read']}")
          print(f"parser_status = {summary['parser_status']}")
          print(f"html_tables_found = {summary['html_tables_found']}")
          print(f"fsigma8_rows_found = {summary['fsigma8_rows_found']}")
          print(f"parsed_rsd_rows = {summary['parsed_rsd_rows']}")
          print(f"smoke_outcome = {summary['smoke_outcome']}")
          print(f"real_data_touched = {summary['real_data_touched']}")
          print(f"real_values_parsed = {summary['real_values_parsed']}")
          print(f"baseline_comparison_run = {summary['baseline_comparison_run']}")
          print(f"covariance_handled = {summary['covariance_handled']}")
          print(f"p_value_computed = {summary['p_value_computed']}")
          print(f"likelihood_computed = {summary['likelihood_computed']}")
          print(f"support_allowed = {summary['support_allowed']}")
          print(f"evidence_allowed = {summary['evidence_allowed']}")
          print(f"validation_allowed = {summary['validation_allowed']}")
          print(f"combined_matrix_allowed = {summary['combined_matrix_allowed']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.285 real data smoke test output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-285-real-data-smoke-test-sdss-eboss-rsd-output
          path: |
            tairid_v4_285_real_data_smoke_test_sdss_eboss_rsd_output/
            tairid-v4-285-real-data-smoke-test-sdss-eboss-rsd-output.zip
