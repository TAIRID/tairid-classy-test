name: Run TAIRID ADHD inhibition cycle reach v1

on:
  workflow_dispatch:

jobs:
  run-tairid-adhd-inhibition-cycle-reach-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy pandas matplotlib

      - name: Run TAIRID ADHD inhibition cycle reach v1
        run: |
          python run_tairid_adhd_inhibition_cycle_reach_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-adhd-inhibition-cycle-reach-v1-output
          path: |
            tairid_adhd_inhibition_cycle_reach_v1_outputs/**
