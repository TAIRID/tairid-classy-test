name: 000 TAIRID v4.193 - Neurotype Numeric Shape Score Preview With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-193-neurotype-numeric-shape-score-preview-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-193-neurotype-numeric-shape-score-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.193 neurotype numeric shape score preview
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_193_outputs
          cat > tairid_v4_193_outputs/run_v4_193.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_193_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "neurotype_numeric_shape_score_preview_passed_score_preview_artifacts_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "numeric shape score is not validation",
              "manual numeric anchors are not external replication",
              "TAIRID not proved"
          ]

          V4_192_STATUS = {
              "version": "v4.192",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "manual_anchor_rows": 11,
              "exact_numeric_anchor_count": 4,
              "directional_anchor_count": 6,
              "correction_anchor_count": 1,
              "readiness_rows": 10,
              "package_status": "manual_numeric_anchor_table_written_no_validation",
              "selected_next_route": "neurotype_numeric_shape_score_preview_with_scope_guards"
          }

          LOCKED_COSMOLOGY_SIGNATURES = {
              "++-": {
                  "family": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low",
                  "plain": "reach high / pacing high / growth low"
              },
              "-+-": {
                  "family": "LRGxELG_z0p845_like_reach_low_pacing_high_growth_low",
                  "plain": "reach low / pacing high / growth low"
              },
              "-++": {
                  "family": "QSO_z1p48_like_reach_low_pacing_high_growth_high",
                  "plain": "reach low / pacing high / growth high"
              }
          }

          READINESS_ROWS = [
              {"lane": "ADHD", "case_id": "ADHD_ds003500_selective_attention_width_over_depth", "shape_signature": "++-", "promotion_tier": "core_promote", "exact_numeric_anchor_count": 0, "directional_anchor_count": 1, "correction_anchor_count": 0, "total_anchor_count": 1, "readiness_score_not_validation": 3, "readiness_class_not_validation": "directional_ready"},
              {"lane": "ADHD", "case_id": "ADHD_EEG_arousal_constraint_lane", "shape_signature": "--+", "promotion_tier": "constraint_promote", "exact_numeric_anchor_count": 0, "directional_anchor_count": 0, "correction_anchor_count": 0, "total_anchor_count": 0, "readiness_score_not_validation": 1, "readiness_class_not_validation": "paper_grounded_but_missing_anchor"},
              {"lane": "Dyslexia", "case_id": "Dyslexia_ETDD70_reading_flow_viability_window", "shape_signature": "++-", "promotion_tier": "core_promote", "exact_numeric_anchor_count": 2, "directional_anchor_count": 1, "correction_anchor_count": 0, "total_anchor_count": 3, "readiness_score_not_validation": 9, "readiness_class_not_validation": "numeric_ready"},
              {"lane": "Aphantasia", "case_id": "Aphantasia_visual_reconstruction_response_gap", "shape_signature": "-+-", "promotion_tier": "core_promote", "exact_numeric_anchor_count": 2, "directional_anchor_count": 1, "correction_anchor_count": 0, "total_anchor_count": 3, "readiness_score_not_validation": 9, "readiness_class_not_validation": "numeric_ready"},
              {"lane": "Aphantasia", "case_id": "Aphantasia_preserved_input_effort_support_lane", "shape_signature": "0+0", "promotion_tier": "constraint_promote", "exact_numeric_anchor_count": 0, "directional_anchor_count": 0, "correction_anchor_count": 0, "total_anchor_count": 0, "readiness_score_not_validation": 1, "readiness_class_not_validation": "paper_grounded_but_missing_anchor"},
              {"lane": "Autism", "case_id": "Autism_measured_dispersion_search_correction", "shape_signature": "++-", "promotion_tier": "core_promote", "exact_numeric_anchor_count": 0, "directional_anchor_count": 0, "correction_anchor_count": 1, "total_anchor_count": 1, "readiness_score_not_validation": 3, "readiness_class_not_validation": "directional_ready"},
              {"lane": "Bipolar", "case_id": "Bipolar_depressive_compressed_rhythm_basin", "shape_signature": "--+", "promotion_tier": "constraint_promote", "exact_numeric_anchor_count": 0, "directional_anchor_count": 1, "correction_anchor_count": 0, "total_anchor_count": 1, "readiness_score_not_validation": 2, "readiness_class_not_validation": "directional_ready"},
              {"lane": "Bipolar", "case_id": "Bipolar_mania_hypomania_propagation_expansion", "shape_signature": "++-", "promotion_tier": "provisional_promote", "exact_numeric_anchor_count": 0, "directional_anchor_count": 1, "correction_anchor_count": 0, "total_anchor_count": 1, "readiness_score_not_validation": 1, "readiness_class_not_validation": "directional_ready"},
              {"lane": "Bipolar", "case_id": "Bipolar_euthymia_reference_rhythm", "shape_signature": "00+", "promotion_tier": "reference_promote", "exact_numeric_anchor_count": 0, "directional_anchor_count": 0, "correction_anchor_count": 0, "total_anchor_count": 0, "readiness_score_not_validation": 0, "readiness_class_not_validation": "paper_grounded_but_missing_anchor"},
              {"lane": "Schizotypy", "case_id": "Schizotypy_positive_reference_field_overreach", "shape_signature": "++-", "promotion_tier": "core_promote", "exact_numeric_anchor_count": 0, "directional_anchor_count": 1, "correction_anchor_count": 0, "total_anchor_count": 1, "readiness_score_not_validation": 3, "readiness_class_not_validation": "directional_ready"}
          ]

          MANUAL_ANCHORS = [
              {"case_id": "Dyslexia_ETDD70_reading_flow_viability_window", "metric": "four_axis_model_balanced_accuracy", "value": "0.857", "anchor_kind": "exact_numeric"},
              {"case_id": "Dyslexia_ETDD70_reading_flow_viability_window", "metric": "four_axis_model_auc", "value": "0.932", "anchor_kind": "exact_numeric"},
              {"case_id": "Dyslexia_ETDD70_reading_flow_viability_window", "metric": "s_A_up_lambda_R_up_rho_R_down_V_data_down", "value": "+,+,-,-", "anchor_kind": "directional_axis_pattern"},
              {"case_id": "Aphantasia_visual_reconstruction_response_gap", "metric": "drawing_burden_effect_size_d", "value": "1.013", "anchor_kind": "exact_numeric"},
              {"case_id": "Aphantasia_visual_reconstruction_response_gap", "metric": "physiology_burden_effect_size_d", "value": "1.553", "anchor_kind": "exact_numeric"},
              {"case_id": "Aphantasia_visual_reconstruction_response_gap", "metric": "rho_R_lower_lambda_R_higher_s_A_mismatch_V_lower", "value": "-,+,M,-", "anchor_kind": "directional_axis_pattern"},
              {"case_id": "ADHD_ds003500_selective_attention_width_over_depth", "metric": "higher_width_lower_depth_lower_gate_lower_viability", "value": "+,-,-,-", "anchor_kind": "directional_axis_pattern"},
              {"case_id": "Autism_measured_dispersion_search_correction", "metric": "initial_compact_depth_prediction_failed_dispersion_search_stronger", "value": "corrected_model", "anchor_kind": "correction_anchor"},
              {"case_id": "Bipolar_depressive_compressed_rhythm_basin", "metric": "reduced_beta_swing_reduced_s_A_swing_reduced_V_swing_positive_boundary_compression", "value": "-,-,-,+", "anchor_kind": "directional_axis_pattern"},
              {"case_id": "Bipolar_mania_hypomania_propagation_expansion", "metric": "propagation_heavy_activity_expansion_sleep_rest_consolidation_reduced", "value": "+,+,-", "anchor_kind": "directional_axis_pattern"},
              {"case_id": "Schizotypy_positive_reference_field_overreach", "metric": "weak_false_anchor_acceptance_lures_more_than_target_recognition", "value": "+,+,-", "anchor_kind": "directional_axis_pattern"}
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def tier_weight(tier):
              return {
                  "core_promote": 1.00,
                  "constraint_promote": 0.70,
                  "provisional_promote": 0.45,
                  "reference_promote": 0.30
              }.get(tier, 0.25)

          def anchor_strength(row):
              return (
                  int(row["exact_numeric_anchor_count"]) * 3
                  + int(row["directional_anchor_count"]) * 1
                  + int(row["correction_anchor_count"]) * 1
              )

          def classify_match(signature):
              if signature in LOCKED_COSMOLOGY_SIGNATURES:
                  return True, LOCKED_COSMOLOGY_SIGNATURES[signature]["family"], LOCKED_COSMOLOGY_SIGNATURES[signature]["plain"]
              return False, "non_locked_or_reference_signature", "not one of the three locked cosmology signatures"

          score_rows = []
          for row in READINESS_ROWS:
              direct, family, plain = classify_match(row["shape_signature"])
              base = anchor_strength(row)
              tier = tier_weight(row["promotion_tier"])
              score = base * tier
              numeric_ready = int(row["exact_numeric_anchor_count"]) >= 1
              if numeric_ready and direct:
                  score_class = "numeric_shape_match_preview"
              elif direct and base > 0:
                  score_class = "directional_shape_match_preview"
              elif base > 0:
                  score_class = "anchored_nonlocked_shape_preview"
              else:
                  score_class = "missing_numeric_anchor"
              out = dict(row)
              out["direct_locked_signature_match"] = direct
              out["locked_signature_family"] = family
              out["locked_signature_plain_read"] = plain
              out["anchor_strength_not_validation"] = base
              out["promotion_tier_weight"] = tier
              out["numeric_shape_score_preview_not_validation"] = round(score, 6)
              out["score_class_not_validation"] = score_class
              out["safe_use"] = "rank numeric follow-up and compare relational shape only"
              score_rows.append(out)

          signature_summary = {}
          for row in score_rows:
              sig = row["shape_signature"]
              if sig not in signature_summary:
                  signature_summary[sig] = {
                      "shape_signature": sig,
                      "row_count": 0,
                      "direct_locked_signature_match": row["direct_locked_signature_match"],
                      "locked_signature_family": row["locked_signature_family"],
                      "numeric_ready_rows": 0,
                      "directional_or_correction_rows": 0,
                      "missing_anchor_rows": 0,
                      "total_score_not_validation": 0.0
                  }
              signature_summary[sig]["row_count"] += 1
              signature_summary[sig]["total_score_not_validation"] += row["numeric_shape_score_preview_not_validation"]
              if row["score_class_not_validation"] == "numeric_shape_match_preview":
                  signature_summary[sig]["numeric_ready_rows"] += 1
              elif row["score_class_not_validation"] == "missing_numeric_anchor":
                  signature_summary[sig]["missing_anchor_rows"] += 1
              else:
                  signature_summary[sig]["directional_or_correction_rows"] += 1

          lane_summary = {}
          for row in score_rows:
              lane = row["lane"]
              if lane not in lane_summary:
                  lane_summary[lane] = {
                      "lane": lane,
                      "row_count": 0,
                      "direct_locked_signature_rows": 0,
                      "numeric_ready_rows": 0,
                      "total_score_not_validation": 0.0,
                      "max_score_not_validation": 0.0,
                      "best_case_id": ""
                  }
              lane_summary[lane]["row_count"] += 1
              lane_summary[lane]["total_score_not_validation"] += row["numeric_shape_score_preview_not_validation"]
              if row["direct_locked_signature_match"]:
                  lane_summary[lane]["direct_locked_signature_rows"] += 1
              if row["score_class_not_validation"] == "numeric_shape_match_preview":
                  lane_summary[lane]["numeric_ready_rows"] += 1
              if row["numeric_shape_score_preview_not_validation"] >= lane_summary[lane]["max_score_not_validation"]:
                  lane_summary[lane]["max_score_not_validation"] = row["numeric_shape_score_preview_not_validation"]
                  lane_summary[lane]["best_case_id"] = row["case_id"]

          ranking_rows = [dict(r) for r in score_rows]
          ranking_rows = sorted(
              ranking_rows,
              key=lambda r: (
                  -r["numeric_shape_score_preview_not_validation"],
                  -int(r["exact_numeric_anchor_count"]),
                  r["lane"],
                  r["case_id"]
              )
          )
          for i, row in enumerate(ranking_rows, start=1):
              row["rank_for_next_numeric_work"] = i

          next_numeric_rows = [
              {
                  "priority": 1,
                  "route": "dyslexia_aphantasia_numeric_axis_table_builder_with_scope_guards",
                  "reason": "Dyslexia and aphantasia are the only current numeric-ready direct locked-shape lanes.",
                  "expected_input": "Dyslexia bAcc/AUC/axis pattern and aphantasia d effect sizes plus directional axes."
              },
              {
                  "priority": 2,
                  "route": "adhd_autism_schizotypy_numeric_delta_acquisition_with_scope_guards",
                  "reason": "These rows match the locked ++- shape but currently have directional/correction anchors rather than exact numeric anchors.",
                  "expected_input": "width/depth/gate values; dispersion/search values; lure/anchor integrity values."
              },
              {
                  "priority": 3,
                  "route": "bipolar_phase_numeric_surface_builder_with_scope_guards",
                  "reason": "Bipolar is phase-specific and needs depression/mania/euthymia numeric separation before shape comparison.",
                  "expected_input": "beta_swing, s_A_swing, V_swing, compression score, sleep/rest or activity phase measures."
              }
          ]

          claim_matrix = [
              {
                  "claim": "Dyslexia and aphantasia are numeric-ready shape rows.",
                  "status": "allowed_as_readiness_preview",
                  "safe_wording": "They currently have exact numeric anchors and direct locked-signature matches.",
                  "forbidden_wording": "They validate TAIRID or prove cross-domain scaling."
              },
              {
                  "claim": "ADHD, autism, and schizotypy match the ++- signature.",
                  "status": "allowed_as_directional_or_correction_preview",
                  "safe_wording": "They currently match by paper-grounded direction/correction anchors.",
                  "forbidden_wording": "They are numerically confirmed at the same strength as dyslexia/aphantasia."
              },
              {
                  "claim": "The score ranks truth.",
                  "status": "blocked",
                  "safe_wording": "The score ranks readiness for numeric follow-up.",
                  "forbidden_wording": "Higher score means the theory is more true."
              },
              {
                  "claim": "The same shape means same cause.",
                  "status": "blocked",
                  "safe_wording": "The same sign pattern is a relational shape comparison only.",
                  "forbidden_wording": "Cosmology and cognition have the same mechanism."
              }
          ]

          score_fields = [
              "lane", "case_id", "shape_signature", "promotion_tier",
              "exact_numeric_anchor_count", "directional_anchor_count", "correction_anchor_count",
              "total_anchor_count", "readiness_score_not_validation", "readiness_class_not_validation",
              "direct_locked_signature_match", "locked_signature_family", "locked_signature_plain_read",
              "anchor_strength_not_validation", "promotion_tier_weight",
              "numeric_shape_score_preview_not_validation", "score_class_not_validation", "safe_use"
          ]

          write_csv(OUT / "v4_193_v4_192_status_review.csv", [V4_192_STATUS], list(V4_192_STATUS.keys()))
          (OUT / "v4_193_v4_192_status_review.json").write_text(json.dumps(V4_192_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_193_manual_anchor_rows_carried_forward.csv", MANUAL_ANCHORS, ["case_id", "metric", "value", "anchor_kind"])
          write_csv(OUT / "v4_193_numeric_shape_score_preview.csv", score_rows, score_fields)
          write_csv(OUT / "v4_193_numeric_shape_score_ranked.csv", ranking_rows, ["rank_for_next_numeric_work"] + score_fields)
          write_csv(OUT / "v4_193_signature_summary.csv", list(signature_summary.values()), [
              "shape_signature", "row_count", "direct_locked_signature_match", "locked_signature_family",
              "numeric_ready_rows", "directional_or_correction_rows", "missing_anchor_rows",
              "total_score_not_validation"
          ])
          write_csv(OUT / "v4_193_lane_summary.csv", list(lane_summary.values()), [
              "lane", "row_count", "direct_locked_signature_rows", "numeric_ready_rows",
              "total_score_not_validation", "max_score_not_validation", "best_case_id"
          ])
          write_csv(OUT / "v4_193_next_numeric_routes.csv", next_numeric_rows, ["priority", "route", "reason", "expected_input"])
          write_csv(OUT / "v4_193_claim_boundary_matrix.csv", claim_matrix, ["claim", "status", "safe_wording", "forbidden_wording"])

          numeric_ready_direct = [r for r in score_rows if r["score_class_not_validation"] == "numeric_shape_match_preview"]
          directional_direct = [r for r in score_rows if r["score_class_not_validation"] == "directional_shape_match_preview"]
          top_row = ranking_rows[0]

          selected_next_route = "dyslexia_aphantasia_numeric_axis_table_builder_with_scope_guards"

          route_decision = {
              "version": "v4.193",
              "result_label": RESULT_LABEL,
              "clean_result": "Manual/corpus-grounded anchors were converted into a numeric shape score preview. The score ranks follow-up readiness only.",
              "score_rows": len(score_rows),
              "numeric_ready_direct_locked_shape_rows": len(numeric_ready_direct),
              "directional_or_correction_direct_locked_shape_rows": len(directional_direct),
              "top_ranked_case": top_row["case_id"],
              "top_ranked_score_not_validation": top_row["numeric_shape_score_preview_not_validation"],
              "selected_next_route": selected_next_route,
              "truth_boundary": "numeric shape score preview only; not validation, not unit equivalence, not causal equivalence",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_193_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_193_scope_guards.json").write_text(json.dumps({
              "scope": "neurotype numeric shape score preview only",
              "score_is_validation": False,
              "manual_anchors_are_external_replication": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "neurotype_validation_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_193_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.193 - Neurotype Numeric Shape Score Preview",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.192 created a manual/corpus-grounded numeric anchor table. v4.193 converts those anchors into a score preview that ranks which neurotype rows are ready for more numeric work.",
              "",
              "Score rows: `" + str(len(score_rows)) + "`",
              "Numeric-ready direct locked-shape rows: `" + str(len(numeric_ready_direct)) + "`",
              "Directional/correction direct locked-shape rows: `" + str(len(directional_direct)) + "`",
              "Top ranked case: `" + top_row["case_id"] + "`",
              "",
              "## Selected next route",
              "",
              "`" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_193_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_193_v4_192_status_review.csv",
              "v4_193_v4_192_status_review.json",
              "v4_193_manual_anchor_rows_carried_forward.csv",
              "v4_193_numeric_shape_score_preview.csv",
              "v4_193_numeric_shape_score_ranked.csv",
              "v4_193_signature_summary.csv",
              "v4_193_lane_summary.csv",
              "v4_193_next_numeric_routes.csv",
              "v4_193_claim_boundary_matrix.csv",
              "v4_193_route_decision.json",
              "v4_193_scope_guards.json",
              "v4_193_blocked_claims.json",
              "v4_193_summary.md"
          ]

          rules = {
              "version_is_v4_193": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_192_status_reviewed": V4_192_STATUS["rule_pass_count"] == 10,
              "score_rows_present": len(score_rows) == 10,
              "numeric_ready_direct_rows_present": len(numeric_ready_direct) == 2,
              "directional_direct_rows_present": len(directional_direct) >= 3,
              "top_route_selected": selected_next_route == "dyslexia_aphantasia_numeric_axis_table_builder_with_scope_guards",
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.193",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "score_rows": len(score_rows),
              "numeric_ready_direct_locked_shape_rows": len(numeric_ready_direct),
              "directional_or_correction_direct_locked_shape_rows": len(directional_direct),
              "top_ranked_case": top_row["case_id"],
              "top_ranked_score_not_validation": top_row["numeric_shape_score_preview_not_validation"],
              "package_status": "numeric_shape_score_preview_written_no_validation",
              "selected_next_route": selected_next_route,
              "claim_boundary": "numeric_shape_score_preview_only_no_validation"
          }

          (OUT / "v4_193_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.193 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_193_outputs/run_v4_193.py

      - name: Upload v4.193 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-193-neurotype-numeric-shape-score-preview-output
          path: tairid_v4_193_outputs/
