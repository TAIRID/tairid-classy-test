name: TAIRID v4.28 RSD eBOSS Value Review

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-28-rsd-eboss-value-review.yml"

jobs:
  tairid-v4-28-rsd-eboss-value-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.28 RSD eBOSS value review
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_28_rsd_eboss_value_review

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_28_rsd_eboss_value_review")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_28_rsd_eboss_value_review"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run an RSD likelihood.",
              "This does not compute a final RSD pressure score.",
              "This does not make the RSD preview covariance-aware.",
              "This repairs the pending eBOSS RSD/f_sigma8 rows using an explicitly declared published-summary source.",
              "A pass means the eBOSS rows are value-reviewed and can enter a later non-final residual preview, not that TAIRID cosmology is validated."
          ]

          VALUE_SOURCE = {
              "source_id": "sdss_final_bao_rsd_measurements_table",
              "source_url": "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/",
              "source_role": "official_SDSS_public_summary_table",
              "value_lane": "BAO_plus_RSD_measurements_f_sigma8",
              "status": "published_summary_source",
              "limitations": [
                  "This is a published-summary table, not direct posterior-chain parsing.",
                  "BAO and RSD are bundled in the source table, so BAO remains boundary/ruler while f_sigma8 is the growth axis.",
                  "No covariance matrix is imported here.",
                  "No likelihood, refit, BIC, or model comparison is run.",
                  "Values become eligible for later non-final residual preview only."
              ]
          }

          RSD_ROWS_BEFORE_REVIEW = [
              {
                  "row_id": "boss_dr12_z038_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.38,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.497,
                  "published_sigma": 0.045,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready",
                  "source_status": "carried_from_prior_review"
              },
              {
                  "row_id": "boss_dr12_z051_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.51,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.458,
                  "published_sigma": 0.038,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready",
                  "source_status": "carried_from_prior_review"
              },
              {
                  "row_id": "boss_dr12_z061_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.61,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.436,
                  "published_sigma": 0.034,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready",
                  "source_status": "carried_from_prior_review"
              },
              {
                  "row_id": "wigglez_z044_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.44,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.413,
                  "published_sigma": 0.080,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready",
                  "source_status": "carried_from_prior_review"
              },
              {
                  "row_id": "wigglez_z060_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.60,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.390,
                  "published_sigma": 0.063,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready",
                  "source_status": "carried_from_prior_review"
              },
              {
                  "row_id": "wigglez_z073_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.73,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.437,
                  "published_sigma": 0.072,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready",
                  "source_status": "carried_from_prior_review"
              },
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "LRG",
                  "z_eff": 0.70,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "source_status": "pending_before_v4_28"
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "ELG",
                  "z_eff": 0.85,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "source_status": "pending_before_v4_28"
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "QSO",
                  "z_eff": 1.48,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "source_status": "pending_before_v4_28"
              }
          ]

          EBOSS_VALUE_REVIEW_ROWS = [
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "LRG",
                  "z_eff": 0.70,
                  "observable_axis": "f_sigma8",
                  "reviewed_value": 0.473,
                  "reviewed_sigma": 0.041,
                  "value_source_id": "sdss_final_bao_rsd_measurements_table",
                  "source_table_lane": "BAO_plus_RSD_f_sigma8",
                  "bao_bundled": True,
                  "review_status": "value_reviewed_published_summary",
                  "enter_next_preview": True,
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "ELG",
                  "z_eff": 0.85,
                  "observable_axis": "f_sigma8",
                  "reviewed_value": 0.315,
                  "reviewed_sigma": 0.095,
                  "value_source_id": "sdss_final_bao_rsd_measurements_table",
                  "source_table_lane": "BAO_plus_RSD_f_sigma8",
                  "bao_bundled": True,
                  "review_status": "value_reviewed_published_summary",
                  "enter_next_preview": True,
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "QSO",
                  "z_eff": 1.48,
                  "observable_axis": "f_sigma8",
                  "reviewed_value": 0.462,
                  "reviewed_sigma": 0.045,
                  "value_source_id": "sdss_final_bao_rsd_measurements_table",
                  "source_table_lane": "BAO_plus_RSD_f_sigma8",
                  "bao_bundled": True,
                  "review_status": "value_reviewed_published_summary",
                  "enter_next_preview": True,
                  "pressure_score_allowed_now": False
              }
          ]

          REVIEW_RULES = [
              {
                  "rule_id": "value_source_declared",
                  "description": "The source for repaired eBOSS values must be explicit.",
                  "failure_mode": "Values inserted without source boundary."
              },
              {
                  "rule_id": "all_pending_eboss_rows_repaired",
                  "description": "LRG, ELG, and QSO rows must receive value and sigma or remain blocked.",
                  "failure_mode": "Partial eBOSS repair silently treated as complete."
              },
              {
                  "rule_id": "axis_preserved",
                  "description": "All repaired eBOSS rows must remain f_sigma8 growth-axis rows.",
                  "failure_mode": "eBOSS rows become S8 or BAO rows."
              },
              {
                  "rule_id": "bao_rsd_separation_preserved",
                  "description": "BAO remains boundary/ruler even when values come from BAO+RSD table rows.",
                  "failure_mode": "BAO and RSD collapse into one reach/growth correction."
              },
              {
                  "rule_id": "published_summary_status_preserved",
                  "description": "Repaired eBOSS rows must remain published-summary rows, not direct parsed posterior data.",
                  "failure_mode": "Published summary is falsely promoted to direct data."
              },
              {
                  "rule_id": "no_pressure_score_now",
                  "description": "This review only repairs values and does not compute residuals or final pressure.",
                  "failure_mode": "Value review becomes scoring step."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "The eBOSS rows are direct posterior-chain rows.",
              "BAO and RSD can be averaged into one reach/growth correction.",
              "The repaired rows are covariance-aware.",
              "A likelihood, BIC, refit, or model comparison was run.",
              "The published-summary value review proves growth suppression."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_29_RSD_nonfinal_residual_preview_with_eBOSS",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Rerun the non-final residual preview including value-reviewed eBOSS rows.",
                  "must_include": "BOSS, WiggleZ, eBOSS value-reviewed rows, diagonal-only warning, reference uncertainty missing warning.",
                  "must_not_include": "final pressure score, covariance-aware claim, likelihood refit, validation claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_30_RSD_covariance_requirements_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Define covariance-aware requirements before any final RSD pressure test.",
                  "must_include": "survey covariance, overlapping samples, BAO/RSD separation, reference uncertainty.",
                  "must_not_include": "diagonal-only final claim."
              },
              {
                  "priority": 3,
                  "next_test": "v4_31_cluster_mass_calibration_boundary_audit",
                  "role_focus": "cluster_abundance_growth",
                  "purpose": "Audit cluster abundance with mass calibration and selection boundaries.",
                  "must_include": "mass calibration, selection, source/product status, axis label.",
                  "must_not_include": "cluster proof claim."
              }
          ]

          failed_gates = []
          warnings = []

          pending_before = [
              row for row in RSD_ROWS_BEFORE_REVIEW
              if row["source_status"] == "pending_before_v4_28"
          ]

          reviewed_ids = {row["row_id"] for row in EBOSS_VALUE_REVIEW_ROWS}
          pending_ids = {row["row_id"] for row in pending_before}

          if reviewed_ids != pending_ids:
              failed_gates.append("reviewed_eboss_rows_do_not_match_pending_rows")

          if not VALUE_SOURCE.get("source_url") or not VALUE_SOURCE.get("source_id"):
              failed_gates.append("value_source_missing")

          for row in EBOSS_VALUE_REVIEW_ROWS:
              if row["observable_axis"] != "f_sigma8":
                  failed_gates.append(row["row_id"] + "_axis_not_f_sigma8")

              if row["reviewed_value"] in ["", None] or row["reviewed_sigma"] in ["", None]:
                  failed_gates.append(row["row_id"] + "_missing_value_or_sigma")

              if float(row["reviewed_sigma"]) <= 0:
                  failed_gates.append(row["row_id"] + "_nonpositive_sigma")

              if row["review_status"] != "value_reviewed_published_summary":
                  failed_gates.append(row["row_id"] + "_review_status_wrong")

              if row["value_source_id"] != VALUE_SOURCE["source_id"]:
                  failed_gates.append(row["row_id"] + "_source_id_mismatch")

              if row["bao_bundled"] is not True:
                  failed_gates.append(row["row_id"] + "_bao_bundle_expected")

              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append(row["row_id"] + "_pressure_score_allowed_violation")

          repaired_rsd_rows = []

          for old_row in RSD_ROWS_BEFORE_REVIEW:
              matching = [row for row in EBOSS_VALUE_REVIEW_ROWS if row["row_id"] == old_row["row_id"]]

              if matching:
                  reviewed = matching[0]
                  repaired = dict(old_row)
                  repaired["published_value"] = reviewed["reviewed_value"]
                  repaired["published_sigma"] = reviewed["reviewed_sigma"]
                  repaired["evidence_status"] = "published_summary_value_reviewed"
                  repaired["row_status"] = "value_ready_after_v4_28_review"
                  repaired["source_status"] = "value_reviewed_published_summary"
                  repaired["value_source_id"] = reviewed["value_source_id"]
                  repaired["enter_next_preview"] = reviewed["enter_next_preview"]
              else:
                  repaired = dict(old_row)
                  repaired["value_source_id"] = old_row.get("source_status", "")
                  repaired["enter_next_preview"] = old_row["published_value"] not in ["", None] and old_row["published_sigma"] not in ["", None]

              repaired["pressure_score_allowed_now"] = False
              repaired_rsd_rows.append(repaired)

          rule_results = [
              {
                  "rule_id": "value_source_declared",
                  "pass": bool(VALUE_SOURCE.get("source_id")) and bool(VALUE_SOURCE.get("source_url")),
                  "result": "value_source_declared",
                  "boundary": "Values are sourced to a published summary table."
              },
              {
                  "rule_id": "all_pending_eboss_rows_repaired",
                  "pass": reviewed_ids == pending_ids and len(reviewed_ids) == 3,
                  "result": "LRG_ELG_QSO_rows_value_reviewed",
                  "boundary": "No pending eBOSS row is silently skipped."
              },
              {
                  "rule_id": "axis_preserved",
                  "pass": all(row["observable_axis"] == "f_sigma8" for row in EBOSS_VALUE_REVIEW_ROWS),
                  "result": "all_reviewed_rows_remain_f_sigma8",
                  "boundary": "RSD stays growth-rate axis."
              },
              {
                  "rule_id": "bao_rsd_separation_preserved",
                  "pass": all(row["bao_bundled"] is True for row in EBOSS_VALUE_REVIEW_ROWS),
                  "result": "BAO_bundled_status_labeled",
                  "boundary": "BAO remains boundary/ruler."
              },
              {
                  "rule_id": "published_summary_status_preserved",
                  "pass": all(row["review_status"] == "value_reviewed_published_summary" for row in EBOSS_VALUE_REVIEW_ROWS),
                  "result": "published_summary_status_preserved",
                  "boundary": "No direct-data promotion."
              },
              {
                  "rule_id": "no_pressure_score_now",
                  "pass": all(row["pressure_score_allowed_now"] is False for row in EBOSS_VALUE_REVIEW_ROWS),
                  "result": "no_pressure_score_in_value_review",
                  "boundary": "Value review only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_value_review_rules_passed")

          warnings.append("eBOSS_values_are_published_summary_not_direct_chain")
          warnings.append("BAO_RSD_separation_required_for_eBOSS_rows")
          warnings.append("covariance_not_imported")
          warnings.append("no_residuals_or_pressure_scores_computed")
          warnings.append("next_preview_still_diagonal_only_unless_covariance_added")

          value_ready_after = [
              row for row in repaired_rsd_rows
              if row["published_value"] not in ["", None]
              and row["published_sigma"] not in ["", None]
          ]

          eboss_value_ready_after = [
              row for row in repaired_rsd_rows
              if row["survey_family"] == "eBOSS_DR16"
              and row["published_value"] not in ["", None]
              and row["published_sigma"] not in ["", None]
          ]

          if failed_gates:
              readiness_label = "rsd_eboss_value_review_failed"
              next_step = "Repair eBOSS source/value review before rerunning residual preview."
          else:
              readiness_label = "rsd_eboss_value_review_passed_ready_for_nonfinal_preview_with_eBOSS"
              next_step = (
                  "Proceed to v4.29 RSD non-final residual preview with eBOSS included. "
                  "Keep diagonal-only and covariance warnings active."
              )

          system_health = {
              "pending_eboss_row_count_before": len(pending_before),
              "reviewed_eboss_row_count": len(EBOSS_VALUE_REVIEW_ROWS),
              "eboss_value_ready_after_review": len(eboss_value_ready_after),
              "total_rsd_rows_after_review": len(repaired_rsd_rows),
              "value_ready_rows_after_review": len(value_ready_after),
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "published_summary_status_preserved": True,
              "direct_chain_claim_allowed": False,
              "covariance_imported": False,
              "residuals_computed": False,
              "pressure_score_allowed_now": False,
              "validation_claim_allowed": False
          }

          interpretation = (
              "v4.28 repairs the pending eBOSS RSD/f_sigma8 rows using a declared SDSS final BAO/RSD published-summary table. "
              "The LRG, ELG, and QSO rows now have values and uncertainties for later non-final residual preview. "
              "They remain published-summary rows, not direct parsed posterior-chain rows. "
              "BAO/RSD bundling remains labeled, covariance is not imported, and no pressure score is computed."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "value_source": VALUE_SOURCE,
              "rsd_rows_before_review": RSD_ROWS_BEFORE_REVIEW,
              "eboss_value_review_rows": EBOSS_VALUE_REVIEW_ROWS,
              "repaired_rsd_rows": repaired_rsd_rows,
              "review_rules": REVIEW_RULES,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_pressure_scores_built": False,
                  "residuals_computed": False,
                  "covariance_imported": False,
                  "likelihood_run": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "value_source_v4_28.csv",
              [{
                  "source_id": VALUE_SOURCE["source_id"],
                  "source_url": VALUE_SOURCE["source_url"],
                  "source_role": VALUE_SOURCE["source_role"],
                  "value_lane": VALUE_SOURCE["value_lane"],
                  "status": VALUE_SOURCE["status"],
                  "limitations": " | ".join(VALUE_SOURCE["limitations"])
              }],
              ["source_id", "source_url", "source_role", "value_lane", "status", "limitations"]
          )

          write_csv(
              OUTDIR / "eboss_value_review_rows_v4_28.csv",
              EBOSS_VALUE_REVIEW_ROWS,
              [
                  "row_id",
                  "survey_family",
                  "tracer_or_sample",
                  "z_eff",
                  "observable_axis",
                  "reviewed_value",
                  "reviewed_sigma",
                  "value_source_id",
                  "source_table_lane",
                  "bao_bundled",
                  "review_status",
                  "enter_next_preview",
                  "pressure_score_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "repaired_rsd_rows_v4_28.csv",
              repaired_rsd_rows,
              [
                  "row_id",
                  "survey_family",
                  "tracer_or_sample",
                  "z_eff",
                  "observable_axis",
                  "published_value",
                  "published_sigma",
                  "evidence_status",
                  "bao_bundled",
                  "row_status",
                  "source_status",
                  "value_source_id",
                  "enter_next_preview",
                  "pressure_score_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "value_review_rule_results_v4_28.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_28.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_28.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_28.csv",
              [system_health],
              [
                  "pending_eboss_row_count_before",
                  "reviewed_eboss_row_count",
                  "eboss_value_ready_after_review",
                  "total_rsd_rows_after_review",
                  "value_ready_rows_after_review",
                  "rule_pass_count",
                  "rule_total_count",
                  "published_summary_status_preserved",
                  "direct_chain_claim_allowed",
                  "covariance_imported",
                  "residuals_computed",
                  "pressure_score_allowed_now",
                  "validation_claim_allowed"
              ]
          )

          json_path = OUTDIR / "tairid_v4_28_rsd_eboss_value_review.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.28 — RSD eBOSS Value Review")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("The pending eBOSS LRG, ELG, and QSO RSD/f_sigma8 rows were repaired as published-summary values.")
          md.append("")
          md.append("They are now eligible for a later non-final residual preview, but this test does not compute residuals or pressure scores.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## eBOSS reviewed rows")
          md.append("")
          md.append("| Row | z | Value | Sigma | Status |")
          md.append("|---|---:|---:|---:|---|")
          for row in EBOSS_VALUE_REVIEW_ROWS:
              md.append(
                  f"| `{row['row_id']}` | `{row['z_eff']}` | `{row['reviewed_value']}` | `{row['reviewed_sigma']}` | `{row['review_status']}` |"
              )
          md.append("")
          md.append("## Rule results")
          md.append("")
          md.append("| Rule | Pass | Result | Boundary |")
          md.append("|---|---:|---|---|")
          for row in rule_results:
              md.append(f"| `{row['rule_id']}` | `{row['pass']}` | `{row['result']}` | {row['boundary']} |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `value_source_v4_28.csv`")
          md.append("- `eboss_value_review_rows_v4_28.csv`")
          md.append("- `repaired_rsd_rows_v4_28.csv`")
          md.append("- `value_review_rule_results_v4_28.csv`")
          md.append("- `blocked_claims_v4_28.csv`")
          md.append("- `next_test_ladder_v4_28.csv`")
          md.append("- `system_health_v4_28.csv`")
          md.append("- `tairid_v4_28_rsd_eboss_value_review.json`")
          md.append("- `tairid_v4_28_rsd_eboss_value_review.md`")
          md.append("")

          md_path = OUTDIR / "tairid_v4_28_rsd_eboss_value_review.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

