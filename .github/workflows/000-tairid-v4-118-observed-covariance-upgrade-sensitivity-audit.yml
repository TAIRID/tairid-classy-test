name: 000 TAIRID v4.118 Observed Covariance Upgrade Sensitivity Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-118-observed-covariance-upgrade-sensitivity-audit.yml"

jobs:
  tairid-v4-118-observed-covariance-upgrade-sensitivity-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.118 observed covariance upgrade sensitivity audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_118_observed_covariance_upgrade_sensitivity_audit

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_118_observed_covariance_upgrade_sensitivity_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_118_observed_covariance_upgrade_sensitivity_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This does not fetch new observed covariance files.",
              "This audits the v4.117 observed covariance upgrade result.",
              "A pass means the source-covariance upgrade effect is measured and the next provenance/row-column verification route is specified."
          ]

          UPSTREAM_LOCKS = {
              "v4_117_observed_covariance_upgrade_probe": {
                  "readiness_label": "observed_covariance_upgrade_probe_passed_source_covariance_ingested_diagnostic_only_ready_for_upgrade_sensitivity_audit",
                  "source_attempted": True,
                  "source_observed_covariance_ingested": True,
                  "observed_RSD_covariance_upgraded": True,
                  "source_covariance_fallback_preserved": False,
                  "bridge_pressure_computed": True,
                  "primary_chi2": 1.2943386544372018,
                  "primary_pressure_z": 0.0,
                  "baseline_diagonal_chi2": 1.8857450832335483,
                  "baseline_diagonal_pressure_z": 0.0,
                  "primary_minus_baseline_delta_chi2": -0.5914064287963465,
                  "primary_minus_baseline_delta_pressure_z": 0.0,
                  "boss_subblock_candidate_count": 16,
                  "covariance_candidate_count": 18,
                  "archive_member_count": 46,
                  "covariance_upgrade_status": "BOSS_DR12_source_covariance_subblock_inserted_positions_1_2_3",
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_116_observed_covariance_source_upgrade_design": {
                  "readiness_label": "observed_covariance_source_upgrade_design_passed_ready_for_observed_covariance_upgrade_probe",
                  "observed_covariance_upgrade_required": True,
                  "source_observed_covariance_ingested": False,
                  "observed_RSD_covariance_upgraded": False,
                  "BOSS_DR12_upgrade_priority": 1,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_115_regularized_pressure_sensitivity_audit": {
                  "readiness_label": "regularized_pressure_sensitivity_audit_passed_diagnostic_stable_not_final_ready_for_observed_covariance_source_upgrade",
                  "diagnostic_stable": True,
                  "max_abs_delta_chi2": 0.019052856137296237,
                  "max_abs_delta_pressure_z": 0.0,
                  "pressure_z_all_zero": True,
                  "source_observed_covariance_ingested": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          BRIDGE_LANE_RECORDS = [
              {
                  "lane_id": "primary_reference_plus_upgraded_observed_covariance",
                  "chi2": 1.2943386544372018,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 1773307.3165823636,
                  "source_covariance_status": "BOSS_DR12_source_covariance_subblock_inserted_positions_1_2_3",
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              },
              {
                  "lane_id": "baseline_reference_plus_observed_diagonal_fallback",
                  "chi2": 1.8857450832335483,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 28.764946453807045,
                  "source_covariance_status": "diagonal_fallback",
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              },
              {
                  "lane_id": "diagonal_reference_guard_plus_upgraded_observed_covariance",
                  "chi2": 1.2900335042750035,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 1772805.947669053,
                  "source_covariance_status": "BOSS_DR12_source_covariance_subblock_inserted_positions_1_2_3",
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              },
              {
                  "lane_id": "observed_only_upgraded_or_fallback_covariance",
                  "chi2": 1.3042257710901062,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 1800867.3450471393,
                  "source_covariance_status": "BOSS_DR12_source_covariance_subblock_inserted_positions_1_2_3",
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              }
          ]

          UPGRADE_SENSITIVITY_RECORDS = [
              {
                  "comparison_id": "upgraded_primary_minus_baseline_diagonal_fallback",
                  "base_lane": "primary_reference_plus_upgraded_observed_covariance",
                  "comparison_lane": "baseline_reference_plus_observed_diagonal_fallback",
                  "delta_chi2": -0.5914064287963465,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Observed source covariance materially changed chi2 but did not create pressure_z."
              },
              {
                  "comparison_id": "upgraded_primary_minus_diagonal_reference_guard",
                  "base_lane": "primary_reference_plus_upgraded_observed_covariance",
                  "comparison_lane": "diagonal_reference_guard_plus_upgraded_observed_covariance",
                  "delta_chi2": 0.004305150162198235,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Reference off-diagonal choice remains small after observed covariance upgrade."
              },
              {
                  "comparison_id": "upgraded_primary_minus_observed_only",
                  "base_lane": "primary_reference_plus_upgraded_observed_covariance",
                  "comparison_lane": "observed_only_upgraded_or_fallback_covariance",
                  "delta_chi2": -0.009887116652904426,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Reference uncertainty contribution remains small after observed covariance upgrade."
              }
          ]

          AUDIT_THRESHOLDS = {
              "max_abs_delta_pressure_z_for_stable_diagnostic": 0.10,
              "material_delta_chi2_threshold": 0.25,
              "high_condition_proxy_threshold": 1000000.0,
              "pressure_z_zero_threshold": 1e-12,
              "required_lane_count": 4,
              "required_sensitivity_record_count": 3,
              "row_column_provenance_required_before_stronger_claim": True,
              "source_covariance_finality_allowed_now": False,
              "final_pressure_allowed_now": False,
              "validation_claim_allowed_now": False
          }

          max_abs_delta_chi2 = max(abs(float(row["delta_chi2"])) for row in UPGRADE_SENSITIVITY_RECORDS)
          max_abs_delta_pressure_z = max(abs(float(row["delta_pressure_z"])) for row in UPGRADE_SENSITIVITY_RECORDS)
          max_lane_chi2 = max(float(row["chi2"]) for row in BRIDGE_LANE_RECORDS)
          min_lane_chi2 = min(float(row["chi2"]) for row in BRIDGE_LANE_RECORDS)
          max_abs_lane_pressure_z = max(abs(float(row["pressure_z"])) for row in BRIDGE_LANE_RECORDS)
          max_condition_proxy = max(float(row["condition_proxy_total_covariance"]) for row in BRIDGE_LANE_RECORDS)

          pressure_z_all_zero = max_abs_lane_pressure_z <= AUDIT_THRESHOLDS["pressure_z_zero_threshold"]
          pressure_z_stable = max_abs_delta_pressure_z <= AUDIT_THRESHOLDS["max_abs_delta_pressure_z_for_stable_diagnostic"]
          chi2_materially_changed_by_source_covariance = max_abs_delta_chi2 >= AUDIT_THRESHOLDS["material_delta_chi2_threshold"]
          high_condition_proxy_warning = max_condition_proxy >= AUDIT_THRESHOLDS["high_condition_proxy_threshold"]

          diagnostic_pressure_stable = bool(pressure_z_all_zero and pressure_z_stable)
          source_covariance_effect_recorded = bool(chi2_materially_changed_by_source_covariance)
          row_column_provenance_required = True
          final_pressure_ready = False

          SENSITIVITY_AUDIT_RESULTS = [
              {
                  "audit_id": "source_covariance_ingested",
                  "observed_value": UPSTREAM_LOCKS["v4_117_observed_covariance_upgrade_probe"]["source_observed_covariance_ingested"],
                  "threshold": True,
                  "pass": UPSTREAM_LOCKS["v4_117_observed_covariance_upgrade_probe"]["source_observed_covariance_ingested"] is True,
                  "interpretation": "The BOSS DR12 source-covariance attempt produced an automatically extracted covariance subblock."
              },
              {
                  "audit_id": "chi2_material_change_recorded",
                  "observed_value": max_abs_delta_chi2,
                  "threshold": AUDIT_THRESHOLDS["material_delta_chi2_threshold"],
                  "pass": chi2_materially_changed_by_source_covariance,
                  "interpretation": "The source-covariance upgrade materially changed chi2, so row/column provenance must be verified before stronger language."
              },
              {
                  "audit_id": "pressure_z_stability",
                  "observed_value": max_abs_delta_pressure_z,
                  "threshold": AUDIT_THRESHOLDS["max_abs_delta_pressure_z_for_stable_diagnostic"],
                  "pass": pressure_z_stable,
                  "interpretation": "The diagnostic pressure_z remains stable even after the source-covariance upgrade."
              },
              {
                  "audit_id": "all_lanes_zero_pressure",
                  "observed_value": max_abs_lane_pressure_z,
                  "threshold": AUDIT_THRESHOLDS["pressure_z_zero_threshold"],
                  "pass": pressure_z_all_zero,
                  "interpretation": "All current lanes still return pressure_z = 0 under the guarded formula."
              },
              {
                  "audit_id": "condition_proxy_warning",
                  "observed_value": max_condition_proxy,
                  "threshold": AUDIT_THRESHOLDS["high_condition_proxy_threshold"],
                  "pass": high_condition_proxy_warning,
                  "interpretation": "The upgraded observed covariance route has high condition proxy and must carry a numerical warning."
              },
              {
                  "audit_id": "row_column_provenance_required",
                  "observed_value": row_column_provenance_required,
                  "threshold": True,
                  "pass": row_column_provenance_required,
                  "interpretation": "Automatic extraction used assumed fσ8 subblock positions; provenance must be audited next."
              }
          ]

          ROW_COLUMN_PROVENANCE_REQUIREMENTS = [
              {
                  "requirement_id": "tarball_member_identity",
                  "requirement": "Identify the exact tarball member used for the primary BOSS source covariance subblock.",
                  "why_needed": "The source object must be traceable before using it in stronger pressure language."
              },
              {
                  "requirement_id": "observable_order_documentation",
                  "requirement": "Verify the covariance row/column observable order for dM, Hz, and fσ8 or equivalent compressed variables.",
                  "why_needed": "The v4.117 automatic extractor assumed fσ8 positions 2, 5, and 8 for a 9x9 matrix."
              },
              {
                  "requirement_id": "redshift_order_documentation",
                  "requirement": "Verify that the covariance subblock redshift order maps exactly to z = 0.38, 0.51, 0.61.",
                  "why_needed": "A correct matrix with wrong redshift ordering corrupts the bridge."
              },
              {
                  "requirement_id": "single_source_selection_rule",
                  "requirement": "Choose and justify one primary covariance source when multiple valid candidates exist.",
                  "why_needed": "v4.117 found multiple subblock candidates; the primary source cannot be arbitrary."
              },
              {
                  "requirement_id": "manual_citation_or_source_note",
                  "requirement": "Write a manual source note linking the chosen covariance object to the BOSS DR12 publication/data release.",
                  "why_needed": "The next public-facing handoff needs clear provenance, not just automated extraction."
              },
              {
                  "requirement_id": "fallback_lane_preserved",
                  "requirement": "Keep the diagonal fallback and observed-only lanes for comparison even after source covariance is verified.",
                  "why_needed": "Sensitivity visibility must not be lost."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Observed RSD covariance is fully final.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The observed covariance upgrade sensitivity audit validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The upgraded bridge pressure is final.",
              "Automatic subblock extraction proves the covariance order.",
              "Zero pressure-z proves TAIRID.",
              "No row-column provenance audit is needed.",
              "No further sensitivity audit is needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_119_BOSS_covariance_row_column_provenance_audit",
                  "purpose": "Verify the exact BOSS covariance source member, observable order, redshift order, and primary-source selection rule.",
                  "why_next": "v4.117 automatically ingested a source covariance subblock and v4.118 found a material chi2 change, so provenance must be locked before stronger use."
              },
              {
                  "priority": 2,
                  "route_id": "v4_120_verified_observed_covariance_bridge_probe",
                  "purpose": "Rerun the observed covariance bridge after the BOSS row/column provenance audit is locked.",
                  "why_next": "The bridge should be recomputed once the covariance source/order are verified."
              },
              {
                  "priority": 3,
                  "route_id": "v4_121_growth_family_expansion_design",
                  "purpose": "Design additional observed growth-family coverage beyond the five-slot bridge vector.",
                  "why_next": "A broader observed-family test can check whether the no-pressure result persists."
              },
              {
                  "priority": 4,
                  "route_id": "v4_122_claim_boundary_review_handoff",
                  "purpose": "Create a human-readable status handoff after covariance provenance and verified bridge rerun.",
                  "why_next": "The result needs careful interpretation before public-facing language."
              }
          ]

          failed_gates = []
          warnings = [
              "sensitivity_audit_only",
              "source_covariance_ingested_but_order_assumed",
              "source_covariance_materially_changed_chi2",
              "pressure_z_stable_all_lanes_zero",
              "high_condition_proxy_warning",
              "row_column_provenance_audit_required",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_117_observed_covariance_upgrade_probe"]

          if upstream["source_observed_covariance_ingested"] is not True:
              failed_gates.append("upstream_source_covariance_not_ingested")

          if upstream["bridge_pressure_computed"] is not True:
              failed_gates.append("upstream_bridge_pressure_not_computed")

          if len(BRIDGE_LANE_RECORDS) != AUDIT_THRESHOLDS["required_lane_count"]:
              failed_gates.append("bridge_lane_count_incorrect")

          if len(UPGRADE_SENSITIVITY_RECORDS) != AUDIT_THRESHOLDS["required_sensitivity_record_count"]:
              failed_gates.append("sensitivity_record_count_incorrect")

          if not diagnostic_pressure_stable:
              failed_gates.append("diagnostic_pressure_z_not_stable")

          if not source_covariance_effect_recorded:
              failed_gates.append("source_covariance_effect_not_recorded")

          if not row_column_provenance_required:
              failed_gates.append("row_column_provenance_requirement_not_carried")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_allowed")

          if len(ROW_COLUMN_PROVENANCE_REQUIREMENTS) < 6:
              failed_gates.append("row_column_provenance_requirements_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "observed rsd covariance is fully final",
              "final rsd pressure score",
              "validates tairid cosmology",
              "automatic subblock extraction proves the covariance order",
              "zero pressure-z proves tairid",
              "no row-column provenance audit is needed",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "observed_covariance_upgrade_sensitivity_audit_passed_pressure_stable_source_covariance_material_ready_for_BOSS_row_column_provenance_audit"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_source_covariance_ingestion_carried",
                  "pass": upstream["source_observed_covariance_ingested"] is True,
                  "result": "v4.117 source covariance ingestion carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "source_covariance_effect_recorded",
                  "pass": source_covariance_effect_recorded,
                  "result": f"max_abs_delta_chi2={max_abs_delta_chi2}",
                  "boundary": "Material chi2 change, not final pressure."
              },
              {
                  "rule_id": "pressure_z_stable",
                  "pass": diagnostic_pressure_stable,
                  "result": f"max_abs_delta_pressure_z={max_abs_delta_pressure_z}; pressure_z_all_zero={pressure_z_all_zero}",
                  "boundary": "Diagnostic pressure stability only."
              },
              {
                  "rule_id": "condition_proxy_warning_carried",
                  "pass": high_condition_proxy_warning,
                  "result": f"max_condition_proxy={max_condition_proxy}",
                  "boundary": "Numerical warning, not failure."
              },
              {
                  "rule_id": "row_column_provenance_required",
                  "pass": row_column_provenance_required,
                  "result": "BOSS covariance row/column provenance audit required before stronger language",
                  "boundary": "Blocks final pressure."
              },
              {
                  "rule_id": "provenance_requirements_declared",
                  "pass": len(ROW_COLUMN_PROVENANCE_REQUIREMENTS) >= 6,
                  "result": f"{len(ROW_COLUMN_PROVENANCE_REQUIREMENTS)} provenance requirements declared",
                  "boundary": "Design next."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False and AUDIT_THRESHOLDS["validation_claim_allowed_now"] is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_118_rules_passed")

          if failed_gates:
              readiness_label = "observed_covariance_upgrade_sensitivity_audit_failed"
              next_allowed_step = "Repair observed covariance upgrade sensitivity audit before BOSS row-column provenance audit."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.119 BOSS covariance row-column provenance audit. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "source_observed_covariance_ingested": upstream["source_observed_covariance_ingested"],
              "covariance_upgrade_status": upstream["covariance_upgrade_status"],
              "boss_subblock_candidate_count": upstream["boss_subblock_candidate_count"],
              "primary_chi2": upstream["primary_chi2"],
              "baseline_diagonal_chi2": upstream["baseline_diagonal_chi2"],
              "primary_pressure_z": upstream["primary_pressure_z"],
              "baseline_diagonal_pressure_z": upstream["baseline_diagonal_pressure_z"],
              "max_abs_delta_chi2": max_abs_delta_chi2,
              "max_abs_delta_pressure_z": max_abs_delta_pressure_z,
              "max_abs_lane_pressure_z": max_abs_lane_pressure_z,
              "max_condition_proxy": max_condition_proxy,
              "chi2_materially_changed_by_source_covariance": chi2_materially_changed_by_source_covariance,
              "pressure_z_all_zero": pressure_z_all_zero,
              "diagnostic_pressure_stable": diagnostic_pressure_stable,
              "high_condition_proxy_warning": high_condition_proxy_warning,
              "row_column_provenance_required": row_column_provenance_required,
              "final_pressure_ready": final_pressure_ready,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "bridge_lane_records": BRIDGE_LANE_RECORDS,
              "upgrade_sensitivity_records": UPGRADE_SENSITIVITY_RECORDS,
              "audit_thresholds": AUDIT_THRESHOLDS,
              "sensitivity_audit_results": SENSITIVITY_AUDIT_RESULTS,
              "row_column_provenance_requirements": ROW_COLUMN_PROVENANCE_REQUIREMENTS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "source_observed_covariance_ingested": upstream["source_observed_covariance_ingested"],
                  "chi2_materially_changed_by_source_covariance": chi2_materially_changed_by_source_covariance,
                  "diagnostic_pressure_stable": diagnostic_pressure_stable,
                  "pressure_z_all_zero": pressure_z_all_zero,
                  "row_column_provenance_required": row_column_provenance_required,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_118_observed_covariance_upgrade_sensitivity_audit.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "bridge_lane_records_v4_118.csv",
              BRIDGE_LANE_RECORDS,
              ["lane_id", "chi2", "dof", "pressure_z", "residual_mean", "rank_total_covariance", "condition_proxy_total_covariance", "source_covariance_status", "claim_scope"]
          )

          write_csv(
              OUTDIR / "upgrade_sensitivity_records_v4_118.csv",
              UPGRADE_SENSITIVITY_RECORDS,
              ["comparison_id", "base_lane", "comparison_lane", "delta_chi2", "delta_pressure_z", "interpretation"]
          )

          write_csv(
              OUTDIR / "sensitivity_audit_results_v4_118.csv",
              SENSITIVITY_AUDIT_RESULTS,
              ["audit_id", "observed_value", "threshold", "pass", "interpretation"]
          )

          write_csv(
              OUTDIR / "row_column_provenance_requirements_v4_118.csv",
              ROW_COLUMN_PROVENANCE_REQUIREMENTS,
              ["requirement_id", "requirement", "why_needed"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_118.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_118.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_118.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.118 — Observed Covariance Upgrade Sensitivity Audit")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.117 successfully ingested an automatic BOSS DR12 source-covariance subblock and recomputed the guarded bridge. v4.118 audits the effect.")
          md.append("")
          md.append("The source covariance materially changed chi2, lowering the primary diagnostic from the old diagonal-fallback value, but pressure_z remained zero across all lanes. Because the automatic extraction used an assumed subblock order, the next step must verify BOSS row/column provenance before any stronger language.")
          md.append("")
          md.append("This does not compute final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## Sensitivity summary")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Audit results")
          md.append("")
          md.append("| Audit | Observed | Threshold | Pass |")
          md.append("|---|---:|---|---|")
          for row in SENSITIVITY_AUDIT_RESULTS:
              md.append(f"| `{row['audit_id']}` | `{row['observed_value']}` | `{row['threshold']}` | `{row['pass']}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_118_observed_covariance_upgrade_sensitivity_audit.json",
              "tairid_v4_118_observed_covariance_upgrade_sensitivity_audit.md",
              "bridge_lane_records_v4_118.csv",
              "upgrade_sensitivity_records_v4_118.csv",
              "sensitivity_audit_results_v4_118.csv",
              "row_column_provenance_requirements_v4_118.csv",
              "blocked_claims_v4_118.csv",
              "next_route_options_v4_118.csv",
              "rule_results_v4_118.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_118_observed_covariance_upgrade_sensitivity_audit.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

