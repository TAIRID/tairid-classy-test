name: 000 TAIRID v4.89 Sample Packet Microbatch Solver Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-89-sample-packet-microbatch-solver-design.yml"

jobs:
  tairid-v4-89-sample-packet-microbatch-solver-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.89 sample packet microbatch solver design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_89_sample_packet_microbatch_solver_design

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_89_sample_packet_microbatch_solver_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_89_sample_packet_microbatch_solver_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse additional chain sample files.",
              "This does not run CAMB.",
              "This does not compute Planck reference uncertainty.",
              "This does not compute a covariance matrix.",
              "This does not compute a weighted posterior mean.",
              "This designs a tiny CAMB microbatch using the v4.88 parsed sample packets.",
              "A pass means the sample-packet microbatch contract is ready for a bounded solver probe, not that posterior uncertainty has been computed."
          ]

          UPSTREAM_LOCKS = {
              "v4_88_chain_sample_tiny_subset_parser_probe": {
                  "readiness_label": "chain_sample_tiny_subset_parser_probe_passed_ready_for_sample_packet_microbatch_solver_design",
                  "chain_samples_parsed": True,
                  "sample_packet_count": 12,
                  "required_primary_present": True,
                  "sample_weights_ok": True,
                  "sample_loglike_ok": True,
                  "sample_primary_values_ok": True,
                  "future_CAMB_run_blocked": True,
                  "CAMB_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_86_single_fixture_residual_audit": {
                  "readiness_label": "single_fixture_residual_audit_passed_ready_for_reference_uncertainty_chain_sample_design",
                  "single_fixture_residual_audit_passed": True,
                  "accepted_locked_orientation": "reversed_raw_order",
                  "Planck_reference_uncertainty_computed": False
              },
              "v4_85_single_fixture_output_shape_and_orientation_lock": {
                  "locked_orientation": "reversed_raw_order",
                  "orientation_locked_for_next_test": True,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015"},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038"},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051"},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061"},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233"}
          ]

          SAMPLE_PACKETS = [
              {"sample_number": 1, "source_line_number": 1, "sample_weight": 5.0, "minus_loglike_or_proxy": 1395.015, "omegabh2": 0.02216658, "omegach2": 0.1210046, "theta": 1.040279, "tau": 0.04369046, "logA": 3.029502, "ns": 0.9623149, "cosmomc_theta_for_future_CAMB": 0.01040279, "As_for_future_CAMB": 2.0686927933632234e-09},
              {"sample_number": 2, "source_line_number": 2, "sample_weight": 1.0, "minus_loglike_or_proxy": 1395.388, "omegabh2": 0.02218979, "omegach2": 0.1205304, "theta": 1.040288, "tau": 0.04206461, "logA": 3.025793, "ns": 0.9635807, "cosmomc_theta_for_future_CAMB": 0.010402880000000002, "As_for_future_CAMB": 2.061034223390361e-09},
              {"sample_number": 3, "source_line_number": 3, "sample_weight": 5.0, "minus_loglike_or_proxy": 1408.35, "omegabh2": 0.02209695, "omegach2": 0.1204623, "theta": 1.040111, "tau": 0.03835893, "logA": 3.010538, "ns": 0.9612586, "cosmomc_theta_for_future_CAMB": 0.01040111, "As_for_future_CAMB": 2.02983174829604e-09},
              {"sample_number": 4, "source_line_number": 4, "sample_weight": 2.0, "minus_loglike_or_proxy": 1403.674, "omegabh2": 0.02212132, "omegach2": 0.1207202, "theta": 1.040009, "tau": 0.03892281, "logA": 3.011326, "ns": 0.9603125, "cosmomc_theta_for_future_CAMB": 0.010400089999999999, "As_for_future_CAMB": 2.031431886085187e-09},
              {"sample_number": 5, "source_line_number": 5, "sample_weight": 2.0, "minus_loglike_or_proxy": 1399.621, "omegabh2": 0.02215665, "omegach2": 0.1206029, "theta": 1.040078, "tau": 0.04707227, "logA": 3.028275, "ns": 0.962265, "cosmomc_theta_for_future_CAMB": 0.01040078, "As_for_future_CAMB": 2.066156063907548e-09},
              {"sample_number": 6, "source_line_number": 6, "sample_weight": 4.0, "minus_loglike_or_proxy": 1395.276, "omegabh2": 0.02214124, "omegach2": 0.1210155, "theta": 1.040316, "tau": 0.04831556, "logA": 3.029778, "ns": 0.9593876, "cosmomc_theta_for_future_CAMB": 0.01040316, "As_for_future_CAMB": 2.0692638313738124e-09},
              {"sample_number": 7, "source_line_number": 7, "sample_weight": 2.0, "minus_loglike_or_proxy": 1392.297, "omegabh2": 0.02218488, "omegach2": 0.120793, "theta": 1.04033, "tau": 0.05150504, "logA": 3.035247, "ns": 0.9600906, "cosmomc_theta_for_future_CAMB": 0.010403299999999999, "As_for_future_CAMB": 2.080611637559254e-09},
              {"sample_number": 8, "source_line_number": 8, "sample_weight": 1.0, "minus_loglike_or_proxy": 1395.241, "omegabh2": 0.02218953, "omegach2": 0.1208362, "theta": 1.040383, "tau": 0.0513925, "logA": 3.034896, "ns": 0.959871, "cosmomc_theta_for_future_CAMB": 0.010403830000000001, "As_for_future_CAMB": 2.0798814710261934e-09},
              {"sample_number": 9, "source_line_number": 9, "sample_weight": 2.0, "minus_loglike_or_proxy": 1401.216, "omegabh2": 0.02218699, "omegach2": 0.1202546, "theta": 1.040646, "tau": 0.04547102, "logA": 3.028586, "ns": 0.9612773, "cosmomc_theta_for_future_CAMB": 0.01040646, "As_for_future_CAMB": 2.0667987383741224e-09},
              {"sample_number": 10, "source_line_number": 10, "sample_weight": 2.0, "minus_loglike_or_proxy": 1392.132, "omegabh2": 0.0221458, "omegach2": 0.1207412, "theta": 1.040784, "tau": 0.04481115, "logA": 3.026835, "ns": 0.9612329, "cosmomc_theta_for_future_CAMB": 0.01040784, "As_for_future_CAMB": 2.063182940338247e-09},
              {"sample_number": 11, "source_line_number": 11, "sample_weight": 3.0, "minus_loglike_or_proxy": 1396.572, "omegabh2": 0.02214952, "omegach2": 0.1204577, "theta": 1.040809, "tau": 0.04500087, "logA": 3.025849, "ns": 0.9619075, "cosmomc_theta_for_future_CAMB": 0.010408090000000002, "As_for_future_CAMB": 2.0611496445386326e-09},
              {"sample_number": 12, "source_line_number": 12, "sample_weight": 1.0, "minus_loglike_or_proxy": 1391.129, "omegabh2": 0.02220349, "omegach2": 0.1198317, "theta": 1.040779, "tau": 0.04580805, "logA": 3.026048, "ns": 0.9633901, "cosmomc_theta_for_future_CAMB": 0.010407789999999998, "As_for_future_CAMB": 2.0615598541323967e-09}
          ]

          MICROBatch_LIMITS = {
              "sample_count": 12,
              "max_solver_samples_next_probe": 12,
              "target_redshift_count": 5,
              "target_output_quantity_count": 10,
              "kmax": 2.0,
              "nonlinear": False,
              "locked_orientation": "reversed_raw_order",
              "run_CAMB_now": False
          }

          OUTPUT_VECTOR_SCHEMA = [
              {"position": 0, "quantity": "sigma8z", "z": 0.15, "target_name": "sigma8z015"},
              {"position": 1, "quantity": "fsigma8", "z": 0.15, "target_name": "fsigma8z015"},
              {"position": 2, "quantity": "sigma8z", "z": 0.38, "target_name": "sigma8z038"},
              {"position": 3, "quantity": "fsigma8", "z": 0.38, "target_name": "fsigma8z038"},
              {"position": 4, "quantity": "sigma8z", "z": 0.51, "target_name": "sigma8z051"},
              {"position": 5, "quantity": "fsigma8", "z": 0.51, "target_name": "fsigma8z051"},
              {"position": 6, "quantity": "sigma8z", "z": 0.61, "target_name": "sigma8z061"},
              {"position": 7, "quantity": "fsigma8", "z": 0.61, "target_name": "fsigma8z061"},
              {"position": 8, "quantity": "sigma8z", "z": 2.33, "target_name": "sigma8z233"},
              {"position": 9, "quantity": "fsigma8", "z": 2.33, "target_name": "fsigma8z233"}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A weighted covariance matrix was computed.",
              "A weighted posterior mean vector was computed.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The microbatch design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The tiny sample packet design is the same as full Planck reference uncertainty.",
              "The sample packet microbatch has already been run through CAMB.",
              "The twelve sample packets are enough for final RSD pressure."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_90_sample_packet_microbatch_solver_probe",
                  "purpose": "Run CAMB over the 12 parsed sample packets and write one 10-dimensional output vector per sample.",
                  "why_next": "Reference uncertainty requires solver outputs across multiple weighted samples."
              },
              {
                  "priority": 2,
                  "route_id": "v4_91_weighted_covariance_formula_lock",
                  "purpose": "Lock weighted mean and covariance formulas after sample output vectors exist.",
                  "why_next": "Final RSD pressure needs covariance, not point fixtures."
              },
              {
                  "priority": 3,
                  "route_id": "v4_92_reference_uncertainty_micro_covariance_probe",
                  "purpose": "Compute a tiny-subset covariance diagnostic only after formula lock.",
                  "why_next": "The covariance calculation needs output vectors first."
              },
              {
                  "priority": 4,
                  "route_id": "v4_93_ELG_or_WiggleZ_parallel_backlog",
                  "purpose": "Parallel route for parked growth-family incompleteness.",
                  "why_next": "ELG and WiggleZ remain incomplete."
              }
          ]

          failed_gates = []
          warnings = [
              "microbatch_solver_design_only",
              "uses_v4_88_sample_packets",
              "no_CAMB_run",
              "no_weighted_mean",
              "no_covariance_computation",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def finite(value):
              try:
                  return math.isfinite(float(value))
              except Exception:
                  return False

          def positive(value):
              return finite(value) and float(value) > 0

          def plausible_packet(packet):
              return (
                  0.005 < packet["omegabh2"] < 0.04
                  and 0.05 < packet["omegach2"] < 0.30
                  and 0.5 < packet["theta"] < 2.0
                  and 0.01 < packet["tau"] < 0.20
                  and 2.0 < packet["logA"] < 4.0
                  and 0.8 < packet["ns"] < 1.2
                  and 0.001 < packet["cosmomc_theta_for_future_CAMB"] < 0.1
                  and 1.0e-9 < packet["As_for_future_CAMB"] < 3.5e-9
              )

          weight_sum = sum(float(row["sample_weight"]) for row in SAMPLE_PACKETS)

          sample_validation_records = []
          camb_input_contract_records = []

          for row in SAMPLE_PACKETS:
              weight = float(row["sample_weight"])
              normalized_weight_preview = weight / weight_sum if weight_sum > 0 else ""

              sample_validation_records.append({
                  "sample_number": row["sample_number"],
                  "source_line_number": row["source_line_number"],
                  "sample_weight": row["sample_weight"],
                  "normalized_weight_preview": normalized_weight_preview,
                  "minus_loglike_or_proxy": row["minus_loglike_or_proxy"],
                  "weight_positive_finite": positive(row["sample_weight"]),
                  "minus_loglike_finite": finite(row["minus_loglike_or_proxy"]),
                  "primary_values_plausible": plausible_packet(row),
                  "future_camb_packet_ready": positive(row["sample_weight"]) and finite(row["minus_loglike_or_proxy"]) and plausible_packet(row),
                  "validation_scope": "microbatch_design_only_not_solver_output"
              })

              camb_input_contract_records.append({
                  "sample_number": row["sample_number"],
                  "H0": "",
                  "ombh2": row["omegabh2"],
                  "omch2": row["omegach2"],
                  "cosmomc_theta": row["cosmomc_theta_for_future_CAMB"],
                  "tau": row["tau"],
                  "omk": 0.0,
                  "mnu": 0.06,
                  "As": row["As_for_future_CAMB"],
                  "ns": row["ns"],
                  "redshifts": json.dumps([target["z"] for target in TARGET_REDSHIFTS]),
                  "kmax": MICROBatch_LIMITS["kmax"],
                  "nonlinear": MICROBatch_LIMITS["nonlinear"],
                  "locked_output_orientation": MICROBatch_LIMITS["locked_orientation"],
                  "run_allowed_now": False,
                  "contract_scope": "future_CAMB_microbatch_input_contract"
              })

          microbatch_run_contract = {
              "contract_status": "design_only_not_run",
              "solver": "CAMB",
              "camb_version_expected_from_prior_probe": "1.6.6",
              "fresh_python_runner_required": True,
              "sample_count": len(SAMPLE_PACKETS),
              "max_solver_samples_next_probe": MICROBatch_LIMITS["max_solver_samples_next_probe"],
              "target_redshifts": [row["z"] for row in TARGET_REDSHIFTS],
              "locked_output_orientation": MICROBatch_LIMITS["locked_orientation"],
              "raw_CAMB_arrays_must_be_reversed_before_vectorization": True,
              "output_vector_dimension": len(OUTPUT_VECTOR_SCHEMA),
              "per_sample_required_outputs": ["sigma8_values_raw", "fsigma8_values_raw", "sigma8_values_oriented", "fsigma8_values_oriented", "target_vector_10"],
              "run_CAMB_now": False,
              "compute_weighted_mean_now": False,
              "compute_covariance_now": False,
              "compute_reference_uncertainty_now": False,
              "compute_final_pressure_now": False
          }

          solver_probe_steps = [
              {
                  "step": 1,
                  "action": "Install numpy, scipy, sympy, packaging, and camb with prefer-binary.",
                  "output": "Dependency/install record.",
                  "boundary": "Dependency setup only."
              },
              {
                  "step": 2,
                  "action": "Launch a fresh external Python runner after install.",
                  "output": "Runner JSON with CAMB import status.",
                  "boundary": "Avoid active-process package visibility failure."
              },
              {
                  "step": 3,
                  "action": "For each of the 12 sample packets, build CAMBparams with H0 omitted/None and cosmomc_theta supplied.",
                  "output": "Per-sample input record.",
                  "boundary": "No full chain import."
              },
              {
                  "step": 4,
                  "action": "Run CAMB for each sample packet and collect get_sigma8/get_fsigma8 raw arrays.",
                  "output": "Raw sigma8/fsigma8 arrays.",
                  "boundary": "Tiny microbatch only."
              },
              {
                  "step": 5,
                  "action": "Reverse raw arrays using the v4.85 orientation lock and interleave into the 10-dimensional target vector.",
                  "output": "One target vector per sample.",
                  "boundary": "No covariance yet."
              },
              {
                  "step": 6,
                  "action": "Preserve sample weights beside target vectors.",
                  "output": "Weighted sample-vector packet table.",
                  "boundary": "Do not compute weighted mean or covariance in the solver probe."
              }
          ]

          design_summary = {
              "sample_packets_available": len(SAMPLE_PACKETS),
              "weight_sum_preview": weight_sum,
              "all_sample_weights_positive": all(row["weight_positive_finite"] for row in sample_validation_records),
              "all_sample_loglike_finite": all(row["minus_loglike_finite"] for row in sample_validation_records),
              "all_sample_primary_values_plausible": all(row["primary_values_plausible"] for row in sample_validation_records),
              "all_future_camb_packets_ready": all(row["future_camb_packet_ready"] for row in sample_validation_records),
              "camb_input_contract_count": len(camb_input_contract_records),
              "output_vector_dimension": len(OUTPUT_VECTOR_SCHEMA),
              "locked_orientation": MICROBatch_LIMITS["locked_orientation"],
              "solver_probe_step_count": len(solver_probe_steps),
              "run_CAMB_now": False,
              "weighted_mean_computed": False,
              "weighted_covariance_matrix_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "final_RSD_pressure_score_computed": False
          }

          if UPSTREAM_LOCKS["v4_88_chain_sample_tiny_subset_parser_probe"]["sample_packet_count"] != len(SAMPLE_PACKETS):
              failed_gates.append("sample_packet_count_mismatch_with_upstream")

          if UPSTREAM_LOCKS["v4_88_chain_sample_tiny_subset_parser_probe"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          if MICROBatch_LIMITS["locked_orientation"] != "reversed_raw_order":
              failed_gates.append("locked_orientation_not_reversed_raw_order")

          if len(SAMPLE_PACKETS) != 12:
              failed_gates.append("sample_packet_count_not_12")

          if weight_sum <= 0:
              failed_gates.append("sample_weight_sum_not_positive")

          if not design_summary["all_sample_weights_positive"]:
              failed_gates.append("not_all_sample_weights_positive")

          if not design_summary["all_sample_loglike_finite"]:
              failed_gates.append("not_all_loglike_values_finite")

          if not design_summary["all_sample_primary_values_plausible"]:
              failed_gates.append("not_all_primary_values_plausible")

          if len(camb_input_contract_records) != len(SAMPLE_PACKETS):
              failed_gates.append("camb_input_contract_count_mismatch")

          if len(OUTPUT_VECTOR_SCHEMA) != 10:
              failed_gates.append("output_vector_dimension_not_10")

          if len(solver_probe_steps) < 6:
              failed_gates.append("solver_probe_steps_incomplete")

          if microbatch_run_contract["run_CAMB_now"] is not False:
              failed_gates.append("CAMB_run_allowed_too_early")

          if microbatch_run_contract["compute_weighted_mean_now"] is not False:
              failed_gates.append("weighted_mean_computed_too_early")

          if microbatch_run_contract["compute_covariance_now"] is not False:
              failed_gates.append("covariance_computed_too_early")

          if microbatch_run_contract["compute_reference_uncertainty_now"] is not False:
              failed_gates.append("reference_uncertainty_computed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "weighted covariance matrix was computed",
              "weighted posterior mean vector was computed",
              "final rsd pressure score",
              "validates tairid cosmology",
              "sample packet microbatch has already been run through camb",
              "twelve sample packets are enough for final rsd pressure",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "sample_packet_microbatch_solver_design_passed_ready_for_sample_packet_microbatch_solver_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_sample_packets_carried",
                  "pass": UPSTREAM_LOCKS["v4_88_chain_sample_tiny_subset_parser_probe"]["sample_packet_count"] == 12,
                  "result": "12 parsed sample packets carried from v4.88",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "sample_packet_validation_passed",
                  "pass": design_summary["all_future_camb_packets_ready"],
                  "result": "all sample weights, loglike values, and primary values are usable for a future microbatch",
                  "boundary": "No CAMB run."
              },
              {
                  "rule_id": "camb_input_contract_declared",
                  "pass": len(camb_input_contract_records) == len(SAMPLE_PACKETS),
                  "result": f"{len(camb_input_contract_records)} per-sample CAMB input contracts declared",
                  "boundary": "Input contract only."
              },
              {
                  "rule_id": "orientation_lock_carried",
                  "pass": MICROBatch_LIMITS["locked_orientation"] == "reversed_raw_order",
                  "result": "future raw CAMB arrays must be reversed before vectorization",
                  "boundary": "Orientation only."
              },
              {
                  "rule_id": "output_vector_schema_declared",
                  "pass": len(OUTPUT_VECTOR_SCHEMA) == 10,
                  "result": "10-dimensional sigma8z/fsigma8 target vector declared",
                  "boundary": "No output vectors computed."
              },
              {
                  "rule_id": "solver_probe_steps_declared",
                  "pass": len(solver_probe_steps) >= 6,
                  "result": f"{len(solver_probe_steps)} solver probe steps declared",
                  "boundary": "Next workflow only."
              },
              {
                  "rule_id": "CAMB_run_still_blocked",
                  "pass": microbatch_run_contract["run_CAMB_now"] is False,
                  "result": "CAMB microbatch run blocked until v4.90",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "weighted_mean_and_covariance_still_blocked",
                  "pass": microbatch_run_contract["compute_weighted_mean_now"] is False and microbatch_run_contract["compute_covariance_now"] is False,
                  "result": "weighted mean and covariance not computed",
                  "boundary": "No reference uncertainty."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_89_rules_passed")

          if failed_gates:
              readiness_label = "sample_packet_microbatch_solver_design_failed"
              next_allowed_step = "Repair the microbatch solver design before running any sample-packet CAMB probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
