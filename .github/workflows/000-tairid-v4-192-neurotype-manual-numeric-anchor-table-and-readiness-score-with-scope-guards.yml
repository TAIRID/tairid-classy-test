name: 000 TAIRID v4.192 - Neurotype Manual Numeric Anchor Table And Readiness Score With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-192-neurotype-manual-numeric-anchor-table-and-readiness-score-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-192-neurotype-manual-numeric-anchor-table:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.192 neurotype manual numeric anchor table and readiness score
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_192_outputs
          cat > tairid_v4_192_outputs/run_v4_192.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_192_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "neurotype_manual_numeric_anchor_table_and_readiness_score_passed_manual_anchor_artifacts_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "manual numeric anchors are not external replication",
              "readiness score is not validation",
              "TAIRID not proved"
          ]

          V4_191_STATUS = {
              "version": "v4.191",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "candidate_files_found": 7,
              "numeric_anchor_targets": 8,
              "verified_anchor_count": 0,
              "candidate_file_match_count": 0,
              "package_status": "no_uploaded_paper_files_found_in_repo_numeric_targets_written",
              "selected_next_route": "upload_or_commit_neurotype_papers_or_manual_numeric_table_with_scope_guards"
          }

          # Manually carried forward from the uploaded corpus review.
          # These anchors are paper-grounded from the conversation/corpus,
          # but are not re-verified from committed repo files in this workflow.
          MANUAL_ANCHORS = [
              {
                  "lane": "Dyslexia",
                  "case_id": "Dyslexia_ETDD70_reading_flow_viability_window",
                  "anchor_kind": "exact_numeric",
                  "metric": "four_axis_model_balanced_accuracy",
                  "value": "0.857",
                  "unit_or_scale": "balanced_accuracy",
                  "role_axis": "shape_model_quality",
                  "shape_signature": "++-",
                  "evidence_level": "direct_computed_eye_tracking_lane",
                  "source_basis": "uploaded ETDD70 paper summary",
                  "safe_use": "numeric anchor for paper-grounded readiness only"
              },
              {
                  "lane": "Dyslexia",
                  "case_id": "Dyslexia_ETDD70_reading_flow_viability_window",
                  "anchor_kind": "exact_numeric",
                  "metric": "four_axis_model_auc",
                  "value": "0.932",
                  "unit_or_scale": "AUC",
                  "role_axis": "shape_model_quality",
                  "shape_signature": "++-",
                  "evidence_level": "direct_computed_eye_tracking_lane",
                  "source_basis": "uploaded ETDD70 paper summary",
                  "safe_use": "numeric anchor for paper-grounded readiness only"
              },
              {
                  "lane": "Dyslexia",
                  "case_id": "Dyslexia_ETDD70_reading_flow_viability_window",
                  "anchor_kind": "directional_axis_pattern",
                  "metric": "s_A_up_lambda_R_up_rho_R_down_V_data_down",
                  "value": "+,+,-,-",
                  "unit_or_scale": "directional",
                  "role_axis": "propagation/pacing load high, re-entry and viability low",
                  "shape_signature": "++-",
                  "evidence_level": "direct_computed_eye_tracking_lane",
                  "source_basis": "uploaded ETDD70 paper summary",
                  "safe_use": "directional shape anchor only"
              },
              {
                  "lane": "Aphantasia",
                  "case_id": "Aphantasia_visual_reconstruction_response_gap",
                  "anchor_kind": "exact_numeric",
                  "metric": "drawing_burden_effect_size_d",
                  "value": "1.013",
                  "unit_or_scale": "Cohen_d_like_effect_size",
                  "role_axis": "visual_reconstruction_burden",
                  "shape_signature": "-+-",
                  "evidence_level": "direct_computed_two_shape_lane",
                  "source_basis": "uploaded aphantasia paper summary",
                  "safe_use": "numeric anchor for paper-grounded readiness only"
              },
              {
                  "lane": "Aphantasia",
                  "case_id": "Aphantasia_visual_reconstruction_response_gap",
                  "anchor_kind": "exact_numeric",
                  "metric": "physiology_burden_effect_size_d",
                  "value": "1.553",
                  "unit_or_scale": "Cohen_d_like_effect_size",
                  "role_axis": "physiology_response_burden",
                  "shape_signature": "-+-",
                  "evidence_level": "direct_computed_two_shape_lane",
                  "source_basis": "uploaded aphantasia paper summary",
                  "safe_use": "numeric anchor for paper-grounded readiness only"
              },
              {
                  "lane": "Aphantasia",
                  "case_id": "Aphantasia_visual_reconstruction_response_gap",
                  "anchor_kind": "directional_axis_pattern",
                  "metric": "rho_R_lower_lambda_R_higher_s_A_mismatch_V_lower",
                  "value": "-,+,M,-",
                  "unit_or_scale": "directional",
                  "role_axis": "visual re-entry lower, residue/load higher, viability lower",
                  "shape_signature": "-+-",
                  "evidence_level": "direct_computed_two_shape_lane",
                  "source_basis": "uploaded aphantasia paper summary",
                  "safe_use": "directional shape anchor only"
              },
              {
                  "lane": "ADHD",
                  "case_id": "ADHD_ds003500_selective_attention_width_over_depth",
                  "anchor_kind": "directional_axis_pattern",
                  "metric": "higher_width_lower_depth_lower_gate_lower_viability",
                  "value": "+,-,-,-",
                  "unit_or_scale": "directional",
                  "role_axis": "width over depth vulnerability",
                  "shape_signature": "++-",
                  "evidence_level": "direct_computed_behavioral_lane",
                  "source_basis": "uploaded ADHD paper summary",
                  "safe_use": "directional paper-grounded anchor only"
              },
              {
                  "lane": "Autism",
                  "case_id": "Autism_measured_dispersion_search_correction",
                  "anchor_kind": "correction_anchor",
                  "metric": "initial_compact_depth_prediction_failed_dispersion_search_stronger",
                  "value": "corrected_model",
                  "unit_or_scale": "model_correction",
                  "role_axis": "do not force compact-depth autism row",
                  "shape_signature": "++-",
                  "evidence_level": "direct_computed_model_correction_lane",
                  "source_basis": "uploaded autism paper summary",
                  "safe_use": "correction guardrail and directional anchor only"
              },
              {
                  "lane": "Bipolar",
                  "case_id": "Bipolar_depressive_compressed_rhythm_basin",
                  "anchor_kind": "directional_axis_pattern",
                  "metric": "reduced_beta_swing_reduced_s_A_swing_reduced_V_swing_positive_boundary_compression",
                  "value": "-,-,-,+",
                  "unit_or_scale": "directional",
                  "role_axis": "compressed consolidation-heavy rhythm basin",
                  "shape_signature": "--+",
                  "evidence_level": "direct_computed_depression_side_lane",
                  "source_basis": "uploaded bipolar paper summary",
                  "safe_use": "constraint row; + consolidation means compressed/locked not healthy"
              },
              {
                  "lane": "Bipolar",
                  "case_id": "Bipolar_mania_hypomania_propagation_expansion",
                  "anchor_kind": "directional_axis_pattern",
                  "metric": "propagation_heavy_activity_expansion_sleep_rest_consolidation_reduced",
                  "value": "+,+,-",
                  "unit_or_scale": "directional",
                  "role_axis": "phase-specific propagation expansion",
                  "shape_signature": "++-",
                  "evidence_level": "published_support_lane_raw_reanalysis_pending",
                  "source_basis": "uploaded bipolar paper summary",
                  "safe_use": "provisional direction anchor only"
              },
              {
                  "lane": "Schizotypy",
                  "case_id": "Schizotypy_positive_reference_field_overreach",
                  "anchor_kind": "directional_axis_pattern",
                  "metric": "weak_false_anchor_acceptance_lures_more_than_target_recognition",
                  "value": "+,+,-",
                  "unit_or_scale": "directional",
                  "role_axis": "reference-field overreach with weaker anchor specificity",
                  "shape_signature": "++-",
                  "evidence_level": "computed_reach_plus_summary_anchor_lane",
                  "source_basis": "uploaded schizotypy paper summary",
                  "safe_use": "positive trait lane only; not clinical schizophrenia"
              }
          ]

          PROMOTED_ROWS = [
              {"lane": "ADHD", "case_id": "ADHD_ds003500_selective_attention_width_over_depth", "signature": "++-", "promotion_tier": "core_promote"},
              {"lane": "ADHD", "case_id": "ADHD_EEG_arousal_constraint_lane", "signature": "--+", "promotion_tier": "constraint_promote"},
              {"lane": "Dyslexia", "case_id": "Dyslexia_ETDD70_reading_flow_viability_window", "signature": "++-", "promotion_tier": "core_promote"},
              {"lane": "Aphantasia", "case_id": "Aphantasia_visual_reconstruction_response_gap", "signature": "-+-", "promotion_tier": "core_promote"},
              {"lane": "Aphantasia", "case_id": "Aphantasia_preserved_input_effort_support_lane", "signature": "0+0", "promotion_tier": "constraint_promote"},
              {"lane": "Autism", "case_id": "Autism_measured_dispersion_search_correction", "signature": "++-", "promotion_tier": "core_promote"},
              {"lane": "Bipolar", "case_id": "Bipolar_depressive_compressed_rhythm_basin", "signature": "--+", "promotion_tier": "constraint_promote"},
              {"lane": "Bipolar", "case_id": "Bipolar_mania_hypomania_propagation_expansion", "signature": "++-", "promotion_tier": "provisional_promote"},
              {"lane": "Bipolar", "case_id": "Bipolar_euthymia_reference_rhythm", "signature": "00+", "promotion_tier": "reference_promote"},
              {"lane": "Schizotypy", "case_id": "Schizotypy_positive_reference_field_overreach", "signature": "++-", "promotion_tier": "core_promote"}
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def read_optional_manual_csv():
              rows = []
              paths = [
                  Path("data/neurotype/manual_numeric_anchor_table.csv"),
                  Path("data/cross_domain/manual_numeric_anchor_table.csv")
              ]
              for path in paths:
                  if path.exists():
                      with open(path, newline="", encoding="utf-8") as f:
                          for row in csv.DictReader(f):
                              row["_source_file"] = str(path)
                              rows.append(row)
              return rows

          optional_rows = read_optional_manual_csv()
          all_anchor_rows = MANUAL_ANCHORS + optional_rows

          by_case = {}
          for anchor in all_anchor_rows:
              case = anchor.get("case_id", "")
              if not case:
                  continue
              by_case.setdefault(case, {"exact_numeric": 0, "directional": 0, "correction": 0, "total": 0})
              by_case[case]["total"] += 1
              kind = anchor.get("anchor_kind", "")
              if kind == "exact_numeric":
                  by_case[case]["exact_numeric"] += 1
              elif "directional" in kind:
                  by_case[case]["directional"] += 1
              elif "correction" in kind:
                  by_case[case]["correction"] += 1

          readiness_rows = []
          for row in PROMOTED_ROWS:
              counts = by_case.get(row["case_id"], {"exact_numeric": 0, "directional": 0, "correction": 0, "total": 0})
              # Readiness score is only a triage score. It is not a validation score.
              tier_bonus = {
                  "core_promote": 2,
                  "constraint_promote": 1,
                  "provisional_promote": 0,
                  "reference_promote": 0
              }.get(row["promotion_tier"], 0)
              readiness_score = counts["exact_numeric"] * 3 + counts["directional"] * 1 + counts["correction"] * 1 + tier_bonus
              if counts["exact_numeric"] >= 2:
                  readiness_class = "numeric_ready"
              elif counts["exact_numeric"] >= 1:
                  readiness_class = "partly_numeric_ready"
              elif counts["directional"] or counts["correction"]:
                  readiness_class = "directional_ready"
              else:
                  readiness_class = "paper_grounded_but_missing_anchor"
              readiness_rows.append({
                  "lane": row["lane"],
                  "case_id": row["case_id"],
                  "shape_signature": row["signature"],
                  "promotion_tier": row["promotion_tier"],
                  "exact_numeric_anchor_count": counts["exact_numeric"],
                  "directional_anchor_count": counts["directional"],
                  "correction_anchor_count": counts["correction"],
                  "total_anchor_count": counts["total"],
                  "readiness_score_not_validation": readiness_score,
                  "readiness_class_not_validation": readiness_class,
                  "safe_use": "triage next numeric extraction; not evidence of truth"
              })

          lane_rows = {}
          for row in readiness_rows:
              lane = row["lane"]
              lane_rows.setdefault(lane, {"lane": lane, "cases": 0, "exact_numeric": 0, "directional": 0, "correction": 0, "total": 0, "max_readiness": 0})
              lane_rows[lane]["cases"] += 1
              lane_rows[lane]["exact_numeric"] += int(row["exact_numeric_anchor_count"])
              lane_rows[lane]["directional"] += int(row["directional_anchor_count"])
              lane_rows[lane]["correction"] += int(row["correction_anchor_count"])
              lane_rows[lane]["total"] += int(row["total_anchor_count"])
              lane_rows[lane]["max_readiness"] = max(lane_rows[lane]["max_readiness"], int(row["readiness_score_not_validation"]))

          next_numeric_work = [
              {
                  "priority": 1,
                  "lane": "Dyslexia",
                  "reason": "best exact numeric anchors already present",
                  "next_work": "extract group means/SD for s_A, lambda_R, rho_R, V_data and covariance if available"
              },
              {
                  "priority": 2,
                  "lane": "Aphantasia",
                  "reason": "effect-size anchors already present",
                  "next_work": "extract separate visual reconstruction, physiology, perception/input, and effort/load numeric tables"
              },
              {
                  "priority": 3,
                  "lane": "ADHD",
                  "reason": "strong directional lane but exact numbers still need extraction",
                  "next_work": "extract width, depth, gate stability, instability, and viability numeric values"
              },
              {
                  "priority": 4,
                  "lane": "Autism",
                  "reason": "important correction lane prevents forced fit",
                  "next_work": "extract dispersion/search and boundary-compaction numeric deltas"
              },
              {
                  "priority": 5,
                  "lane": "Bipolar",
                  "reason": "phase-specific rows need numeric phase surfaces",
                  "next_work": "extract depression-side swing/compression metrics and find mania/euthymia numeric phase rows"
              },
              {
                  "priority": 6,
                  "lane": "Schizotypy",
                  "reason": "positive overreach row is usable but trait split needs numbers",
                  "next_work": "extract lure/target/anchor integrity values by positive, disorganized, negative traits"
              }
          ]

          write_csv(OUT / "v4_192_v4_191_status_review.csv", [V4_191_STATUS], list(V4_191_STATUS.keys()))
          (OUT / "v4_192_v4_191_status_review.json").write_text(json.dumps(V4_191_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_192_manual_numeric_anchor_table.csv", MANUAL_ANCHORS, ["lane", "case_id", "anchor_kind", "metric", "value", "unit_or_scale", "role_axis", "shape_signature", "evidence_level", "source_basis", "safe_use"])
          write_csv(OUT / "v4_192_optional_user_numeric_anchor_rows.csv", optional_rows, list(optional_rows[0].keys()) if optional_rows else ["_source_file"])
          write_csv(OUT / "v4_192_combined_numeric_anchor_table.csv", all_anchor_rows, list(MANUAL_ANCHORS[0].keys()) if not optional_rows else sorted(set().union(*[r.keys() for r in all_anchor_rows])))
          write_csv(OUT / "v4_192_neurotype_readiness_score_table.csv", readiness_rows, ["lane", "case_id", "shape_signature", "promotion_tier", "exact_numeric_anchor_count", "directional_anchor_count", "correction_anchor_count", "total_anchor_count", "readiness_score_not_validation", "readiness_class_not_validation", "safe_use"])
          write_csv(OUT / "v4_192_lane_anchor_coverage.csv", list(lane_rows.values()), ["lane", "cases", "exact_numeric", "directional", "correction", "total", "max_readiness"])
          write_csv(OUT / "v4_192_next_numeric_work_plan.csv", next_numeric_work, ["priority", "lane", "reason", "next_work"])

          exact_numeric_count = sum(1 for r in all_anchor_rows if r.get("anchor_kind") == "exact_numeric")
          directional_count = sum(1 for r in all_anchor_rows if "directional" in r.get("anchor_kind", ""))
          correction_count = sum(1 for r in all_anchor_rows if "correction" in r.get("anchor_kind", ""))

          selected_next_route = "neurotype_numeric_shape_score_preview_with_scope_guards"

          route_decision = {
              "version": "v4.192",
              "result_label": RESULT_LABEL,
              "clean_result": "Manual numeric and directional anchors were consolidated into a readiness-score table. This bypasses the repo-file absence found in v4.191 without claiming verification.",
              "manual_anchor_rows": len(MANUAL_ANCHORS),
              "optional_user_anchor_rows": len(optional_rows),
              "exact_numeric_anchor_count": exact_numeric_count,
              "directional_anchor_count": directional_count,
              "correction_anchor_count": correction_count,
              "readiness_rows": len(readiness_rows),
              "selected_next_route": selected_next_route,
              "truth_boundary": "manual/corpus-grounded numeric readiness only; not repo verification, external replication, or validation",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_192_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_192_scope_guards.json").write_text(json.dumps({
              "scope": "manual numeric anchor table and readiness score only",
              "repo_paper_file_verification_claimed": False,
              "manual_anchors_are_external_validation": False,
              "readiness_score_is_validation": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "neurotype_validation_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_192_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.192 - Neurotype Manual Numeric Anchor Table And Readiness Score",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.191 passed but did not find the neurotype papers committed inside the GitHub repo. v4.192 carries forward the uploaded-corpus numeric anchors manually and labels them as manual/corpus-grounded, not repo-verified.",
              "",
              "Manual anchor rows: `" + str(len(MANUAL_ANCHORS)) + "`",
              "Exact numeric anchors: `" + str(exact_numeric_count) + "`",
              "Directional anchors: `" + str(directional_count) + "`",
              "Correction anchors: `" + str(correction_count) + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_192_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_192_v4_191_status_review.csv",
              "v4_192_v4_191_status_review.json",
              "v4_192_manual_numeric_anchor_table.csv",
              "v4_192_optional_user_numeric_anchor_rows.csv",
              "v4_192_combined_numeric_anchor_table.csv",
              "v4_192_neurotype_readiness_score_table.csv",
              "v4_192_lane_anchor_coverage.csv",
              "v4_192_next_numeric_work_plan.csv",
              "v4_192_route_decision.json",
              "v4_192_scope_guards.json",
              "v4_192_blocked_claims.json",
              "v4_192_summary.md"
          ]

          rules = {
              "version_is_v4_192": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_191_status_reviewed": V4_191_STATUS["rule_pass_count"] == 10,
              "manual_anchors_present": len(MANUAL_ANCHORS) >= 10,
              "exact_numeric_anchors_present": exact_numeric_count >= 4,
              "readiness_rows_present": len(readiness_rows) == len(PROMOTED_ROWS),
              "no_repo_verification_claim": True,
              "no_validation_claim": True,
              "next_route_selected": bool(selected_next_route)
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.192",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "manual_anchor_rows": len(MANUAL_ANCHORS),
              "exact_numeric_anchor_count": exact_numeric_count,
              "directional_anchor_count": directional_count,
              "correction_anchor_count": correction_count,
              "readiness_rows": len(readiness_rows),
              "package_status": "manual_numeric_anchor_table_written_no_validation",
              "selected_next_route": selected_next_route,
              "claim_boundary": "manual_numeric_readiness_only_no_validation"
          }

          (OUT / "v4_192_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.192 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_192_outputs/run_v4_192.py

      - name: Upload v4.192 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-192-neurotype-manual-numeric-anchor-table-and-readiness-score-output
          path: tairid_v4_192_outputs/
