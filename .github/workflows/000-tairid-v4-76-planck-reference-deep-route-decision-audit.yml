name: 000 TAIRID v4.76 Planck Reference Deep Route Decision Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-76-planck-reference-deep-route-decision-audit.yml"

jobs:
  tairid-v4-76-planck-reference-deep-route-decision-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.76 Planck reference deep route decision audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_76_planck_reference_deep_route_decision_audit

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_76_planck_reference_deep_route_decision_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_76_planck_reference_deep_route_decision_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This does not accept an external paper, source page, sidecar, or table as posterior covariance.",
              "This audits the Planck reference deep-route decision boundary only.",
              "A pass means the Planck reference path is bounded for the sprint-end handoff, not that the Planck reference uncertainty problem is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_57_fullgrid_manifest": {
                  "status": "ZIP64 central directory parsed",
                  "manifest_member_count": 17902,
                  "verified_root_count": 1296,
                  "fullGrid_downloaded": False,
                  "chains_imported": False
              },
              "v4_60_target_location": {
                  "status": "target location audit passed",
                  "fsigma8_targets_are_sidecar_derived_outputs": True,
                  "direct_chain_column_candidate_roots": 0,
                  "Planck_chains_imported": False
              },
              "v4_63_calculator_contract": {
                  "status": "growth calculator contract matched sidecar point outputs",
                  "calculator_pairs_checked": 110,
                  "calculator_pairs_passed": 110,
                  "reference_uncertainty_computed": False
              },
              "v4_65_1_primary_column_boundary": {
                  "status": "primary column boundary audit passed",
                  "direct_omegam_sigma8_route_available": False,
                  "primary_density_route_available": True,
                  "direct_fsigma8_columns_found": 0
              },
              "v4_66_chain_row_shape": {
                  "status": "guarded chain row shape probe passed",
                  "selected_roots": 12,
                  "row_shape_pass": 12,
                  "primary_tracked_values_available": 12,
                  "full_chains_imported": False,
                  "reference_uncertainty_computed": False
              },
              "v4_68_solver_feasibility": {
                  "status": "solver feasibility audit passed",
                  "camb_available": False,
                  "classy_available": False,
                  "boltzmann_solver_available": False,
                  "solver_installed": False,
                  "solver_run": False,
                  "recommended_next_route": "v4.69_external_verified_reference_source_packet"
              },
              "v4_71_external_literature": {
                  "status": "external literature expansion passed",
                  "accepted_reference_uncertainty_now_count": 0,
                  "reference_uncertainty_computed": False,
                  "external_reference_imported": False
              },
              "v4_72_combination_policy": {
                  "status": "cross-family combination policy passed",
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_75_WiggleZ_policy": {
                  "status": "WiggleZ source/exclusion policy passed",
                  "readiness_label": "WiggleZ_source_or_exclusion_policy_passed_ready_for_Planck_reference_deep_route",
                  "WiggleZ_covariance_ready": False,
                  "final_RSD_pressure_score_computed": False
              }
          }

          PLANCK_REFERENCE_CURRENT_STATUS = {
              "family_id": "Planck_reference",
              "lane": "reference_uncertainty",
              "current_status": "bounded_but_unsolved",
              "fullGrid_container_located": True,
              "fullGrid_manifest_parsed": True,
              "sidecar_fixtures_available": True,
              "sidecar_fixtures_are_covariance": False,
              "direct_fsigma8_chain_columns_available": False,
              "direct_omegam_sigma8_chain_route_available": False,
              "primary_density_chain_route_available": True,
              "local_solver_available": False,
              "external_candidate_accepted_as_covariance": False,
              "reference_uncertainty_computed": False,
              "may_enter_final_score_now": False,
              "safe_claim_now": "Planck reference uncertainty remains missing, but the route is bounded.",
              "blocked_claim": "Planck reference uncertainty is included."
          }

          PLANCK_REFERENCE_ROUTE_OPTIONS = [
              {
                  "route_id": "A_external_verified_posterior_or_covariance_source",
                  "status": "valid_future_route_but_not_solved",
                  "allowed_now": True,
                  "purpose": "Find a machine-readable or reproducible Planck-derived posterior/covariance source for fsigma8 at target redshifts.",
                  "requires_before_final_use": "posterior samples or covariance, model identity, redshift mapping, weights/covariance method, provenance",
                  "current_blocker": "No candidate accepted as covariance through v4.71.",
                  "final_score_allowed_after_this_route_now": False
              },
              {
                  "route_id": "B_solver_or_container_branch",
                  "status": "valid_future_route_but_heavier",
                  "allowed_now": True,
                  "purpose": "Use a pinned CAMB/CLASS solver or container to derive omegam, sigma8, sigma8z, and fsigma8z from primary chain columns.",
                  "requires_before_final_use": "solver install/container, fixture validation against sidecars, full chain parsing, weighted covariance output",
                  "current_blocker": "No local CAMB/CLASS solver available in v4.68.",
                  "final_score_allowed_after_this_route_now": False
              },
              {
                  "route_id": "C_fullGrid_primary_chain_parser_plus_solver",
                  "status": "valid_long_route_but_not_current_sprint_solution",
                  "allowed_now": True,
                  "purpose": "Stream Planck fullGrid chain rows and derive growth quantities through a verified solver path.",
                  "requires_before_final_use": "exact root selection, paramnames map, row streaming, solver conversion, posterior covariance validation",
                  "current_blocker": "Solver missing and full chain import not yet allowed.",
                  "final_score_allowed_after_this_route_now": False
              },
              {
                  "route_id": "D_sidecar_minimum_as_covariance",
                  "status": "blocked",
                  "allowed_now": False,
                  "purpose": "Treat .minimum sidecar values as posterior covariance.",
                  "requires_before_final_use": "not allowed under current evidence",
                  "current_blocker": "Sidecars are point fixtures, not posterior samples.",
                  "final_score_allowed_after_this_route_now": False
              },
              {
                  "route_id": "E_fake_primary_column_shortcuts",
                  "status": "blocked",
                  "allowed_now": False,
                  "purpose": "Fake H0 from theta, sigma8 from logA, or omegam from omegabh2 + omegach2.",
                  "requires_before_final_use": "not allowed under current evidence",
                  "current_blocker": "Requires solver/background conversion.",
                  "final_score_allowed_after_this_route_now": False
              }
          ]

          DEEP_ROUTE_REQUIREMENTS = [
              {
                  "requirement_id": "target_redshift_mapping",
                  "required": True,
                  "definition": "Reference must cover or reproducibly derive z = 0.15, 0.38, 0.51, 0.61, 2.33."
              },
              {
                  "requirement_id": "posterior_samples_or_covariance",
                  "required": True,
                  "definition": "Reference must provide posterior samples, covariance, or a reproducible weighted-sample route."
              },
              {
                  "requirement_id": "model_identity",
                  "required": True,
                  "definition": "Planck likelihood/root/model assumptions must be stated."
              },
              {
                  "requirement_id": "weights_or_covariance_method",
                  "required": True,
                  "definition": "If samples are used, weights must be preserved; if covariance is used, construction must be documented."
              },
              {
                  "requirement_id": "sidecar_fixture_validation",
                  "required": True,
                  "definition": "Any solver/parser route must validate point predictions against .minimum sidecar fixtures before uncertainty use."
              },
              {
                  "requirement_id": "no_fake_parameter_shortcuts",
                  "required": True,
                  "definition": "theta, logA, and physical density columns must not be converted into H0, sigma8, or omegam without verified solver/background logic."
              },
              {
                  "requirement_id": "machine_readable_or_auditable",
                  "required": True,
                  "definition": "The reference route must be machine-readable or auditable in GitHub."
              }
          ]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          PLANCK_SPRINT_POLICY = [
              {
                  "policy_id": "Planck_reference_uncertainty_missing",
                  "policy": "Carry Planck reference uncertainty as missing, not solved.",
                  "active": True
              },
              {
                  "policy_id": "sidecars_as_fixtures_only",
                  "policy": "Use .minimum sidecars as point fixtures only, not covariance.",
                  "active": True
              },
              {
                  "policy_id": "no_direct_fsigma8_chain_columns",
                  "policy": "Do not expect direct fsigma8z chain columns.",
                  "active": True
              },
              {
                  "policy_id": "no_simple_omegam_sigma8_route",
                  "policy": "Do not force a direct omegam + sigma8 chain parser for selected roots.",
                  "active": True
              },
              {
                  "policy_id": "solver_or_external_route_required",
                  "policy": "Future reference uncertainty requires a verified solver/container path or an accepted external posterior/covariance source.",
                  "active": True
              },
              {
                  "policy_id": "final_RSD_pressure_blocked",
                  "policy": "Final RSD pressure remains blocked until Planck reference uncertainty is computed or formally replaced by a verified reference.",
                  "active": True
              }
          ]

          ALLOWED_CLAIMS = [
              "Planck fullGrid structure has been mapped by bounded manifest probing.",
              "Planck sidecar fixtures are useful point checks.",
              "Direct fsigma8z chain columns were not found.",
              "The simple direct omegam + sigma8 route is blocked in selected roots.",
              "Primary-density chain rows are readable in bounded prefixes.",
              "No local CAMB/CLASS solver was available in v4.68.",
              "No external source has been accepted as Planck reference covariance yet.",
              "Planck reference uncertainty remains missing."
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "An external source was accepted as Planck RSD covariance.",
              "Sidecar minimum files were treated as posterior covariance.",
              "Direct fsigma8z chain columns exist in selected roots.",
              "theta was converted to H0 without a solver.",
              "logA was converted to sigma8 without a solver.",
              "omegabh2 plus omegach2 was treated as omegam without h.",
              "CAMB or CLASS was installed.",
              "A solver was run.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_77_sprint_end_handoff",
                  "purpose": "Summarize v4.50-v4.76 sprint status, passed tests, blockers, and next sprint branches.",
                  "why_next": "The four planned blockers have now been reviewed: nonfinal vector, ELG, WiggleZ, and Planck reference."
              },
              {
                  "priority": 2,
                  "route_id": "v4_78_solver_container_branch",
                  "purpose": "Optional next sprint route to try a pinned solver/container approach.",
                  "why_next": "Needed if external covariance source remains unavailable."
              },
              {
                  "priority": 3,
                  "route_id": "v4_78_external_reference_deep_review",
                  "purpose": "Optional next sprint route to deep-review candidate external sources for actual samples/covariance.",
                  "why_next": "Needed if avoiding solver build."
              },
              {
                  "priority": 4,
                  "route_id": "v4_78_ELG_or_WiggleZ_product_followups",
                  "purpose": "Optional next sprint route to turn parked ELG/WiggleZ backlogs into product-specific parsers.",
                  "why_next": "Needed before final cross-family growth/RSD combination."
              }
          ]

          failed_gates = []
          warnings = [
              "Planck_reference_deep_route_decision_only",
              "Planck_reference_uncertainty_still_missing",
              "sidecars_are_fixtures_not_covariance",
              "no_external_covariance_accepted",
              "no_solver_available_or_run",
              "no_full_chain_import",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          if UPSTREAM_LOCKS["v4_75_WiggleZ_policy"]["readiness_label"] != "WiggleZ_source_or_exclusion_policy_passed_ready_for_Planck_reference_deep_route":
              failed_gates.append("v4_75_readiness_not_carried")

          if UPSTREAM_LOCKS["v4_71_external_literature"]["accepted_reference_uncertainty_now_count"] != 0:
              failed_gates.append("external_reference_accepted_too_early")

          if UPSTREAM_LOCKS["v4_68_solver_feasibility"]["boltzmann_solver_available"] is not False:
              failed_gates.append("v4_68_solver_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_66_chain_row_shape"]["reference_uncertainty_computed"] is not False:
              failed_gates.append("v4_66_reference_uncertainty_boundary_not_carried")

          if PLANCK_REFERENCE_CURRENT_STATUS["may_enter_final_score_now"] is not False:
              failed_gates.append("Planck_reference_allowed_into_final_score_too_early")

          if PLANCK_REFERENCE_CURRENT_STATUS["reference_uncertainty_computed"] is not False:
              failed_gates.append("Planck_reference_uncertainty_marked_computed_too_early")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          if len(DEEP_ROUTE_REQUIREMENTS) < 7:
              failed_gates.append("deep_route_requirements_incomplete")

          if not all(row["active"] is True for row in PLANCK_SPRINT_POLICY):
              failed_gates.append("not_all_Planck_sprint_policies_active")

          if not any(row["route_id"] == "A_external_verified_posterior_or_covariance_source" and row["allowed_now"] is True for row in PLANCK_REFERENCE_ROUTE_OPTIONS):
              failed_gates.append("external_reference_route_missing")

          if not any(row["route_id"] == "B_solver_or_container_branch" and row["allowed_now"] is True for row in PLANCK_REFERENCE_ROUTE_OPTIONS):
              failed_gates.append("solver_container_route_missing")

          if not any(row["route_id"] == "D_sidecar_minimum_as_covariance" and row["allowed_now"] is False for row in PLANCK_REFERENCE_ROUTE_OPTIONS):
              failed_gates.append("sidecar_covariance_shortcut_not_blocked")

          if not any(row["route_id"] == "E_fake_primary_column_shortcuts" and row["allowed_now"] is False for row in PLANCK_REFERENCE_ROUTE_OPTIONS):
              failed_gates.append("fake_primary_shortcut_not_blocked")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "planck reference uncertainty is computed",
              "external source was accepted",
              "sidecar minimum files were treated as posterior covariance",
              "theta was converted to h0",
              "solver was run",
              "full planck chains were imported",
              "final rsd pressure score",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "Planck_reference_deep_route_decision_passed_reference_uncertainty_still_missing_ready_for_sprint_end_handoff"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "upstream_WiggleZ_to_Planck_route_carried",
                  "pass": UPSTREAM_LOCKS["v4_75_WiggleZ_policy"]["readiness_label"] == "WiggleZ_source_or_exclusion_policy_passed_ready_for_Planck_reference_deep_route",
                  "result": "v4.75 readiness carried into Planck reference route",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "reference_uncertainty_missing_preserved",
                  "pass": PLANCK_REFERENCE_CURRENT_STATUS["reference_uncertainty_computed"] is False,
                  "result": "Planck reference uncertainty remains missing",
                  "boundary": "No final RSD pressure."
              },
              {
                  "rule_id": "sidecars_remain_fixtures_only",
                  "pass": PLANCK_REFERENCE_CURRENT_STATUS["sidecar_fixtures_are_covariance"] is False,
                  "result": "sidecars are not covariance",
                  "boundary": "No posterior uncertainty from .minimum files."
              },
              {
                  "rule_id": "external_covariance_not_accepted",
                  "pass": PLANCK_REFERENCE_CURRENT_STATUS["external_candidate_accepted_as_covariance"] is False,
                  "result": "no external candidate accepted as covariance",
                  "boundary": "Source reachability is not covariance."
              },
              {
                  "rule_id": "solver_not_available_or_run",
                  "pass": UPSTREAM_LOCKS["v4_68_solver_feasibility"]["boltzmann_solver_available"] is False,
                  "result": "no local CAMB/CLASS solver available in v4.68",
                  "boundary": "No solver output."
              },
              {
                  "rule_id": "route_options_declared",
                  "pass": len(PLANCK_REFERENCE_ROUTE_OPTIONS) >= 5,
                  "result": f"{len(PLANCK_REFERENCE_ROUTE_OPTIONS)} Planck reference route options declared",
                  "boundary": "Options are not implemented."
              },
              {
                  "rule_id": "deep_route_requirements_declared",
                  "pass": len(DEEP_ROUTE_REQUIREMENTS) >= 7,
                  "result": f"{len(DEEP_ROUTE_REQUIREMENTS)} deep route requirements declared",
                  "boundary": "No uncertainty computed."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "No reference covariance computed."
              },
              {
                  "rule_id": "Planck_sprint_policy_active",
                  "pass": all(row["active"] is True for row in PLANCK_SPRINT_POLICY),
                  "result": f"{len(PLANCK_SPRINT_POLICY)} Planck sprint policies active",
                  "boundary": "Planck reference remains guarded."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 17,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Planck reference route decision only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_76_rules_passed")

          if failed_gates:
              readiness_label = "Planck_reference_deep_route_decision_failed"
              next_allowed_step = "Repair Planck reference route decision before sprint-end handoff."
          else:
              readiness_label = "Planck_reference_deep_route_decision_passed_ready_for_sprint_end_handoff"
              next_allowed_step = (
                  "Proceed to v4.77 sprint-end handoff. Carry Planck reference uncertainty as missing, with future routes: "
                  "external verified covariance source, solver/container branch, or fullGrid primary-chain parser plus solver. "
                  "Do not compute final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "Planck_reference_current_status": PLANCK_REFERENCE_CURRENT_STATUS["current_status"],
              "fullGrid_manifest_parsed": PLANCK_REFERENCE_CURRENT_STATUS["fullGrid_manifest_parsed"],
              "sidecar_fixtures_available": PLANCK_REFERENCE_CURRENT_STATUS["sidecar_fixtures_available"],
              "sidecar_fixtures_are_covariance": PLANCK_REFERENCE_CURRENT_STATUS["sidecar_fixtures_are_covariance"],
              "direct_fsigma8_chain_columns_available": PLANCK_REFERENCE_CURRENT_STATUS["direct_fsigma8_chain_columns_available"],
              "direct_omegam_sigma8_chain_route_available": PLANCK_REFERENCE_CURRENT_STATUS["direct_omegam_sigma8_chain_route_available"],
              "primary_density_chain_route_available": PLANCK_REFERENCE_CURRENT_STATUS["primary_density_chain_route_available"],
              "local_solver_available": PLANCK_REFERENCE_CURRENT_STATUS["local_solver_available"],
              "external_candidate_accepted_as_covariance": PLANCK_REFERENCE_CURRENT_STATUS["external_candidate_accepted_as_covariance"],
              "reference_uncertainty_computed": PLANCK_REFERENCE_CURRENT_STATUS["reference_uncertainty_computed"],
              "Planck_may_enter_final_score_now": PLANCK_REFERENCE_CURRENT_STATUS["may_enter_final_score_now"],
              "Planck_route_option_count": len(PLANCK_REFERENCE_ROUTE_OPTIONS),
              "deep_route_requirement_count": len(DEEP_ROUTE_REQUIREMENTS),
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "Planck_sprint_policy_count": len(PLANCK_SPRINT_POLICY),
              "allowed_claim_count": len(ALLOWED_CLAIMS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "next_route_option_count": len(NEXT_ROUTE_OPTIONS),
              "route_decision": route_decision,
              "solver_installed": False,
              "solver_run": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "external_reference_imported": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "Planck_reference_current_status": PLANCK_REFERENCE_CURRENT_STATUS,
              "Planck_reference_route_options": PLANCK_REFERENCE_ROUTE_OPTIONS,
              "deep_route_requirements": DEEP_ROUTE_REQUIREMENTS,
              "target_redshifts": TARGET_REDSHIFTS,
              "Planck_sprint_policy": PLANCK_SPRINT_POLICY,
              "allowed_claims": ALLOWED_CLAIMS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "reference_uncertainty_computed": False,
                  "external_reference_imported": False,
                  "solver_installed": False,
                  "solver_run": False,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "full_chain_sample_files_parsed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_76_Planck_reference_deep_route_decision_audit.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

