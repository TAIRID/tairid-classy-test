name: TAIRID v4.52 Reference Uncertainty Parser Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-52-reference-uncertainty-parser-design.yml"

jobs:
  tairid-v4-52-reference-uncertainty-parser-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.52 reference uncertainty parser design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_52_reference_uncertainty_parser_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_52_reference_uncertainty_parser_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_52_reference_uncertainty_parser_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not import Planck chains.",
              "This does not download the full Planck full-grid zip.",
              "This does not parse a verified Planck zip manifest.",
              "This does not select a verified internal Planck chain member.",
              "This does not compute Planck reference uncertainty.",
              "This only designs the future parser contract for Planck reference uncertainty."
          ]

          TARGET_REDSHIFTS = [
              {
                  "target_id": "z015",
                  "z": 0.15,
                  "primary_parameter": "fsigma8z015",
                  "sigma8_parameter": "sigma8z015",
                  "baseline_minimum_point_value": 0.4605737,
                  "baseline_sigma8_point_value": 0.7499102,
                  "status": "point_value_only_from_v4_51_1_not_uncertainty"
              },
              {
                  "target_id": "z038",
                  "z": 0.38,
                  "primary_parameter": "fsigma8z038",
                  "sigma8_parameter": "sigma8z038",
                  "baseline_minimum_point_value": 0.477975,
                  "baseline_sigma8_point_value": 0.6642677,
                  "status": "point_value_only_from_v4_51_1_not_uncertainty"
              },
              {
                  "target_id": "z051",
                  "z": 0.51,
                  "primary_parameter": "fsigma8z051",
                  "sigma8_parameter": "sigma8z051",
                  "baseline_minimum_point_value": 0.4760595,
                  "baseline_sigma8_point_value": 0.6214493,
                  "status": "point_value_only_from_v4_51_1_not_uncertainty"
              },
              {
                  "target_id": "z061",
                  "z": 0.61,
                  "primary_parameter": "fsigma8z061",
                  "sigma8_parameter": "sigma8z061",
                  "baseline_minimum_point_value": 0.470729,
                  "baseline_sigma8_point_value": 0.5912018,
                  "status": "point_value_only_from_v4_51_1_not_uncertainty"
              },
              {
                  "target_id": "z233",
                  "z": 2.33,
                  "primary_parameter": "fsigma8z233",
                  "sigma8_parameter": "sigma8z233",
                  "baseline_minimum_point_value": 0.2979158,
                  "baseline_sigma8_point_value": 0.306951,
                  "status": "point_value_only_from_v4_51_1_not_uncertainty"
              }
          ]

          INPUT_CONTRACT = {
              "required_before_implementation": [
                  "verified_internal_chain_member_names",
                  "verified_paramnames_file_for_selected_chain_root",
                  "verified_chain_text_files_for_selected_chain_root",
                  "confirmed_weight_column_policy",
                  "confirmed_minus_loglike_column_policy",
                  "confirmed_parameter_name_mapping_for_fsigma8z_targets"
              ],
              "accepted_chain_format_design": {
                  "format_family": "CosmoMC_style_weighted_chain_text_design",
                  "first_column_expected_role": "sample_weight_or_multiplicity",
                  "second_column_expected_role": "minus_loglike_or_likelihood_diagnostic",
                  "remaining_columns_expected_role": "parameters_defined_by_matching_paramnames_file",
                  "hard_boundary": "This is a parser design assumption only until verified against actual Planck chain files."
              },
              "primary_extraction_policy": {
                  "preferred": "extract fsigma8z015, fsigma8z038, fsigma8z051, fsigma8z061, fsigma8z233 directly if present in paramnames",
                  "fallback": "if only sigma8z values are present, do not derive f_sigma8 without a separately validated growth-rate calculator",
                  "blocked": "do not invent f_sigma8 samples from point values or from the minimum file"
              },
              "weight_policy": {
                  "read_weights": "read first column as nonnegative sample weight after verification",
                  "normalize": "w_i_normalized = w_i / sum(w_i)",
                  "zero_or_negative_weights": "reject or quarantine sample rows pending source-specific review",
                  "missing_weights": "hard fail until source format is verified"
              },
              "covariance_policy": {
                  "sample_matrix": "F has shape N_samples x N_redshifts using target order [0.15, 0.38, 0.51, 0.61, 2.33]",
                  "weighted_mean": "mu = sum_i w_i F_i",
                  "weighted_covariance": "C = sum_i w_i outer(F_i - mu, F_i - mu) / (1 - sum_i w_i^2)",
                  "minimum_output": "mean vector, covariance matrix, correlation matrix, effective sample size, target redshift order",
                  "hard_boundary": "This design computes reference uncertainty only when real verified weighted samples are supplied."
              },
              "output_contract": {
                  "json": "planck_reference_uncertainty_samples_summary.json",
                  "csv_mean": "planck_fsigma8_reference_mean.csv",
                  "csv_covariance": "planck_fsigma8_reference_covariance.csv",
                  "csv_correlation": "planck_fsigma8_reference_correlation.csv",
                  "audit": "planck_reference_uncertainty_parser_audit.md"
              }
          }

          PARSER_STAGES = [
              {
                  "stage": 1,
                  "name": "verified_manifest_input",
                  "purpose": "Accept verified internal member names from a true source packet or actual safe manifest extraction.",
                  "hard_fail_if_missing": True,
                  "implementation_now": False
              },
              {
                  "stage": 2,
                  "name": "paramnames_mapping",
                  "purpose": "Read selected .paramnames file and map parameter names to chain columns.",
                  "hard_fail_if_missing": True,
                  "implementation_now": False
              },
              {
                  "stage": 3,
                  "name": "weighted_chain_stream",
                  "purpose": "Stream selected chain text files without loading unsafe large files into memory.",
                  "hard_fail_if_missing": True,
                  "implementation_now": False
              },
              {
                  "stage": 4,
                  "name": "target_parameter_extraction",
                  "purpose": "Extract f_sigma8 target columns in the locked target redshift order.",
                  "hard_fail_if_missing": True,
                  "implementation_now": False
              },
              {
                  "stage": 5,
                  "name": "weighted_reference_uncertainty",
                  "purpose": "Compute weighted mean, covariance, correlation, and effective sample size.",
                  "hard_fail_if_missing": True,
                  "implementation_now": False
              },
              {
                  "stage": 6,
                  "name": "RSD_pressure_bridge",
                  "purpose": "Pass reference mean/covariance to later RSD pressure code.",
                  "hard_fail_if_missing": True,
                  "implementation_now": False
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is now included.",
              "Planck chains were imported.",
              "A verified internal Planck chain member was selected.",
              "The Planck full-grid manifest was parsed.",
              "The final RSD pressure score is known.",
              "TAIRID cosmology is validated.",
              "A likelihood, BIC, refit, or posterior model comparison was run."
          ]

          failed_gates = []
          warnings = [
              "parser_design_only",
              "no_chain_import",
              "no_reference_uncertainty_computation",
              "candidate_manifest_remains_unverified",
              "point_values_are_not_uncertainties",
              "not_validation"
          ]

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          if not all(row["primary_parameter"].startswith("fsigma8z") for row in TARGET_REDSHIFTS):
              failed_gates.append("primary_fsigma8_parameter_mapping_missing")

          required_contract_keys = [
              "required_before_implementation",
              "accepted_chain_format_design",
              "primary_extraction_policy",
              "weight_policy",
              "covariance_policy",
              "output_contract"
          ]

          for key in required_contract_keys:
              if key not in INPUT_CONTRACT:
                  failed_gates.append("missing_contract_key_" + key)

          if "weighted_covariance" not in INPUT_CONTRACT["covariance_policy"]:
              failed_gates.append("weighted_covariance_policy_missing")

          if any(stage["implementation_now"] is not False for stage in PARSER_STAGES):
              failed_gates.append("parser_stage_accidentally_marked_for_implementation")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "reference uncertainty is now included",
              "chains were imported",
              "verified internal planck chain member",
              "manifest was parsed",
              "final rsd pressure",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          RULE_RESULTS = [
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target_order_0p15_0p38_0p51_0p61_2p33",
                  "boundary": "Target order is design only until real samples are parsed."
              },
              {
                  "rule_id": "fsigma8_primary_mapping_declared",
                  "pass": all(row["primary_parameter"].startswith("fsigma8z") for row in TARGET_REDSHIFTS),
                  "result": "primary_fsigma8_parameter_names_declared",
                  "boundary": "Parameter names still require verified paramnames mapping."
              },
              {
                  "rule_id": "weight_policy_declared",
                  "pass": "normalize" in INPUT_CONTRACT["weight_policy"],
                  "result": "weight_normalization_policy_declared",
                  "boundary": "No weights read yet."
              },
              {
                  "rule_id": "covariance_policy_declared",
                  "pass": "weighted_covariance" in INPUT_CONTRACT["covariance_policy"],
                  "result": "weighted_covariance_policy_declared",
                  "boundary": "No covariance computed yet."
              },
              {
                  "rule_id": "implementation_hold_preserved",
                  "pass": all(stage["implementation_now"] is False for stage in PARSER_STAGES),
                  "result": "all_parser_stages_design_only",
                  "boundary": "No chain import or parser execution."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 7,
                  "result": "blocked_claims_declared",
                  "boundary": "No validation or final pressure claim."
              },
              {
                  "rule_id": "output_contract_declared",
                  "pass": len(INPUT_CONTRACT["output_contract"]) >= 5,
                  "result": "future_output_contract_declared",
                  "boundary": "Output filenames are future parser outputs, not produced reference uncertainty now."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Parser design only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_52_rules_passed")

          if failed_gates:
              readiness_label = "reference_uncertainty_parser_design_failed"
              next_allowed_step = "Repair parser design contract before any parser implementation."
          else:
              readiness_label = "reference_uncertainty_parser_design_passed_ready_for_verified_planck_chain_member_source_or_parser_implementation_hold"
              next_allowed_step = (
                  "Proceed only to a verified Planck chain member source packet or hold parser implementation "
                  "until verified internal chain member names and paramnames are available. Do not import chains yet."
              )

          system_health = {
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "parser_stage_count": len(PARSER_STAGES),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "contract_key_count": len(INPUT_CONTRACT),
              "Planck_chains_imported": False,
              "Planck_manifest_parsed": False,
              "internal_chain_member_selected": False,
              "reference_uncertainty_computed": False,
              "final_RSD_pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "target_redshifts": TARGET_REDSHIFTS,
              "input_contract": INPUT_CONTRACT,
              "parser_stages": PARSER_STAGES,
              "blocked_claims": BLOCKED_CLAIMS,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "Planck_chains_imported": False,
                  "Planck_manifest_parsed": False,
                  "internal_chain_member_selected": False,
                  "reference_uncertainty_computed": False,
                  "final_RSD_pressure_computed": False,
                  "validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_52_reference_uncertainty_parser_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "target_redshift_contract_v4_52.csv",
              TARGET_REDSHIFTS,
              [
                  "target_id",
                  "z",
                  "primary_parameter",
                  "sigma8_parameter",
                  "baseline_minimum_point_value",
                  "baseline_sigma8_point_value",
                  "status"
              ]
          )

          write_csv(
              OUTDIR / "parser_stage_contract_v4_52.csv",
              PARSER_STAGES,
              ["stage", "name", "purpose", "hard_fail_if_missing", "implementation_now"]
          )

          write_csv(
              OUTDIR / "parser_design_rule_results_v4_52.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_52.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          md = []
          md.append("# TAIRID v4.52 — Reference Uncertainty Parser Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This is a design-only parser contract for future Planck reference uncertainty.")
          md.append("")
          md.append("It defines the target redshift order, expected f_sigma8 parameter names, weight policy, covariance policy, output contract, and hard blockers.")
          md.append("")
          md.append("It does not import Planck chains, parse the full-grid manifest, select an internal chain member, compute reference uncertainty, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## Target redshift contract")
          md.append("")
          md.append("| Target | z | Primary parameter | Point-only baseline |")
          md.append("|---|---:|---|---:|")
          for row in TARGET_REDSHIFTS:
              md.append(
                  f"| `{row['target_id']}` | `{row['z']}` | `{row['primary_parameter']}` | `{row['baseline_minimum_point_value']}` |"
              )
          md.append("")
          md.append("## Parser stages")
          md.append("")
          md.append("| Stage | Name | Implementation now? |")
          md.append("|---:|---|---|")
          for row in PARSER_STAGES:
              md.append(f"| `{row['stage']}` | `{row['name']}` | `{row['implementation_now']}` |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_52_reference_uncertainty_parser_design.json`")
          md.append("- `tairid_v4_52_reference_uncertainty_parser_design.md`")
          md.append("- `target_redshift_contract_v4_52.csv`")
          md.append("- `parser_stage_contract_v4_52.csv`")
          md.append("- `parser_design_rule_results_v4_52.csv`")
          md.append("- `blocked_claims_v4_52.csv`")
          md.append("")

          (OUTDIR / "tairid_v4_52_reference_uncertainty_parser_design.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.52 reference uncertainty parser design artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-52-reference-uncertainty-parser-design
          path: artifacts/tairid_v4_52_reference_uncertainty_parser_design/
