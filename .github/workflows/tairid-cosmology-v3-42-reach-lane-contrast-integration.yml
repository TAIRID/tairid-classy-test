name: TAIRID Cosmology v3.42 Reach-Lane Contrast Integration

on:
  workflow_dispatch:

jobs:
  reach-lane-contrast-integration:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v3.42 reach-lane contrast integration
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_42

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v3_42")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_42_reach_lane_contrast_integration"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute new pressure scores.",
              "This integrates prior reach-lane results into a contrast ledger.",
              "H0LiCOW is carried only as a diagnostic non-BAO reach-lane candidate.",
              "BAO remains mixed/subfamily diagnostic, not a global reach-positive anchor.",
              "SH0ES remains parked until a safer parser exists.",
              "TDCOSMO remains parked until provenance improves.",
              "DESI mapped reach remains blocked as an independent anchor because of scaled-counterpart risk.",
              "No lane may be promoted to model-anchor status in this workflow."
          ]

          PREVIOUS_MILESTONES = {
              "v3_32": {
                  "status": "independent_bao_eligibility_passed_subfamily_only_global_anchor_blocked",
                  "meaning": "Independent BAO did not become a clean global reach-positive anchor.",
                  "bao_positive_subfamily": "eBOSS_DR16_QSO",
                  "bao_negative_or_mixed_subfamilies": ["eBOSS_DR16_LRG", "eBOSS_DR12_LRG"],
                  "global_bao_anchor_blocked": True
              },
              "v3_33": {
                  "status": "independent_reach_lane_contrast_passed_h0licow_shape_ready_shoes_parser_followup_needed",
                  "meaning": "H0LiCOW was shape-ready; SH0ES parser needed follow-up."
              },
              "v3_35": {
                  "status": "project_corpus_pressure_lane_recovery_passed_ready_for_pressure_specific_next_test",
                  "meaning": "Recovered reach, consolidation, ruler, density, boundary, provenance, and failure-guardrail lanes."
              },
              "v3_36": {
                  "status": "pressure_lane_integration_checkpoint_passed_ready_for_v3_37_h0licow_chain_ingestion_design",
                  "meaning": "Required pressure-row contract was locked: source, role, surface, baseline, parser, provenance, block condition, claim boundary."
              },
              "v3_41": {
                  "status": "h0licow_reach_lane_eligibility_passed_coherent_negative_ddt_candidate",
                  "pressure_row_count": 3,
                  "blocked_row_count": 3,
                  "weighted_blocked_count": 1,
                  "dd_secondary_blocked_count": 2,
                  "mean_pressure_z": -1.6268644558220158,
                  "median_pressure_z": -0.9014283075552302,
                  "positive_count": 0,
                  "negative_count": 3,
                  "coherent_negative": True,
                  "coherent_positive": False,
                  "sign_interpretation": "coherent_negative_Ddt_pressure_shorter_than_Planck_reference_local_H0_high_equivalent"
              }
          }

          REQUIRED_CONTRACT_FIELDS = [
              "source",
              "observable_role",
              "pressure_surface",
              "baseline",
              "parser_status",
              "provenance_status",
              "block_condition",
              "claim_boundary"
          ]

          REACH_LANE_ROWS = [
              {
                  "lane_id": "h0licow_time_delay_ddt",
                  "source": "H0LiCOW",
                  "observable_role": "time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "baseline": "Planck_2018_flat_LCDM_reference",
                  "parser_status": "parsed_and_pressure_scored_in_v3_40_1_then_eligibility_reviewed_in_v3_41",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "pressure_status": "coherent_negative_ddt_pressure",
                  "pressure_row_count": 3,
                  "blocked_row_count": 3,
                  "mean_pressure_z": -1.6268644558220158,
                  "median_pressure_z": -0.9014283075552302,
                  "positive_count": 0,
                  "negative_count": 3,
                  "sign_interpretation": "shorter_than_Planck_reference_local_H0_high_equivalent",
                  "candidate_status": "non_bao_reach_lane_candidate_diagnostic_only",
                  "block_condition": "not_model_anchor_no_refit_later_contrast_required",
                  "claim_boundary": "diagnostic_candidate_only_not_validation",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "next_use": "Carry as non-BAO reach candidate into reach/consolidation contrast."
              },
              {
                  "lane_id": "independent_bao_mixed",
                  "source": "SDSS_eBOSS_BOSS_BAO",
                  "observable_role": "bao_reach_ruler_mixed",
                  "pressure_surface": "ruler_reference_and_reach_geometry_mixed",
                  "baseline": "Planck_2018_flat_LCDM_reference",
                  "parser_status": "source_specific_bao_rows_reviewed_v3_31_v3_32",
                  "provenance_status": "public_bao_products_clean_eBOSS_plus_provisional_BOSS",
                  "pressure_status": "mixed_subfamily_only",
                  "pressure_row_count": 10,
                  "blocked_row_count": "",
                  "mean_pressure_z": "",
                  "median_pressure_z": "",
                  "positive_count": "",
                  "negative_count": "",
                  "sign_interpretation": "global_BAO_reach_anchor_blocked_QSO_positive_subfamily_only",
                  "candidate_status": "mixed_subfamily_diagnostic_not_global_reach_anchor",
                  "block_condition": "blocked_global_bao_anchor_due_to_mixed_or_negative_clean_families",
                  "claim_boundary": "diagnostic_only_not_model_anchor",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "next_use": "Use as mixed/ruler diagnostic, not as direct reach anchor."
              },
              {
                  "lane_id": "shoes_local_ladder",
                  "source": "PantheonPlus_SH0ES",
                  "observable_role": "local_ladder_H0_reach",
                  "pressure_surface": "reach_geometry",
                  "baseline": "not_safe_selected",
                  "parser_status": "parked_parser_followup_needed",
                  "provenance_status": "source_reachable_but_unlabeled_numeric_output_not_safe_for_pressure_row",
                  "pressure_status": "not_pressure_scored",
                  "pressure_row_count": 0,
                  "blocked_row_count": 1,
                  "mean_pressure_z": "",
                  "median_pressure_z": "",
                  "positive_count": "",
                  "negative_count": "",
                  "sign_interpretation": "not_available",
                  "candidate_status": "parked",
                  "block_condition": "blocked_until_safer_SH0ES_parser_or_better_source_product",
                  "claim_boundary": "parked_not_evidence",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "next_use": "Return only after parser repair."
              },
              {
                  "lane_id": "tdcosmo_time_delay",
                  "source": "TDCOSMO",
                  "observable_role": "time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "baseline": "not_safe_selected",
                  "parser_status": "parked_provenance_review_needed",
                  "provenance_status": "TDLMC_seed_style_rows_flagged_for_review",
                  "pressure_status": "not_pressure_scored",
                  "pressure_row_count": 0,
                  "blocked_row_count": 1,
                  "mean_pressure_z": "",
                  "median_pressure_z": "",
                  "positive_count": "",
                  "negative_count": "",
                  "sign_interpretation": "not_available",
                  "candidate_status": "parked",
                  "block_condition": "blocked_until_observational_provenance_and_parser_review",
                  "claim_boundary": "parked_not_evidence",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "next_use": "Return only after provenance review."
              },
              {
                  "lane_id": "desi_mapped_reach",
                  "source": "DESI",
                  "observable_role": "bao_reach_density_ruler",
                  "pressure_surface": "reach_geometry_or_ruler_reference_pending_role_specific_rebuild",
                  "baseline": "not_active",
                  "parser_status": "blocked_as_independent_anchor",
                  "provenance_status": "mapped_rows_showed_scaled_counterpart_risk",
                  "pressure_status": "not_active",
                  "pressure_row_count": 0,
                  "blocked_row_count": 1,
                  "mean_pressure_z": "",
                  "median_pressure_z": "",
                  "positive_count": "",
                  "negative_count": "",
                  "sign_interpretation": "not_available",
                  "candidate_status": "blocked_from_independent_anchor_role",
                  "block_condition": "blocked_until_independent_non_duplicate_source_specific_treatment",
                  "claim_boundary": "blocked_not_evidence",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "next_use": "Do not reuse as independent reach anchor."
              }
          ]

          INTEGRATED_INTERPRETATION_ROWS = [
              {
                  "integration_claim": "reach_is_not_one_uniform_surface",
                  "status": "supported_as_testing_structure_not_validation",
                  "basis": "H0LiCOW gives coherent non-BAO time-delay direction while independent BAO remains mixed/subfamily only.",
                  "allowed_wording": "The current reach lane is role-specific: time-delay Ddt and BAO/ruler products do not behave like the same simple pressure surface.",
                  "forbidden_wording": "TAIRID proves H0 correction or new physics.",
                  "next_testing_use": "Separate time-delay reach from BAO ruler/reach before any later comparison."
              },
              {
                  "integration_claim": "negative_Ddt_pressure_maps_to_local_H0_high_equivalent_direction",
                  "status": "diagnostic_interpretation_only",
                  "basis": "All three eligible H0LiCOW Ddt rows are shorter than the Planck-reference baseline.",
                  "allowed_wording": "Shorter Ddt relative to Planck is recorded as local-H0-high-equivalent direction.",
                  "forbidden_wording": "H0LiCOW proves TAIRID or solves the H0 tension.",
                  "next_testing_use": "Carry sign convention carefully into contrast tables."
              },
              {
                  "integration_claim": "bao_remains_mixed_ruler_diagnostic",
                  "status": "locked_from_v3_32",
                  "basis": "Independent BAO had a positive QSO subfamily but mixed/negative LRG families and provisional BOSS rows.",
                  "allowed_wording": "BAO is useful, but not as a global reach-positive anchor in the current audit sequence.",
                  "forbidden_wording": "BAO confirms the reach surface.",
                  "next_testing_use": "Keep BAO separate as ruler/reference plus mixed reach diagnostic."
              },
              {
                  "integration_claim": "parked_lanes_are_not_failures",
                  "status": "workflow_guardrail",
                  "basis": "SH0ES and TDCOSMO are parked because parser/provenance gates were not safe enough.",
                  "allowed_wording": "These lanes remain available after parser/provenance repair.",
                  "forbidden_wording": "SH0ES or TDCOSMO disproves or supports TAIRID in the current chain.",
                  "next_testing_use": "Do not include parked lanes in any future scoring without a repair audit."
              }
          ]

          NEXT_TEST_QUEUE = [
              {
                  "priority": 1,
                  "next_test": "v3_43_reach_consolidation_contrast_checkpoint",
                  "purpose": "Compare H0LiCOW non-BAO reach candidate, BAO mixed/ruler diagnostic, and earlier growth/consolidation negative pattern without refit.",
                  "must_include": "H0LiCOW coherent negative Ddt, BAO mixed/subfamily status, growth/consolidation status, blocked/parked lanes.",
                  "must_not_include": "new pressure scoring, model-anchor promotion, two-surface refit, validation claim.",
                  "readiness_if_passes": "A later guarded two-surface comparison design may be considered."
              },
              {
                  "priority": 2,
                  "next_test": "later_weighted_wfi_likelihood_review",
                  "purpose": "Review WFI2033 weight/likelihood handling before any weighted Ddt row can be scored.",
                  "must_include": "weight column semantics, effective sample count, likelihood interpretation, parser provenance.",
                  "must_not_include": "primary scoring before weight meaning is confirmed.",
                  "readiness_if_passes": "Weighted WFI2033 may become eligible for a separate guarded pressure audit."
              },
              {
                  "priority": 3,
                  "next_test": "later_shoes_parser_repair",
                  "purpose": "Repair SH0ES source parsing so local ladder H0 can be safely used as a reach lane.",
                  "must_include": "source-labeled H0 value, uncertainty, citation/product path, parser rule.",
                  "must_not_include": "unlabeled numeric parsing.",
                  "readiness_if_passes": "SH0ES can return to reach contrast."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          created_at = now_iso()

          write_csv(
              OUTDIR / "reach_lane_contrast_inventory_v3_42.csv",
              REACH_LANE_ROWS,
              [
                  "lane_id", "source", "observable_role", "pressure_surface",
                  "baseline", "parser_status", "provenance_status",
                  "pressure_status", "pressure_row_count", "blocked_row_count",
                  "mean_pressure_z", "median_pressure_z", "positive_count",
                  "negative_count", "sign_interpretation", "candidate_status",
                  "block_condition", "claim_boundary", "model_anchor_allowed_now",
                  "refit_allowed_now", "next_use"
              ]
          )

          write_csv(
              OUTDIR / "reach_lane_integrated_interpretation_v3_42.csv",
              INTEGRATED_INTERPRETATION_ROWS,
              [
                  "integration_claim", "status", "basis", "allowed_wording",
                  "forbidden_wording", "next_testing_use"
              ]
          )

          write_csv(
              OUTDIR / "reach_lane_next_test_queue_v3_42.csv",
              NEXT_TEST_QUEUE,
              [
                  "priority", "next_test", "purpose", "must_include",
                  "must_not_include", "readiness_if_passes"
              ]
          )

          # Audit logic.
          h0licow_rows = [r for r in REACH_LANE_ROWS if r["lane_id"] == "h0licow_time_delay_ddt"]
          bao_rows = [r for r in REACH_LANE_ROWS if r["lane_id"] == "independent_bao_mixed"]
          parked_rows = [r for r in REACH_LANE_ROWS if r["candidate_status"] == "parked"]
          blocked_rows = [r for r in REACH_LANE_ROWS if "blocked" in r["candidate_status"]]

          h0licow_candidate_ok = (
              len(h0licow_rows) == 1
              and h0licow_rows[0]["candidate_status"] == "non_bao_reach_lane_candidate_diagnostic_only"
              and h0licow_rows[0]["negative_count"] == 3
              and h0licow_rows[0]["positive_count"] == 0
          )

          bao_global_blocked = (
              len(bao_rows) == 1
              and bao_rows[0]["candidate_status"] == "mixed_subfamily_diagnostic_not_global_reach_anchor"
          )

          parked_preserved = len(parked_rows) >= 2
          blocked_preserved = len(blocked_rows) >= 1

          no_model_anchors = all(row["model_anchor_allowed_now"] is False for row in REACH_LANE_ROWS)
          no_refits = all(row["refit_allowed_now"] is False for row in REACH_LANE_ROWS)

          required_contract_present = True
          for row in REACH_LANE_ROWS:
              for field in REQUIRED_CONTRACT_FIELDS:
                  if field not in row or row[field] in ["", None]:
                      required_contract_present = False

          next_test_defined = NEXT_TEST_QUEUE[0]["next_test"] == "v3_43_reach_consolidation_contrast_checkpoint"
          next_test_no_refit = "refit" in NEXT_TEST_QUEUE[0]["must_not_include"]
          next_test_no_new_scoring = "new pressure scoring" in NEXT_TEST_QUEUE[0]["must_not_include"]

          audit_rows = [
              {
                  "audit_gate": "h0licow_candidate_carried_forward",
                  "pass": h0licow_candidate_ok,
                  "value": json.dumps(h0licow_rows[0] if h0licow_rows else {}, sort_keys=True),
                  "boundary": "H0LiCOW may be carried only as diagnostic non-BAO reach candidate."
              },
              {
                  "audit_gate": "bao_global_anchor_remains_blocked",
                  "pass": bao_global_blocked,
                  "value": json.dumps(bao_rows[0] if bao_rows else {}, sort_keys=True),
                  "boundary": "BAO remains mixed/subfamily diagnostic, not global reach anchor."
              },
              {
                  "audit_gate": "parked_lanes_preserved",
                  "pass": parked_preserved,
                  "value": ",".join([r["lane_id"] for r in parked_rows]),
                  "boundary": "SH0ES and TDCOSMO remain parked."
              },
              {
                  "audit_gate": "blocked_lanes_preserved",
                  "pass": blocked_preserved,
                  "value": ",".join([r["lane_id"] for r in blocked_rows]),
                  "boundary": "DESI mapped reach remains blocked as independent anchor."
              },
              {
                  "audit_gate": "required_contract_fields_present",
                  "pass": required_contract_present,
                  "value": required_contract_present,
                  "boundary": "source/role/surface/baseline/parser/provenance/block/claim contract must persist."
              },
              {
                  "audit_gate": "no_model_anchors_promoted",
                  "pass": no_model_anchors,
                  "value": no_model_anchors,
                  "boundary": "No lane may become a model anchor."
              },
              {
                  "audit_gate": "no_refit_allowed",
                  "pass": no_refits,
                  "value": no_refits,
                  "boundary": "No refit is allowed."
              },
              {
                  "audit_gate": "next_test_defined_without_refit_or_new_scoring",
                  "pass": next_test_defined and next_test_no_refit and next_test_no_new_scoring,
                  "value": NEXT_TEST_QUEUE[0]["next_test"],
                  "boundary": "Next test must be contrast checkpoint, not scoring or refit."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No model claim is allowed."
              }
          ]

          write_csv(
              OUTDIR / "reach_lane_contrast_integration_audit_v3_42.csv",
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          hard_failed = []

          if not h0licow_candidate_ok:
              hard_failed.append("h0licow_candidate_not_carried_forward_correctly")
          if not bao_global_blocked:
              hard_failed.append("bao_global_anchor_not_blocked")
          if not parked_preserved:
              hard_failed.append("parked_lanes_not_preserved")
          if not blocked_preserved:
              hard_failed.append("blocked_lanes_not_preserved")
          if not required_contract_present:
              hard_failed.append("required_contract_fields_missing")
          if not no_model_anchors:
              hard_failed.append("model_anchor_promotion_violation")
          if not no_refits:
              hard_failed.append("refit_guard_violation")
          if not (next_test_defined and next_test_no_refit and next_test_no_new_scoring):
              hard_failed.append("next_test_guard_incomplete")

          if hard_failed:
              readiness_label = "reach_lane_contrast_integration_needs_followup"
          else:
              readiness_label = "reach_lane_contrast_integration_passed_h0licow_candidate_bao_mixed_ready_for_growth_contrast"

          next_step = (
              "Build v3.43 reach/consolidation contrast checkpoint: compare H0LiCOW non-BAO reach candidate, BAO mixed/ruler diagnostic, and growth/consolidation negative pattern without new scoring, refit, or model-anchor promotion."
              if not hard_failed
              else "Repair v3.42 reach-lane contrast integration before moving to reach/consolidation contrast."
          )

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "previous_milestones": PREVIOUS_MILESTONES,
              "truth_boundary": TRUTH_BOUNDARY,
              "reach_lane_count": len(REACH_LANE_ROWS),
              "h0licow_candidate_ok": h0licow_candidate_ok,
              "bao_global_blocked": bao_global_blocked,
              "parked_lane_count": len(parked_rows),
              "blocked_lane_count": len(blocked_rows),
              "model_anchor_count": 0,
              "refit_allowed": False,
              "gate_result": {
                  "failed_gates": hard_failed,
                  "readiness_label": readiness_label,
                  "reach_lane_count": len(REACH_LANE_ROWS),
                  "h0licow_candidate_ok": h0licow_candidate_ok,
                  "bao_global_blocked": bao_global_blocked,
                  "parked_lanes": [r["lane_id"] for r in parked_rows],
                  "blocked_lanes": [r["lane_id"] for r in blocked_rows],
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "new_pressure_scores_built": False,
                  "next_allowed_step": next_step
              }
          }

          json_path = OUTDIR / "tairid_cosmology_v3_42_reach_lane_contrast_integration.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.42 — Reach-Lane Contrast Integration")
          md.append("")
          md.append(f"Created UTC: `{created_at}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(hard_failed) if hard_failed else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v3.42 integrates the current reach-lane results into one contrast ledger.")
          md.append("")
          md.append("It carries H0LiCOW as a coherent non-BAO time-delay reach candidate, keeps BAO mixed/subfamily only, keeps SH0ES and TDCOSMO parked, and keeps DESI mapped reach blocked as an independent anchor.")
          md.append("")
          md.append("It does not compute new pressure scores, does not refit, and does not promote model anchors.")
          md.append("")
          md.append("## Results")
          md.append("")
          md.append(f"- Reach lanes reviewed: `{len(REACH_LANE_ROWS)}`")
          md.append(f"- H0LiCOW candidate carried forward: `{h0licow_candidate_ok}`")
          md.append(f"- BAO global anchor blocked: `{bao_global_blocked}`")
          md.append(f"- Parked lanes: `{', '.join([r['lane_id'] for r in parked_rows])}`")
          md.append(f"- Blocked lanes: `{', '.join([r['lane_id'] for r in blocked_rows])}`")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          if not hard_failed:
              md.append("The reach lane is now role-specific instead of one flat bucket. H0LiCOW carries a coherent non-BAO time-delay direction; BAO remains mixed/ruler diagnostic; SH0ES and TDCOSMO stay parked; DESI mapped reach remains blocked as an independent anchor.")
          else:
              md.append("The reach-lane contrast integration found a bookkeeping or boundary problem. The next contrast step should wait.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `reach_lane_contrast_inventory_v3_42.csv`")
          md.append("- `reach_lane_integrated_interpretation_v3_42.csv`")
          md.append("- `reach_lane_next_test_queue_v3_42.csv`")
          md.append("- `reach_lane_contrast_integration_audit_v3_42.csv`")
          md.append("- `tairid_cosmology_v3_42_reach_lane_contrast_integration.json`")
          md.append("- `tairid_cosmology_v3_42_reach_lane_contrast_integration.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_42_reach_lane_contrast_integration.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if hard_failed:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.42 reach-lane contrast integration artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-42-reach-lane-contrast-integration
          path: artifacts/tairid_cosmology_v3_42/
