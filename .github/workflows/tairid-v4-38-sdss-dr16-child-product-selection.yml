name: TAIRID v4.38 SDSS DR16 Child Product Selection

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-38-sdss-dr16-child-product-selection.yml"

jobs:
  tairid-v4-38-sdss-dr16-child-product-selection:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.38 SDSS DR16 child product selection
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_38_sdss_dr16_child_product_selection

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_38_sdss_dr16_child_product_selection")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_38_sdss_dr16_child_product_selection"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run an eBOSS or SDSS likelihood.",
              "This does not compute a final RSD pressure score.",
              "This does not import or apply an eBOSS covariance matrix.",
              "This inspects SDSS DR16 final cosmology child paths and classifies candidate eBOSS products only.",
              "A pass means eBOSS child product candidates are classified, not that eBOSS covariance-aware testing is complete."
          ]

          ROOT_CANDIDATES = [
              {
                  "root_id": "sdss_dr16cosmo_v1_0_1_root",
                  "root_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/",
                  "root_status": "preferred_from_prior_locator"
              },
              {
                  "root_id": "sdss_dr16cosmo_v1_0_0_root",
                  "root_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/",
                  "root_status": "fallback_if_v1_0_1_unavailable"
              }
          ]

          CURRENT_EBOSS_ROWS = [
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "LRG",
                  "z_eff": 0.70,
                  "observable_axis": "f_sigma8",
                  "value": 0.473,
                  "sigma": 0.041,
                  "current_status": "published_summary_value_reviewed"
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "ELG",
                  "z_eff": 0.85,
                  "observable_axis": "f_sigma8",
                  "value": 0.315,
                  "sigma": 0.095,
                  "current_status": "published_summary_value_reviewed"
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "QSO",
                  "z_eff": 1.48,
                  "observable_axis": "f_sigma8",
                  "value": 0.462,
                  "sigma": 0.045,
                  "current_status": "published_summary_value_reviewed"
              }
          ]

          SELECTION_RULES = [
              {
                  "rule_id": "root_candidate_declared",
                  "description": "At least one SDSS DR16 cosmology root must be declared.",
                  "failure_mode": "Child product search has no source root."
              },
              {
                  "rule_id": "at_least_one_root_fetched",
                  "description": "At least one root should be fetched or the lane must remain blocked.",
                  "failure_mode": "No child product paths can be inspected."
              },
              {
                  "rule_id": "child_paths_classified",
                  "description": "Fetched child paths must be classified by likely likelihood, covariance, chain, data, documentation, or manual-review role.",
                  "failure_mode": "Child paths are listed without product meaning."
              },
              {
                  "rule_id": "tracer_labels_detected_or_marked",
                  "description": "Child products should be checked for LRG, ELG, QSO, and combined/multi-tracer labels.",
                  "failure_mode": "eBOSS tracer mapping is hidden."
              },
              {
                  "rule_id": "no_child_product_auto_maps",
                  "description": "No child path may automatically map to current eBOSS f_sigma8 rows without inspection.",
                  "failure_mode": "Directory listing becomes covariance use."
              },
              {
                  "rule_id": "no_covariance_likelihood_pressure_now",
                  "description": "This test may classify child products but must not import covariance, run likelihood, or compute pressure.",
                  "failure_mode": "Product selection becomes model testing."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "An eBOSS covariance matrix was imported.",
              "An eBOSS likelihood was run.",
              "A child product automatically maps to the current eBOSS f_sigma8 rows.",
              "The full RSD lane is covariance-aware.",
              "BOSS-only covariance resolves eBOSS covariance.",
              "WiggleZ covariance is resolved.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_39_eBOSS_child_product_mapping_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Audit whether selected SDSS DR16 child products map to eBOSS LRG, ELG, and QSO f_sigma8 rows.",
                  "must_include": "child product path, tracer labels, observable labels, BAO/RSD boundary, no pressure score.",
                  "must_not_include": "covariance application, likelihood run, validation claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_40_RSD_reference_uncertainty_boundary_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Define how reference-model uncertainty must enter before stronger RSD comparison.",
                  "must_include": "reference parameter uncertainty, Planck-chain boundary, growth curve uncertainty.",
                  "must_not_include": "treating approximate reference curve as full posterior."
              },
              {
                  "priority": 3,
                  "next_test": "v4_41_WiggleZ_covariance_locator_retry",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Try to locate a WiggleZ covariance/product path or formally keep WiggleZ non-final.",
                  "must_include": "source path, product status, row mapping, unresolved boundary if not found.",
                  "must_not_include": "treating WiggleZ as covariance-ready without product."
              }
          ]

          def clean_text(text):
              text = re.sub(r"<script.*?</script>", " ", text or "", flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def fetch_text(url, timeout=90, byte_limit=3_000_000):
              try:
                  request = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "Mozilla/5.0 TAIRID-v4.38-SDSS-DR16-child-product-selection",
                          "Accept": "text/html,text/plain,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
                      }
                  )
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "fetch_ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "fetch_ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def extract_links(base_url, html_text):
              links = []
              for match in re.finditer(r'<a\s+[^>]*href=["\']([^"\']+)["\'][^>]*>(.*?)</a>', html_text or "", flags=re.IGNORECASE | re.DOTALL):
                  href = match.group(1).strip()
                  label = clean_text(match.group(2))
                  absolute = urllib.parse.urljoin(base_url, href)
                  if href not in ["../", "./"]:
                      links.append({"href": absolute, "label": label})
              return links

          def detect_tracer(url, label):
              combined = (url + " " + label).lower()
              hits = []

              for tracer in ["lrg", "elg", "qso", "lya", "mgs", "boss", "cmass", "lowz"]:
                  if tracer in combined:
                      hits.append(tracer.upper())

              if "combined" in combined or "multi" in combined or "all" in combined:
                  hits.append("COMBINED_OR_MULTI")

              if not hits:
                  hits.append("TRACER_UNCLEAR")

              return ";".join(sorted(set(hits)))

          def classify_child(url, label):
              combined = (url + " " + label).lower()

              if combined.endswith("/") or label.endswith("/"):
                  product_class = "directory_child"
              elif any(token in combined for token in ["covariance", "covmat", "cov_", "invcov", "inverse"]):
                  product_class = "covariance_candidate"
              elif any(token in combined for token in ["likelihood", "like", "gaussian"]):
                  product_class = "likelihood_candidate"
              elif any(token in combined for token in ["cosmomc", "chain", "chains", "mcmc"]):
                  product_class = "chain_candidate"
              elif any(token in combined for token in [".tar.gz", ".tgz", ".zip"]):
                  product_class = "archive_candidate"
              elif any(token in combined for token in [".txt", ".dat", ".csv", ".ini", ".param"]):
                  product_class = "text_or_config_candidate"
              elif any(token in combined for token in ["readme", "doc", "note"]):
                  product_class = "documentation_candidate"
              else:
                  product_class = "manual_review_candidate"

              if "bao" in combined and not any(token in combined for token in ["rsd", "fsigma", "f_sigma", "fsig"]):
                  role_mapping = "BAO_boundary_candidate_not_growth_until_reviewed"
              elif any(token in combined for token in ["rsd", "fsigma", "f_sigma", "fsig", "growth"]):
                  role_mapping = "possible_RSD_growth_candidate_mapping_needed"
              elif any(token in combined for token in ["likelihood", "like", "gaussian", "covariance", "covmat"]):
                  role_mapping = "possible_likelihood_or_covariance_mapping_needed"
              else:
                  role_mapping = "manual_review_needed"

              return product_class, role_mapping

          def likely_relevant(product_class, role_mapping, tracer_label):
              if product_class in [
                  "covariance_candidate",
                  "likelihood_candidate",
                  "chain_candidate",
                  "archive_candidate",
                  "text_or_config_candidate",
                  "directory_child"
              ]:
                  return True
              if "RSD" in role_mapping or "covariance" in role_mapping.lower():
                  return True
              if any(t in tracer_label for t in ["LRG", "ELG", "QSO"]):
                  return True
              return False

          failed_gates = []
          warnings = []

          root_fetch_rows = []
          child_product_rows = []

          for root in ROOT_CANDIDATES:
              fetched = fetch_text(root["root_url"])
              links = extract_links(root["root_url"], fetched["text"]) if fetched["fetch_ok"] else []

              root_fetch_rows.append({
                  "root_id": root["root_id"],
                  "root_url": root["root_url"],
                  "root_status": root["root_status"],
                  "fetch_ok": fetched["fetch_ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"],
                  "child_link_count": len(links)
              })

              for idx, link in enumerate(links):
                  product_class, role_mapping = classify_child(link["href"], link["label"])
                  tracer_label = detect_tracer(link["href"], link["label"])
                  relevant = likely_relevant(product_class, role_mapping, tracer_label)

                  child_product_rows.append({
                      "root_id": root["root_id"],
                      "child_index": idx,
                      "label": link["label"],
                      "child_url": link["href"],
                      "product_class": product_class,
                      "tracer_label": tracer_label,
                      "role_mapping_status": role_mapping,
                      "likely_relevant_for_eBOSS_RSD": relevant,
                      "maps_to_current_eBOSS_rows_now": False,
                      "covariance_imported_now": False,
                      "likelihood_run_now": False,
                      "pressure_score_allowed_now": False
                  })

          fetched_root_count = sum(1 for row in root_fetch_rows if row["fetch_ok"] is True)
          relevant_children = [row for row in child_product_rows if row["likely_relevant_for_eBOSS_RSD"] is True]

          tracer_lrg = [row for row in child_product_rows if "LRG" in row["tracer_label"]]
          tracer_elg = [row for row in child_product_rows if "ELG" in row["tracer_label"]]
          tracer_qso = [row for row in child_product_rows if "QSO" in row["tracer_label"]]

          covariance_candidates = [row for row in child_product_rows if row["product_class"] == "covariance_candidate"]
          likelihood_candidates = [row for row in child_product_rows if row["product_class"] == "likelihood_candidate"]
          chain_candidates = [row for row in child_product_rows if row["product_class"] == "chain_candidate"]
          archive_candidates = [row for row in child_product_rows if row["product_class"] == "archive_candidate"]
          directory_children = [row for row in child_product_rows if row["product_class"] == "directory_child"]

          if not ROOT_CANDIDATES:
              failed_gates.append("no_root_candidates_declared")

          if fetched_root_count < 1:
              failed_gates.append("no_SDSS_DR16_root_fetched")

          if fetched_root_count >= 1 and len(child_product_rows) == 0:
              failed_gates.append("no_child_paths_found")

          if len(child_product_rows) > 0 and len(relevant_children) == 0:
              warnings.append("no_likely_relevant_eBOSS_RSD_children_detected_by_simple_classifier")

          if not tracer_lrg:
              warnings.append("LRG_child_label_not_detected")
          if not tracer_elg:
              warnings.append("ELG_child_label_not_detected")
          if not tracer_qso:
              warnings.append("QSO_child_label_not_detected")

          for row in child_product_rows:
              if row["maps_to_current_eBOSS_rows_now"] is not False:
                  failed_gates.append("child_product_auto_mapped_without_inspection")
              if row["covariance_imported_now"] is not False:
                  failed_gates.append("covariance_imported_during_child_selection")
              if row["likelihood_run_now"] is not False:
                  failed_gates.append("likelihood_run_during_child_selection")
              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append("pressure_allowed_during_child_selection")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "covariance matrix was imported",
              "likelihood was run",
              "automatically maps",
              "full rsd lane",
              "wigglez",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          warnings.append("child_product_selection_does_not_import_covariance")
          warnings.append("child_product_selection_does_not_run_likelihood")
          warnings.append("child_paths_do_not_auto_map_to_current_eBOSS_rows")
          warnings.append("BOSS_only_covariance_preview_remains_BOSS_only")
          warnings.append("reference_model_uncertainty_still_missing")
          warnings.append("WiggleZ_covariance_still_unresolved")

          rule_results = [
              {
                  "rule_id": "root_candidate_declared",
                  "pass": len(ROOT_CANDIDATES) >= 1,
                  "result": "SDSS_DR16_root_candidates_declared",
                  "boundary": "Declared roots are not evidence by themselves."
              },
              {
                  "rule_id": "at_least_one_root_fetched",
                  "pass": fetched_root_count >= 1,
                  "result": f"{fetched_root_count} root candidate(s) fetched",
                  "boundary": "Fetched directory is only a locator."
              },
              {
                  "rule_id": "child_paths_classified",
                  "pass": len(child_product_rows) > 0 and all(bool(row["product_class"]) for row in child_product_rows),
                  "result": f"{len(child_product_rows)} child paths classified",
                  "boundary": "Classification is not covariance use."
              },
              {
                  "rule_id": "tracer_labels_detected_or_marked",
                  "pass": len(child_product_rows) > 0 and all(bool(row["tracer_label"]) for row in child_product_rows),
                  "result": "all_child_paths_have_tracer_label_or_unclear_marker",
                  "boundary": "Tracer labels still require mapping audit."
              },
              {
                  "rule_id": "no_child_product_auto_maps",
                  "pass": all(row["maps_to_current_eBOSS_rows_now"] is False for row in child_product_rows),
                  "result": "no_child_path_auto_maps_to_current_eBOSS_rows",
                  "boundary": "Mapping requires v4.39."
              },
              {
                  "rule_id": "no_covariance_likelihood_pressure_now",
                  "pass": all(
                      row["covariance_imported_now"] is False
                      and row["likelihood_run_now"] is False
                      and row["pressure_score_allowed_now"] is False
                      for row in child_product_rows
                  ),
                  "result": "no_covariance_no_likelihood_no_pressure",
                  "boundary": "Product selection only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_child_product_selection_rules_passed")

          if failed_gates:
              readiness_label = "SDSS_DR16_child_product_selection_failed"
              next_step = "Repair SDSS DR16 root fetch or child classification before eBOSS mapping audit."
          else:
              readiness_label = "SDSS_DR16_child_product_selection_passed_ready_for_eBOSS_child_product_mapping_audit"
              next_step = (
                  "Proceed to v4.39 eBOSS child product mapping audit. "
                  "Do not import covariance or run likelihood until child products are mapped to eBOSS f_sigma8 rows."
              )

          system_health = {
              "root_candidate_count": len(ROOT_CANDIDATES),
              "fetched_root_count": fetched_root_count,
              "child_product_count": len(child_product_rows),
              "likely_relevant_child_count": len(relevant_children),
              "directory_child_count": len(directory_children),
              "covariance_candidate_count": len(covariance_candidates),
              "likelihood_candidate_count": len(likelihood_candidates),
              "chain_candidate_count": len(chain_candidates),
              "archive_candidate_count": len(archive_candidates),
              "LRG_child_label_count": len(tracer_lrg),
              "ELG_child_label_count": len(tracer_elg),
              "QSO_child_label_count": len(tracer_qso),
              "current_eBOSS_row_count": len(CURRENT_EBOSS_ROWS),
              "child_products_auto_mapped": False,
              "covariance_imported": False,
              "likelihood_run": False,
              "pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "BOSS_only_preview_still_BOSS_only": True,
              "full_RSD_covariance_complete": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          interpretation = (
              "v4.38 inspects SDSS DR16 final cosmology child product paths and classifies possible eBOSS likelihood, covariance, chain, archive, and directory candidates. "
              "It does not select a final covariance product, does not map child files to the current eBOSS f_sigma8 rows, does not import covariance, and does not run likelihood. "
              "The next step is a child product mapping audit."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "root_candidates": ROOT_CANDIDATES,
              "root_fetch_rows": root_fetch_rows,
              "current_eboss_rows": CURRENT_EBOSS_ROWS,
              "child_product_rows": child_product_rows,
              "selection_rules": SELECTION_RULES,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_final_pressure_score_built": False,
                  "covariance_imported": False,
                  "likelihood_run": False,
                  "child_products_mapped": False,
                  "full_RSD_covariance_complete": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "sdss_dr16_root_fetch_rows_v4_38.csv",
              root_fetch_rows,
              [
                  "root_id",
                  "root_url",
                  "root_status",
                  "fetch_ok",
                  "http_status",
                  "content_type",
                  "bytes_read",
                  "error",
                  "child_link_count"
              ]
          )

          write_csv(
              OUTDIR / "sdss_dr16_child_product_rows_v4_38.csv",
              child_product_rows,
              [
                  "root_id",
                  "child_index",
                  "label",
                  "child_url",
                  "product_class",
                  "tracer_label",
                  "role_mapping_status",
                  "likely_relevant_for_eBOSS_RSD",
                  "maps_to_current_eBOSS_rows_now",
                  "covariance_imported_now",
                  "likelihood_run_now",
                  "pressure_score_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "current_eboss_rows_v4_38.csv",
              CURRENT_EBOSS_ROWS,
              ["row_id", "survey_family", "tracer_or_sample", "z_eff", "observable_axis", "value", "sigma", "current_status"]
          )

          write_csv(
              OUTDIR / "child_product_selection_rule_results_v4_38.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_38.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_38.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_38.csv",
              [system_health],
              [
                  "root_candidate_count",
                  "fetched_root_count",
                  "child_product_count",
                  "likely_relevant_child_count",
                  "directory_child_count",
                  "covariance_candidate_count",
                  "likelihood_candidate_count",
                  "chain_candidate_count",
                  "archive_candidate_count",
                  "LRG_child_label_count",
                  "ELG_child_label_count",
                  "QSO_child_label_count",
                  "current_eBOSS_row_count",
                  "child_products_auto_mapped",
                  "covariance_imported",
                  "likelihood_run",
                  "pressure_score_allowed_now",
                  "validation_claim_allowed",
                  "BOSS_only_preview_still_BOSS_only",
                  "full_RSD_covariance_complete",
                  "rule_pass_count",
                  "rule_total_count"
              ]
          )

          json_path = OUTDIR / "tairid_v4_38_sdss_dr16_child_product_selection.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.38 — SDSS DR16 Child Product Selection")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
