name: TAIRID Cosmology v4.12 DES PPD Chain Path Boundary Audit Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-12-des-ppd-chain-path-boundary-audit-onefile.yml"

jobs:
  des-ppd-chain-path-boundary-audit-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.12 DES PPD chain path boundary audit onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_12_des_ppd_chain_path_boundary_audit_onefile

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_12_des_ppd_chain_path_boundary_audit_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_12_des_ppd_chain_path_boundary_audit_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine KiDS, DES, and HSC into one posterior.",
              "This does not parse DES posterior chains.",
              "This does not run a DES likelihood.",
              "This audits DES chain/path evidence from public result pages and DES PPD repository/config files.",
              "A pass means DES chain-path status was classified, not that DES posterior parsing succeeded."
          ]

          DES_RESULT_HUB = "https://www.darkenergysurvey.org/des-year-3-cosmology-results-papers/"
          DES_DATA_ACCESS = "https://www.darkenergysurvey.org/the-des-project/data-access/"
          DES_NCSA_HOME = "https://des.ncsa.illinois.edu/"

          PPD_REPO_API = "https://api.github.com/repos/des-science/y3-3x2pt-ppd-postunblinding"
          PPD_RAW_BASE = "https://raw.githubusercontent.com/des-science/y3-3x2pt-ppd-postunblinding"
          PPD_PARAMS_RAW = "https://raw.githubusercontent.com/des-science/y3-3x2pt-ppd-postunblinding/main/params_ppd.ini"

          SOURCE_LEDGER = [
              {
                  "source_id": "v4_11_1_hsc_boundary_result",
                  "family": "HSC",
                  "source_type": "prior_artifact",
                  "used_for": "HSC kept as published-summary row; next repair lane moves to DES."
              },
              {
                  "source_id": "des_y3_cosmology_results_hub",
                  "family": "DES",
                  "source_type": "official_results_hub",
                  "source_url": DES_RESULT_HUB,
                  "used_for": "DES Year 3 cosmology result/product discovery."
              },
              {
                  "source_id": "des_data_access",
                  "family": "DES",
                  "source_type": "official_data_access",
                  "source_url": DES_DATA_ACCESS,
                  "used_for": "DES official data access discovery."
              },
              {
                  "source_id": "des_y3_3x2pt_ppd_repo",
                  "family": "DES",
                  "source_type": "github_repository",
                  "source_url": "https://github.com/des-science/y3-3x2pt-ppd-postunblinding",
                  "used_for": "DES PPD and chain path discovery."
              }
          ]

          POSTERIOR_WORDS = [
              "posterior",
              "posteriors",
              "chain",
              "chains",
              "sample",
              "samples",
              "mcmc",
              "multinest"
          ]

          PRODUCT_WORDS = [
              "3x2pt",
              "2pt",
              "cosmosis",
              "ppd",
              "likelihood",
              "data",
              "data_vector",
              "datavector",
              "covariance",
              "fits",
              "sacc",
              "output",
              "results",
              "final_paper",
              "y3_chains"
          ]

          DATA_EXTENSIONS = [
              ".txt",
              ".dat",
              ".csv",
              ".h5",
              ".hdf5",
              ".npz",
              ".npy",
              ".fits",
              ".fit",
              ".sacc",
              ".pkl",
              ".pickle",
              ".tar",
              ".tar.gz",
              ".tgz",
              ".zip",
              ".gz"
          ]

          CONFIG_EXTENSIONS = [
              ".py",
              ".ini",
              ".yaml",
              ".yml",
              ".json",
              ".md",
              ".sh",
              ".tex"
          ]

          PUBLIC_DES_BASES = [
              "https://des.ncsa.illinois.edu/",
              "https://des.ncsa.illinois.edu/releases/y3a2/Y3key-products/",
              "https://des.ncsa.illinois.edu/releases/y3a2/",
              "https://www.darkenergysurvey.org/"
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def fetch_text(url, timeout=90, byte_limit=5_000_000):
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 TAIRID-v4.12-DES-chain-path-boundary-audit",
                      "Accept": "*/*"
                  }
              )
              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def fetch_json(url):
              result = fetch_text(url, byte_limit=10_000_000)
              if not result["ok"]:
                  return result, None
              try:
                  return result, json.loads(result["text"])
              except Exception as exc:
                  result["ok"] = False
                  result["error"] = f"json_parse_error:{repr(exc)}"
                  return result, None

          def clean_link(value):
              value = str(value or "").strip().strip("'\"")
              value = value.split("#")[0].strip()
              return value

          def score_item(value, context=""):
              lower = f"{value} {context}".lower()
              score = 0
              reasons = []

              for word in POSTERIOR_WORDS:
                  if word in lower:
                      score += 10
                      reasons.append(f"posterior_word:{word}")

              for word in PRODUCT_WORDS:
                  if word in lower:
                      score += 6
                      reasons.append(f"product_word:{word}")

              for ext in DATA_EXTENSIONS:
                  if ext in lower:
                      score += 7
                      reasons.append(f"data_extension:{ext}")

              for ext in CONFIG_EXTENSIONS:
                  if ext in lower:
                      score += 3
                      reasons.append(f"config_extension:{ext}")

              if "projectdirs/des/www" in lower:
                  score += 20
                  reasons.append("des_internal_public_www_path_signal")

              if "final_paper_chains" in lower:
                  score += 18
                  reasons.append("final_paper_chains_signal")

              if "y3_chains" in lower:
                  score += 15
                  reasons.append("y3_chains_signal")

              if "chain_%" in lower or "%(run_name)" in lower or "${runname}" in lower:
                  score += 5
                  reasons.append("chain_template_signal")

              return score, ";".join(reasons)

          def classify_product(value, context=""):
              lower = f"{value} {context}".lower()

              has_posterior = any(word in lower for word in POSTERIOR_WORDS)
              has_data_ext = any(ext in lower for ext in DATA_EXTENSIONS)
              has_config_ext = any(ext in lower for ext in CONFIG_EXTENSIONS)
              has_template = "%(" in lower or "${" in lower or "error" in lower
              has_internal_www = "projectdirs/des/www" in lower
              has_final_chains = "final_paper_chains" in lower or "y3_chains" in lower

              if has_internal_www and has_final_chains and has_template:
                  return "des_internal_chain_template_public_url_needed"

              if has_internal_www and has_final_chains:
                  return "des_internal_chain_path_candidate_public_probe_needed"

              if has_posterior and has_data_ext and not has_config_ext:
                  return "possible_des_posterior_chain_or_sample_product"

              if has_posterior and has_config_ext:
                  return "des_chain_or_posterior_config_code_not_samples"

              if "data_vector" in lower or "datavector" in lower or "covariance" in lower or "fits" in lower or "sacc" in lower:
                  return "des_data_vector_or_covariance_product_not_chain"

              if "likelihood" in lower or "cosmosis" in lower or "ppd" in lower:
                  return "des_likelihood_or_ppd_infrastructure_not_chain_samples"

              if has_data_ext:
                  return "des_supporting_data_product_role_unclear"

              if has_config_ext:
                  return "des_supporting_config_or_code_product"

              return "context_or_unknown_product"

          def extract_links(base_url, text):
              rows = []
              href_pattern = re.compile(r"<a\\b[^>]*?href\\s*=\\s*['\\\"]([^'\\\"]+)['\\\"]", re.IGNORECASE)
              for match in href_pattern.finditer(text or ""):
                  href = clean_link(match.group(1))
                  if not href or href.startswith("mailto:"):
                      continue
                  full = urllib.parse.urljoin(base_url, href)
                  rows.append(full)

              raw_pattern = re.compile(r"https?://[^\\s\\\"'<>]+", re.IGNORECASE)
              for match in raw_pattern.finditer(text or ""):
                  rows.append(clean_link(match.group(0).rstrip(").,;]")))

              return sorted(set(row for row in rows if row))

          def extract_internal_chain_paths(text, source_url):
              rows = []

              patterns = [
                  r"/project/projectdirs/des/www/[^\\s;'\\\"#]+",
                  r"y3_chains/[^\\s;'\\\"#]+",
                  r"final_paper_chains/[^\\s;'\\\"#]+",
                  r"chain_[^\\s;'\\\"#]+\\.txt"
              ]

              for pattern in patterns:
                  for match in re.finditer(pattern, text or ""):
                      value = clean_link(match.group(0))
                      if not value:
                          continue
                      score, reasons = score_item(value, source_url)
                      rows.append({
                          "source_url": source_url,
                          "raw_path_or_template": value,
                          "candidate_score": score,
                          "score_reasons": reasons,
                          "classification": classify_product(value, source_url),
                          "contains_placeholder": "%(" in value or "${" in value or "ERROR" in value
                      })

              # Also capture assignment-style paths.
              for line_number, raw in enumerate((text or "").splitlines(), start=1):
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue

                  if "=" not in line:
                      continue

                  key, value = line.split("=", 1)
                  key = key.strip()
                  value = clean_link(value)

                  lower = f"{key} {value}".lower()
                  if "chain" not in lower and "posterior" not in lower and "y3_chains" not in lower:
                      continue

                  score, reasons = score_item(value, key)
                  if score <= 0:
                      continue

                  rows.append({
                      "source_url": source_url,
                      "raw_path_or_template": value,
                      "candidate_score": score,
                      "score_reasons": reasons,
                      "classification": classify_product(value, key),
                      "contains_placeholder": "%(" in value or "${" in value or "ERROR" in value
                  })

              dedup = {}
              for row in rows:
                  key = (row["source_url"], row["raw_path_or_template"])
                  if key not in dedup or row["candidate_score"] > dedup[key]["candidate_score"]:
                      dedup[key] = row

              return sorted(dedup.values(), key=lambda row: row["candidate_score"], reverse=True)

          def derive_public_urls(raw_path):
              raw_path = clean_link(raw_path)
              urls = []

              if "%(" in raw_path or "${" in raw_path:
                  return urls

              if raw_path.startswith("http://") or raw_path.startswith("https://"):
                  return [raw_path]

              if "/project/projectdirs/des/www/" in raw_path:
                  suffix = raw_path.split("/project/projectdirs/des/www/", 1)[1]
                  for base in PUBLIC_DES_BASES:
                      urls.append(urllib.parse.urljoin(base, suffix))
              elif raw_path.startswith("y3_chains/") or raw_path.startswith("final_paper_chains/"):
                  for base in PUBLIC_DES_BASES:
                      urls.append(urllib.parse.urljoin(base, raw_path))
              elif raw_path.startswith("chain_"):
                  for base in PUBLIC_DES_BASES:
                      urls.append(urllib.parse.urljoin(base + "y3_chains/3x2pt/final_paper_chains/", raw_path))

              return sorted(set(urls))

          def probe_url(url):
              result = fetch_text(url, timeout=45, byte_limit=200000)
              text = result["text"] or ""
              lower = text[:50000].lower()

              numeric_lines = 0
              first_numeric = ""

              for raw in text.splitlines()[:500]:
                  parts = raw.replace(",", " ").split()
                  if len(parts) < 3:
                      continue
                  try:
                      [float(x) for x in parts]
                      numeric_lines += 1
                      if not first_numeric:
                          first_numeric = raw[:240]
                  except Exception:
                      pass

              contains_axis = any(axis in lower for axis in ["s8", "s_8", "sigma8", "sigma_8", "omega_m", "omegam"])
              contains_chain_language = any(word in lower for word in POSTERIOR_WORDS)

              if result["ok"] and numeric_lines >= 10 and (contains_axis or contains_chain_language or "chain" in url.lower()):
                  classification = "reachable_possible_des_chain_product"
              elif result["ok"] and numeric_lines >= 10:
                  classification = "reachable_numeric_product_role_unclear"
              elif result["ok"]:
                  classification = "reachable_context_or_config_product"
              else:
                  classification = "not_reachable"

              return {
                  "candidate_url": url,
                  "fetch_ok": result["ok"],
                  "http_status": result["http_status"],
                  "content_type": result["content_type"],
                  "bytes_read": result["bytes_read"],
                  "error": result["error"],
                  "numeric_line_count_first_500": numeric_lines,
                  "first_numeric_preview": first_numeric,
                  "contains_axis_words": contains_axis,
                  "contains_chain_language": contains_chain_language,
                  "probe_classification": classification
              }

          def repo_default_branch(api_url):
              result, data = fetch_json(api_url)
              if result["ok"] and isinstance(data, dict):
                  return data.get("default_branch") or "main", result
              return "main", result

          def fetch_repo_tree(api_url, branch):
              result, data = fetch_json(f"{api_url}/git/trees/{branch}?recursive=1")
              if result["ok"] and isinstance(data, dict):
                  return result, data.get("tree", [])
              return result, []

          def raw_url_for(branch, path):
              return f"{PPD_RAW_BASE}/{branch}/{path}"

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          created_at = now_iso()

          source_fetch_rows = []
          page_candidate_rows = []

          for source_url in [DES_RESULT_HUB, DES_DATA_ACCESS, DES_NCSA_HOME, PPD_PARAMS_RAW]:
              fetched = fetch_text(source_url)
              source_fetch_rows.append({
                  "source_url": source_url,
                  "fetch_ok": fetched["ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"]
              })

              if fetched["ok"]:
                  for link in extract_links(source_url, fetched["text"]):
                      score, reasons = score_item(link, source_url)
                      if score <= 0:
                          continue
                      page_candidate_rows.append({
                          "source_url": source_url,
                          "candidate_url": link,
                          "candidate_score": score,
                          "score_reasons": reasons,
                          "classification": classify_product(link, source_url)
                      })

          default_branch, repo_meta_fetch = repo_default_branch(PPD_REPO_API)
          repo_tree_fetch, repo_tree = fetch_repo_tree(PPD_REPO_API, default_branch)

          repo_candidate_rows = []
          fetched_repo_files = []
          chain_path_rows = []

          for item in repo_tree:
              if item.get("type") != "blob":
                  continue

              path = item.get("path", "")
              if not path:
                  continue

              score, reasons = score_item(path, "des ppd repository")
              classification = classify_product(path, "des ppd repository")

              if score > 0:
                  repo_candidate_rows.append({
                      "path": path,
                      "raw_url": raw_url_for(default_branch, path),
                      "size": item.get("size", ""),
                      "candidate_score": score,
                      "score_reasons": reasons,
                      "classification": classification
                  })

          repo_candidate_rows.sort(key=lambda row: row["candidate_score"], reverse=True)

          # Fetch the strongest repo files likely to contain chain-path templates.
          for row in repo_candidate_rows[:40]:
              if not any(row["path"].lower().endswith(ext) for ext in CONFIG_EXTENSIONS + [".txt"]):
                  continue

              fetched = fetch_text(row["raw_url"])
              fetched_repo_files.append({
                  "path": row["path"],
                  "raw_url": row["raw_url"],
                  "fetch_ok": fetched["ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"]
              })

              if fetched["ok"]:
                  chain_path_rows.extend(extract_internal_chain_paths(fetched["text"], row["raw_url"]))

          # Always parse params_ppd.ini directly.
          params_fetch = fetch_text(PPD_PARAMS_RAW)
          if params_fetch["ok"]:
              chain_path_rows.extend(extract_internal_chain_paths(params_fetch["text"], PPD_PARAMS_RAW))

          # Deduplicate chain path rows.
          dedup_paths = {}
          for row in chain_path_rows:
              key = row["raw_path_or_template"]
              if key not in dedup_paths or row["candidate_score"] > dedup_paths[key]["candidate_score"]:
                  dedup_paths[key] = row

          chain_path_rows = sorted(dedup_paths.values(), key=lambda row: row["candidate_score"], reverse=True)

          public_probe_rows = []

          for row in chain_path_rows:
              for url in derive_public_urls(row["raw_path_or_template"]):
                  public_probe_rows.append({
                      "raw_path_or_template": row["raw_path_or_template"],
                      **probe_url(url)
                  })

          page_candidate_rows.sort(key=lambda row: row["candidate_score"], reverse=True)
          public_probe_rows.sort(key=lambda row: (row["fetch_ok"], row["numeric_line_count_first_500"]), reverse=True)

          reachable_chain_products = [
              row for row in public_probe_rows
              if row["probe_classification"] == "reachable_possible_des_chain_product"
          ]

          internal_chain_templates = [
              row for row in chain_path_rows
              if row["classification"] == "des_internal_chain_template_public_url_needed"
          ]

          internal_chain_paths = [
              row for row in chain_path_rows
              if row["classification"] == "des_internal_chain_path_candidate_public_probe_needed"
          ]

          possible_page_products = [
              row for row in page_candidate_rows
              if row["classification"] in [
                  "possible_des_posterior_chain_or_sample_product",
                  "des_data_vector_or_covariance_product_not_chain",
                  "des_likelihood_or_ppd_infrastructure_not_chain_samples"
              ]
          ]

          failed_gates = []
          warnings = []

          if not any(row["fetch_ok"] for row in source_fetch_rows):
              failed_gates.append("no_des_source_pages_fetchable")

          if not repo_tree_fetch["ok"]:
              warnings.append("des_ppd_repo_tree_not_fetchable")

          if not reachable_chain_products:
              warnings.append("no_reachable_des_posterior_chain_product_confirmed")

          if internal_chain_templates:
              warnings.append("des_internal_final_paper_chain_template_found_but_run_name_or_public_url_needed")

          if possible_page_products and not reachable_chain_products:
              warnings.append("des_product_or_infrastructure_candidates_found_but_not_chain_parse_ready")

          if failed_gates:
              readiness_label = "des_ppd_chain_path_boundary_audit_onefile_failed"
              next_step = "Repair DES source access before DES product repair."
          elif reachable_chain_products:
              readiness_label = "des_ppd_chain_path_boundary_audit_onefile_completed_reachable_chain_candidate_found"
              next_step = (
                  "Proceed to v4.13 DES reachable-chain parser probe for the selected candidate. "
                  "Do not run likelihood or combine surveys."
              )
          elif internal_chain_templates or internal_chain_paths:
              readiness_label = "des_ppd_chain_path_boundary_audit_onefile_completed_internal_chain_template_found"
              next_step = (
                  "Proceed to v4.13 DES chain-template public URL/run-name repair. "
                  "Do not claim DES posterior parsing yet."
              )
          elif possible_page_products:
              readiness_label = "des_ppd_chain_path_boundary_audit_onefile_completed_products_found_manual_selection_needed"
              next_step = (
                  "Keep DES as a published-summary row until a direct chain URL is found. "
                  "Proceed to a v4.x robustness handoff or manual DES product selection."
              )
          else:
              readiness_label = "des_ppd_chain_path_boundary_audit_onefile_completed_keep_des_summary_row"
              next_step = (
                  "Keep DES as a published-summary row. "
                  "Proceed to a v4.x robustness handoff."
              )

          selector_decision = {
              "reachable_des_chain_candidate_count": len(reachable_chain_products),
              "internal_chain_template_count": len(internal_chain_templates),
              "internal_chain_path_count": len(internal_chain_paths),
              "page_product_candidate_count": len(possible_page_products),
              "des_direct_chain_replacement_allowed": bool(reachable_chain_products),
              "des_summary_row_should_remain_active": not bool(reachable_chain_products),
              "next_action": next_step
          }

          interpretation = (
              "v4.12 audits DES direct-chain availability after HSC stayed summary-only. "
              "If DES exposes only internal final-paper chain templates or PPD infrastructure, DES remains a published-summary row until the actual public chain file can be reached and parsed. "
              "This does not change the v4.6 growth-family pattern; it prevents a false direct-chain replacement claim."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "truth_boundary": TRUTH_BOUNDARY,
              "source_ledger": SOURCE_LEDGER,
              "source_fetch_rows": source_fetch_rows,
              "repo_fetch": {
                  "repo_meta_ok": repo_meta_fetch["ok"],
                  "repo_tree_ok": repo_tree_fetch["ok"],
                  "default_branch": default_branch,
                  "repo_meta_error": repo_meta_fetch["error"],
                  "repo_tree_error": repo_tree_fetch["error"]
              },
              "page_candidate_rows_top_100": page_candidate_rows[:100],
              "repo_candidate_rows_top_100": repo_candidate_rows[:100],
              "fetched_repo_files": fetched_repo_files,
              "des_chain_path_rows": chain_path_rows,
              "des_public_url_probe_rows": public_probe_rows,
              "selector_decision": selector_decision,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_growth_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "posterior_chain_parsed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "posterior_chain_parsed": False
              }
          }

          write_csv(
              OUTDIR / "des_source_fetch_v4_12.csv",
              source_fetch_rows,
