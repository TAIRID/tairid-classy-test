name: 000 TAIRID v4.195 - Dyslexia Aphantasia Subject Level Axis And Covariance Extraction With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-195-dyslexia-aphantasia-subject-level-axis-and-covariance-extraction-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-195-dyslexia-aphantasia-subject-axis-covariance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.195 dyslexia aphantasia subject axis and covariance extraction
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_195_outputs
          cat > tairid_v4_195_outputs/run_v4_195.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path
          from statistics import mean

          OUT = Path("tairid_v4_195_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "dyslexia_aphantasia_subject_level_axis_and_covariance_extraction_passed_templates_and_readiness_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "subject-level covariance is not validation",
              "manual numeric anchors are not external replication",
              "TAIRID not proved"
          ]

          V4_194_STATUS = {
              "version": "v4.194",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "axis_rows": 2,
              "numeric_axis_rows": 2,
              "same_axis_count": 2,
              "different_axis_count": 1,
              "package_status": "dyslexia_aphantasia_axis_tables_written_no_validation",
              "selected_next_route": "dyslexia_aphantasia_subject_level_axis_and_covariance_extraction_with_scope_guards"
          }

          AXIS_TEMPLATE_COLUMNS = [
              "lane",
              "subject_id",
              "group_or_condition",
              "boundary_or_task",
              "propagation_reach_value",
              "pacing_access_value",
              "consolidation_growth_value",
              "viability_or_outcome_value",
              "source_or_dataset",
              "notes"
          ]

          TEMPLATE_ROWS = [
              {
                  "lane": "Dyslexia",
                  "subject_id": "replace_with_subject_or_group_id",
                  "group_or_condition": "dyslexic_or_control_or_group",
                  "boundary_or_task": "ETDD70 reading-flow surface",
                  "propagation_reach_value": "s_A or equivalent",
                  "pacing_access_value": "lambda_R or timing/load equivalent",
                  "consolidation_growth_value": "rho_R or re-entry/accuracy equivalent",
                  "viability_or_outcome_value": "V_data or reading viability/outcome",
                  "source_or_dataset": "ETDD70 / uploaded dyslexia table",
                  "notes": "Do not mix units with aphantasia; this row is within-lane."
              },
              {
                  "lane": "Aphantasia",
                  "subject_id": "replace_with_subject_or_group_id",
                  "group_or_condition": "aphantasia_or_control_or_group",
                  "boundary_or_task": "visual imagery / reconstruction surface",
                  "propagation_reach_value": "visual imagery reach or inverse VVIQ-like value",
                  "pacing_access_value": "burden/load/timing/mismatch equivalent",
                  "consolidation_growth_value": "reconstruction viability or accuracy equivalent",
                  "viability_or_outcome_value": "task viability/outcome or burden-adjusted performance",
                  "source_or_dataset": "aphantasia questionnaire/drawing/physiology output",
                  "notes": "Do not mix units with dyslexia; this row is within-lane."
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def try_float(x):
              try:
                  if x is None or str(x).strip() == "":
                      return None
                  return float(x)
              except Exception:
                  return None

          def read_subject_axis_inputs():
              paths = [
                  Path("data/neurotype/dyslexia_aphantasia_subject_axis_input.csv"),
                  Path("data/neurotype/subject_axis_input.csv"),
                  Path("data/cross_domain/dyslexia_aphantasia_subject_axis_input.csv"),
                  Path("data/cross_domain/subject_axis_input.csv")
              ]
              rows = []
              inventory = []
              for path in paths:
                  exists = path.exists()
                  count = 0
                  if exists:
                      with open(path, newline="", encoding="utf-8") as f:
                          for row in csv.DictReader(f):
                              row["_source_file"] = str(path)
                              rows.append(row)
                              count += 1
                  inventory.append({
                      "path": str(path),
                      "exists": exists,
                      "rows_loaded": count
                  })
              return rows, inventory

          def sample_std(vals):
              vals = [v for v in vals if v is not None]
              if len(vals) < 2:
                  return ""
              m = sum(vals) / len(vals)
              return math.sqrt(sum((v - m) ** 2 for v in vals) / (len(vals) - 1))

          def covariance_matrix(records, cols):
              clean = []
              for r in records:
                  vals = [try_float(r.get(c)) for c in cols]
                  if all(v is not None for v in vals):
                      clean.append(vals)
              if len(clean) < 2:
                  return [], 0
              means = [sum(row[i] for row in clean) / len(clean) for i in range(len(cols))]
              cov = []
              for i in range(len(cols)):
                  row = []
                  for j in range(len(cols)):
                      row.append(sum((x[i] - means[i]) * (x[j] - means[j]) for x in clean) / (len(clean) - 1))
                  cov.append(row)
              return cov, len(clean)

          def corr_from_cov(cov):
              if not cov:
                  return []
              corr = []
              for i in range(len(cov)):
                  row = []
                  for j in range(len(cov)):
                      denom = math.sqrt(cov[i][i] * cov[j][j]) if cov[i][i] > 0 and cov[j][j] > 0 else 0
                      row.append(cov[i][j] / denom if denom else "")
                  corr.append(row)
              return corr

          def mat_to_long(matrix, row_label, lane, condition, cols):
              rows = []
              for i, a in enumerate(cols):
                  for j, b in enumerate(cols):
                      rows.append({
                          "matrix_type": row_label,
                          "lane": lane,
                          "group_or_condition": condition,
                          "row_axis": a,
                          "col_axis": b,
                          "value": matrix[i][j] if matrix else ""
                      })
              return rows

          input_rows, inventory_rows = read_subject_axis_inputs()

          # Normalize numeric rows and keep only dyslexia/aphantasia.
          normalized_rows = []
          for row in input_rows:
              lane = str(row.get("lane", "")).strip()
              if lane.lower() not in ["dyslexia", "aphantasia"]:
                  continue
              norm = {
                  "source_file": row.get("_source_file", ""),
                  "lane": lane,
                  "subject_id": row.get("subject_id", ""),
                  "group_or_condition": row.get("group_or_condition", ""),
                  "boundary_or_task": row.get("boundary_or_task", ""),
                  "propagation_reach_value": try_float(row.get("propagation_reach_value")),
                  "pacing_access_value": try_float(row.get("pacing_access_value")),
                  "consolidation_growth_value": try_float(row.get("consolidation_growth_value")),
                  "viability_or_outcome_value": try_float(row.get("viability_or_outcome_value")),
                  "source_or_dataset": row.get("source_or_dataset", ""),
                  "notes": row.get("notes", "")
              }
              normalized_rows.append(norm)

          axis_cols = [
              "propagation_reach_value",
              "pacing_access_value",
              "consolidation_growth_value",
              "viability_or_outcome_value"
          ]

          # Group summaries.
          group_map = {}
          for row in normalized_rows:
              key = (row["lane"], row["group_or_condition"])
              group_map.setdefault(key, []).append(row)

          summary_rows = []
          cov_long_rows = []
          corr_long_rows = []
          for (lane, condition), records in sorted(group_map.items()):
              summary = {
                  "lane": lane,
                  "group_or_condition": condition,
                  "n_rows": len(records)
              }
              for col in axis_cols:
                  vals = [r[col] for r in records if r[col] is not None]
                  summary[col + "_n"] = len(vals)
                  summary[col + "_mean"] = sum(vals) / len(vals) if vals else ""
                  summary[col + "_sd"] = sample_std(vals)
              summary_rows.append(summary)
              cov, n_cov = covariance_matrix(records, axis_cols)
              corr = corr_from_cov(cov)
              cov_rows = mat_to_long(cov, "covariance", lane, condition, axis_cols)
              corr_rows = mat_to_long(corr, "correlation", lane, condition, axis_cols)
              for r in cov_rows:
                  r["n_complete_rows"] = n_cov
              for r in corr_rows:
                  r["n_complete_rows"] = n_cov
              cov_long_rows.extend(cov_rows)
              corr_long_rows.extend(corr_rows)

          # Manual anchor fallback context from v4.194.
          manual_axis_context = [
              {
                  "lane": "Dyslexia",
                  "shape_signature": "++-",
                  "propagation_reach_direction": "+",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "-",
                  "known_numeric_anchors": "balanced_accuracy=0.857; AUC=0.932",
                  "needed_next": "subject-level or group-level s_A/lambda_R/rho_R/V_data table"
              },
              {
                  "lane": "Aphantasia",
                  "shape_signature": "-+-",
                  "propagation_reach_direction": "-",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "-",
                  "known_numeric_anchors": "drawing_burden_d=1.013; physiology_burden_d=1.553",
                  "needed_next": "subject-level or group-level imagery/reconstruction/burden/viability table"
              }
          ]

          if len(normalized_rows) >= 4 and cov_long_rows:
              package_status = "subject_axis_rows_loaded_and_covariance_preview_written"
              selected_next_route = "dyslexia_aphantasia_axis_covariance_shape_review_with_scope_guards"
          else:
              package_status = "subject_axis_input_missing_or_insufficient_templates_written"
              selected_next_route = "dyslexia_aphantasia_subject_axis_data_acquisition_or_manual_table_with_scope_guards"

          readiness = {
              "version": "v4.195",
              "result_label": RESULT_LABEL,
              "input_rows_loaded": len(input_rows),
              "normalized_dyslexia_aphantasia_rows": len(normalized_rows),
              "group_summary_rows": len(summary_rows),
              "covariance_long_rows": len(cov_long_rows),
              "correlation_long_rows": len(corr_long_rows),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "subject-level axis/covariance extraction or template only; not validation",
              "blocked_claims": BLOCKED_CLAIMS
          }

          write_csv(OUT / "v4_195_v4_194_status_review.csv", [V4_194_STATUS], list(V4_194_STATUS.keys()))
          (OUT / "v4_195_v4_194_status_review.json").write_text(json.dumps(V4_194_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "template_dyslexia_aphantasia_subject_axis_input.csv", TEMPLATE_ROWS, AXIS_TEMPLATE_COLUMNS)
          write_csv(OUT / "v4_195_subject_axis_input_inventory.csv", inventory_rows, ["path", "exists", "rows_loaded"])
          write_csv(OUT / "v4_195_normalized_subject_axis_rows.csv", normalized_rows, [
              "source_file", "lane", "subject_id", "group_or_condition", "boundary_or_task",
              "propagation_reach_value", "pacing_access_value", "consolidation_growth_value",
              "viability_or_outcome_value", "source_or_dataset", "notes"
          ])
          write_csv(OUT / "v4_195_subject_axis_group_summary.csv", summary_rows, [
              "lane", "group_or_condition", "n_rows",
              "propagation_reach_value_n", "propagation_reach_value_mean", "propagation_reach_value_sd",
              "pacing_access_value_n", "pacing_access_value_mean", "pacing_access_value_sd",
              "consolidation_growth_value_n", "consolidation_growth_value_mean", "consolidation_growth_value_sd",
              "viability_or_outcome_value_n", "viability_or_outcome_value_mean", "viability_or_outcome_value_sd"
          ])
          write_csv(OUT / "v4_195_axis_covariance_long.csv", cov_long_rows, ["matrix_type", "lane", "group_or_condition", "row_axis", "col_axis", "value", "n_complete_rows"])
          write_csv(OUT / "v4_195_axis_correlation_long.csv", corr_long_rows, ["matrix_type", "lane", "group_or_condition", "row_axis", "col_axis", "value", "n_complete_rows"])
          write_csv(OUT / "v4_195_manual_axis_context.csv", manual_axis_context, [
              "lane", "shape_signature", "propagation_reach_direction", "pacing_access_direction",
              "consolidation_growth_direction", "known_numeric_anchors", "needed_next"
          ])
          (OUT / "v4_195_readiness_report.json").write_text(json.dumps(readiness, indent=2), encoding="utf-8")

          next_routes = [
              {
                  "priority": 1,
                  "route": selected_next_route,
                  "why": "The next route depends on whether subject-axis input rows were available.",
                  "needed_input": "CSV with subject/group rows for propagation, pacing, consolidation, and viability axes"
              },
              {
                  "priority": 2,
                  "route": "adhd_autism_schizotypy_numeric_delta_acquisition_with_scope_guards",
                  "why": "These lanes still need exact numeric anchors.",
                  "needed_input": "paper or output tables for width/depth/gate, dispersion/search, and anchor/lure measures"
              }
          ]
          write_csv(OUT / "v4_195_next_routes.csv", next_routes, ["priority", "route", "why", "needed_input"])

          claim_rows = [
              {
                  "claim": "Subject-level covariance has been extracted.",
                  "status": "allowed only if covariance rows exist",
                  "safe_wording": "The workflow writes covariance only when enough subject/group rows are supplied.",
                  "forbidden_wording": "The manual anchors alone are covariance."
              },
              {
                  "claim": "The template is evidence.",
                  "status": "blocked",
                  "safe_wording": "The template only defines needed data columns.",
                  "forbidden_wording": "The template validates the shape."
              },
              {
                  "claim": "Dyslexia and aphantasia have comparable units.",
                  "status": "blocked",
                  "safe_wording": "Their axes are relationally comparable but not unit-equivalent.",
                  "forbidden_wording": "Their numeric values can be directly compared."
              }
          ]
          write_csv(OUT / "v4_195_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          (OUT / "v4_195_route_decision.json").write_text(json.dumps({
              "version": "v4.195",
              "result_label": RESULT_LABEL,
              "clean_result": "The workflow looked for subject/group axis rows, wrote templates, and computed covariance/correlation only if enough rows were present.",
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "blocked_claims": BLOCKED_CLAIMS
          }, indent=2), encoding="utf-8")

          (OUT / "v4_195_scope_guards.json").write_text(json.dumps({
              "scope": "dyslexia and aphantasia subject-level axis/covariance extraction or template writer",
              "template_is_validation": False,
              "manual_anchors_are_covariance": False,
              "axis_values_are_cross_domain_units": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")

          (OUT / "v4_195_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.195 - Dyslexia Aphantasia Subject-Level Axis And Covariance Extraction",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "This workflow looks for subject/group axis rows for dyslexia and aphantasia. If they exist, it writes group summaries, covariance, and correlation previews. If not, it writes the exact input template needed next.",
              "",
              "Input rows loaded: `" + str(len(input_rows)) + "`",
              "Normalized dyslexia/aphantasia rows: `" + str(len(normalized_rows)) + "`",
              "Covariance rows written: `" + str(len(cov_long_rows)) + "`",
              "",
              "Package status: `" + package_status + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_195_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_195_v4_194_status_review.csv",
              "v4_195_v4_194_status_review.json",
              "template_dyslexia_aphantasia_subject_axis_input.csv",
              "v4_195_subject_axis_input_inventory.csv",
              "v4_195_normalized_subject_axis_rows.csv",
              "v4_195_subject_axis_group_summary.csv",
              "v4_195_axis_covariance_long.csv",
              "v4_195_axis_correlation_long.csv",
              "v4_195_manual_axis_context.csv",
              "v4_195_readiness_report.json",
              "v4_195_next_routes.csv",
              "v4_195_claim_boundary_matrix.csv",
              "v4_195_route_decision.json",
              "v4_195_scope_guards.json",
              "v4_195_blocked_claims.json",
              "v4_195_summary.md"
          ]

          rules = {
              "version_is_v4_195": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_194_status_reviewed": V4_194_STATUS["rule_pass_count"] == 10,
              "template_written": (OUT / "template_dyslexia_aphantasia_subject_axis_input.csv").exists(),
              "inventory_written": (OUT / "v4_195_subject_axis_input_inventory.csv").exists(),
              "route_selected": bool(selected_next_route),
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True,
              "no_manual_anchor_covariance_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.195",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "input_rows_loaded": len(input_rows),
              "normalized_dyslexia_aphantasia_rows": len(normalized_rows),
              "covariance_long_rows": len(cov_long_rows),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "subject_axis_covariance_or_template_only_no_validation"
          }

          (OUT / "v4_195_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.195 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_195_outputs/run_v4_195.py

      - name: Upload v4.195 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-195-dyslexia-aphantasia-subject-level-axis-and-covariance-extraction-output
          path: tairid_v4_195_outputs/
