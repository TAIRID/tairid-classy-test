name: 001 TAIRID v4.290 - SDSS RSD Baseline Value Fill Guard No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-290-sdss-rsd-baseline-value-fill-guard-no-scoring.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-baseline-value-fill-guard-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.290 SDSS RSD Baseline Value Fill Guard No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.290 SDSS RSD baseline value fill guard no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import html
          import re
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.290"
          ROUTE = "sdss_rsd_baseline_value_fill_guard_no_scoring_after_v4_289"
          EXPECTED_RESULT = "v4_290_sdss_rsd_baseline_value_fill_guard_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_291_sdss_rsd_baseline_value_candidate_extractor_no_scoring"

          OUT = Path("tairid_v4_290_sdss_rsd_baseline_value_fill_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-290-sdss-rsd-baseline-value-fill-guard-output.zip"
          SOURCE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/"
          RELATED_PAGE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          MAX_BYTES = 2_000_000

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=MAX_BYTES, timeout=15):
              out = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.290-baseline-fill-guard-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      out["status_code"] = getattr(resp, "status", "")
                      out["content_type"] = resp.headers.get("Content-Type", "")
                      out["content_length_header"] = resp.headers.get("Content-Length", "")
                      out["final_url"] = resp.geturl()
                      out["bytes_read"] = len(data)
                      out["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      out["fetch_ok"] = True
              except Exception as exc:
                  out["error"] = f"{type(exc).__name__}: {exc}"
              return out, data

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              try:
                  fields["z_eff"] = float(fields["z_eff_text"])
              except Exception:
                  fields["z_eff"] = ""
              return fields

          def parse_column_contract_rows(tables):
              out = []
              for table_idx, table in enumerate(tables):
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      row_type = "redshift_function_row_candidate" if "(z)" in label_norm else "final_or_consensus_row_candidate"
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for value, sigma in measurement_pairs(cell):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              out.append({
                                  "contract_id": f"column_contract_bound_{len(out)+1:02d}",
                                  "bound_id": f"bound_{len(out)+1:02d}",
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "z_eff": fields["z_eff"],
                                  "z_range_text": fields["z_range_text"],
                                  "observable": "f_sigma8",
                                  "observed_value": value,
                                  "observed_sigma": sigma,
                                  "baseline_comparator_required": True,
                                  "covariance_policy_required": True,
                                  "score_allowed": False,
                                  "contract_status": "rebuilt_for_baseline_fill_guard_no_scoring",
                              })
              return out

          inherited_v4_289_rows = [
              {"inherited_from": "v4.289", "item": "rules", "value": "45 / 45 passed", "meaning": "Reference page probe and row meaning hint workflow passed.", "carry_forward_status": "ready_for_baseline_value_fill_guard"},
              {"inherited_from": "v4.289", "item": "source_fetch_ok", "value": True, "meaning": "GitHub fetched official SDSS table page.", "carry_forward_status": "source_page_available"},
              {"inherited_from": "v4.289", "item": "related_fetch_ok", "value": True, "meaning": "GitHub fetched official SDSS overview page.", "carry_forward_status": "related_page_available"},
              {"inherited_from": "v4.289", "item": "column_contract_rows", "value": 12, "meaning": "Twelve SDSS f_sigma8 column contracts existed.", "carry_forward_status": "column_contracts_ready"},
              {"inherited_from": "v4.289", "item": "reference_probe_rows", "value": 18, "meaning": "Eighteen candidate reference probes were attempted.", "carry_forward_status": "reference_probes_ready"},
              {"inherited_from": "v4.289", "item": "row_meaning_confirmed", "value": False, "meaning": "Row meaning remained unconfirmed.", "carry_forward_status": "row_meaning_missing"},
              {"inherited_from": "v4.289", "item": "baseline_values_filled", "value": False, "meaning": "Baseline values remained empty.", "carry_forward_status": "baseline_missing"},
              {"inherited_from": "v4.289", "item": "support_allowed", "value": False, "meaning": "Support remained blocked.", "carry_forward_status": "support_blocked"},
              {"inherited_from": "v4.289", "item": "approved_holdout_sources", "value": 0, "meaning": "No holdout source was approved.", "carry_forward_status": "no_holdout_approved"},
              {"inherited_from": "v4.289", "item": "selected_next_route", "value": "v4_290_sdss_rsd_baseline_value_fill_guard_no_scoring", "meaning": "Current route writes baseline-value fill guards without scoring.", "carry_forward_status": "current_route"},
          ]

          source_fetch_row, source_data = fetch_url(SOURCE_URL)
          related_fetch_row, related_data = fetch_url(RELATED_PAGE_URL)

          parser = SimpleTableParser()
          if source_data:
              parser.feed(source_data.decode("utf-8", errors="replace"))
          column_contract_rows = parse_column_contract_rows(parser.tables)

          baseline_value_fill_guard_rows = [
              {
                  "guard_id": "fill_guard_001",
                  "guard_name": "exact_reference_required",
                  "rule": "A baseline value may only be filled from an exact cited reference page, paper, table, data file, or model output explicitly selected before extraction.",
                  "failure_if_violated": "baseline_value_rejected",
                  "score_allowed": False,
              },
              {
                  "guard_id": "fill_guard_002",
                  "guard_name": "observed_value_not_baseline",
                  "rule": "The observed SDSS f_sigma8 value may not be copied into the baseline field.",
                  "failure_if_violated": "self_baseline_error",
                  "score_allowed": False,
              },
              {
                  "guard_id": "fill_guard_003",
                  "guard_name": "row_variant_not_baseline",
                  "rule": "The f_sigma8(z) row may not be used as the baseline for f_sigma8, and f_sigma8 may not be used as the baseline for f_sigma8(z), unless source documentation explicitly defines that relation and the value remains marked as row-variant, not standard comparator.",
                  "failure_if_violated": "row_variant_baseline_error",
                  "score_allowed": False,
              },
              {
                  "guard_id": "fill_guard_004",
                  "guard_name": "lcdm_or_published_comparator_required",
                  "rule": "A fillable baseline must be an LCDM/standard cosmology comparator, a published model prediction, or a published comparator method matched to the same tracer/redshift/observable.",
                  "failure_if_violated": "comparator_missing",
                  "score_allowed": False,
              },
              {
                  "guard_id": "fill_guard_005",
                  "guard_name": "definition_match_required",
                  "rule": "The comparator must match f_sigma8 definition, effective redshift, tracer/sample, fiducial assumptions, and reported uncertainty convention before any later score.",
                  "failure_if_violated": "definition_mismatch",
                  "score_allowed": False,
              },
              {
                  "guard_id": "fill_guard_006",
                  "guard_name": "covariance_policy_required",
                  "rule": "Even if baseline values are filled later, scoring remains blocked until a covariance or explicit diagonal-only diagnostic policy is written.",
                  "failure_if_violated": "covariance_missing",
                  "score_allowed": False,
              },
              {
                  "guard_id": "fill_guard_007",
                  "guard_name": "baseline_equal_or_better_null_active",
                  "rule": "If the standard comparator explains the result as well or better, TAIRID support language remains blocked.",
                  "failure_if_violated": "baseline_null_ignored",
                  "score_allowed": False,
              },
              {
                  "guard_id": "fill_guard_008",
                  "guard_name": "same_family_claim_ceiling",
                  "rule": "Because SDSS/eBOSS is the same-family growth lane, any later result is exploratory/compatibility/weaken only, not independent holdout support.",
                  "failure_if_violated": "holdout_overclaim",
                  "score_allowed": False,
              },
          ]

          illegal_baseline_source_rows = [
              {"illegal_id": "illegal_001", "illegal_source": "observed_fsigma8_value", "reason": "self-baseline copies the measurement into the comparator", "blocked": True},
              {"illegal_id": "illegal_002", "illegal_source": "other_observed_fsigma8_row_variant", "reason": "row variants are parser-integrity objects, not standard baselines", "blocked": True},
              {"illegal_id": "illegal_003", "illegal_source": "endpoint_hash_or_url_metadata", "reason": "endpoint metadata is a null lane, not a cosmology comparator", "blocked": True},
              {"illegal_id": "illegal_004", "illegal_source": "TAIRID_generated_prediction_after_result", "reason": "post-hoc generated values cannot be baseline comparators", "blocked": True},
              {"illegal_id": "illegal_005", "illegal_source": "mean_of_observed_rows", "reason": "mean of observations is not an external standard comparator", "blocked": True},
              {"illegal_id": "illegal_006", "illegal_source": "label_shuffled_value", "reason": "shuffle controls are null checks, not baseline sources", "blocked": True},
          ]

          legal_baseline_source_requirement_rows = [
              {"requirement_id": "legal_001", "required_object": "exact_reference_url_or_file", "required_status_before_fill": "selected", "current_status": "not_selected"},
              {"requirement_id": "legal_002", "required_object": "comparator_type", "required_status_before_fill": "LCDM_or_published_standard_comparator", "current_status": "not_selected"},
              {"requirement_id": "legal_003", "required_object": "matched_z_eff_or_bin", "required_status_before_fill": "matched_to_contract_row", "current_status": "not_confirmed"},
              {"requirement_id": "legal_004", "required_object": "matched_observable_definition", "required_status_before_fill": "f_sigma8_definition_confirmed", "current_status": "not_confirmed"},
              {"requirement_id": "legal_005", "required_object": "fiducial_or_model_assumption", "required_status_before_fill": "recorded", "current_status": "not_recorded"},
              {"requirement_id": "legal_006", "required_object": "covariance_or_uncertainty_policy", "required_status_before_fill": "declared_for_later_score", "current_status": "not_declared"},
          ]

          baseline_fill_attempt_rows = []
          for row in column_contract_rows:
              baseline_fill_attempt_rows.append({
                  "fill_attempt_id": f"fill_attempt_{row['bound_id']}",
                  "bound_id": row["bound_id"],
                  "row_label": row["row_label"],
                  "sample_or_tracer": row["sample_or_tracer"],
                  "z_eff": row["z_eff"],
                  "observed_value": row["observed_value"],
                  "observed_sigma": row["observed_sigma"],
                  "candidate_baseline_value": "BLOCKED_NOT_FILLED",
                  "candidate_baseline_source": "BLOCKED_NOT_SELECTED",
                  "fill_attempt_status": "blocked_by_v4_290_guard",
                  "reason": "baseline guard written before extraction; no exact comparator source selected yet",
                  "score_allowed": False,
                  "support_allowed": False,
              })

          baseline_value_schema_rows = [
              {"field": "bound_id", "required": True, "meaning": "The observed SDSS contract row receiving a future comparator value."},
              {"field": "baseline_value", "required": True, "meaning": "Numeric comparator value from selected reference; currently blocked."},
              {"field": "baseline_uncertainty", "required": False, "meaning": "Comparator uncertainty if provided by source."},
              {"field": "baseline_source_url_or_citation", "required": True, "meaning": "Exact source of comparator value."},
              {"field": "baseline_model_or_method", "required": True, "meaning": "LCDM/published comparator method."},
              {"field": "definition_match_note", "required": True, "meaning": "Why observable/redshift/tracer definitions match."},
              {"field": "covariance_policy_note", "required": True, "meaning": "How later score will handle covariance or diagnostic limitation."},
              {"field": "fill_status", "required": True, "meaning": "not_filled, candidate_filled_not_scored, rejected, or approved_for_future_score_guard."},
          ]

          fill_language_ladder_rows = [
              {"class_id": "fill_lang_001", "classification": "not_filled", "allowed_language": "baseline comparator remains missing", "support_allowed": False},
              {"class_id": "fill_lang_002", "classification": "candidate_filled_not_scored", "allowed_language": "candidate baseline value located but not scored", "support_allowed": False},
              {"class_id": "fill_lang_003", "classification": "rejected_illegal_source", "allowed_language": "candidate baseline rejected by fill guard", "support_allowed": False},
              {"class_id": "fill_lang_004", "classification": "approved_for_future_score_guard", "allowed_language": "baseline candidate passed fill guard but still requires covariance and score guard", "support_allowed": False},
          ]

          row_meaning_gate_rows = [
              {
                  "gate_id": "row_gate_001",
                  "row_label": "f σ 8 (z)",
                  "current_status": "not_confirmed",
                  "baseline_fill_allowed_later": "only_if_source_explains_row_role",
                  "score_allowed": False,
              },
              {
                  "gate_id": "row_gate_002",
                  "row_label": "f σ 8",
                  "current_status": "not_confirmed",
                  "baseline_fill_allowed_later": "only_if_source_explains_row_role",
                  "score_allowed": False,
              },
              {
                  "gate_id": "row_gate_003",
                  "row_label": "two-row relationship",
                  "current_status": "not_confirmed",
                  "baseline_fill_allowed_later": "do_not_merge_or_double_count_until confirmed",
                  "score_allowed": False,
              },
          ]

          next_extractor_contract_rows = [
              {
                  "contract_id": "extractor_contract_001",
                  "future_action": "probe selected reference candidates for numeric comparator values",
                  "allowed_next": True,
                  "current_workflow_fills_values": False,
              },
              {
                  "contract_id": "extractor_contract_002",
                  "future_action": "reject illegal baseline sources automatically",
                  "allowed_next": True,
                  "current_workflow_fills_values": False,
              },
              {
                  "contract_id": "extractor_contract_003",
                  "future_action": "write candidate_filled_not_scored rows only if exact source and definition match are present",
                  "allowed_next": True,
                  "current_workflow_fills_values": False,
              },
              {
                  "contract_id": "extractor_contract_004",
                  "future_action": "keep external scoring blocked even if candidate values are found",
                  "allowed_next": True,
                  "current_workflow_fills_values": False,
              },
          ]

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "fill_baseline_values_now", "reason": "this workflow writes fill guards only", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "use_observed_value_as_baseline", "reason": "self-baseline is explicitly illegal", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "use_row_variant_as_baseline", "reason": "row variants are not standard comparators", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "score_sdss_rsd_rows", "reason": "baseline values, covariance, and row meaning are still missing", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "claim_tairid_support", "reason": "baseline guard is not evidence", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "claim_baseline_advantage", "reason": "no baseline comparator has been computed", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "compute_p_value_or_likelihood", "reason": "no covariance or likelihood guard exists", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "approve_holdout_source", "reason": "SDSS/eBOSS remains same-family current lane", "blocked": True},
              {"blocked_id": "blocked_010", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "baseline_value_fill_guard", "permission_status": "written_no_scoring", "reason": "Guards define what may count as baseline later."},
              {"permission_scope": "illegal_baseline_sources", "permission_status": "blocked", "reason": "Observed values, row variants, endpoint metadata, post-hoc TAIRID predictions, means, and shuffles are illegal baseline sources."},
              {"permission_scope": "baseline_value_candidate_extractor", "permission_status": "allowed_next", "reason": "Next workflow may attempt candidate extraction under guard without scoring."},
              {"permission_scope": "baseline_value_fill", "permission_status": "blocked_in_this_workflow", "reason": "No baseline values filled now."},
              {"permission_scope": "external_scoring", "permission_status": "blocked", "reason": "No scoring allowed."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
              {"permission_scope": "validation_or_evidence_claim", "permission_status": "blocked", "reason": "No validation/evidence allowed."},
          ]

          readiness_rows = [
              {"readiness_id": "ready_001", "object": "baseline_fill_guard", "status": "written", "meaning": "Fill guard exists."},
              {"readiness_id": "ready_002", "object": "column_contract_rows", "status": f"{len(column_contract_rows)} rows", "meaning": "Observed contract rows rebuilt when fetch succeeds."},
              {"readiness_id": "ready_003", "object": "baseline_fill_attempt_rows", "status": f"{len(baseline_fill_attempt_rows)} blocked", "meaning": "No values filled."},
              {"readiness_id": "ready_004", "object": "row_meaning", "status": "not_confirmed", "meaning": "Still blocks scoring."},
              {"readiness_id": "ready_005", "object": "baseline_value_candidate_extractor", "status": "ready_next", "meaning": "Next step can try extraction under guard."},
              {"readiness_id": "ready_006", "object": "external_scoring", "status": "blocked", "meaning": "Still not allowed."},
          ]

          decision_rows = [
              {"decision_id": "decision_001", "decision": "Baseline-value fill guards are written before extraction.", "basis": "The workflow defines legal and illegal baseline sources without filling values.", "next_action": "Use the guard in the candidate extractor next.", "claim_status": "guard_only"},
              {"decision_id": "decision_002", "decision": "Observed values and row variants cannot be baselines.", "basis": "Self-baseline and row-variant baseline shortcuts are blocked.", "next_action": "Reject those sources automatically later.", "claim_status": "shortcut_blocked"},
              {"decision_id": "decision_003", "decision": "Baseline values remain empty.", "basis": "No exact comparator reference and definition match have been selected.", "next_action": "Attempt candidate extraction only under guard.", "claim_status": "baseline_missing"},
              {"decision_id": "decision_004", "decision": "The next route is baseline value candidate extraction, still without scoring.", "basis": "The guard now exists; extraction can be attempted without allowing claims.", "next_action": SELECTED_NEXT_ROUTE, "claim_status": "safe_to_continue"},
          ]

          route_review_rows = [
              {"route_id": "route_001", "route": "sdss_rsd_baseline_value_candidate_extractor_no_scoring", "permission_status": "recommended", "reason": "Guard exists; extractor may attempt candidate baseline values without scoring."},
              {"route_id": "route_002", "route": "sdss_rsd_row_meaning_manual_review", "permission_status": "allowed_parallel", "reason": "Human/source review may still be needed to confirm row meaning."},
              {"route_id": "route_003", "route": "sdss_rsd_external_data_score", "permission_status": "blocked", "reason": "Scoring needs baseline values, covariance, row meaning, and score guard."},
              {"route_id": "route_004", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.290 is a clean baseline-fill-guard milestone."},
          ]

          sdr_reduction_rows = [
              {"sdr_id": "sdr_001", "before_state": "baseline fill could use vague sources", "after_state": "legal baseline-source requirements are explicit", "reduction_type": "baseline source ambiguity reduced"},
              {"sdr_id": "sdr_002", "before_state": "observed rows could leak into comparator fields", "after_state": "self-baseline and row-variant shortcuts are blocked", "reduction_type": "comparator leakage blocked"},
              {"sdr_id": "sdr_003", "before_state": "baseline extraction could happen before row meaning", "after_state": "row-meaning gates stay active", "reduction_type": "semantic blocker preserved"},
              {"sdr_id": "sdr_004", "before_state": "candidate baseline could become support too early", "after_state": "fill-language ladder blocks support even after candidate fill", "reduction_type": "support overclaim prevented"},
              {"sdr_id": "sdr_005", "before_state": "same-family SDSS could be overclaimed", "after_state": "same-family ceiling remains built into fill guard", "reduction_type": "claim ceiling preserved"},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before baseline fill guard"},
              {"gate": "inherited_v4_289_rows_equal_10", "passed": len(inherited_v4_289_rows) == 10, "detail": f"inherited_v4_289_rows = {len(inherited_v4_289_rows)}"},
              {"gate": "source_fetch_row_recorded", "passed": isinstance(source_fetch_row, dict), "detail": f"source_fetch_ok = {source_fetch_row['fetch_ok']}"},
              {"gate": "related_fetch_row_recorded", "passed": isinstance(related_fetch_row, dict), "detail": f"related_fetch_ok = {related_fetch_row['fetch_ok']}"},
              {"gate": "column_contract_rows_recorded", "passed": len(column_contract_rows) >= 0, "detail": f"column_contract_rows = {len(column_contract_rows)}"},
              {"gate": "baseline_value_fill_guard_rows_equal_8", "passed": len(baseline_value_fill_guard_rows) == 8, "detail": f"baseline_value_fill_guard_rows = {len(baseline_value_fill_guard_rows)}"},
              {"gate": "illegal_baseline_source_rows_equal_6", "passed": len(illegal_baseline_source_rows) == 6, "detail": f"illegal_baseline_source_rows = {len(illegal_baseline_source_rows)}"},
              {"gate": "legal_baseline_source_requirement_rows_equal_6", "passed": len(legal_baseline_source_requirement_rows) == 6, "detail": f"legal_baseline_source_requirement_rows = {len(legal_baseline_source_requirement_rows)}"},
              {"gate": "baseline_fill_attempt_rows_match_contracts", "passed": len(baseline_fill_attempt_rows) == len(column_contract_rows), "detail": f"baseline_fill_attempt_rows = {len(baseline_fill_attempt_rows)}"},
              {"gate": "baseline_value_schema_rows_equal_8", "passed": len(baseline_value_schema_rows) == 8, "detail": f"baseline_value_schema_rows = {len(baseline_value_schema_rows)}"},
              {"gate": "fill_language_ladder_rows_equal_4", "passed": len(fill_language_ladder_rows) == 4, "detail": f"fill_language_ladder_rows = {len(fill_language_ladder_rows)}"},
              {"gate": "row_meaning_gate_rows_equal_3", "passed": len(row_meaning_gate_rows) == 3, "detail": f"row_meaning_gate_rows = {len(row_meaning_gate_rows)}"},
              {"gate": "next_extractor_contract_rows_equal_4", "passed": len(next_extractor_contract_rows) == 4, "detail": f"next_extractor_contract_rows = {len(next_extractor_contract_rows)}"},
              {"gate": "blocked_operation_rows_equal_10", "passed": len(blocked_operation_rows) == 10, "detail": f"blocked_operation_rows = {len(blocked_operation_rows)}"},
              {"gate": "permission_rows_equal_7", "passed": len(permission_rows) == 7, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_6", "passed": len(readiness_rows) == 6, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_review_rows_equal_4", "passed": len(route_review_rows) == 4, "detail": f"route_review_rows = {len(route_review_rows)}"},
              {"gate": "sdr_reduction_rows_equal_5", "passed": len(sdr_reduction_rows) == 5, "detail": f"sdr_reduction_rows = {len(sdr_reduction_rows)}"},
              {"gate": "all_fill_guards_no_score", "passed": all(row["score_allowed"] is False for row in baseline_value_fill_guard_rows), "detail": "fill guards no score"},
              {"gate": "observed_value_not_baseline_guard_present", "passed": any(row["guard_name"] == "observed_value_not_baseline" for row in baseline_value_fill_guard_rows), "detail": "self-baseline guard present"},
              {"gate": "row_variant_not_baseline_guard_present", "passed": any(row["guard_name"] == "row_variant_not_baseline" for row in baseline_value_fill_guard_rows), "detail": "row-variant baseline guard present"},
              {"gate": "covariance_guard_present", "passed": any(row["guard_name"] == "covariance_policy_required" for row in baseline_value_fill_guard_rows), "detail": "covariance guard present"},
              {"gate": "same_family_guard_present", "passed": any(row["guard_name"] == "same_family_claim_ceiling" for row in baseline_value_fill_guard_rows), "detail": "same-family ceiling guard present"},
              {"gate": "all_illegal_sources_blocked", "passed": all(row["blocked"] is True for row in illegal_baseline_source_rows), "detail": "illegal sources blocked"},
              {"gate": "all_legal_requirements_not_satisfied", "passed": all(row["current_status"].startswith("not_") for row in legal_baseline_source_requirement_rows), "detail": "legal baseline requirements not yet satisfied"},
              {"gate": "all_fill_attempts_blocked_if_any", "passed": all(row["fill_attempt_status"] == "blocked_by_v4_290_guard" for row in baseline_fill_attempt_rows), "detail": "fill attempts blocked"},
              {"gate": "all_fill_attempts_no_score_support", "passed": all(row["score_allowed"] is False and row["support_allowed"] is False for row in baseline_fill_attempt_rows), "detail": "fill attempts no score/support"},
              {"gate": "fill_language_no_support", "passed": all(row["support_allowed"] is False for row in fill_language_ladder_rows), "detail": "fill language no support"},
              {"gate": "row_meaning_gates_no_score", "passed": all(row["score_allowed"] is False for row in row_meaning_gate_rows), "detail": "row meaning gates no score"},
              {"gate": "extractor_next_allowed_no_current_fill", "passed": all(row["allowed_next"] is True and row["current_workflow_fills_values"] is False for row in next_extractor_contract_rows), "detail": "extractor allowed next, no current fill"},
              {"gate": "baseline_fill_operation_blocked", "passed": any(row["operation"] == "fill_baseline_values_now" and row["blocked"] is True for row in blocked_operation_rows), "detail": "baseline fill operation blocked"},
              {"gate": "self_baseline_operation_blocked", "passed": any(row["operation"] == "use_observed_value_as_baseline" and row["blocked"] is True for row in blocked_operation_rows), "detail": "self-baseline operation blocked"},
              {"gate": "row_variant_baseline_operation_blocked", "passed": any(row["operation"] == "use_row_variant_as_baseline" and row["blocked"] is True for row in blocked_operation_rows), "detail": "row-variant baseline operation blocked"},
              {"gate": "all_blocked_operations_blocked", "passed": all(row["blocked"] is True for row in blocked_operation_rows), "detail": "all blocked operations guarded"},
              {"gate": "baseline_extractor_allowed_next", "passed": any(row["permission_scope"] == "baseline_value_candidate_extractor" and row["permission_status"] == "allowed_next" for row in permission_rows), "detail": "baseline extractor allowed next"},
              {"gate": "baseline_fill_blocked_this_workflow", "passed": any(row["permission_scope"] == "baseline_value_fill" and row["permission_status"] == "blocked_in_this_workflow" for row in permission_rows), "detail": "baseline fill blocked in this workflow"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external scoring blocked"},
              {"gate": "support_blocked", "passed": any(row["permission_scope"] == "support_language" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "support blocked"},
              {"gate": "validation_evidence_blocked", "passed": any(row["permission_scope"] == "validation_or_evidence_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation/evidence blocked"},
              {"gate": "next_route_recommended", "passed": any(row["route"] == "sdss_rsd_baseline_value_candidate_extractor_no_scoring" and row["permission_status"] == "recommended" for row in route_review_rows), "detail": "v4.291 route recommended"},
              {"gate": "score_route_blocked", "passed": any(row["route"] == "sdss_rsd_external_data_score" and row["permission_status"] == "blocked" for row in route_review_rows), "detail": "score route blocked"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_support", "passed": True, "detail": "no support"},
              {"gate": "truth_boundary_no_p_value", "passed": True, "detail": "no p-value"},
              {"gate": "truth_boundary_no_likelihood", "passed": True, "detail": "no likelihood"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout approval"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_291_sdss_rsd_baseline_value_candidate_extractor_no_scoring", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_290_sdss_rsd_baseline_value_fill_guard_no_scoring_passed_no_claims", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_290_inherited_v4_289_rows.csv", inherited_v4_289_rows)
          write_csv(OUT / "v4_290_source_fetch_rows.csv", [{**source_fetch_row, "score_allowed": False, "support_allowed": False}])
          write_csv(OUT / "v4_290_related_fetch_rows.csv", [{**related_fetch_row, "score_allowed": False, "support_allowed": False}])
          write_csv(OUT / "v4_290_column_contract_rows.csv", column_contract_rows)
          write_csv(OUT / "v4_290_baseline_value_fill_guard_rows.csv", baseline_value_fill_guard_rows)
          write_csv(OUT / "SDSS_RSD_BASELINE_VALUE_FILL_GUARDS_v4_290_NO_SCORING.csv", baseline_value_fill_guard_rows)
          write_csv(OUT / "v4_290_illegal_baseline_source_rows.csv", illegal_baseline_source_rows)
          write_csv(OUT / "v4_290_legal_baseline_source_requirement_rows.csv", legal_baseline_source_requirement_rows)
          write_csv(OUT / "v4_290_baseline_fill_attempt_rows.csv", baseline_fill_attempt_rows)
          write_csv(OUT / "SDSS_RSD_BASELINE_FILL_ATTEMPTS_v4_290_BLOCKED_NOT_FILLED.csv", baseline_fill_attempt_rows)
          write_csv(OUT / "v4_290_baseline_value_schema_rows.csv", baseline_value_schema_rows)
          write_csv(OUT / "v4_290_fill_language_ladder_rows.csv", fill_language_ladder_rows)
          write_csv(OUT / "v4_290_row_meaning_gate_rows.csv", row_meaning_gate_rows)
          write_csv(OUT / "v4_290_next_extractor_contract_rows.csv", next_extractor_contract_rows)
          write_csv(OUT / "v4_290_blocked_operation_rows.csv", blocked_operation_rows)
          write_csv(OUT / "v4_290_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_290_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_290_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_290_route_review_rows.csv", route_review_rows)
          write_csv(OUT / "v4_290_sdr_reduction_rows.csv", sdr_reduction_rows)
          write_csv(OUT / "v4_290_rule_checks.csv", checks)

          guard_lines = [
              f"{row['guard_name']}: {row['rule']}"
              for row in baseline_value_fill_guard_rows
          ]

          fill_lines = [
              f"{row['fill_attempt_id']}: {row['sample_or_tracer']} z_eff={row['z_eff']} baseline={row['candidate_baseline_value']}"
              for row in baseline_fill_attempt_rows[:12]
          ] or ["no fill attempts because live source fetch did not rebuild column contracts locally"]

          route_lines = [
              f"{row['route']}: {row['permission_status']} — {row['reason']}"
              for row in route_review_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "source_url": SOURCE_URL,
              "source_fetch_ok": source_fetch_row["fetch_ok"],
              "related_page_url": RELATED_PAGE_URL,
              "related_fetch_ok": related_fetch_row["fetch_ok"],
              "column_contract_rows": len(column_contract_rows),
              "baseline_value_fill_guard_rows": len(baseline_value_fill_guard_rows),
              "illegal_baseline_source_rows": len(illegal_baseline_source_rows),
              "legal_baseline_source_requirement_rows": len(legal_baseline_source_requirement_rows),
              "baseline_fill_attempt_rows": len(baseline_fill_attempt_rows),
              "baseline_values_filled": False,
              "baseline_values_extracted": False,
              "row_meaning_confirmed": False,
              "covariance_handled": False,
              "p_value_computed": False,
              "likelihood_computed": False,
              "numeric_fit_allowed": False,
              "support_allowed": False,
              "evidence_allowed": False,
              "validation_allowed": False,
              "holdout_approval_allowed": False,
              "combined_matrix_allowed": False,
              "approved_holdout_sources": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "supports_tairid": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_290_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.290 SDSS RSD Baseline Value Fill Guard No Scoring",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"source_url = {SOURCE_URL}",
              f"source_fetch_ok = {summary['source_fetch_ok']}",
              f"related_page_url = {RELATED_PAGE_URL}",
              f"related_fetch_ok = {summary['related_fetch_ok']}",
              f"column_contract_rows = {summary['column_contract_rows']}",
              f"baseline_value_fill_guard_rows = {summary['baseline_value_fill_guard_rows']}",
              f"illegal_baseline_source_rows = {summary['illegal_baseline_source_rows']}",
              f"legal_baseline_source_requirement_rows = {summary['legal_baseline_source_requirement_rows']}",
              f"baseline_fill_attempt_rows = {summary['baseline_fill_attempt_rows']}",
              f"baseline_values_filled = {summary['baseline_values_filled']}",
              f"baseline_values_extracted = {summary['baseline_values_extracted']}",
              f"row_meaning_confirmed = {summary['row_meaning_confirmed']}",
              f"covariance_handled = {summary['covariance_handled']}",
              f"p_value_computed = {summary['p_value_computed']}",
              f"likelihood_computed = {summary['likelihood_computed']}",
              f"numeric_fit_allowed = {summary['numeric_fit_allowed']}",
              f"support_allowed = {summary['support_allowed']}",
              f"evidence_allowed = {summary['evidence_allowed']}",
              f"validation_allowed = {summary['validation_allowed']}",
              f"holdout_approval_allowed = {summary['holdout_approval_allowed']}",
              f"combined_matrix_allowed = {summary['combined_matrix_allowed']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Baseline fill guards:",
              *guard_lines,
              "",
              "Blocked fill attempts:",
              *fill_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.290 writes the guard for any future baseline-value fill. It blocks self-baselines, row-variant baselines, endpoint metadata, post-hoc TAIRID-generated values, observed-row means, and shuffled values. It does not fill baseline values, confirm row meaning, handle covariance, score data, compute p-values, compute likelihoods, fit corrections, approve support, approve evidence, approve validation, approve a holdout, or build a combined matrix.",
              "",
              "Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.",
          ]
          (OUT / "v4_290_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"source_url = {SOURCE_URL}")
          print(f"source_fetch_ok = {summary['source_fetch_ok']}")
          print(f"related_page_url = {RELATED_PAGE_URL}")
          print(f"related_fetch_ok = {summary['related_fetch_ok']}")
          print(f"column_contract_rows = {summary['column_contract_rows']}")
          print(f"baseline_value_fill_guard_rows = {summary['baseline_value_fill_guard_rows']}")
          print(f"illegal_baseline_source_rows = {summary['illegal_baseline_source_rows']}")
          print(f"legal_baseline_source_requirement_rows = {summary['legal_baseline_source_requirement_rows']}")
          print(f"baseline_fill_attempt_rows = {summary['baseline_fill_attempt_rows']}")
          print(f"baseline_values_filled = {summary['baseline_values_filled']}")
          print(f"baseline_values_extracted = {summary['baseline_values_extracted']}")
          print(f"row_meaning_confirmed = {summary['row_meaning_confirmed']}")
          print(f"covariance_handled = {summary['covariance_handled']}")
          print(f"p_value_computed = {summary['p_value_computed']}")
          print(f"likelihood_computed = {summary['likelihood_computed']}")
          print(f"support_allowed = {summary['support_allowed']}")
          print(f"evidence_allowed = {summary['evidence_allowed']}")
          print(f"validation_allowed = {summary['validation_allowed']}")
          print(f"combined_matrix_allowed = {summary['combined_matrix_allowed']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.290 SDSS RSD baseline value fill guard output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-290-sdss-rsd-baseline-value-fill-guard-output
          path: |
            tairid_v4_290_sdss_rsd_baseline_value_fill_guard_output/
            tairid-v4-290-sdss-rsd-baseline-value-fill-guard-output.zip
