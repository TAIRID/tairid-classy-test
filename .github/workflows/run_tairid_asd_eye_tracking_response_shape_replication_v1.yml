name: Run TAIRID ASD eye tracking response shape replication v1

on:
  workflow_dispatch:

jobs:
  run-tairid-asd-eye-tracking-response-shape-replication-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy pandas matplotlib openpyxl

      - name: Run TAIRID ASD eye tracking response shape replication v1
        run: |
          python run_tairid_asd_eye_tracking_response_shape_replication_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-asd-eye-tracking-response-shape-replication-v1-output
          path: |
            tairid_asd_eye_tracking_response_shape_replication_v1_outputs/**
