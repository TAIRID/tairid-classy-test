name: TAIRID v4.48 Planck Chain Product Locator

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-48-planck-chain-product-locator.yml"

jobs:
  tairid-v4-48-planck-chain-product-locator:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.48 Planck chain product locator
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_48_planck_chain_product_locator

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_48_planck_chain_product_locator")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_48_planck_chain_product_locator"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run Planck likelihoods.",
              "This does not import Planck chains.",
              "This does not download the full Planck cosmology chain zip.",
              "This does not inspect the internal zip manifest.",
              "This does not propagate Planck posterior uncertainty into f_sigma8.",
              "This does not compute a final RSD pressure score.",
              "This locates or bounds the official Planck cosmology product container needed for later reference-uncertainty work.",
              "A pass means the Planck chain product container is declared/located or safely unresolved, not that Planck reference uncertainty has been included."
          ]

          CARRIED_RSD_STATUS = [
              {
                  "lane_id": "BOSS_DR12",
                  "status": "BOSS_only_covariance_preview_nonfinal",
                  "from_test": "v4_37",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "eBOSS_LRG_QSO",
                  "status": "partial_covariance_preview_nonfinal",
                  "from_test": "v4_44",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "eBOSS_ELG",
                  "status": "grid_likelihood_parser_needed_or_parked",
                  "from_test": "v4_43",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "WiggleZ",
                  "status": "formally_nonfinal_unresolved_after_locator_retry",
                  "from_test": "v4_46",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "Planck_reference_uncertainty",
                  "status": "feasibility_audited_but_not_included",
                  "from_test": "v4_47",
                  "blocks_final_RSD_claim": True
              }
          ]

          PLANCK_PRODUCT_PAGE = {
              "source_id": "esa_pr3_cosmology_products",
              "url": "https://esdcdoi.esac.esa.int/doi/html/data/astronomy/planck/Cosmology.html",
              "source_role": "official_ESA_PR3_cosmology_products_listing",
              "expected_product_name": "COM_CosmoParams_fullGrid_R3.01.zip"
          }

          DECLARED_PRODUCT_CANDIDATES = [
              {
                  "candidate_id": "COM_CosmoParams_fullGrid_R3_01_zip",
                  "file_name": "COM_CosmoParams_fullGrid_R3.01.zip",
                  "candidate_role": "cosmological_parameters_full_grid_container",
                  "expected_contents": "MCMC exploration chains, best fits, and parameter tables",
                  "declared_url": "https://pla.esac.esa.int/pla/aio/product-action?COSMOLOGY.FILE_ID=COM_CosmoParams_fullGrid_R3.01.zip",
                  "product_page_listed_expected": True,
                  "full_download_allowed_now": False,
                  "chain_import_allowed_now": False,
                  "reference_uncertainty_included_now": False
              },
              {
                  "candidate_id": "COM_Likelihood_Code_v3_0_R3_01_tar_gz",
                  "file_name": "COM_Likelihood_Code-v3.0_R3.01.tar.gz",
                  "candidate_role": "likelihood_code_not_chain_container",
                  "expected_contents": "Planck likelihood code package",
                  "declared_url": "https://pla.esac.esa.int/pla/aio/product-action?COSMOLOGY.FILE_ID=COM_Likelihood_Code-v3.0_R3.01.tar.gz",
                  "product_page_listed_expected": True,
                  "full_download_allowed_now": False,
                  "chain_import_allowed_now": False,
                  "reference_uncertainty_included_now": False
              },
              {
                  "candidate_id": "COM_Likelihood_Data_baseline_R3_00_tar_gz",
                  "file_name": "COM_Likelihood_Data-baseline_R3.00.tar.gz",
                  "candidate_role": "likelihood_data_not_chain_container",
                  "expected_contents": "Planck baseline likelihood data package",
                  "declared_url": "https://pla.esac.esa.int/pla/aio/product-action?COSMOLOGY.FILE_ID=COM_Likelihood_Data-baseline_R3.00.tar.gz",
                  "product_page_listed_expected": True,
                  "full_download_allowed_now": False,
                  "chain_import_allowed_now": False,
                  "reference_uncertainty_included_now": False
              }
          ]

          TARGET_CHAIN_FAMILIES = [
              {
                  "target_id": "base_lcdm_TTTEEE_lowE_lensing",
                  "wanted_label": "base_plikHM_TTTEEE_lowl_lowE_lensing_or_equivalent",
                  "container_candidate": "COM_CosmoParams_fullGrid_R3.01.zip",
                  "internal_member_known_now": False,
                  "safe_to_import_now": False
              },
              {
                  "target_id": "base_lcdm_TTTEEE_lowE",
                  "wanted_label": "base_plikHM_TTTEEE_lowl_lowE_or_equivalent",
                  "container_candidate": "COM_CosmoParams_fullGrid_R3.01.zip",
                  "internal_member_known_now": False,
                  "safe_to_import_now": False
              },
              {
                  "target_id": "base_lcdm_lensing_only",
                  "wanted_label": "lensing_or_equivalent",
                  "container_candidate": "COM_CosmoParams_fullGrid_R3.01.zip",
                  "internal_member_known_now": False,
                  "safe_to_import_now": False
              }
          ]

          RSD_REFERENCE_TARGETS = [
              {"source": "BOSS_DR12", "z_eff": 0.38},
              {"source": "BOSS_DR12", "z_eff": 0.51},
              {"source": "BOSS_DR12", "z_eff": 0.61},
              {"source": "eBOSS_LRG", "z_eff": 0.70},
              {"source": "eBOSS_ELG", "z_eff": 0.85},
              {"source": "eBOSS_QSO", "z_eff": 1.48},
              {"source": "WiggleZ", "z_eff": 0.44},
              {"source": "WiggleZ", "z_eff": 0.60},
              {"source": "WiggleZ", "z_eff": 0.73}
          ]

          LOCATOR_REQUIREMENTS = [
              {
                  "requirement_id": "official_product_page_declared",
                  "status": "required_now",
                  "description": "The official ESA PR3 cosmology products page must be declared."
              },
              {
                  "requirement_id": "full_grid_container_candidate_declared",
                  "status": "required_now",
                  "description": "The COM_CosmoParams_fullGrid_R3.01.zip candidate must be declared as the chain container."
              },
              {
                  "requirement_id": "container_probe_without_full_download",
                  "status": "required_now",
                  "description": "The test may probe URLs but must not download the full product container."
              },
              {
                  "requirement_id": "internal_chain_member_not_selected_yet",
                  "status": "required_now",
                  "description": "The internal chain member/path remains unknown until a manifest or controlled inspection step."
              },
              {
                  "requirement_id": "no_chain_import_no_reference_uncertainty",
                  "status": "required_now",
                  "description": "No chains may be imported and no reference uncertainty may be claimed in this locator."
              },
              {
                  "requirement_id": "later_manifest_or_parser_step_required",
                  "status": "required_later",
                  "description": "A later step must inspect the container manifest or otherwise identify exact internal chain files safely."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "Planck chains were imported.",
              "Planck reference uncertainty is included.",
              "The internal Planck chain member has been selected.",
              "The full Planck cosmology chain zip was downloaded.",
              "The full RSD lane is covariance-aware.",
              "BOSS and eBOSS partial previews can be combined into a final score now.",
              "All growth data point negative.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_49_Planck_chain_container_manifest_strategy",
                  "purpose": "Decide how to safely inspect the Planck full-grid zip manifest without uncontrolled large downloads or chain import.",
                  "must_include": "container URL, file-size/probe status, safe manifest strategy, no chain import.",
                  "must_not_include": "reference uncertainty included claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_50_growth_lane_status_handoff",
                  "purpose": "Write a compact handoff for BOSS, eBOSS, ELG, WiggleZ, and Planck reference uncertainty status.",
                  "must_include": "partial previews, unresolved lanes, Planck container status, truth boundary.",
                  "must_not_include": "validation claim."
              },
              {
                  "priority": 3,
                  "next_test": "v4_51_reference_uncertainty_parser_design",
                  "purpose": "Design the future parser that would turn Planck chain samples into f_sigma8 reference samples.",
                  "must_include": "required columns, weights, redshift targets, covariance across redshifts.",
                  "must_not_include": "actual chain import or final pressure."
              }
          ]

          def fetch_text(url, timeout=60, byte_limit=2_000_000):
              try:
                  request = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "Mozilla/5.0 TAIRID-v4.48-Planck-chain-product-locator",
                          "Accept": "text/html,text/xml,application/xml,text/plain,*/*"
                      }
                  )
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "fetch_ok": True,
                          "http_status": getattr(response, "status", 200),
                          "final_url": response.geturl(),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "fetch_ok": False,
                      "http_status": "",
                      "final_url": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def probe_url(url, timeout=60, byte_limit=4096):
              try:
                  request = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "Mozilla/5.0 TAIRID-v4.48-Planck-product-probe",
                          "Accept": "application/octet-stream,text/plain,text/html,*/*",
                          "Range": "bytes=0-4095"
                      }
                  )
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      return {
                          "probe_ok": True,
                          "http_status": getattr(response, "status", 200),
                          "final_url": response.geturl(),
                          "content_type": response.headers.get("Content-Type", ""),
                          "content_length_header": response.headers.get("Content-Length", ""),
                          "accept_ranges": response.headers.get("Accept-Ranges", ""),
                          "bytes_read": len(body),
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "probe_ok": False,
                      "http_status": "",
                      "final_url": "",
                      "content_type": "",
                      "content_length_header": "",
                      "accept_ranges": "",
                      "bytes_read": 0,
                      "error": repr(exc)
                  }

          def clean_text(text):
              text = re.sub(r"<script.*?</script>", " ", text or "", flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def extract_links(base_url, html_text):
              rows = []
              for idx, match in enumerate(re.finditer(r'<a\s+[^>]*href=["\']([^"\']+)["\'][^>]*>(.*?)</a>', html_text or "", flags=re.IGNORECASE | re.DOTALL)):
                  href = match.group(1).strip()
                  label = clean_text(match.group(2)) or href
                  if not href:
                      continue
                  absolute = urllib.parse.urljoin(base_url, href)
                  rows.append({
                      "link_index": idx,
                      "label": label,
                      "href": href,
                      "absolute_url": absolute
                  })
              return rows

          failed_gates = []
          warnings = []

          page_fetch = fetch_text(PLANCK_PRODUCT_PAGE["url"])
          page_links = extract_links(page_fetch["final_url"] or PLANCK_PRODUCT_PAGE["url"], page_fetch["text"]) if page_fetch["fetch_ok"] else []

          product_probe_rows = []
          product_locator_rows = []

          product_page_text_lower = (page_fetch["text"] or "").lower()

          for candidate in DECLARED_PRODUCT_CANDIDATES:
              file_lower = candidate["file_name"].lower()
              listed_in_page_text = file_lower in product_page_text_lower

              matching_links = [
                  link for link in page_links
                  if file_lower in (link["label"] + " " + link["href"] + " " + link["absolute_url"]).lower()
              ]

              if matching_links:
                  best_url = matching_links[0]["absolute_url"]
                  source_of_url = "product_page_link"
              else:
                  best_url = candidate["declared_url"]
                  source_of_url = "declared_product_action_url"

              probe = probe_url(best_url)

              product_probe_rows.append({
                  "candidate_id": candidate["candidate_id"],
                  "file_name": candidate["file_name"],
                  "candidate_role": candidate["candidate_role"],
                  "probe_url": best_url,
                  "source_of_url": source_of_url,
                  "probe_ok": probe["probe_ok"],
                  "http_status": probe["http_status"],
                  "final_url": probe["final_url"],
                  "content_type": probe["content_type"],
                  "content_length_header": probe["content_length_header"],
                  "accept_ranges": probe["accept_ranges"],
                  "bytes_read": probe["bytes_read"],
                  "error": probe["error"]
              })

              product_locator_rows.append({
                  "candidate_id": candidate["candidate_id"],
                  "file_name": candidate["file_name"],
                  "candidate_role": candidate["candidate_role"],
                  "expected_contents": candidate["expected_contents"],
                  "listed_in_product_page_text": listed_in_page_text,
                  "matching_product_page_link_count": len(matching_links),
                  "selected_locator_url": best_url,
                  "source_of_url": source_of_url,
                  "probe_ok": probe["probe_ok"],
                  "product_container_declared": True,
                  "full_download_allowed_now": candidate["full_download_allowed_now"],
                  "chain_import_allowed_now": candidate["chain_import_allowed_now"],
                  "reference_uncertainty_included_now": candidate["reference_uncertainty_included_now"],
                  "internal_chain_member_selected_now": False,
                  "safe_for_next_manifest_strategy": candidate["candidate_id"] == "COM_CosmoParams_fullGrid_R3_01_zip"
              })

          full_grid_rows = [
              row for row in product_locator_rows
              if row["candidate_id"] == "COM_CosmoParams_fullGrid_R3_01_zip"
          ]

          full_grid_declared = bool(full_grid_rows)
          full_grid_listed = bool(full_grid_rows and full_grid_rows[0]["listed_in_product_page_text"])
          full_grid_probe_ok = bool(full_grid_rows and full_grid_rows[0]["probe_ok"])

          if not PLANCK_PRODUCT_PAGE["url"]:
              failed_gates.append("official_product_page_not_declared")

          if not full_grid_declared:
              failed_gates.append("full_grid_container_candidate_not_declared")

          if not any(row["requirement_id"] == "official_product_page_declared" for row in LOCATOR_REQUIREMENTS):
              failed_gates.append("locator_requirement_official_product_page_missing")

          if not any(row["requirement_id"] == "full_grid_container_candidate_declared" for row in LOCATOR_REQUIREMENTS):
              failed_gates.append("locator_requirement_full_grid_container_missing")

          if not any(row["requirement_id"] == "later_manifest_or_parser_step_required" for row in LOCATOR_REQUIREMENTS):
              failed_gates.append("locator_requirement_later_manifest_missing")

          if any(row["full_download_allowed_now"] is not False for row in product_locator_rows):
              failed_gates.append("full_download_allowed_violation")

          if any(row["chain_import_allowed_now"] is not False for row in product_locator_rows):
              failed_gates.append("chain_import_allowed_violation")

          if any(row["reference_uncertainty_included_now"] is not False for row in product_locator_rows):
              failed_gates.append("reference_uncertainty_included_violation")

          if any(row["internal_chain_member_selected_now"] is not False for row in product_locator_rows):
              failed_gates.append("internal_chain_member_selected_violation")

          if any(row["safe_to_import_now"] is not False for row in TARGET_CHAIN_FAMILIES):
              failed_gates.append("target_chain_family_import_allowed_violation")

          if any(row["internal_member_known_now"] is not False for row in TARGET_CHAIN_FAMILIES):
              failed_gates.append("target_chain_family_internal_member_claim_violation")

          if not all(row["blocks_final_RSD_claim"] is True for row in CARRIED_RSD_STATUS):
              failed_gates.append("carried_RSD_boundary_not_preserved")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "planck chains were imported",
              "reference uncertainty is included",
              "internal planck chain member",
              "full planck cosmology chain zip was downloaded",
              "full rsd lane",
              "all growth data point negative",
              "likelihood",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          if page_fetch["fetch_ok"] is not True:
              warnings.append("Planck_product_page_fetch_failed_or_blocked_product_container_still_declared")
          if full_grid_listed is not True:
              warnings.append("COM_CosmoParams_fullGrid_not_seen_in_page_text_in_GitHub_environment")
          if full_grid_probe_ok is not True:
              warnings.append("COM_CosmoParams_fullGrid_probe_failed_or_blocked_no_full_download_attempted")

          warnings.append("Planck_chain_product_locator_does_not_download_full_zip")
          warnings.append("Planck_chain_product_locator_does_not_import_chains")
          warnings.append("internal_chain_member_not_selected_yet")
          warnings.append("reference_uncertainty_not_included_yet")
          warnings.append("no_final_RSD_pressure_score")
          warnings.append("not_validation")

          if full_grid_declared:
              locator_state = "full_grid_container_declared"
              if full_grid_listed:
                  locator_state = "full_grid_container_declared_and_seen_on_product_page"
              if full_grid_probe_ok:
                  locator_state = "full_grid_container_declared_seen_or_probe_accessible_ready_for_manifest_strategy"
          else:
              locator_state = "full_grid_container_not_declared"

          rule_results = [
              {
                  "rule_id": "official_product_page_declared",
                  "pass": bool(PLANCK_PRODUCT_PAGE["url"]),
                  "result": PLANCK_PRODUCT_PAGE["url"],
                  "boundary": "Product page declaration is not chain import."
              },
              {
                  "rule_id": "product_page_fetch_attempt_recorded",
                  "pass": True,
                  "result": f"fetch_ok={page_fetch['fetch_ok']}; links={len(page_links)}",
                  "boundary": "Fetch success is useful but not required for bounded locator state."
              },
              {
                  "rule_id": "full_grid_container_candidate_declared",
                  "pass": full_grid_declared,
                  "result": "COM_CosmoParams_fullGrid_R3.01.zip declared",
                  "boundary": "Container declaration is not internal chain selection."
              },
              {
                  "rule_id": "candidate_products_probed_without_full_download",
                  "pass": all(row["bytes_read"] <= 4096 for row in product_probe_rows),
                  "result": "candidate probes limited to small byte reads",
                  "boundary": "No full product download."
              },
              {
                  "rule_id": "no_chain_import_or_reference_uncertainty",
                  "pass": all(row["chain_import_allowed_now"] is False and row["reference_uncertainty_included_now"] is False for row in product_locator_rows),
                  "result": "no_chain_import_no_reference_uncertainty",
                  "boundary": "Locator only."
              },
              {
                  "rule_id": "internal_chain_member_not_selected",
                  "pass": all(row["internal_chain_member_selected_now"] is False for row in product_locator_rows),
                  "result": "internal_chain_member_not_selected",
                  "boundary": "Manifest strategy needed later."
              },
              {
                  "rule_id": "RSD_boundaries_carried_forward",
                  "pass": all(row["blocks_final_RSD_claim"] is True for row in CARRIED_RSD_STATUS),
                  "result": "BOSS_eBOSS_ELG_WiggleZ_Planck_boundaries_preserved",
                  "boundary": "No final RSD claim."
              },
              {
                  "rule_id": "no_final_score_or_validation",
                  "pass": True,
                  "result": "no_likelihood_no_BIC_no_refit_no_final_pressure_no_validation",
                  "boundary": "Product locator only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_Planck_chain_product_locator_rules_passed")

          if failed_gates:
              readiness_label = "Planck_chain_product_locator_failed"
              next_step = "Repair Planck product locator declarations or guards before manifest strategy."
          else:
              readiness_label = "Planck_chain_product_locator_passed_ready_for_chain_container_manifest_strategy_or_growth_lane_handoff"
              next_step = (
                  "Proceed to v4.49 Planck chain container manifest strategy, or write v4.50 growth lane status handoff. "
                  "Do not download the full zip, import chains, or claim reference uncertainty until the internal chain member and parser schema are selected."
              )

          system_health = {
              "product_page_declared": bool(PLANCK_PRODUCT_PAGE["url"]),
              "product_page_fetch_ok": page_fetch["fetch_ok"],
              "product_page_link_count": len(page_links),
              "declared_product_candidate_count": len(DECLARED_PRODUCT_CANDIDATES),
              "full_grid_container_declared": full_grid_declared,
              "full_grid_seen_in_product_page_text": full_grid_listed,
              "full_grid_probe_ok": full_grid_probe_ok,
              "locator_state": locator_state,
              "target_chain_family_count": len(TARGET_CHAIN_FAMILIES),
              "RSD_reference_target_count": len(RSD_REFERENCE_TARGETS),
              "locator_requirement_count": len(LOCATOR_REQUIREMENTS),
              "full_download_allowed_now": False,
              "internal_chain_member_selected": False,
              "Planck_chains_imported": False,
              "reference_uncertainty_included": False,
              "reference_fsigma8_samples_computed": False,
              "reference_covariance_across_redshift_computed": False,
              "final_RSD_pressure_score_allowed_now": False,
              "full_RSD_covariance_complete": False,
              "likelihood_run": False,
              "BIC_run": False,
              "refit_run": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          interpretation = (
              "v4.48 locates or bounds the official Planck PR3 cosmology product container needed for later reference-uncertainty work. "
              "The key chain container candidate is COM_CosmoParams_fullGrid_R3.01.zip. "
              "This test may fetch the product page and make small URL probes, but it does not download the full zip, inspect internal members, import chains, or compute reference uncertainty. "
              "The next safe step is a manifest strategy or a growth-lane handoff."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "carried_rsd_status": CARRIED_RSD_STATUS,
              "planck_product_page": PLANCK_PRODUCT_PAGE,
              "page_fetch": {
                  "fetch_ok": page_fetch["fetch_ok"],
                  "http_status": page_fetch["http_status"],
