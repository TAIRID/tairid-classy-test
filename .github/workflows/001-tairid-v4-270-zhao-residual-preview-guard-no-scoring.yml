              {"route_id": "route_002", "route": "zhao_chi_square_scoring_guard", "permission_status": "blocked", "reason": "Chi-square requires explicit future scoring/evidence boundary."},
              {"route_id": "route_003", "route": "source_comparison_residual_guard", "permission_status": "future_needed", "reason": "QSO direction alone cannot decide source-comparison pattern."},
              {"route_id": "route_004", "route": "numeric_correction_fit", "permission_status": "blocked", "reason": "No fitting guard has passed."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.270 is a clean residual-preview milestone."},
          ]

          next_rows = [
              {"priority": 1, "test_id": "v4_271_zhao_residual_direction_review_and_chi_square_scope_guard", "purpose": "review residual direction and define chi-square scope without scoring", "activated": True},
              {"priority": 2, "test_id": "v4_271_zhao_chi_square_scoring_guard", "purpose": "still blocked until explicit scoring/evidence permission", "activated": False},
              {"priority": 3, "test_id": "v4_271_source_comparison_residual_guard", "purpose": "future comparison across QSO/LRG/ELG lanes", "activated": False},
              {"priority": 4, "test_id": "v4_271_handoff_if_needed", "purpose": "consolidate v4.203-v4.270 at first residual-preview milestone", "activated": True},
          ]

          checks = [
