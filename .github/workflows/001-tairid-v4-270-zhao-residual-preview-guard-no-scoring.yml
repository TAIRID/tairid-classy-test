                  "blocked": "quadratic chi-square scalar",
              },
              {
                  "scope_id": "scope_004",
                  "scope": "interpretation",
                  "allowed": "direction review and next guard planning",
                  "blocked": "validation, proof, holdout approval, model fit",
              },
          ]

          next_guard_requirement_rows = [
              {
                  "requirement_id": "next_001",
                  "next_guard": "residual_direction_review",
                  "needed_object": "direction_signature ---+ and magnitude summaries",
                  "why_needed": "decide how to interpret mixed-negative QSO residual preview without overclaiming",
                  "status": "ready_next",
              },
              {
                  "requirement_id": "next_002",
