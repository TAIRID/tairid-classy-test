name: 001 TAIRID v4.270 - Zhao Residual Preview Guard No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-270-zhao-residual-preview-guard-no-scoring.yml"
      - "data/cosmology/zhao_reference_model_manifest.csv"
      - "zhao_reference_model_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-residual-preview-guard-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.270 Zhao Residual Preview Guard No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.270 Zhao residual preview guard no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.270"
          ROUTE = "zhao_residual_preview_guard_no_scoring_after_v4_269"
          EXPECTED_RESULT = "v4_270_zhao_residual_preview_guard_no_scoring_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_271_zhao_residual_direction_review_and_chi_square_scope_guard"

          OUT = Path("tairid_v4_270_zhao_residual_preview_guard_no_scoring_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-270-zhao-residual-preview-guard-no-scoring-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REFERENCE_MODEL_MANIFEST_CANDIDATES = [
              Path("data/cosmology/zhao_reference_model_manifest.csv"),
              Path("zhao_reference_model_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_REFERENCE_COLUMNS = [
              "reference_id",
              "observed_id",
              "model_family",
              "model_label",
              "redshift",
              "quantity",
              "predicted_value",
              "prediction_source_or_method",
              "parameter_status",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def safe_float(value):
              try:
                  return float(str(value).strip())
              except Exception:
                  return None

          def matvec(matrix, vector):
              return [sum(matrix[i][j] * vector[j] for j in range(len(vector))) for i in range(len(matrix))]

          inherited_v4_269_rows = [
              {
                  "inherited_from": "v4.269",
                  "item": "rules",
                  "value": "54 / 54 passed",
                  "meaning": "Zhao Inverse Covariance Guard passed.",
                  "carry_forward_status": "ready_for_residual_preview",
              },
              {
                  "inherited_from": "v4.269",
                  "item": "inverse_covariance_validated",
                  "value": True,
                  "meaning": "Inverse covariance passed structure checks.",
                  "carry_forward_status": "inverse_covariance_ready",
              },
              {
                  "inherited_from": "v4.269",
                  "item": "inverse_covariance_packet_rows",
                  "value": 16,
                  "meaning": "Sixteen inverse covariance rows were written.",
                  "carry_forward_status": "inverse_covariance_packet_ready",
              },
              {
                  "inherited_from": "v4.269",
                  "item": "identity_error_left",
                  "value": 3.434752482434078e-16,
                  "meaning": "C times C inverse identity error was below tolerance.",
                  "carry_forward_status": "identity_guard_passed",
              },
              {
                  "inherited_from": "v4.269",
                  "item": "identity_error_right",
                  "value": 4.562322741819003e-16,
                  "meaning": "C inverse times C identity error was below tolerance.",
                  "carry_forward_status": "identity_guard_passed",
              },
              {
                  "inherited_from": "v4.269",
                  "item": "residual_preview_allowed_next",
                  "value": True,
                  "meaning": "Residual preview can run next without scoring.",
                  "carry_forward_status": "current_permission",
              },
              {
                  "inherited_from": "v4.269",
                  "item": "chi_square_computed",
                  "value": False,
                  "meaning": "Chi-square stayed blocked.",
                  "carry_forward_status": "chi_square_blocked",
              },
              {
                  "inherited_from": "v4.269",
                  "item": "scoring_allowed",
                  "value": False,
                  "meaning": "Scoring stayed blocked.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.269",
                  "item": "selected_next_route",
                  "value": "v4_270_zhao_residual_preview_guard_no_scoring",
                  "meaning": "Current route previews residuals without scoring.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          reference_model_manifest_status_rows, reference_model_manifest_input_rows = read_manifest_status(
              REFERENCE_MODEL_MANIFEST_CANDIDATES, REQUIRED_REFERENCE_COLUMNS, "reference"
          )

          zhao_rows = [
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_0_978", "redshift": 0.978, "observed_value": 0.379, "sigma": 0.176, "reference_value": 0.433944158},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_23", "redshift": 1.230, "observed_value": 0.385, "sigma": 0.099, "reference_value": 0.404912522},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_526", "redshift": 1.526, "observed_value": 0.342, "sigma": 0.070, "reference_value": 0.371533172},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_944", "redshift": 1.944, "observed_value": 0.364, "sigma": 0.106, "reference_value": 0.329409330},
          ]

          corr = [
              [1.0000, 0.5118, 0.2667, -0.0113],
              [0.5118, 1.0000, 0.6288, 0.0722],
              [0.2667, 0.6288, 1.0000, 0.4721],
              [-0.0113, 0.0722, 0.4721, 1.0000],
          ]

          inv_cov = [
              [55.79819445388793, -41.38511536139837, 13.212068599555996, -4.092791287243753],
              [-41.38511536139838, 282.48885695468914, -257.5473145530564, 117.61290125434246],
              [13.212068599555998, -257.5473145530564, 528.8645101020032, -241.06321994507524],
              [-4.092791287243754, 117.61290125434248, -241.06321994507524, 175.98143425482374],
          ]

          labels = [row["observed_id"] for row in zhao_rows]
          residual_vector = [float(row["observed_value"]) - float(row["reference_value"]) for row in zhao_rows]
          normalized_vector = [residual_vector[i] / float(zhao_rows[i]["sigma"]) for i in range(4)]
          covariance_weighted_vector = matvec(inv_cov, residual_vector)

          def sign_label(x):
              if x > 0:
                  return "+"
              if x < 0:
                  return "-"
              return "0"

          residual_preview_rows = []
          for i, row in enumerate(zhao_rows):
              residual = residual_vector[i]
              normalized = normalized_vector[i]
              residual_preview_rows.append({
                  "residual_id": f"resid_{i+1:02d}",
                  "observed_id": row["observed_id"],
                  "redshift": row["redshift"],
                  "observed_value": row["observed_value"],
                  "reference_value": row["reference_value"],
                  "sigma": row["sigma"],
                  "residual_observed_minus_reference": residual,
                  "normalized_residual_diagonal_only": normalized,
                  "residual_direction": sign_label(residual),
                  "absolute_residual": abs(residual),
                  "absolute_normalized_residual": abs(normalized),
                  "preview_status": "residual_preview_no_scoring",
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          covariance_weighted_projection_rows = []
          for i, row in enumerate(zhao_rows):
              covariance_weighted_projection_rows.append({
                  "projection_id": f"cov_weighted_{i+1:02d}",
                  "observed_id": row["observed_id"],
                  "redshift": row["redshift"],
                  "covariance_weighted_component": covariance_weighted_vector[i],
                  "component_direction": sign_label(covariance_weighted_vector[i]),
                  "projection_status": "covariance_weighted_projection_no_quadratic_score",
                  "chi_square_component_written": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          direction_signature = "".join(sign_label(x) for x in residual_vector)
          normalized_direction_signature = "".join(sign_label(x) for x in normalized_vector)
          weighted_direction_signature = "".join(sign_label(x) for x in covariance_weighted_vector)

          residual_direction_summary_rows = [
              {
                  "summary_id": "direction_001",
                  "object": "raw_residual_direction",
                  "signature": direction_signature,
                  "positive_count": sum(1 for x in residual_vector if x > 0),
                  "negative_count": sum(1 for x in residual_vector if x < 0),
                  "zero_count": sum(1 for x in residual_vector if x == 0),
                  "plain_meaning": "observed f_sigma8 is below the fixed LCDM reference in the first three bins and above it in the fourth bin",
                  "claim_status": "direction_preview_only",
              },
              {
                  "summary_id": "direction_002",
                  "object": "diagonal_normalized_direction",
                  "signature": normalized_direction_signature,
                  "positive_count": sum(1 for x in normalized_vector if x > 0),
                  "negative_count": sum(1 for x in normalized_vector if x < 0),
                  "zero_count": sum(1 for x in normalized_vector if x == 0),
                  "plain_meaning": "diagonal normalization does not change the sign pattern",
                  "claim_status": "direction_preview_only",
              },
              {
                  "summary_id": "direction_003",
                  "object": "covariance_weighted_projection_direction",
                  "signature": weighted_direction_signature,
                  "positive_count": sum(1 for x in covariance_weighted_vector if x > 0),
                  "negative_count": sum(1 for x in covariance_weighted_vector if x < 0),
                  "zero_count": sum(1 for x in covariance_weighted_vector if x == 0),
                  "plain_meaning": "inverse-covariance projection changes component weights and signs but is not chi-square",
                  "claim_status": "projection_preview_only",
              },
          ]

          residual_magnitude_summary_rows = [
              {
                  "summary_id": "mag_001",
                  "object": "raw_residual",
                  "min_value": min(residual_vector),
                  "mean_value": sum(residual_vector) / len(residual_vector),
                  "max_value": max(residual_vector),
                  "max_abs_value": max(abs(x) for x in residual_vector),
                  "status": "descriptive_preview_only",
              },
              {
                  "summary_id": "mag_002",
                  "object": "diagonal_normalized_residual",
                  "min_value": min(normalized_vector),
                  "mean_value": sum(normalized_vector) / len(normalized_vector),
                  "max_value": max(normalized_vector),
                  "max_abs_value": max(abs(x) for x in normalized_vector),
                  "status": "descriptive_preview_only",
              },
              {
                  "summary_id": "mag_003",
                  "object": "covariance_weighted_projection",
                  "min_value": min(covariance_weighted_vector),
                  "mean_value": sum(covariance_weighted_vector) / len(covariance_weighted_vector),
                  "max_value": max(covariance_weighted_vector),
                  "max_abs_value": max(abs(x) for x in covariance_weighted_vector),
                  "status": "projection_preview_only_no_score",
              },
          ]

          failure_condition_preview_rows = [
              {
                  "failure_condition_id": "failure_001",
                  "target": "QSO f_sigma8 primary pressure",
                  "preview_input": direction_signature,
                  "preview_result": "mixed_negative_dominant",
                  "meaning": "three negative bins and one positive bin weaken a simple all-positive QSO pressure reading",
                  "status": "preview_only_not_scoring",
              },
              {
