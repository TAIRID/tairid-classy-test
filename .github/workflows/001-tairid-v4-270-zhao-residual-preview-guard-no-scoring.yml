              {"gate": "failure_condition_preview_rows_equal_5", "passed": len(failure_condition_preview_rows) == 5, "detail": f"failure_condition_preview_rows = {len(failure_condition_preview_rows)}"},
              {"gate": "residual_preview_scope_rows_equal_4", "passed": len(residual_preview_scope_rows) == 4, "detail": f"residual_preview_scope_rows = {len(residual_preview_scope_rows)}"},
