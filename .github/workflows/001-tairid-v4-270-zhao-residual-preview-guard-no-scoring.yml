              {"gate": "residual_rows_non_scoring", "passed": all(row["scoring_allowed"] is False and row["evidence_allowed"] is False for row in residual_preview_rows), "detail": "residual rows non-scoring"},
              {"gate": "projection_rows_no_chi_square_component", "passed": all(row["chi_square_component_written"] is False for row in covariance_weighted_projection_rows), "detail": "no chi-square components written"},
              {"gate": "projection_rows_non_scoring", "passed": all(row["scoring_allowed"] is False and row["evidence_allowed"] is False for row in covariance_weighted_projection_rows), "detail": "projection rows non-scoring"},
              {"gate": "residual_preview_computed_permission", "passed": any(row["permission_scope"] == "residual_preview" and row["permission_status"] == "computed_preview_only" for row in permission_rows), "detail": "residual preview computed"},
