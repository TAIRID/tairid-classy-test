name: 001 TAIRID v4.316 - SDSS RSD Baseline Comparator Human Review Packet No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-316-sdss-rsd-baseline-comparator-human-review-packet-no-scoring.yml"
      - ".github/workflows/**"
      - "github/workflows/**"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-baseline-comparator-human-review-packet-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.316 SDSS RSD Baseline Comparator Human Review Packet No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.316 SDSS RSD baseline comparator human review packet no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv, json, re, zipfile, urllib.request, html as html_lib

          VERSION = "v4.316"
          EXPECTED_RESULT = "v4_316_sdss_rsd_baseline_comparator_human_review_packet_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_317_sdss_rsd_baseline_comparator_decision_ingest_no_scoring"

          OUT = Path("tairid_v4_316_sdss_rsd_baseline_comparator_human_review_packet_output")
          OUT.mkdir(parents=True, exist_ok=True)
          ZIP_NAME = "tairid-v4-316-sdss-rsd-baseline-comparator-human-review-packet-output.zip"

          SOURCE_URLS = [
              "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/",
              "https://www.sdss4.org/science/final-bao-and-rsd-measurements/",
              "https://arxiv.org/abs/2007.08991",
              "https://arxiv.org/abs/2007.08997",
              "https://arxiv.org/abs/2007.09004",
              "https://arxiv.org/abs/2007.08995",
              "https://arxiv.org/abs/1807.06209",
              "https://arxiv.org/abs/1807.06210",
          ]

          QUOTE_SPECS = [
              ("baseline_model_context", ["lcdm", "ΛCDM", "fiducial", "cosmological parameters", "Planck"]),
              ("growth_comparator_context", ["growth rate", "fσ8", "f sigma 8", "fsigma8", "redshift-space distortion"]),
              ("covariance_or_likelihood_limit", ["covariance", "likelihood", "correlation matrix", "full-shape"]),
              ("null_policy_context", ["consistency", "model comparison", "constraints", "combined"]),
          ]

          QUESTION_ROWS = [
              {
                  "question_id": "baseline_q001",
                  "question": "What independent comparator model/source is allowed for the selected BAO+RSD f_sigma8 row family?",
                  "candidate_classes": "baseline_model_context|growth_comparator_context",
                  "review_instruction": "Choose a source that defines the comparator model/source. Do not approve numeric values yet."
              },
              {
                  "question_id": "baseline_q002",
                  "question": "Are comparator values source-provided, model-derived, or generated by a separate reproducible script?",
                  "candidate_classes": "baseline_model_context|growth_comparator_context",
                  "review_instruction": "State whether values are directly sourced, model-derived, or require a later script."
              },
              {
                  "question_id": "baseline_q003",
                  "question": "What cosmological parameter set is used for the comparator, if any?",
                  "candidate_classes": "baseline_model_context",
                  "review_instruction": "Identify parameter-set context only. Do not treat it as an approved baseline table."
              },
              {
                  "question_id": "baseline_q004",
                  "question": "Is the comparator independent enough to avoid same-family circular support?",
                  "candidate_classes": "null_policy_context|baseline_model_context",
                  "review_instruction": "Mark keep_blocked unless independence is clearly reviewable."
              },
              {
                  "question_id": "baseline_q005",
                  "question": "What uncertainty/covariance policy is permitted before any diagonal diagnostic?",
                  "candidate_classes": "covariance_or_likelihood_limit",
                  "review_instruction": "Record covariance/likelihood limits. Do not permit p-values or likelihood claims."
              },
              {
                  "question_id": "baseline_q006",
                  "question": "What null result policy applies if the standard comparator is equal or better?",
                  "candidate_classes": "null_policy_context",
                  "review_instruction": "Preserve the null rule: equal/better standard comparator weakens or blocks support."
              },
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def fetch_url(url, max_bytes=2_000_000, timeout=15):
              row = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "error": "",
                  "score_allowed": False,
                  "support_allowed": False,
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.316-baseline-human-review-packet-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      row["status_code"] = getattr(resp, "status", "")
                      row["content_type"] = resp.headers.get("Content-Type", "")
                      row["bytes_read"] = len(data)
                      row["fetch_ok"] = True
              except Exception as exc:
                  row["error"] = f"{type(exc).__name__}: {exc}"
              return row, data

          def strip_text(data):
              if not data:
                  return ""
              text = data.decode("utf-8", errors="replace")
              text = re.sub(r"<script.*?</script>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<[^>]+>", " ", text)
              return html_lib.unescape(" ".join(text.split()))

          def window_around(text, terms, width=520, limit=1500):
              lower = text.lower()
              hits = []
              for term in terms:
                  idx = lower.find(term.lower())
                  if idx >= 0:
                      hits.append(idx)
              if not hits:
                  return ""
              idx = min(hits)
              return text[max(0, idx-width):idx+width].replace("\n", " ")[:limit]

          def bool_str(value):
              return "true" if value else "false"

          inherited_v4_315_rows = [
              {"inherited_from": "v4.315", "item": "rules", "value": "27 / 27 passed", "meaning": "Baseline comparator source packet passed.", "carry_forward_status": "ready_for_human_review_packet"},
              {"inherited_from": "v4.315", "item": "inherited_row_meaning_gate_confirmed", "value": True, "meaning": "Row meaning gate was confirmed in v4.314.", "carry_forward_status": "confirmed"},
              {"inherited_from": "v4.315", "item": "selected_row_family", "value": "BAO+RSD f_sigma8 row", "meaning": "Selected row family is BAO+RSD f_sigma8.", "carry_forward_status": "selected"},
              {"inherited_from": "v4.315", "item": "source_fetch_ok_rows", "value": "8 on GitHub / may be 0 local fallback", "meaning": "Source fetch ran.", "carry_forward_status": "source_surface_attempted"},
              {"inherited_from": "v4.315", "item": "candidate_quote_available_rows", "value": "15 on uploaded run", "meaning": "Candidate quote windows were available on GitHub.", "carry_forward_status": "candidate_sources_available"},
              {"inherited_from": "v4.315", "item": "human_review_template_rows", "value": 6, "meaning": "Six baseline review questions were written.", "carry_forward_status": "review_questions_ready"},
              {"inherited_from": "v4.315", "item": "baseline_approved", "value": False, "meaning": "No baseline approval yet.", "carry_forward_status": "open_gap"},
              {"inherited_from": "v4.315", "item": "selected_next_route", "value": "v4_316_sdss_rsd_baseline_comparator_human_review_packet_no_scoring", "meaning": "Current route.", "carry_forward_status": "current_route"},
          ]

          source_fetch_rows = []
          source_quote_rows = []
          for url in SOURCE_URLS:
              fetch, data = fetch_url(url)
              source_fetch_rows.append(fetch)
              text = strip_text(data)
              for quote_class, terms in QUOTE_SPECS:
                  window = window_around(text, terms)
                  source_quote_rows.append({
                      "quote_id": f"quote_{len(source_quote_rows)+1:03d}",
                      "quote_class": quote_class,
                      "source_url": url,
                      "candidate_quote_window": window,
                      "quote_status": "candidate_source_window_not_approval" if window else "missing_or_unfetched_window",
                      "score_allowed": False,
                      "support_allowed": False,
                  })

          candidate_rows = []
          for quote in source_quote_rows:
              usable = bool(quote["candidate_quote_window"])
              candidate_rows.append({
                  "candidate_id": f"baseline_candidate_{len(candidate_rows)+1:03d}",
                  "candidate_class": quote["quote_class"],
                  "source_url": quote["source_url"],
                  "candidate_quote_available": usable,
                  "candidate_quote_window": quote["candidate_quote_window"],
                  "candidate_use": "human_review_only_not_approved" if usable else "not_available_local_or_fetch_failed",
                  "baseline_approved": False,
                  "score_allowed": False,
                  "support_allowed": False,
              })

          review_packet_rows = []
          for q in QUESTION_ROWS:
              wanted_classes = set(q["candidate_classes"].split("|"))
              matching = [c for c in candidate_rows if c["candidate_class"] in wanted_classes]
              available = [c for c in matching if c["candidate_quote_available"]]
              # Keep the packet compact but source-traceable: include up to four best available windows.
              ranked = available[:4] if available else matching[:4]
              if not ranked:
                  ranked = [{
                      "candidate_id": "",
                      "candidate_class": "",
                      "source_url": "",
                      "candidate_quote_available": False,
                      "candidate_quote_window": "",
                      "candidate_use": "no_matching_candidate",
                  }]
              for c in ranked:
                  review_packet_rows.append({
                      "review_id": f"baseline_review_{len(review_packet_rows)+1:03d}",
                      "question_id": q["question_id"],
                      "question": q["question"],
                      "review_instruction": q["review_instruction"],
                      "candidate_id": c.get("candidate_id", ""),
                      "candidate_class": c.get("candidate_class", ""),
                      "source_url": c.get("source_url", ""),
                      "candidate_quote_available": c.get("candidate_quote_available", False),
                      "candidate_quote_window": c.get("candidate_quote_window", ""),
                      "suggested_human_decision": "accept_source_candidate_or_edit_needed" if c.get("candidate_quote_available", False) else "keep_blocked_or_find_better_source",
                      "approval_status_now": "not_approved",
                      "score_allowed": False,
                      "support_allowed": False,
                  })

          decision_template_rows = []
          for q in QUESTION_ROWS:
              relevant = [r for r in review_packet_rows if r["question_id"] == q["question_id"] and r["candidate_quote_available"]]
              first = relevant[0] if relevant else {}
              decision_template_rows.append({
                  "decision_id": f"baseline_decision_{len(decision_template_rows)+1:03d}",
                  "question_id": q["question_id"],
                  "question": q["question"],
                  "human_decision": "",
                  "allowed_decisions": "accept_source_candidate|edit_needed|reject|keep_blocked",
                  "selected_source_url_or_citation": first.get("source_url", ""),
                  "quoted_or_precise_source_text": first.get("candidate_quote_window", ""),
                  "answer_summary": "",
                  "reviewer_note": "",
                  "claim_limit_must_remain": "no_scoring/no_claims",
                  "baseline_approval_allowed_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              })

          review_checklist_rows = [
              {"check_id": "baseline_check_001", "review_check": "Does the source define an independent comparator, rather than repeating the observed SDSS row as its own baseline?", "required": True},
              {"check_id": "baseline_check_002", "review_check": "Does the source distinguish model/context from numeric comparator values?", "required": True},
              {"check_id": "baseline_check_003", "review_check": "Is covariance or likelihood still absent or limited?", "required": True},
              {"check_id": "baseline_check_004", "review_check": "Does the decision preserve no_scoring/no_claims?", "required": True},
              {"check_id": "baseline_check_005", "review_check": "Does the decision avoid treating candidate source text as baseline approval?", "required": True},
              {"check_id": "baseline_check_006", "review_check": "Is equal-or-better standard comparator treated as neutral/weaken/block rather than support?", "required": True},
          ]

          gate_rows = [
              {"gate_id": "gate_001", "gate_object": "inherited_row_meaning_gate_confirmed", "gate_passed": True, "gate_status": "confirmed", "reason": "v4.314 selected BAO+RSD f_sigma8 row family."},
              {"gate_id": "gate_002", "gate_object": "baseline_review_packet_written", "gate_passed": len(review_packet_rows) >= 6, "gate_status": "written", "reason": "Question-to-candidate review packet written."},
              {"gate_id": "gate_003", "gate_object": "baseline_decision_template_written", "gate_passed": len(decision_template_rows) == 6, "gate_status": "written", "reason": "Six fillable decision rows written."},
              {"gate_id": "gate_004", "gate_object": "review_checklist_written", "gate_passed": len(review_checklist_rows) == 6, "gate_status": "written", "reason": "Baseline review checklist written."},
              {"gate_id": "gate_005", "gate_object": "baseline_approval", "gate_passed": False, "gate_status": "not_approved", "reason": "v4.316 writes review packet only."},
              {"gate_id": "gate_006", "gate_object": "definition_match_confirmation", "gate_passed": False, "gate_status": "not_confirmed", "reason": "Definition matches remain blocked."},
              {"gate_id": "gate_007", "gate_object": "diagonal_diagnostic_readiness", "gate_passed": False, "gate_status": "not_ready", "reason": "No scoring readiness without baseline and definition gates."},
              {"gate_id": "gate_008", "gate_object": "support_allowed", "gate_passed": False, "gate_status": "blocked", "reason": "No support language allowed."},
          ]

          blocked_rows = [
              {"blocked_id": "blocked_001", "operation": "approve_baseline_values_now", "reason": "human review packet is not approval", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "fill_numeric_baseline_values_now", "reason": "source decisions are not ingested", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "confirm_definition_match_now", "reason": "definition-match lane has not run", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "run_diagonal_diagnostic_now", "reason": "diagnostic readiness is false", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "compute_residual_or_chi_square", "reason": "no approved baseline and no definition matches", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "compute_p_value_or_likelihood", "reason": "full covariance/likelihood remains absent", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "claim_tairid_support", "reason": "support is blocked", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "claim_evidence_or_validation", "reason": "no score and no holdout", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_010", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "baseline_comparator_human_review_packet", "permission_status": "completed", "reason": "Candidate packet, checklist, and fillable decision template written."},
              {"permission_scope": "baseline_comparator_decision_ingest", "permission_status": "allowed_next", "reason": "Next workflow may ingest the filled baseline decision template."},
              {"permission_scope": "baseline_approval", "permission_status": "blocked", "reason": "No baseline approval in this workflow."},
              {"permission_scope": "definition_match_confirmation", "permission_status": "blocked", "reason": "No definition match in this workflow."},
              {"permission_scope": "diagonal_diagnostic_score", "permission_status": "blocked", "reason": "No scoring readiness."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
          ]

          sdr_rows = [
              {"sdr_id": "sdr_001", "before_state": "baseline candidate sources existed as an unstructured packet", "after_state": "candidate sources are mapped to six review questions", "reduction_type": "review work organized"},
              {"sdr_id": "sdr_002", "before_state": "human review had no decision form", "after_state": "fillable baseline decision template is written", "reduction_type": "operator action clarified"},
              {"sdr_id": "sdr_003", "before_state": "candidate sources could look like approval", "after_state": "packet and template remain not approved", "reduction_type": "candidate/approval boundary preserved"},
              {"sdr_id": "sdr_004", "before_state": "baseline review could leak into scoring", "after_state": "scoring remains blocked until later gates", "reduction_type": "false progress blocked"},
              {"sdr_id": "sdr_005", "before_state": "next step was source packet", "after_state": "next step is baseline decision ingest after human review", "reduction_type": "next route narrowed"},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before human review packet"},
              {"gate": "inherited_v4_315_rows_equal_8", "passed": len(inherited_v4_315_rows) == 8, "detail": f"inherited_v4_315_rows = {len(inherited_v4_315_rows)}"},
              {"gate": "source_fetch_rows_equal_8", "passed": len(source_fetch_rows) == 8, "detail": f"source_fetch_rows = {len(source_fetch_rows)}"},
              {"gate": "source_quote_rows_equal_32", "passed": len(source_quote_rows) == 32, "detail": f"source_quote_rows = {len(source_quote_rows)}"},
              {"gate": "candidate_rows_equal_32", "passed": len(candidate_rows) == 32, "detail": f"candidate_rows = {len(candidate_rows)}"},
              {"gate": "question_rows_equal_6", "passed": len(QUESTION_ROWS) == 6, "detail": f"question_rows = {len(QUESTION_ROWS)}"},
              {"gate": "review_packet_rows_at_least_6", "passed": len(review_packet_rows) >= 6, "detail": f"review_packet_rows = {len(review_packet_rows)}"},
              {"gate": "decision_template_rows_equal_6", "passed": len(decision_template_rows) == 6, "detail": f"decision_template_rows = {len(decision_template_rows)}"},
              {"gate": "review_checklist_rows_equal_6", "passed": len(review_checklist_rows) == 6, "detail": f"review_checklist_rows = {len(review_checklist_rows)}"},
              {"gate": "gate_rows_equal_8", "passed": len(gate_rows) == 8, "detail": f"gate_rows = {len(gate_rows)}"},
              {"gate": "blocked_rows_equal_10", "passed": len(blocked_rows) == 10, "detail": f"blocked_rows = {len(blocked_rows)}"},
              {"gate": "permission_rows_equal_6", "passed": len(permission_rows) == 6, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "sdr_rows_equal_5", "passed": len(sdr_rows) == 5, "detail": f"sdr_rows = {len(sdr_rows)}"},
              {"gate": "all_sources_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in source_fetch_rows), "detail": "sources no score/support"},
              {"gate": "all_quotes_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in source_quote_rows), "detail": "quotes no score/support"},
              {"gate": "all_candidates_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in candidate_rows), "detail": "candidates no score/support"},
              {"gate": "all_review_packet_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in review_packet_rows), "detail": "review packet no score/support"},
              {"gate": "all_decision_template_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in decision_template_rows), "detail": "template no score/support"},
              {"gate": "baseline_approval_false", "passed": any(r["gate_object"] == "baseline_approval" and r["gate_passed"] is False for r in gate_rows), "detail": "baseline not approved"},
              {"gate": "definition_match_false", "passed": any(r["gate_object"] == "definition_match_confirmation" and r["gate_passed"] is False for r in gate_rows), "detail": "definition not confirmed"},
              {"gate": "diagnostic_readiness_false", "passed": any(r["gate_object"] == "diagonal_diagnostic_readiness" and r["gate_passed"] is False for r in gate_rows), "detail": "diagnostic not ready"},
              {"gate": "all_blocked_operations_blocked", "passed": all(r["blocked"] is True for r in blocked_rows), "detail": "all blocked"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_support", "passed": True, "detail": "no support"},
              {"gate": "truth_boundary_no_score", "passed": True, "detail": "no score"},
              {"gate": "truth_boundary_no_p_value", "passed": True, "detail": "no p-value"},
              {"gate": "truth_boundary_no_likelihood", "passed": True, "detail": "no likelihood"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_317_sdss_rsd_baseline_comparator_decision_ingest_no_scoring", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_316_sdss_rsd_baseline_comparator_human_review_packet_no_scoring_passed_no_claims", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_316_inherited_v4_315_rows.csv", inherited_v4_315_rows)
          write_csv(OUT / "v4_316_source_fetch_rows.csv", source_fetch_rows)
          write_csv(OUT / "v4_316_source_quote_rows.csv", source_quote_rows)
          write_csv(OUT / "v4_316_baseline_candidate_rows.csv", candidate_rows)
          write_csv(OUT / "v4_316_baseline_review_packet_rows.csv", review_packet_rows)
          write_csv(OUT / "SDSS_RSD_BASELINE_COMPARATOR_HUMAN_REVIEW_PACKET_v4_316_NO_APPROVAL.csv", review_packet_rows)
          write_csv(OUT / "SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_316_FILLABLE.csv", decision_template_rows)
          write_csv(OUT / "v4_316_review_checklist_rows.csv", review_checklist_rows)
          write_csv(OUT / "v4_316_gate_decision_rows.csv", gate_rows)
          write_csv(OUT / "v4_316_blocked_operation_rows.csv", blocked_rows)
          write_csv(OUT / "v4_316_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_316_sdr_reduction_rows.csv", sdr_rows)
          write_csv(OUT / "v4_316_rule_checks.csv", checks)

          readme = [
              "# SDSS RSD Baseline Comparator Human Review Packet v4.316",
              "",
              "This workflow packages baseline/comparator candidate source windows into a human-review packet and writes a fillable decision template.",
              "",
              "Fill `SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_316_FILLABLE.csv` only after reviewing the candidate source windows. Use one of: `accept_source_candidate`, `edit_needed`, `reject`, or `keep_blocked`.",
              "",
              "Do not treat this packet as baseline approval. Do not score from this packet.",
              "",
              "Truth boundary: no proof, no validation, no support, no scoring, no p-value, no likelihood.",
          ]
          (OUT / "SDSS_RSD_BASELINE_COMPARATOR_HUMAN_REVIEW_PACKET_v4_316_README.md").write_text("\n".join(readme), encoding="utf-8")

          summary = {
              "version": VERSION,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_row_meaning_gate_confirmed": True,
              "selected_row_family": "BAO+RSD f_sigma8 row",
              "source_fetch_rows": len(source_fetch_rows),
              "source_fetch_ok_rows": sum(1 for row in source_fetch_rows if row["fetch_ok"]),
              "source_quote_rows": len(source_quote_rows),
              "baseline_candidate_rows": len(candidate_rows),
              "candidate_quote_available_rows": sum(1 for row in candidate_rows if row["candidate_quote_available"]),
              "review_packet_rows": len(review_packet_rows),
              "decision_template_rows": len(decision_template_rows),
              "review_checklist_rows": len(review_checklist_rows),
