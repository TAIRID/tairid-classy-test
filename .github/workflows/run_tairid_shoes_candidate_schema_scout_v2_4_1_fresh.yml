name: Run TAIRID SH0ES Candidate Schema Scout v2.4.1 Fresh

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-candidate-schema-scout-v2-4-1-fresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Confirm fresh script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_candidate_schema_scout_v2_4_1_fresh.py
          echo "v2.4.1 FRESH SH0ES candidate schema scout found."

      - name: Run TAIRID SH0ES Candidate Schema Scout v2.4.1 Fresh
        run: |
          python run_tairid_shoes_candidate_schema_scout_v2_4_1_fresh.py

      - name: Upload fresh outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-candidate-schema-scout-v2-4-1-fresh-output
          path: |
            tairid_shoes_candidate_schema_scout_v2_4_1_fresh_outputs/**
