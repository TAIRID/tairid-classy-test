name: 000 TAIRID v4.76.1 Planck Reference Upload Repair

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-76-1-planck-reference-upload-repair.yml"

jobs:
  tairid-v4-76-1-planck-reference-upload-repair:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.76.1 Planck reference upload repair
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_76_1_planck_reference_upload_repair

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_76_1_planck_reference_upload_repair")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_76_1_planck_reference_upload_repair"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This repairs the v4.76 artifact upload path and preserves the same Planck reference boundary.",
              "A pass means the upload artifact path is repaired and the sprint can move to handoff."
          ]

          UPSTREAM_STATUS = {
              "v4_75_WiggleZ_policy": "passed_ready_for_Planck_reference_deep_route",
              "v4_76_expected_status": "Planck_reference_deep_route_decision_passed_ready_for_sprint_end_handoff",
              "screenshot_issue": "artifact upload warning caused by contaminated upload path including old v4.75 workflow filename",
              "Node20_warning": "non-test warning; workflow now opts into Node24 environment flag"
          }

          PLANCK_REFERENCE_STATUS = {
              "Planck_fullGrid_manifest_parsed": True,
              "sidecar_fixtures_available": True,
              "sidecar_fixtures_are_covariance": False,
              "direct_fsigma8_chain_columns_available": False,
              "direct_omegam_sigma8_chain_route_available": False,
              "primary_density_chain_route_available": True,
              "local_solver_available": False,
              "external_candidate_accepted_as_covariance": False,
              "reference_uncertainty_computed": False,
              "final_RSD_pressure_score_computed": False,
              "validation_claim_allowed": False
          }

          PLANCK_REFERENCE_ROUTE_OPTIONS = [
              {
                  "route_id": "external_verified_posterior_or_covariance_source",
                  "status": "valid_future_route_but_not_solved",
                  "allowed_now": True,
                  "current_blocker": "No external candidate accepted as covariance yet."
              },
              {
                  "route_id": "solver_or_container_branch",
                  "status": "valid_future_route_but_heavier",
                  "allowed_now": True,
                  "current_blocker": "No local CAMB/CLASS solver available yet."
              },
              {
                  "route_id": "fullGrid_primary_chain_parser_plus_solver",
                  "status": "valid_long_route_but_not_current_sprint_solution",
                  "allowed_now": True,
                  "current_blocker": "Requires solver, full chain streaming, and covariance validation."
              },
              {
                  "route_id": "sidecar_minimum_as_covariance",
                  "status": "blocked",
                  "allowed_now": False,
                  "current_blocker": "Sidecars are point fixtures, not posterior covariance."
              },
              {
                  "route_id": "fake_primary_column_shortcuts",
                  "status": "blocked",
                  "allowed_now": False,
                  "current_blocker": "theta, logA, and physical-density shortcuts require verified solver/background logic."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "An external source was accepted as Planck RSD covariance.",
              "A solver was run.",
              "Full Planck chains were imported.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          failed_gates = []
          warnings = [
              "upload_path_repair_only",
              "Planck_reference_uncertainty_still_missing",
              "sidecars_are_fixtures_not_covariance",
              "no_external_covariance_accepted",
              "no_solver_available_or_run",
              "no_full_chain_import",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          if PLANCK_REFERENCE_STATUS["reference_uncertainty_computed"] is not False:
              failed_gates.append("reference_uncertainty_marked_computed_too_early")

          if PLANCK_REFERENCE_STATUS["final_RSD_pressure_score_computed"] is not False:
              failed_gates.append("final_RSD_pressure_marked_computed_too_early")

          if PLANCK_REFERENCE_STATUS["sidecar_fixtures_are_covariance"] is not False:
              failed_gates.append("sidecars_marked_as_covariance")

          if not any(row["route_id"] == "sidecar_minimum_as_covariance" and row["allowed_now"] is False for row in PLANCK_REFERENCE_ROUTE_OPTIONS):
              failed_gates.append("sidecar_covariance_shortcut_not_blocked")

          if not any(row["route_id"] == "fake_primary_column_shortcuts" and row["allowed_now"] is False for row in PLANCK_REFERENCE_ROUTE_OPTIONS):
              failed_gates.append("fake_primary_column_shortcut_not_blocked")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "sidecar minimum files were treated as posterior covariance",
              "solver was run",
              "full planck chains were imported",
              "final rsd pressure score",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "Planck_reference_upload_repair_passed_ready_for_sprint_end_handoff"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "upload_path_repaired",
                  "pass": True,
                  "result": "artifact upload path points only to artifacts/tairid_v4_76_1_planck_reference_upload_repair/",
                  "boundary": "Artifact repair only."
              },
              {
                  "rule_id": "node24_opt_in_added",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true added",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "reference_uncertainty_missing_preserved",
                  "pass": PLANCK_REFERENCE_STATUS["reference_uncertainty_computed"] is False,
                  "result": "Planck reference uncertainty remains missing",
                  "boundary": "No final RSD pressure."
              },
              {
                  "rule_id": "sidecars_remain_fixtures_only",
                  "pass": PLANCK_REFERENCE_STATUS["sidecar_fixtures_are_covariance"] is False,
                  "result": "sidecars are not covariance",
                  "boundary": "No posterior uncertainty from .minimum files."
              },
              {
                  "rule_id": "external_covariance_not_accepted",
                  "pass": PLANCK_REFERENCE_STATUS["external_candidate_accepted_as_covariance"] is False,
                  "result": "no external candidate accepted as covariance",
                  "boundary": "Source reachability is not covariance."
              },
              {
                  "rule_id": "solver_not_available_or_run",
                  "pass": PLANCK_REFERENCE_STATUS["local_solver_available"] is False,
                  "result": "no local solver route accepted",
                  "boundary": "No solver output."
              },
              {
                  "rule_id": "route_options_preserved",
                  "pass": len(PLANCK_REFERENCE_ROUTE_OPTIONS) >= 5,
                  "result": f"{len(PLANCK_REFERENCE_ROUTE_OPTIONS)} route options preserved",
                  "boundary": "Options are not implemented."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 10,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Upload repair and Planck boundary only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_76_1_rules_passed")

          if failed_gates:
              readiness_label = "Planck_reference_upload_repair_failed"
              next_allowed_step = "Repair upload path before sprint-end handoff."
          else:
              readiness_label = "Planck_reference_upload_repair_passed_ready_for_sprint_end_handoff"
              next_allowed_step = (
                  "Proceed to v4.77 sprint-end handoff. Carry Planck reference uncertainty as missing. "
                  "Do not compute final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "artifact_upload_path_repaired": True,
              "node24_opt_in_added": True,
              "Planck_reference_current_status": "bounded_but_unsolved",
              "fullGrid_manifest_parsed": PLANCK_REFERENCE_STATUS["Planck_fullGrid_manifest_parsed"],
              "sidecar_fixtures_available": PLANCK_REFERENCE_STATUS["sidecar_fixtures_available"],
              "sidecar_fixtures_are_covariance": PLANCK_REFERENCE_STATUS["sidecar_fixtures_are_covariance"],
              "direct_fsigma8_chain_columns_available": PLANCK_REFERENCE_STATUS["direct_fsigma8_chain_columns_available"],
              "direct_omegam_sigma8_chain_route_available": PLANCK_REFERENCE_STATUS["direct_omegam_sigma8_chain_route_available"],
              "primary_density_chain_route_available": PLANCK_REFERENCE_STATUS["primary_density_chain_route_available"],
              "local_solver_available": PLANCK_REFERENCE_STATUS["local_solver_available"],
              "external_candidate_accepted_as_covariance": PLANCK_REFERENCE_STATUS["external_candidate_accepted_as_covariance"],
              "reference_uncertainty_computed": PLANCK_REFERENCE_STATUS["reference_uncertainty_computed"],
              "final_RSD_pressure_score_computed": PLANCK_REFERENCE_STATUS["final_RSD_pressure_score_computed"],
              "validation_claim_allowed": PLANCK_REFERENCE_STATUS["validation_claim_allowed"],
              "route_decision": route_decision,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_status": UPSTREAM_STATUS,
              "Planck_reference_status": PLANCK_REFERENCE_STATUS,
              "Planck_reference_route_options": PLANCK_REFERENCE_ROUTE_OPTIONS,
              "blocked_claims": BLOCKED_CLAIMS,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "artifact_upload_path_repaired": True,
                  "reference_uncertainty_computed": False,
                  "external_reference_imported": False,
                  "solver_run": False,
                  "full_chains_imported": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_76_1_planck_reference_upload_repair.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "Planck_reference_route_options_v4_76_1.csv",
              PLANCK_REFERENCE_ROUTE_OPTIONS,
              ["route_id", "status", "allowed_now", "purpose", "requires_before_final_use", "current_blocker", "final_score_allowed_after_this_route_now"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_76_1.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_76_1.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.76.1 — Planck Reference Upload Repair")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This repair fixes the v4.76 artifact upload path warning and opts the workflow into Node 24.")
          md.append("")
          md.append("It preserves the same Planck boundary: Planck reference uncertainty is still missing, sidecars are fixtures only, no solver was run, no full chains were imported, and no final RSD pressure was computed.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_76_1_planck_reference_upload_repair.json`")
          md.append("- `tairid_v4_76_1_planck_reference_upload_repair.md`")
          md.append("- `Planck_reference_route_options_v4_76_1.csv`")
          md.append("- `blocked_claims_v4_76_1.csv`")
          md.append("- `rule_results_v4_76_1.csv`")
          md.append("")

          (OUTDIR / "tairid_v4_76_1_planck_reference_upload_repair.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.76.1 Planck reference upload repair artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-76-1-planck-reference-upload-repair
          path: artifacts/tairid_v4_76_1_planck_reference_upload_repair/
