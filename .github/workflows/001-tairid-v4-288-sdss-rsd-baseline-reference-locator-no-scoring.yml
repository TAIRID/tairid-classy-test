name: 001 TAIRID v4.288 - SDSS RSD Baseline Reference Locator No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-288-sdss-rsd-baseline-reference-locator-no-scoring.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-baseline-reference-locator-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.288 SDSS RSD Baseline Reference Locator No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.288 SDSS RSD baseline reference locator no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import html
          import re
          import urllib.parse
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.288"
          ROUTE = "sdss_rsd_baseline_reference_locator_no_scoring_after_v4_287"
          EXPECTED_RESULT = "v4_288_sdss_rsd_baseline_reference_locator_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_289_sdss_rsd_reference_page_probe_and_row_meaning_no_scoring"

          OUT = Path("tairid_v4_288_sdss_rsd_baseline_reference_locator_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-288-sdss-rsd-baseline-reference-locator-output.zip"
          SOURCE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/"
          RELATED_PAGE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          MAX_BYTES = 2_000_000

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
                  self.in_a = False
                  self.current_href = ""
                  self.current_text = []

              def handle_starttag(self, tag, attrs):
                  if tag.lower() == "a":
                      attrs = dict(attrs)
                      self.in_a = True
                      self.current_href = attrs.get("href", "")
                      self.current_text = []

              def handle_data(self, data):
                  if self.in_a:
                      self.current_text.append(data)

              def handle_endtag(self, tag):
                  if tag.lower() == "a" and self.in_a:
                      text = " ".join(" ".join(self.current_text).split())
                      self.links.append({"href": self.current_href, "text": text})
                      self.in_a = False
                      self.current_href = ""
                      self.current_text = []

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=MAX_BYTES, timeout=15):
              out = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.288-baseline-reference-locator-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      out["status_code"] = getattr(resp, "status", "")
                      out["content_type"] = resp.headers.get("Content-Type", "")
                      out["content_length_header"] = resp.headers.get("Content-Length", "")
                      out["final_url"] = resp.geturl()
                      out["bytes_read"] = len(data)
                      out["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      out["fetch_ok"] = True
              except Exception as exc:
                  out["error"] = f"{type(exc).__name__}: {exc}"
              return out, data

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              try:
                  fields["z_eff"] = float(fields["z_eff_text"])
              except Exception:
                  fields["z_eff"] = ""
              return fields

          def parse_column_contract_rows(tables):
              out = []
              for table_idx, table in enumerate(tables):
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      if "(z)" in label_norm:
                          row_type = "redshift_function_row_candidate"
                      else:
                          row_type = "final_or_consensus_row_candidate"
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for value, sigma in measurement_pairs(cell):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              out.append({
                                  "contract_id": f"column_contract_bound_{len(out)+1:02d}",
                                  "bound_id": f"bound_{len(out)+1:02d}",
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "z_eff": fields["z_eff"],
                                  "z_range_text": fields["z_range_text"],
                                  "observable": "f_sigma8",
                                  "observed_value": value,
                                  "observed_sigma": sigma,
                                  "baseline_comparator_required": True,
                                  "covariance_policy_required": True,
                                  "score_allowed": False,
                                  "contract_status": "column_contract_rebuilt_for_baseline_locator_no_scoring",
                              })
              return out

          def extract_candidate_links(base_url, data):
              if not data:
                  return []
              text = data.decode("utf-8", errors="replace")
              parser = LinkParser()
              parser.feed(text)
              rows = []
              keywords = ["bao", "rsd", "eboss", "final", "measurement", "cosmo", "cosmology", "paper", "arxiv", "doi", "table", "data"]
              seen = set()
              for link in parser.links:
                  href = link["href"].strip()
                  if not href:
                      continue
                  url = urllib.parse.urljoin(base_url, href)
                  key = url.split("#")[0]
                  if key in seen:
                      continue
                  seen.add(key)
                  hay = (url + " " + link["text"]).lower()
                  if any(k in hay for k in keywords):
                      rows.append({
                          "candidate_id": f"disc_link_{len(rows)+1:03d}",
                          "source_page": base_url,
                          "candidate_url": url,
                          "link_text": link["text"],
                          "locator_basis": "discovered_link_keyword_match",
                          "baseline_candidate_status": "candidate_reference_not_validated",
                          "score_allowed": False,
                      })
              return rows

          inherited_v4_287_rows = [
              {"inherited_from": "v4.287", "item": "rules", "value": "45 / 45 passed", "meaning": "Exact column contract and baseline stub passed.", "carry_forward_status": "ready_for_baseline_locator"},
              {"inherited_from": "v4.287", "item": "fetch_ok", "value": True, "meaning": "GitHub fetched official SDSS page.", "carry_forward_status": "real_data_touched"},
              {"inherited_from": "v4.287", "item": "column_contract_rows", "value": 12, "meaning": "Twelve column contracts were written.", "carry_forward_status": "column_contracts_ready"},
              {"inherited_from": "v4.287", "item": "baseline_stub_rows", "value": 12, "meaning": "Twelve baseline stubs were written but not filled.", "carry_forward_status": "baseline_stubs_empty"},
              {"inherited_from": "v4.287", "item": "variant_difference_rows", "value": 6, "meaning": "Six row-variant differences were reviewed as parser integrity only.", "carry_forward_status": "variant_review_no_score"},
              {"inherited_from": "v4.287", "item": "baseline_values_filled", "value": False, "meaning": "No baseline values were filled.", "carry_forward_status": "baseline_missing"},
              {"inherited_from": "v4.287", "item": "covariance_handled", "value": False, "meaning": "No covariance handling.", "carry_forward_status": "covariance_missing"},
              {"inherited_from": "v4.287", "item": "support_allowed", "value": False, "meaning": "Support remained blocked.", "carry_forward_status": "support_blocked"},
              {"inherited_from": "v4.287", "item": "approved_holdout_sources", "value": 0, "meaning": "No holdout approved.", "carry_forward_status": "no_holdout_approved"},
              {"inherited_from": "v4.287", "item": "selected_next_route", "value": "v4_288_sdss_rsd_baseline_reference_locator_no_scoring", "meaning": "Current route locates baseline references without scoring.", "carry_forward_status": "current_route"},
          ]

          source_fetch_row, source_data = fetch_url(SOURCE_URL)
          related_fetch_row, related_data = fetch_url(RELATED_PAGE_URL)

          source_table_parser = SimpleTableParser()
          if source_data:
              source_table_parser.feed(source_data.decode("utf-8", errors="replace"))
          column_contract_rows = parse_column_contract_rows(source_table_parser.tables)

          discovered_links = extract_candidate_links(SOURCE_URL, source_data) + extract_candidate_links(RELATED_PAGE_URL, related_data)

          static_reference_candidate_rows = [
              {
                  "candidate_id": "static_ref_001",
                  "candidate_url": SOURCE_URL,
                  "link_text": "SDSS final BAO and RSD measurements table",
                  "locator_basis": "official_table_page_already_used",
                  "baseline_candidate_status": "source_table_page_not_baseline_values",
                  "score_allowed": False,
              },
              {
                  "candidate_id": "static_ref_002",
                  "candidate_url": RELATED_PAGE_URL,
                  "link_text": "SDSS final BAO and RSD measurements overview",
                  "locator_basis": "official_related_measurements_page",
                  "baseline_candidate_status": "candidate_reference_page_not_scored",
                  "score_allowed": False,
              },
              {
                  "candidate_id": "static_ref_003",
                  "candidate_url": "https://www.sdss4.org/dr16/",
                  "link_text": "SDSS DR16 release page",
                  "locator_basis": "official_release_context",
                  "baseline_candidate_status": "release_context_not_baseline_values",
                  "score_allowed": False,
              },
          ]

          all_reference_candidate_rows = static_reference_candidate_rows + discovered_links
          # Deduplicate by URL while preserving static priority.
          deduped = []
          seen = set()
          for row in all_reference_candidate_rows:
              url = row["candidate_url"].split("#")[0]
              if url in seen:
                  continue
              seen.add(url)
              row = dict(row)
              row["candidate_id"] = f"baseline_ref_{len(deduped)+1:03d}"
              deduped.append(row)
          baseline_reference_candidate_rows = deduped[:80]

          baseline_stub_locator_rows = []
          for contract in column_contract_rows:
              baseline_stub_locator_rows.append({
                  "baseline_stub_id": f"baseline_stub_{contract['bound_id']}",
                  "bound_id": contract["bound_id"],
                  "row_label": contract["row_label"],
                  "sample_or_tracer": contract["sample_or_tracer"],
                  "z_eff": contract["z_eff"],
                  "observed_value": contract["observed_value"],
                  "observed_sigma": contract["observed_sigma"],
                  "baseline_reference_required": True,
                  "candidate_reference_count": len(baseline_reference_candidate_rows),
                  "baseline_value": "NOT_FILLED",
                  "baseline_source": "NOT_SELECTED",
                  "baseline_status": "locator_candidates_written_not_filled",
                  "score_allowed": False,
                  "support_allowed": False,
              })

          reference_classification_rows = []
          for row in baseline_reference_candidate_rows:
              url = row["candidate_url"].lower()
              text = row.get("link_text", "").lower()
              if "arxiv" in url or "doi" in url:
                  ref_class = "paper_or_persistent_identifier_candidate"
              elif "sdss4.org" in url and ("science" in url or "dr16" in url):
                  ref_class = "official_sdss_context_candidate"
              elif "data.sdss.org" in url:
                  ref_class = "official_sdss_data_endpoint_candidate"
              else:
                  ref_class = "other_reference_candidate"
              reference_classification_rows.append({
                  "candidate_id": row["candidate_id"],
                  "candidate_url": row["candidate_url"],
                  "reference_class": ref_class,
                  "classification_status": "locator_only_not_validated",
                  "baseline_value_extracted": False,
                  "score_allowed": False,
              })

          baseline_fill_policy_rows = [
              {"policy_id": "baseline_policy_001", "object": "baseline_reference_locator", "rule": "locator candidates may not fill baseline values by themselves", "status": "active"},
              {"policy_id": "baseline_policy_002", "object": "paper_or_identifier_candidate", "rule": "paper/DOI/arXiv links must be probed and mapped to exact row meaning before values are used", "status": "active"},
              {"policy_id": "baseline_policy_003", "object": "official_context_page", "rule": "overview pages can explain row meaning but cannot substitute for covariance or exact comparator values unless source gives them", "status": "active"},
              {"policy_id": "baseline_policy_004", "object": "baseline_equal_or_better_null", "rule": "if the standard comparator explains the result as well or better, TAIRID support remains blocked", "status": "active"},
              {"policy_id": "baseline_policy_005", "object": "same_family_sdss", "rule": "SDSS/eBOSS remains exploratory/same-family, not independent holdout support", "status": "active"},
          ]

          row_meaning_reference_need_rows = [
              {"need_id": "row_need_001", "row_label": "f σ 8 (z)", "needed_reference": "source explanation of whether this is a derived redshift-function row or older/predicted row", "status": "required_before_score"},
              {"need_id": "row_need_002", "row_label": "f σ 8", "needed_reference": "source explanation of whether this is the final consensus measurement row", "status": "required_before_score"},
              {"need_id": "row_need_003", "row_label": "two-row relationship", "needed_reference": "source statement or table context explaining whether rows are variants, independent rows, or model-derived related rows", "status": "required_before_score"},
          ]

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "fill_baseline_values_now", "reason": "reference candidates are only located, not parsed/mapped to baseline values", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "score_sdss_rsd_rows", "reason": "baseline values, covariance, and row meaning are still missing", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "claim_tairid_support", "reason": "reference locating is not evidence", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "claim_baseline_advantage", "reason": "no baseline comparator has been computed", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "compute_p_value_or_likelihood", "reason": "no covariance or likelihood guard exists", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "approve_holdout_source", "reason": "SDSS/eBOSS remains same-family current lane", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "source_page_fetch", "permission_status": "attempted", "reason": "Official SDSS table page fetch attempted."},
              {"permission_scope": "related_page_fetch", "permission_status": "attempted", "reason": "Official SDSS related measurements page fetch attempted."},
              {"permission_scope": "baseline_reference_locator", "permission_status": "written_no_scoring", "reason": "Reference candidates located but not parsed for values."},
              {"permission_scope": "baseline_reference_probe_and_row_meaning", "permission_status": "allowed_next", "reason": "Next workflow may probe candidate references for row meaning without scoring."},
              {"permission_scope": "baseline_value_fill", "permission_status": "blocked", "reason": "No exact comparator mapping exists."},
              {"permission_scope": "external_scoring", "permission_status": "blocked", "reason": "No scoring allowed."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
              {"permission_scope": "validation_or_evidence_claim", "permission_status": "blocked", "reason": "No validation/evidence allowed."},
          ]

          readiness_rows = [
              {"readiness_id": "ready_001", "object": "sdss_table_page_fetch", "status": "ok" if source_fetch_row["fetch_ok"] else "failed_or_unavailable", "meaning": "Fetch status only."},
              {"readiness_id": "ready_002", "object": "sdss_related_page_fetch", "status": "ok" if related_fetch_row["fetch_ok"] else "failed_or_unavailable", "meaning": "Fetch status only."},
              {"readiness_id": "ready_003", "object": "baseline_reference_candidates", "status": f"{len(baseline_reference_candidate_rows)} candidates", "meaning": "Locator candidates only."},
              {"readiness_id": "ready_004", "object": "baseline_stubs", "status": f"{len(baseline_stub_locator_rows)} stubs_not_filled", "meaning": "Stubs remain empty."},
              {"readiness_id": "ready_005", "object": "row_meaning_reference", "status": "needed_next", "meaning": "Row meanings remain unconfirmed."},
              {"readiness_id": "ready_006", "object": "external_scoring", "status": "blocked", "meaning": "Still not allowed."},
          ]

          decision_rows = [
              {"decision_id": "decision_001", "decision": "Baseline reference candidates are located but not used.", "basis": "Links and official pages are candidates only.", "next_action": "Probe references for row meaning next.", "claim_status": "locator_only"},
              {"decision_id": "decision_002", "decision": "Baseline stubs remain empty.", "basis": "No comparator values or baseline source have been filled.", "next_action": "Do not score.", "claim_status": "baseline_missing"},
              {"decision_id": "decision_003", "decision": "Row meaning remains a required blocker.", "basis": "The relation between f_sigma8(z) and f_sigma8 rows is still not source-confirmed.", "next_action": "Find source row explanation.", "claim_status": "row_meaning_block"},
              {"decision_id": "decision_004", "decision": "The next route is reference-page probe and row-meaning review.", "basis": "A reference locator exists but needs mapping before baseline values can be considered.", "next_action": SELECTED_NEXT_ROUTE, "claim_status": "safe_to_continue"},
          ]

          route_review_rows = [
              {"route_id": "route_001", "route": "sdss_rsd_reference_page_probe_and_row_meaning_no_scoring", "permission_status": "recommended", "reason": "Need to probe reference candidates for row meaning before filling baselines."},
              {"route_id": "route_002", "route": "sdss_rsd_baseline_value_fill_guard", "permission_status": "blocked_until_reference_mapping", "reason": "Baseline values cannot be filled until reference mapping is explicit."},
              {"route_id": "route_003", "route": "sdss_rsd_external_data_score", "permission_status": "blocked", "reason": "Scoring needs baseline values, covariance, row meaning, and score guard."},
              {"route_id": "route_004", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.288 is a clean baseline-reference locator milestone."},
          ]

          sdr_reduction_rows = [
              {"sdr_id": "sdr_001", "before_state": "baseline was only an empty stub", "after_state": "baseline reference candidates are located", "reduction_type": "baseline source surface narrowed"},
              {"sdr_id": "sdr_002", "before_state": "candidate links could be mistaken for values", "after_state": "locator-only policy blocks value filling", "reduction_type": "source/value boundary preserved"},
              {"sdr_id": "sdr_003", "before_state": "row meaning was unconfirmed", "after_state": "row-meaning reference needs are explicit", "reduction_type": "semantic blocker sharpened"},
              {"sdr_id": "sdr_004", "before_state": "baseline advantage could be claimed early", "after_state": "baseline advantage remains blocked", "reduction_type": "comparison claim prevented"},
              {"sdr_id": "sdr_005", "before_state": "same-family source could be overclaimed", "after_state": "same-family ceiling remains active", "reduction_type": "claim ceiling preserved"},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before baseline locator"},
              {"gate": "inherited_v4_287_rows_equal_10", "passed": len(inherited_v4_287_rows) == 10, "detail": f"inherited_v4_287_rows = {len(inherited_v4_287_rows)}"},
              {"gate": "source_fetch_row_recorded", "passed": isinstance(source_fetch_row, dict), "detail": f"source_fetch_ok = {source_fetch_row['fetch_ok']}"},
              {"gate": "related_fetch_row_recorded", "passed": isinstance(related_fetch_row, dict), "detail": f"related_fetch_ok = {related_fetch_row['fetch_ok']}"},
              {"gate": "column_contract_rows_recorded", "passed": len(column_contract_rows) >= 0, "detail": f"column_contract_rows = {len(column_contract_rows)}"},
              {"gate": "baseline_reference_candidate_rows_at_least_static_3", "passed": len(baseline_reference_candidate_rows) >= 3, "detail": f"baseline_reference_candidate_rows = {len(baseline_reference_candidate_rows)}"},
              {"gate": "baseline_stub_locator_rows_match_contracts", "passed": len(baseline_stub_locator_rows) == len(column_contract_rows), "detail": f"baseline_stub_locator_rows = {len(baseline_stub_locator_rows)}"},
              {"gate": "reference_classification_rows_match_candidates", "passed": len(reference_classification_rows) == len(baseline_reference_candidate_rows), "detail": f"reference_classification_rows = {len(reference_classification_rows)}"},
              {"gate": "baseline_fill_policy_rows_equal_5", "passed": len(baseline_fill_policy_rows) == 5, "detail": f"baseline_fill_policy_rows = {len(baseline_fill_policy_rows)}"},
              {"gate": "row_meaning_reference_need_rows_equal_3", "passed": len(row_meaning_reference_need_rows) == 3, "detail": f"row_meaning_reference_need_rows = {len(row_meaning_reference_need_rows)}"},
              {"gate": "blocked_operation_rows_equal_8", "passed": len(blocked_operation_rows) == 8, "detail": f"blocked_operation_rows = {len(blocked_operation_rows)}"},
              {"gate": "permission_rows_equal_8", "passed": len(permission_rows) == 8, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_6", "passed": len(readiness_rows) == 6, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_review_rows_equal_4", "passed": len(route_review_rows) == 4, "detail": f"route_review_rows = {len(route_review_rows)}"},
              {"gate": "sdr_reduction_rows_equal_5", "passed": len(sdr_reduction_rows) == 5, "detail": f"sdr_reduction_rows = {len(sdr_reduction_rows)}"},
              {"gate": "all_candidates_no_score", "passed": all(row["score_allowed"] is False for row in baseline_reference_candidate_rows), "detail": "reference candidates no score"},
              {"gate": "all_reference_classifications_no_score", "passed": all(row["score_allowed"] is False for row in reference_classification_rows), "detail": "reference classifications no score"},
              {"gate": "no_baseline_values_extracted", "passed": all(row["baseline_value_extracted"] is False for row in reference_classification_rows), "detail": "no baseline values extracted"},
              {"gate": "all_stubs_not_filled", "passed": all(row["baseline_value"] == "NOT_FILLED" for row in baseline_stub_locator_rows), "detail": "baseline stubs not filled"},
              {"gate": "all_stubs_no_score_support", "passed": all(row["score_allowed"] is False and row["support_allowed"] is False for row in baseline_stub_locator_rows), "detail": "baseline stubs no score/support"},
              {"gate": "baseline_locator_policy_active", "passed": any(row["object"] == "baseline_reference_locator" and row["status"] == "active" for row in baseline_fill_policy_rows), "detail": "baseline locator policy active"},
              {"gate": "same_family_policy_active", "passed": any(row["object"] == "same_family_sdss" and row["status"] == "active" for row in baseline_fill_policy_rows), "detail": "same-family policy active"},
              {"gate": "row_meaning_fsigma_z_need_present", "passed": any(row["row_label"] == "f σ 8 (z)" for row in row_meaning_reference_need_rows), "detail": "f sigma8 z row need present"},
              {"gate": "row_meaning_fsigma_need_present", "passed": any(row["row_label"] == "f σ 8" for row in row_meaning_reference_need_rows), "detail": "f sigma8 row need present"},
              {"gate": "all_blocked_operations_blocked", "passed": all(row["blocked"] is True for row in blocked_operation_rows), "detail": "all blocked operations guarded"},
              {"gate": "baseline_value_fill_blocked", "passed": any(row["operation"] == "fill_baseline_values_now" and row["blocked"] is True for row in blocked_operation_rows), "detail": "baseline fill blocked"},
              {"gate": "score_blocked", "passed": any(row["operation"] == "score_sdss_rsd_rows" and row["blocked"] is True for row in blocked_operation_rows), "detail": "score blocked"},
              {"gate": "baseline_reference_probe_allowed_next", "passed": any(row["permission_scope"] == "baseline_reference_probe_and_row_meaning" and row["permission_status"] == "allowed_next" for row in permission_rows), "detail": "reference probe allowed next"},
              {"gate": "baseline_value_fill_permission_blocked", "passed": any(row["permission_scope"] == "baseline_value_fill" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "baseline fill permission blocked"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external scoring blocked"},
              {"gate": "support_blocked", "passed": any(row["permission_scope"] == "support_language" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "support blocked"},
              {"gate": "validation_evidence_blocked", "passed": any(row["permission_scope"] == "validation_or_evidence_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation/evidence blocked"},
              {"gate": "next_route_recommended", "passed": any(row["route"] == "sdss_rsd_reference_page_probe_and_row_meaning_no_scoring" and row["permission_status"] == "recommended" for row in route_review_rows), "detail": "v4.289 route recommended"},
              {"gate": "score_route_blocked", "passed": any(row["route"] == "sdss_rsd_external_data_score" and row["permission_status"] == "blocked" for row in route_review_rows), "detail": "score route blocked"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_support", "passed": True, "detail": "no support"},
              {"gate": "truth_boundary_no_p_value", "passed": True, "detail": "no p-value"},
              {"gate": "truth_boundary_no_likelihood", "passed": True, "detail": "no likelihood"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout approval"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_289_sdss_rsd_reference_page_probe_and_row_meaning_no_scoring", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_288_sdss_rsd_baseline_reference_locator_no_scoring_passed_no_claims", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_288_inherited_v4_287_rows.csv", inherited_v4_287_rows)
          write_csv(OUT / "v4_288_source_fetch_rows.csv", [{**source_fetch_row, "score_allowed": False, "support_allowed": False}])
          write_csv(OUT / "v4_288_related_fetch_rows.csv", [{**related_fetch_row, "score_allowed": False, "support_allowed": False}])
          write_csv(OUT / "v4_288_column_contract_rows.csv", column_contract_rows)
          write_csv(OUT / "v4_288_baseline_reference_candidate_rows.csv", baseline_reference_candidate_rows)
          write_csv(OUT / "SDSS_RSD_BASELINE_REFERENCE_CANDIDATES_v4_288_NO_SCORING.csv", baseline_reference_candidate_rows)
          write_csv(OUT / "v4_288_baseline_stub_locator_rows.csv", baseline_stub_locator_rows)
          write_csv(OUT / "SDSS_RSD_BASELINE_STUB_LOCATOR_ROWS_v4_288_NOT_FILLED.csv", baseline_stub_locator_rows)
          write_csv(OUT / "v4_288_reference_classification_rows.csv", reference_classification_rows)
          write_csv(OUT / "v4_288_baseline_fill_policy_rows.csv", baseline_fill_policy_rows)
          write_csv(OUT / "v4_288_row_meaning_reference_need_rows.csv", row_meaning_reference_need_rows)
          write_csv(OUT / "v4_288_blocked_operation_rows.csv", blocked_operation_rows)
          write_csv(OUT / "v4_288_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_288_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_288_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_288_route_review_rows.csv", route_review_rows)
          write_csv(OUT / "v4_288_sdr_reduction_rows.csv", sdr_reduction_rows)
          write_csv(OUT / "v4_288_rule_checks.csv", checks)

          candidate_preview_lines = [
              f"{row['candidate_id']}: {row['link_text']} -> {row['candidate_url']}"
              for row in baseline_reference_candidate_rows[:12]
          ]

          stub_lines = [
              f"{row['baseline_stub_id']}: {row['sample_or_tracer']} z_eff={row['z_eff']} baseline={row['baseline_status']}"
              for row in baseline_stub_locator_rows[:12]
          ] or ["no baseline stubs rebuilt in local run"]

          route_lines = [
              f"{row['route']}: {row['permission_status']} — {row['reason']}"
              for row in route_review_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "source_url": SOURCE_URL,
              "source_fetch_ok": source_fetch_row["fetch_ok"],
              "related_page_url": RELATED_PAGE_URL,
              "related_fetch_ok": related_fetch_row["fetch_ok"],
              "column_contract_rows": len(column_contract_rows),
              "baseline_reference_candidate_rows": len(baseline_reference_candidate_rows),
              "baseline_stub_locator_rows": len(baseline_stub_locator_rows),
              "reference_classification_rows": len(reference_classification_rows),
              "baseline_values_filled": False,
              "baseline_values_extracted": False,
              "row_meaning_confirmed": False,
              "covariance_handled": False,
              "p_value_computed": False,
              "likelihood_computed": False,
              "numeric_fit_allowed": False,
              "support_allowed": False,
              "evidence_allowed": False,
              "validation_allowed": False,
              "holdout_approval_allowed": False,
              "combined_matrix_allowed": False,
              "approved_holdout_sources": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "supports_tairid": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_288_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.288 SDSS RSD Baseline Reference Locator No Scoring",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"source_url = {SOURCE_URL}",
              f"source_fetch_ok = {summary['source_fetch_ok']}",
              f"related_page_url = {RELATED_PAGE_URL}",
              f"related_fetch_ok = {summary['related_fetch_ok']}",
              f"column_contract_rows = {summary['column_contract_rows']}",
              f"baseline_reference_candidate_rows = {summary['baseline_reference_candidate_rows']}",
              f"baseline_stub_locator_rows = {summary['baseline_stub_locator_rows']}",
              f"reference_classification_rows = {summary['reference_classification_rows']}",
              f"baseline_values_filled = {summary['baseline_values_filled']}",
              f"baseline_values_extracted = {summary['baseline_values_extracted']}",
              f"row_meaning_confirmed = {summary['row_meaning_confirmed']}",
              f"covariance_handled = {summary['covariance_handled']}",
              f"p_value_computed = {summary['p_value_computed']}",
              f"likelihood_computed = {summary['likelihood_computed']}",
              f"numeric_fit_allowed = {summary['numeric_fit_allowed']}",
              f"support_allowed = {summary['support_allowed']}",
              f"evidence_allowed = {summary['evidence_allowed']}",
              f"validation_allowed = {summary['validation_allowed']}",
              f"holdout_approval_allowed = {summary['holdout_approval_allowed']}",
              f"combined_matrix_allowed = {summary['combined_matrix_allowed']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Reference candidate preview:",
              *candidate_preview_lines,
              "",
              "Baseline stub preview:",
              *stub_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.288 locates baseline/reference candidates for the SDSS RSD f_sigma8 column contracts. It does not fill baseline values, confirm row meaning, handle covariance, score data, compute p-values, compute likelihoods, fit corrections, approve support, approve evidence, approve validation, approve a holdout, or build a combined matrix.",
              "",
              "Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.",
          ]
          (OUT / "v4_288_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"source_url = {SOURCE_URL}")
          print(f"source_fetch_ok = {summary['source_fetch_ok']}")
          print(f"related_page_url = {RELATED_PAGE_URL}")
          print(f"related_fetch_ok = {summary['related_fetch_ok']}")
          print(f"column_contract_rows = {summary['column_contract_rows']}")
          print(f"baseline_reference_candidate_rows = {summary['baseline_reference_candidate_rows']}")
          print(f"baseline_stub_locator_rows = {summary['baseline_stub_locator_rows']}")
          print(f"baseline_values_filled = {summary['baseline_values_filled']}")
          print(f"baseline_values_extracted = {summary['baseline_values_extracted']}")
          print(f"row_meaning_confirmed = {summary['row_meaning_confirmed']}")
          print(f"covariance_handled = {summary['covariance_handled']}")
          print(f"p_value_computed = {summary['p_value_computed']}")
          print(f"likelihood_computed = {summary['likelihood_computed']}")
          print(f"support_allowed = {summary['support_allowed']}")
          print(f"evidence_allowed = {summary['evidence_allowed']}")
          print(f"validation_allowed = {summary['validation_allowed']}")
          print(f"combined_matrix_allowed = {summary['combined_matrix_allowed']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.288 SDSS RSD baseline reference locator output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-288-sdss-rsd-baseline-reference-locator-output
          path: |
            tairid_v4_288_sdss_rsd_baseline_reference_locator_output/
            tairid-v4-288-sdss-rsd-baseline-reference-locator-output.zip
