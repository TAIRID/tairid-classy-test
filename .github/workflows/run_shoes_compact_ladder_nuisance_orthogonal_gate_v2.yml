name: Run TAIRID SH0ES compact ladder nuisance orthogonal gate v2

on:
  workflow_dispatch:

jobs:
  run-shoes-compact-ladder-nuisance-orthogonal-gate-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy astropy matplotlib pandas

      - name: Run SH0ES compact ladder nuisance orthogonal gate v2
        run: |
          python run_shoes_compact_ladder_nuisance_orthogonal_gate_v2.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-compact-ladder-nuisance-orthogonal-gate-v2-output
          path: |
            shoes_compact_ladder_nuisance_orthogonal_gate_v2_outputs/**
