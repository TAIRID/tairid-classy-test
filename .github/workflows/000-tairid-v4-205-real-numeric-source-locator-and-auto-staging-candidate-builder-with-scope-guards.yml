name: 000 TAIRID v4.205 - Real Numeric Source Locator And Auto Staging Candidate Builder With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-205-real-numeric-source-locator-and-auto-staging-candidate-builder-with-scope-guards.yml"
      - "data/**"
      - "outputs/**"
      - "papers/**"
      - "results/**"
      - "artifacts/**"

permissions:
  contents: read

jobs:
  v4-205-real-numeric-source-locator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.205 real numeric source locator and auto-staging candidate builder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_205_outputs
          cat > tairid_v4_205_outputs/run_v4_205.py <<'PY'
          import csv
          import json
          import re
          from pathlib import Path

          OUT = Path("tairid_v4_205_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "real_numeric_source_locator_and_auto_staging_candidate_builder_passed_source_inventory_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no cosmology validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved between domains",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "source locator results are not validation",
              "auto-staged candidates are not validated inputs until reviewed",
              "templates/manual rows are not empirical subject data",
              "TAIRID not proved"
          ]

          V4_204_STATUS = {
              "version": "v4.204",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "files_checked": 4,
              "ready_count": 0,
              "missing_count": 4,
              "placeholder_or_manual_file_count": 0,
              "incomplete_file_count": 0,
              "row_issue_count": 0,
              "package_status": "real_numeric_input_staging_validator_written_no_validation",
              "selected_next_route": "fill_missing_or_placeholder_numeric_inputs_with_scope_guards"
          }

          GAP_SPECS = [
              {
                  "gap_id": "G1",
                  "target": "dyslexia_aphantasia_subject_axis_input",
                  "canonical_path": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "lane_keywords": ["dyslexia", "dyslexic", "etdd70", "aphantasia", "vviq", "imagery", "drawing"],
                  "axis_keywords": ["s_a", "lambda", "rho", "v_data", "viability", "burden", "imagery", "reconstruction", "accuracy"],
                  "required_output_columns": ["lane", "subject_id", "group_or_condition", "boundary_or_task", "propagation_reach_value", "pacing_access_value", "consolidation_growth_value", "viability_or_outcome_value", "source_or_dataset", "notes"]
              },
              {
                  "gap_id": "G2",
                  "target": "adhd_autism_schizotypy_numeric_delta_input",
                  "canonical_path": "data/neurotype/adhd_autism_schizotypy_numeric_delta_input.csv",
                  "lane_keywords": ["adhd", "autism", "asd", "schizotyp", "schizotypy", "ds003500", "eye", "tracking", "lure", "anchor"],
                  "axis_keywords": ["width", "depth", "gate", "viability", "dispersion", "search", "boundary", "compaction", "lure", "anchor", "target"],
                  "required_output_columns": ["lane", "case_id", "group_or_condition", "boundary_or_task", "propagation_reach_value", "reference_propagation_reach_value", "pacing_access_value", "reference_pacing_access_value", "consolidation_growth_value", "reference_consolidation_growth_value", "source_or_dataset", "notes"]
              },
              {
                  "gap_id": "G3",
                  "target": "bipolar_phase_numeric_surface_input",
                  "canonical_path": "data/neurotype/bipolar_phase_numeric_surface_input.csv",
                  "lane_keywords": ["bipolar", "mania", "hypomania", "depression", "euthymia", "mixed", "phase"],
                  "axis_keywords": ["beta_swing", "s_a_swing", "v_swing", "compression", "sleep", "activity", "rhythm", "phase", "viability"],
                  "required_output_columns": ["phase_label", "subject_id", "group_or_condition", "boundary_or_task", "propagation_value", "reference_propagation_value", "pacing_value", "reference_pacing_value", "consolidation_value", "reference_consolidation_value", "viability_value", "reference_viability_value", "source_or_dataset", "notes"]
              },
              {
                  "gap_id": "G4",
                  "target": "holdout_surface_test_design_input",
                  "canonical_path": "data/neurotype/holdout_surface_test_design_input.csv",
                  "lane_keywords": ["holdout", "compact", "depth", "disorganized", "negative", "mixed", "transition", "underreach"],
                  "axis_keywords": ["surface", "task", "candidate", "dataset", "propagation", "pacing", "consolidation", "viability"],
                  "required_output_columns": ["holdout_id", "target_surface", "reason_held_out", "propagation_candidate", "pacing_candidate", "consolidation_candidate", "viability_candidate", "needed_dataset_or_task", "source_or_dataset", "notes"]
              }
          ]

          SCAN_ROOTS = [Path("data"), Path("outputs"), Path("papers"), Path("results"), Path("artifacts")]
          ALLOWED_SUFFIXES = {".csv", ".tsv", ".txt", ".md", ".json", ".jsonl"}

          PLACEHOLDER_PATTERNS = [
              "replace_with", "numeric value", "to be filled", "placeholder",
              "manual_relative", "manual_phase", "manual_group",
              "not_subject_data", "not empirical", "candidate_data"
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def safe_float(x):
              try:
                  if x is None or str(x).strip() == "":
                      return None
                  return float(str(x).strip())
              except Exception:
                  return None

          def is_placeholder_blob(blob):
              low = blob.lower()
              return any(p.lower() in low for p in PLACEHOLDER_PATTERNS)

          def flatten_json(obj, prefix=""):
              rows = []
              if isinstance(obj, dict):
                  flat = {}
                  def rec(o, p=""):
                      if isinstance(o, dict):
                          for k, v in o.items():
                              rec(v, p + str(k) + ".")
                      elif isinstance(o, list):
                          # Do not explode large lists deeply. Put scalar-ish list as text.
                          if all(not isinstance(x, (dict, list)) for x in o):
                              flat[p[:-1]] = ";".join(str(x) for x in o[:20])
                          else:
                              flat[p[:-1]] = "[nested_list]"
                      else:
                          flat[p[:-1]] = o
                  rec(obj)
                  rows.append(flat)
              elif isinstance(obj, list):
                  for item in obj:
                      if isinstance(item, dict):
                          rows.extend(flatten_json(item))
              return rows

          def read_table_candidate(path):
              suffix = path.suffix.lower()
              try:
                  if suffix == ".csv":
                      with open(path, newline="", encoding="utf-8", errors="replace") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          return rows, reader.fieldnames or [], "csv"
                  if suffix == ".tsv":
                      with open(path, newline="", encoding="utf-8", errors="replace") as f:
                          reader = csv.DictReader(f, delimiter="\t")
                          rows = list(reader)
                          return rows, reader.fieldnames or [], "tsv"
                  if suffix in [".json", ".jsonl"]:
                      text = path.read_text(encoding="utf-8", errors="replace")
                      if suffix == ".jsonl":
                          rows = []
                          for line in text.splitlines():
                              line = line.strip()
                              if line:
                                  try:
                                      rows.extend(flatten_json(json.loads(line)))
                                  except Exception:
                                      pass
                          cols = sorted(set().union(*[set(r.keys()) for r in rows])) if rows else []
                          return rows, cols, "jsonl_flat"
                      obj = json.loads(text)
                      rows = flatten_json(obj)
                      cols = sorted(set().union(*[set(r.keys()) for r in rows])) if rows else []
                      return rows, cols, "json_flat"
                  # for text/markdown, not row-level table; use content scan only
                  text = path.read_text(encoding="utf-8", errors="replace")
                  return [{"text": text[:20000]}], ["text"], "text_scan"
              except Exception as exc:
                  return [], [], "read_error:" + type(exc).__name__

          def candidate_files():
              found = []
              for root in SCAN_ROOTS:
                  if not root.exists():
                      continue
                  for path in root.rglob("*"):
                      if path.is_file() and path.suffix.lower() in ALLOWED_SUFFIXES:
                          if ".git" in path.parts or "tairid_v4_" in str(path):
                              continue
                          found.append(path)
              return found

          def score_for_gap(path, rows, cols, read_kind, spec):
              name_blob = str(path).lower()
              col_blob = " ".join(cols).lower()
              sample_blobs = []
              for row in rows[:25]:
                  sample_blobs.append(" ".join(str(v) for v in row.values()))
              sample_blob = " ".join(sample_blobs).lower()
              blob = " ".join([name_blob, col_blob, sample_blob])

              lane_hits = [k for k in spec["lane_keywords"] if k.lower() in blob]
              axis_hits = [k for k in spec["axis_keywords"] if k.lower() in blob]
              numeric_cells = 0
              total_cells = 0
              for row in rows[:200]:
                  for v in row.values():
                      total_cells += 1
                      if safe_float(v) is not None:
                          numeric_cells += 1
              placeholder = is_placeholder_blob(blob)
              score = len(lane_hits) * 3 + len(axis_hits) * 2 + min(numeric_cells, 20) * 0.2
              if placeholder:
                  score -= 10
              if read_kind.startswith("read_error"):
                  score -= 100
              return {
                  "lane_hits": ";".join(lane_hits),
                  "axis_hits": ";".join(axis_hits),
                  "numeric_cells_sampled": numeric_cells,
                  "total_cells_sampled": total_cells,
                  "placeholder_or_manual_marker": placeholder,
                  "score": round(score, 3)
              }

          files = candidate_files()
          inventory_rows = []
          candidate_match_rows = []
          best_by_gap = {spec["gap_id"]: [] for spec in GAP_SPECS}

          for path in files:
              rows, cols, kind = read_table_candidate(path)
              has_numeric = False
              numeric_count = 0
              for row in rows[:200]:
                  for v in row.values():
                      if safe_float(v) is not None:
                          has_numeric = True
                          numeric_count += 1
              inventory_rows.append({
                  "file_path": str(path),
                  "suffix": path.suffix.lower(),
                  "read_kind": kind,
                  "row_count": len(rows),
                  "column_count": len(cols),
                  "numeric_cells_sampled": numeric_count,
                  "has_numeric_sample": has_numeric,
                  "columns_preview": ";".join(cols[:25])
              })
              for spec in GAP_SPECS:
                  score = score_for_gap(path, rows, cols, kind, spec)
                  if score["score"] > 0:
                      match = {
                          "gap_id": spec["gap_id"],
                          "target": spec["target"],
                          "candidate_file": str(path),
                          "read_kind": kind,
                          "row_count": len(rows),
                          "column_count": len(cols),
                          "lane_hits": score["lane_hits"],
                          "axis_hits": score["axis_hits"],
                          "numeric_cells_sampled": score["numeric_cells_sampled"],
                          "placeholder_or_manual_marker": score["placeholder_or_manual_marker"],
                          "candidate_score_not_validation": score["score"],
                          "claim_boundary": "source-locator candidate only; requires human review before staging"
                      }
                      candidate_match_rows.append(match)
                      best_by_gap[spec["gap_id"]].append(match)

          for gap_id in best_by_gap:
              best_by_gap[gap_id] = sorted(best_by_gap[gap_id], key=lambda r: r["candidate_score_not_validation"], reverse=True)[:10]

          # Auto-stage only when a candidate is clearly a non-placeholder CSV/TSV with enough numeric cells.
          auto_stage_manifest = []
          for spec in GAP_SPECS:
              best = best_by_gap[spec["gap_id"]]
              eligible = [
                  r for r in best
                  if r["read_kind"] in ["csv", "tsv"]
                  and not r["placeholder_or_manual_marker"]
                  and r["numeric_cells_sampled"] >= 6
              ]
              if eligible:
                  chosen = eligible[0]
                  status = "candidate_source_found_needs_mapping_review"
                  action = "review candidate file and map columns into " + spec["canonical_path"]
              else:
                  chosen = best[0] if best else None
                  status = "no_auto_stage_candidate"
                  action = "upload or create real numeric table at " + spec["canonical_path"]
              auto_stage_manifest.append({
                  "gap_id": spec["gap_id"],
                  "target": spec["target"],
                  "canonical_path": spec["canonical_path"],
                  "status": status,
                  "best_candidate_file": chosen["candidate_file"] if chosen else "",
                  "best_candidate_score_not_validation": chosen["candidate_score_not_validation"] if chosen else "",
                  "next_action": action
              })

          # Write exact target template headers so the user can create files in GitHub.
          for spec in GAP_SPECS:
              template_name = "template_" + Path(spec["canonical_path"]).name
              write_csv(
                  OUT / template_name,
                  [{col: "" for col in spec["required_output_columns"]}],
                  spec["required_output_columns"]
              )

          write_csv(OUT / "v4_205_v4_204_status_review.csv", [V4_204_STATUS], list(V4_204_STATUS.keys()))
          (OUT / "v4_205_v4_204_status_review.json").write_text(json.dumps(V4_204_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_205_repo_numeric_source_inventory.csv", inventory_rows, [
              "file_path", "suffix", "read_kind", "row_count", "column_count",
              "numeric_cells_sampled", "has_numeric_sample", "columns_preview"
          ])
          write_csv(OUT / "v4_205_gap_candidate_source_matches.csv", candidate_match_rows, [
              "gap_id", "target", "candidate_file", "read_kind", "row_count", "column_count",
              "lane_hits", "axis_hits", "numeric_cells_sampled",
              "placeholder_or_manual_marker", "candidate_score_not_validation", "claim_boundary"
          ])
          write_csv(OUT / "v4_205_auto_stage_manifest.csv", auto_stage_manifest, [
              "gap_id", "target", "canonical_path", "status", "best_candidate_file",
              "best_candidate_score_not_validation", "next_action"
          ])

          ready_candidate_count = sum(1 for r in auto_stage_manifest if r["status"] == "candidate_source_found_needs_mapping_review")
          missing_candidate_count = sum(1 for r in auto_stage_manifest if r["status"] == "no_auto_stage_candidate")

          claim_rows = [
              {
                  "claim": "A candidate source match is usable data.",
                  "status": "blocked",
                  "safe_wording": "A candidate source match only says the file may contain relevant numeric material and needs review/mapping.",
                  "forbidden_wording": "The locator found validation data."
              },
              {
                  "claim": "Auto-staging can invent rows.",
                  "status": "blocked",
                  "safe_wording": "The workflow only writes template headers unless a real numeric source file exists and is reviewed later.",
                  "forbidden_wording": "Missing rows can be filled automatically."
              },
              {
                  "claim": "Candidate score ranks truth.",
                  "status": "blocked",
                  "safe_wording": "Candidate score ranks source-locator relevance only.",
                  "forbidden_wording": "Higher candidate score means stronger theory support."
              }
          ]
          write_csv(OUT / "v4_205_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          next_routes = []
          if ready_candidate_count:
              next_routes.append({
                  "priority": 1,
                  "route": "numeric_candidate_column_mapping_review_with_scope_guards",
                  "condition": "one or more candidate numeric source files were found",
                  "next_action": "map candidate file columns to canonical gap input files"
              })
          next_routes.append({
              "priority": 2 if ready_candidate_count else 1,
              "route": "upload_real_numeric_tables_or_fill_templates_with_scope_guards",
              "condition": "no candidate numeric source exists for at least one gap",
              "next_action": "create the canonical CSV files using template outputs and real numeric source values"
          })
          next_routes.append({
              "priority": 3,
              "route": "rerun_v4_204_after_numeric_inputs_are_staged",
              "condition": "after canonical input files are created",
              "next_action": "validate staged files for placeholders and numeric completeness"
          })
          write_csv(OUT / "v4_205_next_routes.csv", next_routes, ["priority", "route", "condition", "next_action"])

          selected_next_route = (
              "numeric_candidate_column_mapping_review_with_scope_guards"
              if ready_candidate_count
              else "upload_real_numeric_tables_or_fill_templates_with_scope_guards"
          )

          route_decision = {
              "version": "v4.205",
              "result_label": RESULT_LABEL,
              "clean_result": "The repository was scanned for numeric source tables that might fill the four real-number gaps. Candidate matches were inventoried, but no validation or automatic claim was made.",
              "files_scanned": len(files),
              "candidate_match_rows": len(candidate_match_rows),
              "ready_candidate_count": ready_candidate_count,
              "missing_candidate_count": missing_candidate_count,
              "target_templates_written": len(GAP_SPECS),
              "selected_next_route": selected_next_route,
              "truth_boundary": "source locator and auto-staging candidate review only; not validation, not unit equivalence, not causal equivalence",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_205_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_205_scope_guards.json").write_text(json.dumps({
              "scope": "real numeric source locator and auto-staging candidate builder",
              "source_matches_are_validation": False,
              "candidate_scores_are_truth_scores": False,
              "auto_staging_invents_rows": False,
              "templates_are_data": False,
              "raw_numbers_moved_between_domains": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_205_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.205 - Real Numeric Source Locator And Auto-Staging Candidate Builder",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.204 showed that all four canonical real numeric input files were missing. v4.205 scans the repo for numeric source tables that might fill those gaps, inventories candidate matches, and writes canonical template headers.",
              "",
              "Files scanned: `" + str(len(files)) + "`",
              "Candidate match rows: `" + str(len(candidate_match_rows)) + "`",
              "Ready candidate count: `" + str(ready_candidate_count) + "`",
              "Missing candidate count: `" + str(missing_candidate_count) + "`",
              "Target templates written: `" + str(len(GAP_SPECS)) + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_205_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_205_v4_204_status_review.csv",
              "v4_205_v4_204_status_review.json",
              "v4_205_repo_numeric_source_inventory.csv",
              "v4_205_gap_candidate_source_matches.csv",
              "v4_205_auto_stage_manifest.csv",
              "v4_205_claim_boundary_matrix.csv",
              "v4_205_next_routes.csv",
              "v4_205_route_decision.json",
              "v4_205_scope_guards.json",
              "v4_205_blocked_claims.json",
              "v4_205_summary.md",
              "template_dyslexia_aphantasia_subject_axis_input.csv",
              "template_adhd_autism_schizotypy_numeric_delta_input.csv",
              "template_bipolar_phase_numeric_surface_input.csv",
              "template_holdout_surface_test_design_input.csv"
          ]

          rules = {
              "version_is_v4_205": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_204_status_reviewed": V4_204_STATUS["rule_pass_count"] == 10,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "four_gap_specs_present": len(GAP_SPECS) == 4,
              "templates_written": all((OUT / ("template_" + Path(spec["canonical_path"]).name)).exists() for spec in GAP_SPECS),
              "inventory_written": (OUT / "v4_205_repo_numeric_source_inventory.csv").exists(),
              "manifest_written": (OUT / "v4_205_auto_stage_manifest.csv").exists(),
              "selected_route_present": bool(selected_next_route),
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.205",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "files_scanned": len(files),
              "candidate_match_rows": len(candidate_match_rows),
              "ready_candidate_count": ready_candidate_count,
              "missing_candidate_count": missing_candidate_count,
              "target_templates_written": len(GAP_SPECS),
              "package_status": "real_numeric_source_locator_written_no_validation",
              "selected_next_route": selected_next_route,
              "claim_boundary": "source_locator_and_candidate_staging_only_no_validation"
          }

          (OUT / "v4_205_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.205 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_205_outputs/run_v4_205.py

      - name: Upload v4.205 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-205-real-numeric-source-locator-and-auto-staging-candidate-builder-output
          path: tairid_v4_205_outputs/
