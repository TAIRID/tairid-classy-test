          md.append(f"- Model pressure rows: `{len(audit['model_pressure_rows'])}`")
          md.append(f"- Eligible model surfaces: `{audit['eligible_surfaces']}`")
          md.append(f"- Cross-surface model test allowed: `{audit['model_eligible_two_surface_test_allowed']}`")
          md.append(f"- Old BIC rerun allowed: `{audit['old_bic_rerun_allowed']}`")
