          md.append("")
          if insufficient_two_surface_model_anchors:
              md.append("The audit passed, but it correctly blocks a new one-vs-two-surface model comparison because only the consolidation/growth surface currently has model-anchor-eligible rows.")
              md.append("")
              md.append("That is not a negative result. It means the boundary system is working: Pantheon, DESI, Planck, and HSC remain diagnostic/reference rows until they pass a stronger anchor-upgrade test.")
          else:
