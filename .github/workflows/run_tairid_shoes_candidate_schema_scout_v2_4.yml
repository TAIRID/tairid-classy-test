name: Run TAIRID SH0ES Candidate Schema Scout v2.4

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-candidate-schema-scout-v2-4:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_candidate_schema_scout_v2_4.py
          echo "v2.4 SH0ES candidate schema scout found."

      - name: Run TAIRID SH0ES Candidate Schema Scout v2.4
        run: |
          python run_tairid_shoes_candidate_schema_scout_v2_4.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-candidate-schema-scout-v2-4-output
          path: |
            tairid_shoes_candidate_schema_scout_v2_4_outputs/**
