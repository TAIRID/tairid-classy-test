                      interpretation_label = "strong_positive_time_delay_pressure_reference_sensitivity_required"
                      recommended_handling = "separate_time_delay_subsurface_and_run_reference_semantics_audit"
                  else:
                      interpretation_label = "positive_time_delay_pressure"
                      recommended_handling = "separate_time_delay_subsurface"
              else:
                  interpretation_label = "unclassified_reach_family"
                  recommended_handling = "manual_review"

              return {
                  "standardized_reach_family": family,
                  "row_count": row_count,
                  "finite_pressure_count": len(finite),
                  "source_count": len(set(r["source"] for r in rows)),
                  "source_list": ";".join(sorted(set(r["source"] for r in rows))),
