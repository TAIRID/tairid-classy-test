name: TAIRID Cosmology v3.30 Independent Reach Eligibility Audit

on:
  workflow_dispatch:

jobs:
  independent-reach-eligibility-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scientific Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run TAIRID v3.30 independent reach eligibility audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_30

          python - <<'PY'
          import csv
          import io
          import json
          import math
          import re
          import shutil
          import tarfile
          import urllib.request
          import zipfile
          from datetime import datetime, timezone
          from pathlib import Path

          import numpy as np

          OUTDIR = Path("artifacts/tairid_cosmology_v3_30")
          DOWNLOADS = OUTDIR / "downloads"
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOADS.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_30_independent_reach_eligibility_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a cosmological model.",
              "This does not run a two-surface refit.",
              "This audits standardized independent non-DESI reach families for later pressure-mapping eligibility.",
              "Eligibility for pressure mapping is not model-anchor promotion.",
              "All reach rows remain diagnostic-only in this workflow.",
              "KiDS growth rows are loaded only to confirm the existing consolidation/growth lane remains ready.",
              "No row may be promoted to model-anchor status in this workflow.",
              "A pass only means v3.31 may map independent reach rows into comparable pressure coordinates."
          ]

          PLANCK_ZIP_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
          PLANCK_MARGESTATS_PATH = "base/plikHM_TTTEEE_lowl_lowE/dist/base_plikHM_TTTEEE_lowl_lowE.margestats"

          KIDS_TARBALL_URL = "https://kids.strw.leidenuniv.nl/DR4/data_files/KiDS1000_cosmic_shear_data_release.tgz"
          KIDS_STATS = ["xipm", "bp", "cosebis"]

          EBOSS_PRODUCTS = [
              {
                  "source": "SDSS_eBOSS_DR16",
                  "family": "eBOSS_DR16_LRG",
                  "role": "pre_DESI_BAO_DMDH",
                  "data_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR16_LRG_BAO_DMDH.txt",
                  "cov_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR16_LRG_BAO_DMDH_covtot.txt"
              },
              {
                  "source": "SDSS_eBOSS_DR16",
                  "family": "eBOSS_DR16_QSO",
                  "role": "pre_DESI_BAO_DMDH",
                  "data_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR16_QSO_BAO_DMDH.txt",
                  "cov_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR16_QSO_BAO_DMDH_covtot.txt"
              },
              {
                  "source": "SDSS_eBOSS_DR16",
                  "family": "eBOSS_DR12_LRG",
                  "role": "pre_DESI_BAO_DMDH",
                  "data_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR12_LRG_BAO_DMDH.txt",
                  "cov_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR12_LRG_BAO_DMDH_covtot.txt"
              }
          ]

          BOSS_PRODUCTS = {
              "archive_url": "https://data.sdss.org/sas/dr10/boss/papers/clustering/Anderson_2013_CMASSDR11_LOWZDR11_cosmomc.tar.gz",
              "cmass_cov_url": "http://data.sdss3.org/sas/dr10/boss/papers/clustering/CMASSDR10_sanchez_2013_correlation_function_pre_recon_covariance.dat",
              "lowz_cov_url": "http://data.sdss3.org/sas/dr10/boss/papers/clustering/LOWZDR10_sanchez_2013_correlation_function_pre_recon_covariance.dat"
          }

          TDCOSMO_PRODUCTS = {
              "posterior_table_url": "https://raw.githubusercontent.com/TDCOSMO/hierarchy_analysis_2020_public/master/TDLMC/tdlmc_rung3_posterior_table.csv"
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def safe_name(url):
              name = url.split("?")[0].rstrip("/").split("/")[-1]
              name = re.sub(r"[^A-Za-z0-9._-]+", "_", name)
              return name or "downloaded_product"

          def download(url, path, timeout=300):
              path.parent.mkdir(parents=True, exist_ok=True)
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.30-independent-reach-eligibility-audit/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed: HTTP {status}")
                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)
                  return {
                      "url": url,
                      "path": str(path),
                      "status": status,
                      "size_bytes": path.stat().st_size,
                      "content_type": resp.headers.get("Content-Type"),
                      "content_length_header": resp.headers.get("Content-Length")
                  }

          def load_numeric_matrix(path):
              text = path.read_text(encoding="utf-8", errors="replace")
              lines = [
                  line for line in text.splitlines()
                  if line.strip() and not line.strip().startswith("#")
              ]
              if not lines:
                  raise RuntimeError(f"No numeric lines found in {path}")
              return np.loadtxt(io.StringIO("\n".join(lines)))

          def parse_bao_data_table(path):
              rows = []
              text = path.read_text(encoding="utf-8", errors="replace")
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  parts = stripped.split()
                  if len(parts) < 3:
                      continue
                  try:
                      z = float(parts[0])
                      value = float(parts[1])
                  except Exception:
                      continue
                  rows.append({
                      "z": z,
                      "value": value,
                      "observable": parts[2]
                  })
              return rows

          def parse_float_or_none(value):
              if value is None:
                  return None
              text = str(value).strip()
              if text in ["", "-", "--", "nan", "NaN", "NAN", "None", "null"]:
                  return None
              try:
                  x = float(text)
              except Exception:
                  return None
              if not math.isfinite(x):
                  return None
              return x

          def classify_bao_observable(observable):
              lower = observable.lower()
              if "dm" in lower:
                  return {
                      "standardized_reach_family": "bao_transverse_reach",
                      "standardized_observable": "DM_over_rd",
                      "reach_axis": "transverse_comoving_reach"
                  }
              if "dh" in lower:
                  return {
                      "standardized_reach_family": "bao_radial_reach",
                      "standardized_observable": "DH_over_rd",
                      "reach_axis": "radial_hubble_reach"
                  }
              return {
                  "standardized_reach_family": "bao_unclassified_reach",
                  "standardized_observable": observable,
                  "reach_axis": "bao_unclassified"
              }

          def standard_row(
              source,
              family,
              source_role,
              standardized_reach_family,
              reach_axis,
              standardized_observable,
              value,
              sigma,
              z_effective,
              z_lens="",
              z_source="",
              covariance_available=False,
              posterior_table_available=False,
              source_native_parameter="",
              boundary_note=""
          ):
              value = float(value)
              sigma = float(sigma)
              fractional_sigma = sigma / abs(value) if value != 0 else None
              precision_weight = 1.0 / (fractional_sigma ** 2) if fractional_sigma and fractional_sigma > 0 else None

              return {
                  "source": source,
                  "surface": "reach_geometry",
                  "family": family,
                  "source_role": source_role,
                  "standardized_reach_family": standardized_reach_family,
                  "reach_axis": reach_axis,
                  "standardized_observable": standardized_observable,
                  "source_native_parameter": source_native_parameter,
                  "z_effective": z_effective,
                  "z_lens": z_lens,
                  "z_source": z_source,
                  "value": value,
                  "sigma": sigma,
                  "fractional_sigma": fractional_sigma if fractional_sigma is not None else "",
                  "precision_weight_from_fractional_sigma": precision_weight if precision_weight is not None else "",
                  "covariance_available": covariance_available,
                  "posterior_table_available": posterior_table_available,
                  "standardization_pass": value > 0 and sigma > 0,
                  "candidate_reach_pressure_mapping_eligible": False,
                  "eligibility_tier": "not_audited",
                  "included_in_model": False,
                  "model_anchor_allowed_now": False,
                  "diagnostic_only": True,
                  "boundary_note": boundary_note
              }

          def ingest_eboss():
              eboss_dir = DOWNLOADS / "SDSS_eBOSS_DR16"
              eboss_dir.mkdir(parents=True, exist_ok=True)
              rows = []
              downloads = []

              for product in EBOSS_PRODUCTS:
                  data_path = eboss_dir / safe_name(product["data_url"])
                  cov_path = eboss_dir / safe_name(product["cov_url"])
                  downloads.append(download(product["data_url"], data_path))
                  downloads.append(download(product["cov_url"], cov_path))

                  data_rows = parse_bao_data_table(data_path)
                  cov = load_numeric_matrix(cov_path)
                  if cov.ndim == 0:
                      cov = cov.reshape((1, 1))
                  elif cov.ndim == 1:
                      cov = cov.reshape((1, -1))

                  covariance_match = cov.ndim == 2 and cov.shape[0] == cov.shape[1] == len(data_rows)
                  if not covariance_match:
                      raise RuntimeError(f"Covariance mismatch for {product['family']}")

                  for i, data_row in enumerate(data_rows):
                      diag = float(cov[i, i])
                      sigma = math.sqrt(diag) if diag >= 0 else None
                      if sigma is None:
                          continue
                      cls = classify_bao_observable(data_row["observable"])
                      rows.append(standard_row(
                          source=product["source"],
                          family=product["family"],
                          source_role=product["role"],
                          standardized_reach_family=cls["standardized_reach_family"],
                          reach_axis=cls["reach_axis"],
                          standardized_observable=cls["standardized_observable"],
                          source_native_parameter=data_row["observable"],
                          value=data_row["value"],
                          sigma=sigma,
                          z_effective=data_row["z"],
                          covariance_available=True,
                          posterior_table_available=False,
                          boundary_note="eBOSS BAO reach/ruler diagnostic. Eligible only for later pressure mapping, not model anchoring."
                      ))

              return rows, downloads

          def parse_archive_bao_member(tf, member_name):
              member = next((m for m in tf.getmembers() if m.name.endswith(member_name)), None)
              if member is None:
                  raise RuntimeError(f"Archive member not found: {member_name}")
              f = tf.extractfile(member)
              if f is None:
                  raise RuntimeError(f"Could not extract member: {member_name}")
              text = f.read().decode("utf-8", errors="replace")
              rows = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  nums = []
                  for p in stripped.split():
                      try:
                          nums.append(float(p))
                      except Exception:
                          pass
                  if len(nums) >= 3:
                      rows.append({
                          "z": nums[0],
                          "value": nums[1],
                          "sigma": nums[2],
                          "raw_line": stripped
                      })
              return rows

          def ingest_boss():
              boss_dir = DOWNLOADS / "BOSS_DR12_BAO"
              boss_dir.mkdir(parents=True, exist_ok=True)
              archive_path = boss_dir / safe_name(BOSS_PRODUCTS["archive_url"])
              cmass_cov_path = boss_dir / safe_name(BOSS_PRODUCTS["cmass_cov_url"])
              lowz_cov_path = boss_dir / safe_name(BOSS_PRODUCTS["lowz_cov_url"])

              downloads = [
                  download(BOSS_PRODUCTS["archive_url"], archive_path),
                  download(BOSS_PRODUCTS["cmass_cov_url"], cmass_cov_path),
                  download(BOSS_PRODUCTS["lowz_cov_url"], lowz_cov_path)
              ]

              with tarfile.open(archive_path, "r:*") as tf:
                  cmass_rows = parse_archive_bao_member(tf, "data/sdss_DR11CMASS_bao.txt")
                  lowz_rows = parse_archive_bao_member(tf, "data/sdss_DR11LOWZ_bao.txt")

              cmass_cov = load_numeric_matrix(cmass_cov_path)
              lowz_cov = load_numeric_matrix(lowz_cov_path)

              rows = []
              for family, native_rows, cov in [
                  ("BOSS_DR11_CMASS_archive_BAO", cmass_rows, cmass_cov),
                  ("BOSS_DR11_LOWZ_archive_BAO", lowz_rows, lowz_cov)
              ]:
                  cov_shape_ok = cov.ndim == 2 and cov.shape[0] == cov.shape[1]
                  for native in native_rows:
                      rows.append(standard_row(
                          source="BOSS_DR12_BAO",
                          family=family,
                          source_role="pre_DESI_BOSS_archive_BAO",
                          standardized_reach_family="bao_archive_isotropic_reach",
                          reach_axis="isotropic_or_archive_bao_reach",
                          standardized_observable="BAO_archive_native_scalar",
                          source_native_parameter="BAO_archive_observable",
                          value=native["value"],
                          sigma=native["sigma"],
                          z_effective=native["z"],
                          covariance_available=cov_shape_ok,
                          posterior_table_available=False,
                          boundary_note="Older BOSS archive BAO scalar. Supporting reach diagnostic only."
                      ))

              return rows, downloads

          def ingest_tdcosmo():
              td_dir = DOWNLOADS / "TDCOSMO_2020"
              td_dir.mkdir(parents=True, exist_ok=True)
              table_path = td_dir / safe_name(TDCOSMO_PRODUCTS["posterior_table_url"])
              downloads = [download(TDCOSMO_PRODUCTS["posterior_table_url"], table_path)]

              with table_path.open("r", encoding="utf-8", errors="replace", newline="") as f:
                  reader = csv.DictReader(f)
                  table_rows = list(reader)
                  fieldnames = reader.fieldnames or []

              required = ["name", "z_lens", "z_source", "Ddt_mean", "Ddt_sigma", "Dd_mean", "Dd_sigma", "flag"]
              missing = [c for c in required if c not in fieldnames]
              if missing:
                  raise RuntimeError(f"TDCOSMO posterior table missing columns: {missing}")

              rows = []
              skipped = []

              for i, row in enumerate(table_rows):
                  name = row.get("name", f"row_{i}")
                  flag = parse_float_or_none(row.get("flag"))
                  z_lens = parse_float_or_none(row.get("z_lens"))
                  z_source = parse_float_or_none(row.get("z_source"))
                  ddt_mean = parse_float_or_none(row.get("Ddt_mean"))
                  ddt_sigma = parse_float_or_none(row.get("Ddt_sigma"))

                  if flag is not None and flag < 0:
                      skipped.append({
                          "name": name,
                          "row_index": i,
                          "reason": "negative_flag",
                          "flag": row.get("flag")
                      })
                      continue

                  if z_lens is None or z_source is None or ddt_mean is None or ddt_sigma is None or ddt_sigma <= 0:
                      skipped.append({
                          "name": name,
                          "row_index": i,
                          "reason": "missing_or_invalid_Ddt_fields",
                          "flag": row.get("flag")
                      })
                      continue

                  base = standard_row(
                      source="TDCOSMO_2020",
                      family="TDCOSMO_time_delay",
                      source_role="hierarchical_time_delay_posterior_table",
                      standardized_reach_family="time_delay_distance_reach",
                      reach_axis="time_delay_path_reach",
                      standardized_observable="Ddt_time_delay_distance",
                      source_native_parameter="Ddt_mean_Ddt_sigma",
                      value=ddt_mean,
                      sigma=ddt_sigma,
                      z_effective=z_lens,
                      z_lens=z_lens,
                      z_source=z_source,
                      covariance_available=False,
                      posterior_table_available=True,
                      boundary_note="TDCOSMO Ddt time-delay distance diagnostic. Eligible only for later pressure mapping, not model anchoring."
                  )
                  base["lens_name"] = name
                  base["tdcosmo_flag"] = flag if flag is not None else ""
                  rows.append(base)

              return rows, skipped, downloads

          def parse_planck_margestats(text):
              rows = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("Marginalized") or stripped.startswith("parameter"):
                      continue
                  parts = stripped.split()
                  if len(parts) < 12:
                      continue
                  name_raw = parts[0]
                  name = name_raw.rstrip("*")
                  try:
                      rows.append({
                          "parameter_raw": name_raw,
                          "parameter": name,
                          "mean": float(parts[1]),
                          "sddev": float(parts[2]),
                          "lower1": float(parts[3]),
                          "upper1": float(parts[4]),
                          "label": " ".join(parts[12:]) if len(parts) > 12 else ""
                      })
                  except Exception:
                      continue
              return rows

          def load_planck_reference():
              planck_dir = DOWNLOADS / "Planck_2018"
              zip_path = planck_dir / "COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
              dl = download(PLANCK_ZIP_URL, zip_path)
              with zipfile.ZipFile(zip_path, "r") as zf:
                  if PLANCK_MARGESTATS_PATH not in zf.namelist():
                      raise RuntimeError(f"Missing Planck margestats product: {PLANCK_MARGESTATS_PATH}")
                  text = zf.read(PLANCK_MARGESTATS_PATH).decode("utf-8", errors="replace")
              marg = {r["parameter"]: r for r in parse_planck_margestats(text)}
              if "S8" not in marg:
                  raise RuntimeError("Planck S8 reference missing.")
              return {
                  "download": dl,
                  "marginal_rows": marg
              }

          def split_chain_text(text):
              comment_lines = []
              data_lines = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped:
                      continue
                  if stripped.startswith("#"):
                      comment_lines.append(stripped)
                  else:
                      data_lines.append(stripped)
              if not data_lines:
                  raise RuntimeError("No numeric chain rows found.")
              data = np.loadtxt(io.StringIO("\n".join(data_lines)))
              if data.ndim == 1:
                  data = data.reshape((1, -1))
              return comment_lines, data

          def token_is_numeric(token):
              try:
                  float(token)
                  return True
              except Exception:
                  return False

          def detect_chain_header(comment_lines, ncols):
              candidates = []
              for line in comment_lines:
                  candidate = line.lstrip("#").strip()
                  if not candidate:
                      continue
                  tokens = re.split(r"\s+", candidate)
                  if len(tokens) != ncols:
                      continue
                  numeric_count = sum(1 for t in tokens if token_is_numeric(t))
                  parameterish_count = sum(
                      1 for t in tokens
                      if "--" in t or "COSMOLOGICAL" in t.upper() or t in ["weight", "prior", "like", "post"]
                  )
                  if numeric_count == 0 and parameterish_count >= max(3, ncols // 5):
                      candidates.append(tokens)
              if not candidates:
                  return [f"col_{i}" for i in range(ncols)], False
              return candidates[0], True

          def parse_chain_file(path):
              text = path.read_text(encoding="utf-8", errors="replace")
              comment_lines, data = split_chain_text(text)
              header, header_detected = detect_chain_header(comment_lines, data.shape[1])
              return header, data, header_detected

          def weight_array(header, data):
              col = {name: i for i, name in enumerate(header)}
              if "weight" in col:
                  return data[:, col["weight"]], "weight"
              return np.ones(data.shape[0]), None

          def weighted_quantile(values, weights, qs):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)
              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)
              values = values[mask]
              weights = weights[mask]
              if len(values) == 0:
                  return [None for _ in qs]
              if np.sum(weights) <= 0:
                  weights = np.ones_like(values)
              order = np.argsort(values)
              values = values[order]
              weights = weights[order]
              cumulative = np.cumsum(weights)
              cumulative = cumulative / cumulative[-1]
              return [float(np.interp(q, cumulative, values)) for q in qs]

          def summarize_parameter(values, weights):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)
              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)
              values = values[mask]
              weights = weights[mask]
              if len(values) == 0:
                  raise RuntimeError("No finite values available.")
              q16, q50, q84 = weighted_quantile(values, weights, [0.16, 0.50, 0.84])
              sigma = (q84 - q16) / 2.0 if q16 is not None and q84 is not None else None
              mean = float(np.average(values, weights=weights)) if np.sum(weights) > 0 else float(np.mean(values))
              return {
                  "mean": mean,
                  "q16": q16,
                  "q50": q50,
                  "q84": q84,
                  "sigma": sigma
              }

          def load_kids_growth(planck):
              kids_dir = DOWNLOADS / "KiDS_1000"
              kids_dir.mkdir(parents=True, exist_ok=True)
              tar_path = kids_dir / "KiDS1000_cosmic_shear_data_release.tgz"
              dl = download(KIDS_TARBALL_URL, tar_path)

              extract_dir = OUTDIR / "kids_1000_extracted"
              extract_dir.mkdir(parents=True, exist_ok=True)

              with tarfile.open(tar_path, "r:gz") as tf:
                  safe_members = []
                  for member in tf.getmembers():
                      target = (extract_dir / member.name).resolve()
                      if str(target).startswith(str(extract_dir.resolve())):
                          safe_members.append(member)
                  tf.extractall(extract_dir, members=safe_members)

              bases = [
                  p for p in extract_dir.iterdir()
                  if p.is_dir() and "KiDS1000" in p.name and "shear_data_release" in p.name
              ]
              if not bases:
                  raise RuntimeError("Could not find KiDS extracted base directory.")
              base = bases[0]

              planck_s8 = planck["marginal_rows"]["S8"]
              rows = []

              for stat in KIDS_STATS:
                  chain_path = base / "chains_and_config_files" / "main_chains_iterative_covariance" / stat / "chain" / "output_multinest_C.txt"
                  header, data, header_detected = parse_chain_file(chain_path)
                  col = {name: i for i, name in enumerate(header)}
                  if "COSMOLOGICAL_PARAMETERS--S_8" not in col:
                      raise RuntimeError(f"KiDS S8 column missing for {stat}.")
                  weights, weight_col = weight_array(header, data)
                  summary = summarize_parameter(data[:, col["COSMOLOGICAL_PARAMETERS--S_8"]], weights)

                  combined_sigma = math.sqrt(summary["sigma"] ** 2 + float(planck_s8["sddev"]) ** 2)
                  pressure = (summary["q50"] - float(planck_s8["mean"])) / combined_sigma

                  rows.append({
                      "surface": "consolidation_growth",
                      "source": "KiDS_1000",
                      "family": "KiDS_1000",
                      "statistic": stat,
                      "s8_q16": summary["q16"],
                      "s8_q50": summary["q50"],
                      "s8_q84": summary["q84"],
                      "s8_sigma": summary["sigma"],
                      "pressure_vs_planck_z": pressure,
                      "pressure_sign": "negative" if pressure < 0 else "positive" if pressure > 0 else "zero",
                      "diagnostic_only": False,
                      "model_anchor_allowed_now": True,
                      "boundary_note": "Existing prototype growth/consolidation lane; same-survey family members, not independent surveys."
                  })

              return {
                  "download": dl,
                  "rows": rows,
                  "all_negative": all(r["pressure_sign"] == "negative" for r in rows),
                  "mean_pressure_z": float(np.mean([r["pressure_vs_planck_z"] for r in rows]))
              }

          def audit_reach_family_eligibility(rows):
              family_rows = []
              families = sorted(set(r["standardized_reach_family"] for r in rows))

              for family in families:
                  subset = [r for r in rows if r["standardized_reach_family"] == family]
                  frac = [
                      float(r["fractional_sigma"])
                      for r in subset
                      if str(r.get("fractional_sigma", "")) not in ["", "nan"]
                  ]

                  row_count = len(subset)
                  source_count = len(set(r["source"] for r in subset))
                  source_list = sorted(set(r["source"] for r in subset))
                  cov_count = sum(1 for r in subset if r["covariance_available"] is True)
                  posterior_count = sum(1 for r in subset if r["posterior_table_available"] is True)
                  all_diag = all(r["diagnostic_only"] is True for r in subset)
                  all_model_blocked = all(r["model_anchor_allowed_now"] is False for r in subset)
                  mean_frac = float(np.mean(frac)) if frac else None
                  max_frac = float(np.max(frac)) if frac else None

                  primary_ready = (
                      family in ["bao_transverse_reach", "bao_radial_reach", "time_delay_distance_reach"]
                      and row_count >= 4
                      and all_diag
                      and all_model_blocked
                      and mean_frac is not None
                      and mean_frac <= 0.05
                      and (cov_count > 0 or posterior_count > 0)
                  )

                  supporting_ready = (
                      family == "bao_archive_isotropic_reach"
                      and row_count >= 2
                      and all_diag
                      and all_model_blocked
                      and mean_frac is not None
                      and mean_frac <= 0.05
                  )

                  if primary_ready:
                      tier = "primary_pressure_mapping_candidate"
                      eligible = True
                  elif supporting_ready:
                      tier = "supporting_pressure_mapping_candidate"
                      eligible = True
                  else:
                      tier = "not_pressure_mapping_ready"
                      eligible = False

                  for r in subset:
                      r["candidate_reach_pressure_mapping_eligible"] = eligible
                      r["eligibility_tier"] = tier

                  family_rows.append({
                      "standardized_reach_family": family,
                      "row_count": row_count,
                      "source_count": source_count,
                      "source_list": ";".join(source_list),
                      "mean_fractional_sigma": mean_frac if mean_frac is not None else "",
                      "max_fractional_sigma": max_frac if max_frac is not None else "",
                      "covariance_row_count": cov_count,
                      "posterior_table_row_count": posterior_count,
                      "all_diagnostic_only": all_diag,
                      "all_model_anchor_blocked": all_model_blocked,
                      "candidate_reach_pressure_mapping_eligible": eligible,
                      "eligibility_tier": tier,
                      "boundary_note": "Eligibility permits later pressure mapping only. It does not permit model anchoring or refit."
                  })

              return family_rows

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "previous_milestone": {
                  "v3_29_status": "independent_reach_standardization_passed_ready_for_v3_30_eligibility_audit",
                  "v3_29_standardized_rows": 23,
                  "v3_29_standardized_reach_families": [
                      "bao_archive_isotropic_reach",
                      "bao_radial_reach",
                      "bao_transverse_reach",
                      "time_delay_distance_reach"
                  ]
              },
              "truth_boundary": TRUTH_BOUNDARY,
              "source_results": {},
              "gate_result": {}
          }

          print("TAIRID Cosmology v3.30 independent reach eligibility audit")
          print("Truth boundary: eligibility audit only; no refit; no model claim.")
          print()

          failed_gates = []
          reach_rows = []
          skipped_rows = []

          try:
              eboss_rows, eboss_downloads = ingest_eboss()
              reach_rows.extend(eboss_rows)
              inventory["source_results"]["SDSS_eBOSS_DR16"] = {
                  "standardized_row_count": len(eboss_rows),
                  "load_pass": len(eboss_rows) >= 8,
                  "boundary": "eBOSS loaded for reach-family eligibility audit only."
              }
              print(f"eBOSS rows: {len(eboss_rows)}")
          except Exception as e:
              failed_gates.append("eboss_load_failed")
              inventory["source_results"]["SDSS_eBOSS_DR16"] = {"load_pass": False, "error": f"{type(e).__name__}: {e}"}
              print(f"eBOSS failed: {type(e).__name__}: {e}")

          try:
              boss_rows, boss_downloads = ingest_boss()
              reach_rows.extend(boss_rows)
              inventory["source_results"]["BOSS_DR12_BAO"] = {
                  "standardized_row_count": len(boss_rows),
                  "load_pass": len(boss_rows) >= 2,
                  "boundary": "BOSS loaded as supporting older BAO reach diagnostic only."
              }
              print(f"BOSS rows: {len(boss_rows)}")
          except Exception as e:
              failed_gates.append("boss_load_failed")
              inventory["source_results"]["BOSS_DR12_BAO"] = {"load_pass": False, "error": f"{type(e).__name__}: {e}"}
              print(f"BOSS failed: {type(e).__name__}: {e}")

          try:
              td_rows, td_skipped, td_downloads = ingest_tdcosmo()
              reach_rows.extend(td_rows)
              skipped_rows.extend(td_skipped)
              inventory["source_results"]["TDCOSMO_2020"] = {
                  "standardized_row_count": len(td_rows),
                  "skipped_row_count": len(td_skipped),
                  "load_pass": len(td_rows) >= 10,
                  "boundary": "TDCOSMO Ddt loaded as time-delay reach diagnostic only."
              }
              print(f"TDCOSMO rows: {len(td_rows)}")
          except Exception as e:
              failed_gates.append("tdcosmo_load_failed")
              inventory["source_results"]["TDCOSMO_2020"] = {"load_pass": False, "error": f"{type(e).__name__}: {e}"}
              print(f"TDCOSMO failed: {type(e).__name__}: {e}")

          try:
              planck = load_planck_reference()
              kids = load_kids_growth(planck)
              inventory["source_results"]["KiDS_1000"] = {
                  "growth_row_count": len(kids["rows"]),
                  "all_negative": kids["all_negative"],
                  "mean_pressure_z": kids["mean_pressure_z"],
                  "load_pass": len(kids["rows"]) == 3 and kids["all_negative"] is True,
                  "boundary": "KiDS confirms existing consolidation/growth lane readiness."
              }
              print(f"KiDS rows: {len(kids['rows'])}")
          except Exception as e:
              failed_gates.append("kids_growth_load_failed")
              kids = {"rows": [], "all_negative": False, "mean_pressure_z": None}
              inventory["source_results"]["KiDS_1000"] = {"load_pass": False, "error": f"{type(e).__name__}: {e}"}
              print(f"KiDS failed: {type(e).__name__}: {e}")

          family_rows = audit_reach_family_eligibility(reach_rows) if reach_rows else []

          primary_families = [
              r for r in family_rows
              if r["eligibility_tier"] == "primary_pressure_mapping_candidate"
          ]
          supporting_families = [
              r for r in family_rows
              if r["eligibility_tier"] == "supporting_pressure_mapping_candidate"
          ]
          eligible_families = [
              r for r in family_rows
              if r["candidate_reach_pressure_mapping_eligible"] is True
          ]

          model_anchor_violations = [
              r for r in reach_rows
              if r.get("model_anchor_allowed_now") is not False
          ]

          diagnostic_violations = [
              r for r in reach_rows
              if r.get("diagnostic_only") is not True
          ]

          if len(reach_rows) < 20:
              failed_gates.append("reach_row_count_below_v3_29_baseline")

          if len(primary_families) < 3:
              failed_gates.append("fewer_than_three_primary_reach_families_eligible")

          if len(eligible_families) < 4:
              failed_gates.append("fewer_than_four_total_reach_families_eligible")

          if model_anchor_violations:
              failed_gates.append("model_anchor_promotion_violation")

          if diagnostic_violations:
              failed_gates.append("diagnostic_boundary_violation")

          if not kids.get("all_negative"):
              failed_gates.append("kids_growth_lane_not_ready")

          row_csv = OUTDIR / "independent_reach_eligibility_rows_v3_30.csv"
          row_fields = sorted({key for row in reach_rows for key in row.keys()}) if reach_rows else [
              "source", "surface", "family", "standardized_reach_family",
              "value", "sigma", "candidate_reach_pressure_mapping_eligible",
              "eligibility_tier", "model_anchor_allowed_now"
          ]
          with row_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=row_fields)
              writer.writeheader()
              for row in reach_rows:
                  writer.writerow({k: row.get(k, "") for k in row_fields})

          family_csv = OUTDIR / "independent_reach_eligibility_family_summary_v3_30.csv"
          family_fields = [
              "standardized_reach_family", "row_count", "source_count", "source_list",
              "mean_fractional_sigma", "max_fractional_sigma",
              "covariance_row_count", "posterior_table_row_count",
              "all_diagnostic_only", "all_model_anchor_blocked",
              "candidate_reach_pressure_mapping_eligible",
              "eligibility_tier", "boundary_note"
          ]
          with family_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=family_fields)
              writer.writeheader()
              for row in family_rows:
                  writer.writerow({k: row.get(k, "") for k in family_fields})

          kids_csv = OUTDIR / "kids_growth_comparison_rows_v3_30.csv"
          kids_fields = [
              "surface", "source", "family", "statistic",
              "s8_q16", "s8_q50", "s8_q84", "s8_sigma",
              "pressure_vs_planck_z", "pressure_sign",
              "diagnostic_only", "model_anchor_allowed_now", "boundary_note"
          ]
          with kids_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=kids_fields)
              writer.writeheader()
              for row in kids.get("rows", []):
                  writer.writerow({k: row.get(k, "") for k in kids_fields})

          skipped_csv = OUTDIR / "tdcosmo_eligibility_skipped_rows_v3_30.csv"
          skipped_fields = ["name", "row_index", "reason", "flag"]
          with skipped_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=skipped_fields)
              writer.writeheader()
              for row in skipped_rows:
                  writer.writerow({k: row.get(k, "") for k in skipped_fields})

          audit_rows = [
              {
                  "audit_gate": "three_independent_reach_sources_loaded",
                  "pass": all(
                      inventory["source_results"].get(name, {}).get("load_pass") is True
                      for name in ["SDSS_eBOSS_DR16", "BOSS_DR12_BAO", "TDCOSMO_2020"]
                  ),
                  "value": ";".join([
                      name for name in ["SDSS_eBOSS_DR16", "BOSS_DR12_BAO", "TDCOSMO_2020"]
                      if inventory["source_results"].get(name, {}).get("load_pass") is True
                  ]),
                  "boundary": "Independent reach sources must load before eligibility."
              },
              {
                  "audit_gate": "reach_row_count_matches_or_exceeds_v3_29",
                  "pass": len(reach_rows) >= 23,
                  "value": len(reach_rows),
                  "boundary": "v3.29 had 23 standardized reach rows."
              },
              {
                  "audit_gate": "primary_reach_families_ready_for_pressure_mapping",
                  "pass": len(primary_families) >= 3,
                  "value": ";".join([r["standardized_reach_family"] for r in primary_families]),
                  "boundary": "Primary reach families are eligible only for later pressure mapping, not refit."
              },
              {
                  "audit_gate": "supporting_reach_family_present",
                  "pass": len(supporting_families) >= 1,
                  "value": ";".join([r["standardized_reach_family"] for r in supporting_families]),
                  "boundary": "BOSS archive isotropic reach is supporting evidence, not a primary model anchor."
              },
              {
                  "audit_gate": "kids_growth_lane_ready",
                  "pass": len(kids.get("rows", [])) == 3 and kids.get("all_negative") is True,
                  "value": kids.get("mean_pressure_z"),
                  "boundary": "Existing KiDS growth/consolidation lane remains negative."
              },
              {
                  "audit_gate": "no_reach_model_anchor_promotion",
                  "pass": len(model_anchor_violations) == 0,
                  "value": len(model_anchor_violations),
                  "boundary": "Reach eligibility does not promote rows to model anchors."
              },
              {
                  "audit_gate": "all_reach_rows_remain_diagnostic",
                  "pass": len(diagnostic_violations) == 0,
                  "value": len(diagnostic_violations),
                  "boundary": "All reach rows remain diagnostic-only."
              },
              {
                  "audit_gate": "refit_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No refit is allowed in v3.30."
              }
          ]

          audit_csv = OUTDIR / "independent_reach_eligibility_audit_v3_30.csv"
          with audit_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["audit_gate", "pass", "value", "boundary"])
              writer.writeheader()
              for row in audit_rows:
                  writer.writerow(row)

          if not failed_gates:
              readiness_label = "independent_reach_eligibility_passed_ready_for_v3_31_pressure_mapping"
          else:
              readiness_label = "independent_reach_eligibility_needs_followup"

          next_step = (
              "Build v3.31 independent reach pressure-mapping audit: convert eligible BAO and time-delay reach families into comparable residual/pressure coordinates against a declared reference, while preserving diagnostic-only boundaries and no-refit status."
              if not failed_gates
              else "Inspect failed v3.30 eligibility gates before pressure mapping."
          )

          inventory["reach_row_count"] = len(reach_rows)
          inventory["reach_family_count"] = len(family_rows)
          inventory["eligible_reach_family_count"] = len(eligible_families)
          inventory["primary_reach_family_count"] = len(primary_families)
          inventory["supporting_reach_family_count"] = len(supporting_families)
          inventory["eligible_reach_families"] = [r["standardized_reach_family"] for r in eligible_families]
          inventory["primary_reach_families"] = [r["standardized_reach_family"] for r in primary_families]
          inventory["supporting_reach_families"] = [r["standardized_reach_family"] for r in supporting_families]
          inventory["kids_growth_ready"] = len(kids.get("rows", [])) == 3 and kids.get("all_negative") is True
          inventory["kids_growth_mean_pressure_z"] = kids.get("mean_pressure_z")
          inventory["model_anchor_violation_count"] = len(model_anchor_violations)
          inventory["diagnostic_violation_count"] = len(diagnostic_violations)
          inventory["tdcosmo_skipped_row_count"] = len(skipped_rows)
          inventory["output_files"] = {
              "reach_eligibility_rows": str(row_csv),
              "family_summary": str(family_csv),
              "kids_growth_rows": str(kids_csv),
              "tdcosmo_skipped_rows": str(skipped_csv),
              "audit": str(audit_csv)
          }

          inventory["gate_result"] = {
              "failed_gates": failed_gates,
              "readiness_label": readiness_label,
              "reach_row_count": len(reach_rows),
              "eligible_reach_family_count": len(eligible_families),
              "primary_reach_family_count": len(primary_families),
              "supporting_reach_family_count": len(supporting_families),
              "kids_growth_ready": inventory["kids_growth_ready"],
              "model_claim_allowed": False,
              "refit_allowed": False,
              "next_allowed_step": next_step
          }

          json_path = OUTDIR / "tairid_cosmology_v3_30_independent_reach_eligibility_audit.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.30 — Independent Reach Eligibility Audit")
          md.append("")
          md.append(f"Created UTC: `{inventory['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(failed_gates) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v3.30 audits which independent reach families are eligible for later pressure mapping.")
          md.append("")
          md.append("It does not run pressure mapping, does not refit, and does not promote any reach row to model-anchor status.")
          md.append("")
          md.append("## Results")
          md.append("")
          md.append(f"- Reach rows: `{len(reach_rows)}`")
          md.append(f"- Reach families: `{len(family_rows)}`")
          md.append(f"- Eligible reach families: `{len(eligible_families)}`")
          md.append(f"- Primary reach families: `{', '.join(inventory['primary_reach_families']) if inventory['primary_reach_families'] else 'none'}`")
          md.append(f"- Supporting reach families: `{', '.join(inventory['supporting_reach_families']) if inventory['supporting_reach_families'] else 'none'}`")
          md.append(f"- KiDS growth ready: `{inventory['kids_growth_ready']}`")
          md.append(f"- KiDS mean growth pressure: `{inventory['kids_growth_mean_pressure_z']}`")
          md.append(f"- Model-anchor violations: `{len(model_anchor_violations)}`")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          if not failed_gates:
              md.append("The independent reach ledger is now eligible for pressure mapping. That means the next test may translate BAO and time-delay reach families into comparable pressure coordinates, while still blocking refit and validation claims.")
          else:
              md.append("The eligibility audit did not clear all gates. No pressure mapping should run until the failed gates are repaired.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `independent_reach_eligibility_rows_v3_30.csv`")
          md.append("- `independent_reach_eligibility_family_summary_v3_30.csv`")
          md.append("- `kids_growth_comparison_rows_v3_30.csv`")
          md.append("- `tdcosmo_eligibility_skipped_rows_v3_30.csv`")
          md.append("- `independent_reach_eligibility_audit_v3_30.csv`")
          md.append("- `tairid_cosmology_v3_30_independent_reach_eligibility_audit.json`")
          md.append("- `tairid_cosmology_v3_30_independent_reach_eligibility_audit.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_30_independent_reach_eligibility_audit.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.30 independent reach eligibility audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-30-independent-reach-eligibility-audit
          path: artifacts/tairid_cosmology_v3_30/
