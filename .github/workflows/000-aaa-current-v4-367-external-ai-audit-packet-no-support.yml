name: "!!! AAA CURRENT - TAIRID v4.367 external AI audit packet no support"

on:
  workflow_dispatch:

jobs:
  run-v4-367-external-ai-audit-packet-no-support:
    name: "!!! AAA CURRENT - Run v4.367 external AI audit packet"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.366 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.366 output ZIP by pattern..."
          INPUT_366_ZIP="$(ls tairid-v4-366-guarded-chi-square-diagnostic-review-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_366_ZIP" ]; then
            echo "Could not find v4.366 output ZIP."
            echo "Expected:"
            echo "tairid-v4-366-guarded-chi-square-diagnostic-review-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.366 ZIP:"
          echo "$INPUT_366_ZIP"
          echo "INPUT_366_ZIP=$INPUT_366_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.367 external AI audit packet script
        run: |
          cat > run_v4_367_external_ai_audit_packet_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "external audit packet only; guarded diagonal chi-square diagnostic may be audited; no full covariance; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def main():
              input_366 = Path(os.environ["INPUT_366_ZIP"])

              outdir = Path("tairid_v4_367_external_ai_audit_packet_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base366 = extract_zip(input_366, "tairid_v4_367_366_")

              summary366_path = find_one(base366, "v4_366_summary.json")
              review_ledger_path = find_one(base366, "v4_366_guarded_chi_square_diagnostic_review_ledger_NO_SUPPORT.csv")
              audit_staging_path = find_one(base366, "v4_366_external_ai_audit_staging_NO_SUPPORT.csv")
              limits_path = find_one(base366, "v4_366_interpretation_limits_NO_SUPPORT.csv")
              gap366_path = find_one(base366, "v4_366_gap_status_after_diagnostic_review.csv")
              human_review_path = find_one(base366, "v4_366_input_human_filled_chi_square_review_preserved.csv")
              computed_terms_path = find_one(base366, "v4_366_input_v4_365_computed_chi_square_terms_preserved.csv")
              diagnostic_summary_path = find_one(base366, "v4_366_input_v4_365_chi_square_summary_preserved.csv")
              rules366_path = find_one(base366, "v4_366_rule_checks.csv")

              summary366 = json.loads(summary366_path.read_text())
              review_ledger = pd.read_csv(review_ledger_path)
              audit_staging = pd.read_csv(audit_staging_path)
              limits = pd.read_csv(limits_path)
              gap366 = pd.read_csv(gap366_path)
              human_review = pd.read_csv(human_review_path)
              computed_terms = pd.read_csv(computed_terms_path)
              diagnostic_summary = pd.read_csv(diagnostic_summary_path)
              rules366 = pd.read_csv(rules366_path)

              guarded_chi_square_sum = float(summary366["guarded_diagonal_chi_square_sum"])
              dof_candidate = int(summary366["degrees_of_freedom_candidate"])
              chi_square_term_rows = int(summary366["chi_square_term_rows"])

              stage_ledger = pd.DataFrame([
                  {
                      "stage": "v4.324-v4.335",
                      "stage_status": "completed_or_blocked_correctly",
                      "what_happened": "Source candidates, source decisions, extraction worksheets, and external audit scaffolding were built; blank human extraction correctly blocked progress.",
                      "truth_boundary": "No parameter approval, no numeric baseline approval, no observed scoring, no support claims during this block.",
                  },
                  {
                      "stage": "v4.345B",
                      "stage_status": "completed",
                      "what_happened": "Human explicitly approved parameter values omega_m0=0.315, sigma8_0=0.811, growth_index_gamma=0.545455.",
                      "truth_boundary": "Parameter values approved only; no numeric baseline approval, no observed values, no scoring, no support claims.",
                  },
                  {
                      "stage": "v4.346B-v4.347",
                      "stage_status": "completed",
                      "what_happened": "Numeric baseline candidate was built and then explicitly approved.",
                      "truth_boundary": "Numeric baseline approved; observed values still unloaded; no scoring; no support claims.",
                  },
                  {
                      "stage": "v4.348-v4.355",
                      "stage_status": "completed_with_repairs",
                      "what_happened": "Observed-source lane was inventoried, weak/manual source was rejected for direct loading, better direct source CSV was staged, and schema was approved for later loading.",
                      "truth_boundary": "Observed values still not loaded until explicit later approval; no definition/covariance match, no scoring, no support claims.",
                  },
                  {
                      "stage": "v4.356-v4.357",
                      "stage_status": "completed",
                      "what_happened": "Observed values dry-run parsed, then three observed rows were explicitly loaded.",
                      "truth_boundary": "Observed values loaded only; definition/covariance match still blocked; no scoring; no support claims.",
                  },
                  {
                      "stage": "v4.358-v4.359",
                      "stage_status": "completed_guarded",
                      "what_happened": "Definition match was confirmed, and diagonal error model was accepted only as guarded diagnostic scope.",
                      "truth_boundary": "Full covariance unavailable; no likelihood, no p-values, no scoring, no support claims.",
                  },
                  {
                      "stage": "v4.360-v4.361",
                      "stage_status": "completed_guarded",
                      "what_happened": "Guarded scoring-readiness packet was built, then baseline predictions were dry-run computed at the three observed redshift rows.",
                      "truth_boundary": "Predictions only; no residuals until later gate; no chi-square, likelihood, p-values, scoring, or support claims.",
                  },
                  {
                      "stage": "v4.362-v4.363",
                      "stage_status": "completed_guarded",
                      "what_happened": "Residuals and normalized residuals were computed, then reviewed and approved for later guarded chi-square readiness.",
                      "truth_boundary": "Residuals only; no chi-square until later gate; no likelihood, p-values, scoring, or support claims.",
                  },
                  {
                      "stage": "v4.364-v4.366",
                      "stage_status": "completed_guarded",
                      "what_happened": "Guarded chi-square readiness was built, guarded diagonal chi-square was computed, and diagnostic was approved for external audit only.",
                      "truth_boundary": "Guarded diagonal diagnostic only; no full covariance, no likelihood, no p-values, score_valid=false, support_allowed=false.",
                  },
              ])

              ruled_out_and_open = pd.DataFrame([
                  {
                      "item_type": "ruled_out_claim",
                      "item": "TAIRID is supported by SDSS RSD.",
                      "status": "blocked",
                      "reason": "support_allowed=false; no support interpretation gate has been run.",
                  },
                  {
                      "item_type": "ruled_out_claim",
                      "item": "This is a full covariance likelihood.",
                      "status": "blocked",
                      "reason": "full_covariance_available=false; diagonal-only guarded diagnostic.",
                  },
                  {
                      "item_type": "ruled_out_claim",
                      "item": "This computed p-values.",
                      "status": "blocked",
                      "reason": "p_values_computed=false.",
                  },
                  {
                      "item_type": "ruled_out_claim",
                      "item": "This computed likelihood.",
                      "status": "blocked",
                      "reason": "likelihood_computed=false.",
                  },
                  {
                      "item_type": "ruled_out_claim",
                      "item": "This is proof or validation of TAIRID.",
                      "status": "blocked",
                      "reason": "The packet contains a guarded diagnostic only, and score_valid=false.",
                  },
                  {
                      "item_type": "completed_gate",
                      "item": "Parameter values approved.",
                      "status": "closed",
                      "reason": "omega_m0, sigma8_0, and growth_index_gamma were explicitly approved in prior gates.",
                  },
                  {
                      "item_type": "completed_gate",
                      "item": "Numeric baseline approved.",
                      "status": "closed",
                      "reason": "Baseline was explicitly approved before observed data loading.",
                  },
                  {
                      "item_type": "completed_gate",
                      "item": "Observed values loaded.",
                      "status": "closed",
                      "reason": "Three observed rows were explicitly loaded after dry-run parse.",
                  },
                  {
                      "item_type": "completed_gate",
                      "item": "Definition match and guarded diagonal covariance status confirmed.",
                      "status": "closed_guarded",
                      "reason": "Definition match confirmed; covariance accepted only as guarded diagonal diagnostic.",
                  },
                  {
                      "item_type": "completed_gate",
                      "item": "Guarded diagonal chi-square diagnostic computed.",
                      "status": "closed_guarded",
                      "reason": f"guarded_diagonal_chi_square_sum={guarded_chi_square_sum}, dof_candidate={dof_candidate}.",
                  },
                  {
                      "item_type": "open_gap",
                      "item": "Full covariance repair lane.",
                      "status": "open",
                      "reason": "Full covariance remains unavailable.",
                  },
                  {
                      "item_type": "open_gap",
                      "item": "Likelihood/p-value gate.",
                      "status": "open_or_blocked",
                      "reason": "Not allowed from this packet; would require a later gate and better covariance handling.",
                  },
                  {
                      "item_type": "open_gap",
                      "item": "Support interpretation gate.",
                      "status": "blocked",
                      "reason": "No support claim is allowed before further review, and maybe not even then without stronger data/covariance.",
                  },
              ])

              audit_questions = pd.DataFrame([
                  {
                      "audit_question_id": "AI_AUDIT_001",
                      "question": "Did any file make a support claim for TAIRID?",
                      "expected_answer": "No. support_allowed=false throughout the diagnostic review packet.",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_002",
                      "question": "Was full covariance used?",
                      "expected_answer": "No. full_covariance_available=false; covariance scope is guarded diagonal diagnostic only.",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_003",
                      "question": "Were likelihoods or p-values computed?",
                      "expected_answer": "No. likelihood_computed=false and p_values_computed=false.",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_004",
                      "question": "Was a guarded diagonal chi-square diagnostic computed?",
                      "expected_answer": f"Yes. guarded_diagonal_chi_square_sum={guarded_chi_square_sum} with degrees_of_freedom_candidate={dof_candidate}.",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_005",
                      "question": "What is the strongest honest conclusion allowed?",
                      "expected_answer": "A guarded diagonal diagnostic was computed and reviewed for external audit; it appears small for the three rows, but it is not full-covariance evidence and not a support claim.",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_006",
                      "question": "What is the strongest criticism?",
                      "expected_answer": "The diagnostic uses only three rows, diagonal uncertainties, no full covariance, no likelihood, no p-values, and no support interpretation gate.",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_007",
                      "question": "What should happen next?",
                      "expected_answer": "External AI should audit the packet. After audit, decide whether to build a full-covariance repair lane, broader SDSS/eBOSS source lane, or cautious guarded-diagnostic narrative.",
                  },
              ])

              diagnostic_findings = pd.DataFrame([
                  {
                      "finding_id": "V4_367_FINDING_001",
                      "finding": "Guarded diagonal chi-square diagnostic was computed.",
                      "value": guarded_chi_square_sum,
                      "scope": "guarded_diagonal_only",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_367_FINDING_002",
                      "finding": "Degrees of freedom candidate was recorded but no p-value was computed.",
                      "value": dof_candidate,
                      "scope": "candidate_only_no_p_value",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_367_FINDING_003",
                      "finding": "Three chi-square term rows were included.",
                      "value": chi_square_term_rows,
                      "scope": "three_row_diagnostic",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_367_FINDING_004",
                      "finding": "Full covariance is unavailable.",
                      "value": False,
                      "scope": "active_limitation",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_367_FINDING_005",
                      "finding": "No support claim is allowed.",
                      "value": False,
                      "scope": "truth_boundary",
                      "support_allowed": False,
                  },
              ])

              evidence_manifest = pd.DataFrame([
                  {
                      "evidence_file": "v4_366_summary.json",
                      "role": "Top-level status flags and guarded diagnostic value.",
                  },
                  {
                      "evidence_file": "v4_366_guarded_chi_square_diagnostic_review_ledger_NO_SUPPORT.csv",
                      "role": "Human review decision and no-support boundary.",
                  },
                  {
                      "evidence_file": "v4_366_external_ai_audit_staging_NO_SUPPORT.csv",
                      "role": "Audit staging scope.",
                  },
                  {
                      "evidence_file": "v4_366_interpretation_limits_NO_SUPPORT.csv",
                      "role": "Plain-language limits.",
                  },
                  {
                      "evidence_file": "v4_366_input_v4_365_computed_chi_square_terms_preserved.csv",
                      "role": "Guarded diagonal chi-square term rows.",
                  },
                  {
                      "evidence_file": "v4_366_input_v4_365_chi_square_summary_preserved.csv",
                      "role": "Diagnostic summary from v4.365.",
                  },
                  {
                      "evidence_file": "v4_367_stage_ledger_through_guarded_diagnostic.csv",
                      "role": "Condensed history from v4.324 through v4.366.",
                  },
                  {
                      "evidence_file": "v4_367_ruled_out_and_open_gaps.csv",
                      "role": "What is closed, blocked, ruled out, and still open.",
                  },
                  {
                      "evidence_file": "v4_367_external_ai_audit_questions.csv",
                      "role": "Questions for external AI audit.",
                  },
              ])

              hard_checks = {
                  "input_v4_366_summary_found": summary366.get("version") == "v4.366",
                  "input_v4_366_rules_all_passed": summary_rules_all_passed(summary366),
                  "input_v4_366_failed_gates_none": summary366.get("failed_gates") == "none",
                  "input_v4_366_external_audit_ready_true": summary366.get("external_audit_ready") is True,
                  "input_v4_366_diagnostic_review_approved_true": summary366.get("diagnostic_review_approved_for_external_audit") is True,
                  "input_v4_366_no_full_covariance": summary366.get("full_covariance_available") is False,
                  "input_v4_366_no_likelihood": summary366.get("likelihood_computed") is False,
                  "input_v4_366_no_p_values": summary366.get("p_values_computed") is False,
                  "input_v4_366_no_score_valid": summary366.get("score_valid") is False,
                  "input_v4_366_no_support_allowed": summary366.get("support_allowed") is False,

                  "rules366_all_passed": rules366["passed"].astype(bool).all(),
                  "review_ledger_rows_equal_1": len(review_ledger) == 1,
                  "audit_staging_rows_equal_1": len(audit_staging) == 1,
                  "limits_rows_equal_5": len(limits) == 5,
                  "gap366_rows_equal_5": len(gap366) == 5,
                  "human_review_rows_equal_1": len(human_review) == 1,
                  "computed_terms_rows_match_summary": len(computed_terms) == chi_square_term_rows,
                  "diagnostic_summary_rows_equal_6": len(diagnostic_summary) == 6,

                  "stage_ledger_rows_equal_9": len(stage_ledger) == 9,
                  "ruled_out_and_open_rows_at_least_10": len(ruled_out_and_open) >= 10,
                  "audit_questions_rows_equal_7": len(audit_questions) == 7,
                  "diagnostic_findings_rows_equal_5": len(diagnostic_findings) == 5,
                  "evidence_manifest_rows_equal_9": len(evidence_manifest) == 9,

                  "review_ledger_support_false": false_col(review_ledger, "support_allowed"),
                  "audit_staging_support_false": false_col(audit_staging, "support_allowed"),
                  "computed_terms_support_false": false_col(computed_terms, "support_allowed"),
                  "diagnostic_findings_support_false": false_col(diagnostic_findings, "support_allowed"),
                  "review_ledger_score_false": false_col(review_ledger, "score_valid"),
                  "audit_staging_score_false": false_col(audit_staging, "score_valid"),
                  "computed_terms_score_false": false_col(computed_terms, "score_valid"),
                  "audit_staging_external_ready_true": true_col(audit_staging, "external_audit_ready"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary367 = {
                  "version": "v4.367",
                  "route_name": "v4_367_external_ai_audit_packet_through_guarded_diagnostic_no_support_claims",
                  "expected_result": "v4_367_external_ai_audit_packet_passed_no_support_claims",
                  "input_version": "v4.366",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "audit_scope": "through_v4_366_guarded_diagonal_chi_square_diagnostic_review",
                  "guarded_diagonal_chi_square_sum": guarded_chi_square_sum,
                  "degrees_of_freedom_candidate": dof_candidate,
                  "chi_square_term_rows": chi_square_term_rows,
                  "external_audit_packet_ready": True,
                  "full_covariance_available": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "external_ai_audit_then_choose_full_covariance_repair_or_broader_source_lane_or_cautious_diagnostic_writeup",
              }

              readme = f"""# External AI Audit Packet — TAIRID SDSS RSD Through v4.366

          ## Truth boundary

          {CLAIM_BOUNDARY}

          ## What was completed

          The chain advanced from parameter-source scaffolding to approved parameters, approved numeric baseline, observed-value loading, definition/covariance guarded review, baseline prediction dry run, residual dry run, residual review, guarded chi-square readiness, guarded diagonal chi-square dry run, and diagnostic review.

          ## Guarded diagnostic result

          guarded_diagonal_chi_square_sum = {guarded_chi_square_sum}

          degrees_of_freedom_candidate = {dof_candidate}

          chi_square_term_rows = {chi_square_term_rows}

          ## What this does not mean

          This is not full covariance. It is not likelihood. It is not p-values. It is not proof. It is not validation. It is not a support claim.

          ## Strongest allowed conclusion

          A guarded diagonal diagnostic was computed and reviewed for external audit. The diagnostic appears small for the three included rows, but it remains limited by diagonal-only treatment, small row count, no full covariance, no likelihood, no p-values, and no support interpretation gate.

          ## Strongest criticism

          The packet remains a guarded diagnostic, not a full observational test. It uses only three rows, lacks full covariance, does not compute likelihood or p-values, and does not allow support claims.

          ## What an external AI should check

          Review the summary, stage ledger, diagnostic terms, limits, ruled-out claims, and open gaps. Confirm whether the packet preserves the truth boundary and whether the next move should be full covariance repair, broader observed-source ingestion, or a cautious diagnostic-only writeup.
          """

              stage_ledger.to_csv(outdir / "v4_367_stage_ledger_through_guarded_diagnostic.csv", index=False)
              ruled_out_and_open.to_csv(outdir / "v4_367_ruled_out_and_open_gaps.csv", index=False)
              audit_questions.to_csv(outdir / "v4_367_external_ai_audit_questions.csv", index=False)
              diagnostic_findings.to_csv(outdir / "v4_367_guarded_diagnostic_findings_NO_SUPPORT.csv", index=False)
              evidence_manifest.to_csv(outdir / "v4_367_evidence_manifest.csv", index=False)
              review_ledger.to_csv(outdir / "v4_367_input_v4_366_review_ledger_preserved.csv", index=False)
              audit_staging.to_csv(outdir / "v4_367_input_v4_366_audit_staging_preserved.csv", index=False)
              limits.to_csv(outdir / "v4_367_input_v4_366_interpretation_limits_preserved.csv", index=False)
              computed_terms.to_csv(outdir / "v4_367_input_v4_366_computed_terms_preserved.csv", index=False)
              diagnostic_summary.to_csv(outdir / "v4_367_input_v4_366_diagnostic_summary_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_367_rule_checks.csv", index=False)

              (outdir / "EXTERNAL_AI_AUDIT_README_v4_367.md").write_text(readme)
              (outdir / "v4_367_summary.json").write_text(json.dumps(summary367, indent=2))

              summary_md = f"""# TAIRID v4.367 External AI Audit Packet — No Support Claims

          Expected result: `{summary367["expected_result"]}`

          {summary367["rules_passed"]} / {summary367["rules_total"]} rules passed

          failed_gates = {summary367["failed_gates"]}

          audit_scope = `{summary367["audit_scope"]}`

          guarded_diagonal_chi_square_sum = {summary367["guarded_diagonal_chi_square_sum"]}

          degrees_of_freedom_candidate = {summary367["degrees_of_freedom_candidate"]}

          external_audit_packet_ready = true

          full_covariance_available = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step packages the guarded diagnostic for external AI audit.

          It does **not** compute anything new.

          It does **not** make support claims.

          Next route: `{summary367["selected_next_route"]}`
          """
              (outdir / "v4_367_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary367, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_367_external_ai_audit_packet_no_support.py

      - name: Run v4.367 external AI audit packet no support
        run: |
          python run_v4_367_external_ai_audit_packet_no_support.py

      - name: Upload v4.367 external AI audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-367-external-ai-audit-packet-no-support-output
          path: |
            tairid_v4_367_external_ai_audit_packet_no_support_output/
            tairid_v4_367_external_ai_audit_packet_no_support_output.zip
