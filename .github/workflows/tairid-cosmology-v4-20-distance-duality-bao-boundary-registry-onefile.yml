name: TAIRID Cosmology v4.20 Distance Duality BAO Boundary Registry Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-20-distance-duality-bao-boundary-registry-onefile.yml"

jobs:
  distance-duality-bao-boundary-registry-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.20 distance duality BAO boundary registry onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_20_distance_duality_bao_boundary_registry_onefile

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_20_distance_duality_bao_boundary_registry_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_20_distance_duality_bao_boundary_registry_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine CMB, supernovae, BAO, KiDS, DES, HSC, or H0LiCOW into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run CMB, BAO, supernova, DES, HSC, KiDS, or H0LiCOW likelihoods.",
              "This inventories distance-duality and BAO boundary guards before any TAIRID reach reinterpretation.",
              "A pass means the distance and ruler boundary roles are preserved, not that TAIRID cosmology is validated."
          ]

          SOURCE_ROOTS = [
              {
                  "source_id": "etherington_distance_duality_review",
                  "role_focus": "distance_duality",
                  "source_url": "https://arxiv.org/abs/2112.05701",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "distance duality / Etherington relation as a propagation consistency guard",
                  "preservation_role": "distance_duality_guard"
              },
              {
                  "source_id": "etherington_original_relation_context",
                  "role_focus": "distance_duality",
                  "source_url": "https://arxiv.org/abs/astro-ph/0701093",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "luminosity distance and angular diameter distance relation as observational boundary",
                  "preservation_role": "distance_relation_guard"
              },
              {
                  "source_id": "eisenstein_2005_bao_detection",
                  "role_focus": "bao_boundary",
                  "source_url": "https://arxiv.org/abs/astro-ph/0501171",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "BAO standard ruler detection in galaxy clustering",
                  "preservation_role": "bao_ruler_guard"
              },
              {
                  "source_id": "boss_dr12_bao_consensus",
                  "role_focus": "bao_boundary",
                  "source_url": "https://arxiv.org/abs/1607.03155",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "BOSS DR12 BAO distance constraints and acoustic ruler boundary",
                  "preservation_role": "bao_ruler_guard"
              },
              {
                  "source_id": "eboss_dr16_cosmology_bao",
                  "role_focus": "bao_boundary",
                  "source_url": "https://arxiv.org/abs/2007.08991",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "eBOSS DR16 cosmology and BAO distance/ruler constraints",
                  "preservation_role": "bao_ruler_guard"
              },
              {
                  "source_id": "aubourg_2015_bao_cosmic_distance",
                  "role_focus": "bao_boundary",
                  "source_url": "https://arxiv.org/abs/1411.1074",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "BAO as cosmic distance / ruler constraint",
                  "preservation_role": "bao_distance_boundary_guard"
              }
          ]

          BOUNDARY_LANES = [
              {
                  "lane_id": "distance_duality",
                  "tairid_role": "observation_surface_distance_coherence_guard",
                  "standard_requirement": "Luminosity distance and angular-diameter distance must remain coherently bounded.",
                  "support_signal": "Distance-duality sources are present and treated as required propagation consistency guards.",
                  "failure_signal": "TAIRID allows distance measures to drift independently without explicit boundary conditions.",
                  "current_status_before_this_test": "bridge_inventory",
                  "allowed_result": "distance_duality_boundary_preserved",
                  "blocked_claim": "TAIRID does not freely redefine distance."
              },
              {
                  "lane_id": "bao_auxiliary_ruler_boundary",
                  "tairid_role": "boundary_ruler_guard",
                  "standard_requirement": "BAO remains a ruler / acoustic-scale boundary, not a global reach anchor.",
                  "support_signal": "BAO source lanes are classified as boundary/ruler guards.",
                  "failure_signal": "TAIRID promotes BAO into a universal correction surface or uses BAO to validate the reach lane.",
                  "current_status_before_this_test": "prior_diagnostic_review",
                  "allowed_result": "bao_auxiliary_boundary_preserved",
                  "blocked_claim": "BAO does not validate TAIRID or confirm the reach surface."
              },
              {
                  "lane_id": "no_one_surface_collapse",
                  "tairid_role": "surface_separation_guard",
                  "standard_requirement": "Reach, growth, distance, and ruler roles must remain separated unless a later model explicitly fits them.",
                  "support_signal": "Distance-duality and BAO are preserved as guards rather than combined into one posterior.",
                  "failure_signal": "The framework needs one combined reach/growth/ruler correction to make the pattern appear.",
                  "current_status_before_this_test": "guard_active",
                  "allowed_result": "one_surface_collapse_blocked",
                  "blocked_claim": "TAIRID does not combine all cosmology tensions into one correction surface."
              }
          ]

          BLOCKED_INTERPRETATIONS = [
              {
                  "claim": "TAIRID is validated by distance duality.",
                  "status": "blocked",
                  "reason": "Distance duality is a preservation guard, not a TAIRID proof."
              },
              {
                  "claim": "TAIRID can freely redefine cosmological distance.",
                  "status": "blocked",
                  "reason": "Luminosity distance and angular-diameter distance remain bounded by distance-duality logic."
              },
              {
                  "claim": "BAO confirms the TAIRID reach surface.",
                  "status": "blocked",
                  "reason": "BAO remains auxiliary ruler boundary only."
              },
              {
                  "claim": "BAO should be averaged with H0LiCOW and growth rows into one pressure score.",
                  "status": "blocked",
                  "reason": "One-surface collapse remains blocked."
              },
              {
                  "claim": "This registry ran a BAO likelihood or model comparison.",
                  "status": "blocked",
                  "reason": "This is an inventory and boundary registry only."
              }
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_21_growth_expansion_RSD_cluster_CMB_lensing_inventory",
                  "role_focus": "consolidation_growth",
                  "purpose": "Return to growth/consolidation pressure with RSD, cluster, and CMB-lensing inventories now that observation-surface and distance-boundary guards are active.",
                  "why_next": "The theory can now safely expand growth testing without breaking propagation or distance constraints.",
                  "must_include": "RSD fσ8, cluster S8 or sigma8, CMB lensing amplitude, source/product status, no combined posterior claim.",
                  "must_not_include": "full likelihood fitting, model validation, or one-surface collapse."
              },
              {
                  "priority": 2,
                  "next_test": "v4_22_inflation_jobs_requirement_ledger",
                  "role_focus": "viability_space_expansion",
                  "purpose": "List the required jobs inflation performs before TAIRID viability-space expansion can become more than conceptual mapping.",
                  "why_next": "The inflation plate must be tested against standard requirements before model claims.",
                  "must_include": "smoothness, flatness, primordial spectrum, acoustic peaks, tensor bounds.",
                  "must_not_include": "claiming TAIRID replaces inflation."
              },
              {
                  "priority": 3,
                  "next_test": "v4_23_dark_phase_two_stage_boundary_registry",
                  "role_focus": "dark_consolidation",
                  "purpose": "Separate opaque pre-recombination plasma from post-recombination dark-age structure growth.",
                  "why_next": "The dark-sorting plate needs stage separation before data tests.",
                  "must_include": "recombination, photon decoupling, dark ages, first stars, reionization.",
                  "must_not_include": "collapsing all dark phases into one claim."
              }
          ]

          KEYWORDS = {
              "distance_duality": [
                  "distance duality",
                  "Etherington",
                  "luminosity distance",
                  "angular diameter distance",
                  "angular-diameter distance",
                  "D_L",
                  "D_A",
                  "null geodesics",
                  "photons"
              ],
              "bao": [
                  "BAO",
                  "baryon acoustic",
                  "acoustic oscillation",
                  "standard ruler",
                  "acoustic scale",
                  "sound horizon",
                  "distance",
                  "galaxy clustering"
              ],
              "boundary_guard": [
                  "constraint",
                  "calibration",
                  "ruler",
                  "distance",
                  "cosmological parameters"
              ]
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def fetch_text(url, timeout=90, byte_limit=2_000_000):
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 TAIRID-v4.20-distance-duality-BAO-boundary-registry",
                      "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
                  }
              )
              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def clean_text(text):
              text = re.sub(r"<script.*?</script>", " ", text or "", flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def keyword_hits(text, words):
              lower = (text or "").lower()
              hits = []
              for word in words:
                  if word.lower() in lower:
                      hits.append(word)
              return hits

          def classify_source(role_focus, text, expected_signal):
              cleaned = clean_text(text)
              combined = cleaned + " " + expected_signal

              distance_hits = keyword_hits(combined, KEYWORDS["distance_duality"])
              bao_hits = keyword_hits(combined, KEYWORDS["bao"])
              boundary_hits = keyword_hits(combined, KEYWORDS["boundary_guard"])

              if role_focus == "distance_duality":
                  if distance_hits and boundary_hits:
                      classification = "distance_duality_boundary_guard_source"
                  elif distance_hits:
                      classification = "distance_duality_source"
                  else:
                      classification = "distance_duality_source_needs_manual_review"
              elif role_focus == "bao_boundary":
                  if bao_hits and boundary_hits:
                      classification = "bao_ruler_boundary_guard_source"
                  elif bao_hits:
                      classification = "bao_source"
                  else:
                      classification = "bao_source_needs_manual_review"
              else:
                  classification = "unknown_role_source"

              return {
                  "classification": classification,
                  "distance_duality_hits": ";".join(distance_hits),
                  "bao_hits": ";".join(bao_hits),
                  "boundary_hits": ";".join(boundary_hits),
                  "text_preview": cleaned[:500]
              }

          source_rows = []

          for source in SOURCE_ROOTS:
              fetched = fetch_text(source["source_url"])
              classified = classify_source(
                  source["role_focus"],
                  fetched["text"] if fetched["ok"] else "",
                  source["expected_signal"]
              )

              source_rows.append({
                  "source_id": source["source_id"],
                  "role_focus": source["role_focus"],
                  "source_url": source["source_url"],
                  "source_type": source["source_type"],
                  "expected_signal": source["expected_signal"],
                  "preservation_role": source["preservation_role"],
                  "fetch_ok": fetched["ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"],
                  **classified
              })

          failed_gates = []
          warnings = []

          reachable_sources = [row for row in source_rows if row["fetch_ok"]]
          if len(reachable_sources) < 3:
              failed_gates.append("too_few_boundary_sources_reachable")

          distance_sources = [row for row in source_rows if row["role_focus"] == "distance_duality"]
          bao_sources = [row for row in source_rows if row["role_focus"] == "bao_boundary"]

          distance_guard_ok = any(
              row["classification"] in [
                  "distance_duality_boundary_guard_source",
                  "distance_duality_source"
              ]
              for row in distance_sources
          )

          bao_guard_ok = any(
              row["classification"] in [
                  "bao_ruler_boundary_guard_source",
                  "bao_source"
              ]
              for row in bao_sources
          )

          one_surface_collapse_blocked = True
          bao_anchor_claim_blocked = True
          free_distance_redefinition_blocked = True

          if not distance_guard_ok:
              failed_gates.append("distance_duality_guard_not_found")

          if not bao_guard_ok:
              failed_gates.append("bao_boundary_guard_not_found")

          if not one_surface_collapse_blocked:
              failed_gates.append("one_surface_collapse_not_blocked")

          lane_results = [
              {
                  "lane_id": "distance_duality",
                  "guard_pass": distance_guard_ok,
                  "result": "distance_duality_boundary_guard_present" if distance_guard_ok else "distance_duality_guard_missing",
                  "allowed_interpretation": "TAIRID reach language must preserve distance-coherence constraints.",
                  "blocked_interpretation": "TAIRID can freely redefine luminosity distance or angular-diameter distance."
              },
              {
                  "lane_id": "bao_auxiliary_ruler_boundary",
                  "guard_pass": bao_guard_ok,
                  "result": "bao_ruler_boundary_guard_present" if bao_guard_ok else "bao_guard_missing",
                  "allowed_interpretation": "BAO remains an auxiliary ruler boundary.",
                  "blocked_interpretation": "BAO confirms the TAIRID reach surface."
              },
              {
                  "lane_id": "one_surface_collapse_guard",
                  "guard_pass": one_surface_collapse_blocked,
                  "result": "one_surface_collapse_blocked",
                  "allowed_interpretation": "Reach, growth, distance, and ruler roles remain separated.",
                  "blocked_interpretation": "All cosmology tensions can be averaged into one correction surface."
              },
              {
                  "lane_id": "free_distance_redefinition_guard",
                  "guard_pass": free_distance_redefinition_blocked,
                  "result": "free_distance_redefinition_blocked",
                  "allowed_interpretation": "TAIRID can reinterpret reach only while preserving distance relations.",
                  "blocked_interpretation": "Distance can be changed without preserving observational constraints."
              }
          ]

          warnings.append("boundary_registry_is_not_data_reanalysis")
          warnings.append("distance_duality_and_bao_are_guards_not_tairid_proof")

          if failed_gates:
              readiness_label = "distance_duality_bao_boundary_registry_failed"
              next_step = "Repair distance-duality or BAO source inventory before expanding growth tests."
          else:
              readiness_label = "distance_duality_bao_boundary_registry_passed_ready_for_growth_expansion_inventory"
              next_step = (
                  "Proceed to v4.21 growth expansion inventory using RSD, cluster, and CMB-lensing lanes. "
                  "Keep distance duality and BAO as boundary guards, not TAIRID proof."
              )

          system_health = {
              "reachable_source_count": len(reachable_sources),
              "source_count": len(source_rows),
              "distance_duality_guard_present": distance_guard_ok,
              "bao_ruler_boundary_guard_present": bao_guard_ok,
              "one_surface_collapse_blocked": one_surface_collapse_blocked,
              "bao_anchor_claim_blocked": bao_anchor_claim_blocked,
              "free_distance_redefinition_blocked": free_distance_redefinition_blocked,
              "tairid_validation_claim_allowed": False,
              "bao_validation_claim_allowed": False,
              "distance_redefinition_without_guard_allowed": False
          }

          interpretation = (
              "v4.20 inventories distance-duality and BAO boundary guards. "
              "This does not reanalyze data or validate TAIRID. "
              "It preserves the rule that TAIRID reach language cannot freely redefine distance, cannot promote BAO into a global reach anchor, and cannot collapse reach, growth, distance, and ruler roles into one correction surface."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_roots": SOURCE_ROOTS,
              "boundary_lanes": BOUNDARY_LANES,
              "source_rows": source_rows,
              "lane_results": lane_results,
              "blocked_interpretations": BLOCKED_INTERPRETATIONS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "inflation_replacement_claim_allowed": False,
                  "free_distance_redefinition_allowed": False,
                  "bao_anchor_promotion_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "combined_posterior_allowed": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "boundary_source_inventory_v4_20.csv",
              source_rows,
              [
                  "source_id",
                  "role_focus",
                  "source_url",
                  "source_type",
                  "expected_signal",
                  "preservation_role",
                  "fetch_ok",
                  "http_status",
                  "content_type",
                  "bytes_read",
                  "error",
                  "classification",
                  "distance_duality_hits",
                  "bao_hits",
                  "boundary_hits",
                  "text_preview"
              ]
          )

          write_csv(
              OUTDIR / "boundary_lane_results_v4_20.csv",
              lane_results,
              ["lane_id", "guard_pass", "result", "allowed_interpretation", "blocked_interpretation"]
          )

          write_csv(
              OUTDIR / "boundary_lanes_v4_20.csv",
              BOUNDARY_LANES,
              [
                  "lane_id",
                  "tairid_role",
                  "standard_requirement",
                  "support_signal",
                  "failure_signal",
                  "current_status_before_this_test",
                  "allowed_result",
                  "blocked_claim"
              ]
          )

          write_csv(
              OUTDIR / "blocked_interpretations_v4_20.csv",
              BLOCKED_INTERPRETATIONS,
              ["claim", "status", "reason"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_20.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "why_next", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_20.csv",
              [system_health],
              [
                  "reachable_source_count",
                  "source_count",
                  "distance_duality_guard_present",
                  "bao_ruler_boundary_guard_present",
                  "one_surface_collapse_blocked",
                  "bao_anchor_claim_blocked",
                  "free_distance_redefinition_blocked",
                  "tairid_validation_claim_allowed",
                  "bao_validation_claim_allowed",
                  "distance_redefinition_without_guard_allowed"
              ]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_distance_duality_guard_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Distance duality is preserved as a reach and observation-surface boundary guard.",
                  "boundary": "Boundary registry only, not validation."
              },
              {
                  "interpretation_id": "allowed_bao_boundary_statement",
                  "status": "allowed_with_boundary",
                  "wording": "BAO remains an auxiliary ruler boundary and is not promoted into a global reach anchor.",
                  "boundary": "No BAO validation claim."
              },
              {
                  "interpretation_id": "allowed_one_surface_block_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Reach, growth, distance, and ruler roles remain separated rather than averaged into one correction surface.",
                  "boundary": "No one-surface collapse."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID cosmology is validated.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_bao_anchor_claim",
                  "status": "forbidden",
                  "wording": "BAO confirms the TAIRID reach surface.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_free_distance_claim",
                  "status": "forbidden",
                  "wording": "TAIRID can freely redefine distance.",
                  "boundary": "Blocked."
              }
          ]

          write_csv(
              OUTDIR / "interpretation_boundaries_v4_20.csv",
              interpretation_rows,
              ["interpretation_id", "status", "wording", "boundary"]
          )

          json_path = OUTDIR / "tairid_cosmology_v4_20_distance_duality_bao_boundary_registry_onefile.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v4.20 — Distance-Duality / BAO Boundary Registry")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This registry checks whether TAIRID reach language preserves distance-duality and BAO boundary roles.")
          md.append("")
          md.append("Distance duality and BAO are guardrails. They do not prove TAIRID. They stop the theory from freely redefining distance or promoting BAO into a global reach anchor.")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Lane results")
          md.append("")
          md.append("| Lane | Pass | Result | Blocked interpretation |")
          md.append("|---|---:|---|---|")
          for row in lane_results:
              md.append(
                  f"| `{row['lane_id']}` | `{row['guard_pass']}` | `{row['result']}` | {row['blocked_interpretation']} |"
              )
          md.append("")
          md.append("## Source inventory")
          md.append("")
          md.append("| Source | Role | Reachable | Classification |")
          md.append("|---|---|---:|---|")
          for row in source_rows:
              md.append(
                  f"| `{row['source_id']}` | `{row['role_focus']}` | `{row['fetch_ok']}` | `{row['classification']}` |"
              )
          md.append("")
