              {
                  "rule_id": "expanded_candidates_classified",
                  "pass": len(INVENTORY_CANDIDATES) >= 13,
                  "result": f"expanded_candidate_count={len(INVENTORY_CANDIDATES)}",
                  "boundary": "Design classification only."
              },
              {
                  "rule_id": "expanded_lanes_declared",
                  "pass": len(EXPANDED_LANE_DESIGN) >= 7,
                  "result": f"expanded_lane_count={len(EXPANDED_LANE_DESIGN)}",
                  "boundary": "No pressure computed."
              },
              {
                  "rule_id": "reference_target_requirements_declared",
                  "pass": len(REFERENCE_TARGET_REQUIREMENTS) >= 4,
                  "result": "expanded reference vector/covariance support required before pressure",
                  "boundary": "Blocks expanded pressure."
              },
              {
                  "rule_id": "observed_covariance_limits_carried",
                  "pass": len(OBSERVED_COVARIANCE_LIMITS) >= 4,
                  "result": f"observed_covariance_limit_count={len(OBSERVED_COVARIANCE_LIMITS)}",
                  "boundary": "Non-BOSS covariance remains limited."
              },
              {
                  "rule_id": "next_probe_is_reference_support_not_pressure",
                  "pass": NEXT_PROBE_DESIGN["allowed_to_compute_expanded_observed_pressure"] is False,
                  "result": "next route builds expanded reference target support before pressure",
                  "boundary": "No pressure before reference support."
              },
              {
                  "rule_id": "quality_gates_declared",
                  "pass": len(QUALITY_GATES_FOR_NEXT_PROBE) >= 5,
                  "result": f"{len(QUALITY_GATES_FOR_NEXT_PROBE)} next-probe quality gates declared",
                  "boundary": "No bridge pressure computed."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": NEXT_PROBE_DESIGN["allowed_to_compute_final_RSD_pressure"] is False and NEXT_PROBE_DESIGN["allowed_to_validate_TAIRID"] is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_127_rules_passed")

          if failed_gates:
              readiness_label = "expanded_growth_bridge_design_failed"
              next_allowed_step = "Repair expanded growth bridge design before expanded reference target support."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.128 expanded reference target support probe. "
                  "Do not compute expanded pressure, final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_source_inventory_performed": upstream["source_inventory_performed"],
              "upstream_candidate_inventory_count": upstream["candidate_inventory_count"],
              "expanded_candidate_count": len(INVENTORY_CANDIDATES),
              "expanded_lane_count": len(EXPANDED_LANE_DESIGN),
              "reference_target_requirement_count": len(REFERENCE_TARGET_REQUIREMENTS),
              "observed_covariance_limit_count": len(OBSERVED_COVARIANCE_LIMITS),
              "verified_BOSS_core_preserved": True,
              "non_BOSS_candidate_values_finalized": False,
              "expanded_reference_target_support_exists": False,
              "expanded_bridge_pressure_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "inventory_candidates": INVENTORY_CANDIDATES,
              "reference_target_requirements": REFERENCE_TARGET_REQUIREMENTS,
              "expanded_lane_design": EXPANDED_LANE_DESIGN,
              "observed_covariance_limits": OBSERVED_COVARIANCE_LIMITS,
              "next_probe_design": NEXT_PROBE_DESIGN,
              "quality_gates_for_next_probe": QUALITY_GATES_FOR_NEXT_PROBE,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "expanded_growth_bridge_design_passed": not bool(failed_gates),
                  "expanded_reference_target_support_exists": False,
                  "expanded_bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_127_expanded_growth_bridge_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "inventory_candidates_v4_127.csv",
              INVENTORY_CANDIDATES,
              ["candidate_id", "family_id", "z", "observed_fsigma8_candidate", "observed_sigma_candidate", "source_family", "inventory_status", "covariance_status", "design_decision", "reason"]
          )

          write_csv(
              OUTDIR / "reference_target_requirements_v4_127.csv",
              REFERENCE_TARGET_REQUIREMENTS,
              ["requirement_id", "target_redshifts", "requirement", "why_needed"]
          )

          write_csv(
              OUTDIR / "expanded_lane_design_v4_127.csv",
              EXPANDED_LANE_DESIGN,
              ["lane_id", "candidate_ids", "redshifts", "lane_status", "observed_covariance_status", "reference_requirement", "claim_scope"]
          )

          write_csv(
              OUTDIR / "observed_covariance_limits_v4_127.csv",
              OBSERVED_COVARIANCE_LIMITS,
              ["limit_id", "affected_lanes", "limit", "action"]
          )

          write_csv(
              OUTDIR / "quality_gates_for_next_probe_v4_127.csv",
              QUALITY_GATES_FOR_NEXT_PROBE,
              ["gate_id", "requirement", "failure_action"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_127.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_127.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_127.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.127 — Expanded Growth Bridge Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.126 gave us enough non-BOSS observed-growth inventory to design an expanded bridge. v4.127 classifies candidates, protects the verified BOSS control core, and defines expanded lanes.")
          md.append("")
          md.append("The important catch is reference support: the expanded observed inventory now reaches redshifts that the prior five-slot reference vector did not cover. So the next clean move is not pressure. It is building or declaring expanded reference target support.")
          md.append("")
          md.append("This does not compute expanded pressure, final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## Expanded lanes")
          md.append("")
          md.append("| Lane | Redshifts | Status |")
          md.append("|---|---|---|")
          for row in EXPANDED_LANE_DESIGN:
              md.append(f"| `{row['lane_id']}` | `{row['redshifts']}` | `{row['lane_status']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_127_expanded_growth_bridge_design.json",
              "tairid_v4_127_expanded_growth_bridge_design.md",
              "inventory_candidates_v4_127.csv",
              "reference_target_requirements_v4_127.csv",
              "expanded_lane_design_v4_127.csv",
              "observed_covariance_limits_v4_127.csv",
              "quality_gates_for_next_probe_v4_127.csv",
              "blocked_claims_v4_127.csv",
              "next_route_options_v4_127.csv",
              "rule_results_v4_127.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_127_expanded_growth_bridge_design.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.127 expanded growth bridge design artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-127-expanded-growth-bridge-design
          path: artifacts/tairid_v4_127_expanded_growth_bridge_design/
