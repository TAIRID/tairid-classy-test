name: TAIRID Cosmology v4.17 Role To Observable Test Registry Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-17-role-to-observable-test-registry-onefile.yml"

jobs:
  role-to-observable-test-registry-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.17 role to observable test registry onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_17_role_to_observable_test_registry_onefile

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_17_role_to_observable_test_registry_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_17_role_to_observable_test_registry_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine KiDS, DES, HSC, H0LiCOW, BAO, CMB, supernovae, or early-universe observables into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run any DES, HSC, KiDS, H0LiCOW, BAO, CMB, supernova, RSD, cluster, or inflation likelihood.",
              "This creates a role-to-observable registry so future tests stay separated by TAIRID role and evidence status.",
              "A pass means the test registry is internally coherent, not that TAIRID cosmology is validated."
          ]

          EVIDENCE_STATUS_DEFINITIONS = [
              {
                  "status": "direct_parsed_data",
                  "meaning": "A public product was parsed directly enough to create or verify a row.",
                  "promotion_power": "strongest_current_internal_status",
                  "example": "KiDS direct 3x2pt chain row."
              },
              {
                  "status": "published_summary",
                  "meaning": "A result is carried from published summary values, not direct posterior parsing.",
                  "promotion_power": "supportive_but_weaker_than_direct_parse",
                  "example": "DES and HSC current growth rows."
              },
              {
                  "status": "prior_diagnostic_review",
                  "meaning": "A prior artifact reviewed the row or role, but this registry does not rerun it.",
                  "promotion_power": "carry_forward_with_boundary",
                  "example": "H0LiCOW reach-positive-equivalent lane."
              },
              {
                  "status": "infrastructure_only",
                  "meaning": "Code, config, SACC, data-vector, likelihood, or template material exists but is not posterior samples.",
                  "promotion_power": "not_direct_evidence",
                  "example": "HSC SACC/likelihood infrastructure; DES chain-template/run-name evidence."
              },
              {
                  "status": "conceptual_mapping_only",
                  "meaning": "A TAIRID role maps to standard cosmology concepts, but has not yet been tested here.",
                  "promotion_power": "no_evidence_promotion_allowed",
                  "example": "Viability-space expansion as inflation-role mapping."
              },
              {
                  "status": "parked",
                  "meaning": "The idea is too speculative for direct testing until a clearer equation or observable is defined.",
                  "promotion_power": "blocked_until_operationalized",
                  "example": "Matter/antimatter SDR branch sorting."
              }
          ]

          ROLE_REGISTRY = [
              {
                  "role_id": "reach_geometry",
                  "tairid_role": "reach / propagation-access diagnostic",
                  "atlas_source": "consolidation-propagation limit and prior reach lane",
                  "standard_observable_family": "time-delay distances and local reach diagnostics",
                  "current_observable_examples": "H0LiCOW time-delay distance rows",
                  "current_evidence_status": "prior_diagnostic_review",
                  "current_result": "H0LiCOW remains reach-positive-equivalent diagnostic only.",
                  "next_valid_test": "reach_growth_interaction_matrix",
                  "support_condition": "Reach-side diagnostics remain separable from growth/consolidation diagnostics without one-surface averaging.",
                  "failure_condition": "Reach rows must be collapsed into the same correction surface as growth rows to make the pattern work.",
                  "promotion_condition": "Direct source-specific reach products must be parsed or reviewed with provenance and still preserve role separation.",
                  "blocked_claim": "This does not solve H0 or validate TAIRID.",
                  "risk_level": "medium"
              },
              {
                  "role_id": "consolidation_growth",
                  "tairid_role": "growth / consolidation diagnostic",
                  "atlas_source": "consolidation-propagation limit",
                  "standard_observable_family": "weak lensing, clustering, S8, sigma8, growth amplitude",
                  "current_observable_examples": "KiDS 3x2pt direct chain; KiDS/DES/HSC published S8 rows",
                  "current_evidence_status": "direct_parsed_data_plus_published_summary",
                  "current_result": "Growth/consolidation pressure remains negative in role-explicit S8 lanes.",
                  "next_valid_test": "RSD_fsigma8_cluster_CMB_lensing_growth_expansion",
                  "support_condition": "Independent growth observables show compatible amplitude-side pressure without forced Omega_m explanation.",
                  "failure_condition": "Growth rows flip positive or require hidden DES/HSC product promotion.",
                  "promotion_condition": "Add RSD, cluster, or CMB-lensing products with explicit provenance and no joint-posterior claim.",
                  "blocked_claim": "This does not prove a new growth law.",
                  "risk_level": "low_medium"
              },
              {
                  "role_id": "amplitude_decomposition",
                  "tairid_role": "amplitude-side pressure versus Omega_m decomposition",
                  "atlas_source": "consolidation pressure and SDR comparison logic",
                  "standard_observable_family": "S8, sigma8, Omega_m decomposition",
                  "current_observable_examples": "KiDS direct sigma8/Omega_m; DES reconstructed sigma8/Omega_m",
                  "current_evidence_status": "direct_parsed_data_plus_published_summary",
                  "current_result": "S8 and sigma8 carry repeated negative pressure; Omega_m is mixed.",
                  "next_valid_test": "growth_axis_decomposition_with_RSD_and_CMB_lensing",
                  "support_condition": "sigma8 or amplitude-side measures repeat negative pressure while Omega_m remains non-shared or mixed.",
                  "failure_condition": "The pressure disappears once amplitude and Omega_m axes are separated.",
                  "promotion_condition": "Use direct posterior axes or transparent published summaries for each new source.",
                  "blocked_claim": "This does not prove the cause of the S8 tension.",
                  "risk_level": "low_medium"
              },
              {
                  "role_id": "boundary_ruler",
                  "tairid_role": "boundary / ruler / calibration guard",
                  "atlas_source": "three-gate alignment and viability windows",
                  "standard_observable_family": "BAO, distance ladders, ruler consistency, calibration boundaries",
                  "current_observable_examples": "BAO carried as auxiliary mixed/ruler boundary",
                  "current_evidence_status": "prior_diagnostic_review",
                  "current_result": "BAO remains auxiliary and is not promoted to a global reach anchor.",
                  "next_valid_test": "bao_distance_duality_boundary_preservation_audit",
                  "support_condition": "BAO and other ruler diagnostics constrain role boundaries without becoming a one-surface correction.",
                  "failure_condition": "The framework needs BAO to act as a global reach anchor to preserve the pattern.",
                  "promotion_condition": "Only role-specific BAO subfamilies may be tested with clear boundary labels.",
                  "blocked_claim": "BAO does not validate the reach surface.",
                  "risk_level": "medium"
              },
              {
                  "role_id": "observation_surface",
                  "tairid_role": "stable observation surface",
                  "atlas_source": "first stable observation surfaces plate",
                  "standard_observable_family": "CMB last-scattering surface, supernova time dilation, Tolman dimming, distance duality",
                  "current_observable_examples": "CMB surface concept; SN time dilation and Tolman dimming not yet tested in this lane",
                  "current_evidence_status": "conceptual_mapping_only",
                  "current_result": "Observation-surface language is promising but not yet tested in this v4 lane.",
                  "next_valid_test": "observation_surface_preservation_registry",
                  "support_condition": "TAIRID role language preserves standard propagation evidence such as CMB, time dilation, and distance duality.",
                  "failure_condition": "The framework drifts into static-light or tired-light behavior that fails time dilation or surface-brightness tests.",
                  "promotion_condition": "Run explicit preservation tests before using observation-surface language as cosmological evidence.",
                  "blocked_claim": "This does not replace the standard CMB or metric-expansion evidence.",
                  "risk_level": "medium_high"
              },
              {
                  "role_id": "viability_space_expansion",
                  "tairid_role": "viability-space expansion / inflation-role mapping",
                  "atlas_source": "inflation as viability-space expansion plate",
                  "standard_observable_family": "inflation jobs: smoothness, flatness, primordial spectrum, acoustic peaks, tensor bounds",
                  "current_observable_examples": "No direct v4 test yet",
                  "current_evidence_status": "conceptual_mapping_only",
                  "current_result": "Viability-space expansion is a candidate translation layer, not an inflation replacement.",
                  "next_valid_test": "inflation_jobs_requirement_ledger",
                  "support_condition": "The TAIRID role can list and eventually reproduce the jobs inflation performs without breaking CMB constraints.",
                  "failure_condition": "The role cannot explain why inflation-like requirements are needed or fails known CMB constraints.",
                  "promotion_condition": "Build equations or toy models that recover at least smoothness, flatness, and primordial spectrum requirements.",
                  "blocked_claim": "TAIRID does not yet replace inflation.",
                  "risk_level": "high"
              },
              {
                  "role_id": "dark_consolidation",
                  "tairid_role": "dark sorting / pre-luminous consolidation",
                  "atlas_source": "dark sorting and pre-luminous consolidation plate",
                  "standard_observable_family": "recombination, dark ages, matter power spectrum, halo formation, first stars, reionization",
                  "current_observable_examples": "No direct v4 test yet",
                  "current_evidence_status": "conceptual_mapping_only",
                  "current_result": "Dark consolidation should be split into opaque pre-recombination constraint and post-recombination structure growth.",
                  "next_valid_test": "dark_phase_two_stage_boundary_registry",
                  "support_condition": "The role separates photon-coupled opacity from later dark-age structure growth and maps to standard timing.",
                  "failure_condition": "The model conflates trapped photons before recombination with the later dark ages after photons can travel.",
                  "promotion_condition": "Create two-stage observables before testing against matter power or reionization constraints.",
                  "blocked_claim": "This does not yet explain dark matter, dark energy, or reionization.",
                  "risk_level": "high"
              },
              {
                  "role_id": "branch_sorting",
                  "tairid_role": "matter / antimatter branch sorting by SDR persistence",
                  "atlas_source": "matter-antimatter branch sorting plate",
                  "standard_observable_family": "baryon asymmetry, annihilation constraints, CP violation, early-universe branch selection",
                  "current_observable_examples": "No operational v4 observable",
                  "current_evidence_status": "parked",
                  "current_result": "This is conceptually interesting but not operationally testable yet.",
                  "next_valid_test": "derive_branch_sorting_minimum_equation_before_data_test",
                  "support_condition": "A toy equation defines SDR asymmetry, predicts sign, and constrains leftover surplus.",
                  "failure_condition": "The role remains only a story-shape with no measurable asymmetry or magnitude constraint.",
                  "promotion_condition": "Do not test against data until an equation or at least a measurable proxy exists.",
                  "blocked_claim": "TAIRID does not yet explain matter-antimatter asymmetry.",
                  "risk_level": "very_high"
              }
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_18_observation_surface_preservation_registry",
                  "role_focus": "observation_surface",
                  "purpose": "Check that TAIRID observation-surface language preserves CMB, supernova time dilation, Tolman dimming, distance duality, and BAO boundary roles.",
                  "why_next": "This prevents the theory from accidentally becoming tired-light/static-light while extending the atlas.",
                  "must_include": "CMB last scattering, SN time dilation, Tolman surface brightness, distance duality, BAO auxiliary boundary.",
                  "must_not_include": "model replacement, likelihood fitting, validation claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_19_growth_expansion_RSD_cluster_CMB_lensing_inventory",
                  "role_focus": "consolidation_growth",
                  "purpose": "Expand growth/consolidation pressure beyond weak lensing summaries into RSD, cluster, and CMB lensing families.",
                  "why_next": "This tests whether amplitude-side pressure repeats outside KiDS/DES/HSC weak-lensing rows.",
                  "must_include": "source/product status, direct-vs-summary label, blocked claims.",
                  "must_not_include": "combined posterior or model fit."
              },
              {
                  "priority": 3,
                  "next_test": "v4_20_inflation_jobs_requirement_ledger",
                  "role_focus": "viability_space_expansion",
                  "purpose": "List the standard jobs inflation performs and decide what TAIRID must reproduce before any replacement claim is allowed.",
                  "why_next": "The atlas image is useful, but the role must recover standard constraints before becoming a model.",
                  "must_include": "smoothness, flatness, spectrum, acoustic peaks, tensor bounds.",
                  "must_not_include": "claiming TAIRID replaces inflation."
              },
              {
                  "priority": 4,
                  "next_test": "v4_21_dark_phase_two_stage_boundary_registry",
                  "role_focus": "dark_consolidation",
                  "purpose": "Separate opaque pre-recombination constraint from post-recombination dark-age growth.",
                  "why_next": "This repairs the dark-sorting plate into testable cosmology stages.",
                  "must_include": "recombination, photon decoupling, dark ages, first stars, reionization.",
                  "must_not_include": "collapsing all dark phases into one claim."
              },
              {
                  "priority": 5,
                  "next_test": "park_branch_sorting_until_equation",
                  "role_focus": "branch_sorting",
                  "purpose": "Do not test matter/antimatter SDR sorting until a minimum equation exists.",
                  "why_next": "This is the riskiest atlas claim and needs operational definition first.",
                  "must_include": "SDR proxy, asymmetry term, sign prediction, magnitude constraint.",
                  "must_not_include": "baryon asymmetry explanation claim."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          failed_gates = []
          warnings = []

          allowed_statuses = set(row["status"] for row in EVIDENCE_STATUS_DEFINITIONS)

          for row in ROLE_REGISTRY:
              required = [
                  "role_id",
                  "tairid_role",
                  "standard_observable_family",
                  "current_evidence_status",
                  "next_valid_test",
                  "support_condition",
                  "failure_condition",
                  "promotion_condition",
                  "blocked_claim",
                  "risk_level"
              ]

              for field in required:
                  if not row.get(field):
                      failed_gates.append(f"{row.get('role_id', 'unknown')}_missing_{field}")

              status = row.get("current_evidence_status", "")
              if status == "direct_parsed_data_plus_published_summary":
                  status_parts_ok = True
              else:
                  status_parts_ok = status in allowed_statuses

              if not status_parts_ok:
                  failed_gates.append(f"{row.get('role_id', 'unknown')}_unknown_evidence_status_{status}")

          # Specific guardrails from the new cosmology understanding.
          branch_rows = [row for row in ROLE_REGISTRY if row["role_id"] == "branch_sorting"]
          viability_rows = [row for row in ROLE_REGISTRY if row["role_id"] == "viability_space_expansion"]
          dark_rows = [row for row in ROLE_REGISTRY if row["role_id"] == "dark_consolidation"]
          observation_rows = [row for row in ROLE_REGISTRY if row["role_id"] == "observation_surface"]

          if not branch_rows or branch_rows[0]["current_evidence_status"] != "parked":
              failed_gates.append("branch_sorting_not_parked")

          if not viability_rows or viability_rows[0]["current_evidence_status"] != "conceptual_mapping_only":
              failed_gates.append("viability_space_expansion_not_kept_conceptual")

          if not dark_rows or "two-stage" not in dark_rows[0]["next_valid_test"] and "two_stage" not in dark_rows[0]["next_valid_test"]:
              failed_gates.append("dark_consolidation_two_stage_boundary_missing")

          if not observation_rows or "time dilation" not in observation_rows[0]["support_condition"]:
              warnings.append("observation_surface_time_dilation_guard_may_be_too_weak")

          # Make sure next ladder does not start with the speculative branch-sorting claim.
          if NEXT_TEST_LADDER[0]["role_focus"] == "branch_sorting":
              failed_gates.append("next_ladder_starts_with_branch_sorting_overreach")

          if any("validation" in row["blocked_claim"].lower() and row["current_evidence_status"] in ["conceptual_mapping_only", "parked"] for row in ROLE_REGISTRY):
              warnings.append("conceptual_or_parked_roles_correctly_block_validation_language")

          warnings.append("registry_is_control_board_not_data_test")
          warnings.append("atlas_guides_role_mapping_but_is_not_evidence")

          if failed_gates:
              readiness_label = "role_to_observable_test_registry_failed"
              next_step = "Repair role registry fields, evidence statuses, or overclaim guards before new data tests."
          else:
              readiness_label = "role_to_observable_test_registry_passed_ready_for_role_specific_next_tests"
              next_step = (
                  "Proceed to v4.18 observation-surface preservation registry, then expand growth tests with RSD/cluster/CMB-lensing inventory. "
                  "Keep viability expansion conceptual and branch sorting parked until equations exist."
              )

          role_status_counts = {}
          for row in ROLE_REGISTRY:
              status = row["current_evidence_status"]
              role_status_counts[status] = role_status_counts.get(status, 0) + 1

          risk_counts = {}
          for row in ROLE_REGISTRY:
              risk = row["risk_level"]
              risk_counts[risk] = risk_counts.get(risk, 0) + 1

          system_health = {
              "role_count": len(ROLE_REGISTRY),
              "next_test_count": len(NEXT_TEST_LADDER),
              "branch_sorting_parked": branch_rows[0]["current_evidence_status"] == "parked",
              "viability_expansion_conceptual_only": viability_rows[0]["current_evidence_status"] == "conceptual_mapping_only",
              "dark_consolidation_split_required": True,
              "observation_surface_next_priority": NEXT_TEST_LADDER[0]["role_focus"] == "observation_surface",
              "validation_claim_allowed": False,
              "model_replacement_claim_allowed": False
          }

          interpretation = (
              "v4.17 converts the cosmology atlas into a test registry. "
              "The project should now test TAIRID cosmology by role rather than as one giant claim. "
              "The strongest tested roles remain reach/consolidation separation and growth/amplitude pressure. "
              "Observation surfaces are the next safety-critical mapping because they must preserve CMB, supernova time dilation, Tolman dimming, distance duality, and BAO boundary behavior. "
              "Viability-space expansion remains conceptual until it can recover the jobs inflation performs. "
              "Matter/antimatter branch sorting is parked until a minimum equation exists."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "evidence_status_definitions": EVIDENCE_STATUS_DEFINITIONS,
              "role_registry": ROLE_REGISTRY,
              "next_test_ladder": NEXT_TEST_LADDER,
              "role_status_counts": role_status_counts,
              "risk_counts": risk_counts,
              "system_health": system_health,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "inflation_replacement_claim_allowed": False,
                  "matter_antimatter_solution_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_growth_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "combined_posterior_allowed": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "evidence_status_definitions_v4_17.csv",
              EVIDENCE_STATUS_DEFINITIONS,
              ["status", "meaning", "promotion_power", "example"]
          )

          write_csv(
              OUTDIR / "role_to_observable_registry_v4_17.csv",
              ROLE_REGISTRY,
              [
                  "role_id",
                  "tairid_role",
                  "atlas_source",
                  "standard_observable_family",
                  "current_observable_examples",
                  "current_evidence_status",
                  "current_result",
                  "next_valid_test",
                  "support_condition",
                  "failure_condition",
                  "promotion_condition",
                  "blocked_claim",
                  "risk_level"
              ]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_17.csv",
              NEXT_TEST_LADDER,
              [
                  "priority",
                  "next_test",
                  "role_focus",
                  "purpose",
                  "why_next",
                  "must_include",
                  "must_not_include"
              ]
          )

          write_csv(
              OUTDIR / "role_status_counts_v4_17.csv",
              [{"status": key, "count": value} for key, value in sorted(role_status_counts.items())],
              ["status", "count"]
          )

          write_csv(
              OUTDIR / "risk_counts_v4_17.csv",
              [{"risk_level": key, "count": value} for key, value in sorted(risk_counts.items())],
              ["risk_level", "count"]
          )

          write_csv(
              OUTDIR / "system_health_v4_17.csv",
              [system_health],
              [
                  "role_count",
                  "next_test_count",
                  "branch_sorting_parked",
                  "viability_expansion_conceptual_only",
                  "dark_consolidation_split_required",
                  "observation_surface_next_priority",
                  "validation_claim_allowed",
                  "model_replacement_claim_allowed"
              ]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_registry_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The atlas has been converted into a role-to-observable registry for future tests.",
                  "boundary": "Registry only, not validation."
              },
              {
                  "interpretation_id": "allowed_role_specific_testing_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Future tests should target roles separately: reach, consolidation, boundary, observation surface, viability expansion, dark consolidation, and branch sorting.",
                  "boundary": "No single giant cosmology proof."
              },
              {
                  "interpretation_id": "allowed_branch_sorting_park_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Matter/antimatter branch sorting is parked until a minimum equation exists.",
                  "boundary": "No baryon-asymmetry explanation claim."
              },
              {
                  "interpretation_id": "allowed_inflation_boundary_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Viability-space expansion remains a conceptual inflation-role mapping until it can recover the jobs inflation performs.",
                  "boundary": "No inflation replacement claim."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID cosmology is validated.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_standard_cosmology_disproof",
                  "status": "forbidden",
                  "wording": "Standard cosmology is disproven.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_model_comparison_claim",
                  "status": "forbidden",
                  "wording": "A likelihood, BIC, posterior comparison, or model selection was run.",
                  "boundary": "Blocked."
              }
          ]

          write_csv(
              OUTDIR / "interpretation_boundaries_v4_17.csv",
              interpretation_rows,
              ["interpretation_id", "status", "wording", "boundary"]
          )

          json_path = OUTDIR / "tairid_cosmology_v4_17_role_to_observable_test_registry_onefile.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v4.17 — Role-to-Observable Test Registry")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("The cosmology atlas has been converted into a role-to-observable test registry.")
          md.append("")
          md.append("Future tests should not ask whether all of TAIRID cosmology is proven at once. They should ask which TAIRID role is being tested, what standard observable maps to it, what evidence status it has, and what claim remains blocked.")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
