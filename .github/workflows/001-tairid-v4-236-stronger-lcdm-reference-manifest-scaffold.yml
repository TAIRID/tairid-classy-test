name: 001 TAIRID v4.236 - Stronger LCDM Reference Manifest Scaffold

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-236-stronger-lcdm-reference-manifest-scaffold.yml"

permissions:
  contents: read

jobs:
  stronger-lcdm-reference-manifest-scaffold:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.236 Stronger LCDM Reference Manifest Scaffold is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.236 stronger LCDM reference manifest scaffold
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.236"
          ROUTE = "stronger_lcdm_reference_manifest_scaffold_after_v4_235"
          EXPECTED_RESULT = "v4_236_stronger_lcdm_reference_manifest_scaffold_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_237_stronger_reference_residual_review_or_broader_holdout_locator"

          OUT = Path("tairid_v4_236_stronger_lcdm_reference_manifest_scaffold_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-236-stronger-lcdm-reference-manifest-scaffold-output.zip"

          BASE = "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16"

          SOURCE_INPUTS = [
              {
                  "source": "LRG",
                  "surface_id": "lrg_dr16_fsbao_dmdhfs8",
                  "measurement_url": BASE + "/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8.txt",
                  "covariance_url": BASE + "/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8_covtot.txt",
              },
              {
                  "source": "QSO",
                  "surface_id": "qso_dr16_fsbao_dmdhfs8",
                  "measurement_url": BASE + "/qso/sdss_DR16_QSO_FSBAO_DMDHfs8.txt",
                  "covariance_url": BASE + "/qso/sdss_DR16_QSO_FSBAO_DMDHfs8_covtot.txt",
              },
          ]

          AXIS_MAP = {
              "DM_over_rd": ("D_M_over_r_sound", "reach_geometry"),
              "DM_over_rs": ("D_M_over_r_sound", "reach_geometry"),
              "DH_over_rd": ("D_H_over_r_sound", "radial_pacing_geometry"),
              "DH_over_rs": ("D_H_over_r_sound", "radial_pacing_geometry"),
              "f_sigma8": ("f_sigma8", "growth_consolidation"),
          }

          AXIS_ORDER = ["D_M_over_r_sound", "D_H_over_r_sound", "f_sigma8"]

          # These are still reference-grid/scaffold constants, not a fit.
          H0_VALUES = [66.50, 67.36, 69.00]
          OMEGA_M_VALUES = [0.3000, 0.3153, 0.3300]
          SIGMA8_VALUES = [0.7800, 0.8111, 0.8400]
          R_SOUND_VALUES = [146.50, 147.09, 147.50]
          C_LIGHT = 299792.458

          CENTRAL_REFERENCE = {
              "reference_model_id": "central_flat_lcdm_integral_growth_reference",
              "H0_km_s_Mpc": 67.36,
              "Omega_m0": 0.3153,
              "Omega_lambda0": 1.0 - 0.3153,
              "sigma8_0": 0.8111,
              "r_sound_Mpc": 147.09,
              "reference_status": "central_reference_only_not_fit",
          }

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def fetch_text(url):
              req = Request(url, headers={"User-Agent": "TAIRID-v4.236-stronger-lcdm-reference"})
              with urlopen(req, timeout=45) as response:
                  return response.read().decode("utf-8", errors="replace")

          def safe_float(token):
              try:
                  return float(token)
              except Exception:
                  return None

          def numeric_lines(text):
              rows = []
              for line in text.splitlines():
                  raw = line.strip()
                  if not raw or raw.startswith("#"):
                      continue
                  nums = []
                  labels = []
                  for part in raw.replace(",", " ").split():
                      value = safe_float(part)
                      if value is None:
                          labels.append(part)
                      else:
                          nums.append(value)
                  rows.append((nums, labels, raw))
              return rows

          def parse_measurements(text):
              rows = []
              for nums, labels, raw in numeric_lines(text):
                  if len(nums) >= 2 and labels:
                      rows.append({
                          "redshift": nums[0],
                          "value": nums[1],
                          "quantity": labels[-1],
                      })
              return rows

          def parse_matrix(text):
              rows = []
              for nums, labels, raw in numeric_lines(text):
                  if nums:
                      rows.append(nums)
              return rows

          def sigmas_from_covariance(matrix):
              sigmas = []
              for i in range(len(matrix)):
                  diag = matrix[i][i] if i < len(matrix[i]) else float("nan")
                  sigmas.append(math.sqrt(diag) if diag >= 0 else float("nan"))
              return sigmas

          def det3(m):
              return (
                  m[0][0] * (m[1][1] * m[2][2] - m[1][2] * m[2][1])
                  - m[0][1] * (m[1][0] * m[2][2] - m[1][2] * m[2][0])
                  + m[0][2] * (m[1][0] * m[2][1] - m[1][1] * m[2][0])
              )

          def inverse3(m):
              d = det3(m)
              if abs(d) < 1e-30:
                  return None
              inv = [[0.0 for _ in range(3)] for __ in range(3)]
              inv[0][0] = (m[1][1] * m[2][2] - m[1][2] * m[2][1]) / d
              inv[0][1] = (m[0][2] * m[2][1] - m[0][1] * m[2][2]) / d
              inv[0][2] = (m[0][1] * m[1][2] - m[0][2] * m[1][1]) / d
              inv[1][0] = (m[1][2] * m[2][0] - m[1][0] * m[2][2]) / d
              inv[1][1] = (m[0][0] * m[2][2] - m[0][2] * m[2][0]) / d
              inv[1][2] = (m[0][2] * m[1][0] - m[0][0] * m[1][2]) / d
              inv[2][0] = (m[1][0] * m[2][1] - m[1][1] * m[2][0]) / d
              inv[2][1] = (m[0][1] * m[2][0] - m[0][0] * m[2][1]) / d
              inv[2][2] = (m[0][0] * m[1][1] - m[0][1] * m[1][0]) / d
              return inv

          def quadratic_form(vector, inv):
              total = 0.0
              for i in range(3):
                  for j in range(3):
                      total += vector[i] * inv[i][j] * vector[j]
              return total

          def baseline_from_row(row):
              return {
                  "H0_km_s_Mpc": float(row["H0_km_s_Mpc"]),
                  "Omega_m0": float(row["Omega_m0"]),
                  "Omega_lambda0": float(row.get("Omega_lambda0", 1.0 - float(row["Omega_m0"]))),
                  "sigma8_0": float(row["sigma8_0"]),
                  "r_sound_Mpc": float(row["r_sound_Mpc"]),
              }

          def E_z(z, baseline):
              om = baseline["Omega_m0"]
              ol = baseline.get("Omega_lambda0", 1.0 - om)
              return math.sqrt(om * (1.0 + z) ** 3 + ol)

          def simpson_integral(f, a, b, n=3000):
              if b == a:
                  return 0.0
              if n % 2:
                  n += 1
              h = (b - a) / n
              total = f(a) + f(b)
              for i in range(1, n):
                  x = a + i * h
                  total += (4 if i % 2 else 2) * f(x)
              return total * h / 3.0

          def dm_over_rsound(z, baseline):
              integral = simpson_integral(lambda zz: 1.0 / E_z(zz, baseline), 0.0, z)
              dm_mpc = (C_LIGHT / baseline["H0_km_s_Mpc"]) * integral
              return dm_mpc / baseline["r_sound_Mpc"]

          def dh_over_rsound(z, baseline):
              dh_mpc = C_LIGHT / (baseline["H0_km_s_Mpc"] * E_z(z, baseline))
              return dh_mpc / baseline["r_sound_Mpc"]

          def E_a(a, baseline):
              om = baseline["Omega_m0"]
              ol = baseline.get("Omega_lambda0", 1.0 - om)
              return math.sqrt(om / (a ** 3) + ol)

          def growth_integral_unnormalized(a, baseline):
              # Integral form for flat LCDM growth, normalized later by D(a=1).
              amin = 1e-4
              aa = max(a, amin)
              integral = simpson_integral(lambda x: 1.0 / ((x ** 3) * (E_a(x, baseline) ** 3)), amin, aa, n=3000)
              return (5.0 * baseline["Omega_m0"] / 2.0) * E_a(aa, baseline) * integral

          def linear_growth_D_integral(z, baseline):
              a = 1.0 / (1.0 + z)
              D_a = growth_integral_unnormalized(a, baseline)
              D_1 = growth_integral_unnormalized(1.0, baseline)
              return D_a / D_1 if D_1 else float("nan")

          def f_growth_integral(z, baseline):
              # Finite-difference derivative of ln D against ln a.
              a = 1.0 / (1.0 + z)
              eps = 1e-4
              a0 = max(1e-4, a * (1.0 - eps))
              a1 = min(1.0, a * (1.0 + eps))
              if a1 == a0:
                  a0 = max(1e-4, a - eps)
                  a1 = min(1.0, a + eps)
              z0 = (1.0 / a0) - 1.0
              z1 = (1.0 / a1) - 1.0
              D0 = linear_growth_D_integral(z0, baseline)
              D1 = linear_growth_D_integral(z1, baseline)
              if D0 <= 0 or D1 <= 0:
                  return float("nan")
              return (math.log(D1) - math.log(D0)) / (math.log(a1) - math.log(a0))

          def fsigma8_integral_reference(z, baseline):
              D = linear_growth_D_integral(z, baseline)
              f = f_growth_integral(z, baseline)
              return f * baseline["sigma8_0"] * D

          def projected_value(standard_quantity, z, baseline):
              if standard_quantity == "D_M_over_r_sound":
                  return dm_over_rsound(z, baseline)
              if standard_quantity == "D_H_over_r_sound":
                  return dh_over_rsound(z, baseline)
              if standard_quantity == "f_sigma8":
                  return fsigma8_integral_reference(z, baseline)
              return float("nan")

          def direction_from_residual(residual, sigma):
              z_score = residual / sigma if sigma else float("nan")
              if math.isnan(z_score) or abs(z_score) < 1.0:
                  return "0", z_score
              if residual > 0:
                  return "+", z_score
              return "-", z_score

          def median(values):
              values = sorted(values)
              if not values:
                  return float("nan")
              n = len(values)
              mid = n // 2
              if n % 2:
                  return values[mid]
              return 0.5 * (values[mid - 1] + values[mid])

          reference_method_rows = [
              {
                  "method_id": "method_001",
                  "component": "distance_DM",
                  "method": "Simpson integral of 1/E(z) for flat LCDM comoving angular diameter distance, divided by r_sound.",
                  "upgrade_status": "stronger_than_previous_scaffold_but_not_external_likelihood",
              },
              {
                  "method_id": "method_002",
                  "component": "distance_DH",
                  "method": "c / (H0 * E(z)) divided by r_sound.",
                  "upgrade_status": "explicit_reference_calculation_not_fit",
              },
              {
                  "method_id": "method_003",
                  "component": "growth_D",
                  "method": "Integral growth approximation D(a) = 5 Omega_m E(a)/2 * integral da/(a^3 E(a)^3), normalized to D(1).",
                  "upgrade_status": "stronger_than_Carroll_Press_Turner_fit_like_shortcut",
              },
              {
                  "method_id": "method_004",
                  "component": "growth_fsigma8",
                  "method": "Finite-difference f = d ln D / d ln a, then f_sigma8 = f * sigma8_0 * D(z).",
                  "upgrade_status": "explicit_growth_reference_not_fit",
              },
              {
                  "method_id": "method_005",
                  "component": "covariance",
                  "method": "Use source covariance inverse for LRG/QSO source-surface chi-square diagnostics.",
                  "upgrade_status": "source_covariance_preserved",
              },
              {
                  "method_id": "method_006",
                  "component": "claim_boundary",
                  "method": "Reference scaffold is diagnostic only, not cosmology validation or TAIRID proof.",
                  "upgrade_status": "truth_boundary_active",
              },
          ]

          baseline_grid_rows = []
          variant_index = 0
          for h0 in H0_VALUES:
              for omega_m in OMEGA_M_VALUES:
                  for sigma8 in SIGMA8_VALUES:
                      for r_sound in R_SOUND_VALUES:
                          variant_index += 1
                          baseline_grid_rows.append({
                              "variant_id": f"stronger_reference_grid_{variant_index:03d}",
                              "H0_km_s_Mpc": h0,
                              "Omega_m0": omega_m,
                              "Omega_lambda0": 1.0 - omega_m,
                              "sigma8_0": sigma8,
                              "r_sound_Mpc": r_sound,
                              "reference_status": "stronger_reference_grid_only_not_fit",
                              "proof_status": "not_proof",
                              "validation_status": "not_validation",
                          })

          observed_axis_rows = []
          source_inverse = {}
          source_axis_order = {}

          for item in SOURCE_INPUTS:
              source = item["source"]
              surface_id = item["surface_id"]
              measurements = parse_measurements(fetch_text(item["measurement_url"]))
              covariance = parse_matrix(fetch_text(item["covariance_url"]))
              sigmas = sigmas_from_covariance(covariance)
              inv = inverse3(covariance)

              source_inverse[source] = inv
              source_axis_order[source] = []

              for index, measurement in enumerate(measurements):
                  standard_quantity, axis_name = AXIS_MAP.get(measurement["quantity"], (measurement["quantity"], "unmapped_axis"))
                  source_axis_order[source].append(standard_quantity)
                  observed_axis_rows.append({
                      "source": source,
                      "surface_id": surface_id,
                      "axis_index": index,
                      "standard_quantity": standard_quantity,
                      "native_quantity": measurement["quantity"],
                      "axis_name": axis_name,
                      "redshift": measurement["redshift"],
                      "observed_value": measurement["value"],
                      "observed_sigma": sigmas[index] if index < len(sigmas) else "",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          central_reference_rows = []
          central_residual_rows = []

          central_baseline = baseline_from_row(CENTRAL_REFERENCE)

          for obs in observed_axis_rows:
              z = float(obs["redshift"])
              observed_value = float(obs["observed_value"])
              sigma = float(obs["observed_sigma"])
              reference_value = projected_value(obs["standard_quantity"], z, central_baseline)
              residual = observed_value - reference_value
              direction, z_score = direction_from_residual(residual, sigma)

              central_reference_rows.append({
                  "source": obs["source"],
                  "surface_id": obs["surface_id"],
                  "standard_quantity": obs["standard_quantity"],
                  "redshift": z,
                  "reference_model_id": CENTRAL_REFERENCE["reference_model_id"],
                  "reference_value": reference_value,
                  "reference_method": "stronger_flat_lcdm_integral_growth_reference",
                  "reference_status": "central_reference_manifest_row_not_fit",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

              central_residual_rows.append({
                  "source": obs["source"],
                  "surface_id": obs["surface_id"],
                  "standard_quantity": obs["standard_quantity"],
                  "redshift": z,
                  "observed_value": observed_value,
                  "observed_sigma": sigma,
                  "reference_value": reference_value,
                  "residual_value": residual,
                  "residual_z_score": z_score,
                  "guarded_residual_direction": direction,
                  "residual_status": "central_stronger_reference_residual_preview_only",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

          grid_reference_rows = []
          grid_residual_rows = []
          source_chisq_rows = []

          for baseline in baseline_grid_rows:
              baseline_obj = baseline_from_row(baseline)
              for source in ["LRG", "QSO"]:
                  source_obs = [row for row in observed_axis_rows if row["source"] == source]
                  residual_vector = []
                  direction_vector = []

                  for obs in source_obs:
                      z = float(obs["redshift"])
                      observed_value = float(obs["observed_value"])
                      sigma = float(obs["observed_sigma"])
                      reference_value = projected_value(obs["standard_quantity"], z, baseline_obj)
                      residual = observed_value - reference_value
                      direction, z_score = direction_from_residual(residual, sigma)

                      residual_vector.append(residual)
                      direction_vector.append(direction)

                      grid_reference_rows.append({
                          "variant_id": baseline["variant_id"],
                          "source": source,
                          "surface_id": obs["surface_id"],
                          "standard_quantity": obs["standard_quantity"],
                          "redshift": z,
                          "reference_value": reference_value,
                          "reference_status": "stronger_reference_grid_row_not_fit",
                          "proof_status": "not_proof",
                          "validation_status": "not_validation",
                      })

                      grid_residual_rows.append({
                          "variant_id": baseline["variant_id"],
                          "source": source,
                          "surface_id": obs["surface_id"],
                          "standard_quantity": obs["standard_quantity"],
                          "redshift": z,
                          "observed_value": observed_value,
                          "observed_sigma": sigma,
                          "reference_value": reference_value,
                          "residual_value": residual,
                          "residual_z_score": z_score,
                          "guarded_residual_direction": direction,
                          "residual_status": "stronger_reference_grid_residual_preview_only",
                          "proof_status": "not_proof",
                          "validation_status": "not_validation",
                      })

                  inv = source_inverse[source]
                  chisq = quadratic_form(residual_vector, inv) if inv else float("nan")
                  source_chisq_rows.append({
                      "variant_id": baseline["variant_id"],
                      "source": source,
                      "axis_order": "|".join(source_axis_order[source]),
                      "guarded_signature": "".join(direction_vector),
                      "chisq_3axis": chisq,
                      "dof": 3,
                      "rms_chisq_per_axis": math.sqrt(chisq / 3.0) if chisq >= 0 else float("nan"),
                      "chisq_status": "stronger_reference_diagnostic_only_not_fit",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                    })

          axis_review_rows = []
          for source in ["LRG", "QSO"]:
              for standard_quantity in AXIS_ORDER:
                  rows = [
                      row for row in grid_residual_rows
                      if row["source"] == source and row["standard_quantity"] == standard_quantity
                  ]
                  directions = [row["guarded_residual_direction"] for row in rows]
                  z_values = [float(row["residual_z_score"]) for row in rows if not math.isnan(float(row["residual_z_score"]))]
                  plus_count = directions.count("+")
                  minus_count = directions.count("-")
                  zero_count = directions.count("0")

                  if plus_count == len(directions):
                      pressure_class = "stable_positive_pressure"
                  elif minus_count == len(directions):
                      pressure_class = "stable_negative_pressure"
                  elif zero_count == len(directions):
                      pressure_class = "stable_zero_guard"
                  elif plus_count > 0 and minus_count == 0:
                      pressure_class = "positive_with_zero_guard_band"
                  elif minus_count > 0 and plus_count == 0:
                      pressure_class = "negative_with_zero_guard_band"
                  else:
                      pressure_class = "mixed_sign_sensitive"

                  axis_review_rows.append({
                      "source": source,
                      "standard_quantity": standard_quantity,
                      "plus_count": plus_count,
                      "minus_count": minus_count,
                      "zero_count": zero_count,
                      "min_residual_z": min(z_values) if z_values else "",
                      "median_residual_z": median(z_values) if z_values else "",
                      "max_residual_z": max(z_values) if z_values else "",
                      "pressure_class": pressure_class,
                      "review_status": "stronger_reference_axis_review_only_not_validation",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          source_review_rows = []
          for source in ["LRG", "QSO"]:
              rows = [row for row in source_chisq_rows if row["source"] == source]
              chisqs = [float(row["chisq_3axis"]) for row in rows]
              signatures = [row["guarded_signature"] for row in rows]
              signature_counts = {}
              for signature in signatures:
                  signature_counts[signature] = signature_counts.get(signature, 0) + 1
              dominant_signature = sorted(signature_counts.items(), key=lambda item: (-item[1], item[0]))[0][0]

              source_review_rows.append({
                  "source": source,
                  "grid_rows": len(rows),
                  "min_chisq_3axis": min(chisqs),
                  "median_chisq_3axis": median(chisqs),
                  "max_chisq_3axis": max(chisqs),
                  "dominant_signature": dominant_signature,
                  "dominant_signature_count": signature_counts[dominant_signature],
                  "unique_signature_count": len(signature_counts),
                  "signature_count_map": json.dumps(signature_counts, sort_keys=True),
                  "review_status": "stronger_reference_source_review_only_not_validation",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

          prediction_check_rows = []
          frozen_predictions = [
              {
                  "prediction_id": "freeze_001_primary_qso_growth",
                  "source": "QSO",
                  "standard_quantity": "f_sigma8",
                  "expected_classes": ["stable_positive_pressure", "positive_with_zero_guard_band"],
                  "failure_classes": ["stable_zero_guard", "stable_negative_pressure", "mixed_sign_sensitive", "negative_with_zero_guard_band"],
              },
              {
                  "prediction_id": "freeze_002_secondary_qso_radial",
                  "source": "QSO",
                  "standard_quantity": "D_H_over_r_sound",
                  "expected_classes": ["positive_with_zero_guard_band", "stable_zero_guard", "stable_positive_pressure"],
                  "failure_classes": ["stable_negative_pressure", "negative_with_zero_guard_band"],
              },
              {
                  "prediction_id": "freeze_003_control_lrg_growth",
                  "source": "LRG",
                  "standard_quantity": "f_sigma8",
                  "expected_classes": ["stable_zero_guard", "mixed_sign_sensitive", "negative_with_zero_guard_band", "positive_with_zero_guard_band"],
                  "failure_classes": ["stable_positive_pressure"],
              },
          ]

          for prediction in frozen_predictions:
              match = next(
                  row for row in axis_review_rows
                  if row["source"] == prediction["source"] and row["standard_quantity"] == prediction["standard_quantity"]
              )
              pressure_class = match["pressure_class"]
              if pressure_class in prediction["expected_classes"]:
                  status = "frozen_prediction_survives_stronger_reference_scaffold"
              elif pressure_class in prediction["failure_classes"]:
                  status = "frozen_prediction_weakened_or_failed_under_stronger_reference_scaffold"
              else:
                  status = "frozen_prediction_unclear_under_stronger_reference_scaffold"

              prediction_check_rows.append({
                  "prediction_id": prediction["prediction_id"],
                  "source": prediction["source"],
                  "standard_quantity": prediction["standard_quantity"],
                  "observed_pressure_class": pressure_class,
                  "prediction_check_status": status,
                  "holdout_status": "same_data_reference_upgrade_not_independent_holdout",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

          manifest_template_rows = []
          for row in central_reference_rows:
              manifest_template_rows.append({
                  "manifest_row_id": f"ref_manifest_{len(manifest_template_rows)+1:03d}",
                  "source": row["source"],
                  "surface_id": row["surface_id"],
                  "standard_quantity": row["standard_quantity"],
                  "redshift": row["redshift"],
                  "reference_model_id": row["reference_model_id"],
                  "reference_value": row["reference_value"],
                  "reference_method": row["reference_method"],
                  "reference_status": "filled_by_v4_236_scaffold_not_external_likelihood",
              })

          permission_rows = [
              {
                  "permission_scope": "stronger_lcdm_reference_manifest",
                  "permission_status": "written_as_scaffold",
                  "reason": "Explicit central and grid reference rows are written.",
              },
              {
                  "permission_scope": "same_data_reference_upgrade_as_holdout",
                  "permission_status": "blocked",
                  "reason": "This uses the same LRG/QSO source data and cannot count as independent holdout evidence.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "Reference scaffold is not a full likelihood fit or model comparison.",
              },
              {
                  "permission_scope": "tairid_prediction_claim",
                  "permission_status": "blocked_pending_holdout_or_external_reference",
                  "reason": "Prediction checks against same data are diagnostic only.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "ELG remains outside split-axis matrix.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_237_stronger_reference_residual_review",
                  "purpose": "review whether frozen QSO growth pressure survives the stronger reference scaffold",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_237_broader_holdout_locator",
                  "purpose": "look beyond current GitHub targets for independent QSO-like growth surfaces",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_237_external_likelihood_boundary",
                  "purpose": "define what would be needed for formal likelihood/model comparison",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_237_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until source-surface guards pass",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before stronger reference scaffold"},
              {"gate": "reference_method_rows_equal_6", "passed": len(reference_method_rows) == 6, "detail": f"reference_method_rows = {len(reference_method_rows)}"},
              {"gate": "baseline_grid_rows_equal_81", "passed": len(baseline_grid_rows) == 81, "detail": f"baseline_grid_rows = {len(baseline_grid_rows)}"},
              {"gate": "observed_axis_rows_equal_6", "passed": len(observed_axis_rows) == 6, "detail": f"observed_axis_rows = {len(observed_axis_rows)}"},
              {"gate": "central_reference_rows_equal_6", "passed": len(central_reference_rows) == 6, "detail": f"central_reference_rows = {len(central_reference_rows)}"},
              {"gate": "central_residual_rows_equal_6", "passed": len(central_residual_rows) == 6, "detail": f"central_residual_rows = {len(central_residual_rows)}"},
              {"gate": "grid_reference_rows_equal_486", "passed": len(grid_reference_rows) == 486, "detail": f"grid_reference_rows = {len(grid_reference_rows)}"},
              {"gate": "grid_residual_rows_equal_486", "passed": len(grid_residual_rows) == 486, "detail": f"grid_residual_rows = {len(grid_residual_rows)}"},
              {"gate": "source_chisq_rows_equal_162", "passed": len(source_chisq_rows) == 162, "detail": f"source_chisq_rows = {len(source_chisq_rows)}"},
              {"gate": "axis_review_rows_equal_6", "passed": len(axis_review_rows) == 6, "detail": f"axis_review_rows = {len(axis_review_rows)}"},
              {"gate": "source_review_rows_equal_2", "passed": len(source_review_rows) == 2, "detail": f"source_review_rows = {len(source_review_rows)}"},
              {"gate": "prediction_check_rows_equal_3", "passed": len(prediction_check_rows) == 3, "detail": f"prediction_check_rows = {len(prediction_check_rows)}"},
              {"gate": "manifest_template_rows_equal_6", "passed": len(manifest_template_rows) == 6, "detail": f"manifest_template_rows = {len(manifest_template_rows)}"},
              {"gate": "permission_rows_equal_5", "passed": len(permission_rows) == 5, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "same_data_holdout_blocked", "passed": any(row["permission_scope"] == "same_data_reference_upgrade_as_holdout" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "same data reference upgrade as holdout blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_not_holdout", "passed": True, "detail": "same data reference upgrade is not holdout"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_237_stronger_reference_residual_review_or_broader_holdout_locator", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_236_stronger_lcdm_reference_manifest_scaffold_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_236_reference_method_rows.csv", reference_method_rows)
          write_csv(OUT / "v4_236_baseline_grid_rows.csv", baseline_grid_rows)
          write_csv(OUT / "v4_236_observed_axis_rows.csv", observed_axis_rows)
          write_csv(OUT / "v4_236_central_reference_rows.csv", central_reference_rows)
          write_csv(OUT / "v4_236_central_residual_rows.csv", central_residual_rows)
          write_csv(OUT / "v4_236_grid_reference_rows.csv", grid_reference_rows)
          write_csv(OUT / "v4_236_grid_residual_rows.csv", grid_residual_rows)
          write_csv(OUT / "v4_236_source_chisq_rows.csv", source_chisq_rows)
          write_csv(OUT / "v4_236_axis_review_rows.csv", axis_review_rows)
          write_csv(OUT / "v4_236_source_review_rows.csv", source_review_rows)
          write_csv(OUT / "v4_236_prediction_check_rows.csv", prediction_check_rows)
          write_csv(OUT / "v4_236_reference_manifest_template_rows.csv", manifest_template_rows)
          write_csv(OUT / "v4_236_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_236_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_236_rule_checks.csv", checks)

          axis_lines = [
              f"{row['source']} {row['standard_quantity']}: {row['pressure_class']} (+={row['plus_count']}, -={row['minus_count']}, 0={row['zero_count']})"
              for row in axis_review_rows
          ]

          prediction_lines = [
              f"{row['prediction_id']}: {row['observed_pressure_class']} -> {row['prediction_check_status']}"
              for row in prediction_check_rows
          ]

          source_lines = [
              f"{row['source']}: min={row['min_chisq_3axis']:.3f}, median={row['median_chisq_3axis']:.3f}, max={row['max_chisq_3axis']:.3f}, dominant={row['dominant_signature']}"
              for row in source_review_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "reference_method_rows": len(reference_method_rows),
              "baseline_grid_rows": len(baseline_grid_rows),
              "observed_axis_rows": len(observed_axis_rows),
              "central_reference_rows": len(central_reference_rows),
              "central_residual_rows": len(central_residual_rows),
              "grid_reference_rows": len(grid_reference_rows),
              "grid_residual_rows": len(grid_residual_rows),
              "source_chisq_rows": len(source_chisq_rows),
              "axis_review_rows": len(axis_review_rows),
              "source_review_rows": len(source_review_rows),
              "prediction_check_rows": len(prediction_check_rows),
              "manifest_template_rows": len(manifest_template_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "same_data_counts_as_holdout": False,
                  "is_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_236_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.236 Stronger LCDM Reference Manifest Scaffold",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"reference_method_rows = {summary['reference_method_rows']}",
              f"baseline_grid_rows = {summary['baseline_grid_rows']}",
              f"observed_axis_rows = {summary['observed_axis_rows']}",
              f"central_reference_rows = {summary['central_reference_rows']}",
              f"central_residual_rows = {summary['central_residual_rows']}",
              f"grid_reference_rows = {summary['grid_reference_rows']}",
              f"grid_residual_rows = {summary['grid_residual_rows']}",
              f"source_chisq_rows = {summary['source_chisq_rows']}",
              f"axis_review_rows = {summary['axis_review_rows']}",
              f"source_review_rows = {summary['source_review_rows']}",
              f"prediction_check_rows = {summary['prediction_check_rows']}",
              f"manifest_template_rows = {summary['manifest_template_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Axis review:",
              *axis_lines,
              "",
              "Source chi-square review:",
              *source_lines,
              "",
              "Frozen prediction checks:",
              *prediction_lines,
              "",
              "Clean meaning: v4.236 replaces the rough baseline with a stronger explicit LCDM reference scaffold using integral growth and source covariance. It can test whether the frozen pressure lane survives a better same-data reference, but it is not holdout evidence and not validation.",
              "",
              "Truth boundary: no proof, no validation, no same-data holdout, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_236_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"reference_method_rows = {summary['reference_method_rows']}")
          print(f"baseline_grid_rows = {summary['baseline_grid_rows']}")
          print(f"observed_axis_rows = {summary['observed_axis_rows']}")
          print(f"central_reference_rows = {summary['central_reference_rows']}")
          print(f"central_residual_rows = {summary['central_residual_rows']}")
          print(f"grid_reference_rows = {summary['grid_reference_rows']}")
          print(f"grid_residual_rows = {summary['grid_residual_rows']}")
          print(f"source_chisq_rows = {summary['source_chisq_rows']}")
          print(f"axis_review_rows = {summary['axis_review_rows']}")
          print(f"source_review_rows = {summary['source_review_rows']}")
          print(f"prediction_check_rows = {summary['prediction_check_rows']}")
          print(f"manifest_template_rows = {summary['manifest_template_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no same-data holdout, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.236 stronger LCDM reference manifest scaffold output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-236-stronger-lcdm-reference-manifest-scaffold-output
          path: |
            tairid_v4_236_stronger_lcdm_reference_manifest_scaffold_output/
            tairid-v4-236-stronger-lcdm-reference-manifest-scaffold-output.zip
