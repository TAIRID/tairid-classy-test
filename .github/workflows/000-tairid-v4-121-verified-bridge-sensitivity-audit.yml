name: 000 TAIRID v4.121 Verified Bridge Sensitivity Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-121-verified-bridge-sensitivity-audit.yml"

jobs:
  tairid-v4-121-verified-bridge-sensitivity-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.121 verified bridge sensitivity audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_121_verified_bridge_sensitivity_audit

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_121_verified_bridge_sensitivity_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_121_verified_bridge_sensitivity_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This audits the v4.120 verified observed-covariance bridge result.",
              "This does not fetch or ingest new low-z or high-z covariance.",
              "A pass means the verified BOSS consensus bridge is pressure-stable, source-choice effects are recorded, and the remaining edge-anchor covariance targets are explicit."
          ]

          UPSTREAM_LOCKS = {
              "v4_120_verified_observed_covariance_bridge_probe": {
                  "readiness_label": "verified_observed_covariance_bridge_probe_passed_diagnostic_only_ready_for_verified_bridge_sensitivity_audit",
                  "verified_BOSS_covariance_inserted": True,
                  "observed_covariance_status": "BOSS_verified_positions_1_2_3_low_high_z_diagonal_fallback",
                  "bridge_pressure_computed": True,
                  "primary_verified_chi2": 1.721941483224999,
                  "primary_verified_pressure_z": 0.0,
                  "primary_verified_residual_mean": 0.01176689521655121,
                  "primary_verified_condition_proxy": 43.80920308358171,
                  "baseline_diagonal_chi2": 1.8857450832335483,
                  "v4_117_first_candidate_chi2": 1.2943386544372018,
                  "verified_minus_baseline_delta_chi2": -0.1638036000085492,
                  "verified_minus_v4_117_first_candidate_delta_chi2": 0.4276028287877973,
                  "pressure_z_all_zero": True,
                  "low_z_anchor_source_covariance_complete": False,
                  "high_z_anchor_source_covariance_complete": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_119_BOSS_covariance_row_column_provenance_audit": {
                  "readiness_label": "BOSS_covariance_row_column_provenance_audit_passed_primary_consensus_source_locked_ready_for_verified_observed_covariance_bridge_probe",
                  "primary_source_locked": True,
                  "previous_auto_selection_superseded": True,
                  "target_primary_member": "COMBINEDDR12_FS_consensus_dM_Hz/FS_consensus_covtot_dM_Hz_fsig.txt",
                  "fsigma8_subblock_extracted": True,
                  "fsigma8_indexes": [2, 5, 8],
                  "fsigma8_redshifts": [0.38, 0.51, 0.61],
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          VERIFIED_BRIDGE_LANES = [
              {
                  "lane_id": "verified_BOSS_consensus_reference_plus_observed_covariance",
                  "chi2": 1.721941483224999,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 43.80920308358171,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              },
              {
                  "lane_id": "baseline_reference_plus_observed_diagonal_fallback",
                  "chi2": 1.8857450832335483,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 28.764946453807045,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              },
              {
                  "lane_id": "diagonal_reference_guard_plus_verified_BOSS_observed_covariance",
                  "chi2": 1.7017808697098271,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 42.24558865955222,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              },
              {
                  "lane_id": "observed_only_verified_BOSS_plus_edge_fallback_covariance",
                  "chi2": 1.7252735260258585,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 43.774036402187825,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              }
          ]

          VERIFIED_SENSITIVITY_RECORDS = [
              {
                  "comparison_id": "verified_primary_minus_baseline_diagonal_fallback",
                  "base_lane": "verified_BOSS_consensus_reference_plus_observed_covariance",
                  "comparison_lane": "baseline_reference_plus_observed_diagonal_fallback",
                  "delta_chi2": -0.1638036000085492,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Effect of the provenance-locked BOSS consensus covariance relative to diagonal fallback."
              },
              {
                  "comparison_id": "verified_primary_minus_v4_117_first_candidate_source",
                  "base_lane": "verified_BOSS_consensus_reference_plus_observed_covariance",
                  "comparison_lane": "v4_117_first_candidate_source_bridge",
                  "delta_chi2": 0.4276028287877973,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Effect of replacing the v4.117 first usable candidate with the v4.119 consensus covtot source."
              },
              {
                  "comparison_id": "verified_primary_minus_diagonal_reference_guard",
                  "base_lane": "verified_BOSS_consensus_reference_plus_observed_covariance",
                  "comparison_lane": "diagonal_reference_guard_plus_verified_BOSS_observed_covariance",
                  "delta_chi2": 0.020160613515171955,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Reference off-diagonal sensitivity after verified BOSS consensus covariance."
              },
              {
                  "comparison_id": "verified_primary_minus_observed_only",
                  "base_lane": "verified_BOSS_consensus_reference_plus_observed_covariance",
                  "comparison_lane": "observed_only_verified_BOSS_plus_edge_fallback_covariance",
                  "delta_chi2": -0.003332042800859414,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Reference uncertainty contribution after verified BOSS consensus covariance."
              }
          ]

          AUDIT_THRESHOLDS = {
              "max_abs_delta_pressure_z_for_stable_diagnostic": 0.10,
              "material_source_choice_delta_chi2_threshold": 0.25,
              "small_reference_structure_delta_chi2_threshold": 0.05,
              "pressure_z_zero_threshold": 1e-12,
              "max_primary_chi2_for_non_pressure_flag": 5.0,
              "required_lane_count": 4,
              "required_sensitivity_record_count": 4,
              "edge_anchor_covariance_required_before_final": True,
              "final_pressure_allowed_now": False,
              "validation_claim_allowed_now": False
          }

          max_abs_delta_pressure_z = max(abs(float(row["delta_pressure_z"])) for row in VERIFIED_SENSITIVITY_RECORDS)
          max_abs_lane_pressure_z = max(abs(float(row["pressure_z"])) for row in VERIFIED_BRIDGE_LANES)
          max_lane_chi2 = max(float(row["chi2"]) for row in VERIFIED_BRIDGE_LANES)
          min_lane_chi2 = min(float(row["chi2"]) for row in VERIFIED_BRIDGE_LANES)
          source_choice_delta_chi2 = abs(UPSTREAM_LOCKS["v4_120_verified_observed_covariance_bridge_probe"]["verified_minus_v4_117_first_candidate_delta_chi2"])
          baseline_delta_chi2 = abs(UPSTREAM_LOCKS["v4_120_verified_observed_covariance_bridge_probe"]["verified_minus_baseline_delta_chi2"])
          reference_structure_delta_chi2 = abs(next(row["delta_chi2"] for row in VERIFIED_SENSITIVITY_RECORDS if row["comparison_id"] == "verified_primary_minus_diagonal_reference_guard"))
          reference_contribution_delta_chi2 = abs(next(row["delta_chi2"] for row in VERIFIED_SENSITIVITY_RECORDS if row["comparison_id"] == "verified_primary_minus_observed_only"))

          pressure_z_all_zero = max_abs_lane_pressure_z <= AUDIT_THRESHOLDS["pressure_z_zero_threshold"]
          pressure_z_stable = max_abs_delta_pressure_z <= AUDIT_THRESHOLDS["max_abs_delta_pressure_z_for_stable_diagnostic"]
          primary_no_pressure_flag = UPSTREAM_LOCKS["v4_120_verified_observed_covariance_bridge_probe"]["primary_verified_chi2"] < AUDIT_THRESHOLDS["max_primary_chi2_for_non_pressure_flag"]
          source_choice_material = source_choice_delta_chi2 >= AUDIT_THRESHOLDS["material_source_choice_delta_chi2_threshold"]
          reference_structure_stable = reference_structure_delta_chi2 <= AUDIT_THRESHOLDS["small_reference_structure_delta_chi2_threshold"]
          reference_contribution_stable = reference_contribution_delta_chi2 <= AUDIT_THRESHOLDS["small_reference_structure_delta_chi2_threshold"]

          diagnostic_pressure_stable = bool(
              pressure_z_all_zero
              and pressure_z_stable
              and primary_no_pressure_flag
              and reference_structure_stable
              and reference_contribution_stable
          )

          edge_anchor_covariance_incomplete = (
              UPSTREAM_LOCKS["v4_120_verified_observed_covariance_bridge_probe"]["low_z_anchor_source_covariance_complete"] is False
              or UPSTREAM_LOCKS["v4_120_verified_observed_covariance_bridge_probe"]["high_z_anchor_source_covariance_complete"] is False
          )

          final_pressure_ready = False

          SENSITIVITY_AUDIT_RESULTS = [
              {
                  "audit_id": "verified_bridge_pressure_z_stability",
                  "observed_value": max_abs_delta_pressure_z,
                  "threshold": AUDIT_THRESHOLDS["max_abs_delta_pressure_z_for_stable_diagnostic"],
                  "pass": pressure_z_stable,
                  "interpretation": "Pressure-z remains stable across verified bridge lanes."
              },
              {
                  "audit_id": "all_verified_lanes_zero_pressure",
                  "observed_value": max_abs_lane_pressure_z,
                  "threshold": AUDIT_THRESHOLDS["pressure_z_zero_threshold"],
                  "pass": pressure_z_all_zero,
                  "interpretation": "All verified bridge lanes still return pressure_z = 0 under the guarded formula."
              },
              {
                  "audit_id": "primary_verified_non_pressure_flag",
                  "observed_value": UPSTREAM_LOCKS["v4_120_verified_observed_covariance_bridge_probe"]["primary_verified_chi2"],
                  "threshold": AUDIT_THRESHOLDS["max_primary_chi2_for_non_pressure_flag"],
                  "pass": primary_no_pressure_flag,
                  "interpretation": "Primary verified chi2 is below dof=5, so the verified bridge does not show diagnostic tension."
              },
              {
                  "audit_id": "source_choice_materiality",
                  "observed_value": source_choice_delta_chi2,
                  "threshold": AUDIT_THRESHOLDS["material_source_choice_delta_chi2_threshold"],
                  "pass": source_choice_material,
                  "interpretation": "The consensus-vs-first-candidate source choice materially changes chi2, so provenance locking was necessary."
              },
              {
                  "audit_id": "reference_structure_stability",
                  "observed_value": reference_structure_delta_chi2,
                  "threshold": AUDIT_THRESHOLDS["small_reference_structure_delta_chi2_threshold"],
                  "pass": reference_structure_stable,
                  "interpretation": "Reference off-diagonal structure has a small effect after the verified BOSS covariance is used."
              },
              {
                  "audit_id": "reference_contribution_stability",
                  "observed_value": reference_contribution_delta_chi2,
                  "threshold": AUDIT_THRESHOLDS["small_reference_structure_delta_chi2_threshold"],
                  "pass": reference_contribution_stable,
                  "interpretation": "Reference uncertainty contribution remains small relative to the observed covariance lane."
              },
              {
                  "audit_id": "edge_anchor_covariance_incomplete",
                  "observed_value": edge_anchor_covariance_incomplete,
                  "threshold": True,
                  "pass": edge_anchor_covariance_incomplete,
                  "interpretation": "The central BOSS covariance is verified, but the z=0.15 and z=2.33 edge anchors still require covariance/source-status review."
              }
          ]

          EDGE_ANCHOR_TARGETS = [
              {
                  "anchor_id": "low_z_anchor_z015",
                  "z": 0.15,
                  "current_source_family": "SDSS_DR7_MGS",
                  "current_status": "diagonal_fallback",
                  "target_action": "Review official/public covariance or error-model status for the low-z MGS fσ8 anchor.",
                  "why_next": "This point remains outside the verified BOSS covariance block."
              },
              {
                  "anchor_id": "high_z_anchor_z233",
                  "z": 2.33,
                  "current_source_family": "high_z_LyA_compilation_anchor",
                  "current_status": "diagonal_fallback",
                  "target_action": "Review whether the high-z anchor should stay in the primary bridge, move to sensitivity-only, or be replaced with a better source-locked growth point.",
                  "why_next": "This point has different systematics and remains outside the verified BOSS covariance block."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The verified bridge sensitivity audit validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The verified bridge pressure is final.",
              "Zero pressure-z proves TAIRID.",
              "The low-z and high-z diagonal fallback anchors are source-covariance complete.",
              "No edge-anchor covariance review is needed.",
              "No broader growth-family test is needed.",
              "The verified bridge sensitivity audit is a publication-grade cosmology result."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_122_low_high_z_anchor_covariance_review_design",
                  "purpose": "Design a source-status review for the remaining z=0.15 and z=2.33 diagonal fallback anchors.",
                  "why_next": "BOSS central covariance is now verified and stable; the remaining weaknesses are the edge anchors."
              },
              {
                  "priority": 2,
                  "route_id": "v4_123_edge_anchor_review_probe",
                  "purpose": "Attempt source/covariance upgrades or primary/sensitivity-lane decisions for the low-z and high-z anchors.",
                  "why_next": "The bridge cannot be called stronger while edge anchors remain unresolved."
              },
              {
                  "priority": 3,
                  "route_id": "v4_124_growth_family_expansion_design",
                  "purpose": "Design additional observed growth-family coverage beyond the five-slot bridge vector.",
                  "why_next": "A broader observed-family test can check whether the no-pressure result persists."
              },
              {
                  "priority": 4,
                  "route_id": "v4_125_claim_boundary_review_handoff",
                  "purpose": "Create a human-readable status handoff after edge-anchor review and broader-family design.",
                  "why_next": "The result needs careful interpretation before public-facing language."
              }
          ]

          failed_gates = []
          warnings = [
              "sensitivity_audit_only",
              "source_choice_material_but_pressure_z_stable",
              "central_BOSS_covariance_verified",
              "edge_anchors_still_diagonal_fallback",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_120_verified_observed_covariance_bridge_probe"]

          if upstream["bridge_pressure_computed"] is not True:
              failed_gates.append("upstream_verified_bridge_pressure_not_computed")

          if upstream["verified_BOSS_covariance_inserted"] is not True:
              failed_gates.append("upstream_verified_BOSS_covariance_not_inserted")

          if len(VERIFIED_BRIDGE_LANES) != AUDIT_THRESHOLDS["required_lane_count"]:
              failed_gates.append("verified_bridge_lane_count_incorrect")

          if len(VERIFIED_SENSITIVITY_RECORDS) != AUDIT_THRESHOLDS["required_sensitivity_record_count"]:
              failed_gates.append("verified_sensitivity_record_count_incorrect")

          if not diagnostic_pressure_stable:
              failed_gates.append("diagnostic_pressure_not_stable")

          if not source_choice_material:
              failed_gates.append("source_choice_materiality_not_recorded")

          if not edge_anchor_covariance_incomplete:
              failed_gates.append("edge_anchor_incomplete_status_not_carried")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_allowed")

          if len(EDGE_ANCHOR_TARGETS) != 2:
              failed_gates.append("edge_anchor_targets_not_declared")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "verified bridge pressure is final",
              "zero pressure-z proves tairid",
              "low-z and high-z diagonal fallback anchors are source-covariance complete",
              "no edge-anchor covariance review is needed",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "verified_bridge_sensitivity_audit_passed_pressure_stable_source_choice_material_not_final_ready_for_low_high_z_anchor_covariance_review_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_verified_bridge_carried",
                  "pass": upstream["bridge_pressure_computed"] is True and upstream["verified_BOSS_covariance_inserted"] is True,
                  "result": "v4.120 verified BOSS bridge carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "pressure_z_stable",
                  "pass": pressure_z_stable and pressure_z_all_zero,
                  "result": f"max_abs_delta_pressure_z={max_abs_delta_pressure_z}; pressure_z_all_zero={pressure_z_all_zero}",
                  "boundary": "Diagnostic pressure stability only."
              },
              {
                  "rule_id": "primary_no_pressure_flag",
                  "pass": primary_no_pressure_flag,
                  "result": f"primary_verified_chi2={upstream['primary_verified_chi2']} below dof=5 threshold",
                  "boundary": "No final pressure claim."
              },
              {
                  "rule_id": "source_choice_materiality_recorded",
                  "pass": source_choice_material,
                  "result": f"verified_vs_v4_117_first_candidate_delta_chi2={source_choice_delta_chi2}",
                  "boundary": "Shows why provenance lock mattered."
              },
              {
                  "rule_id": "reference_structure_stable",
                  "pass": reference_structure_stable and reference_contribution_stable,
                  "result": f"reference_structure_delta={reference_structure_delta_chi2}; reference_contribution_delta={reference_contribution_delta_chi2}",
                  "boundary": "Sensitivity diagnostic only."
              },
              {
                  "rule_id": "edge_anchor_review_required",
                  "pass": edge_anchor_covariance_incomplete and len(EDGE_ANCHOR_TARGETS) == 2,
                  "result": "z=0.15 and z=2.33 remain unresolved edge-anchor targets",
                  "boundary": "Blocks final pressure language."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False and AUDIT_THRESHOLDS["validation_claim_allowed_now"] is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_121_rules_passed")

          if failed_gates:
              readiness_label = "verified_bridge_sensitivity_audit_failed"
              next_allowed_step = "Repair verified bridge sensitivity audit before edge-anchor covariance review."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.122 low/high-z anchor covariance review design. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "verified_BOSS_covariance_inserted": upstream["verified_BOSS_covariance_inserted"],
              "primary_verified_chi2": upstream["primary_verified_chi2"],
              "baseline_diagonal_chi2": upstream["baseline_diagonal_chi2"],
              "v4_117_first_candidate_chi2": upstream["v4_117_first_candidate_chi2"],
              "max_lane_chi2": max_lane_chi2,
              "min_lane_chi2": min_lane_chi2,
              "source_choice_delta_chi2": source_choice_delta_chi2,
              "baseline_delta_chi2": baseline_delta_chi2,
              "reference_structure_delta_chi2": reference_structure_delta_chi2,
              "reference_contribution_delta_chi2": reference_contribution_delta_chi2,
              "max_abs_delta_pressure_z": max_abs_delta_pressure_z,
              "max_abs_lane_pressure_z": max_abs_lane_pressure_z,
              "pressure_z_all_zero": pressure_z_all_zero,
              "diagnostic_pressure_stable": diagnostic_pressure_stable,
              "source_choice_material": source_choice_material,
              "edge_anchor_covariance_incomplete": edge_anchor_covariance_incomplete,
              "low_z_anchor_source_covariance_complete": False,
              "high_z_anchor_source_covariance_complete": False,
              "final_pressure_ready": final_pressure_ready,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "verified_bridge_lanes": VERIFIED_BRIDGE_LANES,
              "verified_sensitivity_records": VERIFIED_SENSITIVITY_RECORDS,
              "audit_thresholds": AUDIT_THRESHOLDS,
              "sensitivity_audit_results": SENSITIVITY_AUDIT_RESULTS,
              "edge_anchor_targets": EDGE_ANCHOR_TARGETS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "diagnostic_pressure_stable": diagnostic_pressure_stable,
                  "pressure_z_all_zero": pressure_z_all_zero,
                  "source_choice_material": source_choice_material,
                  "edge_anchor_covariance_incomplete": edge_anchor_covariance_incomplete,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_121_verified_bridge_sensitivity_audit.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "verified_bridge_lanes_v4_121.csv",
              VERIFIED_BRIDGE_LANES,
              ["lane_id", "chi2", "dof", "pressure_z", "residual_mean", "rank_total_covariance", "condition_proxy_total_covariance", "claim_scope"]
          )

          write_csv(
              OUTDIR / "verified_sensitivity_records_v4_121.csv",
              VERIFIED_SENSITIVITY_RECORDS,
              ["comparison_id", "base_lane", "comparison_lane", "delta_chi2", "delta_pressure_z", "interpretation"]
          )

          write_csv(
              OUTDIR / "sensitivity_audit_results_v4_121.csv",
              SENSITIVITY_AUDIT_RESULTS,
              ["audit_id", "observed_value", "threshold", "pass", "interpretation"]
          )

          write_csv(
              OUTDIR / "edge_anchor_targets_v4_121.csv",
              EDGE_ANCHOR_TARGETS,
              ["anchor_id", "z", "current_source_family", "current_status", "target_action", "why_next"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_121.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_121.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_121.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.121 — Verified Bridge Sensitivity Audit")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.120 reran the bridge with the provenance-locked BOSS consensus covariance. v4.121 audits whether that verified bridge is sensitive to source choice, reference structure, or fallback lanes.")
          md.append("")
          md.append("The verified bridge remains pressure-stable: pressure_z stays zero across lanes and primary chi2 stays below dof=5. The source choice matters for chi2, which confirms that the provenance lock was necessary. The remaining clean target is the low-z and high-z edge anchors, which still use diagonal fallback.")
          md.append("")
          md.append("This does not compute final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## Sensitivity summary")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Audit results")
          md.append("")
          md.append("| Audit | Observed | Threshold | Pass |")
          md.append("|---|---:|---|---|")
          for row in SENSITIVITY_AUDIT_RESULTS:
              md.append(f"| `{row['audit_id']}` | `{row['observed_value']}` | `{row['threshold']}` | `{row['pass']}` |")
          md.append("")
          md.append("## Edge anchor targets")
          md.append("")
          md.append("| Anchor | z | Current status |")
          md.append("|---|---:|---|")
          for row in EDGE_ANCHOR_TARGETS:
              md.append(f"| `{row['anchor_id']}` | `{row['z']}` | `{row['current_status']}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_121_verified_bridge_sensitivity_audit.json",
              "tairid_v4_121_verified_bridge_sensitivity_audit.md",
              "verified_bridge_lanes_v4_121.csv",
              "verified_sensitivity_records_v4_121.csv",
              "sensitivity_audit_results_v4_121.csv",
              "edge_anchor_targets_v4_121.csv",
              "blocked_claims_v4_121.csv",
              "next_route_options_v4_121.csv",
              "rule_results_v4_121.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_121_verified_bridge_sensitivity_audit.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.121 verified bridge sensitivity audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-121-verified-bridge-sensitivity-audit
          path: artifacts/tairid_v4_121_verified_bridge_sensitivity_audit/
