name: 000 TAIRID v4.151 Raw Candidate Variable Order Review

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-151-raw-candidate-variable-order-review.yml"

jobs:
  tairid-v4-151-raw-candidate-variable-order-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.151 raw candidate variable order review
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_151_raw_candidate_variable_order_review

          python - <<'PY'
          import csv
          import hashlib
          import json
          import math
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_151_raw_candidate_variable_order_review")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_151_raw_candidate_variable_order_review"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not ingest covariance as a scientific input.",
              "This does not recompute eBOSS pressure.",
              "This reviews inline labels, parameter order, covariance shape, diagonal-vs-sigma consistency, and provenance status only.",
              "A pass means a limited LRGxELG parser design may be considered, not that the data have been accepted, ingested, or interpreted."
          ]

          UPSTREAM_LOCKS = {
              "v4_150_raw_candidate_followup_metadata_locator": {
                  "readiness_label": "raw_candidate_followup_metadata_locator_passed_metadata_status_recorded_ready_for_variable_order_or_alternate_file_route",
                  "rule_pass_count": 18,
                  "rule_total_count": 18,
                  "raw_fetch_ok_count": 2,
                  "repo_fetch_ok_count": 2,
                  "covariance_square_pd_candidate": True,
                  "data_file_non_numeric": True,
                  "repo_metadata_or_listing_available": True,
                  "repo_listing_record_count": 3,
                  "repo_metadata_record_count": 1,
                  "possible_metadata_listing_count": 3,
                  "selected_next_route": "raw_candidate_variable_order_review",
                  "raw_candidate_ingested": False,
                  "source_data_ingested": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "likelihood_or_bic_run": False,
                  "reference_vector_still_missing": True,
                  "reference_covariance_still_missing": True,
                  "same_program_eBOSS_covariance_still_limited": True,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_149_raw_candidate_file_structure_probe": {
                  "readiness_label": "raw_candidate_file_structure_probe_passed_structure_status_recorded_ready_for_next_raw_candidate_route",
                  "fetch_ok_count": 2,
                  "both_raw_files_fetched": True,
                  "square_matrix_hint_count": 1,
                  "shape_compatible_candidate": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          RAW_FILES = [
              {
                  "source_id": "lrgxelg_value_file",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK.dat",
                  "role": "inline_labeled_value_sigma_vector",
                  "source_family": "icosmology_eBOSS_DR16_LRGxELG"
              },
              {
                  "source_id": "lrgxelg_covariance_file",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK_cov.dat",
                  "role": "six_by_six_covariance_candidate",
                  "source_family": "icosmology_eBOSS_DR16_LRGxELG"
              },
              {
                  "source_id": "lrgxelg_readme",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/README.md",
                  "role": "repository_provenance_note",
                  "source_family": "icosmology_eBOSS_DR16_LRGxELG"
              }
          ]

          EXPECTED_ORDER_PATTERN = [
              {"index": 1, "observable": "DM_ov_rd", "z_expected": 0.70, "role": "BAO_transverse_distance"},
              {"index": 2, "observable": "DH_ov_rd", "z_expected": 0.70, "role": "BAO_radial_distance"},
              {"index": 3, "observable": "fsigma8", "z_expected": 0.70, "role": "RSD_growth"},
              {"index": 4, "observable": "DM_ov_rd", "z_expected": 0.845, "role": "BAO_transverse_distance"},
              {"index": 5, "observable": "DH_ov_rd", "z_expected": 0.845, "role": "BAO_radial_distance"},
              {"index": 6, "observable": "fsigma8", "z_expected": 0.845, "role": "RSD_growth"}
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample rows were parsed.",
              "CAMB produced the final reference vector.",
              "The raw LRGxELG covariance has been ingested.",
              "The raw LRGxELG value file replaces source-locked eBOSS LRG/ELG/QSO values.",
              "The LRGxELG two-redshift product is the same as the full eBOSS family covariance.",
              "The eBOSS family points are independent by default.",
              "The eBOSS sign pattern is a final physical conclusion.",
              "Pressure magnitude can be interpreted before covariance is source-locked.",
              "BIC, likelihood, or posterior comparison has been run.",
              "Public-facing validation claims are allowed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_152_limited_lrgxelg_parser_design_guarded",
                  "purpose": "Design a guarded parser for the LRGxELG two-redshift BAO/RSD vector and 6x6 covariance only.",
                  "why_next": "Inline labels and covariance shape may be enough for parser design, but not for pressure interpretation."
              },
              {
                  "priority": 2,
                  "route_id": "v4_152_lrgxelg_provenance_source_lock",
                  "purpose": "Tie the repository files to Zhao et al. 2020 and official/public provenance before any ingestion.",
                  "why_next": "The repository is useful, but provenance must be reviewed before treating it as source-clean."
              },
              {
                  "priority": 3,
                  "route_id": "v4_152_manifest_rows_materializer",
                  "purpose": "Materialize manifest rows for reachable value, covariance, README, and paper sources.",
                  "why_next": "The source package still needs a manifest."
              },
              {
                  "priority": 4,
                  "route_id": "v4_152_reference_vector_generation_or_request",
                  "purpose": "Create or request a source-backed 12-redshift reference vector table.",
                  "why_next": "Reference vector/covariance remains missing."
              }
          ]

          failed_gates = []
          warnings = [
              "variable_order_review_only",
              "inline_comments_used_for_label_extraction",
              "repository_provenance_not_final_authority",
              "limited_LRGxELG_only_not_QSO_not_full_eBOSS_family",
              "covariance_not_ingested",
              "pressure_not_recomputed",
              "reference_vector_still_missing",
              "not_validation"
          ]

          def fetch_text(source):
              record = {
                  "source_id": source["source_id"],
                  "url": source["url"],
                  "role": source["role"],
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "sha256_16": "",
                  "error": "",
                  "claim_boundary": "fetch_status_only_not_ingestion"
              }
              text = ""
              try:
                  req = urllib.request.Request(
                      source["url"],
                      headers={
                          "User-Agent": "TAIRID-v4.151-variable-order-review/1.0",
                          "Accept": "text/plain,*/*"
                      }
                  )
                  with urllib.request.urlopen(req, timeout=45) as response:
                      raw = response.read(2_000_000)
                      text = raw.decode("utf-8", errors="replace")
                      record["fetch_ok"] = True
                      record["status_code"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      record["bytes_read"] = len(raw)
                      record["sha256_16"] = hashlib.sha256(raw).hexdigest()[:16]
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, text

          def parse_numeric_values(text):
              rows = []
              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if not line:
                      continue
                  if "#" in line:
                      numeric_part, comment = line.split("#", 1)
                  else:
                      numeric_part, comment = line, ""
                  parts = numeric_part.replace(",", " ").split()
                  values = []
                  ok = True
                  for part in parts:
                      try:
                          values.append(float(part))
                      except Exception:
                          ok = False
                          break
                  if ok and values:
                      rows.append((values, comment.strip(), raw_line.strip()))
              return rows

          def normalize_observable(comment):
              lower = comment.lower().replace("\\", "")
              if "dm" in lower and "rd" in lower:
                  return "DM_ov_rd"
              if "dh" in lower and "rd" in lower:
                  return "DH_ov_rd"
              if "sigma" in lower or "σ" in lower or "fsig" in lower:
                  return "fsigma8"
              return "unknown"

          def parse_comment_z(comment):
              match = re.search(r"z\s*=\s*([0-9.]+)", comment)
              if not match:
                  return ""
              try:
                  return float(match.group(1))
              except Exception:
                  return ""

          def analyze_value_file(text):
              parsed_rows = parse_numeric_values(text)
              records = []
              for idx, (values, comment, raw_line) in enumerate(parsed_rows, start=1):
                  z_value = values[0] if len(values) >= 1 else ""
                  measurement = values[1] if len(values) >= 2 else ""
                  sigma = values[2] if len(values) >= 3 else ""
                  observable = normalize_observable(comment)
                  comment_z = parse_comment_z(comment)
                  expected = EXPECTED_ORDER_PATTERN[idx - 1] if idx <= len(EXPECTED_ORDER_PATTERN) else {}
                  expected_obs = expected.get("observable", "")
                  expected_z = expected.get("z_expected", "")
                  z_matches_expected = False
                  if isinstance(z_value, float) and isinstance(expected_z, float):
                      z_matches_expected = abs(z_value - expected_z) < 0.002
                  observable_matches_expected = observable == expected_obs
                  records.append({
                      "order_index": idx,
                      "z_value": z_value,
                      "measurement": measurement,
                      "sigma": sigma,
                      "inline_label": comment,
                      "observable": observable,
                      "comment_z": comment_z,
                      "expected_observable": expected_obs,
                      "expected_z": expected_z,
                      "z_matches_expected": z_matches_expected,
                      "observable_matches_expected": observable_matches_expected,
                      "raw_line_preview": raw_line[:220],
                      "claim_boundary": "label_and_value_structure_only_not_scientific_ingestion"
                  })
              return records

          def analyze_covariance_file(text):
              rows = []
              for values, comment, raw_line in parse_numeric_values(text):
                  rows.append(values)
              n_rows = len(rows)
              column_counts = sorted(set(len(row) for row in rows))
              uniform_width = len(column_counts) == 1 and n_rows > 0
              n_cols = column_counts[0] if uniform_width else 0
              square = uniform_width and n_rows == n_cols and n_rows > 1
              symmetric = False
              max_abs_asym = ""
              diagonal = []
              positive_diag = False
              positive_definite = False
              min_pivot = ""
              if square:
                  max_asym = 0.0
                  for i in range(n_rows):
                      diagonal.append(rows[i][i])
                      for j in range(n_cols):
                          max_asym = max(max_asym, abs(rows[i][j] - rows[j][i]))
                  symmetric = max_asym < 1e-10
                  max_abs_asym = max_asym
                  positive_diag = all(value > 0 for value in diagonal)
                  positive_definite, min_pivot = cholesky_positive_definite(rows)
              return {
                  "numeric_row_count": n_rows,
                  "column_count_set": ",".join(str(c) for c in column_counts) if column_counts else "none",
                  "uniform_width": uniform_width,
                  "square_matrix_hint": square,
                  "matrix_dimension": n_rows if square else 0,
                  "symmetric_hint": symmetric,
                  "max_abs_asymmetry": max_abs_asym,
                  "positive_diagonal": positive_diag,
                  "positive_definite_hint": positive_definite,
                  "min_cholesky_pivot": min_pivot,
                  "diagonal_values": ",".join(f"{value:.12g}" for value in diagonal),
                  "claim_boundary": "covariance_shape_diagnostic_only_not_ingestion"
              }, rows

          def cholesky_positive_definite(matrix):
              n = len(matrix)
              if n == 0:
                  return False, ""
              L = [[0.0] * n for _ in range(n)]
              min_pivot = None
              try:
                  for i in range(n):
                      for j in range(i + 1):
                          s = sum(L[i][k] * L[j][k] for k in range(j))
                          if i == j:
                              pivot = matrix[i][i] - s
                              if min_pivot is None or pivot < min_pivot:
                                  min_pivot = pivot
                              if pivot <= 0:
                                  return False, pivot
                              L[i][j] = math.sqrt(pivot)
                          else:
                              L[i][j] = (matrix[i][j] - s) / L[j][j]
                  return True, min_pivot if min_pivot is not None else ""
              except Exception:
                  return False, min_pivot if min_pivot is not None else ""

          def compare_diagonal_to_sigma(value_records, covariance_rows):
              records = []
              if not covariance_rows:
                  return records
              for row in value_records:
                  idx = int(row["order_index"]) - 1
                  sigma = row["sigma"]
                  cov_diag = covariance_rows[idx][idx] if idx < len(covariance_rows) and idx < len(covariance_rows[idx]) else ""
                  sigma_squared = sigma * sigma if isinstance(sigma, float) else ""
                  abs_delta = abs(cov_diag - sigma_squared) if isinstance(sigma_squared, float) and isinstance(cov_diag, float) else ""
                  rel_delta = abs_delta / max(abs(cov_diag), 1e-30) if isinstance(abs_delta, float) and isinstance(cov_diag, float) else ""
                  records.append({
                      "order_index": row["order_index"],
                      "observable": row["observable"],
                      "z_value": row["z_value"],
                      "sigma": sigma,
                      "sigma_squared": sigma_squared,
                      "covariance_diagonal": cov_diag,
                      "absolute_delta": abs_delta,
                      "relative_delta": rel_delta,
                      "matches_within_tolerance": isinstance(rel_delta, float) and rel_delta < 1e-8,
                      "claim_boundary": "diagonal_consistency_check_only_not_ingestion"
                  })
              return records

          def analyze_readme(text):
              lower = text.lower()
              return {
                  "nonempty_line_count": len([line for line in text.splitlines() if line.strip()]),
                  "mentions_bao": "bao" in lower,
                  "mentions_rsd": "rsd" in lower,
                  "mentions_zhao": "zhao" in lower,
                  "mentions_arxiv_2007_09011": "2007.09011" in lower,
                  "preview": " | ".join(line.strip()[:240] for line in text.splitlines() if line.strip())[:800],
                  "claim_boundary": "repository_readme_context_only_not_provenance_lock"
              }

          fetch_records = []
          fetched_text = {}
          for source in RAW_FILES:
              fetch_record, text = fetch_text(source)
              fetch_records.append(fetch_record)
              fetched_text[source["source_id"]] = text

          value_records = analyze_value_file(fetched_text.get("lrgxelg_value_file", ""))
          covariance_record, covariance_rows = analyze_covariance_file(fetched_text.get("lrgxelg_covariance_file", ""))
          readme_record = analyze_readme(fetched_text.get("lrgxelg_readme", ""))

          diagonal_consistency_records = compare_diagonal_to_sigma(value_records, covariance_rows)

          value_order_count = len(value_records)
          value_rows_have_inline_labels = value_order_count > 0 and all(str(row["inline_label"]).strip() for row in value_records)
          order_matches_expected = value_order_count == 6 and all(row["observable_matches_expected"] and row["z_matches_expected"] for row in value_records)
          covariance_dimension_matches_value_order = covariance_record["square_matrix_hint"] and covariance_record["matrix_dimension"] == value_order_count
          diagonal_matches_sigma = len(diagonal_consistency_records) == value_order_count and all(row["matches_within_tolerance"] for row in diagonal_consistency_records)
          readme_context_present = readme_record["mentions_bao"] and readme_record["mentions_rsd"] and readme_record["mentions_arxiv_2007_09011"]

          fsigma8_records = [row for row in value_records if row["observable"] == "fsigma8"]
          bao_records = [row for row in value_records if row["observable"] in ["DM_ov_rd", "DH_ov_rd"]]
          z_values = sorted(set(row["z_value"] for row in value_records if isinstance(row["z_value"], float)))

          parser_design_readiness = (
              order_matches_expected
              and covariance_dimension_matches_value_order
              and diagonal_matches_sigma
              and covariance_record["symmetric_hint"]
              and covariance_record["positive_definite_hint"]
              and readme_context_present
          )

          limited_scope_records = [
              {
                  "scope_id": "allowed_limited_scope",
                  "scope": "LRGxELG two-redshift BAO/RSD vector at z=0.70 and z=0.845 with 6x6 covariance",
                  "allowed_for_next_design": parser_design_readiness,
                  "not_allowed_scope": "full eBOSS LRG/ELG/QSO family covariance, QSO covariance, final RSD pressure, or TAIRID validation",
                  "claim_boundary": "parser_design_scope_only_not_ingestion"
              }
          ]

          if parser_design_readiness:
              selected_next_route = "limited_lrgxelg_parser_design_guarded"
              next_allowed_step = (
                  "Proceed to v4.152 guarded limited LRGxELG parser design for the 6-variable BAO/RSD vector and 6x6 covariance only. "
                  "Do not ingest it into final pressure, do not treat it as QSO/full-family covariance, and do not run BIC/likelihood/posterior comparison or validation."
              )
          else:
              selected_next_route = "provenance_or_variable_order_repair"
              next_allowed_step = (
                  "Proceed to v4.152 provenance or variable-order repair before any parser design. "
                  "Do not ingest covariance, recompute pressure, run BIC/likelihood/posterior comparison, or make validation claims."
              )

          raw_candidate_ingested = False
          covariance_ingested = False
          source_data_ingested = False
          pressure_recomputed = False
          likelihood_or_bic_run = False
          final_pressure_ready = False

          upstream = UPSTREAM_LOCKS["v4_150_raw_candidate_followup_metadata_locator"]

          if upstream["selected_next_route"] != "raw_candidate_variable_order_review":
              failed_gates.append("upstream_route_not_variable_order_review")
          if len(fetch_records) != 3:
              failed_gates.append("fetch_record_count_mismatch")
          if not value_records and all(row["fetch_ok"] for row in fetch_records[:2]):
              failed_gates.append("value_records_missing_despite_fetch")
          if parser_design_readiness and selected_next_route != "limited_lrgxelg_parser_design_guarded":
              failed_gates.append("parser_ready_route_not_selected")
          if raw_candidate_ingested:
              failed_gates.append("raw_candidate_unexpectedly_ingested")
          if covariance_ingested:
              failed_gates.append("covariance_unexpectedly_ingested")
          if source_data_ingested:
              failed_gates.append("source_data_unexpectedly_ingested")
          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")
          if likelihood_or_bic_run:
              failed_gates.append("likelihood_or_bic_unexpectedly_run")
          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "tairid cosmology is validated",
              "standard cosmology is disproven",
              "final rsd pressure score",
              "raw lrgxelg covariance has been ingested",
              "lrgxelg two-redshift product is the same as the full eboss family covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "raw_candidate_variable_order_review_passed_inline_order_and_covariance_consistency_recorded_ready_for_limited_parser_design_or_repair"

          rule_results = [
              {"rule_id": "workflow_name_sorts_top", "pass": True, "result": "workflow name begins with 000 TAIRID", "boundary": "Navigation convenience only."},
              {"rule_id": "node24_opt_in_preserved", "pass": True, "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved", "boundary": "Warning cleanup only."},
              {"rule_id": "upstream_v4_150_carried", "pass": upstream["selected_next_route"] == "raw_candidate_variable_order_review", "result": "v4.150 selected variable-order review", "boundary": "Carry-forward only."},
              {"rule_id": "raw_and_readme_fetch_status_recorded", "pass": len(fetch_records) == 3, "result": f"fetch_ok_count={sum(1 for row in fetch_records if row['fetch_ok'])}", "boundary": "Fetch status only."},
              {"rule_id": "inline_value_order_extracted", "pass": value_order_count >= 0, "result": f"value_order_count={value_order_count}; order_matches_expected={order_matches_expected}", "boundary": "Inline labels only, not ingestion."},
              {"rule_id": "fsigma8_rows_identified", "pass": len(fsigma8_records) >= 0, "result": f"fsigma8_record_count={len(fsigma8_records)}", "boundary": "Growth rows identified, not used."},
              {"rule_id": "bao_rows_identified", "pass": len(bao_records) >= 0, "result": f"bao_record_count={len(bao_records)}", "boundary": "BAO rows identified, not used."},
              {"rule_id": "covariance_shape_recorded", "pass": True, "result": f"square={covariance_record['square_matrix_hint']}; dimension={covariance_record['matrix_dimension']}; pd={covariance_record['positive_definite_hint']}", "boundary": "Shape only."},
              {"rule_id": "covariance_dimension_vs_order_recorded", "pass": True, "result": f"covariance_dimension_matches_value_order={covariance_dimension_matches_value_order}", "boundary": "Compatibility only."},
              {"rule_id": "diagonal_vs_sigma_check_recorded", "pass": True, "result": f"diagonal_matches_sigma={diagonal_matches_sigma}", "boundary": "Consistency check only."},
              {"rule_id": "readme_context_recorded", "pass": True, "result": f"readme_context_present={readme_context_present}", "boundary": "Repository context only."},
              {"rule_id": "limited_scope_declared", "pass": len(limited_scope_records) == 1, "result": limited_scope_records[0]["scope"], "boundary": "Not full eBOSS family."},
              {"rule_id": "parser_design_readiness_classified", "pass": True, "result": f"parser_design_readiness={parser_design_readiness}; selected_next_route={selected_next_route}", "boundary": "Design readiness only."},
              {"rule_id": "raw_candidates_not_ingested", "pass": raw_candidate_ingested is False, "result": "raw candidates not ingested", "boundary": "No covariance ingestion."},
              {"rule_id": "covariance_not_ingested", "pass": covariance_ingested is False, "result": "covariance not ingested", "boundary": "No eBOSS covariance use."},
              {"rule_id": "source_data_not_ingested", "pass": source_data_ingested is False, "result": "source data not ingested", "boundary": "No source value extraction."},
              {"rule_id": "pressure_not_recomputed", "pass": pressure_recomputed is False, "result": "pressure not recomputed", "boundary": "No final score."},
              {"rule_id": "likelihood_bic_not_run", "pass": likelihood_or_bic_run is False, "result": "no likelihood, BIC, or posterior comparison run", "boundary": "No model comparison."},
              {"rule_id": "final_pressure_and_validation_blocked", "pass": final_pressure_ready is False, "result": "final pressure and validation remain blocked", "boundary": "No validation claim."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 15, "result": f"blocked_claims={len(BLOCKED_CLAIMS)}", "boundary": "No validation or final pressure claim."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "", "result": route_decision, "boundary": "Route decision does not validate the model."}
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_151_rules_passed")

          if failed_gates:
              readiness_label = "raw_candidate_variable_order_review_failed"
              next_allowed_step = "Repair raw candidate variable-order review before continuing."
          else:
              readiness_label = route_decision

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "fetch_ok_count": sum(1 for row in fetch_records if row["fetch_ok"]),
              "value_order_count": value_order_count,
              "value_rows_have_inline_labels": value_rows_have_inline_labels,
              "order_matches_expected": order_matches_expected,
              "z_values": ",".join(str(z) for z in z_values),
              "fsigma8_record_count": len(fsigma8_records),
              "bao_record_count": len(bao_records),
              "covariance_dimension": covariance_record["matrix_dimension"],
              "covariance_dimension_matches_value_order": covariance_dimension_matches_value_order,
              "covariance_symmetric_hint": covariance_record["symmetric_hint"],
              "covariance_positive_definite_hint": covariance_record["positive_definite_hint"],
              "diagonal_matches_sigma": diagonal_matches_sigma,
              "readme_context_present": readme_context_present,
              "parser_design_readiness": parser_design_readiness,
              "selected_next_route": selected_next_route,
              "raw_candidate_ingested": raw_candidate_ingested,
              "source_data_ingested": source_data_ingested,
              "covariance_ingested": covariance_ingested,
              "pressure_recomputed": pressure_recomputed,
              "likelihood_or_bic_run": likelihood_or_bic_run,
              "reference_vector_still_missing": True,
              "reference_covariance_still_missing": True,
              "same_program_eBOSS_covariance_still_limited": True,
              "full_eBOSS_family_covariance_available": False,
              "QSO_covariance_available": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "raw_files": RAW_FILES,
              "expected_order_pattern": EXPECTED_ORDER_PATTERN,
              "fetch_records": fetch_records,
              "value_order_records": value_records,
              "covariance_structure_record": covariance_record,
              "diagonal_consistency_records": diagonal_consistency_records,
              "readme_context_record": readme_record,
              "limited_scope_records": limited_scope_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "selected_next_route": selected_next_route,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "selected_next_route": selected_next_route,
                  "parser_design_readiness": parser_design_readiness,
                  "value_order_count": value_order_count,
                  "covariance_dimension_matches_value_order": covariance_dimension_matches_value_order,
                  "diagonal_matches_sigma": diagonal_matches_sigma,
                  "raw_candidate_ingested": False,
                  "source_data_ingested": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_151_raw_candidate_variable_order_review.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "fetch_records_v4_151.csv",
              fetch_records,
              ["source_id", "url", "role", "fetch_ok", "status_code", "content_type", "bytes_read", "sha256_16", "error", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "value_order_records_v4_151.csv",
              value_records,
              ["order_index", "z_value", "measurement", "sigma", "inline_label", "observable", "comment_z", "expected_observable", "expected_z", "z_matches_expected", "observable_matches_expected", "raw_line_preview", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "covariance_structure_record_v4_151.csv",
              [covariance_record],
              ["numeric_row_count", "column_count_set", "uniform_width", "square_matrix_hint", "matrix_dimension", "symmetric_hint", "max_abs_asymmetry", "positive_diagonal", "positive_definite_hint", "min_cholesky_pivot", "diagonal_values", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "diagonal_consistency_records_v4_151.csv",
              diagonal_consistency_records,
              ["order_index", "observable", "z_value", "sigma", "sigma_squared", "covariance_diagonal", "absolute_delta", "relative_delta", "matches_within_tolerance", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "readme_context_record_v4_151.csv",
              [readme_record],
              ["nonempty_line_count", "mentions_bao", "mentions_rsd", "mentions_zhao", "mentions_arxiv_2007_09011", "preview", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "limited_scope_records_v4_151.csv",
              limited_scope_records,
              ["scope_id", "scope", "allowed_for_next_design", "not_allowed_scope", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_151.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_151.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_151.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.151 — Raw Candidate Variable Order Review")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.151 reviews the inline labels and covariance order of the LRGxELG raw candidate files. It can show whether the value file and 6x6 covariance file line up structurally. It does not ingest covariance, recompute pressure, run likelihood/BIC/posterior comparison, or validate TAIRID.")
          md.append("")
          md.append("## Value order")
          md.append("")
          md.append("| Index | z | Observable | Measurement | Sigma |")
          md.append("|---:|---:|---|---:|---:|")
          for row in value_records:
              md.append(f"| `{row['order_index']}` | `{row['z_value']}` | `{row['observable']}` | `{row['measurement']}` | `{row['sigma']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_151_raw_candidate_variable_order_review.json",
              "tairid_v4_151_raw_candidate_variable_order_review.md",
              "fetch_records_v4_151.csv",
              "value_order_records_v4_151.csv",
              "covariance_structure_record_v4_151.csv",
              "diagonal_consistency_records_v4_151.csv",
              "readme_context_record_v4_151.csv",
              "limited_scope_records_v4_151.csv",
              "next_route_options_v4_151.csv",
              "blocked_claims_v4_151.csv",
              "rule_results_v4_151.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_151_raw_candidate_variable_order_review.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.151 raw candidate variable order review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-151-raw-candidate-variable-order-review
          path: artifacts/tairid_v4_151_raw_candidate_variable_order_review/
