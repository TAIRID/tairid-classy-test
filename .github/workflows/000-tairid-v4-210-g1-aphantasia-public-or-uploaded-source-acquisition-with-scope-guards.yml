name: 000 TAIRID v4.210 - G1 Aphantasia Public Or Uploaded Source Acquisition With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-210-g1-aphantasia-public-or-uploaded-source-acquisition-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/public_sources/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-210-g1-aphantasia-source-acquisition:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.210 G1 aphantasia public or uploaded source acquisition
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_210_outputs
          cat > tairid_v4_210_outputs/run_v4_210.py <<'PY'
          import csv
          import json
          import os
          import urllib.request
          from pathlib import Path

          OUT = Path("tairid_v4_210_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "g1_aphantasia_public_or_uploaded_source_acquisition_passed_source_manifest_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no aphantasia validation",
              "no clinical diagnosis claim",
              "no claim that aphantasia dataset proves TAIRID",
              "no raw numbers moved between domains",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "source acquisition is not parsing",
              "source acquisition is not covariance",
              "dyslexia half plus source manifest does not close G1",
              "TAIRID not proved"
          ]

          V4_209_STATUS = {
              "version": "v4.209",
              "rule_pass_count": 11,
              "rule_total_count": 11,
              "failed_gates": [],
              "downloaded_count": 2,
              "label_rows": 70,
              "metric_file_rows": 210,
              "complete_candidate_axis_rows": 210,
              "delta_review_rows": 4,
              "task_three_axis_plus_plus_minus_count": 3,
              "task_four_axis_plus_plus_minus_minus_count": 3,
              "overall_three_axis_signature": "++-",
              "overall_four_axis_signature": "++--",
              "package_status": "partial_g1_dyslexia_axis_review_passed_candidate_rows_stageable",
              "selected_next_route": "g1_aphantasia_public_or_uploaded_source_acquisition_with_scope_guards"
          }

          PUBLIC_SOURCES = [
              {
                  "source_id": "HF_jmc255_aphantasia_drawing_dataset",
                  "gap_id": "G1",
                  "lane": "Aphantasia",
                  "source_type": "huggingface_dataset",
                  "api_url": "https://huggingface.co/api/datasets/jmc255/aphantasia_drawing_dataset",
                  "page_url": "https://huggingface.co/datasets/jmc255/aphantasia_drawing_dataset",
                  "original_repository_url": "https://osf.io/cahyd/",
                  "paper_doi_url": "https://doi.org/10.1016/j.cortex.2020.11.014",
                  "target_canonical_file": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "purpose": "source route for the aphantasia half of G1",
                  "claim_boundary": "source metadata only until files are downloaded and parsed"
              }
          ]

          UPLOADED_OR_STAGED_CANDIDATES = [
              {
                  "path": "data/neurotype/aphantasia_subject_axis_input.csv",
                  "role": "already-staged aphantasia-only axis input"
              },
              {
                  "path": "data/neurotype/g1_aphantasia_subject_axis_input.csv",
                  "role": "already-staged G1 aphantasia axis input"
              },
              {
                  "path": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "role": "combined G1 axis input"
              },
              {
                  "path": "data/public_sources/aphantasia/questionnaire-data.xlsx",
                  "role": "uploaded/public questionnaire spreadsheet candidate"
              },
              {
                  "path": "data/public_sources/aphantasia/aphantasia_drawing_dataset.parquet",
                  "role": "uploaded/public parquet candidate"
              },
              {
                  "path": "data/public_sources/aphantasia/",
                  "role": "uploaded/public aphantasia folder"
              }
          ]

          TARGET_SCHEMA = [
              {
                  "target_file": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "lane": "Aphantasia",
                  "needed_columns": "lane;subject_id;group_or_condition;boundary_or_task;propagation_reach_value;pacing_access_value;consolidation_growth_value;viability_or_outcome_value;source_or_dataset;notes",
                  "axis_mapping_plan": "propagation=visual imagery reach, likely VVIQ/imagery availability; pacing=burden, mismatch, reconstruction effort, or inverse ease; consolidation=reconstruction viability/accuracy or preserved spatial-structure support; viability=task outcome or burden-adjusted memory/perception performance",
                  "minimum_preview_rows": 4,
                  "truth_boundary": "subject/group axis rows required before combined G1 covariance or correlation"
              }
          ]

          EXPECTED_DATA_FIELDS = [
              {
                  "field": "subject_id",
                  "expected_role": "subject key",
                  "axis_use": "join/group key"
              },
              {
                  "field": "treatment",
                  "expected_role": "aphantasia/control group label",
                  "axis_use": "group_or_condition"
              },
              {
                  "field": "vviq_score",
                  "expected_role": "visual imagery vividness score",
                  "axis_use": "candidate propagation/reach axis"
              },
              {
                  "field": "osiq_score",
                  "expected_role": "object/spatial imagery questionnaire score",
                  "axis_use": "candidate propagation/consolidation support split after parsing"
              },
              {
                  "field": "memory drawings",
                  "expected_role": "drawings from memory for kitchen/livingroom/bedroom",
                  "axis_use": "candidate reconstruction viability or burden after scoring/feature extraction"
              },
              {
                  "field": "perception drawings",
                  "expected_role": "copy/perception drawings",
                  "axis_use": "control boundary for drawing ability/burden"
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def fetch_json(url, timeout=35):
              if os.environ.get("TAIRID_LOCAL_NO_NETWORK") == "1":
                  return {}, "fetch_skipped_local_no_network", "local check disables network"
              req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.210-aphantasia-source-acquisition/1.0"})
              try:
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      return json.loads(resp.read().decode("utf-8")), "ok", ""
              except Exception as exc:
                  return {}, "fetch_failed", type(exc).__name__ + ": " + str(exc)[:300]

          def classify_hf_file(name, size):
              low = name.lower()
              if low.endswith(".parquet"):
                  role = "parquet_candidate"
              elif low.endswith(".py"):
                  role = "dataset_script_candidate"
              elif low.endswith(".md") or "readme" in low:
                  role = "metadata_readme_candidate"
              elif any(low.endswith(ext) for ext in [".csv", ".tsv", ".xlsx", ".json", ".jsonl"]):
                  role = "tabular_candidate"
              elif any(x in low for x in ["image", "drawing", "png", "jpg", "jpeg"]):
                  role = "image_or_drawing_candidate"
              else:
                  role = "unknown_candidate"

              if size is None:
                  size_class = "unknown_size"
              elif size < 10_000_000:
                  size_class = "small"
              elif size < 100_000_000:
                  size_class = "medium"
              else:
                  size_class = "large"
              return role, size_class

          source_rows = []
          hf_file_rows = []
          local_candidate_rows = []
          acquisition_rows = []
          fetch_ok_count = 0
          hf_file_count = 0

          for source in PUBLIC_SOURCES:
              record, status, error = fetch_json(source["api_url"])
              if status == "ok":
                  fetch_ok_count += 1
              siblings = record.get("siblings", []) if record else []
              card_data = record.get("cardData", {}) if record else {}
              hf_file_count += len(siblings)

              source_rows.append({
                  "source_id": source["source_id"],
                  "gap_id": source["gap_id"],
                  "lane": source["lane"],
                  "source_type": source["source_type"],
                  "api_url": source["api_url"],
                  "page_url": source["page_url"],
                  "original_repository_url": source["original_repository_url"],
                  "paper_doi_url": source["paper_doi_url"],
                  "fetch_status": status,
                  "fetch_error": error,
                  "dataset_id": record.get("id", "") if record else "",
                  "sha": record.get("sha", "") if record else "",
                  "last_modified": record.get("lastModified", "") if record else "",
                  "private": record.get("private", "") if record else "",
                  "file_count": len(siblings),
                  "target_canonical_file": source["target_canonical_file"],
                  "purpose": source["purpose"],
                  "claim_boundary": source["claim_boundary"]
              })

              for sib in siblings:
                  name = sib.get("rfilename", sib.get("path", ""))
                  size = sib.get("size")
                  role, size_class = classify_hf_file(name, size)
                  download_url = "https://huggingface.co/datasets/jmc255/aphantasia_drawing_dataset/resolve/main/" + name
                  hf_file_rows.append({
                      "source_id": source["source_id"],
                      "gap_id": source["gap_id"],
                      "file_name": name,
                      "file_size_bytes": size if size is not None else "",
                      "size_class": size_class,
                      "file_role_guess": role,
                      "download_url": download_url,
                      "safe_next_action": "review_or_download_in_next_workflow",
                      "claim_boundary": "file listing only; not parsed data"
                  })

              if status == "ok" and siblings:
                  acquisition_status = "metadata_fetched_files_listed"
                  selected_next = "aphantasia_dataset_download_and_structure_probe_with_scope_guards"
              elif status == "ok":
                  acquisition_status = "metadata_fetched_no_files_listed"
                  selected_next = "aphantasia_osf_or_manual_source_review_with_scope_guards"
              else:
                  acquisition_status = "metadata_fetch_failed"
                  selected_next = "aphantasia_source_url_or_network_retry_with_scope_guards"

              acquisition_rows.append({
                  "source_id": source["source_id"],
                  "gap_id": source["gap_id"],
                  "lane": source["lane"],
                  "acquisition_status": acquisition_status,
                  "selected_next": selected_next,
                  "target_canonical_file": source["target_canonical_file"],
                  "truth_boundary": "acquisition manifest only; no aphantasia axis parsing yet"
              })

          for item in UPLOADED_OR_STAGED_CANDIDATES:
              path = Path(item["path"])
              exists = path.exists()
              if exists and path.is_file():
                  size = path.stat().st_size
              elif exists and path.is_dir():
                  size = sum(p.stat().st_size for p in path.rglob("*") if p.is_file())
              else:
                  size = ""
              local_candidate_rows.append({
                  "path": item["path"],
                  "role": item["role"],
                  "exists": exists,
                  "is_file": path.is_file() if exists else False,
                  "is_dir": path.is_dir() if exists else False,
                  "size_bytes": size,
                  "claim_boundary": "local/staged presence check only; not parsed data"
              })

          ranked_files = []
          for row in hf_file_rows:
              score = 0
              role = row["file_role_guess"]
              if role == "parquet_candidate":
                  score += 8
              if role == "tabular_candidate":
                  score += 7
              if role == "dataset_script_candidate":
                  score += 5
              if role == "metadata_readme_candidate":
                  score += 4
              if role == "image_or_drawing_candidate":
                  score += 2
              if row["size_class"] == "small":
                  score += 3
              elif row["size_class"] == "medium":
                  score += 2
              elif row["size_class"] == "large":
                  score -= 1
              ranked = dict(row)
              ranked["download_priority_score_not_validation"] = score
              ranked_files.append(ranked)
          ranked_files.sort(key=lambda r: (-r["download_priority_score_not_validation"], str(r["file_name"])))

          local_ready_count = sum(1 for r in local_candidate_rows if r["exists"])
          if fetch_ok_count and hf_file_count:
              package_status = "aphantasia_public_metadata_fetched_files_listed_no_parsing"
              selected_next_route = "aphantasia_dataset_download_and_structure_probe_with_scope_guards"
          elif local_ready_count:
              package_status = "aphantasia_local_or_uploaded_candidates_present_no_parsing"
              selected_next_route = "aphantasia_uploaded_source_structure_probe_with_scope_guards"
          elif fetch_ok_count:
              package_status = "aphantasia_public_metadata_fetched_no_files_listed"
              selected_next_route = "aphantasia_osf_or_manual_source_review_with_scope_guards"
          else:
              package_status = "aphantasia_public_metadata_fetch_failed_or_no_local_candidates"
              selected_next_route = "aphantasia_source_url_or_manual_upload_with_scope_guards"

          write_csv(OUT / "v4_210_v4_209_status_review.csv", [V4_209_STATUS], list(V4_209_STATUS.keys()))
          (OUT / "v4_210_v4_209_status_review.json").write_text(json.dumps(V4_209_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_210_aphantasia_public_source_manifest.csv", source_rows, [
              "source_id", "gap_id", "lane", "source_type", "api_url", "page_url",
              "original_repository_url", "paper_doi_url", "fetch_status", "fetch_error",
              "dataset_id", "sha", "last_modified", "private", "file_count",
              "target_canonical_file", "purpose", "claim_boundary"
          ])
          write_csv(OUT / "v4_210_huggingface_file_inventory.csv", hf_file_rows, [
              "source_id", "gap_id", "file_name", "file_size_bytes", "size_class",
              "file_role_guess", "download_url", "safe_next_action", "claim_boundary"
          ])
          write_csv(OUT / "v4_210_ranked_download_plan.csv", ranked_files, [
              "source_id", "gap_id", "file_name", "file_size_bytes", "size_class",
              "file_role_guess", "download_url", "download_priority_score_not_validation",
              "safe_next_action", "claim_boundary"
          ])
          write_csv(OUT / "v4_210_uploaded_or_staged_source_inventory.csv", local_candidate_rows, [
              "path", "role", "exists", "is_file", "is_dir", "size_bytes", "claim_boundary"
          ])
          write_csv(OUT / "v4_210_acquisition_route_decisions.csv", acquisition_rows, [
              "source_id", "gap_id", "lane", "acquisition_status",
              "selected_next", "target_canonical_file", "truth_boundary"
          ])
          write_csv(OUT / "v4_210_target_axis_schema.csv", TARGET_SCHEMA, [
              "target_file", "lane", "needed_columns", "axis_mapping_plan",
              "minimum_preview_rows", "truth_boundary"
          ])
          write_csv(OUT / "v4_210_expected_data_fields.csv", EXPECTED_DATA_FIELDS, [
              "field", "expected_role", "axis_use"
          ])

          claim_rows = [
              {
                  "claim": "Finding the aphantasia source closes G1.",
                  "status": "blocked",
                  "safe_wording": "The source route only shows where the aphantasia data can come from.",
                  "forbidden_wording": "G1 is closed."
              },
              {
                  "claim": "A Hugging Face listing is parsed aphantasia axis data.",
                  "status": "blocked",
                  "safe_wording": "A file listing is not parsed subject-axis rows.",
                  "forbidden_wording": "The listing is the axis table."
              },
              {
                  "claim": "Aphantasia source acquisition validates TAIRID.",
                  "status": "blocked",
                  "safe_wording": "Source acquisition is only a data route.",
                  "forbidden_wording": "Aphantasia data proves TAIRID."
              }
          ]
          write_csv(OUT / "v4_210_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          next_routes = [
              {
                  "priority": 1,
                  "route": selected_next_route,
                  "condition": package_status,
                  "next_action": "Download/probe the highest-ranked aphantasia candidate files or inspect uploaded candidates."
              },
              {
                  "priority": 2,
                  "route": "aphantasia_axis_mapping_to_g1_table_with_scope_guards",
                  "condition": "after aphantasia source structure is known",
                  "next_action": "Map subject-level aphantasia fields into G1 axis rows."
              },
              {
                  "priority": 3,
                  "route": "rerun_v4_195_after_both_g1_halves_are_staged",
                  "condition": "after dyslexia and aphantasia subject/group rows both exist",
                  "next_action": "Run combined G1 subject-axis covariance/correlation preview."
              }
          ]
          write_csv(OUT / "v4_210_next_routes.csv", next_routes, ["priority", "route", "condition", "next_action"])

          route_decision = {
              "version": "v4.210",
              "result_label": RESULT_LABEL,
              "clean_result": "The aphantasia half of G1 was moved into public/uploaded source acquisition. The workflow checks Hugging Face public metadata and any locally staged uploaded candidates, then writes a download/probe route.",
              "public_sources_checked": len(PUBLIC_SOURCES),
              "metadata_fetch_ok_count": fetch_ok_count,
              "hf_file_count": hf_file_count,
              "ranked_download_rows": len(ranked_files),
              "local_candidate_rows": len(local_candidate_rows),
              "local_ready_count": local_ready_count,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "aphantasia source acquisition manifest only; not parsing, not covariance, not validation",
              "blocked_claims": BLOCKED_CLAIMS
          }
          (OUT / "v4_210_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_210_scope_guards.json").write_text(json.dumps({
              "scope": "G1 aphantasia public or uploaded source acquisition",
              "source_manifest_closes_G1": False,
              "file_listing_is_axis_data": False,
              "source_acquisition_is_validation": False,
              "dyslexia_half_stageable": True,
              "aphantasia_half_parsed": False,
              "raw_numbers_moved_between_domains": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_210_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.210 - G1 Aphantasia Public Or Uploaded Source Acquisition",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.209 made the dyslexia half of G1 stageable as candidate rows. v4.210 starts the aphantasia half by checking the public aphantasia drawing dataset route and any uploaded/staged local candidates.",
              "",
              "Public sources checked: `" + str(len(PUBLIC_SOURCES)) + "`",
              "Metadata fetch OK count: `" + str(fetch_ok_count) + "`",
              "Hugging Face file count: `" + str(hf_file_count) + "`",
              "Ranked download rows: `" + str(len(ranked_files)) + "`",
              "Local candidate rows: `" + str(len(local_candidate_rows)) + "`",
              "Local ready count: `" + str(local_ready_count) + "`",
              "",
              "Package status: `" + package_status + "`",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_210_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_210_v4_209_status_review.csv",
              "v4_210_v4_209_status_review.json",
              "v4_210_aphantasia_public_source_manifest.csv",
              "v4_210_huggingface_file_inventory.csv",
              "v4_210_ranked_download_plan.csv",
              "v4_210_uploaded_or_staged_source_inventory.csv",
              "v4_210_acquisition_route_decisions.csv",
              "v4_210_target_axis_schema.csv",
              "v4_210_expected_data_fields.csv",
              "v4_210_claim_boundary_matrix.csv",
              "v4_210_next_routes.csv",
              "v4_210_route_decision.json",
              "v4_210_scope_guards.json",
              "v4_210_blocked_claims.json",
              "v4_210_summary.md"
          ]

          rules = {
              "version_is_v4_210": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_209_status_reviewed": V4_209_STATUS["rule_pass_count"] == 11,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "source_manifest_written": (OUT / "v4_210_aphantasia_public_source_manifest.csv").exists(),
              "hf_inventory_written": (OUT / "v4_210_huggingface_file_inventory.csv").exists(),
              "local_inventory_written": (OUT / "v4_210_uploaded_or_staged_source_inventory.csv").exists(),
              "target_schema_written": (OUT / "v4_210_target_axis_schema.csv").exists(),
              "selected_route_present": bool(selected_next_route),
              "no_g1_closure_claim": True,
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.210",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "public_sources_checked": len(PUBLIC_SOURCES),
              "metadata_fetch_ok_count": fetch_ok_count,
              "hf_file_count": hf_file_count,
              "ranked_download_rows": len(ranked_files),
              "local_candidate_rows": len(local_candidate_rows),
              "local_ready_count": local_ready_count,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "aphantasia_source_acquisition_only_no_validation"
          }
          (OUT / "v4_210_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.210 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_210_outputs/run_v4_210.py

      - name: Upload v4.210 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-210-g1-aphantasia-public-or-uploaded-source-acquisition-output
          path: tairid_v4_210_outputs/
