name: 001 TAIRID v4.234 - Holdout Source Locator Reference Scaffold

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-234-holdout-source-locator-reference-scaffold.yml"

permissions:
  contents: read

jobs:
  holdout-source-locator-reference-scaffold:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.234 Holdout Source Locator Reference Scaffold is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.234 holdout locator reference scaffold
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import json
          import time
          import zipfile

          VERSION = "v4.234"
          ROUTE = "external_holdout_source_locator_or_stronger_lcdm_reference_scaffold_after_v4_233"
          EXPECTED_RESULT = "v4_234_holdout_source_locator_reference_scaffold_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_235_review_locator_results_or_fill_stronger_lcdm_reference_manifest"

          OUT = Path("tairid_v4_234_holdout_source_locator_reference_scaffold_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-234-holdout-source-locator-reference-scaffold-output.zip"

          CURRENT_USED_SOURCE_URLS = [
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8_covtot.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/qso/sdss_DR16_QSO_FSBAO_DMDHfs8.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/qso/sdss_DR16_QSO_FSBAO_DMDHfs8_covtot.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/elg/sdss_DR16_ELG_BAO_DVtable.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/elg/sdss_DR16_ELG_FSBAO_DMDHfs8gridlikelihood.txt",
          ]

          LOCATOR_TARGETS = [
              {
                  "target_id": "cosmosis_standard_library_main",
                  "owner": "cosmosis-developers",
                  "repo": "cosmosis-standard-library",
                  "branch": "main",
                  "target_reason": "known public likelihood/data repository; current exact source files must be excluded from holdout approval",
              },
              {
                  "target_id": "cosmosis_standard_library_master",
                  "owner": "cosmosis-developers",
                  "repo": "cosmosis-standard-library",
                  "branch": "master",
                  "target_reason": "fallback branch for public likelihood/data repository",
              },
              {
                  "target_id": "cobaya_bao_data_main",
                  "owner": "CobayaSampler",
                  "repo": "bao_data",
                  "branch": "main",
                  "target_reason": "public BAO data locator target for external candidate review",
              },
              {
                  "target_id": "cobaya_bao_data_master",
                  "owner": "CobayaSampler",
                  "repo": "bao_data",
                  "branch": "master",
                  "target_reason": "fallback branch for public BAO data locator target",
              },
              {
                  "target_id": "cobaya_repository_main",
                  "owner": "CobayaSampler",
                  "repo": "cobaya",
                  "branch": "main",
                  "target_reason": "possible bundled likelihood/reference examples; locator only",
              },
              {
                  "target_id": "cobaya_repository_master",
                  "owner": "CobayaSampler",
                  "repo": "cobaya",
                  "branch": "master",
                  "target_reason": "fallback branch for possible bundled likelihood/reference examples",
              },
          ]

          FROZEN_PREDICTIONS = [
              {
                  "freeze_id": "freeze_001_primary_qso_growth",
                  "source_family": "QSO_or_QSO_like_high_redshift_growth_surface",
                  "frozen_prediction": "f_sigma8 residual pressure remains positive against a stronger explicit reference if the TAIRID source-surface pressure lane is real.",
                  "expected_direction": "+",
                  "expected_pressure_class": "stable_positive_pressure_or_positive_with_zero_guard_band",
              },
              {
                  "freeze_id": "freeze_002_secondary_qso_radial",
                  "source_family": "QSO_or_QSO_like_high_redshift_radial_geometry",
                  "frozen_prediction": "D_H_over_r_sound should remain nonnegative or positive more often than negative if the radial pacing surface is coupled to the QSO pressure lane.",
                  "expected_direction": "+/0",
                  "expected_pressure_class": "positive_with_zero_guard_band_or_stable_zero_guard",
              },
              {
                  "freeze_id": "freeze_003_control_lrg_growth",
                  "source_family": "LRG_or_LRG_like_lower_redshift_growth_surface",
                  "frozen_prediction": "LRG-like growth should not show the same stable positive pressure as high-redshift QSO-like growth.",
                  "expected_direction": "0_or_not_stable_positive",
                  "expected_pressure_class": "stable_zero_guard_or_mixed_or_negative_with_zero_guard_band",
              },
              {
                  "freeze_id": "freeze_004_geometry_compressed_lane",
                  "source_family": "compressed_geometry_DV_like_lane",
                  "frozen_prediction": "Compressed geometry alone should not be promoted as the primary TAIRID pressure lane from current data.",
                  "expected_direction": "mostly_0_or_not_primary",
                  "expected_pressure_class": "stable_zero_guard_or_secondary_only",
              },
          ]

          HOLDOUT_RULES = [
              {"rule_id": "holdout_rule_001", "rule": "Exclude the exact source files already used in v4.223-v4.232."},
              {"rule_id": "holdout_rule_002", "rule": "Freeze prediction and failure conditions before parsing or scoring any holdout candidate."},
              {"rule_id": "holdout_rule_003", "rule": "Keep source family and tracer role explicit."},
              {"rule_id": "holdout_rule_004", "rule": "Use explicit reference/model values before calling anything a residual."},
              {"rule_id": "holdout_rule_005", "rule": "Preserve covariance or likelihood surface type."},
              {"rule_id": "holdout_rule_006", "rule": "Record failure conditions before running a holdout test."},
              {"rule_id": "holdout_rule_007", "rule": "Keep validation language blocked even if a future holdout matches."},
              {"rule_id": "holdout_rule_008", "rule": "Keep combined LRG/ELG/QSO matrix blocked until source-surface guards pass."},
          ]

          CANDIDATE_FAMILIES = [
              "primary_qso_growth_holdout_candidate",
              "secondary_qso_radial_holdout_candidate",
              "lrg_growth_control_candidate",
              "geometry_control_candidate",
              "non_qso_growth_surface_candidate",
              "cross_surface_or_current_source_not_holdout",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def github_tree_url(owner, repo, branch):
              return f"https://api.github.com/repos/{owner}/{repo}/git/trees/{branch}?recursive=1"

          def github_raw_url(owner, repo, branch, path_text):
              return f"https://raw.githubusercontent.com/{owner}/{repo}/{branch}/{path_text}"

          def fetch_json(url, timeout=30):
              req = Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v4.234-holdout-locator",
                      "Accept": "application/vnd.github+json",
                  },
              )
              with urlopen(req, timeout=timeout) as response:
                  return json.loads(response.read().decode("utf-8", errors="replace"))

          def lower(text):
              return str(text or "").lower()

          def suffix_for(path_text):
              name = lower(path_text).split("/")[-1]
              if name.endswith(".tar.gz"):
                  return ".tar.gz"
              if "." not in name:
                  return ""
              return "." + name.split(".")[-1]

          def should_keep_path(path_text):
              text = lower(path_text)
              terms = [
                  "qso", "quasar", "lrg", "elg", "lya", "lyxqso",
                  "fsigma", "fsigma8", "growth", "rsd", "bao",
                  "dmdh", "dv", "wigglez", "vipers", "6df", "mgs",
                  "dr16", "dr12", "cov", "invcov", "likelihood"
              ]
              suffix = suffix_for(path_text)
              data_suffix = suffix in [".txt", ".dat", ".csv", ".tsv", ".json", ".yaml", ".yml", ".ini", ".py", ".gz", ".zip"]
              return data_suffix and any(term in text for term in terms)

          def classify_candidate(path_text, raw_url):
              text = lower(path_text)
              raw = lower(raw_url)
              is_current = raw in [lower(url) for url in CURRENT_USED_SOURCE_URLS]

              if is_current:
                  return "cross_surface_or_current_source_not_holdout", "excluded_current_exact_source"

              if ("qso" in text or "quasar" in text) and any(term in text for term in ["fsigma", "fsigma8", "fsbao", "growth", "rsd"]):
                  return "primary_qso_growth_holdout_candidate", "candidate_needs_review_not_approved"

              if ("qso" in text or "quasar" in text) and any(term in text for term in ["dmdh", "dh", "bao"]):
                  return "secondary_qso_radial_holdout_candidate", "candidate_needs_review_not_approved"

              if "lrg" in text and any(term in text for term in ["fsigma", "fsigma8", "fsbao", "growth", "rsd"]):
                  return "lrg_growth_control_candidate", "candidate_needs_review_not_approved"

              if any(term in text for term in ["wigglez", "vipers", "mgs", "6df", "6dfgs"]) and any(term in text for term in ["fsigma", "fsigma8", "growth", "rsd"]):
                  return "non_qso_growth_surface_candidate", "candidate_needs_review_not_approved"

              if any(term in text for term in ["dv", "dmdh", "bao"]) and "cov" not in text:
                  return "geometry_control_candidate", "candidate_needs_review_not_approved"

              if any(term in text for term in ["lya", "lyxqso", "cross"]):
                  return "cross_surface_or_current_source_not_holdout", "cross_surface_needs_special_review"

              return "cross_surface_or_current_source_not_holdout", "unclassified_or_not_holdout"

          def score_candidate(path_text, family, status):
              text = lower(path_text)
              score = 0
              if status == "excluded_current_exact_source":
                  return -100
              if family == "primary_qso_growth_holdout_candidate":
                  score += 50
              if family == "secondary_qso_radial_holdout_candidate":
                  score += 35
              if family == "lrg_growth_control_candidate":
                  score += 30
              if family == "non_qso_growth_surface_candidate":
                  score += 25
              if family == "geometry_control_candidate":
                  score += 10
              if "cov" in text or "invcov" in text:
                  score += 8
              if "dr16" in text:
                  score += 4
              if "dr12" in text:
                  score += 2
              return score

          target_status_rows = []
          candidate_rows = []

          for target in LOCATOR_TARGETS:
              url = github_tree_url(target["owner"], target["repo"], target["branch"])
              fetch_status = "not_attempted"
              error = ""
              tree_count = 0

              try:
                  payload = fetch_json(url)
                  tree = payload.get("tree", [])
                  tree_count = len(tree)
                  fetch_status = "fetched"
              except Exception as exc:
                  tree = []
                  fetch_status = "fetch_failed"
                  error = f"{type(exc).__name__}: {exc}"

              target_status_rows.append({
                  "target_id": target["target_id"],
                  "owner": target["owner"],
                  "repo": target["repo"],
                  "branch": target["branch"],
                  "tree_url": url,
                  "target_reason": target["target_reason"],
                  "fetch_status": fetch_status,
                  "tree_count": tree_count,
                  "error": error,
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

              for item in tree:
                  if item.get("type") != "blob":
                      continue
                  path_text = item.get("path", "")
                  if not should_keep_path(path_text):
                      continue

                  raw_url = github_raw_url(target["owner"], target["repo"], target["branch"], path_text)
                  family, status = classify_candidate(path_text, raw_url)
                  score = score_candidate(path_text, family, status)

                  candidate_rows.append({
                      "target_id": target["target_id"],
                      "owner": target["owner"],
                      "repo": target["repo"],
                      "branch": target["branch"],
                      "path": path_text,
                      "suffix": suffix_for(path_text),
                      "size_bytes": item.get("size", ""),
                      "raw_url": raw_url,
                      "candidate_family": family,
                      "candidate_score": score,
                      "holdout_status": status,
                      "approved_as_holdout": False,
                      "review_requirement": "human/source review plus frozen failure conditions before parsing",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

              time.sleep(0.25)

          candidate_rows.sort(key=lambda row: (-int(row["candidate_score"]), row["candidate_family"], row["raw_url"]))

          family_summary_rows = []
          for family in CANDIDATE_FAMILIES:
              rows = [row for row in candidate_rows if row["candidate_family"] == family]
              reviewable = [row for row in rows if row["holdout_status"] == "candidate_needs_review_not_approved"]
              excluded = [row for row in rows if row["holdout_status"] == "excluded_current_exact_source"]
              family_summary_rows.append({
                  "candidate_family": family,
                  "candidate_rows": len(rows),
                  "reviewable_candidate_rows": len(reviewable),
                  "excluded_current_source_rows": len(excluded),
                  "top_candidate_url": reviewable[0]["raw_url"] if reviewable else "",
                  "family_status": "reviewable_candidates_found" if reviewable else "no_reviewable_candidates_found",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

          holdout_manifest_template_rows = [
              {
                  "manifest_row_id": "manifest_001",
                  "target_role": "primary_qso_growth_holdout",
                  "source_family": "QSO_or_QSO_like_high_redshift_growth_surface",
                  "local_or_external_path": "PUT_REVIEWED_HOLDOUT_QSO_GROWTH_SOURCE_HERE",
                  "observable": "f_sigma8_or_comparable_growth",
                  "reference_needed": "stronger_lcdm_growth_reference",
                  "covariance_needed": "full_or_documented_covariance",
                  "status": "template_not_filled",
              },
              {
                  "manifest_row_id": "manifest_002",
                  "target_role": "secondary_qso_radial_holdout",
                  "source_family": "QSO_or_QSO_like_radial_geometry",
                  "local_or_external_path": "PUT_REVIEWED_HOLDOUT_QSO_RADIAL_SOURCE_HERE",
                  "observable": "D_H_over_r_sound_or_equivalent",
                  "reference_needed": "stronger_lcdm_distance_reference",
                  "covariance_needed": "full_or_documented_covariance",
                  "status": "template_not_filled",
              },
              {
                  "manifest_row_id": "manifest_003",
                  "target_role": "lrg_growth_control",
                  "source_family": "LRG_or_LRG_like_lower_redshift_growth_surface",
                  "local_or_external_path": "PUT_REVIEWED_LRG_CONTROL_SOURCE_HERE",
                  "observable": "f_sigma8_or_comparable_growth",
                  "reference_needed": "stronger_lcdm_growth_reference",
                  "covariance_needed": "full_or_documented_covariance",
                  "status": "template_not_filled",
              },
              {
                  "manifest_row_id": "manifest_004",
                  "target_role": "geometry_control",
                  "source_family": "BAO_or_compressed_geometry_surface",
                  "local_or_external_path": "PUT_REVIEWED_GEOMETRY_CONTROL_SOURCE_HERE",
                  "observable": "D_V_D_M_D_H_or_likelihood_coordinate",
                  "reference_needed": "stronger_lcdm_distance_reference",
                  "covariance_needed": "covariance_or_likelihood_surface",
                  "status": "template_not_filled",
              },
              {
                  "manifest_row_id": "manifest_005",
                  "target_role": "stronger_lcdm_reference",
                  "source_family": "reference_model",
                  "local_or_external_path": "PUT_REFERENCE_VALUES_OR_SCRIPT_HERE",
                  "observable": "D_M_D_H_fsigma8_reference_values",
                  "reference_needed": "self_documenting_reference",
                  "covariance_needed": "reference_uncertainty_or_assumption_note",
                  "status": "template_not_filled",
              },
              {
                  "manifest_row_id": "manifest_006",
                  "target_role": "failure_condition_checker",
                  "source_family": "guardrail",
                  "local_or_external_path": "PUT_FAILURE_LEDGER_OR_SCRIPT_HERE",
                  "observable": "pass_fail_weakening_conditions",
                  "reference_needed": "frozen_prediction_rows",
                  "covariance_needed": "not_applicable",
                  "status": "template_not_filled",
              },
          ]

          reference_scaffold_rows = [
              {
                  "scaffold_id": "reference_scaffold_001",
                  "reference_component": "distance_reference_DM_DH",
                  "minimum_output": "D_M/r_s and D_H/r_s at each source redshift",
                  "allowed_method": "external reference values or documented calculation",
                  "blocked_method": "unstated constants or hidden fit",
              },
              {
                  "scaffold_id": "reference_scaffold_002",
                  "reference_component": "growth_reference_fsigma8",
                  "minimum_output": "f_sigma8 at each source redshift",
                  "allowed_method": "documented ΛCDM growth calculation or external reference",
                  "blocked_method": "using observed value as its own reference",
              },
              {
                  "scaffold_id": "reference_scaffold_003",
                  "reference_component": "covariance_likelihood_boundary",
                  "minimum_output": "full covariance, inverse covariance, diagonal limitation, or grid-likelihood flag",
                  "allowed_method": "source-specific covariance/likelihood treatment",
                  "blocked_method": "fake covariance or silent diagonal substitution",
              },
              {
                  "scaffold_id": "reference_scaffold_004",
                  "reference_component": "model_comparison_boundary",
                  "minimum_output": "diagnostic vs likelihood vs model-selection status",
                  "allowed_method": "declare comparison type before scoring",
                  "blocked_method": "calling diagnostic residuals validation",
              },
              {
                  "scaffold_id": "reference_scaffold_005",
                  "reference_component": "TAIRID_prediction_formula_gap",
                  "minimum_output": "frozen sign rule, correction function, or source-surface transform",
                  "allowed_method": "explicit formula or machine-readable sign rule",
                  "blocked_method": "retuning after holdout result",
              },
              {
                  "scaffold_id": "reference_scaffold_006",
                  "reference_component": "holdout_failure_ledger",
                  "minimum_output": "pass/fail/weakening conditions before parse",
                  "allowed_method": "machine-readable failure rows",
                  "blocked_method": "posthoc success criteria",
              },
          ]

          failure_condition_checker_rows = [
              {
                  "failure_id": "failure_001",
                  "target_prediction": "QSO f_sigma8 primary pressure",
                  "machine_condition": "if_holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened",
                  "status": "pre_holdout_condition_written",
              },
              {
                  "failure_id": "failure_002",
                  "target_prediction": "QSO vs LRG growth contrast",
                  "machine_condition": "if_lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened",
                  "status": "pre_holdout_condition_written",
              },
              {
                  "failure_id": "failure_003",
                  "target_prediction": "QSO radial secondary support",
                  "machine_condition": "if_qso_radial_direction == '-' then secondary_support_weakened",
                  "status": "pre_holdout_condition_written",
              },
              {
                  "failure_id": "failure_004",
                  "target_prediction": "compressed geometry non-primary lane",
                  "machine_condition": "if_compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed",
                  "status": "pre_holdout_condition_written",
              },
              {
                  "failure_id": "failure_005",
                  "target_prediction": "stronger reference robustness",
                  "machine_condition": "if_stronger_reference_absorbs_pressure then baseline_pressure_not_tairid_specific",
                  "status": "pre_holdout_condition_written",
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "external_candidate_locator",
                  "permission_status": "allowed",
                  "reason": "Locator writes candidates only; it does not approve them as holdout evidence.",
              },
              {
                  "permission_scope": "candidate_as_holdout_evidence",
                  "permission_status": "blocked_until_review_and_manifest_fill",
                  "reason": "Candidates require source review, manifest fill, covariance/reference guard, and frozen failure conditions.",
              },
              {
                  "permission_scope": "current_exact_source_as_holdout",
                  "permission_status": "blocked",
                  "reason": "Exact current source URLs are excluded.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No validation without reviewed holdout or stronger reference comparison.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_235_review_locator_results",
                  "purpose": "review candidate rows and decide whether any source is eligible for holdout parsing",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_235_fill_stronger_lcdm_reference_manifest",
                  "purpose": "create explicit reference rows before any stronger residual claim",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_235_holdout_manifest_fill",
                  "purpose": "fill reviewed holdout source paths without using current exact source files",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_235_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until source-surface guards pass",
                  "activated": True,
              },
          ]

          current_source_exclusion_rows = []
          for url in CURRENT_USED_SOURCE_URLS:
              current_source_exclusion_rows.append({
                  "current_source_url": url,
                  "holdout_status": "excluded_from_holdout",
                  "reason": "Already used in v4.223-v4.232 source-surface/prediction-layer chain.",
              })

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before locator"},
              {"gate": "frozen_prediction_rows_equal_4", "passed": len(FROZEN_PREDICTIONS) == 4, "detail": f"frozen_prediction_rows = {len(FROZEN_PREDICTIONS)}"},
              {"gate": "holdout_rule_rows_equal_8", "passed": len(HOLDOUT_RULES) == 8, "detail": f"holdout_rule_rows = {len(HOLDOUT_RULES)}"},
              {"gate": "current_source_exclusion_rows_equal_6", "passed": len(current_source_exclusion_rows) == 6, "detail": f"current_source_exclusion_rows = {len(current_source_exclusion_rows)}"},
              {"gate": "locator_targets_equal_6", "passed": len(LOCATOR_TARGETS) == 6, "detail": f"locator_targets = {len(LOCATOR_TARGETS)}"},
              {"gate": "locator_target_status_rows_equal_6", "passed": len(target_status_rows) == 6, "detail": f"locator_target_status_rows = {len(target_status_rows)}"},
              {"gate": "external_candidate_rows_written", "passed": isinstance(candidate_rows, list), "detail": f"external_candidate_rows = {len(candidate_rows)}"},
              {"gate": "family_summary_rows_equal_6", "passed": len(family_summary_rows) == 6, "detail": f"family_summary_rows = {len(family_summary_rows)}"},
              {"gate": "holdout_manifest_template_rows_equal_6", "passed": len(holdout_manifest_template_rows) == 6, "detail": f"holdout_manifest_template_rows = {len(holdout_manifest_template_rows)}"},
              {"gate": "reference_scaffold_rows_equal_6", "passed": len(reference_scaffold_rows) == 6, "detail": f"reference_scaffold_rows = {len(reference_scaffold_rows)}"},
              {"gate": "failure_condition_checker_rows_equal_5", "passed": len(failure_condition_checker_rows) == 5, "detail": f"failure_condition_checker_rows = {len(failure_condition_checker_rows)}"},
              {"gate": "current_sources_excluded_rule_written", "passed": any(row["rule_id"] == "holdout_rule_001" for row in HOLDOUT_RULES), "detail": "current exact source exclusion rule present"},
              {"gate": "no_current_source_approved_as_holdout", "passed": all(row["approved_as_holdout"] is False for row in candidate_rows), "detail": "no candidate approved as holdout by locator"},
              {"gate": "permission_rows_equal_5", "passed": len(permission_rows) == 5, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "candidate_holdout_evidence_blocked", "passed": any(row["permission_scope"] == "candidate_as_holdout_evidence" and row["permission_status"] == "blocked_until_review_and_manifest_fill" for row in permission_rows), "detail": "candidate as holdout evidence blocked"},
              {"gate": "current_exact_source_holdout_blocked", "passed": any(row["permission_scope"] == "current_exact_source_as_holdout" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "current exact source as holdout blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_235_review_locator_results_or_fill_stronger_lcdm_reference_manifest", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_234_holdout_source_locator_reference_scaffold_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_234_frozen_prediction_rows.csv", FROZEN_PREDICTIONS)
          write_csv(OUT / "v4_234_holdout_rule_rows.csv", HOLDOUT_RULES)
          write_csv(OUT / "v4_234_current_source_exclusion_rows.csv", current_source_exclusion_rows)
          write_csv(OUT / "v4_234_locator_target_status_rows.csv", target_status_rows)
          write_csv(OUT / "v4_234_external_candidate_rows.csv", candidate_rows)
          write_csv(OUT / "v4_234_candidate_family_summary_rows.csv", family_summary_rows)
          write_csv(OUT / "v4_234_holdout_manifest_template_rows.csv", holdout_manifest_template_rows)
          write_csv(OUT / "v4_234_reference_scaffold_rows.csv", reference_scaffold_rows)
          write_csv(OUT / "v4_234_failure_condition_checker_rows.csv", failure_condition_checker_rows)
          write_csv(OUT / "v4_234_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_234_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_234_rule_checks.csv", checks)

          family_lines = [
              f"{row['candidate_family']}: candidates={row['candidate_rows']}, reviewable={row['reviewable_candidate_rows']}, excluded_current={row['excluded_current_source_rows']}"
              for row in family_summary_rows
          ]

          target_lines = [
              f"{row['target_id']}: {row['fetch_status']} tree_count={row['tree_count']}"
              for row in target_status_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "frozen_prediction_rows": len(FROZEN_PREDICTIONS),
              "holdout_rule_rows": len(HOLDOUT_RULES),
              "current_source_exclusion_rows": len(current_source_exclusion_rows),
              "locator_targets": len(LOCATOR_TARGETS),
              "locator_target_status_rows": len(target_status_rows),
              "external_candidate_rows": len(candidate_rows),
              "family_summary_rows": len(family_summary_rows),
              "holdout_manifest_template_rows": len(holdout_manifest_template_rows),
              "reference_scaffold_rows": len(reference_scaffold_rows),
              "failure_condition_checker_rows": len(failure_condition_checker_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "approves_holdout_candidate": False,
                  "current_exact_sources_allowed_as_holdout": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_234_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.234 Holdout Source Locator Reference Scaffold",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"frozen_prediction_rows = {summary['frozen_prediction_rows']}",
              f"holdout_rule_rows = {summary['holdout_rule_rows']}",
              f"current_source_exclusion_rows = {summary['current_source_exclusion_rows']}",
              f"locator_targets = {summary['locator_targets']}",
              f"locator_target_status_rows = {summary['locator_target_status_rows']}",
              f"external_candidate_rows = {summary['external_candidate_rows']}",
              f"family_summary_rows = {summary['family_summary_rows']}",
              f"holdout_manifest_template_rows = {summary['holdout_manifest_template_rows']}",
              f"reference_scaffold_rows = {summary['reference_scaffold_rows']}",
              f"failure_condition_checker_rows = {summary['failure_condition_checker_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Locator targets:",
              *target_lines,
              "",
              "Candidate family summary:",
              *family_lines,
              "",
              "Clean meaning: v4.234 locates possible external holdout/source candidates and scaffolds stronger LCDM reference requirements. It excludes exact current source files and does not approve any candidate as evidence.",
              "",
              "Truth boundary: no proof, no validation, no approved holdout candidate, no current exact source as holdout, no combined matrix.",
          ]
          (OUT / "v4_234_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"frozen_prediction_rows = {summary['frozen_prediction_rows']}")
          print(f"holdout_rule_rows = {summary['holdout_rule_rows']}")
          print(f"current_source_exclusion_rows = {summary['current_source_exclusion_rows']}")
          print(f"locator_targets = {summary['locator_targets']}")
          print(f"locator_target_status_rows = {summary['locator_target_status_rows']}")
          print(f"external_candidate_rows = {summary['external_candidate_rows']}")
          print(f"family_summary_rows = {summary['family_summary_rows']}")
          print(f"holdout_manifest_template_rows = {summary['holdout_manifest_template_rows']}")
          print(f"reference_scaffold_rows = {summary['reference_scaffold_rows']}")
          print(f"failure_condition_checker_rows = {summary['failure_condition_checker_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no approved holdout candidate, no current exact source as holdout, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.234 holdout source locator reference scaffold output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-234-holdout-source-locator-reference-scaffold-output
          path: |
            tairid_v4_234_holdout_source_locator_reference_scaffold_output/
            tairid-v4-234-holdout-source-locator-reference-scaffold-output.zip
