              {"gate": "all_manual_rows_no_auto_score", "passed": all("PUT_" in row["data_path_or_url"] or row["manual_fill_status"] == "blocked" or row["comparison_role"] == "model_comparison_boundary" for row in manual_manifest_scaffold_rows), "detail": "manual rows are templates or blocked"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "scaffold does not score holdouts"},
              {"gate": "truth_boundary_no_auto_manifest_fill", "passed": True, "detail": "no automatic manifest fill"},
              {"gate": "truth_boundary_primary_holdout_missing", "passed": True, "detail": "primary holdout remains missing"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_243_external_reference_calculator_or_secondary_control_review_packet", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_242_external_reference_manual_manifest_scaffold_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_242_inherited_v4_241_rows.csv", inherited_v4_241_rows)
          write_csv(OUT / "v4_242_frozen_prediction_rows.csv", frozen_prediction_rows)
          write_csv(OUT / "v4_242_external_reference_boundary_rows.csv", external_reference_boundary_rows)
          write_csv(OUT / "v4_242_manual_manifest_scaffold_rows.csv", manual_manifest_scaffold_rows)
          write_csv(OUT / "v4_242_secondary_control_review_packet_rows.csv", secondary_control_review_packet_rows)
          write_csv(OUT / "v4_242_failure_condition_rows.csv", failure_condition_rows)
          write_csv(OUT / "v4_242_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_242_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_242_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_242_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_242_rule_checks.csv", checks)

          inherited_lines = [
              f"{row['inherited_item']}: {row['value']} — {row['carry_forward_status']}"
              for row in inherited_v4_241_rows
          ]

          manifest_lines = [
              f"{row['comparison_role']}: {row['manual_fill_status']} — {row['allowed_use']}"
              for row in manual_manifest_scaffold_rows
          ]

          decision_lines = [
              f"{row['decision_id']}: {row['decision']} Next: {row['next_action']}"
              for row in decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_241_rows": len(inherited_v4_241_rows),
              "frozen_prediction_rows": len(frozen_prediction_rows),
              "external_reference_boundary_rows": len(external_reference_boundary_rows),
              "manual_manifest_scaffold_rows": len(manual_manifest_scaffold_rows),
              "secondary_control_review_packet_rows": len(secondary_control_review_packet_rows),
              "failure_condition_rows": len(failure_condition_rows),
              "readiness_rows": len(readiness_rows),
              "decision_rows": len(decision_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "primary_qso_growth_manifest_fill": "blocked",
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_holdout": False,
                  "auto_fills_manifest": False,
                  "primary_holdout_exists": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_242_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.242 External Reference Manual Manifest Scaffold",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_241_rows = {summary['inherited_v4_241_rows']}",
              f"frozen_prediction_rows = {summary['frozen_prediction_rows']}",
              f"external_reference_boundary_rows = {summary['external_reference_boundary_rows']}",
              f"manual_manifest_scaffold_rows = {summary['manual_manifest_scaffold_rows']}",
              f"secondary_control_review_packet_rows = {summary['secondary_control_review_packet_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"primary_qso_growth_manifest_fill = {summary['primary_qso_growth_manifest_fill']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Inherited v4.241 carry-forward:",
              *inherited_lines,
              "",
              "Manual manifest scaffold:",
              *manifest_lines,
              "",
              "Decisions:",
              *decision_lines,
              "",
              "Clean meaning: v4.242 turns the v4.241 locator result into an external-reference and manual-manifest scaffold. Primary QSO growth remains blocked because no clean primary holdout candidate exists. Secondary/control rows remain review-only.",
              "",
              "Truth boundary: no proof, no validation, no holdout scoring, no automatic manifest fill, no primary holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_242_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_241_rows = {summary['inherited_v4_241_rows']}")
          print(f"frozen_prediction_rows = {summary['frozen_prediction_rows']}")
          print(f"external_reference_boundary_rows = {summary['external_reference_boundary_rows']}")
          print(f"manual_manifest_scaffold_rows = {summary['manual_manifest_scaffold_rows']}")
          print(f"secondary_control_review_packet_rows = {summary['secondary_control_review_packet_rows']}")
          print(f"failure_condition_rows = {summary['failure_condition_rows']}")
          print(f"readiness_rows = {summary['readiness_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"primary_qso_growth_manifest_fill = {summary['primary_qso_growth_manifest_fill']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no holdout scoring, no automatic manifest fill, no primary holdout source, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.242 external reference manual manifest scaffold output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-242-external-reference-manual-manifest-scaffold-output
          path: |
            tairid_v4_242_external_reference_manual_manifest_scaffold_output/
            tairid-v4-242-external-reference-manual-manifest-scaffold-output.zip
