name: 001 TAIRID v4.242 - External Reference Manual Manifest Scaffold

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-242-external-reference-manual-manifest-scaffold.yml"

permissions:
  contents: read

jobs:
  external-reference-manual-manifest-scaffold:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.242 External Reference Manual Manifest Scaffold is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.242 external reference manual manifest scaffold
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import zipfile

          VERSION = "v4.242"
          ROUTE = "external_reference_boundary_or_manual_manifest_fill_scaffold_after_v4_241"
          EXPECTED_RESULT = "v4_242_external_reference_manual_manifest_scaffold_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_243_external_reference_calculator_or_secondary_control_review_packet"

          OUT = Path("tairid_v4_242_external_reference_manual_manifest_scaffold_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-242-external-reference-manual-manifest-scaffold-output.zip"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          inherited_v4_241_rows = [
              {
                  "inherited_from": "v4.241",
                  "inherited_item": "primary_qso_growth_candidate_rows",
                  "value": 0,
                  "meaning": "No clean primary QSO growth holdout candidate was found by the broader locator.",
                  "carry_forward_status": "blocks_primary_qso_growth_manifest_fill",
              },
              {
                  "inherited_from": "v4.241",
                  "inherited_item": "qso_radial_secondary_candidate_rows",
                  "value": 34,
                  "meaning": "QSO radial/geometry candidates exist but are secondary only.",
                  "carry_forward_status": "manual_review_only_not_primary_evidence",
              },
              {
                  "inherited_from": "v4.241",
                  "inherited_item": "lrg_growth_control_candidate_rows",
                  "value": 4,
                  "meaning": "LRG growth control candidates exist.",
                  "carry_forward_status": "manual_review_only_control_surface",
              },
              {
                  "inherited_from": "v4.241",
                  "inherited_item": "geometry_control_candidate_rows",
                  "value": 108,
                  "meaning": "Geometry control candidates exist.",
                  "carry_forward_status": "manual_review_only_geometry_control",
              },
              {
                  "inherited_from": "v4.241",
                  "inherited_item": "external_role_check_candidate_rows",
                  "value": 20,
                  "meaning": "External candidates exist but need tracer/observable role review.",
                  "carry_forward_status": "manual_role_review_required",
              },
              {
                  "inherited_from": "v4.241",
                  "inherited_item": "primary_qso_growth_manifest_fill",
                  "value": "blocked",
                  "meaning": "Do not create a primary QSO growth manifest from secondary or control candidates.",
                  "carry_forward_status": "hard_guard",
              },
          ]

          frozen_prediction_rows = [
              {
                  "freeze_id": "freeze_001_primary_qso_growth",
                  "source_family": "QSO_or_QSO_like_high_redshift_growth_surface",
                  "observable": "f_sigma8_or_comparable_growth",
                  "expected_direction": "+",
                  "expected_pressure_class": "stable_positive_pressure_or_positive_with_zero_guard_band",
                  "failure_condition_id": "failure_001",
                  "current_status": "cannot_test_without_primary_holdout",
              },
              {
                  "freeze_id": "freeze_002_secondary_qso_radial",
                  "source_family": "QSO_or_QSO_like_high_redshift_radial_geometry",
                  "observable": "D_H_over_r_sound_or_equivalent",
                  "expected_direction": "+/0",
                  "expected_pressure_class": "positive_with_zero_guard_band_or_stable_zero_guard",
                  "failure_condition_id": "failure_003",
                  "current_status": "secondary_review_possible_not_primary_evidence",
              },
              {
                  "freeze_id": "freeze_003_control_lrg_growth",
                  "source_family": "LRG_or_LRG_like_lower_redshift_growth_surface",
                  "observable": "f_sigma8_or_comparable_growth",
                  "expected_direction": "0_or_not_stable_positive",
                  "expected_pressure_class": "stable_zero_guard_or_not_same_as_QSO",
                  "failure_condition_id": "failure_002",
                  "current_status": "control_review_possible_not_primary_evidence",
              },
              {
                  "freeze_id": "freeze_004_geometry_compressed_lane",
                  "source_family": "compressed_geometry_DV_like_lane",
                  "observable": "D_V_or_compressed_geometry_likelihood",
                  "expected_direction": "mostly_0_or_not_primary",
                  "expected_pressure_class": "stable_zero_guard_or_secondary_only",
                  "failure_condition_id": "failure_004",
                  "current_status": "geometry_control_review_possible_not_primary_evidence",
              },
          ]

          external_reference_boundary_rows = [
              {
                  "boundary_id": "external_ref_001",
                  "boundary_name": "reference_values_before_residuals",
                  "required_before_next_scoring": "Every residual row must have an explicit LCDM or other reference value.",
                  "allowed_path": "external_reference_calculator_or_manifest",
                  "blocked_path": "raw candidate values labeled as residuals",
              },
              {
                  "boundary_id": "external_ref_002",
                  "boundary_name": "primary_qso_growth_missing",
                  "required_before_next_scoring": "A reviewed non-current QSO-like growth observable is needed before primary holdout scoring.",
                  "allowed_path": "manual source/covariance/provenance review confirms f_sigma8 or comparable QSO growth",
                  "blocked_path": "using QSO radial, geometry, LRG, LyA, or support files as primary QSO growth evidence",
              },
              {
                  "boundary_id": "external_ref_003",
                  "boundary_name": "secondary_control_separation",
                  "required_before_next_scoring": "Secondary and control candidates must stay in their own lanes.",
                  "allowed_path": "secondary qso radial, lrg control, geometry control",
                  "blocked_path": "promoting secondary/control rows into primary QSO growth evidence",
              },
              {
                  "boundary_id": "external_ref_004",
                  "boundary_name": "source_and_covariance_pairing",
                  "required_before_next_scoring": "Data source must be paired with covariance, inverse covariance, likelihood, or explicit limitation.",
                  "allowed_path": "reviewed data and covariance/likelihood pair",
                  "blocked_path": "unpaired covariance/support files used as standalone evidence",
              },
              {
                  "boundary_id": "external_ref_005",
                  "boundary_name": "same_release_mirror_block",
                  "required_before_next_scoring": "Same-current or same-release mirror files remain excluded from holdout evidence.",
                  "allowed_path": "parser comparison only",
                  "blocked_path": "same-release mirror as independent holdout",
              },
              {
                  "boundary_id": "external_ref_006",
                  "boundary_name": "manual_manifest_fill_only",
                  "required_before_next_scoring": "Manifest rows may be filled only after human/source review.",
                  "allowed_path": "manual fill with reviewed candidate and reference method",
                  "blocked_path": "automatic manifest fill from locator candidates",
              },
              {
                  "boundary_id": "external_ref_007",
                  "boundary_name": "tairid_model_specificity_gap",
                  "required_before_next_scoring": "TAIRID still needs a correction formula, sign rule, or source-surface transform beyond the current sign prediction.",
                  "allowed_path": "frozen correction/scaffold before scoring",
                  "blocked_path": "posthoc retuning after candidate review",
              },
              {
                  "boundary_id": "external_ref_008",
                  "boundary_name": "claim_language_boundary",
                  "required_before_next_scoring": "Validation and proof language remain blocked.",
                  "allowed_path": "candidate, review-only, diagnostic, secondary, control",
                  "blocked_path": "proof, validation, confirmed cosmology",
              },
          ]

          manual_manifest_scaffold_rows = [
              {
                  "manifest_id": "manual_001_primary_qso_growth",
                  "comparison_role": "primary_qso_growth_holdout",
                  "source_family": "QSO_or_QSO_like",
                  "observable": "f_sigma8_or_comparable_growth",
                  "candidate_status_from_v4_241": "missing",
                  "data_path_or_url": "DO_NOT_FILL_UNTIL_REVIEWED_PRIMARY_QSO_GROWTH_SOURCE_EXISTS",
                  "covariance_path_or_url": "DO_NOT_FILL_UNTIL_REVIEWED_COVARIANCE_OR_LIKELIHOOD_EXISTS",
                  "reference_model_path_or_method": "DO_NOT_SCORE_WITHOUT_EXTERNAL_REFERENCE",
                  "failure_condition_id": "failure_001",
                  "manual_fill_status": "blocked",
                  "allowed_use": "none yet",
              },
              {
                  "manifest_id": "manual_002_qso_radial_secondary",
                  "comparison_role": "qso_radial_secondary",
                  "source_family": "QSO_or_QSO_like",
                  "observable": "D_H_over_r_sound_or_equivalent",
                  "candidate_status_from_v4_241": "secondary_candidates_present",
                  "data_path_or_url": "PUT_REVIEWED_SECONDARY_QSO_RADIAL_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_SECONDARY_QSO_RADIAL_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "reference_model_path_or_method": "PUT_EXTERNAL_OR_REPRODUCIBLE_LCDM_REFERENCE_HERE",
                  "failure_condition_id": "failure_003",
                  "manual_fill_status": "manual_review_required_secondary_only",
                  "allowed_use": "secondary support only, not primary QSO growth evidence",
              },
              {
                  "manifest_id": "manual_003_lrg_growth_control",
                  "comparison_role": "lrg_growth_control",
                  "source_family": "LRG_or_LRG_like",
                  "observable": "f_sigma8_or_comparable_growth",
                  "candidate_status_from_v4_241": "control_candidates_present",
                  "data_path_or_url": "PUT_REVIEWED_LRG_CONTROL_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_LRG_CONTROL_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "reference_model_path_or_method": "PUT_EXTERNAL_OR_REPRODUCIBLE_LCDM_REFERENCE_HERE",
                  "failure_condition_id": "failure_002",
                  "manual_fill_status": "manual_review_required_control_only",
                  "allowed_use": "control comparison only",
              },
              {
                  "manifest_id": "manual_004_geometry_control",
                  "comparison_role": "geometry_control",
                  "source_family": "BAO_or_geometry_only",
                  "observable": "D_V_D_M_D_H_or_likelihood_coordinate",
                  "candidate_status_from_v4_241": "geometry_candidates_present",
                  "data_path_or_url": "PUT_REVIEWED_GEOMETRY_CONTROL_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_GEOMETRY_CONTROL_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "reference_model_path_or_method": "PUT_EXTERNAL_OR_REPRODUCIBLE_LCDM_REFERENCE_HERE",
                  "failure_condition_id": "failure_004",
                  "manual_fill_status": "manual_review_required_geometry_control_only",
                  "allowed_use": "geometry control only",
              },
              {
                  "manifest_id": "manual_005_external_role_check",
                  "comparison_role": "external_source_needs_role_check",
                  "source_family": "unresolved_external_candidate",
                  "observable": "role_to_be_reviewed",
                  "candidate_status_from_v4_241": "role_check_candidates_present",
                  "data_path_or_url": "PUT_REVIEWED_EXTERNAL_SOURCE_AFTER_ROLE_CHECK_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_COVARIANCE_OR_LIKELIHOOD_AFTER_ROLE_CHECK_HERE",
                  "reference_model_path_or_method": "PUT_EXTERNAL_OR_REPRODUCIBLE_LCDM_REFERENCE_HERE",
                  "failure_condition_id": "failure_005",
                  "manual_fill_status": "manual_role_review_required",
                  "allowed_use": "role unresolved until reviewed",
              },
              {
                  "manifest_id": "manual_006_model_comparison_boundary",
                  "comparison_role": "model_comparison_boundary",
                  "source_family": "reference_model",
                  "observable": "likelihood_or_chisq_status",
                  "candidate_status_from_v4_241": "not_applicable",
                  "data_path_or_url": "PUT_COMPARISON_SCRIPT_OR_MANIFEST_HERE",
                  "covariance_path_or_url": "PUT_COVARIANCE_POLICY_HERE",
                  "reference_model_path_or_method": "PUT_LCDM_AND_TAIRID_MODEL_BOUNDARY_HERE",
                  "failure_condition_id": "failure_005",
                  "manual_fill_status": "boundary_only_not_scoring",
                  "allowed_use": "boundary definition only",
              },
          ]

          secondary_control_review_packet_rows = [
              {
                  "packet_id": "review_001",
                  "candidate_lane": "qso_radial_secondary",
                  "review_questions": "Is this actually QSO-like? Does it contain D_H/r_s or comparable radial geometry? Is covariance/likelihood present? Is it independent from current exact sources?",
                  "allowed_result": "secondary support only",
                  "blocked_result": "primary QSO growth evidence",
              },
              {
                  "packet_id": "review_002",
                  "candidate_lane": "lrg_growth_control",
                  "review_questions": "Does it contain LRG-like f_sigma8 or comparable growth? Is it lower-redshift/control role? Is covariance/likelihood present?",
                  "allowed_result": "control comparison only",
                  "blocked_result": "primary QSO growth evidence",
              },
              {
                  "packet_id": "review_003",
                  "candidate_lane": "geometry_control",
                  "review_questions": "Does it contain BAO geometry only? Does it lack growth? Is the likelihood surface documented?",
                  "allowed_result": "geometry control only",
                  "blocked_result": "growth evidence",
              },
              {
                  "packet_id": "review_004",
                  "candidate_lane": "external_role_check",
                  "review_questions": "What tracer, observable, redshift, covariance, and release does this source represent?",
                  "allowed_result": "candidate can be assigned to a lane after review",
                  "blocked_result": "automatic lane assignment",
              },
          ]

          failure_condition_rows = [
              {
                  "failure_condition_id": "failure_001",
                  "target": "QSO f_sigma8 primary pressure",
                  "machine_condition": "if holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened",
                  "active_status": "active_but_not_testable_until_primary_holdout_exists",
              },
              {
                  "failure_condition_id": "failure_002",
                  "target": "QSO versus LRG growth contrast",
                  "machine_condition": "if lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened",
                  "active_status": "active_for_control_review_after_manifest",
              },
              {
                  "failure_condition_id": "failure_003",
                  "target": "QSO radial secondary support",
                  "machine_condition": "if qso_radial_direction == '-' then secondary_support_weakened",
                  "active_status": "active_for_secondary_review_after_manifest",
              },
              {
                  "failure_condition_id": "failure_004",
                  "target": "geometry compressed lane non-primary",
                  "machine_condition": "if compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed",
                  "active_status": "active_for_geometry_control_after_manifest",
              },
              {
                  "failure_condition_id": "failure_005",
                  "target": "external likelihood robustness",
                  "machine_condition": "if external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover then baseline_pressure_not_tairid_specific",
                  "active_status": "active_for_future_external_likelihood_boundary",
              },
          ]

          readiness_rows = [
              {
                  "readiness_id": "readiness_001",
                  "requirement": "primary_qso_growth_holdout_source",
                  "status": "missing",
                  "blocks": "primary holdout scoring and primary evidence language",
              },
              {
                  "readiness_id": "readiness_002",
                  "requirement": "secondary_control_manual_review",
                  "status": "needed",
                  "blocks": "secondary/control manifest fill",
              },
              {
                  "readiness_id": "readiness_003",
                  "requirement": "external_reference_values",
                  "status": "needed",
                  "blocks": "residual scoring on any external source",
              },
              {
                  "readiness_id": "readiness_004",
                  "requirement": "tairid_correction_formula_or_transform",
                  "status": "not_yet_built",
                  "blocks": "model-vs-model comparison",
              },
              {
                  "readiness_id": "readiness_005",
                  "requirement": "holdout_scoring_permission",
                  "status": "blocked",
                  "blocks": "evidence language",
              },
              {
                  "readiness_id": "readiness_006",
                  "requirement": "combined_matrix_permission",
                  "status": "blocked",
                  "blocks": "combined LRG/ELG/QSO matrix",
              },
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "Primary QSO growth holdout remains missing.",
                  "basis": "v4.241 found primary_qso_growth_candidate_rows = 0.",
                  "next_action": "Do not fill primary QSO growth manifest yet.",
                  "claim_status": "primary_holdout_blocked",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "Secondary/control lanes may be organized but not scored.",
                  "basis": "Secondary/control candidates exist but need manual source, covariance, and role review.",
                  "next_action": "Build review packets or external reference calculator next.",
                  "claim_status": "review_only",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "External reference values are now the safest technical closure path.",
                  "basis": "No primary holdout exists; reference boundary can still be made clearer.",
                  "next_action": "Build v4.243 external reference calculator or secondary/control review packet.",
                  "claim_status": "scoring_blocked",
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "manual_manifest_scaffold",
                  "permission_status": "written",
                  "reason": "Manual template rows are explicit and block automatic filling.",
              },
              {
                  "permission_scope": "primary_qso_growth_manifest_fill",
                  "permission_status": "blocked",
                  "reason": "No reviewed primary QSO growth holdout source exists.",
              },
              {
                  "permission_scope": "secondary_control_review",
                  "permission_status": "allowed_review_only",
                  "reason": "Secondary/control candidates can be reviewed but not promoted.",
              },
              {
                  "permission_scope": "automatic_manifest_fill",
                  "permission_status": "blocked",
                  "reason": "Manifest rows cannot be filled automatically from locator output.",
              },
              {
                  "permission_scope": "holdout_scoring",
                  "permission_status": "blocked",
                  "reason": "No reviewed manifest and no primary holdout source exist.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No holdout scoring or external likelihood fit has run.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_243_external_reference_calculator",
                  "purpose": "create explicit reference rows/calculator boundary before any external residual scoring",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_243_secondary_control_review_packet",
                  "purpose": "review secondary/control candidates without treating them as primary QSO growth evidence",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_243_tairid_correction_formula_scaffold",
                  "purpose": "begin making the TAIRID prediction more than a sign expectation",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_243_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until source-surface guards pass",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before scaffold"},
              {"gate": "inherited_v4_241_rows_equal_6", "passed": len(inherited_v4_241_rows) == 6, "detail": f"inherited_v4_241_rows = {len(inherited_v4_241_rows)}"},
              {"gate": "frozen_prediction_rows_equal_4", "passed": len(frozen_prediction_rows) == 4, "detail": f"frozen_prediction_rows = {len(frozen_prediction_rows)}"},
              {"gate": "external_reference_boundary_rows_equal_8", "passed": len(external_reference_boundary_rows) == 8, "detail": f"external_reference_boundary_rows = {len(external_reference_boundary_rows)}"},
              {"gate": "manual_manifest_scaffold_rows_equal_6", "passed": len(manual_manifest_scaffold_rows) == 6, "detail": f"manual_manifest_scaffold_rows = {len(manual_manifest_scaffold_rows)}"},
              {"gate": "secondary_control_review_packet_rows_equal_4", "passed": len(secondary_control_review_packet_rows) == 4, "detail": f"secondary_control_review_packet_rows = {len(secondary_control_review_packet_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "readiness_rows_equal_6", "passed": len(readiness_rows) == 6, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "decision_rows_equal_3", "passed": len(decision_rows) == 3, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "permission_rows_equal_7", "passed": len(permission_rows) == 7, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "primary_qso_manifest_fill_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_manifest_fill" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO growth manifest fill blocked"},
              {"gate": "automatic_manifest_fill_blocked", "passed": any(row["permission_scope"] == "automatic_manifest_fill" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "automatic manifest fill blocked"},
              {"gate": "holdout_scoring_blocked", "passed": any(row["permission_scope"] == "holdout_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "holdout scoring blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "cosmology validation blocked"},
