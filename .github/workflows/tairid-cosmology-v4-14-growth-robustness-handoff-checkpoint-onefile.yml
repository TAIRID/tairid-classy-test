name: TAIRID Cosmology v4.14 Growth Robustness Handoff Checkpoint Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-14-growth-robustness-handoff-checkpoint-onefile.yml"

jobs:
  growth-robustness-handoff-checkpoint-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.14 growth robustness handoff checkpoint onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_14_growth_robustness_handoff_checkpoint_onefile

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_14_growth_robustness_handoff_checkpoint_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_14_growth_robustness_handoff_checkpoint_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine KiDS, DES, and HSC into one posterior.",
              "This does not parse new DES or HSC posterior chains.",
              "This does not run DES or HSC likelihoods.",
              "This handoff freezes the current diagnostic state after KiDS direct-chain success and DES/HSC direct-chain boundary audits.",
              "A pass means the robustness handoff is internally consistent, not that TAIRID is validated."
          ]

          PLANCK_AXIS_REFERENCE = {
              "S8": {"q50": 0.824821, "sigma_68": 0.012218},
              "sigma8": {"q50": 0.810123, "sigma_68": 0.006639},
              "Omega_m": {"q50": 0.310797, "sigma_68": 0.006153}
          }

          SOURCE_MILESTONES = [
              {
                  "milestone": "v4.4.3",
                  "status": "kids_readme_guided_parser_passed_direct_3x2pt_axes_recovered",
                  "meaning": "KiDS direct 3x2pt chain parsed successfully.",
                  "carry_forward": "KiDS direct-chain row active for 3x2pt/decomposition lane."
              },
              {
                  "milestone": "v4.5",
                  "status": "kids_role_boundary_pressure_replacement_audit_passed_ready_for_updated_growth_family_checkpoint",
                  "meaning": "KiDS cosmic shear and KiDS 3x2pt roles separated.",
                  "carry_forward": "KiDS cosmic shear remains lensing-only summary row; KiDS 3x2pt direct chain remains direct-chain row."
              },
              {
                  "milestone": "v4.6",
                  "status": "role_explicit_growth_family_checkpoint_passed_with_strength_warnings",
                  "meaning": "Growth/consolidation-negative direction survived role cleanup.",
                  "carry_forward": "Use role-explicit lanes only."
              },
              {
                  "milestone": "v4.11.1",
                  "status": "hsc_sacc_likelihood_boundary_audit_onefile_passed_keep_hsc_summary_row",
                  "meaning": "HSC has SACC/data-vector and likelihood infrastructure, but no posterior-chain replacement row.",
                  "carry_forward": "HSC remains published-summary row."
              },
              {
                  "milestone": "v4.13",
                  "status": "des_run_name_public_url_repair_onefile_completed_run_names_found_no_public_chain",
                  "meaning": "DES run names and chain-template provenance found, but no reachable numeric chain file.",
                  "carry_forward": "DES remains published-summary row unless a direct public chain URL is supplied."
              }
          ]

          DIRECT_PRODUCT_STATUS = [
              {
                  "family": "KiDS",
                  "lane": "3x2pt_growth",
                  "direct_chain_status": "direct_chain_parsed",
                  "replacement_allowed": True,
                  "summary_row_still_needed": True,
                  "reason": "Direct KiDS 3x2pt chain parsed; published KiDS cosmic shear remains a separate lensing-only summary row."
              },
              {
                  "family": "HSC",
                  "lane": "lensing_only_growth",
                  "direct_chain_status": "no_direct_chain_replacement",
                  "replacement_allowed": False,
                  "summary_row_still_needed": True,
                  "reason": "SACC/data-vector and likelihood products found, but no posterior-chain sample product found."
              },
              {
                  "family": "DES",
                  "lane": "3x2pt_growth",
                  "direct_chain_status": "run_names_found_no_public_numeric_chain",
                  "replacement_allowed": False,
                  "summary_row_still_needed": True,
                  "reason": "55 run-name candidates and 160 public URL probes found, but 0 reachable numeric chain files; probes hit placeholder HTML."
              }
          ]

          GROWTH_PRESSURE_ROWS = [
              {
                  "row_id": "kids1000_published_cosmic_shear_only",
                  "family": "KiDS",
                  "lane": "lensing_only_growth",
                  "role": "cosmic_shear_only_lensing_growth",
                  "axis": "S8",
                  "value": 0.759,
                  "sigma": 0.024,
                  "source_status": "published_summary_role_distinct"
              },
              {
                  "row_id": "des_y3_cosmic_shear_only",
                  "family": "DES",
                  "lane": "lensing_only_growth",
                  "role": "cosmic_shear_only_lensing_growth",
                  "axis": "S8",
                  "value": 0.772,
                  "sigma": 0.018,
                  "source_status": "published_summary_role_distinct"
              },
              {
                  "row_id": "hsc_y3_cosmic_shear_power_spectra",
                  "family": "HSC",
                  "lane": "lensing_only_growth",
                  "role": "cosmic_shear_only_lensing_growth",
                  "axis": "S8",
                  "value": 0.776,
                  "sigma": 0.032,
                  "source_status": "published_summary_role_distinct"
              },
              {
                  "row_id": "kids1000_direct_3x2pt_fiducial_chain",
                  "family": "KiDS",
                  "lane": "three_by_two_growth",
                  "role": "fiducial_3x2pt_direct_chain",
                  "axis": "S8",
                  "value": 0.7645649990442438,
                  "sigma": 0.01632059899225302,
                  "source_status": "direct_chain_parsed"
              },
              {
                  "row_id": "des_y3_3x2pt_combined",
                  "family": "DES",
                  "lane": "three_by_two_growth",
                  "role": "3x2pt_combined_growth",
                  "axis": "S8",
                  "value": 0.776,
                  "sigma": 0.017,
                  "source_status": "published_summary_direct_chain_not_reached"
              },
              {
                  "row_id": "kids1000_direct_3x2pt_sigma8",
                  "family": "KiDS",
                  "lane": "decomposition",
                  "role": "direct_3x2pt_sigma8_axis",
                  "axis": "sigma8",
                  "value": 0.758678356712955,
                  "sigma": 0.02158338779753677,
                  "source_status": "direct_chain_parsed"
              },
              {
                  "row_id": "des_y3_3x2pt_reconstructed_sigma8",
                  "family": "DES",
                  "lane": "decomposition",
                  "role": "reconstructed_sigma8_from_published_S8_Omega_m",
                  "axis": "sigma8",
                  "value": 0.780367,
                  "sigma": 0.01842,
                  "source_status": "published_summary_reconstruction"
              },
              {
                  "row_id": "kids1000_direct_3x2pt_omegam",
                  "family": "KiDS",
                  "lane": "decomposition",
                  "role": "direct_3x2pt_Omega_m_axis",
                  "axis": "Omega_m",
                  "value": 0.3048090486225367,
                  "sigma": 0.012390754602697285,
                  "source_status": "direct_chain_parsed"
              },
              {
                  "row_id": "des_y3_3x2pt_omegam",
                  "family": "DES",
                  "lane": "decomposition",
                  "role": "published_3x2pt_Omega_m_axis",
                  "axis": "Omega_m",
                  "value": 0.339,
                  "sigma": 0.032,
                  "source_status": "published_summary"
              }
          ]

          NEXT_TEST_QUEUE = [
              {
                  "priority": 1,
                  "next_test": "v4_15_reach_consolidation_integrated_checkpoint",
                  "purpose": "Bring the upgraded growth-family status back together with the earlier H0LiCOW reach-positive-equivalent lane.",
                  "must_include": "KiDS direct 3x2pt chain row, DES/HSC summary-row boundaries, H0LiCOW reach row, BAO auxiliary boundary, no validation claim.",
                  "must_not_include": "BIC, likelihood, refit, model comparison, combined survey posterior, TAIRID validation claim.",
                  "readiness_if_passes": "Integrated reach/consolidation diagnostic can be summarized cleanly."
              },
              {
                  "priority": 2,
                  "next_test": "manual_DES_direct_chain_URL_insertion",
                  "purpose": "Only if a direct public DES posterior-chain URL is found, probe and parse that one product.",
                  "must_include": "Exact URL, numeric chain detection, column map, no likelihood run.",
                  "must_not_include": "guessing public URLs from placeholder pages.",
                  "readiness_if_passes": "DES may become direct-chain row only after numeric parse succeeds."
              },
              {
                  "priority": 3,
                  "next_test": "manual_HSC_posterior_sample_URL_insertion",
                  "purpose": "Only if a direct HSC posterior sample product is found, probe and parse that one product.",
                  "must_include": "Exact URL, numeric chain detection, product role boundary.",
                  "must_not_include": "treating SACC/data-vector/config/code as posterior samples.",
                  "readiness_if_passes": "HSC may become direct-chain row only after numeric parse succeeds."
              },
              {
                  "priority": 4,
                  "next_test": "v4_x_cosmology_robustness_paper_or_handoff",
                  "purpose": "Write a human-readable handoff explaining the whole v4.0-v4.14 growth robustness lane.",
                  "must_include": "What survived, what weakened, what remains summary-only, and what cannot be claimed.",
                  "must_not_include": "validation language or standard cosmology disproof.",
                  "readiness_if_passes": "New thread or paper draft can continue from this clean checkpoint."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def pressure(row):
              axis = row["axis"]
              ref = PLANCK_AXIS_REFERENCE[axis]
              delta = row["value"] - ref["q50"]
              combined = math.sqrt(row["sigma"] ** 2 + ref["sigma_68"] ** 2)
              z = delta / combined if combined > 0 else float("nan")

              if delta < 0:
                  direction = "negative"
              elif delta > 0:
                  direction = "positive"
              else:
                  direction = "zero"

              abs_z = abs(z)
              if abs_z >= 2.5:
                  strength = "strong"
              elif abs_z >= 1.5:
                  strength = "moderate"
              elif abs_z >= 0.25:
                  strength = "weak"
              else:
                  strength = "near_zero"

              return {
                  "planck_value": ref["q50"],
                  "planck_sigma": ref["sigma_68"],
                  "delta_observable_minus_planck": delta,
                  "combined_sigma": combined,
                  "pressure_z": z,
                  "direction": direction,
                  "strength": strength
              }

          pressure_rows = []
          for row in GROWTH_PRESSURE_ROWS:
              result = pressure(row)
              out = dict(row)
              out.update(result)
              pressure_rows.append(out)

          lane_summary_rows = []
          for lane in sorted(set(row["lane"] for row in pressure_rows)):
              lane_rows = [row for row in pressure_rows if row["lane"] == lane]
              negative_count = sum(1 for row in lane_rows if row["direction"] == "negative")
              positive_count = sum(1 for row in lane_rows if row["direction"] == "positive")
              moderate_or_stronger_count = sum(1 for row in lane_rows if row["strength"] in ["moderate", "strong"])
              strong_count = sum(1 for row in lane_rows if row["strength"] == "strong")
              families = sorted(set(row["family"] for row in lane_rows))

              if positive_count > 0 and lane == "decomposition":
                  lane_status = "mixed_axis_decomposition_expected"
              elif positive_count > 0:
                  lane_status = "lane_has_positive_flip"
              elif negative_count == len(lane_rows) and moderate_or_stronger_count >= 2:
                  lane_status = "negative_direction_repeats"
              elif negative_count == len(lane_rows):
                  lane_status = "negative_direction_repeats_with_strength_warning"
              else:
                  lane_status = "inconclusive"

              lane_summary_rows.append({
                  "lane": lane,
                  "row_count": len(lane_rows),
                  "families": ";".join(families),
                  "negative_count": negative_count,
                  "positive_count": positive_count,
                  "moderate_or_stronger_count": moderate_or_stronger_count,
                  "strong_count": strong_count,
                  "lane_status": lane_status
              })

          direct_chain_ok = any(
              row["family"] == "KiDS" and row["direct_chain_status"] == "direct_chain_parsed"
              for row in DIRECT_PRODUCT_STATUS
          )

          des_summary_ok = any(
              row["family"] == "DES" and row["summary_row_still_needed"] is True and row["replacement_allowed"] is False
              for row in DIRECT_PRODUCT_STATUS
          )

          hsc_summary_ok = any(
              row["family"] == "HSC" and row["summary_row_still_needed"] is True and row["replacement_allowed"] is False
              for row in DIRECT_PRODUCT_STATUS
          )

          no_model_claims = True
          no_likelihood = True
          no_bic = True
          no_refit = True
          no_combined_posterior = True

          failed_gates = []
          warnings = []

          if not direct_chain_ok:
              failed_gates.append("kids_direct_chain_status_not_preserved")

          if not des_summary_ok:
              failed_gates.append("des_summary_row_boundary_not_preserved")

          if not hsc_summary_ok:
              failed_gates.append("hsc_summary_row_boundary_not_preserved")

          for lane_row in lane_summary_rows:
              if lane_row["lane"] in ["lensing_only_growth", "three_by_two_growth"]:
                  if lane_row["positive_count"] > 0:
                      failed_gates.append(f"{lane_row['lane']}_has_positive_flip")
                  if lane_row["negative_count"] != lane_row["row_count"]:
                      failed_gates.append(f"{lane_row['lane']}_not_all_negative")
                  if lane_row["strong_count"] < lane_row["row_count"]:
                      warnings.append(f"{lane_row['lane']}_not_all_rows_strong")

          if any(row["lane"] == "decomposition" and row["axis"] == "Omega_m" and row["direction"] == "positive" for row in pressure_rows):
              warnings.append("Omega_m_decomposition_is_mixed_not_shared_negative_pressure")

          if any(row["family"] in ["DES", "HSC"] and row["replacement_allowed"] is False for row in DIRECT_PRODUCT_STATUS):
              warnings.append("DES_HSC_remain_summary_rows_until_direct_chain_products_are_supplied")

          if failed_gates:
              readiness_label = "growth_robustness_handoff_checkpoint_failed"
              next_step = "Repair carry-forward boundaries before integrated reach/consolidation checkpoint."
          else:
              readiness_label = "growth_robustness_handoff_checkpoint_passed_ready_for_integrated_reach_consolidation_checkpoint"
              next_step = (
                  "Proceed to v4.15 integrated reach/consolidation checkpoint. "
                  "Carry KiDS as direct parsed 3x2pt chain, DES/HSC as published-summary rows, and keep all truth boundaries active."
              )

          interpretation = (
              "The v4.0-v4.14 growth robustness lane strengthened the baseline rather than proving the theory. "
              "KiDS became a real direct-chain foothold because the 3x2pt chain was parsed and matched the carried value. "
              "HSC and DES did not become direct-chain rows: HSC has SACC/data-vector and likelihood infrastructure only, while DES has run-name/template provenance but no reachable numeric chain file. "
              "The role-explicit growth pattern remains negative in the lensing-only and 3x2pt lanes, strongest on S8 and sigma8/amplitude-side pressure, while Omega_m is mixed and does not carry the shared pressure."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_milestones": SOURCE_MILESTONES,
              "direct_product_status": DIRECT_PRODUCT_STATUS,
              "planck_axis_reference": PLANCK_AXIS_REFERENCE,
              "pressure_rows": pressure_rows,
              "lane_summary_rows": lane_summary_rows,
              "next_test_queue": NEXT_TEST_QUEUE,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_growth_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "new_posterior_chain_parsed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "combined_posterior_allowed": False,
                  "new_posterior_chain_parsed": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "source_milestones_v4_14.csv",
              SOURCE_MILESTONES,
              ["milestone", "status", "meaning", "carry_forward"]
          )

          write_csv(
              OUTDIR / "direct_product_status_v4_14.csv",
              DIRECT_PRODUCT_STATUS,
              ["family", "lane", "direct_chain_status", "replacement_allowed", "summary_row_still_needed", "reason"]
          )

          write_csv(
              OUTDIR / "growth_pressure_rows_v4_14.csv",
              pressure_rows,
              [
                  "row_id",
                  "family",
                  "lane",
                  "role",
                  "axis",
                  "value",
                  "sigma",
                  "source_status",
                  "planck_value",
                  "planck_sigma",
                  "delta_observable_minus_planck",
                  "combined_sigma",
                  "pressure_z",
                  "direction",
                  "strength"
              ]
          )

          write_csv(
              OUTDIR / "growth_lane_summary_v4_14.csv",
              lane_summary_rows,
              [
                  "lane",
                  "row_count",
                  "families",
                  "negative_count",
                  "positive_count",
                  "moderate_or_stronger_count",
                  "strong_count",
                  "lane_status"
              ]
          )

          write_csv(
              OUTDIR / "next_test_queue_v4_14.csv",
              NEXT_TEST_QUEUE,
              ["priority", "next_test", "purpose", "must_include", "must_not_include", "readiness_if_passes"]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_growth_handoff_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The v4 growth robustness lane is ready for handoff with KiDS direct-chain status and DES/HSC summary-row boundaries preserved.",
                  "boundary": "Diagnostic handoff only, not validation."
              },
              {
                  "interpretation_id": "allowed_amplitude_pressure_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The repeated pressure remains strongest on S8 and sigma8/amplitude-side rows, while Omega_m is mixed.",
                  "boundary": "Pressure decomposition only, not new physics proof."
              },
              {
                  "interpretation_id": "allowed_des_hsc_boundary_statement",
                  "status": "allowed_with_boundary",
                  "wording": "DES and HSC remain published-summary rows unless direct public posterior-chain products are supplied and parsed.",
                  "boundary": "No hidden direct-chain replacement."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID is validated.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_standard_cosmology_disproof",
                  "status": "forbidden",
                  "wording": "Standard cosmology is disproven.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_likelihood_or_bic_claim",
                  "status": "forbidden",
                  "wording": "A likelihood, BIC, or model comparison was run.",
                  "boundary": "Blocked."
              }
          ]

          write_csv(
              OUTDIR / "interpretation_boundaries_v4_14.csv",
              interpretation_rows,
              ["interpretation_id", "status", "wording", "boundary"]
          )

          json_path = OUTDIR / "tairid_cosmology_v4_14_growth_robustness_handoff_checkpoint_onefile.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v4.14 — Growth Robustness Handoff Checkpoint Onefile")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this checkpoint does")
          md.append("")
          md.append("v4.14 freezes the current growth robustness state after the KiDS, HSC, and DES direct-product audits.")
          md.append("")
          md.append("It does not parse new chains, run likelihoods, fit models, or make validation claims.")
          md.append("")
          md.append("## Direct product status")
          md.append("")
          md.append("| Family | Lane | Direct-chain status | Replacement allowed | Summary row active |")
          md.append("|---|---|---|---:|---:|")
          for row in DIRECT_PRODUCT_STATUS:
              md.append(
                  f"| `{row['family']}` | `{row['lane']}` | `{row['direct_chain_status']}` | "
                  f"`{row['replacement_allowed']}` | `{row['summary_row_still_needed']}` |"
              )
          md.append("")
          md.append("## Growth pressure rows")
          md.append("")
          md.append("| Lane | Family | Axis | Pressure z | Direction | Strength | Source status |")
          md.append("|---|---|---|---:|---|---|---|")
          for row in pressure_rows:
              md.append(
                  f"| `{row['lane']}` | `{row['family']}` | `{row['axis']}` | "
                  f"`{row['pressure_z']:.12f}` | `{row['direction']}` | `{row['strength']}` | `{row['source_status']}` |"
              )
          md.append("")
          md.append("## Lane summaries")
          md.append("")
          md.append("| Lane | Families | Negative rows | Positive rows | Moderate+ rows | Status |")
          md.append("|---|---|---:|---:|---:|---|")
          for row in lane_summary_rows:
              md.append(
                  f"| `{row['lane']}` | `{row['families']}` | `{row['negative_count']}` | "
                  f"`{row['positive_count']}` | `{row['moderate_or_stronger_count']}` | `{row['lane_status']}` |"
              )
          md.append("")
          md.append("## Interpretation")
          md.append("")
          md.append(interpretation)
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `source_milestones_v4_14.csv`")
          md.append("- `direct_product_status_v4_14.csv`")
          md.append("- `growth_pressure_rows_v4_14.csv`")
          md.append("- `growth_lane_summary_v4_14.csv`")
          md.append("- `next_test_queue_v4_14.csv`")
          md.append("- `interpretation_boundaries_v4_14.csv`")
          md.append("- `tairid_cosmology_v4_14_growth_robustness_handoff_checkpoint_onefile.json`")
          md.append("- `tairid_cosmology_v4_14_growth_robustness_handoff_checkpoint_onefile.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v4_14_growth_robustness_handoff_checkpoint_onefile.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("Interpretation:")
          print(interpretation)
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
