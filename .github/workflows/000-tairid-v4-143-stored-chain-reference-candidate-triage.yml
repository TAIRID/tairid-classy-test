name: 000 TAIRID v4.143 Stored Chain Reference Candidate Triage

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-143-stored-chain-reference-candidate-triage.yml"

jobs:
  tairid-v4-143-stored-chain-reference-candidate-triage:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.143 stored chain reference candidate triage
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_143_stored_chain_reference_candidate_triage

          python - <<'PY'
          import csv
          import json
          import os
          import zipfile
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_143_stored_chain_reference_candidate_triage")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_143_stored_chain_reference_candidate_triage"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not recompute eBOSS pressure.",
              "This triages stored-chain, stored-reference, and workflow false-positive candidates found in the repository.",
              "A pass means candidate files are classified and the next route is selected; it does not mean a usable chain/reference parser exists yet."
          ]

          UPSTREAM_LOCKS = {
              "v4_142_CAMB_install_or_stored_chain_probe": {
                  "readiness_label": "CAMB_install_or_stored_chain_probe_passed_feasibility_status_recorded_ready_for_reference_vector_route_selection",
                  "repository_candidate_file_count": 163,
                  "stored_chain_candidate_count": 59,
                  "stored_reference_candidate_count": 57,
                  "covariance_context_candidate_count": 31,
                  "camb_available_after_attempt": False,
                  "camb_parameter_sanity_ok": False,
                  "camb_reference_route_available": False,
                  "stored_chain_route_available": True,
                  "stored_reference_route_available": True,
                  "selected_route": "stored_chain_or_reference_manual_review",
                  "final_camb_calculation_run": False,
                  "chain_samples_parsed": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "observed_covariance_review_still_needed": True,
                  "same_program_eBOSS_covariance_still_limited": True,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_141_eBOSS_covariance_ingestion_or_manual_status_probe": {
                  "readiness_label": "eBOSS_covariance_ingestion_or_manual_status_probe_passed_manual_status_not_filled_covariance_not_ingested_ready_for_CAMB_or_stored_chain_probe",
                  "manual_file_found": False,
                  "ingestion_candidate_count": 0,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          SCAN_POLICY = {
              "scan_root": ".",
              "max_file_records": 500,
              "max_text_probe_bytes": 6000,
              "max_zip_members_to_record": 60,
              "keywords": [
                  "chain",
                  "chains",
                  "planck",
                  "camb",
                  "class",
                  "fsigma8",
                  "sigma8",
                  "growth",
                  "reference",
                  "cov",
                  "covariance",
                  "lcdm",
                  "bao",
                  "rsd",
                  "pantheon",
                  "shoes",
                  "eboss",
                  "boss"
              ],
              "data_like_suffixes": [
                  ".txt",
                  ".dat",
                  ".csv",
                  ".json",
                  ".fits",
                  ".fit",
                  ".zip",
                  ".covmat",
                  ".paramnames",
                  ".minimum",
                  ".bestfit",
                  ".ini"
              ],
              "protocol_like_suffixes": [
                  ".yml",
                  ".yaml",
                  ".md",
                  ".py",
                  ".sh"
              ],
              "excluded_prefixes": [
                  ".git/",
                  "artifacts/",
                  "__pycache__/"
              ]
          }

          FILE_CLASS_RULES = [
              {
                  "class_id": "workflow_protocol_false_positive",
                  "condition": "file path begins .github/workflows/ or suffix is workflow/code and no clear data table marker exists",
                  "meaning": "Useful historical protocol, but not a stored chain/reference data file."
              },
              {
                  "class_id": "artifact_or_handoff_context",
                  "condition": "zip, markdown, JSON, or CSV looks like a prior workflow artifact or handoff record",
                  "meaning": "May explain prior work but should not be treated as a data product without inner-file review."
              },
              {
                  "class_id": "possible_data_product",
                  "condition": "data-like suffix outside workflow paths with table, FITS, covariance, chain, paramnames, or likelihood markers",
                  "meaning": "Candidate for a later parser design."
              },
              {
                  "class_id": "parser_ready_candidate",
                  "condition": "path, suffix, content markers, and role are specific enough to map variable order safely",
                  "meaning": "Candidate can be used for a future parser design, still not parsed here."
              },
              {
                  "class_id": "manual_review_needed",
                  "condition": "candidate may be relevant but lacks enough metadata for safe parsing",
                  "meaning": "Needs human review before parser design."
              }
          ]

          PARSER_READINESS_FIELDS = [
              "candidate_path",
              "candidate_class",
              "candidate_role",
              "source_kind",
              "suffix",
              "size_bytes",
              "matched_keywords",
              "content_markers",
              "zip_member_count",
              "inner_candidate_count",
              "parser_readiness",
              "reason",
              "next_action",
              "claim_boundary"
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample rows were parsed.",
              "CAMB produced the final reference vector.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The stored-chain/reference candidate triage validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "A workflow YAML file is the same as a stored chain data file.",
              "A candidate filename is the same as parsed data.",
              "A zip filename is enough to claim usable chain samples.",
              "Same-program eBOSS covariance is resolved.",
              "Observed covariance review is no longer needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_144_parser_design_if_parser_ready_candidates_exist",
                  "purpose": "Design a parser only for files classified as parser-ready.",
                  "why_next": "Parser-ready candidates are the only safe path to automatic stored-reference ingestion."
              },
              {
                  "priority": 2,
                  "route_id": "v4_144_data_manifest_request_if_no_parser_ready_candidates",
                  "purpose": "Create a small exact manifest/request listing the data files needed for chain/reference ingestion.",
                  "why_next": "If candidates are workflow artifacts or ambiguous zips, a manifest is safer than guessing."
              },
              {
                  "priority": 3,
                  "route_id": "v4_144_external_standard_cosmology_comparison_plan",
                  "purpose": "Prepare cautious comparison language against normal ΛCDM/eBOSS growth work.",
                  "why_next": "The current result remains limitation-bound and should not be oversold."
              }
          ]

          failed_gates = []
          warnings = [
              "triage_only",
              "candidate_files_not_parsed_as_chains",
              "workflow_false_positives_expected",
              "zip_members_inspected_only_by_names",
              "covariance_not_ingested",
              "pressure_not_recomputed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def should_exclude(path_string):
              normalized = path_string.replace("\\", "/")
              return any(normalized.startswith(prefix) for prefix in SCAN_POLICY["excluded_prefixes"])

          def safe_read_text(path, max_bytes):
              try:
                  raw = path.read_bytes()[:max_bytes]
                  return raw.decode("utf-8", errors="replace")
              except Exception as exc:
                  return ""

          def content_markers_for_text(text):
              lower = text.lower()
              markers = []
              checks = {
                  "has_paramnames_marker": ".paramnames" in lower or "paramnames" in lower,
                  "has_covmat_marker": ".covmat" in lower or "covmat" in lower or "covariance matrix" in lower,
                  "has_chain_marker": "chain" in lower or "mcmc" in lower or "sample" in lower,
                  "has_fsigma8_marker": "fsigma8" in lower or "fσ8" in lower or "f sigma" in lower,
                  "has_growth_marker": "growth" in lower or "sigma8" in lower,
                  "has_likelihood_marker": "likelihood" in lower,
                  "has_redshift_marker": "redshift" in lower or ",z," in lower or "\tz\t" in lower,
                  "has_workflow_marker": "runs-on:" in lower or "workflow_dispatch:" in lower or "uses: actions/" in lower
              }
              for key, value in checks.items():
                  if value:
                      markers.append(key)
              return markers

          def classify_file(path, matched_keywords, size_bytes):
              path_string = str(path).replace("\\", "/")
              lower_path = path_string.lower()
              suffix = path.suffix.lower()
              text = ""
              markers = []
              zip_member_count = 0
              inner_candidate_count = 0
              inner_candidate_examples = []

              source_kind = "unknown"
              candidate_class = "manual_review_needed"
              candidate_role = "undetermined"
              parser_readiness = "not_ready"
              reason = "insufficient metadata"
              next_action = "manual_review"

              if lower_path.startswith(".github/workflows/"):
                  source_kind = "workflow_protocol"
              elif suffix in SCAN_POLICY["protocol_like_suffixes"]:
                  source_kind = "protocol_or_code"
              elif suffix in SCAN_POLICY["data_like_suffixes"]:
                  source_kind = "data_like_file"
              else:
                  source_kind = "other"

              if suffix == ".zip":
                  try:
                      with zipfile.ZipFile(path) as z:
                          names = z.namelist()
                          zip_member_count = len(names)
                          for name in names[:SCAN_POLICY["max_zip_members_to_record"]]:
                              low = name.lower()
                              if any(keyword in low for keyword in SCAN_POLICY["keywords"]):
                                  inner_candidate_count += 1
                                  if len(inner_candidate_examples) < 10:
                                      inner_candidate_examples.append(name)
                  except Exception as exc:
                      markers.append("zip_read_failed")
              else:
                  text = safe_read_text(path, SCAN_POLICY["max_text_probe_bytes"])
                  markers.extend(content_markers_for_text(text))

              marker_set = set(markers)
              data_marker_count = len(marker_set.intersection({
                  "has_paramnames_marker",
                  "has_covmat_marker",
                  "has_chain_marker",
                  "has_fsigma8_marker",
                  "has_growth_marker",
                  "has_likelihood_marker",
                  "has_redshift_marker"
              }))

              if source_kind == "workflow_protocol" or "has_workflow_marker" in marker_set:
                  candidate_class = "workflow_protocol_false_positive"
                  candidate_role = "historical_workflow_or_protocol"
                  parser_readiness = "not_ready"
                  reason = "workflow/protocol file, not raw chain/reference data"
                  next_action = "do_not_parse_as_data"
              elif suffix == ".zip" and inner_candidate_count > 0:
                  candidate_class = "artifact_or_handoff_context"
                  candidate_role = "zip_with_possible_inner_candidates"
                  parser_readiness = "manual_review_needed"
                  reason = "zip has relevant member names but inner files are not extracted or mapped by this triage"
                  next_action = "manual_zip_member_review_or_targeted_extraction_design"
              elif suffix == ".zip":
                  candidate_class = "artifact_or_handoff_context"
                  candidate_role = "zip_without_clear_inner_candidate"
                  parser_readiness = "not_ready"
                  reason = "zip file found but no inner candidate names matched scan keywords"
                  next_action = "manual_review_if_expected_data"
              elif suffix in [".covmat", ".paramnames", ".minimum", ".bestfit"] and data_marker_count >= 1:
                  candidate_class = "possible_data_product"
                  candidate_role = "possible_chain_metadata_or_covariance"
                  parser_readiness = "possible_parser_design"
                  reason = "specialized chain/covariance-like suffix with matching markers"
                  next_action = "parser_design_after_manual_variable_order_check"
              elif suffix in [".csv", ".dat", ".txt", ".json", ".fits", ".fit"] and data_marker_count >= 2 and source_kind != "protocol_or_code":
                  candidate_class = "possible_data_product"
                  candidate_role = "possible_reference_or_growth_data_table"
                  parser_readiness = "possible_parser_design"
                  reason = "data-like file outside workflow path with multiple relevant content markers"
                  next_action = "manual_header_check_then_parser_design"
              elif source_kind == "protocol_or_code":
                  candidate_class = "workflow_protocol_false_positive"
                  candidate_role = "code_or_protocol_context"
                  parser_readiness = "not_ready"
                  reason = "code/protocol file, not data product"
                  next_action = "do_not_parse_as_data"
              else:
                  candidate_class = "manual_review_needed"
                  candidate_role = "ambiguous_candidate"
                  parser_readiness = "not_ready"
                  reason = "candidate lacks enough content markers or safe data-product evidence"
                  next_action = "manual_review_or_ignore"

              return {
                  "candidate_path": path_string,
                  "candidate_class": candidate_class,
                  "candidate_role": candidate_role,
                  "source_kind": source_kind,
                  "suffix": suffix,
                  "size_bytes": size_bytes,
                  "matched_keywords": ",".join(matched_keywords),
                  "content_markers": ",".join(markers),
                  "zip_member_count": zip_member_count,
                  "inner_candidate_count": inner_candidate_count,
                  "inner_candidate_examples": " | ".join(inner_candidate_examples),
                  "parser_readiness": parser_readiness,
                  "reason": reason,
                  "next_action": next_action,
                  "claim_boundary": "candidate_triage_only_not_data_ingestion"
              }

          def scan_repository():
              keywords = [keyword.lower() for keyword in SCAN_POLICY["keywords"]]
              rows = []
              for path in Path(".").rglob("*"):
                  if len(rows) >= SCAN_POLICY["max_file_records"]:
                      break
                  if not path.is_file():
                      continue
                  path_string = str(path).replace("\\", "/")
                  if should_exclude(path_string):
                      continue
                  lower = path_string.lower()
                  matched = [keyword for keyword in keywords if keyword in lower]
                  if not matched:
                      continue
                  try:
                      size_bytes = path.stat().st_size
                  except OSError:
                      size_bytes = ""
                  rows.append(classify_file(path, matched, size_bytes))
              return rows

          candidate_records = scan_repository()

          class_counts = {}
          readiness_counts = {}
          for row in candidate_records:
              class_counts[row["candidate_class"]] = class_counts.get(row["candidate_class"], 0) + 1
              readiness_counts[row["parser_readiness"]] = readiness_counts.get(row["parser_readiness"], 0) + 1

          summary_records = [
              {"summary_id": "total_candidates", "value": len(candidate_records), "meaning": "All scanned keyword-matching files."},
              {"summary_id": "workflow_protocol_false_positives", "value": class_counts.get("workflow_protocol_false_positive", 0), "meaning": "Protocol/code files that should not be parsed as raw data."},
              {"summary_id": "artifact_or_handoff_context", "value": class_counts.get("artifact_or_handoff_context", 0), "meaning": "Zip/artifact/handoff-like candidates requiring inner review."},
              {"summary_id": "possible_data_products", "value": class_counts.get("possible_data_product", 0), "meaning": "Files that may support parser design after manual check."},
              {"summary_id": "manual_review_needed", "value": class_counts.get("manual_review_needed", 0), "meaning": "Ambiguous candidates needing human review."},
              {"summary_id": "possible_parser_design", "value": readiness_counts.get("possible_parser_design", 0), "meaning": "Candidates strong enough for a future parser design, not parsed here."}
          ]

          parser_ready_candidates = [
              row for row in candidate_records
              if row["parser_readiness"] == "possible_parser_design"
          ]

          zip_manual_candidates = [
              row for row in candidate_records
              if row["candidate_class"] == "artifact_or_handoff_context" and int(row["inner_candidate_count"] or 0) > 0
          ]

          false_positive_count = class_counts.get("workflow_protocol_false_positive", 0)
          possible_data_product_count = class_counts.get("possible_data_product", 0)
          parser_ready_count = len(parser_ready_candidates)
          candidate_status_recorded = isinstance(candidate_records, list)

          if parser_ready_count > 0:
              selected_next_route = "parser_design_for_possible_data_products"
              next_allowed_step = (
                  "Proceed to v4.144 parser design for possible data-product candidates only. "
                  "Do not parse full chains, compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )
          elif len(zip_manual_candidates) > 0:
              selected_next_route = "targeted_zip_member_review_design"
              next_allowed_step = (
                  "Proceed to v4.144 targeted zip member review design before any parser attempt. "
                  "Do not parse full chains, compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )
          else:
              selected_next_route = "data_manifest_request"
              next_allowed_step = (
                  "Proceed to v4.144 data manifest request listing the exact chain/reference/covariance files needed. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          final_parser_built = False
          full_chain_rows_parsed = False
          covariance_ingested = False
          pressure_recomputed = False
          final_pressure_ready = False

          upstream = UPSTREAM_LOCKS["v4_142_CAMB_install_or_stored_chain_probe"]

          if upstream["selected_route"] != "stored_chain_or_reference_manual_review":
              failed_gates.append("upstream_selected_route_not_stored_chain_manual_review")

          # A clean or minimal repository may have zero matching files. That is still a valid triage result,
          # because the next route becomes a data-manifest request instead of a parser design.
          if not candidate_status_recorded:
              failed_gates.append("candidate_scan_not_completed")

          if len(summary_records) < 6:
              failed_gates.append("summary_records_incomplete")

          if final_parser_built:
              failed_gates.append("final_parser_unexpectedly_built")

          if full_chain_rows_parsed:
              failed_gates.append("full_chain_rows_unexpectedly_parsed")

          if covariance_ingested:
              failed_gates.append("covariance_unexpectedly_ingested")

          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "workflow yaml file is the same as a stored chain data file",
              "candidate filename is the same as parsed data",
              "zip filename is enough to claim usable chain samples",
              "final rsd pressure score",
              "validates tairid cosmology",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "stored_chain_reference_candidate_triage_passed_candidates_classified_ready_for_next_reference_data_route"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_stored_chain_route_carried",
                  "pass": upstream["selected_route"] == "stored_chain_or_reference_manual_review",
                  "result": "v4.142 selected stored-chain/reference manual review",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "candidate_scan_completed",
                  "pass": candidate_status_recorded,
                  "result": f"candidate_count={len(candidate_records)}",
                  "boundary": "Candidate scan only."
              },
              {
                  "rule_id": "workflow_false_positives_separated",
                  "pass": false_positive_count >= 0,
                  "result": f"workflow_false_positive_count={false_positive_count}",
                  "boundary": "Prevents workflow files from being treated as data."
              },
              {
                  "rule_id": "possible_data_products_counted",
                  "pass": possible_data_product_count >= 0,
                  "result": f"possible_data_product_count={possible_data_product_count}; parser_ready_count={parser_ready_count}",
                  "boundary": "Candidate status only, not parsing."
              },
              {
                  "rule_id": "zip_manual_candidates_counted",
                  "pass": len(zip_manual_candidates) >= 0,
                  "result": f"zip_manual_candidate_count={len(zip_manual_candidates)}",
                  "boundary": "Zip member names only, not extraction."
              },
              {
                  "rule_id": "next_route_selected",
                  "pass": selected_next_route in ["parser_design_for_possible_data_products", "targeted_zip_member_review_design", "data_manifest_request"],
                  "result": selected_next_route,
                  "boundary": "Route selection only."
              },
              {
                  "rule_id": "parser_and_chain_parsing_not_done",
                  "pass": final_parser_built is False and full_chain_rows_parsed is False,
                  "result": "parser not built and full chain rows not parsed",
                  "boundary": "No ingestion."
              },
              {
                  "rule_id": "covariance_pressure_validation_blocked",
                  "pass": covariance_ingested is False and pressure_recomputed is False and final_pressure_ready is False,
                  "result": "covariance not ingested, pressure not recomputed, validation blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_143_rules_passed")

          if failed_gates:
              readiness_label = "stored_chain_reference_candidate_triage_failed"
              next_allowed_step = "Repair candidate triage before continuing."
          else:
              readiness_label = route_decision

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "candidate_count": len(candidate_records),
              "workflow_false_positive_count": false_positive_count,
              "artifact_or_handoff_context_count": class_counts.get("artifact_or_handoff_context", 0),
              "manual_review_needed_count": class_counts.get("manual_review_needed", 0),
              "possible_data_product_count": possible_data_product_count,
              "parser_ready_count": parser_ready_count,
              "zip_manual_candidate_count": len(zip_manual_candidates),
              "selected_next_route": selected_next_route,
              "final_parser_built": final_parser_built,
              "full_chain_rows_parsed": full_chain_rows_parsed,
              "covariance_ingested": covariance_ingested,
              "pressure_recomputed": pressure_recomputed,
              "same_program_eBOSS_covariance_still_limited": True,
              "CAMB_run": False,
              "full_planck_chains_imported": False,
              "full_planck_chain_sample_rows_parsed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "scan_policy": SCAN_POLICY,
              "file_class_rules": FILE_CLASS_RULES,
              "parser_readiness_fields": PARSER_READINESS_FIELDS,
              "candidate_records": candidate_records,
              "summary_records": summary_records,
              "parser_ready_candidates": parser_ready_candidates,
              "zip_manual_candidates": zip_manual_candidates,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "selected_next_route": selected_next_route,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "selected_next_route": selected_next_route,
                  "parser_ready_count": parser_ready_count,
                  "full_chain_rows_parsed": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_143_stored_chain_reference_candidate_triage.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "candidate_records_v4_143.csv",
              candidate_records,
              PARSER_READINESS_FIELDS + ["inner_candidate_examples"]
          )

          write_csv(
              OUTDIR / "summary_records_v4_143.csv",
              summary_records,
              ["summary_id", "value", "meaning"]
          )

          write_csv(
              OUTDIR / "parser_ready_candidates_v4_143.csv",
              parser_ready_candidates,
              PARSER_READINESS_FIELDS + ["inner_candidate_examples"]
          )

          write_csv(
              OUTDIR / "zip_manual_candidates_v4_143.csv",
              zip_manual_candidates,
              PARSER_READINESS_FIELDS + ["inner_candidate_examples"]
          )

          write_csv(
              OUTDIR / "file_class_rules_v4_143.csv",
              FILE_CLASS_RULES,
              ["class_id", "condition", "meaning"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_143.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_143.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_143.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.143 — Stored Chain / Reference Candidate Triage")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.142 found many stored-chain/reference-looking filenames, but many may simply be prior workflow files. v4.143 separates workflow/protocol false positives from possible data products, zip/manual candidates, and parser-ready candidates.")
          md.append("")
          md.append("This workflow does not parse full chain samples, does not ingest covariance, and does not recompute pressure.")
          md.append("")
          md.append("## Candidate triage summary")
          md.append("")
          md.append("| Summary | Value | Meaning |")
          md.append("|---|---:|---|")
          for row in summary_records:
              md.append(f"| `{row['summary_id']}` | `{row['value']}` | {row['meaning']} |")
          md.append("")
          md.append("## Selected next route")
          md.append("")
          md.append(f"`{selected_next_route}`")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_143_stored_chain_reference_candidate_triage.json",
              "tairid_v4_143_stored_chain_reference_candidate_triage.md",
              "candidate_records_v4_143.csv",
              "summary_records_v4_143.csv",
              "parser_ready_candidates_v4_143.csv",
              "zip_manual_candidates_v4_143.csv",
              "file_class_rules_v4_143.csv",
              "next_route_options_v4_143.csv",
              "blocked_claims_v4_143.csv",
              "rule_results_v4_143.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_143_stored_chain_reference_candidate_triage.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.143 stored chain reference candidate triage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-143-stored-chain-reference-candidate-triage
          path: artifacts/tairid_v4_143_stored_chain_reference_candidate_triage/
