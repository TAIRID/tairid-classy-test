name: TAIRID v4.40 eBOSS Mapping or Park

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-40-eboss-mapping-or-park.yml"

jobs:
  tairid-v4-40-eboss-mapping-or-park:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.40 eBOSS mapping or park decision
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_40_eboss_mapping_or_park

          python - <<'PY'
          import csv
          import json
          import math
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_40_eboss_mapping_or_park")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_40_eboss_mapping_or_park"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run an eBOSS or SDSS likelihood.",
              "This does not compute a final RSD pressure score.",
              "This does not import or apply an eBOSS covariance matrix to residuals.",
              "This audits whether visible eBOSS product paths can map to current LRG, ELG, and QSO f_sigma8 rows or must be parked.",
              "A pass means the eBOSS mapping/park decision is bounded, not that eBOSS covariance-aware testing is complete."
          ]

          CURRENT_EBOSS_ROWS = [
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "tracer": "LRG",
                  "z_eff": 0.70,
                  "observable_axis": "f_sigma8",
                  "value": 0.473,
                  "sigma": 0.041,
                  "status": "published_summary_value_reviewed"
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "tracer": "ELG",
                  "z_eff": 0.85,
                  "observable_axis": "f_sigma8",
                  "value": 0.315,
                  "sigma": 0.095,
                  "status": "published_summary_value_reviewed"
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "tracer": "QSO",
                  "z_eff": 1.48,
                  "observable_axis": "f_sigma8",
                  "value": 0.462,
                  "sigma": 0.045,
                  "status": "published_summary_value_reviewed"
              }
          ]

          PRODUCT_GROUPS = [
              {
                  "group_id": "eboss_dr16_lrg_baoplus_fsigma8",
                  "tracer": "LRG",
                  "current_row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "expected_value": 0.473,
                  "expected_z": 0.70,
                  "product_role": "BAO_plus_RSD_likelihood_candidate",
                  "result_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/BAO-plus/sdss_DR16_LRG_FSBAO_DMDHfs8.txt",
                  "covtot_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/BAO-plus/sdss_DR16_LRG_FSBAO_DMDHfs8_covtot.txt",
                  "grid_url": "",
                  "candidate_status_from_v4_39": "visible_likelihood_candidate_with_fsigma8_and_covtot_path"
              },
              {
                  "group_id": "eboss_dr16_qso_baoplus_fsigma8",
                  "tracer": "QSO",
                  "current_row_id": "eboss_dr16_qso_z148_fsigma8",
                  "expected_value": 0.462,
                  "expected_z": 1.48,
                  "product_role": "BAO_plus_RSD_likelihood_candidate",
                  "result_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/BAO-plus/sdss_DR16_QSO_FSBAO_DMDHfs8.txt",
                  "covtot_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/BAO-plus/sdss_DR16_QSO_FSBAO_DMDHfs8_covtot.txt",
                  "grid_url": "",
                  "candidate_status_from_v4_39": "visible_likelihood_candidate_with_fsigma8_and_covtot_path"
              },
              {
                  "group_id": "eboss_dr16_elg_baoplus_grid_fsigma8",
                  "tracer": "ELG",
                  "current_row_id": "eboss_dr16_elg_z085_fsigma8",
                  "expected_value": 0.315,
                  "expected_z": 0.85,
                  "product_role": "BAO_plus_RSD_grid_likelihood_candidate",
                  "result_url": "",
                  "covtot_url": "",
                  "grid_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/BAO-plus/sdss_DR16_ELG_FSBAO_DMDHfs8gridlikelihood.txt",
                  "candidate_status_from_v4_39": "visible_grid_likelihood_candidate_no_simple_covtot_path"
              },
              {
                  "group_id": "eboss_dr16_lrg_fullshape_fsigma8_secondary",
                  "tracer": "LRG",
                  "current_row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "expected_value": 0.473,
                  "expected_z": 0.70,
                  "product_role": "full_shape_only_secondary_candidate",
                  "result_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/Full-shape-only/sdss_DR16_LRG_FS_DMDHfs8.txt",
                  "covtot_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/Full-shape-only/sdss_DR16_LRG_FS_DMDHfs8_covtot.txt",
                  "grid_url": "",
                  "candidate_status_from_v4_39": "secondary_full_shape_candidate_mapping_needed"
              },
              {
                  "group_id": "eboss_dr16_qso_fullshape_fsigma8_secondary",
                  "tracer": "QSO",
                  "current_row_id": "eboss_dr16_qso_z148_fsigma8",
                  "expected_value": 0.462,
                  "expected_z": 1.48,
                  "product_role": "full_shape_only_secondary_candidate",
                  "result_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/Full-shape-only/sdss_DR16_QSO_FS_DMDHfs8.txt",
                  "covtot_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/Full-shape-only/sdss_DR16_QSO_FS_DMDHfs8_covtot.txt",
                  "grid_url": "",
                  "candidate_status_from_v4_39": "secondary_full_shape_candidate_mapping_needed"
              }
          ]

          DECISION_RULES = [
              {
                  "rule_id": "product_groups_declared",
                  "description": "Visible eBOSS candidate paths from v4.39 must be declared for LRG, QSO, and ELG.",
                  "failure_mode": "No mapping/park decision can be made."
              },
              {
                  "rule_id": "fetch_attempts_recorded",
                  "description": "Every declared product URL must have a fetch attempt recorded.",
                  "failure_mode": "Product availability is hidden."
              },
              {
                  "rule_id": "simple_covtot_candidates_classified",
                  "description": "LRG and QSO simple result plus covtot candidates must be classified when visible.",
                  "failure_mode": "covtot files are ignored because they do not contain the string covariance."
              },
              {
                  "rule_id": "ELG_grid_likelihood_parked_or_parser_needed",
                  "description": "ELG grid likelihood must be classified as grid/parser-needed unless a simple covariance path is found.",
                  "failure_mode": "ELG is treated as simple covariance-ready when it is not."
              },
              {
                  "rule_id": "no_product_auto_maps_to_full_RSD",
                  "description": "No product may complete full eBOSS or full RSD covariance mapping automatically.",
                  "failure_mode": "Inventory becomes final covariance scoring."
              },
              {
                  "rule_id": "no_covariance_likelihood_pressure_now",
                  "description": "This decision test must not import covariance to residuals, run likelihood, or compute pressure.",
                  "failure_mode": "Mapping decision becomes model testing."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "An eBOSS covariance matrix was applied to residuals.",
              "An eBOSS likelihood was run.",
              "A visible product path automatically completes full eBOSS covariance.",
              "ELG grid likelihood is simple covariance-ready without a parser.",
              "The full RSD lane is covariance-aware.",
              "BOSS-only covariance resolves eBOSS covariance.",
              "WiggleZ covariance is resolved.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_41_eBOSS_LRG_QSO_file_mapping_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Inspect LRG and QSO simple result/covtot files for observable order, f_sigma8 position, and covariance dimension without applying covariance.",
                  "must_include": "LRG/QSO product URLs, parsed values, covtot dimension, current-row comparison, ELG parked status.",
                  "must_not_include": "pressure score, likelihood run, validation claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_42_ELG_grid_likelihood_parser_or_park",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Decide whether to build an ELG grid-likelihood parser or formally keep ELG non-final for covariance-aware RSD.",
                  "must_include": "ELG grid path, parser requirements, no simple covariance claim.",
                  "must_not_include": "ELG covariance-ready claim without parser."
              },
              {
                  "priority": 3,
                  "next_test": "v4_43_RSD_reference_uncertainty_boundary_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Define how reference-model uncertainty must enter before stronger RSD comparison.",
                  "must_include": "reference parameter uncertainty, Planck-chain boundary, growth curve uncertainty.",
                  "must_not_include": "treating approximate reference curve as full posterior."
              },
              {
                  "priority": 4,
                  "next_test": "v4_44_WiggleZ_covariance_locator_retry",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Try to locate a WiggleZ covariance/product path or formally keep WiggleZ non-final.",
                  "must_include": "source path, product status, row mapping, unresolved boundary if not found.",
                  "must_not_include": "treating WiggleZ as covariance-ready without product."
              }
          ]

          def fetch_text(url, timeout=90, byte_limit=12_000_000):
              if not url:
                  return {
                      "fetch_ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": "no_url_declared"
                  }

              try:
                  request = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "Mozilla/5.0 TAIRID-v4.40-eBOSS-mapping-or-park",
                          "Accept": "text/plain,text/html,application/xml,*/*"
                      }
                  )
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "fetch_ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "fetch_ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def numeric_values(text):
              vals = []
              for token in re.findall(r"[-+]?\d+(?:\.\d+)?(?:[eE][-+]?\d+)?", text or ""):
                  try:
                      vals.append(float(token))
                  except Exception:
                      pass
              return vals

          def square_dimension(value_count):
              if value_count <= 0:
                  return ""
              n = int(math.sqrt(value_count))
              return n if n * n == value_count else ""

          def value_seen(values, target, tolerance=0.006):
              return any(abs(v - target) <= tolerance for v in values)

          def z_seen(values, target, tolerance=0.03):
              return any(abs(v - target) <= tolerance for v in values)

          def has_fsigma8_signal(text, url):
              combo = ((text or "")[:5000] + " " + (url or "")).lower()
              return any(token in combo for token in ["fs8", "fsig", "fsigma8", "f_sigma8", "fσ8"])

          failed_gates = []
          warnings = []

          fetch_rows = []
          decision_rows = []

          for group in PRODUCT_GROUPS:
              result_fetch = fetch_text(group["result_url"])
              covtot_fetch = fetch_text(group["covtot_url"])
              grid_fetch = fetch_text(group["grid_url"])

              fetch_rows.append({
                  "group_id": group["group_id"],
                  "tracer": group["tracer"],
                  "url_role": "result_url",
                  "url": group["result_url"],
                  "fetch_ok": result_fetch["fetch_ok"],
                  "http_status": result_fetch["http_status"],
                  "content_type": result_fetch["content_type"],
                  "bytes_read": result_fetch["bytes_read"],
                  "error": result_fetch["error"]
              })

              fetch_rows.append({
                  "group_id": group["group_id"],
                  "tracer": group["tracer"],
                  "url_role": "covtot_url",
                  "url": group["covtot_url"],
                  "fetch_ok": covtot_fetch["fetch_ok"],
                  "http_status": covtot_fetch["http_status"],
                  "content_type": covtot_fetch["content_type"],
                  "bytes_read": covtot_fetch["bytes_read"],
                  "error": covtot_fetch["error"]
              })

              fetch_rows.append({
                  "group_id": group["group_id"],
                  "tracer": group["tracer"],
                  "url_role": "grid_url",
                  "url": group["grid_url"],
                  "fetch_ok": grid_fetch["fetch_ok"],
                  "http_status": grid_fetch["http_status"],
                  "content_type": grid_fetch["content_type"],
                  "bytes_read": grid_fetch["bytes_read"],
                  "error": grid_fetch["error"]
              })

              result_values = numeric_values(result_fetch["text"])
              cov_values = numeric_values(covtot_fetch["text"])
              grid_values = numeric_values(grid_fetch["text"])

              result_has_fsigma8 = has_fsigma8_signal(result_fetch["text"], group["result_url"])
              grid_has_fsigma8 = has_fsigma8_signal(grid_fetch["text"], group["grid_url"])

              expected_value_seen_in_result = value_seen(result_values, group["expected_value"])
              expected_value_seen_in_grid = value_seen(grid_values, group["expected_value"])
              expected_z_seen_in_result = z_seen(result_values, group["expected_z"])
              expected_z_seen_in_grid = z_seen(grid_values, group["expected_z"])

              cov_dim = square_dimension(len(cov_values))

              has_simple_result_covtot = (
                  result_fetch["fetch_ok"] is True
                  and covtot_fetch["fetch_ok"] is True
                  and result_has_fsigma8 is True
                  and cov_dim != ""
              )

              has_grid_likelihood = (
                  grid_fetch["fetch_ok"] is True
                  and grid_has_fsigma8 is True
                  and len(grid_values) > 0
              )

              if group["tracer"] in ["LRG", "QSO"] and group["product_role"] == "BAO_plus_RSD_likelihood_candidate":
                  if has_simple_result_covtot:
                      mapping_decision = "simple_result_covtot_candidate_visible_ready_for_file_mapping_audit"
                      next_action = "send_to_v4_41_LRG_QSO_file_mapping_audit"
                  elif result_fetch["fetch_ok"] or covtot_fetch["fetch_ok"]:
                      mapping_decision = "partial_simple_candidate_visible_needs_repair_or_manual_review"
                      next_action = "manual_review_before_mapping"
                  else:
                      mapping_decision = "simple_candidate_not_visible_park_until_path_repair"
                      next_action = "park_or_repair_path"
              elif group["tracer"] == "ELG":
                  if has_grid_likelihood:
                      mapping_decision = "grid_likelihood_visible_parser_needed_not_simple_covariance_ready"
                      next_action = "send_to_ELG_grid_parser_or_park_decision"
                  elif grid_fetch["fetch_ok"]:
                      mapping_decision = "grid_file_visible_but_fsigma8_signal_unclear"
                      next_action = "manual_grid_review"
                  else:
                      mapping_decision = "ELG_grid_not_visible_park_until_path_repair"
                      next_action = "park_or_repair_path"
              else:
                  if has_simple_result_covtot:
                      mapping_decision = "secondary_simple_result_covtot_candidate_visible_park_until_primary_review"
                      next_action = "park_secondary_fullshape_until_primary_mapping_decision"
                  else:
                      mapping_decision = "secondary_candidate_unresolved_or_not_needed_now"
                      next_action = "park_secondary"

              decision_rows.append({
                  "group_id": group["group_id"],
                  "tracer": group["tracer"],
                  "current_row_id": group["current_row_id"],
                  "expected_z": group["expected_z"],
                  "expected_value": group["expected_value"],
                  "product_role": group["product_role"],
                  "result_url": group["result_url"],
                  "covtot_url": group["covtot_url"],
                  "grid_url": group["grid_url"],
                  "result_fetch_ok": result_fetch["fetch_ok"],
                  "covtot_fetch_ok": covtot_fetch["fetch_ok"],
                  "grid_fetch_ok": grid_fetch["fetch_ok"],
                  "result_numeric_count": len(result_values),
                  "covtot_numeric_count": len(cov_values),
                  "grid_numeric_count": len(grid_values),
                  "covtot_square_dimension": cov_dim,
                  "result_has_fsigma8_signal": result_has_fsigma8,
                  "grid_has_fsigma8_signal": grid_has_fsigma8,
                  "expected_value_seen_in_result": expected_value_seen_in_result,
                  "expected_value_seen_in_grid": expected_value_seen_in_grid,
                  "expected_z_seen_in_result": expected_z_seen_in_result,
                  "expected_z_seen_in_grid": expected_z_seen_in_grid,
                  "mapping_decision": mapping_decision,
                  "next_action": next_action,
                  "maps_to_current_eBOSS_rows_now": False,
                  "covariance_imported_now": False,
                  "likelihood_run_now": False,
                  "pressure_score_allowed_now": False,
                  "validation_claim_allowed": False
              })

          if len(PRODUCT_GROUPS) < 3:
              failed_gates.append("not_enough_product_groups_declared")

          if len(fetch_rows) < len(PRODUCT_GROUPS):
              failed_gates.append("fetch_attempts_not_recorded")

          primary_lrg = [
              row for row in decision_rows
              if row["group_id"] == "eboss_dr16_lrg_baoplus_fsigma8"
          ]

          primary_qso = [
              row for row in decision_rows
              if row["group_id"] == "eboss_dr16_qso_baoplus_fsigma8"
          ]

          primary_elg = [
              row for row in decision_rows
              if row["group_id"] == "eboss_dr16_elg_baoplus_grid_fsigma8"
          ]

          lrg_ready = bool(primary_lrg and "simple_result_covtot_candidate_visible" in primary_lrg[0]["mapping_decision"])
          qso_ready = bool(primary_qso and "simple_result_covtot_candidate_visible" in primary_qso[0]["mapping_decision"])
          elg_grid_visible = bool(primary_elg and "grid_likelihood_visible" in primary_elg[0]["mapping_decision"])

          if not primary_lrg:
              failed_gates.append("primary_LRG_candidate_missing")
          if not primary_qso:
              failed_gates.append("primary_QSO_candidate_missing")
          if not primary_elg:
              failed_gates.append("primary_ELG_candidate_missing")

          if not lrg_ready:
              warnings.append("LRG_simple_result_covtot_not_ready_or_needs_manual_review")
          if not qso_ready:
              warnings.append("QSO_simple_result_covtot_not_ready_or_needs_manual_review")
          if not elg_grid_visible:
              warnings.append("ELG_grid_likelihood_not_visible_or_needs_manual_review")

          for row in decision_rows:
              if row["maps_to_current_eBOSS_rows_now"] is not False:
                  failed_gates.append(row["group_id"] + "_auto_mapping_violation")
              if row["covariance_imported_now"] is not False:
                  failed_gates.append(row["group_id"] + "_covariance_import_violation")
              if row["likelihood_run_now"] is not False:
                  failed_gates.append(row["group_id"] + "_likelihood_run_violation")
              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append(row["group_id"] + "_pressure_allowed_violation")
              if row["validation_claim_allowed"] is not False:
                  failed_gates.append(row["group_id"] + "_validation_allowed_violation")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "covariance matrix was applied",
              "likelihood was run",
              "automatically completes",
              "elg grid",
              "full rsd lane",
              "wigglez",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          warnings.append("eBOSS_mapping_decision_does_not_import_covariance")
          warnings.append("eBOSS_mapping_decision_does_not_run_likelihood")
          warnings.append("eBOSS_mapping_decision_does_not_compute_pressure")
          warnings.append("BOSS_only_covariance_preview_remains_BOSS_only")
          warnings.append("reference_model_uncertainty_still_missing")
          warnings.append("WiggleZ_covariance_still_unresolved")

          rule_results = [
              {
                  "rule_id": "product_groups_declared",
                  "pass": len(PRODUCT_GROUPS) >= 3,
                  "result": f"{len(PRODUCT_GROUPS)} product group(s) declared",
                  "boundary": "Declared products are candidates only."
              },
              {
                  "rule_id": "fetch_attempts_recorded",
                  "pass": len(fetch_rows) >= 3 * len(PRODUCT_GROUPS),
                  "result": f"{len(fetch_rows)} fetch attempt rows recorded",
                  "boundary": "Fetch visibility is not covariance use."
              },
              {
                  "rule_id": "simple_covtot_candidates_classified",
                  "pass": len(primary_lrg) == 1 and len(primary_qso) == 1,
                  "result": f"LRG_ready={lrg_ready}; QSO_ready={qso_ready}",
                  "boundary": "LRG/QSO readiness only allows file mapping audit, not pressure."
              },
              {
                  "rule_id": "ELG_grid_likelihood_parked_or_parser_needed",
                  "pass": len(primary_elg) == 1 and primary_elg[0]["maps_to_current_eBOSS_rows_now"] is False,
                  "result": primary_elg[0]["mapping_decision"] if primary_elg else "ELG_missing",
                  "boundary": "ELG grid is not simple covariance-ready without parser."
              },
              {
                  "rule_id": "no_product_auto_maps_to_full_RSD",
                  "pass": all(row["maps_to_current_eBOSS_rows_now"] is False for row in decision_rows),
                  "result": "no_product_auto_maps_to_full_RSD",
                  "boundary": "Mapping requires later audit."
              },
              {
                  "rule_id": "no_covariance_likelihood_pressure_now",
                  "pass": all(
                      row["covariance_imported_now"] is False
                      and row["likelihood_run_now"] is False
                      and row["pressure_score_allowed_now"] is False
                      for row in decision_rows
                  ),
                  "result": "no_covariance_no_likelihood_no_pressure",
                  "boundary": "Decision only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_mapping_or_park_rules_passed")

          if lrg_ready and qso_ready and elg_grid_visible:
              mapping_state = "LRG_QSO_simple_candidates_ready_ELG_grid_parser_needed"
              readiness_label = "eBOSS_mapping_decision_passed_ready_for_LRG_QSO_file_mapping_and_ELG_grid_parser_decision"
              next_step = (
                  "Proceed to v4.41 eBOSS LRG/QSO file mapping audit, then decide whether to build an ELG grid-likelihood parser or park ELG for final covariance work."
              )
          elif lrg_ready or qso_ready:
              mapping_state = "partial_LRG_QSO_simple_candidate_ready_ELG_or_other_paths_unresolved"
              readiness_label = "eBOSS_mapping_decision_passed_ready_for_partial_mapping_or_formal_park"
              next_step = (
                  "Proceed to partial LRG/QSO file mapping if useful, or formally park eBOSS covariance and move to reference uncertainty."
              )
          else:
              mapping_state = "no_simple_eBOSS_covariance_mapping_ready"
              readiness_label = "eBOSS_mapping_decision_passed_ready_for_formal_eBOSS_covariance_park"
              next_step = (
                  "Formally park eBOSS covariance for now and move to reference-uncertainty or WiggleZ work."
              )

          if failed_gates:
              readiness_label = "eBOSS_mapping_or_park_decision_failed"
              next_step = "Repair mapping/park decision guardrails before continuing."

          system_health = {
              "product_group_count": len(PRODUCT_GROUPS),
              "fetch_attempt_count": len(fetch_rows),
              "decision_row_count": len(decision_rows),
              "LRG_simple_candidate_ready": lrg_ready,
              "QSO_simple_candidate_ready": qso_ready,
              "ELG_grid_likelihood_visible": elg_grid_visible,
              "mapping_state": mapping_state,
              "complete_eBOSS_simple_covariance_mapping_now": False,
              "products_auto_mapped": False,
              "covariance_imported": False,
              "likelihood_run": False,
              "pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "BOSS_only_preview_still_BOSS_only": True,
              "full_RSD_covariance_complete": False,
              "reference_model_uncertainty_included": False,
              "WiggleZ_covariance_resolved": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          interpretation = (
              "v4.40 uses the v4.39 eBOSS inventory to decide whether visible eBOSS product paths can move into mapping audits or must be parked. "
              "LRG and QSO BAO-plus result/covtot candidates are treated as possible simple file-mapping candidates when visible. "
              "ELG is treated as a grid-likelihood/parser-needed lane, not simple covariance-ready. "
              "No covariance is applied to residuals, no likelihood is run, no pressure score is computed, and the full RSD lane remains incomplete."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "current_eboss_rows": CURRENT_EBOSS_ROWS,
              "product_groups": PRODUCT_GROUPS,
              "fetch_rows": fetch_rows,
              "decision_rows": decision_rows,
              "decision_rules": DECISION_RULES,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_final_pressure_score_built": False,
                  "covariance_imported": False,
                  "likelihood_run": False,
                  "product_paths_mapped_to_full_RSD": False,
                  "full_RSD_covariance_complete": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "eboss_product_fetch_rows_v4_40.csv",
              fetch_rows,
              [
                  "group_id",
                  "tracer",
                  "url_role",
                  "url",
                  "fetch_ok",
                  "http_status",
                  "content_type",
                  "bytes_read",
                  "error"
              ]
          )

          write_csv(
              OUTDIR / "eboss_mapping_decision_rows_v4_40.csv",
              decision_rows,
              [
                  "group_id",
                  "tracer",
                  "current_row_id",
                  "expected_z",
                  "expected_value",
                  "product_role",
                  "result_url",
                  "covtot_url",
                  "grid_url",
                  "result_fetch_ok",
                  "covtot_fetch_ok",
                  "grid_fetch_ok",
                  "result_numeric_count",
                  "covtot_numeric_count",
                  "grid_numeric_count",
                  "covtot_square_dimension",
                  "result_has_fsigma8_signal",
                  "grid_has_fsigma8_signal",
                  "expected_value_seen_in_result",
                  "expected_value_seen_in_grid",
                  "expected_z_seen_in_result",
                  "expected_z_seen_in_grid",
                  "mapping_decision",
                  "next_action",
                  "maps_to_current_eBOSS_rows_now",
                  "covariance_imported_now",
                  "likelihood_run_now",
                  "pressure_score_allowed_now",
                  "validation_claim_allowed"
              ]
          )

          write_csv(
              OUTDIR / "current_eboss_rows_v4_40.csv",
              CURRENT_EBOSS_ROWS,
              ["row_id", "tracer", "z_eff", "observable_axis", "value", "sigma", "status"]
          )

          write_csv(
              OUTDIR / "eboss_mapping_or_park_rule_results_v4_40.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_40.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_40.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_40.csv",
              [system_health],
              [
                  "product_group_count",
                  "fetch_attempt_count",
                  "decision_row_count",
                  "LRG_simple_candidate_ready",
                  "QSO_simple_candidate_ready",
                  "ELG_grid_likelihood_visible",
                  "mapping_state",
                  "complete_eBOSS_simple_covariance_mapping_now",
                  "products_auto_mapped",
                  "covariance_imported",
                  "likelihood_run",
                  "pressure_score_allowed_now",
                  "validation_claim_allowed",
                  "BOSS_only_preview_still_BOSS_only",
                  "full_RSD_covariance_complete",
                  "reference_model_uncertainty_included",
                  "WiggleZ_covariance_resolved",
                  "rule_pass_count",
                  "rule_total_count"
              ]
          )

          json_path = OUTDIR / "tairid_v4_40_eboss_mapping_or_park.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.40 — eBOSS Product Mapping or Formal Park Decision")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("Visible eBOSS product paths were checked for whether they should enter file-mapping audits or be parked.")
          md.append("")
          md.append("LRG/QSO simple result-plus-covtot candidates may move to file mapping if visible. ELG remains a grid-likelihood/parser-needed lane unless a simple covariance product is found.")
          md.append("")
          md.append("No covariance was applied. No likelihood was run. No pressure score was computed.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Mapping decisions")
          md.append("")
          md.append("| Group | Tracer | Decision | Next action |")
          md.append("|---|---|---|---|")
          for row in decision_rows:
              md.append(
                  f"| `{row['group_id']}` | `{row['tracer']}` | `{row['mapping_decision']}` | `{row['next_action']}` |"
              )
          md.append("")
          md.append("## Rule results")
          md.append("")
          md.append("| Rule | Pass | Result | Boundary |")
          md.append("|---|---:|---|---|")
          for row in rule_results:
              md.append(f"| `{row['rule_id']}` | `{row['pass']}` | `{row['result']}` | {row['boundary']} |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `eboss_product_fetch_rows_v4_40.csv`")
          md.append("- `eboss_mapping_decision_rows_v4_40.csv`")
          md.append("- `current_eboss_rows_v4_40.csv`")
          md.append("- `eboss_mapping_or_park_rule_results_v4_40.csv`")
          md.append("- `blocked_claims_v4_40.csv`")
          md.append("- `next_test_ladder_v4_40.csv`")
          md.append("- `system_health_v4_40.csv`")
          md.append("- `tairid_v4_40_eboss_mapping_or_park.json`")
          md.append("- `tairid_v4_40_eboss_mapping_or_park.md`")
          md.append("")

          md_path = OUTDIR / "tairid_v4_40_eboss_mapping_or_park.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.40 eBOSS mapping or park artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-40-eboss-mapping-or-park
          path: artifacts/tairid_v4_40_eboss_mapping_or_park/
