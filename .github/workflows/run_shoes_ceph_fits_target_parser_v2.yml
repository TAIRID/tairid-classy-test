name: Run TAIRID SH0ES Cepheid FITS target parser v2

on:
  workflow_dispatch:

jobs:
  run-shoes-ceph-fits-target-parser-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy astropy pandas matplotlib

      - name: Run SH0ES Cepheid FITS target parser v2
        run: |
          python run_shoes_ceph_fits_target_parser_v2.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-ceph-fits-target-parser-v2-output
          path: |
            shoes_ceph_fits_target_parser_v2_outputs/**
