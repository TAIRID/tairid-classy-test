name: Run TAIRID high-k suppression proxy v1

on:
  workflow_dispatch:

jobs:
  run-high-k-suppression-proxy-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools and Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran libgsl-dev
          python -m pip install --upgrade pip setuptools wheel cython numpy scipy matplotlib
          python -m pip install classy || python -m pip install classy-community

      - name: Run TAIRID high-k suppression proxy v1
        run: python run_tairid_high_k_suppression_proxy_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-high-k-suppression-proxy-v1-output
          path: |
            *.txt
            *.csv
            *.json
            *.png
