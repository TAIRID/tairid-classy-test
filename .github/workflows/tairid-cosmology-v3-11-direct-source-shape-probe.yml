name: TAIRID Cosmology v3.11 Direct Source Shape Probe

on:
  workflow_dispatch:

jobs:
  direct-source-shape-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v3.11 direct source shape probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_11

          python - <<'PY'
          import csv
          import gzip
          import hashlib
          import json
          import math
          import os
          import re
          import shutil
          import statistics
          import sys
          import tarfile
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v3_11")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_11_direct_source_shape_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a cosmological model.",
              "This only checks whether the two direct-ready v3.10 sources can be downloaded and structurally inspected.",
              "A successful shape probe means source-specific ingestion can begin; it does not mean covariance-aware testing is complete."
          ]

          SOURCES = {
              "PantheonPlus_SH0ES": {
                  "surface": "reach_geometry",
                  "kind": "supernova_distance_covariance",
                  "files": {
                      "distance_table": "https://raw.githubusercontent.com/PantheonPlusSH0ES/DataRelease/main/Pantheon%2B_Data/4_DISTANCES_AND_COVAR/Pantheon%2BSH0ES.dat",
                      "stat_sys_covariance": "https://raw.githubusercontent.com/PantheonPlusSH0ES/DataRelease/main/Pantheon%2B_Data/4_DISTANCES_AND_COVAR/Pantheon%2BSH0ES_STAT%2BSYS.cov"
                  }
              },
              "KiDS_1000": {
                  "surface": "consolidation_growth",
                  "kind": "weak_lensing_archive",
                  "files": {
                      "cosmic_shear_release_tarball": "https://kids.strw.leidenuniv.nl/DR4/data_files/KiDS1000_cosmic_shear_data_release.tgz"
                  }
              }
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def download(url, path, timeout=120):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.11-direct-source-shape-probe/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  content_type = resp.headers.get("Content-Type")
                  content_length = resp.headers.get("Content-Length")
                  final_url = resp.geturl()

                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed with HTTP status {status}")

                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)

              return {
                  "url": url,
                  "path": str(path),
                  "status": status,
                  "content_type": content_type,
                  "content_length_header": content_length,
                  "final_url": final_url,
                  "size_bytes": path.stat().st_size,
                  "sha256": sha256_file(path)
              }

          def parse_pantheon_distance_table(path):
              rows = []
              with open(path, "r", encoding="utf-8", errors="replace") as f:
                  header = f.readline().strip().split()
                  for line in f:
                      line = line.strip()
                      if not line:
                          continue
                      parts = line.split()
                      if len(parts) != len(header):
                          continue
                      rows.append(dict(zip(header, parts)))

              required = ["CID", "zHD", "zCMB", "MU_SH0ES", "MU_SH0ES_ERR_DIAG", "IS_CALIBRATOR", "USED_IN_SH0ES_HF"]
              missing = [c for c in required if c not in header]

              def as_float(row, key):
                  try:
                      return float(row[key])
                  except Exception:
                      return None

              zhd = [as_float(r, "zHD") for r in rows if "zHD" in r]
              zhd = [x for x in zhd if x is not None]

              mu = [as_float(r, "MU_SH0ES") for r in rows if "MU_SH0ES" in r]
              mu = [x for x in mu if x is not None]

              calibrators = 0
              used_hf = 0
              for r in rows:
                  if str(r.get("IS_CALIBRATOR", "")).strip() in ["1", "True", "true"]:
                      calibrators += 1
                  if str(r.get("USED_IN_SH0ES_HF", "")).strip() in ["1", "True", "true"]:
                      used_hf += 1

              return {
                  "header_column_count": len(header),
                  "row_count": len(rows),
                  "required_columns_missing": missing,
                  "zHD_min": min(zhd) if zhd else None,
                  "zHD_max": max(zhd) if zhd else None,
                  "MU_SH0ES_min": min(mu) if mu else None,
                  "MU_SH0ES_max": max(mu) if mu else None,
                  "calibrator_count": calibrators,
                  "used_in_shoes_hf_count": used_hf,
                  "sample_columns": header[:25]
              }

          def parse_pantheon_covariance(path, expected_n=None):
              text = path.read_text(encoding="utf-8", errors="replace")
              tokens = text.split()

              if not tokens:
                  raise RuntimeError("Covariance file is empty.")

              try:
                  n = int(float(tokens[0]))
              except Exception as e:
                  raise RuntimeError(f"First covariance token is not a dimension: {tokens[0]}") from e

              value_count = len(tokens) - 1
              expected_values = n * n

              diag_values = []
              sample_diag_limit = min(n, 25)
              for i in range(sample_diag_limit):
                  idx = 1 + i * n + i
                  if idx < len(tokens):
                      try:
                          diag_values.append(float(tokens[idx]))
                      except Exception:
                          pass

              diag_positive_count = sum(1 for x in diag_values if x > 0)

              return {
                  "declared_dimension": n,
                  "expected_dimension_from_table": expected_n,
                  "value_count_after_dimension": value_count,
                  "expected_square_value_count": expected_values,
                  "square_count_match": value_count == expected_values,
                  "table_dimension_match": (expected_n == n) if expected_n is not None else None,
                  "sample_diag_count": len(diag_values),
                  "sample_diag_positive_count": diag_positive_count,
                  "sample_diag_min": min(diag_values) if diag_values else None,
                  "sample_diag_max": max(diag_values) if diag_values else None,
                  "sample_diag_mean": statistics.mean(diag_values) if diag_values else None
              }

          def classify_kids_member(name):
              lower = name.lower()
              categories = set()

              if any(x in lower for x in ["chain", "mcmc", "multinest", "samples", "posterior"]):
                  categories.add("chain_or_posterior")

              if any(x in lower for x in ["cov", "covariance", "covmat"]):
                  categories.add("covariance")

              if any(x in lower for x in ["data_vector", "datavector", "bandpower", "xi", "2pt", "twopoint", "shear"]):
                  categories.add("data_vector_or_shear_measurement")

              if any(x in lower for x in ["nofz", "n_z", "nz", "redshift", "photoz"]):
                  categories.add("redshift_distribution")

              if any(x in lower for x in ["cosmosis", ".ini", ".yaml", ".yml", "config", "values"]):
                  categories.add("config_or_pipeline")

              if any(lower.endswith(ext) for ext in [".fits", ".fit", ".fits.gz"]):
                  categories.add("fits_product")

              if any(lower.endswith(ext) for ext in [".txt", ".dat", ".csv", ".tsv"]):
                  categories.add("text_table")

              return sorted(categories)

          def inspect_kids_tarball(path):
              with tarfile.open(path, "r:gz") as tf:
                  members = [m for m in tf.getmembers() if m.isfile()]
                  total_uncompressed_size = sum(m.size for m in members)

                  category_counts = {}
                  category_examples = {}

                  largest = sorted(members, key=lambda m: m.size, reverse=True)[:25]

                  for m in members:
                      cats = classify_kids_member(m.name)
                      for cat in cats:
                          category_counts[cat] = category_counts.get(cat, 0) + 1
                          category_examples.setdefault(cat, [])
                          if len(category_examples[cat]) < 10:
                              category_examples[cat].append(m.name)

                  required_category_family = [
                      "chain_or_posterior",
                      "covariance",
                      "data_vector_or_shear_measurement",
                      "redshift_distribution",
                      "config_or_pipeline"
                  ]

                  detected_required = [
                      c for c in required_category_family
                      if category_counts.get(c, 0) > 0
                  ]

                  return {
                      "archive_member_file_count": len(members),
                      "archive_uncompressed_size_bytes": total_uncompressed_size,
                      "category_counts": category_counts,
                      "category_examples": category_examples,
                      "detected_required_category_count": len(detected_required),
                      "detected_required_categories": detected_required,
                      "largest_files": [
                          {
                              "name": m.name,
                              "size_bytes": m.size,
                              "categories": classify_kids_member(m.name)
                          }
                          for m in largest
                      ],
                      "first_80_files": [
                          {
                              "name": m.name,
                              "size_bytes": m.size,
                              "categories": classify_kids_member(m.name)
                          }
                          for m in members[:80]
                      ]
                  }

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "previous_milestone": {
                  "v3_10_status": "raw_covariance_ingestion_inventory_ready_for_targeted_download_probe",
                  "v3_10_next_allowed_step": "Build a targeted downloader/parser only for sources classified ready_for_targeted_download_probe."
              },
              "truth_boundary": TRUTH_BOUNDARY,
              "downloads": {},
              "source_shape_results": {},
              "gate_result": {}
          }

          print("TAIRID Cosmology v3.11 direct source shape probe")
          print("Truth boundary: direct file shape only; no cosmology fit; no model claim.")
          print()

          failed = []

          # Pantheon+SH0ES direct source probe.
          try:
              pantheon_dir = OUTDIR / "downloads" / "PantheonPlus_SH0ES"
              pantheon_dir.mkdir(parents=True, exist_ok=True)

              table_path = pantheon_dir / "PantheonPlusSH0ES.dat"
              cov_path = pantheon_dir / "PantheonPlusSH0ES_STAT_SYS.cov"

              table_dl = download(SOURCES["PantheonPlus_SH0ES"]["files"]["distance_table"], table_path)
              cov_dl = download(SOURCES["PantheonPlus_SH0ES"]["files"]["stat_sys_covariance"], cov_path)

              inventory["downloads"]["PantheonPlus_SH0ES_distance_table"] = table_dl
              inventory["downloads"]["PantheonPlus_SH0ES_stat_sys_covariance"] = cov_dl

              table_shape = parse_pantheon_distance_table(table_path)
              cov_shape = parse_pantheon_covariance(cov_path, expected_n=table_shape["row_count"])

              pantheon_pass = (
                  table_shape["row_count"] > 1000
                  and not table_shape["required_columns_missing"]
                  and cov_shape["square_count_match"] is True
                  and cov_shape["table_dimension_match"] is True
                  and cov_shape["sample_diag_positive_count"] == cov_shape["sample_diag_count"]
              )

              inventory["source_shape_results"]["PantheonPlus_SH0ES"] = {
                  "surface": "reach_geometry",
                  "kind": "supernova_distance_covariance",
                  "shape_pass": pantheon_pass,
                  "distance_table_shape": table_shape,
                  "covariance_shape": cov_shape
              }

              print("Pantheon+SH0ES:")
              print(f"  table rows: {table_shape['row_count']}")
              print(f"  covariance dimension: {cov_shape['declared_dimension']}")
              print(f"  covariance square match: {cov_shape['square_count_match']}")
              print(f"  table/cov dimension match: {cov_shape['table_dimension_match']}")
              print(f"  shape pass: {pantheon_pass}")
              print()

              if not pantheon_pass:
                  failed.append("PantheonPlus_SH0ES_shape_probe_failed")

          except Exception as e:
              failed.append("PantheonPlus_SH0ES_download_or_parse_failed")
              inventory["source_shape_results"]["PantheonPlus_SH0ES"] = {
                  "surface": "reach_geometry",
                  "kind": "supernova_distance_covariance",
                  "shape_pass": False,
                  "error": f"{type(e).__name__}: {e}"
              }
              print(f"Pantheon+SH0ES failed: {type(e).__name__}: {e}")
              print()

          # KiDS-1000 direct source probe.
          try:
              kids_dir = OUTDIR / "downloads" / "KiDS_1000"
              kids_dir.mkdir(parents=True, exist_ok=True)

              kids_path = kids_dir / "KiDS1000_cosmic_shear_data_release.tgz"
              kids_dl = download(SOURCES["KiDS_1000"]["files"]["cosmic_shear_release_tarball"], kids_path)

              inventory["downloads"]["KiDS_1000_cosmic_shear_release_tarball"] = kids_dl

              kids_shape = inspect_kids_tarball(kids_path)

              kids_pass = (
                  kids_shape["archive_member_file_count"] > 0
                  and kids_shape["detected_required_category_count"] >= 3
              )

              inventory["source_shape_results"]["KiDS_1000"] = {
                  "surface": "consolidation_growth",
                  "kind": "weak_lensing_archive",
                  "shape_pass": kids_pass,
                  "archive_shape": kids_shape
              }

              print("KiDS-1000:")
              print(f"  archive files: {kids_shape['archive_member_file_count']}")
              print(f"  detected categories: {', '.join(kids_shape['detected_required_categories'])}")
              print(f"  detected required category count: {kids_shape['detected_required_category_count']}")
              print(f"  shape pass: {kids_pass}")
              print()

              if not kids_pass:
                  failed.append("KiDS_1000_shape_probe_failed")

          except Exception as e:
              failed.append("KiDS_1000_download_or_parse_failed")
              inventory["source_shape_results"]["KiDS_1000"] = {
                  "surface": "consolidation_growth",
                  "kind": "weak_lensing_archive",
                  "shape_pass": False,
                  "error": f"{type(e).__name__}: {e}"
              }
              print(f"KiDS-1000 failed: {type(e).__name__}: {e}")
              print()

          pantheon_ok = inventory["source_shape_results"].get("PantheonPlus_SH0ES", {}).get("shape_pass") is True
          kids_ok = inventory["source_shape_results"].get("KiDS_1000", {}).get("shape_pass") is True

          if pantheon_ok and kids_ok:
              readiness_label = "direct_reach_and_growth_sources_shape_probe_passed_ready_for_v3_12_source_specific_ingestion"
          elif pantheon_ok and not kids_ok:
              readiness_label = "reach_source_shape_probe_passed_growth_source_needs_followup"
          elif kids_ok and not pantheon_ok:
              readiness_label = "growth_source_shape_probe_passed_reach_source_needs_followup"
          else:
              readiness_label = "direct_source_shape_probe_failed_manual_followup_needed"

          inventory["gate_result"] = {
              "failed_gates": failed,
              "readiness_label": readiness_label,
              "pantheon_reach_shape_pass": pantheon_ok,
              "kids_growth_shape_pass": kids_ok,
              "model_claim_allowed": False,
              "next_allowed_step": (
                  "Build v3.12 source-specific ingestion tables for Pantheon+SH0ES and KiDS-1000 only."
                  if pantheon_ok and kids_ok
                  else "Fix failed source download/shape probes before attempting source-specific ingestion."
              )
          }

          json_path = OUTDIR / "tairid_cosmology_v3_11_direct_source_shape_probe.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          csv_path = OUTDIR / "tairid_cosmology_v3_11_source_shape_summary.csv"
          with csv_path.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(
                  f,
                  fieldnames=[
                      "source",
                      "surface",
                      "kind",
                      "shape_pass",
                      "main_count",
                      "secondary_count",
                      "notes"
                  ]
              )
              writer.writeheader()

              p = inventory["source_shape_results"].get("PantheonPlus_SH0ES", {})
              if p:
                  table = p.get("distance_table_shape", {})
                  cov = p.get("covariance_shape", {})
                  writer.writerow({
                      "source": "PantheonPlus_SH0ES",
                      "surface": "reach_geometry",
                      "kind": "supernova_distance_covariance",
                      "shape_pass": p.get("shape_pass"),
                      "main_count": table.get("row_count"),
                      "secondary_count": cov.get("declared_dimension"),
                      "notes": f"table/cov dimension match={cov.get('table_dimension_match')}; square covariance count={cov.get('square_count_match')}"
                  })

              k = inventory["source_shape_results"].get("KiDS_1000", {})
              if k:
                  archive = k.get("archive_shape", {})
                  writer.writerow({
                      "source": "KiDS_1000",
                      "surface": "consolidation_growth",
                      "kind": "weak_lensing_archive",
                      "shape_pass": k.get("shape_pass"),
                      "main_count": archive.get("archive_member_file_count"),
                      "secondary_count": archive.get("detected_required_category_count"),
                      "notes": f"detected categories={', '.join(archive.get('detected_required_categories', []))}"
                  })

          md = []
          md.append("# TAIRID Cosmology v3.11 — Direct Source Shape Probe")
          md.append("")
          md.append(f"Created UTC: `{inventory['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{inventory['gate_result']['readiness_label']}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(failed) if failed else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## Why this test exists")
          md.append("")
          md.append(
              "v3.10 found that Pantheon+SH0ES and KiDS-1000 are direct-ready sources, one on the reach/geometry side and one on the consolidation/growth side. "
              "v3.11 checks whether those files can actually be downloaded and structurally inspected inside GitHub Actions."
          )
          md.append("")
          md.append("## Results")
          md.append("")
          md.append("| Surface | Source | Shape pass | Main count | Secondary count | Notes |")
          md.append("|---|---|---:|---:|---:|---|")

          p = inventory["source_shape_results"].get("PantheonPlus_SH0ES", {})
          if p:
              table = p.get("distance_table_shape", {})
              cov = p.get("covariance_shape", {})
              md.append(
                  f"| reach_geometry | PantheonPlus_SH0ES | {p.get('shape_pass')} | "
                  f"{table.get('row_count')} SN rows | {cov.get('declared_dimension')} covariance dimension | "
                  f"table/cov match={cov.get('table_dimension_match')}; square covariance={cov.get('square_count_match')} |"
              )

          k = inventory["source_shape_results"].get("KiDS_1000", {})
          if k:
              archive = k.get("archive_shape", {})
              md.append(
                  f"| consolidation_growth | KiDS_1000 | {k.get('shape_pass')} | "
                  f"{archive.get('archive_member_file_count')} archive files | {archive.get('detected_required_category_count')} required categories | "
                  f"{', '.join(archive.get('detected_required_categories', []))} |"
              )

          md.append("")
          md.append("## Interpretation")
          md.append("")
          md.append(
              "If both direct sources pass, the project now has one machine-checked reach source and one machine-checked growth source ready for source-specific ingestion. "
              "That still does not test TAIRID. It only upgrades the pipeline from URL readiness to real file-structure readiness."
          )
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(inventory["gate_result"]["next_allowed_step"])
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_cosmology_v3_11_direct_source_shape_probe.json`")
          md.append("- `tairid_cosmology_v3_11_source_shape_summary.csv`")
          md.append("- `tairid_cosmology_v3_11_direct_source_shape_probe.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_11_direct_source_shape_probe.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts:")
          print(f"  {json_path}")
          print(f"  {csv_path}")
          print(f"  {md_path}")

          if failed:
              sys.exit(2)

          sys.exit(0)
          PY

      - name: Upload TAIRID v3.11 direct source shape probe artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-11-direct-source-shape-probe
          path: artifacts/tairid_cosmology_v3_11/
