name: Run TAIRID External Lane Inventory v1.1

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-external-lane-inventory-v1-1:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib

      - name: Confirm scripts exist
        run: |
          pwd
          ls -la
          test -f run_tairid_boundary_polarity_battery_v1_0.py
          test -f run_tairid_external_lane_inventory_v1_1.py
          echo "v1.0 freeze file and v1.1 external-lane inventory runner found."

      - name: Run TAIRID External Lane Inventory v1.1
        run: |
          python run_tairid_external_lane_inventory_v1_1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-external-lane-inventory-v1-1-output
          path: |
            tairid_external_lane_inventory_v1_1_outputs/**
