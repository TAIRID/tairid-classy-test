name: "!!! AAA CURRENT - TAIRID v4.357 explicit observed value loading approval no scoring"

on:
  workflow_dispatch:
    inputs:
      human_approves_v4_356_dry_run_observed_rows:
        description: "Human explicitly approves the v4.356 dry-run observed rows for loading? This loads observed values only, not definition/covariance match, scoring, or support."
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"

jobs:
  run-v4-357-explicit-observed-value-loading-approval-no-scoring:
    name: "!!! AAA CURRENT - Run v4.357 observed value loading approval"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      HUMAN_APPROVES_V4_356_OBSERVED_ROWS: ${{ github.event.inputs.human_approves_v4_356_dry_run_observed_rows }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.356 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.356 output ZIP by pattern..."
          INPUT_356_ZIP="$(ls tairid-v4-356-observed-value-loading-dry-run-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_356_ZIP" ]; then
            echo "Could not find v4.356 output ZIP."
            echo "Expected:"
            echo "tairid-v4-356-observed-value-loading-dry-run-no-scoring-output.zip"
            exit 1
          fi

          echo "Using v4.356 ZIP:"
          echo "$INPUT_356_ZIP"
          echo "INPUT_356_ZIP=$INPUT_356_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.357 observed loading approval script
        run: |
          cat > run_v4_357_explicit_observed_value_loading_approval_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values approved; numeric baseline approved; observed source schema approved; observed values may be explicitly loaded here; no definition/covariance match; no scoring; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def main():
              input_356 = Path(os.environ["INPUT_356_ZIP"])
              human_approves = os.environ.get("HUMAN_APPROVES_V4_356_OBSERVED_ROWS", "no").strip().lower()
              human_approval_recorded = human_approves == "yes"

              outdir = Path("tairid_v4_357_explicit_observed_value_loading_approval_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base356 = extract_zip(input_356, "tairid_v4_357_356_")

              summary356_path = find_one(base356, "v4_356_summary.json")
              dry_rows_path = find_one(base356, "v4_356_observed_value_loading_DRY_RUN_ROWS_NOT_LOADED.csv")
              dry_summary_path = find_one(base356, "v4_356_dry_run_summary_NO_VALUES_LOADED.csv")
              review_packet_path = find_one(base356, "v4_356_HUMAN_FILL_observed_value_loading_review_packet_NO_SCORING.csv")
              checklist_path = find_one(base356, "v4_356_observed_value_loading_checklist_no_scoring.csv")
              gap_status_path = find_one(base356, "v4_356_gap_status_after_observed_value_dry_run.csv")
              approved_schema_path = find_one(base356, "v4_356_input_v4_355_approved_schema_preserved.csv")
              source_stage_path = find_one(base356, "v4_356_input_v4_355_source_stage_preserved.csv")
              rules356_path = find_one(base356, "v4_356_rule_checks.csv")

              summary356 = json.loads(summary356_path.read_text())
              dry_rows = pd.read_csv(dry_rows_path)
              dry_summary = pd.read_csv(dry_summary_path)
              review_packet = pd.read_csv(review_packet_path)
              checklist = pd.read_csv(checklist_path)
              gap_status = pd.read_csv(gap_status_path)
              approved_schema = pd.read_csv(approved_schema_path)
              source_stage = pd.read_csv(source_stage_path)
              rules356 = pd.read_csv(rules356_path)

              loaded_rows = []

              for _, row in dry_rows.iterrows():
                  dry_row_valid = bool(row["dry_run_row_valid"])

                  if human_approval_recorded and dry_row_valid:
                      load_status = "observed_value_loaded_for_later_definition_covariance_review"
                      observed_value_accepted_as_loaded = True
                      observed_values_loaded = True
                  elif human_approval_recorded and not dry_row_valid:
                      load_status = "blocked_invalid_dry_run_row"
                      observed_value_accepted_as_loaded = False
                      observed_values_loaded = False
                  else:
                      load_status = "blocked_pending_explicit_human_observed_loading_approval"
                      observed_value_accepted_as_loaded = False
                      observed_values_loaded = False

                  loaded_rows.append({
                      "v4_357_observed_value_id": f"v4_357_observed_value_{len(loaded_rows)+1:03d}",
                      "v4_356_dry_run_row_id": clean(row["v4_356_dry_run_row_id"]),
                      "source_row_index": row["source_row_index"],
                      "survey_or_source": clean(row["survey_or_source"]),
                      "tracer_or_sample": clean(row["tracer_or_sample"]),
                      "effective_redshift_z": row["effective_redshift_z"] if observed_values_loaded else "",
                      "observed_fsigma8": row["observed_fsigma8_candidate"] if observed_values_loaded else "",
                      "observed_fsigma8_uncertainty": row["observed_fsigma8_uncertainty_candidate"] if observed_values_loaded else "",
                      "covariance_or_error_model": clean(row["covariance_or_error_model"]) if observed_values_loaded else "",
                      "source_reference": clean(row["source_reference"]) if observed_values_loaded else "",
                      "source_url": clean(row["source_url"]) if observed_values_loaded else "",
                      "dry_run_row_valid": dry_row_valid,
                      "human_observed_loading_input": human_approves,
                      "human_observed_loading_recorded": human_approval_recorded,
                      "load_status": load_status,
                      "observed_value_accepted_as_loaded": observed_value_accepted_as_loaded,
                      "observed_values_loaded": observed_values_loaded,
                      "definition_match_confirmed": False,
                      "covariance_match_confirmed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              observed_loading_ledger = pd.DataFrame(loaded_rows)
              loaded_observed_rows = observed_loading_ledger[
                  observed_loading_ledger["observed_values_loaded"].astype(bool)
              ].copy()

              if human_approval_recorded:
                  observed_values_loaded_flag = len(loaded_observed_rows) == len(dry_rows)
                  observed_rows_loaded = int(len(loaded_observed_rows))
              else:
                  observed_values_loaded_flag = False
                  observed_rows_loaded = 0

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_357_GAP_001",
                      "gap": "Explicit observed-value loading approval gate.",
                      "status_after_v4_357": "closed_observed_values_loaded" if observed_values_loaded_flag else "blocked_pending_human_observed_loading_approval",
                      "next_gate": "v4_358_definition_and_covariance_match_readiness_no_scoring" if observed_values_loaded_flag else "rerun_v4_357_with_human_approval_yes_if_accepted",
                  },
                  {
                      "gap_id": "V4_357_GAP_002",
                      "gap": "Definition matching remains unconfirmed.",
                      "status_after_v4_357": "still_blocked",
                      "next_gate": "v4_358_definition_match_readiness",
                  },
                  {
                      "gap_id": "V4_357_GAP_003",
                      "gap": "Covariance/error-model matching remains unconfirmed.",
                      "status_after_v4_357": "still_blocked",
                      "next_gate": "v4_358_covariance_match_readiness",
                  },
                  {
                      "gap_id": "V4_357_GAP_004",
                      "gap": "Scoring remains blocked.",
                      "status_after_v4_357": "still_blocked",
                      "next_gate": "later_scoring_gate_only_after_definition_covariance_match",
                  },
                  {
                      "gap_id": "V4_357_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_357": "still_blocked",
                      "next_gate": "later_support_interpretation_gate_only_after_scoring",
                  },
              ])

              hard_checks = {
                  "input_v4_356_summary_found": summary356.get("version") == "v4.356",
                  "input_v4_356_rules_all_passed": summary_rules_all_passed(summary356),
                  "input_v4_356_failed_gates_none": summary356.get("failed_gates") == "none",
                  "input_v4_356_parameter_values_approved_true": summary356.get("parameter_values_approved") is True,
                  "input_v4_356_numeric_baseline_approved_true": summary356.get("numeric_baseline_approved") is True,
                  "input_v4_356_schema_approved_true": summary356.get("schema_approved") is True,
                  "input_v4_356_no_observed_values_loaded": summary356.get("observed_values_loaded") is False,
                  "input_v4_356_no_definition_match_confirmed": summary356.get("definition_match_confirmed") is False,
                  "input_v4_356_no_score_valid": summary356.get("score_valid") is False,
                  "input_v4_356_no_support_allowed": summary356.get("support_allowed") is False,

                  "rules356_all_passed": rules356["passed"].astype(bool).all(),
                  "dry_rows_match_summary": len(dry_rows) == int(summary356.get("source_rows_seen_for_dry_run")),
                  "dry_valid_rows_match_summary": int(dry_rows["dry_run_row_valid"].astype(bool).sum()) == int(summary356.get("dry_run_valid_rows")),
                  "dry_invalid_rows_match_summary": int((~dry_rows["dry_run_row_valid"].astype(bool)).sum()) == int(summary356.get("dry_run_invalid_rows")),
                  "dry_summary_rows_equal_4": len(dry_summary) == 4,
                  "review_packet_rows_equal_dry_rows": len(review_packet) == len(dry_rows),
                  "checklist_rows_equal_6": len(checklist) == 6,
                  "gap_status_rows_equal_5": len(gap_status) == 5,
                  "approved_schema_rows_equal_1": len(approved_schema) == 1,
                  "source_stage_rows_equal_1": len(source_stage) == 1,

                  "human_approval_input_valid": human_approves in ["yes", "no"],
                  "observed_loading_ledger_rows_equal_dry_rows": len(observed_loading_ledger) == len(dry_rows),
                  "loaded_observed_rows_correct_for_input": len(loaded_observed_rows) == (len(dry_rows) if human_approval_recorded else 0),
                  "observed_rows_loaded_correct_for_input": observed_rows_loaded == (len(dry_rows) if human_approval_recorded else 0),
                  "loaded_rows_have_positive_uncertainties_if_yes": (loaded_observed_rows["observed_fsigma8_uncertainty"].astype(float).gt(0).all() if human_approval_recorded else True),

                  "definition_match_confirmed_false": false_col(observed_loading_ledger, "definition_match_confirmed"),
                  "covariance_match_confirmed_false": false_col(observed_loading_ledger, "covariance_match_confirmed"),
                  "score_valid_false": false_col(observed_loading_ledger, "score_valid"),
                  "support_allowed_false": false_col(observed_loading_ledger, "support_allowed"),
                  "gap_update_rows_equal_5": len(gap_update) == 5,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              if observed_values_loaded_flag:
                  expected_result = "v4_357_explicit_observed_value_loading_approval_gate_passed_values_loaded_no_scoring_no_claims"
                  selected_next_route = "v4_358_definition_and_covariance_match_readiness_no_scoring_no_support_claims"
              else:
                  expected_result = "v4_357_blocked_pending_explicit_observed_value_loading_approval_no_scoring_no_claims"
                  selected_next_route = "rerun_v4_357_with_human_approves_v4_356_dry_run_observed_rows_yes_if_human_accepts"

              summary357 = {
                  "version": "v4.357",
                  "route_name": "v4_357_explicit_observed_value_loading_approval_gate_no_scoring_no_support_claims",
                  "expected_result": expected_result,
                  "input_version": "v4.356",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "human_observed_loading_input": human_approves,
                  "human_observed_loading_recorded": bool(human_approval_recorded),
                  "parameter_values_approved": True,
                  "numeric_baseline_values_filled": True,
                  "approved_baseline_values": 3,
                  "numeric_baseline_approved": True,
                  "schema_approved": True,
                  "observed_values_loaded": bool(observed_values_loaded_flag),
                  "observed_rows_loaded": int(observed_rows_loaded),
                  "definition_match_confirmed": False,
                  "covariance_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": selected_next_route,
              }

              observed_loading_ledger.to_csv(outdir / "v4_357_observed_value_loading_approval_ledger_NO_SCORING.csv", index=False)
              loaded_observed_rows.to_csv(outdir / "v4_357_LOADED_OBSERVED_VALUES_NO_DEFINITION_MATCH_NO_SCORING.csv", index=False)
              gap_update.to_csv(outdir / "v4_357_gap_status_after_observed_value_loading_approval.csv", index=False)
              dry_rows.to_csv(outdir / "v4_357_input_v4_356_dry_run_rows_preserved.csv", index=False)
              approved_schema.to_csv(outdir / "v4_357_input_v4_356_approved_schema_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_357_rule_checks.csv", index=False)

              (outdir / "v4_357_summary.json").write_text(json.dumps(summary357, indent=2))

              summary_md = f"""# TAIRID v4.357 Explicit Observed Value Loading Approval Gate — No Scoring

          Expected result: `{summary357["expected_result"]}`

          {summary357["rules_passed"]} / {summary357["rules_total"]} rules passed

          failed_gates = {summary357["failed_gates"]}

          human_observed_loading_input = `{human_approves}`

          human_observed_loading_recorded = `{human_approval_recorded}`

          observed_values_loaded = {observed_values_loaded_flag}

          observed_rows_loaded = {observed_rows_loaded}

          definition_match_confirmed = false

          covariance_match_confirmed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step may load observed values only when the human input is `yes`.

          It does **not** confirm definition matching.

          It does **not** confirm covariance/error-model matching.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{selected_next_route}`
          """
              (outdir / "v4_357_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary357, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_357_explicit_observed_value_loading_approval_no_scoring.py

      - name: Run v4.357 observed value loading approval no scoring
        run: |
          python run_v4_357_explicit_observed_value_loading_approval_no_scoring.py

      - name: Upload v4.357 observed value loading approval artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-357-explicit-observed-value-loading-approval-no-scoring-output
          path: |
            tairid_v4_357_explicit_observed_value_loading_approval_no_scoring_output/
            tairid_v4_357_explicit_observed_value_loading_approval_no_scoring_output.zip
