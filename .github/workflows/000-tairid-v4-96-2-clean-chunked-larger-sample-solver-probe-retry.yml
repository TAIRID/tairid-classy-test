              "sample_output_vector_count": len(report.get("sample_output_vectors", [])),
              "top_error_present": bool(report.get("top_error"))
          }, indent=2, sort_keys=True))
          """

          runner_code = runner_code.replace("__SAMPLE_PACKETS_JSON__", repr(json.dumps(SAMPLE_PACKETS)))
