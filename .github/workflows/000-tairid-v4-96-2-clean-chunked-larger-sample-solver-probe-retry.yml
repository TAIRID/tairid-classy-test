                  "camb"
              ],
              "pip_install_numpy_scipy_sympy_packaging_camb"
          )
          install_records.append(dependency_install)

          user_site = site.getusersitepackages()
          runner_path = OUTDIR / "camb_chunked_64_runner_v4_96_2.py"
          runner_json_path = OUTDIR / "camb_chunked_64_runner_output_v4_96.json"

          runner_code = """
          import json
          import math
          import site
          import sys
          import time
          import traceback
          from pathlib import Path

          SAMPLE_PACKETS = json.loads(__SAMPLE_PACKETS_JSON__)
          TARGET_REDSHIFTS = json.loads(__TARGET_REDSHIFTS_JSON__)
          OUTPUT_VECTOR_SCHEMA = json.loads(__OUTPUT_VECTOR_SCHEMA_JSON__)
          CHUNK_SIZE = 16
          OUT = Path(__RUNNER_JSON_PATH__)

          report = {
              "python_executable": sys.executable,
              "python_version": sys.version,
              "user_site": "",
              "sys_path_head": [],
              "numpy_imported": False,
              "numpy_version": "",
              "camb_imported": False,
              "camb_version": "",
              "chunk_solver_records": [],
              "sample_solver_records": [],
              "sample_output_vectors": [],
              "top_error": ""
          }

          def finite_positive_list(values, expected_len):
              try:
                  if len(values) != expected_len:
                      return False
                  return all(math.isfinite(float(x)) and float(x) > 0 for x in values)
              except Exception:
                  return False

          def orient(raw_values, locked_orientation):
              if locked_orientation == "reversed_raw_order":
                  return list(reversed([float(x) for x in raw_values]))
              if locked_orientation == "direct_raw_order":
                  return [float(x) for x in raw_values]
              raise RuntimeError("unknown locked orientation " + str(locked_orientation))

          def build_target_vector(sigma8_oriented, fsigma8_oriented):
              vector = []
              for i in range(len(TARGET_REDSHIFTS)):
                  vector.append(float(sigma8_oriented[i]))
                  vector.append(float(fsigma8_oriented[i]))
              return vector

          def run_one_sample(camb, np, packet, chunk_number):
              record = {
                  "chunk_number": chunk_number,
                  "sample_number": packet["sample_number"],
                  "source_line_number": packet["source_line_number"],
                  "sample_weight": packet["sample_weight"],
                  "minus_loglike_or_proxy": packet["minus_loglike_or_proxy"],
                  "set_cosmology_ok": False,
                  "init_power_ok": False,
                  "set_matter_power_ok": False,
                  "get_results_ok": False,
                  "get_sigma8_ok": False,
                  "get_fsigma8_ok": False,
                  "sigma8_len": 0,
                  "fsigma8_len": 0,
                  "complete_arrays": False,
                  "target_vector_len": 0,
                  "target_vector_finite": False,
                  "H0_recorded": "",
                  "Omega_m_recorded": "",
                  "elapsed_seconds": "",
                  "error_stage": "",
                  "error_tail": ""
              }

              output_row = {
                  "chunk_number": chunk_number,
                  "sample_number": packet["sample_number"],
                  "source_line_number": packet["source_line_number"],
                  "sample_weight": packet["sample_weight"],
                  "minus_loglike_or_proxy": packet["minus_loglike_or_proxy"],
                  "locked_orientation": "reversed_raw_order",
                  "sigma8_values_raw": [],
                  "fsigma8_values_raw": [],
                  "sigma8_values_oriented": [],
                  "fsigma8_values_oriented": [],
                  "target_vector_10": [],
                  "output_scope": "bounded_64_sample_chunked_solver_output_not_covariance"
              }

              t0 = time.time()

              try:
                  pars = camb.CAMBparams()

                  pars.set_cosmology(
                      H0=None,
                      ombh2=float(packet["omegabh2"]),
                      omch2=float(packet["omegach2"]),
                      cosmomc_theta=float(packet["cosmomc_theta_for_future_CAMB"]),
                      tau=float(packet["tau"]),
                      omk=0.0,
                      mnu=0.06,
                  )
                  record["set_cosmology_ok"] = True

                  try:
                      record["H0_recorded"] = float(pars.H0)
                  except Exception:
                      record["H0_recorded"] = ""

                  pars.InitPower.set_params(
                      As=float(packet["As_for_future_CAMB"]),
                      ns=float(packet["ns"]),
                  )
                  record["init_power_ok"] = True

                  try:
                      pars.NonLinear = camb.model.NonLinear_none
                  except Exception:
                      pass

                  pars.set_matter_power(
                      redshifts=[row["z"] for row in TARGET_REDSHIFTS],
                      kmax=2.0,
                      nonlinear=False,
                  )
                  record["set_matter_power_ok"] = True

                  results = camb.get_results(pars)
                  record["get_results_ok"] = True

                  sigma8_raw = [float(x) for x in np.atleast_1d(results.get_sigma8()).tolist()]
                  record["get_sigma8_ok"] = True
                  record["sigma8_len"] = len(sigma8_raw)

                  fsigma8_raw = [float(x) for x in np.atleast_1d(results.get_fsigma8()).tolist()]
                  record["get_fsigma8_ok"] = True
                  record["fsigma8_len"] = len(fsigma8_raw)

                  record["complete_arrays"] = (
                      finite_positive_list(sigma8_raw, len(TARGET_REDSHIFTS))
                      and finite_positive_list(fsigma8_raw, len(TARGET_REDSHIFTS))
                  )

                  sigma8_oriented = orient(sigma8_raw, "reversed_raw_order")
                  fsigma8_oriented = orient(fsigma8_raw, "reversed_raw_order")
                  target_vector = build_target_vector(sigma8_oriented, fsigma8_oriented)

                  output_row["sigma8_values_raw"] = sigma8_raw
                  output_row["fsigma8_values_raw"] = fsigma8_raw
                  output_row["sigma8_values_oriented"] = sigma8_oriented
                  output_row["fsigma8_values_oriented"] = fsigma8_oriented
                  output_row["target_vector_10"] = target_vector

                  record["target_vector_len"] = len(target_vector)
                  record["target_vector_finite"] = (
                      len(target_vector) == 10
                      and all(math.isfinite(float(x)) and float(x) > 0 for x in target_vector)
                  )

                  try:
                      record["Omega_m_recorded"] = float(results.get_Omega("matter", 0))
                  except Exception:
                      record["Omega_m_recorded"] = ""

              except Exception:
                  if not record["error_stage"]:
                      record["error_stage"] = "sample_solver_exception"
                  record["error_tail"] = traceback.format_exc()[-4000:]

              record["elapsed_seconds"] = round(time.time() - t0, 6)
              return record, output_row

          try:
              try:
                  user_site = site.getusersitepackages()
                  report["user_site"] = user_site
                  if user_site and user_site not in sys.path:
                      site.addsitedir(user_site)
              except Exception:
                  pass

              report["sys_path_head"] = sys.path[:12]

              import numpy as np
              report["numpy_imported"] = True
              report["numpy_version"] = getattr(np, "__version__", "")

              import camb
              report["camb_imported"] = True
              report["camb_version"] = getattr(camb, "__version__", "")

              for chunk_start in range(0, len(SAMPLE_PACKETS), CHUNK_SIZE):
                  chunk_number = (chunk_start // CHUNK_SIZE) + 1
                  chunk = SAMPLE_PACKETS[chunk_start:chunk_start + CHUNK_SIZE]
                  chunk_t0 = time.time()
                  before_count = len(report["sample_solver_records"])

                  for packet in chunk:
                      solver_record, output_row = run_one_sample(camb, np, packet, chunk_number)
                      report["sample_solver_records"].append(solver_record)
                      report["sample_output_vectors"].append(output_row)

                  after_records = report["sample_solver_records"][before_count:]
                  chunk_complete = (
                      len(after_records) == len(chunk)
                      and all(row.get("complete_arrays") is True for row in after_records)
                      and all(row.get("target_vector_len") == 10 for row in after_records)
                      and all(row.get("target_vector_finite") is True for row in after_records)
                  )

                  report["chunk_solver_records"].append({
                      "chunk_number": chunk_number,
                      "sample_start": chunk[0]["sample_number"] if chunk else "",
                      "sample_end": chunk[-1]["sample_number"] if chunk else "",
                      "chunk_sample_count": len(chunk),
