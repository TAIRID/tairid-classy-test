          def run_command(command, label, timeout_seconds=7200, env=None):
              record = {
                  "label": label,
                  "command": " ".join(command),
                  "returncode": "",
                  "ok": False,
                  "stdout_tail": "",
                  "stderr_tail": "",
                  "error": ""
              }
              try:
                  completed = subprocess.run(
                      command,
                      text=True,
                      capture_output=True,
                      timeout=timeout_seconds,
                      check=False,
                      env=env
                  )
                  record["returncode"] = completed.returncode
                  record["ok"] = completed.returncode == 0
                  record["stdout_tail"] = completed.stdout[-6000:]
                  record["stderr_tail"] = completed.stderr[-6000:]
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          def make_chunk_plan(packets, chunk_size):
              rows = []
              for start_index in range(0, len(packets), chunk_size):
                  chunk = packets[start_index:start_index + chunk_size]
                  weights = [float(row["sample_weight"]) for row in chunk]
                  rows.append({
                      "chunk_number": len(rows) + 1,
                      "sample_start": int(chunk[0]["sample_number"]) if chunk else "",
                      "sample_end": int(chunk[-1]["sample_number"]) if chunk else "",
                      "chunk_sample_count": len(chunk),
                      "chunk_weight_sum": sum(weights) if weights else 0.0,
                      "chunk_weight_min": min(weights) if weights else "",
                      "chunk_weight_max": max(weights) if weights else "",
                      "chunk_scope": "chunked_64_sample_solver_probe_not_reference_uncertainty"
                  })
              return rows

          chunk_plan_records = make_chunk_plan(SAMPLE_PACKETS, CHUNKING_CONTRACT["chunk_size"])

          install_records = []

          pip_upgrade = run_command(
