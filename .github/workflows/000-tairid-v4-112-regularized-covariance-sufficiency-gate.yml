name: 000 TAIRID v4.112 Regularized Covariance Sufficiency Gate

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-112-regularized-covariance-sufficiency-gate.yml"

jobs:
  tairid-v4-112-regularized-covariance-sufficiency-gate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.112 regularized covariance sufficiency gate
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_112_regularized_covariance_sufficiency_gate

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_112_regularized_covariance_sufficiency_gate")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_112_regularized_covariance_sufficiency_gate"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse chain sample rows.",
              "This does not run CAMB.",
              "This does not compute a new weighted covariance matrix.",
              "This does not compute a new regularized covariance matrix.",
              "This does not compute observed RSD covariance.",
              "This does not compute Planck reference uncertainty as a final claim.",
              "This judges whether the v4.111.1 regularized covariance diagnostic can move forward into an observed RSD covariance bridge.",
              "A pass means the regularized covariance diagnostic is mechanically usable for the next bridge design, not that TAIRID is validated."
          ]

          UPSTREAM_LOCKS = {
              "v4_111_1_regularized_reference_covariance_probe_variable_scope_repair": {
                  "readiness_label": "regularized_reference_covariance_probe_passed_ready_for_regularized_covariance_sufficiency_gate",
                  "parsed_sample_packet_count": 1024,
                  "solver_record_count": 1024,
                  "chunk_solver_record_count": 64,
                  "sample_output_vector_count": 1024,
                  "vector_component_record_count": 10240,
                  "contributing_solved_member_count": 4,
                  "effective_sample_size": 624.5301884527668,
                  "weight_sum": 2281.0,
                  "weighted_mean_vector_computed": True,
                  "weighted_covariance_matrix_computed": True,
                  "fsigma8_covariance_matrix_computed": True,
                  "full_covariance_rank_before": 7,
                  "fsigma8_covariance_rank_before": 4,
                  "regularized_covariance_matrix_computed": True,
                  "regularized_inverse_computed": True,
                  "pseudoinverse_comparison_computed": True,
                  "full_regularized_rank_after": 10,
                  "fsigma8_regularized_rank_after": 5,
                  "full_regularized_condition_number_after": 100000000.0,
                  "fsigma8_regularized_condition_number_after": 100000000.0,
                  "full_lambda_floor": 2.0926646139130397e-12,
                  "fsigma8_lambda_floor": 1.3981222436721584e-12,
                  "regularization_symmetry_ok": True,
                  "regularization_diagonal_ok": True,
                  "regularization_rank_ok": True,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_110_rank_aware_covariance_stabilization_design": {
                  "readiness_label": "rank_aware_covariance_stabilization_design_passed_ready_for_regularized_reference_covariance_probe",
                  "rank_aware_stabilization_required": True,
                  "regularization_allowed_next_probe": True,
                  "regularization_applied_now": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_109_broader_reference_uncertainty_sufficiency_gate": {
                  "readiness_label": "broader_reference_uncertainty_sufficiency_gate_passed_not_final_ready_for_rank_aware_covariance_stabilization_design",
                  "mechanics_gate_passed": True,
                  "final_reference_uncertainty_sufficient": False,
                  "final_reference_uncertainty_rejected": True,
                  "rank_aware_stabilization_required": True,
                  "full_covariance_rank": 7,
                  "fsigma8_covariance_rank": 4,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          REGULARIZED_SUFFICIENCY_CRITERIA = [
              {
                  "criterion_id": "sample_count_and_coverage",
                  "requirement": "Regularized diagnostic must rest on 1024 solved sample vectors across four selected-root chain members.",
                  "observed_value": f"{UPSTREAM_LOCKS['v4_111_1_regularized_reference_covariance_probe_variable_scope_repair']['sample_output_vector_count']} samples / {UPSTREAM_LOCKS['v4_111_1_regularized_reference_covariance_probe_variable_scope_repair']['contributing_solved_member_count']} members",
                  "required_value": "1024 samples / 4 members",
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["sample_output_vector_count"] >= 1024 and UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["contributing_solved_member_count"] >= 4,
                  "sufficiency_role": "required_for_bridge"
              },
              {
                  "criterion_id": "effective_sample_size",
                  "requirement": "Effective sample size must remain at or above 512 for this bounded diagnostic lane.",
                  "observed_value": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["effective_sample_size"],
                  "required_value": 512,
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["effective_sample_size"] >= 512,
                  "sufficiency_role": "required_for_bridge"
              },
              {
                  "criterion_id": "regularized_rank_full",
                  "requirement": "Full 10x10 regularized covariance must be full rank after stabilization.",
                  "observed_value": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["full_regularized_rank_after"],
                  "required_value": 10,
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["full_regularized_rank_after"] >= 10,
                  "sufficiency_role": "required_for_bridge"
              },
              {
                  "criterion_id": "regularized_rank_fsigma8",
                  "requirement": "fsigma8 5x5 regularized covariance must be full rank after stabilization.",
                  "observed_value": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["fsigma8_regularized_rank_after"],
                  "required_value": 5,
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["fsigma8_regularized_rank_after"] >= 5,
                  "sufficiency_role": "required_for_bridge"
              },
              {
                  "criterion_id": "condition_number_warning",
                  "requirement": "Condition number must be reported and carried as a warning when large.",
                  "observed_value": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["fsigma8_regularized_condition_number_after"],
                  "required_value": "reported",
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["fsigma8_regularized_condition_number_after"] != "",
                  "sufficiency_role": "warning_for_bridge"
              },
              {
                  "criterion_id": "pseudoinverse_comparison",
                  "requirement": "Pseudoinverse comparison must be computed as a sensitivity lane.",
                  "observed_value": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["pseudoinverse_comparison_computed"],
                  "required_value": True,
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["pseudoinverse_comparison_computed"] is True,
                  "sufficiency_role": "required_for_bridge"
              },
              {
                  "criterion_id": "regularization_quality",
                  "requirement": "Regularization must preserve symmetry, diagonal validity, and full regularized rank.",
                  "observed_value": f"sym={UPSTREAM_LOCKS['v4_111_1_regularized_reference_covariance_probe_variable_scope_repair']['regularization_symmetry_ok']} diag={UPSTREAM_LOCKS['v4_111_1_regularized_reference_covariance_probe_variable_scope_repair']['regularization_diagonal_ok']} rank={UPSTREAM_LOCKS['v4_111_1_regularized_reference_covariance_probe_variable_scope_repair']['regularization_rank_ok']}",
                  "required_value": "all true",
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["regularization_symmetry_ok"] is True and UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["regularization_diagonal_ok"] is True and UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["regularization_rank_ok"] is True,
                  "sufficiency_role": "required_for_bridge"
              },
              {
                  "criterion_id": "final_reference_claim_boundary",
                  "requirement": "Regularized covariance must remain diagnostic until observed RSD covariance bridge and claim review are completed.",
                  "observed_value": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["Planck_reference_uncertainty_computed"],
                  "required_value": False,
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["Planck_reference_uncertainty_computed"] is False,
                  "sufficiency_role": "claim_boundary_required"
              },
              {
                  "criterion_id": "final_RSD_pressure_boundary",
                  "requirement": "Final RSD pressure must remain blocked until observed covariance bridge exists.",
                  "observed_value": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["final_RSD_pressure_score_computed"],
                  "required_value": False,
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["final_RSD_pressure_score_computed"] is False,
                  "sufficiency_role": "claim_boundary_required"
              }
          ]

          bridge_required_pass = all(
              row["pass"]
              for row in REGULARIZED_SUFFICIENCY_CRITERIA
              if row["sufficiency_role"] in ["required_for_bridge", "claim_boundary_required"]
          )

          regularized_covariance_bridge_ready = bool(bridge_required_pass)
          final_reference_uncertainty_sufficient = False
          final_RSD_pressure_allowed = False

          CONDITION_DIAGNOSTIC = {
              "full_regularized_condition_number_after": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["full_regularized_condition_number_after"],
              "fsigma8_regularized_condition_number_after": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["fsigma8_regularized_condition_number_after"],
              "condition_number_warning_threshold": 1000000.0,
              "condition_number_high": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["fsigma8_regularized_condition_number_after"] >= 1000000.0,
              "interpretation": "Regularization made the covariance invertible, but the condition number is high. Treat the covariance as a rank-stabilized diagnostic and carry sensitivity warnings into the observed RSD bridge."
          }

          OBSERVED_RSD_BRIDGE_REQUIREMENTS = [
              {
                  "requirement_id": "observed_vector_order",
                  "requirement": "Observed fσ8 vector must use the same redshift order as the Planck reference vector: 0.15, 0.38, 0.51, 0.61, 2.33.",
                  "needed_next": True
              },
              {
                  "requirement_id": "observed_covariance_or_error_model",
                  "requirement": "Observed RSD covariance must be either source-provided or transparently built from published uncertainties with a declared correlation model.",
                  "needed_next": True
              },
              {
                  "requirement_id": "total_covariance_formula",
                  "requirement": "Total comparison covariance must be declared before pressure: C_total = C_observed + C_reference_regularized.",
                  "needed_next": True
              },
              {
                  "requirement_id": "regularization_sensitivity",
                  "requirement": "Pressure bridge must compare eigen-floor inverse with pseudoinverse and at least one conservative sensitivity lane.",
                  "needed_next": True
              },
              {
                  "requirement_id": "claim_boundary",
                  "requirement": "Bridge may compute a diagnostic pressure route, but not TAIRID validation or final cosmology proof.",
                  "needed_next": True
              }
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_113_observed_RSD_covariance_bridge_design",
                  "purpose": "Design how observed RSD fσ8 values and covariance will combine with the regularized Planck reference covariance.",
                  "why_next": "The regularized covariance is mechanically bridge-ready, but final pressure requires observed covariance and a declared total-covariance formula."
              },
              {
                  "priority": 2,
                  "route_id": "v4_114_observed_RSD_covariance_bridge_probe",
                  "purpose": "Compute the first guarded observed-plus-reference covariance bridge diagnostic.",
                  "why_next": "Only after v4.113 locks ordering, covariance formula, and sensitivity lanes."
              },
              {
                  "priority": 3,
                  "route_id": "v4_115_regularized_pressure_sensitivity_audit",
                  "purpose": "Audit whether pressure depends strongly on eigen-floor, pseudoinverse, or diagonal-loading assumptions.",
                  "why_next": "A rank-stabilized route requires sensitivity visibility."
              },
              {
                  "priority": 4,
                  "route_id": "v4_116_additional_chain_coverage_scaling_plan",
                  "purpose": "Optionally expand chain coverage further if the regularized bridge remains too sensitive.",
                  "why_next": "More raw posterior support may reduce dependence on stabilization."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A final Planck posterior covariance was computed in v4.112.",
              "A final Planck posterior mean vector was computed in v4.112.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The regularized covariance sufficiency gate validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "Regularized covariance is final Planck reference uncertainty.",
              "Regularized covariance is enough by itself for final RSD pressure.",
              "Eigenvalue flooring proves the model."
          ]

          failed_gates = []
          warnings = [
              "sufficiency_gate_only",
              "no_new_CAMB_run",
              "no_new_covariance_computation",
              "regularized_covariance_bridge_ready_but_not_final",
              "high_condition_number_warning",
              "observed_RSD_covariance_bridge_required",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          if not UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["regularized_covariance_matrix_computed"]:
              failed_gates.append("upstream_regularized_covariance_not_computed")

          if not UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["regularized_inverse_computed"]:
              failed_gates.append("upstream_regularized_inverse_not_computed")

          if not bridge_required_pass:
              failed_gates.append("regularized_bridge_required_criteria_not_all_passed")

          if final_reference_uncertainty_sufficient:
              failed_gates.append("final_reference_uncertainty_unexpectedly_allowed")

          if final_RSD_pressure_allowed:
              failed_gates.append("final_RSD_pressure_unexpectedly_allowed")

          if len(OBSERVED_RSD_BRIDGE_REQUIREMENTS) < 5:
              failed_gates.append("observed_RSD_bridge_requirements_incomplete")

          if len(NEXT_ROUTE_OPTIONS) < 4:
              failed_gates.append("next_route_options_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "final planck posterior covariance was computed in v4.112",
              "final rsd pressure score",
              "validates tairid cosmology",
              "regularized covariance is final planck reference uncertainty",
              "regularized covariance is enough by itself for final rsd pressure",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "regularized_covariance_sufficiency_gate_passed_bridge_ready_not_final_ready_for_observed_RSD_covariance_bridge_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_regularized_covariance_carried",
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["regularized_covariance_matrix_computed"] is True,
                  "result": "v4.111.1 regularized covariance diagnostic carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "regularized_rank_sufficient_for_bridge",
                  "pass": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["full_regularized_rank_after"] == 10 and UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["fsigma8_regularized_rank_after"] == 5,
                  "result": f"full_rank_after={UPSTREAM_LOCKS['v4_111_1_regularized_reference_covariance_probe_variable_scope_repair']['full_regularized_rank_after']}; fsigma8_rank_after={UPSTREAM_LOCKS['v4_111_1_regularized_reference_covariance_probe_variable_scope_repair']['fsigma8_regularized_rank_after']}",
                  "boundary": "Bridge readiness only."
              },
              {
                  "rule_id": "regularization_sensitivity_warning_carried",
                  "pass": CONDITION_DIAGNOSTIC["condition_number_high"] is True,
                  "result": f"fsigma8_condition_number={CONDITION_DIAGNOSTIC['fsigma8_regularized_condition_number_after']}",
                  "boundary": "High condition number warning, not failure."
              },
              {
                  "rule_id": "regularized_bridge_ready",
                  "pass": regularized_covariance_bridge_ready,
                  "result": "regularized covariance can move to observed RSD bridge design",
                  "boundary": "Not final Planck reference uncertainty."
              },
              {
                  "rule_id": "final_reference_still_blocked",
                  "pass": final_reference_uncertainty_sufficient is False,
                  "result": "regularized covariance is not final Planck reference uncertainty",
                  "boundary": "No final reference claim."
              },
              {
                  "rule_id": "final_RSD_pressure_still_blocked",
                  "pass": final_RSD_pressure_allowed is False,
                  "result": "observed RSD covariance bridge is required before pressure",
                  "boundary": "No final pressure score."
              },
              {
                  "rule_id": "observed_bridge_requirements_declared",
                  "pass": len(OBSERVED_RSD_BRIDGE_REQUIREMENTS) >= 5,
                  "result": f"{len(OBSERVED_RSD_BRIDGE_REQUIREMENTS)} observed bridge requirements declared",
                  "boundary": "Design next."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute pressure."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_112_rules_passed")

          if failed_gates:
              readiness_label = "regularized_covariance_sufficiency_gate_failed"
              next_allowed_step = "Repair regularized covariance sufficiency gate before observed RSD covariance bridge design."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.113 observed RSD covariance bridge design. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_sample_output_vector_count": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["sample_output_vector_count"],
              "upstream_effective_sample_size": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["effective_sample_size"],
              "upstream_full_covariance_rank_before": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["full_covariance_rank_before"],
              "upstream_fsigma8_covariance_rank_before": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["fsigma8_covariance_rank_before"],
              "full_regularized_rank_after": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["full_regularized_rank_after"],
              "fsigma8_regularized_rank_after": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["fsigma8_regularized_rank_after"],
              "full_regularized_condition_number_after": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["full_regularized_condition_number_after"],
              "fsigma8_regularized_condition_number_after": UPSTREAM_LOCKS["v4_111_1_regularized_reference_covariance_probe_variable_scope_repair"]["fsigma8_regularized_condition_number_after"],
              "condition_number_high": CONDITION_DIAGNOSTIC["condition_number_high"],
              "regularized_covariance_bridge_ready": regularized_covariance_bridge_ready,
              "final_reference_uncertainty_sufficient": final_reference_uncertainty_sufficient,
              "final_RSD_pressure_allowed": final_RSD_pressure_allowed,
              "observed_RSD_covariance_bridge_required": True,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "regularized_sufficiency_criteria": REGULARIZED_SUFFICIENCY_CRITERIA,
              "condition_diagnostic": CONDITION_DIAGNOSTIC,
              "observed_RSD_bridge_requirements": OBSERVED_RSD_BRIDGE_REQUIREMENTS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "regularized_covariance_bridge_ready": regularized_covariance_bridge_ready,
                  "final_reference_uncertainty_sufficient": final_reference_uncertainty_sufficient,
                  "final_RSD_pressure_allowed": final_RSD_pressure_allowed,
                  "condition_number_high": CONDITION_DIAGNOSTIC["condition_number_high"],
                  "observed_RSD_covariance_bridge_required": True,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_112_regularized_covariance_sufficiency_gate.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "regularized_sufficiency_criteria_v4_112.csv",
              REGULARIZED_SUFFICIENCY_CRITERIA,
              ["criterion_id", "requirement", "observed_value", "required_value", "pass", "sufficiency_role"]
          )

          condition_rows = [{"diagnostic": key, "value": value} for key, value in CONDITION_DIAGNOSTIC.items()]
          write_csv(
              OUTDIR / "condition_diagnostic_v4_112.csv",
              condition_rows,
              ["diagnostic", "value"]
          )

          write_csv(
              OUTDIR / "observed_RSD_bridge_requirements_v4_112.csv",
