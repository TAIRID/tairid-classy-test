name: Run TAIRID ETDD70 viability window v2

on:
  workflow_dispatch:

jobs:
  run-tairid-etdd70-viability-window-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy pandas matplotlib openpyxl

      - name: Run TAIRID ETDD70 viability window v2
        run: |
          python run_tairid_etdd70_viability_window_v2.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-etdd70-viability-window-v2-output
          path: |
            tairid_etdd70_viability_window_v2_outputs/**
