name: TAIRID Cosmology v4.5 KiDS Role Boundary Pressure Replacement Audit

on:
  workflow_dispatch:

jobs:
  kids-role-boundary-pressure-replacement-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.5 KiDS role boundary pressure replacement audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_5_kids_role_boundary_pressure_replacement_audit

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_5_kids_role_boundary_pressure_replacement_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_5_kids_role_boundary_pressure_replacement_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine KiDS, DES, and HSC into one posterior.",
              "This does not promote KiDS into a model anchor.",
              "This audit prevents hidden row substitution between KiDS cosmic shear and KiDS 3x2pt.",
              "A pass means the KiDS row roles were separated and carry-forward rules were assigned, not that TAIRID is validated."
          ]

          SOURCE_LEDGER = [
              {
                  "source_id": "v4_0_2_kids_published_width_repair",
                  "family": "KiDS",
                  "source_type": "prior_artifact",
                  "used_for": "Published KiDS cosmic-shear-only S8 role row."
              },
              {
                  "source_id": "v4_4_3_kids_readme_guided_parser_fallback",
                  "family": "KiDS",
                  "source_type": "prior_artifact",
                  "used_for": "Direct KiDS 3x2pt chain parsed axes."
              },
              {
                  "source_id": "v4_2_planck_axis_reference",
                  "family": "Planck",
                  "source_type": "prior_artifact",
                  "used_for": "Planck chain-derived S8, sigma8, and Omega_m reference axes."
              }
          ]

          PLANCK_AXIS_REFERENCE = {
              "S8": {"q50": 0.824821, "sigma_68": 0.012218},
              "sigma8": {"q50": 0.810123, "sigma_68": 0.006639},
              "Omega_m": {"q50": 0.310797, "sigma_68": 0.006153}
          }

          # KiDS cosmic-shear-only published summary row from v4.0.2.
          KIDS_COSMIC_SHEAR_ROW = {
              "row_id": "kids1000_published_cosmic_shear_only",
              "family": "KiDS",
              "row_role": "cosmic_shear_only_lensing_growth",
              "observable_scope": "cosmic_shear_only",
              "product_type": "published_summary",
              "s8_q50": 0.759,
              "s8_sigma_minus": 0.021,
              "s8_sigma_plus": 0.024,
              "sigma8_q50": "",
              "sigma8_sigma_68": "",
              "omegam_q50": "",
              "omegam_sigma_68": "",
              "status": "active_role_distinct_summary_row",
              "replacement_permission": "may_not_be_replaced_by_3x2pt_without_role_switch"
          }

          # KiDS direct 3x2pt chain row from v4.4.3.
          KIDS_3X2PT_DIRECT_ROW = {
              "row_id": "kids1000_direct_3x2pt_fiducial_chain",
              "family": "KiDS",
              "row_role": "fiducial_3x2pt_cosmic_shear_ggl_galaxy_clustering",
              "observable_scope": "cosmic_shear_plus_ggl_plus_galaxy_clustering",
              "product_type": "direct_chain_parse",
              "sample_count": 38083,
              "s8_q16": 0.7481324810452026,
              "s8_q50": 0.7645649990442438,
              "s8_q84": 0.7807736790297086,
              "s8_sigma_68": 0.01632059899225302,
              "sigma8_q16": 0.7373717779887471,
              "sigma8_q50": 0.758678356712955,
              "sigma8_q84": 0.7805385535838206,
              "sigma8_sigma_68": 0.02158338779753677,
              "omegam_q16": 0.2922119799003356,
              "omegam_q50": 0.3048090486225367,
              "omegam_q84": 0.31699348910573016,
              "omegam_sigma_68": 0.012390754602697285,
              "carried_v3_58_s8_q50": 0.764565,
              "diff_from_carried_v3_58_s8_q50": 0.0000000009557562519191265,
              "status": "active_role_distinct_direct_chain_row",
              "replacement_permission": "may_replace_only_prior_3x2pt_carried_row_after_audit"
          }

          DES_REFERENCE_ROW = {
              "row_id": "des_y3_3x2pt_combined",
              "family": "DES",
              "row_role": "3x2pt_combined_growth",
              "observable_scope": "galaxy_clustering_plus_ggl_plus_cosmic_shear",
              "product_type": "published_summary",
              "s8_q50": 0.776,
              "s8_sigma_minus": 0.017,
              "s8_sigma_plus": 0.017,
              "omegam_q50": 0.339,
              "omegam_sigma_minus": 0.031,
              "omegam_sigma_plus": 0.032,
              "status": "comparison_context_only"
          }

          HSC_REFERENCE_ROW = {
              "row_id": "hsc_y3_cosmic_shear_power_spectra",
              "family": "HSC",
              "row_role": "cosmic_shear_only_lensing_growth",
              "observable_scope": "cosmic_shear_only",
              "product_type": "published_summary",
              "s8_q50": 0.776,
              "s8_sigma_minus": 0.033,
              "s8_sigma_plus": 0.032,
              "status": "comparison_context_only"
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def directional_sigma(value, sigma_minus, sigma_plus, reference_value):
              if reference_value >= value:
                  return sigma_plus
              return sigma_minus

          def pressure_z(value, sigma, reference_value, reference_sigma):
              combined = math.sqrt(float(sigma) ** 2 + float(reference_sigma) ** 2)
              delta = float(value) - float(reference_value)
              z = delta / combined if combined > 0 else float("nan")
              return delta, combined, z

          def strength_label(z):
              abs_z = abs(float(z))
              if abs_z >= 2.5:
                  return "strong"
              if abs_z >= 1.5:
                  return "moderate"
              if abs_z >= 0.25:
                  return "weak"
              return "near_zero"

          def direction_label(delta):
              if delta < 0:
                  return "negative"
              if delta > 0:
                  return "positive"
              return "zero"

          def add_pressure_row(rows, source_row, axis, value, sigma, role_note):
              ref = PLANCK_AXIS_REFERENCE[axis]
              delta, combined, z = pressure_z(value, sigma, ref["q50"], ref["sigma_68"])
              rows.append({
                  "row_id": source_row["row_id"],
                  "family": source_row["family"],
                  "row_role": source_row["row_role"],
                  "observable_scope": source_row["observable_scope"],
                  "product_type": source_row["product_type"],
                  "axis": axis,
                  "observable_value": value,
                  "observable_sigma": sigma,
                  "planck_value": ref["q50"],
                  "planck_sigma": ref["sigma_68"],
                  "delta_observable_minus_planck": delta,
                  "combined_sigma": combined,
                  "pressure_z": z,
                  "direction": direction_label(delta),
                  "strength": strength_label(z),
                  "role_note": role_note
              })

          pressure_rows = []

          # KiDS cosmic-shear-only S8 row.
          add_pressure_row(
              pressure_rows,
              KIDS_COSMIC_SHEAR_ROW,
              "S8",
              KIDS_COSMIC_SHEAR_ROW["s8_q50"],
              directional_sigma(
                  KIDS_COSMIC_SHEAR_ROW["s8_q50"],
                  KIDS_COSMIC_SHEAR_ROW["s8_sigma_minus"],
                  KIDS_COSMIC_SHEAR_ROW["s8_sigma_plus"],
                  PLANCK_AXIS_REFERENCE["S8"]["q50"]
              ),
              "published_cosmic_shear_only_row_kept_role_distinct"
          )

          # KiDS direct 3x2pt axes.
          add_pressure_row(
              pressure_rows,
              KIDS_3X2PT_DIRECT_ROW,
              "S8",
              KIDS_3X2PT_DIRECT_ROW["s8_q50"],
              KIDS_3X2PT_DIRECT_ROW["s8_sigma_68"],
              "direct_3x2pt_chain_s8_replaces_only_prior_3x2pt_carried_value"
          )

          add_pressure_row(
              pressure_rows,
              KIDS_3X2PT_DIRECT_ROW,
              "sigma8",
              KIDS_3X2PT_DIRECT_ROW["sigma8_q50"],
              KIDS_3X2PT_DIRECT_ROW["sigma8_sigma_68"],
              "direct_3x2pt_chain_sigma8_decomposition_axis"
          )

          add_pressure_row(
              pressure_rows,
              KIDS_3X2PT_DIRECT_ROW,
              "Omega_m",
              KIDS_3X2PT_DIRECT_ROW["omegam_q50"],
              KIDS_3X2PT_DIRECT_ROW["omegam_sigma_68"],
              "direct_3x2pt_chain_omegam_decomposition_axis"
          )

          # Context rows from v4.1/v4.2.
          add_pressure_row(
              pressure_rows,
              DES_REFERENCE_ROW,
              "S8",
              DES_REFERENCE_ROW["s8_q50"],
              directional_sigma(
                  DES_REFERENCE_ROW["s8_q50"],
                  DES_REFERENCE_ROW["s8_sigma_minus"],
                  DES_REFERENCE_ROW["s8_sigma_plus"],
                  PLANCK_AXIS_REFERENCE["S8"]["q50"]
              ),
              "DES_context_row_not_recomputed_from_direct_chain"
          )

          add_pressure_row(
              pressure_rows,
              HSC_REFERENCE_ROW,
              "S8",
              HSC_REFERENCE_ROW["s8_q50"],
              directional_sigma(
                  HSC_REFERENCE_ROW["s8_q50"],
                  HSC_REFERENCE_ROW["s8_sigma_minus"],
                  HSC_REFERENCE_ROW["s8_sigma_plus"],
                  PLANCK_AXIS_REFERENCE["S8"]["q50"]
              ),
              "HSC_context_row_not_recomputed_from_direct_chain"
          )

          role_boundary_rows = [
              {
                  "boundary_id": "kids_cosmic_shear_vs_3x2pt_scope",
                  "rule": "KiDS cosmic-shear-only and KiDS 3x2pt are not the same row.",
                  "status": "enforced",
                  "reason": "Cosmic shear isolates lensing-only growth; 3x2pt includes cosmic shear, galaxy-galaxy lensing, and galaxy clustering."
              },
              {
                  "boundary_id": "direct_chain_replacement_scope",
                  "rule": "The direct KiDS 3x2pt chain may replace only the prior carried KiDS 3x2pt value.",
                  "status": "enforced",
                  "reason": "v4.4.3 matched the carried v3.58 3x2pt S8 q50 to within 0.001."
              },
              {
                  "boundary_id": "cosmic_shear_summary_preservation",
                  "rule": "The published KiDS cosmic-shear-only row remains active as a role-distinct summary row.",
                  "status": "enforced",
                  "reason": "The 3x2pt direct chain is not allowed to silently overwrite a cosmic-shear-only comparison."
              },
              {
                  "boundary_id": "growth_family_summary_policy",
                  "rule": "Future family summaries must state whether they are using lensing-only rows, 3x2pt rows, or mixed context rows.",
                  "status": "enforced",
                  "reason": "This prevents accidental one-surface collapse or hidden product mixing."
              },
              {
                  "boundary_id": "decomposition_policy",
                  "rule": "sigma8 and Omega_m decomposition should prefer direct-chain rows over summary-only rows when available.",
                  "status": "enforced",
                  "reason": "Direct chain axes support cleaner decomposition than S8-only published summaries."
              }
          ]

          carry_forward_rows = [
              {
                  "carry_id": "kids_lensing_only_surface",
                  "row_to_carry": "kids1000_published_cosmic_shear_only",
                  "carry_status": "carry_as_role_distinct_summary_row",
                  "used_for": "lensing_only_growth_family_context",
                  "may_replace_prior": "no",
                  "boundary": "Do not replace with 3x2pt."
              },
              {
                  "carry_id": "kids_3x2pt_direct_surface",
                  "row_to_carry": "kids1000_direct_3x2pt_fiducial_chain",
                  "carry_status": "carry_as_direct_chain_3x2pt_row",
                  "used_for": "3x2pt_growth_decomposition_and_direct_kids_axis",
                  "may_replace_prior": "only_prior_carried_3x2pt_value",
                  "boundary": "Does not replace cosmic-shear-only row."
              },
              {
                  "carry_id": "kids_decomposition_surface",
                  "row_to_carry": "kids1000_direct_3x2pt_fiducial_chain_sigma8_omegam_axes",
                  "carry_status": "carry_as_decomposition_candidate",
                  "used_for": "S8_sigma8_Omega_m decomposition",
                  "may_replace_prior": "yes_for_kids_decomposition_lane",
                  "boundary": "Still diagnostic only; no model claim."
              }
          ]

          failed_gates = []
          warnings = []

          direct_s8 = next(
              row for row in pressure_rows
              if row["row_id"] == "kids1000_direct_3x2pt_fiducial_chain" and row["axis"] == "S8"
          )

          direct_sigma8 = next(
              row for row in pressure_rows
              if row["row_id"] == "kids1000_direct_3x2pt_fiducial_chain" and row["axis"] == "sigma8"
          )

          direct_omegam = next(
              row for row in pressure_rows
              if row["row_id"] == "kids1000_direct_3x2pt_fiducial_chain" and row["axis"] == "Omega_m"
          )

          cosmic_shear_s8 = next(
              row for row in pressure_rows
              if row["row_id"] == "kids1000_published_cosmic_shear_only" and row["axis"] == "S8"
          )

          if direct_s8["direction"] != "negative":
              failed_gates.append("direct_3x2pt_s8_not_negative_vs_planck")

          if direct_sigma8["direction"] != "negative":
              warnings.append("direct_3x2pt_sigma8_not_negative_vs_planck")

          if cosmic_shear_s8["direction"] != "negative":
              failed_gates.append("published_cosmic_shear_s8_not_negative_vs_planck")

          if direct_s8["strength"] != "strong":
              warnings.append("direct_3x2pt_s8_not_strong_against_planck")

          if direct_sigma8["strength"] not in ["moderate", "strong"]:
              warnings.append("direct_3x2pt_sigma8_not_moderate_or_strong_against_planck")

          if direct_omegam["strength"] in ["strong", "moderate"]:
              warnings.append("direct_3x2pt_omegam_pressure_not_weak_check_tradeoff")

          if KIDS_3X2PT_DIRECT_ROW["diff_from_carried_v3_58_s8_q50"] > 0.001:
              failed_gates.append("direct_3x2pt_does_not_match_carried_v3_58_s8_value")

          role_boundaries_enforced = all(row["status"] == "enforced" for row in role_boundary_rows)

          if not role_boundaries_enforced:
              failed_gates.append("role_boundaries_not_enforced")

          if failed_gates:
              readiness_label = "kids_role_boundary_pressure_replacement_audit_failed"
              next_step = "Repair KiDS role boundaries before using the direct chain row downstream."
          else:
              readiness_label = "kids_role_boundary_pressure_replacement_audit_passed_ready_for_updated_growth_family_checkpoint"
              next_step = (
                  "Proceed to v4.6 updated growth-family checkpoint with role-explicit KiDS rows. "
                  "Carry KiDS cosmic shear as lensing-only context and KiDS direct 3x2pt as direct-chain decomposition row."
              )

          interpretation = (
              "The direct KiDS 3x2pt chain may replace the prior carried KiDS 3x2pt value because v4.4.3 recovered the same S8 q50. "
              "It must not silently replace the published KiDS cosmic-shear-only row. "
              "The direct 3x2pt pressure is strong negative in S8, moderate negative in sigma8, and weak in Omega_m, which supports the current reading that the KiDS pressure is mostly a growth/amplitude-side pressure rather than a pure Omega_m shift."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_ledger": SOURCE_LEDGER,
              "planck_axis_reference": PLANCK_AXIS_REFERENCE,
              "kids_cosmic_shear_row": KIDS_COSMIC_SHEAR_ROW,
              "kids_3x2pt_direct_row": KIDS_3X2PT_DIRECT_ROW,
              "pressure_rows": pressure_rows,
              "role_boundary_rows": role_boundary_rows,
              "carry_forward_rows": carry_forward_rows,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_growth_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "automatic_row_replacement_allowed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "role_boundaries_enforced": role_boundaries_enforced,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "automatic_row_replacement_allowed": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "kids_role_boundary_rows_v4_5.csv",
              role_boundary_rows,
              ["boundary_id", "rule", "status", "reason"]
          )

          write_csv(
              OUTDIR / "kids_carry_forward_policy_v4_5.csv",
              carry_forward_rows,
              ["carry_id", "row_to_carry", "carry_status", "used_for", "may_replace_prior", "boundary"]
          )

          write_csv(
              OUTDIR / "kids_role_explicit_pressure_rows_v4_5.csv",
              pressure_rows,
              [
                  "row_id",
                  "family",
                  "row_role",
                  "observable_scope",
                  "product_type",
                  "axis",
                  "observable_value",
                  "observable_sigma",
                  "planck_value",
                  "planck_sigma",
                  "delta_observable_minus_planck",
                  "combined_sigma",
                  "pressure_z",
                  "direction",
                  "strength",
                  "role_note"
              ]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_replacement_scope_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The direct KiDS 3x2pt chain may replace only the prior carried KiDS 3x2pt value.",
                  "boundary": "It does not replace the KiDS cosmic-shear-only row."
              },
              {
                  "interpretation_id": "allowed_amplitude_pressure_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The direct KiDS 3x2pt chain shows strong negative S8 pressure and moderate negative sigma8 pressure, while Omega_m pressure is weak.",
                  "boundary": "Diagnostic pressure decomposition only, not validation."
              },
              {
                  "interpretation_id": "allowed_role_distinction_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Future growth-family checkpoints must state whether they are using lensing-only rows, 3x2pt rows, or mixed context rows.",
                  "boundary": "Blocks hidden product mixing."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID is validated.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_automatic_replacement_claim",
                  "status": "forbidden",
                  "wording": "The direct KiDS 3x2pt chain automatically replaces all prior KiDS rows.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_model_comparison_claim",
                  "status": "forbidden",
                  "wording": "A likelihood, BIC, or model comparison was run.",
                  "boundary": "Blocked."
              }
          ]

          write_csv(
              OUTDIR / "interpretation_boundaries_v4_5.csv",
              interpretation_rows,
              ["interpretation_id", "status", "wording", "boundary"]
          )

          json_path = OUTDIR / "tairid_cosmology_v4_5_kids_role_boundary_pressure_replacement_audit.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v4.5 — KiDS Role-Boundary Pressure Replacement Audit")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v4.4.3 successfully recovered the direct KiDS 3x2pt chain axes. v4.5 decides how those axes may be carried forward without mixing them into the KiDS cosmic-shear-only row.")
          md.append("")
          md.append("The core rule is simple: KiDS cosmic shear and KiDS 3x2pt are related, but they are not the same diagnostic row.")
          md.append("")
          md.append("## Role boundary result")
          md.append("")
          md.append("| Boundary | Status | Rule |")
          md.append("|---|---|---|")
          for row in role_boundary_rows:
              md.append(f"| `{row['boundary_id']}` | `{row['status']}` | {row['rule']} |")
          md.append("")
          md.append("## Role-explicit pressure rows")
          md.append("")
          md.append("| Row | Role | Axis | Value | Sigma | Pressure z | Direction | Strength |")
          md.append("|---|---|---|---:|---:|---:|---|---|")
          for row in pressure_rows:
              md.append(
                  f"| `{row['row_id']}` | `{row['row_role']}` | `{row['axis']}` | "
                  f"`{row['observable_value']:.12f}` | `{row['observable_sigma']:.12f}` | "
                  f"`{row['pressure_z']:.12f}` | `{row['direction']}` | `{row['strength']}` |"
              )
          md.append("")
          md.append("## Carry-forward policy")
          md.append("")
          md.append("| Carry ID | Row | Status | Boundary |")
          md.append("|---|---|---|---|")
          for row in carry_forward_rows:
              md.append(
                  f"| `{row['carry_id']}` | `{row['row_to_carry']}` | `{row['carry_status']}` | {row['boundary']} |"
              )
          md.append("")
          md.append("## Interpretation")
          md.append("")
          md.append(interpretation)
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `kids_role_boundary_rows_v4_5.csv`")
          md.append("- `kids_carry_forward_policy_v4_5.csv`")
          md.append("- `kids_role_explicit_pressure_rows_v4_5.csv`")
          md.append("- `interpretation_boundaries_v4_5.csv`")
          md.append("- `tairid_cosmology_v4_5_kids_role_boundary_pressure_replacement_audit.json`")
          md.append("- `tairid_cosmology_v4_5_kids_role_boundary_pressure_replacement_audit.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v4_5_kids_role_boundary_pressure_replacement_audit.md"
