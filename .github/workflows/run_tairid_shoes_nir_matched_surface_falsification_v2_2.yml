name: Run TAIRID SH0ES NIR Matched Surface Falsification v2.2

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-nir-matched-surface-falsification-v2-2:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_nir_matched_surface_falsification_v2_2.py
          echo "v2.2 SH0ES NIR matched surface falsification found."

      - name: Run TAIRID SH0ES NIR Matched Surface Falsification v2.2
        run: |
          python run_tairid_shoes_nir_matched_surface_falsification_v2_2.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-nir-matched-surface-falsification-v2-2-output
          path: |
            tairid_shoes_nir_matched_surface_falsification_v2_2_outputs/**
