              }
          ]

          claim_rows = [
              {
                  "claim": "Passing staging validates G1.",
                  "status": "blocked",
                  "safe_wording": "Passing staging means the combined candidate table is ready for a guarded covariance/correlation preview.",
                  "forbidden_wording": "G1 is validated."
              },
              {
                  "claim": "Passing staging means both surfaces have the same units.",
                  "status": "blocked",
                  "safe_wording": "The rows share normalized candidate axes but preserve different source surfaces.",
                  "forbidden_wording": "Dyslexia and aphantasia units are equivalent."
              },
              {
                  "claim": "Aphantasia drawing performance is represented.",
                  "status": "blocked",
                  "safe_wording": "Aphantasia remains questionnaire-only until drawing features or scores are added.",
                  "forbidden_wording": "The drawing-performance lane is complete."
              }
          ]

          next_routes = [
              {
                  "priority": 1,
                  "route": selected_next_route,
                  "condition": package_status,
                  "next_action": "If staging passed, run a guarded G1 covariance/correlation preview. If staging failed, repair the listed row issues."
              },
              {
                  "priority": 2,
                  "route": "aphantasia_drawing_feature_or_score_extraction_gap_with_scope_guards",
                  "condition": "aphantasia questionnaire-only limitation remains",
                  "next_action": "Search or build drawing-performance scoring separately."
              },
              {
                  "priority": 3,
                  "route": "shape_lattice_update_after_g1_candidate_covariance_preview_with_scope_guards",
                  "condition": "after G1 candidate covariance/correlation preview",
                  "next_action": "Update the lattice with measured/candidate G1 covariance information under claim guards."
              }
          ]

          write_csv(OUT / "v4_214_v4_213_status_review.csv", [V4_213_STATUS], list(V4_213_STATUS.keys()))
          (OUT / "v4_214_v4_213_status_review.json").write_text(json.dumps(V4_213_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_214_download_status.csv", download_status_rows, [
              "source_lane", "file_name", "purpose", "download_status", "download_error",
              "downloaded_size_bytes", "claim_boundary"
          ])
          write_csv(OUT / "candidate_data_neurotype_combined_g1_dyslexia_aphantasia_subject_axis_input_validated.csv", combined_rows, TARGET_CANONICAL_COLUMNS)
          write_csv(OUT / "v4_214_row_issue_report.csv", row_issue_rows, [
              "row_number", "lane", "subject_id", "boundary_or_task",
              "missing_columns", "missing_required_values", "nonnumeric_values",
              "placeholder_hits", "claim_boundary"
          ])
          write_csv(OUT / "v4_214_group_count_summary.csv", group_count_rows, [
              "lane", "group_or_condition", "boundary_or_task", "n_rows", "claim_boundary"
          ])
          write_csv(OUT / "v4_214_source_surface_boundary_ledger.csv", source_surface_rows, [
              "lane", "row_count", "unique_subject_count", "unique_boundary_count",
              "unique_group_count", "source_surface", "measurement_warning", "claim_boundary"
          ])
          write_csv(OUT / "v4_214_staging_scorecard.csv", staging_scorecard, [
              "check", "status", "value", "required", "claim_boundary"
          ])
          write_csv(OUT / "v4_214_claim_boundary_matrix.csv", claim_rows, [
