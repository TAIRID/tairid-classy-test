          ])
          write_csv(OUT / "v4_214_next_routes.csv", next_routes, [
              "priority", "route", "condition", "next_action"
          ])

          route_decision = {
              "version": "v4.214",
              "result_label": RESULT_LABEL,
              "clean_result": "The combined G1 candidate input was rebuilt and staged through checks for complete rows, numeric axis values, group presence, placeholder absence, and source-surface boundary preservation.",
              "downloaded_count": downloaded_count,
              "combined_candidate_rows": len(combined_rows),
              "complete_rows": complete_rows,
              "row_issue_count": len(row_issue_rows),
              "placeholder_rows": placeholder_rows,
              "dyslexia_rows": lane_counts.get("Dyslexia", 0),
              "aphantasia_rows": lane_counts.get("Aphantasia", 0),
              "groups_present": sorted(group_counts.keys()),
              "boundaries_present": sorted(boundary_counts.keys()),
              "both_halves_stageable": both_halves_stageable,
              "metric_files_seen": metric_files_seen,
              "aphantasia_schema_columns": aphantasia_schema_columns,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "combined G1 candidate input staging only; not covariance, not validation, not unit equivalence",
              "blocked_claims": BLOCKED_CLAIMS
          }
          (OUT / "v4_214_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_214_scope_guards.json").write_text(json.dumps({
              "scope": "combined G1 candidate input staging validator",
              "staging_is_validation": False,
              "staging_is_covariance": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "dyslexia_surface": "ETDD70 reading eye-tracking task metrics",
              "aphantasia_surface": "VVIQ/OSIQ questionnaire-only candidate mapping",
              "drawing_performance_scoring_present": False,
              "raw_numbers_moved_between_domains": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_214_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.214 - Combined G1 Candidate Input Staging Validator",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.213 wrote the combined candidate table. v4.214 rebuilds it and checks whether it is staged well enough for a guarded covariance/correlation preview.",
              "",
              "Downloaded count: `" + str(downloaded_count) + "`",
              "Combined candidate rows: `" + str(len(combined_rows)) + "`",
              "Complete rows: `" + str(complete_rows) + "`",
              "Row issue count: `" + str(len(row_issue_rows)) + "`",
              "Placeholder rows: `" + str(placeholder_rows) + "`",
              "Dyslexia rows: `" + str(lane_counts.get("Dyslexia", 0)) + "`",
              "Aphantasia rows: `" + str(lane_counts.get("Aphantasia", 0)) + "`",
              "Both halves stageable: `" + str(both_halves_stageable) + "`",
              "",
              "Package status: `" + package_status + "`",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_214_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_214_v4_213_status_review.csv",
              "v4_214_v4_213_status_review.json",
              "v4_214_download_status.csv",
              "candidate_data_neurotype_combined_g1_dyslexia_aphantasia_subject_axis_input_validated.csv",
              "v4_214_row_issue_report.csv",
              "v4_214_group_count_summary.csv",
              "v4_214_source_surface_boundary_ledger.csv",
              "v4_214_staging_scorecard.csv",
              "v4_214_claim_boundary_matrix.csv",
              "v4_214_next_routes.csv",
              "v4_214_route_decision.json",
              "v4_214_scope_guards.json",
              "v4_214_blocked_claims.json",
              "v4_214_summary.md"
          ]

          rules = {
              "version_is_v4_214": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_213_status_reviewed": V4_213_STATUS["rule_pass_count"] == 12,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "validated_candidate_table_written": (OUT / "candidate_data_neurotype_combined_g1_dyslexia_aphantasia_subject_axis_input_validated.csv").exists(),
              "staging_scorecard_written": (OUT / "v4_214_staging_scorecard.csv").exists(),
              "row_issue_report_written": (OUT / "v4_214_row_issue_report.csv").exists(),
              "source_surface_boundary_ledger_written": (OUT / "v4_214_source_surface_boundary_ledger.csv").exists(),
              "selected_route_present": bool(selected_next_route),
              "no_covariance_claim": True,
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.214",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "downloaded_count": downloaded_count,
              "combined_candidate_rows": len(combined_rows),
              "complete_rows": complete_rows,
              "row_issue_count": len(row_issue_rows),
              "placeholder_rows": placeholder_rows,
              "dyslexia_rows": lane_counts.get("Dyslexia", 0),
              "aphantasia_rows": lane_counts.get("Aphantasia", 0),
              "both_halves_stageable": both_halves_stageable,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "combined_g1_candidate_input_staging_only_no_validation"
          }
          (OUT / "v4_214_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.214 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_214_outputs/run_v4_214.py

