name: 000 TAIRID v4.84.1 CAMB Smoke Failure Inspector

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-84-1-camb-smoke-failure-inspector.yml"

jobs:
  tairid-v4-84-1-camb-smoke-failure-inspector:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.84.1 CAMB smoke failure inspector
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_84_1_camb_smoke_failure_inspector

          python - <<'PY'
          import csv
          import json
          import math
          import subprocess
          import sys
          import traceback
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_84_1_camb_smoke_failure_inspector")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_84_1_camb_smoke_failure_inspector"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This is a CAMB smoke-run failure inspector after v4.84 produced zero orientation records.",
              "This may install and import CAMB only to locate the failing step.",
              "This may attempt tiny CAMB variants only as diagnostics.",
              "This does not accept any diagnostic output as final residuals.",
              "A pass means the failure route was captured clearly, not that CAMB science output is accepted."
          ]

          UPSTREAM_LOCKS = {
              "v4_84_camb_tiny_single_fixture_smoke_run": {
                  "status": "failed",
                  "observed_rule_pass_count": "10/14",
                  "observed_orientation_record_count": 0,
                  "known_issue": "CAMB smoke run did not reach usable orientation records.",
                  "formal_residual_audit_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_83_camb_tiny_single_fixture_mapping_contract": {
                  "readiness_label": "CAMB_tiny_single_fixture_mapping_contract_passed_ready_for_CAMB_tiny_single_fixture_smoke_run",
                  "mapping_contract_complete": True,
                  "CAMB_run": False,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          SOURCE_FIXTURE = {
              "root": "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE",
              "primary_inputs": {
                  "omegabh2": 0.02237737,
                  "omegach2": 0.1201035,
                  "theta_100theta_MC": 1.04092,
                  "tau": 0.05430138,
                  "logA": 3.044726,
                  "ns": 0.9658923
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015", "sigma8_expected": 0.7498653, "fsigma8_expected": 0.4605277},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038", "sigma8_expected": 0.6642308, "fsigma8_expected": 0.4779339},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051", "sigma8_expected": 0.6214160, "fsigma8_expected": 0.4760216},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061", "sigma8_expected": 0.5911708, "fsigma8_expected": 0.4706936},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233", "sigma8_expected": 0.3069371, "fsigma8_expected": 0.2979012}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The CAMB smoke inspector validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "A diagnostic CAMB variant is a final residual audit.",
              "A diagnostic CAMB variant is Planck reference uncertainty."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_84_2_CAMB_smoke_repair_from_inspector",
                  "purpose": "Use the captured failure point to write the corrected CAMB smoke-run file.",
                  "why_next": "v4.84 failed before orientation records; this inspector identifies the failing step."
              },
              {
                  "priority": 2,
                  "route_id": "v4_85_single_fixture_output_shape_and_orientation_audit",
                  "purpose": "Only after a smoke run returns arrays, lock CAMB output ordering.",
                  "why_next": "Orientation cannot be audited until arrays exist."
              },
              {
                  "priority": 3,
                  "route_id": "v4_86_single_fixture_residual_audit",
                  "purpose": "Compare CAMB point outputs to .minimum point targets only after orientation is locked.",
                  "why_next": "Residuals require known ordering."
              },
              {
                  "priority": 4,
                  "route_id": "v4_87_reference_uncertainty_chain_sample_design",
                  "purpose": "Design posterior-sample path after the point fixture works.",
                  "why_next": "A point fixture is not Planck reference uncertainty."
              }
          ]

          install_records = []
          variant_attempt_records = []
          output_preview_records = []
          failed_gates = []
          warnings = [
              "failure_inspector_only",
              "no_final_residual_audit",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def run_command(command, label, timeout_seconds=600):
              record = {
                  "label": label,
                  "command": " ".join(command),
                  "returncode": "",
                  "ok": False,
                  "stdout_tail": "",
                  "stderr_tail": "",
                  "error": ""
              }
              try:
                  completed = subprocess.run(
                      command,
                      text=True,
                      capture_output=True,
                      timeout=timeout_seconds,
                      check=False
                  )
                  record["returncode"] = completed.returncode
                  record["ok"] = completed.returncode == 0
                  record["stdout_tail"] = completed.stdout[-4000:]
                  record["stderr_tail"] = completed.stderr[-4000:]
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          pip_upgrade = run_command(
              [sys.executable, "-m", "pip", "install", "--upgrade", "pip"],
              "pip_upgrade"
          )
          install_records.append(pip_upgrade)

          camb_install = run_command(
              [sys.executable, "-m", "pip", "install", "--prefer-binary", "camb"],
              "pip_install_camb_prefer_binary"
          )
          install_records.append(camb_install)

          camb_imported = False
          camb_version = ""
          numpy_imported = False
          any_variant_attempted = False
          any_variant_set_cosmology = False
          any_variant_get_results = False
          any_variant_sigma8 = False
          any_variant_fsigma8 = False
          any_variant_complete_arrays = False

          def finite_positive_list(values, expected_len):
              try:
                  if len(values) != expected_len:
                      return False
                  return all(math.isfinite(float(x)) and float(x) > 0 for x in values)
              except Exception:
                  return False

          def run_camb_variant(camb, np, label, mode):
              nonlocal_any = None
              record = {
                  "variant_label": label,
                  "mode": mode,
                  "attempted": True,
                  "set_cosmology_ok": False,
                  "init_power_ok": False,
                  "set_matter_power_ok": False,
                  "get_results_ok": False,
                  "get_sigma8_ok": False,
                  "get_fsigma8_ok": False,
                  "sigma8_len": 0,
                  "fsigma8_len": 0,
                  "sigma8_values": "",
                  "fsigma8_values": "",
                  "H0_recorded": "",
                  "Omega_m_recorded": "",
                  "error_stage": "",
                  "error_tail": ""
              }

              primary = SOURCE_FIXTURE["primary_inputs"]
              ombh2 = primary["omegabh2"]
              omch2 = primary["omegach2"]
              theta_for_camb = primary["theta_100theta_MC"] / 100.0
              tau = primary["tau"]
              As = math.exp(primary["logA"]) / 1.0e10
              ns = primary["ns"]
              target_z = [row["z"] for row in TARGET_REDSHIFTS]

              try:
                  pars = camb.CAMBparams()

                  if mode == "theta_h0_none":
                      pars.set_cosmology(
                          H0=None,
                          ombh2=ombh2,
                          omch2=omch2,
                          cosmomc_theta=theta_for_camb,
                          tau=tau,
                          omk=0.0,
                          mnu=0.06,
                      )
                  elif mode == "theta_h0_omitted":
                      pars.set_cosmology(
                          ombh2=ombh2,
                          omch2=omch2,
                          cosmomc_theta=theta_for_camb,
                          tau=tau,
                          omk=0.0,
                          mnu=0.06,
                      )
                  elif mode == "diagnostic_h0_fixed_not_fixture_acceptance":
                      pars.set_cosmology(
                          H0=67.36,
                          ombh2=ombh2,
                          omch2=omch2,
                          tau=tau,
                          omk=0.0,
                          mnu=0.06,
                      )
                  else:
                      raise RuntimeError("unknown_mode")

                  record["set_cosmology_ok"] = True

                  try:
                      record["H0_recorded"] = float(pars.H0)
                  except Exception:
                      record["H0_recorded"] = ""

                  pars.InitPower.set_params(
                      As=As,
                      ns=ns,
                  )
                  record["init_power_ok"] = True

                  try:
                      pars.NonLinear = camb.model.NonLinear_none
                  except Exception:
                      pass

                  pars.set_matter_power(
                      redshifts=target_z,
                      kmax=2.0,
                      nonlinear=False,
                  )
                  record["set_matter_power_ok"] = True

                  results = camb.get_results(pars)
                  record["get_results_ok"] = True

                  try:
                      sigma8_values = [float(x) for x in np.atleast_1d(results.get_sigma8()).tolist()]
                      record["get_sigma8_ok"] = True
                      record["sigma8_len"] = len(sigma8_values)
                      record["sigma8_values"] = json.dumps(sigma8_values)
                  except Exception:
                      record["error_stage"] = "get_sigma8"
                      record["error_tail"] = traceback.format_exc()[-4000:]
                      sigma8_values = []

                  try:
                      fsigma8_values = [float(x) for x in np.atleast_1d(results.get_fsigma8()).tolist()]
                      record["get_fsigma8_ok"] = True
                      record["fsigma8_len"] = len(fsigma8_values)
                      record["fsigma8_values"] = json.dumps(fsigma8_values)
                  except Exception:
                      if not record["error_stage"]:
                          record["error_stage"] = "get_fsigma8"
                          record["error_tail"] = traceback.format_exc()[-4000:]
                      fsigma8_values = []

                  try:
                      record["Omega_m_recorded"] = float(results.get_Omega("matter", 0))
                  except Exception:
                      record["Omega_m_recorded"] = ""

                  if finite_positive_list(sigma8_values, len(TARGET_REDSHIFTS)) and finite_positive_list(fsigma8_values, len(TARGET_REDSHIFTS)):
                      for index, zrow in enumerate(TARGET_REDSHIFTS):
                          output_preview_records.append({
                              "variant_label": label,
                              "mode": mode,
                              "index": index,
                              "z": zrow["z"],
                              "sigma8_camb_raw": sigma8_values[index],
                              "fsigma8_camb_raw": fsigma8_values[index],
                              "comparison_status": "diagnostic_output_preview_only_not_residual_audit"
                          })

              except Exception:
                  if not record["error_stage"]:
                      record["error_stage"] = "variant_exception"
                  record["error_tail"] = traceback.format_exc()[-4000:]

              return record

          if camb_install["ok"]:
              try:
                  import importlib.metadata
                  import numpy as np
                  import camb

                  camb_imported = True
                  numpy_imported = True

                  try:
                      camb_version = importlib.metadata.version("camb")
                  except Exception:
                      camb_version = getattr(camb, "__version__", "unknown")

                  variants = [
                      ("theta_h0_none_contract_path", "theta_h0_none"),
                      ("theta_h0_omitted_api_probe", "theta_h0_omitted"),
                      ("diagnostic_h0_fixed_not_fixture_acceptance", "diagnostic_h0_fixed_not_fixture_acceptance")
                  ]

                  for label, mode in variants:
                      any_variant_attempted = True
                      record = run_camb_variant(camb, np, label, mode)
                      variant_attempt_records.append(record)

                  any_variant_set_cosmology = any(row["set_cosmology_ok"] for row in variant_attempt_records)
                  any_variant_get_results = any(row["get_results_ok"] for row in variant_attempt_records)
                  any_variant_sigma8 = any(row["get_sigma8_ok"] for row in variant_attempt_records)
                  any_variant_fsigma8 = any(row["get_fsigma8_ok"] for row in variant_attempt_records)
                  any_variant_complete_arrays = any(
                      int(row["sigma8_len"]) == len(TARGET_REDSHIFTS)
                      and int(row["fsigma8_len"]) == len(TARGET_REDSHIFTS)
                      for row in variant_attempt_records
                  )

              except Exception:
                  variant_attempt_records.append({
                      "variant_label": "import_exception",
                      "mode": "import",
                      "attempted": False,
                      "set_cosmology_ok": False,
                      "init_power_ok": False,
                      "set_matter_power_ok": False,
                      "get_results_ok": False,
                      "get_sigma8_ok": False,
                      "get_fsigma8_ok": False,
                      "sigma8_len": 0,
                      "fsigma8_len": 0,
                      "sigma8_values": "",
                      "fsigma8_values": "",
                      "H0_recorded": "",
                      "Omega_m_recorded": "",
                      "error_stage": "import_exception",
                      "error_tail": traceback.format_exc()[-4000:]
                  })

          if not install_records:
              failed_gates.append("install_records_missing")

          if not variant_attempt_records:
              failed_gates.append("variant_attempt_records_missing")

          if failed_gates:
              readiness_label = "CAMB_smoke_failure_inspector_failed_no_actionable_records"
              route_decision = "repair_inspector_itself"
              next_allowed_step = "Repair the inspector because it did not write actionable install or variant records."
          else:
              readiness_label = "CAMB_smoke_failure_inspector_passed_with_actionable_route_decision"

              if any_variant_complete_arrays:
                  route_decision = "CAMB_variant_returned_complete_arrays_ready_for_v4_84_2_orientation_lock"
                  next_allowed_step = (
                      "Proceed to v4.84.2 CAMB output orientation lock using the successful variant. "
                      "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, or validation yet."
                  )
              elif camb_imported and any_variant_get_results and any_variant_sigma8 and not any_variant_fsigma8:
                  route_decision = "CAMB_get_fsigma8_failed_need_output_method_probe"
                  next_allowed_step = (
                      "Proceed to v4.84.2 CAMB output method probe focused on fsigma8 retrieval. "
                      "Do not run a residual audit yet."
                  )
              elif camb_imported and any_variant_set_cosmology and not any_variant_get_results:
                  route_decision = "CAMB_get_results_failed_need_solver_call_repair"
                  next_allowed_step = (
                      "Proceed to v4.84.2 CAMB get_results repair. "
                      "Keep this as a smoke-run repair, not a residual audit."
                  )
              elif camb_imported and not any_variant_set_cosmology:
                  route_decision = "CAMB_set_cosmology_failed_need_mapping_api_repair"
                  next_allowed_step = (
                      "Proceed to v4.84.2 CAMB mapping API repair. "
                      "Check theta/H0 handling before another smoke run."
                  )
              elif camb_install["ok"] and not camb_imported:
                  route_decision = "CAMB_import_failed_after_install"
                  next_allowed_step = "Proceed to v4.84.2 CAMB import repair."
              else:
                  route_decision = "CAMB_install_failed_or_dependency_unavailable"
                  next_allowed_step = "Proceed to v4.84.2 CAMB dependency repair or choose a no-CAMB local solver-output stub route."

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_v4_84_failure_carried",
                  "pass": True,
                  "result": "v4.84 failed with zero orientation records",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "install_records_written",
                  "pass": len(install_records) > 0,
                  "result": f"{len(install_records)} install records written",
                  "boundary": "Dependency inspection only."
              },
              {
                  "rule_id": "variant_attempt_records_written",
                  "pass": len(variant_attempt_records) > 0,
                  "result": f"{len(variant_attempt_records)} variant records written",
                  "boundary": "Diagnostic variants only."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "No residual audit."
              },
              {
                  "rule_id": "no_reference_uncertainty",
                  "pass": True,
                  "result": "Planck reference uncertainty not computed",
                  "boundary": "No posterior covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no final RSD pressure and no TAIRID validation",
                  "boundary": "Failure inspector only."
              }
          ]

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_v4_84_failed": True,
              "upstream_v4_84_orientation_record_count": 0,
              "pip_install_camb_ok": camb_install["ok"],
              "CAMB_imported": camb_imported,
              "CAMB_version": camb_version,
              "numpy_imported": numpy_imported,
              "variant_attempt_count": len(variant_attempt_records),
              "any_variant_set_cosmology": any_variant_set_cosmology,
              "any_variant_get_results": any_variant_get_results,
              "any_variant_sigma8": any_variant_sigma8,
              "any_variant_fsigma8": any_variant_fsigma8,
              "any_variant_complete_arrays": any_variant_complete_arrays,
              "output_preview_record_count": len(output_preview_records),
              "formal_residual_audit_run": False,
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "source_fixture": SOURCE_FIXTURE,
              "target_redshifts": TARGET_REDSHIFTS,
              "install_records": install_records,
              "variant_attempt_records": variant_attempt_records,
              "output_preview_records": output_preview_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "route_decision": route_decision,
                  "formal_residual_audit_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_84_1_camb_smoke_failure_inspector.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "install_records_v4_84_1.csv",
              install_records,
              ["label", "command", "returncode", "ok", "stdout_tail", "stderr_tail", "error"]
          )

          write_csv(
              OUTDIR / "variant_attempt_records_v4_84_1.csv",
              variant_attempt_records,
              [
                  "variant_label",
                  "mode",
                  "attempted",
                  "set_cosmology_ok",
                  "init_power_ok",
                  "set_matter_power_ok",
                  "get_results_ok",
                  "get_sigma8_ok",
                  "get_fsigma8_ok",
                  "sigma8_len",
                  "fsigma8_len",
                  "sigma8_values",
                  "fsigma8_values",
                  "H0_recorded",
                  "Omega_m_recorded",
                  "error_stage",
                  "error_tail"
              ]
          )

          write_csv(
              OUTDIR / "output_preview_records_v4_84_1.csv",
              output_preview_records,
              ["variant_label", "mode", "index", "z", "sigma8_camb_raw", "fsigma8_camb_raw", "comparison_status"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_84_1.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_84_1.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_84_1.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.84.1 — CAMB Smoke Failure Inspector")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Route decision: `{route_decision}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This is a repair inspector for the v4.84 CAMB smoke-run failure. v4.84 produced zero orientation records, so this workflow checks where the CAMB path breaks: install, import, set_cosmology, get_results, get_sigma8, or get_fsigma8.")
          md.append("")
          md.append("This does not compute Planck reference uncertainty, final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Variant attempts")
          md.append("")
          md.append("| Variant | set_cosmology | get_results | sigma8 | fsigma8 | error stage |")
          md.append("|---|---|---|---|---|---|")
          for row in variant_attempt_records:
              md.append(
                  f"| `{row['variant_label']}` | `{row['set_cosmology_ok']}` | `{row['get_results_ok']}` | `{row['get_sigma8_ok']}` | `{row['get_fsigma8_ok']}` | `{row['error_stage']}` |"
              )
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_84_1_camb_smoke_failure_inspector.json",
              "tairid_v4_84_1_camb_smoke_failure_inspector.md",
              "install_records_v4_84_1.csv",
              "variant_attempt_records_v4_84_1.csv",
              "output_preview_records_v4_84_1.csv",
              "blocked_claims_v4_84_1.csv",
              "next_route_options_v4_84_1.csv",
              "rule_results_v4_84_1.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_84_1_camb_smoke_failure_inspector.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Variant attempts:")
          print(json.dumps(variant_attempt_records, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

