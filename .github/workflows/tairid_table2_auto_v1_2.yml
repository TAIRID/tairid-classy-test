name: TAIRID Table2 Auto v1.2

on:
  push:
    paths:
      - "run_tairid_shoes_table2_host_residual_v1_1.py"
      - ".github/workflows/tairid_table2_auto_v1_2.yml"

  workflow_dispatch:

jobs:
  run-table2-auto-v1-2:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy matplotlib astropy pandas

      - name: Confirm files exist
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_table2_host_residual_v1_1.py
          echo "Python script found."

      - name: Run TAIRID SH0ES Table2 host residual v1.1
        run: |
          python run_tairid_shoes_table2_host_residual_v1_1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-table2-auto-v1-2-output
          path: |
            tairid_shoes_table2_host_residual_v1_1_outputs/**
