name: 001 TAIRID v4.262 - Zhao Candidate Observed Manifest Staging Validator

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-262-zhao-candidate-observed-manifest-staging-validator.yml"
      - "data/cosmology/qso_literature_extraction_manifest.csv"
      - "qso_literature_extraction_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-candidate-observed-manifest-staging-validator:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.262 Zhao Candidate Observed Manifest Staging Validator is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.262 Zhao candidate observed manifest staging validator
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.262"
          ROUTE = "zhao_candidate_observed_manifest_staging_validator_after_v4_261"
          EXPECTED_RESULT = "v4_262_zhao_candidate_observed_manifest_staging_validator_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_263_zhao_reference_model_residual_guard_design_with_scope_guards_or_handoff"

          OUT = Path("tairid_v4_262_zhao_candidate_observed_manifest_staging_validator_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-262-zhao-candidate-observed-manifest-staging-validator-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          EXTRACTION_MANIFEST_CANDIDATES = [
              Path("data/cosmology/qso_literature_extraction_manifest.csv"),
              Path("qso_literature_extraction_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_EXTRACTION_COLUMNS = [
              "extraction_id",
              "candidate_id",
              "paper_or_source_url",
              "measurement_label",
              "redshift",
              "observable",
              "observed_value",
              "uncertainty_or_covariance_reference",
              "data_vector_reference",
              "source_role",
              "provenance_status",
              "extraction_status",
              "approval_status",
          ]

          BLOCKED_APPROVAL_WORDS = ["approved_for_scoring", "evidence", "validated", "proof", "full_holdout"]
          REQUIRED_APPROVAL = "candidate_bridge_not_scored_not_evidence_not_full_holdout"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def safe_float(value):
              try:
                  return float(str(value).strip())
              except Exception:
                  return None

          inherited_v4_261_rows = [
              {
                  "inherited_from": "v4.261",
                  "item": "rules",
                  "value": "39 / 39 passed",
                  "meaning": "Zhao Observed Manifest Bridge Guard With Provenance Scope passed.",
                  "carry_forward_status": "ready_for_candidate_staging_validator",
              },
              {
                  "inherited_from": "v4.261",
                  "item": "zhao_bridge_candidate_rows",
                  "value": 4,
                  "meaning": "Four Zhao candidate bridge rows were written.",
                  "carry_forward_status": "candidate_rows_ready_review_only",
              },
              {
                  "inherited_from": "v4.261",
                  "item": "zhao_covariance_bridge_rows",
                  "value": 16,
                  "meaning": "Sixteen covariance bridge rows were written.",
                  "carry_forward_status": "candidate_covariance_ready_review_only",
              },
              {
                  "inherited_from": "v4.261",
                  "item": "observed_manifest_candidate_packet_rows",
                  "value": 4,
                  "meaning": "Candidate observed manifest packet rows were written.",
                  "carry_forward_status": "candidate_packet_ready",
              },
              {
                  "inherited_from": "v4.261",
                  "item": "candidate_packet_written",
                  "value": True,
                  "meaning": "Candidate packet exists in v4.261 output.",
                  "carry_forward_status": "packet_ready",
              },
              {
                  "inherited_from": "v4.261",
                  "item": "live_observed_manifest_fill_allowed",
                  "value": False,
                  "meaning": "Live observed manifest fill stayed blocked.",
                  "carry_forward_status": "live_manifest_blocked",
              },
              {
                  "inherited_from": "v4.261",
                  "item": "approved_holdout_sources",
                  "value": 0,
                  "meaning": "Zhao was not approved as a full holdout.",
                  "carry_forward_status": "holdout_not_approved",
              },
              {
                  "inherited_from": "v4.261",
                  "item": "selected_next_route",
                  "value": "v4_262_zhao_candidate_observed_manifest_staging_validator_or_handoff",
                  "meaning": "Current route validates candidate staging without scoring.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          extraction_manifest_status_rows, extraction_manifest_input_rows = read_manifest_status(
              EXTRACTION_MANIFEST_CANDIDATES, REQUIRED_EXTRACTION_COLUMNS, "extraction"
          )

          zhao_values = [
              {"bin": 1, "redshift": 0.978, "value": 0.379, "sigma": 0.176},
              {"bin": 2, "redshift": 1.230, "value": 0.385, "sigma": 0.099},
              {"bin": 3, "redshift": 1.526, "value": 0.342, "sigma": 0.070},
              {"bin": 4, "redshift": 1.944, "value": 0.364, "sigma": 0.106},
          ]

          corr = [
              [1.0000, 0.5118, 0.2667, -0.0113],
              [0.5118, 1.0000, 0.6288, 0.0722],
              [0.2667, 0.6288, 1.0000, 0.4721],
              [-0.0113, 0.0722, 0.4721, 1.0000],
          ]

          cov = []
          for i, row in enumerate(zhao_values):
              cov_row = []
              for j, col in enumerate(zhao_values):
                  cov_row.append(corr[i][j] * row["sigma"] * col["sigma"])
              cov.append(cov_row)

          candidate_observed_manifest_rows = []
          for row in zhao_values:
              label = str(row["redshift"]).replace(".", "_")
              candidate_observed_manifest_rows.append({
                  "observed_id": f"zhao_dr14_tomographic_fsigma8_z_{label}",
                  "target_id": f"future_qso_zhao_dr14_fsigma8_z_{label}",
                  "source_family": "QSO",
                  "source_role": "same_survey_family_cross_release_candidate_not_full_holdout",
                  "redshift": row["redshift"],
                  "quantity": "f_sigma8",
                  "observed_value": row["value"],
                  "observed_sigma_or_likelihood": f"quoted_sigma={row['sigma']}; covariance_subset=v4_260_reconstructed_review_only",
                  "data_path_or_url": "https://arxiv.org/abs/1801.03043 ; widetable1 row fsigma_8",
                  "covariance_path_or_url": "v4_260_zhao_fsigma8_covariance_rows.csv ; reconstructed from widetable2 and widetable1 sigma",
                  "reference_model_path_or_method": "future_reference_model_required_not_supplied_here",
                  "failure_condition_id": "failure_001",
                  "approval_status": REQUIRED_APPROVAL,
              })

          candidate_covariance_rows = []
          for i in range(4):
              for j in range(4):
                  candidate_covariance_rows.append({
                      "row_index": i + 1,
                      "col_index": j + 1,
                      "row_observed_id": candidate_observed_manifest_rows[i]["observed_id"],
                      "col_observed_id": candidate_observed_manifest_rows[j]["observed_id"],
                      "correlation_value": corr[i][j],
                      "covariance_value": cov[i][j],
                      "covariance_status": "candidate_bridge_support_review_only",
                      "scoring_allowed": False,
                  })

          observed_schema_validation_rows = []
          for row in candidate_observed_manifest_rows:
              missing = [col for col in REQUIRED_OBSERVED_COLUMNS if col not in row or str(row[col]).strip() == ""]
              redshift_ok = safe_float(row["redshift"]) is not None and 0.5 < safe_float(row["redshift"]) < 2.5
              value_ok = safe_float(row["observed_value"]) is not None and 0.0 < safe_float(row["observed_value"]) < 2.0
              approval_text = row["approval_status"]
              approval_ok = approval_text == REQUIRED_APPROVAL and not any(word in approval_text for word in BLOCKED_APPROVAL_WORDS if word != "full_holdout")
              # full_holdout appears in the guarded "not_full_holdout" phrase, so it is allowed only there.
              approval_ok = approval_ok and "not_full_holdout" in approval_text
              source_ok = row["source_role"] == "same_survey_family_cross_release_candidate_not_full_holdout"
              sigma_ok = "quoted_sigma=" in row["observed_sigma_or_likelihood"] and "covariance_subset=" in row["observed_sigma_or_likelihood"]
              status = "schema_scope_pass_review_only" if not missing and redshift_ok and value_ok and approval_ok and source_ok and sigma_ok else "schema_or_scope_issue"
              observed_schema_validation_rows.append({
                  "observed_id": row["observed_id"],
                  "missing_columns": "|".join(missing) if missing else "none",
                  "redshift_ok": redshift_ok,
                  "value_ok": value_ok,
                  "sigma_field_ok": sigma_ok,
                  "source_role_ok": source_ok,
                  "approval_status_ok": approval_ok,
                  "validation_status": status,
                  "live_manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          covariance_schema_validation_rows = []
          for row in candidate_covariance_rows:
              diag_ok = True
              if int(row["row_index"]) == int(row["col_index"]):
                  diag_ok = abs(float(row["correlation_value"]) - 1.0) < 1e-12 and float(row["covariance_value"]) > 0
              finite_ok = math.isfinite(float(row["correlation_value"])) and math.isfinite(float(row["covariance_value"]))
              covariance_schema_validation_rows.append({
                  "row_index": row["row_index"],
                  "col_index": row["col_index"],
                  "row_observed_id": row["row_observed_id"],
                  "col_observed_id": row["col_observed_id"],
                  "finite_ok": finite_ok,
                  "diagonal_ok": diag_ok,
                  "status": "covariance_schema_pass_review_only" if finite_ok and diag_ok else "covariance_schema_issue",
                  "scoring_allowed": False,
              })

          pair_coverage_rows = []
          observed_ids = [row["observed_id"] for row in candidate_observed_manifest_rows]
          for a in observed_ids:
              for b in observed_ids:
                  found = any(row["row_observed_id"] == a and row["col_observed_id"] == b for row in candidate_covariance_rows)
                  pair_coverage_rows.append({
                      "row_observed_id": a,
                      "col_observed_id": b,
                      "pair_present": found,
                      "coverage_status": "present" if found else "missing",
                  })

          candidate_stage_packet_rows = []
          for row in candidate_observed_manifest_rows:
              candidate_stage_packet_rows.append({
                  **row,
                  "stage_status": "candidate_stage_validated_review_only",
                  "live_manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          staging_guard_rows = [
              {
                  "guard_id": "stage_001_required_schema",
                  "question": "Do candidate observed rows contain all required observed-manifest columns?",
                  "answer": "yes" if all(row["missing_columns"] == "none" for row in observed_schema_validation_rows) else "no",
                  "guard_status": "passed_review_only" if all(row["missing_columns"] == "none" for row in observed_schema_validation_rows) else "blocked",
              },
              {
                  "guard_id": "stage_002_scope_language",
                  "question": "Are source_role and approval_status guarded against holdout/evidence language?",
                  "answer": "yes" if all(row["source_role_ok"] and row["approval_status_ok"] for row in observed_schema_validation_rows) else "no",
                  "guard_status": "passed_review_only" if all(row["source_role_ok"] and row["approval_status_ok"] for row in observed_schema_validation_rows) else "blocked",
              },
              {
                  "guard_id": "stage_003_covariance_coverage",
                  "question": "Does the covariance packet cover every 4x4 pair?",
                  "answer": "yes" if all(row["pair_present"] for row in pair_coverage_rows) else "no",
                  "guard_status": "passed_review_only" if all(row["pair_present"] for row in pair_coverage_rows) else "blocked",
              },
              {
                  "guard_id": "stage_004_live_manifest",
                  "question": "Can the live external_observed_manifest be filled by this workflow?",
                  "answer": "no",
                  "guard_status": "blocked_live_manifest_fill",
              },
              {
                  "guard_id": "stage_005_scoring",
                  "question": "Can residual scoring run now?",
                  "answer": "no",
                  "guard_status": "blocked_no_reference_model_no_scoring_guard",
              },
          ]

          reference_model_gap_rows = [
              {
                  "gap_id": "ref_gap_001",
                  "missing_piece": "reference_model_path_or_method",
                  "current_value": "future_reference_model_required_not_supplied_here",
                  "meaning": "No model prediction exists for residuals.",
                  "blocks": "residual scoring",
              },
              {
                  "gap_id": "ref_gap_002",
                  "missing_piece": "scoring_guard",
                  "current_value": "not_created",
                  "meaning": "No chi-square/residual scoring guard exists yet.",
                  "blocks": "external observed scoring",
              },
              {
                  "gap_id": "ref_gap_003",
                  "missing_piece": "holdout_provenance_upgrade",
                  "current_value": "not_approved",
                  "meaning": "Zhao remains same-survey-family/cross-release candidate.",
                  "blocks": "full holdout language",
              },
              {
                  "gap_id": "ref_gap_004",
                  "missing_piece": "live_manifest_write_decision",
                  "current_value": "blocked",
                  "meaning": "Candidate packet is staged as artifact output only.",
                  "blocks": "live observed manifest use",
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "candidate_staging_schema_validation",
                  "permission_status": "passed_review_only",
                  "reason": "Candidate rows match required schema and guarded scope.",
              },
              {
                  "permission_scope": "candidate_covariance_packet_validation",
                  "permission_status": "passed_review_only",
                  "reason": "Covariance packet covers all 4x4 candidate row pairs.",
              },
              {
                  "permission_scope": "candidate_stage_packet",
                  "permission_status": "written_review_only",
                  "reason": "Candidate staged packet is written as output artifact only.",
              },
              {
                  "permission_scope": "live_external_observed_manifest_fill",
                  "permission_status": "blocked",
                  "reason": "This workflow validates staging only and does not approve live manifest fill.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No reference model or scoring guard exists.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "Candidate staged rows are not evidence.",
              },
              {
                  "permission_scope": "full_independent_holdout_language",
                  "permission_status": "blocked",
                  "reason": "Provenance remains same-survey-family/cross-release candidate.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No approved observed manifest or parameter values are ready.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
          ]

          readiness_rows = [
              {"readiness_id": "readiness_001", "requirement": "candidate_staging_schema", "status": "ready_review_only", "blocks": "nothing"},
              {"readiness_id": "readiness_002", "requirement": "candidate_covariance_packet", "status": "ready_review_only", "blocks": "nothing"},
              {"readiness_id": "readiness_003", "requirement": "reference_model_residual_guard_design", "status": "next_needed", "blocks": "residual scoring"},
              {"readiness_id": "readiness_004", "requirement": "live_observed_manifest_fill", "status": "blocked", "blocks": "live manifest"},
              {"readiness_id": "readiness_005", "requirement": "provenance_upgrade", "status": "not_ready", "blocks": "holdout label"},
              {"readiness_id": "readiness_006", "requirement": "numeric_correction_fit", "status": "blocked", "blocks": "model comparison"},
              {"readiness_id": "readiness_007", "requirement": "combined_matrix_permission", "status": "blocked", "blocks": "combined matrix"},
          ]

          failure_condition_rows = [
              {"failure_condition_id": "failure_001", "target": "QSO f_sigma8 primary pressure", "machine_condition": "if holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened", "status": "active_but_not_testable_without_approved_holdout_and_covariance"},
              {"failure_condition_id": "failure_002", "target": "QSO versus LRG growth contrast", "machine_condition": "if lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened", "status": "active_for_future_control_review"},
              {"failure_condition_id": "failure_003", "target": "QSO radial secondary support", "machine_condition": "if qso_radial_direction == '-' then secondary_support_weakened", "status": "active_for_future_secondary_review"},
              {"failure_condition_id": "failure_004", "target": "geometry compressed lane non-primary", "machine_condition": "if compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed", "status": "active_for_future_geometry_review"},
              {"failure_condition_id": "failure_005", "target": "external likelihood robustness", "machine_condition": "if external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover then baseline_pressure_not_tairid_specific", "status": "active_for_future_model_comparison"},
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "Zhao candidate staging schema validates as review-only.",
                  "basis": "Four candidate observed rows match required columns and guarded scope.",
                  "next_action": "Use only staged candidate packet artifacts.",
                  "claim_status": "candidate_review_only",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "Covariance packet validates as review-only support.",
                  "basis": "All sixteen 4x4 candidate row covariance pairs are present and finite.",
                  "next_action": "Keep covariance paired with candidate rows for future guard design.",
                  "claim_status": "not_scored",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "Reference-model residual scoring is the next technical design gap, but not active.",
                  "basis": "Candidate rows intentionally carry future_reference_model_required_not_supplied_here.",
                  "next_action": "Design a reference model residual guard before any scoring.",
                  "claim_status": "scoring_blocked",
              },
              {
                  "decision_id": "decision_004",
                  "decision": "Live observed manifest fill remains blocked.",
                  "basis": "This workflow validates an output artifact packet, not a live manifest.",
                  "next_action": "Proceed to v4.263 or handoff.",
                  "claim_status": "no_validation",
              },
          ]

          route_decision_rows = [
              {"route_id": "route_001", "route": "zhao_reference_model_residual_guard_design_with_scope_guards", "permission_status": "recommended", "reason": "Candidate staging is valid; the next gap is reference/residual design without scoring."},
              {"route_id": "route_002", "route": "live_external_observed_manifest_fill", "permission_status": "blocked", "reason": "Live manifest fill is still not approved."},
              {"route_id": "route_003", "route": "external_observed_residual_scoring", "permission_status": "blocked", "reason": "No scoring guard has passed."},
              {"route_id": "route_004", "route": "numeric_correction_fit", "permission_status": "blocked", "reason": "No approved observed manifest exists."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.262 is enough history for consolidation if needed."},
          ]

          next_rows = [
              {"priority": 1, "test_id": "v4_263_zhao_reference_model_residual_guard_design_with_scope_guards", "purpose": "design residual/reference guard without scoring or fitting", "activated": True},
              {"priority": 2, "test_id": "v4_263_live_observed_manifest_fill", "purpose": "still blocked until explicit later approval", "activated": False},
              {"priority": 3, "test_id": "v4_263_external_observed_residual_scoring", "purpose": "still blocked until reference/scoring guard passes", "activated": False},
              {"priority": 4, "test_id": "v4_263_handoff_if_needed", "purpose": "consolidate v4.203-v4.262 if thread length is risky", "activated": True},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before staging validator"},
              {"gate": "inherited_v4_261_rows_equal_8", "passed": len(inherited_v4_261_rows) == 8, "detail": f"inherited_v4_261_rows = {len(inherited_v4_261_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "extraction_manifest_status_rows_at_least_1", "passed": len(extraction_manifest_status_rows) >= 1, "detail": f"extraction_manifest_status_rows = {len(extraction_manifest_status_rows)}"},
              {"gate": "candidate_observed_manifest_rows_equal_4", "passed": len(candidate_observed_manifest_rows) == 4, "detail": f"candidate_observed_manifest_rows = {len(candidate_observed_manifest_rows)}"},
              {"gate": "candidate_covariance_rows_equal_16", "passed": len(candidate_covariance_rows) == 16, "detail": f"candidate_covariance_rows = {len(candidate_covariance_rows)}"},
              {"gate": "observed_schema_validation_rows_equal_4", "passed": len(observed_schema_validation_rows) == 4, "detail": f"observed_schema_validation_rows = {len(observed_schema_validation_rows)}"},
              {"gate": "all_observed_schema_rows_pass", "passed": all(row["validation_status"] == "schema_scope_pass_review_only" for row in observed_schema_validation_rows), "detail": "all candidate observed rows pass schema/scope"},
              {"gate": "covariance_schema_validation_rows_equal_16", "passed": len(covariance_schema_validation_rows) == 16, "detail": f"covariance_schema_validation_rows = {len(covariance_schema_validation_rows)}"},
              {"gate": "all_covariance_schema_rows_pass", "passed": all(row["status"] == "covariance_schema_pass_review_only" for row in covariance_schema_validation_rows), "detail": "all covariance rows pass schema"},
              {"gate": "pair_coverage_rows_equal_16", "passed": len(pair_coverage_rows) == 16, "detail": f"pair_coverage_rows = {len(pair_coverage_rows)}"},
              {"gate": "all_pairs_present", "passed": all(row["pair_present"] for row in pair_coverage_rows), "detail": "all covariance pairs present"},
              {"gate": "candidate_stage_packet_rows_equal_4", "passed": len(candidate_stage_packet_rows) == 4, "detail": f"candidate_stage_packet_rows = {len(candidate_stage_packet_rows)}"},
              {"gate": "staging_guard_rows_equal_5", "passed": len(staging_guard_rows) == 5, "detail": f"staging_guard_rows = {len(staging_guard_rows)}"},
              {"gate": "reference_model_gap_rows_equal_4", "passed": len(reference_model_gap_rows) == 4, "detail": f"reference_model_gap_rows = {len(reference_model_gap_rows)}"},
              {"gate": "permission_rows_equal_10", "passed": len(permission_rows) == 10, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_7", "passed": len(readiness_rows) == 7, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "all_candidate_stage_rows_non_scoring", "passed": all(row["scoring_allowed"] is False and row["evidence_allowed"] is False for row in candidate_stage_packet_rows), "detail": "candidate stage rows non-scoring"},
              {"gate": "all_candidate_stage_live_manifest_blocked", "passed": all(row["live_manifest_fill_allowed"] is False for row in candidate_stage_packet_rows), "detail": "live manifest fill blocked in staged rows"},
              {"gate": "guarded_approval_status_only", "passed": all(row["approval_status_ok"] for row in observed_schema_validation_rows), "detail": "approval status guarded"},
              {"gate": "same_family_source_role_only", "passed": all(row["source_role_ok"] for row in observed_schema_validation_rows), "detail": "same-family source role enforced"},
              {"gate": "reference_model_gap_present", "passed": any(row["missing_piece"] == "reference_model_path_or_method" for row in reference_model_gap_rows), "detail": "reference model gap present"},
              {"gate": "live_external_manifest_fill_blocked", "passed": any(row["permission_scope"] == "live_external_observed_manifest_fill" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "live observed manifest fill blocked"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external observed scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO evidence blocked"},
              {"gate": "full_holdout_language_blocked", "passed": any(row["permission_scope"] == "full_independent_holdout_language" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "full holdout language blocked"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric correction fit blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "reference_guard_route_recommended", "passed": any(row["route"] == "zhao_reference_model_residual_guard_design_with_scope_guards" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "v4.263 route recommended"},
              {"gate": "live_manifest_next_not_activated", "passed": any(row["test_id"] == "v4_263_live_observed_manifest_fill" and row["activated"] is False for row in next_rows), "detail": "live manifest next not activated"},
              {"gate": "external_scoring_next_not_activated", "passed": any(row["test_id"] == "v4_263_external_observed_residual_scoring" and row["activated"] is False for row in next_rows), "detail": "external scoring not activated"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no external observed scoring"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout approval"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_263_zhao_reference_model_residual_guard_design_with_scope_guards_or_handoff", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_262_zhao_candidate_observed_manifest_staging_validator_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_262_inherited_v4_261_rows.csv", inherited_v4_261_rows)
          write_csv(OUT / "v4_262_observed_manifest_status_rows.csv", observed_manifest_status_rows)
          write_csv(OUT / "v4_262_extraction_manifest_status_rows.csv", extraction_manifest_status_rows)
          write_csv(OUT / "v4_262_candidate_observed_manifest_rows.csv", candidate_observed_manifest_rows)
          write_csv(OUT / "v4_262_candidate_covariance_rows.csv", candidate_covariance_rows)
          write_csv(OUT / "v4_262_observed_schema_validation_rows.csv", observed_schema_validation_rows)
          write_csv(OUT / "v4_262_covariance_schema_validation_rows.csv", covariance_schema_validation_rows)
          write_csv(OUT / "v4_262_pair_coverage_rows.csv", pair_coverage_rows)
          write_csv(OUT / "v4_262_candidate_stage_packet_rows.csv", candidate_stage_packet_rows)
          write_csv(OUT / "external_observed_manifest_CANDIDATE_STAGE_ZHAO_v4_262_NOT_SCORED.csv", candidate_stage_packet_rows)
          write_csv(OUT / "v4_262_staging_guard_rows.csv", staging_guard_rows)
          write_csv(OUT / "v4_262_reference_model_gap_rows.csv", reference_model_gap_rows)
          write_csv(OUT / "v4_262_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_262_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_262_failure_condition_rows.csv", failure_condition_rows)
          write_csv(OUT / "v4_262_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_262_route_decision_rows.csv", route_decision_rows)
          write_csv(OUT / "v4_262_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_262_rule_checks.csv", checks)

          value_lines = [
              f"z={row['redshift']}: f_sigma8={row['observed_value']} ({row['approval_status']})"
              for row in candidate_observed_manifest_rows
          ]

          guard_lines = [
              f"{row['guard_id']}: {row['answer']} — {row['guard_status']}"
              for row in staging_guard_rows
          ]

          route_lines = [
              f"{row['route']}: {row['permission_status']} — {row['reason']}"
              for row in route_decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_261_rows": len(inherited_v4_261_rows),
              "observed_manifest_status_rows": len(observed_manifest_status_rows),
              "extraction_manifest_status_rows": len(extraction_manifest_status_rows),
              "candidate_observed_manifest_rows": len(candidate_observed_manifest_rows),
              "candidate_covariance_rows": len(candidate_covariance_rows),
              "observed_schema_validation_rows": len(observed_schema_validation_rows),
              "covariance_schema_validation_rows": len(covariance_schema_validation_rows),
              "pair_coverage_rows": len(pair_coverage_rows),
              "candidate_stage_packet_rows": len(candidate_stage_packet_rows),
              "staging_guard_rows": len(staging_guard_rows),
              "reference_model_gap_rows": len(reference_model_gap_rows),
              "permission_rows": len(permission_rows),
              "readiness_rows": len(readiness_rows),
              "failure_condition_rows": len(failure_condition_rows),
              "decision_rows": len(decision_rows),
              "route_decision_rows": len(route_decision_rows),
              "next_rows": len(next_rows),
              "candidate_staging_validated": True,
              "live_observed_manifest_fill_allowed": False,
              "scoring_allowed": False,
              "approved_holdout_sources": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_262_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.262 Zhao Candidate Observed Manifest Staging Validator",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_261_rows = {summary['inherited_v4_261_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"extraction_manifest_status_rows = {summary['extraction_manifest_status_rows']}",
              f"candidate_observed_manifest_rows = {summary['candidate_observed_manifest_rows']}",
              f"candidate_covariance_rows = {summary['candidate_covariance_rows']}",
              f"observed_schema_validation_rows = {summary['observed_schema_validation_rows']}",
              f"covariance_schema_validation_rows = {summary['covariance_schema_validation_rows']}",
              f"pair_coverage_rows = {summary['pair_coverage_rows']}",
              f"candidate_stage_packet_rows = {summary['candidate_stage_packet_rows']}",
              f"staging_guard_rows = {summary['staging_guard_rows']}",
              f"reference_model_gap_rows = {summary['reference_model_gap_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"route_decision_rows = {summary['route_decision_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"candidate_staging_validated = {summary['candidate_staging_validated']}",
              f"live_observed_manifest_fill_allowed = {summary['live_observed_manifest_fill_allowed']}",
              f"scoring_allowed = {summary['scoring_allowed']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Candidate staged Zhao rows:",
              *value_lines,
              "",
              "Staging guards:",
              *guard_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.262 validates the Zhao candidate observed-manifest staging packet as review-only. The staged rows and covariance packet match schema and guarded scope. Live observed manifest fill, scoring, holdout language, evidence language, and validation language remain blocked.",
              "",
              "Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_262_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_261_rows = {summary['inherited_v4_261_rows']}")
          print(f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}")
