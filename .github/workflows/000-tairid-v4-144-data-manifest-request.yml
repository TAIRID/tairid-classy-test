name: 000 TAIRID v4.144 Data Manifest Request

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-144-data-manifest-request.yml"

jobs:
  tairid-v4-144-data-manifest-request:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.144 data manifest request
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_144_data_manifest_request

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_144_data_manifest_request")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_144_data_manifest_request"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not recompute eBOSS pressure.",
              "This creates a concrete data manifest request because v4.143 found no parser-ready stored-chain/reference candidates.",
              "A pass means the exact missing data package has been specified, not that any package has been obtained or ingested."
          ]

          UPSTREAM_LOCKS = {
              "v4_143_stored_chain_reference_candidate_triage": {
                  "readiness_label": "stored_chain_reference_candidate_triage_passed_candidates_classified_ready_for_next_reference_data_route",
                  "candidate_count": 276,
                  "workflow_false_positive_count": 276,
                  "artifact_or_handoff_context_count": 0,
                  "manual_review_needed_count": 0,
                  "possible_data_product_count": 0,
                  "parser_ready_count": 0,
                  "zip_manual_candidate_count": 0,
                  "selected_next_route": "data_manifest_request",
                  "final_parser_built": False,
                  "full_chain_rows_parsed": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "same_program_eBOSS_covariance_still_limited": True,
                  "CAMB_run": False,
                  "full_planck_chains_imported": False,
                  "full_planck_chain_sample_rows_parsed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_142_CAMB_install_or_stored_chain_probe": {
                  "readiness_label": "CAMB_install_or_stored_chain_probe_passed_feasibility_status_recorded_ready_for_reference_vector_route_selection",
                  "camb_available_after_attempt": False,
                  "camb_parameter_sanity_ok": False,
                  "camb_reference_route_available": False,
                  "stored_chain_route_available": True,
                  "stored_reference_route_available": True,
                  "selected_route": "stored_chain_or_reference_manual_review",
                  "final_camb_calculation_run": False,
                  "chain_samples_parsed": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          REFERENCE_REDSHIFT_TARGETS = [
              {"target_id": "z0067_6dFGS", "z": 0.067, "role": "low_z_independent_anchor", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z0150_MGS", "z": 0.150, "role": "low_z_anchor_and_prior_alignment_check", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z0380_BOSS", "z": 0.380, "role": "BOSS_core_prior_alignment_check", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z0440_WiggleZ", "z": 0.440, "role": "WiggleZ_mid_z", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z0510_BOSS", "z": 0.510, "role": "BOSS_core_prior_alignment_check", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z0600_WiggleZ", "z": 0.600, "role": "WiggleZ_mid_z", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z0610_BOSS", "z": 0.610, "role": "BOSS_core_prior_alignment_check", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z0698_eBOSS_LRG", "z": 0.698, "role": "eBOSS_LRG_damper_component", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z0730_WiggleZ", "z": 0.730, "role": "WiggleZ_mid_z", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z0800_VIPERS", "z": 0.800, "role": "VIPERS_high_mid_z", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z0850_eBOSS_ELG", "z": 0.850, "role": "eBOSS_ELG_negative_component", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"},
              {"target_id": "z1480_eBOSS_QSO", "z": 1.480, "role": "eBOSS_QSO_positive_counter_component", "needed_reference": "fsigma8_LCDM_mean_and_reference_uncertainty"}
          ]

          REQUIRED_DATA_PACKAGES = [
              {
                  "package_id": "reference_vector_table_minimum",
                  "priority": 1,
                  "package_type": "reference_support",
                  "minimum_acceptable_files": "lcdm_fsigma8_reference_vector_v4_144.csv",
                  "required_contents": "target_id,z,fsigma8_reference_mean,fsigma8_reference_sigma,method,parameter_source",
                  "preferred_contents": "full 12-redshift reference vector using CAMB, CLASS, or verified ΛCDM growth calculation",
                  "acceptance_rule": "Every REFERENCE_REDSHIFT_TARGET must appear exactly once with numeric mean and sigma.",
                  "blocked_without": "Cannot replace lightweight diagnostic reference with source-backed table."
              },
              {
                  "package_id": "reference_covariance_matrix_preferred",
                  "priority": 2,
                  "package_type": "reference_support",
                  "minimum_acceptable_files": "lcdm_fsigma8_reference_covariance_v4_144.csv",
                  "required_contents": "12x12 covariance matrix or long-form row_target_id,column_target_id,covariance",
                  "preferred_contents": "sample covariance from CAMB/CLASS/Planck-like posterior draws",
                  "acceptance_rule": "Matrix must be symmetric, ordered, and aligned to the 12 target_id values.",
                  "blocked_without": "Reference side remains diagonal or approximation-only."
              },
              {
                  "package_id": "reference_parameter_samples_optional",
                  "priority": 3,
                  "package_type": "reference_support",
                  "minimum_acceptable_files": "lcdm_parameter_samples_v4_144.csv or Planck/CAMB chain subset",
                  "required_contents": "Omega_m,sigma8,H0,ombh2,omch2,ns,As or mapped equivalents",
                  "preferred_contents": "posterior-weighted samples that can generate fσ8 at all 12 redshifts",
                  "acceptance_rule": "Sample columns must be named and units/normalization must be declared.",
                  "blocked_without": "No posterior-like reference uncertainty can be built from samples."
              },
              {
                  "package_id": "eBOSS_LRG_value_source",
                  "priority": 4,
                  "package_type": "observed_value_source",
                  "minimum_acceptable_files": "eboss_lrg_value_source_v4_144.csv",
                  "required_contents": "source_url_or_doi,effective_redshift,observable,value,sigma,notes",
                  "preferred_contents": "official source table or exact paper/product reference for LRG z≈0.698",
                  "acceptance_rule": "fσ8 value and uncertainty must be source-locked, not copied from our previous workflow only.",
                  "blocked_without": "LRG remains carried diagnostic value only."
              },
              {
                  "package_id": "eBOSS_ELG_value_source",
                  "priority": 5,
                  "package_type": "observed_value_source",
                  "minimum_acceptable_files": "eboss_elg_value_source_v4_144.csv",
                  "required_contents": "source_url_or_doi,effective_redshift,observable,value,sigma,notes",
                  "preferred_contents": "official source table or exact paper/product reference for ELG z≈0.85",
                  "acceptance_rule": "fσ8 value and uncertainty must be source-locked, not copied from our previous workflow only.",
                  "blocked_without": "ELG remains diagnostic negative component only."
              },
              {
                  "package_id": "eBOSS_QSO_value_source",
                  "priority": 6,
                  "package_type": "observed_value_source",
                  "minimum_acceptable_files": "eboss_qso_value_source_v4_144.csv",
                  "required_contents": "source_url_or_doi,effective_redshift,observable,value,sigma,notes",
                  "preferred_contents": "official source table or exact paper/product reference for QSO z≈1.48",
                  "acceptance_rule": "fσ8 value and uncertainty must be source-locked, not copied from our previous workflow only.",
                  "blocked_without": "QSO remains diagnostic positive component only."
              },
              {
                  "package_id": "eBOSS_family_covariance_or_likelihood",
                  "priority": 7,
                  "package_type": "observed_covariance",
                  "minimum_acceptable_files": "eboss_family_covariance_v4_144.csv or eboss_likelihood_package_path_v4_144.txt",
                  "required_contents": "covariance matrix, parameter order, tracer mapping, redshift mapping, units/status",
                  "preferred_contents": "official eBOSS DR16 covariance/likelihood/consensus product covering LRG, ELG, and QSO or source-backed block covariances",
                  "acceptance_rule": "Variable order and cross-tracer overlap treatment must be declared.",
                  "blocked_without": "Same-program eBOSS covariance remains unresolved."
              },
              {
                  "package_id": "eBOSS_cross_tracer_overlap_note",
                  "priority": 8,
                  "package_type": "observed_covariance",
                  "minimum_acceptable_files": "eboss_cross_tracer_overlap_note_v4_144.md",
                  "required_contents": "source-backed note on whether LRG, ELG, and QSO are independent, correlated, combined, or not safely mergeable",
                  "preferred_contents": "direct quote or table reference from official paper/product documentation",
                  "acceptance_rule": "The note must say how family covariance should be treated before any combined eBOSS pressure claim.",
                  "blocked_without": "eBOSS family must remain local diagnostic only."
              },
              {
                  "package_id": "observed_growth_compilation_manifest",
                  "priority": 9,
                  "package_type": "observed_value_source",
                  "minimum_acceptable_files": "growth_observation_manifest_v4_144.csv",
                  "required_contents": "target_id,z,source_family,observable,value,sigma,covariance_status,source_url_or_doi",
                  "preferred_contents": "all 12 growth targets used in this lane, source locked",
                  "acceptance_rule": "Every observation used in any future pressure comparison must have source and covariance status.",
                  "blocked_without": "Non-eBOSS expanded context remains partially carried from prior diagnostics."
              },
              {
                  "package_id": "data_license_and_provenance_note",
                  "priority": 10,
                  "package_type": "provenance",
                  "minimum_acceptable_files": "data_license_and_provenance_v4_144.md",
                  "required_contents": "where each file came from, when retrieved, whether redistribution is allowed, and whether it is raw/source/generated",
                  "preferred_contents": "one note covering every uploaded or manually prepared file",
                  "acceptance_rule": "Future parser workflows must know which files are source data versus derived helper tables.",
                  "blocked_without": "Data package cannot be treated as source-clean."
              }
          ]

          MANIFEST_TEMPLATE_ROWS = [
              {
                  "package_id": row["package_id"],
                  "priority": row["priority"],
                  "package_type": row["package_type"],
                  "provided_file_path": "",
                  "source_url_or_doi": "",
                  "retrieval_date": "",
                  "file_format": "",
                  "required_columns_or_structure": row["required_contents"],
                  "variable_order": "",
                  "units_or_normalization": "",
                  "coverage": "",
                  "ingestion_ready": "false",
                  "manual_notes": row["preferred_contents"],
                  "claim_boundary": "not_provided_not_ingested_not_final"
              }
              for row in REQUIRED_DATA_PACKAGES
          ]

          PACKAGE_ACCEPTANCE_RULES = [
              {
                  "rule_id": "reference_vector_complete",
                  "requirement": "The reference-vector table must contain all 12 target_id values and numeric fσ8 means.",
                  "failure_action": "Do not build a reference parser."
              },
              {
                  "rule_id": "reference_uncertainty_declared",
                  "requirement": "Every reference value must have sigma or a covariance matrix row/column.",
                  "failure_action": "Keep reference support diagnostic-only."
              },
              {
                  "rule_id": "observed_values_source_locked",
                  "requirement": "LRG, ELG, QSO, and any non-eBOSS growth points must have source URLs/DOIs or official product paths.",
                  "failure_action": "Do not strengthen observational claims."
              },
              {
                  "rule_id": "eBOSS_covariance_status_declared",
                  "requirement": "The eBOSS family covariance/likelihood status must be found, hint-only, unavailable, or manual-needed.",
                  "failure_action": "Do not combine eBOSS family points as independent."
              },
              {
                  "rule_id": "cross_tracer_overlap_declared",
                  "requirement": "LRG/ELG/QSO overlap or independence must be source-backed.",
                  "failure_action": "Keep eBOSS local and component-level only."
              },
              {
                  "rule_id": "provenance_recorded",
                  "requirement": "Each file must have provenance and source/derived status.",
                  "failure_action": "Do not ingest the package as source-clean."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample rows were parsed.",
              "CAMB produced the final reference vector.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The data manifest request validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "A manifest is the same as data ingestion.",
              "A requested file is the same as a provided file.",
              "A reference-vector request is the same as Planck posterior covariance.",
              "Same-program eBOSS covariance is resolved.",
              "Observed covariance review is no longer needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_145_data_package_detector_and_manifest_validator",
                  "purpose": "Check whether any requested files have been added and validate their manifest fields without ingesting final results.",
                  "why_next": "v4.144 defines the missing package; v4.145 should detect and validate supplied files."
              },
              {
                  "priority": 2,
                  "route_id": "v4_145_external_source_fetch_design",
                  "purpose": "Design a source-fetch workflow for public files only if exact URLs/paths are known.",
                  "why_next": "The manifest may be filled with source URLs rather than uploaded files."
              },
              {
                  "priority": 3,
                  "route_id": "v4_145_external_standard_cosmology_comparison_plan",
                  "purpose": "Prepare cautious public comparison language while data package acquisition remains open.",
                  "why_next": "The test lane is limitation-bound and should not be oversold."
              }
          ]

          failed_gates = []
          warnings = [
              "manifest_request_only",
              "no_files_provided_or_ingested",
              "reference_package_missing",
              "eBOSS_covariance_missing",
              "pressure_not_recomputed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_143_stored_chain_reference_candidate_triage"]

          if upstream["selected_next_route"] != "data_manifest_request":
              failed_gates.append("upstream_route_not_data_manifest_request")

          if upstream["parser_ready_count"] != 0:
              failed_gates.append("upstream_parser_ready_count_not_zero")

          if len(REFERENCE_REDSHIFT_TARGETS) != 12:
              failed_gates.append("reference_redshift_target_count_incorrect")

          if len(REQUIRED_DATA_PACKAGES) < 10:
              failed_gates.append("required_data_packages_incomplete")

          if len(MANIFEST_TEMPLATE_ROWS) != len(REQUIRED_DATA_PACKAGES):
              failed_gates.append("manifest_template_row_count_mismatch")

          if len(PACKAGE_ACCEPTANCE_RULES) < 6:
              failed_gates.append("package_acceptance_rules_incomplete")

          reference_packages = [row for row in REQUIRED_DATA_PACKAGES if row["package_type"] == "reference_support"]
          observed_packages = [row for row in REQUIRED_DATA_PACKAGES if row["package_type"] == "observed_value_source"]
          covariance_packages = [row for row in REQUIRED_DATA_PACKAGES if row["package_type"] == "observed_covariance"]

          if len(reference_packages) < 3:
              failed_gates.append("reference_package_requests_incomplete")

          if len(observed_packages) < 4:
              failed_gates.append("observed_value_package_requests_incomplete")

          if len(covariance_packages) < 2:
              failed_gates.append("observed_covariance_package_requests_incomplete")

          package_provided = False
          package_ingested = False
          pressure_recomputed = False
          final_pressure_ready = False

          if package_provided:
              failed_gates.append("package_unexpectedly_provided")

          if package_ingested:
              failed_gates.append("package_unexpectedly_ingested")

          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "manifest is the same as data ingestion",
              "requested file is the same as a provided file",
              "reference-vector request is the same as planck posterior covariance",
              "final rsd pressure score",
              "validates tairid cosmology",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "data_manifest_request_passed_required_reference_and_covariance_files_listed_ready_for_data_package_detector_and_manifest_validator"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_data_manifest_route_carried",
                  "pass": upstream["selected_next_route"] == "data_manifest_request" and upstream["parser_ready_count"] == 0,
                  "result": "v4.143 found no parser-ready candidates and selected data manifest request",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "reference_targets_declared",
                  "pass": len(REFERENCE_REDSHIFT_TARGETS) == 12,
                  "result": f"reference_target_count={len(REFERENCE_REDSHIFT_TARGETS)}",
                  "boundary": "Target list only."
              },
              {
                  "rule_id": "required_data_packages_declared",
                  "pass": len(REQUIRED_DATA_PACKAGES) >= 10,
                  "result": f"required_package_count={len(REQUIRED_DATA_PACKAGES)}",
                  "boundary": "Request only, not provided data."
              },
              {
                  "rule_id": "package_categories_complete",
                  "pass": len(reference_packages) >= 3 and len(observed_packages) >= 4 and len(covariance_packages) >= 2,
                  "result": f"reference={len(reference_packages)}; observed={len(observed_packages)}; covariance={len(covariance_packages)}",
                  "boundary": "Manifest completeness only."
              },
              {
                  "rule_id": "manifest_template_built",
                  "pass": len(MANIFEST_TEMPLATE_ROWS) == len(REQUIRED_DATA_PACKAGES),
                  "result": f"manifest_template_rows={len(MANIFEST_TEMPLATE_ROWS)}",
                  "boundary": "Blank template only."
              },
              {
                  "rule_id": "acceptance_rules_declared",
                  "pass": len(PACKAGE_ACCEPTANCE_RULES) >= 6,
                  "result": f"acceptance_rule_count={len(PACKAGE_ACCEPTANCE_RULES)}",
                  "boundary": "Rules for future package validation only."
              },
              {
                  "rule_id": "no_package_ingestion_or_pressure",
                  "pass": package_ingested is False and pressure_recomputed is False,
                  "result": "no package ingested and pressure not recomputed",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_144_rules_passed")

          if failed_gates:
              readiness_label = "data_manifest_request_failed"
              next_allowed_step = "Repair data manifest request before continuing."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.145 data package detector and manifest validator, or use the generated manifest_template_rows_v4_144.csv to prepare the missing files. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_parser_ready_count": upstream["parser_ready_count"],
              "upstream_selected_next_route": upstream["selected_next_route"],
              "reference_target_count": len(REFERENCE_REDSHIFT_TARGETS),
              "required_package_count": len(REQUIRED_DATA_PACKAGES),
              "reference_package_count": len(reference_packages),
              "observed_value_package_count": len(observed_packages),
              "observed_covariance_package_count": len(covariance_packages),
              "manifest_template_row_count": len(MANIFEST_TEMPLATE_ROWS),
              "acceptance_rule_count": len(PACKAGE_ACCEPTANCE_RULES),
              "package_provided": package_provided,
              "package_ingested": package_ingested,
              "pressure_recomputed": pressure_recomputed,
              "same_program_eBOSS_covariance_still_limited": True,
              "CAMB_run": False,
              "full_planck_chains_imported": False,
              "full_planck_chain_sample_rows_parsed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "reference_redshift_targets": REFERENCE_REDSHIFT_TARGETS,
              "required_data_packages": REQUIRED_DATA_PACKAGES,
              "manifest_template_rows": MANIFEST_TEMPLATE_ROWS,
              "package_acceptance_rules": PACKAGE_ACCEPTANCE_RULES,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "package_provided": False,
                  "package_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_144_data_manifest_request.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "reference_redshift_targets_v4_144.csv",
              REFERENCE_REDSHIFT_TARGETS,
              ["target_id", "z", "role", "needed_reference"]
          )

          write_csv(
              OUTDIR / "required_data_packages_v4_144.csv",
              REQUIRED_DATA_PACKAGES,
              ["package_id", "priority", "package_type", "minimum_acceptable_files", "required_contents", "preferred_contents", "acceptance_rule", "blocked_without"]
          )

          write_csv(
              OUTDIR / "manifest_template_rows_v4_144.csv",
              MANIFEST_TEMPLATE_ROWS,
              ["package_id", "priority", "package_type", "provided_file_path", "source_url_or_doi", "retrieval_date", "file_format", "required_columns_or_structure", "variable_order", "units_or_normalization", "coverage", "ingestion_ready", "manual_notes", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "package_acceptance_rules_v4_144.csv",
              PACKAGE_ACCEPTANCE_RULES,
              ["rule_id", "requirement", "failure_action"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_144.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_144.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_144.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.144 — Data Manifest Request")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.143 found no parser-ready stored-chain or reference candidates. v4.144 therefore stops guessing and writes the exact data manifest needed for the next clean move.")
          md.append("")
          md.append("This does not ingest data, run CAMB, parse chains, ingest eBOSS covariance, or recompute pressure. It produces the list of files and fields needed before those steps can be honest.")
          md.append("")
          md.append("## Required package groups")
          md.append("")
          md.append("| Priority | Package | Type | Minimum acceptable file |")
          md.append("|---:|---|---|---|")
          for row in REQUIRED_DATA_PACKAGES:
              md.append(f"| `{row['priority']}` | `{row['package_id']}` | `{row['package_type']}` | `{row['minimum_acceptable_files']}` |")
          md.append("")
          md.append("## Reference redshift targets")
          md.append("")
          md.append("| Target | z | Role |")
          md.append("|---|---:|---|")
          for row in REFERENCE_REDSHIFT_TARGETS:
              md.append(f"| `{row['target_id']}` | `{row['z']}` | `{row['role']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_144_data_manifest_request.json",
              "tairid_v4_144_data_manifest_request.md",
              "reference_redshift_targets_v4_144.csv",
              "required_data_packages_v4_144.csv",
              "manifest_template_rows_v4_144.csv",
              "package_acceptance_rules_v4_144.csv",
              "next_route_options_v4_144.csv",
              "blocked_claims_v4_144.csv",
              "rule_results_v4_144.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_144_data_manifest_request.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.144 data manifest request artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-144-data-manifest-request
          path: artifacts/tairid_v4_144_data_manifest_request/
