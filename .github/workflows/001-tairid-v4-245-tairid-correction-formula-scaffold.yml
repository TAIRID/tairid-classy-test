name: 001 TAIRID v4.245 - TAIRID Correction Formula Scaffold

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-245-tairid-correction-formula-scaffold.yml"
      - "data/cosmology/external_observed_manifest.csv"
      - "data/cosmology/reference_target_manifest.csv"

permissions:
  contents: read

jobs:
  tairid-correction-formula-scaffold:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.245 TAIRID Correction Formula Scaffold is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.245 TAIRID correction formula scaffold
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.245"
          ROUTE = "tairid_correction_formula_scaffold_or_external_observed_manifest_builder_after_v4_244"
          EXPECTED_RESULT = "v4_245_tairid_correction_formula_scaffold_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_246_correction_contract_review_or_external_observed_manifest_fill_guard"

          OUT = Path("tairid_v4_245_tairid_correction_formula_scaffold_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-245-tairid-correction-formula-scaffold-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          # Prior frozen gate from the earlier TAIRID cosmology lane.
          # It is carried as a candidate scaffold component only, not as proof,
          # not as a fit to the current LRG/QSO data, and not as a holdout result.
          FROZEN_PRIOR_GATE = {
              "gate_id": "prior_joint_gate_v0_1",
              "A": 0.6580586049,
              "z_t": 0.2224541370,
              "p": 2.0,
              "formula": "G(z)=exp[-A*(z/(z+z_t))^p]",
              "origin_status": "prior_frozen_supernova_bao_gate_not_refit_here",
          }

          DEFAULT_AXIS_TARGETS = [
              {
                  "axis_id": "axis_001",
                  "source_family": "QSO_or_QSO_like",
                  "observable": "f_sigma8",
                  "axis_role": "primary_growth_pressure_candidate",
                  "frozen_expected_direction": "+",
                  "holdout_status": "missing_primary_holdout",
              },
              {
                  "axis_id": "axis_002",
                  "source_family": "QSO_or_QSO_like",
                  "observable": "D_H_over_r_sound",
                  "axis_role": "secondary_radial_pacing_candidate",
                  "frozen_expected_direction": "+/0",
                  "holdout_status": "secondary_only",
              },
              {
                  "axis_id": "axis_003",
                  "source_family": "LRG_or_LRG_like",
                  "observable": "f_sigma8",
                  "axis_role": "growth_control",
                  "frozen_expected_direction": "0_or_not_stable_positive",
                  "holdout_status": "control_only",
              },
              {
                  "axis_id": "axis_004",
                  "source_family": "BAO_or_geometry_only",
                  "observable": "D_V_or_geometry",
                  "axis_role": "compressed_geometry_control",
                  "frozen_expected_direction": "mostly_0_or_not_primary",
                  "holdout_status": "control_only",
              },
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def gate_value(z, A=FROZEN_PRIOR_GATE["A"], z_t=FROZEN_PRIOR_GATE["z_t"], p=FROZEN_PRIOR_GATE["p"]):
              z = float(z)
              return math.exp(-A * ((z / (z + z_t)) ** p)) if z + z_t != 0 else float("nan")

          inherited_v4_244_rows = [
              {
                  "inherited_from": "v4.244",
                  "item": "rules",
                  "value": "26 / 26 passed",
                  "meaning": "Reference manifest review and secondary/control packet passed.",
                  "carry_forward_status": "ready_as_review_packet_only",
              },
              {
                  "inherited_from": "v4.244",
                  "item": "primary_qso_growth_candidate_rows",
                  "value": 0,
                  "meaning": "No clean primary QSO growth holdout exists.",
                  "carry_forward_status": "primary_evidence_lane_blocked",
              },
              {
                  "inherited_from": "v4.244",
                  "item": "external_residual_scoring",
                  "value": "blocked",
                  "meaning": "External observed rows were not scored.",
                  "carry_forward_status": "scoring_remains_blocked",
              },
              {
                  "inherited_from": "v4.244",
                  "item": "reference_scaffold",
                  "value": "available",
                  "meaning": "Reference values/contracts exist for future observed rows.",
                  "carry_forward_status": "may_support_future_manifest",
              },
              {
                  "inherited_from": "v4.244",
                  "item": "secondary_control_packet",
                  "value": "organized",
                  "meaning": "Secondary/control lanes are organized but review-only.",
                  "carry_forward_status": "not_primary_evidence",
              },
              {
                  "inherited_from": "v4.244",
                  "item": "selected_next_route",
                  "value": "v4_245_tairid_correction_formula_scaffold_or_external_observed_manifest_builder",
                  "meaning": "Current workflow should scaffold correction formula or observed manifest builder.",
                  "carry_forward_status": "current_route",
              },
          ]

          correction_variable_rows = [
              {
                  "symbol": "z",
                  "plain_name": "redshift",
                  "meaning": "source redshift of the candidate observation",
                  "allowed_status": "input_from_reviewed_manifest_or_default_target",
              },
              {
                  "symbol": "R_LCDM(q,z)",
                  "plain_name": "LCDM reference value",
                  "meaning": "reference value for quantity q at redshift z from v4.243-style calculator",
                  "allowed_status": "reference_only_not_evidence",
              },
              {
                  "symbol": "O_obs(q,z)",
                  "plain_name": "observed value",
                  "meaning": "observed external value from manually reviewed manifest",
                  "allowed_status": "missing_for_external_scoring",
              },
              {
                  "symbol": "Delta_obs(q,z)",
                  "plain_name": "observed residual",
                  "meaning": "O_obs(q,z) minus R_LCDM(q,z)",
                  "allowed_status": "blocked_until_observed_manifest_and_reference_join",
              },
              {
                  "symbol": "G(z)",
                  "plain_name": "prior frozen gate",
                  "meaning": "bounded redshift gate from prior TAIRID cosmology lane",
                  "allowed_status": "candidate_scaffold_component_not_refit_here",
              },
              {
                  "symbol": "W_axis(q)",
                  "plain_name": "axis weight",
                  "meaning": "quantity-specific sign/role weight, frozen before scoring",
                  "allowed_status": "symbolic_contract_only",
              },
              {
                  "symbol": "S_source(s)",
                  "plain_name": "source-family role weight",
                  "meaning": "tracer/source-family role weight, frozen before scoring",
                  "allowed_status": "symbolic_contract_only",
              },
              {
                  "symbol": "C_TAIRID(q,z,s)",
                  "plain_name": "TAIRID correction candidate",
                  "meaning": "candidate source-surface correction term before model comparison",
                  "allowed_status": "not_numeric_evidence_yet",
              },
          ]

          correction_formula_rows = [
              {
                  "formula_id": "formula_001_gate",
                  "formula_name": "prior frozen gate",
                  "formula": "G(z)=exp[-A*(z/(z+z_t))^p]",
                  "parameters": "A=0.6580586049; z_t=0.2224541370; p=2",
                  "status": "frozen_prior_component_not_refit_here",
                  "blocked_use": "cannot be called proof or validation",
              },
              {
                  "formula_id": "formula_002_residual",
                  "formula_name": "observed residual",
                  "formula": "Delta_obs(q,z)=O_obs(q,z)-R_LCDM(q,z)",
                  "parameters": "requires reviewed observed manifest and reference join",
                  "status": "blocked_until_external_observed_rows_exist",
                  "blocked_use": "cannot compute from reference rows alone",
              },
              {
                  "formula_id": "formula_003_symbolic_correction",
                  "formula_name": "symbolic TAIRID source-surface correction",
                  "formula": "C_TAIRID(q,z,s)=theta*G(z)*W_axis(q)*S_source(s)",
                  "parameters": "theta, W_axis, and S_source must be frozen before scoring",
                  "status": "symbolic_contract_only",
                  "blocked_use": "no numeric fit or evidence claim",
              },
              {
                  "formula_id": "formula_004_corrected_reference",
                  "formula_name": "candidate corrected reference",
                  "formula": "R_TAIRID(q,z,s)=R_LCDM(q,z)+C_TAIRID(q,z,s)",
                  "parameters": "requires formula_003 plus reference values",
                  "status": "future_model_comparison_scaffold_only",
                  "blocked_use": "not allowed for current scoring",
              },
              {
                  "formula_id": "formula_005_direction_check",
                  "formula_name": "sign-direction check",
                  "formula": "sign(Delta_obs) compared with frozen_expected_direction",
                  "parameters": "requires observed residual and frozen axis target",
                  "status": "future_holdout_check_only",
                  "blocked_use": "not evidence without independent observed source",
              },
              {
                  "formula_id": "formula_006_failure_check",
                  "formula_name": "failure condition check",
                  "formula": "machine-readable failure rows applied before scoring",
                  "parameters": "uses failure_001 through failure_005",
                  "status": "guardrail_only",
                  "blocked_use": "cannot change after seeing scored result",
              },
          ]

          gate_reference_rows = []
          for target in [
              {"target_id": "lrg_reference", "z": 0.698},
              {"target_id": "elg_reference", "z": 0.845},
              {"target_id": "qso_reference", "z": 1.48},
              {"target_id": "future_qso_template", "z": 1.50},
              {"target_id": "lowz_control_template", "z": 0.35},
              {"target_id": "highz_control_template", "z": 2.00},
          ]:
              gate_reference_rows.append({
                  "target_id": target["target_id"],
                  "redshift": target["z"],
                  "gate_id": FROZEN_PRIOR_GATE["gate_id"],
                  "gate_value": gate_value(target["z"]),
                  "gate_status": "prior_frozen_gate_value_not_evidence",
              })

          axis_weight_contract_rows = [
              {
                  "axis_contract_id": "axis_contract_001",
                  "source_family": "QSO_or_QSO_like",
                  "observable": "f_sigma8",
                  "axis_role": "primary_growth_pressure_candidate",
                  "allowed_weight_direction": "positive_candidate_only",
                  "status": "cannot_score_until_primary_holdout_exists",
              },
              {
                  "axis_contract_id": "axis_contract_002",
                  "source_family": "QSO_or_QSO_like",
                  "observable": "D_H_over_r_sound",
                  "axis_role": "secondary_radial_pacing_candidate",
                  "allowed_weight_direction": "positive_or_zero_secondary_only",
                  "status": "secondary_not_primary",
              },
              {
                  "axis_contract_id": "axis_contract_003",
                  "source_family": "LRG_or_LRG_like",
                  "observable": "f_sigma8",
                  "axis_role": "growth_control",
                  "allowed_weight_direction": "control_not_same_as_primary_qso_growth",
                  "status": "control_only",
              },
              {
                  "axis_contract_id": "axis_contract_004",
                  "source_family": "BAO_or_geometry_only",
                  "observable": "D_V_or_geometry",
                  "axis_role": "compressed_geometry_control",
                  "allowed_weight_direction": "not_primary_growth",
                  "status": "control_only",
              },
          ]

          external_observed_manifest_template_rows = [
              {
                  "observed_id": "obs_001_primary_qso_growth",
                  "target_id": "PUT_REVIEWED_TARGET_ID_HERE",
                  "source_family": "QSO_or_QSO_like",
                  "source_role": "primary_qso_growth_holdout",
                  "redshift": "PUT_REDSHIFT_HERE",
                  "quantity": "f_sigma8_or_comparable_growth",
                  "observed_value": "PUT_OBSERVED_VALUE_HERE",
                  "observed_sigma_or_likelihood": "PUT_SIGMA_OR_LIKELIHOOD_REFERENCE_HERE",
                  "data_path_or_url": "PUT_REVIEWED_DATA_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "approval_status": "blocked_until_reviewed_primary_holdout_exists",
              },
              {
                  "observed_id": "obs_002_qso_radial_secondary",
                  "target_id": "PUT_REVIEWED_TARGET_ID_HERE",
                  "source_family": "QSO_or_QSO_like",
                  "source_role": "qso_radial_secondary",
                  "redshift": "PUT_REDSHIFT_HERE",
                  "quantity": "D_H_over_r_sound_or_equivalent",
                  "observed_value": "PUT_OBSERVED_VALUE_HERE",
                  "observed_sigma_or_likelihood": "PUT_SIGMA_OR_LIKELIHOOD_REFERENCE_HERE",
                  "data_path_or_url": "PUT_REVIEWED_SECONDARY_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "approval_status": "manual_review_required_secondary_only",
              },
              {
                  "observed_id": "obs_003_lrg_growth_control",
                  "target_id": "PUT_REVIEWED_TARGET_ID_HERE",
                  "source_family": "LRG_or_LRG_like",
                  "source_role": "lrg_growth_control",
                  "redshift": "PUT_REDSHIFT_HERE",
                  "quantity": "f_sigma8_or_comparable_growth",
                  "observed_value": "PUT_OBSERVED_VALUE_HERE",
                  "observed_sigma_or_likelihood": "PUT_SIGMA_OR_LIKELIHOOD_REFERENCE_HERE",
                  "data_path_or_url": "PUT_REVIEWED_CONTROL_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "approval_status": "manual_review_required_control_only",
              },
              {
                  "observed_id": "obs_004_geometry_control",
                  "target_id": "PUT_REVIEWED_TARGET_ID_HERE",
                  "source_family": "BAO_or_geometry_only",
                  "source_role": "geometry_control",
                  "redshift": "PUT_REDSHIFT_HERE",
                  "quantity": "D_V_D_M_D_H_or_likelihood_coordinate",
                  "observed_value": "PUT_OBSERVED_VALUE_HERE",
                  "observed_sigma_or_likelihood": "PUT_SIGMA_OR_LIKELIHOOD_REFERENCE_HERE",
                  "data_path_or_url": "PUT_REVIEWED_GEOMETRY_SOURCE_HERE",
                  "covariance_path_or_url": "PUT_REVIEWED_COVARIANCE_OR_LIKELIHOOD_HERE",
                  "approval_status": "manual_review_required_geometry_control_only",
              },
          ]

          observed_manifest_status_rows = []
          manifest_paths_found = [path for path in OBSERVED_MANIFEST_CANDIDATES if path.exists()]
          if not manifest_paths_found:
              observed_manifest_status_rows.append({
                  "manifest_path": "",
                  "manifest_status": "missing",
                  "observed_rows": 0,
                  "detail": "No external observed manifest found. Template rows written only.",
              })
          else:
              for path in manifest_paths_found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in REQUIRED_OBSERVED_COLUMNS if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          "observed_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                  except Exception as exc:
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          "observed_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })

          failure_condition_rows = [
              {
                  "failure_condition_id": "failure_001",
                  "target": "QSO f_sigma8 primary pressure",
                  "machine_condition": "if holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened",
                  "status": "active_but_not_testable_without_primary_holdout",
              },
              {
                  "failure_condition_id": "failure_002",
                  "target": "QSO versus LRG growth contrast",
                  "machine_condition": "if lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened",
                  "status": "active_for_future_control_review",
              },
              {
                  "failure_condition_id": "failure_003",
                  "target": "QSO radial secondary support",
                  "machine_condition": "if qso_radial_direction == '-' then secondary_support_weakened",
                  "status": "active_for_future_secondary_review",
              },
              {
                  "failure_condition_id": "failure_004",
                  "target": "geometry compressed lane non-primary",
                  "machine_condition": "if compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed",
                  "status": "active_for_future_geometry_review",
              },
              {
                  "failure_condition_id": "failure_005",
                  "target": "external likelihood robustness",
                  "machine_condition": "if external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover then baseline_pressure_not_tairid_specific",
                  "status": "active_for_future_model_comparison",
              },
          ]

          correction_readiness_rows = [
              {
                  "readiness_id": "readiness_001",
                  "requirement": "symbolic_correction_contract",
                  "status": "ready",
                  "blocks": "nothing",
              },
              {
                  "readiness_id": "readiness_002",
                  "requirement": "numeric_correction_parameters",
                  "status": "not_ready",
                  "blocks": "model-vs-model comparison",
              },
              {
                  "readiness_id": "readiness_003",
                  "requirement": "external_observed_manifest",
                  "status": "missing" if not manifest_paths_found else "present_needs_review",
                  "blocks": "residual scoring",
              },
              {
                  "readiness_id": "readiness_004",
                  "requirement": "primary_qso_growth_holdout_source",
                  "status": "missing",
                  "blocks": "primary evidence lane",
              },
              {
                  "readiness_id": "readiness_005",
                  "requirement": "reference_join",
                  "status": "ready_as_contract_only",
                  "blocks": "scoring until observed rows exist",
              },
              {
                  "readiness_id": "readiness_006",
                  "requirement": "combined_matrix_permission",
                  "status": "blocked",
                  "blocks": "combined LRG/ELG/QSO matrix",
              },
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "TAIRID correction formula is now a symbolic scaffold only.",
                  "basis": "Formula rows define G(z), residuals, and source-surface correction contract without scoring data.",
                  "next_action": "Review the correction contract before any numeric parameter or model comparison.",
                  "claim_status": "symbolic_scaffold_not_evidence",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "Primary QSO growth evidence remains blocked.",
                  "basis": "No reviewed external observed primary QSO growth source exists.",
                  "next_action": "Do not score primary QSO growth or fill it from secondary/control rows.",
                  "claim_status": "primary_holdout_missing",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "Observed manifest template is written but not filled.",
                  "basis": "External observed manifest is missing or unreviewed.",
                  "next_action": "Use v4.246 for correction contract review or external observed manifest fill guard.",
                  "claim_status": "scoring_blocked",
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "symbolic_tairid_correction_scaffold",
                  "permission_status": "allowed",
                  "reason": "Formula contract can be written without scoring evidence.",
              },
              {
                  "permission_scope": "prior_frozen_gate_reference",
                  "permission_status": "allowed_as_scaffold_only",
                  "reason": "The prior gate may be carried as a frozen component but not refit or claimed as evidence.",
              },
              {
                  "permission_scope": "numeric_tairid_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No external observed manifest or primary holdout exists.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "Observed external manifest is missing or unreviewed.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "No clean primary QSO growth holdout exists.",
              },
              {
                  "permission_scope": "automatic_evidence_claim",
                  "permission_status": "blocked",
                  "reason": "Scaffold rows are not evidence.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Source-surface compatibility has not passed.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_246_correction_contract_review",
                  "purpose": "review symbolic correction contract before numeric parameters are allowed",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_246_external_observed_manifest_fill_guard",
                  "purpose": "guard manual observed manifest fill without scoring",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_246_secondary_control_source_review",
                  "purpose": "review secondary/control sources without primary evidence language",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_246_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until source-surface guards pass",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before correction scaffold"},
              {"gate": "inherited_v4_244_rows_equal_6", "passed": len(inherited_v4_244_rows) == 6, "detail": f"inherited_v4_244_rows = {len(inherited_v4_244_rows)}"},
              {"gate": "correction_variable_rows_equal_8", "passed": len(correction_variable_rows) == 8, "detail": f"correction_variable_rows = {len(correction_variable_rows)}"},
              {"gate": "correction_formula_rows_equal_6", "passed": len(correction_formula_rows) == 6, "detail": f"correction_formula_rows = {len(correction_formula_rows)}"},
              {"gate": "gate_reference_rows_equal_6", "passed": len(gate_reference_rows) == 6, "detail": f"gate_reference_rows = {len(gate_reference_rows)}"},
              {"gate": "axis_weight_contract_rows_equal_4", "passed": len(axis_weight_contract_rows) == 4, "detail": f"axis_weight_contract_rows = {len(axis_weight_contract_rows)}"},
              {"gate": "external_observed_manifest_template_rows_equal_4", "passed": len(external_observed_manifest_template_rows) == 4, "detail": f"external_observed_manifest_template_rows = {len(external_observed_manifest_template_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "correction_readiness_rows_equal_6", "passed": len(correction_readiness_rows) == 6, "detail": f"correction_readiness_rows = {len(correction_readiness_rows)}"},
              {"gate": "decision_rows_equal_3", "passed": len(decision_rows) == 3, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "permission_rows_equal_8", "passed": len(permission_rows) == 8, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "symbolic_correction_allowed", "passed": any(row["permission_scope"] == "symbolic_tairid_correction_scaffold" and row["permission_status"] == "allowed" for row in permission_rows), "detail": "symbolic correction scaffold allowed"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_tairid_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric TAIRID correction fit blocked"},
              {"gate": "external_observed_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external observed residual scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO growth evidence blocked"},
              {"gate": "automatic_evidence_blocked", "passed": any(row["permission_scope"] == "automatic_evidence_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "automatic evidence claim blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "cosmology validation claim blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "residual_formula_blocked_until_observed_rows", "passed": any(row["formula_id"] == "formula_002_residual" and row["status"] == "blocked_until_external_observed_rows_exist" for row in correction_formula_rows), "detail": "residual formula blocked until observed rows exist"},
              {"gate": "prior_gate_not_refit", "passed": FROZEN_PRIOR_GATE["origin_status"] == "prior_frozen_supernova_bao_gate_not_refit_here", "detail": "prior gate not refit here"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no external scoring"},
              {"gate": "truth_boundary_no_primary_holdout", "passed": True, "detail": "no primary holdout"},
              {"gate": "truth_boundary_symbolic_only", "passed": True, "detail": "correction is symbolic scaffold only"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_246_correction_contract_review_or_external_observed_manifest_fill_guard", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_245_tairid_correction_formula_scaffold_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_245_inherited_v4_244_rows.csv", inherited_v4_244_rows)
          write_csv(OUT / "v4_245_correction_variable_rows.csv", correction_variable_rows)
          write_csv(OUT / "v4_245_correction_formula_rows.csv", correction_formula_rows)
          write_csv(OUT / "v4_245_gate_reference_rows.csv", gate_reference_rows)
          write_csv(OUT / "v4_245_axis_weight_contract_rows.csv", axis_weight_contract_rows)
          write_csv(OUT / "v4_245_external_observed_manifest_template_rows.csv", external_observed_manifest_template_rows)
          write_csv(OUT / "v4_245_observed_manifest_status_rows.csv", observed_manifest_status_rows)
          write_csv(OUT / "v4_245_failure_condition_rows.csv", failure_condition_rows)
          write_csv(OUT / "v4_245_correction_readiness_rows.csv", correction_readiness_rows)
          write_csv(OUT / "v4_245_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_245_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_245_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_245_rule_checks.csv", checks)

          formula_lines = [
              f"{row['formula_id']}: {row['formula_name']} — {row['status']}"
              for row in correction_formula_rows
          ]

          gate_lines = [
              f"{row['target_id']}: z={row['redshift']} G(z)={row['gate_value']:.10f}"
              for row in gate_reference_rows
          ]

          decision_lines = [
              f"{row['decision_id']}: {row['decision']} Next: {row['next_action']}"
              for row in decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_244_rows": len(inherited_v4_244_rows),
              "correction_variable_rows": len(correction_variable_rows),
              "correction_formula_rows": len(correction_formula_rows),
              "gate_reference_rows": len(gate_reference_rows),
              "axis_weight_contract_rows": len(axis_weight_contract_rows),
              "external_observed_manifest_template_rows": len(external_observed_manifest_template_rows),
              "observed_manifest_status_rows": len(observed_manifest_status_rows),
              "failure_condition_rows": len(failure_condition_rows),
              "correction_readiness_rows": len(correction_readiness_rows),
              "decision_rows": len(decision_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "primary_holdout_exists": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_245_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.245 TAIRID Correction Formula Scaffold",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_244_rows = {summary['inherited_v4_244_rows']}",
              f"correction_variable_rows = {summary['correction_variable_rows']}",
              f"correction_formula_rows = {summary['correction_formula_rows']}",
              f"gate_reference_rows = {summary['gate_reference_rows']}",
              f"axis_weight_contract_rows = {summary['axis_weight_contract_rows']}",
              f"external_observed_manifest_template_rows = {summary['external_observed_manifest_template_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"correction_readiness_rows = {summary['correction_readiness_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Correction formulas:",
              *formula_lines,
              "",
              "Gate reference rows:",
              *gate_lines,
              "",
              "Decisions:",
              *decision_lines,
              "",
              "Clean meaning: v4.245 creates a symbolic TAIRID correction formula scaffold and an observed-manifest template. It carries the prior frozen gate only as a scaffold component, does not refit it, and blocks numeric correction fitting or external residual scoring.",
              "",
              "Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no primary holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_245_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_244_rows = {summary['inherited_v4_244_rows']}")
          print(f"correction_variable_rows = {summary['correction_variable_rows']}")
          print(f"correction_formula_rows = {summary['correction_formula_rows']}")
          print(f"gate_reference_rows = {summary['gate_reference_rows']}")
          print(f"axis_weight_contract_rows = {summary['axis_weight_contract_rows']}")
          print(f"external_observed_manifest_template_rows = {summary['external_observed_manifest_template_rows']}")
          print(f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}")
          print(f"failure_condition_rows = {summary['failure_condition_rows']}")
          print(f"correction_readiness_rows = {summary['correction_readiness_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no primary holdout source, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.245 TAIRID correction formula scaffold output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-245-tairid-correction-formula-scaffold-output
          path: |
            tairid_v4_245_tairid_correction_formula_scaffold_output/
            tairid-v4-245-tairid-correction-formula-scaffold-output.zip
