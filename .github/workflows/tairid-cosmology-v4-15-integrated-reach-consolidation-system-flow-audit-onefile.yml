              ]
          )

          write_csv(
              OUTDIR / "next_test_queue_v4_15.csv",
              NEXT_TEST_QUEUE,
              ["priority", "next_test", "purpose", "must_include", "must_not_include", "readiness_if_passes"]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_system_flow_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The integrated reach/consolidation system-flow audit checks whether current diagnostic lanes remain coherent together.",
                  "boundary": "System-flow audit only, not validation."
