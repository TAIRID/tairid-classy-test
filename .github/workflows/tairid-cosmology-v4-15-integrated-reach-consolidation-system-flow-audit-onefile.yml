          json_path = OUTDIR / "tairid_cosmology_v4_15_integrated_reach_consolidation_system_flow_audit_onefile.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v4.15 — Integrated Reach / Consolidation System-Flow Audit Onefile")
