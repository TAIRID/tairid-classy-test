          md.append("- `source_milestones_v4_15.csv`")
          md.append("- `system_components_v4_15.csv`")
          md.append("- `lane_summary_v4_15.csv`")
          md.append("- `flow_rule_results_v4_15.csv`")
          md.append("- `system_health_v4_15.csv`")
          md.append("- `next_test_queue_v4_15.csv`")
          md.append("- `interpretation_boundaries_v4_15.csv`")
          md.append("- `tairid_cosmology_v4_15_integrated_reach_consolidation_system_flow_audit_onefile.json`")
          md.append("- `tairid_cosmology_v4_15_integrated_reach_consolidation_system_flow_audit_onefile.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v4_15_integrated_reach_consolidation_system_flow_audit_onefile.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
