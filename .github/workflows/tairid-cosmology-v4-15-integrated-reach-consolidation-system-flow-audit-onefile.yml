name: TAIRID Cosmology v4.15 Integrated Reach Consolidation System Flow Audit Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-15-integrated-reach-consolidation-system-flow-audit-onefile.yml"

jobs:
  integrated-reach-consolidation-system-flow-audit-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.15 integrated reach consolidation system flow audit onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_15_integrated_reach_consolidation_system_flow_audit_onefile

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_15_integrated_reach_consolidation_system_flow_audit_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_15_integrated_reach_consolidation_system_flow_audit_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine KiDS, DES, HSC, H0LiCOW, or BAO into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run DES, HSC, KiDS, H0LiCOW, or BAO likelihoods.",
              "This audits whether the current reach, consolidation, product-status, decomposition, and boundary ledgers flow together without contradiction.",
              "A pass means the diagnostic system is internally coherent enough for the next checkpoint, not that TAIRID is validated."
          ]

          PLANCK_AXIS_REFERENCE = {
              "S8": {"q50": 0.824821, "sigma_68": 0.012218},
              "sigma8": {"q50": 0.810123, "sigma_68": 0.006639},
              "Omega_m": {"q50": 0.310797, "sigma_68": 0.006153}
          }

          SOURCE_MILESTONES = [
              {
                  "milestone": "v3.41",
                  "status": "h0licow_reach_lane_eligibility_passed_coherent_negative_ddt_candidate",
                  "meaning": "H0LiCOW time-delay distance rows carried as reach-positive-equivalent after normalization.",
                  "carry_forward": "Reach lane active as diagnostic only."
              },
              {
                  "milestone": "v3.56",
                  "status": "guarded_reach_consolidation_comparison_checkpoint_passed_ready_for_handoff_and_robustness_plan",
                  "meaning": "Reach-positive-equivalent H0LiCOW and consolidation-negative KiDS kept separate.",
                  "carry_forward": "No one-surface collapse."
              },
              {
                  "milestone": "v4.4.3",
                  "status": "kids_readme_guided_parser_passed_direct_3x2pt_axes_recovered",
                  "meaning": "KiDS direct 3x2pt chain parsed and matched carried value.",
                  "carry_forward": "KiDS direct-chain 3x2pt row active."
              },
              {
                  "milestone": "v4.6",
                  "status": "role_explicit_growth_family_checkpoint_passed_with_strength_warnings",
                  "meaning": "Growth/consolidation-negative direction survived KiDS role cleanup.",
                  "carry_forward": "Use role-explicit growth lanes only."
              },
              {
                  "milestone": "v4.11.1",
                  "status": "hsc_sacc_likelihood_boundary_audit_onefile_passed_keep_hsc_summary_row",
                  "meaning": "HSC has SACC/data-vector/likelihood infrastructure but no posterior-chain row.",
                  "carry_forward": "HSC remains published-summary row."
              },
              {
                  "milestone": "v4.13",
                  "status": "des_run_name_public_url_repair_onefile_completed_run_names_found_no_public_chain",
                  "meaning": "DES has run-name/template provenance but no reachable numeric chain.",
                  "carry_forward": "DES remains published-summary row."
              },
              {
                  "milestone": "v4.14",
                  "status": "growth_robustness_handoff_checkpoint_passed_ready_for_integrated_reach_consolidation_checkpoint",
                  "meaning": "Growth robustness state frozen and ready to reconnect with reach lane.",
                  "carry_forward": "Proceed to integrated reach/consolidation checkpoint."
              }
          ]

          SYSTEM_COMPONENTS = [
              {
                  "component_id": "h0licow_time_delay_reach",
                  "family": "H0LiCOW",
                  "lane": "reach_geometry",
                  "observable_role": "time_delay_distance_reach",
                  "surface_role": "reach_positive_equivalent",
                  "product_status": "direct_public_h0licow_distance_chain_reviewed_prior_artifact",
                  "axis": "Ddt_pressure_normalized_to_reach",
                  "pressure_z": -1.6268644558220158,
                  "direction_raw": "negative_Ddt_pressure",
                  "direction_normalized": "reach_positive_equivalent",
                  "strength": "moderate",
                  "source_status": "diagnostic_reach_candidate_only",
                  "model_anchor_allowed": False,
                  "replacement_allowed": False,
                  "notes": "Carried from earlier reach lane; not a model anchor."
              },
              {
                  "component_id": "kids1000_published_cosmic_shear_only",
                  "family": "KiDS",
                  "lane": "lensing_only_growth",
                  "observable_role": "cosmic_shear_only_lensing_growth",
                  "surface_role": "consolidation_growth",
                  "product_status": "published_summary_role_distinct",
                  "axis": "S8",
                  "value": 0.759,
                  "sigma": 0.024,
                  "direction_normalized": "consolidation_negative",
                  "source_status": "summary_row_active",
                  "model_anchor_allowed": False,
                  "replacement_allowed": False,
                  "notes": "Does not get replaced by KiDS 3x2pt."
              },
              {
                  "component_id": "des_y3_cosmic_shear_only",
                  "family": "DES",
                  "lane": "lensing_only_growth",
                  "observable_role": "cosmic_shear_only_lensing_growth",
                  "surface_role": "consolidation_growth",
                  "product_status": "published_summary_role_distinct",
                  "axis": "S8",
                  "value": 0.772,
                  "sigma": 0.018,
                  "direction_normalized": "consolidation_negative",
                  "source_status": "summary_row_active",
                  "model_anchor_allowed": False,
                  "replacement_allowed": False,
                  "notes": "Direct DES chain not reached."
              },
              {
                  "component_id": "hsc_y3_cosmic_shear_power_spectra",
                  "family": "HSC",
                  "lane": "lensing_only_growth",
                  "observable_role": "cosmic_shear_only_lensing_growth",
                  "surface_role": "consolidation_growth",
                  "product_status": "published_summary_role_distinct",
                  "axis": "S8",
                  "value": 0.776,
                  "sigma": 0.032,
                  "direction_normalized": "consolidation_negative",
                  "source_status": "summary_row_active",
                  "model_anchor_allowed": False,
                  "replacement_allowed": False,
                  "notes": "HSC direct posterior-chain replacement not found."
              },
              {
                  "component_id": "kids1000_direct_3x2pt_fiducial_chain",
                  "family": "KiDS",
                  "lane": "three_by_two_growth",
                  "observable_role": "fiducial_3x2pt_cosmic_shear_ggl_galaxy_clustering",
                  "surface_role": "consolidation_growth",
                  "product_status": "direct_chain_parsed",
                  "axis": "S8",
                  "value": 0.7645649990442438,
                  "sigma": 0.01632059899225302,
                  "direction_normalized": "consolidation_negative",
                  "source_status": "direct_chain_active",
                  "model_anchor_allowed": False,
                  "replacement_allowed": True,
                  "notes": "May replace only prior carried KiDS 3x2pt value."
              },
              {
                  "component_id": "des_y3_3x2pt_combined",
                  "family": "DES",
                  "lane": "three_by_two_growth",
                  "observable_role": "3x2pt_combined_growth",
                  "surface_role": "consolidation_growth",
                  "product_status": "published_summary_direct_chain_not_reached",
                  "axis": "S8",
                  "value": 0.776,
                  "sigma": 0.017,
                  "direction_normalized": "consolidation_negative",
                  "source_status": "summary_row_active",
                  "model_anchor_allowed": False,
                  "replacement_allowed": False,
                  "notes": "Run-name/template evidence found, but no public numeric chain reached."
              },
              {
                  "component_id": "kids1000_direct_3x2pt_sigma8",
                  "family": "KiDS",
                  "lane": "decomposition",
                  "observable_role": "direct_3x2pt_sigma8_axis",
                  "surface_role": "amplitude_decomposition",
                  "product_status": "direct_chain_parsed",
                  "axis": "sigma8",
                  "value": 0.758678356712955,
                  "sigma": 0.02158338779753677,
                  "direction_normalized": "amplitude_negative",
                  "source_status": "direct_chain_decomposition_axis",
                  "model_anchor_allowed": False,
                  "replacement_allowed": True,
                  "notes": "Supports amplitude-side pressure reading."
              },
              {
                  "component_id": "des_y3_3x2pt_reconstructed_sigma8",
                  "family": "DES",
                  "lane": "decomposition",
                  "observable_role": "reconstructed_sigma8_from_published_S8_Omega_m",
                  "surface_role": "amplitude_decomposition",
                  "product_status": "published_summary_reconstruction",
                  "axis": "sigma8",
                  "value": 0.780367,
                  "sigma": 0.01842,
                  "direction_normalized": "amplitude_negative",
                  "source_status": "summary_reconstruction_active",
                  "model_anchor_allowed": False,
                  "replacement_allowed": False,
                  "notes": "Reconstructed from DES summary row, not a direct chain axis."
              },
              {
                  "component_id": "kids1000_direct_3x2pt_omegam",
                  "family": "KiDS",
                  "lane": "decomposition",
                  "observable_role": "direct_3x2pt_Omega_m_axis",
                  "surface_role": "Omega_m_decomposition",
                  "product_status": "direct_chain_parsed",
                  "axis": "Omega_m",
                  "value": 0.3048090486225367,
                  "sigma": 0.012390754602697285,
                  "direction_normalized": "Omega_m_weak_negative",
                  "source_status": "direct_chain_decomposition_axis",
                  "model_anchor_allowed": False,
                  "replacement_allowed": True,
                  "notes": "Omega_m weakly negative, not shared strong pressure."
              },
              {
                  "component_id": "des_y3_3x2pt_omegam",
                  "family": "DES",
                  "lane": "decomposition",
                  "observable_role": "published_3x2pt_Omega_m_axis",
                  "surface_role": "Omega_m_decomposition",
                  "product_status": "published_summary",
                  "axis": "Omega_m",
                  "value": 0.339,
                  "sigma": 0.032,
                  "direction_normalized": "Omega_m_positive",
                  "source_status": "summary_row_active",
                  "model_anchor_allowed": False,
                  "replacement_allowed": False,
                  "notes": "Omega_m positive relative to Planck; confirms mixed Omega_m lane."
              },
              {
                  "component_id": "bao_auxiliary_ruler_boundary",
                  "family": "BAO",
                  "lane": "auxiliary_boundary",
                  "observable_role": "bao_reach_ruler_mixed",
                  "surface_role": "ruler_reference_boundary",
                  "product_status": "prior_audited_boundary_only",
                  "axis": "not_scored_here",
                  "direction_normalized": "not_global_reach_anchor",
                  "source_status": "auxiliary_boundary_only",
                  "model_anchor_allowed": False,
                  "replacement_allowed": False,
                  "notes": "BAO is not promoted into a global reach anchor."
              }
          ]

          FLOW_RULES = [
              {
                  "rule_id": "reach_and_consolidation_remain_separate",
                  "description": "Reach-positive-equivalent rows and consolidation-negative rows must not be averaged into one correction surface.",
                  "required": True
              },
              {
                  "rule_id": "direct_chain_status_preserved",
                  "description": "KiDS direct-chain row may be active, but DES/HSC must remain summary rows until direct posterior-chain samples are found.",
                  "required": True
              },
              {
                  "rule_id": "bao_boundary_preserved",
                  "description": "BAO remains auxiliary mixed/ruler boundary and is not promoted to a global reach anchor.",
                  "required": True
              },
              {
                  "rule_id": "amplitude_pressure_not_omegam_pressure",
                  "description": "S8/sigma8 may carry repeated negative pressure; Omega_m must be reported as mixed rather than forced negative.",
                  "required": True
              },
              {
                  "rule_id": "no_model_claims",
                  "description": "No validation, refit, likelihood, BIC, posterior model comparison, new physics proof, or standard-cosmology-disproof claim is allowed.",
                  "required": True
              }
          ]

          NEXT_TEST_QUEUE = [
              {
                  "priority": 1,
                  "next_test": "v4_16_human_readable_integrated_handoff",
                  "purpose": "Write a readable handoff explaining the integrated reach/consolidation system state after v4.15.",
                  "must_include": "Reach lane, growth lane, direct-product status, decomposition, BAO boundary, truth boundary, next clean moves.",
                  "must_not_include": "validation language, model comparison, BIC, likelihood, refit, standard-cosmology-disproof claim.",
                  "readiness_if_passes": "New thread or paper draft can continue from the integrated checkpoint."
              },
              {
                  "priority": 2,
                  "next_test": "v4_16_optional_reach_growth_interaction_matrix",
                  "purpose": "Build a matrix showing how reach-positive-equivalent and consolidation-negative diagnostics interact without combining them into one posterior.",
                  "must_include": "Role separation, source status, allowed interpretation, blocked interpretation.",
                  "must_not_include": "numeric fitting or one-surface collapse.",
                  "readiness_if_passes": "Interaction language can be tightened."
              },
              {
                  "priority": 3,
                  "next_test": "manual_DES_or_HSC_direct_chain_insertion_only_if_URL_supplied",
                  "purpose": "Only parse DES/HSC if a real public posterior-chain URL is supplied.",
                  "must_include": "Exact URL, numeric sample detection, column map.",
                  "must_not_include": "template guessing, placeholder HTML, likelihood execution.",
                  "readiness_if_passes": "DES/HSC direct-chain status may be upgraded only after parse success."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def compute_pressure(component):
              axis = component.get("axis")
              if axis not in PLANCK_AXIS_REFERENCE:
                  return {
                      "planck_value": "",
                      "planck_sigma": "",
                      "delta_observable_minus_planck": "",
                      "combined_sigma": "",
                      "pressure_z": component.get("pressure_z", ""),
                      "computed_direction": component.get("direction_normalized", ""),
                      "computed_strength": component.get("strength", "")
                  }

              ref = PLANCK_AXIS_REFERENCE[axis]
              value = float(component["value"])
              sigma = float(component["sigma"])
              delta = value - ref["q50"]
              combined = math.sqrt(sigma ** 2 + ref["sigma_68"] ** 2)
              z = delta / combined if combined > 0 else float("nan")

              if delta < 0:
                  direction = "negative"
              elif delta > 0:
                  direction = "positive"
              else:
                  direction = "zero"

              abs_z = abs(z)
              if abs_z >= 2.5:
                  strength = "strong"
              elif abs_z >= 1.5:
                  strength = "moderate"
              elif abs_z >= 0.25:
                  strength = "weak"
              else:
                  strength = "near_zero"

              return {
                  "planck_value": ref["q50"],
                  "planck_sigma": ref["sigma_68"],
                  "delta_observable_minus_planck": delta,
                  "combined_sigma": combined,
                  "pressure_z": z,
                  "computed_direction": direction,
                  "computed_strength": strength
              }

          component_rows = []
          for component in SYSTEM_COMPONENTS:
              row = dict(component)
              row.update(compute_pressure(component))
              component_rows.append(row)

          lane_summary_rows = []
          for lane in sorted(set(row["lane"] for row in component_rows)):
              rows = [row for row in component_rows if row["lane"] == lane]
              scored_rows = [row for row in rows if isinstance(row.get("pressure_z"), float) or isinstance(row.get("pressure_z"), int)]

              negative_count = sum(1 for row in scored_rows if row.get("computed_direction") == "negative")
              positive_count = sum(1 for row in scored_rows if row.get("computed_direction") == "positive")
              strong_count = sum(1 for row in scored_rows if row.get("computed_strength") == "strong")
              moderate_or_stronger_count = sum(1 for row in scored_rows if row.get("computed_strength") in ["moderate", "strong"])
              direct_chain_count = sum(1 for row in rows if row.get("product_status") == "direct_chain_parsed")
              summary_count = sum(1 for row in rows if "summary" in row.get("product_status", ""))

              if lane in ["lensing_only_growth", "three_by_two_growth"]:
                  if positive_count > 0:
                      lane_status = "growth_lane_has_positive_flip"
                  elif negative_count == len(scored_rows) and moderate_or_stronger_count >= 2:
                      lane_status = "growth_lane_negative_repeated"
                  elif negative_count == len(scored_rows):
                      lane_status = "growth_lane_negative_with_strength_warning"
                  else:
                      lane_status = "growth_lane_inconclusive"
              elif lane == "decomposition":
                  lane_status = "decomposition_mixed_expected"
              elif lane == "reach_geometry":
                  lane_status = "reach_positive_equivalent_preserved"
              elif lane == "auxiliary_boundary":
                  lane_status = "auxiliary_boundary_preserved"
              else:
                  lane_status = "lane_recorded"

              lane_summary_rows.append({
                  "lane": lane,
                  "row_count": len(rows),
                  "scored_row_count": len(scored_rows),
                  "families": ";".join(sorted(set(row["family"] for row in rows))),
                  "negative_count": negative_count,
                  "positive_count": positive_count,
                  "strong_count": strong_count,
                  "moderate_or_stronger_count": moderate_or_stronger_count,
                  "direct_chain_count": direct_chain_count,
                  "summary_count": summary_count,
                  "lane_status": lane_status
              })

          failed_gates = []
          warnings = []

          reach_rows = [row for row in component_rows if row["lane"] == "reach_geometry"]
          growth_rows = [row for row in component_rows if row["lane"] in ["lensing_only_growth", "three_by_two_growth"]]
          bao_rows = [row for row in component_rows if row["family"] == "BAO"]
          des_rows = [row for row in component_rows if row["family"] == "DES"]
          hsc_rows = [row for row in component_rows if row["family"] == "HSC"]
          kids_rows = [row for row in component_rows if row["family"] == "KiDS"]

          reach_preserved = any(row["direction_normalized"] == "reach_positive_equivalent" for row in reach_rows)
          growth_negative_preserved = all(row.get("computed_direction") == "negative" for row in growth_rows if row.get("axis") == "S8")
          bao_boundary_preserved = any(row["direction_normalized"] == "not_global_reach_anchor" for row in bao_rows)

          kids_direct_chain_preserved = any(row["product_status"] == "direct_chain_parsed" for row in kids_rows)
          des_summary_preserved = all(row["replacement_allowed"] is False for row in des_rows)
          hsc_summary_preserved = all(row["replacement_allowed"] is False for row in hsc_rows)

          sigma8_rows = [row for row in component_rows if row.get("axis") == "sigma8"]
          omegam_rows = [row for row in component_rows if row.get("axis") == "Omega_m"]

          sigma8_negative = all(row.get("computed_direction") == "negative" for row in sigma8_rows)
          omegam_mixed = len(set(row.get("computed_direction") for row in omegam_rows)) > 1

          if not reach_preserved:
              failed_gates.append("reach_positive_equivalent_not_preserved")

          if not growth_negative_preserved:
              failed_gates.append("growth_s8_negative_direction_not_preserved")

          if not bao_boundary_preserved:
              failed_gates.append("bao_boundary_not_preserved")

          if not kids_direct_chain_preserved:
              failed_gates.append("kids_direct_chain_not_preserved")

          if not des_summary_preserved:
              failed_gates.append("des_summary_boundary_not_preserved")

          if not hsc_summary_preserved:
              failed_gates.append("hsc_summary_boundary_not_preserved")

          if not sigma8_negative:
              warnings.append("sigma8_amplitude_side_not_uniformly_negative")

          if not omegam_mixed:
              warnings.append("omegam_not_mixed_check_decomposition")

          for row in lane_summary_rows:
              if row["lane"] in ["lensing_only_growth", "three_by_two_growth"] and row["strong_count"] < row["scored_row_count"]:
                  warnings.append(f"{row['lane']}_not_all_rows_strong")

          warnings.append("integrated_checkpoint_is_system_flow_audit_not_model_validation")

          flow_rule_results = [
              {
                  "rule_id": "reach_and_consolidation_remain_separate",
                  "pass": reach_preserved and growth_negative_preserved,
                  "result": "separate_surfaces_preserved" if reach_preserved and growth_negative_preserved else "surface_separation_needs_repair",
                  "boundary": "No one-surface collapse."
              },
              {
                  "rule_id": "direct_chain_status_preserved",
                  "pass": kids_direct_chain_preserved and des_summary_preserved and hsc_summary_preserved,
                  "result": "product_status_boundaries_preserved" if kids_direct_chain_preserved and des_summary_preserved and hsc_summary_preserved else "product_status_boundary_needs_repair",
                  "boundary": "Only KiDS is direct-chain in this checkpoint."
              },
              {
                  "rule_id": "bao_boundary_preserved",
                  "pass": bao_boundary_preserved,
                  "result": "bao_auxiliary_boundary_preserved" if bao_boundary_preserved else "bao_boundary_needs_repair",
                  "boundary": "BAO is not a global reach anchor."
              },
              {
                  "rule_id": "amplitude_pressure_not_omegam_pressure",
                  "pass": sigma8_negative and omegam_mixed,
                  "result": "amplitude_side_supported_omegam_mixed" if sigma8_negative and omegam_mixed else "decomposition_needs_review",
                  "boundary": "Omega_m cannot be forced into the shared negative pattern."
              },
              {
                  "rule_id": "no_model_claims",
                  "pass": True,
                  "result": "truth_boundaries_preserved",
                  "boundary": "No validation, likelihood, BIC, refit, or model-comparison claim."
              }
          ]

          system_health = {
              "reach_preserved": reach_preserved,
              "growth_negative_preserved": growth_negative_preserved,
              "bao_boundary_preserved": bao_boundary_preserved,
              "kids_direct_chain_preserved": kids_direct_chain_preserved,
              "des_summary_preserved": des_summary_preserved,
              "hsc_summary_preserved": hsc_summary_preserved,
              "sigma8_negative": sigma8_negative,
              "omegam_mixed": omegam_mixed,
              "flow_rule_pass_count": sum(1 for row in flow_rule_results if row["pass"]),
              "flow_rule_total_count": len(flow_rule_results)
          }

          if failed_gates:
              readiness_label = "integrated_reach_consolidation_system_flow_audit_failed"
              next_step = "Repair failed integration gates before handoff."
          elif system_health["flow_rule_pass_count"] == system_health["flow_rule_total_count"]:
              readiness_label = "integrated_reach_consolidation_system_flow_audit_passed_ready_for_human_handoff"
              next_step = (
                  "Proceed to v4.16 human-readable integrated handoff. "
                  "State that the system flow is coherent as a diagnostic framework only, with KiDS direct-chain active and DES/HSC summary-only."
              )
          else:
              readiness_label = "integrated_reach_consolidation_system_flow_audit_passed_with_review_warnings"
              next_step = (
                  "Proceed to a targeted review of warnings before human-readable handoff."
              )

          interpretation = (
              "v4.15 is the first larger multi-variable system-flow audit. "
              "It checks whether reach, consolidation/growth, direct-product status, decomposition, and boundary roles remain coherent together. "
              "The intended success condition is not proof. The intended success condition is that no lane silently replaces another lane, no summary product is treated as a direct chain, BAO remains auxiliary, and the repeated pressure stays role-specific rather than becoming a forced one-surface correction."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_milestones": SOURCE_MILESTONES,
              "planck_axis_reference": PLANCK_AXIS_REFERENCE,
              "system_components": component_rows,
              "lane_summary_rows": lane_summary_rows,
              "flow_rule_results": flow_rule_results,
              "system_health": system_health,
              "next_test_queue": NEXT_TEST_QUEUE,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_growth_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              },
              "gate_result": {
