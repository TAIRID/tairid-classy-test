                  "boundary": "No one-surface collapse."
              },
              {
                  "interpretation_id": "allowed_product_status_statement",
                  "status": "allowed_with_boundary",
                  "wording": "KiDS is direct-chain active in the 3x2pt lane; DES and HSC remain summary-only until direct public posterior-chain products are supplied and parsed.",
