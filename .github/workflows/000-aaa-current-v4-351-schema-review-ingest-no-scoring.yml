name: "!!! AAA CURRENT - TAIRID v4.351 schema review ingest no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-351-schema-review-ingest-no-scoring:
    name: "!!! AAA CURRENT - Run v4.351 schema review ingest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.350 output ZIP and human-filled schema review ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.350 output ZIP..."
          INPUT_350_ZIP="$(ls tairid-v4-350-observed-data-schema-column-map-no-values-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_350_ZIP" ]; then
            echo "Could not find v4.350 output ZIP."
            echo "Expected:"
            echo "tairid-v4-350-observed-data-schema-column-map-no-values-no-scoring-output.zip"
            exit 1
          fi

          echo "Finding human-filled schema review ZIP..."
          HUMAN_FILLED_SCHEMA_REVIEW_ZIP="$(ls tairid-v4-350-human-filled-schema-review-for-v4-351-no-values-no-scoring*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_SCHEMA_REVIEW_ZIP" ]; then
            echo "Could not find human-filled schema review ZIP."
            echo "Expected:"
            echo "tairid-v4-350-human-filled-schema-review-for-v4-351-no-values-no-scoring.zip"
            exit 1
          fi

          echo "Using v4.350 ZIP:"
          echo "$INPUT_350_ZIP"

          echo "Using human-filled schema review ZIP:"
          echo "$HUMAN_FILLED_SCHEMA_REVIEW_ZIP"

          echo "INPUT_350_ZIP=$INPUT_350_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_SCHEMA_REVIEW_ZIP=$HUMAN_FILLED_SCHEMA_REVIEW_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.351 schema review ingest script
        run: |
          cat > run_v4_351_schema_review_ingest_no_values_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values approved; numeric baseline approved; schema review may be ingested here; no observed values loaded; no scoring; no support claims"

          ALLOWED_SCHEMA_REVIEW_DECISIONS = {
              "approve_schema_for_later_observed_value_loading",
              "needs_manual_column_mapping",
              "needs_better_source_file",
              "reject_source_file",
              "keep_blocked",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def main():
              input_350 = Path(os.environ["INPUT_350_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_SCHEMA_REVIEW_ZIP"])

              outdir = Path("tairid_v4_351_schema_review_ingest_no_values_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base350 = extract_zip(input_350, "tairid_v4_351_350_")
              basehuman = extract_zip(human_zip, "tairid_v4_351_human_")

              summary350_path = find_one(base350, "v4_350_summary.json")
              schema_packet_path = find_one(base350, "v4_350_HUMAN_FILL_schema_review_packet_NO_VALUES_NO_SCORING.csv")
              schema_map_path = find_one(base350, "v4_350_observed_data_schema_map_candidate_NO_VALUES_LOADED.csv")
              header_probe_path = find_one(base350, "v4_350_header_probe_ONLY_NO_VALUES_LOADED.csv")
              checklist_path = find_one(base350, "v4_350_schema_review_checklist.csv")
              gap_status_path = find_one(base350, "v4_350_gap_status_after_schema_map_packet.csv")
              rules350_path = find_one(base350, "v4_350_rule_checks.csv")
              baseline_path = find_one(base350, "v4_350_input_v4_349_approved_baseline_preserved.csv")

              filled_schema_path = find_one_suffix(basehuman, "HUMAN_FILLED_schema_review_packet_NO_VALUES_NO_SCORING.csv")

              summary350 = json.loads(summary350_path.read_text())
              schema_packet = pd.read_csv(schema_packet_path)
              schema_map = pd.read_csv(schema_map_path)
              header_probe = pd.read_csv(header_probe_path)
              checklist = pd.read_csv(checklist_path)
              gap_status = pd.read_csv(gap_status_path)
              rules350 = pd.read_csv(rules350_path)
              approved_baseline = pd.read_csv(baseline_path)
              filled_schema = pd.read_csv(filled_schema_path)

              for col in [
                  "human_approved_survey_or_source_column",
                  "human_approved_tracer_or_sample_column",
                  "human_approved_redshift_z_column",
                  "human_approved_observed_fsigma8_column",
                  "human_approved_observed_fsigma8_uncertainty_column",
                  "human_approved_covariance_or_error_model",
                  "human_approved_source_reference_column",
                  "human_schema_review_decision",
                  "human_schema_review_note",
              ]:
                  if col not in filled_schema.columns:
                      filled_schema[col] = ""

              ingest_rows = []
              for _, row in filled_schema.iterrows():
                  decision = clean(row["human_schema_review_decision"])
                  if decision == "approve_schema_for_later_observed_value_loading":
                      row_ingest_status = "approved_for_later_observed_value_loading_not_loaded"
                      schema_approved_now = True
                  elif decision == "needs_manual_column_mapping":
                      row_ingest_status = "blocked_needs_manual_column_mapping"
                      schema_approved_now = False
                  elif decision == "needs_better_source_file":
                      row_ingest_status = "blocked_needs_better_source_file"
                      schema_approved_now = False
                  elif decision in ["reject_source_file", "keep_blocked"]:
                      row_ingest_status = "blocked_or_rejected"
                      schema_approved_now = False
                  else:
                      row_ingest_status = "invalid_or_missing_schema_review_decision"
                      schema_approved_now = False

                  ingest_rows.append({
                      "v4_351_schema_ingest_id": f"v4_351_schema_ingest_{len(ingest_rows)+1:03d}",
                      "v4_350_schema_map_id": clean(row["v4_350_schema_map_id"]),
                      "source_inventory_id": clean(row["source_inventory_id"]),
                      "repo_path": clean(row["repo_path"]),
                      "file_name": clean(row["file_name"]),
                      "source_class": clean(row["source_class"]),
                      "human_schema_review_decision": decision,
                      "human_schema_review_note": clean(row["human_schema_review_note"]),
                      "human_approved_survey_or_source_column": clean(row["human_approved_survey_or_source_column"]),
                      "human_approved_tracer_or_sample_column": clean(row["human_approved_tracer_or_sample_column"]),
                      "human_approved_redshift_z_column": clean(row["human_approved_redshift_z_column"]),
                      "human_approved_observed_fsigma8_column": clean(row["human_approved_observed_fsigma8_column"]),
                      "human_approved_observed_fsigma8_uncertainty_column": clean(row["human_approved_observed_fsigma8_uncertainty_column"]),
                      "human_approved_covariance_or_error_model": clean(row["human_approved_covariance_or_error_model"]),
                      "human_approved_source_reference_column": clean(row["human_approved_source_reference_column"]),
                      "row_ingest_status": row_ingest_status,
                      "schema_approved_now": schema_approved_now,
                      "observed_values_loaded": False,
                      "observed_rows_loaded": 0,
                      "definition_match_confirmed": False,
                      "covariance_match_confirmed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              ingest = pd.DataFrame(ingest_rows)

              schema_approved_rows = ingest[ingest["schema_approved_now"].astype(bool)].copy()
              needs_manual_mapping_rows = ingest[ingest["row_ingest_status"] == "blocked_needs_manual_column_mapping"].copy()
              needs_better_source_rows = ingest[ingest["row_ingest_status"] == "blocked_needs_better_source_file"].copy()
              blocked_or_rejected_rows = ingest[ingest["row_ingest_status"] == "blocked_or_rejected"].copy()
              invalid_rows = ingest[ingest["row_ingest_status"] == "invalid_or_missing_schema_review_decision"].copy()

              if len(schema_approved_rows) > 0:
                  readiness_status = "schema_approved_for_later_observed_value_loading_not_loaded"
                  selected_next_route = "v4_352_observed_value_loading_dry_run_no_scoring"
              elif len(needs_manual_mapping_rows) > 0:
                  readiness_status = "blocked_needs_manual_column_mapping"
                  selected_next_route = "v4_352_manual_observed_source_column_repair_packet_no_values_no_scoring"
              elif len(needs_better_source_rows) > 0:
                  readiness_status = "blocked_needs_better_observed_source_file"
                  selected_next_route = "add_better_observed_source_file_then_return_to_v4_348_or_v4_349"
              else:
                  readiness_status = "blocked_no_schema_approved"
                  selected_next_route = "return_to_schema_review_or_source_inventory"

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_351_GAP_001",
                      "gap": "Human schema review decision ingested.",
                      "status_after_v4_351": readiness_status,
                      "next_gate": selected_next_route,
                  },
                  {
                      "gap_id": "V4_351_GAP_002",
                      "gap": "Observed values remain unloaded.",
                      "status_after_v4_351": "still_blocked",
                      "next_gate": "later_observed_value_loading_gate",
                  },
                  {
                      "gap_id": "V4_351_GAP_003",
                      "gap": "Definition matching remains unconfirmed.",
                      "status_after_v4_351": "still_blocked",
                      "next_gate": "later_definition_match_gate",
                  },
                  {
                      "gap_id": "V4_351_GAP_004",
                      "gap": "Covariance matching remains unconfirmed.",
                      "status_after_v4_351": "still_blocked",
                      "next_gate": "later_covariance_match_gate",
                  },
                  {
                      "gap_id": "V4_351_GAP_005",
                      "gap": "Scoring and support claims remain blocked.",
                      "status_after_v4_351": "still_blocked",
                      "next_gate": "later_scoring_and_support_gates",
                  },
              ])

              hard_checks = {
                  "input_v4_350_summary_found": summary350.get("version") == "v4.350",
                  "input_v4_350_rules_all_passed": summary_rules_all_passed(summary350),
                  "input_v4_350_failed_gates_none": summary350.get("failed_gates") == "none",
                  "input_v4_350_parameter_values_approved_true": summary350.get("parameter_values_approved") is True,
                  "input_v4_350_numeric_baseline_approved_true": summary350.get("numeric_baseline_approved") is True,
                  "input_v4_350_schema_not_approved_yet": summary350.get("schema_approved") is False,
                  "input_v4_350_no_observed_values_loaded": summary350.get("observed_values_loaded") is False,
                  "input_v4_350_no_definition_match_confirmed": summary350.get("definition_match_confirmed") is False,
                  "input_v4_350_no_score_valid": summary350.get("score_valid") is False,
                  "input_v4_350_no_support_allowed": summary350.get("support_allowed") is False,

                  "rules350_all_passed": rules350["passed"].astype(bool).all(),
                  "schema_packet_rows_equal_summary": len(schema_packet) == int(summary350.get("schema_candidate_rows")),
                  "filled_schema_rows_equal_schema_packet": len(filled_schema) == len(schema_packet),
                  "schema_map_rows_equal_schema_packet": len(schema_map) == len(schema_packet),
                  "header_probe_rows_equal_schema_packet": len(header_probe) == len(schema_packet),
                  "checklist_rows_equal_6": len(checklist) == 6,
                  "gap_status_rows_equal_5": len(gap_status) == 5,
                  "approved_baseline_rows_equal_3": len(approved_baseline) == 3,

                  "schema_review_decisions_filled_all_rows": filled_schema["human_schema_review_decision"].apply(clean).ne("").all(),
                  "schema_review_decisions_allowed": filled_schema["human_schema_review_decision"].apply(clean).isin(ALLOWED_SCHEMA_REVIEW_DECISIONS).all(),
                  "schema_ingest_rows_equal_schema_packet": len(ingest) == len(schema_packet),
                  "invalid_rows_equal_0": len(invalid_rows) == 0,

                  "observed_values_loaded_false": false_col(ingest, "observed_values_loaded"),
                  "definition_match_confirmed_false": false_col(ingest, "definition_match_confirmed"),
                  "covariance_match_confirmed_false": false_col(ingest, "covariance_match_confirmed"),
                  "score_valid_false": false_col(ingest, "score_valid"),
                  "support_allowed_false": false_col(ingest, "support_allowed"),
                  "gap_update_rows_equal_5": len(gap_update) == 5,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary351 = {
                  "version": "v4.351",
                  "route_name": "v4_351_schema_review_ingest_no_values_no_scoring",
                  "expected_result": "v4_351_schema_review_ingest_passed_no_values_loaded_no_scoring_no_claims",
                  "input_version": "v4.350",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "readiness_status": readiness_status,
                  "schema_review_rows": int(len(filled_schema)),
                  "schema_approved_rows": int(len(schema_approved_rows)),
                  "needs_manual_mapping_rows": int(len(needs_manual_mapping_rows)),
                  "needs_better_source_rows": int(len(needs_better_source_rows)),
                  "blocked_or_rejected_rows": int(len(blocked_or_rejected_rows)),
                  "invalid_rows": int(len(invalid_rows)),
                  "parameter_values_approved": True,
                  "numeric_baseline_values_filled": True,
                  "approved_baseline_values": 3,
                  "numeric_baseline_approved": True,
                  "schema_approved": bool(len(schema_approved_rows) > 0),
                  "observed_values_loaded": False,
                  "observed_rows_loaded": 0,
                  "definition_match_confirmed": False,
                  "covariance_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": selected_next_route,
              }

              ingest.to_csv(outdir / "v4_351_schema_review_ingest_ledger_NO_VALUES_NO_SCORING.csv", index=False)
              schema_approved_rows.to_csv(outdir / "v4_351_schema_approved_rows_NOT_VALUES_LOADED.csv", index=False)
              needs_manual_mapping_rows.to_csv(outdir / "v4_351_needs_manual_column_mapping_rows.csv", index=False)
              gap_update.to_csv(outdir / "v4_351_gap_status_after_schema_review_ingest.csv", index=False)
              filled_schema.to_csv(outdir / "v4_351_input_human_filled_schema_review_preserved.csv", index=False)
              schema_packet.to_csv(outdir / "v4_351_input_blank_v4_350_schema_review_packet_preserved.csv", index=False)
              header_probe.to_csv(outdir / "v4_351_input_header_probe_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_351_rule_checks.csv", index=False)

              (outdir / "v4_351_summary.json").write_text(json.dumps(summary351, indent=2))

              summary_md = f"""# TAIRID v4.351 Schema Review Ingest — No Values, No Scoring

          Expected result: `{summary351["expected_result"]}`

          {summary351["rules_passed"]} / {summary351["rules_total"]} rules passed

          failed_gates = {summary351["failed_gates"]}

          readiness_status = `{summary351["readiness_status"]}`

          schema_review_rows = {summary351["schema_review_rows"]}

          schema_approved_rows = {summary351["schema_approved_rows"]}

          needs_manual_mapping_rows = {summary351["needs_manual_mapping_rows"]}

          observed_values_loaded = false

          observed_rows_loaded = 0

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step ingests the human schema review decision.

          It does **not** load observed values.

          It does **not** confirm definition or covariance matching.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{summary351["selected_next_route"]}`
          """
              (outdir / "v4_351_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary351, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_351_schema_review_ingest_no_values_no_scoring.py

      - name: Run v4.351 schema review ingest no scoring
        run: |
          python run_v4_351_schema_review_ingest_no_values_no_scoring.py

      - name: Upload v4.351 schema review ingest artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-351-schema-review-ingest-no-values-no-scoring-output
          path: |
            tairid_v4_351_schema_review_ingest_no_values_no_scoring_output/
            tairid_v4_351_schema_review_ingest_no_values_no_scoring_output.zip
