name: 001 TAIRID v4.272 - Zhao Chi Square Diagnostic Scalar Guard No Evidence

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-272-zhao-chi-square-diagnostic-scalar-guard-no-evidence.yml"
      - "data/cosmology/zhao_reference_model_manifest.csv"
      - "zhao_reference_model_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-chi-square-diagnostic-scalar-guard-no-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.272 Zhao Chi Square Diagnostic Scalar Guard No Evidence is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.272 Zhao chi-square diagnostic scalar guard no evidence
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.272"
          ROUTE = "zhao_chi_square_diagnostic_scalar_guard_no_evidence_after_v4_271"
          EXPECTED_RESULT = "v4_272_zhao_chi_square_diagnostic_scalar_guard_no_evidence_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_273_zhao_diagnostic_scalar_interpretation_and_source_comparison_plan"

          OUT = Path("tairid_v4_272_zhao_chi_square_diagnostic_scalar_guard_no_evidence_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-272-zhao-chi-square-diagnostic-scalar-guard-no-evidence-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REFERENCE_MODEL_MANIFEST_CANDIDATES = [
              Path("data/cosmology/zhao_reference_model_manifest.csv"),
              Path("zhao_reference_model_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_REFERENCE_COLUMNS = [
              "reference_id",
              "observed_id",
              "model_family",
              "model_label",
              "redshift",
              "quantity",
              "predicted_value",
              "prediction_source_or_method",
              "parameter_status",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def sign_label(x):
              if x > 0:
                  return "+"
              if x < 0:
                  return "-"
              return "0"

          def matvec(matrix, vector):
              return [sum(matrix[i][j] * vector[j] for j in range(len(vector))) for i in range(len(matrix))]

          inherited_v4_271_rows = [
              {
                  "inherited_from": "v4.271",
                  "item": "rules",
                  "value": "47 / 47 passed",
                  "meaning": "Zhao Residual Direction Review Chi Square Scope Guard passed.",
                  "carry_forward_status": "ready_for_diagnostic_scalar_guard",
              },
              {
                  "inherited_from": "v4.271",
                  "item": "raw_residual_direction_signature",
                  "value": "---+",
                  "meaning": "Raw residual direction is mixed-negative dominant.",
                  "carry_forward_status": "direction_review_ready",
              },
              {
                  "inherited_from": "v4.271",
                  "item": "normalized_residual_direction_signature",
                  "value": "---+",
                  "meaning": "Diagonal-normalized direction matches raw direction.",
                  "carry_forward_status": "direction_review_ready",
              },
              {
                  "inherited_from": "v4.271",
                  "item": "covariance_weighted_direction_signature",
                  "value": "-+-+",
                  "meaning": "Projection preview was mixed alternating.",
                  "carry_forward_status": "projection_direction_ready",
              },
              {
                  "inherited_from": "v4.271",
                  "item": "simple_positive_qso_pressure_weakened",
                  "value": True,
                  "meaning": "A simple all-positive QSO pressure reading was weakened.",
                  "carry_forward_status": "interpretation_guard_ready",
              },
              {
                  "inherited_from": "v4.271",
                  "item": "chi_square_diagnostic_allowed_next",
                  "value": True,
                  "meaning": "A diagnostic scalar may be computed next with hard no-evidence scope.",
                  "carry_forward_status": "diagnostic_scalar_allowed_next",
              },
              {
                  "inherited_from": "v4.271",
                  "item": "source_comparison_needed",
                  "value": True,
                  "meaning": "QSO alone cannot decide source-surface contrast.",
                  "carry_forward_status": "source_comparison_future_needed",
              },
              {
                  "inherited_from": "v4.271",
                  "item": "scoring_allowed",
                  "value": False,
                  "meaning": "Scoring stayed blocked.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.271",
                  "item": "selected_next_route",
                  "value": "v4_272_zhao_chi_square_diagnostic_scalar_guard_no_evidence",
                  "meaning": "Current route computes diagnostic scalar only, with no evidence or validation language.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          reference_model_manifest_status_rows, reference_model_manifest_input_rows = read_manifest_status(
              REFERENCE_MODEL_MANIFEST_CANDIDATES, REQUIRED_REFERENCE_COLUMNS, "reference"
          )

          zhao_rows = [
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_0_978", "redshift": 0.978, "observed_value": 0.379, "sigma": 0.176, "reference_value": 0.433944158},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_23", "redshift": 1.230, "observed_value": 0.385, "sigma": 0.099, "reference_value": 0.404912522},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_526", "redshift": 1.526, "observed_value": 0.342, "sigma": 0.070, "reference_value": 0.371533172},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_944", "redshift": 1.944, "observed_value": 0.364, "sigma": 0.106, "reference_value": 0.329409330},
          ]

          inverse_covariance = [
              [55.79819445388793, -41.38511536139837, 13.212068599555996, -4.092791287243753],
              [-41.38511536139838, 282.48885695468914, -257.5473145530564, 117.61290125434246],
              [13.212068599555998, -257.5473145530564, 528.8645101020032, -241.06321994507524],
              [-4.092791287243754, 117.61290125434248, -241.06321994507524, 175.98143425482374],
          ]

          residual_vector = [float(row["observed_value"]) - float(row["reference_value"]) for row in zhao_rows]
          normalized_vector = [residual_vector[i] / float(zhao_rows[i]["sigma"]) for i in range(4)]
          projection_vector = matvec(inverse_covariance, residual_vector)
          quadratic_components = [residual_vector[i] * projection_vector[i] for i in range(4)]
          diagnostic_scalar = sum(quadratic_components)
          raw_signature = "".join(sign_label(x) for x in residual_vector)
          normalized_signature = "".join(sign_label(x) for x in normalized_vector)
          projection_signature = "".join(sign_label(x) for x in projection_vector)

          residual_input_rows = []
          for i, row in enumerate(zhao_rows):
              residual_input_rows.append({
                  "input_id": f"input_{i+1:02d}",
                  "observed_id": row["observed_id"],
                  "redshift": row["redshift"],
                  "observed_value": row["observed_value"],
                  "reference_value": row["reference_value"],
                  "sigma": row["sigma"],
                  "residual": residual_vector[i],
                  "normalized_residual_diagonal_only": normalized_vector[i],
                  "raw_direction": sign_label(residual_vector[i]),
                  "input_status": "residual_input_review_only",
                  "scoring_allowed": False,
              })

          inverse_covariance_rows = []
          labels = [row["observed_id"] for row in zhao_rows]
          for i in range(4):
              for j in range(4):
                  inverse_covariance_rows.append({
                      "row_index": i + 1,
                      "col_index": j + 1,
                      "row_observed_id": labels[i],
                      "col_observed_id": labels[j],
                      "inverse_covariance_value": inverse_covariance[i][j],
                      "source": "v4.269 validated inverse covariance packet",
                      "scoring_allowed": False,
