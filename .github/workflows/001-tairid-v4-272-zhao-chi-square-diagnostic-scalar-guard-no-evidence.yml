              {
                  "consistency_id": "consistency_004",
                  "check": "diagnostic_scalar_positive",
                  "expected": "positive_finite",
                  "actual": diagnostic_scalar,
                  "status": "pass" if math.isfinite(diagnostic_scalar) and diagnostic_scalar > 0 else "issue",
              },
              {
                  "consistency_id": "consistency_005",
                  "check": "component_sum_matches_scalar",
                  "expected": diagnostic_scalar,
                  "actual": sum(row["quadratic_component"] for row in projection_rows),
                  "status": "pass" if abs(diagnostic_scalar - sum(row["quadratic_component"] for row in projection_rows)) < 1e-12 else "issue",
              },
          ]

          diagnostic_interpretation_rows = [
              {
                  "interpretation_id": "interp_001",
                  "object": "diagnostic_scalar",
                  "value": diagnostic_scalar,
                  "plain_meaning": "The Zhao residual vector is close to the fixed LCDM-style reference under this guarded covariance metric.",
