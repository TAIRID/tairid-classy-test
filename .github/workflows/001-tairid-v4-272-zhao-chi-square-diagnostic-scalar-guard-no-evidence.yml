          projection_rows = []
          for i, row in enumerate(zhao_rows):
              projection_rows.append({
                  "projection_id": f"proj_{i+1:02d}",
                  "observed_id": row["observed_id"],
                  "redshift": row["redshift"],
                  "recomputed_covariance_weighted_component": projection_vector[i],
                  "component_direction": sign_label(projection_vector[i]),
