                  "blocked_claim": "evidence, proof, validation, model success, or model failure",
              },
              {
                  "interpretation_id": "interp_002",
                  "object": "direction_pattern",
                  "value": raw_signature,
                  "plain_meaning": "The residual direction remains mixed-negative dominant, not all-positive.",
                  "allowed_claim": "simple all-positive QSO pressure is weakened",
                  "blocked_claim": "cosmology conclusion",
              },
              {
                  "interpretation_id": "interp_003",
                  "object": "source_scope",
                  "value": "QSO-only same-family cross-release candidate",
                  "plain_meaning": "This scalar belongs to the Zhao QSO lane only.",
                  "allowed_claim": "QSO-lane diagnostic",
                  "blocked_claim": "combined LRG/ELG/QSO matrix or independent holdout",
              },
              {
                  "interpretation_id": "interp_004",
                  "object": "next_needed",
