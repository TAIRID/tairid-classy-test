name: TAIRID Cosmology v4.22 Growth Product Boundary Selector Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-22-growth-product-boundary-selector-onefile.yml"

jobs:
  growth-product-boundary-selector-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.22 growth product boundary selector onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_22_growth_product_boundary_selector_onefile

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_22_growth_product_boundary_selector_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_22_growth_product_boundary_selector_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine RSD, clusters, CMB lensing, KiDS, DES, HSC, H0LiCOW, BAO, or CMB into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run RSD, cluster, CMB-lensing, DES, HSC, KiDS, H0LiCOW, BAO, or CMB likelihoods.",
              "This selects the safest next growth/consolidation product lane and labels its evidence boundary.",
              "A pass means a growth lane is selected for future boundary audit, not that TAIRID cosmology is validated."
          ]

          SOURCE_ROOTS = [
              {
                  "source_id": "boss_dr12_consensus_bao_rsd",
                  "role_focus": "rsd_fsigma8_growth",
                  "source_url": "https://arxiv.org/abs/1607.03155",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "BOSS DR12 consensus constraints include BAO and redshift-space distortion growth information.",
                  "candidate_axis": "fσ8 / growth rate",
                  "candidate_evidence_status": "published_summary_or_literature_inventory",
                  "boundary_complication": "BAO plus RSD combined product; must keep BAO boundary separate from growth axis."
              },
              {
                  "source_id": "eboss_dr16_cosmology_rsd",
                  "role_focus": "rsd_fsigma8_growth",
                  "source_url": "https://arxiv.org/abs/2007.08991",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "eBOSS DR16 cosmology includes BAO and RSD growth constraints.",
                  "candidate_axis": "fσ8 / growth rate",
                  "candidate_evidence_status": "published_summary_or_literature_inventory",
                  "boundary_complication": "BAO plus RSD combined product; must keep BAO boundary separate from growth axis."
              },
              {
                  "source_id": "wigglez_growth_rate_rsd",
                  "role_focus": "rsd_fsigma8_growth",
                  "source_url": "https://arxiv.org/abs/1104.2948",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "WiggleZ growth-rate and redshift-space distortion source candidate.",
                  "candidate_axis": "fσ8 / growth rate",
                  "candidate_evidence_status": "published_summary_or_literature_inventory",
                  "boundary_complication": "Older source; must label survey and summary status before scoring."
              },
              {
                  "source_id": "planck_2015_sz_cluster_counts",
                  "role_focus": "cluster_abundance_growth",
                  "source_url": "https://arxiv.org/abs/1502.01597",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "Planck SZ cluster counts constrain sigma8, Omega_m, and growth-amplitude combinations.",
                  "candidate_axis": "sigma8 / Omega_m / cluster amplitude",
                  "candidate_evidence_status": "published_summary_or_literature_inventory",
                  "boundary_complication": "Mass calibration and selection effects must be carried before pressure scoring."
              },
              {
                  "source_id": "des_y1_cluster_cosmology_candidate",
                  "role_focus": "cluster_abundance_growth",
                  "source_url": "https://arxiv.org/abs/2002.11124",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "DES cluster abundance and weak-lensing mass calibration candidate source.",
                  "candidate_axis": "S8 / Omega_m / cluster amplitude",
                  "candidate_evidence_status": "published_summary_or_literature_inventory",
                  "boundary_complication": "Mass calibration and weak-lensing calibration must be carried before pressure scoring."
              },
              {
                  "source_id": "planck_2018_cmb_lensing",
                  "role_focus": "cmb_lensing_growth",
                  "source_url": "https://arxiv.org/abs/1807.06210",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "Planck 2018 gravitational lensing constraints provide CMB-lensing growth information.",
                  "candidate_axis": "CMB lensing amplitude / integrated growth",
                  "candidate_evidence_status": "published_summary_or_literature_inventory",
                  "boundary_complication": "CMB lensing is tied to the CMB baseline and cannot replace Planck baseline analysis."
              },
              {
                  "source_id": "act_dr6_cmb_lensing_candidate",
                  "role_focus": "cmb_lensing_growth",
                  "source_url": "https://arxiv.org/abs/2304.05203",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "ACT DR6 CMB-lensing map or cosmology source candidate.",
                  "candidate_axis": "CMB lensing amplitude / integrated growth",
                  "candidate_evidence_status": "published_summary_or_literature_inventory",
                  "boundary_complication": "Needs CMB-lensing product/status separation before pressure scoring."
              }
          ]

          LANE_POLICY = [
              {
                  "lane_id": "rsd_fsigma8_growth",
                  "tairid_role": "growth_consolidation_velocity_field_guard",
                  "preferred_next_status": "published_summary_boundary_audit",
                  "selection_reason": "RSD/fσ8 is the cleanest next growth lane because it directly targets growth rate rather than weak lensing alone.",
                  "primary_axis": "fσ8",
                  "boundary_warning": "BAO and RSD may appear in the same survey products, so BAO must stay a boundary/ruler guard while fσ8 is the growth axis.",
                  "selector_priority": 1
              },
              {
                  "lane_id": "cluster_abundance_growth",
                  "tairid_role": "growth_consolidation_bound_structure_guard",
                  "preferred_next_status": "mass_calibration_boundary_before_pressure",
                  "selection_reason": "Clusters are useful but require mass calibration, selection, and source-specific modeling before pressure scoring.",
                  "primary_axis": "S8 / sigma8 / Omega_m cluster amplitude",
                  "boundary_warning": "Do not treat cluster tension as direct growth pressure without calibration boundaries.",
                  "selector_priority": 2
              },
              {
                  "lane_id": "cmb_lensing_growth",
                  "tairid_role": "growth_consolidation_integrated_lensing_guard",
                  "preferred_next_status": "cmb_role_boundary_before_pressure",
                  "selection_reason": "CMB lensing is important but must be separated from the primary CMB baseline and lensing-amplitude conventions.",
                  "primary_axis": "CMB lensing amplitude / integrated matter fluctuations",
                  "boundary_warning": "Do not use CMB lensing to replace Planck baseline analysis.",
                  "selector_priority": 3
              }
          ]

          BLOCKED_INTERPRETATIONS = [
              {
                  "claim": "The selected growth lane validates TAIRID.",
                  "status": "blocked",
                  "reason": "This selector chooses a future lane; it does not compute evidence for TAIRID."
              },
              {
                  "claim": "RSD, clusters, CMB lensing, and weak lensing can be averaged into one pressure score now.",
                  "status": "blocked",
                  "reason": "Each lane needs product status, axis labels, and source-specific boundaries first."
              },
              {
                  "claim": "Cluster counts prove growth suppression.",
                  "status": "blocked",
                  "reason": "Cluster abundance depends on mass calibration, selection, and modeling boundaries."
              },
              {
                  "claim": "CMB lensing replaces Planck baseline analysis.",
                  "status": "blocked",
                  "reason": "CMB lensing must remain a distinct integrated-growth lane."
              },
              {
                  "claim": "BAO and RSD can be collapsed into one reach/growth signal.",
                  "status": "blocked",
                  "reason": "BAO stays boundary/ruler; RSD/fσ8 is the growth axis."
              }
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_23_RSD_fsigma8_published_summary_boundary_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Audit RSD/fσ8 as the first growth-expansion lane using published summary/literature sources before any pressure score is computed.",
                  "why_next": "RSD/fσ8 is the safest next lane because it directly addresses growth rate and is less calibration-heavy than clusters.",
                  "must_include": "source family, redshift, fσ8 axis, BAO separation, evidence status, blocked claims.",
                  "must_not_include": "combined posterior, likelihood fitting, BIC, validation claim, or one-surface collapse."
              },
              {
                  "priority": 2,
                  "next_test": "v4_24_growth_axis_comparison_matrix",
                  "role_focus": "amplitude_decomposition",
                  "purpose": "Build a matrix showing which sources constrain S8, sigma8, fσ8, Omega_m, A_L, or CMB lensing amplitude.",
                  "why_next": "Axis labels prevent RSD, clusters, weak lensing, and CMB lensing from being forced into one unlabeled pressure surface.",
                  "must_include": "axis label, source family, evidence status, allowed interpretation, blocked interpretation.",
                  "must_not_include": "new pressure score or model validation."
              },
              {
                  "priority": 3,
                  "next_test": "v4_25_cluster_mass_calibration_boundary_audit",
                  "role_focus": "cluster_abundance_growth",
                  "purpose": "Audit cluster abundance only after RSD is bounded, preserving mass calibration and selection effects.",
                  "why_next": "Clusters are growth-relevant but cannot be treated as clean pressure rows without calibration boundaries.",
                  "must_include": "mass calibration, selection, source/product status, axis label.",
                  "must_not_include": "cluster proof claim."
              },
              {
                  "priority": 4,
                  "next_test": "v4_26_CMB_lensing_role_boundary_audit",
                  "role_focus": "cmb_lensing_growth",
                  "purpose": "Audit CMB lensing after RSD and cluster boundaries are staged.",
                  "why_next": "CMB lensing is powerful but must be separated from CMB baseline fitting.",
                  "must_include": "Planck/ACT role separation, lensing amplitude, integrated-growth language.",
                  "must_not_include": "Planck replacement claim."
              }
          ]

          KEYWORDS = {
              "rsd": [
                  "redshift-space distortion",
                  "redshift space distortion",
                  "RSD",
                  "fσ8",
                  "fsigma8",
                  "growth rate",
                  "growth of structure",
                  "peculiar velocity"
              ],
              "cluster": [
                  "cluster",
                  "clusters",
                  "cluster counts",
                  "Sunyaev",
                  "SZ",
                  "mass calibration",
                  "abundance",
                  "sigma8",
                  "S8",
                  "Omega_m"
              ],
              "cmb_lensing": [
                  "CMB lensing",
                  "gravitational lensing",
                  "lensing potential",
                  "CMB",
                  "Planck",
                  "ACT",
                  "convergence",
                  "matter fluctuations"
              ],
              "axis": [
                  "S8",
                  "sigma8",
                  "σ8",
                  "Omega_m",
                  "Ωm",
                  "fσ8",
                  "fsigma8",
                  "A_L",
                  "lensing amplitude",
                  "growth rate"
              ],
              "boundary": [
                  "BAO",
                  "baryon acoustic",
                  "mass calibration",
                  "selection",
                  "Planck",
                  "likelihood",
                  "constraint",
                  "distance"
              ]
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def fetch_text(url, timeout=90, byte_limit=2_000_000):
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 TAIRID-v4.22-growth-product-boundary-selector",
                      "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
                  }
              )
              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def clean_text(text):
              text = re.sub(r"<script.*?</script>", " ", text or "", flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def keyword_hits(text, words):
              lower = (text or "").lower()
              hits = []
              for word in words:
                  if word.lower() in lower:
                      hits.append(word)
              return hits

          def classify_source(role_focus, text, expected_signal):
              cleaned = clean_text(text)
              combined = cleaned + " " + expected_signal

              rsd_hits = keyword_hits(combined, KEYWORDS["rsd"])
              cluster_hits = keyword_hits(combined, KEYWORDS["cluster"])
              cmb_lensing_hits = keyword_hits(combined, KEYWORDS["cmb_lensing"])
              axis_hits = keyword_hits(combined, KEYWORDS["axis"])
              boundary_hits = keyword_hits(combined, KEYWORDS["boundary"])

              if role_focus == "rsd_fsigma8_growth":
                  if rsd_hits and axis_hits:
                      classification = "rsd_published_summary_axis_candidate"
                  elif rsd_hits:
                      classification = "rsd_published_summary_candidate"
                  else:
                      classification = "rsd_candidate_needs_manual_review"
              elif role_focus == "cluster_abundance_growth":
                  if cluster_hits and axis_hits:
                      classification = "cluster_published_summary_axis_candidate_with_calibration_boundary"
                  elif cluster_hits:
                      classification = "cluster_published_summary_candidate_with_calibration_boundary"
                  else:
                      classification = "cluster_candidate_needs_manual_review"
              elif role_focus == "cmb_lensing_growth":
                  if cmb_lensing_hits and axis_hits:
                      classification = "cmb_lensing_published_summary_axis_candidate_with_cmb_boundary"
                  elif cmb_lensing_hits:
                      classification = "cmb_lensing_published_summary_candidate_with_cmb_boundary"
                  else:
                      classification = "cmb_lensing_candidate_needs_manual_review"
              else:
                  classification = "unknown_growth_candidate"

              return {
                  "classification": classification,
                  "rsd_hits": ";".join(rsd_hits),
                  "cluster_hits": ";".join(cluster_hits),
                  "cmb_lensing_hits": ";".join(cmb_lensing_hits),
                  "axis_hits": ";".join(axis_hits),
                  "boundary_hits": ";".join(boundary_hits),
                  "text_preview": cleaned[:500]
              }

          def source_score(row):
              score = 0
              reasons = []

              if row["fetch_ok"]:
                  score += 5
                  reasons.append("reachable")

              if row["axis_hits"]:
                  score += 5
                  reasons.append("axis_label_present")

              if row["role_focus"] == "rsd_fsigma8_growth":
                  if row["rsd_hits"]:
                      score += 8
                      reasons.append("rsd_growth_signal")
                  score += 4
                  reasons.append("selector_prefers_rsd_first")
                  if "BAO" in row.get("boundary_hits", "") or "baryon acoustic" in row.get("boundary_hits", ""):
                      score -= 1
                      reasons.append("bao_boundary_must_be_separated")

              elif row["role_focus"] == "cluster_abundance_growth":
                  if row["cluster_hits"]:
                      score += 6
                      reasons.append("cluster_growth_signal")
                  score -= 4
                  reasons.append("mass_calibration_boundary_penalty")

              elif row["role_focus"] == "cmb_lensing_growth":
                  if row["cmb_lensing_hits"]:
                      score += 6
                      reasons.append("cmb_lensing_growth_signal")
                  score -= 3
                  reasons.append("cmb_baseline_boundary_penalty")

              return score, ";".join(reasons)

          created_at = now_iso()

          candidate_rows = []

          for source in SOURCE_ROOTS:
              fetched = fetch_text(source["source_url"])
              classified = classify_source(
                  source["role_focus"],
                  fetched["text"] if fetched["ok"] else "",
                  source["expected_signal"]
              )

              row = {
                  "source_id": source["source_id"],
                  "role_focus": source["role_focus"],
                  "source_url": source["source_url"],
                  "source_type": source["source_type"],
                  "expected_signal": source["expected_signal"],
                  "candidate_axis": source["candidate_axis"],
                  "candidate_evidence_status": source["candidate_evidence_status"],
                  "boundary_complication": source["boundary_complication"],
                  "fetch_ok": fetched["ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"],
                  **classified
              }

              score, reasons = source_score(row)
              row["source_selector_score"] = score
              row["source_score_reasons"] = reasons
              candidate_rows.append(row)

          lane_summary_rows = []

          for policy in LANE_POLICY:
              lane_id = policy["lane_id"]
              lane_sources = [row for row in candidate_rows if row["role_focus"] == lane_id]
              reachable_count = sum(1 for row in lane_sources if row["fetch_ok"])
              axis_count = sum(1 for row in lane_sources if row["axis_hits"])
              candidate_count = len(lane_sources)
              total_source_score = sum(int(row["source_selector_score"]) for row in lane_sources)

              direct_parsed_count = 0
              published_summary_count = sum(1 for row in lane_sources if row["candidate_evidence_status"] == "published_summary_or_literature_inventory")
              infrastructure_only_count = 0

              priority_bonus = max(0, 4 - int(policy["selector_priority"])) * 3

              if lane_id == "rsd_fsigma8_growth":
                  boundary_penalty = 1
                  lane_readiness = "ready_for_published_summary_boundary_audit"
              elif lane_id == "cluster_abundance_growth":
                  boundary_penalty = 6
                  lane_readiness = "requires_mass_calibration_boundary_before_pressure"
              elif lane_id == "cmb_lensing_growth":
                  boundary_penalty = 5
                  lane_readiness = "requires_cmb_role_boundary_before_pressure"
              else:
                  boundary_penalty = 10
                  lane_readiness = "unknown_lane"

              selector_score = total_source_score + priority_bonus - boundary_penalty

              lane_summary_rows.append({
                  "lane_id": lane_id,
                  "tairid_role": policy["tairid_role"],
                  "primary_axis": policy["primary_axis"],
                  "candidate_count": candidate_count,
                  "reachable_count": reachable_count,
                  "axis_count": axis_count,
                  "direct_parsed_count": direct_parsed_count,
                  "published_summary_count": published_summary_count,
                  "infrastructure_only_count": infrastructure_only_count,
                  "total_source_score": total_source_score,
                  "priority_bonus": priority_bonus,
                  "boundary_penalty": boundary_penalty,
                  "selector_score": selector_score,
                  "lane_readiness": lane_readiness,
                  "selection_reason": policy["selection_reason"],
                  "boundary_warning": policy["boundary_warning"],
                  "preferred_next_status": policy["preferred_next_status"]
              })

          lane_summary_rows.sort(key=lambda row: row["selector_score"], reverse=True)
          selected_lane = lane_summary_rows[0] if lane_summary_rows else {}

          failed_gates = []
          warnings = []

          if not selected_lane:
              failed_gates.append("no_growth_lane_selected")

          if selected_lane and selected_lane["lane_id"] != "rsd_fsigma8_growth":
              warnings.append("selector_did_not_choose_rsd_first_review_scoring")

          if selected_lane and selected_lane["direct_parsed_count"] == 0:
              warnings.append("selected_lane_is_not_direct_parsed_data")

          if selected_lane and selected_lane["published_summary_count"] > 0:
              warnings.append("selected_lane_uses_published_summary_or_literature_inventory_status")

          warnings.append("growth_product_boundary_selector_is_not_pressure_score")
          warnings.append("source_product_status_required_before_any_growth_pressure_expansion")
          warnings.append("BAO_RSD_separation_required_for_RSD_lane")

          if failed_gates:
              readiness_label = "growth_product_boundary_selector_failed"
              next_step = "Repair lane candidate rows before selecting a growth-expansion product boundary."
          else:
              readiness_label = "growth_product_boundary_selector_passed_rsd_lane_selected_for_published_summary_boundary_audit"
              next_step = (
                  "Proceed to v4.23 RSD/fσ8 published-summary boundary audit. "
                  "Do not compute pressure scores yet; first label source family, redshift, fσ8 axis, BAO separation, evidence status, and blocked claims."
              )

          selector_decision = {
              "selected_lane_id": selected_lane.get("lane_id", ""),
              "selected_primary_axis": selected_lane.get("primary_axis", ""),
              "selected_lane_readiness": selected_lane.get("lane_readiness", ""),
              "selected_evidence_status": "published_summary_or_literature_inventory",
              "direct_parsed_data_selected": False,
              "pressure_score_allowed_now": False,
              "combined_posterior_allowed_now": False,
              "likelihood_allowed_now": False,
              "next_action": next_step
          }

          system_health = {
              "candidate_source_count": len(candidate_rows),
              "candidate_lane_count": len(lane_summary_rows),
              "selected_lane_is_rsd": selector_decision["selected_lane_id"] == "rsd_fsigma8_growth",
              "selected_lane_has_axis_label": bool(selected_lane.get("primary_axis", "")),
              "selected_lane_direct_parsed": False,
              "selected_lane_summary_or_literature_status": True,
              "pressure_score_allowed_now": False,
              "combined_posterior_allowed_now": False,
              "validation_claim_allowed": False,
              "bao_rsd_separation_required": True
          }

          interpretation = (
              "v4.22 selects the safest next growth/consolidation expansion lane. "
              "RSD/fσ8 is selected first because it directly targets growth rate while avoiding the heavier mass-calibration boundary of clusters and the CMB-baseline entanglement of CMB lensing. "
              "The selected lane remains published-summary/literature inventory status, not direct parsed data, and no pressure score is allowed yet."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "truth_boundary": TRUTH_BOUNDARY,
              "source_roots": SOURCE_ROOTS,
              "lane_policy": LANE_POLICY,
              "candidate_rows": candidate_rows,
              "lane_summary_rows": lane_summary_rows,
              "selector_decision": selector_decision,
              "blocked_interpretations": BLOCKED_INTERPRETATIONS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "growth_law_proof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False,
                  "new_pressure_scores_built": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "combined_posterior_allowed": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False,
                  "new_pressure_scores_built": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "growth_candidate_sources_v4_22.csv",
              candidate_rows,
              [
                  "source_id",
                  "role_focus",
                  "source_url",
                  "source_type",
                  "expected_signal",
                  "candidate_axis",
                  "candidate_evidence_status",
                  "boundary_complication",
                  "fetch_ok",
                  "http_status",
                  "content_type",
                  "bytes_read",
                  "error",
                  "classification",
