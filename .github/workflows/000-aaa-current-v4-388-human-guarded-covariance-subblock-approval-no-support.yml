name: "!!! AAA CURRENT - TAIRID v4.388 human guarded covariance subblock approval no support"

on:
  workflow_dispatch:

jobs:
  run-v4-388-human-guarded-covariance-subblock-approval-no-support:
    name: "!!! AAA CURRENT - Run v4.388 guarded covariance subblock approval"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.387 output ZIP and human-filled guarded choice ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.387 output ZIP..."
          INPUT_387_ZIP="$(ls tairid-v4-387-observed-row-order-validation-no-scoring-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_387_ZIP" ]; then
            echo "Could not find v4.387 output ZIP."
            echo "Expected:"
            echo "tairid-v4-387-observed-row-order-validation-no-scoring-no-support-output.zip"
            exit 1
          fi

          echo "Finding human-filled v4.387 guarded choice ZIP..."
          HUMAN_FILLED_GUARDED_CHOICE_ZIP="$(ls tairid-v4-387-human-filled-guarded-covariance-subblock-choice-for-v4-388-no-scoring-no-support*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_GUARDED_CHOICE_ZIP" ]; then
            echo "Could not find human-filled guarded choice ZIP."
            echo "Expected:"
            echo "tairid-v4-387-human-filled-guarded-covariance-subblock-choice-for-v4-388-no-scoring-no-support.zip"
            exit 1
          fi

          echo "Using v4.387 ZIP:"
          echo "$INPUT_387_ZIP"

          echo "Using human-filled choice ZIP:"
          echo "$HUMAN_FILLED_GUARDED_CHOICE_ZIP"

          echo "INPUT_387_ZIP=$INPUT_387_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_GUARDED_CHOICE_ZIP=$HUMAN_FILLED_GUARDED_CHOICE_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.388 guarded subblock approval script
        run: |
          cat > run_v4_388_human_guarded_covariance_subblock_approval_no_support.py <<'PY'
          #!/usr/bin/env python3
          
          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd
          
          CLAIM_BOUNDARY = "human guarded covariance subblock approval only; one row-order-passed candidate subblock may be approved for a later full-covariance chi-square dry run; no chi-square computed now; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"
          
          ALLOWED_CHOICE_DECISIONS = {
              "approve_one_guarded_covariance_subblock_for_full_covariance_chisq_dry_run",
              "keep_as_comparison_only",
              "reject_subblock",
              "keep_blocked",
          }
          
          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)
          
              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass
          
              return tmp
          
          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]
          
          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]
          
          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()
          
          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()
          
          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()
          
          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False
          
          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()
          
          def main():
              input_387 = Path(os.environ["INPUT_387_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_GUARDED_CHOICE_ZIP"])
          
              outdir = Path("tairid_v4_388_human_guarded_covariance_subblock_approval_no_scoring_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)
          
              base387 = extract_zip(input_387, "tairid_v4_388_387_")
              basehuman = extract_zip(human_zip, "tairid_v4_388_human_")
          
              summary387_path = find_one(base387, "v4_387_summary.json")
              row_order_ledger_path = find_one(base387, "v4_387_observed_row_order_validation_ledger_NO_SCORING_NO_SUPPORT.csv")
              passed_subblocks_path = find_one(base387, "v4_387_PASSED_row_order_subblocks_FOR_HUMAN_CHOICE_NO_SCORING.csv")
              failed_subblocks_path = find_one(base387, "v4_387_failed_row_order_subblocks.csv")
              detail_rows_path = find_one(base387, "v4_387_observed_row_order_validation_detail_rows_NO_SCORING_NO_SUPPORT.csv")
              subblock_values_path = find_one(base387, "v4_387_input_v4_386_subblock_values_preserved.csv")
              blank_choice_path = find_one(base387, "v4_387_HUMAN_FILL_guarded_covariance_subblock_choice_NO_SCORING_NO_SUPPORT.csv")
              validation_summary_path = find_one(base387, "v4_387_row_order_validation_summary_NO_SCORING_NO_SUPPORT.csv")
              route_status_path = find_one(base387, "v4_387_route_status_summary.csv")
              limitations387_path = find_one(base387, "v4_387_limitations_after_row_order_validation.csv")
              gap387_path = find_one(base387, "v4_387_gap_status_after_row_order_validation.csv")
              integrity_input_path = find_one(base387, "v4_387_input_v4_386_passed_integrity_subblocks_preserved.csv")
              rules387_path = find_one(base387, "v4_387_rule_checks.csv")
          
              human_choice_path = find_one_suffix(basehuman, "HUMAN_FILLED_guarded_covariance_subblock_choice_NO_SCORING_NO_SUPPORT.csv")
          
              summary387 = json.loads(summary387_path.read_text())
              row_order_ledger = pd.read_csv(row_order_ledger_path)
              passed_subblocks = pd.read_csv(passed_subblocks_path)
              failed_subblocks = pd.read_csv(failed_subblocks_path)
              detail_rows = pd.read_csv(detail_rows_path)
              subblock_values = pd.read_csv(subblock_values_path)
              blank_choice = pd.read_csv(blank_choice_path)
              validation_summary = pd.read_csv(validation_summary_path)
              route_status = pd.read_csv(route_status_path)
              limitations387 = pd.read_csv(limitations387_path)
              gap387 = pd.read_csv(gap387_path)
              integrity_input = pd.read_csv(integrity_input_path)
              rules387 = pd.read_csv(rules387_path)
              human_choice = pd.read_csv(human_choice_path)
          
              for col in [
                  "human_guarded_subblock_choice_decision",
                  "human_guarded_subblock_choice_note",
                  "guarded_covariance_subblock_approved_now",
                  "full_covariance_chisq_allowed_next",
              ]:
                  if col not in human_choice.columns:
                      human_choice[col] = ""
          
              ingest_rows = []
          
              for _, row in human_choice.iterrows():
                  decision = clean(row["human_guarded_subblock_choice_decision"])
                  approved = decision == "approve_one_guarded_covariance_subblock_for_full_covariance_chisq_dry_run"
                  comparison = decision == "keep_as_comparison_only"
          
                  if approved:
                      row_status = "approved_for_later_full_covariance_chisq_dry_run_no_scoring_now"
                  elif comparison:
                      row_status = "kept_as_comparison_only_not_selected_for_first_dry_run"
                  elif decision == "reject_subblock":
                      row_status = "rejected_guarded_covariance_subblock"
                  elif decision == "keep_blocked":
                      row_status = "kept_blocked_no_scoring"
                  else:
                      row_status = "invalid_or_missing_guarded_subblock_choice_decision"
          
                  ingest_rows.append({
                      "v4_388_guarded_choice_id": f"v4_388_guarded_choice_{len(ingest_rows)+1:03d}",
                      "v4_387_row_order_validation_id": clean(row["v4_387_row_order_validation_id"]),
                      "v4_386_integrity_id": clean(row["v4_386_integrity_id"]),
                      "v4_385_extraction_id": clean(row["v4_385_extraction_id"]),
                      "selected_member_name": clean(row["selected_member_name"]),
                      "candidate_observable_family_from_filename": clean(row["candidate_observable_family_from_filename"]),
                      "candidate_consensus_family_from_filename": clean(row["candidate_consensus_family_from_filename"]),
                      "expected_redshift_order": clean(row["expected_redshift_order"]),
                      "candidate_row_redshift_order": clean(row["candidate_row_redshift_order"]),
                      "candidate_col_redshift_order": clean(row["candidate_col_redshift_order"]),
                      "expected_observed_row_ids": clean(row["expected_observed_row_ids"]),
                      "candidate_row_observed_id_order": clean(row["candidate_row_observed_id_order"]),
                      "candidate_col_observed_id_order": clean(row["candidate_col_observed_id_order"]),
                      "candidate_subblock_value_rows": int(float(row["candidate_subblock_value_rows"])),
                      "observed_row_order_validation_passed": clean(row["observed_row_order_validation_passed"]).lower() in ["true", "1", "yes"],
                      "observed_row_order_matched": clean(row["observed_row_order_matched"]).lower() in ["true", "1", "yes"],
                      "covariance_subblock_extracted": clean(row["covariance_subblock_extracted"]).lower() in ["true", "1", "yes"],
                      "candidate_subblock_values_available_for_later_scoring_gate": clean(row["candidate_subblock_values_available_for_later_scoring_gate"]).lower() in ["true", "1", "yes"],
                      "human_guarded_subblock_choice_decision": decision,
                      "human_guarded_subblock_choice_note": clean(row["human_guarded_subblock_choice_note"]),
                      "row_choice_status": row_status,
                      "guarded_covariance_subblock_approved_for_later_chisq_dry_run": bool(approved),
                      "kept_as_comparison_only": bool(comparison),
                      "full_covariance_chisq_allowed_next": bool(approved),
                      "chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })
          
              choice_ingest = pd.DataFrame(ingest_rows)
          
              approved_choice = choice_ingest[
                  choice_ingest["guarded_covariance_subblock_approved_for_later_chisq_dry_run"].astype(bool)
              ].copy()
              comparison_choice = choice_ingest[
                  choice_ingest["kept_as_comparison_only"].astype(bool)
              ].copy()
              rejected_choice = choice_ingest[choice_ingest["row_choice_status"] == "rejected_guarded_covariance_subblock"].copy()
              blocked_choice = choice_ingest[choice_ingest["row_choice_status"] == "kept_blocked_no_scoring"].copy()
              invalid_rows = choice_ingest[choice_ingest["row_choice_status"] == "invalid_or_missing_guarded_subblock_choice_decision"].copy()
          
              approved_member_names = set(approved_choice["selected_member_name"].astype(str).tolist())
              comparison_member_names = set(comparison_choice["selected_member_name"].astype(str).tolist())
          
              approved_values = subblock_values[
                  subblock_values["selected_member_name"].astype(str).isin(approved_member_names)
              ].copy()
              comparison_values = subblock_values[
                  subblock_values["selected_member_name"].astype(str).isin(comparison_member_names)
              ].copy()
          
              approved_detail_rows = detail_rows[
                  detail_rows["selected_member_name"].astype(str).isin(approved_member_names)
              ].copy()
          
              dry_run_packet = approved_choice.copy()
              dry_run_packet["next_gate"] = "v4_389_full_covariance_chi_square_dry_run_no_support_claims"
              dry_run_packet["dry_run_scope"] = "compute_full_covariance_chi_square_from_one_guarded_3x3_fsigma8_subblock_no_support_claim"
              dry_run_packet["approved_subblock_value_rows_available"] = len(approved_values)
              dry_run_packet["approved_detail_rows_available"] = len(approved_detail_rows)
              dry_run_packet["selected_covariance_subblock_member"] = dry_run_packet["selected_member_name"]
              dry_run_packet["chi_square_allowed_next"] = True
              dry_run_packet["likelihood_allowed_next"] = False
              dry_run_packet["p_values_allowed_next"] = False
              dry_run_packet["score_valid"] = False
              dry_run_packet["support_allowed"] = False
          
              audit_staging_packet = pd.DataFrame([
                  {
                      "audit_item_id": "V4_388_AUDIT_STAGE_001",
                      "item": "One guarded covariance subblock selected for full-covariance chi-square dry run.",
                      "status": "ready_for_v4_389_dry_run",
                      "allowed_next": "chi_square_dry_run_only",
                      "support_allowed": False,
                  },
                  {
                      "audit_item_id": "V4_388_AUDIT_STAGE_002",
                      "item": "Comparison covariance subblock preserved but not selected.",
                      "status": "comparison_only",
                      "allowed_next": "not_used_in_first_dry_run",
                      "support_allowed": False,
                  },
                  {
                      "audit_item_id": "V4_388_AUDIT_STAGE_003",
                      "item": "No likelihood, p-values, score validation, or support claim allowed.",
                      "status": "truth_boundary_active",
                      "allowed_next": "external_audit_after_dry_run",
                      "support_allowed": False,
                  },
              ])
          
              choice_summary = pd.DataFrame([
                  {"summary_metric": "human_choice_rows", "value": int(len(choice_ingest)), "note": "Human guarded covariance subblock choice rows ingested."},
                  {"summary_metric": "approved_guarded_subblock_rows", "value": int(len(approved_choice)), "note": "Exactly one subblock approved for the next chi-square dry run."},
                  {"summary_metric": "comparison_only_subblock_rows", "value": int(len(comparison_choice)), "note": "Comparison/fallback subblocks preserved but not used in the first dry run."},
                  {"summary_metric": "approved_subblock_value_rows", "value": int(len(approved_values)), "note": "Nine 3x3 value rows available for the approved subblock."},
                  {"summary_metric": "comparison_subblock_value_rows", "value": int(len(comparison_values)), "note": "Nine 3x3 value rows preserved for the comparison subblock."},
                  {"summary_metric": "chi_square_computed", "value": 0, "note": "No chi-square computed in v4.388."},
                  {"summary_metric": "score_valid", "value": 0, "note": "No valid score in v4.388."},
                  {"summary_metric": "support_allowed", "value": 0, "note": "No support claim is allowed."},
              ])
          
              route_status_388 = pd.DataFrame([
                  {"status_id": "V4_388_STATUS_001", "status": "guarded_subblock_choice_ingested", "detail": "One guarded final-consensus covariance subblock selected for later full-covariance chi-square dry run."},
                  {"status_id": "V4_388_STATUS_002", "status": "comparison_subblock_preserved", "detail": "The alternate final-consensus covariance subblock remains comparison-only."},
                  {"status_id": "V4_388_STATUS_003", "status": "no_scoring_performed", "detail": "v4.388 approves the next dry-run input only; it computes no chi-square."},
                  {"status_id": "V4_388_STATUS_004", "status": "support_still_blocked", "detail": "support_allowed=false remains active."},
              ])
          
              limitation_update = pd.DataFrame([
                  {"limit_id": "V4_388_LIMIT_001", "limit": "Human approval here allows a later chi-square dry run only.", "status": "active_limit"},
                  {"limit_id": "V4_388_LIMIT_002", "limit": "Only one guarded covariance subblock is selected for the first dry run.", "status": "active_limit"},
                  {"limit_id": "V4_388_LIMIT_003", "limit": "No chi-square, likelihood, or p-values are computed in v4.388.", "status": "blocked_by_design"},
                  {"limit_id": "V4_388_LIMIT_004", "limit": "score_valid remains false.", "status": "blocked_by_design"},
                  {"limit_id": "V4_388_LIMIT_005", "limit": "No support claim is allowed.", "status": "blocked_by_design"},
              ])
          
              gap_update = pd.DataFrame([
                  {"gap_id": "V4_388_GAP_001", "gap": "One guarded covariance subblock selected.", "status_after_v4_388": "ready_for_full_covariance_chisq_dry_run_no_support", "next_gate": "v4_389_full_covariance_chi_square_dry_run_no_support"},
                  {"gap_id": "V4_388_GAP_002", "gap": "Full-covariance chi-square remains uncomputed.", "status_after_v4_388": "still_open_until_v4_389", "next_gate": "v4_389_dry_run"},
                  {"gap_id": "V4_388_GAP_003", "gap": "Likelihood and p-values remain blocked.", "status_after_v4_388": "still_blocked", "next_gate": "not_in_v4_389_unless_explicitly_added_later"},
                  {"gap_id": "V4_388_GAP_004", "gap": "External audit remains pending.", "status_after_v4_388": "still_open", "next_gate": "v4_390_after_dry_run"},
                  {"gap_id": "V4_388_GAP_005", "gap": "Support claims remain blocked.", "status_after_v4_388": "still_blocked", "next_gate": "no_support_claims_allowed_from_v4_388"},
              ])
          
              hard_checks = {
                  "input_v4_387_summary_found": summary387.get("version") == "v4.387",
                  "input_v4_387_rules_all_passed": summary_rules_all_passed(summary387),
                  "input_v4_387_failed_gates_none": summary387.get("failed_gates") == "none",
                  "input_v4_387_row_order_rows_2": summary387.get("row_order_validation_rows") == 2,
                  "input_v4_387_passed_subblocks_2": summary387.get("row_order_passed_subblocks") == 2,
                  "input_v4_387_failed_subblocks_0": summary387.get("row_order_failed_subblocks") == 0,
                  "input_v4_387_detail_rows_18": summary387.get("row_order_detail_rows") == 18,
                  "input_v4_387_human_choice_rows_2": summary387.get("human_choice_packet_rows") == 2,
                  "input_v4_387_observed_row_order_matched": summary387.get("observed_row_order_matched") is True,
                  "input_v4_387_subblock_extracted": summary387.get("covariance_subblock_extracted") is True,
                  "input_v4_387_no_chisq": summary387.get("chi_square_computed") is False,
                  "input_v4_387_no_likelihood": summary387.get("likelihood_computed") is False,
                  "input_v4_387_no_p_values": summary387.get("p_values_computed") is False,
                  "input_v4_387_no_score_valid": summary387.get("score_valid") is False,
                  "input_v4_387_no_support_allowed": summary387.get("support_allowed") is False,
          
                  "rules387_all_passed": passed_column_all(rules387),
                  "row_order_ledger_rows_equal_2": len(row_order_ledger) == 2,
                  "passed_subblocks_rows_equal_2": len(passed_subblocks) == 2,
                  "failed_subblocks_rows_equal_0": len(failed_subblocks) == 0,
                  "detail_rows_equal_18": len(detail_rows) == 18,
                  "subblock_values_rows_equal_18": len(subblock_values) == 18,
                  "blank_choice_rows_equal_2": len(blank_choice) == 2,
                  "validation_summary_rows_equal_8": len(validation_summary) == 8,
                  "route_status_rows_equal_4": len(route_status) == 4,
                  "limitations387_rows_equal_5": len(limitations387) == 5,
                  "gap387_rows_equal_5": len(gap387) == 5,
                  "integrity_input_rows_equal_2": len(integrity_input) == 2,
          
                  "human_choice_rows_equal_2": len(human_choice) == 2,
                  "human_decisions_filled": human_choice["human_guarded_subblock_choice_decision"].apply(clean).ne("").all(),
                  "human_decisions_allowed": human_choice["human_guarded_subblock_choice_decision"].apply(clean).isin(ALLOWED_CHOICE_DECISIONS).all(),
                  "choice_ingest_rows_equal_human_choice": len(choice_ingest) == len(human_choice),
                  "approved_choice_rows_equal_1": len(approved_choice) == 1,
                  "comparison_choice_rows_equal_1": len(comparison_choice) == 1,
                  "rejected_choice_rows_equal_0": len(rejected_choice) == 0,
                  "blocked_choice_rows_equal_0": len(blocked_choice) == 0,
                  "invalid_rows_equal_0": len(invalid_rows) == 0,
                  "approved_choice_is_dM_Hz_fsig": (approved_choice["candidate_observable_family_from_filename"] == "dM_Hz_fsig").all() if len(approved_choice) else False,
                  "comparison_choice_is_dV_FAP_fsig": (comparison_choice["candidate_observable_family_from_filename"] == "dV_FAP_fsig").all() if len(comparison_choice) else False,
                  "approved_values_rows_equal_9": len(approved_values) == 9,
                  "comparison_values_rows_equal_9": len(comparison_values) == 9,
                  "approved_detail_rows_equal_9": len(approved_detail_rows) == 9,
                  "dry_run_packet_rows_equal_1": len(dry_run_packet) == 1,
                  "audit_staging_packet_rows_equal_3": len(audit_staging_packet) == 3,
                  "choice_summary_rows_equal_8": len(choice_summary) == 8,
                  "route_status_388_rows_equal_4": len(route_status_388) == 4,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,
          
                  "full_covariance_chisq_allowed_next_only_for_approved": bool(dry_run_packet["chi_square_allowed_next"].iloc[0]) if len(dry_run_packet) else False,
                  "no_chi_square_computed": false_col(choice_ingest, "chi_square_computed"),
                  "no_likelihood_computed": false_col(choice_ingest, "likelihood_computed") and false_col(dry_run_packet, "likelihood_allowed_next"),
                  "no_p_values_computed": false_col(choice_ingest, "p_values_computed") and false_col(dry_run_packet, "p_values_allowed_next"),
                  "no_score_valid": false_col(choice_ingest, "score_valid") and false_col(dry_run_packet, "score_valid"),
                  "no_support_allowed": false_col(choice_ingest, "support_allowed") and false_col(dry_run_packet, "support_allowed") and false_col(audit_staging_packet, "support_allowed"),
              }
          
              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()
          
              summary388 = {
                  "version": "v4.388",
                  "route_name": "v4_388_human_guarded_covariance_subblock_approval_no_scoring_no_support_claims",
                  "expected_result": "v4_388_human_guarded_covariance_subblock_approval_passed_one_subblock_selected_no_scoring_no_support_claims",
                  "input_version": "v4.387",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "human_choice_rows": int(len(choice_ingest)),
                  "approved_guarded_subblock_rows": int(len(approved_choice)),
                  "comparison_only_subblock_rows": int(len(comparison_choice)),
