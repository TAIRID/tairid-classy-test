name: 001 TAIRID v4.255 - Zhao Covariance Policy Review Manual Extraction Handoff

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-255-zhao-covariance-policy-review-manual-extraction-handoff.yml"
      - "data/cosmology/qso_literature_extraction_manifest.csv"
      - "qso_literature_extraction_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-covariance-policy-review-manual-extraction-handoff:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.255 Zhao Covariance Policy Review Manual Extraction Handoff is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.255 Zhao covariance policy review manual extraction handoff
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import zipfile

          VERSION = "v4.255"
          ROUTE = "zhao_covariance_policy_review_or_manual_extraction_handoff_after_v4_254"
          EXPECTED_RESULT = "v4_255_zhao_covariance_policy_review_manual_extraction_handoff_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_256_manual_zhao_table_extraction_fill_packet_or_handoff"

          OUT = Path("tairid_v4_255_zhao_covariance_policy_review_manual_extraction_handoff_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-255-zhao-covariance-policy-review-manual-extraction-handoff-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          EXTRACTION_MANIFEST_CANDIDATES = [
              Path("data/cosmology/qso_literature_extraction_manifest.csv"),
              Path("qso_literature_extraction_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_EXTRACTION_COLUMNS = [
              "extraction_id",
              "candidate_id",
              "paper_or_source_url",
              "measurement_label",
              "redshift",
              "observable",
              "observed_value",
              "uncertainty_or_covariance_reference",
              "data_vector_reference",
              "source_role",
              "provenance_status",
              "extraction_status",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          inherited_v4_254_rows = [
              {
                  "inherited_from": "v4.254",
                  "item": "rules",
                  "value": "39 / 39 passed",
                  "meaning": "Zhao Tomographic Table Extraction Guard passed.",
                  "carry_forward_status": "ready_for_covariance_policy_review",
              },
              {
                  "inherited_from": "v4.254",
                  "item": "source_probe_rows",
                  "value": 3,
                  "meaning": "Zhao abstract, e-print, and PDF routes were probed.",
                  "carry_forward_status": "source_access_confirmed",
              },
              {
                  "inherited_from": "v4.254",
                  "item": "eprint_file_rows",
                  "value": 7,
                  "meaning": "The arXiv source archive exposed TeX/table files.",
                  "carry_forward_status": "manual_table_review_possible",
              },
              {
                  "inherited_from": "v4.254",
                  "item": "keyword_window_rows",
                  "value": 100,
                  "meaning": "Keyword windows were written for review.",
                  "carry_forward_status": "review_hints_only",
              },
              {
                  "inherited_from": "v4.254",
                  "item": "numeric_window_rows",
                  "value": 45,
                  "meaning": "Numeric windows were found near Zhao redshift-bin/table text.",
                  "carry_forward_status": "candidate_hints_only",
              },
              {
                  "inherited_from": "v4.254",
                  "item": "zhao_candidate_value_rows",
                  "value": 12,
                  "meaning": "Candidate numeric rows were produced but not approved.",
                  "carry_forward_status": "manual_review_needed",
              },
              {
                  "inherited_from": "v4.254",
                  "item": "zhao_bin_status_rows",
                  "value": 4,
                  "meaning": "All four bins were represented with candidate status rows.",
                  "carry_forward_status": "four_bins_tracked",
              },
              {
                  "inherited_from": "v4.254",
                  "item": "manifest_fill_allowed",
                  "value": False,
                  "meaning": "Manifest fill stayed blocked.",
                  "carry_forward_status": "blocked",
              },
              {
                  "inherited_from": "v4.254",
                  "item": "scoring_allowed",
                  "value": False,
                  "meaning": "Scoring stayed blocked.",
                  "carry_forward_status": "blocked",
              },
              {
                  "inherited_from": "v4.254",
                  "item": "selected_next_route",
                  "value": "v4_255_zhao_covariance_policy_review_or_manual_extraction_handoff",
                  "meaning": "Current route should review covariance policy and prepare manual extraction handoff.",
                  "carry_forward_status": "current_route",
              },
          ]

          zhao_bin_review_rows = [
              {
                  "zhao_bin_id": "zhao_z_0_98",
                  "redshift": 0.98,
                  "v4_254_numeric_window_rows": 4,
                  "v4_254_candidate_value_rows": 1,
                  "review_status": "candidate_numeric_rows_found_needs_human_table_review",
                  "exact_value_status": "not_approved",
                  "manifest_fill_allowed": False,
              },
              {
                  "zhao_bin_id": "zhao_z_1_23",
                  "redshift": 1.23,
                  "v4_254_numeric_window_rows": 10,
                  "v4_254_candidate_value_rows": 5,
                  "review_status": "candidate_numeric_rows_found_needs_human_table_review",
                  "exact_value_status": "not_approved",
                  "manifest_fill_allowed": False,
              },
              {
                  "zhao_bin_id": "zhao_z_1_52",
                  "redshift": 1.52,
                  "v4_254_numeric_window_rows": 20,
                  "v4_254_candidate_value_rows": 4,
                  "review_status": "candidate_numeric_rows_found_needs_human_table_review",
                  "exact_value_status": "not_approved",
                  "manifest_fill_allowed": False,
              },
              {
                  "zhao_bin_id": "zhao_z_1_94",
                  "redshift": 1.94,
                  "v4_254_numeric_window_rows": 11,
                  "v4_254_candidate_value_rows": 2,
                  "review_status": "candidate_numeric_rows_found_needs_human_table_review",
                  "exact_value_status": "not_approved",
                  "manifest_fill_allowed": False,
              },
          ]

          zhao_table_file_review_rows = [
              {
                  "file_name": "tables/widetable1.tex",
                  "v4_254_role": "candidate numeric source",
                  "observed_pattern": "contains four redshift-like entries and multiple measurement-like values",
                  "likely_review_need": "identify whether rows are BAO quantities, f_sigma8, or combined parameter table",
                  "approval_status": "manual_review_required",
              },
              {
                  "file_name": "tables/widetable2.tex",
                  "v4_254_role": "candidate numeric source",
                  "observed_pattern": "contains redshift-like values and geometry-like values",
                  "likely_review_need": "likely geometry/covariance support; must not be treated as f_sigma8 without table labels",
                  "approval_status": "manual_review_required",
              },
              {
                  "file_name": "tables/widetable3.tex",
                  "v4_254_role": "candidate numeric source",
                  "observed_pattern": "contains z≈1.526 and candidate value around 0.356 with uncertainty-like values",
                  "likely_review_need": "strongest f_sigma8-like candidate window, but exact table label must be confirmed",
                  "approval_status": "manual_review_required",
              },
              {
                  "file_name": "draft.tex",
                  "v4_254_role": "source context",
                  "observed_pattern": "contains discussion and references to bins, method, BAO/RSD dependency",
                  "likely_review_need": "method/provenance/dependency review",
                  "approval_status": "manual_review_required",
              },
          ]

          covariance_policy_rows = [
              {
                  "policy_id": "cov_policy_001_joint_tomographic_scoring",
                  "policy_question": "What is required to score Zhao four-bin rows jointly?",
                  "policy_answer": "full covariance matrix or full likelihood/data-vector support is required",
                  "allowed_now": False,
                  "blocked_action": "joint residual scoring from four bins without covariance",
              },
              {
                  "policy_id": "cov_policy_002_single_row_draft",
                  "policy_question": "Can a single extracted bin be carried as a draft row with a quoted uncertainty?",
                  "policy_answer": "yes, but only as extracted_not_scored and not evidence",
                  "allowed_now": True,
                  "blocked_action": "calling diagonal-only draft a holdout score",
              },
              {
                  "policy_id": "cov_policy_003_abstract_uncertainty",
                  "policy_question": "Can abstract uncertainties substitute for full covariance?",
                  "policy_answer": "not for joint scoring; only for non-scoring draft review",
                  "allowed_now": False,
                  "blocked_action": "external likelihood or validation language",
              },
              {
                  "policy_id": "cov_policy_004_dependency_flags",
                  "policy_question": "What dependency flags must be marked before manifest fill?",
                  "policy_answer": "BAO/RSD coupling, optimal redshift weights, derived quantities, same-survey family status",
                  "allowed_now": False,
                  "blocked_action": "source-surface interpretation without dependency labels",
              },
              {
                  "policy_id": "cov_policy_005_provenance",
                  "policy_question": "Can DR14 Zhao be called a full independent holdout?",
                  "policy_answer": "not yet; classify as cross-release same-survey-family candidate until provenance review passes",
                  "allowed_now": False,
                  "blocked_action": "full independent holdout label",
              },
          ]

          manual_extraction_handoff_rows = [
              {
                  "handoff_step": "step_001",
                  "manual_action": "Open tables/widetable1.tex, widetable2.tex, and widetable3.tex from the Zhao arXiv e-print source.",
                  "target": "identify table captions and column labels",
                  "done_condition": "each table file has label map: row label, redshift, observable, value, uncertainty/covariance meaning",
              },
              {
                  "handoff_step": "step_002",
                  "manual_action": "Find the exact column or row labeled f_sigma8, fσ8, growth rate, or RSD parameter.",
                  "target": "exact four-bin f_sigma8 values",
                  "done_condition": "four rows exist for z=0.98, 1.23, 1.52, 1.94 or a reason is recorded for missing rows",
              },
              {
                  "handoff_step": "step_003",
                  "manual_action": "Locate the full covariance matrix or the paper’s data/covariance support statement.",
                  "target": "joint covariance status",
                  "done_condition": "covariance path/reference is located or explicitly marked unavailable",
              },
              {
                  "handoff_step": "step_004",
                  "manual_action": "Separate BAO geometry quantities from RSD/growth quantities.",
                  "target": "source-surface dependency flags",
                  "done_condition": "each candidate row is labeled growth, geometry, mixed, derived, or support-only",
              },
              {
                  "handoff_step": "step_005",
                  "manual_action": "Decide provenance label: full holdout, partial same-family check, or support-only.",
                  "target": "provenance_status",
                  "done_condition": "DR14 vs DR16 relationship is labeled before manifest fill",
              },
              {
                  "handoff_step": "step_006",
                  "manual_action": "Only after steps 1-5, write reviewed extraction rows; do not score.",
                  "target": "qso_literature_extraction_manifest.csv",
                  "done_condition": "approval_status remains reviewed_not_scored, not approved_for_scoring",
