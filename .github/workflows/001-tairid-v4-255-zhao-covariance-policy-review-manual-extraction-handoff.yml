              {"priority": 2, "test_id": "v4_256_covariance_source_locator_retry", "purpose": "retry covariance/data-vector locator if needed", "activated": True},
              {"priority": 3, "test_id": "v4_256_external_observed_manifest_fill_after_review", "purpose": "prepare observed manifest rows only after exact values/covariance/provenance review", "activated": False},
              {"priority": 4, "test_id": "v4_256_handoff_if_needed", "purpose": "consolidate v4.203-v4.255 if thread length is risky", "activated": True},
