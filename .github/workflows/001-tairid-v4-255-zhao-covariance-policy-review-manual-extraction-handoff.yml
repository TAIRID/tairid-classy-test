              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "extraction_manifest_status_rows_at_least_1", "passed": len(extraction_manifest_status_rows) >= 1, "detail": f"extraction_manifest_status_rows = {len(extraction_manifest_status_rows)}"},
              {"gate": "permission_rows_equal_10", "passed": len(permission_rows) == 10, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_9", "passed": len(readiness_rows) == 9, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "all_zhao_bin_manifest_fill_blocked", "passed": all(row["manifest_fill_allowed"] is False for row in zhao_bin_review_rows), "detail": "all Zhao bins manifest-fill blocked"},
              {"gate": "all_manifest_templates_non_scoring", "passed": all(row["scoring_allowed"] is False and row["evidence_allowed"] is False for row in manifest_template_review_rows), "detail": "all template rows non-scoring"},
              {"gate": "exact_values_not_approved", "passed": all(row["exact_value_status"] == "not_approved" for row in zhao_bin_review_rows), "detail": "exact values not approved"},
              {"gate": "joint_scoring_requires_full_covariance", "passed": any(row["policy_id"] == "cov_policy_001_joint_tomographic_scoring" and row["allowed_now"] is False for row in covariance_policy_rows), "detail": "joint scoring blocked until full covariance"},
              {"gate": "single_row_draft_allowed_only_not_scored", "passed": any(row["policy_id"] == "cov_policy_002_single_row_draft" and row["allowed_now"] is True for row in covariance_policy_rows), "detail": "single row draft allowed after manual review only"},
              {"gate": "manual_extraction_handoff_ready", "passed": any(row["permission_scope"] == "manual_zhao_table_extraction_handoff" and row["permission_status"] == "written" for row in permission_rows), "detail": "manual extraction handoff written"},
              {"gate": "external_manifest_fill_blocked", "passed": any(row["permission_scope"] == "external_observed_manifest_fill" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external manifest fill blocked"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external observed scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO evidence blocked"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric correction fit blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "manual_fill_packet_recommended", "passed": any(row["route"] == "manual_zhao_table_extraction_fill_packet" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "manual fill packet recommended"},
              {"gate": "observed_manifest_fill_after_review_not_activated", "passed": any(row["test_id"] == "v4_256_external_observed_manifest_fill_after_review" and row["activated"] is False for row in next_rows), "detail": "observed manifest fill after review not activated"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no external observed scoring"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout approval"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_256_manual_zhao_table_extraction_fill_packet_or_handoff", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_255_zhao_covariance_policy_review_manual_extraction_handoff_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_255_inherited_v4_254_rows.csv", inherited_v4_254_rows)
          write_csv(OUT / "v4_255_zhao_bin_review_rows.csv", zhao_bin_review_rows)
          write_csv(OUT / "v4_255_zhao_table_file_review_rows.csv", zhao_table_file_review_rows)
          write_csv(OUT / "v4_255_covariance_policy_rows.csv", covariance_policy_rows)
          write_csv(OUT / "v4_255_manual_extraction_handoff_rows.csv", manual_extraction_handoff_rows)
          write_csv(OUT / "v4_255_manifest_template_review_rows.csv", manifest_template_review_rows)
          write_csv(OUT / "v4_255_decision_gate_rows.csv", decision_gate_rows)
          write_csv(OUT / "v4_255_observed_manifest_status_rows.csv", observed_manifest_status_rows)
          write_csv(OUT / "v4_255_extraction_manifest_status_rows.csv", extraction_manifest_status_rows)
          write_csv(OUT / "v4_255_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_255_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_255_failure_condition_rows.csv", failure_condition_rows)
          write_csv(OUT / "v4_255_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_255_route_decision_rows.csv", route_decision_rows)
          write_csv(OUT / "v4_255_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_255_rule_checks.csv", checks)

          manual_checklist_lines = [
              "# Zhao Manual Extraction Checklist",
              "",
              "Use this checklist before any observed manifest row is filled.",
              "",
          ]
          for row in manual_extraction_handoff_rows:
              manual_checklist_lines.extend([
                  f"## {row['handoff_step']}",
                  f"Action: {row['manual_action']}",
                  f"Target: {row['target']}",
                  f"Done condition: {row['done_condition']}",
                  "",
              ])
          manual_checklist_lines.extend([
              "Boundary: this checklist is not scoring, not validation, and not evidence approval.",
              ""
          ])
          (OUT / "v4_255_zhao_manual_extraction_checklist.md").write_text("\n".join(manual_checklist_lines), encoding="utf-8")

          bin_lines = [
              f"z={row['redshift']}: candidates={row['v4_254_candidate_value_rows']} exact={row['exact_value_status']}"
              for row in zhao_bin_review_rows
          ]

          policy_lines = [
              f"{row['policy_id']}: allowed_now={row['allowed_now']} — {row['policy_answer']}"
              for row in covariance_policy_rows
          ]

          route_lines = [
              f"{row['route']}: {row['permission_status']} — {row['reason']}"
              for row in route_decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_254_rows": len(inherited_v4_254_rows),
              "zhao_bin_review_rows": len(zhao_bin_review_rows),
              "zhao_table_file_review_rows": len(zhao_table_file_review_rows),
              "covariance_policy_rows": len(covariance_policy_rows),
              "manual_extraction_handoff_rows": len(manual_extraction_handoff_rows),
              "manifest_template_review_rows": len(manifest_template_review_rows),
              "decision_gate_rows": len(decision_gate_rows),
              "observed_manifest_status_rows": len(observed_manifest_status_rows),
              "extraction_manifest_status_rows": len(extraction_manifest_status_rows),
              "permission_rows": len(permission_rows),
              "readiness_rows": len(readiness_rows),
              "failure_condition_rows": len(failure_condition_rows),
              "decision_rows": len(decision_rows),
              "route_decision_rows": len(route_decision_rows),
              "next_rows": len(next_rows),
              "manifest_fill_allowed": False,
              "scoring_allowed": False,
              "approved_holdout_sources": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_255_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.255 Zhao Covariance Policy Review Manual Extraction Handoff",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_254_rows = {summary['inherited_v4_254_rows']}",
              f"zhao_bin_review_rows = {summary['zhao_bin_review_rows']}",
              f"zhao_table_file_review_rows = {summary['zhao_table_file_review_rows']}",
              f"covariance_policy_rows = {summary['covariance_policy_rows']}",
              f"manual_extraction_handoff_rows = {summary['manual_extraction_handoff_rows']}",
              f"manifest_template_review_rows = {summary['manifest_template_review_rows']}",
              f"decision_gate_rows = {summary['decision_gate_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"extraction_manifest_status_rows = {summary['extraction_manifest_status_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"route_decision_rows = {summary['route_decision_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"manifest_fill_allowed = {summary['manifest_fill_allowed']}",
              f"scoring_allowed = {summary['scoring_allowed']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Zhao bin review:",
              *bin_lines,
              "",
              "Covariance policy:",
              *policy_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.255 reviews the Zhao machine-extraction output and turns it into a manual extraction handoff. It allows only non-scoring draft extraction after human table confirmation, keeps joint Zhao scoring blocked until full covariance or likelihood support exists, and keeps observed manifest fill blocked.",
              "",
              "Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_255_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_254_rows = {summary['inherited_v4_254_rows']}")
          print(f"zhao_bin_review_rows = {summary['zhao_bin_review_rows']}")
          print(f"zhao_table_file_review_rows = {summary['zhao_table_file_review_rows']}")
          print(f"covariance_policy_rows = {summary['covariance_policy_rows']}")
          print(f"manual_extraction_handoff_rows = {summary['manual_extraction_handoff_rows']}")
          print(f"manifest_template_review_rows = {summary['manifest_template_review_rows']}")
          print(f"decision_gate_rows = {summary['decision_gate_rows']}")
          print(f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}")
          print(f"extraction_manifest_status_rows = {summary['extraction_manifest_status_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"readiness_rows = {summary['readiness_rows']}")
          print(f"failure_condition_rows = {summary['failure_condition_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"route_decision_rows = {summary['route_decision_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"manifest_fill_allowed = {summary['manifest_fill_allowed']}")
          print(f"scoring_allowed = {summary['scoring_allowed']}")
          print(f"approved_holdout_sources = {summary['approved_holdout_sources']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.255 Zhao covariance policy review manual extraction handoff output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-255-zhao-covariance-policy-review-manual-extraction-handoff-output
          path: |
            tairid_v4_255_zhao_covariance_policy_review_manual_extraction_handoff_output/
            tairid-v4-255-zhao-covariance-policy-review-manual-extraction-handoff-output.zip
