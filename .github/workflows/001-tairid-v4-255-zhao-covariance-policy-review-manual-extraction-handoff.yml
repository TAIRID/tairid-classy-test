              {"route_id": "route_004", "route": "numeric_correction_fit", "permission_status": "blocked", "reason": "No approved observed manifest exists."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.255 is enough history for consolidation if needed."},
