          ]

          manifest_template_review_rows = []
          for z in [0.98, 1.23, 1.52, 1.94]:
              manifest_template_review_rows.append({
                  "draft_row_id": f"zhao_manual_extract_z_{str(z).replace('.', '_')}",
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "redshift": z,
                  "observable": "f_sigma8",
                  "observed_value": "MANUAL_REVIEW_REQUIRED_NOT_GUESSED",
                  "uncertainty_or_covariance_reference": "MANUAL_REVIEW_REQUIRED",
                  "data_vector_reference": "MANUAL_REVIEW_REQUIRED",
                  "source_role": "primary_qso_growth_tomographic_literature_candidate",
                  "provenance_status": "same_survey_family_cross_release_needs_review",
                  "extraction_status": "manual_review_required",
                  "approval_status": "not_scored_not_evidence",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          decision_gate_rows = [
              {
                  "gate_id": "gate_001_exact_values",
                  "question": "Do all four Zhao f_sigma8 values have exact source-backed row labels?",
                  "current_answer": "no",
                  "result": "manifest_fill_blocked",
              },
              {
                  "gate_id": "gate_002_covariance",
                  "question": "Is the full covariance matrix or likelihood/data vector located?",
                  "current_answer": "no",
                  "result": "joint_scoring_blocked",
              },
              {
                  "gate_id": "gate_003_dependency",
                  "question": "Are BAO/RSD/derived quantity dependencies labeled?",
                  "current_answer": "no",
                  "result": "source_surface_interpretation_blocked",
              },
              {
                  "gate_id": "gate_004_provenance",
                  "question": "Is the DR14/DR16 relationship reviewed enough for holdout labeling?",
                  "current_answer": "no",
                  "result": "holdout_label_blocked",
              },
              {
                  "gate_id": "gate_005_claim_language",
                  "question": "Can this be called validation or evidence?",
                  "current_answer": "no",
                  "result": "proof_validation_language_blocked",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          extraction_manifest_status_rows, extraction_manifest_input_rows = read_manifest_status(
              EXTRACTION_MANIFEST_CANDIDATES, REQUIRED_EXTRACTION_COLUMNS, "extraction"
          )

          permission_rows = [
              {
                  "permission_scope": "zhao_covariance_policy_review",
                  "permission_status": "written",
                  "reason": "Policy rows and decision gates are written.",
              },
              {
                  "permission_scope": "manual_zhao_table_extraction_handoff",
                  "permission_status": "written",
                  "reason": "Manual checklist is ready.",
              },
              {
                  "permission_scope": "single_row_draft_extraction",
                  "permission_status": "allowed_after_manual_review_not_scored",
                  "reason": "Draft rows may be written only after exact table confirmation.",
              },
              {
                  "permission_scope": "joint_zhao_scoring",
                  "permission_status": "blocked_until_full_covariance",
                  "reason": "Four-bin joint scoring needs covariance/likelihood support.",
              },
              {
                  "permission_scope": "external_observed_manifest_fill",
                  "permission_status": "blocked",
                  "reason": "Exact values, covariance, dependency, and provenance are not reviewed.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No reviewed observed/reference join exists.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "Zhao candidate rows are not evidence.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No approved observed manifest or parameter values are ready.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
          ]

          readiness_rows = [
              {"readiness_id": "readiness_001", "requirement": "v4_254_machine_candidates", "status": "present", "blocks": "nothing"},
              {"readiness_id": "readiness_002", "requirement": "exact_zhao_values", "status": "not_approved", "blocks": "manifest fill"},
              {"readiness_id": "readiness_003", "requirement": "full_covariance_matrix", "status": "not_extracted", "blocks": "joint scoring"},
              {"readiness_id": "readiness_004", "requirement": "dependency_flags", "status": "not_reviewed", "blocks": "source-surface interpretation"},
