name: 000 TAIRID v4.198 - ADHD Autism Schizotypy Manual Numeric Delta Table With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-198-adhd-autism-schizotypy-manual-numeric-delta-table-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-198-adhd-autism-schizotypy-manual-delta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.198 ADHD autism schizotypy manual numeric delta table
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_198_outputs
          cat > tairid_v4_198_outputs/run_v4_198.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_198_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "adhd_autism_schizotypy_manual_numeric_delta_table_passed_manual_delta_artifacts_written_no_empirical_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "manual delta rows are not empirical subject data",
              "manual delta rows are not external replication",
              "TAIRID not proved"
          ]

          V4_197_STATUS = {
              "version": "v4.197",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "target_rows": 3,
              "input_rows_loaded": 0,
              "normalized_delta_rows": 0,
              "package_status": "numeric_delta_input_missing_templates_written",
              "selected_next_route": "adhd_autism_schizotypy_manual_numeric_delta_table_or_data_upload_with_scope_guards"
          }

          LOCKED_SIGNATURE = {
              "shape_signature": "++-",
              "family": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low",
              "plain": "reach high / pacing high / growth low",
              "boundary": "relational shape only; not shared cause and not unit equivalence"
          }

          MANUAL_DELTA_ROWS = [
              {
                  "lane": "ADHD",
                  "case_id": "ADHD_ds003500_selective_attention_width_over_depth",
                  "row_kind": "manual_relative_delta_not_subject_data",
                  "group_or_condition": "ADHD_relative_to_reference",
                  "boundary_or_task": "selective attention / response inhibition / width-depth task surface",
                  "propagation_reach_axis": "signal width pressure / response variability / exploration width",
                  "propagation_reach_value": "1",
                  "reference_propagation_reach_value": "0",
                  "pacing_access_axis": "gate instability / update load / switch pressure",
                  "pacing_access_value": "1",
                  "reference_pacing_access_value": "0",
                  "consolidation_growth_axis": "task depth / selective-gate stability / task viability",
                  "consolidation_growth_value": "-1",
                  "reference_consolidation_growth_value": "0",
                  "expected_shape_signature": "++-",
                  "current_anchor_kind": "directional",
                  "current_anchor": "higher width pressure, lower task depth, lower gate stability, lower viability",
                  "source_basis": "uploaded ADHD width-over-depth paper lane",
                  "truth_boundary": "manual relative sign row only; not empirical numeric delta"
              },
              {
                  "lane": "Autism",
                  "case_id": "Autism_measured_dispersion_search_correction",
                  "row_kind": "manual_relative_delta_not_subject_data",
                  "group_or_condition": "ASD_measured_dispersion_lane_relative_to_reference",
                  "boundary_or_task": "eye-tracking / movie-viewing / social-stimulus surface",
                  "propagation_reach_axis": "dispersion/search spread / gaze or route dispersion",
                  "propagation_reach_value": "1",
                  "reference_propagation_reach_value": "0",
                  "pacing_access_axis": "search friction / update load / boundary friction",
                  "pacing_access_value": "1",
                  "reference_pacing_access_value": "0",
                  "consolidation_growth_axis": "boundary compaction / stable local consolidation on this measured surface",
                  "consolidation_growth_value": "-1",
                  "reference_consolidation_growth_value": "0",
                  "expected_shape_signature": "++-",
                  "current_anchor_kind": "correction",
                  "current_anchor": "initial compact-depth prediction failed; measured lane favored dispersion/search and lower boundary compaction",
                  "source_basis": "uploaded autism reference-field organization paper lane",
                  "truth_boundary": "manual correction row only; do not force autism compact-depth or universal dispersion"
              },
              {
                  "lane": "Schizotypy",
                  "case_id": "Schizotypy_positive_reference_field_overreach",
                  "row_kind": "manual_relative_delta_not_subject_data",
                  "group_or_condition": "positive_schizotypy_overreach_relative_to_reference",
                  "boundary_or_task": "semantic/lure/anchor reference-field task",
                  "propagation_reach_axis": "semantic/reference reach / weak-lure acceptance / branch openness",
                  "propagation_reach_value": "1",
                  "reference_propagation_reach_value": "0",
                  "pacing_access_axis": "salience update / reference-switching pressure / ambiguity pull",
                  "pacing_access_value": "1",
                  "reference_pacing_access_value": "0",
                  "consolidation_growth_axis": "anchor specificity / rejection confidence / stable reality-testing output",
                  "consolidation_growth_value": "-1",
                  "reference_consolidation_growth_value": "0",
                  "expected_shape_signature": "++-",
                  "current_anchor_kind": "directional",
                  "current_anchor": "weak/false-anchor acceptance and unrelated lure acceptance mattered more than target recognition",
                  "source_basis": "uploaded schizotypal reference-field overreach paper lane",
                  "truth_boundary": "positive trait lane only; do not collapse disorganized or negative schizotypy into this row"
              }
          ]

          # Candidate file content that can be copied into data/neurotype/
          # to let v4.197 classify the manual rows. This is intentionally marked manual.
          CANDIDATE_INPUT_ROWS = []
          for row in MANUAL_DELTA_ROWS:
              CANDIDATE_INPUT_ROWS.append({
                  "lane": row["lane"],
                  "case_id": row["case_id"],
                  "group_or_condition": row["group_or_condition"],
                  "boundary_or_task": row["boundary_or_task"],
                  "propagation_reach_value": row["propagation_reach_value"],
                  "reference_propagation_reach_value": row["reference_propagation_reach_value"],
                  "pacing_access_value": row["pacing_access_value"],
                  "reference_pacing_access_value": row["reference_pacing_access_value"],
                  "consolidation_growth_value": row["consolidation_growth_value"],
                  "reference_consolidation_growth_value": row["reference_consolidation_growth_value"],
                  "source_or_dataset": row["source_basis"] + " | manual_relative_delta_not_subject_data",
                  "notes": row["truth_boundary"]
              })

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def try_float(v):
              try:
                  return float(v)
              except Exception:
                  return None

          def sign_from_delta(value, reference):
              v = try_float(value)
              r = try_float(reference)
              if v is None or r is None:
                  return ""
              delta = v - r
              if delta > 0:
                  return "+"
              if delta < 0:
                  return "-"
              return "0"

          resolved_rows = []
          for row in MANUAL_DELTA_ROWS:
              p = sign_from_delta(row["propagation_reach_value"], row["reference_propagation_reach_value"])
              t = sign_from_delta(row["pacing_access_value"], row["reference_pacing_access_value"])
              c = sign_from_delta(row["consolidation_growth_value"], row["reference_consolidation_growth_value"])
              sig = p + t + c if p and t and c else ""
              resolved = dict(row)
              resolved["resolved_propagation_sign"] = p
              resolved["resolved_pacing_sign"] = t
              resolved["resolved_consolidation_sign"] = c
              resolved["resolved_shape_signature"] = sig
              resolved["matches_locked_plus_plus_minus"] = sig == LOCKED_SIGNATURE["shape_signature"]
              resolved["match_boundary"] = "manual sign match only; not empirical confirmation"
              resolved_rows.append(resolved)

          comparison_rows = []
          for axis in [
              ("propagation", "resolved_propagation_sign"),
              ("pacing", "resolved_pacing_sign"),
              ("consolidation", "resolved_consolidation_sign")
          ]:
              signs = sorted(set(r[axis[1]] for r in resolved_rows))
              comparison_rows.append({
                  "axis": axis[0],
                  "unique_manual_signs": ";".join(signs),
                  "all_same": len(signs) == 1,
                  "plain_read": (
                      "all three manual rows are high/expanded/pressured on this axis" if signs == ["+"]
                      else "all three manual rows are low/reduced on this axis" if signs == ["-"]
                      else "mixed"
                  ),
                  "claim_boundary": "manual relational comparison only"
              })

          acquisition_plan = [
              {
                  "priority": 1,
                  "lane": "ADHD",
                  "target_file": "data/neurotype/adhd_autism_schizotypy_numeric_delta_input.csv",
                  "needed_real_numbers": "width pressure, gate instability/update load, task depth or viability, plus reference/control values",
                  "best_source": "ADHD ds003500 derivative table or ADHD paper output table",
                  "next_action": "replace manual 1/0/-1 values with real deltas"
              },
              {
                  "priority": 2,
                  "lane": "Autism",
                  "target_file": "data/neurotype/adhd_autism_schizotypy_numeric_delta_input.csv",
                  "needed_real_numbers": "dispersion/search, search friction/update load, boundary compaction/stable consolidation, plus TD/reference values",
                  "best_source": "ASD-vs-TD eye-tracking output table",
                  "next_action": "replace manual correction row with measured deltas"
              },
              {
                  "priority": 3,
                  "lane": "Schizotypy",
                  "target_file": "data/neurotype/adhd_autism_schizotypy_numeric_delta_input.csv",
                  "needed_real_numbers": "weak/unrelated lure acceptance, salience/reference switching, anchor specificity/rejection confidence, plus reference values",
                  "best_source": "schizotypy lure/anchor output table",
                  "next_action": "replace manual directional row with measured deltas"
              }
          ]

          claim_rows = [
              {
                  "claim": "The manual delta table can be fed back into v4.197.",
                  "status": "allowed with boundary",
                  "safe_wording": "It can be used to test the classification machinery, but it remains manual and not empirical.",
                  "forbidden_wording": "Feeding manual rows back into v4.197 validates the shape."
              },
              {
                  "claim": "ADHD, autism, and schizotypy are confirmed as ++-.",
                  "status": "blocked",
                  "safe_wording": "They are manual/corpus-grounded ++- targets until real numeric deltas are supplied.",
                  "forbidden_wording": "They are confirmed as the same shape."
              },
              {
                  "claim": "Autism compact-depth is resolved.",
                  "status": "blocked",
                  "safe_wording": "Only the measured dispersion/search correction lane is represented here.",
                  "forbidden_wording": "Autism is always one mode."
              },
              {
                  "claim": "Next honest step is real deltas.",
                  "status": "allowed",
                  "safe_wording": "The stronger next step is replacing manual 1/0/-1 rows with measured deltas.",
                  "forbidden_wording": "Manual deltas are enough."
              }
          ]

          row_fields = [
              "lane", "case_id", "row_kind", "group_or_condition", "boundary_or_task",
              "propagation_reach_axis", "propagation_reach_value", "reference_propagation_reach_value",
              "pacing_access_axis", "pacing_access_value", "reference_pacing_access_value",
              "consolidation_growth_axis", "consolidation_growth_value", "reference_consolidation_growth_value",
              "expected_shape_signature", "current_anchor_kind", "current_anchor", "source_basis",
              "truth_boundary", "resolved_propagation_sign", "resolved_pacing_sign",
              "resolved_consolidation_sign", "resolved_shape_signature",
              "matches_locked_plus_plus_minus", "match_boundary"
          ]

          candidate_fields = [
              "lane", "case_id", "group_or_condition", "boundary_or_task",
              "propagation_reach_value", "reference_propagation_reach_value",
              "pacing_access_value", "reference_pacing_access_value",
              "consolidation_growth_value", "reference_consolidation_growth_value",
              "source_or_dataset", "notes"
          ]

          write_csv(OUT / "v4_198_v4_197_status_review.csv", [V4_197_STATUS], list(V4_197_STATUS.keys()))
          (OUT / "v4_198_v4_197_status_review.json").write_text(json.dumps(V4_197_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_198_manual_numeric_delta_table.csv", resolved_rows, row_fields)
          write_csv(OUT / "candidate_data_neurotype_adhd_autism_schizotypy_numeric_delta_input.csv", CANDIDATE_INPUT_ROWS, candidate_fields)
          write_csv(OUT / "v4_198_manual_delta_axis_comparison.csv", comparison_rows, ["axis", "unique_manual_signs", "all_same", "plain_read", "claim_boundary"])
          write_csv(OUT / "v4_198_real_numeric_delta_acquisition_plan.csv", acquisition_plan, ["priority", "lane", "target_file", "needed_real_numbers", "best_source", "next_action"])
          write_csv(OUT / "v4_198_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          selected_next_route = "rerun_v4_197_with_manual_delta_input_or_replace_with_real_numeric_deltas_then_rerun"

          route_decision = {
              "version": "v4.198",
              "result_label": RESULT_LABEL,
              "clean_result": "v4.197 found no numeric delta input rows. v4.198 writes a manual/corpus-grounded delta table and a candidate input CSV while preserving that these are not empirical deltas.",
              "manual_delta_rows": len(MANUAL_DELTA_ROWS),
              "resolved_rows": len(resolved_rows),
              "rows_matching_locked_plus_plus_minus": sum(1 for r in resolved_rows if r["matches_locked_plus_plus_minus"]),
              "candidate_input_rows": len(CANDIDATE_INPUT_ROWS),
              "selected_next_route": selected_next_route,
              "truth_boundary": "manual delta table only; not empirical subject data, not external replication, not validation",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_198_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_198_scope_guards.json").write_text(json.dumps({
              "scope": "ADHD/autism/schizotypy manual numeric delta table and candidate input CSV",
              "manual_rows_are_subject_data": False,
              "manual_rows_are_external_replication": False,
              "manual_rows_validate_shape": False,
              "autism_compact_depth_forced": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_198_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.198 - ADHD Autism Schizotypy Manual Numeric Delta Table",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.197 passed but found no numeric delta input rows. v4.198 writes a manual/corpus-grounded delta table for ADHD, autism, and schizotypy, plus a candidate CSV that can be placed under data/neurotype for a v4.197 rerun.",
              "",
              "Manual delta rows: `" + str(len(MANUAL_DELTA_ROWS)) + "`",
              "Rows resolving to ++-: `" + str(sum(1 for r in resolved_rows if r["matches_locked_plus_plus_minus"])) + "`",
              "Candidate input rows: `" + str(len(CANDIDATE_INPUT_ROWS)) + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_198_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_198_v4_197_status_review.csv",
              "v4_198_v4_197_status_review.json",
              "v4_198_manual_numeric_delta_table.csv",
              "candidate_data_neurotype_adhd_autism_schizotypy_numeric_delta_input.csv",
              "v4_198_manual_delta_axis_comparison.csv",
              "v4_198_real_numeric_delta_acquisition_plan.csv",
              "v4_198_claim_boundary_matrix.csv",
              "v4_198_route_decision.json",
              "v4_198_scope_guards.json",
              "v4_198_blocked_claims.json",
              "v4_198_summary.md"
          ]

          rules = {
              "version_is_v4_198": True,
              "result_label_present": RESULT_LABEL.endswith("no_empirical_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_197_status_reviewed": V4_197_STATUS["rule_pass_count"] == 10,
              "manual_delta_rows_present": len(MANUAL_DELTA_ROWS) == 3,
              "all_manual_rows_resolve_to_plus_plus_minus": sum(1 for r in resolved_rows if r["matches_locked_plus_plus_minus"]) == 3,
              "candidate_input_rows_present": len(CANDIDATE_INPUT_ROWS) == 3,
              "no_empirical_validation_claim": True,
              "no_unit_equivalence_claim": True,
              "no_forced_autism_compact_depth": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.198",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "manual_delta_rows": len(MANUAL_DELTA_ROWS),
              "rows_matching_locked_plus_plus_minus": sum(1 for r in resolved_rows if r["matches_locked_plus_plus_minus"]),
              "candidate_input_rows": len(CANDIDATE_INPUT_ROWS),
              "package_status": "manual_numeric_delta_table_written_no_empirical_validation",
              "selected_next_route": selected_next_route,
              "claim_boundary": "manual_delta_table_only_no_empirical_validation"
          }

          (OUT / "v4_198_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.198 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_198_outputs/run_v4_198.py

      - name: Upload v4.198 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-198-adhd-autism-schizotypy-manual-numeric-delta-table-output
          path: tairid_v4_198_outputs/
