name: TAIRID Cosmology v3.35 Project Corpus Pressure-Lane Recovery Audit

on:
  workflow_dispatch:

jobs:
  project-corpus-pressure-lane-recovery-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install optional document parser
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pypdf

      - name: Run TAIRID v3.35 project corpus pressure-lane recovery audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_35

          python - <<'PY'
          import csv
          import json
          import os
          import re
          import zipfile
          from collections import Counter, defaultdict
          from datetime import datetime, timezone
          from pathlib import Path
          from xml.etree import ElementTree as ET

          try:
              from pypdf import PdfReader
          except Exception:
              PdfReader = None

          OUTDIR = Path("artifacts/tairid_cosmology_v3_35")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_35_project_corpus_pressure_lane_recovery_audit"

          SELF_WORKFLOW_NAME = "tairid-cosmology-v3-35-project-corpus-pressure-lane-recovery-audit.yml"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This reviews project files for reusable pressure-lane ideas, failed-test lessons, parser designs, and structural concepts.",
              "Recovered ideas are candidates only; they are not evidence.",
              "Older programming pieces are reviewed for reusable logic, not treated as working proof.",
              "No row, file, or recovered idea may become a model anchor in this workflow.",
              "A pass means the project corpus produced a pressure-lane recovery inventory for the next testing step."
          ]

          TEXT_EXTS = {
              ".txt", ".md", ".py", ".yml", ".yaml", ".json", ".csv", ".tsv",
              ".ini", ".toml", ".xml", ".html", ".htm", ".rst", ".tex", ".log"
          }

          DOC_EXTS = {".docx"}
          PDF_EXTS = {".pdf"}
          ZIP_EXTS = {".zip"}

          SKIP_DIRS = {
              ".git", ".venv", "venv", "node_modules", "__pycache__",
              "artifacts", "downloads", ".mypy_cache", ".pytest_cache"
          }

          MAX_TEXT_FILE_BYTES = 5 * 1024 * 1024
          MAX_DOCX_BYTES = 20 * 1024 * 1024
          MAX_PDF_BYTES = 30 * 1024 * 1024
          MAX_ZIP_BYTES = 80 * 1024 * 1024

          LANE_TERMS = {
              "reach_geometry_accessibility": [
                  "reach", "geometry", "propagation", "accessibility", "metric accessibility",
                  "h0", "hubble", "local ladder", "shoes", "h0licow", "time-delay",
                  "time delay", "bao", "supernova", "sn", "distance", "luminosity"
              ],
              "consolidation_growth": [
                  "consolidation", "growth", "s8", "weak lensing", "kids", "des",
                  "hsc", "structure formation", "clustering", "settles", "settled",
                  "durable clustered", "growth tension"
              ],
              "ruler_reference_calibration": [
                  "ruler", "standard ruler", "rdrag", "sound horizon", "calibration",
                  "cmb ruler", "bao ruler", "reference surface", "calibration surface"
              ],
              "density_constraint": [
                  "density", "matter fraction", "omega", "omegam", "omm", "omegamh2",
                  "constraint surface", "planck", "physical matter density"
              ],
              "regime_threshold_activation": [
                  "threshold", "regime", "activation", "transition", "phase",
                  "gate", "gating", "switch", "cross-surface", "surface separation"
              ],
              "boundary_holographic_surface": [
                  "holographic", "horizon", "event horizon", "boundary", "semipermeable",
                  "leakage", "surface encoding", "encoded on boundary", "collapse surface"
              ],
              "memory_inertia_trace": [
                  "memory", "ledger", "retained trace", "prior collapse", "prior-collapse",
                  "inertia", "history", "archive", "ghost", "memory graph", "recursion ledger"
              ],
              "parser_provenance_likelihood": [
                  "parser", "provenance", "chain", "chains", "covariance", "likelihood",
                  "posterior", "raw", "source-specific", "ingestion", "full covariance",
                  "mcmc", "cosmomc"
              ],
              "failure_guardrail_locked_closed": [
                  "failed", "rejected", "blocked", "closed", "parked", "guardrail",
                  "not validation", "no refit", "not proof", "boundary", "truth boundary"
              ],
              "program_architecture_reusable": [
                  "validator", "rail", "memory graph", "bridge engine", "gap finder",
                  "source preservation", "sdr", "ghost node", "orchestration",
                  "active memory", "pressure surface", "three-gate", "prime lock"
              ]
          }

          RECOVERY_RULES = [
              {
                  "candidate_id": "recover_reach_consolidation_split",
                  "title": "Preserve reach/consolidation as separate pressure surfaces",
                  "terms_any": ["reach", "propagation", "accessibility", "geometry"],
                  "terms_also": ["consolidation", "growth", "s8"],
                  "recommended_use": "Use as the main testing spine: reach/geometry and growth/consolidation should not be collapsed into one correction."
              },
              {
                  "candidate_id": "recover_holographic_boundary_lane",
                  "title": "Recheck holographic / boundary surface language as a pressure-localization idea",
                  "terms_any": ["holographic", "horizon", "event horizon"],
                  "terms_also": ["boundary", "surface"],
                  "recommended_use": "Use as a later interpretation/design audit, especially for why pressure may live on observational surfaces rather than in one global scalar."
              },
              {
                  "candidate_id": "recover_semipermeable_leakage_gates",
                  "title": "Recover semipermeable boundary / leakage gating",
                  "terms_any": ["semipermeable", "leakage", "leakage window"],
                  "terms_also": ["boundary", "gate", "gating"],
                  "recommended_use": "Use when designing source-specific pressure rules: some observables may pass pressure through one boundary while blocking another."
              },
              {
                  "candidate_id": "recover_memory_graph_gap_finder",
                  "title": "Reuse memory graph / bridge engine / gap finder logic as a lane-discovery tool",
                  "terms_any": ["memory graph", "bridge engine", "gap finder", "ghost node"],
                  "terms_also": ["source", "preservation", "pressure"],
                  "recommended_use": "Use as a project-management and audit tool: recover missed lanes, dead ends, and bridge candidates before refits."
              },
              {
                  "candidate_id": "recover_covariance_likelihood_rule",
                  "title": "Keep raw-chain / covariance ingestion as the truth upgrade path",
                  "terms_any": ["covariance", "likelihood", "chain", "posterior"],
                  "terms_also": ["raw", "source-specific", "ingestion"],
                  "recommended_use": "Use as the evidence standard: published anchors are provisional; chain/covariance-aware tests are the clean lane."
              },
              {
                  "candidate_id": "recover_regime_activation_cross_surface",
                  "title": "Keep regime activation as cross-surface, not SN-only",
                  "terms_any": ["threshold", "regime", "activation", "transition"],
                  "terms_also": ["surface", "cross-surface", "gate"],
                  "recommended_use": "Do not force threshold behavior into SN residuals alone; test activation across reach/growth/ruler/density roles."
              },
              {
                  "candidate_id": "recover_ruler_reference_separation",
                  "title": "Preserve ruler/reference/calibration as its own lane",
                  "terms_any": ["ruler", "rdrag", "sound horizon", "calibration"],
                  "terms_also": ["bao", "cmb", "reference"],
                  "recommended_use": "Keep BAO/CMB ruler diagnostics separate from reach pressure so the old frozen-gate mistake is not repeated."
              },
              {
                  "candidate_id": "recover_density_constraint_lane",
                  "title": "Preserve matter-density / constraint lane",
                  "terms_any": ["omegam", "omm", "omegamh2", "density"],
                  "terms_also": ["constraint", "planck", "matter"],
                  "recommended_use": "Do not mix density parameters into reach/geometry pressure without an explicit rule."
              },
              {
                  "candidate_id": "recover_failure_memory_as_data",
                  "title": "Treat failed tests as locked information, not wasted work",
                  "terms_any": ["failed", "rejected", "blocked", "closed", "parked"],
                  "terms_also": ["guardrail", "truth boundary", "not validation"],
                  "recommended_use": "Use negative results as rails: they define where the next test is not allowed to go."
              },
              {
                  "candidate_id": "recover_pressure_surface_ontology",
                  "title": "Preserve pressure surface ontology from earlier program work",
                  "terms_any": ["pressure surface", "surface", "collapse surface"],
                  "terms_also": ["role", "source", "boundary", "observable"],
                  "recommended_use": "Use for v3.36+: every pressure score should state source, role, surface, baseline, and block conditions."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def clean_text(text):
              text = text.replace("\x00", " ")
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def read_text_path(path):
              data = path.read_bytes()
              if len(data) > MAX_TEXT_FILE_BYTES:
                  return "", "text_file_too_large"
              return data.decode("utf-8", errors="replace"), ""

          def read_docx_path(path):
              if path.stat().st_size > MAX_DOCX_BYTES:
                  return "", "docx_file_too_large"

              texts = []
              try:
                  with zipfile.ZipFile(path, "r") as zf:
                      names = [
                          n for n in zf.namelist()
                          if n.startswith("word/") and n.endswith(".xml")
                      ]
                      for name in names:
                          raw = zf.read(name)
                          try:
                              root = ET.fromstring(raw)
                          except Exception:
                              continue
                          for elem in root.iter():
                              if elem.text:
                                  texts.append(elem.text)
                  return "\n".join(texts), ""
              except Exception as e:
                  return "", f"docx_read_error:{type(e).__name__}:{e}"

          def read_pdf_path(path):
              if PdfReader is None:
                  return "", "pypdf_not_available"

              if path.stat().st_size > MAX_PDF_BYTES:
                  return "", "pdf_file_too_large"

              try:
                  reader = PdfReader(str(path))
                  texts = []
                  for page in reader.pages[:20]:
                      try:
                          texts.append(page.extract_text() or "")
                      except Exception:
                          continue
                  return "\n".join(texts), ""
              except Exception as e:
                  return "", f"pdf_read_error:{type(e).__name__}:{e}"

          def read_zip_path(path):
              if path.stat().st_size > MAX_ZIP_BYTES:
                  return "", "zip_file_too_large"

              pieces = []
              try:
                  with zipfile.ZipFile(path, "r") as zf:
                      names = zf.namelist()
                      pieces.append("ZIP_MEMBERS:\n" + "\n".join(names[:500]))

                      sampled = 0
                      for name in names:
                          if sampled >= 25:
                              break
                          lower = name.lower()
                          ext = Path(lower).suffix
                          info = zf.getinfo(name)

                          if info.is_dir() or info.file_size > 512 * 1024:
                              continue

                          if ext in TEXT_EXTS:
                              try:
                                  data = zf.read(name)
                                  pieces.append(f"\n--- ZIP_TEXT_MEMBER {name} ---\n")
                                  pieces.append(data.decode("utf-8", errors="replace"))
                                  sampled += 1
                              except Exception:
                                  continue

                      return "\n".join(pieces), ""
              except Exception as e:
                  return "", f"zip_read_error:{type(e).__name__}:{e}"

          def read_project_file(path):
              ext = path.suffix.lower()

              try:
                  if path.name == SELF_WORKFLOW_NAME:
                      return "", "self_workflow_skipped"

                  if ext in TEXT_EXTS:
                      return read_text_path(path)

                  if ext in DOC_EXTS:
                      return read_docx_path(path)

                  if ext in PDF_EXTS:
                      return read_pdf_path(path)

                  if ext in ZIP_EXTS:
                      return read_zip_path(path)

                  return "", "unsupported_extension"

              except Exception as e:
                  return "", f"read_error:{type(e).__name__}:{e}"

          def iter_project_files(root):
              for dirpath, dirnames, filenames in os.walk(root):
                  dirnames[:] = [
                      d for d in dirnames
                      if d not in SKIP_DIRS and not d.startswith(".cache")
                  ]

                  for fname in filenames:
                      path = Path(dirpath) / fname
                      rel = path.relative_to(root)

                      if str(rel).startswith("artifacts/"):
                          continue

                      if path.is_symlink():
                          continue

                      yield path, rel

          def lane_hits(text):
              lower = text.lower()
              hits = {}
              for lane, terms in LANE_TERMS.items():
                  matched = []
                  for term in terms:
                      if term.lower() in lower:
                          matched.append(term)
                  if matched:
                      hits[lane] = sorted(set(matched))
              return hits

          def snippets_for_terms(text, relpath, lane, terms, max_snips=3):
              out = []
              lower = text.lower()

              for term in terms[:8]:
                  t = term.lower()
                  start = 0
                  found_count = 0

                  while found_count < max_snips:
                      idx = lower.find(t, start)
                      if idx < 0:
                          break

                      s = max(0, idx - 180)
                      e = min(len(text), idx + len(term) + 180)
                      snippet = clean_text(text[s:e])

                      out.append({
                          "file": str(relpath),
                          "lane": lane,
                          "term": term,
                          "snippet": snippet[:600]
                      })

                      start = idx + len(term)
                      found_count += 1

              return out

          def rule_matches(corpus_lower, rule):
              any_ok = any(term.lower() in corpus_lower for term in rule["terms_any"])
              also_ok = any(term.lower() in corpus_lower for term in rule["terms_also"])
              return any_ok and also_ok

          def evidence_files_for_rule(file_records, rule):
              terms = [t.lower() for t in rule["terms_any"] + rule["terms_also"]]
              scored = []

              for rec in file_records:
                  text = rec.get("_text_lower", "")
                  score = sum(1 for t in terms if t in text)
                  if score > 0:
                      scored.append((score, rec["file"]))

              scored.sort(reverse=True)
              return [file for score, file in scored[:5]]

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "previous_milestone": {
                  "v3_34_status": "h0licow_parser_provenance_audit_passed_ready_for_v3_35_chain_ingestion_design",
                  "v3_35_reason_for_insert": "User requested project-file review before continuing, to recover useful prior ideas and avoid leaving pressure-specific pieces behind."
              },
              "truth_boundary": TRUTH_BOUNDARY,
              "gate_result": {}
          }

          print("TAIRID Cosmology v3.35 project corpus pressure-lane recovery audit")
          print("Truth boundary: corpus review only; no pressure score; no refit; no validation claim.")
          print()

          root = Path(".").resolve()

          file_records = []
          lane_file_rows = []
          snippet_rows = []

          total_files_seen = 0
          readable_files = 0
          unsupported_files = 0
          read_error_files = 0

          corpus_parts = []

          for path, rel in iter_project_files(root):
              total_files_seen += 1
              ext = path.suffix.lower()

              text, error = read_project_file(path)
              text = text or ""
              clean = clean_text(text)
              lower = clean.lower()

              supported = ext in TEXT_EXTS or ext in DOC_EXTS or ext in PDF_EXTS or ext in ZIP_EXTS

              if not supported:
                  unsupported_files += 1

              if error and "unsupported_extension" not in error and "self_workflow_skipped" not in error:
                  read_error_files += 1

              hits = lane_hits(clean) if clean else {}

              if clean and not error:
                  readable_files += 1
                  corpus_parts.append(clean[:200000])

              file_score = sum(len(v) for v in hits.values())
              lane_count = len(hits)

              rec = {
                  "file": str(rel),
                  "extension": ext,
                  "size_bytes": path.stat().st_size,
                  "supported": supported,
                  "read_error": error,
                  "char_count_sample": len(clean),
                  "lane_count": lane_count,
                  "term_hit_count": file_score,
                  "lanes_hit": ";".join(sorted(hits.keys())),
                  "_text_lower": lower
              }
              file_records.append(rec)

              for lane, terms in hits.items():
                  lane_file_rows.append({
                      "file": str(rel),
                      "extension": ext,
                      "lane": lane,
                      "matched_terms": ";".join(terms),
                      "matched_term_count": len(terms),
                      "file_term_hit_count": file_score
                  })

                  snippet_rows.extend(snippets_for_terms(clean, rel, lane, terms, max_snips=2))

          corpus_lower = "\n".join(corpus_parts).lower()

          # Build recovered idea candidates.
          idea_rows = []

          for rule in RECOVERY_RULES:
              matched = rule_matches(corpus_lower, rule)
              evidence_files = evidence_files_for_rule(file_records, rule) if matched else []

              idea_rows.append({
                  "candidate_id": rule["candidate_id"],
                  "title": rule["title"],
                  "matched": matched,
                  "evidence_file_count": len(evidence_files),
                  "evidence_files": ";".join(evidence_files),
                  "recommended_use": rule["recommended_use"],
                  "candidate_status": "carry_forward_for_pressure_testing" if matched else "not_found_in_current_scan",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              })

          lane_counter = Counter()
          term_counter = Counter()

          for row in lane_file_rows:
              lane_counter[row["lane"]] += 1
              for term in row["matched_terms"].split(";"):
                  if term:
                      term_counter[term] += 1

          lane_summary_rows = []
          for lane, count in sorted(lane_counter.items()):
              top_files = [
                  r["file"] for r in sorted(
                      [r for r in lane_file_rows if r["lane"] == lane],
                      key=lambda x: x["matched_term_count"],
                      reverse=True
                  )[:8]
              ]
              lane_summary_rows.append({
                  "lane": lane,
                  "file_count": count,
                  "top_files": ";".join(top_files),
                  "candidate_use": {
                      "reach_geometry_accessibility": "Map observable reach lanes and local/metric accessibility pressure.",
                      "consolidation_growth": "Preserve growth/S8/structure as separate consolidation pressure.",
                      "ruler_reference_calibration": "Prevent ruler products from being misused as reach corrections.",
                      "density_constraint": "Keep matter-density rows separate from geometry/reach.",
                      "regime_threshold_activation": "Test activation across surfaces, not as SN-only threshold.",
                      "boundary_holographic_surface": "Carry boundary/holographic language as later surface-localization audit.",
                      "memory_inertia_trace": "Use prior-collapse/memory logic to track retained history and inertia.",
                      "parser_provenance_likelihood": "Upgrade toward source-specific chain/covariance ingestion.",
                      "failure_guardrail_locked_closed": "Preserve negative results as locked rails.",
                      "program_architecture_reusable": "Recover validator/program ideas as audit tools, not proof."
                  }.get(lane, "")
              })

          # Write outputs.
          file_csv = OUTDIR / "project_file_inventory_v3_35.csv"
          file_fields = [
              "file", "extension", "size_bytes", "supported", "read_error",
              "char_count_sample", "lane_count", "term_hit_count", "lanes_hit"
          ]
          with file_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=file_fields)
              writer.writeheader()
              for row in file_records:
                  writer.writerow({k: row.get(k, "") for k in file_fields})

          lane_csv = OUTDIR / "pressure_lane_file_hits_v3_35.csv"
          lane_fields = [
              "file", "extension", "lane", "matched_terms",
              "matched_term_count", "file_term_hit_count"
          ]
          with lane_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=lane_fields)
              writer.writeheader()
              for row in lane_file_rows:
                  writer.writerow(row)

          lane_summary_csv = OUTDIR / "pressure_lane_summary_v3_35.csv"
          lane_summary_fields = ["lane", "file_count", "top_files", "candidate_use"]
          with lane_summary_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=lane_summary_fields)
              writer.writeheader()
              for row in lane_summary_rows:
                  writer.writerow(row)

          idea_csv = OUTDIR / "recovered_idea_candidates_v3_35.csv"
          idea_fields = [
              "candidate_id", "title", "matched", "evidence_file_count",
              "evidence_files", "recommended_use", "candidate_status",
              "model_anchor_allowed_now", "refit_allowed_now"
          ]
          with idea_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=idea_fields)
              writer.writeheader()
              for row in idea_rows:
                  writer.writerow(row)

          snippet_csv = OUTDIR / "pressure_lane_snippets_v3_35.csv"
          snippet_fields = ["file", "lane", "term", "snippet"]
          with snippet_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=snippet_fields)
              writer.writeheader()
              for row in snippet_rows[:1500]:
                  writer.writerow(row)

          matched_ideas = [r for r in idea_rows if r["matched"] is True]
          matched_lanes = sorted(lane_counter.keys())

          key_lane_requirements = {
              "reach_geometry_accessibility",
              "consolidation_growth",
              "parser_provenance_likelihood",
              "failure_guardrail_locked_closed"
          }

          optional_deep_requirements = {
              "boundary_holographic_surface",
              "memory_inertia_trace",
              "regime_threshold_activation",
              "ruler_reference_calibration",
              "density_constraint"
          }

          failed_gates = []

          if readable_files < 3:
              failed_gates.append("too_few_readable_project_files")

          if len(matched_lanes) < 4:
              failed_gates.append("too_few_pressure_lanes_recovered")

          if not key_lane_requirements.issubset(set(matched_lanes)):
              failed_gates.append("key_pressure_lane_requirements_missing")

          if len(matched_ideas) < 4:
              failed_gates.append("too_few_recovered_idea_candidates")

          if len(optional_deep_requirements.intersection(set(matched_lanes))) < 2:
              failed_gates.append("deep_structure_lanes_underrepresented")

          if failed_gates:
              readiness_label = "project_corpus_pressure_lane_recovery_needs_followup"
          else:
              readiness_label = "project_corpus_pressure_lane_recovery_passed_ready_for_pressure_specific_next_test"

          next_step = (
              "Build v3.36 pressure-lane integration checkpoint, then resume H0LiCOW chain ingestion design with recovered project ideas carried as a checklist."
              if not failed_gates
              else "Inspect recovered project-file outputs and add missing files or explicit corpus folders before continuing pressure-specific tests."
          )

          audit_rows = [
              {
                  "audit_gate": "project_files_scanned",
                  "pass": total_files_seen > 0,
                  "value": total_files_seen,
                  "boundary": "Repository files must be scanned."
              },
              {
                  "audit_gate": "readable_project_files_found",
                  "pass": readable_files >= 3,
                  "value": readable_files,
                  "boundary": "Need enough readable project material for recovery audit."
              },
              {
                  "audit_gate": "pressure_lanes_recovered",
                  "pass": len(matched_lanes) >= 4,
                  "value": ";".join(matched_lanes),
                  "boundary": "Should recover several pressure-lane categories."
              },
              {
                  "audit_gate": "key_pressure_lanes_present",
                  "pass": key_lane_requirements.issubset(set(matched_lanes)),
                  "value": ";".join(sorted(key_lane_requirements.intersection(set(matched_lanes)))),
                  "boundary": "Reach, consolidation, provenance, and failure guardrails are required."
              },
              {
                  "audit_gate": "deep_structure_lanes_present",
                  "pass": len(optional_deep_requirements.intersection(set(matched_lanes))) >= 2,
                  "value": ";".join(sorted(optional_deep_requirements.intersection(set(matched_lanes)))),
                  "boundary": "Holographic/boundary/memory/regime/ruler/density lanes are useful recovery layers."
              },
              {
                  "audit_gate": "recovered_idea_candidates_present",
                  "pass": len(matched_ideas) >= 4,
                  "value": len(matched_ideas),
                  "boundary": "Recovered ideas are candidates only, not evidence."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No model claim is allowed from corpus review."
              },
              {
                  "audit_gate": "refit_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No refit is allowed from corpus review."
              }
          ]

          audit_csv = OUTDIR / "project_corpus_pressure_lane_recovery_audit_v3_35.csv"
          with audit_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["audit_gate", "pass", "value", "boundary"])
              writer.writeheader()
              for row in audit_rows:
                  writer.writerow(row)

          inventory.update({
              "total_files_seen": total_files_seen,
              "readable_files": readable_files,
              "unsupported_files": unsupported_files,
              "read_error_files": read_error_files,
              "matched_lane_count": len(matched_lanes),
              "matched_lanes": matched_lanes,
              "matched_idea_count": len(matched_ideas),
              "matched_ideas": [r["candidate_id"] for r in matched_ideas],
              "top_terms": term_counter.most_common(40),
              "gate_result": {
                  "failed_gates": failed_gates,
                  "readiness_label": readiness_label,
                  "total_files_seen": total_files_seen,
                  "readable_files": readable_files,
                  "matched_lane_count": len(matched_lanes),
                  "matched_lanes": matched_lanes,
                  "matched_idea_count": len(matched_ideas),
                  "matched_ideas": [r["candidate_id"] for r in matched_ideas],
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "next_allowed_step": next_step
              }
          })

          json_path = OUTDIR / "tairid_cosmology_v3_35_project_corpus_pressure_lane_recovery_audit.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.35 — Project Corpus Pressure-Lane Recovery Audit")
          md.append("")
          md.append(f"Created UTC: `{inventory['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(failed_gates) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v3.35 scans the project files to recover useful pressure-lane ideas from earlier programming, validator, math, failed-test, parser, boundary, and theory work.")
          md.append("")
          md.append("It does not test cosmology data directly. It checks whether earlier work contains reusable structure that should be carried into the next pressure-specific test.")
          md.append("")
          md.append("## Results")
          md.append("")
          md.append(f"- Total files seen: `{total_files_seen}`")
          md.append(f"- Readable files: `{readable_files}`")
          md.append(f"- Unsupported files: `{unsupported_files}`")
          md.append(f"- Read-error files: `{read_error_files}`")
          md.append(f"- Matched pressure lanes: `{len(matched_lanes)}`")
          md.append(f"- Matched recovered ideas: `{len(matched_ideas)}`")
          md.append("")
          md.append("## Recovered pressure lanes")
          md.append("")
          if lane_summary_rows:
              md.append("| Lane | File count | Candidate use |")
              md.append("|---|---:|---|")
              for row in lane_summary_rows:
                  md.append(f"| `{row['lane']}` | {row['file_count']} | {row['candidate_use']} |")
          else:
              md.append("No pressure lanes recovered.")
          md.append("")
          md.append("## Recovered idea candidates")
          md.append("")
          if matched_ideas:
              md.append("| Candidate | Use | Evidence files |")
              md.append("|---|---|---|")
              for row in matched_ideas:
                  md.append(f"| `{row['candidate_id']}` | {row['recommended_use']} | {row['evidence_files']} |")
          else:
              md.append("No recovered idea candidates matched.")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          if not failed_gates:
              md.append("The corpus review found enough reusable structure to carry forward as a checklist before the next pressure-specific test. This does not prove anything, but it reduces the chance of leaving behind useful prior work.")
          else:
              md.append("The corpus review did not recover enough material yet. The next step should be file/source follow-up, not cosmology scoring.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `project_file_inventory_v3_35.csv`")
          md.append("- `pressure_lane_file_hits_v3_35.csv`")
          md.append("- `pressure_lane_summary_v3_35.csv`")
          md.append("- `recovered_idea_candidates_v3_35.csv`")
          md.append("- `pressure_lane_snippets_v3_35.csv`")
          md.append("- `project_corpus_pressure_lane_recovery_audit_v3_35.csv`")
          md.append("- `tairid_cosmology_v3_35_project_corpus_pressure_lane_recovery_audit.json`")
          md.append("- `tairid_cosmology_v3_35_project_corpus_pressure_lane_recovery_audit.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_35_project_corpus_pressure_lane_recovery_audit.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

