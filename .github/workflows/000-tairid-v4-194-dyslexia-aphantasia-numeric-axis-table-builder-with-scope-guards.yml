name: 000 TAIRID v4.194 - Dyslexia Aphantasia Numeric Axis Table Builder With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-194-dyslexia-aphantasia-numeric-axis-table-builder-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-194-dyslexia-aphantasia-axis-table:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.194 dyslexia aphantasia numeric axis table builder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_194_outputs
          cat > tairid_v4_194_outputs/run_v4_194.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_194_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "dyslexia_aphantasia_numeric_axis_table_builder_passed_axis_tables_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "axis table is not validation",
              "manual numeric anchors are not external replication",
              "TAIRID not proved"
          ]

          V4_193_STATUS = {
              "version": "v4.193",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "score_rows": 10,
              "numeric_ready_direct_locked_shape_rows": 2,
              "directional_or_correction_direct_locked_shape_rows": 4,
              "top_ranked_case": "Aphantasia_visual_reconstruction_response_gap",
              "top_ranked_score_not_validation": 7.0,
              "package_status": "numeric_shape_score_preview_written_no_validation",
              "selected_next_route": "dyslexia_aphantasia_numeric_axis_table_builder_with_scope_guards"
          }

          LOCKED_SIGNATURES = {
              "++-": {
                  "family": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low",
                  "plain": "reach high / pacing high / growth low"
              },
              "-+-": {
                  "family": "LRGxELG_z0p845_like_reach_low_pacing_high_growth_low",
                  "plain": "reach low / pacing high / growth low"
              },
              "-++": {
                  "family": "QSO_z1p48_like_reach_low_pacing_high_growth_high",
                  "plain": "reach low / pacing high / growth high"
              }
          }

          # Manual/corpus-grounded numeric anchors carried forward from v4.192-v4.193.
          AXIS_ROWS = [
              {
                  "lane": "Dyslexia",
                  "case_id": "Dyslexia_ETDD70_reading_flow_viability_window",
                  "source_basis": "uploaded ETDD70 paper summary",
                  "shape_signature": "++-",
                  "locked_signature_family": LOCKED_SIGNATURES["++-"]["family"],
                  "propagation_reach_axis": "s_A / reading-flow scale expansion",
                  "propagation_reach_direction": "+",
                  "propagation_reach_numeric_anchor": "directional: s_A up",
                  "pacing_access_axis": "lambda_R / residue-load pacing pressure",
                  "pacing_access_direction": "+",
                  "pacing_access_numeric_anchor": "directional: lambda_R up",
                  "consolidation_growth_axis": "rho_R and V_data / re-entry viability",
                  "consolidation_growth_direction": "-",
                  "consolidation_growth_numeric_anchor": "directional: rho_R down and V_data down",
                  "quality_metric_1": "balanced_accuracy",
                  "quality_value_1": "0.857",
                  "quality_metric_2": "AUC",
                  "quality_value_2": "0.932",
                  "anchor_strength_not_validation": 7,
                  "truth_boundary": "one dataset and operational axes; not diagnosis or validation"
              },
              {
                  "lane": "Aphantasia",
                  "case_id": "Aphantasia_visual_reconstruction_response_gap",
                  "source_basis": "uploaded aphantasia paper summary",
                  "shape_signature": "-+-",
                  "locked_signature_family": LOCKED_SIGNATURES["-+-"]["family"],
                  "propagation_reach_axis": "internal visual simulation / visual reach",
                  "propagation_reach_direction": "-",
                  "propagation_reach_numeric_anchor": "directional: rho_R lower / visual re-entry reduced",
                  "pacing_access_axis": "lambda_R and physiology/drawing burden / mismatch pressure",
                  "pacing_access_direction": "+",
                  "pacing_access_numeric_anchor": "drawing burden d=1.013; physiology burden d=1.553",
                  "consolidation_growth_axis": "imagery/reconstruction viability",
                  "consolidation_growth_direction": "-",
                  "consolidation_growth_numeric_anchor": "directional: V lower / reconstruction viability lower",
                  "quality_metric_1": "drawing_burden_d",
                  "quality_value_1": "1.013",
                  "quality_metric_2": "physiology_burden_d",
                  "quality_value_2": "1.553",
                  "anchor_strength_not_validation": 7,
                  "truth_boundary": "manual/corpus-grounded effect sizes; shape 1 lacks actual AMT scorer-output tables"
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def sign_to_num(sign):
              return {"+": 1, "0": 0, "-": -1}.get(sign, "")

          def mean(values):
              vals = [float(v) for v in values if v not in ["", None]]
              return sum(vals) / len(vals) if vals else ""

          numeric_rows = []
          for row in AXIS_ROWS:
              p = sign_to_num(row["propagation_reach_direction"])
              t = sign_to_num(row["pacing_access_direction"])
              c = sign_to_num(row["consolidation_growth_direction"])
              q1 = float(row["quality_value_1"])
              q2 = float(row["quality_value_2"])
              if row["lane"] == "Dyslexia":
                  numeric_support_index = round((q1 + q2) / 2.0, 6)
                  support_index_kind = "mean_of_bAcc_and_AUC_not_cross_domain_unit"
              else:
                  numeric_support_index = round((q1 + q2) / 2.0, 6)
                  support_index_kind = "mean_of_effect_size_burdens_not_cross_domain_unit"
              numeric_rows.append({
                  "lane": row["lane"],
                  "case_id": row["case_id"],
                  "shape_signature": row["shape_signature"],
                  "locked_signature_family": row["locked_signature_family"],
                  "propagation_reach_numeric_sign": p,
                  "pacing_access_numeric_sign": t,
                  "consolidation_growth_numeric_sign": c,
                  "quality_metric_1": row["quality_metric_1"],
                  "quality_value_1": row["quality_value_1"],
                  "quality_metric_2": row["quality_metric_2"],
                  "quality_value_2": row["quality_value_2"],
                  "numeric_support_index_not_validation": numeric_support_index,
                  "support_index_kind": support_index_kind,
                  "anchor_strength_not_validation": row["anchor_strength_not_validation"],
                  "safe_use": "within-lane numeric anchor table only; do not compare support-index units across lanes"
              })

          # Create a compact relational comparison table.
          comparison_rows = []
          dys = next(r for r in numeric_rows if r["lane"] == "Dyslexia")
          aph = next(r for r in numeric_rows if r["lane"] == "Aphantasia")
          for axis in ["propagation_reach", "pacing_access", "consolidation_growth"]:
              comparison_rows.append({
                  "axis": axis,
                  "dyslexia_sign": dys[axis + "_numeric_sign"],
                  "aphantasia_sign": aph[axis + "_numeric_sign"],
                  "same_or_different": "same" if dys[axis + "_numeric_sign"] == aph[axis + "_numeric_sign"] else "different",
                  "plain_read": (
                      "both high / pressured" if dys[axis + "_numeric_sign"] == aph[axis + "_numeric_sign"] == 1
                      else "both low / reduced" if dys[axis + "_numeric_sign"] == aph[axis + "_numeric_sign"] == -1
                      else "opposite direction"
                  )
              })

          route_rows = [
              {
                  "priority": 1,
                  "route": "dyslexia_aphantasia_subject_level_axis_and_covariance_extraction_with_scope_guards",
                  "why": "Both lanes now have exact numeric anchors and direct locked-shape signatures, but still need subject-level or table-level axis values/covariance.",
                  "needed_next": "group means, SD/SE, subject-level rows if available, and covariance/correlation among axes"
              },
              {
                  "priority": 2,
                  "route": "adhd_autism_schizotypy_numeric_delta_acquisition_with_scope_guards",
                  "why": "These match the ++- shape directionally but lack exact numeric anchors in the current matrix.",
                  "needed_next": "width/depth/gate values, dispersion/search deltas, lure/anchor integrity measures"
              },
              {
                  "priority": 3,
                  "route": "bipolar_phase_numeric_surface_builder_with_scope_guards",
                  "why": "Bipolar needs phase-specific numeric surfaces rather than one shape row.",
                  "needed_next": "depression, mania/hypomania, euthymia, and transition rows with timing/growth/consolidation variables"
              }
          ]

          claim_rows = [
              {
                  "claim": "Dyslexia and aphantasia have the strongest current numeric anchors.",
                  "status": "allowed_as_readiness_statement",
                  "safe_wording": "They are the strongest current numeric-readiness lanes in this cross-domain shape harness.",
                  "forbidden_wording": "They validate TAIRID."
              },
              {
                  "claim": "Dyslexia and aphantasia share the same exact shape.",
                  "status": "blocked",
                  "safe_wording": "They both have high pacing/access pressure and low consolidation/viability, but their reach axis differs.",
                  "forbidden_wording": "They are the same neurotype geometry."
              },
              {
                  "claim": "The support indexes can be compared directly.",
                  "status": "blocked",
                  "safe_wording": "Support indexes are within-lane anchors only; bAcc/AUC and effect-size burdens are not the same unit.",
                  "forbidden_wording": "Aphantasia is stronger than dyslexia because its averaged number is larger."
              },
              {
                  "claim": "The next gap is covariance or subject-level extraction.",
                  "status": "allowed",
                  "safe_wording": "The next stronger test needs axis-level means, variation, and coupling/covariance.",
                  "forbidden_wording": "The current summary anchors are enough for validation."
              }
          ]

          write_csv(OUT / "v4_194_v4_193_status_review.csv", [V4_193_STATUS], list(V4_193_STATUS.keys()))
          (OUT / "v4_194_v4_193_status_review.json").write_text(json.dumps(V4_193_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_194_dyslexia_aphantasia_axis_table.csv", AXIS_ROWS, [
              "lane", "case_id", "source_basis", "shape_signature", "locked_signature_family",
              "propagation_reach_axis", "propagation_reach_direction", "propagation_reach_numeric_anchor",
              "pacing_access_axis", "pacing_access_direction", "pacing_access_numeric_anchor",
              "consolidation_growth_axis", "consolidation_growth_direction", "consolidation_growth_numeric_anchor",
              "quality_metric_1", "quality_value_1", "quality_metric_2", "quality_value_2",
              "anchor_strength_not_validation", "truth_boundary"
          ])
          write_csv(OUT / "v4_194_numeric_axis_sign_table.csv", numeric_rows, [
              "lane", "case_id", "shape_signature", "locked_signature_family",
              "propagation_reach_numeric_sign", "pacing_access_numeric_sign", "consolidation_growth_numeric_sign",
              "quality_metric_1", "quality_value_1", "quality_metric_2", "quality_value_2",
              "numeric_support_index_not_validation", "support_index_kind", "anchor_strength_not_validation", "safe_use"
          ])
          write_csv(OUT / "v4_194_dyslexia_aphantasia_axis_comparison.csv", comparison_rows, [
              "axis", "dyslexia_sign", "aphantasia_sign", "same_or_different", "plain_read"
          ])
          write_csv(OUT / "v4_194_next_numeric_routes.csv", route_rows, ["priority", "route", "why", "needed_next"])
          write_csv(OUT / "v4_194_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          selected_next_route = "dyslexia_aphantasia_subject_level_axis_and_covariance_extraction_with_scope_guards"

          route_decision = {
              "version": "v4.194",
              "result_label": RESULT_LABEL,
              "clean_result": "Dyslexia and aphantasia were converted from numeric readiness rows into explicit axis tables. This clarifies which axes match, which differ, and what stronger data is needed next.",
              "axis_rows": len(AXIS_ROWS),
              "numeric_axis_rows": len(numeric_rows),
              "same_axis_count": sum(1 for r in comparison_rows if r["same_or_different"] == "same"),
              "different_axis_count": sum(1 for r in comparison_rows if r["same_or_different"] == "different"),
              "selected_next_route": selected_next_route,
              "truth_boundary": "numeric axis table only; support indexes are within-lane anchors and not validation",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_194_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_194_scope_guards.json").write_text(json.dumps({
              "scope": "dyslexia and aphantasia numeric axis table builder only",
              "axis_table_is_validation": False,
              "support_indexes_are_cross_domain_units": False,
              "manual_anchors_are_external_replication": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_194_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.194 - Dyslexia Aphantasia Numeric Axis Table Builder",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.193 identified dyslexia and aphantasia as the two numeric-ready direct locked-shape rows. v4.194 converts them into explicit axis tables.",
              "",
              "Dyslexia shape: `++-` = reach high / pacing high / growth low.",
              "Aphantasia shape: `-+-` = reach low / pacing high / growth low.",
              "",
              "Shared axis: pacing/access high and consolidation/viability low.",
              "Different axis: propagation/reach is high in dyslexia and low in aphantasia.",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_194_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_194_v4_193_status_review.csv",
              "v4_194_v4_193_status_review.json",
              "v4_194_dyslexia_aphantasia_axis_table.csv",
              "v4_194_numeric_axis_sign_table.csv",
              "v4_194_dyslexia_aphantasia_axis_comparison.csv",
              "v4_194_next_numeric_routes.csv",
              "v4_194_claim_boundary_matrix.csv",
              "v4_194_route_decision.json",
              "v4_194_scope_guards.json",
              "v4_194_blocked_claims.json",
              "v4_194_summary.md"
          ]

          rules = {
              "version_is_v4_194": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_193_status_reviewed": V4_193_STATUS["rule_pass_count"] == 10,
              "axis_rows_present": len(AXIS_ROWS) == 2,
              "numeric_axis_rows_present": len(numeric_rows) == 2,
              "comparison_has_three_axes": len(comparison_rows) == 3,
              "next_route_selected": selected_next_route == "dyslexia_aphantasia_subject_level_axis_and_covariance_extraction_with_scope_guards",
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.194",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "axis_rows": len(AXIS_ROWS),
              "numeric_axis_rows": len(numeric_rows),
              "same_axis_count": sum(1 for r in comparison_rows if r["same_or_different"] == "same"),
              "different_axis_count": sum(1 for r in comparison_rows if r["same_or_different"] == "different"),
              "package_status": "dyslexia_aphantasia_axis_tables_written_no_validation",
              "selected_next_route": selected_next_route,
              "claim_boundary": "numeric_axis_table_only_no_validation"
          }

          (OUT / "v4_194_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.194 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_194_outputs/run_v4_194.py

      - name: Upload v4.194 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-194-dyslexia-aphantasia-numeric-axis-table-builder-output
          path: tairid_v4_194_outputs/
