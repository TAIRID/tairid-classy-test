              f"correlation_cell_rows = {summary['correlation_cell_rows']}",
              f"axis_delta_rows = {summary['axis_delta_rows']}",
              f"elg_grid_summary_rows = {summary['elg_grid_summary_rows']}",
              f"elg_grid_table_rows = {summary['elg_grid_table_rows']}",
