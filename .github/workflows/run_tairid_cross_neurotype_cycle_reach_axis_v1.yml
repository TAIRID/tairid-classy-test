name: Run TAIRID cross neurotype cycle reach axis v1

on:
  workflow_dispatch:

jobs:
  run-tairid-cross-neurotype-cycle-reach-axis-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy pandas matplotlib openpyxl

      - name: Run TAIRID cross neurotype cycle reach axis v1
        run: |
          python run_tairid_cross_neurotype_cycle_reach_axis_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cross-neurotype-cycle-reach-axis-v1-output
          path: |
            tairid_cross_neurotype_cycle_reach_axis_v1_outputs/**
