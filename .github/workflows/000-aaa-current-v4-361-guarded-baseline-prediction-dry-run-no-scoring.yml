name: "!!! AAA CURRENT - TAIRID v4.361 guarded baseline prediction dry run no scoring"

on:
  workflow_dispatch:
    inputs:
      human_approves_v4_360_guarded_prediction_dry_run:
        description: "Human explicitly approves the v4.360 guarded baseline prediction dry run? This computes predictions only, not residuals, scoring, or support."
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"

jobs:
  run-v4-361-guarded-baseline-prediction-dry-run-no-scoring:
    name: "!!! AAA CURRENT - Run v4.361 guarded prediction dry run"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      HUMAN_APPROVES_V4_360_PREDICTION_DRY_RUN: ${{ github.event.inputs.human_approves_v4_360_guarded_prediction_dry_run }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.360 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.360 output ZIP by pattern..."
          INPUT_360_ZIP="$(ls tairid-v4-360-guarded-scoring-readiness-packet-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_360_ZIP" ]; then
            echo "Could not find v4.360 output ZIP."
            echo "Expected:"
            echo "tairid-v4-360-guarded-scoring-readiness-packet-no-scoring-output.zip"
            exit 1
          fi

          echo "Using v4.360 ZIP:"
          echo "$INPUT_360_ZIP"
          echo "INPUT_360_ZIP=$INPUT_360_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.361 prediction dry run script
        run: |
          cat > run_v4_361_guarded_baseline_prediction_dry_run_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          import math
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values approved; numeric baseline approved; observed values loaded; definition/covariance guarded readiness confirmed; guarded baseline predictions may be dry-run computed here; no residuals; no chi-square; no likelihood; no p-values; no scoring; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def e_of_a(a, omega_m0):
              return math.sqrt(omega_m0 / (a ** 3) + (1.0 - omega_m0))

          def omega_m_of_z(z, omega_m0):
              zp1 = 1.0 + z
              num = omega_m0 * (zp1 ** 3)
              den = num + (1.0 - omega_m0)
              return num / den

          def growth_integrand(a, omega_m0):
              e = e_of_a(a, omega_m0)
              return 1.0 / ((a ** 3) * (e ** 3))

          def trap_integral(a_end, omega_m0, n=12000):
              a_min = 1.0e-5
              if a_end <= a_min:
                  return 0.0

              step = (a_end - a_min) / n
              total = 0.0
              prev_a = a_min
              prev_y = growth_integrand(prev_a, omega_m0)

              for i in range(1, n + 1):
                  a = a_min + i * step
                  y = growth_integrand(a, omega_m0)
                  total += 0.5 * (prev_y + y) * step
                  prev_a = a
                  prev_y = y

              return total

          def growth_d_raw(a, omega_m0):
              return 2.5 * omega_m0 * e_of_a(a, omega_m0) * trap_integral(a, omega_m0)

          def growth_d_normalized(z, omega_m0):
              a = 1.0 / (1.0 + z)
              d0 = growth_d_raw(1.0, omega_m0)
              dz = growth_d_raw(a, omega_m0)
              return dz / d0

          def main():
              input_360 = Path(os.environ["INPUT_360_ZIP"])
              human_approves = os.environ.get("HUMAN_APPROVES_V4_360_PREDICTION_DRY_RUN", "no").strip().lower()
              human_approval_recorded = human_approves == "yes"

              outdir = Path("tairid_v4_361_guarded_baseline_prediction_dry_run_no_residuals_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base360 = extract_zip(input_360, "tairid_v4_361_360_")

              summary360_path = find_one(base360, "v4_360_summary.json")
              scoring_readiness_path = find_one(base360, "v4_360_guarded_scoring_readiness_matrix_NOT_SCORING.csv")
              formula_packet_path = find_one(base360, "v4_360_guarded_prediction_formula_packet_NOT_COMPUTED.csv")
              checklist360_path = find_one(base360, "v4_360_guarded_scoring_readiness_checklist.csv")
              next_gate_path = find_one(base360, "v4_360_HUMAN_FILL_guarded_prediction_dry_run_review_NO_SCORING.csv")
              boundary360_path = find_one(base360, "v4_360_scoring_boundary_and_limitations.csv")
              gap360_path = find_one(base360, "v4_360_gap_status_after_guarded_scoring_readiness.csv")
              rules360_path = find_one(base360, "v4_360_rule_checks.csv")
              baseline_object_path = find_one(base360, "v4_360_input_v4_347_baseline_object_preserved.json")

              summary360 = json.loads(summary360_path.read_text())
              scoring_readiness = pd.read_csv(scoring_readiness_path)
              formula_packet = pd.read_csv(formula_packet_path)
              checklist360 = pd.read_csv(checklist360_path)
              next_gate = pd.read_csv(next_gate_path)
              boundary360 = pd.read_csv(boundary360_path)
              gap360 = pd.read_csv(gap360_path)
              rules360 = pd.read_csv(rules360_path)
              baseline_object = json.loads(baseline_object_path.read_text())

              omega_m0 = float(baseline_object["omega_m0"])
              sigma8_0 = float(baseline_object["sigma8_0"])
              gamma = float(baseline_object["growth_index_gamma"])

              prediction_rows = []

              for _, row in scoring_readiness.iterrows():
                  z = float(row["effective_redshift_z"])

                  if human_approval_recorded:
                      omega_z = omega_m_of_z(z, omega_m0)
                      growth_rate_f = omega_z ** gamma
                      growth_d = growth_d_normalized(z, omega_m0)
                      baseline_fsigma8 = sigma8_0 * growth_d * growth_rate_f
                      prediction_status = "baseline_prediction_dry_run_computed_no_residuals_no_scoring"
                      baseline_prediction_computed = True
                  else:
                      omega_z = ""
                      growth_rate_f = ""
                      growth_d = ""
                      baseline_fsigma8 = ""
                      prediction_status = "blocked_pending_explicit_human_prediction_dry_run_approval"
                      baseline_prediction_computed = False

                  prediction_rows.append({
                      "v4_361_prediction_dry_run_id": f"v4_361_prediction_dry_run_{len(prediction_rows)+1:03d}",
                      "v4_360_scoring_readiness_id": clean(row["v4_360_scoring_readiness_id"]),
                      "v4_357_observed_value_id": clean(row["v4_357_observed_value_id"]),

                      "survey_or_source": clean(row["survey_or_source"]),
                      "tracer_or_sample": clean(row["tracer_or_sample"]),
                      "effective_redshift_z": z,
                      "observed_fsigma8_preserved_not_scored": row["observed_fsigma8"],
                      "observed_fsigma8_uncertainty_preserved_not_scored": row["observed_fsigma8_uncertainty"],

                      "approved_omega_m0": omega_m0,
                      "approved_sigma8_0": sigma8_0,
                      "approved_growth_index_gamma": gamma,

                      "omega_m_z_dry_run": omega_z,
                      "growth_factor_D_z_dry_run": growth_d,
                      "growth_rate_f_z_dry_run": growth_rate_f,
                      "baseline_fsigma8_dry_run": baseline_fsigma8,

                      "human_prediction_dry_run_input": human_approves,
                      "human_prediction_dry_run_recorded": human_approval_recorded,
                      "prediction_status": prediction_status,
                      "baseline_prediction_computed": baseline_prediction_computed,

                      "residuals_computed": False,
                      "normalized_residuals_computed": False,
                      "chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              prediction_dry_run = pd.DataFrame(prediction_rows)
              computed_predictions = prediction_dry_run[prediction_dry_run["baseline_prediction_computed"].astype(bool)].copy()

              formula_audit = formula_packet.copy()
              formula_audit["computed_in_v4_361_if_human_yes"] = bool(human_approval_recorded)
              formula_audit["residuals_computed"] = False
              formula_audit["score_valid"] = False

              residual_boundary = pd.DataFrame([
                  {
                      "boundary_id": "V4_361_BOUNDARY_001",
                      "boundary": "Baseline fσ8 predictions may be dry-run computed, but they are not compared to observed values here.",
                      "status": "prediction_only_no_residuals",
                  },
                  {
                      "boundary_id": "V4_361_BOUNDARY_002",
                      "boundary": "Observed fσ8 values are preserved only for row identity and later gates.",
                      "status": "not_scored",
                  },
                  {
                      "boundary_id": "V4_361_BOUNDARY_003",
                      "boundary": "Residuals and normalized residuals remain uncomputed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "boundary_id": "V4_361_BOUNDARY_004",
                      "boundary": "Chi-square, likelihood, and p-values remain uncomputed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "boundary_id": "V4_361_BOUNDARY_005",
                      "boundary": "No support claim is allowed from prediction dry-run values.",
                      "status": "blocked_by_design",
                  },
              ])

              next_packet = pd.DataFrame([
                  {
                      "v4_361_next_gate_packet_id": "v4_361_next_gate_001",
                      "next_gate": "v4_362_guarded_residual_dry_run_no_chi_square_no_scoring",
                      "human_guarded_residual_dry_run_decision": "",
                      "allowed_human_guarded_residual_dry_run_decisions": "approve_later_guarded_residual_dry_run|needs_prediction_repair|needs_full_covariance_first|keep_blocked",
                      "human_guarded_residual_dry_run_note": "",
                      "residual_dry_run_approved_now": False,
                      "baseline_prediction_computed": bool(human_approval_recorded),
                      "residuals_computed": False,
                      "chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  }
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_361_GAP_001",
                      "gap": "Guarded baseline prediction dry run.",
                      "status_after_v4_361": "predictions_computed_no_residuals" if human_approval_recorded else "blocked_pending_human_prediction_approval",
                      "next_gate": "v4_362_guarded_residual_dry_run_no_chi_square_no_scoring" if human_approval_recorded else "rerun_v4_361_with_human_approval_yes_if_accepted",
                  },
                  {
                      "gap_id": "V4_361_GAP_002",
                      "gap": "Residuals remain uncomputed.",
                      "status_after_v4_361": "still_blocked",
                      "next_gate": "v4_362_guarded_residual_dry_run",
                  },
                  {
                      "gap_id": "V4_361_GAP_003",
                      "gap": "Chi-square/likelihood/p-values remain uncomputed.",
                      "status_after_v4_361": "still_blocked",
                      "next_gate": "later_guarded_score_gate",
                  },
                  {
                      "gap_id": "V4_361_GAP_004",
                      "gap": "Full covariance remains unavailable.",
                      "status_after_v4_361": "guarded_diagonal_only",
                      "next_gate": "full_covariance_repair_lane_if_needed",
                  },
                  {
                      "gap_id": "V4_361_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_361": "still_blocked",
                      "next_gate": "later_support_interpretation_gate_only_after_scoring",
                  },
              ])

              hard_checks = {
                  "input_v4_360_summary_found": summary360.get("version") == "v4.360",
                  "input_v4_360_rules_all_passed": summary_rules_all_passed(summary360),
                  "input_v4_360_failed_gates_none": summary360.get("failed_gates") == "none",
                  "input_v4_360_readiness_created": summary360.get("readiness_status") == "guarded_scoring_readiness_packet_created_not_scoring",
                  "input_v4_360_loaded_observed_rows_3": summary360.get("loaded_observed_rows") == 3,
                  "input_v4_360_definition_confirmed_true": summary360.get("definition_match_confirmed") is True,
                  "input_v4_360_covariance_confirmed_true": summary360.get("covariance_match_confirmed") is True,
                  "input_v4_360_prediction_not_computed_yet": summary360.get("baseline_prediction_computed") is False,
                  "input_v4_360_no_residuals": summary360.get("residuals_computed") is False,
                  "input_v4_360_no_score_valid": summary360.get("score_valid") is False,
                  "input_v4_360_no_support_allowed": summary360.get("support_allowed") is False,

                  "rules360_all_passed": rules360["passed"].astype(bool).all(),
                  "scoring_readiness_rows_match_summary": len(scoring_readiness) == int(summary360.get("guarded_scoring_readiness_rows")),
                  "formula_packet_rows_equal_4": len(formula_packet) == 4,
                  "checklist360_rows_equal_6": len(checklist360) == 6,
                  "next_gate_rows_equal_1": len(next_gate) == 1,
                  "boundary360_rows_equal_5": len(boundary360) == 5,
                  "gap360_rows_equal_5": len(gap360) == 5,
                  "baseline_object_has_parameters": omega_m0 > 0 and sigma8_0 > 0 and gamma > 0,

                  "human_approval_input_valid": human_approves in ["yes", "no"],
                  "prediction_rows_equal_readiness": len(prediction_dry_run) == len(scoring_readiness),
                  "computed_predictions_count_correct": len(computed_predictions) == (len(scoring_readiness) if human_approval_recorded else 0),
                  "computed_predictions_positive_if_yes": (computed_predictions["baseline_fsigma8_dry_run"].astype(float).gt(0).all() if human_approval_recorded else True),
                  "omega_m_z_between_zero_and_one_if_yes": (computed_predictions["omega_m_z_dry_run"].astype(float).between(0, 1).all() if human_approval_recorded else True),
                  "growth_factor_positive_if_yes": (computed_predictions["growth_factor_D_z_dry_run"].astype(float).gt(0).all() if human_approval_recorded else True),
                  "growth_rate_positive_if_yes": (computed_predictions["growth_rate_f_z_dry_run"].astype(float).gt(0).all() if human_approval_recorded else True),

                  "residuals_computed_false": false_col(prediction_dry_run, "residuals_computed") and false_col(next_packet, "residuals_computed"),
                  "normalized_residuals_computed_false": false_col(prediction_dry_run, "normalized_residuals_computed"),
                  "chi_square_computed_false": false_col(prediction_dry_run, "chi_square_computed") and false_col(next_packet, "chi_square_computed"),
                  "likelihood_computed_false": false_col(prediction_dry_run, "likelihood_computed"),
                  "p_values_computed_false": false_col(prediction_dry_run, "p_values_computed"),
                  "score_valid_false": false_col(prediction_dry_run, "score_valid") and false_col(next_packet, "score_valid"),
                  "support_allowed_false": false_col(prediction_dry_run, "support_allowed") and false_col(next_packet, "support_allowed"),
                  "residual_boundary_rows_equal_5": len(residual_boundary) == 5,
                  "next_packet_rows_equal_1": len(next_packet) == 1,
                  "gap_update_rows_equal_5": len(gap_update) == 5,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              if human_approval_recorded:
                  expected_result = "v4_361_guarded_baseline_prediction_dry_run_passed_predictions_computed_no_residuals_no_scoring_no_claims"
                  readiness_status = "guarded_baseline_predictions_computed_no_residuals_no_scoring"
                  selected_next_route = "v4_362_guarded_residual_dry_run_no_chi_square_no_scoring_no_support_claims"
              else:
                  expected_result = "v4_361_blocked_pending_human_prediction_dry_run_approval_no_scoring_no_claims"
                  readiness_status = "blocked_pending_human_prediction_dry_run_approval"
                  selected_next_route = "rerun_v4_361_with_human_approval_yes_if_accepted"

              summary361 = {
                  "version": "v4.361",
                  "route_name": "v4_361_guarded_baseline_prediction_dry_run_no_residuals_no_scoring_no_support_claims",
                  "expected_result": expected_result,
                  "input_version": "v4.360",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "readiness_status": readiness_status,
                  "human_prediction_dry_run_input": human_approves,
                  "human_prediction_dry_run_recorded": bool(human_approval_recorded),
                  "prediction_rows": int(len(prediction_dry_run)),
                  "baseline_prediction_computed_rows": int(len(computed_predictions)),
                  "baseline_prediction_computed": bool(human_approval_recorded),
                  "residuals_computed": False,
                  "normalized_residuals_computed": False,
                  "chi_square_computed": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": selected_next_route,
              }

              prediction_dry_run.to_csv(outdir / "v4_361_guarded_baseline_prediction_DRY_RUN_NO_RESIDUALS_NO_SCORING.csv", index=False)
              computed_predictions.to_csv(outdir / "v4_361_COMPUTED_BASELINE_PREDICTIONS_NO_RESIDUALS_NO_SCORING.csv", index=False)
              formula_audit.to_csv(outdir / "v4_361_formula_audit_prediction_computed_only.csv", index=False)
              residual_boundary.to_csv(outdir / "v4_361_residual_and_scoring_boundary.csv", index=False)
              next_packet.to_csv(outdir / "v4_361_HUMAN_FILL_guarded_residual_dry_run_review_NO_SCORING.csv", index=False)
              gap_update.to_csv(outdir / "v4_361_gap_status_after_prediction_dry_run.csv", index=False)
              scoring_readiness.to_csv(outdir / "v4_361_input_v4_360_scoring_readiness_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_361_rule_checks.csv", index=False)

              (outdir / "v4_361_summary.json").write_text(json.dumps(summary361, indent=2))

              summary_md = f"""# TAIRID v4.361 Guarded Baseline Prediction Dry Run — No Residuals, No Scoring

          Expected result: `{summary361["expected_result"]}`

          {summary361["rules_passed"]} / {summary361["rules_total"]} rules passed

          failed_gates = {summary361["failed_gates"]}

          readiness_status = `{summary361["readiness_status"]}`

          human_prediction_dry_run_input = `{human_approves}`

          baseline_prediction_computed = {summary361["baseline_prediction_computed"]}

          baseline_prediction_computed_rows = {summary361["baseline_prediction_computed_rows"]}

          residuals_computed = false

          chi_square_computed = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step may compute guarded baseline predictions only when the human input is `yes`.

          It does **not** compute residuals.

          It does **not** compute chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{selected_next_route}`
          """
              (outdir / "v4_361_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary361, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_361_guarded_baseline_prediction_dry_run_no_scoring.py

      - name: Run v4.361 guarded baseline prediction dry run no scoring
        run: |
          python run_v4_361_guarded_baseline_prediction_dry_run_no_scoring.py

      - name: Upload v4.361 guarded baseline prediction dry run artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-361-guarded-baseline-prediction-dry-run-no-residuals-no-scoring-output
          path: |
            tairid_v4_361_guarded_baseline_prediction_dry_run_no_residuals_no_scoring_output/
            tairid_v4_361_guarded_baseline_prediction_dry_run_no_residuals_no_scoring_output.zip
