          MAX_PARAMNAMES_COMPRESSED_BYTES = 100_000
          MAX_CHAIN_PREFIX_COMPRESSED_BYTES = 48_000_000
          TARGET_VALID_SAMPLE_ROWS = 256
          MIN_REQUIRED_VALID_SAMPLE_ROWS = 128

          SELECTED_ROOT = "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE"
          PARAMNAMES_MEMBER = SELECTED_ROOT + ".paramnames"
          CHAIN_SAMPLE_MEMBER_1 = SELECTED_ROOT + "_1.txt"
          OPTIONAL_CHAIN_SAMPLE_MEMBER_2 = SELECTED_ROOT + "_2.txt"

          REQUIRED_PRIMARY_PARAMETERS = ["omegabh2", "omegach2", "theta", "tau", "logA", "ns"]

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not run CAMB.",
              "This does not compute weighted posterior mean.",
              "This does not compute weighted covariance.",
              "This does not compute Planck reference uncertainty.",
              "This parses a bounded larger prefix of one Planck chain sample member, targeting 256 valid weighted sample packets with a minimum pass threshold of 128.",
              "A pass means the larger bounded parser mechanics work and are ready for a larger bounded solver batch design."
          ]

          UPSTREAM_LOCKS = {
              "v4_98_bounded_reference_uncertainty_scaling_plan": {
                  "readiness_label": "bounded_reference_uncertainty_scaling_plan_passed_ready_for_larger_bounded_sample_parser_probe",
                  "target_valid_rows_next_probe": 256,
                  "minimum_valid_rows_next_probe": 128,
                  "max_chain_prefix_compressed_bytes": 48000000,
                  "larger_samples_parsed": False,
                  "CAMB_run": False,
                  "weighted_mean_vector_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_97_larger_sample_weighted_covariance_mechanics_probe": {
                  "readiness_label": "larger_sample_weighted_covariance_mechanics_probe_passed_ready_for_bounded_reference_uncertainty_scaling_plan",
                  "accepted_sample_count": 64,
                  "effective_sample_size": 42.30241187384045,
                  "full_covariance_rank": 6,
                  "fsigma8_covariance_rank": 4,
                  "weighted_mean_vector_computed": True,
                  "weighted_covariance_matrix_computed": True,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              }
          }

          PARAMETER_MAPPING_CONTRACT = [
              {"source_parameter": "omegabh2", "future_camb_name": "ombh2", "mapping_operation": "identity"},
              {"source_parameter": "omegach2", "future_camb_name": "omch2", "mapping_operation": "identity"},
              {"source_parameter": "theta", "future_camb_name": "cosmomc_theta", "mapping_operation": "divide_by_100_if_label_is_100theta_MC"},
              {"source_parameter": "tau", "future_camb_name": "tau", "mapping_operation": "identity"},
              {"source_parameter": "logA", "future_camb_name": "As", "mapping_operation": "As = exp(logA) / 1e10"},
              {"source_parameter": "ns", "future_camb_name": "ns", "mapping_operation": "identity"}
          ]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015"},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038"},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051"},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061"},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233"}
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v5_00_larger_bounded_solver_batch_design",
                  "purpose": "Design chunked CAMB execution for the 256-row larger bounded parsed sample packet set.",
                  "why_next": "The larger bounded parser output should be converted into solver output vectors only after a design pass."
              },
              {
                  "priority": 2,
                  "route_id": "v5_01_larger_bounded_solver_batch_probe",
                  "purpose": "Run CAMB over the larger bounded 256-row sample set in controlled chunks.",
                  "why_next": "Reference uncertainty needs output vectors across more posterior support than 64 weighted samples."
              },
              {
                  "priority": 3,
                  "route_id": "v5_02_larger_bounded_weighted_covariance_diagnostic",
                  "purpose": "Compute a 256-row bounded covariance diagnostic after larger solver outputs exist.",
                  "why_next": "The reference lane needs covariance mechanics to scale before final claims."
              },
              {
                  "priority": 4,
                  "route_id": "v5_03_reference_uncertainty_sufficiency_gate",
                  "purpose": "Decide whether the bounded sample is sufficient or requires additional chain files.",
                  "why_next": "Even 256 bounded rows remain diagnostic, not final reference uncertainty."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A weighted covariance matrix was computed.",
              "A weighted posterior mean vector was computed.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The larger bounded parser validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The larger bounded parser is the same as full Planck reference uncertainty.",
              "The larger bounded parser is enough for final RSD pressure.",
              "A 256-row CAMB batch has already been run."
          ]

          failed_gates = []
          warnings = [
              "larger_bounded_sample_parser_probe_only",
              "bounded_range_reads_only",
              "no_CAMB_run",
              "no_weighted_mean_computed",
              "no_covariance_computed",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def is_finite_number(value):
              try:
                  return math.isfinite(float(value))
              except Exception:
                  return False

          def is_plausible_primary_parameter(name, value):
              if not is_finite_number(value):
                  return False
              value = float(value)
              if name == "omegabh2":
                  return 0.005 < value < 0.04
              if name == "omegach2":
                  return 0.05 < value < 0.30
              if name == "theta":
                  return 0.5 < value < 2.0
              if name == "tau":
                  return 0.01 < value < 0.20
              if name == "logA":
                  return 2.0 < value < 4.0
              if name == "ns":
                  return 0.8 < value < 1.2
              return False

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }
              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={"User-Agent": "TAIRID-v4.99-larger-parser/1.0", "Accept": "*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }
              data = b""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.99-larger-parser/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )
                  with urllib.request.urlopen(req, timeout=180) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)
                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record, data

          def classify_member(name):
              lower = name.lower()
              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".paramnames"):
                  return "paramnames"
              if lower.endswith(".minimum"):
                  return "minimum"
              if re.search(r"_\d+\.txt$", name):
                  return "chain_sample_text_member"
              return "other"

          def parse_zip64_extra(extra_bytes, need_uncompressed, need_compressed, need_local_offset):
              result = {}
              pos = 0
              while pos + 4 <= len(extra_bytes):
                  header_id, data_size = struct.unpack_from("<HH", extra_bytes, pos)
                  data_start = pos + 4
                  data_end = data_start + data_size
                  if data_end > len(extra_bytes):
                      break

                  data = extra_bytes[data_start:data_end]
                  if header_id == 0x0001:
                      subpos = 0
                      if need_uncompressed and subpos + 8 <= len(data):
                          result["uncompressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_compressed and subpos + 8 <= len(data):
                          result["compressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_local_offset and subpos + 8 <= len(data):
                          result["local_header_offset"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                  pos = data_end
              return result

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0

              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break

                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)
                      compression_method = fields[4]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      extra_start = name_end
                      extra_end = extra_start + extra_len
                      comment_end = extra_end + comment_len

                      if comment_end > len(cd_bytes):
                          break

                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")
                      extra = cd_bytes[extra_start:extra_end]

                      zip64_extra = parse_zip64_extra(
                          extra,
                          need_uncompressed=uncompressed_size == 0xFFFFFFFF,
                          need_compressed=compressed_size == 0xFFFFFFFF,
                          need_local_offset=local_header_offset == 0xFFFFFFFF
                      )

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compression_method": compression_method,
                          "compressed_size": zip64_extra.get("compressed_size", compressed_size),
                          "uncompressed_size": zip64_extra.get("uncompressed_size", uncompressed_size),
                          "local_header_offset": zip64_extra.get("local_header_offset", local_header_offset),
                          "zip64_extra_used": bool(zip64_extra)
                      })

                      pos = comment_end

                  except Exception:
                      break

              return records

          def fetch_member_prefix(member_record, max_member_compressed_bytes):
              offset = int(member_record["local_header_offset"])
              compressed_size = int(member_record["compressed_size"])

              member_fetch = {
                  "member_name": member_record["member_name"],
                  "member_type": member_record["member_type"],
                  "compressed_size": compressed_size,
                  "uncompressed_size": member_record["uncompressed_size"],
                  "compression_method_from_central_directory": member_record["compression_method"],
                  "local_header_offset": offset,
                  "requested_compressed_bytes": min(compressed_size, max_member_compressed_bytes),
                  "full_compressed_member_requested": compressed_size <= max_member_compressed_bytes,
                  "payload_bytes_decompressed": 0,
                  "payload_sha256_16": "",
                  "ok": False,
                  "error": ""
              }

              try:
                  if compressed_size <= 0:
                      raise RuntimeError("compressed_size_not_positive")

                  header_record, header_data = range_probe(
                      "local_header_probe",
                      FULL_GRID_URL,
                      f"bytes={offset}-{offset + 4095}",
                      4096
                  )

                  if not header_record["ok"] or not header_record["server_honored_range"]:
                      raise RuntimeError("local_header_range_not_available")

                  if len(header_data) < 30 or header_data[:4] != b"PK\x03\x04":
                      raise RuntimeError("local_header_signature_not_found")

                  fields = struct.unpack_from("<4s5H3L2H", header_data, 0)
                  compression_method = fields[3]
                  file_name_len = fields[9]
                  extra_len = fields[10]
                  data_start = offset + 30 + file_name_len + extra_len

                  bytes_to_fetch = min(compressed_size, max_member_compressed_bytes)
                  data_end = data_start + bytes_to_fetch - 1

                  data_record, compressed_data = range_probe(
                      "member_payload_probe",
                      FULL_GRID_URL,
                      f"bytes={data_start}-{data_end}",
                      bytes_to_fetch + 1024
                  )

                  if not data_record["ok"] or not data_record["server_honored_range"]:
                      raise RuntimeError("member_payload_range_not_available")

                  if data_record["truncated_by_guard"]:
                      raise RuntimeError("member_payload_truncated_by_guard")

                  if compression_method == 0:
                      payload = compressed_data
                  elif compression_method == 8:
                      decompressor = zlib.decompressobj(-15)
                      payload = decompressor.decompress(compressed_data)
                  else:
                      raise RuntimeError(f"unsupported_compression_method_{compression_method}")

                  member_fetch["payload_bytes_decompressed"] = len(payload)
                  member_fetch["payload_sha256_16"] = hashlib.sha256(payload).hexdigest()[:16] if payload else ""
                  member_fetch["ok"] = True
                  return payload, member_fetch

              except Exception as exc:
                  member_fetch["error"] = f"{type(exc).__name__}: {exc}"
                  return b"", member_fetch

          def parse_paramnames_text(text):
              rows = []
              names = []
              for row_number, raw_line in enumerate(text.splitlines(), start=1):
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  parts = line.split(None, 1)
                  name = parts[0]
                  label = parts[1] if len(parts) > 1 else ""
                  rows.append({
                      "row_number": row_number,
                      "parameter_index_zero_based": len(names),
                      "parameter_name": name,
                      "parameter_label": label
                  })
                  names.append(name)
              return rows, names

          def parse_chain_prefix_text(text, expected_column_count, max_rows):
              valid_rows = []
              invalid_rows = []
              line_count = 0
              numeric_line_count = 0

              for line_number, raw_line in enumerate(text.splitlines(), start=1):
                  line_count += 1
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue

                  parts = line.split()
                  try:
                      numeric = [float(x) for x in parts]
                  except Exception:
                      invalid_rows.append({
                          "line_number": line_number,
                          "reason": "non_numeric",
                          "column_count": len(parts),
                          "line_text": line[:300]
                      })
                      continue

                  numeric_line_count += 1
                  width = len(numeric)

                  if width >= expected_column_count:
                      valid_rows.append({
                          "line_number": line_number,
                          "column_count": width,
                          "values": numeric,
                          "line_sha256_16": hashlib.sha256(line.encode("utf-8")).hexdigest()[:16]
                      })
                      if len(valid_rows) >= max_rows:
                          break
                  else:
                      invalid_rows.append({
                          "line_number": line_number,
                          "reason": "too_few_columns",
                          "column_count": width,
                          "line_text": line[:300]
                      })

              return {
                  "line_count_seen_until_stop": line_count,
                  "numeric_line_count_seen": numeric_line_count,
                  "valid_rows": valid_rows,
                  "invalid_rows": invalid_rows[:50]
              }

          def build_sample_packets(valid_rows, primary_index_records):
              packets = []
              for sample_number, row in enumerate(valid_rows, start=1):
                  values = row["values"]
                  weight = values[0]
                  minus_loglike = values[1]

                  packet = {
                      "sample_number": sample_number,
                      "source_line_number": row["line_number"],
                      "row_column_count": row["column_count"],
                      "sample_weight": weight,
                      "minus_loglike_or_proxy": minus_loglike,
                      "line_sha256_16": row["line_sha256_16"],
                      "row_width_status": "valid_width",
                      "packet_scope": "bounded_larger_sample_packet_not_covariance"
                  }

                  primary_values_ok = True

                  for item in primary_index_records:
                      name = item["parameter_name"]
                      column = int(item["chain_column_zero_based"])
                      value = values[column]
                      packet[name] = value
                      if not is_plausible_primary_parameter(name, value):
                          primary_values_ok = False

                  theta_value = packet.get("theta", "")
                  logA_value = packet.get("logA", "")

                  packet["cosmomc_theta_for_future_CAMB"] = float(theta_value) / 100.0 if is_finite_number(theta_value) else ""
                  packet["As_for_future_CAMB"] = math.exp(float(logA_value)) / 1.0e10 if is_finite_number(logA_value) else ""
                  packet["sample_weight_positive_finite"] = is_finite_number(weight) and float(weight) > 0
                  packet["minus_loglike_finite"] = is_finite_number(minus_loglike)
                  packet["primary_values_plausible"] = primary_values_ok
                  packet["future_CAMB_run_allowed_now"] = False

                  packets.append(packet)

              total_weight = sum(float(row["sample_weight"]) for row in packets) if packets else 0.0
              for packet in packets:
                  packet["normalized_weight_preview"] = float(packet["sample_weight"]) / total_weight if total_weight > 0 else ""
              return packets

          def effective_sample_size(weights):
              if not weights:
                  return ""
              W = sum(weights)
              denom = sum(w * w for w in weights)
              return (W * W / denom) if denom > 0 else ""

          head_record = head_probe("full_grid_head", FULL_GRID_URL)

          if not head_record["ok"]:
              failed_gates.append("full_grid_head_probe_failed")

          if head_record.get("content_length") and head_record["content_length"] != FULLGRID_CONTENT_LENGTH_EXPECTED:
              warnings.append("fullgrid_content_length_differs_from_locked_value")

          cd_start = ZIP64_CENTRAL_DIRECTORY_OFFSET
          cd_end = ZIP64_CENTRAL_DIRECTORY_OFFSET + ZIP64_CENTRAL_DIRECTORY_SIZE - 1

          cd_record, cd_data = range_probe(
              "full_grid_locked_zip64_central_directory_fetch",
              FULL_GRID_URL,
              f"bytes={cd_start}-{cd_end}",
              MAX_RANGE_READ_BYTES
          )

          if not cd_record["ok"]:
              failed_gates.append("central_directory_fetch_failed")
          if not cd_record.get("server_honored_range"):
              failed_gates.append("central_directory_range_not_honored")
          if cd_record.get("truncated_by_guard"):
              failed_gates.append("central_directory_truncated_by_guard")

          manifest_records = parse_central_directory(cd_data) if cd_data else []

          if not manifest_records:
              failed_gates.append("central_directory_manifest_records_not_parsed")

          manifest_by_name = {row["member_name"]: row for row in manifest_records}

          paramnames_record = manifest_by_name.get(PARAMNAMES_MEMBER)
          chain_record_1 = manifest_by_name.get(CHAIN_SAMPLE_MEMBER_1)
          optional_chain_record_2 = manifest_by_name.get(OPTIONAL_CHAIN_SAMPLE_MEMBER_2)

          if paramnames_record is None:
              failed_gates.append("selected_paramnames_member_missing")

          if chain_record_1 is None:
              failed_gates.append("selected_chain_sample_member_1_missing")

          member_visibility_records = [
              {
                  "member_role": "parameter_names",
                  "member_name": PARAMNAMES_MEMBER,
                  "required": True,
                  "found": paramnames_record is not None,
                  "member_type": paramnames_record.get("member_type", "") if paramnames_record else "",
                  "compressed_size": paramnames_record.get("compressed_size", "") if paramnames_record else "",
                  "uncompressed_size": paramnames_record.get("uncompressed_size", "") if paramnames_record else ""
              },
              {
                  "member_role": "primary_chain_sample_prefix",
                  "member_name": CHAIN_SAMPLE_MEMBER_1,
                  "required": True,
                  "found": chain_record_1 is not None,
                  "member_type": chain_record_1.get("member_type", "") if chain_record_1 else "",
                  "compressed_size": chain_record_1.get("compressed_size", "") if chain_record_1 else "",
                  "uncompressed_size": chain_record_1.get("uncompressed_size", "") if chain_record_1 else ""
              },
              {
                  "member_role": "optional_second_chain_member_visibility",
                  "member_name": OPTIONAL_CHAIN_SAMPLE_MEMBER_2,
                  "required": False,
                  "found": optional_chain_record_2 is not None,
                  "member_type": optional_chain_record_2.get("member_type", "") if optional_chain_record_2 else "",
                  "compressed_size": optional_chain_record_2.get("compressed_size", "") if optional_chain_record_2 else "",
                  "uncompressed_size": optional_chain_record_2.get("uncompressed_size", "") if optional_chain_record_2 else ""
              }
          ]

          member_fetch_records = []
          paramname_records = []
          primary_index_records = []
          chain_parse_summary = {
              "chain_member_name": CHAIN_SAMPLE_MEMBER_1,
              "expected_parameter_count": 0,
              "expected_column_count": 0,
              "target_valid_rows": TARGET_VALID_SAMPLE_ROWS,
              "minimum_required_valid_rows": MIN_REQUIRED_VALID_SAMPLE_ROWS,
