name: 000 TAIRID v4.99 Larger Bounded Sample Parser Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-99-larger-bounded-sample-parser-probe.yml"

jobs:
  tairid-v4-99-larger-bounded-sample-parser-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.99 larger bounded sample parser probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_99_larger_bounded_sample_parser_probe

          python - <<'PY'
