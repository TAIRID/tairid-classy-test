          if paramnames_record is not None:
              payload, fetch_record = fetch_member_prefix(paramnames_record, MAX_PARAMNAMES_COMPRESSED_BYTES)
              member_fetch_records.append(fetch_record)

              if fetch_record["ok"]:
                  param_text = payload.decode("utf-8", errors="replace")
                  paramname_records, param_names = parse_paramnames_text(param_text)

                  column_index_by_name = {name: index + 2 for index, name in enumerate(param_names)}

                  for required_name in REQUIRED_PRIMARY_PARAMETERS:
                      present = required_name in column_index_by_name
                      primary_index_records.append({
                          "parameter_name": required_name,
                          "present": present,
                          "parameter_index_zero_based": param_names.index(required_name) if present else "",
                          "chain_column_zero_based": column_index_by_name.get(required_name, ""),
                          "parameter_label": next((row["parameter_label"] for row in paramname_records if row["parameter_name"] == required_name), ""),
                          "mapping_status": "mapped_from_paramnames" if present else "missing_from_paramnames"
                      })

                  chain_parse_summary["expected_parameter_count"] = len(param_names)
                  chain_parse_summary["expected_column_count"] = 2 + len(param_names)

          if chain_record_1 is not None:
              payload, fetch_record = fetch_member_prefix(chain_record_1, MAX_CHAIN_PREFIX_COMPRESSED_BYTES)
