name: 000 TAIRID v4.109 Broader Reference Uncertainty Sufficiency Gate

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-109-broader-reference-uncertainty-sufficiency-gate.yml"

jobs:
  tairid-v4-109-broader-reference-uncertainty-sufficiency-gate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.109 broader reference uncertainty sufficiency gate
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_109_broader_reference_uncertainty_sufficiency_gate

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_109_broader_reference_uncertainty_sufficiency_gate")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_109_broader_reference_uncertainty_sufficiency_gate"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new weighted mean values.",
              "This does not compute a new weighted covariance matrix.",
              "This judges whether the v4.108.1 broader covariance mechanics output is sufficient to be treated as final Planck reference uncertainty.",
              "A pass means the sufficiency decision is explicit. It does not by itself authorize final RSD pressure or TAIRID validation."
          ]

          UPSTREAM_LOCKS = {
              "v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair": {
                  "readiness_label": "broader_covariance_mechanics_probe_passed_ready_for_broader_reference_uncertainty_sufficiency_gate",
                  "parsed_sample_packet_count": 1024,
                  "solver_record_count": 1024,
                  "chunk_solver_record_count": 64,
                  "sample_output_vector_count": 1024,
                  "vector_component_record_count": 10240,
                  "contributing_solved_member_count": 4,
                  "effective_sample_size": 624.5301884527668,
                  "weight_sum": 2281.0,
                  "weighted_mean_vector_computed": True,
                  "weighted_covariance_matrix_computed": True,
                  "fsigma8_covariance_matrix_computed": True,
                  "mean_vector_record_count": 10,
                  "covariance_matrix_record_count": 100,
                  "fsigma8_covariance_record_count": 25,
                  "full_covariance_dimension": 10,
                  "full_covariance_rank": 7,
                  "fsigma8_covariance_dimension": 5,
                  "fsigma8_covariance_rank": 4,
                  "covariance_symmetry_ok": True,
                  "covariance_diagonal_ok": True,
                  "all_chunks_complete": True,
                  "all_output_vectors_complete": True,
                  "all_weights_preserved": True,
                  "all_orientations_reversed": True,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_107_larger_broader_parse_plus_solver_probe": {
                  "readiness_label": "larger_broader_parse_plus_solver_probe_passed_ready_for_broader_covariance_mechanics_probe",
                  "parsed_sample_packet_count": 1024,
                  "sample_output_vector_count": 1024,
                  "contributing_solved_member_count": 4,
                  "all_output_vectors_complete": True,
                  "Planck_reference_uncertainty_computed": False
              },
              "v4_103_reference_uncertainty_sufficiency_gate": {
                  "readiness_label": "reference_uncertainty_sufficiency_gate_passed_not_final_ready_for_multi_file_broader_chain_coverage_design",
                  "prior_sample_count": 256,
                  "prior_effective_sample_size": 156.27004909983634,
                  "prior_full_covariance_rank": 4,
                  "prior_fsigma8_covariance_rank": 3,
                  "final_reference_uncertainty_rejected": True,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          SUFFICIENCY_CRITERIA = [
              {
                  "criterion_id": "sample_count_mechanics_threshold",
                  "requirement": "At least 1024 solved sample vectors for this broader mechanics lane.",
                  "observed_value": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["sample_output_vector_count"],
                  "required_value": 1024,
                  "pass": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["sample_output_vector_count"] >= 1024,
                  "finality_role": "mechanics_required"
              },
              {
                  "criterion_id": "member_coverage_threshold",
                  "requirement": "At least four contributing selected-root chain members for broader coverage.",
                  "observed_value": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["contributing_solved_member_count"],
                  "required_value": 4,
                  "pass": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["contributing_solved_member_count"] >= 4,
                  "finality_role": "mechanics_required"
              },
              {
                  "criterion_id": "effective_sample_size_threshold",
                  "requirement": "Effective sample size at or above 512 for this bounded lane.",
                  "observed_value": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["effective_sample_size"],
                  "required_value": 512,
                  "pass": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["effective_sample_size"] >= 512,
                  "finality_role": "mechanics_required"
              },
              {
                  "criterion_id": "covariance_symmetry_threshold",
                  "requirement": "Covariance matrices must pass symmetry cleanup/checks.",
                  "observed_value": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["covariance_symmetry_ok"],
                  "required_value": True,
                  "pass": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["covariance_symmetry_ok"] is True,
                  "finality_role": "mechanics_required"
              },
              {
                  "criterion_id": "covariance_diagonal_threshold",
                  "requirement": "Covariance diagonal entries must be nonnegative under numerical tolerance.",
                  "observed_value": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["covariance_diagonal_ok"],
                  "required_value": True,
                  "pass": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["covariance_diagonal_ok"] is True,
                  "finality_role": "mechanics_required"
              },
              {
                  "criterion_id": "full_covariance_rank_sufficiency",
                  "requirement": "Full 10x10 covariance should be full rank for an ordinary inverse-based final covariance route.",
                  "observed_value": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["full_covariance_rank"],
                  "required_value": 10,
                  "pass": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["full_covariance_rank"] >= 10,
                  "finality_role": "final_reference_required_or_regularization_needed"
              },
              {
                  "criterion_id": "fsigma8_covariance_rank_sufficiency",
                  "requirement": "fsigma8 5x5 covariance should be full rank for ordinary RSD inverse-based pressure.",
                  "observed_value": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["fsigma8_covariance_rank"],
                  "required_value": 5,
                  "pass": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["fsigma8_covariance_rank"] >= 5,
                  "finality_role": "final_RSD_reference_required_or_regularization_needed"
              },
              {
                  "criterion_id": "final_claim_boundary",
                  "requirement": "Final Planck reference uncertainty must remain blocked unless rank/invertibility and representativeness gates pass.",
                  "observed_value": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["Planck_reference_uncertainty_computed"],
                  "required_value": False,
                  "pass": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["Planck_reference_uncertainty_computed"] is False,
                  "finality_role": "claim_boundary_required"
              }
          ]

          MECHANICS_PASS_CRITERIA = {
              "minimum_sample_count": 1024,
              "minimum_effective_sample_size": 512,
              "minimum_member_count": 4,
              "requires_weighted_mean": True,
              "requires_weighted_covariance": True,
              "requires_symmetry_ok": True,
              "requires_diagonal_ok": True
          }

          FINAL_REFERENCE_SUFFICIENCY_CRITERIA = {
              "requires_full_covariance_rank": 10,
              "requires_fsigma8_covariance_rank": 5,
              "requires_regularization_or_pseudoinverse_policy": True,
              "requires_observed_RSD_covariance_bridge": True,
              "requires_external_claim_boundary_review": True,
              "final_reference_uncertainty_allowed_now": False,
              "final_RSD_pressure_allowed_now": False
          }

          mechanics_gate_passed = all(
              row["pass"]
              for row in SUFFICIENCY_CRITERIA
              if row["finality_role"] in ["mechanics_required", "claim_boundary_required"]
          )

          full_rank_ok = next(row["pass"] for row in SUFFICIENCY_CRITERIA if row["criterion_id"] == "full_covariance_rank_sufficiency")
          fsigma8_rank_ok = next(row["pass"] for row in SUFFICIENCY_CRITERIA if row["criterion_id"] == "fsigma8_covariance_rank_sufficiency")

          final_reference_uncertainty_sufficient = bool(
              mechanics_gate_passed
              and full_rank_ok
              and fsigma8_rank_ok
              and FINAL_REFERENCE_SUFFICIENCY_CRITERIA["final_reference_uncertainty_allowed_now"] is True
          )

          final_reference_uncertainty_rejected = not final_reference_uncertainty_sufficient

          RANK_DIAGNOSTIC = {
              "full_covariance_dimension": 10,
              "full_covariance_rank": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["full_covariance_rank"],
              "full_rank_missing_dimensions": 10 - UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["full_covariance_rank"],
              "fsigma8_covariance_dimension": 5,
              "fsigma8_covariance_rank": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["fsigma8_covariance_rank"],
              "fsigma8_rank_missing_dimensions": 5 - UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["fsigma8_covariance_rank"],
              "interpretation": "The broader covariance mechanics improved the rank compared with v4.102.1, but rank is still deficient for a direct ordinary inverse-based final reference covariance."
          }

          NEXT_STRATEGY_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_110_rank_aware_covariance_stabilization_design",
                  "purpose": "Design an explicit rank-aware covariance policy: eigenvalue floor, shrinkage, diagonal loading, pseudoinverse boundary, and claim limits.",
                  "why_next": "The 1024-sample broader covariance mechanics is still rank-deficient, so an inverse-based pressure route needs a transparent stabilization policy before any pressure bridge."
              },
              {
                  "priority": 2,
                  "route_id": "v4_111_regularized_reference_covariance_probe",
                  "purpose": "Apply the approved rank-aware stabilization policy to the broader covariance mechanics output as a diagnostic, not final proof.",
                  "why_next": "This would test invertibility mechanics while preserving claim boundaries."
              },
              {
                  "priority": 3,
                  "route_id": "v4_112_observed_RSD_covariance_bridge_design",
                  "purpose": "Design how observed RSD covariance would combine with Planck reference covariance once the reference covariance route is stabilized.",
                  "why_next": "Final pressure requires observed covariance plus reference covariance."
              },
              {
                  "priority": 4,
                  "route_id": "v4_113_additional_chain_coverage_scaling_plan",
                  "purpose": "Optionally design additional chain-sample coverage beyond the 1024 current target.",
                  "why_next": "More samples may improve stability, but rank-aware policy is needed either way."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A final Planck posterior covariance was computed in v4.109.",
              "A final Planck posterior mean vector was computed in v4.109.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The broader reference uncertainty sufficiency gate validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The broader covariance mechanics diagnostic is final Planck reference uncertainty.",
              "The rank-deficient covariance is enough for final RSD pressure.",
              "The next rank-aware regularization step will validate TAIRID."
          ]

          failed_gates = []
          warnings = [
              "sufficiency_gate_only",
              "no_new_CAMB_run",
              "no_new_covariance_computation",
              "mechanics_passed_but_final_reference_rejected",
              "rank_deficiency_requires_stabilization_policy",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          if not UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["weighted_mean_vector_computed"]:
              failed_gates.append("upstream_weighted_mean_not_computed")

          if not UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["weighted_covariance_matrix_computed"]:
              failed_gates.append("upstream_weighted_covariance_not_computed")

          if not mechanics_gate_passed:
              failed_gates.append("mechanics_gate_not_passed")

          if final_reference_uncertainty_sufficient:
              failed_gates.append("final_reference_uncertainty_unexpectedly_allowed")

          if FINAL_REFERENCE_SUFFICIENCY_CRITERIA["final_reference_uncertainty_allowed_now"] is not False:
              failed_gates.append("final_reference_uncertainty_boundary_not_blocked")

          if FINAL_REFERENCE_SUFFICIENCY_CRITERIA["final_RSD_pressure_allowed_now"] is not False:
              failed_gates.append("final_RSD_pressure_boundary_not_blocked")

          if len(NEXT_STRATEGY_OPTIONS) < 4:
              failed_gates.append("next_strategy_options_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "final planck posterior covariance was computed in v4.109",
              "final rsd pressure score",
              "validates tairid cosmology",
              "broader covariance mechanics diagnostic is final planck reference uncertainty",
              "rank-deficient covariance is enough for final rsd pressure",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "broader_reference_uncertainty_sufficiency_gate_passed_not_final_ready_for_rank_aware_covariance_stabilization_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_broader_covariance_mechanics_carried",
                  "pass": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["sample_output_vector_count"] == 1024,
                  "result": "1024 solved output vectors carried from v4.108.1",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "mechanics_gate_passed",
                  "pass": mechanics_gate_passed,
                  "result": f"mechanics_gate_passed={mechanics_gate_passed}; ESS={UPSTREAM_LOCKS['v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair']['effective_sample_size']}",
                  "boundary": "Mechanics diagnostic only."
              },
              {
                  "rule_id": "rank_diagnostic_recorded",
                  "pass": True,
                  "result": f"full_rank={RANK_DIAGNOSTIC['full_covariance_rank']}/10; fsigma8_rank={RANK_DIAGNOSTIC['fsigma8_covariance_rank']}/5",
                  "boundary": "Rank is diagnostic, not final pressure."
              },
              {
                  "rule_id": "final_reference_uncertainty_rejected",
                  "pass": final_reference_uncertainty_rejected,
                  "result": "broader mechanics output is not accepted as final Planck reference uncertainty",
                  "boundary": "No final reference covariance claim."
              },
              {
                  "rule_id": "rank_aware_strategy_required",
                  "pass": (not full_rank_ok) or (not fsigma8_rank_ok),
                  "result": "rank-aware covariance stabilization/pseudoinverse policy is required before any pressure bridge",
                  "boundary": "Design next; do not compute pressure."
              },
              {
                  "rule_id": "final_RSD_pressure_still_blocked",
                  "pass": FINAL_REFERENCE_SUFFICIENCY_CRITERIA["final_RSD_pressure_allowed_now"] is False,
                  "result": "final RSD pressure remains blocked",
                  "boundary": "No final pressure score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute pressure."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_109_rules_passed")

          if failed_gates:
              readiness_label = "broader_reference_uncertainty_sufficiency_gate_failed"
              next_allowed_step = "Repair sufficiency gate before rank-aware covariance stabilization design."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.110 rank-aware covariance stabilization design. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_sample_output_vector_count": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["sample_output_vector_count"],
              "upstream_effective_sample_size": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["effective_sample_size"],
              "upstream_contributing_solved_member_count": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["contributing_solved_member_count"],
              "weighted_mean_vector_available": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["weighted_mean_vector_computed"],
              "weighted_covariance_matrix_available": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["weighted_covariance_matrix_computed"],
              "fsigma8_covariance_matrix_available": UPSTREAM_LOCKS["v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair"]["fsigma8_covariance_matrix_computed"],
              "mechanics_gate_passed": mechanics_gate_passed,
              "full_covariance_dimension": RANK_DIAGNOSTIC["full_covariance_dimension"],
              "full_covariance_rank": RANK_DIAGNOSTIC["full_covariance_rank"],
              "full_rank_missing_dimensions": RANK_DIAGNOSTIC["full_rank_missing_dimensions"],
              "fsigma8_covariance_dimension": RANK_DIAGNOSTIC["fsigma8_covariance_dimension"],
              "fsigma8_covariance_rank": RANK_DIAGNOSTIC["fsigma8_covariance_rank"],
              "fsigma8_rank_missing_dimensions": RANK_DIAGNOSTIC["fsigma8_rank_missing_dimensions"],
              "final_reference_uncertainty_sufficient": final_reference_uncertainty_sufficient,
              "final_reference_uncertainty_rejected": final_reference_uncertainty_rejected,
              "rank_aware_stabilization_required": (not full_rank_ok) or (not fsigma8_rank_ok),
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "sufficiency_criteria": SUFFICIENCY_CRITERIA,
              "mechanics_pass_criteria": MECHANICS_PASS_CRITERIA,
              "final_reference_sufficiency_criteria": FINAL_REFERENCE_SUFFICIENCY_CRITERIA,
              "rank_diagnostic": RANK_DIAGNOSTIC,
              "next_strategy_options": NEXT_STRATEGY_OPTIONS,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "mechanics_gate_passed": mechanics_gate_passed,
                  "final_reference_uncertainty_sufficient": final_reference_uncertainty_sufficient,
                  "final_reference_uncertainty_rejected": final_reference_uncertainty_rejected,
                  "rank_aware_stabilization_required": (not full_rank_ok) or (not fsigma8_rank_ok),
                  "full_covariance_rank": RANK_DIAGNOSTIC["full_covariance_rank"],
                  "fsigma8_covariance_rank": RANK_DIAGNOSTIC["fsigma8_covariance_rank"],
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_109_broader_reference_uncertainty_sufficiency_gate.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "sufficiency_criteria_v4_109.csv",
              SUFFICIENCY_CRITERIA,
              ["criterion_id", "requirement", "observed_value", "required_value", "pass", "finality_role"]
          )

          write_csv(
              OUTDIR / "next_strategy_options_v4_109.csv",
              NEXT_STRATEGY_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_109.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_109.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          rank_rows = [
              {"rank_check": key, "value": value}
              for key, value in RANK_DIAGNOSTIC.items()
          ]
          write_csv(
              OUTDIR / "rank_diagnostic_v4_109.csv",
              rank_rows,
              ["rank_check", "value"]
          )

          md = []
          md.append("# 000 TAIRID v4.109 — Broader Reference Uncertainty Sufficiency Gate")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.108.1 successfully computed broader covariance mechanics from 1024 solved Planck sample vectors across four chain members.")
          md.append("")
