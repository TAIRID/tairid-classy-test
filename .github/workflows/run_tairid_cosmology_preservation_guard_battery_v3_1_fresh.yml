name: Run TAIRID Cosmology Preservation Guard Battery v3.1 Fresh

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-cosmology-preservation-guard-battery-v3-1-fresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib

      - name: Confirm fresh script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_cosmology_preservation_guard_battery_v3_1_fresh.py
          echo "v3.1 FRESH TAIRID cosmology preservation guard battery found."

      - name: Run TAIRID Cosmology Preservation Guard Battery v3.1 Fresh
        run: |
          python run_tairid_cosmology_preservation_guard_battery_v3_1_fresh.py

      - name: Upload fresh outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-preservation-guard-battery-v3-1-fresh-output
          path: |
            tairid_cosmology_preservation_guard_battery_v3_1_fresh_outputs/**
