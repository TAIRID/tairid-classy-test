name: "!!! AAA CURRENT - TAIRID v4.370 full covariance source candidate review no support"

on:
  workflow_dispatch:

jobs:
  run-v4-370-full-covariance-source-candidate-review-no-support:
    name: "!!! AAA CURRENT - Run v4.370 covariance source review"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.369 output ZIP and human-filled covariance review ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.369 output ZIP..."
          INPUT_369_ZIP="$(ls tairid-v4-369-full-covariance-source-candidate-inventory-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_369_ZIP" ]; then
            echo "Could not find v4.369 output ZIP."
            echo "Expected:"
            echo "tairid-v4-369-full-covariance-source-candidate-inventory-no-support-output.zip"
            exit 1
          fi

          echo "Finding human-filled v4.369 covariance review ZIP..."
          HUMAN_FILLED_COVARIANCE_REVIEW_ZIP="$(ls tairid-v4-369-human-filled-full-covariance-source-review-for-v4-370-no-support*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_COVARIANCE_REVIEW_ZIP" ]; then
            echo "Could not find human-filled covariance review ZIP."
            echo "Expected:"
            echo "tairid-v4-369-human-filled-full-covariance-source-review-for-v4-370-no-support.zip"
            exit 1
          fi

          echo "Using v4.369 ZIP:"
          echo "$INPUT_369_ZIP"

          echo "Using human-filled review ZIP:"
          echo "$HUMAN_FILLED_COVARIANCE_REVIEW_ZIP"

          echo "INPUT_369_ZIP=$INPUT_369_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_COVARIANCE_REVIEW_ZIP=$HUMAN_FILLED_COVARIANCE_REVIEW_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.370 covariance source review script
        run: |
          cat > run_v4_370_full_covariance_source_candidate_review_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "full covariance source candidate review only; no covariance file staged yet; no covariance values loaded; no covariance dimensions confirmed; no row order matched; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          ALLOWED_SOURCE_DECISIONS = {
              "accept_candidate_for_later_covariance_file_search",
              "needs_better_source",
              "reject_candidate",
              "keep_blocked",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def main():
              input_369 = Path(os.environ["INPUT_369_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_COVARIANCE_REVIEW_ZIP"])

              outdir = Path("tairid_v4_370_full_covariance_source_candidate_review_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base369 = extract_zip(input_369, "tairid_v4_370_369_")
              basehuman = extract_zip(human_zip, "tairid_v4_370_human_")

              summary369_path = find_one(base369, "v4_369_summary.json")
              repo_scan_path = find_one(base369, "v4_369_repo_covariance_file_candidate_scan_NO_VALUES_LOADED.csv")
              source_candidates_path = find_one(base369, "v4_369_full_covariance_source_candidates_NO_COVARIANCE_LOADED.csv")
              blank_review_path = find_one(base369, "v4_369_HUMAN_FILL_full_covariance_source_candidate_review_NO_SUPPORT.csv")
              repair_plan_path = find_one(base369, "v4_369_full_covariance_repair_plan_NO_SUPPORT.csv")
              limitations_path = find_one(base369, "v4_369_limitations_after_covariance_candidate_inventory.csv")
              gap369_path = find_one(base369, "v4_369_gap_status_after_full_covariance_source_candidate_inventory.csv")
              route_decision_path = find_one(base369, "v4_369_input_v4_368_route_decision_preserved.csv")
              findings_path = find_one(base369, "v4_369_input_v4_368_guarded_findings_preserved.csv")
              rules369_path = find_one(base369, "v4_369_rule_checks.csv")

              human_review_path = find_one_suffix(basehuman, "HUMAN_FILLED_full_covariance_source_candidate_review_NO_SUPPORT.csv")

              summary369 = json.loads(summary369_path.read_text())
              repo_scan = pd.read_csv(repo_scan_path)
              source_candidates = pd.read_csv(source_candidates_path)
              blank_review = pd.read_csv(blank_review_path)
              repair_plan = pd.read_csv(repair_plan_path)
              limitations = pd.read_csv(limitations_path)
              gap369 = pd.read_csv(gap369_path)
              route_decision = pd.read_csv(route_decision_path)
              findings = pd.read_csv(findings_path)
              rules369 = pd.read_csv(rules369_path)
              human_review = pd.read_csv(human_review_path)

              for col in [
                  "human_covariance_source_decision",
                  "human_covariance_source_url_or_file_note",
                  "human_covariance_source_note",
                  "candidate_accepted_now",
              ]:
                  if col not in human_review.columns:
                      human_review[col] = ""

              ingest_rows = []

              for _, row in human_review.iterrows():
                  decision = clean(row["human_covariance_source_decision"])

                  if decision == "accept_candidate_for_later_covariance_file_search":
                      row_status = "accepted_for_later_covariance_file_search_not_loaded"
                      accepted_now = True
                  elif decision == "needs_better_source":
                      row_status = "blocked_needs_better_source"
                      accepted_now = False
                  elif decision == "reject_candidate":
                      row_status = "rejected_candidate"
                      accepted_now = False
                  elif decision == "keep_blocked":
                      row_status = "kept_blocked_for_now"
                      accepted_now = False
                  else:
                      row_status = "invalid_or_missing_covariance_source_decision"
                      accepted_now = False

                  ingest_rows.append({
                      "v4_370_covariance_source_review_id": f"v4_370_cov_source_review_{len(ingest_rows)+1:03d}",
                      "source_candidate_id": clean(row["source_candidate_id"]),
                      "candidate_name": clean(row["candidate_name"]),
                      "candidate_role": clean(row["candidate_role"]),
                      "human_source_to_locate": clean(row["human_source_to_locate"]),
                      "human_covariance_source_decision": decision,
                      "human_covariance_source_url_or_file_note": clean(row["human_covariance_source_url_or_file_note"]),
                      "human_covariance_source_note": clean(row["human_covariance_source_note"]),
                      "row_review_status": row_status,
                      "candidate_accepted_for_later_file_search": bool(accepted_now),
                      "full_covariance_file_staged": False,
                      "full_covariance_available": False,
                      "full_covariance_values_loaded": False,
                      "covariance_dimension_confirmed": False,
                      "observed_row_order_matched": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              review_ingest = pd.DataFrame(ingest_rows)
              accepted_candidates = review_ingest[review_ingest["candidate_accepted_for_later_file_search"].astype(bool)].copy()
              blocked_candidates = review_ingest[~review_ingest["candidate_accepted_for_later_file_search"].astype(bool)].copy()
              invalid_rows = review_ingest[review_ingest["row_review_status"] == "invalid_or_missing_covariance_source_decision"].copy()

              exact_source_search_packet = accepted_candidates.copy()
              exact_source_search_packet["next_search_or_staging_task"] = "locate_or_upload_exact_covariance_file_or_likelihood_package_header_only"
              exact_source_search_packet["file_or_url_staged_now"] = False
              exact_source_search_packet["covariance_values_loaded"] = False
              exact_source_search_packet["covariance_shape_checked"] = False
              exact_source_search_packet["row_order_checked"] = False
              exact_source_search_packet["support_allowed"] = False

              route_status = pd.DataFrame([
                  {
                      "status_id": "V4_370_STATUS_001",
                      "status": "covariance_source_review_ingested",
                      "detail": f"{len(accepted_candidates)} candidate directions accepted for later exact source/file search.",
                  },
                  {
                      "status_id": "V4_370_STATUS_002",
                      "status": "exact_covariance_file_not_yet_staged",
                      "detail": "No covariance file or URL has been accepted as exact yet.",
                  },
                  {
                      "status_id": "V4_370_STATUS_003",
                      "status": "current_scope_boss_dr12_first",
                      "detail": "The BOSS DR12 current-row repair path is prioritized before broader eBOSS/DR16 expansion.",
                  },
                  {
                      "status_id": "V4_370_STATUS_004",
                      "status": "support_still_blocked",
                      "detail": "support_allowed=false remains active.",
                  },
              ])

              limitation_update = pd.DataFrame([
                  {
                      "limit_id": "V4_370_LIMIT_001",
                      "limit": "Accepted candidates are search directions, not covariance approval.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_370_LIMIT_002",
                      "limit": "No covariance file is staged in v4.370.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_370_LIMIT_003",
                      "limit": "No covariance values are loaded in v4.370.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_370_LIMIT_004",
                      "limit": "No dimension or row-order match is confirmed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_370_LIMIT_005",
                      "limit": "No likelihood, p-values, score, or support claim is allowed.",
                      "status": "blocked_by_design",
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_370_GAP_001",
                      "gap": "Covariance source candidate review ingested.",
                      "status_after_v4_370": "accepted_candidates_available_for_later_exact_source_search",
                      "next_gate": "v4_371_full_covariance_exact_source_locator_or_file_staging_no_values_no_support",
                  },
                  {
                      "gap_id": "V4_370_GAP_002",
                      "gap": "Exact covariance file remains unstaged.",
                      "status_after_v4_370": "still_open",
                      "next_gate": "v4_371_exact_source_locator_or_manual_file_staging",
                  },
                  {
                      "gap_id": "V4_370_GAP_003",
                      "gap": "Covariance values remain unloaded.",
                      "status_after_v4_370": "still_blocked",
                      "next_gate": "later_only_after_exact_file_staged",
                  },
                  {
                      "gap_id": "V4_370_GAP_004",
                      "gap": "Covariance dimensions and observed-row order remain unconfirmed.",
                      "status_after_v4_370": "still_blocked",
                      "next_gate": "later_shape_and_order_gate",
                  },
                  {
                      "gap_id": "V4_370_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_370": "still_blocked",
                      "next_gate": "no_support_claims_allowed_from_v4_370",
                  },
              ])

              hard_checks = {
                  "input_v4_369_summary_found": summary369.get("version") == "v4.369",
                  "input_v4_369_rules_all_passed": summary_rules_all_passed(summary369),
                  "input_v4_369_failed_gates_none": summary369.get("failed_gates") == "none",
                  "input_v4_369_repair_lane_full_covariance": summary369.get("selected_repair_lane") == "full_covariance_repair_lane",
                  "input_v4_369_no_full_covariance": summary369.get("full_covariance_available") is False,
                  "input_v4_369_no_covariance_values_loaded": summary369.get("full_covariance_values_loaded") is False,
                  "input_v4_369_no_covariance_dimension_confirmed": summary369.get("covariance_dimension_confirmed") is False,
                  "input_v4_369_no_row_order_matched": summary369.get("observed_row_order_matched") is False,
                  "input_v4_369_no_likelihood": summary369.get("likelihood_computed") is False,
                  "input_v4_369_no_p_values": summary369.get("p_values_computed") is False,
                  "input_v4_369_no_score_valid": summary369.get("score_valid") is False,
                  "input_v4_369_no_support_allowed": summary369.get("support_allowed") is False,

                  "rules369_all_passed": passed_column_all(rules369),
                  "repo_scan_has_rows": len(repo_scan) >= 1,
                  "source_candidates_rows_equal_4": len(source_candidates) == 4,
                  "blank_review_rows_equal_4": len(blank_review) == 4,
                  "human_review_rows_equal_4": len(human_review) == 4,
                  "repair_plan_rows_equal_4": len(repair_plan) == 4,
                  "limitations_rows_equal_5": len(limitations) == 5,
                  "gap369_rows_equal_5": len(gap369) == 5,
                  "route_decision_rows_equal_1": len(route_decision) == 1,
                  "findings_rows_equal_5": len(findings) == 5,

                  "human_decisions_filled": human_review["human_covariance_source_decision"].apply(clean).ne("").all(),
                  "human_decisions_allowed": human_review["human_covariance_source_decision"].apply(clean).isin(ALLOWED_SOURCE_DECISIONS).all(),
                  "review_ingest_rows_equal_human_review": len(review_ingest) == len(human_review),
                  "accepted_candidates_at_least_two": len(accepted_candidates) >= 2,
                  "accepted_candidates_equal_3": len(accepted_candidates) == 3,
                  "blocked_candidates_equal_1": len(blocked_candidates) == 1,
                  "invalid_rows_equal_0": len(invalid_rows) == 0,
                  "exact_source_search_packet_rows_equal_accepted": len(exact_source_search_packet) == len(accepted_candidates),
                  "route_status_rows_equal_4": len(route_status) == 4,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_full_covariance_file_staged": false_col(review_ingest, "full_covariance_file_staged"),
                  "no_full_covariance_available": false_col(review_ingest, "full_covariance_available"),
                  "no_covariance_values_loaded": false_col(review_ingest, "full_covariance_values_loaded"),
                  "no_covariance_dimension_confirmed": false_col(review_ingest, "covariance_dimension_confirmed"),
                  "no_observed_row_order_matched": false_col(review_ingest, "observed_row_order_matched"),
                  "no_likelihood_computed": false_col(review_ingest, "likelihood_computed"),
                  "no_p_values_computed": false_col(review_ingest, "p_values_computed"),
                  "no_score_valid": false_col(review_ingest, "score_valid"),
                  "no_support_allowed": false_col(review_ingest, "support_allowed") and false_col(exact_source_search_packet, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary370 = {
                  "version": "v4.370",
                  "route_name": "v4_370_full_covariance_source_candidate_human_review_no_support_claims",
                  "expected_result": "v4_370_full_covariance_source_candidate_review_passed_no_covariance_loaded_no_support_claims",
                  "input_version": "v4.369",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "accepted_covariance_source_candidate_rows": int(len(accepted_candidates)),
                  "blocked_covariance_source_candidate_rows": int(len(blocked_candidates)),
                  "exact_source_search_packet_rows": int(len(exact_source_search_packet)),
                  "full_covariance_file_staged": False,
                  "full_covariance_available": False,
                  "full_covariance_values_loaded": False,
                  "covariance_dimension_confirmed": False,
                  "observed_row_order_matched": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "v4_371_full_covariance_exact_source_locator_or_file_staging_no_values_no_support_claims",
              }

              review_ingest.to_csv(outdir / "v4_370_covariance_source_review_ingest_ledger_NO_SUPPORT.csv", index=False)
              accepted_candidates.to_csv(outdir / "v4_370_ACCEPTED_covariance_source_candidates_FOR_LATER_SEARCH_NO_VALUES.csv", index=False)
              blocked_candidates.to_csv(outdir / "v4_370_blocked_covariance_source_candidates.csv", index=False)
              exact_source_search_packet.to_csv(outdir / "v4_370_exact_covariance_source_search_packet_NO_VALUES.csv", index=False)
              route_status.to_csv(outdir / "v4_370_route_status_summary.csv", index=False)
              limitation_update.to_csv(outdir / "v4_370_limitations_after_covariance_source_review.csv", index=False)
              gap_update.to_csv(outdir / "v4_370_gap_status_after_covariance_source_review.csv", index=False)
              human_review.to_csv(outdir / "v4_370_input_human_filled_covariance_source_review_preserved.csv", index=False)
              source_candidates.to_csv(outdir / "v4_370_input_v4_369_source_candidates_preserved.csv", index=False)
              repo_scan.to_csv(outdir / "v4_370_input_v4_369_repo_candidate_scan_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_370_rule_checks.csv", index=False)

              (outdir / "v4_370_summary.json").write_text(json.dumps(summary370, indent=2))

              summary_md = f"""# TAIRID v4.370 Full Covariance Source Candidate Review — No Support Claims

          Expected result: `{summary370["expected_result"]}`

          {summary370["rules_passed"]} / {summary370["rules_total"]} rules passed

          failed_gates = {summary370["failed_gates"]}

          accepted_covariance_source_candidate_rows = {summary370["accepted_covariance_source_candidate_rows"]}

          blocked_covariance_source_candidate_rows = {summary370["blocked_covariance_source_candidate_rows"]}

          full_covariance_file_staged = false

          full_covariance_available = false

          full_covariance_values_loaded = false

          covariance_dimension_confirmed = false

          observed_row_order_matched = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step ingests the human source-candidate review.

          It does **not** stage an exact covariance file.

          It does **not** load covariance values.

          It does **not** confirm covariance dimensions or observed-row order.

          It does **not** compute likelihood or p-values.

          It does **not** make support claims.

          Next route: `{summary370["selected_next_route"]}`
          """
              (outdir / "v4_370_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary370, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_370_full_covariance_source_candidate_review_no_support.py

      - name: Run v4.370 full covariance source candidate review no support
        run: |
          python run_v4_370_full_covariance_source_candidate_review_no_support.py

      - name: Upload v4.370 full covariance source candidate review artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-370-full-covariance-source-candidate-review-no-support-output
          path: |
            tairid_v4_370_full_covariance_source_candidate_review_no_support_output/
            tairid_v4_370_full_covariance_source_candidate_review_no_support_output.zip
