name: 000 TAIRID v4.202 - Cross Domain Shape Lattice Preview Neurotype To Cosmology With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-202-cross-domain-shape-lattice-preview-neurotype-to-cosmology-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-202-cross-domain-shape-lattice-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.202 cross-domain shape lattice preview
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_202_outputs
          cat > tairid_v4_202_outputs/run_v4_202.py <<'PY'
          import csv
          import html
          import json
          import math
          from pathlib import Path

          OUT = Path("tairid_v4_202_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "cross_domain_shape_lattice_preview_neurotype_to_cosmology_passed_lattice_preview_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no cosmology validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved between domains",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "lattice proximity is not validation",
              "manual rows are not empirical subject data",
              "TAIRID not proved"
          ]

          V4_201_STATUS = {
              "version": "v4.201",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "atlas_rows": 9,
              "unique_shape_signatures": 5,
              "six_lanes_present": True,
              "holdout_rows": 4,
              "open_gap_count": 4,
              "package_status": "six_neurotype_shape_atlas_written_no_validation",
              "selected_next_route": "cross_domain_shape_lattice_preview_neurotype_to_cosmology_with_scope_guards"
          }

          COSMOLOGY_NODES = [
              {
                  "node_id": "cosmo_lrgxelg_z0p70",
                  "domain": "cosmology",
                  "label": "LRGxELG z=0.70",
                  "shape_signature": "++-",
                  "viability_direction": "",
                  "evidence_tier": "locked_cosmology_preview",
                  "plain_read": "reach high / pacing high / growth low",
                  "truth_boundary": "limited LRGxELG preview; not full eBOSS covariance"
              },
              {
                  "node_id": "cosmo_lrgxelg_z0p845",
                  "domain": "cosmology",
                  "label": "LRGxELG z=0.845",
                  "shape_signature": "-+-",
                  "viability_direction": "",
                  "evidence_tier": "locked_cosmology_preview",
                  "plain_read": "reach low / pacing high / growth low",
                  "truth_boundary": "limited LRGxELG preview; not full eBOSS covariance"
              },
              {
                  "node_id": "cosmo_qso_z1p48",
                  "domain": "cosmology",
                  "label": "QSO z=1.48",
                  "shape_signature": "-++",
                  "viability_direction": "",
                  "evidence_tier": "locked_cosmology_preview",
                  "plain_read": "reach low / pacing high / growth high",
                  "truth_boundary": "QSO preview; not full eBOSS cross-tracer covariance"
              }
          ]

          NEUROTYPE_ROWS = [
              {
                  "node_id": "neuro_adhd_width_over_depth",
                  "domain": "neurotype",
                  "label": "ADHD width-over-depth",
                  "neurotype_lane": "ADHD",
                  "shape_signature": "++-",
                  "viability_direction": "-",
                  "evidence_tier": "paper_grounded_directional_manual_delta",
                  "plain_read": "reach high / pacing high / consolidation low",
                  "truth_boundary": "needs exact numeric deltas"
              },
              {
                  "node_id": "neuro_autism_dispersion_search",
                  "domain": "neurotype",
                  "label": "Autism measured dispersion/search",
                  "neurotype_lane": "Autism",
                  "shape_signature": "++-",
                  "viability_direction": "-",
                  "evidence_tier": "paper_grounded_correction_manual_delta",
                  "plain_read": "dispersion/search high / friction high / boundary compaction lower",
                  "truth_boundary": "do not force autism into one universal mode"
              },
              {
                  "node_id": "neuro_dyslexia_etdd70",
                  "domain": "neurotype",
                  "label": "Dyslexia ETDD70",
                  "neurotype_lane": "Dyslexia",
                  "shape_signature": "++-",
                  "viability_direction": "-",
                  "evidence_tier": "numeric_ready_paper_grounded",
                  "plain_read": "reading-flow load high / re-entry and viability low",
                  "truth_boundary": "needs subject/group covariance"
              },
              {
                  "node_id": "neuro_aphantasia_visual_gap",
                  "domain": "neurotype",
                  "label": "Aphantasia visual reconstruction gap",
                  "neurotype_lane": "Aphantasia",
                  "shape_signature": "-+-",
                  "viability_direction": "-",
                  "evidence_tier": "numeric_ready_paper_grounded",
                  "plain_read": "visual reach low / burden high / reconstruction viability low",
                  "truth_boundary": "needs subject/group covariance"
              },
              {
                  "node_id": "neuro_bipolar_depression",
                  "domain": "neurotype",
                  "label": "Bipolar depression phase",
                  "neurotype_lane": "Bipolar",
                  "shape_signature": "--+",
                  "viability_direction": "-",
                  "evidence_tier": "phase_specific_manual_surface",
                  "plain_read": "reach low / pacing low / consolidation compressed high",
                  "truth_boundary": "compressed consolidation is not healthy consolidation"
              },
              {
                  "node_id": "neuro_bipolar_mania",
                  "domain": "neurotype",
                  "label": "Bipolar mania/hypomania phase",
                  "neurotype_lane": "Bipolar",
                  "shape_signature": "++-",
                  "viability_direction": "-",
                  "evidence_tier": "phase_specific_manual_surface",
                  "plain_read": "reach high / pacing high / rest consolidation low",
                  "truth_boundary": "needs measured mania/hypomania phase rows"
              },
              {
                  "node_id": "neuro_bipolar_euthymia",
                  "domain": "neurotype",
                  "label": "Bipolar euthymia reference",
                  "neurotype_lane": "Bipolar",
                  "shape_signature": "00+",
                  "viability_direction": "+",
                  "evidence_tier": "reference_surface",
                  "plain_read": "reference rhythm / stable baseline",
                  "truth_boundary": "reference surface, not pathology"
              },
              {
                  "node_id": "neuro_bipolar_mixed",
                  "domain": "neurotype",
                  "label": "Bipolar mixed/transition",
                  "neurotype_lane": "Bipolar",
                  "shape_signature": "MMMM",
                  "viability_direction": "M",
                  "evidence_tier": "holdout_manual_phase_surface",
                  "plain_read": "off-axis mixed phase overlap",
                  "truth_boundary": "do not force into mania or depression"
              },
              {
                  "node_id": "neuro_schizotypy_positive",
                  "domain": "neurotype",
                  "label": "Schizotypy positive overreach",
                  "neurotype_lane": "Schizotypy",
                  "shape_signature": "++-",
                  "viability_direction": "-",
                  "evidence_tier": "paper_grounded_directional_manual_delta",
                  "plain_read": "reference reach high / salience pull high / anchor specificity low",
                  "truth_boundary": "positive trait lane only"
              }
          ]

          HOLDOUT_NODES = [
              {
                  "node_id": "holdout_autism_compact_depth",
                  "domain": "holdout",
                  "label": "Autism compact-depth future surface",
                  "shape_signature": "holdout",
                  "evidence_tier": "do_not_force",
                  "truth_boundary": "needs stable/local-fit/rule-bound/sensory-detail task surface"
              },
              {
                  "node_id": "holdout_schizotypy_disorganized",
                  "domain": "holdout",
                  "label": "Schizotypy disorganized drift",
                  "shape_signature": "holdout",
                  "evidence_tier": "do_not_force",
                  "truth_boundary": "not same as positive overreach"
              },
              {
                  "node_id": "holdout_schizotypy_negative",
                  "domain": "holdout",
                  "label": "Schizotypy negative underreach",
                  "shape_signature": "holdout",
                  "evidence_tier": "do_not_force",
                  "truth_boundary": "needs switching/maintenance and underreach measures"
              },
              {
                  "node_id": "holdout_bipolar_mixed",
                  "domain": "holdout",
                  "label": "Bipolar mixed transition holdout",
                  "shape_signature": "holdout",
                  "evidence_tier": "do_not_force",
                  "truth_boundary": "off-axis/mixed, not forced into clean row"
              }
          ]

          GAP_NODES = [
              {
                  "node_id": "gap_subject_axis_covariance",
                  "domain": "gap",
                  "label": "G1 subject/group axis covariance",
                  "truth_boundary": "needed for dyslexia and aphantasia"
              },
              {
                  "node_id": "gap_real_numeric_deltas",
                  "domain": "gap",
                  "label": "G2 real numeric deltas",
                  "truth_boundary": "needed for ADHD, autism, schizotypy"
              },
              {
                  "node_id": "gap_bipolar_phase_data",
                  "domain": "gap",
                  "label": "G3 measured bipolar phase data",
                  "truth_boundary": "needed for bipolar surfaces"
              },
              {
                  "node_id": "gap_holdout_surface_tests",
                  "domain": "gap",
                  "label": "G4 holdout surface tests",
                  "truth_boundary": "needed to avoid forced matching"
              }
          ]

          SIGNATURES = sorted(set([n["shape_signature"] for n in COSMOLOGY_NODES + NEUROTYPE_ROWS if n["shape_signature"] not in ["holdout"]]))
          SIGNATURE_NODES = [
              {
                  "node_id": "sig_" + sig.replace("+", "plus").replace("-", "minus").replace("0", "zero").replace("M", "M"),
                  "domain": "signature",
                  "label": "signature " + sig,
                  "shape_signature": sig,
                  "truth_boundary": "signature cluster; not validation"
              }
              for sig in SIGNATURES
          ]

          ALL_NODES = COSMOLOGY_NODES + NEUROTYPE_ROWS + SIGNATURE_NODES + HOLDOUT_NODES + GAP_NODES

          def sig_node_id(sig):
              return "sig_" + sig.replace("+", "plus").replace("-", "minus").replace("0", "zero").replace("M", "M")

          EDGES = []
          for node in COSMOLOGY_NODES + NEUROTYPE_ROWS:
              EDGES.append({
                  "source": node["node_id"],
                  "target": sig_node_id(node["shape_signature"]),
                  "edge_type": "has_signature",
                  "claim_boundary": "same signature means relational shape proximity only"
              })

          # Direct same-signature cosmology-neurotype edges.
          for cosmo in COSMOLOGY_NODES:
              for neuro in NEUROTYPE_ROWS:
                  if cosmo["shape_signature"] == neuro["shape_signature"]:
                      EDGES.append({
                          "source": neuro["node_id"],
                          "target": cosmo["node_id"],
                          "edge_type": "same_locked_signature",
                          "claim_boundary": "not shared cause; not validation"
                      })

          # Gap edges.
          for node in ["neuro_dyslexia_etdd70", "neuro_aphantasia_visual_gap"]:
              EDGES.append({"source": node, "target": "gap_subject_axis_covariance", "edge_type": "blocked_by_gap", "claim_boundary": "gap remains open"})
          for node in ["neuro_adhd_width_over_depth", "neuro_autism_dispersion_search", "neuro_schizotypy_positive"]:
              EDGES.append({"source": node, "target": "gap_real_numeric_deltas", "edge_type": "blocked_by_gap", "claim_boundary": "gap remains open"})
          for node in ["neuro_bipolar_depression", "neuro_bipolar_mania", "neuro_bipolar_euthymia", "neuro_bipolar_mixed"]:
              EDGES.append({"source": node, "target": "gap_bipolar_phase_data", "edge_type": "blocked_by_gap", "claim_boundary": "gap remains open"})
          for node in [n["node_id"] for n in HOLDOUT_NODES]:
              EDGES.append({"source": node, "target": "gap_holdout_surface_tests", "edge_type": "blocked_by_gap", "claim_boundary": "gap remains open"})

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          node_fields = sorted(set().union(*[set(n.keys()) for n in ALL_NODES]))
          edge_fields = ["source", "target", "edge_type", "claim_boundary"]

          write_csv(OUT / "v4_202_lattice_nodes.csv", ALL_NODES, node_fields)
          write_csv(OUT / "v4_202_lattice_edges.csv", EDGES, edge_fields)

          cluster_rows = []
          for sig in SIGNATURES:
              members = [n for n in COSMOLOGY_NODES + NEUROTYPE_ROWS if n["shape_signature"] == sig]
              cluster_rows.append({
                  "shape_signature": sig,
                  "member_count": len(members),
                  "cosmology_count": sum(1 for n in members if n["domain"] == "cosmology"),
                  "neurotype_count": sum(1 for n in members if n["domain"] == "neurotype"),
                  "members": "; ".join(n["label"] for n in members),
                  "claim_boundary": "cluster membership is not validation"
              })
          write_csv(OUT / "v4_202_signature_clusters.csv", cluster_rows, ["shape_signature", "member_count", "cosmology_count", "neurotype_count", "members", "claim_boundary"])

          gap_rows = []
          for gap in GAP_NODES:
              blocked = [e["source"] for e in EDGES if e["target"] == gap["node_id"]]
              gap_rows.append({
                  "gap_id": gap["node_id"],
                  "gap_label": gap["label"],
                  "blocked_node_count": len(blocked),
                  "blocked_nodes": "; ".join(blocked),
                  "truth_boundary": gap["truth_boundary"]
              })
          write_csv(OUT / "v4_202_gap_edges_summary.csv", gap_rows, ["gap_id", "gap_label", "blocked_node_count", "blocked_nodes", "truth_boundary"])

          # Simple deterministic SVG layout. This is a visualization aid only.
          positions = {}
          # columns
          xs = {
              "cosmology": 120,
              "signature": 430,
              "neurotype": 760,
              "holdout": 1060,
              "gap": 1060
          }
          sig_order = {sig: 120 + i * 95 for i, sig in enumerate(SIGNATURES)}
          for i, n in enumerate(COSMOLOGY_NODES):
              positions[n["node_id"]] = (xs["cosmology"], 100 + i * 120)
          for n in SIGNATURE_NODES:
              positions[n["node_id"]] = (xs["signature"], sig_order[n["shape_signature"]])
          neuro_y = 70
          for i, n in enumerate(NEUROTYPE_ROWS):
              positions[n["node_id"]] = (xs["neurotype"], neuro_y + i * 70)
          for i, n in enumerate(HOLDOUT_NODES):
              positions[n["node_id"]] = (xs["holdout"], 70 + i * 70)
          for i, n in enumerate(GAP_NODES):
              positions[n["node_id"]] = (xs["gap"], 430 + i * 70)

          node_lookup = {n["node_id"]: n for n in ALL_NODES}

          def esc(x):
              return html.escape(str(x))

          svg = []
          svg.append('<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="760" viewBox="0 0 1220 760">')
          svg.append('<rect x="0" y="0" width="1220" height="760" fill="white"/>')
          svg.append('<text x="30" y="34" font-family="Arial" font-size="22" font-weight="bold">TAIRID v4.202 guarded shape lattice preview</text>')
          svg.append('<text x="30" y="58" font-family="Arial" font-size="13">Relational shape proximity only — not validation, not shared cause, not unit equivalence.</text>')
          svg.append('<text x="70" y="84" font-family="Arial" font-size="14" font-weight="bold">Cosmology</text>')
          svg.append('<text x="385" y="84" font-family="Arial" font-size="14" font-weight="bold">Shape signatures</text>')
          svg.append('<text x="700" y="84" font-family="Arial" font-size="14" font-weight="bold">Neurotype atlas</text>')
          svg.append('<text x="1010" y="84" font-family="Arial" font-size="14" font-weight="bold">Holdouts / gaps</text>')

          for e in EDGES:
              if e["source"] in positions and e["target"] in positions:
                  x1, y1 = positions[e["source"]]
                  x2, y2 = positions[e["target"]]
                  dash = ' stroke-dasharray="5 4"' if e["edge_type"] == "blocked_by_gap" else ""
                  width = "1.2" if e["edge_type"] != "same_locked_signature" else "1.7"
                  svg.append(f'<line x1="{x1}" y1="{y1}" x2="{x2}" y2="{y2}" stroke="black" stroke-width="{width}" opacity="0.32"{dash}/>')

          for n in ALL_NODES:
              x, y = positions[n["node_id"]]
              domain = n["domain"]
              if domain == "signature":
                  rx, ry, w, h = x - 70, y - 22, 140, 44
              elif domain in ["gap", "holdout"]:
                  rx, ry, w, h = x - 105, y - 24, 210, 48
              else:
                  rx, ry, w, h = x - 115, y - 25, 230, 50
              fill = "#f2f2f2" if domain == "signature" else "#ffffff"
              stroke_dash = ' stroke-dasharray="4 3"' if domain in ["gap", "holdout"] else ""
              svg.append(f'<rect x="{rx}" y="{ry}" width="{w}" height="{h}" rx="10" ry="10" fill="{fill}" stroke="black" stroke-width="1"{stroke_dash}/>')
              label = n.get("label", n["node_id"])
              sig = n.get("shape_signature", "")
              svg.append(f'<text x="{x}" y="{y-5}" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">{esc(label[:32])}</text>')
              if sig:
                  svg.append(f'<text x="{x}" y="{y+12}" text-anchor="middle" font-family="Arial" font-size="10">sig: {esc(sig)}</text>')
          svg.append('</svg>')

          (OUT / "v4_202_shape_lattice_preview.svg").write_text("\n".join(svg), encoding="utf-8")

          html_doc = [
              "<!doctype html>",
              "<html><head><meta charset='utf-8'><title>TAIRID v4.202 shape lattice preview</title></head>",
              "<body>",
              "<h1>TAIRID v4.202 guarded shape lattice preview</h1>",
              "<p><strong>Boundary:</strong> relational shape proximity only. This is not validation, not shared cause, and not unit equivalence.</p>",
              (OUT / "v4_202_shape_lattice_preview.svg").read_text(encoding="utf-8"),
              "<h2>Cluster summary</h2>",
              "<ul>"
          ]
          for row in cluster_rows:
              html_doc.append(f"<li><strong>{esc(row['shape_signature'])}</strong>: {esc(row['members'])}</li>")
          html_doc.extend(["</ul>", "</body></html>"])
          (OUT / "v4_202_shape_lattice_preview.html").write_text("\n".join(html_doc), encoding="utf-8")

          claim_rows = [
              {
                  "claim": "The lattice shows true cross-domain scaling.",
                  "status": "blocked",
                  "safe_wording": "The lattice previews relational shape proximity only.",
                  "forbidden_wording": "The lattice validates TAIRID across cosmology and neurotypes."
              },
              {
                  "claim": "A shared signature means shared cause.",
                  "status": "blocked",
                  "safe_wording": "A shared signature means the rows share a sign-pattern in the selected axes.",
                  "forbidden_wording": "The same signature means the same mechanism."
              },
              {
                  "claim": "The lattice helps decide what to test next.",
                  "status": "allowed",
                  "safe_wording": "The lattice helps prioritize gap closure: covariance, real deltas, phase data, and holdout tests.",
                  "forbidden_wording": "The lattice removes the need for more data."
              }
          ]
          write_csv(OUT / "v4_202_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          next_routes = [
              {
                  "priority": 1,
                  "route": "real_numeric_gap_closure_workbench_with_scope_guards",
                  "why": "The lattice shows the structure; the next stronger move is a single workbench for missing real numeric tables.",
                  "needed": "dyslexia/aphantasia subject-axis rows, ADHD/autism/schizotypy deltas, bipolar phase data"
              },
              {
                  "priority": 2,
                  "route": "shape_lattice_update_after_real_inputs_with_scope_guards",
                  "why": "Once real numeric rows exist, update the lattice and compare manual vs measured rows.",
                  "needed": "rerun after data tables are added"
              },
              {
                  "priority": 3,
                  "route": "holdout_surface_test_design_with_scope_guards",
                  "why": "Autism compact-depth, schizotypy disorganized/negative, and bipolar mixed states need targeted surfaces.",
                  "needed": "task-specific test design"
              }
          ]
          write_csv(OUT / "v4_202_next_routes.csv", next_routes, ["priority", "route", "why", "needed"])

          route_decision = {
              "version": "v4.202",
              "result_label": RESULT_LABEL,
              "clean_result": "A guarded shape lattice preview was written using the locked cosmology signatures and the six-neurotype atlas. It visualizes relational proximity and gaps without claiming validation.",
              "node_count": len(ALL_NODES),
              "edge_count": len(EDGES),
              "signature_cluster_count": len(cluster_rows),
              "gap_count": len(GAP_NODES),
              "svg_written": True,
              "html_written": True,
              "selected_next_route": "real_numeric_gap_closure_workbench_with_scope_guards",
              "truth_boundary": "lattice preview only; not validation, not unit equivalence, not causal equivalence",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_202_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_202_scope_guards.json").write_text(json.dumps({
              "scope": "cross-domain shape lattice preview from locked cosmology and six-neurotype atlas",
              "lattice_is_validation": False,
              "same_signature_is_shared_cause": False,
              "manual_rows_are_subject_data": False,
              "raw_numbers_moved_between_domains": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_202_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.202 - Cross-Domain Shape Lattice Preview",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "The locked cosmology signatures and the six-neurotype shape atlas were converted into a guarded lattice preview.",
              "",
              "Node count: `" + str(len(ALL_NODES)) + "`",
              "Edge count: `" + str(len(EDGES)) + "`",
              "Signature clusters: `" + str(len(cluster_rows)) + "`",
              "Gap count: `" + str(len(GAP_NODES)) + "`",
              "",
              "Selected next route: `real_numeric_gap_closure_workbench_with_scope_guards`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_202_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_202_lattice_nodes.csv",
              "v4_202_lattice_edges.csv",
              "v4_202_signature_clusters.csv",
              "v4_202_gap_edges_summary.csv",
              "v4_202_shape_lattice_preview.svg",
              "v4_202_shape_lattice_preview.html",
              "v4_202_claim_boundary_matrix.csv",
              "v4_202_next_routes.csv",
              "v4_202_route_decision.json",
              "v4_202_scope_guards.json",
              "v4_202_blocked_claims.json",
              "v4_202_summary.md"
          ]

          rules = {
              "version_is_v4_202": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_201_status_reviewed": V4_201_STATUS["rule_pass_count"] == 10,
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "node_count_sufficient": len(ALL_NODES) >= 20,
              "edge_count_sufficient": len(EDGES) >= 20,
              "clusters_written": len(cluster_rows) >= 5,
              "svg_written": (OUT / "v4_202_shape_lattice_preview.svg").exists(),
              "html_written": (OUT / "v4_202_shape_lattice_preview.html").exists(),
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.202",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "node_count": len(ALL_NODES),
              "edge_count": len(EDGES),
              "signature_cluster_count": len(cluster_rows),
              "gap_count": len(GAP_NODES),
              "package_status": "shape_lattice_preview_written_no_validation",
              "selected_next_route": "real_numeric_gap_closure_workbench_with_scope_guards",
              "claim_boundary": "lattice_preview_only_no_validation"
          }

          (OUT / "v4_202_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.202 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_202_outputs/run_v4_202.py

      - name: Upload v4.202 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-202-cross-domain-shape-lattice-preview-output
          path: tairid_v4_202_outputs/
