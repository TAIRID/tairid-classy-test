name: 000 TAIRID v4.216 - Shape Lattice Update After G1 Candidate Covariance Preview With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-216-shape-lattice-update-after-g1-candidate-covariance-preview-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"
      - "outputs/**"
      - "artifacts/**"

permissions:
  contents: read

jobs:
  v4-216-shape-lattice-update-after-g1-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.216 shape lattice update after G1 candidate covariance preview
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_216_outputs
          cat > tairid_v4_216_outputs/run_v4_216.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          OUT = Path("tairid_v4_216_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "shape_lattice_update_after_g1_candidate_covariance_preview_passed_lattice_update_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no dyslexia validation",
              "no aphantasia validation",
              "no clinical diagnosis claim",
              "no cosmology validation",
              "no claim that G1 proves TAIRID",
              "no claim that neurotype data proves cosmology",
              "no raw numbers moved between domains",
              "no unit equivalence across dyslexia and aphantasia surfaces",
              "no causal equivalence across dyslexia and aphantasia surfaces",
              "no publication-grade scaling law",
              "candidate covariance preview is not validation",
              "mixed-surface matrix is diagnostic only",
              "aphantasia remains questionnaire-only",
              "drawing-performance scoring remains open",
              "TAIRID not proved"
          ]

          V4_215_STATUS = {
              "version": "v4.215",
              "result_label": "g1_candidate_subject_axis_covariance_correlation_preview_passed_matrices_written_no_validation",
              "rule_pass_count": 12,
              "rule_total_count": 12,
              "failed_gates": [],
              "downloaded_count": 3,
              "combined_candidate_rows": 324,
              "dyslexia_rows": 210,
              "aphantasia_rows": 114,
              "matrix_summary_rows": 7,
              "covariance_rows": 112,
              "correlation_rows": 112,
              "eigenmode_rows": 28,
              "ready_for_lattice_update": True,
              "package_status": "g1_candidate_covariance_correlation_preview_written_ready_for_lattice_update",
              "selected_next_route": "shape_lattice_update_after_g1_candidate_covariance_preview_with_scope_guards"
          }

          # Frozen preview values are copied from the successful v4.215 artifact.
          # This workflow updates the lattice from that preview. It does not re-run parsing.
          G1_DELTA_ROWS = [
              {
                  "lane": "Aphantasia",
                  "comparison": "aphantasia_minus_control",
                  "boundary_or_task": "Aphantasia_questionnaire_profile",
                  "case_n": 63,
                  "reference_n": 51,
                  "propagation_reach_delta": -1.929546,
                  "pacing_access_delta": 1.929546,
                  "consolidation_growth_delta": -0.847575,
                  "viability_or_outcome_delta": -1.388561,
                  "resolved_three_axis_signature": "-+-",
                  "resolved_four_axis_signature": "-+--",
                  "matches_expected_three_axis": True,
                  "matches_expected_four_axis": True,
