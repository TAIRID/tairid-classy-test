                  "pacing_access_delta": 0.916680,
                  "consolidation_growth_delta": -0.802106,
                  "viability_or_outcome_delta": -1.017389,
                  "resolved_three_axis_signature": "++-",
                  "resolved_four_axis_signature": "++--",
                  "matches_expected_three_axis": True,
                  "matches_expected_four_axis": True,
                  "surface_warning": "ETDD70 reading eye-tracking task metrics"
              },
              {
                  "lane": "Dyslexia",
                  "comparison": "dyslexic_minus_non_dyslexic",
                  "boundary_or_task": "ETDD70_T5_Pseudo_Text",
                  "case_n": 35,
                  "reference_n": 35,
                  "propagation_reach_delta": 1.167263,
                  "pacing_access_delta": 1.029576,
                  "consolidation_growth_delta": -0.903180,
                  "viability_or_outcome_delta": -1.360241,
                  "resolved_three_axis_signature": "++-",
                  "resolved_four_axis_signature": "++--",
                  "matches_expected_three_axis": True,
                  "matches_expected_four_axis": True,
                  "surface_warning": "ETDD70 reading eye-tracking task metrics"
              },
              {
                  "lane": "Dyslexia",
                  "comparison": "dyslexic_minus_non_dyslexic",
                  "boundary_or_task": "Dyslexia_ALL_TASKS",
                  "case_n": 105,
                  "reference_n": 105,
                  "propagation_reach_delta": 0.901650,
                  "pacing_access_delta": 0.797102,
                  "consolidation_growth_delta": -0.699766,
                  "viability_or_outcome_delta": -0.962944,
                  "resolved_three_axis_signature": "++-",
                  "resolved_four_axis_signature": "++--",
                  "matches_expected_three_axis": True,
                  "matches_expected_four_axis": True,
                  "surface_warning": "ETDD70 reading eye-tracking task metrics"
              }
          ]

          CORRELATION_SIGNATURE_ROWS = [
              {
                  "subset_id": "G1_DYSLEXIA_ONLY",
                  "subset_type": "lane",
                  "n_rows": 210,
                  "corr_reach_viability": -0.958,
                  "corr_reach_consolidation": -0.913,
                  "corr_pacing_viability": -0.829,
                  "corr_consolidation_viability": 0.804,
                  "primary_read": "Inside ETDD70 dyslexia candidate mapping, reach/load and pacing pressure rise while viability and consolidation fall.",
                  "claim_boundary": "candidate lane correlation only; not dyslexia validation"
              },
              {
                  "subset_id": "G1_APHANTASIA_ONLY",
                  "subset_type": "lane",
                  "n_rows": 114,
                  "corr_reach_viability": 0.851,
                  "corr_reach_consolidation": 0.449,
                  "corr_pacing_viability": -0.851,
                  "corr_consolidation_viability": 0.851,
                  "primary_read": "Inside VVIQ/OSIQ aphantasia candidate mapping, lower visual reach corresponds to higher burden and lower viability; pacing is inverse VVIQ by construction.",
                  "claim_boundary": "candidate questionnaire-only correlation; not aphantasia validation"
              },
              {
                  "subset_id": "G1_COMBINED_MIXED_SURFACE",
                  "subset_type": "combined_mixed_surface",
                  "n_rows": 324,
                  "corr_reach_viability": -0.366,
                  "corr_reach_consolidation": -0.340,
                  "corr_pacing_viability": -0.823,
                  "corr_consolidation_viability": 0.807,
                  "primary_read": "The combined mixed surface keeps viability opposed to pacing and aligned with consolidation, but it is diagnostic only because source surfaces differ.",
                  "claim_boundary": "mixed-surface diagnostic only; no unit equivalence"
              }
          ]

          EIGENMODE_SUMMARY_ROWS = [
              {
                  "subset_id": "G1_DYSLEXIA_ONLY",
                  "mode_rank": 1,
                  "eigenvalue": 3.421468,
                  "loading_pattern": "+ + - -",
                  "plain_read": "dominant dyslexia candidate mode: reach and pacing rise opposite consolidation and viability",
                  "claim_boundary": "candidate eigenmode only"
              },
              {
                  "subset_id": "G1_APHANTASIA_ONLY",
                  "mode_rank": 1,
                  "eigenvalue": 3.255937,
                  "loading_pattern": "+ - + +",
                  "plain_read": "dominant aphantasia questionnaire mode follows VVIQ/OSIQ construction; burden axis is inverse visual reach",
                  "claim_boundary": "questionnaire-only eigenmode; not independent-axis proof"
              },
              {
                  "subset_id": "G1_COMBINED_MIXED_SURFACE",
                  "mode_rank": 1,
                  "eigenvalue": 2.560939,
                  "loading_pattern": "- - + +",
                  "plain_read": "mixed diagnostic mode: viability/consolidation cluster against access pressure, but source-surface warning applies",
                  "claim_boundary": "mixed diagnostic only"
              }
          ]

          PREVIOUS_LATTICE_SIGNATURES = [
              {
                  "node_id": "cosmo_lrgxelg_z0p70",
                  "domain": "cosmology",
                  "label": "LRGxELG z=0.70",
                  "shape_signature": "++-",
                  "evidence_tier": "locked_cosmology_preview",
                  "claim_boundary": "cosmology preview only; not validation"
              },
              {
                  "node_id": "cosmo_lrgxelg_z0p845",
                  "domain": "cosmology",
                  "label": "LRGxELG z=0.845",
                  "shape_signature": "-+-",
                  "evidence_tier": "locked_cosmology_preview",
                  "claim_boundary": "cosmology preview only; not validation"
              },
              {
                  "node_id": "cosmo_qso_z1p48",
                  "domain": "cosmology",
                  "label": "QSO z=1.48",
                  "shape_signature": "-++",
                  "evidence_tier": "locked_cosmology_preview",
                  "claim_boundary": "cosmology preview only; not validation"
              },
              {
                  "node_id": "neuro_adhd_width_over_depth",
                  "domain": "neurotype",
                  "label": "ADHD width-over-depth",
                  "shape_signature": "++-",
                  "evidence_tier": "paper_grounded_directional_manual_delta",
                  "claim_boundary": "needs real numeric deltas"
              },
              {
                  "node_id": "neuro_autism_dispersion_search",
                  "domain": "neurotype",
                  "label": "Autism measured dispersion/search",
                  "shape_signature": "++-",
                  "evidence_tier": "paper_grounded_correction_manual_delta",
                  "claim_boundary": "do not force autism into one universal mode"
              },
              {
                  "node_id": "neuro_bipolar_mania",
                  "domain": "neurotype",
                  "label": "Bipolar mania/hypomania phase",
                  "shape_signature": "++-",
                  "evidence_tier": "phase_specific_manual_surface",
                  "claim_boundary": "needs measured phase rows"
              },
              {
                  "node_id": "neuro_schizotypy_positive",
                  "domain": "neurotype",
                  "label": "Schizotypy positive overreach",
                  "shape_signature": "++-",
                  "evidence_tier": "paper_grounded_directional_manual_delta",
                  "claim_boundary": "positive trait lane only"
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def sig_node_id(sig):
              return "sig_" + sig.replace("+", "plus").replace("-", "minus").replace("0", "zero").replace("M", "M")

          # Build updated nodes.
          lattice_nodes = []
          lattice_edges = []

          for row in PREVIOUS_LATTICE_SIGNATURES:
              lattice_nodes.append(dict(row))
              lattice_edges.append({
                  "source": row["node_id"],
                  "target": sig_node_id(row["shape_signature"]),
                  "edge_type": "has_signature",
                  "claim_boundary": "signature proximity only"
              })

          for row in G1_DELTA_ROWS:
              if row["boundary_or_task"] == "Dyslexia_ALL_TASKS":
                  node_id = "g1_dyslexia_all_tasks_candidate_cov_preview"
                  label = "G1 Dyslexia all-task candidate covariance preview"
                  surface = "ETDD70 task metrics"
              elif row["lane"] == "Aphantasia":
                  node_id = "g1_aphantasia_questionnaire_candidate_cov_preview"
                  label = "G1 Aphantasia questionnaire candidate covariance preview"
                  surface = "VVIQ/OSIQ questionnaire-only"
              else:
                  node_id = "g1_" + row["boundary_or_task"].lower().replace(" ", "_").replace("-", "_")
                  label = "G1 " + row["boundary_or_task"]
                  surface = "ETDD70 task metrics"

              lattice_nodes.append({
                  "node_id": node_id,
                  "domain": "neurotype_g1_candidate_numeric",
                  "label": label,
                  "shape_signature": row["resolved_three_axis_signature"],
                  "four_axis_signature": row["resolved_four_axis_signature"],
                  "evidence_tier": "candidate_numeric_covariance_preview",
                  "source_surface": surface,
                  "claim_boundary": row["surface_warning"] + "; not validation"
              })
              lattice_edges.append({
                  "source": node_id,
                  "target": sig_node_id(row["resolved_three_axis_signature"]),
                  "edge_type": "has_signature",
                  "claim_boundary": "G1 candidate signature only; not validation"
              })

          signatures = sorted(set(node["shape_signature"] for node in lattice_nodes))
          for sig in signatures:
              lattice_nodes.append({
                  "node_id": sig_node_id(sig),
                  "domain": "signature",
                  "label": "signature " + sig,
                  "shape_signature": sig,
                  "four_axis_signature": "",
                  "evidence_tier": "signature_cluster",
                  "source_surface": "",
                  "claim_boundary": "cluster node only; not validation"
              })

          # Cross-domain proximity edges from G1 rows to cosmology signatures, guarded.
          for node in [n for n in lattice_nodes if n.get("domain") == "neurotype_g1_candidate_numeric"]:
              for cosmo in [n for n in lattice_nodes if n.get("domain") == "cosmology"]:
                  if node["shape_signature"] == cosmo["shape_signature"]:
                      lattice_edges.append({
                          "source": node["node_id"],
                          "target": cosmo["node_id"],
                          "edge_type": "same_signature_guarded_proximity",
                          "claim_boundary": "same relational signature only; no shared cause or validation"
                      })

          cluster_rows = []
          for sig in signatures:
              members = [n for n in lattice_nodes if n.get("shape_signature") == sig and n.get("domain") != "signature"]
              cluster_rows.append({
                  "shape_signature": sig,
                  "member_count": len(members),
                  "g1_candidate_numeric_count": sum(1 for n in members if n.get("domain") == "neurotype_g1_candidate_numeric"),
                  "cosmology_count": sum(1 for n in members if n.get("domain") == "cosmology"),
                  "other_neurotype_count": sum(1 for n in members if n.get("domain") == "neurotype"),
                  "members": "; ".join(n["label"] for n in members),
                  "claim_boundary": "signature cluster only; not validation"
              })

          # G1 lessons for cosmology.
          method_transfer_rows = [
              {
                  "lesson": "separate source surfaces before interpreting mixed matrices",
                  "g1_evidence": "mixed G1 matrix was diagnostic only because dyslexia and aphantasia surfaces differ",
                  "cosmology_transfer": "separate tracer/source roles before reading a combined growth or geometry matrix",
                  "safe_next_use": "apply to LRG/ELG/QSO covariance handling",
                  "claim_boundary": "method transfer only; not cosmology validation"
              },
              {
                  "lesson": "delta signatures and covariance modes answer different questions",
                  "g1_evidence": "dyslexia and aphantasia signatures remained distinct while covariance/eigenmodes described internal axis coupling",
                  "cosmology_transfer": "keep residual direction, covariance coupling, and tracer role as separate layers",
                  "safe_next_use": "avoid treating one z-score as the whole cosmology signal",
                  "claim_boundary": "method transfer only"
              },
              {
                  "lesson": "constructed inverse axes must be flagged",
                  "g1_evidence": "aphantasia pacing is inverse VVIQ by construction",
                  "cosmology_transfer": "flag derived or dependent parameters before interpreting covariance as independent evidence",
                  "safe_next_use": "audit cosmology derived quantities and covariance dependencies",
                  "claim_boundary": "dependency guard only"
              },
              {
                  "lesson": "same shape does not mean same cause",
                  "g1_evidence": "Dyslexia ++- and cosmology LRGxELG ++- are only relationally similar",
                  "cosmology_transfer": "use shape proximity to prioritize tests, not to declare shared mechanism",
                  "safe_next_use": "rank candidate cosmology gap tests by persistent shape, not proof language",
                  "claim_boundary": "no shared cause claim"
              }
          ]

          claim_rows = [
              {
                  "claim": "G1 covariance/correlation validates TAIRID.",
                  "status": "blocked",
                  "safe_wording": "G1 provides candidate covariance/correlation previews under guarded mappings.",
                  "forbidden_wording": "G1 proves TAIRID."
              },
              {
                  "claim": "G1 neurotype shapes validate cosmology.",
                  "status": "blocked",
                  "safe_wording": "G1 gives a method-transfer lesson for shape/covariance handling.",
                  "forbidden_wording": "Neurotype data proves cosmology."
              },
              {
                  "claim": "Same signature means same cause.",
                  "status": "blocked",
                  "safe_wording": "Same signature means relational proximity in selected axes only.",
                  "forbidden_wording": "Same signature means shared mechanism."
              },
              {
                  "claim": "Aphantasia mapping includes drawing performance.",
                  "status": "blocked",
                  "safe_wording": "Aphantasia remains VVIQ/OSIQ questionnaire-only in G1.",
                  "forbidden_wording": "The drawing-performance lane is complete."
              }
          ]

          next_routes = [
              {
                  "priority": 1,
                  "route": "return_to_cosmology_covariance_shape_method_transfer_with_scope_guards",
                  "condition": "G1 lattice update written",
                  "next_action": "Use the G1 method lessons to refine cosmology covariance/source-surface gap tests."
              },
              {
                  "priority": 2,
                  "route": "aphantasia_drawing_feature_or_score_extraction_gap_with_scope_guards",
                  "condition": "aphantasia questionnaire-only limitation remains",
                  "next_action": "Search for scored drawing fields or build feature extraction separately."
              },
              {
                  "priority": 3,
                  "route": "g2_real_numeric_delta_acquisition_for_adhd_autism_schizotypy_with_scope_guards",
                  "condition": "after G1 update is recorded",
                  "next_action": "Begin closing G2 with real numeric deltas."
              }
          ]

          package_status = "g1_shape_lattice_update_written_ready_for_cosmology_method_transfer"
          selected_next_route = "return_to_cosmology_covariance_shape_method_transfer_with_scope_guards"

          write_csv(OUT / "v4_216_v4_215_status_review.csv", [V4_215_STATUS], list(V4_215_STATUS.keys()))
          (OUT / "v4_216_v4_215_status_review.json").write_text(json.dumps(V4_215_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_216_g1_delta_signature_update.csv", G1_DELTA_ROWS, [
