              "corr_reach_consolidation", "corr_pacing_viability",
              "corr_consolidation_viability", "primary_read", "claim_boundary"
          ])
          write_csv(OUT / "v4_216_g1_eigenmode_summary.csv", EIGENMODE_SUMMARY_ROWS, [
              "subset_id", "mode_rank", "eigenvalue", "loading_pattern", "plain_read", "claim_boundary"
          ])
          write_csv(OUT / "v4_216_updated_lattice_nodes.csv", lattice_nodes, [
              "node_id", "domain", "label", "shape_signature", "four_axis_signature",
              "evidence_tier", "source_surface", "claim_boundary"
          ])
          write_csv(OUT / "v4_216_updated_lattice_edges.csv", lattice_edges, [
              "source", "target", "edge_type", "claim_boundary"
          ])
          write_csv(OUT / "v4_216_signature_cluster_summary.csv", cluster_rows, [
              "shape_signature", "member_count", "g1_candidate_numeric_count",
              "cosmology_count", "other_neurotype_count", "members", "claim_boundary"
          ])
          write_csv(OUT / "v4_216_cosmology_method_transfer_ledger.csv", method_transfer_rows, [
              "lesson", "g1_evidence", "cosmology_transfer", "safe_next_use", "claim_boundary"
          ])
          write_csv(OUT / "v4_216_claim_boundary_matrix.csv", claim_rows, [
              "claim", "status", "safe_wording", "forbidden_wording"
          ])
          write_csv(OUT / "v4_216_next_routes.csv", next_routes, [
              "priority", "route", "condition", "next_action"
          ])

          route_decision = {
              "version": "v4.216",
              "result_label": RESULT_LABEL,
              "clean_result": "The G1 candidate covariance/correlation preview was integrated into the guarded shape lattice as numeric candidate nodes, cluster summaries, and a cosmology method-transfer ledger.",
              "g1_delta_rows": len(G1_DELTA_ROWS),
              "correlation_signature_rows": len(CORRELATION_SIGNATURE_ROWS),
              "eigenmode_summary_rows": len(EIGENMODE_SUMMARY_ROWS),
              "updated_lattice_nodes": len(lattice_nodes),
              "updated_lattice_edges": len(lattice_edges),
              "signature_clusters": len(cluster_rows),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "shape lattice update only; not validation, not unit equivalence, not cosmology proof",
              "blocked_claims": BLOCKED_CLAIMS
          }
          (OUT / "v4_216_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_216_scope_guards.json").write_text(json.dumps({
              "scope": "shape lattice update after G1 candidate covariance/correlation preview",
              "lattice_update_is_validation": False,
              "g1_neurotype_shapes_validate_cosmology": False,
              "same_signature_is_same_cause": False,
              "mixed_matrix_is_unit_equivalence": False,
              "dyslexia_surface": "ETDD70 reading eye-tracking task metrics",
              "aphantasia_surface": "VVIQ/OSIQ questionnaire-only candidate mapping",
              "drawing_performance_scoring_present": False,
              "cosmology_method_transfer_only": True,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_216_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.216 - Shape Lattice Update After G1 Candidate Covariance Preview",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.215 wrote the first guarded G1 covariance/correlation preview. v4.216 records that result in the shape lattice and writes a method-transfer ledger for returning to cosmology without overclaiming.",
              "",
              "G1 delta rows: `" + str(len(G1_DELTA_ROWS)) + "`",
              "Correlation signature rows: `" + str(len(CORRELATION_SIGNATURE_ROWS)) + "`",
              "Eigenmode summary rows: `" + str(len(EIGENMODE_SUMMARY_ROWS)) + "`",
              "Updated lattice nodes: `" + str(len(lattice_nodes)) + "`",
              "Updated lattice edges: `" + str(len(lattice_edges)) + "`",
              "Signature clusters: `" + str(len(cluster_rows)) + "`",
              "",
              "Package status: `" + package_status + "`",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_216_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_216_v4_215_status_review.csv",
              "v4_216_v4_215_status_review.json",
              "v4_216_g1_delta_signature_update.csv",
              "v4_216_g1_correlation_signature_summary.csv",
              "v4_216_g1_eigenmode_summary.csv",
              "v4_216_updated_lattice_nodes.csv",
              "v4_216_updated_lattice_edges.csv",
              "v4_216_signature_cluster_summary.csv",
              "v4_216_cosmology_method_transfer_ledger.csv",
              "v4_216_claim_boundary_matrix.csv",
              "v4_216_next_routes.csv",
              "v4_216_route_decision.json",
              "v4_216_scope_guards.json",
              "v4_216_blocked_claims.json",
              "v4_216_summary.md"
          ]

          rules = {
              "version_is_v4_216": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_215_status_reviewed": V4_215_STATUS["rule_pass_count"] == 12 and V4_215_STATUS["ready_for_lattice_update"] is True,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "g1_delta_update_written": (OUT / "v4_216_g1_delta_signature_update.csv").exists(),
              "correlation_signature_written": (OUT / "v4_216_g1_correlation_signature_summary.csv").exists(),
              "lattice_nodes_written": (OUT / "v4_216_updated_lattice_nodes.csv").exists(),
              "lattice_edges_written": (OUT / "v4_216_updated_lattice_edges.csv").exists(),
              "method_transfer_ledger_written": (OUT / "v4_216_cosmology_method_transfer_ledger.csv").exists(),
              "selected_route_present": bool(selected_next_route),
              "no_validation_claim": True,
              "no_cosmology_proof_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.216",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "g1_delta_rows": len(G1_DELTA_ROWS),
              "correlation_signature_rows": len(CORRELATION_SIGNATURE_ROWS),
              "eigenmode_summary_rows": len(EIGENMODE_SUMMARY_ROWS),
              "updated_lattice_nodes": len(lattice_nodes),
              "updated_lattice_edges": len(lattice_edges),
              "signature_clusters": len(cluster_rows),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "shape_lattice_update_only_no_validation"
          }
          (OUT / "v4_216_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.216 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_216_outputs/run_v4_216.py

      - name: Upload v4.216 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-216-shape-lattice-update-after-g1-candidate-covariance-preview-output
          path: tairid_v4_216_outputs/
