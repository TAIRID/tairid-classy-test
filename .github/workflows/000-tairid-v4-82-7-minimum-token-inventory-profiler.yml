name: 000 TAIRID v4.82.7 Minimum Token Inventory Profiler

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-82-7-minimum-token-inventory-profiler.yml"

jobs:
  tairid-v4-82-7-minimum-token-inventory-profiler:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.82.7 minimum token inventory profiler
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_82_7_minimum_token_inventory_profiler

          python - <<'PY'
          import csv
          import hashlib
          import json
          import math
          import re
          import struct
          import urllib.request
          import zlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_82_7_minimum_token_inventory_profiler")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_82_7_minimum_token_inventory_profiler"

          FULL_GRID_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip"

          FULLGRID_CONTENT_LENGTH_EXPECTED = 11805855817
          ZIP64_CENTRAL_DIRECTORY_OFFSET = 11803187830
          ZIP64_CENTRAL_DIRECTORY_SIZE = 2667889

          MAX_RANGE_READ_BYTES = 5_000_000
          MAX_MINIMUM_COMPRESSED_BYTES = 400_000
          MAX_MINIMUM_FILES_TO_PROFILE = 8
          MAX_SAMPLE_LINES_PER_FILE = 120

          SELECTED_PREFIXES = [
              "base/plikHM_TTTEEE_lowl_lowE/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing/",
              "base/plikHM_TT_lowl_lowE/",
              "base/plikHM_TT_lowl_lowE_lensing/",
              "base/plikHM_TTTEEE_lowl_lowE_BAO/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing_BAO/"
          ]

          PRIMARY_INPUTS = ["omegabh2", "omegach2", "theta", "tau", "logA", "ns"]

          PRIMARY_ALIAS_GROUPS = {
              "omegabh2": ["omegabh2", "ombh2", "omega_bh2", "omegabh^2", "omega_b", "omb"],
              "omegach2": ["omegach2", "omch2", "omega_ch2", "omegach^2", "omega_c", "omc"],
              "theta": ["theta", "thetastar", "cosmomc_theta", "theta_mc", "100theta", "100thetastar"],
              "tau": ["tau", "reion", "opticaldepth"],
              "logA": ["logA", "ln10", "ln_10", "A_s", "as", "scalaramp"],
              "ns": ["ns", "n_s", "scalar_spectral_index", "spectralindex"]
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          SIDE_CAR_TARGET_NAMES = []
          for row in TARGET_REDSHIFTS:
              SIDE_CAR_TARGET_NAMES.append(row["sigma8z_name"])
              SIDE_CAR_TARGET_NAMES.append(row["fsigma8_name"])

          ALL_EXACT_TARGETS = PRIMARY_INPUTS + SIDE_CAR_TARGET_NAMES

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This does not derive H0, Omega_m, sigma8, sigma8z, or fsigma8z.",
              "This profiles the real .minimum token inventory so the primary input mapping stops being guessed.",
              "A pass means token inventory and alias candidates were written, not that CAMB can run yet."
          ]

          UPSTREAM_LOCKS = {
              "v4_82_6_minimum_only_fixture_packet_extractor": {
                  "status": "failed",
                  "observed_rule_pass_count": "10/17",
                  "known_issue": "minimum-only idea was useful, but exact primary input names were still assumed too early",
                  "fixture_run_allowed_now": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_82_4_sidecar_format_profiler": {
                  "readiness_label": "sidecar_format_profiler_passed_ready_for_exact_extractor_design",
                  "observed_row_format": "index value target_name label",
                  "sidecar_values_accepted_for_CAMB": False,
                  "solver_cosmology_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              }
          }

          BLOCKED_CLAIMS = [
              "The minimum-only extractor is repaired.",
              "The primary input aliases are accepted for CAMB.",
              "A CAMB fixture was run.",
              "CAMB was used to compute fsigma8.",
              "CAMB produced cosmology outputs.",
              "H0 was derived.",
              "Omega_m was derived.",
              "sigma8 was derived.",
              "fsigma8 was derived.",
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_82_8_primary_input_alias_map_extractor",
                  "purpose": "Use the token inventory to map actual .minimum names/labels to CAMB inputs.",
                  "why_next": "v4.82.6 failed because exact primary input names were assumed too early."
              },
              {
                  "priority": 2,
                  "route_id": "v4_83_CAMB_tiny_single_fixture_run",
                  "purpose": "Run one tiny CAMB fixture only after primary input aliases are locked.",
                  "why_next": "CAMB should not run until the input packet is real."
              },
              {
                  "priority": 3,
                  "route_id": "v4_83_ELG_grid_member_probe",
                  "purpose": "Parallel route: continue parked ELG backlog.",
                  "why_next": "Full eBOSS remains incomplete without ELG handling."
              },
              {
                  "priority": 4,
                  "route_id": "v4_83_WiggleZ_product_locator_followup",
                  "purpose": "Parallel route: continue parked WiggleZ backlog.",
                  "why_next": "WiggleZ remains unresolved."
              }
          ]

          def normalize_text(value):
              return re.sub(r"[^a-z0-9]+", "", str(value).lower())

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }
              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={"User-Agent": "TAIRID-v4.82.7-minimum-token-inventory/1.0", "Accept": "*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }
              data = b""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.82.7-minimum-token-inventory/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )
                  with urllib.request.urlopen(req, timeout=180) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)
                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, data

          def classify_member(name):
              lower = name.lower()
              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".minimum"):
                  return "minimum"
              if lower.endswith(".paramnames"):
                  return "paramnames"
              if re.search(r"_\d+\.txt$", name):
                  return "chain_sample_text_member_prefix_only"
              return "other"

          def parse_zip64_extra(extra_bytes, need_uncompressed, need_compressed, need_local_offset):
              result = {}
              pos = 0
              while pos + 4 <= len(extra_bytes):
                  header_id, data_size = struct.unpack_from("<HH", extra_bytes, pos)
                  data_start = pos + 4
                  data_end = data_start + data_size
                  if data_end > len(extra_bytes):
                      break

                  data = extra_bytes[data_start:data_end]
                  if header_id == 0x0001:
                      subpos = 0
                      if need_uncompressed and subpos + 8 <= len(data):
                          result["uncompressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_compressed and subpos + 8 <= len(data):
                          result["compressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_local_offset and subpos + 8 <= len(data):
                          result["local_header_offset"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                  pos = data_end
              return result

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0

              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break

                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)
                      compression_method = fields[4]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      extra_start = name_end
                      extra_end = extra_start + extra_len
                      comment_end = extra_end + comment_len

                      if comment_end > len(cd_bytes):
                          break

                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")
                      extra = cd_bytes[extra_start:extra_end]

                      zip64_extra = parse_zip64_extra(
                          extra,
                          need_uncompressed=uncompressed_size == 0xFFFFFFFF,
                          need_compressed=compressed_size == 0xFFFFFFFF,
                          need_local_offset=local_header_offset == 0xFFFFFFFF
                      )

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compression_method": compression_method,
                          "compressed_size": zip64_extra.get("compressed_size", compressed_size),
                          "uncompressed_size": zip64_extra.get("uncompressed_size", uncompressed_size),
                          "local_header_offset": zip64_extra.get("local_header_offset", local_header_offset),
                          "zip64_extra_used": bool(zip64_extra)
                      })

                      pos = comment_end

                  except Exception:
                      break

              return records

          def fetch_member_bytes(member_record, max_member_compressed_bytes):
              offset = int(member_record["local_header_offset"])
              compressed_size = int(member_record["compressed_size"])

              if compressed_size <= 0:
                  raise RuntimeError("compressed_size_not_positive")

              header_record, header_data = range_probe(
                  "local_header_probe",
                  FULL_GRID_URL,
                  f"bytes={offset}-{offset + 4095}",
                  4096
              )

              if not header_record["ok"] or not header_record["server_honored_range"]:
                  raise RuntimeError("local_header_range_not_available")

              if len(header_data) < 30:
                  raise RuntimeError("local_header_too_short")

              if header_data[:4] != b"PK\x03\x04":
                  raise RuntimeError("local_header_signature_not_found")

              fields = struct.unpack_from("<4s5H3L2H", header_data, 0)
              compression_method = fields[3]
              file_name_len = fields[9]
              extra_len = fields[10]
              data_start = offset + 30 + file_name_len + extra_len

              bytes_to_fetch = min(compressed_size, max_member_compressed_bytes)
              data_end = data_start + bytes_to_fetch - 1

              data_record, compressed_data = range_probe(
                  "member_payload_probe",
                  FULL_GRID_URL,
                  f"bytes={data_start}-{data_end}",
                  bytes_to_fetch + 1024
              )

              if not data_record["ok"] or not data_record["server_honored_range"]:
                  raise RuntimeError("member_payload_range_not_available")

              if data_record["truncated_by_guard"]:
                  raise RuntimeError("member_payload_truncated_by_guard")

              if compression_method == 0:
                  payload = compressed_data
              elif compression_method == 8:
                  decompressor = zlib.decompressobj(-15)
                  payload = decompressor.decompress(compressed_data)
              else:
                  raise RuntimeError(f"unsupported_compression_method_{compression_method}")

              return payload, compression_method, data_record

          def root_from_minimum(name):
              return name[:-len(".minimum")] if name.endswith(".minimum") else name

          def parse_minimum_inventory(member_name, text):
              root = root_from_minimum(member_name)
              rows = []

              for line_number, raw_line in enumerate(text.splitlines(), start=1):
                  line = raw_line.strip()
                  if not line:
                      continue

                  tokens = line.split()
                  if len(tokens) < 3:
                      continue

                  row_index_token = tokens[0]
                  value_token = tokens[1]
                  name_token = tokens[2]
                  label = " ".join(tokens[3:]) if len(tokens) > 3 else ""

                  try:
                      row_index = int(row_index_token)
                  except Exception:
                      continue

                  try:
                      value = float(value_token)
                  except Exception:
                      continue

                  rows.append({
                      "root": root,
                      "member_name": member_name,
                      "line_number": line_number,
                      "row_index": row_index,
                      "value": value,
                      "name_token": name_token,
                      "label": label,
                      "normalized_name": normalize_text(name_token),
                      "normalized_label": normalize_text(label),
                      "token_count": len(tokens),
                      "line_text": line[:500]
                  })

              return rows

          def exact_target_probe(inventory_rows):
              records = []

              for target in ALL_EXACT_TARGETS:
                  exact_rows = [row for row in inventory_rows if row["name_token"] == target]
                  substring_rows = [
                      row for row in inventory_rows
                      if target in row["name_token"] or target in row["line_text"]
                  ]
                  substring_only_rows = [
                      row for row in substring_rows
                      if row["name_token"] != target
                  ]

                  first_exact = exact_rows[0] if exact_rows else {}

                  records.append({
                      "target_name": target,
                      "target_type": "primary_input" if target in PRIMARY_INPUTS else "sidecar_output",
                      "exact_count": len(exact_rows),
                      "substring_count": len(substring_rows),
                      "substring_only_count": len(substring_only_rows),
                      "first_exact_root": first_exact.get("root", ""),
                      "first_exact_value": first_exact.get("value", ""),
                      "first_exact_name_token": first_exact.get("name_token", ""),
                      "first_exact_label": first_exact.get("label", ""),
                      "first_substring_only_name": substring_only_rows[0]["name_token"] if substring_only_rows else "",
                      "first_substring_only_line": substring_only_rows[0]["line_text"] if substring_only_rows else ""
                  })

              return records

          def alias_candidate_probe(inventory_rows):
              records = []

              for primary_name, aliases in PRIMARY_ALIAS_GROUPS.items():
                  normalized_aliases = [normalize_text(alias) for alias in aliases]
                  candidates = []

                  for row in inventory_rows:
                      normalized_name = row["normalized_name"]
                      normalized_label = row["normalized_label"]
                      haystack = normalized_name + " " + normalized_label

                      score = 0
                      matched_aliases = []

                      for alias in normalized_aliases:
                          if not alias:
                              continue
                          if normalized_name == alias:
                              score += 5
                              matched_aliases.append(alias + ":exact_name")
                          elif alias in normalized_name:
                              score += 3
                              matched_aliases.append(alias + ":name_contains")
                          elif alias in normalized_label:
                              score += 2
                              matched_aliases.append(alias + ":label_contains")
                          elif alias in haystack:
                              score += 1
                              matched_aliases.append(alias + ":haystack_contains")

                      if score > 0:
                          candidates.append((score, row, ",".join(matched_aliases)))

                  candidates = sorted(
                      candidates,
                      key=lambda item: (-item[0], item[1]["root"], item[1]["row_index"], item[1]["name_token"])
                  )[:12]

                  if candidates:
                      for rank, (score, row, matched_aliases) in enumerate(candidates, start=1):
                          records.append({
                              "primary_input": primary_name,
                              "candidate_rank": rank,
                              "score": score,
                              "matched_aliases": matched_aliases,
                              "root": row["root"],
                              "member_name": row["member_name"],
                              "row_index": row["row_index"],
                              "value": row["value"],
                              "name_token": row["name_token"],
                              "label": row["label"],
                              "line_text": row["line_text"]
                          })
                  else:
                      records.append({
                          "primary_input": primary_name,
                          "candidate_rank": "",
                          "score": 0,
                          "matched_aliases": "",
                          "root": "",
                          "member_name": "",
                          "row_index": "",
                          "value": "",
                          "name_token": "",
                          "label": "",
                          "line_text": ""
                      })

              return records

          def sigma_pair_probe(inventory_rows):
              values_by_root = {}
              for row in inventory_rows:
                  values_by_root.setdefault(row["root"], {})[row["name_token"]] = row["value"]

              records = []
              for root, values in values_by_root.items():
                  for redshift_row in TARGET_REDSHIFTS:
                      sigma_name = redshift_row["sigma8_name"]
                      fsigma_name = redshift_row["fsigma8_name"]
                      sigma_value = values.get(sigma_name)
                      fsigma_value = values.get(fsigma_name)

                      records.append({
                          "root": root,
                          "z_key": redshift_row["z_key"],
                          "z": redshift_row["z"],
                          "sigma8_name": sigma_name,
                          "sigma8_value": sigma_value if sigma_value is not None else "",
                          "fsigma8_name": fsigma_name,
                          "fsigma8_value": fsigma_value if fsigma_value is not None else "",
                          "both_present": sigma_value is not None and fsigma_value is not None,
                          "values_distinct": (
                              sigma_value is not None
                              and fsigma_value is not None
                              and not math.isclose(sigma_value, fsigma_value, rel_tol=0.0, abs_tol=1e-12)
                          )
                      })
              return records

          failed_gates = []
          warnings = [
              "minimum_token_inventory_profiler_only",
              "no_values_accepted_for_CAMB",
              "no_CAMB_run",
              "no_solver_cosmology_run",
              "no_full_chain_import",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          head_record = head_probe("full_grid_head", FULL_GRID_URL)
          if not head_record["ok"]:
              failed_gates.append("full_grid_head_probe_failed")

          if head_record.get("content_length") and head_record["content_length"] != FULLGRID_CONTENT_LENGTH_EXPECTED:
              warnings.append("fullgrid_content_length_differs_from_locked_value")

          cd_start = ZIP64_CENTRAL_DIRECTORY_OFFSET
          cd_end = ZIP64_CENTRAL_DIRECTORY_OFFSET + ZIP64_CENTRAL_DIRECTORY_SIZE - 1

          cd_record, cd_data = range_probe(
              "full_grid_locked_zip64_central_directory_fetch",
              FULL_GRID_URL,
              f"bytes={cd_start}-{cd_end}",
              MAX_RANGE_READ_BYTES
          )

          if not cd_record["ok"]:
              failed_gates.append("central_directory_fetch_failed")
          if not cd_record.get("server_honored_range"):
              failed_gates.append("central_directory_range_not_honored")
          if cd_record.get("truncated_by_guard"):
              failed_gates.append("central_directory_truncated_by_guard")

          manifest_records = parse_central_directory(cd_data) if cd_data else []
          if not manifest_records:
              failed_gates.append("central_directory_manifest_records_not_parsed")

          minimum_members = [
              row for row in manifest_records
              if row["member_type"] == "minimum"
              and any(row["member_name"].startswith(prefix) for prefix in SELECTED_PREFIXES)
          ]

          minimum_members = sorted(minimum_members, key=lambda row: row["member_name"])[:MAX_MINIMUM_FILES_TO_PROFILE]

          if not minimum_members:
              failed_gates.append("no_selected_minimum_members_found")

          minimum_file_records = []
          minimum_token_inventory_records = []
          sample_line_records = []
          profile_errors = []

          for member in minimum_members:
              member_name = member["member_name"]
              try:
                  payload, compression_method, payload_record = fetch_member_bytes(
                      member,
                      MAX_MINIMUM_COMPRESSED_BYTES
                  )
                  text = payload.decode("utf-8", errors="replace")
                  lines = text.splitlines()
                  inventory_rows = parse_minimum_inventory(member_name, text)

                  minimum_file_records.append({
                      "member_name": member_name,
                      "root": root_from_minimum(member_name),
                      "compressed_size": member["compressed_size"],
                      "uncompressed_size": member["uncompressed_size"],
                      "compression_method": compression_method,
                      "line_count": len(lines),
                      "inventory_row_count": len(inventory_rows),
                      "payload_sha256_16": hashlib.sha256(payload).hexdigest()[:16],
                      "fetched_ok": True,
                      "error": ""
                  })

                  minimum_token_inventory_records.extend(inventory_rows)

                  for idx, line in enumerate(lines[:MAX_SAMPLE_LINES_PER_FILE], start=1):
                      stripped = line.strip()
                      if stripped:
                          sample_line_records.append({
                              "member_name": member_name,
                              "root": root_from_minimum(member_name),
                              "line_number": idx,
                              "line_text": stripped[:500]
                          })

              except Exception as exc:
                  profile_errors.append({
                      "member_name": member_name,
                      "error": f"{type(exc).__name__}: {exc}"
                  })

                  minimum_file_records.append({
                      "member_name": member_name,
                      "root": root_from_minimum(member_name),
                      "compressed_size": member.get("compressed_size", ""),
                      "uncompressed_size": member.get("uncompressed_size", ""),
                      "compression_method": "",
                      "line_count": "",
                      "inventory_row_count": "",
                      "payload_sha256_16": "",
                      "fetched_ok": False,
                      "error": f"{type(exc).__name__}: {exc}"
                  })

          exact_target_probe_records = exact_target_probe(minimum_token_inventory_records)
          primary_alias_candidate_records = alias_candidate_probe(minimum_token_inventory_records)
          sigma_pair_records = sigma_pair_probe(minimum_token_inventory_records)

          fetched_minimum_count = sum(1 for row in minimum_file_records if row["fetched_ok"])
          exact_primary_count = sum(
              1 for row in exact_target_probe_records
              if row["target_type"] == "primary_input" and int(row["exact_count"]) > 0
          )
          exact_sidecar_count = sum(
              1 for row in exact_target_probe_records
              if row["target_type"] == "sidecar_output" and int(row["exact_count"]) > 0
          )
          primary_alias_candidate_count = sum(
              1 for row in primary_alias_candidate_records
              if row.get("score") not in ("", 0, "0")
          )
          sigma_pairs_complete_count = sum(1 for row in sigma_pair_records if row["both_present"])
          sigma_pairs_distinct_count = sum(1 for row in sigma_pair_records if row["values_distinct"])

          if fetched_minimum_count == 0:
              failed_gates.append("no_minimum_files_fetched")

          if len(minimum_token_inventory_records) == 0:
