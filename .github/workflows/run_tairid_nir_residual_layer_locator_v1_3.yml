name: Run TAIRID NIR Residual Layer Locator v1.3

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-nir-residual-layer-locator-v1-3:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_nir_residual_layer_locator_v1_3.py
          echo "v1.3 residual layer locator found."

      - name: Run TAIRID NIR Residual Layer Locator v1.3
        run: |
          python run_tairid_nir_residual_layer_locator_v1_3.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-nir-residual-layer-locator-v1-3-output
          path: |
            tairid_nir_residual_layer_locator_v1_3_outputs/**
