name: 000 TAIRID v4.86 Single Fixture Residual Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-86-single-fixture-residual-audit.yml"

jobs:
  tairid-v4-86-single-fixture-residual-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.86 single fixture residual audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_86_single_fixture_residual_audit

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_86_single_fixture_residual_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_86_single_fixture_residual_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not run CAMB again.",
              "This uses v4.84.3 CAMB diagnostic output and v4.85 locked reversed orientation.",
              "This compares one CAMB point fixture against .minimum sidecar point targets only.",
              "This is a single-point residual audit, not posterior uncertainty.",
              "This does not run likelihood, BIC, posterior comparison, or model selection.",
              "A pass means the one-point CAMB fixture mapping reproduces the .minimum sidecar point targets within a small numerical tolerance."
          ]

          UPSTREAM_LOCKS = {
              "v4_85_single_fixture_output_shape_and_orientation_lock": {
                  "readiness_label": "single_fixture_output_shape_and_orientation_lock_passed_ready_for_single_fixture_residual_audit",
                  "locked_orientation": "reversed_raw_order",
                  "orientation_locked_for_next_test": True,
                  "primary_variant": "theta_h0_none_contract_path",
                  "primary_reversed_rms_preview": 0.00018044389560315524,
                  "primary_reversed_max_abs_preview": 0.00026632780896707064,
                  "formal_residual_audit_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_84_3_camb_external_runner_json_decode_repair": {
                  "readiness_label": "CAMB_external_runner_JSON_decode_repair_passed_complete_arrays_ready_for_output_shape_and_orientation_lock",
                  "CAMB_imported": True,
                  "CAMB_version": "1.6.6",
                  "any_variant_complete_arrays": True,
                  "successful_variant_count": 3,
                  "Planck_reference_uncertainty_computed": False
              },
              "v4_83_camb_tiny_single_fixture_mapping_contract": {
                  "readiness_label": "CAMB_tiny_single_fixture_mapping_contract_passed_ready_for_CAMB_tiny_single_fixture_smoke_run",
                  "mapping_contract_complete": True,
                  "theta_mapping": "theta_100theta_MC_divided_by_100_to_cosmomc_theta",
                  "logA_mapping": "As_equals_exp_logA_divided_by_1e10",
                  "Planck_reference_uncertainty_computed": False
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015", "sigma8_expected": 0.7498653, "fsigma8_expected": 0.4605277},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038", "sigma8_expected": 0.6642308, "fsigma8_expected": 0.4779339},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051", "sigma8_expected": 0.6214160, "fsigma8_expected": 0.4760216},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061", "sigma8_expected": 0.5911708, "fsigma8_expected": 0.4706936},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233", "sigma8_expected": 0.3069371, "fsigma8_expected": 0.2979012}
          ]

          PRIMARY_VARIANT_OUTPUT = {
              "variant_label": "theta_h0_none_contract_path",
              "mode": "theta_h0_none",
              "contract_status": "primary_contract_variant",
              "locked_orientation": "reversed_raw_order",
              "H0_recorded": 67.30972606865629,
              "sigma8_values_raw": [
                  0.3068045954517764,
                  0.5909378779961363,
                  0.6211751606614864,
                  0.6639799628833019,
                  0.7495989721910329
              ],
              "fsigma8_values_raw": [
                  0.2977780575384886,
                  0.4705641528815541,
                  0.47590135681241275,
                  0.4778291680623743,
                  0.4604599600097336
              ]
          }

          DIAGNOSTIC_VARIANT_OUTPUTS = [
              {
                  "variant_label": "theta_h0_omitted_api_probe",
                  "mode": "theta_h0_omitted",
                  "contract_status": "api_probe_variant_same_output_as_contract",
                  "locked_orientation": "reversed_raw_order",
                  "H0_recorded": 67.30972606865629,
                  "sigma8_values_raw": [
                      0.3068045954517764,
                      0.5909378779961363,
                      0.6211751606614864,
                      0.6639799628833019,
                      0.7495989721910329
                  ],
                  "fsigma8_values_raw": [
                      0.2977780575384886,
                      0.4705641528815541,
                      0.47590135681241275,
                      0.4778291680623743,
                      0.4604599600097336
                  ]
              },
              {
                  "variant_label": "diagnostic_h0_fixed_not_fixture_acceptance",
                  "mode": "diagnostic_h0_fixed_not_fixture_acceptance",
                  "contract_status": "diagnostic_only_not_primary_contract",
                  "locked_orientation": "reversed_raw_order",
                  "H0_recorded": 67.36,
                  "sigma8_values_raw": [
                      0.3069573914399199,
                      0.5911573530644346,
                      0.6213922745402172,
                      0.6641896519845842,
                      0.7497784312768103
                  ],
                  "fsigma8_values_raw": [
                      0.2979066915276311,
                      0.47054527971587906,
                      0.475845924168575,
                      0.4777187265744269,
                      0.4602400795604781
                  ]
              }
          ]

          RESIDUAL_THRESHOLDS = {
              "primary_combined_rms_max": 0.001,
              "primary_sigma8_rms_max": 0.001,
              "primary_fsigma8_rms_max": 0.001,
              "primary_max_abs_delta_max": 0.001,
              "primary_mean_abs_delta_max": 0.001,
              "required_point_count": 5,
              "required_residual_count": 10
          }

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The single fixture residual audit validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The single fixture residual audit is Planck reference uncertainty.",
              "The single fixture residual audit is a final RSD pressure score.",
              "The diagnostic H0-fixed variant is the accepted fixture path.",
              "The single fixture residual audit replaces posterior chain uncertainty."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_87_reference_uncertainty_chain_sample_design",
                  "purpose": "Design the bounded posterior-sample route needed to turn point fixtures into Planck reference uncertainty.",
                  "why_next": "The point fixture works, but a single point is not covariance or uncertainty."
              },
              {
                  "priority": 2,
                  "route_id": "v4_88_chain_sample_tiny_subset_parser_probe",
                  "purpose": "Probe a tiny bounded subset of Planck chain sample rows and weights.",
                  "why_next": "Reference uncertainty requires samples, weights, and covariance propagation."
              },
              {
                  "priority": 3,
                  "route_id": "v4_89_fsigma8_reference_uncertainty_propagation_design",
                  "purpose": "Design how chain samples would map into fsigma8 at RSD redshift targets.",
                  "why_next": "Final RSD pressure requires reference covariance across redshift, not point targets."
              },
              {
                  "priority": 4,
                  "route_id": "v4_90_ELG_or_WiggleZ_parallel_backlog",
                  "purpose": "Parallel route for parked growth-family incompleteness.",
                  "why_next": "ELG and WiggleZ remain incomplete."
              }
          ]

          failed_gates = []
          warnings = [
              "single_fixture_residual_audit_only",
              "uses_locked_reversed_orientation",
              "uses_v4_84_3_outputs_without_rerunning_CAMB",
              "not_Planck_reference_uncertainty",
              "no_full_chain_import",
              "no_combined_growth_covariance",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def orient_values(raw_values, locked_orientation):
              if locked_orientation == "reversed_raw_order":
                  return list(reversed(raw_values))
              if locked_orientation == "direct_raw_order":
                  return list(raw_values)
              raise ValueError("unknown locked orientation: " + str(locked_orientation))

          def residual_stats(values):
              if not values:
                  return {"count": 0, "rms": "", "mean_abs": "", "max_abs": "", "signed_mean": ""}
              vals = [float(x) for x in values]
              abs_vals = [abs(x) for x in vals]
              return {
                  "count": len(vals),
                  "rms": math.sqrt(sum(x * x for x in vals) / len(vals)),
                  "mean_abs": sum(abs_vals) / len(abs_vals),
                  "max_abs": max(abs_vals),
                  "signed_mean": sum(vals) / len(vals)
              }

          def build_residual_records(variant, residual_status):
              sigma_values = orient_values(variant["sigma8_values_raw"], variant["locked_orientation"])
              fsigma_values = orient_values(variant["fsigma8_values_raw"], variant["locked_orientation"])

              records = []
              for index, zrow in enumerate(TARGET_REDSHIFTS):
                  sigma_calc = float(sigma_values[index])
                  fsigma_calc = float(fsigma_values[index])
                  sigma_expected = float(zrow["sigma8_expected"])
                  fsigma_expected = float(zrow["fsigma8_expected"])

                  sigma_delta = sigma_calc - sigma_expected
                  fsigma_delta = fsigma_calc - fsigma_expected

                  records.append({
                      "variant_label": variant["variant_label"],
                      "mode": variant["mode"],
                      "contract_status": variant["contract_status"],
                      "locked_orientation": variant["locked_orientation"],
                      "residual_status": residual_status,
                      "index": index,
                      "z": zrow["z"],
                      "quantity": "sigma8z",
                      "target_name": zrow["sigma8z_name"],
                      "camb_value_oriented": sigma_calc,
                      "sidecar_expected_value": sigma_expected,
                      "delta": sigma_delta,
                      "abs_delta": abs(sigma_delta),
                      "relative_delta": sigma_delta / sigma_expected if sigma_expected != 0 else "",
                      "comparison_scope": "single_point_fixture_not_covariance"
                  })

                  records.append({
                      "variant_label": variant["variant_label"],
                      "mode": variant["mode"],
                      "contract_status": variant["contract_status"],
                      "locked_orientation": variant["locked_orientation"],
                      "residual_status": residual_status,
                      "index": index,
                      "z": zrow["z"],
                      "quantity": "fsigma8",
                      "target_name": zrow["fsigma8_name"],
                      "camb_value_oriented": fsigma_calc,
                      "sidecar_expected_value": fsigma_expected,
                      "delta": fsigma_delta,
                      "abs_delta": abs(fsigma_delta),
                      "relative_delta": fsigma_delta / fsigma_expected if fsigma_expected != 0 else "",
                      "comparison_scope": "single_point_fixture_not_covariance"
                  })

              return records

          primary_residual_records = build_residual_records(
              PRIMARY_VARIANT_OUTPUT,
              "accepted_primary_contract_single_fixture_residual"
          )

          diagnostic_residual_records = []
          for variant in DIAGNOSTIC_VARIANT_OUTPUTS:
              diagnostic_residual_records.extend(
                  build_residual_records(
                      variant,
                      "diagnostic_variant_residual_not_accepted_primary"
                  )
              )

          all_residual_records = primary_residual_records + diagnostic_residual_records

          def summarize_variant(records, variant_label, accepted_primary):
              subset = [row for row in records if row["variant_label"] == variant_label]
              sigma_deltas = [row["delta"] for row in subset if row["quantity"] == "sigma8z"]
              fsigma_deltas = [row["delta"] for row in subset if row["quantity"] == "fsigma8"]
              combined_deltas = [row["delta"] for row in subset]

              sigma_stats = residual_stats(sigma_deltas)
              fsigma_stats = residual_stats(fsigma_deltas)
              combined_stats = residual_stats(combined_deltas)

              return {
                  "variant_label": variant_label,
                  "accepted_primary_contract_variant": accepted_primary,
                  "residual_count": combined_stats["count"],
                  "point_count": len(set(row["z"] for row in subset)),
                  "sigma8_rms": sigma_stats["rms"],
                  "sigma8_mean_abs": sigma_stats["mean_abs"],
                  "sigma8_max_abs": sigma_stats["max_abs"],
                  "sigma8_signed_mean": sigma_stats["signed_mean"],
                  "fsigma8_rms": fsigma_stats["rms"],
                  "fsigma8_mean_abs": fsigma_stats["mean_abs"],
                  "fsigma8_max_abs": fsigma_stats["max_abs"],
                  "fsigma8_signed_mean": fsigma_stats["signed_mean"],
                  "combined_rms": combined_stats["rms"],
                  "combined_mean_abs": combined_stats["mean_abs"],
                  "combined_max_abs": combined_stats["max_abs"],
                  "combined_signed_mean": combined_stats["signed_mean"],
                  "residual_threshold": RESIDUAL_THRESHOLDS["primary_combined_rms_max"] if accepted_primary else "",
                  "pass_single_fixture_residual_threshold": (
                      accepted_primary
                      and combined_stats["count"] == RESIDUAL_THRESHOLDS["required_residual_count"]
                      and combined_stats["rms"] < RESIDUAL_THRESHOLDS["primary_combined_rms_max"]
                      and sigma_stats["rms"] < RESIDUAL_THRESHOLDS["primary_sigma8_rms_max"]
                      and fsigma_stats["rms"] < RESIDUAL_THRESHOLDS["primary_fsigma8_rms_max"]
                      and combined_stats["max_abs"] < RESIDUAL_THRESHOLDS["primary_max_abs_delta_max"]
                      and combined_stats["mean_abs"] < RESIDUAL_THRESHOLDS["primary_mean_abs_delta_max"]
                  ),
                  "summary_scope": "single_fixture_point_residual_not_reference_uncertainty"
              }

          residual_summary_records = [
              summarize_variant(all_residual_records, "theta_h0_none_contract_path", True),
              summarize_variant(all_residual_records, "theta_h0_omitted_api_probe", False),
              summarize_variant(all_residual_records, "diagnostic_h0_fixed_not_fixture_acceptance", False)
          ]

          primary_summary = next(row for row in residual_summary_records if row["accepted_primary_contract_variant"])

          sidecar_target_records = []
          for zrow in TARGET_REDSHIFTS:
              sidecar_target_records.append({
                  "z_key": zrow["z_key"],
                  "z": zrow["z"],
                  "target_name": zrow["sigma8z_name"],
                  "quantity": "sigma8z",
                  "expected_value": zrow["sigma8_expected"],
                  "target_scope": "minimum_sidecar_point_target_not_covariance"
              })
              sidecar_target_records.append({
                  "z_key": zrow["z_key"],
                  "z": zrow["z"],
                  "target_name": zrow["fsigma8_name"],
                  "quantity": "fsigma8",
                  "expected_value": zrow["fsigma8_expected"],
                  "target_scope": "minimum_sidecar_point_target_not_covariance"
              })

          ACCEPTANCE_RECORD = {
              "accepted_primary_variant": "theta_h0_none_contract_path",
              "accepted_locked_orientation": "reversed_raw_order",
              "single_fixture_residual_audit_run": True,
              "single_fixture_residual_audit_passed": primary_summary["pass_single_fixture_residual_threshold"],
              "primary_residual_count": primary_summary["residual_count"],
              "primary_point_count": primary_summary["point_count"],
              "primary_combined_rms": primary_summary["combined_rms"],
              "primary_combined_max_abs": primary_summary["combined_max_abs"],
              "primary_sigma8_rms": primary_summary["sigma8_rms"],
              "primary_fsigma8_rms": primary_summary["fsigma8_rms"],
              "thresholds": RESIDUAL_THRESHOLDS,
              "result_interpretation": "CAMB point fixture mapping reproduces .minimum sidecar point targets within tolerance.",
              "not_interpretation": "This is not Planck reference uncertainty, not posterior covariance, not final RSD pressure, and not TAIRID validation.",
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False
          }

          if UPSTREAM_LOCKS["v4_85_single_fixture_output_shape_and_orientation_lock"]["locked_orientation"] != "reversed_raw_order":
              failed_gates.append("locked_orientation_not_reversed_raw_order")

          if UPSTREAM_LOCKS["v4_85_single_fixture_output_shape_and_orientation_lock"]["orientation_locked_for_next_test"] is not True:
              failed_gates.append("orientation_not_locked_for_next_test")

          if PRIMARY_VARIANT_OUTPUT["locked_orientation"] != "reversed_raw_order":
              failed_gates.append("primary_variant_orientation_not_reversed")

          if len(primary_residual_records) != RESIDUAL_THRESHOLDS["required_residual_count"]:
              failed_gates.append("primary_residual_count_not_10")

          if len(sidecar_target_records) != RESIDUAL_THRESHOLDS["required_residual_count"]:
              failed_gates.append("sidecar_target_count_not_10")

          if primary_summary["point_count"] != RESIDUAL_THRESHOLDS["required_point_count"]:
              failed_gates.append("primary_point_count_not_5")

          if not primary_summary["pass_single_fixture_residual_threshold"]:
              failed_gates.append("primary_single_fixture_residual_threshold_failed")

          if ACCEPTANCE_RECORD["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("reference_uncertainty_computed_too_early")

          if ACCEPTANCE_RECORD["combined_growth_covariance_computed"] is not False:
              failed_gates.append("combined_growth_covariance_computed_too_early")

          if ACCEPTANCE_RECORD["final_RSD_pressure_score_computed"] is not False:
              failed_gates.append("final_RSD_pressure_computed_too_early")

          if ACCEPTANCE_RECORD["TAIRID_validation_claim_allowed"] is not False:
              failed_gates.append("validation_claim_allowed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "validates tairid cosmology",
              "diagnostic h0-fixed variant is the accepted fixture path",
              "single fixture residual audit replaces posterior chain uncertainty",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "single_fixture_residual_audit_passed_ready_for_reference_uncertainty_chain_sample_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_orientation_lock_carried",
                  "pass": UPSTREAM_LOCKS["v4_85_single_fixture_output_shape_and_orientation_lock"]["locked_orientation"] == "reversed_raw_order",
                  "result": "locked orientation is reversed_raw_order",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "primary_contract_variant_used",
                  "pass": PRIMARY_VARIANT_OUTPUT["variant_label"] == "theta_h0_none_contract_path",
                  "result": PRIMARY_VARIANT_OUTPUT["variant_label"],
                  "boundary": "Diagnostic H0-fixed variant not accepted as primary."
              },
              {
                  "rule_id": "primary_residual_records_written",
                  "pass": len(primary_residual_records) == RESIDUAL_THRESHOLDS["required_residual_count"],
                  "result": f"{len(primary_residual_records)} primary residual records",
                  "boundary": "Single fixture only."
              },
              {
                  "rule_id": "sidecar_targets_written",
                  "pass": len(sidecar_target_records) == RESIDUAL_THRESHOLDS["required_residual_count"],
                  "result": f"{len(sidecar_target_records)} sidecar target records",
                  "boundary": "Point targets only, not covariance."
              },
              {
                  "rule_id": "primary_combined_rms_below_threshold",
                  "pass": primary_summary["combined_rms"] < RESIDUAL_THRESHOLDS["primary_combined_rms_max"],
                  "result": f"combined_rms={primary_summary['combined_rms']}",
                  "boundary": "Numerical point-fixture residual only."
              },
              {
                  "rule_id": "primary_sigma8_and_fsigma8_rms_below_threshold",
                  "pass": primary_summary["sigma8_rms"] < RESIDUAL_THRESHOLDS["primary_sigma8_rms_max"] and primary_summary["fsigma8_rms"] < RESIDUAL_THRESHOLDS["primary_fsigma8_rms_max"],
                  "result": f"sigma8_rms={primary_summary['sigma8_rms']}; fsigma8_rms={primary_summary['fsigma8_rms']}",
                  "boundary": "No posterior uncertainty."
              },
              {
                  "rule_id": "primary_max_abs_below_threshold",
                  "pass": primary_summary["combined_max_abs"] < RESIDUAL_THRESHOLDS["primary_max_abs_delta_max"],
                  "result": f"combined_max_abs={primary_summary['combined_max_abs']}",
                  "boundary": "Tolerance check only."
              },
              {
                  "rule_id": "diagnostic_variants_not_accepted_as_primary",
                  "pass": all(not row["accepted_primary_contract_variant"] for row in residual_summary_records if row["variant_label"] != "theta_h0_none_contract_path"),
                  "result": "diagnostic variants summarized but not accepted as primary",
                  "boundary": "Primary accepted path remains theta_h0_none_contract_path."
              },
              {
                  "rule_id": "reference_uncertainty_still_blocked",
                  "pass": ACCEPTANCE_RECORD["Planck_reference_uncertainty_computed"] is False,
                  "result": "Planck reference uncertainty not computed",
                  "boundary": "No posterior covariance."
              },
              {
                  "rule_id": "final_pressure_still_blocked",
                  "pass": ACCEPTANCE_RECORD["final_RSD_pressure_score_computed"] is False,
                  "result": "final RSD pressure not computed",
                  "boundary": "No final growth-lane claim."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 14,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_86_rules_passed")

          if failed_gates:
              readiness_label = "single_fixture_residual_audit_failed"
              next_allowed_step = "Repair single fixture residual audit before designing reference uncertainty chain sampling."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.87 reference uncertainty chain sample design. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_locked_orientation": UPSTREAM_LOCKS["v4_85_single_fixture_output_shape_and_orientation_lock"]["locked_orientation"],
              "accepted_primary_variant": ACCEPTANCE_RECORD["accepted_primary_variant"],
              "accepted_locked_orientation": ACCEPTANCE_RECORD["accepted_locked_orientation"],
              "single_fixture_residual_audit_run": ACCEPTANCE_RECORD["single_fixture_residual_audit_run"],
              "single_fixture_residual_audit_passed": ACCEPTANCE_RECORD["single_fixture_residual_audit_passed"],
              "primary_point_count": ACCEPTANCE_RECORD["primary_point_count"],
              "primary_residual_count": ACCEPTANCE_RECORD["primary_residual_count"],
              "primary_combined_rms": ACCEPTANCE_RECORD["primary_combined_rms"],
              "primary_combined_max_abs": ACCEPTANCE_RECORD["primary_combined_max_abs"],
              "primary_sigma8_rms": ACCEPTANCE_RECORD["primary_sigma8_rms"],
              "primary_fsigma8_rms": ACCEPTANCE_RECORD["primary_fsigma8_rms"],
              "residual_summary_count": len(residual_summary_records),
              "all_residual_record_count": len(all_residual_records),
              "sidecar_target_record_count": len(sidecar_target_records),
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "target_redshifts": TARGET_REDSHIFTS,
              "primary_variant_output": PRIMARY_VARIANT_OUTPUT,
              "diagnostic_variant_outputs": DIAGNOSTIC_VARIANT_OUTPUTS,
              "residual_thresholds": RESIDUAL_THRESHOLDS,
              "primary_residual_records": primary_residual_records,
              "diagnostic_residual_records": diagnostic_residual_records,
              "all_residual_records": all_residual_records,
              "residual_summary_records": residual_summary_records,
              "sidecar_target_records": sidecar_target_records,
              "acceptance_record": ACCEPTANCE_RECORD,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "single_fixture_residual_audit_run": ACCEPTANCE_RECORD["single_fixture_residual_audit_run"],
                  "single_fixture_residual_audit_passed": ACCEPTANCE_RECORD["single_fixture_residual_audit_passed"],
                  "primary_combined_rms": ACCEPTANCE_RECORD["primary_combined_rms"],
                  "primary_combined_max_abs": ACCEPTANCE_RECORD["primary_combined_max_abs"],
                  "Planck_reference_uncertainty_computed": False,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_86_single_fixture_residual_audit.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          residual_fields = [
              "variant_label",
              "mode",
              "contract_status",
              "locked_orientation",
              "residual_status",
              "index",
              "z",
              "quantity",
              "target_name",
              "camb_value_oriented",
              "sidecar_expected_value",
              "delta",
              "abs_delta",
              "relative_delta",
              "comparison_scope"
          ]

          write_csv(
              OUTDIR / "primary_residual_records_v4_86.csv",
              primary_residual_records,
              residual_fields
          )

          write_csv(
              OUTDIR / "diagnostic_residual_records_v4_86.csv",
              diagnostic_residual_records,
              residual_fields
          )

          write_csv(
              OUTDIR / "all_residual_records_v4_86.csv",
              all_residual_records,
              residual_fields
          )

          write_csv(
              OUTDIR / "residual_summary_records_v4_86.csv",
              residual_summary_records,
              [
                  "variant_label",
                  "accepted_primary_contract_variant",
                  "residual_count",
                  "point_count",
                  "sigma8_rms",
                  "sigma8_mean_abs",
                  "sigma8_max_abs",
                  "sigma8_signed_mean",
                  "fsigma8_rms",
                  "fsigma8_mean_abs",
                  "fsigma8_max_abs",
                  "fsigma8_signed_mean",
                  "combined_rms",
                  "combined_mean_abs",
                  "combined_max_abs",
                  "combined_signed_mean",
                  "residual_threshold",
                  "pass_single_fixture_residual_threshold",
                  "summary_scope"
              ]
          )

          write_csv(
              OUTDIR / "sidecar_target_records_v4_86.csv",
              sidecar_target_records,
              ["z_key", "z", "target_name", "quantity", "expected_value", "target_scope"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_86.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_86.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_86.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.86 — Single Fixture Residual Audit")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This workflow uses the v4.85 locked orientation, `reversed_raw_order`, and compares the primary CAMB point fixture against the `.minimum` sidecar point targets.")
          md.append("")
          md.append("The single fixture residual audit passes if the primary point fixture residuals are below the declared tolerance.")
          md.append("")
          md.append("This is still not Planck reference uncertainty, not posterior covariance, not final RSD pressure, not likelihood/BIC/model comparison, and not TAIRID validation.")
          md.append("")
          md.append("## Acceptance record")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in ACCEPTANCE_RECORD.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Residual summary")
          md.append("")
          md.append("| Variant | Primary | Combined RMS | Combined max abs | Pass |")
          md.append("|---|---|---:|---:|---|")
          for row in residual_summary_records:
              md.append(
                  f"| `{row['variant_label']}` | `{row['accepted_primary_contract_variant']}` | `{row['combined_rms']}` | `{row['combined_max_abs']}` | `{row['pass_single_fixture_residual_threshold']}` |"
              )
          md.append("")
          md.append("## Primary residual records")
          md.append("")
          md.append("| z | Quantity | CAMB oriented | Sidecar expected | Delta |")
          md.append("|---:|---|---:|---:|---:|")
          for row in primary_residual_records:
              md.append(
                  f"| `{row['z']}` | `{row['quantity']}` | `{row['camb_value_oriented']}` | `{row['sidecar_expected_value']}` | `{row['delta']}` |"
              )
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_86_single_fixture_residual_audit.json",
              "tairid_v4_86_single_fixture_residual_audit.md",
              "primary_residual_records_v4_86.csv",
              "diagnostic_residual_records_v4_86.csv",
              "all_residual_records_v4_86.csv",
              "residual_summary_records_v4_86.csv",
              "sidecar_target_records_v4_86.csv",
              "blocked_claims_v4_86.csv",
              "next_route_options_v4_86.csv",
              "rule_results_v4_86.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_86_single_fixture_residual_audit.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

