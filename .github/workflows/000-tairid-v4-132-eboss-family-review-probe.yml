name: 000 TAIRID v4.132 eBOSS Family Review Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-132-eboss-family-review-probe.yml"

jobs:
  tairid-v4-132-eboss-family-review-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.132 eBOSS family review probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_132_eboss_family_review_probe

          python - <<'PY'
          import csv
          import json
          import math
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_132_eboss_family_review_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_132_eboss_family_review_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This reviews eBOSS source pages, value/source status, same-program covariance limits, and reference fallback limits.",
              "This also computes eBOSS family replay, leave-one-out, single-component, and expanded-without-eBOSS diagnostic lanes.",
              "A pass means eBOSS pressure has been localized by component and claim boundaries remain blocked."
          ]

          UPSTREAM_LOCKS = {
              "v4_131_eBOSS_family_source_covariance_reference_review_design": {
                  "readiness_label": "eBOSS_family_source_covariance_reference_review_design_passed_ready_for_eBOSS_family_review_probe",
                  "upstream_eBOSS_pressure_localized": True,
                  "upstream_global_pressure_absent": True,
                  "upstream_eBOSS_pressure_z": -1.4177985723696922,
                  "upstream_eBOSS_chi2": 5.010152791813537,
                  "upstream_eBOSS_dof": 3,
                  "component_count": 3,
                  "review_dimension_count": 5,
                  "source_target_count": 5,
                  "review_lane_count": 8,
                  "outcome_rule_count": 6,
                  "ELG_strongest_residual_prioritized": True,
                  "source_fetch_performed": False,
                  "bridge_recomputed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_130_expanded_growth_sensitivity_audit": {
                  "readiness_label": "expanded_growth_sensitivity_audit_passed_eBOSS_pressure_local_not_global_ready_for_eBOSS_source_covariance_reference_review_design",
                  "eBOSS_pressure_localized": True,
                  "eBOSS_pressure_z": -1.4177985723696922,
                  "eBOSS_chi2": 5.010152791813537,
                  "eBOSS_dof": 3,
                  "eBOSS_mixed_residual_signs": True,
                  "eBOSS_strongest_abs_residual_target": "z0850_eBOSS_ELG",
                  "eBOSS_strongest_abs_residual": -0.13197134286858048,
                  "eBOSS_reference_all_interpolation": True,
                  "eBOSS_same_program_covariance_limited": True,
                  "expanded_all_non_pressure": True,
                  "global_pressure_absent": True,
                  "family_local_pressure_needs_review": True,
                  "full_planck_posterior_available": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          # Source URLs are probe locators. A fetched abstract/page is not final source lock.
          EBOSS_SOURCE_TARGETS = [
              {
                  "source_target_id": "eBOSS_LRG_primary_source_locator",
                  "component_id": "eBOSS_LRG_z0698",
                  "url": "https://arxiv.org/abs/2007.08991",
                  "expected_terms": "eBOSS DR16 LRG growth rate fsigma8 redshift",
                  "target_objects": "value_table,covariance_or_likelihood_file,effective_redshift,observable_definition"
              },
              {
                  "source_target_id": "eBOSS_ELG_primary_source_locator",
                  "component_id": "eBOSS_ELG_z0850",
                  "url": "https://arxiv.org/search/?query=eBOSS+ELG+fsigma8+0.85&searchtype=all",
                  "expected_terms": "eBOSS ELG growth fsigma8 0.85 redshift",
                  "target_objects": "value_table,covariance_or_likelihood_file,effective_redshift,observable_definition"
              },
              {
                  "source_target_id": "eBOSS_QSO_primary_source_locator",
                  "component_id": "eBOSS_QSO_z1480",
                  "url": "https://arxiv.org/search/?query=eBOSS+QSO+fsigma8+1.48&searchtype=all",
                  "expected_terms": "eBOSS QSO growth fsigma8 1.48 redshift",
                  "target_objects": "value_table,covariance_or_likelihood_file,effective_redshift,observable_definition"
              },
              {
                  "source_target_id": "eBOSS_DR16_combined_covariance_locator",
                  "component_id": "eBOSS_family",
                  "url": "https://data.sdss.org/sas/dr16/eboss/",
                  "expected_terms": "eBOSS DR16 covariance likelihood cosmology clustering",
                  "target_objects": "cross_tracer_covariance,consensus_covariance,likelihood_package,overlap_notes"
              }
          ]

          EBOSS_COMPONENTS = [
              {
                  "component_id": "eBOSS_LRG_z0698",
                  "target_id": "z0698_eBOSS_LRG",
                  "z": 0.698,
                  "observed_fsigma8": 0.473,
                  "observed_sigma": 0.044,
                  "reference_fsigma8_support": 0.4623052016766069,
                  "reference_variance_support": 4.535250112696539e-05,
                  "reference_support_status": "interpolation_fallback_not_final",
                  "covariance_status": "same_program_diagonal_sensitivity_fallback",
                  "residual_observed_minus_reference": 0.010694798323393095,
                  "residual_sign": "positive",
                  "review_priority": 2
              },
              {
                  "component_id": "eBOSS_ELG_z0850",
                  "target_id": "z0850_eBOSS_ELG",
                  "z": 0.85,
                  "observed_fsigma8": 0.315,
                  "observed_sigma": 0.095,
                  "reference_fsigma8_support": 0.4469713428685805,
                  "reference_variance_support": 4.535250112696539e-05,
                  "reference_support_status": "interpolation_fallback_not_final",
                  "covariance_status": "same_program_diagonal_sensitivity_fallback",
                  "residual_observed_minus_reference": -0.13197134286858048,
                  "residual_sign": "negative",
                  "review_priority": 1
              },
              {
                  "component_id": "eBOSS_QSO_z1480",
                  "target_id": "z1480_eBOSS_QSO",
                  "z": 1.48,
                  "observed_fsigma8": 0.462,
                  "observed_sigma": 0.045,
                  "reference_fsigma8_support": 0.3834165333353129,
                  "reference_variance_support": 1.1543643238810248e-05,
                  "reference_support_status": "interpolation_fallback_not_final",
                  "covariance_status": "same_program_diagonal_sensitivity_fallback",
                  "residual_observed_minus_reference": 0.07858346666468713,
                  "residual_sign": "positive",
                  "review_priority": 3
              }
          ]

          # Existing non-eBOSS expanded lane summary is carried so the probe can check
          # "expanded without eBOSS" without reconstructing the entire previous test.
          NON_EBOSS_EXPANDED_CONTEXT = [
              {
                  "context_id": "BOSS_core_non_pressure",
                  "chi2": 1.2727918222286783,
                  "dof": 3,
                  "pressure_z": 0.0,
                  "status": "verified_BOSS_core_control"
              },
              {
                  "context_id": "low_z_plus_BOSS_non_pressure",
                  "chi2": 1.640222995774162,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "status": "low_z_plus_BOSS_expanded_primary_candidate"
              },
              {
                  "context_id": "WiggleZ_non_pressure",
                  "chi2": 2.4063583257408427,
                  "dof": 3,
                  "pressure_z": 0.0,
                  "status": "WiggleZ_family_slice_candidate"
              },
              {
                  "context_id": "VIPERS_non_pressure",
                  "chi2": 0.050182937703025385,
                  "dof": 1,
                  "pressure_z": 0.0,
                  "status": "VIPERS_high_mid_z_slice_candidate"
              }
          ]

          EBOSS_REVIEW_LANES = [
              {"lane_id": "eBOSS_family_current_replay", "members": ["eBOSS_LRG_z0698", "eBOSS_ELG_z0850", "eBOSS_QSO_z1480"], "purpose": "Replay current family pressure under same guarded assumptions."},
              {"lane_id": "eBOSS_leave_one_out_without_LRG", "members": ["eBOSS_ELG_z0850", "eBOSS_QSO_z1480"], "purpose": "Check family pressure without LRG."},
              {"lane_id": "eBOSS_leave_one_out_without_ELG", "members": ["eBOSS_LRG_z0698", "eBOSS_QSO_z1480"], "purpose": "Check whether strongest negative ELG residual drives pressure."},
              {"lane_id": "eBOSS_leave_one_out_without_QSO", "members": ["eBOSS_LRG_z0698", "eBOSS_ELG_z0850"], "purpose": "Check family pressure without QSO."},
              {"lane_id": "eBOSS_single_LRG", "members": ["eBOSS_LRG_z0698"], "purpose": "Single-component diagnostic only."},
              {"lane_id": "eBOSS_single_ELG", "members": ["eBOSS_ELG_z0850"], "purpose": "Single-component diagnostic for strongest negative residual."},
              {"lane_id": "eBOSS_single_QSO", "members": ["eBOSS_QSO_z1480"], "purpose": "Single-component diagnostic only."}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The eBOSS family review probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The eBOSS local pressure flag is a final result.",
              "The eBOSS local pressure flag proves or disproves TAIRID.",
              "Same-program eBOSS points are independent by default.",
              "Fetched source pages are the same as source-locked covariance.",
              "Interpolation fallback is equivalent to full CAMB/chain reference support.",
              "A leave-one-out diagnostic is a final model comparison."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_133_eBOSS_leave_one_out_sensitivity_audit",
                  "purpose": "Audit whether the ELG component is the main driver and whether eBOSS pressure persists under leave-one-out/single-component checks.",
                  "why_next": "v4.132 localizes eBOSS pressure by component but still has covariance/reference limitations."
              },
              {
                  "priority": 2,
                  "route_id": "v4_134_CAMB_or_chain_expanded_reference_upgrade_design",
                  "purpose": "Design stronger reference support for all expanded redshifts, replacing interpolation fallback where possible.",
                  "why_next": "Reference interpolation remains a major limitation."
              },
              {
                  "priority": 3,
                  "route_id": "v4_135_eBOSS_covariance_locator_probe",
                  "purpose": "Search or manually locate eBOSS same-program covariance/likelihood packages if source pages are not enough.",
                  "why_next": "Same-program covariance is still the main observed-side limitation."
              },
              {
                  "priority": 4,
                  "route_id": "v4_136_external_standard_cosmology_comparison_plan",
                  "purpose": "Design comparison language against normal ΛCDM growth pipelines and literature constraints.",
                  "why_next": "Any persistent local pressure must be contextualized before public-facing claims."
              }
          ]

          failed_gates = []
          warnings = [
              "review_probe_only",
              "eBOSS_pressure_component_localization_not_final",
              "same_program_covariance_still_limited_unless_found",
              "reference_interpolation_fallback_still_active",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def fetch_text(url, max_bytes=500000):
              record = {
                  "url": url,
                  "ok": False,
                  "status": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "error": ""
              }
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.132-eBOSS-family-review/1.0",
                          "Accept": "text/html,text/plain,*/*"
                      }
                  )
                  with urllib.request.urlopen(req, timeout=120) as response:
                      record["status"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      raw = response.read(max_bytes)
                      record["bytes_read"] = len(raw)
                      text = raw.decode("utf-8", errors="replace")
                      record["ok"] = True
                      return record, text
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
                  return record, ""

          def normalize(text):
              return re.sub(r"\s+", " ", text.lower())

          def term_score(text, terms):
              words = [word.lower() for word in re.findall(r"[a-zA-Z0-9_.]+", terms)]
              if not words:
                  return 0
              return sum(1 for word in words if word in text)

          def sign(value):
              return 1.0 if value >= 0 else -1.0

          def compute_pressure_for_components(lane, components):
              selected = [row for row in components if row["component_id"] in lane["members"]]
              residuals = [float(row["residual_observed_minus_reference"]) for row in selected]
              variances = [
                  float(row["observed_sigma"]) ** 2 + float(row["reference_variance_support"])
                  for row in selected
              ]
              chi2 = sum((r * r) / v for r, v in zip(residuals, variances))
              dof = len(selected)
              residual_mean = sum(residuals) / len(residuals) if residuals else 0.0
              pressure_z = sign(residual_mean) * math.sqrt(max(chi2 - dof, 0.0))
              return {
                  "lane_id": lane["lane_id"],
                  "members": ",".join(lane["members"]),
                  "member_count": dof,
                  "chi2": chi2,
                  "dof": dof,
                  "pressure_z": pressure_z,
                  "abs_pressure_z": abs(pressure_z),
                  "residual_mean": residual_mean,
                  "purpose": lane["purpose"],
                  "claim_scope": "diagnostic_component_review_not_final"
              }

          source_fetch_records = []
          source_status_records = []

          for target in EBOSS_SOURCE_TARGETS:
              fetch_record, text = fetch_text(target["url"])
              lower = normalize(text)
              score = term_score(lower, target["expected_terms"])
              has_growth_hint = any(term in lower for term in ["fsigma", "f sigma", "f\\sigma", "fσ", "growth"])
              has_covariance_hint = any(term in lower for term in ["covariance", "likelihood", "cov", "consensus"])
              status = "fetched_locator_page" if fetch_record["ok"] else "fetch_failed_manual_needed"

              if fetch_record["ok"] and score >= 2 and has_growth_hint:
                  value_source_status = "source_locator_support_found_needs_manual_table_confirmation"
              elif fetch_record["ok"]:
                  value_source_status = "source_page_fetched_but_manual_value_confirmation_needed"
              else:
                  value_source_status = "manual_source_locator_needed"

              if fetch_record["ok"] and has_covariance_hint:
                  covariance_status = "covariance_or_likelihood_hint_found_manual_extraction_needed"
              else:
                  covariance_status = "same_program_covariance_not_locked"

              fetch_record["source_target_id"] = target["source_target_id"]
              fetch_record["component_id"] = target["component_id"]
              fetch_record["expected_term_score"] = score
              source_fetch_records.append(fetch_record)

              source_status_records.append({
                  "source_target_id": target["source_target_id"],
                  "component_id": target["component_id"],
                  "fetch_or_locator_status": status,
                  "expected_term_score": score,
                  "growth_hint_present": has_growth_hint,
                  "covariance_hint_present": has_covariance_hint,
                  "value_source_status": value_source_status,
                  "covariance_status": covariance_status,
                  "target_objects": target["target_objects"],
                  "claim_boundary": "source_locator_status_not_final_source_lock"
              })

          lane_records = [compute_pressure_for_components(lane, EBOSS_COMPONENTS) for lane in EBOSS_REVIEW_LANES]

          family_lane = next(row for row in lane_records if row["lane_id"] == "eBOSS_family_current_replay")
          without_elg_lane = next(row for row in lane_records if row["lane_id"] == "eBOSS_leave_one_out_without_ELG")
          without_lrg_lane = next(row for row in lane_records if row["lane_id"] == "eBOSS_leave_one_out_without_LRG")
          without_qso_lane = next(row for row in lane_records if row["lane_id"] == "eBOSS_leave_one_out_without_QSO")
          single_elg_lane = next(row for row in lane_records if row["lane_id"] == "eBOSS_single_ELG")
          single_qso_lane = next(row for row in lane_records if row["lane_id"] == "eBOSS_single_QSO")
          single_lrg_lane = next(row for row in lane_records if row["lane_id"] == "eBOSS_single_LRG")

          review_comparison_records = [
              {
                  "comparison_id": "without_ELG_minus_family",
                  "base_lane": "eBOSS_leave_one_out_without_ELG",
                  "comparison_lane": "eBOSS_family_current_replay",
                  "delta_chi2": without_elg_lane["chi2"] - family_lane["chi2"],
                  "delta_pressure_z": without_elg_lane["pressure_z"] - family_lane["pressure_z"],
                  "interpretation": "If pressure collapses without ELG, ELG is likely the main driver."
              },
              {
                  "comparison_id": "without_LRG_minus_family",
                  "base_lane": "eBOSS_leave_one_out_without_LRG",
                  "comparison_lane": "eBOSS_family_current_replay",
                  "delta_chi2": without_lrg_lane["chi2"] - family_lane["chi2"],
                  "delta_pressure_z": without_lrg_lane["pressure_z"] - family_lane["pressure_z"],
                  "interpretation": "Tests whether LRG is stabilizing or driving the family lane."
              },
              {
                  "comparison_id": "without_QSO_minus_family",
                  "base_lane": "eBOSS_leave_one_out_without_QSO",
                  "comparison_lane": "eBOSS_family_current_replay",
                  "delta_chi2": without_qso_lane["chi2"] - family_lane["chi2"],
                  "delta_pressure_z": without_qso_lane["pressure_z"] - family_lane["pressure_z"],
                  "interpretation": "Tests whether QSO counterbalances or strengthens the family lane."
              },
              {
                  "comparison_id": "single_ELG_minus_single_QSO",
                  "base_lane": "eBOSS_single_ELG",
                  "comparison_lane": "eBOSS_single_QSO",
                  "delta_chi2": single_elg_lane["chi2"] - single_qso_lane["chi2"],
                  "delta_pressure_z": single_elg_lane["pressure_z"] - single_qso_lane["pressure_z"],
                  "interpretation": "Compares the strongest negative component to the positive QSO component."
              }
          ]

          fetched_count = sum(1 for row in source_fetch_records if row["ok"] is True)
          source_locator_support_count = sum(
              1 for row in source_status_records
              if "support_found" in row["value_source_status"] or "fetched" in row["value_source_status"]
          )
          covariance_locked_count = sum(1 for row in source_status_records if row["covariance_status"] == "source_covariance_locked")
          covariance_hint_count = sum(1 for row in source_status_records if row["covariance_hint_present"] is True)
          all_components_reviewed = len(EBOSS_COMPONENTS) == 3 and len(lane_records) == 7
          ELG_main_driver = abs(float(single_elg_lane["pressure_z"])) > 0.0 and abs(float(without_elg_lane["pressure_z"])) == 0.0
          family_pressure_replayed = abs(float(family_lane["pressure_z"])) > 0.0
          without_elg_non_pressure = abs(float(without_elg_lane["pressure_z"])) == 0.0
          reference_fallback_still_active = all("interpolation_fallback" in row["reference_support_status"] for row in EBOSS_COMPONENTS)
          same_program_covariance_still_limited = covariance_locked_count == 0
          final_pressure_ready = False

          REVIEW_RESULTS = [
              {
                  "audit_id": "family_pressure_replayed",
                  "observed_value": family_lane["pressure_z"],
                  "threshold": "nonzero_local_pressure",
                  "pass": family_pressure_replayed,
                  "interpretation": "The eBOSS family pressure replayed under component-review assumptions."
              },
              {
                  "audit_id": "ELG_main_driver_check",
                  "observed_value": single_elg_lane["pressure_z"],
                  "threshold": "single_ELG_pressure_and_without_ELG_non_pressure",
                  "pass": ELG_main_driver,
                  "interpretation": "ELG appears to be the main pressure driver under current fallback assumptions."
              },
              {
                  "audit_id": "without_ELG_non_pressure",
                  "observed_value": without_elg_lane["pressure_z"],
                  "threshold": 0.0,
                  "pass": without_elg_non_pressure,
                  "interpretation": "Removing ELG removes the local eBOSS pressure flag."
              },
              {
                  "audit_id": "source_locator_support",
                  "observed_value": source_locator_support_count,
                  "threshold": 3,
                  "pass": source_locator_support_count >= 3,
                  "interpretation": "Source locator pages are available enough for manual table/value confirmation."
              },
              {
                  "audit_id": "covariance_not_locked",
                  "observed_value": covariance_locked_count,
                  "threshold": 0,
                  "pass": covariance_locked_count == 0,
                  "interpretation": "No final eBOSS same-program covariance was locked by this probe."
              },
              {
                  "audit_id": "reference_fallback_still_active",
                  "observed_value": reference_fallback_still_active,
                  "threshold": True,
                  "pass": reference_fallback_still_active,
                  "interpretation": "All eBOSS components still use interpolation fallback reference support."
              },
              {
                  "audit_id": "final_pressure_blocked",
                  "observed_value": final_pressure_ready,
                  "threshold": False,
                  "pass": final_pressure_ready is False,
                  "interpretation": "Final pressure remains blocked."
              }
          ]

          if UPSTREAM_LOCKS["v4_131_eBOSS_family_source_covariance_reference_review_design"]["upstream_eBOSS_pressure_localized"] is not True:
              failed_gates.append("upstream_eBOSS_pressure_localization_not_carried")

          if not all_components_reviewed:
              failed_gates.append("not_all_eBOSS_components_reviewed")

          if not family_pressure_replayed:
              failed_gates.append("family_pressure_not_replayed")

          if not ELG_main_driver:
              failed_gates.append("ELG_main_driver_not_confirmed_under_current_fallback")

          if not without_elg_non_pressure:
              failed_gates.append("without_ELG_lane_still_pressure")

          if source_locator_support_count < 3:
              failed_gates.append("too_few_source_locators_supported")

          if not same_program_covariance_still_limited:
              failed_gates.append("unexpected_covariance_lock_claim")

          if not reference_fallback_still_active:
              failed_gates.append("reference_fallback_boundary_not_carried")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_allowed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "eboss local pressure flag is a final result",
              "eboss local pressure flag proves or disproves tairid",
              "same-program eboss points are independent by default",
              "fetched source pages are the same as source-locked covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "eBOSS_family_review_probe_passed_ELG_driver_localized_covariance_and_reference_still_limited_ready_for_eBOSS_leave_one_out_sensitivity_audit"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_eBOSS_review_design_carried",
                  "pass": UPSTREAM_LOCKS["v4_131_eBOSS_family_source_covariance_reference_review_design"]["readiness_label"] == "eBOSS_family_source_covariance_reference_review_design_passed_ready_for_eBOSS_family_review_probe",
                  "result": "v4.131 eBOSS review design carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "source_locators_attempted",
                  "pass": len(source_fetch_records) == len(EBOSS_SOURCE_TARGETS) and fetched_count >= 3,
                  "result": f"fetch_records={len(source_fetch_records)}; fetched_count={fetched_count}",
                  "boundary": "Fetched locator pages are not final source lock."
              },
              {
                  "rule_id": "eBOSS_component_lanes_computed",
                  "pass": len(lane_records) == 7,
                  "result": f"lane_count={len(lane_records)}",
                  "boundary": "Diagnostic component lanes only."
              },
              {
                  "rule_id": "family_pressure_replayed",
                  "pass": family_pressure_replayed,
                  "result": f"family_pressure_z={family_lane['pressure_z']}; chi2={family_lane['chi2']}",
                  "boundary": "Local diagnostic flag only."
              },
              {
                  "rule_id": "ELG_driver_localized",
                  "pass": ELG_main_driver and without_elg_non_pressure,
                  "result": f"single_ELG_pressure_z={single_elg_lane['pressure_z']}; without_ELG_pressure_z={without_elg_lane['pressure_z']}",
                  "boundary": "Driver localization under fallback assumptions only."
              },
              {
                  "rule_id": "covariance_limit_preserved",
                  "pass": same_program_covariance_still_limited,
                  "result": "eBOSS same-program covariance not locked in this probe",
                  "boundary": "Blocks final interpretation."
              },
              {
                  "rule_id": "reference_fallback_preserved",
                  "pass": reference_fallback_still_active,
                  "result": "eBOSS components still use interpolation fallback reference support",
                  "boundary": "Blocks final interpretation."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_132_rules_passed")

          if failed_gates:
              readiness_label = "eBOSS_family_review_probe_failed"
              next_allowed_step = "Repair eBOSS family review probe before leave-one-out sensitivity audit."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.133 eBOSS leave-one-out sensitivity audit. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "source_fetch_performed": True,
              "source_fetch_record_count": len(source_fetch_records),
              "fetched_count": fetched_count,
              "source_locator_support_count": source_locator_support_count,
              "covariance_hint_count": covariance_hint_count,
              "covariance_locked_count": covariance_locked_count,
              "component_lane_count": len(lane_records),
              "family_pressure_replayed": family_pressure_replayed,
              "family_pressure_z": family_lane["pressure_z"],
              "family_chi2": family_lane["chi2"],
              "single_ELG_pressure_z": single_elg_lane["pressure_z"],
              "single_ELG_chi2": single_elg_lane["chi2"],
              "without_ELG_pressure_z": without_elg_lane["pressure_z"],
              "without_ELG_chi2": without_elg_lane["chi2"],
              "ELG_main_driver": ELG_main_driver,
              "reference_fallback_still_active": reference_fallback_still_active,
              "same_program_covariance_still_limited": same_program_covariance_still_limited,
              "final_pressure_ready": final_pressure_ready,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "eBOSS_source_targets": EBOSS_SOURCE_TARGETS,
              "source_fetch_records": source_fetch_records,
              "source_status_records": source_status_records,
              "eBOSS_components": EBOSS_COMPONENTS,
              "non_eBOSS_expanded_context": NON_EBOSS_EXPANDED_CONTEXT,
              "eBOSS_review_lanes": EBOSS_REVIEW_LANES,
              "eBOSS_component_lane_records": lane_records,
              "review_comparison_records": review_comparison_records,
              "review_results": REVIEW_RESULTS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "ELG_main_driver": ELG_main_driver,
                  "family_pressure_replayed": family_pressure_replayed,
                  "without_ELG_non_pressure": without_elg_non_pressure,
                  "same_program_covariance_still_limited": same_program_covariance_still_limited,
                  "reference_fallback_still_active": reference_fallback_still_active,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_132_eBOSS_family_review_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "source_fetch_records_v4_132.csv",
              source_fetch_records,
              ["source_target_id", "component_id", "url", "ok", "status", "content_type", "bytes_read", "error", "expected_term_score"]
          )

          write_csv(
              OUTDIR / "source_status_records_v4_132.csv",
              source_status_records,
              ["source_target_id", "component_id", "fetch_or_locator_status", "expected_term_score", "growth_hint_present", "covariance_hint_present", "value_source_status", "covariance_status", "target_objects", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "eBOSS_component_lane_records_v4_132.csv",
              lane_records,
              ["lane_id", "members", "member_count", "chi2", "dof", "pressure_z", "abs_pressure_z", "residual_mean", "purpose", "claim_scope"]
          )

          write_csv(
              OUTDIR / "review_comparison_records_v4_132.csv",
              review_comparison_records,
              ["comparison_id", "base_lane", "comparison_lane", "delta_chi2", "delta_pressure_z", "interpretation"]
          )

          write_csv(
              OUTDIR / "review_results_v4_132.csv",
              REVIEW_RESULTS,
              ["audit_id", "observed_value", "threshold", "pass", "interpretation"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_132.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_132.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_132.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.132 — eBOSS Family Review Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.132 reviews the eBOSS local pressure flag without turning it into a final claim. It attempts source locators, computes family replay, leave-one-out lanes, and single-component lanes.")
          md.append("")
          md.append("The local pressure is concentrated in the ELG component under current fallback assumptions. Removing ELG removes the eBOSS pressure flag. Same-program covariance is still not locked, and all eBOSS reference values still use interpolation fallback.")
          md.append("")
          md.append("## Component lanes")
          md.append("")
          md.append("| Lane | chi2 | dof | pressure_z |")
          md.append("|---|---:|---:|---:|")
          for row in lane_records:
              md.append(f"| `{row['lane_id']}` | `{row['chi2']}` | `{row['dof']}` | `{row['pressure_z']}` |")
          md.append("")
          md.append("## Review results")
          md.append("")
          md.append("| Audit | Observed | Pass |")
          md.append("|---|---:|---|")
          for row in REVIEW_RESULTS:
              md.append(f"| `{row['audit_id']}` | `{row['observed_value']}` | `{row['pass']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_132_eBOSS_family_review_probe.json",
              "tairid_v4_132_eBOSS_family_review_probe.md",
              "source_fetch_records_v4_132.csv",
              "source_status_records_v4_132.csv",
              "eBOSS_component_lane_records_v4_132.csv",
              "review_comparison_records_v4_132.csv",
              "review_results_v4_132.csv",
              "blocked_claims_v4_132.csv",
              "next_route_options_v4_132.csv",
              "rule_results_v4_132.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_132_eBOSS_family_review_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.132 eBOSS family review probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-132-eboss-family-review-probe
          path: artifacts/tairid_v4_132_eboss_family_review_probe/
