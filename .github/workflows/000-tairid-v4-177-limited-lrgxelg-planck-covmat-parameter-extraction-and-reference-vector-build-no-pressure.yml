name: 000 TAIRID v4.177 - Limited LRGxELG Planck Covmat Parameter Extraction And Reference Vector Build No Pressure

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-177-limited-lrgxelg-planck-covmat-parameter-extraction-and-reference-vector-build-no-pressure.yml"

permissions:
  contents: read

jobs:
  v4-177-planck-parameter-extraction-reference-vector:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.177 Planck parameter extraction and reference vector build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_177_outputs
          cat > tairid_v4_177_outputs/run_v4_177.py <<'PY'
          import csv
          import hashlib
          import json
          import math
          import os
          import re
          import urllib.request
          import zipfile
          from pathlib import Path

          OUT = Path("tairid_v4_177_outputs")
          TMP = OUT / "tmp_downloads"
          TMP.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "limited_lrgxelg_planck_covmat_parameter_extraction_and_reference_vector_build_passed_parameter_packet_written_no_pressure_no_validation"

          PACKAGE_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
          PACKAGE_ID = "COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00"

          BASE_PREFIX = "base/plikHM_TTTEEE_lowl_lowE"
          SELECTED_MEMBERS = {
              "paramnames": BASE_PREFIX + "/base_plikHM_TTTEEE_lowl_lowE.paramnames",
              "margestats": BASE_PREFIX + "/dist/base_plikHM_TTTEEE_lowl_lowE.margestats",
              "covmat": BASE_PREFIX + "/dist/base_plikHM_TTTEEE_lowl_lowE.covmat",
              "minimum": BASE_PREFIX + "/base_plikHM_TTTEEE_lowl_lowE.minimum",
              "inputparams": BASE_PREFIX + "/base_plikHM_TTTEEE_lowl_lowE.inputparams",
          }

          LABELS = [
              "DM_ov_rd_z0p70",
              "DH_ov_rd_z0p70",
              "fsigma8_z0p70",
              "DM_ov_rd_z0p845",
              "DH_ov_rd_z0p845",
              "fsigma8_z0p845",
          ]

          BLOCKED_CLAIMS = [
              "no observed residuals computed",
              "no pressure computed",
              "no final chi-square",
              "no likelihood",
              "no BIC",
              "no posterior comparison",
              "no QSO covariance",
              "no full eBOSS covariance",
              "no Planck posterior covariance accepted",
              "no six-slot reference covariance accepted",
              "no LCDM ruled-out claim",
              "no TAIRID validation",
          ]

          MAX_DOWNLOAD_BYTES = int(os.environ.get("TAIRID_MAX_DOWNLOAD_BYTES", str(350 * 1024 * 1024)))

          PARAM_ALIASES = {
              "Omega_m": ["omegam", "Omega_m"],
              "H0_km_s_Mpc": ["H0", "h0"],
              "sigma8_z0": ["sigma8"],
              "rdragh_Mpc_times_h": ["rdragh", "rdrag_h", "rdragh"],
          }

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def download_with_cap(url, out_path, cap_bytes):
              result = {
                  "url": url,
                  "download_attempted": True,
                  "download_ok": False,
                  "downloaded_bytes": 0,
                  "sha256": "",
                  "error": "",
                  "skipped_reason": "",
              }
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.177/1.0"})
                  with urllib.request.urlopen(req, timeout=90) as resp, open(out_path, "wb") as f:
                      total = 0
                      while True:
                          chunk = resp.read(1024 * 1024)
                          if not chunk:
                              break
                          total += len(chunk)
                          if total > cap_bytes:
                              result["downloaded_bytes"] = total
                              result["skipped_reason"] = "download exceeded cap " + str(cap_bytes)
                              try:
                                  f.close()
                                  out_path.unlink(missing_ok=True)
                              except Exception:
                                  pass
                              return result
                          f.write(chunk)
                      result["downloaded_bytes"] = total
                  result["sha256"] = sha256_file(out_path)
                  result["download_ok"] = True
              except Exception as exc:
                  result["error"] = type(exc).__name__ + ": " + str(exc)[:240]
                  try:
                      out_path.unlink(missing_ok=True)
                  except Exception:
                      pass
              return result

          def read_member_text(zf, member):
              data = zf.read(member)
              return data.decode("utf-8", errors="replace")

          def parse_paramnames(text):
              rows = []
              for raw in text.splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  parts = line.split(None, 1)
                  name = parts[0].strip()
                  label = parts[1].strip() if len(parts) > 1 else ""
                  rows.append({
                      "parameter": name,
                      "display_label": label,
                      "derived_flag": name.endswith("*"),
                      "clean_parameter": name.rstrip("*"),
                  })
              return rows

          def parse_margestats(text):
              rows = []
              in_table = False
              for raw in text.splitlines():
                  line = raw.rstrip()
                  if not line.strip():
                      continue
                  if line.lower().startswith("parameter"):
                      in_table = True
                      continue
                  if not in_table:
                      continue
                  parts = line.split()
                  if len(parts) < 4:
                      continue
                  parameter = parts[0]
                  try:
                      mean = float(parts[1])
                      sddev = float(parts[2])
                      lower1 = float(parts[3])
                      upper1 = float(parts[4]) if len(parts) > 4 else float("nan")
                  except Exception:
                      continue
                  display_label = " ".join(parts[12:]) if len(parts) > 12 else ""
                  rows.append({
                      "parameter": parameter,
                      "clean_parameter": parameter.rstrip("*"),
                      "derived_flag": parameter.endswith("*"),
                      "mean": mean,
                      "sddev": sddev,
                      "lower1": lower1,
                      "upper1": upper1,
                      "display_label": display_label,
                  })
              return rows

          def parse_covmat(text):
              matrix = []
              for raw in text.splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  parts = line.split()
                  vals = []
                  ok = True
                  for p in parts:
                      try:
                          vals.append(float(p))
                      except Exception:
                          ok = False
                          break
                  if ok and vals:
                      matrix.append(vals)
              return matrix

          def select_param(margestats_rows, aliases):
              by_clean = {row["clean_parameter"].lower(): row for row in margestats_rows}
              by_full = {row["parameter"].lower(): row for row in margestats_rows}
              for alias in aliases:
                  a = alias.lower()
                  if a in by_clean:
                      return by_clean[a]
                  if a in by_full:
                      return by_full[a]
              return None

          def e_z(z, omega_m):
              return math.sqrt(omega_m * (1.0 + z) ** 3 + (1.0 - omega_m))

          def simpson_integral_inverse_e(z, omega_m, n=2000):
              if n % 2:
                  n += 1
              h = z / n
              total = 1.0 / e_z(0.0, omega_m) + 1.0 / e_z(z, omega_m)
              for i in range(1, n):
                  coeff = 4 if i % 2 else 2
                  total += coeff / e_z(i * h, omega_m)
              return h * total / 3.0

          def growth_factor_cpt(z, omega_m):
              ez2 = omega_m * (1.0 + z) ** 3 + (1.0 - omega_m)
              omz = omega_m * (1.0 + z) ** 3 / ez2
              olz = (1.0 - omega_m) / ez2
              gz = 5.0 * omz / (2.0 * (omz ** (4.0 / 7.0) - olz + (1.0 + omz / 2.0) * (1.0 + olz / 70.0)))
              om0 = omega_m
              ol0 = 1.0 - omega_m
              g0 = 5.0 * om0 / (2.0 * (om0 ** (4.0 / 7.0) - ol0 + (1.0 + om0 / 2.0) * (1.0 + ol0 / 70.0)))
              return gz / (g0 * (1.0 + z))

          def compute_reference_vector(omega_m, h0, rd_mpc, sigma8, gamma=0.55):
              c_km_s = 299792.458
              rows = []
              for z_label, z in [("z0p70", 0.700), ("z0p845", 0.845)]:
                  ez = e_z(z, omega_m)
                  dm_rd = (c_km_s / h0) * simpson_integral_inverse_e(z, omega_m) / rd_mpc
                  dh_rd = c_km_s / (h0 * ez) / rd_mpc
                  ez2 = omega_m * (1.0 + z) ** 3 + (1.0 - omega_m)
                  omz = omega_m * (1.0 + z) ** 3 / ez2
                  f_growth = omz ** gamma
                  fs8 = f_growth * sigma8 * growth_factor_cpt(z, omega_m)
                  rows.extend([
                      {"label": "DM_ov_rd_" + z_label, "z": z, "role": "transverse_geometry_reach", "planck_summary_reference_value": dm_rd},
                      {"label": "DH_ov_rd_" + z_label, "z": z, "role": "radial_geometry_pacing_access", "planck_summary_reference_value": dh_rd},
                      {"label": "fsigma8_" + z_label, "z": z, "role": "growth_consolidation", "planck_summary_reference_value": fs8},
                  ])
              return rows

          def compute_covmat_diag(matrix):
              if not matrix:
                  return {
                      "rows": 0,
                      "cols": 0,
                      "square": False,
                      "symmetric": False,
                      "max_asym": "",
                      "min_diag": "",
                      "positive_diag": False,
                  }
              rows = len(matrix)
              cols = max(len(r) for r in matrix)
              square = rows == cols and all(len(r) == cols for r in matrix)
              max_asym = ""
              min_diag = ""
              symmetric = False
              positive_diag = False
              if square:
                  max_asym_val = 0.0
                  min_diag_val = None
                  for i in range(rows):
                      if min_diag_val is None or matrix[i][i] < min_diag_val:
                          min_diag_val = matrix[i][i]
                      for j in range(cols):
                          max_asym_val = max(max_asym_val, abs(matrix[i][j] - matrix[j][i]))
                  max_asym = max_asym_val
                  min_diag = min_diag_val
                  symmetric = max_asym_val <= 1e-10
                  positive_diag = min_diag_val is not None and min_diag_val > 0
              return {
                  "rows": rows,
                  "cols": cols,
                  "square": square,
                  "symmetric": symmetric,
                  "max_asym": max_asym,
                  "min_diag": min_diag,
                  "positive_diag": positive_diag,
              }

          download_path = TMP / "planck_candidate.zip"
          download = download_with_cap(PACKAGE_URL, download_path, MAX_DOWNLOAD_BYTES)

          extracted_status_rows = []
          paramnames_rows = []
          margestats_rows = []
          covmat_matrix = []
          planck_parameter_rows = []
          reference_vector_rows = []
          reference_corridor_rows = []
          package_status = "download_failed_or_blocked"
          selected_next_route = "limited_lrgxelg_planck_package_download_failed_try_manual_route_with_scope_guards"

          if download["download_ok"]:
              try:
                  with zipfile.ZipFile(download_path, "r") as zf:
                      member_set = set(zf.namelist())
                      for key, member in SELECTED_MEMBERS.items():
                          present = member in member_set
                          extracted_status_rows.append({
                              "member_key": key,
                              "member_name": member,
                              "present": present,
                              "status": "present" if present else "missing",
                          })

                      if SELECTED_MEMBERS["paramnames"] in member_set:
                          paramnames_rows = parse_paramnames(read_member_text(zf, SELECTED_MEMBERS["paramnames"]))

                      if SELECTED_MEMBERS["margestats"] in member_set:
                          margestats_rows = parse_margestats(read_member_text(zf, SELECTED_MEMBERS["margestats"]))

                      if SELECTED_MEMBERS["covmat"] in member_set:
                          covmat_matrix = parse_covmat(read_member_text(zf, SELECTED_MEMBERS["covmat"]))

                  selected = {}
                  for field, aliases in PARAM_ALIASES.items():
                      row = select_param(margestats_rows, aliases)
                      if row is not None:
                          selected[field] = row
                          planck_parameter_rows.append({
                              "field": field,
                              "source_parameter": row["parameter"],
                              "mean": row["mean"],
                              "sddev": row["sddev"],
                              "derived_flag": row["derived_flag"],
                              "display_label": row["display_label"],
                              "source_member": SELECTED_MEMBERS["margestats"],
                              "status": "extracted_from_margestats",
                          })
                      else:
                          planck_parameter_rows.append({
                              "field": field,
                              "source_parameter": "",
                              "mean": "",
                              "sddev": "",
                              "derived_flag": "",
                              "display_label": "",
                              "source_member": SELECTED_MEMBERS["margestats"],
                              "status": "missing_from_margestats",
                          })

                  required_for_vector = ["Omega_m", "H0_km_s_Mpc", "sigma8_z0", "rdragh_Mpc_times_h"]
                  have_required = all(k in selected for k in required_for_vector)

                  if have_required:
                      omega_m = selected["Omega_m"]["mean"]
                      h0 = selected["H0_km_s_Mpc"]["mean"]
                      sigma8 = selected["sigma8_z0"]["mean"]
                      rdragh = selected["rdragh_Mpc_times_h"]["mean"]
                      h = h0 / 100.0
                      rd = rdragh / h

                      # Rough diagonal-only propagation for rd; this is not covariance.
                      rdragh_sd = selected["rdragh_Mpc_times_h"]["sddev"]
                      h0_sd = selected["H0_km_s_Mpc"]["sddev"]
                      rd_sd = abs(rd) * math.sqrt((rdragh_sd / rdragh) ** 2 + (h0_sd / h0) ** 2)

                      planck_parameter_rows.append({
                          "field": "rd_Mpc",
                          "source_parameter": "derived_from_rdragh_and_H0",
                          "mean": rd,
                          "sddev": rd_sd,
                          "derived_flag": True,
                          "display_label": "r_drag = (rdrag h) / h",
                          "source_member": SELECTED_MEMBERS["margestats"],
                          "status": "derived_diagonal_only_not_covariance",
                      })

                      reference_vector_rows = compute_reference_vector(omega_m, h0, rd, sigma8, gamma=0.55)
                      for row in reference_vector_rows:
                          row["source"] = "Planck margestats baseline + LCDM-lite distance/growth approximation"
                          row["pressure_status"] = "reference_only_no_observed_residuals_no_pressure"

                      # Diagonal-only one-sigma corridor using finite perturbation; not accepted covariance.
                      perturbations = {
                          "Omega_m": selected["Omega_m"]["sddev"],
                          "H0_km_s_Mpc": selected["H0_km_s_Mpc"]["sddev"],
                          "rd_Mpc": rd_sd,
                          "sigma8_z0": selected["sigma8_z0"]["sddev"],
                      }

                      central_params = {
                          "Omega_m": omega_m,
                          "H0_km_s_Mpc": h0,
                          "rd_Mpc": rd,
                          "sigma8_z0": sigma8,
                      }

                      central_vec = {r["label"]: r["planck_summary_reference_value"] for r in reference_vector_rows}
                      for driver, step in perturbations.items():
                          if not step or not math.isfinite(step) or step <= 0:
                              continue
                          plus = dict(central_params)
                          minus = dict(central_params)
                          plus[driver] += step
                          minus[driver] -= step
                          plus_vec = {r["label"]: r["planck_summary_reference_value"] for r in compute_reference_vector(plus["Omega_m"], plus["H0_km_s_Mpc"], plus["rd_Mpc"], plus["sigma8_z0"], gamma=0.55)}
                          minus_vec = {r["label"]: r["planck_summary_reference_value"] for r in compute_reference_vector(minus["Omega_m"], minus["H0_km_s_Mpc"], minus["rd_Mpc"], minus["sigma8_z0"], gamma=0.55)}
                          for label in LABELS:
                              half_width = abs(plus_vec[label] - minus_vec[label]) / 2.0
                              reference_corridor_rows.append({
                                  "driver": driver,
                                  "driver_one_sigma_step": step,
                                  "label": label,
                                  "central_reference_value": central_vec[label],
                                  "one_sigma_half_width_preview_not_covariance": half_width,
                                  "fractional_half_width_preview_not_covariance": half_width / abs(central_vec[label]) if central_vec[label] else "",
                              })

                      package_status = "planck_parameter_packet_and_reference_vector_built"
                      selected_next_route = "limited_lrgxelg_planck_summary_reference_vs_observed_preview_no_pressure_with_scope_guards"
                  elif margestats_rows:
                      package_status = "margestats_extracted_but_required_parameters_missing"
                      selected_next_route = "limited_lrgxelg_planck_margestats_parameter_mapping_repair_with_scope_guards"
                  else:
                      package_status = "package_downloaded_but_margestats_missing"
                      selected_next_route = "limited_lrgxelg_planck_package_member_selection_repair_with_scope_guards"

              except Exception as exc:
                  package_status = "zip_processing_failed"
                  selected_next_route = "limited_lrgxelg_planck_package_processing_repair_with_scope_guards"
                  extracted_status_rows.append({
                      "member_key": "exception",
                      "member_name": "",
                      "present": False,
                      "status": type(exc).__name__ + ": " + str(exc)[:240],
                  })

          write_csv(
              OUT / "v4_177_download_status.csv",
              [download],
              ["url", "download_attempted", "download_ok", "downloaded_bytes", "sha256", "error", "skipped_reason"],
          )

          write_csv(
              OUT / "v4_177_selected_member_status.csv",
              extracted_status_rows,
              ["member_key", "member_name", "present", "status"],
          )

          write_csv(
              OUT / "v4_177_paramnames_table.csv",
              paramnames_rows,
              ["parameter", "display_label", "derived_flag", "clean_parameter"],
          )

          write_csv(
              OUT / "v4_177_margestats_table.csv",
              margestats_rows,
              ["parameter", "clean_parameter", "derived_flag", "mean", "sddev", "lower1", "upper1", "display_label"],
          )

          write_csv(
              OUT / "v4_177_planck_parameter_packet.csv",
              planck_parameter_rows,
              ["field", "source_parameter", "mean", "sddev", "derived_flag", "display_label", "source_member", "status"],
          )

          write_csv(
              OUT / "v4_177_planck_summary_reference_vector.csv",
              reference_vector_rows,
              ["label", "z", "role", "planck_summary_reference_value", "source", "pressure_status"],
          )

          write_csv(
              OUT / "v4_177_planck_summary_reference_corridor_preview.csv",
              reference_corridor_rows,
              ["driver", "driver_one_sigma_step", "label", "central_reference_value", "one_sigma_half_width_preview_not_covariance", "fractional_half_width_preview_not_covariance"],
          )

          covdiag = compute_covmat_diag(covmat_matrix)
          covdiag_row = {
              "source_member": SELECTED_MEMBERS["covmat"],
              "rows": covdiag["rows"],
              "cols": covdiag["cols"],
              "square": covdiag["square"],
              "symmetric": covdiag["symmetric"],
              "max_asym": covdiag["max_asym"],
              "min_diag": covdiag["min_diag"],
              "positive_diag": covdiag["positive_diag"],
              "status": "source_covmat_diagnostic_only_not_six_slot_reference_covariance",
          }
          write_csv(
              OUT / "v4_177_covmat_shape_diagnostic.csv",
              [covdiag_row],
              ["source_member", "rows", "cols", "square", "symmetric", "max_asym", "min_diag", "positive_diag", "status"],
          )

          readiness = {
              "version": "v4.177",
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "download_ok": download["download_ok"],
              "paramnames_count": len(paramnames_rows),
              "margestats_row_count": len(margestats_rows),
              "covmat_rows": covdiag["rows"],
              "reference_vector_built": len(reference_vector_rows) == 6,
              "reference_corridor_preview_built": len(reference_corridor_rows) > 0,
              "six_slot_reference_covariance_built": False,
              "pressure_computed": False,
              "truth_boundary": "Planck parameter packet and reference-vector build only; no observed residuals or pressure",
              "blocked_claims": BLOCKED_CLAIMS,
          }

          (OUT / "v4_177_readiness_report.json").write_text(json.dumps(readiness, indent=2), encoding="utf-8")

          (OUT / "v4_177_route_decision.json").write_text(json.dumps({
              "version": "v4.177",
              "result_label": RESULT_LABEL,
              "clean_result": "Planck package was processed into a parameter packet and, if possible, a six-slot reference vector. No observed residuals or pressure were computed.",
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "blocked_claims": BLOCKED_CLAIMS,
          }, indent=2), encoding="utf-8")

          (OUT / "v4_177_scope_guards.json").write_text(json.dumps({
              "scope": "Planck parameter extraction and reference vector build only",
              "observed_values_used": False,
              "observed_residuals_computed": False,
              "reference_vector_built": len(reference_vector_rows) == 6,
              "reference_corridor_preview_built": len(reference_corridor_rows) > 0,
              "six_slot_reference_covariance_accepted": False,
              "pressure_computed": False,
              "likelihood_computed": False,
              "bic_computed": False,
              "posterior_comparison_computed": False,
              "tairid_validated": False,
          }, indent=2), encoding="utf-8")

          (OUT / "v4_177_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = []
          summary.append("# TAIRID v4.177 - Planck Parameter Extraction And Reference Vector Build")
          summary.append("")
          summary.append("Expected result: `" + RESULT_LABEL + "`")
          summary.append("")
          summary.append("## Clean result")
          summary.append("")
          summary.append("This workflow extracts a Planck parameter packet from the selected CosmoParams package and builds a six-slot reference vector if the required parameters are present.")
          summary.append("")
          summary.append("Package status: `" + package_status + "`")
          summary.append("")
          summary.append("Selected next route: `" + selected_next_route + "`")
          summary.append("")
          summary.append("## Boundary")
          for item in BLOCKED_CLAIMS:
              summary.append("- " + item)
          (OUT / "v4_177_summary.md").write_text("\n".join(summary), encoding="utf-8")

          rules = {
              "version_is_v4_177": True,
              "result_label_present": RESULT_LABEL.endswith("no_pressure_no_validation"),
              "download_status_written": (OUT / "v4_177_download_status.csv").exists(),
              "member_status_written": (OUT / "v4_177_selected_member_status.csv").exists(),
              "paramnames_table_written": (OUT / "v4_177_paramnames_table.csv").exists(),
              "margestats_table_written": (OUT / "v4_177_margestats_table.csv").exists(),
              "parameter_packet_written": (OUT / "v4_177_planck_parameter_packet.csv").exists(),
              "reference_vector_written": (OUT / "v4_177_planck_summary_reference_vector.csv").exists(),
              "reference_corridor_written": (OUT / "v4_177_planck_summary_reference_corridor_preview.csv").exists(),
              "covmat_shape_written": (OUT / "v4_177_covmat_shape_diagnostic.csv").exists(),
              "readiness_report_written": (OUT / "v4_177_readiness_report.json").exists(),
              "route_decision_written": (OUT / "v4_177_route_decision.json").exists(),
              "scope_guards_written": (OUT / "v4_177_scope_guards.json").exists(),
              "blocked_claims_written": (OUT / "v4_177_blocked_claims.json").exists(),
              "summary_written": (OUT / "v4_177_summary.md").exists(),
              "no_observed_values_used": True,
              "no_residuals_computed": True,
              "no_pressure_computed": True,
              "no_likelihood_computed": True,
              "no_validation_claimed": True,
              "next_route_selected": bool(selected_next_route),
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.177",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "reference_vector_built": len(reference_vector_rows) == 6,
              "reference_corridor_preview_built": len(reference_corridor_rows) > 0,
              "claim_boundary": "parameter_packet_and_reference_vector_only_no_pressure_no_validation",
          }

          (OUT / "v4_177_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")

          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.177 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_177_outputs/run_v4_177.py

