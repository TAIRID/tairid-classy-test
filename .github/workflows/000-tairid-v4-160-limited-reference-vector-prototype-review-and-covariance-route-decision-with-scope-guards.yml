name: 000 TAIRID v4.160 - Limited Reference Vector Prototype Review and Covariance Route Decision With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-160-limited-reference-vector-prototype-review-and-covariance-route-decision-with-scope-guards.yml"

jobs:
  limited-reference-vector-prototype-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run v4.160 guarded review and route decision
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import json
          import math
          import os
          import platform
          from datetime import datetime, timezone
          from pathlib import Path

          OUT = Path("tairid_v4_160_limited_reference_vector_prototype_review_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          VERSION = "v4.160"
          TITLE = "000 TAIRID v4.160 - Limited Reference Vector Prototype Review and Covariance Route Decision With Scope Guards"
          EXPECTED = "limited_reference_vector_prototype_review_and_covariance_route_decision_passed_next_route_selected_no_covariance_no_pressure_no_validation"
          BOUNDARY = "prototype_reference_vector_review_only_no_covariance_no_pressure_no_validation"

          # Carried forward from the v4.159 LCDM-lite prototype.
          # These are diagnostic prototype reference values only.
          reference_rows = [
              {
                  "slot_index": 0,
                  "row_id": "DM_ov_rd_z0p70",
                  "z": 0.700,
                  "observable": "DM_over_rd",
                  "reference_product_role": "geometry_transverse",
                  "units": "dimensionless_ratio_to_rd",
                  "reference_mean_value": 17.5805195461,
              },
              {
                  "slot_index": 1,
                  "row_id": "DH_ov_rd_z0p70",
                  "z": 0.700,
                  "observable": "DH_over_rd",
                  "reference_product_role": "geometry_radial",
                  "units": "dimensionless_ratio_to_rd",
                  "reference_mean_value": 20.2449335870,
              },
              {
                  "slot_index": 2,
                  "row_id": "fsigma8_z0p70",
                  "z": 0.700,
                  "observable": "fsigma8",
                  "reference_product_role": "growth",
                  "units": "dimensionless",
                  "reference_mean_value": 0.4618546966,
              },
              {
                  "slot_index": 3,
                  "row_id": "DM_ov_rd_z0p845",
                  "z": 0.845,
                  "observable": "DM_over_rd",
                  "reference_product_role": "geometry_transverse",
                  "units": "dimensionless_ratio_to_rd",
                  "reference_mean_value": 20.3899796593,
              },
              {
                  "slot_index": 4,
                  "row_id": "DH_ov_rd_z0p845",
                  "z": 0.845,
                  "observable": "DH_over_rd",
                  "reference_product_role": "geometry_radial",
                  "units": "dimensionless_ratio_to_rd",
                  "reference_mean_value": 18.5350397709,
              },
              {
                  "slot_index": 5,
                  "row_id": "fsigma8_z0p845",
                  "z": 0.845,
                  "observable": "fsigma8",
                  "reference_product_role": "growth",
                  "units": "dimensionless",
                  "reference_mean_value": 0.4480660425,
              },
          ]

          expected_order = [
              "DM_ov_rd_z0p70",
              "DH_ov_rd_z0p70",
              "fsigma8_z0p70",
              "DM_ov_rd_z0p845",
              "DH_ov_rd_z0p845",
              "fsigma8_z0p845",
          ]

          for row in reference_rows:
              row["reference_model"] = "LCDM_lite_flat_fixed_parameter_diagnostic"
              row["parameter_set"] = "Planck_like_LCDM_lite_fixed_parameters_not_posterior_not_covariance"
              row["claim_boundary"] = BOUNDARY

          def write_csv(path, rows, fieldnames=None):
              if fieldnames is None:
                  fieldnames = list(rows[0].keys()) if rows else []
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          write_csv(
              OUT / "limited_reference_vector_prototype_review_v4_160.csv",
              reference_rows,
              [
                  "slot_index",
                  "row_id",
                  "z",
                  "observable",
                  "reference_product_role",
                  "units",
                  "reference_mean_value",
                  "reference_model",
                  "parameter_set",
                  "claim_boundary",
              ],
          )

          # Basic prototype review checks. These are not scientific validation.
          row_order_matches = [r["row_id"] for r in reference_rows] == expected_order
          all_finite = all(math.isfinite(float(r["reference_mean_value"])) for r in reference_rows)
          all_positive = all(float(r["reference_mean_value"]) > 0.0 for r in reference_rows)
          dm_low = reference_rows[0]["reference_mean_value"]
          dm_high = reference_rows[3]["reference_mean_value"]
          dh_low = reference_rows[1]["reference_mean_value"]
          dh_high = reference_rows[4]["reference_mean_value"]
          fs8_low = reference_rows[2]["reference_mean_value"]
          fs8_high = reference_rows[5]["reference_mean_value"]

          review_metrics = [
              {
                  "metric": "reference_value_slots_reviewed",
                  "value": "6",
                  "status": "pass",
                  "claim_boundary": BOUNDARY,
              },
              {
                  "metric": "row_order_matches_limited_lrgxelg_order",
                  "value": str(row_order_matches),
                  "status": "pass" if row_order_matches else "fail",
                  "claim_boundary": BOUNDARY,
              },
              {
                  "metric": "all_values_finite",
                  "value": str(all_finite),
                  "status": "pass" if all_finite else "fail",
                  "claim_boundary": BOUNDARY,
              },
              {
                  "metric": "all_values_positive",
                  "value": str(all_positive),
                  "status": "pass" if all_positive else "fail",
                  "claim_boundary": BOUNDARY,
              },
              {
                  "metric": "dm_over_rd_increases_from_z0p70_to_z0p845",
                  "value": str(dm_high > dm_low),
                  "status": "pass" if dm_high > dm_low else "review",
                  "claim_boundary": "sanity_check_only_not_validation",
              },
              {
                  "metric": "dh_over_rd_decreases_from_z0p70_to_z0p845",
                  "value": str(dh_high < dh_low),
                  "status": "pass" if dh_high < dh_low else "review",
                  "claim_boundary": "sanity_check_only_not_validation",
              },
              {
                  "metric": "fsigma8_mildly_decreases_from_z0p70_to_z0p845_in_this_lcdm_lite_model",
                  "value": str(fs8_high < fs8_low),
                  "status": "pass" if fs8_high < fs8_low else "review",
                  "claim_boundary": "sanity_check_only_not_validation",
              },
          ]
          write_csv(OUT / "prototype_review_metrics_v4_160.csv", review_metrics)

          route_rows = [
              {
                  "route_id": "R1",
                  "route_name": "external_planck_or_reference_chain_package",
                  "status_after_v4_160": "preferred_for_final_reference_but_missing",
                  "can_generate_reference_covariance_now": False,
                  "usable_for_pressure_now": False,
                  "next_action": "locate_downloadable_chain_or_parameter_sample_package_and_license_notes",
                  "claim_boundary": "required_for_stronger_reference_uncertainty_not_present",
              },
              {
                  "route_id": "R2",
                  "route_name": "CAMB_or_CLASS_background_growth_generation",
                  "status_after_v4_160": "blocked_in_current_runner_by_v4_158b",
                  "can_generate_reference_covariance_now": False,
                  "usable_for_pressure_now": False,
                  "next_action": "only_reopen_if_runner_environment_or_dependency_install_route_changes",
                  "claim_boundary": "software_route_unavailable_here",
              },
              {
                  "route_id": "R3",
                  "route_name": "self_contained_lcdm_lite_finite_difference_sensitivity_corridor",
                  "status_after_v4_160": "available_as_diagnostic_next_route_only",
                  "can_generate_reference_covariance_now": False,
                  "usable_for_pressure_now": False,
                  "next_action": "run_parameter_sensitivity_corridor_without_converting_it_to_posterior_covariance",
                  "claim_boundary": "diagnostic_sensitivity_only_not_planck_posterior_not_covariance",
              },
              {
                  "route_id": "R4",
                  "route_name": "diagonal_only_reference_uncertainty_guess",
                  "status_after_v4_160": "blocked_for_pressure",
                  "can_generate_reference_covariance_now": False,
                  "usable_for_pressure_now": False,
                  "next_action": "do_not_use_for_pressure_claims",
                  "claim_boundary": "would_create_false_precision",
              },
              {
                  "route_id": "R5",
                  "route_name": "observed_covariance_only",
                  "status_after_v4_160": "insufficient_for_reference_uncertainty",
                  "can_generate_reference_covariance_now": False,
                  "usable_for_pressure_now": False,
                  "next_action": "keep_observed_covariance_separate_from_reference_uncertainty",
                  "claim_boundary": "observed_covariance_is_not_reference_covariance",
              },
          ]
          write_csv(OUT / "covariance_route_decision_matrix_v4_160.csv", route_rows)

          dependency_rows = [
              {
                  "dependency": "limited_lrgxelg_reference_mean_vector_6",
                  "status_after_v4_160": "prototype_reviewed_lcdm_lite_only",
                  "usable_for_pressure": False,
                  "claim_boundary": "not_final_reference_vector",
              },
              {
                  "dependency": "limited_lrgxelg_reference_covariance_or_samples",
                  "status_after_v4_160": "missing",
                  "usable_for_pressure": False,
                  "claim_boundary": "required_before_covariance_weighted_pressure",
              },
              {
                  "dependency": "expanded_12_redshift_growth_reference_vector",
                  "status_after_v4_160": "missing",
                  "usable_for_pressure": False,
                  "claim_boundary": "outside_limited_product",
              },
              {
                  "dependency": "expanded_12_redshift_reference_covariance_or_samples",
                  "status_after_v4_160": "missing",
                  "usable_for_pressure": False,
                  "claim_boundary": "outside_limited_product",
              },
              {
                  "dependency": "qso_covariance_or_likelihood",
                  "status_after_v4_160": "missing",
                  "usable_for_pressure": False,
                  "claim_boundary": "not_supplied_by_limited_lrgxelg_product",
              },
              {
                  "dependency": "full_eboss_family_covariance_or_overlap_model",
                  "status_after_v4_160": "missing",
                  "usable_for_pressure": False,
                  "claim_boundary": "not_supplied_by_limited_lrgxelg_product",
              },
              {
                  "dependency": "final_pressure_methodology_spec",
                  "status_after_v4_160": "missing",
                  "usable_for_pressure": False,
                  "claim_boundary": "must_be_locked_before_pressure",
              },
          ]
          write_csv(OUT / "reference_dependency_status_after_v4_160.csv", dependency_rows)

          selected_next_route = "limited_lrgxelg_lcdm_lite_parameter_sensitivity_corridor_with_scope_guards"

          scope_rows = [
              {
                  "guard": "no_observed_values_ingested",
                  "status": "enforced",
                  "detail": "v4.160 reviews the v4.159 prototype reference vector only",
              },
              {
                  "guard": "no_reference_covariance_generated",
                  "status": "enforced",
                  "detail": "route decision only; no covariance is created",
              },
              {
                  "guard": "no_residuals_or_pressure",
                  "status": "enforced",
                  "detail": "no comparison against observed values is performed",
              },
              {
                  "guard": "no_qso_or_full_eboss_claim",
                  "status": "enforced",
                  "detail": "limited LRGxELG scope only",
              },
              {
                  "guard": "no_validation_claim",
                  "status": "enforced",
                  "detail": "diagnostic scaffolding only",
              },
          ]
          write_csv(OUT / "scope_guard_report_v4_160.csv", scope_rows)

          blocked_claims = [
              {
                  "claim": "TAIRID is validated by v4.160",
                  "blocked": True,
                  "reason": "no observed values, residuals, pressure, covariance, likelihood, or posterior comparison",
              },
              {
                  "claim": "v4.160 supplies reference covariance",
                  "blocked": True,
                  "reason": "only route decision is written",
              },
              {
                  "claim": "LCDM-lite prototype is a Planck posterior reference",
                  "blocked": True,
                  "reason": "fixed diagnostic parameters are not posterior samples",
              },
              {
                  "claim": "v4.160 resolves QSO or full eBOSS covariance",
                  "blocked": True,
                  "reason": "limited LRGxELG scope only",
              },
              {
                  "claim": "v4.160 computes pressure",
                  "blocked": True,
                  "reason": "pressure and residual computation are intentionally absent",
              },
          ]
          write_csv(OUT / "blocked_claims_report_v4_160.csv", blocked_claims)

          rule_rows = [
              {"rule_id": "R01", "rule": "six_reference_values_reviewed", "pass": len(reference_rows) == 6},
              {"rule_id": "R02", "rule": "row_order_matches_limited_lrgxelg_order", "pass": row_order_matches},
              {"rule_id": "R03", "rule": "reference_values_are_finite", "pass": all_finite},
              {"rule_id": "R04", "rule": "reference_values_are_positive", "pass": all_positive},
              {"rule_id": "R05", "rule": "prototype_review_metrics_written", "pass": True},
              {"rule_id": "R06", "rule": "covariance_route_decision_matrix_written", "pass": True},
              {"rule_id": "R07", "rule": "external_chain_route_marked_missing", "pass": True},
              {"rule_id": "R08", "rule": "camb_class_route_marked_blocked", "pass": True},
              {"rule_id": "R09", "rule": "finite_difference_corridor_marked_diagnostic_only", "pass": True},
              {"rule_id": "R10", "rule": "diagonal_guess_route_blocked_for_pressure", "pass": True},
              {"rule_id": "R11", "rule": "observed_covariance_only_route_marked_insufficient", "pass": True},
              {"rule_id": "R12", "rule": "dependency_status_written", "pass": True},
              {"rule_id": "R13", "rule": "no_observed_values_ingested", "pass": True},
              {"rule_id": "R14", "rule": "no_reference_covariance_generated", "pass": True},
              {"rule_id": "R15", "rule": "no_residuals_computed", "pass": True},
              {"rule_id": "R16", "rule": "no_pressure_computed", "pass": True},
              {"rule_id": "R17", "rule": "no_validation_claim_allowed", "pass": True},
              {"rule_id": "R18", "rule": "next_route_selected", "pass": selected_next_route != ""},
          ]
          write_csv(OUT / "rule_audit_v4_160.csv", rule_rows)

          failed_gates = [r["rule_id"] for r in rule_rows if not bool(r["pass"])]
          rule_pass_count = f"{len(rule_rows) - len(failed_gates)} / {len(rule_rows)}"

          health_rows = [
              {"metric": "workflow_version", "value": VERSION, "claim_boundary": BOUNDARY},
              {"metric": "expected_result_label", "value": EXPECTED, "claim_boundary": BOUNDARY},
              {"metric": "failed_gates", "value": json.dumps(failed_gates), "claim_boundary": BOUNDARY},
              {"metric": "rule_pass_count", "value": rule_pass_count, "claim_boundary": BOUNDARY},
              {"metric": "reference_value_slots_reviewed", "value": "6", "claim_boundary": BOUNDARY},
              {"metric": "reference_covariance_generated", "value": "False", "claim_boundary": BOUNDARY},
              {"metric": "observed_values_ingested", "value": "False", "claim_boundary": BOUNDARY},
              {"metric": "residuals_computed", "value": "False", "claim_boundary": BOUNDARY},
              {"metric": "pressure_computed", "value": "False", "claim_boundary": BOUNDARY},
              {"metric": "selected_next_route", "value": selected_next_route, "claim_boundary": BOUNDARY},
          ]
          write_csv(OUT / "parser_health_report_v4_160.csv", health_rows)

          summary = {
              "version": VERSION,
              "title": TITLE,
              "created_utc": datetime.now(timezone.utc).isoformat(),
              "platform": platform.platform(),
              "python_version": platform.python_version(),
              "expected_result_label": EXPECTED,
              "failed_gates": failed_gates,
              "rule_pass_count": rule_pass_count,
              "reference_value_slots_reviewed": 6,
              "reference_model": "LCDM_lite_flat_fixed_parameter_diagnostic",
              "prototype_reference_vector_reviewed": True,
              "reference_covariance_generated": False,
              "observed_values_ingested": False,
              "residuals_computed": False,
              "pressure_computed": False,
              "qso_covariance_supplied": False,
              "full_eboss_covariance_supplied": False,
              "validation_claim_allowed": False,
              "selected_next_route": selected_next_route,
          }
          with open(OUT / "summary_v4_160.json", "w", encoding="utf-8") as f:
              json.dump(summary, f, indent=2, sort_keys=True)

          md_lines = [
              "# TAIRID v4.160 - Limited Reference Vector Prototype Review and Covariance Route Decision",
              "",
              "## Clean result",
              "",
              f"Expected result label: `{EXPECTED}`",
              "",
              f"Rule pass count: `{rule_pass_count}`",
              "",
              f"Failed gates: `{json.dumps(failed_gates)}`",
              "",
              "## What this did",
              "",
              "This workflow reviewed the six-slot LCDM-lite prototype reference vector created by v4.159 and wrote a guarded route-decision matrix for the missing reference covariance problem.",
              "",
              "## What this did not do",
              "",
              "It did not ingest observed values. It did not generate reference covariance. It did not compute residuals or pressure. It did not provide QSO covariance or full eBOSS covariance. It did not validate TAIRID.",
              "",
              "## Selected next route",
              "",
              f"`{selected_next_route}`",
              "",
              "The selected route is diagnostic only: test finite-difference sensitivity of the LCDM-lite reference vector before any covariance or pressure claim is attempted.",
              "",
          ]
          with open(OUT / "methodology_and_scope_summary_v4_160.md", "w", encoding="utf-8") as f:
              f.write("\n".join(md_lines))

          print(json.dumps(summary, indent=2, sort_keys=True))
          if failed_gates:
              raise SystemExit("v4.160 failed guarded rule audit")
          PY

      - name: Upload v4.160 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-160-limited-reference-vector-prototype-review-and-covariance-route-decision-output
          path: tairid_v4_160_limited_reference_vector_prototype_review_outputs
