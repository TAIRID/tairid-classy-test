          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_118_observed_covariance_upgrade_sensitivity_audit",
                  "purpose": "Audit whether the observed covariance upgrade or fallback status changes the bridge result compared with v4.114.",
