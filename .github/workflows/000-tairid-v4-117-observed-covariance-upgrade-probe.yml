name: 000 TAIRID v4.117 Observed Covariance Upgrade Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-117-observed-covariance-upgrade-probe.yml"

jobs:
  tairid-v4-117-observed-covariance-upgrade-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
