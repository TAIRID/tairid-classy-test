          failed_gates = []
          warnings = [
              "source_covariance_upgrade_probe",
              "automatic_extraction_may_fallback",
              "diagnostic_bridge_pressure_only",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def fetch_url(url, max_bytes):
              record = {
                  "url": url,
                  "ok": False,
                  "status": "",
                  "content_type": "",
                  "content_length_header": "",
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "error": ""
              }
              data = b""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={"User-Agent": "TAIRID-v4.117-observed-covariance-upgrade/1.0", "Accept": "*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=120) as response:
                      record["status"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      record["content_length_header"] = response.headers.get("Content-Length", "")
                      data = response.read(max_bytes + 1)
                      if len(data) > max_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_bytes]
                      record["bytes_read"] = len(data)
                      record["ok"] = True
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, data

          def parse_numeric_blocks(text, member_name):
              rows = []
              for line_number, raw_line in enumerate(text.splitlines(), start=1):
                  stripped = raw_line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  cleaned = stripped.replace(",", " ")
                  parts = cleaned.split()
                  values = []
                  for part in parts:
                      try:
                          values.append(float(part))
                      except Exception:
                          pass
                  if len(values) >= 2:
                      rows.append({"line_number": line_number, "values": values, "width": len(values)})
              blocks = []
              current = []
              current_width = None
              for row in rows:
                  width = row["width"]
                  if current_width is None or width == current_width:
                      current.append(row)
                      current_width = width
                  else:
                      if current:
                          blocks.append(current)
                      current = [row]
                      current_width = width
              if current:
                  blocks.append(current)

              candidates = []
              for block_index, block in enumerate(blocks, start=1):
                  width = block[0]["width"]
                  if width >= 3 and len(block) >= 3:
                      n = min(width, len(block))
                      # Try square matrix using first n values from first n rows.
                      matrix = [row["values"][:n] for row in block[:n]]
                      candidates.append({
                          "member_name": member_name,
                          "block_index": block_index,
                          "start_line": block[0]["line_number"],
                          "row_count": len(block),
                          "width": width,
                          "square_dimension_candidate": n,
                          "matrix": matrix
                      })
              return candidates

          def mat_transpose(a):
              return [[a[i][j] for i in range(len(a))] for j in range(len(a[0]))]

          def mat_add(a, b):
              return [[float(a[i][j]) + float(b[i][j]) for j in range(len(a[0]))] for i in range(len(a))]

          def diag(values):
              n = len(values)
              return [[float(values[i]) if i == j else 0.0 for j in range(n)] for i in range(n)]

          def mat_diag_from_matrix(a):
              return [[float(a[i][i]) if i == j else 0.0 for j in range(len(a))] for i in range(len(a))]

          def mat_vec(a, v):
              return [sum(float(a[i][j]) * float(v[j]) for j in range(len(v))) for i in range(len(a))]

          def dot(a, b):
              return sum(float(x) * float(y) for x, y in zip(a, b))

          def mean(values):
              return sum(values) / len(values) if values else 0.0

          def sign(value):
              return 1.0 if value >= 0 else -1.0

          def max_symmetry_error(a):
              n = len(a)
              err = 0.0
              for i in range(n):
                  for j in range(n):
                      err = max(err, abs(float(a[i][j]) - float(a[j][i])))
              return err

          def diag_min(a):
              return min(float(a[i][i]) for i in range(len(a)))

          def frobenius_norm(a):
              return math.sqrt(sum(float(x) * float(x) for row in a for x in row))

          def inverse_matrix(a, tol=1e-20):
              n = len(a)
              rows = [[float(a[i][j]) for j in range(n)] + [1.0 if i == j else 0.0 for j in range(n)] for i in range(n)]
              det_sign = 1.0
              det_abs_log = 0.0
              for col in range(n):
                  pivot = max(range(col, n), key=lambda r: abs(rows[r][col]))
                  pivot_value = rows[pivot][col]
                  if abs(pivot_value) <= tol:
                      raise RuntimeError("singular_matrix_at_column_" + str(col))
                  if pivot != col:
                      rows[col], rows[pivot] = rows[pivot], rows[col]
                      det_sign *= -1.0
                  pivot_value = rows[col][col]
                  det_abs_log += math.log(abs(pivot_value))
                  for j in range(2 * n):
                      rows[col][j] /= pivot_value
                  for r in range(n):
                      if r != col:
                          factor = rows[r][col]
                          if abs(factor) > tol:
                              for j in range(2 * n):
                                  rows[r][j] -= factor * rows[col][j]
              inv = [row[n:] for row in rows]
              return inv, det_sign, det_abs_log

          def matrix_rank(a, tol=1e-14):
              rows = [[float(x) for x in row] for row in a]
              if not rows:
                  return 0
              m = len(rows)
              n = len(rows[0])
              rank = 0
              col = 0
              while rank < m and col < n:
                  pivot = None
                  pivot_abs = tol
                  for r in range(rank, m):
                      value_abs = abs(rows[r][col])
                      if value_abs > pivot_abs:
                          pivot_abs = value_abs
                          pivot = r
                  if pivot is None:
                      col += 1
                      continue
                  rows[rank], rows[pivot] = rows[pivot], rows[rank]
                  pivot_value = rows[rank][col]
                  rows[rank] = [x / pivot_value for x in rows[rank]]
                  for r in range(m):
                      if r != rank:
                          factor = rows[r][col]
                          if abs(factor) > tol:
                              rows[r] = [rv - factor * pv for rv, pv in zip(rows[r], rows[rank])]
                  rank += 1
                  col += 1
              return rank

          def condition_proxy(a, inv):
              return frobenius_norm(a) * frobenius_norm(inv)

          def covariance_quality(matrix):
              try:
                  return {
                      "dimension": len(matrix),
                      "rank": matrix_rank(matrix),
                      "symmetry_error": max_symmetry_error(matrix),
                      "diag_min": diag_min(matrix),
                      "positive_diag": diag_min(matrix) > 0,
                      "looks_symmetric": max_symmetry_error(matrix) <= 1e-10
                  }
              except Exception as exc:
                  return {
                      "dimension": len(matrix) if matrix else 0,
                      "rank": 0,
                      "symmetry_error": "",
                      "diag_min": "",
                      "positive_diag": False,
                      "looks_symmetric": False,
                      "error": f"{type(exc).__name__}: {exc}"
                  }

          def extract_boss_fsigma8_covariance(candidate):
              matrix = candidate["matrix"]
              n = len(matrix)
              lower_name = candidate["member_name"].lower()
              source_kind = "covariance_candidate"
              try:
                  working = matrix
                  if "inv" in lower_name and n >= 3:
                      working, _, _ = inverse_matrix(matrix)
                      source_kind = "inverse_covariance_inverted_to_covariance"
                  if n == 3:
                      sub = working
                      sub_status = "direct_3x3_candidate"
                  elif n >= 9:
                      # Common BOSS consensus compressed order is assumed as triplets per redshift; fσ8 at indexes 2,5,8.
                      idx = [2, 5, 8]
                      sub = [[working[i][j] for j in idx] for i in idx]
                      sub_status = "extracted_3x3_fsigma8_subblock_from_9plus_matrix_assumed_indexes_2_5_8"
                  else:
                      return None

                  quality = covariance_quality(sub)
                  if quality["positive_diag"] and quality["rank"] >= 3:
                      return {
                          "member_name": candidate["member_name"],
                          "block_index": candidate["block_index"],
                          "start_line": candidate["start_line"],
                          "source_kind": source_kind,
                          "subblock_status": sub_status,
                          "source_dimension": n,
                          "boss_subblock_covariance": sub,
                          "quality": quality,
                          "usable_for_primary_bridge": True
                      }
              except Exception:
                  return None
              return None

          def compute_lane(lane_id, reference_covariance, observed_covariance, residual_vector, dof=5):
              total_covariance = mat_add(reference_covariance, observed_covariance)
              inv, det_sign, det_abs_log = inverse_matrix(total_covariance)
              projected = mat_vec(inv, residual_vector)
              chi2 = dot(residual_vector, projected)
              pressure_z = sign(mean(residual_vector)) * math.sqrt(max(chi2 - dof, 0.0))
              return {
                  "lane_id": lane_id,
                  "chi2": chi2,
                  "dof": dof,
                  "pressure_z": pressure_z,
                  "residual_mean": mean(residual_vector),
                  "rank_total_covariance": matrix_rank(total_covariance),
                  "symmetry_error_total_covariance": max_symmetry_error(total_covariance),
                  "diag_min_total_covariance": diag_min(total_covariance),
                  "condition_proxy_total_covariance": condition_proxy(total_covariance, inv),
                  "det_sign": det_sign,
                  "det_abs_log": det_abs_log,
                  "total_covariance": total_covariance,
                  "inverse_total_covariance": inv,
                  "computed": True,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              }

          source_fetch_records = []
          archive_member_records = []
          covariance_candidate_records = []
          boss_subblock_records = []

          fetched_payloads = {}
          for target in SOURCE_TARGETS:
              record, data = fetch_url(target["url"], int(target["max_bytes"]))
              record["target_id"] = target["target_id"]
              record["priority"] = target["priority"]
              record["desired_object"] = target["desired_object"]
              source_fetch_records.append(record)
              if record["ok"]:
                  fetched_payloads[target["target_id"]] = data

          consensus_data = fetched_payloads.get("BOSS_DR12_consensus_Gaussian_likelihood_tarball", b"")

          if consensus_data:
              try:
                  with tarfile.open(fileobj=io.BytesIO(consensus_data), mode="r:gz") as tar:
                      for member in tar.getmembers():
                          archive_member_records.append({
                              "archive_target_id": "BOSS_DR12_consensus_Gaussian_likelihood_tarball",
                              "member_name": member.name,
                              "size": member.size,
                              "is_file": member.isfile()
                          })
                          if member.isfile() and member.size <= 1000000:
                              extracted = tar.extractfile(member)
                              if extracted is None:
                                  continue
                              raw = extracted.read(1000000)
                              text = raw.decode("utf-8", errors="replace")
                              candidates = parse_numeric_blocks(text, member.name)
                              for candidate in candidates:
                                  lower = member.name.lower()
                                  quality = covariance_quality(candidate["matrix"])
                                  covariance_candidate_records.append({
                                      "member_name": member.name,
                                      "block_index": candidate["block_index"],
                                      "start_line": candidate["start_line"],
                                      "row_count": candidate["row_count"],
                                      "width": candidate["width"],
                                      "square_dimension_candidate": candidate["square_dimension_candidate"],
                                      "name_contains_cov": "cov" in lower,
                                      "name_contains_inv": "inv" in lower,
                                      "rank": quality["rank"],
                                      "symmetry_error": quality["symmetry_error"],
                                      "diag_min": quality["diag_min"],
                                      "positive_diag": quality["positive_diag"],
                                      "looks_symmetric": quality["looks_symmetric"]
                                  })
                                  if "cov" in lower or "inv" in lower or "likelihood" in lower or "consensus" in lower:
                                      extracted_cov = extract_boss_fsigma8_covariance(candidate)
                                      if extracted_cov is not None:
                                          boss_subblock_records.append(extracted_cov)
              except Exception as exc:
                  source_fetch_records.append({
                      "target_id": "BOSS_DR12_consensus_Gaussian_likelihood_tarball_parse_error",
                      "priority": 1,
                      "url": "",
                      "ok": False,
                      "status": "",
                      "content_type": "",
                      "content_length_header": "",
                      "bytes_read": 0,
                      "truncated_by_guard": False,
                      "desired_object": "parse consensus tarball",
                      "error": f"{type(exc).__name__}: {exc}"
                  })

          boss_source_covariance_ingested = len(boss_subblock_records) > 0
          selected_boss_covariance_record = boss_subblock_records[0] if boss_source_covariance_ingested else None

          observed_values = [float(row["observed_fsigma8"]) for row in OBSERVED_RSD_VECTOR]
          observed_sigmas = [float(row["observed_sigma"]) for row in OBSERVED_RSD_VECTOR]
          reference_values = [float(x) for x in REFERENCE_FSIGMA8_MEAN]
          residual_vector = [obs - ref for obs, ref in zip(observed_values, reference_values)]

          observed_covariance_baseline_diagonal = diag([sigma * sigma for sigma in observed_sigmas])
          observed_covariance_upgraded = [row[:] for row in observed_covariance_baseline_diagonal]
          covariance_upgrade_status = "diagonal_fallback_preserved_source_covariance_not_extracted"

          if boss_source_covariance_ingested:
              sub = selected_boss_covariance_record["boss_subblock_covariance"]
              for i_local, i_full in enumerate([1, 2, 3]):
                  for j_local, j_full in enumerate([1, 2, 3]):
                      observed_covariance_upgraded[i_full][j_full] = float(sub[i_local][j_local])
              covariance_upgrade_status = "BOSS_DR12_source_covariance_subblock_inserted_positions_1_2_3"
          else:
              warnings.append("BOSS_source_covariance_not_automatically_extracted")

          reference_diagonal_guard = mat_diag_from_matrix(REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED)
          observed_only_zero_reference = diag([0.0 for _ in observed_sigmas])

          primary_lane = compute_lane(
              "primary_reference_plus_upgraded_observed_covariance",
              REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED,
              observed_covariance_upgraded,
              residual_vector
          )

          baseline_diagonal_lane = compute_lane(
              "baseline_reference_plus_observed_diagonal_fallback",
              REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED,
              observed_covariance_baseline_diagonal,
              residual_vector
          )

          diagonal_reference_guard_lane = compute_lane(
              "diagonal_reference_guard_plus_upgraded_observed_covariance",
              reference_diagonal_guard,
              observed_covariance_upgraded,
              residual_vector
          )

          observed_only_lane = compute_lane(
              "observed_only_upgraded_or_fallback_covariance",
              observed_only_zero_reference,
              observed_covariance_upgraded,
              residual_vector
          )

          bridge_lanes = [
              primary_lane,
              baseline_diagonal_lane,
              diagonal_reference_guard_lane,
              observed_only_lane
          ]

          bridge_lane_records = []
          for lane in bridge_lanes:
              bridge_lane_records.append({
                  "lane_id": lane["lane_id"],
                  "chi2": lane["chi2"],
                  "dof": lane["dof"],
                  "pressure_z": lane["pressure_z"],
                  "residual_mean": lane["residual_mean"],
                  "rank_total_covariance": lane["rank_total_covariance"],
                  "symmetry_error_total_covariance": lane["symmetry_error_total_covariance"],
                  "diag_min_total_covariance": lane["diag_min_total_covariance"],
                  "condition_proxy_total_covariance": lane["condition_proxy_total_covariance"],
                  "computed": lane["computed"],
                  "claim_scope": lane["claim_scope"]
              })

          pressure_sensitivity_records = [
              {
                  "comparison_id": "upgraded_primary_minus_baseline_diagonal_fallback",
                  "base_lane": primary_lane["lane_id"],
                  "comparison_lane": baseline_diagonal_lane["lane_id"],
                  "delta_chi2": primary_lane["chi2"] - baseline_diagonal_lane["chi2"],
                  "delta_pressure_z": primary_lane["pressure_z"] - baseline_diagonal_lane["pressure_z"],
                  "interpretation": "Effect of observed covariance source upgrade attempt."
              },
              {
                  "comparison_id": "upgraded_primary_minus_diagonal_reference_guard",
                  "base_lane": primary_lane["lane_id"],
                  "comparison_lane": diagonal_reference_guard_lane["lane_id"],
                  "delta_chi2": primary_lane["chi2"] - diagonal_reference_guard_lane["chi2"],
                  "delta_pressure_z": primary_lane["pressure_z"] - diagonal_reference_guard_lane["pressure_z"],
                  "interpretation": "Off-diagonal reference covariance sensitivity after observed covariance upgrade attempt."
              },
              {
                  "comparison_id": "upgraded_primary_minus_observed_only",
                  "base_lane": primary_lane["lane_id"],
                  "comparison_lane": observed_only_lane["lane_id"],
                  "delta_chi2": primary_lane["chi2"] - observed_only_lane["chi2"],
                  "delta_pressure_z": primary_lane["pressure_z"] - observed_only_lane["pressure_z"],
                  "interpretation": "Reference uncertainty contribution sensitivity after observed covariance upgrade attempt."
              }
          ]

          observed_records = []
          for row in OBSERVED_RSD_VECTOR:
              pos = int(row["position"])
              covariance_status = row["covariance_source_status"]
              if boss_source_covariance_ingested and pos in [1, 2, 3]:
                  covariance_status = "BOSS_DR12_source_covariance_subblock_ingested"
              observed_records.append({
                  **row,
                  "covariance_source_status_after_v4_117": covariance_status,
                  "reference_fsigma8_mean": reference_values[pos],
                  "residual_observed_minus_reference": residual_vector[pos],
                  "observed_variance_after_upgrade": observed_covariance_upgraded[pos][pos]
              })

          total_covariance_records = []
          for lane in bridge_lanes:
              for i in range(5):
                  for j in range(5):
                      total_covariance_records.append({
                          "lane_id": lane["lane_id"],
                          "row_position": i,
                          "column_position": j,
                          "row_target": TARGET_VECTOR_ORDER[i]["target_name"],
                          "column_target": TARGET_VECTOR_ORDER[j]["target_name"],
                          "total_covariance_value": lane["total_covariance"][i][j],
                          "record_scope": "observed_covariance_upgrade_diagnostic_not_final_pressure"
                      })

          observed_covariance_upgraded_computed = len(observed_covariance_upgraded) == 5 and len(observed_covariance_upgraded[0]) == 5
          source_attempted = any(row["target_id"] == "BOSS_DR12_consensus_Gaussian_likelihood_tarball" and row["ok"] for row in source_fetch_records)
          bridge_pressure_computed = all(row["computed"] is True and math.isfinite(float(row["chi2"])) for row in bridge_lanes)
          all_total_covariances_rank5 = all(row["rank_total_covariance"] == 5 for row in bridge_lanes)
          all_total_covariances_symmetric = all(float(row["symmetry_error_total_covariance"]) <= 1e-10 for row in bridge_lanes)
          all_total_covariance_diagonal_positive = all(float(row["diag_min_total_covariance"]) > 0 for row in bridge_lanes)

          if not UPSTREAM_LOCKS["v4_116_observed_covariance_source_upgrade_design"]["observed_covariance_upgrade_required"]:
              failed_gates.append("upstream_observed_covariance_upgrade_requirement_not_carried")

          if not source_attempted:
              failed_gates.append("BOSS_source_covariance_target_not_attempted")

          if not observed_covariance_upgraded_computed:
              failed_gates.append("observed_covariance_upgrade_matrix_not_computed")

          if not bridge_pressure_computed:
              failed_gates.append("bridge_pressure_not_computed")

          if not all_total_covariances_rank5:
              failed_gates.append("not_all_total_covariances_rank5")

          if not all_total_covariances_symmetric:
              failed_gates.append("not_all_total_covariances_symmetric")

          if not all_total_covariance_diagonal_positive:
              failed_gates.append("not_all_total_covariance_diagonals_positive")

          if boss_source_covariance_ingested:
              warnings.append("BOSS_source_covariance_automatically_ingested_verify_row_column_order_before_stronger_claims")
          else:
              warnings.append("BOSS_source_covariance_attempted_but_fallback_preserved_manual_locator_may_be_needed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "observed rsd source covariance was fully ingested unless source_covariance_ingested is true",
              "observed rsd covariance is complete",
              "final rsd pressure score",
              "validates tairid cosmology",
              "diagonal fallback is the same as full observed covariance",
              "source covariance upgrade proves the model",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          if boss_source_covariance_ingested:
              route_decision = "observed_covariance_upgrade_probe_passed_source_covariance_ingested_diagnostic_only_ready_for_upgrade_sensitivity_audit"
          else:
              route_decision = "observed_covariance_upgrade_probe_passed_source_attempt_recorded_fallback_preserved_ready_for_upgrade_sensitivity_audit"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_source_upgrade_design_carried",
                  "pass": UPSTREAM_LOCKS["v4_116_observed_covariance_source_upgrade_design"]["observed_covariance_upgrade_required"] is True,
                  "result": "v4.116 observed covariance upgrade requirement carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "BOSS_source_target_attempted",
                  "pass": source_attempted,
                  "result": f"source_attempted={source_attempted}; source_covariance_ingested={boss_source_covariance_ingested}",
                  "boundary": "Source attempt / extraction status only."
              },
              {
                  "rule_id": "archive_manifest_recorded",
                  "pass": len(archive_member_records) > 0 or not boss_source_covariance_ingested,
                  "result": f"archive_members={len(archive_member_records)}; covariance_candidates={len(covariance_candidate_records)}",
                  "boundary": "Automatic parsing record only."
              },
              {
                  "rule_id": "observed_covariance_matrix_available",
                  "pass": observed_covariance_upgraded_computed,
                  "result": covariance_upgrade_status,
                  "boundary": "May be source-upgraded or fallback-preserved."
              },
              {
                  "rule_id": "bridge_pressure_diagnostic_computed",
                  "pass": bridge_pressure_computed,
                  "result": f"primary_chi2={primary_lane['chi2']}; primary_pressure_z={primary_lane['pressure_z']}",
                  "boundary": "Diagnostic only, not final RSD pressure."
              },
              {
                  "rule_id": "rank_and_symmetry_gates_passed",
                  "pass": all_total_covariances_rank5 and all_total_covariances_symmetric and all_total_covariance_diagonal_positive,
                  "result": "all total covariance lanes rank 5, symmetric, and positive diagonal",
                  "boundary": "Numerical bridge health only."
              },
              {
                  "rule_id": "sensitivity_records_written",
                  "pass": len(pressure_sensitivity_records) >= 3 and len(bridge_lane_records) == 4,
                  "result": f"bridge_lanes={len(bridge_lane_records)}; sensitivity_records={len(pressure_sensitivity_records)}",
                  "boundary": "Sensitivity visibility only."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": True,
                  "result": "final RSD pressure and TAIRID validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_117_rules_passed")

          if failed_gates:
              readiness_label = "observed_covariance_upgrade_probe_failed"
              next_allowed_step = "Repair observed covariance upgrade probe before sensitivity audit."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.118 observed covariance upgrade sensitivity audit. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "source_attempted": source_attempted,
              "source_fetch_record_count": len(source_fetch_records),
              "archive_member_count": len(archive_member_records),
              "covariance_candidate_count": len(covariance_candidate_records),
              "boss_subblock_candidate_count": len(boss_subblock_records),
              "source_observed_covariance_ingested": boss_source_covariance_ingested,
              "covariance_upgrade_status": covariance_upgrade_status,
              "observed_RSD_covariance_upgraded": observed_covariance_upgraded_computed,
              "bridge_pressure_computed": bridge_pressure_computed,
              "primary_chi2": primary_lane["chi2"],
              "primary_pressure_z": primary_lane["pressure_z"],
              "baseline_diagonal_chi2": baseline_diagonal_lane["chi2"],
              "baseline_diagonal_pressure_z": baseline_diagonal_lane["pressure_z"],
              "primary_minus_baseline_delta_chi2": primary_lane["chi2"] - baseline_diagonal_lane["chi2"],
              "primary_minus_baseline_delta_pressure_z": primary_lane["pressure_z"] - baseline_diagonal_lane["pressure_z"],
              "source_covariance_fallback_preserved": not boss_source_covariance_ingested,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "source_targets": SOURCE_TARGETS,
              "source_fetch_records": source_fetch_records,
              "archive_member_records": archive_member_records,
              "covariance_candidate_records": covariance_candidate_records,
              "boss_subblock_records": boss_subblock_records,
              "selected_boss_covariance_record": selected_boss_covariance_record,
              "covariance_upgrade_status": covariance_upgrade_status,
              "target_vector_order": TARGET_VECTOR_ORDER,
              "observed_records": observed_records,
              "reference_fsigma8_mean": REFERENCE_FSIGMA8_MEAN,
              "observed_covariance_baseline_diagonal": observed_covariance_baseline_diagonal,
              "observed_covariance_after_upgrade_or_fallback": observed_covariance_upgraded,
              "residual_vector_observed_minus_reference": residual_vector,
              "bridge_lane_records": bridge_lane_records,
              "total_covariance_records": total_covariance_records,
              "pressure_sensitivity_records": pressure_sensitivity_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "source_attempted": source_attempted,
                  "source_observed_covariance_ingested": boss_source_covariance_ingested,
                  "observed_RSD_covariance_upgraded": observed_covariance_upgraded_computed,
                  "source_covariance_fallback_preserved": not boss_source_covariance_ingested,
                  "bridge_pressure_computed": bridge_pressure_computed,
                  "primary_chi2": primary_lane["chi2"],
                  "primary_pressure_z": primary_lane["pressure_z"],
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_117_observed_covariance_upgrade_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "source_fetch_records_v4_117.csv",
              source_fetch_records,
              ["target_id", "priority", "url", "ok", "status", "content_type", "content_length_header", "bytes_read", "truncated_by_guard", "desired_object", "error"]
          )

          write_csv(
              OUTDIR / "archive_member_records_v4_117.csv",
              archive_member_records,
              ["archive_target_id", "member_name", "size", "is_file"]
          )

          write_csv(
              OUTDIR / "covariance_candidate_records_v4_117.csv",
              covariance_candidate_records,
              ["member_name", "block_index", "start_line", "row_count", "width", "square_dimension_candidate", "name_contains_cov", "name_contains_inv", "rank", "symmetry_error", "diag_min", "positive_diag", "looks_symmetric"]
          )

          flat_boss_subblocks = []
          for rec in boss_subblock_records:
              flat_boss_subblocks.append({
                  "member_name": rec["member_name"],
                  "block_index": rec["block_index"],
                  "start_line": rec["start_line"],
                  "source_kind": rec["source_kind"],
                  "subblock_status": rec["subblock_status"],
                  "source_dimension": rec["source_dimension"],
                  "quality_dimension": rec["quality"]["dimension"],
                  "quality_rank": rec["quality"]["rank"],
                  "quality_symmetry_error": rec["quality"]["symmetry_error"],
                  "quality_diag_min": rec["quality"]["diag_min"],
                  "usable_for_primary_bridge": rec["usable_for_primary_bridge"],
                  "boss_subblock_covariance_json": json.dumps(rec["boss_subblock_covariance"])
              })
          write_csv(
              OUTDIR / "boss_subblock_records_v4_117.csv",
              flat_boss_subblocks,
              ["member_name", "block_index", "start_line", "source_kind", "subblock_status", "source_dimension", "quality_dimension", "quality_rank", "quality_symmetry_error", "quality_diag_min", "usable_for_primary_bridge", "boss_subblock_covariance_json"]
          )

          write_csv(
              OUTDIR / "observed_records_v4_117.csv",
              observed_records,
              ["position", "z", "observed_fsigma8", "observed_sigma", "source_family", "source_label", "covariance_source_status", "covariance_source_status_after_v4_117", "independence_warning", "included_in_primary_bridge", "reference_fsigma8_mean", "residual_observed_minus_reference", "observed_variance_after_upgrade"]
          )

          write_csv(
              OUTDIR / "bridge_lane_records_v4_117.csv",
              bridge_lane_records,
              ["lane_id", "chi2", "dof", "pressure_z", "residual_mean", "rank_total_covariance", "symmetry_error_total_covariance", "diag_min_total_covariance", "condition_proxy_total_covariance", "computed", "claim_scope"]
          )

          write_csv(
              OUTDIR / "total_covariance_records_v4_117.csv",
              total_covariance_records,
              ["lane_id", "row_position", "column_position", "row_target", "column_target", "total_covariance_value", "record_scope"]
          )

          write_csv(
              OUTDIR / "pressure_sensitivity_records_v4_117.csv",
              pressure_sensitivity_records,
              ["comparison_id", "base_lane", "comparison_lane", "delta_chi2", "delta_pressure_z", "interpretation"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_117.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_117.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_117.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.117 — Observed Covariance Upgrade Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This workflow attempts to upgrade the observed RSD covariance by fetching the official BOSS DR12 consensus Gaussian likelihood/covariance support tarball and scanning it for a usable fσ8 covariance subblock.")
          md.append("")
          md.append("If an automatic source covariance is found, it is inserted for the BOSS z=0.38, 0.51, and 0.61 positions. If not, the diagonal fallback is preserved and the workflow records that a manual/source locator pass is still needed.")
          md.append("")
          md.append("This recomputes guarded diagnostic bridge lanes only. It does not compute final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Bridge lanes")
          md.append("")
          md.append("| Lane | chi2 | pressure_z | rank |")
          md.append("|---|---:|---:|---:|")
          for row in bridge_lane_records:
              md.append(f"| `{row['lane_id']}` | `{row['chi2']}` | `{row['pressure_z']}` | `{row['rank_total_covariance']}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_117_observed_covariance_upgrade_probe.json",
              "tairid_v4_117_observed_covariance_upgrade_probe.md",
              "source_fetch_records_v4_117.csv",
              "archive_member_records_v4_117.csv",
              "covariance_candidate_records_v4_117.csv",
              "boss_subblock_records_v4_117.csv",
              "observed_records_v4_117.csv",
              "bridge_lane_records_v4_117.csv",
              "total_covariance_records_v4_117.csv",
              "pressure_sensitivity_records_v4_117.csv",
              "blocked_claims_v4_117.csv",
              "next_route_options_v4_117.csv",
              "rule_results_v4_117.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_117_observed_covariance_upgrade_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.117 observed covariance upgrade probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-117-observed-covariance-upgrade-probe
          path: artifacts/tairid_v4_117_observed_covariance_upgrade_probe/
