name: TAIRID v4.50 Growth Lane Status Handoff

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-50-growth-lane-status-handoff.yml"

jobs:
  tairid-v4-50-growth-lane-status-handoff:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.50 growth lane status handoff
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_50_growth_lane_status_handoff

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_50_growth_lane_status_handoff")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_50_growth_lane_status_handoff"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run BOSS, eBOSS, SDSS, WiggleZ, Planck, or ELG likelihoods.",
              "This does not compute a final RSD pressure score.",
              "This does not claim the full growth lane is covariance-aware.",
              "This does not import Planck chains.",
              "This does not include Planck reference uncertainty.",
              "This does not parse the Planck full-grid zip manifest.",
              "This creates a clean growth-lane checkpoint handoff from v4.37 through v4.49.",
              "A pass means the milestone is documented and bounded, not that TAIRID cosmology is validated."
          ]

          MILESTONE_ROWS = [
              {
                  "milestone_id": "v4_37_BOSS_only_covariance_preview",
                  "lane": "RSD_growth",
                  "source_family": "BOSS_DR12",
                  "status": "passed_nonfinal_BOSS_only_covariance_preview",
                  "row_count": 3,
                  "negative_count": 2,
                  "positive_count": 1,
                  "sqrt_chi2_preview": 1.1750788584363314,
                  "scope_boundary": "BOSS_only_not_full_RSD",
                  "reference_uncertainty_included": False,
                  "final_pressure_score_allowed": False
              },
              {
                  "milestone_id": "v4_43_ELG_grid_parser_or_park",
                  "lane": "RSD_growth",
                  "source_family": "eBOSS_ELG",
                  "status": "passed_grid_visible_parser_feasible_but_parked",
                  "row_count": 1,
                  "negative_count": "",
                  "positive_count": "",
                  "sqrt_chi2_preview": "",
                  "scope_boundary": "ELG_grid_likelihood_not_simple_covariance_ready",
                  "reference_uncertainty_included": False,
                  "final_pressure_score_allowed": False
              },
              {
                  "milestone_id": "v4_44_eBOSS_LRG_QSO_partial_preview",
                  "lane": "RSD_growth",
                  "source_family": "eBOSS_LRG_QSO",
                  "status": "passed_nonfinal_partial_covariance_preview",
                  "row_count": 2,
                  "negative_count": 0,
                  "positive_count": 2,
                  "sqrt_chi2_preview": 1.9222323437114406,
                  "scope_boundary": "LRG_QSO_only_ELG_excluded",
                  "reference_uncertainty_included": False,
                  "final_pressure_score_allowed": False
              },
              {
                  "milestone_id": "v4_45_1_RSD_reference_boundary_fixed",
                  "lane": "RSD_growth",
                  "source_family": "reference_uncertainty_boundary",
                  "status": "passed_reference_uncertainty_boundary_fixed",
                  "row_count": "",
                  "negative_count": "",
                  "positive_count": "",
                  "sqrt_chi2_preview": "",
                  "scope_boundary": "Planck_reference_uncertainty_missing",
                  "reference_uncertainty_included": False,
                  "final_pressure_score_allowed": False
              },
              {
                  "milestone_id": "v4_46_WiggleZ_covariance_locator_retry",
                  "lane": "RSD_growth",
                  "source_family": "WiggleZ",
                  "status": "passed_formally_nonfinal_unresolved_after_locator_retry",
                  "row_count": 3,
                  "negative_count": "",
                  "positive_count": "",
                  "sqrt_chi2_preview": "",
                  "scope_boundary": "WiggleZ_product_visibility_failed_no_covariance_mapping",
                  "reference_uncertainty_included": False,
                  "final_pressure_score_allowed": False
              },
              {
                  "milestone_id": "v4_47_Planck_reference_chain_feasibility",
                  "lane": "reference_uncertainty",
                  "source_family": "Planck_2018",
                  "status": "passed_chain_feasibility_audit",
                  "row_count": "",
                  "negative_count": "",
                  "positive_count": "",
                  "sqrt_chi2_preview": "",
                  "scope_boundary": "chain_requirements_declared_no_chain_import",
                  "reference_uncertainty_included": False,
                  "final_pressure_score_allowed": False
              },
              {
                  "milestone_id": "v4_48_Planck_chain_product_locator",
                  "lane": "reference_uncertainty",
                  "source_family": "Planck_PR3",
                  "status": "passed_full_grid_container_located",
                  "row_count": "",
                  "negative_count": "",
                  "positive_count": "",
                  "sqrt_chi2_preview": "",
                  "scope_boundary": "container_declared_no_internal_chain_member_selected",
                  "reference_uncertainty_included": False,
                  "final_pressure_score_allowed": False
              },
              {
                  "milestone_id": "v4_49_Planck_manifest_strategy",
                  "lane": "reference_uncertainty",
                  "source_family": "Planck_PR3",
                  "status": "passed_manifest_strategy_unresolved",
                  "row_count": "",
                  "negative_count": "",
                  "positive_count": "",
                  "sqrt_chi2_preview": "",
                  "scope_boundary": "HEAD_ok_but_front_tail_manifest_not_safe_no_full_download",
                  "reference_uncertainty_included": False,
                  "final_pressure_score_allowed": False
              }
          ]

          CURRENT_LANE_STATUS = [
              {
                  "lane_id": "BOSS_DR12",
                  "current_status": "partial_covariance_preview_available",
                  "usable_now": "diagnostic_preview_only",
                  "blocks_final_RSD_claim": True,
                  "next_needed": "combine_policy_and_reference_uncertainty_before_final_use"
              },
              {
                  "lane_id": "eBOSS_LRG_QSO",
                  "current_status": "partial_covariance_preview_available",
                  "usable_now": "diagnostic_preview_only",
                  "blocks_final_RSD_claim": True,
                  "next_needed": "ELG_handling_reference_uncertainty_and_combination_policy"
              },
              {
                  "lane_id": "eBOSS_ELG",
                  "current_status": "grid_likelihood_visible_parser_feasible_but_parked",
                  "usable_now": "not_simple_covariance_ready",
                  "blocks_final_RSD_claim": True,
                  "next_needed": "optional_grid_parser_design_or_keep_parked"
              },
              {
                  "lane_id": "WiggleZ",
                  "current_status": "formally_nonfinal_unresolved_after_locator_retry",
                  "usable_now": "not_covariance_ready",
                  "blocks_final_RSD_claim": True,
                  "next_needed": "better_product_path_or_keep_parked"
              },
              {
                  "lane_id": "Planck_reference_uncertainty",
                  "current_status": "container_located_but_manifest_unresolved",
                  "usable_now": "requirements_and_container_only_no_uncertainty",
                  "blocks_final_RSD_claim": True,
                  "next_needed": "external_manifest_source_packet_or_safe_manifest_parser"
              },
              {
                  "lane_id": "cross_family_combination_policy",
                  "current_status": "missing",
                  "usable_now": "not_available",
                  "blocks_final_RSD_claim": True,
                  "next_needed": "define_independence_duplication_and_covariance_combination_policy"
              }
          ]

          STRUCTURAL_FINDINGS = [
              {
                  "finding_id": "growth_lane_is_mixed_not_universal_negative",
                  "status": "important",
                  "plain_language": "The growth/RSD lane currently shows mixed or role-dependent behavior, not one simple all-negative growth pressure.",
                  "evidence_boundary": "BOSS is mixed; eBOSS LRG/QSO partial is positive; KiDS remains a separate consolidation pressure row.",
                  "claim_allowed": "mixed_direction_caution",
                  "claim_blocked": "all_growth_data_point_negative"
              },
              {
                  "finding_id": "eBOSS_ELG_is_real_but_parser_needed",
                  "status": "important",
                  "plain_language": "The ELG grid appears visible and parser-feasible, but it is not simple covariance-ready.",
                  "evidence_boundary": "Do not treat grid likelihood as a covtot matrix.",
                  "claim_allowed": "ELG_parser_needed_or_parked",
                  "claim_blocked": "ELG_covariance_ready_without_parser"
              },
              {
                  "finding_id": "Planck_reference_uncertainty_is_the_big_missing_layer",
                  "status": "important",
                  "plain_language": "The current RSD previews compare against a declared Planck-like curve, but not a propagated Planck posterior.",
                  "evidence_boundary": "No chains imported; no f_sigma8 reference covariance computed.",
                  "claim_allowed": "reference_uncertainty_missing",
                  "claim_blocked": "final_RSD_pressure_score"
              },
              {
                  "finding_id": "Planck_container_found_but_manifest_not_safe_yet",
                  "status": "important",
                  "plain_language": "The Planck full-grid product container is located, but GitHub could not safely inspect the manifest by bounded probes.",
                  "evidence_boundary": "HEAD succeeded, front range failed, content length unknown, tail not attempted.",
                  "claim_allowed": "external_manifest_or_handoff_needed",
                  "claim_blocked": "internal_chain_member_selected"
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "The final RSD pressure score is known.",
              "The full RSD lane is covariance-aware.",
              "The full eBOSS lane is covariance-aware.",
              "Planck reference uncertainty is included.",
              "Planck chains were imported.",
              "The internal Planck chain member has been selected.",
              "The Planck full-grid zip manifest has been parsed.",
              "All growth data point negative.",
              "eBOSS disproves KiDS.",
              "KiDS proves the whole growth lane.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_51_Planck_external_manifest_source_packet",
                  "purpose": "Use an external source packet or controlled source notes to identify Planck full-grid internal chain members without importing chains.",
                  "why_next": "v4.49 showed GitHub range probing is not enough for safe manifest inspection.",
                  "must_include": "container file, source for internal member names, target chain labels, no chain import.",
                  "must_not_include": "reference uncertainty included claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_52_reference_uncertainty_parser_design",
                  "purpose": "Design the future parser that converts Planck chain samples into f_sigma8 reference samples.",
                  "why_next": "Reference uncertainty is the missing layer before stronger RSD pressure.",
                  "must_include": "required columns, weights, redshift targets, covariance across redshifts.",
                  "must_not_include": "actual chain import or final pressure."
              },
              {
                  "priority": 3,
                  "next_test": "v4_53_ELG_grid_parser_design_optional",
                  "purpose": "Design the ELG grid-likelihood parser without running the likelihood.",
                  "why_next": "ELG is visible and parser-feasible but still parked.",
                  "must_include": "column meanings, likelihood interpretation, marginalization policy.",
                  "must_not_include": "ELG covariance-ready claim without parser."
              },
              {
                  "priority": 4,
                  "next_test": "v4_54_cross_family_combination_policy",
                  "purpose": "Define how BOSS, eBOSS partial, ELG, WiggleZ, and reference covariance may or may not be combined.",
                  "why_next": "Final RSD pressure cannot exist without an independence and duplication policy.",
                  "must_include": "scope labels, covariance boundaries, duplication guards.",
                  "must_not_include": "final combined score."
              }
          ]

          HANDOFF_SUMMARY = {
              "handoff_status": "growth_lane_checkpoint_complete",
              "readiness_after_handoff": "ready_for_external_manifest_source_packet_or_reference_uncertainty_parser_design",
              "strongest_clean_result": "RSD lane is now structurally bounded with partial BOSS/eBOSS diagnostics and explicit missing reference uncertainty.",
              "most_important_caution": "Do not collapse mixed RSD behavior into an all-negative growth story.",
              "next_clean_move": "Planck external manifest source packet, because v4.49 could not safely inspect the zip manifest through bounded range probes.",
              "model_claim_allowed": False,
              "final_RSD_pressure_score_allowed": False,
              "reference_uncertainty_included": False,
              "Planck_chains_imported": False,
              "full_RSD_covariance_complete": False
          }

          failed_gates = []
          warnings = []

          required_lanes = {
              "BOSS_DR12",
              "eBOSS_LRG_QSO",
              "eBOSS_ELG",
              "WiggleZ",
              "Planck_reference_uncertainty",
              "cross_family_combination_policy"
          }

          present_lanes = {row["lane_id"] for row in CURRENT_LANE_STATUS}
          missing_lanes = sorted(required_lanes - present_lanes)

          for lane in missing_lanes:
              failed_gates.append("missing_current_lane_status_" + lane)

          if not any(row["milestone_id"] == "v4_49_Planck_manifest_strategy" for row in MILESTONE_ROWS):
              failed_gates.append("v4_49_manifest_strategy_not_carried")

          if not any(row["finding_id"] == "growth_lane_is_mixed_not_universal_negative" for row in STRUCTURAL_FINDINGS):
              failed_gates.append("mixed_growth_direction_finding_missing")

          if not any(row["finding_id"] == "Planck_reference_uncertainty_is_the_big_missing_layer" for row in STRUCTURAL_FINDINGS):
              failed_gates.append("reference_uncertainty_finding_missing")

          if not all(row["blocks_final_RSD_claim"] is True for row in CURRENT_LANE_STATUS):
              failed_gates.append("not_all_current_lanes_block_final_RSD_claim")

          if any(row["final_pressure_score_allowed"] is not False for row in MILESTONE_ROWS):
              failed_gates.append("milestone_final_pressure_allowed_violation")

          if any(row["reference_uncertainty_included"] is not False for row in MILESTONE_ROWS):
              failed_gates.append("milestone_reference_uncertainty_violation")

          if HANDOFF_SUMMARY["model_claim_allowed"] is not False:
              failed_gates.append("handoff_model_claim_allowed_violation")

          if HANDOFF_SUMMARY["final_RSD_pressure_score_allowed"] is not False:
              failed_gates.append("handoff_final_pressure_allowed_violation")

          if HANDOFF_SUMMARY["reference_uncertainty_included"] is not False:
              failed_gates.append("handoff_reference_uncertainty_violation")

          if HANDOFF_SUMMARY["Planck_chains_imported"] is not False:
              failed_gates.append("handoff_planck_chain_import_violation")

          if HANDOFF_SUMMARY["full_RSD_covariance_complete"] is not False:
              failed_gates.append("handoff_full_RSD_complete_violation")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "full rsd lane",
              "planck reference uncertainty is included",
              "planck chains were imported",
              "internal planck chain member",
              "manifest has been parsed",
              "all growth data point negative",
              "likelihood",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          warnings.append("handoff_only_no_new_data")
          warnings.append("BOSS_preview_remains_BOSS_only")
          warnings.append("eBOSS_preview_remains_LRG_QSO_partial")
          warnings.append("ELG_parser_needed_or_parked")
          warnings.append("WiggleZ_formally_nonfinal_unresolved")
          warnings.append("Planck_manifest_unresolved")
          warnings.append("reference_uncertainty_not_included")
          warnings.append("mixed_growth_direction_caution_required")
          warnings.append("not_a_final_RSD_pressure_score")
          warnings.append("not_validation")

          rule_results = [
              {
                  "rule_id": "all_current_lanes_present",
                  "pass": len(missing_lanes) == 0,
                  "result": "BOSS_eBOSS_ELG_WiggleZ_Planck_combination_policy_lanes_present",
                  "boundary": "Presence is status tracking only."
              },
              {
                  "rule_id": "milestones_carried_forward",
                  "pass": len(MILESTONE_ROWS) >= 8,
                  "result": f"{len(MILESTONE_ROWS)} milestone rows carried",
                  "boundary": "Milestones are nonfinal diagnostics."
              },
              {
                  "rule_id": "mixed_direction_caution_preserved",
                  "pass": any(row["finding_id"] == "growth_lane_is_mixed_not_universal_negative" for row in STRUCTURAL_FINDINGS),
                  "result": "growth_lane_mixed_direction_caution_preserved",
                  "boundary": "No all-growth-negative claim."
              },
              {
                  "rule_id": "reference_uncertainty_missing_preserved",
                  "pass": HANDOFF_SUMMARY["reference_uncertainty_included"] is False,
                  "result": "Planck_reference_uncertainty_missing",
                  "boundary": "No final RSD pressure score."
              },
              {
                  "rule_id": "Planck_manifest_unresolved_preserved",
                  "pass": any(row["milestone_id"] == "v4_49_Planck_manifest_strategy" and "unresolved" in row["status"] for row in MILESTONE_ROWS),
                  "result": "Planck_manifest_strategy_unresolved_carried_forward",
                  "boundary": "No internal chain member selected."
              },
              {
                  "rule_id": "all_lanes_block_final_RSD_claim",
                  "pass": all(row["blocks_final_RSD_claim"] is True for row in CURRENT_LANE_STATUS),
                  "result": "all_current_lanes_block_final_RSD_claim",
                  "boundary": "No full growth-lane claim."
              },
              {
                  "rule_id": "next_test_ladder_present",
                  "pass": len(NEXT_TEST_LADDER) >= 4,
                  "result": "next_test_ladder_declared",
                  "boundary": "Future work remains guarded."
              },
              {
                  "rule_id": "no_final_score_or_validation",
                  "pass": True,
                  "result": "no_likelihood_no_BIC_no_refit_no_final_pressure_no_validation",
                  "boundary": "Handoff only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_growth_lane_handoff_rules_passed")

          if failed_gates:
              readiness_label = "growth_lane_status_handoff_failed"
              next_step = "Repair missing lane status, milestone carry-forward, or blocked-claim boundaries."
          else:
              readiness_label = "growth_lane_status_handoff_passed_ready_for_Planck_external_manifest_source_packet_or_reference_uncertainty_parser_design"
              next_step = (
                  "Proceed to v4.51 Planck external manifest source packet or v4.52 reference uncertainty parser design. "
                  "Do not import Planck chains, parse full-grid members, or compute final RSD pressure yet."
              )

          system_health = {
              "milestone_count": len(MILESTONE_ROWS),
              "current_lane_count": len(CURRENT_LANE_STATUS),
              "structural_finding_count": len(STRUCTURAL_FINDINGS),
              "next_test_count": len(NEXT_TEST_LADDER),
              "missing_current_lane_count": len(missing_lanes),
              "BOSS_status": "partial_BOSS_only",
              "eBOSS_LRG_QSO_status": "partial_LRG_QSO_only",
              "ELG_status": "parser_needed_or_parked",
              "WiggleZ_status": "formally_nonfinal_unresolved",
              "Planck_container_status": "container_located_manifest_unresolved",
              "Planck_chains_imported": False,
              "Planck_manifest_parsed": False,
              "internal_chain_member_selected": False,
              "reference_uncertainty_included": False,
              "full_RSD_covariance_complete": False,
              "final_RSD_pressure_score_allowed_now": False,
              "likelihood_run": False,
              "BIC_run": False,
              "refit_run": False,
              "validation_claim_allowed": False,
              "mixed_direction_caution_required": True,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          interpretation = (
              "v4.50 creates a clean checkpoint handoff for the growth/RSD lane. "
              "BOSS has a nonfinal BOSS-only covariance preview. "
              "eBOSS LRG/QSO has a nonfinal partial covariance preview. "
              "ELG is visible but parser-needed or parked. "
              "WiggleZ is formally nonfinal after locator retry. "
              "Planck's full-grid container is located, but the manifest remains unresolved and no chains have been imported. "
              "The key lesson is that the current growth lane is mixed and role-dependent, not one clean universal direction. "
              "No final RSD pressure score or validation claim is allowed."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "milestone_rows": MILESTONE_ROWS,
              "current_lane_status": CURRENT_LANE_STATUS,
              "structural_findings": STRUCTURAL_FINDINGS,
              "handoff_summary": HANDOFF_SUMMARY,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_final_pressure_score_built": False,
                  "Planck_chains_imported": False,
                  "Planck_manifest_parsed": False,
                  "internal_chain_member_selected": False,
                  "reference_uncertainty_included": False,
                  "full_RSD_covariance_complete": False,
                  "likelihood_run": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "growth_lane_milestones_v4_50.csv",
              MILESTONE_ROWS,
              [
                  "milestone_id",
                  "lane",
                  "source_family",
                  "status",
                  "row_count",
                  "negative_count",
                  "positive_count",
                  "sqrt_chi2_preview",
                  "scope_boundary",
                  "reference_uncertainty_included",
                  "final_pressure_score_allowed"
              ]
          )

          write_csv(
              OUTDIR / "current_lane_status_v4_50.csv",
              CURRENT_LANE_STATUS,
              [
                  "lane_id",
                  "current_status",
                  "usable_now",
                  "blocks_final_RSD_claim",
                  "next_needed"
              ]
          )

          write_csv(
              OUTDIR / "structural_findings_v4_50.csv",
              STRUCTURAL_FINDINGS,
              [
                  "finding_id",
                  "status",
                  "plain_language",
                  "evidence_boundary",
                  "claim_allowed",
                  "claim_blocked"
              ]
          )

          write_csv(
              OUTDIR / "handoff_summary_v4_50.csv",
              [HANDOFF_SUMMARY],
              [
                  "handoff_status",
                  "readiness_after_handoff",
                  "strongest_clean_result",
                  "most_important_caution",
                  "next_clean_move",
                  "model_claim_allowed",
                  "final_RSD_pressure_score_allowed",
                  "reference_uncertainty_included",
                  "Planck_chains_imported",
                  "full_RSD_covariance_complete"
              ]
          )

          write_csv(
              OUTDIR / "growth_lane_handoff_rule_results_v4_50.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_50.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_50.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "purpose", "why_next", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_50.csv",
              [system_health],
              [
                  "milestone_count",
                  "current_lane_count",
                  "structural_finding_count",
                  "next_test_count",
                  "missing_current_lane_count",
                  "BOSS_status",
                  "eBOSS_LRG_QSO_status",
                  "ELG_status",
                  "WiggleZ_status",
                  "Planck_container_status",
                  "Planck_chains_imported",
                  "Planck_manifest_parsed",
                  "internal_chain_member_selected",
                  "reference_uncertainty_included",
                  "full_RSD_covariance_complete",
                  "final_RSD_pressure_score_allowed_now",
