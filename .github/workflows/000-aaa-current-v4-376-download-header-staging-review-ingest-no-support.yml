name: "!!! AAA CURRENT - TAIRID v4.376 download header staging review ingest no support"

on:
  workflow_dispatch:

jobs:
  run-v4-376-download-header-staging-review-ingest-no-support:
    name: "!!! AAA CURRENT - Run v4.376 download header staging review ingest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.375 output ZIP and human-filled staging review ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.375 output ZIP..."
          INPUT_375_ZIP="$(ls tairid-v4-375-official-source-download-header-staging-plan-no-values-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_375_ZIP" ]; then
            echo "Could not find v4.375 output ZIP."
            echo "Expected:"
            echo "tairid-v4-375-official-source-download-header-staging-plan-no-values-no-support-output.zip"
            exit 1
          fi

          echo "Finding human-filled v4.375 staging review ZIP..."
          HUMAN_FILLED_STAGING_REVIEW_ZIP="$(ls tairid-v4-375-human-filled-download-header-staging-review-for-v4-376-no-values-no-support*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_STAGING_REVIEW_ZIP" ]; then
            echo "Could not find human-filled staging review ZIP."
            echo "Expected:"
            echo "tairid-v4-375-human-filled-download-header-staging-review-for-v4-376-no-values-no-support.zip"
            exit 1
          fi

          echo "Using v4.375 ZIP:"
          echo "$INPUT_375_ZIP"

          echo "Using human-filled review ZIP:"
          echo "$HUMAN_FILLED_STAGING_REVIEW_ZIP"

          echo "INPUT_375_ZIP=$INPUT_375_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_STAGING_REVIEW_ZIP=$HUMAN_FILLED_STAGING_REVIEW_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.376 staging review ingest script
        run: |
          cat > run_v4_376_download_header_staging_review_ingest_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "download/header-staging review ingest only; sources may be approved for later controlled download/header-listing attempt; no download attempted now; no source file fetched; no archive/header listing inspected; no exact covariance file staged; no covariance values loaded; no covariance dimensions confirmed; no observed-row order matched; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          ALLOWED_STAGING_DECISIONS = {
              "approve_later_download_or_header_listing_attempt",
              "needs_manual_download",
              "reject_source_for_now",
              "keep_blocked",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def main():
              input_375 = Path(os.environ["INPUT_375_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_STAGING_REVIEW_ZIP"])

              outdir = Path("tairid_v4_376_download_header_staging_review_ingest_no_values_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base375 = extract_zip(input_375, "tairid_v4_376_375_")
              basehuman = extract_zip(human_zip, "tairid_v4_376_human_")

              summary375_path = find_one(base375, "v4_375_summary.json")
              staging_plan_path = find_one(base375, "v4_375_official_source_download_header_staging_plan_NO_DOWNLOAD_NO_VALUES.csv")
              priority_candidates_path = find_one(base375, "v4_375_priority_download_archive_candidates_NO_DOWNLOAD_NO_VALUES.csv")
              source_index_path = find_one(base375, "v4_375_source_index_fallback_plan_NO_DOWNLOAD_NO_VALUES.csv")
              blank_review_path = find_one(base375, "v4_375_HUMAN_FILL_download_header_staging_review_NO_VALUES_NO_SUPPORT.csv")
              batch_plan_path = find_one(base375, "v4_375_controlled_download_batch_plan_NO_DOWNLOAD.csv")
              safety_path = find_one(base375, "v4_375_safety_boundaries_NO_VALUES_NO_SUPPORT.csv")
              gap375_path = find_one(base375, "v4_375_gap_status_after_download_header_staging_plan.csv")
              accepted_sources_path = find_one(base375, "v4_375_input_v4_374_accepted_sources_preserved.csv")
              exact_candidates_path = find_one(base375, "v4_375_input_v4_374_exact_candidates_preserved.csv")
              rules375_path = find_one(base375, "v4_375_rule_checks.csv")

              human_review_path = find_one_suffix(basehuman, "HUMAN_FILLED_download_header_staging_review_NO_VALUES_NO_SUPPORT.csv")

              summary375 = json.loads(summary375_path.read_text())
              staging_plan = pd.read_csv(staging_plan_path)
              priority_candidates = pd.read_csv(priority_candidates_path)
              source_index_plan = pd.read_csv(source_index_path)
              blank_review = pd.read_csv(blank_review_path)
              batch_plan = pd.read_csv(batch_plan_path)
              safety = pd.read_csv(safety_path)
              gap375 = pd.read_csv(gap375_path)
              accepted_sources = pd.read_csv(accepted_sources_path)
              exact_candidates = pd.read_csv(exact_candidates_path)
              rules375 = pd.read_csv(rules375_path)
              human_review = pd.read_csv(human_review_path)

              for col in [
                  "human_download_header_staging_decision",
                  "human_download_header_staging_note",
                  "download_or_header_staging_approved_now",
              ]:
                  if col not in human_review.columns:
                      human_review[col] = ""

              ingest_rows = []

              for _, row in human_review.iterrows():
                  decision = clean(row["human_download_header_staging_decision"])

                  if decision == "approve_later_download_or_header_listing_attempt":
                      row_status = "approved_for_later_controlled_download_or_header_listing_attempt_no_values"
                      approved_now = True
                      manual_needed = False
                  elif decision == "needs_manual_download":
                      row_status = "blocked_needs_manual_download_or_upload"
                      approved_now = False
                      manual_needed = True
                  elif decision == "reject_source_for_now":
                      row_status = "rejected_for_current_download_header_staging_lane"
                      approved_now = False
                      manual_needed = False
                  elif decision == "keep_blocked":
                      row_status = "kept_blocked_for_now"
                      approved_now = False
                      manual_needed = False
                  else:
                      row_status = "invalid_or_missing_download_header_staging_decision"
                      approved_now = False
                      manual_needed = False

                  ingest_rows.append({
                      "v4_376_staging_review_id": f"v4_376_staging_review_{len(ingest_rows)+1:03d}",
                      "v4_375_staging_plan_id": clean(row["v4_375_staging_plan_id"]),
                      "source_label": clean(row["source_label"]),
                      "source_url": clean(row["source_url"]),
                      "source_type": clean(row["source_type"]),
                      "source_kind": clean(row["source_kind"]),
                      "archive_or_source_format": clean(row["archive_or_source_format"]),
                      "priority": int(row["priority"]),
                      "candidate_for_exact_covariance": clean(row["candidate_for_exact_covariance"]).lower() in ["true", "1", "yes"],
                      "candidate_for_source_index": clean(row["candidate_for_source_index"]).lower() in ["true", "1", "yes"],
                      "human_download_header_staging_decision": decision,
                      "human_download_header_staging_note": clean(row["human_download_header_staging_note"]),
                      "row_review_status": row_status,
                      "approved_for_later_controlled_download_or_header_listing": bool(approved_now),
                      "manual_download_or_upload_needed": bool(manual_needed),
                      "download_attempted": False,
                      "source_file_fetched": False,
                      "archive_or_header_listing_inspected": False,
                      "exact_covariance_file_staged": False,
                      "full_covariance_available": False,
                      "full_covariance_values_loaded": False,
                      "covariance_dimension_confirmed": False,
                      "observed_row_order_matched": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              review_ingest = pd.DataFrame(ingest_rows)

              approved_for_later = review_ingest[
                  review_ingest["approved_for_later_controlled_download_or_header_listing"].astype(bool)
              ].copy()
              blocked_for_now = review_ingest[
                  ~review_ingest["approved_for_later_controlled_download_or_header_listing"].astype(bool)
              ].copy()
              manual_needed = review_ingest[review_ingest["manual_download_or_upload_needed"].astype(bool)].copy()
              invalid_rows = review_ingest[
                  review_ingest["row_review_status"] == "invalid_or_missing_download_header_staging_decision"
              ].copy()

              controlled_attempt_packet = approved_for_later.copy()
              controlled_attempt_packet["next_gate"] = "v4_377_controlled_official_source_download_or_archive_listing_attempt_no_covariance_values_no_support"
              controlled_attempt_packet["controlled_attempt_scope"] = "download_or_archive_listing_only_no_covariance_values"
              controlled_attempt_packet["attempt_order"] = range(1, len(controlled_attempt_packet) + 1)
              controlled_attempt_packet["download_attempted_now"] = False
              controlled_attempt_packet["source_file_fetched_now"] = False
              controlled_attempt_packet["archive_or_header_listing_inspected_now"] = False
              controlled_attempt_packet["covariance_values_loaded"] = False
              controlled_attempt_packet["support_allowed"] = False

              route_status = pd.DataFrame([
                  {
                      "status_id": "V4_376_STATUS_001",
                      "status": "download_header_staging_review_ingested",
                      "detail": f"{len(approved_for_later)} source rows approved for a later controlled download/header-listing attempt.",
                  },
                  {
                      "status_id": "V4_376_STATUS_002",
                      "status": "first_controlled_attempt_narrowed",
                      "detail": "Only the first two archive candidates are approved for the next attempt; the remaining sources stay blocked as fallback.",
                  },
                  {
                      "status_id": "V4_376_STATUS_003",
                      "status": "no_download_attempted",
                      "detail": "This gate only ingests the review and prepares the next attempt packet.",
                  },
                  {
                      "status_id": "V4_376_STATUS_004",
                      "status": "support_still_blocked",
                      "detail": "support_allowed=false remains active.",
                  },
              ])

              limitation_update = pd.DataFrame([
                  {
                      "limit_id": "V4_376_LIMIT_001",
                      "limit": "Approval here means later controlled download/header-listing attempt only.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_376_LIMIT_002",
                      "limit": "No download or source fetch is attempted in v4.376.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_376_LIMIT_003",
                      "limit": "No archive contents or headers are inspected in v4.376.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_376_LIMIT_004",
                      "limit": "No covariance values, dimensions, or observed-row order are confirmed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_376_LIMIT_005",
                      "limit": "No likelihood, p-values, score, or support claim is allowed.",
                      "status": "blocked_by_design",
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_376_GAP_001",
                      "gap": "Download/header-staging review ingested.",
                      "status_after_v4_376": "controlled_attempt_packet_created_no_download_no_values",
                      "next_gate": "v4_377_controlled_official_source_download_or_archive_listing_attempt_no_values_no_support",
                  },
                  {
                      "gap_id": "V4_376_GAP_002",
                      "gap": "Source download or header listing remains unattempted.",
                      "status_after_v4_376": "still_open",
                      "next_gate": "v4_377_controlled_attempt",
                  },
                  {
                      "gap_id": "V4_376_GAP_003",
                      "gap": "Covariance values remain unloaded.",
                      "status_after_v4_376": "still_blocked",
                      "next_gate": "later_after_archive_listing_identifies_exact_covariance_file",
                  },
                  {
                      "gap_id": "V4_376_GAP_004",
                      "gap": "Covariance dimensions and observed-row order remain unconfirmed.",
                      "status_after_v4_376": "still_blocked",
                      "next_gate": "later_shape_and_order_gate",
                  },
                  {
                      "gap_id": "V4_376_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_376": "still_blocked",
                      "next_gate": "no_support_claims_allowed_from_v4_376",
                  },
              ])

              hard_checks = {
                  "input_v4_375_summary_found": summary375.get("version") == "v4.375",
                  "input_v4_375_rules_all_passed": summary_rules_all_passed(summary375),
                  "input_v4_375_failed_gates_none": summary375.get("failed_gates") == "none",
                  "input_v4_375_staging_plan_rows_7": summary375.get("staging_plan_rows") == 7,
                  "input_v4_375_priority_candidates_5": summary375.get("priority_download_candidate_rows") == 5,
                  "input_v4_375_source_index_rows_2": summary375.get("source_index_plan_rows") == 2,
                  "input_v4_375_no_download_attempted": summary375.get("download_attempted") is False,
                  "input_v4_375_no_source_file_fetched": summary375.get("source_file_fetched") is False,
                  "input_v4_375_no_archive_listing": summary375.get("archive_or_header_listing_inspected") is False,
                  "input_v4_375_no_exact_file_staged": summary375.get("exact_covariance_file_staged") is False,
                  "input_v4_375_no_full_covariance": summary375.get("full_covariance_available") is False,
                  "input_v4_375_no_values_loaded": summary375.get("full_covariance_values_loaded") is False,
                  "input_v4_375_no_dimension_confirmed": summary375.get("covariance_dimension_confirmed") is False,
                  "input_v4_375_no_row_order": summary375.get("observed_row_order_matched") is False,
                  "input_v4_375_no_likelihood": summary375.get("likelihood_computed") is False,
                  "input_v4_375_no_p_values": summary375.get("p_values_computed") is False,
                  "input_v4_375_no_score_valid": summary375.get("score_valid") is False,
                  "input_v4_375_no_support_allowed": summary375.get("support_allowed") is False,

                  "rules375_all_passed": passed_column_all(rules375),
                  "staging_plan_rows_match_summary": len(staging_plan) == int(summary375.get("staging_plan_rows")),
                  "priority_candidates_rows_match_summary": len(priority_candidates) == int(summary375.get("priority_download_candidate_rows")),
                  "source_index_rows_match_summary": len(source_index_plan) == int(summary375.get("source_index_plan_rows")),
                  "blank_review_rows_match_staging_plan": len(blank_review) == len(staging_plan),
                  "human_review_rows_match_staging_plan": len(human_review) == len(staging_plan),
                  "batch_plan_rows_equal_5": len(batch_plan) == 5,
                  "safety_rows_equal_5": len(safety) == 5,
                  "gap375_rows_equal_5": len(gap375) == 5,
                  "accepted_sources_rows_equal_7": len(accepted_sources) == 7,
                  "exact_candidates_rows_equal_5": len(exact_candidates) == 5,

                  "human_decisions_filled": human_review["human_download_header_staging_decision"].apply(clean).ne("").all(),
                  "human_decisions_allowed": human_review["human_download_header_staging_decision"].apply(clean).isin(ALLOWED_STAGING_DECISIONS).all(),
                  "review_ingest_rows_equal_human_review": len(review_ingest) == len(human_review),
                  "approved_for_later_rows_equal_2": len(approved_for_later) == 2,
                  "blocked_for_now_rows_equal_5": len(blocked_for_now) == 5,
                  "manual_needed_rows_equal_0": len(manual_needed) == 0,
                  "invalid_rows_equal_0": len(invalid_rows) == 0,
                  "controlled_attempt_packet_rows_equal_approved": len(controlled_attempt_packet) == len(approved_for_later),
                  "route_status_rows_equal_4": len(route_status) == 4,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_download_attempted": false_col(review_ingest, "download_attempted") and false_col(controlled_attempt_packet, "download_attempted_now"),
                  "no_source_file_fetched": false_col(review_ingest, "source_file_fetched") and false_col(controlled_attempt_packet, "source_file_fetched_now"),
                  "no_archive_or_header_listing_inspected": false_col(review_ingest, "archive_or_header_listing_inspected") and false_col(controlled_attempt_packet, "archive_or_header_listing_inspected_now"),
                  "no_exact_covariance_file_staged": false_col(review_ingest, "exact_covariance_file_staged"),
                  "no_full_covariance_available": false_col(review_ingest, "full_covariance_available"),
                  "no_covariance_values_loaded": false_col(review_ingest, "full_covariance_values_loaded") and false_col(controlled_attempt_packet, "covariance_values_loaded"),
                  "no_covariance_dimension_confirmed": false_col(review_ingest, "covariance_dimension_confirmed"),
                  "no_observed_row_order_matched": false_col(review_ingest, "observed_row_order_matched"),
                  "no_likelihood_computed": false_col(review_ingest, "likelihood_computed"),
                  "no_p_values_computed": false_col(review_ingest, "p_values_computed"),
                  "no_score_valid": false_col(review_ingest, "score_valid"),
                  "no_support_allowed": false_col(review_ingest, "support_allowed") and false_col(controlled_attempt_packet, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary376 = {
                  "version": "v4.376",
                  "route_name": "v4_376_download_header_staging_review_ingest_no_values_no_support_claims",
                  "expected_result": "v4_376_download_header_staging_review_ingest_passed_controlled_attempt_packet_created_no_download_no_values_no_support_claims",
                  "input_version": "v4.375",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "review_ingest_rows": int(len(review_ingest)),
                  "approved_for_later_controlled_attempt_rows": int(len(approved_for_later)),
                  "blocked_for_now_rows": int(len(blocked_for_now)),
                  "controlled_attempt_packet_rows": int(len(controlled_attempt_packet)),
                  "download_attempted": False,
                  "source_file_fetched": False,
                  "archive_or_header_listing_inspected": False,
                  "exact_covariance_file_staged": False,
                  "full_covariance_available": False,
                  "full_covariance_values_loaded": False,
                  "covariance_dimension_confirmed": False,
                  "observed_row_order_matched": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "v4_377_controlled_official_source_download_or_archive_listing_attempt_no_values_no_support_claims",
              }

              review_ingest.to_csv(outdir / "v4_376_download_header_staging_review_ingest_ledger_NO_DOWNLOAD_NO_VALUES_NO_SUPPORT.csv", index=False)
              approved_for_later.to_csv(outdir / "v4_376_APPROVED_FOR_LATER_controlled_download_header_attempt_NO_VALUES.csv", index=False)
              blocked_for_now.to_csv(outdir / "v4_376_blocked_sources_for_now.csv", index=False)
              controlled_attempt_packet.to_csv(outdir / "v4_376_controlled_download_or_archive_listing_attempt_packet_NO_VALUES_NO_SUPPORT.csv", index=False)
              route_status.to_csv(outdir / "v4_376_route_status_summary.csv", index=False)
              limitation_update.to_csv(outdir / "v4_376_limitations_after_download_header_staging_review.csv", index=False)
              gap_update.to_csv(outdir / "v4_376_gap_status_after_download_header_staging_review.csv", index=False)
              human_review.to_csv(outdir / "v4_376_input_human_filled_download_header_staging_review_preserved.csv", index=False)
              staging_plan.to_csv(outdir / "v4_376_input_v4_375_staging_plan_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_376_rule_checks.csv", index=False)

              (outdir / "v4_376_summary.json").write_text(json.dumps(summary376, indent=2))

              summary_md = f"""# TAIRID v4.376 Download/Header-Staging Review Ingest — No Download, No Values, No Support Claims

          Expected result: `{summary376["expected_result"]}`

          {summary376["rules_passed"]} / {summary376["rules_total"]} rules passed

          failed_gates = {summary376["failed_gates"]}

          review_ingest_rows = {summary376["review_ingest_rows"]}

          approved_for_later_controlled_attempt_rows = {summary376["approved_for_later_controlled_attempt_rows"]}

          blocked_for_now_rows = {summary376["blocked_for_now_rows"]}

          controlled_attempt_packet_rows = {summary376["controlled_attempt_packet_rows"]}

          download_attempted = false

          source_file_fetched = false

          archive_or_header_listing_inspected = false

          exact_covariance_file_staged = false

          full_covariance_available = false

          full_covariance_values_loaded = false

          covariance_dimension_confirmed = false

          observed_row_order_matched = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step ingests human review and creates the next controlled attempt packet only.

          It does **not** download or fetch source files.

          It does **not** inspect archive contents.

          It does **not** load covariance values.

          It does **not** confirm covariance dimensions or observed-row order.

          It does **not** compute likelihood or p-values.

          It does **not** make support claims.

          Next route: `{summary376["selected_next_route"]}`
          """
              (outdir / "v4_376_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
