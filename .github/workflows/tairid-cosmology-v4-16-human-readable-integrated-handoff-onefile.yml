name: TAIRID Cosmology v4.16 Human Readable Integrated Handoff Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-16-human-readable-integrated-handoff-onefile.yml"

jobs:
  human-readable-integrated-handoff-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.16 human readable integrated handoff onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_16_human_readable_integrated_handoff_onefile

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_16_human_readable_integrated_handoff_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_16_human_readable_integrated_handoff_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine KiDS, DES, HSC, H0LiCOW, or BAO into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run DES, HSC, KiDS, H0LiCOW, or BAO likelihoods.",
              "This writes a human-readable integrated handoff from the v4.15 system-flow checkpoint.",
              "A pass means the handoff preserves the diagnostic state and truth boundaries, not that TAIRID is validated."
          ]

          SYSTEM_HEALTH = {
              "reach_preserved": True,
              "growth_negative_preserved": True,
              "bao_boundary_preserved": True,
              "kids_direct_chain_preserved": True,
              "des_summary_preserved": True,
              "hsc_summary_preserved": True,
              "sigma8_negative": True,
              "omegam_mixed": True,
              "flow_rule_pass_count": 5,
              "flow_rule_total_count": 5
          }

          CORE_FINDINGS = [
              {
                  "finding_id": "reach_lane",
                  "status": "preserved",
                  "plain_language": "H0LiCOW remains a reach-positive-equivalent diagnostic lane.",
                  "technical_boundary": "It is not a model anchor and does not solve H0."
              },
              {
                  "finding_id": "growth_lane",
                  "status": "preserved",
                  "plain_language": "The growth/consolidation lane remains negative across role-explicit S8 rows.",
                  "technical_boundary": "This is diagnostic pressure organization, not validation."
              },
              {
                  "finding_id": "kids_direct_chain",
                  "status": "active",
                  "plain_language": "KiDS became the real direct-chain foothold because the 3x2pt chain was parsed and matched the carried value.",
                  "technical_boundary": "It replaces only the old carried KiDS 3x2pt value, not KiDS cosmic shear."
              },
              {
                  "finding_id": "des_status",
                  "status": "summary_only",
                  "plain_language": "DES has run-name and chain-template provenance, but no reachable public numeric chain file yet.",
                  "technical_boundary": "DES remains a published-summary row until a real chain URL is supplied and parsed."
              },
              {
                  "finding_id": "hsc_status",
                  "status": "summary_only",
                  "plain_language": "HSC has SACC/data-vector and likelihood infrastructure, but no posterior-chain replacement row yet.",
                  "technical_boundary": "HSC remains a published-summary row."
              },
              {
                  "finding_id": "decomposition",
                  "status": "amplitude_side_supported",
                  "plain_language": "S8 and sigma8 carry the repeated negative pressure more clearly than Omega_m.",
                  "technical_boundary": "Omega_m is mixed and must not be forced into the shared negative pattern."
              },
              {
                  "finding_id": "bao_boundary",
                  "status": "preserved",
                  "plain_language": "BAO remains an auxiliary ruler boundary.",
                  "technical_boundary": "BAO is not promoted into a global reach anchor."
              }
          ]

          LANE_SUMMARY = [
              {
                  "lane": "reach_geometry",
                  "families": "H0LiCOW",
                  "status": "reach_positive_equivalent_preserved",
                  "plain_language": "Reach lane is active as a diagnostic only."
              },
              {
                  "lane": "lensing_only_growth",
                  "families": "KiDS;DES;HSC",
                  "status": "growth_lane_negative_repeated",
                  "plain_language": "Lensing-only growth rows are negative, but not all are strong."
              },
              {
                  "lane": "three_by_two_growth",
                  "families": "KiDS;DES",
                  "status": "growth_lane_negative_repeated",
                  "plain_language": "3x2pt growth rows are negative; KiDS is direct-chain, DES is summary-only."
              },
              {
                  "lane": "decomposition",
                  "families": "KiDS;DES",
                  "status": "decomposition_mixed_expected",
                  "plain_language": "sigma8 is negative, while Omega_m is mixed."
              },
              {
                  "lane": "auxiliary_boundary",
                  "families": "BAO",
                  "status": "auxiliary_boundary_preserved",
                  "plain_language": "BAO stays boundary-only."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID is validated.",
              "The H0 tension is solved.",
              "Standard cosmology is disproven.",
              "A new physics model has been proven.",
              "BAO confirms the reach surface.",
              "DES or HSC were parsed as direct chains.",
              "KiDS, DES, HSC, H0LiCOW, and BAO were combined into one posterior.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_MOVES = [
              {
                  "priority": 1,
                  "next_move": "Start a new thread from this handoff",
                  "reason": "The integrated state is now clean enough to continue without carrying the whole old thread."
              },
              {
                  "priority": 2,
                  "next_move": "Write a human-facing cosmology robustness paper section",
                  "reason": "The current result can be explained as diagnostic structure without overclaiming."
              },
              {
                  "priority": 3,
                  "next_move": "Build a reach/growth interaction matrix",
                  "reason": "This would show how reach-positive-equivalent and consolidation-negative rows relate without collapsing them into one surface."
              },
              {
                  "priority": 4,
                  "next_move": "Only parse DES or HSC if a real direct public posterior-chain URL is supplied",
                  "reason": "The current crawler found infrastructure and templates, not parse-ready public chain files."
              }
          ]

          failed_gates = []
          warnings = [
              "handoff_is_not_validation",
              "DES_and_HSC_remain_summary_only",
              "not_all_growth_rows_are_strong"
          ]

          required_health = [
              "reach_preserved",
              "growth_negative_preserved",
              "bao_boundary_preserved",
              "kids_direct_chain_preserved",
              "des_summary_preserved",
              "hsc_summary_preserved",
              "sigma8_negative",
              "omegam_mixed"
          ]

          for key in required_health:
              if SYSTEM_HEALTH.get(key) is not True:
                  failed_gates.append(f"{key}_not_preserved")

          if SYSTEM_HEALTH["flow_rule_pass_count"] != SYSTEM_HEALTH["flow_rule_total_count"]:
              failed_gates.append("flow_rules_not_all_passed")

          if failed_gates:
              readiness_label = "human_readable_integrated_handoff_failed"
              next_step = "Repair missing system-health fields before using this as a handoff."
          else:
              readiness_label = "human_readable_integrated_handoff_passed_ready_for_new_thread_or_paper_section"
              next_step = (
                  "Use this handoff as the clean starting point for the next thread, or convert it into a human-readable cosmology robustness section."
              )

          interpretation = (
              "The integrated v4.15 system-flow audit held together. "
              "v4.16 turns that result into a readable handoff: reach and growth remain separated, KiDS is the only direct parsed growth chain, DES and HSC remain summary-only, BAO remains auxiliary, and the repeated pressure is strongest on the S8/sigma8 amplitude side while Omega_m is mixed. "
              "This is useful structure, not validation."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "system_health": SYSTEM_HEALTH,
              "core_findings": CORE_FINDINGS,
              "lane_summary": LANE_SUMMARY,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_moves": NEXT_MOVES,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_growth_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "combined_posterior_allowed": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "core_findings_v4_16.csv",
              CORE_FINDINGS,
              ["finding_id", "status", "plain_language", "technical_boundary"]
          )

          write_csv(
              OUTDIR / "lane_summary_v4_16.csv",
              LANE_SUMMARY,
              ["lane", "families", "status", "plain_language"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_16.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_moves_v4_16.csv",
              NEXT_MOVES,
              ["priority", "next_move", "reason"]
          )

          write_csv(
              OUTDIR / "system_health_v4_16.csv",
              [SYSTEM_HEALTH],
              [
                  "reach_preserved",
                  "growth_negative_preserved",
                  "bao_boundary_preserved",
                  "kids_direct_chain_preserved",
                  "des_summary_preserved",
                  "hsc_summary_preserved",
                  "sigma8_negative",
                  "omegam_mixed",
                  "flow_rule_pass_count",
                  "flow_rule_total_count"
              ]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_handoff_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The integrated diagnostic system is coherent enough for a human-readable handoff.",
                  "boundary": "Handoff only, not validation."
              },
              {
                  "interpretation_id": "allowed_status_statement",
                  "status": "allowed_with_boundary",
                  "wording": "KiDS is direct-chain active, while DES and HSC remain summary-only.",
                  "boundary": "No hidden DES/HSC direct-chain replacement."
              },
              {
                  "interpretation_id": "allowed_pressure_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The repeated pressure is strongest on S8/sigma8 amplitude-side rows while Omega_m is mixed.",
                  "boundary": "Diagnostic decomposition only, not new physics proof."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID is validated.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_model_comparison_claim",
                  "status": "forbidden",
                  "wording": "A likelihood, BIC, posterior comparison, or model selection was run.",
                  "boundary": "Blocked."
              }
          ]

          write_csv(
              OUTDIR / "interpretation_boundaries_v4_16.csv",
              interpretation_rows,
              ["interpretation_id", "status", "wording", "boundary"]
          )

          json_path = OUTDIR / "tairid_cosmology_v4_16_human_readable_integrated_handoff_onefile.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v4.16 — Human-Readable Integrated Handoff")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("The larger integrated system-flow audit held together as a diagnostic framework.")
          md.append("")
          md.append("That means reach, growth/consolidation, product status, decomposition, and boundary guards are not contradicting each other.")
          md.append("")
          md.append("It does not mean TAIRID is proven.")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What we have")
          md.append("")
          md.append("| Finding | Status | Plain language | Boundary |")
          md.append("|---|---|---|---|")
          for row in CORE_FINDINGS:
              md.append(
                  f"| `{row['finding_id']}` | `{row['status']}` | {row['plain_language']} | {row['technical_boundary']} |"
              )
          md.append("")
          md.append("## Lane summary")
          md.append("")
          md.append("| Lane | Families | Status | Meaning |")
          md.append("|---|---|---|---|")
          for row in LANE_SUMMARY:
              md.append(
                  f"| `{row['lane']}` | `{row['families']}` | `{row['status']}` | {row['plain_language']} |"
              )
          md.append("")
          md.append("## Blocked claims")
          md.append("")
          for claim in BLOCKED_CLAIMS:
              md.append(f"- {claim}")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          md.append(interpretation)
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Next moves")
          md.append("")
          md.append("| Priority | Move | Reason |")
          md.append("|---:|---|---|")
          for row in NEXT_MOVES:
              md.append(f"| `{row['priority']}` | {row['next_move']} | {row['reason']} |")
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `core_findings_v4_16.csv`")
          md.append("- `lane_summary_v4_16.csv`")
          md.append("- `blocked_claims_v4_16.csv`")
          md.append("- `next_moves_v4_16.csv`")
          md.append("- `system_health_v4_16.csv`")
          md.append("- `interpretation_boundaries_v4_16.csv`")
          md.append("- `tairid_cosmology_v4_16_human_readable_integrated_handoff_onefile.json`")
          md.append("- `tairid_cosmology_v4_16_human_readable_integrated_handoff_onefile.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v4_16_human_readable_integrated_handoff_onefile.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("Interpretation:")
          print(interpretation)
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.16 human readable integrated handoff onefile artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v4-16-human-readable-integrated-handoff-onefile
          path: artifacts/tairid_cosmology_v4_16_human_readable_integrated_handoff_onefile/
