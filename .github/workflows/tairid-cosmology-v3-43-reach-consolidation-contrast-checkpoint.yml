name: TAIRID Cosmology v3.43 Reach Consolidation Contrast Checkpoint

on:
  workflow_dispatch:

jobs:
  reach-consolidation-contrast-checkpoint:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v3.43 reach consolidation contrast checkpoint
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_43

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v3_43")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_43_reach_consolidation_contrast_checkpoint"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute new pressure scores.",
              "This checkpoint compares already-audited reach-lane and consolidation-lane status only.",
              "H0LiCOW is carried only as a diagnostic non-BAO reach-lane candidate.",
              "BAO remains mixed/subfamily diagnostic and is not a global reach anchor.",
              "Growth/consolidation is carried from the prior v3.8/v3.9 prototype pattern only.",
              "Published summary anchors remain provisional until chain/covariance-aware ingestion is done.",
              "No lane may be promoted to model-anchor status in this workflow."
          ]

          PREVIOUS_MILESTONES = {
              "v3_8_two_surface_probe": {
                  "status": "two_surface_reach_consolidation_probe_supported_not_validation",
                  "two_surface_bic": 22.5726,
                  "one_global_surface_bic": 52.9203,
                  "delta_bic_two_minus_one": -30.3477,
                  "reach_mean": 1.8646,
                  "consolidation_mean": -2.4756,
                  "meaning": "Two-surface prototype beat one-global-surface prototype in the summary-anchor test."
              },
              "v3_9_growth_anchor_robustness": {
                  "status": "expanded_growth_anchor_robustness_supports_two_surface_probe_not_validation",
                  "two_surface_bic": 25.0079,
                  "one_global_surface_bic": 60.7862,
                  "delta_bic_two_minus_one": -35.7783,
                  "reach_mean": 1.8646,
                  "consolidation_mean": -1.9233,
                  "family_balanced_reach_mean": 2.8588,
                  "family_balanced_consolidation_mean": -2.0900,
                  "leave_one_anchor_out_preserved": "12/12",
                  "meaning": "Expanded growth anchors preserved reach-positive / consolidation-negative pattern in the prototype."
              },
              "v3_42_reach_lane_contrast": {
                  "status": "reach_lane_contrast_integration_passed_h0licow_candidate_bao_mixed_ready_for_growth_contrast",
                  "reach_lane_count": 5,
                  "h0licow_candidate_ok": True,
                  "bao_global_blocked": True,
                  "parked_lanes": ["shoes_local_ladder", "tdcosmo_time_delay"],
                  "blocked_lanes": ["desi_mapped_reach"],
                  "meaning": "Reach lane is role-specific: H0LiCOW candidate, BAO mixed/ruler, SH0ES and TDCOSMO parked, DESI mapped reach blocked."
              }
          }

          REQUIRED_CONTRACT_FIELDS = [
              "source",
              "observable_role",
              "pressure_surface",
              "baseline",
              "parser_status",
              "provenance_status",
              "block_condition",
              "claim_boundary"
          ]

          SURFACE_ROWS = [
              {
                  "surface_id": "h0licow_time_delay_reach",
                  "source": "H0LiCOW",
                  "observable_role": "time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "baseline": "Planck_2018_flat_LCDM_reference",
                  "parser_status": "parsed_pressure_scored_and_eligibility_reviewed_v3_40_1_to_v3_41",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "raw_pressure_sign": "negative_Ddt",
                  "raw_pressure_mean_z": -1.6268644558220158,
                  "raw_pressure_median_z": -0.9014283075552302,
                  "positive_count": 0,
                  "negative_count": 3,
                  "normalized_surface_direction": "reach_positive_equivalent",
                  "normalization_reason": "Shorter Ddt relative to Planck-reference baseline maps to local-H0-high-equivalent reach direction.",
                  "candidate_status": "non_bao_reach_lane_candidate_diagnostic_only",
                  "block_condition": "not_model_anchor_no_refit_later_contrast_required",
                  "claim_boundary": "diagnostic_candidate_only_not_validation",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              },
              {
                  "surface_id": "independent_bao_mixed_ruler",
                  "source": "SDSS_eBOSS_BOSS_BAO",
                  "observable_role": "bao_reach_ruler_mixed",
                  "pressure_surface": "ruler_reference_and_reach_geometry_mixed",
                  "baseline": "Planck_2018_flat_LCDM_reference",
                  "parser_status": "source_specific_bao_rows_reviewed_v3_31_v3_32",
                  "provenance_status": "public_bao_products_clean_eBOSS_plus_provisional_BOSS",
                  "raw_pressure_sign": "mixed_subfamily",
                  "raw_pressure_mean_z": "",
                  "raw_pressure_median_z": "",
                  "positive_count": "",
                  "negative_count": "",
                  "normalized_surface_direction": "not_global_reach_anchor",
                  "normalization_reason": "BAO has positive QSO subfamily but mixed or negative clean LRG families and provisional BOSS rows.",
                  "candidate_status": "mixed_subfamily_diagnostic_not_global_reach_anchor",
                  "block_condition": "blocked_global_bao_anchor_due_to_mixed_or_negative_clean_families",
                  "claim_boundary": "diagnostic_only_not_model_anchor",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              },
              {
                  "surface_id": "growth_consolidation_summary_anchor_pattern",
                  "source": "DES_KiDS_HSC_growth_summary_anchors_from_v3_9",
                  "observable_role": "weak_lensing_clustering_growth",
                  "pressure_surface": "consolidation_growth",
                  "baseline": "Planck_like_growth_reference_from_prior_summary_anchor_prototype",
                  "parser_status": "summary_anchor_prototype_only_chain_covariance_upgrade_needed",
                  "provenance_status": "published_summary_anchor_family_prototype",
                  "raw_pressure_sign": "negative_growth_consolidation",
                  "raw_pressure_mean_z": -1.9233,
                  "raw_pressure_median_z": "",
                  "positive_count": "",
                  "negative_count": "",
                  "normalized_surface_direction": "consolidation_negative",
                  "normalization_reason": "Growth/consolidation anchors remained lower than Planck-like S8 direction in v3.8/v3.9 prototype.",
                  "candidate_status": "consolidation_surface_pattern_candidate_prototype_only",
                  "block_condition": "blocked_from_stronger_claim_until_chain_covariance_ingestion",
                  "claim_boundary": "prototype_diagnostic_only_not_validation",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              },
              {
                  "surface_id": "shoes_local_ladder_parked",
                  "source": "PantheonPlus_SH0ES",
                  "observable_role": "local_ladder_H0_reach",
                  "pressure_surface": "reach_geometry",
                  "baseline": "not_safe_selected",
                  "parser_status": "parked_parser_followup_needed",
                  "provenance_status": "source_reachable_but_unlabeled_numeric_output_not_safe_for_pressure_row",
                  "raw_pressure_sign": "not_scored",
                  "raw_pressure_mean_z": "",
                  "raw_pressure_median_z": "",
                  "positive_count": "",
                  "negative_count": "",
                  "normalized_surface_direction": "parked",
                  "normalization_reason": "Parser did not safely extract a source-labeled H0 row.",
                  "candidate_status": "parked",
                  "block_condition": "blocked_until_safer_SH0ES_parser_or_better_source_product",
                  "claim_boundary": "parked_not_evidence",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              },
              {
                  "surface_id": "tdcosmo_time_delay_parked",
                  "source": "TDCOSMO",
                  "observable_role": "time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "baseline": "not_safe_selected",
                  "parser_status": "parked_provenance_review_needed",
                  "provenance_status": "TDLMC_seed_style_rows_flagged_for_review",
                  "raw_pressure_sign": "not_scored",
                  "raw_pressure_mean_z": "",
                  "raw_pressure_median_z": "",
                  "positive_count": "",
                  "negative_count": "",
                  "normalized_surface_direction": "parked",
                  "normalization_reason": "Seed-style provenance issue prevents observational anchor use.",
                  "candidate_status": "parked",
                  "block_condition": "blocked_until_observational_provenance_and_parser_review",
                  "claim_boundary": "parked_not_evidence",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              },
              {
                  "surface_id": "desi_mapped_reach_blocked",
                  "source": "DESI",
                  "observable_role": "bao_reach_density_ruler",
                  "pressure_surface": "reach_geometry_or_ruler_reference_pending_role_specific_rebuild",
                  "baseline": "not_active",
                  "parser_status": "blocked_as_independent_anchor",
                  "provenance_status": "mapped_rows_showed_scaled_counterpart_risk",
                  "raw_pressure_sign": "not_active",
                  "raw_pressure_mean_z": "",
                  "raw_pressure_median_z": "",
                  "positive_count": "",
                  "negative_count": "",
                  "normalized_surface_direction": "blocked",
                  "normalization_reason": "Mapped DESI reach rows showed scaled-counterpart risk and cannot be reused as independent anchor.",
                  "candidate_status": "blocked_from_independent_anchor_role",
                  "block_condition": "blocked_until_independent_non_duplicate_source_specific_treatment",
                  "claim_boundary": "blocked_not_evidence",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              }
          ]

          CONTRAST_ROWS = [
              {
                  "contrast_id": "reach_vs_consolidation_surface_direction",
                  "reach_input": "H0LiCOW Ddt coherent negative raw pressure normalized to local-H0-high-equivalent reach-positive direction",
                  "ruler_input": "BAO mixed/subfamily only; not global reach anchor",
                  "consolidation_input": "v3.9 growth/consolidation negative summary-anchor prototype",
                  "contrast_result": "role_specific_reach_positive_equivalent_vs_consolidation_negative_pattern_preserved_as_checkpoint",
                  "status": "checkpoint_supported_not_validation",
                  "allowed_wording": "The current checkpoint preserves a role-specific split: non-BAO time-delay reach points local-H0-high-equivalent while growth/consolidation remains negative in the prior prototype.",
                  "forbidden_wording": "TAIRID is proven or H0 is solved.",
                  "next_testing_use": "Design a guarded two-surface comparison without treating BAO as a global reach anchor."
              },
              {
                  "contrast_id": "one_global_reach_bucket_rejected",
                  "reach_input": "H0LiCOW candidate differs from BAO mixed/ruler behavior",
                  "ruler_input": "BAO blocked from global reach-positive role",
                  "consolidation_input": "Growth remains its own consolidation lane",
                  "contrast_result": "one_bucket_reach_handling_remains_blocked",
                  "status": "guardrail_preserved",
                  "allowed_wording": "Reach observables must remain role-specific.",
                  "forbidden_wording": "All reach observables show the same pressure.",
                  "next_testing_use": "Keep H0LiCOW, BAO, SH0ES, TDCOSMO, and DESI in separate roles."
              },
              {
                  "contrast_id": "chain_covariance_upgrade_required",
                  "reach_input": "H0LiCOW has source-specific chain parsing",
                  "ruler_input": "BAO has source-specific rows but mixed family behavior",
                  "consolidation_input": "Growth side is still summary-anchor prototype",
                  "contrast_result": "growth_side_needs_chain_covariance_upgrade_before_stronger_claim",
                  "status": "evidence_quality_guardrail",
                  "allowed_wording": "The growth lane needs the same source-specific upgrade H0LiCOW received.",
                  "forbidden_wording": "Summary anchors are enough for validation.",
                  "next_testing_use": "Before any strong claim, rebuild growth/consolidation with chains or covariance products."
              }
          ]

          BLOCKED_AND_PARKED_ROWS = [
              {
                  "item": "frozen_low_z_gate_as_SN_or_BAO_CMB_correction",
                  "status": "locked_closed",
                  "reason": "Rejected by earlier tests; do not use as direct correction."
              },
              {
                  "item": "SN_threshold_activation_claim",
                  "status": "locked_closed",
                  "reason": "SN threshold did not beat smooth drift; activation must be cross-surface if revisited."
              },
              {
                  "item": "one_global_pressure_surface",
                  "status": "locked_closed",
                  "reason": "One global surface lost to two-surface and role-specific treatment."
              },
              {
                  "item": "independent_BAO_as_global_reach_anchor",
                  "status": "locked_closed",
                  "reason": "BAO remained mixed/subfamily only."
              },
              {
                  "item": "DESI_mapped_reach_as_independent_anchor",
                  "status": "locked_closed",
                  "reason": "Mapped DESI reach rows showed scaled-counterpart risk."
              },
              {
                  "item": "SH0ES_unlabeled_numeric_parser",
                  "status": "parked",
                  "reason": "Needs safer parser or better source-labeled product."
              },
              {
                  "item": "TDCOSMO_seed_style_rows",
                  "status": "parked",
                  "reason": "Needs provenance review before observational use."
              },
              {
                  "item": "WFI2033_weighted_H0LiCOW_row",
                  "status": "parked",
                  "reason": "Needs weight/likelihood handling review before scoring."
              }
          ]

          NEXT_TEST_QUEUE = [
              {
                  "priority": 1,
                  "next_test": "v3_44_guarded_two_surface_comparison_design",
                  "purpose": "Design a guarded two-surface comparison using role-specific reach and consolidation rules before any refit.",
                  "must_include": "H0LiCOW normalized reach-positive-equivalent candidate, BAO mixed/ruler diagnostic, growth negative prototype, blocked/parked lanes, sign normalization rules.",
                  "must_not_include": "new pressure scoring, model-anchor promotion, refit, validation claim.",
                  "readiness_if_passes": "A later covariance-aware growth upgrade or guarded comparison implementation may be considered."
              },
              {
                  "priority": 2,
                  "next_test": "later_growth_consolidation_chain_covariance_upgrade",
                  "purpose": "Upgrade growth/consolidation beyond summary anchors using DES/KiDS/HSC chains or covariance products.",
                  "must_include": "source-specific family handling, covariance/chain provenance, S8 or growth-parameter mapping, block conditions.",
                  "must_not_include": "mixing growth into reach without explicit bridge.",
                  "readiness_if_passes": "Growth side can be compared more fairly against H0LiCOW's parser quality."
              },
              {
                  "priority": 3,
                  "next_test": "later_weighted_wfi_likelihood_review",
                  "purpose": "Review WFI2033 weight semantics and likelihood handling before weighted row scoring.",
                  "must_include": "weight column meaning, effective sample count, likelihood interpretation, parser provenance.",
                  "must_not_include": "scoring weighted WFI before weight meaning is confirmed.",
                  "readiness_if_passes": "WFI2033 may become eligible for a separate pressure audit."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          created_at = now_iso()

          write_csv(
              OUTDIR / "reach_consolidation_surface_ledger_v3_43.csv",
              SURFACE_ROWS,
              [
                  "surface_id", "source", "observable_role", "pressure_surface",
                  "baseline", "parser_status", "provenance_status",
                  "raw_pressure_sign", "raw_pressure_mean_z", "raw_pressure_median_z",
                  "positive_count", "negative_count", "normalized_surface_direction",
                  "normalization_reason", "candidate_status", "block_condition",
                  "claim_boundary", "model_anchor_allowed_now", "refit_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "reach_consolidation_contrast_summary_v3_43.csv",
              CONTRAST_ROWS,
              [
                  "contrast_id", "reach_input", "ruler_input", "consolidation_input",
                  "contrast_result", "status", "allowed_wording",
                  "forbidden_wording", "next_testing_use"
              ]
          )

          write_csv(
              OUTDIR / "blocked_and_parked_paths_v3_43.csv",
              BLOCKED_AND_PARKED_ROWS,
              ["item", "status", "reason"]
          )

          write_csv(
              OUTDIR / "next_test_queue_v3_43.csv",
              NEXT_TEST_QUEUE,
              [
                  "priority", "next_test", "purpose", "must_include",
                  "must_not_include", "readiness_if_passes"
              ]
          )

          # Audit.
          h0licow = [r for r in SURFACE_ROWS if r["surface_id"] == "h0licow_time_delay_reach"]
          growth = [r for r in SURFACE_ROWS if r["surface_id"] == "growth_consolidation_summary_anchor_pattern"]
          bao = [r for r in SURFACE_ROWS if r["surface_id"] == "independent_bao_mixed_ruler"]
          parked = [r for r in SURFACE_ROWS if r["candidate_status"] == "parked"]
          blocked = [r for r in SURFACE_ROWS if "blocked" in r["candidate_status"]]

          h0licow_normalized_ok = (
              len(h0licow) == 1
              and h0licow[0]["raw_pressure_sign"] == "negative_Ddt"
              and h0licow[0]["normalized_surface_direction"] == "reach_positive_equivalent"
              and h0licow[0]["negative_count"] == 3
          )

          growth_negative_ok = (
              len(growth) == 1
              and growth[0]["normalized_surface_direction"] == "consolidation_negative"
              and float(growth[0]["raw_pressure_mean_z"]) < 0
          )

          bao_mixed_ok = (
              len(bao) == 1
              and bao[0]["normalized_surface_direction"] == "not_global_reach_anchor"
              and bao[0]["candidate_status"] == "mixed_subfamily_diagnostic_not_global_reach_anchor"
          )

          no_model_anchors = all(row["model_anchor_allowed_now"] is False for row in SURFACE_ROWS)
          no_refits = all(row["refit_allowed_now"] is False for row in SURFACE_ROWS)

          required_contract_present = True
          for row in SURFACE_ROWS:
              for field in REQUIRED_CONTRACT_FIELDS:
                  if field not in row or row[field] in ["", None]:
                      required_contract_present = False

          blocked_rails_preserved = len(BLOCKED_AND_PARKED_ROWS) >= 8
          parked_preserved = len(parked) >= 2
          blocked_preserved = len(blocked) >= 1

          next_test_defined = NEXT_TEST_QUEUE[0]["next_test"] == "v3_44_guarded_two_surface_comparison_design"
          next_test_guards = (
              "new pressure scoring" in NEXT_TEST_QUEUE[0]["must_not_include"]
              and "refit" in NEXT_TEST_QUEUE[0]["must_not_include"]
              and "validation claim" in NEXT_TEST_QUEUE[0]["must_not_include"]
          )

          audit_rows = [
              {
                  "audit_gate": "h0licow_sign_normalization_preserved",
                  "pass": h0licow_normalized_ok,
                  "value": json.dumps(h0licow[0] if h0licow else {}, sort_keys=True),
                  "boundary": "Negative Ddt must be normalized only as local-H0-high-equivalent reach direction."
              },
              {
                  "audit_gate": "growth_consolidation_negative_pattern_preserved",
                  "pass": growth_negative_ok,
                  "value": json.dumps(growth[0] if growth else {}, sort_keys=True),
                  "boundary": "Growth/consolidation remains negative prototype pattern only."
              },
              {
                  "audit_gate": "bao_remains_mixed_not_global_anchor",
                  "pass": bao_mixed_ok,
                  "value": json.dumps(bao[0] if bao else {}, sort_keys=True),
                  "boundary": "BAO cannot be folded into a global reach-positive anchor."
              },
              {
                  "audit_gate": "reach_consolidation_contrast_checkpoint_ready",
                  "pass": h0licow_normalized_ok and growth_negative_ok and bao_mixed_ok,
                  "value": "h0licow_normalized_vs_growth_negative_with_bao_mixed",
                  "boundary": "Checkpoint may compare surfaces but cannot validate the model."
              },
              {
                  "audit_gate": "parked_lanes_preserved",
                  "pass": parked_preserved,
                  "value": ",".join([r["surface_id"] for r in parked]),
                  "boundary": "Parked lanes remain unavailable for scoring."
              },
              {
                  "audit_gate": "blocked_lanes_preserved",
                  "pass": blocked_preserved,
                  "value": ",".join([r["surface_id"] for r in blocked]),
                  "boundary": "Blocked lanes remain unavailable as anchors."
              },
              {
                  "audit_gate": "blocked_and_parked_rails_preserved",
                  "pass": blocked_rails_preserved,
                  "value": len(BLOCKED_AND_PARKED_ROWS),
                  "boundary": "Prior failed tests must remain as rails."
              },
              {
                  "audit_gate": "required_contract_fields_present",
                  "pass": required_contract_present,
                  "value": required_contract_present,
                  "boundary": "source/role/surface/baseline/parser/provenance/block/claim contract must persist."
              },
              {
                  "audit_gate": "no_model_anchors_promoted",
                  "pass": no_model_anchors,
                  "value": no_model_anchors,
                  "boundary": "No surface may become a model anchor."
              },
              {
                  "audit_gate": "no_refit_allowed",
                  "pass": no_refits,
                  "value": no_refits,
                  "boundary": "No refit is allowed."
              },
              {
                  "audit_gate": "next_test_defined_without_refit_or_new_scoring",
                  "pass": next_test_defined and next_test_guards,
                  "value": NEXT_TEST_QUEUE[0]["next_test"],
                  "boundary": "Next step must be comparison design, not scoring or refit."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No model claim is allowed."
              }
          ]

          write_csv(
              OUTDIR / "reach_consolidation_contrast_audit_v3_43.csv",
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          hard_failed = []

          if not h0licow_normalized_ok:
              hard_failed.append("h0licow_sign_normalization_missing")
          if not growth_negative_ok:
              hard_failed.append("growth_consolidation_negative_pattern_missing")
          if not bao_mixed_ok:
              hard_failed.append("bao_mixed_status_not_preserved")
          if not parked_preserved:
              hard_failed.append("parked_lanes_not_preserved")
          if not blocked_preserved:
              hard_failed.append("blocked_lanes_not_preserved")
          if not blocked_rails_preserved:
              hard_failed.append("blocked_and_parked_rails_missing")
          if not required_contract_present:
              hard_failed.append("required_contract_fields_missing")
          if not no_model_anchors:
              hard_failed.append("model_anchor_promotion_violation")
          if not no_refits:
              hard_failed.append("refit_guard_violation")
          if not (next_test_defined and next_test_guards):
              hard_failed.append("next_test_guard_incomplete")

          if hard_failed:
              readiness_label = "reach_consolidation_contrast_checkpoint_needs_followup"
          else:
              readiness_label = "reach_consolidation_contrast_checkpoint_passed_ready_for_guarded_two_surface_comparison_design"

          next_step = (
              "Build v3.44 guarded two-surface comparison design: define exactly how role-specific reach, mixed BAO/ruler diagnostics, and growth/consolidation should enter a later comparison, without new scoring, refit, or model-anchor promotion."
              if not hard_failed
              else "Repair v3.43 reach/consolidation contrast checkpoint before designing any two-surface comparison."
          )

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "previous_milestones": PREVIOUS_MILESTONES,
              "truth_boundary": TRUTH_BOUNDARY,
              "surface_row_count": len(SURFACE_ROWS),
              "contrast_row_count": len(CONTRAST_ROWS),
              "h0licow_normalized_ok": h0licow_normalized_ok,
              "growth_consolidation_negative_ok": growth_negative_ok,
              "bao_mixed_ok": bao_mixed_ok,
              "blocked_and_parked_rail_count": len(BLOCKED_AND_PARKED_ROWS),
              "model_anchor_count": 0,
              "refit_allowed": False,
              "new_pressure_scores_built": False,
              "gate_result": {
                  "failed_gates": hard_failed,
                  "readiness_label": readiness_label,
                  "h0licow_normalized_direction": h0licow[0]["normalized_surface_direction"] if h0licow else "",
                  "growth_consolidation_direction": growth[0]["normalized_surface_direction"] if growth else "",
                  "bao_status": bao[0]["candidate_status"] if bao else "",
