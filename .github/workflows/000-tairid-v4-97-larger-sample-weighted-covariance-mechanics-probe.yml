              {"rule_id": "all_samples_valid_for_covariance", "pass": len(X) == 64 and all(row["accepted_for_covariance_mechanics"] for row in sample_validation_records), "result": f"accepted_samples={len(X)}", "boundary": "Mechanics diagnostic only."},
              {"rule_id": "effective_sample_size_ok", "pass": effective_sample_size >= MIN_EFFECTIVE_SAMPLE_SIZE, "result": f"N_eff={effective_sample_size}", "boundary": "Diagnostic quality only."},
