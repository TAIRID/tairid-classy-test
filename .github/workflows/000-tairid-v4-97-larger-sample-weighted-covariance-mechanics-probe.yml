              "not_final_Planck_reference_uncertainty",
              "no_observational_growth_combination",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def is_finite_positive(value):
              try:
                  return math.isfinite(float(value)) and float(value) > 0.0
              except Exception:
                  return False

          def vector_is_complete(vec):
              return isinstance(vec, list) and len(vec) == DIMENSION and all(is_finite_positive(x) for x in vec)

          def subvector(vec, positions):
              return [vec[i] for i in positions]

          def submatrix(matrix, positions):
              return [[matrix[i][j] for j in positions] for i in positions]

          def rank_gaussian(matrix, tol=1e-14):
              if not matrix:
                  return 0
              a = [list(map(float, row)) for row in matrix]
              m = len(a)
              n = len(a[0]) if m else 0
              rank = 0
              row = 0
              for col in range(n):
                  pivot = None
                  pivot_abs = tol
                  for r in range(row, m):
                      value_abs = abs(a[r][col])
                      if value_abs > pivot_abs:
                          pivot_abs = value_abs
                          pivot = r
                  if pivot is None:
                      continue
                  a[row], a[pivot] = a[pivot], a[row]
                  pivot_value = a[row][col]
                  for c in range(col, n):
                      a[row][c] /= pivot_value
                  for r in range(m):
                      if r != row and abs(a[r][col]) > tol:
                          factor = a[r][col]
                          for c in range(col, n):
                              a[r][c] -= factor * a[row][c]
                  rank += 1
                  row += 1
                  if row == m:
                      break
              return rank

          sample_validation_records = []
          X = []
          weights = []

          for row in SAMPLE_OUTPUT_VECTORS:
              vec = row.get("target_vector_10", [])
              weight = float(row.get("sample_weight", 0.0))
              complete = vector_is_complete(vec)
              sample_validation_records.append({
                  "sample_number": row.get("sample_number", ""),
                  "source_line_number": row.get("source_line_number", ""),
                  "chunk_number": row.get("chunk_number", ""),
                  "sample_weight": weight,
                  "minus_loglike_or_proxy": row.get("minus_loglike_or_proxy", ""),
                  "locked_orientation": row.get("locked_orientation", ""),
                  "target_vector_len": len(vec) if isinstance(vec, list) else "",
                  "target_vector_complete_positive_finite": complete,
                  "weight_positive_finite": is_finite_positive(weight),
                  "accepted_for_covariance_mechanics": complete and is_finite_positive(weight)
              })
              if complete and is_finite_positive(weight):
                  X.append([float(x) for x in vec])
                  weights.append(weight)

          W = sum(weights)
          p = [w / W for w in weights] if W > 0 else []
          weight_square_sum = sum(w * w for w in weights)
          effective_sample_size = (W * W / weight_square_sum) if weight_square_sum > 0 else 0.0

          mu = []
          C = []

          if X and W > 0:
              for j in range(DIMENSION):
                  mu.append(sum(p[i] * X[i][j] for i in range(len(X))))

              for a in range(DIMENSION):
                  row_vals = []
                  for b in range(DIMENSION):
                      value = sum(p[i] * (X[i][a] - mu[a]) * (X[i][b] - mu[b]) for i in range(len(X)))
                      row_vals.append(value)
                  C.append(row_vals)

              C = [[0.5 * (C[i][j] + C[j][i]) for j in range(DIMENSION)] for i in range(DIMENSION)]

          mu5 = subvector(mu, FSIGMA8_POSITIONS) if len(mu) == DIMENSION else []
