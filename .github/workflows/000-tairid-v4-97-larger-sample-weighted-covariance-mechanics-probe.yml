          covariance_diagonal = [C[i][i] for i in range(DIMENSION)] if len(C) == DIMENSION else []
          fsigma8_diagonal = [C[pos][pos] for pos in FSIGMA8_POSITIONS] if len(C) == DIMENSION else []
          full_covariance_rank = rank_gaussian(C) if len(C) == DIMENSION else 0
          fsigma8_covariance_rank = rank_gaussian(C5) if len(C5) == 5 else 0

          covariance_quality_records = [
