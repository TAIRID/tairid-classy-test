              {"rule_id": "fsigma8_subobjects_computed", "pass": len(mu5) == 5 and len(C5) == 5 and all(len(row) == 5 for row in C5), "result": "5-vector and 5x5 fsigma8 subcovariance computed", "boundary": "Subobject mechanics only."},
              {"rule_id": "covariance_quality_checks_pass", "pass": all(row["pass"] for row in covariance_quality_records), "result": f"{sum(1 for row in covariance_quality_records if row['pass'])} of {len(covariance_quality_records)} quality checks passed", "boundary": "Quality checks are not validation."},
