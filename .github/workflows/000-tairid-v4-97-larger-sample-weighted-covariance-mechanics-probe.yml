              {"quality_check": "effective_sample_size", "value": effective_sample_size, "pass": effective_sample_size >= MIN_EFFECTIVE_SAMPLE_SIZE, "boundary": "Diagnostic quality only, not final posterior support"},
              {"quality_check": "mean_vector_dimension", "value": len(mu), "pass": len(mu) == DIMENSION, "boundary": "Full 10-vector mean"},
              {"quality_check": "covariance_dimension", "value": f"{len(C)}x{len(C[0]) if C else 0}", "pass": len(C) == DIMENSION and all(len(row) == DIMENSION for row in C), "boundary": "Full 10x10 mechanics matrix"},
              {"quality_check": "fsigma8_mean_dimension", "value": len(mu5), "pass": len(mu5) == 5, "boundary": "RSD fsigma8 subvector"},
