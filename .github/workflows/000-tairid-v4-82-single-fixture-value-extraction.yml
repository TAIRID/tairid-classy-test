          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This test extracts one bounded Planck fixture packet: exact root, paramnames labels, one chain-row primary input set, and matching `.minimum` sidecar point outputs.")
          md.append("")
          md.append("It does not run CAMB, derive H0/Omega_m/sigma8/fsigma8, import full chains, compute Planck reference uncertainty, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## Fixture packet")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key in ["root", "paramnames_member_name", "chain_member_name", "minimum_member_name", "theta_label", "logA_label", "theta_scaling_status", "logA_to_As_status", "fixture_values_extracted", "fixture_run_allowed_now"]:
              md.append(f"| `{key}` | `{fixture_packet.get(key, '')}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Key boundary")
          md.append("")
          md.append("- Values were extracted for one fixture only.")
          md.append("- Sidecar outputs are point targets, not covariance.")
          md.append("- No CAMB calculation is run in v4.82.")
          md.append("- No Planck reference uncertainty is computed.")
          md.append("- The next clean move is a tiny CAMB fixture run contract.")
          md.append("- No final RSD pressure score yet.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_82_single_fixture_value_extraction.json`")
          md.append("- `tairid_v4_82_single_fixture_value_extraction.md`")
          md.append("- `paramname_label_records_v4_82.csv`")
          md.append("- `chain_input_records_v4_82.csv`")
          md.append("- `sidecar_target_records_v4_82.csv`")
          md.append("- `pre_run_gates_for_tiny_fixture_v4_82.csv`")
          md.append("- `blocked_shortcuts_v4_82.csv`")
          md.append("- `target_redshifts_v4_82.csv`")
          md.append("- `blocked_claims_v4_82.csv`")
          md.append("- `next_route_options_v4_82.csv`")
          md.append("- `rule_results_v4_82.csv`")
          md.append("")

          (OUTDIR / "tairid_v4_82_single_fixture_value_extraction.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
