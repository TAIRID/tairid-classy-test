name: 000 TAIRID v4.82 Single Fixture Value Extraction

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-82-single-fixture-value-extraction.yml"

jobs:
  tairid-v4-82-single-fixture-value-extraction:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.82 single fixture value extraction
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_82_single_fixture_value_extraction

          python - <<'PY'
          import csv
          import hashlib
          import json
          import math
          import re
          import struct
          import urllib.request
          import zlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_82_single_fixture_value_extraction")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_82_single_fixture_value_extraction"

          FULL_GRID_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip"

          # Locked from prior successful ZIP64 central-directory work.
          FULLGRID_CONTENT_LENGTH_EXPECTED = 11805855817
          ZIP64_CENTRAL_DIRECTORY_OFFSET = 11803187830
          ZIP64_CENTRAL_DIRECTORY_SIZE = 2667889

          MAX_RANGE_READ_BYTES = 5_000_000
          MAX_PARAMNAMES_COMPRESSED_BYTES = 100_000
          MAX_MINIMUM_COMPRESSED_BYTES = 300_000
          MAX_CHAIN_COMPRESSED_PREFIX_BYTES = 2_000_000
          MAX_ROWS_PER_CHAIN = 3

          SELECTED_PREFIXES = [
              "base/plikHM_TTTEEE_lowl_lowE/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing/",
              "base/plikHM_TT_lowl_lowE/",
              "base/plikHM_TT_lowl_lowE_lensing/",
              "base/plikHM_TTTEEE_lowl_lowE_BAO/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing_BAO/"
          ]

          PRIMARY_INPUTS = ["omegabh2", "omegach2", "theta", "tau", "logA", "ns"]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          SIDE_CAR_TARGET_NAMES = []
          for row in TARGET_REDSHIFTS:
              SIDE_CAR_TARGET_NAMES.append(row["sigma8z_name"])
              SIDE_CAR_TARGET_NAMES.append(row["fsigma8_name"])

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This does not derive H0, Omega_m, sigma8, sigma8z, or fsigma8z.",
              "This extracts one bounded fixture root: paramnames labels, one bounded chain-row primary input set, and matching .minimum sidecar point outputs.",
              "A pass means one tiny fixture input/target packet exists for a later CAMB fixture run, not that reference uncertainty is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_81_CAMB_single_fixture_input_contract": {
                  "readiness_label": "CAMB_single_fixture_input_contract_passed_ready_for_single_fixture_value_extraction",
                  "camb_import_ok": True,
                  "required_contract_api_available": True,
                  "fixture_values_extracted": False,
                  "fixture_run_completed": False,
                  "solver_cosmology_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_66_chain_row_shape": {
                  "selected_roots": 12,
                  "row_shape_pass": 12,
                  "primary_tracked_values_available": 12,
                  "full_chains_imported": False,
                  "reference_uncertainty_computed": False
              },
              "v4_63_sidecar_fixture_contract": {
                  "calculator_pairs_checked": 110,
                  "calculator_pairs_passed": 110,
                  "sidecars_are_fixtures_not_covariance": True,
                  "reference_uncertainty_computed": False
              }
          }

          PRE_RUN_GATES_FOR_TINY_FIXTURE = [
              {"gate_id": "single_root_selected", "current_pass": False, "needed_next": "Select one root with paramnames, chain row, and .minimum sidecar."},
              {"gate_id": "paramnames_label_verified", "current_pass": False, "needed_next": "Read exact labels for theta and logA."},
              {"gate_id": "single_chain_row_values_extracted", "current_pass": False, "needed_next": "Extract one bounded chain row's primary inputs."},
              {"gate_id": "sidecar_target_values_extracted", "current_pass": False, "needed_next": "Extract sigma8z/fsigma8z sidecar outputs for same root."},
              {"gate_id": "theta_scaling_contract_observed", "current_pass": False, "needed_next": "Record theta label/scaling status for later CAMB mapping."},
              {"gate_id": "logA_to_As_contract_observed", "current_pass": False, "needed_next": "Record logA label/status for later As mapping."},
              {"gate_id": "CAMB_run_allowed", "current_pass": False, "needed_next": "Only allowed in a later workflow after this extraction passes."}
          ]

          BLOCKED_SHORTCUTS = [
              {"shortcut": "run_CAMB_now", "status": "blocked", "reason": "This step extracts values only."},
              {"shortcut": "theta_to_H0_now", "status": "blocked", "reason": "Theta label/scaling is recorded but not converted into H0 here."},
              {"shortcut": "logA_to_sigma8_now", "status": "blocked", "reason": "logA is not sigma8; no transfer/growth calculation is run."},
              {"shortcut": "sidecar_minimum_as_covariance", "status": "blocked", "reason": "Sidecars are point fixtures only."},
              {"shortcut": "single_fixture_packet_equals_reference_uncertainty", "status": "blocked", "reason": "One fixture packet is not posterior covariance."}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "CAMB was used to compute fsigma8.",
              "CAMB produced cosmology outputs.",
              "A CAMB fixture was run.",
              "H0 was derived.",
              "Omega_m was derived.",
              "sigma8 was derived.",
              "fsigma8 was derived.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_83_CAMB_tiny_single_fixture_run",
                  "purpose": "Run one tiny CAMB fixture using the extracted input/target packet.",
                  "why_next": "Only after this value extraction passes should a single fixture calculation be attempted."
              },
              {
                  "priority": 2,
                  "route_id": "v4_83_CAMB_fixture_mapping_repair_if_needed",
                  "purpose": "Repair theta/logA mapping before running if labels or scaling are ambiguous.",
                  "why_next": "Mapping ambiguity must be fixed before a CAMB run."
              },
              {
                  "priority": 3,
                  "route_id": "v4_83_ELG_grid_member_probe",
                  "purpose": "Parallel route: continue parked ELG backlog.",
                  "why_next": "Full eBOSS remains incomplete without ELG handling."
              },
              {
                  "priority": 4,
                  "route_id": "v4_83_WiggleZ_product_locator_followup",
                  "purpose": "Parallel route: continue parked WiggleZ backlog.",
                  "why_next": "WiggleZ remains unresolved."
              }
          ]

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }
              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={"User-Agent": "TAIRID-v4.82-single-fixture-value-extraction/1.0", "Accept": "*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }
              data = b""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.82-single-fixture-value-extraction/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )
                  with urllib.request.urlopen(req, timeout=180) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)
                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, data

          def classify_member(name):
              lower = name.lower()
              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".paramnames"):
                  return "paramnames"
              if re.search(r"_\d+\.txt$", name):
                  return "chain_sample_text_member_prefix_only"
              if lower.endswith(".minimum"):
                  return "minimum"
              if lower.endswith(".bestfit"):
                  return "bestfit"
              if lower.endswith(".likestats"):
                  return "likestats"
              if lower.endswith(".ranges"):
                  return "ranges"
              if lower.endswith(".converge"):
                  return "converge"
              if lower.endswith(".txt"):
                  return "other_text_not_read"
              return "other"

          def parse_zip64_extra(extra_bytes, need_uncompressed, need_compressed, need_local_offset):
              result = {}
              pos = 0
              while pos + 4 <= len(extra_bytes):
                  header_id, data_size = struct.unpack_from("<HH", extra_bytes, pos)
                  data_start = pos + 4
                  data_end = data_start + data_size
                  if data_end > len(extra_bytes):
                      break

                  data = extra_bytes[data_start:data_end]
                  if header_id == 0x0001:
                      subpos = 0
                      if need_uncompressed and subpos + 8 <= len(data):
                          result["uncompressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_compressed and subpos + 8 <= len(data):
                          result["compressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_local_offset and subpos + 8 <= len(data):
                          result["local_header_offset"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                  pos = data_end
              return result

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0
              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break
                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)
                      compression_method = fields[4]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      extra_start = name_end
                      extra_end = extra_start + extra_len
                      comment_end = extra_end + comment_len

                      if comment_end > len(cd_bytes):
                          break

                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")
                      extra = cd_bytes[extra_start:extra_end]

                      zip64_extra = parse_zip64_extra(
                          extra,
                          need_uncompressed=uncompressed_size == 0xFFFFFFFF,
                          need_compressed=compressed_size == 0xFFFFFFFF,
                          need_local_offset=local_header_offset == 0xFFFFFFFF
                      )

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compression_method": compression_method,
                          "compressed_size": zip64_extra.get("compressed_size", compressed_size),
                          "uncompressed_size": zip64_extra.get("uncompressed_size", uncompressed_size),
                          "local_header_offset": zip64_extra.get("local_header_offset", local_header_offset),
                          "zip64_extra_used": bool(zip64_extra)
                      })

                      pos = comment_end
                  except Exception:
                      break
              return records

          def root_from_paramnames(name):
              return name[:-len(".paramnames")] if name.endswith(".paramnames") else name

          def root_from_minimum(name):
              return name[:-len(".minimum")] if name.endswith(".minimum") else name

          def root_from_chain(name):
              match = re.match(r"^(.*)_\d+\.txt$", name)
              return match.group(1) if match else None

          def fetch_member_bytes(member_record, max_member_compressed_bytes):
              offset = int(member_record["local_header_offset"])
              compressed_size = int(member_record["compressed_size"])

              if compressed_size <= 0:
                  raise RuntimeError("compressed_size_not_positive")

              header_record, header_data = range_probe(
                  "local_header_probe",
                  FULL_GRID_URL,
                  f"bytes={offset}-{offset + 4095}",
                  4096
              )

              if not header_record["ok"] or not header_record["server_honored_range"]:
                  raise RuntimeError("local_header_range_not_available")

              if len(header_data) < 30:
                  raise RuntimeError("local_header_too_short")

              if header_data[:4] != b"PK\x03\x04":
                  raise RuntimeError("local_header_signature_not_found")

              fields = struct.unpack_from("<4s5H3L2H", header_data, 0)
              compression_method = fields[3]
              file_name_len = fields[9]
              extra_len = fields[10]
              data_start = offset + 30 + file_name_len + extra_len

              bytes_to_fetch = min(compressed_size, max_member_compressed_bytes)
              data_end = data_start + bytes_to_fetch - 1

              data_record, compressed_data = range_probe(
                  "member_payload_probe",
                  FULL_GRID_URL,
                  f"bytes={data_start}-{data_end}",
                  bytes_to_fetch + 1024
              )

              if not data_record["ok"] or not data_record["server_honored_range"]:
                  raise RuntimeError("member_payload_range_not_available")

              if data_record["truncated_by_guard"]:
                  raise RuntimeError("member_payload_truncated_by_guard")

              if compression_method == 0:
                  payload = compressed_data
              elif compression_method == 8:
                  decompressor = zlib.decompressobj(-15)
                  payload = decompressor.decompress(compressed_data)
              else:
                  raise RuntimeError(f"unsupported_compression_method_{compression_method}")

              return payload, compression_method, data_record

          def parse_paramnames_text(text):
              rows = []
              names = []
              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  parts = line.split(None, 1)
                  name = parts[0]
                  label = parts[1] if len(parts) > 1 else ""
                  rows.append({"name": name, "label": label})
                  names.append(name)
              return rows, names

          def build_column_index(param_names):
              # Chain text assumed: col0 weight, col1 minus loglike, parameters start col2.
              return {name: index + 2 for index, name in enumerate(param_names)}

          def parse_chain_rows_from_text(text, max_rows):
              rows = []
              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  parts = line.split()
                  try:
                      numeric = [float(x) for x in parts]
                  except ValueError:
                      continue
                  rows.append(numeric)
                  if len(rows) >= max_rows:
                      break
              return rows

          def extract_minimum_value(text, name):
              escaped = re.escape(name)
              patterns = [
                  rf"(?im)^\s*{escaped}\b[^\n\r=]*=\s*([-+]?\d+(?:\.\d*)?(?:[eE][-+]?\d+)?|[-+]?\.\d+(?:[eE][-+]?\d+)?)",
                  rf"(?im)^\s*{escaped}\b[^\n\r]*?\s+([-+]?\d+(?:\.\d*)?(?:[eE][-+]?\d+)?|[-+]?\.\d+(?:[eE][-+]?\d+)?)",
                  rf"(?im)\b{escaped}\b[^\n\r]*?([-+]?\d+(?:\.\d*)?(?:[eE][-+]?\d+)?|[-+]?\.\d+(?:[eE][-+]?\d+)?)"
              ]
              for pattern in patterns:
                  match = re.search(pattern, text)
                  if match:
                      try:
                          return True, float(match.group(1)), match.group(0).strip()[:240]
                      except Exception:
                          pass
              return False, None, ""

          def select_fixture_root(manifest_records):
              param_by_root = {}
              minimum_by_root = {}
              chains_by_root = {}

              for row in manifest_records:
                  name = row["member_name"]
                  if not any(name.startswith(prefix) for prefix in SELECTED_PREFIXES):
                      continue

                  if row["member_type"] == "paramnames":
                      param_by_root[root_from_paramnames(name)] = row
                  elif row["member_type"] == "minimum":
                      minimum_by_root[root_from_minimum(name)] = row
                  elif row["member_type"] == "chain_sample_text_member_prefix_only":
                      root = root_from_chain(name)
                      if root:
                          chains_by_root.setdefault(root, []).append(row)

              candidates = []
              for root in sorted(param_by_root):
                  if root in minimum_by_root and root in chains_by_root:
                      candidates.append({
                          "root": root,
                          "paramnames_member": param_by_root[root],
                          "minimum_member": minimum_by_root[root],
                          "chain_member": sorted(chains_by_root[root], key=lambda item: item["member_name"])[0],
                          "chain_member_count": len(chains_by_root[root])
                      })
              return candidates[0] if candidates else None, candidates

          failed_gates = []
          warnings = [
              "single_fixture_value_extraction_only",
              "bounded_range_reads_only",
              "no_CAMB_run",
              "no_solver_cosmology_run",
              "no_full_chain_import",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          head_record = head_probe("full_grid_head", FULL_GRID_URL)
          if not head_record["ok"]:
              failed_gates.append("full_grid_head_probe_failed")

          if head_record.get("content_length") and head_record["content_length"] != FULLGRID_CONTENT_LENGTH_EXPECTED:
              warnings.append("fullgrid_content_length_differs_from_locked_value")

          cd_start = ZIP64_CENTRAL_DIRECTORY_OFFSET
          cd_end = ZIP64_CENTRAL_DIRECTORY_OFFSET + ZIP64_CENTRAL_DIRECTORY_SIZE - 1
          cd_record, cd_data = range_probe(
              "full_grid_locked_zip64_central_directory_fetch",
              FULL_GRID_URL,
              f"bytes={cd_start}-{cd_end}",
              MAX_RANGE_READ_BYTES
          )

          if not cd_record["ok"]:
              failed_gates.append("central_directory_fetch_failed")
          if not cd_record.get("server_honored_range"):
              failed_gates.append("central_directory_range_not_honored")
          if cd_record.get("truncated_by_guard"):
              failed_gates.append("central_directory_truncated_by_guard")

          manifest_records = parse_central_directory(cd_data) if cd_data else []

          if not manifest_records:
              failed_gates.append("central_directory_manifest_records_not_parsed")

          selected_fixture, fixture_candidates = select_fixture_root(manifest_records)

          if selected_fixture is None:
              failed_gates.append("no_fixture_root_with_paramnames_chain_and_minimum")

          paramname_label_records = []
          chain_input_records = []
          sidecar_target_records = []
          fixture_packet = {}
          fixture_root_selected = False
          paramnames_label_verified = False
          single_chain_row_values_extracted = False
          sidecar_target_values_extracted = False
          theta_scaling_observed = False
          logA_contract_observed = False

          if selected_fixture is not None:
              try:
                  fixture_root_selected = True
                  root = selected_fixture["root"]

                  param_payload, param_method, param_payload_record = fetch_member_bytes(
                      selected_fixture["paramnames_member"],
                      MAX_PARAMNAMES_COMPRESSED_BYTES
                  )
                  param_text = param_payload.decode("utf-8", errors="replace")
                  param_rows, param_names = parse_paramnames_text(param_text)
                  column_index = build_column_index(param_names)

                  labels_by_name = {row["name"]: row["label"] for row in param_rows}

                  for name in PRIMARY_INPUTS:
                      paramname_label_records.append({
                          "root": root,
                          "parameter_name": name,
                          "present": name in labels_by_name,
                          "label": labels_by_name.get(name, ""),
                          "chain_column_zero_based": column_index.get(name, ""),
                          "role": "primary_input_for_later_CAMB_fixture"
                      })

                  theta_label = labels_by_name.get("theta", "")
                  logA_label = labels_by_name.get("logA", "")
                  theta_scaling_observed = "theta" in labels_by_name and ("theta" in theta_label.lower() or theta_label.strip() != "")
                  logA_contract_observed = "logA" in labels_by_name and (
                      "10" in logA_label or "a" in logA_label.lower() or logA_label.strip() != ""
                  )
                  paramnames_label_verified = all(name in labels_by_name for name in PRIMARY_INPUTS)

                  chain_payload, chain_method, chain_payload_record = fetch_member_bytes(
                      selected_fixture["chain_member"],
                      MAX_CHAIN_COMPRESSED_PREFIX_BYTES
                  )
                  chain_text = chain_payload.decode("utf-8", errors="replace")
                  parsed_rows = parse_chain_rows_from_text(chain_text, MAX_ROWS_PER_CHAIN)

                  expected_column_count = len(param_names) + 2
                  valid_rows = [row for row in parsed_rows if len(row) == expected_column_count]

                  if not valid_rows:
                      raise RuntimeError("no_valid_chain_rows_matching_expected_column_count")

                  selected_row = valid_rows[0]

                  for name in PRIMARY_INPUTS:
                      col = column_index.get(name)
                      value = selected_row[col] if col is not None and col < len(selected_row) else None
                      chain_input_records.append({
                          "root": root,
                          "chain_member_name": selected_fixture["chain_member"]["member_name"],
                          "row_index_in_probe": 0,
                          "parameter_name": name,
                          "chain_column_zero_based": col if col is not None else "",
                          "value": value if value is not None else "",
                          "label": labels_by_name.get(name, ""),
                          "source_status": "bounded_chain_prefix_single_fixture_input"
                      })

                  single_chain_row_values_extracted = all(
                      any(rec["parameter_name"] == name and rec["value"] != "" for rec in chain_input_records)
                      for name in PRIMARY_INPUTS
                  )

                  minimum_payload, minimum_method, minimum_payload_record = fetch_member_bytes(
                      selected_fixture["minimum_member"],
                      MAX_MINIMUM_COMPRESSED_BYTES
                  )
                  minimum_text = minimum_payload.decode("utf-8", errors="replace")

                  for target_name in SIDE_CAR_TARGET_NAMES:
                      found, value, evidence_line = extract_minimum_value(minimum_text, target_name)
                      sidecar_target_records.append({
                          "root": root,
                          "minimum_member_name": selected_fixture["minimum_member"]["member_name"],
                          "target_name": target_name,
                          "found": found,
                          "value": value if found else "",
                          "evidence_line": evidence_line,
                          "source_status": "sidecar_point_fixture_not_covariance"
                      })

                  sidecar_target_values_extracted = all(row["found"] for row in sidecar_target_records)

                  fixture_packet = {
                      "root": root,
                      "paramnames_member_name": selected_fixture["paramnames_member"]["member_name"],
                      "chain_member_name": selected_fixture["chain_member"]["member_name"],
                      "minimum_member_name": selected_fixture["minimum_member"]["member_name"],
                      "chain_member_count_for_root": selected_fixture["chain_member_count"],
                      "parameter_count": len(param_names),
                      "expected_chain_column_count": expected_column_count,
                      "parsed_chain_rows_in_probe": len(parsed_rows),
                      "valid_chain_rows_in_probe": len(valid_rows),
                      "theta_label": theta_label,
                      "logA_label": logA_label,
                      "theta_scaling_status": "observed_label_requires_later_mapping_validation" if theta_scaling_observed else "not_verified",
                      "logA_to_As_status": "observed_label_requires_later_mapping_validation" if logA_contract_observed else "not_verified",
                      "fixture_run_allowed_now": False,
                      "fixture_values_extracted": single_chain_row_values_extracted and sidecar_target_values_extracted,
                      "sidecar_targets_are_covariance": False,
                      "solver_cosmology_run": False
                  }

              except Exception as exc:
                  failed_gates.append("fixture_value_extraction_exception")
                  fixture_packet = {
                      "root": selected_fixture.get("root", "") if selected_fixture else "",
                      "error": f"{type(exc).__name__}: {exc}",
                      "fixture_run_allowed_now": False,
                      "fixture_values_extracted": False,
                      "sidecar_targets_are_covariance": False,
                      "solver_cosmology_run": False
                  }

          # Update gates after extraction attempt.
          for gate in PRE_RUN_GATES_FOR_TINY_FIXTURE:
              if gate["gate_id"] == "single_root_selected":
                  gate["current_pass"] = fixture_root_selected
              elif gate["gate_id"] == "paramnames_label_verified":
                  gate["current_pass"] = paramnames_label_verified
              elif gate["gate_id"] == "single_chain_row_values_extracted":
                  gate["current_pass"] = single_chain_row_values_extracted
              elif gate["gate_id"] == "sidecar_target_values_extracted":
                  gate["current_pass"] = sidecar_target_values_extracted
              elif gate["gate_id"] == "theta_scaling_contract_observed":
                  gate["current_pass"] = theta_scaling_observed
              elif gate["gate_id"] == "logA_to_As_contract_observed":
                  gate["current_pass"] = logA_contract_observed
              elif gate["gate_id"] == "CAMB_run_allowed":
                  gate["current_pass"] = False

          if UPSTREAM_LOCKS["v4_81_CAMB_single_fixture_input_contract"]["fixture_run_completed"] is not False:
              failed_gates.append("v4_81_fixture_run_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_81_CAMB_single_fixture_input_contract"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("v4_81_reference_uncertainty_boundary_not_carried")

          if not fixture_root_selected:
              failed_gates.append("single_root_not_selected")

          if not paramnames_label_verified:
              failed_gates.append("paramnames_labels_not_verified")

          if not single_chain_row_values_extracted:
              failed_gates.append("single_chain_row_values_not_extracted")

          if not sidecar_target_values_extracted:
              failed_gates.append("sidecar_target_values_not_extracted")

          if not theta_scaling_observed:
              failed_gates.append("theta_scaling_status_not_observed")

          if not logA_contract_observed:
              failed_gates.append("logA_contract_status_not_observed")

          if any(row["status"] != "blocked" for row in BLOCKED_SHORTCUTS):
              failed_gates.append("not_all_shortcuts_blocked")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          if fixture_packet.get("fixture_run_allowed_now") is not False:
              failed_gates.append("fixture_run_allowed_too_early")

          if fixture_packet.get("sidecar_targets_are_covariance") is not False:
              failed_gates.append("sidecar_targets_marked_covariance_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "planck reference uncertainty is computed",
              "camb was used to compute fsigma8",
              "a camb fixture was run",
              "full planck chains were imported",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "single_fixture_value_extraction_passed_ready_for_CAMB_tiny_single_fixture_run_contract"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_fixture_contract_carried",
                  "pass": UPSTREAM_LOCKS["v4_81_CAMB_single_fixture_input_contract"]["fixture_run_completed"] is False,
                  "result": "v4.81 did not run CAMB and handed off to value extraction",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "central_directory_available",
                  "pass": bool(manifest_records),
                  "result": f"{len(manifest_records)} manifest records parsed",
                  "boundary": "Central directory only, not fullGrid download."
              },
              {
                  "rule_id": "single_root_selected",
                  "pass": fixture_root_selected,
                  "result": fixture_packet.get("root", ""),
                  "boundary": "One fixture root only."
              },
              {
                  "rule_id": "paramnames_labels_verified",
                  "pass": paramnames_label_verified,
                  "result": f"{len(paramname_label_records)} primary labels recorded",
                  "boundary": "Labels only; no conversion."
              },
              {
                  "rule_id": "single_chain_row_primary_values_extracted",
                  "pass": single_chain_row_values_extracted,
                  "result": f"{len(chain_input_records)} primary input values recorded",
                  "boundary": "Bounded chain prefix only."
              },
              {
                  "rule_id": "sidecar_fixture_targets_extracted",
                  "pass": sidecar_target_values_extracted,
                  "result": f"{sum(1 for row in sidecar_target_records if row['found'])} sidecar target values found",
                  "boundary": "Sidecar point fixtures only, not covariance."
              },
              {
                  "rule_id": "theta_and_logA_status_observed",
                  "pass": theta_scaling_observed and logA_contract_observed,
                  "result": f"theta_status={fixture_packet.get('theta_scaling_status', '')}; logA_status={fixture_packet.get('logA_to_As_status', '')}",
                  "boundary": "Observed labels do not authorize fake conversion."
              },
              {
                  "rule_id": "fixture_run_still_blocked",
                  "pass": fixture_packet.get("fixture_run_allowed_now") is False,
                  "result": "fixture run remains blocked until next workflow",
                  "boundary": "No CAMB run in v4.82."
              },
              {
                  "rule_id": "blocked_shortcuts_preserved",
                  "pass": all(row["status"] == "blocked" for row in BLOCKED_SHORTCUTS),
                  "result": f"{len(BLOCKED_SHORTCUTS)} blocked shortcuts preserved",
                  "boundary": "No fake parameter conversion."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "No fsigma8 calculation."
              },
              {
                  "rule_id": "next_route_options_declared",
                  "pass": len(NEXT_ROUTE_OPTIONS) >= 4,
                  "result": f"{len(NEXT_ROUTE_OPTIONS)} next route options declared",
                  "boundary": "Future work only."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 17,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Single fixture value extraction only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_82_rules_passed")

          if failed_gates:
              readiness_label = "single_fixture_value_extraction_failed"
              next_allowed_step = "Repair fixture value extraction before any CAMB tiny fixture run."
          else:
              readiness_label = "single_fixture_value_extraction_passed_ready_for_CAMB_tiny_single_fixture_run_contract"
              next_allowed_step = (
                  "Proceed to v4.83 CAMB tiny single fixture run contract. Do not compute Planck reference uncertainty "
                  "or final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "head_ok": head_record["ok"],
              "head_content_length": head_record.get("content_length"),
              "central_directory_bytes_read": cd_record.get("bytes_read"),
              "manifest_member_count": len(manifest_records),
              "fixture_candidate_count": len(fixture_candidates),
              "fixture_root_selected": fixture_root_selected,
              "selected_root": fixture_packet.get("root", ""),
              "paramnames_label_record_count": len(paramname_label_records),
              "chain_input_record_count": len(chain_input_records),
              "sidecar_target_record_count": len(sidecar_target_records),
              "sidecar_targets_found_count": sum(1 for row in sidecar_target_records if row.get("found")),
              "paramnames_label_verified": paramnames_label_verified,
              "single_chain_row_values_extracted": single_chain_row_values_extracted,
              "sidecar_target_values_extracted": sidecar_target_values_extracted,
              "theta_scaling_observed": theta_scaling_observed,
              "logA_contract_observed": logA_contract_observed,
              "fixture_values_extracted": fixture_packet.get("fixture_values_extracted", False),
              "fixture_run_allowed_now": fixture_packet.get("fixture_run_allowed_now", False),
              "solver_cosmology_run": False,
              "H0_derived": False,
              "Omega_m_derived": False,
              "sigma8_derived": False,
              "fsigma8_derived": False,
              "external_reference_imported": False,
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "source_url": FULL_GRID_URL,
              "v4_locked_offsets": {
                  "content_length_expected": FULLGRID_CONTENT_LENGTH_EXPECTED,
                  "central_directory_offset": ZIP64_CENTRAL_DIRECTORY_OFFSET,
                  "central_directory_size": ZIP64_CENTRAL_DIRECTORY_SIZE
              },
              "selected_prefixes": SELECTED_PREFIXES,
              "target_redshifts": TARGET_REDSHIFTS,
              "primary_inputs": PRIMARY_INPUTS,
              "sidecar_target_names": SIDE_CAR_TARGET_NAMES,
              "head_record": head_record,
              "central_directory_range_record": cd_record,
              "fixture_packet": fixture_packet,
              "paramname_label_records": paramname_label_records,
              "chain_input_records": chain_input_records,
              "sidecar_target_records": sidecar_target_records,
              "pre_run_gates_for_tiny_fixture": PRE_RUN_GATES_FOR_TINY_FIXTURE,
              "blocked_shortcuts": BLOCKED_SHORTCUTS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "fixture_values_extracted": fixture_packet.get("fixture_values_extracted", False),
                  "fixture_run_allowed_now": False,
                  "solver_cosmology_run": False,
                  "H0_derived": False,
                  "Omega_m_derived": False,
                  "sigma8_derived": False,
                  "fsigma8_derived": False,
                  "external_reference_imported": False,
                  "Planck_reference_uncertainty_computed": False,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "full_chain_sample_files_parsed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_82_single_fixture_value_extraction.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "paramname_label_records_v4_82.csv",
              paramname_label_records,
              ["root", "parameter_name", "present", "label", "chain_column_zero_based", "role"]
          )

          write_csv(
              OUTDIR / "chain_input_records_v4_82.csv",
              chain_input_records,
              ["root", "chain_member_name", "row_index_in_probe", "parameter_name", "chain_column_zero_based", "value", "label", "source_status"]
          )

