              {"gate": "inherited_v4_273_rows_equal_10", "passed": len(inherited_v4_273_rows) == 10, "detail": f"inherited_v4_273_rows = {len(inherited_v4_273_rows)}"},
              {"gate": "manifest_status_rows_at_least_1", "passed": len(manifest_status_rows) >= 1, "detail": f"manifest_status_rows = {len(manifest_status_rows)}"},
              {"gate": "qso_packet_rows_equal_7", "passed": len(qso_zhao_packet_rows) == 7, "detail": f"qso_zhao_packet_rows = {len(qso_zhao_packet_rows)}"},
              {"gate": "prior_registry_rows_equal_3", "passed": len(prior_registry_rows) == 3, "detail": f"prior_registry_rows = {len(prior_registry_rows)}"},
