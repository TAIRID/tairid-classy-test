              {"gate": "gap_locator_route_recommended", "passed": any(row["route"] == "lrg_elg_equivalent_residual_packet_gap_locator_with_scope_guards" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "v4.275 route recommended"},
              {"gate": "source_comparison_not_activated", "passed": any(row["test_id"] == "v4_275_source_comparison_residual_guard" and row["activated"] is False for row in next_rows), "detail": "source comparison not activated"},
