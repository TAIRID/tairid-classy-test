              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "permission_rows_equal_10", "passed": len(permission_rows) == 10, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "sdr_reduction_rows_equal_5", "passed": len(sdr_reduction_rows) == 5, "detail": f"sdr_reduction_rows = {len(sdr_reduction_rows)}"},
              {"gate": "qso_lane_ready", "passed": any(row["source_lane"] == "QSO" and row["diagnostic_scalar_status"] == "computed_no_evidence" for row in lane_inventory_rows), "detail": "QSO lane ready as diagnostic template"},
              {"gate": "lrg_lane_blocked_until_packet", "passed": any(row["source_lane"] == "LRG" and row["comparison_permission"] == "blocked_until_equivalent_packet" for row in lane_inventory_rows), "detail": "LRG lane blocked until equivalent packet"},
              {"gate": "elg_lane_blocked_until_packet", "passed": any(row["source_lane"] == "ELG" and row["comparison_permission"] == "blocked_until_equivalent_packet" for row in lane_inventory_rows), "detail": "ELG lane blocked until equivalent packet"},
              {"gate": "combined_lane_blocked", "passed": any(row["source_lane"] == "combined_LRG_ELG_QSO" and row["comparison_permission"] == "blocked_until_source_separated_packets_exist" for row in lane_inventory_rows), "detail": "combined lane blocked"},
              {"gate": "prior_registry_not_equivalent", "passed": all(row["equivalence_status"] != "equivalent" for row in prior_registry_rows), "detail": "prior registry rows not treated as equivalent"},
              {"gate": "all_source_separation_guards_active", "passed": all(row["status"] == "active" for row in source_separation_guard_rows), "detail": "source separation guards active"},
