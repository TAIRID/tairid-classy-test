              {"gate": "related_fetch_row_recorded", "passed": isinstance(related_fetch_row, dict), "detail": f"related_fetch_ok = {related_fetch_row['fetch_ok']}"},
              {"gate": "dr16_fetch_row_recorded", "passed": isinstance(dr16_fetch_row, dict), "detail": f"dr16_fetch_ok = {dr16_fetch_row['fetch_ok']}"},
