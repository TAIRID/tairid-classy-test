name: 001 TAIRID v4.302 - SDSS RSD Manual Answer Gate Decision Recheck No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-302-sdss-rsd-manual-answer-gate-decision-recheck-no-scoring.yml"
      - ".github/workflows/sdss_rsd_manual_answers_v4_300.csv"
      - "github/workflows/sdss_rsd_manual_answers_v4_300.csv"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-manual-answer-gate-decision-recheck-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.302 SDSS RSD Manual Answer Gate Decision Recheck No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.302 SDSS RSD manual answer gate decision recheck no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import re
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.302"
          ROUTE = "sdss_rsd_manual_answer_gate_decision_recheck_no_scoring_after_v4_301"
          EXPECTED_RESULT = "v4_302_sdss_rsd_manual_answer_gate_decision_recheck_no_scoring_passed_no_gate_approval_no_claims"
          SELECTED_NEXT_ROUTE = "v4_303_sdss_rsd_manual_answer_fill_guide_and_source_quote_pack_no_scoring"

          OUT = Path("tairid_v4_302_sdss_rsd_manual_answer_gate_decision_recheck_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-302-sdss-rsd-manual-answer-gate-decision-recheck-output.zip"
          SOURCE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/"
          RELATED_PAGE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          DR16_URL = "https://www.sdss4.org/dr16/"
          MAX_BYTES = 2_000_000

          # v4.302 deliberately adds the workflow-folder fallback because the CSV was likely uploaded there.
          MANUAL_ANSWER_CANDIDATE_PATHS = [
              ".github/workflows/sdss_rsd_manual_answers_v4_300.csv",
              ".github/workflows/data/sdss_rsd_manual_answers_v4_300.csv",
              "github/workflows/sdss_rsd_manual_answers_v4_300.csv",
              "github/workflows/data/sdss_rsd_manual_answers_v4_300.csv",
              "data/sdss_rsd_manual_answers_v4_300.csv",
              "data/manual/sdss_rsd_manual_answers_v4_300.csv",
              "SDSS_RSD_MANUAL_ANSWERS_v4_300.csv",
              "sdss_rsd_manual_answers_v4_300.csv",
              "data_sdss_rsd_manual_answers_v4_300.csv",
              "results/sdss_rsd_manual_answers_v4_300.csv",
              "artifacts/sdss_rsd_manual_answers_v4_300.csv",
          ]

          REQUIRED_FIELDS = [
              "answer_id",
              "target_id",
              "source_url_or_citation",
              "quoted_or_precise_source_text",
              "answer_summary",
              "approval_request",
              "claim_limit",
          ]

          ALLOWED_APPROVAL_REQUESTS = {
              "row_meaning_confirm",
              "baseline_candidate",
              "definition_match",
              "reject",
              "keep_blocked",
          }

          ALLOWED_CLAIM_LIMITS = {
              "no_scoring",
              "no_claims",
              "no_scoring/no_claims",
              "keep_blocked",
          }

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=MAX_BYTES, timeout=15):
              out = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.302-manual-answer-gate-recheck-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      out["status_code"] = getattr(resp, "status", "")
                      out["content_type"] = resp.headers.get("Content-Type", "")
                      out["content_length_header"] = resp.headers.get("Content-Length", "")
                      out["final_url"] = resp.geturl()
                      out["bytes_read"] = len(data)
                      out["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      out["fetch_ok"] = True
              except Exception as exc:
                  out["error"] = f"{type(exc).__name__}: {exc}"
              return out, data

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              try:
                  fields["z_eff"] = float(fields["z_eff_text"])
              except Exception:
                  fields["z_eff"] = ""
              return fields

          def parse_column_contract_rows(tables):
              out = []
              for table_idx, table in enumerate(tables):
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      row_type = "redshift_function_row_candidate" if "(z)" in label_norm else "final_or_consensus_row_candidate"
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for value, sigma in measurement_pairs(cell):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              out.append({
                                  "contract_id": f"column_contract_bound_{len(out)+1:02d}",
                                  "bound_id": f"bound_{len(out)+1:02d}",
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "z_eff": fields["z_eff"],
                                  "z_range_text": fields["z_range_text"],
                                  "observable": "f_sigma8",
                                  "observed_value": value,
                                  "observed_sigma": sigma,
                                  "score_allowed": False,
                                  "contract_status": "rebuilt_for_manual_answer_gate_recheck_no_scoring",
                              })
              return out

          def norm(value):
              return str(value or "").strip()

          def read_manual_answer_file():
              search_rows = []
              found_path = ""
              answer_rows = []
              fieldnames = []
              for raw_path in MANUAL_ANSWER_CANDIDATE_PATHS:
                  path = Path(raw_path)
                  exists = path.exists()
                  row = {
                      "candidate_path": raw_path,
                      "exists": exists,
                      "read_attempted": exists,
                      "read_ok": False,
                      "row_count": 0,
                      "field_count": 0,
                      "csv_location_type": "workflow_folder" if raw_path.startswith(".github/workflows") or raw_path.startswith("github/workflows") else "regular_data_or_root",
                      "error": "",
                  }
                  if exists and not found_path:
                      try:
                          with path.open("r", encoding="utf-8-sig", newline="") as f:
                              reader = csv.DictReader(f)
                              fieldnames = reader.fieldnames or []
                              answer_rows = list(reader)
                          row["read_ok"] = True
                          row["row_count"] = len(answer_rows)
                          row["field_count"] = len(fieldnames)
                          found_path = raw_path
                      except Exception as exc:
                          row["error"] = f"{type(exc).__name__}: {exc}"
                  search_rows.append(row)
              return found_path, fieldnames, answer_rows, search_rows

          def review_answer(row, idx):
              missing = [field for field in REQUIRED_FIELDS if not norm(row.get(field))]
              approval_request = norm(row.get("approval_request")).lower()
              claim_limit = norm(row.get("claim_limit")).lower()
              source = norm(row.get("source_url_or_citation"))
              precise_text = norm(row.get("quoted_or_precise_source_text"))
              answer_summary = norm(row.get("answer_summary"))
              allowed_request = approval_request in ALLOWED_APPROVAL_REQUESTS
              claim_limit_ok = claim_limit in ALLOWED_CLAIM_LIMITS
              has_source = bool(source)
              has_precise_text = len(precise_text) >= 12
              has_summary = len(answer_summary) >= 8
              is_blank_template_row = not has_source and not has_precise_text and not has_summary
              if missing:
                  review_status = "incomplete_missing_required_fields"
              elif not allowed_request:
                  review_status = "invalid_approval_request"
              elif not claim_limit_ok:
                  review_status = "invalid_claim_limit"
              elif not has_source or not has_precise_text or not has_summary:
                  review_status = "incomplete_source_text_or_summary"
              else:
                  review_status = "reviewable_for_future_gate_not_approved"
              return {
                  "manual_review_id": f"manual_review_{idx+1:03d}",
                  "answer_id": norm(row.get("answer_id")),
                  "target_id": norm(row.get("target_id")),
                  "target_class": norm(row.get("target_class")),
                  "target_object": norm(row.get("target_object")),
                  "source_url_or_citation": source,
                  "quoted_or_precise_source_text": precise_text[:300],
                  "answer_summary": answer_summary[:300],
                  "approval_request": approval_request,
                  "claim_limit": claim_limit,
                  "missing_required_fields": "|".join(missing),
                  "approval_request_allowed": allowed_request,
                  "claim_limit_ok": claim_limit_ok,
                  "has_source": has_source,
                  "has_precise_text": has_precise_text,
                  "has_summary": has_summary,
                  "is_blank_template_row": is_blank_template_row,
                  "review_status": review_status,
                  "row_meaning_confirmed": False,
                  "baseline_approved": False,
                  "definition_match_confirmed": False,
                  "row_family_selected": False,
                  "score_allowed": False,
                  "support_allowed": False,
              }

          inherited_v4_301_rows = [
              {"inherited_from": "v4.301", "item": "rules", "value": "48 / 48 passed", "meaning": "Manual answer file ingest review passed safely.", "carry_forward_status": "ready_for_recheck"},
              {"inherited_from": "v4.301", "item": "manual_answer_file_found", "value": False, "meaning": "The preferred/root/data paths did not find the CSV.", "carry_forward_status": "fallback_needed"},
              {"inherited_from": "v4.301", "item": "manual_answer_rows", "value": 0, "meaning": "No manual answer rows loaded.", "carry_forward_status": "fallback_needed"},
              {"inherited_from": "v4.301", "item": "gate_approval_rows", "value": 0, "meaning": "No gate approval.", "carry_forward_status": "no_approval"},
              {"inherited_from": "v4.301", "item": "row_meaning_confirmed", "value": False, "meaning": "Row meaning not confirmed.", "carry_forward_status": "row_meaning_missing"},
              {"inherited_from": "v4.301", "item": "approved_baseline_values", "value": 0, "meaning": "No baseline value approved.", "carry_forward_status": "baseline_missing"},
              {"inherited_from": "v4.301", "item": "support_allowed", "value": False, "meaning": "Support blocked.", "carry_forward_status": "support_blocked"},
              {"inherited_from": "v4.301", "item": "selected_next_route", "value": "v4_302_sdss_rsd_manual_answer_gate_decision_recheck_no_scoring", "meaning": "Current route rechecks with workflow-folder fallback.", "carry_forward_status": "current_route"},
          ]

          source_fetch_row, source_data = fetch_url(SOURCE_URL)
          related_fetch_row, related_data = fetch_url(RELATED_PAGE_URL)
          dr16_fetch_row, dr16_data = fetch_url(DR16_URL)

          parser = SimpleTableParser()
          if source_data:
              parser.feed(source_data.decode("utf-8", errors="replace"))
          column_contract_rows = parse_column_contract_rows(parser.tables)

          manual_answer_file_path, manual_answer_fieldnames, manual_answer_rows, manual_answer_search_rows = read_manual_answer_file()

          schema_review_rows = []
          field_set = set(manual_answer_fieldnames or [])
          for field in REQUIRED_FIELDS:
              schema_review_rows.append({
                  "field": field,
                  "required": True,
                  "present": field in field_set,
                  "schema_status": "present" if field in field_set else ("missing" if manual_answer_file_path else "no_manual_answer_file"),
              })

          manual_answer_review_rows = [review_answer(row, idx) for idx, row in enumerate(manual_answer_rows)]

          reviewable_rows = [row for row in manual_answer_review_rows if row["review_status"] == "reviewable_for_future_gate_not_approved"]
          blank_rows = [row for row in manual_answer_review_rows if row["is_blank_template_row"]]
          incomplete_rows = [row for row in manual_answer_review_rows if row["review_status"].startswith("incomplete")]
          invalid_rows = [row for row in manual_answer_review_rows if row["review_status"].startswith("invalid")]

          misplaced_workflow_folder_file_detected = bool(manual_answer_file_path.startswith(".github/workflows") or manual_answer_file_path.startswith("github/workflows"))

          gate_decision_rows = [
              {"gate_id": "gate_001", "gate_object": "manual_answer_file_found", "gate_passed": bool(manual_answer_file_path), "gate_status": "found" if manual_answer_file_path else "missing", "reason": manual_answer_file_path or "No file found even with workflow-folder fallback."},
              {"gate_id": "gate_002", "gate_object": "schema_complete", "gate_passed": bool(manual_answer_file_path and all(row["present"] for row in schema_review_rows)), "gate_status": "complete" if manual_answer_file_path and all(row["present"] for row in schema_review_rows) else "incomplete_or_missing", "reason": "Required fields present only if all schema rows pass."},
              {"gate_id": "gate_003", "gate_object": "manual_answers_reviewable", "gate_passed": len(reviewable_rows) > 0, "gate_status": "reviewable_rows_present" if reviewable_rows else "no_reviewable_rows", "reason": "Blank template rows are not reviewable answers."},
              {"gate_id": "gate_004", "gate_object": "row_meaning_confirmation", "gate_passed": False, "gate_status": "not_confirmed", "reason": "Recheck can locate/review the file but does not confirm row meaning."},
              {"gate_id": "gate_005", "gate_object": "baseline_approval", "gate_passed": False, "gate_status": "not_approved", "reason": "Recheck can locate/review the file but does not approve baselines."},
              {"gate_id": "gate_006", "gate_object": "definition_match_confirmation", "gate_passed": False, "gate_status": "not_confirmed", "reason": "Recheck can locate/review the file but does not approve definition matches."},
              {"gate_id": "gate_007", "gate_object": "diagonal_diagnostic_readiness", "gate_passed": False, "gate_status": "not_ready", "reason": "No scoring readiness without approved gates."},
          ]

          location_diagnosis_rows = [
              {
                  "diagnosis_id": "location_001",
                  "manual_answer_file_found": bool(manual_answer_file_path),
                  "manual_answer_file_path": manual_answer_file_path,
                  "misplaced_workflow_folder_file_detected": misplaced_workflow_folder_file_detected,
                  "recommended_clean_location": "data/sdss_rsd_manual_answers_v4_300.csv",
                  "meaning": "Workflow-folder CSV is accepted as fallback for now, but data/ is cleaner later." if misplaced_workflow_folder_file_detected else "File location is acceptable or file missing.",
              }
          ]

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "confirm_row_meaning_now", "reason": "v4.302 is still no-approval/no-scoring", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "approve_baseline_values_now", "reason": "blank or unreviewed answers cannot approve baselines", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "select_row_family_now", "reason": "row meaning is not confirmed", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "confirm_definition_match_now", "reason": "definition match not approved", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "run_diagonal_diagnostic_now", "reason": "diagnostic readiness is false", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "compute_residual_or_chi_square", "reason": "no approved baseline and no selected row family", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "compute_p_value_or_likelihood", "reason": "full covariance missing", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "claim_tairid_support", "reason": "same-family no-support ceiling", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "claim_evidence_or_validation", "reason": "no score and no holdout", "blocked": True},
              {"blocked_id": "blocked_010", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_011", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "workflow_folder_fallback", "permission_status": "active", "reason": "v4.302 searches .github/workflows for the CSV because that is where it may have been uploaded."},
              {"permission_scope": "manual_answer_gate_decision_recheck", "permission_status": "completed_no_gate_approval", "reason": "Recheck completed without approving gates."},
              {"permission_scope": "manual_answer_fill_guide", "permission_status": "allowed_next", "reason": "Next workflow can help fill exact source-answer rows without scoring."},
              {"permission_scope": "row_meaning_confirmation", "permission_status": "blocked", "reason": "No approval in this workflow."},
              {"permission_scope": "baseline_approval", "permission_status": "blocked", "reason": "No approval in this workflow."},
              {"permission_scope": "diagonal_diagnostic_score", "permission_status": "blocked", "reason": "Readiness still fails."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
              {"permission_scope": "validation_or_evidence_claim", "permission_status": "blocked", "reason": "No validation/evidence allowed."},
          ]

          readiness_rows = [
              {"readiness_id": "ready_001", "object": "manual_answer_file", "status": "found" if manual_answer_file_path else "missing", "meaning": manual_answer_file_path or "No file found."},
              {"readiness_id": "ready_002", "object": "manual_answer_rows", "status": str(len(manual_answer_rows)), "meaning": "Rows loaded from manual answer file."},
              {"readiness_id": "ready_003", "object": "reviewable_rows", "status": str(len(reviewable_rows)), "meaning": "Rows with filled source/text/summary and valid request/claim limit."},
              {"readiness_id": "ready_004", "object": "blank_template_rows", "status": str(len(blank_rows)), "meaning": "Rows that still look like unfilled template rows."},
              {"readiness_id": "ready_005", "object": "manual_answer_fill_guide", "status": "ready_next", "meaning": "Next workflow can make filling the file easier."},
              {"readiness_id": "ready_006", "object": "external_scoring", "status": "blocked", "meaning": "Still not allowed."},
          ]

          decision_rows = [
              {"decision_id": "decision_001", "decision": "v4.302 rechecks the manual answer file with workflow-folder fallback.", "basis": "v4.301 did not find the CSV in its earlier path list.", "next_action": "Classify file location and row completeness.", "claim_status": "location_recheck"},
              {"decision_id": "decision_002", "decision": "Finding the CSV is not the same as approving gates.", "basis": "Blank template rows remain incomplete and reviewable rows remain not approved.", "next_action": "Keep all gate approvals blocked.", "claim_status": "no_gate_approval"},
              {"decision_id": "decision_003", "decision": "The next useful move is a fill guide/source quote pack.", "basis": "The file exists or remains locatable; the missing content is exact source answers.", "next_action": SELECTED_NEXT_ROUTE, "claim_status": "safe_to_continue"},
          ]

          route_review_rows = [
              {"route_id": "route_001", "route": "sdss_rsd_manual_answer_fill_guide_and_source_quote_pack_no_scoring", "permission_status": "recommended", "reason": "Need source-backed answer rows before any gate can pass."},
              {"route_id": "route_002", "route": "sdss_rsd_diagonal_diagnostic_score", "permission_status": "blocked_until_gate_decision_and_readiness", "reason": "No gate approval in v4.302."},
