name: 001 TAIRID v4.293 - SDSS RSD Candidate Baseline Review And Row Meaning Gate No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-293-sdss-rsd-candidate-baseline-review-and-row-meaning-gate-no-scoring.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-candidate-baseline-review-row-meaning-gate-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.293 SDSS RSD Candidate Baseline Review And Row Meaning Gate No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.293 SDSS RSD candidate baseline review and row meaning gate no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import html
          import re
          import urllib.parse
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.293"
          ROUTE = "sdss_rsd_candidate_baseline_review_and_row_meaning_gate_no_scoring_after_v4_292"
          EXPECTED_RESULT = "v4_293_sdss_rsd_candidate_baseline_review_and_row_meaning_gate_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_294_sdss_rsd_row_family_selection_and_covariance_policy_no_scoring"

          OUT = Path("tairid_v4_293_sdss_rsd_candidate_baseline_review_row_meaning_gate_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-293-sdss-rsd-candidate-baseline-review-row-meaning-gate-output.zip"
          SOURCE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/"
          RELATED_PAGE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          DR16_URL = "https://www.sdss4.org/dr16/"
          MAX_BYTES = 2_000_000

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
                  self.in_a = False
                  self.current_href = ""
                  self.current_text = []

              def handle_starttag(self, tag, attrs):
                  if tag.lower() == "a":
                      attrs = dict(attrs)
                      self.in_a = True
                      self.current_href = attrs.get("href", "")
                      self.current_text = []

              def handle_data(self, data):
                  if self.in_a:
                      self.current_text.append(data)

              def handle_endtag(self, tag):
                  if tag.lower() == "a" and self.in_a:
                      text = " ".join(" ".join(self.current_text).split())
                      self.links.append({"href": self.current_href, "text": text})
                      self.in_a = False
                      self.current_href = ""
                      self.current_text = []

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=MAX_BYTES, timeout=15):
              out = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.293-candidate-review-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      out["status_code"] = getattr(resp, "status", "")
                      out["content_type"] = resp.headers.get("Content-Type", "")
                      out["content_length_header"] = resp.headers.get("Content-Length", "")
                      out["final_url"] = resp.geturl()
                      out["bytes_read"] = len(data)
                      out["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      out["fetch_ok"] = True
              except Exception as exc:
                  out["error"] = f"{type(exc).__name__}: {exc}"
              return out, data

          def strip_html_text(data):
              if not data:
                  return ""
              text = data.decode("utf-8", errors="replace")
              text = re.sub(r"<script.*?</script>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<[^>]+>", " ", text)
              return html.unescape(" ".join(text.split()))

          def extract_candidate_links(base_url, data):
              if not data:
                  return []
              parser = LinkParser()
              parser.feed(data.decode("utf-8", errors="replace"))
              rows = []
              keywords = ["bao", "rsd", "eboss", "final", "measurement", "cosmo", "cosmology", "paper", "arxiv", "doi", "table", "data", "zhao", "alam", "growth"]
              seen = set()
              for link in parser.links:
                  href = link["href"].strip()
                  if not href:
                      continue
                  url = urllib.parse.urljoin(base_url, href).split("#")[0]
                  if url in seen:
                      continue
                  seen.add(url)
                  hay = (url + " " + link["text"]).lower()
                  if any(k in hay for k in keywords):
                      rows.append({
                          "candidate_url": url,
                          "link_text": link["text"],
                          "source_page": base_url,
                          "locator_basis": "discovered_link_keyword_match",
                          "score_allowed": False,
                      })
              return rows

          def ads_to_arxiv(url):
              m = re.search(r"abs/([0-9]{4})arXiv([0-9]{4}\.[0-9]{4,5})([A-Za-z]?)/abstract", url)
              if m:
                  return "https://arxiv.org/abs/" + m.group(2) + m.group(3)
              m2 = re.search(r"arxiv\.org/abs/([0-9]{4}\.[0-9]{4,5}[A-Za-z]?)", url)
              if m2:
                  return "https://arxiv.org/abs/" + m2.group(1)
              return ""

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              try:
                  fields["z_eff"] = float(fields["z_eff_text"])
              except Exception:
                  fields["z_eff"] = ""
              return fields

          def parse_column_contract_rows(tables):
              out = []
              for table_idx, table in enumerate(tables):
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      row_type = "redshift_function_row_candidate" if "(z)" in label_norm else "final_or_consensus_row_candidate"
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for value, sigma in measurement_pairs(cell):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              out.append({
                                  "contract_id": f"column_contract_bound_{len(out)+1:02d}",
                                  "bound_id": f"bound_{len(out)+1:02d}",
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "z_eff": fields["z_eff"],
                                  "z_range_text": fields["z_range_text"],
                                  "observable": "f_sigma8",
                                  "observed_value": value,
                                  "observed_sigma": sigma,
                                  "score_allowed": False,
                                  "contract_status": "rebuilt_for_candidate_review_no_scoring",
                              })
              return out

          def term_window(text, idx, width=140):
              return text[max(0, idx-width):idx+width].replace("\n", " ")[:420]

          def extract_numeric_candidates(text, source_url, link_text, max_candidates=30):
              rows = []
              lower = text.lower()
              anchor_patterns = [
                  r"f\s*σ\s*8",
                  r"f\s*sigma\s*8",
                  r"fsigma8",
                  r"f\\sigma_8",
                  r"growth",
                  r"lcdm",
                  r"fiducial",
                  r"consensus",
                  r"redshift-space distortion",
                  r"rsd",
              ]
              anchors = []
              for pat in anchor_patterns:
                  for m in re.finditer(pat, lower):
                      anchors.append(m.start())
              anchors = sorted(set(anchors))
              number_pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)(?:\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?))?")
              for anchor_idx, anchor in enumerate(anchors[:90]):
                  window = term_window(text, anchor, width=260)
                  for nm in number_pattern.finditer(window):
                      val = float(nm.group(1))
                      unc = nm.group(2)
                      if val > 5.0:
                          continue
                      rows.append({
                          "raw_candidate_id": f"raw_candidate_{len(rows)+1:03d}",
                          "source_url": source_url,
                          "link_text": link_text,
                          "anchor_index": anchor_idx,
                          "candidate_value": val,
                          "candidate_uncertainty": float(unc) if unc else "",
                          "context_window": window,
                          "raw_status": "numeric_near_reference_terms_candidate_only",
                      })
                      if len(rows) >= max_candidates:
                          return rows
              return rows

          def is_same_as_observed(candidate_value, contract_rows, tol=1e-9):
              for row in contract_rows:
                  try:
                      if abs(float(candidate_value) - float(row["observed_value"])) <= tol:
                          return True
                  except Exception:
                      pass
              return False

          def classify_candidate(raw, contract_rows):
              value = raw["candidate_value"]
              context = raw["context_window"].lower()
              source = raw["source_url"].split("#")[0]
              if source == SOURCE_URL and is_same_as_observed(value, contract_rows):
                  return "reject_observed_table_value", "observed_value_from_sdss_measurement_table"
              if is_same_as_observed(value, contract_rows):
                  return "suspicious_matches_observed_value", "matches_observed_value_requires_manual_review"
              if value > 2.0:
                  return "reject_likely_non_fsigma_number", "value_too_large_for_fsigma8_scale"
              if value < 0.01:
                  return "reject_likely_format_or_count_fragment", "value_too_small_or_fragmentary"
              if not any(t in context for t in ["fσ8", "f sigma", "fsigma", "f\\sigma", "growth", "rsd", "redshift-space"]):
                  return "reject_insufficient_context", "no_growth_or_rsd_context"
              if any(t in context for t in ["lcdm", "fiducial", "model", "prediction", "comparator"]):
                  return "candidate_possible_comparator_needs_review", "context_mentions_model_or_lcdm"
              return "candidate_possible_measurement_or_context_number_needs_review", "relevant_context_but_not_approved"

          inherited_v4_292_rows = [
              {"inherited_from": "v4.292", "item": "rules", "value": "55 / 55 passed", "meaning": "Scoring-readiness dry run passed by refusing score.", "carry_forward_status": "ready_for_candidate_review"},
              {"inherited_from": "v4.292", "item": "score_readiness", "value": False, "meaning": "Score readiness failed correctly.", "carry_forward_status": "score_refused"},
              {"inherited_from": "v4.292", "item": "score_status", "value": "blocked_or_invalid", "meaning": "Score was invalid/blocked.", "carry_forward_status": "score_refused"},
              {"inherited_from": "v4.292", "item": "column_contract_rows", "value": 12, "meaning": "Twelve observed SDSS f_sigma8 rows existed in GitHub run.", "carry_forward_status": "observed_rows_ready"},
              {"inherited_from": "v4.292", "item": "blocked_score_rows", "value": 12, "meaning": "All twelve available rows were blocked from scoring.", "carry_forward_status": "safety_boundary_passed"},
              {"inherited_from": "v4.292", "item": "valid_score_rows", "value": 0, "meaning": "No row was valid for score.", "carry_forward_status": "no_valid_score"},
              {"inherited_from": "v4.292", "item": "baseline_values_approved", "value": False, "meaning": "No baseline values approved.", "carry_forward_status": "baseline_missing"},
              {"inherited_from": "v4.292", "item": "row_meaning_confirmed", "value": False, "meaning": "Row meaning remained unconfirmed.", "carry_forward_status": "row_meaning_missing"},
              {"inherited_from": "v4.292", "item": "covariance_handled", "value": False, "meaning": "No covariance handling.", "carry_forward_status": "covariance_missing"},
              {"inherited_from": "v4.292", "item": "support_allowed", "value": False, "meaning": "Support stayed blocked.", "carry_forward_status": "support_blocked"},
              {"inherited_from": "v4.292", "item": "selected_next_route", "value": "v4_293_sdss_rsd_candidate_baseline_review_and_row_meaning_gate_no_scoring", "meaning": "Current route reviews candidates and row-meaning gate.", "carry_forward_status": "current_route"},
          ]

          source_fetch_row, source_data = fetch_url(SOURCE_URL)
          related_fetch_row, related_data = fetch_url(RELATED_PAGE_URL)
          dr16_fetch_row, dr16_data = fetch_url(DR16_URL)

          parser = SimpleTableParser()
          if source_data:
              parser.feed(source_data.decode("utf-8", errors="replace"))
          column_contract_rows = parse_column_contract_rows(parser.tables)

          discovered = []
          discovered.extend(extract_candidate_links(SOURCE_URL, source_data))
          discovered.extend(extract_candidate_links(RELATED_PAGE_URL, related_data))
          discovered.extend(extract_candidate_links(DR16_URL, dr16_data))

          static_candidates = [
              {"candidate_url": SOURCE_URL, "link_text": "SDSS final BAO and RSD measurements table", "source_page": "static", "locator_basis": "official_table_page"},
              {"candidate_url": RELATED_PAGE_URL, "link_text": "SDSS final BAO and RSD measurements overview", "source_page": "static", "locator_basis": "official_related_page"},
              {"candidate_url": DR16_URL, "link_text": "SDSS DR16 release page", "source_page": "static", "locator_basis": "official_release_context"},
          ]

          raw_refs = static_candidates + discovered
          ref_rows = []
          seen = set()
          for row in raw_refs:
              url = row["candidate_url"].split("#")[0]
              if url in seen:
                  continue
              seen.add(url)
              item = dict(row)
              item["reference_id"] = f"review_ref_{len(ref_rows)+1:03d}"
              item["arxiv_probe_url"] = ads_to_arxiv(url)
              item["score_allowed"] = False
              ref_rows.append(item)

          prioritized_refs = []
          for row in ref_rows:
              url = row["candidate_url"].lower()
              text = row.get("link_text", "").lower()
              score = 0
              if "sdss4.org/science/final-bao-and-rsd-measurements" in url:
                  score += 60
              if "arxiv" in url or row.get("arxiv_probe_url"):
                  score += 35
              if any(name in text for name in ["alam", "zhao", "ross", "raichoor", "lyke", "du mas", "smith", "neveux"]):
                  score += 20
              if any(term in text for term in ["rsd", "bao", "growth", "cosmology", "final"]):
                  score += 10
              if any(ext in url for ext in [".png", ".jpg", ".jpeg", ".gif", ".pdf"]):
                  score -= 30
              row = dict(row)
              row["priority_score"] = score
              prioritized_refs.append(row)
          prioritized_refs = sorted(prioritized_refs, key=lambda r: r["priority_score"], reverse=True)[:24]

          reference_review_rows = []
          raw_numeric_candidate_rows = []
          for ref in prioritized_refs:
              probe_urls = [ref["candidate_url"]]
              if ref.get("arxiv_probe_url"):
                  probe_urls.append(ref["arxiv_probe_url"])
              for probe_url in probe_urls:
                  fetch, data = fetch_url(probe_url, max_bytes=1_000_000, timeout=12)
                  text = strip_html_text(data)
                  lower = text.lower()
                  term_counts = {
                      "fsigma8": len(re.findall(r"f\s*σ\s*8|f\s*sigma\s*8|fsigma8|f\\sigma_8", lower)),
                      "rsd": lower.count("rsd") + lower.count("redshift-space distortion"),
                      "bao": lower.count("bao") + lower.count("baryon acoustic"),
                      "lcdm": lower.count("lcdm") + lower.count("Λcdm".lower()),
                      "growth": lower.count("growth"),
                      "covariance": lower.count("covariance"),
                  }
                  relevance = term_counts["fsigma8"]*6 + term_counts["rsd"]*3 + term_counts["bao"]*2 + term_counts["lcdm"] + term_counts["growth"]*2 + term_counts["covariance"]
                  review_row = {
                      "review_id": f"reference_review_{len(reference_review_rows)+1:03d}",
                      "reference_id": ref["reference_id"],
                      "probe_url": probe_url,
                      "link_text": ref.get("link_text", ""),
                      "fetch_ok": fetch["fetch_ok"],
                      "status_code": fetch["status_code"],
                      "bytes_read": fetch["bytes_read"],
                      "term_count_fsigma8": term_counts["fsigma8"],
                      "term_count_rsd": term_counts["rsd"],
                      "term_count_bao": term_counts["bao"],
                      "term_count_lcdm": term_counts["lcdm"],
                      "term_count_growth": term_counts["growth"],
                      "term_count_covariance": term_counts["covariance"],
                      "relevance_score_no_claim": relevance,
                      "review_status": "reference_review_only_not_approval",
                      "score_allowed": False,
                      "support_allowed": False,
                  }
                  reference_review_rows.append(review_row)
                  for raw in extract_numeric_candidates(text, probe_url, ref.get("link_text", ""), max_candidates=20):
                      raw["review_id"] = review_row["review_id"]
                      raw_numeric_candidate_rows.append(raw)

          candidate_review_rows = []
          rejected_candidate_rows = []
          for raw in raw_numeric_candidate_rows:
              status, reason = classify_candidate(raw, column_contract_rows)
              record = {
                  "candidate_review_id": f"candidate_review_{len(candidate_review_rows)+len(rejected_candidate_rows)+1:04d}",
                  "raw_candidate_id": raw["raw_candidate_id"],
                  "review_id": raw["review_id"],
                  "source_url": raw["source_url"],
                  "link_text": raw["link_text"],
                  "candidate_value": raw["candidate_value"],
                  "candidate_uncertainty": raw["candidate_uncertainty"],
                  "context_window": raw["context_window"],
                  "review_classification": status,
                  "review_reason": reason,
                  "approval_status": "not_approved",
                  "baseline_value_filled": False,
                  "baseline_source_selected": False,
                  "definition_match_confirmed": False,
                  "row_meaning_confirmed": False,
                  "covariance_policy_present": False,
                  "score_allowed": False,
                  "support_allowed": False,
              }
              if status.startswith("reject"):
                  rejected_candidate_rows.append(record)
              else:
                  candidate_review_rows.append(record)

          row_family_gate_rows = [
              {
                  "row_family_id": "family_001",
                  "row_label": "f σ 8 (z)",
                  "row_type_guess": "redshift_function_row_candidate",
                  "candidate_contract_count": sum(1 for r in column_contract_rows if r["row_label"] == "f σ 8 (z)"),
                  "gate_status": "not_selected",
                  "selection_allowed_now": False,
                  "reason": "source meaning not confirmed",
              },
              {
                  "row_family_id": "family_002",
                  "row_label": "f σ 8",
                  "row_type_guess": "final_or_consensus_row_candidate",
                  "candidate_contract_count": sum(1 for r in column_contract_rows if r["row_label"] == "f σ 8"),
                  "gate_status": "not_selected",
                  "selection_allowed_now": False,
                  "reason": "source meaning not confirmed",
              },
              {
                  "row_family_id": "family_003",
                  "row_label": "all_fsigma_rows",
                  "row_type_guess": "mixed_or_double_count_risk",
                  "candidate_contract_count": len(column_contract_rows),
                  "gate_status": "blocked",
                  "selection_allowed_now": False,
                  "reason": "mixed f_sigma8 row families cannot be scored together",
              },
          ]

          baseline_review_summary_rows = [
              {
                  "summary_id": "baseline_review_001",
