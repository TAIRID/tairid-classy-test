name: 000 TAIRID v4.215 - G1 Candidate Subject Axis Covariance Correlation Preview With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-215-g1-candidate-subject-axis-covariance-correlation-preview-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/public_sources/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-215-g1-candidate-covariance-correlation-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install numeric readers
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas pyarrow numpy

      - name: Run v4.215 G1 candidate subject-axis covariance/correlation preview
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_215_outputs
          cat > tairid_v4_215_outputs/run_v4_215.py <<'PY'
          import csv
          import io
          import json
          import math
          import os
          import re
          import shutil
          import tempfile
          import urllib.request
          import zipfile
          from pathlib import Path

          import numpy as np
          import pandas as pd

          OUT = Path("tairid_v4_215_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "g1_candidate_subject_axis_covariance_correlation_preview_passed_matrices_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no dyslexia validation",
              "no aphantasia validation",
              "no clinical diagnosis claim",
              "no claim that G1 proves TAIRID",
              "no raw numbers moved between domains",
              "no unit equivalence across dyslexia and aphantasia surfaces",
              "no causal equivalence across dyslexia and aphantasia surfaces",
              "no publication-grade scaling law",
              "candidate covariance preview is not validation",
              "candidate correlation preview is not validation",
              "mixed-surface combined matrices are diagnostic only",
              "aphantasia remains questionnaire-only",
              "dyslexia and aphantasia measurement surfaces are different",
              "TAIRID not proved"
          ]

          V4_214_STATUS = {
              "version": "v4.214",
              "rule_pass_count": 12,
              "rule_total_count": 12,
              "failed_gates": [],
              "downloaded_count": 3,
              "combined_candidate_rows": 324,
              "complete_rows": 324,
              "row_issue_count": 0,
              "placeholder_rows": 0,
              "dyslexia_rows": 210,
              "aphantasia_rows": 114,
              "both_halves_stageable": True,
              "package_status": "combined_g1_candidate_input_staging_passed_ready_for_covariance_preview",
              "selected_next_route": "g1_candidate_subject_axis_covariance_correlation_preview_with_scope_guards"
          }

          TARGET_CANONICAL_COLUMNS = [
              "lane",
              "subject_id",
              "group_or_condition",
              "boundary_or_task",
              "propagation_reach_value",
              "pacing_access_value",
              "consolidation_growth_value",
              "viability_or_outcome_value",
              "source_or_dataset",
              "notes"
          ]

          AXIS_COLUMNS = [
              "propagation_reach_value",
              "pacing_access_value",
              "consolidation_growth_value",
              "viability_or_outcome_value"
          ]

          AXIS_LABELS = {
              "propagation_reach_value": "propagation_reach",
              "pacing_access_value": "pacing_access",
              "consolidation_growth_value": "consolidation_growth",
              "viability_or_outcome_value": "viability_outcome"
          }

          ETDD70_DOWNLOADS = [
              {
                  "file_name": "dyslexia_class_label.csv",
                  "download_url": "https://zenodo.org/api/records/13332134/files/dyslexia_class_label.csv/content",
                  "purpose": "subject group labels"
              },
              {
                  "file_name": "data.zip",
                  "download_url": "https://zenodo.org/api/records/13332134/files/data.zip/content",
                  "purpose": "subject task metric tables"
              }
          ]

          APHANTASIA_DOWNLOAD = {
              "file_name": "aphantasia_data.parquet",
              "download_url": "https://huggingface.co/datasets/jmc255/aphantasia_drawing_dataset/resolve/main/aphantasia_data.parquet",
              "purpose": "safe scalar questionnaire fields for aphantasia candidate rows"
          }

          REQUIRED_ETDD70_COLUMNS = [
              "sid",
              "trialid",
              "n_fix_trial",
              "sum_fix_dur_trial",
              "dwell_time_trial",
              "mean_fix_dur_trial",
              "n_sacc_trial",
              "sum_sacc_dur_trial",
              "mean_sacc_dur_trial",
              "n_regress_trial",
              "n_progress_trial"
          ]

          OPTIONAL_ETDD70_COLUMNS = [
              "n_transit_trial",
              "n_between_line_regress_trial",
              "n_within_line_regress_trial",
              "dwell_time_rereading_aoi",
              "n_revisits_aoi",
              "ratio_progress_regress_trial",
              "skipped_aoi",
              "dwell_time_aoi",
              "n_fix_aoi",
              "mean_fix_dur_aoi"
          ]

          APHANTASIA_SAFE_COLUMNS = [
              "subject_id",
              "treatment",
              "demographics.vviq_score",
              "demographics.osiq_score"
          ]

          MAX_DOWNLOAD_BYTES = 500_000_000
          USER_AGENT = "TAIRID-v4.215-G1-covariance-correlation-preview/1.0"

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def safe_float(x):
              try:
                  if x is None or str(x).strip() == "":
                      return None
                  return float(str(x).strip())
              except Exception:
                  return None

          def safe_mean(values):
              vals = [v for v in values if v is not None and not math.isnan(v)]
              if not vals:
                  return None
              return sum(vals) / len(vals)

          def safe_sd(values):
              vals = [v for v in values if v is not None and not math.isnan(v)]
              if len(vals) < 2:
                  return None
              m = sum(vals) / len(vals)
              var = sum((v - m) ** 2 for v in vals) / (len(vals) - 1)
              return math.sqrt(var)

          def sign(x):
              if x is None:
                  return ""
              if x > 0:
                  return "+"
              if x < 0:
                  return "-"
              return "0"

          def z_values(values):
              vals = [safe_float(v) for v in values]
              clean = [v for v in vals if v is not None]
              if len(clean) < 2:
                  return [None for _ in vals]
              m = sum(clean) / len(clean)
              sd = safe_sd(clean)
              if sd is None or sd == 0:
                  return [0.0 if v is not None else None for v in vals]
              return [(v - m) / sd if v is not None else None for v in vals]

          def zscore_map(rows, columns):
              stats = {}
              for col in columns:
                  vals = [safe_float(r.get(col)) for r in rows]
                  vals = [v for v in vals if v is not None]
                  if len(vals) >= 2:
                      m = sum(vals) / len(vals)
                      sd = safe_sd(vals)
                      stats[col] = (m, sd if sd is not None else 0.0)
              return stats

          def z(row, col, stats):
              v = safe_float(row.get(col))
              if v is None or col not in stats:
                  return None
              m, sd = stats[col]
              if sd == 0:
                  return 0.0
              return (v - m) / sd

          def download_file(url, dest):
              if os.environ.get("TAIRID_LOCAL_NO_NETWORK") == "1":
                  return False, "download_skipped_local_no_network", "local check disables network"
              req = urllib.request.Request(url, headers={"User-Agent": USER_AGENT})
              try:
                  with urllib.request.urlopen(req, timeout=90) as resp:
                      content_len = resp.headers.get("Content-Length")
                      if content_len and int(content_len) > MAX_DOWNLOAD_BYTES:
                          return False, "skipped_size_guard", "content_length_exceeds_guard"
                      total = 0
                      with open(dest, "wb") as f:
                          while True:
                              chunk = resp.read(1024 * 1024)
                              if not chunk:
                                  break
                              total += len(chunk)
                              if total > MAX_DOWNLOAD_BYTES:
                                  return False, "failed_size_guard", "download_exceeded_guard"
                              f.write(chunk)
                  return True, "downloaded", ""
              except Exception as exc:
                  return False, "download_failed", type(exc).__name__ + ": " + str(exc)[:300]

          def read_csv_text_bytes(data):
              text = data.decode("utf-8-sig", errors="replace")
              first = text.splitlines()[0] if text.splitlines() else ""
              delimiter = "\t" if first.count("\t") > first.count(",") else ","
              reader = csv.DictReader(io.StringIO(text), delimiter=delimiter)
              return list(reader), reader.fieldnames or []

          def normalize_subject_id(x):
              s = str(x).strip()
              if s.endswith(".0"):
                  s = s[:-2]
              return s

          def task_from_filename(name):
              base = Path(name).name
              m = re.search(r"Subject_(\d+)_(T\d+)_(.+?)_metrics\.csv$", base)
              if m:
                  return m.group(1), m.group(2) + "_" + m.group(3)
              return "", base

          def build_dyslexia_rows(tmp_root, download_status_rows):
              paths = {}
              for item in ETDD70_DOWNLOADS:
                  dest = tmp_root / item["file_name"]
                  ok, status, error = download_file(item["download_url"], dest)
                  download_status_rows.append({
                      "source_lane": "Dyslexia",
                      "file_name": item["file_name"],
                      "purpose": item["purpose"],
                      "download_status": status,
                      "download_error": error,
                      "downloaded_size_bytes": dest.stat().st_size if dest.exists() else 0,
                      "claim_boundary": "download only; not validation"
                  })
                  if ok:
                      paths[item["file_name"]] = dest

              label_map = {}
              if "dyslexia_class_label.csv" in paths:
                  rows, cols = read_csv_text_bytes(paths["dyslexia_class_label.csv"].read_bytes())
                  for row in rows:
                      sid = normalize_subject_id(row.get("subject_id", row.get("sid", row.get("id", ""))))
                      label = str(row.get("label", row.get("class_id", row.get("class", "")))).strip()
                      class_id = str(row.get("class_id", row.get("class", ""))).strip()
                      group = label if label else ("class_" + class_id if class_id else "unknown")
                      if sid:
                          label_map[sid] = group

              metric_raw_rows = []
              if "data.zip" in paths and zipfile.is_zipfile(paths["data.zip"]):
                  with zipfile.ZipFile(paths["data.zip"]) as zf:
                      metric_members = [
                          info for info in zf.infolist()
                          if (not info.is_dir())
                          and info.filename.lower().endswith("_metrics.csv")
                          and "__macosx" not in info.filename.lower()
                      ]
                      for info in metric_members:
                          subject_from_name, task_name = task_from_filename(info.filename)
                          try:
                              rows, cols = read_csv_text_bytes(zf.read(info))
                          except Exception:
                              continue
                          present = set(cols)
                          if not rows or "sid" not in present:
                              continue
                          agg = {
                              "metric_file": info.filename,
                              "subject_id": subject_from_name,
                              "task_name": task_name,
                              "group_or_condition": label_map.get(subject_from_name, "label_missing")
                          }
                          for col in REQUIRED_ETDD70_COLUMNS + OPTIONAL_ETDD70_COLUMNS:
                              if col in present:
                                  vals = [safe_float(r.get(col)) for r in rows]
                                  vals = [v for v in vals if v is not None]
                                  agg[col + "_mean"] = safe_mean(vals)
                          metric_raw_rows.append(agg)

              candidate_rows = []
              if metric_raw_rows:
                  features = [
                      "n_fix_trial_mean",
                      "n_sacc_trial_mean",
                      "n_transit_trial_mean",
                      "mean_fix_dur_trial_mean",
                      "dwell_time_trial_mean",
                      "mean_sacc_dur_trial_mean",
                      "n_regress_trial_mean",
                      "n_revisits_aoi_mean",
                      "dwell_time_rereading_aoi_mean",
                      "n_between_line_regress_trial_mean",
                      "n_within_line_regress_trial_mean",
                      "sum_fix_dur_trial_mean"
                  ]
                  stats = zscore_map(metric_raw_rows, features)
                  for row in metric_raw_rows:
                      prop = safe_mean([
                          z(row, "n_fix_trial_mean", stats),
                          z(row, "n_sacc_trial_mean", stats),
                          z(row, "n_transit_trial_mean", stats)
                      ])
                      pacing = safe_mean([
                          z(row, "mean_fix_dur_trial_mean", stats),
                          z(row, "dwell_time_trial_mean", stats),
                          z(row, "mean_sacc_dur_trial_mean", stats)
                      ])
                      consolidation = safe_mean([
                          -z(row, "n_regress_trial_mean", stats) if z(row, "n_regress_trial_mean", stats) is not None else None,
                          -z(row, "n_revisits_aoi_mean", stats) if z(row, "n_revisits_aoi_mean", stats) is not None else None,
                          -z(row, "dwell_time_rereading_aoi_mean", stats) if z(row, "dwell_time_rereading_aoi_mean", stats) is not None else None,
                          -z(row, "n_between_line_regress_trial_mean", stats) if z(row, "n_between_line_regress_trial_mean", stats) is not None else None,
                          -z(row, "n_within_line_regress_trial_mean", stats) if z(row, "n_within_line_regress_trial_mean", stats) is not None else None
                      ])
                      viability = safe_mean([
                          -z(row, "dwell_time_trial_mean", stats) if z(row, "dwell_time_trial_mean", stats) is not None else None,
                          -z(row, "sum_fix_dur_trial_mean", stats) if z(row, "sum_fix_dur_trial_mean", stats) is not None else None,
                          -z(row, "n_fix_trial_mean", stats) if z(row, "n_fix_trial_mean", stats) is not None else None,
                          -z(row, "n_sacc_trial_mean", stats) if z(row, "n_sacc_trial_mean", stats) is not None else None
                      ])

                      if all(v is not None for v in [prop, pacing, consolidation, viability]):
                          candidate_rows.append({
                              "lane": "Dyslexia",
                              "subject_id": row.get("subject_id", ""),
                              "group_or_condition": row.get("group_or_condition", "label_missing"),
                              "boundary_or_task": "ETDD70_" + row.get("task_name", ""),
                              "propagation_reach_value": round(prop, 8),
                              "pacing_access_value": round(pacing, 8),
                              "consolidation_growth_value": round(consolidation, 8),
                              "viability_or_outcome_value": round(viability, 8),
                              "source_or_dataset": "ETDD70 public Zenodo record 13332134; candidate axis mapping from metrics CSV",
                              "notes": "Candidate dyslexia ETDD70 task-metric row; not covariance or validation."
                          })
              return candidate_rows

          def build_aphantasia_rows(tmp_root, download_status_rows):
              dest = tmp_root / APHANTASIA_DOWNLOAD["file_name"]
              ok, status, error = download_file(APHANTASIA_DOWNLOAD["download_url"], dest)
              download_status_rows.append({
                  "source_lane": "Aphantasia",
                  "file_name": APHANTASIA_DOWNLOAD["file_name"],
                  "purpose": APHANTASIA_DOWNLOAD["purpose"],
                  "download_status": status,
                  "download_error": error,
                  "downloaded_size_bytes": dest.stat().st_size if dest.exists() else 0,
                  "claim_boundary": "download only; not validation"
              })
              if not ok:
                  return []

              import pyarrow.parquet as pq

              schema_names = list(pq.ParquetFile(dest).schema_arrow.names)
              if any(c not in schema_names for c in APHANTASIA_SAFE_COLUMNS):
                  return []

              table = pq.read_table(dest, columns=APHANTASIA_SAFE_COLUMNS)
              df = table.to_pandas(types_mapper=None)
              work = df[APHANTASIA_SAFE_COLUMNS].copy()
              work = work.dropna(subset=APHANTASIA_SAFE_COLUMNS)
              work["subject_id"] = work["subject_id"].astype(str)
              work["group_or_condition"] = work["treatment"].astype(str)

              vviq_z = z_values(work["demographics.vviq_score"].tolist())
              osiq_z = z_values(work["demographics.osiq_score"].tolist())

              candidate_rows = []
              for idx, (_, row) in enumerate(work.iterrows()):
                  vviq = vviq_z[idx]
                  osiq = osiq_z[idx]
                  prop = vviq
                  pacing = -vviq if vviq is not None else None
                  consolidation = osiq
                  viability = safe_mean([vviq, osiq])
                  if all(v is not None for v in [prop, pacing, consolidation, viability]):
                      candidate_rows.append({
                          "lane": "Aphantasia",
                          "subject_id": row["subject_id"],
                          "group_or_condition": row["group_or_condition"],
                          "boundary_or_task": "Aphantasia_questionnaire_profile",
                          "propagation_reach_value": round(prop, 8),
                          "pacing_access_value": round(pacing, 8),
                          "consolidation_growth_value": round(consolidation, 8),
                          "viability_or_outcome_value": round(viability, 8),
                          "source_or_dataset": "Hugging Face jmc255/aphantasia_drawing_dataset; aphantasia_data.parquet",
                          "notes": "Candidate aphantasia questionnaire mapping; VVIQ/OSIQ only; not drawing-performance scoring, covariance, or validation."
                      })
              return candidate_rows

          def subset_dataframe(rows):
              if not rows:
                  return pd.DataFrame(columns=AXIS_COLUMNS)
              df = pd.DataFrame(rows)
              for col in AXIS_COLUMNS:
                  df[col] = pd.to_numeric(df[col], errors="coerce")
              return df

          def matrix_outputs(rows, subset_id, subset_type, mixed_surface_warning):
              matrix_rows = []
              corr_rows = []
              eigen_rows = []
              summary_rows = []

              df = subset_dataframe(rows)
              n = int(len(df.dropna(subset=AXIS_COLUMNS)))
              if n < 3:
                  summary_rows.append({
                      "subset_id": subset_id,
                      "subset_type": subset_type,
                      "n_rows": n,
                      "status": "not_enough_rows",
                      "mixed_surface_warning": mixed_surface_warning,
                      "claim_boundary": "matrix not computed"
                  })
                  return matrix_rows, corr_rows, eigen_rows, summary_rows

              X = df[AXIS_COLUMNS].dropna()
              cov = X.cov()
              corr = X.corr()

              for a in AXIS_COLUMNS:
                  for b in AXIS_COLUMNS:
                      matrix_rows.append({
                          "subset_id": subset_id,
                          "subset_type": subset_type,
                          "n_rows": n,
                          "axis_i": AXIS_LABELS[a],
                          "axis_j": AXIS_LABELS[b],
                          "covariance": round(float(cov.loc[a, b]), 10),
                          "mixed_surface_warning": mixed_surface_warning,
                          "claim_boundary": "candidate covariance preview only; not validation"
                      })
                      corr_value = corr.loc[a, b]
                      corr_rows.append({
                          "subset_id": subset_id,
                          "subset_type": subset_type,
                          "n_rows": n,
                          "axis_i": AXIS_LABELS[a],
                          "axis_j": AXIS_LABELS[b],
                          "correlation": round(float(corr_value), 10) if pd.notna(corr_value) else "",
                          "mixed_surface_warning": mixed_surface_warning,
                          "claim_boundary": "candidate correlation preview only; not validation"
                      })

              corr_np = corr.to_numpy(dtype=float)
              corr_np = np.nan_to_num(corr_np, nan=0.0, posinf=0.0, neginf=0.0)
              np.fill_diagonal(corr_np, 1.0)
              try:
                  vals, vecs = np.linalg.eigh(corr_np)
                  order = np.argsort(vals)[::-1]
                  for rank, idx in enumerate(order, start=1):
                      vec = vecs[:, idx]
                      # orient largest absolute loading positive for stable display
                      max_i = int(np.argmax(np.abs(vec)))
                      if vec[max_i] < 0:
                          vec = -vec
                      eigen_rows.append({
                          "subset_id": subset_id,
                          "subset_type": subset_type,
                          "mode_rank": rank,
                          "eigenvalue": round(float(vals[idx]), 10),
                          "loading_propagation_reach": round(float(vec[0]), 10),
                          "loading_pacing_access": round(float(vec[1]), 10),
                          "loading_consolidation_growth": round(float(vec[2]), 10),
                          "loading_viability_outcome": round(float(vec[3]), 10),
                          "mixed_surface_warning": mixed_surface_warning,
                          "claim_boundary": "candidate eigenmode preview only; not validation"
                      })
              except Exception as exc:
                  eigen_rows.append({
                      "subset_id": subset_id,
                      "subset_type": subset_type,
                      "mode_rank": "",
                      "eigenvalue": "",
                      "loading_propagation_reach": "",
                      "loading_pacing_access": "",
                      "loading_consolidation_growth": "",
                      "loading_viability_outcome": "",
                      "mixed_surface_warning": mixed_surface_warning,
                      "claim_boundary": "eigenmode failed: " + type(exc).__name__
                  })

              summary_rows.append({
                  "subset_id": subset_id,
                  "subset_type": subset_type,
                  "n_rows": n,
                  "status": "matrix_preview_written",
                  "mixed_surface_warning": mixed_surface_warning,
                  "claim_boundary": "matrix preview only; not validation"
              })
              return matrix_rows, corr_rows, eigen_rows, summary_rows

          def group_summary(rows):
              grouped = {}
              for row in rows:
                  key = (row["lane"], row["group_or_condition"], row["boundary_or_task"])
                  grouped.setdefault(key, []).append(row)
              out_rows = []
              for (lane, group, task), group_rows in sorted(grouped.items()):
                  def avg(col):
                      vals = [safe_float(r[col]) for r in group_rows]
                      vals = [v for v in vals if v is not None]
                      return round(safe_mean(vals), 8) if vals else ""
                  out_rows.append({
                      "lane": lane,
                      "group_or_condition": group,
                      "boundary_or_task": task,
                      "n_rows": len(group_rows),
                      "propagation_reach_mean": avg("propagation_reach_value"),
                      "pacing_access_mean": avg("pacing_access_value"),
                      "consolidation_growth_mean": avg("consolidation_growth_value"),
                      "viability_or_outcome_mean": avg("viability_or_outcome_value"),
                      "claim_boundary": "candidate group summary only; not validation"
                  })
              return out_rows

          def delta_review(rows):
              result_rows = []
              axes = [
                  ("propagation_reach", "propagation_reach_value"),
                  ("pacing_access", "pacing_access_value"),
                  ("consolidation_growth", "consolidation_growth_value"),
                  ("viability_or_outcome", "viability_or_outcome_value")
              ]
              for lane in sorted(set(r["lane"] for r in rows)):
                  lane_rows = [r for r in rows if r["lane"] == lane]
                  tasks = sorted(set(r["boundary_or_task"] for r in lane_rows))
                  for task in tasks + ([lane + "_ALL_TASKS"] if lane == "Dyslexia" else []):
                      task_rows = lane_rows if task.endswith("_ALL_TASKS") else [r for r in lane_rows if r["boundary_or_task"] == task]
                      by_group = {}
                      for row in task_rows:
                          by_group.setdefault(row["group_or_condition"], []).append(row)
                      group_names = sorted(by_group.keys())

                      if lane == "Dyslexia":
                          group_a, group_b = "dyslexic", "non-dyslexic"
                          comparison = "dyslexic_minus_non_dyslexic"
                          expected3, expected4 = "++-", "++--"
                      else:
                          group_a = next((g for g in group_names if "aphantasia" in g.lower()), "")
                          group_b = next((g for g in group_names if any(k in g.lower() for k in ["control", "normal", "imagery"]) and g != group_a), "")
                          comparison = "aphantasia_minus_control"
                          expected3, expected4 = "-+-", "-+--"

                      if group_a not in by_group or group_b not in by_group:
                          continue
                      out = {
                          "lane": lane,
                          "comparison": comparison,
                          "boundary_or_task": task,
                          "case_group": group_a,
                          "reference_group": group_b,
                          "case_n": len(by_group[group_a]),
                          "reference_n": len(by_group[group_b]),
                          "expected_three_axis_signature": expected3,
                          "expected_four_axis_signature": expected4,
                          "claim_boundary": "candidate delta review only; not validation"
                      }
                      for axis_label, col in axes:
                          case_vals = [safe_float(r[col]) for r in by_group[group_a]]
                          ref_vals = [safe_float(r[col]) for r in by_group[group_b]]
                          delta = safe_mean(case_vals) - safe_mean(ref_vals)
                          out[axis_label + "_delta"] = round(delta, 8)
                          out[axis_label + "_sign"] = sign(delta)
                      sig3 = out["propagation_reach_sign"] + out["pacing_access_sign"] + out["consolidation_growth_sign"]
                      sig4 = sig3 + out["viability_or_outcome_sign"]
                      out["resolved_three_axis_signature"] = sig3
                      out["resolved_four_axis_signature"] = sig4
                      out["matches_expected_three_axis"] = sig3 == expected3
                      out["matches_expected_four_axis"] = sig4 == expected4
                      result_rows.append(out)
              return result_rows

          download_status_rows = []
          tmp_root = Path(tempfile.mkdtemp(prefix="tairid_v4_215_downloads_"))

          try:
              dyslexia_rows = build_dyslexia_rows(tmp_root, download_status_rows)
              aphantasia_rows = build_aphantasia_rows(tmp_root, download_status_rows)
          finally:
              shutil.rmtree(tmp_root, ignore_errors=True)

          combined_rows = dyslexia_rows + aphantasia_rows
          downloaded_count = sum(1 for r in download_status_rows if r["download_status"] == "downloaded")
          lane_counts = {}
          boundary_counts = {}
          for row in combined_rows:
              lane_counts[row["lane"]] = lane_counts.get(row["lane"], 0) + 1
              boundary_counts[row["boundary_or_task"]] = boundary_counts.get(row["boundary_or_task"], 0) + 1

          covariance_rows = []
          correlation_rows = []
          eigenmode_rows = []
          matrix_summary_rows = []

          subsets = [
              ("G1_COMBINED_MIXED_SURFACE", "combined_mixed_surface", combined_rows, "mixed dyslexia/aphantasia source surfaces; diagnostic only"),
              ("G1_DYSLEXIA_ONLY", "lane", dyslexia_rows, "single lane; ETDD70 task metrics only"),
              ("G1_APHANTASIA_ONLY", "lane", aphantasia_rows, "single lane; VVIQ/OSIQ questionnaire-only")
          ]

          for boundary in sorted(set(row["boundary_or_task"] for row in combined_rows)):
              boundary_rows = [row for row in combined_rows if row["boundary_or_task"] == boundary]
              subsets.append((boundary, "boundary_or_task", boundary_rows, "within-boundary candidate preview only"))

          for subset_id, subset_type, subset_rows, warning in subsets:
              cov_part, corr_part, eig_part, summary_part = matrix_outputs(subset_rows, subset_id, subset_type, warning)
              covariance_rows.extend(cov_part)
              correlation_rows.extend(corr_part)
              eigenmode_rows.extend(eig_part)
              matrix_summary_rows.extend(summary_part)

          group_summary_rows = group_summary(combined_rows) if combined_rows else []
          delta_review_rows = delta_review(combined_rows) if combined_rows else []

          ready_for_lattice_update = (
              len(combined_rows) >= 8
              and lane_counts.get("Dyslexia", 0) >= 4
              and lane_counts.get("Aphantasia", 0) >= 4
              and len(correlation_rows) > 0
          )

          if ready_for_lattice_update:
              package_status = "g1_candidate_covariance_correlation_preview_written_ready_for_lattice_update"
              selected_next_route = "shape_lattice_update_after_g1_candidate_covariance_preview_with_scope_guards"
          elif combined_rows:
              package_status = "g1_candidate_covariance_correlation_preview_incomplete"
              selected_next_route = "repair_g1_candidate_covariance_preview_inputs_with_scope_guards"
          else:
              package_status = "g1_candidate_covariance_correlation_preview_download_failed"
              selected_next_route = "retry_g1_source_downloads_or_manual_upload_with_scope_guards"

          preview_interpretation_rows = [
              {
                  "finding": "combined_mixed_surface_matrix_written",
                  "status": any(r["subset_id"] == "G1_COMBINED_MIXED_SURFACE" for r in matrix_summary_rows),
                  "safe_interpretation": "Useful as a diagnostic preview of the staged table, not as unit-equivalent cross-lane covariance.",
                  "claim_boundary": "mixed surface warning applies"
              },
              {
                  "finding": "dyslexia_lane_matrix_written",
                  "status": any(r["subset_id"] == "G1_DYSLEXIA_ONLY" and r["status"] == "matrix_preview_written" for r in matrix_summary_rows),
                  "safe_interpretation": "Shows axis movement inside the ETDD70 reading-task candidate mapping.",
                  "claim_boundary": "not dyslexia validation"
              },
              {
                  "finding": "aphantasia_lane_matrix_written",
                  "status": any(r["subset_id"] == "G1_APHANTASIA_ONLY" and r["status"] == "matrix_preview_written" for r in matrix_summary_rows),
                  "safe_interpretation": "Shows axis movement inside the VVIQ/OSIQ questionnaire-only candidate mapping.",
                  "claim_boundary": "not aphantasia validation; not drawing-performance scoring"
              },
              {
                  "finding": "different_surfaces_preserved",
                  "status": True,
                  "safe_interpretation": "Dyslexia and aphantasia can be compared as relational axis shapes, not as identical measurements.",
                  "claim_boundary": "no unit equivalence"
              }
          ]

          claim_rows = [
              {
                  "claim": "The G1 covariance/correlation preview validates TAIRID.",
                  "status": "blocked",
                  "safe_wording": "The preview shows candidate axis co-movement under guarded mappings.",
                  "forbidden_wording": "G1 validates TAIRID."
              },
              {
                  "claim": "The mixed combined matrix proves cross-domain equivalence.",
                  "status": "blocked",
                  "safe_wording": "The mixed matrix is diagnostic only because source surfaces differ.",
                  "forbidden_wording": "Dyslexia and aphantasia have equivalent units."
              },
              {
                  "claim": "Aphantasia drawing performance is included.",
                  "status": "blocked",
                  "safe_wording": "Aphantasia remains VVIQ/OSIQ questionnaire-only in this preview.",
                  "forbidden_wording": "The drawing-performance lane is complete."
              }
          ]

          next_routes = [
              {
                  "priority": 1,
                  "route": selected_next_route,
                  "condition": package_status,
                  "next_action": "Update the shape lattice with G1 candidate covariance/correlation summaries while preserving source-surface warnings."
              },
              {
                  "priority": 2,
                  "route": "aphantasia_drawing_feature_or_score_extraction_gap_with_scope_guards",
                  "condition": "aphantasia questionnaire-only limitation remains",
                  "next_action": "Search or build drawing-performance scoring separately."
              },
              {
                  "priority": 3,
                  "route": "return_to_cosmology_covariance_shape_method_transfer_with_scope_guards",
                  "condition": "after G1 lattice update",
                  "next_action": "Use the covariance-preview grammar to refine cosmology gap-closing tests."
              }
          ]

          write_csv(OUT / "v4_215_v4_214_status_review.csv", [V4_214_STATUS], list(V4_214_STATUS.keys()))
          (OUT / "v4_215_v4_214_status_review.json").write_text(json.dumps(V4_214_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_215_download_status.csv", download_status_rows, [
              "source_lane", "file_name", "purpose", "download_status", "download_error",
              "downloaded_size_bytes", "claim_boundary"
          ])
          write_csv(OUT / "candidate_data_neurotype_combined_g1_dyslexia_aphantasia_subject_axis_input_for_covariance_preview.csv", combined_rows, TARGET_CANONICAL_COLUMNS)
          write_csv(OUT / "v4_215_group_summary.csv", group_summary_rows, [
              "lane", "group_or_condition", "boundary_or_task", "n_rows",
