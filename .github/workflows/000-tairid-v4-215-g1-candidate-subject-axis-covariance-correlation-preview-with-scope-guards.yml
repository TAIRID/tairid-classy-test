          ])
          write_csv(OUT / "v4_215_eigenmode_preview.csv", eigenmode_rows, [
              "subset_id", "subset_type", "mode_rank", "eigenvalue",
              "loading_propagation_reach", "loading_pacing_access",
              "loading_consolidation_growth", "loading_viability_outcome",
              "mixed_surface_warning", "claim_boundary"
          ])
          write_csv(OUT / "v4_215_matrix_summary.csv", matrix_summary_rows, [
              "subset_id", "subset_type", "n_rows", "status",
              "mixed_surface_warning", "claim_boundary"
          ])
          write_csv(OUT / "v4_215_preview_interpretation_ledger.csv", preview_interpretation_rows, [
              "finding", "status", "safe_interpretation", "claim_boundary"
          ])
          write_csv(OUT / "v4_215_claim_boundary_matrix.csv", claim_rows, [
              "claim", "status", "safe_wording", "forbidden_wording"
          ])
          write_csv(OUT / "v4_215_next_routes.csv", next_routes, [
              "priority", "route", "condition", "next_action"
          ])

          route_decision = {
              "version": "v4.215",
              "result_label": RESULT_LABEL,
              "clean_result": "The combined G1 candidate table was rebuilt and used to write guarded covariance, correlation, and eigenmode preview artifacts for combined, lane-specific, and boundary-specific subsets.",
              "downloaded_count": downloaded_count,
              "combined_candidate_rows": len(combined_rows),
              "dyslexia_rows": lane_counts.get("Dyslexia", 0),
              "aphantasia_rows": lane_counts.get("Aphantasia", 0),
              "matrix_summary_rows": len(matrix_summary_rows),
              "covariance_rows": len(covariance_rows),
              "correlation_rows": len(correlation_rows),
              "eigenmode_rows": len(eigenmode_rows),
              "delta_review_rows": len(delta_review_rows),
              "ready_for_lattice_update": ready_for_lattice_update,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "candidate covariance/correlation preview only; not validation, not unit equivalence",
              "blocked_claims": BLOCKED_CLAIMS
          }
          (OUT / "v4_215_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_215_scope_guards.json").write_text(json.dumps({
              "scope": "G1 candidate subject-axis covariance/correlation preview",
              "covariance_preview_is_validation": False,
              "correlation_preview_is_validation": False,
              "mixed_matrix_is_unit_equivalence": False,
              "dyslexia_surface": "ETDD70 reading eye-tracking task metrics",
              "aphantasia_surface": "VVIQ/OSIQ questionnaire-only candidate mapping",
              "drawing_performance_scoring_present": False,
              "raw_numbers_moved_between_domains": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_215_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.215 - G1 Candidate Subject-Axis Covariance/Correlation Preview",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.214 staged the combined G1 candidate input. v4.215 rebuilds that input and writes guarded covariance, correlation, and eigenmode previews for combined, lane-specific, and boundary-specific subsets.",
              "",
              "Downloaded count: `" + str(downloaded_count) + "`",
              "Combined candidate rows: `" + str(len(combined_rows)) + "`",
              "Dyslexia rows: `" + str(lane_counts.get("Dyslexia", 0)) + "`",
              "Aphantasia rows: `" + str(lane_counts.get("Aphantasia", 0)) + "`",
              "Matrix summary rows: `" + str(len(matrix_summary_rows)) + "`",
              "Covariance rows: `" + str(len(covariance_rows)) + "`",
              "Correlation rows: `" + str(len(correlation_rows)) + "`",
              "Eigenmode rows: `" + str(len(eigenmode_rows)) + "`",
              "Delta review rows: `" + str(len(delta_review_rows)) + "`",
              "Ready for lattice update: `" + str(ready_for_lattice_update) + "`",
              "",
              "Package status: `" + package_status + "`",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_215_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_215_v4_214_status_review.csv",
              "v4_215_v4_214_status_review.json",
              "v4_215_download_status.csv",
              "candidate_data_neurotype_combined_g1_dyslexia_aphantasia_subject_axis_input_for_covariance_preview.csv",
              "v4_215_group_summary.csv",
              "v4_215_delta_review.csv",
              "v4_215_covariance_matrix_long.csv",
              "v4_215_correlation_matrix_long.csv",
              "v4_215_eigenmode_preview.csv",
              "v4_215_matrix_summary.csv",
              "v4_215_preview_interpretation_ledger.csv",
              "v4_215_claim_boundary_matrix.csv",
              "v4_215_next_routes.csv",
              "v4_215_route_decision.json",
              "v4_215_scope_guards.json",
              "v4_215_blocked_claims.json",
              "v4_215_summary.md"
          ]

          rules = {
              "version_is_v4_215": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_214_status_reviewed": V4_214_STATUS["rule_pass_count"] == 12,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "candidate_input_written": (OUT / "candidate_data_neurotype_combined_g1_dyslexia_aphantasia_subject_axis_input_for_covariance_preview.csv").exists(),
              "covariance_matrix_written": (OUT / "v4_215_covariance_matrix_long.csv").exists(),
              "correlation_matrix_written": (OUT / "v4_215_correlation_matrix_long.csv").exists(),
              "eigenmode_preview_written": (OUT / "v4_215_eigenmode_preview.csv").exists(),
              "interpretation_ledger_written": (OUT / "v4_215_preview_interpretation_ledger.csv").exists(),
              "selected_route_present": bool(selected_next_route),
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.215",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "downloaded_count": downloaded_count,
              "combined_candidate_rows": len(combined_rows),
              "dyslexia_rows": lane_counts.get("Dyslexia", 0),
              "aphantasia_rows": lane_counts.get("Aphantasia", 0),
              "matrix_summary_rows": len(matrix_summary_rows),
              "covariance_rows": len(covariance_rows),
              "correlation_rows": len(correlation_rows),
              "eigenmode_rows": len(eigenmode_rows),
              "ready_for_lattice_update": ready_for_lattice_update,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "g1_candidate_covariance_correlation_preview_only_no_validation"
          }
          (OUT / "v4_215_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.215 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_215_outputs/run_v4_215.py

