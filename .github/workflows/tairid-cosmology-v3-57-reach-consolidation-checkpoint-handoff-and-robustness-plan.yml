name: TAIRID Cosmology v3.57 Reach Consolidation Checkpoint Handoff and Robustness Plan

on:
  workflow_dispatch:

jobs:
  reach-consolidation-checkpoint-handoff:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v3.57 checkpoint handoff and robustness plan
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_57

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v3_57")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_57_reach_consolidation_checkpoint_handoff_and_robustness_plan"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior, or model comparison.",
              "This does not compute new pressure scores.",
              "This is a milestone handoff and robustness plan only.",
              "The v3.56 checkpoint is diagnostic, not proof.",
              "H0LiCOW remains a diagnostic non-BAO time-delay reach candidate.",
              "KiDS remains a diagnostic growth/consolidation pressure row.",
              "BAO remains auxiliary mixed/ruler boundary and is not a global reach anchor.",
              "SH0ES and TDCOSMO remain parked.",
              "DESI mapped reach remains blocked as an independent anchor.",
              "A pass means the handoff is clean enough to continue in a new thread or robustness lane, not that TAIRID is validated."
          ]

          PREVIOUS_MILESTONE = {
              "v3_56_status": "guarded_reach_consolidation_comparison_checkpoint_passed_ready_for_handoff_and_robustness_plan",
              "failed_gates": [],
              "h0licow_direction": "reach_positive_equivalent",
              "kids_direction": "consolidation_negative",
              "bao_role": "auxiliary_mixed_ruler_boundary",
              "diagnostic_checkpoint_built": True,
              "pattern_preserved": True,
              "one_surface_collapse_allowed": False,
              "bic_computed": False,
              "likelihood_computed": False,
              "refit_allowed": False,
              "model_claim_allowed": False,
              "new_pressure_scores_built": False,
              "next_rule": "Write a clean milestone handoff and robustness plan after the guarded diagnostic checkpoint."
          }

          WHAT_WE_KNOW_ROWS = [
              {
                  "section": "what_we_know",
                  "item": "frozen_low_z_gate_failed_as_direct_correction",
                  "status": "locked_closed",
                  "meaning": "The frozen low-z gate should not be used as an SN, BAO, or CMB ruler correction.",
                  "boundary": "Do not revive it as a direct correction without a new reason and new test design."
              },
              {
                  "section": "what_we_know",
                  "item": "one_global_pressure_surface_failed",
                  "status": "locked_closed",
                  "meaning": "The project should not force reach/geometry and growth/consolidation into one global correction surface.",
                  "boundary": "No one-surface shortcut."
              },
              {
                  "section": "what_we_know",
                  "item": "h0licow_reach_diagnostic_survived",
                  "status": "source_specific_reach_candidate",
                  "meaning": "H0LiCOW carried coherent negative Ddt pressure normalized to local-H0-high-equivalent reach-positive direction.",
                  "boundary": "Diagnostic reach candidate only, not H0 solution."
              },
              {
                  "section": "what_we_know",
                  "item": "kids_planck_growth_diagnostic_survived",
                  "status": "source_specific_growth_row",
                  "meaning": "KiDS weighted S8 compared to Planck derived S8 produced a reviewed negative consolidation/growth pressure row.",
                  "boundary": "Diagnostic growth row only, not validation."
              },
              {
                  "section": "what_we_know",
                  "item": "bao_boundary_preserved",
                  "status": "auxiliary_mixed_ruler_boundary",
                  "meaning": "BAO remains mixed/subfamily and cannot be promoted to global reach anchor.",
                  "boundary": "BAO is boundary context, not the main reach proof."
              },
              {
                  "section": "what_we_know",
                  "item": "v3_56_checkpoint_preserved_pattern",
                  "status": "diagnostic_checkpoint_passed",
                  "meaning": "The checkpoint preserved reach-positive-equivalent H0LiCOW and consolidation-negative KiDS without collapsing them.",
                  "boundary": "Pattern preserved inside checkpoint, not model validation."
              }
          ]

          WHAT_WE_DO_NOT_KNOW_ROWS = [
              {
                  "section": "what_we_do_not_know",
                  "item": "des_hsc_source_specific_survival",
                  "status": "unknown",
                  "meaning": "We do not know whether DES and HSC source-specific growth products preserve the KiDS/Planck negative consolidation pattern.",
                  "needed_test": "DES/HSC direct product repair and source-specific parser design."
              },
              {
                  "section": "what_we_do_not_know",
                  "item": "planck_covariance_effect",
                  "status": "unknown",
                  "meaning": "We do not know how Planck covariance or chain-level S8 uncertainty changes the KiDS pressure row.",
                  "needed_test": "Planck covariance or chain upgrade."
              },
              {
                  "section": "what_we_do_not_know",
                  "item": "shoes_parser_repair",
                  "status": "unknown",
                  "meaning": "We do not know whether SH0ES can safely return as a source-specific local-ladder reach lane.",
                  "needed_test": "SH0ES safer parser or explicitly sourced product repair."
              },
              {
                  "section": "what_we_do_not_know",
                  "item": "tdcosmo_provenance_repair",
                  "status": "unknown",
                  "meaning": "We do not know whether TDCOSMO can safely join the time-delay reach lane after provenance repair.",
                  "needed_test": "TDCOSMO observational provenance review."
              },
              {
                  "section": "what_we_do_not_know",
                  "item": "full_likelihood_model",
                  "status": "unknown",
                  "meaning": "We do not know whether the diagnostic pattern survives a true likelihood/covariance model.",
                  "needed_test": "Only later, after source-specific lanes and covariance products are mature."
              },
              {
                  "section": "what_we_do_not_know",
                  "item": "tairid_validation",
                  "status": "not_established",
                  "meaning": "We still do not have proof of TAIRID.",
                  "needed_test": "Many independent, source-specific, covariance-aware tests across lanes."
              }
          ]

          WHAT_WE_DISCOVERED_ROWS = [
              {
                  "section": "what_we_discovered",
                  "item": "not_one_correction_for_everything",
                  "meaning": "The work keeps showing that one correction term cannot be pasted onto every cosmology tension.",
                  "project_relevance": "This matches the TAIRID idea that different surfaces have different boundary, reach, and consolidation behavior."
              },
              {
                  "section": "what_we_discovered",
                  "item": "reach_and_consolidation_need_separate_handling",
                  "meaning": "Reach/geometry pressure and growth/consolidation pressure behave as different roles, not one container.",
                  "project_relevance": "This is the clearest current operational bridge from the book language into tests."
              },
              {
                  "section": "what_we_discovered",
                  "item": "source_specific_parsing_matters",
                  "meaning": "The strongest progress came when we stopped using hand-entered summary anchors and parsed real KiDS and Planck source products.",
                  "project_relevance": "TAIRID testing needs grounded inputs, not loose matching."
              },
              {
                  "section": "what_we_discovered",
                  "item": "book_logic_is_becoming_test_design",
                  "meaning": "The book's environment, boundary, propagation, and consolidation logic is becoming a way to sort cosmology observables into testable roles.",
                  "project_relevance": "The philosophy is not proof, but it has started producing better test design."
              },
              {
                  "section": "what_we_discovered",
                  "item": "guardrails_prevented_false_victory",
                  "meaning": "Several tempting claims were blocked: frozen gate correction, SN threshold claim, BAO global reach anchor, and validation language.",
                  "project_relevance": "The failures are useful because they narrowed the live lane."
              }
          ]

          BLOCKED_ROWS = [
              {
                  "section": "what_remains_blocked",
                  "item": "validation_claim",
                  "blocked_status": "hard_blocked",
                  "reason": "Diagnostic pressure patterns are not proof.",
                  "allowed_replacement": "Say the checkpoint preserves a pattern worth deeper testing."
              },
              {
                  "section": "what_remains_blocked",
                  "item": "h0_solution_claim",
                  "blocked_status": "hard_blocked",
                  "reason": "No full H0 model fit has been run or validated.",
                  "allowed_replacement": "Say H0LiCOW is a diagnostic reach-positive-equivalent candidate."
              },
              {
                  "section": "what_remains_blocked",
                  "item": "standard_cosmology_disproof",
                  "blocked_status": "hard_blocked",
                  "reason": "No result here disproves standard cosmology.",
                  "allowed_replacement": "Say the pattern is a pressure-organization result."
              },
              {
                  "section": "what_remains_blocked",
                  "item": "bao_global_reach_anchor",
                  "blocked_status": "hard_blocked",
                  "reason": "BAO remains mixed/ruler and cannot be folded into global reach.",
                  "allowed_replacement": "Use BAO as auxiliary boundary."
              },
              {
                  "section": "what_remains_blocked",
                  "item": "refit_bic_likelihood_model_selection",
                  "blocked_status": "hard_blocked",
                  "reason": "Current artifacts are diagnostic rows and ledgers, not a full likelihood model.",
                  "allowed_replacement": "Plan source-specific robustness tests first."
              }
          ]

          ROBUSTNESS_ROWS = [
              {
                  "priority": 1,
                  "lane": "des_hsc_growth_product_repair",
                  "purpose": "Test whether the KiDS negative growth/consolidation direction survives other source-specific growth families.",
                  "why_this_matters": "This is the best next robustness test for the growth/consolidation surface.",
                  "first_clean_step": "Find explicit DES and HSC chains/covariance/data-vector products and preserve family boundaries.",
                  "do_not_do": "Do not substitute hand-entered summary anchors for source-specific products."
              },
              {
                  "priority": 2,
                  "lane": "planck_covariance_or_chain_upgrade",
                  "purpose": "Improve the Planck S8 baseline uncertainty beyond diagonal marginal propagation.",
                  "why_this_matters": "The KiDS pressure z depends on uncertainty handling.",
                  "first_clean_step": "Inventory Planck chains/covariance for sigma8-Omega_m covariance or direct S8 posterior.",
                  "do_not_do": "Do not retroactively overclaim v3.53/v3.54."
              },
              {
                  "priority": 3,
                  "lane": "shoes_parser_repair",
                  "purpose": "See whether SH0ES can safely re-enter the reach lane with source-labeled rows.",
                  "why_this_matters": "This would strengthen or clarify the local reach side.",
                  "first_clean_step": "Repair parser provenance and extract labeled local-ladder H0 rows.",
                  "do_not_do": "Do not use unlabeled numeric output."
              },
              {
                  "priority": 4,
                  "lane": "tdcosmo_provenance_repair",
                  "purpose": "Determine whether TDCOSMO can join the time-delay reach lane.",
                  "why_this_matters": "This checks whether the H0LiCOW time-delay signal is robust across time-delay sources.",
                  "first_clean_step": "Separate observational products from seed/style rows and review provenance.",
                  "do_not_do": "Do not treat seed-style rows as observational anchors."
              },
              {
                  "priority": 5,
                  "lane": "human_writeup",
                  "purpose": "Write a plain-language checkpoint paper or project note explaining the reset and what changed.",
                  "why_this_matters": "This helps the user see the shape of the work after many tests.",
                  "first_clean_step": "Convert the handoff into a readable narrative with truth boundaries.",
                  "do_not_do": "Do not write it as proof."
              }
          ]

          NEXT_THREAD_START = """TAIRID COSMOLOGY v3.57 HANDOFF / REACH-CONSOLIDATION CHECKPOINT

          Current status:
          v3.56 passed.

          Readiness label:
          guarded_reach_consolidation_comparison_checkpoint_passed_ready_for_handoff_and_robustness_plan

          Failed gates:
          none

          Truth boundary:
          This does not validate TAIRID.
          This does not solve H0.
          This does not prove new physics.
          This does not disprove standard cosmology.
          This does not run a refit, BIC, likelihood, posterior, or model comparison.
          This preserves a diagnostic reach/consolidation pattern worth deeper testing.

          What is now live:
          H0LiCOW = source-specific reach diagnostic, normalized as reach_positive_equivalent.
          KiDS-1000 / Planck = source-specific growth diagnostic, negative_consolidation_growth_pressure.
          BAO = auxiliary mixed/ruler boundary, not global reach anchor.

          Key numbers:
          H0LiCOW mean pressure z: -1.6268644558220158 raw Ddt pressure; normalized to reach_positive_equivalent.
          KiDS/Planck S8 pressure z: -3.290445079818788.
          KiDS S8 q50: 0.764565.
          Planck derived S8: 0.8340746027338657.
          Direction: negative_consolidation_growth_pressure.

          What is locked closed:
          Frozen low-z gate as direct correction.
          SN threshold activation claim.
          One global pressure surface.
          BAO as global reach anchor.
          DESI mapped reach as independent anchor.

          What remains parked:
          SH0ES parser repair.
          TDCOSMO provenance repair.

          Best next robustness choices:
          1. DES/HSC growth product repair.
          2. Planck covariance or chain upgrade.
          3. SH0ES parser repair.
          4. TDCOSMO provenance repair.
          5. Human-readable checkpoint write-up.

          Current interpretation:
          The strongest live lane is not one correction that fits everything.
          The live lane is role-specific:
          reach / geometry / propagation-accessibility stays separate from growth / consolidation / structure formation.
          This matches the book's environment, boundary, propagation, and consolidation logic as a test-design pattern, not as proof.
          """

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          created_at = now_iso()

          write_csv(
              OUTDIR / "handoff_what_we_know_v3_57.csv",
              WHAT_WE_KNOW_ROWS,
              ["section", "item", "status", "meaning", "boundary"]
          )

          write_csv(
              OUTDIR / "handoff_what_we_do_not_know_v3_57.csv",
              WHAT_WE_DO_NOT_KNOW_ROWS,
              ["section", "item", "status", "meaning", "needed_test"]
          )

          write_csv(
              OUTDIR / "handoff_what_we_discovered_v3_57.csv",
              WHAT_WE_DISCOVERED_ROWS,
              ["section", "item", "meaning", "project_relevance"]
          )

          write_csv(
              OUTDIR / "handoff_blocked_claims_and_paths_v3_57.csv",
              BLOCKED_ROWS,
              ["section", "item", "blocked_status", "reason", "allowed_replacement"]
          )

          write_csv(
              OUTDIR / "handoff_robustness_options_v3_57.csv",
              ROBUSTNESS_ROWS,
              ["priority", "lane", "purpose", "why_this_matters", "first_clean_step", "do_not_do"]
          )

          (OUTDIR / "COPY_PASTE_START_NEXT_THREAD_v3_57.md").write_text(NEXT_THREAD_START, encoding="utf-8")

          sections_present = {
              "what_we_know": len(WHAT_WE_KNOW_ROWS) > 0,
              "what_we_do_not_know": len(WHAT_WE_DO_NOT_KNOW_ROWS) > 0,
              "what_we_discovered": len(WHAT_WE_DISCOVERED_ROWS) > 0,
              "what_remains_blocked": len(BLOCKED_ROWS) > 0,
              "next_robustness_options": len(ROBUSTNESS_ROWS) >= 5,
              "next_thread_start": "TAIRID COSMOLOGY v3.57 HANDOFF" in NEXT_THREAD_START
          }

          blocked_claims_preserved = all(row["blocked_status"] == "hard_blocked" for row in BLOCKED_ROWS)
          robustness_ranked = [row["priority"] for row in ROBUSTNESS_ROWS] == sorted([row["priority"] for row in ROBUSTNESS_ROWS])
          truth_boundary_present = len(TRUTH_BOUNDARY) >= 10
          v3_56_passed_recorded = PREVIOUS_MILESTONE["v3_56_status"] == "guarded_reach_consolidation_comparison_checkpoint_passed_ready_for_handoff_and_robustness_plan"

          no_refit = True
          no_bic = True
          no_likelihood = True
          no_new_pressure_scores = True
          model_claim_allowed = False

          audit_rows = [
              {
                  "audit_gate": "v3_56_passed_recorded",
                  "pass": v3_56_passed_recorded,
                  "value": PREVIOUS_MILESTONE["v3_56_status"],
                  "boundary": "Handoff must start from the passed v3.56 checkpoint."
              },
              {
                  "audit_gate": "truth_boundary_present",
                  "pass": truth_boundary_present,
                  "value": len(TRUTH_BOUNDARY),
                  "boundary": "Handoff must preserve truth boundaries."
              },
              {
                  "audit_gate": "all_required_sections_present",
                  "pass": all(sections_present.values()),
                  "value": json.dumps(sections_present, sort_keys=True),
                  "boundary": "Handoff must include knowns, unknowns, discoveries, blocked paths, robustness options, and next-thread start."
              },
              {
                  "audit_gate": "blocked_claims_preserved",
                  "pass": blocked_claims_preserved,
                  "value": blocked_claims_preserved,
                  "boundary": "Validation, H0 solution, standard-cosmology-disproof, BAO-anchor, and refit/model-selection claims remain blocked."
              },
              {
                  "audit_gate": "robustness_options_ranked",
                  "pass": robustness_ranked,
                  "value": len(ROBUSTNESS_ROWS),
                  "boundary": "Next work should be explicit and ranked."
              },
              {
                  "audit_gate": "no_refit_bic_likelihood_or_new_score",
                  "pass": no_refit and no_bic and no_likelihood and no_new_pressure_scores,
                  "value": f"refit={no_refit}; bic={no_bic}; likelihood={no_likelihood}; new_scores={no_new_pressure_scores}",
                  "boundary": "v3.57 is handoff only."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": model_claim_allowed,
                  "boundary": "No model claim is allowed."
              }
          ]

          write_csv(
              OUTDIR / "handoff_and_robustness_plan_audit_v3_57.csv",
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          hard_failed = []

          if not v3_56_passed_recorded:
              hard_failed.append("v3_56_pass_status_not_recorded")
          if not truth_boundary_present:
              hard_failed.append("truth_boundary_missing")
          if not all(sections_present.values()):
              hard_failed.append("required_handoff_sections_missing")
          if not blocked_claims_preserved:
              hard_failed.append("blocked_claims_not_preserved")
          if not robustness_ranked:
              hard_failed.append("robustness_options_not_ranked")
          if not (no_refit and no_bic and no_likelihood and no_new_pressure_scores):
              hard_failed.append("handoff_action_guard_violation")

          if hard_failed:
              readiness_label = "reach_consolidation_checkpoint_handoff_needs_followup"
          else:
              readiness_label = "reach_consolidation_checkpoint_handoff_passed_ready_for_new_thread_or_robustness_lane"

          next_allowed_step = (
              "Start a new thread from COPY_PASTE_START_NEXT_THREAD_v3_57.md, then choose one robustness lane: DES/HSC growth repair, Planck covariance upgrade, SH0ES parser repair, TDCOSMO provenance repair, or a human-readable checkpoint write-up."
              if not hard_failed
              else "Repair the v3.57 handoff sections and truth boundary before starting a new thread."
          )

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "previous_milestone": PREVIOUS_MILESTONE,
              "truth_boundary": TRUTH_BOUNDARY,
              "sections_present": sections_present,
              "what_we_know_count": len(WHAT_WE_KNOW_ROWS),
              "what_we_do_not_know_count": len(WHAT_WE_DO_NOT_KNOW_ROWS),
              "what_we_discovered_count": len(WHAT_WE_DISCOVERED_ROWS),
              "blocked_count": len(BLOCKED_ROWS),
              "robustness_option_count": len(ROBUSTNESS_ROWS),
              "gate_result": {
                  "failed_gates": hard_failed,
                  "readiness_label": readiness_label,
                  "v3_56_checkpoint_passed": v3_56_passed_recorded,
                  "handoff_complete": not hard_failed,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "new_pressure_scores_built": False,
                  "recommended_next_step": next_allowed_step
              }
          }

          json_path = OUTDIR / "tairid_cosmology_v3_57_reach_consolidation_checkpoint_handoff_and_robustness_plan.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.57 — Reach / Consolidation Checkpoint Handoff and Robustness Plan")
          md.append("")
          md.append(f"Created UTC: `{created_at}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(hard_failed) if hard_failed else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What we know")
          md.append("")
          for row in WHAT_WE_KNOW_ROWS:
              md.append(f"- **{row['item']}** — {row['meaning']} Boundary: {row['boundary']}")
          md.append("")
          md.append("## What we do not know yet")
          md.append("")
          for row in WHAT_WE_DO_NOT_KNOW_ROWS:
              md.append(f"- **{row['item']}** — {row['meaning']} Needed test: {row['needed_test']}")
          md.append("")
          md.append("## What we discovered")
          md.append("")
          for row in WHAT_WE_DISCOVERED_ROWS:
              md.append(f"- **{row['item']}** — {row['meaning']} Project relevance: {row['project_relevance']}")
          md.append("")
          md.append("## What remains blocked")
          md.append("")
          for row in BLOCKED_ROWS:
              md.append(f"- **{row['item']}** — {row['reason']} Use instead: {row['allowed_replacement']}")
          md.append("")
          md.append("## Next robustness options")
          md.append("")
          md.append("| Priority | Lane | Why it matters | First clean step |")
          md.append("|---:|---|---|---|")
          for row in ROBUSTNESS_ROWS:
              md.append(f"| {row['priority']} | `{row['lane']}` | {row['why_this_matters']} | {row['first_clean_step']} |")
          md.append("")
          md.append("## Recommended next move")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `handoff_what_we_know_v3_57.csv`")
          md.append("- `handoff_what_we_do_not_know_v3_57.csv`")
          md.append("- `handoff_what_we_discovered_v3_57.csv`")
          md.append("- `handoff_blocked_claims_and_paths_v3_57.csv`")
          md.append("- `handoff_robustness_options_v3_57.csv`")
          md.append("- `COPY_PASTE_START_NEXT_THREAD_v3_57.md`")
          md.append("- `handoff_and_robustness_plan_audit_v3_57.csv`")
          md.append("- `tairid_cosmology_v3_57_reach_consolidation_checkpoint_handoff_and_robustness_plan.json`")
          md.append("- `tairid_cosmology_v3_57_reach_consolidation_checkpoint_handoff_and_robustness_plan.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_57_reach_consolidation_checkpoint_handoff_and_robustness_plan.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if hard_failed:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.57 checkpoint handoff and robustness plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-57-reach-consolidation-checkpoint-handoff-and-robustness-plan
          path: artifacts/tairid_cosmology_v3_57/
