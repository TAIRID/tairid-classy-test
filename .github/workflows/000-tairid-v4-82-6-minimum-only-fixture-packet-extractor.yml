                  "primary_values_valid": primary_inputs_extracted,
                  "exact_token_guard_passed": exact_token_guard_passed,
                  "sigma_fsigma_pair_values_distinct": pair_values_distinct
              }

              return fixture_packet, minimum_value_records, paramname_label_records, sigma_fsigma_pair_records

          failed_gates = []
          warnings = [
              "minimum_only_fixture_packet_extractor",
              "chain_row_dependency_removed",
              "profiled_token_layout_used",
              "bounded_range_reads_only",
              "no_CAMB_run",
