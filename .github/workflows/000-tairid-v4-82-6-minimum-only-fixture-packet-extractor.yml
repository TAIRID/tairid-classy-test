name: 000 TAIRID v4.82.6 Minimum-Only Fixture Packet Extractor

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-82-6-minimum-only-fixture-packet-extractor.yml"

jobs:
  tairid-v4-82-6-minimum-only-fixture-packet-extractor:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.82.6 minimum-only fixture packet extractor
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_82_6_minimum_only_fixture_packet_extractor

          python - <<'PY'
          import csv
          import hashlib
          import json
          import math
          import re
          import struct
          import urllib.request
          import zlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_82_6_minimum_only_fixture_packet_extractor")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_82_6_minimum_only_fixture_packet_extractor"

          FULL_GRID_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip"

          FULLGRID_CONTENT_LENGTH_EXPECTED = 11805855817
          ZIP64_CENTRAL_DIRECTORY_OFFSET = 11803187830
          ZIP64_CENTRAL_DIRECTORY_SIZE = 2667889

          MAX_RANGE_READ_BYTES = 5_000_000
          MAX_MINIMUM_COMPRESSED_BYTES = 400_000
          MAX_PARAMNAMES_COMPRESSED_BYTES = 100_000

          SELECTED_PREFIXES = [
              "base/plikHM_TTTEEE_lowl_lowE/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing/",
              "base/plikHM_TT_lowl_lowE/",
              "base/plikHM_TT_lowl_lowE_lensing/",
              "base/plikHM_TTTEEE_lowl_lowE_BAO/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing_BAO/"
          ]

          PRIMARY_INPUTS = ["omegabh2", "omegach2", "theta", "tau", "logA", "ns"]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          SIDE_CAR_TARGET_NAMES = []
          for row in TARGET_REDSHIFTS:
              SIDE_CAR_TARGET_NAMES.append(row["sigma8z_name"])
              SIDE_CAR_TARGET_NAMES.append(row["fsigma8_name"])

          ALL_MINIMUM_TARGETS = PRIMARY_INPUTS + SIDE_CAR_TARGET_NAMES

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This does not derive H0, Omega_m, sigma8, sigma8z, or fsigma8z.",
              "This uses the v4.82.4 observed .minimum row format: index value target_name label.",
              "This avoids the brittle chain-row dependency and extracts one fixture packet from .minimum only.",
              "A pass means one minimum-only fixture input/target packet exists for a later tiny CAMB fixture run, not that reference uncertainty is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_82_5_sidecar_exact_extractor_from_profile": {
                  "status": "failed",
                  "observed_rule_pass_count": "10/16",
                  "known_issue": "combined chain-row plus sidecar extractor remained too brittle",
                  "fixture_run_allowed_now": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_82_4_sidecar_format_profiler": {
                  "readiness_label": "sidecar_format_profiler_passed_ready_for_exact_extractor_design",
                  "observed_row_format": "index value target_name label",
                  "selected_minimum_member_count": 6,
                  "fetched_minimum_count": 6,
                  "exact_target_line_count": 60,
                  "substring_only_target_line_count": 30,
                  "sidecar_values_accepted_for_CAMB": False,
                  "solver_cosmology_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              }
          }

          BLOCKED_SHORTCUTS = [
              {
                  "shortcut": "chain_row_required_for_single_fixture",
                  "status": "blocked",
                  "reason": "The .minimum file already contains the primary inputs and fixture targets needed for a point fixture."
              },
              {
                  "shortcut": "substring_sidecar_target_match",
                  "status": "blocked",
                  "reason": "sigma8z015 must not match inside fsigma8z015."
              },
              {
                  "shortcut": "regex_guess_sidecar_layout",
                  "status": "blocked",
                  "reason": "Use the profiled token layout: tokens[0]=index, tokens[1]=value, tokens[2]=target_name."
              },
              {
                  "shortcut": "run_CAMB_now",
                  "status": "blocked",
                  "reason": "This step extracts a minimum-only point fixture packet only."
              },
              {
                  "shortcut": "theta_to_H0_now",
                  "status": "blocked",
                  "reason": "Theta label/scaling is recorded but not converted into H0 here."
              },
              {
                  "shortcut": "logA_to_sigma8_now",
                  "status": "blocked",
                  "reason": "logA is not sigma8; no transfer/growth calculation is run."
              },
              {
                  "shortcut": "sidecar_minimum_as_covariance",
                  "status": "blocked",
                  "reason": "Sidecars and .minimum values are point fixtures only."
              },
              {
                  "shortcut": "single_fixture_packet_equals_reference_uncertainty",
                  "status": "blocked",
                  "reason": "One fixture packet is not posterior covariance."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "CAMB was used to compute fsigma8.",
              "CAMB produced cosmology outputs.",
              "A CAMB fixture was run.",
              "H0 was derived.",
              "Omega_m was derived.",
              "sigma8 was derived.",
              "fsigma8 was derived.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_83_CAMB_tiny_single_fixture_run",
                  "purpose": "Run one tiny CAMB fixture using the minimum-only input/target packet.",
                  "why_next": "The point fixture packet no longer depends on brittle chain-row parsing."
              },
              {
                  "priority": 2,
                  "route_id": "v4_83_theta_mapping_repair_if_needed",
                  "purpose": "Repair theta/H0 mapping if CAMB cannot use the recorded theta label directly.",
                  "why_next": "Theta is recorded as a fixture input but must still be handled carefully."
              },
              {
                  "priority": 3,
                  "route_id": "v4_83_ELG_grid_member_probe",
                  "purpose": "Parallel route: continue parked ELG backlog.",
                  "why_next": "Full eBOSS remains incomplete without ELG handling."
              },
              {
                  "priority": 4,
                  "route_id": "v4_83_WiggleZ_product_locator_followup",
                  "purpose": "Parallel route: continue parked WiggleZ backlog.",
                  "why_next": "WiggleZ remains unresolved."
              }
          ]

          def is_plausible_minimum_value(name, value):
              if value is None or not math.isfinite(value):
                  return False

              if name == "omegabh2":
                  return 0.005 < value < 0.04
              if name == "omegach2":
                  return 0.05 < value < 0.30
              if name == "theta":
                  return 0.5 < value < 2.0
              if name == "tau":
                  return 0.01 < value < 0.20
              if name == "logA":
                  return 2.0 < value < 4.0
              if name == "ns":
                  return 0.8 < value < 1.2
              if "sigma8z" in name.lower() or "fsigma8z" in name.lower():
                  return 0.0 < value < 2.0

              return False

          def extract_value_by_profiled_tokens(text, target_name):
              near_miss_count = 0

              for line_number, raw_line in enumerate(text.splitlines(), start=1):
                  line = raw_line.strip()
                  if not line:
                      continue

                  if target_name in line:
                      near_miss_count += 1

                  tokens = line.split()

                  # v4.82.4 observed format:
                  # index value target_name label
                  if len(tokens) < 3:
                      continue

                  row_index_token = tokens[0]
                  value_token = tokens[1]
                  name_token = tokens[2]
                  label = " ".join(tokens[3:]) if len(tokens) > 3 else ""

                  if name_token != target_name:
                      continue

                  try:
                      row_index = int(row_index_token)
                  except Exception:
                      return {
                          "found": False,
                          "value": None,
                          "line_number": line_number,
                          "row_index": "",
                          "matched_token": name_token,
                          "label": label,
                          "token_count": len(tokens),
                          "near_miss_count": near_miss_count,
                          "exact_token_guard_passed": name_token == target_name,
                          "plausible_value": False,
                          "evidence_line": line[:300],
                          "error": "row_index_parse_failed"
                      }

                  try:
                      value = float(value_token)
                  except Exception:
                      return {
                          "found": False,
                          "value": None,
                          "line_number": line_number,
                          "row_index": row_index,
                          "matched_token": name_token,
                          "label": label,
                          "token_count": len(tokens),
                          "near_miss_count": near_miss_count,
                          "exact_token_guard_passed": name_token == target_name,
                          "plausible_value": False,
                          "evidence_line": line[:300],
                          "error": "value_parse_failed"
                      }

                  return {
                      "found": True,
                      "value": value,
                      "line_number": line_number,
                      "row_index": row_index,
                      "matched_token": name_token,
                      "label": label,
                      "token_count": len(tokens),
                      "near_miss_count": near_miss_count,
                      "exact_token_guard_passed": name_token == target_name,
                      "plausible_value": is_plausible_minimum_value(target_name, value),
                      "evidence_line": line[:300],
                      "error": ""
                  }

              return {
                  "found": False,
                  "value": None,
                  "line_number": "",
                  "row_index": "",
                  "matched_token": "",
                  "label": "",
                  "token_count": "",
                  "near_miss_count": near_miss_count,
                  "exact_token_guard_passed": False,
                  "plausible_value": False,
                  "evidence_line": "",
                  "error": "exact_profiled_token_not_found"
              }

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }
              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={"User-Agent": "TAIRID-v4.82.6-minimum-only-fixture-packet-extractor/1.0", "Accept": "*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }
              data = b""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.82.6-minimum-only-fixture-packet-extractor/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )
                  with urllib.request.urlopen(req, timeout=180) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)
                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, data

          def classify_member(name):
              lower = name.lower()
              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".paramnames"):
                  return "paramnames"
              if lower.endswith(".minimum"):
                  return "minimum"
              if re.search(r"_\d+\.txt$", name):
                  return "chain_sample_text_member_prefix_only"
              return "other"

          def parse_zip64_extra(extra_bytes, need_uncompressed, need_compressed, need_local_offset):
              result = {}
              pos = 0
              while pos + 4 <= len(extra_bytes):
                  header_id, data_size = struct.unpack_from("<HH", extra_bytes, pos)
                  data_start = pos + 4
                  data_end = data_start + data_size
                  if data_end > len(extra_bytes):
                      break

                  data = extra_bytes[data_start:data_end]
                  if header_id == 0x0001:
                      subpos = 0
                      if need_uncompressed and subpos + 8 <= len(data):
                          result["uncompressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_compressed and subpos + 8 <= len(data):
                          result["compressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_local_offset and subpos + 8 <= len(data):
                          result["local_header_offset"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                  pos = data_end
              return result

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0

              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break

                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)
                      compression_method = fields[4]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      extra_start = name_end
                      extra_end = extra_start + extra_len
                      comment_end = extra_end + comment_len

                      if comment_end > len(cd_bytes):
                          break

                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")
                      extra = cd_bytes[extra_start:extra_end]

                      zip64_extra = parse_zip64_extra(
                          extra,
                          need_uncompressed=uncompressed_size == 0xFFFFFFFF,
                          need_compressed=compressed_size == 0xFFFFFFFF,
                          need_local_offset=local_header_offset == 0xFFFFFFFF
                      )

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compression_method": compression_method,
                          "compressed_size": zip64_extra.get("compressed_size", compressed_size),
                          "uncompressed_size": zip64_extra.get("uncompressed_size", uncompressed_size),
                          "local_header_offset": zip64_extra.get("local_header_offset", local_header_offset),
                          "zip64_extra_used": bool(zip64_extra)
                      })

                      pos = comment_end

                  except Exception:
                      break

              return records

          def root_from_paramnames(name):
              return name[:-len(".paramnames")] if name.endswith(".paramnames") else name

          def root_from_minimum(name):
              return name[:-len(".minimum")] if name.endswith(".minimum") else name

          def fetch_member_bytes(member_record, max_member_compressed_bytes):
              offset = int(member_record["local_header_offset"])
              compressed_size = int(member_record["compressed_size"])

              if compressed_size <= 0:
                  raise RuntimeError("compressed_size_not_positive")

              header_record, header_data = range_probe(
                  "local_header_probe",
                  FULL_GRID_URL,
                  f"bytes={offset}-{offset + 4095}",
                  4096
              )

              if not header_record["ok"] or not header_record["server_honored_range"]:
                  raise RuntimeError("local_header_range_not_available")

              if len(header_data) < 30:
                  raise RuntimeError("local_header_too_short")

              if header_data[:4] != b"PK\x03\x04":
                  raise RuntimeError("local_header_signature_not_found")

              fields = struct.unpack_from("<4s5H3L2H", header_data, 0)
              compression_method = fields[3]
              file_name_len = fields[9]
              extra_len = fields[10]
              data_start = offset + 30 + file_name_len + extra_len

              bytes_to_fetch = min(compressed_size, max_member_compressed_bytes)
              data_end = data_start + bytes_to_fetch - 1

              data_record, compressed_data = range_probe(
                  "member_payload_probe",
                  FULL_GRID_URL,
                  f"bytes={data_start}-{data_end}",
                  bytes_to_fetch + 1024
              )

              if not data_record["ok"] or not data_record["server_honored_range"]:
                  raise RuntimeError("member_payload_range_not_available")

              if data_record["truncated_by_guard"]:
                  raise RuntimeError("member_payload_truncated_by_guard")

              if compression_method == 0:
                  payload = compressed_data
              elif compression_method == 8:
                  decompressor = zlib.decompressobj(-15)
                  payload = decompressor.decompress(compressed_data)
              else:
                  raise RuntimeError(f"unsupported_compression_method_{compression_method}")

              return payload, compression_method, data_record

          def parse_paramnames_text(text):
              rows = []
              names = []
              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  parts = line.split(None, 1)
                  name = parts[0]
                  label = parts[1] if len(parts) > 1 else ""
                  rows.append({"name": name, "label": label})
                  names.append(name)
              return rows, names

          def select_minimum_fixture_candidates(manifest_records):
              param_by_root = {}
              minimum_by_root = {}

              for row in manifest_records:
                  name = row["member_name"]
                  if not any(name.startswith(prefix) for prefix in SELECTED_PREFIXES):
                      continue

                  if row["member_type"] == "paramnames":
                      param_by_root[root_from_paramnames(name)] = row
                  elif row["member_type"] == "minimum":
                      minimum_by_root[root_from_minimum(name)] = row

              candidates = []
              for root in sorted(minimum_by_root):
                  candidates.append({
                      "root": root,
                      "minimum_member": minimum_by_root[root],
                      "paramnames_member": param_by_root.get(root)
                  })

              return candidates

          def try_extract_candidate(candidate):
              root = candidate["root"]
              minimum_payload, _, _ = fetch_member_bytes(candidate["minimum_member"], MAX_MINIMUM_COMPRESSED_BYTES)
              minimum_text = minimum_payload.decode("utf-8", errors="replace")

              minimum_value_records = []
              values_by_name = {}

              for target_name in ALL_MINIMUM_TARGETS:
                  result = extract_value_by_profiled_tokens(minimum_text, target_name)
                  record = {
                      "root": root,
                      "minimum_member_name": candidate["minimum_member"]["member_name"],
                      "target_name": target_name,
                      "target_type": "primary_input" if target_name in PRIMARY_INPUTS else "sidecar_output",
                      "found": result["found"],
                      "value": result["value"] if result["found"] else "",
                      "line_number": result["line_number"],
                      "row_index": result["row_index"],
                      "matched_token": result["matched_token"],
                      "label": result["label"],
                      "token_count": result["token_count"],
                      "near_miss_count": result["near_miss_count"],
                      "exact_token_guard_passed": result["exact_token_guard_passed"],
                      "plausible_value": result["plausible_value"],
                      "evidence_line": result["evidence_line"],
                      "error": result["error"],
                      "source_status": "minimum_point_fixture_not_covariance"
                  }
                  minimum_value_records.append(record)

                  if record["found"]:
                      values_by_name[target_name] = float(record["value"])

              primary_records = [row for row in minimum_value_records if row["target_type"] == "primary_input"]
              sidecar_records = [row for row in minimum_value_records if row["target_type"] == "sidecar_output"]

              primary_inputs_extracted = all(row["found"] and row["plausible_value"] for row in primary_records)
              sidecar_targets_extracted = all(row["found"] and row["plausible_value"] for row in sidecar_records)
              exact_token_guard_passed = all(row["found"] and row["matched_token"] == row["target_name"] for row in minimum_value_records)

              sigma_fsigma_pair_records = []
              pair_values_distinct = True

              for redshift_row in TARGET_REDSHIFTS:
                  sigma_name = redshift_row["sigma8_name"]
                  fsigma_name = redshift_row["fsigma8_name"]
                  sigma_value = values_by_name.get(sigma_name)
                  fsigma_value = values_by_name.get(fsigma_name)

                  distinct = (
                      sigma_value is not None
                      and fsigma_value is not None
                      and not math.isclose(sigma_value, fsigma_value, rel_tol=0.0, abs_tol=1e-12)
                  )

                  if not distinct:
                      pair_values_distinct = False

                  sigma_fsigma_pair_records.append({
                      "z_key": redshift_row["z_key"],
                      "z": redshift_row["z"],
                      "sigma8_name": sigma_name,
                      "sigma8_value": sigma_value if sigma_value is not None else "",
                      "fsigma8_name": fsigma_name,
                      "fsigma8_value": fsigma_value if fsigma_value is not None else "",
                      "values_distinct": distinct
                  })

              paramname_label_records = []
              paramnames_member_name = ""
              paramnames_available = candidate["paramnames_member"] is not None

              if candidate["paramnames_member"] is not None:
                  try:
                      param_payload, _, _ = fetch_member_bytes(candidate["paramnames_member"], MAX_PARAMNAMES_COMPRESSED_BYTES)
                      param_text = param_payload.decode("utf-8", errors="replace")
                      param_rows, _ = parse_paramnames_text(param_text)
                      labels_by_name = {row["name"]: row["label"] for row in param_rows}
                      paramnames_member_name = candidate["paramnames_member"]["member_name"]

                      for name in PRIMARY_INPUTS:
                          paramname_label_records.append({
                              "root": root,
                              "parameter_name": name,
                              "present": name in labels_by_name,
                              "label": labels_by_name.get(name, ""),
                              "source_status": "optional_paramnames_crosscheck"
                          })

                  except Exception as exc:
                      paramname_label_records.append({
                          "root": root,
                          "parameter_name": "paramnames_fetch_error",
                          "present": False,
                          "label": "",
                          "source_status": f"{type(exc).__name__}: {exc}"
                      })

              theta_label = next((row["label"] for row in minimum_value_records if row["target_name"] == "theta"), "")
              logA_label = next((row["label"] for row in minimum_value_records if row["target_name"] == "logA"), "")

              fixture_packet = {
                  "root": root,
                  "minimum_member_name": candidate["minimum_member"]["member_name"],
                  "paramnames_member_name": paramnames_member_name,
                  "paramnames_available": paramnames_available,
                  "theta_label": theta_label,
                  "logA_label": logA_label,
                  "theta_scaling_status": "minimum_label_observed_requires_later_CAMB_mapping",
                  "logA_to_As_status": "minimum_label_observed_supports_later_As_mapping_but_no_solver_run_now",
                  "fixture_values_extracted": bool(
                      primary_inputs_extracted
                      and sidecar_targets_extracted
                      and exact_token_guard_passed
                      and pair_values_distinct
                  ),
                  "primary_inputs_extracted": primary_inputs_extracted,
                  "sidecar_targets_extracted": sidecar_targets_extracted,
                  "minimum_extraction_method": "profiled_tokens_0_index_1_value_2_exact_target_name",
                  "chain_row_required": False,
