          route_decision = "minimum_only_fixture_packet_extractor_passed_ready_for_CAMB_tiny_single_fixture_run_contract"

          rule_results = [
              {"rule_id": "workflow_name_sorts_top", "pass": True, "result": "workflow name begins with 000 TAIRID", "boundary": "Navigation convenience only."},
              {"rule_id": "node24_opt_in_preserved", "pass": True, "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved", "boundary": "Warning cleanup only."},
              {"rule_id": "v4_82_4_profile_used", "pass": True, "result": "minimum row format is index value target_name label", "boundary": "Extractor uses observed profile."},
              {"rule_id": "chain_row_dependency_removed", "pass": chain_row_required is False, "result": "minimum-only point fixture packet does not require chain sample rows", "boundary": "No full chain import."},
              {"rule_id": "central_directory_available", "pass": bool(manifest_records), "result": f"{len(manifest_records)} manifest records parsed", "boundary": "Central directory only, not fullGrid download."},
              {"rule_id": "single_root_selected", "pass": single_root_selected, "result": fixture_packet.get("root", ""), "boundary": "One fixture root only."},
              {"rule_id": "primary_inputs_extracted_from_minimum", "pass": primary_inputs_extracted and primary_values_valid, "result": f"{sum(1 for row in minimum_value_records if row.get('target_type') == 'primary_input' and row.get('found'))} primary inputs found", "boundary": "Point fixture inputs only."},
              {"rule_id": "sidecar_targets_extracted_from_minimum", "pass": sidecar_targets_extracted and sidecar_values_valid and exact_token_guard_passed, "result": f"{sum(1 for row in minimum_value_records if row.get('target_type') == 'sidecar_output' and row.get('found'))} sidecar targets found", "boundary": "Sidecar point fixtures only, not covariance."},
              {"rule_id": "sigma_and_fsigma_pairs_distinct", "pass": sigma_fsigma_pair_values_distinct, "result": f"{sum(1 for row in sigma_fsigma_pair_records if row.get('values_distinct'))} sigma/fsigma pairs distinct", "boundary": "Catches substring collision errors."},
              {"rule_id": "fixture_run_still_blocked", "pass": fixture_packet.get("fixture_run_allowed_now") is False, "result": "fixture run remains blocked until v4.83", "boundary": "No CAMB run in v4.82.6."},
              {"rule_id": "covariance_block_preserved", "pass": fixture_packet.get("minimum_values_are_covariance") is False and fixture_packet.get("sidecar_targets_are_covariance") is False, "result": "minimum and sidecar values remain point fixtures only", "boundary": "No Planck reference uncertainty."},
              {"rule_id": "blocked_shortcuts_preserved", "pass": all(row["status"] == "blocked" for row in BLOCKED_SHORTCUTS), "result": f"{len(BLOCKED_SHORTCUTS)} blocked shortcuts preserved", "boundary": "No fake parameter conversion."},
              {"rule_id": "target_redshifts_locked", "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33], "result": "target redshift order locked", "boundary": "No fsigma8 calculation."},
              {"rule_id": "next_route_options_declared", "pass": len(NEXT_ROUTE_OPTIONS) >= 4, "result": f"{len(NEXT_ROUTE_OPTIONS)} next route options declared", "boundary": "Future work only."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 17, "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved", "boundary": "No validation or final score claim."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "undetermined", "result": route_decision, "boundary": "Route decision does not compute covariance."},
              {"rule_id": "no_final_pressure_or_validation", "pass": True, "result": "no_final_RSD_pressure_no_TAIRID_validation", "boundary": "Minimum-only extractor only."}
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_82_6_rules_passed")

          if failed_gates:
