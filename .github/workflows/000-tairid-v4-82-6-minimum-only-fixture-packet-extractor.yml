          exact_token_guard_passed = bool(fixture_packet.get("exact_token_guard_passed"))
          sigma_fsigma_pair_values_distinct = bool(fixture_packet.get("sigma_fsigma_pair_values_distinct"))
          chain_row_required = bool(fixture_packet.get("chain_row_required", True))

          pre_run_gates = [
              {"gate_id": "single_root_selected", "current_pass": single_root_selected, "needed_next": "Done in v4.82.6."},
              {"gate_id": "primary_inputs_extracted_from_minimum", "current_pass": primary_inputs_extracted, "needed_next": "Repair if false."},
              {"gate_id": "sidecar_targets_extracted_from_minimum", "current_pass": sidecar_targets_extracted, "needed_next": "Repair if false."},
              {"gate_id": "sidecar_exact_token_guard_passed", "current_pass": exact_token_guard_passed, "needed_next": "Repair parser if false."},
              {"gate_id": "sigma_fsigma_pair_values_distinct", "current_pass": sigma_fsigma_pair_values_distinct, "needed_next": "Repair parser if false."},
              {"gate_id": "primary_values_plausible", "current_pass": primary_values_valid, "needed_next": "Repair parser if false."},
              {"gate_id": "sidecar_values_plausible", "current_pass": sidecar_values_valid, "needed_next": "Repair parser if false."},
              {"gate_id": "chain_row_not_required", "current_pass": chain_row_required is False, "needed_next": "Do not reintroduce chain-row dependency for point fixture."},
              {"gate_id": "CAMB_run_allowed", "current_pass": False, "needed_next": "Only allowed in v4.83 after this extractor passes."}
          ]

          if UPSTREAM_LOCKS["v4_82_4_sidecar_format_profiler"]["sidecar_values_accepted_for_CAMB"] is not False:
              failed_gates.append("v4_82_4_sidecar_acceptance_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_82_4_sidecar_format_profiler"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("v4_82_4_reference_uncertainty_boundary_not_carried")

          if not single_root_selected:
              failed_gates.append("single_root_not_selected")

          if not primary_inputs_extracted:
              failed_gates.append("primary_inputs_not_extracted_from_minimum")

          if not sidecar_targets_extracted:
              failed_gates.append("sidecar_targets_not_extracted_from_minimum")

          if not primary_values_valid:
              failed_gates.append("primary_values_not_plausible")

          if not sidecar_values_valid:
              failed_gates.append("sidecar_values_not_plausible")

          if not exact_token_guard_passed:
              failed_gates.append("exact_token_guard_failed")

          if not sigma_fsigma_pair_values_distinct:
              failed_gates.append("sigma_fsigma_pair_values_not_distinct")

          if fixture_packet.get("chain_row_required") is not False:
