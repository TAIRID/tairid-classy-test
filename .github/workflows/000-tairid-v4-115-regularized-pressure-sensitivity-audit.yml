name: 000 TAIRID v4.115 Regularized Pressure Sensitivity Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-115-regularized-pressure-sensitivity-audit.yml"

jobs:
  tairid-v4-115-regularized-pressure-sensitivity-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.115 regularized pressure sensitivity audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_115_regularized_pressure_sensitivity_audit

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_115_regularized_pressure_sensitivity_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_115_regularized_pressure_sensitivity_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This does not ingest source-provided observed RSD covariance.",
              "This audits sensitivity of the v4.114 guarded diagnostic bridge lanes.",
              "A pass means the v4.114 diagnostic pressure is stable across the current sensitivity lanes, but still not final because observed source covariance remains missing."
          ]

          UPSTREAM_LOCKS = {
              "v4_114_observed_RSD_covariance_bridge_probe": {
                  "readiness_label": "observed_RSD_covariance_bridge_probe_passed_diagnostic_only_ready_for_regularized_pressure_sensitivity_audit",
                  "observed_RSD_values_computed": True,
                  "observed_RSD_covariance_computed": True,
                  "source_observed_covariance_ingested": False,
                  "total_covariance_computed": True,
                  "bridge_pressure_computed": True,
                  "primary_chi2": 1.8857450832335483,
                  "primary_pressure_z": 0.0,
                  "primary_residual_mean": 0.01176689521655121,
                  "primary_total_covariance_rank": 5,
                  "primary_condition_proxy_total_covariance": 28.764946453807045,
                  "unregularized_plus_observed_chi2": 1.8857450841158765,
                  "diagonal_reference_guard_chi2": 1.8765371422381687,
                  "observed_only_chi2": 1.9047979393708445,
                  "sensitivity_record_count": 3,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_113_observed_RSD_covariance_bridge_design": {
                  "readiness_label": "observed_RSD_covariance_bridge_design_passed_ready_for_observed_RSD_covariance_bridge_probe",
                  "target_vector_dimension": 5,
                  "target_redshift_order": [0.15, 0.38, 0.51, 0.61, 2.33],
                  "observed_covariance_policy_count": 7,
                  "required_sensitivity_lane_count": 4,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_112_regularized_covariance_sufficiency_gate": {
                  "readiness_label": "regularized_covariance_sufficiency_gate_passed_bridge_ready_not_final_ready_for_observed_RSD_covariance_bridge_design",
                  "regularized_covariance_bridge_ready": True,
                  "final_reference_uncertainty_sufficient": False,
                  "final_RSD_pressure_allowed": False,
                  "condition_number_high": True,
                  "observed_RSD_covariance_bridge_required": True
              }
          }

          BRIDGE_LANE_RECORDS = [
              {
                  "lane_id": "primary_regularized_reference_plus_observed_diagonal",
                  "chi2": 1.8857450832335483,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 28.764946453807045,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              },
              {
                  "lane_id": "unregularized_reference_plus_observed_diagonal",
                  "chi2": 1.8857450841158765,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 28.764946472212817,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              },
              {
                  "lane_id": "diagonal_reference_guard_plus_observed_diagonal",
                  "chi2": 1.8765371422381687,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 28.7358323982546,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              },
              {
                  "lane_id": "observed_only_diagonal_fallback",
                  "chi2": 1.9047979393708445,
                  "dof": 5,
                  "pressure_z": 0.0,
                  "residual_mean": 0.01176689521655121,
                  "rank_total_covariance": 5,
                  "condition_proxy_total_covariance": 29.21191597534723,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              }
          ]

          UPSTREAM_PRESSURE_SENSITIVITY_RECORDS = [
              {
                  "comparison_id": "primary_minus_unregularized_plus_observed",
                  "base_lane": "primary_regularized_reference_plus_observed_diagonal",
                  "comparison_lane": "unregularized_reference_plus_observed_diagonal",
                  "delta_chi2": -8.823282104941654e-10,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Reference regularization sensitivity once observed diagonal covariance is added."
              },
              {
                  "comparison_id": "primary_minus_diagonal_reference_guard",
                  "base_lane": "primary_regularized_reference_plus_observed_diagonal",
                  "comparison_lane": "diagonal_reference_guard_plus_observed_diagonal",
                  "delta_chi2": 0.009207940995379582,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Off-diagonal reference covariance sensitivity."
              },
              {
                  "comparison_id": "primary_minus_observed_only",
                  "base_lane": "primary_regularized_reference_plus_observed_diagonal",
                  "comparison_lane": "observed_only_diagonal_fallback",
                  "delta_chi2": -0.019052856137296237,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Reference uncertainty contribution sensitivity."
              }
          ]

          AUDIT_THRESHOLDS = {
              "max_abs_delta_chi2_for_stable_diagnostic": 0.05,
              "max_abs_delta_pressure_z_for_stable_diagnostic": 0.10,
              "max_primary_chi2_for_non_pressure_flag": 5.0,
              "pressure_z_zero_threshold": 1e-12,
              "required_lane_count": 4,
              "required_sensitivity_record_count": 3,
              "source_covariance_required_before_final": True,
              "final_pressure_allowed_now": False,
              "validation_claim_allowed_now": False
          }

          max_abs_delta_chi2 = max(abs(float(row["delta_chi2"])) for row in UPSTREAM_PRESSURE_SENSITIVITY_RECORDS)
          max_abs_delta_pressure_z = max(abs(float(row["delta_pressure_z"])) for row in UPSTREAM_PRESSURE_SENSITIVITY_RECORDS)
          max_lane_chi2 = max(float(row["chi2"]) for row in BRIDGE_LANE_RECORDS)
          min_lane_chi2 = min(float(row["chi2"]) for row in BRIDGE_LANE_RECORDS)
          max_abs_lane_pressure_z = max(abs(float(row["pressure_z"])) for row in BRIDGE_LANE_RECORDS)
          pressure_z_all_zero = max_abs_lane_pressure_z <= AUDIT_THRESHOLDS["pressure_z_zero_threshold"]

          sensitivity_stable_by_chi2 = max_abs_delta_chi2 <= AUDIT_THRESHOLDS["max_abs_delta_chi2_for_stable_diagnostic"]
          sensitivity_stable_by_pressure_z = max_abs_delta_pressure_z <= AUDIT_THRESHOLDS["max_abs_delta_pressure_z_for_stable_diagnostic"]
          primary_no_pressure_flag = UPSTREAM_LOCKS["v4_114_observed_RSD_covariance_bridge_probe"]["primary_chi2"] < AUDIT_THRESHOLDS["max_primary_chi2_for_non_pressure_flag"]

          diagnostic_stable = bool(
              sensitivity_stable_by_chi2
              and sensitivity_stable_by_pressure_z
              and pressure_z_all_zero
              and primary_no_pressure_flag
          )

          source_covariance_missing = UPSTREAM_LOCKS["v4_114_observed_RSD_covariance_bridge_probe"]["source_observed_covariance_ingested"] is False
          final_pressure_ready = False
          observed_covariance_upgrade_required = source_covariance_missing

          SENSITIVITY_AUDIT_RESULTS = [
              {
                  "audit_id": "regularization_delta_chi2_stability",
                  "observed_value": max_abs_delta_chi2,
                  "threshold": AUDIT_THRESHOLDS["max_abs_delta_chi2_for_stable_diagnostic"],
                  "pass": sensitivity_stable_by_chi2,
                  "interpretation": "Current bridge pressure is not materially changed by the regularized vs unregularized/guard lanes."
              },
              {
                  "audit_id": "pressure_z_stability",
                  "observed_value": max_abs_delta_pressure_z,
                  "threshold": AUDIT_THRESHOLDS["max_abs_delta_pressure_z_for_stable_diagnostic"],
                  "pass": sensitivity_stable_by_pressure_z,
                  "interpretation": "Pressure-z remains stable across current lanes."
              },
              {
                  "audit_id": "all_lanes_zero_pressure",
                  "observed_value": max_abs_lane_pressure_z,
                  "threshold": AUDIT_THRESHOLDS["pressure_z_zero_threshold"],
                  "pass": pressure_z_all_zero,
                  "interpretation": "All current bridge lanes return pressure_z = 0 under the guarded formula."
              },
              {
                  "audit_id": "primary_non_pressure_flag",
                  "observed_value": UPSTREAM_LOCKS["v4_114_observed_RSD_covariance_bridge_probe"]["primary_chi2"],
                  "threshold": AUDIT_THRESHOLDS["max_primary_chi2_for_non_pressure_flag"],
                  "pass": primary_no_pressure_flag,
                  "interpretation": "Primary chi2 is below dof=5, so the bridge does not show diagnostic tension in this diagonal-fallback run."
              },
              {
                  "audit_id": "source_covariance_missing_boundary",
                  "observed_value": source_covariance_missing,
                  "threshold": "must remain true until source covariance is ingested",
                  "pass": source_covariance_missing,
                  "interpretation": "Because observed source covariance is missing, the result cannot be called final even if sensitivity is stable."
              }
          ]

          NEXT_SOURCE_UPGRADE_REQUIREMENTS = [
              {
                  "requirement_id": "BOSS_DR12_covariance_upgrade",
                  "requirement": "Replace diagonal fallback for z=0.38, 0.51, 0.61 with source-provided or literature-supported covariance if available.",
                  "why_needed": "The three BOSS DR12 points are correlated and currently treated diagonally."
              },
              {
                  "requirement_id": "low_z_anchor_covariance_review",
                  "requirement": "Review the z=0.15 MGS/low-z anchor uncertainty and covariance status.",
                  "why_needed": "The low-z point currently uses a broad diagonal fallback."
              },
              {
                  "requirement_id": "high_z_anchor_covariance_review",
                  "requirement": "Review the z=2.33 high-z/LyA-style anchor and whether it should remain in the primary bridge.",
                  "why_needed": "High-z growth anchors can carry different systematics than galaxy RSD anchors."
              },
              {
                  "requirement_id": "observed_family_overlap_guard",
                  "requirement": "Record independence/overlap status for all observed points before any final pressure language.",
                  "why_needed": "Repeated or overlapping data families can fake a stronger constraint."
              },
              {
                  "requirement_id": "keep_diagnostic_language",
                  "requirement": "Keep v4.114/v4.115 language as diagnostic-only until covariance source upgrade and external claim review.",
                  "why_needed": "The current bridge uses fallback covariance and is not a final model comparison."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Observed RSD source covariance was fully ingested.",
              "Observed RSD covariance is complete.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The regularized pressure sensitivity audit validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The diagnostic bridge pressure is final.",
              "Diagonal observed fallback is the same as full observed covariance.",
              "Zero pressure-z proves TAIRID.",
              "No further observed covariance work is needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_116_observed_covariance_source_upgrade",
                  "purpose": "Replace diagonal observed fallback with source-provided or literature-supported observed covariance where available, especially BOSS DR12.",
                  "why_next": "Sensitivity is stable, but the biggest limitation is missing observed covariance."
              },
              {
                  "priority": 2,
                  "route_id": "v4_117_observed_covariance_upgrade_probe",
                  "purpose": "Run the observed bridge again with upgraded observed covariance.",
                  "why_next": "The diagnostic pressure should be rechecked once observed covariance quality improves."
              },
              {
                  "priority": 3,
                  "route_id": "v4_118_growth_family_expansion_design",
                  "purpose": "Design additional independent RSD/growth family coverage if source covariance upgrade is insufficient.",
                  "why_next": "A broader observed-family test can check whether the no-pressure result persists."
              },
              {
                  "priority": 4,
                  "route_id": "v4_119_claim_boundary_review_handoff",
                  "purpose": "Create a human-readable status paper/handoff after the covariance upgrade route.",
                  "why_next": "The result needs careful interpretation before any public-facing claim."
              }
          ]

          failed_gates = []
          warnings = [
              "sensitivity_audit_only",
              "observed_covariance_diagonal_fallback_still_active",
              "source_covariance_not_ingested",
              "diagnostic_bridge_pressure_stable_but_not_final",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          if not UPSTREAM_LOCKS["v4_114_observed_RSD_covariance_bridge_probe"]["bridge_pressure_computed"]:
              failed_gates.append("upstream_bridge_pressure_not_computed")

          if len(BRIDGE_LANE_RECORDS) != AUDIT_THRESHOLDS["required_lane_count"]:
              failed_gates.append("bridge_lane_count_incorrect")

          if len(UPSTREAM_PRESSURE_SENSITIVITY_RECORDS) != AUDIT_THRESHOLDS["required_sensitivity_record_count"]:
              failed_gates.append("sensitivity_record_count_incorrect")

          if not diagnostic_stable:
              failed_gates.append("diagnostic_pressure_not_stable_across_sensitivity_lanes")

          if not observed_covariance_upgrade_required:
              failed_gates.append("observed_covariance_upgrade_requirement_not_carried")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_allowed")

          if len(NEXT_SOURCE_UPGRADE_REQUIREMENTS) < 5:
              failed_gates.append("source_upgrade_requirements_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "observed rsd source covariance was fully ingested",
              "observed rsd covariance is complete",
              "final rsd pressure score",
              "validates tairid cosmology",
              "diagonal observed fallback is the same as full observed covariance",
              "zero pressure-z proves tairid",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "regularized_pressure_sensitivity_audit_passed_diagnostic_stable_not_final_ready_for_observed_covariance_source_upgrade"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_bridge_pressure_carried",
                  "pass": UPSTREAM_LOCKS["v4_114_observed_RSD_covariance_bridge_probe"]["bridge_pressure_computed"] is True,
                  "result": f"primary_chi2={UPSTREAM_LOCKS['v4_114_observed_RSD_covariance_bridge_probe']['primary_chi2']}; primary_pressure_z={UPSTREAM_LOCKS['v4_114_observed_RSD_covariance_bridge_probe']['primary_pressure_z']}",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "sensitivity_lane_count_ok",
                  "pass": len(BRIDGE_LANE_RECORDS) == AUDIT_THRESHOLDS["required_lane_count"] and len(UPSTREAM_PRESSURE_SENSITIVITY_RECORDS) == AUDIT_THRESHOLDS["required_sensitivity_record_count"],
                  "result": f"lanes={len(BRIDGE_LANE_RECORDS)}; sensitivity_records={len(UPSTREAM_PRESSURE_SENSITIVITY_RECORDS)}",
                  "boundary": "Audit of existing lanes only."
              },
              {
                  "rule_id": "delta_chi2_stable",
                  "pass": sensitivity_stable_by_chi2,
                  "result": f"max_abs_delta_chi2={max_abs_delta_chi2}",
                  "boundary": "Diagnostic stability only."
              },
              {
                  "rule_id": "delta_pressure_z_stable",
                  "pass": sensitivity_stable_by_pressure_z,
                  "result": f"max_abs_delta_pressure_z={max_abs_delta_pressure_z}",
                  "boundary": "Diagnostic stability only."
              },
              {
                  "rule_id": "all_current_lanes_zero_pressure_z",
                  "pass": pressure_z_all_zero,
                  "result": f"max_abs_lane_pressure_z={max_abs_lane_pressure_z}",
                  "boundary": "No final pressure claim."
              },
              {
                  "rule_id": "observed_covariance_upgrade_required",
                  "pass": observed_covariance_upgrade_required,
                  "result": "source observed covariance not ingested; upgrade required",
                  "boundary": "Blocks final pressure."
              },
              {
                  "rule_id": "source_upgrade_requirements_declared",
                  "pass": len(NEXT_SOURCE_UPGRADE_REQUIREMENTS) >= 5,
                  "result": f"{len(NEXT_SOURCE_UPGRADE_REQUIREMENTS)} source-upgrade requirements declared",
                  "boundary": "Design next."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False and AUDIT_THRESHOLDS["validation_claim_allowed_now"] is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_115_rules_passed")

          if failed_gates:
              readiness_label = "regularized_pressure_sensitivity_audit_failed"
              next_allowed_step = "Repair pressure sensitivity audit before observed covariance source upgrade."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.116 observed covariance source upgrade. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "primary_chi2": UPSTREAM_LOCKS["v4_114_observed_RSD_covariance_bridge_probe"]["primary_chi2"],
              "primary_pressure_z": UPSTREAM_LOCKS["v4_114_observed_RSD_covariance_bridge_probe"]["primary_pressure_z"],
              "lane_chi2_min": min_lane_chi2,
              "lane_chi2_max": max_lane_chi2,
              "max_abs_delta_chi2": max_abs_delta_chi2,
              "max_abs_delta_pressure_z": max_abs_delta_pressure_z,
              "max_abs_lane_pressure_z": max_abs_lane_pressure_z,
              "pressure_z_all_zero": pressure_z_all_zero,
              "sensitivity_stable_by_chi2": sensitivity_stable_by_chi2,
              "sensitivity_stable_by_pressure_z": sensitivity_stable_by_pressure_z,
              "diagnostic_stable": diagnostic_stable,
              "source_observed_covariance_ingested": False,
              "observed_covariance_upgrade_required": observed_covariance_upgrade_required,
              "final_pressure_ready": final_pressure_ready,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "bridge_lane_records": BRIDGE_LANE_RECORDS,
              "upstream_pressure_sensitivity_records": UPSTREAM_PRESSURE_SENSITIVITY_RECORDS,
              "audit_thresholds": AUDIT_THRESHOLDS,
              "sensitivity_audit_results": SENSITIVITY_AUDIT_RESULTS,
              "next_source_upgrade_requirements": NEXT_SOURCE_UPGRADE_REQUIREMENTS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "diagnostic_stable": diagnostic_stable,
                  "max_abs_delta_chi2": max_abs_delta_chi2,
                  "max_abs_delta_pressure_z": max_abs_delta_pressure_z,
                  "pressure_z_all_zero": pressure_z_all_zero,
                  "observed_covariance_upgrade_required": observed_covariance_upgrade_required,
                  "source_observed_covariance_ingested": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_115_regularized_pressure_sensitivity_audit.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "bridge_lane_records_v4_115.csv",
              BRIDGE_LANE_RECORDS,
              ["lane_id", "chi2", "dof", "pressure_z", "residual_mean", "rank_total_covariance", "condition_proxy_total_covariance", "claim_scope"]
          )

          write_csv(
              OUTDIR / "pressure_sensitivity_records_v4_115.csv",
              UPSTREAM_PRESSURE_SENSITIVITY_RECORDS,
              ["comparison_id", "base_lane", "comparison_lane", "delta_chi2", "delta_pressure_z", "interpretation"]
          )

          write_csv(
              OUTDIR / "sensitivity_audit_results_v4_115.csv",
              SENSITIVITY_AUDIT_RESULTS,
              ["audit_id", "observed_value", "threshold", "pass", "interpretation"]
          )

          write_csv(
              OUTDIR / "next_source_upgrade_requirements_v4_115.csv",
              NEXT_SOURCE_UPGRADE_REQUIREMENTS,
              ["requirement_id", "requirement", "why_needed"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_115.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_115.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_115.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.115 — Regularized Pressure Sensitivity Audit")
          md.append("")
