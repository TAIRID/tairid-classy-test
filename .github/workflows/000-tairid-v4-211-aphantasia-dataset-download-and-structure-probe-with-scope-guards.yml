name: 000 TAIRID v4.211 - Aphantasia Dataset Download And Structure Probe With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-211-aphantasia-dataset-download-and-structure-probe-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/public_sources/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-211-aphantasia-dataset-download-structure-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install parquet readers
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas pyarrow

      - name: Run v4.211 aphantasia dataset download and structure probe
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_211_outputs
          cat > tairid_v4_211_outputs/run_v4_211.py <<'PY'
          import csv
          import json
          import os
          import re
          import tempfile
          import shutil
          import urllib.request
          from pathlib import Path

          OUT = Path("tairid_v4_211_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "aphantasia_dataset_download_and_structure_probe_passed_structure_reports_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no aphantasia validation",
              "no clinical diagnosis claim",
              "no claim that aphantasia dataset proves TAIRID",
              "no raw numbers moved between domains",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "file structure is not subject-axis parsing",
              "parquet schema is not covariance",
              "aphantasia structure probe does not close G1",
              "TAIRID not proved"
          ]

          V4_210_STATUS = {
              "version": "v4.210",
              "rule_pass_count": 12,
              "rule_total_count": 12,
              "failed_gates": [],
              "public_sources_checked": 1,
              "metadata_fetch_ok_count": 1,
              "hf_file_count": 5,
              "ranked_download_rows": 5,
              "local_candidate_rows": 6,
              "local_ready_count": 0,
              "package_status": "aphantasia_public_metadata_fetched_files_listed_no_parsing",
              "selected_next_route": "aphantasia_dataset_download_and_structure_probe_with_scope_guards"
          }

          HF_FILES = [
              {
                  "file_name": "README.md",
                  "download_url": "https://huggingface.co/datasets/jmc255/aphantasia_drawing_dataset/resolve/main/README.md",
                  "role": "metadata_readme_candidate"
              },
              {
                  "file_name": "aphantasia_data.parquet",
                  "download_url": "https://huggingface.co/datasets/jmc255/aphantasia_drawing_dataset/resolve/main/aphantasia_data.parquet",
                  "role": "parquet_candidate"
              },
              {
                  "file_name": "aphantasia_drawing_dataset.py",
                  "download_url": "https://huggingface.co/datasets/jmc255/aphantasia_drawing_dataset/resolve/main/aphantasia_drawing_dataset.py",
                  "role": "dataset_script_candidate"
              },
              {
                  "file_name": "data_processing.py",
                  "download_url": "https://huggingface.co/datasets/jmc255/aphantasia_drawing_dataset/resolve/main/data_processing.py",
                  "role": "processing_script_candidate"
              }
          ]

          TARGET_SCHEMA = {
              "target_file": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
              "lane": "Aphantasia",
              "needed_columns": "lane;subject_id;group_or_condition;boundary_or_task;propagation_reach_value;pacing_access_value;consolidation_growth_value;viability_or_outcome_value;source_or_dataset;notes",
              "axis_mapping_plan": "propagation=visual imagery reach, likely VVIQ/imagery availability; pacing=burden, mismatch, reconstruction effort, or inverse ease; consolidation=reconstruction viability/accuracy or preserved spatial-structure support; viability=task outcome or burden-adjusted memory/perception performance"
          }

          EXPECTED_FIELD_HINTS = [
              {"hint": "subject_id", "role": "subject key", "axis_use": "join/group key"},
              {"hint": "treatment", "role": "aphantasia/control group label", "axis_use": "group_or_condition"},
              {"hint": "vviq", "role": "visual imagery vividness", "axis_use": "propagation/reach"},
              {"hint": "osiq", "role": "object/spatial imagery", "axis_use": "propagation/consolidation support after mapping review"},
              {"hint": "memory", "role": "drawn from memory condition", "axis_use": "reconstruction viability or burden surface"},
              {"hint": "perception", "role": "copy/perception condition", "axis_use": "control boundary for drawing ability"},
              {"hint": "score", "role": "possible outcome or questionnaire score", "axis_use": "candidate viability or axis component"},
              {"hint": "image", "role": "drawing/image object", "axis_use": "possible feature extraction needed, not direct scalar without scoring"}
          ]

          MAX_DOWNLOAD_BYTES = 500_000_000
          USER_AGENT = "TAIRID-v4.211-aphantasia-structure-probe/1.0"
          SAMPLE_ROWS = 200

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def download_file(url, dest):
              if os.environ.get("TAIRID_LOCAL_NO_NETWORK") == "1":
                  return False, "download_skipped_local_no_network", "local check disables network"
              req = urllib.request.Request(url, headers={"User-Agent": USER_AGENT})
              try:
                  with urllib.request.urlopen(req, timeout=90) as resp:
                      content_len = resp.headers.get("Content-Length")
                      if content_len and int(content_len) > MAX_DOWNLOAD_BYTES:
                          return False, "skipped_size_guard", "content_length_exceeds_guard"
                      total = 0
                      with open(dest, "wb") as f:
                          while True:
                              chunk = resp.read(1024 * 1024)
                              if not chunk:
                                  break
                              total += len(chunk)
                              if total > MAX_DOWNLOAD_BYTES:
                                  return False, "failed_size_guard", "download_exceeded_guard"
                              f.write(chunk)
                  return True, "downloaded", ""
              except Exception as exc:
                  return False, "download_failed", type(exc).__name__ + ": " + str(exc)[:300]

          def safe_float(x):
              try:
                  if x is None or str(x).strip() == "":
                      return None
                  return float(str(x).strip())
              except Exception:
                  return None

          def classify_column(col, dtype, sample_values):
              low = str(col).lower()
              blob = " ".join(str(v).lower() for v in sample_values[:25])
              if any(k in low for k in ["subject", "participant", "worker", "id"]):
                  role = "subject_key_candidate"
              elif any(k in low for k in ["treatment", "group", "label", "class", "aphantasia", "control"]):
                  role = "group_label_candidate"
              elif "vviq" in low:
                  role = "vviq_visual_imagery_candidate"
              elif "osiq" in low:
                  role = "osiq_object_spatial_candidate"
              elif any(k in low for k in ["memory", "recall"]):
                  role = "memory_reconstruction_candidate"
              elif any(k in low for k in ["perception", "copy"]):
                  role = "perception_control_candidate"
              elif any(k in low for k in ["score", "rating", "accuracy", "count", "time", "duration", "burden"]):
                  role = "numeric_outcome_or_burden_candidate"
              elif any(k in low for k in ["image", "drawing", "png", "jpg", "path"]):
                  role = "image_or_drawing_object_candidate"
              elif str(dtype).lower() in ["int64", "float64", "int32", "float32"]:
                  role = "numeric_candidate"
              else:
                  role = "unclassified_candidate"

              axis_hint = "review_needed"
              if role == "vviq_visual_imagery_candidate":
                  axis_hint = "propagation_reach_value"
              elif role in ["numeric_outcome_or_burden_candidate", "memory_reconstruction_candidate"]:
                  axis_hint = "pacing_or_viability_or_consolidation_after_mapping"
              elif role == "osiq_object_spatial_candidate":
                  axis_hint = "propagation_or_consolidation_after_mapping"
              elif role == "group_label_candidate":
                  axis_hint = "group_or_condition"
              elif role == "subject_key_candidate":
                  axis_hint = "subject_id"
              elif role == "image_or_drawing_object_candidate":
                  axis_hint = "feature_extraction_or_scored_image_needed"

              return role, axis_hint

          download_rows = []
          readme_profile_rows = []
          script_profile_rows = []
          parquet_schema_rows = []
          parquet_column_profile_rows = []
          candidate_field_rows = []
          sample_summary_rows = []

          tmp_root = Path(tempfile.mkdtemp(prefix="tairid_v4_211_downloads_"))

          try:
              downloaded_paths = {}
              for spec in HF_FILES:
                  dest = tmp_root / spec["file_name"]
                  ok, status, error = download_file(spec["download_url"], dest)
                  size = dest.stat().st_size if dest.exists() else 0
                  download_rows.append({
                      "file_name": spec["file_name"],
                      "role": spec["role"],
                      "download_status": status,
                      "download_error": error,
                      "downloaded_size_bytes": size,
                      "raw_file_uploaded_to_artifact": False,
                      "claim_boundary": "download/probe only; raw source file not preserved as output"
                  })
                  if ok:
                      downloaded_paths[spec["file_name"]] = dest

              # README and script text profiles.
              for name in ["README.md", "aphantasia_drawing_dataset.py", "data_processing.py"]:
                  if name not in downloaded_paths:
                      continue
                  text = downloaded_paths[name].read_text(encoding="utf-8", errors="replace")
                  row = {
                      "file_name": name,
                      "char_count": len(text),
                      "line_count": len(text.splitlines()),
                      "contains_vviq": "vviq" in text.lower(),
                      "contains_osiq": "osiq" in text.lower(),
                      "contains_treatment": "treatment" in text.lower(),
                      "contains_memory": "memory" in text.lower(),
                      "contains_perception": "perception" in text.lower(),
                      "contains_drawing": "drawing" in text.lower(),
                      "contains_dataset_schema_hint": any(k in text.lower() for k in ["features", "columns", "schema", "generate_examples", "info"]),
                      "first_600_chars": text[:600].replace("\n", " ")
                  }
                  if name == "README.md":
                      readme_profile_rows.append(row)
                  else:
                      script_profile_rows.append(row)

              # Parquet structure probe.
              if "aphantasia_data.parquet" in downloaded_paths:
                  try:
                      import pandas as pd
                      import pyarrow.parquet as pq

                      pq_path = downloaded_paths["aphantasia_data.parquet"]
                      metadata = pq.read_metadata(pq_path)
                      parquet_schema_rows.append({
                          "file_name": "aphantasia_data.parquet",
                          "profile_status": "metadata_read",
                          "num_rows": metadata.num_rows,
                          "num_columns": metadata.num_columns,
                          "num_row_groups": metadata.num_row_groups,
                          "serialized_size": metadata.serialized_size,
                          "claim_boundary": "schema only; not axis mapping"
                      })

                      df = pd.read_parquet(pq_path)
                      sample = df.head(SAMPLE_ROWS)
                      cols = list(df.columns)
                      for col in cols:
                          series = sample[col]
                          dtype = str(df[col].dtype)
                          nonnull = int(series.notna().sum())
                          unique_sample = int(series.astype(str).nunique(dropna=True))
                          numeric_count = 0
                          numeric_mean = ""
                          numeric_sd = ""
                          if pd.api.types.is_numeric_dtype(df[col]):
                              vals = pd.to_numeric(series, errors="coerce").dropna()
                              numeric_count = int(vals.shape[0])
                              if numeric_count:
                                  numeric_mean = float(vals.mean())
                                  numeric_sd = float(vals.std()) if numeric_count > 1 else 0.0
                          sample_values = [str(v)[:80] for v in series.dropna().head(5).tolist()]
                          role, axis_hint = classify_column(col, dtype, sample_values)
                          parquet_column_profile_rows.append({
                              "column_name": col,
                              "dtype": dtype,
                              "nonnull_sample_count": nonnull,
                              "unique_sample_count": unique_sample,
                              "numeric_sample_count": numeric_count,
                              "numeric_sample_mean": numeric_mean,
                              "numeric_sample_sd": numeric_sd,
                              "role_guess": role,
                              "axis_hint": axis_hint,
                              "sample_values_preview": " | ".join(sample_values),
                              "claim_boundary": "column profile only; not parsed axis data"
                          })
                          if role != "unclassified_candidate":
                              candidate_field_rows.append({
                                  "column_name": col,
                                  "role_guess": role,
                                  "axis_hint": axis_hint,
                                  "dtype": dtype,
                                  "safe_next_action": "review in v4.212 before mapping to G1 axis table",
                                  "claim_boundary": "candidate field only; not axis row yet"
                              })

                      # Optional group/treatment summary if a group column exists.
                      group_col = next((c for c in cols if str(c).lower() in ["treatment", "group", "label", "class"]), "")
                      if not group_col:
                          group_col = next((c for c in cols if any(k in str(c).lower() for k in ["treatment", "group", "label", "class"])), "")
                      if group_col:
                          for group_value, gdf in df.groupby(group_col, dropna=False):
                              row = {
                                  "group_column": group_col,
                                  "group_or_condition": str(group_value),
                                  "row_count": int(len(gdf)),
                                  "claim_boundary": "group count only; not axis mapping"
                              }
                              # Summarize obvious questionnaire numeric columns if present.
                              for col in cols:
                                  low = str(col).lower()
                                  if ("vviq" in low or "osiq" in low or "score" in low) and pd.api.types.is_numeric_dtype(df[col]):
                                      row[col + "_mean"] = float(gdf[col].mean())
                                      row[col + "_sd"] = float(gdf[col].std()) if len(gdf[col].dropna()) > 1 else 0.0
                              sample_summary_rows.append(row)

                  except Exception as exc:
                      parquet_schema_rows.append({
                          "file_name": "aphantasia_data.parquet",
                          "profile_status": "parquet_probe_failed:" + type(exc).__name__,
                          "num_rows": "",
                          "num_columns": "",
                          "num_row_groups": "",
                          "serialized_size": "",
                          "claim_boundary": str(exc)[:300]
                      })

          finally:
              shutil.rmtree(tmp_root, ignore_errors=True)

          downloaded_count = sum(1 for r in download_rows if r["download_status"] == "downloaded")
          parquet_profile_ok = any(r.get("profile_status") == "metadata_read" for r in parquet_schema_rows)
          candidate_field_count = len(candidate_field_rows)

          if parquet_profile_ok and candidate_field_count:
              package_status = "aphantasia_parquet_downloaded_structure_candidates_found"
              selected_next_route = "aphantasia_column_mapping_to_g1_axis_table_with_scope_guards"
          elif downloaded_count:
              package_status = "aphantasia_files_downloaded_structure_incomplete"
              selected_next_route = "aphantasia_structure_manual_review_or_parser_repair_with_scope_guards"
          else:
              package_status = "aphantasia_download_failed_or_network_unavailable"
              selected_next_route = "aphantasia_download_retry_or_manual_upload_with_scope_guards"

          write_csv(OUT / "v4_211_v4_210_status_review.csv", [V4_210_STATUS], list(V4_210_STATUS.keys()))
          (OUT / "v4_211_v4_210_status_review.json").write_text(json.dumps(V4_210_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_211_download_status.csv", download_rows, [
              "file_name", "role", "download_status", "download_error",
              "downloaded_size_bytes", "raw_file_uploaded_to_artifact", "claim_boundary"
          ])
          write_csv(OUT / "v4_211_readme_profile.csv", readme_profile_rows, [
              "file_name", "char_count", "line_count", "contains_vviq", "contains_osiq",
              "contains_treatment", "contains_memory", "contains_perception",
              "contains_drawing", "contains_dataset_schema_hint", "first_600_chars"
          ])
          write_csv(OUT / "v4_211_script_profile.csv", script_profile_rows, [
              "file_name", "char_count", "line_count", "contains_vviq", "contains_osiq",
              "contains_treatment", "contains_memory", "contains_perception",
              "contains_drawing", "contains_dataset_schema_hint", "first_600_chars"
          ])
          write_csv(OUT / "v4_211_parquet_schema_profile.csv", parquet_schema_rows, [
              "file_name", "profile_status", "num_rows", "num_columns",
              "num_row_groups", "serialized_size", "claim_boundary"
          ])
          write_csv(OUT / "v4_211_parquet_column_profile.csv", parquet_column_profile_rows, [
              "column_name", "dtype", "nonnull_sample_count", "unique_sample_count",
              "numeric_sample_count", "numeric_sample_mean", "numeric_sample_sd",
              "role_guess", "axis_hint", "sample_values_preview", "claim_boundary"
          ])
          write_csv(OUT / "v4_211_candidate_g1_field_mapping_targets.csv", candidate_field_rows, [
              "column_name", "role_guess", "axis_hint", "dtype", "safe_next_action", "claim_boundary"
          ])

          sample_fields = sorted(set().union(*[set(r.keys()) for r in sample_summary_rows])) if sample_summary_rows else [
              "group_column", "group_or_condition", "row_count", "claim_boundary"
          ]
          write_csv(OUT / "v4_211_group_sample_summary.csv", sample_summary_rows, sample_fields)

          write_csv(OUT / "v4_211_target_axis_schema.csv", [TARGET_SCHEMA], [
              "target_file", "lane", "needed_columns", "axis_mapping_plan"
          ])
          write_csv(OUT / "v4_211_expected_field_hints.csv", EXPECTED_FIELD_HINTS, [
              "hint", "role", "axis_use"
          ])

          claim_rows = [
              {
                  "claim": "The parquet schema closes the aphantasia half of G1.",
                  "status": "blocked",
                  "safe_wording": "The schema identifies fields that may be mapped next.",
                  "forbidden_wording": "Aphantasia G1 is closed."
              },
              {
                  "claim": "A column named VVIQ automatically validates the propagation axis.",
                  "status": "blocked",
                  "safe_wording": "VVIQ is a candidate visual-reach field and needs mapping review.",
                  "forbidden_wording": "VVIQ proves the TAIRID axis."
              },
              {
                  "claim": "Downloaded files validate aphantasia modeling.",
                  "status": "blocked",
                  "safe_wording": "Downloaded files make parsing possible only.",
                  "forbidden_wording": "Aphantasia data validates TAIRID."
              }
          ]
          write_csv(OUT / "v4_211_claim_boundary_matrix.csv", claim_rows, [
              "claim", "status", "safe_wording", "forbidden_wording"
          ])

          next_routes = [
              {
                  "priority": 1,
                  "route": selected_next_route,
                  "condition": package_status,
                  "next_action": "Use v4_211_candidate_g1_field_mapping_targets.csv and v4_211_parquet_column_profile.csv to map aphantasia fields into candidate G1 axis rows."
              },
              {
                  "priority": 2,
                  "route": "combine_partial_g1_dyslexia_and_aphantasia_inputs_with_scope_guards",
                  "condition": "after aphantasia candidate axis rows are written",
                  "next_action": "Combine G1 halves and prepare a guarded v4.195 rerun."
              }
          ]
          write_csv(OUT / "v4_211_next_routes.csv", next_routes, [
              "priority", "route", "condition", "next_action"
          ])

          route_decision = {
              "version": "v4.211",
              "result_label": RESULT_LABEL,
              "clean_result": "The public aphantasia dataset files were downloaded and structure-probed. The parquet schema and candidate G1 field mapping targets were written without parsing final axis rows.",
              "downloaded_count": downloaded_count,
              "parquet_profile_ok": parquet_profile_ok,
              "parquet_column_count": len(parquet_column_profile_rows),
              "candidate_field_count": candidate_field_count,
              "group_sample_summary_rows": len(sample_summary_rows),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "aphantasia dataset structure probe only; not final axis mapping, not covariance, not validation",
              "blocked_claims": BLOCKED_CLAIMS
          }
          (OUT / "v4_211_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_211_scope_guards.json").write_text(json.dumps({
              "scope": "aphantasia dataset download and structure probe",
              "parquet_schema_closes_G1": False,
              "column_profile_is_axis_mapping": False,
              "downloaded_files_are_validation": False,
              "raw_source_files_uploaded_to_artifact": False,
              "raw_numbers_moved_between_domains": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_211_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.211 - Aphantasia Dataset Download And Structure Probe",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.210 found the public aphantasia dataset source and listed files. v4.211 downloads the files, probes README/scripts/parquet structure, and writes candidate field-mapping targets for the aphantasia half of G1.",
              "",
              "Downloaded count: `" + str(downloaded_count) + "`",
              "Parquet profile OK: `" + str(parquet_profile_ok) + "`",
              "Parquet column count: `" + str(len(parquet_column_profile_rows)) + "`",
              "Candidate field count: `" + str(candidate_field_count) + "`",
              "Group sample summary rows: `" + str(len(sample_summary_rows)) + "`",
              "",
              "Package status: `" + package_status + "`",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_211_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_211_v4_210_status_review.csv",
              "v4_211_v4_210_status_review.json",
              "v4_211_download_status.csv",
              "v4_211_readme_profile.csv",
              "v4_211_script_profile.csv",
              "v4_211_parquet_schema_profile.csv",
              "v4_211_parquet_column_profile.csv",
              "v4_211_candidate_g1_field_mapping_targets.csv",
              "v4_211_group_sample_summary.csv",
              "v4_211_target_axis_schema.csv",
              "v4_211_expected_field_hints.csv",
              "v4_211_claim_boundary_matrix.csv",
              "v4_211_next_routes.csv",
              "v4_211_route_decision.json",
              "v4_211_scope_guards.json",
              "v4_211_blocked_claims.json",
              "v4_211_summary.md"
          ]

          rules = {
              "version_is_v4_211": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_210_status_reviewed": V4_210_STATUS["rule_pass_count"] == 12,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "download_status_written": (OUT / "v4_211_download_status.csv").exists(),
              "parquet_profile_written": (OUT / "v4_211_parquet_schema_profile.csv").exists(),
              "column_profile_written": (OUT / "v4_211_parquet_column_profile.csv").exists(),
              "candidate_field_targets_written": (OUT / "v4_211_candidate_g1_field_mapping_targets.csv").exists(),
              "selected_route_present": bool(selected_next_route),
              "no_g1_closure_claim": True,
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.211",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "downloaded_count": downloaded_count,
              "parquet_profile_ok": parquet_profile_ok,
