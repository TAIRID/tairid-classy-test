name: "!!! AAA CURRENT - TAIRID v4.395B controlled alternate covariance extraction integrity row order no support"

on:
  workflow_dispatch:

jobs:
  run-v4-395B-controlled-alternate-covariance-extraction-integrity-row-order-no-support:
    name: "!!! AAA CURRENT - Run v4.395B alternate covariance extraction integrity row order"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Find v4.394B input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.394B output ZIP by pattern..."
          INPUT_394B_ZIP="$(ls tairid-v4-394B-robustness-candidate-review-ingest-no-values-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_394B_ZIP" ]; then
            echo "Could not find v4.394B output ZIP."
            echo "Expected:"
            echo "tairid-v4-394B-robustness-candidate-review-ingest-no-values-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.394B ZIP:"
          echo "$INPUT_394B_ZIP"
          echo "INPUT_394B_ZIP=$INPUT_394B_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.395B alternate extraction integrity row-order script
        run: |
          cat > run_v4_395B_controlled_alternate_covariance_extraction_integrity_row_order_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import tarfile
          import shutil
          import tempfile
          import os
          import hashlib
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd
          import numpy as np
          import requests

          CLAIM_BOUNDARY = "controlled alternate covariance extraction, integrity checks, and row-order validation only; alternate candidate 3x3 f_sigma8 covariance subblock values may be extracted for robustness comparison; no chi-square; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          DEFAULT_ARCHIVE_URL = "https://data.sdss.org/sas/dr12/boss/papers/clustering/ALAM_ET_AL_2016_consensus_and_individual_Gaussian_constraints.tar.gz"
          MAX_DOWNLOAD_BYTES = 350 * 1024 * 1024
          EXPECTED_REDSHIFT_ORDER = ["z0.38", "z0.51", "z0.61"]
          EXPECTED_OBS_IDS = ["BOSS_DR12_z0.38", "BOSS_DR12_z0.51", "BOSS_DR12_z0.61"]
          SYMMETRY_TOL = 1e-10
          PSD_TOL = 1e-12

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def download_file(url, dest):
              headers = {"User-Agent": "TAIRID-v4.395B-controlled-alternate-extraction-no-support"}
              head_status = ""
              content_length = ""

              try:
                  h = requests.head(url, allow_redirects=True, timeout=30, headers=headers)
                  head_status = str(h.status_code)
                  content_length = h.headers.get("content-length", "")
              except Exception as exc:
                  head_status = f"HEAD_error:{type(exc).__name__}"
                  content_length = ""

              if content_length:
                  try:
                      if int(content_length) > MAX_DOWNLOAD_BYTES:
                          return {
                              "fetched": False,
                              "status": "skipped_content_length_exceeds_controlled_limit",
                              "head_status": head_status,
                              "content_length": content_length,
                              "error": "",
                              "bytes_downloaded": 0,
                              "sha256": "",
                          }
                  except Exception:
                      pass

              try:
                  r = requests.get(url, stream=True, timeout=120, headers=headers)
                  status = str(r.status_code)
                  r.raise_for_status()

                  bytes_downloaded = 0
                  with dest.open("wb") as f:
                      for chunk in r.iter_content(chunk_size=1024 * 1024):
                          if not chunk:
                              continue
                          bytes_downloaded += len(chunk)
                          if bytes_downloaded > MAX_DOWNLOAD_BYTES:
                              return {
                                  "fetched": False,
                                  "status": "aborted_download_exceeds_controlled_limit",
                                  "head_status": head_status,
                                  "content_length": content_length,
                                  "error": "",
                                  "bytes_downloaded": bytes_downloaded,
                                  "sha256": "",
                              }
                          f.write(chunk)

                  return {
                      "fetched": True,
                      "status": f"fetched_http_{status}",
                      "head_status": head_status,
                      "content_length": content_length,
                      "error": "",
                      "bytes_downloaded": bytes_downloaded,
                      "sha256": sha256_file(dest),
                  }
              except Exception as exc:
                  return {
                      "fetched": False,
                      "status": "fetch_failed",
                      "head_status": head_status,
                      "content_length": content_length,
                      "error": f"{type(exc).__name__}: {exc}",
                      "bytes_downloaded": 0,
                      "sha256": "",
                  }

          def parse_numeric_matrix_from_member(archive_path: Path, member_name: str):
              if not tarfile.is_tarfile(archive_path):
                  raise ValueError("Expected tar-compatible official archive.")

              with tarfile.open(archive_path, "r:*") as t:
                  names = t.getnames()

                  target_name = None
                  if member_name in names:
                      target_name = member_name
                  else:
                      suffix_matches = [n for n in names if n.endswith(member_name) or n.endswith("/" + member_name)]
                      if len(suffix_matches) == 1:
                          target_name = suffix_matches[0]

                  if target_name is None:
                      raise FileNotFoundError(f"Selected member not found in archive: {member_name}")

                  extracted = t.extractfile(target_name)
                  if extracted is None:
                      raise ValueError(f"Could not extract member file: {target_name}")

                  text = extracted.read().decode("utf-8", errors="replace")

              numeric_rows = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue

                  tokens = stripped.replace(",", " ").split()
                  try:
                      numeric = [float(tok) for tok in tokens]
                  except Exception:
                      continue

                  if numeric:
                      numeric_rows.append(numeric)

              if not numeric_rows:
                  raise ValueError(f"No numeric rows parsed for member: {member_name}")

              widths = sorted(set(len(r) for r in numeric_rows))
              if len(widths) != 1:
                  raise ValueError(f"Numeric rows are not rectangular for member {member_name}; widths={widths}")

              return target_name, numeric_rows

          def parse_indices(index_text):
              parts = [p.strip() for p in clean(index_text).split("|") if p.strip()]
              return [int(p) for p in parts]

          def subblock_integrity(matrix):
              arr = np.array(matrix, dtype=float)
              shape = tuple(arr.shape)
              finite = bool(np.isfinite(arr).all())
              symmetric = bool(np.allclose(arr, arr.T, rtol=0.0, atol=SYMMETRY_TOL)) if shape == (3, 3) else False
              diagonal = np.diag(arr) if shape == (3, 3) else np.array([])
              diagonal_nonzero = bool(np.all(np.abs(diagonal) > 0.0)) if diagonal.size else False
              diagonal_positive = bool(np.all(diagonal > 0.0)) if diagonal.size else False

              if shape == (3, 3) and finite and symmetric:
                  eigvals = np.linalg.eigvalsh(arr)
                  min_eig = float(np.min(eigvals))
                  psd_candidate = bool(min_eig >= -PSD_TOL)
                  condition_number = float(np.linalg.cond(arr)) if np.linalg.det(arr) != 0 else float("inf")
              else:
                  eigvals = np.array([])
                  min_eig = ""
                  psd_candidate = False
                  condition_number = ""

              return {
                  "shape_rows": int(shape[0]) if len(shape) else 0,
                  "shape_columns": int(shape[1]) if len(shape) == 2 else 0,
                  "shape_is_3x3": shape == (3, 3),
                  "finite_entries": finite,
                  "symmetric_within_tolerance": symmetric,
                  "diagonal_nonzero": diagonal_nonzero,
                  "diagonal_positive": diagonal_positive,
                  "minimum_eigenvalue": min_eig,
                  "psd_candidate_within_tolerance": psd_candidate,
                  "condition_number_candidate": condition_number,
                  "integrity_passed": bool(shape == (3, 3) and finite and symmetric and diagonal_nonzero and diagonal_positive and psd_candidate),
              }

          def main():
              input_394b = Path(os.environ["INPUT_394B_ZIP"])

              outdir = Path("tairid_v4_395B_controlled_alternate_covariance_extraction_integrity_row_order_no_scoring_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              source_dir = outdir / "official_source_archive_preserved"
              source_dir.mkdir(parents=True, exist_ok=True)

              base394b = extract_zip(input_394b, "tairid_v4_395B_394B_")

              summary394b_path = find_one(base394b, "v4_394B_summary.json")
              review_ingest_path = find_one(base394b, "v4_394B_robustness_candidate_review_ingest_ledger_NO_VALUES_NO_SUPPORT.csv")
              approved_candidates_path = find_one(base394b, "v4_394B_APPROVED_robustness_candidates_FOR_CONTROLLED_EXTRACTION_NO_VALUES.csv")
              final_alternate_path = find_one(base394b, "v4_394B_APPROVED_final_consensus_alternate_NO_VALUES.csv")
              fs_fallback_path = find_one(base394b, "v4_394B_APPROVED_fs_consensus_fallbacks_NO_VALUES.csv")
              controlled_packet_path = find_one(base394b, "v4_394B_controlled_alternate_covariance_extraction_packet_NO_VALUES_NO_SUPPORT.csv")
              coordinate_packet_path = find_one(base394b, "v4_394B_controlled_alternate_coordinate_packet_NO_VALUES.csv")
              comparison_plan_path = find_one(base394b, "v4_394B_robustness_comparison_plan_NO_VALUES_NO_SUPPORT.csv")
              review_summary_path = find_one(base394b, "v4_394B_robustness_candidate_review_summary_NO_VALUES.csv")
              route_status_path = find_one(base394b, "v4_394B_route_status_summary.csv")
              limitations394b_path = find_one(base394b, "v4_394B_limitations_after_robustness_candidate_review.csv")
              gap394b_path = find_one(base394b, "v4_394B_gap_status_after_robustness_candidate_review.csv")
              rule_checks394b_path = find_one(base394b, "v4_394B_rule_checks.csv")

              summary394b = json.loads(summary394b_path.read_text())
              review_ingest = pd.read_csv(review_ingest_path)
              approved_candidates = pd.read_csv(approved_candidates_path)
              final_alternate = pd.read_csv(final_alternate_path)
              fs_fallback = pd.read_csv(fs_fallback_path)
              controlled_packet = pd.read_csv(controlled_packet_path)
              coordinate_packet = pd.read_csv(coordinate_packet_path)
              comparison_plan = pd.read_csv(comparison_plan_path)
              review_summary = pd.read_csv(review_summary_path)
              route_status = pd.read_csv(route_status_path)
              limitations394b = pd.read_csv(limitations394b_path)
              gap394b = pd.read_csv(gap394b_path)
              rule_checks394b = pd.read_csv(rule_checks394b_path)

              archive_url = DEFAULT_ARCHIVE_URL
              if "source_archive_url" in controlled_packet.columns and len(controlled_packet):
                  url_candidates = sorted(set(controlled_packet["source_archive_url"].dropna().astype(str).tolist()))
                  if len(url_candidates) == 1:
                      archive_url = url_candidates[0]

              archive_path = source_dir / "ALAM_ET_AL_2016_consensus_and_individual_Gaussian_constraints.tar.gz"
              download_result = download_file(archive_url, archive_path)

              download_ledger = pd.DataFrame([{
                  "v4_395B_download_id": "v4_395B_official_archive_download_001",
                  "source_url": archive_url,
                  "download_attempted": True,
                  "source_file_fetched": bool(download_result["fetched"]),
                  "http_head_status": download_result["head_status"],
                  "reported_content_length": download_result["content_length"],
                  "download_status": download_result["status"],
                  "download_error": download_result["error"],
                  "bytes_downloaded": int(download_result["bytes_downloaded"]),
                  "sha256_if_fetched": download_result["sha256"],
                  "archive_used_for_controlled_robustness_extraction": bool(download_result["fetched"]),
                  "new_chi_square_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
              }])

              extraction_rows = []
              subblock_value_rows = []
              matrix_wide_rows = []
              integrity_rows = []
              row_order_detail_rows = []

              if download_result["fetched"]:
                  for _, plan in controlled_packet.sort_values("extraction_priority").iterrows():
                      candidate_member_name = clean(plan["candidate_member_name"])
                      candidate_id = clean(plan["v4_393B_candidate_id"])
                      zero_indices = parse_indices(plan["selected_fsigma8_zero_based_indices"])
                      one_indices = parse_indices(plan["selected_fsigma8_one_based_indices"])

                      try:
                          resolved_member_name, matrix = parse_numeric_matrix_from_member(archive_path, candidate_member_name)
                          full_rows = len(matrix)
                          full_cols = len(matrix[0]) if matrix else 0
                          full_shape_is_9x9 = full_rows == 9 and full_cols == 9

                          if not full_shape_is_9x9:
                              raise ValueError(f"Expected 9x9 numeric matrix, got {full_rows}x{full_cols}")

                          subblock = []
                          for i in zero_indices:
                              row_vals = []
                              for j in zero_indices:
                                  row_vals.append(float(matrix[i][j]))
                              subblock.append(row_vals)

                          member_found = True
                          extracted = True
                          extraction_status = "controlled_alternate_subblock_extracted_no_scoring"
                          extraction_error = ""

                      except Exception as exc:
                          resolved_member_name = ""
                          full_rows = 0
                          full_cols = 0
                          full_shape_is_9x9 = False
                          subblock = []
                          member_found = False
                          extracted = False
                          extraction_status = "controlled_alternate_subblock_extraction_failed"
                          extraction_error = f"{type(exc).__name__}: {exc}"

                      extraction_id = f"v4_395B_alternate_extraction_{len(extraction_rows)+1:03d}"

                      extraction_rows.append({
                          "v4_395B_extraction_id": extraction_id,
                          "v4_394B_review_id": clean(plan["v4_394B_review_id"]),
                          "v4_393B_candidate_id": candidate_id,
                          "candidate_member_name": candidate_member_name,
                          "resolved_archive_member_name": resolved_member_name,
                          "candidate_observable_family": clean(plan["candidate_observable_family"]),
                          "candidate_consensus_family": clean(plan["candidate_consensus_family"]),
                          "robustness_lane": clean(plan["robustness_lane"]),
                          "selected_fsigma8_zero_based_indices": clean(plan["selected_fsigma8_zero_based_indices"]),
                          "selected_fsigma8_one_based_indices": clean(plan["selected_fsigma8_one_based_indices"]),
                          "candidate_subblock_size": int(float(plan["candidate_subblock_size"])),
                          "member_found_in_official_archive": bool(member_found),
                          "source_full_matrix_rows": int(full_rows),
                          "source_full_matrix_columns": int(full_cols),
                          "source_full_matrix_shape_is_9x9": bool(full_shape_is_9x9),
                          "alternate_covariance_subblock_extracted": bool(extracted),
                          "candidate_subblock_rows": int(len(subblock)) if subblock else 0,
                          "candidate_subblock_columns": int(len(subblock[0])) if subblock else 0,
                          "candidate_subblock_shape_is_3x3": bool(extracted and len(subblock) == 3 and len(subblock[0]) == 3),
                          "extraction_status": extraction_status,
                          "extraction_error": extraction_error,
                          "controlled_robustness_value_extraction": bool(extracted),
                          "new_chi_square_computed": False,
                          "full_covariance_matrix_loaded": False,
                          "full_covariance_available": False,
                          "full_covariance_values_loaded": False,
                          "covariance_dimension_confirmed": False,
                          "observed_row_order_matched": False,
                          "likelihood_computed": False,
                          "p_values_computed": False,
                          "score_valid": False,
                          "support_allowed": False,
                          "claim_boundary": CLAIM_BOUNDARY,
                      })

                      if extracted:
                          integrity = subblock_integrity(subblock)
                          integrity_rows.append({
                              "v4_395B_integrity_id": f"v4_395B_integrity_{len(integrity_rows)+1:03d}",
                              "v4_395B_extraction_id": extraction_id,
                              "v4_393B_candidate_id": candidate_id,
                              "candidate_member_name": candidate_member_name,
                              "candidate_observable_family": clean(plan["candidate_observable_family"]),
                              "candidate_consensus_family": clean(plan["candidate_consensus_family"]),
                              "shape_rows": integrity["shape_rows"],
                              "shape_columns": integrity["shape_columns"],
                              "shape_is_3x3": integrity["shape_is_3x3"],
                              "finite_entries": integrity["finite_entries"],
                              "symmetric_within_tolerance": integrity["symmetric_within_tolerance"],
                              "symmetry_tolerance": SYMMETRY_TOL,
                              "diagonal_nonzero": integrity["diagonal_nonzero"],
                              "diagonal_positive": integrity["diagonal_positive"],
                              "minimum_eigenvalue": integrity["minimum_eigenvalue"],
                              "psd_candidate_within_tolerance": integrity["psd_candidate_within_tolerance"],
                              "psd_tolerance": PSD_TOL,
                              "condition_number_candidate": integrity["condition_number_candidate"],
                              "integrity_passed": integrity["integrity_passed"],
                              "new_chi_square_computed": False,
                              "score_valid": False,
                              "support_allowed": False,
                              "claim_boundary": CLAIM_BOUNDARY,
                          })

                          member_coords = coordinate_packet[
                              coordinate_packet["candidate_member_name"].astype(str) == candidate_member_name
                          ].copy()

                          for r in range(3):
                              matrix_wide_rows.append({
                                  "v4_395B_extraction_id": extraction_id,
                                  "v4_393B_candidate_id": candidate_id,
                                  "candidate_member_name": candidate_member_name,
                                  "candidate_observable_family": clean(plan["candidate_observable_family"]),
                                  "candidate_consensus_family": clean(plan["candidate_consensus_family"]),
                                  "subblock_row_position_zero_based": r,
                                  "subblock_row_position_one_based": r + 1,
                                  "row_observed_redshift_candidate": EXPECTED_REDSHIFT_ORDER[r],
                                  "cov_col_1": subblock[r][0],
                                  "cov_col_2": subblock[r][1],
                                  "cov_col_3": subblock[r][2],
                                  "new_chi_square_computed": False,
                                  "score_valid": False,
                                  "support_allowed": False,
                                  "claim_boundary": CLAIM_BOUNDARY,
                              })

                          for _, coord in member_coords.sort_values(
                              ["subblock_row_position_zero_based", "subblock_col_position_zero_based"]
                          ).iterrows():
                              r = int(float(coord["subblock_row_position_zero_based"]))
                              c = int(float(coord["subblock_col_position_zero_based"]))
                              source_r = int(float(coord["source_matrix_row_zero_based"]))
                              source_c = int(float(coord["source_matrix_col_zero_based"]))
                              value = float(matrix[source_r][source_c])

                              row_redshift = clean(coord["row_observed_redshift_candidate"])
                              col_redshift = clean(coord["col_observed_redshift_candidate"])
                              row_id = clean(coord["row_observed_id_candidate"])
                              col_id = clean(coord["col_observed_id_candidate"])
                              row_order_expected = (
                                  row_redshift == EXPECTED_REDSHIFT_ORDER[r]
                                  and col_redshift == EXPECTED_REDSHIFT_ORDER[c]
                                  and row_id == EXPECTED_OBS_IDS[r]
                                  and col_id == EXPECTED_OBS_IDS[c]
                              )

                              row_order_detail_rows.append({
                                  "v4_395B_row_order_detail_id": f"v4_395B_row_order_detail_{len(row_order_detail_rows)+1:04d}",
                                  "v4_395B_extraction_id": extraction_id,
                                  "v4_393B_candidate_id": candidate_id,
                                  "candidate_member_name": candidate_member_name,
                                  "candidate_observable_family": clean(plan["candidate_observable_family"]),
                                  "candidate_consensus_family": clean(plan["candidate_consensus_family"]),
                                  "subblock_row_position_zero_based": r,
                                  "subblock_col_position_zero_based": c,
                                  "source_matrix_row_zero_based": source_r,
                                  "source_matrix_col_zero_based": source_c,
                                  "row_observed_redshift_candidate": row_redshift,
                                  "col_observed_redshift_candidate": col_redshift,
                                  "row_observed_id_candidate": row_id,
                                  "col_observed_id_candidate": col_id,
                                  "expected_row_redshift": EXPECTED_REDSHIFT_ORDER[r],
                                  "expected_col_redshift": EXPECTED_REDSHIFT_ORDER[c],
                                  "expected_row_observed_id": EXPECTED_OBS_IDS[r],
                                  "expected_col_observed_id": EXPECTED_OBS_IDS[c],
                                  "row_order_coordinate_match": bool(row_order_expected),
                                  "candidate_covariance_subblock_value": value,
                                  "value_used_for_scoring": False,
                                  "new_chi_square_computed": False,
                                  "likelihood_computed": False,
                                  "p_values_computed": False,
                                  "score_valid": False,
                                  "support_allowed": False,
                                  "claim_boundary": CLAIM_BOUNDARY,
                              })

                              subblock_value_rows.append({
                                  "v4_395B_alternate_subblock_value_id": f"v4_395B_alt_subblock_value_{len(subblock_value_rows)+1:04d}",
                                  "v4_395B_extraction_id": extraction_id,
                                  "v4_393B_candidate_id": candidate_id,
                                  "candidate_member_name": candidate_member_name,
                                  "candidate_observable_family": clean(plan["candidate_observable_family"]),
                                  "candidate_consensus_family": clean(plan["candidate_consensus_family"]),
                                  "subblock_row_position_zero_based": r,
                                  "subblock_col_position_zero_based": c,
                                  "subblock_row_position_one_based": r + 1,
                                  "subblock_col_position_one_based": c + 1,
                                  "source_matrix_row_zero_based": source_r,
                                  "source_matrix_col_zero_based": source_c,
                                  "source_matrix_row_one_based": source_r + 1,
                                  "source_matrix_col_one_based": source_c + 1,
                                  "row_observed_redshift_candidate": row_redshift,
