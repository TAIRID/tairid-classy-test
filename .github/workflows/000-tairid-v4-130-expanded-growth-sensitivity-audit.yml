name: 000 TAIRID v4.130 Expanded Growth Sensitivity Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-130-expanded-growth-sensitivity-audit.yml"

jobs:
  tairid-v4-130-expanded-growth-sensitivity-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.130 expanded growth sensitivity audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_130_expanded_growth_sensitivity_audit

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_130_expanded_growth_sensitivity_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_130_expanded_growth_sensitivity_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This audits v4.129 guarded expanded growth bridge results only.",
              "This treats eBOSS pressure as a localized diagnostic flag requiring source/covariance/reference review, not as a final result.",
              "A pass means the eBOSS local pressure, full-expanded non-pressure behavior, fallback reference limits, and next source/covariance targets are explicitly separated."
          ]

          UPSTREAM_LOCKS = {
              "v4_129_guarded_expanded_growth_bridge_probe": {
                  "readiness_label": "guarded_expanded_growth_bridge_probe_passed_eBOSS_family_pressure_localized_not_final_ready_for_expanded_growth_sensitivity_audit",
                  "expanded_bridge_pressure_computed": True,
                  "expanded_reference_target_support_exists": True,
                  "full_planck_posterior_available": False,
                  "interpolation_fallback_active": True,
                  "bridge_lane_count": 6,
                  "pressure_lane_count": 1,
                  "no_pressure_lane_count": 5,
                  "BOSS_core_non_pressure": True,
                  "low_z_plus_BOSS_non_pressure": True,
                  "expanded_all_non_pressure": True,
                  "eBOSS_family_pressure_recorded": True,
                  "eBOSS_pressure_z": -1.4177985723696922,
                  "eBOSS_chi2": 5.010152791813537,
                  "expanded_all_chi2": 9.106917051031568,
                  "expanded_all_dof": 12,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_128_expanded_reference_target_support_probe": {
                  "readiness_label": "expanded_reference_target_support_probe_passed_interpolation_fallback_ready_for_guarded_expanded_growth_bridge_probe",
                  "expanded_reference_target_support_exists": True,
                  "expanded_reference_vector_complete": True,
                  "expanded_covariance_sensitivity_matrix_complete": True,
                  "expanded_reference_target_count": 12,
                  "exact_prior_target_count": 4,
                  "interpolated_target_count": 7,
                  "extrapolated_target_count": 1,
                  "all_targets_have_support": True,
                  "all_targets_have_variance": True,
                  "full_planck_posterior_available": False,
                  "expanded_bridge_pressure_allowed_next": True,
                  "expanded_bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          BRIDGE_LANE_RECORDS = [
              {
                  "lane_id": "verified_BOSS_core_control",
                  "lane_family": "BOSS_DR12_verified_core",
                  "chi2": 1.2727918222286783,
                  "dof": 3,
                  "pressure_z": -0.0,
                  "residual_mean": -0.01188341350946833,
                  "lane_status": "control_lane",
                  "claim_scope": "diagnostic_control_only"
              },
              {
                  "lane_id": "low_z_plus_BOSS_expanded_primary_candidate",
                  "lane_family": "low_z_plus_BOSS",
                  "chi2": 1.640222995774162,
                  "dof": 5,
                  "pressure_z": -0.0,
                  "residual_mean": -0.008045138257749506,
                  "lane_status": "primary_candidate_diagnostic",
                  "claim_scope": "diagnostic_only_not_final"
              },
              {
                  "lane_id": "WiggleZ_family_slice_candidate",
                  "lane_family": "WiggleZ",
                  "chi2": 2.4063583257408427,
                  "dof": 3,
                  "pressure_z": -0.0,
                  "residual_mean": -0.056207966759596086,
                  "lane_status": "family_slice_diagonal_sensitivity",
                  "claim_scope": "diagnostic_family_slice"
              },
              {
                  "lane_id": "VIPERS_high_mid_z_slice_candidate",
                  "lane_family": "VIPERS",
                  "chi2": 0.050182937703025385,
                  "dof": 1,
                  "pressure_z": 0.0,
                  "residual_mean": 0.017984624628779255,
                  "lane_status": "single_family_slice",
                  "claim_scope": "diagnostic_family_slice"
              },
              {
                  "lane_id": "eBOSS_high_mid_z_family_slice_candidate",
                  "lane_family": "eBOSS_LRG_ELG_QSO",
                  "chi2": 5.010152791813537,
                  "dof": 3,
                  "pressure_z": -1.4177985723696922,
                  "residual_mean": -0.014231025960166751,
                  "lane_status": "family_slice_same_program_overlap_warning",
                  "claim_scope": "diagnostic_family_slice"
              },
              {
                  "lane_id": "expanded_all_source_candidate_sensitivity",
                  "lane_family": "expanded_all_source_candidates",
                  "chi2": 9.106917051031568,
                  "dof": 12,
                  "pressure_z": -0.0,
                  "residual_mean": -0.019463170401604734,
                  "lane_status": "sensitivity_only_mixed_covariance",
                  "claim_scope": "diagnostic_sensitivity_only"
              }
          ]

          EBOSS_COMPONENT_RECORDS = [
              {
                  "target_id": "z0698_eBOSS_LRG",
                  "z": 0.698,
                  "observed_fsigma8": 0.473,
                  "observed_sigma": 0.044,
                  "reference_fsigma8_support": 0.4623052016766069,
                  "reference_support_status": "interpolation_fallback_not_final",
                  "residual_observed_minus_reference": 0.010694798323393095,
                  "residual_sign": "positive",
                  "source_family": "eBOSS_LRG",
                  "covariance_status": "same_program_diagonal_sensitivity_fallback"
              },
              {
                  "target_id": "z0850_eBOSS_ELG",
                  "z": 0.85,
                  "observed_fsigma8": 0.315,
                  "observed_sigma": 0.095,
                  "reference_fsigma8_support": 0.4469713428685805,
                  "reference_support_status": "interpolation_fallback_not_final",
                  "residual_observed_minus_reference": -0.13197134286858048,
                  "residual_sign": "negative",
                  "source_family": "eBOSS_ELG",
                  "covariance_status": "same_program_diagonal_sensitivity_fallback"
              },
              {
                  "target_id": "z1480_eBOSS_QSO",
                  "z": 1.48,
                  "observed_fsigma8": 0.462,
                  "observed_sigma": 0.045,
                  "reference_fsigma8_support": 0.3834165333353129,
                  "reference_support_status": "interpolation_fallback_not_final",
                  "residual_observed_minus_reference": 0.07858346666468713,
                  "residual_sign": "positive",
                  "source_family": "eBOSS_QSO",
                  "covariance_status": "same_program_diagonal_sensitivity_fallback"
              }
          ]

          LANE_COMPARISON_RECORDS = [
              {
                  "comparison_id": "low_z_plus_BOSS_minus_BOSS_core",
                  "base_lane": "low_z_plus_BOSS_expanded_primary_candidate",
                  "comparison_lane": "verified_BOSS_core_control",
                  "delta_chi2": 0.3674311735454837,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Low-z expansion does not create pressure."
              },
              {
                  "comparison_id": "WiggleZ_slice_minus_BOSS_core",
                  "base_lane": "WiggleZ_family_slice_candidate",
                  "comparison_lane": "verified_BOSS_core_control",
                  "delta_chi2": 1.1335665035121644,
                  "delta_pressure_z": 0.0,
                  "interpretation": "WiggleZ slice changes chi-square but not pressure."
              },
              {
                  "comparison_id": "eBOSS_slice_minus_BOSS_core",
                  "base_lane": "eBOSS_high_mid_z_family_slice_candidate",
                  "comparison_lane": "verified_BOSS_core_control",
                  "delta_chi2": 3.7373609695848585,
                  "delta_pressure_z": -1.4177985723696922,
                  "interpretation": "eBOSS slice creates the only local pressure flag."
              },
              {
                  "comparison_id": "expanded_all_minus_low_z_plus_BOSS",
                  "base_lane": "expanded_all_source_candidate_sensitivity",
                  "comparison_lane": "low_z_plus_BOSS_expanded_primary_candidate",
                  "delta_chi2": 7.466694055257406,
                  "delta_pressure_z": 0.0,
                  "interpretation": "Expanded all-family sensitivity lane does not create pressure despite added families."
              }
          ]

          AUDIT_THRESHOLDS = {
              "pressure_flag_threshold_abs_z": 0.0,
              "localized_pressure_min_abs_z": 1.0,
              "global_pressure_required_abs_z": 1.0,
              "expanded_all_chi2_must_be_below_dof": True,
              "family_pressure_must_not_be_final": True,
              "full_posterior_required_for_final": True,
              "source_covariance_review_required_for_eBOSS": True,
              "reference_upgrade_required_for_eBOSS": True
          }

          EBOSS_REVIEW_TARGETS = [
              {
                  "review_id": "eBOSS_LRG_value_source_lock",
                  "target_id": "z0698_eBOSS_LRG",
                  "review_type": "value_and_covariance_source_lock",
                  "why_needed": "LRG is part of the same-program eBOSS family slice and must have value/covariance status checked before interpretation."
              },
              {
                  "review_id": "eBOSS_ELG_negative_residual_drill",
                  "target_id": "z0850_eBOSS_ELG",
                  "review_type": "residual_and_source_drill",
                  "why_needed": "The ELG point carries the strongest negative residual inside the local eBOSS pressure slice."
              },
              {
                  "review_id": "eBOSS_QSO_positive_residual_drill",
                  "target_id": "z1480_eBOSS_QSO",
                  "review_type": "residual_and_reference_support_drill",
                  "why_needed": "The QSO point has a positive residual while the lane pressure is negative overall, so same-family structure must be audited."
              },
              {
                  "review_id": "eBOSS_same_program_covariance_or_overlap_model",
                  "target_id": "eBOSS_LRG_ELG_QSO_family",
                  "review_type": "same_program_covariance_overlap_review",
                  "why_needed": "LRG, ELG, and QSO cannot be treated as independent by default."
              },
              {
                  "review_id": "eBOSS_reference_support_upgrade",
                  "target_id": "eBOSS_reference_targets",
                  "review_type": "CAMB_or_chain_reference_upgrade",
                  "why_needed": "All eBOSS reference targets in v4.129 used interpolation fallback, not full Planck posterior support."
              }
          ]

          NEXT_PROBE_DESIGN = {
              "next_probe_name": "v4.131 eBOSS family source covariance and reference review design",
              "allowed_to_fetch_or_locator_check_eBOSS_sources": True,
              "allowed_to_build_eBOSS_source_status_ledger": True,
              "allowed_to_design_eBOSS_covariance_or_overlap_model": True,
              "allowed_to_design_CAMB_or_chain_reference_upgrade": True,
              "allowed_to_compute_final_RSD_pressure": False,
              "allowed_to_validate_TAIRID": False,
              "primary_success_condition": "The next probe separates eBOSS value/source status, same-program covariance/overlap status, and reference interpolation fallback status.",
              "fallback_success_condition": "If eBOSS source/covariance cannot be resolved automatically, it must be parked for manual review and no final claim may be made."
          }

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The expanded growth sensitivity audit validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The eBOSS local pressure flag is a final result.",
              "The eBOSS local pressure flag proves or disproves TAIRID.",
              "Expanded reference covariance is a full Planck posterior covariance.",
              "Interpolated reference targets are the same as CAMB chain outputs.",
              "Same-program eBOSS points are independent by default.",
              "No eBOSS source/covariance review is needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_131_eBOSS_family_source_covariance_and_reference_review_design",
                  "purpose": "Design a targeted review for eBOSS value/source status, same-program covariance/overlap, and reference interpolation fallback.",
                  "why_next": "v4.130 confirms the pressure is localized to eBOSS and not global."
              },
              {
                  "priority": 2,
                  "route_id": "v4_132_eBOSS_family_review_probe",
                  "purpose": "Attempt source/covariance/reference-status review for the eBOSS LRG, ELG, and QSO family slice.",
                  "why_next": "A local family pressure flag must be tested before interpretation."
              },
              {
                  "priority": 3,
                  "route_id": "v4_133_CAMB_or_chain_expanded_reference_upgrade_design",
                  "purpose": "Design stronger reference support for all expanded redshifts, replacing interpolation fallback where possible.",
                  "why_next": "The current expanded bridge is limited by reference interpolation fallback."
              },
              {
                  "priority": 4,
                  "route_id": "v4_134_external_standard_cosmology_comparison_plan",
                  "purpose": "Design comparison language against normal ΛCDM growth pipelines and literature constraints.",
                  "why_next": "Any local pressure finding must be contextualized before public-facing claims."
              }
          ]

          failed_gates = []
          warnings = [
              "sensitivity_audit_only",
              "eBOSS_pressure_localized_not_global",
              "expanded_all_lane_non_pressure",
              "reference_interpolation_fallback_active",
              "same_program_eBOSS_covariance_review_required",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          pressure_lanes = [row for row in BRIDGE_LANE_RECORDS if abs(float(row["pressure_z"])) > AUDIT_THRESHOLDS["pressure_flag_threshold_abs_z"]]
          no_pressure_lanes = [row for row in BRIDGE_LANE_RECORDS if abs(float(row["pressure_z"])) <= AUDIT_THRESHOLDS["pressure_flag_threshold_abs_z"]]

          eBOSS_lane = next(row for row in BRIDGE_LANE_RECORDS if row["lane_id"] == "eBOSS_high_mid_z_family_slice_candidate")
          expanded_all_lane = next(row for row in BRIDGE_LANE_RECORDS if row["lane_id"] == "expanded_all_source_candidate_sensitivity")
          BOSS_core_lane = next(row for row in BRIDGE_LANE_RECORDS if row["lane_id"] == "verified_BOSS_core_control")
          low_z_BOSS_lane = next(row for row in BRIDGE_LANE_RECORDS if row["lane_id"] == "low_z_plus_BOSS_expanded_primary_candidate")

          eBOSS_pressure_localized = (
              len(pressure_lanes) == 1
              and pressure_lanes[0]["lane_id"] == "eBOSS_high_mid_z_family_slice_candidate"
              and abs(float(eBOSS_lane["pressure_z"])) >= AUDIT_THRESHOLDS["localized_pressure_min_abs_z"]
          )

          expanded_all_non_pressure = (
              abs(float(expanded_all_lane["pressure_z"])) == 0.0
              and float(expanded_all_lane["chi2"]) < float(expanded_all_lane["dof"])
          )

          BOSS_core_non_pressure = (
              abs(float(BOSS_core_lane["pressure_z"])) == 0.0
              and float(BOSS_core_lane["chi2"]) < float(BOSS_core_lane["dof"])
          )

          low_z_BOSS_non_pressure = (
              abs(float(low_z_BOSS_lane["pressure_z"])) == 0.0
              and float(low_z_BOSS_lane["chi2"]) < float(low_z_BOSS_lane["dof"])
          )

          residual_signs = {row["residual_sign"] for row in EBOSS_COMPONENT_RECORDS}
          eBOSS_mixed_residual_signs = "positive" in residual_signs and "negative" in residual_signs
          eBOSS_strongest_abs_residual = max(EBOSS_COMPONENT_RECORDS, key=lambda row: abs(float(row["residual_observed_minus_reference"])))
          eBOSS_reference_all_interpolation = all("interpolation_fallback" in row["reference_support_status"] for row in EBOSS_COMPONENT_RECORDS)
          eBOSS_same_program_covariance_limited = all("same_program" in row["covariance_status"] for row in EBOSS_COMPONENT_RECORDS)

          global_pressure_absent = expanded_all_non_pressure and BOSS_core_non_pressure and low_z_BOSS_non_pressure
          family_local_pressure_needs_review = eBOSS_pressure_localized and eBOSS_reference_all_interpolation and eBOSS_same_program_covariance_limited
          final_pressure_ready = False

          SENSITIVITY_AUDIT_RESULTS = [
              {
                  "audit_id": "pressure_localization",
                  "observed_value": eBOSS_lane["pressure_z"],
                  "threshold": AUDIT_THRESHOLDS["localized_pressure_min_abs_z"],
                  "pass": eBOSS_pressure_localized,
                  "interpretation": "Only the eBOSS family slice carries a local pressure flag."
              },
              {
                  "audit_id": "expanded_all_non_pressure",
                  "observed_value": expanded_all_lane["chi2"],
                  "threshold": expanded_all_lane["dof"],
                  "pass": expanded_all_non_pressure,
                  "interpretation": "The full expanded mixed lane remains below dof and has zero pressure."
              },
              {
                  "audit_id": "BOSS_core_non_pressure",
                  "observed_value": BOSS_core_lane["chi2"],
                  "threshold": BOSS_core_lane["dof"],
                  "pass": BOSS_core_non_pressure,
                  "interpretation": "The verified BOSS core remains a non-pressure control lane."
              },
              {
                  "audit_id": "low_z_plus_BOSS_non_pressure",
                  "observed_value": low_z_BOSS_lane["chi2"],
                  "threshold": low_z_BOSS_lane["dof"],
                  "pass": low_z_BOSS_non_pressure,
                  "interpretation": "The low-z plus BOSS lane remains non-pressure."
              },
              {
                  "audit_id": "eBOSS_mixed_residual_signs",
                  "observed_value": ",".join(sorted(residual_signs)),
                  "threshold": "positive_and_negative",
                  "pass": eBOSS_mixed_residual_signs,
                  "interpretation": "eBOSS pressure is not a simple same-direction residual pattern."
              },
              {
                  "audit_id": "eBOSS_reference_interpolation_fallback",
                  "observed_value": eBOSS_reference_all_interpolation,
                  "threshold": True,
                  "pass": eBOSS_reference_all_interpolation,
                  "interpretation": "eBOSS reference values use interpolation fallback and need stronger reference support before interpretation."
              },
              {
                  "audit_id": "eBOSS_same_program_covariance_limited",
                  "observed_value": eBOSS_same_program_covariance_limited,
                  "threshold": True,
                  "pass": eBOSS_same_program_covariance_limited,
                  "interpretation": "eBOSS slice uses same-program diagonal sensitivity fallback and needs covariance/overlap review."
              },
              {
                  "audit_id": "final_pressure_blocked",
                  "observed_value": final_pressure_ready,
                  "threshold": False,
                  "pass": final_pressure_ready is False,
                  "interpretation": "Final pressure remains blocked."
              }
          ]

          if UPSTREAM_LOCKS["v4_129_guarded_expanded_growth_bridge_probe"]["expanded_bridge_pressure_computed"] is not True:
              failed_gates.append("upstream_expanded_bridge_not_computed")

          if UPSTREAM_LOCKS["v4_129_guarded_expanded_growth_bridge_probe"]["eBOSS_family_pressure_recorded"] is not True:
              failed_gates.append("upstream_eBOSS_pressure_not_recorded")

          if UPSTREAM_LOCKS["v4_129_guarded_expanded_growth_bridge_probe"]["full_planck_posterior_available"] is not False:
              failed_gates.append("upstream_full_planck_boundary_not_carried")

          if not eBOSS_pressure_localized:
              failed_gates.append("eBOSS_pressure_not_localized")

          if not expanded_all_non_pressure:
              failed_gates.append("expanded_all_lane_not_non_pressure")

          if not global_pressure_absent:
              failed_gates.append("global_pressure_absence_not_confirmed")

          if not eBOSS_mixed_residual_signs:
              failed_gates.append("eBOSS_mixed_residual_signs_not_recorded")

          if not eBOSS_reference_all_interpolation:
              failed_gates.append("eBOSS_reference_fallback_not_recorded")

          if not eBOSS_same_program_covariance_limited:
              failed_gates.append("eBOSS_covariance_limit_not_recorded")

          if not family_local_pressure_needs_review:
              failed_gates.append("family_local_pressure_review_route_not_triggered")

          if len(EBOSS_REVIEW_TARGETS) < 5:
              failed_gates.append("eBOSS_review_targets_incomplete")

          if NEXT_PROBE_DESIGN["allowed_to_compute_final_RSD_pressure"] is not False:
              failed_gates.append("next_probe_final_pressure_allowed_too_early")

          if NEXT_PROBE_DESIGN["allowed_to_validate_TAIRID"] is not False:
              failed_gates.append("next_probe_validation_allowed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "eboss local pressure flag is a final result",
              "eboss local pressure flag proves or disproves tairid",
              "same-program eboss points are independent by default",
              "no eboss source/covariance review is needed",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "expanded_growth_sensitivity_audit_passed_eBOSS_pressure_local_not_global_ready_for_eBOSS_source_covariance_reference_review_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_expanded_bridge_carried",
                  "pass": UPSTREAM_LOCKS["v4_129_guarded_expanded_growth_bridge_probe"]["expanded_bridge_pressure_computed"] is True,
                  "result": "v4.129 guarded expanded bridge carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "eBOSS_pressure_localized",
                  "pass": eBOSS_pressure_localized,
                  "result": f"pressure_lane_count={len(pressure_lanes)}; eBOSS_pressure_z={eBOSS_lane['pressure_z']}",
                  "boundary": "Local diagnostic flag, not final pressure."
              },
              {
                  "rule_id": "global_expanded_pressure_absent",
                  "pass": global_pressure_absent,
                  "result": f"expanded_all_chi2={expanded_all_lane['chi2']}; expanded_all_dof={expanded_all_lane['dof']}",
                  "boundary": "Global non-pressure diagnostic only."
              },
              {
                  "rule_id": "eBOSS_residual_structure_recorded",
                  "pass": eBOSS_mixed_residual_signs,
                  "result": f"strongest_abs_residual={eBOSS_strongest_abs_residual['target_id']}:{eBOSS_strongest_abs_residual['residual_observed_minus_reference']}",
                  "boundary": "Residual structure requires review."
              },
              {
                  "rule_id": "eBOSS_reference_and_covariance_limits_recorded",
                  "pass": eBOSS_reference_all_interpolation and eBOSS_same_program_covariance_limited,
                  "result": "eBOSS uses interpolation reference fallback and same-program diagonal sensitivity covariance",
                  "boundary": "Blocks interpretation."
              },
              {
                  "rule_id": "eBOSS_review_targets_declared",
                  "pass": len(EBOSS_REVIEW_TARGETS) >= 5,
                  "result": f"review_target_count={len(EBOSS_REVIEW_TARGETS)}",
                  "boundary": "Design next."
              },
              {
                  "rule_id": "next_probe_blocks_final_claims",
                  "pass": NEXT_PROBE_DESIGN["allowed_to_compute_final_RSD_pressure"] is False and NEXT_PROBE_DESIGN["allowed_to_validate_TAIRID"] is False,
                  "result": "next probe is source/covariance/reference review design, not final pressure",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_130_rules_passed")

          if failed_gates:
              readiness_label = "expanded_growth_sensitivity_audit_failed"
              next_allowed_step = "Repair expanded growth sensitivity audit before eBOSS review design."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.131 eBOSS family source/covariance/reference review design. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "expanded_bridge_pressure_computed_upstream": True,
              "bridge_lane_count": len(BRIDGE_LANE_RECORDS),
              "pressure_lane_count": len(pressure_lanes),
              "no_pressure_lane_count": len(no_pressure_lanes),
              "eBOSS_pressure_localized": eBOSS_pressure_localized,
              "eBOSS_pressure_z": eBOSS_lane["pressure_z"],
              "eBOSS_chi2": eBOSS_lane["chi2"],
              "eBOSS_dof": eBOSS_lane["dof"],
              "eBOSS_mixed_residual_signs": eBOSS_mixed_residual_signs,
              "eBOSS_strongest_abs_residual_target": eBOSS_strongest_abs_residual["target_id"],
              "eBOSS_strongest_abs_residual": eBOSS_strongest_abs_residual["residual_observed_minus_reference"],
              "eBOSS_reference_all_interpolation": eBOSS_reference_all_interpolation,
              "eBOSS_same_program_covariance_limited": eBOSS_same_program_covariance_limited,
              "expanded_all_non_pressure": expanded_all_non_pressure,
              "BOSS_core_non_pressure": BOSS_core_non_pressure,
              "low_z_BOSS_non_pressure": low_z_BOSS_non_pressure,
              "global_pressure_absent": global_pressure_absent,
              "family_local_pressure_needs_review": family_local_pressure_needs_review,
              "full_planck_posterior_available": False,
              "final_pressure_ready": final_pressure_ready,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "bridge_lane_records": BRIDGE_LANE_RECORDS,
              "eBOSS_component_records": EBOSS_COMPONENT_RECORDS,
              "lane_comparison_records": LANE_COMPARISON_RECORDS,
              "audit_thresholds": AUDIT_THRESHOLDS,
              "sensitivity_audit_results": SENSITIVITY_AUDIT_RESULTS,
              "eBOSS_review_targets": EBOSS_REVIEW_TARGETS,
              "next_probe_design": NEXT_PROBE_DESIGN,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "eBOSS_pressure_localized": eBOSS_pressure_localized,
                  "expanded_all_non_pressure": expanded_all_non_pressure,
                  "family_local_pressure_needs_review": family_local_pressure_needs_review,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_130_expanded_growth_sensitivity_audit.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "bridge_lane_records_v4_130.csv",
              BRIDGE_LANE_RECORDS,
              ["lane_id", "lane_family", "chi2", "dof", "pressure_z", "residual_mean", "lane_status", "claim_scope"]
          )

          write_csv(
              OUTDIR / "eBOSS_component_records_v4_130.csv",
              EBOSS_COMPONENT_RECORDS,
              ["target_id", "z", "observed_fsigma8", "observed_sigma", "reference_fsigma8_support", "reference_support_status", "residual_observed_minus_reference", "residual_sign", "source_family", "covariance_status"]
          )

          write_csv(
              OUTDIR / "lane_comparison_records_v4_130.csv",
              LANE_COMPARISON_RECORDS,
              ["comparison_id", "base_lane", "comparison_lane", "delta_chi2", "delta_pressure_z", "interpretation"]
          )

          write_csv(
              OUTDIR / "sensitivity_audit_results_v4_130.csv",
              SENSITIVITY_AUDIT_RESULTS,
              ["audit_id", "observed_value", "threshold", "pass", "interpretation"]
          )

          write_csv(
              OUTDIR / "eBOSS_review_targets_v4_130.csv",
              EBOSS_REVIEW_TARGETS,
              ["review_id", "target_id", "review_type", "why_needed"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_130.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_130.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_130.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.130 — Expanded Growth Sensitivity Audit")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.130 audits the v4.129 expanded bridge. The pressure flag is localized to the eBOSS family slice. It does not become a global expanded-lane pressure signal.")
          md.append("")
          md.append("The eBOSS flag is not final. It is tied to same-program diagonal sensitivity covariance and interpolation fallback reference support, so the next target is source/covariance/reference review for eBOSS.")
          md.append("")
          md.append("## Sensitivity result")
          md.append("")
          md.append("| Audit | Observed | Pass |")
          md.append("|---|---:|---|")
          for row in SENSITIVITY_AUDIT_RESULTS:
              md.append(f"| `{row['audit_id']}` | `{row['observed_value']}` | `{row['pass']}` |")
          md.append("")
          md.append("## eBOSS components")
          md.append("")
          md.append("| Target | z | Residual | Sign |")
          md.append("|---|---:|---:|---|")
          for row in EBOSS_COMPONENT_RECORDS:
              md.append(f"| `{row['target_id']}` | `{row['z']}` | `{row['residual_observed_minus_reference']}` | `{row['residual_sign']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_130_expanded_growth_sensitivity_audit.json",
              "tairid_v4_130_expanded_growth_sensitivity_audit.md",
              "bridge_lane_records_v4_130.csv",
              "eBOSS_component_records_v4_130.csv",
              "lane_comparison_records_v4_130.csv",
              "sensitivity_audit_results_v4_130.csv",
              "eBOSS_review_targets_v4_130.csv",
              "blocked_claims_v4_130.csv",
              "next_route_options_v4_130.csv",
              "rule_results_v4_130.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_130_expanded_growth_sensitivity_audit.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.130 expanded growth sensitivity audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-130-expanded-growth-sensitivity-audit
          path: artifacts/tairid_v4_130_expanded_growth_sensitivity_audit/
