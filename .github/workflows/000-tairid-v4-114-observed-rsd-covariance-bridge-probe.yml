          ]

          REFERENCE_FSIGMA8_COVARIANCE_UNREGULARIZED = [
              [5.5622090920879993e-05, 4.4037586982899846e-05, 3.754755885447482e-05, 3.297837692587006e-05, 4.737025097104237e-06],
              [4.4037586982899846e-05, 3.589162654643061e-05, 3.122276097496247e-05, 2.789979795934949e-05, 6.095691004505111e-06],
              [3.754755885447482e-05, 3.122276097496247e-05, 2.7526091544280627e-05, 2.4871161250237033e-05, 6.617005790363151e-06],
              [3.297837692587006e-05, 2.789979795934949e-05, 2.4871161250237033e-05, 2.2676249756259312e-05, 6.90208156493893e-06],
              [4.737025097104237e-06, 6.095691004505111e-06, 6.617005790363151e-06, 6.90208156493893e-06, 5.7718215961971236e-06]
          ]

          REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED = [
              [5.562209100820247e-05, 4.4037586707431904e-05, 3.754755889442331e-05, 3.297837710717998e-05, 4.737025053749357e-06],
              [4.4037586707431904e-05, 3.5891627510371965e-05, 3.12227605615546e-05, 2.789979758962016e-05, 6.095691128632226e-06],
              [3.754755889442331e-05, 3.12227605615546e-05, 2.752609243243442e-05, 2.4871160721047073e-05, 6.61700580879124e-06],
              [3.297837710717998e-05, 2.789979758962016e-05, 2.4871160721047073e-05, 2.2676250563482697e-05, 6.9020814479945925e-06],
              [4.737025053749357e-06, 6.095691128632226e-06, 6.61700580879124e-06, 6.9020814479945925e-06, 5.771821619405124e-06]
          ]

          OBSERVED_RSD_VECTOR = [
              {
                  "position": 0,
                  "z": 0.15,
                  "observed_fsigma8": 0.49,
                  "observed_sigma": 0.145,
                  "source_family": "SDSS_DR7_MGS",
                  "source_label": "Howlett et al. MGS z_eff=0.15 no-AP fσ8 average-sigma fallback",
                  "covariance_source_status": "diagonal_fallback_source_covariance_not_ingested",
                  "independence_warning": "low-z anchor; not source-covariance-complete",
                  "included_in_primary_bridge": True
              },
              {
                  "position": 1,
                  "z": 0.38,
                  "observed_fsigma8": 0.497,
                  "observed_sigma": 0.045,
                  "source_family": "BOSS_DR12_consensus",
                  "source_label": "BOSS DR12 consensus-like compressed fσ8 z=0.38",
                  "covariance_source_status": "diagonal_fallback_BOSS_covariance_not_ingested",
                  "independence_warning": "BOSS DR12 points correlated; source covariance not ingested in this probe",
                  "included_in_primary_bridge": True
              },
              {
                  "position": 2,
                  "z": 0.51,
                  "observed_fsigma8": 0.458,
                  "observed_sigma": 0.038,
                  "source_family": "BOSS_DR12_consensus",
                  "source_label": "BOSS DR12 consensus-like compressed fσ8 z=0.51",
                  "covariance_source_status": "diagonal_fallback_BOSS_covariance_not_ingested",
                  "independence_warning": "BOSS DR12 points correlated; source covariance not ingested in this probe",
                  "included_in_primary_bridge": True
              },
              {
                  "position": 3,
                  "z": 0.61,
                  "observed_fsigma8": 0.436,
                  "observed_sigma": 0.034,
                  "source_family": "BOSS_DR12_consensus",
                  "source_label": "BOSS DR12 consensus-like compressed fσ8 z=0.61",
                  "covariance_source_status": "diagonal_fallback_BOSS_covariance_not_ingested",
                  "independence_warning": "BOSS DR12 points correlated; source covariance not ingested in this probe",
                  "included_in_primary_bridge": True
              },
              {
                  "position": 4,
                  "z": 2.33,
                  "observed_fsigma8": 0.364,
                  "observed_sigma": 0.106,
                  "source_family": "high_z_LyA_compilation_anchor",
                  "source_label": "High-z Lyα/eBOSS-style compilation fσ8 z=2.33 diagnostic anchor",
                  "covariance_source_status": "diagonal_fallback_source_covariance_not_ingested",
                  "independence_warning": "high-z diagnostic anchor; source covariance not ingested in this probe",
                  "included_in_primary_bridge": True
              }
          ]

          BRIDGE_FORMULAS = [
              {"formula_id": "residual_vector", "formula": "d = observed - reference_mean", "computed_now": True},
              {"formula_id": "observed_diagonal_covariance", "formula": "C_obs = diag(sigma_obs^2)", "computed_now": True},
              {"formula_id": "primary_total_covariance", "formula": "C_total_primary = C_obs + C_reference_regularized", "computed_now": True},
              {"formula_id": "unregularized_total_covariance", "formula": "C_total_unregularized = C_obs + C_reference_unregularized", "computed_now": True},
              {"formula_id": "diagonal_reference_guard", "formula": "C_total_diag_guard = C_obs + diag(diag(C_reference_regularized))", "computed_now": True},
              {"formula_id": "diagnostic_chisq", "formula": "chi2 = d^T C_total_inverse d", "computed_now": True},
              {"formula_id": "diagnostic_pressure_z", "formula": "pressure_z = sign(mean(d))*sqrt(max(chi2-dof,0))", "computed_now": True}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "Observed RSD source covariance was fully ingested.",
              "Observed RSD covariance was computed from source covariance files.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The observed RSD covariance bridge probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The bridge pressure is final.",
              "Diagonal observed fallback is the same as full observed covariance.",
              "The bridge probe proves the model."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_115_regularized_pressure_sensitivity_audit",
                  "purpose": "Audit whether the bridge diagnostic depends strongly on regularized reference covariance, unregularized-plus-observed covariance, diagonal reference guard, or observed-only diagonal fallback.",
                  "why_next": "v4.114 computes a bridge diagnostic, but high condition number and diagonal observed fallback require sensitivity review."
              },
              {
                  "priority": 2,
                  "route_id": "v4_116_observed_covariance_source_upgrade",
                  "purpose": "Replace diagonal observed fallback with source-provided BOSS/observed covariance where available.",
                  "why_next": "Source covariance quality controls pressure reliability."
              },
              {
                  "priority": 3,
                  "route_id": "v4_117_growth_family_expansion_design",
                  "purpose": "Design whether additional independent RSD growth families should be added beyond the 5-slot bridge vector.",
                  "why_next": "A broader observed growth family may test whether pressure is local or robust."
              },
              {
                  "priority": 4,
                  "route_id": "v4_118_claim_boundary_review_handoff",
                  "purpose": "Summarize the reference-covariance and observed-bridge pipeline before any stronger interpretation.",
                  "why_next": "A human-readable boundary record is needed before public claims."
              }
          ]

          failed_gates = []
          warnings = [
              "diagnostic_bridge_pressure_only",
              "observed_covariance_diagonal_fallback_only",
              "source_covariance_not_ingested",
              "BOSS_DR12_cross_covariance_not_ingested",
              "regularized_reference_condition_warning_carried",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def mat_add(a, b):
              return [[float(a[i][j]) + float(b[i][j]) for j in range(len(a[0]))] for i in range(len(a))]

          def diag(values):
              n = len(values)
              return [[float(values[i]) if i == j else 0.0 for j in range(n)] for i in range(n)]

          def mat_diag_from_matrix(a):
              return [[float(a[i][i]) if i == j else 0.0 for j in range(len(a))] for i in range(len(a))]

          def mat_vec(a, v):
              return [sum(float(a[i][j]) * float(v[j]) for j in range(len(v))) for i in range(len(a))]

          def dot(a, b):
              return sum(float(x) * float(y) for x, y in zip(a, b))

          def mean(values):
              return sum(values) / len(values) if values else 0.0

          def sign(value):
              return 1.0 if value >= 0 else -1.0

          def inverse_matrix(a, tol=1e-20):
              n = len(a)
              rows = [[float(a[i][j]) for j in range(n)] + [1.0 if i == j else 0.0 for j in range(n)] for i in range(n)]
              det_sign = 1.0
              det_abs_log = 0.0
              for col in range(n):
                  pivot = max(range(col, n), key=lambda r: abs(rows[r][col]))
                  pivot_value = rows[pivot][col]
                  if abs(pivot_value) <= tol:
                      raise RuntimeError("singular_matrix_at_column_" + str(col))
                  if pivot != col:
                      rows[col], rows[pivot] = rows[pivot], rows[col]
                      det_sign *= -1.0
                  pivot_value = rows[col][col]
                  det_abs_log += math.log(abs(pivot_value))
                  for j in range(2 * n):
                      rows[col][j] /= pivot_value
                  for r in range(n):
                      if r != col:
                          factor = rows[r][col]
                          if abs(factor) > tol:
                              for j in range(2 * n):
                                  rows[r][j] -= factor * rows[col][j]
              inv = [row[n:] for row in rows]
              return inv, det_sign, det_abs_log

          def matrix_rank(a, tol=1e-14):
              rows = [[float(x) for x in row] for row in a]
              if not rows:
                  return 0
              m = len(rows)
              n = len(rows[0])
              rank = 0
              col = 0
              while rank < m and col < n:
                  pivot = None
                  pivot_abs = tol
                  for r in range(rank, m):
                      value_abs = abs(rows[r][col])
                      if value_abs > pivot_abs:
                          pivot_abs = value_abs
                          pivot = r
                  if pivot is None:
                      col += 1
                      continue
                  rows[rank], rows[pivot] = rows[pivot], rows[rank]
                  pivot_value = rows[rank][col]
                  rows[rank] = [x / pivot_value for x in rows[rank]]
                  for r in range(m):
                      if r != rank:
                          factor = rows[r][col]
                          if abs(factor) > tol:
                              rows[r] = [rv - factor * pv for rv, pv in zip(rows[r], rows[rank])]
                  rank += 1
                  col += 1
              return rank

          def max_symmetry_error(a):
              n = len(a)
              err = 0.0
              for i in range(n):
                  for j in range(n):
                      err = max(err, abs(float(a[i][j]) - float(a[j][i])))
              return err

          def diag_min(a):
              return min(float(a[i][i]) for i in range(len(a)))

          def frobenius_norm(a):
              return math.sqrt(sum(float(x) * float(x) for row in a for x in row))

          def condition_proxy(a, inv):
              return frobenius_norm(a) * frobenius_norm(inv)

          def compute_lane(lane_id, reference_covariance, observed_covariance, residual_vector, dof=5):
              total_covariance = mat_add(reference_covariance, observed_covariance)
              inv, det_sign, det_abs_log = inverse_matrix(total_covariance)
              projected = mat_vec(inv, residual_vector)
              chi2 = dot(residual_vector, projected)
              pressure_z = sign(mean(residual_vector)) * math.sqrt(max(chi2 - dof, 0.0))
              return {
                  "lane_id": lane_id,
                  "chi2": chi2,
                  "dof": dof,
                  "pressure_z": pressure_z,
                  "residual_mean": mean(residual_vector),
                  "rank_total_covariance": matrix_rank(total_covariance),
                  "symmetry_error_total_covariance": max_symmetry_error(total_covariance),
                  "diag_min_total_covariance": diag_min(total_covariance),
                  "condition_proxy_total_covariance": condition_proxy(total_covariance, inv),
                  "det_sign": det_sign,
                  "det_abs_log": det_abs_log,
                  "total_covariance": total_covariance,
                  "inverse_total_covariance": inv,
                  "computed": True,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              }

          observed_values = [float(row["observed_fsigma8"]) for row in OBSERVED_RSD_VECTOR]
          observed_sigmas = [float(row["observed_sigma"]) for row in OBSERVED_RSD_VECTOR]
          reference_values = [float(x) for x in REFERENCE_FSIGMA8_MEAN]
          residual_vector = [obs - ref for obs, ref in zip(observed_values, reference_values)]

          observed_covariance_diagonal = diag([sigma * sigma for sigma in observed_sigmas])
          reference_diagonal_guard = mat_diag_from_matrix(REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED)
          observed_only_zero_reference = diag([0.0 for _ in observed_sigmas])

          primary_lane = compute_lane(
              "primary_regularized_reference_plus_observed_diagonal",
              REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED,
              observed_covariance_diagonal,
              residual_vector
          )

          unregularized_plus_observed_lane = compute_lane(
              "unregularized_reference_plus_observed_diagonal",
              REFERENCE_FSIGMA8_COVARIANCE_UNREGULARIZED,
              observed_covariance_diagonal,
              residual_vector
          )

          diagonal_reference_guard_lane = compute_lane(
              "diagonal_reference_guard_plus_observed_diagonal",
              reference_diagonal_guard,
              observed_covariance_diagonal,
              residual_vector
          )

          observed_only_lane = compute_lane(
              "observed_only_diagonal_fallback",
              observed_only_zero_reference,
              observed_covariance_diagonal,
              residual_vector
          )

          bridge_lanes = [
              primary_lane,
              unregularized_plus_observed_lane,
              diagonal_reference_guard_lane,
              observed_only_lane
          ]

          observed_records = []
          for row in OBSERVED_RSD_VECTOR:
              pos = int(row["position"])
              observed_records.append({
                  **row,
                  "reference_fsigma8_mean": reference_values[pos],
                  "residual_observed_minus_reference": residual_vector[pos],
                  "observed_variance_diagonal": observed_sigmas[pos] ** 2
              })

          total_covariance_records = []
          inverse_records = []
          for lane in bridge_lanes:
              for i in range(5):
                  for j in range(5):
                      total_covariance_records.append({
                          "lane_id": lane["lane_id"],
                          "row_position": i,
                          "column_position": j,
                          "row_target": TARGET_VECTOR_ORDER[i]["target_name"],
                          "column_target": TARGET_VECTOR_ORDER[j]["target_name"],
                          "total_covariance_value": lane["total_covariance"][i][j],
                          "record_scope": "observed_RSD_bridge_diagnostic_not_final_pressure"
                      })
                      inverse_records.append({
                          "lane_id": lane["lane_id"],
                          "row_position": i,
                          "column_position": j,
                          "row_target": TARGET_VECTOR_ORDER[i]["target_name"],
                          "column_target": TARGET_VECTOR_ORDER[j]["target_name"],
                          "inverse_total_covariance_value": lane["inverse_total_covariance"][i][j],
                          "record_scope": "observed_RSD_bridge_diagnostic_not_final_pressure"
                      })

          bridge_lane_records = []
          for lane in bridge_lanes:
              bridge_lane_records.append({
                  "lane_id": lane["lane_id"],
                  "chi2": lane["chi2"],
                  "dof": lane["dof"],
                  "pressure_z": lane["pressure_z"],
                  "residual_mean": lane["residual_mean"],
                  "rank_total_covariance": lane["rank_total_covariance"],
                  "symmetry_error_total_covariance": lane["symmetry_error_total_covariance"],
                  "diag_min_total_covariance": lane["diag_min_total_covariance"],
                  "condition_proxy_total_covariance": lane["condition_proxy_total_covariance"],
                  "computed": lane["computed"],
                  "claim_scope": lane["claim_scope"]
              })

          primary = primary_lane
          unreg = unregularized_plus_observed_lane
          diag_guard = diagonal_reference_guard_lane
          obs_only = observed_only_lane

          pressure_sensitivity_records = [
              {
                  "comparison_id": "primary_minus_unregularized_plus_observed",
                  "base_lane": primary["lane_id"],
                  "comparison_lane": unreg["lane_id"],
                  "delta_chi2": primary["chi2"] - unreg["chi2"],
                  "delta_pressure_z": primary["pressure_z"] - unreg["pressure_z"],
                  "interpretation": "Reference regularization sensitivity once observed diagonal covariance is added."
              },
              {
                  "comparison_id": "primary_minus_diagonal_reference_guard",
                  "base_lane": primary["lane_id"],
                  "comparison_lane": diag_guard["lane_id"],
                  "delta_chi2": primary["chi2"] - diag_guard["chi2"],
                  "delta_pressure_z": primary["pressure_z"] - diag_guard["pressure_z"],
                  "interpretation": "Off-diagonal reference covariance sensitivity."
              },
              {
                  "comparison_id": "primary_minus_observed_only",
                  "base_lane": primary["lane_id"],
                  "comparison_lane": obs_only["lane_id"],
                  "delta_chi2": primary["chi2"] - obs_only["chi2"],
                  "delta_pressure_z": primary["pressure_z"] - obs_only["pressure_z"],
                  "interpretation": "Reference uncertainty contribution sensitivity."
              }
          ]

          observed_vector_complete = len(observed_values) == 5 and all(math.isfinite(x) for x in observed_values)
          observed_sigma_complete = len(observed_sigmas) == 5 and all(math.isfinite(x) and x > 0 for x in observed_sigmas)
          reference_vector_complete = len(reference_values) == 5 and all(math.isfinite(x) for x in reference_values)
          observed_covariance_computed = len(observed_covariance_diagonal) == 5 and len(observed_covariance_diagonal[0]) == 5
          total_covariance_computed = len(total_covariance_records) == 4 * 25
          inverse_total_covariance_computed = len(inverse_records) == 4 * 25
          bridge_pressure_computed = all(row["computed"] is True and math.isfinite(float(row["chi2"])) for row in bridge_lanes)
          all_total_covariances_rank5 = all(row["rank_total_covariance"] == 5 for row in bridge_lanes)
          all_total_covariances_symmetric = all(float(row["symmetry_error_total_covariance"]) <= 1e-18 for row in bridge_lanes)
          all_total_covariance_diagonal_positive = all(float(row["diag_min_total_covariance"]) > 0 for row in bridge_lanes)

          if not UPSTREAM_LOCKS["v4_113_observed_RSD_covariance_bridge_design"]["target_redshift_order"] == [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("upstream_target_redshift_order_not_carried")

          if not UPSTREAM_LOCKS["v4_112_regularized_covariance_sufficiency_gate"]["regularized_covariance_bridge_ready"]:
              failed_gates.append("upstream_regularized_bridge_not_ready")

          if not observed_vector_complete:
              failed_gates.append("observed_vector_incomplete")

          if not observed_sigma_complete:
              failed_gates.append("observed_sigma_incomplete")

          if not reference_vector_complete:
              failed_gates.append("reference_vector_incomplete")

          if not observed_covariance_computed:
              failed_gates.append("observed_covariance_not_computed")

          if not total_covariance_computed:
              failed_gates.append("total_covariance_records_not_computed")

          if not inverse_total_covariance_computed:
              failed_gates.append("inverse_total_covariance_records_not_computed")

          if not bridge_pressure_computed:
              failed_gates.append("bridge_pressure_not_computed")

          if not all_total_covariances_rank5:
              failed_gates.append("not_all_total_covariances_rank5")

          if not all_total_covariances_symmetric:
              failed_gates.append("not_all_total_covariances_symmetric")

          if not all_total_covariance_diagonal_positive:
              failed_gates.append("not_all_total_covariance_diagonals_positive")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "observed rsd source covariance was fully ingested",
              "final rsd pressure score",
              "validates tairid cosmology",
              "diagonal observed fallback is the same as full observed covariance",
              "bridge pressure is final",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "observed_RSD_covariance_bridge_probe_passed_diagnostic_only_ready_for_regularized_pressure_sensitivity_audit"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_bridge_design_carried",
                  "pass": UPSTREAM_LOCKS["v4_113_observed_RSD_covariance_bridge_design"]["target_redshift_order"] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target vector order carried from v4.113",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "observed_vector_complete",
                  "pass": observed_vector_complete and observed_sigma_complete,
                  "result": f"observed_values={observed_values}; observed_sigmas={observed_sigmas}",
                  "boundary": "Observed diagonal fallback only."
              },
              {
                  "rule_id": "reference_vector_available",
                  "pass": reference_vector_complete,
                  "result": f"reference_mean={reference_values}",
                  "boundary": "Carried v4.111.1 diagnostic reference."
              },
              {
                  "rule_id": "observed_covariance_computed",
                  "pass": observed_covariance_computed,
                  "result": "observed diagonal fallback covariance computed",
                  "boundary": "Not source-provided full covariance."
              },
              {
                  "rule_id": "total_covariance_lanes_computed",
                  "pass": total_covariance_computed and inverse_total_covariance_computed,
                  "result": f"total_covariance_records={len(total_covariance_records)}; inverse_records={len(inverse_records)}",
                  "boundary": "Diagnostic lanes only."
              },
              {
                  "rule_id": "bridge_pressure_diagnostic_computed",
                  "pass": bridge_pressure_computed,
                  "result": f"primary_chi2={primary['chi2']}; primary_pressure_z={primary['pressure_z']}",
                  "boundary": "Diagnostic pressure only, not final RSD pressure."
              },
              {
                  "rule_id": "rank_and_symmetry_gates_passed",
                  "pass": all_total_covariances_rank5 and all_total_covariances_symmetric and all_total_covariance_diagonal_positive,
                  "result": "all total covariance lanes rank 5, symmetric, and positive diagonal",
                  "boundary": "Numerical bridge health only."
              },
              {
                  "rule_id": "sensitivity_lanes_reported",
                  "pass": len(pressure_sensitivity_records) >= 3 and len(bridge_lane_records) == 4,
                  "result": f"bridge_lanes={len(bridge_lane_records)}; sensitivity_records={len(pressure_sensitivity_records)}",
                  "boundary": "Sensitivity visibility only."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": True,
                  "result": "final RSD pressure and TAIRID validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_114_rules_passed")

          if failed_gates:
              readiness_label = "observed_RSD_covariance_bridge_probe_failed"
              next_allowed_step = "Repair observed RSD covariance bridge probe before sensitivity audit."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.115 regularized pressure sensitivity audit. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "observed_vector_dimension": len(observed_values),
              "target_redshift_order": [row["z"] for row in TARGET_VECTOR_ORDER],
              "observed_vector_complete": observed_vector_complete,
              "observed_sigma_complete": observed_sigma_complete,
              "reference_vector_complete": reference_vector_complete,
              "observed_covariance_computed": observed_covariance_computed,
              "observed_covariance_status": "diagonal_fallback_source_covariance_not_ingested",
              "total_covariance_computed": total_covariance_computed,
              "inverse_total_covariance_computed": inverse_total_covariance_computed,
              "bridge_pressure_computed": bridge_pressure_computed,
              "primary_chi2": primary["chi2"],
              "primary_pressure_z": primary["pressure_z"],
              "primary_residual_mean": primary["residual_mean"],
              "primary_total_covariance_rank": primary["rank_total_covariance"],
              "primary_condition_proxy_total_covariance": primary["condition_proxy_total_covariance"],
              "unregularized_plus_observed_chi2": unreg["chi2"],
              "diagonal_reference_guard_chi2": diag_guard["chi2"],
              "observed_only_chi2": obs_only["chi2"],
              "sensitivity_record_count": len(pressure_sensitivity_records),
              "source_observed_covariance_ingested": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "target_vector_order": TARGET_VECTOR_ORDER,
              "reference_fsigma8_mean": REFERENCE_FSIGMA8_MEAN,
              "reference_fsigma8_covariance_unregularized": REFERENCE_FSIGMA8_COVARIANCE_UNREGULARIZED,
              "reference_fsigma8_covariance_regularized": REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED,
              "observed_RSD_vector": OBSERVED_RSD_VECTOR,
              "observed_records": observed_records,
              "observed_covariance_diagonal": observed_covariance_diagonal,
              "residual_vector_observed_minus_reference": residual_vector,
              "bridge_formulas": BRIDGE_FORMULAS,
              "bridge_lane_records": bridge_lane_records,
              "total_covariance_records": total_covariance_records,
              "inverse_total_covariance_records": inverse_records,
              "pressure_sensitivity_records": pressure_sensitivity_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "observed_RSD_values_computed": observed_vector_complete,
                  "observed_RSD_covariance_computed": observed_covariance_computed,
                  "source_observed_covariance_ingested": False,
                  "total_covariance_computed": total_covariance_computed,
                  "bridge_pressure_computed": bridge_pressure_computed,
                  "primary_chi2": primary["chi2"],
                  "primary_pressure_z": primary["pressure_z"],
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_114_observed_RSD_covariance_bridge_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "observed_records_v4_114.csv",
              observed_records,
              [
                  "position",
                  "z",
                  "observed_fsigma8",
                  "observed_sigma",
                  "source_family",
                  "source_label",
                  "covariance_source_status",
                  "independence_warning",
                  "included_in_primary_bridge",
                  "reference_fsigma8_mean",
                  "residual_observed_minus_reference",
                  "observed_variance_diagonal"
              ]
          )

          write_csv(
              OUTDIR / "bridge_lane_records_v4_114.csv",
              bridge_lane_records,
              [
                  "lane_id",
                  "chi2",
                  "dof",
                  "pressure_z",
                  "residual_mean",
                  "rank_total_covariance",
                  "symmetry_error_total_covariance",
                  "diag_min_total_covariance",
                  "condition_proxy_total_covariance",
                  "computed",
                  "claim_scope"
              ]
          )

          write_csv(
              OUTDIR / "total_covariance_records_v4_114.csv",
              total_covariance_records,
              [
                  "lane_id",
                  "row_position",
                  "column_position",
                  "row_target",
                  "column_target",
                  "total_covariance_value",
                  "record_scope"
              ]
          )

          write_csv(
              OUTDIR / "inverse_total_covariance_records_v4_114.csv",
              inverse_records,
              [
                  "lane_id",
                  "row_position",
                  "column_position",
                  "row_target",
                  "column_target",
                  "inverse_total_covariance_value",
                  "record_scope"
              ]
          )

          write_csv(
              OUTDIR / "pressure_sensitivity_records_v4_114.csv",
              pressure_sensitivity_records,
              ["comparison_id", "base_lane", "comparison_lane", "delta_chi2", "delta_pressure_z", "interpretation"]
          )

          write_csv(
              OUTDIR / "bridge_formulas_v4_114.csv",
              BRIDGE_FORMULAS,
              ["formula_id", "formula", "computed_now"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_114.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_114.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_114.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.114 — Observed RSD Covariance Bridge Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This workflow computes the first guarded observed/reference RSD bridge diagnostic using the v4.111.1 regularized reference covariance and a diagonal observed RSD fallback covariance.")
          md.append("")
          md.append("This is not final RSD pressure. Source-provided observed covariance has not been ingested. The next move is a pressure-sensitivity audit.")
          md.append("")
          md.append("## Primary diagnostic")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Bridge lanes")
          md.append("")
          md.append("| Lane | chi2 | pressure_z | rank |")
          md.append("|---|---:|---:|---:|")
          for row in bridge_lane_records:
              md.append(f"| `{row['lane_id']}` | `{row['chi2']}` | `{row['pressure_z']}` | `{row['rank_total_covariance']}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_114_observed_RSD_covariance_bridge_probe.json",
              "tairid_v4_114_observed_RSD_covariance_bridge_probe.md",
              "observed_records_v4_114.csv",
              "bridge_lane_records_v4_114.csv",
              "total_covariance_records_v4_114.csv",
              "inverse_total_covariance_records_v4_114.csv",
              "pressure_sensitivity_records_v4_114.csv",
              "bridge_formulas_v4_114.csv",
              "blocked_claims_v4_114.csv",
              "next_route_options_v4_114.csv",
              "rule_results_v4_114.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_114_observed_RSD_covariance_bridge_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.114 observed RSD covariance bridge probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-114-observed-rsd-covariance-bridge-probe
          path: artifacts/tairid_v4_114_observed_rsd_covariance_bridge_probe/
