name: 000 TAIRID v4.114 Observed RSD Covariance Bridge Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-114-observed-rsd-covariance-bridge-probe.yml"

jobs:
  tairid-v4-114-observed-rsd-covariance-bridge-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
