name: "!!! AAA CURRENT - TAIRID v4.404 eBOSS observed value covariance availability gate no support"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-v4-404-eboss-observed-value-covariance-availability-gate-no-support:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas

      - name: Run TAIRID v4.404 eBOSS availability gate
        run: |
          cat > run_tairid_v4_404_eboss_observed_value_covariance_availability_gate_no_support.py <<'PY'
          import json
          import zipfile
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd
          
          VERSION = "v4.404"
          ROUTE_NAME = "v4_404_eboss_observed_value_and_covariance_availability_gate_no_values_no_support_claims"
          EXPECTED_RESULT = "v4_404_eboss_observed_value_covariance_availability_gate_passed_source_family_available_no_values_no_support_claims"
          INPUT_PATTERN = "tairid-v4-403-eboss-source-candidate-review-accepted-source-staging-no-values-no-support-output*.zip"
          OUTPUT_DIR = Path("tairid_v4_404_eboss_observed_value_covariance_availability_gate_no_support_output")
          OUTPUT_ZIP = Path("tairid-v4-404-eboss-observed-value-covariance-availability-gate-no-values-no-support-output.zip")
          
          CLAIM_BOUNDARY = (
              "eBOSS observed-value and covariance availability gate only; source-family availability may be assessed; "
              "no new observed numeric values loaded into the testing ledger; no covariance values loaded; no new chi-square computed; "
              "no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"
          )
          
          OFFICIAL_SDSS_FINAL_BAO_RSD_PAGE = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          OFFICIAL_SDSS_PUBLIC_LIKELIHOOD_COVARIANCE_REPOSITORY = "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/"
          
          def truthy_false(x):
              if isinstance(x, bool):
                  return x is False
              if isinstance(x, (int, float)):
                  return float(x) == 0.0
              return str(x).strip().lower() in {"false", "0", "0.0", "no", "none", "nan", ""}
          
          def find_input_zip():
              candidates = [p for p in Path(".").glob("**/" + INPUT_PATTERN) if p.name != OUTPUT_ZIP.name and p.is_file()]
              if not candidates:
                  raise FileNotFoundError(f"No input zip found matching {INPUT_PATTERN}")
              candidates.sort(key=lambda p: (p.stat().st_mtime, len(str(p))), reverse=True)
              return candidates[0]
          
          def read_zip_json(zf, suffix):
              matches = [n for n in zf.namelist() if n.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Missing JSON suffix in zip: {suffix}")
              return json.loads(zf.read(matches[0]).decode("utf-8"))
          
          def read_zip_csv(zf, suffix):
              matches = [n for n in zf.namelist() if n.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Missing CSV suffix in zip: {suffix}")
              return pd.read_csv(zf.open(matches[0]))
          
          def write_csv(df, name):
              path = OUTPUT_DIR / name
              df.to_csv(path, index=False)
              return path
          
          def norm_bool_series_false(df, col):
              if col not in df.columns:
                  return False
              return all(truthy_false(v) for v in df[col].tolist())
          
          def main():
              input_zip = find_input_zip()
              if OUTPUT_DIR.exists():
                  import shutil
                  shutil.rmtree(OUTPUT_DIR)
              OUTPUT_DIR.mkdir(parents=True, exist_ok=True)
          
              with zipfile.ZipFile(input_zip, "r") as zf:
                  summary403 = read_zip_json(zf, "v4_403_summary.json")
                  accepted_sources = read_zip_csv(zf, "v4_403_ACCEPTED_eboss_sources_FOR_AVAILABILITY_GATE_NO_VALUES_NO_SUPPORT.csv")
                  role_staging = read_zip_csv(zf, "v4_403_accepted_source_role_staging_NO_VALUES_NO_SUPPORT.csv")
                  avail_reqs = read_zip_csv(zf, "v4_403_next_gate_observed_value_covariance_availability_packet_NO_VALUES_NO_SUPPORT.csv")
                  gaps403 = read_zip_csv(zf, "v4_403_gap_status_after_accepted_source_staging.csv")
                  limits403 = read_zip_csv(zf, "v4_403_limitations_after_accepted_source_staging.csv")
                  rules403 = read_zip_csv(zf, "v4_403_rule_checks.csv")
          
              checks = []
              def add(gate, passed):
                  checks.append({"gate": gate, "passed": bool(passed)})
          
              add("input_403_zip_found", input_zip.exists())
              add("input_403_summary_version_correct", summary403.get("version") == "v4.403")
              add("input_403_expected_result_correct", summary403.get("expected_result") == "v4_403_eboss_source_candidate_review_accepted_source_staging_passed_no_values_no_support_claims")
              add("input_403_rules_all_passed", int(summary403.get("rules_passed", -1)) == int(summary403.get("rules_total", -2)) == 49)
              add("input_403_failed_gates_none", str(summary403.get("failed_gates")).lower() == "none")
              add("input_403_accepted_source_candidate_rows_3", int(summary403.get("accepted_source_candidate_rows", -1)) == 3)
              add("input_403_accepted_source_role_rows_9", int(summary403.get("accepted_source_role_rows", -1)) == 9)
              add("input_403_availability_packet_rows_9", int(summary403.get("availability_packet_rows", -1)) == 9)
              add("input_403_lrg_accepted_rows_1", int(summary403.get("lrg_accepted_rows", -1)) == 1)
              add("input_403_elg_accepted_rows_1", int(summary403.get("elg_accepted_rows", -1)) == 1)
              add("input_403_qso_accepted_rows_1", int(summary403.get("qso_accepted_rows", -1)) == 1)
              for flag in ["new_observed_values_loaded","covariance_values_loaded","new_chi_square_computed","likelihood_computed","p_values_computed","score_valid","support_allowed"]:
                  add(f"input_403_{flag}_false", truthy_false(summary403.get(flag)))
          
              add("accepted_sources_rows_equal_3", len(accepted_sources) == 3)
              add("role_staging_rows_equal_9", len(role_staging) == 9)
              add("availability_reqs_rows_equal_9", len(avail_reqs) == 9)
              add("gaps_rows_at_least_4", len(gaps403) >= 4)
              add("limits_rows_at_least_4", len(limits403) >= 4)
              add("rules403_all_true", "passed" in rules403.columns and rules403["passed"].map(lambda x: str(x).strip().lower() == "true").all())
          
              tracers = sorted(set(accepted_sources["tracer_or_sample_family"].astype(str)))
              add("accepted_tracers_are_lrg_elg_qso", tracers == ["ELG","LRG","QSO"])
          
              for flag in ["observed_values_loaded_now","covariance_values_loaded_now","new_chi_square_computed","likelihood_computed","p_values_computed","score_valid","support_allowed"]:
                  if flag in accepted_sources.columns:
                      add(f"accepted_sources_{flag}_false", norm_bool_series_false(accepted_sources, flag))
              for flag in ["observed_values_loaded_now","covariance_values_loaded_now","new_chi_square_computed","likelihood_computed","p_values_computed","score_valid","support_allowed"]:
                  if flag in role_staging.columns:
                      add(f"role_staging_{flag}_false", norm_bool_series_false(role_staging, flag))
              for flag in ["values_loaded_now","covariance_values_loaded_now","new_chi_square_computed","support_allowed"]:
                  if flag in avail_reqs.columns:
                      add(f"availability_reqs_{flag}_false", norm_bool_series_false(avail_reqs, flag))
          
              # Source-family availability: confirmed at family/source page level only.
              tracer_rows = []
              for i, tracer in enumerate(["LRG","ELG","QSO"], start=1):
                  selected_family = f"eBOSS_{tracer}_fsigma8_expansion"
                  tracer_rows.append({
                      "v4_404_tracer_availability_id": f"V4_404_TRACER_AVAIL_{i:03d}",
                      "selected_family": selected_family,
                      "survey_or_release_family": "eBOSS",
                      "tracer_or_sample_family": tracer,
                      "official_sdss_final_bao_rsd_page": OFFICIAL_SDSS_FINAL_BAO_RSD_PAGE,
                      "public_likelihood_covariance_repository_family": OFFICIAL_SDSS_PUBLIC_LIKELIHOOD_COVARIANCE_REPOSITORY,
                      "observed_value_source_family_available": True,
                      "covariance_or_likelihood_source_family_available": True,
                      "observable_definition_source_family_available": True,
                      "family_availability_assessment": "available_at_source_family_level_exact_numeric_loading_deferred",
                      "exact_value_loading_allowed_in_this_gate": False,
                      "exact_covariance_loading_allowed_in_this_gate": False,
                      "ready_for_v4_405_exact_source_fetch_or_table_capture": True,
                      "new_observed_values_loaded": False,
                      "covariance_values_loaded": False,
                      "new_chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY
                  })
              tracer_availability = pd.DataFrame(tracer_rows)
          
              role_assessment_rows = []
              for idx, row in avail_reqs.reset_index(drop=True).iterrows():
                  role_assessment_rows.append({
                      "v4_404_availability_assessment_id": f"V4_404_AVAILABILITY_ASSESSMENT_{idx+1:03d}",
                      "source_from_v4_403_availability_gate_id": row.get("v4_403_availability_gate_id", f"row_{idx+1}"),
                      "selected_family": row.get("selected_family"),
                      "tracer_or_sample_family": row.get("tracer_or_sample_family"),
                      "requirement_type": row.get("requirement_type"),
                      "required_confirmation_before_values": row.get("required_confirmation_before_values"),
                      "source_family_availability_status": "family_available_exact_source_or_header_still_required",
                      "availability_evidence_type": "official_sdss_final_bao_rsd_page_and_public_data_repository_anchor",
                      "exact_numeric_values_loaded_now": False,
                      "covariance_values_loaded_now": False,
                      "next_gate_action": "v4_405_exact_source_fetch_table_header_or_file_member_capture_before_value_loading",
                      "new_chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY
                  })
              availability_assessment = pd.DataFrame(role_assessment_rows)
          
              source_anchor_rows = [
                  {
                      "v4_404_source_anchor_id": "V4_404_SOURCE_ANCHOR_001",
                      "source_anchor_label": "SDSS final BAO and RSD measurements page",
                      "source_url": OFFICIAL_SDSS_FINAL_BAO_RSD_PAGE,
                      "source_role": "official measurement table and background page",
                      "availability_status": "accepted_for_exact_fetch_or_manual_table_capture_next_gate",
                      "values_loaded_now": False,
                      "covariance_values_loaded_now": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY
                  },
                  {
                      "v4_404_source_anchor_id": "V4_404_SOURCE_ANCHOR_002",
                      "source_anchor_label": "SDSS public DR16cosmo likelihood covariance chain repository",
                      "source_url": OFFICIAL_SDSS_PUBLIC_LIKELIHOOD_COVARIANCE_REPOSITORY,
                      "source_role": "public likelihood/covariance/chain repository family",
                      "availability_status": "accepted_for_controlled_repository_listing_next_gate",
                      "values_loaded_now": False,
                      "covariance_values_loaded_now": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY
                  }
              ]
              source_anchors = pd.DataFrame(source_anchor_rows)
          
              locator_rows = []
              for idx, row in role_staging.reset_index(drop=True).iterrows():
                  req_type = row.get("source_role", row.get("requirement_type", "unknown"))
                  locator_rows.append({
                      "v4_404_exact_locator_id": f"V4_404_EXACT_LOCATOR_{idx+1:03d}",
                      "source_from_v4_403_role_stage_id": row.get("v4_403_role_stage_id", f"row_{idx+1}"),
                      "selected_family": row.get("selected_family"),
                      "tracer_or_sample_family": row.get("tracer_or_sample_family"),
                      "source_role": req_type,
                      "official_source_family": row.get("source_family_label"),
                      "primary_source_anchor": OFFICIAL_SDSS_FINAL_BAO_RSD_PAGE,
                      "repository_source_anchor": OFFICIAL_SDSS_PUBLIC_LIKELIHOOD_COVARIANCE_REPOSITORY,
                      "next_required_confirmation": row.get("must_confirm_before_values"),
                      "v4_405_locator_task": "capture_exact_table_line_file_header_or_archive_member_without_scoring",
                      "may_load_numeric_values_in_v4_404": False,
                      "may_load_covariance_values_in_v4_404": False,
                      "new_chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY
                  })
              exact_locator_packet = pd.DataFrame(locator_rows)
          
              route_status = pd.DataFrame([
                  {"status_id":"V4_404_STATUS_001","status":"input_v4_403_accepted_source_staging_preserved","detail":"The three accepted eBOSS tracer source families were preserved from v4.403."},
                  {"status_id":"V4_404_STATUS_002","status":"source_family_availability_confirmed","detail":"Official SDSS final BAO/RSD source family and public likelihood/covariance repository family were staged for exact source fetch/header capture."},
                  {"status_id":"V4_404_STATUS_003","status":"values_still_not_loaded","detail":"No new observed values or covariance values were loaded in v4.404."},
                  {"status_id":"V4_404_STATUS_004","status":"next_route_selected","detail":"v4_405_eboss_exact_source_fetch_table_header_and_file_member_capture_no_scoring_no_support_claims"},
                  {"status_id":"V4_404_STATUS_005","status":"support_still_blocked","detail":"support_allowed=false remains active."},
              ])
          
              limitations = pd.DataFrame([
                  {"limit_id":"V4_404_LIMIT_001","limit":"This is a source-family availability gate only, not a numeric observed-data test.","status":"active_limit"},
                  {"limit_id":"V4_404_LIMIT_002","limit":"The official source family is available, but exact table lines, headers, archive members, and numeric values remain deferred to v4.405+.","status":"active_limit"},
                  {"limit_id":"V4_404_LIMIT_003","limit":"No covariance values or likelihood objects are loaded in v4.404.","status":"blocked_by_design"},
                  {"limit_id":"V4_404_LIMIT_004","limit":"No chi-square, likelihood, p-values, score validation, or support claim is allowed.","status":"blocked_by_design"},
              ])
          
              gaps = pd.DataFrame([
                  {"gap_id":"V4_404_GAP_001","gap":"Exact eBOSS LRG observed f_sigma8 table line/file member still needs controlled capture.","status_after_v4_404":"selected_next","next_gate":"v4_405_exact_source_fetch_header_capture"},
                  {"gap_id":"V4_404_GAP_002","gap":"Exact eBOSS ELG observed f_sigma8 table line/file member still needs controlled capture.","status_after_v4_404":"selected_next","next_gate":"v4_405_exact_source_fetch_header_capture"},
                  {"gap_id":"V4_404_GAP_003","gap":"Exact eBOSS QSO observed f_sigma8 table line/file member still needs controlled capture.","status_after_v4_404":"selected_next","next_gate":"v4_405_exact_source_fetch_header_capture"},
                  {"gap_id":"V4_404_GAP_004","gap":"Covariance/likelihood compatibility remains untested until exact members are captured and inspected.","status_after_v4_404":"still_blocked","next_gate":"after_v4_405"},
                  {"gap_id":"V4_404_GAP_005","gap":"No support claim is permitted.","status_after_v4_404":"still_blocked","next_gate":"no_support_claims_allowed"},
              ])
          
              summary = {
                  "version": VERSION,
                  "route_name": ROUTE_NAME,
                  "expected_result": EXPECTED_RESULT,
                  "input_version": "v4.403",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": None,
                  "rules_total": None,
                  "failed_gates": None,
                  "accepted_source_rows": int(len(accepted_sources)),
                  "accepted_role_rows": int(len(role_staging)),
                  "availability_requirement_rows": int(len(avail_reqs)),
                  "tracer_availability_rows": int(len(tracer_availability)),
                  "source_anchor_rows": int(len(source_anchors)),
                  "availability_assessment_rows": int(len(availability_assessment)),
                  "exact_locator_packet_rows": int(len(exact_locator_packet)),
                  "observed_value_source_family_available_rows": int(tracer_availability["observed_value_source_family_available"].sum()),
                  "covariance_or_likelihood_source_family_available_rows": int(tracer_availability["covariance_or_likelihood_source_family_available"].sum()),
                  "observable_definition_source_family_available_rows": int(tracer_availability["observable_definition_source_family_available"].sum()),
                  "ready_for_v4_405_exact_source_fetch_rows": int(tracer_availability["ready_for_v4_405_exact_source_fetch_or_table_capture"].sum()),
                  "prior_guarded_diagonal_chi_square_sum": summary403.get("prior_guarded_diagonal_chi_square_sum"),
                  "primary_dM_Hz_chi_square_dry_run_sum": summary403.get("primary_dM_Hz_chi_square_dry_run_sum"),
                  "robustness_min_chi_square": summary403.get("robustness_min_chi_square"),
                  "robustness_max_chi_square": summary403.get("robustness_max_chi_square"),
                  "robustness_chi_square_range_width": summary403.get("robustness_chi_square_range_width"),
                  "new_observed_values_loaded": False,
                  "covariance_values_loaded": False,
                  "new_chi_square_computed": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "v4_405_eboss_exact_source_fetch_table_header_and_file_member_capture_no_scoring_no_support_claims"
              }
          
              # Output-derived checks
              add("tracer_availability_rows_equal_3", len(tracer_availability) == 3)
              add("source_anchor_rows_equal_2", len(source_anchors) == 2)
              add("availability_assessment_rows_equal_9", len(availability_assessment) == 9)
              add("exact_locator_packet_rows_equal_9", len(exact_locator_packet) == 9)
              add("observed_value_source_family_available_rows_equal_3", int(tracer_availability["observed_value_source_family_available"].sum()) == 3)
              add("covariance_or_likelihood_source_family_available_rows_equal_3", int(tracer_availability["covariance_or_likelihood_source_family_available"].sum()) == 3)
              add("observable_definition_source_family_available_rows_equal_3", int(tracer_availability["observable_definition_source_family_available"].sum()) == 3)
              add("ready_for_v4_405_exact_source_fetch_rows_equal_3", int(tracer_availability["ready_for_v4_405_exact_source_fetch_or_table_capture"].sum()) == 3)
              add("no_numeric_values_loaded_in_tracer_availability", norm_bool_series_false(tracer_availability, "new_observed_values_loaded"))
              add("no_covariance_values_loaded_in_tracer_availability", norm_bool_series_false(tracer_availability, "covariance_values_loaded"))
              add("no_support_allowed_in_tracer_availability", norm_bool_series_false(tracer_availability, "support_allowed"))
              add("no_numeric_values_loaded_in_locator_packet", norm_bool_series_false(exact_locator_packet, "may_load_numeric_values_in_v4_404"))
              add("no_covariance_values_loaded_in_locator_packet", norm_bool_series_false(exact_locator_packet, "may_load_covariance_values_in_v4_404"))
              add("no_support_allowed_in_locator_packet", norm_bool_series_false(exact_locator_packet, "support_allowed"))
              add("summary_new_observed_values_loaded_false", truthy_false(summary["new_observed_values_loaded"]))
              add("summary_covariance_values_loaded_false", truthy_false(summary["covariance_values_loaded"]))
              add("summary_new_chi_square_computed_false", truthy_false(summary["new_chi_square_computed"]))
              add("summary_likelihood_computed_false", truthy_false(summary["likelihood_computed"]))
              add("summary_p_values_computed_false", truthy_false(summary["p_values_computed"]))
              add("summary_score_valid_false", truthy_false(summary["score_valid"]))
              add("summary_support_allowed_false", truthy_false(summary["support_allowed"]))
              add("selected_next_route_is_v4_405", summary["selected_next_route"].startswith("v4_405"))
          
              rules = pd.DataFrame(checks)
              failed = rules.loc[~rules["passed"].astype(bool), "gate"].tolist()
              summary["rules_passed"] = int(rules["passed"].sum())
              summary["rules_total"] = int(len(rules))
              summary["failed_gates"] = "none" if not failed else ";".join(failed)
          
              write_csv(tracer_availability, "v4_404_eboss_tracer_source_family_availability_NO_VALUES_NO_SUPPORT.csv")
              write_csv(source_anchors, "v4_404_official_source_anchors_FOR_EXACT_FETCH_NO_VALUES_NO_SUPPORT.csv")
              write_csv(availability_assessment, "v4_404_observed_value_covariance_availability_assessment_NO_VALUES_NO_SUPPORT.csv")
              write_csv(exact_locator_packet, "v4_404_exact_source_locator_packet_FOR_V4_405_NO_VALUES_NO_SUPPORT.csv")
              write_csv(route_status, "v4_404_route_status_summary.csv")
              write_csv(limitations, "v4_404_limitations_after_availability_gate.csv")
              write_csv(gaps, "v4_404_gap_status_after_availability_gate.csv")
              write_csv(rules, "v4_404_rule_checks.csv")
          
              with open(OUTPUT_DIR / "v4_404_summary.json", "w", encoding="utf-8") as f:
                  json.dump(summary, f, indent=2)
              with open(OUTPUT_DIR / "v4_404_summary.md", "w", encoding="utf-8") as f:
                  f.write(f"# {VERSION} eBOSS observed-value and covariance availability gate\n\n")
                  f.write(f"Expected result: `{EXPECTED_RESULT}`\n\n")
                  f.write(f"Rules: {summary['rules_passed']} / {summary['rules_total']}\n\n")
                  f.write(f"Failed gates: `{summary['failed_gates']}`\n\n")
                  f.write("This gate confirms source-family availability for eBOSS LRG, ELG, and QSO and creates the exact-source locator packet for v4.405. It does not load observed values, covariance values, likelihoods, p-values, scores, or support claims.\n")
          
              if failed:
                  print(json.dumps(summary, indent=2))
                  print("FAILED_GATES:", failed)
                  # Still zip outputs for diagnosis
                  with zipfile.ZipFile(OUTPUT_ZIP, "w", compression=zipfile.ZIP_DEFLATED) as zout:
                      for path in OUTPUT_DIR.rglob("*"):
                          zout.write(path, path.relative_to(OUTPUT_DIR.parent))
                  raise SystemExit(1)
          
              with zipfile.ZipFile(OUTPUT_ZIP, "w", compression=zipfile.ZIP_DEFLATED) as zout:
                  for path in OUTPUT_DIR.rglob("*"):
                      zout.write(path, path.relative_to(OUTPUT_DIR.parent))
          
              print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
              print("failed_gates =", summary["failed_gates"])
              for key in [
                  "accepted_source_rows",
                  "availability_requirement_rows",
                  "tracer_availability_rows",
                  "source_anchor_rows",
                  "availability_assessment_rows",
                  "exact_locator_packet_rows",
                  "observed_value_source_family_available_rows",
                  "covariance_or_likelihood_source_family_available_rows",
                  "observable_definition_source_family_available_rows",
                  "ready_for_v4_405_exact_source_fetch_rows",
                  "new_observed_values_loaded",
                  "covariance_values_loaded",
                  "new_chi_square_computed",
                  "likelihood_computed",
                  "p_values_computed",
                  "score_valid",
                  "support_allowed",
              ]:
                  print(f"{key} = {summary[key]}")
          
          if __name__ == "__main__":
              main()
          PY
          python run_tairid_v4_404_eboss_observed_value_covariance_availability_gate_no_support.py

      - name: Upload v4.404 output artifact
