name: TAIRID v4.24.2 Axis Matrix Visible

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-24-2-axis-matrix-visible.yml"

jobs:
  tairid-v4-24-2-axis-matrix-visible:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.24.2 visible axis matrix
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_24_2_axis_matrix_visible

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_24_2_axis_matrix_visible")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_24_2_axis_matrix_visible"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not run likelihood, BIC, refit, posterior comparison, or model selection.",
              "This does not compute a new growth pressure score.",
              "This only rebuilds the growth-axis comparison matrix in a simplified visible workflow."
          ]

          AXIS_ROWS = [
              {
                  "axis_id": "S8",
                  "axis_type": "late_growth_amplitude_combo",
                  "redshift_dependent": False,
                  "role": "weak_lensing_and_3x2pt_growth_amplitude",
                  "boundary": "Not interchangeable with f_sigma8."
              },
              {
                  "axis_id": "sigma8",
                  "axis_type": "matter_fluctuation_amplitude",
                  "redshift_dependent": False,
                  "role": "amplitude_side_decomposition",
                  "boundary": "Not identical to S8 or f_sigma8."
              },
              {
                  "axis_id": "Omega_m",
                  "axis_type": "matter_density_axis",
                  "redshift_dependent": False,
                  "role": "density_decomposition",
                  "boundary": "Mixed lane; must not be forced into shared negative pressure."
              },
              {
                  "axis_id": "f_sigma8",
                  "axis_type": "redshift_dependent_growth_rate",
                  "redshift_dependent": True,
                  "role": "RSD_growth_rate_axis",
                  "boundary": "Requires redshift-specific reference curve before scoring."
              },
              {
                  "axis_id": "cluster_amplitude",
                  "axis_type": "cluster_growth_axis",
                  "redshift_dependent": True,
                  "role": "bound_structure_growth_candidate",
                  "boundary": "Requires mass-calibration and selection boundary before scoring."
              },
              {
                  "axis_id": "cmb_lensing_amplitude",
                  "axis_type": "integrated_lensing_growth",
                  "redshift_dependent": True,
                  "role": "integrated_growth_candidate",
                  "boundary": "Requires CMB baseline role boundary before scoring."
              },
              {
                  "axis_id": "BAO_ruler_boundary",
                  "axis_type": "boundary_not_growth",
                  "redshift_dependent": True,
                  "role": "ruler_boundary_guard",
                  "boundary": "BAO is not a growth-pressure axis."
              },
              {
                  "axis_id": "Ddt_reach",
                  "axis_type": "reach_not_growth",
                  "redshift_dependent": True,
                  "role": "H0LiCOW_reach_lane",
                  "boundary": "Reach stays separate from growth."
              }
          ]

          MATRIX_ROWS = [
              {
                  "row_id": "kids_direct_3x2pt_S8",
                  "source": "KiDS",
                  "status": "direct_parsed_data",
                  "lane": "three_by_two_growth",
                  "axis_id": "S8",
                  "z_or_kernel": "integrated_low_redshift_lensing",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "kids_direct_3x2pt_sigma8",
                  "source": "KiDS",
                  "status": "direct_parsed_data",
                  "lane": "decomposition",
                  "axis_id": "sigma8",
                  "z_or_kernel": "integrated_low_redshift_lensing",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "kids_direct_3x2pt_Omega_m",
                  "source": "KiDS",
                  "status": "direct_parsed_data",
                  "lane": "decomposition",
                  "axis_id": "Omega_m",
                  "z_or_kernel": "integrated_low_redshift_lensing",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "published_weak_lensing_S8",
                  "source": "KiDS_DES_HSC",
                  "status": "published_summary",
                  "lane": "lensing_only_growth",
                  "axis_id": "S8",
                  "z_or_kernel": "integrated_low_redshift_lensing",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "rsd_f_sigma8",
                  "source": "BOSS_WiggleZ_eBOSS",
                  "status": "published_summary_boundary_audit",
                  "lane": "rsd_growth",
                  "axis_id": "f_sigma8",
                  "z_or_kernel": "row_specific_redshift_required",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "cluster_candidate",
                  "source": "Planck_SZ_DES_clusters",
                  "status": "future_boundary_audit",
                  "lane": "cluster_growth",
                  "axis_id": "cluster_amplitude",
                  "z_or_kernel": "source_specific_required",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "cmb_lensing_candidate",
                  "source": "Planck_ACT",
                  "status": "future_boundary_audit",
                  "lane": "cmb_lensing_growth",
                  "axis_id": "cmb_lensing_amplitude",
                  "z_or_kernel": "broad_integrated_kernel",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "bao_boundary",
                  "source": "BAO",
                  "status": "boundary_guard",
                  "lane": "boundary_ruler",
                  "axis_id": "BAO_ruler_boundary",
                  "z_or_kernel": "redshift_specific_distance_boundary",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "h0licow_reach",
                  "source": "H0LiCOW",
                  "status": "reach_guard",
                  "lane": "reach_geometry",
                  "axis_id": "Ddt_reach",
                  "z_or_kernel": "lens_specific",
                  "pressure_score_allowed_now": False
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A new growth pressure score was computed.",
              "S8 and f_sigma8 are the same axis.",
              "BAO is a growth-pressure row.",
              "H0LiCOW reach can be averaged with growth rows.",
              "Clusters can be scored before mass-calibration boundaries.",
              "CMB lensing replaces the Planck baseline."
          ]

          axis_ids = {row["axis_id"] for row in AXIS_ROWS}
          failed_gates = []
          warnings = [
              "visibility_safe_rebuild_of_v4_24_axis_matrix",
              "no_pressure_scores_computed",
              "f_sigma8_requires_redshift_reference_before_scoring",
              "BAO_and_H0LiCOW_are_not_growth_axes"
          ]

          for row in MATRIX_ROWS:
              if row["axis_id"] not in axis_ids:
                  failed_gates.append(row["row_id"] + "_axis_not_defined")
              if not row["status"]:
                  failed_gates.append(row["row_id"] + "_missing_status")
              if not row["z_or_kernel"]:
                  failed_gates.append(row["row_id"] + "_missing_z_or_kernel")
              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append(row["row_id"] + "_pressure_score_violation")

          boundary_rows_ok = all(
              row["lane"] in ["boundary_ruler", "reach_geometry"]
              for row in MATRIX_ROWS
              if row["axis_id"] in ["BAO_ruler_boundary", "Ddt_reach"]
          )

          if not boundary_rows_ok:
              failed_gates.append("boundary_or_reach_row_misassigned_to_growth")

          all_rules_passed = not failed_gates

          if all_rules_passed:
              readiness_label = "axis_matrix_visible_passed_ready_for_RSD_reference_boundary_probe"
              next_step = (
                  "Proceed to v4.25 RSD reference boundary probe. "
                  "Do not compute pressure yet; first define the redshift-dependent f_sigma8 reference requirement."
              )
          else:
              readiness_label = "axis_matrix_visible_failed"
              next_step = "Repair the axis matrix before continuing."

          system_health = {
              "axis_count": len(AXIS_ROWS),
              "matrix_row_count": len(MATRIX_ROWS),
              "all_rules_passed": all_rules_passed,
              "pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "S8_separate_from_f_sigma8": True,
              "BAO_boundary_preserved": True,
              "reach_growth_separation_preserved": True
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "axis_rows": AXIS_ROWS,
              "matrix_rows": MATRIX_ROWS,
              "blocked_claims": BLOCKED_CLAIMS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": failed_gates,
                  "warnings": warnings,
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_pressure_scores_built": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "axis_rows_v4_24_2.csv",
              AXIS_ROWS,
              ["axis_id", "axis_type", "redshift_dependent", "role", "boundary"]
          )

          write_csv(
              OUTDIR / "matrix_rows_v4_24_2.csv",
              MATRIX_ROWS,
              ["row_id", "source", "status", "lane", "axis_id", "z_or_kernel", "pressure_score_allowed_now"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_24_2.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "system_health_v4_24_2.csv",
              [system_health],
              [
                  "axis_count",
                  "matrix_row_count",
                  "all_rules_passed",
                  "pressure_score_allowed_now",
                  "validation_claim_allowed",
                  "S8_separate_from_f_sigma8",
                  "BAO_boundary_preserved",
                  "reach_growth_separation_preserved"
              ]
          )

          json_path = OUTDIR / "tairid_v4_24_2_axis_matrix_visible.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.24.2 — Axis Matrix Visible")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(failed_gates) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(warnings)}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("The growth axes are separated so unlike observables are not averaged together.")
          md.append("")
          md.append("S8, sigma8, Omega_m, f_sigma8, cluster amplitude, CMB lensing amplitude, BAO boundary, and H0LiCOW reach are kept as distinct roles.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `axis_rows_v4_24_2.csv`")
          md.append("- `matrix_rows_v4_24_2.csv`")
          md.append("- `blocked_claims_v4_24_2.csv`")
          md.append("- `system_health_v4_24_2.csv`")
          md.append("- `tairid_v4_24_2_axis_matrix_visible.json`")
          md.append("- `tairid_v4_24_2_axis_matrix_visible.md`")
          md.append("")

          md_path = OUTDIR / "tairid_v4_24_2_axis_matrix_visible.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.24.2 visible axis matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-24-2-axis-matrix-visible
          path: artifacts/tairid_v4_24_2_axis_matrix_visible/
