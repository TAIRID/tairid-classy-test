name: TAIRID v4.46 WiggleZ Covariance Locator Retry

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-46-wigglez-covariance-locator-retry.yml"

jobs:
  tairid-v4-46-wigglez-covariance-locator-retry:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.46 WiggleZ covariance locator retry
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_46_wigglez_covariance_locator_retry

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_46_wigglez_covariance_locator_retry")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_46_wigglez_covariance_locator_retry"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run a WiggleZ likelihood.",
              "This does not compute a final RSD pressure score.",
              "This does not import or apply WiggleZ covariance to residuals.",
              "This retries WiggleZ product/covariance location and either records candidates or formally keeps WiggleZ non-final.",
              "A pass means the WiggleZ locator state is bounded, not that WiggleZ covariance-aware testing is complete."
          ]

          CARRIED_STATUS = [
              {
                  "lane_id": "BOSS_DR12",
                  "status": "BOSS_only_covariance_preview_nonfinal",
                  "from_test": "v4_37",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "eBOSS_LRG_QSO",
                  "status": "partial_covariance_preview_nonfinal",
                  "from_test": "v4_44",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "eBOSS_ELG",
                  "status": "grid_likelihood_parser_needed_or_parked",
                  "from_test": "v4_43",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "Planck_reference_uncertainty",
                  "status": "missing_reference_uncertainty",
                  "from_test": "v4_45_1",
                  "blocks_final_RSD_claim": True
              }
          ]

          WIGGLEZ_SOURCE_BASIS = [
              {
                  "basis_id": "wigglez_final_cosmology_products",
                  "basis_status": "source_claim_to_verify_by_locator",
                  "description": "WiggleZ final cosmology papers describe public cosmology data products, including covariance matrices and power spectrum/CosmoMC products.",
                  "target_kind": "data_products_covariance_power_spectrum_cosmomc"
              },
              {
                  "basis_id": "wigglez_data_site",
                  "basis_status": "locator_root_candidate",
                  "description": "The historical WiggleZ product root is smp.uq.edu.au/wigglez-data.",
                  "target_kind": "root_directory_or_redirect"
              }
          ]

          ROOT_CANDIDATES = [
              {
                  "root_id": "wigglez_http_www_root",
                  "root_url": "http://www.smp.uq.edu.au/wigglez-data/",
                  "root_role": "historical_product_root_http_www"
              },
              {
                  "root_id": "wigglez_https_www_root",
                  "root_url": "https://www.smp.uq.edu.au/wigglez-data/",
                  "root_role": "historical_product_root_https_www"
              },
              {
                  "root_id": "wigglez_http_root",
                  "root_url": "http://smp.uq.edu.au/wigglez-data/",
                  "root_role": "historical_product_root_http"
              },
              {
                  "root_id": "wigglez_https_root",
                  "root_url": "https://smp.uq.edu.au/wigglez-data/",
                  "root_role": "historical_product_root_https"
              },
              {
                  "root_id": "wigglez_bao_random_catalogues_http",
                  "root_url": "http://www.smp.uq.edu.au/wigglez-data/bao-random-catalogues/",
                  "root_role": "known_BAO_subpath_not_RSD_by_itself"
              },
              {
                  "root_id": "wigglez_bao_random_catalogues_https",
                  "root_url": "https://www.smp.uq.edu.au/wigglez-data/bao-random-catalogues/",
                  "root_role": "known_BAO_subpath_not_RSD_by_itself"
              }
          ]

          WIGGLEZ_TARGET_ROWS = [
              {
                  "row_id": "wigglez_z044_fsigma8_candidate",
                  "survey_family": "WiggleZ",
                  "z_eff": 0.44,
                  "observable_axis": "f_sigma8",
                  "mapping_status": "candidate_summary_row_needs_product_mapping"
              },
              {
                  "row_id": "wigglez_z060_fsigma8_candidate",
                  "survey_family": "WiggleZ",
                  "z_eff": 0.60,
                  "observable_axis": "f_sigma8",
                  "mapping_status": "candidate_summary_row_needs_product_mapping"
              },
              {
                  "row_id": "wigglez_z073_fsigma8_candidate",
                  "survey_family": "WiggleZ",
                  "z_eff": 0.73,
                  "observable_axis": "f_sigma8",
                  "mapping_status": "candidate_summary_row_needs_product_mapping"
              }
          ]

          LOCATOR_RULES = [
              {
                  "rule_id": "root_candidates_declared",
                  "description": "WiggleZ root candidates must be declared.",
                  "failure_mode": "No locator can run."
              },
              {
                  "rule_id": "fetch_attempts_recorded",
                  "description": "Each root candidate must have a fetch attempt row.",
                  "failure_mode": "Network or archival state is hidden."
              },
              {
                  "rule_id": "products_classified_or_formally_parked",
                  "description": "Visible products must be classified; if none are found, WiggleZ is formally kept non-final.",
                  "failure_mode": "The lane remains ambiguous."
              },
              {
                  "rule_id": "no_auto_mapping_to_target_rows",
                  "description": "No visible product automatically maps to the WiggleZ f_sigma8 target rows.",
                  "failure_mode": "Locator becomes covariance mapping without inspection."
              },
              {
                  "rule_id": "no_covariance_likelihood_pressure_now",
                  "description": "This test must not import covariance, run likelihood, or compute pressure.",
                  "failure_mode": "Locator becomes model testing."
              },
              {
                  "rule_id": "unresolved_status_allowed_without_crash",
                  "description": "If products are not visible, the test must pass with a formal unresolved/parked status.",
                  "failure_mode": "Archival opacity is mistaken for a physics failure."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "WiggleZ covariance was applied to residuals.",
              "A WiggleZ likelihood was run.",
              "A visible WiggleZ product automatically maps to the f_sigma8 rows.",
              "WiggleZ covariance is resolved without product mapping.",
              "The full RSD lane is covariance-aware.",
              "Reference-model uncertainty is included.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_47_Planck_reference_chain_feasibility_audit",
                  "purpose": "Audit exact Planck chain/covariance source requirements for f_sigma8 reference uncertainty.",
                  "why_next": "Even with BOSS/eBOSS/WiggleZ status bounded, final RSD pressure cannot be built without reference uncertainty.",
                  "must_include": "Planck source path, parameters needed, f_sigma8 redshift targets, no final pressure.",
                  "must_not_include": "claiming reference uncertainty is already included."
              },
              {
                  "priority": 2,
                  "next_test": "v4_48_WiggleZ_product_mapping_if_candidates_found",
                  "purpose": "If v4.46 finds visible WiggleZ candidates, map exact product files to target f_sigma8 rows.",
                  "why_next": "Only needed if candidate covariance or CosmoMC products are visible.",
                  "must_include": "candidate product path, row mapping status, covariance/product role, no pressure score.",
                  "must_not_include": "WiggleZ covariance-ready claim without mapping."
              },
              {
                  "priority": 3,
                  "next_test": "v4_49_ELG_grid_parser_design_optional",
                  "purpose": "Optionally design a true ELG grid parser.",
                  "why_next": "ELG is parser-feasible but not simple covariance-ready.",
                  "must_include": "column meanings, likelihood interpretation, marginalization policy, no pressure score.",
                  "must_not_include": "ELG covariance-ready claim without parser."
              },
              {
                  "priority": 4,
                  "next_test": "v4_50_growth_lane_status_handoff",
                  "purpose": "Write a compact milestone handoff for BOSS/eBOSS/WiggleZ/reference status.",
                  "why_next": "Useful if switching threads or pausing.",
                  "must_include": "truth boundary, partial status, unresolved lanes, next robustness path.",
                  "must_not_include": "validation claim."
              }
          ]

          def fetch_text(url, timeout=60, byte_limit=5_000_000):
              try:
                  request = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "Mozilla/5.0 TAIRID-v4.46-WiggleZ-covariance-locator-retry",
                          "Accept": "text/html,text/xml,application/xml,text/plain,application/octet-stream,*/*"
                      }
                  )
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "fetch_ok": True,
                          "http_status": getattr(response, "status", 200),
                          "final_url": response.geturl(),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "fetch_ok": False,
                      "http_status": "",
                      "final_url": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def clean_text(text):
              text = re.sub(r"<script.*?</script>", " ", text or "", flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def strip_namespace(tag):
              return tag.split("}", 1)[-1] if "}" in tag else tag

          def extract_html_links(base_url, html_text):
              links = []
              for match in re.finditer(r'<a\s+[^>]*href=["\']([^"\']+)["\'][^>]*>(.*?)</a>', html_text or "", flags=re.IGNORECASE | re.DOTALL):
                  href = match.group(1).strip()
                  label = clean_text(match.group(2)) or href
                  if href in ["../", "./", ""]:
                      continue
                  absolute = urllib.parse.urljoin(base_url, href)
                  links.append({
                      "entry_name": label,
                      "entry_url": absolute,
                      "entry_kind": "directory" if absolute.endswith("/") else "file_or_page",
                      "parser": "html_link"
                  })
              return links

          def extract_xml_entries(base_url, xml_text):
              entries = []
              try:
                  root = ET.fromstring(xml_text or "")
                  for elem in root.iter():
                      tag = strip_namespace(elem.tag).lower()
                      if tag not in ["dir", "file", "entry"]:
                          continue
                      name = elem.attrib.get("name") or elem.attrib.get("href") or elem.text or ""
                      name = clean_text(name)
                      if not name or name in ["../", "./"]:
                          continue
                      kind = "directory" if tag == "dir" or elem.attrib.get("kind", "").lower() == "dir" else "file_or_page"
                      url = urllib.parse.urljoin(base_url, name.rstrip("/") + "/" if kind == "directory" else name)
                      entries.append({
                          "entry_name": name,
                          "entry_url": url,
                          "entry_kind": kind,
                          "parser": "xml_element"
                      })
              except Exception:
                  pass
              return entries

          def extract_plain_urls(base_url, text):
              entries = []
              for match in re.finditer(r"https?://[^\s\"'<>]+", text or ""):
                  url = match.group(0).rstrip(").,;")
                  entries.append({
                      "entry_name": url.split("/")[-1] or url,
                      "entry_url": urllib.parse.urljoin(base_url, url),
                      "entry_kind": "directory" if url.endswith("/") else "file_or_page",
                      "parser": "plain_url"
                  })
              return entries

          def extract_entries(base_url, body_text):
              combined = extract_xml_entries(base_url, body_text) + extract_html_links(base_url, body_text) + extract_plain_urls(base_url, body_text)
              seen = set()
              out = []
              for entry in combined:
                  key = entry["entry_url"]
                  if key in seen:
                      continue
                  seen.add(key)
                  out.append(entry)
              return out

          def classify_product(entry_name, entry_url):
              combined = (entry_name + " " + entry_url).lower()

              if any(token in combined for token in ["covariance", "covmat", "cov_", "invcov", "inverse", "matrix", "covariance_matrix", "cov"]):
                  product_class = "covariance_candidate"
              elif any(token in combined for token in ["cosmomc", "cosmo_mc", "montepython", "module"]):
                  product_class = "cosmomc_or_likelihood_module_candidate"
              elif any(token in combined for token in ["power", "powerspec", "power_spectrum", "pk", "p(k)", "spectrum"]):
                  product_class = "power_spectrum_candidate"
              elif any(token in combined for token in ["window", "windowfunction", "window_function"]):
                  product_class = "window_function_candidate"
              elif any(token in combined for token in ["bao", "dv", "rs", "random", "catalogue", "catalog"]):
                  product_class = "bao_or_catalog_candidate"
              elif any(token in combined for token in [".tar.gz", ".tgz", ".zip", ".tar", ".gz"]):
                  product_class = "archive_candidate"
              elif any(token in combined for token in [".txt", ".dat", ".csv", ".ini", ".param"]):
                  product_class = "text_or_config_candidate"
              elif entry_url.endswith("/"):
                  product_class = "directory_candidate"
              else:
                  product_class = "manual_review_candidate"

              if any(token in combined for token in ["fs8", "fsig", "fsigma8", "f_sigma8", "growth", "rsd", "redshift-space", "redshift_space"]):
                  role_mapping = "possible_RSD_growth_candidate_mapping_needed"
              elif any(token in combined for token in ["power", "pk", "cosmomc"]):
                  role_mapping = "possible_power_spectrum_or_cosmomc_growth_product_mapping_needed"
              elif "bao" in combined:
                  role_mapping = "BAO_boundary_candidate_not_RSD_until_reviewed"
              elif "cov" in combined or "matrix" in combined:
                  role_mapping = "possible_covariance_candidate_role_unclear"
              else:
                  role_mapping = "manual_review_needed"

              likely_relevant = product_class in [
                  "covariance_candidate",
                  "cosmomc_or_likelihood_module_candidate",
                  "power_spectrum_candidate",
                  "window_function_candidate",
                  "archive_candidate",
                  "text_or_config_candidate"
              ] or "RSD" in role_mapping or "growth" in role_mapping or "covariance" in role_mapping

              return product_class, role_mapping, likely_relevant

          failed_gates = []
          warnings = []

          fetch_rows = []
          inventory_rows = []

          max_depth = 2
          max_total_fetches = 80
          max_dirs_per_level = 30

          queue = []
          for root in ROOT_CANDIDATES:
              queue.append({
                  "root_id": root["root_id"],
                  "url": root["root_url"],
                  "depth": 0,
                  "parent_url": "",
                  "root_role": root["root_role"]
              })

          visited = set()
          fetch_counter = 0

          while queue and fetch_counter < max_total_fetches:
              item = queue.pop(0)
              url = item["url"]
              if url in visited:
                  continue
              visited.add(url)

              fetched = fetch_text(url)
              fetch_counter += 1

              entries = extract_entries(fetched["final_url"] or url, fetched["text"]) if fetched["fetch_ok"] else []

              fetch_rows.append({
                  "root_id": item["root_id"],
                  "url": url,
                  "final_url": fetched["final_url"],
                  "parent_url": item["parent_url"],
                  "depth": item["depth"],
                  "root_role": item["root_role"],
                  "fetch_ok": fetched["fetch_ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"],
                  "entry_count": len(entries)
              })

              for idx, entry in enumerate(entries):
                  product_class, role_mapping, likely_relevant = classify_product(entry["entry_name"], entry["entry_url"])

                  inventory_rows.append({
                      "root_id": item["root_id"],
                      "parent_url": url,
                      "depth": item["depth"],
                      "entry_index": idx,
                      "entry_name": entry["entry_name"],
                      "entry_url": entry["entry_url"],
                      "entry_kind": entry["entry_kind"],
                      "parser": entry["parser"],
                      "product_class": product_class,
                      "role_mapping_status": role_mapping,
                      "likely_relevant_for_WiggleZ_RSD": likely_relevant,
                      "maps_to_WiggleZ_target_rows_now": False,
                      "covariance_imported_now": False,
                      "likelihood_run_now": False,
                      "pressure_score_allowed_now": False
                  })

              next_dirs = [
                  entry for entry in entries
                  if entry["entry_kind"] == "directory"
                  and item["depth"] < max_depth
              ][:max_dirs_per_level]

              for entry in next_dirs:
                  queue.append({
                      "root_id": item["root_id"],
                      "url": entry["entry_url"],
                      "depth": item["depth"] + 1,
                      "parent_url": url,
                      "root_role": "recursive_child_probe"
                  })

          fetched_ok_count = sum(1 for row in fetch_rows if row["fetch_ok"] is True)
          visible_entry_count = len(inventory_rows)

          covariance_candidates = [row for row in inventory_rows if row["product_class"] == "covariance_candidate"]
          cosmomc_candidates = [row for row in inventory_rows if row["product_class"] == "cosmomc_or_likelihood_module_candidate"]
          power_candidates = [row for row in inventory_rows if row["product_class"] == "power_spectrum_candidate"]
          window_candidates = [row for row in inventory_rows if row["product_class"] == "window_function_candidate"]
          archive_candidates = [row for row in inventory_rows if row["product_class"] == "archive_candidate"]
          relevant_candidates = [row for row in inventory_rows if row["likely_relevant_for_WiggleZ_RSD"] is True]

          if len(covariance_candidates) > 0 or len(cosmomc_candidates) > 0 or len(power_candidates) > 0:
              wigglez_locator_state = "candidate_WiggleZ_products_visible_mapping_audit_needed"
              wigglez_status = "nonfinal_candidates_found"
              next_action = "send_to_WiggleZ_product_mapping_audit"
          elif fetched_ok_count > 0 and visible_entry_count > 0:
              wigglez_locator_state = "visible_entries_but_no_clear_RSD_covariance_candidate_detected"
              wigglez_status = "formally_nonfinal_unresolved_after_locator_retry"
              next_action = "keep_WiggleZ_nonfinal_and_move_to_Planck_reference_chain_feasibility"
          elif fetched_ok_count > 0:
              wigglez_locator_state = "root_fetch_succeeded_but_no_product_entries_visible"
              wigglez_status = "formally_nonfinal_unresolved_after_locator_retry"
              next_action = "keep_WiggleZ_nonfinal_and_move_to_Planck_reference_chain_feasibility"
          else:
              wigglez_locator_state = "root_fetch_unavailable_or_archival_path_blocked"
              wigglez_status = "formally_nonfinal_unresolved_after_locator_retry"
              next_action = "keep_WiggleZ_nonfinal_and_move_to_Planck_reference_chain_feasibility"

          if len(ROOT_CANDIDATES) < 1:
              failed_gates.append("no_WiggleZ_root_candidates_declared")

          if len(fetch_rows) < len(ROOT_CANDIDATES):
              failed_gates.append("not_all_WiggleZ_fetch_attempts_recorded")

          for row in inventory_rows:
              if row["maps_to_WiggleZ_target_rows_now"] is not False:
                  failed_gates.append("WiggleZ_product_auto_mapped_violation")
              if row["covariance_imported_now"] is not False:
                  failed_gates.append("WiggleZ_covariance_import_violation")
              if row["likelihood_run_now"] is not False:
                  failed_gates.append("WiggleZ_likelihood_run_violation")
              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append("WiggleZ_pressure_allowed_violation")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "covariance was applied",
              "wigglez likelihood was run",
              "automatically maps",
              "covariance is resolved without product mapping",
              "full rsd lane",
              "reference-model uncertainty",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          if fetched_ok_count == 0:
              warnings.append("WiggleZ_roots_not_fetchable_or_archival_paths_blocked")
          if visible_entry_count == 0:
              warnings.append("no_WiggleZ_entries_visible_after_locator_retry")
          if len(covariance_candidates) == 0:
              warnings.append("no_WiggleZ_covariance_candidate_detected")
          if len(cosmomc_candidates) == 0:
              warnings.append("no_WiggleZ_cosmomc_module_candidate_detected")
          if len(power_candidates) == 0:
              warnings.append("no_WiggleZ_power_spectrum_candidate_detected")

          warnings.append("WiggleZ_locator_does_not_import_covariance")
          warnings.append("WiggleZ_locator_does_not_run_likelihood")
          warnings.append("WiggleZ_locator_does_not_compute_pressure")
          warnings.append("WiggleZ_remains_nonfinal_until_product_mapping")
          warnings.append("reference_model_uncertainty_still_missing")
          warnings.append("full_RSD_covariance_not_complete")
          warnings.append("not_validation")

          rule_results = [
              {
                  "rule_id": "root_candidates_declared",
                  "pass": len(ROOT_CANDIDATES) >= 1,
                  "result": f"{len(ROOT_CANDIDATES)} WiggleZ root candidate(s) declared",
                  "boundary": "Root candidates are locator inputs only."
              },
              {
                  "rule_id": "fetch_attempts_recorded",
                  "pass": len(fetch_rows) >= len(ROOT_CANDIDATES),
                  "result": f"{len(fetch_rows)} fetch attempt row(s) recorded",
                  "boundary": "Fetch visibility is not covariance use."
              },
              {
                  "rule_id": "products_classified_or_formally_parked",
                  "pass": bool(wigglez_locator_state),
                  "result": wigglez_locator_state,
                  "boundary": "Candidates, if found, still need mapping; no candidates means formal nonfinal park."
              },
              {
                  "rule_id": "no_auto_mapping_to_target_rows",
                  "pass": all(row["maps_to_WiggleZ_target_rows_now"] is False for row in inventory_rows),
                  "result": "no_WiggleZ_product_auto_maps_to_target_rows",
                  "boundary": "Mapping requires later audit."
              },
              {
                  "rule_id": "no_covariance_likelihood_pressure_now",
                  "pass": all(
                      row["covariance_imported_now"] is False
                      and row["likelihood_run_now"] is False
                      and row["pressure_score_allowed_now"] is False
                      for row in inventory_rows
                  ),
                  "result": "no_covariance_no_likelihood_no_pressure",
                  "boundary": "Locator only."
              },
              {
                  "rule_id": "unresolved_status_allowed_without_crash",
                  "pass": wigglez_status in ["nonfinal_candidates_found", "formally_nonfinal_unresolved_after_locator_retry"],
                  "result": wigglez_status,
                  "boundary": "Archival opacity is not a physics failure."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_WiggleZ_locator_rules_passed")

          if failed_gates:
              readiness_label = "WiggleZ_covariance_locator_retry_failed"
              next_step = "Repair WiggleZ locator guardrails before continuing."
          else:
