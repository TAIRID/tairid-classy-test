name: Run TAIRID SH0ES table aligned row label recovery v1.1

on:
  workflow_dispatch:

jobs:
  run-tairid-shoes-table-aligned-row-label-recovery-v1-1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy matplotlib astropy pandas

      - name: Run TAIRID SH0ES table aligned row label recovery v1.1
        run: |
          python run_tairid_shoes_table_aligned_row_label_recovery_v1_1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-table-aligned-row-label-recovery-v1-1-output
          path: |
            tairid_shoes_table_aligned_row_label_recovery_v1_1_outputs/**
