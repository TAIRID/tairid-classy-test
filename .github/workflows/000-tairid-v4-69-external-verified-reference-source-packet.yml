name: 000 TAIRID v4.69 External Verified Reference Source Packet

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-69-external-verified-reference-source-packet.yml"

jobs:
  tairid-v4-69-external-verified-reference-source-packet:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.69 external verified reference source packet
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_69_external_verified_reference_source_packet

          python - <<'PY'
          import csv
          import json
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_69_external_verified_reference_source_packet")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_69_external_verified_reference_source_packet"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This only builds an external verified reference source packet and checks source reachability.",
              "A pass means source anchors are documented for review, not that external reference uncertainty is included."
          ]

          UPSTREAM_LOCKS = {
              "v4_67": {
                  "simple_omegam_sigma8_route_available": False,
                  "primary_density_route_available": True,
                  "solver_implemented": False,
                  "reference_uncertainty_computed": False
              },
              "v4_68": {
                  "readiness_label": "solver_feasibility_audit_passed_ready_for_external_reference_packet_or_solver_install_branch",
                  "camb_available": False,
                  "classy_available": False,
                  "boltzmann_solver_available": False,
                  "recommended_next_route": "v4.69_external_verified_reference_source_packet",
                  "solver_installed": False,
                  "solver_run": False,
                  "reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_allowed_now": False
              }
          }

          SOURCE_CANDIDATES = [
              {
                  "source_id": "planck_pr3_irsa_cosmoparams_index",
                  "source_type": "official_data_index",
                  "url": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/",
                  "role": "Official NASA/IPAC-accessible Planck PR3 cosmological-parameters product index.",
                  "reference_uncertainty_source_now": False,
                  "requires_manual_review": True
              },
              {
                  "source_id": "planck_pr3_fullgrid_zip_head_only",
                  "source_type": "official_data_container",
                  "url": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip",
                  "role": "Official fullGrid container previously parsed by bounded ZIP64 central-directory probes.",
                  "reference_uncertainty_source_now": False,
                  "requires_manual_review": False
              },
              {
                  "source_id": "planck_pr3_parameter_tables_zip",
                  "source_type": "official_summary_tables",
                  "url": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_parameter-tables_R3.01.zip",
                  "role": "Official summary/reference table product already bounded as not posterior covariance.",
                  "reference_uncertainty_source_now": False,
                  "requires_manual_review": False
              },
              {
                  "source_id": "planck_2018_cosmological_parameters_arxiv",
                  "source_type": "primary_publication",
                  "url": "https://arxiv.org/abs/1807.06209",
                  "role": "Planck 2018 cosmological-parameters paper anchor.",
                  "reference_uncertainty_source_now": False,
                  "requires_manual_review": True
              },
              {
                  "source_id": "esa_pr3_cosmology_products_page",
                  "source_type": "official_product_page",
                  "url": "https://esdcdoi.esac.esa.int/doi/html/data/astronomy/planck/Cosmology.html",
                  "role": "ESA PR3 cosmology product page anchor.",
                  "reference_uncertainty_source_now": False,
                  "requires_manual_review": True
              }
          ]

          REFERENCE_REQUIREMENTS = [
              {
                  "requirement_id": "same_target_redshifts",
                  "required": True,
                  "definition": "Reference must provide or allow reproducible derivation at z = 0.15, 0.38, 0.51, 0.61, 2.33."
              },
              {
                  "requirement_id": "posterior_uncertainty_or_samples",
                  "required": True,
                  "definition": "Reference must provide posterior samples, covariance, or a reproducible way to compute covariance."
              },
              {
                  "requirement_id": "Planck_model_identity",
                  "required": True,
                  "definition": "Reference must state Planck likelihood/root/model assumptions clearly."
              },
              {
                  "requirement_id": "weights_preserved",
                  "required": True,
                  "definition": "If samples are used, sample weights must be preserved."
              },
              {
                  "requirement_id": "not_minimum_sidecars",
                  "required": True,
                  "definition": "Point/minimum sidecars cannot be treated as posterior covariance."
              },
              {
                  "requirement_id": "not_parameter_tables_only",
                  "required": True,
                  "definition": "Summary parameter tables alone are not enough for redshift covariance."
              }
          ]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          BLOCKED_CLAIMS = [
              "External reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "A final RSD pressure score was computed.",
              "TAIRID cosmology is validated.",
              "Full Planck chains were imported.",
              "Full chain sample files were parsed.",
              "CAMB or CLASS was installed.",
              "A solver was run.",
              "Minimum sidecars were treated as posterior covariance.",
              "Parameter tables were treated as posterior covariance.",
              "An external reference source was accepted without manual review.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          def source_probe(source):
              record = {
                  "source_id": source["source_id"],
                  "source_type": source["source_type"],
                  "url": source["url"],
                  "ok": False,
                  "method_used": "",
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "bytes_sampled": 0,
                  "contains_planck_text": False,
                  "contains_fsigma8_text": False,
                  "reference_uncertainty_source_now": source["reference_uncertainty_source_now"],
                  "requires_manual_review": source["requires_manual_review"],
                  "error": ""
              }

              headers = {
                  "User-Agent": "TAIRID-v4.69-external-reference-source-packet/1.0",
                  "Accept": "*/*"
              }

              try:
                  req = urllib.request.Request(source["url"], method="HEAD", headers=headers)
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["method_used"] = "HEAD"
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

              except Exception as head_exc:
                  try:
                      req = urllib.request.Request(source["url"], headers=headers)
                      with urllib.request.urlopen(req, timeout=90) as response:
                          record["ok"] = True
                          record["method_used"] = "GET_PREFIX"
                          record["status"] = getattr(response, "status", None)
                          record["content_type"] = response.headers.get("Content-Type")
                          content_length = response.headers.get("Content-Length")
                          record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

                          data = response.read(200000)
                          text = data.decode("utf-8", errors="replace").lower()
                          record["bytes_sampled"] = len(data)
                          record["contains_planck_text"] = "planck" in text
                          record["contains_fsigma8_text"] = "fsigma8" in text or "fσ8" in text or "f sigma" in text

                  except Exception as get_exc:
                      record["error"] = f"HEAD failed: {type(head_exc).__name__}: {head_exc}; GET failed: {type(get_exc).__name__}: {get_exc}"

              return record

          failed_gates = []
          warnings = [
              "external_reference_source_packet_only",
              "source_reachability_not_source_acceptance",
              "no_external_reference_imported",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          source_records = [source_probe(source) for source in SOURCE_CANDIDATES]

          reachable_count = sum(1 for row in source_records if row["ok"])
          official_reachable_count = sum(
              1 for row in source_records
              if row["ok"] and row["source_type"] in {"official_data_index", "official_data_container", "official_summary_tables", "official_product_page"}
          )

          candidate_now_count = sum(1 for row in SOURCE_CANDIDATES if row["reference_uncertainty_source_now"] is True)

          if UPSTREAM_LOCKS["v4_68"]["recommended_next_route"] != "v4.69_external_verified_reference_source_packet":
              failed_gates.append("v4_68_recommended_route_not_carried")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          if len(REFERENCE_REQUIREMENTS) < 6:
              failed_gates.append("reference_requirements_incomplete")

          if not any(row["source_id"] == "planck_pr3_irsa_cosmoparams_index" for row in SOURCE_CANDIDATES):
              failed_gates.append("official_irsa_cosmoparams_index_missing")

          if not any(row["source_id"] == "planck_2018_cosmological_parameters_arxiv" for row in SOURCE_CANDIDATES):
              failed_gates.append("planck_2018_paper_anchor_missing")

          if reachable_count == 0:
              failed_gates.append("no_source_candidates_reachable")

          if official_reachable_count == 0:
              failed_gates.append("no_official_source_candidates_reachable")

          if candidate_now_count != 0:
              failed_gates.append("source_candidate_marked_reference_uncertainty_now_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "external reference uncertainty is included",
              "reference uncertainty is computed",
              "final rsd pressure",
              "validated",
              "full planck chains were imported",
              "solver was run",
              "minimum sidecars were treated as posterior covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = (
              "external_source_packet_passed_official_anchors_reachable_but_no_reference_uncertainty_imported"
          )

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "upstream_v4_68_route_carried",
                  "pass": UPSTREAM_LOCKS["v4_68"]["recommended_next_route"] == "v4.69_external_verified_reference_source_packet",
                  "result": "v4.68 external-reference recommendation carried forward",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "source_candidates_declared",
                  "pass": len(SOURCE_CANDIDATES) >= 5,
                  "result": f"{len(SOURCE_CANDIDATES)} source candidates declared",
                  "boundary": "Source list only."
              },
              {
                  "rule_id": "source_reachability_checked",
                  "pass": reachable_count > 0,
                  "result": f"{reachable_count} source candidates reachable",
                  "boundary": "Reachability is not acceptance."
              },
              {
                  "rule_id": "official_source_reachability_checked",
                  "pass": official_reachable_count > 0,
                  "result": f"{official_reachable_count} official source candidates reachable",
                  "boundary": "Official anchor only."
              },
              {
                  "rule_id": "reference_requirements_declared",
                  "pass": len(REFERENCE_REQUIREMENTS) >= 6,
                  "result": f"{len(REFERENCE_REQUIREMENTS)} reference requirements declared",
                  "boundary": "No uncertainty imported."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "Source packet only."
              },
              {
                  "rule_id": "no_source_accepted_as_uncertainty_now",
                  "pass": candidate_now_count == 0,
                  "result": "no source candidate marked as reference uncertainty source now",
                  "boundary": "Manual review still required."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 12,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final pressure claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute uncertainty."
              },
              {
                  "rule_id": "no_reference_uncertainty_or_final_pressure",
                  "pass": True,
                  "result": "no_reference_uncertainty_no_final_RSD_pressure",
                  "boundary": "Source packet only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_69_rules_passed")

          if failed_gates:
              readiness_label = "external_verified_reference_source_packet_failed"
              next_allowed_step = "Repair external source packet before reviewing candidate references."
          else:
              readiness_label = "external_verified_reference_source_packet_passed_ready_for_reference_candidate_review_or_solver_install_branch"
              next_allowed_step = (
                  "Proceed to v4.70 reference candidate review or v4.70 solver install/container branch. "
                  "Do not compute reference uncertainty or final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "source_candidate_count": len(SOURCE_CANDIDATES),
              "reachable_source_count": reachable_count,
              "official_reachable_source_count": official_reachable_count,
              "reference_requirement_count": len(REFERENCE_REQUIREMENTS),
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "candidate_accepted_as_reference_uncertainty_now_count": candidate_now_count,
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "route_decision": route_decision,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "solver_installed": False,
              "solver_run": False,
              "external_reference_imported": False,
              "reference_uncertainty_computed": False,
              "final_RSD_pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "source_candidates": SOURCE_CANDIDATES,
              "source_reachability_records": source_records,
              "reference_requirements": REFERENCE_REQUIREMENTS,
              "target_redshifts": TARGET_REDSHIFTS,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "full_chain_sample_files_parsed": False,
                  "solver_installed": False,
                  "solver_run": False,
                  "external_reference_imported": False,
                  "reference_uncertainty_computed": False,
                  "final_RSD_pressure_computed": False,
                  "validation_claim_allowed": False
              }
          }

          json_path = OUTDIR / "tairid_v4_69_external_verified_reference_source_packet.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "source_candidates_v4_69.csv",
              SOURCE_CANDIDATES,
              ["source_id", "source_type", "url", "role", "reference_uncertainty_source_now", "requires_manual_review"]
          )

          write_csv(
              OUTDIR / "source_reachability_records_v4_69.csv",
              source_records,
              [
                  "source_id",
                  "source_type",
                  "url",
                  "ok",
                  "method_used",
                  "status",
                  "content_type",
                  "content_length",
                  "bytes_sampled",
                  "contains_planck_text",
                  "contains_fsigma8_text",
                  "reference_uncertainty_source_now",
                  "requires_manual_review",
                  "error"
              ]
          )

          write_csv(
              OUTDIR / "reference_requirements_v4_69.csv",
              REFERENCE_REQUIREMENTS,
              ["requirement_id", "required", "definition"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_69.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_69.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.69 — External Verified Reference Source Packet")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This test builds an external verified reference source packet after v4.68 showed no local CAMB/CLASS solver route was available.")
          md.append("")
          md.append("It checks official Planck/NASA/IPAC/ESA/arXiv source anchors for reachability, but it does not accept any source as posterior covariance yet.")
          md.append("")
          md.append("It does not download fullGrid, import full chains, install or run a solver, compute reference uncertainty, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Key boundary")
          md.append("")
          md.append("- Source reachability is not source acceptance.")
          md.append("- No external reference uncertainty is imported in v4.69.")
          md.append("- The next step must review whether any source provides posterior samples/covariance at the needed redshifts.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_69_external_verified_reference_source_packet.json`")
          md.append("- `tairid_v4_69_external_verified_reference_source_packet.md`")
          md.append("- `source_candidates_v4_69.csv`")
          md.append("- `source_reachability_records_v4_69.csv`")
          md.append("- `reference_requirements_v4_69.csv`")
          md.append("- `blocked_claims_v4_69.csv`")
          md.append("- `rule_results_v4_69.csv`")
          md.append("")

          (OUTDIR / "tairid_v4_69_external_verified_reference_source_packet.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.69 external verified reference source packet artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-69-external-verified-reference-source-packet
          path: artifacts/tairid_v4_69_external_verified_reference_source_packet/
