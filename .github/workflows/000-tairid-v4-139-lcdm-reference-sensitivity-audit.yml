name: 000 TAIRID v4.139 LCDM Reference Sensitivity Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-139-lcdm-reference-sensitivity-audit.yml"

jobs:
  tairid-v4-139-lcdm-reference-sensitivity-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.139 LCDM reference sensitivity audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_139_lcdm_reference_sensitivity_audit

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_139_lcdm_reference_sensitivity_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_139_lcdm_reference_sensitivity_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This audits whether the v4.138 eBOSS LCDM-reference rerun is stable under bounded LCDM parameter variation.",
              "This treats sign stability and pressure-threshold stability separately.",
              "A pass means the sign pattern and pressure-magnitude sensitivity are separated before any stronger claim is made."
          ]

          UPSTREAM_LOCKS = {
              "v4_138_eBOSS_component_rerun_with_LCDM_reference": {
                  "readiness_label": "eBOSS_component_rerun_with_LCDM_reference_passed_two_driver_pattern_survives_positive_pair_weakened_ready_for_LCDM_reference_sensitivity_audit",
                  "reference_method": "lightweight_LCDM_growth_approximation",
                  "lane_count": 7,
                  "family_pressure_persists": True,
                  "family_pressure_z": -1.2582597291858464,
                  "without_LRG_pressure_z": -1.58842437633381,
                  "without_ELG_pressure_z": 0.8131572601521359,
                  "without_QSO_pressure_z": -0.0,
                  "single_LRG_pressure_z": 0.0,
                  "single_ELG_pressure_z": -0.9602045700540648,
                  "single_QSO_pressure_z": 1.265345479692697,
                  "two_driver_pattern_survives_with_weaker_positive_pair": True,
                  "positive_pair_weakened_below_abs_pressure_1": True,
                  "full_posterior_covariance_available": False,
                  "observed_covariance_ingested": False,
                  "same_program_eBOSS_covariance_still_limited": True,
                  "CAMB_run": False,
                  "full_planck_chains_imported": False,
                  "full_planck_chain_sample_files_parsed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_137_lightweight_LCDM_growth_reference_probe": {
                  "readiness_label": "lightweight_LCDM_growth_reference_probe_passed_reference_vector_built_ready_for_eBOSS_component_rerun_with_LCDM_reference",
                  "reference_upgrade_computed": True,
                  "diagnostic_variance_support_built": True,
                  "full_posterior_covariance_available": False,
                  "observed_eBOSS_covariance_still_limited": True,
                  "CAMB_run": False,
                  "full_planck_chains_imported": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          EBOSS_COMPONENTS = {
              "LRG": {
                  "component_id": "eBOSS_LRG_z0698",
                  "target_id": "z0698_eBOSS_LRG",
                  "z": 0.698,
                  "observed_fsigma8": 0.473,
                  "observed_sigma": 0.044,
                  "old_reference": 0.4623052016766069
              },
              "ELG": {
                  "component_id": "eBOSS_ELG_z0850",
                  "target_id": "z0850_eBOSS_ELG",
                  "z": 0.850,
                  "observed_fsigma8": 0.315,
                  "observed_sigma": 0.095,
                  "old_reference": 0.4469713428685805
              },
              "QSO": {
                  "component_id": "eBOSS_QSO_z1480",
                  "target_id": "z1480_eBOSS_QSO",
                  "z": 1.480,
                  "observed_fsigma8": 0.462,
                  "observed_sigma": 0.045,
                  "old_reference": 0.3834165333353129
              }
          }

          CARRIED_PRIOR_REFERENCE = {
              0.150: 0.4618473025984107,
              0.380: 0.4788039956151594,
              0.510: 0.4766635460319918,
              0.610: 0.4711826988812538
          }

          CURRENT_INTERPOLATION_REFERENCE = {
              0.067: 0.4557281481619318,
              0.150: 0.4618473025984107,
              0.380: 0.4788039956151594,
              0.440: 0.4778160958075436,
              0.510: 0.4766635460319918,
              0.600: 0.4717307835963276,
              0.610: 0.4711826988812538,
              0.698: 0.4623052016766069,
              0.730: 0.4590770208749171,
              0.800: 0.4520153753712207,
              0.850: 0.4469713428685805,
              1.480: 0.3834165333353129
          }

          SENSITIVITY_SCENARIOS = [
              {"scenario_id": "baseline", "Omega_m": 0.315, "sigma8_0": 0.811, "gamma": 0.55, "scenario_type": "central"},
              {"scenario_id": "Omega_m_low", "Omega_m": 0.300, "sigma8_0": 0.811, "gamma": 0.55, "scenario_type": "single_parameter"},
              {"scenario_id": "Omega_m_high", "Omega_m": 0.330, "sigma8_0": 0.811, "gamma": 0.55, "scenario_type": "single_parameter"},
              {"scenario_id": "sigma8_low", "Omega_m": 0.315, "sigma8_0": 0.795, "gamma": 0.55, "scenario_type": "single_parameter"},
              {"scenario_id": "sigma8_high", "Omega_m": 0.315, "sigma8_0": 0.827, "gamma": 0.55, "scenario_type": "single_parameter"},
              {"scenario_id": "gamma_low", "Omega_m": 0.315, "sigma8_0": 0.811, "gamma": 0.52, "scenario_type": "single_parameter"},
              {"scenario_id": "gamma_high", "Omega_m": 0.315, "sigma8_0": 0.811, "gamma": 0.58, "scenario_type": "single_parameter"},
              {"scenario_id": "low_growth_corner", "Omega_m": 0.300, "sigma8_0": 0.795, "gamma": 0.58, "scenario_type": "stress_corner"},
              {"scenario_id": "high_growth_corner", "Omega_m": 0.330, "sigma8_0": 0.827, "gamma": 0.52, "scenario_type": "stress_corner"}
          ]

          LANE_DEFINITIONS = [
              {"lane_id": "family", "members": ["LRG", "ELG", "QSO"]},
              {"lane_id": "without_LRG", "members": ["ELG", "QSO"]},
              {"lane_id": "without_ELG", "members": ["LRG", "QSO"]},
              {"lane_id": "without_QSO", "members": ["LRG", "ELG"]},
              {"lane_id": "single_LRG", "members": ["LRG"]},
              {"lane_id": "single_ELG", "members": ["ELG"]},
              {"lane_id": "single_QSO", "members": ["QSO"]}
          ]

          VARIANCE_POLICY = {
              "variance_floor": 1.0e-5,
              "delta_multiplier": 4.0,
              "prior_alignment_multiplier": 4.0,
              "status": "diagonal_approximation_variance_not_full_covariance"
          }

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "CAMB was run.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The LCDM reference sensitivity audit validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "Sensitivity stability is the same as full Planck posterior covariance.",
              "The eBOSS two-driver sign pattern is a final physical conclusion.",
              "Same-program eBOSS covariance is resolved.",
              "Observed covariance review is no longer needed.",
              "A pressure threshold change under parameter stress is proof or disproof."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_140_eBOSS_covariance_manual_extraction_checklist",
                  "purpose": "Create a human-readable checklist for extracting eBOSS covariance/likelihood support from SDSS/arXiv products.",
                  "why_next": "The sign pattern is stable but pressure magnitude is parameter-sensitive; observed covariance remains the bigger blocker."
              },
              {
                  "priority": 2,
                  "route_id": "v4_141_CAMB_install_or_stored_chain_probe",
                  "purpose": "Try a bounded CAMB/stored-chain feasibility route if runtime support becomes available.",
                  "why_next": "The lightweight LCDM reference is useful but still not full CAMB/chain posterior support."
              },
              {
                  "priority": 3,
                  "route_id": "v4_142_eBOSS_rerun_after_observed_covariance_or_CAMB_upgrade",
                  "purpose": "Rerun eBOSS lanes only after observed covariance or stronger reference support improves.",
                  "why_next": "The current result is diagnostic and limitation-bound."
              },
              {
                  "priority": 4,
                  "route_id": "v4_143_external_standard_cosmology_comparison_plan",
                  "purpose": "Design comparison language against normal ΛCDM growth pipelines and literature constraints.",
                  "why_next": "Any persistent local pressure must be contextualized before public-facing claims."
              }
          ]

          failed_gates = []
          warnings = [
              "sensitivity_audit_only",
              "lightweight_LCDM_reference_not_full_posterior",
              "pressure_magnitude_sensitive_to_reference_parameters",
              "sign_pattern_more_stable_than_pressure_threshold",
              "same_program_eBOSS_covariance_still_limited",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def E_of_a(a, omega_m, omega_lambda):
              return math.sqrt(omega_m / (a ** 3) + omega_lambda)

          def growth_integral_D(a, omega_m, omega_lambda, steps=1600):
              eps = 1.0e-5
              if a <= eps:
                  return a
              n = int(steps)
              if n % 2 == 1:
                  n += 1
              h = (a - eps) / n

              def integrand(x):
                  e = E_of_a(x, omega_m, omega_lambda)
                  return 1.0 / ((x ** 3) * (e ** 3))

              total = integrand(eps) + integrand(a)
              for i in range(1, n):
                  total += (4.0 if i % 2 else 2.0) * integrand(eps + i * h)
              integral = total * h / 3.0
              return 2.5 * omega_m * E_of_a(a, omega_m, omega_lambda) * integral

          def fsigma8_lcdm_approx(z, scenario, D_at_1):
              omega_m = scenario["Omega_m"]
              omega_lambda = 1.0 - omega_m
              sigma8_0 = scenario["sigma8_0"]
              gamma = scenario["gamma"]
              a = 1.0 / (1.0 + z)
              D_z = growth_integral_D(a, omega_m, omega_lambda) / D_at_1
              omega_m_z = (omega_m * ((1.0 + z) ** 3)) / (omega_m * ((1.0 + z) ** 3) + omega_lambda)
              f_z = omega_m_z ** gamma
              return f_z * sigma8_0 * D_z

          def sign(value):
              return 1.0 if value >= 0 else -1.0

          def compute_pressure(lane, component_records):
              selected = [row for row in component_records if row["component_key"] in lane["members"]]
              residuals = [float(row["residual"]) for row in selected]
              variances = [float(row["total_variance"]) for row in selected]
              chi2 = sum((r * r) / v for r, v in zip(residuals, variances))
              dof = len(selected)
              residual_mean = sum(residuals) / len(residuals)
              pressure_z = sign(residual_mean) * math.sqrt(max(chi2 - dof, 0.0))
              return {
                  "chi2": chi2,
                  "dof": dof,
                  "pressure_z": pressure_z,
                  "abs_pressure_z": abs(pressure_z),
                  "residual_mean": residual_mean
              }

          scenario_records = []
          component_sensitivity_records = []
          lane_sensitivity_records = []

          for scenario in SENSITIVITY_SCENARIOS:
              omega_lambda = 1.0 - scenario["Omega_m"]
              D_at_1 = growth_integral_D(1.0, scenario["Omega_m"], omega_lambda)

              prior_deltas = []
              for z, prior_reference in CARRIED_PRIOR_REFERENCE.items():
                  approx = fsigma8_lcdm_approx(z, scenario, D_at_1)
                  prior_deltas.append(approx - prior_reference)
              rms_prior_delta = math.sqrt(sum(delta * delta for delta in prior_deltas) / len(prior_deltas))
              max_abs_prior_delta = max(abs(delta) for delta in prior_deltas)

              component_records = []
              for key, comp in EBOSS_COMPONENTS.items():
                  ref = fsigma8_lcdm_approx(comp["z"], scenario, D_at_1)
                  residual = comp["observed_fsigma8"] - ref
                  delta_old = ref - comp["old_reference"]
                  variance = max(
                      VARIANCE_POLICY["variance_floor"],
                      (VARIANCE_POLICY["delta_multiplier"] * abs(delta_old)) ** 2,
                      (VARIANCE_POLICY["prior_alignment_multiplier"] * rms_prior_delta) ** 2
                  )
                  total_variance = comp["observed_sigma"] ** 2 + variance
                  component_records.append({
                      "scenario_id": scenario["scenario_id"],
                      "scenario_type": scenario["scenario_type"],
                      "component_key": key,
                      "component_id": comp["component_id"],
                      "target_id": comp["target_id"],
                      "z": comp["z"],
                      "observed_fsigma8": comp["observed_fsigma8"],
                      "observed_sigma": comp["observed_sigma"],
                      "reference_value": ref,
                      "old_reference": comp["old_reference"],
                      "delta_reference_minus_old": delta_old,
                      "residual": residual,
                      "residual_sign": "positive" if residual > 0 else "negative" if residual < 0 else "neutral",
                      "reference_variance": variance,
                      "total_variance": total_variance,
                      "variance_status": VARIANCE_POLICY["status"],
                      "claim_boundary": "sensitivity_component_record_not_final"
                  })
              component_sensitivity_records.extend(component_records)

              scenario_lane_records = []
              for lane in LANE_DEFINITIONS:
                  result = compute_pressure(lane, component_records)
                  record = {
                      "scenario_id": scenario["scenario_id"],
                      "scenario_type": scenario["scenario_type"],
                      "lane_id": lane["lane_id"],
                      "members": ",".join(lane["members"]),
                      "chi2": result["chi2"],
                      "dof": result["dof"],
                      "pressure_z": result["pressure_z"],
                      "abs_pressure_z": result["abs_pressure_z"],
                      "residual_mean": result["residual_mean"],
                      "pressure_flag_abs_ge_1": abs(result["pressure_z"]) >= 1.0,
                      "claim_boundary": "sensitivity_lane_record_not_final"
                  }
                  lane_sensitivity_records.append(record)
                  scenario_lane_records.append(record)

              def get_lane_value(lane_id, field):
                  return next(row[field] for row in scenario_lane_records if row["lane_id"] == lane_id)

              scenario_records.append({
                  "scenario_id": scenario["scenario_id"],
                  "scenario_type": scenario["scenario_type"],
                  "Omega_m": scenario["Omega_m"],
                  "Omega_lambda": omega_lambda,
                  "sigma8_0": scenario["sigma8_0"],
                  "gamma": scenario["gamma"],
                  "max_abs_prior_delta": max_abs_prior_delta,
                  "rms_prior_delta": rms_prior_delta,
                  "family_pressure_z": get_lane_value("family", "pressure_z"),
                  "without_LRG_pressure_z": get_lane_value("without_LRG", "pressure_z"),
                  "without_ELG_pressure_z": get_lane_value("without_ELG", "pressure_z"),
                  "without_QSO_pressure_z": get_lane_value("without_QSO", "pressure_z"),
                  "single_LRG_pressure_z": get_lane_value("single_LRG", "pressure_z"),
                  "single_ELG_pressure_z": get_lane_value("single_ELG", "pressure_z"),
                  "single_QSO_pressure_z": get_lane_value("single_QSO", "pressure_z")
              })

          family_values = [row["family_pressure_z"] for row in scenario_records]
          without_lrg_values = [row["without_LRG_pressure_z"] for row in scenario_records]
          without_elg_values = [row["without_ELG_pressure_z"] for row in scenario_records]
          without_qso_values = [row["without_QSO_pressure_z"] for row in scenario_records]
          single_elg_values = [row["single_ELG_pressure_z"] for row in scenario_records]
          single_qso_values = [row["single_QSO_pressure_z"] for row in scenario_records]

          elg_negative_all_scenarios = all(
              next(row["residual"] for row in component_sensitivity_records if row["scenario_id"] == scenario["scenario_id"] and row["component_key"] == "ELG") < 0.0
              for scenario in SENSITIVITY_SCENARIOS
          )
          qso_positive_all_scenarios = all(
              next(row["residual"] for row in component_sensitivity_records if row["scenario_id"] == scenario["scenario_id"] and row["component_key"] == "QSO") > 0.0
              for scenario in SENSITIVITY_SCENARIOS
          )
          family_pressure_threshold_sensitive = any(abs(value) >= 1.0 for value in family_values) and any(abs(value) < 1.0 for value in family_values)
          qso_pressure_threshold_sensitive = any(abs(value) >= 1.0 for value in single_qso_values) and any(abs(value) < 1.0 for value in single_qso_values)
          without_elg_positive_all_scenarios = all(value >= 0.0 for value in without_elg_values)
          without_qso_neutral_or_negative_all_scenarios = all(value <= 0.0 for value in without_qso_values)
          sign_pattern_stable = elg_negative_all_scenarios and qso_positive_all_scenarios and without_elg_positive_all_scenarios and without_qso_neutral_or_negative_all_scenarios
          pressure_magnitude_sensitive = family_pressure_threshold_sensitive and qso_pressure_threshold_sensitive

          audit_classification_records = [
              {
                  "classification_id": "ELG_negative_residual_stable",
                  "pass": elg_negative_all_scenarios,
                  "value": elg_negative_all_scenarios,
                  "meaning": "ELG residual stays negative across all bounded LCDM sensitivity scenarios."
              },
              {
                  "classification_id": "QSO_positive_residual_stable",
                  "pass": qso_positive_all_scenarios,
                  "value": qso_positive_all_scenarios,
                  "meaning": "QSO residual stays positive across all bounded LCDM sensitivity scenarios."
              },
              {
                  "classification_id": "without_ELG_nonnegative_stable",
                  "pass": without_elg_positive_all_scenarios,
                  "value": without_elg_positive_all_scenarios,
                  "meaning": "The LRG+QSO pair remains nonnegative across all scenarios."
              },
              {
                  "classification_id": "without_QSO_nonpositive_stable",
                  "pass": without_qso_neutral_or_negative_all_scenarios,
                  "value": without_qso_neutral_or_negative_all_scenarios,
                  "meaning": "The LRG+ELG pair remains neutral or negative across all scenarios."
              },
              {
                  "classification_id": "family_pressure_threshold_sensitive",
                  "pass": family_pressure_threshold_sensitive,
                  "value": f"min={min(family_values)}; max={max(family_values)}",
                  "meaning": "The eBOSS family pressure flag changes magnitude enough that it cannot be treated as final."
              },
              {
                  "classification_id": "QSO_pressure_threshold_sensitive",
                  "pass": qso_pressure_threshold_sensitive,
                  "value": f"min={min(single_qso_values)}; max={max(single_qso_values)}",
                  "meaning": "QSO remains positive in sign, but its pressure threshold status depends on the reference scenario."
              },
              {
                  "classification_id": "sign_pattern_stable_pressure_magnitude_sensitive",
                  "pass": sign_pattern_stable and pressure_magnitude_sensitive,
                  "value": "stable_signs_sensitive_thresholds",
                  "meaning": "The direction pattern is more stable than the pressure magnitude."
              },
              {
                  "classification_id": "observed_covariance_still_blocks_final",
                  "pass": True,
                  "value": "same_program_covariance_not_ingested",
                  "meaning": "Observed eBOSS covariance still blocks final interpretation."
              }
          ]

          final_pressure_ready = False
          full_posterior_covariance_available = False
          observed_covariance_ingested = False

          if UPSTREAM_LOCKS["v4_138_eBOSS_component_rerun_with_LCDM_reference"]["two_driver_pattern_survives_with_weaker_positive_pair"] is not True:
              failed_gates.append("upstream_two_driver_pattern_not_carried")

          if len(SENSITIVITY_SCENARIOS) < 9:
              failed_gates.append("not_enough_sensitivity_scenarios")

          if len(lane_sensitivity_records) != len(SENSITIVITY_SCENARIOS) * len(LANE_DEFINITIONS):
              failed_gates.append("lane_sensitivity_records_incomplete")

          if not sign_pattern_stable:
              failed_gates.append("sign_pattern_not_stable")

          if not pressure_magnitude_sensitive:
              failed_gates.append("pressure_magnitude_sensitivity_not_detected")

          if not family_pressure_threshold_sensitive:
              failed_gates.append("family_pressure_threshold_sensitivity_not_detected")

          if not qso_pressure_threshold_sensitive:
              failed_gates.append("qso_pressure_threshold_sensitivity_not_detected")

          if observed_covariance_ingested:
              failed_gates.append("observed_covariance_unexpectedly_ingested")

          if full_posterior_covariance_available:
              failed_gates.append("full_posterior_covariance_unexpectedly_available")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "camb was run",
              "final rsd pressure score",
              "validates tairid cosmology",
              "sensitivity stability is the same as full planck posterior covariance",
              "observed covariance review is no longer needed",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "LCDM_reference_sensitivity_audit_passed_sign_pattern_stable_pressure_magnitude_sensitive_ready_for_eBOSS_covariance_manual_extraction_checklist"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_lcdm_rerun_carried",
                  "pass": UPSTREAM_LOCKS["v4_138_eBOSS_component_rerun_with_LCDM_reference"]["two_driver_pattern_survives_with_weaker_positive_pair"] is True,
                  "result": "v4.138 LCDM-reference eBOSS rerun carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "sensitivity_scenarios_complete",
                  "pass": len(SENSITIVITY_SCENARIOS) >= 9,
                  "result": f"scenario_count={len(SENSITIVITY_SCENARIOS)}",
                  "boundary": "Bounded diagnostic scenario set only."
              },
              {
                  "rule_id": "lane_records_complete",
                  "pass": len(lane_sensitivity_records) == len(SENSITIVITY_SCENARIOS) * len(LANE_DEFINITIONS),
                  "result": f"lane_records={len(lane_sensitivity_records)}",
                  "boundary": "Diagnostic lanes only."
              },
              {
                  "rule_id": "direction_sign_pattern_stable",
                  "pass": sign_pattern_stable,
                  "result": "ELG negative, QSO positive, without-ELG nonnegative, without-QSO nonpositive across scenarios",
                  "boundary": "Sign stability only."
              },
              {
                  "rule_id": "pressure_magnitude_sensitive",
                  "pass": pressure_magnitude_sensitive,
                  "result": f"family_range=({min(family_values)}, {max(family_values)}); single_QSO_range=({min(single_qso_values)}, {max(single_qso_values)})",
                  "boundary": "Blocks final pressure interpretation."
              },
              {
                  "rule_id": "threshold_sensitivity_declared",
                  "pass": family_pressure_threshold_sensitive and qso_pressure_threshold_sensitive,
                  "result": "pressure threshold changes under bounded LCDM parameter variation",
                  "boundary": "Sensitivity finding, not proof or disproof."
              },
              {
                  "rule_id": "covariance_boundary_preserved",
                  "pass": observed_covariance_ingested is False and full_posterior_covariance_available is False,
                  "result": "same-program eBOSS covariance not ingested; no full posterior covariance",
                  "boundary": "Blocks final interpretation."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_139_rules_passed")

          if failed_gates:
              readiness_label = "LCDM_reference_sensitivity_audit_failed"
              next_allowed_step = "Repair LCDM reference sensitivity audit before covariance/manual extraction work."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.140 eBOSS covariance manual extraction checklist. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "scenario_count": len(SENSITIVITY_SCENARIOS),
              "lane_record_count": len(lane_sensitivity_records),
              "sign_pattern_stable": sign_pattern_stable,
              "pressure_magnitude_sensitive": pressure_magnitude_sensitive,
              "family_pressure_threshold_sensitive": family_pressure_threshold_sensitive,
              "qso_pressure_threshold_sensitive": qso_pressure_threshold_sensitive,
              "ELG_negative_all_scenarios": elg_negative_all_scenarios,
              "QSO_positive_all_scenarios": qso_positive_all_scenarios,
              "without_ELG_positive_all_scenarios": without_elg_positive_all_scenarios,
              "without_QSO_neutral_or_negative_all_scenarios": without_qso_neutral_or_negative_all_scenarios,
              "family_pressure_min": min(family_values),
              "family_pressure_max": max(family_values),
              "single_QSO_pressure_min": min(single_qso_values),
              "single_QSO_pressure_max": max(single_qso_values),
              "observed_covariance_ingested": observed_covariance_ingested,
              "full_posterior_covariance_available": full_posterior_covariance_available,
              "CAMB_run": False,
              "full_planck_chains_imported": False,
              "full_planck_chain_sample_files_parsed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "eboss_components": EBOSS_COMPONENTS,
              "sensitivity_scenarios": SENSITIVITY_SCENARIOS,
              "variance_policy": VARIANCE_POLICY,
              "component_sensitivity_records": component_sensitivity_records,
              "lane_sensitivity_records": lane_sensitivity_records,
              "scenario_records": scenario_records,
              "audit_classification_records": audit_classification_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "sign_pattern_stable": sign_pattern_stable,
                  "pressure_magnitude_sensitive": pressure_magnitude_sensitive,
                  "observed_covariance_ingested": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_139_lcdm_reference_sensitivity_audit.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "scenario_records_v4_139.csv",
              scenario_records,
              ["scenario_id", "scenario_type", "Omega_m", "Omega_lambda", "sigma8_0", "gamma", "max_abs_prior_delta", "rms_prior_delta", "family_pressure_z", "without_LRG_pressure_z", "without_ELG_pressure_z", "without_QSO_pressure_z", "single_LRG_pressure_z", "single_ELG_pressure_z", "single_QSO_pressure_z"]
          )

          write_csv(
              OUTDIR / "component_sensitivity_records_v4_139.csv",
              component_sensitivity_records,
              ["scenario_id", "scenario_type", "component_key", "component_id", "target_id", "z", "observed_fsigma8", "observed_sigma", "reference_value", "old_reference", "delta_reference_minus_old", "residual", "residual_sign", "reference_variance", "total_variance", "variance_status", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "lane_sensitivity_records_v4_139.csv",
              lane_sensitivity_records,
              ["scenario_id", "scenario_type", "lane_id", "members", "chi2", "dof", "pressure_z", "abs_pressure_z", "residual_mean", "pressure_flag_abs_ge_1", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "audit_classification_records_v4_139.csv",
              audit_classification_records,
              ["classification_id", "pass", "value", "meaning"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_139.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_139.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_139.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.139 — LCDM Reference Sensitivity Audit")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.139 checks whether the v4.138 eBOSS LCDM-reference rerun is stable under bounded LCDM parameter changes. The result separates sign pattern from pressure magnitude.")
          md.append("")
          md.append("The sign structure is stable: ELG stays negative, QSO stays positive, the no-ELG pair stays nonnegative, and the no-QSO pair stays neutral or negative. But pressure magnitude is sensitive to the reference parameters, so this still cannot become a final pressure claim.")
          md.append("")
          md.append("## Scenario summary")
          md.append("")
          md.append("| Scenario | family pressure_z | single QSO pressure_z |")
          md.append("|---|---:|---:|")
          for row in scenario_records:
              md.append(f"| `{row['scenario_id']}` | `{row['family_pressure_z']}` | `{row['single_QSO_pressure_z']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_139_lcdm_reference_sensitivity_audit.json",
              "tairid_v4_139_lcdm_reference_sensitivity_audit.md",
              "scenario_records_v4_139.csv",
              "component_sensitivity_records_v4_139.csv",
              "lane_sensitivity_records_v4_139.csv",
              "audit_classification_records_v4_139.csv",
              "blocked_claims_v4_139.csv",
              "next_route_options_v4_139.csv",
              "rule_results_v4_139.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_139_lcdm_reference_sensitivity_audit.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.139 LCDM reference sensitivity audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-139-lcdm-reference-sensitivity-audit
          path: artifacts/tairid_v4_139_lcdm_reference_sensitivity_audit/
