name: TAIRID v4.26 RSD Reference Curve Builder

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-26-rsd-reference-curve-builder.yml"

jobs:
  tairid-v4-26-rsd-reference-curve-builder:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.26 RSD reference curve builder
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_26_rsd_reference_curve_builder

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_26_rsd_reference_curve_builder")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_26_rsd_reference_curve_builder"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine RSD, weak lensing, clusters, CMB lensing, KiDS, DES, HSC, H0LiCOW, BAO, or CMB into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run an RSD likelihood.",
              "This does not compute a final RSD pressure score.",
              "This builds a declared redshift-dependent f_sigma8 reference curve for later boundary-safe comparison.",
              "A pass means the RSD reference curve exists with limitations, not that TAIRID cosmology is validated."
          ]

          REFERENCE_MODEL = {
              "model_id": "planck_like_flat_lcdm_growth_reference_v0",
              "model_role": "declared_reference_curve_only",
              "Omega_m0": 0.315,
              "Omega_lambda0": 0.685,
              "sigma8_0": 0.811,
              "growth_index_gamma": 0.55,
              "H0_status": "not_used_for_dimensionless_f_sigma8_curve",
              "method": "flat_LCDM_growth_factor_integral_normalized_to_D_z0_equals_1_plus_growth_index_f_approximation",
              "limitations": [
                  "This is a declared Planck-like LCDM reference curve, not a Planck chain-derived posterior.",
                  "This does not include covariance between RSD rows.",
                  "This does not refit cosmology.",
                  "This does not compute likelihood, BIC, or model comparison.",
                  "This does not compare f_sigma8 to a single scalar S8 value.",
                  "This is suitable only for a later non-final residual preview unless upgraded with covariance and source-specific products."
              ]
          }

          RSD_ROWS = [
              {
                  "row_id": "boss_dr12_z038_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.38,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.497,
                  "published_sigma": 0.045,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "boss_dr12_z051_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.51,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.458,
                  "published_sigma": 0.038,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "boss_dr12_z061_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.61,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.436,
                  "published_sigma": 0.034,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "wigglez_z044_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.44,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.413,
                  "published_sigma": 0.080,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "wigglez_z060_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.60,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.390,
                  "published_sigma": 0.063,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "wigglez_z073_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.73,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.437,
                  "published_sigma": 0.072,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "LRG",
                  "z_eff": 0.70,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "ELG",
                  "z_eff": 0.85,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "QSO",
                  "z_eff": 1.48,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "pressure_score_allowed_now": False
              }
          ]

          REFERENCE_BUILD_RULES = [
              {
                  "rule_id": "reference_model_declared",
                  "description": "The reference curve must declare Omega_m0, Omega_lambda0, sigma8_0, growth method, and limitations."
              },
              {
                  "rule_id": "redshift_specific_reference_required",
                  "description": "Every RSD row must receive f_sigma8_ref(z_eff), not one scalar S8 comparison."
              },
              {
                  "rule_id": "pending_rows_remain_blocked",
                  "description": "Rows without published values/sigmas may receive reference values but cannot enter later residual preview until repaired."
              },
              {
                  "rule_id": "bao_rsd_separation_preserved",
                  "description": "BAO-bundled rows remain RSD/f_sigma8 growth rows with BAO treated as boundary/ruler."
              },
              {
                  "rule_id": "no_pressure_score_now",
                  "description": "This step builds reference values only and does not compute final pressure scores."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "f_sigma8 and S8 are the same axis.",
              "RSD rows can be scored against one scalar Planck S8 value.",
              "BAO and RSD can be averaged into one reach/growth correction.",
              "Pending eBOSS rows can be scored before value review.",
              "A likelihood, BIC, refit, or model comparison was run.",
              "This approximate reference curve is a full Planck posterior."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_27_RSD_nonfinal_residual_preview",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Use value-ready RSD rows and the declared reference curve to compute a non-final residual preview with diagonal-only warning.",
                  "must_include": "observed f_sigma8, reference f_sigma8_ref(z), residual sign, diagonal limitation, no validation claim.",
                  "must_not_include": "final pressure score, covariance-aware claim, likelihood refit, pretending f_sigma8 equals S8."
              },
              {
                  "priority": 2,
                  "next_test": "v4_28_RSD_value_review_for_eBOSS_rows",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Repair pending eBOSS f_sigma8 values and uncertainties before they can enter residual preview.",
                  "must_include": "source, tracer, redshift, value, sigma, covariance warning.",
                  "must_not_include": "unreviewed value insertion."
              },
              {
                  "priority": 3,
                  "next_test": "v4_29_cluster_mass_calibration_boundary_audit",
                  "role_focus": "cluster_abundance_growth",
                  "purpose": "Audit cluster abundance with mass calibration and selection boundaries.",
                  "must_include": "mass calibration, selection, source/product status, axis label.",
                  "must_not_include": "cluster proof claim."
              }
          ]

          def E_of_a(a, omega_m0, omega_lambda0):
              return math.sqrt(omega_m0 / (a ** 3) + omega_lambda0)

          def omega_m_of_a(a, omega_m0, omega_lambda0):
              e2 = omega_m0 / (a ** 3) + omega_lambda0
              return (omega_m0 / (a ** 3)) / e2

          def growth_integral(a, omega_m0, omega_lambda0, n=5000):
              # Integral from a_min to a of da / (a^3 E(a)^3).
              # Starts above zero to avoid singular endpoint.
              a_min = 1.0e-4
              if a <= a_min:
                  return 0.0

              step = (a - a_min) / n
              total = 0.0

              for i in range(n + 1):
                  x = a_min + i * step
                  weight = 0.5 if i == 0 or i == n else 1.0
                  e = E_of_a(x, omega_m0, omega_lambda0)
                  total += weight * (1.0 / ((x ** 3) * (e ** 3)))

              return total * step

          def unnormalized_growth_D(a, omega_m0, omega_lambda0):
              e = E_of_a(a, omega_m0, omega_lambda0)
              integral = growth_integral(a, omega_m0, omega_lambda0)
              return (5.0 * omega_m0 * e / 2.0) * integral

          def normalized_growth_D(z, omega_m0, omega_lambda0):
              a = 1.0 / (1.0 + z)
              d_a = unnormalized_growth_D(a, omega_m0, omega_lambda0)
              d_1 = unnormalized_growth_D(1.0, omega_m0, omega_lambda0)
              return d_a / d_1

          def f_growth_approx(z, omega_m0, omega_lambda0, gamma):
              a = 1.0 / (1.0 + z)
              omega_m_z = omega_m_of_a(a, omega_m0, omega_lambda0)
              return omega_m_z ** gamma

          def f_sigma8_ref(z, model):
              d_z = normalized_growth_D(z, model["Omega_m0"], model["Omega_lambda0"])
              f_z = f_growth_approx(z, model["Omega_m0"], model["Omega_lambda0"], model["growth_index_gamma"])
              sigma8_z = model["sigma8_0"] * d_z
              return {
                  "D_z": d_z,
                  "f_z": f_z,
                  "sigma8_z": sigma8_z,
                  "f_sigma8_ref": f_z * sigma8_z
              }

          failed_gates = []
          warnings = []

          reference_rows = []
          value_ready_rows = []
          pending_rows = []

          for row in RSD_ROWS:
              z = float(row["z_eff"])
              ref = f_sigma8_ref(z, REFERENCE_MODEL)

              observed_value = row["published_value"]
              observed_sigma = row["published_sigma"]
              value_ready = observed_value not in ["", None] and observed_sigma not in ["", None]

              if value_ready:
                  value_ready_rows.append(row)
                  comparison_readiness = "ready_for_later_nonfinal_residual_preview"
              else:
                  pending_rows.append(row)
                  comparison_readiness = "blocked_until_value_review"

              reference_rows.append({
                  "row_id": row["row_id"],
                  "survey_family": row["survey_family"],
                  "tracer_or_sample": row["tracer_or_sample"],
                  "z_eff": row["z_eff"],
                  "observable_axis": row["observable_axis"],
                  "observed_value": observed_value,
                  "observed_sigma": observed_sigma,
                  "value_ready": value_ready,
                  "evidence_status": row["evidence_status"],
                  "bao_bundled": row["bao_bundled"],
                  "D_z": ref["D_z"],
                  "f_z": ref["f_z"],
                  "sigma8_z": ref["sigma8_z"],
                  "f_sigma8_ref": ref["f_sigma8_ref"],
                  "reference_model_id": REFERENCE_MODEL["model_id"],
                  "comparison_readiness": comparison_readiness,
                  "pressure_score_allowed_now": False
              })

          for row in reference_rows:
              if row["observable_axis"] != "f_sigma8":
                  failed_gates.append(row["row_id"] + "_axis_not_f_sigma8")

              if row["f_sigma8_ref"] <= 0:
                  failed_gates.append(row["row_id"] + "_nonpositive_reference_value")

              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append(row["row_id"] + "_pressure_score_allowed_violation")

          if REFERENCE_MODEL["Omega_m0"] <= 0 or REFERENCE_MODEL["Omega_lambda0"] < 0:
              failed_gates.append("invalid_reference_density_parameters")

          if abs((REFERENCE_MODEL["Omega_m0"] + REFERENCE_MODEL["Omega_lambda0"]) - 1.0) > 1.0e-9:
              failed_gates.append("reference_model_not_flat")

          if not REFERENCE_MODEL.get("limitations"):
              failed_gates.append("reference_model_limitations_missing")

          if not any("single scalar S8" in claim or "scalar Planck S8" in claim for claim in BLOCKED_CLAIMS):
              failed_gates.append("single_S8_blocked_claim_missing")

          rule_results = [
              {
                  "rule_id": "reference_model_declared",
                  "pass": bool(REFERENCE_MODEL.get("model_id")) and bool(REFERENCE_MODEL.get("method")) and bool(REFERENCE_MODEL.get("limitations")),
                  "result": "reference_model_declared_with_limitations",
                  "boundary": "This is a reference curve, not a fitted model."
              },
              {
                  "rule_id": "redshift_specific_reference_required",
                  "pass": all(row["f_sigma8_ref"] > 0 for row in reference_rows),
                  "result": "all_rows_have_f_sigma8_ref_at_z_eff",
                  "boundary": "No scalar S8 comparison."
              },
              {
                  "rule_id": "pending_rows_remain_blocked",
                  "pass": all(row["comparison_readiness"] == "blocked_until_value_review" for row in reference_rows if not row["value_ready"]),
                  "result": "pending_rows_blocked_until_value_review",
                  "boundary": "No unreviewed eBOSS scoring."
              },
              {
                  "rule_id": "bao_rsd_separation_preserved",
                  "pass": all(row["observable_axis"] == "f_sigma8" for row in reference_rows if row["bao_bundled"] is True),
                  "result": "BAO_bundled_rows_keep_RSD_growth_axis",
                  "boundary": "BAO remains boundary/ruler."
              },
              {
                  "rule_id": "no_pressure_score_now",
                  "pass": all(row["pressure_score_allowed_now"] is False for row in reference_rows),
                  "result": "no_pressure_scores_allowed_in_reference_builder",
                  "boundary": "Reference builder only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_reference_builder_rules_passed")

          warnings.append("reference_curve_is_approximate_planck_like_LCDM_not_chain_posterior")
          warnings.append("covariance_not_used")
          warnings.append("no_pressure_scores_computed")
          warnings.append("pending_eBOSS_rows_remain_blocked")
          warnings.append("next_step_can_only_be_nonfinal_residual_preview")

          if failed_gates:
              readiness_label = "rsd_reference_curve_builder_failed"
              next_step = "Repair reference curve builder before residual preview."
          else:
              readiness_label = "rsd_reference_curve_builder_passed_ready_for_nonfinal_residual_preview"
              next_step = (
                  "Proceed to v4.27 RSD non-final residual preview using value-ready rows only. "
                  "Keep covariance warnings active and do not claim validation or final pressure."
              )

          system_health = {
              "rsd_row_count": len(RSD_ROWS),
              "reference_row_count": len(reference_rows),
              "value_ready_row_count": len(value_ready_rows),
              "pending_row_count": len(pending_rows),
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "reference_model_declared": True,
              "flat_reference_model": True,
              "single_S8_reference_blocked": True,
              "pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "likelihood_run": False,
              "refit_run": False
          }

          interpretation = (
              "v4.26 builds a declared f_sigma8_ref(z) curve for RSD rows. "
              "This lets the pipeline move beyond the old mistake of comparing RSD/f_sigma8 to one scalar S8 value. "
              "The curve is approximate and declared, not a Planck posterior or full likelihood. "
              "Only value-ready rows may enter a later non-final residual preview, while pending eBOSS rows remain blocked."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "reference_model": REFERENCE_MODEL,
              "rsd_rows": RSD_ROWS,
              "reference_rows": reference_rows,
              "reference_build_rules": REFERENCE_BUILD_RULES,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_pressure_scores_built": False,
                  "likelihood_run": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "reference_model_v4_26.csv",
              [{
                  "model_id": REFERENCE_MODEL["model_id"],
                  "model_role": REFERENCE_MODEL["model_role"],
                  "Omega_m0": REFERENCE_MODEL["Omega_m0"],
                  "Omega_lambda0": REFERENCE_MODEL["Omega_lambda0"],
                  "sigma8_0": REFERENCE_MODEL["sigma8_0"],
                  "growth_index_gamma": REFERENCE_MODEL["growth_index_gamma"],
                  "method": REFERENCE_MODEL["method"],
                  "limitations": " | ".join(REFERENCE_MODEL["limitations"])
              }],
              ["model_id", "model_role", "Omega_m0", "Omega_lambda0", "sigma8_0", "growth_index_gamma", "method", "limitations"]
          )

          write_csv(
              OUTDIR / "rsd_reference_curve_rows_v4_26.csv",
              reference_rows,
              [
                  "row_id",
                  "survey_family",
                  "tracer_or_sample",
                  "z_eff",
                  "observable_axis",
                  "observed_value",
                  "observed_sigma",
                  "value_ready",
                  "evidence_status",
                  "bao_bundled",
                  "D_z",
                  "f_z",
                  "sigma8_z",
                  "f_sigma8_ref",
                  "reference_model_id",
                  "comparison_readiness",
                  "pressure_score_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "reference_builder_rule_results_v4_26.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_26.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_26.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_26.csv",
              [system_health],
              [
                  "rsd_row_count",
                  "reference_row_count",
                  "value_ready_row_count",
                  "pending_row_count",
                  "rule_pass_count",
                  "rule_total_count",
                  "reference_model_declared",
                  "flat_reference_model",
                  "single_S8_reference_blocked",
                  "pressure_score_allowed_now",
                  "validation_claim_allowed",
                  "likelihood_run",
                  "refit_run"
              ]
          )

          json_path = OUTDIR / "tairid_v4_26_rsd_reference_curve_builder.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.26 — RSD Reference Curve Builder")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("A declared redshift-dependent f_sigma8 reference curve was built for the RSD rows.")
          md.append("")
          md.append("This does not compute final pressure. It only prepares a valid reference so f_sigma8 is not compared to one scalar S8 value.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Reference model")
          md.append("")
          md.append(f"- Model ID: `{REFERENCE_MODEL['model_id']}`")
          md.append(f"- Omega_m0: `{REFERENCE_MODEL['Omega_m0']}`")
          md.append(f"- Omega_lambda0: `{REFERENCE_MODEL['Omega_lambda0']}`")
          md.append(f"- sigma8_0: `{REFERENCE_MODEL['sigma8_0']}`")
          md.append(f"- growth_index_gamma: `{REFERENCE_MODEL['growth_index_gamma']}`")
          md.append("")
          md.append("## Rule results")
          md.append("")
          md.append("| Rule | Pass | Result | Boundary |")
          md.append("|---|---:|---|---|")
          for row in rule_results:
              md.append(f"| `{row['rule_id']}` | `{row['pass']}` | `{row['result']}` | {row['boundary']} |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `reference_model_v4_26.csv`")
          md.append("- `rsd_reference_curve_rows_v4_26.csv`")
          md.append("- `reference_builder_rule_results_v4_26.csv`")
          md.append("- `blocked_claims_v4_26.csv`")
          md.append("- `next_test_ladder_v4_26.csv`")
