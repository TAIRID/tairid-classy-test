name: "!!! AAA CURRENT - TAIRID v4.338 proposed extraction fill draft no approval"

on:
  workflow_dispatch:

jobs:
  run-v4-338-proposed-extraction-fill-draft-no-approval:
    name: "!!! AAA CURRENT - Run v4.338 proposed extraction fill draft"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.337 and v4.334 input ZIPs
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.337 audit ingest ZIP..."
          INPUT_337_ZIP="$(ls tairid-v4-337-external-ai-audit-response-ingest-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_337_ZIP" ]; then
            echo "Could not find v4.337 output ZIP."
            exit 1
          fi

          echo "Finding v4.334 extraction worksheet ZIP..."
          INPUT_334_ZIP="$(ls tairid-v4-334-parameter-value-extraction-worksheet-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_334_ZIP" ]; then
            echo "Could not find v4.334 output ZIP."
            echo "Upload tairid-v4-334-parameter-value-extraction-worksheet-no-scoring-output.zip to the repo root."
            exit 1
          fi

          echo "Using v4.337 ZIP:"
          echo "$INPUT_337_ZIP"

          echo "Using v4.334 ZIP:"
          echo "$INPUT_334_ZIP"

          echo "INPUT_337_ZIP=$INPUT_337_ZIP" >> "$GITHUB_ENV"
          echo "INPUT_334_ZIP=$INPUT_334_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.338 proposed extraction fill script
        run: |
          cat > run_v4_338_proposed_extraction_fill_draft_no_approval.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          TRUTH_BOUNDARY = "no observed scoring; no parameter approval; no numeric baseline approval; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def pick_quote(context, parameter):
              text = clean(context)
              if not text:
                  return ""

              candidates = [block.strip() for block in text.split("---") if block.strip()]
              lowered_param = parameter.lower()

              priority_terms = {
                  "omega_m0": ["omega", "Ω", "Omega", "matter", "lambda", "ΛCDM", "Planck"],
                  "sigma8_0": ["sigma_8", "sigma8", "\\sigma_8", "Planck", "precision"],
                  "growth_index_gamma": ["growth rate", "f\\sigma_8", "RSD", "redshift-space distortions"],
                  "lcdm_calculator_context": ["ΛCDM", "Planck", "BAO", "RSD", "cosmological model"],
                  "rsd_definition_bridge": ["growth rate parameter", "f\\sigma_8", "redshift-space distortions", "RSD"],
                  "calculator_limit_policy": ["consistent with", "Planck", "General Relativity", "precision", "covariance", "likelihood"],
              }

              terms = priority_terms.get(lowered_param, [])
              scored = []
              for block in candidates:
                  score = sum(1 for t in terms if t.lower() in block.lower())
                  scored.append((score, len(block), block))

              scored.sort(reverse=True)
              return scored[0][2][:1800] if scored else text[:1800]

          def proposal_for_parameter(parameter, quote):
              p = parameter.lower()
              q = quote.lower()

              if p == "omega_m0":
                  return {
                      "decision": "needs_exact_quote",
                      "value_text": "",
                      "numeric_value": "",
                      "uncertainty": "",
                      "units_definition": "Omega_m0 / present-day matter density parameter, not approved here.",
                      "context_note": "Relevant Planck/LCDM source context is present, but the selected quote window does not cleanly contain an approved Omega_m0 numeric value. Keep blocked until exact source value text is supplied."
                  }

              if p == "sigma8_0":
                  if "sigma_8=0.811" in q or "\\sigma_8=0.811" in q:
                      return {
                          "decision": "extract_candidate_for_later_value_review",
                          "value_text": "sigma_8=0.811\\pm0.019",
                          "numeric_value": "0.811",
                          "uncertainty": "±0.019",
                          "units_definition": "sigma8 amplitude parameter from quoted context; not approved here.",
                          "context_note": "Candidate value text appears in the source context, but this remains extraction only and is not value approval."
                      }
                  return {
                      "decision": "needs_exact_quote",
                      "value_text": "",
                      "numeric_value": "",
                      "uncertainty": "",
                      "units_definition": "sigma8_0 / present-day fluctuation amplitude parameter, not approved here.",
                      "context_note": "Relevant sigma8 source context is present, but the accepted quote window does not cleanly contain a value for the baseline field. Keep blocked until exact source value text is supplied."
                  }

              if p == "growth_index_gamma":
                  return {
                      "decision": "needs_better_source",
                      "value_text": "",
                      "numeric_value": "",
                      "uncertainty": "",
                      "units_definition": "growth-index gamma method parameter, not approved here.",
                      "context_note": "The current accepted context discusses fσ8/RSD growth measurements, but does not contain an exact growth-index gamma value. Needs a better method source before value review."
                  }

              if p == "lcdm_calculator_context":
                  return {
                      "decision": "context_only_not_value",
                      "value_text": "",
                      "numeric_value": "",
                      "uncertainty": "",
                      "units_definition": "LCDM calculator context only.",
                      "context_note": "Context supports later calculator framing, but no numeric baseline is approved."
                  }

              if p == "rsd_definition_bridge":
                  return {
                      "decision": "context_only_not_value",
                      "value_text": "",
                      "numeric_value": "",
                      "uncertainty": "",
                      "units_definition": "RSD/fσ8 definition bridge context only.",
                      "context_note": "Context supports the definition bridge from SDSS RSD to fσ8, but no observed values are loaded or scored."
                  }

              if p == "calculator_limit_policy":
                  return {
                      "decision": "context_only_not_value",
                      "value_text": "",
                      "numeric_value": "",
                      "uncertainty": "",
                      "units_definition": "calculator-limit policy context only.",
                      "context_note": "Context supports keeping calculator/baseline/scoring claims limited, but no support claim is allowed."
                  }

              return {
                  "decision": "keep_blocked",
                  "value_text": "",
                  "numeric_value": "",
                  "uncertainty": "",
                  "units_definition": "",
                  "context_note": "No safe proposal rule exists for this parameter or method."
              }

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def main():
              input_337 = Path(os.environ["INPUT_337_ZIP"])
              input_334 = Path(os.environ["INPUT_334_ZIP"])

              outdir = Path("tairid_v4_338_proposed_extraction_fill_draft_no_approval_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base337 = extract_zip(input_337, "tairid_v4_338_337_")
              base334 = extract_zip(input_334, "tairid_v4_338_334_")

              summary337_path = find_one(base337, "v4_337_summary.json")
              summary334_path = find_one(base334, "v4_334_summary.json")
              worksheet_path = find_one(base334, "v4_334_HUMAN_FILL_parameter_value_extraction_worksheet_NO_APPROVAL_NO_SCORING.csv")
              context_path = find_one(base334, "v4_334_input_v4_333_context_rows_preserved.csv")
              gap_status_path = find_one(base334, "v4_334_value_extraction_gap_status_no_scoring.csv")

              summary337 = json.loads(summary337_path.read_text())
              summary334 = json.loads(summary334_path.read_text())
              worksheet = pd.read_csv(worksheet_path)
              context_rows = pd.read_csv(context_path)
              gap_status = pd.read_csv(gap_status_path)

              proposed = worksheet.copy()

              for col in [
                  "human_exact_quote_selected",
                  "human_source_url_for_selected_quote",
                  "human_source_page_section_or_table",
                  "human_candidate_value_text_as_written",
                  "human_candidate_numeric_value_if_applicable",
                  "human_candidate_uncertainty_if_applicable",
                  "human_candidate_units_or_definition",
                  "human_context_note",
                  "human_extraction_decision",
                  "human_reviewer_note",
              ]:
                  proposed[col] = proposed[col].astype("object")

              proposal_rows = []

              for idx, row in proposed.iterrows():
                  parameter = clean(row["parameter_or_method"])
                  quote = pick_quote(row["source_context_blocks_for_human_review"], parameter)
                  proposal = proposal_for_parameter(parameter, quote)

                  source_url = clean(row["source_urls_for_review"]).split("|")[0] if clean(row["source_urls_for_review"]) else ""

                  proposed.at[idx, "human_exact_quote_selected"] = quote
                  proposed.at[idx, "human_source_url_for_selected_quote"] = source_url
                  proposed.at[idx, "human_source_page_section_or_table"] = "source/context window from accepted candidate packet; exact page/table not verified in this step"
                  proposed.at[idx, "human_candidate_value_text_as_written"] = proposal["value_text"]
                  proposed.at[idx, "human_candidate_numeric_value_if_applicable"] = proposal["numeric_value"]
                  proposed.at[idx, "human_candidate_uncertainty_if_applicable"] = proposal["uncertainty"]
                  proposed.at[idx, "human_candidate_units_or_definition"] = proposal["units_definition"]
                  proposed.at[idx, "human_context_note"] = proposal["context_note"]
                  proposed.at[idx, "human_extraction_decision"] = proposal["decision"]
                  proposed.at[idx, "human_reviewer_note"] = "PROPOSED FILL ONLY. Human must accept/edit before this can be treated as filled extraction."

                  proposal_rows.append({
                      "v4_334_extraction_id": row["v4_334_extraction_id"],
                      "parameter_or_method": parameter,
                      "proposed_human_extraction_decision": proposal["decision"],
                      "proposed_quote_present": bool(quote),
                      "proposed_candidate_value_text": proposal["value_text"],
                      "proposed_numeric_value": proposal["numeric_value"],
                      "proposal_reason": proposal["context_note"],
                      "proposal_scope": "proposal_only_not_human_accepted_not_value_approval_not_scoring",
                  })

              proposal_ledger = pd.DataFrame(proposal_rows)

              proposed["v4_338_status"] = "proposed_filled_extraction_draft_not_human_accepted"
              proposed["extraction_completed_now"] = False
              proposed["parameter_value_approved_now"] = False
              proposed["numeric_baseline_approved_now"] = False
              proposed["observed_values_loaded"] = False
              proposed["definition_match_confirmed"] = False
              proposed["score_valid"] = False
              proposed["support_allowed"] = False
              proposed["claim_boundary"] = TRUTH_BOUNDARY

              acceptance_checklist = pd.DataFrame([
                  {
                      "check_id": "V4_338_ACCEPT_001",
                      "check": "Human reviewer checks each proposed quote and edits if needed.",
                      "required_before_rerun_v4_335": True,
                  },
                  {
                      "check_id": "V4_338_ACCEPT_002",
                      "check": "Human reviewer confirms that needs_exact_quote and needs_better_source decisions remain blocked.",
                      "required_before_rerun_v4_335": True,
                  },
                  {
                      "check_id": "V4_338_ACCEPT_003",
                      "check": "Human reviewer confirms context_only_not_value rows are not treated as numeric values.",
                      "required_before_rerun_v4_335": True,
                  },
                  {
                      "check_id": "V4_338_ACCEPT_004",
                      "check": "Human reviewer confirms no parameter value is approved in this step.",
                      "required_before_rerun_v4_335": True,
                  },
                  {
                      "check_id": "V4_338_ACCEPT_005",
                      "check": "Human reviewer confirms no numeric baseline, observed scoring, or support claim is allowed.",
                      "required_before_rerun_v4_335": True,
                  },
              ])

              hard_checks = {
                  "input_v4_337_summary_found": summary337.get("version") == "v4.337",
                  "input_v4_337_rules_29_of_29": summary337.get("rules_passed") == 29 and summary337.get("rules_total") == 29,
                  "input_v4_337_external_ai_pass": summary337.get("external_ai_overall_pass") is True,
                  "input_v4_337_no_parameter_approval_found_by_external_ai": summary337.get("external_ai_found_parameter_approval") is False,
                  "input_v4_337_no_numeric_baseline_found_by_external_ai": summary337.get("external_ai_found_numeric_baseline_approval") is False,
                  "input_v4_337_no_observed_scoring_found_by_external_ai": summary337.get("external_ai_found_observed_scoring") is False,
                  "input_v4_337_no_support_claim_found_by_external_ai": summary337.get("external_ai_found_support_claim") is False,

                  "input_v4_334_summary_found": summary334.get("version") == "v4.334",
                  "input_v4_334_rules_29_of_29": summary334.get("rules_passed") == 29 and summary334.get("rules_total") == 29,
                  "input_v4_334_no_parameter_approval": summary334.get("parameter_values_approved") is False,
                  "input_v4_334_no_numeric_baseline_approval": summary334.get("numeric_baseline_values_filled") is False and summary334.get("approved_baseline_values") == 0,
                  "input_v4_334_no_observed_values_loaded": summary334.get("observed_values_loaded") is False,
                  "input_v4_334_no_score_valid": summary334.get("score_valid") is False,
                  "input_v4_334_no_support_allowed": summary334.get("support_allowed") is False,

                  "worksheet_rows_equal_6": len(worksheet) == 6,
                  "context_rows_equal_18": len(context_rows) == 18,
                  "proposal_ledger_rows_equal_6": len(proposal_ledger) == 6,
                  "proposed_template_rows_equal_6": len(proposed) == 6,
                  "proposed_quotes_filled_all_rows": proposed["human_exact_quote_selected"].apply(clean).ne("").all(),
                  "proposed_extraction_decisions_filled_all_rows": proposed["human_extraction_decision"].apply(clean).ne("").all(),
                  "proposed_status_not_human_accepted": (proposed["v4_338_status"] == "proposed_filled_extraction_draft_not_human_accepted").all(),

                  "extraction_completed_false": false_col(proposed, "extraction_completed_now"),
                  "parameter_value_approval_false": false_col(proposed, "parameter_value_approved_now"),
                  "numeric_baseline_approval_false": false_col(proposed, "numeric_baseline_approved_now"),
                  "observed_values_loaded_false": false_col(proposed, "observed_values_loaded"),
                  "definition_match_confirmed_false": false_col(proposed, "definition_match_confirmed"),
                  "score_valid_false": false_col(proposed, "score_valid"),
                  "support_allowed_false": false_col(proposed, "support_allowed"),
                  "acceptance_checklist_rows_equal_5": len(acceptance_checklist) == 5,
                  "gap_status_rows_equal_5": len(gap_status) == 5,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary338 = {
                  "version": "v4.338",
                  "route_name": "v4_338_proposed_extraction_fill_draft_no_approval_no_scoring",
                  "expected_result": "v4_338_proposed_extraction_fill_draft_no_approval_no_scoring_passed_no_claims",
                  "input_versions": "v4.337|v4.334",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "proposal_rows": int(len(proposal_ledger)),
                  "proposed_filled_rows": int(len(proposed)),
                  "human_acceptance_status": "not_accepted_proposed_fill_only",
                  "extraction_completed_rows": 0,
                  "parameter_values_approved": False,
                  "numeric_baseline_values_filled": False,
                  "approved_baseline_values": 0,
                  "observed_values_loaded": False,
                  "definition_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": TRUTH_BOUNDARY,
                  "selected_next_route": "human_accept_or_edit_v4_338_proposed_extraction_fill_then_rerun_v4_335",
              }

              proposed.to_csv(outdir / "v4_338_PROPOSED_FILLED_extraction_worksheet_NOT_HUMAN_ACCEPTED_NO_APPROVAL_NO_SCORING.csv", index=False)
              proposal_ledger.to_csv(outdir / "v4_338_proposed_extraction_fill_ledger_no_approval_no_scoring.csv", index=False)
              acceptance_checklist.to_csv(outdir / "v4_338_human_acceptance_checklist_before_rerun_v4_335.csv", index=False)
              worksheet.to_csv(outdir / "v4_338_input_blank_v4_334_worksheet_preserved.csv", index=False)
              context_rows.to_csv(outdir / "v4_338_input_v4_334_context_rows_preserved.csv", index=False)
              gap_status.to_csv(outdir / "v4_338_input_v4_334_gap_status_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_338_rule_checks.csv", index=False)

              (outdir / "v4_338_summary.json").write_text(json.dumps(summary338, indent=2))

              summary_md = f"""# TAIRID v4.338 Proposed Extraction Fill Draft — No Approval, No Scoring

          Expected result: `{summary338["expected_result"]}`

          {summary338["rules_passed"]} / {summary338["rules_total"]} rules passed

          failed_gates = {summary338["failed_gates"]}

          proposal_rows = {summary338["proposal_rows"]}

          proposed_filled_rows = {summary338["proposed_filled_rows"]}

          human_acceptance_status = `{summary338["human_acceptance_status"]}`

          Truth boundary: {TRUTH_BOUNDARY}.

          This packet creates a proposed filled extraction worksheet from existing source context.

          It does **not** approve parameter values.

          It does **not** approve a numeric baseline.

          It does **not** load observed SDSS RSD values.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{summary338["selected_next_route"]}`
          """
              (outdir / "v4_338_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary338, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_338_proposed_extraction_fill_draft_no_approval.py

      - name: Run v4.338 proposed extraction fill draft no approval
        run: |
          python run_v4_338_proposed_extraction_fill_draft_no_approval.py

      - name: Upload v4.338 proposed extraction fill draft artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-338-proposed-extraction-fill-draft-no-approval-no-scoring-output
          path: |
            tairid_v4_338_proposed_extraction_fill_draft_no_approval_output/
            tairid_v4_338_proposed_extraction_fill_draft_no_approval_output.zip
