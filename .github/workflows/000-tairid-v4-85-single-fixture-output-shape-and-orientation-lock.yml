name: 000 TAIRID v4.85 Single Fixture Output Shape and Orientation Lock

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-85-single-fixture-output-shape-and-orientation-lock.yml"

jobs:
  tairid-v4-85-single-fixture-output-shape-and-orientation-lock:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.85 single fixture output shape and orientation lock
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_85_single_fixture_output_shape_and_orientation_lock

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_85_single_fixture_output_shape_and_orientation_lock")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_85_single_fixture_output_shape_and_orientation_lock"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not run CAMB again.",
              "This uses v4.84.3 CAMB diagnostic output only to lock array orientation.",
              "This does not run a formal residual audit.",
              "This does not run likelihood, BIC, posterior comparison, or model selection.",
              "A pass means the single-fixture CAMB output orientation is locked for the next residual-audit test only."
          ]

          UPSTREAM_LOCKS = {
              "v4_84_3_camb_external_runner_json_decode_repair": {
                  "readiness_label": "CAMB_external_runner_JSON_decode_repair_passed_complete_arrays_ready_for_output_shape_and_orientation_lock",
                  "json_decode_repair_ok": True,
                  "numpy_imported": True,
                  "CAMB_imported": True,
                  "CAMB_version": "1.6.6",
                  "any_variant_complete_arrays": True,
                  "successful_variant_count": 3,
                  "orientation_preview_record_count": 30,
                  "formal_residual_audit_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_83_camb_tiny_single_fixture_mapping_contract": {
                  "readiness_label": "CAMB_tiny_single_fixture_mapping_contract_passed_ready_for_CAMB_tiny_single_fixture_smoke_run",
                  "mapping_contract_complete": True,
                  "theta_mapping": "theta_100theta_MC_divided_by_100_to_cosmomc_theta",
                  "logA_mapping": "As_equals_exp_logA_divided_by_1e10",
                  "Planck_reference_uncertainty_computed": False
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015", "sigma8_expected": 0.7498653, "fsigma8_expected": 0.4605277},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038", "sigma8_expected": 0.6642308, "fsigma8_expected": 0.4779339},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051", "sigma8_expected": 0.6214160, "fsigma8_expected": 0.4760216},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061", "sigma8_expected": 0.5911708, "fsigma8_expected": 0.4706936},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233", "sigma8_expected": 0.3069371, "fsigma8_expected": 0.2979012}
          ]

          VARIANT_OUTPUTS = [
              {
                  "variant_label": "theta_h0_none_contract_path",
                  "mode": "theta_h0_none",
                  "contract_status": "primary_contract_variant",
                  "H0_recorded": 67.30972606865629,
                  "sigma8_values_raw": [
                      0.3068045954517764,
                      0.5909378779961363,
                      0.6211751606614864,
                      0.6639799628833019,
                      0.7495989721910329
                  ],
                  "fsigma8_values_raw": [
                      0.2977780575384886,
                      0.4705641528815541,
                      0.47590135681241275,
                      0.4778291680623743,
                      0.4604599600097336
                  ]
              },
              {
                  "variant_label": "theta_h0_omitted_api_probe",
                  "mode": "theta_h0_omitted",
                  "contract_status": "api_probe_variant_same_output_as_contract",
                  "H0_recorded": 67.30972606865629,
                  "sigma8_values_raw": [
                      0.3068045954517764,
                      0.5909378779961363,
                      0.6211751606614864,
                      0.6639799628833019,
                      0.7495989721910329
                  ],
                  "fsigma8_values_raw": [
                      0.2977780575384886,
                      0.4705641528815541,
                      0.47590135681241275,
                      0.4778291680623743,
                      0.4604599600097336
                  ]
              },
              {
                  "variant_label": "diagnostic_h0_fixed_not_fixture_acceptance",
                  "mode": "diagnostic_h0_fixed_not_fixture_acceptance",
                  "contract_status": "diagnostic_only_not_primary_contract",
                  "H0_recorded": 67.36,
                  "sigma8_values_raw": [
                      0.3069573914399199,
                      0.5911573530644346,
                      0.6213922745402172,
                      0.6641896519845842,
                      0.7497784312768103
                  ],
                  "fsigma8_values_raw": [
                      0.2979066915276311,
                      0.47054527971587906,
                      0.475845924168575,
                      0.4777187265744269,
                      0.4602400795604781
                  ]
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The orientation lock validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The single fixture orientation lock is a full residual audit.",
              "The single fixture orientation lock is Planck reference uncertainty.",
              "The diagnostic H0-fixed variant is the accepted fixture path."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_86_single_fixture_residual_audit",
                  "purpose": "Use the locked reversed orientation to compare the primary CAMB point fixture against the .minimum sidecar point targets.",
                  "why_next": "Residuals require known CAMB output ordering."
              },
              {
                  "priority": 2,
                  "route_id": "v4_87_reference_uncertainty_chain_sample_design",
                  "purpose": "Design the posterior-sample path after the one-point fixture residual audit.",
                  "why_next": "A single point fixture is not Planck reference uncertainty."
              },
              {
                  "priority": 3,
                  "route_id": "v4_88_chain_sample_tiny_subset_parser_probe",
                  "purpose": "Probe a tiny bounded subset of chain sample rows only after point fixture logic is stable.",
                  "why_next": "Reference uncertainty needs posterior samples, not .minimum sidecar points."
              },
              {
                  "priority": 4,
                  "route_id": "v4_89_ELG_or_WiggleZ_parallel_backlog",
                  "purpose": "Parallel route for parked growth-family incompleteness.",
                  "why_next": "ELG and WiggleZ remain incomplete."
              }
          ]

          failed_gates = []
          warnings = [
              "orientation_lock_only",
              "uses_v4_84_3_outputs_without_rerunning_CAMB",
              "no_formal_residual_audit",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def finite_positive_list(values, expected_len):
              return (
                  isinstance(values, list)
                  and len(values) == expected_len
                  and all(math.isfinite(float(x)) and float(x) > 0 for x in values)
              )

          def build_orientation_rows(variant, orientation, sigma_values, fsigma_values):
              rows = []
              for index, zrow in enumerate(TARGET_REDSHIFTS):
                  sigma_value = float(sigma_values[index])
                  fsigma_value = float(fsigma_values[index])
                  sigma_expected = float(zrow["sigma8_expected"])
                  fsigma_expected = float(zrow["fsigma8_expected"])
                  rows.append({
                      "variant_label": variant["variant_label"],
                      "mode": variant["mode"],
                      "contract_status": variant["contract_status"],
                      "orientation": orientation,
                      "index": index,
                      "z": zrow["z"],
                      "sigma8z_name": zrow["sigma8z_name"],
                      "sigma8_camb_oriented": sigma_value,
                      "sigma8_expected_sidecar": sigma_expected,
                      "sigma8_delta_preview": sigma_value - sigma_expected,
                      "fsigma8_name": zrow["fsigma8_name"],
                      "fsigma8_camb_oriented": fsigma_value,
                      "fsigma8_expected_sidecar": fsigma_expected,
                      "fsigma8_delta_preview": fsigma_value - fsigma_expected,
                      "comparison_status": "orientation_lock_metric_only_not_formal_residual_audit"
                  })
              return rows

          def rms_for_rows(rows):
              vals = []
              for row in rows:
                  vals.append(float(row["sigma8_delta_preview"]))
                  vals.append(float(row["fsigma8_delta_preview"]))
              return math.sqrt(sum(v * v for v in vals) / len(vals)) if vals else float("inf")

          def max_abs_for_rows(rows):
              vals = []
              for row in rows:
                  vals.append(abs(float(row["sigma8_delta_preview"])))
                  vals.append(abs(float(row["fsigma8_delta_preview"])))
              return max(vals) if vals else float("inf")

          shape_records = []
          orientation_records = []
          orientation_summary_records = []
          variant_lock_records = []

          for variant in VARIANT_OUTPUTS:
              sigma_raw = variant["sigma8_values_raw"]
              fsigma_raw = variant["fsigma8_values_raw"]

              sigma_shape_ok = finite_positive_list(sigma_raw, len(TARGET_REDSHIFTS))
              fsigma_shape_ok = finite_positive_list(fsigma_raw, len(TARGET_REDSHIFTS))

              shape_records.append({
                  "variant_label": variant["variant_label"],
                  "mode": variant["mode"],
                  "contract_status": variant["contract_status"],
                  "sigma8_len": len(sigma_raw),
                  "fsigma8_len": len(fsigma_raw),
                  "sigma8_positive_finite": sigma_shape_ok,
                  "fsigma8_positive_finite": fsigma_shape_ok,
                  "shape_pass": sigma_shape_ok and fsigma_shape_ok
              })

              if not (sigma_shape_ok and fsigma_shape_ok):
                  continue

              direct_rows = build_orientation_rows(
                  variant,
                  "direct_raw_order",
                  sigma_raw,
                  fsigma_raw
              )
              reversed_rows = build_orientation_rows(
                  variant,
                  "reversed_raw_order",
                  list(reversed(sigma_raw)),
                  list(reversed(fsigma_raw))
              )

              orientation_records.extend(direct_rows)
              orientation_records.extend(reversed_rows)

              direct_rms = rms_for_rows(direct_rows)
              reversed_rms = rms_for_rows(reversed_rows)
              direct_max_abs = max_abs_for_rows(direct_rows)
              reversed_max_abs = max_abs_for_rows(reversed_rows)

              best_orientation = "direct_raw_order" if direct_rms <= reversed_rms else "reversed_raw_order"
              ratio = direct_rms / reversed_rms if reversed_rms > 0 else float("inf")

              orientation_summary_records.append({
                  "variant_label": variant["variant_label"],
                  "mode": variant["mode"],
                  "contract_status": variant["contract_status"],
                  "direct_rms_preview": direct_rms,
                  "reversed_rms_preview": reversed_rms,
                  "direct_max_abs_preview": direct_max_abs,
                  "reversed_max_abs_preview": reversed_max_abs,
                  "best_orientation": best_orientation,
                  "direct_to_reversed_rms_ratio": ratio,
                  "status": "orientation_metric_only_not_formal_residual_audit"
              })

              variant_lock_records.append({
                  "variant_label": variant["variant_label"],
                  "mode": variant["mode"],
                  "contract_status": variant["contract_status"],
                  "locked_orientation": best_orientation,
                  "orientation_lock_pass": best_orientation == "reversed_raw_order" and ratio > 100.0,
                  "rms_preview_locked_orientation": reversed_rms if best_orientation == "reversed_raw_order" else direct_rms,
                  "max_abs_preview_locked_orientation": reversed_max_abs if best_orientation == "reversed_raw_order" else direct_max_abs,
                  "accept_as_residual_audit": False
              })

          primary_lock = next(
              (row for row in variant_lock_records if row["variant_label"] == "theta_h0_none_contract_path"),
              {}
          )

          primary_summary = next(
              (row for row in orientation_summary_records if row["variant_label"] == "theta_h0_none_contract_path"),
              {}
          )

          all_shapes_pass = all(row["shape_pass"] for row in shape_records) and len(shape_records) == 3
          all_variants_reversed = (
              len(variant_lock_records) == 3
              and all(row["locked_orientation"] == "reversed_raw_order" for row in variant_lock_records)
          )
          primary_reversed = primary_lock.get("locked_orientation") == "reversed_raw_order"
          primary_orientation_margin_ok = float(primary_summary.get("direct_to_reversed_rms_ratio", 0.0)) > 100.0
          primary_locked_rms_small = float(primary_lock.get("rms_preview_locked_orientation", 1.0)) < 0.001
          primary_locked_max_abs_small = float(primary_lock.get("max_abs_preview_locked_orientation", 1.0)) < 0.001

          ORIENTATION_LOCK = {
              "locked_orientation": "reversed_raw_order" if primary_reversed else "unlocked",
              "raw_CAMB_order_interpretation": "CAMB get_sigma8/get_fsigma8 returned values in descending redshift order relative to the ascending target list.",
              "target_redshift_order": [row["z"] for row in TARGET_REDSHIFTS],
              "raw_return_order_interpreted_as": list(reversed([row["z"] for row in TARGET_REDSHIFTS])) if primary_reversed else [],
              "primary_variant": "theta_h0_none_contract_path",
              "primary_direct_rms_preview": primary_summary.get("direct_rms_preview", ""),
              "primary_reversed_rms_preview": primary_summary.get("reversed_rms_preview", ""),
              "primary_direct_to_reversed_rms_ratio": primary_summary.get("direct_to_reversed_rms_ratio", ""),
              "primary_reversed_max_abs_preview": primary_summary.get("reversed_max_abs_preview", ""),
              "orientation_locked_for_next_test": primary_reversed and primary_orientation_margin_ok and primary_locked_rms_small,
              "formal_residual_audit_run": False,
              "Planck_reference_uncertainty_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False
          }

          if not UPSTREAM_LOCKS["v4_84_3_camb_external_runner_json_decode_repair"]["any_variant_complete_arrays"]:
              failed_gates.append("upstream_complete_arrays_not_carried")

          if not all_shapes_pass:
              failed_gates.append("not_all_variant_shapes_passed")

          if len(orientation_records) != 30:
              failed_gates.append("orientation_record_count_not_30")

          if len(orientation_summary_records) != 3:
              failed_gates.append("orientation_summary_count_not_3")

          if len(variant_lock_records) != 3:
              failed_gates.append("variant_lock_record_count_not_3")

          if not all_variants_reversed:
              failed_gates.append("not_all_variants_lock_to_reversed_raw_order")

          if not primary_reversed:
              failed_gates.append("primary_contract_variant_not_reversed_raw_order")

          if not primary_orientation_margin_ok:
              failed_gates.append("primary_orientation_margin_not_strong")

          if not primary_locked_rms_small:
              failed_gates.append("primary_reversed_rms_not_small")

          if not primary_locked_max_abs_small:
              failed_gates.append("primary_reversed_max_abs_not_small")

          if ORIENTATION_LOCK["formal_residual_audit_run"] is not False:
              failed_gates.append("formal_residual_audit_marked_run_too_early")

          if ORIENTATION_LOCK["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("reference_uncertainty_computed_too_early")

          if ORIENTATION_LOCK["final_RSD_pressure_score_computed"] is not False:
              failed_gates.append("final_RSD_pressure_computed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "validates tairid cosmology",
              "diagnostic h0-fixed variant is the accepted fixture path",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "single_fixture_output_shape_and_orientation_lock_passed_ready_for_single_fixture_residual_audit"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_v4_84_3_outputs_carried",
                  "pass": UPSTREAM_LOCKS["v4_84_3_camb_external_runner_json_decode_repair"]["any_variant_complete_arrays"] is True,
                  "result": "v4.84.3 produced complete CAMB arrays",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "output_shapes_valid",
                  "pass": all_shapes_pass,
                  "result": f"{sum(1 for row in shape_records if row['shape_pass'])} of {len(shape_records)} variants have 5 sigma8 and 5 fsigma8 values",
                  "boundary": "Shape lock only."
              },
              {
                  "rule_id": "orientation_records_written",
                  "pass": len(orientation_records) == 30,
                  "result": f"{len(orientation_records)} orientation records written",
                  "boundary": "Orientation metric only."
              },
              {
                  "rule_id": "all_variants_lock_reversed",
                  "pass": all_variants_reversed,
                  "result": "all complete variants lock to reversed_raw_order",
                  "boundary": "No formal residual audit."
              },
              {
                  "rule_id": "primary_contract_orientation_locked",
                  "pass": primary_reversed and primary_orientation_margin_ok,
                  "result": f"primary best={primary_lock.get('locked_orientation', '')}; ratio={primary_summary.get('direct_to_reversed_rms_ratio', '')}",
                  "boundary": "Primary contract path only."
              },
              {
                  "rule_id": "locked_orientation_tight_preview",
                  "pass": primary_locked_rms_small and primary_locked_max_abs_small,
                  "result": f"primary reversed RMS={primary_lock.get('rms_preview_locked_orientation', '')}; max_abs={primary_lock.get('max_abs_preview_locked_orientation', '')}",
                  "boundary": "Preview threshold only, not final pressure."
              },
              {
                  "rule_id": "diagnostic_h0_fixed_not_accepted_as_primary",
                  "pass": True,
                  "result": "diagnostic_h0_fixed variant remains diagnostic only",
                  "boundary": "Accepted primary path is theta_h0_none_contract_path."
              },
              {
                  "rule_id": "no_formal_residual_audit",
                  "pass": ORIENTATION_LOCK["formal_residual_audit_run"] is False,
                  "result": "formal residual audit not run",
                  "boundary": "Orientation lock only."
              },
              {
                  "rule_id": "reference_uncertainty_still_blocked",
                  "pass": ORIENTATION_LOCK["Planck_reference_uncertainty_computed"] is False,
                  "result": "Planck reference uncertainty not computed",
                  "boundary": "No posterior covariance."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 13,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_85_rules_passed")

          if failed_gates:
              readiness_label = "single_fixture_output_shape_and_orientation_lock_failed"
              next_allowed_step = "Repair output shape/orientation lock before any residual audit."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.86 single fixture residual audit using locked reversed_raw_order. "
                  "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_v4_84_3_complete_arrays": True,
              "variant_count": len(VARIANT_OUTPUTS),
              "shape_record_count": len(shape_records),
              "all_shapes_pass": all_shapes_pass,
              "orientation_record_count": len(orientation_records),
              "orientation_summary_count": len(orientation_summary_records),
              "variant_lock_record_count": len(variant_lock_records),
              "all_variants_reversed": all_variants_reversed,
              "primary_variant": "theta_h0_none_contract_path",
              "locked_orientation": ORIENTATION_LOCK["locked_orientation"],
              "primary_direct_rms_preview": ORIENTATION_LOCK["primary_direct_rms_preview"],
              "primary_reversed_rms_preview": ORIENTATION_LOCK["primary_reversed_rms_preview"],
              "primary_direct_to_reversed_rms_ratio": ORIENTATION_LOCK["primary_direct_to_reversed_rms_ratio"],
              "primary_reversed_max_abs_preview": ORIENTATION_LOCK["primary_reversed_max_abs_preview"],
              "orientation_locked_for_next_test": ORIENTATION_LOCK["orientation_locked_for_next_test"],
              "formal_residual_audit_run": False,
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "target_redshifts": TARGET_REDSHIFTS,
              "variant_outputs": VARIANT_OUTPUTS,
              "shape_records": shape_records,
              "orientation_records": orientation_records,
              "orientation_summary_records": orientation_summary_records,
              "variant_lock_records": variant_lock_records,
              "orientation_lock": ORIENTATION_LOCK,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "locked_orientation": ORIENTATION_LOCK["locked_orientation"],
                  "orientation_locked_for_next_test": ORIENTATION_LOCK["orientation_locked_for_next_test"],
                  "formal_residual_audit_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_85_single_fixture_output_shape_and_orientation_lock.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "shape_records_v4_85.csv",
              shape_records,
              [
                  "variant_label",
                  "mode",
                  "contract_status",
                  "sigma8_len",
                  "fsigma8_len",
                  "sigma8_positive_finite",
                  "fsigma8_positive_finite",
                  "shape_pass"
              ]
          )

          write_csv(
              OUTDIR / "orientation_records_v4_85.csv",
              orientation_records,
              [
                  "variant_label",
                  "mode",
                  "contract_status",
                  "orientation",
                  "index",
                  "z",
                  "sigma8z_name",
                  "sigma8_camb_oriented",
                  "sigma8_expected_sidecar",
                  "sigma8_delta_preview",
                  "fsigma8_name",
                  "fsigma8_camb_oriented",
                  "fsigma8_expected_sidecar",
                  "fsigma8_delta_preview",
                  "comparison_status"
              ]
          )

          write_csv(
              OUTDIR / "orientation_summary_records_v4_85.csv",
              orientation_summary_records,
              [
                  "variant_label",
                  "mode",
                  "contract_status",
                  "direct_rms_preview",
                  "reversed_rms_preview",
                  "direct_max_abs_preview",
                  "reversed_max_abs_preview",
                  "best_orientation",
                  "direct_to_reversed_rms_ratio",
                  "status"
              ]
          )

          write_csv(
              OUTDIR / "variant_lock_records_v4_85.csv",
              variant_lock_records,
              [
                  "variant_label",
                  "mode",
                  "contract_status",
                  "locked_orientation",
                  "orientation_lock_pass",
                  "rms_preview_locked_orientation",
                  "max_abs_preview_locked_orientation",
                  "accept_as_residual_audit"
              ]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_85.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_85.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_85.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.85 — Single Fixture Output Shape and Orientation Lock")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.84.3 produced valid CAMB sigma8 and fsigma8 arrays. This workflow locks the output orientation.")
          md.append("")
          md.append("The CAMB raw array order is reversed relative to the target redshift list. The locked orientation for the next test is `reversed_raw_order`.")
          md.append("")
          md.append("This does not compute Planck reference uncertainty, final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## Orientation lock")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in ORIENTATION_LOCK.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Orientation summary")
          md.append("")
          md.append("| Variant | Direct RMS | Reversed RMS | Best orientation |")
          md.append("|---|---:|---:|---|")
          for row in orientation_summary_records:
              md.append(
                  f"| `{row['variant_label']}` | `{row['direct_rms_preview']}` | `{row['reversed_rms_preview']}` | `{row['best_orientation']}` |"
              )
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_85_single_fixture_output_shape_and_orientation_lock.json",
              "tairid_v4_85_single_fixture_output_shape_and_orientation_lock.md",
              "shape_records_v4_85.csv",
              "orientation_records_v4_85.csv",
              "orientation_summary_records_v4_85.csv",
              "variant_lock_records_v4_85.csv",
              "blocked_claims_v4_85.csv",
              "next_route_options_v4_85.csv",
              "rule_results_v4_85.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_85_single_fixture_output_shape_and_orientation_lock.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

