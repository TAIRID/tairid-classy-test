name: 000 TAIRID v4.65.1 Paramnames Primary Column Boundary Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-65-1-paramnames-primary-column-boundary-audit.yml"

jobs:
  tairid-v4-65-1-paramnames-primary-column-boundary-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.65.1 paramnames primary column boundary audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_65_1_paramnames_primary_column_boundary_audit

          python - <<'PY'
          import csv
          import json
          import re
          import struct
          import urllib.request
          import hashlib
          import zlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_65_1_paramnames_primary_column_boundary_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_65_1_paramnames_primary_column_boundary_audit"

          FULL_GRID_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip"

          # Locked from v4.57 successful ZIP64 central-directory probe.
          FULLGRID_CONTENT_LENGTH_EXPECTED = 11805855817
          ZIP64_CENTRAL_DIRECTORY_OFFSET = 11803187830
          ZIP64_CENTRAL_DIRECTORY_SIZE = 2667889

          MAX_RANGE_READ_BYTES = 5_000_000
          MAX_PARAMNAMES_COMPRESSED_BYTES = 50_000
          MAX_SELECTED_PARAMNAMES = 80

          SELECTED_PREFIXES = [
              "base/plikHM_TTTEEE_lowl_lowE/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing/",
              "base/plikHM_TT_lowl_lowE/",
              "base/plikHM_TT_lowl_lowE_lensing/",
              "base/plikHM_TTTEEE_lowl_lowE_BAO/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing_BAO/"
          ]

          SIMPLE_DERIVED_ROUTE_INPUTS = [
              "omegam",
              "sigma8"
          ]

          PRIMARY_DENSITY_ROUTE_INPUTS = [
              "omegabh2",
              "omegach2"
          ]

          H0_LIKE_INPUTS = [
              "H0",
              "Hubble",
              "theta",
              "theta_MC",
              "theta_MC_100",
              "cosmomc_theta"
          ]

          OPTIONAL_CONTEXT_INPUTS = [
              "S8",
              "omegal",
              "omegak",
              "logA",
              "A",
              "ns",
              "tau"
          ]

          BLOCKED_DIRECT_INPUTS = [
              "fsigma8z015",
              "fsigma8z038",
              "fsigma8z051",
              "fsigma8z061",
              "fsigma8z233"
          ]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import Planck chains.",
              "This does not parse chain sample rows.",
              "This does not compute Planck reference uncertainty.",
              "This only reads bounded byte ranges for selected small .paramnames files.",
              "This audits whether the future parser has direct omegam/sigma8 columns or only primary cosmological columns.",
              "A pass means the column boundary is documented, not that uncertainty is computed."
          ]

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }

              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={
                          "User-Agent": "TAIRID-v4.65.1-primary-column-boundary/1.0",
                          "Accept": "*/*"
                      }
                  )

                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }

              data = b""

              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.65.1-primary-column-boundary/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )

                  with urllib.request.urlopen(req, timeout=180) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)

                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record, data

          def classify_member(name):
              lower = name.lower()

              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".paramnames"):
                  return "paramnames"
              if re.search(r"_\d+\.txt$", name):
                  return "chain_sample_text_member_not_read"
              if lower.endswith(".minimum"):
                  return "minimum"
              if lower.endswith(".bestfit"):
                  return "bestfit"
              if lower.endswith(".likestats"):
                  return "likestats"
              if lower.endswith(".ranges"):
                  return "ranges"
              if lower.endswith(".converge"):
                  return "converge"
              if lower.endswith(".txt"):
                  return "other_text_not_read"
              if lower.endswith(".pdf"):
                  return "pdf_not_read"
              return "other"

          def parse_zip64_extra(extra_bytes, need_uncompressed, need_compressed, need_local_offset):
              result = {}
              pos = 0

              while pos + 4 <= len(extra_bytes):
                  header_id, data_size = struct.unpack_from("<HH", extra_bytes, pos)
                  data_start = pos + 4
                  data_end = data_start + data_size

                  if data_end > len(extra_bytes):
                      break

                  data = extra_bytes[data_start:data_end]

                  if header_id == 0x0001:
                      subpos = 0

                      if need_uncompressed and subpos + 8 <= len(data):
                          result["uncompressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8

                      if need_compressed and subpos + 8 <= len(data):
                          result["compressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8

                      if need_local_offset and subpos + 8 <= len(data):
                          result["local_header_offset"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8

                  pos = data_end

              return result

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0

              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break

                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)

                      compression_method = fields[4]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      extra_start = name_end
                      extra_end = extra_start + extra_len
                      comment_end = extra_end + comment_len

                      if comment_end > len(cd_bytes):
                          break

                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")
                      extra = cd_bytes[extra_start:extra_end]

                      zip64_extra = parse_zip64_extra(
                          extra,
                          need_uncompressed=uncompressed_size == 0xFFFFFFFF,
                          need_compressed=compressed_size == 0xFFFFFFFF,
                          need_local_offset=local_header_offset == 0xFFFFFFFF
                      )

                      true_compressed_size = zip64_extra.get("compressed_size", compressed_size)
                      true_uncompressed_size = zip64_extra.get("uncompressed_size", uncompressed_size)
                      true_local_header_offset = zip64_extra.get("local_header_offset", local_header_offset)

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compression_method": compression_method,
                          "compressed_size": true_compressed_size,
                          "uncompressed_size": true_uncompressed_size,
                          "local_header_offset": true_local_header_offset,
                          "zip64_extra_used": bool(zip64_extra)
                      })

                      pos = comment_end

                  except Exception:
                      break

              return records

          def selected_paramnames_from_manifest(manifest_records):
              selected = []

              for row in manifest_records:
                  name = row["member_name"]

                  if row["member_type"] != "paramnames":
                      continue

                  if any(name.startswith(prefix) for prefix in SELECTED_PREFIXES):
                      selected.append(row)

              selected = sorted(selected, key=lambda row: row["member_name"])
              return selected[:MAX_SELECTED_PARAMNAMES]

          def fetch_member_bytes(member_record):
              offset = int(member_record["local_header_offset"])
              compressed_size = int(member_record["compressed_size"])

              if compressed_size <= 0:
                  raise RuntimeError("compressed_size_not_positive")

              if compressed_size > MAX_PARAMNAMES_COMPRESSED_BYTES:
                  raise RuntimeError("paramnames_member_too_large_for_guarded_fetch")

              header_record, header_data = range_probe(
                  "local_header_probe",
                  FULL_GRID_URL,
                  f"bytes={offset}-{offset + 4095}",
                  4096
              )

              if not header_record["ok"] or not header_record["server_honored_range"]:
                  raise RuntimeError("local_header_range_not_available")

              if len(header_data) < 30:
                  raise RuntimeError("local_header_too_short")

              if header_data[:4] != b"PK\x03\x04":
                  raise RuntimeError("local_header_signature_not_found")

              fields = struct.unpack_from("<4s5H3L2H", header_data, 0)

              compression_method = fields[3]
              file_name_len = fields[9]
              extra_len = fields[10]

              data_start = offset + 30 + file_name_len + extra_len
              data_end = data_start + compressed_size - 1

              data_record, compressed_data = range_probe(
                  "member_payload_probe",
                  FULL_GRID_URL,
                  f"bytes={data_start}-{data_end}",
                  compressed_size + 1024
              )

              if not data_record["ok"] or not data_record["server_honored_range"]:
                  raise RuntimeError("member_payload_range_not_available")

              if data_record["truncated_by_guard"]:
                  raise RuntimeError("member_payload_truncated_by_guard")

              if len(compressed_data) != compressed_size:
                  raise RuntimeError(f"member_payload_size_mismatch_expected_{compressed_size}_got_{len(compressed_data)}")

              if compression_method == 0:
                  return compressed_data, compression_method

              if compression_method == 8:
                  return zlib.decompress(compressed_data, -15), compression_method

              raise RuntimeError(f"unsupported_compression_method_{compression_method}")

          def root_from_paramnames(name):
              if name.endswith(".paramnames"):
                  return name[:-len(".paramnames")]
              return name

          def parse_paramnames_text(text):
              rows = []
              names = []

              for raw_line in text.splitlines():
                  line = raw_line.strip()

                  if not line or line.startswith("#"):
                      continue

                  parts = line.split(None, 1)
                  name = parts[0]
                  label = parts[1] if len(parts) > 1 else ""

                  rows.append({
                      "name": name,
                      "label": label
                  })
                  names.append(name)

              return rows, names

          def build_column_map(param_rows):
              column_map = []

              for param_index, row in enumerate(param_rows):
                  # CosmoMC-style chains normally use:
                  # column 0 = sample weight
                  # column 1 = minus loglike / likelihood diagnostic
                  # parameter columns begin at zero-based chain column 2.
                  zero_based_chain_column = param_index + 2
                  one_based_chain_column = zero_based_chain_column + 1

                  column_map.append({
                      "parameter_name": row["name"],
                      "parameter_label": row["label"],
                      "paramnames_index_zero_based": param_index,
                      "chain_column_zero_based": zero_based_chain_column,
                      "chain_column_one_based": one_based_chain_column
                  })

              return column_map

          failed_gates = []
          warnings = [
              "primary_column_boundary_audit_only",
              "v4_65_simple_omegam_sigma8_route_failed_useful_negative_result",
              "full_grid_not_downloaded",
              "chain_sample_rows_not_read",
              "reference_uncertainty_not_computed",
              "final_RSD_pressure_not_computed",
              "not_validation"
          ]

          head_record = head_probe("full_grid_head", FULL_GRID_URL)

          if not head_record["ok"]:
              failed_gates.append("full_grid_head_probe_failed")

          if head_record.get("content_length") and head_record["content_length"] != FULLGRID_CONTENT_LENGTH_EXPECTED:
              warnings.append("fullgrid_content_length_differs_from_v4_57_locked_value")

          cd_start = ZIP64_CENTRAL_DIRECTORY_OFFSET
          cd_end = ZIP64_CENTRAL_DIRECTORY_OFFSET + ZIP64_CENTRAL_DIRECTORY_SIZE - 1

          cd_record, cd_data = range_probe(
              "full_grid_locked_zip64_central_directory_fetch",
              FULL_GRID_URL,
              f"bytes={cd_start}-{cd_end}",
              MAX_RANGE_READ_BYTES
          )

          if not cd_record["ok"]:
              failed_gates.append("central_directory_fetch_failed")

          if not cd_record.get("server_honored_range"):
              failed_gates.append("central_directory_range_not_honored")

          if cd_record.get("truncated_by_guard"):
              failed_gates.append("central_directory_truncated_by_guard")

          manifest_records = parse_central_directory(cd_data) if cd_data else []

          if not manifest_records:
              failed_gates.append("central_directory_manifest_records_not_parsed")

          selected_paramnames = selected_paramnames_from_manifest(manifest_records)

          if not selected_paramnames:
              failed_gates.append("no_selected_paramnames_from_manifest")

          extraction_records = []
          column_map_records = []
          root_summary_records = []

          roots_with_simple_route_inputs = []
          roots_with_primary_density_inputs = []
          roots_with_h0_like_inputs = []
          roots_with_blocked_direct_inputs = []

          for member in selected_paramnames:
              member_name = member["member_name"]
              root = root_from_paramnames(member_name)

              extraction_record = {
                  "member_name": member_name,
                  "root": root,
                  "compressed_size": member["compressed_size"],
                  "uncompressed_size": member["uncompressed_size"],
                  "local_header_offset": member["local_header_offset"],
                  "extraction_ok": False,
                  "parameter_count": 0,
                  "simple_route_inputs_found": "",
                  "simple_route_inputs_missing": "",
                  "primary_density_inputs_found": "",
                  "primary_density_inputs_missing": "",
                  "h0_like_inputs_found": "",
                  "optional_context_inputs_found": "",
                  "blocked_direct_inputs_found": "",
                  "error": ""
              }

              try:
                  payload, method = fetch_member_bytes(member)
                  text = payload.decode("utf-8", errors="replace")

                  param_rows, param_names = parse_paramnames_text(text)
                  column_map = build_column_map(param_rows)

                  names_set = set(param_names)

                  simple_found = [name for name in SIMPLE_DERIVED_ROUTE_INPUTS if name in names_set]
                  simple_missing = [name for name in SIMPLE_DERIVED_ROUTE_INPUTS if name not in names_set]

                  primary_found = [name for name in PRIMARY_DENSITY_ROUTE_INPUTS if name in names_set]
                  primary_missing = [name for name in PRIMARY_DENSITY_ROUTE_INPUTS if name not in names_set]

                  h0_like_found = [name for name in H0_LIKE_INPUTS if name in names_set]
                  optional_found = [name for name in OPTIONAL_CONTEXT_INPUTS if name in names_set]
                  blocked_found = [name for name in BLOCKED_DIRECT_INPUTS if name in names_set]

                  if not simple_missing:
                      roots_with_simple_route_inputs.append(root)

                  if not primary_missing:
                      roots_with_primary_density_inputs.append(root)

                  if h0_like_found:
                      roots_with_h0_like_inputs.append(root)

                  if blocked_found:
                      roots_with_blocked_direct_inputs.append(root)

                  extraction_record["extraction_ok"] = True
                  extraction_record["compression_method"] = method
                  extraction_record["parameter_count"] = len(param_rows)
                  extraction_record["simple_route_inputs_found"] = ", ".join(simple_found)
                  extraction_record["simple_route_inputs_missing"] = ", ".join(simple_missing)
                  extraction_record["primary_density_inputs_found"] = ", ".join(primary_found)
                  extraction_record["primary_density_inputs_missing"] = ", ".join(primary_missing)
                  extraction_record["h0_like_inputs_found"] = ", ".join(h0_like_found)
                  extraction_record["optional_context_inputs_found"] = ", ".join(optional_found)
                  extraction_record["blocked_direct_inputs_found"] = ", ".join(blocked_found)

                  root_summary_records.append({
                      "root": root,
                      "member_name": member_name,
                      "parameter_count": len(param_rows),
                      "simple_route_inputs_found": ", ".join(simple_found),
                      "simple_route_inputs_missing": ", ".join(simple_missing),
                      "primary_density_inputs_found": ", ".join(primary_found),
                      "primary_density_inputs_missing": ", ".join(primary_missing),
                      "h0_like_inputs_found": ", ".join(h0_like_found),
                      "optional_context_inputs_found": ", ".join(optional_found),
                      "blocked_direct_inputs_found": ", ".join(blocked_found),
                      "has_simple_omegam_sigma8_route": not simple_missing,
                      "has_primary_density_route": not primary_missing,
                      "has_h0_like_input": bool(h0_like_found),
                      "has_blocked_direct_fsigma8_inputs": bool(blocked_found)
                  })

                  tracked_inputs = (
                      SIMPLE_DERIVED_ROUTE_INPUTS
                      + PRIMARY_DENSITY_ROUTE_INPUTS
                      + H0_LIKE_INPUTS
                      + OPTIONAL_CONTEXT_INPUTS
                      + BLOCKED_DIRECT_INPUTS
                  )

                  for row in column_map:
                      if row["parameter_name"] in tracked_inputs:
                          if row["parameter_name"] in SIMPLE_DERIVED_ROUTE_INPUTS:
                              role = "simple_derived_route_candidate"
                          elif row["parameter_name"] in PRIMARY_DENSITY_ROUTE_INPUTS:
                              role = "primary_density_route_candidate"
                          elif row["parameter_name"] in H0_LIKE_INPUTS:
                              role = "h0_like_route_candidate"
                          elif row["parameter_name"] in BLOCKED_DIRECT_INPUTS:
                              role = "blocked_direct_fsigma8_column"
                          else:
                              role = "optional_context"

                          column_map_records.append({
                              "root": root,
                              "member_name": member_name,
                              "parameter_name": row["parameter_name"],
                              "parameter_label": row["parameter_label"],
                              "paramnames_index_zero_based": row["paramnames_index_zero_based"],
                              "chain_column_zero_based": row["chain_column_zero_based"],
                              "chain_column_one_based": row["chain_column_one_based"],
                              "role": role
                          })

              except Exception as exc:
                  extraction_record["error"] = f"{type(exc).__name__}: {exc}"

              extraction_records.append(extraction_record)

          extracted_ok_count = sum(1 for row in extraction_records if row["extraction_ok"])
          extracted_fail_count = sum(1 for row in extraction_records if not row["extraction_ok"])

          simple_route_root_count = len(set(roots_with_simple_route_inputs))
          primary_density_root_count = len(set(roots_with_primary_density_inputs))
          h0_like_root_count = len(set(roots_with_h0_like_inputs))
          blocked_direct_root_count = len(set(roots_with_blocked_direct_inputs))

          simple_column_map_count = sum(1 for row in column_map_records if row["role"] == "simple_derived_route_candidate")
          primary_density_column_map_count = sum(1 for row in column_map_records if row["role"] == "primary_density_route_candidate")
          h0_like_column_map_count = sum(1 for row in column_map_records if row["role"] == "h0_like_route_candidate")

          if extracted_ok_count == 0:
              failed_gates.append("no_selected_paramnames_extracted_successfully")

          if extracted_fail_count > 0:
              warnings.append("some_selected_paramnames_failed_to_extract")

          if blocked_direct_root_count > 0:
              failed_gates.append("blocked_direct_fsigma8_inputs_present_in_paramnames")

          if simple_route_root_count == 0:
              warnings.append("simple_omegam_sigma8_chain_column_route_not_available")

          if primary_density_root_count == 0:
              warnings.append("primary_density_columns_not_found_in_selected_roots")

          if h0_like_root_count == 0:
              warnings.append("h0_like_columns_not_found_in_selected_roots")

          if primary_density_root_count > 0 and blocked_direct_root_count == 0:
              route_decision = "simple_omegam_sigma8_route_blocked_primary_density_column_route_available_for_next_design"
          elif simple_route_root_count > 0 and blocked_direct_root_count == 0:
              route_decision = "simple_omegam_sigma8_route_available_after_recheck"
          else:
              route_decision = "selected_paramnames_extracted_but_chain_derived_reference_requires_external_or_deeper_parameter_route"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "fullgrid_not_downloaded",
                  "pass": True,
                  "result": "only_bounded_ranges_read",
                  "boundary": "No fullGrid download."
              },
              {
                  "rule_id": "central_directory_fetched_from_v4_57_offsets",
                  "pass": cd_record["ok"] and cd_record["server_honored_range"] and not cd_record["truncated_by_guard"],
                  "result": f"central_directory_bytes_read_{cd_record.get('bytes_read')}",
                  "boundary": "Central directory only."
              },
              {
                  "rule_id": "selected_paramnames_extracted",
                  "pass": extracted_ok_count > 0,
                  "result": f"{extracted_ok_count} selected paramnames extracted",
                  "boundary": "No chain sample rows read."
              },
              {
                  "rule_id": "simple_route_absence_recorded_as_boundary",
                  "pass": simple_route_root_count >= 0,
                  "result": f"{simple_route_root_count} roots contain direct omegam and sigma8",
                  "boundary": "Zero is useful; do not force simple parser route."
              },
              {
                  "rule_id": "primary_density_route_recorded",
