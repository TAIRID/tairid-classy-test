name: 001 TAIRID v4.278 - LRG ELG Candidate File Reader Probe With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-278-lrg-elg-candidate-file-reader-probe-with-scope-guards.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  lrg-elg-candidate-file-reader-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.278 LRG ELG Candidate File Reader Probe With Scope Guards is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.278 LRG ELG candidate file reader probe
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import re
          import zipfile

          VERSION = "v4.278"
          ROUTE = "lrg_elg_candidate_file_reader_probe_with_scope_guards_after_v4_277"
          EXPECTED_RESULT = "v4_278_lrg_elg_candidate_file_reader_probe_with_scope_guards_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_279_lrg_elg_candidate_schema_mapping_plan_no_data_validation"

          OUT = Path("tairid_v4_278_lrg_elg_candidate_file_reader_probe_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-278-lrg-elg-candidate-file-reader-probe-output.zip"

          REQUIRED_PACKET_FIELDS = [
              "source_lane",
              "packet_id",
              "observed_id",
              "source_family",
              "source_release",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "reference_value",
              "reference_source_or_method",
              "covariance_policy",
              "covariance_path_or_method",
              "inverse_covariance_status",
              "residual_preview_status",
              "diagnostic_distance_status",
              "provenance_status",
              "approval_status",
              "notes",
          ]

          FIELD_SYNONYMS = {
              "redshift": ["z", "zeff", "z_eff", "redshift", "effective_redshift"],
              "quantity": ["quantity", "observable", "parameter", "measurement", "statistic"],
              "observed_value": ["value", "obs", "observed", "measurement", "fsigma8", "f_sigma8", "f*sigma8"],
              "observed_sigma_or_likelihood": ["sigma", "error", "err", "unc", "uncertainty", "likelihood"],
              "reference_value": ["reference", "lcdm", "model", "prediction", "predicted", "fiducial"],
              "covariance_policy": ["covariance", "cov", "corr", "correlation", "matrix"],
              "source_lane": ["lrg", "elg", "qso", "tracer", "sample"],
              "source_family": ["survey", "catalog", "source", "dataset"],
              "source_release": ["release", "version", "dr", "data_release"],
          }

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def is_candidate_file(path):
              lower = path.as_posix().lower()
              if ".git/" in lower or "node_modules/" in lower:
                  return False
              if path.suffix.lower() not in [".csv", ".json", ".txt", ".md", ".yaml", ".yml", ".tsv"]:
                  return False
              keywords = ["lrg", "elg", "qso", "rsd", "fsigma", "f_sigma", "growth", "bao", "cov", "covariance", "zhao", "residual", "tracer"]
              return any(k in lower for k in keywords)

          def lane_guess(path):
              lower = path.as_posix().lower()
              lanes = []
              if "lrg" in lower:
                  lanes.append("LRG")
              if "elg" in lower:
                  lanes.append("ELG")
              if "qso" in lower or "zhao" in lower:
                  lanes.append("QSO")
              if not lanes and ("growth" in lower or "fsigma" in lower or "f_sigma" in lower or "rsd" in lower):
                  lanes.append("growth_unknown")
              if not lanes and ("bao" in lower or "cov" in lower):
                  lanes.append("support_unknown")
              return "|".join(lanes) if lanes else "unknown"

          def object_guess(path):
              lower = path.as_posix().lower()
              objects = []
              if "cov" in lower or "covariance" in lower or "corr" in lower:
                  objects.append("covariance_or_correlation")
              if "observ" in lower or "fsigma" in lower or "f_sigma" in lower or "growth" in lower or "rsd" in lower:
                  objects.append("observed_candidate")
              if "reference" in lower or "lcdm" in lower or "model" in lower or "prediction" in lower:
                  objects.append("reference_candidate")
              if "manifest" in lower or "inventory" in lower or "ledger" in lower:
                  objects.append("manifest_or_inventory")
              if "residual" in lower:
                  objects.append("residual_candidate")
              return "|".join(objects) if objects else "candidate_context"

          def safe_text_prefix(path, limit=200000):
              try:
                  with path.open("rb") as f:
                      data = f.read(limit)
                  return data.decode("utf-8", errors="replace"), ""
              except Exception as exc:
                  return "", f"{type(exc).__name__}: {exc}"

          def read_csv_probe(path):
              try:
                  delimiter = "\t" if path.suffix.lower() == ".tsv" else ","
                  with path.open("r", encoding="utf-8-sig", newline="") as f:
                      reader = csv.DictReader(f, delimiter=delimiter)
                      rows = []
                      for idx, row in enumerate(reader):
                          if idx >= 3:
                              break
                          rows.append(row)
                      fields = reader.fieldnames or []
                  return fields, rows, ""
              except Exception as exc:
                  return [], [], f"{type(exc).__name__}: {exc}"

          def read_json_probe(path):
              text, error = safe_text_prefix(path)
              if error:
                  return [], [], error
              try:
                  obj = json.loads(text)
                  keys = []
                  sample_rows = []
                  if isinstance(obj, dict):
                      keys = list(obj.keys())[:80]
                      # If dict contains list of dicts, sample that nested table.
                      for k, v in obj.items():
                          if isinstance(v, list) and v and isinstance(v[0], dict):
                              keys = list(v[0].keys())
                              sample_rows = v[:3]
                              break
                      if not sample_rows:
                          sample_rows = [obj]
                  elif isinstance(obj, list):
                      if obj and isinstance(obj[0], dict):
                          keys = list(obj[0].keys())
                          sample_rows = obj[:3]
                      else:
                          keys = ["json_list_non_dict"]
                          sample_rows = [{"sample_type": type(obj[0]).__name__ if obj else "empty"}]
                  else:
                      keys = [f"json_{type(obj).__name__}"]
                      sample_rows = [{"sample_type": type(obj).__name__}]
                  return keys, sample_rows, ""
              except Exception as exc:
                  return [], [], f"{type(exc).__name__}: {exc}"

          def read_text_probe(path):
              text, error = safe_text_prefix(path)
              if error:
                  return [], [], error
              lines = [line.strip() for line in text.splitlines() if line.strip()][:12]
              tokens = []
              joined = " ".join(lines).lower()
              for token in ["redshift", "z_eff", "zeff", "fsigma8", "f_sigma8", "sigma", "covariance", "correlation", "lrg", "elg", "qso", "bao", "rsd", "lcdm"]:
                  if token in joined:
                      tokens.append(token)
              return tokens, [{"line_preview": " | ".join(lines[:3])[:500]}], ""

          def normalize_name(name):
              return re.sub(r"[^a-z0-9]+", "_", str(name).strip().lower()).strip("_")

          def field_overlap(columns):
              normalized_columns = [normalize_name(c) for c in columns]
              hits = {}
              for field, synonyms in FIELD_SYNONYMS.items():
                  field_hits = []
                  for col in normalized_columns:
                      for syn in synonyms:
                          nsyn = normalize_name(syn)
                          if col == nsyn or nsyn in col or col in nsyn:
                              field_hits.append(col)
                  if field_hits:
                      hits[field] = sorted(set(field_hits))
              return hits

          inherited_v4_277_rows = [
              {
                  "inherited_from": "v4.277",
                  "item": "rules",
                  "value": "38 / 38 passed",
                  "meaning": "LRG/ELG route selector passed.",
                  "carry_forward_status": "ready_for_candidate_reader_probe",
              },
              {
                  "inherited_from": "v4.277",
                  "item": "candidate_file_rows",
                  "value": 195,
                  "meaning": "Candidate filename leads were found in the repo.",
                  "carry_forward_status": "leads_only_not_validated",
              },
              {
                  "inherited_from": "v4.277",
                  "item": "manual_fill_ready",
                  "value": False,
                  "meaning": "No complete filled manual LRG/ELG packet pair was present.",
                  "carry_forward_status": "manual_validator_blocked",
              },
              {
                  "inherited_from": "v4.277",
                  "item": "candidate_reader_probe_allowed_next",
                  "value": True,
                  "meaning": "Candidate reader probe is the safe next route.",
                  "carry_forward_status": "current_permission",
              },
              {
                  "inherited_from": "v4.277",
                  "item": "manual_fill_validator_allowed_next",
                  "value": False,
                  "meaning": "Manual fill validator is blocked until filled templates exist.",
                  "carry_forward_status": "manual_fill_blocked",
              },
              {
                  "inherited_from": "v4.277",
                  "item": "lrg_equivalent_packet_ready",
                  "value": False,
                  "meaning": "LRG packet is still not ready.",
                  "carry_forward_status": "lrg_packet_missing",
              },
              {
                  "inherited_from": "v4.277",
                  "item": "elg_equivalent_packet_ready",
                  "value": False,
                  "meaning": "ELG packet is still not ready.",
                  "carry_forward_status": "elg_packet_missing",
              },
              {
                  "inherited_from": "v4.277",
                  "item": "source_comparison_allowed",
                  "value": False,
                  "meaning": "Source comparison stayed blocked.",
                  "carry_forward_status": "source_comparison_blocked",
              },
              {
                  "inherited_from": "v4.277",
                  "item": "combined_matrix_allowed",
                  "value": False,
                  "meaning": "Combined matrix stayed blocked.",
                  "carry_forward_status": "combined_matrix_blocked",
              },
              {
                  "inherited_from": "v4.277",
                  "item": "selected_next_route",
                  "value": "v4_278_lrg_elg_candidate_file_reader_probe_with_scope_guards",
                  "meaning": "Current route probes candidate file schemas without validation.",
                  "carry_forward_status": "current_route",
              },
          ]

          candidate_files = []
          for p in Path(".").rglob("*"):
              if p.is_file() and is_candidate_file(p):
                  try:
                      size = p.stat().st_size
                  except Exception:
                      size = None
                  candidate_files.append({
                      "path": p.as_posix(),
                      "suffix": p.suffix.lower(),
                      "size_bytes": size,
                      "lane_guess": lane_guess(p),
                      "object_guess": object_guess(p),
                      "candidate_status": "filename_lead_only_not_validated",
                  })
          candidate_files = sorted(candidate_files, key=lambda row: row["path"])[:400]

          probe_rows = []
          sample_preview_rows = []
          for idx, item in enumerate(candidate_files[:120], start=1):
              path = Path(item["path"])
              suffix = item["suffix"]
              if suffix in [".csv", ".tsv"]:
                  columns, samples, error = read_csv_probe(path)
                  probe_type = "csv_tsv_header_probe"
              elif suffix == ".json":
                  columns, samples, error = read_json_probe(path)
                  probe_type = "json_key_probe"
              else:
                  columns, samples, error = read_text_probe(path)
                  probe_type = "text_token_probe"
              hits = field_overlap(columns)
              lrg_elg_lane = ("LRG" in item["lane_guess"]) or ("ELG" in item["lane_guess"])
              interesting_hit_count = len(hits)
              readiness_hint = "possible_schema_mapping_lead" if (lrg_elg_lane and interesting_hit_count >= 2) else "weak_or_context_lead"
              if error:
                  readiness_hint = "read_probe_error"
              probe_rows.append({
                  "probe_id": f"probe_{idx:03d}",
                  "path": item["path"],
                  "suffix": suffix,
                  "lane_guess": item["lane_guess"],
                  "object_guess": item["object_guess"],
                  "probe_type": probe_type,
                  "columns_or_tokens_seen": "|".join(str(c) for c in columns[:60]),
                  "field_overlap_count": interesting_hit_count,
                  "field_overlap_names": "|".join(sorted(hits.keys())) if hits else "none",
                  "read_error": error if error else "none",
                  "readiness_hint": readiness_hint,
                  "validation_status": "not_validated_header_sample_probe_only",
              })
              for sample_idx, sample in enumerate(samples[:2], start=1):
                  safe_sample = {}
                  if isinstance(sample, dict):
                      for key, value in list(sample.items())[:12]:
                          safe_sample[str(key)[:80]] = str(value)[:120]
                  else:
                      safe_sample = {"sample": str(sample)[:300]}
                  sample_preview_rows.append({
                      "probe_id": f"probe_{idx:03d}",
                      "sample_index": sample_idx,
                      "path": item["path"],
                      "sample_preview_json": json.dumps(safe_sample, ensure_ascii=False),
                      "sample_status": "preview_only_not_validated",
                  })

          lrg_probe_rows = [row for row in probe_rows if "LRG" in row["lane_guess"]]
          elg_probe_rows = [row for row in probe_rows if "ELG" in row["lane_guess"]]
          lrg_mapping_leads = [row for row in lrg_probe_rows if row["readiness_hint"] == "possible_schema_mapping_lead"]
          elg_mapping_leads = [row for row in elg_probe_rows if row["readiness_hint"] == "possible_schema_mapping_lead"]

          probe_summary_rows = [
              {
                  "summary_id": "summary_001",
                  "object": "candidate_files_scanned",
                  "value": len(candidate_files),
                  "meaning": "Candidate filename leads scanned. Still not validated data.",
              },
              {
                  "summary_id": "summary_002",
                  "object": "candidate_files_probed",
                  "value": len(probe_rows),
                  "meaning": "Files whose headers, JSON keys, or text tokens were inspected.",
              },
              {
                  "summary_id": "summary_003",
                  "object": "lrg_probe_rows",
                  "value": len(lrg_probe_rows),
                  "meaning": "LRG-labeled candidate probes.",
              },
              {
                  "summary_id": "summary_004",
                  "object": "elg_probe_rows",
                  "value": len(elg_probe_rows),
                  "meaning": "ELG-labeled candidate probes.",
              },
              {
                  "summary_id": "summary_005",
                  "object": "lrg_possible_schema_mapping_leads",
                  "value": len(lrg_mapping_leads),
                  "meaning": "LRG leads with at least two packet-field overlaps.",
              },
              {
                  "summary_id": "summary_006",
                  "object": "elg_possible_schema_mapping_leads",
                  "value": len(elg_mapping_leads),
                  "meaning": "ELG leads with at least two packet-field overlaps.",
              },
          ]

          selected_mapping_lead_rows = []
          for lane, rows in [("LRG", lrg_mapping_leads), ("ELG", elg_mapping_leads)]:
              sorted_rows = sorted(rows, key=lambda r: (-int(r["field_overlap_count"]), r["path"]))[:10]
              if not sorted_rows:
                  selected_mapping_lead_rows.append({
                      "selection_id": f"{lane.lower()}_selection_none",
                      "source_lane": lane,
                      "path": "none",
                      "field_overlap_count": 0,
                      "field_overlap_names": "none",
                      "selection_status": "no_schema_mapping_lead_found_in_probe",
                  })
              else:
                  for idx, row in enumerate(sorted_rows, start=1):
                      selected_mapping_lead_rows.append({
                          "selection_id": f"{lane.lower()}_selection_{idx:02d}",
                          "source_lane": lane,
                          "path": row["path"],
                          "field_overlap_count": row["field_overlap_count"],
                          "field_overlap_names": row["field_overlap_names"],
                          "selection_status": "candidate_for_next_schema_mapping_plan_not_validated",
                      })

          schema_mapping_need_rows = []
          for lane in ["LRG", "ELG"]:
              for field in REQUIRED_PACKET_FIELDS:
                  schema_mapping_need_rows.append({
                      "need_id": f"{lane.lower()}_{field}",
                      "source_lane": lane,
                      "required_packet_field": field,
                      "mapping_status": "needs_explicit_column_or_manual_value",
                      "blocked_action": "do_not_guess_or_auto_fill",
                  })

          next_mapping_plan_rows = [
              {
                  "plan_id": "plan_001",
                  "source_lane": "LRG",
                  "next_object": "schema_mapping_table",
                  "required_action": "choose candidate lead or manual source, then map columns to packet fields",
                  "current_status": "lead_candidates_found" if lrg_mapping_leads else "no_strong_lead_found",
              },
              {
                  "plan_id": "plan_002",
                  "source_lane": "ELG",
                  "next_object": "schema_mapping_table",
                  "required_action": "choose candidate lead or manual source, then map columns to packet fields",
                  "current_status": "lead_candidates_found" if elg_mapping_leads else "no_strong_lead_found",
              },
              {
                  "plan_id": "plan_003",
                  "source_lane": "LRG_ELG",
                  "next_object": "manual_missing_field_policy",
                  "required_action": "keep missing observed/reference/covariance fields marked missing or recalculate",
                  "current_status": "required",
              },
              {
                  "plan_id": "plan_004",
                  "source_lane": "combined_LRG_ELG_QSO",
                  "next_object": "combined_matrix",
                  "required_action": "do nothing; combined matrix remains blocked",
                  "current_status": "blocked",
              },
          ]

          safety_guard_rows = [
              {
                  "guard_id": "guard_001",
                  "guard": "headers_are_not_data_validation",
                  "meaning": "Columns and sample rows are schema probes only.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_002",
                  "guard": "sample_rows_are_not_packet_rows",
                  "meaning": "Preview samples cannot become validated packet rows.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_003",
                  "guard": "no_guess_mapping",
                  "meaning": "Column similarity is a lead, not an automatic mapping.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_004",
                  "guard": "no_reference_or_covariance_inference",
                  "meaning": "Missing reference/covariance fields must stay missing or recalculate.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_005",
                  "guard": "no_residuals_without_validated_packets",
                  "meaning": "LRG/ELG residual previews stay blocked.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_006",
                  "guard": "no_source_comparison_without_packet_parity",
                  "meaning": "Source comparison remains blocked.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_007",
                  "guard": "no_combined_matrix",
                  "meaning": "Combined matrix remains blocked.",
                  "status": "active",
              },
          ]

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "validate_candidate_files_as_data_now", "reason": "headers/sample rows are probes only", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "auto_fill_packet_fields_from_column_similarity", "reason": "mapping requires explicit next guard", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "compute_LRG_residuals_now", "reason": "LRG packet is not validated", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "compute_ELG_residuals_now", "reason": "ELG packet is not validated", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "compute_LRG_ELG_diagnostic_scalars_now", "reason": "residual previews do not exist", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "source_comparison_now", "reason": "packet parity is missing", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "combined_matrix_now", "reason": "source-separated diagnostics and dependency audit are missing", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "p_value_or_likelihood_now", "reason": "no scoring guard exists", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "numeric_correction_fit_now", "reason": "no fitting guard exists", "blocked": True},
              {"blocked_id": "blocked_010", "operation": "validation_or_evidence_claim_now", "reason": "no validation/evidence guard exists", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "candidate_reader_probe", "permission_status": "completed_no_data_validation", "reason": "Headers, JSON keys, text tokens, and tiny samples were inspected only."},
              {"permission_scope": "schema_mapping_plan", "permission_status": "allowed_next", "reason": "Next workflow can write explicit mapping plan without filling or scoring."},
              {"permission_scope": "manual_missing_field_policy", "permission_status": "allowed_next", "reason": "Next workflow can label missing/recalculate fields explicitly."},
              {"permission_scope": "LRG_residual_preview", "permission_status": "blocked", "reason": "LRG packet is not validated."},
              {"permission_scope": "ELG_residual_preview", "permission_status": "blocked", "reason": "ELG packet is not validated."},
              {"permission_scope": "source_comparison_residual_guard", "permission_status": "blocked_until_LRG_ELG_packets", "reason": "Comparison requires validated lane packets."},
              {"permission_scope": "combined_lrg_elg_qso_matrix", "permission_status": "blocked", "reason": "Combined matrix requires packet parity and dependency audit."},
              {"permission_scope": "p_value_or_likelihood", "permission_status": "blocked", "reason": "No scoring guard exists."},
              {"permission_scope": "numeric_correction_fit", "permission_status": "blocked", "reason": "No fitting is allowed."},
              {"permission_scope": "cosmology_validation_claim", "permission_status": "blocked", "reason": "No validation guard has passed."},
          ]

          readiness_rows = [
              {"readiness_id": "ready_001", "object": "candidate_reader_probe", "status": "complete_no_validation", "meaning": "Probe output exists."},
              {"readiness_id": "ready_002", "object": "LRG_schema_mapping_plan", "status": "ready_next", "meaning": "A mapping plan can be written next."},
              {"readiness_id": "ready_003", "object": "ELG_schema_mapping_plan", "status": "ready_next", "meaning": "A mapping plan can be written next."},
              {"readiness_id": "ready_004", "object": "LRG_equivalent_packet", "status": "not_ready", "meaning": "Still no validated packet."},
              {"readiness_id": "ready_005", "object": "ELG_equivalent_packet", "status": "not_ready", "meaning": "Still no validated packet."},
              {"readiness_id": "ready_006", "object": "source_comparison", "status": "blocked", "meaning": "Needs packet parity."},
              {"readiness_id": "ready_007", "object": "combined_matrix", "status": "blocked", "meaning": "Needs source-separated diagnostics and dependency audit."},
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "Candidate reader probe completed without data validation.",
                  "basis": "Only headers, keys, text tokens, and tiny samples were inspected.",
                  "next_action": "Build a schema mapping plan.",
                  "claim_status": "probe_only",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "LRG and ELG remain unvalidated.",
                  "basis": "No candidate lead was converted into a packet row.",
                  "next_action": "Do not compute residuals.",
                  "claim_status": "packets_missing",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "The next clean route is explicit schema mapping.",
                  "basis": "Column/token overlaps can guide mapping, but cannot fill fields automatically.",
                  "next_action": "Proceed to v4.279 schema mapping plan.",
                  "claim_status": "safe_to_continue",
              },
              {
                  "decision_id": "decision_004",
                  "decision": "Source comparison and combined matrices remain blocked.",
                  "basis": "Packet parity still does not exist.",
                  "next_action": "Keep source surfaces separated.",
                  "claim_status": "no_validation",
              },
          ]

          route_decision_rows = [
