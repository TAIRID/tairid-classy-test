name: 000 TAIRID v4.64 Guarded Chain Sample Parser Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-64-guarded-chain-sample-parser-design.yml"

jobs:
  tairid-v4-64-guarded-chain-sample-parser-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.64 guarded chain sample parser design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_64_guarded_chain_sample_parser_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_64_guarded_chain_sample_parser_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_64_guarded_chain_sample_parser_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import Planck chains.",
              "This does not parse chain sample rows.",
              "This does not compute Planck reference uncertainty.",
              "This is a design-only contract for a future guarded chain-sample parser.",
              "The future parser must not expect direct fsigma8z chain columns.",
              "The future parser must derive fsigma8z from sampled omegam and sigma8 under the locked growth calculator contract."
          ]

          UPSTREAM_LOCKS = {
              "v4_57": {
                  "result": "ZIP64 central directory parsed",
                  "manifest_member_count": 17902,
                  "verified_root_count": 1296,
                  "fullGrid_downloaded": False,
                  "chains_imported": False
              },
              "v4_58": {
                  "result": "selected paramnames extracted",
                  "selected_paramnames_extracted": 44,
                  "direct_fsigma8_columns_found": False,
                  "sigma8z_columns_found": False
              },
              "v4_59": {
                  "result": "selected minimum target mapping passed",
                  "fsigma8_targets_found_in_minimums": True,
                  "sigma8z_targets_found_in_minimums": True,
                  "minimum_files_are_posterior_samples": False
              },
              "v4_60": {
                  "result": "target location audit passed",
                  "fsigma8_targets_are_sidecar_derived_outputs": True,
                  "direct_chain_column_candidate_roots": 0
              },
              "v4_61": {
                  "result": "minimum derived growth ratio audit passed",
                  "ratio_pairs_checked": 110,
                  "ratio_pairs_passed": 110
              },
              "v4_62": {
                  "result": "growth gamma contract audit passed",
                  "gamma_pairs_checked": 110,
                  "gamma_pairs_passed": 110,
                  "max_abs_diff_observed": 0.0016749529818671505
              },
              "v4_63": {
                  "result": "chain derived growth calculator contract audit passed",
                  "calculator_pairs_checked": 110,
                  "calculator_pairs_passed": 110,
                  "max_abs_diff_sigma8z_observed": 0.0008532756738073854,
                  "max_abs_diff_fsigma8_observed": 0.0015184025447103067
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          GROWTH_CALCULATOR_CONTRACT = {
              "required_sample_inputs": [
                  "sample_weight",
                  "minus_loglike_or_likelihood_diagnostic",
                  "omegam",
                  "sigma8"
              ],
              "optional_sample_inputs": [
                  "H0",
                  "S8",
                  "omegal",
                  "omegak"
              ],
              "blocked_expected_inputs": [
                  "fsigma8z015",
                  "fsigma8z038",
                  "fsigma8z051",
                  "fsigma8z061",
                  "fsigma8z233"
              ],
              "locked_formulae": {
                  "Omega_m_z": "Omega_m0 * (1 + z)^3 / (Omega_m0 * (1 + z)^3 + 1 - Omega_m0)",
                  "f_z": "Omega_m(z)^gamma",
                  "D_z": "exp(- integral from ln(a) to 0 of f(a') d ln a')",
                  "sigma8z": "sigma8_0 * D_z",
                  "fsigma8z": "f_z * sigma8z"
              },
              "gamma": 0.55,
              "growth_integration_steps": 800,
              "parser_boundary": "Design only. No chain rows are read in v4.64."
          }

          FUTURE_CHAIN_SAMPLE_PARSER_STAGES = [
              {
                  "stage": 1,
                  "name": "select_verified_chain_root",
                  "input": "verified fullGrid manifest root from ZIP64 central directory",
                  "output": "one selected chain root plus sidecar members",
                  "hard_fail_if_missing": True,
                  "implemented_now": False
              },
              {
                  "stage": 2,
                  "name": "read_matching_paramnames",
                  "input": "selected root .paramnames",
                  "output": "column index map",
                  "hard_fail_if_missing": True,
                  "implemented_now": False
              },
              {
                  "stage": 3,
                  "name": "verify_required_columns",
                  "input": "column index map",
                  "output": "confirmed omegam and sigma8 column indices",
                  "hard_fail_if_missing": True,
                  "implemented_now": False
              },
              {
                  "stage": 4,
                  "name": "stream_chain_rows_guarded",
                  "input": "selected root chain text members",
                  "output": "weighted samples streamed in bounded chunks",
                  "hard_fail_if_missing": True,
                  "implemented_now": False
              },
              {
                  "stage": 5,
                  "name": "derive_growth_targets_per_sample",
                  "input": "weighted samples with omegam and sigma8",
                  "output": "fsigma8z derived samples at target redshifts",
                  "hard_fail_if_missing": True,
                  "implemented_now": False
              },
              {
                  "stage": 6,
                  "name": "compute_weighted_reference_uncertainty",
                  "input": "derived fsigma8z samples and weights",
                  "output": "mean vector, covariance matrix, correlation matrix, effective sample size",
                  "hard_fail_if_missing": True,
                  "implemented_now": False
              },
              {
                  "stage": 7,
                  "name": "handoff_to_RSD_pressure_without_final_claim",
                  "input": "reference mean and covariance",
                  "output": "ready for later RSD pressure test",
                  "hard_fail_if_missing": True,
                  "implemented_now": False
              }
          ]

          OUTPUT_CONTRACT = {
              "future_json": "planck_chain_derived_fsigma8_reference_uncertainty.json",
              "future_mean_csv": "planck_chain_derived_fsigma8_reference_mean.csv",
              "future_covariance_csv": "planck_chain_derived_fsigma8_reference_covariance.csv",
              "future_correlation_csv": "planck_chain_derived_fsigma8_reference_correlation.csv",
              "future_audit_md": "planck_chain_derived_growth_parser_audit.md",
              "current_v4_64_outputs_are_design_only": True
          }

          BLOCKED_CLAIMS = [
              "Planck chains were imported.",
              "Chain sample rows were read.",
              "Planck reference uncertainty is included.",
              "A final RSD pressure score was computed.",
              "TAIRID cosmology is validated.",
              "The full RSD lane is complete.",
              "fsigma8z exists as a direct chain column.",
              "The minimum sidecars are posterior samples.",
              "The growth calculator is a likelihood test.",
              "BIC or posterior model comparison was run."
          ]

          failed_gates = []
          warnings = [
              "design_only",
              "no_chain_import",
              "no_chain_rows_read",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          if UPSTREAM_LOCKS["v4_63"]["calculator_pairs_passed"] != UPSTREAM_LOCKS["v4_63"]["calculator_pairs_checked"]:
              failed_gates.append("v4_63_calculator_contract_not_fully_passed")

          if UPSTREAM_LOCKS["v4_60"]["direct_chain_column_candidate_roots"] != 0:
              failed_gates.append("unexpected_direct_fsigma8_chain_column_candidate_roots")

          if not UPSTREAM_LOCKS["v4_59"]["fsigma8_targets_found_in_minimums"]:
              failed_gates.append("minimum_sidecar_fsigma8_targets_not_preserved")

          if not UPSTREAM_LOCKS["v4_59"]["sigma8z_targets_found_in_minimums"]:
              failed_gates.append("minimum_sidecar_sigma8z_targets_not_preserved")

          required_inputs = set(GROWTH_CALCULATOR_CONTRACT["required_sample_inputs"])
          if "omegam" not in required_inputs:
              failed_gates.append("omegam_required_input_missing")

          if "sigma8" not in required_inputs:
              failed_gates.append("sigma8_required_input_missing")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          if any(stage["implemented_now"] is not False for stage in FUTURE_CHAIN_SAMPLE_PARSER_STAGES):
              failed_gates.append("parser_stage_accidentally_marked_implemented")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "chains were imported",
              "chain sample rows were read",
              "reference uncertainty is included",
              "final rsd pressure",
              "validated",
              "fsigma8z exists as a direct chain column",
              "minimum sidecars are posterior samples",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          RULE_RESULTS = [
              {
                  "rule_id": "new_workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "upstream_v4_63_pass_carried",
                  "pass": UPSTREAM_LOCKS["v4_63"]["calculator_pairs_passed"] == 110,
                  "result": "v4_63 calculator contract pass carried forward",
                  "boundary": "Carry-forward only; no chain rows read."
              },
              {
                  "rule_id": "direct_fsigma8_chain_columns_blocked",
                  "pass": UPSTREAM_LOCKS["v4_60"]["direct_chain_column_candidate_roots"] == 0,
                  "result": "parser must not expect direct fsigma8z columns",
                  "boundary": "Use derived calculator route."
              },
              {
                  "rule_id": "required_inputs_declared",
                  "pass": "omegam" in required_inputs and "sigma8" in required_inputs,
                  "result": "omegam and sigma8 required for future parser",
                  "boundary": "No chain rows read now."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "parser_stages_design_only",
                  "pass": all(stage["implemented_now"] is False for stage in FUTURE_CHAIN_SAMPLE_PARSER_STAGES),
                  "result": "all parser stages remain design-only",
                  "boundary": "No chain import."
              },
              {
                  "rule_id": "output_contract_declared",
                  "pass": OUTPUT_CONTRACT["current_v4_64_outputs_are_design_only"] is True,
                  "result": "future parser output contract declared",
                  "boundary": "No reference uncertainty output produced now."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 10,
                  "result": "blocked claims preserved",
                  "boundary": "No validation or final pressure claim."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Guarded parser design only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_64_rules_passed")

          if failed_gates:
              readiness_label = "guarded_chain_sample_parser_design_failed"
              next_allowed_step = "Repair guarded parser design before any chain-sample parser implementation."
          else:
              readiness_label = "guarded_chain_sample_parser_design_passed_ready_for_selective_paramnames_column_map_probe"
              next_allowed_step = (
                  "Proceed to v4.65 selective paramnames column map probe. "
                  "Keep the workflow name prefixed with 000 TAIRID so it appears near the top of GitHub Actions. "
                  "Do not import chain samples, compute reference uncertainty, or compute final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "future_parser_stage_count": len(FUTURE_CHAIN_SAMPLE_PARSER_STAGES),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "required_inputs": ", ".join(GROWTH_CALCULATOR_CONTRACT["required_sample_inputs"]),
              "blocked_expected_inputs": ", ".join(GROWTH_CALCULATOR_CONTRACT["blocked_expected_inputs"]),
              "gamma": GROWTH_CALCULATOR_CONTRACT["gamma"],
              "growth_integration_steps": GROWTH_CALCULATOR_CONTRACT["growth_integration_steps"],
              "fullGrid_downloaded": False,
              "Planck_chains_imported": False,
              "chain_sample_rows_read": False,
              "reference_uncertainty_computed": False,
              "final_RSD_pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "target_redshifts": TARGET_REDSHIFTS,
              "growth_calculator_contract": GROWTH_CALCULATOR_CONTRACT,
              "future_chain_sample_parser_stages": FUTURE_CHAIN_SAMPLE_PARSER_STAGES,
              "output_contract": OUTPUT_CONTRACT,
              "blocked_claims": BLOCKED_CLAIMS,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "fullGrid_downloaded": False,
                  "Planck_chains_imported": False,
                  "chain_sample_rows_read": False,
                  "reference_uncertainty_computed": False,
                  "final_RSD_pressure_computed": False,
                  "validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_64_guarded_chain_sample_parser_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "target_redshift_contract_v4_64.csv",
              TARGET_REDSHIFTS,
              ["z_key", "z", "fsigma8_name", "sigma8z_name"]
          )

          write_csv(
              OUTDIR / "future_parser_stages_v4_64.csv",
              FUTURE_CHAIN_SAMPLE_PARSER_STAGES,
              ["stage", "name", "input", "output", "hard_fail_if_missing", "implemented_now"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_64.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_64.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.64 — Guarded Chain Sample Parser Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This is a design-only contract for the future guarded Planck chain-sample parser.")
          md.append("")
          md.append("The future parser must not expect direct `fsigma8z*` chain columns. It must derive `fsigma8z` from sampled `omegam` and `sigma8` using the locked growth calculator contract.")
          md.append("")
          md.append("This workflow name starts with `000 TAIRID` so it appears near the top of the GitHub Actions list.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_64_guarded_chain_sample_parser_design.json`")
          md.append("- `tairid_v4_64_guarded_chain_sample_parser_design.md`")
          md.append("- `target_redshift_contract_v4_64.csv`")
          md.append("- `future_parser_stages_v4_64.csv`")
          md.append("- `blocked_claims_v4_64.csv`")
          md.append("- `rule_results_v4_64.csv`")
          md.append("")

          (OUTDIR / "tairid_v4_64_guarded_chain_sample_parser_design.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.64 guarded chain sample parser design artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-64-guarded-chain-sample-parser-design
          path: artifacts/tairid_v4_64_guarded_chain_sample_parser_design/
