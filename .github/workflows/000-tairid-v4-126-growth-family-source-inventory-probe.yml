name: 000 TAIRID v4.126 Growth Family Source Inventory Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-126-growth-family-source-inventory-probe.yml"

jobs:
  tairid-v4-126-growth-family-source-inventory-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.126 growth family source inventory probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_126_growth_family_source_inventory_probe

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_126_growth_family_source_inventory_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_126_growth_family_source_inventory_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This does not compute an expanded bridge pressure.",
              "This inventories additional observed-growth families and records source/covariance status.",
              "A pass means enough non-BOSS growth-family source targets were attempted or explicitly parked to design the expanded bridge."
          ]

          UPSTREAM_LOCKS = {
              "v4_125_growth_family_expansion_design": {
                  "readiness_label": "growth_family_expansion_design_passed_ready_for_growth_family_source_inventory_probe",
                  "upstream_edge_bridge_pressure_z_all_zero": True,
                  "upstream_edge_bridge_all_chi2_below_dof": True,
                  "verified_BOSS_core_preserved": True,
                  "low_z_primary_bridge_decision": "primary_with_literature_error_model",
                  "high_z_primary_bridge_decision": "sensitivity_only_pending_source_lock",
                  "growth_family_target_count": 5,
                  "expansion_policy_count": 6,
                  "expanded_lane_plan_count": 6,
                  "source_inventory_performed": False,
                  "expanded_bridge_pressure_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_124_edge_anchor_sensitivity_bridge_probe": {
                  "readiness_label": "edge_anchor_sensitivity_bridge_probe_passed_pressure_stable_edge_decisions_confirmed_not_final_ready_for_growth_family_expansion_design",
                  "bridge_pressure_computed": True,
                  "pressure_z_all_zero": True,
                  "all_chi2_below_dof": True,
                  "central_BOSS_only_chi2": 1.2901571761240198,
                  "low_z_plus_BOSS_chi2": 1.3290301731197376,
                  "full_five_high_z_sensitivity_chi2": 1.721941483224999,
                  "high_z_only_edge_chi2": 1.6831404814747892,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          # These are inventory targets, not final inputs to a pressure score.
          # Values may be known from common growth compilations, but this probe treats them as
          # candidate values until a later bridge design explicitly accepts or parks them.
          GROWTH_FAMILY_CANDIDATES = [
              {
                  "family_id": "low_z_independent_anchor_family",
                  "candidate_id": "6dFGS_z0067_growth_anchor",
                  "z": 0.067,
                  "observed_fsigma8_candidate": 0.423,
                  "observed_sigma_candidate": 0.055,
                  "source_family": "6dFGS",
                  "source_url_or_locator": "https://arxiv.org/abs/1204.4725",
                  "source_priority": 1,
                  "target_role": "independent_low_z_anchor_check",
                  "expected_terms": "6dF f sigma8 growth rate sigma8 redshift"
              },
              {
                  "family_id": "WiggleZ_growth_family",
                  "candidate_id": "WiggleZ_z044_growth_anchor",
                  "z": 0.44,
                  "observed_fsigma8_candidate": 0.413,
                  "observed_sigma_candidate": 0.080,
                  "source_family": "WiggleZ",
                  "source_url_or_locator": "https://arxiv.org/abs/1104.2948",
                  "source_priority": 2,
                  "target_role": "independent_mid_z_growth_check",
                  "expected_terms": "WiggleZ growth rate redshift f sigma8"
              },
              {
                  "family_id": "WiggleZ_growth_family",
                  "candidate_id": "WiggleZ_z060_growth_anchor",
                  "z": 0.60,
                  "observed_fsigma8_candidate": 0.390,
                  "observed_sigma_candidate": 0.063,
                  "source_family": "WiggleZ",
                  "source_url_or_locator": "https://arxiv.org/abs/1104.2948",
                  "source_priority": 2,
                  "target_role": "independent_mid_z_growth_check",
                  "expected_terms": "WiggleZ growth rate redshift f sigma8"
              },
              {
                  "family_id": "WiggleZ_growth_family",
                  "candidate_id": "WiggleZ_z073_growth_anchor",
                  "z": 0.73,
                  "observed_fsigma8_candidate": 0.437,
                  "observed_sigma_candidate": 0.072,
                  "source_family": "WiggleZ",
                  "source_url_or_locator": "https://arxiv.org/abs/1104.2948",
                  "source_priority": 2,
                  "target_role": "independent_mid_z_growth_check",
                  "expected_terms": "WiggleZ growth rate redshift f sigma8"
              },
              {
                  "family_id": "VIPERS_growth_family",
                  "candidate_id": "VIPERS_z080_growth_anchor",
                  "z": 0.80,
                  "observed_fsigma8_candidate": 0.470,
                  "observed_sigma_candidate": 0.080,
                  "source_family": "VIPERS",
                  "source_url_or_locator": "https://arxiv.org/search/?query=VIPERS+growth+rate+fsigma8&searchtype=all",
                  "source_priority": 3,
                  "target_role": "high_mid_z_galaxy_growth_check",
                  "expected_terms": "VIPERS growth rate f sigma8 redshift"
              },
              {
                  "family_id": "eBOSS_LRG_ELG_QSO_family",
                  "candidate_id": "eBOSS_LRG_z0698_growth_anchor",
                  "z": 0.698,
                  "observed_fsigma8_candidate": 0.473,
                  "observed_sigma_candidate": 0.044,
                  "source_family": "eBOSS_LRG",
                  "source_url_or_locator": "https://arxiv.org/abs/2007.08991",
                  "source_priority": 4,
                  "target_role": "late_to_high_z_observed_growth_expansion",
                  "expected_terms": "eBOSS DR16 LRG growth f sigma8"
              },
              {
                  "family_id": "eBOSS_LRG_ELG_QSO_family",
                  "candidate_id": "eBOSS_ELG_z085_growth_anchor",
                  "z": 0.85,
                  "observed_fsigma8_candidate": 0.315,
                  "observed_sigma_candidate": 0.095,
                  "source_family": "eBOSS_ELG",
                  "source_url_or_locator": "https://arxiv.org/search/?query=eBOSS+ELG+fsigma8+0.85&searchtype=all",
                  "source_priority": 4,
                  "target_role": "late_to_high_z_observed_growth_expansion",
                  "expected_terms": "eBOSS ELG growth f sigma8"
              },
              {
                  "family_id": "eBOSS_LRG_ELG_QSO_family",
                  "candidate_id": "eBOSS_QSO_z148_growth_anchor",
                  "z": 1.48,
                  "observed_fsigma8_candidate": 0.462,
                  "observed_sigma_candidate": 0.045,
                  "source_family": "eBOSS_QSO",
                  "source_url_or_locator": "https://arxiv.org/search/?query=eBOSS+QSO+fsigma8+1.48&searchtype=all",
                  "source_priority": 4,
                  "target_role": "late_to_high_z_observed_growth_expansion",
                  "expected_terms": "eBOSS QSO growth f sigma8"
              },
              {
                  "family_id": "high_z_LyA_or_replacement_family",
                  "candidate_id": "high_z_replacement_manual_locator",
                  "z": 2.33,
                  "observed_fsigma8_candidate": "",
                  "observed_sigma_candidate": "",
                  "source_family": "high_z_LyA_or_replacement",
                  "source_url_or_locator": "manual_locator_required_high_z_growth_anchor",
                  "source_priority": 5,
                  "target_role": "replace_or_lock_current_z233_sensitivity_anchor",
                  "expected_terms": "LyA high redshift growth f sigma8"
              }
          ]

          INVENTORY_POLICY = [
              {
                  "policy_id": "candidate_values_not_final",
                  "requirement": "Candidate fσ8 values in the inventory are not final bridge inputs until the expanded bridge design accepts, parks, or replaces them.",
                  "reason": "The inventory stage records status; it does not create final observations.",
                  "applied_now": True
              },
              {
                  "policy_id": "verified_BOSS_core_preserved",
                  "requirement": "The verified BOSS core remains the reference control block while non-BOSS families are inventoried.",
                  "reason": "The BOSS covariance block is the cleanest current observed covariance structure.",
                  "applied_now": True
              },
              {
                  "policy_id": "fetch_or_locator_status_required",
                  "requirement": "Each candidate must be marked fetched, fetched_but_needs_manual_value_confirmation, manual_locator_required, or parked.",
                  "reason": "A source inventory must distinguish fetched sources from unresolved candidates.",
                  "applied_now": True
              },
              {
                  "policy_id": "covariance_status_required",
                  "requirement": "Each candidate must receive covariance status: source_covariance_not_ingested, literature_error_model_candidate, diagonal_fallback_candidate, covariance_model_needed, or parked.",
                  "reason": "Expanded growth pressure depends on covariance quality.",
                  "applied_now": True
              },
              {
                  "policy_id": "family_overlap_warning_required",
                  "requirement": "Each candidate must carry an independence/overlap warning by survey family.",
                  "reason": "Observed points from overlapping surveys cannot be treated as independent by default.",
                  "applied_now": True
              },
              {
                  "policy_id": "no_pressure_computed",
                  "requirement": "The inventory probe cannot compute expanded bridge pressure, final pressure, likelihood, BIC, posterior comparison, or validation.",
                  "reason": "Expansion must be designed after source status is known.",
                  "applied_now": True
              }
          ]

          NEXT_EXPANDED_BRIDGE_DESIGN_REQUIREMENTS = [
              {
                  "requirement_id": "select_primary_candidates",
                  "requirement": "Choose which inventoried non-BOSS candidates can enter the next primary expanded bridge.",
                  "why_needed": "Fetched source pages are not enough; bridge membership must be explicit."
              },
              {
                  "requirement_id": "park_or_sensitivity_unlocked_candidates",
                  "requirement": "Candidates without source confirmation or covariance/error status must be parked or sensitivity-only.",
                  "why_needed": "Weak candidates should not control the primary bridge."
              },
              {
                  "requirement_id": "preserve_BOSS_core_control",
                  "requirement": "Keep verified BOSS core as a standalone control lane.",
                  "why_needed": "The clean core is the comparison baseline."
              },
              {
                  "requirement_id": "define_family_lanes",
                  "requirement": "Define low-z, mid-z, eBOSS/high-mid-z, and high-z replacement/sensitivity lanes.",
                  "why_needed": "The next bridge must show which source family changes the diagnostic."
              },
              {
                  "requirement_id": "claim_boundary_repeat",
                  "requirement": "Expanded bridge design still must block final pressure and validation.",
                  "why_needed": "More data does not automatically mean final proof."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The growth family source inventory probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The candidate growth values are final bridge inputs.",
              "Zero pressure-z proves TAIRID.",
              "All growth-family candidates are independent by default.",
              "Diagonal fallback is the same as full observed covariance.",
              "A fetched arXiv page is enough for final source lock.",
              "No expanded bridge design is needed after inventory."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_127_expanded_growth_bridge_design",
                  "purpose": "Use the inventory status to choose primary, sensitivity-only, parked, and replacement candidates before computing any expanded bridge.",
                  "why_next": "v4.126 is an inventory. v4.127 must design the bridge lanes from that inventory."
              },
              {
                  "priority": 2,
                  "route_id": "v4_128_expanded_growth_bridge_probe",
                  "purpose": "Compute guarded expanded bridge lanes after source inventory and bridge design are complete.",
                  "why_next": "Pressure should only be computed after source/covariance status is explicit."
              },
              {
                  "priority": 3,
                  "route_id": "v4_129_expanded_growth_sensitivity_audit",
                  "purpose": "Audit whether expanded family choices alter pressure or only chi-square.",
                  "why_next": "Any expansion must be sensitivity-audited before interpretation."
              },
              {
                  "priority": 4,
                  "route_id": "v4_130_external_standard_cosmology_comparison_plan",
                  "purpose": "Design comparison language against normal ΛCDM growth pipelines and literature constraints.",
                  "why_next": "Diagnostic stability must be contextualized before public-facing claims."
              }
          ]

          failed_gates = []
          warnings = [
              "source_inventory_only",
              "candidate_values_not_final",
              "manual_confirmation_required_for_some_candidates",
              "no_expanded_bridge_pressure_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def fetch_text(url, max_bytes=500000):
              record = {
                  "url": url,
                  "ok": False,
                  "status": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "error": ""
              }
              text = ""
              if str(url).startswith("manual_locator_required"):
                  record["error"] = "manual_locator_required"
                  return record, text
              try:
                  req = urllib.request.Request(
                      url,
                      headers={"User-Agent": "TAIRID-v4.126-growth-family-inventory/1.0", "Accept": "text/html,text/plain,*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=120) as response:
                      record["status"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      raw = response.read(max_bytes)
                      record["bytes_read"] = len(raw)
                      text = raw.decode("utf-8", errors="replace")
                      record["ok"] = True
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, text

          def normalized_text(text):
              return re.sub(r"\s+", " ", text.lower())

          def term_score(text, terms):
              words = [word.lower() for word in re.findall(r"[a-zA-Z0-9_.]+", terms)]
              if not words:
                  return 0
              return sum(1 for word in words if word in text)

          source_fetch_records = []
          candidate_inventory_records = []
          family_summary = {}

          for candidate in GROWTH_FAMILY_CANDIDATES:
              fetch_record, text = fetch_text(candidate["source_url_or_locator"])
              fetch_record["family_id"] = candidate["family_id"]
              fetch_record["candidate_id"] = candidate["candidate_id"]
              fetch_record["source_family"] = candidate["source_family"]
              source_fetch_records.append(fetch_record)

              lower = normalized_text(text)
              expected_score = term_score(lower, candidate["expected_terms"])
              z_text = str(candidate["z"])
              redshift_hint_present = z_text in lower or z_text.replace("0.", ".") in lower
              fsigma_hint_present = any(term in lower for term in ["fsigma", "fσ8", "f\\sigma", "f sigma", "growth rate"])

              if fetch_record["ok"]:
                  fetch_status = "fetched"
              elif fetch_record["error"] == "manual_locator_required":
                  fetch_status = "manual_locator_required"
              else:
                  fetch_status = "fetch_failed_manual_needed"

              candidate_has_value = candidate["observed_fsigma8_candidate"] != "" and candidate["observed_sigma_candidate"] != ""

              if fetch_record["ok"] and candidate_has_value:
                  covariance_status = "literature_error_model_candidate_source_page_fetched"
                  primary_bridge_decision = "primary_candidate_needs_design_review"
              elif fetch_record["ok"]:
                  covariance_status = "source_page_fetched_value_manual_needed"
                  primary_bridge_decision = "sensitivity_only_until_value_lock"
              elif fetch_status == "manual_locator_required":
                  covariance_status = "manual_locator_needed"
                  primary_bridge_decision = "park_or_sensitivity_until_source_lock"
              else:
                  covariance_status = "fetch_failed_manual_needed"
                  primary_bridge_decision = "park_until_manual_source_lock"

              if "high_z" in candidate["family_id"]:
                  primary_bridge_decision = "sensitivity_only_or_replace_pending_source_lock"
                  covariance_status = "manual_locator_needed_high_z"

              independence_warning = (
                  "same_family_candidates_require_covariance_or_overlap_review"
                  if sum(1 for item in GROWTH_FAMILY_CANDIDATES if item["family_id"] == candidate["family_id"]) > 1
                  else "single_family_anchor_still_not_independent_by_default"
              )

              candidate_record = {
                  "family_id": candidate["family_id"],
                  "candidate_id": candidate["candidate_id"],
                  "z": candidate["z"],
                  "observed_fsigma8_candidate": candidate["observed_fsigma8_candidate"],
                  "observed_sigma_candidate": candidate["observed_sigma_candidate"],
                  "source_family": candidate["source_family"],
                  "source_url_or_locator": candidate["source_url_or_locator"],
                  "fetch_or_locator_status": fetch_status,
                  "source_fetch_ok": fetch_record["ok"],
                  "expected_term_score": expected_score,
                  "redshift_hint_present": redshift_hint_present,
                  "fsigma_hint_present": fsigma_hint_present,
                  "candidate_value_present": candidate_has_value,
                  "covariance_status": covariance_status,
                  "independence_warning": independence_warning,
                  "primary_bridge_decision": primary_bridge_decision,
                  "claim_boundary": "diagnostic_inventory_only_not_final_input"
              }
              candidate_inventory_records.append(candidate_record)

              family_id = candidate["family_id"]
              if family_id not in family_summary:
                  family_summary[family_id] = {
                      "family_id": family_id,
                      "candidate_count": 0,
                      "fetched_count": 0,
                      "manual_or_failed_count": 0,
                      "candidate_value_count": 0,
                      "primary_candidate_count": 0,
                      "sensitivity_or_park_count": 0
                  }
              family_summary[family_id]["candidate_count"] += 1
              if fetch_record["ok"]:
                  family_summary[family_id]["fetched_count"] += 1
              else:
                  family_summary[family_id]["manual_or_failed_count"] += 1
              if candidate_has_value:
                  family_summary[family_id]["candidate_value_count"] += 1
              if primary_bridge_decision == "primary_candidate_needs_design_review":
                  family_summary[family_id]["primary_candidate_count"] += 1
              else:
                  family_summary[family_id]["sensitivity_or_park_count"] += 1

          family_summary_records = list(family_summary.values())

          non_BOSS_family_count = len(set(row["family_id"] for row in candidate_inventory_records))
          attempted_or_parked_count = len(candidate_inventory_records)
          fetched_or_manual_count = sum(
              1 for row in candidate_inventory_records
              if row["fetch_or_locator_status"] in ["fetched", "manual_locator_required", "fetch_failed_manual_needed"]
          )
          fetched_count = sum(1 for row in candidate_inventory_records if row["source_fetch_ok"] is True)
          primary_candidate_count = sum(1 for row in candidate_inventory_records if row["primary_bridge_decision"] == "primary_candidate_needs_design_review")
          sensitivity_or_park_count = len(candidate_inventory_records) - primary_candidate_count
          all_candidates_have_status = all(
              row["fetch_or_locator_status"] != "" and row["covariance_status"] != "" and row["primary_bridge_decision"] != ""
              for row in candidate_inventory_records
          )
          verified_BOSS_core_preserved = UPSTREAM_LOCKS["v4_125_growth_family_expansion_design"]["verified_BOSS_core_preserved"] is True

          if not verified_BOSS_core_preserved:
              failed_gates.append("verified_BOSS_core_not_preserved")

          if non_BOSS_family_count < 5:
              failed_gates.append("not_enough_growth_families_inventoried")

          if attempted_or_parked_count < 8:
              failed_gates.append("not_enough_candidate_targets_inventoried")

          if fetched_or_manual_count != attempted_or_parked_count:
              failed_gates.append("not_all_candidates_have_fetch_or_manual_status")

          if fetched_count < 3:
              failed_gates.append("too_few_source_pages_fetched")

          if not all_candidates_have_status:
              failed_gates.append("not_all_candidates_have_status_fields")

          if primary_candidate_count < 3:
              failed_gates.append("too_few_primary_candidate_records_for_design_review")

          if len(NEXT_EXPANDED_BRIDGE_DESIGN_REQUIREMENTS) < 5:
              failed_gates.append("next_design_requirements_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "candidate growth values are final bridge inputs",
              "zero pressure-z proves tairid",
              "all growth-family candidates are independent by default",
              "fetched arxiv page is enough for final source lock",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "growth_family_source_inventory_probe_passed_ready_for_expanded_growth_bridge_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_growth_expansion_design_carried",
                  "pass": UPSTREAM_LOCKS["v4_125_growth_family_expansion_design"]["readiness_label"] == "growth_family_expansion_design_passed_ready_for_growth_family_source_inventory_probe",
                  "result": "v4.125 expansion design carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "verified_BOSS_core_preserved",
                  "pass": verified_BOSS_core_preserved,
                  "result": "verified BOSS core remains control block",
                  "boundary": "Do not disturb verified core."
              },
              {
                  "rule_id": "growth_families_inventoried",
                  "pass": non_BOSS_family_count >= 5 and attempted_or_parked_count >= 8,
                  "result": f"families={non_BOSS_family_count}; candidates={attempted_or_parked_count}",
                  "boundary": "Inventory only."
              },
              {
                  "rule_id": "source_status_recorded",
                  "pass": all_candidates_have_status,
                  "result": f"fetched={fetched_count}; primary_candidates={primary_candidate_count}; sensitivity_or_park={sensitivity_or_park_count}",
                  "boundary": "Source/covariance status, not final source lock."
              },
              {
                  "rule_id": "primary_candidate_pool_sufficient_for_design",
                  "pass": primary_candidate_count >= 3,
                  "result": f"primary_candidate_count={primary_candidate_count}",
                  "boundary": "Candidates still need bridge design review."
              },
              {
                  "rule_id": "manual_and_sensitivity_paths_preserved",
                  "pass": sensitivity_or_park_count >= 1,
                  "result": f"sensitivity_or_park_count={sensitivity_or_park_count}",
                  "boundary": "Unresolved candidates are not forced into primary."
              },
              {
                  "rule_id": "next_design_requirements_declared",
                  "pass": len(NEXT_EXPANDED_BRIDGE_DESIGN_REQUIREMENTS) >= 5,
                  "result": f"{len(NEXT_EXPANDED_BRIDGE_DESIGN_REQUIREMENTS)} next-design requirements declared",
                  "boundary": "No pressure computed."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": True,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_126_rules_passed")

          if failed_gates:
              readiness_label = "growth_family_source_inventory_probe_failed"
              next_allowed_step = "Repair growth-family source inventory before expanded bridge design."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.127 expanded growth bridge design. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "verified_BOSS_core_preserved": verified_BOSS_core_preserved,
              "candidate_inventory_count": len(candidate_inventory_records),
              "growth_family_count": non_BOSS_family_count,
              "source_fetch_record_count": len(source_fetch_records),
              "fetched_source_count": fetched_count,
              "manual_or_failed_source_count": attempted_or_parked_count - fetched_count,
              "primary_candidate_count": primary_candidate_count,
              "sensitivity_or_park_count": sensitivity_or_park_count,
              "all_candidates_have_status": all_candidates_have_status,
              "source_inventory_performed": True,
              "expanded_bridge_pressure_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "growth_family_candidates": GROWTH_FAMILY_CANDIDATES,
              "inventory_policy": INVENTORY_POLICY,
              "source_fetch_records": source_fetch_records,
              "candidate_inventory_records": candidate_inventory_records,
              "family_summary_records": family_summary_records,
              "next_expanded_bridge_design_requirements": NEXT_EXPANDED_BRIDGE_DESIGN_REQUIREMENTS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "source_inventory_performed": True,
                  "candidate_inventory_count": len(candidate_inventory_records),
                  "growth_family_count": non_BOSS_family_count,
                  "fetched_source_count": fetched_count,
                  "primary_candidate_count": primary_candidate_count,
                  "expanded_bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_126_growth_family_source_inventory_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "source_fetch_records_v4_126.csv",
              source_fetch_records,
              ["family_id", "candidate_id", "source_family", "url", "ok", "status", "content_type", "bytes_read", "error"]
          )

          write_csv(
              OUTDIR / "candidate_inventory_records_v4_126.csv",
              candidate_inventory_records,
              [
                  "family_id",
                  "candidate_id",
                  "z",
                  "observed_fsigma8_candidate",
                  "observed_sigma_candidate",
                  "source_family",
                  "source_url_or_locator",
                  "fetch_or_locator_status",
                  "source_fetch_ok",
                  "expected_term_score",
                  "redshift_hint_present",
                  "fsigma_hint_present",
                  "candidate_value_present",
                  "covariance_status",
                  "independence_warning",
                  "primary_bridge_decision",
                  "claim_boundary"
              ]
          )

          write_csv(
              OUTDIR / "family_summary_records_v4_126.csv",
              family_summary_records,
              ["family_id", "candidate_count", "fetched_count", "manual_or_failed_count", "candidate_value_count", "primary_candidate_count", "sensitivity_or_park_count"]
          )

          write_csv(
              OUTDIR / "inventory_policy_v4_126.csv",
              INVENTORY_POLICY,
              ["policy_id", "requirement", "reason", "applied_now"]
          )

          write_csv(
              OUTDIR / "next_expanded_bridge_design_requirements_v4_126.csv",
              NEXT_EXPANDED_BRIDGE_DESIGN_REQUIREMENTS,
              ["requirement_id", "requirement", "why_needed"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_126.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_126.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_126.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.126 — Growth Family Source Inventory Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.126 inventories non-BOSS observed-growth families after the edge-reviewed bridge stayed pressure-stable. It does not compute pressure. It records which candidates are fetched, which need manual source review, which can be primary candidates, and which stay sensitivity-only or parked.")
          md.append("")
          md.append("Candidate values are not final bridge inputs. The next move is an expanded growth bridge design that decides which candidates are primary, sensitivity-only, replaced, or parked.")
          md.append("")
          md.append("## Inventory summary")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Family summary")
          md.append("")
          md.append("| Family | Candidates | Fetched | Manual/failed | Primary candidates |")
          md.append("|---|---:|---:|---:|---:|")
          for row in family_summary_records:
              md.append(f"| `{row['family_id']}` | `{row['candidate_count']}` | `{row['fetched_count']}` | `{row['manual_or_failed_count']}` | `{row['primary_candidate_count']}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_126_growth_family_source_inventory_probe.json",
              "tairid_v4_126_growth_family_source_inventory_probe.md",
              "source_fetch_records_v4_126.csv",
              "candidate_inventory_records_v4_126.csv",
              "family_summary_records_v4_126.csv",
              "inventory_policy_v4_126.csv",
              "next_expanded_bridge_design_requirements_v4_126.csv",
              "blocked_claims_v4_126.csv",
              "next_route_options_v4_126.csv",
              "rule_results_v4_126.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_126_growth_family_source_inventory_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.126 growth family source inventory probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-126-growth-family-source-inventory-probe
          path: artifacts/tairid_v4_126_growth_family_source_inventory_probe/
