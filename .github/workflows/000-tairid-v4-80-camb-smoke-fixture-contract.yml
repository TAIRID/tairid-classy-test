name: 000 TAIRID v4.80 CAMB Smoke Fixture Contract

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-80-camb-smoke-fixture-contract.yml"

jobs:
  tairid-v4-80-camb-smoke-fixture-contract:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.80 CAMB smoke fixture contract
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_80_camb_smoke_fixture_contract

          python - <<'PY'
          import csv
          import json
          import importlib.util
          import inspect
          import platform
          import subprocess
          import sys
          import time
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_80_camb_smoke_fixture_contract")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_80_camb_smoke_fixture_contract"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This may install/import CAMB and inspect API availability only.",
              "This does not run CAMB cosmological calculations.",
              "This does not derive H0, Omega_m, sigma8, sigma8z, or fsigma8z.",
              "This designs the future CAMB smoke fixture contract against Planck sidecar point fixtures.",
              "A pass means the CAMB fixture route is bounded and ready for a later tiny fixture run, not that Planck reference uncertainty is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_79_solver_container_feasibility": {
                  "readiness_label": "solver_container_feasibility_branch_passed_ready_for_camb_smoke_fixture_or_pinned_container_or_external_extraction_route",
                  "camb_install_attempted": True,
                  "camb_install_ok": True,
                  "camb_import_ok": True,
                  "camb_version": "1.6.6",
                  "solver_cosmology_run": False,
                  "H0_derived": False,
                  "Omega_m_derived": False,
                  "sigma8_derived": False,
                  "fsigma8_derived": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_63_calculator_contract": {
                  "status": "growth calculator contract matched sidecar point outputs",
                  "calculator_pairs_checked": 110,
                  "calculator_pairs_passed": 110,
                  "reference_uncertainty_computed": False
              },
              "v4_76_1_planck_reference": {
                  "status": "Planck reference upload repair passed",
                  "sidecar_fixtures_available": True,
                  "sidecar_fixtures_are_covariance": False,
                  "reference_uncertainty_computed": False
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          CAMB_API_REQUIREMENTS = [
              {
                  "requirement_id": "camb_import_available",
                  "required_for_next_step": True,
                  "definition": "CAMB must install/import in the GitHub environment."
              },
              {
                  "requirement_id": "CAMBparams_available",
                  "required_for_next_step": True,
                  "definition": "CAMBparams must be available for later parameter construction."
              },
              {
                  "requirement_id": "set_cosmology_available",
                  "required_for_next_step": True,
                  "definition": "CAMBparams.set_cosmology must be available for later background setup."
              },
              {
                  "requirement_id": "InitPower_set_params_available",
                  "required_for_next_step": True,
                  "definition": "InitPower.set_params must be available for later As/ns setup."
              },
              {
                  "requirement_id": "get_results_available",
                  "required_for_next_step": True,
                  "definition": "camb.get_results must be available for a later tiny fixture calculation."
              },
              {
                  "requirement_id": "sigma8_interface_available",
                  "required_for_next_step": True,
                  "definition": "A later results object must be able to expose sigma8 or related matter/growth quantities."
              }
          ]

          FUTURE_SMOKE_FIXTURE_CONTRACT = [
              {
                  "stage": 1,
                  "name": "select_one_or_two_planck_sidecar_roots",
                  "implemented_now": False,
                  "required_before_uncertainty": True,
                  "purpose": "Use .minimum sidecar point fixtures as sanity targets, not covariance."
              },
              {
                  "stage": 2,
                  "name": "map_primary_parameters_to_camb_inputs",
                  "implemented_now": False,
                  "required_before_uncertainty": True,
                  "purpose": "Map omegabh2, omegach2, theta/H0-equivalent, tau, logA, ns into a valid CAMB input contract."
              },
              {
                  "stage": 3,
                  "name": "run_tiny_single_fixture",
                  "implemented_now": False,
                  "required_before_uncertainty": True,
                  "purpose": "Run one small CAMB calculation only after input mapping is locked."
              },
              {
                  "stage": 4,
                  "name": "compare_against_sidecar_point_values",
                  "implemented_now": False,
                  "required_before_uncertainty": True,
                  "purpose": "Compare sigma8z/fsigma8z point values against sidecar fixtures within a declared tolerance."
              },
              {
                  "stage": 5,
                  "name": "only_then_design_weighted_chain_route",
                  "implemented_now": False,
                  "required_before_uncertainty": True,
                  "purpose": "Do not use full Planck chains until the tiny fixture route passes."
              }
          ]

          BLOCKED_SHORTCUTS = [
              {"shortcut": "CAMB_import_means_reference_uncertainty", "status": "blocked", "reason": "Import/API availability is not a posterior covariance calculation."},
              {"shortcut": "sidecar_minimum_as_covariance", "status": "blocked", "reason": "Sidecars are point fixtures, not posterior samples."},
              {"shortcut": "theta_to_H0_without_solver_contract", "status": "blocked", "reason": "Theta/H0 conversion must be specified before any fixture run."},
              {"shortcut": "logA_to_sigma8_without_transfer", "status": "blocked", "reason": "logA is not sigma8 without transfer/growth calculation."},
              {"shortcut": "full_chain_route_before_fixture", "status": "blocked", "reason": "A tiny fixture must pass before any full-chain reference uncertainty route."}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "CAMB was used to compute fsigma8.",
              "CAMB produced cosmology outputs.",
              "H0 was derived.",
              "Omega_m was derived.",
              "sigma8 was derived.",
              "fsigma8 was derived.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_81_CAMB_single_fixture_input_contract",
                  "purpose": "Lock exact single-fixture input mapping before running CAMB.",
                  "why_next": "CAMB import/API must become a reproducible fixture path, not a fake uncertainty route."
              },
              {
                  "priority": 2,
                  "route_id": "v4_81_CAMB_tiny_fixture_run_if_input_contract_locked",
                  "purpose": "Run one tiny fixture only after parameter mapping is locked.",
                  "why_next": "Fixture validation must precede any weighted chain route."
              },
              {
                  "priority": 3,
                  "route_id": "v4_81_ELG_grid_member_probe",
                  "purpose": "Parallel route: continue parked ELG grid backlog.",
                  "why_next": "Full eBOSS remains incomplete without ELG handling."
              },
              {
                  "priority": 4,
                  "route_id": "v4_81_WiggleZ_product_locator_followup",
                  "purpose": "Parallel route: continue parked WiggleZ product-mapping backlog.",
                  "why_next": "WiggleZ remains unresolved."
              }
          ]

          failed_gates = []
          warnings = [
              "camb_smoke_fixture_contract_only",
              "no_solver_cosmology_run",
              "no_derived_cosmology_outputs",
              "no_full_chain_import",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def tail_text(value, limit=1200):
              if value is None:
                  return ""
              value = str(value)
              return value[-limit:]

          def install_and_import_camb():
              target = Path("/tmp/tairid_v4_80_camb_target")
              target.mkdir(parents=True, exist_ok=True)

              record = {
                  "package": "camb",
                  "preinstalled": False,
                  "install_attempted": False,
                  "install_ok": False,
                  "import_ok": False,
                  "version": "",
                  "timeout_seconds": 180,
                  "returncode": "",
                  "elapsed_seconds": "",
                  "stdout_tail": "",
                  "stderr_tail": "",
                  "error": ""
              }

              if importlib.util.find_spec("camb") is not None:
                  record["preinstalled"] = True
                  try:
                      import camb
                      record["import_ok"] = True
                      record["version"] = getattr(camb, "__version__", "")
                      return record, camb
                  except Exception as exc:
                      record["error"] = f"{type(exc).__name__}: {exc}"
                      return record, None

              record["install_attempted"] = True
              cmd = [
                  sys.executable,
                  "-m",
                  "pip",
                  "install",
                  "--disable-pip-version-check",
                  "--no-input",
                  "--target",
                  str(target),
                  "camb"
              ]

              start = time.time()
              try:
                  proc = subprocess.run(
                      cmd,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      text=True,
                      timeout=record["timeout_seconds"]
                  )
                  record["elapsed_seconds"] = round(time.time() - start, 3)
                  record["returncode"] = proc.returncode
                  record["stdout_tail"] = tail_text(proc.stdout)
                  record["stderr_tail"] = tail_text(proc.stderr)
                  record["install_ok"] = proc.returncode == 0

                  if record["install_ok"]:
                      sys.path.insert(0, str(target))
                      import camb
                      record["import_ok"] = True
                      record["version"] = getattr(camb, "__version__", "")
                      return record, camb

              except subprocess.TimeoutExpired as exc:
                  record["elapsed_seconds"] = round(time.time() - start, 3)
                  record["error"] = f"TimeoutExpired after {record['timeout_seconds']} seconds"
                  record["stdout_tail"] = tail_text(getattr(exc, "stdout", ""))
                  record["stderr_tail"] = tail_text(getattr(exc, "stderr", ""))

              except Exception as exc:
                  record["elapsed_seconds"] = round(time.time() - start, 3)
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record, None

          camb_record, camb_module = install_and_import_camb()

          api_records = []
          params_instantiated = False
          initpower_available = False
          set_cosmology_available = False
          get_results_available = False
          results_sigma8_interface_name = ""

          if camb_module is not None:
              try:
                  cambparams_available = hasattr(camb_module, "CAMBparams")
                  api_records.append({
                      "api_check": "CAMBparams",
                      "available": cambparams_available,
                      "notes": "Class presence only; no cosmology calculation."
                  })

                  if cambparams_available:
                      params = camb_module.CAMBparams()
                      params_instantiated = True

                      set_cosmology_available = hasattr(params, "set_cosmology")
                      api_records.append({
                          "api_check": "CAMBparams.set_cosmology",
                          "available": set_cosmology_available,
                          "notes": "Method presence only; not called."
                      })

                      initpower_available = hasattr(params, "InitPower") and hasattr(params.InitPower, "set_params")
                      api_records.append({
                          "api_check": "CAMBparams.InitPower.set_params",
                          "available": initpower_available,
                          "notes": "Method presence only; not called."
                      })

                  get_results_available = hasattr(camb_module, "get_results")
                  api_records.append({
                      "api_check": "camb.get_results",
                      "available": get_results_available,
                      "notes": "Function presence only; not called."
                  })

                  # Do not call get_results. We only record likely interface names for future fixture design.
                  results_sigma8_interface_name = "get_sigma8_or_get_sigma8_0_later_results_object"
                  api_records.append({
                      "api_check": "future_results_sigma8_interface",
                      "available": True,
                      "notes": "Deferred to later fixture run; no results object created now."
                  })

              except Exception as exc:
                  api_records.append({
                      "api_check": "api_inspection_error",
                      "available": False,
                      "notes": f"{type(exc).__name__}: {exc}"
                  })

          else:
              api_records.append({
                  "api_check": "camb_import",
                  "available": False,
                  "notes": camb_record["error"]
              })

          camb_import_ok = camb_record["import_ok"] is True
          required_api_available = (
              camb_import_ok
              and params_instantiated
              and set_cosmology_available
              and initpower_available
              and get_results_available
          )

          if UPSTREAM_LOCKS["v4_79_solver_container_feasibility"]["camb_import_ok"] is not True:
              failed_gates.append("v4_79_camb_import_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_79_solver_container_feasibility"]["solver_cosmology_run"] is not False:
              failed_gates.append("v4_79_solver_run_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_79_solver_container_feasibility"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("v4_79_reference_uncertainty_boundary_not_carried")

          if not camb_import_ok:
              failed_gates.append("camb_import_failed_in_v4_80")

          if not required_api_available:
              failed_gates.append("required_camb_api_not_available")

          if any(stage["implemented_now"] is not False for stage in FUTURE_SMOKE_FIXTURE_CONTRACT):
              failed_gates.append("future_fixture_stage_marked_implemented_too_early")

          if any(row["status"] != "blocked" for row in BLOCKED_SHORTCUTS):
              failed_gates.append("not_all_shortcuts_blocked")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "planck reference uncertainty is computed",
              "camb was used to compute fsigma8",
              "camb produced cosmology outputs",
              "full planck chains were imported",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          if required_api_available:
              route_decision = "CAMB_smoke_fixture_contract_passed_ready_for_single_fixture_input_contract"
              recommended_next = "v4_81_CAMB_single_fixture_input_contract"
          else:
              route_decision = "CAMB_smoke_fixture_contract_incomplete_use_pinned_container_or_external_route"
              recommended_next = "v4_81_pinned_solver_container_requirements_or_external_candidate_extraction"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_solver_feasibility_carried",
                  "pass": UPSTREAM_LOCKS["v4_79_solver_container_feasibility"]["camb_import_ok"] is True,
                  "result": "v4.79 CAMB import feasibility carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "camb_import_available",
                  "pass": camb_import_ok,
                  "result": f"camb_import_ok={camb_import_ok}; version={camb_record['version']}",
                  "boundary": "Import is not solver output."
              },
              {
                  "rule_id": "camb_api_contract_available",
                  "pass": required_api_available,
                  "result": f"params_instantiated={params_instantiated}; set_cosmology={set_cosmology_available}; InitPower_set_params={initpower_available}; get_results={get_results_available}",
                  "boundary": "API inspection only; no cosmology calculation."
              },
              {
                  "rule_id": "future_fixture_contract_declared",
                  "pass": len(FUTURE_SMOKE_FIXTURE_CONTRACT) >= 5,
                  "result": f"{len(FUTURE_SMOKE_FIXTURE_CONTRACT)} fixture contract stages declared",
                  "boundary": "No fixture run now."
              },
              {
                  "rule_id": "future_fixture_stages_not_implemented_now",
                  "pass": all(stage["implemented_now"] is False for stage in FUTURE_SMOKE_FIXTURE_CONTRACT),
                  "result": "all fixture stages remain future work",
                  "boundary": "No solver calculation now."
              },
              {
                  "rule_id": "blocked_shortcuts_preserved",
                  "pass": all(row["status"] == "blocked" for row in BLOCKED_SHORTCUTS),
                  "result": f"{len(BLOCKED_SHORTCUTS)} blocked shortcuts preserved",
                  "boundary": "No fake parameter conversion."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "No fsigma8 calculation."
              },
              {
                  "rule_id": "next_route_options_declared",
                  "pass": len(NEXT_ROUTE_OPTIONS) >= 4,
                  "result": f"{len(NEXT_ROUTE_OPTIONS)} next route options declared",
                  "boundary": "Future work only."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 16,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "CAMB smoke fixture contract only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_80_rules_passed")

          if failed_gates:
              readiness_label = "CAMB_smoke_fixture_contract_failed"
              next_allowed_step = "Repair CAMB smoke fixture contract or switch to pinned container/external route."
          else:
              readiness_label = "CAMB_smoke_fixture_contract_passed_ready_for_single_fixture_input_contract"
              next_allowed_step = (
                  "Proceed to v4.81 CAMB single fixture input contract. "
                  "Do not run full chains, compute Planck reference uncertainty, or compute final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "python_version": sys.version.split()[0],
              "platform": platform.platform(),
              "camb_preinstalled": camb_record["preinstalled"],
              "camb_install_attempted": camb_record["install_attempted"],
              "camb_install_ok": camb_record["install_ok"],
              "camb_import_ok": camb_record["import_ok"],
              "camb_version": camb_record["version"],
              "camb_params_instantiated": params_instantiated,
              "set_cosmology_available": set_cosmology_available,
              "InitPower_set_params_available": initpower_available,
              "get_results_available": get_results_available,
              "required_api_available": required_api_available,
              "future_results_sigma8_interface_name": results_sigma8_interface_name,
              "future_fixture_contract_stage_count": len(FUTURE_SMOKE_FIXTURE_CONTRACT),
              "blocked_shortcut_count": len(BLOCKED_SHORTCUTS),
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "next_route_option_count": len(NEXT_ROUTE_OPTIONS),
              "route_decision": route_decision,
              "recommended_next": recommended_next,
              "solver_cosmology_run": False,
              "H0_derived": False,
              "Omega_m_derived": False,
              "sigma8_derived": False,
              "fsigma8_derived": False,
              "external_reference_imported": False,
              "Planck_reference_uncertainty_computed": False,
              "full_chains_imported": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "target_redshifts": TARGET_REDSHIFTS,
              "camb_install_record": camb_record,
              "camb_api_records": api_records,
              "camb_api_requirements": CAMB_API_REQUIREMENTS,
              "future_smoke_fixture_contract": FUTURE_SMOKE_FIXTURE_CONTRACT,
              "blocked_shortcuts": BLOCKED_SHORTCUTS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "recommended_next": recommended_next,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "solver_cosmology_run": False,
                  "H0_derived": False,
                  "Omega_m_derived": False,
                  "sigma8_derived": False,
                  "fsigma8_derived": False,
                  "external_reference_imported": False,
                  "Planck_reference_uncertainty_computed": False,
                  "full_chains_imported": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_80_camb_smoke_fixture_contract.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "camb_api_records_v4_80.csv",
              api_records,
              ["api_check", "available", "notes"]
          )

          write_csv(
              OUTDIR / "camb_api_requirements_v4_80.csv",
              CAMB_API_REQUIREMENTS,
              ["requirement_id", "required_for_next_step", "definition"]
          )

          write_csv(
              OUTDIR / "future_smoke_fixture_contract_v4_80.csv",
              FUTURE_SMOKE_FIXTURE_CONTRACT,
              ["stage", "name", "implemented_now", "required_before_uncertainty", "purpose"]
          )

          write_csv(
              OUTDIR / "blocked_shortcuts_v4_80.csv",
              BLOCKED_SHORTCUTS,
