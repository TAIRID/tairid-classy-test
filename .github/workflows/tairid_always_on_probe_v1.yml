name: TAIRID Always On Probe v1

on:
  push:
  workflow_dispatch:

jobs:
  always-on-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create probe output
        run: |
          mkdir -p tairid_always_on_probe_v1_outputs
          echo "TAIRID Always On Probe v1" > tairid_always_on_probe_v1_outputs/probe_result.txt
          echo "STATUS: GitHub Actions started this workflow." >> tairid_always_on_probe_v1_outputs/probe_result.txt
          echo "UTC time: $(date -u)" >> tairid_always_on_probe_v1_outputs/probe_result.txt
          echo "Workflow: $GITHUB_WORKFLOW" >> tairid_always_on_probe_v1_outputs/probe_result.txt
          echo "Ref: $GITHUB_REF" >> tairid_always_on_probe_v1_outputs/probe_result.txt
          echo "SHA: $GITHUB_SHA" >> tairid_always_on_probe_v1_outputs/probe_result.txt
          echo "Repository files:" >> tairid_always_on_probe_v1_outputs/probe_result.txt
          ls -la >> tairid_always_on_probe_v1_outputs/probe_result.txt

      - name: Upload probe output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-always-on-probe-v1-output
          path: |
            tairid_always_on_probe_v1_outputs/**
