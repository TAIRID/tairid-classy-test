



name: Run TAIRID
refined warm corridor scan



on:

  workflow_dispatch:



jobs:

  run-refined-warm-corridor:

    runs-on: ubuntu-latest

    timeout-minutes: 240



    steps:

      - name: Check out repository

        uses: actions/checkout@v4



      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version:
"3.11"



      - name: Install system build
tools

        run: |

          sudo apt-get update

          sudo apt-get install -y
build-essential gfortran libgsl-dev



      - name: Install Python
dependencies

        run: |

          python -m pip install --upgrade
pip setuptools wheel cython numpy scipy matplotlib

          python -m pip install classy ||
python -m pip install classy-community



      - name: Run TAIRID refined warm
corridor scan

        run: |

          python
run_tairid_refined_warm_corridor_scan.py



      - name: Upload outputs

        uses:
actions/upload-artifact@v4

        with:

          name:
tairid-refined-warm-corridor-output

          path: |

            *.txt

            *.csv

            *.json

            *.png

 



