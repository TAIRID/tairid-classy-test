name: TAIRID Cosmology v3.58 Cross-AI Master Handoff and Integrated Robustness Design

on:
  workflow_dispatch:

jobs:
  cross-ai-master-handoff:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v3.58 cross-AI master handoff and integrated robustness design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_58

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v3_58")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_58_cross_ai_master_handoff_and_integrated_robustness_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior, or model comparison.",
              "This does not compute new pressure scores.",
              "This is a cross-AI handoff and larger-test design packet.",
              "The correct claim is diagnostic pattern preservation, not proof.",
              "The next larger test should be modular and source-specific, not one giant overfit."
          ]

          PREVIOUS_MILESTONE = {
              "v3_57_status": "reach_consolidation_checkpoint_handoff_passed_ready_for_new_thread_or_robustness_lane",
              "failed_gates": [],
              "v3_56_checkpoint_passed": True,
              "handoff_complete": True,
              "h0licow_direction": "reach_positive_equivalent",
              "kids_direction": "consolidation_negative",
              "bao_role": "auxiliary_mixed_ruler_boundary",
              "model_claim_allowed": False,
              "refit_allowed": False,
              "bic_allowed": False,
              "likelihood_allowed": False,
              "new_pressure_scores_built": False
          }

          LANE_MATRIX_ROWS = [
              {
                  "lane": "H0LiCOW_time_delay_reach",
                  "current_role": "source_specific_reach_diagnostic",
                  "status": "live",
                  "current_direction": "reach_positive_equivalent",
                  "key_result": "Raw negative Ddt pressure interpreted as local-H0-high-equivalent reach direction.",
                  "current_limit": "Diagnostic only; not H0 solution.",
                  "next_use_in_larger_test": "Reach-side source-specific diagnostic row."
              },
              {
                  "lane": "KiDS1000_Planck_growth",
                  "current_role": "source_specific_growth_consolidation_diagnostic",
                  "status": "live",
                  "current_direction": "consolidation_negative",
                  "key_result": "KiDS S8 q50 lower than Planck derived S8; pressure z approximately -3.290445.",
                  "current_limit": "Planck uncertainty is diagonal marginal propagation, not full covariance.",
                  "next_use_in_larger_test": "Growth-side source-specific diagnostic row."
              },
              {
                  "lane": "BAO",
                  "current_role": "auxiliary_mixed_ruler_boundary",
                  "status": "boundary_only",
                  "current_direction": "not_global_reach_anchor",
                  "key_result": "BAO showed mixed/subfamily behavior.",
                  "current_limit": "Cannot be promoted to global reach anchor.",
                  "next_use_in_larger_test": "Boundary/ruler guardrail."
              },
              {
                  "lane": "DES_HSC_growth",
                  "current_role": "growth_family_robustness",
                  "status": "needed_next",
                  "current_direction": "unknown_source_specific",
                  "key_result": "Not yet upgraded to KiDS-level source-specific parser quality.",
                  "current_limit": "Summary anchors are not enough.",
                  "next_use_in_larger_test": "Primary robustness expansion for consolidation surface."
              },
              {
                  "lane": "Planck_covariance_or_chain",
                  "current_role": "baseline_uncertainty_upgrade",
                  "status": "needed_next",
                  "current_direction": "not_a_pressure_direction",
                  "key_result": "Planck S8 baseline exists, but uncertainty should be upgraded if possible.",
                  "current_limit": "Current sigma is diagonal finite-difference from marginals.",
                  "next_use_in_larger_test": "Improve KiDS-vs-Planck pressure uncertainty."
              },
              {
                  "lane": "SH0ES_local_ladder",
                  "current_role": "local_reach_candidate",
                  "status": "parked",
                  "current_direction": "unknown_until_parser_repair",
                  "key_result": "Prior parser output was not safe enough.",
                  "current_limit": "Unlabeled numeric output cannot be used.",
                  "next_use_in_larger_test": "Repair before local-ladder reach can return."
              },
              {
                  "lane": "TDCOSMO_time_delay",
                  "current_role": "time_delay_reach_candidate",
                  "status": "parked",
                  "current_direction": "unknown_until_provenance_repair",
                  "key_result": "Seed-style rows were not safe observational anchors.",
                  "current_limit": "Needs provenance separation.",
                  "next_use_in_larger_test": "Repair before time-delay reach robustness."
              },
              {
                  "lane": "DESI_mapped_reach",
                  "current_role": "mapped_reach_candidate",
                  "status": "blocked",
                  "current_direction": "blocked",
                  "key_result": "Mapped rows showed scaled-counterpart risk.",
                  "current_limit": "Cannot be independent anchor without rebuild.",
                  "next_use_in_larger_test": "Leave blocked unless independent treatment is rebuilt."
              },
              {
                  "lane": "frozen_low_z_gate",
                  "current_role": "direct_correction_candidate",
                  "status": "locked_closed",
                  "current_direction": "rejected_as_direct_correction",
                  "key_result": "Failed as SN distance correction and BAO/CMB ruler correction.",
                  "current_limit": "Do not reuse as direct correction.",
                  "next_use_in_larger_test": "Historical failure boundary only."
              },
              {
                  "lane": "one_global_pressure_surface",
                  "current_role": "single_surface_model",
                  "status": "locked_closed",
                  "current_direction": "rejected",
                  "key_result": "Lost to separated reach/consolidation framing.",
                  "current_limit": "Do not collapse reach and growth into one correction.",
                  "next_use_in_larger_test": "Failure guardrail."
              }
          ]

          MASTER_FINDING_ROWS = [
              {
                  "finding": "The best live structure is role-specific.",
                  "meaning": "Reach/geometry and growth/consolidation should not be forced into one correction surface.",
                  "cross_ai_question": "Does this separation reduce overfitting, or is it only relabeling known tensions?"
              },
              {
                  "finding": "Source-specific parsing improved the project.",
                  "meaning": "KiDS and Planck became more useful when parsed from real products rather than summary anchors.",
                  "cross_ai_question": "Are the parser assumptions, weighting, and uncertainty handling defensible?"
              },
              {
                  "finding": "The current pattern is diagnostic, not proof.",
                  "meaning": "H0LiCOW gives reach-positive-equivalent direction; KiDS/Planck gives consolidation-negative direction.",
                  "cross_ai_question": "What would falsify this pattern or make it less interesting?"
              },
              {
                  "finding": "The book logic is starting to become test design.",
                  "meaning": "Boundary, reach, propagation, consolidation, and surface roles are becoming operational sorting rules.",
                  "cross_ai_question": "Is the translation from philosophy to observable lanes coherent or too flexible?"
              },
              {
                  "finding": "Guardrails prevented false victory.",
                  "meaning": "Frozen gate, SN threshold, BAO global anchor, one-surface framing, and validation claims were blocked.",
                  "cross_ai_question": "Are there additional claims that should be blocked before the larger test?"
              }
          ]

          V4_MODULE_ROWS = [
              {
                  "module": "Module_A_DES_HSC_growth_family_repair",
                  "purpose": "Upgrade DES and HSC growth data into source-specific parser-quality ledgers or explicitly preserve them as blocked.",
                  "inputs_needed": "Direct DES/HSC chain, covariance, data-vector, posterior, or official product URLs.",
                  "success_condition": "At least one additional growth family reaches KiDS-like source-specific quality.",
                  "failure_condition": "Only summary anchors or context pages are found.",
                  "truth_boundary": "Growth-family robustness only, not validation."
              },
              {
                  "module": "Module_B_Planck_covariance_or_chain_upgrade",
                  "purpose": "Improve Planck S8 uncertainty beyond diagonal marginal propagation.",
                  "inputs_needed": "Planck covariance or chain products containing sigma8 and Omega_m or direct S8 posterior.",
                  "success_condition": "Derived S8 uncertainty is upgraded or current diagonal limit is confirmed as provisional.",
                  "failure_condition": "No usable covariance/chain source is found.",
                  "truth_boundary": "Uncertainty upgrade only, not new physics."
              },
              {
                  "module": "Module_C_time_delay_reach_robustness",
                  "purpose": "Test whether time-delay reach behavior survives beyond H0LiCOW after provenance repair.",
                  "inputs_needed": "TDCOSMO observational products separated from seed/style rows.",
                  "success_condition": "A safe source-specific time-delay reach row is built or the lane remains cleanly blocked.",
                  "failure_condition": "Provenance remains ambiguous.",
                  "truth_boundary": "Reach robustness only, not H0 solution."
              },
              {
                  "module": "Module_D_local_ladder_reach_repair",
                  "purpose": "Repair SH0ES local-ladder parsing so local reach can be tested safely.",
                  "inputs_needed": "Clearly labeled SH0ES or Pantheon+/SH0ES source products.",
                  "success_condition": "Safe local-ladder reach row or explicit continued block.",
                  "failure_condition": "Unlabeled numeric output or ambiguous provenance.",
                  "truth_boundary": "Parser repair only, not H0 solution."
              },
              {
                  "module": "Module_E_BAO_boundary_reaudit",
                  "purpose": "Keep BAO as mixed/ruler boundary and check whether any subfamily can be safely role-specific.",
                  "inputs_needed": "BAO products with role-specific separation.",
                  "success_condition": "BAO remains correctly bounded or a narrow subfamily role is identified.",
                  "failure_condition": "BAO is incorrectly promoted to global reach anchor.",
                  "truth_boundary": "Boundary audit only."
              },
              {
                  "module": "Module_F_integrated_checkpoint",
                  "purpose": "After modules A-E, build a guarded integrated checkpoint without BIC, likelihood, refit, or validation claim.",
                  "inputs_needed": "Only reviewed source-specific rows and explicit blocked lanes.",
                  "success_condition": "Reach/consolidation separation survives broader source-specific robustness.",
                  "failure_condition": "The pattern collapses, reverses, becomes ambiguous, or depends on unsafe products.",
                  "truth_boundary": "Diagnostic checkpoint only."
              }
          ]

          CROSS_AI_REVIEW_PROMPT = """You are reviewing a TAIRID cosmology testing handoff. Treat this as a diagnostic research audit, not a proof.

          Core truth boundary:
          - TAIRID is not validated.
          - H0 is not solved.
          - New physics is not proven.
          - Standard cosmology is not disproven.
          - No refit, BIC, likelihood, posterior, or full model comparison has been run.
          - The current result is a guarded diagnostic pattern: reach-positive-equivalent H0LiCOW and consolidation-negative KiDS/Planck, with BAO preserved as auxiliary mixed/ruler boundary.

          Current live rows:
          1. H0LiCOW time-delay reach:
             - raw Ddt pressure was negative relative to Planck reference
             - normalized as reach_positive_equivalent
             - diagnostic only

          2. KiDS-1000 / Planck growth:
             - KiDS weighted S8 q50 = 0.764565
             - Planck derived S8 = 0.8340746027338657
             - guarded pressure z = -3.290445079818788
             - direction = negative_consolidation_growth_pressure
             - diagnostic only

          3. BAO:
             - mixed/subfamily behavior
             - auxiliary ruler/boundary only
             - not a global reach anchor

          Locked closed:
          - frozen low-z gate as direct correction
          - SN threshold activation claim
          - one global pressure surface
          - BAO as global reach anchor
          - DESI mapped reach as independent anchor

          Parked:
          - SH0ES parser repair
          - TDCOSMO provenance repair

          Your review task:
          1. Identify the strongest reasons this could still be wrong.
          2. Identify whether the reach/consolidation split is a useful operational distinction or just relabeling.
          3. Check whether KiDS/Planck uncertainty handling is too weak without full covariance.
          4. Check whether H0LiCOW sign normalization is coherent.
          5. Suggest what data products should be used next for DES, HSC, Planck covariance/chains, SH0ES, and TDCOSMO.
          6. Propose falsification or failure criteria for the larger integrated robustness test.
          7. Do not claim TAIRID is proven.
          """

          COPY_PASTE_START_V4 = """TAIRID COSMOLOGY v4.0 START / INTEGRATED ROBUSTNESS HARNESS

          Start from v3.58 cross-AI master handoff.

          Current live diagnostic pattern:
          - H0LiCOW = source-specific reach diagnostic, normalized as reach_positive_equivalent.
          - KiDS-1000 / Planck = source-specific growth/consolidation diagnostic, negative_consolidation_growth_pressure.
          - BAO = auxiliary mixed/ruler boundary, not global reach anchor.

          Key numbers:
          - H0LiCOW mean raw Ddt pressure z: -1.6268644558220158, normalized to reach_positive_equivalent.
          - KiDS S8 q50: 0.764565.
          - Planck derived S8: 0.8340746027338657.
          - KiDS/Planck pressure z: -3.290445079818788.
          - Direction: negative_consolidation_growth_pressure.

          Locked closed:
          - frozen low-z gate as direct correction
          - SN threshold activation claim
          - one global pressure surface
          - BAO as global reach anchor
          - DESI mapped reach as independent anchor

          Parked:
          - SH0ES parser repair
          - TDCOSMO provenance repair

          Larger test goal:
          Build a modular integrated robustness harness that checks whether the reach/consolidation split survives better source-specific data across multiple families.

          Do not run one giant refit yet.
          Do not compute BIC or likelihood yet.
          Do not claim validation.
          Do not use summary anchors where source-specific products are needed.

          Recommended module order:
          1. DES/HSC growth product repair.
          2. Planck covariance or chain upgrade.
          3. TDCOSMO provenance repair.
          4. SH0ES parser repair.
          5. BAO boundary re-audit.
          6. Integrated diagnostic checkpoint.

          Main question:
          Does the role-specific pattern survive broader source-specific robustness testing, or does it collapse once more families and better covariance handling are added?
          """

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          created_at = now_iso()

          write_csv(
              OUTDIR / "cross_ai_lane_matrix_v3_58.csv",
              LANE_MATRIX_ROWS,
              ["lane", "current_role", "status", "current_direction", "key_result", "current_limit", "next_use_in_larger_test"]
          )

          write_csv(
              OUTDIR / "cross_ai_master_findings_v3_58.csv",
              MASTER_FINDING_ROWS,
              ["finding", "meaning", "cross_ai_question"]
          )

          write_csv(
              OUTDIR / "v4_integrated_robustness_harness_modules_v3_58.csv",
              V4_MODULE_ROWS,
              ["module", "purpose", "inputs_needed", "success_condition", "failure_condition", "truth_boundary"]
          )

          (OUTDIR / "EXTERNAL_AI_REVIEW_PROMPT_v3_58.md").write_text(CROSS_AI_REVIEW_PROMPT, encoding="utf-8")
          (OUTDIR / "COPY_PASTE_START_V4_0_INTEGRATED_ROBUSTNESS_HARNESS.md").write_text(COPY_PASTE_START_V4, encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.58 — Cross-AI Master Handoff and Integrated Robustness Design")
          md.append("")
          md.append(f"Created UTC: `{created_at}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append("Readiness target: `cross_ai_master_handoff_ready_for_v4_integrated_robustness_harness`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## Why this handoff exists")
          md.append("")
          md.append("v3.57 was enough to continue the project. v3.58 makes the handoff portable enough for another AI to audit from a different angle and turns the next step into a larger integrated robustness harness.")
          md.append("")
          md.append("## Live diagnostic pattern")
          md.append("")
          md.append("| Lane | Role | Direction | Limit |")
          md.append("|---|---|---|---|")
          md.append("| H0LiCOW | source-specific reach diagnostic | reach_positive_equivalent | not H0 solution |")
          md.append("| KiDS-1000 / Planck | source-specific growth diagnostic | consolidation_negative | not validation; Planck covariance upgrade needed |")
          md.append("| BAO | auxiliary mixed/ruler boundary | not_global_reach_anchor | not global reach anchor |")
          md.append("")
          md.append("## Larger test design")
          md.append("")
          md.append("The next larger test should be modular. It should incorporate everything learned without pretending the current diagnostic rows are a full model.")
          md.append("")
          md.append("| Module | Purpose |")
          md.append("|---|---|")
          for row in V4_MODULE_ROWS:
              md.append(f"| `{row['module']}` | {row['purpose']} |")
          md.append("")
          md.append("## Cross-AI review questions")
          md.append("")
          for row in MASTER_FINDING_ROWS:
              md.append(f"- **{row['finding']}** {row['cross_ai_question']}")
          md.append("")
          md.append("## Recommended next move")
          md.append("")
          md.append("Start v4.0 from `COPY_PASTE_START_V4_0_INTEGRATED_ROBUSTNESS_HARNESS.md`, then begin with Module A: DES/HSC growth product repair, unless the reviewer argues Planck covariance should come first.")
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `cross_ai_lane_matrix_v3_58.csv`")
          md.append("- `cross_ai_master_findings_v3_58.csv`")
          md.append("- `v4_integrated_robustness_harness_modules_v3_58.csv`")
          md.append("- `EXTERNAL_AI_REVIEW_PROMPT_v3_58.md`")
          md.append("- `COPY_PASTE_START_V4_0_INTEGRATED_ROBUSTNESS_HARNESS.md`")
          md.append("- `tairid_cosmology_v3_58_cross_ai_master_handoff_and_integrated_robustness_design.json`")
          md.append("- `tairid_cosmology_v3_58_cross_ai_master_handoff_and_integrated_robustness_design.md`")

          md_path = OUTDIR / "tairid_cosmology_v3_58_cross_ai_master_handoff_and_integrated_robustness_design.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          sections_present = {
              "truth_boundary": len(TRUTH_BOUNDARY) >= 10,
              "lane_matrix": len(LANE_MATRIX_ROWS) >= 10,
              "master_findings": len(MASTER_FINDING_ROWS) >= 5,
              "v4_modules": len(V4_MODULE_ROWS) >= 6,
              "external_ai_prompt": "Your review task" in CROSS_AI_REVIEW_PROMPT,
              "v4_start_prompt": "TAIRID COSMOLOGY v4.0 START" in COPY_PASTE_START_V4
          }

          closed_paths_preserved = all(
              any(row["lane"] == lane and row["status"] == "locked_closed" for row in LANE_MATRIX_ROWS)
              for lane in ["frozen_low_z_gate", "one_global_pressure_surface"]
          )

          parked_and_blocked_preserved = all(
              any(row["lane"] == lane and row["status"] in ["parked", "blocked"] for row in LANE_MATRIX_ROWS)
              for lane in ["SH0ES_local_ladder", "TDCOSMO_time_delay", "DESI_mapped_reach"]
          )

          no_refit = True
          no_bic = True
          no_likelihood = True
          no_new_pressure_scores = True
          model_claim_allowed = False

          hard_failed = []

          if not all(sections_present.values()):
              hard_failed.append("required_cross_ai_sections_missing")
          if not closed_paths_preserved:
              hard_failed.append("closed_paths_not_preserved")
          if not parked_and_blocked_preserved:
              hard_failed.append("parked_or_blocked_lanes_not_preserved")
          if not (no_refit and no_bic and no_likelihood and no_new_pressure_scores):
              hard_failed.append("handoff_action_guard_violation")

          if hard_failed:
              readiness_label = "cross_ai_master_handoff_needs_followup"
          else:
              readiness_label = "cross_ai_master_handoff_passed_ready_for_v4_integrated_robustness_harness"

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "previous_milestone": PREVIOUS_MILESTONE,
              "truth_boundary": TRUTH_BOUNDARY,
              "sections_present": sections_present,
              "closed_paths_preserved": closed_paths_preserved,
              "parked_and_blocked_preserved": parked_and_blocked_preserved,
              "lane_count": len(LANE_MATRIX_ROWS),
              "v4_module_count": len(V4_MODULE_ROWS),
              "gate_result": {
                  "failed_gates": hard_failed,
                  "readiness_label": readiness_label,
                  "cross_ai_handoff_complete": not hard_failed,
                  "larger_test_defined": len(V4_MODULE_ROWS) >= 6,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "new_pressure_scores_built": False,
                  "recommended_next_step": "Use EXTERNAL_AI_REVIEW_PROMPT_v3_58.md for cross-AI review, then start v4.0 integrated robustness harness from COPY_PASTE_START_V4_0_INTEGRATED_ROBUSTNESS_HARNESS.md."
              }
          }

          json_path = OUTDIR / "tairid_cosmology_v3_58_cross_ai_master_handoff_and_integrated_robustness_design.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          audit_rows = [
              {
                  "audit_gate": "required_sections_present",
                  "pass": all(sections_present.values()),
                  "value": json.dumps(sections_present, sort_keys=True),
                  "boundary": "Cross-AI handoff must include lane matrix, findings, larger-test modules, and prompts."
              },
              {
                  "audit_gate": "closed_paths_preserved",
                  "pass": closed_paths_preserved,
                  "value": closed_paths_preserved,
                  "boundary": "Failed paths must stay closed."
              },
              {
                  "audit_gate": "parked_and_blocked_lanes_preserved",
                  "pass": parked_and_blocked_preserved,
                  "value": parked_and_blocked_preserved,
                  "boundary": "Parked/blocked lanes must not be silently reactivated."
              },
              {
                  "audit_gate": "larger_test_defined",
                  "pass": len(V4_MODULE_ROWS) >= 6,
                  "value": len(V4_MODULE_ROWS),
                  "boundary": "The handoff must point to an integrated robustness harness."
              },
              {
                  "audit_gate": "no_refit_bic_likelihood_or_new_score",
                  "pass": no_refit and no_bic and no_likelihood and no_new_pressure_scores,
                  "value": f"refit={no_refit}; bic={no_bic}; likelihood={no_likelihood}; new_scores={no_new_pressure_scores}",
                  "boundary": "v3.58 is handoff/design only."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": model_claim_allowed,
                  "boundary": "No model claim is allowed."
              }
          ]

          write_csv(
              OUTDIR / "cross_ai_master_handoff_audit_v3_58.csv",
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if hard_failed:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.58 cross-AI master handoff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-58-cross-ai-master-handoff-and-integrated-robustness-design
          path: artifacts/tairid_cosmology_v3_58/
