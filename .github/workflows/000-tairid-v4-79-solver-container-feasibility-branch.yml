name: 000 TAIRID v4.79 Solver Container Feasibility Branch

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-79-solver-container-feasibility-branch.yml"

jobs:
  tairid-v4-79-solver-container-feasibility-branch:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.79 solver container feasibility branch
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_79_solver_container_feasibility_branch

          python - <<'PY'
          import csv
          import json
          import importlib.util
          import platform
          import shutil
          import subprocess
          import sys
          import time
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_79_solver_container_feasibility_branch")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_79_solver_container_feasibility_branch"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This may attempt a guarded package install/import feasibility probe for CAMB only.",
              "This does not run CAMB/CLASS cosmology calculations.",
              "This does not derive H0, Omega_m, sigma8, sigma8z, or fsigma8z.",
              "A pass means the solver/container route is bounded, not that Planck reference uncertainty is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_77_sprint_end_handoff": {
                  "readiness_label": "sprint_end_handoff_passed_ready_for_next_sprint_Planck_reference_ELG_WiggleZ_or_independence_routes",
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_78_external_candidate_deep_review": {
                  "readiness_label": "Planck_external_candidate_deep_review_passed_ready_for_solver_container_branch_or_candidate_extraction_probe",
                  "high_priority_candidate_count": 0,
                  "medium_priority_candidate_count": 0,
                  "accepted_reference_uncertainty_now_count": 0,
                  "Planck_reference_uncertainty_computed": False,
                  "recommended_next": "v4_79_solver_container_feasibility_branch"
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          SOLVER_FEASIBILITY_REQUIREMENTS = [
              {
                  "requirement_id": "install_or_import_solver",
                  "required_before_reference_uncertainty": True,
                  "definition": "A solver route must install/import a trusted solver package or use a pinned container."
              },
              {
                  "requirement_id": "no_cosmology_run_in_feasibility_step",
                  "required_before_reference_uncertainty": True,
                  "definition": "This step may import a solver, but must not run cosmological calculations."
              },
              {
                  "requirement_id": "fixture_validation_required_later",
                  "required_before_reference_uncertainty": True,
                  "definition": "Any future solver output must validate against Planck .minimum sidecar point fixtures before uncertainty use."
              },
              {
                  "requirement_id": "full_chain_streaming_required_later",
                  "required_before_reference_uncertainty": True,
                  "definition": "Reference uncertainty eventually requires weighted chain/sample handling or verified covariance."
              },
              {
                  "requirement_id": "no_fake_primary_shortcuts",
                  "required_before_reference_uncertainty": True,
                  "definition": "Do not fake H0 from theta, sigma8 from logA, or Omega_m from physical densities without solver/background logic."
              }
          ]

          ROUTE_OPTIONS_AFTER_FEASIBILITY = [
              {
                  "route_id": "A_CAMB_import_smoke_fixture_design",
                  "status": "available_only_if_camb_import_succeeds",
                  "purpose": "Design a tiny later smoke test against Planck sidecar point fixtures without full chains.",
                  "final_pressure_allowed_now": False
              },
              {
                  "route_id": "B_pinned_solver_container_route",
                  "status": "valid_if_package_install_is_unstable",
                  "purpose": "Use a pinned container or prebuilt solver environment instead of ad hoc pip install.",
                  "final_pressure_allowed_now": False
              },
              {
                  "route_id": "C_external_candidate_extraction_probe",
                  "status": "valid_parallel_route",
                  "purpose": "If solver route is heavy, inspect candidate sources for data/code/covariance links.",
                  "final_pressure_allowed_now": False
              },
              {
                  "route_id": "D_return_to_ELG_WiggleZ_backlogs",
                  "status": "valid_parallel_route",
                  "purpose": "Continue ELG grid-member probe or WiggleZ product locator while Planck solver route remains bounded.",
                  "final_pressure_allowed_now": False
              }
          ]

          BLOCKED_SHORTCUTS = [
              {"shortcut": "theta_to_H0_without_solver", "status": "blocked", "reason": "Theta is not H0 without background/acoustic-scale solving."},
              {"shortcut": "logA_to_sigma8_without_solver", "status": "blocked", "reason": "logA is not sigma8 without transfer/growth calculation."},
              {"shortcut": "omegabh2_plus_omegach2_equals_omegam", "status": "blocked", "reason": "Physical densities need h before conversion into Omega_m."},
              {"shortcut": "sidecar_minimum_as_covariance", "status": "blocked", "reason": "Sidecars are point fixtures, not posterior covariance."},
              {"shortcut": "solver_import_means_reference_uncertainty", "status": "blocked", "reason": "Import feasibility is not a covariance calculation."}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "CAMB/CLASS was used to compute fsigma8.",
              "A solver produced cosmology outputs.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "An external source was accepted as Planck RSD covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          failed_gates = []
          warnings = [
              "solver_container_feasibility_only",
              "package_install_success_is_not_reference_uncertainty",
              "no_solver_cosmology_run",
              "no_full_chain_import",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def tail_text(value, limit=1200):
              if value is None:
                  return ""
              value = str(value)
              return value[-limit:]

          def import_package_version(package_name, extra_path=None):
              if extra_path:
                  sys.path.insert(0, str(extra_path))

              try:
                  module = __import__(package_name)
                  version = getattr(module, "__version__", "")
                  return True, version, ""
              except Exception as exc:
                  return False, "", f"{type(exc).__name__}: {exc}"

          def attempt_camb_install():
              target = Path("/tmp/tairid_v4_79_camb_target")
              target.mkdir(parents=True, exist_ok=True)

              record = {
                  "package": "camb",
                  "role": "Boltzmann/background solver candidate",
                  "preinstalled": False,
                  "install_attempted": False,
                  "install_ok": False,
                  "import_ok": False,
                  "version": "",
                  "timeout_seconds": 180,
                  "returncode": "",
                  "elapsed_seconds": "",
                  "stdout_tail": "",
                  "stderr_tail": "",
                  "error": ""
              }

              pre_spec = importlib.util.find_spec("camb")
              if pre_spec is not None:
                  record["preinstalled"] = True
                  ok, version, err = import_package_version("camb")
                  record["import_ok"] = ok
                  record["version"] = version
                  record["error"] = err
                  return record

              record["install_attempted"] = True
              cmd = [
                  sys.executable,
                  "-m",
                  "pip",
                  "install",
                  "--disable-pip-version-check",
                  "--no-input",
                  "--target",
                  str(target),
                  "camb"
              ]

              start = time.time()
              try:
                  proc = subprocess.run(
                      cmd,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      text=True,
                      timeout=record["timeout_seconds"]
                  )
                  elapsed = time.time() - start
                  record["elapsed_seconds"] = round(elapsed, 3)
                  record["returncode"] = proc.returncode
                  record["stdout_tail"] = tail_text(proc.stdout)
                  record["stderr_tail"] = tail_text(proc.stderr)
                  record["install_ok"] = proc.returncode == 0

                  if record["install_ok"]:
                      ok, version, err = import_package_version("camb", extra_path=target)
                      record["import_ok"] = ok
                      record["version"] = version
                      record["error"] = err

              except subprocess.TimeoutExpired as exc:
                  elapsed = time.time() - start
                  record["elapsed_seconds"] = round(elapsed, 3)
                  record["error"] = f"TimeoutExpired after {record['timeout_seconds']} seconds"
                  record["stdout_tail"] = tail_text(getattr(exc, "stdout", ""))
                  record["stderr_tail"] = tail_text(getattr(exc, "stderr", ""))

              except Exception as exc:
                  elapsed = time.time() - start
                  record["elapsed_seconds"] = round(elapsed, 3)
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record

          camb_record = attempt_camb_install()

          container_records = [
              {
                  "component": "docker_cli",
                  "available": shutil.which("docker") is not None,
                  "purpose": "Possible future pinned solver container route.",
                  "used_now": False,
                  "note": "Availability only; no container is pulled or run."
              },
              {
                  "component": "podman_cli",
                  "available": shutil.which("podman") is not None,
                  "purpose": "Alternative future container runtime.",
                  "used_now": False,
                  "note": "Availability only; no container is pulled or run."
              }
          ]

          platform_record = {
              "python_version": sys.version.split()[0],
              "platform": platform.platform(),
              "machine": platform.machine(),
              "processor": platform.processor(),
              "implementation": platform.python_implementation()
          }

          camb_available_for_future = camb_record["import_ok"] is True
          docker_available = any(row["component"] == "docker_cli" and row["available"] is True for row in container_records)

          if UPSTREAM_LOCKS["v4_78_external_candidate_deep_review"]["accepted_reference_uncertainty_now_count"] != 0:
              failed_gates.append("external_reference_accepted_too_early")

          if UPSTREAM_LOCKS["v4_78_external_candidate_deep_review"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("v4_78_reference_uncertainty_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_77_sprint_end_handoff"]["final_RSD_pressure_score_computed"] is not False:
              failed_gates.append("v4_77_final_pressure_boundary_not_carried")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          if len(SOLVER_FEASIBILITY_REQUIREMENTS) < 5:
              failed_gates.append("solver_requirements_incomplete")

          if len(ROUTE_OPTIONS_AFTER_FEASIBILITY) < 4:
              failed_gates.append("route_options_after_feasibility_incomplete")

          if any(row["status"] != "blocked" for row in BLOCKED_SHORTCUTS):
              failed_gates.append("not_all_shortcuts_blocked")

          if any(row["final_pressure_allowed_now"] is not False for row in ROUTE_OPTIONS_AFTER_FEASIBILITY):
              failed_gates.append("route_option_allows_final_pressure_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "planck reference uncertainty is computed",
              "solver produced cosmology outputs",
              "full planck chains were imported",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "combined growth covariance",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          if camb_available_for_future:
              route_decision = "solver_container_feasibility_passed_camb_import_available_ready_for_camb_smoke_fixture_design"
              recommended_next = "v4_80_Camb_smoke_fixture_design_without_full_chains"
          elif docker_available:
              route_decision = "solver_container_feasibility_passed_no_camb_import_but_container_runtime_available_ready_for_pinned_container_route"
              recommended_next = "v4_80_pinned_solver_container_requirements"
          else:
              route_decision = "solver_container_feasibility_passed_no_solver_available_ready_for_external_candidate_extraction_or_ELG_WiggleZ_backlogs"
              recommended_next = "v4_80_external_candidate_extraction_probe_or_ELG_grid_member_probe"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_reference_boundary_carried",
                  "pass": UPSTREAM_LOCKS["v4_78_external_candidate_deep_review"]["Planck_reference_uncertainty_computed"] is False,
                  "result": "Planck reference uncertainty remains missing from v4.78",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "camb_install_or_import_probe_recorded",
                  "pass": True,
                  "result": f"camb_import_ok={camb_record['import_ok']}; install_attempted={camb_record['install_attempted']}",
                  "boundary": "Install/import feasibility only; no solver calculation."
              },
              {
                  "rule_id": "container_runtime_status_recorded",
                  "pass": True,
                  "result": f"docker_available={docker_available}",
                  "boundary": "No container is pulled or run."
              },
              {
                  "rule_id": "no_solver_cosmology_outputs",
                  "pass": True,
                  "result": "no_H0_no_Omega_m_no_sigma8_no_fsigma8_outputs_computed",
                  "boundary": "Solver feasibility only."
              },
              {
                  "rule_id": "solver_requirements_declared",
                  "pass": len(SOLVER_FEASIBILITY_REQUIREMENTS) >= 5,
                  "result": f"{len(SOLVER_FEASIBILITY_REQUIREMENTS)} solver feasibility requirements declared",
                  "boundary": "No reference covariance."
              },
              {
                  "rule_id": "blocked_shortcuts_preserved",
                  "pass": all(row["status"] == "blocked" for row in BLOCKED_SHORTCUTS),
                  "result": f"{len(BLOCKED_SHORTCUTS)} blocked shortcuts preserved",
                  "boundary": "No fake parameter conversion."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "No fsigma8 calculation."
              },
              {
                  "rule_id": "route_options_declared",
                  "pass": len(ROUTE_OPTIONS_AFTER_FEASIBILITY) >= 4,
                  "result": f"{len(ROUTE_OPTIONS_AFTER_FEASIBILITY)} route options declared",
                  "boundary": "Future work only."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 13,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Solver/container feasibility only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_79_rules_passed")

          if failed_gates:
              readiness_label = "solver_container_feasibility_branch_failed"
              next_allowed_step = "Repair solver/container feasibility audit before solver smoke testing or route selection."
          else:
              readiness_label = "solver_container_feasibility_branch_passed_ready_for_camb_smoke_fixture_or_pinned_container_or_external_extraction_route"
              next_allowed_step = (
                  f"Proceed to {recommended_next}. "
                  "Do not compute Planck reference uncertainty or final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "python_version": platform_record["python_version"],
              "platform": platform_record["platform"],
              "camb_preinstalled": camb_record["preinstalled"],
              "camb_install_attempted": camb_record["install_attempted"],
              "camb_install_ok": camb_record["install_ok"],
              "camb_import_ok": camb_record["import_ok"],
              "camb_version": camb_record["version"],
              "docker_available": docker_available,
              "solver_feasible_for_future_smoke_test": camb_available_for_future,
              "container_route_available_for_future": docker_available,
              "solver_requirements_count": len(SOLVER_FEASIBILITY_REQUIREMENTS),
              "blocked_shortcut_count": len(BLOCKED_SHORTCUTS),
              "route_option_count": len(ROUTE_OPTIONS_AFTER_FEASIBILITY),
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "route_decision": route_decision,
              "recommended_next": recommended_next,
              "solver_cosmology_run": False,
              "H0_derived": False,
              "Omega_m_derived": False,
              "sigma8_derived": False,
              "fsigma8_derived": False,
              "external_reference_imported": False,
              "Planck_reference_uncertainty_computed": False,
              "full_chains_imported": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "platform_record": platform_record,
              "target_redshifts": TARGET_REDSHIFTS,
              "solver_install_records": [camb_record],
              "container_probe_records": container_records,
              "solver_feasibility_requirements": SOLVER_FEASIBILITY_REQUIREMENTS,
              "route_options_after_feasibility": ROUTE_OPTIONS_AFTER_FEASIBILITY,
              "blocked_shortcuts": BLOCKED_SHORTCUTS,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "recommended_next": recommended_next,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "solver_cosmology_run": False,
                  "H0_derived": False,
                  "Omega_m_derived": False,
                  "sigma8_derived": False,
                  "fsigma8_derived": False,
                  "external_reference_imported": False,
                  "Planck_reference_uncertainty_computed": False,
                  "full_chains_imported": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_79_solver_container_feasibility_branch.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "solver_install_records_v4_79.csv",
              [camb_record],
              [
                  "package",
                  "role",
                  "preinstalled",
                  "install_attempted",
                  "install_ok",
                  "import_ok",
                  "version",
                  "timeout_seconds",
                  "returncode",
                  "elapsed_seconds",
                  "stdout_tail",
                  "stderr_tail",
                  "error"
              ]
          )

          write_csv(
              OUTDIR / "container_probe_records_v4_79.csv",
              container_records,
              ["component", "available", "purpose", "used_now", "note"]
          )

          write_csv(
              OUTDIR / "solver_feasibility_requirements_v4_79.csv",
              SOLVER_FEASIBILITY_REQUIREMENTS,
              ["requirement_id", "required_before_reference_uncertainty", "definition"]
          )

          write_csv(
              OUTDIR / "route_options_after_feasibility_v4_79.csv",
              ROUTE_OPTIONS_AFTER_FEASIBILITY,
              ["route_id", "status", "purpose", "final_pressure_allowed_now"]
          )

          write_csv(
              OUTDIR / "blocked_shortcuts_v4_79.csv",
              BLOCKED_SHORTCUTS,
              ["shortcut", "status", "reason"]
          )

          write_csv(
              OUTDIR / "target_redshifts_v4_79.csv",
              TARGET_REDSHIFTS,
              ["z_key", "z", "fsigma8_name", "sigma8z_name"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_79.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_79.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.79 — Solver Container Feasibility Branch")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This test checks whether the Planck solver route is feasible inside GitHub without running a cosmology calculation.")
          md.append("")
          md.append("It may attempt a guarded CAMB package install/import probe. It does not derive H0, Omega_m, sigma8, sigma8z, or fsigma8z.")
          md.append("")
          md.append("It does not compute Planck reference uncertainty, compute final RSD pressure, import full chains, or validate TAIRID.")
          md.append("")
          md.append("## Solver feasibility summary")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          md.append(f"| `camb_preinstalled` | `{camb_record['preinstalled']}` |")
          md.append(f"| `camb_install_attempted` | `{camb_record['install_attempted']}` |")
          md.append(f"| `camb_install_ok` | `{camb_record['install_ok']}` |")
          md.append(f"| `camb_import_ok` | `{camb_record['import_ok']}` |")
          md.append(f"| `camb_version` | `{camb_record['version']}` |")
