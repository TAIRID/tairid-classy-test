name: "!!! AAA CURRENT - TAIRID v4.325C SDSS RSD human review no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-325c-human-review-packet-no-scoring:
    name: "!!! AAA CURRENT - Run v4.325C no-scoring human review packet"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Confirm required files and find v4.324 ZIP
        run: |
          echo "Current directory:"
          pwd

          echo "Repository root files:"
          ls -la

          echo "Checking Python script..."
          if [ ! -f "run_tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring.py" ]; then
            echo "Missing Python script:"
            echo "run_tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring.py"
            exit 1
          fi

          echo "Finding v4.324 input ZIP by pattern..."
          INPUT_ZIP="$(ls tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_ZIP" ]; then
            echo "Could not find a v4.324 input ZIP."
            echo "Expected a file like:"
            echo "tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output.zip"
            echo "or:"
            echo "tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output-2.zip"
            exit 1
          fi

          echo "Found input ZIP:"
          echo "$INPUT_ZIP"

          echo "INPUT_ZIP=$INPUT_ZIP" >> "$GITHUB_ENV"

      - name: Run v4.325C no-scoring human review packet builder
        run: |
          echo "Using input ZIP: $INPUT_ZIP"

          python run_tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring.py \
            --input "$INPUT_ZIP" \
            --output-dir tairid_v4_325c_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring_output

      - name: Upload v4.325C no-scoring output artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-325c-sdss-rsd-numeric-baseline-parameter-human-review-packet-no-scoring-output
          path: |
            tairid_v4_325c_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring_output/
            tairid_v4_325c_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring_output.zip
