name: TAIRID v4.30 RSD Covariance Requirements Audit

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-30-rsd-covariance-requirements-audit.yml"

jobs:
  tairid-v4-30-rsd-covariance-requirements-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.30 RSD covariance requirements audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_30_rsd_covariance_requirements_audit

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_30_rsd_covariance_requirements_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_30_rsd_covariance_requirements_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine RSD, weak lensing, clusters, CMB lensing, KiDS, DES, HSC, H0LiCOW, BAO, or CMB into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run an RSD likelihood.",
              "This does not compute a final RSD pressure score.",
              "This does not import an RSD covariance matrix.",
              "This audits what covariance-aware RSD testing would require after the v4.29 non-final residual preview.",
              "A pass means covariance requirements are defined, not that TAIRID cosmology is validated."
          ]

          PRIOR_PREVIEW_SUMMARY = {
              "source_artifact": "v4.29 RSD non-final residual preview with eBOSS",
              "preview_row_count": 9,
              "negative_residual_count": 6,
              "positive_residual_count": 3,
              "zero_residual_count": 0,
              "mean_residual_observed_minus_reference": -0.02528604359373852,
              "mean_diagonal_z_preview": -0.27599097811737866,
              "preview_pattern": "mostly_negative_nonfinal_residual_preview_with_eBOSS",
              "covariance_used": False,
              "reference_uncertainty_included": False,
              "final_pressure_score_built": False,
              "allowed_status": "directional_preview_only"
          }

          SURVEY_FAMILY_REQUIREMENTS = [
              {
                  "survey_family": "BOSS_DR12",
                  "rows_present": 3,
                  "current_status": "diagonal_only_preview",
                  "covariance_requirement": "Need covariance among the three BOSS DR12 f_sigma8 rows or a published consensus covariance treatment.",
                  "bao_rsd_boundary": "BAO and RSD are bundled in source products; BAO must remain boundary/ruler while f_sigma8 remains growth.",
                  "final_pressure_allowed_without_covariance": False,
                  "risk_if_missing": "Overcounts correlated BOSS bins as independent."
              },
              {
                  "survey_family": "WiggleZ",
                  "rows_present": 3,
                  "current_status": "diagonal_only_preview",
                  "covariance_requirement": "Need covariance among WiggleZ redshift bins or a clear published statement that a diagonal treatment is acceptable for the intended diagnostic.",
                  "bao_rsd_boundary": "Rows are treated as RSD growth summaries; source age and covariance status must stay visible.",
                  "final_pressure_allowed_without_covariance": False,
                  "risk_if_missing": "Overweights older multi-bin RSD summary rows."
              },
              {
                  "survey_family": "eBOSS_DR16",
                  "rows_present": 3,
                  "current_status": "published_summary_value_reviewed_diagonal_only",
                  "covariance_requirement": "Need covariance for LRG, ELG, QSO f_sigma8 rows or a source-specific covariance product before final pressure testing.",
                  "bao_rsd_boundary": "Values came from BAO+RSD table; BAO must remain boundary/ruler while f_sigma8 remains growth.",
                  "final_pressure_allowed_without_covariance": False,
                  "risk_if_missing": "Treats value-reviewed published summaries as independent final evidence."
              },
              {
                  "survey_family": "cross_family_combination",
                  "rows_present": 9,
                  "current_status": "not_combined_as_final",
                  "covariance_requirement": "Need an explicit policy for cross-family independence, overlap, shared reference-model uncertainty, and duplicated BAO/RSD assumptions.",
                  "bao_rsd_boundary": "Cross-family combination cannot collapse BAO and RSD into one reach/growth surface.",
                  "final_pressure_allowed_without_covariance": False,
                  "risk_if_missing": "Creates a fake combined RSD pressure score."
              }
          ]

          COVARIANCE_REQUIREMENTS = [
              {
                  "requirement_id": "within_survey_covariance",
                  "required_before_final_pressure": True,
                  "description": "Rows within BOSS, WiggleZ, and eBOSS may be correlated and need covariance or a declared limitation.",
                  "failure_mode": "Treating multi-bin survey rows as independent final evidence."
              },
              {
                  "requirement_id": "cross_family_independence_policy",
                  "required_before_final_pressure": True,
                  "description": "The pipeline must state whether BOSS, WiggleZ, and eBOSS are treated as independent, partly overlapping, or not combined.",
                  "failure_mode": "Combining survey families without an independence boundary."
              },
              {
                  "requirement_id": "BAO_RSD_covariance_boundary",
                  "required_before_final_pressure": True,
                  "description": "BAO+RSD products must preserve BAO/ruler covariance separately from f_sigma8/growth interpretation.",
                  "failure_mode": "Collapsing BAO and RSD into one growth signal."
              },
              {
                  "requirement_id": "reference_model_uncertainty_boundary",
                  "required_before_final_pressure": True,
                  "description": "The declared f_sigma8 reference curve has parameter uncertainty that is not included in v4.29.",
                  "failure_mode": "Treating the approximate reference curve as a full Planck posterior."
              },
              {
                  "requirement_id": "published_summary_status_boundary",
                  "required_before_final_pressure": True,
                  "description": "BOSS, WiggleZ, and eBOSS rows are published-summary rows, not direct posterior-chain rows.",
                  "failure_mode": "Promoting summary values into direct parsed evidence."
              },
              {
                  "requirement_id": "no_diagonal_final_claim",
                  "required_before_final_pressure": True,
                  "description": "Diagonal-only previews may show direction but cannot become final pressure claims.",
                  "failure_mode": "Calling the v4.29 preview a final RSD pressure score."
              },
              {
                  "requirement_id": "source_product_locator",
                  "required_before_final_pressure": True,
                  "description": "A future covariance-aware test must name the exact source product, file, table, or covariance matrix used.",
                  "failure_mode": "Using undocumented covariance assumptions."
              }
          ]

          ALLOWED_NEXT_STAGES = [
              {
                  "stage_id": "covariance_product_search",
                  "allowed": True,
                  "description": "Look for public covariance products or published covariance descriptions for BOSS DR12, WiggleZ, and eBOSS DR16.",
                  "may_compute_pressure": False
              },
              {
                  "stage_id": "reference_uncertainty_boundary_audit",
                  "allowed": True,
                  "description": "Define how Planck/reference uncertainty must enter before stronger RSD comparison.",
                  "may_compute_pressure": False
              },
              {
                  "stage_id": "diagonal_preview_revision",
                  "allowed": True,
                  "description": "Rerun or document diagonal-only previews as explicitly non-final.",
                  "may_compute_pressure": "nonfinal_preview_only"
              },
              {
                  "stage_id": "covariance_aware_RSD_pressure_test",
                  "allowed": False,
                  "description": "Compute an RSD pressure test only after covariance and reference uncertainty boundaries are satisfied.",
                  "may_compute_pressure": True
              },
              {
                  "stage_id": "joint_growth_posterior",
                  "allowed": False,
                  "description": "Combine RSD with weak lensing, clusters, CMB lensing, or KiDS into one posterior.",
                  "may_compute_pressure": False
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "The v4.29 RSD preview is covariance-aware.",
              "The v4.29 RSD preview includes reference-model uncertainty.",
              "Published summary rows are direct posterior-chain rows.",
              "BAO and RSD can be averaged into one reach/growth correction.",
              "BOSS, WiggleZ, and eBOSS rows can be treated as independent final evidence without covariance review.",
              "A likelihood, BIC, refit, or model comparison was run.",
              "RSD proves growth suppression."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_31_RSD_covariance_product_locator",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Search for or define the exact covariance products needed for BOSS DR12, WiggleZ, and eBOSS DR16.",
                  "must_include": "source product, covariance status, survey family, BAO/RSD separation, direct-vs-summary status.",
                  "must_not_include": "final pressure score or validation claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_32_RSD_reference_uncertainty_boundary_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Define how reference-model uncertainty would need to enter before a stronger RSD comparison.",
                  "must_include": "reference parameter uncertainty, Planck-chain boundary, growth curve uncertainty, no final pressure claim.",
                  "must_not_include": "treating approximate reference curve as full posterior."
              },
              {
                  "priority": 3,
                  "next_test": "v4_33_cluster_mass_calibration_boundary_audit",
                  "role_focus": "cluster_abundance_growth",
                  "purpose": "Audit cluster abundance with mass calibration and selection boundaries.",
                  "must_include": "mass calibration, selection, source/product status, axis label.",
                  "must_not_include": "cluster proof claim."
              }
          ]

          failed_gates = []
          warnings = []

          for row in SURVEY_FAMILY_REQUIREMENTS:
              if row["final_pressure_allowed_without_covariance"] is not False:
                  failed_gates.append(row["survey_family"] + "_allows_final_pressure_without_covariance")

              if not row["covariance_requirement"]:
                  failed_gates.append(row["survey_family"] + "_missing_covariance_requirement")

              if not row["bao_rsd_boundary"]:
                  failed_gates.append(row["survey_family"] + "_missing_bao_rsd_boundary")

          needed_requirements = {
              "within_survey_covariance",
              "cross_family_independence_policy",
              "BAO_RSD_covariance_boundary",
              "reference_model_uncertainty_boundary",
              "published_summary_status_boundary",
              "no_diagonal_final_claim",
              "source_product_locator"
          }

          present_requirements = {
              row["requirement_id"]
              for row in COVARIANCE_REQUIREMENTS
              if row["required_before_final_pressure"] is True
          }

          missing_requirements = sorted(needed_requirements - present_requirements)

          for item in missing_requirements:
              failed_gates.append("missing_covariance_requirement_" + item)

          blocked_claim_text = " | ".join(BLOCKED_CLAIMS).lower()

          for phrase in [
              "final rsd pressure score",
              "covariance-aware",
              "reference-model uncertainty",
              "direct posterior-chain",
              "bao and rsd",
              "independent final evidence"
          ]:
              if phrase not in blocked_claim_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          covariance_pressure_stage = [
              row for row in ALLOWED_NEXT_STAGES
              if row["stage_id"] == "covariance_aware_RSD_pressure_test"
          ]

          if not covariance_pressure_stage or covariance_pressure_stage[0]["allowed"] is not False:
              failed_gates.append("covariance_aware_pressure_stage_not_blocked_now")

          joint_growth_stage = [
              row for row in ALLOWED_NEXT_STAGES
              if row["stage_id"] == "joint_growth_posterior"
          ]

          if not joint_growth_stage or joint_growth_stage[0]["allowed"] is not False:
              failed_gates.append("joint_growth_posterior_not_blocked_now")

          warnings.append("covariance_requirements_audit_not_covariance_import")
          warnings.append("v4_29_remains_nonfinal_diagonal_preview")
          warnings.append("reference_uncertainty_still_missing")
          warnings.append("published_summary_rows_not_direct_chain")
          warnings.append("BAO_RSD_separation_still_required")

          rule_results = [
              {
                  "rule_id": "survey_family_covariance_declared",
                  "pass": all(bool(row["covariance_requirement"]) for row in SURVEY_FAMILY_REQUIREMENTS),
                  "result": "all_survey_families_have_covariance_requirement",
                  "boundary": "No family can be final-scored without covariance review."
              },
              {
                  "rule_id": "final_pressure_blocked_without_covariance",
                  "pass": all(row["final_pressure_allowed_without_covariance"] is False for row in SURVEY_FAMILY_REQUIREMENTS),
                  "result": "final_pressure_blocked_for_all_families",
                  "boundary": "Diagonal-only preview cannot become final."
              },
              {
                  "rule_id": "required_covariance_requirements_present",
                  "pass": len(missing_requirements) == 0,
                  "result": "all_required_covariance_requirements_present",
                  "boundary": "Covariance-aware test prerequisites are explicit."
              },
              {
                  "rule_id": "BAO_RSD_boundary_preserved",
                  "pass": all(bool(row["bao_rsd_boundary"]) for row in SURVEY_FAMILY_REQUIREMENTS),
                  "result": "BAO_RSD_boundary_preserved_for_all_families",
                  "boundary": "BAO remains boundary/ruler; RSD remains growth."
              },
              {
                  "rule_id": "stronger_tests_blocked_now",
                  "pass": covariance_pressure_stage[0]["allowed"] is False and joint_growth_stage[0]["allowed"] is False,
                  "result": "covariance_pressure_and_joint_posterior_blocked_now",
                  "boundary": "No final pressure or joint posterior at this stage."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_covariance_requirement_rules_passed")

          if failed_gates:
              readiness_label = "rsd_covariance_requirements_audit_failed"
              next_step = "Repair covariance requirements before searching for covariance products."
          else:
              readiness_label = "rsd_covariance_requirements_audit_passed_ready_for_covariance_product_locator"
              next_step = (
                  "Proceed to v4.31 RSD covariance product locator. "
                  "Do not compute final pressure until covariance products and reference uncertainty boundaries are handled."
              )

          system_health = {
              "prior_preview_row_count": PRIOR_PREVIEW_SUMMARY["preview_row_count"],
              "prior_negative_residual_count": PRIOR_PREVIEW_SUMMARY["negative_residual_count"],
              "prior_positive_residual_count": PRIOR_PREVIEW_SUMMARY["positive_residual_count"],
              "survey_family_requirement_count": len(SURVEY_FAMILY_REQUIREMENTS),
              "covariance_requirement_count": len(COVARIANCE_REQUIREMENTS),
              "missing_requirement_count": len(missing_requirements),
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "covariance_imported": False,
              "reference_uncertainty_included": False,
              "final_pressure_score_allowed_now": False,
              "joint_growth_posterior_allowed_now": False,
              "validation_claim_allowed": False
          }

          interpretation = (
              "v4.30 audits what an honest covariance-aware RSD comparison would require. "
              "The v4.29 result remains useful as a directional, diagonal-only preview, but it cannot become final pressure. "
              "Before stronger RSD claims, the pipeline needs within-survey covariance, cross-family independence policy, BAO/RSD covariance separation, reference uncertainty handling, and exact source-product documentation."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "prior_preview_summary": PRIOR_PREVIEW_SUMMARY,
              "survey_family_requirements": SURVEY_FAMILY_REQUIREMENTS,
              "covariance_requirements": COVARIANCE_REQUIREMENTS,
              "allowed_next_stages": ALLOWED_NEXT_STAGES,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_final_pressure_score_built": False,
                  "covariance_imported": False,
                  "reference_uncertainty_included": False,
                  "likelihood_run": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "survey_family_covariance_requirements_v4_30.csv",
              SURVEY_FAMILY_REQUIREMENTS,
              [
                  "survey_family",
                  "rows_present",
                  "current_status",
                  "covariance_requirement",
                  "bao_rsd_boundary",
                  "final_pressure_allowed_without_covariance",
                  "risk_if_missing"
              ]
          )

          write_csv(
              OUTDIR / "covariance_requirements_v4_30.csv",
              COVARIANCE_REQUIREMENTS,
              [
                  "requirement_id",
                  "required_before_final_pressure",
                  "description",
                  "failure_mode"
              ]
          )

          write_csv(
              OUTDIR / "allowed_next_stages_v4_30.csv",
              ALLOWED_NEXT_STAGES,
              [
                  "stage_id",
                  "allowed",
                  "description",
                  "may_compute_pressure"
              ]
          )

          write_csv(
              OUTDIR / "covariance_rule_results_v4_30.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_30.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_30.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_30.csv",
              [system_health],
              [
                  "prior_preview_row_count",
                  "prior_negative_residual_count",
                  "prior_positive_residual_count",
                  "survey_family_requirement_count",
                  "covariance_requirement_count",
                  "missing_requirement_count",
                  "rule_pass_count",
                  "rule_total_count",
                  "covariance_imported",
                  "reference_uncertainty_included",
                  "final_pressure_score_allowed_now",
                  "joint_growth_posterior_allowed_now",
                  "validation_claim_allowed"
              ]
          )

          json_path = OUTDIR / "tairid_v4_30_rsd_covariance_requirements_audit.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.30 — RSD Covariance Requirements Audit")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("The v4.29 RSD preview remains a directional diagonal-only preview. It cannot become a final pressure score until covariance and reference uncertainty are handled.")
          md.append("")
          md.append("## Prior preview carried forward")
          md.append("")
          md.append("| Field | Value |")
          md.append("|---|---|")
          for key, value in PRIOR_PREVIEW_SUMMARY.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Rule results")
          md.append("")
          md.append("| Rule | Pass | Result | Boundary |")
          md.append("|---|---:|---|---|")
          for row in rule_results:
              md.append(f"| `{row['rule_id']}` | `{row['pass']}` | `{row['result']}` | {row['boundary']} |")
          md.append("")
          md.append("## Survey-family covariance requirements")
          md.append("")
          md.append("| Survey family | Rows | Requirement | Risk if missing |")
          md.append("|---|---:|---|---|")
          for row in SURVEY_FAMILY_REQUIREMENTS:
              md.append(
                  f"| `{row['survey_family']}` | `{row['rows_present']}` | {row['covariance_requirement']} | {row['risk_if_missing']} |"
              )
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `survey_family_covariance_requirements_v4_30.csv`")
          md.append("- `covariance_requirements_v4_30.csv`")
          md.append("- `allowed_next_stages_v4_30.csv`")
          md.append("- `covariance_rule_results_v4_30.csv`")
          md.append("- `blocked_claims_v4_30.csv`")
          md.append("- `next_test_ladder_v4_30.csv`")
          md.append("- `system_health_v4_30.csv`")
          md.append("- `tairid_v4_30_rsd_covariance_requirements_audit.json`")
          md.append("- `tairid_v4_30_rsd_covariance_requirements_audit.md`")
          md.append("")

          md_path = OUTDIR / "tairid_v4_30_rsd_covariance_requirements_audit.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.30 RSD covariance requirements audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-30-rsd-covariance-requirements-audit
          path: artifacts/tairid_v4_30_rsd_covariance_requirements_audit/
