name: 000 TAIRID v4.67 Primary Density Background Contract Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-67-primary-density-background-contract-design.yml"

jobs:
  tairid-v4-67-primary-density-background-contract-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.67 primary density background contract design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_67_primary_density_background_contract_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_67_primary_density_background_contract_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_67_primary_density_background_contract_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This is a design-only contract after v4.66 confirmed chain row shape and primary-density values.",
              "Because direct omegam and sigma8 chain columns were not available in the selected roots, the future parser must not fake them.",
              "A valid future route must use either a verified Boltzmann/background solver path or an external verified posterior reference source."
          ]

          UPSTREAM_LOCKS = {
              "v4_57": {
                  "result": "ZIP64 central directory parsed",
                  "manifest_member_count": 17902,
                  "verified_root_count": 1296,
                  "fullGrid_downloaded": False,
                  "chains_imported": False
              },
              "v4_60": {
                  "result": "sidecar target location audit passed",
                  "fsigma8_targets_are_sidecar_derived_outputs": True,
                  "direct_chain_column_candidate_roots": 0
              },
              "v4_63": {
                  "result": "growth calculator contract matched sidecar point outputs",
                  "calculator_pairs_checked": 110,
                  "calculator_pairs_passed": 110
              },
              "v4_65_1": {
                  "result": "paramnames primary column boundary audit passed",
                  "direct_omegam_sigma8_route_available": False,
                  "primary_density_route_available": True,
                  "omegabh2_omegach2_found_roots": 44,
                  "theta_found_roots": 44,
                  "direct_fsigma8_columns_found": 0
              },
              "v4_66": {
                  "result": "guarded chain row shape probe passed",
                  "selected_roots": 12,
                  "paramnames_ok": 12,
                  "chain_prefix_probe_ok": 12,
                  "row_shape_pass": 12,
                  "primary_tracked_values_available": 12,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "reference_uncertainty_computed": False
              }
          }

          PRIMARY_CHAIN_INPUTS_CONFIRMED = [
              {
                  "parameter": "omegabh2",
                  "role": "physical baryon density",
                  "available_in_v4_66_prefix_values": True,
                  "can_directly_replace_omegam": False,
                  "notes": "Primary physical density, not Omega_m itself."
              },
              {
                  "parameter": "omegach2",
                  "role": "physical cold dark matter density",
                  "available_in_v4_66_prefix_values": True,
                  "can_directly_replace_omegam": False,
                  "notes": "Primary physical density, not Omega_m itself."
              },
              {
                  "parameter": "theta",
                  "role": "acoustic/angular scale parameter",
                  "available_in_v4_66_prefix_values": True,
                  "can_directly_replace_H0": False,
                  "notes": "Requires cosmology solver or verified conversion; do not treat as H0."
              },
              {
                  "parameter": "tau",
                  "role": "reionization optical depth",
                  "available_in_v4_66_prefix_values": True,
                  "can_directly_replace_sigma8": False,
                  "notes": "Needed for amplitude relation but not enough by itself."
              },
              {
                  "parameter": "logA",
                  "role": "primordial amplitude proxy",
                  "available_in_v4_66_prefix_values": True,
                  "can_directly_replace_sigma8": False,
                  "notes": "Needs transfer/growth calculation before sigma8 is known."
              },
              {
                  "parameter": "ns",
                  "role": "spectral tilt",
                  "available_in_v4_66_prefix_values": True,
                  "can_directly_replace_sigma8": False,
                  "notes": "Shape input for solver route."
              }
          ]

          BLOCKED_SHORTCUTS = [
              {
                  "shortcut": "omegam = omegabh2 + omegach2",
                  "status": "blocked",
                  "reason": "This omits h^2 conversion and background closure."
              },
              {
                  "shortcut": "H0 = theta",
                  "status": "blocked",
                  "reason": "Theta is not H0; converting theta requires background/acoustic-scale solving."
              },
              {
                  "shortcut": "sigma8 = logA",
                  "status": "blocked",
                  "reason": "logA is not sigma8; sigma8 requires transfer/growth calculation."
              },
              {
                  "shortcut": "fsigma8z exists as direct chain column",
                  "status": "blocked",
                  "reason": "v4.60 and v4.65.1 found no direct fsigma8z chain-column route in selected roots."
              },
              {
                  "shortcut": "minimum sidecars can provide posterior covariance",
                  "status": "blocked",
                  "reason": "Minimum sidecars are point/diagnostic outputs, not posterior samples."
              }
          ]

          VALID_FUTURE_ROUTES = [
              {
                  "route_id": "A_boltzmann_or_background_solver_route",
                  "status": "valid_design_candidate",
                  "required_inputs": "omegabh2, omegach2, theta or H0-equivalent solved value, tau, logA, ns, sample weights",
                  "required_external_component": "verified CAMB/CLASS-style background plus power-spectrum/growth calculation or equivalent documented solver",
                  "expected_output": "derived omegam, sigma8, sigma8z, fsigma8z per weighted sample",
                  "risk": "more complex; must validate against Planck sidecar minimum fixtures before uncertainty use",
                  "allowed_next_test": "solver_feasibility_or_primary_parameter_fixture_contract"
              },
              {
                  "route_id": "B_external_verified_posterior_reference_route",
                  "status": "valid_design_candidate",
                  "required_inputs": "published or reproducible Planck posterior-derived fsigma8 reference source with covariance or samples",
                  "required_external_component": "source packet with provenance and uncertainty definition",
                  "expected_output": "reference mean vector and covariance at target redshifts",
                  "risk": "depends on finding a trustworthy source, but avoids building a solver inside GitHub immediately",
                  "allowed_next_test": "external_reference_source_packet"
              },
              {
                  "route_id": "C_simple_omegam_sigma8_chain_route",
                  "status": "not_currently_valid_for_selected_roots",
                  "required_inputs": "direct omegam and sigma8 chain columns",
                  "required_external_component": "none if direct columns existed",
                  "expected_output": "direct growth-gamma derived fsigma8 samples",
                  "risk": "blocked because selected roots did not expose both direct columns",
                  "allowed_next_test": "only if a different verified root exposes direct omegam and sigma8"
              }
          ]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          FUTURE_SOLVER_CONTRACT_STAGES = [
              {
                  "stage": 1,
                  "name": "load_weighted_chain_rows",
                  "implemented_now": False,
                  "required_before_use": True,
                  "output": "bounded weighted samples with primary cosmological columns"
              },
              {
                  "stage": 2,
                  "name": "convert_primary_columns_to_background",
                  "implemented_now": False,
                  "required_before_use": True,
                  "output": "H0 or h, Omega_m0, Omega_b0, Omega_c0"
              },
              {
                  "stage": 3,
                  "name": "derive_sigma8_from_amplitude_and_transfer",
                  "implemented_now": False,
                  "required_before_use": True,
                  "output": "sigma8 per sample"
              },
              {
                  "stage": 4,
                  "name": "derive_growth_at_target_redshifts",
                  "implemented_now": False,
                  "required_before_use": True,
                  "output": "D(z), f(z), sigma8z, fsigma8z per sample"
              },
              {
                  "stage": 5,
                  "name": "validate_against_minimum_sidecar_fixtures",
                  "implemented_now": False,
                  "required_before_use": True,
                  "output": "fixture residuals against v4.59-v4.63 sidecar point outputs"
              },
              {
                  "stage": 6,
                  "name": "compute_weighted_reference_covariance",
                  "implemented_now": False,
                  "required_before_use": True,
                  "output": "mean vector, covariance, correlation, effective sample size"
              },
              {
                  "stage": 7,
                  "name": "handoff_to_RSD_pressure_without_final_claim",
                  "implemented_now": False,
                  "required_before_use": True,
                  "output": "reference uncertainty packet for later RSD diagnostic"
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "A final RSD pressure score was computed.",
              "TAIRID cosmology is validated.",
              "Full Planck chains were imported.",
              "Full chain sample files were parsed.",
              "Direct fsigma8z chain columns exist in the selected roots.",
              "omegabh2 plus omegach2 is the same thing as omegam.",
              "theta is H0.",
              "logA is sigma8.",
              "Minimum sidecars are posterior samples.",
              "A solver route has already been implemented.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          failed_gates = []
          warnings = [
              "design_only",
              "primary_density_route_requires_solver_or_external_reference",
              "simple_omegam_sigma8_route_not_available_in_selected_roots",
              "no_chain_import",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          if UPSTREAM_LOCKS["v4_66"]["row_shape_pass"] != 12:
              failed_gates.append("v4_66_row_shape_pass_not_carried")

          if UPSTREAM_LOCKS["v4_65_1"]["primary_density_route_available"] is not True:
              failed_gates.append("primary_density_route_not_carried")

          if UPSTREAM_LOCKS["v4_65_1"]["direct_omegam_sigma8_route_available"] is not False:
              failed_gates.append("simple_route_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_60"]["direct_chain_column_candidate_roots"] != 0:
              failed_gates.append("direct_fsigma8_boundary_not_carried")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          if any(stage["implemented_now"] is not False for stage in FUTURE_SOLVER_CONTRACT_STAGES):
              failed_gates.append("future_solver_stage_accidentally_marked_implemented")

          route_ids = {row["route_id"] for row in VALID_FUTURE_ROUTES}
          if "A_boltzmann_or_background_solver_route" not in route_ids:
              failed_gates.append("solver_route_missing")

          if "B_external_verified_posterior_reference_route" not in route_ids:
              failed_gates.append("external_reference_route_missing")

          if "C_simple_omegam_sigma8_chain_route" not in route_ids:
              failed_gates.append("simple_route_boundary_missing")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "reference uncertainty is included",
              "final rsd pressure",
              "validated",
              "full planck chains were imported",
              "direct fsigma8z chain columns",
              "theta is h0",
              "minimum sidecars are posterior samples",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = (
              "primary_density_background_contract_passed_choose_solver_feasibility_or_external_reference_source_packet_next"
          )

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "v4_66_row_shape_carried",
                  "pass": UPSTREAM_LOCKS["v4_66"]["row_shape_pass"] == 12,
                  "result": "12 of 12 guarded chain row shape probes passed",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "simple_route_blocked_preserved",
                  "pass": UPSTREAM_LOCKS["v4_65_1"]["direct_omegam_sigma8_route_available"] is False,
                  "result": "direct omegam plus sigma8 route not available in selected roots",
                  "boundary": "Do not force simple parser."
              },
              {
                  "rule_id": "primary_density_route_available_preserved",
                  "pass": UPSTREAM_LOCKS["v4_65_1"]["primary_density_route_available"] is True,
                  "result": "omegabh2, omegach2, and theta available in selected roots",
                  "boundary": "Requires solver or external reference before uncertainty."
              },
              {
                  "rule_id": "blocked_shortcuts_declared",
                  "pass": len(BLOCKED_SHORTCUTS) >= 5,
                  "result": f"{len(BLOCKED_SHORTCUTS)} blocked shortcuts declared",
                  "boundary": "No fake derived parameters."
              },
              {
                  "rule_id": "valid_future_routes_declared",
                  "pass": len(VALID_FUTURE_ROUTES) == 3,
                  "result": "solver route, external reference route, and blocked simple route declared",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "future_solver_stages_design_only",
                  "pass": all(stage["implemented_now"] is False for stage in FUTURE_SOLVER_CONTRACT_STAGES),
                  "result": f"{len(FUTURE_SOLVER_CONTRACT_STAGES)} future solver stages declared",
                  "boundary": "No solver implemented now."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 12,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final pressure claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute uncertainty."
              },
              {
                  "rule_id": "no_reference_uncertainty_or_final_pressure",
                  "pass": True,
                  "result": "no_reference_uncertainty_no_final_RSD_pressure",
                  "boundary": "Design only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_67_rules_passed")

          if failed_gates:
              readiness_label = "primary_density_background_contract_design_failed"
              next_allowed_step = "Repair primary-density background contract before choosing solver feasibility or external reference route."
          else:
              readiness_label = "primary_density_background_contract_design_passed_ready_for_solver_feasibility_or_external_reference_source_packet"
              next_allowed_step = (
                  "Proceed to v4.68 solver feasibility audit or v4.68 external verified posterior reference source packet. "
                  "Do not compute reference uncertainty or final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "upstream_v4_66_row_shape_pass": UPSTREAM_LOCKS["v4_66"]["row_shape_pass"],
              "simple_omegam_sigma8_route_available": UPSTREAM_LOCKS["v4_65_1"]["direct_omegam_sigma8_route_available"],
              "primary_density_route_available": UPSTREAM_LOCKS["v4_65_1"]["primary_density_route_available"],
              "primary_density_input_count": len(PRIMARY_CHAIN_INPUTS_CONFIRMED),
              "blocked_shortcut_count": len(BLOCKED_SHORTCUTS),
              "valid_future_route_count": len(VALID_FUTURE_ROUTES),
              "future_solver_stage_count": len(FUTURE_SOLVER_CONTRACT_STAGES),
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "route_decision": route_decision,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "solver_implemented": False,
              "external_reference_imported": False,
              "reference_uncertainty_computed": False,
              "final_RSD_pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "primary_chain_inputs_confirmed": PRIMARY_CHAIN_INPUTS_CONFIRMED,
              "blocked_shortcuts": BLOCKED_SHORTCUTS,
              "valid_future_routes": VALID_FUTURE_ROUTES,
              "target_redshifts": TARGET_REDSHIFTS,
              "future_solver_contract_stages": FUTURE_SOLVER_CONTRACT_STAGES,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "full_chain_sample_files_parsed": False,
                  "solver_implemented": False,
                  "external_reference_imported": False,
                  "reference_uncertainty_computed": False,
                  "final_RSD_pressure_computed": False,
                  "validation_claim_allowed": False
              }
          }

          json_path = OUTDIR / "tairid_v4_67_primary_density_background_contract_design.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "primary_chain_inputs_confirmed_v4_67.csv",
              PRIMARY_CHAIN_INPUTS_CONFIRMED,
              ["parameter", "role", "available_in_v4_66_prefix_values", "can_directly_replace_omegam", "notes"]
          )

          write_csv(
              OUTDIR / "blocked_shortcuts_v4_67.csv",
              BLOCKED_SHORTCUTS,
              ["shortcut", "status", "reason"]
          )

          write_csv(
              OUTDIR / "valid_future_routes_v4_67.csv",
              VALID_FUTURE_ROUTES,
              ["route_id", "status", "required_inputs", "required_external_component", "expected_output", "risk", "allowed_next_test"]
          )

          write_csv(
              OUTDIR / "future_solver_contract_stages_v4_67.csv",
              FUTURE_SOLVER_CONTRACT_STAGES,
              ["stage", "name", "implemented_now", "required_before_use", "output"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_67.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_67.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.67 — Primary Density Background Contract Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.66 proved that selected Planck chain text rows have valid shape and readable primary-density values.")
          md.append("")
          md.append("v4.67 locks the honest next boundary: selected roots do not expose a simple direct `omegam + sigma8` chain-column route, so the next parser must not fake those values.")
          md.append("")
          md.append("The valid next route is either a verified solver/background route or an external verified posterior reference route.")
          md.append("")
          md.append("This does not download fullGrid, import full chains, implement a solver, compute reference uncertainty, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Key boundary")
          md.append("")
          md.append("- `omegabh2 + omegach2` is not `omegam` without a verified background conversion.")
          md.append("- `theta` is not `H0` without a verified solver/conversion.")
          md.append("- `logA` is not `sigma8` without a transfer/growth calculation.")
          md.append("- `.minimum` sidecars are point fixtures, not posterior uncertainty.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_67_primary_density_background_contract_design.json`")
          md.append("- `tairid_v4_67_primary_density_background_contract_design.md`")
          md.append("- `primary_chain_inputs_confirmed_v4_67.csv`")
          md.append("- `blocked_shortcuts_v4_67.csv`")
          md.append("- `valid_future_routes_v4_67.csv`")
          md.append("- `future_solver_contract_stages_v4_67.csv`")
          md.append("- `blocked_claims_v4_67.csv`")
          md.append("- `rule_results_v4_67.csv`")
          md.append("")

          (OUTDIR / "tairid_v4_67_primary_density_background_contract_design.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.67 primary density background contract design artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-67-primary-density-background-contract-design
          path: artifacts/tairid_v4_67_primary_density_background_contract_design/
