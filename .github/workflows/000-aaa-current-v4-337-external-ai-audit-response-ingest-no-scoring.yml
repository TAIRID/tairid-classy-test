name: "!!! AAA CURRENT - TAIRID v4.337 external AI audit response ingest no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-337-external-ai-audit-response-ingest-no-scoring:
    name: "!!! AAA CURRENT - Run v4.337 external audit response ingest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.336 audit ZIP and external audit response
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.336 audit ZIP..."
          INPUT_336_ZIP="$(ls tairid-v4-336-external-ai-audit-through-v4-335-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_336_ZIP" ]; then
            echo "Could not find v4.336 audit ZIP."
            echo "Expected:"
            echo "tairid-v4-336-external-ai-audit-through-v4-335-no-scoring-output.zip"
            exit 1
          fi

          echo "Finding external AI audit response markdown..."
          EXTERNAL_AUDIT_RESPONSE="$(ls external-ai-audit-response-deepseek-v4-336-through-v4-335*.md 2>/dev/null | head -n 1 || true)"

          if [ -z "$EXTERNAL_AUDIT_RESPONSE" ]; then
            echo "Could not find external AI audit response markdown file."
            echo "Expected:"
            echo "external-ai-audit-response-deepseek-v4-336-through-v4-335.md"
            exit 1
          fi

          echo "Using v4.336 ZIP:"
          echo "$INPUT_336_ZIP"

          echo "Using external audit response:"
          echo "$EXTERNAL_AUDIT_RESPONSE"

          echo "INPUT_336_ZIP=$INPUT_336_ZIP" >> "$GITHUB_ENV"
          echo "EXTERNAL_AUDIT_RESPONSE=$EXTERNAL_AUDIT_RESPONSE" >> "$GITHUB_ENV"

      - name: Write self-contained v4.337 external audit response ingest script
        run: |
          cat > run_v4_337_external_ai_audit_response_ingest_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          TRUTH_BOUNDARY = "no observed scoring; no parameter approval; no numeric baseline approval; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def contains_any(text, phrases):
              lowered = text.lower()
              return any(p.lower() in lowered for p in phrases)

          def main():
              input_336 = Path(os.environ["INPUT_336_ZIP"])
              response_path = Path(os.environ["EXTERNAL_AUDIT_RESPONSE"])

              outdir = Path("tairid_v4_337_external_ai_audit_response_ingest_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base336 = extract_zip(input_336, "tairid_v4_337_336_")

              summary336_path = find_one(base336, "v4_336_summary.json")
              stage_ledger_path = find_one(base336, "v4_336_stage_ledger_through_v4_335.csv")
              ruled_open_path = find_one(base336, "v4_336_ruled_out_and_open_gaps_for_external_ai.csv")
              audit_questions_path = find_one(base336, "v4_336_external_ai_audit_questions.csv")
              red_team_path = find_one(base336, "v4_336_external_ai_red_team_prompts.csv")
              response_template_path = find_one(base336, "v4_336_external_ai_response_template.csv")

              summary336 = json.loads(summary336_path.read_text())
              stage_ledger = pd.read_csv(stage_ledger_path)
              ruled_open = pd.read_csv(ruled_open_path)
              audit_questions = pd.read_csv(audit_questions_path)
              red_team = pd.read_csv(red_team_path)
              response_template = pd.read_csv(response_template_path)

              response_text = response_path.read_text(encoding="utf-8", errors="replace")
              response_lower = response_text.lower()

              external_flags = {
                  "external_ai_overall_pass_found": contains_any(response_text, ["overall pass/fail: pass", "pass —", "pass -"]),
                  "external_ai_truth_boundary_confirmed": contains_any(response_text, ["truth boundary", "fully preserved", "truth boundary is rigorously maintained"]),
                  "external_ai_found_parameter_approval": not contains_any(response_text, ["no parameter values approved", "no parameter values approved anywhere"]),
                  "external_ai_found_numeric_baseline_approval": not contains_any(response_text, ["no numeric baseline approved", "numeric lcdm baseline remains unapproved"]),
                  "external_ai_found_observed_scoring": not contains_any(response_text, ["no observed values loaded", "no scoring computed", "observed scoring remains blocked"]),
                  "external_ai_found_support_claim": not contains_any(response_text, ["no support claims", "no support claim", "support claims remain blocked"]),
                  "external_ai_identified_scaffolding_only": contains_any(response_text, ["scaffolding only", "built and validated scaffolding", "structural preparation"]),
                  "external_ai_identified_blank_extraction": contains_any(response_text, ["extraction worksheet", "entirely blank", "human fields are blank"]),
                  "external_ai_identified_next_gate": contains_any(response_text, ["fill the v4.334 extraction worksheet", "rerun v4.335", "human fills extraction worksheet"]),
                  "external_ai_identified_no_observational_test": contains_any(response_text, ["no observational test has begun", "has not tested tairid against observations", "no quantitative comparison"]),
              }

              normalized = pd.DataFrame([
                  {
                      "audit_field": "external_ai_model",
                      "value": "DeepSeek",
                      "ingest_note": "Model name inferred from user-provided response label.",
                  },
                  {
                      "audit_field": "overall_pass_fail",
                      "value": "PASS" if external_flags["external_ai_overall_pass_found"] else "UNCLEAR",
                      "ingest_note": "External audit states overall pass/fail as PASS.",
                  },
                  {
                      "audit_field": "truth_boundary_preserved",
                      "value": str(external_flags["external_ai_truth_boundary_confirmed"]),
                      "ingest_note": "External audit says truth boundary fully preserved.",
                  },
                  {
                      "audit_field": "parameter_values_approved_found",
                      "value": str(external_flags["external_ai_found_parameter_approval"]),
                      "ingest_note": "Expected False.",
                  },
                  {
                      "audit_field": "numeric_baseline_approval_found",
                      "value": str(external_flags["external_ai_found_numeric_baseline_approval"]),
                      "ingest_note": "Expected False.",
                  },
                  {
                      "audit_field": "observed_sdss_scoring_found",
                      "value": str(external_flags["external_ai_found_observed_scoring"]),
                      "ingest_note": "Expected False.",
                  },
                  {
                      "audit_field": "support_claim_found",
                      "value": str(external_flags["external_ai_found_support_claim"]),
                      "ingest_note": "Expected False.",
                  },
                  {
                      "audit_field": "strongest_valid_conclusion",
                      "value": "Procedural scaffolding only; v4.335 correctly blocked because extraction worksheet remains blank.",
                      "ingest_note": "Paraphrase of external audit conclusion.",
                  },
                  {
                      "audit_field": "strongest_criticism",
                      "value": "Pre-evidence and pre-score; no approved values, no baseline, no observed data, no quantitative comparison.",
                      "ingest_note": "Paraphrase of external audit criticism.",
                  },
                  {
                      "audit_field": "recommended_next_gate",
                      "value": "Human fills v4.334 extraction worksheet, then rerun v4.335.",
                      "ingest_note": "External audit next action.",
                  },
              ])

              external_audit_ledger = pd.DataFrame([
                  {
                      "ledger_id": "EXT_AUDIT_337_001",
                      "external_audit_claim": "Truth boundary preserved.",
                      "ingested_status": "confirmed",
                      "pipeline_effect": "no_gate_advanced",
                      "truth_boundary": TRUTH_BOUNDARY,
                  },
                  {
                      "ledger_id": "EXT_AUDIT_337_002",
                      "external_audit_claim": "No parameter values approved.",
                      "ingested_status": "confirmed",
                      "pipeline_effect": "parameter_value_approval_remains_blocked",
                      "truth_boundary": TRUTH_BOUNDARY,
                  },
                  {
                      "ledger_id": "EXT_AUDIT_337_003",
                      "external_audit_claim": "No numeric LCDM baseline approved.",
                      "ingested_status": "confirmed",
                      "pipeline_effect": "numeric_baseline_approval_remains_blocked",
                      "truth_boundary": TRUTH_BOUNDARY,
                  },
                  {
                      "ledger_id": "EXT_AUDIT_337_004",
                      "external_audit_claim": "No observed SDSS RSD scoring performed.",
                      "ingested_status": "confirmed",
                      "pipeline_effect": "observed_scoring_remains_blocked",
                      "truth_boundary": TRUTH_BOUNDARY,
                  },
                  {
                      "ledger_id": "EXT_AUDIT_337_005",
                      "external_audit_claim": "No support claim for TAIRID made.",
                      "ingested_status": "confirmed",
                      "pipeline_effect": "support_claims_remain_blocked",
                      "truth_boundary": TRUTH_BOUNDARY,
                  },
                  {
                      "ledger_id": "EXT_AUDIT_337_006",
                      "external_audit_claim": "The work is structurally sound but operationally incomplete.",
                      "ingested_status": "confirmed",
                      "pipeline_effect": "next_gate_must_be_human_extraction_fill",
                      "truth_boundary": TRUTH_BOUNDARY,
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "EXTERNAL_AUDIT_GAP_001",
                      "gap": "External AI audit response needed.",
                      "status_after_v4_337": "closed",
                      "evidence": "DeepSeek audit response ingested.",
                  },
                  {
                      "gap_id": "EXTRACTION_GAP_001",
                      "gap": "Human exact source quotes still need to be filled.",
                      "status_after_v4_337": "still_open",
                      "evidence": "External audit confirms v4.334 worksheet remains blank.",
                  },
                  {
                      "gap_id": "EXTRACTION_GAP_002",
                      "gap": "Candidate value text still needs human extraction.",
                      "status_after_v4_337": "still_open",
                      "evidence": "External audit confirms human_numeric_value_filled_rows = 0.",
                  },
                  {
                      "gap_id": "SCORING_GATE_001",
                      "gap": "Observed SDSS RSD scoring remains blocked.",
                      "status_after_v4_337": "still_blocked",
                      "evidence": "External audit confirms observed_values_loaded=false and score_valid=false.",
                  },
                  {
                      "gap_id": "SUPPORT_GATE_001",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_337": "still_blocked",
                      "evidence": "External audit confirms support_allowed=false.",
                  },
              ])

              hard_checks = {
                  "input_v4_336_summary_found": summary336.get("version") == "v4.336",
                  "input_v4_336_rules_21_of_21": summary336.get("rules_passed") == 21 and summary336.get("rules_total") == 21,
                  "input_v4_336_failed_gates_none": summary336.get("failed_gates") == "none",
                  "input_v4_336_readiness_blocked_pending_human_extraction_fill": summary336.get("v4_335_readiness_status") == "blocked_pending_human_extraction_fill",
                  "input_v4_336_no_parameter_approval": summary336.get("parameter_values_approved") is False,
                  "input_v4_336_no_numeric_baseline_approval": summary336.get("numeric_baseline_values_filled") is False and summary336.get("approved_baseline_values") == 0,
                  "input_v4_336_no_observed_values_loaded": summary336.get("observed_values_loaded") is False,
                  "input_v4_336_no_definition_match_confirmed": summary336.get("definition_match_confirmed") is False,
                  "input_v4_336_no_score_valid": summary336.get("score_valid") is False,
                  "input_v4_336_no_support_allowed": summary336.get("support_allowed") is False,

                  "external_response_file_nonempty": response_path.exists() and response_path.stat().st_size > 1000,
                  "external_ai_overall_pass_found": external_flags["external_ai_overall_pass_found"],
                  "external_ai_truth_boundary_confirmed": external_flags["external_ai_truth_boundary_confirmed"],
                  "external_ai_found_no_parameter_approval": external_flags["external_ai_found_parameter_approval"] is False,
                  "external_ai_found_no_numeric_baseline_approval": external_flags["external_ai_found_numeric_baseline_approval"] is False,
                  "external_ai_found_no_observed_scoring": external_flags["external_ai_found_observed_scoring"] is False,
                  "external_ai_found_no_support_claim": external_flags["external_ai_found_support_claim"] is False,
                  "external_ai_identified_scaffolding_only": external_flags["external_ai_identified_scaffolding_only"],
                  "external_ai_identified_blank_extraction": external_flags["external_ai_identified_blank_extraction"],
                  "external_ai_identified_next_gate": external_flags["external_ai_identified_next_gate"],
                  "external_ai_identified_no_observational_test": external_flags["external_ai_identified_no_observational_test"],

                  "stage_ledger_rows_equal_13": len(stage_ledger) == 13,
                  "ruled_open_rows_at_least_10": len(ruled_open) >= 10,
                  "audit_questions_rows_equal_6": len(audit_questions) == 6,
                  "red_team_prompts_rows_equal_4": len(red_team) == 4,
                  "response_template_rows_equal_12": len(response_template) == 12,
                  "normalized_response_rows_equal_10": len(normalized) == 10,
                  "external_audit_ledger_rows_equal_6": len(external_audit_ledger) == 6,
                  "gap_update_rows_equal_5": len(gap_update) == 5,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary337 = {
                  "version": "v4.337",
                  "route_name": "v4_337_external_ai_audit_response_ingest_no_scoring",
                  "expected_result": "v4_337_external_ai_audit_response_ingest_no_scoring_passed_no_claims",
                  "input_version": "v4.336",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "external_ai_model": "DeepSeek",
                  "external_ai_overall_pass": bool(external_flags["external_ai_overall_pass_found"]),
                  "external_ai_truth_boundary_confirmed": bool(external_flags["external_ai_truth_boundary_confirmed"]),
                  "external_ai_found_parameter_approval": bool(external_flags["external_ai_found_parameter_approval"]),
                  "external_ai_found_numeric_baseline_approval": bool(external_flags["external_ai_found_numeric_baseline_approval"]),
                  "external_ai_found_observed_scoring": bool(external_flags["external_ai_found_observed_scoring"]),
                  "external_ai_found_support_claim": bool(external_flags["external_ai_found_support_claim"]),
                  "external_ai_next_gate": "human_fill_v4_334_extraction_worksheet_then_rerun_v4_335",
                  "parameter_values_approved": False,
                  "numeric_baseline_values_filled": False,
                  "approved_baseline_values": 0,
                  "observed_values_loaded": False,
                  "definition_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": TRUTH_BOUNDARY,
                  "selected_next_route": "human_fill_v4_334_extraction_worksheet_then_rerun_v4_335",
              }

              shutil.copy2(response_path, outdir / response_path.name)
              shutil.copy2(summary336_path, outdir / "v4_336_summary.json")
              shutil.copy2(stage_ledger_path, outdir / "v4_336_stage_ledger_through_v4_335.csv")
              shutil.copy2(ruled_open_path, outdir / "v4_336_ruled_out_and_open_gaps_for_external_ai.csv")
              shutil.copy2(audit_questions_path, outdir / "v4_336_external_ai_audit_questions.csv")
              shutil.copy2(red_team_path, outdir / "v4_336_external_ai_red_team_prompts.csv")

              normalized.to_csv(outdir / "v4_337_normalized_external_ai_audit_response.csv", index=False)
              external_audit_ledger.to_csv(outdir / "v4_337_external_ai_audit_response_ingest_ledger.csv", index=False)
              gap_update.to_csv(outdir / "v4_337_gap_status_after_external_audit_response.csv", index=False)
              rule_checks.to_csv(outdir / "v4_337_rule_checks.csv", index=False)

              (outdir / "v4_337_summary.json").write_text(json.dumps(summary337, indent=2))

              summary_md = f"""# TAIRID v4.337 External AI Audit Response Ingest — No Scoring

          Expected result: `{summary337["expected_result"]}`

          {summary337["rules_passed"]} / {summary337["rules_total"]} rules passed

          failed_gates = {summary337["failed_gates"]}

          external_ai_model = DeepSeek

          external_ai_overall_pass = {summary337["external_ai_overall_pass"]}

          external_ai_truth_boundary_confirmed = {summary337["external_ai_truth_boundary_confirmed"]}

          external_ai_found_parameter_approval = {summary337["external_ai_found_parameter_approval"]}

          external_ai_found_numeric_baseline_approval = {summary337["external_ai_found_numeric_baseline_approval"]}

          external_ai_found_observed_scoring = {summary337["external_ai_found_observed_scoring"]}

          external_ai_found_support_claim = {summary337["external_ai_found_support_claim"]}

          Truth boundary: {TRUTH_BOUNDARY}.

          This step ingests the external AI audit response. It does not approve parameter values, approve numeric baselines, load observed SDSS RSD values, compute residuals, score TAIRID, or make support claims.

          Next route: `{summary337["selected_next_route"]}`
          """
              (outdir / "v4_337_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary337, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_337_external_ai_audit_response_ingest_no_scoring.py

      - name: Run v4.337 external AI audit response ingest no scoring
        run: |
          python run_v4_337_external_ai_audit_response_ingest_no_scoring.py

      - name: Upload v4.337 external AI audit response ingest artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-337-external-ai-audit-response-ingest-no-scoring-output
          path: |
            tairid_v4_337_external_ai_audit_response_ingest_no_scoring_output/
            tairid_v4_337_external_ai_audit_response_ingest_no_scoring_output.zip
