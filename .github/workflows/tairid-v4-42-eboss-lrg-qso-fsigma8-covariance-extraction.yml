name: TAIRID v4.42 eBOSS LRG QSO fsigma8 Covariance Extraction

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-42-eboss-lrg-qso-fsigma8-covariance-extraction.yml"

jobs:
  tairid-v4-42-eboss-lrg-qso-fsigma8-covariance-extraction:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.42 eBOSS LRG QSO fsigma8 covariance extraction
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_42_eboss_lrg_qso_fsigma8_covariance_extraction

          python - <<'PY'
          import csv
          import json
          import math
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_42_eboss_lrg_qso_fsigma8_covariance_extraction")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_42_eboss_lrg_qso_fsigma8_covariance_extraction"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run an eBOSS or SDSS likelihood.",
              "This does not compute a final RSD pressure score.",
              "This does not apply eBOSS covariance to residuals.",
              "This extracts eBOSS LRG/QSO f_sigma8 covariance metadata from mapped DMDHfs8 covtot files.",
              "ELG remains a grid-likelihood parser-needed lane and is not simple covariance-ready in this test.",
              "A pass means LRG/QSO f_sigma8 covariance metadata is extracted, not that full eBOSS or full RSD covariance-aware testing is complete."
          ]

          PRODUCT_PAIRS = [
              {
                  "pair_id": "eboss_dr16_lrg_baoplus_dmdhfs8",
                  "tracer": "LRG",
                  "current_row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "z_eff": 0.70,
                  "expected_value": 0.473,
                  "expected_sigma": 0.041,
                  "result_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/BAO-plus/sdss_DR16_LRG_FSBAO_DMDHfs8.txt",
                  "covtot_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/BAO-plus/sdss_DR16_LRG_FSBAO_DMDHfs8_covtot.txt",
                  "observable_order": ["DM", "DH", "f_sigma8"],
                  "fsigma8_index": 2,
                  "v4_41_status": "maps_to_current_eBOSS_row_after_inspection"
              },
              {
                  "pair_id": "eboss_dr16_qso_baoplus_dmdhfs8",
                  "tracer": "QSO",
                  "current_row_id": "eboss_dr16_qso_z148_fsigma8",
                  "z_eff": 1.48,
                  "expected_value": 0.462,
                  "expected_sigma": 0.045,
                  "result_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/BAO-plus/sdss_DR16_QSO_FSBAO_DMDHfs8.txt",
                  "covtot_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/likelihoods/BAO-plus/sdss_DR16_QSO_FSBAO_DMDHfs8_covtot.txt",
                  "observable_order": ["DM", "DH", "f_sigma8"],
                  "fsigma8_index": 2,
                  "v4_41_status": "maps_to_current_eBOSS_row_after_inspection"
              }
          ]

          ELG_STATUS = {
              "row_id": "eboss_dr16_elg_z085_fsigma8",
              "tracer": "ELG",
              "z_eff": 0.85,
              "value": 0.315,
              "sigma": 0.095,
              "status": "grid_likelihood_visible_parser_needed_not_simple_covariance_ready",
              "covariance_extracted_now": False,
              "pressure_score_allowed_now": False
          }

          EXTRACTION_RULES = [
              {
                  "rule_id": "v4_41_mapped_pairs_carried_forward",
                  "description": "LRG and QSO mapped product pairs must be carried forward exactly.",
                  "failure_mode": "Wrong eBOSS files enter extraction."
              },
              {
                  "rule_id": "result_and_covtot_files_fetch",
                  "description": "Each LRG/QSO pair must fetch both result and covtot files.",
                  "failure_mode": "Covariance metadata cannot be extracted."
              },
              {
                  "rule_id": "observable_order_preserved",
                  "description": "Observable order must remain DM, DH, f_sigma8 with f_sigma8 index 2.",
                  "failure_mode": "f_sigma8 covariance position is guessed or shifted."
              },
              {
                  "rule_id": "fsigma8_covariance_metadata_extracted",
                  "description": "Each LRG/QSO pair must expose f_sigma8 diagonal, implied sigma, and full 3x3 covariance/correlation metadata.",
                  "failure_mode": "No usable LRG/QSO covariance metadata exists for later bounded preview."
              },
              {
                  "rule_id": "ELG_grid_lane_remains_parser_needed",
                  "description": "ELG must remain parser-needed and not simple covariance-ready.",
                  "failure_mode": "ELG grid likelihood is promoted without parser."
              },
              {
                  "rule_id": "no_covariance_application_or_pressure_now",
                  "description": "This test extracts metadata only and must not apply covariance to residuals or compute pressure.",
                  "failure_mode": "Extraction becomes model testing."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "An eBOSS covariance matrix was applied to residuals.",
              "An eBOSS likelihood was run.",
              "LRG/QSO covariance extraction completes the full eBOSS covariance lane.",
              "ELG grid likelihood is simple covariance-ready without a parser.",
              "The full RSD lane is covariance-aware.",
              "BOSS-only covariance plus LRG/QSO extraction resolves all RSD covariance.",
              "WiggleZ covariance is resolved.",
              "Reference-model uncertainty is included.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_43_ELG_grid_likelihood_parser_or_formal_park",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Decide whether to build an ELG grid-likelihood parser or formally park ELG for covariance-aware RSD.",
                  "must_include": "ELG grid path, parser requirements, no simple covariance claim.",
                  "must_not_include": "ELG covariance-ready claim without parser."
              },
              {
                  "priority": 2,
                  "next_test": "v4_44_eBOSS_LRG_QSO_covariance_residual_preview_guard",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Use LRG/QSO extracted covariance in a bounded eBOSS partial preview only after ELG is formally handled.",
                  "must_include": "LRG/QSO-only status, ELG parked/parser-needed status, no full eBOSS claim.",
                  "must_not_include": "final RSD pressure score, full RSD covariance claim, validation claim."
              },
              {
                  "priority": 3,
                  "next_test": "v4_45_RSD_reference_uncertainty_boundary_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Define how reference-model uncertainty must enter before stronger RSD comparison.",
                  "must_include": "reference parameter uncertainty, Planck-chain boundary, growth curve uncertainty.",
                  "must_not_include": "treating approximate reference curve as full posterior."
              },
              {
                  "priority": 4,
                  "next_test": "v4_46_WiggleZ_covariance_locator_retry",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Try to locate a WiggleZ covariance/product path or formally keep WiggleZ non-final.",
                  "must_include": "source path, product status, row mapping, unresolved boundary if not found.",
                  "must_not_include": "treating WiggleZ as covariance-ready without product."
              }
          ]

          def fetch_text(url, timeout=90, byte_limit=2_000_000):
              try:
                  request = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "Mozilla/5.0 TAIRID-v4.42-eBOSS-LRG-QSO-fsigma8-covariance-extraction",
                          "Accept": "text/plain,text/html,application/xml,*/*"
                      }
                  )
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "fetch_ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "fetch_ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def numeric_values(text):
              vals = []
              for token in re.findall(r"[-+]?\d+(?:\.\d+)?(?:[eE][-+]?\d+)?", text or ""):
                  try:
                      vals.append(float(token))
                  except Exception:
                      pass
              return vals

          def square_matrix(values):
              n = int(math.sqrt(len(values))) if values else 0
              if n * n != len(values) or n == 0:
                  return "", False, []
              matrix = []
              for i in range(n):
                  matrix.append(values[i*n:(i+1)*n])
              return n, True, matrix

          def determinant_3x3(m):
              return (
                  m[0][0] * (m[1][1] * m[2][2] - m[1][2] * m[2][1])
                  - m[0][1] * (m[1][0] * m[2][2] - m[1][2] * m[2][0])
                  + m[0][2] * (m[1][0] * m[2][1] - m[1][1] * m[2][0])
              )

          def principal_minor_2x2(m):
              return m[0][0] * m[1][1] - m[0][1] * m[1][0]

          def has_positive_definite_3x3(m):
              if len(m) != 3 or any(len(row) != 3 for row in m):
                  return False
              return (
                  m[0][0] > 0
                  and principal_minor_2x2(m) > 0
                  and determinant_3x3(m) > 0
              )

          failed_gates = []
          warnings = []

          fetch_rows = []
          extraction_rows = []
          covariance_entry_rows = []
          correlation_entry_rows = []
          sigma_check_rows = []

          for pair in PRODUCT_PAIRS:
              result_fetch = fetch_text(pair["result_url"])
              cov_fetch = fetch_text(pair["covtot_url"])

              fetch_rows.append({
                  "pair_id": pair["pair_id"],
                  "tracer": pair["tracer"],
                  "url_role": "result_url",
                  "url": pair["result_url"],
                  "fetch_ok": result_fetch["fetch_ok"],
                  "http_status": result_fetch["http_status"],
                  "content_type": result_fetch["content_type"],
                  "bytes_read": result_fetch["bytes_read"],
                  "error": result_fetch["error"]
              })

              fetch_rows.append({
                  "pair_id": pair["pair_id"],
                  "tracer": pair["tracer"],
                  "url_role": "covtot_url",
                  "url": pair["covtot_url"],
                  "fetch_ok": cov_fetch["fetch_ok"],
                  "http_status": cov_fetch["http_status"],
                  "content_type": cov_fetch["content_type"],
                  "bytes_read": cov_fetch["bytes_read"],
                  "error": cov_fetch["error"]
              })

              result_values = numeric_values(result_fetch["text"])
              cov_values = numeric_values(cov_fetch["text"])
              cov_dim, cov_square, cov_matrix = square_matrix(cov_values)

              fsigma8_index = pair["fsigma8_index"]

              fsigma8_cov_diagonal = ""
              implied_sigma = ""
              sigma_abs_delta = ""
              sigma_close_to_current = False
              covariance_positive_definite = False
              determinant = ""

              if cov_square and cov_dim == 3:
                  determinant = determinant_3x3(cov_matrix)
                  covariance_positive_definite = has_positive_definite_3x3(cov_matrix)

                  fsigma8_cov_diagonal = cov_matrix[fsigma8_index][fsigma8_index]
                  if fsigma8_cov_diagonal > 0:
                      implied_sigma = math.sqrt(fsigma8_cov_diagonal)
                      sigma_abs_delta = abs(implied_sigma - pair["expected_sigma"])
                      sigma_close_to_current = sigma_abs_delta <= 0.02

                  for i in range(3):
                      for j in range(3):
                          obs_i = pair["observable_order"][i]
                          obs_j = pair["observable_order"][j]
                          cov_value = cov_matrix[i][j]

                          diag_i = cov_matrix[i][i]
                          diag_j = cov_matrix[j][j]

                          if diag_i > 0 and diag_j > 0:
                              corr_value = cov_value / math.sqrt(diag_i * diag_j)
                          else:
                              corr_value = ""

                          covariance_entry_rows.append({
                              "pair_id": pair["pair_id"],
                              "tracer": pair["tracer"],
                              "obs_i": obs_i,
                              "obs_j": obs_j,
                              "i": i,
                              "j": j,
                              "covariance_value": cov_value,
                              "is_fsigma8_cell": obs_i == "f_sigma8" or obs_j == "f_sigma8",
                              "covariance_applied_to_residuals_now": False,
                              "pressure_score_allowed_now": False
                          })

                          correlation_entry_rows.append({
                              "pair_id": pair["pair_id"],
                              "tracer": pair["tracer"],
                              "obs_i": obs_i,
                              "obs_j": obs_j,
                              "i": i,
                              "j": j,
                              "correlation_value": corr_value,
                              "is_fsigma8_cell": obs_i == "f_sigma8" or obs_j == "f_sigma8",
                              "covariance_applied_to_residuals_now": False,
                              "pressure_score_allowed_now": False
                          })

              value_seen = any(abs(v - pair["expected_value"]) <= 0.006 for v in result_values)
              z_seen = any(abs(v - pair["z_eff"]) <= 0.03 for v in result_values)

              extraction_complete = (
                  result_fetch["fetch_ok"] is True
                  and cov_fetch["fetch_ok"] is True
                  and pair["observable_order"] == ["DM", "DH", "f_sigma8"]
                  and fsigma8_index == 2
                  and cov_square is True
                  and cov_dim == 3
                  and fsigma8_cov_diagonal != ""
                  and fsigma8_cov_diagonal > 0
                  and value_seen is True
                  and z_seen is True
              )

              extraction_rows.append({
                  "pair_id": pair["pair_id"],
                  "tracer": pair["tracer"],
                  "current_row_id": pair["current_row_id"],
                  "z_eff": pair["z_eff"],
                  "expected_value": pair["expected_value"],
                  "expected_sigma": pair["expected_sigma"],
                  "result_fetch_ok": result_fetch["fetch_ok"],
                  "covtot_fetch_ok": cov_fetch["fetch_ok"],
                  "result_numeric_count": len(result_values),
                  "covtot_numeric_count": len(cov_values),
                  "covtot_square_dimension": cov_dim,
                  "covtot_is_square": cov_square,
                  "observable_order": "_".join(pair["observable_order"]),
                  "fsigma8_index": fsigma8_index,
                  "expected_value_seen": value_seen,
                  "expected_z_seen": z_seen,
                  "fsigma8_covariance_diagonal": fsigma8_cov_diagonal,
                  "implied_sigma_from_covariance": implied_sigma,
                  "expected_sigma": pair["expected_sigma"],
                  "sigma_abs_delta_from_current": sigma_abs_delta,
                  "sigma_close_to_current_summary": sigma_close_to_current,
                  "covariance_determinant": determinant,
                  "covariance_positive_definite": covariance_positive_definite,
                  "fsigma8_covariance_metadata_extracted": extraction_complete,
                  "covariance_applied_to_residuals_now": False,
                  "likelihood_run_now": False,
                  "pressure_score_allowed_now": False,
                  "validation_claim_allowed": False
              })

              sigma_check_rows.append({
                  "pair_id": pair["pair_id"],
                  "tracer": pair["tracer"],
                  "current_row_id": pair["current_row_id"],
                  "expected_sigma": pair["expected_sigma"],
                  "fsigma8_covariance_diagonal": fsigma8_cov_diagonal,
                  "implied_sigma_from_covariance": implied_sigma,
                  "sigma_abs_delta_from_current": sigma_abs_delta,
                  "sigma_close_to_current_summary": sigma_close_to_current
              })

              if not sigma_close_to_current:
                  warnings.append(pair["tracer"] + "_implied_sigma_differs_from_published_summary_review_rounding_or_product_choice")

          if len(PRODUCT_PAIRS) != 2:
              failed_gates.append("LRG_QSO_pairs_not_carried_forward")

          if len(fetch_rows) != 4:
              failed_gates.append("fetch_attempt_count_wrong")

          for row in extraction_rows:
              if row["result_fetch_ok"] is not True:
                  failed_gates.append(row["pair_id"] + "_result_fetch_failed")
              if row["covtot_fetch_ok"] is not True:
                  failed_gates.append(row["pair_id"] + "_covtot_fetch_failed")
              if row["observable_order"] != "DM_DH_f_sigma8":
                  failed_gates.append(row["pair_id"] + "_observable_order_not_preserved")
              if row["fsigma8_index"] != 2:
                  failed_gates.append(row["pair_id"] + "_fsigma8_index_not_2")
              if row["expected_value_seen"] is not True:
                  failed_gates.append(row["pair_id"] + "_expected_value_not_seen")
              if row["expected_z_seen"] is not True:
                  failed_gates.append(row["pair_id"] + "_expected_z_not_seen")
              if row["covtot_is_square"] is not True or row["covtot_square_dimension"] != 3:
                  failed_gates.append(row["pair_id"] + "_covtot_not_3x3")
              if row["fsigma8_covariance_metadata_extracted"] is not True:
                  failed_gates.append(row["pair_id"] + "_fsigma8_covariance_metadata_not_extracted")
              if row["covariance_positive_definite"] is not True:
                  warnings.append(row["pair_id"] + "_covariance_positive_definite_check_failed_or_needs_review")
              if row["covariance_applied_to_residuals_now"] is not False:
                  failed_gates.append(row["pair_id"] + "_covariance_application_violation")
              if row["likelihood_run_now"] is not False:
                  failed_gates.append(row["pair_id"] + "_likelihood_run_violation")
              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append(row["pair_id"] + "_pressure_allowed_violation")
              if row["validation_claim_allowed"] is not False:
                  failed_gates.append(row["pair_id"] + "_validation_allowed_violation")

          if len(covariance_entry_rows) != 18:
              failed_gates.append("LRG_QSO_3x3_covariance_entries_not_complete")

          if len(correlation_entry_rows) != 18:
              failed_gates.append("LRG_QSO_3x3_correlation_entries_not_complete")

          if ELG_STATUS["status"] != "grid_likelihood_visible_parser_needed_not_simple_covariance_ready":
              failed_gates.append("ELG_status_not_parser_needed")
          if ELG_STATUS["covariance_extracted_now"] is not False:
              failed_gates.append("ELG_covariance_extracted_violation")
          if ELG_STATUS["pressure_score_allowed_now"] is not False:
              failed_gates.append("ELG_pressure_allowed_violation")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "covariance matrix was applied",
              "likelihood was run",
              "full eboss covariance",
              "elg grid",
              "full rsd lane",
              "wigglez",
              "reference-model uncertainty",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          warnings.append("LRG_QSO_covariance_extraction_does_not_apply_covariance_to_residuals")
          warnings.append("LRG_QSO_covariance_extraction_does_not_run_likelihood")
          warnings.append("LRG_QSO_covariance_extraction_does_not_compute_pressure")
          warnings.append("ELG_grid_likelihood_still_parser_needed")
          warnings.append("eBOSS_covariance_lane_not_complete_until_ELG_handled")
          warnings.append("BOSS_only_covariance_preview_remains_BOSS_only")
          warnings.append("reference_model_uncertainty_still_missing")
          warnings.append("WiggleZ_covariance_still_unresolved")

          rule_results = [
              {
                  "rule_id": "v4_41_mapped_pairs_carried_forward",
                  "pass": len(PRODUCT_PAIRS) == 2 and all(row["v4_41_status"] == "maps_to_current_eBOSS_row_after_inspection" for row in PRODUCT_PAIRS),
                  "result": "LRG_QSO_mapped_pairs_carried_forward",
                  "boundary": "Mapped pairs are still metadata candidates only."
              },
              {
                  "rule_id": "result_and_covtot_files_fetch",
                  "pass": all(row["result_fetch_ok"] is True and row["covtot_fetch_ok"] is True for row in extraction_rows),
                  "result": "LRG_QSO_result_and_covtot_files_fetched",
                  "boundary": "Fetched files are not covariance application."
              },
              {
                  "rule_id": "observable_order_preserved",
                  "pass": all(row["observable_order"] == "DM_DH_f_sigma8" and row["fsigma8_index"] == 2 for row in extraction_rows),
                  "result": "observable_order_DM_DH_f_sigma8_index_2_preserved",
                  "boundary": "Order supports extraction only."
              },
              {
                  "rule_id": "fsigma8_covariance_metadata_extracted",
                  "pass": all(row["fsigma8_covariance_metadata_extracted"] is True for row in extraction_rows) and len(covariance_entry_rows) == 18,
                  "result": "LRG_QSO_fsigma8_covariance_metadata_extracted",
                  "boundary": "Metadata extraction is not residual pressure."
              },
              {
                  "rule_id": "ELG_grid_lane_remains_parser_needed",
                  "pass": ELG_STATUS["covariance_extracted_now"] is False and ELG_STATUS["status"] == "grid_likelihood_visible_parser_needed_not_simple_covariance_ready",
                  "result": "ELG_parser_needed_not_simple_covariance_ready",
                  "boundary": "No full eBOSS covariance claim."
              },
              {
                  "rule_id": "no_covariance_application_or_pressure_now",
                  "pass": all(
                      row["covariance_applied_to_residuals_now"] is False
                      and row["likelihood_run_now"] is False
                      and row["pressure_score_allowed_now"] is False
                      for row in extraction_rows
                  ),
                  "result": "no_covariance_application_no_likelihood_no_pressure",
                  "boundary": "Extraction only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_LRG_QSO_covariance_extraction_rules_passed")

          if failed_gates:
              readiness_label = "eBOSS_LRG_QSO_fsigma8_covariance_extraction_failed"
              next_step = "Repair LRG/QSO covariance extraction before ELG parser/park or partial preview work."
          else:
              readiness_label = "eBOSS_LRG_QSO_fsigma8_covariance_extraction_passed_ready_for_ELG_grid_likelihood_parser_or_formal_park"
              next_step = (
                  "Proceed to v4.43 ELG grid likelihood parser or formal park. "
                  "Do not run an eBOSS partial covariance preview until ELG is explicitly handled."
              )

          system_health = {
              "product_pair_count": len(PRODUCT_PAIRS),
              "fetch_attempt_count": len(fetch_rows),
              "extraction_row_count": len(extraction_rows),
              "covariance_entry_count": len(covariance_entry_rows),
              "correlation_entry_count": len(correlation_entry_rows),
              "LRG_covariance_metadata_extracted": any(row["tracer"] == "LRG" and row["fsigma8_covariance_metadata_extracted"] for row in extraction_rows),
              "QSO_covariance_metadata_extracted": any(row["tracer"] == "QSO" and row["fsigma8_covariance_metadata_extracted"] for row in extraction_rows),
              "ELG_grid_parser_needed": True,
              "complete_eBOSS_covariance_mapping_now": False,
              "full_RSD_covariance_complete": False,
              "covariance_applied_to_residuals": False,
              "likelihood_run": False,
              "pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "reference_model_uncertainty_included": False,
              "WiggleZ_covariance_resolved": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          interpretation = (
              "v4.42 extracts eBOSS LRG/QSO f_sigma8 covariance metadata from the mapped DMDHfs8 result/covtot files. "
