              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_284_external_negative_control_lane_definition_and_null_precommit_no_scoring_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_284_inherited_v4_283_rows.csv", inherited_v4_283_rows)
