                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_284_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.284 External Negative Control Lane Definition And Null Precommit No Scoring",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_283_rows = {summary['inherited_v4_283_rows']}",
              f"negative_control_lane_rows = {summary['negative_control_lane_rows']}",
              f"null_precommit_card_rows = {summary['null_precommit_card_rows']}",
              f"pattern_chasing_warning_rows = {summary['pattern_chasing_warning_rows']}",
              f"future_control_execution_contract_rows = {summary['future_control_execution_contract_rows']}",
