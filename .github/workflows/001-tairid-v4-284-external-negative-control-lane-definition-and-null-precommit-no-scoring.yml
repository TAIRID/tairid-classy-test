              {"gate": "evidence_validation_blocked", "passed": any(row["permission_scope"] == "evidence_or_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "evidence/validation blocked"},
              {"gate": "all_blocked_operations_blocked", "passed": all(row["blocked"] is True for row in blocked_operation_rows), "detail": "blocked operations guarded"},
              {"gate": "exact_file_route_recommended", "passed": any(row["route"] == "external_exact_file_locator_and_checksum_guard_no_scoring" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "v4.285 exact file route recommended"},
              {"gate": "external_score_not_activated", "passed": any(row["test_id"] == "v4_285_external_data_score" and row["activated"] is False for row in next_rows), "detail": "external scoring not activated"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no scoring"},
