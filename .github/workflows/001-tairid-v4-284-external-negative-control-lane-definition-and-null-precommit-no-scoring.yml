              {"gate": "null_language_ladder_rows_equal_4", "passed": len(null_language_ladder_rows) == 4, "detail": f"null_language_ladder_rows = {len(null_language_ladder_rows)}"},
              {"gate": "blocked_operation_rows_equal_9", "passed": len(blocked_operation_rows) == 9, "detail": f"blocked_operation_rows = {len(blocked_operation_rows)}"},
              {"gate": "permission_rows_equal_10", "passed": len(permission_rows) == 10, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_7", "passed": len(readiness_rows) == 7, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "sdr_reduction_rows_equal_5", "passed": len(sdr_reduction_rows) == 5, "detail": f"sdr_reduction_rows = {len(sdr_reduction_rows)}"},
              {"gate": "all_negative_control_lanes_no_score", "passed": all(row["score_allowed"] is False for row in negative_control_lane_rows), "detail": "all negative lanes no score"},
              {"gate": "all_negative_control_lanes_no_support", "passed": all(row["support_allowed"] is False for row in negative_control_lane_rows), "detail": "all negative lanes no support"},
              {"gate": "endpoint_null_lane_present", "passed": any(row["negative_control_lane"] == "source_identity_endpoint_null" for row in negative_control_lane_rows), "detail": "endpoint null lane present"},
              {"gate": "shuffle_null_lane_present", "passed": any(row["negative_control_lane"] == "label_shuffle_permutation_null" for row in negative_control_lane_rows), "detail": "shuffle null lane present"},
              {"gate": "metadata_null_lane_present", "passed": any(row["negative_control_lane"] == "irrelevant_metadata_predictor_null" for row in negative_control_lane_rows), "detail": "metadata null lane present"},
              {"gate": "baseline_null_lane_present", "passed": any(row["negative_control_lane"] == "standard_baseline_equal_or_better_null" for row in negative_control_lane_rows), "detail": "baseline null lane present"},
              {"gate": "future_external_null_required", "passed": any(row["negative_control_lane"] == "future_external_null_source_required" and row["status"] == "required_future_exact_source_not_filled" for row in negative_control_lane_rows), "detail": "future external null required"},
              {"gate": "all_null_cards_have_freeze_status", "passed": all(bool(row["freeze_status"]) for row in null_precommit_card_rows), "detail": "all null cards have freeze status"},
              {"gate": "all_null_cards_block_support_or_validation", "passed": all(("support" in row["blocked_interpretation"]) or ("validation" in row["blocked_interpretation"]) or ("strong_support" in row["blocked_interpretation"]) for row in null_precommit_card_rows), "detail": "all null cards block support/validation"},
              {"gate": "pattern_warning_system_active", "passed": len(pattern_chasing_warning_rows) == 5 and all(bool(row["required_response"]) for row in pattern_chasing_warning_rows), "detail": "warnings have required responses"},
              {"gate": "future_controls_no_score_now", "passed": all(row["score_allowed_now"] is False for row in future_control_execution_contract_rows), "detail": "future control execution no score now"},
              {"gate": "all_source_score_updates_blocked", "passed": all(row["updated_score_permission"].startswith("blocked") for row in source_score_gate_update_rows), "detail": "updated score gates blocked"},
              {"gate": "null_language_has_control_warning", "passed": any(row["classification"] == "control_warning" for row in null_language_ladder_rows), "detail": "control warning class present"},
              {"gate": "null_language_has_control_fail", "passed": any(row["classification"] == "control_fail" for row in null_language_ladder_rows), "detail": "control fail class present"},
              {"gate": "negative_control_definition_completed", "passed": any(row["permission_scope"] == "external_negative_control_lane_definition" and row["permission_status"] == "completed_no_scoring" for row in permission_rows), "detail": "negative control definition completed"},
              {"gate": "null_precommit_frozen", "passed": any(row["permission_scope"] == "null_precommit_cards" and row["permission_status"] == "frozen_no_scoring" for row in permission_rows), "detail": "null precommit frozen"},
              {"gate": "warning_system_permission_active", "passed": any(row["permission_scope"] == "pattern_chasing_warning_system" and row["permission_status"] == "active" for row in permission_rows), "detail": "warning system active"},
              {"gate": "exact_file_locator_allowed_next", "passed": any(row["permission_scope"] == "external_exact_file_locator_and_checksum_guard" and row["permission_status"] == "allowed_next" for row in permission_rows), "detail": "exact file locator allowed next"},
              {"gate": "future_null_source_required_before_support", "passed": any(row["permission_scope"] == "future_external_null_source_selection" and row["permission_status"] == "required_before_stronger_support" for row in permission_rows), "detail": "future null source required"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external scoring blocked"},
