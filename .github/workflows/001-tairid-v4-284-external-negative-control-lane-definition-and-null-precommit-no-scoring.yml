              f"negative_control_scoring_allowed = {summary['negative_control_scoring_allowed']}",
              f"external_scoring_allowed = {summary['external_scoring_allowed']}",
              f"holdout_approval_allowed = {summary['holdout_approval_allowed']}",
              f"numeric_fit_allowed = {summary['numeric_fit_allowed']}",
