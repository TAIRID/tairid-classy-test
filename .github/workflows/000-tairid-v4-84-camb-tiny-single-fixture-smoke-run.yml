name: 000 TAIRID v4.84 CAMB Tiny Single Fixture Smoke Run

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-84-camb-tiny-single-fixture-smoke-run.yml"

jobs:
  tairid-v4-84-camb-tiny-single-fixture-smoke-run:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.84 CAMB tiny single fixture smoke run
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_84_camb_tiny_single_fixture_smoke_run

          python - <<'PY'
          import csv
          import json
          import math
          import os
          import subprocess
          import sys
          import traceback
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_84_camb_tiny_single_fixture_smoke_run")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_84_camb_tiny_single_fixture_smoke_run"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0 as a TAIRID result.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This installs and imports CAMB only for one tiny smoke-run fixture.",
              "This runs one CAMB point fixture using the v4.83 mapping contract.",
              "This records solver outputs for sigma8 and fsigma8 shape/orientation checks only.",
              "This does not compute a formal residual audit, likelihood, BIC, posterior comparison, or model selection.",
              "A pass means CAMB installed, imported, and returned finite arrays for one point fixture; it is not reference uncertainty and not TAIRID validation."
          ]

          UPSTREAM_LOCKS = {
              "v4_83_camb_tiny_single_fixture_mapping_contract": {
                  "readiness_label": "CAMB_tiny_single_fixture_mapping_contract_passed_ready_for_CAMB_tiny_single_fixture_smoke_run",
                  "mapping_contract_complete": True,
                  "CAMB_installed": False,
                  "CAMB_imported": False,
                  "CAMB_run": False,
                  "fixture_run_allowed_now": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_82_8_strict_minimum_fixture_packet_retry": {
                  "readiness_label": "strict_minimum_fixture_packet_retry_passed_ready_for_CAMB_tiny_single_fixture_mapping_contract",
                  "fixture_values_extracted": True,
                  "primary_found_count": 6,
                  "sidecar_found_count": 10,
                  "exact_token_guard_passed": True,
                  "chain_sample_rows_read": False,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          SOURCE_FIXTURE = {
              "root": "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE",
              "minimum_member_name": "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE.minimum",
              "primary_inputs": {
                  "omegabh2": {"value": 0.02237737, "label": "\\Omega_b h^2"},
                  "omegach2": {"value": 0.1201035, "label": "\\Omega_c h^2"},
                  "theta": {"value": 1.04092, "label": "100\\theta_{MC}"},
                  "tau": {"value": 0.05430138, "label": "\\tau"},
                  "logA": {"value": 3.044726, "label": "{\\rm{ln}}(10^{10} A_s)"},
                  "ns": {"value": 0.9658923, "label": "n_s"}
              },
              "sidecar_targets": {
                  "sigma8z015": {"value": 0.7498653, "label": "\\sigma_8(0.15)", "z": 0.15},
                  "fsigma8z015": {"value": 0.4605277, "label": "f\\sigma_8(0.15)", "z": 0.15},
                  "sigma8z038": {"value": 0.6642308, "label": "\\sigma_8(0.38)", "z": 0.38},
                  "fsigma8z038": {"value": 0.4779339, "label": "f\\sigma_8(0.38)", "z": 0.38},
                  "sigma8z051": {"value": 0.6214160, "label": "\\sigma_8(0.51)", "z": 0.51},
                  "fsigma8z051": {"value": 0.4760216, "label": "f\\sigma_8(0.51)", "z": 0.51},
                  "sigma8z061": {"value": 0.5911708, "label": "\\sigma_8(0.61)", "z": 0.61},
                  "fsigma8z061": {"value": 0.4706936, "label": "f\\sigma_8(0.61)", "z": 0.61},
                  "sigma8z233": {"value": 0.3069371, "label": "\\sigma_8(2.33)", "z": 2.33},
                  "fsigma8z233": {"value": 0.2979012, "label": "f\\sigma_8(2.33)", "z": 2.33}
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015"},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038"},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051"},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061"},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233"}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The CAMB smoke run validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The single point fixture is a posterior covariance.",
              "The single point fixture is Planck reference uncertainty.",
              "The output orientation preview is a final residual audit."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_85_single_fixture_output_shape_and_orientation_audit",
                  "purpose": "Audit CAMB output ordering and shape against the five redshift targets without turning it into final pressure.",
                  "why_next": "CAMB arrays may be returned in inverse redshift order; this must be locked before formal residuals."
              },
              {
                  "priority": 2,
                  "route_id": "v4_86_single_fixture_residual_audit",
                  "purpose": "Compare CAMB sigma8/fsigma8 outputs against the .minimum sidecar point targets for one fixture.",
                  "why_next": "Residuals should come only after solver output ordering is locked."
              },
              {
                  "priority": 3,
                  "route_id": "v4_87_reference_uncertainty_chain_sample_design",
                  "purpose": "Design the posterior sample path after the single point fixture works.",
                  "why_next": "A point fixture is not Planck reference uncertainty."
              },
              {
                  "priority": 4,
                  "route_id": "v4_88_ELG_or_WiggleZ_parallel_backlog",
                  "purpose": "Parallel route for parked growth-family incompleteness.",
                  "why_next": "ELG and WiggleZ remain incomplete."
              }
          ]

          failed_gates = []
          warnings = [
              "CAMB_smoke_run_only",
              "single_point_fixture_only",
              "no_full_chain_import",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          install_records = []
          solver_output_records = []
          orientation_records = []

          raw_output = {
              "CAMB_installed": False,
              "CAMB_imported": False,
              "CAMB_version": "",
              "CAMB_run": False,
              "sigma8_values_raw": [],
              "fsigma8_values_raw": [],
              "H0_recorded_from_CAMB": "",
              "Omega_m_recorded_from_CAMB": "",
              "error": ""
          }

          def run_command(command, label, timeout_seconds=600):
              record = {
                  "label": label,
                  "command": " ".join(command),
                  "returncode": None,
                  "ok": False,
                  "stdout_tail": "",
                  "stderr_tail": "",
                  "error": ""
              }
              try:
                  completed = subprocess.run(
                      command,
                      text=True,
                      capture_output=True,
                      timeout=timeout_seconds,
                      check=False
                  )
                  record["returncode"] = completed.returncode
                  record["ok"] = completed.returncode == 0
                  record["stdout_tail"] = completed.stdout[-4000:]
                  record["stderr_tail"] = completed.stderr[-4000:]
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          pip_upgrade = run_command(
              [sys.executable, "-m", "pip", "install", "--upgrade", "pip"],
              "pip_upgrade"
          )
          install_records.append(pip_upgrade)

          camb_install = run_command(
              [sys.executable, "-m", "pip", "install", "camb"],
              "pip_install_camb"
          )
          install_records.append(camb_install)

          if not camb_install["ok"]:
              failed_gates.append("CAMB_pip_install_failed")
          else:
              raw_output["CAMB_installed"] = True

          if camb_install["ok"]:
              try:
                  import importlib.metadata
                  import numpy as np
                  import camb

                  raw_output["CAMB_imported"] = True
                  try:
                      raw_output["CAMB_version"] = importlib.metadata.version("camb")
                  except Exception:
                      raw_output["CAMB_version"] = getattr(camb, "__version__", "unknown")

                  primary = SOURCE_FIXTURE["primary_inputs"]
                  ombh2 = primary["omegabh2"]["value"]
                  omch2 = primary["omegach2"]["value"]
                  theta_for_camb = primary["theta"]["value"] / 100.0
                  tau = primary["tau"]["value"]
                  As = math.exp(primary["logA"]["value"]) / 1.0e10
                  ns = primary["ns"]["value"]
                  target_z = [row["z"] for row in TARGET_REDSHIFTS]

                  pars = camb.CAMBparams()
                  if hasattr(pars, "WantCls"):
                      pars.WantCls = False
                  if hasattr(pars, "WantTransfer"):
                      pars.WantTransfer = True

                  pars.set_cosmology(
                      H0=None,
                      ombh2=ombh2,
                      omch2=omch2,
                      cosmomc_theta=theta_for_camb,
                      tau=tau,
                      omk=0.0,
                      mnu=0.06,
                  )

                  pars.InitPower.set_params(
                      As=As,
                      ns=ns,
                  )

                  pars.set_matter_power(
                      redshifts=target_z,
                      kmax=2.0,
                      nonlinear=False,
                  )

                  results = camb.get_results(pars)

                  sigma8_values = [
                      float(x) for x in np.atleast_1d(results.get_sigma8()).tolist()
                  ]
                  fsigma8_values = [
                      float(x) for x in np.atleast_1d(results.get_fsigma8()).tolist()
                  ]

                  raw_output["CAMB_run"] = True
                  raw_output["sigma8_values_raw"] = sigma8_values
                  raw_output["fsigma8_values_raw"] = fsigma8_values

                  try:
                      raw_output["H0_recorded_from_CAMB"] = float(results.Params.H0)
                  except Exception:
                      try:
                          raw_output["H0_recorded_from_CAMB"] = float(pars.H0)
                      except Exception:
                          raw_output["H0_recorded_from_CAMB"] = ""

                  try:
                      raw_output["Omega_m_recorded_from_CAMB"] = float(results.get_Omega("matter", 0))
                  except Exception:
                      raw_output["Omega_m_recorded_from_CAMB"] = ""

                  def build_orientation_records(orientation, sigma_values, fsigma_values):
                      records = []
                      for index, zrow in enumerate(TARGET_REDSHIFTS):
                          sigma_name = zrow["sigma8z_name"]
                          fsigma_name = zrow["fsigma8_name"]
                          expected_sigma = float(SOURCE_FIXTURE["sidecar_targets"][sigma_name]["value"])
                          expected_fsigma = float(SOURCE_FIXTURE["sidecar_targets"][fsigma_name]["value"])
                          sigma_value = float(sigma_values[index])
                          fsigma_value = float(fsigma_values[index])

                          records.append({
                              "orientation": orientation,
                              "index": index,
                              "z": zrow["z"],
                              "sigma8z_name": sigma_name,
                              "sigma8_camb": sigma_value,
                              "sigma8_expected_sidecar": expected_sigma,
                              "sigma8_delta_preview": sigma_value - expected_sigma,
                              "fsigma8_name": fsigma_name,
                              "fsigma8_camb": fsigma_value,
                              "fsigma8_expected_sidecar": expected_fsigma,
                              "fsigma8_delta_preview": fsigma_value - expected_fsigma,
                              "comparison_status": "orientation_preview_only_not_final_residual"
                          })
                      return records

                  if len(sigma8_values) == len(TARGET_REDSHIFTS) and len(fsigma8_values) == len(TARGET_REDSHIFTS):
                      direct_records = build_orientation_records(
                          "direct_CAMB_return_order",
                          sigma8_values,
                          fsigma8_values
                      )
                      reversed_records = build_orientation_records(
                          "reversed_CAMB_return_order",
                          list(reversed(sigma8_values)),
                          list(reversed(fsigma8_values))
                      )

                      orientation_records.extend(direct_records)
                      orientation_records.extend(reversed_records)

                      def rms(records):
                          values = []
                          for row in records:
                              values.append(float(row["sigma8_delta_preview"]))
                              values.append(float(row["fsigma8_delta_preview"]))
                          return math.sqrt(sum(v * v for v in values) / len(values)) if values else float("inf")

                      solver_output_records.append({
                          "record_type": "orientation_rms_preview",
                          "direct_rms_preview": rms(direct_records),
                          "reversed_rms_preview": rms(reversed_records),
                          "best_orientation_preview": "direct_CAMB_return_order" if rms(direct_records) <= rms(reversed_records) else "reversed_CAMB_return_order",
                          "status": "preview_only_not_formal_residual_audit"
                      })

              except Exception:
                  raw_output["error"] = traceback.format_exc()[-4000:]
                  failed_gates.append("CAMB_smoke_run_exception")

          if not raw_output["CAMB_installed"]:
              failed_gates.append("CAMB_not_installed")
          if not raw_output["CAMB_imported"]:
              failed_gates.append("CAMB_not_imported")
          if not raw_output["CAMB_run"]:
              failed_gates.append("CAMB_not_run")

          sigma8_values_raw = raw_output["sigma8_values_raw"]
          fsigma8_values_raw = raw_output["fsigma8_values_raw"]

          sigma8_shape_ok = len(sigma8_values_raw) == len(TARGET_REDSHIFTS)
          fsigma8_shape_ok = len(fsigma8_values_raw) == len(TARGET_REDSHIFTS)

          sigma8_finite = all(
              math.isfinite(float(x)) and float(x) > 0
              for x in sigma8_values_raw
          )

          fsigma8_finite = all(
              math.isfinite(float(x)) and float(x) > 0
              for x in fsigma8_values_raw
          )

          if raw_output["CAMB_run"] and not sigma8_shape_ok:
              failed_gates.append("sigma8_output_shape_not_5")
          if raw_output["CAMB_run"] and not fsigma8_shape_ok:
              failed_gates.append("fsigma8_output_shape_not_5")
          if raw_output["CAMB_run"] and not sigma8_finite:
              failed_gates.append("sigma8_output_not_positive_finite")
          if raw_output["CAMB_run"] and not fsigma8_finite:
              failed_gates.append("fsigma8_output_not_positive_finite")

          if UPSTREAM_LOCKS["v4_83_camb_tiny_single_fixture_mapping_contract"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "validates tairid cosmology",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "CAMB_tiny_single_fixture_smoke_run_passed_ready_for_single_fixture_output_shape_and_orientation_audit"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_mapping_contract_locked",
                  "pass": UPSTREAM_LOCKS["v4_83_camb_tiny_single_fixture_mapping_contract"]["mapping_contract_complete"] is True,
                  "result": "v4.83 mapping contract carried forward",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "CAMB_installed",
                  "pass": raw_output["CAMB_installed"] is True,
                  "result": str(raw_output["CAMB_installed"]),
                  "boundary": "Smoke-run dependency only."
              },
              {
                  "rule_id": "CAMB_imported",
                  "pass": raw_output["CAMB_imported"] is True,
                  "result": str(raw_output["CAMB_imported"]) + " version=" + str(raw_output["CAMB_version"]),
                  "boundary": "Smoke-run dependency only."
              },
              {
                  "rule_id": "single_fixture_CAMB_run_completed",
                  "pass": raw_output["CAMB_run"] is True,
                  "result": str(raw_output["CAMB_run"]),
                  "boundary": "One point fixture only."
              },
              {
                  "rule_id": "sigma8_output_shape_valid",
                  "pass": sigma8_shape_ok,
                  "result": f"sigma8 length={len(sigma8_values_raw)}",
                  "boundary": "Shape check only."
              },
              {
                  "rule_id": "fsigma8_output_shape_valid",
                  "pass": fsigma8_shape_ok,
                  "result": f"fsigma8 length={len(fsigma8_values_raw)}",
                  "boundary": "Shape check only."
              },
              {
                  "rule_id": "solver_outputs_positive_finite",
                  "pass": sigma8_finite and fsigma8_finite,
                  "result": f"sigma8_finite={sigma8_finite}; fsigma8_finite={fsigma8_finite}",
                  "boundary": "No residual claim."
              },
              {
                  "rule_id": "orientation_preview_written",
                  "pass": len(orientation_records) in (0, 10),
                  "result": f"orientation_records={len(orientation_records)}",
                  "boundary": "Preview only, not formal residual audit."
              },
              {
                  "rule_id": "reference_uncertainty_still_blocked",
                  "pass": True,
                  "result": "Planck reference uncertainty not computed",
                  "boundary": "No posterior covariance."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 13,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Smoke run only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_84_rules_passed")

          if failed_gates:
              readiness_label = "CAMB_tiny_single_fixture_smoke_run_failed"
              next_allowed_step = "Repair CAMB installation/import/run or output-shape handling before residual auditing."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.85 single fixture output shape and orientation audit. "
                  "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_fixture_root": SOURCE_FIXTURE["root"],
              "CAMB_installed": raw_output["CAMB_installed"],
              "CAMB_imported": raw_output["CAMB_imported"],
              "CAMB_version": raw_output["CAMB_version"],
              "CAMB_run": raw_output["CAMB_run"],
              "sigma8_output_len": len(sigma8_values_raw),
              "fsigma8_output_len": len(fsigma8_values_raw),
              "sigma8_output_positive_finite": sigma8_finite,
              "fsigma8_output_positive_finite": fsigma8_finite,
              "H0_recorded_from_CAMB": raw_output["H0_recorded_from_CAMB"],
              "Omega_m_recorded_from_CAMB": raw_output["Omega_m_recorded_from_CAMB"],
              "orientation_record_count": len(orientation_records),
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "source_fixture": SOURCE_FIXTURE,
              "target_redshifts": TARGET_REDSHIFTS,
              "install_records": install_records,
              "raw_output": raw_output,
              "solver_output_records": solver_output_records,
              "orientation_records": orientation_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "CAMB_installed": raw_output["CAMB_installed"],
                  "CAMB_imported": raw_output["CAMB_imported"],
                  "CAMB_run": raw_output["CAMB_run"],
                  "single_fixture_solver_outputs_written": raw_output["CAMB_run"],
                  "formal_residual_audit_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_84_camb_tiny_single_fixture_smoke_run.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          (OUTDIR / "camb_install_and_run_error_tail_v4_84.txt").write_text(
              raw_output.get("error", ""),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "install_records_v4_84.csv",
              install_records,
              ["label", "command", "returncode", "ok", "stdout_tail", "stderr_tail", "error"]
          )

          write_csv(
              OUTDIR / "solver_output_records_v4_84.csv",
              solver_output_records,
              ["record_type", "direct_rms_preview", "reversed_rms_preview", "best_orientation_preview", "status"]
          )

          write_csv(
              OUTDIR / "orientation_records_v4_84.csv",
              orientation_records,
              [
                  "orientation",
                  "index",
                  "z",
                  "sigma8z_name",
                  "sigma8_camb",
                  "sigma8_expected_sidecar",
                  "sigma8_delta_preview",
                  "fsigma8_name",
                  "fsigma8_camb",
                  "fsigma8_expected_sidecar",
                  "fsigma8_delta_preview",
                  "comparison_status"
              ]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_84.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_84.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_84.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.84 — CAMB Tiny Single Fixture Smoke Run")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This workflow installs/imports CAMB and runs one tiny point fixture using the locked v4.83 mapping contract.")
          md.append("")
          md.append("It records sigma8/fsigma8 array shape and an orientation preview only. It does not compute Planck reference uncertainty, final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## CAMB smoke output")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key in [
              "CAMB_installed",
              "CAMB_imported",
              "CAMB_version",
              "CAMB_run",
              "sigma8_values_raw",
              "fsigma8_values_raw",
              "H0_recorded_from_CAMB",
              "Omega_m_recorded_from_CAMB"
          ]:
              md.append(f"| `{key}` | `{raw_output.get(key, '')}` |")

          md.append("")
          md.append("## Orientation preview")
          md.append("")
          md.append("| Orientation | z | sigma8 CAMB | fsigma8 CAMB |")
          md.append("|---|---:|---:|---:|")
          for row in orientation_records:
              md.append(f"| `{row['orientation']}` | `{row['z']}` | `{row['sigma8_camb']}` | `{row['fsigma8_camb']}` |")

          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")

          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_84_camb_tiny_single_fixture_smoke_run.json",
              "tairid_v4_84_camb_tiny_single_fixture_smoke_run.md",
              "install_records_v4_84.csv",
              "solver_output_records_v4_84.csv",
              "orientation_records_v4_84.csv",
              "blocked_claims_v4_84.csv",
              "next_route_options_v4_84.csv",
              "rule_results_v4_84.csv",
              "camb_install_and_run_error_tail_v4_84.txt"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_84_camb_tiny_single_fixture_smoke_run.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.84 CAMB tiny single fixture smoke run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-84-camb-tiny-single-fixture-smoke-run
          path: artifacts/tairid_v4_84_camb_tiny_single_fixture_smoke_run/
