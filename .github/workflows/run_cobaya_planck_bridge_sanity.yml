name: Run TAIRID Cobaya Planck bridge sanity check

on:
  workflow_dispatch:

jobs:
  run-cobaya-planck-bridge-sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran libgsl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel cython numpy scipy matplotlib pyyaml
          python -m pip install classy || python -m pip install classy-community
          python -m pip install cobaya

      - name: Run Cobaya Planck bridge sanity check
        run: |
          python run_tairid_cobaya_planck_bridge_sanity.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cobaya-planck-bridge-sanity-output
          path: |
            cobaya_planck_bridge_sanity_outputs/**
