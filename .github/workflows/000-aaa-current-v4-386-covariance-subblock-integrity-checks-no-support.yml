name: "!!! AAA CURRENT - TAIRID v4.386 covariance subblock integrity checks no support"

on:
  workflow_dispatch:

jobs:
  run-v4-386-covariance-subblock-integrity-checks-no-support:
    name: "!!! AAA CURRENT - Run v4.386 covariance subblock integrity checks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Find v4.385 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.385 output ZIP by pattern..."
          INPUT_385_ZIP="$(ls tairid-v4-385-controlled-covariance-subblock-extraction-dry-run-no-scoring-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_385_ZIP" ]; then
            echo "Could not find v4.385 output ZIP."
            echo "Expected:"
            echo "tairid-v4-385-controlled-covariance-subblock-extraction-dry-run-no-scoring-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.385 ZIP:"
          echo "$INPUT_385_ZIP"
          echo "INPUT_385_ZIP=$INPUT_385_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.386 integrity checks script
        run: |
          cat > run_v4_386_covariance_subblock_integrity_checks_no_support.py <<'PY'
          #!/usr/bin/env python3
          
          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd
          import numpy as np
          
          CLAIM_BOUNDARY = "covariance subblock integrity checks only; candidate 3x3 f_sigma8 subblock values may be checked for shape, finite entries, symmetry, positive diagonal, and PSD-candidate behavior; no chi-square; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"
          
          SYMMETRY_TOL = 1e-12
          PSD_TOL = 1e-12
          
          
          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)
          
              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass
          
              return tmp
          
          
          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]
          
          
          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()
          
          
          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()
          
          
          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()
          
          
          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False
          
          
          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()
          
          
          def matrix_from_values(rows: pd.DataFrame):
              matrix = np.full((3, 3), np.nan, dtype=float)
              for _, row in rows.iterrows():
                  r = int(float(row["subblock_row_position_zero_based"]))
                  c = int(float(row["subblock_col_position_zero_based"]))
                  matrix[r, c] = float(row["candidate_covariance_subblock_value"])
              return matrix
          
          
          def matrix_to_string(matrix):
              return "|".join(
                  ",".join(f"{float(x):.18g}" for x in row)
                  for row in matrix
              )
          
          
          def main():
              input_385 = Path(os.environ["INPUT_385_ZIP"])
          
              outdir = Path("tairid_v4_386_covariance_subblock_integrity_checks_no_scoring_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)
          
              base385 = extract_zip(input_385, "tairid_v4_386_385_")
          
              summary385_path = find_one(base385, "v4_385_summary.json")
              download_ledger_path = find_one(base385, "v4_385_official_archive_download_ledger_NO_SCORING_NO_SUPPORT.csv")
              extraction_ledger_path = find_one(base385, "v4_385_controlled_subblock_extraction_ledger_NO_SCORING_NO_SUPPORT.csv")
              subblock_values_path = find_one(base385, "v4_385_candidate_fsigma8_subblock_values_FOR_INTEGRITY_CHECKS_NO_SCORING_NO_SUPPORT.csv")
              subblock_wide_path = find_one(base385, "v4_385_candidate_fsigma8_subblock_matrices_wide_NO_SCORING_NO_SUPPORT.csv")
              integrity_staging_path = find_one(base385, "v4_385_integrity_check_staging_packet_NO_SCORING_NO_SUPPORT.csv")
              extraction_summary_path = find_one(base385, "v4_385_extraction_summary_NO_SCORING_NO_SUPPORT.csv")
              route_status_path = find_one(base385, "v4_385_route_status_summary.csv")
              limitations385_path = find_one(base385, "v4_385_limitations_after_extraction_dry_run.csv")
              gap385_path = find_one(base385, "v4_385_gap_status_after_extraction_dry_run.csv")
              controlled_packet_path = find_one(base385, "v4_385_input_v4_384_controlled_extraction_packet_preserved.csv")
              coordinate_packet_path = find_one(base385, "v4_385_input_v4_384_coordinate_packet_preserved.csv")
              rules385_path = find_one(base385, "v4_385_rule_checks.csv")
          
              summary385 = json.loads(summary385_path.read_text())
              download_ledger = pd.read_csv(download_ledger_path)
              extraction_ledger = pd.read_csv(extraction_ledger_path)
              subblock_values = pd.read_csv(subblock_values_path)
              subblock_wide = pd.read_csv(subblock_wide_path)
              integrity_staging = pd.read_csv(integrity_staging_path)
              extraction_summary = pd.read_csv(extraction_summary_path)
              route_status = pd.read_csv(route_status_path)
              limitations385 = pd.read_csv(limitations385_path)
              gap385 = pd.read_csv(gap385_path)
              controlled_packet = pd.read_csv(controlled_packet_path)
              coordinate_packet = pd.read_csv(coordinate_packet_path)
              rules385 = pd.read_csv(rules385_path)
          
              integrity_rows = []
              metric_rows = []
              row_order_staging_rows = []
          
              for _, extraction in extraction_ledger.sort_values("v4_385_extraction_id").iterrows():
                  extraction_id = clean(extraction["v4_385_extraction_id"])
                  member_name = clean(extraction["selected_member_name"])
                  rows = subblock_values[subblock_values["v4_385_extraction_id"].astype(str) == extraction_id].copy()
                  matrix = matrix_from_values(rows) if len(rows) else np.full((3, 3), np.nan, dtype=float)
          
                  shape_is_3x3 = matrix.shape == (3, 3) and len(rows) == 9
                  finite_entries = bool(np.isfinite(matrix).all())
                  max_abs_asymmetry = float(np.max(np.abs(matrix - matrix.T))) if finite_entries else float("nan")
                  symmetric_within_tolerance = bool(finite_entries and max_abs_asymmetry <= SYMMETRY_TOL)
                  diagonal = np.diag(matrix) if finite_entries else np.array([np.nan, np.nan, np.nan])
                  diagonal_nonzero = bool(finite_entries and np.all(np.abs(diagonal) > 0.0))
                  diagonal_positive = bool(finite_entries and np.all(diagonal > 0.0))
                  offdiag = matrix.copy()
                  np.fill_diagonal(offdiag, 0.0)
                  max_abs_offdiag = float(np.max(np.abs(offdiag))) if finite_entries else float("nan")
                  determinant = float(np.linalg.det(matrix)) if finite_entries else float("nan")
                  eigvals = np.linalg.eigvalsh(matrix) if finite_entries and symmetric_within_tolerance else np.array([np.nan, np.nan, np.nan])
                  min_eigenvalue = float(np.min(eigvals)) if finite_entries else float("nan")
                  psd_candidate_within_tolerance = bool(finite_entries and symmetric_within_tolerance and min_eigenvalue >= -PSD_TOL)
          
                  if finite_entries and diagonal_positive:
                      denom = np.sqrt(np.outer(diagonal, diagonal))
                      corr = matrix / denom
                      corr_offdiag = corr.copy()
                      np.fill_diagonal(corr_offdiag, 0.0)
                      max_abs_offdiag_corr = float(np.max(np.abs(corr_offdiag)))
                      corr_diag_close_to_one = bool(np.allclose(np.diag(corr), np.ones(3), atol=1e-12))
                      offdiag_corr_within_unit_bound = bool(max_abs_offdiag_corr <= 1.0 + 1e-12)
                  else:
                      max_abs_offdiag_corr = float("nan")
                      corr_diag_close_to_one = False
                      offdiag_corr_within_unit_bound = False
          
                  integrity_passed = bool(
                      shape_is_3x3
                      and finite_entries
                      and symmetric_within_tolerance
                      and diagonal_nonzero
                      and diagonal_positive
                      and psd_candidate_within_tolerance
                      and offdiag_corr_within_unit_bound
                  )
          
                  integrity_id = f"v4_386_integrity_{len(integrity_rows)+1:03d}"
          
                  integrity_rows.append({
                      "v4_386_integrity_id": integrity_id,
                      "v4_385_extraction_id": extraction_id,
                      "selected_member_name": member_name,
                      "candidate_observable_family_from_filename": clean(extraction["candidate_observable_family_from_filename"]),
                      "candidate_consensus_family_from_filename": clean(extraction["candidate_consensus_family_from_filename"]),
                      "candidate_subblock_value_rows": int(len(rows)),
                      "candidate_subblock_shape_is_3x3": bool(shape_is_3x3),
                      "finite_entries": bool(finite_entries),
                      "symmetric_within_tolerance": bool(symmetric_within_tolerance),
                      "symmetry_tolerance": SYMMETRY_TOL,
                      "max_abs_asymmetry": max_abs_asymmetry,
                      "diagonal_nonzero": bool(diagonal_nonzero),
                      "diagonal_positive": bool(diagonal_positive),
                      "diag_1": float(diagonal[0]) if finite_entries else "",
                      "diag_2": float(diagonal[1]) if finite_entries else "",
                      "diag_3": float(diagonal[2]) if finite_entries else "",
                      "max_abs_offdiag": max_abs_offdiag,
                      "determinant_candidate": determinant,
                      "min_eigenvalue_candidate": min_eigenvalue,
                      "psd_candidate_within_tolerance": bool(psd_candidate_within_tolerance),
                      "max_abs_offdiag_correlation_candidate": max_abs_offdiag_corr,
                      "correlation_diagonal_close_to_one": bool(corr_diag_close_to_one),
                      "offdiag_correlation_within_unit_bound": bool(offdiag_corr_within_unit_bound),
                      "integrity_checks_passed": bool(integrity_passed),
                      "integrity_status": "passed_integrity_checks_ready_for_row_order_validation" if integrity_passed else "failed_integrity_checks_blocked",
                      "candidate_matrix_3x3_string_for_audit": matrix_to_string(matrix) if finite_entries else "",
                      "full_covariance_matrix_loaded": False,
                      "full_covariance_available": False,
                      "full_covariance_values_loaded": False,
                      "observed_row_order_matched": False,
                      "chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })
          
                  checks = [
                      ("shape_is_3x3", shape_is_3x3, "Candidate subblock has 3x3 shape and 9 value rows."),
                      ("finite_entries", finite_entries, "All candidate subblock entries are finite."),
                      ("symmetric_within_tolerance", symmetric_within_tolerance, f"Max absolute asymmetry <= {SYMMETRY_TOL}."),
                      ("diagonal_nonzero", diagonal_nonzero, "All diagonal entries are nonzero."),
                      ("diagonal_positive", diagonal_positive, "All diagonal entries are positive."),
                      ("psd_candidate_within_tolerance", psd_candidate_within_tolerance, f"Minimum eigenvalue >= -{PSD_TOL}."),
                      ("offdiag_correlation_within_unit_bound", offdiag_corr_within_unit_bound, "Derived off-diagonal correlations stay within unit bound."),
                  ]
          
                  for check_name, passed, detail in checks:
                      metric_rows.append({
                          "v4_386_metric_id": f"v4_386_metric_{len(metric_rows)+1:04d}",
                          "v4_386_integrity_id": integrity_id,
                          "v4_385_extraction_id": extraction_id,
                          "selected_member_name": member_name,
                          "check_name": check_name,
                          "passed": bool(passed),
                          "detail": detail,
                          "score_valid": False,
                          "support_allowed": False,
                          "claim_boundary": CLAIM_BOUNDARY,
                      })
          
                  if integrity_passed:
                      row_order_staging_rows.append({
                          "v4_386_row_order_staging_id": f"v4_386_row_order_stage_{len(row_order_staging_rows)+1:03d}",
                          "v4_386_integrity_id": integrity_id,
                          "v4_385_extraction_id": extraction_id,
                          "selected_member_name": member_name,
                          "candidate_observable_family_from_filename": clean(extraction["candidate_observable_family_from_filename"]),
                          "candidate_consensus_family_from_filename": clean(extraction["candidate_consensus_family_from_filename"]),
                          "candidate_redshift_order_from_prior_mapping": "z0.38|z0.51|z0.61",
                          "candidate_observed_row_ids_from_prior_mapping": "BOSS_DR12_z0.38|BOSS_DR12_z0.51|BOSS_DR12_z0.61",
                          "row_order_validation_ready": True,
                          "next_gate": "v4_387_observed_row_order_validation_no_scoring_no_support_claims",
                          "observed_row_order_matched": False,
                          "full_covariance_values_loaded": False,
                          "chi_square_computed": False,
                          "likelihood_computed": False,
                          "p_values_computed": False,
                          "score_valid": False,
                          "support_allowed": False,
                          "claim_boundary": CLAIM_BOUNDARY,
                      })
          
              integrity_ledger = pd.DataFrame(integrity_rows)
              integrity_metrics = pd.DataFrame(metric_rows)
              row_order_staging_packet = pd.DataFrame(row_order_staging_rows)
              passed_integrity = integrity_ledger[integrity_ledger["integrity_checks_passed"].astype(bool)].copy()
              failed_integrity = integrity_ledger[~integrity_ledger["integrity_checks_passed"].astype(bool)].copy()
          
              integrity_summary = pd.DataFrame([
                  {"summary_metric": "candidate_subblocks_checked", "value": int(len(integrity_ledger)), "note": "Candidate subblocks from v4.385 checked for integrity only."},
                  {"summary_metric": "integrity_passed_subblocks", "value": int(len(passed_integrity)), "note": "Subblocks that passed shape, finite, symmetry, diagonal, and PSD-candidate checks."},
                  {"summary_metric": "integrity_failed_subblocks", "value": int(len(failed_integrity)), "note": "Subblocks blocked by integrity checks."},
                  {"summary_metric": "row_order_staging_rows", "value": int(len(row_order_staging_packet)), "note": "Rows staged for observed-row-order validation."},
                  {"summary_metric": "chi_square_computed", "value": 0, "note": "No chi-square computed."},
                  {"summary_metric": "likelihood_computed", "value": 0, "note": "No likelihood computed."},
                  {"summary_metric": "score_valid", "value": 0, "note": "No scoring stage run."},
                  {"summary_metric": "support_allowed", "value": 0, "note": "No support claim is allowed."},
              ])
          
              route_status_386 = pd.DataFrame([
                  {"status_id": "V4_386_STATUS_001", "status": "subblock_integrity_checks_completed", "detail": f"{len(passed_integrity)} candidate subblocks passed integrity checks."},
                  {"status_id": "V4_386_STATUS_002", "status": "row_order_validation_next", "detail": "Passing subblocks are staged for observed-row-order validation."},
                  {"status_id": "V4_386_STATUS_003", "status": "no_scoring_performed", "detail": "No chi-square, likelihood, p-values, score, or support claim was computed."},
                  {"status_id": "V4_386_STATUS_004", "status": "support_still_blocked", "detail": "support_allowed=false remains active."},
              ])
          
              limitation_update = pd.DataFrame([
                  {"limit_id": "V4_386_LIMIT_001", "limit": "Passing integrity checks does not validate observed-row order.", "status": "active_limit"},
                  {"limit_id": "V4_386_LIMIT_002", "limit": "Passing integrity checks does not approve a scoring-ready covariance matrix.", "status": "active_limit"},
                  {"limit_id": "V4_386_LIMIT_003", "limit": "No chi-square, likelihood, or p-values are computed in v4.386.", "status": "blocked_by_design"},
                  {"limit_id": "V4_386_LIMIT_004", "limit": "No score is valid in v4.386.", "status": "blocked_by_design"},
                  {"limit_id": "V4_386_LIMIT_005", "limit": "No support claim is allowed.", "status": "blocked_by_design"},
              ])
          
              gap_update = pd.DataFrame([
                  {"gap_id": "V4_386_GAP_001", "gap": "Candidate subblock integrity checked.", "status_after_v4_386": "integrity_checked_ready_for_row_order_validation", "next_gate": "v4_387_observed_row_order_validation_no_scoring_no_support"},
                  {"gap_id": "V4_386_GAP_002", "gap": "Observed-row order remains unvalidated.", "status_after_v4_386": "still_open", "next_gate": "v4_387_observed_row_order_validation"},
                  {"gap_id": "V4_386_GAP_003", "gap": "Human approval for one guarded covariance subblock remains open.", "status_after_v4_386": "still_blocked", "next_gate": "later_human_subblock_approval_gate"},
                  {"gap_id": "V4_386_GAP_004", "gap": "Full-covariance scoring remains blocked.", "status_after_v4_386": "still_blocked", "next_gate": "later_after_row_order_and_human_approval"},
                  {"gap_id": "V4_386_GAP_005", "gap": "Support claims remain blocked.", "status_after_v4_386": "still_blocked", "next_gate": "no_support_claims_allowed_from_v4_386"},
              ])
          
              hard_checks = {
                  "input_v4_385_summary_found": summary385.get("version") == "v4.385",
                  "input_v4_385_rules_all_passed": summary_rules_all_passed(summary385),
                  "input_v4_385_failed_gates_none": summary385.get("failed_gates") == "none",
                  "input_v4_385_controlled_rows_2": summary385.get("controlled_extraction_packet_rows") == 2,
                  "input_v4_385_archive_downloaded": summary385.get("official_archive_downloaded") is True,
                  "input_v4_385_subblocks_extracted_2": summary385.get("candidate_subblocks_extracted") == 2,
                  "input_v4_385_value_rows_18": summary385.get("candidate_subblock_value_rows") == 18,
                  "input_v4_385_integrity_staging_rows_2": summary385.get("integrity_staging_packet_rows") == 2,
                  "input_v4_385_no_chi_square": summary385.get("chi_square_computed") is False,
                  "input_v4_385_no_likelihood": summary385.get("likelihood_computed") is False,
                  "input_v4_385_no_p_values": summary385.get("p_values_computed") is False,
                  "input_v4_385_no_score_valid": summary385.get("score_valid") is False,
                  "input_v4_385_no_support_allowed": summary385.get("support_allowed") is False,
          
                  "rules385_all_passed": passed_column_all(rules385),
                  "download_ledger_rows_equal_1": len(download_ledger) == 1,
                  "extraction_ledger_rows_equal_2": len(extraction_ledger) == 2,
                  "subblock_values_rows_equal_18": len(subblock_values) == 18,
                  "subblock_wide_rows_equal_6": len(subblock_wide) == 6,
                  "integrity_staging_rows_equal_2": len(integrity_staging) == 2,
                  "extraction_summary_rows_equal_8": len(extraction_summary) == 8,
                  "route_status_rows_equal_4": len(route_status) == 4,
                  "limitations385_rows_equal_5": len(limitations385) == 5,
                  "gap385_rows_equal_5": len(gap385) == 5,
                  "controlled_packet_rows_equal_2": len(controlled_packet) == 2,
                  "coordinate_packet_rows_equal_18": len(coordinate_packet) == 18,
          
                  "integrity_ledger_rows_equal_2": len(integrity_ledger) == 2,
                  "integrity_metrics_rows_equal_14": len(integrity_metrics) == 14,
                  "integrity_passed_rows_equal_2": len(passed_integrity) == 2,
                  "integrity_failed_rows_equal_0": len(failed_integrity) == 0,
                  "row_order_staging_packet_rows_equal_2": len(row_order_staging_packet) == 2,
                  "integrity_summary_rows_equal_8": len(integrity_summary) == 8,
                  "route_status_386_rows_equal_4": len(route_status_386) == 4,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,
          
                  "all_shapes_3x3": integrity_ledger["candidate_subblock_shape_is_3x3"].astype(bool).all() if len(integrity_ledger) else False,
                  "all_finite_entries": integrity_ledger["finite_entries"].astype(bool).all() if len(integrity_ledger) else False,
                  "all_symmetric": integrity_ledger["symmetric_within_tolerance"].astype(bool).all() if len(integrity_ledger) else False,
                  "all_diagonal_nonzero": integrity_ledger["diagonal_nonzero"].astype(bool).all() if len(integrity_ledger) else False,
                  "all_diagonal_positive": integrity_ledger["diagonal_positive"].astype(bool).all() if len(integrity_ledger) else False,
                  "all_psd_candidate": integrity_ledger["psd_candidate_within_tolerance"].astype(bool).all() if len(integrity_ledger) else False,
                  "all_offdiag_correlations_bounded": integrity_ledger["offdiag_correlation_within_unit_bound"].astype(bool).all() if len(integrity_ledger) else False,
          
                  "no_full_covariance_matrix_loaded": false_col(integrity_ledger, "full_covariance_matrix_loaded"),
                  "no_full_covariance_available": false_col(integrity_ledger, "full_covariance_available"),
                  "no_full_covariance_values_loaded": false_col(integrity_ledger, "full_covariance_values_loaded") and false_col(row_order_staging_packet, "full_covariance_values_loaded"),
                  "no_observed_row_order_matched": false_col(integrity_ledger, "observed_row_order_matched") and false_col(row_order_staging_packet, "observed_row_order_matched"),
                  "no_chi_square_computed": false_col(integrity_ledger, "chi_square_computed") and false_col(row_order_staging_packet, "chi_square_computed"),
                  "no_likelihood_computed": false_col(integrity_ledger, "likelihood_computed") and false_col(row_order_staging_packet, "likelihood_computed"),
                  "no_p_values_computed": false_col(integrity_ledger, "p_values_computed") and false_col(row_order_staging_packet, "p_values_computed"),
                  "no_score_valid": false_col(integrity_ledger, "score_valid") and false_col(row_order_staging_packet, "score_valid"),
                  "no_support_allowed": false_col(integrity_ledger, "support_allowed") and false_col(row_order_staging_packet, "support_allowed") and false_col(integrity_metrics, "support_allowed"),
              }
          
              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()
          
              summary386 = {
                  "version": "v4.386",
                  "route_name": "v4_386_covariance_subblock_integrity_checks_no_scoring_no_support_claims",
                  "expected_result": "v4_386_covariance_subblock_integrity_checks_passed_ready_for_row_order_validation_no_scoring_no_support_claims",
                  "input_version": "v4.385",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "candidate_subblocks_checked": int(len(integrity_ledger)),
