name: "!!! AAA CURRENT - TAIRID v4.375 official source download header staging plan no support"

on:
  workflow_dispatch:

jobs:
  run-v4-375-official-source-download-header-staging-plan-no-support:
    name: "!!! AAA CURRENT - Run v4.375 download header staging plan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.374 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.374 output ZIP by pattern..."
          INPUT_374_ZIP="$(ls tairid-v4-374-official-covariance-source-review-ingest-no-values-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_374_ZIP" ]; then
            echo "Could not find v4.374 output ZIP."
            echo "Expected:"
            echo "tairid-v4-374-official-covariance-source-review-ingest-no-values-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.374 ZIP:"
          echo "$INPUT_374_ZIP"
          echo "INPUT_374_ZIP=$INPUT_374_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.375 staging plan script
        run: |
          cat > run_v4_375_official_source_download_header_staging_plan_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "official source download/header-staging plan only; no download attempted; no source file fetched; no archive/header listing inspected; no exact covariance file staged; no covariance values loaded; no covariance dimensions confirmed; no observed-row order matched; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def boolish(value):
              return clean(value).lower() in ["true", "1", "yes"]

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def source_kind(source_type, url):
              st = clean(source_type).lower()
              lower = clean(url).lower()
              if "archive" in st or lower.endswith(".zip") or lower.endswith(".tar.gz") or lower.endswith(".tgz"):
                  return "official_archive_candidate"
              return "official_index_or_directory_candidate"

          def archive_format(url):
              lower = clean(url).lower()
              if lower.endswith(".tar.gz"):
                  return "tar.gz"
              if lower.endswith(".zip"):
                  return "zip"
              if lower.endswith(".tgz"):
                  return "tgz"
              if lower.endswith("/"):
                  return "directory_or_index"
              return "web_page_or_unknown"

          def main():
              input_374 = Path(os.environ["INPUT_374_ZIP"])

              outdir = Path("tairid_v4_375_official_source_download_header_staging_plan_no_values_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base374 = extract_zip(input_374, "tairid_v4_375_374_")

              summary374_path = find_one(base374, "v4_374_summary.json")
              review_ingest_path = find_one(base374, "v4_374_official_source_review_ingest_ledger_NO_VALUES_NO_SUPPORT.csv")
              accepted_sources_path = find_one(base374, "v4_374_ACCEPTED_official_sources_FOR_LATER_DOWNLOAD_OR_HEADER_STAGING_NO_VALUES.csv")
              exact_candidates_path = find_one(base374, "v4_374_ACCEPTED_exact_covariance_archive_candidates_NO_VALUES.csv")
              source_index_candidates_path = find_one(base374, "v4_374_ACCEPTED_source_index_candidates_NO_VALUES.csv")
              download_plan_input_path = find_one(base374, "v4_374_download_or_header_staging_plan_NO_VALUES_NO_SUPPORT.csv")
              source_review_summary_path = find_one(base374, "v4_374_source_review_summary_NO_VALUES.csv")
              limitations374_path = find_one(base374, "v4_374_limitations_after_official_source_review.csv")
              gap374_path = find_one(base374, "v4_374_gap_status_after_official_source_review.csv")
              official_candidates_path = find_one(base374, "v4_374_input_v4_373_official_candidates_preserved.csv")
              rules374_path = find_one(base374, "v4_374_rule_checks.csv")

              summary374 = json.loads(summary374_path.read_text())
              review_ingest = pd.read_csv(review_ingest_path)
              accepted_sources = pd.read_csv(accepted_sources_path)
              exact_candidates = pd.read_csv(exact_candidates_path)
              source_index_candidates = pd.read_csv(source_index_candidates_path)
              download_plan_input = pd.read_csv(download_plan_input_path)
              source_review_summary = pd.read_csv(source_review_summary_path)
              limitations374 = pd.read_csv(limitations374_path)
              gap374 = pd.read_csv(gap374_path)
              official_candidates = pd.read_csv(official_candidates_path)
              rules374 = pd.read_csv(rules374_path)

              sorted_sources = accepted_sources.copy()
              sorted_sources["priority"] = sorted_sources["priority"].apply(lambda x: int(float(x)))
              sorted_sources = sorted_sources.sort_values(["priority", "source_label"]).reset_index(drop=True)

              plan_rows = []

              for _, row in sorted_sources.iterrows():
                  kind = source_kind(row["source_type"], row["source_url"])
                  fmt = archive_format(row["source_url"])
                  is_exact_candidate = boolish(row["candidate_for_exact_covariance"])
                  is_index_candidate = boolish(row["candidate_for_source_index"])

                  if is_exact_candidate:
                      later_action = "later_download_archive_or_header_listing_only"
                  elif is_index_candidate:
                      later_action = "later_index_or_directory_listing_only"
                  else:
                      later_action = "later_review_only"

                  plan_rows.append({
                      "v4_375_staging_plan_id": f"v4_375_staging_plan_{len(plan_rows)+1:03d}",
                      "v4_374_official_source_review_id": clean(row["v4_374_official_source_review_id"]),
                      "source_label": clean(row["source_label"]),
                      "source_url": clean(row["source_url"]),
                      "source_type": clean(row["source_type"]),
                      "source_kind": kind,
                      "archive_or_source_format": fmt,
                      "priority": int(row["priority"]),
                      "candidate_for_exact_covariance": is_exact_candidate,
                      "candidate_for_source_index": is_index_candidate,
                      "later_action": later_action,
                      "staging_scope": "download_or_header_listing_plan_only_no_download_no_values",
                      "may_attempt_download_later": True,
                      "download_attempted": False,
                      "source_file_fetched": False,
                      "archive_or_header_listing_inspected": False,
                      "exact_covariance_file_staged": False,
                      "full_covariance_available": False,
                      "full_covariance_values_loaded": False,
                      "covariance_dimension_confirmed": False,
                      "observed_row_order_matched": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              staging_plan = pd.DataFrame(plan_rows)
              priority_download_candidates = staging_plan[staging_plan["candidate_for_exact_covariance"].astype(bool)].copy()
              source_index_plan = staging_plan[staging_plan["candidate_for_source_index"].astype(bool)].copy()

              human_review_packet = staging_plan.copy()
              human_review_packet["human_download_header_staging_decision"] = ""
              human_review_packet["allowed_human_download_header_staging_decisions"] = "approve_later_download_or_header_listing_attempt|needs_manual_download|reject_source_for_now|keep_blocked"
              human_review_packet["human_download_header_staging_note"] = ""
              human_review_packet["download_or_header_staging_approved_now"] = False
              human_review_packet["download_attempted"] = False
              human_review_packet["source_file_fetched"] = False
              human_review_packet["archive_or_header_listing_inspected"] = False
              human_review_packet["full_covariance_values_loaded"] = False
              human_review_packet["support_allowed"] = False

              batch_plan = pd.DataFrame([
                  {
                      "batch_id": "V4_375_BATCH_001",
                      "batch_name": "First exact-covariance archive candidates",
                      "source_priority_range": "2-3",
                      "planned_later_action": "download_or_header_listing_attempt_only_after_human_approval",
                      "reason": "Start with the DR12 consensus archive and the closest full-shape correlation-function archive.",
                      "download_attempted_now": False,
                      "values_loaded": False,
                      "support_allowed": False,
                  },
                  {
                      "batch_id": "V4_375_BATCH_002",
                      "batch_name": "Secondary DR12 full-shape archive candidates",
                      "source_priority_range": "4-6",
                      "planned_later_action": "download_or_header_listing_attempt_only_after_first_batch_or_human_choice",
                      "reason": "Wedges and power-spectrum archives may contain covariance material but may not match the three loaded rows directly.",
                      "download_attempted_now": False,
                      "values_loaded": False,
                      "support_allowed": False,
                  },
                  {
                      "batch_id": "V4_375_BATCH_003",
                      "batch_name": "Official index and directory fallback",
                      "source_priority_range": "1,7",
                      "planned_later_action": "index_or_directory_lookup_if_archive_candidates_do_not_match",
                      "reason": "Use official pages/directories to repair URLs or locate exact covariance material.",
                      "download_attempted_now": False,
                      "values_loaded": False,
                      "support_allowed": False,
                  },
                  {
                      "batch_id": "V4_375_BATCH_004",
                      "batch_name": "Do not ingest values yet",
                      "source_priority_range": "all",
                      "planned_later_action": "header_listing_only_before_values",
                      "reason": "Archive contents must be inspected before shape/order gates can even be planned.",
                      "download_attempted_now": False,
                      "values_loaded": False,
                      "support_allowed": False,
                  },
                  {
                      "batch_id": "V4_375_BATCH_005",
                      "batch_name": "Truth boundary",
                      "source_priority_range": "all",
                      "planned_later_action": "no_support_claims",
                      "reason": "This remains source staging only.",
                      "download_attempted_now": False,
                      "values_loaded": False,
                      "support_allowed": False,
                  },
              ])

              safety_boundaries = pd.DataFrame([
                  {
                      "boundary_id": "V4_375_BOUNDARY_001",
                      "boundary": "v4.375 creates a download/header-staging plan only.",
                      "status": "active_limit",
                  },
                  {
                      "boundary_id": "V4_375_BOUNDARY_002",
                      "boundary": "No network download or source fetch is attempted in v4.375.",
                      "status": "blocked_by_design",
                  },
                  {
                      "boundary_id": "V4_375_BOUNDARY_003",
                      "boundary": "No covariance values are loaded in v4.375.",
                      "status": "blocked_by_design",
                  },
                  {
                      "boundary_id": "V4_375_BOUNDARY_004",
                      "boundary": "No covariance dimension or observed-row order match is confirmed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "boundary_id": "V4_375_BOUNDARY_005",
                      "boundary": "No likelihood, p-values, score, or support claim is allowed.",
                      "status": "blocked_by_design",
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_375_GAP_001",
                      "gap": "Official source download/header-staging plan created.",
                      "status_after_v4_375": "plan_created_no_download_no_values",
                      "next_gate": "v4_376_download_header_staging_review_ingest_no_values_no_support",
                  },
                  {
                      "gap_id": "V4_375_GAP_002",
                      "gap": "Source download or header listing remains unattempted.",
                      "status_after_v4_375": "still_open",
                      "next_gate": "human_review_then_controlled_download_or_header_listing_attempt",
                  },
                  {
                      "gap_id": "V4_375_GAP_003",
                      "gap": "Covariance values remain unloaded.",
                      "status_after_v4_375": "still_blocked",
                      "next_gate": "later_after_archive_listing_and_exact_file_identification",
                  },
                  {
                      "gap_id": "V4_375_GAP_004",
                      "gap": "Covariance dimensions and observed-row order remain unconfirmed.",
                      "status_after_v4_375": "still_blocked",
                      "next_gate": "later_shape_and_order_gate",
                  },
                  {
                      "gap_id": "V4_375_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_375": "still_blocked",
                      "next_gate": "no_support_claims_allowed_from_v4_375",
                  },
              ])

              hard_checks = {
                  "input_v4_374_summary_found": summary374.get("version") == "v4.374",
                  "input_v4_374_rules_all_passed": summary_rules_all_passed(summary374),
                  "input_v4_374_failed_gates_none": summary374.get("failed_gates") == "none",
                  "input_v4_374_accepted_sources_7": summary374.get("accepted_official_source_rows") == 7,
                  "input_v4_374_exact_candidates_5": summary374.get("accepted_exact_covariance_candidate_rows") == 5,
                  "input_v4_374_source_index_candidates_2": summary374.get("accepted_source_index_candidate_rows") == 2,
                  "input_v4_374_no_download_attempted": summary374.get("download_attempted") is False,
                  "input_v4_374_no_source_file_fetched": summary374.get("source_file_fetched") is False,
                  "input_v4_374_no_exact_file_staged": summary374.get("exact_covariance_file_staged") is False,
                  "input_v4_374_no_full_covariance": summary374.get("full_covariance_available") is False,
                  "input_v4_374_no_values_loaded": summary374.get("full_covariance_values_loaded") is False,
                  "input_v4_374_no_dimension_confirmed": summary374.get("covariance_dimension_confirmed") is False,
                  "input_v4_374_no_row_order": summary374.get("observed_row_order_matched") is False,
                  "input_v4_374_no_likelihood": summary374.get("likelihood_computed") is False,
                  "input_v4_374_no_p_values": summary374.get("p_values_computed") is False,
                  "input_v4_374_no_score_valid": summary374.get("score_valid") is False,
                  "input_v4_374_no_support_allowed": summary374.get("support_allowed") is False,

                  "rules374_all_passed": passed_column_all(rules374),
                  "review_ingest_rows_equal_7": len(review_ingest) == 7,
                  "accepted_sources_rows_match_summary": len(accepted_sources) == int(summary374.get("accepted_official_source_rows")),
                  "exact_candidates_rows_match_summary": len(exact_candidates) == int(summary374.get("accepted_exact_covariance_candidate_rows")),
                  "source_index_candidates_rows_match_summary": len(source_index_candidates) == int(summary374.get("accepted_source_index_candidate_rows")),
                  "download_plan_input_rows_equal_accepted": len(download_plan_input) == len(accepted_sources),
                  "source_review_summary_rows_equal_6": len(source_review_summary) == 6,
                  "limitations374_rows_equal_5": len(limitations374) == 5,
                  "gap374_rows_equal_5": len(gap374) == 5,
                  "official_candidates_rows_equal_7": len(official_candidates) == 7,

                  "staging_plan_rows_equal_accepted": len(staging_plan) == len(accepted_sources),
                  "priority_download_candidates_rows_equal_5": len(priority_download_candidates) == 5,
                  "source_index_plan_rows_equal_2": len(source_index_plan) == 2,
                  "human_review_packet_rows_equal_staging_plan": len(human_review_packet) == len(staging_plan),
                  "batch_plan_rows_equal_5": len(batch_plan) == 5,
                  "safety_boundaries_rows_equal_5": len(safety_boundaries) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_download_attempted": false_col(staging_plan, "download_attempted") and false_col(human_review_packet, "download_attempted"),
                  "no_source_file_fetched": false_col(staging_plan, "source_file_fetched") and false_col(human_review_packet, "source_file_fetched"),
                  "no_archive_or_header_listing_inspected": false_col(staging_plan, "archive_or_header_listing_inspected") and false_col(human_review_packet, "archive_or_header_listing_inspected"),
                  "no_exact_covariance_file_staged": false_col(staging_plan, "exact_covariance_file_staged"),
                  "no_full_covariance_available": false_col(staging_plan, "full_covariance_available"),
                  "no_covariance_values_loaded": false_col(staging_plan, "full_covariance_values_loaded") and false_col(human_review_packet, "full_covariance_values_loaded"),
                  "no_covariance_dimension_confirmed": false_col(staging_plan, "covariance_dimension_confirmed"),
                  "no_observed_row_order_matched": false_col(staging_plan, "observed_row_order_matched"),
                  "no_likelihood_computed": false_col(staging_plan, "likelihood_computed"),
                  "no_p_values_computed": false_col(staging_plan, "p_values_computed"),
                  "no_score_valid": false_col(staging_plan, "score_valid"),
                  "no_support_allowed": false_col(staging_plan, "support_allowed") and false_col(human_review_packet, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary375 = {
                  "version": "v4.375",
                  "route_name": "v4_375_official_source_download_or_header_staging_plan_no_values_no_support_claims",
                  "expected_result": "v4_375_official_source_download_header_staging_plan_passed_no_download_no_values_no_support_claims",
                  "input_version": "v4.374",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "staging_plan_rows": int(len(staging_plan)),
                  "priority_download_candidate_rows": int(len(priority_download_candidates)),
                  "source_index_plan_rows": int(len(source_index_plan)),
                  "human_review_packet_rows": int(len(human_review_packet)),
                  "download_attempted": False,
                  "source_file_fetched": False,
                  "archive_or_header_listing_inspected": False,
                  "exact_covariance_file_staged": False,
                  "full_covariance_available": False,
                  "full_covariance_values_loaded": False,
                  "covariance_dimension_confirmed": False,
                  "observed_row_order_matched": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "human_fill_v4_375_download_header_staging_review_then_v4_376_download_header_staging_review_ingest_no_values_no_support_claims",
              }

              staging_plan.to_csv(outdir / "v4_375_official_source_download_header_staging_plan_NO_DOWNLOAD_NO_VALUES.csv", index=False)
              priority_download_candidates.to_csv(outdir / "v4_375_priority_download_archive_candidates_NO_DOWNLOAD_NO_VALUES.csv", index=False)
              source_index_plan.to_csv(outdir / "v4_375_source_index_fallback_plan_NO_DOWNLOAD_NO_VALUES.csv", index=False)
              human_review_packet.to_csv(outdir / "v4_375_HUMAN_FILL_download_header_staging_review_NO_VALUES_NO_SUPPORT.csv", index=False)
              batch_plan.to_csv(outdir / "v4_375_controlled_download_batch_plan_NO_DOWNLOAD.csv", index=False)
              safety_boundaries.to_csv(outdir / "v4_375_safety_boundaries_NO_VALUES_NO_SUPPORT.csv", index=False)
              gap_update.to_csv(outdir / "v4_375_gap_status_after_download_header_staging_plan.csv", index=False)
              accepted_sources.to_csv(outdir / "v4_375_input_v4_374_accepted_sources_preserved.csv", index=False)
              exact_candidates.to_csv(outdir / "v4_375_input_v4_374_exact_candidates_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_375_rule_checks.csv", index=False)

              (outdir / "v4_375_summary.json").write_text(json.dumps(summary375, indent=2))

              summary_md = f"""# TAIRID v4.375 Official Source Download/Header-Staging Plan — No Download, No Values, No Support Claims

          Expected result: `{summary375["expected_result"]}`

          {summary375["rules_passed"]} / {summary375["rules_total"]} rules passed

          failed_gates = {summary375["failed_gates"]}

          staging_plan_rows = {summary375["staging_plan_rows"]}

          priority_download_candidate_rows = {summary375["priority_download_candidate_rows"]}

          source_index_plan_rows = {summary375["source_index_plan_rows"]}

          download_attempted = false

          source_file_fetched = false

          archive_or_header_listing_inspected = false

          exact_covariance_file_staged = false

          full_covariance_available = false

          full_covariance_values_loaded = false

          covariance_dimension_confirmed = false

          observed_row_order_matched = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step creates a controlled plan for later download/header staging only.

          It does **not** download or fetch source files.

          It does **not** inspect archive contents.

          It does **not** load covariance values.

          It does **not** confirm covariance dimensions or observed-row order.

          It does **not** compute likelihood or p-values.

          It does **not** make support claims.

          Next route: `{summary375["selected_next_route"]}`
          """
              (outdir / "v4_375_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary375, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_375_official_source_download_header_staging_plan_no_support.py

      - name: Run v4.375 official source download header staging plan no support
        run: |
          python run_v4_375_official_source_download_header_staging_plan_no_support.py

      - name: Upload v4.375 official source download header staging plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-375-official-source-download-header-staging-plan-no-values-no-support-output
          path: |
            tairid_v4_375_official_source_download_header_staging_plan_no_values_no_support_output/
            tairid_v4_375_official_source_download_header_staging_plan_no_values_no_support_output.zip
