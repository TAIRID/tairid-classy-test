name: 001 TAIRID v4.295 - SDSS RSD Diagnostic Score Guard Precommit No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-295-sdss-rsd-diagnostic-score-guard-precommit-no-scoring.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-diagnostic-score-guard-precommit-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.295 SDSS RSD Diagnostic Score Guard Precommit No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.295 SDSS RSD diagnostic score guard precommit no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import html
          import re
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.295"
          ROUTE = "sdss_rsd_diagnostic_score_guard_precommit_no_scoring_after_v4_294"
          EXPECTED_RESULT = "v4_295_sdss_rsd_diagnostic_score_guard_precommit_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_296_sdss_rsd_diagonal_diagnostic_readiness_probe_no_scoring"

          OUT = Path("tairid_v4_295_sdss_rsd_diagnostic_score_guard_precommit_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-295-sdss-rsd-diagnostic-score-guard-precommit-output.zip"
          SOURCE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/"
          RELATED_PAGE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          MAX_BYTES = 2_000_000

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=MAX_BYTES, timeout=15):
              out = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.295-diagnostic-score-guard-precommit-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      out["status_code"] = getattr(resp, "status", "")
                      out["content_type"] = resp.headers.get("Content-Type", "")
                      out["content_length_header"] = resp.headers.get("Content-Length", "")
                      out["final_url"] = resp.geturl()
                      out["bytes_read"] = len(data)
                      out["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      out["fetch_ok"] = True
              except Exception as exc:
                  out["error"] = f"{type(exc).__name__}: {exc}"
              return out, data

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              try:
                  fields["z_eff"] = float(fields["z_eff_text"])
              except Exception:
                  fields["z_eff"] = ""
              return fields

          def parse_column_contract_rows(tables):
              out = []
              for table_idx, table in enumerate(tables):
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      row_type = "redshift_function_row_candidate" if "(z)" in label_norm else "final_or_consensus_row_candidate"
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for value, sigma in measurement_pairs(cell):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              out.append({
                                  "contract_id": f"column_contract_bound_{len(out)+1:02d}",
                                  "bound_id": f"bound_{len(out)+1:02d}",
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "z_eff": fields["z_eff"],
                                  "z_range_text": fields["z_range_text"],
                                  "observable": "f_sigma8",
                                  "observed_value": value,
                                  "observed_sigma": sigma,
                                  "score_allowed": False,
                                  "contract_status": "rebuilt_for_diagnostic_score_guard_precommit_no_scoring",
                              })
              return out

          inherited_v4_294_rows = [
              {"inherited_from": "v4.294", "item": "rules", "value": "58 / 58 passed", "meaning": "Row-family and covariance policy passed.", "carry_forward_status": "ready_for_score_guard"},
              {"inherited_from": "v4.294", "item": "source_fetch_ok", "value": True, "meaning": "GitHub fetched the SDSS table page.", "carry_forward_status": "source_page_available"},
              {"inherited_from": "v4.294", "item": "related_fetch_ok", "value": True, "meaning": "GitHub fetched the SDSS overview page.", "carry_forward_status": "related_page_available"},
              {"inherited_from": "v4.294", "item": "column_contract_rows", "value": 12, "meaning": "Twelve SDSS f_sigma8 rows existed.", "carry_forward_status": "observed_rows_ready"},
              {"inherited_from": "v4.294", "item": "row_family_selected_for_score", "value": False, "meaning": "No row family selected for score.", "carry_forward_status": "row_family_not_selected"},
              {"inherited_from": "v4.294", "item": "provisional_primary_policy_preference", "value": "f σ 8", "meaning": "f_sigma8 is only a provisional future-review preference.", "carry_forward_status": "policy_preference_only"},
              {"inherited_from": "v4.294", "item": "mixed_fsigma_rows_blocked", "value": True, "meaning": "Mixed f_sigma8 row-family scoring is blocked.", "carry_forward_status": "double_count_guard_active"},
              {"inherited_from": "v4.294", "item": "full_covariance_present", "value": False, "meaning": "No full covariance is present.", "carry_forward_status": "full_covariance_missing"},
              {"inherited_from": "v4.294", "item": "reported_sigmas_available", "value": True, "meaning": "Reported one-sigma values are available but not covariance.", "carry_forward_status": "diagonal_possible_later"},
              {"inherited_from": "v4.294", "item": "diagonal_diagnostic_allowed_later", "value": True, "meaning": "A diagonal-only diagnostic can be allowed later with strict ceiling.", "carry_forward_status": "diagnostic_possible_later"},
              {"inherited_from": "v4.294", "item": "diagonal_diagnostic_allowed_now", "value": False, "meaning": "A diagonal-only diagnostic is not allowed now.", "carry_forward_status": "diagnostic_blocked_now"},
              {"inherited_from": "v4.294", "item": "baseline_values_filled", "value": False, "meaning": "No baselines filled.", "carry_forward_status": "baseline_missing"},
              {"inherited_from": "v4.294", "item": "approved_baseline_values", "value": 0, "meaning": "No baselines approved.", "carry_forward_status": "baseline_missing"},
              {"inherited_from": "v4.294", "item": "row_meaning_confirmed", "value": False, "meaning": "Row meaning remains unconfirmed.", "carry_forward_status": "row_meaning_missing"},
              {"inherited_from": "v4.294", "item": "support_allowed", "value": False, "meaning": "Support remains blocked.", "carry_forward_status": "support_blocked"},
              {"inherited_from": "v4.294", "item": "selected_next_route", "value": "v4_295_sdss_rsd_diagnostic_score_guard_precommit_no_scoring", "meaning": "Current route writes score guard precommit.", "carry_forward_status": "current_route"},
          ]

          source_fetch_row, source_data = fetch_url(SOURCE_URL)
          related_fetch_row, related_data = fetch_url(RELATED_PAGE_URL)

          parser = SimpleTableParser()
          if source_data:
              parser.feed(source_data.decode("utf-8", errors="replace"))
          column_contract_rows = parse_column_contract_rows(parser.tables)

          diagnostic_score_guard_precommit_rows = [
              {
                  "guard_id": "diag_guard_001",
                  "guard_name": "score_must_refuse_when_requirements_missing",
                  "rule": "If selected row family, approved baselines, definition match, row meaning, or diagnostic/covariance policy are missing, score must refuse.",
                  "status": "precommitted",
                  "score_allowed_now": False,
              },
              {
                  "guard_id": "diag_guard_002",
                  "guard_name": "diagonal_only_label_required",
                  "rule": "Any later diagonal calculation must label itself diagonal_only_diagnostic and not likelihood/evidence.",
                  "status": "precommitted",
                  "score_allowed_now": False,
              },
              {
                  "guard_id": "diag_guard_003",
                  "guard_name": "no_p_value_without_full_covariance",
                  "rule": "No p-value or likelihood may be computed from web-table sigmas alone.",
                  "status": "precommitted",
                  "score_allowed_now": False,
              },
              {
                  "guard_id": "diag_guard_004",
                  "guard_name": "outcome_labels_frozen_before_score",
                  "rule": "Outcome labels must be frozen before any diagnostic calculation.",
                  "status": "precommitted",
                  "score_allowed_now": False,
              },
              {
                  "guard_id": "diag_guard_005",
                  "guard_name": "same_family_no_support_ceiling",
                  "rule": "Same-family SDSS/eBOSS diagnostics may be compatibility, neutral, weaken, invalid, or blocked; never proof/support/validation.",
                  "status": "precommitted",
                  "score_allowed_now": False,
              },
              {
                  "guard_id": "diag_guard_006",
                  "guard_name": "baseline_equal_or_better_blocks_tairid",
                  "rule": "If a standard comparator explains results as well or better, TAIRID support remains blocked and the diagnostic can only weaken or remain neutral.",
                  "status": "precommitted",
                  "score_allowed_now": False,
              },
          ]

          outcome_label_precommit_rows = [
              {"label_id": "label_001", "label": "blocked_invalid", "meaning": "Required objects are missing or illegal source is used.", "support_allowed": False, "score_status": "no_score_or_invalid_score"},
              {"label_id": "label_002", "label": "parser_or_fetch_failure", "meaning": "Data fetch/parse failed; no theory result.", "support_allowed": False, "score_status": "no_score"},
              {"label_id": "label_003", "label": "weaken", "meaning": "Result conflicts with precommitted expectation or standard baseline explains better.", "support_allowed": False, "score_status": "diagnostic_possible_later"},
              {"label_id": "label_004", "label": "neutral", "meaning": "Diagnostic result is non-discriminating or ordinary under baseline.", "support_allowed": False, "score_status": "diagnostic_possible_later"},
              {"label_id": "label_005", "label": "exploratory_compatible", "meaning": "Diagnostic direction is compatible but not independent, not evidential, and not support.", "support_allowed": False, "score_status": "diagnostic_possible_later"},
              {"label_id": "label_006", "label": "guard_failure", "meaning": "Workflow attempted an illegal shortcut or unsupported claim.", "support_allowed": False, "score_status": "workflow_failure"},
          ]

          diagonal_diagnostic_null_behavior_rows = [
              {"null_id": "null_001", "null_name": "self_baseline_null", "rule": "Observed value cannot be its own baseline.", "failure_label": "guard_failure", "support_allowed": False},
              {"null_id": "null_002", "null_name": "row_variant_baseline_null", "rule": "f_sigma8(z) and f_sigma8 cannot be used as each other's baseline.", "failure_label": "guard_failure", "support_allowed": False},
              {"null_id": "null_003", "null_name": "endpoint_metadata_null", "rule": "URL/hash/byte count cannot be signal.", "failure_label": "guard_failure", "support_allowed": False},
              {"null_id": "null_004", "null_name": "label_shuffle_null", "rule": "If a shuffled or permuted label diagnostic looks equally good, result is neutral or invalid, not support.", "failure_label": "neutral_or_blocked_invalid", "support_allowed": False},
              {"null_id": "null_005", "null_name": "standard_baseline_equal_or_better_null", "rule": "If standard comparator is equal or better, result is neutral/weaken only.", "failure_label": "neutral_or_weaken", "support_allowed": False},
              {"null_id": "null_006", "null_name": "same_family_source_null", "rule": "Same-family source cannot be holdout validation.", "failure_label": "exploratory_ceiling", "support_allowed": False},
          ]

          diagnostic_readiness_gate_rows = [
              {"gate_id": "ready_gate_001", "requirement": "selected_row_family", "current_status": "missing", "required_before_diagnostic": True, "passed_now": False},
              {"gate_id": "ready_gate_002", "requirement": "approved_baseline_values", "current_status": "missing", "required_before_diagnostic": True, "passed_now": False},
              {"gate_id": "ready_gate_003", "requirement": "definition_match", "current_status": "missing", "required_before_diagnostic": True, "passed_now": False},
              {"gate_id": "ready_gate_004", "requirement": "row_meaning_confirmed", "current_status": "missing", "required_before_diagnostic": True, "passed_now": False},
              {"gate_id": "ready_gate_005", "requirement": "diagonal_policy_written", "current_status": "present_from_v4_294", "required_before_diagnostic": True, "passed_now": True},
              {"gate_id": "ready_gate_006", "requirement": "score_guard_precommitted", "current_status": "present_in_v4_295", "required_before_diagnostic": True, "passed_now": True},
              {"gate_id": "ready_gate_007", "requirement": "same_family_no_support_ceiling", "current_status": "present", "required_before_diagnostic": True, "passed_now": True},
          ]

          score_interpretation_ladder_rows = [
              {"ladder_id": "ladder_001", "condition": "fetch_or_parser_failure", "result_label": "parser_or_fetch_failure", "allowed_claim": "no theory result"},
              {"ladder_id": "ladder_002", "condition": "required_objects_missing", "result_label": "blocked_invalid", "allowed_claim": "score refused"},
              {"ladder_id": "ladder_003", "condition": "illegal_shortcut_used", "result_label": "guard_failure", "allowed_claim": "workflow unsafe"},
              {"ladder_id": "ladder_004", "condition": "baseline_equal_or_better", "result_label": "neutral_or_weaken", "allowed_claim": "no TAIRID support"},
              {"ladder_id": "ladder_005", "condition": "TAIRID_direction_compatible_under_diagonal_only", "result_label": "exploratory_compatible", "allowed_claim": "compatibility only, no support"},
              {"ladder_id": "ladder_006", "condition": "TAIRID_direction_conflicts_under_diagnostic", "result_label": "weaken", "allowed_claim": "weaken TAIRID expectation"},
          ]

          diagnostic_score_attempt_policy_rows = []
          for row in column_contract_rows:
              diagnostic_score_attempt_policy_rows.append({
                  "policy_attempt_id": f"diag_policy_attempt_{row['bound_id']}",
                  "bound_id": row["bound_id"],
                  "row_label": row["row_label"],
                  "sample_or_tracer": row["sample_or_tracer"],
                  "z_eff": row["z_eff"],
                  "observed_value": row["observed_value"],
                  "observed_sigma": row["observed_sigma"],
                  "diagonal_diagnostic_allowed_now": False,
                  "score_value": "NOT_COMPUTED",
                  "residual": "NOT_COMPUTED",
                  "chi_square_component": "NOT_COMPUTED",
                  "p_value": "NOT_COMPUTED",
                  "likelihood": "NOT_COMPUTED",
                  "refusal_reason": "selected_row_family_baseline_definition_row_meaning_missing",
                  "support_allowed": False,
              })

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "run_diagonal_diagnostic_now", "reason": "readiness gates still fail", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "compute_residual_now", "reason": "approved baseline missing", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "compute_chi_square_now", "reason": "approved baseline missing and guard is precommit only", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "compute_p_value_or_likelihood", "reason": "full covariance missing", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "select_row_family_now", "reason": "row meaning still unconfirmed", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "approve_baseline_values_now", "reason": "candidate review approved none", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "claim_tairid_support", "reason": "same-family no-support ceiling", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "claim_evidence_or_validation", "reason": "no score, no covariance, no holdout", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_010", "operation": "approve_holdout_source", "reason": "SDSS/eBOSS remains same-family lane", "blocked": True},
              {"blocked_id": "blocked_011", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "diagnostic_score_guard_precommit", "permission_status": "written_no_scoring", "reason": "Outcome labels and null behavior are frozen."},
              {"permission_scope": "diagonal_diagnostic_readiness_probe", "permission_status": "allowed_next", "reason": "Next workflow may test readiness under this guard without scoring."},
              {"permission_scope": "diagonal_diagnostic_score", "permission_status": "blocked_now", "reason": "Row family/baseline/definition/row meaning still missing."},
              {"permission_scope": "p_value_or_likelihood", "permission_status": "blocked", "reason": "Full covariance missing."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
              {"permission_scope": "validation_or_evidence_claim", "permission_status": "blocked", "reason": "No evidence/validation allowed."},
          ]

          readiness_rows = [
              {"readiness_id": "ready_001", "object": "diagnostic_score_guard", "status": "precommitted", "meaning": "Guard written."},
              {"readiness_id": "ready_002", "object": "outcome_labels", "status": "frozen", "meaning": "Outcome labels written before score."},
              {"readiness_id": "ready_003", "object": "null_behavior", "status": "precommitted", "meaning": "Null behavior written before score."},
              {"readiness_id": "ready_004", "object": "diagonal_diagnostic_readiness", "status": "false", "meaning": "Readiness gates still fail."},
              {"readiness_id": "ready_005", "object": "diagnostic_readiness_probe", "status": "ready_next", "meaning": "Next workflow can test readiness under guard."},
              {"readiness_id": "ready_006", "object": "external_scoring", "status": "blocked", "meaning": "Still not allowed."},
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "Diagnostic score guard is precommitted before any score.",
                  "basis": "Outcome labels, null behavior, and claim ceilings are frozen.",
                  "next_action": "Use the guard in the next readiness probe.",
                  "claim_status": "guard_written",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "Diagonal-only diagnostic remains blocked now.",
                  "basis": "Selected row family, approved baselines, definition match, and row meaning are still missing.",
                  "next_action": "Do not score yet.",
                  "claim_status": "score_blocked",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "No later diagonal diagnostic can produce support.",
                  "basis": "Same-family and diagonal-only ceiling restrict outputs to blocked, invalid, neutral, weaken, or exploratory compatibility.",
                  "next_action": "Preserve no-support ceiling.",
                  "claim_status": "support_blocked",
              },
              {
                  "decision_id": "decision_004",
                  "decision": "The next route is diagonal diagnostic readiness probe, still no scoring.",
                  "basis": "The score guard now exists and can be tested against current missing objects.",
                  "next_action": SELECTED_NEXT_ROUTE,
                  "claim_status": "safe_to_continue",
              },
          ]

          route_review_rows = [
              {"route_id": "route_001", "route": "sdss_rsd_diagonal_diagnostic_readiness_probe_no_scoring", "permission_status": "recommended", "reason": "Use the new guard to test readiness before any diagnostic."},
              {"route_id": "route_002", "route": "sdss_rsd_diagonal_diagnostic_score", "permission_status": "blocked_until_readiness_passes", "reason": "Row family, baseline, definition match, and row meaning still missing."},
              {"route_id": "route_003", "route": "sdss_rsd_full_likelihood_score", "permission_status": "blocked_until_full_covariance", "reason": "Full covariance/likelihood source missing."},
              {"route_id": "route_004", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.295 is a clean diagnostic guard milestone."},
          ]

          sdr_reduction_rows = [
