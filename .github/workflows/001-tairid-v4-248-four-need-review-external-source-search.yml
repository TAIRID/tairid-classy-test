name: 001 TAIRID v4.248 - Four Need Review External Source Search

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-248-four-need-review-external-source-search.yml"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  four-need-review-external-source-search:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.248 Four Need Review External Source Search is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.248 four need review external source search
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import zipfile

          VERSION = "v4.248"
          ROUTE = "four_need_closure_review_or_external_source_search_after_v4_247"
          EXPECTED_RESULT = "v4_248_four_need_review_external_source_search_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_249_primary_qso_source_search_or_manual_observed_manifest_fill_plan"

          OUT = Path("tairid_v4_248_four_need_review_external_source_search_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-248-four-need-review-external-source-search-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def safe_float(value):
              try:
                  return float(value)
              except Exception:
                  return None

          def is_placeholder(value):
              text = str(value or "").strip().lower()
              return (
                  not text
                  or text.startswith("put_")
                  or "put_" in text
                  or text.startswith("do_not_fill")
                  or text in ["todo", "none", "na", "n/a", "template_not_filled"]
              )

          inherited_v4_247_rows = [
              {
                  "inherited_from": "v4.247",
                  "item": "rules",
                  "value": "34 / 34 passed",
                  "meaning": "Four Need Closure Guard passed.",
                  "carry_forward_status": "ready_for_review",
              },
              {
                  "inherited_from": "v4.247",
                  "item": "parameter_freeze_lock_rows",
                  "value": 8,
                  "meaning": "Parameter freeze guard exists.",
                  "carry_forward_status": "closed_as_guard_not_numeric_fit",
              },
              {
                  "inherited_from": "v4.247",
                  "item": "observed_manifest_schema_rows",
                  "value": 13,
                  "meaning": "External observed manifest builder exists.",
                  "carry_forward_status": "template_ready_manifest_missing",
              },
              {
                  "inherited_from": "v4.247",
                  "item": "secondary_control_review_rows",
                  "value": 5,
                  "meaning": "Secondary/control review packet exists.",
                  "carry_forward_status": "review_only_not_evidence",
              },
              {
                  "inherited_from": "v4.247",
                  "item": "combined_matrix_permission_rows",
                  "value": 6,
                  "meaning": "Combined matrix permission was rechecked.",
                  "carry_forward_status": "combined_matrix_blocked_and_documented",
              },
              {
                  "inherited_from": "v4.247",
                  "item": "observed_manifest_input_rows",
                  "value": 0,
                  "meaning": "No external observed manifest rows exist.",
                  "carry_forward_status": "external_scoring_blocked",
              },
              {
                  "inherited_from": "v4.247",
                  "item": "primary_qso_growth_holdout",
                  "value": "missing",
                  "meaning": "No clean primary QSO growth holdout source exists.",
                  "carry_forward_status": "primary_evidence_lane_blocked",
              },
              {
                  "inherited_from": "v4.247",
                  "item": "selected_next_route",
                  "value": "v4_248_four_need_closure_review_or_external_source_search",
                  "meaning": "Current route should review closures and prepare source search.",
                  "carry_forward_status": "current_route",
              },
          ]

          four_need_closure_review_rows = [
              {
                  "need_id": "need_001_parameter_freeze_guard",
                  "need_name": "Parameter freeze guard",
                  "v4_247_status": "closed_as_guard",
                  "what_is_ready": "theta/W_axis/S_source/prior gate/failure/reference/claim/matrix policies are guarded",
                  "what_is_still_missing": "numeric parameter choices remain unfrozen and unfitted",
                  "scoring_permission": "blocked",
              },
              {
                  "need_id": "need_002_external_observed_manifest_builder",
                  "need_name": "External observed manifest builder",
                  "v4_247_status": "template_ready",
                  "what_is_ready": "13-column schema and four template rows exist",
                  "what_is_still_missing": "actual reviewed observed rows and source/covariance references",
                  "scoring_permission": "blocked",
              },
              {
                  "need_id": "need_003_secondary_control_source_review",
                  "need_name": "Secondary/control source review",
                  "v4_247_status": "packet_ready_review_only",
                  "what_is_ready": "QSO radial, LRG control, geometry control, role-check, and primary-missing lanes are separated",
                  "what_is_still_missing": "manual review of source/covariance/provenance",
                  "scoring_permission": "blocked",
              },
              {
                  "need_id": "need_004_combined_matrix_permission_recheck",
                  "need_name": "Combined matrix permission recheck",
                  "v4_247_status": "blocked_and_documented",
                  "what_is_ready": "single-source diagnostic lanes are separated and combined matrix blocks are explicit",
                  "what_is_still_missing": "source-surface compatibility, observed manifest, primary holdout, and covariance compatibility",
                  "scoring_permission": "blocked",
              },
          ]

          closure_score_rows = [
              {
                  "closure_area": "workflow_guard_structure",
                  "score_out_of_10": 9,
                  "reason": "freeze, manifest, review, and matrix guards are now written and passed",
                  "remaining_gap": "needs real source rows and later scoring workflow",
              },
              {
                  "closure_area": "reference_and_formula_scaffold",
                  "score_out_of_10": 8,
                  "reason": "reference calculator and symbolic correction contract exist",
                  "remaining_gap": "needs pre-score numeric parameter policy and observed data",
              },
              {
                  "closure_area": "observed_external_data",
                  "score_out_of_10": 1,
                  "reason": "manifest template exists but observed_manifest_input_rows = 0",
                  "remaining_gap": "needs manually reviewed external observed source",
              },
              {
                  "closure_area": "primary_qso_growth_holdout",
                  "score_out_of_10": 0,
                  "reason": "primary QSO growth holdout remains missing",
                  "remaining_gap": "needs QSO-like f_sigma8 or comparable growth source with covariance/likelihood",
              },
              {
                  "closure_area": "evidence_language",
                  "score_out_of_10": 2,
                  "reason": "candidate-pressure language is allowed but evidence/validation remains blocked",
                  "remaining_gap": "needs independent holdout or external likelihood fit",
              },
          ]

          external_source_search_requirement_rows = [
              {
                  "requirement_id": "source_req_001",
                  "required_item": "primary QSO-like growth observable",
                  "minimum_condition": "source must include f_sigma8 or comparable growth/RSD measurement, not geometry-only",
                  "blocked_substitute": "QSO radial geometry, D_V, LRG control, LyA cross-surface, or same-release mirror",
              },
              {
                  "requirement_id": "source_req_002",
                  "required_item": "independent provenance",
                  "minimum_condition": "source must be independent from exact v4.223-v4.247 source files and same-release mirrors",
                  "blocked_substitute": "copied current files or package mirror of the same surface",
              },
              {
                  "requirement_id": "source_req_003",
                  "required_item": "redshift and tracer role",
                  "minimum_condition": "source must identify tracer, redshift, and source family clearly",
                  "blocked_substitute": "unlabeled mixed compilation without tracer/source role",
              },
              {
                  "requirement_id": "source_req_004",
                  "required_item": "uncertainty or likelihood",
                  "minimum_condition": "source must provide sigma, covariance, inverse covariance, or likelihood surface",
                  "blocked_substitute": "value-only table with no uncertainty policy",
              },
              {
                  "requirement_id": "source_req_005",
                  "required_item": "reference join compatibility",
                  "minimum_condition": "observable must map to reference target quantity before residual scoring",
                  "blocked_substitute": "raw value comparison without reference-value join",
              },
              {
                  "requirement_id": "source_req_006",
                  "required_item": "failure condition attached",
                  "minimum_condition": "row must use pre-written failure_001 through failure_005 before scoring",
                  "blocked_substitute": "posthoc success/failure language",
              },
              {
                  "requirement_id": "source_req_007",
                  "required_item": "manual review status",
                  "minimum_condition": "manifest row must be reviewed_not_scored before any parser/scoring guard",
                  "blocked_substitute": "automatic approval or evidence claim",
              },
              {
                  "requirement_id": "source_req_008",
                  "required_item": "source lane separation",
                  "minimum_condition": "primary, secondary, control, geometry, and role-check lanes must stay separate",
                  "blocked_substitute": "combined LRG/ELG/QSO matrix or neurotype-cosmology merge",
              },
          ]

          external_source_search_packet_rows = [
              {
                  "search_packet_id": "search_001_primary_qso_growth",
                  "search_target": "QSO/quasar RSD or growth measurement",
                  "needed_observable": "f_sigma8_or_comparable_growth",
                  "priority": 1,
                  "allowed_manifest_role": "primary_qso_growth_holdout_only_after_manual_review",
                  "current_status": "missing",
              },
              {
                  "search_packet_id": "search_002_qso_growth_likelihood",
                  "search_target": "QSO/quasar full-shape or RSD likelihood surface",
                  "needed_observable": "growth_or_RSD_likelihood_with_covariance",
                  "priority": 1,
                  "allowed_manifest_role": "primary_qso_growth_holdout_only_after_manual_review",
                  "current_status": "missing",
              },
              {
                  "search_packet_id": "search_003_qso_radial_secondary",
                  "search_target": "QSO radial BAO or D_H/r_s style source",
                  "needed_observable": "D_H_over_r_sound_or_equivalent",
                  "priority": 2,
                  "allowed_manifest_role": "secondary_only",
                  "current_status": "candidate_lane_exists_but_not_primary",
              },
              {
                  "search_packet_id": "search_004_lrg_growth_control",
                  "search_target": "LRG-like growth/RSD control source",
                  "needed_observable": "f_sigma8_or_comparable_growth",
                  "priority": 3,
                  "allowed_manifest_role": "control_only",
                  "current_status": "candidate_lane_exists_but_not_primary",
              },
              {
                  "search_packet_id": "search_005_geometry_control",
                  "search_target": "BAO geometry source",
                  "needed_observable": "D_V_or_D_M_D_H_geometry",
                  "priority": 4,
                  "allowed_manifest_role": "geometry_control_only",
                  "current_status": "candidate_lane_exists_but_not_growth",
              },
              {
                  "search_packet_id": "search_006_external_role_check",
                  "search_target": "unresolved external source candidate",
                  "needed_observable": "must_be_identified_by_review",
                  "priority": 5,
                  "allowed_manifest_role": "none_until_role_assigned",
                  "current_status": "candidate_lane_exists_but_unassigned",
              },
          ]

          source_acceptance_criteria_rows = [
              {
                  "criteria_id": "accept_001",
                  "question": "Is the observable a growth/RSD observable rather than geometry-only?",
                  "required_answer_for_primary_qso": "yes",
              },
              {
                  "criteria_id": "accept_002",
                  "question": "Is the source QSO/quasar-like rather than LRG/ELG/geometry/control?",
                  "required_answer_for_primary_qso": "yes",
              },
              {
                  "criteria_id": "accept_003",
                  "question": "Is the source independent from exact current files and same-release mirrors?",
                  "required_answer_for_primary_qso": "yes",
              },
              {
                  "criteria_id": "accept_004",
                  "question": "Does the source include sigma, covariance, inverse covariance, or likelihood?",
                  "required_answer_for_primary_qso": "yes",
              },
              {
                  "criteria_id": "accept_005",
                  "question": "Can the observable be joined to a reference target and quantity?",
                  "required_answer_for_primary_qso": "yes",
              },
              {
                  "criteria_id": "accept_006",
                  "question": "Is the failure condition frozen before scoring?",
                  "required_answer_for_primary_qso": "yes",
              },
              {
                  "criteria_id": "accept_007",
                  "question": "Is approval status review-only and not evidence?",
                  "required_answer_for_primary_qso": "yes",
              },
              {
                  "criteria_id": "accept_008",
                  "question": "Does the row avoid combined matrix interpretation?",
                  "required_answer_for_primary_qso": "yes",
              },
          ]

          observed_manifest_status_rows = []
          observed_manifest_input_rows = []
          found_manifests = [path for path in OBSERVED_MANIFEST_CANDIDATES if path.exists()]

          if not found_manifests:
              observed_manifest_status_rows.append({
                  "manifest_path": "",
                  "manifest_status": "missing",
                  "observed_rows": 0,
                  "detail": "No external observed manifest found. Source search remains the priority.",
              })
          else:
              for path in found_manifests:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in REQUIRED_OBSERVED_COLUMNS if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          "observed_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          for row in rows:
                              observed_manifest_input_rows.append({col: row.get(col, "") for col in REQUIRED_OBSERVED_COLUMNS})
                  except Exception as exc:
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          "observed_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })

          observed_manifest_validation_rows = []
          for row in observed_manifest_input_rows:
              issues = []
              z = safe_float(row.get("redshift"))
              val = safe_float(row.get("observed_value"))
              if not row.get("observed_id"):
                  issues.append("missing_observed_id")
              if not row.get("target_id"):
                  issues.append("missing_target_id")
              if z is None or z < 0:
                  issues.append("bad_redshift")
              if val is None:
                  issues.append("bad_observed_value")
              if is_placeholder(row.get("data_path_or_url")):
                  issues.append("data_source_placeholder")
              if is_placeholder(row.get("covariance_path_or_url")):
                  issues.append("covariance_placeholder")
              if is_placeholder(row.get("reference_model_path_or_method")):
                  issues.append("reference_method_placeholder")
              if row.get("source_role") == "primary_qso_growth_holdout" and row.get("approval_status") != "reviewed_primary_holdout_not_scored":
                  issues.append("primary_holdout_not_reviewed")
              if row.get("approval_status") in ["approved_for_scoring", "approved", "evidence"]:
                  issues.append("approval_status_too_strong_for_guard")

              observed_manifest_validation_rows.append({
                  "observed_id": row.get("observed_id", ""),
                  "source_family": row.get("source_family", ""),
                  "source_role": row.get("source_role", ""),
                  "quantity": row.get("quantity", ""),
                  "redshift": row.get("redshift", ""),
                  "validation_issues": "|".join(issues) if issues else "none",
                  "review_status": "reviewable_not_scored" if not issues else "blocked_by_manifest_issues",
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          route_decision_rows = [
              {
                  "route_id": "route_001",
                  "route": "primary_qso_source_search",
                  "permission_status": "recommended",
                  "reason": "primary QSO growth holdout remains missing and is the largest blocker",
              },
              {
                  "route_id": "route_002",
                  "route": "manual_observed_manifest_fill",
                  "permission_status": "blocked_until_source_review",
                  "reason": "manifest cannot be filled honestly until a reviewed source exists",
              },
              {
                  "route_id": "route_003",
                  "route": "secondary_control_review",
                  "permission_status": "allowed_review_only",
                  "reason": "secondary/control lanes can be reviewed but not promoted",
              },
              {
                  "route_id": "route_004",
                  "route": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "no observed source, no parameter freeze values, and no external likelihood fit",
              },
              {
                  "route_id": "route_005",
                  "route": "combined_matrix",
                  "permission_status": "blocked",
                  "reason": "source-surface compatibility and observed manifest are unresolved",
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "four_need_closure_review",
                  "permission_status": "allowed",
                  "reason": "v4.247 guard closures can be reviewed.",
              },
              {
                  "permission_scope": "external_source_search_packet",
                  "permission_status": "written",
                  "reason": "search requirements and acceptance criteria are written.",
              },
              {
                  "permission_scope": "manual_observed_manifest_fill",
                  "permission_status": "blocked_until_source_review",
                  "reason": "no reviewed primary source exists yet.",
              },
              {
                  "permission_scope": "secondary_control_review",
                  "permission_status": "allowed_review_only",
                  "reason": "secondary/control candidates cannot be promoted to primary evidence.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "no observed source and no parameter values are ready.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "observed manifest is missing or unreviewed.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "primary QSO growth holdout remains missing.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "combined matrix remains blocked by source-surface guards.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "no external likelihood fit or holdout scoring has run.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_249_primary_qso_source_search_packet",
                  "purpose": "focus on finding a true QSO-like growth/RSD source with covariance or likelihood",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_249_manual_observed_manifest_fill_plan",
                  "purpose": "prepare manual fill instructions only if reviewed source exists",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_249_secondary_control_review_only",
                  "purpose": "review secondary/control rows without evidence language",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_249_no_combined_matrix_review",
                  "purpose": "combined matrix remains blocked",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before four-need review"},
              {"gate": "inherited_v4_247_rows_equal_8", "passed": len(inherited_v4_247_rows) == 8, "detail": f"inherited_v4_247_rows = {len(inherited_v4_247_rows)}"},
              {"gate": "four_need_closure_review_rows_equal_4", "passed": len(four_need_closure_review_rows) == 4, "detail": f"four_need_closure_review_rows = {len(four_need_closure_review_rows)}"},
              {"gate": "all_four_needs_scoring_blocked", "passed": all(row["scoring_permission"] == "blocked" for row in four_need_closure_review_rows), "detail": "all four needs remain non-scoring"},
              {"gate": "closure_score_rows_equal_5", "passed": len(closure_score_rows) == 5, "detail": f"closure_score_rows = {len(closure_score_rows)}"},
              {"gate": "external_source_search_requirement_rows_equal_8", "passed": len(external_source_search_requirement_rows) == 8, "detail": f"external_source_search_requirement_rows = {len(external_source_search_requirement_rows)}"},
              {"gate": "external_source_search_packet_rows_equal_6", "passed": len(external_source_search_packet_rows) == 6, "detail": f"external_source_search_packet_rows = {len(external_source_search_packet_rows)}"},
              {"gate": "source_acceptance_criteria_rows_equal_8", "passed": len(source_acceptance_criteria_rows) == 8, "detail": f"source_acceptance_criteria_rows = {len(source_acceptance_criteria_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "observed_manifest_validation_rows_match_inputs", "passed": len(observed_manifest_validation_rows) == len(observed_manifest_input_rows), "detail": f"observed_manifest_validation_rows = {len(observed_manifest_validation_rows)}, observed_manifest_input_rows = {len(observed_manifest_input_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "permission_rows_equal_9", "passed": len(permission_rows) == 9, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "primary_qso_search_recommended", "passed": any(row["route"] == "primary_qso_source_search" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "primary QSO source search recommended"},
              {"gate": "manual_manifest_fill_blocked_until_review", "passed": any(row["permission_scope"] == "manual_observed_manifest_fill" and row["permission_status"] == "blocked_until_source_review" for row in permission_rows), "detail": "manual manifest fill blocked until source review"},
              {"gate": "secondary_control_review_only", "passed": any(row["permission_scope"] == "secondary_control_review" and row["permission_status"] == "allowed_review_only" for row in permission_rows), "detail": "secondary/control review only"},
              {"gate": "numeric_correction_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric correction fit blocked"},
              {"gate": "external_observed_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external observed scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO evidence blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "primary_search_packet_priority_1", "passed": any(row["search_packet_id"] == "search_001_primary_qso_growth" and row["priority"] == 1 for row in external_source_search_packet_rows), "detail": "primary QSO search packet priority 1"},
              {"gate": "all_acceptance_criteria_require_yes", "passed": all(row["required_answer_for_primary_qso"] == "yes" for row in source_acceptance_criteria_rows), "detail": "all primary criteria require yes"},
              {"gate": "observed_manifest_input_zero_or_non_scoring", "passed": all(row["scoring_allowed"] is False for row in observed_manifest_validation_rows), "detail": "observed manifest rows, if any, are non-scoring"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric correction fit"},
              {"gate": "truth_boundary_no_external_scoring", "passed": True, "detail": "no external observed scoring"},
              {"gate": "truth_boundary_no_primary_holdout", "passed": True, "detail": "no primary QSO holdout"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix remains blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_249_primary_qso_source_search_or_manual_observed_manifest_fill_plan", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_248_four_need_review_external_source_search_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_248_inherited_v4_247_rows.csv", inherited_v4_247_rows)
          write_csv(OUT / "v4_248_four_need_closure_review_rows.csv", four_need_closure_review_rows)
          write_csv(OUT / "v4_248_closure_score_rows.csv", closure_score_rows)
          write_csv(OUT / "v4_248_external_source_search_requirement_rows.csv", external_source_search_requirement_rows)
          write_csv(OUT / "v4_248_external_source_search_packet_rows.csv", external_source_search_packet_rows)
          write_csv(OUT / "v4_248_source_acceptance_criteria_rows.csv", source_acceptance_criteria_rows)
          write_csv(OUT / "v4_248_observed_manifest_status_rows.csv", observed_manifest_status_rows)
          write_csv(OUT / "v4_248_observed_manifest_validation_rows.csv", observed_manifest_validation_rows)
          write_csv(OUT / "v4_248_route_decision_rows.csv", route_decision_rows)
          write_csv(OUT / "v4_248_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_248_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_248_rule_checks.csv", checks)

          closure_lines = [
              f"{row['need_name']}: {row['v4_247_status']} — missing: {row['what_is_still_missing']}"
              for row in four_need_closure_review_rows
          ]

          score_lines = [
              f"{row['closure_area']}: {row['score_out_of_10']}/10 — gap: {row['remaining_gap']}"
              for row in closure_score_rows
          ]

          route_lines = [
              f"{row['route']}: {row['permission_status']} — {row['reason']}"
              for row in route_decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_247_rows": len(inherited_v4_247_rows),
              "four_need_closure_review_rows": len(four_need_closure_review_rows),
              "closure_score_rows": len(closure_score_rows),
              "external_source_search_requirement_rows": len(external_source_search_requirement_rows),
              "external_source_search_packet_rows": len(external_source_search_packet_rows),
              "source_acceptance_criteria_rows": len(source_acceptance_criteria_rows),
              "observed_manifest_status_rows": len(observed_manifest_status_rows),
              "observed_manifest_input_rows": len(observed_manifest_input_rows),
              "observed_manifest_validation_rows": len(observed_manifest_validation_rows),
              "route_decision_rows": len(route_decision_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "primary_qso_source_search": "recommended",
              "manual_manifest_fill": "blocked_until_source_review",
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "primary_holdout_exists": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_248_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.248 Four Need Review External Source Search",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_247_rows = {summary['inherited_v4_247_rows']}",
              f"four_need_closure_review_rows = {summary['four_need_closure_review_rows']}",
              f"closure_score_rows = {summary['closure_score_rows']}",
              f"external_source_search_requirement_rows = {summary['external_source_search_requirement_rows']}",
              f"external_source_search_packet_rows = {summary['external_source_search_packet_rows']}",
              f"source_acceptance_criteria_rows = {summary['source_acceptance_criteria_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"observed_manifest_input_rows = {summary['observed_manifest_input_rows']}",
              f"observed_manifest_validation_rows = {summary['observed_manifest_validation_rows']}",
              f"route_decision_rows = {summary['route_decision_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"primary_qso_source_search = {summary['primary_qso_source_search']}",
              f"manual_manifest_fill = {summary['manual_manifest_fill']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Four-need closure review:",
              *closure_lines,
              "",
              "Closure score:",
              *score_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.248 reviews the four guard closures and confirms they are closed only as guards. The real evidence blocker remains a missing primary QSO-like growth source and missing observed manifest rows. The next route should prioritize primary QSO source search before any manifest fill or scoring.",
              "",
              "Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no primary QSO holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_248_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_247_rows = {summary['inherited_v4_247_rows']}")
          print(f"four_need_closure_review_rows = {summary['four_need_closure_review_rows']}")
          print(f"closure_score_rows = {summary['closure_score_rows']}")
          print(f"external_source_search_requirement_rows = {summary['external_source_search_requirement_rows']}")
          print(f"external_source_search_packet_rows = {summary['external_source_search_packet_rows']}")
          print(f"source_acceptance_criteria_rows = {summary['source_acceptance_criteria_rows']}")
          print(f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}")
          print(f"observed_manifest_input_rows = {summary['observed_manifest_input_rows']}")
          print(f"observed_manifest_validation_rows = {summary['observed_manifest_validation_rows']}")
          print(f"route_decision_rows = {summary['route_decision_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"primary_qso_source_search = {summary['primary_qso_source_search']}")
          print(f"manual_manifest_fill = {summary['manual_manifest_fill']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no primary QSO holdout source, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.248 four need review external source search output
        uses: actions/upload-artifact@v4
        with:
