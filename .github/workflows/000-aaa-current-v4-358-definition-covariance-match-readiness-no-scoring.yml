name: "!!! AAA CURRENT - TAIRID v4.358 definition covariance match readiness no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-358-definition-covariance-match-readiness-no-scoring:
    name: "!!! AAA CURRENT - Run v4.358 definition covariance readiness"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.357 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.357 output ZIP by pattern..."
          INPUT_357_ZIP="$(ls tairid-v4-357-explicit-observed-value-loading-approval-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_357_ZIP" ]; then
            echo "Could not find v4.357 output ZIP."
            echo "Expected:"
            echo "tairid-v4-357-explicit-observed-value-loading-approval-no-scoring-output.zip"
            exit 1
          fi

          echo "Using v4.357 ZIP:"
          echo "$INPUT_357_ZIP"
          echo "INPUT_357_ZIP=$INPUT_357_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.358 definition covariance readiness script
        run: |
          cat > run_v4_358_definition_covariance_match_readiness_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values approved; numeric baseline approved; schema approved; observed values loaded; definition/covariance readiness may be prepared here; no definition/covariance confirmation; no scoring; no support claims"

          ALLOWED_DEFINITION_DECISIONS = (
              "approve_definition_match_for_later_scoring_readiness|"
              "needs_definition_repair|"
              "reject_observed_row|"
              "keep_blocked"
          )

          ALLOWED_COVARIANCE_DECISIONS = (
              "approve_diagonal_error_model_for_guarded_diagnostic_only|"
              "requires_full_covariance_before_scoring|"
              "needs_covariance_repair|"
              "reject_observed_row|"
              "keep_blocked"
          )

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def covariance_status(error_model):
              text = clean(error_model).lower()
              if "diagonal" in text and "covariance" in text:
                  return "diagonal_error_candidate_needs_human_covariance_decision"
              if "full covariance" in text or "full_covariance" in text:
                  return "full_covariance_candidate_needs_human_covariance_decision"
              return "covariance_or_error_model_unclear_needs_repair"

          def main():
              input_357 = Path(os.environ["INPUT_357_ZIP"])

              outdir = Path("tairid_v4_358_definition_covariance_match_readiness_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base357 = extract_zip(input_357, "tairid_v4_358_357_")

              summary357_path = find_one(base357, "v4_357_summary.json")
              loaded_values_path = find_one(base357, "v4_357_LOADED_OBSERVED_VALUES_NO_DEFINITION_MATCH_NO_SCORING.csv")
              loading_ledger_path = find_one(base357, "v4_357_observed_value_loading_approval_ledger_NO_SCORING.csv")
              dry_rows_path = find_one(base357, "v4_357_input_v4_356_dry_run_rows_preserved.csv")
              approved_schema_path = find_one(base357, "v4_357_input_v4_356_approved_schema_preserved.csv")
              gap_status_path = find_one(base357, "v4_357_gap_status_after_observed_value_loading_approval.csv")
              rules357_path = find_one(base357, "v4_357_rule_checks.csv")

              summary357 = json.loads(summary357_path.read_text())
              loaded_values = pd.read_csv(loaded_values_path)
              loading_ledger = pd.read_csv(loading_ledger_path)
              dry_rows = pd.read_csv(dry_rows_path)
              approved_schema = pd.read_csv(approved_schema_path)
              gap_status = pd.read_csv(gap_status_path)
              rules357 = pd.read_csv(rules357_path)

              definition_rows = []
              covariance_rows = []

              for _, row in loaded_values.iterrows():
                  z = float(row["effective_redshift_z"])
                  fs8 = float(row["observed_fsigma8"])
                  err = float(row["observed_fsigma8_uncertainty"])
                  cov_model = clean(row["covariance_or_error_model"])

                  definition_ready = (
                      clean(row["survey_or_source"]) != ""
                      and clean(row["tracer_or_sample"]) != ""
                      and z > 0
                      and fs8 > 0
                      and err > 0
                  )

                  definition_rows.append({
                      "v4_358_definition_readiness_id": f"v4_358_definition_ready_{len(definition_rows)+1:03d}",
                      "v4_357_observed_value_id": clean(row["v4_357_observed_value_id"]),
                      "survey_or_source": clean(row["survey_or_source"]),
                      "tracer_or_sample": clean(row["tracer_or_sample"]),
                      "effective_redshift_z": z,
                      "observed_fsigma8": fs8,
                      "observed_fsigma8_uncertainty": err,
                      "source_reference": clean(row["source_reference"]),
                      "source_url": clean(row["source_url"]),
                      "definition_candidate_status": "candidate_ready_for_human_definition_review_not_confirmed" if definition_ready else "definition_candidate_needs_repair",
                      "definition_question": "Does this row represent an observed fσ8/RSD growth measurement at the stated effective redshift, compatible with later baseline comparison?",
                      "definition_match_confirmed_now": False,
                      "covariance_match_confirmed_now": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

                  covariance_rows.append({
                      "v4_358_covariance_readiness_id": f"v4_358_covariance_ready_{len(covariance_rows)+1:03d}",
                      "v4_357_observed_value_id": clean(row["v4_357_observed_value_id"]),
                      "survey_or_source": clean(row["survey_or_source"]),
                      "tracer_or_sample": clean(row["tracer_or_sample"]),
                      "effective_redshift_z": z,
                      "observed_fsigma8_uncertainty": err,
                      "covariance_or_error_model": cov_model,
                      "covariance_candidate_status": covariance_status(cov_model),
                      "covariance_question": "Is the current error model acceptable only for a guarded diagonal diagnostic, or is full covariance required before scoring?",
                      "definition_match_confirmed_now": False,
                      "covariance_match_confirmed_now": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              definition_readiness = pd.DataFrame(definition_rows)
              covariance_readiness = pd.DataFrame(covariance_rows)

              review_packet = definition_readiness.merge(
                  covariance_readiness[
                      [
                          "v4_357_observed_value_id",
                          "covariance_or_error_model",
                          "covariance_candidate_status",
                          "covariance_question",
                      ]
                  ],
                  on="v4_357_observed_value_id",
                  how="left",
              )

              review_packet["human_definition_match_decision"] = ""
              review_packet["allowed_human_definition_match_decisions"] = ALLOWED_DEFINITION_DECISIONS
              review_packet["human_definition_match_note"] = ""
              review_packet["human_covariance_match_decision"] = ""
              review_packet["allowed_human_covariance_match_decisions"] = ALLOWED_COVARIANCE_DECISIONS
              review_packet["human_covariance_match_note"] = ""
              review_packet["human_diagonal_only_warning_acknowledgement"] = ""
              review_packet["definition_match_confirmed_now"] = False
              review_packet["covariance_match_confirmed_now"] = False
              review_packet["score_valid"] = False
              review_packet["support_allowed"] = False

              readiness_summary = pd.DataFrame([
                  {
                      "readiness_metric": "loaded_observed_rows_available",
                      "value": int(len(loaded_values)),
                      "note": "Observed values are loaded from v4.357 but not yet definition/covariance confirmed.",
                  },
                  {
                      "readiness_metric": "definition_candidate_rows",
                      "value": int(len(definition_readiness)),
                      "note": "Rows prepared for human definition-match review.",
                  },
                  {
                      "readiness_metric": "covariance_candidate_rows",
                      "value": int(len(covariance_readiness)),
                      "note": "Rows prepared for human covariance/error-model review.",
                  },
                  {
                      "readiness_metric": "definition_match_confirmed_rows",
                      "value": 0,
                      "note": "No definition match is confirmed in v4.358.",
                  },
                  {
                      "readiness_metric": "covariance_match_confirmed_rows",
                      "value": 0,
                      "note": "No covariance/error-model match is confirmed in v4.358.",
                  },
                  {
                      "readiness_metric": "score_valid_rows",
                      "value": 0,
                      "note": "No scoring is valid in v4.358.",
                  },
              ])

              checklist = pd.DataFrame([
                  {
                      "check_id": "V4_358_CHECK_001",
                      "check": "Loaded observed rows exist before definition/covariance review.",
                      "required_before_scoring": True,
                  },
                  {
                      "check_id": "V4_358_CHECK_002",
                      "check": "Each row has redshift, observed fσ8, and uncertainty.",
                      "required_before_scoring": True,
                  },
                  {
                      "check_id": "V4_358_CHECK_003",
                      "check": "Human must decide whether definition match is acceptable.",
                      "required_before_scoring": True,
                  },
                  {
                      "check_id": "V4_358_CHECK_004",
                      "check": "Human must decide whether diagonal-only error model is allowed for guarded diagnostic or full covariance is required.",
                      "required_before_scoring": True,
                  },
                  {
                      "check_id": "V4_358_CHECK_005",
                      "check": "This step does not compute residuals, chi-square, likelihood, p-values, or scores.",
                      "required_before_support_claims": True,
                  },
                  {
                      "check_id": "V4_358_CHECK_006",
                      "check": "Support claims remain blocked.",
                      "required_before_support_claims": True,
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_358_GAP_001",
                      "gap": "Definition/covariance readiness packet created.",
                      "status_after_v4_358": "review_packet_prepared_not_confirmed",
                      "next_gate": "human_fill_v4_358_definition_covariance_review_then_v4_359_ingest",
                  },
                  {
                      "gap_id": "V4_358_GAP_002",
                      "gap": "Definition match remains unconfirmed.",
                      "status_after_v4_358": "still_blocked",
                      "next_gate": "v4_359_definition_covariance_review_ingest",
                  },
                  {
                      "gap_id": "V4_358_GAP_003",
                      "gap": "Covariance/error-model match remains unconfirmed.",
                      "status_after_v4_358": "still_blocked",
                      "next_gate": "v4_359_definition_covariance_review_ingest",
                  },
                  {
                      "gap_id": "V4_358_GAP_004",
                      "gap": "Scoring remains blocked.",
                      "status_after_v4_358": "still_blocked",
                      "next_gate": "later_scoring_readiness_gate",
                  },
                  {
                      "gap_id": "V4_358_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_358": "still_blocked",
                      "next_gate": "later_support_interpretation_gate_only_after_scoring",
                  },
              ])

              hard_checks = {
                  "input_v4_357_summary_found": summary357.get("version") == "v4.357",
                  "input_v4_357_rules_all_passed": summary_rules_all_passed(summary357),
                  "input_v4_357_failed_gates_none": summary357.get("failed_gates") == "none",
                  "input_v4_357_parameter_values_approved_true": summary357.get("parameter_values_approved") is True,
                  "input_v4_357_numeric_baseline_approved_true": summary357.get("numeric_baseline_approved") is True,
                  "input_v4_357_schema_approved_true": summary357.get("schema_approved") is True,
                  "input_v4_357_observed_values_loaded_true": summary357.get("observed_values_loaded") is True,
                  "input_v4_357_observed_rows_loaded_3": summary357.get("observed_rows_loaded") == 3,
                  "input_v4_357_no_definition_match_confirmed": summary357.get("definition_match_confirmed") is False,
                  "input_v4_357_no_covariance_match_confirmed": summary357.get("covariance_match_confirmed") is False,
                  "input_v4_357_no_score_valid": summary357.get("score_valid") is False,
                  "input_v4_357_no_support_allowed": summary357.get("support_allowed") is False,

                  "rules357_all_passed": rules357["passed"].astype(bool).all(),
                  "loaded_values_rows_match_summary": len(loaded_values) == int(summary357.get("observed_rows_loaded")),
                  "loading_ledger_rows_match_loaded_values": len(loading_ledger) == len(loaded_values),
                  "dry_rows_rows_match_loaded_values": len(dry_rows) == len(loaded_values),
                  "gap_status_rows_equal_5": len(gap_status) == 5,
                  "approved_schema_rows_equal_1": len(approved_schema) == 1,
                  "all_loaded_rows_marked_loaded": true_col(loaded_values, "observed_values_loaded"),
                  "all_positive_redshift": loaded_values["effective_redshift_z"].astype(float).gt(0).all(),
                  "all_positive_fsigma8": loaded_values["observed_fsigma8"].astype(float).gt(0).all(),
                  "all_positive_uncertainties": loaded_values["observed_fsigma8_uncertainty"].astype(float).gt(0).all(),

                  "definition_readiness_rows_equal_loaded": len(definition_readiness) == len(loaded_values),
                  "covariance_readiness_rows_equal_loaded": len(covariance_readiness) == len(loaded_values),
                  "review_packet_rows_equal_loaded": len(review_packet) == len(loaded_values),
                  "readiness_summary_rows_equal_6": len(readiness_summary) == 6,
                  "checklist_rows_equal_6": len(checklist) == 6,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "definition_match_confirmed_false": false_col(review_packet, "definition_match_confirmed_now"),
                  "covariance_match_confirmed_false": false_col(review_packet, "covariance_match_confirmed_now"),
                  "score_valid_false": false_col(review_packet, "score_valid"),
                  "support_allowed_false": false_col(review_packet, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary358 = {
                  "version": "v4.358",
                  "route_name": "v4_358_definition_and_covariance_match_readiness_no_scoring_no_support_claims",
                  "expected_result": "v4_358_definition_covariance_match_readiness_passed_review_packet_created_no_scoring_no_claims",
                  "input_version": "v4.357",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "readiness_status": "definition_covariance_review_packet_created_not_confirmed",
                  "loaded_observed_rows": int(len(loaded_values)),
                  "definition_readiness_rows": int(len(definition_readiness)),
                  "covariance_readiness_rows": int(len(covariance_readiness)),
                  "parameter_values_approved": True,
                  "numeric_baseline_values_filled": True,
                  "approved_baseline_values": 3,
                  "numeric_baseline_approved": True,
                  "schema_approved": True,
                  "observed_values_loaded": True,
                  "observed_rows_loaded": int(len(loaded_values)),
                  "definition_match_confirmed": False,
                  "covariance_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "human_fill_v4_358_definition_covariance_review_then_v4_359_definition_covariance_review_ingest_no_scoring",
              }

              definition_readiness.to_csv(outdir / "v4_358_definition_match_readiness_NOT_CONFIRMED.csv", index=False)
              covariance_readiness.to_csv(outdir / "v4_358_covariance_match_readiness_NOT_CONFIRMED.csv", index=False)
              review_packet.to_csv(outdir / "v4_358_HUMAN_FILL_definition_covariance_review_NO_SCORING.csv", index=False)
              readiness_summary.to_csv(outdir / "v4_358_readiness_summary_no_scoring.csv", index=False)
              checklist.to_csv(outdir / "v4_358_definition_covariance_review_checklist.csv", index=False)
              gap_update.to_csv(outdir / "v4_358_gap_status_after_definition_covariance_readiness.csv", index=False)
              loaded_values.to_csv(outdir / "v4_358_input_v4_357_loaded_observed_values_preserved.csv", index=False)
              approved_schema.to_csv(outdir / "v4_358_input_v4_357_approved_schema_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_358_rule_checks.csv", index=False)

              (outdir / "v4_358_summary.json").write_text(json.dumps(summary358, indent=2))

              summary_md = f"""# TAIRID v4.358 Definition and Covariance Match Readiness — No Scoring

          Expected result: `{summary358["expected_result"]}`

          {summary358["rules_passed"]} / {summary358["rules_total"]} rules passed

          failed_gates = {summary358["failed_gates"]}

          readiness_status = `{summary358["readiness_status"]}`

          loaded_observed_rows = {summary358["loaded_observed_rows"]}

          definition_match_confirmed = false

          covariance_match_confirmed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step creates a human-review packet for definition and covariance/error-model matching.

          It does **not** confirm definition matching.

          It does **not** confirm covariance/error-model matching.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{summary358["selected_next_route"]}`
          """
              (outdir / "v4_358_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary358, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_358_definition_covariance_match_readiness_no_scoring.py

      - name: Run v4.358 definition covariance readiness no scoring
        run: |
          python run_v4_358_definition_covariance_match_readiness_no_scoring.py

      - name: Upload v4.358 definition covariance readiness artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-358-definition-covariance-match-readiness-no-scoring-output
          path: |
            tairid_v4_358_definition_covariance_match_readiness_no_scoring_output/
            tairid_v4_358_definition_covariance_match_readiness_no_scoring_output.zip
