name: 001 TAIRID v4.230 - LRG QSO Residual Stability Expansion

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-230-lrg-qso-residual-stability-expansion.yml"

permissions:
  contents: read

jobs:
  lrg-qso-residual-stability-expansion:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.230 LRG QSO Residual Stability Expansion is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.230 LRG QSO residual stability expansion
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.230"
          ROUTE = "lrg_qso_residual_stability_expansion_after_v4_229"
          EXPECTED_RESULT = "v4_230_lrg_qso_residual_stability_expansion_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_231_source_surface_chisq_shape_pressure_review_or_baseline_model_upgrade"

          OUT = Path("tairid_v4_230_lrg_qso_residual_stability_expansion_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-230-lrg-qso-residual-stability-expansion-output.zip"

          BASE = "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16"

          SOURCE_INPUTS = [
              {
                  "source": "LRG",
                  "surface_id": "lrg_dr16_fsbao_dmdhfs8",
                  "measurement_url": BASE + "/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8.txt",
                  "covariance_url": BASE + "/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8_covtot.txt",
              },
              {
                  "source": "QSO",
                  "surface_id": "qso_dr16_fsbao_dmdhfs8",
                  "measurement_url": BASE + "/qso/sdss_DR16_QSO_FSBAO_DMDHfs8.txt",
                  "covariance_url": BASE + "/qso/sdss_DR16_QSO_FSBAO_DMDHfs8_covtot.txt",
              },
          ]

          AXIS_MAP = {
              "DM_over_rd": ("D_M_over_r_sound", "reach_geometry"),
              "DM_over_rs": ("D_M_over_r_sound", "reach_geometry"),
              "DH_over_rd": ("D_H_over_r_sound", "radial_pacing_geometry"),
              "DH_over_rs": ("D_H_over_r_sound", "radial_pacing_geometry"),
              "f_sigma8": ("f_sigma8", "growth_consolidation"),
          }

          AXIS_ORDER = ["D_M_over_r_sound", "D_H_over_r_sound", "f_sigma8"]

          H0_VALUES = [66.50, 67.36, 69.00]
          OMEGA_M_VALUES = [0.3000, 0.3153, 0.3300]
          SIGMA8_VALUES = [0.7800, 0.8111, 0.8400]
          R_SOUND_VALUES = [146.50, 147.09, 147.50]
          GROWTH_GAMMA = 0.55
          C_LIGHT = 299792.458

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def fetch_text(url):
              req = Request(url, headers={"User-Agent": "TAIRID-v4.230-lrg-qso-stability"})
              with urlopen(req, timeout=45) as response:
                  return response.read().decode("utf-8", errors="replace")

          def safe_float(token):
              try:
                  return float(token)
              except Exception:
                  return None

          def numeric_lines(text):
              rows = []
              for line in text.splitlines():
                  raw = line.strip()
                  if not raw or raw.startswith("#"):
                      continue
                  nums = []
                  labels = []
                  for part in raw.replace(",", " ").split():
                      value = safe_float(part)
                      if value is None:
                          labels.append(part)
                      else:
                          nums.append(value)
                  rows.append((nums, labels, raw))
              return rows

          def parse_measurements(text):
              rows = []
              for nums, labels, raw in numeric_lines(text):
                  if len(nums) >= 2 and labels:
                      rows.append({
                          "redshift": nums[0],
                          "value": nums[1],
                          "quantity": labels[-1],
                      })
              return rows

          def parse_matrix(text):
              rows = []
              for nums, labels, raw in numeric_lines(text):
                  if nums:
                      rows.append(nums)
              return rows

          def sigmas_from_covariance(matrix):
              sigmas = []
              for i in range(len(matrix)):
                  diag = matrix[i][i] if i < len(matrix[i]) else float("nan")
                  sigmas.append(math.sqrt(diag) if diag >= 0 else float("nan"))
              return sigmas

          def det3(m):
              return (
                  m[0][0] * (m[1][1] * m[2][2] - m[1][2] * m[2][1])
                  - m[0][1] * (m[1][0] * m[2][2] - m[1][2] * m[2][0])
                  + m[0][2] * (m[1][0] * m[2][1] - m[1][1] * m[2][0])
              )

          def inverse3(m):
              d = det3(m)
              if abs(d) < 1e-30:
                  return None
              inv = [[0.0 for _ in range(3)] for __ in range(3)]
              inv[0][0] = (m[1][1] * m[2][2] - m[1][2] * m[2][1]) / d
              inv[0][1] = (m[0][2] * m[2][1] - m[0][1] * m[2][2]) / d
              inv[0][2] = (m[0][1] * m[1][2] - m[0][2] * m[1][1]) / d
              inv[1][0] = (m[1][2] * m[2][0] - m[1][0] * m[2][2]) / d
              inv[1][1] = (m[0][0] * m[2][2] - m[0][2] * m[2][0]) / d
              inv[1][2] = (m[0][2] * m[1][0] - m[0][0] * m[1][2]) / d
              inv[2][0] = (m[1][0] * m[2][1] - m[1][1] * m[2][0]) / d
              inv[2][1] = (m[0][1] * m[2][0] - m[0][0] * m[2][1]) / d
              inv[2][2] = (m[0][0] * m[1][1] - m[0][1] * m[1][0]) / d
              return inv

          def quadratic_form(vector, inv):
              total = 0.0
              for i in range(3):
                  for j in range(3):
                      total += vector[i] * inv[i][j] * vector[j]
              return total

          def E_z(z, baseline):
              om = baseline["Omega_m0"]
              ol = 1.0 - om
              return math.sqrt(om * (1.0 + z) ** 3 + ol)

          def omega_m_z(z, baseline):
              om0 = baseline["Omega_m0"]
              return om0 * (1.0 + z) ** 3 / (E_z(z, baseline) ** 2)

          def simpson_integral(f, a, b, n=2000):
              if b == a:
                  return 0.0
              if n % 2:
                  n += 1
              h = (b - a) / n
              total = f(a) + f(b)
              for i in range(1, n):
                  x = a + i * h
                  total += (4 if i % 2 else 2) * f(x)
              return total * h / 3.0

          def dm_over_rsound(z, baseline):
              integral = simpson_integral(lambda zz: 1.0 / E_z(zz, baseline), 0.0, z)
              dm_mpc = (C_LIGHT / baseline["H0_km_s_Mpc"]) * integral
              return dm_mpc / baseline["r_sound_Mpc"]

          def dh_over_rsound(z, baseline):
              dh_mpc = C_LIGHT / (baseline["H0_km_s_Mpc"] * E_z(z, baseline))
              return dh_mpc / baseline["r_sound_Mpc"]

          def growth_suppression_g(z, baseline):
              om = omega_m_z(z, baseline)
              ol = (1.0 - baseline["Omega_m0"]) / (E_z(z, baseline) ** 2)
              denominator = (om ** (4.0 / 7.0)) - ol + (1.0 + om / 2.0) * (1.0 + ol / 70.0)
              return (2.5 * om) / denominator

          def linear_growth_D(z, baseline):
              a = 1.0 / (1.0 + z)
              return a * growth_suppression_g(z, baseline) / growth_suppression_g(0.0, baseline)

          def fsigma8_projection(z, baseline):
              f = omega_m_z(z, baseline) ** baseline["growth_gamma"]
              return f * baseline["sigma8_0"] * linear_growth_D(z, baseline)

          def projected_value(standard_quantity, z, baseline):
              if standard_quantity == "D_M_over_r_sound":
                  return dm_over_rsound(z, baseline)
              if standard_quantity == "D_H_over_r_sound":
                  return dh_over_rsound(z, baseline)
              if standard_quantity == "f_sigma8":
                  return fsigma8_projection(z, baseline)
              return float("nan")

          baseline_rows = []
          variant_index = 0
          for h0 in H0_VALUES:
              for omega_m in OMEGA_M_VALUES:
                  for sigma8 in SIGMA8_VALUES:
                      for r_sound in R_SOUND_VALUES:
                          variant_index += 1
                          baseline_rows.append({
                              "variant_id": f"baseline_grid_{variant_index:03d}",
                              "H0_km_s_Mpc": h0,
                              "Omega_m0": omega_m,
                              "Omega_lambda0": 1.0 - omega_m,
                              "sigma8_0": sigma8,
                              "growth_gamma": GROWTH_GAMMA,
                              "r_sound_Mpc": r_sound,
                              "baseline_status": "broad_reference_grid_only_not_fit",
                              "proof_status": "not_proof",
                              "validation_status": "not_validation",
                          })

          observed_axis_rows = []
          source_covariance = {}
          source_inverse = {}
          source_axis_order = {}

          for item in SOURCE_INPUTS:
              source = item["source"]
              surface_id = item["surface_id"]
              measurements = parse_measurements(fetch_text(item["measurement_url"]))
              covariance = parse_matrix(fetch_text(item["covariance_url"]))
              sigmas = sigmas_from_covariance(covariance)
              inv = inverse3(covariance)

              source_covariance[source] = covariance
              source_inverse[source] = inv
              source_axis_order[source] = []

              for index, measurement in enumerate(measurements):
                  standard_quantity, axis_name = AXIS_MAP.get(measurement["quantity"], (measurement["quantity"], "unmapped_axis"))
                  source_axis_order[source].append(standard_quantity)
                  observed_axis_rows.append({
                      "source": source,
                      "surface_id": surface_id,
                      "axis_index": index,
                      "standard_quantity": standard_quantity,
                      "native_quantity": measurement["quantity"],
                      "axis_name": axis_name,
                      "redshift": measurement["redshift"],
                      "observed_value": measurement["value"],
                      "observed_sigma": sigmas[index] if index < len(sigmas) else "",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          covariance_inverse_rows = []
          for source, inv in source_inverse.items():
              for i in range(3):
                  for j in range(3):
                      covariance_inverse_rows.append({
                          "source": source,
                          "row_index": i,
                          "column_index": j,
                          "inverse_covariance_value": inv[i][j] if inv else "",
                          "inverse_status": "inverse_available" if inv else "inverse_missing",
                          "proof_status": "not_proof",
                          "validation_status": "not_validation",
                      })

          residual_grid_rows = []
          source_chisq_rows = []

          for baseline in baseline_rows:
              for source in ["LRG", "QSO"]:
                  source_obs = [row for row in observed_axis_rows if row["source"] == source]
                  residual_vector = []
                  direction_vector = []

                  for obs in source_obs:
                      z = float(obs["redshift"])
                      observed_value = float(obs["observed_value"])
                      sigma = float(obs["observed_sigma"])
                      ref = projected_value(obs["standard_quantity"], z, baseline)
                      residual = observed_value - ref
                      z_score = residual / sigma if sigma else float("nan")

                      if math.isnan(z_score) or abs(z_score) < 1.0:
                          direction = "0"
                      elif residual > 0:
                          direction = "+"
                      else:
                          direction = "-"

                      residual_vector.append(residual)
                      direction_vector.append(direction)

                      residual_grid_rows.append({
                          "variant_id": baseline["variant_id"],
                          "source": source,
                          "surface_id": obs["surface_id"],
                          "standard_quantity": obs["standard_quantity"],
                          "native_quantity": obs["native_quantity"],
                          "redshift": z,
                          "observed_value": observed_value,
                          "observed_sigma": sigma,
                          "reference_value": ref,
                          "residual_value": residual,
                          "residual_z_score": z_score,
                          "guarded_residual_direction": direction,
                          "residual_status": "broad_baseline_grid_residual_preview_only",
                          "blocked_read": "not validation, not fit, not TAIRID proof",
                          "proof_status": "not_proof",
                          "validation_status": "not_validation",
                      })

                  inv = source_inverse[source]
                  chisq = quadratic_form(residual_vector, inv) if inv else float("nan")
                  source_chisq_rows.append({
                      "variant_id": baseline["variant_id"],
                      "source": source,
                      "axis_order": "|".join(source_axis_order[source]),
                      "guarded_signature": "".join(direction_vector),
                      "chisq_3axis": chisq,
                      "dof": 3,
                      "rms_chisq_per_axis": math.sqrt(chisq / 3.0) if chisq >= 0 else float("nan"),
                      "chisq_status": "source_surface_diagnostic_only_not_fit",
                      "blocked_read": "not likelihood comparison and not model validation",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          signature_rows = []
          for row in source_chisq_rows:
              signature_rows.append({
                  "variant_id": row["variant_id"],
                  "source": row["source"],
                  "axis_order": row["axis_order"],
                  "guarded_signature": row["guarded_signature"],
                  "chisq_3axis": row["chisq_3axis"],
                  "allowed_read": "source-surface residual stability preview only",
                  "blocked_read": "not proof, not validation, not full combined matrix",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

          axis_stability_rows = []
          for source in ["LRG", "QSO"]:
              for standard_quantity in AXIS_ORDER:
                  rows = [
                      row for row in residual_grid_rows
                      if row["source"] == source and row["standard_quantity"] == standard_quantity
                  ]
                  directions = [row["guarded_residual_direction"] for row in rows]
                  unique_directions = sorted(set(directions))
                  residual_z_values = [float(row["residual_z_score"]) for row in rows if not math.isnan(float(row["residual_z_score"]))]
                  nonzero = [d for d in directions if d in ["+", "-"]]

                  if all(d == "0" for d in directions):
                      status = "stable_zero_under_broad_baseline_grid"
                  elif len(set(directions)) == 1 and directions[0] in ["+", "-"]:
                      status = "stable_nonzero_direction_under_broad_baseline_grid"
                  elif len(set(nonzero)) == 1 and all(d in [nonzero[0], "0"] for d in directions):
                      status = "one_sided_with_zero_guard_band"
                  else:
                      status = "mixed_or_baseline_sensitive_direction"

                  axis_stability_rows.append({
                      "source": source,
                      "standard_quantity": standard_quantity,
                      "direction_sequence": "".join(directions),
                      "unique_directions": "|".join(unique_directions),
                      "min_residual_z": min(residual_z_values) if residual_z_values else "",
                      "max_residual_z": max(residual_z_values) if residual_z_values else "",
                      "stability_status": status,
                      "allowed_read": "axis stability review only",
                      "blocked_read": "not validation and not shared-cause evidence",
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

          source_review_rows = []
          for source in ["LRG", "QSO"]:
              axis_rows = [row for row in axis_stability_rows if row["source"] == source]
              stable_nonzero = sum(1 for row in axis_rows if row["stability_status"] == "stable_nonzero_direction_under_broad_baseline_grid")
              one_sided = sum(1 for row in axis_rows if row["stability_status"] == "one_sided_with_zero_guard_band")
              stable_zero = sum(1 for row in axis_rows if row["stability_status"] == "stable_zero_under_broad_baseline_grid")
              mixed = sum(1 for row in axis_rows if row["stability_status"] == "mixed_or_baseline_sensitive_direction")

              source_chisqs = [float(row["chisq_3axis"]) for row in source_chisq_rows if row["source"] == source]
              min_chisq = min(source_chisqs) if source_chisqs else float("nan")
              max_chisq = max(source_chisqs) if source_chisqs else float("nan")
              median_chisq = sorted(source_chisqs)[len(source_chisqs) // 2] if source_chisqs else float("nan")

              if mixed > 0:
                  review_status = "source_surface_sensitive_under_broad_grid"
              elif stable_nonzero > 0 or one_sided > 0:
                  review_status = "source_surface_has_candidate_direction_pressure"
              else:
                  review_status = "source_surface_within_zero_guard_under_broad_grid"

              source_review_rows.append({
                  "source": source,
                  "stable_nonzero_axis_count": stable_nonzero,
                  "one_sided_axis_count": one_sided,
                  "stable_zero_axis_count": stable_zero,
                  "mixed_axis_count": mixed,
                  "min_chisq_3axis": min_chisq,
                  "median_chisq_3axis": median_chisq,
                  "max_chisq_3axis": max_chisq,
                  "source_review_status": review_status,
                  "next_requirement": "review as source-surface diagnostic only; do not combine with ELG yet",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

          permission_rows = [
              {
                  "permission_scope": "lrg_qso_split_axis_stability_review",
                  "permission_status": "allowed_as_guarded_preview",
                  "reason": "LRG and QSO each have native split-axis measurement/covariance pairs.",
              },
              {
                  "permission_scope": "elg_inclusion_in_split_axis_matrix",
                  "permission_status": "blocked",
                  "reason": "ELG DVtable does not provide D_M, D_H, and f_sigma8 split axes.",
              },
              {
                  "permission_scope": "combined_lrg_qso_elg_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked.",
              },
              {
                  "permission_scope": "validation_or_fit_claim",
                  "permission_status": "blocked",
                  "reason": "Broad baseline grid is a diagnostic reference bracket, not a fit.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_231_source_surface_chisq_shape_pressure_review",
                  "purpose": "review LRG/QSO chi-square and direction pressure without calling it validation",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_231_baseline_model_upgrade_or_external_reference",
                  "purpose": "replace rough baseline grid with a stronger external reference calculation if needed",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_231_elg_limit_statement_and_holdout",
                  "purpose": "document why ELG cannot enter split-axis matrix from DVtable alone",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_231_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until source-surface guards pass",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before stability expansion"},
              {"gate": "baseline_rows_equal_81", "passed": len(baseline_rows) == 81, "detail": f"baseline_rows = {len(baseline_rows)}"},
              {"gate": "observed_axis_rows_equal_6", "passed": len(observed_axis_rows) == 6, "detail": f"observed_axis_rows = {len(observed_axis_rows)}"},
              {"gate": "covariance_inverse_rows_equal_18", "passed": len(covariance_inverse_rows) == 18, "detail": f"covariance_inverse_rows = {len(covariance_inverse_rows)}"},
              {"gate": "residual_grid_rows_equal_486", "passed": len(residual_grid_rows) == 486, "detail": f"residual_grid_rows = {len(residual_grid_rows)}"},
              {"gate": "source_chisq_rows_equal_162", "passed": len(source_chisq_rows) == 162, "detail": f"source_chisq_rows = {len(source_chisq_rows)}"},
              {"gate": "signature_rows_equal_162", "passed": len(signature_rows) == 162, "detail": f"signature_rows = {len(signature_rows)}"},
              {"gate": "axis_stability_rows_equal_6", "passed": len(axis_stability_rows) == 6, "detail": f"axis_stability_rows = {len(axis_stability_rows)}"},
              {"gate": "source_review_rows_equal_2", "passed": len(source_review_rows) == 2, "detail": f"source_review_rows = {len(source_review_rows)}"},
              {"gate": "permission_rows_equal_4", "passed": len(permission_rows) == 4, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "elg_split_axis_blocked", "passed": any(row["permission_scope"] == "elg_inclusion_in_split_axis_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "ELG split-axis matrix inclusion blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_qso_elg_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "validation_or_fit_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation or fit claim blocked"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_not_fit", "passed": True, "detail": "baseline grid is not fit"},
              {"gate": "truth_boundary_no_elg_split_axis", "passed": True, "detail": "ELG split axis still blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_231_source_surface_chisq_shape_pressure_review_or_baseline_model_upgrade", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_230_lrg_qso_residual_stability_expansion_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_230_baseline_grid_rows.csv", baseline_rows)
          write_csv(OUT / "v4_230_observed_axis_rows.csv", observed_axis_rows)
          write_csv(OUT / "v4_230_covariance_inverse_rows.csv", covariance_inverse_rows)
          write_csv(OUT / "v4_230_residual_grid_rows.csv", residual_grid_rows)
          write_csv(OUT / "v4_230_source_chisq_rows.csv", source_chisq_rows)
          write_csv(OUT / "v4_230_signature_grid_rows.csv", signature_rows)
          write_csv(OUT / "v4_230_axis_stability_rows.csv", axis_stability_rows)
          write_csv(OUT / "v4_230_source_review_rows.csv", source_review_rows)
          write_csv(OUT / "v4_230_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_230_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_230_rule_checks.csv", checks)

          source_lines = [
              f"{row['source']}: {row['source_review_status']} "
              f"(stable_nonzero={row['stable_nonzero_axis_count']}, one_sided={row['one_sided_axis_count']}, "
              f"stable_zero={row['stable_zero_axis_count']}, mixed={row['mixed_axis_count']}, "
              f"chisq_median={row['median_chisq_3axis']})"
              for row in source_review_rows
          ]

          axis_lines = [
              f"{row['source']} {row['standard_quantity']}: {row['stability_status']} ({row['unique_directions']})"
              for row in axis_stability_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "baseline_rows": len(baseline_rows),
              "observed_axis_rows": len(observed_axis_rows),
              "covariance_inverse_rows": len(covariance_inverse_rows),
              "residual_grid_rows": len(residual_grid_rows),
              "source_chisq_rows": len(source_chisq_rows),
              "signature_rows": len(signature_rows),
              "axis_stability_rows": len(axis_stability_rows),
              "source_review_rows": len(source_review_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "is_cosmology_fit": False,
                  "claims_shared_cause": False,
                  "elg_split_axis_allowed": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_230_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.230 LRG QSO Residual Stability Expansion",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"baseline_rows = {summary['baseline_rows']}",
              f"observed_axis_rows = {summary['observed_axis_rows']}",
              f"covariance_inverse_rows = {summary['covariance_inverse_rows']}",
              f"residual_grid_rows = {summary['residual_grid_rows']}",
              f"source_chisq_rows = {summary['source_chisq_rows']}",
              f"signature_rows = {summary['signature_rows']}",
              f"axis_stability_rows = {summary['axis_stability_rows']}",
              f"source_review_rows = {summary['source_review_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Source review:",
              *source_lines,
              "",
              "Axis stability:",
              *axis_lines,
              "",
              "Clean meaning: v4.230 expands LRG/QSO split-axis residual stability across a broad 81-point baseline grid. It writes source chi-square diagnostics, axis stability rows, and keeps ELG out of the split-axis matrix.",
              "",
              "Truth boundary: no proof, no validation, no fit claim, no shared cause, no ELG split-axis matrix, no combined matrix.",
          ]
          (OUT / "v4_230_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"baseline_rows = {summary['baseline_rows']}")
          print(f"observed_axis_rows = {summary['observed_axis_rows']}")
          print(f"covariance_inverse_rows = {summary['covariance_inverse_rows']}")
          print(f"residual_grid_rows = {summary['residual_grid_rows']}")
          print(f"source_chisq_rows = {summary['source_chisq_rows']}")
          print(f"signature_rows = {summary['signature_rows']}")
          print(f"axis_stability_rows = {summary['axis_stability_rows']}")
          print(f"source_review_rows = {summary['source_review_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no fit, no shared cause, no ELG split-axis matrix, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.230 LRG QSO residual stability expansion output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-230-lrg-qso-residual-stability-expansion-output
          path: |
            tairid_v4_230_lrg_qso_residual_stability_expansion_output/
            tairid-v4-230-lrg-qso-residual-stability-expansion-output.zip
