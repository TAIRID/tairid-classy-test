name: Run TAIRID SH0ES residual pressure map v1

on:
  workflow_dispatch:

jobs:
  run-tairid-shoes-residual-pressure-map-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy matplotlib astropy pandas

      - name: Run TAIRID SH0ES residual pressure map v1
        run: |
          python run_tairid_shoes_residual_pressure_map_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-residual-pressure-map-v1-output
          path: |
            tairid_shoes_residual_pressure_map_v1_outputs/**
