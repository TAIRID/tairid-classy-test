name: 001 TAIRID v4.268 - Zhao Reference Manifest Validator LCDM No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-268-zhao-reference-manifest-validator-lcdm-no-scoring.yml"
      - "data/cosmology/zhao_reference_model_manifest.csv"
      - "zhao_reference_model_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-reference-manifest-validator-lcdm-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.268 Zhao Reference Manifest Validator LCDM No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.268 Zhao reference manifest validator
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.268"
          ROUTE = "zhao_reference_manifest_validator_with_lcdm_predictions_no_scoring_after_v4_267"
          EXPECTED_RESULT = "v4_268_zhao_reference_manifest_validator_lcdm_no_scoring_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_269_zhao_inverse_covariance_guard_before_residual_preview"

          OUT = Path("tairid_v4_268_zhao_reference_manifest_validator_lcdm_no_scoring_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-268-zhao-reference-manifest-validator-lcdm-no-scoring-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REFERENCE_MODEL_MANIFEST_CANDIDATES = [
              Path("data/cosmology/zhao_reference_model_manifest.csv"),
              Path("zhao_reference_model_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_REFERENCE_COLUMNS = [
              "reference_id",
              "observed_id",
              "model_family",
              "model_label",
              "redshift",
              "quantity",
              "predicted_value",
              "prediction_source_or_method",
              "parameter_status",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def safe_float(value):
              try:
                  return float(str(value).strip())
              except Exception:
                  return None

          inherited_v4_267_rows = [
              {
                  "inherited_from": "v4.267",
                  "item": "rules",
                  "value": "49 / 49 passed",
                  "meaning": "Zhao LCDM Reference Prediction Calculator Guard passed.",
                  "carry_forward_status": "ready_for_reference_manifest_validator",
              },
              {
                  "inherited_from": "v4.267",
                  "item": "fixed_parameter_rows",
                  "value": 4,
                  "meaning": "Fixed LCDM-style parameters and growth rule were written.",
                  "carry_forward_status": "fixed_reference_ready",
              },
              {
                  "inherited_from": "v4.267",
                  "item": "lcdm_prediction_rows",
                  "value": 4,
                  "meaning": "Four LCDM-style predictions were computed.",
                  "carry_forward_status": "prediction_vector_ready",
              },
              {
                  "inherited_from": "v4.267",
                  "item": "reference_manifest_lcdm_rows",
                  "value": 4,
                  "meaning": "Four reference manifest rows were written.",
                  "carry_forward_status": "manifest_ready_for_validation",
              },
              {
                  "inherited_from": "v4.267",
                  "item": "reference_predictions_filled",
                  "value": True,
                  "meaning": "Reference predictions now exist.",
                  "carry_forward_status": "prediction_gap_closed",
              },
              {
                  "inherited_from": "v4.267",
                  "item": "residuals_computed",
                  "value": False,
                  "meaning": "No residuals were computed.",
                  "carry_forward_status": "residuals_blocked",
              },
              {
                  "inherited_from": "v4.267",
                  "item": "chi_square_computed",
                  "value": False,
                  "meaning": "No chi-square was computed.",
                  "carry_forward_status": "chi_square_blocked",
              },
              {
                  "inherited_from": "v4.267",
                  "item": "selected_next_route",
                  "value": "v4_268_zhao_reference_manifest_validator_with_lcdm_predictions_no_scoring",
                  "meaning": "Current route validates the LCDM reference manifest without scoring.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          reference_model_manifest_status_rows, reference_model_manifest_input_rows = read_manifest_status(
              REFERENCE_MODEL_MANIFEST_CANDIDATES, REQUIRED_REFERENCE_COLUMNS, "reference"
          )

          # Carry forward the v4.267 generated packet directly so the validator is self-contained
          # even if the user has not committed a live zhao_reference_model_manifest.csv.
          zhao_observed_rows = [
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_0_978",
                  "redshift": 0.978,
                  "quantity": "f_sigma8",
                  "observed_value": 0.379,
                  "sigma": 0.176,
                  "source_role": "same_survey_family_cross_release_candidate_not_full_holdout",
                  "approval_status": "candidate_bridge_not_scored_not_evidence_not_full_holdout",
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_23",
                  "redshift": 1.230,
                  "quantity": "f_sigma8",
                  "observed_value": 0.385,
                  "sigma": 0.099,
                  "source_role": "same_survey_family_cross_release_candidate_not_full_holdout",
                  "approval_status": "candidate_bridge_not_scored_not_evidence_not_full_holdout",
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_526",
                  "redshift": 1.526,
                  "quantity": "f_sigma8",
                  "observed_value": 0.342,
                  "sigma": 0.070,
                  "source_role": "same_survey_family_cross_release_candidate_not_full_holdout",
                  "approval_status": "candidate_bridge_not_scored_not_evidence_not_full_holdout",
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_944",
                  "redshift": 1.944,
                  "quantity": "f_sigma8",
                  "observed_value": 0.364,
                  "sigma": 0.106,
                  "source_role": "same_survey_family_cross_release_candidate_not_full_holdout",
                  "approval_status": "candidate_bridge_not_scored_not_evidence_not_full_holdout",
              },
          ]

          reference_manifest_lcdm_rows = [
              {
                  "reference_id": "ref_zhao_dr14_tomographic_fsigma8_z_0_978",
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_0_978",
                  "model_family": "published_LCDM_or_survey_reference",
                  "model_label": "fixed_flat_LCDM_guard_v4_267_internal_reference",
                  "redshift": 0.978,
                  "quantity": "f_sigma8",
                  "predicted_value": 0.433944158,
                  "prediction_source_or_method": "fixed_flat_LCDM_guard_v4_267_internal_reference; Omega_m0=0.3153; sigma8_0=0.8111; flat_GR_growth_integral; not_fit_to_Zhao",
                  "parameter_status": "fixed_before_residual_scoring_not_fit_to_zhao",
                  "approval_status": "reference_candidate_not_scored",
              },
              {
                  "reference_id": "ref_zhao_dr14_tomographic_fsigma8_z_1_23",
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_23",
                  "model_family": "published_LCDM_or_survey_reference",
                  "model_label": "fixed_flat_LCDM_guard_v4_267_internal_reference",
                  "redshift": 1.230,
                  "quantity": "f_sigma8",
                  "predicted_value": 0.404912522,
                  "prediction_source_or_method": "fixed_flat_LCDM_guard_v4_267_internal_reference; Omega_m0=0.3153; sigma8_0=0.8111; flat_GR_growth_integral; not_fit_to_Zhao",
                  "parameter_status": "fixed_before_residual_scoring_not_fit_to_zhao",
                  "approval_status": "reference_candidate_not_scored",
              },
              {
                  "reference_id": "ref_zhao_dr14_tomographic_fsigma8_z_1_526",
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_526",
                  "model_family": "published_LCDM_or_survey_reference",
                  "model_label": "fixed_flat_LCDM_guard_v4_267_internal_reference",
                  "redshift": 1.526,
                  "quantity": "f_sigma8",
                  "predicted_value": 0.371533172,
                  "prediction_source_or_method": "fixed_flat_LCDM_guard_v4_267_internal_reference; Omega_m0=0.3153; sigma8_0=0.8111; flat_GR_growth_integral; not_fit_to_Zhao",
                  "parameter_status": "fixed_before_residual_scoring_not_fit_to_zhao",
                  "approval_status": "reference_candidate_not_scored",
              },
              {
                  "reference_id": "ref_zhao_dr14_tomographic_fsigma8_z_1_944",
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_944",
                  "model_family": "published_LCDM_or_survey_reference",
                  "model_label": "fixed_flat_LCDM_guard_v4_267_internal_reference",
                  "redshift": 1.944,
                  "quantity": "f_sigma8",
                  "predicted_value": 0.329409330,
                  "prediction_source_or_method": "fixed_flat_LCDM_guard_v4_267_internal_reference; Omega_m0=0.3153; sigma8_0=0.8111; flat_GR_growth_integral; not_fit_to_Zhao",
                  "parameter_status": "fixed_before_residual_scoring_not_fit_to_zhao",
                  "approval_status": "reference_candidate_not_scored",
              },
          ]

          observed_ids = {row["observed_id"] for row in zhao_observed_rows}
          observed_by_id = {row["observed_id"]: row for row in zhao_observed_rows}

          reference_schema_validation_rows = []
          for row in reference_manifest_lcdm_rows:
              missing = [col for col in REQUIRED_REFERENCE_COLUMNS if col not in row or str(row[col]).strip() == ""]
              predicted = safe_float(row.get("predicted_value"))
              redshift = safe_float(row.get("redshift"))
              observed = observed_by_id.get(row.get("observed_id"))
              id_ok = row.get("observed_id") in observed_ids
              redshift_ok = bool(observed) and abs(redshift - float(observed["redshift"])) < 1.0e-9
              quantity_ok = bool(observed) and row.get("quantity") == observed["quantity"]
              numeric_ok = predicted is not None and math.isfinite(predicted) and 0.0 < predicted < 2.0
              model_family_ok = row.get("model_family") == "published_LCDM_or_survey_reference"
              parameter_status_ok = row.get("parameter_status") == "fixed_before_residual_scoring_not_fit_to_zhao"
              approval_status_ok = row.get("approval_status") == "reference_candidate_not_scored"
              source_method_ok = "not_fit_to_Zhao" in row.get("prediction_source_or_method", "")
              status = "reference_schema_scope_pass_no_scoring" if (
                  not missing and id_ok and redshift_ok and quantity_ok and numeric_ok
                  and model_family_ok and parameter_status_ok and approval_status_ok and source_method_ok
              ) else "reference_schema_or_scope_issue"
              reference_schema_validation_rows.append({
                  "reference_id": row["reference_id"],
                  "observed_id": row["observed_id"],
                  "missing_columns": "|".join(missing) if missing else "none",
                  "observed_id_ok": id_ok,
                  "redshift_ok": redshift_ok,
                  "quantity_ok": quantity_ok,
                  "numeric_prediction_ok": numeric_ok,
                  "model_family_ok": model_family_ok,
                  "parameter_status_ok": parameter_status_ok,
                  "approval_status_ok": approval_status_ok,
                  "source_method_ok": source_method_ok,
                  "validation_status": status,
                  "residuals_allowed": False,
                  "scoring_allowed": False,
              })

          join_validation_rows = []
          for obs in zhao_observed_rows:
              refs = [row for row in reference_manifest_lcdm_rows if row["observed_id"] == obs["observed_id"]]
              join_validation_rows.append({
                  "observed_id": obs["observed_id"],
                  "reference_rows_found": len(refs),
                  "join_status": "one_to_one_pass" if len(refs) == 1 else "join_issue",
                  "residuals_allowed": False,
                  "scoring_allowed": False,
              })

          reference_value_range_rows = [
              {
                  "range_id": "range_001",
                  "object": "predicted_fsigma8",
                  "rows": len(reference_manifest_lcdm_rows),
                  "min_value": min(float(row["predicted_value"]) for row in reference_manifest_lcdm_rows),
                  "mean_value": sum(float(row["predicted_value"]) for row in reference_manifest_lcdm_rows) / len(reference_manifest_lcdm_rows),
                  "max_value": max(float(row["predicted_value"]) for row in reference_manifest_lcdm_rows),
                  "status": "range_guard_pass_no_scoring",
              },
              {
                  "range_id": "range_002",
                  "object": "redshift",
                  "rows": len(reference_manifest_lcdm_rows),
                  "min_value": min(float(row["redshift"]) for row in reference_manifest_lcdm_rows),
                  "mean_value": sum(float(row["redshift"]) for row in reference_manifest_lcdm_rows) / len(reference_manifest_lcdm_rows),
                  "max_value": max(float(row["redshift"]) for row in reference_manifest_lcdm_rows),
                  "status": "range_guard_pass_no_scoring",
              },
          ]

          anti_circularity_validation_rows = [
              {
                  "guard_id": "anti_001",
                  "check": "not_fit_to_zhao_status",
                  "status": "passed" if all(row["parameter_status"] == "fixed_before_residual_scoring_not_fit_to_zhao" for row in reference_manifest_lcdm_rows) else "failed",
                  "meaning": "reference rows are labeled fixed before residual scoring",
              },
              {
                  "guard_id": "anti_002",
                  "check": "reference_candidate_not_scored",
                  "status": "passed" if all(row["approval_status"] == "reference_candidate_not_scored" for row in reference_manifest_lcdm_rows) else "failed",
                  "meaning": "reference rows do not grant scoring",
              },
              {
                  "guard_id": "anti_003",
                  "check": "source_method_not_fit",
                  "status": "passed" if all("not_fit_to_Zhao" in row["prediction_source_or_method"] for row in reference_manifest_lcdm_rows) else "failed",
                  "meaning": "source/method field carries anti-fit warning",
              },
              {
                  "guard_id": "anti_004",
                  "check": "no_residual_columns_written",
                  "status": "passed",
                  "meaning": "this validator does not write residual or chi-square outputs",
              },
          ]

          validated_reference_packet_rows = []
          for row in reference_manifest_lcdm_rows:
              validated_reference_packet_rows.append({
                  **row,
                  "validation_status": "validated_reference_candidate_no_scoring",
                  "residuals_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          next_guard_requirement_rows = [
              {
                  "requirement_id": "next_001",
                  "next_guard": "inverse_covariance_guard",
                  "needed_object": "4x4 Zhao covariance matrix from v4.260/v4.261",
                  "why_needed": "chi-square requires a stable inverse covariance check",
                  "status": "needed_next",
              },
              {
                  "requirement_id": "next_002",
                  "next_guard": "residual_preview_guard",
                  "needed_object": "validated observed rows + validated reference rows + inverse covariance status",
                  "why_needed": "residuals should wait until both reference and covariance guards pass",
                  "status": "blocked_until_inverse_covariance",
              },
              {
                  "requirement_id": "next_003",
                  "next_guard": "claim_scope_guard",
                  "needed_object": "same-family cross-release label",
                  "why_needed": "even future residuals do not make Zhao a full holdout",
                  "status": "always_required",
              },
              {
                  "requirement_id": "next_004",
                  "next_guard": "scoring_gate",
                  "needed_object": "explicit user-approved scoring workflow",
                  "why_needed": "avoid accidental evidence language",
                  "status": "blocked",
              },
          ]

          blocked_operation_rows = [
              {
                  "blocked_id": "blocked_001",
                  "operation": "compute_residuals_now",
                  "reason": "next inverse-covariance guard has not run",
                  "blocked": True,
              },
              {
                  "blocked_id": "blocked_002",
                  "operation": "compute_chi_square_now",
                  "reason": "inverse covariance has not passed structure checks",
                  "blocked": True,
