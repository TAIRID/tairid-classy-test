              },
          ]

          readiness_rows = [
              {"readiness_id": "readiness_001", "requirement": "reference_manifest_rows", "status": "validated_no_scoring", "blocks": "nothing"},
              {"readiness_id": "readiness_002", "requirement": "observed_reference_join", "status": "validated_no_scoring", "blocks": "nothing"},
              {"readiness_id": "readiness_003", "requirement": "inverse_covariance_guard", "status": "ready_next", "blocks": "residual preview"},
              {"readiness_id": "readiness_004", "requirement": "residual_preview", "status": "blocked_until_inverse_covariance_guard", "blocks": "residual direction"},
              {"readiness_id": "readiness_005", "requirement": "chi_square", "status": "blocked", "blocks": "likelihood-style interpretation"},
              {"readiness_id": "readiness_006", "requirement": "numeric_correction_fit", "status": "blocked", "blocks": "model comparison"},
              {"readiness_id": "readiness_007", "requirement": "combined_matrix_permission", "status": "blocked", "blocks": "combined matrix"},
