              {
                  "blocked_id": "blocked_006",
                  "operation": "claim_validation_now",
                  "reason": "no residual scoring or external likelihood fit",
                  "blocked": True,
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "reference_manifest_validation",
                  "permission_status": "passed_no_scoring",
                  "reason": "LCDM reference rows match schema, IDs, scope, and numeric-value checks.",
              },
              {
