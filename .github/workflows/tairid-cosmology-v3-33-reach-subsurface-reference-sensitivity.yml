                          for r in filtered_rows
                      ]
                      s = summarize_pressures(mapped, f"{filter_name}_sigma_x{sigma_factor}")
                      s["filter_name"] = filter_name
                      s["sigma_factor"] = sigma_factor
                      s["H0"] = planck["H0"]
                      s["omegam"] = planck["omegam"]
                      rows.append(s)

