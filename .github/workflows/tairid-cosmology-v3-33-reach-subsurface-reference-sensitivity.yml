          else:
              md.append("The reference-sensitivity audit did not clear all gates. No cross-source time-delay audit should run until the failed gates are repaired.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `reach_subsurface_pressure_rows_v3_33.csv`")
          md.append("- `reach_subsurface_family_summary_v3_33.csv`")
          md.append("- `tdcosmo_h0_sensitivity_v3_33.csv`")
          md.append("- `tdcosmo_omegam_sensitivity_v3_33.csv`")
          md.append("- `tdcosmo_sigma_filter_sensitivity_v3_33.csv`")
          md.append("- `tdcosmo_reference_sensitivity_skipped_rows_v3_33.csv`")
          md.append("- `reach_subsurface_reference_sensitivity_audit_v3_33.csv`")
          md.append("- `tairid_cosmology_v3_33_reach_subsurface_reference_sensitivity.json`")
          md.append("- `tairid_cosmology_v3_33_reach_subsurface_reference_sensitivity.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_33_reach_subsurface_reference_sensitivity.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

