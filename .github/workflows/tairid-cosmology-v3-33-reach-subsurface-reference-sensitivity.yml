name: TAIRID Cosmology v3.33 Reach Subsurface Reference Sensitivity

on:
  workflow_dispatch:

jobs:
  reach-subsurface-reference-sensitivity:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scientific Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run TAIRID v3.33 reach subsurface reference sensitivity audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_33

          python - <<'PY'
          import csv
          import io
          import json
          import math
          import re
          import shutil
          import tarfile
          import urllib.request
          import zipfile
          from datetime import datetime, timezone
          from pathlib import Path

          import numpy as np

          OUTDIR = Path("artifacts/tairid_cosmology_v3_33")
          DOWNLOADS = OUTDIR / "downloads"
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOADS.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_33_reach_subsurface_reference_sensitivity"

          C_LIGHT_KM_S = 299792.458

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a cosmological model.",
              "This does not run a two-surface refit.",
              "This tests reach subsurface reference sensitivity after v3.32 rejected a single reach surface as too blunt.",
              "BAO transverse, BAO radial, BOSS archive, and time-delay reach remain separate subsurfaces.",
              "Large TDCOSMO time-delay pressure is treated as diagnostic information requiring source-semantics checks.",
              "Reference sweeps are diagnostic coordinate checks, not alternative cosmology fits.",
              "All reach rows remain diagnostic-only.",
              "No row may be promoted to model-anchor status in this workflow.",
              "A pass only means the next audit may compare independent time-delay sources before any refit."
          ]

          PLANCK_ZIP_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
          PLANCK_MARGESTATS_PATH = "base/plikHM_TTTEEE_lowl_lowE/dist/base_plikHM_TTTEEE_lowl_lowE.margestats"

          EBOSS_PRODUCTS = [
              {
                  "source": "SDSS_eBOSS_DR16",
                  "family": "eBOSS_DR16_LRG",
                  "role": "pre_DESI_BAO_DMDH",
                  "data_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR16_LRG_BAO_DMDH.txt",
                  "cov_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR16_LRG_BAO_DMDH_covtot.txt"
              },
              {
                  "source": "SDSS_eBOSS_DR16",
                  "family": "eBOSS_DR16_QSO",
                  "role": "pre_DESI_BAO_DMDH",
                  "data_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR16_QSO_BAO_DMDH.txt",
                  "cov_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR16_QSO_BAO_DMDH_covtot.txt"
              },
              {
                  "source": "SDSS_eBOSS_DR16",
                  "family": "eBOSS_DR12_LRG",
                  "role": "pre_DESI_BAO_DMDH",
                  "data_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR12_LRG_BAO_DMDH.txt",
                  "cov_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_0/likelihoods/BAO-only/sdss_DR12_LRG_BAO_DMDH_covtot.txt"
              }
          ]

          BOSS_PRODUCTS = {
              "archive_url": "https://data.sdss.org/sas/dr10/boss/papers/clustering/Anderson_2013_CMASSDR11_LOWZDR11_cosmomc.tar.gz",
              "cmass_cov_url": "http://data.sdss3.org/sas/dr10/boss/papers/clustering/CMASSDR10_sanchez_2013_correlation_function_pre_recon_covariance.dat",
              "lowz_cov_url": "http://data.sdss3.org/sas/dr10/boss/papers/clustering/LOWZDR10_sanchez_2013_correlation_function_pre_recon_covariance.dat"
          }

          TDCOSMO_PRODUCTS = {
              "posterior_table_url": "https://raw.githubusercontent.com/TDCOSMO/hierarchy_analysis_2020_public/master/TDLMC/tdlmc_rung3_posterior_table.csv"
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def safe_name(url):
              name = url.split("?")[0].rstrip("/").split("/")[-1]
              name = re.sub(r"[^A-Za-z0-9._-]+", "_", name)
              return name or "downloaded_product"

          def download(url, path, timeout=300):
              path.parent.mkdir(parents=True, exist_ok=True)
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.33-reach-subsurface-reference-sensitivity/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed: HTTP {status}")
                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)
                  return {
                      "url": url,
                      "path": str(path),
                      "status": status,
                      "size_bytes": path.stat().st_size,
                      "content_type": resp.headers.get("Content-Type"),
                      "content_length_header": resp.headers.get("Content-Length")
                  }

          def load_numeric_matrix(path):
              text = path.read_text(encoding="utf-8", errors="replace")
              lines = [
                  line for line in text.splitlines()
                  if line.strip() and not line.strip().startswith("#")
              ]
              if not lines:
                  raise RuntimeError(f"No numeric lines found in {path}")
              return np.loadtxt(io.StringIO("\n".join(lines)))

          def parse_bao_data_table(path):
              rows = []
              text = path.read_text(encoding="utf-8", errors="replace")
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  parts = stripped.split()
                  if len(parts) < 3:
                      continue
                  try:
                      z = float(parts[0])
                      value = float(parts[1])
                  except Exception:
                      continue
                  rows.append({
                      "z": z,
                      "value": value,
                      "observable": parts[2]
                  })
              return rows

          def parse_float_or_none(value):
              if value is None:
                  return None
              text = str(value).strip()
              if text in ["", "-", "--", "nan", "NaN", "NAN", "None", "null"]:
                  return None
              try:
                  x = float(text)
              except Exception:
                  return None
              if not math.isfinite(x):
                  return None
              return x

          def classify_bao_observable(observable):
              lower = observable.lower()
              if "dm" in lower:
                  return {
                      "standardized_reach_family": "bao_transverse_reach",
                      "standardized_observable": "DM_over_rd",
                      "reach_axis": "transverse_comoving_reach"
                  }
              if "dh" in lower:
                  return {
                      "standardized_reach_family": "bao_radial_reach",
                      "standardized_observable": "DH_over_rd",
                      "reach_axis": "radial_hubble_reach"
                  }
              return {
                  "standardized_reach_family": "bao_unclassified_reach",
                  "standardized_observable": observable,
                  "reach_axis": "bao_unclassified"
              }

          def standard_row(
              source,
              family,
              source_role,
              standardized_reach_family,
              reach_axis,
              standardized_observable,
              value,
              sigma,
              z_effective,
              z_lens="",
              z_source="",
              covariance_available=False,
              posterior_table_available=False,
              source_native_parameter="",
              boundary_note=""
          ):
              value = float(value)
              sigma = float(sigma)
              fractional_sigma = sigma / abs(value) if value != 0 else None

              return {
                  "source": source,
                  "surface": "reach_geometry",
                  "family": family,
                  "source_role": source_role,
                  "standardized_reach_family": standardized_reach_family,
                  "reach_axis": reach_axis,
                  "standardized_observable": standardized_observable,
                  "source_native_parameter": source_native_parameter,
                  "z_effective": z_effective,
                  "z_lens": z_lens,
                  "z_source": z_source,
                  "value": value,
                  "sigma": sigma,
                  "fractional_sigma": fractional_sigma if fractional_sigma is not None else "",
                  "covariance_available": covariance_available,
                  "posterior_table_available": posterior_table_available,
                  "included_in_model": False,
                  "model_anchor_allowed_now": False,
                  "diagnostic_only": True,
                  "boundary_note": boundary_note
              }

          def ingest_eboss():
              eboss_dir = DOWNLOADS / "SDSS_eBOSS_DR16"
              eboss_dir.mkdir(parents=True, exist_ok=True)
              rows = []

              for product in EBOSS_PRODUCTS:
                  data_path = eboss_dir / safe_name(product["data_url"])
                  cov_path = eboss_dir / safe_name(product["cov_url"])
                  download(product["data_url"], data_path)
                  download(product["cov_url"], cov_path)

                  data_rows = parse_bao_data_table(data_path)
                  cov = load_numeric_matrix(cov_path)

                  if cov.ndim == 0:
                      cov = cov.reshape((1, 1))
                  elif cov.ndim == 1:
                      cov = cov.reshape((1, -1))

                  covariance_match = cov.ndim == 2 and cov.shape[0] == cov.shape[1] == len(data_rows)
                  if not covariance_match:
                      raise RuntimeError(f"Covariance mismatch for {product['family']}")

                  for i, data_row in enumerate(data_rows):
                      diag = float(cov[i, i])
                      sigma = math.sqrt(diag) if diag >= 0 else None
                      if sigma is None:
                          continue

                      cls = classify_bao_observable(data_row["observable"])

                      rows.append(standard_row(
                          source=product["source"],
                          family=product["family"],
                          source_role=product["role"],
                          standardized_reach_family=cls["standardized_reach_family"],
                          reach_axis=cls["reach_axis"],
                          standardized_observable=cls["standardized_observable"],
                          source_native_parameter=data_row["observable"],
                          value=data_row["value"],
                          sigma=sigma,
                          z_effective=data_row["z"],
                          covariance_available=True,
                          boundary_note="eBOSS BAO reach/ruler diagnostic. Reference-sensitivity only; not a model anchor."
                      ))

              return rows

          def parse_archive_bao_member(tf, member_name):
              member = next((m for m in tf.getmembers() if m.name.endswith(member_name)), None)
              if member is None:
                  raise RuntimeError(f"Archive member not found: {member_name}")
              f = tf.extractfile(member)
              if f is None:
                  raise RuntimeError(f"Could not extract member: {member_name}")
              text = f.read().decode("utf-8", errors="replace")
              rows = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  nums = []
                  for p in stripped.split():
                      try:
                          nums.append(float(p))
                      except Exception:
                          pass
                  if len(nums) >= 3:
                      rows.append({
                          "z": nums[0],
                          "value": nums[1],
                          "sigma": nums[2],
                          "raw_line": stripped
                      })
              return rows

          def ingest_boss():
              boss_dir = DOWNLOADS / "BOSS_DR12_BAO"
              boss_dir.mkdir(parents=True, exist_ok=True)
              archive_path = boss_dir / safe_name(BOSS_PRODUCTS["archive_url"])
              cmass_cov_path = boss_dir / safe_name(BOSS_PRODUCTS["cmass_cov_url"])
              lowz_cov_path = boss_dir / safe_name(BOSS_PRODUCTS["lowz_cov_url"])

              download(BOSS_PRODUCTS["archive_url"], archive_path)
              download(BOSS_PRODUCTS["cmass_cov_url"], cmass_cov_path)
              download(BOSS_PRODUCTS["lowz_cov_url"], lowz_cov_path)

              with tarfile.open(archive_path, "r:*") as tf:
                  cmass_rows = parse_archive_bao_member(tf, "data/sdss_DR11CMASS_bao.txt")
                  lowz_rows = parse_archive_bao_member(tf, "data/sdss_DR11LOWZ_bao.txt")

              cmass_cov = load_numeric_matrix(cmass_cov_path)
              lowz_cov = load_numeric_matrix(lowz_cov_path)

              rows = []

              for family, native_rows, cov in [
                  ("BOSS_DR11_CMASS_archive_BAO", cmass_rows, cmass_cov),
                  ("BOSS_DR11_LOWZ_archive_BAO", lowz_rows, lowz_cov)
              ]:
                  cov_shape_ok = cov.ndim == 2 and cov.shape[0] == cov.shape[1]

                  for native in native_rows:
                      rows.append(standard_row(
                          source="BOSS_DR12_BAO",
                          family=family,
                          source_role="pre_DESI_BOSS_archive_BAO",
                          standardized_reach_family="bao_archive_isotropic_reach",
                          reach_axis="isotropic_or_archive_bao_reach",
                          standardized_observable="DV_over_rd_assumed_from_archive_scalar",
                          source_native_parameter="BAO_archive_observable",
                          value=native["value"],
                          sigma=native["sigma"],
                          z_effective=native["z"],
                          covariance_available=cov_shape_ok,
                          boundary_note="Older BOSS archive BAO scalar. Supporting reference-sensitivity only."
                      ))

              return rows

          def ingest_tdcosmo():
              td_dir = DOWNLOADS / "TDCOSMO_2020"
              td_dir.mkdir(parents=True, exist_ok=True)
              table_path = td_dir / safe_name(TDCOSMO_PRODUCTS["posterior_table_url"])
              download(TDCOSMO_PRODUCTS["posterior_table_url"], table_path)

              with table_path.open("r", encoding="utf-8", errors="replace", newline="") as f:
                  reader = csv.DictReader(f)
                  table_rows = list(reader)
                  fieldnames = reader.fieldnames or []

              required = ["name", "z_lens", "z_source", "Ddt_mean", "Ddt_sigma", "Dd_mean", "Dd_sigma", "flag"]
              missing = [c for c in required if c not in fieldnames]
              if missing:
                  raise RuntimeError(f"TDCOSMO posterior table missing columns: {missing}")

              rows = []
              skipped = []
              missing_dd_count = 0

              for i, row in enumerate(table_rows):
                  name = row.get("name", f"row_{i}")
                  flag = parse_float_or_none(row.get("flag"))
                  z_lens = parse_float_or_none(row.get("z_lens"))
                  z_source = parse_float_or_none(row.get("z_source"))
                  ddt_mean = parse_float_or_none(row.get("Ddt_mean"))
                  ddt_sigma = parse_float_or_none(row.get("Ddt_sigma"))
                  dd_mean = parse_float_or_none(row.get("Dd_mean"))
                  dd_sigma = parse_float_or_none(row.get("Dd_sigma"))

                  if dd_mean is None or dd_sigma is None:
                      missing_dd_count += 1

                  if flag is not None and flag < 0:
                      skipped.append({"name": name, "row_index": i, "reason": "negative_flag", "flag": row.get("flag")})
                      continue

                  if z_lens is None or z_source is None or ddt_mean is None or ddt_sigma is None or ddt_sigma <= 0:
                      skipped.append({"name": name, "row_index": i, "reason": "missing_or_invalid_Ddt_fields", "flag": row.get("flag")})
                      continue

                  base = standard_row(
                      source="TDCOSMO_2020",
                      family="TDCOSMO_time_delay",
                      source_role="hierarchical_time_delay_posterior_table",
                      standardized_reach_family="time_delay_distance_reach",
                      reach_axis="time_delay_path_reach",
                      standardized_observable="Ddt_time_delay_distance",
                      source_native_parameter="Ddt_mean_Ddt_sigma",
                      value=ddt_mean,
                      sigma=ddt_sigma,
                      z_effective=z_lens,
                      z_lens=z_lens,
                      z_source=z_source,
                      covariance_available=False,
                      posterior_table_available=True,
                      boundary_note="TDCOSMO Ddt time-delay distance diagnostic. Reference-sensitivity only; not a model anchor."
                  )
                  base["lens_name"] = name
                  base["tdcosmo_flag"] = flag if flag is not None else ""
                  rows.append(base)

              return rows, skipped, missing_dd_count, len(table_rows)

          def parse_planck_margestats(text):
              rows = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("Marginalized") or stripped.startswith("parameter"):
                      continue
                  parts = stripped.split()
                  if len(parts) < 12:
                      continue
                  name_raw = parts[0]
                  name = name_raw.rstrip("*")
                  try:
                      rows.append({
                          "parameter_raw": name_raw,
                          "parameter": name,
                          "mean": float(parts[1]),
                          "sddev": float(parts[2]),
                          "label": " ".join(parts[12:]) if len(parts) > 12 else ""
                      })
                  except Exception:
                      continue
              return rows

          def load_planck_reference():
              planck_dir = DOWNLOADS / "Planck_2018"
              zip_path = planck_dir / "COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
              download(PLANCK_ZIP_URL, zip_path)

              with zipfile.ZipFile(zip_path, "r") as zf:
                  if PLANCK_MARGESTATS_PATH not in zf.namelist():
                      raise RuntimeError(f"Missing Planck margestats product: {PLANCK_MARGESTATS_PATH}")
                  text = zf.read(PLANCK_MARGESTATS_PATH).decode("utf-8", errors="replace")

              marg = {r["parameter"]: r for r in parse_planck_margestats(text)}
              required = ["H0", "omegam", "rdrag"]
              missing = [p for p in required if p not in marg]
              if missing:
                  raise RuntimeError(f"Missing Planck reference parameters: {missing}")

              return {
                  "H0": float(marg["H0"]["mean"]),
                  "omegam": float(marg["omegam"]["mean"]),
                  "rdrag": float(marg["rdrag"]["mean"])
              }

          def E_z(z, omega_m):
              return math.sqrt(omega_m * (1.0 + z) ** 3 + (1.0 - omega_m))

          def comoving_distance_mpc(z, h0, omega_m):
              if z <= 0:
                  return 0.0
              n = 2000
              if n % 2:
                  n += 1
              xs = np.linspace(0.0, z, n + 1)
              ys = np.array([1.0 / E_z(float(x), omega_m) for x in xs])
              h = z / n
              integral = h / 3.0 * (
                  ys[0] + ys[-1] + 4.0 * np.sum(ys[1:-1:2]) + 2.0 * np.sum(ys[2:-2:2])
              )
              return C_LIGHT_KM_S / h0 * integral

          def angular_diameter_distance_mpc(z, h0, omega_m):
              return comoving_distance_mpc(z, h0, omega_m) / (1.0 + z)

          def angular_diameter_between_mpc(z_lens, z_source, h0, omega_m):
              if z_source <= z_lens:
                  return None
              dc_lens = comoving_distance_mpc(z_lens, h0, omega_m)
              dc_source = comoving_distance_mpc(z_source, h0, omega_m)
              return (dc_source - dc_lens) / (1.0 + z_source)

          def reference_dm_over_rd(z, h0, omega_m, rdrag):
              return comoving_distance_mpc(z, h0, omega_m) / rdrag

          def reference_dh_over_rd(z, h0, omega_m, rdrag):
              dh = C_LIGHT_KM_S / (h0 * E_z(z, omega_m))
              return dh / rdrag

          def reference_dv_over_rd(z, h0, omega_m, rdrag):
              dm = comoving_distance_mpc(z, h0, omega_m)
              dh = C_LIGHT_KM_S / (h0 * E_z(z, omega_m))
              dv = (z * dm * dm * dh) ** (1.0 / 3.0)
              return dv / rdrag

          def reference_ddt_mpc(z_lens, z_source, h0, omega_m):
              d_l = angular_diameter_distance_mpc(z_lens, h0, omega_m)
              d_s = angular_diameter_distance_mpc(z_source, h0, omega_m)
              d_ls = angular_diameter_between_mpc(z_lens, z_source, h0, omega_m)
              if d_ls is None or d_ls <= 0:
                  return None
              return (1.0 + z_lens) * d_l * d_s / d_ls

          def pressure_map_row(row, h0, omega_m, rdrag, sigma_factor=1.0):
              mapped = dict(row)
              obs = row["standardized_observable"]
              z = float(row["z_effective"])
              value = float(row["value"])
              sigma = float(row["sigma"]) * float(sigma_factor)

              reference_value = None
              reference_observable = ""

              if obs == "DM_over_rd":
                  reference_value = reference_dm_over_rd(z, h0, omega_m, rdrag)
                  reference_observable = "flat_LCDM_DM_over_rd"
              elif obs == "DH_over_rd":
                  reference_value = reference_dh_over_rd(z, h0, omega_m, rdrag)
                  reference_observable = "flat_LCDM_DH_over_rd"
              elif obs == "DV_over_rd_assumed_from_archive_scalar":
                  reference_value = reference_dv_over_rd(z, h0, omega_m, rdrag)
                  reference_observable = "flat_LCDM_DV_over_rd"
              elif obs == "Ddt_time_delay_distance":
                  z_lens = parse_float_or_none(row.get("z_lens"))
                  z_source = parse_float_or_none(row.get("z_source"))
                  if z_lens is not None and z_source is not None:
                      reference_value = reference_ddt_mpc(z_lens, z_source, h0, omega_m)
                      reference_observable = "flat_LCDM_Ddt_Mpc"

              if reference_value is None or sigma <= 0:
                  pressure_z = ""
                  pressure_sign = "unmapped"
                  finite_pressure = False
              else:
                  pressure_z = (value - reference_value) / sigma
                  pressure_sign = "positive" if pressure_z > 0 else "negative" if pressure_z < 0 else "zero"
                  finite_pressure = math.isfinite(pressure_z)

              mapped["reference_H0"] = h0
              mapped["reference_omegam"] = omega_m
              mapped["reference_rdrag"] = rdrag
              mapped["reference_observable"] = reference_observable
              mapped["reference_value"] = reference_value if reference_value is not None else ""
              mapped["sigma_factor"] = sigma_factor
              mapped["pressure_z"] = pressure_z
              mapped["pressure_sign"] = pressure_sign
              mapped["finite_pressure"] = finite_pressure
              mapped["abs_pressure_z"] = abs(pressure_z) if finite_pressure else ""
              mapped["large_pressure_flag_abs_gt_5"] = bool(finite_pressure and abs(pressure_z) > 5.0)
              mapped["extreme_pressure_flag_abs_gt_10"] = bool(finite_pressure and abs(pressure_z) > 10.0)
              mapped["included_in_model"] = False
              mapped["model_anchor_allowed_now"] = False
              mapped["diagnostic_only"] = True
              return mapped

          def summarize_pressures(rows, label):
              finite = [r for r in rows if r.get("finite_pressure") is True]
              pressures = [float(r["pressure_z"]) for r in finite]
              signs = sorted(set(r["pressure_sign"] for r in finite))
              return {
                  "label": label,
                  "row_count": len(rows),
                  "finite_count": len(finite),
                  "mean_pressure_z": float(np.mean(pressures)) if pressures else "",
                  "median_pressure_z": float(np.median(pressures)) if pressures else "",
                  "min_pressure_z": float(np.min(pressures)) if pressures else "",
                  "max_pressure_z": float(np.max(pressures)) if pressures else "",
                  "positive_count": sum(1 for p in pressures if p > 0),
                  "negative_count": sum(1 for p in pressures if p < 0),
                  "large_abs_gt_5_count": sum(1 for p in pressures if abs(p) > 5),
                  "extreme_abs_gt_10_count": sum(1 for p in pressures if abs(p) > 10),
                  "signs_present": ";".join(signs)
              }

          def family_summary(mapped_rows):
              rows = []
              for family in sorted(set(r["standardized_reach_family"] for r in mapped_rows)):
                  subset = [r for r in mapped_rows if r["standardized_reach_family"] == family]
                  summary = summarize_pressures(subset, family)
                  summary["standardized_reach_family"] = family
                  summary["source_list"] = ";".join(sorted(set(r["source"] for r in subset)))
                  summary["model_anchor_allowed"] = False
                  summary["single_reach_surface_safe"] = False
                  summary["boundary_note"] = "Subsurface family summary only. No refit and no model claim."
                  rows.append(summary)
              return rows

          def h0_sensitivity(td_rows, planck):
              rows = []
              for h0 in np.linspace(50.0, 90.0, 161):
                  mapped = [
                      pressure_map_row(r, float(h0), planck["omegam"], planck["rdrag"], sigma_factor=1.0)
                      for r in td_rows
                  ]
                  s = summarize_pressures(mapped, f"H0={h0:.2f}")
                  s["H0"] = float(h0)
                  s["omegam"] = planck["omegam"]
                  s["rdrag"] = planck["rdrag"]
                  rows.append(s)
              return rows

          def omegam_sensitivity(td_rows, planck):
              rows = []
              for om in np.linspace(0.20, 0.40, 81):
                  mapped = [
                      pressure_map_row(r, planck["H0"], float(om), planck["rdrag"], sigma_factor=1.0)
                      for r in td_rows
                  ]
                  s = summarize_pressures(mapped, f"omegam={om:.4f}")
                  s["H0"] = planck["H0"]
                  s["omegam"] = float(om)
                  s["rdrag"] = planck["rdrag"]
                  rows.append(s)
              return rows

