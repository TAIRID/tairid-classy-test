name: 000 TAIRID v4.116 Observed Covariance Source Upgrade Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-116-observed-covariance-source-upgrade-design.yml"

jobs:
  tairid-v4-116-observed-covariance-source-upgrade-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.116 observed covariance source upgrade design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_116_observed_covariance_source_upgrade_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_116_observed_covariance_source_upgrade_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_116_observed_covariance_source_upgrade_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This does not ingest source-provided observed RSD covariance yet.",
              "This does not compute bridge pressure.",
              "This designs the observed covariance source upgrade after v4.115 found the diagonal-fallback bridge stable but not final.",
              "A pass means the observed covariance upgrade route is specified and ready for a source-upgrade probe."
          ]

          UPSTREAM_LOCKS = {
              "v4_115_regularized_pressure_sensitivity_audit": {
                  "readiness_label": "regularized_pressure_sensitivity_audit_passed_diagnostic_stable_not_final_ready_for_observed_covariance_source_upgrade",
                  "diagnostic_stable": True,
                  "max_abs_delta_chi2": 0.019052856137296237,
                  "max_abs_delta_pressure_z": 0.0,
                  "pressure_z_all_zero": True,
                  "observed_covariance_upgrade_required": True,
                  "source_observed_covariance_ingested": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_114_observed_RSD_covariance_bridge_probe": {
                  "readiness_label": "observed_RSD_covariance_bridge_probe_passed_diagnostic_only_ready_for_regularized_pressure_sensitivity_audit",
                  "observed_RSD_values_computed": True,
                  "observed_RSD_covariance_computed": True,
                  "source_observed_covariance_ingested": False,
                  "total_covariance_computed": True,
                  "bridge_pressure_computed": True,
                  "primary_chi2": 1.8857450832335483,
                  "primary_pressure_z": 0.0,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          CURRENT_OBSERVED_VECTOR_STATUS = [
              {
                  "position": 0,
                  "z": 0.15,
                  "current_source_family": "SDSS_DR7_MGS",
                  "current_covariance_status": "diagonal_fallback",
                  "upgrade_priority": "medium",
                  "next_action": "review low-z anchor source covariance/uncertainty; keep as fallback if no source covariance is available",
                  "included_in_primary_bridge": True
              },
              {
                  "position": 1,
                  "z": 0.38,
                  "current_source_family": "BOSS_DR12_consensus",
                  "current_covariance_status": "diagonal_fallback",
                  "upgrade_priority": "highest",
                  "next_action": "replace BOSS z=0.38 diagonal fallback with source-provided BOSS DR12 covariance/sub-covariance if found",
                  "included_in_primary_bridge": True
              },
              {
                  "position": 2,
                  "z": 0.51,
                  "current_source_family": "BOSS_DR12_consensus",
                  "current_covariance_status": "diagonal_fallback",
                  "upgrade_priority": "highest",
                  "next_action": "replace BOSS z=0.51 diagonal fallback with source-provided BOSS DR12 covariance/sub-covariance if found",
                  "included_in_primary_bridge": True
              },
              {
                  "position": 3,
                  "z": 0.61,
                  "current_source_family": "BOSS_DR12_consensus",
                  "current_covariance_status": "diagonal_fallback",
                  "upgrade_priority": "highest",
                  "next_action": "replace BOSS z=0.61 diagonal fallback with source-provided BOSS DR12 covariance/sub-covariance if found",
                  "included_in_primary_bridge": True
              },
              {
                  "position": 4,
                  "z": 2.33,
                  "current_source_family": "high_z_LyA_compilation_anchor",
                  "current_covariance_status": "diagonal_fallback",
                  "upgrade_priority": "medium_high",
                  "next_action": "review high-z anchor source status and decide whether it belongs in primary bridge or sensitivity-only bridge",
                  "included_in_primary_bridge": True
              }
          ]

          SOURCE_UPGRADE_TARGETS = [
              {
                  "target_id": "BOSS_DR12_consensus_covariance",
                  "target_positions": "1,2,3",
                  "target_redshifts": "0.38,0.51,0.61",
                  "desired_object": "source-provided covariance or published likelihood covariance for BOSS DR12 consensus fσ8 slots",
                  "upgrade_route": "prefer official SDSS/SAS measurement/covariance/likelihood files; otherwise use literature-supported covariance model",
                  "priority": 1,
                  "required_before_stronger_pressure_language": True
              },
              {
                  "target_id": "MGS_low_z_anchor_review",
                  "target_positions": "0",
                  "target_redshifts": "0.15",
                  "desired_object": "source uncertainty/covariance review for low-z MGS anchor",
                  "upgrade_route": "verify whether covariance exists; otherwise keep diagonal fallback and label it",
                  "priority": 2,
                  "required_before_stronger_pressure_language": False
              },
              {
                  "target_id": "high_z_anchor_review",
                  "target_positions": "4",
                  "target_redshifts": "2.33",
                  "desired_object": "source-family review for high-z LyA/eBOSS-style anchor",
                  "upgrade_route": "verify whether source covariance exists and whether high-z anchor remains primary or sensitivity-only",
                  "priority": 3,
                  "required_before_stronger_pressure_language": False
              },
              {
                  "target_id": "observed_family_overlap_guard",
                  "target_positions": "0,1,2,3,4",
                  "target_redshifts": "0.15,0.38,0.51,0.61,2.33",
                  "desired_object": "independence/overlap metadata for all observed points",
                  "upgrade_route": "record survey family, overlap warning, covariance status, and whether point is primary or sensitivity-only",
                  "priority": 4,
                  "required_before_stronger_pressure_language": True
              }
          ]

          COVARIANCE_UPGRADE_POLICY = [
              {
                  "policy_id": "official_source_covariance_preferred",
                  "requirement": "Use official source-provided covariance or likelihood covariance where available.",
                  "reason": "Diagonal fallback cannot represent correlations between BOSS DR12 redshift bins or compressed parameters.",
                  "applied_now": False
              },
              {
                  "policy_id": "subblock_extraction_required",
                  "requirement": "If a larger covariance contains multiple observables per redshift, extract the fσ8 subblock only after row/column order is proven.",
                  "reason": "A wrong subblock silently corrupts the bridge pressure.",
                  "applied_now": False
              },
              {
                  "policy_id": "diagonal_fallback_remains_labeled",
                  "requirement": "Any remaining diagonal fallback must be labeled by source family and cannot be described as full covariance.",
                  "reason": "Fallback uncertainty is not the same as source covariance.",
                  "applied_now": False
              },
              {
                  "policy_id": "primary_and_sensitivity_vectors_split",
                  "requirement": "If an anchor lacks covariance or has mismatched systematics, it can be moved to a sensitivity lane rather than primary bridge.",
                  "reason": "Bridge reliability depends on source-family coherence.",
                  "applied_now": False
              },
              {
                  "policy_id": "claim_boundary_preserved",
                  "requirement": "The source-upgrade probe may produce improved diagnostic bridge pressure, but not final pressure or validation.",
                  "reason": "Observed covariance upgrade is still one step inside a larger guarded pipeline.",
                  "applied_now": False
              }
          ]

          NEXT_PROBE_DESIGN = {
              "next_probe_name": "v4.117 observed covariance upgrade probe",
              "allowed_to_search_or_fetch_source_covariance": True,
              "allowed_to_use_literature_supported_covariance_if_source_file_not_found": True,
              "allowed_to_compute_upgraded_observed_covariance": True,
              "allowed_to_recompute_guarded_bridge_pressure": True,
              "allowed_to_call_result_final_RSD_pressure": False,
              "allowed_to_validate_TAIRID": False,
              "primary_success_condition": "BOSS_DR12 covariance/sub-covariance upgrade found or a transparent covariance-status failure is recorded.",
              "fallback_success_condition": "If source covariance cannot be fetched, the workflow must preserve diagonal fallback and route to manual/source-link upgrade without making final claims."
          }

          NEXT_PROBE_INPUT_SCHEMA = [
              {"field": "source_target_id", "required": True, "purpose": "Which source/covariance target is being upgraded."},
              {"field": "source_url_or_locator", "required": True, "purpose": "Official URL, SAS path, paper table, repo path, or manual locator."},
              {"field": "fetch_status", "required": True, "purpose": "found, fetched, parsed, unavailable, or manual_needed."},
              {"field": "covariance_status", "required": True, "purpose": "source_covariance, extracted_subblock, literature_model, diagonal_fallback, or parked."},
              {"field": "applies_to_positions", "required": True, "purpose": "Vector positions affected by this covariance source."},
              {"field": "applies_to_redshifts", "required": True, "purpose": "Redshifts affected by this covariance source."},
              {"field": "row_column_order_verified", "required": True, "purpose": "Whether covariance order was verified before use."},
              {"field": "included_in_primary_bridge", "required": True, "purpose": "Whether upgraded item enters primary bridge or sensitivity-only lane."},
              {"field": "claim_boundary", "required": True, "purpose": "States diagnostic-only or parked status."}
          ]

          QUALITY_GATES_FOR_NEXT_PROBE = [
              {
                  "gate_id": "BOSS_covariance_target_attempted",
                  "requirement": "The BOSS DR12 covariance/source upgrade target must be attempted first.",
                  "failure_action": "Do not claim observed covariance upgrade."
              },
              {
                  "gate_id": "row_column_order_verified",
                  "requirement": "Any extracted covariance subblock must have verified row/column order.",
                  "failure_action": "Do not use the subblock."
              },
              {
                  "gate_id": "covariance_dimension_matches_bridge",
                  "requirement": "Any primary observed covariance must align with the 5-slot bridge vector or a declared subvector bridge.",
                  "failure_action": "Fail bridge recomputation."
              },
              {
                  "gate_id": "positive_diagonal",
                  "requirement": "Observed covariance diagonal entries must be positive.",
                  "failure_action": "Fail covariance upgrade."
              },
              {
                  "gate_id": "symmetry_check",
                  "requirement": "Observed covariance must be symmetric after construction.",
                  "failure_action": "Repair covariance construction."
              },
              {
                  "gate_id": "fallback_labeled",
                  "requirement": "If source covariance is unavailable, diagonal fallback must remain explicitly labeled.",
                  "failure_action": "Fail claim-boundary gate."
              },
              {
                  "gate_id": "bridge_pressure_diagnostic_only",
                  "requirement": "Any recomputed pressure is diagnostic-only and must route to a sensitivity audit.",
                  "failure_action": "Fail claim-boundary gate."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Observed RSD source covariance was fully ingested in v4.116.",
              "Observed RSD covariance is complete in v4.116.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The observed covariance source upgrade design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The next covariance-upgrade pressure will be final.",
              "Diagonal fallback is the same as full observed covariance.",
              "Source covariance upgrade proves the model.",
              "No further sensitivity audit is needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_117_observed_covariance_upgrade_probe",
                  "purpose": "Attempt the BOSS DR12 observed covariance upgrade, rebuild the observed covariance status, and recompute guarded diagnostic bridge pressure where allowed.",
                  "why_next": "v4.116 locks the source-upgrade targets, policies, and gates."
              },
              {
                  "priority": 2,
                  "route_id": "v4_118_observed_covariance_upgrade_sensitivity_audit",
                  "purpose": "Audit whether the upgraded observed covariance changes the bridge result compared with diagonal fallback.",
                  "why_next": "Any covariance upgrade must be checked for sensitivity before interpretation."
              },
              {
                  "priority": 3,
                  "route_id": "v4_119_growth_family_expansion_design",
                  "purpose": "Design expanded observed growth-family coverage if BOSS-only upgrade is not enough.",
                  "why_next": "Additional independent families can test robustness."
              },
              {
                  "priority": 4,
                  "route_id": "v4_120_claim_boundary_review_handoff",
                  "purpose": "Create a human-readable status handoff after covariance upgrade and sensitivity audit.",
                  "why_next": "The result needs careful interpretation before any public-facing language."
              }
          ]

          failed_gates = []
          warnings = [
              "design_only",
              "source_covariance_not_ingested_yet",
              "observed_covariance_upgrade_required",
              "BOSS_DR12_covariance_priority",
              "no_bridge_pressure_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_115_regularized_pressure_sensitivity_audit"]

          if upstream["observed_covariance_upgrade_required"] is not True:
              failed_gates.append("upstream_observed_covariance_upgrade_requirement_not_carried")

          if upstream["source_observed_covariance_ingested"] is not False:
              failed_gates.append("upstream_source_covariance_boundary_not_carried")

          if upstream["diagnostic_stable"] is not True:
              failed_gates.append("upstream_diagnostic_stability_not_carried")

          if len(CURRENT_OBSERVED_VECTOR_STATUS) != 5:
              failed_gates.append("current_observed_vector_status_not_5")

          if not any(row["target_id"] == "BOSS_DR12_consensus_covariance" and row["priority"] == 1 for row in SOURCE_UPGRADE_TARGETS):
              failed_gates.append("BOSS_DR12_priority_target_missing")

          if len(COVARIANCE_UPGRADE_POLICY) < 5:
              failed_gates.append("covariance_upgrade_policy_incomplete")

          if NEXT_PROBE_DESIGN["allowed_to_compute_upgraded_observed_covariance"] is not True:
              failed_gates.append("next_probe_not_allowed_covariance_upgrade")

          if NEXT_PROBE_DESIGN["allowed_to_call_result_final_RSD_pressure"] is not False:
              failed_gates.append("next_probe_final_pressure_allowed_too_early")

          if NEXT_PROBE_DESIGN["allowed_to_validate_TAIRID"] is not False:
              failed_gates.append("next_probe_validation_allowed_too_early")

          required_schema_fields = {
              "source_target_id",
              "source_url_or_locator",
              "fetch_status",
              "covariance_status",
              "applies_to_positions",
              "applies_to_redshifts",
              "row_column_order_verified",
              "included_in_primary_bridge",
              "claim_boundary"
          }
          schema_fields = {row["field"] for row in NEXT_PROBE_INPUT_SCHEMA}
          if schema_fields != required_schema_fields:
              failed_gates.append("next_probe_input_schema_incomplete")

          if len(QUALITY_GATES_FOR_NEXT_PROBE) < 7:
              failed_gates.append("quality_gates_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "observed rsd source covariance was fully ingested in v4.116",
              "observed rsd covariance is complete in v4.116",
              "final rsd pressure score",
              "validates tairid cosmology",
              "diagonal fallback is the same as full observed covariance",
              "source covariance upgrade proves the model",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "observed_covariance_source_upgrade_design_passed_ready_for_observed_covariance_upgrade_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_sensitivity_audit_carried",
                  "pass": upstream["diagnostic_stable"] is True and upstream["observed_covariance_upgrade_required"] is True,
                  "result": "v4.115 diagnostic stability carried; observed covariance upgrade required",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "current_observed_vector_status_declared",
                  "pass": len(CURRENT_OBSERVED_VECTOR_STATUS) == 5,
                  "result": "five observed vector slots declared with covariance status",
                  "boundary": "No covariance ingested."
              },
              {
                  "rule_id": "BOSS_DR12_upgrade_prioritized",
                  "pass": any(row["target_id"] == "BOSS_DR12_consensus_covariance" and row["priority"] == 1 for row in SOURCE_UPGRADE_TARGETS),
                  "result": "BOSS DR12 covariance/subblock upgrade is priority 1",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "covariance_upgrade_policy_declared",
                  "pass": len(COVARIANCE_UPGRADE_POLICY) >= 5,
                  "result": f"{len(COVARIANCE_UPGRADE_POLICY)} covariance upgrade policies declared",
                  "boundary": "No source covariance computed."
              },
              {
                  "rule_id": "next_probe_schema_locked",
                  "pass": schema_fields == required_schema_fields,
                  "result": f"{len(NEXT_PROBE_INPUT_SCHEMA)} next-probe schema fields declared",
                  "boundary": "Schema only."
              },
              {
                  "rule_id": "quality_gates_declared",
                  "pass": len(QUALITY_GATES_FOR_NEXT_PROBE) >= 7,
                  "result": f"{len(QUALITY_GATES_FOR_NEXT_PROBE)} next-probe quality gates declared",
                  "boundary": "No bridge pressure computed."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": NEXT_PROBE_DESIGN["allowed_to_call_result_final_RSD_pressure"] is False and NEXT_PROBE_DESIGN["allowed_to_validate_TAIRID"] is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_116_rules_passed")

          if failed_gates:
              readiness_label = "observed_covariance_source_upgrade_design_failed"
              next_allowed_step = "Repair observed covariance source upgrade design before source-upgrade probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.117 observed covariance upgrade probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_diagnostic_stable": upstream["diagnostic_stable"],
              "upstream_pressure_z_all_zero": upstream["pressure_z_all_zero"],
              "observed_covariance_upgrade_required": upstream["observed_covariance_upgrade_required"],
              "source_observed_covariance_ingested": False,
              "current_observed_vector_slot_count": len(CURRENT_OBSERVED_VECTOR_STATUS),
              "source_upgrade_target_count": len(SOURCE_UPGRADE_TARGETS),
              "covariance_upgrade_policy_count": len(COVARIANCE_UPGRADE_POLICY),
              "next_probe_input_schema_field_count": len(NEXT_PROBE_INPUT_SCHEMA),
              "quality_gate_count": len(QUALITY_GATES_FOR_NEXT_PROBE),
              "BOSS_DR12_upgrade_priority": 1,
              "observed_RSD_values_computed": False,
              "observed_RSD_source_covariance_ingested": False,
              "observed_RSD_covariance_upgraded": False,
              "bridge_pressure_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "current_observed_vector_status": CURRENT_OBSERVED_VECTOR_STATUS,
              "source_upgrade_targets": SOURCE_UPGRADE_TARGETS,
              "covariance_upgrade_policy": COVARIANCE_UPGRADE_POLICY,
              "next_probe_design": NEXT_PROBE_DESIGN,
              "next_probe_input_schema": NEXT_PROBE_INPUT_SCHEMA,
              "quality_gates_for_next_probe": QUALITY_GATES_FOR_NEXT_PROBE,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "observed_covariance_source_upgrade_design_passed": not bool(failed_gates),
                  "source_observed_covariance_ingested": False,
                  "observed_RSD_covariance_upgraded": False,
                  "bridge_pressure_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_116_observed_covariance_source_upgrade_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "current_observed_vector_status_v4_116.csv",
              CURRENT_OBSERVED_VECTOR_STATUS,
              ["position", "z", "current_source_family", "current_covariance_status", "upgrade_priority", "next_action", "included_in_primary_bridge"]
          )

          write_csv(
              OUTDIR / "source_upgrade_targets_v4_116.csv",
              SOURCE_UPGRADE_TARGETS,
              ["target_id", "target_positions", "target_redshifts", "desired_object", "upgrade_route", "priority", "required_before_stronger_pressure_language"]
          )

          write_csv(
              OUTDIR / "covariance_upgrade_policy_v4_116.csv",
              COVARIANCE_UPGRADE_POLICY,
              ["policy_id", "requirement", "reason", "applied_now"]
          )

          write_csv(
              OUTDIR / "next_probe_input_schema_v4_116.csv",
              NEXT_PROBE_INPUT_SCHEMA,
              ["field", "required", "purpose"]
          )

          write_csv(
              OUTDIR / "quality_gates_for_next_probe_v4_116.csv",
              QUALITY_GATES_FOR_NEXT_PROBE,
              ["gate_id", "requirement", "failure_action"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_116.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_116.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_116.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.116 — Observed Covariance Source Upgrade Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
