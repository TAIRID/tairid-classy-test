name: 000 TAIRID v4.181 - Limited LRGxELG Observed Plus Planck Chain Reference Covariance Preview No Validation

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-181-limited-lrgxelg-observed-plus-planck-chain-reference-covariance-preview-no-validation.yml"

permissions:
  contents: read

jobs:
  v4-181-observed-plus-planck-chain-reference-covariance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.181 observed plus Planck-chain reference covariance preview
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_181_outputs
          cat > tairid_v4_181_outputs/run_v4_181.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          OUT = Path("tairid_v4_181_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "limited_lrgxelg_observed_plus_planck_chain_reference_covariance_preview_passed_combined_covariance_artifacts_written_no_validation"

          LABELS = [
              "DM_ov_rd_z0p70",
              "DH_ov_rd_z0p70",
              "fsigma8_z0p70",
              "DM_ov_rd_z0p845",
              "DH_ov_rd_z0p845",
              "fsigma8_z0p845",
          ]

          ROLES = {
              "DM_ov_rd_z0p70": "transverse_geometry_reach",
              "DH_ov_rd_z0p70": "radial_geometry_pacing_access",
              "fsigma8_z0p70": "growth_consolidation",
              "DM_ov_rd_z0p845": "transverse_geometry_reach",
              "DH_ov_rd_z0p845": "radial_geometry_pacing_access",
              "fsigma8_z0p845": "growth_consolidation",
          }

          REDSHIFTS = {
              "DM_ov_rd_z0p70": 0.700,
              "DH_ov_rd_z0p70": 0.700,
              "fsigma8_z0p70": 0.700,
              "DM_ov_rd_z0p845": 0.845,
              "DH_ov_rd_z0p845": 0.845,
              "fsigma8_z0p845": 0.845,
          }

          # Observed limited LRGxELG values from v4.151/v4.153 and observed covariance from v4.166.
          OBSERVED = [
              17.954174,
              21.221161,
              0.433572,
              18.896851,
              20.910056,
              0.296822,
          ]

          OBSERVED_COV = [
              [0.258788, -0.013232, 0.014042, 0.097797, 0.013451, 0.001526],
              [-0.013232, 1.434424, -0.008455, 0.132199, 1.474695, -0.025946],
              [0.014042, -0.008455, 0.002504, 0.000447, -0.028524, 0.000647],
              [0.097797, 0.132199, 0.000447, 0.602601, -0.793886, 0.035649],
              [0.013451, 1.474695, -0.028524, -0.793886, 8.189312, -0.171374],
              [0.001526, -0.025946, 0.000647, 0.035649, -0.171374, 0.006623],
          ]

          # Chain-derived Planck reference mean/covariance carried forward from v4.180.
          PLANCK_CHAIN_REFERENCE_MEAN = [
              17.59943045417609,
              20.2561921544936,
              0.4632289287770681,
              20.410265148910945,
              18.542918948589165,
              0.4492732965578104,
          ]

          PLANCK_CHAIN_REFERENCE_COV = [
              [0.014516, 0.007963, 0.000361, 0.015455, 0.005142, 0.000271],
              [0.007963, 0.004383, 0.000197, 0.008480, 0.002838, 0.000148],
              [0.000361, 0.000197, 0.000023, 0.000384, 0.000127, 0.000021],
              [0.015455, 0.008480, 0.000384, 0.016456, 0.005477, 0.000288],
              [0.005142, 0.002838, 0.000127, 0.005477, 0.001841, 0.000095],
              [0.000271, 0.000148, 0.000021, 0.000288, 0.000095, 0.000018],
          ]

          BLOCKED_CLAIMS = [
              "no TAIRID validation",
              "no LCDM ruled-out claim",
              "no final cosmology claim",
              "no QSO covariance",
              "no full eBOSS covariance",
              "no full tracer-family covariance",
              "no likelihood",
              "no BIC",
              "no posterior model comparison",
              "no publication-grade pressure claim",
              "limited two-redshift LRGxELG preview only",
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def mat_add(A, B):
              return [[A[i][j] + B[i][j] for j in range(len(A[0]))] for i in range(len(A))]

          def mat_to_rows(matrix, row_names, col_names):
              rows = []
              for i, rname in enumerate(row_names):
                  row = {"row_label": rname}
                  for j, cname in enumerate(col_names):
                      row[cname] = matrix[i][j]
                  rows.append(row)
              return rows

          def corr_from_cov(C):
              corr = []
              for i in range(len(C)):
                  row = []
                  for j in range(len(C)):
                      denom = math.sqrt(C[i][i] * C[j][j]) if C[i][i] > 0 and C[j][j] > 0 else 0
                      row.append(C[i][j] / denom if denom else "")
                  corr.append(row)
              return corr

          def gaussian_solve(A, b):
              n = len(A)
              M = [list(A[i]) + [b[i]] for i in range(n)]
              for col in range(n):
                  pivot = max(range(col, n), key=lambda r: abs(M[r][col]))
                  if abs(M[pivot][col]) < 1e-15:
                      raise ValueError("singular matrix during solve")
                  if pivot != col:
                      M[col], M[pivot] = M[pivot], M[col]
                  piv = M[col][col]
                  for j in range(col, n + 1):
                      M[col][j] /= piv
                  for r in range(n):
                      if r == col:
                          continue
                      factor = M[r][col]
                      if factor:
                          for j in range(col, n + 1):
                              M[r][j] -= factor * M[col][j]
              return [M[i][n] for i in range(n)]

          def quadratic_form_with_inverse(C, r):
              x = gaussian_solve(C, r)
              return sum(r[i] * x[i] for i in range(len(r)))

          def diag_sigmas(C):
              return [math.sqrt(C[i][i]) if C[i][i] > 0 else float("nan") for i in range(len(C))]

          C_COMBINED = mat_add(OBSERVED_COV, PLANCK_CHAIN_REFERENCE_COV)
          RESIDUAL = [OBSERVED[i] - PLANCK_CHAIN_REFERENCE_MEAN[i] for i in range(6)]

          observed_only_norm = quadratic_form_with_inverse(OBSERVED_COV, RESIDUAL)
          combined_norm = quadratic_form_with_inverse(C_COMBINED, RESIDUAL)
          observed_only_radius = math.sqrt(observed_only_norm) if observed_only_norm >= 0 else float("nan")
          combined_radius = math.sqrt(combined_norm) if combined_norm >= 0 else float("nan")

          obs_sig = diag_sigmas(OBSERVED_COV)
          ref_sig = diag_sigmas(PLANCK_CHAIN_REFERENCE_COV)
          combined_sig = diag_sigmas(C_COMBINED)

          residual_rows = []
          for i, label in enumerate(LABELS):
              residual_rows.append({
                  "order": i + 1,
                  "label": label,
                  "z": REDSHIFTS[label],
                  "role": ROLES[label],
                  "observed": OBSERVED[i],
                  "planck_chain_reference_mean": PLANCK_CHAIN_REFERENCE_MEAN[i],
                  "observed_minus_planck_chain_reference": RESIDUAL[i],
                  "percent_residual": 100.0 * RESIDUAL[i] / PLANCK_CHAIN_REFERENCE_MEAN[i],
                  "observed_sigma": obs_sig[i],
                  "planck_chain_reference_sigma": ref_sig[i],
                  "combined_sigma_sqrt_observed_plus_reference_diag": combined_sig[i],
                  "observed_sigma_units_preview_not_final_pressure": RESIDUAL[i] / obs_sig[i],
                  "combined_sigma_units_preview_not_final_pressure": RESIDUAL[i] / combined_sig[i],
              })

          write_csv(
              OUT / "v4_181_observed_vs_planck_chain_reference_residuals.csv",
              residual_rows,
              [
                  "order",
                  "label",
                  "z",
                  "role",
                  "observed",
                  "planck_chain_reference_mean",
                  "observed_minus_planck_chain_reference",
                  "percent_residual",
                  "observed_sigma",
                  "planck_chain_reference_sigma",
                  "combined_sigma_sqrt_observed_plus_reference_diag",
                  "observed_sigma_units_preview_not_final_pressure",
                  "combined_sigma_units_preview_not_final_pressure",
              ],
          )

          write_csv(OUT / "v4_181_observed_covariance.csv", mat_to_rows(OBSERVED_COV, LABELS, LABELS), ["row_label"] + LABELS)
          write_csv(OUT / "v4_181_planck_chain_reference_covariance.csv", mat_to_rows(PLANCK_CHAIN_REFERENCE_COV, LABELS, LABELS), ["row_label"] + LABELS)
          write_csv(OUT / "v4_181_combined_observed_plus_planck_chain_reference_covariance.csv", mat_to_rows(C_COMBINED, LABELS, LABELS), ["row_label"] + LABELS)
          write_csv(OUT / "v4_181_combined_correlation.csv", mat_to_rows(corr_from_cov(C_COMBINED), LABELS, LABELS), ["row_label"] + LABELS)

          role_groups = {}
          redshift_groups = {}
          for row in residual_rows:
              role_groups.setdefault(row["role"], []).append(row)
              redshift_groups.setdefault(str(row["z"]), []).append(row)

          role_rows = []
          for role, rows in role_groups.items():
              vals = [r["percent_residual"] for r in rows]
              combined_units = [r["combined_sigma_units_preview_not_final_pressure"] for r in rows]
              role_rows.append({
                  "role": role,
                  "count": len(rows),
                  "mean_percent_residual": sum(vals) / len(vals),
                  "max_abs_percent_residual": max(abs(v) for v in vals),
                  "mean_combined_sigma_units_preview": sum(combined_units) / len(combined_units),
                  "max_abs_combined_sigma_units_preview": max(abs(v) for v in combined_units),
              })

          redshift_rows = []
          for z, rows in redshift_groups.items():
              vals = [r["percent_residual"] for r in rows]
              combined_units = [r["combined_sigma_units_preview_not_final_pressure"] for r in rows]
              redshift_rows.append({
                  "z": z,
                  "count": len(rows),
                  "mean_percent_residual": sum(vals) / len(vals),
                  "max_abs_percent_residual": max(abs(v) for v in vals),
                  "mean_combined_sigma_units_preview": sum(combined_units) / len(combined_units),
                  "max_abs_combined_sigma_units_preview": max(abs(v) for v in combined_units),
              })

          write_csv(
              OUT / "v4_181_role_summary.csv",
              role_rows,
              ["role", "count", "mean_percent_residual", "max_abs_percent_residual", "mean_combined_sigma_units_preview", "max_abs_combined_sigma_units_preview"],
          )
          write_csv(
              OUT / "v4_181_redshift_summary.csv",
              redshift_rows,
              ["z", "count", "mean_percent_residual", "max_abs_percent_residual", "mean_combined_sigma_units_preview", "max_abs_combined_sigma_units_preview"],
          )

          pattern = {
              "growth_below_planck_chain_reference_at_both_redshifts": (
                  OBSERVED[LABELS.index("fsigma8_z0p70")] < PLANCK_CHAIN_REFERENCE_MEAN[LABELS.index("fsigma8_z0p70")]
                  and OBSERVED[LABELS.index("fsigma8_z0p845")] < PLANCK_CHAIN_REFERENCE_MEAN[LABELS.index("fsigma8_z0p845")]
              ),
              "radial_geometry_above_planck_chain_reference_at_both_redshifts": (
                  OBSERVED[LABELS.index("DH_ov_rd_z0p70")] > PLANCK_CHAIN_REFERENCE_MEAN[LABELS.index("DH_ov_rd_z0p70")]
                  and OBSERVED[LABELS.index("DH_ov_rd_z0p845")] > PLANCK_CHAIN_REFERENCE_MEAN[LABELS.index("DH_ov_rd_z0p845")]
              ),
              "transverse_geometry_flips_sign": (
                  RESIDUAL[LABELS.index("DM_ov_rd_z0p70")] * RESIDUAL[LABELS.index("DM_ov_rd_z0p845")] < 0
              ),
          }

          largest_pct = max(residual_rows, key=lambda r: abs(r["percent_residual"]))
          largest_combined_units = max(residual_rows, key=lambda r: abs(r["combined_sigma_units_preview_not_final_pressure"]))

          preview_summary = {
              "version": "v4.181",
              "result_label": RESULT_LABEL,
              "observed_only_norm_preview_not_final_pressure": observed_only_norm,
              "observed_only_radius_preview_not_final_pressure": observed_only_radius,
              "combined_observed_plus_reference_norm_preview_not_final_pressure": combined_norm,
              "combined_observed_plus_reference_radius_preview_not_final_pressure": combined_radius,
              "norm_change_observed_only_to_combined": combined_norm - observed_only_norm,
              "radius_change_observed_only_to_combined": combined_radius - observed_only_radius,
              "largest_percent_residual_label": largest_pct["label"],
              "largest_percent_residual": largest_pct["percent_residual"],
              "largest_combined_sigma_preview_label": largest_combined_units["label"],
              "largest_combined_sigma_preview": largest_combined_units["combined_sigma_units_preview_not_final_pressure"],
              "pattern": pattern,
              "claim_boundary": "limited LRGxELG observed plus Planck-chain reference covariance preview only; not validation",
              "blocked_claims": BLOCKED_CLAIMS,
          }

          (OUT / "v4_181_preview_summary.json").write_text(json.dumps(preview_summary, indent=2), encoding="utf-8")

          selected_next_route = "limited_lrgxelg_combined_covariance_mode_lattice_and_gap_close_report_no_validation_with_scope_guards"

          route_decision = {
              "version": "v4.181",
              "result_label": RESULT_LABEL,
              "clean_result": "Observed covariance and Planck chain-derived reference covariance were combined for a limited six-slot LRGxELG preview. This is not validation.",
              "selected_next_route": selected_next_route,
              "preview_summary": preview_summary,
              "blocked_claims": BLOCKED_CLAIMS,
          }

          (OUT / "v4_181_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")

          (OUT / "v4_181_scope_guards.json").write_text(json.dumps({
              "scope": "limited LRGxELG observed plus Planck chain-derived reference covariance preview only",
              "observed_values_used": True,
              "observed_covariance_used": True,
              "planck_chain_reference_mean_used": True,
              "planck_chain_reference_covariance_used": True,
              "full_eBOSS_covariance_used": False,
              "QSO_covariance_used": False,
              "likelihood_computed": False,
              "BIC_computed": False,
              "posterior_model_comparison_computed": False,
              "TAIRID_validated": False,
          }, indent=2), encoding="utf-8")

          (OUT / "v4_181_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = []
          summary.append("# TAIRID v4.181 - Observed Plus Planck Chain Reference Covariance Preview")
          summary.append("")
          summary.append("Expected result: `" + RESULT_LABEL + "`")
          summary.append("")
          summary.append("## Clean result")
          summary.append("")
          summary.append("This workflow combines the observed limited LRGxELG covariance with the Planck chain-derived six-slot reference covariance from v4.180.")
          summary.append("")
          summary.append("Observed-only norm preview, not final pressure: `" + f"{observed_only_norm:.6f}" + "`")
          summary.append("Observed-only radius preview, not final pressure: `" + f"{observed_only_radius:.6f}" + "`")
          summary.append("Combined norm preview, not final pressure: `" + f"{combined_norm:.6f}" + "`")
          summary.append("Combined radius preview, not final pressure: `" + f"{combined_radius:.6f}" + "`")
          summary.append("")
          summary.append("## Shape pattern")
          summary.append("")
          summary.append("- Growth below Planck-chain reference at both redshifts: `" + str(pattern["growth_below_planck_chain_reference_at_both_redshifts"]) + "`")
          summary.append("- Radial geometry above Planck-chain reference at both redshifts: `" + str(pattern["radial_geometry_above_planck_chain_reference_at_both_redshifts"]) + "`")
          summary.append("- Transverse geometry flips sign: `" + str(pattern["transverse_geometry_flips_sign"]) + "`")
          summary.append("")
          summary.append("## Selected next route")
          summary.append("")
          summary.append("`" + selected_next_route + "`")
          summary.append("")
          summary.append("## Boundary")
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_181_summary.md").write_text("\n".join(summary), encoding="utf-8")

          rules = {
              "version_is_v4_181": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "residuals_written": (OUT / "v4_181_observed_vs_planck_chain_reference_residuals.csv").exists(),
              "observed_covariance_written": (OUT / "v4_181_observed_covariance.csv").exists(),
              "reference_covariance_written": (OUT / "v4_181_planck_chain_reference_covariance.csv").exists(),
              "combined_covariance_written": (OUT / "v4_181_combined_observed_plus_planck_chain_reference_covariance.csv").exists(),
              "combined_correlation_written": (OUT / "v4_181_combined_correlation.csv").exists(),
              "role_summary_written": (OUT / "v4_181_role_summary.csv").exists(),
              "redshift_summary_written": (OUT / "v4_181_redshift_summary.csv").exists(),
              "preview_summary_written": (OUT / "v4_181_preview_summary.json").exists(),
              "route_decision_written": (OUT / "v4_181_route_decision.json").exists(),
              "scope_guards_written": (OUT / "v4_181_scope_guards.json").exists(),
              "blocked_claims_written": (OUT / "v4_181_blocked_claims.json").exists(),
              "summary_written": (OUT / "v4_181_summary.md").exists(),
              "six_residual_rows": len(residual_rows) == 6,
              "growth_pattern_survived": pattern["growth_below_planck_chain_reference_at_both_redshifts"],
              "radial_geometry_pattern_survived": pattern["radial_geometry_above_planck_chain_reference_at_both_redshifts"],
              "transverse_geometry_flip_survived": pattern["transverse_geometry_flips_sign"],
              "combined_norm_finite": math.isfinite(combined_norm) and combined_norm > 0,
              "no_likelihood_claim": True,
              "no_bic_claim": True,
              "no_validation_claim": True,
              "next_route_selected": selected_next_route == "limited_lrgxelg_combined_covariance_mode_lattice_and_gap_close_report_no_validation_with_scope_guards",
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.181",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "combined_norm_preview_not_final_pressure": combined_norm,
              "combined_radius_preview_not_final_pressure": combined_radius,
              "selected_next_route": selected_next_route,
              "claim_boundary": "limited_observed_plus_planck_chain_reference_covariance_preview_only_no_validation",
          }

          (OUT / "v4_181_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.181 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_181_outputs/run_v4_181.py

      - name: Upload v4.181 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-181-limited-lrgxelg-observed-plus-planck-chain-reference-covariance-preview-output
          path: tairid_v4_181_outputs/
