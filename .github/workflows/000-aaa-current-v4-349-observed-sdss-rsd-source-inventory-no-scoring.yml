name: "!!! AAA CURRENT - TAIRID v4.349 observed SDSS RSD source inventory no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-349-observed-sdss-rsd-source-inventory-no-scoring:
    name: "!!! AAA CURRENT - Run v4.349 observed source inventory"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.348 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.348 output ZIP by pattern..."
          INPUT_348_ZIP="$(ls tairid-v4-348-observed-sdss-rsd-data-loading-readiness-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_348_ZIP" ]; then
            echo "Could not find v4.348 output ZIP."
            echo "Expected a file like:"
            echo "tairid-v4-348-observed-sdss-rsd-data-loading-readiness-no-scoring-output.zip"
            exit 1
          fi

          echo "Using v4.348 ZIP:"
          echo "$INPUT_348_ZIP"
          echo "INPUT_348_ZIP=$INPUT_348_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.349 observed source inventory script
        run: |
          cat > run_v4_349_observed_sdss_rsd_source_inventory_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values approved; numeric baseline approved; observed source inventory may be built here; no observed values loaded; no scoring; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def classify_candidate(file_name, repo_path):
              name = clean(file_name).lower()
              path = clean(repo_path).lower()

              if "sdss_rsd_manual_answers" in name:
                  return {
                      "source_class": "manual_observed_source_answer_candidate",
                      "priority": "high",
                      "inventory_decision": "keep_for_schema_mapping_later",
                      "reason": "Manual answer CSV is likely the closest existing observed-source answer file, but values are not loaded here."
                  }

              if "human_decision_template" in name or "decision_template" in name or "fillable" in name:
                  return {
                      "source_class": "human_review_or_decision_template",
                      "priority": "low",
                      "inventory_decision": "archive_as_process_context_not_observed_data",
                      "reason": "Template/review file may document process, but is not a raw observed-value source."
                  }

              if name.endswith(".zip") and "tairid-v4-" in name:
                  return {
                      "source_class": "prior_pipeline_artifact",
                      "priority": "medium",
                      "inventory_decision": "keep_as_audit_context_not_direct_observed_values",
                      "reason": "Prior TAIRID ZIP may contain useful provenance, but should not be parsed as observed values in this step."
                  }

              if any(x in name for x in ["boss", "eboss", "dr12", "lrg", "elg", "qso", "6df", "wigglez", "vipers", "gama"]):
                  return {
                      "source_class": "possible_direct_observed_data_source",
                      "priority": "high",
                      "inventory_decision": "keep_for_schema_mapping_later",
                      "reason": "Filename contains survey/tracer terms that may correspond to direct observed RSD data."
                  }

              return {
                  "source_class": "uncertain_observed_candidate",
                  "priority": "medium",
                  "inventory_decision": "keep_for_manual_review",
                  "reason": "Keyword matched the readiness scan, but direct observed-value status is unclear."
              }

          def main():
              input_348 = Path(os.environ["INPUT_348_ZIP"])

              outdir = Path("tairid_v4_349_observed_sdss_rsd_source_inventory_no_values_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base348 = extract_zip(input_348, "tairid_v4_349_348_")

              summary348_path = find_one(base348, "v4_348_summary.json")
              observed_candidates_path = find_one(base348, "v4_348_observed_sdss_rsd_candidate_file_manifest_NO_VALUES_LOADED.csv")
              repo_manifest_path = find_one(base348, "v4_348_repo_manifest_for_observed_data_readiness.csv")
              readiness_checklist_path = find_one(base348, "v4_348_observed_data_loading_readiness_checklist.csv")
              loading_plan_path = find_one(base348, "v4_348_observed_data_loading_plan_no_values_no_scoring.csv")
              baseline_path = find_one(base348, "v4_348_input_v4_347_approved_baseline_preserved.csv")
              calculator_path = find_one(base348, "v4_348_input_v4_347_approved_calculator_input_preserved.csv")
              rules348_path = find_one(base348, "v4_348_rule_checks.csv")

              summary348 = json.loads(summary348_path.read_text())
              observed_candidates = pd.read_csv(observed_candidates_path)
              repo_manifest = pd.read_csv(repo_manifest_path)
              readiness_checklist = pd.read_csv(readiness_checklist_path)
              loading_plan = pd.read_csv(loading_plan_path)
              approved_baseline = pd.read_csv(baseline_path)
              approved_calculator = pd.read_csv(calculator_path)
              rules348 = pd.read_csv(rules348_path)

              inventory_rows = []

              for _, row in observed_candidates.iterrows():
                  file_name = clean(row["file_name"])
                  repo_path = clean(row["repo_path"])
                  classification = classify_candidate(file_name, repo_path)

                  inventory_rows.append({
                      "v4_349_inventory_id": f"v4_349_inventory_{len(inventory_rows)+1:03d}",
                      "v4_348_observed_candidate_file_id": clean(row["observed_candidate_file_id"]),
                      "repo_path": repo_path,
                      "file_name": file_name,
                      "file_type": clean(row["file_type"]),
                      "size_bytes": row["size_bytes"],
                      "sha256": clean(row["sha256"]),
                      "keyword_hits": clean(row["keyword_hits"]),
                      "source_class": classification["source_class"],
                      "inventory_priority": classification["priority"],
                      "inventory_decision": classification["inventory_decision"],
                      "inventory_reason": classification["reason"],
                      "observed_source_inventory_status": "inventoried_not_loaded_not_scored",
                      "observed_values_loaded": False,
                      "observed_rows_loaded": 0,
                      "definition_match_confirmed": False,
                      "covariance_match_confirmed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              source_inventory = pd.DataFrame(inventory_rows)

              priority_summary = source_inventory.groupby(
                  ["source_class", "inventory_priority", "inventory_decision"],
                  dropna=False
              ).size().reset_index(name="rows")

              direct_or_schema_candidates = source_inventory[
                  source_inventory["inventory_decision"].isin([
                      "keep_for_schema_mapping_later",
                      "keep_for_manual_review"
                  ])
              ].copy()

              process_context = source_inventory[
                  source_inventory["inventory_decision"].isin([
                      "archive_as_process_context_not_observed_data",
                      "keep_as_audit_context_not_direct_observed_values"
                  ])
              ].copy()

              schema_mapping_plan = pd.DataFrame([
                  {
                      "planned_stage": "v4.350",
                      "planned_action": "Create observed data schema and column map candidates from high-priority inventory rows.",
                      "source_inventory_dependency": "v4_349_observed_source_inventory_NO_VALUES_LOADED.csv",
                      "observed_values_loaded": False,
                      "score_valid": False,
                      "support_allowed": False,
                  },
                  {
                      "planned_stage": "v4.351",
                      "planned_action": "Human approve observed source/schema before any observed values are loaded.",
                      "source_inventory_dependency": "v4_350_schema_map_candidate_packet",
                      "observed_values_loaded": False,
                      "score_valid": False,
                      "support_allowed": False,
                  },
                  {
                      "planned_stage": "v4.352_or_later",
                      "planned_action": "Load observed values only after source/schema approval; still no scoring until definition/covariance gates pass.",
                      "source_inventory_dependency": "approved_schema_map",
                      "observed_values_loaded": False,
                      "score_valid": False,
                      "support_allowed": False,
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_349_GAP_001",
                      "gap": "Observed source inventory created from v4.348 candidate manifest.",
                      "status_after_v4_349": "closed_inventory_created",
                      "next_gate": "v4_350_observed_data_schema_and_column_map_no_values_no_scoring",
                  },
                  {
                      "gap_id": "V4_349_GAP_002",
                      "gap": "Observed values remain unloaded.",
                      "status_after_v4_349": "still_blocked",
                      "next_gate": "later_observed_value_loading_gate",
                  },
                  {
                      "gap_id": "V4_349_GAP_003",
                      "gap": "Definition matching remains unconfirmed.",
                      "status_after_v4_349": "still_blocked",
                      "next_gate": "later_definition_match_gate",
                  },
                  {
                      "gap_id": "V4_349_GAP_004",
                      "gap": "Covariance matching remains unconfirmed.",
                      "status_after_v4_349": "still_blocked",
                      "next_gate": "later_covariance_match_gate",
                  },
                  {
                      "gap_id": "V4_349_GAP_005",
                      "gap": "Scoring and support claims remain blocked.",
                      "status_after_v4_349": "still_blocked",
                      "next_gate": "later_scoring_and_support_gates",
                  },
              ])

              high_priority_rows = int((source_inventory["inventory_priority"] == "high").sum())
              schema_candidate_rows = int(len(direct_or_schema_candidates))

              hard_checks = {
                  "input_v4_348_summary_found": summary348.get("version") == "v4.348",
                  "input_v4_348_rules_all_passed": summary_rules_all_passed(summary348),
                  "input_v4_348_failed_gates_none": summary348.get("failed_gates") == "none",
                  "input_v4_348_parameter_values_approved_true": summary348.get("parameter_values_approved") is True,
                  "input_v4_348_numeric_baseline_approved_true": summary348.get("numeric_baseline_approved") is True,
                  "input_v4_348_no_observed_values_loaded": summary348.get("observed_values_loaded") is False,
                  "input_v4_348_no_definition_match_confirmed": summary348.get("definition_match_confirmed") is False,
                  "input_v4_348_no_score_valid": summary348.get("score_valid") is False,
                  "input_v4_348_no_support_allowed": summary348.get("support_allowed") is False,

                  "rules348_all_passed": rules348["passed"].astype(bool).all(),
                  "observed_candidates_have_rows": len(observed_candidates) > 0,
                  "repo_manifest_has_rows": len(repo_manifest) > 0,
                  "readiness_checklist_rows_equal_6": len(readiness_checklist) == 6,
                  "loading_plan_rows_equal_4": len(loading_plan) == 4,
                  "approved_baseline_rows_equal_3": len(approved_baseline) == 3,
                  "approved_calculator_rows_equal_3": len(approved_calculator) == 3,

                  "source_inventory_rows_match_candidates": len(source_inventory) == len(observed_candidates),
                  "priority_summary_has_rows": len(priority_summary) > 0,
                  "schema_candidate_rows_at_least_one": schema_candidate_rows >= 1,
                  "high_priority_rows_at_least_one": high_priority_rows >= 1,
                  "schema_mapping_plan_rows_equal_3": len(schema_mapping_plan) == 3,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "observed_values_loaded_false": false_col(source_inventory, "observed_values_loaded"),
                  "definition_match_confirmed_false": false_col(source_inventory, "definition_match_confirmed"),
                  "covariance_match_confirmed_false": false_col(source_inventory, "covariance_match_confirmed"),
                  "score_valid_false": false_col(source_inventory, "score_valid"),
                  "support_allowed_false": false_col(source_inventory, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary349 = {
                  "version": "v4.349",
                  "route_name": "v4_349_observed_sdss_rsd_source_inventory_no_values_no_scoring",
                  "expected_result": "v4_349_observed_sdss_rsd_source_inventory_passed_no_values_loaded_no_scoring_no_claims",
                  "input_version": "v4.348",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "observed_candidate_input_rows": int(len(observed_candidates)),
                  "source_inventory_rows": int(len(source_inventory)),
                  "schema_candidate_rows": schema_candidate_rows,
                  "high_priority_rows": high_priority_rows,
                  "process_context_rows": int(len(process_context)),
                  "parameter_values_approved": True,
                  "numeric_baseline_values_filled": True,
                  "approved_baseline_values": 3,
                  "numeric_baseline_approved": True,
                  "observed_values_loaded": False,
                  "observed_rows_loaded": 0,
                  "definition_match_confirmed": False,
                  "covariance_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "v4_350_observed_data_schema_and_column_map_no_values_no_scoring",
              }

              source_inventory.to_csv(outdir / "v4_349_observed_source_inventory_NO_VALUES_LOADED.csv", index=False)
              priority_summary.to_csv(outdir / "v4_349_source_inventory_priority_summary.csv", index=False)
              direct_or_schema_candidates.to_csv(outdir / "v4_349_schema_mapping_candidate_files_NO_VALUES_LOADED.csv", index=False)
              process_context.to_csv(outdir / "v4_349_process_context_files_NOT_OBSERVED_VALUES.csv", index=False)
              schema_mapping_plan.to_csv(outdir / "v4_349_schema_mapping_plan_no_values_no_scoring.csv", index=False)
              gap_update.to_csv(outdir / "v4_349_gap_status_after_observed_source_inventory.csv", index=False)
              observed_candidates.to_csv(outdir / "v4_349_input_v4_348_observed_candidate_manifest_preserved.csv", index=False)
              approved_baseline.to_csv(outdir / "v4_349_input_v4_348_approved_baseline_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_349_rule_checks.csv", index=False)

              (outdir / "v4_349_summary.json").write_text(json.dumps(summary349, indent=2))

              summary_md = f"""# TAIRID v4.349 Observed SDSS RSD Source Inventory — No Values, No Scoring

          Expected result: `{summary349["expected_result"]}`

          {summary349["rules_passed"]} / {summary349["rules_total"]} rules passed

          failed_gates = {summary349["failed_gates"]}

          source_inventory_rows = {summary349["source_inventory_rows"]}

          schema_candidate_rows = {summary349["schema_candidate_rows"]}

          high_priority_rows = {summary349["high_priority_rows"]}

          observed_values_loaded = false

          observed_rows_loaded = 0

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step inventories observed SDSS/RSD candidate files only.

          It does **not** load observed values.

          It does **not** confirm definition or covariance matching.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{summary349["selected_next_route"]}`
          """
              (outdir / "v4_349_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary349, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_349_observed_sdss_rsd_source_inventory_no_scoring.py

      - name: Run v4.349 observed SDSS RSD source inventory no scoring
        run: |
          python run_v4_349_observed_sdss_rsd_source_inventory_no_scoring.py

      - name: Upload v4.349 observed source inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-349-observed-sdss-rsd-source-inventory-no-values-no-scoring-output
          path: |
            tairid_v4_349_observed_sdss_rsd_source_inventory_no_values_no_scoring_output/
            tairid_v4_349_observed_sdss_rsd_source_inventory_no_values_no_scoring_output.zip
