name: 000 TAIRID v4.172 - Limited LRGxELG Reference Package Manual Fill Request With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-172-limited-lrgxelg-reference-package-manual-fill-request-with-scope-guards.yml"

permissions:
  contents: read

jobs:
  v4-172-reference-package-manual-fill-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.172 reference package manual fill request
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_172_outputs
          cat > tairid_v4_172_outputs/run_v4_172.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          OUT = Path("tairid_v4_172_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "limited_lrgxelg_reference_package_manual_fill_request_passed_templates_written_no_ingestion_no_pressure_no_validation"

          LABELS = [
              "DM_ov_rd_z0p70",
              "DH_ov_rd_z0p70",
              "fsigma8_z0p70",
              "DM_ov_rd_z0p845",
              "DH_ov_rd_z0p845",
              "fsigma8_z0p845",
          ]

          RECOMMENDED_REFERENCE_ENSEMBLE_PATH = "data/reference/lrgxelg_reference_ensemble.csv"
          RECOMMENDED_REFERENCE_COVARIANCE_PATH = "data/reference/lrgxelg_reference_covariance.csv"
          RECOMMENDED_CHAIN_MANIFEST_PATH = "data/reference/planck_chain_manifest.json"
          RECOMMENDED_PACKAGE_MANIFEST_PATH = "data/reference/lrgxelg_reference_package_manifest.json"

          BLOCKED_CLAIMS = [
              "no reference package ingested",
              "no Planck chain ingested",
              "no reference covariance computed",
              "no residuals computed",
              "no pressure computed",
              "no final chi-square",
              "no likelihood",
              "no BIC",
              "no posterior comparison",
              "no QSO covariance",
              "no full eBOSS covariance",
              "no LCDM ruled-out claim",
              "no TAIRID validation",
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          # Template 1: reference ensemble. This is the best route if the user can provide
          # generated samples or exported Planck-chain-derived six-slot predictions.
          ensemble_fieldnames = [
              "sample_id",
              *LABELS,
              "Omega_m",
              "H0_km_s_Mpc",
              "rd_Mpc",
              "sigma8_z0",
              "growth_index_gamma",
              "source_family",
              "provenance_url_or_note",
              "license_or_use_note",
          ]

          ensemble_rows = []
          for i in range(1, 4):
              row = {"sample_id": f"replace_with_sample_{i}"}
              for label in LABELS:
                  row[label] = ""
              row.update({
                  "Omega_m": "",
                  "H0_km_s_Mpc": "",
                  "rd_Mpc": "",
                  "sigma8_z0": "",
                  "growth_index_gamma": "",
                  "source_family": "replace_with_source_family",
                  "provenance_url_or_note": "replace_with_url_or_note",
                  "license_or_use_note": "replace_with_license_or_use_note",
              })
              ensemble_rows.append(row)

          write_csv(
              OUT / "template_lrgxelg_reference_ensemble.csv",
              ensemble_rows,
              ensemble_fieldnames,
          )

          # Template 2: direct covariance matrix. Use only if a documented covariance exists.
          covariance_rows = []
          for row_label in LABELS:
              row = {"row_label": row_label}
              for col_label in LABELS:
                  row[col_label] = ""
              covariance_rows.append(row)

          write_csv(
              OUT / "template_lrgxelg_reference_covariance.csv",
              covariance_rows,
              ["row_label", *LABELS],
          )

          # Template 3: chain manifest. This points to a chain file already committed to the repo.
          chain_manifest_template = {
              "chain_file": "data/reference/replace_with_chain_file_name.csv",
              "parameter_fields": [
                  "Omega_m",
                  "H0_km_s_Mpc",
                  "rd_Mpc",
                  "sigma8_z0",
              ],
              "weight_field": "optional_weight_column_or_blank",
              "source_family": "replace_with_planck_or_reference_chain_source",
              "provenance_url_or_note": "replace_with_source_url_or_note",
              "license_or_use_note": "replace_with_license_or_use_note",
              "notes": [
                  "This manifest only identifies a chain route.",
                  "A later workflow must validate and transform the chain.",
                  "This file alone must not be treated as reference covariance.",
              ],
          }
          (OUT / "template_planck_chain_manifest.json").write_text(
              json.dumps(chain_manifest_template, indent=2),
              encoding="utf-8",
          )

          # Template 4: package manifest. This documents the chosen package source.
          package_manifest_template = {
              "package_type": "choose_one: reference_ensemble_csv | reference_covariance_csv | chain_manifest_json",
              "recommended_repository_path": "replace_with_one_of_the_paths_from_the_instructions",
              "source_family": "replace_with_source_family",
              "provenance_url_or_note": "replace_with_source_url_or_note",
              "license_or_use_note": "replace_with_license_or_use_note",
              "created_by": "replace_with_creator_or_workflow_name",
              "created_date": "replace_with_YYYY-MM-DD",
              "scope": "limited LRGxELG six-slot reference package only",
              "six_slot_order": LABELS,
              "blocked_claims": BLOCKED_CLAIMS,
          }
          (OUT / "template_lrgxelg_reference_package_manifest.json").write_text(
              json.dumps(package_manifest_template, indent=2),
              encoding="utf-8",
          )

          # Repository placement map for the user.
          placement_rows = [
              {
                  "artifact_template": "template_lrgxelg_reference_ensemble.csv",
                  "copy_to_repository_path": RECOMMENDED_REFERENCE_ENSEMBLE_PATH,
                  "when_to_use": "Use if you have multiple generated/reference sample rows for the exact six LRGxELG labels.",
                  "minimum_valid_content": "At least two rows; more rows are better. Six numeric label columns plus provenance fields required.",
                  "next_validator_route": "v4.171 or successor validator should accept this and route to ensemble covariance builder.",
              },
              {
                  "artifact_template": "template_lrgxelg_reference_covariance.csv",
                  "copy_to_repository_path": RECOMMENDED_REFERENCE_COVARIANCE_PATH,
                  "when_to_use": "Use only if you have a documented six-by-six reference covariance matrix in the exact label order.",
                  "minimum_valid_content": "Six rows, six numeric covariance columns, symmetric matrix, positive diagonal, provenance manifest.",
                  "next_validator_route": "v4.171 or successor validator should accept this and route to covariance matrix reader.",
              },
              {
                  "artifact_template": "template_planck_chain_manifest.json",
                  "copy_to_repository_path": RECOMMENDED_CHAIN_MANIFEST_PATH,
                  "when_to_use": "Use if you have a parameter chain file already committed to the repo.",
                  "minimum_valid_content": "chain_file path, parameter_fields list, provenance URL/note, license/use note.",
                  "next_validator_route": "v4.171 or successor validator should accept this and route to chain preparation.",
              },
              {
                  "artifact_template": "template_lrgxelg_reference_package_manifest.json",
                  "copy_to_repository_path": RECOMMENDED_PACKAGE_MANIFEST_PATH,
                  "when_to_use": "Use with any of the three routes to document provenance and boundary.",
                  "minimum_valid_content": "package_type, source_family, provenance_url_or_note, license_or_use_note.",
                  "next_validator_route": "Used as supporting metadata; not sufficient by itself.",
              },
          ]

          write_csv(
              OUT / "v4_172_repository_placement_map.csv",
              placement_rows,
              [
                  "artifact_template",
                  "copy_to_repository_path",
                  "when_to_use",
                  "minimum_valid_content",
                  "next_validator_route",
              ],
          )

          route_rows = [
              {
                  "route_id": "R1",
                  "route_name": "reference ensemble manual fill",
                  "recommended": True,
                  "repository_path": RECOMMENDED_REFERENCE_ENSEMBLE_PATH,
                  "what_it_closes": "Can close reference covariance after a later covariance-builder workflow if rows are real and documented.",
                  "truth_boundary": "Template alone closes nothing; filled real data required.",
              },
              {
                  "route_id": "R2",
                  "route_name": "direct reference covariance manual fill",
                  "recommended": False,
                  "repository_path": RECOMMENDED_REFERENCE_COVARIANCE_PATH,
                  "what_it_closes": "Can close reference covariance if matrix is real, documented, symmetric, and correctly ordered.",
                  "truth_boundary": "Must not be invented or copied from observed covariance.",
              },
              {
                  "route_id": "R3",
                  "route_name": "Planck/reference chain manifest",
                  "recommended": True,
                  "repository_path": RECOMMENDED_CHAIN_MANIFEST_PATH,
                  "what_it_closes": "Can route to reference ensemble generation if a real chain file is present.",
                  "truth_boundary": "Manifest is not itself covariance.",
              },
              {
                  "route_id": "R4",
                  "route_name": "package manifest metadata",
                  "recommended": True,
                  "repository_path": RECOMMENDED_PACKAGE_MANIFEST_PATH,
                  "what_it_closes": "Improves provenance but does not close scientific data gap by itself.",
                  "truth_boundary": "Metadata is not data.",
              },
          ]

          write_csv(
              OUT / "v4_172_manual_fill_route_options.csv",
              route_rows,
              [
                  "route_id",
                  "route_name",
                  "recommended",
                  "repository_path",
                  "what_it_closes",
                  "truth_boundary",
              ],
          )

          # One-page instructions.
          instructions = []
          instructions.append("# v4.172 Manual Fill Request")
          instructions.append("")
          instructions.append("The previous validator found no valid reference package. This workflow writes the files you need to fill or replace.")
          instructions.append("")
          instructions.append("## Best path")
          instructions.append("")
          instructions.append("Use `template_lrgxelg_reference_ensemble.csv` and copy it into the repository as:")
          instructions.append("")
          instructions.append(f"`{RECOMMENDED_REFERENCE_ENSEMBLE_PATH}`")
          instructions.append("")
          instructions.append("Each row should be a real reference sample or generated six-slot reference vector. The six required labels are:")
          instructions.append("")
          for label in LABELS:
              instructions.append(f"- `{label}`")
          instructions.append("")
          instructions.append("The file must include provenance and use/license notes. Do not use guessed values.")
          instructions.append("")
          instructions.append("## Alternate direct covariance path")
          instructions.append("")
          instructions.append("Use `template_lrgxelg_reference_covariance.csv` only if you have a documented six-by-six reference covariance matrix.")
          instructions.append("Copy it into the repository as:")
          instructions.append("")
          instructions.append(f"`{RECOMMENDED_REFERENCE_COVARIANCE_PATH}`")
          instructions.append("")
          instructions.append("The row order and column order must match the exact six-label order.")
          instructions.append("")
          instructions.append("## Chain manifest path")
          instructions.append("")
          instructions.append("Use `template_planck_chain_manifest.json` if you have a real parameter chain file in the repository.")
          instructions.append("Copy it into the repository as:")
          instructions.append("")
          instructions.append(f"`{RECOMMENDED_CHAIN_MANIFEST_PATH}`")
          instructions.append("")
          instructions.append("## Boundary")
          for item in BLOCKED_CLAIMS:
              instructions.append(f"- {item}")
          instructions.append("")
          instructions.append("## Next clean route")
          instructions.append("")
          instructions.append("After a package is filled and committed, rerun the package validator or run:")
          instructions.append("")
          instructions.append("`limited_lrgxelg_reference_package_schema_recheck_with_scope_guards`")
          (OUT / "v4_172_manual_fill_instructions.md").write_text(
              "\n".join(instructions),
              encoding="utf-8",
          )

          route_decision = {
              "version": "v4.172",
              "result_label": RESULT_LABEL,
              "clean_result": "Manual-fill templates and instructions were written. No scientific package was ingested.",
              "recommended_best_path": RECOMMENDED_REFERENCE_ENSEMBLE_PATH,
              "recommended_supporting_manifest": RECOMMENDED_PACKAGE_MANIFEST_PATH,
              "selected_next_route": "limited_lrgxelg_reference_package_schema_recheck_with_scope_guards",
              "truth_boundary": "templates and manual request only",
              "blocked_claims": BLOCKED_CLAIMS,
          }

          (OUT / "v4_172_route_decision.json").write_text(
              json.dumps(route_decision, indent=2),
              encoding="utf-8",
          )

          (OUT / "v4_172_scope_guards.json").write_text(
              json.dumps(
                  {
                      "scope": "manual fill request only",
                      "writes_templates": True,
                      "ingests_reference_package": False,
                      "computes_reference_covariance": False,
                      "computes_residuals": False,
                      "computes_pressure": False,
                      "computes_likelihood": False,
                      "computes_bic": False,
                      "computes_posterior_comparison": False,
                      "validates_tairid": False,
                  },
                  indent=2,
              ),
              encoding="utf-8",
          )

          (OUT / "v4_172_blocked_claims.json").write_text(
              json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2),
              encoding="utf-8",
          )

          # A compact summary.
          summary = []
          summary.append("# TAIRID v4.172 - Reference Package Manual Fill Request")
          summary.append("")
          summary.append(f"Expected result: `{RESULT_LABEL}`")
          summary.append("")
          summary.append("## Clean result")
          summary.append("")
          summary.append("The workflow wrote copy-ready reference package templates and repository placement instructions.")
          summary.append("")
          summary.append("## Best next manual file")
          summary.append("")
          summary.append(f"`{RECOMMENDED_REFERENCE_ENSEMBLE_PATH}`")
          summary.append("")
          summary.append("## Important boundary")
          summary.append("")
          summary.append("This does not close the reference covariance gap. It only tells us exactly what real data must be added.")
          summary.append("")
          summary.append("## Next clean route")
          summary.append("")
          summary.append("`limited_lrgxelg_reference_package_schema_recheck_with_scope_guards`")
          (OUT / "v4_172_summary.md").write_text("\n".join(summary), encoding="utf-8")

          rules = {
              "version_is_v4_172": True,
              "result_label_present": RESULT_LABEL.endswith("no_ingestion_no_pressure_no_validation"),
              "six_labels_present": len(LABELS) == 6,
              "ensemble_template_written": (OUT / "template_lrgxelg_reference_ensemble.csv").exists(),
              "covariance_template_written": (OUT / "template_lrgxelg_reference_covariance.csv").exists(),
              "chain_manifest_template_written": (OUT / "template_planck_chain_manifest.json").exists(),
              "package_manifest_template_written": (OUT / "template_lrgxelg_reference_package_manifest.json").exists(),
              "placement_map_written": (OUT / "v4_172_repository_placement_map.csv").exists(),
              "route_options_written": (OUT / "v4_172_manual_fill_route_options.csv").exists(),
              "instructions_written": (OUT / "v4_172_manual_fill_instructions.md").exists(),
              "route_decision_written": (OUT / "v4_172_route_decision.json").exists(),
              "scope_guards_written": (OUT / "v4_172_scope_guards.json").exists(),
              "blocked_claims_written": (OUT / "v4_172_blocked_claims.json").exists(),
              "summary_written": (OUT / "v4_172_summary.md").exists(),
              "recommended_path_is_reference_ensemble": route_decision["recommended_best_path"] == RECOMMENDED_REFERENCE_ENSEMBLE_PATH,
              "next_route_selected": route_decision["selected_next_route"] == "limited_lrgxelg_reference_package_schema_recheck_with_scope_guards",
              "no_reference_package_ingested": True,
              "reference_covariance_not_computed": True,
              "pressure_not_computed": True,
              "validation_not_claimed": True,
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.172",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "selected_next_route": route_decision["selected_next_route"],
              "claim_boundary": "manual_templates_only_no_ingestion_no_pressure_no_validation",
          }

          (OUT / "v4_172_parser_health_report.json").write_text(
              json.dumps(health, indent=2),
              encoding="utf-8",
          )

          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.172 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_172_outputs/run_v4_172.py

      - name: Upload v4.172 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-172-limited-lrgxelg-reference-package-manual-fill-request-output
          path: tairid_v4_172_outputs/
