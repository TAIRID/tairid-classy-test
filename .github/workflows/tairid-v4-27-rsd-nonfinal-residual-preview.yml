name: TAIRID v4.27 RSD Nonfinal Residual Preview

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-27-rsd-nonfinal-residual-preview.yml"

jobs:
  tairid-v4-27-rsd-nonfinal-residual-preview:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.27 RSD nonfinal residual preview
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_27_rsd_nonfinal_residual_preview

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_27_rsd_nonfinal_residual_preview")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_27_rsd_nonfinal_residual_preview"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine RSD, weak lensing, clusters, CMB lensing, KiDS, DES, HSC, H0LiCOW, BAO, or CMB into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run an RSD likelihood.",
              "This does not compute a final RSD pressure score.",
              "This computes only a non-final diagonal residual preview for value-ready RSD rows.",
              "A pass means the non-final RSD residual preview is internally bounded, not that TAIRID cosmology is validated."
          ]

          REFERENCE_MODEL = {
              "model_id": "planck_like_flat_lcdm_growth_reference_v0",
              "model_role": "declared_reference_curve_only",
              "Omega_m0": 0.315,
              "Omega_lambda0": 0.685,
              "sigma8_0": 0.811,
              "growth_index_gamma": 0.55,
              "method": "flat_LCDM_growth_factor_integral_normalized_to_D_z0_equals_1_plus_growth_index_f_approximation",
              "limitations": [
                  "This is a declared Planck-like LCDM reference curve, not a Planck chain posterior.",
                  "This uses diagonal row uncertainty only.",
                  "This does not include covariance between RSD rows.",
                  "This does not include reference-model uncertainty.",
                  "This does not refit cosmology.",
                  "This does not run likelihood, BIC, or model comparison.",
                  "This does not compare f_sigma8 to one scalar S8 value.",
                  "This result is a non-final residual preview only."
              ]
          }

          RSD_ROWS = [
              {
                  "row_id": "boss_dr12_z038_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.38,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.497,
                  "published_sigma": 0.045,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready",
                  "enter_preview_now": True
              },
              {
                  "row_id": "boss_dr12_z051_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.51,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.458,
                  "published_sigma": 0.038,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready",
                  "enter_preview_now": True
              },
              {
                  "row_id": "boss_dr12_z061_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.61,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.436,
                  "published_sigma": 0.034,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready",
                  "enter_preview_now": True
              },
              {
                  "row_id": "wigglez_z044_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.44,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.413,
                  "published_sigma": 0.080,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready",
                  "enter_preview_now": True
              },
              {
                  "row_id": "wigglez_z060_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.60,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.390,
                  "published_sigma": 0.063,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready",
                  "enter_preview_now": True
              },
              {
                  "row_id": "wigglez_z073_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.73,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.437,
                  "published_sigma": 0.072,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready",
                  "enter_preview_now": True
              },
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "LRG",
                  "z_eff": 0.70,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "enter_preview_now": False
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "ELG",
                  "z_eff": 0.85,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "enter_preview_now": False
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "QSO",
                  "z_eff": 1.48,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "enter_preview_now": False
              }
          ]

          PREVIEW_RULES = [
              {
                  "rule_id": "value_ready_only",
                  "description": "Only rows with published value and sigma may enter the non-final preview.",
                  "failure_mode": "Pending eBOSS rows enter preview before value review."
              },
              {
                  "rule_id": "diagonal_only_labeled",
                  "description": "Residual z-preview uses published row sigma only and must label covariance/reference uncertainty missing.",
                  "failure_mode": "Diagonal preview is treated as covariance-aware pressure."
              },
              {
                  "rule_id": "reference_uncertainty_not_included_labeled",
                  "description": "Reference curve uncertainty is not included and must be labeled.",
                  "failure_mode": "Residual preview is treated as final comparison."
              },
              {
                  "rule_id": "BAO_RSD_separation_preserved",
                  "description": "BAO-bundled rows stay RSD/f_sigma8 rows only; BAO remains boundary/ruler.",
                  "failure_mode": "BAO and RSD collapse into one reach/growth signal."
              },
              {
                  "rule_id": "no_final_pressure_score",
                  "description": "The test may compute row residual previews but not a final pressure score or validation claim.",
                  "failure_mode": "Preview becomes final pressure."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "The RSD preview is covariance-aware.",
              "The RSD preview includes reference-model uncertainty.",
              "f_sigma8 and S8 are the same axis.",
              "RSD rows can be scored against one scalar Planck S8 value.",
              "BAO and RSD can be averaged into one reach/growth correction.",
              "Pending eBOSS rows entered the preview.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_28_RSD_value_review_for_eBOSS_rows",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Repair pending eBOSS f_sigma8 values and uncertainties before they can enter residual previews.",
                  "must_include": "source, tracer, redshift, value, sigma, covariance warning.",
                  "must_not_include": "unreviewed value insertion or final pressure claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_29_RSD_covariance_requirements_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Define what covariance-aware RSD comparison would require before final pressure testing.",
                  "must_include": "survey covariance, overlapping samples, BAO/RSD separation, reference uncertainty.",
                  "must_not_include": "diagonal-only final claim."
              },
              {
                  "priority": 3,
                  "next_test": "v4_30_cluster_mass_calibration_boundary_audit",
                  "role_focus": "cluster_abundance_growth",
                  "purpose": "Audit cluster abundance with mass calibration and selection boundaries.",
                  "must_include": "mass calibration, selection, source/product status, axis label.",
                  "must_not_include": "cluster proof claim."
              }
          ]

          def E_of_a(a, omega_m0, omega_lambda0):
              return math.sqrt(omega_m0 / (a ** 3) + omega_lambda0)

          def omega_m_of_a(a, omega_m0, omega_lambda0):
              e2 = omega_m0 / (a ** 3) + omega_lambda0
              return (omega_m0 / (a ** 3)) / e2

          def growth_integral(a, omega_m0, omega_lambda0, n=5000):
              a_min = 1.0e-4
              if a <= a_min:
                  return 0.0

              step = (a - a_min) / n
              total = 0.0

              for i in range(n + 1):
                  x = a_min + i * step
                  weight = 0.5 if i == 0 or i == n else 1.0
                  e = E_of_a(x, omega_m0, omega_lambda0)
                  total += weight * (1.0 / ((x ** 3) * (e ** 3)))

              return total * step

          def unnormalized_growth_D(a, omega_m0, omega_lambda0):
              e = E_of_a(a, omega_m0, omega_lambda0)
              integral = growth_integral(a, omega_m0, omega_lambda0)
              return (5.0 * omega_m0 * e / 2.0) * integral

          def normalized_growth_D(z, omega_m0, omega_lambda0):
              a = 1.0 / (1.0 + z)
              d_a = unnormalized_growth_D(a, omega_m0, omega_lambda0)
              d_1 = unnormalized_growth_D(1.0, omega_m0, omega_lambda0)
              return d_a / d_1

          def f_growth_approx(z, omega_m0, omega_lambda0, gamma):
              a = 1.0 / (1.0 + z)
              omega_m_z = omega_m_of_a(a, omega_m0, omega_lambda0)
              return omega_m_z ** gamma

          def f_sigma8_ref(z, model):
              d_z = normalized_growth_D(z, model["Omega_m0"], model["Omega_lambda0"])
              f_z = f_growth_approx(z, model["Omega_m0"], model["Omega_lambda0"], model["growth_index_gamma"])
              sigma8_z = model["sigma8_0"] * d_z
              return {
                  "D_z": d_z,
                  "f_z": f_z,
                  "sigma8_z": sigma8_z,
                  "f_sigma8_ref": f_z * sigma8_z
              }

          failed_gates = []
          warnings = []

          residual_rows = []
          blocked_rows = []

          for row in RSD_ROWS:
              ref = f_sigma8_ref(float(row["z_eff"]), REFERENCE_MODEL)

              observed_value = row["published_value"]
              observed_sigma = row["published_sigma"]
              value_ready = observed_value not in ["", None] and observed_sigma not in ["", None]

              if row["enter_preview_now"] and value_ready:
                  obs = float(observed_value)
                  sig = float(observed_sigma)
                  residual = obs - ref["f_sigma8_ref"]
                  diagonal_z_preview = residual / sig if sig > 0 else ""

                  if residual < 0:
                      direction = "negative_observed_minus_reference"
                  elif residual > 0:
                      direction = "positive_observed_minus_reference"
                  else:
                      direction = "zero"

                  residual_rows.append({
                      "row_id": row["row_id"],
                      "survey_family": row["survey_family"],
                      "tracer_or_sample": row["tracer_or_sample"],
                      "z_eff": row["z_eff"],
                      "observable_axis": row["observable_axis"],
                      "observed_f_sigma8": obs,
                      "observed_sigma": sig,
                      "reference_f_sigma8": ref["f_sigma8_ref"],
                      "D_z": ref["D_z"],
                      "f_z": ref["f_z"],
                      "sigma8_z": ref["sigma8_z"],
                      "residual_observed_minus_reference": residual,
                      "diagonal_z_preview": diagonal_z_preview,
                      "direction": direction,
                      "bao_bundled": row["bao_bundled"],
                      "preview_status": "nonfinal_diagonal_only",
                      "covariance_used": False,
                      "reference_uncertainty_included": False,
                      "final_pressure_score": False
                  })
              else:
                  blocked_rows.append({
                      "row_id": row["row_id"],
                      "survey_family": row["survey_family"],
                      "tracer_or_sample": row["tracer_or_sample"],
                      "z_eff": row["z_eff"],
                      "observable_axis": row["observable_axis"],
                      "reason_blocked": "pending_value_review_or_not_value_ready",
                      "published_value": observed_value,
                      "published_sigma": observed_sigma,
                      "enter_preview_now": row["enter_preview_now"]
                  })

          if not residual_rows:
              failed_gates.append("no_value_ready_rows_entered_preview")

          for row in residual_rows:
              if row["observable_axis"] != "f_sigma8":
                  failed_gates.append(row["row_id"] + "_axis_not_f_sigma8")
              if row["covariance_used"] is not False:
                  failed_gates.append(row["row_id"] + "_covariance_used_violation")
              if row["reference_uncertainty_included"] is not False:
                  failed_gates.append(row["row_id"] + "_reference_uncertainty_violation")
              if row["final_pressure_score"] is not False:
                  failed_gates.append(row["row_id"] + "_final_pressure_violation")

          for row in blocked_rows:
              if row["enter_preview_now"] is True:
                  failed_gates.append(row["row_id"] + "_blocked_despite_preview_true_review_needed")

          negative_count = sum(1 for row in residual_rows if row["direction"] == "negative_observed_minus_reference")
          positive_count = sum(1 for row in residual_rows if row["direction"] == "positive_observed_minus_reference")
          zero_count = sum(1 for row in residual_rows if row["direction"] == "zero")

          boss_rows = [row for row in residual_rows if row["survey_family"] == "BOSS_DR12"]
          wigglez_rows = [row for row in residual_rows if row["survey_family"] == "WiggleZ"]

          diagonal_preview_values = [float(row["diagonal_z_preview"]) for row in residual_rows if row["diagonal_z_preview"] != ""]
          mean_diagonal_z_preview = sum(diagonal_preview_values) / len(diagonal_preview_values) if diagonal_preview_values else ""
          mean_residual = sum(float(row["residual_observed_minus_reference"]) for row in residual_rows) / len(residual_rows) if residual_rows else ""

          if negative_count > positive_count:
              preview_pattern = "mostly_negative_nonfinal_residual_preview"
          elif positive_count > negative_count:
              preview_pattern = "mostly_positive_nonfinal_residual_preview"
          else:
              preview_pattern = "mixed_nonfinal_residual_preview"

          warnings.append("nonfinal_preview_uses_diagonal_row_sigma_only")
          warnings.append("covariance_not_used")
          warnings.append("reference_model_uncertainty_not_included")
          warnings.append("not_a_final_pressure_score")
          warnings.append("not_validation")
          warnings.append("pending_eBOSS_rows_remain_blocked")

          if any(row["bao_bundled"] is True for row in residual_rows):
              warnings.append("BAO_RSD_separation_required_for_BOSS_rows")

          rule_results = [
              {
                  "rule_id": "value_ready_only",
                  "pass": all(row["reason_blocked"] == "pending_value_review_or_not_value_ready" for row in blocked_rows),
                  "result": "pending_rows_blocked_and_value_ready_rows_only_entered_preview",
                  "boundary": "No unreviewed eBOSS rows enter preview."
              },
              {
                  "rule_id": "diagonal_only_labeled",
                  "pass": all(row["covariance_used"] is False for row in residual_rows),
                  "result": "diagonal_only_status_labeled",
                  "boundary": "No covariance-aware claim."
              },
              {
                  "rule_id": "reference_uncertainty_not_included_labeled",
                  "pass": all(row["reference_uncertainty_included"] is False for row in residual_rows),
                  "result": "reference_uncertainty_absent_and_labeled",
                  "boundary": "No final pressure claim."
              },
              {
                  "rule_id": "BAO_RSD_separation_preserved",
                  "pass": all(row["observable_axis"] == "f_sigma8" for row in residual_rows if row["bao_bundled"] is True),
                  "result": "BAO_bundled_rows_kept_as_RSD_growth_rows",
                  "boundary": "BAO remains boundary/ruler."
              },
              {
                  "rule_id": "no_final_pressure_score",
                  "pass": all(row["final_pressure_score"] is False for row in residual_rows),
                  "result": "final_pressure_score_blocked",
                  "boundary": "This is residual preview only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_nonfinal_preview_rules_passed")

          if failed_gates:
              readiness_label = "rsd_nonfinal_residual_preview_failed"
              next_step = "Repair value-ready filtering, covariance labels, or final-pressure guards before moving on."
          else:
              readiness_label = "rsd_nonfinal_residual_preview_passed_ready_for_RSD_value_review_or_covariance_audit"
              next_step = (
                  "Proceed to v4.28 RSD value review for pending eBOSS rows or v4.29 RSD covariance requirements audit. "
                  "Do not treat this diagonal-only preview as final pressure or validation."
              )

          system_health = {
              "value_ready_preview_row_count": len(residual_rows),
              "blocked_row_count": len(blocked_rows),
              "negative_residual_count": negative_count,
              "positive_residual_count": positive_count,
              "zero_residual_count": zero_count,
              "boss_preview_row_count": len(boss_rows),
              "wigglez_preview_row_count": len(wigglez_rows),
              "mean_residual_observed_minus_reference": mean_residual,
              "mean_diagonal_z_preview": mean_diagonal_z_preview,
              "preview_pattern": preview_pattern,
              "covariance_used": False,
              "reference_uncertainty_included": False,
              "final_pressure_score_built": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          interpretation = (
              "v4.27 computes a non-final diagonal residual preview for value-ready RSD/f_sigma8 rows. "
              "The preview compares observed f_sigma8 to the declared redshift-dependent reference curve. "
              "It is not a final pressure score because covariance and reference uncertainty are not included. "
              "Pending eBOSS rows remain blocked. "
              "The preview can show directional structure, but it cannot validate TAIRID or establish a final growth result."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "reference_model": REFERENCE_MODEL,
              "rsd_rows": RSD_ROWS,
              "residual_preview_rows": residual_rows,
              "blocked_rows": blocked_rows,
              "preview_rules": PREVIEW_RULES,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_final_pressure_score_built": False,
                  "nonfinal_residual_preview_built": True,
                  "covariance_used": False,
                  "reference_uncertainty_included": False,
                  "likelihood_run": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "rsd_nonfinal_residual_preview_rows_v4_27.csv",
              residual_rows,
              [
                  "row_id",
                  "survey_family",
                  "tracer_or_sample",
                  "z_eff",
                  "observable_axis",
                  "observed_f_sigma8",
                  "observed_sigma",
                  "reference_f_sigma8",
                  "D_z",
                  "f_z",
                  "sigma8_z",
                  "residual_observed_minus_reference",
                  "diagonal_z_preview",
                  "direction",
                  "bao_bundled",
                  "preview_status",
                  "covariance_used",
                  "reference_uncertainty_included",
                  "final_pressure_score"
              ]
          )

          write_csv(
              OUTDIR / "rsd_blocked_rows_v4_27.csv",
              blocked_rows,
              [
                  "row_id",
                  "survey_family",
                  "tracer_or_sample",
                  "z_eff",
                  "observable_axis",
                  "reason_blocked",
                  "published_value",
                  "published_sigma",
                  "enter_preview_now"
              ]
          )

          write_csv(
              OUTDIR / "preview_rule_results_v4_27.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_27.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_27.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_27.csv",
              [system_health],
              [
                  "value_ready_preview_row_count",
                  "blocked_row_count",
                  "negative_residual_count",
                  "positive_residual_count",
                  "zero_residual_count",
                  "boss_preview_row_count",
                  "wigglez_preview_row_count",
                  "mean_residual_observed_minus_reference",
                  "mean_diagonal_z_preview",
                  "preview_pattern",
                  "covariance_used",
                  "reference_uncertainty_included",
                  "final_pressure_score_built",
                  "validation_claim_allowed",
                  "rule_pass_count",
                  "rule_total_count"
              ]
          )

          json_path = OUTDIR / "tairid_v4_27_rsd_nonfinal_residual_preview.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.27 — RSD Non-Final Residual Preview")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("A non-final RSD residual preview was computed for value-ready f_sigma8 rows.")
          md.append("")
