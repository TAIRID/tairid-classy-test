name: 001 TAIRID v4.291 - SDSS RSD Baseline Value Candidate Extractor No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-291-sdss-rsd-baseline-value-candidate-extractor-no-scoring.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-baseline-value-candidate-extractor-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.291 SDSS RSD Baseline Value Candidate Extractor No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.291 SDSS RSD baseline value candidate extractor no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import html
          import math
          import re
          import urllib.parse
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.291"
          ROUTE = "sdss_rsd_baseline_value_candidate_extractor_no_scoring_after_v4_290"
          EXPECTED_RESULT = "v4_291_sdss_rsd_baseline_value_candidate_extractor_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_292_sdss_rsd_candidate_baseline_review_and_row_meaning_gate_no_scoring"

          OUT = Path("tairid_v4_291_sdss_rsd_baseline_value_candidate_extractor_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-291-sdss-rsd-baseline-value-candidate-extractor-output.zip"
          SOURCE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/"
          RELATED_PAGE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          DR16_URL = "https://www.sdss4.org/dr16/"
          MAX_BYTES = 2_000_000

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
                  self.in_a = False
                  self.current_href = ""
                  self.current_text = []

              def handle_starttag(self, tag, attrs):
                  if tag.lower() == "a":
                      attrs = dict(attrs)
                      self.in_a = True
                      self.current_href = attrs.get("href", "")
                      self.current_text = []

              def handle_data(self, data):
                  if self.in_a:
                      self.current_text.append(data)

              def handle_endtag(self, tag):
                  if tag.lower() == "a" and self.in_a:
                      text = " ".join(" ".join(self.current_text).split())
                      self.links.append({"href": self.current_href, "text": text})
                      self.in_a = False
                      self.current_href = ""
                      self.current_text = []

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=MAX_BYTES, timeout=15):
              out = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.291-baseline-value-candidate-extractor-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      out["status_code"] = getattr(resp, "status", "")
                      out["content_type"] = resp.headers.get("Content-Type", "")
                      out["content_length_header"] = resp.headers.get("Content-Length", "")
                      out["final_url"] = resp.geturl()
                      out["bytes_read"] = len(data)
                      out["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      out["fetch_ok"] = True
              except Exception as exc:
                  out["error"] = f"{type(exc).__name__}: {exc}"
              return out, data

          def strip_html_text(data):
              if not data:
                  return ""
              text = data.decode("utf-8", errors="replace")
              text = re.sub(r"<script.*?</script>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<[^>]+>", " ", text)
              return html.unescape(" ".join(text.split()))

          def extract_candidate_links(base_url, data):
              if not data:
                  return []
              parser = LinkParser()
              parser.feed(data.decode("utf-8", errors="replace"))
              rows = []
              keywords = ["bao", "rsd", "eboss", "final", "measurement", "cosmo", "cosmology", "paper", "arxiv", "doi", "table", "data", "zhao", "alam", "growth"]
              seen = set()
              for link in parser.links:
                  href = link["href"].strip()
                  if not href:
                      continue
                  url = urllib.parse.urljoin(base_url, href).split("#")[0]
                  if url in seen:
                      continue
                  seen.add(url)
                  hay = (url + " " + link["text"]).lower()
                  if any(k in hay for k in keywords):
                      rows.append({
                          "candidate_url": url,
                          "link_text": link["text"],
                          "source_page": base_url,
                          "locator_basis": "discovered_link_keyword_match",
                          "score_allowed": False,
                      })
              return rows

          def ads_to_arxiv(url):
              m = re.search(r"abs/([0-9]{4})arXiv([0-9]{4}\.[0-9]{4,5})([A-Za-z]?)/abstract", url)
              if m:
                  return "https://arxiv.org/abs/" + m.group(2) + m.group(3)
              m2 = re.search(r"arxiv\.org/abs/([0-9]{4}\.[0-9]{4,5}[A-Za-z]?)", url)
              if m2:
                  return "https://arxiv.org/abs/" + m2.group(1)
              return ""

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              try:
                  fields["z_eff"] = float(fields["z_eff_text"])
              except Exception:
                  fields["z_eff"] = ""
              return fields

          def parse_column_contract_rows(tables):
              out = []
              for table_idx, table in enumerate(tables):
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      row_type = "redshift_function_row_candidate" if "(z)" in label_norm else "final_or_consensus_row_candidate"
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for value, sigma in measurement_pairs(cell):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              out.append({
                                  "contract_id": f"column_contract_bound_{len(out)+1:02d}",
                                  "bound_id": f"bound_{len(out)+1:02d}",
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "z_eff": fields["z_eff"],
                                  "z_range_text": fields["z_range_text"],
                                  "observable": "f_sigma8",
                                  "observed_value": value,
                                  "observed_sigma": sigma,
                                  "baseline_comparator_required": True,
                                  "covariance_policy_required": True,
                                  "score_allowed": False,
                                  "contract_status": "rebuilt_for_candidate_extractor_no_scoring",
                              })
              return out

          def term_window(text, idx, width=140):
              return text[max(0, idx-width):idx+width].replace("\n", " ")[:420]

          def extract_numeric_candidates(text, source_url, link_text, max_candidates=30):
              # This intentionally over-collects numeric candidates near cosmology/growth terms,
              # then marks them as candidate-only unless strict guards are later satisfied.
              rows = []
              lower = text.lower()
              anchor_patterns = [
                  r"f\s*σ\s*8",
                  r"f\s*sigma\s*8",
                  r"fsigma8",
                  r"f\\sigma_8",
                  r"growth",
                  r"lcdm",
                  r"fiducial",
                  r"consensus",
                  r"redshift-space distortion",
                  r"rsd",
              ]
              anchors = []
              for pat in anchor_patterns:
                  for m in re.finditer(pat, lower):
                      anchors.append(m.start())
              anchors = sorted(set(anchors))
              number_pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)(?:\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?))?")
              for anchor_idx, anchor in enumerate(anchors[:80]):
                  window = term_window(text, anchor, width=250)
                  for nm in number_pattern.finditer(window):
                      val = float(nm.group(1))
                      unc = nm.group(2)
                      if val > 5.0 and not (0.0 < val < 3.0):
                          # Most f_sigma8 values are order unity. Keep broad but avoid years/large counts.
                          continue
                      if val < 0.0:
                          continue
                      rows.append({
                          "raw_candidate_id": f"raw_candidate_{len(rows)+1:03d}",
                          "source_url": source_url,
                          "link_text": link_text,
                          "anchor_index": anchor_idx,
                          "candidate_value": val,
                          "candidate_uncertainty": float(unc) if unc else "",
                          "context_window": window,
                          "raw_status": "numeric_near_reference_terms_candidate_only",
                      })
                      if len(rows) >= max_candidates:
                          return rows
              return rows

          def is_same_as_observed(candidate_value, contract_rows, tol=1e-9):
              for row in contract_rows:
                  try:
                      if abs(float(candidate_value) - float(row["observed_value"])) <= tol:
                          return True
                  except Exception:
                      pass
              return False

          def candidate_contract_match(candidate_value, context, contract):
              # A weak locator-only check; does not approve anything.
              text = str(context).lower()
              sample = str(contract["sample_or_tracer"]).lower()
              z_eff = str(contract["z_eff"]).lower()
              sample_hit = bool(sample and sample.split()[0].lower() in text)
              z_hit = bool(z_eff and z_eff in text)
              fsigma_hit = any(t in text for t in ["fσ8", "f sigma", "fsigma", "f\\sigma"])
              return sample_hit, z_hit, fsigma_hit

          inherited_v4_290_rows = [
              {"inherited_from": "v4.290", "item": "rules", "value": "52 / 52 passed", "meaning": "Baseline fill guard passed.", "carry_forward_status": "ready_for_candidate_extractor"},
              {"inherited_from": "v4.290", "item": "source_fetch_ok", "value": True, "meaning": "GitHub fetched official SDSS table page.", "carry_forward_status": "source_page_available"},
              {"inherited_from": "v4.290", "item": "related_fetch_ok", "value": True, "meaning": "GitHub fetched official SDSS overview page.", "carry_forward_status": "related_page_available"},
              {"inherited_from": "v4.290", "item": "column_contract_rows", "value": 12, "meaning": "Twelve SDSS f_sigma8 column contracts were rebuilt.", "carry_forward_status": "column_contracts_ready"},
              {"inherited_from": "v4.290", "item": "baseline_value_fill_guard_rows", "value": 8, "meaning": "Eight baseline-fill guards were written.", "carry_forward_status": "fill_guards_active"},
              {"inherited_from": "v4.290", "item": "illegal_baseline_source_rows", "value": 6, "meaning": "Six illegal baseline-source shortcuts were blocked.", "carry_forward_status": "illegal_sources_blocked"},
              {"inherited_from": "v4.290", "item": "baseline_values_filled", "value": False, "meaning": "No baseline values were filled.", "carry_forward_status": "baseline_empty"},
              {"inherited_from": "v4.290", "item": "row_meaning_confirmed", "value": False, "meaning": "Row meaning remained unconfirmed.", "carry_forward_status": "row_meaning_missing"},
              {"inherited_from": "v4.290", "item": "support_allowed", "value": False, "meaning": "Support remained blocked.", "carry_forward_status": "support_blocked"},
              {"inherited_from": "v4.290", "item": "selected_next_route", "value": "v4_291_sdss_rsd_baseline_value_candidate_extractor_no_scoring", "meaning": "Current route extracts candidate baseline values without scoring.", "carry_forward_status": "current_route"},
          ]

          source_fetch_row, source_data = fetch_url(SOURCE_URL)
          related_fetch_row, related_data = fetch_url(RELATED_PAGE_URL)
          dr16_fetch_row, dr16_data = fetch_url(DR16_URL)

          parser = SimpleTableParser()
          if source_data:
              parser.feed(source_data.decode("utf-8", errors="replace"))
          column_contract_rows = parse_column_contract_rows(parser.tables)

          discovered = []
          discovered.extend(extract_candidate_links(SOURCE_URL, source_data))
          discovered.extend(extract_candidate_links(RELATED_PAGE_URL, related_data))
          discovered.extend(extract_candidate_links(DR16_URL, dr16_data))

          static_candidates = [
              {"candidate_url": SOURCE_URL, "link_text": "SDSS final BAO and RSD measurements table", "source_page": "static", "locator_basis": "official_table_page"},
              {"candidate_url": RELATED_PAGE_URL, "link_text": "SDSS final BAO and RSD measurements overview", "source_page": "static", "locator_basis": "official_related_page"},
              {"candidate_url": DR16_URL, "link_text": "SDSS DR16 release page", "source_page": "static", "locator_basis": "official_release_context"},
          ]

          raw_candidates = static_candidates + discovered
          reference_candidate_rows = []
          seen = set()
          for row in raw_candidates:
              url = row["candidate_url"].split("#")[0]
              if url in seen:
                  continue
              seen.add(url)
              item = dict(row)
              item["candidate_id"] = f"ref_candidate_{len(reference_candidate_rows)+1:03d}"
              item["arxiv_probe_url"] = ads_to_arxiv(url)
              item["score_allowed"] = False
              reference_candidate_rows.append(item)

          # Prioritize likely relevant text pages. Avoid image-heavy links.
          prioritized = []
          for row in reference_candidate_rows:
              url = row["candidate_url"].lower()
              text = row.get("link_text", "").lower()
              score = 0
              if "sdss4.org/science/final-bao-and-rsd-measurements" in url:
                  score += 60
              if "arxiv" in url or row.get("arxiv_probe_url"):
                  score += 35
              if any(name in text for name in ["alam", "zhao", "ross", "raichoor", "lyke", "du mas", "smith", "neveux"]):
                  score += 20
              if any(term in text for term in ["rsd", "bao", "growth", "cosmology", "final"]):
                  score += 10
              if any(ext in url for ext in [".png", ".jpg", ".jpeg", ".gif", ".pdf"]):
                  score -= 30
              row = dict(row)
              row["priority_score"] = score
              prioritized.append(row)
          prioritized = sorted(prioritized, key=lambda r: r["priority_score"], reverse=True)[:24]

          reference_probe_rows = []
          raw_numeric_candidate_rows = []
          for row in prioritized:
              probe_urls = [row["candidate_url"]]
              if row.get("arxiv_probe_url"):
                  probe_urls.append(row["arxiv_probe_url"])
              for probe_url in probe_urls:
                  fetch, data = fetch_url(probe_url, max_bytes=1_000_000, timeout=12)
                  text = strip_html_text(data)
                  terms = {
                      "fsigma8": len(re.findall(r"f\s*σ\s*8|f\s*sigma\s*8|fsigma8|f\\sigma_8", text.lower())),
                      "rsd": text.lower().count("rsd") + text.lower().count("redshift-space distortion"),
                      "bao": text.lower().count("bao") + text.lower().count("baryon acoustic"),
                      "lcdm": text.lower().count("lcdm") + text.lower().count("Λcdm".lower()),
                      "growth": text.lower().count("growth"),
                      "fiducial": text.lower().count("fiducial"),
                      "covariance": text.lower().count("covariance"),
                  }
                  relevance_score = terms["fsigma8"] * 6 + terms["rsd"] * 3 + terms["bao"] * 2 + terms["lcdm"] + terms["growth"] * 2 + terms["fiducial"] + terms["covariance"]
                  reference_probe_rows.append({
                      "probe_id": f"ref_probe_{len(reference_probe_rows)+1:03d}",
                      "candidate_id": row["candidate_id"],
                      "probe_url": probe_url,
                      "link_text": row.get("link_text", ""),
                      "fetch_ok": fetch["fetch_ok"],
                      "status_code": fetch["status_code"],
                      "content_type": fetch["content_type"],
                      "bytes_read": fetch["bytes_read"],
                      "sha256_first_bytes": fetch["sha256_first_bytes"],
                      "term_count_fsigma8": terms["fsigma8"],
                      "term_count_rsd": terms["rsd"],
                      "term_count_bao": terms["bao"],
                      "term_count_lcdm": terms["lcdm"],
                      "term_count_growth": terms["growth"],
                      "term_count_fiducial": terms["fiducial"],
                      "term_count_covariance": terms["covariance"],
                      "relevance_score_no_claim": relevance_score,
                      "score_allowed": False,
                      "support_allowed": False,
                  })
                  for raw in extract_numeric_candidates(text, probe_url, row.get("link_text", ""), max_candidates=20):
                      raw["probe_id"] = reference_probe_rows[-1]["probe_id"]
                      raw_numeric_candidate_rows.append(raw)

          # Apply v4.290 fill guard. Everything remains candidate-only or rejected; no fill.
          baseline_candidate_rows = []
          rejected_candidate_rows = []
          for raw in raw_numeric_candidate_rows:
              value = raw["candidate_value"]
              illegal_reason = ""
              status = "candidate_needs_review_not_filled"
              if raw["source_url"].split("#")[0] == SOURCE_URL and is_same_as_observed(value, column_contract_rows):
                  illegal_reason = "observed_value_from_sdss_table_page"
                  status = "rejected_observed_value_not_baseline"
              elif is_same_as_observed(value, column_contract_rows):
                  illegal_reason = "matches_observed_value_requires_manual_review"
                  status = "candidate_suspicious_matches_observed_not_filled"
              # Map loosely to any row where context mentions sample/z/observable; still not approved.
              possible_matches = []
              for contract in column_contract_rows:
                  sample_hit, z_hit, fsigma_hit = candidate_contract_match(value, raw["context_window"], contract)
                  if sample_hit or z_hit or fsigma_hit:
                      possible_matches.append({
                          "bound_id": contract["bound_id"],
                          "sample_or_tracer": contract["sample_or_tracer"],
                          "z_eff": contract["z_eff"],
                          "match_note": f"sample_hit={sample_hit};z_hit={z_hit};fsigma_hit={fsigma_hit}",
                      })
              record = {
                  "candidate_id": f"baseline_candidate_{len(baseline_candidate_rows)+len(rejected_candidate_rows)+1:04d}",
                  "raw_candidate_id": raw["raw_candidate_id"],
                  "probe_id": raw["probe_id"],
                  "source_url": raw["source_url"],
                  "link_text": raw["link_text"],
                  "candidate_value": value,
                  "candidate_uncertainty": raw["candidate_uncertainty"],
                  "possible_match_count": len(possible_matches),
                  "possible_matches_preview": "|".join(f"{m['bound_id']}:{m['sample_or_tracer']}@{m['z_eff']}[{m['match_note']}]" for m in possible_matches[:4]),
                  "context_window": raw["context_window"],
                  "candidate_status": status,
                  "illegal_reason": illegal_reason,
                  "baseline_value_filled": False,
                  "baseline_source_selected": False,
                  "row_meaning_confirmed": False,
                  "definition_match_confirmed": False,
                  "covariance_policy_present": False,
                  "score_allowed": False,
                  "support_allowed": False,
              }
              if status.startswith("rejected"):
                  rejected_candidate_rows.append(record)
              else:
                  baseline_candidate_rows.append(record)

          baseline_fill_result_rows = []
          for contract in column_contract_rows:
              related_candidates = [
                  c for c in baseline_candidate_rows
                  if str(contract["bound_id"]) in c.get("possible_matches_preview", "")
              ]
              baseline_fill_result_rows.append({
                  "fill_result_id": f"fill_result_{contract['bound_id']}",
                  "bound_id": contract["bound_id"],
                  "row_label": contract["row_label"],
