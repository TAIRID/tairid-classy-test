name: 001 TAIRID v4.318 - SDSS RSD Baseline Decision Template Reissue Or Handoff No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-318-sdss-rsd-baseline-decision-template-reissue-or-handoff-no-scoring.yml"
      - ".github/workflows/**"
      - "github/workflows/**"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-baseline-decision-template-reissue-or-handoff-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.318 SDSS RSD Baseline Decision Template Reissue Or Handoff No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.318 SDSS RSD baseline decision template reissue or handoff no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv, json, zipfile

          VERSION = "v4.318"
          EXPECTED_RESULT = "v4_318_sdss_rsd_baseline_decision_template_reissue_or_handoff_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "pause_until_baseline_decision_template_is_filled_then_rerun_v4_317"

          OUT = Path("tairid_v4_318_sdss_rsd_baseline_decision_template_reissue_or_handoff_output")
          OUT.mkdir(parents=True, exist_ok=True)
          ZIP_NAME = "tairid-v4-318-sdss-rsd-baseline-decision-template-reissue-or-handoff-output.zip"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          baseline_question_rows = [
              {
                  "question_id": "baseline_q001",
                  "question": "What independent comparator model/source is allowed for the selected BAO+RSD f_sigma8 row family?",
                  "review_instruction": "Choose a source that defines the comparator model/source. Do not approve numeric values yet.",
              },
              {
                  "question_id": "baseline_q002",
                  "question": "Are comparator values source-provided, model-derived, or generated by a separate reproducible script?",
                  "review_instruction": "State whether values are directly sourced, model-derived, or require a later script.",
              },
              {
                  "question_id": "baseline_q003",
                  "question": "What cosmological parameter set is used for the comparator, if any?",
                  "review_instruction": "Identify parameter-set context only. Do not treat it as an approved baseline table.",
              },
              {
                  "question_id": "baseline_q004",
                  "question": "Is the comparator independent enough to avoid same-family circular support?",
                  "review_instruction": "Mark keep_blocked unless independence is clearly reviewable.",
              },
              {
                  "question_id": "baseline_q005",
                  "question": "What uncertainty/covariance policy is permitted before any diagonal diagnostic?",
                  "review_instruction": "Record covariance/likelihood limits. Do not permit p-values or likelihood claims.",
              },
              {
                  "question_id": "baseline_q006",
                  "question": "What null result policy applies if the standard comparator is equal or better?",
                  "review_instruction": "Preserve the null rule: equal/better standard comparator weakens or blocks support.",
              },
          ]

          template_rows = []
          for idx, q in enumerate(baseline_question_rows, start=1):
              template_rows.append({
                  "decision_id": f"baseline_decision_{idx:03d}",
                  "question_id": q["question_id"],
                  "question": q["question"],
                  "human_decision": "",
                  "allowed_decisions": "accept_source_candidate|edit_needed|reject|keep_blocked",
                  "selected_source_url_or_citation": "",
                  "quoted_or_precise_source_text": "",
                  "answer_summary": "",
                  "reviewer_note": "",
                  "claim_limit_must_remain": "no_scoring/no_claims",
                  "baseline_approval_allowed_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              })

          inherited_v4_317_rows = [
              {"inherited_from": "v4.317", "item": "rules", "value": "25 / 25 passed", "meaning": "Baseline comparator decision ingest passed safely.", "carry_forward_status": "ready_for_reissue_or_handoff"},
              {"inherited_from": "v4.317", "item": "baseline_decision_state", "value": "decision_template_missing", "meaning": "No filled baseline decision template was found.", "carry_forward_status": "missing_template"},
              {"inherited_from": "v4.317", "item": "selected_decision_path", "value": "", "meaning": "No selected decision path.", "carry_forward_status": "missing_template"},
              {"inherited_from": "v4.317", "item": "decision_rows_loaded", "value": 0, "meaning": "No baseline decisions loaded.", "carry_forward_status": "no_decisions"},
              {"inherited_from": "v4.317", "item": "accepted_source_candidate_rows", "value": 0, "meaning": "No accepted source candidates.", "carry_forward_status": "no_candidates"},
              {"inherited_from": "v4.317", "item": "baseline_values_filled", "value": False, "meaning": "No numeric baseline values.", "carry_forward_status": "not_filled"},
              {"inherited_from": "v4.317", "item": "score_valid", "value": False, "meaning": "No scoring allowed.", "carry_forward_status": "blocked"},
              {"inherited_from": "v4.317", "item": "selected_next_route", "value": "v4_318_sdss_rsd_baseline_decision_template_reissue_or_handoff_no_scoring", "meaning": "Current workflow.", "carry_forward_status": "current_route"},
          ]

          pause_marker_rows = [
              {"pause_id": "pause_001", "pause_reason": "The remaining baseline/comparator work requires a filled human decision template.", "pause_status": "recommended"},
              {"pause_id": "pause_002", "pause_reason": "v4.317 found no committed baseline decision template.", "pause_status": "open_gap"},
              {"pause_id": "pause_003", "pause_reason": "Baseline approval, definition matching, diagnostics, and support remain blocked.", "pause_status": "truth_boundary"},
              {"pause_id": "pause_004", "pause_reason": "The reissued template must be filled and committed before rerunning v4.317.", "pause_status": "operator_step_needed"},
          ]

          handoff_snapshot_rows = [
              {"snapshot_id": "snapshot_001", "item": "last_clear_workflow", "value": "v4.317", "meaning": "Decision ingest diagnosed missing baseline template."},
              {"snapshot_id": "snapshot_002", "item": "current_gap", "value": "filled_baseline_comparator_decision_template", "meaning": "The rail needs human decisions, not scoring."},
              {"snapshot_id": "snapshot_003", "item": "template_reissued", "value": True, "meaning": "v4.318 writes a fresh fillable baseline decision template."},
              {"snapshot_id": "snapshot_004", "item": "upload_filename_for_v4_317", "value": "SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_316_FILLABLE.csv", "meaning": "After filling, commit this exact filename to repo root before rerunning v4.317."},
              {"snapshot_id": "snapshot_005", "item": "external_scoring_allowed", "value": False, "meaning": "No scoring is allowed."},
              {"snapshot_id": "snapshot_006", "item": "recommended_next_route", "value": SELECTED_NEXT_ROUTE, "meaning": "Pause until template is filled, then rerun v4.317."},
          ]

          future_route_rows = [
              {"route_id": "future_001", "route": "pause", "when_to_use": "Use now if baseline human review will not be done immediately.", "allowed": True},
              {"route_id": "future_002", "route": "fill_baseline_decision_template", "when_to_use": "Use if a human is ready to review baseline/comparator source choices.", "allowed": True},
              {"route_id": "future_003", "route": "commit_exact_v4_316_fillable_template", "when_to_use": "Use after the CSV is filled.", "allowed": True},
              {"route_id": "future_004", "route": "rerun_v4_317_after_template_commit", "when_to_use": "Use only after the filled template is committed.", "allowed": True},
              {"route_id": "future_005", "route": "baseline_gate_eligibility", "when_to_use": "Use only after v4.317 finds accepted source-candidate decisions.", "allowed": False},
              {"route_id": "future_006", "route": "diagonal_diagnostic_score", "when_to_use": "Use only after baseline approval and definition-match gates pass.", "allowed": False},
          ]

          gate_rows = [
              {"gate_id": "gate_001", "gate_object": "inherited_missing_template_status_recorded", "gate_passed": True, "gate_status": "recorded", "reason": "v4.317 found baseline_decision_state = decision_template_missing."},
              {"gate_id": "gate_002", "gate_object": "reissue_template_written", "gate_passed": len(template_rows) == 6, "gate_status": "written", "reason": "Fresh fillable baseline decision template written."},
              {"gate_id": "gate_003", "gate_object": "pause_marker_written", "gate_passed": len(pause_marker_rows) == 4, "gate_status": "written", "reason": "Pause marker written."},
              {"gate_id": "gate_004", "gate_object": "handoff_snapshot_written", "gate_passed": len(handoff_snapshot_rows) == 6, "gate_status": "written", "reason": "Handoff snapshot written."},
              {"gate_id": "gate_005", "gate_object": "baseline_approval", "gate_passed": False, "gate_status": "not_approved", "reason": "v4.318 is reissue/handoff only."},
              {"gate_id": "gate_006", "gate_object": "definition_match_confirmation", "gate_passed": False, "gate_status": "not_confirmed", "reason": "Definition matches remain blocked."},
              {"gate_id": "gate_007", "gate_object": "diagonal_diagnostic_readiness", "gate_passed": False, "gate_status": "not_ready", "reason": "No scoring readiness without baseline and definition gates."},
              {"gate_id": "gate_008", "gate_object": "support_allowed", "gate_passed": False, "gate_status": "blocked", "reason": "No support language allowed."},
          ]

          blocked_rows = [
              {"blocked_id": "blocked_001", "operation": "approve_baseline_values_now", "reason": "template reissue is not approval", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "fill_numeric_baseline_values_now", "reason": "no approved source candidate decision", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "confirm_definition_match_now", "reason": "definition-match lane has not run", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "run_diagonal_diagnostic_now", "reason": "diagnostic readiness is false", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "compute_residual_or_chi_square", "reason": "no approved baseline and no definition matches", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "compute_p_value_or_likelihood", "reason": "full covariance/likelihood remains absent", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "claim_tairid_support", "reason": "support is blocked", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "claim_evidence_or_validation", "reason": "no score and no holdout", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_010", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "baseline_decision_template_reissue_or_handoff", "permission_status": "completed", "reason": "Template and pause/handoff marker written."},
              {"permission_scope": "rerun_v4_317_after_template_commit", "permission_status": "allowed_later", "reason": "Allowed only after filled template is committed."},
              {"permission_scope": "baseline_approval", "permission_status": "blocked", "reason": "No baseline approval in this workflow."},
              {"permission_scope": "definition_match_confirmation", "permission_status": "blocked", "reason": "No definition match in this workflow."},
              {"permission_scope": "diagonal_diagnostic_score", "permission_status": "blocked", "reason": "No scoring readiness."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
          ]

          sdr_rows = [
              {"sdr_id": "sdr_001", "before_state": "baseline decision template missing", "after_state": "fresh exact-name template is reissued", "reduction_type": "operator/path uncertainty reduced"},
              {"sdr_id": "sdr_002", "before_state": "missing template could look like workflow failure", "after_state": "missing template is a clear human-review gap", "reduction_type": "false failure prevented"},
              {"sdr_id": "sdr_003", "before_state": "template reissue could be confused with approval", "after_state": "template rows explicitly block approval/score/support", "reduction_type": "candidate/approval boundary preserved"},
              {"sdr_id": "sdr_004", "before_state": "next step was broad", "after_state": "fill exact CSV and rerun v4.317", "reduction_type": "next action narrowed"},
              {"sdr_id": "sdr_005", "before_state": "baseline lane could drift toward scoring", "after_state": "all scoring and support remain blocked", "reduction_type": "claim discipline preserved"},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before reissue/handoff"},
              {"gate": "inherited_v4_317_rows_equal_8", "passed": len(inherited_v4_317_rows) == 8, "detail": f"inherited_v4_317_rows = {len(inherited_v4_317_rows)}"},
              {"gate": "baseline_question_rows_equal_6", "passed": len(baseline_question_rows) == 6, "detail": f"baseline_question_rows = {len(baseline_question_rows)}"},
              {"gate": "template_rows_equal_6", "passed": len(template_rows) == 6, "detail": f"template_rows = {len(template_rows)}"},
              {"gate": "pause_marker_rows_equal_4", "passed": len(pause_marker_rows) == 4, "detail": f"pause_marker_rows = {len(pause_marker_rows)}"},
              {"gate": "handoff_snapshot_rows_equal_6", "passed": len(handoff_snapshot_rows) == 6, "detail": f"handoff_snapshot_rows = {len(handoff_snapshot_rows)}"},
              {"gate": "future_route_rows_equal_6", "passed": len(future_route_rows) == 6, "detail": f"future_route_rows = {len(future_route_rows)}"},
              {"gate": "gate_rows_equal_8", "passed": len(gate_rows) == 8, "detail": f"gate_rows = {len(gate_rows)}"},
              {"gate": "blocked_rows_equal_10", "passed": len(blocked_rows) == 10, "detail": f"blocked_rows = {len(blocked_rows)}"},
              {"gate": "permission_rows_equal_6", "passed": len(permission_rows) == 6, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "sdr_rows_equal_5", "passed": len(sdr_rows) == 5, "detail": f"sdr_rows = {len(sdr_rows)}"},
              {"gate": "all_template_rows_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in template_rows), "detail": "template no score/support"},
              {"gate": "all_template_rows_no_baseline_approval", "passed": all(r["baseline_approval_allowed_now"] is False for r in template_rows), "detail": "template no approval"},
              {"gate": "all_blocked_operations_blocked", "passed": all(r["blocked"] is True for r in blocked_rows), "detail": "all blocked"},
              {"gate": "baseline_approval_false", "passed": any(r["gate_object"] == "baseline_approval" and r["gate_passed"] is False for r in gate_rows), "detail": "baseline not approved"},
              {"gate": "definition_match_false", "passed": any(r["gate_object"] == "definition_match_confirmation" and r["gate_passed"] is False for r in gate_rows), "detail": "definition not confirmed"},
              {"gate": "diagnostic_readiness_false", "passed": any(r["gate_object"] == "diagonal_diagnostic_readiness" and r["gate_passed"] is False for r in gate_rows), "detail": "diagnostic not ready"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_support", "passed": True, "detail": "no support"},
              {"gate": "truth_boundary_no_score", "passed": True, "detail": "no score"},
              {"gate": "truth_boundary_no_p_value", "passed": True, "detail": "no p-value"},
              {"gate": "truth_boundary_no_likelihood", "passed": True, "detail": "no likelihood"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "pause_until_baseline_decision_template_is_filled_then_rerun_v4_317", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_318_sdss_rsd_baseline_decision_template_reissue_or_handoff_no_scoring_passed_no_claims", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_318_inherited_v4_317_rows.csv", inherited_v4_317_rows)
          write_csv(OUT / "v4_318_baseline_question_rows.csv", baseline_question_rows)
          write_csv(OUT / "SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_316_FILLABLE.csv", template_rows)
          write_csv(OUT / "SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_318_REISSUE_FILLABLE.csv", template_rows)
          write_csv(OUT / "v4_318_pause_marker_rows.csv", pause_marker_rows)
          write_csv(OUT / "v4_318_handoff_snapshot_rows.csv", handoff_snapshot_rows)
          write_csv(OUT / "v4_318_future_route_rows.csv", future_route_rows)
          write_csv(OUT / "v4_318_gate_decision_rows.csv", gate_rows)
          write_csv(OUT / "v4_318_blocked_operation_rows.csv", blocked_rows)
          write_csv(OUT / "v4_318_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_318_sdr_reduction_rows.csv", sdr_rows)
          write_csv(OUT / "v4_318_rule_checks.csv", checks)

          readme = [
              "# SDSS RSD Baseline Decision Template Reissue Or Handoff v4.318",
              "",
              "v4.317 passed safely and found that the filled baseline/comparator decision template is missing.",
              "",
              "This workflow reissues the exact filename that v4.317 searches for:",
              "",
              "`SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_316_FILLABLE.csv`",
              "",
              "Fill that CSV, commit it to the repo root, then rerun v4.317.",
              "",
              "Do not treat the reissued template as baseline approval. Do not score from this template.",
              "",
              "Truth boundary: no proof, no validation, no support, no scoring, no p-value, no likelihood, no baseline approval.",
          ]
          (OUT / "SDSS_RSD_BASELINE_DECISION_TEMPLATE_REISSUE_v4_318_README.md").write_text("\n".join(readme), encoding="utf-8")

          summary = {
              "version": VERSION,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_baseline_decision_state": "decision_template_missing",
              "reissue_template_rows": len(template_rows),
              "upload_filename_for_v4_317": "SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_316_FILLABLE.csv",
              "pause_marker_rows": len(pause_marker_rows),
              "handoff_snapshot_rows": len(handoff_snapshot_rows),
              "future_route_rows": len(future_route_rows),
              "baseline_values_filled": False,
              "approved_baseline_values": 0,
              "baseline_approved": False,
              "definition_match_confirmed": False,
              "diagonal_diagnostic_allowed_now": False,
              "score_valid": False,
              "support_allowed": False,
              "gate_decision_rows": len(gate_rows),
              "gate_approval_rows": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "supports_tairid": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False
              },
          }

          (OUT / "v4_318_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.318 SDSS RSD Baseline Decision Template Reissue Or Handoff No Scoring",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_baseline_decision_state = {summary['inherited_baseline_decision_state']}",
              f"reissue_template_rows = {summary['reissue_template_rows']}",
              f"upload_filename_for_v4_317 = {summary['upload_filename_for_v4_317']}",
              f"pause_marker_rows = {summary['pause_marker_rows']}",
              f"handoff_snapshot_rows = {summary['handoff_snapshot_rows']}",
              f"future_route_rows = {summary['future_route_rows']}",
              f"baseline_values_filled = {summary['baseline_values_filled']}",
              f"approved_baseline_values = {summary['approved_baseline_values']}",
              f"definition_match_confirmed = {summary['definition_match_confirmed']}",
              f"diagonal_diagnostic_allowed_now = {summary['diagonal_diagnostic_allowed_now']}",
              f"score_valid = {summary['score_valid']}",
              f"support_allowed = {summary['support_allowed']}",
              f"gate_approval_rows = {summary['gate_approval_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Clean meaning: v4.318 reissues the exact baseline/comparator decision template that v4.317 searches for. The active gap is human review, not code execution or scoring.",
              "",
              "Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no residual, no chi-square, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.",
          ]
          (OUT / "v4_318_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_baseline_decision_state = {summary['inherited_baseline_decision_state']}")
          print(f"reissue_template_rows = {summary['reissue_template_rows']}")
          print(f"upload_filename_for_v4_317 = {summary['upload_filename_for_v4_317']}")
          print(f"pause_marker_rows = {summary['pause_marker_rows']}")
          print(f"handoff_snapshot_rows = {summary['handoff_snapshot_rows']}")
          print(f"future_route_rows = {summary['future_route_rows']}")
          print(f"baseline_values_filled = {summary['baseline_values_filled']}")
          print(f"approved_baseline_values = {summary['approved_baseline_values']}")
          print(f"definition_match_confirmed = {summary['definition_match_confirmed']}")
          print(f"diagonal_diagnostic_allowed_now = {summary['diagonal_diagnostic_allowed_now']}")
          print(f"score_valid = {summary['score_valid']}")
          print(f"support_allowed = {summary['support_allowed']}")
          print(f"gate_approval_rows = {summary['gate_approval_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no residual, no chi-square, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")

          PY

      - name: Upload v4.318 SDSS RSD baseline decision template reissue or handoff output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-318-sdss-rsd-baseline-decision-template-reissue-or-handoff-output
          path: |
            tairid_v4_318_sdss_rsd_baseline_decision_template_reissue_or_handoff_output/
            tairid-v4-318-sdss-rsd-baseline-decision-template-reissue-or-handoff-output.zip
