name: 000 TAIRID v4.82.8 Strict Minimum Fixture Packet Retry

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-82-8-strict-minimum-fixture-packet-retry.yml"

jobs:
  tairid-v4-82-8-strict-minimum-fixture-packet-retry:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.82.8 strict minimum fixture packet retry
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_82_8_strict_minimum_fixture_packet_retry

          python - <<'PY'
          import csv
          import hashlib
          import json
          import math
          import re
          import struct
          import urllib.request
          import zlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_82_8_strict_minimum_fixture_packet_retry")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_82_8_strict_minimum_fixture_packet_retry"

          FULL_GRID_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip"

          FULLGRID_CONTENT_LENGTH_EXPECTED = 11805855817
          ZIP64_CENTRAL_DIRECTORY_OFFSET = 11803187830
          ZIP64_CENTRAL_DIRECTORY_SIZE = 2667889

          MAX_RANGE_READ_BYTES = 5_000_000
          MAX_MINIMUM_COMPRESSED_BYTES = 400_000
          MAX_MINIMUM_FILES_TO_TRY = 12

          SELECTED_PREFIXES = [
              "base/plikHM_TTTEEE_lowl_lowE/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing/",
              "base/plikHM_TT_lowl_lowE/",
              "base/plikHM_TT_lowl_lowE_lensing/",
              "base/plikHM_TTTEEE_lowl_lowE_BAO/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing_BAO/"
          ]

          PRIMARY_INPUTS = ["omegabh2", "omegach2", "theta", "tau", "logA", "ns"]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          SIDECAR_TARGETS = []
          for row in TARGET_REDSHIFTS:
              SIDECAR_TARGETS.append(row["sigma8z_name"])
              SIDECAR_TARGETS.append(row["fsigma8_name"])

          ALL_TARGETS = PRIMARY_INPUTS + SIDECAR_TARGETS

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This does not derive H0, Omega_m, sigma8, sigma8z, or fsigma8z.",
              "This uses exact .minimum token names from v4.82.7.1 rather than aliases or substring matching.",
              "A pass means one strict minimum fixture packet is built for a later CAMB mapping/run test, not that reference uncertainty is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_82_7_1_minimum_token_inventory_key_repair": {
                  "readiness_label": "minimum_token_inventory_key_repair_passed_exact_primary_tokens_visible_ready_for_strict_fixture_packet_retry",
                  "exact_primary_count": 6,
                  "exact_sidecar_count": 10,
                  "sigma_pairs_complete_count": 40,
                  "sigma_pairs_distinct_count": 40,
                  "values_accepted_for_CAMB": False,
                  "fixture_run_allowed_now": False,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "CAMB was used to compute fsigma8.",
              "CAMB produced cosmology outputs.",
              "A CAMB fixture was run.",
              "H0 was derived.",
              "Omega_m was derived.",
              "sigma8 was derived.",
              "fsigma8 was derived.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_83_CAMB_tiny_single_fixture_mapping_contract",
                  "purpose": "Translate the strict minimum fixture packet into the exact CAMB input names without running full reference uncertainty.",
                  "why_next": "theta and logA labels are known, but the solver mapping must be explicit before a run."
              },
              {
                  "priority": 2,
                  "route_id": "v4_84_CAMB_tiny_single_fixture_run",
                  "purpose": "Run one tiny CAMB fixture only after the input mapping contract passes.",
                  "why_next": "A solver run should use a locked packet and a locked mapping."
              },
              {
                  "priority": 3,
                  "route_id": "v4_85_reference_uncertainty_chain_sample_design",
                  "purpose": "Design the later posterior sample path after the single point fixture works.",
                  "why_next": "A point fixture is not Planck reference uncertainty."
              },
              {
                  "priority": 4,
                  "route_id": "v4_83_ELG_or_WiggleZ_parallel_backlog",
                  "purpose": "Parallel route for parked growth-family incompleteness.",
                  "why_next": "ELG and WiggleZ remain incomplete."
              }
          ]

          def is_plausible_value(name, value):
              if value is None or not math.isfinite(value):
                  return False
              if name == "omegabh2":
                  return 0.005 < value < 0.04
              if name == "omegach2":
                  return 0.05 < value < 0.30
              if name == "theta":
                  return 0.5 < value < 2.0
              if name == "tau":
                  return 0.01 < value < 0.20
              if name == "logA":
                  return 2.0 < value < 4.0
              if name == "ns":
                  return 0.8 < value < 1.2
              if name.startswith("sigma8z") or name.startswith("fsigma8z"):
                  return 0.0 < value < 2.0
              return False

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }
              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={"User-Agent": "TAIRID-v4.82.8/1.0", "Accept": "*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }
              data = b""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.82.8/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )
                  with urllib.request.urlopen(req, timeout=180) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)
                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record, data

          def classify_member(name):
              lower = name.lower()
              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".minimum"):
                  return "minimum"
              return "other"

          def parse_zip64_extra(extra_bytes, need_uncompressed, need_compressed, need_local_offset):
              result = {}
              pos = 0
              while pos + 4 <= len(extra_bytes):
                  header_id, data_size = struct.unpack_from("<HH", extra_bytes, pos)
                  data_start = pos + 4
                  data_end = data_start + data_size
                  if data_end > len(extra_bytes):
                      break

                  data = extra_bytes[data_start:data_end]
                  if header_id == 0x0001:
                      subpos = 0
                      if need_uncompressed and subpos + 8 <= len(data):
                          result["uncompressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_compressed and subpos + 8 <= len(data):
                          result["compressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_local_offset and subpos + 8 <= len(data):
                          result["local_header_offset"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8

                  pos = data_end

              return result

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0

              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break

                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)
                      compression_method = fields[4]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      extra_start = name_end
                      extra_end = extra_start + extra_len
                      comment_end = extra_end + comment_len

                      if comment_end > len(cd_bytes):
                          break

                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")
                      extra = cd_bytes[extra_start:extra_end]

                      zip64_extra = parse_zip64_extra(
                          extra,
                          need_uncompressed=uncompressed_size == 0xFFFFFFFF,
                          need_compressed=compressed_size == 0xFFFFFFFF,
                          need_local_offset=local_header_offset == 0xFFFFFFFF
                      )

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compression_method": compression_method,
                          "compressed_size": zip64_extra.get("compressed_size", compressed_size),
                          "uncompressed_size": zip64_extra.get("uncompressed_size", uncompressed_size),
                          "local_header_offset": zip64_extra.get("local_header_offset", local_header_offset),
                          "zip64_extra_used": bool(zip64_extra)
                      })

                      pos = comment_end

                  except Exception:
                      break

              return records

          def fetch_member_bytes(member_record, max_member_compressed_bytes):
              offset = int(member_record["local_header_offset"])
              compressed_size = int(member_record["compressed_size"])

              if compressed_size <= 0:
                  raise RuntimeError("compressed_size_not_positive")

              header_record, header_data = range_probe(
                  "local_header_probe",
                  FULL_GRID_URL,
                  f"bytes={offset}-{offset + 4095}",
                  4096
              )

              if not header_record["ok"] or not header_record["server_honored_range"]:
                  raise RuntimeError("local_header_range_not_available")

              if len(header_data) < 30 or header_data[:4] != b"PK\x03\x04":
                  raise RuntimeError("local_header_signature_not_found")

              fields = struct.unpack_from("<4s5H3L2H", header_data, 0)
              compression_method = fields[3]
              file_name_len = fields[9]
              extra_len = fields[10]
              data_start = offset + 30 + file_name_len + extra_len

              bytes_to_fetch = min(compressed_size, max_member_compressed_bytes)
              data_end = data_start + bytes_to_fetch - 1

              data_record, compressed_data = range_probe(
                  "member_payload_probe",
                  FULL_GRID_URL,
                  f"bytes={data_start}-{data_end}",
                  bytes_to_fetch + 1024
              )

              if not data_record["ok"] or not data_record["server_honored_range"]:
                  raise RuntimeError("member_payload_range_not_available")

              if data_record["truncated_by_guard"]:
                  raise RuntimeError("member_payload_truncated_by_guard")

              if compression_method == 0:
                  payload = compressed_data
              elif compression_method == 8:
                  payload = zlib.decompressobj(-15).decompress(compressed_data)
              else:
                  raise RuntimeError(f"unsupported_compression_method_{compression_method}")

              return payload, compression_method, data_record

          def root_from_minimum(name):
              return name[:-len(".minimum")] if name.endswith(".minimum") else name

          def parse_minimum_rows(member_name, text):
              rows = []
              root = root_from_minimum(member_name)

              for line_number, raw_line in enumerate(text.splitlines(), start=1):
                  line = raw_line.strip()
                  if not line:
                      continue

                  tokens = line.split()
                  if len(tokens) < 3:
                      continue

                  try:
                      row_index = int(tokens[0])
                      value = float(tokens[1])
                  except Exception:
                      continue

                  name_token = tokens[2]
                  label = " ".join(tokens[3:]) if len(tokens) > 3 else ""

                  rows.append({
                      "root": root,
                      "member_name": member_name,
                      "line_number": line_number,
                      "row_index": row_index,
                      "value": value,
                      "name_token": name_token,
                      "label": label,
                      "token_count": len(tokens),
                      "line_text": line[:500]
                  })

              return rows

          def build_fixture_from_member(member):
              payload, compression_method, payload_record = fetch_member_bytes(member, MAX_MINIMUM_COMPRESSED_BYTES)
              text = payload.decode("utf-8", errors="replace")
              all_rows = parse_minimum_rows(member["member_name"], text)
              by_name = {row["name_token"]: row for row in all_rows}

              value_records = []

              for target in ALL_TARGETS:
                  row = by_name.get(target)

                  if row:
                      target_type = "primary_input" if target in PRIMARY_INPUTS else "sidecar_output"

                      value_records.append({
                          "root": row["root"],
                          "minimum_member_name": member["member_name"],
                          "target_name": target,
                          "target_type": target_type,
                          "found": True,
                          "value": row["value"],
                          "line_number": row["line_number"],
                          "row_index": row["row_index"],
                          "matched_token": row["name_token"],
                          "label": row["label"],
                          "token_count": row["token_count"],
                          "exact_token_guard_passed": row["name_token"] == target,
                          "plausible_value": is_plausible_value(target, row["value"]),
                          "source_status": "strict_minimum_point_fixture_not_covariance"
                      })
                  else:
                      value_records.append({
                          "root": root_from_minimum(member["member_name"]),
                          "minimum_member_name": member["member_name"],
                          "target_name": target,
                          "target_type": "primary_input" if target in PRIMARY_INPUTS else "sidecar_output",
                          "found": False,
                          "value": "",
                          "line_number": "",
                          "row_index": "",
                          "matched_token": "",
                          "label": "",
                          "token_count": "",
                          "exact_token_guard_passed": False,
                          "plausible_value": False,
                          "source_status": "strict_minimum_target_missing"
                      })

              primary_records = [row for row in value_records if row["target_type"] == "primary_input"]
              sidecar_records = [row for row in value_records if row["target_type"] == "sidecar_output"]

              primary_ok = all(row["found"] and row["plausible_value"] and row["exact_token_guard_passed"] for row in primary_records)
              sidecar_ok = all(row["found"] and row["plausible_value"] and row["exact_token_guard_passed"] for row in sidecar_records)

              values_by_name = {row["target_name"]: row["value"] for row in value_records if row["found"]}

              pair_records = []
              pair_distinct = True

              for zrow in TARGET_REDSHIFTS:
                  sigma_name = zrow["sigma8z_name"]
                  fsigma_name = zrow["fsigma8_name"]
                  sigma_value = values_by_name.get(sigma_name)
                  fsigma_value = values_by_name.get(fsigma_name)

                  distinct = (
                      sigma_value is not None
                      and fsigma_value is not None
                      and not math.isclose(float(sigma_value), float(fsigma_value), rel_tol=0.0, abs_tol=1e-12)
                  )

                  if not distinct:
                      pair_distinct = False

                  pair_records.append({
                      "root": root_from_minimum(member["member_name"]),
                      "z_key": zrow["z_key"],
                      "z": zrow["z"],
                      "sigma8z_name": sigma_name,
                      "sigma8z_value": sigma_value if sigma_value is not None else "",
                      "fsigma8_name": fsigma_name,
                      "fsigma8_value": fsigma_value if fsigma_value is not None else "",
                      "values_distinct": distinct
                  })

              theta_row = by_name.get("theta", {})
              logA_row = by_name.get("logA", {})

              fixture_packet = {
                  "root": root_from_minimum(member["member_name"]),
                  "minimum_member_name": member["member_name"],
                  "minimum_payload_sha256_16": hashlib.sha256(payload).hexdigest()[:16],
                  "minimum_row_count": len(all_rows),
                  "primary_inputs_extracted": primary_ok,
                  "sidecar_targets_extracted": sidecar_ok,
                  "exact_token_guard_passed": all(row["found"] and row["matched_token"] == row["target_name"] for row in value_records),
                  "sigma_fsigma_pair_values_distinct": pair_distinct,
                  "fixture_values_extracted": primary_ok and sidecar_ok and pair_distinct,
                  "minimum_extraction_method": "strict_exact_token_index_value_target_name_label",
                  "theta_value": values_by_name.get("theta", ""),
                  "theta_label": theta_row.get("label", ""),
                  "logA_value": values_by_name.get("logA", ""),
                  "logA_label": logA_row.get("label", ""),
                  "theta_mapping_note": "theta label is 100theta_MC; later CAMB mapping must handle cosmomc_theta or equivalent explicitly.",
                  "logA_mapping_note": "logA label is ln(10^10 A_s); later CAMB mapping must convert to As or use supported parameter explicitly.",
                  "chain_row_required": False,
                  "chain_sample_rows_read": False,
                  "fixture_run_allowed_now": False,
                  "minimum_values_are_covariance": False,
                  "sidecar_targets_are_covariance": False,
                  "solver_cosmology_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              }

              return fixture_packet, value_records, pair_records

          failed_gates = []
          warnings = [
              "strict_minimum_fixture_packet_retry",
              "exact_primary_tokens_visible_from_v4_82_7_1",
              "no_CAMB_run",
              "no_solver_cosmology_run",
              "no_full_chain_import",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          head_record = head_probe("full_grid_head", FULL_GRID_URL)

          if not head_record["ok"]:
              failed_gates.append("full_grid_head_probe_failed")

          if head_record.get("content_length") and head_record["content_length"] != FULLGRID_CONTENT_LENGTH_EXPECTED:
              warnings.append("fullgrid_content_length_differs_from_locked_value")

          cd_start = ZIP64_CENTRAL_DIRECTORY_OFFSET
          cd_end = ZIP64_CENTRAL_DIRECTORY_OFFSET + ZIP64_CENTRAL_DIRECTORY_SIZE - 1

          cd_record, cd_data = range_probe(
              "full_grid_locked_zip64_central_directory_fetch",
              FULL_GRID_URL,
              f"bytes={cd_start}-{cd_end}",
              MAX_RANGE_READ_BYTES
          )

          if not cd_record["ok"]:
              failed_gates.append("central_directory_fetch_failed")
          if not cd_record.get("server_honored_range"):
              failed_gates.append("central_directory_range_not_honored")
          if cd_record.get("truncated_by_guard"):
              failed_gates.append("central_directory_truncated_by_guard")

          manifest_records = parse_central_directory(cd_data) if cd_data else []

          if not manifest_records:
              failed_gates.append("central_directory_manifest_records_not_parsed")

          minimum_members = [
              row for row in manifest_records
              if row["member_type"] == "minimum"
              and any(row["member_name"].startswith(prefix) for prefix in SELECTED_PREFIXES)
          ]

          minimum_members = sorted(minimum_members, key=lambda row: row["member_name"])[:MAX_MINIMUM_FILES_TO_TRY]

          if not minimum_members:
              failed_gates.append("no_selected_minimum_members_found")

          fixture_packet = {}
          minimum_value_records = []
          sigma_pair_records = []
          attempted_roots = []
          extraction_errors = []

          for member in minimum_members:
              attempted_roots.append(root_from_minimum(member["member_name"]))

              try:
                  packet, values, pairs = build_fixture_from_member(member)

                  if packet.get("fixture_values_extracted"):
                      fixture_packet = packet
                      minimum_value_records = values
                      sigma_pair_records = pairs
                      break

                  extraction_errors.append({
                      "root": packet.get("root", root_from_minimum(member["member_name"])),
                      "error": "candidate_incomplete_or_implausible"
                  })

              except Exception as exc:
                  extraction_errors.append({
                      "root": root_from_minimum(member["member_name"]),
                      "error": f"{type(exc).__name__}: {exc}"
                  })

          if not fixture_packet:
              failed_gates.append("no_complete_strict_minimum_fixture_packet")

          primary_found = sum(
              1 for row in minimum_value_records
              if row.get("target_type") == "primary_input" and row.get("found")
          )

          sidecar_found = sum(
              1 for row in minimum_value_records
              if row.get("target_type") == "sidecar_output" and row.get("found")
          )

          primary_plausible = (
              all(row.get("plausible_value") for row in minimum_value_records if row.get("target_type") == "primary_input")
              and primary_found == len(PRIMARY_INPUTS)
          )

          sidecar_plausible = (
              all(row.get("plausible_value") for row in minimum_value_records if row.get("target_type") == "sidecar_output")
              and sidecar_found == len(SIDECAR_TARGETS)
          )

          exact_token_guard = fixture_packet.get("exact_token_guard_passed") is True
          pairs_distinct = fixture_packet.get("sigma_fsigma_pair_values_distinct") is True

          if primary_found != len(PRIMARY_INPUTS):
              failed_gates.append("not_all_primary_inputs_found")

          if sidecar_found != len(SIDECAR_TARGETS):
              failed_gates.append("not_all_sidecar_targets_found")

          if not primary_plausible:
              failed_gates.append("primary_values_not_plausible")

          if not sidecar_plausible:
              failed_gates.append("sidecar_values_not_plausible")

          if not exact_token_guard:
              failed_gates.append("exact_token_guard_failed")

          if not pairs_distinct:
              failed_gates.append("sigma_fsigma_pair_values_not_distinct")

          if fixture_packet.get("chain_row_required") is not False:
              failed_gates.append("chain_row_dependency_not_removed")

          if fixture_packet.get("fixture_run_allowed_now") is not False:
              failed_gates.append("fixture_run_allowed_too_early")

          if fixture_packet.get("minimum_values_are_covariance") is not False:
              failed_gates.append("minimum_values_marked_covariance")

          if fixture_packet.get("Planck_reference_uncertainty_computed") is not False:
              failed_gates.append("reference_uncertainty_computed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()

          for phrase in [
              "planck reference uncertainty is included",
              "camb was used to compute fsigma8",
              "a camb fixture was run",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "strict_minimum_fixture_packet_retry_passed_ready_for_CAMB_tiny_single_fixture_mapping_contract"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_inventory_used",
                  "pass": True,
                  "result": "v4.82.7.1 showed exact primary and sidecar tokens",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "central_directory_available",
                  "pass": bool(manifest_records),
                  "result": f"{len(manifest_records)} manifest records parsed",
                  "boundary": "Central directory only, not fullGrid download."
              },
              {
                  "rule_id": "single_fixture_root_selected",
                  "pass": bool(fixture_packet.get("root")),
                  "result": fixture_packet.get("root", ""),
                  "boundary": "One point fixture only."
              },
              {
                  "rule_id": "primary_inputs_extracted",
                  "pass": primary_found == len(PRIMARY_INPUTS) and primary_plausible,
                  "result": f"{primary_found} primary inputs extracted",
                  "boundary": "Point fixture inputs only."
              },
              {
                  "rule_id": "sidecar_targets_extracted",
                  "pass": sidecar_found == len(SIDECAR_TARGETS) and sidecar_plausible,
                  "result": f"{sidecar_found} sidecar targets extracted",
                  "boundary": "Point fixture targets only."
              },
              {
                  "rule_id": "exact_token_guard",
                  "pass": exact_token_guard,
                  "result": "all targets matched by exact token",
                  "boundary": "No substring matching."
              },
              {
                  "rule_id": "sigma_fsigma_pairs_distinct",
                  "pass": pairs_distinct,
                  "result": f"{sum(1 for row in sigma_pair_records if row.get('values_distinct'))} pairs distinct",
                  "boundary": "Collision guard only."
              },
              {
                  "rule_id": "chain_dependency_removed",
                  "pass": fixture_packet.get("chain_row_required") is False and fixture_packet.get("chain_sample_rows_read") is False,
                  "result": "no chain sample rows read",
                  "boundary": "No full chain import."
              },
              {
                  "rule_id": "covariance_boundary_preserved",
                  "pass": fixture_packet.get("minimum_values_are_covariance") is False and fixture_packet.get("sidecar_targets_are_covariance") is False,
                  "result": "values are point fixtures only",
                  "boundary": "No reference uncertainty."
              },
              {
                  "rule_id": "fixture_run_still_blocked",
                  "pass": fixture_packet.get("fixture_run_allowed_now") is False,
                  "result": "solver run blocked until mapping contract",
                  "boundary": "No CAMB run."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 17,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Strict fixture packet only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_82_8_rules_passed")

          if failed_gates:
              readiness_label = "strict_minimum_fixture_packet_retry_failed"
              next_allowed_step = "Review artifact CSVs and repair strict minimum fixture packet before CAMB mapping."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.83 CAMB tiny single fixture mapping contract. "
                  "Do not run CAMB, compute Planck reference uncertainty, or compute final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "head_ok": head_record["ok"],
              "head_content_length": head_record.get("content_length"),
              "central_directory_bytes_read": cd_record.get("bytes_read"),
              "manifest_member_count": len(manifest_records),
              "selected_minimum_member_count": len(minimum_members),
              "attempted_root_count": len(attempted_roots),
              "selected_root": fixture_packet.get("root", ""),
              "minimum_value_record_count": len(minimum_value_records),
              "primary_found_count": primary_found,
              "sidecar_found_count": sidecar_found,
              "primary_values_plausible": primary_plausible,
              "sidecar_values_plausible": sidecar_plausible,
              "exact_token_guard_passed": exact_token_guard,
              "sigma_fsigma_pair_values_distinct": pairs_distinct,
              "chain_sample_rows_read": fixture_packet.get("chain_sample_rows_read", ""),
              "fixture_values_extracted": fixture_packet.get("fixture_values_extracted", False),
              "fixture_run_allowed_now": False,
              "solver_cosmology_run": False,
              "H0_derived": False,
              "Omega_m_derived": False,
              "sigma8_derived": False,
              "fsigma8_derived": False,
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "extraction_error_count": len(extraction_errors),
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "source_url": FULL_GRID_URL,
              "v4_locked_offsets": {
                  "content_length_expected": FULLGRID_CONTENT_LENGTH_EXPECTED,
                  "central_directory_offset": ZIP64_CENTRAL_DIRECTORY_OFFSET,
                  "central_directory_size": ZIP64_CENTRAL_DIRECTORY_SIZE
              },
              "selected_prefixes": SELECTED_PREFIXES,
              "primary_inputs": PRIMARY_INPUTS,
              "target_redshifts": TARGET_REDSHIFTS,
              "sidecar_targets": SIDECAR_TARGETS,
              "attempted_roots": attempted_roots,
              "extraction_errors": extraction_errors,
              "head_record": head_record,
              "central_directory_range_record": cd_record,
              "fixture_packet": fixture_packet,
              "minimum_value_records": minimum_value_records,
              "sigma_pair_records": sigma_pair_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "fixture_values_extracted": fixture_packet.get("fixture_values_extracted", False),
                  "fixture_run_allowed_now": False,
                  "solver_cosmology_run": False,
                  "H0_derived": False,
                  "Omega_m_derived": False,
                  "sigma8_derived": False,
                  "fsigma8_derived": False,
                  "Planck_reference_uncertainty_computed": False,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_82_8_strict_minimum_fixture_packet_retry.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "minimum_value_records_v4_82_8.csv",
              minimum_value_records,
              [
                  "root",
                  "minimum_member_name",
                  "target_name",
                  "target_type",
                  "found",
                  "value",
                  "line_number",
                  "row_index",
                  "matched_token",
                  "label",
                  "token_count",
                  "exact_token_guard_passed",
                  "plausible_value",
                  "source_status"
              ]
          )

          write_csv(
              OUTDIR / "sigma_pair_records_v4_82_8.csv",
              sigma_pair_records,
              [
                  "root",
                  "z_key",
                  "z",
                  "sigma8z_name",
                  "sigma8z_value",
                  "fsigma8_name",
                  "fsigma8_value",
                  "values_distinct"
              ]
          )

          write_csv(
              OUTDIR / "extraction_errors_v4_82_8.csv",
              extraction_errors,
              ["root", "error"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_82_8.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_82_8.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_82_8.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.82.8 — Strict Minimum Fixture Packet Retry")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This builds one strict point fixture packet from `.minimum` using exact token names confirmed in v4.82.7.1.")
          md.append("")
          md.append("It does not run CAMB, derive H0/Omega_m/sigma8/fsigma8, compute Planck reference uncertainty, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## Fixture packet")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key in [
              "root",
              "minimum_member_name",
              "primary_inputs_extracted",
              "sidecar_targets_extracted",
              "exact_token_guard_passed",
              "sigma_fsigma_pair_values_distinct",
              "chain_row_required",
              "chain_sample_rows_read",
              "fixture_run_allowed_now"
          ]:
              md.append(f"| `{key}` | `{fixture_packet.get(key, '')}` |")

          md.append("")
          md.append("## Extracted values")
          md.append("")
          md.append("| Target | Type | Value | Label |")
          md.append("|---|---|---:|---|")
          for row in minimum_value_records:
              md.append(f"| `{row['target_name']}` | `{row['target_type']}` | `{row['value']}` | `{row['label']}` |")

          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")

          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_82_8_strict_minimum_fixture_packet_retry.json",
              "tairid_v4_82_8_strict_minimum_fixture_packet_retry.md",
              "minimum_value_records_v4_82_8.csv",
              "sigma_pair_records_v4_82_8.csv",
              "extraction_errors_v4_82_8.csv",
              "blocked_claims_v4_82_8.csv",
              "next_route_options_v4_82_8.csv",
              "rule_results_v4_82_8.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_82_8_strict_minimum_fixture_packet_retry.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.82.8 strict minimum fixture packet retry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-82-8-strict-minimum-fixture-packet-retry
          path: artifacts/tairid_v4_82_8_strict_minimum_fixture_packet_retry/
