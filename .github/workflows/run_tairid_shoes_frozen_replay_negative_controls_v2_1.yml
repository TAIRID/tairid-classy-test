name: Run TAIRID SH0ES Frozen Replay Negative Controls v2.1

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-frozen-replay-negative-controls-v2-1:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_frozen_replay_negative_controls_v2_1.py
          echo "v2.1 SH0ES frozen replay negative controls found."

      - name: Run TAIRID SH0ES Frozen Replay Negative Controls v2.1
        run: |
          python run_tairid_shoes_frozen_replay_negative_controls_v2_1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-frozen-replay-negative-controls-v2-1-output
          path: |
            tairid_shoes_frozen_replay_negative_controls_v2_1_outputs/**
