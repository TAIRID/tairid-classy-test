          md.append("|---|---|---|---|")
          md.append("| `H0LiCOW` | source-specific reach diagnostic | `reach_positive_equivalent` | admitted for later checkpoint only |")
          md.append("| `KiDS-1000 / Planck` | source-specific growth diagnostic | `consolidation_negative` | admitted for later checkpoint only |")
          md.append("| `BAO` | auxiliary mixed/ruler boundary | `not_global_reach_anchor` | excluded from surface-anchor role |")
