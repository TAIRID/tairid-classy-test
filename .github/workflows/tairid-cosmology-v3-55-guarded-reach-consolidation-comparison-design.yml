              md.append(f"- {line}")
          md.append("")
          md.append("## What this workflow does")
          md.append("")
          md.append("v3.55 designs how H0LiCOW reach and KiDS growth can be compared later as separate source-specific diagnostic rows.")
          md.append("")
          md.append("It does not run the comparison, compute BIC, compute likelihood, refit, promote anchors, or validate TAIRID.")
