name: TAIRID Cosmology v3.55 Guarded Reach Consolidation Comparison Design

on:
  workflow_dispatch:

jobs:
  guarded-reach-consolidation-comparison-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v3.55 guarded reach consolidation comparison design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_55

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v3_55")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_55_guarded_reach_consolidation_comparison_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute a new pressure score.",
              "This does not compute a BIC, likelihood, posterior, or model comparison.",
              "This does not treat BAO as a global reach anchor.",
              "This does not promote H0LiCOW, KiDS, Planck, BAO, or any two-surface pattern to model-anchor status.",
              "This designs how already-reviewed source-specific diagnostic rows may enter a later comparison checkpoint.",
              "H0LiCOW remains a diagnostic non-BAO time-delay reach candidate.",
              "KiDS remains a diagnostic growth/consolidation pressure row.",
              "BAO remains auxiliary mixed/ruler diagnostic.",
              "A pass means the comparison design is clean enough for a later guarded checkpoint, not that TAIRID is validated."
          ]

          PREVIOUS_MILESTONES = {
              "v3_41_h0licow_reach": {
                  "status": "h0licow_reach_lane_eligibility_passed_coherent_negative_ddt_candidate",
                  "raw_pressure_direction": "negative_Ddt_pressure",
                  "normalized_surface_direction": "reach_positive_equivalent",
                  "pressure_row_count": 3,
                  "positive_count": 0,
                  "negative_count": 3,
                  "mean_pressure_z": -1.6268644558220158,
                  "median_pressure_z": -0.9014283075552302,
                  "interpretation": "shorter_than_Planck_reference_local_H0_high_equivalent",
                  "model_claim_allowed": False,
                  "refit_allowed": False
              },
              "v3_42_reach_lane_contrast": {
                  "status": "reach_lane_contrast_integration_passed_h0licow_candidate_bao_mixed_ready_for_growth_contrast",
                  "h0licow_candidate_ok": True,
                  "bao_global_blocked": True,
                  "parked_lanes": ["shoes_local_ladder", "tdcosmo_time_delay"],
                  "blocked_lanes": ["desi_mapped_reach"]
              },
              "v3_54_kids_growth_pressure_review": {
                  "status": "kids1000_planck_growth_pressure_row_review_passed_ready_for_guarded_comparison_design",
                  "pressure_z": -3.290445079818788,
                  "absolute_pressure_z": 3.290445079818788,
                  "pressure_direction": "negative_consolidation_growth_pressure",
                  "expected_pattern_match": True,
                  "h0licow_comparison_built": False,
                  "two_surface_comparison_built": False,
                  "model_claim_allowed": False,
                  "refit_allowed": False
              }
          }

          REQUIRED_CONTRACT_FIELDS = [
              "source",
              "observable_role",
              "pressure_surface",
              "baseline",
              "parser_status",
              "provenance_status",
              "block_condition",
              "claim_boundary"
          ]

          SURFACE_DESIGN_ROWS = [
              {
                  "surface_id": "h0licow_time_delay_reach",
                  "source": "H0LiCOW",
                  "observable_role": "time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "baseline": "Planck_2018_flat_LCDM_reference",
                  "raw_pressure_direction": "negative_Ddt_pressure",
                  "normalized_surface_direction": "reach_positive_equivalent",
                  "carried_pressure_statistic": "mean_pressure_z_from_v3_41",
                  "carried_pressure_value": -1.6268644558220158,
                  "row_count": 3,
                  "comparison_role": "source_specific_reach_diagnostic",
                  "admission_status": "admitted_for_later_design_checkpoint_only",
                  "why_admitted": "H0LiCOW has coherent shorter-than-Planck Ddt pressure, interpreted as local-H0-high-equivalent reach direction.",
                  "parser_status": "source_specific_h0licow_ddt_pressure_reviewed",
                  "provenance_status": "direct_public_h0licow_distance_chain_reviewed",
                  "block_condition": "blocked_from_model_anchor_refit_or_validation",
                  "claim_boundary": "diagnostic_reach_candidate_only_not_validation",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "new_pressure_score_built": False,
                  "comparison_run_now": False
              },
              {
                  "surface_id": "kids1000_planck_growth_consolidation",
                  "source": "KiDS_1000_plus_Planck_2018",
                  "observable_role": "weak_lensing_clustering_growth",
                  "pressure_surface": "consolidation_growth",
                  "baseline": "Planck_2018_derived_S8_reference",
                  "raw_pressure_direction": "negative_consolidation_growth_pressure",
                  "normalized_surface_direction": "consolidation_negative",
                  "carried_pressure_statistic": "pressure_z_from_v3_54_reviewed_row",
                  "carried_pressure_value": -3.290445079818788,
                  "row_count": 1,
                  "comparison_role": "source_specific_growth_diagnostic",
                  "admission_status": "admitted_for_later_design_checkpoint_only",
                  "why_admitted": "KiDS weighted S8 is lower than Planck derived S8, producing a reviewed negative consolidation/growth pressure row.",
                  "parser_status": "source_specific_kids_planck_pressure_row_reviewed",
                  "provenance_status": "kids_weighted_chain_ledger_plus_planck_release_3_margestats",
                  "block_condition": "blocked_from_model_anchor_refit_or_validation",
                  "claim_boundary": "diagnostic_growth_pressure_row_only_not_validation",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "new_pressure_score_built": False,
                  "comparison_run_now": False
              },
              {
                  "surface_id": "bao_mixed_ruler_boundary",
                  "source": "SDSS_eBOSS_BOSS_BAO",
                  "observable_role": "bao_reach_ruler_mixed",
                  "pressure_surface": "ruler_reference_and_reach_geometry_mixed",
                  "baseline": "Planck_2018_flat_LCDM_reference",
                  "raw_pressure_direction": "mixed_subfamily_pressure",
                  "normalized_surface_direction": "not_global_reach_anchor",
                  "carried_pressure_statistic": "none",
                  "carried_pressure_value": "",
                  "row_count": "",
                  "comparison_role": "auxiliary_ruler_boundary_not_surface_anchor",
                  "admission_status": "excluded_from_two_row_surface_comparison",
                  "why_admitted": "BAO is carried only as a boundary condition because prior audits found mixed/subfamily behavior.",
                  "parser_status": "bao_mixed_subfamily_status_reviewed",
                  "provenance_status": "public_bao_products_prior_audit",
                  "block_condition": "blocked_from_global_reach_anchor_role",
                  "claim_boundary": "auxiliary_boundary_only_not_model_anchor",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "new_pressure_score_built": False,
                  "comparison_run_now": False
              }
          ]

          DESIGN_RULE_ROWS = [
              {
                  "rule_id": "separate_surface_rule",
                  "rule": "Reach/geometry and consolidation/growth must remain separate diagnostic surfaces.",
                  "required": True,
                  "pass_condition": "H0LiCOW and KiDS are not collapsed into one global pressure surface.",
                  "block_if_violated": "no_comparison_checkpoint"
              },
              {
                  "rule_id": "h0licow_sign_normalization_rule",
                  "rule": "H0LiCOW raw negative Ddt pressure must be carried as reach_positive_equivalent, not as negative growth pressure.",
                  "required": True,
                  "pass_condition": "normalized_surface_direction == reach_positive_equivalent",
                  "block_if_violated": "repair_sign_logic"
              },
              {
                  "rule_id": "kids_growth_direction_rule",
                  "rule": "KiDS-vs-Planck S8 pressure must remain consolidation_negative, not reach pressure.",
                  "required": True,
                  "pass_condition": "pressure_surface == consolidation_growth and pressure_z < 0",
                  "block_if_violated": "repair_surface_assignment"
              },
              {
                  "rule_id": "bao_boundary_rule",
                  "rule": "BAO remains auxiliary mixed/ruler diagnostic and cannot be promoted into a global reach anchor.",
                  "required": True,
                  "pass_condition": "BAO comparison_role == auxiliary_ruler_boundary_not_surface_anchor",
                  "block_if_violated": "hard_stop"
              },
              {
                  "rule_id": "no_numeric_combination_rule",
                  "rule": "v3.55 may not average, combine, rank, fit, BIC-score, or likelihood-score the H0LiCOW and KiDS rows.",
                  "required": True,
                  "pass_condition": "comparison_run_now == False for all rows",
                  "block_if_violated": "hard_stop"
              },
              {
                  "rule_id": "no_validation_rule",
                  "rule": "Pattern alignment can be recorded only as design readiness, not validation.",
                  "required": True,
                  "pass_condition": "model_claim_allowed == False",
                  "block_if_violated": "hard_stop"
              }
          ]

          COMPARISON_DESIGN_ROWS = [
              {
                  "design_id": "future_two_surface_diagnostic_checkpoint",
                  "design_status": "designed_not_run",
                  "reach_input": "H0LiCOW coherent Ddt reach candidate; raw negative Ddt normalized to reach_positive_equivalent.",
                  "consolidation_input": "KiDS-1000 plus Planck reviewed S8 row; negative consolidation/growth pressure.",
                  "bao_input": "BAO mixed/ruler boundary only; excluded from global reach anchor role.",
                  "allowed_future_question": "Do source-specific diagnostic rows preserve reach-positive-equivalent and consolidation-negative separation without collapsing into one global surface?",
                  "forbidden_future_question": "Does this prove TAIRID, solve H0, validate new physics, or disprove standard cosmology?",
                  "future_checkpoint_output": "diagnostic two-surface ledger only",
                  "blocked_outputs": "BIC; likelihood; posterior; refit; model selection; validation claim",
                  "comparison_run_now": False,
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "claim_boundary": "comparison_design_only_not_validation"
              },
              {
                  "design_id": "unequal_row_count_guard",
                  "design_status": "designed_not_run",
                  "reach_input": "H0LiCOW currently carries 3 Ddt rows summarized by mean/median.",
                  "consolidation_input": "KiDS currently carries 1 source-specific S8 row.",
                  "bao_input": "BAO excluded from global reach aggregation.",
                  "allowed_future_question": "Can a checkpoint preserve row-count and family boundaries without pretending the rows are statistically equivalent?",
                  "forbidden_future_question": "Can we directly average H0LiCOW and KiDS pressure z values?",
                  "future_checkpoint_output": "family-aware diagnostic ledger",
                  "blocked_outputs": "naive averaging; fake BIC; equal-weight cross-surface fit",
                  "comparison_run_now": False,
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "claim_boundary": "row_count_guard_only_not_model_anchor"
              },
              {
                  "design_id": "uncertainty_upgrade_guard",
                  "design_status": "designed_not_run",
                  "reach_input": "H0LiCOW source-specific Ddt pressure reviewed.",
                  "consolidation_input": "KiDS uses q16/q84 half-width and Planck diagonal propagated S8 uncertainty.",
                  "bao_input": "BAO remains auxiliary.",
                  "allowed_future_question": "Can the checkpoint explicitly preserve uncertainty limitations?",
                  "forbidden_future_question": "Can we call this full covariance or full likelihood evidence?",
                  "future_checkpoint_output": "uncertainty-limited diagnostic ledger",
                  "blocked_outputs": "full-covariance claim; full-likelihood claim",
                  "comparison_run_now": False,
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "claim_boundary": "uncertainty_limit_design_only_not_validation"
              }
          ]

          BLOCKER_ROWS = [
              {
                  "blocker_id": "no_refit_allowed_yet",
                  "blocker": "The source-specific rows are not a full likelihood model.",
                  "why_it_matters": "A refit would overstate the evidence and collapse diagnostic rows into model evidence.",
                  "required_fix": "Only a later full-likelihood/covariance framework could justify fitting."
              },
              {
                  "blocker_id": "bao_not_global_reach_anchor",
                  "blocker": "BAO remains mixed/subfamily and cannot be used as the main reach-positive anchor.",
                  "why_it_matters": "Using BAO incorrectly would recreate the one-surface error.",
                  "required_fix": "Keep BAO as auxiliary mixed/ruler boundary."
              },
              {
                  "blocker_id": "growth_family_robustness_not_complete",
                  "blocker": "Only KiDS has been upgraded to source-specific growth pressure in this lane.",
                  "why_it_matters": "DES and HSC still need parser/product repair before stronger growth-family claims.",
                  "required_fix": "Later DES/HSC source-specific product repair."
              },
              {
                  "blocker_id": "planck_uncertainty_not_full_covariance",
                  "blocker": "Planck S8 uncertainty is diagonal propagated from marginals.",
                  "why_it_matters": "The KiDS row is useful but not a final covariance-quality result.",
                  "required_fix": "Later Planck covariance or chain upgrade."
              },
              {
                  "blocker_id": "comparison_design_not_comparison_execution",
                  "blocker": "v3.55 designs the checkpoint but does not execute it.",
                  "why_it_matters": "Running the comparison now would skip the design gate.",
                  "required_fix": "Use v3.56 for a guarded checkpoint only if v3.55 passes."
              }
          ]

          CLAIM_BOUNDARY_ROWS = [
              {
                  "claim_id": "allowed_design_claim",
                  "status": "allowed",
                  "wording": "The project now has one reviewed source-specific reach diagnostic and one reviewed source-specific consolidation diagnostic ready for a guarded comparison design.",
                  "boundary": "This is design readiness only."
              },
              {
                  "claim_id": "allowed_pattern_description",
                  "status": "allowed_with_boundary",
                  "wording": "H0LiCOW carries reach-positive-equivalent pressure while KiDS carries negative consolidation pressure.",
                  "boundary": "This describes current diagnostic rows; it is not model validation."
              },
              {
                  "claim_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID is proven.",
                  "boundary": "Hard block."
              },
              {
                  "claim_id": "forbidden_h0_solution_claim",
                  "status": "forbidden",
                  "wording": "The H0 tension is solved.",
                  "boundary": "Hard block."
              },
              {
                  "claim_id": "forbidden_standard_cosmology_disproof",
                  "status": "forbidden",
                  "wording": "Standard cosmology is disproven.",
                  "boundary": "Hard block."
              },
              {
                  "claim_id": "forbidden_two_surface_confirmation",
                  "status": "forbidden",
                  "wording": "The two-surface model is confirmed.",
                  "boundary": "Hard block."
              }
          ]

          NEXT_TEST_QUEUE = [
              {
                  "priority": 1,
                  "next_test": "v3_56_guarded_reach_consolidation_comparison_checkpoint",
                  "purpose": "Build a guarded diagnostic checkpoint ledger comparing H0LiCOW reach-positive-equivalent status and KiDS consolidation-negative status without refit, likelihood, BIC, or validation claim.",
                  "must_include": "H0LiCOW sign-normalized reach candidate, KiDS negative consolidation row, BAO auxiliary boundary, row-count guard, uncertainty limits, no model-anchor promotion.",
                  "must_not_include": "two-surface refit, BIC, likelihood, model validation, BAO global reach anchor, H0 solution claim.",
                  "readiness_if_passes": "A later handoff or broader robustness plan may be considered."
              },
              {
                  "priority": 2,
                  "next_test": "later_des_hsc_growth_product_repair",
                  "purpose": "Upgrade DES and HSC into source-specific growth ledgers or preserve them as blocked.",
                  "must_include": "direct product URLs, parser/provenance status, family boundary, block conditions.",
                  "must_not_include": "summary-anchor substitution.",
                  "readiness_if_passes": "Growth-family robustness can be revisited."
              },
              {
                  "priority": 3,
                  "next_test": "later_planck_covariance_or_chain_upgrade",
                  "purpose": "Improve Planck S8 uncertainty beyond diagonal marginal propagation.",
                  "must_include": "Planck covariance or chain provenance and sigma8-Omega_m covariance handling.",
                  "must_not_include": "retroactive overclaiming of v3.53 or v3.54.",
                  "readiness_if_passes": "Planck baseline uncertainty may be upgraded."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          created_at = now_iso()

          write_csv(
              OUTDIR / "surface_comparison_admission_design_v3_55.csv",
              SURFACE_DESIGN_ROWS,
              [
                  "surface_id", "source", "observable_role", "pressure_surface",
                  "baseline", "raw_pressure_direction", "normalized_surface_direction",
                  "carried_pressure_statistic", "carried_pressure_value", "row_count",
                  "comparison_role", "admission_status", "why_admitted",
                  "parser_status", "provenance_status", "block_condition",
                  "claim_boundary", "model_anchor_allowed_now", "refit_allowed_now",
                  "new_pressure_score_built", "comparison_run_now"
              ]
          )

          write_csv(
              OUTDIR / "guarded_comparison_design_rules_v3_55.csv",
              DESIGN_RULE_ROWS,
              ["rule_id", "rule", "required", "pass_condition", "block_if_violated"]
          )

          write_csv(
              OUTDIR / "future_comparison_design_v3_55.csv",
              COMPARISON_DESIGN_ROWS,
              [
                  "design_id", "design_status", "reach_input", "consolidation_input",
                  "bao_input", "allowed_future_question", "forbidden_future_question",
                  "future_checkpoint_output", "blocked_outputs", "comparison_run_now",
                  "model_anchor_allowed_now", "refit_allowed_now", "claim_boundary"
              ]
          )

          write_csv(
              OUTDIR / "comparison_design_blockers_v3_55.csv",
              BLOCKER_ROWS,
              ["blocker_id", "blocker", "why_it_matters", "required_fix"]
          )

          write_csv(
              OUTDIR / "comparison_design_claim_boundaries_v3_55.csv",
              CLAIM_BOUNDARY_ROWS,
              ["claim_id", "status", "wording", "boundary"]
          )

          write_csv(
              OUTDIR / "next_test_queue_v3_55.csv",
              NEXT_TEST_QUEUE,
              [
                  "priority", "next_test", "purpose", "must_include",
                  "must_not_include", "readiness_if_passes"
              ]
          )

          required_contract_present = True
          missing_contract_rows = []
          for idx, row in enumerate(SURFACE_DESIGN_ROWS):
              for field in REQUIRED_CONTRACT_FIELDS:
                  if field not in row or row.get(field) in ["", None]:
                      required_contract_present = False
                      missing_contract_rows.append(f"surface_design:{idx}:{field}")

          h0licow_ok = any(
              row["surface_id"] == "h0licow_time_delay_reach"
              and row["normalized_surface_direction"] == "reach_positive_equivalent"
              and row["comparison_role"] == "source_specific_reach_diagnostic"
              and row["model_anchor_allowed_now"] is False
              for row in SURFACE_DESIGN_ROWS
          )

          kids_ok = any(
              row["surface_id"] == "kids1000_planck_growth_consolidation"
              and row["normalized_surface_direction"] == "consolidation_negative"
              and row["comparison_role"] == "source_specific_growth_diagnostic"
              and float(row["carried_pressure_value"]) < 0
              and row["model_anchor_allowed_now"] is False
              for row in SURFACE_DESIGN_ROWS
          )

          bao_boundary_ok = any(
              row["surface_id"] == "bao_mixed_ruler_boundary"
              and row["comparison_role"] == "auxiliary_ruler_boundary_not_surface_anchor"
              and row["normalized_surface_direction"] == "not_global_reach_anchor"
              for row in SURFACE_DESIGN_ROWS
          )

          comparison_not_run = all(row["comparison_run_now"] is False for row in SURFACE_DESIGN_ROWS + COMPARISON_DESIGN_ROWS)
          no_new_scores = all(row["new_pressure_score_built"] is False for row in SURFACE_DESIGN_ROWS)
          no_model_anchors = all(row["model_anchor_allowed_now"] is False for row in SURFACE_DESIGN_ROWS + COMPARISON_DESIGN_ROWS)
          no_refits = all(row["refit_allowed_now"] is False for row in SURFACE_DESIGN_ROWS + COMPARISON_DESIGN_ROWS)

          forbidden_claims_blocked = all(
              row["status"] == "forbidden"
              for row in CLAIM_BOUNDARY_ROWS
              if row["claim_id"].startswith("forbidden")
          )

          blockers_recorded = len(BLOCKER_ROWS) >= 5

          design_ready = (
              h0licow_ok
              and kids_ok
              and bao_boundary_ok
              and comparison_not_run
              and no_new_scores
              and no_model_anchors
              and no_refits
          )

          next_test_ok = (
              NEXT_TEST_QUEUE[0]["next_test"] == "v3_56_guarded_reach_consolidation_comparison_checkpoint"
              and "two-surface refit" in NEXT_TEST_QUEUE[0]["must_not_include"]
              and "BIC" in NEXT_TEST_QUEUE[0]["must_not_include"]
              and "model validation" in NEXT_TEST_QUEUE[0]["must_not_include"]
              and "BAO global reach anchor" in NEXT_TEST_QUEUE[0]["must_not_include"]
          )

          audit_rows = [
              {
                  "audit_gate": "h0licow_reach_candidate_carried_correctly",
                  "pass": h0licow_ok,
                  "value": h0licow_ok,
                  "boundary": "H0LiCOW must stay diagnostic reach-positive-equivalent, not validation."
              },
              {
                  "audit_gate": "kids_consolidation_row_carried_correctly",
                  "pass": kids_ok,
                  "value": kids_ok,
                  "boundary": "KiDS must stay diagnostic consolidation-negative, not reach pressure."
              },
              {
                  "audit_gate": "bao_boundary_preserved",
                  "pass": bao_boundary_ok,
                  "value": bao_boundary_ok,
                  "boundary": "BAO remains auxiliary/mixed and cannot become global reach anchor."
              },
              {
                  "audit_gate": "comparison_designed_not_run",
                  "pass": comparison_not_run,
                  "value": comparison_not_run,
                  "boundary": "v3.55 designs the comparison but does not execute it."
              },
              {
                  "audit_gate": "no_new_pressure_scores",
                  "pass": no_new_scores,
                  "value": no_new_scores,
                  "boundary": "No new pressure score may be computed."
              },
              {
                  "audit_gate": "no_model_anchors_promoted",
                  "pass": no_model_anchors,
                  "value": no_model_anchors,
                  "boundary": "No lane may be promoted to model anchor."
              },
              {
                  "audit_gate": "no_refit_allowed",
                  "pass": no_refits,
                  "value": no_refits,
                  "boundary": "No refit is allowed."
              },
              {
                  "audit_gate": "forbidden_claims_blocked",
                  "pass": forbidden_claims_blocked,
                  "value": forbidden_claims_blocked,
                  "boundary": "Validation, H0 solution, standard-cosmology-disproof, and confirmation claims remain blocked."
              },
              {
                  "audit_gate": "blockers_recorded",
                  "pass": blockers_recorded,
                  "value": len(BLOCKER_ROWS),
                  "boundary": "Known blockers must be explicit before checkpoint."
              },
              {
                  "audit_gate": "required_contract_fields_present",
                  "pass": required_contract_present,
                  "value": ";".join(missing_contract_rows),
                  "boundary": "source/role/surface/baseline/parser/provenance/block/claim contract must persist."
              },
              {
                  "audit_gate": "next_step_is_guarded_checkpoint_not_refit",
                  "pass": next_test_ok,
                  "value": NEXT_TEST_QUEUE[0]["next_test"],
                  "boundary": "Next step may be a diagnostic checkpoint, not a refit or validation claim."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No model claim is allowed."
              }
          ]

          write_csv(
              OUTDIR / "guarded_comparison_design_audit_v3_55.csv",
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          hard_failed = []

          if not h0licow_ok:
              hard_failed.append("h0licow_reach_candidate_not_carried_correctly")
          if not kids_ok:
              hard_failed.append("kids_consolidation_row_not_carried_correctly")
          if not bao_boundary_ok:
              hard_failed.append("bao_boundary_not_preserved")
          if not comparison_not_run:
              hard_failed.append("comparison_run_guard_violation")
          if not no_new_scores:
              hard_failed.append("new_pressure_score_guard_violation")
          if not no_model_anchors:
              hard_failed.append("model_anchor_promotion_violation")
          if not no_refits:
