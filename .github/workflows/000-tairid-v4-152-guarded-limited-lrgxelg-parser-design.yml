name: 000 TAIRID v4.152 Guarded Limited LRGxELG Parser Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-152-guarded-limited-lrgxelg-parser-design.yml"

jobs:
  tairid-v4-152-guarded-limited-lrgxelg-parser-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.152 guarded limited LRGxELG parser design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_152_guarded_limited_lrgxelg_parser_design

          python - <<'PY'
          import csv
          import hashlib
          import json
          import math
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_152_guarded_limited_lrgxelg_parser_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_152_guarded_limited_lrgxelg_parser_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not ingest covariance as a scientific input.",
              "This does not recompute eBOSS pressure.",
              "This designs a guarded parser specification for the limited LRGxELG two-redshift BAO/RSD product only.",
              "A pass means parser-spec status is recorded; it does not mean the parser output can be used for final interpretation."
          ]

          UPSTREAM_LOCKS = {
              "v4_151_raw_candidate_variable_order_review": {
                  "readiness_label": "raw_candidate_variable_order_review_passed_inline_order_and_covariance_consistency_recorded_ready_for_limited_parser_design_or_repair",
                  "rule_pass_count": 21,
                  "rule_total_count": 21,
                  "fetch_ok_count": 3,
                  "value_order_count": 6,
                  "value_rows_have_inline_labels": True,
                  "order_matches_expected": True,
                  "z_values": "0.7,0.845",
                  "fsigma8_record_count": 2,
                  "bao_record_count": 4,
                  "covariance_dimension": 6,
                  "covariance_dimension_matches_value_order": True,
                  "covariance_symmetric_hint": True,
                  "covariance_positive_definite_hint": True,
                  "diagonal_matches_sigma": True,
                  "readme_context_present": True,
                  "parser_design_readiness": True,
                  "selected_next_route": "limited_lrgxelg_parser_design_guarded",
                  "raw_candidate_ingested": False,
                  "source_data_ingested": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "likelihood_or_bic_run": False,
                  "reference_vector_still_missing": True,
                  "reference_covariance_still_missing": True,
                  "same_program_eBOSS_covariance_still_limited": True,
                  "full_eBOSS_family_covariance_available": False,
                  "QSO_covariance_available": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_150_raw_candidate_followup_metadata_locator": {
                  "readiness_label": "raw_candidate_followup_metadata_locator_passed_metadata_status_recorded_ready_for_variable_order_or_alternate_file_route",
                  "raw_fetch_ok_count": 2,
                  "repo_fetch_ok_count": 2,
                  "covariance_square_pd_candidate": True,
                  "data_file_non_numeric": True,
                  "repo_metadata_or_listing_available": True,
                  "selected_next_route": "raw_candidate_variable_order_review",
                  "raw_candidate_ingested": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          RAW_FILES = [
              {
                  "source_id": "lrgxelg_value_file",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK.dat",
                  "role": "inline_labeled_value_sigma_vector",
                  "source_family": "icosmology_eBOSS_DR16_LRGxELG"
              },
              {
                  "source_id": "lrgxelg_covariance_file",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK_cov.dat",
                  "role": "six_by_six_covariance_candidate",
                  "source_family": "icosmology_eBOSS_DR16_LRGxELG"
              },
              {
                  "source_id": "lrgxelg_readme",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/README.md",
                  "role": "repository_provenance_context",
                  "source_family": "icosmology_eBOSS_DR16_LRGxELG"
              }
          ]

          EXPECTED_ORDER_PATTERN = [
              {"order_index": 1, "observable": "DM_ov_rd", "z_expected": 0.70, "parameter_label": "DM_ov_rd_z0p70"},
              {"order_index": 2, "observable": "DH_ov_rd", "z_expected": 0.70, "parameter_label": "DH_ov_rd_z0p70"},
              {"order_index": 3, "observable": "fsigma8", "z_expected": 0.70, "parameter_label": "fsigma8_z0p70"},
              {"order_index": 4, "observable": "DM_ov_rd", "z_expected": 0.845, "parameter_label": "DM_ov_rd_z0p845"},
              {"order_index": 5, "observable": "DH_ov_rd", "z_expected": 0.845, "parameter_label": "DH_ov_rd_z0p845"},
              {"order_index": 6, "observable": "fsigma8", "z_expected": 0.845, "parameter_label": "fsigma8_z0p845"}
          ]

          SCOPE_GUARDS = [
              {"guard_id": "limited_LRGxELG_only", "allowed": True, "blocked_use": "full_eBOSS_family_covariance", "guard_text": "This parser design is limited to the LRGxELG two-redshift product."},
              {"guard_id": "not_QSO_covariance", "allowed": False, "blocked_use": "QSO_covariance_or_QSO_pressure", "guard_text": "No QSO covariance is provided by this raw candidate pair."},
              {"guard_id": "not_final_pressure_input", "allowed": False, "blocked_use": "final_RSD_pressure", "guard_text": "The parser design may not feed a final pressure score."},
              {"guard_id": "not_model_comparison", "allowed": False, "blocked_use": "BIC_likelihood_posterior_comparison", "guard_text": "No model comparison is allowed here."},
              {"guard_id": "requires_reference_vector_later", "allowed": False, "blocked_use": "reference_complete_growth_test", "guard_text": "Reference vector and reference covariance remain missing."},
              {"guard_id": "requires_provenance_lock_later", "allowed": False, "blocked_use": "source_clean_ingestion", "guard_text": "Repository/source provenance still needs a source-lock step before scientific use."}
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample rows were parsed.",
              "CAMB produced the final reference vector.",
              "The LRGxELG raw covariance has been ingested as final.",
              "The LRGxELG parser is the same as full eBOSS LRG/ELG/QSO covariance.",
              "The LRGxELG parser resolves QSO covariance.",
              "The eBOSS family points are independent by default.",
              "The eBOSS sign pattern is a final physical conclusion.",
              "Pressure magnitude can be interpreted before reference covariance is source-locked.",
              "BIC, likelihood, or posterior comparison has been run.",
              "Public-facing validation claims are allowed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_153_limited_lrgxelg_parser_dry_run_with_scope_guards",
                  "purpose": "Run a guarded dry-run parser that writes normalized value and covariance artifacts without computing pressure.",
                  "why_next": "Parser design can be exercised, but only inside the limited LRGxELG scope."
              },
              {
                  "priority": 2,
                  "route_id": "v4_153_lrgxelg_provenance_source_lock",
                  "purpose": "Tie the raw files to source papers/repository provenance before any scientific ingestion.",
                  "why_next": "The parser may be structurally ready, but provenance still needs locking."
              },
              {
                  "priority": 3,
                  "route_id": "v4_153_manifest_rows_materializer",
                  "purpose": "Materialize manifest rows for source/value/covariance artifacts.",
                  "why_next": "The wider source package is still missing."
              },
              {
                  "priority": 4,
                  "route_id": "v4_153_reference_vector_generation_or_request",
                  "purpose": "Create or request a source-backed 12-redshift reference vector table.",
                  "why_next": "Reference vector/covariance remains a hard blocker."
              }
          ]

          failed_gates = []
          warnings = [
              "parser_design_only",
              "limited_LRGxELG_scope_only",
              "not_QSO_not_full_eBOSS_family",
              "covariance_not_ingested",
              "pressure_not_recomputed",
              "reference_vector_still_missing",
              "reference_covariance_still_missing",
              "not_validation"
          ]

          def fetch_text(source):
              record = {
                  "source_id": source["source_id"],
                  "url": source["url"],
                  "role": source["role"],
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "sha256_16": "",
                  "error": "",
                  "claim_boundary": "fetch_status_only_not_ingestion"
              }
              text = ""
              try:
                  req = urllib.request.Request(
                      source["url"],
                      headers={
                          "User-Agent": "TAIRID-v4.152-guarded-parser-design/1.0",
                          "Accept": "text/plain,*/*"
                      }
                  )
                  with urllib.request.urlopen(req, timeout=45) as response:
                      raw = response.read(2_000_000)
                      text = raw.decode("utf-8", errors="replace")
                      record["fetch_ok"] = True
                      record["status_code"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      record["bytes_read"] = len(raw)
                      record["sha256_16"] = hashlib.sha256(raw).hexdigest()[:16]
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, text

          def parse_numeric_values(text):
              rows = []
              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if not line:
                      continue
                  if "#" in line:
                      numeric_part, comment = line.split("#", 1)
                  else:
                      numeric_part, comment = line, ""
                  parts = numeric_part.replace(",", " ").split()
                  values = []
                  ok = True
                  for part in parts:
                      try:
                          values.append(float(part))
                      except Exception:
                          ok = False
                          break
                  if ok and values:
                      rows.append((values, comment.strip(), raw_line.strip()))
              return rows

          def normalize_observable(comment):
              lower = comment.lower().replace("\\", "")
              if "dm" in lower and "rd" in lower:
                  return "DM_ov_rd"
              if "dh" in lower and "rd" in lower:
                  return "DH_ov_rd"
              if "sigma" in lower or "σ" in lower or "fsig" in lower:
                  return "fsigma8"
              return "unknown"

          def cholesky_positive_definite(matrix):
              n = len(matrix)
              if n == 0:
                  return False, ""
              L = [[0.0] * n for _ in range(n)]
              min_pivot = None
              try:
                  for i in range(n):
                      for j in range(i + 1):
                          s = sum(L[i][k] * L[j][k] for k in range(j))
                          if i == j:
                              pivot = matrix[i][i] - s
                              if min_pivot is None or pivot < min_pivot:
                                  min_pivot = pivot
                              if pivot <= 0:
                                  return False, pivot
                              L[i][j] = math.sqrt(pivot)
                          else:
                              L[i][j] = (matrix[i][j] - s) / L[j][j]
                  return True, min_pivot if min_pivot is not None else ""
              except Exception:
                  return False, min_pivot if min_pivot is not None else ""

          def parse_value_file(text):
              out = []
              parsed = parse_numeric_values(text)
              for idx, (values, comment, raw_line) in enumerate(parsed, start=1):
                  expected = EXPECTED_ORDER_PATTERN[idx - 1] if idx <= len(EXPECTED_ORDER_PATTERN) else {}
                  z_value = values[0] if len(values) > 0 else ""
                  measurement = values[1] if len(values) > 1 else ""
                  sigma = values[2] if len(values) > 2 else ""
                  observable = normalize_observable(comment)
                  out.append({
                      "order_index": idx,
                      "parameter_label": expected.get("parameter_label", f"unknown_{idx}"),
                      "z_value": z_value,
                      "observable": observable,
                      "measurement": measurement,
                      "sigma": sigma,
                      "expected_observable": expected.get("observable", ""),
                      "expected_z": expected.get("z_expected", ""),
                      "order_match": observable == expected.get("observable", "") and isinstance(z_value, float) and abs(z_value - expected.get("z_expected", -999)) < 0.002,
                      "raw_line_preview": raw_line[:220],
                      "claim_boundary": "parser_design_value_record_not_scientific_ingestion"
                  })
              return out

          def parse_covariance_file(text):
              matrix = [values for values, comment, raw_line in parse_numeric_values(text)]
              n_rows = len(matrix)
              width_set = sorted(set(len(row) for row in matrix))
              uniform = len(width_set) == 1 and n_rows > 0
              n_cols = width_set[0] if uniform else 0
              square = uniform and n_rows == n_cols and n_rows > 1
              symmetric = False
              max_asym = ""
              positive_diag = False
              pd = False
              min_pivot = ""
              if square:
                  max_asym_value = 0.0
                  for i in range(n_rows):
                      for j in range(n_cols):
                          max_asym_value = max(max_asym_value, abs(matrix[i][j] - matrix[j][i]))
                  max_asym = max_asym_value
                  symmetric = max_asym_value < 1e-10
                  positive_diag = all(matrix[i][i] > 0 for i in range(n_rows))
                  pd, min_pivot = cholesky_positive_definite(matrix)
              return matrix, {
                  "numeric_row_count": n_rows,
                  "column_count_set": ",".join(str(c) for c in width_set) if width_set else "none",
                  "square_matrix_hint": square,
                  "matrix_dimension": n_rows if square else 0,
                  "symmetric_hint": symmetric,
                  "max_abs_asymmetry": max_asym,
                  "positive_diagonal": positive_diag,
                  "positive_definite_hint": pd,
                  "min_cholesky_pivot": min_pivot,
                  "claim_boundary": "parser_design_covariance_structure_not_ingestion"
              }

          def build_covariance_long_records(matrix, value_records):
              label_lookup = {row["order_index"]: row["parameter_label"] for row in value_records}
              records = []
              for i, row in enumerate(matrix, start=1):
                  for j, value in enumerate(row, start=1):
                      records.append({
                          "row_index": i,
                          "column_index": j,
                          "row_parameter_label": label_lookup.get(i, f"unknown_{i}"),
                          "column_parameter_label": label_lookup.get(j, f"unknown_{j}"),
                          "covariance_value": value,
                          "claim_boundary": "covariance_design_record_not_ingested"
                      })
              return records

          fetch_records = []
          text_by_source = {}
          for source in RAW_FILES:
              rec, text = fetch_text(source)
              fetch_records.append(rec)
              text_by_source[source["source_id"]] = text

          value_records = parse_value_file(text_by_source.get("lrgxelg_value_file", ""))
          covariance_matrix, covariance_structure = parse_covariance_file(text_by_source.get("lrgxelg_covariance_file", ""))
          covariance_long_records = build_covariance_long_records(covariance_matrix, value_records)
          readme_text = text_by_source.get("lrgxelg_readme", "")
          readme_lower = readme_text.lower()
          readme_context_record = {
              "readme_nonempty": bool(readme_text.strip()),
              "mentions_bao": "bao" in readme_lower,
              "mentions_rsd": "rsd" in readme_lower,
              "mentions_zhao": "zhao" in readme_lower,
              "mentions_arxiv_2007_09011": "2007.09011" in readme_lower,
              "claim_boundary": "readme_context_not_final_provenance_lock"
          }

          order_matches = len(value_records) == 6 and all(row["order_match"] for row in value_records)
          covariance_dimension_matches = covariance_structure["square_matrix_hint"] and covariance_structure["matrix_dimension"] == len(value_records)
          diagonal_consistency_records = []
          for row in value_records:
              idx = int(row["order_index"]) - 1
              sigma = row["sigma"]
              cov_diag = covariance_matrix[idx][idx] if idx < len(covariance_matrix) and idx < len(covariance_matrix[idx]) else ""
              sigma_squared = sigma * sigma if isinstance(sigma, float) else ""
              rel_delta = abs(cov_diag - sigma_squared) / max(abs(cov_diag), 1e-30) if isinstance(cov_diag, float) and isinstance(sigma_squared, float) else ""
              diagonal_consistency_records.append({
                  "order_index": row["order_index"],
                  "parameter_label": row["parameter_label"],
                  "sigma": sigma,
                  "sigma_squared": sigma_squared,
                  "covariance_diagonal": cov_diag,
                  "relative_delta": rel_delta,
                  "matches_within_tolerance": isinstance(rel_delta, float) and rel_delta < 1e-8,
                  "claim_boundary": "diagonal_consistency_design_check_only"
              })
          diagonal_matches_sigma = len(diagonal_consistency_records) == len(value_records) and all(row["matches_within_tolerance"] for row in diagonal_consistency_records)
          readme_context_present = readme_context_record["mentions_bao"] and readme_context_record["mentions_rsd"] and readme_context_record["mentions_arxiv_2007_09011"]

          fsigma8_records = [row for row in value_records if row["observable"] == "fsigma8"]
          bao_records = [row for row in value_records if row["observable"] in ["DM_ov_rd", "DH_ov_rd"]]

          parser_spec_ready = (
              order_matches
              and covariance_dimension_matches
              and covariance_structure["symmetric_hint"]
              and covariance_structure["positive_definite_hint"]
              and diagonal_matches_sigma
              and readme_context_present
          )

          parser_spec = {
              "parser_id": "limited_lrgxelg_bao_rsd_vector_covariance_parser_spec_v4_152",
              "allowed_scope": "LRGxELG two-redshift BAO/RSD vector at z=0.70 and z=0.845 only",
              "forbidden_scope": [
                  "QSO covariance",
                  "full eBOSS family covariance",
                  "final RSD pressure",
                  "model comparison",
                  "TAIRID validation"
              ],
              "value_file_url": RAW_FILES[0]["url"],
              "covariance_file_url": RAW_FILES[1]["url"],
              "readme_url": RAW_FILES[2]["url"],
              "parameter_order": EXPECTED_ORDER_PATTERN,
              "parser_spec_ready": parser_spec_ready,
              "claim_boundary": "parser_spec_only_not_ingestion"
          }

          if parser_spec_ready:
              selected_next_route = "limited_lrgxelg_parser_dry_run_with_scope_guards"
              next_allowed_step = (
                  "Proceed to v4.153 limited LRGxELG parser dry run with scope guards. "
                  "The dry run may write normalized parser artifacts, but must not compute final pressure, BIC, likelihood, posterior comparison, or validation."
              )
          else:
              selected_next_route = "parser_design_repair_or_provenance_lock"
              next_allowed_step = (
                  "Proceed to parser design repair or provenance/source-lock review before any dry run. "
                  "Do not ingest covariance, recompute pressure, or make validation claims."
              )

          raw_candidate_ingested = False
          covariance_ingested = False
          source_data_ingested = False
          pressure_recomputed = False
          likelihood_or_bic_run = False
          final_pressure_ready = False

          upstream = UPSTREAM_LOCKS["v4_151_raw_candidate_variable_order_review"]

          if upstream["selected_next_route"] != "limited_lrgxelg_parser_design_guarded":
              failed_gates.append("upstream_route_not_limited_parser_design")
          if len(fetch_records) != 3:
              failed_gates.append("fetch_record_count_mismatch")
          if len(SCOPE_GUARDS) < 6:
              failed_gates.append("scope_guards_incomplete")
          if len(value_records) not in [0, 6]:
              failed_gates.append("unexpected_value_record_count")
          if covariance_structure["square_matrix_hint"] and len(covariance_long_records) != covariance_structure["matrix_dimension"] ** 2:
              failed_gates.append("covariance_long_record_count_mismatch")
          if raw_candidate_ingested:
              failed_gates.append("raw_candidate_unexpectedly_ingested")
          if covariance_ingested:
              failed_gates.append("covariance_unexpectedly_ingested")
          if source_data_ingested:
              failed_gates.append("source_data_unexpectedly_ingested")
          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")
          if likelihood_or_bic_run:
              failed_gates.append("likelihood_or_bic_unexpectedly_run")
          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "tairid cosmology is validated",
              "standard cosmology is disproven",
              "final rsd pressure score",
              "lrgxelg raw covariance has been ingested as final",
              "lrgxelg parser is the same as full eboss lrg/elg/qso covariance",
              "lrgxelg parser resolves qso covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "guarded_limited_lrgxelg_parser_design_passed_parser_spec_status_recorded_ready_for_limited_parser_dry_run_or_repair"

          rule_results = [
              {"rule_id": "workflow_name_sorts_top", "pass": True, "result": "workflow name begins with 000 TAIRID", "boundary": "Navigation convenience only."},
              {"rule_id": "node24_opt_in_preserved", "pass": True, "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved", "boundary": "Warning cleanup only."},
              {"rule_id": "upstream_v4_151_carried", "pass": upstream["selected_next_route"] == "limited_lrgxelg_parser_design_guarded", "result": "v4.151 selected limited parser design", "boundary": "Carry-forward only."},
              {"rule_id": "fetch_status_recorded", "pass": len(fetch_records) == 3, "result": f"fetch_ok_count={sum(1 for row in fetch_records if row['fetch_ok'])}", "boundary": "Fetch status only."},
              {"rule_id": "value_order_status_recorded", "pass": True, "result": f"value_record_count={len(value_records)}; order_matches={order_matches}", "boundary": "Design records only."},
              {"rule_id": "fsigma8_and_bao_rows_counted", "pass": True, "result": f"fsigma8={len(fsigma8_records)}; bao={len(bao_records)}", "boundary": "No pressure calculation."},
              {"rule_id": "covariance_structure_status_recorded", "pass": True, "result": f"square={covariance_structure['square_matrix_hint']}; dimension={covariance_structure['matrix_dimension']}; pd={covariance_structure['positive_definite_hint']}", "boundary": "Structure only."},
              {"rule_id": "covariance_long_records_status_recorded", "pass": True, "result": f"covariance_long_records={len(covariance_long_records)}", "boundary": "Design output only, not ingestion."},
              {"rule_id": "diagonal_consistency_status_recorded", "pass": True, "result": f"diagonal_matches_sigma={diagonal_matches_sigma}", "boundary": "Consistency check only."},
              {"rule_id": "readme_context_status_recorded", "pass": True, "result": f"readme_context_present={readme_context_present}", "boundary": "Context only, not final provenance."},
              {"rule_id": "scope_guards_declared", "pass": len(SCOPE_GUARDS) >= 6, "result": f"scope_guard_count={len(SCOPE_GUARDS)}", "boundary": "Prevents overuse."},
              {"rule_id": "parser_spec_built", "pass": True, "result": f"parser_spec_ready={parser_spec_ready}; selected_next_route={selected_next_route}", "boundary": "Parser spec only, not scientific ingestion."},
              {"rule_id": "not_full_eBOSS_family_declared", "pass": any(row["guard_id"] == "limited_LRGxELG_only" for row in SCOPE_GUARDS), "result": "limited LRGxELG only", "boundary": "Not QSO or full family covariance."},
              {"rule_id": "raw_candidates_not_ingested", "pass": raw_candidate_ingested is False, "result": "raw candidates not ingested", "boundary": "No covariance ingestion."},
              {"rule_id": "covariance_not_ingested", "pass": covariance_ingested is False, "result": "covariance not ingested", "boundary": "No eBOSS covariance use."},
              {"rule_id": "source_data_not_ingested", "pass": source_data_ingested is False, "result": "source data not ingested", "boundary": "No source value extraction."},
              {"rule_id": "pressure_not_recomputed", "pass": pressure_recomputed is False, "result": "pressure not recomputed", "boundary": "No final score."},
              {"rule_id": "likelihood_bic_not_run", "pass": likelihood_or_bic_run is False, "result": "no likelihood, BIC, or posterior comparison run", "boundary": "No model comparison."},
              {"rule_id": "final_pressure_and_validation_blocked", "pass": final_pressure_ready is False, "result": "final pressure and validation remain blocked", "boundary": "No validation claim."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 15, "result": f"blocked_claims={len(BLOCKED_CLAIMS)}", "boundary": "No validation or final pressure claim."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "", "result": route_decision, "boundary": "Route decision does not validate the model."}
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_152_rules_passed")

          if failed_gates:
