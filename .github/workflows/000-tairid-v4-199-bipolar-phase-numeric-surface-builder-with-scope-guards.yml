name: 000 TAIRID v4.199 - Bipolar Phase Numeric Surface Builder With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-199-bipolar-phase-numeric-surface-builder-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-199-bipolar-phase-numeric-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.199 bipolar phase numeric surface builder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_199_outputs
          cat > tairid_v4_199_outputs/run_v4_199.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          OUT = Path("tairid_v4_199_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "bipolar_phase_numeric_surface_builder_passed_phase_targets_and_templates_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves bipolar phase cycling",
              "no claim that bipolar phase cycling proves cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "phase target rows are not empirical subject data",
              "manual phase rows are not external replication",
              "TAIRID not proved"
          ]

          V4_198_STATUS = {
              "version": "v4.198",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "manual_delta_rows": 3,
              "rows_matching_locked_plus_plus_minus": 3,
              "candidate_input_rows": 3,
              "package_status": "manual_numeric_delta_table_written_no_empirical_validation",
              "selected_next_route": "rerun_v4_197_with_manual_delta_input_or_replace_with_real_numeric_deltas_then_rerun"
          }

          # Phase rows preserve bipolar as motion through states, not one static neurotype dot.
          PHASE_TARGETS = [
              {
                  "phase_id": "depression_compressed_rhythm_basin",
                  "phase_label": "depression",
                  "expected_shape_signature": "--+",
                  "propagation_axis": "beta_swing / activity reach / propagation availability",
                  "expected_propagation_direction": "-",
                  "pacing_axis": "s_A_swing / update rhythm / phase access",
                  "expected_pacing_direction": "-",
                  "consolidation_axis": "boundary compression / locked consolidation-heavy basin",
                  "expected_consolidation_direction": "+",
                  "viability_axis": "V_swing / functional viability",
                  "expected_viability_direction": "-",
                  "current_anchor": "reduced beta_swing, reduced s_A_swing, reduced V_swing, positive boundary-compression score",
                  "evidence_level": "direct_computed_depression_side_lane",
                  "truth_boundary": "+ consolidation means compressed or locked consolidation-heavy basin, not healthy consolidation"
              },
              {
                  "phase_id": "mania_hypomania_propagation_expansion",
                  "phase_label": "mania_hypomania",
                  "expected_shape_signature": "++-",
                  "propagation_axis": "activity expansion / goal-directed reach / P_eff or beta rise",
                  "expected_propagation_direction": "+",
                  "pacing_axis": "phase speed / sleep-rhythm disruption / update tempo",
                  "expected_pacing_direction": "+",
                  "consolidation_axis": "sleep/rest consolidation / stable output",
                  "expected_consolidation_direction": "-",
                  "viability_axis": "regulated viability under high propagation",
                  "expected_viability_direction": "-",
                  "current_anchor": "propagation-heavy activity expansion with rest/sleep consolidation reduced or destabilized",
                  "evidence_level": "published_support_lane_raw_reanalysis_pending",
                  "truth_boundary": "provisional support lane until raw phase data are reanalyzed"
              },
              {
                  "phase_id": "euthymia_reference_rhythm",
                  "phase_label": "euthymia",
                  "expected_shape_signature": "00+",
                  "propagation_axis": "subject-specific reference propagation rhythm",
                  "expected_propagation_direction": "0",
                  "pacing_axis": "subject-specific reference pacing rhythm",
                  "expected_pacing_direction": "0",
                  "consolidation_axis": "stable reference consolidation",
                  "expected_consolidation_direction": "+",
                  "viability_axis": "baseline viability / regulation surface",
                  "expected_viability_direction": "+",
                  "current_anchor": "euthymia is the subject-specific rhythm surface against which other phases are measured",
                  "evidence_level": "reference_state_lane",
                  "truth_boundary": "reference surface, not pathology row"
              },
              {
                  "phase_id": "mixed_transition_boundary_overlap",
                  "phase_label": "mixed_transition",
                  "expected_shape_signature": "MMMM",
                  "propagation_axis": "phase-overlap propagation",
                  "expected_propagation_direction": "M",
                  "pacing_axis": "contradictory or unstable phase timing",
                  "expected_pacing_direction": "M",
                  "consolidation_axis": "unstable consolidation under mixed phase overlap",
                  "expected_consolidation_direction": "M",
                  "viability_axis": "mixed viability / off-axis load",
                  "expected_viability_direction": "M",
                  "current_anchor": "mixed/transition states should not be forced into mania or depression",
                  "evidence_level": "boundary_overlap_lane",
                  "truth_boundary": "not classified into a three-sign cosmology signature"
              }
          ]

          INPUT_COLUMNS = [
              "phase_label",
              "subject_id",
              "group_or_condition",
              "boundary_or_task",
              "propagation_value",
              "reference_propagation_value",
              "pacing_value",
              "reference_pacing_value",
              "consolidation_value",
              "reference_consolidation_value",
              "viability_value",
              "reference_viability_value",
              "source_or_dataset",
              "notes"
          ]

          TEMPLATE_ROWS = [
              {
                  "phase_label": "depression",
                  "subject_id": "replace_with_subject_or_group_id",
                  "group_or_condition": "depressed_bipolar_or_reference",
                  "boundary_or_task": "phase-cycling rhythm surface",
                  "propagation_value": "beta_swing or activity/reach metric",
                  "reference_propagation_value": "euthymic/control reference beta_swing or activity metric",
                  "pacing_value": "s_A_swing or update/rhythm metric",
                  "reference_pacing_value": "euthymic/control reference s_A_swing or rhythm metric",
                  "consolidation_value": "boundary compression or locked consolidation metric",
                  "reference_consolidation_value": "reference boundary compression metric",
                  "viability_value": "V_swing or function/viability metric",
                  "reference_viability_value": "reference V_swing or function/viability metric",
                  "source_or_dataset": "bipolar depression-side output table",
                  "notes": "Expected depression surface: --+ with viability low."
              },
              {
                  "phase_label": "mania_hypomania",
                  "subject_id": "replace_with_subject_or_group_id",
                  "group_or_condition": "mania_hypomania_or_reference",
                  "boundary_or_task": "phase-cycling rhythm surface",
                  "propagation_value": "activity expansion / beta / goal-directed reach metric",
                  "reference_propagation_value": "euthymic/control reference metric",
                  "pacing_value": "phase speed / sleep-rhythm disruption / update tempo metric",
                  "reference_pacing_value": "euthymic/control reference metric",
                  "consolidation_value": "sleep/rest consolidation or stable-output metric",
                  "reference_consolidation_value": "reference sleep/rest consolidation metric",
                  "viability_value": "regulated viability under high propagation",
                  "reference_viability_value": "reference viability metric",
                  "source_or_dataset": "bipolar mania/hypomania phase table",
                  "notes": "Expected mania/hypomania surface: ++- with viability low or unstable."
              },
              {
                  "phase_label": "euthymia",
                  "subject_id": "replace_with_subject_or_group_id",
                  "group_or_condition": "euthymic_reference",
                  "boundary_or_task": "reference rhythm surface",
                  "propagation_value": "reference propagation rhythm",
                  "reference_propagation_value": "same subject/control reference",
                  "pacing_value": "reference pacing rhythm",
                  "reference_pacing_value": "same subject/control reference",
                  "consolidation_value": "reference consolidation/stability",
                  "reference_consolidation_value": "same subject/control reference",
                  "viability_value": "baseline viability",
                  "reference_viability_value": "same subject/control reference",
                  "source_or_dataset": "bipolar euthymia reference table",
                  "notes": "Euthymia is a reference surface, not a pathology row."
              },
              {
                  "phase_label": "mixed_transition",
                  "subject_id": "replace_with_subject_or_group_id",
                  "group_or_condition": "mixed_transition_or_reference",
                  "boundary_or_task": "phase-overlap transition surface",
                  "propagation_value": "mixed propagation metric",
                  "reference_propagation_value": "reference propagation metric",
                  "pacing_value": "mixed timing/rhythm metric",
                  "reference_pacing_value": "reference timing metric",
                  "consolidation_value": "mixed consolidation/stability metric",
                  "reference_consolidation_value": "reference consolidation metric",
                  "viability_value": "mixed viability/load metric",
                  "reference_viability_value": "reference viability metric",
                  "source_or_dataset": "mixed/transition phase table",
                  "notes": "Mixed states may be contradictory; do not force them into a three-sign row."
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def try_float(v):
              try:
                  if v is None or str(v).strip() == "":
                      return None
                  return float(v)
              except Exception:
                  return None

          def sign_delta(value, reference):
              v = try_float(value)
              r = try_float(reference)
              if v is None or r is None:
                  return ""
              d = v - r
              if d > 0:
                  return "+"
              if d < 0:
                  return "-"
              return "0"

          def read_optional_inputs():
              paths = [
                  Path("data/neurotype/bipolar_phase_numeric_surface_input.csv"),
                  Path("data/cross_domain/bipolar_phase_numeric_surface_input.csv"),
                  Path("data/neurotype/bipolar_numeric_phase_input.csv"),
                  Path("data/cross_domain/bipolar_numeric_phase_input.csv")
              ]
              rows = []
              inventory = []
              for path in paths:
                  count = 0
                  if path.exists():
                      with open(path, newline="", encoding="utf-8") as f:
                          for row in csv.DictReader(f):
                              row["_source_file"] = str(path)
                              rows.append(row)
                              count += 1
                  inventory.append({"path": str(path), "exists": path.exists(), "rows_loaded": count})
              return rows, inventory

          input_rows, inventory_rows = read_optional_inputs()

          normalized_rows = []
          for row in input_rows:
              phase = str(row.get("phase_label", "")).strip()
              p = sign_delta(row.get("propagation_value"), row.get("reference_propagation_value"))
              t = sign_delta(row.get("pacing_value"), row.get("reference_pacing_value"))
              c = sign_delta(row.get("consolidation_value"), row.get("reference_consolidation_value"))
              v = sign_delta(row.get("viability_value"), row.get("reference_viability_value"))
              sig3 = p + t + c if p and t and c else ""
              sig4 = p + t + c + v if p and t and c and v else ""
              expected = next((target for target in PHASE_TARGETS if target["phase_label"] == phase), None)
              normalized_rows.append({
                  "source_file": row.get("_source_file", ""),
                  "phase_label": phase,
                  "subject_id": row.get("subject_id", ""),
                  "group_or_condition": row.get("group_or_condition", ""),
                  "boundary_or_task": row.get("boundary_or_task", ""),
                  "propagation_delta_sign": p,
                  "pacing_delta_sign": t,
                  "consolidation_delta_sign": c,
                  "viability_delta_sign": v,
                  "resolved_three_axis_signature": sig3,
                  "resolved_four_axis_signature": sig4,
                  "expected_three_axis_signature": expected["expected_shape_signature"] if expected else "",
                  "matches_expected_three_axis": (sig3 == expected["expected_shape_signature"]) if expected and "M" not in expected["expected_shape_signature"] else "",
                  "source_or_dataset": row.get("source_or_dataset", ""),
                  "notes": row.get("notes", "")
              })

          phase_summary = {}
          for row in normalized_rows:
              phase = row["phase_label"]
              phase_summary.setdefault(phase, {
                  "phase_label": phase,
                  "rows": 0,
                  "complete_three_axis_rows": 0,
                  "matches_expected_three_axis": 0,
                  "mismatches": 0
              })
              phase_summary[phase]["rows"] += 1
              if row["resolved_three_axis_signature"]:
                  phase_summary[phase]["complete_three_axis_rows"] += 1
                  if row["matches_expected_three_axis"] is True:
                      phase_summary[phase]["matches_expected_three_axis"] += 1
                  elif row["matches_expected_three_axis"] is False:
                      phase_summary[phase]["mismatches"] += 1

          if normalized_rows:
              package_status = "bipolar_phase_numeric_rows_loaded_and_classified"
              selected_next_route = "bipolar_phase_numeric_surface_review_with_scope_guards"
          else:
              package_status = "bipolar_phase_numeric_input_missing_templates_written"
              selected_next_route = "bipolar_manual_phase_surface_table_or_real_phase_data_upload_with_scope_guards"

          claim_rows = [
              {
                  "claim": "Bipolar has one shape.",
                  "status": "blocked",
                  "safe_wording": "Bipolar is modeled as movement through phase surfaces.",
                  "forbidden_wording": "Bipolar equals one static signature."
              },
              {
                  "claim": "Depression + consolidation is healthy consolidation.",
                  "status": "blocked",
                  "safe_wording": "The depression-side + consolidation sign means compressed/locked consolidation-heavy basin.",
                  "forbidden_wording": "Depression is simply strong healthy consolidation."
              },
              {
                  "claim": "Mixed states can be forced into mania or depression.",
                  "status": "blocked",
                  "safe_wording": "Mixed/transition states may be contradictory/off-axis and need their own row.",
                  "forbidden_wording": "Mixed state equals mania or depression."
              },
              {
                  "claim": "Phase rows can be numerically classified if data are supplied.",
                  "status": "allowed_as_preview",
                  "safe_wording": "Numeric phase deltas can classify phase surfaces in this harness.",
                  "forbidden_wording": "Numeric phase deltas validate TAIRID."
              }
          ]

          write_csv(OUT / "v4_199_v4_198_status_review.csv", [V4_198_STATUS], list(V4_198_STATUS.keys()))
          (OUT / "v4_199_v4_198_status_review.json").write_text(json.dumps(V4_198_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_199_bipolar_phase_targets.csv", PHASE_TARGETS, [
              "phase_id", "phase_label", "expected_shape_signature",
              "propagation_axis", "expected_propagation_direction",
              "pacing_axis", "expected_pacing_direction",
              "consolidation_axis", "expected_consolidation_direction",
              "viability_axis", "expected_viability_direction",
              "current_anchor", "evidence_level", "truth_boundary"
          ])
          write_csv(OUT / "candidate_data_neurotype_bipolar_phase_numeric_surface_input.csv", TEMPLATE_ROWS, INPUT_COLUMNS)
          write_csv(OUT / "v4_199_bipolar_phase_input_inventory.csv", inventory_rows, ["path", "exists", "rows_loaded"])
          write_csv(OUT / "v4_199_normalized_bipolar_phase_rows.csv", normalized_rows, [
              "source_file", "phase_label", "subject_id", "group_or_condition", "boundary_or_task",
              "propagation_delta_sign", "pacing_delta_sign", "consolidation_delta_sign", "viability_delta_sign",
              "resolved_three_axis_signature", "resolved_four_axis_signature",
              "expected_three_axis_signature", "matches_expected_three_axis",
              "source_or_dataset", "notes"
          ])
          write_csv(OUT / "v4_199_bipolar_phase_summary.csv", list(phase_summary.values()), [
              "phase_label", "rows", "complete_three_axis_rows", "matches_expected_three_axis", "mismatches"
          ])
          write_csv(OUT / "v4_199_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          route_decision = {
              "version": "v4.199",
              "result_label": RESULT_LABEL,
              "clean_result": "Bipolar was converted into phase-specific numeric-surface targets with templates. Numeric input rows are classified if present; otherwise the template is written.",
              "phase_target_rows": len(PHASE_TARGETS),
              "input_rows_loaded": len(input_rows),
              "normalized_phase_rows": len(normalized_rows),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "phase target/template only unless real numeric phase rows are supplied",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_199_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_199_scope_guards.json").write_text(json.dumps({
              "scope": "bipolar phase-specific numeric surface builder",
              "phase_targets_are_subject_data": False,
              "phase_targets_are_external_replication": False,
              "one_static_bipolar_shape_claimed": False,
              "mixed_states_forced_into_mania_or_depression": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_199_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.199 - Bipolar Phase Numeric Surface Builder",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.198 closed the ADHD/autism/schizotypy manual-delta structure. v4.199 moves to bipolar, but treats bipolar correctly as phase movement rather than one static row.",
              "",
              "Phase target rows: `" + str(len(PHASE_TARGETS)) + "`",
              "Input rows loaded: `" + str(len(input_rows)) + "`",
              "Normalized phase rows: `" + str(len(normalized_rows)) + "`",
              "",
              "Package status: `" + package_status + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_199_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_199_v4_198_status_review.csv",
              "v4_199_v4_198_status_review.json",
              "v4_199_bipolar_phase_targets.csv",
              "candidate_data_neurotype_bipolar_phase_numeric_surface_input.csv",
              "v4_199_bipolar_phase_input_inventory.csv",
              "v4_199_normalized_bipolar_phase_rows.csv",
              "v4_199_bipolar_phase_summary.csv",
              "v4_199_claim_boundary_matrix.csv",
              "v4_199_route_decision.json",
              "v4_199_scope_guards.json",
              "v4_199_blocked_claims.json",
              "v4_199_summary.md"
          ]

          rules = {
              "version_is_v4_199": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_198_status_reviewed": V4_198_STATUS["rule_pass_count"] == 10,
              "phase_targets_present": len(PHASE_TARGETS) == 4,
              "template_written": (OUT / "candidate_data_neurotype_bipolar_phase_numeric_surface_input.csv").exists(),
              "route_selected": bool(selected_next_route),
              "no_one_static_bipolar_shape_claim": True,
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.199",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "phase_target_rows": len(PHASE_TARGETS),
              "input_rows_loaded": len(input_rows),
              "normalized_phase_rows": len(normalized_rows),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "bipolar_phase_surface_targets_or_classification_only_no_validation"
          }

          (OUT / "v4_199_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.199 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_199_outputs/run_v4_199.py

      - name: Upload v4.199 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-199-bipolar-phase-numeric-surface-builder-output
          path: tairid_v4_199_outputs/
