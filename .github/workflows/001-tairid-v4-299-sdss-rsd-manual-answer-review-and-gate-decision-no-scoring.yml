name: 001 TAIRID v4.299 - SDSS RSD Manual Answer Review And Gate Decision No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-299-sdss-rsd-manual-answer-review-and-gate-decision-no-scoring.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-manual-answer-review-gate-decision-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.299 SDSS RSD Manual Answer Review And Gate Decision No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.299 SDSS RSD manual answer review and gate decision no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import html
          import re
          import urllib.parse
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.299"
          ROUTE = "sdss_rsd_manual_answer_review_and_gate_decision_no_scoring_after_v4_298"
          EXPECTED_RESULT = "v4_299_sdss_rsd_manual_answer_review_and_gate_decision_no_scoring_passed_no_gate_approval_no_claims"
          SELECTED_NEXT_ROUTE = "v4_300_sdss_rsd_manual_answer_template_builder_no_scoring"

          OUT = Path("tairid_v4_299_sdss_rsd_manual_answer_review_gate_decision_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-299-sdss-rsd-manual-answer-review-gate-decision-output.zip"
          SOURCE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/"
          RELATED_PAGE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          DR16_URL = "https://www.sdss4.org/dr16/"
          MAX_BYTES = 2_000_000

          MANUAL_ANSWER_CANDIDATE_PATHS = [
              "data/sdss_rsd_manual_answers_v4_298.csv",
              "data/manual/sdss_rsd_manual_answers_v4_298.csv",
              "results/sdss_rsd_manual_answers_v4_298.csv",
              "artifacts/sdss_rsd_manual_answers_v4_298.csv",
              "SDSS_RSD_MANUAL_ANSWERS_v4_298.csv",
              "data/sdss_rsd_manual_answers_v4_299.csv",
              "data/manual/sdss_rsd_manual_answers_v4_299.csv",
              "SDSS_RSD_MANUAL_ANSWERS_v4_299.csv",
          ]

          REQUIRED_MANUAL_FIELDS = [
              "answer_id",
              "target_id",
              "source_url_or_citation",
              "quoted_or_precise_source_text",
              "answer_summary",
              "approval_request",
              "claim_limit",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
                  self.in_a = False
                  self.current_href = ""
                  self.current_text = []

              def handle_starttag(self, tag, attrs):
                  if tag.lower() == "a":
                      attrs = dict(attrs)
                      self.in_a = True
                      self.current_href = attrs.get("href", "")
                      self.current_text = []

              def handle_data(self, data):
                  if self.in_a:
                      self.current_text.append(data)

              def handle_endtag(self, tag):
                  if tag.lower() == "a" and self.in_a:
                      text = " ".join(" ".join(self.current_text).split())
                      self.links.append({"href": self.current_href, "text": text})
                      self.in_a = False
                      self.current_href = ""
                      self.current_text = []

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=MAX_BYTES, timeout=15):
              out = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.299-manual-answer-review-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      out["status_code"] = getattr(resp, "status", "")
                      out["content_type"] = resp.headers.get("Content-Type", "")
                      out["content_length_header"] = resp.headers.get("Content-Length", "")
                      out["final_url"] = resp.geturl()
                      out["bytes_read"] = len(data)
                      out["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      out["fetch_ok"] = True
              except Exception as exc:
                  out["error"] = f"{type(exc).__name__}: {exc}"
              return out, data

          def strip_html_text(data):
              if not data:
                  return ""
              text = data.decode("utf-8", errors="replace")
              text = re.sub(r"<script.*?</script>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<[^>]+>", " ", text)
              return html.unescape(" ".join(text.split()))

          def extract_candidate_links(base_url, data):
              if not data:
                  return []
              parser = LinkParser()
              parser.feed(data.decode("utf-8", errors="replace"))
              rows = []
              keywords = ["bao", "rsd", "eboss", "final", "measurement", "cosmo", "cosmology", "paper", "arxiv", "doi", "table", "data", "zhao", "alam", "growth", "consensus", "covariance"]
              seen = set()
              for link in parser.links:
                  href = link["href"].strip()
                  if not href:
                      continue
                  url = urllib.parse.urljoin(base_url, href).split("#")[0]
                  if url in seen:
                      continue
                  seen.add(url)
                  hay = (url + " " + link["text"]).lower()
                  if any(k in hay for k in keywords):
                      rows.append({
                          "candidate_url": url,
                          "link_text": link["text"],
                          "source_page": base_url,
                          "locator_basis": "discovered_link_keyword_match",
                          "score_allowed": False,
                      })
              return rows

          def ads_to_arxiv(url):
              m = re.search(r"abs/([0-9]{4})arXiv([0-9]{4}\.[0-9]{4,5})([A-Za-z]?)/abstract", url)
              if m:
                  return "https://arxiv.org/abs/" + m.group(2) + m.group(3)
              m2 = re.search(r"arxiv\.org/abs/([0-9]{4}\.[0-9]{4,5}[A-Za-z]?)", url)
              if m2:
                  return "https://arxiv.org/abs/" + m2.group(1)
              return ""

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              try:
                  fields["z_eff"] = float(fields["z_eff_text"])
              except Exception:
                  fields["z_eff"] = ""
              return fields

          def parse_column_contract_rows(tables):
              out = []
              for table_idx, table in enumerate(tables):
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      row_type = "redshift_function_row_candidate" if "(z)" in label_norm else "final_or_consensus_row_candidate"
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for value, sigma in measurement_pairs(cell):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              out.append({
                                  "contract_id": f"column_contract_bound_{len(out)+1:02d}",
                                  "bound_id": f"bound_{len(out)+1:02d}",
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "z_eff": fields["z_eff"],
                                  "z_range_text": fields["z_range_text"],
                                  "observable": "f_sigma8",
                                  "observed_value": value,
                                  "observed_sigma": sigma,
                                  "score_allowed": False,
                                  "contract_status": "rebuilt_for_manual_answer_review_gate_no_scoring",
                              })
              return out

          def window_around_terms(text, terms, width=260, limit=720):
              lower = text.lower()
              starts = []
              for term in terms:
                  idx = lower.find(term.lower())
                  if idx >= 0:
                      starts.append(idx)
              if not starts:
                  return ""
              idx = min(starts)
              return text[max(0, idx-width):idx+width].replace("\n", " ")[:limit]

          def count_terms(text):
              lower = text.lower()
              return {
                  "fsigma8": len(re.findall(r"f\s*σ\s*8|f\s*sigma\s*8|fsigma8|f\\sigma_8", lower)),
                  "rsd": lower.count("rsd") + lower.count("redshift-space distortion"),
                  "bao": lower.count("bao") + lower.count("baryon acoustic"),
                  "consensus": lower.count("consensus"),
                  "fiducial": lower.count("fiducial"),
                  "lcdm": lower.count("lcdm") + lower.count("Λcdm".lower()),
                  "growth": lower.count("growth"),
                  "covariance": lower.count("covariance"),
                  "table": lower.count("table"),
                  "measurement": lower.count("measurement"),
              }

          def read_manual_answers():
              status_rows = []
              found_path = ""
              answer_rows = []
              for raw in MANUAL_ANSWER_CANDIDATE_PATHS:
                  p = Path(raw)
                  exists = p.exists()
                  status_rows.append({
                      "candidate_path": raw,
                      "exists": exists,
                      "read_attempted": exists,
                      "read_ok": False,
                      "row_count": 0,
                      "error": "",
                  })
                  if exists and not found_path:
                      try:
                          with p.open("r", encoding="utf-8-sig", newline="") as f:
                              reader = csv.DictReader(f)
                              answer_rows = list(reader)
                          status_rows[-1]["read_ok"] = True
                          status_rows[-1]["row_count"] = len(answer_rows)
                          found_path = raw
                      except Exception as exc:
                          status_rows[-1]["error"] = f"{type(exc).__name__}: {exc}"
              return found_path, status_rows, answer_rows

          def review_manual_answer(row):
              missing = [k for k in REQUIRED_MANUAL_FIELDS if not str(row.get(k, "")).strip()]
              approval_request = str(row.get("approval_request", "")).strip().lower()
              allowed_request = approval_request in ["row_meaning_confirm", "baseline_candidate", "definition_match", "reject", "keep_blocked"]
              claim_limit = str(row.get("claim_limit", "")).strip().lower()
              claim_limit_ok = claim_limit in ["no_scoring", "no_claims", "no_scoring/no_claims", "keep_blocked"]
              source_text = str(row.get("quoted_or_precise_source_text", "")).strip()
              source_present = bool(str(row.get("source_url_or_citation", "")).strip())
              precise_text_ok = len(source_text) >= 12
              hard_reject_reason = ""
              if missing:
                  hard_reject_reason = "missing_required_fields"
              elif not allowed_request:
                  hard_reject_reason = "invalid_approval_request"
              elif not claim_limit_ok:
                  hard_reject_reason = "claim_limit_not_no_claims"
              elif not source_present or not precise_text_ok:
                  hard_reject_reason = "source_or_precise_text_insufficient"
              else:
                  hard_reject_reason = ""
              return {
                  "missing_required_fields": "|".join(missing),
                  "approval_request_allowed": allowed_request,
                  "claim_limit_ok": claim_limit_ok,
                  "source_present": source_present,
                  "precise_text_ok": precise_text_ok,
                  "review_status": "reviewable_not_approved" if not hard_reject_reason else "reject_before_gate",
                  "hard_reject_reason": hard_reject_reason,
              }

          inherited_v4_298_rows = [
              {"inherited_from": "v4.298", "item": "rules", "value": "54 / 54 passed", "meaning": "Target source probe and manual answer ingest passed.", "carry_forward_status": "ready_for_manual_review_gate"},
              {"inherited_from": "v4.298", "item": "source_fetch_ok", "value": True, "meaning": "GitHub fetched SDSS table page.", "carry_forward_status": "source_page_available"},
              {"inherited_from": "v4.298", "item": "related_fetch_ok", "value": True, "meaning": "GitHub fetched SDSS overview page.", "carry_forward_status": "related_page_available"},
              {"inherited_from": "v4.298", "item": "dr16_fetch_ok", "value": True, "meaning": "GitHub fetched SDSS DR16 page.", "carry_forward_status": "dr16_page_available"},
              {"inherited_from": "v4.298", "item": "column_contract_rows", "value": 12, "meaning": "Twelve SDSS f_sigma8 rows existed.", "carry_forward_status": "observed_rows_ready"},
              {"inherited_from": "v4.298", "item": "source_probe_rows", "value": 27, "meaning": "Twenty-seven source probes were written.", "carry_forward_status": "source_probes_ready"},
              {"inherited_from": "v4.298", "item": "row_meaning_hint_rows", "value": 8, "meaning": "Eight row-meaning hints were found but not confirmed.", "carry_forward_status": "row_hints_only"},
              {"inherited_from": "v4.298", "item": "baseline_hint_rows", "value": 7, "meaning": "Seven baseline hints were found but not approved.", "carry_forward_status": "baseline_hints_only"},
              {"inherited_from": "v4.298", "item": "manual_answer_file_found", "value": False, "meaning": "No manual answer file was found.", "carry_forward_status": "manual_answers_missing"},
              {"inherited_from": "v4.298", "item": "ingested_manual_answer_rows", "value": 0, "meaning": "Zero manual answers were ingested.", "carry_forward_status": "manual_answers_missing"},
              {"inherited_from": "v4.298", "item": "row_meaning_confirmed", "value": False, "meaning": "Row meaning not confirmed.", "carry_forward_status": "row_meaning_missing"},
              {"inherited_from": "v4.298", "item": "approved_baseline_values", "value": 0, "meaning": "No baseline value approved.", "carry_forward_status": "baseline_missing"},
              {"inherited_from": "v4.298", "item": "support_allowed", "value": False, "meaning": "Support blocked.", "carry_forward_status": "support_blocked"},
              {"inherited_from": "v4.298", "item": "selected_next_route", "value": "v4_299_sdss_rsd_manual_answer_review_and_gate_decision_no_scoring", "meaning": "Current route reviews answers/hints and decides gates.", "carry_forward_status": "current_route"},
          ]

          source_fetch_row, source_data = fetch_url(SOURCE_URL)
          related_fetch_row, related_data = fetch_url(RELATED_PAGE_URL)
          dr16_fetch_row, dr16_data = fetch_url(DR16_URL)

          parser = SimpleTableParser()
          if source_data:
              parser.feed(source_data.decode("utf-8", errors="replace"))
          column_contract_rows = parse_column_contract_rows(parser.tables)

          discovered = []
          discovered.extend(extract_candidate_links(SOURCE_URL, source_data))
          discovered.extend(extract_candidate_links(RELATED_PAGE_URL, related_data))
          discovered.extend(extract_candidate_links(DR16_URL, dr16_data))

          static_candidates = [
              {"candidate_url": SOURCE_URL, "link_text": "SDSS final BAO and RSD measurements table", "source_page": "static", "locator_basis": "official_table_page"},
              {"candidate_url": RELATED_PAGE_URL, "link_text": "SDSS final BAO and RSD measurements overview", "source_page": "static", "locator_basis": "official_related_page"},
              {"candidate_url": DR16_URL, "link_text": "SDSS DR16 release page", "source_page": "static", "locator_basis": "official_release_context"},
              {"candidate_url": "https://arxiv.org/abs/2007.08991", "link_text": "eBOSS final cosmological interpretation arXiv candidate", "source_page": "static", "locator_basis": "manual_static_arxiv_candidate"},
              {"candidate_url": "https://arxiv.org/abs/2007.08997", "link_text": "Zhao et al. 2020 arXiv candidate", "source_page": "static", "locator_basis": "manual_static_arxiv_candidate"},
              {"candidate_url": "https://arxiv.org/abs/2007.09004", "link_text": "Alam et al. 2020 arXiv candidate", "source_page": "static", "locator_basis": "manual_static_arxiv_candidate"},
          ]

          raw_sources = static_candidates + discovered
          deduped_sources = []
          seen = set()
          for row in raw_sources:
              url = row["candidate_url"].split("#")[0]
              if url in seen:
                  continue
              seen.add(url)
              item = dict(row)
              item["source_probe_candidate_id"] = f"source_probe_candidate_{len(deduped_sources)+1:03d}"
              item["arxiv_probe_url"] = ads_to_arxiv(url)
              item["score_allowed"] = False
              deduped_sources.append(item)

          prioritized = []
          for row in deduped_sources:
              hay = (row["candidate_url"] + " " + row.get("link_text", "")).lower()
              priority = 0
              if row["candidate_url"] == SOURCE_URL:
                  priority += 110
              if row["candidate_url"] == RELATED_PAGE_URL:
                  priority += 100
              if "arxiv.org/abs/2007.08991" in row["candidate_url"]:
                  priority += 90
              if "arxiv" in hay or "ui.adsabs" in hay:
                  priority += 40
              if any(name in hay for name in ["alam", "zhao", "ross", "raichoor", "du mas", "neveux", "smith", "growth"]):
                  priority += 25
              if any(term in hay for term in ["rsd", "bao", "final", "cosmology", "measurement"]):
                  priority += 15
              if any(ext in hay for ext in [".png", ".jpg", ".jpeg", ".gif"]):
                  priority -= 50
              item = dict(row)
              item["priority_score"] = priority
              prioritized.append(item)
          prioritized = sorted(prioritized, key=lambda r: r["priority_score"], reverse=True)[:24]

          source_probe_review_rows = []
          row_meaning_hint_review_rows = []
          baseline_hint_review_rows = []
          for src in prioritized:
              probe_urls = [src["candidate_url"]]
              if src.get("arxiv_probe_url"):
                  probe_urls.append(src["arxiv_probe_url"])
              for probe_url in probe_urls:
                  fetch, data = fetch_url(probe_url, max_bytes=1_000_000, timeout=12)
                  text = strip_html_text(data)
                  terms = count_terms(text)
                  relevance = terms["fsigma8"]*6 + terms["rsd"]*3 + terms["bao"]*2 + terms["consensus"]*4 + terms["lcdm"]*2 + terms["growth"]*2 + terms["covariance"] + terms["measurement"]
                  probe_row = {
                      "source_probe_review_id": f"source_probe_review_{len(source_probe_review_rows)+1:03d}",
                      "probe_url": probe_url,
                      "link_text": src.get("link_text", ""),
                      "fetch_ok": fetch["fetch_ok"],
                      "status_code": fetch["status_code"],
                      "content_type": fetch["content_type"],
                      "bytes_read": fetch["bytes_read"],
                      "sha256_first_bytes": fetch["sha256_first_bytes"],
                      "term_count_fsigma8": terms["fsigma8"],
                      "term_count_rsd": terms["rsd"],
                      "term_count_bao": terms["bao"],
                      "term_count_consensus": terms["consensus"],
                      "term_count_lcdm": terms["lcdm"],
                      "term_count_growth": terms["growth"],
                      "term_count_covariance": terms["covariance"],
                      "relevance_score_no_claim": relevance,
                      "review_decision": "source_probe_hint_only_not_gate_pass",
                      "score_allowed": False,
                      "support_allowed": False,
                  }
                  source_probe_review_rows.append(probe_row)
                  row_window = window_around_terms(text, ["f σ 8", "fσ8", "fsigma8", "f sigma", "consensus", "measurement", "redshift-space distortion"], width=320, limit=780)
                  baseline_window = window_around_terms(text, ["LCDM", "fiducial", "model", "prediction", "comparator", "growth rate", "fσ8"], width=320, limit=780)
                  if row_window:
                      row_meaning_hint_review_rows.append({
                          "hint_review_id": f"row_hint_review_{len(row_meaning_hint_review_rows)+1:03d}",
