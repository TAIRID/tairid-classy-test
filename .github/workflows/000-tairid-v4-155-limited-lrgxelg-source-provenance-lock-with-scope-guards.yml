                  "scope_guard_report_v4_155.csv",
                  "blocked_claims_v4_155.csv",
                  "parser_health_report_v4_155.csv",
                  "rule_results_v4_155.csv",
                  "tairid_v4_155_limited_lrgxelg_source_provenance_lock.json",
                  "tairid_v4_155_limited_lrgxelg_source_provenance_lock.md",
              ],
          }

          with open(os.path.join(OUTDIR, "tairid_v4_155_limited_lrgxelg_source_provenance_lock.json"), "w", encoding="utf-8") as f:
              json.dump(summary, f, indent=2, sort_keys=True)

          md = []
          md.append("# 000 TAIRID v4.155 — Limited LRGxELG Source Provenance Lock With Scope Guards\n")
          md.append(f"Created UTC: `{health_items['created_utc']}`\n")
          md.append("## Status\n")
          md.append(f"Expected result label: `{EXPECTED_RESULT_LABEL}`\n")
