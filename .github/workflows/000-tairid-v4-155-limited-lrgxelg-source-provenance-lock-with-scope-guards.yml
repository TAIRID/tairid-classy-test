          md.append(f"- Commit-pinned raw files fetched: `{all_pinned_raw_sources_fetch_ok}`\n")
          md.append(f"- Branch hashes match v4.154 short hashes: `{all_branch_short_hashes_match_v4_154}`\n")
          md.append(f"- Pinned hashes match v4.154 short hashes: `{all_pinned_short_hashes_match_v4_154}`\n")
          md.append(f"- Branch hashes match pinned hashes: `{all_branch_matches_pinned}`\n")
          md.append(f"- README context present: `{readme_context_present}`\n")
          md.append("## Truth boundary\n")
          md.append("This does not compute final pressure. It does not compute residuals against ΛCDM or TAIRID. It does not ingest the product into the main growth lane as a final scientific input. It does not provide QSO covariance. It does not provide full eBOSS family covariance. It does not run BIC, likelihood, posterior comparison, or public-facing validation. It does not validate TAIRID.\n")
          md.append("## Health\n")
          md.append("| Check | Value |\n|---|---:|\n")
          for k in [
              "value_record_count", "covariance_dimension", "order_matches_expected", "covariance_dimension_matches_value_order", "covariance_symmetric", "diagonal_matches_sigma", "repo_api_fetch_ok", "branch_api_fetch_ok", "all_branch_raw_sources_fetch_ok", "all_commit_pinned_sources_fetch_ok", "all_branch_short_hashes_match_v4_154", "all_pinned_short_hashes_match_v4_154", "all_branch_hashes_match_pinned_hashes", "readme_context_present", "pressure_recomputed", "residuals_computed", "likelihood_or_bic_run", "TAIRID_validation_claim_allowed"
          ]:
              md.append(f"| {k} | `{health_items[k]}` |\n")
          md.append("## Files produced\n")
          for fname in summary["normalized_artifacts"]:
