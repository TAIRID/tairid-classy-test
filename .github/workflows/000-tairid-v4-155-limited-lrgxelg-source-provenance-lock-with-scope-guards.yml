          md.append("It covers only:\n")
          md.append("- `z = 0.70`: `DM/rd`, `DH/rd`, `fσ8`\n")
          md.append("- `z = 0.845`: `DM/rd`, `DH/rd`, `fσ8`\n")
          md.append("## Source lock diagnostics\n")
          md.append(f"- Repository: `{REPO_OWNER}/{REPO_NAME}`\n")
