name: 000 TAIRID v4.120 Verified Observed Covariance Bridge Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-120-verified-observed-covariance-bridge-probe.yml"

jobs:
  tairid-v4-120-verified-observed-covariance-bridge-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.120 verified observed covariance bridge probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_120_verified_observed_covariance_bridge_probe

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_120_verified_observed_covariance_bridge_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_120_verified_observed_covariance_bridge_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This uses the v4.119 provenance-locked BOSS consensus covariance subblock.",
              "This recomputes guarded diagnostic bridge lanes only.",
              "A pass means the verified observed-covariance bridge runs and remains ready for a verified bridge sensitivity audit."
          ]

          UPSTREAM_LOCKS = {
              "v4_119_BOSS_covariance_row_column_provenance_audit": {
                  "readiness_label": "BOSS_covariance_row_column_provenance_audit_passed_primary_consensus_source_locked_ready_for_verified_observed_covariance_bridge_probe",
                  "primary_source_locked": True,
                  "previous_auto_selection_superseded": True,
                  "target_member_found": True,
                  "target_primary_member": "COMBINEDDR12_FS_consensus_dM_Hz/FS_consensus_covtot_dM_Hz_fsig.txt",
                  "target_matrix_dimension": 9,
                  "target_matrix_rank": 9,
                  "target_matrix_symmetry_error": 0.0,
                  "fsigma8_subblock_extracted": True,
                  "fsigma8_subblock_dimension": 3,
                  "fsigma8_subblock_rank": 3,
                  "fsigma8_subblock_diag_min": 0.00135237,
                  "fsigma8_indexes": [2, 5, 8],
                  "fsigma8_redshifts": [0.38, 0.51, 0.61],
                  "bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_118_observed_covariance_upgrade_sensitivity_audit": {
                  "readiness_label": "observed_covariance_upgrade_sensitivity_audit_passed_pressure_stable_source_covariance_material_ready_for_BOSS_row_column_provenance_audit",
                  "source_observed_covariance_ingested": True,
                  "covariance_upgrade_status": "BOSS_DR12_source_covariance_subblock_inserted_positions_1_2_3",
                  "primary_chi2": 1.2943386544372018,
                  "baseline_diagonal_chi2": 1.8857450832335483,
                  "primary_pressure_z": 0.0,
                  "pressure_z_all_zero": True,
                  "row_column_provenance_required": True,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          TARGET_VECTOR_ORDER = [
              {"position": 0, "z": 0.15, "target_name": "fsigma8z015", "source_role": "low_z_diagonal_fallback"},
              {"position": 1, "z": 0.38, "target_name": "fsigma8z038", "source_role": "BOSS_DR12_consensus_covtot_verified"},
              {"position": 2, "z": 0.51, "target_name": "fsigma8z051", "source_role": "BOSS_DR12_consensus_covtot_verified"},
              {"position": 3, "z": 0.61, "target_name": "fsigma8z061", "source_role": "BOSS_DR12_consensus_covtot_verified"},
              {"position": 4, "z": 2.33, "target_name": "fsigma8z233", "source_role": "high_z_diagonal_fallback"}
          ]

          REFERENCE_FSIGMA8_MEAN = [
              0.4618473025984107,
              0.47880399561515946,
              0.4766635460319918,
              0.4711826988812538,
              0.29766798079042817
          ]

          REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED = [
              [5.562209100820247e-05, 4.4037586707431904e-05, 3.754755889442331e-05, 3.297837710717998e-05, 4.737025053749357e-06],
              [4.4037586707431904e-05, 3.5891627510371965e-05, 3.12227605615546e-05, 2.789979758962016e-05, 6.095691128632226e-06],
              [3.754755889442331e-05, 3.12227605615546e-05, 2.752609243243442e-05, 2.4871160721047073e-05, 6.61700580879124e-06],
              [3.297837710717998e-05, 2.789979758962016e-05, 2.4871160721047073e-05, 2.2676250563482697e-05, 6.9020814479945925e-06],
              [4.737025053749357e-06, 6.095691128632226e-06, 6.61700580879124e-06, 6.9020814479945925e-06, 5.771821619405124e-06]
          ]

          OBSERVED_RSD_VECTOR = [
              {"position": 0, "z": 0.15, "observed_fsigma8": 0.49, "observed_sigma": 0.145, "source_family": "SDSS_DR7_MGS", "covariance_status": "diagonal_fallback"},
              {"position": 1, "z": 0.38, "observed_fsigma8": 0.497, "observed_sigma": 0.045, "source_family": "BOSS_DR12_consensus", "covariance_status": "verified_BOSS_consensus_covtot_subblock"},
              {"position": 2, "z": 0.51, "observed_fsigma8": 0.458, "observed_sigma": 0.038, "source_family": "BOSS_DR12_consensus", "covariance_status": "verified_BOSS_consensus_covtot_subblock"},
              {"position": 3, "z": 0.61, "observed_fsigma8": 0.436, "observed_sigma": 0.034, "source_family": "BOSS_DR12_consensus", "covariance_status": "verified_BOSS_consensus_covtot_subblock"},
              {"position": 4, "z": 2.33, "observed_fsigma8": 0.364, "observed_sigma": 0.106, "source_family": "high_z_LyA_compilation_anchor", "covariance_status": "diagonal_fallback"}
          ]

          BOSS_VERIFIED_FSIGMA8_SUBBLOCK = [
              [0.00222683, 0.000877016, 0.000287067],
              [0.000877016, 0.00154972, 0.000724116],
              [0.000287067, 0.000724116, 0.00135237]
          ]

          VERIFIED_BOSS_SOURCE = {
              "target_primary_member": "COMBINEDDR12_FS_consensus_dM_Hz/FS_consensus_covtot_dM_Hz_fsig.txt",
              "source_matrix_dimension": 9,
              "source_matrix_rank": 9,
              "source_matrix_symmetry_error": 0.0,
              "subblock_indexes": [2, 5, 8],
              "subblock_redshifts": [0.38, 0.51, 0.61],
              "subblock_observable": "fsigma8",
              "previous_auto_source_superseded": "COMBINEDDR12_FS_consensus_dM_Hz/FS_SATPATHY_cov_z3.txt",
              "provenance_status": "locked_by_v4_119"
          }

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The verified observed covariance bridge probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The verified bridge pressure is final.",
              "Zero pressure-z proves TAIRID.",
              "The low-z and high-z diagonal fallback anchors are source-covariance complete.",
              "No verified bridge sensitivity audit is needed.",
              "The row-column provenance audit is a publication-grade cosmology result.",
              "The verified BOSS subblock alone proves the model."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_121_verified_bridge_sensitivity_audit",
                  "purpose": "Compare the verified consensus bridge against v4.114 diagonal fallback and v4.117 first-candidate source bridge.",
                  "why_next": "The BOSS source choice changed chi-square, so the verified bridge must be sensitivity-audited."
              },
              {
                  "priority": 2,
                  "route_id": "v4_122_growth_family_expansion_design",
                  "purpose": "Design additional observed growth-family coverage beyond the five-slot bridge vector.",
                  "why_next": "A broader observed-family test can check whether the no-pressure result persists."
              },
              {
                  "priority": 3,
                  "route_id": "v4_123_low_high_z_anchor_covariance_review",
                  "purpose": "Review the remaining z=0.15 and z=2.33 diagonal fallback anchors.",
                  "why_next": "BOSS covariance is now verified, but the edge anchors are still diagonal fallback."
              },
              {
                  "priority": 4,
                  "route_id": "v4_124_claim_boundary_review_handoff",
                  "purpose": "Create a human-readable status handoff after the verified bridge and sensitivity audit.",
                  "why_next": "The result needs careful interpretation before public-facing language."
              }
          ]

          failed_gates = []
          warnings = [
              "verified_bridge_probe_only",
              "low_z_anchor_still_diagonal_fallback",
              "high_z_anchor_still_diagonal_fallback",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def diag(values):
              n = len(values)
              return [[float(values[i]) if i == j else 0.0 for j in range(n)] for i in range(n)]

          def mat_diag_from_matrix(a):
              return [[float(a[i][i]) if i == j else 0.0 for j in range(len(a))] for i in range(len(a))]

          def mat_add(a, b):
              return [[float(a[i][j]) + float(b[i][j]) for j in range(len(a[0]))] for i in range(len(a))]

          def mat_vec(a, v):
              return [sum(float(a[i][j]) * float(v[j]) for j in range(len(v))) for i in range(len(a))]

          def dot(a, b):
              return sum(float(x) * float(y) for x, y in zip(a, b))

          def mean(values):
              return sum(values) / len(values) if values else 0.0

          def sign(value):
              return 1.0 if value >= 0 else -1.0

          def inverse_matrix(a, tol=1e-20):
              n = len(a)
              rows = [[float(a[i][j]) for j in range(n)] + [1.0 if i == j else 0.0 for j in range(n)] for i in range(n)]
              for col in range(n):
                  pivot = max(range(col, n), key=lambda r: abs(rows[r][col]))
                  pivot_value = rows[pivot][col]
                  if abs(pivot_value) <= tol:
                      raise RuntimeError("singular_matrix_at_column_" + str(col))
                  if pivot != col:
                      rows[col], rows[pivot] = rows[pivot], rows[col]
                  pivot_value = rows[col][col]
                  for j in range(2 * n):
                      rows[col][j] /= pivot_value
                  for r in range(n):
                      if r != col:
                          factor = rows[r][col]
                          if abs(factor) > tol:
                              for j in range(2 * n):
                                  rows[r][j] -= factor * rows[col][j]
              return [row[n:] for row in rows]

          def matrix_rank(a, tol=1e-14):
              rows = [[float(x) for x in row] for row in a]
              if not rows:
                  return 0
              m = len(rows)
              n = len(rows[0])
              rank = 0
              col = 0
              while rank < m and col < n:
                  pivot = None
                  pivot_abs = tol
                  for r in range(rank, m):
                      value_abs = abs(rows[r][col])
                      if value_abs > pivot_abs:
                          pivot_abs = value_abs
                          pivot = r
                  if pivot is None:
                      col += 1
                      continue
                  rows[rank], rows[pivot] = rows[pivot], rows[rank]
                  pivot_value = rows[rank][col]
                  rows[rank] = [x / pivot_value for x in rows[rank]]
                  for r in range(m):
                      if r != rank:
                          factor = rows[r][col]
                          if abs(factor) > tol:
                              rows[r] = [rv - factor * pv for rv, pv in zip(rows[r], rows[rank])]
                  rank += 1
                  col += 1
              return rank

          def max_symmetry_error(a):
              n = len(a)
              return max(abs(float(a[i][j]) - float(a[j][i])) for i in range(n) for j in range(n))

          def diag_min(a):
              return min(float(a[i][i]) for i in range(len(a)))

          def frobenius_norm(a):
              return math.sqrt(sum(float(x) * float(x) for row in a for x in row))

          def condition_proxy(a, inv):
              return frobenius_norm(a) * frobenius_norm(inv)

          def compute_lane(lane_id, reference_covariance, observed_covariance, residual_vector, dof=5):
              total_covariance = mat_add(reference_covariance, observed_covariance)
              inv = inverse_matrix(total_covariance)
              projected = mat_vec(inv, residual_vector)
              chi2 = dot(residual_vector, projected)
              pressure_z = sign(mean(residual_vector)) * math.sqrt(max(chi2 - dof, 0.0))
              return {
                  "lane_id": lane_id,
                  "chi2": chi2,
                  "dof": dof,
                  "pressure_z": pressure_z,
                  "residual_mean": mean(residual_vector),
                  "rank_total_covariance": matrix_rank(total_covariance),
                  "symmetry_error_total_covariance": max_symmetry_error(total_covariance),
                  "diag_min_total_covariance": diag_min(total_covariance),
                  "condition_proxy_total_covariance": condition_proxy(total_covariance, inv),
                  "total_covariance": total_covariance,
                  "inverse_total_covariance": inv,
                  "computed": True,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              }

          observed_values = [float(row["observed_fsigma8"]) for row in OBSERVED_RSD_VECTOR]
          observed_sigmas = [float(row["observed_sigma"]) for row in OBSERVED_RSD_VECTOR]
          reference_values = [float(x) for x in REFERENCE_FSIGMA8_MEAN]
          residual_vector = [obs - ref for obs, ref in zip(observed_values, reference_values)]

          observed_covariance_diagonal = diag([sigma * sigma for sigma in observed_sigmas])
          observed_covariance_verified = [row[:] for row in observed_covariance_diagonal]

          for local_i, full_i in enumerate([1, 2, 3]):
              for local_j, full_j in enumerate([1, 2, 3]):
                  observed_covariance_verified[full_i][full_j] = float(BOSS_VERIFIED_FSIGMA8_SUBBLOCK[local_i][local_j])

          reference_diagonal_guard = mat_diag_from_matrix(REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED)
          observed_only_zero_reference = diag([0.0 for _ in observed_sigmas])

          primary_verified_lane = compute_lane(
              "verified_BOSS_consensus_reference_plus_observed_covariance",
              REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED,
              observed_covariance_verified,
              residual_vector
          )

          baseline_diagonal_lane = compute_lane(
              "baseline_reference_plus_observed_diagonal_fallback",
              REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED,
              observed_covariance_diagonal,
              residual_vector
          )

          diagonal_reference_guard_lane = compute_lane(
              "diagonal_reference_guard_plus_verified_BOSS_observed_covariance",
              reference_diagonal_guard,
              observed_covariance_verified,
              residual_vector
          )

          observed_only_lane = compute_lane(
              "observed_only_verified_BOSS_plus_edge_fallback_covariance",
              observed_only_zero_reference,
              observed_covariance_verified,
              residual_vector
          )

          bridge_lanes = [
              primary_verified_lane,
              baseline_diagonal_lane,
              diagonal_reference_guard_lane,
              observed_only_lane
          ]

          bridge_lane_records = []
          for lane in bridge_lanes:
              bridge_lane_records.append({
                  "lane_id": lane["lane_id"],
                  "chi2": lane["chi2"],
                  "dof": lane["dof"],
                  "pressure_z": lane["pressure_z"],
                  "residual_mean": lane["residual_mean"],
                  "rank_total_covariance": lane["rank_total_covariance"],
                  "symmetry_error_total_covariance": lane["symmetry_error_total_covariance"],
                  "diag_min_total_covariance": lane["diag_min_total_covariance"],
                  "condition_proxy_total_covariance": lane["condition_proxy_total_covariance"],
                  "computed": lane["computed"],
                  "claim_scope": lane["claim_scope"]
              })

          pressure_sensitivity_records = [
              {
                  "comparison_id": "verified_primary_minus_baseline_diagonal_fallback",
                  "base_lane": primary_verified_lane["lane_id"],
                  "comparison_lane": baseline_diagonal_lane["lane_id"],
                  "delta_chi2": primary_verified_lane["chi2"] - baseline_diagonal_lane["chi2"],
                  "delta_pressure_z": primary_verified_lane["pressure_z"] - baseline_diagonal_lane["pressure_z"],
                  "interpretation": "Effect of the provenance-locked BOSS consensus covariance relative to diagonal fallback."
              },
              {
                  "comparison_id": "verified_primary_minus_v4_117_first_candidate_source",
                  "base_lane": primary_verified_lane["lane_id"],
                  "comparison_lane": "v4_117_first_candidate_source_bridge",
                  "delta_chi2": primary_verified_lane["chi2"] - 1.2943386544372018,
                  "delta_pressure_z": primary_verified_lane["pressure_z"] - 0.0,
                  "interpretation": "Effect of replacing the v4.117 first usable candidate with the v4.119 consensus covtot source."
              },
              {
                  "comparison_id": "verified_primary_minus_diagonal_reference_guard",
                  "base_lane": primary_verified_lane["lane_id"],
                  "comparison_lane": diagonal_reference_guard_lane["lane_id"],
                  "delta_chi2": primary_verified_lane["chi2"] - diagonal_reference_guard_lane["chi2"],
                  "delta_pressure_z": primary_verified_lane["pressure_z"] - diagonal_reference_guard_lane["pressure_z"],
                  "interpretation": "Reference off-diagonal sensitivity after verified BOSS consensus covariance."
              },
              {
                  "comparison_id": "verified_primary_minus_observed_only",
                  "base_lane": primary_verified_lane["lane_id"],
                  "comparison_lane": observed_only_lane["lane_id"],
                  "delta_chi2": primary_verified_lane["chi2"] - observed_only_lane["chi2"],
                  "delta_pressure_z": primary_verified_lane["pressure_z"] - observed_only_lane["pressure_z"],
                  "interpretation": "Reference uncertainty contribution after verified BOSS consensus covariance."
              }
          ]

          observed_records = []
          for row in OBSERVED_RSD_VECTOR:
              pos = int(row["position"])
              observed_records.append({
                  **row,
                  "reference_fsigma8_mean": reference_values[pos],
                  "residual_observed_minus_reference": residual_vector[pos],
                  "observed_variance_after_verified_covariance": observed_covariance_verified[pos][pos],
                  "verified_covariance_role": TARGET_VECTOR_ORDER[pos]["source_role"]
              })

          total_covariance_records = []
          for lane in bridge_lanes:
              for i in range(5):
                  for j in range(5):
                      total_covariance_records.append({
                          "lane_id": lane["lane_id"],
                          "row_position": i,
                          "column_position": j,
                          "row_target": TARGET_VECTOR_ORDER[i]["target_name"],
                          "column_target": TARGET_VECTOR_ORDER[j]["target_name"],
                          "total_covariance_value": lane["total_covariance"][i][j],
                          "record_scope": "verified_observed_covariance_bridge_diagnostic_not_final_pressure"
                      })

          verified_boss_covariance_inserted = (
              observed_covariance_verified[1][1] == BOSS_VERIFIED_FSIGMA8_SUBBLOCK[0][0]
              and observed_covariance_verified[2][2] == BOSS_VERIFIED_FSIGMA8_SUBBLOCK[1][1]
              and observed_covariance_verified[3][3] == BOSS_VERIFIED_FSIGMA8_SUBBLOCK[2][2]
          )

          bridge_pressure_computed = all(row["computed"] is True and math.isfinite(float(row["chi2"])) for row in bridge_lanes)
          all_total_covariances_rank5 = all(row["rank_total_covariance"] == 5 for row in bridge_lanes)
          all_total_covariances_symmetric = all(float(row["symmetry_error_total_covariance"]) <= 1e-12 for row in bridge_lanes)
          all_total_covariance_diagonal_positive = all(float(row["diag_min_total_covariance"]) > 0 for row in bridge_lanes)
          pressure_z_all_zero = all(abs(float(row["pressure_z"])) <= 1e-12 for row in bridge_lanes)

          if UPSTREAM_LOCKS["v4_119_BOSS_covariance_row_column_provenance_audit"]["primary_source_locked"] is not True:
              failed_gates.append("upstream_primary_source_not_locked")

          if UPSTREAM_LOCKS["v4_119_BOSS_covariance_row_column_provenance_audit"]["fsigma8_subblock_extracted"] is not True:
              failed_gates.append("upstream_fsigma8_subblock_not_extracted")

          if not verified_boss_covariance_inserted:
              failed_gates.append("verified_BOSS_covariance_not_inserted")

          if not bridge_pressure_computed:
              failed_gates.append("bridge_pressure_not_computed")

          if not all_total_covariances_rank5:
              failed_gates.append("not_all_total_covariances_rank5")

          if not all_total_covariances_symmetric:
              failed_gates.append("not_all_total_covariances_symmetric")

          if not all_total_covariance_diagonal_positive:
              failed_gates.append("not_all_total_covariance_diagonals_positive")

          if not pressure_z_all_zero:
              warnings.append("pressure_z_nonzero_in_at_least_one_lane")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "verified bridge pressure is final",
              "zero pressure-z proves tairid",
              "low-z and high-z diagonal fallback anchors are source-covariance complete",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "verified_observed_covariance_bridge_probe_passed_diagnostic_only_ready_for_verified_bridge_sensitivity_audit"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_BOSS_provenance_carried",
                  "pass": UPSTREAM_LOCKS["v4_119_BOSS_covariance_row_column_provenance_audit"]["primary_source_locked"] is True,
                  "result": "v4.119 primary consensus covariance source carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "verified_BOSS_covariance_inserted",
                  "pass": verified_boss_covariance_inserted,
                  "result": "BOSS consensus fσ8 subblock inserted at bridge positions 1, 2, and 3",
                  "boundary": "Observed covariance construction only."
              },
              {
                  "rule_id": "bridge_pressure_diagnostic_computed",
                  "pass": bridge_pressure_computed,
                  "result": f"primary_chi2={primary_verified_lane['chi2']}; primary_pressure_z={primary_verified_lane['pressure_z']}",
                  "boundary": "Diagnostic pressure only, not final RSD pressure."
              },
              {
                  "rule_id": "rank_and_symmetry_gates_passed",
                  "pass": all_total_covariances_rank5 and all_total_covariances_symmetric and all_total_covariance_diagonal_positive,
                  "result": "all total covariance lanes rank 5, symmetric, and positive diagonal",
                  "boundary": "Numerical bridge health only."
              },
              {
                  "rule_id": "sensitivity_records_written",
                  "pass": len(pressure_sensitivity_records) >= 4 and len(bridge_lane_records) == 4,
                  "result": f"bridge_lanes={len(bridge_lane_records)}; sensitivity_records={len(pressure_sensitivity_records)}",
                  "boundary": "Sensitivity visibility only."
              },
              {
                  "rule_id": "edge_anchor_fallbacks_preserved",
                  "pass": TARGET_VECTOR_ORDER[0]["source_role"] == "low_z_diagonal_fallback" and TARGET_VECTOR_ORDER[4]["source_role"] == "high_z_diagonal_fallback",
                  "result": "z=0.15 and z=2.33 remain labeled as diagonal fallback anchors",
                  "boundary": "Blocks final pressure language."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": True,
                  "result": "final RSD pressure and TAIRID validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_120_rules_passed")

          if failed_gates:
              readiness_label = "verified_observed_covariance_bridge_probe_failed"
              next_allowed_step = "Repair verified observed covariance bridge probe before sensitivity audit."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.121 verified bridge sensitivity audit. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "verified_BOSS_source": VERIFIED_BOSS_SOURCE["target_primary_member"],
              "verified_BOSS_covariance_inserted": verified_boss_covariance_inserted,
              "observed_covariance_status": "BOSS_verified_positions_1_2_3_low_high_z_diagonal_fallback",
              "bridge_pressure_computed": bridge_pressure_computed,
              "primary_verified_chi2": primary_verified_lane["chi2"],
              "primary_verified_pressure_z": primary_verified_lane["pressure_z"],
              "primary_verified_residual_mean": primary_verified_lane["residual_mean"],
              "primary_verified_condition_proxy": primary_verified_lane["condition_proxy_total_covariance"],
              "baseline_diagonal_chi2": baseline_diagonal_lane["chi2"],
              "v4_117_first_candidate_chi2": 1.2943386544372018,
              "verified_minus_baseline_delta_chi2": primary_verified_lane["chi2"] - baseline_diagonal_lane["chi2"],
              "verified_minus_v4_117_first_candidate_delta_chi2": primary_verified_lane["chi2"] - 1.2943386544372018,
              "pressure_z_all_zero": pressure_z_all_zero,
              "low_z_anchor_source_covariance_complete": False,
              "high_z_anchor_source_covariance_complete": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "verified_BOSS_source": VERIFIED_BOSS_SOURCE,
              "target_vector_order": TARGET_VECTOR_ORDER,
              "reference_fsigma8_mean": REFERENCE_FSIGMA8_MEAN,
              "reference_fsigma8_covariance_regularized": REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED,
              "observed_RSD_vector": OBSERVED_RSD_VECTOR,
              "observed_records": observed_records,
              "BOSS_verified_fsigma8_subblock": BOSS_VERIFIED_FSIGMA8_SUBBLOCK,
              "observed_covariance_verified": observed_covariance_verified,
              "observed_covariance_diagonal_baseline": observed_covariance_diagonal,
              "residual_vector_observed_minus_reference": residual_vector,
              "bridge_lane_records": bridge_lane_records,
              "total_covariance_records": total_covariance_records,
              "pressure_sensitivity_records": pressure_sensitivity_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "verified_BOSS_covariance_inserted": verified_boss_covariance_inserted,
                  "bridge_pressure_computed": bridge_pressure_computed,
                  "primary_verified_chi2": primary_verified_lane["chi2"],
                  "primary_verified_pressure_z": primary_verified_lane["pressure_z"],
                  "pressure_z_all_zero": pressure_z_all_zero,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_120_verified_observed_covariance_bridge_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "observed_records_v4_120.csv",
              observed_records,
              ["position", "z", "observed_fsigma8", "observed_sigma", "source_family", "covariance_status", "reference_fsigma8_mean", "residual_observed_minus_reference", "observed_variance_after_verified_covariance", "verified_covariance_role"]
          )

          write_csv(
              OUTDIR / "bridge_lane_records_v4_120.csv",
              bridge_lane_records,
              ["lane_id", "chi2", "dof", "pressure_z", "residual_mean", "rank_total_covariance", "symmetry_error_total_covariance", "diag_min_total_covariance", "condition_proxy_total_covariance", "computed", "claim_scope"]
          )

          write_csv(
              OUTDIR / "pressure_sensitivity_records_v4_120.csv",
              pressure_sensitivity_records,
              ["comparison_id", "base_lane", "comparison_lane", "delta_chi2", "delta_pressure_z", "interpretation"]
          )

          write_csv(
              OUTDIR / "total_covariance_records_v4_120.csv",
              total_covariance_records,
              ["lane_id", "row_position", "column_position", "row_target", "column_target", "total_covariance_value", "record_scope"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_120.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_120.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_120.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.120 — Verified Observed Covariance Bridge Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.120 reruns the observed/reference bridge using the provenance-locked BOSS consensus total covariance subblock from v4.119. The prior first-candidate covariance source is no longer treated as the primary source.")
          md.append("")
          md.append("The bridge remains diagnostic only. The low-z and high-z edge anchors still use diagonal fallback, and final RSD pressure remains blocked.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Bridge lanes")
          md.append("")
          md.append("| Lane | chi2 | pressure_z | rank |")
          md.append("|---|---:|---:|---:|")
          for row in bridge_lane_records:
              md.append(f"| `{row['lane_id']}` | `{row['chi2']}` | `{row['pressure_z']}` | `{row['rank_total_covariance']}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_120_verified_observed_covariance_bridge_probe.json",
              "tairid_v4_120_verified_observed_covariance_bridge_probe.md",
              "observed_records_v4_120.csv",
              "bridge_lane_records_v4_120.csv",
              "pressure_sensitivity_records_v4_120.csv",
              "total_covariance_records_v4_120.csv",
              "blocked_claims_v4_120.csv",
              "next_route_options_v4_120.csv",
              "rule_results_v4_120.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_120_verified_observed_covariance_bridge_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.120 verified observed covariance bridge probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-120-verified-observed-covariance-bridge-probe
          path: artifacts/tairid_v4_120_verified_observed_covariance_bridge_probe/
