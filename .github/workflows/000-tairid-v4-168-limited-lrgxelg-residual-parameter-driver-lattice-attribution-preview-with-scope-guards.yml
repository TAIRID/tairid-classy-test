        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-168-limited-lrgxelg-residual-parameter-driver-lattice-attribution-preview-output
          path: artifacts/v4_168_limited_lrgxelg_residual_parameter_driver_lattice_attribution_preview
