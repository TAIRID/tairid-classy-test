name: 000 TAIRID v4.168 - Limited LRGxELG Residual Parameter Driver Lattice Attribution Preview With Scope Guards

on:
  workflow_dispatch:

jobs:
  tairid-v4-168:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib pyyaml

      - name: Run TAIRID v4.168 residual parameter-driver lattice attribution preview
        run: |
          python - <<'PY'
          import json
          import math
          import os
          from pathlib import Path

          import matplotlib.pyplot as plt
          import numpy as np
          import pandas as pd

          VERSION = "v4.168"
          EXPECTED_LABEL = "limited_lrgxelg_residual_parameter_driver_lattice_attribution_preview_passed_driver_lattice_artifacts_written_no_fitting_claim_no_pressure_no_validation"
          CLAIM_BOUNDARY = "parameter_driver_lattice_attribution_preview_only_no_fitting_claim_no_planck_covariance_no_pressure_no_validation"
          OUT = Path("artifacts/v4_168_limited_lrgxelg_residual_parameter_driver_lattice_attribution_preview")
          OUT.mkdir(parents=True, exist_ok=True)

          row_ids = [
              "DM_ov_rd_z0p70",
              "DH_ov_rd_z0p70",
              "fsigma8_z0p70",
              "DM_ov_rd_z0p845",
              "DH_ov_rd_z0p845",
              "fsigma8_z0p845",
          ]
          z_values = [0.70, 0.70, 0.70, 0.845, 0.845, 0.845]
          roles = [
              "geometry_transverse_reach",
              "geometry_radial_pacing_access",
              "growth_consolidation",
              "geometry_transverse_reach",
              "geometry_radial_pacing_access",
              "growth_consolidation",
          ]
          observed = np.array([17.954174, 21.221161, 0.433572, 18.896851, 20.910056, 0.296822], dtype=float)
          reference = np.array([17.58051954607205, 20.244933587028516, 0.4618546966303981, 20.389979659290223, 18.53503977090507, 0.4480660425334078], dtype=float)
          observed_sigma = np.array([0.508712, 1.197674, 0.050037, 0.776274, 2.861697, 0.081385], dtype=float)
          residual = observed - reference

          # Parameter-driver half-shift vectors carried from the v4.161/v4.167 LCDM-lite sensitivity corridor.
          # These are diagnostic local perturbation directions only. They are not a Planck posterior and not a fit.
          driver_half_shifts = {
              "Omega_m": [-0.0788626742163494, -0.177354116634179, 0.0015344021664995, -0.1051163118384792, -0.1836771698067139, 0.0007029836759996],
              "H0_km_s_Mpc": [-0.261050994747741, -0.3006145545156276, 0.0, -0.3027683259868823, -0.2752245493771426, 0.0],
              "rd_Mpc": [-0.1195277188271504, -0.1376427313836306, 0.0, -0.1386288812011518, -0.1260173805660809, 0.0],
              "sigma8_z0": [0.0, 0.0, 0.011388354003955, 0.0, 0.0, 0.0110483551358256],
              "growth_index_gamma": [0.0, 0.0, -0.0033811410349887, 0.0, 0.0, -0.0026612259592407],
          }
          driver_deltas = {
              "Omega_m": 0.01,
              "H0_km_s_Mpc": 1.0,
              "rd_Mpc": 1.0,
              "sigma8_z0": 0.02,
              "growth_index_gamma": 0.02,
          }
          drivers = list(driver_half_shifts.keys())
          H = np.array([driver_half_shifts[d] for d in drivers], dtype=float).T
          reference_proxy_sigma = np.sqrt(np.sum(H * H, axis=1))
          combined_proxy_sigma = np.sqrt(observed_sigma * observed_sigma + reference_proxy_sigma * reference_proxy_sigma)

          variable_table = pd.DataFrame({
              "slot_index": range(len(row_ids)),
              "row_id": row_ids,
              "z": z_values,
              "role": roles,
              "observed_value": observed,
              "lcdm_lite_reference_value": reference,
              "residual_observed_minus_reference": residual,
              "percent_residual": 100.0 * residual / reference,
              "observed_sigma": observed_sigma,
              "observed_sigma_units_preview_not_pressure": residual / observed_sigma,
              "reference_proxy_sigma": reference_proxy_sigma,
              "combined_proxy_sigma": combined_proxy_sigma,
              "combined_proxy_diagonal_units_preview_not_pressure": residual / combined_proxy_sigma,
              "claim_boundary": CLAIM_BOUNDARY,
          })
          variable_table.to_csv(OUT / "residual_variable_context_v4_168.csv", index=False)

          component_rows = []
          for j, driver in enumerate(drivers):
              for i, row_id in enumerate(row_ids):
                  component_rows.append({
                      "parameter_driver": driver,
                      "parameter_delta": driver_deltas[driver],
                      "slot_index": i,
                      "row_id": row_id,
                      "z": z_values[i],
                      "role": roles[i],
                      "driver_half_shift_value_units": H[i, j],
                      "driver_half_shift_observed_sigma_units": H[i, j] / observed_sigma[i],
                      "driver_half_shift_combined_proxy_diag_units": H[i, j] / combined_proxy_sigma[i],
                      "driver_half_shift_fractional_reference_units": H[i, j] / reference[i],
                      "claim_boundary": CLAIM_BOUNDARY,
                  })
          component_table = pd.DataFrame(component_rows)
          component_table.to_csv(OUT / "parameter_driver_component_lattice_v4_168.csv", index=False)

          def safe_cosine(a, b):
              an = float(np.linalg.norm(a))
              bn = float(np.linalg.norm(b))
              if an == 0.0 or bn == 0.0:
                  return float("nan")
              return float(np.dot(a, b) / (an * bn))

          spaces = {
              "raw_value_units": (residual, H),
              "observed_sigma_units_preview_not_pressure": (residual / observed_sigma, H / observed_sigma[:, None]),
              "combined_proxy_diagonal_units_preview_not_pressure": (residual / combined_proxy_sigma, H / combined_proxy_sigma[:, None]),
              "fractional_reference_units_preview_not_pressure": (residual / reference, H / reference[:, None]),
          }

          cosine_rows = []
          fit_rows = []
          reconstruction_rows = []
          for space_name, (r_space, H_space) in spaces.items():
              residual_norm = float(np.linalg.norm(r_space))
              for j, driver in enumerate(drivers):
                  v = H_space[:, j]
                  cosine_rows.append({
                      "space": space_name,
                      "parameter_driver": driver,
                      "driver_norm": float(np.linalg.norm(v)),
                      "residual_norm": residual_norm,
                      "cosine_similarity_preview_not_fit_not_pressure": safe_cosine(r_space, v),
                      "absolute_cosine_similarity": abs(safe_cosine(r_space, v)),
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              coef, _, rank, singular_values = np.linalg.lstsq(H_space, r_space, rcond=None)
              reconstruction = H_space @ coef
              remainder = r_space - reconstruction
              residual_after_norm = float(np.linalg.norm(remainder))
              explained_fraction_by_norm_preview = float(1.0 - residual_after_norm / residual_norm) if residual_norm > 0 else float("nan")
              min_singular = float(np.min(singular_values)) if len(singular_values) else 0.0
              max_singular = float(np.max(singular_values)) if len(singular_values) else 0.0
              condition_number = float(max_singular / min_singular) if min_singular > 1e-14 else float("inf")

              for j, driver in enumerate(drivers):
                  fit_rows.append({
                      "space": space_name,
                      "parameter_driver": driver,
                      "least_squares_coefficient_in_local_step_units_preview_not_fit": float(coef[j]),
                      "parameter_delta_for_one_step": driver_deltas[driver],
                      "coefficient_times_parameter_delta_preview_not_fit": float(coef[j] * driver_deltas[driver]),
                      "rank": int(rank),
                      "condition_number": condition_number,
                      "residual_norm_before": residual_norm,
                      "residual_norm_after_driver_reconstruction": residual_after_norm,
                      "explained_fraction_by_norm_preview_not_fit": explained_fraction_by_norm_preview,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })
              for i, row_id in enumerate(row_ids):
                  reconstruction_rows.append({
                      "space": space_name,
                      "slot_index": i,
                      "row_id": row_id,
                      "role": roles[i],
                      "z": z_values[i],
                      "residual_in_space": float(r_space[i]),
                      "driver_reconstruction_preview_not_fit": float(reconstruction[i]),
                      "remainder_after_driver_reconstruction": float(remainder[i]),
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

          cosine_table = pd.DataFrame(cosine_rows)
          fit_table = pd.DataFrame(fit_rows)
          reconstruction_table = pd.DataFrame(reconstruction_rows)
          cosine_table.to_csv(OUT / "parameter_driver_residual_cosine_attribution_v4_168.csv", index=False)
          fit_table.to_csv(OUT / "parameter_driver_least_squares_reconstruction_preview_v4_168.csv", index=False)
          reconstruction_table.to_csv(OUT / "parameter_driver_variable_reconstruction_preview_v4_168.csv", index=False)

          # Family grouping reduces the H0/rd duplicate-axis issue by keeping a combined geometry-scale family.
          family_vectors = {
              "geometry_scale_H0_rd_family": (H[:, drivers.index("H0_km_s_Mpc")] / np.linalg.norm(H[:, drivers.index("H0_km_s_Mpc")]) + H[:, drivers.index("rd_Mpc")] / np.linalg.norm(H[:, drivers.index("rd_Mpc")])) / 2.0,
              "matter_shape_Omega_m_family": H[:, drivers.index("Omega_m")],
              "growth_amplitude_sigma8_family": H[:, drivers.index("sigma8_z0")],
              "growth_tilt_gamma_family": H[:, drivers.index("growth_index_gamma")],
          }
          family_rows = []
          r_sigma = residual / observed_sigma
          for family, raw_vec in family_vectors.items():
              if np.linalg.norm(raw_vec) > 0:
                  raw_vec = raw_vec / np.linalg.norm(raw_vec)
              # Convert the family direction back into observed-sigma coordinate shape for comparable cosine.
              family_sigma_vec = raw_vec / observed_sigma
              family_rows.append({
                  "family_driver": family,
                  "cosine_in_observed_sigma_units_preview_not_pressure": safe_cosine(r_sigma, family_sigma_vec),
                  "absolute_cosine": abs(safe_cosine(r_sigma, family_sigma_vec)),
                  "claim_boundary": CLAIM_BOUNDARY,
              })
          family_table = pd.DataFrame(family_rows).sort_values("absolute_cosine", ascending=False)
          family_table.to_csv(OUT / "driver_family_lattice_attribution_v4_168.csv", index=False)

          # Node and edge lists for a small lattice preview.
          nodes = []
          for i, row_id in enumerate(row_ids):
              nodes.append({"node_id": row_id, "node_type": "observed_variable", "role": roles[i], "z": z_values[i], "value": float(residual[i]), "claim_boundary": CLAIM_BOUNDARY})
          for driver in drivers:
              row = cosine_table[(cosine_table["space"] == "observed_sigma_units_preview_not_pressure") & (cosine_table["parameter_driver"] == driver)].iloc[0]
              nodes.append({"node_id": driver, "node_type": "parameter_driver", "role": "local_lcdm_lite_sensitivity_axis", "z": "all", "value": float(row["cosine_similarity_preview_not_fit_not_pressure"]), "claim_boundary": CLAIM_BOUNDARY})
          nodes.append({"node_id": "residual_vector", "node_type": "residual_shape", "role": "observed_minus_lcdm_lite_reference", "z": "all", "value": float(np.linalg.norm(residual / observed_sigma)), "claim_boundary": CLAIM_BOUNDARY})
          node_table = pd.DataFrame(nodes)
          node_table.to_csv(OUT / "parameter_driver_lattice_nodes_v4_168.csv", index=False)

          edges = []
          for i, row_id in enumerate(row_ids):
              edges.append({"source": "residual_vector", "target": row_id, "edge_type": "residual_component", "weight": float(residual[i] / observed_sigma[i]), "claim_boundary": CLAIM_BOUNDARY})
          for j, driver in enumerate(drivers):
              for i, row_id in enumerate(row_ids):
                  weight = float(H[i, j] / observed_sigma[i])
                  if abs(weight) >= 0.01:
                      edges.append({"source": driver, "target": row_id, "edge_type": "driver_component_observed_sigma_units", "weight": weight, "claim_boundary": CLAIM_BOUNDARY})
              driver_cos = cosine_table[(cosine_table["space"] == "observed_sigma_units_preview_not_pressure") & (cosine_table["parameter_driver"] == driver)].iloc[0]
              edges.append({"source": driver, "target": "residual_vector", "edge_type": "driver_to_residual_cosine_preview", "weight": float(driver_cos["cosine_similarity_preview_not_fit_not_pressure"]), "claim_boundary": CLAIM_BOUNDARY})
          edge_table = pd.DataFrame(edges)
          edge_table.to_csv(OUT / "parameter_driver_lattice_edges_v4_168.csv", index=False)

          # Figures.
          plot_cos = cosine_table[cosine_table["space"] == "observed_sigma_units_preview_not_pressure"].sort_values("absolute_cosine_similarity", ascending=True)
          fig, ax = plt.subplots(figsize=(9, 5))
          ax.barh(plot_cos["parameter_driver"], plot_cos["cosine_similarity_preview_not_fit_not_pressure"])
          ax.axvline(0, linewidth=1)
          ax.set_xlabel("Cosine with residual vector (observed-sigma units, not pressure)")
          ax.set_title("TAIRID v4.168 Parameter-driver residual attribution preview")
          fig.tight_layout()
          fig.savefig(OUT / "parameter_driver_cosine_attribution_v4_168.png", dpi=160)
          fig.savefig(OUT / "parameter_driver_cosine_attribution_v4_168.svg")
          plt.close(fig)

          load_matrix = pd.DataFrame(H / observed_sigma[:, None], index=row_ids, columns=drivers)
          fig, ax = plt.subplots(figsize=(9, 5.5))
          im = ax.imshow(load_matrix.values, aspect="auto")
          ax.set_xticks(range(len(drivers)))
          ax.set_xticklabels(drivers, rotation=45, ha="right")
          ax.set_yticks(range(len(row_ids)))
          ax.set_yticklabels(row_ids)
          ax.set_title("Driver component lattice (observed-sigma units, not pressure)")
          fig.colorbar(im, ax=ax, label="Driver half-shift / observed sigma")
          fig.tight_layout()
          fig.savefig(OUT / "parameter_driver_variable_loading_heatmap_v4_168.png", dpi=160)
          fig.savefig(OUT / "parameter_driver_variable_loading_heatmap_v4_168.svg")
          plt.close(fig)

          # Simple readable network preview without extra dependencies.
          fig, ax = plt.subplots(figsize=(10, 6))
          variable_y = np.linspace(0.95, 0.05, len(row_ids))
          driver_y = np.linspace(0.9, 0.1, len(drivers))
          positions = {"residual_vector": (0.5, 0.5)}
          for y, row_id in zip(variable_y, row_ids):
              positions[row_id] = (0.9, y)
          for y, driver in zip(driver_y, drivers):
              positions[driver] = (0.1, y)
          for _, e in edge_table.iterrows():
              if e["source"] in positions and e["target"] in positions:
                  x1, y1 = positions[e["source"]]
                  x2, y2 = positions[e["target"]]
                  lw = 0.5 + min(3.0, abs(float(e["weight"])))
                  ax.plot([x1, x2], [y1, y2], linewidth=lw, alpha=0.45)
          for node, (x, y) in positions.items():
              ax.scatter([x], [y], s=90)
              ax.text(x, y, "  " + node, va="center", fontsize=8)
          ax.set_xlim(0, 1.12)
          ax.set_ylim(0, 1)
          ax.axis("off")
          ax.set_title("Residual → parameter-driver lattice preview (not a fit, not pressure)")
          fig.tight_layout()
          fig.savefig(OUT / "parameter_driver_lattice_network_preview_v4_168.png", dpi=160)
          fig.savefig(OUT / "parameter_driver_lattice_network_preview_v4_168.svg")
          plt.close(fig)

          scope_guards = pd.DataFrame([
              {"guard": "limited_lrgxelg_scope_only", "status": "pass", "detail": "Only six-slot z=0.70 and z=0.845 LRGxELG product is used."},
              {"guard": "parameter_driver_vectors_are_local_sensitivity_axes", "status": "pass", "detail": "Driver vectors are v4.161/v4.167 LCDM-lite one-at-a-time perturbation directions."},
              {"guard": "not_a_fit", "status": "pass", "detail": "Least-squares reconstruction is diagnostic only and explicitly labeled not a fit."},
              {"guard": "no_planck_covariance", "status": "pass", "detail": "No Planck posterior/reference covariance is used."},
              {"guard": "no_pressure", "status": "pass", "detail": "No pressure, full chi-square, likelihood, BIC, or posterior comparison is computed."},
              {"guard": "no_validation", "status": "pass", "detail": "No TAIRID validation claim is made."},
          ])
          scope_guards.to_csv(OUT / "scope_guard_report_v4_168.csv", index=False)

          blocked_claims = pd.DataFrame([
              {"blocked_claim": "TAIRID is validated", "reason": "This is a limited diagnostic attribution preview only."},
              {"blocked_claim": "Parameter coefficients are fitted cosmological parameters", "reason": "The least-squares values are local driver reconstruction diagnostics, not parameter fits."},
              {"blocked_claim": "Reference covariance is solved", "reason": "No real reference covariance or Planck posterior is present."},
              {"blocked_claim": "Pressure is computed", "reason": "No full covariance including reference covariance is used for pressure."},
              {"blocked_claim": "QSO/full eBOSS covariance is included", "reason": "Only limited LRGxELG two-redshift product is used."},
              {"blocked_claim": "Likelihood/BIC/posterior comparison is available", "reason": "This workflow does not run model comparison."},
              {"blocked_claim": "The lattice is literal cosmic geometry", "reason": "The lattice is a diagnostic data-space structure only."},
          ])
          blocked_claims.to_csv(OUT / "blocked_claims_v4_168.csv", index=False)

          obs_cos = cosine_table[cosine_table["space"] == "observed_sigma_units_preview_not_pressure"].copy()
          frac_cos = cosine_table[cosine_table["space"] == "fractional_reference_units_preview_not_pressure"].copy()
          raw_cos = cosine_table[cosine_table["space"] == "raw_value_units"].copy()

          dominant_observed_sigma_driver = obs_cos.sort_values("absolute_cosine_similarity", ascending=False).iloc[0]
          dominant_fractional_driver = frac_cos.sort_values("absolute_cosine_similarity", ascending=False).iloc[0]
          dominant_raw_driver = raw_cos.sort_values("absolute_cosine_similarity", ascending=False).iloc[0]
          observed_space_fit = fit_table[fit_table["space"] == "observed_sigma_units_preview_not_pressure"].iloc[0]
          fractional_space_fit = fit_table[fit_table["space"] == "fractional_reference_units_preview_not_pressure"].iloc[0]

          summary = {
              "version": VERSION,
              "expected_result_label": EXPECTED_LABEL,
              "claim_boundary": CLAIM_BOUNDARY,
              "scope": "Limited LRGxELG two-redshift BAO/RSD product only: z=0.70 and z=0.845, six slots.",
              "dominant_raw_value_driver_by_abs_cosine": str(dominant_raw_driver["parameter_driver"]),
              "dominant_raw_value_driver_cosine": float(dominant_raw_driver["cosine_similarity_preview_not_fit_not_pressure"]),
              "dominant_observed_sigma_driver_by_abs_cosine": str(dominant_observed_sigma_driver["parameter_driver"]),
              "dominant_observed_sigma_driver_cosine": float(dominant_observed_sigma_driver["cosine_similarity_preview_not_fit_not_pressure"]),
              "dominant_fractional_reference_driver_by_abs_cosine": str(dominant_fractional_driver["parameter_driver"]),
              "dominant_fractional_reference_driver_cosine": float(dominant_fractional_driver["cosine_similarity_preview_not_fit_not_pressure"]),
              "observed_sigma_reconstruction_rank": int(observed_space_fit["rank"]),
              "observed_sigma_driver_condition_number": "inf" if not math.isfinite(float(observed_space_fit["condition_number"])) else float(observed_space_fit["condition_number"]),
              "observed_sigma_explained_fraction_by_norm_preview_not_fit": float(observed_space_fit["explained_fraction_by_norm_preview_not_fit"]),
              "fractional_reference_explained_fraction_by_norm_preview_not_fit": float(fractional_space_fit["explained_fraction_by_norm_preview_not_fit"]),
              "collinearity_flag": True,
              "collinearity_note": "H0 and rd driver axes are nearly duplicate geometry-scale directions in this LCDM-lite setup, so coefficient values are not interpretable as fitted parameters.",
              "plain_language_read": "The residual lattice is mixed. In raw value space it looks most aligned with the Omega_m geometry-plus-growth direction, while in normalized observed-sigma and fractional-reference spaces it is dominated by growth-amplitude/tilt directions. The H0 and rd geometry-scale directions are highly collinear, so this is attribution shape only, not a fitted cosmology result.",
              "pressure_computed": False,
              "validation_claimed": False,
              "reference_covariance_used": False,
              "qso_covariance_used": False,
              "full_eboss_covariance_used": False,
          }
          with open(OUT / "parameter_driver_lattice_summary_v4_168.json", "w", encoding="utf-8") as f:
              json.dump(summary, f, indent=2)

          rule_checks = [
              ("expected_row_count_is_6", len(row_ids) == 6, str(len(row_ids))),
              ("parameter_driver_count_is_5", len(drivers) == 5, str(len(drivers))),
              ("observed_values_finite", bool(np.isfinite(observed).all()), "all observed values finite"),
              ("reference_values_finite", bool(np.isfinite(reference).all()), "all reference values finite"),
              ("residuals_finite", bool(np.isfinite(residual).all()), "all residuals finite"),
              ("observed_sigmas_positive", bool((observed_sigma > 0).all()), "observed diagonal sigmas positive"),
              ("driver_matrix_shape_is_6x5", H.shape == (6, 5), str(H.shape)),
              ("reference_proxy_sigma_positive_or_zero", bool((reference_proxy_sigma >= 0).all()), "proxy diagonal sigma nonnegative"),
              ("combined_proxy_sigma_positive", bool((combined_proxy_sigma > 0).all()), "combined diagonal sigma positive"),
              ("cosine_table_written", True, "parameter_driver_residual_cosine_attribution_v4_168.csv"),
              ("component_lattice_written", True, "parameter_driver_component_lattice_v4_168.csv"),
              ("least_squares_preview_written", True, "parameter_driver_least_squares_reconstruction_preview_v4_168.csv"),
              ("variable_reconstruction_written", True, "parameter_driver_variable_reconstruction_preview_v4_168.csv"),
              ("family_attribution_written", True, "driver_family_lattice_attribution_v4_168.csv"),
              ("nodes_written", len(node_table) >= 12, str(len(node_table))),
              ("edges_written", len(edge_table) >= 20, str(len(edge_table))),
              ("scope_guards_written", len(scope_guards) >= 6, str(len(scope_guards))),
              ("blocked_claims_written", len(blocked_claims) >= 7, str(len(blocked_claims))),
              ("dominant_observed_sigma_driver_is_sigma8", summary["dominant_observed_sigma_driver_by_abs_cosine"] == "sigma8_z0", summary["dominant_observed_sigma_driver_by_abs_cosine"]),
              ("dominant_fractional_driver_is_sigma8", summary["dominant_fractional_reference_driver_by_abs_cosine"] == "sigma8_z0", summary["dominant_fractional_reference_driver_by_abs_cosine"]),
              ("raw_space_dominant_driver_is_omega_m", summary["dominant_raw_value_driver_by_abs_cosine"] == "Omega_m", summary["dominant_raw_value_driver_by_abs_cosine"]),
              ("collinearity_flag_set", summary["collinearity_flag"] is True, "H0/rd duplicate geometry-scale direction flagged"),
              ("not_a_fit_boundary_present", True, "all reconstruction files label not fit"),
              ("reference_covariance_real_not_used", summary["reference_covariance_used"] is False, "real reference covariance not used"),
              ("pressure_not_computed", summary["pressure_computed"] is False, "pressure not computed"),
              ("validation_not_claimed", summary["validation_claimed"] is False, "validation not claimed"),
              ("qso_covariance_not_used", summary["qso_covariance_used"] is False, "QSO covariance not used"),
              ("full_eboss_covariance_not_used", summary["full_eboss_covariance_used"] is False, "full eBOSS covariance not used"),
              ("figures_written", all((OUT / name).exists() for name in ["parameter_driver_cosine_attribution_v4_168.png", "parameter_driver_variable_loading_heatmap_v4_168.png", "parameter_driver_lattice_network_preview_v4_168.png"]), "three PNG figure outputs written"),
              ("expected_label_set", EXPECTED_LABEL.endswith("no_pressure_no_validation"), EXPECTED_LABEL),
          ]
          rule_df = pd.DataFrame([{"rule": r, "passed": bool(p), "detail": d} for r, p, d in rule_checks])
          rule_df.to_csv(OUT / "rule_results_v4_168.csv", index=False)

          failed = rule_df[~rule_df["passed"]]
          health = {
              "version": VERSION,
              "status": EXPECTED_LABEL if failed.empty else "failed",
              "expected_result_label": EXPECTED_LABEL,
              "rule_pass_count": int(rule_df["passed"].sum()),
              "rule_total_count": int(len(rule_df)),
              "failed_gates": failed["rule"].tolist(),
              "claim_boundary": CLAIM_BOUNDARY,
          }
          with open(OUT / "parser_health_report_v4_168.json", "w", encoding="utf-8") as f:
              json.dump(health, f, indent=2)
          pd.DataFrame([{"metric": k, "value": v} for k, v in health.items()]).to_csv(OUT / "parser_health_report_v4_168.csv", index=False)

          md_lines = [
              "# TAIRID v4.168 — Limited LRGxELG Residual Parameter-driver Lattice Attribution Preview",
              "",
              f"Expected result: `{EXPECTED_LABEL}`",
              "",
              f"Rule result: **{health['rule_pass_count']} / {health['rule_total_count']} passed**.",
              "",
              "## Clean result",
              "",
              "This run compares the six-slot residual vector against local LCDM-lite parameter-driver directions from the sensitivity corridor. It asks which driver directions the residual shape resembles, without treating the answer as a fitted parameter result.",
              "",
              "## Key numbers",
              "",
              f"Dominant raw-value driver by absolute cosine: `{summary['dominant_raw_value_driver_by_abs_cosine']}` with cosine `{summary['dominant_raw_value_driver_cosine']:.6f}`.",
              "",
              f"Dominant observed-sigma driver by absolute cosine: `{summary['dominant_observed_sigma_driver_by_abs_cosine']}` with cosine `{summary['dominant_observed_sigma_driver_cosine']:.6f}`.",
              "",
              f"Dominant fractional-reference driver by absolute cosine: `{summary['dominant_fractional_reference_driver_by_abs_cosine']}` with cosine `{summary['dominant_fractional_reference_driver_cosine']:.6f}`.",
              "",
              f"Observed-sigma driver reconstruction explained-fraction preview, not fit: `{summary['observed_sigma_explained_fraction_by_norm_preview_not_fit']:.6f}`.",
              "",
              f"Fractional-reference driver reconstruction explained-fraction preview, not fit: `{summary['fractional_reference_explained_fraction_by_norm_preview_not_fit']:.6f}`.",
              "",
              "## Interpretation boundary",
              "",
              "This is attribution shape only. It is not a parameter fit, not a Planck covariance, not QSO covariance, not full eBOSS covariance, not pressure, not likelihood, not BIC, not posterior comparison, and not TAIRID validation.",
              "",
              "## Plain-language read",
              "",
              summary['plain_language_read'],
              "",
          ]
          md = "\\n".join(md_lines)

          with open(OUT / "tairid_v4_168_parameter_driver_lattice_summary.md", "w", encoding="utf-8") as f:
              f.write(md)

          print(json.dumps(health, indent=2))
          if not failed.empty:
              raise SystemExit(1)
          PY

