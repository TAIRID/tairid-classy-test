name: 000 TAIRID v4.191 - Neurotype Numeric Empirical Extraction From Uploaded Papers With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-191-neurotype-numeric-empirical-extraction-from-uploaded-papers-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"
      - "papers/**"

permissions:
  contents: read

jobs:
  v4-191-neurotype-numeric-extraction:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.191 neurotype numeric empirical extraction
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_191_outputs
          cat > tairid_v4_191_outputs/run_v4_191.py <<'PY'
          import csv
          import json
          import math
          import os
          import re
          import zipfile
          import xml.etree.ElementTree as ET
          from pathlib import Path

          OUT = Path("tairid_v4_191_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "neurotype_numeric_empirical_extraction_from_uploaded_papers_passed_numeric_anchor_table_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "numeric anchors are not external replication",
              "TAIRID not proved"
          ]

          # v4.190 reviewed result.
          V4_190_STATUS = {
              "version": "v4.190",
              "rule_pass_count": 11,
              "rule_total_count": 11,
              "failed_gates": [],
              "promoted_core_rows": 10,
              "holdout_do_not_force_rows": 4,
              "direct_locked_signature_matches_in_promoted_rows": 6,
              "selected_next_route": "neurotype_numeric_empirical_extraction_from_uploaded_papers_with_scope_guards"
          }

          # These are the paper-grounded numeric targets already locked from the uploaded corpus review.
          # v4.191 tries to verify them from committed paper files when those files exist.
          NUMERIC_ANCHOR_TARGETS = [
              {
                  "lane": "Dyslexia",
                  "case_id": "Dyslexia_ETDD70_reading_flow_viability_window",
                  "source_file_hint": "TAIRID_ETDD70_Viability_Window_Paper_Draft_v0_1",
                  "metric": "four_axis_model_balanced_accuracy",
                  "expected_value": "0.857",
                  "expected_text_patterns": "0.857|balanced accuracy|bAcc",
                  "role_axis": "shape_model_quality",
                  "direction_dependency": "supports paper-grounded row, not a direction by itself",
                  "evidence_status_if_found": "paper_numeric_anchor_verified"
              },
              {
                  "lane": "Dyslexia",
                  "case_id": "Dyslexia_ETDD70_reading_flow_viability_window",
                  "source_file_hint": "TAIRID_ETDD70_Viability_Window_Paper_Draft_v0_1",
                  "metric": "four_axis_model_auc",
                  "expected_value": "0.932",
                  "expected_text_patterns": "0.932|AUC",
                  "role_axis": "shape_model_quality",
                  "direction_dependency": "supports paper-grounded row, not a direction by itself",
                  "evidence_status_if_found": "paper_numeric_anchor_verified"
              },
              {
                  "lane": "Aphantasia",
                  "case_id": "Aphantasia_visual_reconstruction_response_gap",
                  "source_file_hint": "TAIRID_Aphantasia_Reconstruction_Response_Geometry_v0_6",
                  "metric": "drawing_burden_effect_size_d",
                  "expected_value": "1.013",
                  "expected_text_patterns": "1.013|drawing burden|d = 1.013|d=1.013",
                  "role_axis": "visual_reconstruction_burden",
                  "direction_dependency": "supports lower visual reconstruction/re-entry viability lane",
                  "evidence_status_if_found": "paper_numeric_anchor_verified"
              },
              {
                  "lane": "Aphantasia",
                  "case_id": "Aphantasia_visual_reconstruction_response_gap",
                  "source_file_hint": "TAIRID_Aphantasia_Reconstruction_Response_Geometry_v0_6",
                  "metric": "physiology_burden_effect_size_d",
                  "expected_value": "1.553",
                  "expected_text_patterns": "1.553|physiology burden|d = 1.553|d=1.553",
                  "role_axis": "physiology_response_burden",
                  "direction_dependency": "supports mismatch/load burden lane",
                  "evidence_status_if_found": "paper_numeric_anchor_verified"
              },
              {
                  "lane": "ADHD",
                  "case_id": "ADHD_ds003500_selective_attention_width_over_depth",
                  "source_file_hint": "TAIRID_ADHD_Width_over_Depth_Vulnerability_Paper",
                  "metric": "width_pressure_direction",
                  "expected_value": "higher",
                  "expected_text_patterns": "higher signal-width pressure|width/gate instability|lower task viability|lower task depth",
                  "role_axis": "propagation_reach_plus_consolidation_minus",
                  "direction_dependency": "supports ++- shape row",
                  "evidence_status_if_found": "paper_directional_numeric_or_text_anchor_verified"
              },
              {
                  "lane": "Autism",
                  "case_id": "Autism_measured_dispersion_search_correction",
                  "source_file_hint": "TAIRID_Autism_Reference_Field_Organization_Paper",
                  "metric": "model_correction_direction",
                  "expected_value": "dispersion_search_not_compact_depth_universal",
                  "expected_text_patterns": "prediction failed|too simple|dispersion|search|lower boundary precision|lower boundary compaction",
                  "role_axis": "correction_guardrail",
                  "direction_dependency": "supports corrected ++- measured lane and holdout compact-depth lane",
                  "evidence_status_if_found": "paper_correction_anchor_verified"
              },
              {
                  "lane": "Bipolar",
                  "case_id": "Bipolar_depressive_compressed_rhythm_basin",
                  "source_file_hint": "TAIRID_Bipolar_Phase_Cycling_Paper",
                  "metric": "depression_side_compression_pattern",
                  "expected_value": "reduced_beta_swing_reduced_sA_swing_reduced_V_swing_positive_boundary_compression",
                  "expected_text_patterns": "reduced beta_swing|reduced s_A_swing|reduced V_swing|boundary-compression|boundary compression",
                  "role_axis": "compressed_consolidation_heavy_basin",
                  "direction_dependency": "supports --+ constraint row with quality warning",
                  "evidence_status_if_found": "paper_directional_numeric_or_text_anchor_verified"
              },
              {
                  "lane": "Schizotypy",
                  "case_id": "Schizotypy_positive_reference_field_overreach",
                  "source_file_hint": "TAIRID_Schizotypal_Reference_Field_Overreach_Paper",
                  "metric": "weak_false_anchor_acceptance_pattern",
                  "expected_value": "weak_lure_unrelated_lure_acceptance_more_than_target_recognition",
                  "expected_text_patterns": "weak|false-anchor|false anchor|lure|target recognition|anchor specificity",
                  "role_axis": "reference_field_overreach_anchor_integrity",
                  "direction_dependency": "supports ++- positive overreach row",
                  "evidence_status_if_found": "paper_directional_numeric_or_text_anchor_verified"
              }
          ]

          PROMOTED_CORE_ROWS = [
              {"case_id": "ADHD_ds003500_selective_attention_width_over_depth", "lane": "ADHD", "signature": "++-", "promotion_tier": "core_promote"},
              {"case_id": "ADHD_EEG_arousal_constraint_lane", "lane": "ADHD", "signature": "--+", "promotion_tier": "constraint_promote"},
              {"case_id": "Dyslexia_ETDD70_reading_flow_viability_window", "lane": "Dyslexia", "signature": "++-", "promotion_tier": "core_promote"},
              {"case_id": "Aphantasia_visual_reconstruction_response_gap", "lane": "Aphantasia", "signature": "-+-", "promotion_tier": "core_promote"},
              {"case_id": "Aphantasia_preserved_input_effort_support_lane", "lane": "Aphantasia", "signature": "0+0", "promotion_tier": "constraint_promote"},
              {"case_id": "Autism_measured_dispersion_search_correction", "lane": "Autism", "signature": "++-", "promotion_tier": "core_promote"},
              {"case_id": "Bipolar_depressive_compressed_rhythm_basin", "lane": "Bipolar", "signature": "--+", "promotion_tier": "constraint_promote"},
              {"case_id": "Bipolar_mania_hypomania_propagation_expansion", "lane": "Bipolar", "signature": "++-", "promotion_tier": "provisional_promote"},
              {"case_id": "Bipolar_euthymia_reference_rhythm", "lane": "Bipolar", "signature": "00+", "promotion_tier": "reference_promote"},
              {"case_id": "Schizotypy_positive_reference_field_overreach", "lane": "Schizotypy", "signature": "++-", "promotion_tier": "core_promote"}
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def read_docx_text(path):
              try:
                  with zipfile.ZipFile(path) as zf:
                      names = [n for n in zf.namelist() if n.startswith("word/") and n.endswith(".xml")]
                      text_parts = []
                      for name in names:
                          if name not in ["word/document.xml"] and not name.startswith("word/footnotes") and not name.startswith("word/endnotes"):
                              continue
                          data = zf.read(name)
                          root = ET.fromstring(data)
                          for elem in root.iter():
                              if elem.tag.endswith("}t") and elem.text:
                                  text_parts.append(elem.text)
                      return " ".join(text_parts)
              except Exception as exc:
                  return "DOCX_READ_ERROR " + type(exc).__name__ + ": " + str(exc)[:200]

          def read_pdf_text_fallback(path):
              # Dependency-free fallback. It is not full OCR; it only catches plain embedded text.
              try:
                  data = path.read_bytes()
                  text = data.decode("latin-1", errors="ignore")
                  text = re.sub(r"[^A-Za-z0-9_\.\-\+\=\s:/,%()]+", " ", text)
                  text = re.sub(r"\s+", " ", text)
                  return text
              except Exception as exc:
                  return "PDF_FALLBACK_READ_ERROR " + type(exc).__name__ + ": " + str(exc)[:200]

          def read_text(path):
              suffix = path.suffix.lower()
              if suffix == ".docx":
                  return read_docx_text(path)
              if suffix == ".pdf":
                  return read_pdf_text_fallback(path)
              try:
                  return path.read_text(encoding="utf-8", errors="replace")
              except Exception:
                  try:
                      return path.read_text(encoding="latin-1", errors="replace")
                  except Exception as exc:
                      return "TEXT_READ_ERROR " + type(exc).__name__ + ": " + str(exc)[:200]

          def find_candidate_files():
              roots = [
                  Path("data/neurotype"),
                  Path("data/cross_domain"),
                  Path("data/reference"),
                  Path("papers"),
                  Path(".")
              ]
              allowed = {".docx", ".pdf", ".txt", ".md", ".csv"}
              found = []
              seen = set()
              for root in roots:
                  if not root.exists():
                      continue
                  for path in root.rglob("*"):
                      if path.is_file() and path.suffix.lower() in allowed:
                          if any(skip in str(path) for skip in [".git/", "tairid_v4_191_outputs"]):
                              continue
                          key = str(path)
                          if key not in seen:
                              seen.add(key)
                              found.append(path)
              return found

          def pattern_hit(text, pattern_blob):
              patterns = [p.strip() for p in pattern_blob.split("|") if p.strip()]
              low = text.lower()
              hit_terms = []
              for pat in patterns:
                  if pat.lower() in low:
                      hit_terms.append(pat)
              return bool(hit_terms), ";".join(hit_terms)

          candidate_files = find_candidate_files()
          inventory_rows = []
          file_text_cache = {}
          for path in candidate_files:
              text = read_text(path)
              file_text_cache[str(path)] = text
              inventory_rows.append({
                  "file_path": str(path),
                  "suffix": path.suffix.lower(),
                  "text_chars_read": len(text),
                  "read_status": "ok" if not text.startswith(("DOCX_READ_ERROR", "PDF_FALLBACK_READ_ERROR", "TEXT_READ_ERROR")) else text[:120],
              })

          anchor_rows = []
          verified_count = 0
          file_match_count = 0
          for target in NUMERIC_ANCHOR_TARGETS:
              matched_files = []
              matched_terms = []
              for path_str, text in file_text_cache.items():
                  name_hit = target["source_file_hint"].lower() in Path(path_str).name.lower()
                  content_hit, terms = pattern_hit(text, target["expected_text_patterns"])
                  if name_hit or content_hit:
                      if content_hit:
                          matched_terms.append(terms)
                      matched_files.append(path_str)
              verified = bool(matched_files and any(t for t in matched_terms))
              if verified:
                  verified_count += 1
              if matched_files:
                  file_match_count += 1
              anchor_rows.append({
                  "lane": target["lane"],
                  "case_id": target["case_id"],
                  "metric": target["metric"],
                  "expected_value_or_direction": target["expected_value"],
                  "role_axis": target["role_axis"],
                  "direction_dependency": target["direction_dependency"],
                  "source_file_hint": target["source_file_hint"],
                  "expected_text_patterns": target["expected_text_patterns"],
                  "matched_files": ";".join(matched_files[:5]),
                  "matched_terms": ";".join([m for m in matched_terms if m][:8]),
                  "verification_status": target["evidence_status_if_found"] if verified else ("candidate_file_found_but_anchor_not_verified" if matched_files else "source_file_not_found_in_repo"),
                  "safe_use": "numeric_anchor_screen_only_not_validation",
              })

          # Create numeric extraction rows usable by next shape scoring pass.
          numeric_shape_rows = []
          lane_anchor_counts = {}
          for row in anchor_rows:
              lane_anchor_counts[row["case_id"]] = lane_anchor_counts.get(row["case_id"], 0) + (1 if "verified" in row["verification_status"] else 0)

          for row in PROMOTED_CORE_ROWS:
              numeric_shape_rows.append({
                  "domain": "neurotype_cognition",
                  "lane": row["lane"],
                  "case_id": row["case_id"],
                  "shape_signature": row["signature"],
                  "promotion_tier": row["promotion_tier"],
                  "verified_numeric_or_text_anchor_count": lane_anchor_counts.get(row["case_id"], 0),
                  "numeric_extraction_status": "repo_verified_anchor_present" if lane_anchor_counts.get(row["case_id"], 0) else "paper_grounded_but_numeric_anchor_not_verified_in_repo",
                  "next_numeric_need": "extract full numeric table, group means, SD/SE, model scores, and covariance where available",
                  "safe_use": "do not treat sign-only row as external validation",
              })

          coverage_rows = []
          by_lane = {}
          for a in anchor_rows:
              by_lane.setdefault(a["lane"], {"targets": 0, "verified": 0, "candidate": 0})
              by_lane[a["lane"]]["targets"] += 1
              if "verified" in a["verification_status"]:
                  by_lane[a["lane"]]["verified"] += 1
              if a["matched_files"]:
                  by_lane[a["lane"]]["candidate"] += 1
          for lane, vals in sorted(by_lane.items()):
              coverage_rows.append({
                  "lane": lane,
                  "anchor_targets": vals["targets"],
                  "verified_anchors": vals["verified"],
                  "candidate_file_matches": vals["candidate"],
                  "coverage_status": "some_verified" if vals["verified"] else ("files_found_no_anchor_verified" if vals["candidate"] else "missing_source_files"),
              })

          extraction_priority = [
              {
                  "priority": 1,
                  "lane": "Dyslexia",
                  "why": "already has explicit model metrics and axis pattern",
                  "next_action": "extract s_A, lambda_R, rho_R, V_data means/SD and model metrics from ETDD70 paper/output"
              },
              {
                  "priority": 2,
                  "lane": "Aphantasia",
                  "why": "already has explicit effect sizes and two-shape lane",
                  "next_action": "extract drawing burden d, physiology burden d, and available rho/lambda/V axes"
              },
              {
                  "priority": 3,
                  "lane": "ADHD",
                  "why": "direct ds003500 behavioral lane maps cleanly to width/depth/gate/viability",
                  "next_action": "extract actual group means or standardized deltas for width, depth, gate stability, and viability"
              },
              {
                  "priority": 4,
                  "lane": "Autism",
                  "why": "important correction lane; prevents forced compact-depth claim",
                  "next_action": "extract dispersion/search and boundary-compaction numbers from ASD-vs-TD outputs"
              },
              {
                  "priority": 5,
                  "lane": "Bipolar",
                  "why": "phase-specific lane; needs numeric phase split",
                  "next_action": "extract beta_swing, s_A_swing, V_swing, compression scores by phase"
              },
              {
                  "priority": 6,
                  "lane": "Schizotypy",
                  "why": "trait-lane split is structurally important",
                  "next_action": "extract target/lure/anchor integrity measures by positive/disorganized/negative traits"
              }
          ]

          write_csv(OUT / "v4_191_v4_190_status_review.csv", [V4_190_STATUS], list(V4_190_STATUS.keys()))
          (OUT / "v4_191_v4_190_status_review.json").write_text(json.dumps(V4_190_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_191_repo_paper_file_inventory.csv", inventory_rows, ["file_path", "suffix", "text_chars_read", "read_status"])
          write_csv(OUT / "v4_191_numeric_anchor_extraction_table.csv", anchor_rows, ["lane", "case_id", "metric", "expected_value_or_direction", "role_axis", "direction_dependency", "source_file_hint", "expected_text_patterns", "matched_files", "matched_terms", "verification_status", "safe_use"])
          write_csv(OUT / "v4_191_numeric_shape_input_candidates.csv", numeric_shape_rows, ["domain", "lane", "case_id", "shape_signature", "promotion_tier", "verified_numeric_or_text_anchor_count", "numeric_extraction_status", "next_numeric_need", "safe_use"])
          write_csv(OUT / "v4_191_numeric_anchor_coverage_by_lane.csv", coverage_rows, ["lane", "anchor_targets", "verified_anchors", "candidate_file_matches", "coverage_status"])
          write_csv(OUT / "v4_191_next_numeric_extraction_priority.csv", extraction_priority, ["priority", "lane", "why", "next_action"])

          if verified_count >= 4:
              package_status = "numeric_anchors_partially_verified_from_repo_files"
              selected_next_route = "neurotype_numeric_shape_score_builder_with_scope_guards"
          elif file_match_count > 0:
              package_status = "candidate_paper_files_found_but_numeric_anchor_verification_partial_or_missing"
              selected_next_route = "neurotype_paper_text_extraction_repair_or_manual_numeric_table_with_scope_guards"
          else:
              package_status = "no_uploaded_paper_files_found_in_repo_numeric_targets_written"
              selected_next_route = "upload_or_commit_neurotype_papers_or_manual_numeric_table_with_scope_guards"

          route_decision = {
              "version": "v4.191",
              "result_label": RESULT_LABEL,
              "clean_result": "Numeric anchor targets were written and, where paper files existed in the repository, scanned for anchor verification.",
              "candidate_files_found": len(candidate_files),
              "numeric_anchor_targets": len(NUMERIC_ANCHOR_TARGETS),
              "verified_anchor_count": verified_count,
              "candidate_file_match_count": file_match_count,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "numeric anchor extraction screen only; not external replication or validation",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_191_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_191_scope_guards.json").write_text(json.dumps({
              "scope": "neurotype numeric anchor extraction from uploaded or committed paper files",
              "numeric_anchors_are_external_validation": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "neurotype_validation_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_191_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.191 - Neurotype Numeric Empirical Extraction From Uploaded Papers",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "This workflow turns the v4.190 promoted neurotype rows into numeric anchor targets and scans committed paper files if present.",
              "",
              "Candidate files found: `" + str(len(candidate_files)) + "`",
              "Numeric anchor targets: `" + str(len(NUMERIC_ANCHOR_TARGETS)) + "`",
              "Verified anchors: `" + str(verified_count) + "`",
              "",
              "Package status: `" + package_status + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_191_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_191_v4_190_status_review.csv",
              "v4_191_v4_190_status_review.json",
              "v4_191_repo_paper_file_inventory.csv",
              "v4_191_numeric_anchor_extraction_table.csv",
              "v4_191_numeric_shape_input_candidates.csv",
              "v4_191_numeric_anchor_coverage_by_lane.csv",
              "v4_191_next_numeric_extraction_priority.csv",
              "v4_191_route_decision.json",
              "v4_191_scope_guards.json",
              "v4_191_blocked_claims.json",
              "v4_191_summary.md"
          ]

          rules = {
              "version_is_v4_191": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_190_status_reviewed": V4_190_STATUS["rule_pass_count"] == 11,
              "numeric_anchor_targets_present": len(NUMERIC_ANCHOR_TARGETS) >= 8,
              "numeric_shape_candidates_present": len(numeric_shape_rows) == len(PROMOTED_CORE_ROWS),
              "coverage_rows_present": len(coverage_rows) >= 5,
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True,
              "next_route_selected": bool(selected_next_route)
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.191",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "candidate_files_found": len(candidate_files),
              "numeric_anchor_targets": len(NUMERIC_ANCHOR_TARGETS),
              "verified_anchor_count": verified_count,
              "candidate_file_match_count": file_match_count,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "numeric_anchor_extraction_screen_only_no_validation"
          }

          (OUT / "v4_191_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.191 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_191_outputs/run_v4_191.py

      - name: Upload v4.191 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-191-neurotype-numeric-empirical-extraction-from-uploaded-papers-output
          path: tairid_v4_191_outputs/
