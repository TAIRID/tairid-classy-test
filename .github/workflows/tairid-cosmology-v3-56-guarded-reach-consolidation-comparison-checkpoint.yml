              and row["normalized_surface_direction"] == "consolidation_negative"
              and row["diagnostic_role"] == "source_specific_growth_diagnostic"
              and float(row["carried_value"]) < 0
              and row["model_anchor_allowed_now"] is False
              for row in SURFACE_ROWS
