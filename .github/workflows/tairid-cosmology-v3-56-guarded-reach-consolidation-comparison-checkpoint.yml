              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior, or model comparison.",
              "This does not compute new pressure scores.",
              "This builds one guarded diagnostic checkpoint ledger from already-reviewed rows.",
              "H0LiCOW remains a diagnostic non-BAO time-delay reach candidate.",
              "KiDS remains a diagnostic growth/consolidation pressure row.",
              "BAO remains auxiliary mixed/ruler boundary and is not a global reach anchor.",
