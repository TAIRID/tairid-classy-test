              row["surface_id"] == "bao_mixed_ruler_boundary"
              and row["diagnostic_role"] == "auxiliary_ruler_boundary_not_surface_anchor"
              and row["normalized_surface_direction"] == "not_global_reach_anchor"
              for row in SURFACE_ROWS
          )

          parked_blocked_preserved = all(
              any(row["surface_id"] == needed for row in SURFACE_ROWS)
              for needed in ["shoes_local_ladder_parked", "tdcosmo_time_delay_parked", "desi_mapped_reach_blocked"]
          )

