          no_one_surface_collapse = all(row["one_surface_collapse_allowed"] is False for row in CHECKPOINT_ROWS)
          no_numeric_combination = all(row["numeric_combination_built"] is False for row in CHECKPOINT_ROWS)
          no_bic = all(row["bic_computed"] is False for row in CHECKPOINT_ROWS)
          no_likelihood = all(row["likelihood_computed"] is False for row in CHECKPOINT_ROWS)
          no_posterior = all(row["posterior_computed"] is False for row in CHECKPOINT_ROWS)
          no_refit = all(row["refit_run"] is False for row in CHECKPOINT_ROWS) and all(row["refit_allowed_now"] is False for row in all_contract_rows)
          no_new_scores = all(row["new_pressure_score_built"] is False for row in all_contract_rows)
          no_model_anchors = all(row["model_anchor_allowed_now"] is False for row in all_contract_rows)
