                  "pass": h0licow_ok,
                  "value": h0licow_ok,
                  "boundary": "H0LiCOW remains reach-positive-equivalent diagnostic only."
              },
              {
                  "audit_gate": "kids_consolidation_surface_preserved",
                  "pass": kids_ok,
                  "value": kids_ok,
                  "boundary": "KiDS remains consolidation-negative diagnostic only."
              },
              {
                  "audit_gate": "bao_auxiliary_boundary_preserved",
