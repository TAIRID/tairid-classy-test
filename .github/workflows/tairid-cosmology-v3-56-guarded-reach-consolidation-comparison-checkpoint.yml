          md.append("|---|---|---|---|")
          md.append("| `H0LiCOW` | reach diagnostic | `reach_positive_equivalent` | preserved |")
          md.append("| `KiDS-1000 / Planck` | growth diagnostic | `consolidation_negative` | preserved |")
          md.append("| `BAO` | auxiliary mixed/ruler boundary | `not_global_reach_anchor` | preserved |")
