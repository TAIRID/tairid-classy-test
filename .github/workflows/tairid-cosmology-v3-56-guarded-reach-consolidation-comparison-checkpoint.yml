              and "BIC" in NEXT_TEST_QUEUE[0]["must_not_include"]
              and "likelihood" in NEXT_TEST_QUEUE[0]["must_not_include"]
              and "validation claim" in NEXT_TEST_QUEUE[0]["must_not_include"]
