name: 000 TAIRID v4.110 Rank Aware Covariance Stabilization Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-110-rank-aware-covariance-stabilization-design.yml"

jobs:
  tairid-v4-110-rank-aware-covariance-stabilization-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.110 rank aware covariance stabilization design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_110_rank_aware_covariance_stabilization_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_110_rank_aware_covariance_stabilization_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_110_rank_aware_covariance_stabilization_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new weighted mean values.",
              "This does not compute a new weighted covariance matrix.",
              "This does not compute a regularized covariance matrix.",
              "This does not compute Planck reference uncertainty.",
              "This designs a rank-aware covariance stabilization policy after v4.109 rejected the broader covariance mechanics as final reference uncertainty.",
              "A pass means the stabilization policy is explicit and ready for a bounded regularized covariance probe."
          ]

          UPSTREAM_LOCKS = {
              "v4_109_broader_reference_uncertainty_sufficiency_gate": {
                  "readiness_label": "broader_reference_uncertainty_sufficiency_gate_passed_not_final_ready_for_rank_aware_covariance_stabilization_design",
                  "mechanics_gate_passed": True,
                  "final_reference_uncertainty_sufficient": False,
                  "final_reference_uncertainty_rejected": True,
                  "rank_aware_stabilization_required": True,
                  "upstream_sample_output_vector_count": 1024,
                  "upstream_effective_sample_size": 624.5301884527668,
                  "upstream_contributing_solved_member_count": 4,
                  "full_covariance_dimension": 10,
                  "full_covariance_rank": 7,
                  "full_rank_missing_dimensions": 3,
                  "fsigma8_covariance_dimension": 5,
                  "fsigma8_covariance_rank": 4,
                  "fsigma8_rank_missing_dimensions": 1,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_108_1_broader_covariance_mechanics_probe_variable_scope_repair": {
                  "readiness_label": "broader_covariance_mechanics_probe_passed_ready_for_broader_reference_uncertainty_sufficiency_gate",
                  "sample_output_vector_count": 1024,
                  "effective_sample_size": 624.5301884527668,
                  "weighted_mean_vector_computed": True,
                  "weighted_covariance_matrix_computed": True,
                  "fsigma8_covariance_matrix_computed": True,
                  "full_covariance_rank": 7,
                  "fsigma8_covariance_rank": 4,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          STABILIZATION_POLICY = {
              "policy_id": "rank_aware_covariance_stabilization_v1",
              "policy_status": "design_only_not_applied",
              "primary_target": "fsigma8_5x5_reference_covariance",
              "secondary_target": "full_10x10_sigma8z_fsigma8_covariance",
              "reason_for_policy": "v4.109 showed mechanics pass but rank deficiency: full covariance rank 7/10 and fsigma8 rank 4/5.",
              "regularization_allowed_next_probe": True,
              "regularization_applied_now": False,
              "Planck_reference_uncertainty_allowed_now": False,
              "final_RSD_pressure_allowed_now": False,
              "validation_claim_allowed_now": False
          }

          STABILIZATION_STEPS = [
              {
                  "step": 1,
                  "operation": "Load v4.108.1 mean and covariance mechanics outputs.",
                  "required_input": "mean vector, full 10x10 covariance, fsigma8 5x5 covariance, rank diagnostics, effective sample size.",
                  "output": "Input integrity record.",
                  "computed_now": False
              },
              {
                  "step": 2,
                  "operation": "Symmetrize covariance matrices again before stabilization.",
                  "required_input": "C and C_fsigma8 from mechanics output.",
                  "output": "C_sym = (C + C^T)/2.",
                  "computed_now": False
              },
              {
                  "step": 3,
                  "operation": "Eigen-decompose each covariance matrix.",
                  "required_input": "Symmetric covariance matrices.",
                  "output": "Eigenvalues, eigenvectors, condition diagnostics.",
                  "computed_now": False
              },
              {
                  "step": 4,
                  "operation": "Apply a transparent eigenvalue floor to nonpositive or near-zero eigenvalues.",
                  "required_input": "Eigenvalue spectrum and floor policy.",
                  "output": "Rank-stabilized covariance matrices.",
                  "computed_now": False
              },
              {
                  "step": 5,
                  "operation": "Apply optional shrinkage/diagonal loading as a sensitivity lane, not as the primary hidden result.",
                  "required_input": "Covariance matrices and diagonal scale.",
                  "output": "Sensitivity matrices for comparison.",
                  "computed_now": False
              },
              {
                  "step": 6,
                  "operation": "Compute inverse or pseudoinverse diagnostics only after stabilization.",
                  "required_input": "Rank-stabilized covariance matrices.",
                  "output": "Invertibility/condition records.",
                  "computed_now": False
              },
              {
                  "step": 7,
                  "operation": "Preserve claim boundary: regularized diagnostic is not final Planck reference uncertainty.",
                  "required_input": "Blocked claims and sufficiency criteria.",
                  "output": "Route to regularized reference covariance probe.",
                  "computed_now": False
              }
          ]

          FLOOR_POLICY = [
              {
                  "floor_id": "relative_eigen_floor",
                  "formula": "lambda_floor = max(lambda_max * 1e-8, median_positive_lambda * 1e-6)",
                  "purpose": "Prevent zero or tiny eigenvalues from making the covariance non-invertible while preserving scale.",
                  "selected_primary": True,
                  "applied_now": False
              },
              {
                  "floor_id": "absolute_minimum_floor",
                  "formula": "lambda_regularized = max(lambda, lambda_floor)",
                  "purpose": "Replace sub-floor eigenvalues with the declared floor.",
                  "selected_primary": True,
                  "applied_now": False
              },
              {
                  "floor_id": "condition_number_warning",
                  "formula": "condition_number = lambda_max / lambda_min_regularized",
                  "purpose": "Record whether the stabilized inverse is numerically fragile.",
                  "selected_primary": True,
                  "applied_now": False
              },
              {
                  "floor_id": "rank_deficiency_warning",
                  "formula": "rank_missing = dimension - numerical_rank_before_regularization",
                  "purpose": "Carry rank deficiency as a warning even if regularization makes inversion possible.",
                  "selected_primary": True,
                  "applied_now": False
              }
          ]

          SENSITIVITY_LANES = [
              {
                  "lane_id": "primary_eigen_floor",
                  "description": "Use the declared eigenvalue floor and report stabilized covariance and inverse diagnostics.",
                  "required_next": True,
                  "claim_scope": "mechanics diagnostic only"
              },
              {
                  "lane_id": "pseudoinverse_comparison",
                  "description": "Compute Moore-Penrose pseudoinverse as a comparison lane against eigen-floor inverse.",
                  "required_next": True,
                  "claim_scope": "sensitivity comparison only"
              },
              {
                  "lane_id": "diagonal_loading_light",
                  "description": "Add a small diagonal loading proportional to trace(C)/dimension and compare the condition number.",
                  "required_next": False,
                  "claim_scope": "optional sensitivity"
              },
              {
                  "lane_id": "diagonal_only_guard",
                  "description": "Compare against diagonal-only covariance to detect whether off-diagonal structure is dominating the pressure route.",
                  "required_next": False,
                  "claim_scope": "optional conservative guard"
              }
          ]

          QUALITY_GATES_FOR_NEXT_PROBE = [
              {
                  "gate_id": "input_mechanics_available",
                  "requirement": "v4.108.1 mean/covariance outputs must be available and internally complete.",
                  "failure_action": "Do not regularize."
              },
              {
                  "gate_id": "rank_deficiency_explicit",
                  "requirement": "Rank deficiency must be recorded before stabilization.",
                  "failure_action": "Do not hide regularization behind a final covariance claim."
              },
              {
                  "gate_id": "floor_policy_declared",
                  "requirement": "Eigenvalue floor formula must be written before applying it.",
                  "failure_action": "Do not compute inverse."
              },
              {
                  "gate_id": "symmetry_preserved",
                  "requirement": "Regularized covariance must remain symmetric within tolerance.",
                  "failure_action": "Fail regularized covariance probe."
              },
              {
                  "gate_id": "positive_definite_after_floor",
                  "requirement": "Regularized covariance must have positive eigenvalues after flooring.",
                  "failure_action": "Fail regularized covariance probe."
              },
              {
                  "gate_id": "condition_number_reported",
                  "requirement": "Condition numbers must be reported for full and fsigma8 matrices.",
                  "failure_action": "Fail diagnostics."
              },
              {
                  "gate_id": "sensitivity_lanes_preserved",
                  "requirement": "Primary floor and pseudoinverse comparison lanes must both be reported.",
                  "failure_action": "Do not proceed to observed covariance bridge."
              },
              {
                  "gate_id": "final_claims_blocked",
                  "requirement": "Regularized covariance probe must not call itself final Planck reference uncertainty or final RSD pressure.",
                  "failure_action": "Fail claim-boundary gate."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A final Planck posterior covariance was computed in v4.110.",
              "A final Planck posterior mean vector was computed in v4.110.",
              "A regularized covariance matrix was computed in v4.110.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The rank-aware covariance stabilization design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "Eigenvalue flooring proves the model.",
              "The next regularized covariance probe will be enough for final RSD pressure."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_111_regularized_reference_covariance_probe",
                  "purpose": "Apply the declared rank-aware eigenvalue floor and pseudoinverse comparison to the broader covariance mechanics output.",
                  "why_next": "v4.109 rejected final reference uncertainty due to rank deficiency, so stabilization mechanics must be tested before any pressure bridge."
              },
              {
                  "priority": 2,
                  "route_id": "v4_112_regularized_covariance_sufficiency_gate",
                  "purpose": "Judge whether the regularized covariance is usable as a provisional reference diagnostic or still only a mechanics artifact.",
                  "why_next": "Regularization may make inversion possible without making the result final."
              },
              {
                  "priority": 3,
                  "route_id": "v4_113_observed_RSD_covariance_bridge_design",
                  "purpose": "Design how observed RSD covariance would combine with regularized Planck reference covariance.",
                  "why_next": "Final pressure requires observed covariance plus reference covariance."
              },
              {
                  "priority": 4,
                  "route_id": "v4_114_additional_chain_coverage_scaling_plan",
                  "purpose": "Optionally design expanded chain coverage beyond 1024 rows.",
                  "why_next": "Additional samples may improve rank and stability, but stabilization policy is needed either way."
              }
          ]

          failed_gates = []
          warnings = [
              "design_only",
              "no_new_CAMB_run",
              "no_new_covariance_computation",
              "no_regularization_applied",
              "no_Planck_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_109_broader_reference_uncertainty_sufficiency_gate"]

          if upstream["rank_aware_stabilization_required"] is not True:
              failed_gates.append("upstream_rank_aware_requirement_not_carried")

          if upstream["final_reference_uncertainty_rejected"] is not True:
              failed_gates.append("upstream_final_reference_rejection_not_carried")

          if upstream["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          if STABILIZATION_POLICY["regularization_allowed_next_probe"] is not True:
              failed_gates.append("regularization_not_allowed_for_next_probe")

          if STABILIZATION_POLICY["regularization_applied_now"] is not False:
              failed_gates.append("regularization_applied_too_early")

          if STABILIZATION_POLICY["Planck_reference_uncertainty_allowed_now"] is not False:
              failed_gates.append("Planck_reference_uncertainty_allowed_too_early")

          if STABILIZATION_POLICY["final_RSD_pressure_allowed_now"] is not False:
              failed_gates.append("final_RSD_pressure_allowed_too_early")

          if len(STABILIZATION_STEPS) < 7:
              failed_gates.append("stabilization_steps_incomplete")

          if not any(row["floor_id"] == "relative_eigen_floor" and row["selected_primary"] for row in FLOOR_POLICY):
              failed_gates.append("relative_eigen_floor_not_selected")

          if not any(row["floor_id"] == "absolute_minimum_floor" and row["selected_primary"] for row in FLOOR_POLICY):
              failed_gates.append("absolute_minimum_floor_not_selected")

          required_lanes = {row["lane_id"] for row in SENSITIVITY_LANES if row["required_next"]}
          if required_lanes != {"primary_eigen_floor", "pseudoinverse_comparison"}:
              failed_gates.append("required_sensitivity_lanes_not_locked")

          if len(QUALITY_GATES_FOR_NEXT_PROBE) < 8:
              failed_gates.append("quality_gates_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "final planck posterior covariance was computed in v4.110",
              "regularized covariance matrix was computed in v4.110",
              "final rsd pressure score",
              "validates tairid cosmology",
              "eigenvalue flooring proves the model",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "rank_aware_covariance_stabilization_design_passed_ready_for_regularized_reference_covariance_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_rank_deficiency_carried",
                  "pass": upstream["rank_aware_stabilization_required"] is True,
                  "result": f"full_rank={upstream['full_covariance_rank']}/10; fsigma8_rank={upstream['fsigma8_covariance_rank']}/5",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "final_reference_rejection_carried",
                  "pass": upstream["final_reference_uncertainty_rejected"] is True,
                  "result": "v4.109 rejected final Planck reference uncertainty",
                  "boundary": "No final reference claim."
              },
              {
                  "rule_id": "stabilization_policy_declared",
                  "pass": STABILIZATION_POLICY["policy_status"] == "design_only_not_applied",
                  "result": STABILIZATION_POLICY["policy_id"],
                  "boundary": "Design only."
              },
              {
                  "rule_id": "eigen_floor_policy_declared",
                  "pass": len(FLOOR_POLICY) >= 4,
                  "result": "relative floor, absolute floor, condition warning, and rank warning declared",
                  "boundary": "No regularization applied."
              },
              {
                  "rule_id": "required_sensitivity_lanes_declared",
                  "pass": required_lanes == {"primary_eigen_floor", "pseudoinverse_comparison"},
                  "result": f"required lanes={sorted(required_lanes)}",
                  "boundary": "Sensitivity design only."
              },
              {
                  "rule_id": "quality_gates_declared",
                  "pass": len(QUALITY_GATES_FOR_NEXT_PROBE) >= 8,
                  "result": f"{len(QUALITY_GATES_FOR_NEXT_PROBE)} next-probe quality gates declared",
                  "boundary": "No computation."
              },
              {
                  "rule_id": "regularization_not_applied_now",
                  "pass": STABILIZATION_POLICY["regularization_applied_now"] is False,
                  "result": "regularization remains for v4.111",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": STABILIZATION_POLICY["final_RSD_pressure_allowed_now"] is False and STABILIZATION_POLICY["validation_claim_allowed_now"] is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute pressure."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_110_rules_passed")

          if failed_gates:
              readiness_label = "rank_aware_covariance_stabilization_design_failed"
              next_allowed_step = "Repair rank-aware stabilization design before regularized covariance probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.111 regularized reference covariance probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_sample_output_vector_count": upstream["upstream_sample_output_vector_count"],
              "upstream_effective_sample_size": upstream["upstream_effective_sample_size"],
              "upstream_full_covariance_rank": upstream["full_covariance_rank"],
              "upstream_fsigma8_covariance_rank": upstream["fsigma8_covariance_rank"],
              "rank_aware_stabilization_required": upstream["rank_aware_stabilization_required"],
              "policy_id": STABILIZATION_POLICY["policy_id"],
              "regularization_allowed_next_probe": STABILIZATION_POLICY["regularization_allowed_next_probe"],
              "regularization_applied_now": STABILIZATION_POLICY["regularization_applied_now"],
              "stabilization_step_count": len(STABILIZATION_STEPS),
              "floor_policy_count": len(FLOOR_POLICY),
              "required_sensitivity_lanes": sorted(required_lanes),
              "quality_gate_count": len(QUALITY_GATES_FOR_NEXT_PROBE),
              "regularized_covariance_matrix_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "stabilization_policy": STABILIZATION_POLICY,
              "stabilization_steps": STABILIZATION_STEPS,
              "floor_policy": FLOOR_POLICY,
              "sensitivity_lanes": SENSITIVITY_LANES,
              "quality_gates_for_next_probe": QUALITY_GATES_FOR_NEXT_PROBE,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "rank_aware_stabilization_required": upstream["rank_aware_stabilization_required"],
                  "regularization_allowed_next_probe": STABILIZATION_POLICY["regularization_allowed_next_probe"],
                  "regularization_applied_now": False,
                  "regularized_covariance_matrix_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_110_rank_aware_covariance_stabilization_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "stabilization_steps_v4_110.csv",
              STABILIZATION_STEPS,
              ["step", "operation", "required_input", "output", "computed_now"]
          )

          write_csv(
              OUTDIR / "floor_policy_v4_110.csv",
              FLOOR_POLICY,
              ["floor_id", "formula", "purpose", "selected_primary", "applied_now"]
          )

          write_csv(
              OUTDIR / "sensitivity_lanes_v4_110.csv",
              SENSITIVITY_LANES,
              ["lane_id", "description", "required_next", "claim_scope"]
          )

          write_csv(
              OUTDIR / "quality_gates_for_next_probe_v4_110.csv",
              QUALITY_GATES_FOR_NEXT_PROBE,
              ["gate_id", "requirement", "failure_action"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_110.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_110.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_110.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.110 — Rank-Aware Covariance Stabilization Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.109 showed that the broader 1024-sample covariance mechanics worked, but the covariance was still rank-deficient. v4.110 therefore designs a rank-aware stabilization policy before any pressure bridge.")
          md.append("")
          md.append("This does not apply regularization, compute final Planck reference uncertainty, compute final RSD pressure, run model comparison, or validate TAIRID.")
          md.append("")
          md.append("## Stabilization policy")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in STABILIZATION_POLICY.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Floor policy")
          md.append("")
          md.append("| Floor | Formula | Selected |")
          md.append("|---|---|---|")
          for row in FLOOR_POLICY:
              md.append(f"| `{row['floor_id']}` | `{row['formula']}` | `{row['selected_primary']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_110_rank_aware_covariance_stabilization_design.json",
              "tairid_v4_110_rank_aware_covariance_stabilization_design.md",
              "stabilization_steps_v4_110.csv",
