name: 001 TAIRID v4.251 - DR14 QSO Value Extraction Guard

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-251-dr14-qso-value-extraction-guard.yml"
      - "data/cosmology/qso_literature_extraction_manifest.csv"
      - "qso_literature_extraction_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  dr14-qso-value-extraction-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.251 DR14 QSO Value Extraction Guard is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.251 DR14 QSO value extraction guard
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import zipfile

          VERSION = "v4.251"
          ROUTE = "extract_dr14_qso_values_after_v4_250"
          EXPECTED_RESULT = "v4_251_dr14_qso_value_extraction_guard_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_252_dr14_qso_covariance_supplement_locator_or_handoff"

          OUT = Path("tairid_v4_251_dr14_qso_value_extraction_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-251-dr14-qso-value-extraction-guard-output.zip"

          EXTRACTION_MANIFEST_CANDIDATES = [
              Path("data/cosmology/qso_literature_extraction_manifest.csv"),
              Path("qso_literature_extraction_manifest.csv"),
          ]

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REQUIRED_EXTRACTION_COLUMNS = [
              "extraction_id",
              "candidate_id",
              "paper_or_source_url",
              "measurement_label",
              "redshift",
              "observable",
              "observed_value",
              "uncertainty_or_covariance_reference",
              "data_vector_reference",
              "source_role",
              "provenance_status",
              "extraction_status",
              "approval_status",
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def safe_float(value):
              try:
                  return float(value)
              except Exception:
                  return None

          def is_placeholder(value):
              text = str(value or "").strip().lower()
              return (
                  not text
                  or text.startswith("put_")
                  or "put_" in text
                  or text.startswith("do_not_fill")
                  or text in ["todo", "none", "na", "n/a", "template_not_filled"]
              )

          inherited_v4_250_rows = [
              {
                  "inherited_from": "v4.250",
                  "item": "rules",
                  "value": "36 / 36 passed",
                  "meaning": "Primary QSO Literature Candidate Extraction Guard passed.",
                  "carry_forward_status": "ready_for_value_extraction_guard",
              },
              {
                  "inherited_from": "v4.250",
                  "item": "primary_literature_candidates",
                  "value": 3,
                  "meaning": "Three DR14 QSO primary literature candidates were retained.",
                  "carry_forward_status": "extraction_review_allowed",
              },
              {
                  "inherited_from": "v4.250",
                  "item": "extraction_schema_rows",
                  "value": 13,
                  "meaning": "Extraction manifest schema exists.",
                  "carry_forward_status": "schema_ready",
              },
              {
                  "inherited_from": "v4.250",
                  "item": "manifest_ready_candidates",
                  "value": 0,
                  "meaning": "No candidate was manifest-ready.",
                  "carry_forward_status": "manifest_fill_blocked",
              },
              {
                  "inherited_from": "v4.250",
                  "item": "approved_holdout_sources",
                  "value": 0,
                  "meaning": "No source was approved as holdout.",
                  "carry_forward_status": "evidence_blocked",
              },
              {
                  "inherited_from": "v4.250",
                  "item": "selected_next_route",
                  "value": "v4_251_extract_dr14_qso_values_or_handoff",
                  "meaning": "Current route extracts only safe value candidates or prepares handoff.",
                  "carry_forward_status": "current_route",
              },
          ]

          source_identity_correction_rows = [
              {
                  "correction_id": "source_fix_001",
                  "prior_candidate_id": "qso_src_001_dr14_zarrouk_configuration_space",
                  "issue": "v4.249/v4.250 label was too loose for the exact configuration-space value.",
                  "corrected_value_source": "qso_src_001a_hou_configuration_space_arxiv_1801_02656",
                  "reason": "The directly extractable configuration-space abstract value is tied to Hou et al. arXiv:1801.02656, not the loose Zarrouk label.",
                  "status": "candidate_id_correction_not_evidence",
              },
              {
                  "correction_id": "source_fix_002",
                  "prior_candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "issue": "Tomographic paper reports four redshift bins and covariance availability, but exact f_sigma8 values are not extracted in this guard.",
                  "corrected_value_source": "needs_pdf_table_or_supplement_extraction",
                  "reason": "Do not guess table values from secondary compilations.",
                  "status": "blocked_until_table_extraction",
              },
              {
                  "correction_id": "source_fix_003",
                  "prior_candidate_id": "qso_src_003_dr14_gil_marin_power_spectrum",
                  "issue": "Power-spectrum candidate has a directly reported single effective-redshift f_sigma8 value.",
                  "corrected_value_source": "qso_src_003_gil_marin_power_spectrum_arxiv_1801_02689",
                  "reason": "The abstract reports f_sigma8 at z_eff=1.52 with uncertainty.",
                  "status": "extracted_not_manifest_ready",
              },
              {
                  "correction_id": "source_fix_004",
                  "prior_candidate_id": "new_ruggeri_growth_evolution_candidate",
                  "issue": "A DR14 growth-evolution paper was not in the v4.250 candidate list but reports f_sigma8 and derivative.",
                  "corrected_value_source": "qso_src_009_ruggeri_growth_evolution_arxiv_1801_02891",
                  "reason": "It may be a useful comparison candidate, but it is same survey family and needs covariance/provenance review.",
                  "status": "new_candidate_extracted_not_manifest_ready",
              },
          ]

          extracted_dr14_qso_value_rows = [
              {
                  "extraction_id": "value_001_hou_config_fsigma8",
                  "candidate_id": "qso_src_001a_hou_configuration_space_arxiv_1801_02656",
                  "paper_or_source_url": "https://arxiv.org/abs/1801.02656",
                  "measurement_label": "configuration_space_abstract_measurement",
                  "redshift": 1.52,
                  "observable": "f_sigma8",
                  "observed_value": 0.396,
                  "observed_sigma_plus": 0.079,
                  "observed_sigma_minus": 0.079,
                  "uncertainty_or_covariance_reference": "abstract_reports_combined_statistical_systematic_uncertainty",
                  "data_vector_reference": "arxiv_1801_02656_abstract",
                  "source_role": "primary_qso_growth_literature_candidate",
                  "provenance_status": "same_survey_family_cross_release_needs_review",
                  "extraction_status": "extracted_not_scored",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              },
              {
                  "extraction_id": "value_002_gilmarin_power_fsigma8",
                  "candidate_id": "qso_src_003_dr14_gil_marin_power_spectrum",
                  "paper_or_source_url": "https://arxiv.org/abs/1801.02689",
                  "measurement_label": "power_spectrum_abstract_measurement",
                  "redshift": 1.52,
                  "observable": "f_sigma8",
                  "observed_value": 0.420,
                  "observed_sigma_plus": 0.076,
                  "observed_sigma_minus": 0.076,
                  "uncertainty_or_covariance_reference": "abstract_reports_full_error_budget_including_systematics_and_statistics",
                  "data_vector_reference": "arxiv_1801_02689_abstract",
                  "source_role": "primary_qso_growth_literature_candidate",
                  "provenance_status": "same_survey_family_cross_release_needs_review",
                  "extraction_status": "extracted_not_scored",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              },
              {
                  "extraction_id": "value_003_ruggeri_growth_fsigma8",
                  "candidate_id": "qso_src_009_ruggeri_growth_evolution_arxiv_1801_02891",
                  "paper_or_source_url": "https://arxiv.org/abs/1801.02891",
                  "measurement_label": "growth_evolution_abstract_measurement",
                  "redshift": 1.52,
                  "observable": "f_sigma8",
                  "observed_value": 0.430,
                  "observed_sigma_plus": 0.050,
                  "observed_sigma_minus": 0.050,
                  "uncertainty_or_covariance_reference": "abstract_reports_uncertainty_for_fsigma8",
                  "data_vector_reference": "arxiv_1801_02891_abstract",
                  "source_role": "primary_qso_growth_literature_candidate_comparison",
                  "provenance_status": "same_survey_family_cross_release_needs_review",
                  "extraction_status": "extracted_not_scored",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              },
              {
                  "extraction_id": "value_004_ruggeri_growth_derivative",
                  "candidate_id": "qso_src_009_ruggeri_growth_evolution_arxiv_1801_02891",
                  "paper_or_source_url": "https://arxiv.org/abs/1801.02891",
                  "measurement_label": "growth_evolution_derivative_abstract_measurement",
                  "redshift": 1.52,
                  "observable": "df_sigma8_dz",
                  "observed_value": -0.160,
                  "observed_sigma_plus": 0.080,
                  "observed_sigma_minus": 0.080,
                  "uncertainty_or_covariance_reference": "abstract_reports_uncertainty_for_derivative",
                  "data_vector_reference": "arxiv_1801_02891_abstract",
                  "source_role": "derivative_context_not_primary_manifest",
                  "provenance_status": "same_survey_family_cross_release_needs_review",
                  "extraction_status": "extracted_context_not_scored",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              },
          ]

          blocked_or_pending_extraction_rows = [
              {
                  "pending_id": "pending_001_zhao_tomographic_bins",
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "paper_or_source_url": "https://arxiv.org/abs/1801.03043",
                  "reported_redshifts": "0.98|1.23|1.52|1.94",
                  "reported_observable": "joint_fsigma8_and_BAO",
                  "known_from_source": "paper reports four effective redshifts and full data covariance matrix",
                  "missing_for_extraction": "exact f_sigma8 values per bin and covariance/data-vector location",
                  "status": "blocked_until_pdf_table_or_supplement_extraction",
              },
              {
                  "pending_id": "pending_002_zarrouk_loose_label",
                  "candidate_id": "qso_src_001_dr14_zarrouk_configuration_space",
                  "paper_or_source_url": "https://arxiv.org/abs/1801.03062",
                  "reported_redshifts": "0.8_to_2.2_sample",
                  "reported_observable": "clustering_measurements",
                  "known_from_source": "candidate context exists",
                  "missing_for_extraction": "exact value row tied to this source was not grounded here",
                  "status": "superseded_by_hou_exact_value_source_for_now",
              },
              {
                  "pending_id": "pending_003_dr16_final_context",
                  "candidate_id": "qso_src_004_dr16_neveux_final_power_spectrum",
                  "paper_or_source_url": "https://arxiv.org/abs/2007.08999",
                  "reported_redshifts": "1.480",
                  "reported_observable": "final_DR16_QSO_context",
                  "known_from_source": "same-family final data release context",
                  "missing_for_extraction": "independent holdout status",
                  "status": "blocked_as_independent_holdout_context_only",
              },
          ]

          observed_manifest_draft_candidate_rows = []
          for row in extracted_dr14_qso_value_rows:
              if row["observable"] == "f_sigma8":
                  observed_manifest_draft_candidate_rows.append({
                      "draft_id": "draft_" + row["extraction_id"],
                      "source_extraction_id": row["extraction_id"],
                      "target_id": "future_manual_qso_growth_target",
                      "source_family": "QSO_or_QSO_like",
                      "source_role": "primary_qso_growth_literature_candidate_not_holdout_approved",
                      "redshift": row["redshift"],
                      "quantity": "f_sigma8",
                      "observed_value": row["observed_value"],
                      "observed_sigma_or_likelihood": row["observed_sigma_plus"],
                      "data_path_or_url": row["paper_or_source_url"],
                      "covariance_path_or_url": "NEEDS_COVARIANCE_OR_EXPLICIT_UNCERTAINTY_POLICY_REVIEW",
                      "reference_model_path_or_method": "v4_243_external_reference_calculator_or_successor",
                      "failure_condition_id": "failure_001",
                      "approval_status": "draft_only_not_reviewed_not_scored",
                      "manifest_fill_allowed": False,
                  })

          simple_value_consistency_rows = []
          fsigma_rows = [row for row in extracted_dr14_qso_value_rows if row["observable"] == "f_sigma8"]
          values = [float(row["observed_value"]) for row in fsigma_rows]
          if values:
              mean_value = sum(values) / len(values)
              span_value = max(values) - min(values)
              simple_value_consistency_rows.append({
                  "check_id": "consistency_001_fsigma8_extracted_values",
                  "value_rows": len(values),
                  "min_value": min(values),
                  "mean_value": mean_value,
                  "max_value": max(values),
                  "span": span_value,
                  "interpretation": "extracted DR14 QSO f_sigma8 literature values are broadly close, but not scored or combined",
                  "scoring_allowed": False,
              })

          extraction_manifest_status_rows = []
          extraction_manifest_input_rows = []
          found_extraction_manifests = [path for path in EXTRACTION_MANIFEST_CANDIDATES if path.exists()]
          if not found_extraction_manifests:
              extraction_manifest_status_rows.append({
                  "manifest_path": "",
                  "manifest_status": "missing",
                  "extraction_rows": 0,
                  "detail": "No user-filled extraction manifest found. Using guarded built-in extracted literature rows only.",
              })
          else:
              for path in found_extraction_manifests:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in REQUIRED_EXTRACTION_COLUMNS if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      extraction_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          "extraction_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          for row in rows:
                              extraction_manifest_input_rows.append({col: row.get(col, "") for col in REQUIRED_EXTRACTION_COLUMNS})
                  except Exception as exc:
                      extraction_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          "extraction_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })

          extraction_manifest_validation_rows = []
          for row in extraction_manifest_input_rows:
              issues = []
              z = safe_float(row.get("redshift"))
              val = safe_float(row.get("observed_value"))
              if not row.get("extraction_id"):
                  issues.append("missing_extraction_id")
              if not row.get("candidate_id"):
                  issues.append("missing_candidate_id")
              if z is None:
                  issues.append("bad_or_missing_redshift")
              if val is None:
                  issues.append("bad_or_missing_observed_value")
              if is_placeholder(row.get("uncertainty_or_covariance_reference")):
                  issues.append("uncertainty_or_covariance_placeholder")
              if is_placeholder(row.get("data_vector_reference")):
                  issues.append("data_vector_reference_placeholder")
              if row.get("approval_status") in ["approved", "approved_for_scoring", "evidence"]:
                  issues.append("approval_status_too_strong_for_guard")
              extraction_manifest_validation_rows.append({
                  "extraction_id": row.get("extraction_id", ""),
                  "candidate_id": row.get("candidate_id", ""),
                  "observable": row.get("observable", ""),
                  "redshift": row.get("redshift", ""),
                  "validation_issues": "|".join(issues) if issues else "none",
                  "review_status": "reviewable_not_scored" if not issues else "blocked_by_extraction_issues",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          observed_manifest_status_rows = []
          found_observed_manifests = [path for path in OBSERVED_MANIFEST_CANDIDATES if path.exists()]
          if not found_observed_manifests:
              observed_manifest_status_rows.append({
                  "manifest_path": "",
                  "manifest_status": "missing",
                  "observed_rows": 0,
                  "detail": "No external observed manifest found. Do not score.",
              })
          else:
              for path in found_observed_manifests:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in REQUIRED_OBSERVED_COLUMNS if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          "observed_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                  except Exception as exc:
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          "observed_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })

          covariance_next_need_rows = [
              {
                  "need_id": "cov_need_001_hou",
                  "candidate_id": "qso_src_001a_hou_configuration_space_arxiv_1801_02656",
                  "needed_next": "confirm exact uncertainty policy and covariance availability beyond abstract uncertainty",
                  "next_route": "v4_252_covariance_supplement_locator",
              },
              {
                  "need_id": "cov_need_002_gilmarin",
                  "candidate_id": "qso_src_003_dr14_gil_marin_power_spectrum",
                  "needed_next": "confirm covariance/full likelihood or accepted uncertainty use",
                  "next_route": "v4_252_covariance_supplement_locator",
              },
              {
                  "need_id": "cov_need_003_ruggeri",
                  "candidate_id": "qso_src_009_ruggeri_growth_evolution_arxiv_1801_02891",
                  "needed_next": "confirm whether derivative/growth evolution data can be used and how covariance is represented",
                  "next_route": "v4_252_covariance_supplement_locator",
              },
              {
                  "need_id": "cov_need_004_zhao",
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "needed_next": "extract exact four-bin values and full covariance matrix",
                  "next_route": "v4_252_covariance_supplement_locator",
              },
          ]

          failure_condition_rows = [
              {
                  "failure_condition_id": "failure_001",
                  "target": "QSO f_sigma8 primary pressure",
                  "machine_condition": "if holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened",
                  "status": "active_but_not_testable_without_approved_holdout_and_covariance",
              },
              {
                  "failure_condition_id": "failure_002",
                  "target": "QSO versus LRG growth contrast",
                  "machine_condition": "if lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened",
                  "status": "active_for_future_control_review",
              },
              {
                  "failure_condition_id": "failure_003",
                  "target": "QSO radial secondary support",
                  "machine_condition": "if qso_radial_direction == '-' then secondary_support_weakened",
                  "status": "active_for_future_secondary_review",
              },
              {
                  "failure_condition_id": "failure_004",
                  "target": "geometry compressed lane non-primary",
                  "machine_condition": "if compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed",
