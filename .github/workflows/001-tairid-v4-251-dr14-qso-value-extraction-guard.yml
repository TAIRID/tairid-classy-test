              {
                  "route_id": "route_004",
                  "route": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No approved observed manifest exists.",
              },
              {
                  "route_id": "route_005",
                  "route": "handoff",
                  "permission_status": "allowed",
                  "reason": "v4.203-v4.251 is enough history for consolidation if needed.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_252_dr14_qso_covariance_supplement_locator",
                  "purpose": "locate covariance, supplement, uncertainty policy, or data-vector sources for extracted values",
