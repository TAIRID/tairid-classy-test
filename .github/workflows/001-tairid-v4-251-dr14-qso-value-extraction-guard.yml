              {"gate": "zhao_values_blocked_until_table_extraction", "passed": any(row["pending_id"] == "pending_001_zhao_tomographic_bins" and row["status"] == "blocked_until_pdf_table_or_supplement_extraction" for row in blocked_or_pending_extraction_rows), "detail": "Zhao values not guessed"},
              {"gate": "external_manifest_fill_blocked", "passed": any(row["permission_scope"] == "external_observed_manifest_fill" and row["permission_status"] == "blocked_until_covariance_and_provenance_review" for row in permission_rows), "detail": "manifest fill blocked"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external observed scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO evidence blocked"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric fit blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "covariance_locator_recommended", "passed": any(row["route"] == "dr14_qso_covariance_supplement_locator" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "covariance locator recommended"},
              {"gate": "manifest_fill_after_covariance_not_activated", "passed": any(row["test_id"] == "v4_252_external_observed_manifest_fill_after_covariance" and row["activated"] is False for row in next_rows), "detail": "manifest fill not activated"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no scoring"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
