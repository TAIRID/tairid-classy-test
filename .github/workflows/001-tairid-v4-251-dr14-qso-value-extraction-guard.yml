          ]

          route_decision_rows = [
              {
                  "route_id": "route_001",
                  "route": "dr14_qso_covariance_supplement_locator",
                  "permission_status": "recommended",
                  "reason": "Covariance/provenance is now the main blocker after partial value extraction.",
              },
              {
                  "route_id": "route_002",
                  "route": "zhao_tomographic_table_extraction",
                  "permission_status": "recommended",
                  "reason": "Zhao four-bin values remain useful but not extracted.",
