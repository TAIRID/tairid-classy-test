              },
              {
                  "priority": 2,
                  "test_id": "v4_252_zhao_tomographic_table_extraction_guard",
                  "purpose": "extract Zhao four-bin values only if table/supplement is located",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_252_external_observed_manifest_fill_after_covariance",
                  "purpose": "prepare manifest rows only after covariance/provenance review",
                  "activated": False,
              },
              {
                  "priority": 4,
                  "test_id": "v4_252_handoff_if_needed",
                  "purpose": "consolidate v4.203-v4.251 if thread length is risky",
