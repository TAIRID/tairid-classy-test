              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before value extraction"},
              {"gate": "inherited_v4_250_rows_equal_6", "passed": len(inherited_v4_250_rows) == 6, "detail": f"inherited_v4_250_rows = {len(inherited_v4_250_rows)}"},
