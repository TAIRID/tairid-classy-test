              },
              {
                  "permission_scope": "source_identity_correction",
                  "permission_status": "written",
                  "reason": "The loose Zarrouk/configuration-space label is corrected before manifest use.",
              },
              {
                  "permission_scope": "observed_manifest_draft_candidates",
                  "permission_status": "written_draft_only",
                  "reason": "Draft rows are not manifest fill permission.",
              },
              {
                  "permission_scope": "external_observed_manifest_fill",
                  "permission_status": "blocked_until_covariance_and_provenance_review",
                  "reason": "Exact covariance/provenance policy is not complete.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No reviewed observed/reference join exists.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "Extracted literature values are not approved holdout evidence.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
