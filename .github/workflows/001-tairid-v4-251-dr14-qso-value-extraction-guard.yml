                  "readiness_id": "readiness_003",
                  "requirement": "covariance_or_uncertainty_policy",
                  "status": "missing_or_unverified",
                  "blocks": "scoring",
              },
              {
                  "readiness_id": "readiness_004",
                  "requirement": "provenance_decision",
                  "status": "needed",
                  "blocks": "holdout label",
              },
              {
                  "readiness_id": "readiness_005",
                  "requirement": "external_observed_manifest",
                  "status": "draft_candidates_only",
                  "blocks": "residual scoring",
              },
              {
                  "readiness_id": "readiness_006",
                  "requirement": "numeric_correction_fit",
                  "status": "blocked",
                  "blocks": "model comparison",
              },
              {
                  "readiness_id": "readiness_007",
                  "requirement": "combined_matrix_permission",
                  "status": "blocked",
                  "blocks": "combined matrix",
              },
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "DR14 QSO f_sigma8 values are partially extracted.",
