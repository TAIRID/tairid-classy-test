          print(f"simple_value_consistency_rows = {summary['simple_value_consistency_rows']}")
          print(f"extraction_manifest_status_rows = {summary['extraction_manifest_status_rows']}")
          print(f"extraction_manifest_input_rows = {summary['extraction_manifest_input_rows']}")
          print(f"extraction_manifest_validation_rows = {summary['extraction_manifest_validation_rows']}")
