              f"simple_value_consistency_rows = {summary['simple_value_consistency_rows']}",
              f"extraction_manifest_status_rows = {summary['extraction_manifest_status_rows']}",
              f"extraction_manifest_input_rows = {summary['extraction_manifest_input_rows']}",
              f"extraction_manifest_validation_rows = {summary['extraction_manifest_validation_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"covariance_next_need_rows = {summary['covariance_next_need_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"route_decision_rows = {summary['route_decision_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"manifest_fill_allowed = {summary['manifest_fill_allowed']}",
              f"scoring_allowed = {summary['scoring_allowed']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Extracted value rows:",
              *value_lines,
              "",
              "Blocked or pending rows:",
              *pending_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.251 extracts only the DR14 QSO values that can be safely carried as literature-level candidate rows. It also corrects the loose configuration-space source label. The values are not manifest-ready, not scored, not approved as holdout evidence, and still need covariance/provenance review.",
              "",
              "Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_251_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_250_rows = {summary['inherited_v4_250_rows']}")
          print(f"source_identity_correction_rows = {summary['source_identity_correction_rows']}")
          print(f"extracted_dr14_qso_value_rows = {summary['extracted_dr14_qso_value_rows']}")
