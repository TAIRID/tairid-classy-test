                  "next_action": "Do not score them; review covariance and provenance first.",
                  "claim_status": "extracted_not_scored",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "The loose configuration-space source label is corrected.",
                  "basis": "The directly extracted configuration-space value is tied to Hou arXiv:1801.02656.",
                  "next_action": "Use corrected source identity before any manifest row.",
                  "claim_status": "source_correction_only",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "Zhao tomographic values remain pending.",
                  "basis": "Only redshift bins and covariance claim are carried; exact values are not guessed.",
                  "next_action": "Locate table/supplement/covariance before extraction.",
                  "claim_status": "pending_extraction",
              },
              {
                  "decision_id": "decision_004",
                  "decision": "Next route should locate covariance/supplements or hand off.",
                  "basis": "Values alone are not enough for scoring or holdout approval.",
                  "next_action": "Proceed to v4.252 covariance supplement locator or create handoff.",
