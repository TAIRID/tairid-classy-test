          write_csv(OUT / "v4_251_blocked_or_pending_extraction_rows.csv", blocked_or_pending_extraction_rows)
          write_csv(OUT / "v4_251_observed_manifest_draft_candidate_rows.csv", observed_manifest_draft_candidate_rows)
          write_csv(OUT / "v4_251_simple_value_consistency_rows.csv", simple_value_consistency_rows)
          write_csv(OUT / "v4_251_extraction_manifest_status_rows.csv", extraction_manifest_status_rows)
