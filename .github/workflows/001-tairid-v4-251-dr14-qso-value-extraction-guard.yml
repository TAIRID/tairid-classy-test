              {"gate": "extracted_dr14_qso_value_rows_equal_4", "passed": len(extracted_dr14_qso_value_rows) == 4, "detail": f"extracted_dr14_qso_value_rows = {len(extracted_dr14_qso_value_rows)}"},
              {"gate": "fsigma8_value_rows_equal_3", "passed": len([row for row in extracted_dr14_qso_value_rows if row['observable'] == 'f_sigma8']) == 3, "detail": "f_sigma8 value rows = 3"},
              {"gate": "blocked_or_pending_extraction_rows_equal_3", "passed": len(blocked_or_pending_extraction_rows) == 3, "detail": f"blocked_or_pending_extraction_rows = {len(blocked_or_pending_extraction_rows)}"},
              {"gate": "observed_manifest_draft_candidate_rows_equal_3", "passed": len(observed_manifest_draft_candidate_rows) == 3, "detail": f"observed_manifest_draft_candidate_rows = {len(observed_manifest_draft_candidate_rows)}"},
              {"gate": "simple_value_consistency_rows_equal_1", "passed": len(simple_value_consistency_rows) == 1, "detail": f"simple_value_consistency_rows = {len(simple_value_consistency_rows)}"},
              {"gate": "extraction_manifest_status_rows_at_least_1", "passed": len(extraction_manifest_status_rows) >= 1, "detail": f"extraction_manifest_status_rows = {len(extraction_manifest_status_rows)}"},
              {"gate": "extraction_manifest_validation_rows_match_inputs", "passed": len(extraction_manifest_validation_rows) == len(extraction_manifest_input_rows), "detail": f"extraction_manifest_validation_rows = {len(extraction_manifest_validation_rows)}, extraction_manifest_input_rows = {len(extraction_manifest_input_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "covariance_next_need_rows_equal_4", "passed": len(covariance_next_need_rows) == 4, "detail": f"covariance_next_need_rows = {len(covariance_next_need_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "permission_rows_equal_9", "passed": len(permission_rows) == 9, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_7", "passed": len(readiness_rows) == 7, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
