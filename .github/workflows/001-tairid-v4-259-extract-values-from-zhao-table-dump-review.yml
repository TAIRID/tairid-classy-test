name: 001 TAIRID v4.259 - Extract Values From Zhao Table Dump Review

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-259-extract-values-from-zhao-table-dump-review.yml"
      - "data/cosmology/qso_literature_extraction_manifest.csv"
      - "qso_literature_extraction_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  extract-values-from-zhao-table-dump-review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.259 Extract Values From Zhao Table Dump Review is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.259 extract values from Zhao table dump review
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import gzip
          import io
          import json
          import re
          import tarfile
          import zipfile

          VERSION = "v4.259"
          ROUTE = "review_manual_zhao_fill_or_extract_values_from_table_dump_after_v4_258b"
          EXPECTED_RESULT = "v4_259_extract_values_from_zhao_table_dump_review_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_260_zhao_extracted_value_review_covariance_reconstruction_guard"

          OUT = Path("tairid_v4_259_extract_values_from_zhao_table_dump_review_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-259-extract-values-from-zhao-table-dump-review-output.zip"

          ZHAO_ABS_URL = "https://arxiv.org/abs/1801.03043"
          ZHAO_EPRINT_URL = "https://arxiv.org/e-print/1801.03043"
          ZHAO_PDF_URL = "https://arxiv.org/pdf/1801.03043"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          EXTRACTION_MANIFEST_CANDIDATES = [
              Path("data/cosmology/qso_literature_extraction_manifest.csv"),
              Path("qso_literature_extraction_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_EXTRACTION_COLUMNS = [
              "extraction_id",
              "candidate_id",
              "paper_or_source_url",
              "measurement_label",
              "redshift",
              "observable",
              "observed_value",
              "uncertainty_or_covariance_reference",
              "data_vector_reference",
              "source_role",
              "provenance_status",
              "extraction_status",
              "approval_status",
          ]

          EXPECTED_ZHAO_BINS = [0.978, 1.230, 1.526, 1.944]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def fetch_bytes(url, timeout=30, max_bytes=12000000):
              try:
                  req = Request(url, headers={"User-Agent": "TAIRID-v4.259-zhao-table-value-review"})
                  with urlopen(req, timeout=timeout) as response:
                      status = f"http_{response.status}"
                      content_type = response.headers.get("content-type", "")
                      content_length = response.headers.get("content-length", "")
                      raw = response.read(max_bytes)
                      return status, content_type, content_length, raw, ""
              except Exception as exc:
                  return "probe_failed", "", "", b"", f"{type(exc).__name__}: {exc}"

          def decode_text(raw):
              return raw.decode("utf-8", errors="replace") if raw else ""

          def extract_text_files_from_eprint(raw):
              rows = []
              texts = []
              if not raw:
                  return rows, texts
              candidates = [("raw", raw)]
              try:
                  candidates.append(("gzip", gzip.decompress(raw)))
              except Exception:
                  pass

              for label, blob in candidates:
                  try:
                      with tarfile.open(fileobj=io.BytesIO(blob), mode="r:*") as tar:
                          for member in tar.getmembers():
                              if not member.isfile():
                                  continue
                              name = member.name
                              lower = name.lower()
                              if not lower.endswith((".tex", ".txt", ".bbl", ".sty", ".csv", ".dat", ".table")):
                                  continue
                              extracted = tar.extractfile(member)
                              if not extracted:
                                  continue
                              content = extracted.read(2500000).decode("utf-8", errors="replace")
                              rows.append({
                                  "archive_mode": label,
                                  "file_name": name,
                                  "file_size": member.size,
                                  "text_chars": len(content),
                                  "file_role": "source_text_candidate",
                              })
                              texts.append((name, content))
                          if rows:
                              return rows, texts
                  except Exception:
                      continue

              txt = decode_text(raw)
              if txt:
                  rows.append({
                      "archive_mode": "plain",
                      "file_name": "plain_eprint_or_html",
                      "file_size": len(raw),
                      "text_chars": len(txt),
                      "file_role": "plain_text_fallback",
                  })
                  texts.append(("plain_eprint_or_html", txt))
              return rows, texts

          def clean_latex_for_review(text):
              cleaned = text.replace("\r\n", "\n").replace("\r", "\n")
              cleaned = re.sub(r"%.*", "", cleaned)
              cleaned = cleaned.replace("\\pm", " ± ")
              cleaned = cleaned.replace("\\sigma_8", "sigma_8")
              cleaned = cleaned.replace("\\fsig", "fsig")
              cleaned = cleaned.replace("\\alpha", "alpha")
              cleaned = cleaned.replace("\\begin{", "\nBEGIN{")
              cleaned = cleaned.replace("\\end{", "\nEND{")
              cleaned = cleaned.replace("&", " | ")
              cleaned = cleaned.replace("\\\\", "\n")
              cleaned = re.sub(r"[{}]", "", cleaned)
              cleaned = re.sub(r"\n\s*\n+", "\n\n", cleaned)
              return cleaned.strip()

          def find_source_file(texts, ending):
              for name, text in texts:
                  if name.endswith(ending) or name == ending:
                      return name, text
              return "", ""

          def parse_fsigma8_widetable1(file_name, text):
              cleaned = clean_latex_for_review(text)
              lines = cleaned.splitlines()
              fs_line = ""
              for line in lines:
                  if "fsigma_8" in line and "±" in line:
                      fs_line = line.strip()
                      break
              pairs = re.findall(r"\$?\s*([0-9]+\.[0-9]+)\s*±\s*([0-9]+\.[0-9]+)\s*\$?", fs_line)
              rows = []
              for index, (z, pair) in enumerate(zip(EXPECTED_ZHAO_BINS, pairs), start=1):
                  value, sigma = pair
                  rows.append({
                      "extraction_id": f"zhao_table1_fsigma8_bin_{index:02d}",
                      "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                      "source_table": file_name,
                      "paper_or_source_url": ZHAO_ABS_URL,
                      "measurement_label": f"Table widetable1 fsigma_8 z_eff={z}",
                      "redshift": z,
                      "observable": "f_sigma8",
                      "observed_value": float(value),
                      "observed_sigma": float(sigma),
                      "uncertainty_or_covariance_reference": "widetable1 quoted uncertainty; full covariance reviewed separately in widetable2",
                      "data_vector_reference": f"{file_name}: row fsigma_8, bin index {index}",
                      "source_role": "primary_qso_growth_tomographic_literature_candidate",
                      "provenance_status": "same_survey_family_cross_release_needs_review",
                      "extraction_status": "machine_extracted_table_labeled_not_scored",
                      "approval_status": "not_scored_not_evidence",
                      "manifest_fill_allowed": False,
                      "scoring_allowed": False,
                      "evidence_allowed": False,
                  })
              return rows, fs_line, cleaned

          def parse_fsigma8_widetable3(file_name, text):
              cleaned = clean_latex_for_review(text)
              lines = cleaned.splitlines()
              fs_line = ""
              for line in lines:
                  if "fsigma_8" in line and "1.526" in line:
                      fs_line = line.strip()
                      break
              match = re.search(r"fsigma_8.*?\|\s*\$?([0-9]+\.[0-9]+)\$?\s*\|\s*\$?([0-9]+\.[0-9]+)", fs_line)
              rows = []
              if match:
                  rows.append({
                      "extraction_id": "zhao_table3_redshift_weight_fsigma8_z_1_526",
                      "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                      "source_table": file_name,
                      "paper_or_source_url": ZHAO_ABS_URL,
                      "measurement_label": "Table widetable3 redshift-weighted fsigma_8 z_eff=1.526",
                      "redshift": 1.526,
                      "observable": "f_sigma8_redshift_weight_check",
                      "observed_value": float(match.group(1)),
                      "observed_sigma": float(match.group(2)),
                      "uncertainty_or_covariance_reference": "widetable3 quoted uncertainty and local precision/correlation entries",
                      "data_vector_reference": f"{file_name}: row fsigma_8(1.526)",
                      "source_role": "redshift_weighted_check_not_primary_four_bin_row",
                      "provenance_status": "same_survey_family_cross_release_needs_review",
                      "extraction_status": "machine_extracted_table_labeled_not_scored",
                      "approval_status": "not_scored_not_evidence",
                      "manifest_fill_allowed": False,
                      "scoring_allowed": False,
                      "evidence_allowed": False,
                  })
              return rows, fs_line, cleaned

          def parse_widetable2_matrix_rows(file_name, text):
              cleaned = clean_latex_for_review(text)
              rows = []
              for line in cleaned.splitlines():
                  if "|" not in line:
                      continue
                  if not any(token in line for token in ["D_\\rm A", "H(", "fsigma_8"]):
                      continue
                  param_match = re.search(r"\$?\s*([^|$]+)\$?\s*\|", line)
                  parameter = param_match.group(1).strip() if param_match else "unknown"
                  nums = re.findall(r"[-+]?\d+\.\d+|[-+]?\d+", line)
                  rows.append({
                      "matrix_row_id": f"matrix_row_{len(rows)+1:02d}",
                      "source_table": file_name,
                      "parameter_label": parameter,
                      "numeric_entries": "|".join(nums[:20]),
                      "matrix_role": "correlation_upper_precision_lower_times_1e4_plus_inverse_sigma_column",
                      "reconstruction_status": "present_but_not_reconstructed_to_covariance_in_this_workflow",
                      "scoring_allowed": False,
                      "evidence_allowed": False,
                  })
              return rows, cleaned

          inherited_v4_258b_rows = [
              {
                  "inherited_from": "v4.258B",
                  "item": "rules",
                  "value": "41 / 41 passed",
                  "meaning": "Zhao Fill Needed Table Dump Packet Fixed passed.",
                  "carry_forward_status": "ready_for_table_value_extraction_review",
              },
              {
                  "inherited_from": "v4.258B",
                  "item": "table_dump_rows",
                  "value": 4,
                  "meaning": "draft.tex, widetable1, widetable2, and widetable3 were dumped.",
                  "carry_forward_status": "source_tables_available",
              },
              {
                  "inherited_from": "v4.258B",
                  "item": "table_numeric_window_rows",
                  "value": 53,
                  "meaning": "Numeric review windows were written.",
                  "carry_forward_status": "machine_review_hints_available",
              },
              {
                  "inherited_from": "v4.258B",
                  "item": "filled_reviewable_zhao_rows",
                  "value": 0,
                  "meaning": "Manual fill was still missing.",
                  "carry_forward_status": "manual_fill_or_table_extraction_needed",
              },
              {
                  "inherited_from": "v4.258B",
                  "item": "missing_or_blocked_zhao_rows",
                  "value": 4,
                  "meaning": "All four Zhao rows were missing or blocked from manifest bridge.",
                  "carry_forward_status": "observed_bridge_blocked",
              },
              {
                  "inherited_from": "v4.258B",
                  "item": "selected_next_route",
                  "value": "v4_259_review_manual_zhao_fill_or_extract_values_from_table_dump",
                  "meaning": "Current route extracts table-labeled values from the dumped tables or reviews manual fill.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          extraction_manifest_status_rows, extraction_manifest_input_rows = read_manifest_status(
              EXTRACTION_MANIFEST_CANDIDATES, REQUIRED_EXTRACTION_COLUMNS, "extraction"
          )

          source_probe_rows = []
          eprint_texts = []
          eprint_file_rows = []
          for label, url in [
              ("zhao_abs", ZHAO_ABS_URL),
              ("zhao_eprint", ZHAO_EPRINT_URL),
              ("zhao_pdf", ZHAO_PDF_URL),
          ]:
              status, content_type, content_length, raw, error = fetch_bytes(url)
              source_probe_rows.append({
                  "source_label": label,
                  "source_url": url,
                  "probe_status": status,
                  "content_type": content_type,
                  "content_length": content_length,
                  "bytes_downloaded": len(raw),
                  "probe_error": error,
                  "probe_role": "table_value_extraction_review_only",
              })
              if label == "zhao_eprint":
                  eprint_file_rows, eprint_texts = extract_text_files_from_eprint(raw)

          wt1_name, wt1_text = find_source_file(eprint_texts, "tables/widetable1.tex")
          wt2_name, wt2_text = find_source_file(eprint_texts, "tables/widetable2.tex")
          wt3_name, wt3_text = find_source_file(eprint_texts, "tables/widetable3.tex")
          draft_name, draft_text = find_source_file(eprint_texts, "draft.tex")

          zhao_four_bin_value_rows, wt1_fsigma_line, wt1_cleaned = parse_fsigma8_widetable1(wt1_name, wt1_text) if wt1_text else ([], "", "")
          zhao_redshift_weight_check_rows, wt3_fsigma_line, wt3_cleaned = parse_fsigma8_widetable3(wt3_name, wt3_text) if wt3_text else ([], "", "")
          zhao_matrix_support_rows, wt2_cleaned = parse_widetable2_matrix_rows(wt2_name, wt2_text) if wt2_text else ([], "")

          source_table_review_rows = [
              {
                  "table_id": "table_001",
                  "file_name": wt1_name or "tables/widetable1.tex",
                  "table_role": "main four-bin BAO/RSD measurement table",
                  "extracted_rows": len(zhao_four_bin_value_rows),
                  "review_status": "table_labeled_values_found" if len(zhao_four_bin_value_rows) == 4 else "missing_or_parse_failed",
              },
              {
                  "table_id": "table_002",
                  "file_name": wt2_name or "tables/widetable2.tex",
                  "table_role": "correlation/precision matrix support table",
                  "extracted_rows": len(zhao_matrix_support_rows),
                  "review_status": "matrix_support_present_not_reconstructed" if zhao_matrix_support_rows else "missing_or_parse_failed",
              },
              {
                  "table_id": "table_003",
                  "file_name": wt3_name or "tables/widetable3.tex",
                  "table_role": "redshift-weighted z=1.526 check table",
                  "extracted_rows": len(zhao_redshift_weight_check_rows),
                  "review_status": "redshift_weight_check_found" if zhao_redshift_weight_check_rows else "missing_or_parse_failed",
              },
              {
                  "table_id": "table_004",
                  "file_name": draft_name or "draft.tex",
                  "table_role": "method/provenance/dependency text",
                  "extracted_rows": 0,
                  "review_status": "method_text_present" if draft_text else "missing_or_parse_failed",
              },
          ]

          # Write cleaned table text so artifact remains human-reviewable.
          if wt1_cleaned:
              (OUT / "v4_259_cleaned_widetable1_main_measurements.txt").write_text(wt1_cleaned, encoding="utf-8")
          if wt2_cleaned:
              (OUT / "v4_259_cleaned_widetable2_matrix_support.txt").write_text(wt2_cleaned, encoding="utf-8")
          if wt3_cleaned:
              (OUT / "v4_259_cleaned_widetable3_redshift_weight_check.txt").write_text(wt3_cleaned, encoding="utf-8")

          zhao_extraction_manifest_candidate_rows = []
          for row in zhao_four_bin_value_rows:
              zhao_extraction_manifest_candidate_rows.append({
                  "extraction_id": row["extraction_id"],
                  "candidate_id": row["candidate_id"],
                  "paper_or_source_url": row["paper_or_source_url"],
                  "measurement_label": row["measurement_label"],
                  "redshift": row["redshift"],
                  "observable": row["observable"],
                  "observed_value": row["observed_value"],
                  "uncertainty_or_covariance_reference": row["uncertainty_or_covariance_reference"],
                  "data_vector_reference": row["data_vector_reference"],
                  "source_role": row["source_role"],
                  "provenance_status": row["provenance_status"],
                  "extraction_status": row["extraction_status"],
                  "approval_status": row["approval_status"],
              })

          zhao_covariance_reconstruction_status_rows = [
              {
                  "status_id": "cov_001",
                  "source_table": wt2_name or "tables/widetable2.tex",
                  "status": "matrix_support_table_present",
                  "meaning": "widetable2 gives correlation upper triangle and precision lower triangle multiplied by 1e4, plus inverse-sigma column",
                  "allowed_now": "review_only_not_scoring",
              },
              {
                  "status_id": "cov_002",
                  "source_table": wt2_name or "tables/widetable2.tex",
                  "status": "full_covariance_not_reconstructed",
                  "meaning": "This workflow does not reconstruct full covariance from the table.",
                  "allowed_now": "bridge_blocked",
              },
              {
                  "status_id": "cov_003",
                  "source_table": wt1_name or "tables/widetable1.tex",
                  "status": "quoted_uncertainties_available",
                  "meaning": "Main f_sigma8 rows have quoted uncertainties, but joint scoring still needs covariance policy.",
                  "allowed_now": "extraction_manifest_candidate_only",
              },
              {
                  "status_id": "cov_004",
                  "source_table": wt3_name or "tables/widetable3.tex",
                  "status": "local_redshift_weight_matrix_present",
                  "meaning": "widetable3 gives z=1.526 redshift-weighted check and local matrix entries.",
                  "allowed_now": "comparison_only_not_primary_scoring",
              },
          ]

          observed_manifest_bridge_block_rows = []
          for row in zhao_four_bin_value_rows:
              observed_manifest_bridge_block_rows.append({
                  "bridge_id": "blocked_bridge_" + row["extraction_id"],
                  "redshift": row["redshift"],
                  "quantity": "f_sigma8",
                  "observed_value_candidate": row["observed_value"],
                  "sigma_candidate": row["observed_sigma"],
                  "bridge_status": "blocked",
                  "required_before_bridge": "human review + covariance/provenance reconstruction guard + separate observed manifest bridge guard",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          value_consistency_rows = []
          if zhao_four_bin_value_rows:
              vals = [float(row["observed_value"]) for row in zhao_four_bin_value_rows]
              sigmas = [float(row["observed_sigma"]) for row in zhao_four_bin_value_rows]
              value_consistency_rows.append({
                  "consistency_id": "consistency_001_four_bin_fsigma8",
                  "rows": len(vals),
                  "min_value": min(vals),
                  "mean_value": sum(vals) / len(vals),
                  "max_value": max(vals),
                  "max_sigma": max(sigmas),
                  "interpretation": "four table-labeled f_sigma8 values extracted as non-scoring candidates",
                  "scoring_allowed": False,
              })
          if zhao_redshift_weight_check_rows and zhao_four_bin_value_rows:
              weighted = zhao_redshift_weight_check_rows[0]
              matching = [row for row in zhao_four_bin_value_rows if abs(float(row["redshift"]) - 1.526) < 0.001]
              if matching:
                  base = matching[0]
                  value_consistency_rows.append({
                      "consistency_id": "consistency_002_z_1_526_weighted_vs_main",
                      "rows": 2,
                      "main_table_value": base["observed_value"],
                      "main_table_sigma": base["observed_sigma"],
                      "redshift_weight_value": weighted["observed_value"],
                      "redshift_weight_sigma": weighted["observed_sigma"],
                      "difference": float(weighted["observed_value"]) - float(base["observed_value"]),
                      "interpretation": "redshift-weighted check is close but not identical to main tomographic row",
                      "scoring_allowed": False,
                  })

          permission_rows = [
              {
                  "permission_scope": "zhao_table_labeled_value_extraction",
                  "permission_status": "written_review_only",
                  "reason": "Table-labeled f_sigma8 rows are extracted but not scored.",
              },
              {
                  "permission_scope": "qso_literature_extraction_manifest_candidate_rows",
                  "permission_status": "written_not_scored",
                  "reason": "Candidate extraction rows are written for review only.",
              },
              {
                  "permission_scope": "zhao_covariance_reconstruction",
                  "permission_status": "blocked_until_v4_260",
                  "reason": "Matrix table is present but not reconstructed or approved here.",
              },
              {
                  "permission_scope": "external_observed_manifest_bridge",
                  "permission_status": "blocked",
                  "reason": "A separate bridge guard is required after covariance/provenance review.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No reviewed observed/reference join exists.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "Table-labeled extraction is not evidence.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No approved observed manifest or parameter values are ready.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
          ]

          readiness_rows = [
              {"readiness_id": "readiness_001", "requirement": "four_bin_table_labeled_values", "status": "ready_review_only" if len(zhao_four_bin_value_rows) == 4 else "not_ready", "blocks": "observed bridge if not ready"},
