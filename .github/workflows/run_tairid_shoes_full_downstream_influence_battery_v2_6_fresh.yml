name: Run TAIRID SH0ES Full Downstream Influence Battery v2.6 Fresh

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-full-downstream-influence-battery-v2-6-fresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy matplotlib

      - name: Confirm fresh script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_full_downstream_influence_battery_v2_6_fresh.py
          echo "v2.6 FRESH SH0ES full downstream influence battery found."

      - name: Run TAIRID SH0ES Full Downstream Influence Battery v2.6 Fresh
        run: |
          python run_tairid_shoes_full_downstream_influence_battery_v2_6_fresh.py

      - name: Upload fresh outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-full-downstream-influence-battery-v2-6-fresh-output
          path: |
            tairid_shoes_full_downstream_influence_battery_v2_6_fresh_outputs/**
