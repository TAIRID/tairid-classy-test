name: Run TAIRID Action Pair Probe v1

on:
  push:
  workflow_dispatch:

jobs:
  tairid-action-pair-probe-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Confirm files
        run: |
          pwd
          ls -la
          test -f run_tairid_action_pair_probe_v1.py
          echo "Python probe file found."

      - name: Run TAIRID action pair probe v1
        run: |
          python run_tairid_action_pair_probe_v1.py

      - name: Upload probe output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-action-pair-probe-v1-output
          path: |
            tairid_action_pair_probe_v1_outputs/**
