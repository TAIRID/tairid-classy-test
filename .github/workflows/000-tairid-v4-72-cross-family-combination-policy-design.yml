name: 000 TAIRID v4.72 Cross-Family Combination Policy Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-72-cross-family-combination-policy-design.yml"

jobs:
  tairid-v4-72-cross-family-combination-policy-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.72 cross-family combination policy design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_72_cross_family_combination_policy_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_72_cross_family_combination_policy_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_72_cross_family_combination_policy_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not import Planck chains.",
              "This does not compute Planck reference uncertainty.",
              "This does not make BOSS, eBOSS, ELG, WiggleZ, KiDS, or Planck mutually independent by assumption.",
              "This is a design-only cross-family combination policy.",
              "A pass means combination rules are documented and guarded, not that any final combined covariance or score exists."
          ]

          UPSTREAM_LOCKS = {
              "v4_37": {
                  "source_family": "BOSS_DR12",
                  "status": "BOSS-only covariance preview",
                  "row_count": 3,
                  "negative_count": 2,
                  "positive_count": 1,
                  "sqrt_chi2_preview": 1.1750788584363314,
                  "final_use_allowed": False
              },
              "v4_43": {
                  "source_family": "eBOSS_ELG",
                  "status": "grid visible and parser-feasible but parked",
                  "simple_covariance_ready": False,
                  "final_use_allowed": False
              },
              "v4_44": {
                  "source_family": "eBOSS_LRG_QSO",
                  "status": "partial LRG/QSO covariance preview",
                  "row_count": 2,
                  "negative_count": 0,
                  "positive_count": 2,
                  "sqrt_chi2_preview": 1.9222323437114406,
                  "ELG_included": False,
                  "final_use_allowed": False
              },
              "v4_46": {
                  "source_family": "WiggleZ",
                  "status": "formally nonfinal unresolved after locator retry",
                  "covariance_ready": False,
                  "final_use_allowed": False
              },
              "v4_50": {
                  "source_family": "growth_lane_handoff",
                  "status": "growth lane mixed and role-dependent",
                  "all_negative_growth_story_allowed": False,
                  "final_RSD_pressure_allowed": False
              },
              "v4_71": {
                  "source_family": "Planck_reference_uncertainty",
                  "status": "external literature expansion passed, no candidate accepted as covariance",
                  "reference_uncertainty_computed": False,
                  "external_reference_imported": False,
                  "final_RSD_pressure_allowed": False
              }
          }

          SOURCE_FAMILY_STATUS = [
              {
                  "family_id": "BOSS_DR12",
                  "data_role": "RSD_growth_observation",
                  "current_status": "partial_BOSS_only_covariance_preview",
                  "combination_status": "diagnostic_only",
                  "may_enter_final_combined_score_now": False,
                  "required_before_combination": "reference_uncertainty_and_duplication_policy_and_full_covariance_scope"
              },
              {
                  "family_id": "eBOSS_LRG_QSO",
                  "data_role": "RSD_growth_observation",
                  "current_status": "partial_LRG_QSO_covariance_preview_ELG_excluded",
                  "combination_status": "diagnostic_only",
                  "may_enter_final_combined_score_now": False,
                  "required_before_combination": "ELG_policy_reference_uncertainty_and_eBOSS_internal_scope_check"
              },
              {
                  "family_id": "eBOSS_ELG",
                  "data_role": "RSD_growth_observation",
                  "current_status": "grid_likelihood_visible_parser_needed_or_parked",
                  "combination_status": "not_covariance_ready",
                  "may_enter_final_combined_score_now": False,
                  "required_before_combination": "ELG_grid_parser_or_explicit_exclusion_policy"
              },
              {
                  "family_id": "WiggleZ",
                  "data_role": "RSD_growth_observation",
                  "current_status": "product_mapping_unresolved",
                  "combination_status": "not_covariance_ready",
                  "may_enter_final_combined_score_now": False,
                  "required_before_combination": "usable_product_path_covariance_or_exclusion_policy"
              },
              {
                  "family_id": "Planck_reference",
                  "data_role": "reference_model_uncertainty",
                  "current_status": "no_reference_uncertainty_computed",
                  "combination_status": "missing_reference_covariance",
                  "may_enter_final_combined_score_now": False,
                  "required_before_combination": "Planck_reference_mean_and_covariance_or_verified_external_reference"
              },
              {
                  "family_id": "KiDS_weak_lensing",
                  "data_role": "separate_consolidation_pressure_context",
                  "current_status": "not_part_of_current_RSD_covariance_combination",
                  "combination_status": "separate_lane_not_RSD_combined_score",
                  "may_enter_final_combined_score_now": False,
                  "required_before_combination": "separate_lensing_combination_policy_not_RSD_policy"
              }
          ]

          DUPLICATION_AND_INDEPENDENCE_RULES = [
              {
                  "rule_id": "same_survey_subsamples_not_automatic_independent",
                  "rule": "Subsamples from the same survey family cannot be block-diagonal combined unless covariance independence is documented.",
                  "applies_to": "BOSS/eBOSS internal products",
                  "block_final_if_unresolved": True
              },
              {
                  "rule_id": "overlapping_tracers_require_scope_labels",
                  "rule": "LRG, QSO, ELG, and galaxy samples must retain tracer and redshift-scope labels before combination.",
                  "applies_to": "BOSS/eBOSS/WiggleZ",
                  "block_final_if_unresolved": True
              },
              {
                  "rule_id": "reference_covariance_must_be_propagated",
                  "rule": "Observed RSD covariance cannot be compared to a fixed Planck-like reference as a final score; reference uncertainty must be propagated or explicitly absent.",
                  "applies_to": "all_RSD_reference_comparisons",
                  "block_final_if_unresolved": True
              },
              {
                  "rule_id": "external_reference_is_not_automatically_covariance",
                  "rule": "Source pages, papers, sidecars, and summary tables are anchors until posterior samples or covariance are verified.",
                  "applies_to": "Planck_reference",
                  "block_final_if_unresolved": True
              },
              {
                  "rule_id": "mixed_direction_must_be_preserved",
                  "rule": "BOSS mixed direction and eBOSS LRG/QSO positive direction must not be flattened into an all-negative growth story.",
                  "applies_to": "interpretation_layer",
                  "block_final_if_unresolved": True
              },
              {
                  "rule_id": "weak_lensing_not_folded_into_RSD_without_bridge",
                  "rule": "KiDS/S8 weak-lensing pressure cannot be merged into RSD/fsigma8 covariance without a declared cross-observable bridge.",
                  "applies_to": "KiDS_and_RSD",
                  "block_final_if_unresolved": True
              }
          ]

          ALLOWED_OUTPUT_MODES = [
              {
                  "mode_id": "separate_family_status_table",
                  "allowed_now": True,
                  "description": "Report each family separately with status, direction, blockers, and warning labels."
              },
              {
                  "mode_id": "nonfinal_pressure_vector",
                  "allowed_now": True,
                  "description": "Show nonfinal per-family diagnostic directions without collapsing into one final score."
              },
              {
                  "mode_id": "block_diagonal_combination",
                  "allowed_now": False,
                  "description": "Only allowed later if independence and covariance boundaries are documented."
              },
              {
                  "mode_id": "full_RSD_pressure_score",
                  "allowed_now": False,
                  "description": "Blocked until Planck reference uncertainty, ELG/WiggleZ/exclusion policy, and duplication rules are resolved."
              },
              {
                  "mode_id": "model_selection_BIC_or_likelihood",
                  "allowed_now": False,
                  "description": "No likelihood, BIC, posterior comparison, or cosmological model selection is run in this lane yet."
              }
          ]

          FINAL_SCORE_GATES = [
              {
                  "gate_id": "Planck_reference_uncertainty_ready",
                  "current_pass": False,
                  "needed": "reference mean vector and covariance at target redshifts"
              },
              {
                  "gate_id": "ELG_policy_ready",
                  "current_pass": False,
                  "needed": "ELG parser or explicit exclusion rule"
              },
              {
                  "gate_id": "WiggleZ_policy_ready",
                  "current_pass": False,
                  "needed": "usable product/covariance mapping or explicit exclusion rule"
              },
              {
                  "gate_id": "BOSS_eBOSS_duplication_policy_ready",
                  "current_pass": False,
                  "needed": "survey/tracer/redshift overlap and covariance independence decision"
              },
              {
                  "gate_id": "cross_observable_policy_ready",
                  "current_pass": False,
                  "needed": "rule separating RSD from weak-lensing/S8 unless a bridge is declared"
              },
              {
                  "gate_id": "mixed_direction_interpretation_preserved",
                  "current_pass": True,
                  "needed": "avoid all-negative growth story"
              }
          ]

          BLOCKED_CLAIMS = [
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "BOSS and eBOSS were treated as independent by default.",
              "ELG was treated as covariance-ready.",
              "WiggleZ was treated as covariance-ready.",
              "KiDS weak-lensing pressure was merged into RSD covariance.",
              "All growth data point negative.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "route_id": "v4_73_ELG_parser_or_exclusion_policy",
                  "status": "clean_next_data_blocker",
                  "purpose": "Either design an ELG grid parser or formally keep ELG parked/excluded from RSD combination."
              },
              {
                  "route_id": "v4_73_WiggleZ_source_locator_or_exclusion_policy",
                  "status": "clean_next_data_blocker",
                  "purpose": "Retry WiggleZ product mapping or formally keep WiggleZ excluded from combination."
              },
              {
                  "route_id": "v4_73_Planck_reference_deep_route",
                  "status": "clean_reference_blocker",
                  "purpose": "Continue external candidate deep review or solver/container branch for reference uncertainty."
              },
              {
                  "route_id": "v4_73_nonfinal_pressure_vector_builder",
                  "status": "safe_summary_route",
                  "purpose": "Build a nonfinal vector table showing BOSS/eBOSS/ELG/WiggleZ/Planck statuses without combining them."
              }
          ]

          failed_gates = []
          warnings = [
              "combination_policy_design_only",
              "no_combined_score",
              "no_reference_uncertainty_computed",
              "ELG_not_covariance_ready",
              "WiggleZ_not_covariance_ready",
              "Planck_reference_uncertainty_missing",
              "mixed_direction_caution_required",
              "not_validation"
          ]

          required_families = {
              "BOSS_DR12",
              "eBOSS_LRG_QSO",
              "eBOSS_ELG",
              "WiggleZ",
              "Planck_reference",
              "KiDS_weak_lensing"
          }

          present_families = {row["family_id"] for row in SOURCE_FAMILY_STATUS}

          missing_families = sorted(required_families - present_families)
          if missing_families:
              failed_gates.append("missing_source_families_" + "_".join(missing_families))

          if any(row["may_enter_final_combined_score_now"] is not False for row in SOURCE_FAMILY_STATUS):
              failed_gates.append("source_family_allowed_into_final_score_too_early")

          if not any(row["rule_id"] == "mixed_direction_must_be_preserved" for row in DUPLICATION_AND_INDEPENDENCE_RULES):
              failed_gates.append("mixed_direction_rule_missing")

          if not any(row["rule_id"] == "reference_covariance_must_be_propagated" for row in DUPLICATION_AND_INDEPENDENCE_RULES):
              failed_gates.append("reference_covariance_rule_missing")

          if not any(row["mode_id"] == "full_RSD_pressure_score" and row["allowed_now"] is False for row in ALLOWED_OUTPUT_MODES):
              failed_gates.append("full_RSD_pressure_score_not_blocked")

          if any(row["gate_id"] != "mixed_direction_interpretation_preserved" and row["current_pass"] is True for row in FINAL_SCORE_GATES):
              failed_gates.append("final_score_gate_passed_too_early")

          if UPSTREAM_LOCKS["v4_71"]["reference_uncertainty_computed"] is not False:
              failed_gates.append("v4_71_reference_uncertainty_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_50"]["all_negative_growth_story_allowed"] is not False:
              failed_gates.append("v4_50_mixed_direction_boundary_not_carried")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "combined growth covariance",
              "reference uncertainty is included",
              "boss and eboss were treated as independent",
              "elg was treated as covariance-ready",
              "wigglez was treated as covariance-ready",
              "all growth data point negative",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "cross_family_combination_policy_passed_final_score_blocked_ready_for_ELG_WiggleZ_or_nonfinal_vector_next"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "required_source_families_present",
                  "pass": len(missing_families) == 0,
                  "result": f"{len(present_families)} source families present",
                  "boundary": "Presence is status tracking only."
              },
              {
                  "rule_id": "all_families_block_final_score_now",
                  "pass": all(row["may_enter_final_combined_score_now"] is False for row in SOURCE_FAMILY_STATUS),
                  "result": "all tracked families blocked from final combined score now",
                  "boundary": "No final RSD score."
              },
              {
                  "rule_id": "duplication_independence_rules_declared",
                  "pass": len(DUPLICATION_AND_INDEPENDENCE_RULES) >= 6,
                  "result": f"{len(DUPLICATION_AND_INDEPENDENCE_RULES)} duplication and independence rules declared",
                  "boundary": "Policy only."
              },
              {
                  "rule_id": "allowed_output_modes_declared",
                  "pass": len(ALLOWED_OUTPUT_MODES) >= 5,
                  "result": f"{len(ALLOWED_OUTPUT_MODES)} output modes declared",
                  "boundary": "Only separate status and nonfinal vector are allowed now."
              },
              {
                  "rule_id": "final_score_gates_declared",
                  "pass": len(FINAL_SCORE_GATES) >= 6,
                  "result": f"{len(FINAL_SCORE_GATES)} final-score gates declared",
                  "boundary": "Most gates remain blocked."
              },
              {
                  "rule_id": "mixed_direction_caution_preserved",
                  "pass": UPSTREAM_LOCKS["v4_50"]["all_negative_growth_story_allowed"] is False,
                  "result": "all-negative growth story remains blocked",
                  "boundary": "BOSS/eBOSS directions are mixed."
              },
              {
                  "rule_id": "Planck_reference_uncertainty_still_missing",
                  "pass": UPSTREAM_LOCKS["v4_71"]["reference_uncertainty_computed"] is False,
                  "result": "Planck reference uncertainty remains missing",
                  "boundary": "No final RSD pressure."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 12,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final pressure claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not combine covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Combination policy only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_72_rules_passed")

          if failed_gates:
              readiness_label = "cross_family_combination_policy_design_failed"
              next_allowed_step = "Repair cross-family combination policy before any nonfinal vector or combined-score route."
          else:
              readiness_label = "cross_family_combination_policy_design_passed_ready_for_ELG_WiggleZ_reference_or_nonfinal_vector_next"
              next_allowed_step = (
                  "Proceed to ELG parser/exclusion policy, WiggleZ source/exclusion policy, Planck reference deep route, "
                  "or a nonfinal pressure vector builder. Do not compute final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "source_family_count": len(SOURCE_FAMILY_STATUS),
              "missing_source_family_count": len(missing_families),
              "duplication_rule_count": len(DUPLICATION_AND_INDEPENDENCE_RULES),
              "allowed_output_mode_count": len(ALLOWED_OUTPUT_MODES),
              "final_score_gate_count": len(FINAL_SCORE_GATES),
              "final_score_gates_passed_count": sum(1 for row in FINAL_SCORE_GATES if row["current_pass"]),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "next_route_option_count": len(NEXT_ROUTE_OPTIONS),
              "route_decision": route_decision,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "BOSS_eBOSS_independence_assumed": False,
              "ELG_covariance_ready": False,
              "WiggleZ_covariance_ready": False,
              "KiDS_merged_into_RSD": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "source_family_status": SOURCE_FAMILY_STATUS,
              "duplication_and_independence_rules": DUPLICATION_AND_INDEPENDENCE_RULES,
              "allowed_output_modes": ALLOWED_OUTPUT_MODES,
              "final_score_gates": FINAL_SCORE_GATES,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "BOSS_eBOSS_independence_assumed": False,
                  "ELG_covariance_ready": False,
                  "WiggleZ_covariance_ready": False,
                  "KiDS_merged_into_RSD": False,
                  "validation_claim_allowed": False
              }
          }

          json_path = OUTDIR / "tairid_v4_72_cross_family_combination_policy_design.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "source_family_status_v4_72.csv",
              SOURCE_FAMILY_STATUS,
              ["family_id", "data_role", "current_status", "combination_status", "may_enter_final_combined_score_now", "required_before_combination"]
          )

          write_csv(
              OUTDIR / "duplication_and_independence_rules_v4_72.csv",
              DUPLICATION_AND_INDEPENDENCE_RULES,
              ["rule_id", "rule", "applies_to", "block_final_if_unresolved"]
          )

          write_csv(
              OUTDIR / "allowed_output_modes_v4_72.csv",
              ALLOWED_OUTPUT_MODES,
              ["mode_id", "allowed_now", "description"]
          )

          write_csv(
              OUTDIR / "final_score_gates_v4_72.csv",
              FINAL_SCORE_GATES,
              ["gate_id", "current_pass", "needed"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_72.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_72.csv",
              NEXT_ROUTE_OPTIONS,
              ["route_id", "status", "purpose"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_72.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.72 — Cross-Family Combination Policy Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This test locks the cross-family combination policy before any final RSD pressure score is attempted.")
          md.append("")
          md.append("The rule is simple: BOSS, eBOSS, ELG, WiggleZ, Planck reference uncertainty, and KiDS/S8 context cannot be mixed into one final score until duplication, independence, reference covariance, and cross-observable boundaries are solved.")
          md.append("")
          md.append("The only allowed current outputs are separate family status tables and nonfinal pressure-vector style summaries.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Key boundary")
          md.append("")
          md.append("- No final RSD pressure score yet.")
          md.append("- No block-diagonal covariance combination by assumption.")
          md.append("- No all-negative growth story.")
          md.append("- KiDS/S8 remains a separate consolidation-pressure lane unless a bridge is declared.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_72_cross_family_combination_policy_design.json`")
          md.append("- `tairid_v4_72_cross_family_combination_policy_design.md`")
          md.append("- `source_family_status_v4_72.csv`")
          md.append("- `duplication_and_independence_rules_v4_72.csv`")
          md.append("- `allowed_output_modes_v4_72.csv`")
          md.append("- `final_score_gates_v4_72.csv`")
          md.append("- `blocked_claims_v4_72.csv`")
          md.append("- `next_route_options_v4_72.csv`")
          md.append("- `rule_results_v4_72.csv`")
          md.append("")

          (OUTDIR / "tairid_v4_72_cross_family_combination_policy_design.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
