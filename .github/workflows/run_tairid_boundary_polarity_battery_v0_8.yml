name: Run TAIRID Boundary Polarity Battery v0.8

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-boundary-polarity-battery-v0-8:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy matplotlib astropy

      - name: Confirm scripts exist
        run: |
          pwd
          ls -la
          test -f run_tairid_table2_f160w_quantile_bands_v1_5.py
          test -f run_tairid_table2_f160w_faint_tail_host_field_v1_6.py
          test -f run_tairid_boundary_polarity_battery_v0_2.py
          test -f run_tairid_boundary_polarity_battery_v0_5.py
          test -f run_tairid_boundary_polarity_battery_v0_6.py
          test -f run_tairid_boundary_polarity_battery_v0_7.py
          test -f run_tairid_boundary_polarity_battery_v0_8.py
          echo "Required scripts found."

      - name: Run TAIRID Boundary Polarity Battery v0.8
        run: |
          python run_tairid_boundary_polarity_battery_v0_8.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-boundary-polarity-battery-v0-8-output
          path: |
            tairid_boundary_polarity_battery_v0_8_outputs/**
            run_tairid_table2_f160w_quantile_bands_v1_5_importable_for_v1_6.py
