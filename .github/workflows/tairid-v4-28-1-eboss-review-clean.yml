name: TAIRID v4.28.1 eBOSS Review Clean

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-28-1-eboss-review-clean.yml"

jobs:
  tairid-v4-28-1-eboss-review-clean:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.28.1 eBOSS review clean
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_28_1_eboss_review_clean

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_28_1_eboss_review_clean")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_28_1_eboss_review_clean"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not run likelihood, BIC, refit, posterior comparison, or model selection.",
              "This does not compute a final RSD pressure score.",
              "This does not make the RSD lane covariance-aware.",
              "This only repairs eBOSS f_sigma8 rows as published-summary values for a later non-final preview."
          ]

          VALUE_SOURCE = {
              "source_id": "sdss_final_bao_rsd_measurements_table",
              "source_url": "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/",
              "source_status": "published_summary_table",
              "boundary": "BAO and RSD are bundled in the source table, but BAO remains boundary/ruler and f_sigma8 remains growth."
          }

          RSD_ROWS_BEFORE = [
              {
                  "row_id": "boss_dr12_z038_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer": "galaxy_consensus",
                  "z_eff": 0.38,
                  "axis": "f_sigma8",
                  "value": 0.497,
                  "sigma": 0.045,
                  "status": "value_ready_carried",
                  "bao_bundled": True
              },
              {
                  "row_id": "boss_dr12_z051_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer": "galaxy_consensus",
                  "z_eff": 0.51,
                  "axis": "f_sigma8",
                  "value": 0.458,
                  "sigma": 0.038,
                  "status": "value_ready_carried",
                  "bao_bundled": True
              },
              {
                  "row_id": "boss_dr12_z061_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer": "galaxy_consensus",
                  "z_eff": 0.61,
                  "axis": "f_sigma8",
                  "value": 0.436,
                  "sigma": 0.034,
                  "status": "value_ready_carried",
                  "bao_bundled": True
              },
              {
                  "row_id": "wigglez_z044_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer": "galaxy_rsd",
                  "z_eff": 0.44,
                  "axis": "f_sigma8",
                  "value": 0.413,
                  "sigma": 0.080,
                  "status": "value_ready_carried",
                  "bao_bundled": False
              },
              {
                  "row_id": "wigglez_z060_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer": "galaxy_rsd",
                  "z_eff": 0.60,
                  "axis": "f_sigma8",
                  "value": 0.390,
                  "sigma": 0.063,
                  "status": "value_ready_carried",
                  "bao_bundled": False
              },
              {
                  "row_id": "wigglez_z073_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer": "galaxy_rsd",
                  "z_eff": 0.73,
                  "axis": "f_sigma8",
                  "value": 0.437,
                  "sigma": 0.072,
                  "status": "value_ready_carried",
                  "bao_bundled": False
              },
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer": "LRG",
                  "z_eff": 0.70,
                  "axis": "f_sigma8",
                  "value": "",
                  "sigma": "",
                  "status": "blocked_until_value_review",
                  "bao_bundled": True
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer": "ELG",
                  "z_eff": 0.85,
                  "axis": "f_sigma8",
                  "value": "",
                  "sigma": "",
                  "status": "blocked_until_value_review",
                  "bao_bundled": True
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer": "QSO",
                  "z_eff": 1.48,
                  "axis": "f_sigma8",
                  "value": "",
                  "sigma": "",
                  "status": "blocked_until_value_review",
                  "bao_bundled": True
              }
          ]

          EBOSS_REVIEW_VALUES = [
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "reviewed_value": 0.473,
                  "reviewed_sigma": 0.041,
                  "review_status": "value_reviewed_published_summary"
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "reviewed_value": 0.315,
                  "reviewed_sigma": 0.095,
                  "review_status": "value_reviewed_published_summary"
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "reviewed_value": 0.462,
                  "reviewed_sigma": 0.045,
                  "review_status": "value_reviewed_published_summary"
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "The eBOSS rows are direct posterior-chain rows.",
              "The repaired rows are covariance-aware.",
              "BAO and RSD can be averaged into one reach/growth correction.",
              "A likelihood, BIC, refit, or model comparison was run.",
              "The published-summary value review proves growth suppression."
          ]

          failed_gates = []
          warnings = [
              "eBOSS_values_are_published_summary_not_direct_chain",
              "BAO_RSD_separation_required_for_eBOSS_rows",
              "covariance_not_imported",
              "no_residuals_or_pressure_scores_computed",
              "next_preview_still_diagonal_only_unless_covariance_added"
          ]

          pending_before = [row for row in RSD_ROWS_BEFORE if row["status"] == "blocked_until_value_review"]
          pending_ids = {row["row_id"] for row in pending_before}
          reviewed_ids = {row["row_id"] for row in EBOSS_REVIEW_VALUES}

          if pending_ids != reviewed_ids:
              failed_gates.append("reviewed_rows_do_not_match_pending_eboss_rows")

          for row in EBOSS_REVIEW_VALUES:
              if row["reviewed_value"] in ["", None]:
                  failed_gates.append(row["row_id"] + "_missing_value")
              if row["reviewed_sigma"] in ["", None]:
                  failed_gates.append(row["row_id"] + "_missing_sigma")
              if float(row["reviewed_sigma"]) <= 0:
                  failed_gates.append(row["row_id"] + "_nonpositive_sigma")
              if row["review_status"] != "value_reviewed_published_summary":
                  failed_gates.append(row["row_id"] + "_wrong_review_status")

          review_lookup = {row["row_id"]: row for row in EBOSS_REVIEW_VALUES}
          repaired_rows = []

          for old in RSD_ROWS_BEFORE:
              new = dict(old)
              if old["row_id"] in review_lookup:
                  reviewed = review_lookup[old["row_id"]]
                  new["value"] = reviewed["reviewed_value"]
                  new["sigma"] = reviewed["reviewed_sigma"]
                  new["status"] = "value_ready_after_v4_28_1_review"
                  new["evidence_status"] = "published_summary_value_reviewed"
                  new["value_source_id"] = VALUE_SOURCE["source_id"]
                  new["enter_next_preview"] = True
              else:
                  new["evidence_status"] = "published_summary_carried"
                  new["value_source_id"] = "prior_review"
                  new["enter_next_preview"] = new["value"] not in ["", None] and new["sigma"] not in ["", None]

              new["direct_chain_claim_allowed"] = False
              new["covariance_imported"] = False
              new["residuals_computed"] = False
              new["pressure_score_allowed_now"] = False
              repaired_rows.append(new)

          for row in repaired_rows:
              if row["axis"] != "f_sigma8":
                  failed_gates.append(row["row_id"] + "_axis_not_f_sigma8")
              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append(row["row_id"] + "_pressure_score_allowed")
              if row["direct_chain_claim_allowed"] is not False:
                  failed_gates.append(row["row_id"] + "_direct_chain_claim_allowed")
              if row["covariance_imported"] is not False:
                  failed_gates.append(row["row_id"] + "_covariance_imported")
              if row["residuals_computed"] is not False:
                  failed_gates.append(row["row_id"] + "_residuals_computed")

          eboss_ready_after = [
              row for row in repaired_rows
              if row["survey_family"] == "eBOSS_DR16"
              and row["value"] not in ["", None]
              and row["sigma"] not in ["", None]
          ]

          all_ready_after = [
              row for row in repaired_rows
              if row["value"] not in ["", None]
              and row["sigma"] not in ["", None]
          ]

          rule_results = [
              {
                  "rule_id": "value_source_declared",
                  "pass": bool(VALUE_SOURCE["source_id"]) and bool(VALUE_SOURCE["source_url"]),
                  "result": "value_source_declared",
                  "boundary": "Values are sourced to a published summary table."
              },
              {
                  "rule_id": "all_pending_eboss_rows_repaired",
                  "pass": len(eboss_ready_after) == 3,
                  "result": "LRG_ELG_QSO_rows_value_reviewed",
                  "boundary": "No pending eBOSS row is silently skipped."
              },
              {
                  "rule_id": "axis_preserved",
                  "pass": all(row["axis"] == "f_sigma8" for row in repaired_rows),
                  "result": "all_rows_remain_f_sigma8",
                  "boundary": "RSD stays growth-rate axis."
              },
              {
                  "rule_id": "published_summary_status_preserved",
                  "pass": all(row["direct_chain_claim_allowed"] is False for row in repaired_rows),
                  "result": "no_direct_chain_promotion",
                  "boundary": "Published summary is not direct parsed data."
              },
              {
                  "rule_id": "no_residual_or_pressure_now",
                  "pass": all(row["residuals_computed"] is False and row["pressure_score_allowed_now"] is False for row in repaired_rows),
                  "result": "value_review_only",
                  "boundary": "No residuals or pressure scores in v4.28.1."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_review_rules_passed")

          if failed_gates:
              readiness_label = "eboss_review_clean_failed"
              next_step = "Repair eBOSS value review before rerunning residual preview."
          else:
              readiness_label = "eboss_review_clean_passed_ready_for_nonfinal_preview_with_eBOSS"
              next_step = (
                  "Proceed to v4.29 RSD non-final residual preview with eBOSS included. "
                  "Keep diagonal-only, no-covariance, no-validation boundaries active."
              )

          system_health = {
              "pending_eboss_row_count_before": len(pending_before),
              "reviewed_eboss_row_count": len(EBOSS_REVIEW_VALUES),
              "eboss_value_ready_after_review": len(eboss_ready_after),
              "total_rsd_rows_after_review": len(repaired_rows),
              "value_ready_rows_after_review": len(all_ready_after),
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "direct_chain_claim_allowed": False,
              "covariance_imported": False,
              "residuals_computed": False,
              "pressure_score_allowed_now": False,
              "validation_claim_allowed": False
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "value_source": VALUE_SOURCE,
              "rsd_rows_before": RSD_ROWS_BEFORE,
              "eboss_review_values": EBOSS_REVIEW_VALUES,
              "repaired_rows": repaired_rows,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": warnings,
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_pressure_scores_built": False,
                  "residuals_computed": False,
                  "covariance_imported": False,
                  "likelihood_run": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "eboss_review_values_v4_28_1.csv",
              EBOSS_REVIEW_VALUES,
              ["row_id", "reviewed_value", "reviewed_sigma", "review_status"]
          )

          write_csv(
              OUTDIR / "repaired_rsd_rows_v4_28_1.csv",
              repaired_rows,
              [
                  "row_id",
                  "survey_family",
                  "tracer",
                  "z_eff",
                  "axis",
                  "value",
                  "sigma",
                  "status",
                  "evidence_status",
                  "value_source_id",
                  "bao_bundled",
                  "enter_next_preview",
                  "direct_chain_claim_allowed",
                  "covariance_imported",
                  "residuals_computed",
                  "pressure_score_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "review_rule_results_v4_28_1.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_28_1.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "system_health_v4_28_1.csv",
              [system_health],
              [
                  "pending_eboss_row_count_before",
                  "reviewed_eboss_row_count",
                  "eboss_value_ready_after_review",
                  "total_rsd_rows_after_review",
                  "value_ready_rows_after_review",
                  "rule_pass_count",
                  "rule_total_count",
                  "direct_chain_claim_allowed",
                  "covariance_imported",
                  "residuals_computed",
                  "pressure_score_allowed_now",
                  "validation_claim_allowed"
              ]
          )

          json_path = OUTDIR / "tairid_v4_28_1_eboss_review_clean.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.28.1 — eBOSS Review Clean")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(warnings)}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("The eBOSS LRG, ELG, and QSO f_sigma8 rows were repaired as published-summary values.")
          md.append("")
          md.append("No residuals, pressure scores, covariance import, likelihood, refit, or validation claim were produced.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## eBOSS reviewed values")
          md.append("")
          md.append("| Row | Value | Sigma | Status |")
          md.append("|---|---:|---:|---|")
          for row in EBOSS_REVIEW_VALUES:
              md.append(f"| `{row['row_id']}` | `{row['reviewed_value']}` | `{row['reviewed_sigma']}` | `{row['review_status']}` |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `eboss_review_values_v4_28_1.csv`")
          md.append("- `repaired_rsd_rows_v4_28_1.csv`")
          md.append("- `review_rule_results_v4_28_1.csv`")
          md.append("- `blocked_claims_v4_28_1.csv`")
          md.append("- `system_health_v4_28_1.csv`")
          md.append("- `tairid_v4_28_1_eboss_review_clean.json`")
          md.append("- `tairid_v4_28_1_eboss_review_clean.md`")
          md.append("")

          md_path = OUTDIR / "tairid_v4_28_1_eboss_review_clean.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.28.1 eBOSS review clean artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-28-1-eboss-review-clean
          path: artifacts/tairid_v4_28_1_eboss_review_clean/
