name: TAIRID Cosmology v4.23 RSD fsigma8 Boundary Audit Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-23-rsd-fsigma8-boundary-audit-onefile.yml"

jobs:
  rsd-fsigma8-boundary-audit-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.23 RSD fsigma8 boundary audit onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_23_rsd_fsigma8_boundary_audit_onefile

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_23_rsd_fsigma8_boundary_audit_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_23_rsd_fsigma8_boundary_audit_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine RSD, weak lensing, clusters, CMB lensing, KiDS, DES, HSC, H0LiCOW, BAO, or CMB into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run an RSD likelihood.",
              "This does not compute a new growth pressure score.",
              "This audits published-summary RSD/fσ8 rows as a future growth/consolidation lane.",
              "A pass means the RSD/fσ8 lane is bounded and organized for future testing, not that TAIRID cosmology is validated."
          ]

          SOURCE_ROOTS = [
              {
                  "source_id": "boss_dr12_consensus_bao_rsd",
                  "survey_family": "BOSS_DR12",
                  "source_url": "https://arxiv.org/abs/1607.03155",
                  "source_type": "arxiv_abstract",
                  "role_focus": "rsd_fsigma8_growth",
                  "expected_signal": "BOSS DR12 consensus constraints include BAO and redshift-space distortion growth information.",
                  "bao_rsd_status": "BAO_and_RSD_bundled_must_separate_roles"
              },
              {
                  "source_id": "eboss_dr16_cosmology_rsd",
                  "survey_family": "eBOSS_DR16",
                  "source_url": "https://arxiv.org/abs/2007.08991",
                  "source_type": "arxiv_abstract",
                  "role_focus": "rsd_fsigma8_growth",
                  "expected_signal": "eBOSS DR16 cosmology includes BAO and RSD growth constraints.",
                  "bao_rsd_status": "BAO_and_RSD_bundled_must_separate_roles"
              },
              {
                  "source_id": "wigglez_growth_rate_rsd",
                  "survey_family": "WiggleZ",
                  "source_url": "https://arxiv.org/abs/1104.2948",
                  "source_type": "arxiv_abstract",
                  "role_focus": "rsd_fsigma8_growth",
                  "expected_signal": "WiggleZ growth-rate and redshift-space distortion source candidate.",
                  "bao_rsd_status": "RSD_growth_summary_lane"
              }
          ]

          # Published-summary candidate rows.
          # These are treated as literature-summary rows only.
          # They are not direct parsed data, not likelihood outputs, and not pressure scores.
          RSD_SUMMARY_ROWS = [
              {
                  "row_id": "boss_dr12_z038_fsigma8",
                  "source_id": "boss_dr12_consensus_bao_rsd",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.38,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.497,
                  "published_sigma": 0.045,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "role_boundary": "RSD_fsigma8_growth_axis_only_BAO_kept_as_boundary",
                  "pressure_score_allowed_now": False,
                  "notes": "Candidate row for future RSD growth comparison; BAO role must remain separated."
              },
              {
                  "row_id": "boss_dr12_z051_fsigma8",
                  "source_id": "boss_dr12_consensus_bao_rsd",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.51,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.458,
                  "published_sigma": 0.038,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "role_boundary": "RSD_fsigma8_growth_axis_only_BAO_kept_as_boundary",
                  "pressure_score_allowed_now": False,
                  "notes": "Candidate row for future RSD growth comparison; BAO role must remain separated."
              },
              {
                  "row_id": "boss_dr12_z061_fsigma8",
                  "source_id": "boss_dr12_consensus_bao_rsd",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.61,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.436,
                  "published_sigma": 0.034,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "role_boundary": "RSD_fsigma8_growth_axis_only_BAO_kept_as_boundary",
                  "pressure_score_allowed_now": False,
                  "notes": "Candidate row for future RSD growth comparison; BAO role must remain separated."
              },
              {
                  "row_id": "wigglez_z044_fsigma8",
                  "source_id": "wigglez_growth_rate_rsd",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.44,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.413,
                  "published_sigma": 0.080,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "role_boundary": "RSD_fsigma8_growth_axis",
                  "pressure_score_allowed_now": False,
                  "notes": "Older RSD growth summary row; source age and covariance status must be preserved."
              },
              {
                  "row_id": "wigglez_z060_fsigma8",
                  "source_id": "wigglez_growth_rate_rsd",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.60,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.390,
                  "published_sigma": 0.063,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "role_boundary": "RSD_fsigma8_growth_axis",
                  "pressure_score_allowed_now": False,
                  "notes": "Older RSD growth summary row; source age and covariance status must be preserved."
              },
              {
                  "row_id": "wigglez_z073_fsigma8",
                  "source_id": "wigglez_growth_rate_rsd",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.73,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.437,
                  "published_sigma": 0.072,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "role_boundary": "RSD_fsigma8_growth_axis",
                  "pressure_score_allowed_now": False,
                  "notes": "Older RSD growth summary row; source age and covariance status must be preserved."
              },
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "source_id": "eboss_dr16_cosmology_rsd",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "LRG",
                  "z_eff": 0.70,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "role_boundary": "RSD_fsigma8_growth_axis_only_BAO_kept_as_boundary",
                  "pressure_score_allowed_now": False,
                  "notes": "eBOSS row staged for later value/covariance review; not scored in v4.23."
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "source_id": "eboss_dr16_cosmology_rsd",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "ELG",
                  "z_eff": 0.85,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "role_boundary": "RSD_fsigma8_growth_axis_only_BAO_kept_as_boundary",
                  "pressure_score_allowed_now": False,
                  "notes": "eBOSS row staged for later value/covariance review; not scored in v4.23."
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "source_id": "eboss_dr16_cosmology_rsd",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "QSO",
                  "z_eff": 1.48,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "role_boundary": "RSD_fsigma8_growth_axis_only_BAO_kept_as_boundary",
                  "pressure_score_allowed_now": False,
                  "notes": "eBOSS row staged for later value/covariance review; not scored in v4.23."
              }
          ]

          BOUNDARY_RULES = [
              {
                  "rule_id": "axis_label_required",
                  "description": "Every RSD row must explicitly label the observable axis as f_sigma8.",
                  "pass_condition": "observable_axis == f_sigma8 for all rows"
              },
              {
                  "rule_id": "redshift_label_required",
                  "description": "Every RSD row must carry an effective redshift or be blocked.",
                  "pass_condition": "z_eff present for all rows"
              },
              {
                  "rule_id": "evidence_status_required",
                  "description": "Every RSD row must state whether it is direct parsed, published summary, pending review, or infrastructure only.",
                  "pass_condition": "evidence_status present for all rows"
              },
              {
                  "rule_id": "bao_rsd_separation_required",
                  "description": "Rows from BAO+RSD products must keep BAO as boundary/ruler and RSD/fσ8 as growth axis.",
                  "pass_condition": "bao_bundled rows have role_boundary mentioning BAO kept as boundary"
              },
              {
                  "rule_id": "no_pressure_score_yet",
                  "description": "v4.23 must not compute a pressure score or compare RSD rows against Planck.",
                  "pass_condition": "pressure_score_allowed_now is false for all rows"
              }
          ]

          BLOCKED_INTERPRETATIONS = [
              {
                  "claim": "RSD/fσ8 validates TAIRID.",
                  "status": "blocked",
                  "reason": "This is a published-summary boundary audit only."
              },
              {
                  "claim": "RSD/fσ8 can now be averaged with weak-lensing S8.",
                  "status": "blocked",
                  "reason": "fσ8 is a different growth observable and requires an axis comparison matrix first."
              },
              {
                  "claim": "BAO and RSD are one combined reach/growth signal.",
                  "status": "blocked",
                  "reason": "BAO remains boundary/ruler; RSD/fσ8 is the growth-rate axis."
              },
              {
                  "claim": "A new RSD pressure score was computed.",
                  "status": "blocked",
                  "reason": "v4.23 does not compute pressure scores."
              },
              {
                  "claim": "An RSD likelihood or posterior was run.",
                  "status": "blocked",
                  "reason": "This audit uses published-summary/literature inventory status only."
              }
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_24_growth_axis_comparison_matrix",
                  "role_focus": "amplitude_decomposition",
                  "purpose": "Place S8, sigma8, fσ8, Omega_m, CMB lensing amplitude, and cluster amplitude into one axis map without combining them into one pressure score.",
                  "why_next": "RSD/fσ8 is now bounded, but it cannot be compared with weak-lensing S8 until the axis map exists.",
                  "must_include": "axis label, source family, evidence status, allowed interpretation, blocked interpretation.",
                  "must_not_include": "new pressure score, likelihood fit, model validation, one-surface collapse."
              },
              {
                  "priority": 2,
                  "next_test": "v4_25_RSD_planck_prediction_boundary_probe",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Only after axis comparison, define what an honest Planck/reference comparison would require for fσ8.",
                  "why_next": "fσ8 is redshift-dependent and cannot be compared like S8 without a reference curve or published baseline.",
                  "must_include": "redshift dependence, reference-model boundary, covariance warning, no validation claim.",
                  "must_not_include": "pretending fσ8 and S8 are the same axis."
              },
              {
                  "priority": 3,
                  "next_test": "v4_26_cluster_mass_calibration_boundary_audit",
                  "role_focus": "cluster_abundance_growth",
                  "purpose": "Audit cluster abundance with mass calibration and selection boundaries.",
                  "why_next": "Clusters are growth-relevant but need stronger calibration guards before pressure scoring.",
                  "must_include": "mass calibration, selection, source/product status, axis label.",
                  "must_not_include": "cluster proof claim."
              }
          ]

          KEYWORDS = {
              "rsd": [
                  "redshift-space distortion",
                  "redshift space distortion",
                  "RSD",
                  "fσ8",
                  "fsigma8",
                  "growth rate",
                  "growth of structure",
                  "peculiar velocity"
              ],
              "bao": [
                  "BAO",
                  "baryon acoustic",
                  "acoustic oscillation",
                  "standard ruler",
                  "sound horizon"
              ],
              "axis": [
                  "fσ8",
                  "fsigma8",
                  "sigma8",
                  "σ8",
                  "growth rate",
                  "Omega_m",
                  "S8"
              ]
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def fetch_text(url, timeout=90, byte_limit=2_000_000):
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 TAIRID-v4.23-RSD-fsigma8-boundary-audit",
                      "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
                  }
              )
              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def clean_text(text):
              text = re.sub(r"<script.*?</script>", " ", text or "", flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def keyword_hits(text, words):
              lower = (text or "").lower()
              hits = []
              for word in words:
                  if word.lower() in lower:
                      hits.append(word)
              return hits

          def classify_source(text, expected_signal):
              cleaned = clean_text(text)
              combined = cleaned + " " + expected_signal

              rsd_hits = keyword_hits(combined, KEYWORDS["rsd"])
              bao_hits = keyword_hits(combined, KEYWORDS["bao"])
              axis_hits = keyword_hits(combined, KEYWORDS["axis"])

              if rsd_hits and axis_hits and bao_hits:
                  classification = "rsd_axis_source_with_bao_boundary"
              elif rsd_hits and axis_hits:
                  classification = "rsd_axis_source"
              elif rsd_hits:
                  classification = "rsd_source_needs_axis_review"
              else:
                  classification = "rsd_source_needs_manual_review"

              return {
                  "classification": classification,
                  "rsd_hits": ";".join(rsd_hits),
                  "bao_hits": ";".join(bao_hits),
                  "axis_hits": ";".join(axis_hits),
                  "text_preview": cleaned[:500]
              }

          created_at = now_iso()

          source_rows = []
          for source in SOURCE_ROOTS:
              fetched = fetch_text(source["source_url"])
              classified = classify_source(
                  fetched["text"] if fetched["ok"] else "",
                  source["expected_signal"]
              )
              source_rows.append({
                  "source_id": source["source_id"],
                  "survey_family": source["survey_family"],
                  "role_focus": source["role_focus"],
                  "source_url": source["source_url"],
                  "source_type": source["source_type"],
                  "expected_signal": source["expected_signal"],
                  "bao_rsd_status": source["bao_rsd_status"],
                  "fetch_ok": fetched["ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"],
                  **classified
              })

          failed_gates = []
          warnings = []

          if len(RSD_SUMMARY_ROWS) < 3:
              failed_gates.append("too_few_rsd_summary_rows")

          for row in RSD_SUMMARY_ROWS:
              if row.get("observable_axis") != "f_sigma8":
                  failed_gates.append(f"{row['row_id']}_axis_not_f_sigma8")

              if row.get("z_eff", "") in ["", None]:
                  failed_gates.append(f"{row['row_id']}_missing_z_eff")

              if not row.get("evidence_status"):
                  failed_gates.append(f"{row['row_id']}_missing_evidence_status")

              if bool(row.get("bao_bundled")) and "BAO_kept_as_boundary" not in row.get("role_boundary", ""):
                  failed_gates.append(f"{row['row_id']}_bao_boundary_not_preserved")

              if row.get("pressure_score_allowed_now") is not False:
                  failed_gates.append(f"{row['row_id']}_pressure_score_allowed_violation")

          reachable_sources = [row for row in source_rows if row["fetch_ok"]]
          if len(reachable_sources) < 2:
              warnings.append("fewer_than_two_rsd_sources_reachable")

          value_ready_rows = [
              row for row in RSD_SUMMARY_ROWS
              if row.get("published_value") not in ["", None]
              and row.get("published_sigma") not in ["", None]
          ]

          pending_value_rows = [
              row for row in RSD_SUMMARY_ROWS
              if row.get("published_value") in ["", None]
              or row.get("published_sigma") in ["", None]
          ]

          bao_bundled_rows = [row for row in RSD_SUMMARY_ROWS if bool(row.get("bao_bundled"))]
          non_bao_rows = [row for row in RSD_SUMMARY_ROWS if not bool(row.get("bao_bundled"))]

          if pending_value_rows:
              warnings.append("some_RSD_rows_pending_value_review")

          if bao_bundled_rows:
              warnings.append("BAO_RSD_separation_required_for_bundled_rows")

          warnings.append("RSD_boundary_audit_is_not_pressure_score")
          warnings.append("RSD_fsigma8_not_same_axis_as_weak_lensing_S8")

          rule_results = [
              {
                  "rule_id": "axis_label_required",
                  "pass": all(row.get("observable_axis") == "f_sigma8" for row in RSD_SUMMARY_ROWS),
                  "result": "all_rows_labeled_f_sigma8",
                  "boundary": "RSD is growth-rate axis, not S8."
              },
              {
                  "rule_id": "redshift_label_required",
                  "pass": all(row.get("z_eff", "") not in ["", None] for row in RSD_SUMMARY_ROWS),
                  "result": "all_rows_have_effective_redshift",
                  "boundary": "fσ8 is redshift-dependent."
              },
              {
                  "rule_id": "evidence_status_required",
                  "pass": all(bool(row.get("evidence_status")) for row in RSD_SUMMARY_ROWS),
                  "result": "all_rows_have_evidence_status",
                  "boundary": "No hidden direct-data promotion."
              },
              {
                  "rule_id": "bao_rsd_separation_required",
                  "pass": all(
                      ("BAO_kept_as_boundary" in row.get("role_boundary", ""))
                      for row in RSD_SUMMARY_ROWS
                      if bool(row.get("bao_bundled"))
                  ),
                  "result": "bao_bundled_rows_preserve_BAO_boundary",
                  "boundary": "BAO is boundary/ruler; RSD is growth."
              },
              {
                  "rule_id": "no_pressure_score_yet",
                  "pass": all(row.get("pressure_score_allowed_now") is False for row in RSD_SUMMARY_ROWS),
                  "result": "no_RSD_pressure_score_allowed",
                  "boundary": "v4.23 only stages the lane."
              }
          ]

          lane_health = {
              "rsd_summary_row_count": len(RSD_SUMMARY_ROWS),
              "value_ready_row_count": len(value_ready_rows),
              "pending_value_row_count": len(pending_value_rows),
              "bao_bundled_row_count": len(bao_bundled_rows),
              "non_bao_row_count": len(non_bao_rows),
              "reachable_source_count": len(reachable_sources),
              "source_count": len(source_rows),
              "all_rules_passed": all(row["pass"] for row in rule_results),
              "pressure_score_allowed_now": False,
              "combined_posterior_allowed_now": False,
              "validation_claim_allowed": False
          }

          if not lane_health["all_rules_passed"]:
              failed_gates.append("not_all_boundary_rules_passed")

          if failed_gates:
              readiness_label = "rsd_fsigma8_boundary_audit_failed"
              next_step = "Repair RSD row labels, redshift labels, evidence status, or BAO/RSD boundary separation before axis comparison."
          else:
              readiness_label = "rsd_fsigma8_boundary_audit_passed_ready_for_growth_axis_comparison_matrix"
              next_step = (
                  "Proceed to v4.24 growth axis comparison matrix. "
                  "Do not score RSD yet; first map fσ8 against S8, sigma8, Omega_m, cluster amplitude, and CMB lensing amplitude."
              )

          interpretation = (
              "v4.23 stages RSD/fσ8 as the first growth-expansion lane. "
              "It records published-summary candidate rows, effective redshift, fσ8 axis, evidence status, and BAO/RSD separation. "
              "No pressure score is computed, and RSD is not treated as the same axis as weak-lensing S8."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "truth_boundary": TRUTH_BOUNDARY,
              "source_roots": SOURCE_ROOTS,
              "source_rows": source_rows,
              "rsd_summary_rows": RSD_SUMMARY_ROWS,
              "boundary_rules": BOUNDARY_RULES,
              "rule_results": rule_results,
              "lane_health": lane_health,
              "blocked_interpretations": BLOCKED_INTERPRETATIONS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "growth_law_proof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False,
                  "new_pressure_scores_built": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "combined_posterior_allowed": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False,
                  "new_pressure_scores_built": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
