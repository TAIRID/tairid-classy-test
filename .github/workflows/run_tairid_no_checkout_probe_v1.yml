name: Run TAIRID No Checkout Probe v1

on:
  push:
  workflow_dispatch:

jobs:
  tairid-no-checkout-probe-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create and run inline Python probe
        run: |
          cat > tairid_no_checkout_probe_v1.py <<'PY'
          import json
          import os
          import platform
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          outdir = Path("tairid_no_checkout_probe_v1_outputs")
          outdir.mkdir(parents=True, exist_ok=True)

          summary = {
              "test_name": "TAIRID No Checkout Probe v1",
              "status": "success",
              "meaning": "GitHub Actions ran without actions/checkout.",
              "utc_time": datetime.now(timezone.utc).isoformat(),
              "python_version": sys.version,
              "platform": platform.platform(),
              "github_actions": os.environ.get("GITHUB_ACTIONS"),
              "github_workflow": os.environ.get("GITHUB_WORKFLOW"),
              "github_ref": os.environ.get("GITHUB_REF"),
              "github_sha": os.environ.get("GITHUB_SHA"),
              "boundary": "This does not test TAIRID. It only tests whether Actions can run without cloning the repo.",
          }

          (outdir / "no_checkout_probe_summary.json").write_text(
              json.dumps(summary, indent=2),
              encoding="utf-8",
          )

          (outdir / "no_checkout_probe_summary.txt").write_text(
              "TAIRID No Checkout Probe v1\n\n"
              "STATUS: success\n\n"
              "GitHub Actions ran without actions/checkout.\n"
              "If checkout workflows fail but this works, the blocker is repo checkout access, not Python.\n",
              encoding="utf-8",
          )

          print("TAIRID No Checkout Probe v1 complete.")
          PY

          python tairid_no_checkout_probe_v1.py

      - name: Upload no-checkout probe output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-no-checkout-probe-v1-output
          path: |
            tairid_no_checkout_probe_v1_outputs/**
