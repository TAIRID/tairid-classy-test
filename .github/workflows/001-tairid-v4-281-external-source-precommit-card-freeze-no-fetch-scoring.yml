      - ".github/workflows/001-tairid-v4-281-external-source-precommit-card-freeze-no-fetch-scoring.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

