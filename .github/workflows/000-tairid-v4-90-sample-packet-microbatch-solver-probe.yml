name: 000 TAIRID v4.90 Sample Packet Microbatch Solver Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-90-sample-packet-microbatch-solver-probe.yml"

jobs:
  tairid-v4-90-sample-packet-microbatch-solver-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.90 sample packet microbatch solver probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_90_sample_packet_microbatch_solver_probe

          python - <<'PY'
          import csv
          import json
          import math
          import os
          import site
          import subprocess
          import sys
          import textwrap
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_90_sample_packet_microbatch_solver_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_90_sample_packet_microbatch_solver_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
