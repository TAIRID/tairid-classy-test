              {"sample_number": 2, "source_line_number": 2, "sample_weight": 1.0, "minus_loglike_or_proxy": 1395.388, "omegabh2": 0.02218979, "omegach2": 0.1205304, "theta": 1.040288, "tau": 0.04206461, "logA": 3.025793, "ns": 0.9635807, "cosmomc_theta_for_future_CAMB": 0.010402880000000002, "As_for_future_CAMB": 2.061034223390361e-09},
              {"sample_number": 3, "source_line_number": 3, "sample_weight": 5.0, "minus_loglike_or_proxy": 1408.35, "omegabh2": 0.02209695, "omegach2": 0.1204623, "theta": 1.040111, "tau": 0.03835893, "logA": 3.010538, "ns": 0.9612586, "cosmomc_theta_for_future_CAMB": 0.01040111, "As_for_future_CAMB": 2.02983174829604e-09},
              {"sample_number": 4, "source_line_number": 4, "sample_weight": 2.0, "minus_loglike_or_proxy": 1403.674, "omegabh2": 0.02212132, "omegach2": 0.1207202, "theta": 1.040009, "tau": 0.03892281, "logA": 3.011326, "ns": 0.9603125, "cosmomc_theta_for_future_CAMB": 0.010400089999999999, "As_for_future_CAMB": 2.031431886085187e-09},
              {"sample_number": 5, "source_line_number": 5, "sample_weight": 2.0, "minus_loglike_or_proxy": 1399.621, "omegabh2": 0.02215665, "omegach2": 0.1206029, "theta": 1.040078, "tau": 0.04707227, "logA": 3.028275, "ns": 0.962265, "cosmomc_theta_for_future_CAMB": 0.01040078, "As_for_future_CAMB": 2.066156063907548e-09},
              {"sample_number": 6, "source_line_number": 6, "sample_weight": 4.0, "minus_loglike_or_proxy": 1395.276, "omegabh2": 0.02214124, "omegach2": 0.1210155, "theta": 1.040316, "tau": 0.04831556, "logA": 3.029778, "ns": 0.9593876, "cosmomc_theta_for_future_CAMB": 0.01040316, "As_for_future_CAMB": 2.0692638313738124e-09},
              {"sample_number": 7, "source_line_number": 7, "sample_weight": 2.0, "minus_loglike_or_proxy": 1392.297, "omegabh2": 0.02218488, "omegach2": 0.120793, "theta": 1.04033, "tau": 0.05150504, "logA": 3.035247, "ns": 0.9600906, "cosmomc_theta_for_future_CAMB": 0.010403299999999999, "As_for_future_CAMB": 2.080611637559254e-09},
              {"sample_number": 8, "source_line_number": 8, "sample_weight": 1.0, "minus_loglike_or_proxy": 1395.241, "omegabh2": 0.02218953, "omegach2": 0.1208362, "theta": 1.040383, "tau": 0.0513925, "logA": 3.034896, "ns": 0.959871, "cosmomc_theta_for_future_CAMB": 0.010403830000000001, "As_for_future_CAMB": 2.0798814710261934e-09},
              {"sample_number": 9, "source_line_number": 9, "sample_weight": 2.0, "minus_loglike_or_proxy": 1401.216, "omegabh2": 0.02218699, "omegach2": 0.1202546, "theta": 1.040646, "tau": 0.04547102, "logA": 3.028586, "ns": 0.9612773, "cosmomc_theta_for_future_CAMB": 0.01040646, "As_for_future_CAMB": 2.0667987383741224e-09},
              {"sample_number": 10, "source_line_number": 10, "sample_weight": 2.0, "minus_loglike_or_proxy": 1392.132, "omegabh2": 0.0221458, "omegach2": 0.1207412, "theta": 1.040784, "tau": 0.04481115, "logA": 3.026835, "ns": 0.9612329, "cosmomc_theta_for_future_CAMB": 0.01040784, "As_for_future_CAMB": 2.063182940338247e-09},
              {"sample_number": 11, "source_line_number": 11, "sample_weight": 3.0, "minus_loglike_or_proxy": 1396.572, "omegabh2": 0.02214952, "omegach2": 0.1204577, "theta": 1.040809, "tau": 0.04500087, "logA": 3.025849, "ns": 0.9619075, "cosmomc_theta_for_future_CAMB": 0.010408090000000002, "As_for_future_CAMB": 2.0611496445386326e-09},
              {"sample_number": 12, "source_line_number": 12, "sample_weight": 1.0, "minus_loglike_or_proxy": 1391.129, "omegabh2": 0.02220349, "omegach2": 0.1198317, "theta": 1.040779, "tau": 0.04580805, "logA": 3.026048, "ns": 0.9633901, "cosmomc_theta_for_future_CAMB": 0.010407789999999998, "As_for_future_CAMB": 2.0615598541323967e-09}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A weighted covariance matrix was computed.",
              "A weighted posterior mean vector was computed.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The microbatch solver probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The 12-sample microbatch is the same as full Planck reference uncertainty.",
              "The 12-sample microbatch is enough for final RSD pressure.",
              "The output vectors are already posterior covariance."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_91_weighted_covariance_formula_lock",
                  "purpose": "Lock weighted mean and covariance formulas using the output-vector schema without computing final reference uncertainty.",
                  "why_next": "Output vectors exist, but covariance math must be locked before any covariance probe."
              },
              {
                  "priority": 2,
                  "route_id": "v4_92_reference_uncertainty_micro_covariance_probe",
                  "purpose": "Compute a tiny-subset weighted mean/covariance diagnostic only after formula lock.",
                  "why_next": "A micro covariance can test mechanics, but still will not be final Planck uncertainty."
              },
              {
                  "priority": 3,
                  "route_id": "v4_93_bounded_larger_sample_parser_design",
                  "purpose": "Design expansion from 12 rows toward a larger bounded sample batch.",
                  "why_next": "Real reference uncertainty needs more than 12 sample rows."
              },
              {
                  "priority": 4,
                  "route_id": "v4_94_ELG_or_WiggleZ_parallel_backlog",
                  "purpose": "Parallel route for parked growth-family incompleteness.",
                  "why_next": "ELG and WiggleZ remain incomplete."
              }
          ]

          failed_gates = []
          warnings = [
              "microbatch_solver_probe_only",
              "runs_CAMB_on_12_tiny_sample_packets",
              "sample_output_vectors_only",
              "no_weighted_mean",
              "no_covariance_computation",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def run_command(command, label, timeout_seconds=1200, env=None):
              record = {
                  "label": label,
                  "command": " ".join(command),
                  "returncode": "",
                  "ok": False,
                  "stdout_tail": "",
                  "stderr_tail": "",
                  "error": ""
              }
              try:
                  completed = subprocess.run(
                      command,
                      text=True,
                      capture_output=True,
                      timeout=timeout_seconds,
                      check=False,
                      env=env
                  )
                  record["returncode"] = completed.returncode
                  record["ok"] = completed.returncode == 0
                  record["stdout_tail"] = completed.stdout[-5000:]
                  record["stderr_tail"] = completed.stderr[-5000:]
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          install_records = []

          pip_upgrade = run_command(
              [sys.executable, "-m", "pip", "install", "--upgrade", "pip"],
              "pip_upgrade"
          )
          install_records.append(pip_upgrade)

          dependency_install = run_command(
              [
                  sys.executable,
                  "-m",
                  "pip",
                  "install",
                  "--prefer-binary",
                  "numpy",
                  "scipy",
                  "sympy",
                  "packaging",
                  "camb"
              ],
              "pip_install_numpy_scipy_sympy_packaging_camb"
          )
          install_records.append(dependency_install)

          user_site = site.getusersitepackages()
          runner_path = OUTDIR / "camb_microbatch_runner_v4_90.py"
          runner_json_path = OUTDIR / "camb_microbatch_runner_output_v4_90.json"

          runner_code = """
          import json
          import math
          import site
          import sys
          import traceback
          from pathlib import Path

          SAMPLE_PACKETS = json.loads(__SAMPLE_PACKETS_JSON__)
          TARGET_REDSHIFTS = json.loads(__TARGET_REDSHIFTS_JSON__)
          OUTPUT_VECTOR_SCHEMA = json.loads(__OUTPUT_VECTOR_SCHEMA_JSON__)
          OUT = Path(__RUNNER_JSON_PATH__)

          report = {
              "python_executable": sys.executable,
              "python_version": sys.version,
              "user_site": "",
              "sys_path_head": [],
              "numpy_imported": False,
              "numpy_version": "",
              "camb_imported": False,
              "camb_version": "",
              "sample_solver_records": [],
              "sample_output_vectors": [],
              "top_error": ""
          }

          def finite_positive_list(values, expected_len):
              try:
                  if len(values) != expected_len:
                      return False
                  return all(math.isfinite(float(x)) and float(x) > 0 for x in values)
              except Exception:
                  return False

          def orient(raw_values, locked_orientation):
              if locked_orientation == "reversed_raw_order":
                  return list(reversed([float(x) for x in raw_values]))
              if locked_orientation == "direct_raw_order":
                  return [float(x) for x in raw_values]
              raise RuntimeError("unknown locked orientation " + str(locked_orientation))

          def build_target_vector(sigma8_oriented, fsigma8_oriented):
              vector = []
              for i in range(len(TARGET_REDSHIFTS)):
                  vector.append(float(sigma8_oriented[i]))
                  vector.append(float(fsigma8_oriented[i]))
              return vector

          def run_one_sample(camb, np, packet):
              record = {
                  "sample_number": packet["sample_number"],
                  "source_line_number": packet["source_line_number"],
                  "sample_weight": packet["sample_weight"],
                  "minus_loglike_or_proxy": packet["minus_loglike_or_proxy"],
                  "set_cosmology_ok": False,
                  "init_power_ok": False,
                  "set_matter_power_ok": False,
                  "get_results_ok": False,
                  "get_sigma8_ok": False,
                  "get_fsigma8_ok": False,
                  "sigma8_len": 0,
                  "fsigma8_len": 0,
                  "complete_arrays": False,
                  "target_vector_len": 0,
                  "target_vector_finite": False,
                  "H0_recorded": "",
                  "Omega_m_recorded": "",
                  "error_stage": "",
                  "error_tail": ""
              }

              output_row = {
                  "sample_number": packet["sample_number"],
                  "source_line_number": packet["source_line_number"],
                  "sample_weight": packet["sample_weight"],
                  "minus_loglike_or_proxy": packet["minus_loglike_or_proxy"],
                  "locked_orientation": "reversed_raw_order",
                  "sigma8_values_raw": [],
                  "fsigma8_values_raw": [],
                  "sigma8_values_oriented": [],
                  "fsigma8_values_oriented": [],
                  "target_vector_10": [],
                  "output_scope": "tiny_12_sample_microbatch_output_not_covariance"
              }

              try:
                  pars = camb.CAMBparams()

                  pars.set_cosmology(
                      H0=None,
                      ombh2=float(packet["omegabh2"]),
                      omch2=float(packet["omegach2"]),
                      cosmomc_theta=float(packet["cosmomc_theta_for_future_CAMB"]),
                      tau=float(packet["tau"]),
                      omk=0.0,
                      mnu=0.06,
                  )
                  record["set_cosmology_ok"] = True

                  try:
                      record["H0_recorded"] = float(pars.H0)
                  except Exception:
                      record["H0_recorded"] = ""

                  pars.InitPower.set_params(
                      As=float(packet["As_for_future_CAMB"]),
                      ns=float(packet["ns"]),
                  )
                  record["init_power_ok"] = True

                  try:
                      pars.NonLinear = camb.model.NonLinear_none
                  except Exception:
                      pass

                  pars.set_matter_power(
                      redshifts=[row["z"] for row in TARGET_REDSHIFTS],
                      kmax=2.0,
                      nonlinear=False,
                  )
                  record["set_matter_power_ok"] = True

                  results = camb.get_results(pars)
                  record["get_results_ok"] = True

                  sigma8_raw = [float(x) for x in np.atleast_1d(results.get_sigma8()).tolist()]
                  record["get_sigma8_ok"] = True
                  record["sigma8_len"] = len(sigma8_raw)

                  fsigma8_raw = [float(x) for x in np.atleast_1d(results.get_fsigma8()).tolist()]
                  record["get_fsigma8_ok"] = True
                  record["fsigma8_len"] = len(fsigma8_raw)

                  record["complete_arrays"] = (
                      finite_positive_list(sigma8_raw, len(TARGET_REDSHIFTS))
                      and finite_positive_list(fsigma8_raw, len(TARGET_REDSHIFTS))
                  )

                  sigma8_oriented = orient(sigma8_raw, "reversed_raw_order")
                  fsigma8_oriented = orient(fsigma8_raw, "reversed_raw_order")
                  target_vector = build_target_vector(sigma8_oriented, fsigma8_oriented)

                  output_row["sigma8_values_raw"] = sigma8_raw
                  output_row["fsigma8_values_raw"] = fsigma8_raw
                  output_row["sigma8_values_oriented"] = sigma8_oriented
                  output_row["fsigma8_values_oriented"] = fsigma8_oriented
                  output_row["target_vector_10"] = target_vector

                  record["target_vector_len"] = len(target_vector)
                  record["target_vector_finite"] = (
                      len(target_vector) == 10
                      and all(math.isfinite(float(x)) and float(x) > 0 for x in target_vector)
                  )

                  try:
                      record["Omega_m_recorded"] = float(results.get_Omega("matter", 0))
                  except Exception:
                      record["Omega_m_recorded"] = ""

              except Exception:
                  if not record["error_stage"]:
                      record["error_stage"] = "sample_solver_exception"
                  record["error_tail"] = traceback.format_exc()[-4000:]

              return record, output_row

          try:
              try:
                  user_site = site.getusersitepackages()
                  report["user_site"] = user_site
                  if user_site and user_site not in sys.path:
                      site.addsitedir(user_site)
              except Exception:
                  pass

              report["sys_path_head"] = sys.path[:12]

              import numpy as np
              report["numpy_imported"] = True
              report["numpy_version"] = getattr(np, "__version__", "")

              import camb
              report["camb_imported"] = True
              report["camb_version"] = getattr(camb, "__version__", "")

              for packet in SAMPLE_PACKETS:
                  solver_record, output_row = run_one_sample(camb, np, packet)
                  report["sample_solver_records"].append(solver_record)
                  report["sample_output_vectors"].append(output_row)

          except Exception:
              report["top_error"] = traceback.format_exc()[-4000:]

          OUT.write_text(json.dumps(report, indent=2, sort_keys=True), encoding="utf-8")
          print(json.dumps(report, indent=2, sort_keys=True))
          """

          runner_code = runner_code.replace("__SAMPLE_PACKETS_JSON__", repr(json.dumps(SAMPLE_PACKETS)))
          runner_code = runner_code.replace("__TARGET_REDSHIFTS_JSON__", repr(json.dumps(TARGET_REDSHIFTS)))
          runner_code = runner_code.replace("__OUTPUT_VECTOR_SCHEMA_JSON__", repr(json.dumps(OUTPUT_VECTOR_SCHEMA)))
          runner_code = runner_code.replace("__RUNNER_JSON_PATH__", repr(str(runner_json_path)))

          runner_path.write_text(textwrap.dedent(runner_code), encoding="utf-8")

          env = dict(os.environ)
          if user_site:
              env["PYTHONPATH"] = user_site + os.pathsep + env.get("PYTHONPATH", "")

          runner_record = run_command(
              [sys.executable, str(runner_path)],
              "fresh_python_camb_microbatch_runner",
              timeout_seconds=1800,
              env=env
          )

          runner_output = {
              "python_executable": "",
              "python_version": "",
              "user_site": user_site,
              "sys_path_head": [],
              "numpy_imported": False,
              "numpy_version": "",
              "camb_imported": False,
              "camb_version": "",
              "sample_solver_records": [],
              "sample_output_vectors": [],
              "top_error": ""
          }

          if runner_json_path.exists():
              try:
                  runner_output = json.loads(runner_json_path.read_text(encoding="utf-8"))
              except Exception as exc:
                  failed_gates.append("runner_json_read_failed")
                  runner_output["top_error"] = f"{type(exc).__name__}: {exc}"
          else:
              failed_gates.append("runner_json_missing")

          sample_solver_records = runner_output.get("sample_solver_records", [])
          sample_output_vectors = runner_output.get("sample_output_vectors", [])

          vector_component_records = []

          for row in sample_output_vectors:
              vector = row.get("target_vector_10", [])
              for schema in OUTPUT_VECTOR_SCHEMA:
                  position = int(schema["position"])
                  vector_component_records.append({
                      "sample_number": row.get("sample_number", ""),
                      "sample_weight": row.get("sample_weight", ""),
                      "position": position,
                      "quantity": schema["quantity"],
                      "z": schema["z"],
                      "target_name": schema["target_name"],
                      "value": vector[position] if len(vector) > position else "",
                      "component_scope": "microbatch_solver_output_component_not_covariance"
                  })

          sample_count = len(SAMPLE_PACKETS)
          solver_record_count = len(sample_solver_records)
          output_vector_count = len(sample_output_vectors)

          numpy_imported = runner_output.get("numpy_imported") is True
          camb_imported = runner_output.get("camb_imported") is True

          all_solver_records_complete = (
              solver_record_count == sample_count
              and all(row.get("complete_arrays") is True for row in sample_solver_records)
              and all(row.get("target_vector_len") == 10 for row in sample_solver_records)
              and all(row.get("target_vector_finite") is True for row in sample_solver_records)
          )

          all_output_vectors_complete = (
              output_vector_count == sample_count
              and all(len(row.get("target_vector_10", [])) == 10 for row in sample_output_vectors)
              and all(
                  all(math.isfinite(float(x)) and float(x) > 0 for x in row.get("target_vector_10", []))
                  for row in sample_output_vectors
              )
          )

          all_weights_preserved = (
              output_vector_count == sample_count
              and [float(row.get("sample_weight", -1)) for row in sample_output_vectors]
              == [float(row["sample_weight"]) for row in SAMPLE_PACKETS]
          )

          all_orientations_reversed = (
              output_vector_count == sample_count
              and all(row.get("locked_orientation") == "reversed_raw_order" for row in sample_output_vectors)
          )

          if not dependency_install["ok"]:
              failed_gates.append("dependency_install_failed")

          if not runner_json_path.exists():
              failed_gates.append("runner_output_missing")

          if not numpy_imported:
              failed_gates.append("numpy_not_imported_in_runner")

          if not camb_imported:
              failed_gates.append("CAMB_not_imported_in_runner")

          if runner_output.get("top_error"):
              failed_gates.append("runner_top_error_present")

          if solver_record_count != sample_count:
              failed_gates.append("solver_record_count_not_12")

          if output_vector_count != sample_count:
              failed_gates.append("output_vector_count_not_12")

          if not all_solver_records_complete:
              failed_gates.append("not_all_solver_records_complete")

          if not all_output_vectors_complete:
              failed_gates.append("not_all_output_vectors_complete")

          if not all_weights_preserved:
              failed_gates.append("sample_weights_not_preserved")

          if not all_orientations_reversed:
              failed_gates.append("locked_orientation_not_preserved")

          if len(vector_component_records) != sample_count * 10:
              failed_gates.append("vector_component_count_not_120")

          if UPSTREAM_LOCKS["v4_89_sample_packet_microbatch_solver_design"]["weighted_covariance_matrix_computed"] is not False:
              failed_gates.append("upstream_covariance_boundary_not_carried")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "weighted covariance matrix was computed",
              "weighted posterior mean vector was computed",
              "final rsd pressure score",
              "validates tairid cosmology",
              "12-sample microbatch is enough for final rsd pressure",
              "output vectors are already posterior covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "sample_packet_microbatch_solver_probe_passed_ready_for_weighted_covariance_formula_lock"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_microbatch_design_carried",
                  "pass": UPSTREAM_LOCKS["v4_89_sample_packet_microbatch_solver_design"]["sample_packet_count"] == 12,
                  "result": "12 sample packets carried from v4.89",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "dependencies_and_CAMB_imported",
                  "pass": dependency_install["ok"] and numpy_imported and camb_imported,
                  "result": f"dependency_install={dependency_install['ok']}; numpy_imported={numpy_imported}; CAMB_imported={camb_imported}",
                  "boundary": "Solver dependency only."
              },
              {
                  "rule_id": "fresh_runner_output_written",
                  "pass": runner_json_path.exists(),
                  "result": f"runner_json_exists={runner_json_path.exists()}",
                  "boundary": "Fresh subprocess output only."
              },
              {
                  "rule_id": "all_12_samples_solved",
                  "pass": all_solver_records_complete,
                  "result": f"solver_records={solver_record_count}; output_vectors={output_vector_count}",
                  "boundary": "Tiny 12-sample microbatch only."
              },
              {
                  "rule_id": "target_vectors_complete",
                  "pass": all_output_vectors_complete,
                  "result": f"{output_vector_count} output vectors, each dimension 10",
                  "boundary": "No mean/covariance computed."
              },
              {
                  "rule_id": "weights_preserved",
                  "pass": all_weights_preserved,
                  "result": "sample weights preserved beside output vectors",
                  "boundary": "Weights not yet used for covariance."
              },
              {
                  "rule_id": "orientation_lock_applied",
                  "pass": all_orientations_reversed,
                  "result": "all raw CAMB arrays reversed before target-vector construction",
                  "boundary": "Orientation application only."
              },
              {
                  "rule_id": "vector_components_written",
                  "pass": len(vector_component_records) == sample_count * 10,
                  "result": f"{len(vector_component_records)} vector component records written",
                  "boundary": "Output expansion only."
              },
              {
                  "rule_id": "weighted_mean_and_covariance_still_blocked",
                  "pass": True,
                  "result": "weighted mean and covariance not computed",
                  "boundary": "No reference uncertainty."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_90_rules_passed")

          if failed_gates:
              readiness_label = "sample_packet_microbatch_solver_probe_failed"
              next_allowed_step = "Repair the sample-packet CAMB microbatch before locking weighted covariance formulas."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.91 weighted covariance formula lock. "
                  "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "dependency_install_ok": dependency_install["ok"],
              "fresh_runner_returncode": runner_record["returncode"],
              "fresh_runner_ok": runner_record["ok"],
              "runner_json_exists": runner_json_path.exists(),
              "numpy_imported": numpy_imported,
              "numpy_version": runner_output.get("numpy_version", ""),
              "CAMB_imported": camb_imported,
              "CAMB_version": runner_output.get("camb_version", ""),
              "sample_packet_count": sample_count,
              "solver_record_count": solver_record_count,
              "sample_output_vector_count": output_vector_count,
              "all_solver_records_complete": all_solver_records_complete,
              "all_output_vectors_complete": all_output_vectors_complete,
              "all_weights_preserved": all_weights_preserved,
              "all_orientations_reversed": all_orientations_reversed,
              "vector_component_record_count": len(vector_component_records),
              "sample_output_vectors_computed": output_vector_count == sample_count,
              "weighted_mean_vector_computed": False,
              "weighted_covariance_matrix_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "target_redshifts": TARGET_REDSHIFTS,
              "output_vector_schema": OUTPUT_VECTOR_SCHEMA,
              "sample_packets": SAMPLE_PACKETS,
              "install_records": install_records,
              "external_runner_record": runner_record,
              "external_runner_output": runner_output,
              "sample_solver_records": sample_solver_records,
              "sample_output_vectors": sample_output_vectors,
              "vector_component_records": vector_component_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "sample_output_vectors_computed": output_vector_count == sample_count,
                  "sample_output_vector_count": output_vector_count,
                  "weighted_mean_vector_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_90_sample_packet_microbatch_solver_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          (OUTDIR / "camb_microbatch_runner_v4_90.py").write_text(
              runner_path.read_text(encoding="utf-8"),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "install_records_v4_90.csv",
              install_records,
              ["label", "command", "returncode", "ok", "stdout_tail", "stderr_tail", "error"]
          )

          write_csv(
              OUTDIR / "sample_solver_records_v4_90.csv",
              sample_solver_records,
              [
                  "sample_number",
                  "source_line_number",
                  "sample_weight",
                  "minus_loglike_or_proxy",
                  "set_cosmology_ok",
                  "init_power_ok",
                  "set_matter_power_ok",
                  "get_results_ok",
                  "get_sigma8_ok",
                  "get_fsigma8_ok",
                  "sigma8_len",
                  "fsigma8_len",
                  "complete_arrays",
                  "target_vector_len",
                  "target_vector_finite",
                  "H0_recorded",
                  "Omega_m_recorded",
                  "error_stage",
                  "error_tail"
              ]
          )

          write_csv(
              OUTDIR / "sample_output_vectors_v4_90.csv",
              sample_output_vectors,
              [
                  "sample_number",
                  "source_line_number",
                  "sample_weight",
                  "minus_loglike_or_proxy",
                  "locked_orientation",
                  "sigma8_values_raw",
                  "fsigma8_values_raw",
                  "sigma8_values_oriented",
                  "fsigma8_values_oriented",
                  "target_vector_10",
                  "output_scope"
              ]
          )

          write_csv(
              OUTDIR / "vector_component_records_v4_90.csv",
              vector_component_records,
              [
                  "sample_number",
                  "sample_weight",
                  "position",
                  "quantity",
                  "z",
                  "target_name",
                  "value",
                  "component_scope"
              ]
          )

          write_csv(
              OUTDIR / "output_vector_schema_v4_90.csv",
              OUTPUT_VECTOR_SCHEMA,
              ["position", "quantity", "z", "target_name"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_90.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_90.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_90.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.90 — Sample Packet Microbatch Solver Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This workflow runs CAMB on the 12 tiny Planck chain sample packets parsed in v4.88 and designed in v4.89.")
          md.append("")
          md.append("It applies the locked `reversed_raw_order` orientation and writes one 10-dimensional sigma8z/fsigma8 output vector per sample.")
          md.append("")
          md.append("It does not compute weighted mean, covariance, Planck reference uncertainty, final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Sample solver records")
          md.append("")
          md.append("| Sample | Weight | CAMB complete | Vector length | H0 recorded |")
          md.append("|---:|---:|---|---:|---:|")
          for row in sample_solver_records:
              md.append(
                  f"| `{row.get('sample_number', '')}` | `{row.get('sample_weight', '')}` | `{row.get('complete_arrays', '')}` | `{row.get('target_vector_len', '')}` | `{row.get('H0_recorded', '')}` |"
              )
          md.append("")
          md.append("## Output vector schema")
          md.append("")
          md.append("| Position | z | Quantity | Target |")
          md.append("|---:|---:|---|---|")
          for row in OUTPUT_VECTOR_SCHEMA:
              md.append(f"| `{row['position']}` | `{row['z']}` | `{row['quantity']}` | `{row['target_name']}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_90_sample_packet_microbatch_solver_probe.json",
              "tairid_v4_90_sample_packet_microbatch_solver_probe.md",
              "camb_microbatch_runner_v4_90.py",
              "camb_microbatch_runner_output_v4_90.json",
              "install_records_v4_90.csv",
              "sample_solver_records_v4_90.csv",
              "sample_output_vectors_v4_90.csv",
              "vector_component_records_v4_90.csv",
              "output_vector_schema_v4_90.csv",
              "blocked_claims_v4_90.csv",
              "next_route_options_v4_90.csv",
              "rule_results_v4_90.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_90_sample_packet_microbatch_solver_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.90 sample packet microbatch solver probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-90-sample-packet-microbatch-solver-probe
          path: artifacts/tairid_v4_90_sample_packet_microbatch_solver_probe/
