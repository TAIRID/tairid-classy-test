              "This does not compute weighted posterior mean.",
              "This does not compute weighted covariance.",
              "This does not compute Planck reference uncertainty.",
              "This does not run likelihood, BIC, posterior comparison, or model selection.",
              "A pass means the 12-sample CAMB microbatch produced complete finite output vectors ready for formula locking."
          ]

