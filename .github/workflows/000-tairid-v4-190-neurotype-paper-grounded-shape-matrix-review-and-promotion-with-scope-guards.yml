name: 000 TAIRID v4.190 - Neurotype Paper Grounded Shape Matrix Review And Promotion With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-190-neurotype-paper-grounded-shape-matrix-review-and-promotion-with-scope-guards.yml"
      - "data/cross_domain/**"
      - "data/neurotype/**"

permissions:
  contents: read

jobs:
  v4-190-neurotype-paper-grounded-review-promotion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.190 neurotype paper grounded review and promotion
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_190_outputs
          cat > tairid_v4_190_outputs/run_v4_190.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_190_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "neurotype_paper_grounded_shape_matrix_review_and_promotion_passed_core_holdout_inputs_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "paper-grounded rows are not external replication",
              "TAIRID not proved"
          ]

          LOCKED_SIGNATURES = {
              "++-": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low",
              "-+-": "LRGxELG_z0p845_like_reach_low_pacing_high_growth_low",
              "-++": "QSO_z1p48_like_reach_low_pacing_high_growth_high"
          }

          V4_189_STATUS = {
              "version": "v4.189",
              "rule_pass_count": 13,
              "rule_total_count": 13,
              "failed_gates": [],
              "paper_grounded_rows": 14,
              "paper_grounded_direct_locked_cosmology_signature_matches": 7,
              "do_not_force_flag_count": 3,
              "recommended_input_rows": 12,
              "selected_next_route": "neurotype_paper_grounded_shape_matrix_review_then_promote_recommended_input_with_scope_guards"
          }

          PAPER_GROUNDED_ROWS = [
              {
                  "case_id": "ADHD_ds003500_selective_attention_width_over_depth",
                  "paper_file": "TAIRID_ADHD_Width_over_Depth_Vulnerability_Paper_v0_1_Pass6A.docx",
                  "evidence_level": "direct_computed_behavioral_lane",
                  "boundary_or_group": "OpenNeuro ds003500 selective-attention / response-inhibition surface",
                  "propagation_direction": "+",
                  "pacing_direction": "+",
                  "consolidation_direction": "-",
                  "paper_grounded_fact": "ADHD showed higher signal-width pressure, lower task depth, lower selective-gate stability, higher width/gate instability, and lower task viability in ds003500.",
                  "corpus_boundary": "small sample; not diagnosis; reward/n-back lane still open",
                  "promotion_tier": "core_promote"
              },
              {
                  "case_id": "ADHD_EEG_arousal_constraint_lane",
                  "paper_file": "TAIRID_ADHD_Width_over_Depth_Vulnerability_Paper_v0_1_Pass6A.docx",
                  "evidence_level": "computed_constraint_lane",
                  "boundary_or_group": "Mendeley adult ADHD EEG proxy surface",
                  "propagation_direction": "-",
                  "pacing_direction": "-",
                  "consolidation_direction": "+",
                  "paper_grounded_fact": "The EEG lane did not show simple higher-width ADHD; it constrains overgeneralization.",
                  "corpus_boundary": "segment labels unresolved; not main behavioral support",
                  "promotion_tier": "constraint_promote"
              },
              {
                  "case_id": "Dyslexia_ETDD70_reading_flow_viability_window",
                  "paper_file": "TAIRID_ETDD70_Viability_Window_Paper_Draft_v0_1.docx",
                  "evidence_level": "direct_computed_eye_tracking_lane",
                  "boundary_or_group": "ETDD70 reading-flow surface",
                  "propagation_direction": "+",
                  "pacing_direction": "+",
                  "consolidation_direction": "-",
                  "paper_grounded_fact": "Repeated pattern: s_A up, lambda_R up, rho_R down, V_data down; four-axis model bAcc about 0.857 and AUC about 0.932.",
                  "corpus_boundary": "one dataset; operational axes; not diagnosis",
                  "promotion_tier": "core_promote"
              },
              {
                  "case_id": "Aphantasia_visual_reconstruction_response_gap",
                  "paper_file": "TAIRID_Aphantasia_Reconstruction_Response_Geometry_v0_6.pdf",
                  "evidence_level": "direct_computed_two_shape_lane",
                  "boundary_or_group": "visual imagery / memory reconstruction demand",
                  "propagation_direction": "-",
                  "pacing_direction": "+",
                  "consolidation_direction": "-",
                  "paper_grounded_fact": "Predicted and observed shape: rho_R lower, lambda_R higher, s_A mismatched or decoupled, V lower; drawing burden d about 1.013 and physiology burden d about 1.553.",
                  "corpus_boundary": "shape 1 lacks actual AMT scorer-output tables; not diagnostic",
                  "promotion_tier": "core_promote"
              },
              {
                  "case_id": "Aphantasia_preserved_input_effort_support_lane",
                  "paper_file": "TAIRID_Aphantasia_Reconstruction_Response_Geometry_v0_6.pdf",
                  "evidence_level": "support_lane_not_primary_signature",
                  "boundary_or_group": "perception/input and effort/load channels",
                  "propagation_direction": "0",
                  "pacing_direction": "+",
                  "consolidation_direction": "0",
                  "paper_grounded_fact": "Safe claim: internal visual simulation/reconstruction gap while perception/input and effort/load remain more intact.",
                  "corpus_boundary": "not used as a direct cosmology-signature match row",
                  "promotion_tier": "constraint_promote"
              },
              {
                  "case_id": "Autism_measured_dispersion_search_correction",
                  "paper_file": "TAIRID_Autism_Reference_Field_Organization_Paper_v0_1_Pass8U.docx",
                  "evidence_level": "direct_computed_model_correction_lane",
                  "boundary_or_group": "ASD-vs-TD eye-tracking / movie-viewing surface",
                  "propagation_direction": "+",
                  "pacing_direction": "+",
                  "consolidation_direction": "-",
                  "paper_grounded_fact": "The starting high-depth/high-boundary prediction failed; stronger current signal was lower boundary precision/friction and higher dispersion/search.",
                  "corpus_boundary": "surface-dependent; not autism equals dispersed search",
                  "promotion_tier": "core_promote"
              },
              {
                  "case_id": "Autism_compact_depth_future_mode_do_not_force",
                  "paper_file": "TAIRID_Autism_Reference_Field_Organization_Paper_v0_1_Pass8U.docx",
                  "evidence_level": "future_mode_candidate_not_current_primary_result",
                  "boundary_or_group": "stable, local-fit, rule-bound, sensory-detail, or special-interest-like task surfaces",
                  "propagation_direction": "-",
                  "pacing_direction": "+",
                  "consolidation_direction": "+",
                  "paper_grounded_fact": "Corrected model keeps compact-depth friction as one possible pathway but does not treat it as universal.",
                  "corpus_boundary": "must be tested on better surface; do not count as empirical match yet",
                  "promotion_tier": "holdout_do_not_force"
              },
              {
                  "case_id": "Bipolar_depressive_compressed_rhythm_basin",
                  "paper_file": "TAIRID_Bipolar_Phase_Cycling_Paper_Draft_Pass11.docx",
                  "evidence_level": "direct_computed_depression_side_lane",
                  "boundary_or_group": "Depresjon bipolar-II depressed subgroup vs controls",
                  "propagation_direction": "-",
                  "pacing_direction": "-",
                  "consolidation_direction": "+",
                  "paper_grounded_fact": "Depression-side result: reduced beta_swing, reduced s_A_swing, reduced V_swing, and positive boundary-compression score.",
                  "corpus_boundary": "depression-side dataset only; + means compressed/locked consolidation-heavy basin, not healthy consolidation",
                  "promotion_tier": "constraint_promote"
              },
              {
                  "case_id": "Bipolar_mania_hypomania_propagation_expansion",
                  "paper_file": "TAIRID_Bipolar_Phase_Cycling_Paper_Draft_Pass11.docx",
                  "evidence_level": "published_support_lane_raw_reanalysis_pending",
                  "boundary_or_group": "BipoSense/Zhang phase-support bridge",
                  "propagation_direction": "+",
                  "pacing_direction": "+",
                  "consolidation_direction": "-",
                  "paper_grounded_fact": "Mania/hypomania is modeled as propagation-heavy activity expansion with P_eff/beta rising and sleep/rest consolidation reduced or destabilized.",
                  "corpus_boundary": "published support; raw TAIRID reanalysis pending",
                  "promotion_tier": "provisional_promote"
              },
              {
                  "case_id": "Bipolar_euthymia_reference_rhythm",
                  "paper_file": "TAIRID_Bipolar_Phase_Cycling_Paper_Draft_Pass11.docx",
                  "evidence_level": "reference_state_lane",
                  "boundary_or_group": "subject-specific euthymic reference rhythm",
                  "propagation_direction": "0",
                  "pacing_direction": "0",
                  "consolidation_direction": "+",
                  "paper_grounded_fact": "Euthymia is the subject-specific rhythm surface against which depression, mania, and transition are measured.",
                  "corpus_boundary": "not a pathology row; reference surface",
                  "promotion_tier": "reference_promote"
              },
              {
                  "case_id": "Bipolar_mixed_transition_boundary_overlap",
                  "paper_file": "TAIRID_Bipolar_Phase_Cycling_Paper_Draft_Pass11.docx",
                  "evidence_level": "boundary_overlap_lane",
                  "boundary_or_group": "mixed or transition state",
                  "propagation_direction": "M",
                  "pacing_direction": "M",
                  "consolidation_direction": "M",
                  "paper_grounded_fact": "Mixed/transition states should not be forced into mania or depression; they may carry contradictory rhythm signatures.",
                  "corpus_boundary": "not classified into three-sign cosmology signature",
                  "promotion_tier": "holdout_do_not_force"
              },
              {
                  "case_id": "Schizotypy_positive_reference_field_overreach",
                  "paper_file": "TAIRID_Schizotypal_Reference_Field_Overreach_Paper_v0_3_Pass9S.docx",
                  "evidence_level": "computed_reach_plus_summary_anchor_lane",
                  "boundary_or_group": "positive/cognitive-perceptual schizotypy weak-anchor lane",
                  "propagation_direction": "+",
                  "pacing_direction": "+",
                  "consolidation_direction": "-",
                  "paper_grounded_fact": "Positive schizotypy fit weak/false-anchor acceptance most clearly; weakly related and unrelated lure acceptance mattered more than target recognition.",
                  "corpus_boundary": "not clinical schizophrenia; evidence lanes not same-sample",
                  "promotion_tier": "core_promote"
              },
              {
                  "case_id": "Schizotypy_disorganized_drift_lane",
                  "paper_file": "TAIRID_Schizotypal_Reference_Field_Overreach_Paper_v0_3_Pass9S.docx",
                  "evidence_level": "trait_lane_separation",
                  "boundary_or_group": "disorganized schizotypy intrusion / set-loss / drift lane",
                  "propagation_direction": "+",
                  "pacing_direction": "M",
                  "consolidation_direction": "-",
                  "paper_grounded_fact": "Disorganized traits fit intrusion, set-loss, drift, and return-chain instability rather than the same positive overreach lane.",
                  "corpus_boundary": "future same-sample task battery needed",
                  "promotion_tier": "holdout_do_not_force"
              },
              {
                  "case_id": "Schizotypy_negative_underreach_return_cost_lane",
                  "paper_file": "TAIRID_Schizotypal_Reference_Field_Overreach_Paper_v0_3_Pass9S.docx",
                  "evidence_level": "unfinished_lane",
                  "boundary_or_group": "negative schizotypy switching/maintenance/underreach",
                  "propagation_direction": "-",
                  "pacing_direction": "-",
                  "consolidation_direction": "-",
                  "paper_grounded_fact": "Negative traits should not be forced into overreach; the paper marks switching/maintenance, underreach, or return-cost as a major unfinished lane.",
                  "corpus_boundary": "unfinished lane; no match claim",
                  "promotion_tier": "holdout_do_not_force"
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def signature(row):
              return row["propagation_direction"] + row["pacing_direction"] + row["consolidation_direction"]

          def family(sig):
              if "M" in sig:
                  return "mixed_or_unclassified_boundary_shape"
              return LOCKED_SIGNATURES.get(sig, "non_cosmology_exact_variant")

          promoted = []
          holdout = []
          all_review = []
          for row in PAPER_GROUNDED_ROWS:
              sig = signature(row)
              fam = family(sig)
              direct = sig in LOCKED_SIGNATURES
              reviewed = dict(row)
              reviewed["shape_signature"] = sig
              reviewed["shape_family"] = fam
              reviewed["direct_locked_cosmology_signature_match"] = direct
              reviewed["safe_status"] = "promoted_to_core_input" if row["promotion_tier"] in ["core_promote", "constraint_promote", "provisional_promote", "reference_promote"] else "holdout_do_not_force"
              all_review.append(reviewed)
              if reviewed["safe_status"] == "promoted_to_core_input":
                  promoted.append(reviewed)
              else:
                  holdout.append(reviewed)

          promoted_input = []
          for row in promoted:
              promoted_input.append({
                  "domain": "neurotype_cognition",
                  "case_id": row["case_id"],
                  "boundary_or_group": row["boundary_or_group"],
                  "propagation_reach_value": "",
                  "pacing_access_value": "",
                  "consolidation_growth_value": "",
                  "reference_or_expected_propagation": "",
                  "reference_or_expected_pacing": "",
                  "reference_or_expected_consolidation": "",
                  "propagation_direction": row["propagation_direction"],
                  "pacing_direction": row["pacing_direction"],
                  "consolidation_direction": row["consolidation_direction"],
                  "notes": row["paper_grounded_fact"] + " Boundary: " + row["corpus_boundary"],
                  "source_or_dataset": row["paper_file"] + " | " + row["evidence_level"] + " | " + row["promotion_tier"]
              })

          tier_counts = {}
          family_counts = {}
          for row in all_review:
              tier_counts[row["promotion_tier"]] = tier_counts.get(row["promotion_tier"], 0) + 1
              family_counts[row["shape_family"]] = family_counts.get(row["shape_family"], 0) + 1

          evidence_summary = []
          for key, count in sorted(tier_counts.items()):
              evidence_summary.append({"promotion_tier": key, "count": count})
          family_summary = []
          for key, count in sorted(family_counts.items(), key=lambda kv: (-kv[1], kv[0])):
              family_summary.append({"shape_family": key, "count": count})

          correction_lock = [
              {"correction": "Autism measured lane overrides seed", "status": "locked", "meaning": "Do not treat autism as one compact-depth row; measured eye-tracking lane was dispersion/search."},
              {"correction": "Dyslexia pacing direction corrected", "status": "locked", "meaning": "Treat ETDD70 as expanded scale/load with lower viability, not simple low pacing."},
              {"correction": "Aphantasia primary lane corrected", "status": "locked", "meaning": "Visual reconstruction gap is lower reach plus lower viability under high mismatch/re-entry burden."},
              {"correction": "Bipolar split by phase", "status": "locked", "meaning": "Mania, depression, euthymia, and mixed/transition cannot be one row."},
              {"correction": "Schizotypy split by trait lane", "status": "locked", "meaning": "Positive overreach, disorganized drift, and negative underreach are separate lanes."}
          ]

          empirical_upgrade_manifest = [
              {
                  "lane": "ADHD",
                  "current_best_row": "ADHD_ds003500_selective_attention_width_over_depth",
                  "next_numeric_need": "extract actual width, depth, gate stability, viability columns from paper/output into numeric input",
                  "priority": "high"
              },
              {
                  "lane": "Dyslexia",
                  "current_best_row": "Dyslexia_ETDD70_reading_flow_viability_window",
                  "next_numeric_need": "extract s_A, lambda_R, rho_R, V_data summary values and model metrics",
                  "priority": "high"
              },
              {
                  "lane": "Aphantasia",
                  "current_best_row": "Aphantasia_visual_reconstruction_response_gap",
                  "next_numeric_need": "extract drawing burden, physiology burden, and V/R/lambda axes where available",
                  "priority": "high"
              },
              {
                  "lane": "Autism",
                  "current_best_row": "Autism_measured_dispersion_search_correction",
                  "next_numeric_need": "extract ASD-vs-TD dispersion/search and boundary-compaction summary measures",
                  "priority": "high"
              },
              {
                  "lane": "Bipolar",
                  "current_best_row": "Bipolar_depressive_compressed_rhythm_basin",
                  "next_numeric_need": "extract beta_swing, s_A_swing, V_swing, compression scores and separate phase rows",
                  "priority": "medium_high"
              },
              {
                  "lane": "Schizotypy",
                  "current_best_row": "Schizotypy_positive_reference_field_overreach",
                  "next_numeric_need": "extract target/lure/anchor integrity measures by positive, disorganized, and negative traits",
                  "priority": "medium_high"
              }
          ]

          review_fields = [
              "case_id", "paper_file", "evidence_level", "boundary_or_group",
              "propagation_direction", "pacing_direction", "consolidation_direction",
              "shape_signature", "shape_family", "direct_locked_cosmology_signature_match",
              "promotion_tier", "safe_status", "paper_grounded_fact", "corpus_boundary"
          ]

          write_csv(OUT / "v4_190_v4_189_status_review.csv", [V4_189_STATUS], list(V4_189_STATUS.keys()))
          (OUT / "v4_190_v4_189_status_review.json").write_text(json.dumps(V4_189_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_190_reviewed_paper_grounded_shape_matrix.csv", all_review, review_fields)
          write_csv(OUT / "v4_190_promoted_core_neurotype_shape_input.csv", promoted_input, [
              "domain", "case_id", "boundary_or_group", "propagation_reach_value", "pacing_access_value",
              "consolidation_growth_value", "reference_or_expected_propagation", "reference_or_expected_pacing",
              "reference_or_expected_consolidation", "propagation_direction", "pacing_direction",
              "consolidation_direction", "notes", "source_or_dataset"
          ])
          write_csv(OUT / "v4_190_holdout_do_not_force_neurotype_rows.csv", holdout, review_fields)
          write_csv(OUT / "v4_190_evidence_promotion_tier_counts.csv", evidence_summary, ["promotion_tier", "count"])
          write_csv(OUT / "v4_190_shape_family_counts_after_promotion.csv", family_summary, ["shape_family", "count"])
          write_csv(OUT / "v4_190_correction_lock_report.csv", correction_lock, ["correction", "status", "meaning"])
          write_csv(OUT / "v4_190_empirical_numeric_upgrade_manifest.csv", empirical_upgrade_manifest, ["lane", "current_best_row", "next_numeric_need", "priority"])

          next_route = "neurotype_numeric_empirical_extraction_from_uploaded_papers_with_scope_guards"

          route_decision = {
              "version": "v4.190",
              "result_label": RESULT_LABEL,
              "clean_result": "The v4.189 paper-grounded neurotype matrix was reviewed, promoted into a safe core input table, and split from holdout/do-not-force rows.",
              "v4_189_rows": V4_189_STATUS["paper_grounded_rows"],
              "promoted_core_rows": len(promoted_input),
              "holdout_do_not_force_rows": len(holdout),
              "direct_locked_signature_matches_in_promoted_rows": sum(1 for row in promoted if row["direct_locked_cosmology_signature_match"]),
              "selected_next_route": next_route,
              "truth_boundary": "paper-grounded promotion only; no cross-domain validation or numeric empirical extraction yet",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_190_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_190_scope_guards.json").write_text(json.dumps({
              "scope": "paper-grounded neurotype matrix review and promotion only",
              "promoted_rows_are_external_validation": False,
              "holdout_rows_excluded_from_core_match_count": True,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "neurotype_validation_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_190_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.190 - Neurotype Paper-Grounded Shape Matrix Review And Promotion",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "The v4.189 paper-grounded matrix was reviewed and split into promoted core input rows versus holdout/do-not-force rows.",
              "",
              "Promoted core rows: `" + str(len(promoted_input)) + "`",
              "Holdout/do-not-force rows: `" + str(len(holdout)) + "`",
              "Direct locked-signature matches inside promoted rows: `" + str(sum(1 for row in promoted if row["direct_locked_cosmology_signature_match"])) + "`",
              "",
              "## What changed",
              "",
              "- The compact-depth autism row is held out until a better surface tests it.",
              "- Mixed bipolar transition is held out because it is not a three-sign row.",
              "- Disorganized and negative schizotypy are not forced into the positive overreach lane.",
              "- The promoted table is now ready to become a numeric empirical extraction target.",
              "",
              "## Selected next route",
              "",
              "`" + next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_190_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_190_v4_189_status_review.csv",
              "v4_190_v4_189_status_review.json",
              "v4_190_reviewed_paper_grounded_shape_matrix.csv",
              "v4_190_promoted_core_neurotype_shape_input.csv",
              "v4_190_holdout_do_not_force_neurotype_rows.csv",
              "v4_190_evidence_promotion_tier_counts.csv",
              "v4_190_shape_family_counts_after_promotion.csv",
              "v4_190_correction_lock_report.csv",
              "v4_190_empirical_numeric_upgrade_manifest.csv",
              "v4_190_route_decision.json",
              "v4_190_scope_guards.json",
              "v4_190_blocked_claims.json",
              "v4_190_summary.md"
          ]

          rules = {
              "version_is_v4_190": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_189_status_reviewed": V4_189_STATUS["rule_pass_count"] == 13,
              "promoted_core_rows_present": len(promoted_input) == 10,
              "holdout_rows_present": len(holdout) == 4,
              "correction_locks_present": len(correction_lock) == 5,
              "numeric_upgrade_manifest_present": len(empirical_upgrade_manifest) == 6,
              "no_cross_domain_validation_claim": True,
              "no_unit_equivalence_claim": True,
              "next_route_selected": bool(next_route)
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.190",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "promoted_core_rows": len(promoted_input),
              "holdout_do_not_force_rows": len(holdout),
              "direct_locked_signature_matches_in_promoted_rows": sum(1 for row in promoted if row["direct_locked_cosmology_signature_match"]),
              "package_status": "core_and_holdout_neurotype_shape_inputs_written_no_validation",
              "selected_next_route": next_route,
              "claim_boundary": "paper_grounded_promotion_only_no_validation"
          }
          (OUT / "v4_190_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.190 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_190_outputs/run_v4_190.py

      - name: Upload v4.190 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-190-neurotype-paper-grounded-shape-matrix-review-and-promotion-output
          path: tairid_v4_190_outputs/
