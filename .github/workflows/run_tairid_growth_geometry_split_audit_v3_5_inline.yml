name: Run TAIRID Growth Geometry Split Audit v3.5 Inline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-growth-geometry-split-audit-v3-5-inline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib

      - name: Create and run TAIRID v3.5 inline script
        run: |
          cat > run_tairid_growth_geometry_split_audit_v3_5_inline.py <<'PY'
          #!/usr/bin/env python3
          """
          TAIRID Growth-vs-Geometry Split Audit v3.5 Inline

          Why this test exists:
          v3.3.3 rejected the frozen low-z gate as a supernova distance correction.
          v3.4 rejected the same frozen gate as a BAO/CMB ruler correction.

          Therefore, v3.5 stops trying to use that frozen gate as a direct cosmology
          correction term and pivots to a different TAIRID-compatible question:

              Do geometry-pressure surfaces and growth/consolidation-pressure surfaces
              separate in a way that is worth testing?

          In TAIRID terms:
              - geometry / distance / ruler surfaces are propagation-accessibility surfaces;
              - S8 / weak-lensing / clustering surfaces are consolidation-growth surfaces;
              - a split between them may be a better target than forcing one gate onto all surfaces.

          This test DOES:
              - preserve the v3.3.3 and v3.4 boundary decisions,
              - declare H0 as a geometry-pressure seam,
              - declare Planck-vs-weak-lensing S8 as a growth-pressure seam,
              - calculate pairwise tension scores,
              - check whether the directions of pressure are structurally split,
              - decide whether growth-vs-geometry deserves a real-data follow-up.

          This test DOES NOT:
              - validate TAIRID,
              - prove H0 correction,
              - prove new physics,
              - disprove standard cosmology,
              - fit a new cosmology,
              - use the frozen gate as a correction term,
              - claim weak-lensing surveys prove TAIRID.

          Truth boundary:
          v3.5 is a split-audit only. It asks whether the next lane is justified.
          """

          import csv
          import json
          import math
          import traceback
          from datetime import datetime, timezone
          from pathlib import Path

          import matplotlib.pyplot as plt
          import numpy as np

          OUTDIR = Path("tairid_growth_geometry_split_audit_v3_5_inline_outputs")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          CLAIMS = {
              "test_name": "TAIRID Growth-vs-Geometry Split Audit v3.5 Inline",
              "primary_question": "Do geometry-pressure and growth-pressure surfaces separate enough to justify a growth-vs-geometry TAIRID test lane?",
              "truth_boundary": "Split-audit only; no validation, no H0 correction, no new physics.",
          }

          PRIOR_LOCKS = {
              "v3_3_3": {
                  "result": "frozen_gate_not_supported_as_sn_distance_pressure_term",
                  "meaning": "Do not use frozen low-z gate as an SN distance correction.",
              },
              "v3_4": {
                  "result": "frozen_gate_rejected_as_bao_cmb_ruler_term",
                  "meaning": "Do not use frozen low-z gate as a BAO/CMB ruler correction.",
              },
              "locked_method_boundary": "Frozen gate may remain a diagnostic/local pressure object only unless a later derivation redefines it.",
          }

          GEOMETRY_ANCHORS = [
              {
                  "surface": "H0_EARLY_CMB_INFERRED",
                  "family": "geometry",
                  "value": 67.36,
                  "sigma": 0.54,
                  "units": "km/s/Mpc",
                  "role": "early geometry anchor",
                  "source_note": "Planck-like early-universe inferred H0 anchor used as declared pressure reference.",
              },
              {
                  "surface": "H0_LOCAL_DISTANCE_LADDER",
                  "family": "geometry",
                  "value": 73.04,
                  "sigma": 1.04,
                  "units": "km/s/Mpc",
                  "role": "late/local geometry anchor",
                  "source_note": "SH0ES-like local distance-ladder H0 anchor used as declared pressure reference.",
              },
          ]

          GROWTH_ANCHORS = [
              {
                  "surface": "PLANCK_2018_S8",
                  "family": "growth",
                  "value": 0.832,
                  "sigma": 0.013,
                  "role": "CMB-inferred growth anchor",
                  "source_note": "Planck 2018 CMB-inferred S8-style clustering anchor.",
              },
              {
                  "surface": "DES_Y3_OPTIMIZED_S8",
                  "family": "growth",
                  "value": 0.772,
                  "sigma": 0.017,
                  "role": "late weak-lensing / 3x2pt growth anchor",
                  "source_note": "DES Y3 optimized-scale S8 anchor.",
              },
              {
                  "surface": "KIDS_1000_FIDUCIAL_S8",
                  "family": "growth",
                  "value": 0.759,
                  "sigma": 0.0225,
                  "role": "late cosmic-shear growth anchor",
                  "source_note": "KiDS-1000 fiducial S8 anchor with asymmetric uncertainty averaged for audit.",
              },
              {
                  "surface": "KIDS_1000_UPDATED_S8",
                  "family": "growth",
                  "value": 0.776,
                  "sigma": 0.028,
                  "role": "late updated cosmic-shear growth anchor",
                  "source_note": "KiDS-1000 improved-shear S8 anchor, included as a lower-weight freshness check.",
              },
          ]

          def json_default(obj):
              if isinstance(obj, (np.integer,)):
                  return int(obj)
              if isinstance(obj, (np.floating,)):
                  return float(obj)
              if isinstance(obj, np.ndarray):
                  return obj.tolist()
              return str(obj)

          def write_json(path, obj):
              path.write_text(json.dumps(obj, indent=2, default=json_default), encoding="utf-8")

          def write_csv(path, rows):
              if not rows:
                  path.write_text("", encoding="utf-8")
                  return
              fields = []
              seen = set()
              for row in rows:
                  for key in row:
                      if key not in seen:
                          fields.append(key)
                          seen.add(key)
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields, extrasaction="ignore")
                  writer.writeheader()
                  writer.writerows(rows)

          def sigma_tension(a_value, a_sigma, b_value, b_sigma):
              denom = math.sqrt(float(a_sigma) ** 2 + float(b_sigma) ** 2)
              if denom <= 0:
                  return None
              return abs(float(a_value) - float(b_value)) / denom

          def signed_difference(a_value, b_value):
              return float(a_value) - float(b_value)

          def build_geometry_pressure():
              early = GEOMETRY_ANCHORS[0]
              local = GEOMETRY_ANCHORS[1]
              delta = signed_difference(local["value"], early["value"])
              tension = sigma_tension(local["value"], local["sigma"], early["value"], early["sigma"])
              return {
                  "pressure_id": "GEOMETRY_H0_EARLY_LATE_SPLIT",
                  "surface_family": "geometry",
                  "early_anchor": early["surface"],
                  "late_anchor": local["surface"],
                  "early_value": early["value"],
                  "late_value": local["value"],
                  "delta_late_minus_early": delta,
                  "sigma_tension": tension,
                  "direction": "late_local_higher_than_early" if delta > 0 else "late_local_not_higher",
                  "pressure_class": "high" if tension is not None and tension >= 4.0 else "moderate_or_low",
                  "truth_boundary": "Declared geometry pressure seam only; not solved here.",
              }

          def build_growth_pressure():
              planck = GROWTH_ANCHORS[0]
              rows = []
              for anchor in GROWTH_ANCHORS[1:]:
                  delta = signed_difference(anchor["value"], planck["value"])
                  tension = sigma_tension(anchor["value"], anchor["sigma"], planck["value"], planck["sigma"])
                  rows.append(
                      {
                          "pressure_id": f"{anchor['surface']}_VS_PLANCK",
                          "surface_family": "growth",
                          "early_anchor": planck["surface"],
                          "late_anchor": anchor["surface"],
                          "early_value": planck["value"],
                          "late_value": anchor["value"],
                          "delta_late_minus_early": delta,
                          "sigma_tension": tension,
                          "direction": "late_growth_lower_than_early" if delta < 0 else "late_growth_not_lower",
                          "pressure_class": "high" if tension is not None and tension >= 3.0 else "moderate_or_low",
                          "source_note": anchor["source_note"],
                          "truth_boundary": "Declared growth pressure seam only; not solved here.",
                      }
                  )
              return rows

          def split_audit(geometry_pressure, growth_pressures):
              growth_lower_count = sum(1 for r in growth_pressures if r["direction"] == "late_growth_lower_than_early")
              growth_tension_count = sum(1 for r in growth_pressures if r["sigma_tension"] is not None and r["sigma_tension"] >= 1.8)
              geometry_high = geometry_pressure["sigma_tension"] is not None and geometry_pressure["sigma_tension"] >= 4.0
              geometry_direction_ok = geometry_pressure["direction"] == "late_local_higher_than_early"

              split_pattern_detected = (
                  geometry_high
                  and geometry_direction_ok
                  and growth_lower_count >= 2
                  and growth_tension_count >= 2
              )

              return {
                  "audit_id": "GROWTH_GEOMETRY_SPLIT_AUDIT",
                  "geometry_pressure_high": geometry_high,
                  "geometry_direction": geometry_pressure["direction"],
                  "growth_late_lower_count": growth_lower_count,
                  "growth_tension_count_ge_1p8sigma": growth_tension_count,
                  "split_pattern_detected": split_pattern_detected,
                  "structural_interpretation": (
                      "Geometry pressure points toward late/local expansion higher than early inference, while growth pressure points toward late structure amplitude lower than Planck-like inference."
                      if split_pattern_detected
                      else "The declared anchors do not yet show a strong enough split pattern for escalation."
                  ),
                  "tairid_translation": (
                      "This supports testing a propagation/accessibility surface separately from a consolidation/growth surface."
                      if split_pattern_detected
                      else "Do not escalate to a TAIRID growth-geometry model yet."
                  ),
                  "truth_boundary": "Pattern detection only. No theory validation.",
              }

          def decide(geometry_pressure, growth_pressures, split):
              prior_locks_preserved = (
                  PRIOR_LOCKS["v3_3_3"]["result"] == "frozen_gate_not_supported_as_sn_distance_pressure_term"
                  and PRIOR_LOCKS["v3_4"]["result"] == "frozen_gate_rejected_as_bao_cmb_ruler_term"
              )

              gates = [
                  {
                      "gate": "G1_prior_gate_rejections_preserved",
                      "passed": prior_locks_preserved,
                      "evidence": PRIOR_LOCKS,
                  },
                  {
                      "gate": "G2_geometry_pressure_declared",
                      "passed": geometry_pressure["sigma_tension"] is not None and geometry_pressure["sigma_tension"] >= 3.0,
                      "evidence": geometry_pressure,
                  },
                  {
                      "gate": "G3_growth_pressure_declared",
                      "passed": split["growth_tension_count_ge_1p8sigma"] >= 2,
                      "evidence": {"growth_pressures": growth_pressures},
                  },
                  {
                      "gate": "G4_growth_geometry_split_pattern_detected",
                      "passed": split["split_pattern_detected"],
                      "evidence": split,
                  },
                  {
                      "gate": "G5_no_frozen_gate_correction_reintroduced",
                      "passed": True,
                      "evidence": {
                          "sn_distance_gate_correction": False,
                          "bao_cmb_ruler_gate_correction": False,
                          "gate_status": "diagnostic_only",
                      },
                  },
                  {
                      "gate": "G6_no_validation_claim_allowed",
                      "passed": True,
                      "evidence": {
                          "validation_claim": False,
                          "h0_correction_claim": False,
                          "new_physics_claim": False,
                          "standard_cosmology_disproof_claim": False,
                      },
                  },
              ]

              failed = [g["gate"] for g in gates if not g["passed"]]

              if not failed:
                  status = "growth_geometry_split_confirmed_as_next_test_lane_not_validation"
                  readiness = 9
                  next_wall = (
                      "Build v3.6 as a real-data growth-vs-geometry follow-up. Do not use the frozen gate as a correction. "
                      "Model propagation/accessibility and consolidation/growth as separate surfaces."
                  )
              elif "G4_growth_geometry_split_pattern_detected" in failed:
                  status = "growth_geometry_split_not_strong_enough_to_escalate"
                  readiness = 6
                  next_wall = "Do not escalate until more growth anchors or actual covariance-level data are added."
              else:
                  status = "growth_geometry_split_audit_partial_with_cautions"
                  readiness = 7
                  next_wall = "Repair failed gates before the next test."

              return {
                  "final_status": status,
                  "readiness_score_0_to_10": readiness,
                  "next_wall": next_wall,
                  "failed_gates": failed,
                  "gates": gates,
                  "truth_boundary": CLAIMS["truth_boundary"],
              }

          def make_plots(geometry_pressure, growth_pressures):
              try:
                  labels = ["H0 local - early"] + [r["pressure_id"].replace("_VS_PLANCK", "") for r in growth_pressures]
                  sigmas = [geometry_pressure["sigma_tension"]] + [r["sigma_tension"] for r in growth_pressures]
                  signed = [geometry_pressure["delta_late_minus_early"]] + [r["delta_late_minus_early"] for r in growth_pressures]

                  x = np.arange(len(labels))
                  plt.figure(figsize=(11, 5))
                  plt.bar(x, sigmas)
                  plt.xticks(x, labels, rotation=35, ha="right")
                  plt.ylabel("sigma tension")
                  plt.title("v3.5 geometry and growth pressure strengths")
                  plt.tight_layout()
                  plt.savefig(OUTDIR / "growth_geometry_sigma_tensions_v3_5_inline.png", dpi=160)
                  plt.close()

                  plt.figure(figsize=(11, 5))
                  plt.bar(x, signed)
                  plt.axhline(0.0, linewidth=1)
                  plt.xticks(x, labels, rotation=35, ha="right")
                  plt.ylabel("late minus early")
                  plt.title("v3.5 pressure direction: geometry vs growth")
                  plt.tight_layout()
                  plt.savefig(OUTDIR / "growth_geometry_pressure_direction_v3_5_inline.png", dpi=160)
                  plt.close()

              except Exception as exc:
                  write_json(
                      OUTDIR / "plot_error_v3_5_inline.json",
                      {"error": repr(exc), "traceback": traceback.format_exc()},
                  )

          def write_handoff(decision, split):
              lines = [
                  "# TAIRID v3.5 Inline Handoff",
                  "",
                  "## Current status",
                  "",
                  f"- Final status: `{decision['final_status']}`",
                  f"- Readiness score: `{decision['readiness_score_0_to_10']}/10`",
                  f"- Next wall: {decision['next_wall']}",
                  "",
                  "## What changed",
                  "",
                  "- The frozen low-z gate remains rejected as a direct SN distance correction.",
                  "- The frozen low-z gate remains rejected as a direct BAO/CMB ruler correction.",
                  "- v3.5 pivots to growth-vs-geometry instead of forcing one gate onto all cosmology surfaces.",
                  "",
                  "## Split interpretation",
                  "",
                  f"- Split pattern detected: `{split['split_pattern_detected']}`",
                  f"- Geometry direction: `{split['geometry_direction']}`",
                  f"- Late growth lower count: `{split['growth_late_lower_count']}`",
                  f"- Growth tension count ≥ 1.8σ: `{split['growth_tension_count_ge_1p8sigma']}`",
                  "",
                  "## Truth boundary",
                  "",
                  "- v3.5 is a split-audit only.",
                  "- It does not validate TAIRID.",
                  "- It does not prove H0 correction.",
                  "- It does not prove new physics.",
                  "- It does not disprove standard cosmology.",
                  "",
                  "## Next test",
                  "",
              ]

              if decision["final_status"] == "growth_geometry_split_confirmed_as_next_test_lane_not_validation":
                  lines.append("Build v3.6 — real-data growth-vs-geometry follow-up using the split surface, not the frozen gate.")
              else:
                  lines.append("Add more growth anchors or covariance-level data before escalation.")

              lines.append("")
              return "\n".join(lines)

          def main():
              print("TAIRID Growth-vs-Geometry Split Audit v3.5 Inline starting.")
              print("Boundary: split-audit only; no validation, no H0 claim, no new physics claim.")

              write_json(OUTDIR / "claims_v3_5_inline.json", CLAIMS)
              write_json(OUTDIR / "prior_locks_v3_5_inline.json", PRIOR_LOCKS)

              anchor_rows = []
              for row in GEOMETRY_ANCHORS + GROWTH_ANCHORS:
                  anchor_rows.append(dict(row))
              write_csv(OUTDIR / "declared_anchor_values_v3_5_inline.csv", anchor_rows)

              geometry_pressure = build_geometry_pressure()
              growth_pressures = build_growth_pressure()
              split = split_audit(geometry_pressure, growth_pressures)
              decision = decide(geometry_pressure, growth_pressures, split)

              write_json(OUTDIR / "geometry_pressure_v3_5_inline.json", geometry_pressure)
              write_csv(OUTDIR / "growth_pressure_rows_v3_5_inline.csv", growth_pressures)
              write_json(OUTDIR / "growth_geometry_split_audit_v3_5_inline.json", split)
              write_json(OUTDIR / "decision_v3_5_inline.json", decision)

              make_plots(geometry_pressure, growth_pressures)

              handoff = write_handoff(decision, split)
              (OUTDIR / "next_thread_handoff_after_v3_5_inline.md").write_text(handoff, encoding="utf-8")
              (OUTDIR / "next_thread_handoff_after_v3_5_inline.txt").write_text(handoff, encoding="utf-8")

              summary = {
                  "test_name": CLAIMS["test_name"],
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "boundary": CLAIMS["truth_boundary"],
                  "prior_locks": PRIOR_LOCKS,
                  "geometry_pressure": geometry_pressure,
                  "growth_pressures": growth_pressures,
                  "split_audit": split,
                  "decision": decision,
                  "interpretation": {
                      "what_success_means": "The next lane should compare geometry and growth surfaces separately.",
                      "what_success_does_not_mean": "This does not validate TAIRID or solve the tensions.",
                      "truth_boundary": CLAIMS["truth_boundary"],
                  },
              }

              write_json(OUTDIR / "growth_geometry_split_audit_v3_5_inline_summary.json", summary)

              with open(OUTDIR / "growth_geometry_split_audit_v3_5_inline_summary.txt", "w", encoding="utf-8") as f:
                  f.write("TAIRID Growth-vs-Geometry Split Audit v3.5 Inline\n\n")
                  f.write("Boundary: split-audit only. No validation. No H0 claim. No new physics claim.\n\n")
                  f.write(f"Final status: {decision['final_status']}\n")
                  f.write(f"Readiness score: {decision['readiness_score_0_to_10']}/10\n")
                  f.write(f"Next wall: {decision['next_wall']}\n\n")
                  f.write("Geometry pressure:\n")
                  f.write(json.dumps(geometry_pressure, indent=2, default=json_default) + "\n\n")
                  f.write("Growth pressures:\n")
                  f.write(json.dumps(growth_pressures, indent=2, default=json_default) + "\n\n")
                  f.write("Split audit:\n")
                  f.write(json.dumps(split, indent=2, default=json_default) + "\n\n")
                  f.write("Failed gates:\n")
                  f.write(json.dumps(decision["failed_gates"], indent=2, default=json_default) + "\n\n")
                  f.write("Truth boundary:\n")
                  f.write("- This does not prove TAIRID.\n")
                  f.write("- This does not prove H0 correction.\n")
                  f.write("- This does not prove new physics.\n")
                  f.write("- This does not disprove standard cosmology.\n")
                  f.write("- This only audits whether growth-vs-geometry split is the right next lane.\n")

              print("TAIRID Growth-vs-Geometry Split Audit v3.5 Inline complete.")
              print(f"Final status: {decision['final_status']}")
              print(f"Readiness score: {decision['readiness_score_0_to_10']}/10")

          if __name__ == "__main__":
              try:
                  main()
              except Exception as exc:
                  OUTDIR.mkdir(parents=True, exist_ok=True)
                  summary = {
                      "test_name": CLAIMS["test_name"],
                      "created_utc": datetime.now(timezone.utc).isoformat(),
                      "final_status": "growth_geometry_split_audit_v3_5_inline_runtime_failed",
                      "error": repr(exc),
                      "traceback": traceback.format_exc(),
                      "truth_boundary": CLAIMS["truth_boundary"],
                  }
                  write_json(OUTDIR / "growth_geometry_split_audit_v3_5_inline_summary.json", summary)
                  print(summary["traceback"])
                  raise
          PY

          python run_tairid_growth_geometry_split_audit_v3_5_inline.py

      - name: Upload inline outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-growth-geometry-split-audit-v3-5-inline-output
          path: |
            tairid_growth_geometry_split_audit_v3_5_inline_outputs/**
