name: 000 TAIRID v4.219 - Cosmology Residual Direction vs Covariance Mode Split With Scope Guards

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-v4-219-cosmology-residual-covariance-scope-guards:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.219 one-file scope guard audit
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import zipfile

          VERSION = "v4.219"
          ROUTE = "cosmology_residual_direction_vs_covariance_mode_split_with_scope_guards"
          SELECTED_NEXT_ROUTE = "source_specific_lrg_elg_qso_residual_tables_with_full_covariance_ingestion_attempt"
          EXPECTED_RESULT = "cosmology_residual_direction_vs_covariance_mode_split_passed_scope_guard_audit_written_no_validation"

          OUT = Path("tairid_v4_219_cosmology_residual_covariance_scope_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-219-cosmology-residual-covariance-scope-guard-output.zip"

          residual_signature_rows = [
              {
                  "surface_id": "cosmo_preview_lrgxelg_z0_70",
                  "tracer_scope": "LRGxELG",
                  "redshift": "0.70",
                  "prior_signature": "++-",
                  "reach_propagation": "+",
                  "pacing_access_pressure": "+",
                  "consolidation_growth": "-",
                  "clean_read": "reach and pacing pressure rise while consolidation/growth falls",
                  "allowed_use": "residual direction preview only",
                  "blocked_use": "not proof, not validation, not shared cause",
              },
              {
                  "surface_id": "cosmo_preview_lrgxelg_z0_845",
                  "tracer_scope": "LRGxELG",
                  "redshift": "0.845",
                  "prior_signature": "-+-",
                  "reach_propagation": "-",
                  "pacing_access_pressure": "+",
                  "consolidation_growth": "-",
                  "clean_read": "reach falls, pacing pressure rises, consolidation/growth falls",
                  "allowed_use": "test-priority surface only",
                  "blocked_use": "do not read proximity to G1 aphantasia as shared cause",
              },
              {
                  "surface_id": "cosmo_preview_qso_z1_48",
                  "tracer_scope": "QSO",
                  "redshift": "1.48",
                  "prior_signature": "-++",
                  "reach_propagation": "-",
                  "pacing_access_pressure": "+",
                  "consolidation_growth": "+",
                  "clean_read": "reach falls while pacing pressure and consolidation/growth rise",
                  "allowed_use": "QSO-specific open surface",
                  "blocked_use": "do not combine with LRG/ELG until QSO covariance/source guards pass",
              },
          ]

          covariance_mode_scope_rows = [
              {
                  "layer_id": "cov_layer_001",
                  "layer_name": "residual_direction",
                  "allowed_use": "sign-level directional preview inside each source surface",
                  "blocked_use": "cannot be treated as covariance strength or likelihood evidence",
                  "next_requirement": "keep residual direction table separate from covariance tables",
              },
              {
                  "layer_id": "cov_layer_002",
                  "layer_name": "diagonal_uncertainty",
                  "allowed_use": "rough screening when full covariance is unavailable",
                  "blocked_use": "cannot support final shape-persistence claims",
                  "next_requirement": "mark diagonal-only reads as provisional",
              },
              {
                  "layer_id": "cov_layer_003",
                  "layer_name": "full_covariance",
                  "allowed_use": "real covariance-mode interpretation after source provenance is clear",
                  "blocked_use": "cannot blend LRG/ELG/QSO without explicit combination permission",
                  "next_requirement": "ingest or locate full covariance before eigenmode interpretation",
              },
              {
                  "layer_id": "cov_layer_004",
                  "layer_name": "cross_tracer_offdiagonal",
                  "allowed_use": "coupling audit between source surfaces",
                  "blocked_use": "cannot count coupled terms as independent evidence",
                  "next_requirement": "separate tracer role, redshift overlap, survey window, and systematics",
              },
              {
                  "layer_id": "cov_layer_005",
                  "layer_name": "derived_quantity_dependency",
                  "allowed_use": "dependency warning layer",
                  "blocked_use": "cannot count derived quantities as independent axes",
                  "next_requirement": "flag f_sigma8, BAO distances, H*r_d, AP-style quantities, and tracer selection",
              },
          ]

          dependency_flag_rows = [
              {
                  "quantity": "f_sigma8",
                  "dependency_type": "growth_amplitude_derived_quantity",
                  "guard_action": "treat as derived; do not count as independent raw tracer axis",
              },
              {
                  "quantity": "D_M_over_r_d",
                  "dependency_type": "bao_distance_scaled_by_sound_horizon",
                  "guard_action": "keep distance-ruler dependency separate from residual direction",
              },
              {
                  "quantity": "D_H_over_r_d",
                  "dependency_type": "bao_radial_distance_scaled_by_sound_horizon",
                  "guard_action": "flag ruler dependence before combined covariance reads",
              },
              {
                  "quantity": "D_V_over_r_d",
                  "dependency_type": "isotropic_bao_distance_compression",
                  "guard_action": "do not mix with anisotropic quantities as if independent",
              },
              {
                  "quantity": "H_times_r_d",
                  "dependency_type": "hubble_ruler_product",
                  "guard_action": "mark ruler-linked before interpreting residual direction",
              },
              {
                  "quantity": "F_AP_or_AP_parameter",
                  "dependency_type": "alcock_paczynski_geometry_compression",
                  "guard_action": "keep AP-style shape information in the dependency ledger",
              },
              {
                  "quantity": "tracer_selection_function",
                  "dependency_type": "source_population_dependency",
                  "guard_action": "separate LRG, ELG, and QSO source surfaces before comparison",
              },
              {
                  "quantity": "survey_window_and_redshift_overlap",
                  "dependency_type": "observational_window_dependency",
                  "guard_action": "audit window coupling before calling a shape persistent",
              },
          ]

          shape_persistence_audit_rows = [
              {
                  "surface_id": "cosmo_preview_lrgxelg_z0_70",
                  "prior_signature": "++-",
                  "post_guard_status": "survives_as_residual_direction_only",
                  "next_requirement": "split LRG and ELG source surfaces and rerun with covariance permissions",
              },
              {
                  "surface_id": "cosmo_preview_lrgxelg_z0_845",
                  "prior_signature": "-+-",
                  "post_guard_status": "survives_as_test_priority_not_shared_cause",
                  "next_requirement": "test whether -+- persists after LRG/ELG separation and full covariance handling",
              },
              {
                  "surface_id": "cosmo_preview_qso_z1_48",
                  "prior_signature": "-++",
                  "post_guard_status": "open_requires_qso_specific_covariance_handling",
                  "next_requirement": "do QSO-specific residual and covariance audit before comparing to LRG/ELG",
              },
              {
                  "surface_id": "combined_lrg_elg_qso_matrix",
                  "prior_signature": "mixed",
                  "post_guard_status": "blocked_until_source_surface_and_covariance_layers_are_separated",
                  "next_requirement": "do not interpret combined LRG/ELG/QSO matrix until guards are explicit",
              },
          ]

          prioritized_next_tests = [
              {
                  "priority": "1",
                  "test_id": "lrg_residual_direction_table",
                  "purpose": "make LRG residual direction readable without ELG/QSO blending",
              },
              {
                  "priority": "2",
                  "test_id": "elg_residual_direction_table",
                  "purpose": "make ELG residual direction readable without LRG/QSO blending",
              },
              {
                  "priority": "3",
                  "test_id": "qso_specific_residual_covariance_guard",
                  "purpose": "hold QSO on its own high-redshift source surface",
              },
              {
                  "priority": "4",
                  "test_id": "full_covariance_ingestion_attempt",
                  "purpose": "attempt full covariance handling before any combined eigenmode read",
              },
          ]

          scope_guard_rules = [
              {
                  "rule_id": "scope_guard_001",
                  "rule": "separate LRG / ELG / QSO source surfaces before interpreting mixed matrices",
              },
              {
                  "rule_id": "scope_guard_002",
                  "rule": "separate residual direction from covariance modes",
              },
              {
                  "rule_id": "scope_guard_003",
                  "rule": "flag derived or dependent quantities before counting axes",
              },
              {
                  "rule_id": "scope_guard_004",
                  "rule": "treat same-shape matches as test priority only, not proof",
              },
              {
                  "rule_id": "scope_guard_005",
                  "rule": "do not read neurotype/cosmology shape proximity as shared cause",
              },
              {
                  "rule_id": "scope_guard_006",
                  "rule": "hold QSO separately until QSO-specific covariance/source guards pass",
              },
          ]

          def write_csv(path, rows):
              if not rows:
                  path.write_text("", encoding="utf-8")
                  return
              fieldnames = list(rows[0].keys())
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  writer.writerows(rows)

          write_csv(OUT / "v4_219_residual_signature_rows.csv", residual_signature_rows)
          write_csv(OUT / "v4_219_covariance_mode_scope_rows.csv", covariance_mode_scope_rows)
          write_csv(OUT / "v4_219_dependency_flag_rows.csv", dependency_flag_rows)
          write_csv(OUT / "v4_219_shape_persistence_audit_rows.csv", shape_persistence_audit_rows)
          write_csv(OUT / "v4_219_prioritized_next_tests.csv", prioritized_next_tests)
          write_csv(OUT / "v4_219_scope_guard_rules.csv", scope_guard_rules)

          gates = [
              {
                  "gate": "residual_signature_rows_equal_3",
                  "passed": len(residual_signature_rows) == 3,
                  "detail": f"residual_signature_rows = {len(residual_signature_rows)}",
              },
              {
                  "gate": "covariance_mode_scope_rows_equal_5",
                  "passed": len(covariance_mode_scope_rows) == 5,
                  "detail": f"covariance_mode_scope_rows = {len(covariance_mode_scope_rows)}",
              },
              {
                  "gate": "dependency_flag_rows_equal_8",
                  "passed": len(dependency_flag_rows) == 8,
                  "detail": f"dependency_flag_rows = {len(dependency_flag_rows)}",
              },
              {
                  "gate": "shape_persistence_audit_rows_equal_4",
                  "passed": len(shape_persistence_audit_rows) == 4,
                  "detail": f"shape_persistence_audit_rows = {len(shape_persistence_audit_rows)}",
              },
              {
                  "gate": "prioritized_next_tests_equal_4",
                  "passed": len(prioritized_next_tests) == 4,
                  "detail": f"prioritized_next_tests = {len(prioritized_next_tests)}",
              },
              {
                  "gate": "scope_guard_rules_equal_6",
                  "passed": len(scope_guard_rules) == 6,
                  "detail": f"scope_guard_rules = {len(scope_guard_rules)}",
              },
              {
                  "gate": "lrgxelg_z070_signature_preserved",
                  "passed": residual_signature_rows[0]["prior_signature"] == "++-",
                  "detail": "LRGxELG z=0.70 remains ++- as residual-direction preview only",
              },
              {
                  "gate": "lrgxelg_z0845_signature_preserved",
                  "passed": residual_signature_rows[1]["prior_signature"] == "-+-",
                  "detail": "LRGxELG z=0.845 remains -+- as test priority only",
              },
              {
                  "gate": "qso_z148_signature_preserved",
                  "passed": residual_signature_rows[2]["prior_signature"] == "-++",
                  "detail": "QSO z=1.48 remains -++ as open QSO-specific surface",
              },
              {
                  "gate": "combined_matrix_blocked",
                  "passed": any(row["post_guard_status"] == "blocked_until_source_surface_and_covariance_layers_are_separated" for row in shape_persistence_audit_rows),
                  "detail": "combined LRG/ELG/QSO matrix is blocked until guards are explicit",
              },
              {
                  "gate": "qso_specific_guard_present",
                  "passed": any("QSO-specific" in row["next_requirement"] for row in shape_persistence_audit_rows),
                  "detail": "QSO-specific guard is present",
              },
              {
                  "gate": "same_shape_not_proof_guard_present",
                  "passed": any("same-shape matches" in row["rule"] and "not proof" in row["rule"] for row in scope_guard_rules),
                  "detail": "same-shape matches are test priorities only",
              },
              {
                  "gate": "derived_dependency_guard_present",
                  "passed": any(row["quantity"] == "f_sigma8" for row in dependency_flag_rows),
                  "detail": "derived/dependent quantity guard includes f_sigma8",
              },
              {
                  "gate": "truth_boundary_blocks_validation",
                  "passed": True,
                  "detail": "truth boundary says no cosmology validation",
              },
              {
                  "gate": "selected_next_route_written",
                  "passed": SELECTED_NEXT_ROUTE == "source_specific_lrg_elg_qso_residual_tables_with_full_covariance_ingestion_attempt",
                  "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              },
          ]

          failed_gates = [gate["gate"] for gate in gates if not gate["passed"]]
          write_csv(OUT / "v4_219_rule_checks.csv", gates)

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for gate in gates if gate["passed"]),
              "rules_total": len(gates),
              "failed_gates": failed_gates if failed_gates else "none",
              "residual_signature_rows": len(residual_signature_rows),
              "covariance_mode_scope_rows": len(covariance_mode_scope_rows),
              "dependency_flag_rows": len(dependency_flag_rows),
              "shape_persistence_audit_rows": len(shape_persistence_audit_rows),
              "prioritized_next_tests": len(prioritized_next_tests),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "claims_neurotype_data_proves_cosmology": False,
                  "claims_shared_cause": False,
                  "clean_meaning": "v4.219 is a scope-guard audit that separates residual direction from covariance modes and keeps LRG/ELG/QSO source surfaces from being blended too early.",
              },
          }

          (OUT / "v4_219_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_lines = [
              "# TAIRID v4.219",
              "",
              "Cosmology Residual Direction vs Covariance Mode Split With Scope Guards",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"residual_signature_rows = {summary['residual_signature_rows']}",
              f"covariance_mode_scope_rows = {summary['covariance_mode_scope_rows']}",
              f"dependency_flag_rows = {summary['dependency_flag_rows']}",
              f"shape_persistence_audit_rows = {summary['shape_persistence_audit_rows']}",
              f"prioritized_next_tests = {summary['prioritized_next_tests']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Clean meaning:",
              "v4.219 does not run new cosmology data. It takes the v4.218 tracer/source-surface ledger and prevents the earlier LRG/ELG/QSO preview shapes from being over-read. Residual direction, covariance-mode permission, derived/dependent quantities, and shape-persistence status are now separated.",
              "",
              "Truth boundary:",
              "This does not validate cosmology, does not prove TAIRID, and does not claim neurotype data proves cosmology. Same-shape matches remain test priorities only.",
          ]
          (OUT / "v4_219_summary.md").write_text("\n".join(summary_lines) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"residual_signature_rows = {summary['residual_signature_rows']}")
          print(f"covariance_mode_scope_rows = {summary['covariance_mode_scope_rows']}")
          print(f"dependency_flag_rows = {summary['dependency_flag_rows']}")
          print(f"shape_persistence_audit_rows = {summary['shape_persistence_audit_rows']}")
          print(f"prioritized_next_tests = {summary['prioritized_next_tests']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no shared cause.")
          print(f"Output package: {ZIP_NAME}")

          if failed_gates:
              raise SystemExit(f"Failed gates: {failed_gates}")
          PY

      - name: Upload v4.219 output package
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-219-cosmology-residual-covariance-scope-guard-output
          path: |
            tairid_v4_219_cosmology_residual_covariance_scope_guard_output/
            tairid-v4-219-cosmology-residual-covariance-scope-guard-output.zip
