name: Run TAIRID cosmology field relative residual geometry v1

on:
  workflow_dispatch:

jobs:
  run-tairid-cosmology-field-relative-residual-geometry-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy matplotlib

      - name: Run TAIRID cosmology field relative residual geometry v1
        run: |
          python run_tairid_cosmology_field_relative_residual_geometry_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-field-relative-residual-geometry-v1-output
          path: |
            tairid_cosmology_field_relative_residual_geometry_v1_outputs/**
