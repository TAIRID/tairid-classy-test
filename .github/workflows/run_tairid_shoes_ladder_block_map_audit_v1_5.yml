name: Run TAIRID SH0ES Ladder Block Map Audit v1.5

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-ladder-block-map-audit-v1-5:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_ladder_block_map_audit_v1_5.py
          echo "v1.5 SH0ES ladder block map audit found."

      - name: Run TAIRID SH0ES Ladder Block Map Audit v1.5
        run: |
          python run_tairid_shoes_ladder_block_map_audit_v1_5.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-ladder-block-map-audit-v1-5-output
          path: |
            tairid_shoes_ladder_block_map_audit_v1_5_outputs/**
