name: Run TAIRID Cosmology Multi Surface Pressure Map v3.2.1 Fresh

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-cosmology-multi-surface-pressure-map-v3-2-1-fresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib

      - name: Confirm fresh script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_cosmology_multi_surface_pressure_map_v3_2_1_fresh.py
          echo "v3.2.1 FRESH TAIRID cosmology multi-surface pressure map found."

      - name: Run TAIRID Cosmology Multi Surface Pressure Map v3.2.1 Fresh
        run: |
          python run_tairid_cosmology_multi_surface_pressure_map_v3_2_1_fresh.py

      - name: Upload fresh outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-multi-surface-pressure-map-v3-2-1-fresh-output
          path: |
            tairid_cosmology_multi_surface_pressure_map_v3_2_1_fresh_outputs/**
