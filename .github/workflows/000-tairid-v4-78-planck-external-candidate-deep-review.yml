name: 000 TAIRID v4.78 Planck External Candidate Deep Review

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-78-planck-external-candidate-deep-review.yml"

jobs:
  tairid-v4-78-planck-external-candidate-deep-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.78 Planck external candidate deep review
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_78_planck_external_candidate_deep_review

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_78_planck_external_candidate_deep_review")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_78_planck_external_candidate_deep_review"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This does not accept an external paper, source page, abstract, sidecar, or table as posterior covariance.",
              "This performs a deeper source-candidate review to decide whether an external reference path is promising enough for later extraction.",
              "A pass means the external candidate lane is reviewed and bounded, not that Planck reference uncertainty is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_77_sprint_end_handoff": {
                  "readiness_label": "sprint_end_handoff_passed_ready_for_next_sprint_Planck_reference_ELG_WiggleZ_or_independence_routes",
                  "Planck_reference_uncertainty_computed": False,
                  "ELG_covariance_ready": False,
                  "WiggleZ_covariance_ready": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "all_negative_growth_story_allowed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_76_1_planck_reference_upload_repair": {
                  "readiness_label": "Planck_reference_upload_repair_passed_ready_for_sprint_end_handoff",
                  "artifact_upload_path_repaired": True,
                  "reference_uncertainty_computed": False,
                  "external_reference_imported": False,
                  "solver_run": False,
                  "full_chains_imported": False
              },
              "v4_71_external_literature_expansion": {
                  "accepted_reference_uncertainty_now_count": 0,
                  "reference_uncertainty_computed": False,
                  "external_reference_imported": False
              }
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          SOURCE_CANDIDATES = [
              {
                  "source_id": "planck_2018_cosmological_parameters_arxiv",
                  "source_type": "primary_planck_publication",
                  "url": "https://arxiv.org/abs/1807.06209",
                  "role": "Primary Planck 2018 cosmological-parameters anchor.",
                  "expected_use": "Planck model/provenance anchor; not covariance by itself.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "planck_2018_cosmological_parameters_aanda",
                  "source_type": "primary_planck_publication",
                  "url": "https://www.aanda.org/articles/aa/full_html/2020/09/aa33910-18/aa33910-18.html",
                  "role": "Published Planck 2018 cosmological-parameters paper page.",
                  "expected_use": "Planck model/provenance anchor; not covariance by itself.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "planck_pr3_irsa_cosmoparams_index",
                  "source_type": "official_data_index",
                  "url": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/",
                  "role": "Official Planck PR3 cosmological-parameters product index.",
                  "expected_use": "Official product discovery anchor; not fsigma8 covariance by itself.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "nunes_vagnozzi_2021_s8_rsd_arbitration",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/2106.01208",
                  "role": "S8/RSD discrepancy discussion including Planck comparison.",
                  "expected_use": "Context and method-routing candidate; requires deeper source/data inspection.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "reyes_escamilla_2022_fsigma8_gp",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/2203.03574",
                  "role": "fσ8 reconstruction and Planck 2018 comparison candidate.",
                  "expected_use": "Candidate for context/reconstruction method, not accepted as Planck covariance.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "kazantzidis_perivolaropoulos_2018_fsigma8_tension",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/1803.01337",
                  "role": "Extended fσ8 RSD compilation and Planck comparison context.",
                  "expected_use": "Historical RSD compilation/context candidate; not Planck 2018 covariance.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "li_du_zhou_zhang_xu_2019_h0_fsigma8_gp",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/1911.12076",
                  "role": "H0-prior effects on fσ8 tension and Planck prior discussion.",
                  "expected_use": "Method/context candidate; not accepted as Planck covariance.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "benisty_2020_s8_rsd_dataset",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/2005.03751",
                  "role": "S8 tension with RSD dataset and Planck comparison.",
                  "expected_use": "Context/source-expansion candidate; not accepted as Planck covariance.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "yu_2022_boss_power_spectrum_rsd",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/2211.16794",
                  "role": "BOSS RSD measurements and Planck 2018 ΛCDM comparison.",
                  "expected_use": "RSD measurement context candidate; not Planck posterior covariance.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "murakami_2023_non_linearity_free_fsigma8_prediction",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/2305.12812",
                  "role": "fσ8 prediction/method literature candidate.",
                  "expected_use": "Method candidate; not accepted as Planck covariance.",
                  "accept_as_reference_uncertainty_now": False
              }
          ]

          ACCEPTANCE_REQUIREMENTS = [
              {
                  "requirement_id": "target_redshift_match_or_reproducible_mapping",
                  "required": True,
                  "definition": "Must provide or reproducibly derive fσ8 at z = 0.15, 0.38, 0.51, 0.61, 2.33."
              },
              {
                  "requirement_id": "posterior_samples_or_covariance",
                  "required": True,
                  "definition": "Must provide posterior samples, covariance, or a reproducible weighted-sample route."
              },
              {
                  "requirement_id": "Planck_reference_identity",
                  "required": True,
                  "definition": "Must clearly identify Planck model/likelihood/root assumptions."
              },
              {
                  "requirement_id": "machine_readable_or_auditable",
                  "required": True,
                  "definition": "Must be machine-readable or auditable enough for a future GitHub workflow."
              },
              {
                  "requirement_id": "not_summary_or_context_only",
                  "required": True,
                  "definition": "A paper, abstract, figure, source page, or summary table is not enough by itself."
              },
              {
                  "requirement_id": "covariance_method_preserved",
                  "required": True,
                  "definition": "If a covariance exists, the covariance construction or sample-weighting method must be preserved."
              }
          ]

          DEEP_REVIEW_SIGNALS = [
              "planck",
              "fsigma8",
              "fσ8",
              "f sigma",
              "redshift-space distortion",
              "redshift space distortion",
              "rsd",
              "covariance",
              "posterior",
              "mcmc",
              "chain",
              "samples",
              "likelihood",
              "growth rate",
              "sigma8"
          ]

          BLOCKED_CLAIMS = [
              "An external source was accepted as Planck RSD covariance.",
              "External reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "Full Planck chains were imported.",
              "CAMB or CLASS was installed.",
              "A solver was run.",
              "A paper abstract was treated as covariance.",
              "A context paper was treated as covariance.",
              "A source page was treated as covariance.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_79_solver_container_feasibility_branch",
                  "purpose": "Try the heavier solver/container path since no external candidate is accepted as covariance yet.",
                  "why_next": "Planck reference uncertainty remains the largest blocker."
              },
              {
                  "priority": 2,
                  "route_id": "v4_79_external_candidate_extraction_probe",
                  "purpose": "Pick any high-priority source and inspect whether it exposes data, tables, code, or links worth extracting.",
                  "why_next": "Only useful if v4.78 identifies promising source signals."
              },
              {
                  "priority": 3,
                  "route_id": "v4_80_ELG_grid_member_probe",
                  "purpose": "Continue the parked ELG parser backlog.",
                  "why_next": "Needed before full eBOSS can become covariance-aware."
              },
              {
                  "priority": 4,
                  "route_id": "v4_81_WiggleZ_product_locator_followup",
                  "purpose": "Continue the parked WiggleZ product-mapping backlog.",
                  "why_next": "Needed before WiggleZ can enter any final RSD combination."
              }
          ]

          def fetch_prefix(source):
              record = {
                  "source_id": source["source_id"],
                  "source_type": source["source_type"],
                  "url": source["url"],
                  "ok": False,
                  "method_used": "",
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "bytes_sampled": 0,
                  "title_guess": "",
                  "signal_hits": "",
                  "signal_hit_count": 0,
                  "contains_planck": False,
                  "contains_fsigma8": False,
                  "contains_rsd": False,
                  "contains_covariance": False,
                  "contains_posterior_or_mcmc": False,
                  "contains_machine_data_hint": False,
                  "candidate_priority": "unreviewed",
                  "accept_as_reference_uncertainty_now": source["accept_as_reference_uncertainty_now"],
                  "error": ""
              }

              headers = {
                  "User-Agent": "TAIRID-v4.78-Planck-external-candidate-deep-review/1.0",
                  "Accept": "text/html,application/xhtml+xml,application/xml,text/plain,*/*"
              }

              data = b""
              text = ""

              try:
                  req = urllib.request.Request(source["url"], headers=headers)
                  with urllib.request.urlopen(req, timeout=90) as response:
                      record["ok"] = True
                      record["method_used"] = "GET_PREFIX"
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      data = response.read(500000)
                      record["bytes_sampled"] = len(data)
                      text = data.decode("utf-8", errors="replace")

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
                  return record

              lower = text.lower()

              title_match = re.search(r"<title[^>]*>(.*?)</title>", text, flags=re.IGNORECASE | re.DOTALL)
              if title_match:
                  title = re.sub(r"\s+", " ", title_match.group(1)).strip()
                  record["title_guess"] = title[:220]
              else:
                  first_line = next((line.strip() for line in text.splitlines() if line.strip()), "")
                  record["title_guess"] = first_line[:220]

              hits = []
              for signal in DEEP_REVIEW_SIGNALS:
                  if signal in lower:
                      hits.append(signal)

              record["signal_hits"] = ", ".join(hits)
              record["signal_hit_count"] = len(hits)
              record["contains_planck"] = "planck" in lower
              record["contains_fsigma8"] = "fsigma8" in lower or "fσ8" in lower or "f sigma" in lower
              record["contains_rsd"] = "rsd" in lower or "redshift-space distortion" in lower or "redshift space distortion" in lower
              record["contains_covariance"] = "covariance" in lower
              record["contains_posterior_or_mcmc"] = "posterior" in lower or "mcmc" in lower or "chain" in lower or "samples" in lower
              record["contains_machine_data_hint"] = (
                  "github" in lower
                  or "zenodo" in lower
                  or "data" in lower
                  or "download" in lower
                  or ".dat" in lower
                  or ".csv" in lower
                  or ".txt" in lower
                  or "table" in lower
              )

              if source["source_type"] == "primary_planck_publication":
                  record["candidate_priority"] = "provenance_anchor_not_covariance"
              elif record["contains_fsigma8"] and record["contains_covariance"] and record["contains_posterior_or_mcmc"]:
                  record["candidate_priority"] = "high_for_manual_extraction_review_not_accepted"
              elif record["contains_fsigma8"] and (record["contains_rsd"] or record["contains_planck"]):
                  record["candidate_priority"] = "medium_for_manual_extraction_review_not_accepted"
              elif record["contains_planck"] or record["contains_rsd"]:
                  record["candidate_priority"] = "context_candidate_not_covariance"
              else:
                  record["candidate_priority"] = "low_signal_or_unresolved"

              return record

          failed_gates = []
          warnings = [
              "external_candidate_deep_review_only",
              "source_signal_review_not_covariance_acceptance",
              "no_external_reference_accepted_as_uncertainty",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          source_records = [fetch_prefix(source) for source in SOURCE_CANDIDATES]

          deep_review_records = []
          for source in SOURCE_CANDIDATES:
              record = next(row for row in source_records if row["source_id"] == source["source_id"])

              if source["source_type"] == "primary_planck_publication":
                  classification = "planck_provenance_anchor"
              elif source["source_type"] == "official_data_index":
                  classification = "official_product_anchor"
              else:
                  classification = "external_context_or_method_candidate"

              deep_review_records.append({
                  "source_id": source["source_id"],
                  "source_type": source["source_type"],
                  "classification": classification,
                  "role": source["role"],
                  "expected_use": source["expected_use"],
                  "reachable": record["ok"],
                  "signal_hit_count": record["signal_hit_count"],
                  "signal_hits": record["signal_hits"],
                  "contains_planck": record["contains_planck"],
                  "contains_fsigma8": record["contains_fsigma8"],
                  "contains_rsd": record["contains_rsd"],
                  "contains_covariance": record["contains_covariance"],
                  "contains_posterior_or_mcmc": record["contains_posterior_or_mcmc"],
                  "contains_machine_data_hint": record["contains_machine_data_hint"],
                  "candidate_priority": record["candidate_priority"],
                  "accept_as_reference_uncertainty_now": False,
                  "manual_or_followup_extraction_required": True,
                  "reference_uncertainty_imported": False
              })

          reachable_count = sum(1 for row in source_records if row["ok"])
          accepted_now_count = sum(1 for row in deep_review_records if row["accept_as_reference_uncertainty_now"])
          high_priority_count = sum(1 for row in deep_review_records if row["candidate_priority"].startswith("high"))
          medium_priority_count = sum(1 for row in deep_review_records if row["candidate_priority"].startswith("medium"))
          fsigma8_hit_count = sum(1 for row in deep_review_records if row["contains_fsigma8"])
          covariance_hit_count = sum(1 for row in deep_review_records if row["contains_covariance"])
          posterior_hit_count = sum(1 for row in deep_review_records if row["contains_posterior_or_mcmc"])
          machine_data_hint_count = sum(1 for row in deep_review_records if row["contains_machine_data_hint"])

          if UPSTREAM_LOCKS["v4_77_sprint_end_handoff"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("v4_77_reference_uncertainty_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_77_sprint_end_handoff"]["final_RSD_pressure_score_computed"] is not False:
              failed_gates.append("v4_77_final_pressure_boundary_not_carried")

          if len(SOURCE_CANDIDATES) < 10:
              failed_gates.append("source_candidate_count_too_low")

          if reachable_count == 0:
              failed_gates.append("no_external_candidate_sources_reachable")

          if accepted_now_count != 0:
              failed_gates.append("external_candidate_accepted_as_covariance_too_early")

          if len(ACCEPTANCE_REQUIREMENTS) < 6:
              failed_gates.append("acceptance_requirements_incomplete")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "external source was accepted",
              "external reference uncertainty is included",
              "planck reference uncertainty is computed",
              "final rsd pressure score",
              "combined growth covariance",
              "validated",
              "solver was run",
              "context paper was treated as covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          if high_priority_count > 0:
              route_decision = "external_candidate_deep_review_passed_high_priority_followup_exists_but_no_covariance_accepted"
              recommended_next = "v4_79_external_candidate_extraction_probe_or_solver_container_branch"
          elif medium_priority_count > 0:
              route_decision = "external_candidate_deep_review_passed_medium_priority_followup_exists_but_solver_branch_recommended"
              recommended_next = "v4_79_solver_container_feasibility_branch"
          else:
              route_decision = "external_candidate_deep_review_passed_no_strong_external_covariance_candidate_solver_branch_recommended"
              recommended_next = "v4_79_solver_container_feasibility_branch"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_sprint_boundary_carried",
                  "pass": UPSTREAM_LOCKS["v4_77_sprint_end_handoff"]["Planck_reference_uncertainty_computed"] is False,
                  "result": "v4.77 Planck reference uncertainty remains missing",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "source_candidates_reviewed",
                  "pass": len(SOURCE_CANDIDATES) >= 10,
                  "result": f"{len(SOURCE_CANDIDATES)} external candidate sources reviewed",
                  "boundary": "Review is not covariance acceptance."
              },
              {
                  "rule_id": "source_reachability_checked",
                  "pass": reachable_count > 0,
                  "result": f"{reachable_count} candidate sources reachable",
                  "boundary": "Reachability is not covariance."
              },
              {
                  "rule_id": "no_candidate_accepted_as_covariance_now",
                  "pass": accepted_now_count == 0,
                  "result": "0 candidates accepted as Planck reference covariance now",
                  "boundary": "No reference uncertainty imported."
              },
              {
                  "rule_id": "deep_review_signals_recorded",
                  "pass": len(deep_review_records) == len(SOURCE_CANDIDATES),
                  "result": f"{len(deep_review_records)} deep review records written",
                  "boundary": "Signal hits guide later work only."
              },
              {
                  "rule_id": "acceptance_requirements_preserved",
                  "pass": len(ACCEPTANCE_REQUIREMENTS) >= 6,
                  "result": f"{len(ACCEPTANCE_REQUIREMENTS)} acceptance requirements preserved",
                  "boundary": "No candidate meets them automatically."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "No reference covariance computed."
              },
              {
                  "rule_id": "next_route_options_declared",
                  "pass": len(NEXT_ROUTE_OPTIONS) >= 4,
                  "result": f"{len(NEXT_ROUTE_OPTIONS)} next route options declared",
                  "boundary": "Future work only."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 14,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "External candidate deep review only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_78_rules_passed")

          if failed_gates:
              readiness_label = "Planck_external_candidate_deep_review_failed"
              next_allowed_step = "Repair external candidate deep review before solver/container branch or extraction follow-up."
          else:
              readiness_label = "Planck_external_candidate_deep_review_passed_ready_for_solver_container_branch_or_candidate_extraction_probe"
              next_allowed_step = (
                  f"Proceed to {recommended_next}. "
                  "Do not compute Planck reference uncertainty or final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "source_candidate_count": len(SOURCE_CANDIDATES),
              "reachable_source_count": reachable_count,
              "deep_review_record_count": len(deep_review_records),
              "accepted_reference_uncertainty_now_count": accepted_now_count,
              "high_priority_candidate_count": high_priority_count,
              "medium_priority_candidate_count": medium_priority_count,
              "fsigma8_hit_count": fsigma8_hit_count,
              "covariance_hit_count": covariance_hit_count,
              "posterior_or_mcmc_hit_count": posterior_hit_count,
              "machine_data_hint_count": machine_data_hint_count,
              "acceptance_requirement_count": len(ACCEPTANCE_REQUIREMENTS),
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "next_route_option_count": len(NEXT_ROUTE_OPTIONS),
              "route_decision": route_decision,
              "recommended_next": recommended_next,
              "external_reference_imported": False,
              "Planck_reference_uncertainty_computed": False,
              "solver_installed": False,
              "solver_run": False,
              "full_chains_imported": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
