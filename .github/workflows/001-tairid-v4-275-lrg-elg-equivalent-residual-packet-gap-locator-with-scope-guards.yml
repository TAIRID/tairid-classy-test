name: 001 TAIRID v4.275 - LRG ELG Equivalent Residual Packet Gap Locator With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-275-lrg-elg-equivalent-residual-packet-gap-locator-with-scope-guards.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"

permissions:
  contents: read

jobs:
  lrg-elg-equivalent-residual-packet-gap-locator:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.275 LRG ELG Equivalent Residual Packet Gap Locator With Scope Guards is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.275 LRG ELG equivalent residual packet gap locator
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import re
          import zipfile

          VERSION = "v4.275"
          ROUTE = "lrg_elg_equivalent_residual_packet_gap_locator_with_scope_guards_after_v4_274"
          EXPECTED_RESULT = "v4_275_lrg_elg_equivalent_residual_packet_gap_locator_with_scope_guards_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_276_lrg_elg_equivalent_residual_packet_template_builder_with_scope_guards"

          OUT = Path("tairid_v4_275_lrg_elg_equivalent_residual_packet_gap_locator_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-275-lrg-elg-equivalent-residual-packet-gap-locator-output.zip"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def is_candidate_file(path):
              lower = path.as_posix().lower()
              if ".git/" in lower or "node_modules/" in lower:
                  return False
              suffix_ok = path.suffix.lower() in [".csv", ".json", ".txt", ".md", ".yaml", ".yml", ".tsv"]
              if not suffix_ok:
                  return False
              keywords = ["lrg", "elg", "qso", "rsd", "fsigma", "f_sigma", "growth", "bao", "cov", "covariance", "zhao", "residual", "tracer"]
              return any(k in lower for k in keywords)

          def classify_lane(path):
              lower = path.as_posix().lower()
              lanes = []
              if "lrg" in lower:
                  lanes.append("LRG")
              if "elg" in lower:
                  lanes.append("ELG")
              if "qso" in lower or "zhao" in lower:
                  lanes.append("QSO")
              if not lanes:
                  if "rsd" in lower or "fsigma" in lower or "f_sigma" in lower or "growth" in lower:
                      lanes.append("growth_unknown")
                  elif "bao" in lower:
                      lanes.append("bao_unknown")
                  elif "cov" in lower:
                      lanes.append("covariance_unknown")
              return "|".join(lanes) if lanes else "unknown"

          def classify_object(path):
              lower = path.as_posix().lower()
              objects = []
              if "observ" in lower or "data" in lower or "value" in lower or "fsigma" in lower or "f_sigma" in lower or "growth" in lower:
                  objects.append("observed_candidate")
              if "reference" in lower or "lcdm" in lower or "model" in lower:
                  objects.append("reference_candidate")
              if "cov" in lower or "covariance" in lower:
                  objects.append("covariance_candidate")
              if "inverse" in lower:
                  objects.append("inverse_covariance_candidate")
              if "residual" in lower:
                  objects.append("residual_candidate")
              if "manifest" in lower or "inventory" in lower or "ledger" in lower:
                  objects.append("manifest_or_inventory")
              return "|".join(objects) if objects else "candidate_context"

          inherited_v4_274_rows = [
              {
                  "inherited_from": "v4.274",
                  "item": "rules",
                  "value": "44 / 44 passed",
                  "meaning": "Source-separated residual lane inventory passed.",
                  "carry_forward_status": "ready_for_LRG_ELG_gap_locator",
              },
              {
                  "inherited_from": "v4.274",
                  "item": "qso_lane_ready",
                  "value": True,
                  "meaning": "QSO has a mature Zhao diagnostic packet.",
                  "carry_forward_status": "qso_template_ready",
              },
              {
                  "inherited_from": "v4.274",
                  "item": "lrg_equivalent_packet_ready",
                  "value": False,
                  "meaning": "LRG equivalent packet is missing.",
                  "carry_forward_status": "lrg_gap_active",
              },
              {
                  "inherited_from": "v4.274",
                  "item": "elg_equivalent_packet_ready",
                  "value": False,
                  "meaning": "ELG equivalent packet is missing.",
                  "carry_forward_status": "elg_gap_active",
              },
              {
                  "inherited_from": "v4.274",
                  "item": "source_comparison_allowed",
                  "value": False,
                  "meaning": "Source comparison stayed blocked.",
                  "carry_forward_status": "source_comparison_blocked",
              },
              {
                  "inherited_from": "v4.274",
                  "item": "combined_matrix_allowed",
                  "value": False,
                  "meaning": "Combined matrix stayed blocked.",
                  "carry_forward_status": "combined_matrix_blocked",
              },
              {
                  "inherited_from": "v4.274",
                  "item": "p_value_computed",
                  "value": False,
                  "meaning": "No p-value was computed.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.274",
                  "item": "evidence_allowed",
                  "value": False,
                  "meaning": "Evidence language stayed blocked.",
                  "carry_forward_status": "evidence_blocked",
              },
              {
                  "inherited_from": "v4.274",
                  "item": "selected_next_route",
                  "value": "v4_275_lrg_elg_equivalent_residual_packet_gap_locator_with_scope_guards",
                  "meaning": "Current route locates gaps for equivalent LRG and ELG residual packets.",
                  "carry_forward_status": "current_route",
              },
          ]

          all_files = []
          for p in Path(".").rglob("*"):
              if p.is_file() and is_candidate_file(p):
                  try:
                      size = p.stat().st_size
                  except Exception:
                      size = None
                  all_files.append({
                      "path": p.as_posix(),
                      "suffix": p.suffix.lower(),
                      "size_bytes": size,
                      "lane_guess": classify_lane(p),
                      "object_guess": classify_object(p),
                  })

          all_files = sorted(all_files, key=lambda row: row["path"])[:300]

          candidate_file_summary_rows = [
              {
                  "summary_id": "file_summary_001",
                  "object": "candidate_files_scanned",
                  "value": len(all_files),
                  "meaning": "Repo files with LRG/ELG/QSO/RSD/growth/BAO/covariance keywords found by filename scan.",
              },
              {
                  "summary_id": "file_summary_002",
                  "object": "lrg_candidate_files",
                  "value": sum(1 for row in all_files if "LRG" in row["lane_guess"]),
                  "meaning": "Filename candidates that mention LRG.",
              },
              {
                  "summary_id": "file_summary_003",
                  "object": "elg_candidate_files",
                  "value": sum(1 for row in all_files if "ELG" in row["lane_guess"]),
                  "meaning": "Filename candidates that mention ELG.",
              },
              {
                  "summary_id": "file_summary_004",
                  "object": "qso_or_zhao_candidate_files",
                  "value": sum(1 for row in all_files if "QSO" in row["lane_guess"]),
                  "meaning": "Filename candidates that mention QSO or Zhao.",
              },
          ]

          qso_reference_packet_rows = [
              {
                  "packet_id": "qso_template_001",
                  "source_lane": "QSO",
                  "packet_object": "observed_packet",
                  "status": "ready_candidate",
                  "template_role": "required_equivalence_target",
              },
              {
                  "packet_id": "qso_template_002",
                  "source_lane": "QSO",
                  "packet_object": "reference_packet",
                  "status": "validated_no_scoring",
                  "template_role": "required_equivalence_target",
              },
              {
                  "packet_id": "qso_template_003",
                  "source_lane": "QSO",
                  "packet_object": "covariance_or_policy",
                  "status": "validated_no_scoring",
                  "template_role": "required_equivalence_target",
              },
              {
                  "packet_id": "qso_template_004",
                  "source_lane": "QSO",
                  "packet_object": "residual_preview",
                  "status": "computed_preview_only",
                  "template_role": "required_equivalence_target",
              },
              {
                  "packet_id": "qso_template_005",
                  "source_lane": "QSO",
                  "packet_object": "diagnostic_distance",
                  "status": "computed_no_evidence",
                  "template_role": "required_equivalence_target",
              },
              {
                  "packet_id": "qso_template_006",
                  "source_lane": "QSO",
                  "packet_object": "provenance_and_claim_boundary",
                  "status": "same_family_cross_release_candidate_not_full_holdout",
                  "template_role": "required_equivalence_target",
              },
          ]

          lane_gap_rows = []
          for lane in ["LRG", "ELG"]:
              lane_files = [row for row in all_files if lane in row["lane_guess"]]
              has_observed_candidate = any("observed_candidate" in row["object_guess"] for row in lane_files)
              has_reference_candidate = any("reference_candidate" in row["object_guess"] for row in lane_files)
              has_cov_candidate = any("covariance_candidate" in row["object_guess"] for row in lane_files)
              has_residual_candidate = any("residual_candidate" in row["object_guess"] for row in lane_files)
              lane_gap_rows.extend([
                  {
                      "gap_id": f"{lane.lower()}_gap_001",
                      "source_lane": lane,
                      "packet_object": "observed_packet",
                      "filename_candidate_seen": has_observed_candidate,
                      "current_status": "candidate_file_seen_needs_reader" if has_observed_candidate else "missing_or_not_detected_by_filename_scan",
                      "needed_next": "build reader or manual template for observed values",
                  },
                  {
                      "gap_id": f"{lane.lower()}_gap_002",
                      "source_lane": lane,
                      "packet_object": "reference_packet",
                      "filename_candidate_seen": has_reference_candidate,
                      "current_status": "candidate_file_seen_needs_reader" if has_reference_candidate else "missing_or_requires_recalculation",
                      "needed_next": "build fixed-reference calculator/template for lane redshifts and quantities",
                  },
                  {
                      "gap_id": f"{lane.lower()}_gap_003",
                      "source_lane": lane,
                      "packet_object": "covariance_or_policy",
                      "filename_candidate_seen": has_cov_candidate,
                      "current_status": "candidate_file_seen_needs_reader" if has_cov_candidate else "missing_or_diagonal_policy_needed",
                      "needed_next": "locate covariance, reconstruct covariance, or explicitly mark diagonal-only limitation",
                  },
                  {
                      "gap_id": f"{lane.lower()}_gap_004",
                      "source_lane": lane,
                      "packet_object": "residual_preview",
                      "filename_candidate_seen": has_residual_candidate,
                      "current_status": "blocked_until_observed_reference_covariance_ready",
                      "needed_next": "do not compute until observed/reference/covariance packet exists",
                  },
                  {
                      "gap_id": f"{lane.lower()}_gap_005",
                      "source_lane": lane,
                      "packet_object": "diagnostic_distance",
                      "filename_candidate_seen": False,
                      "current_status": "blocked_until_residual_preview_ready",
                      "needed_next": "do not compute until residual preview and covariance policy are guarded",
                  },
                  {
                      "gap_id": f"{lane.lower()}_gap_006",
                      "source_lane": lane,
                      "packet_object": "provenance_and_claim_boundary",
                      "filename_candidate_seen": bool(lane_files),
                      "current_status": "needs_inventory",
                      "needed_next": "record survey family, release, source role, and holdout status",
                  },
              ])

          equivalent_packet_template_rows = []
          for lane in ["LRG", "ELG"]:
              equivalent_packet_template_rows.extend([
                  {
                      "template_id": f"{lane.lower()}_template_001",
                      "source_lane": lane,
                      "required_field": "observed_id",
                      "required_status": "must_be_unique",
                      "fill_status": "template_only",
                  },
                  {
                      "template_id": f"{lane.lower()}_template_002",
                      "source_lane": lane,
                      "required_field": "redshift",
                      "required_status": "numeric_effective_redshift",
                      "fill_status": "template_only",
                  },
                  {
                      "template_id": f"{lane.lower()}_template_003",
                      "source_lane": lane,
                      "required_field": "quantity",
                      "required_status": "named_quantity_such_as_f_sigma8_or_translated_quantity",
                      "fill_status": "template_only",
                  },
                  {
                      "template_id": f"{lane.lower()}_template_004",
                      "source_lane": lane,
                      "required_field": "observed_value",
                      "required_status": "numeric_or_mark_missing",
                      "fill_status": "template_only",
                  },
                  {
                      "template_id": f"{lane.lower()}_template_005",
                      "source_lane": lane,
                      "required_field": "reference_value",
                      "required_status": "numeric_fixed_reference_or_mark_recalculate",
                      "fill_status": "template_only",
                  },
                  {
                      "template_id": f"{lane.lower()}_template_006",
                      "source_lane": lane,
                      "required_field": "covariance_policy",
                      "required_status": "full_covariance|reconstructed_covariance|diagonal_only_limited|missing",
                      "fill_status": "template_only",
                  },
                  {
                      "template_id": f"{lane.lower()}_template_007",
                      "source_lane": lane,
                      "required_field": "provenance_status",
                      "required_status": "survey_family_release_holdout_status",
                      "fill_status": "template_only",
                  },
                  {
                      "template_id": f"{lane.lower()}_template_008",
                      "source_lane": lane,
                      "required_field": "approval_status",
                      "required_status": "candidate_not_scored_not_evidence",
                      "fill_status": "template_only",
                  },
              ])

          lane_action_plan_rows = [
              {
                  "action_id": "action_001",
                  "source_lane": "LRG",
                  "action": "scan_candidate_files",
                  "allowed_now": True,
                  "blocked_now": "residuals|diagnostic_scalar|comparison|combined_matrix",
                  "next_route": "template_builder_or_candidate_reader",
              },
              {
                  "action_id": "action_002",
                  "source_lane": "ELG",
                  "action": "scan_candidate_files",
                  "allowed_now": True,
                  "blocked_now": "residuals|diagnostic_scalar|comparison|combined_matrix",
                  "next_route": "template_builder_or_candidate_reader",
              },
              {
                  "action_id": "action_003",
                  "source_lane": "LRG_ELG",
                  "action": "build_equivalent_packet_templates",
                  "allowed_now": True,
                  "blocked_now": "claim_equivalence_until_filled",
                  "next_route": "v4_276",
              },
              {
                  "action_id": "action_004",
                  "source_lane": "combined_LRG_ELG_QSO",
                  "action": "combine_matrix",
                  "allowed_now": False,
                  "blocked_now": "source packets missing and dependency audit missing",
                  "next_route": "not_allowed",
              },
          ]

          scope_guard_rows = [
              {
                  "guard_id": "guard_001",
                  "guard": "filename_scan_is_not_data_validation",
                  "meaning": "Candidate files found by name are leads only.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_002",
                  "guard": "templates_are_not_filled_packets",
                  "meaning": "Template rows do not make LRG/ELG comparable yet.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_003",
                  "guard": "do_not_compute_residuals_from_missing_objects",
                  "meaning": "Residuals stay blocked until observed/reference/covariance policy exists.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_004",
                  "guard": "do_not_compare_LRG_ELG_to_QSO_until_packet_parity",
                  "meaning": "QSO packet maturity must not be used as if LRG/ELG are ready.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_005",
                  "guard": "do_not_build_combined_matrix",
                  "meaning": "Combined LRG/ELG/QSO matrix remains blocked.",
                  "status": "active",
              },
          ]

          readiness_rows = [
              {
                  "readiness_id": "ready_001",
                  "object": "QSO_Zhao_packet",
                  "status": "ready_candidate_template_not_evidence",
                  "blocks": "nothing",
              },
              {
                  "readiness_id": "ready_002",
                  "object": "LRG_equivalent_packet",
                  "status": "not_ready_template_needed",
                  "blocks": "source comparison",
              },
              {
                  "readiness_id": "ready_003",
                  "object": "ELG_equivalent_packet",
                  "status": "not_ready_template_needed",
                  "blocks": "source comparison",
              },
              {
                  "readiness_id": "ready_004",
                  "object": "source_comparison",
                  "status": "blocked_until_LRG_ELG_packets",
                  "blocks": "source contrast",
              },
              {
                  "readiness_id": "ready_005",
                  "object": "combined_matrix",
                  "status": "blocked",
                  "blocks": "combined interpretation",
              },
          ]

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "compute_LRG_residuals_now", "reason": "LRG equivalent observed/reference/covariance packet missing", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "compute_ELG_residuals_now", "reason": "ELG equivalent observed/reference/covariance packet missing", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "source_comparison_now", "reason": "LRG/ELG packets are not ready", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "combined_matrix_now", "reason": "packet parity and dependency audit are missing", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "p_value_or_likelihood_now", "reason": "no scoring guard exists", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "numeric_correction_fit_now", "reason": "no fitting guard exists", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "validation_or_evidence_claim_now", "reason": "no validation/evidence guard exists", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "candidate_file_scan", "permission_status": "completed_leads_only", "reason": "Repo filenames were scanned for possible LRG/ELG/QSO source files."},
              {"permission_scope": "LRG_ELG_gap_locator", "permission_status": "completed_no_scoring", "reason": "Missing packet objects are named for LRG and ELG."},
              {"permission_scope": "equivalent_packet_template_builder", "permission_status": "allowed_next", "reason": "Next workflow can write packet templates/readers without residual computation."},
              {"permission_scope": "LRG_residual_preview", "permission_status": "blocked", "reason": "LRG equivalent packet is missing."},
              {"permission_scope": "ELG_residual_preview", "permission_status": "blocked", "reason": "ELG equivalent packet is missing."},
              {"permission_scope": "source_comparison_residual_guard", "permission_status": "blocked_until_LRG_ELG_packets", "reason": "Comparison requires packet parity."},
              {"permission_scope": "combined_lrg_elg_qso_matrix", "permission_status": "blocked", "reason": "Combined matrix requires packet parity and dependency audit."},
              {"permission_scope": "p_value_or_likelihood", "permission_status": "blocked", "reason": "No scoring guard exists."},
              {"permission_scope": "numeric_correction_fit", "permission_status": "blocked", "reason": "No fitting is allowed."},
              {"permission_scope": "cosmology_validation_claim", "permission_status": "blocked", "reason": "No validation guard has passed."},
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "LRG and ELG gaps are packet-structure gaps, not proof gaps.",
                  "basis": "The issue is missing equivalent observed/reference/covariance packet maturity.",
                  "next_action": "Build templates or candidate readers.",
                  "claim_status": "gap_locator_only",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "Filename candidates are leads only.",
                  "basis": "A filename scan can identify possible files but cannot validate data content.",
                  "next_action": "Use a template builder or reader guard next.",
                  "claim_status": "no_validation",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "QSO remains the template lane.",
                  "basis": "QSO has observed/reference/covariance/residual/scalar structure; LRG and ELG do not yet.",
                  "next_action": "Use QSO packet requirements as the equivalent-packet contract.",
                  "claim_status": "template_only",
              },
              {
                  "decision_id": "decision_004",
                  "decision": "Source comparison and combined matrices remain blocked.",
                  "basis": "Packet parity and dependency audit are missing.",
                  "next_action": "Proceed to v4.276 template builder.",
                  "claim_status": "safe_to_continue",
              },
          ]

          route_decision_rows = [
              {"route_id": "route_001", "route": "lrg_elg_equivalent_residual_packet_template_builder_with_scope_guards", "permission_status": "recommended", "reason": "Need templates/readers before LRG/ELG residual packet staging."},
              {"route_id": "route_002", "route": "lrg_elg_candidate_file_reader", "permission_status": "allowed_if_candidate_files_exist", "reason": "Only useful when repo contains candidate files that can be safely parsed."},
              {"route_id": "route_003", "route": "source_comparison_residual_guard", "permission_status": "blocked_until_LRG_ELG_packets", "reason": "Source comparison requires equivalent packets."},
              {"route_id": "route_004", "route": "combined_lrg_elg_qso_matrix", "permission_status": "blocked", "reason": "Combined matrix requires source-separated packet parity and dependency audit."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.275 is a clean gap-locator milestone."},
          ]

          next_rows = [
              {"priority": 1, "test_id": "v4_276_lrg_elg_equivalent_residual_packet_template_builder_with_scope_guards", "purpose": "write LRG and ELG packet templates/readers without computing residuals", "activated": True},
              {"priority": 2, "test_id": "v4_276_lrg_elg_candidate_file_reader", "purpose": "optional if candidate files exist and can be safely parsed", "activated": False},
              {"priority": 3, "test_id": "v4_276_source_comparison_residual_guard", "purpose": "blocked until LRG/ELG packets exist", "activated": False},
              {"priority": 4, "test_id": "v4_276_handoff_if_needed", "purpose": "consolidate through LRG/ELG gap locator milestone", "activated": True},
          ]

          sdr_reduction_rows = [
              {"sdr_id": "sdr_001", "before_state": "LRG/ELG gaps were broad", "after_state": "missing packet objects are separated by lane", "reduction_type": "gap narrowed"},
              {"sdr_id": "sdr_002", "before_state": "candidate files could be overread", "after_state": "filename scan is leads-only", "reduction_type": "claim boundary sharpened"},
              {"sdr_id": "sdr_003", "before_state": "QSO packet could be treated as all-lane result", "after_state": "QSO is template only", "reduction_type": "source boundary preserved"},
              {"sdr_id": "sdr_004", "before_state": "source comparison could happen too soon", "after_state": "comparison blocked until packet parity", "reduction_type": "premature comparison prevented"},
              {"sdr_id": "sdr_005", "before_state": "combined matrix could be built too early", "after_state": "combined matrix blocked until dependency audit", "reduction_type": "premature merge prevented"},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before gap locator"},
              {"gate": "inherited_v4_274_rows_equal_9", "passed": len(inherited_v4_274_rows) == 9, "detail": f"inherited_v4_274_rows = {len(inherited_v4_274_rows)}"},
              {"gate": "candidate_file_summary_rows_equal_4", "passed": len(candidate_file_summary_rows) == 4, "detail": f"candidate_file_summary_rows = {len(candidate_file_summary_rows)}"},
              {"gate": "qso_reference_packet_rows_equal_6", "passed": len(qso_reference_packet_rows) == 6, "detail": f"qso_reference_packet_rows = {len(qso_reference_packet_rows)}"},
              {"gate": "lane_gap_rows_equal_12", "passed": len(lane_gap_rows) == 12, "detail": f"lane_gap_rows = {len(lane_gap_rows)}"},
