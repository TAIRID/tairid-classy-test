              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_275_lrg_elg_equivalent_residual_packet_gap_locator_with_scope_guards_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

