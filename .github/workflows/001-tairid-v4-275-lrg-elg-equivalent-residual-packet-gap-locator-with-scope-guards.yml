              {"gate": "lane_action_plan_rows_equal_4", "passed": len(lane_action_plan_rows) == 4, "detail": f"lane_action_plan_rows = {len(lane_action_plan_rows)}"},
              {"gate": "scope_guard_rows_equal_5", "passed": len(scope_guard_rows) == 5, "detail": f"scope_guard_rows = {len(scope_guard_rows)}"},
              {"gate": "readiness_rows_equal_5", "passed": len(readiness_rows) == 5, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "blocked_operation_rows_equal_7", "passed": len(blocked_operation_rows) == 7, "detail": f"blocked_operation_rows = {len(blocked_operation_rows)}"},
              {"gate": "permission_rows_equal_10", "passed": len(permission_rows) == 10, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "sdr_reduction_rows_equal_5", "passed": len(sdr_reduction_rows) == 5, "detail": f"sdr_reduction_rows = {len(sdr_reduction_rows)}"},
              {"gate": "lrg_gaps_present", "passed": sum(1 for row in lane_gap_rows if row["source_lane"] == "LRG") == 6, "detail": "LRG six packet gaps present"},
              {"gate": "elg_gaps_present", "passed": sum(1 for row in lane_gap_rows if row["source_lane"] == "ELG") == 6, "detail": "ELG six packet gaps present"},
              {"gate": "lrg_templates_present", "passed": sum(1 for row in equivalent_packet_template_rows if row["source_lane"] == "LRG") == 8, "detail": "LRG eight template fields present"},
              {"gate": "elg_templates_present", "passed": sum(1 for row in equivalent_packet_template_rows if row["source_lane"] == "ELG") == 8, "detail": "ELG eight template fields present"},
              {"gate": "qso_template_target_ready", "passed": all(row["status"] != "missing" for row in qso_reference_packet_rows), "detail": "QSO template target ready"},
              {"gate": "all_scope_guards_active", "passed": all(row["status"] == "active" for row in scope_guard_rows), "detail": "scope guards active"},
              {"gate": "all_blocked_operations_blocked", "passed": all(row["blocked"] is True for row in blocked_operation_rows), "detail": "blocked operations guarded"},
              {"gate": "candidate_scan_completed_leads_only", "passed": any(row["permission_scope"] == "candidate_file_scan" and row["permission_status"] == "completed_leads_only" for row in permission_rows), "detail": "candidate scan leads only"},
              {"gate": "gap_locator_completed", "passed": any(row["permission_scope"] == "LRG_ELG_gap_locator" and row["permission_status"] == "completed_no_scoring" for row in permission_rows), "detail": "gap locator complete"},
              {"gate": "template_builder_allowed_next", "passed": any(row["permission_scope"] == "equivalent_packet_template_builder" and row["permission_status"] == "allowed_next" for row in permission_rows), "detail": "template builder allowed next"},
