              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "p_value_likelihood_blocked", "passed": any(row["permission_scope"] == "p_value_or_likelihood" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "p-value/likelihood blocked"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric fit blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "template_builder_route_recommended", "passed": any(row["route"] == "lrg_elg_equivalent_residual_packet_template_builder_with_scope_guards" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "v4.276 route recommended"},
              {"gate": "source_comparison_not_activated", "passed": any(row["test_id"] == "v4_276_source_comparison_residual_guard" and row["activated"] is False for row in next_rows), "detail": "source comparison not activated"},
