              residual_vector.to_csv(outdir / "v4_389_residual_vector_input_preserved_NO_SUPPORT.csv", index=False)
              rules389.to_csv(outdir / "v4_389_rule_checks.csv", index=False)

              summary_md = f"""# TAIRID v4.390 External AI Audit Packet — Covariance-Corrected Diagnostic, No Support Claims

          Expected result: `{summary390["expected_result"]}`

          {summary390["rules_passed"]} / {summary390["rules_total"]} rules passed

          failed_gates = {summary390["failed_gates"]}

          prior_guarded_diagonal_chi_square_sum = {diag_chi}

          full_covariance_chi_square_dry_run_sum = {full_chi}

          full_minus_diagonal_chi_square_difference = {diff_chi}

          full_to_diagonal_chi_square_ratio = {ratio_chi}

          approved_observable_family = `{summary389["approved_observable_family"]}`

          approved_subblock_value_rows = {summary389["approved_subblock_value_rows"]}

          residual_vector_rows = {summary389["residual_vector_rows"]}

          degrees_of_freedom_candidate = {summary389["degrees_of_freedom_candidate"]}

          covariance_subblock_values_loaded = true

          full_9x9_covariance_values_loaded = false

          full_covariance_chi_square_computed = true

          chi_square_computed = true

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step creates the external AI audit packet for the covariance-corrected diagnostic.

          It does **not** compute likelihood or p-values.

          It does **not** validate a score.

          It does **not** make support claims.

          Next route: `{summary390["selected_next_route"]}`
          """
              (outdir / "v4_390_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      if p.is_file():
                          z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary390, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()

          PY

          python -m py_compile run_v4_390_external_ai_audit_packet_covariance_corrected_diagnostic_no_support.py

