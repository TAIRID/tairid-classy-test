                  {"stage": "v4.387", "status": "completed_guarded", "what_happened": "Observed row order passed for z0.38, z0.51, z0.61.", "truth_boundary": "No scoring."},
                  {"stage": "v4.388", "status": "completed_guarded", "what_happened": "Human guarded choice selected dM_Hz_fsig as the first covariance subblock.", "truth_boundary": "No chi-square yet."},
