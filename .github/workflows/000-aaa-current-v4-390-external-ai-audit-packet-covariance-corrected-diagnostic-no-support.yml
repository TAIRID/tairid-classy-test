              rule_checks = pd.DataFrame([{"gate": k, "passed": bool(v)} for k, v in hard_checks.items()])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary390["rules_passed"] = int(rule_checks["passed"].sum())
              summary390["rules_total"] = int(len(rule_checks))
              summary390["failed_gates"] = "none" if not failed else "|".join(failed)

              # New audit packet files.
              (outdir / "EXTERNAL_AI_AUDIT_README_v4_390.md").write_text(readme)
