                  "minimum_covariance_eigenvalue_positive": float(summary389.get("minimum_covariance_eigenvalue")) > 0,
                  "covariance_subblock_values_loaded_true": summary389.get("covariance_subblock_values_loaded") is True,
                  "full_9x9_covariance_values_loaded_false": summary389.get("full_9x9_covariance_values_loaded") is False,
                  "full_covariance_chi_square_computed_true": summary389.get("full_covariance_chi_square_computed") is True,
                  "chi_square_computed_true": summary389.get("chi_square_computed") is True,
                  "likelihood_computed_false": summary389.get("likelihood_computed") is False,
