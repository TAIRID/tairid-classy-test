                  {"stage": "v4.369-v4.376", "status": "completed", "what_happened": "Full-covariance repair lane located and staged official source candidates.", "truth_boundary": "No covariance values loaded."},
                  {"stage": "v4.377", "status": "completed", "what_happened": "Official archives were fetched and archive members were listed.", "truth_boundary": "No member contents used for scoring."},
                  {"stage": "v4.379-v4.382", "status": "completed_guarded", "what_happened": "9x9 shape and interleaved f_sigma8 mapping were selected.", "truth_boundary": "No subblock extraction or scoring."},
                  {"stage": "v4.385", "status": "completed_guarded", "what_happened": "Two candidate final-consensus 3x3 f_sigma8 subblocks were extracted in dry-run mode.", "truth_boundary": "No scoring, no support."},
