name: "!!! AAA CURRENT - TAIRID v4.390 external AI audit packet covariance corrected diagnostic no support"

on:
  workflow_dispatch:

jobs:
  run-v4-390-external-ai-audit-packet-covariance-corrected-diagnostic-no-support:
    name: "!!! AAA CURRENT - Run v4.390 external AI audit packet"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.389 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.389 output ZIP by pattern..."
          INPUT_389_ZIP="$(ls tairid-v4-389-full-covariance-chi-square-dry-run-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_389_ZIP" ]; then
            echo "Could not find v4.389 output ZIP."
            echo "Expected:"
            echo "tairid-v4-389-full-covariance-chi-square-dry-run-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.389 ZIP:"
          echo "$INPUT_389_ZIP"
          echo "INPUT_389_ZIP=$INPUT_389_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.390 external audit packet script
        run: |
          cat > run_v4_390_external_ai_audit_packet_covariance_corrected_diagnostic_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd
          import math

          CLAIM_BOUNDARY = "external AI audit packet for covariance-corrected diagnostic only; full-covariance chi-square dry-run may be audited; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def near(value, target, tol=1e-12):
              try:
                  return abs(float(value) - float(target)) <= tol
              except Exception:
                  return False

          def main():
              input_389 = Path(os.environ["INPUT_389_ZIP"])

              outdir = Path("tairid_v4_390_external_ai_audit_packet_covariance_corrected_diagnostic_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base389 = extract_zip(input_389, "tairid_v4_390_389_")

              summary389_path = find_one(base389, "v4_389_summary.json")
              approved_values_path = find_one(base389, "v4_389_approved_covariance_subblock_values_USED_FOR_DRY_RUN_NO_SUPPORT.csv")
              audit_staging_path = find_one(base389, "v4_389_audit_staging_packet_NO_SUPPORT.csv")
              comparison_path = find_one(base389, "v4_389_comparison_against_guarded_diagonal_NO_SUPPORT.csv")
              dry_summary_path = find_one(base389, "v4_389_full_covariance_chi_square_dry_run_summary_NO_SUPPORT.csv")
              dry_terms_path = find_one(base389, "v4_389_full_covariance_chi_square_dry_run_terms_NO_SUPPORT.csv")
              gap389_path = find_one(base389, "v4_389_gap_status_after_full_covariance_dry_run.csv")
              diagonal_terms_path = find_one(base389, "v4_389_input_v4_366_diagonal_terms_preserved.csv")
              approved_guarded_path = find_one(base389, "v4_389_input_v4_388_approved_guarded_subblock_preserved.csv")
              approved_subblock_values_path = find_one(base389, "v4_389_input_v4_388_approved_subblock_values_preserved.csv")
              inverse_cov_path = find_one(base389, "v4_389_inverse_covariance_subblock_matrix_NO_SUPPORT.csv")
              limitations389_path = find_one(base389, "v4_389_limitations_after_full_covariance_dry_run.csv")
              residual_vector_path = find_one(base389, "v4_389_residual_vector_input_preserved_NO_SUPPORT.csv")
              rules389_path = find_one(base389, "v4_389_rule_checks.csv")

              summary389 = json.loads(summary389_path.read_text())
              approved_values = pd.read_csv(approved_values_path)
              audit_staging = pd.read_csv(audit_staging_path)
              comparison = pd.read_csv(comparison_path)
              dry_summary = pd.read_csv(dry_summary_path)
              dry_terms = pd.read_csv(dry_terms_path)
              gap389 = pd.read_csv(gap389_path)
              diagonal_terms = pd.read_csv(diagonal_terms_path)
              approved_guarded = pd.read_csv(approved_guarded_path)
              approved_subblock_values = pd.read_csv(approved_subblock_values_path)
              inverse_cov = pd.read_csv(inverse_cov_path)
              limitations389 = pd.read_csv(limitations389_path)
              residual_vector = pd.read_csv(residual_vector_path)
              rules389 = pd.read_csv(rules389_path)

              full_chi = float(summary389["full_covariance_chi_square_dry_run_sum"])
              diag_chi = float(summary389["prior_guarded_diagonal_chi_square_sum"])
              diff_chi = float(summary389["full_minus_diagonal_chi_square_difference"])
              ratio_chi = float(summary389["full_to_diagonal_chi_square_ratio"])

              audit_questions = pd.DataFrame([
                  {
                      "audit_question_id": "AI_AUDIT_001",
                      "question": "Did v4.389 preserve the truth boundary?",
                      "expected_answer": "Yes. It is a covariance-corrected chi-square dry run only; no likelihood, no p-values, score_valid=false, support_allowed=false.",
                      "evidence_files": "v4_389_summary.json|v4_389_limitations_after_full_covariance_dry_run.csv|v4_389_rule_checks.csv",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_002",
                      "question": "Was an approved 3x3 f_sigma8 covariance subblock used?",
                      "expected_answer": "Yes. One guarded dM_Hz_fsig subblock was selected in v4.388 and nine subblock values were used for the v4.389 dry run.",
                      "evidence_files": "v4_389_input_v4_388_approved_guarded_subblock_preserved.csv|v4_389_approved_covariance_subblock_values_USED_FOR_DRY_RUN_NO_SUPPORT.csv",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_003",
                      "question": "Was the full 9x9 covariance matrix loaded?",
                      "expected_answer": "No. full_9x9_covariance_values_loaded=false and full_covariance_values_loaded=false.",
                      "evidence_files": "v4_389_summary.json",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_004",
                      "question": "What covariance-corrected chi-square dry-run value was computed?",
                      "expected_answer": f"{full_chi}",
                      "evidence_files": "v4_389_summary.json|v4_389_full_covariance_chi_square_dry_run_summary_NO_SUPPORT.csv",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_005",
                      "question": "How does the covariance-corrected dry run compare to the prior guarded diagonal diagnostic?",
                      "expected_answer": f"Prior diagonal chi-square={diag_chi}; full-covariance dry-run chi-square={full_chi}; difference={diff_chi}; ratio={ratio_chi}.",
                      "evidence_files": "v4_389_comparison_against_guarded_diagonal_NO_SUPPORT.csv|v4_389_summary.json",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_006",
