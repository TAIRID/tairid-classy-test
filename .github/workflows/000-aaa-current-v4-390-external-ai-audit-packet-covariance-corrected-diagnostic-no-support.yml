                  "all_dry_terms_score_invalid": false_col(dry_terms, "score_valid"),
                  "all_dry_terms_no_support": false_col(dry_terms, "support_allowed"),
                  "all_subblock_values_no_support": false_col(approved_values, "support_allowed"),
