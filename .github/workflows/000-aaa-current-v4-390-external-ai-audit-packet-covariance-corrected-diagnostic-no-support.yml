                      "evidence_files": "v4_389_summary.json|v4_390_ruled_out_and_open_gaps.csv",
                  },
                  {
                      "audit_question_id": "AI_AUDIT_009",
                      "question": "What is the strongest honest conclusion allowed?",
                      "expected_answer": "A covariance-corrected chi-square dry run was computed for the three BOSS DR12 f_sigma8 residuals using the approved 3x3 dM_Hz_fsig covariance subblock. The result is audit-ready but remains no-likelihood, no-p-value, score_invalid, and no-support.",
