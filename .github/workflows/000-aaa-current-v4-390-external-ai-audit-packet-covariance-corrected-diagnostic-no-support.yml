                  },
                  {
                      "finding_id": "V4_390_FINDING_005",
                      "finding": "Likelihood and p-values were not computed.",
                      "value": "likelihood=false;p_values=false",
                      "interpretation": "Truth boundary preserved.",
                      "support_allowed": False,
                  },
                  {
                      "finding_id": "V4_390_FINDING_006",
                      "finding": "score_valid remains false.",
                      "value": "score_valid=false",
