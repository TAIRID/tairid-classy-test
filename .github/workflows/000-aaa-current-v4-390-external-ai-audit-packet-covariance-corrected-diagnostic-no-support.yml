                      "expected_answer": "This is still a guarded three-row diagnostic. It uses a selected 3x3 subblock rather than a full likelihood, does not compute p-values, does not validate score_valid, and cannot support TAIRID claims without further audit and interpretation gates.",
                      "evidence_files": "EXTERNAL_AI_AUDIT_README_v4_390.md|v4_390_ruled_out_and_open_gaps.csv",
                  },
              ])

              findings = pd.DataFrame([
                  {
                      "finding_id": "V4_390_FINDING_001",
