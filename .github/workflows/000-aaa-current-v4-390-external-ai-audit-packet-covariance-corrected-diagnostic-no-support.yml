                  {"stage": "v4.345B-v4.347", "status": "completed", "what_happened": "Parameter values and numeric baseline were approved.", "truth_boundary": "No observed support claim."},
                  {"stage": "v4.356-v4.357", "status": "completed", "what_happened": "Three BOSS DR12 observed f_sigma8 rows were loaded.", "truth_boundary": "No scoring claim."},
                  {"stage": "v4.364-v4.366", "status": "completed_guarded", "what_happened": "Guarded diagonal chi-square diagnostic computed.", "truth_boundary": "Diagonal-only; no support."},
