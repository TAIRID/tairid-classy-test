name: 001 TAIRID v4.252 - DR14 QSO Covariance Supplement Locator

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-252-dr14-qso-covariance-supplement-locator.yml"
      - "data/cosmology/qso_literature_extraction_manifest.csv"
      - "qso_literature_extraction_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  dr14-qso-covariance-supplement-locator:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.252 DR14 QSO Covariance Supplement Locator is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.252 DR14 QSO covariance supplement locator
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import json
          import re
          import zipfile

          VERSION = "v4.252"
          ROUTE = "dr14_qso_covariance_supplement_locator_after_v4_251"
          EXPECTED_RESULT = "v4_252_dr14_qso_covariance_supplement_locator_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_253_zhao_tomographic_table_extraction_guard_or_handoff"

          OUT = Path("tairid_v4_252_dr14_qso_covariance_supplement_locator_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-252-dr14-qso-covariance-supplement-locator-output.zip"

