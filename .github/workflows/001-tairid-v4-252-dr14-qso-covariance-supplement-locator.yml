          REQUIRED_EXTRACTION_COLUMNS = [
              "extraction_id",
              "candidate_id",
              "paper_or_source_url",
              "measurement_label",
              "redshift",
              "observable",
              "observed_value",
              "uncertainty_or_covariance_reference",
              "data_vector_reference",
              "source_role",
              "provenance_status",
              "extraction_status",
              "approval_status",
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          KEYWORD_PATTERNS = [
              "covariance",
              "likelihood",
              "full covariance",
              "data vector",
              "supplement",
              "ancillary",
              "f\\s*\\sigma",
              "fsigma",
              "redshift-space",
              "redshift space",
              "RSD",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def safe_float(value):
              try:
                  return float(value)
              except Exception:
                  return None

          def is_placeholder(value):
              text = str(value or "").strip().lower()
              return (
                  not text
                  or text.startswith("put_")
                  or "put_" in text
                  or text.startswith("do_not_fill")
                  or text in ["todo", "none", "na", "n/a", "template_not_filled"]
              )

          def fetch_text(url, timeout=25, max_bytes=300000):
              try:
                  req = Request(url, headers={"User-Agent": "TAIRID-v4.252-covariance-locator"})
                  with urlopen(req, timeout=timeout) as response:
                      status = f"http_{response.status}"
                      content_type = response.headers.get("content-type", "")
                      content_length = response.headers.get("content-length", "")
                      raw = response.read(max_bytes)
                      text = raw.decode("utf-8", errors="replace")
                      return status, content_type, content_length, text, ""
              except Exception as exc:
                  return "probe_failed", "", "", "", f"{type(exc).__name__}: {exc}"

          def keyword_summary(text):
              lowered = text.lower()
              out = {}
              for pattern in KEYWORD_PATTERNS:
                  try:
                      out[pattern] = len(re.findall(pattern.lower(), lowered))
                  except re.error:
                      out[pattern] = lowered.count(pattern.lower())
              return out

