              "locked_orientation": CHUNKING_CONTRACT["locked_orientation"],
              "solver_probe_step_count": len(solver_probe_steps),
              "run_CAMB_now": False,
              "weighted_mean_computed": False,
              "weighted_covariance_matrix_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "final_RSD_pressure_score_computed": False
          }

          if UPSTREAM_LOCKS["v4_94_bounded_larger_sample_parser_probe"]["valid_sample_row_count"] != len(SAMPLE_PACKETS):
              failed_gates.append("sample_packet_count_mismatch_with_upstream")

          if UPSTREAM_LOCKS["v4_94_bounded_larger_sample_parser_probe"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          if CHUNKING_CONTRACT["locked_orientation"] != "reversed_raw_order":
              failed_gates.append("locked_orientation_not_reversed_raw_order")

          if len(SAMPLE_PACKETS) != 64:
              failed_gates.append("sample_packet_count_not_64")

          if len(chunk_plan_records) != 4:
              failed_gates.append("chunk_count_not_4")

          if any(row["chunk_sample_count"] > CHUNKING_CONTRACT["max_solver_samples_per_chunk"] for row in chunk_plan_records):
              failed_gates.append("chunk_size_exceeds_limit")

          if weight_sum <= 0:
              failed_gates.append("sample_weight_sum_not_positive")

          if effective_sample_size_preview < 32:
              failed_gates.append("effective_sample_size_preview_below_32")

          if not design_summary["all_sample_weights_positive"]:
              failed_gates.append("not_all_sample_weights_positive")

          if not design_summary["all_sample_loglike_finite"]:
              failed_gates.append("not_all_loglike_values_finite")

          if not design_summary["all_sample_primary_values_plausible"]:
              failed_gates.append("not_all_primary_values_plausible")

          if len(camb_input_contract_records) != len(SAMPLE_PACKETS):
              failed_gates.append("camb_input_contract_count_mismatch")

          if len(OUTPUT_VECTOR_SCHEMA) != 10:
              failed_gates.append("output_vector_dimension_not_10")

          if len(solver_probe_steps) < 7:
              failed_gates.append("solver_probe_steps_incomplete")

          if solver_probe_contract["run_CAMB_now"] is not False:
              failed_gates.append("CAMB_run_allowed_too_early")

          if solver_probe_contract["compute_weighted_mean_now"] is not False:
              failed_gates.append("weighted_mean_computed_too_early")

          if solver_probe_contract["compute_covariance_now"] is not False:
              failed_gates.append("covariance_computed_too_early")

          if solver_probe_contract["compute_reference_uncertainty_now"] is not False:
              failed_gates.append("reference_uncertainty_computed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "weighted covariance matrix was computed in v4.95",
              "weighted posterior mean vector was computed in v4.95",
              "final rsd pressure score",
              "validates tairid cosmology",
              "64-sample solver design is enough for final rsd pressure",
              "next chunked solver probe will be final planck covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "larger_sample_microbatch_solver_design_passed_ready_for_chunked_larger_sample_solver_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_larger_sample_parser_carried",
                  "pass": UPSTREAM_LOCKS["v4_94_bounded_larger_sample_parser_probe"]["valid_sample_row_count"] == 64,
                  "result": "64 bounded sample packets carried from v4.94",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "sample_packet_validation_passed",
                  "pass": design_summary["all_future_camb_packets_ready"],
                  "result": "all sample weights, loglike values, and primary values are usable for a future solver probe",
                  "boundary": "No CAMB run."
              },
              {
                  "rule_id": "effective_sample_size_preview_ok",
                  "pass": effective_sample_size_preview >= 32,
                  "result": f"effective_sample_size_preview={effective_sample_size_preview}",
                  "boundary": "Quality preview only, not final posterior support."
              },
              {
                  "rule_id": "chunk_plan_declared",
                  "pass": len(chunk_plan_records) == 4 and all(row["chunk_sample_count"] <= 16 for row in chunk_plan_records),
                  "result": f"{len(chunk_plan_records)} chunks declared with max size 16",
                  "boundary": "Execution planning only."
              },
              {
                  "rule_id": "camb_input_contract_declared",
                  "pass": len(camb_input_contract_records) == len(SAMPLE_PACKETS),
                  "result": f"{len(camb_input_contract_records)} per-sample CAMB input contracts declared",
                  "boundary": "Input contract only."
              },
              {
                  "rule_id": "orientation_lock_carried",
                  "pass": CHUNKING_CONTRACT["locked_orientation"] == "reversed_raw_order",
                  "result": "future raw CAMB arrays must be reversed before vectorization",
                  "boundary": "Orientation only."
              },
              {
                  "rule_id": "output_vector_schema_declared",
                  "pass": len(OUTPUT_VECTOR_SCHEMA) == 10,
                  "result": "10-dimensional sigma8z/fsigma8 target vector declared",
                  "boundary": "No output vectors computed."
              },
              {
                  "rule_id": "solver_probe_steps_declared",
                  "pass": len(solver_probe_steps) >= 7,
                  "result": f"{len(solver_probe_steps)} solver probe steps declared",
                  "boundary": "Next workflow only."
              },
              {
                  "rule_id": "CAMB_run_still_blocked",
                  "pass": solver_probe_contract["run_CAMB_now"] is False,
                  "result": "chunked larger sample solver run blocked until v4.96",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "weighted_mean_and_covariance_still_blocked",
                  "pass": solver_probe_contract["compute_weighted_mean_now"] is False and solver_probe_contract["compute_covariance_now"] is False,
                  "result": "weighted mean and covariance not computed",
                  "boundary": "No reference uncertainty."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_95_rules_passed")

          if failed_gates:
              readiness_label = "larger_sample_microbatch_solver_design_failed"
              next_allowed_step = "Repair the larger sample solver design before running any chunked CAMB probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.96 chunked larger sample solver probe. "
                  "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_valid_sample_row_count": UPSTREAM_LOCKS["v4_94_bounded_larger_sample_parser_probe"]["valid_sample_row_count"],
              "sample_packet_count": len(SAMPLE_PACKETS),
              "weight_sum_preview": weight_sum,
              "effective_sample_size_preview": effective_sample_size_preview,
              "all_sample_weights_positive": design_summary["all_sample_weights_positive"],
              "all_sample_loglike_finite": design_summary["all_sample_loglike_finite"],
              "all_sample_primary_values_plausible": design_summary["all_sample_primary_values_plausible"],
              "all_future_camb_packets_ready": design_summary["all_future_camb_packets_ready"],
              "camb_input_contract_count": len(camb_input_contract_records),
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "output_vector_dimension": len(OUTPUT_VECTOR_SCHEMA),
              "locked_orientation": CHUNKING_CONTRACT["locked_orientation"],
              "chunk_count": len(chunk_plan_records),
              "chunk_size": CHUNKING_CONTRACT["recommended_chunk_size"],
              "solver_probe_step_count": len(solver_probe_steps),
              "CAMB_run": False,
              "sample_output_vectors_computed": False,
              "weighted_mean_vector_computed": False,
              "weighted_covariance_matrix_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "target_redshifts": TARGET_REDSHIFTS,
              "sample_packets": SAMPLE_PACKETS,
              "chunking_contract": CHUNKING_CONTRACT,
              "output_vector_schema": OUTPUT_VECTOR_SCHEMA,
              "sample_validation_records": sample_validation_records,
              "camb_input_contract_records": camb_input_contract_records,
              "chunk_plan_records": chunk_plan_records,
              "solver_probe_contract": solver_probe_contract,
              "solver_probe_steps": solver_probe_steps,
              "design_summary": design_summary,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "sample_packet_count": len(SAMPLE_PACKETS),
                  "chunk_count": len(chunk_plan_records),
                  "effective_sample_size_preview": effective_sample_size_preview,
                  "CAMB_run": False,
                  "sample_output_vectors_computed": False,
                  "weighted_mean_vector_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_95_larger_sample_microbatch_solver_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "sample_validation_records_v4_95.csv",
              sample_validation_records,
              [
                  "sample_number",
                  "source_line_number",
                  "sample_weight",
                  "normalized_weight_preview",
                  "minus_loglike_or_proxy",
                  "row_column_count",
                  "weight_positive_finite",
                  "minus_loglike_finite",
                  "primary_values_plausible",
                  "future_camb_packet_ready",
                  "validation_scope"
              ]
          )

          write_csv(
              OUTDIR / "camb_input_contract_records_v4_95.csv",
              camb_input_contract_records,
              [
                  "sample_number",
                  "chunk_number",
                  "H0",
                  "ombh2",
                  "omch2",
                  "cosmomc_theta",
                  "tau",
                  "omk",
                  "mnu",
                  "As",
                  "ns",
                  "redshifts",
                  "kmax",
                  "nonlinear",
                  "locked_output_orientation",
                  "run_allowed_now",
                  "contract_scope"
              ]
          )

          write_csv(
              OUTDIR / "chunk_plan_records_v4_95.csv",
              chunk_plan_records,
              [
                  "chunk_number",
                  "sample_start",
                  "sample_end",
                  "chunk_sample_count",
                  "chunk_weight_sum",
                  "chunk_weight_min",
                  "chunk_weight_max",
                  "run_allowed_now",
                  "chunk_scope"
              ]
          )

          write_csv(
              OUTDIR / "output_vector_schema_v4_95.csv",
              OUTPUT_VECTOR_SCHEMA,
              ["position", "quantity", "z", "target_name"]
          )

          write_csv(
              OUTDIR / "solver_probe_steps_v4_95.csv",
              solver_probe_steps,
              ["step", "action", "output", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_95.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_95.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_95.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.95 — Larger Sample Microbatch Solver Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.94 parsed 64 bounded Planck chain sample packets with weights and primary CAMB inputs.")
          md.append("")
          md.append("v4.95 designs the next controlled solver probe: run those 64 sample packets through CAMB in four chunks of 16, reverse the raw output arrays using the locked orientation, and write one 10-dimensional sigma8z/fsigma8 target vector per sample.")
          md.append("")
          md.append("This does not run CAMB, compute weighted means, compute covariance, compute Planck reference uncertainty, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## Design summary")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in design_summary.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Chunk plan")
          md.append("")
          md.append("| Chunk | Samples | Count | Weight sum |")
          md.append("|---:|---|---:|---:|")
          for row in chunk_plan_records:
              md.append(f"| `{row['chunk_number']}` | `{row['sample_start']}–{row['sample_end']}` | `{row['chunk_sample_count']}` | `{row['chunk_weight_sum']}` |")
          md.append("")
          md.append("## Output vector schema")
          md.append("")
          md.append("| Position | z | Quantity | Target |")
          md.append("|---:|---:|---|---|")
          for row in OUTPUT_VECTOR_SCHEMA:
              md.append(f"| `{row['position']}` | `{row['z']}` | `{row['quantity']}` | `{row['target_name']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_95_larger_sample_microbatch_solver_design.json",
              "tairid_v4_95_larger_sample_microbatch_solver_design.md",
              "sample_validation_records_v4_95.csv",
              "camb_input_contract_records_v4_95.csv",
              "chunk_plan_records_v4_95.csv",
              "output_vector_schema_v4_95.csv",
              "solver_probe_steps_v4_95.csv",
              "blocked_claims_v4_95.csv",
              "next_route_options_v4_95.csv",
              "rule_results_v4_95.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_95_larger_sample_microbatch_solver_design.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

