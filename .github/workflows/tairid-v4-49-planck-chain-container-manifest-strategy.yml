name: TAIRID v4.49 Planck Chain Container Manifest Strategy

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-49-planck-chain-container-manifest-strategy.yml"

jobs:
  tairid-v4-49-planck-chain-container-manifest-strategy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.49 Planck chain container manifest strategy
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_49_planck_chain_container_manifest_strategy

          python - <<'PY'
          import csv
          import json
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_49_planck_chain_container_manifest_strategy")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_49_planck_chain_container_manifest_strategy"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run Planck likelihoods.",
              "This does not download the full Planck cosmology chain zip.",
              "This does not import Planck chains.",
              "This does not select an internal Planck chain member.",
              "This does not propagate Planck posterior uncertainty into f_sigma8.",
              "This does not compute a final RSD pressure score.",
              "This only audits whether a safe manifest-inspection strategy is available for the Planck full-grid container.",
              "A pass means the manifest strategy is bounded, not that Planck reference uncertainty has been included."
          ]

          CARRIED_FROM_V4_48 = {
              "container_file": "COM_CosmoParams_fullGrid_R3.01.zip",
              "container_role": "cosmological_parameters_full_grid_container",
              "container_url": "http://pla.esac.esa.int/pla/aio/product-action?COSMOLOGY.FILE_ID=COM_CosmoParams_fullGrid_R3.01.zip",
              "v4_48_status": "full_grid_container_declared_seen_or_probe_accessible_ready_for_manifest_strategy",
              "full_download_performed_v4_48": False,
              "internal_chain_member_selected_v4_48": False,
              "Planck_chains_imported_v4_48": False,
              "reference_uncertainty_included_v4_48": False
          }

          CARRIED_RSD_STATUS = [
              {
                  "lane_id": "BOSS_DR12",
                  "status": "BOSS_only_covariance_preview_nonfinal",
                  "from_test": "v4_37",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "eBOSS_LRG_QSO",
                  "status": "partial_covariance_preview_nonfinal",
                  "from_test": "v4_44",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "eBOSS_ELG",
                  "status": "grid_likelihood_parser_needed_or_parked",
                  "from_test": "v4_43",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "WiggleZ",
                  "status": "formally_nonfinal_unresolved_after_locator_retry",
                  "from_test": "v4_46",
                  "blocks_final_RSD_claim": True
              },
              {
                  "lane_id": "Planck_reference_uncertainty",
                  "status": "container_located_but_manifest_not_inspected",
                  "from_test": "v4_48",
                  "blocks_final_RSD_claim": True
              }
          ]

          TARGET_CHAIN_FAMILIES = [
              {
                  "target_id": "base_lcdm_TTTEEE_lowE_lensing",
                  "wanted_label": "base_plikHM_TTTEEE_lowl_lowE_lensing_or_equivalent",
                  "internal_member_known_now": False,
                  "safe_to_import_now": False
              },
              {
                  "target_id": "base_lcdm_TTTEEE_lowE",
                  "wanted_label": "base_plikHM_TTTEEE_lowl_lowE_or_equivalent",
                  "internal_member_known_now": False,
                  "safe_to_import_now": False
              },
              {
                  "target_id": "base_lcdm_lensing_only",
                  "wanted_label": "lensing_or_equivalent",
                  "internal_member_known_now": False,
                  "safe_to_import_now": False
              }
          ]

          RSD_REFERENCE_TARGETS = [
              {"source": "BOSS_DR12", "z_eff": 0.38},
              {"source": "BOSS_DR12", "z_eff": 0.51},
              {"source": "BOSS_DR12", "z_eff": 0.61},
              {"source": "eBOSS_LRG", "z_eff": 0.70},
              {"source": "eBOSS_ELG", "z_eff": 0.85},
              {"source": "eBOSS_QSO", "z_eff": 1.48},
              {"source": "WiggleZ", "z_eff": 0.44},
              {"source": "WiggleZ", "z_eff": 0.60},
              {"source": "WiggleZ", "z_eff": 0.73}
          ]

          MANIFEST_REQUIREMENTS = [
              {
                  "requirement_id": "container_url_carried_forward",
                  "status": "required_now",
                  "description": "The exact v4.48 Planck full-grid container URL must be carried forward."
              },
              {
                  "requirement_id": "head_probe_recorded",
                  "status": "required_now",
                  "description": "A HEAD-style metadata probe should be attempted and recorded."
              },
              {
                  "requirement_id": "small_front_probe_recorded",
                  "status": "required_now",
                  "description": "A small front-byte probe should check whether the response looks like a zip stream."
              },
              {
                  "requirement_id": "tail_probe_only_if_size_known",
                  "status": "required_now",
                  "description": "A tail probe may only be attempted if content length is known; otherwise use an external manifest or controlled later strategy."
              },
              {
                  "requirement_id": "no_full_download",
                  "status": "required_now",
                  "description": "The total bytes read must stay far below the full zip size."
              },
              {
                  "requirement_id": "no_internal_member_selection",
                  "status": "required_now",
                  "description": "No internal Planck chain member may be selected in this strategy test."
              },
              {
                  "requirement_id": "later_manifest_parser_required",
                  "status": "required_later",
                  "description": "A later test must either inspect a manifest safely or use a verified external manifest/source packet."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "Planck chains were imported.",
              "Planck reference uncertainty is included.",
              "The internal Planck chain member has been selected.",
              "The full Planck cosmology chain zip was downloaded.",
              "The full RSD lane is covariance-aware.",
              "BOSS and eBOSS partial previews can be combined into a final score now.",
              "All growth data point negative.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_50_growth_lane_status_handoff",
                  "purpose": "Write a compact handoff for BOSS, eBOSS, ELG, WiggleZ, and Planck reference uncertainty status.",
                  "must_include": "partial previews, unresolved lanes, Planck container and manifest strategy status, truth boundary.",
                  "must_not_include": "validation claim or final RSD pressure claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_51_Planck_manifest_parser_if_safe",
                  "purpose": "Only if range/tail strategy is safe, inspect the Planck zip manifest without importing chains.",
                  "must_include": "container URL, byte-limit guard, internal member names only, no chain import.",
                  "must_not_include": "reference uncertainty included claim."
              },
              {
                  "priority": 3,
                  "next_test": "v4_52_reference_uncertainty_parser_design",
                  "purpose": "Design the future parser that would turn Planck chain samples into f_sigma8 reference samples.",
                  "must_include": "required columns, weights, redshift targets, covariance across redshifts.",
                  "must_not_include": "actual chain import or final pressure."
              }
          ]

          def int_or_none(value):
              try:
                  if value in ["", None]:
                      return None
                  return int(value)
              except Exception:
                  return None

          def head_probe(url, timeout=60):
              try:
                  request = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={
                          "User-Agent": "Mozilla/5.0 TAIRID-v4.49-Planck-manifest-strategy",
                          "Accept": "application/zip,application/octet-stream,*/*"
                      }
                  )
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      return {
                          "probe_type": "HEAD",
                          "probe_ok": True,
                          "http_status": getattr(response, "status", 200),
                          "final_url": response.geturl(),
                          "content_type": response.headers.get("Content-Type", ""),
                          "content_length_header": response.headers.get("Content-Length", ""),
                          "accept_ranges": response.headers.get("Accept-Ranges", ""),
                          "content_range": response.headers.get("Content-Range", ""),
                          "content_disposition": response.headers.get("Content-Disposition", ""),
                          "range_requested": "",
                          "range_honored": False,
                          "bytes_read": 0,
                          "zip_signature_detected": False,
                          "zip_end_record_detected": False,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "probe_type": "HEAD",
                      "probe_ok": False,
                      "http_status": "",
                      "final_url": "",
                      "content_type": "",
                      "content_length_header": "",
                      "accept_ranges": "",
                      "content_range": "",
                      "content_disposition": "",
                      "range_requested": "",
                      "range_honored": False,
                      "bytes_read": 0,
                      "zip_signature_detected": False,
                      "zip_end_record_detected": False,
                      "error": repr(exc)
                  }

          def range_probe(url, start, end, max_read, label, timeout=60):
              range_header = f"bytes={start}-{end}"
              try:
                  request = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "Mozilla/5.0 TAIRID-v4.49-Planck-range-probe",
                          "Accept": "application/zip,application/octet-stream,*/*",
                          "Range": range_header
                      }
                  )
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(max_read)
                      status = getattr(response, "status", 200)
                      content_range = response.headers.get("Content-Range", "")
                      range_honored = status == 206 or bool(content_range)
                      return {
                          "probe_type": label,
                          "probe_ok": True,
                          "http_status": status,
                          "final_url": response.geturl(),
                          "content_type": response.headers.get("Content-Type", ""),
                          "content_length_header": response.headers.get("Content-Length", ""),
                          "accept_ranges": response.headers.get("Accept-Ranges", ""),
                          "content_range": content_range,
                          "content_disposition": response.headers.get("Content-Disposition", ""),
                          "range_requested": range_header,
                          "range_honored": range_honored,
                          "bytes_read": len(body),
                          "zip_signature_detected": body.startswith(b"PK\\x03\\x04") or body.startswith(b"PK\\x05\\x06") or body.startswith(b"PK\\x07\\x08"),
                          "zip_end_record_detected": (b"PK\\x05\\x06" in body) or (b"PK\\x06\\x06" in body),
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "probe_type": label,
                      "probe_ok": False,
                      "http_status": "",
                      "final_url": "",
                      "content_type": "",
                      "content_length_header": "",
                      "accept_ranges": "",
                      "content_range": "",
                      "content_disposition": "",
                      "range_requested": range_header,
                      "range_honored": False,
                      "bytes_read": 0,
                      "zip_signature_detected": False,
                      "zip_end_record_detected": False,
                      "error": repr(exc)
                  }

          failed_gates = []
          warnings = []

          container_url = CARRIED_FROM_V4_48["container_url"]

          head = head_probe(container_url)
          front = range_probe(container_url, 0, 8191, 8192, "front_range_8kb")

          content_length = int_or_none(head["content_length_header"])
          if content_length is None:
              content_length = int_or_none(front["content_length_header"])

          tail = None
          if content_length is not None and content_length > 0:
              tail_start = max(0, content_length - 65536)
              tail_end = content_length - 1
              tail = range_probe(container_url, tail_start, tail_end, 65536, "tail_range_64kb")
          else:
              tail = {
                  "probe_type": "tail_range_64kb",
                  "probe_ok": False,
                  "http_status": "",
                  "final_url": "",
                  "content_type": "",
                  "content_length_header": "",
                  "accept_ranges": "",
                  "content_range": "",
                  "content_disposition": "",
                  "range_requested": "not_attempted_content_length_unknown",
                  "range_honored": False,
                  "bytes_read": 0,
                  "zip_signature_detected": False,
                  "zip_end_record_detected": False,
                  "error": "content_length_unknown_no_tail_probe_attempted"
              }

          manifest_probe_rows = [head, front, tail]

          total_bytes_read = sum(row["bytes_read"] for row in manifest_probe_rows)
          no_full_download = total_bytes_read <= 80000

          front_zip_signal = front["zip_signature_detected"]
          tail_eocd_signal = tail["zip_end_record_detected"]
          range_support_observed = bool(front["range_honored"] or tail["range_honored"])
          content_length_known = content_length is not None

          if content_length_known and tail["probe_ok"] and tail["range_honored"] and tail_eocd_signal:
              manifest_strategy = "safe_tail_manifest_parser_feasible_later"
              next_strategy_action = "build_limited_zip_central_directory_manifest_parser"
          elif content_length_known and tail["probe_ok"]:
              manifest_strategy = "tail_probe_available_but_zip_end_record_not_confirmed"
              next_strategy_action = "use_cautious_manifest_parser_or_external_manifest_check"
          elif front_zip_signal:
              manifest_strategy = "zip_stream_confirmed_but_manifest_not_safely_reachable_without_size_or_range"
              next_strategy_action = "use_growth_lane_handoff_or_external_manifest_source_packet_before_chain_import"
          else:
              manifest_strategy = "container_probe_bounded_but_zip_manifest_strategy_unresolved"
              next_strategy_action = "do_not_parse_manifest_until_better_headers_or_external_manifest_available"

          manifest_strategy_row = {
              "container_file": CARRIED_FROM_V4_48["container_file"],
              "container_url": container_url,
              "head_probe_ok": head["probe_ok"],
              "front_probe_ok": front["probe_ok"],
              "tail_probe_ok": tail["probe_ok"],
              "content_length_known": content_length_known,
              "content_length": content_length if content_length is not None else "",
              "range_support_observed": range_support_observed,
              "front_zip_signature_detected": front_zip_signal,
              "tail_zip_end_record_detected": tail_eocd_signal,
              "total_bytes_read": total_bytes_read,
              "no_full_download": no_full_download,
              "manifest_strategy": manifest_strategy,
              "next_strategy_action": next_strategy_action,
              "internal_chain_member_selected_now": False,
              "Planck_chains_imported_now": False,
              "reference_uncertainty_included_now": False,
              "final_RSD_pressure_allowed_now": False
          }

          if not container_url:
              failed_gates.append("container_url_not_carried_forward")

          if front["probe_ok"] is not True:
              warnings.append("front_probe_failed_or_blocked")
          if head["probe_ok"] is not True:
              warnings.append("head_probe_failed_or_blocked")
          if content_length_known is not True:
              warnings.append("content_length_unknown_manifest_tail_strategy_limited")
          if range_support_observed is not True:
              warnings.append("range_support_not_confirmed")
          if front_zip_signal is not True:
              warnings.append("zip_signature_not_confirmed_from_front_probe")
          if tail_eocd_signal is not True:
              warnings.append("zip_end_record_not_confirmed")
          if no_full_download is not True:
              failed_gates.append("byte_limit_guard_violation_possible_full_download")
          if manifest_strategy_row["internal_chain_member_selected_now"] is not False:
              failed_gates.append("internal_chain_member_selected_violation")
          if manifest_strategy_row["Planck_chains_imported_now"] is not False:
              failed_gates.append("Planck_chain_import_violation")
          if manifest_strategy_row["reference_uncertainty_included_now"] is not False:
              failed_gates.append("reference_uncertainty_included_violation")
          if manifest_strategy_row["final_RSD_pressure_allowed_now"] is not False:
              failed_gates.append("final_RSD_pressure_allowed_violation")

          for row in TARGET_CHAIN_FAMILIES:
              if row["internal_member_known_now"] is not False:
                  failed_gates.append(row["target_id"] + "_internal_member_claim_violation")
              if row["safe_to_import_now"] is not False:
                  failed_gates.append(row["target_id"] + "_import_allowed_violation")

          if not all(row["blocks_final_RSD_claim"] is True for row in CARRIED_RSD_STATUS):
              failed_gates.append("carried_RSD_boundary_not_preserved")

          required_manifest_ids = {
              "container_url_carried_forward",
              "head_probe_recorded",
              "small_front_probe_recorded",
              "tail_probe_only_if_size_known",
              "no_full_download",
              "no_internal_member_selection",
              "later_manifest_parser_required"
          }
          present_manifest_ids = {row["requirement_id"] for row in MANIFEST_REQUIREMENTS}
          missing_manifest_ids = sorted(required_manifest_ids - present_manifest_ids)
          for missing in missing_manifest_ids:
              failed_gates.append("missing_manifest_requirement_" + missing)

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "planck chains were imported",
              "reference uncertainty is included",
              "internal planck chain member",
              "full planck cosmology chain zip was downloaded",
              "full rsd lane",
              "all growth data point negative",
              "likelihood",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          warnings.append("Planck_manifest_strategy_does_not_download_full_zip")
          warnings.append("Planck_manifest_strategy_does_not_import_chains")
          warnings.append("internal_chain_member_not_selected_yet")
          warnings.append("reference_uncertainty_not_included_yet")
          warnings.append("no_final_RSD_pressure_score")
          warnings.append("not_validation")

          rule_results = [
              {
                  "rule_id": "container_url_carried_forward",
                  "pass": bool(container_url),
                  "result": CARRIED_FROM_V4_48["container_file"],
                  "boundary": "Container URL is not chain import."
              },
              {
                  "rule_id": "head_and_front_probes_recorded",
                  "pass": head["probe_type"] == "HEAD" and front["probe_type"] == "front_range_8kb",
                  "result": f"head_ok={head['probe_ok']}; front_ok={front['probe_ok']}",
                  "boundary": "Small probes only."
              },
              {
                  "rule_id": "tail_probe_guarded_by_content_length",
                  "pass": (content_length_known and tail["range_requested"] != "not_attempted_content_length_unknown") or (not content_length_known and tail["range_requested"] == "not_attempted_content_length_unknown"),
                  "result": f"content_length_known={content_length_known}; tail_probe={tail['range_requested']}",
                  "boundary": "No blind tail read without size."
              },
              {
                  "rule_id": "no_full_download",
                  "pass": no_full_download,
                  "result": f"total_bytes_read={total_bytes_read}",
                  "boundary": "Manifest strategy only."
              },
              {
                  "rule_id": "manifest_strategy_decision_recorded",
                  "pass": bool(manifest_strategy),
                  "result": manifest_strategy,
                  "boundary": "Strategy decision is not manifest extraction."
              },
              {
                  "rule_id": "no_internal_member_or_chain_import",
                  "pass": (
                      manifest_strategy_row["internal_chain_member_selected_now"] is False
                      and manifest_strategy_row["Planck_chains_imported_now"] is False
                      and manifest_strategy_row["reference_uncertainty_included_now"] is False
                  ),
                  "result": "no_internal_member_no_chain_import_no_reference_uncertainty",
                  "boundary": "No Planck posterior used yet."
              },
              {
                  "rule_id": "RSD_boundaries_carried_forward",
                  "pass": all(row["blocks_final_RSD_claim"] is True for row in CARRIED_RSD_STATUS),
                  "result": "BOSS_eBOSS_ELG_WiggleZ_Planck_boundaries_preserved",
                  "boundary": "No final RSD claim."
              },
              {
                  "rule_id": "no_final_score_or_validation",
                  "pass": True,
                  "result": "no_likelihood_no_BIC_no_refit_no_final_pressure_no_validation",
                  "boundary": "Manifest strategy only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_manifest_strategy_rules_passed")

          if failed_gates:
              readiness_label = "Planck_chain_container_manifest_strategy_failed"
              next_step = "Repair manifest strategy guards before handoff or parser design."
          else:
              if manifest_strategy == "safe_tail_manifest_parser_feasible_later":
                  readiness_label = "Planck_chain_container_manifest_strategy_passed_ready_for_limited_manifest_parser_or_growth_lane_handoff"
              else:
                  readiness_label = "Planck_chain_container_manifest_strategy_passed_ready_for_growth_lane_handoff_or_external_manifest_source_packet"
              next_step = (
                  "Proceed to v4.50 growth lane status handoff, or only build a limited manifest parser if the probe strategy is safe. "
                  "Do not download the full zip, import chains, or claim reference uncertainty."
              )

          system_health = {
              "container_file": CARRIED_FROM_V4_48["container_file"],
              "head_probe_ok": head["probe_ok"],
              "front_probe_ok": front["probe_ok"],
              "tail_probe_ok": tail["probe_ok"],
              "content_length_known": content_length_known,
              "content_length": content_length if content_length is not None else "",
              "range_support_observed": range_support_observed,
              "front_zip_signature_detected": front_zip_signal,
              "tail_zip_end_record_detected": tail_eocd_signal,
              "total_probe_bytes_read": total_bytes_read,
              "no_full_download": no_full_download,
              "manifest_strategy": manifest_strategy,
              "internal_chain_member_selected": False,
              "Planck_chains_imported": False,
              "reference_uncertainty_included": False,
              "reference_fsigma8_samples_computed": False,
              "reference_covariance_across_redshift_computed": False,
              "final_RSD_pressure_score_allowed_now": False,
              "full_RSD_covariance_complete": False,
              "likelihood_run": False,
              "BIC_run": False,
              "refit_run": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          interpretation = (
              "v4.49 audits whether the Planck full-grid container can be inspected by a safe manifest strategy. "
              "It records HEAD/front/tail probe status with strict byte limits. "
              "It does not download the full zip, select internal chain members, import chains, or compute Planck reference uncertainty. "
              "If the zip manifest cannot be safely reached by range probes, the correct next move is a growth-lane handoff or an external manifest/source-packet step."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "carried_from_v4_48": CARRIED_FROM_V4_48,
              "carried_rsd_status": CARRIED_RSD_STATUS,
              "target_chain_families": TARGET_CHAIN_FAMILIES,
              "rsd_reference_targets": RSD_REFERENCE_TARGETS,
              "manifest_requirements": MANIFEST_REQUIREMENTS,
              "manifest_probe_rows": manifest_probe_rows,
              "manifest_strategy_row": manifest_strategy_row,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_final_pressure_score_built": False,
                  "full_download_performed": False,
                  "internal_chain_member_selected": False,
