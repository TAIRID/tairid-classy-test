name: 000 TAIRID v4.142 CAMB Install or Stored Chain Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-142-camb-install-or-stored-chain-probe.yml"

jobs:
  tairid-v4-142-camb-install-or-stored-chain-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.142 CAMB install or stored-chain probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_142_camb_install_or_stored_chain_probe

          python - <<'PY'
          import csv
          import importlib
          import json
          import os
          import subprocess
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_142_camb_install_or_stored_chain_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_142_camb_install_or_stored_chain_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run a final CAMB cosmology calculation.",
              "This does not compute new Planck posterior samples.",
              "This does not recompute eBOSS pressure.",
              "This only checks whether CAMB can be imported/installed and whether repository files suggest stored-chain or stored-reference support.",
              "A pass means feasibility status is recorded and the next route is selected, not that CAMB reference values or Planck-chain covariance have been produced."
          ]

          UPSTREAM_LOCKS = {
              "v4_141_eBOSS_covariance_ingestion_or_manual_status_probe": {
                  "readiness_label": "eBOSS_covariance_ingestion_or_manual_status_probe_passed_manual_status_not_filled_covariance_not_ingested_ready_for_CAMB_or_stored_chain_probe",
                  "manual_file_found": False,
                  "ingestion_candidate_count": 0,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "observed_covariance_review_still_needed": True,
                  "same_program_eBOSS_covariance_still_limited": True,
                  "CAMB_run": False,
                  "full_planck_chains_imported": False,
                  "full_planck_chain_sample_files_parsed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_139_LCDM_reference_sensitivity_audit": {
                  "readiness_label": "LCDM_reference_sensitivity_audit_passed_sign_pattern_stable_pressure_magnitude_sensitive_ready_for_eBOSS_covariance_manual_extraction_checklist",
                  "sign_pattern_stable": True,
                  "pressure_magnitude_sensitive": True,
                  "observed_covariance_ingested": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          REPOSITORY_SCAN_POLICY = {
              "scan_root": ".",
              "max_file_records": 200,
              "filename_keywords": [
                  "chain",
                  "chains",
                  "planck",
                  "camb",
                  "class",
                  "fsigma8",
                  "sigma8",
                  "growth",
                  "reference",
                  "cov",
                  "covariance",
                  "lcdm",
                  "bao",
                  "rsd"
              ],
              "candidate_extensions": [
                  ".txt",
                  ".dat",
                  ".csv",
                  ".json",
                  ".yaml",
                  ".yml",
                  ".ini",
                  ".paramnames",
                  ".minimum",
                  ".bestfit",
                  ".covmat",
                  ".fits",
                  ".zip"
              ],
              "excluded_prefixes": [
                  ".git/",
                  "artifacts/",
                  "__pycache__/"
              ],
              "purpose": "Look for existing repository files that could support a stored-chain, stored-reference, CAMB, CLASS, growth, RSD, covariance, or LCDM reference route."
          }

          CAMB_PROBE_POLICY = {
              "initial_import": True,
              "pip_install_attempt_if_missing": True,
              "pip_command": [sys.executable, "-m", "pip", "install", "--no-cache-dir", "camb"],
              "pip_timeout_seconds": 360,
              "post_install_import": True,
              "parameter_initialization_sanity_check": True,
              "final_camb_calculation_allowed": False,
              "claim_boundary": "CAMB availability probe only; no final CAMB reference vector is computed here."
          }

          ROUTE_MEANINGS = [
              {
                  "route_id": "CAMB_reference_vector_design",
                  "allowed_when": "CAMB imports successfully and CAMBparams can be initialized.",
                  "next_action": "Design a bounded CAMB reference-vector workflow for the 12 expanded redshifts.",
                  "boundary": "Still no Planck posterior covariance and no final pressure."
              },
              {
                  "route_id": "stored_chain_or_reference_manual_review",
                  "allowed_when": "CAMB is unavailable but repository candidates suggest stored chains or stored references.",
                  "next_action": "Review candidate files and build a parser only for explicitly identified usable files.",
                  "boundary": "No full-chain claim until files are parsed and verified."
              },
              {
                  "route_id": "manual_reference_package_needed",
                  "allowed_when": "Neither CAMB nor clear stored-chain/reference candidates are available.",
                  "next_action": "Create a small external reference-package request/checklist, then rerun this probe.",
                  "boundary": "No reference upgrade beyond lightweight LCDM approximation."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample rows were parsed.",
              "CAMB produced the final reference vector.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The CAMB install or stored-chain probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "CAMB availability is the same as a Planck posterior covariance.",
              "A stored-chain filename is the same as parsed chain samples.",
              "The eBOSS sign pattern is a final physical conclusion.",
              "Same-program eBOSS covariance is resolved.",
              "Observed covariance review is no longer needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_143_CAMB_reference_vector_design_if_CAMB_available",
                  "purpose": "If CAMB imports and initializes, design a bounded CAMB reference-vector workflow for the 12 expanded redshifts.",
                  "why_next": "This would be stronger than the lightweight LCDM approximation but still not full posterior covariance."
              },
              {
                  "priority": 2,
                  "route_id": "v4_143_stored_chain_or_reference_parser_design_if_candidates_exist",
                  "purpose": "If useful chain/reference candidates exist, design a parser only after the candidate files are identified.",
                  "why_next": "A stored file route may be cleaner than repeated approximation if actual data exists in the repository."
              },
              {
                  "priority": 3,
                  "route_id": "v4_143_external_standard_cosmology_comparison_plan",
                  "purpose": "Prepare cautious comparison language against normal ΛCDM/eBOSS growth work.",
                  "why_next": "The result remains limitation-bound and needs public-language boundaries."
              }
          ]

          failed_gates = []
          warnings = [
              "feasibility_probe_only",
              "CAMB_install_attempt_may_depend_on_GitHub_network",
              "no_final_CAMB_calculation",
              "stored_chain_candidates_not_parsed",
              "covariance_not_ingested",
              "pressure_not_recomputed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def should_exclude(path_string):
              normalized = path_string.replace("\\", "/")
              return any(normalized.startswith(prefix) for prefix in REPOSITORY_SCAN_POLICY["excluded_prefixes"])

          def scan_repository_for_candidate_files():
              keywords = [keyword.lower() for keyword in REPOSITORY_SCAN_POLICY["filename_keywords"]]
              extensions = [ext.lower() for ext in REPOSITORY_SCAN_POLICY["candidate_extensions"]]
              rows = []
              for path in Path(".").rglob("*"):
                  if len(rows) >= REPOSITORY_SCAN_POLICY["max_file_records"]:
                      break
                  if not path.is_file():
                      continue
                  path_string = str(path).replace("\\", "/")
                  if should_exclude(path_string):
                      continue
                  lower = path_string.lower()
                  if not any(keyword in lower for keyword in keywords):
                      continue
                  if path.suffix.lower() and path.suffix.lower() not in extensions:
                      continue
                  try:
                      size_bytes = path.stat().st_size
                  except OSError:
                      size_bytes = ""
                  matched_keywords = [keyword for keyword in keywords if keyword in lower]
                  if any(k in lower for k in ["chain", "planck", "paramnames", "minimum", "bestfit"]):
                      candidate_role = "possible_stored_chain_or_planck_support"
                  elif any(k in lower for k in ["camb", "class", "lcdm"]):
                      candidate_role = "possible_theory_engine_or_reference_support"
                  elif any(k in lower for k in ["fsigma8", "sigma8", "growth", "rsd"]):
                      candidate_role = "possible_growth_reference_or_observation_support"
                  elif any(k in lower for k in ["cov", "covariance"]):
                      candidate_role = "possible_covariance_context"
                  else:
                      candidate_role = "general_candidate"
                  rows.append({
                      "path": path_string,
                      "suffix": path.suffix.lower(),
                      "size_bytes": size_bytes,
                      "matched_keywords": ",".join(matched_keywords),
                      "candidate_role": candidate_role
                  })
              return rows

          def try_import_camb(stage):
              record = {
                  "stage": stage,
                  "ok": False,
                  "camb_version": "",
                  "error": "",
                  "claim_boundary": "import_probe_only_not_final_calculation"
              }
              try:
                  camb = importlib.import_module("camb")
                  record["ok"] = True
                  record["camb_version"] = str(getattr(camb, "__version__", "unknown"))
                  return record, camb
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
                  return record, None

          def try_pip_install_camb():
              record = {
                  "stage": "pip_install_camb",
                  "attempted": True,
                  "ok": False,
                  "returncode": "",
                  "stdout_tail": "",
                  "stderr_tail": "",
                  "error": "",
                  "claim_boundary": "install_probe_only_not_final_calculation"
              }
              try:
                  completed = subprocess.run(
                      CAMB_PROBE_POLICY["pip_command"],
                      text=True,
                      capture_output=True,
                      timeout=CAMB_PROBE_POLICY["pip_timeout_seconds"]
                  )
                  record["returncode"] = completed.returncode
                  record["stdout_tail"] = completed.stdout[-1200:]
                  record["stderr_tail"] = completed.stderr[-1200:]
                  record["ok"] = completed.returncode == 0
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          def try_camb_parameter_sanity(camb):
              record = {
                  "stage": "camb_parameter_initialization_sanity",
                  "attempted": camb is not None,
                  "ok": False,
                  "error": "",
                  "claim_boundary": "CAMBparams initialization only; no final CAMB calculation"
              }
              if camb is None:
                  record["error"] = "CAMB module unavailable"
                  return record
              try:
                  pars = camb.CAMBparams()
                  pars.set_cosmology(H0=67.4, ombh2=0.02237, omch2=0.1200)
                  pars.InitPower.set_params(As=2.1e-9, ns=0.965)
                  pars.set_matter_power(redshifts=[0.0, 0.5, 1.0, 1.48], kmax=2.0)
                  record["ok"] = True
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          repository_candidate_files = scan_repository_for_candidate_files()
          stored_chain_candidate_count = sum(
              1 for row in repository_candidate_files
              if row["candidate_role"] == "possible_stored_chain_or_planck_support"
          )
          stored_reference_candidate_count = sum(
              1 for row in repository_candidate_files
              if row["candidate_role"] in ["possible_theory_engine_or_reference_support", "possible_growth_reference_or_observation_support"]
          )
          covariance_context_candidate_count = sum(
              1 for row in repository_candidate_files
              if row["candidate_role"] == "possible_covariance_context"
          )

          camb_probe_records = []
          initial_record, camb_module = try_import_camb("initial_import_camb")
          camb_probe_records.append(initial_record)

          pip_record = {
              "stage": "pip_install_camb",
              "attempted": False,
              "ok": False,
              "returncode": "",
              "stdout_tail": "",
              "stderr_tail": "",
              "error": "",
              "claim_boundary": "install_not_attempted_because_initial_import_succeeded"
          }

          if not initial_record["ok"] and CAMB_PROBE_POLICY["pip_install_attempt_if_missing"]:
              pip_record = try_pip_install_camb()
          camb_probe_records.append(pip_record)

          post_record = {
              "stage": "post_install_import_camb",
              "ok": initial_record["ok"],
              "camb_version": initial_record["camb_version"],
              "error": "" if initial_record["ok"] else "post-install import not attempted yet",
              "claim_boundary": "import_probe_only_not_final_calculation"
          }

          if not initial_record["ok"]:
              post_record, camb_module = try_import_camb("post_install_import_camb")
          camb_probe_records.append(post_record)

          camb_available_after_attempt = bool(post_record["ok"])
          camb_parameter_sanity_record = try_camb_parameter_sanity(camb_module if camb_available_after_attempt else None)
          camb_probe_records.append(camb_parameter_sanity_record)

          camb_reference_route_available = camb_available_after_attempt and camb_parameter_sanity_record["ok"]
          stored_chain_route_available = stored_chain_candidate_count > 0
          stored_reference_route_available = stored_reference_candidate_count > 0

          if camb_reference_route_available:
              selected_route = "CAMB_reference_vector_design"
              next_allowed_step = (
                  "Proceed to v4.143 CAMB reference-vector design for the 12 expanded redshifts. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )
          elif stored_chain_route_available or stored_reference_route_available:
              selected_route = "stored_chain_or_reference_manual_review"
              next_allowed_step = (
                  "Proceed to v4.143 stored-chain or stored-reference parser design using only identified candidate files. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )
          else:
              selected_route = "manual_reference_package_needed"
              next_allowed_step = (
                  "Create a small external reference-package checklist, then rerun v4.142. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          feasibility_decision_records = [
              {
                  "method_id": "CAMB_reference_vector_design",
                  "available_now": camb_reference_route_available,
                  "evidence": f"camb_available_after_attempt={camb_available_after_attempt}; parameter_sanity={camb_parameter_sanity_record['ok']}",
                  "decision": "selected" if selected_route == "CAMB_reference_vector_design" else "not_selected",
                  "claim_boundary": "CAMB availability only, not final reference vector"
              },
              {
                  "method_id": "stored_chain_or_reference_manual_review",
                  "available_now": stored_chain_route_available or stored_reference_route_available,
                  "evidence": f"stored_chain_candidates={stored_chain_candidate_count}; stored_reference_candidates={stored_reference_candidate_count}",
                  "decision": "selected" if selected_route == "stored_chain_or_reference_manual_review" else "not_selected",
                  "claim_boundary": "candidate filenames only, not parsed chain samples"
              },
              {
                  "method_id": "manual_reference_package_needed",
                  "available_now": True,
                  "evidence": "fallback route always available",
                  "decision": "selected" if selected_route == "manual_reference_package_needed" else "not_selected",
                  "claim_boundary": "manual package route only"
              }
          ]

          final_camb_calculation_run = False
          chain_samples_parsed = False
          covariance_ingested = False
          pressure_recomputed = False
          final_pressure_ready = False

          upstream = UPSTREAM_LOCKS["v4_141_eBOSS_covariance_ingestion_or_manual_status_probe"]

          if upstream["covariance_ingested"] is not False:
              failed_gates.append("upstream_covariance_unexpectedly_ingested")

          if upstream["pressure_recomputed"] is not False:
              failed_gates.append("upstream_pressure_unexpectedly_recomputed")

          if len(camb_probe_records) < 4:
              failed_gates.append("camb_probe_records_incomplete")

          if selected_route not in ["CAMB_reference_vector_design", "stored_chain_or_reference_manual_review", "manual_reference_package_needed"]:
              failed_gates.append("selected_route_invalid")

          if final_camb_calculation_run:
              failed_gates.append("final_camb_calculation_unexpectedly_run")

          if chain_samples_parsed:
              failed_gates.append("chain_samples_unexpectedly_parsed")

          if covariance_ingested:
              failed_gates.append("covariance_unexpectedly_ingested")

          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "camb produced the final reference vector",
              "final rsd pressure score",
              "validates tairid cosmology",
              "camb availability is the same as a planck posterior covariance",
              "a stored-chain filename is the same as parsed chain samples",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "CAMB_install_or_stored_chain_probe_passed_feasibility_status_recorded_ready_for_reference_vector_route_selection"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_manual_status_probe_carried",
                  "pass": upstream["readiness_label"] == "eBOSS_covariance_ingestion_or_manual_status_probe_passed_manual_status_not_filled_covariance_not_ingested_ready_for_CAMB_or_stored_chain_probe",
                  "result": "v4.141 manual-needed boundary carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "repository_scan_completed",
                  "pass": isinstance(repository_candidate_files, list),
                  "result": f"candidate_files={len(repository_candidate_files)}; stored_chain_candidates={stored_chain_candidate_count}; stored_reference_candidates={stored_reference_candidate_count}; covariance_context_candidates={covariance_context_candidate_count}",
                  "boundary": "Filename scan only, not file parsing."
              },
              {
                  "rule_id": "camb_probe_status_recorded",
                  "pass": len(camb_probe_records) >= 4,
                  "result": f"camb_available_after_attempt={camb_available_after_attempt}; camb_parameter_sanity={camb_parameter_sanity_record['ok']}",
                  "boundary": "Install/import feasibility only."
              },
              {
                  "rule_id": "route_selected",
                  "pass": selected_route in ["CAMB_reference_vector_design", "stored_chain_or_reference_manual_review", "manual_reference_package_needed"],
                  "result": selected_route,
                  "boundary": "Route selection only."
              },
              {
                  "rule_id": "final_camb_calculation_not_run",
                  "pass": final_camb_calculation_run is False,
                  "result": "no final CAMB calculation was run",
                  "boundary": "No final reference vector."
              },
              {
                  "rule_id": "chain_samples_not_parsed",
                  "pass": chain_samples_parsed is False,
                  "result": "no full chain sample rows were parsed",
                  "boundary": "No Planck posterior covariance."
              },
              {
                  "rule_id": "covariance_and_pressure_not_computed",
                  "pass": covariance_ingested is False and pressure_recomputed is False,
                  "result": "covariance not ingested and pressure not recomputed",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_142_rules_passed")

          if failed_gates:
              readiness_label = "CAMB_install_or_stored_chain_probe_failed"
              next_allowed_step = "Repair CAMB/stored-chain feasibility probe before continuing."
          else:
              readiness_label = route_decision

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "repository_candidate_file_count": len(repository_candidate_files),
              "stored_chain_candidate_count": stored_chain_candidate_count,
              "stored_reference_candidate_count": stored_reference_candidate_count,
              "covariance_context_candidate_count": covariance_context_candidate_count,
              "camb_available_after_attempt": camb_available_after_attempt,
              "camb_parameter_sanity_ok": camb_parameter_sanity_record["ok"],
              "camb_reference_route_available": camb_reference_route_available,
              "stored_chain_route_available": stored_chain_route_available,
              "stored_reference_route_available": stored_reference_route_available,
              "selected_route": selected_route,
              "final_camb_calculation_run": final_camb_calculation_run,
              "chain_samples_parsed": chain_samples_parsed,
              "covariance_ingested": covariance_ingested,
              "pressure_recomputed": pressure_recomputed,
              "observed_covariance_review_still_needed": True,
              "same_program_eBOSS_covariance_still_limited": True,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "repository_scan_policy": REPOSITORY_SCAN_POLICY,
              "camb_probe_policy": CAMB_PROBE_POLICY,
              "repository_candidate_files": repository_candidate_files,
              "camb_probe_records": camb_probe_records,
              "route_meanings": ROUTE_MEANINGS,
              "feasibility_decision_records": feasibility_decision_records,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "selected_route": selected_route,
                  "camb_available_after_attempt": camb_available_after_attempt,
                  "camb_parameter_sanity_ok": camb_parameter_sanity_record["ok"],
                  "final_camb_calculation_run": False,
                  "chain_samples_parsed": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_142_camb_install_or_stored_chain_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "repository_candidate_files_v4_142.csv",
              repository_candidate_files,
              ["path", "suffix", "size_bytes", "matched_keywords", "candidate_role"]
          )

          write_csv(
              OUTDIR / "camb_probe_records_v4_142.csv",
              camb_probe_records,
              ["stage", "attempted", "ok", "camb_version", "returncode", "stdout_tail", "stderr_tail", "error", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "feasibility_decision_records_v4_142.csv",
              feasibility_decision_records,
              ["method_id", "available_now", "evidence", "decision", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "route_meanings_v4_142.csv",
              ROUTE_MEANINGS,
              ["route_id", "allowed_when", "next_action", "boundary"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_142.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_142.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_142.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.142 — CAMB Install or Stored-Chain Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.142 checks whether the next automated route should be CAMB, stored-chain/stored-reference parsing, or a manual reference package. It does not run a final CAMB calculation, does not parse Planck chain rows, does not ingest covariance, and does not recompute eBOSS pressure.")
          md.append("")
          md.append(f"Selected route: `{selected_route}`")
          md.append("")
          md.append("## Feasibility status")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          md.append(f"| CAMB available after attempt | `{camb_available_after_attempt}` |")
          md.append(f"| CAMB parameter sanity | `{camb_parameter_sanity_record['ok']}` |")
          md.append(f"| Stored-chain candidates | `{stored_chain_candidate_count}` |")
          md.append(f"| Stored-reference candidates | `{stored_reference_candidate_count}` |")
          md.append(f"| Covariance-context candidates | `{covariance_context_candidate_count}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_142_camb_install_or_stored_chain_probe.json",
              "tairid_v4_142_camb_install_or_stored_chain_probe.md",
              "repository_candidate_files_v4_142.csv",
              "camb_probe_records_v4_142.csv",
              "feasibility_decision_records_v4_142.csv",
              "route_meanings_v4_142.csv",
              "next_route_options_v4_142.csv",
              "blocked_claims_v4_142.csv",
              "rule_results_v4_142.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_142_camb_install_or_stored_chain_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
