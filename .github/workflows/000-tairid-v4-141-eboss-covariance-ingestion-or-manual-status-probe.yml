name: 000 TAIRID v4.141 eBOSS Covariance Ingestion or Manual Status Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-141-eboss-covariance-ingestion-or-manual-status-probe.yml"
      - "data/eboss_covariance_manual_status_v4_141.csv"
      - "data/tairid/eboss_covariance_manual_status_v4_141.csv"
      - ".github/tairid/eboss_covariance_manual_status_v4_141.csv"

jobs:
  tairid-v4-141-eboss-covariance-ingestion-or-manual-status-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.141 eBOSS covariance ingestion or manual status probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_141_eboss_covariance_ingestion_or_manual_status_probe

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_141_eboss_covariance_ingestion_or_manual_status_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_141_eboss_covariance_ingestion_or_manual_status_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not recompute eBOSS pressure.",
              "This does not ingest covariance by itself.",
              "This checks whether a manual eBOSS covariance/status file has been filled enough to allow a later covariance ingestion design."
          ]

          UPSTREAM_LOCKS = {
              "v4_140_eBOSS_covariance_manual_extraction_checklist": {
                  "readiness_label": "eBOSS_covariance_manual_extraction_checklist_passed_ready_for_covariance_ingestion_or_manual_status_probe",
                  "manual_target_count": 8,
                  "extraction_field_count": 12,
                  "checklist_step_count": 8,
                  "status_decision_rule_count": 5,
                  "manual_template_row_count": 8,
                  "upstream_sign_pattern_stable": True,
                  "upstream_pressure_magnitude_sensitive": True,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "same_program_eBOSS_covariance_still_limited": True,
                  "observed_covariance_review_still_needed": True,
                  "CAMB_run": False,
                  "full_planck_chains_imported": False,
                  "full_planck_chain_sample_files_parsed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_139_LCDM_reference_sensitivity_audit": {
                  "readiness_label": "LCDM_reference_sensitivity_audit_passed_sign_pattern_stable_pressure_magnitude_sensitive_ready_for_eBOSS_covariance_manual_extraction_checklist",
                  "sign_pattern_stable": True,
                  "pressure_magnitude_sensitive": True,
                  "observed_covariance_ingested": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          MANUAL_STATUS_FILE_CANDIDATES = [
              "data/eboss_covariance_manual_status_v4_141.csv",
              "data/tairid/eboss_covariance_manual_status_v4_141.csv",
              ".github/tairid/eboss_covariance_manual_status_v4_141.csv"
          ]

          REQUIRED_COLUMNS = [
              "target_id",
              "source_family",
              "priority",
              "source_url_or_path",
              "paper_or_product_title",
              "tracer_or_family",
              "effective_redshift",
              "observables_vector",
              "fsigma8_value_and_uncertainty",
              "covariance_matrix_path_or_status",
              "covariance_dimension_and_order",
              "likelihood_package_path_or_status",
              "overlap_or_independence_note",
              "ingestion_ready",
              "manual_notes",
              "claim_boundary"
          ]

          EMBEDDED_TEMPLATE_ROWS = [
              {"target_id": "official_SDSS_DR16_eBOSS_LSS_docs", "source_family": "SDSS_DR16_eBOSS", "priority": "1", "source_url_or_path": "", "paper_or_product_title": "", "tracer_or_family": "SDSS_DR16_eBOSS", "effective_redshift": "", "observables_vector": "", "fsigma8_value_and_uncertainty": "", "covariance_matrix_path_or_status": "", "covariance_dimension_and_order": "", "likelihood_package_path_or_status": "", "overlap_or_independence_note": "", "ingestion_ready": "false", "manual_notes": "Record official SDSS/SAS paths to LRG, ELG, QSO catalogs, mocks, likelihoods, covariance files, and consensus files.", "claim_boundary": "not_extracted_not_ingested_not_final"},
              {"target_id": "eBOSS_consensus_cosmology_likelihood", "source_family": "eBOSS_consensus", "priority": "2", "source_url_or_path": "", "paper_or_product_title": "", "tracer_or_family": "eBOSS_consensus", "effective_redshift": "", "observables_vector": "", "fsigma8_value_and_uncertainty": "", "covariance_matrix_path_or_status": "", "covariance_dimension_and_order": "", "likelihood_package_path_or_status": "", "overlap_or_independence_note": "", "ingestion_ready": "false", "manual_notes": "Record consensus covariance matrix, likelihood package, parameter vector, tracer overlap notes, and combined-cosmology data products.", "claim_boundary": "not_extracted_not_ingested_not_final"},
              {"target_id": "eBOSS_LRG_value_and_covariance", "source_family": "eBOSS_LRG", "priority": "3", "source_url_or_path": "", "paper_or_product_title": "", "tracer_or_family": "eBOSS_LRG", "effective_redshift": "", "observables_vector": "", "fsigma8_value_and_uncertainty": "", "covariance_matrix_path_or_status": "", "covariance_dimension_and_order": "", "likelihood_package_path_or_status": "", "overlap_or_independence_note": "", "ingestion_ready": "false", "manual_notes": "Confirm LRG effective redshift, fσ8 value, uncertainty, coupled AP/BAO variables, covariance, and sample definition.", "claim_boundary": "not_extracted_not_ingested_not_final"},
              {"target_id": "eBOSS_ELG_value_and_covariance", "source_family": "eBOSS_ELG", "priority": "4", "source_url_or_path": "", "paper_or_product_title": "", "tracer_or_family": "eBOSS_ELG", "effective_redshift": "", "observables_vector": "", "fsigma8_value_and_uncertainty": "", "covariance_matrix_path_or_status": "", "covariance_dimension_and_order": "", "likelihood_package_path_or_status": "", "overlap_or_independence_note": "", "ingestion_ready": "false", "manual_notes": "Confirm ELG effective redshift, fσ8 value, uncertainty, coupled AP/BAO variables, covariance, and sample definition.", "claim_boundary": "not_extracted_not_ingested_not_final"},
              {"target_id": "eBOSS_QSO_value_and_covariance", "source_family": "eBOSS_QSO", "priority": "5", "source_url_or_path": "", "paper_or_product_title": "", "tracer_or_family": "eBOSS_QSO", "effective_redshift": "", "observables_vector": "", "fsigma8_value_and_uncertainty": "", "covariance_matrix_path_or_status": "", "covariance_dimension_and_order": "", "likelihood_package_path_or_status": "", "overlap_or_independence_note": "", "ingestion_ready": "false", "manual_notes": "Confirm QSO effective redshift, fσ8 value, uncertainty, coupled AP/BAO variables, covariance, and sample definition.", "claim_boundary": "not_extracted_not_ingested_not_final"},
              {"target_id": "cross_tracer_overlap_or_independence_notes", "source_family": "eBOSS_family", "priority": "6", "source_url_or_path": "", "paper_or_product_title": "", "tracer_or_family": "eBOSS_family", "effective_redshift": "", "observables_vector": "", "fsigma8_value_and_uncertainty": "", "covariance_matrix_path_or_status": "", "covariance_dimension_and_order": "", "likelihood_package_path_or_status": "", "overlap_or_independence_note": "", "ingestion_ready": "false", "manual_notes": "Document whether LRG, ELG, and QSO may be treated independently, partially overlapping, or only through a combined covariance.", "claim_boundary": "not_extracted_not_ingested_not_final"},
              {"target_id": "covariance_file_format_mapping", "source_family": "eBOSS_family", "priority": "7", "source_url_or_path": "", "paper_or_product_title": "", "tracer_or_family": "eBOSS_family", "effective_redshift": "", "observables_vector": "", "fsigma8_value_and_uncertainty": "", "covariance_matrix_path_or_status": "", "covariance_dimension_and_order": "", "likelihood_package_path_or_status": "", "overlap_or_independence_note": "", "ingestion_ready": "false", "manual_notes": "Map file format, parameter order, dimensions, redshift mapping, units, and whether fσ8 is directly represented.", "claim_boundary": "not_extracted_not_ingested_not_final"},
              {"target_id": "reference_side_next_boundary", "source_family": "reference_support", "priority": "8", "source_url_or_path": "", "paper_or_product_title": "", "tracer_or_family": "reference_support", "effective_redshift": "", "observables_vector": "", "fsigma8_value_and_uncertainty": "", "covariance_matrix_path_or_status": "", "covariance_dimension_and_order": "", "likelihood_package_path_or_status": "", "overlap_or_independence_note": "", "ingestion_ready": "false", "manual_notes": "Preserve v4.139 boundary: sign pattern is stable, pressure magnitude is reference-sensitive.", "claim_boundary": "not_extracted_not_ingested_not_final"}
          ]

          STATUS_RULES = [
              {"status": "ingestion_ready", "requires": "ingestion_ready true, source path/title present, observables mapped, covariance or likelihood path present, dimensions/order present, and overlap note present", "next_action": "Build covariance ingestion design, not final pressure."},
              {"status": "manual_needed", "requires": "manual file absent or required fields blank", "next_action": "Keep manual template active and route to CAMB/stored-chain or manual fill."},
              {"status": "hint_only", "requires": "source URLs or paper titles exist but covariance/likelihood path or dimensions remain unmapped", "next_action": "No ingestion; manual extraction still needed."},
              {"status": "do_not_use", "requires": "source is unrelated, obsolete, incompatible, or lacks enough metadata", "next_action": "Exclude from future covariance ingestion."}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample rows were parsed.",
              "CAMB was run.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The eBOSS covariance ingestion/manual status probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "Manual status is the same as covariance ingestion.",
              "A covariance path without variable order is ingestion-ready.",
              "The eBOSS sign pattern is a final physical conclusion.",
              "Same-program eBOSS covariance is resolved.",
              "Observed covariance review is no longer needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {"priority": 1, "route_id": "v4_142_CAMB_install_or_stored_chain_probe", "purpose": "Try a bounded CAMB/stored-chain feasibility route while covariance remains manual-needed.", "why_next": "No filled ingestion-ready covariance status is expected yet, so reference-side strengthening remains the next automated route."},
              {"priority": 2, "route_id": "v4_142b_eBOSS_covariance_ingestion_design_if_manual_status_filled", "purpose": "Build covariance ingestion design only if a filled manual status file marks concrete covariance or likelihood products as ingestion-ready.", "why_next": "This branch is blocked until the manual status template is filled with source paths, dimensions, and variable order."},
              {"priority": 3, "route_id": "v4_143_external_standard_cosmology_comparison_plan", "purpose": "Prepare cautious comparison language against normal ΛCDM/eBOSS growth work.", "why_next": "The result is still limitation-bound and needs public-language boundaries."}
          ]

          failed_gates = []
          warnings = ["manual_status_probe_only", "covariance_not_ingested", "pressure_not_recomputed", "manual_file_optional", "same_program_eBOSS_covariance_still_limited", "no_final_RSD_pressure", "not_validation"]

          def read_csv_rows(path):
              with path.open("r", newline="", encoding="utf-8") as f:
                  reader = csv.DictReader(f)
                  return list(reader), list(reader.fieldnames or [])

          manual_file_path = ""
          manual_file_found = False
          manual_rows = []
          manual_columns = []

          for candidate in MANUAL_STATUS_FILE_CANDIDATES:
              path = Path(candidate)
              if path.exists() and path.is_file():
                  manual_file_found = True
                  manual_file_path = candidate
                  manual_rows, manual_columns = read_csv_rows(path)
                  break

          if not manual_file_found:
              manual_rows = [dict(row) for row in EMBEDDED_TEMPLATE_ROWS]
              manual_columns = list(REQUIRED_COLUMNS)

          missing_columns = [column for column in REQUIRED_COLUMNS if column not in manual_columns]

          def clean(value):
              return str(value or "").strip()

          def is_true(value):
              return clean(value).lower() in ["true", "yes", "1", "y"]

          assessment_records = []
          ingestion_candidate_records = []

          for row in manual_rows:
              target_id = clean(row.get("target_id"))
              ingestion_ready_flag = is_true(row.get("ingestion_ready"))
              source_present = bool(clean(row.get("source_url_or_path"))) and bool(clean(row.get("paper_or_product_title")))
              observables_present = bool(clean(row.get("observables_vector"))) and bool(clean(row.get("effective_redshift")))
              fsigma_present = bool(clean(row.get("fsigma8_value_and_uncertainty")))
              covariance_status = clean(row.get("covariance_matrix_path_or_status"))
              likelihood_status = clean(row.get("likelihood_package_path_or_status"))
              dimension_order_present = bool(clean(row.get("covariance_dimension_and_order")))
              overlap_present = bool(clean(row.get("overlap_or_independence_note")))
              has_cov_or_likelihood = bool(covariance_status) or bool(likelihood_status)

              ingestion_requirements_met = ingestion_ready_flag and source_present and observables_present and has_cov_or_likelihood and dimension_order_present and overlap_present

              if ingestion_requirements_met:
                  status = "ingestion_candidate_found"
                  recommended_next = "covariance_ingestion_design"
              elif source_present and has_cov_or_likelihood:
                  status = "hint_only_needs_dimensions_or_overlap"
                  recommended_next = "manual_completion_needed"
              elif source_present:
                  status = "source_locked_covariance_not_ready"
                  recommended_next = "manual_covariance_search_needed"
              else:
                  status = "manual_needed"
                  recommended_next = "fill_manual_status_template"

              assessment = {
                  "target_id": target_id,
                  "source_family": clean(row.get("source_family")),
                  "priority": clean(row.get("priority")),
                  "manual_file_found": manual_file_found,
                  "source_present": source_present,
                  "observables_present": observables_present,
                  "fsigma_present": fsigma_present,
                  "has_covariance_or_likelihood_status": has_cov_or_likelihood,
                  "dimension_order_present": dimension_order_present,
                  "overlap_present": overlap_present,
                  "ingestion_ready_flag": ingestion_ready_flag,
                  "ingestion_requirements_met": ingestion_requirements_met,
                  "status": status,
                  "recommended_next": recommended_next,
                  "claim_boundary": "status_assessment_only_not_covariance_ingestion"
              }
              assessment_records.append(assessment)

              if ingestion_requirements_met:
                  ingestion_candidate_records.append({
                      "target_id": target_id,
                      "source_family": clean(row.get("source_family")),
                      "source_url_or_path": clean(row.get("source_url_or_path")),
                      "paper_or_product_title": clean(row.get("paper_or_product_title")),
                      "observables_vector": clean(row.get("observables_vector")),
                      "covariance_matrix_path_or_status": covariance_status,
                      "covariance_dimension_and_order": clean(row.get("covariance_dimension_and_order")),
                      "likelihood_package_path_or_status": likelihood_status,
                      "overlap_or_independence_note": clean(row.get("overlap_or_independence_note")),
                      "claim_boundary": "candidate_for_future_ingestion_design_not_ingested"
                  })

          manual_needed_count = sum(1 for row in assessment_records if row["status"] == "manual_needed")
          hint_only_count = sum(1 for row in assessment_records if row["status"] == "hint_only_needs_dimensions_or_overlap")
          source_locked_not_ready_count = sum(1 for row in assessment_records if row["status"] == "source_locked_covariance_not_ready")
          ingestion_candidate_count = len(ingestion_candidate_records)
          row_count_ok = len(manual_rows) >= 8
          required_columns_ok = len(missing_columns) == 0

          covariance_ingested = False
          pressure_recomputed = False
          final_pressure_ready = False
          observed_covariance_review_still_needed = ingestion_candidate_count == 0

          if UPSTREAM_LOCKS["v4_140_eBOSS_covariance_manual_extraction_checklist"]["covariance_ingested"] is not False:
              failed_gates.append("upstream_covariance_unexpectedly_ingested")
          if UPSTREAM_LOCKS["v4_140_eBOSS_covariance_manual_extraction_checklist"]["pressure_recomputed"] is not False:
              failed_gates.append("upstream_pressure_unexpectedly_recomputed")
          if not row_count_ok:
              failed_gates.append("manual_status_rows_too_few")
          if not required_columns_ok:
              failed_gates.append("manual_status_missing_required_columns")
          if len(assessment_records) != len(manual_rows):
              failed_gates.append("assessment_record_count_mismatch")
          if covariance_ingested:
              failed_gates.append("covariance_unexpectedly_ingested")
          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")
          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in ["planck reference uncertainty is included", "full planck chains were imported", "camb was run", "final rsd pressure score", "validates tairid cosmology", "manual status is the same as covariance ingestion", "same-program eboss covariance is resolved", "bic"]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          if ingestion_candidate_count > 0:
              route_decision = "eBOSS_covariance_ingestion_or_manual_status_probe_passed_ingestion_candidate_found_ready_for_covariance_ingestion_design"
              next_allowed_step = "Proceed to a covariance ingestion design workflow using only the ingestion-candidate rows. Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
          else:
              route_decision = "eBOSS_covariance_ingestion_or_manual_status_probe_passed_manual_status_not_filled_covariance_not_ingested_ready_for_CAMB_or_stored_chain_probe"
              next_allowed_step = "Proceed to v4.142 CAMB install or stored-chain probe, or fill the manual status CSV and rerun v4.141. Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."

          rule_results = [
              {"rule_id": "workflow_name_sorts_top", "pass": True, "result": "workflow name begins with 000 TAIRID", "boundary": "Navigation convenience only."},
              {"rule_id": "node24_opt_in_preserved", "pass": True, "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved", "boundary": "Warning cleanup only."},
              {"rule_id": "upstream_checklist_carried", "pass": UPSTREAM_LOCKS["v4_140_eBOSS_covariance_manual_extraction_checklist"]["readiness_label"] == "eBOSS_covariance_manual_extraction_checklist_passed_ready_for_covariance_ingestion_or_manual_status_probe", "result": "v4.140 checklist carried", "boundary": "Carry-forward only."},
              {"rule_id": "manual_status_source_handled", "pass": True, "result": f"manual_file_found={manual_file_found}; manual_file_path={manual_file_path or 'embedded_template_used'}", "boundary": "File may be absent; embedded template is used."},
              {"rule_id": "required_columns_available", "pass": required_columns_ok, "result": f"missing_columns={','.join(missing_columns) if missing_columns else 'none'}", "boundary": "Column check only."},
              {"rule_id": "manual_rows_assessed", "pass": row_count_ok and len(assessment_records) == len(manual_rows), "result": f"manual_rows={len(manual_rows)}; assessment_records={len(assessment_records)}", "boundary": "Assessment only."},
              {"rule_id": "ingestion_status_classified", "pass": True, "result": f"ingestion_candidate_count={ingestion_candidate_count}; manual_needed_count={manual_needed_count}; hint_only_count={hint_only_count}; source_locked_not_ready_count={source_locked_not_ready_count}", "boundary": "Status classification only, not ingestion."},
              {"rule_id": "covariance_not_ingested", "pass": covariance_ingested is False, "result": "covariance not ingested by this probe", "boundary": "No covariance matrix parsed."},
              {"rule_id": "pressure_not_recomputed", "pass": pressure_recomputed is False, "result": "pressure not recomputed by this probe", "boundary": "No pressure result."},
              {"rule_id": "final_pressure_and_validation_blocked", "pass": final_pressure_ready is False, "result": "final pressure and validation remain blocked", "boundary": "No final score."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 15, "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved", "boundary": "No validation or final score claim."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "", "result": route_decision, "boundary": "Route decision does not validate the model."}
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_141_rules_passed")

          if failed_gates:
              readiness_label = "eBOSS_covariance_ingestion_or_manual_status_probe_failed"
              next_allowed_step = "Repair manual status probe before continuing."
          else:
              readiness_label = route_decision

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "manual_file_found": manual_file_found,
              "manual_file_path": manual_file_path or "embedded_template_used",
              "manual_row_count": len(manual_rows),
              "required_columns_ok": required_columns_ok,
              "missing_required_column_count": len(missing_columns),
              "assessment_record_count": len(assessment_records),
              "ingestion_candidate_count": ingestion_candidate_count,
              "manual_needed_count": manual_needed_count,
              "hint_only_count": hint_only_count,
              "source_locked_not_ready_count": source_locked_not_ready_count,
              "covariance_ingested": covariance_ingested,
              "pressure_recomputed": pressure_recomputed,
              "observed_covariance_review_still_needed": observed_covariance_review_still_needed,
              "same_program_eBOSS_covariance_still_limited": ingestion_candidate_count == 0,
              "CAMB_run": False,
              "full_planck_chains_imported": False,
              "full_planck_chain_sample_files_parsed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "manual_status_file_candidates": MANUAL_STATUS_FILE_CANDIDATES,
              "required_columns": REQUIRED_COLUMNS,
              "status_rules": STATUS_RULES,
              "manual_rows_used": manual_rows,
              "assessment_records": assessment_records,
              "ingestion_candidate_records": ingestion_candidate_records,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "manual_file_found": manual_file_found,
                  "ingestion_candidate_count": ingestion_candidate_count,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_141_eboss_covariance_ingestion_or_manual_status_probe.json").write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(OUTDIR / "manual_status_template_v4_141.csv", EMBEDDED_TEMPLATE_ROWS, REQUIRED_COLUMNS)
          write_csv(OUTDIR / "manual_rows_used_v4_141.csv", manual_rows, REQUIRED_COLUMNS)
          write_csv(OUTDIR / "assessment_records_v4_141.csv", assessment_records, ["target_id", "source_family", "priority", "manual_file_found", "source_present", "observables_present", "fsigma_present", "has_covariance_or_likelihood_status", "dimension_order_present", "overlap_present", "ingestion_ready_flag", "ingestion_requirements_met", "status", "recommended_next", "claim_boundary"])
          write_csv(OUTDIR / "ingestion_candidate_records_v4_141.csv", ingestion_candidate_records, ["target_id", "source_family", "source_url_or_path", "paper_or_product_title", "observables_vector", "covariance_matrix_path_or_status", "covariance_dimension_and_order", "likelihood_package_path_or_status", "overlap_or_independence_note", "claim_boundary"])
          write_csv(OUTDIR / "status_rules_v4_141.csv", STATUS_RULES, ["status", "requires", "next_action"])
          write_csv(OUTDIR / "next_route_options_v4_141.csv", NEXT_ROUTE_OPTIONS, ["priority", "route_id", "purpose", "why_next"])
          write_csv(OUTDIR / "blocked_claims_v4_141.csv", [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS], ["blocked_claim"])
          write_csv(OUTDIR / "rule_results_v4_141.csv", rule_results, ["rule_id", "pass", "result", "boundary"])

          md = []
          md.append("# 000 TAIRID v4.141 — eBOSS Covariance Ingestion or Manual Status Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.141 checks whether the eBOSS manual covariance status has been filled enough to justify a later covariance-ingestion design. If no manual file is present, it uses the embedded v4.140 template and passes honestly as manual-needed.")
          md.append("")
          md.append("This workflow does not ingest covariance and does not recompute pressure. It either finds an ingestion candidate for the next design step or routes back to manual/status work and CAMB/stored-chain feasibility.")
          md.append("")
          md.append("## Manual status source")
          md.append("")
          md.append(f"- Manual file found: `{manual_file_found}`")
          md.append(f"- Manual file path: `{manual_file_path or 'embedded_template_used'}`")
          md.append(f"- Ingestion candidate count: `{ingestion_candidate_count}`")
          md.append("")
          md.append("## Status counts")
          md.append("")
          md.append("| Status | Count |")
          md.append("|---|---:|")
          md.append(f"| `manual_needed` | `{manual_needed_count}` |")
          md.append(f"| `hint_only` | `{hint_only_count}` |")
          md.append(f"| `source_locked_not_ready` | `{source_locked_not_ready_count}` |")
          md.append(f"| `ingestion_candidate` | `{ingestion_candidate_count}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in ["tairid_v4_141_eboss_covariance_ingestion_or_manual_status_probe.json", "tairid_v4_141_eboss_covariance_ingestion_or_manual_status_probe.md", "manual_status_template_v4_141.csv", "manual_rows_used_v4_141.csv", "assessment_records_v4_141.csv", "ingestion_candidate_records_v4_141.csv", "status_rules_v4_141.csv", "next_route_options_v4_141.csv", "blocked_claims_v4_141.csv", "rule_results_v4_141.csv"]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_141_eboss_covariance_ingestion_or_manual_status_probe.md").write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
