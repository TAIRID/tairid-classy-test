name: 001 TAIRID v4.292 - SDSS RSD Scoring Readiness Dry Run No Claims

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-292-sdss-rsd-scoring-readiness-dry-run-no-claims.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-scoring-readiness-dry-run-no-claims:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.292 SDSS RSD Scoring Readiness Dry Run No Claims is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.292 SDSS RSD scoring readiness dry run no claims
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import html
          import re
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.292"
          ROUTE = "sdss_rsd_scoring_readiness_dry_run_no_claims_after_v4_291"
          EXPECTED_RESULT = "v4_292_sdss_rsd_scoring_readiness_dry_run_no_claims_passed_score_refused"
          SELECTED_NEXT_ROUTE = "v4_293_sdss_rsd_candidate_baseline_review_and_row_meaning_gate_no_scoring"

          OUT = Path("tairid_v4_292_sdss_rsd_scoring_readiness_dry_run_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-292-sdss-rsd-scoring-readiness-dry-run-output.zip"
          SOURCE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/"
          RELATED_PAGE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          MAX_BYTES = 2_000_000

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=MAX_BYTES, timeout=15):
              out = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.292-scoring-readiness-dry-run-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      out["status_code"] = getattr(resp, "status", "")
                      out["content_type"] = resp.headers.get("Content-Type", "")
                      out["content_length_header"] = resp.headers.get("Content-Length", "")
                      out["final_url"] = resp.geturl()
                      out["bytes_read"] = len(data)
                      out["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      out["fetch_ok"] = True
              except Exception as exc:
                  out["error"] = f"{type(exc).__name__}: {exc}"
              return out, data

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              try:
                  fields["z_eff"] = float(fields["z_eff_text"])
              except Exception:
                  fields["z_eff"] = ""
              return fields

          def parse_column_contract_rows(tables):
              out = []
              for table_idx, table in enumerate(tables):
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      row_type = "redshift_function_row_candidate" if "(z)" in label_norm else "final_or_consensus_row_candidate"
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for value, sigma in measurement_pairs(cell):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              out.append({
                                  "contract_id": f"column_contract_bound_{len(out)+1:02d}",
                                  "bound_id": f"bound_{len(out)+1:02d}",
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "z_eff": fields["z_eff"],
                                  "z_range_text": fields["z_range_text"],
                                  "observable": "f_sigma8",
                                  "observed_value": value,
                                  "observed_sigma": sigma,
                                  "baseline_comparator_required": True,
                                  "covariance_policy_required": True,
                                  "score_allowed": False,
                                  "contract_status": "rebuilt_for_scoring_readiness_dry_run_no_claims",
                              })
              return out

          inherited_v4_291_rows = [
              {"inherited_from": "v4.291", "item": "rules", "value": "57 / 57 passed", "meaning": "Baseline value candidate extractor passed.", "carry_forward_status": "ready_for_scoring_readiness_dry_run"},
              {"inherited_from": "v4.291", "item": "source_fetch_ok", "value": True, "meaning": "GitHub fetched official SDSS table page.", "carry_forward_status": "source_page_available"},
              {"inherited_from": "v4.291", "item": "related_fetch_ok", "value": True, "meaning": "GitHub fetched official SDSS overview page.", "carry_forward_status": "related_page_available"},
              {"inherited_from": "v4.291", "item": "dr16_fetch_ok", "value": True, "meaning": "GitHub fetched SDSS DR16 page.", "carry_forward_status": "dr16_page_available"},
              {"inherited_from": "v4.291", "item": "column_contract_rows", "value": 12, "meaning": "Twelve SDSS f_sigma8 column contracts existed.", "carry_forward_status": "observed_rows_ready"},
              {"inherited_from": "v4.291", "item": "raw_numeric_candidate_rows", "value": 60, "meaning": "Sixty raw numeric candidates were extracted near relevant terms.", "carry_forward_status": "candidate_numbers_visible"},
              {"inherited_from": "v4.291", "item": "baseline_candidate_rows", "value": 42, "meaning": "Forty-two candidate baseline rows existed but were not filled.", "carry_forward_status": "candidate_baselines_unapproved"},
              {"inherited_from": "v4.291", "item": "rejected_candidate_rows", "value": 18, "meaning": "Eighteen candidates were rejected or suspicious.", "carry_forward_status": "leakage_guard_active"},
              {"inherited_from": "v4.291", "item": "baseline_values_filled", "value": False, "meaning": "No baseline values were filled.", "carry_forward_status": "baseline_empty"},
              {"inherited_from": "v4.291", "item": "row_meaning_confirmed", "value": False, "meaning": "Row meaning remained unconfirmed.", "carry_forward_status": "row_meaning_missing"},
              {"inherited_from": "v4.291", "item": "covariance_handled", "value": False, "meaning": "No covariance handling was present.", "carry_forward_status": "covariance_missing"},
              {"inherited_from": "v4.291", "item": "support_allowed", "value": False, "meaning": "Support remained blocked.", "carry_forward_status": "support_blocked"},
              {"inherited_from": "v4.291", "item": "selected_next_route", "value": "v4_292_sdss_rsd_candidate_baseline_review_and_row_meaning_gate_no_scoring", "meaning": "User requested a scoring-readiness dry-run fork before continuing.", "carry_forward_status": "scoring_readiness_fork"},
          ]

          source_fetch_row, source_data = fetch_url(SOURCE_URL)
          related_fetch_row, related_data = fetch_url(RELATED_PAGE_URL)

          parser = SimpleTableParser()
          if source_data:
              parser.feed(source_data.decode("utf-8", errors="replace"))
          column_contract_rows = parse_column_contract_rows(parser.tables)

          scoring_request_rows = [
              {
                  "request_id": "score_request_001",
                  "requested_action": "allow_external_scoring",
                  "request_status": "received_as_dry_run_only",
                  "actual_permission": "refuse_valid_score",
                  "reason": "User asked what happens if scoring is allowed; this tests readiness, not a real score.",
              }
          ]

          score_readiness_requirement_rows = [
              {"requirement_id": "req_001", "requirement": "observed_sdss_fsigma8_rows_present", "required_for_valid_score": True, "status": "present" if len(column_contract_rows) > 0 else "missing_or_fetch_failed", "passed": len(column_contract_rows) > 0},
              {"requirement_id": "req_002", "requirement": "single_row_family_selected", "required_for_valid_score": True, "status": "missing", "passed": False},
              {"requirement_id": "req_003", "requirement": "row_meaning_confirmed", "required_for_valid_score": True, "status": "missing", "passed": False},
              {"requirement_id": "req_004", "requirement": "approved_baseline_values_filled", "required_for_valid_score": True, "status": "missing", "passed": False},
              {"requirement_id": "req_005", "requirement": "baseline_source_selected", "required_for_valid_score": True, "status": "missing", "passed": False},
              {"requirement_id": "req_006", "requirement": "definition_match_confirmed", "required_for_valid_score": True, "status": "missing", "passed": False},
              {"requirement_id": "req_007", "requirement": "covariance_or_diagonal_diagnostic_policy", "required_for_valid_score": True, "status": "missing", "passed": False},
              {"requirement_id": "req_008", "requirement": "score_guard_written", "required_for_valid_score": True, "status": "partial_null_guards_exist_but_score_guard_missing", "passed": False},
              {"requirement_id": "req_009", "requirement": "same_family_claim_ceiling_applied", "required_for_valid_score": True, "status": "present", "passed": True},
              {"requirement_id": "req_010", "requirement": "support_language_block_active", "required_for_valid_score": True, "status": "present", "passed": True},
          ]

          valid_score_allowed = all(row["passed"] for row in score_readiness_requirement_rows)
          score_valid = False
          score_status = "blocked_or_invalid"
          score_refusal_reason = "missing_row_meaning_approved_baseline_covariance_and_score_guard"

          score_attempt_rows = []
          for row in column_contract_rows:
              blockers = []
              if not any(r["requirement"] == "single_row_family_selected" and r["passed"] for r in score_readiness_requirement_rows):
                  blockers.append("single_row_family_not_selected")
              if not any(r["requirement"] == "row_meaning_confirmed" and r["passed"] for r in score_readiness_requirement_rows):
                  blockers.append("row_meaning_unconfirmed")
              if not any(r["requirement"] == "approved_baseline_values_filled" and r["passed"] for r in score_readiness_requirement_rows):
                  blockers.append("approved_baseline_missing")
              if not any(r["requirement"] == "baseline_source_selected" and r["passed"] for r in score_readiness_requirement_rows):
                  blockers.append("baseline_source_missing")
              if not any(r["requirement"] == "definition_match_confirmed" and r["passed"] for r in score_readiness_requirement_rows):
                  blockers.append("definition_match_missing")
              if not any(r["requirement"] == "covariance_or_diagonal_diagnostic_policy" and r["passed"] for r in score_readiness_requirement_rows):
                  blockers.append("covariance_or_diagnostic_policy_missing")
              if not any(r["requirement"] == "score_guard_written" and r["passed"] for r in score_readiness_requirement_rows):
                  blockers.append("score_guard_missing")
              score_attempt_rows.append({
                  "score_attempt_id": f"score_attempt_{row['bound_id']}",
                  "bound_id": row["bound_id"],
                  "row_label": row["row_label"],
                  "row_type_guess": row["row_type_guess"],
                  "sample_or_tracer": row["sample_or_tracer"],
                  "z_eff": row["z_eff"],
                  "observed_value": row["observed_value"],
                  "observed_sigma": row["observed_sigma"],
                  "scoring_requested": True,
                  "valid_score_allowed": False,
                  "score_valid": False,
                  "score_value": "NOT_COMPUTED",
                  "residual_value": "NOT_COMPUTED",
                  "chi_square_component": "NOT_COMPUTED",
                  "p_value": "NOT_COMPUTED",
                  "likelihood": "NOT_COMPUTED",
                  "blockers": "|".join(blockers),
                  "score_status": "blocked_invalid_readiness_dry_run",
                  "claim_status": "no_claims",
              })

          blocked_score_rows = [
              row for row in score_attempt_rows
              if row["score_valid"] is False
          ]
          valid_score_rows = [
              row for row in score_attempt_rows
              if row["score_valid"] is True
          ]

          invalid_score_reason_rows = [
              {"reason_id": "invalid_001", "reason": "row_meaning_unconfirmed", "effect": "cannot decide which f_sigma8 row family is scoreable", "blocks_score": True},
              {"reason_id": "invalid_002", "reason": "approved_baseline_missing", "effect": "no independent comparator value exists", "blocks_score": True},
              {"reason_id": "invalid_003", "reason": "baseline_source_missing", "effect": "candidate numeric values are not selected references", "blocks_score": True},
              {"reason_id": "invalid_004", "reason": "definition_match_missing", "effect": "observable/redshift/tracer definitions are not matched", "blocks_score": True},
              {"reason_id": "invalid_005", "reason": "covariance_or_diagnostic_policy_missing", "effect": "no valid residual weighting or diagnostic limitation exists", "blocks_score": True},
              {"reason_id": "invalid_006", "reason": "score_guard_missing", "effect": "no finalized rule for interpreting score outcomes exists", "blocks_score": True},
          ]

          dry_run_matrix_rows = [
              {"matrix_id": "dry_matrix_001", "object": "observed_values", "status": "present" if len(column_contract_rows) > 0 else "missing_or_fetch_failed", "usable_for_score": False, "reason": "observed values alone are insufficient"},
              {"matrix_id": "dry_matrix_002", "object": "candidate_baseline_values", "status": "candidate_only_from_v4_291", "usable_for_score": False, "reason": "not approved or filled"},
              {"matrix_id": "dry_matrix_003", "object": "row_meaning", "status": "unconfirmed", "usable_for_score": False, "reason": "two-row issue remains"},
              {"matrix_id": "dry_matrix_004", "object": "covariance", "status": "missing", "usable_for_score": False, "reason": "no covariance or diagonal diagnostic policy"},
              {"matrix_id": "dry_matrix_005", "object": "score_guard", "status": "missing", "usable_for_score": False, "reason": "score interpretation rule not written"},
              {"matrix_id": "dry_matrix_006", "object": "support_language", "status": "blocked", "usable_for_score": False, "reason": "same-family no-claims lane"},
          ]

          illegal_score_shortcut_rows = [
              {"shortcut_id": "shortcut_001", "shortcut": "observed_value_as_baseline", "would_create_number": True, "allowed": False, "reason": "self-baseline"},
              {"shortcut_id": "shortcut_002", "shortcut": "f_sigma8_z_row_as_baseline_for_f_sigma8", "would_create_number": True, "allowed": False, "reason": "row variant shortcut"},
              {"shortcut_id": "shortcut_003", "shortcut": "f_sigma8_row_as_baseline_for_f_sigma8_z", "would_create_number": True, "allowed": False, "reason": "row variant shortcut"},
              {"shortcut_id": "shortcut_004", "shortcut": "random_candidate_number_near_lcdm_or_growth", "would_create_number": True, "allowed": False, "reason": "candidate not approved"},
              {"shortcut_id": "shortcut_005", "shortcut": "mean_of_observed_rows", "would_create_number": True, "allowed": False, "reason": "not independent comparator"},
              {"shortcut_id": "shortcut_006", "shortcut": "endpoint_metadata_or_hash_as_signal", "would_create_number": True, "allowed": False, "reason": "metadata null lane"},
          ]

          scoring_result_classification_rows = [
              {
                  "classification_id": "score_class_001",
                  "object": "score_request",
                  "classification": "request_received_dry_run_only",
                  "allowed_language": "scoring was requested, but only readiness was tested",
                  "support_allowed": False,
              },
              {
                  "classification_id": "score_class_002",
                  "object": "score_validity",
                  "classification": "invalid_blocked",
                  "allowed_language": "a valid score is not allowed yet",
                  "support_allowed": False,
              },
              {
                  "classification_id": "score_class_003",
                  "object": "score_rows",
                  "classification": "all_available_rows_blocked" if len(score_attempt_rows) == len(blocked_score_rows) else "fetch_or_parse_missing_rows",
                  "allowed_language": "available rows were blocked from scoring",
                  "support_allowed": False,
              },
              {
                  "classification_id": "score_class_004",
                  "object": "claim_status",
                  "classification": "no_claims",
                  "allowed_language": "no proof, validation, evidence, support, p-value, likelihood, or fit",
                  "support_allowed": False,
              },
          ]

          next_gap_rows = [
              {"gap_id": "gap_001", "gap": "candidate_baseline_review", "status": "needed", "why": "v4.291 extracted candidates but none are approved"},
              {"gap_id": "gap_002", "gap": "row_meaning_gate", "status": "needed", "why": "the two f_sigma8 row issue remains"},
              {"gap_id": "gap_003", "gap": "single_row_family_selection", "status": "needed", "why": "score cannot mix f_sigma8(z) and f_sigma8 rows"},
              {"gap_id": "gap_004", "gap": "covariance_or_diagonal_diagnostic_policy", "status": "needed", "why": "residual weighting must be honest"},
              {"gap_id": "gap_005", "gap": "score_interpretation_guard", "status": "needed", "why": "before any score, pass/fail/neutral/weaken labels must be frozen"},
          ]

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "compute_valid_score_now", "reason": "readiness requirements fail", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "compute_residual_now", "reason": "approved baseline values are missing", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "compute_chi_square_now", "reason": "baseline and covariance policy missing", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "compute_p_value_or_likelihood", "reason": "no valid score/covariance exists", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "use_candidate_number_as_baseline", "reason": "candidate numbers are not approved baselines", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "use_observed_value_as_baseline", "reason": "self-baseline is illegal", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "use_row_variant_as_baseline", "reason": "row variants are blocked", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "claim_tairid_support", "reason": "dry run refused score", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "claim_baseline_advantage", "reason": "no baseline comparison was computed", "blocked": True},
              {"blocked_id": "blocked_010", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_011", "operation": "approve_holdout_source", "reason": "SDSS/eBOSS remains same-family current lane", "blocked": True},
              {"blocked_id": "blocked_012", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "scoring_request", "permission_status": "accepted_as_dry_run_only", "reason": "User requested scoring edge test."},
              {"permission_scope": "score_readiness_check", "permission_status": "completed_score_refused", "reason": "Readiness failed; valid score refused."},
              {"permission_scope": "valid_external_score", "permission_status": "blocked", "reason": "Baseline, row meaning, covariance, and score guard missing."},
              {"permission_scope": "candidate_baseline_review", "permission_status": "allowed_next", "reason": "Next workflow may review candidates and row-meaning gate."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
              {"permission_scope": "validation_or_evidence_claim", "permission_status": "blocked", "reason": "No validation/evidence allowed."},
          ]

          readiness_rows = [
              {"readiness_id": "ready_001", "object": "scoring_requested", "status": "true", "meaning": "Scoring was requested for dry-run edge test."},
              {"readiness_id": "ready_002", "object": "score_readiness", "status": "false", "meaning": "Requirements failed."},
              {"readiness_id": "ready_003", "object": "valid_score_rows", "status": str(len(valid_score_rows)), "meaning": "No valid rows may be scored."},
              {"readiness_id": "ready_004", "object": "blocked_score_rows", "status": str(len(blocked_score_rows)), "meaning": "All available observed rows are blocked."},
              {"readiness_id": "ready_005", "object": "candidate_baseline_review", "status": "ready_next", "meaning": "Next step can return to candidate review."},
