name: 001 TAIRID v4.258 - Zhao Fill Needed Table Dump Packet

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-258-zhao-fill-needed-table-dump-packet.yml"
      - "data/cosmology/qso_literature_extraction_manifest.csv"
      - "qso_literature_extraction_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-fill-needed-table-dump-packet:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.258 Zhao Fill Needed Table Dump Packet is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.258 Zhao fill needed table dump packet
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import gzip
          import io
          import json
          import re
          import tarfile
          import textwrap
          import zipfile

          VERSION = "v4.258"
          ROUTE = "manual_zhao_fill_needed_or_observed_manifest_bridge_guard_after_v4_257"
          EXPECTED_RESULT = "v4_258_zhao_fill_needed_table_dump_packet_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_259_review_manual_zhao_fill_or_extract_values_from_table_dump"

          OUT = Path("tairid_v4_258_zhao_fill_needed_table_dump_packet_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-258-zhao-fill-needed-table-dump-packet-output.zip"

          ZHAO_ABS_URL = "https://arxiv.org/abs/1801.03043"
          ZHAO_EPRINT_URL = "https://arxiv.org/e-print/1801.03043"
          ZHAO_PDF_URL = "https://arxiv.org/pdf/1801.03043"

          ZHAO_REDSHIFTS = [0.98, 1.23, 1.52, 1.94]

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          EXTRACTION_MANIFEST_CANDIDATES = [
              Path("data/cosmology/qso_literature_extraction_manifest.csv"),
              Path("qso_literature_extraction_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_EXTRACTION_COLUMNS = [
              "extraction_id",
              "candidate_id",
              "paper_or_source_url",
              "measurement_label",
              "redshift",
              "observable",
              "observed_value",
              "uncertainty_or_covariance_reference",
              "data_vector_reference",
              "source_role",
              "provenance_status",
              "extraction_status",
              "approval_status",
          ]

          PLACEHOLDER_MARKERS = [
              "FILL_",
              "PUT_",
              "MISSING",
              "MANUAL_REVIEW_REQUIRED",
              "NOT_GUESSED",
              "TODO",
              "TBD",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def safe_float(value):
              try:
                  return float(str(value).strip())
              except Exception:
                  return None

          def is_placeholder(value):
              text = str(value or "").strip()
              if not text:
                  return True
              upper = text.upper()
              return any(marker in upper for marker in PLACEHOLDER_MARKERS)

          def fetch_bytes(url, timeout=30, max_bytes=12000000):
              try:
                  req = Request(url, headers={"User-Agent": "TAIRID-v4.258-zhao-table-dump"})
                  with urlopen(req, timeout=timeout) as response:
                      status = f"http_{response.status}"
                      content_type = response.headers.get("content-type", "")
                      content_length = response.headers.get("content-length", "")
                      raw = response.read(max_bytes)
                      return status, content_type, content_length, raw, ""
              except Exception as exc:
                  return "probe_failed", "", "", b"", f"{type(exc).__name__}: {exc}"

          def decode_text(raw):
              return raw.decode("utf-8", errors="replace") if raw else ""

          def extract_text_files_from_eprint(raw):
              rows = []
              texts = []
              if not raw:
                  return rows, texts
              candidates = [("raw", raw)]
              try:
                  candidates.append(("gzip", gzip.decompress(raw)))
              except Exception:
                  pass

              for label, blob in candidates:
                  try:
                      with tarfile.open(fileobj=io.BytesIO(blob), mode="r:*") as tar:
                          for member in tar.getmembers():
                              if not member.isfile():
                                  continue
                              name = member.name
                              lower = name.lower()
                              if not lower.endswith((".tex", ".txt", ".bbl", ".sty", ".csv", ".dat", ".table")):
                                  continue
                              extracted = tar.extractfile(member)
                              if not extracted:
                                  continue
                              content = extracted.read(2500000).decode("utf-8", errors="replace")
                              rows.append({
                                  "archive_mode": label,
                                  "file_name": name,
                                  "file_size": member.size,
                                  "text_chars": len(content),
                                  "file_role": "source_text_candidate",
                              })
                              texts.append((name, content))
                          if rows:
                              return rows, texts
                  except Exception:
                      continue

              txt = decode_text(raw)
              if txt:
                  rows.append({
                      "archive_mode": "plain",
                      "file_name": "plain_eprint_or_html",
                      "file_size": len(raw),
                      "text_chars": len(txt),
                      "file_role": "plain_text_fallback",
                  })
                  texts.append(("plain_eprint_or_html", txt))
              return rows, texts

          def clean_latex_for_review(text):
              cleaned = text.replace("\r\n", "\n").replace("\r", "\n")
              cleaned = re.sub(r"%.*", "", cleaned)
              cleaned = cleaned.replace("\\pm", " ± ")
              cleaned = cleaned.replace("\\sigma_8", "sigma_8")
              cleaned = cleaned.replace("\\fsig", "fsig")
              cleaned = cleaned.replace("\\alpha", "alpha")
              cleaned = cleaned.replace("\\begin{", "\nBEGIN{")
              cleaned = cleaned.replace("\\end{", "\nEND{")
              cleaned = cleaned.replace("&", " | ")
              cleaned = cleaned.replace("\\\\", "\n")
              cleaned = re.sub(r"[{}]", "", cleaned)
              cleaned = re.sub(r"\n\s*\n+", "\n\n", cleaned)
              return cleaned.strip()

          def count_keywords(text):
              lower = text.lower()
              patterns = {
                  "f_sigma_or_fsig": r"f\s*\\?\s*sigma|fsig|f\\sigma",
                  "growth": r"growth",
                  "rsd": r"\brsd\b|redshift space|redshift-space",
                  "bao": r"\bbao\b",
                  "covariance": r"covariance",
                  "data_vector": r"data vector",
                  "likelihood": r"likelihood",
                  "alpha": r"\balpha\b",
                  "bias": r"\bbias\b",
                  "beta": r"\bbeta\b",
                  "sigma8": r"sigma_?8",
                  "table": r"table|widetable",
                  "mock": r"\bmock\b|mocks",
              }
              out = {}
              for key, pat in patterns.items():
                  try:
                      out[key] = len(re.findall(pat, lower))
                  except Exception:
                      out[key] = 0
              return out

          def numeric_review_windows(file_name, text, max_rows=60):
              rows = []
              cleaned = clean_latex_for_review(text)
              for z in ZHAO_REDSHIFTS:
                  z_str = f"{z:.2f}"
                  for match in re.finditer(re.escape(z_str), cleaned):
                      start = max(0, match.start() - 450)
                      end = min(len(cleaned), match.end() + 650)
                      snippet = cleaned[start:end]
                      nums = re.findall(r"[-+]?\d+\.\d+", snippet)
                      if len(nums) < 3:
                          continue
                      rows.append({
                          "window_id": f"window_{len(rows)+1:03d}",
                          "file_name": file_name,
                          "redshift_hint": z,
                          "numeric_values": "|".join(nums[:30]),
                          "snippet": snippet[:1500],
                          "window_status": "review_window_not_value_approval",
                      })
                      if len(rows) >= max_rows:
                          return rows
              return rows

          def write_text_artifact(path, title, body):
              path.write_text(f"# {title}\n\n{body.strip()}\n", encoding="utf-8")

          inherited_v4_257_rows = [
              {
                  "inherited_from": "v4.257",
                  "item": "rules",
                  "value": "38 / 38 passed",
                  "meaning": "Review Manual Zhao Fill Covariance Locator Retry passed.",
                  "carry_forward_status": "ready_for_fill_needed_table_dump_packet",
              },
              {
                  "inherited_from": "v4.257",
                  "item": "extraction_manifest_input_rows",
                  "value": 0,
                  "meaning": "No manually filled Zhao extraction manifest rows existed.",
                  "carry_forward_status": "manual_fill_needed",
              },
              {
                  "inherited_from": "v4.257",
                  "item": "filled_reviewable_zhao_rows",
                  "value": 0,
                  "meaning": "No Zhao rows were reviewable-not-scored yet.",
                  "carry_forward_status": "manual_fill_needed",
              },
              {
                  "inherited_from": "v4.257",
                  "item": "missing_or_blocked_zhao_rows",
                  "value": 4,
                  "meaning": "All four Zhao rows were missing or blocked.",
                  "carry_forward_status": "manual_fill_needed",
              },
              {
                  "inherited_from": "v4.257",
                  "item": "eprint_file_rows",
                  "value": 7,
                  "meaning": "The Zhao source archive exposed seven source files.",
                  "carry_forward_status": "table_dump_possible",
              },
              {
                  "inherited_from": "v4.257",
                  "item": "locator_priority_rows",
                  "value": 7,
                  "meaning": "draft.tex and widetable files were ranked for review.",
                  "carry_forward_status": "locator_hints_ready",
              },
              {
                  "inherited_from": "v4.257",
                  "item": "next_primary_route",
                  "value": "manual_zhao_fill_needed",
                  "meaning": "Manual fill is the current blocker.",
                  "carry_forward_status": "current_primary_route",
              },
              {
                  "inherited_from": "v4.257",
                  "item": "selected_next_route",
                  "value": "v4_258_manual_zhao_fill_needed_or_observed_manifest_bridge_guard",
                  "meaning": "Current route should produce fill-needed support or bridge guard if rows exist.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          extraction_manifest_status_rows, extraction_manifest_input_rows = read_manifest_status(
              EXTRACTION_MANIFEST_CANDIDATES, REQUIRED_EXTRACTION_COLUMNS, "extraction"
          )

          # Detect whether manual rows exist yet. This workflow is still safe if they do.
          zhao_rows = []
          for row in extraction_manifest_input_rows:
              if row.get("candidate_id") == "qso_src_002_dr14_zhao_tomographic" or "zhao" in row.get("extraction_id", "").lower():
                  zhao_rows.append(row)

          zhao_manual_fill_status_rows = []
          for z in ZHAO_REDSHIFTS:
              matching = []
              for row in zhao_rows:
                  rz = safe_float(row.get("redshift"))
                  if rz is not None and abs(rz - z) < 0.011:
                      matching.append(row)
              if not matching:
                  zhao_manual_fill_status_rows.append({
                      "redshift": z,
                      "matched_rows": 0,
                      "fill_status": "missing_manual_fill_row",
                      "manifest_bridge_allowed": False,
                      "scoring_allowed": False,
                      "evidence_allowed": False,
                  })
              else:
                  row = matching[0]
                  bad = []
                  if is_placeholder(row.get("observed_value")) or safe_float(row.get("observed_value")) is None:
                      bad.append("value_placeholder_or_not_numeric")
                  if is_placeholder(row.get("uncertainty_or_covariance_reference")):
                      bad.append("uncertainty_or_covariance_missing")
                  if is_placeholder(row.get("data_vector_reference")):
                      bad.append("data_reference_missing")
                  if row.get("approval_status") in ["approved", "approved_for_scoring", "evidence"]:
                      bad.append("approval_too_strong")
                  zhao_manual_fill_status_rows.append({
                      "redshift": z,
                      "matched_rows": len(matching),
                      "fill_status": "reviewable_not_scored" if not bad else "blocked_by_fill_issues",
                      "issues": "|".join(bad) if bad else "none",
                      "manifest_bridge_allowed": False,
                      "scoring_allowed": False,
                      "evidence_allowed": False,
                  })

          filled_reviewable_zhao_rows = sum(1 for row in zhao_manual_fill_status_rows if row["fill_status"] == "reviewable_not_scored")
          missing_or_blocked_zhao_rows = len(zhao_manual_fill_status_rows) - filled_reviewable_zhao_rows

          source_probe_rows = []
          eprint_texts = []
          eprint_file_rows = []
          for label, url in [
              ("zhao_abs", ZHAO_ABS_URL),
              ("zhao_eprint", ZHAO_EPRINT_URL),
              ("zhao_pdf", ZHAO_PDF_URL),
          ]:
              status, content_type, content_length, raw, error = fetch_bytes(url)
              source_probe_rows.append({
                  "source_label": label,
                  "source_url": url,
                  "probe_status": status,
                  "content_type": content_type,
                  "content_length": content_length,
                  "bytes_downloaded": len(raw),
                  "probe_error": error,
                  "probe_role": "table_dump_support_only",
              })
              if label == "zhao_eprint":
                  eprint_file_rows, eprint_texts = extract_text_files_from_eprint(raw)

          table_dump_rows = []
          table_keyword_rows = []
          table_numeric_window_rows = []
          high_priority_names = [
              "draft.tex",
              "tables/widetable1.tex",
              "tables/widetable2.tex",
              "tables/widetable3.tex",
          ]

          text_by_name = {name: text for name, text in eprint_texts}
          for wanted in high_priority_names:
              matched_name = None
              for name in text_by_name:
                  if name.endswith(wanted) or name == wanted:
                      matched_name = name
                      break
              if matched_name is None:
                  table_dump_rows.append({
                      "dump_id": f"dump_{len(table_dump_rows)+1:03d}",
                      "file_name": wanted,
                      "file_status": "not_found_in_eprint",
                      "dump_path": "",
                      "review_role": "missing",
                  })
                  continue

              raw_text = text_by_name[matched_name]
              cleaned = clean_latex_for_review(raw_text)
              safe_name = matched_name.replace("/", "__").replace("\\", "__")
              raw_path = OUT / f"zhao_raw_{safe_name}.txt"
              cleaned_path = OUT / f"zhao_cleaned_{safe_name}.txt"
              raw_path.write_text(raw_text, encoding="utf-8")
              cleaned_path.write_text(cleaned, encoding="utf-8")

              counts = count_keywords(raw_text)
              table_keyword_rows.append({
                  "file_name": matched_name,
                  **counts,
                  "keyword_status": "review_counts_only_not_approval",
              })

              windows = numeric_review_windows(matched_name, raw_text)
              table_numeric_window_rows.extend(windows)

              if "draft.tex" in matched_name:
                  review_role = "method_covariance_dependency_review"
              elif "widetable3" in matched_name:
                  review_role = "strongest_candidate_value_table_review"
              elif "widetable" in matched_name:
                  review_role = "table_value_or_geometry_review"
              else:
                  review_role = "source_review"

              table_dump_rows.append({
                  "dump_id": f"dump_{len(table_dump_rows)+1:03d}",
                  "file_name": matched_name,
                  "file_status": "dumped",
                  "raw_dump_path": raw_path.as_posix(),
                  "cleaned_dump_path": cleaned_path.as_posix(),
                  "raw_chars": len(raw_text),
                  "cleaned_chars": len(cleaned),
                  "numeric_window_rows": len(windows),
                  "review_role": review_role,
              })

          # Build a short review digest for human use.
          digest_lines = [
              "# Zhao Table Dump Review Digest",
              "",
              "Use these files to manually identify the exact f_sigma8 rows. Do not score from this digest.",
              "",
              "## High-priority source files",
          ]
          for row in table_dump_rows:
              digest_lines.append(f"- {row.get('file_name')}: {row.get('file_status')} — {row.get('review_role')}")
          digest_lines.extend([
              "",
              "## What to find",
              "1. Exact table caption.",
              "2. Exact row for each redshift: 0.98, 1.23, 1.52, 1.94.",
              "3. Exact column label for f_sigma8 / fσ8 / growth/RSD value.",
              "4. Exact uncertainty or covariance/data-vector reference.",
              "5. Whether each row is growth, geometry, mixed, derived, or support-only.",
              "",
              "## Boundary",
              "This artifact is a table-dump packet only. It does not approve values, bridge to observed manifest, score residuals, or validate TAIRID.",
              "",
          ]
          (OUT / "v4_258_zhao_table_dump_review_digest.md").write_text("\n".join(digest_lines), encoding="utf-8")

          # Human-fill extraction template retained from v4.256, but carried forward in this output.
          extraction_manifest_fill_packet_rows = []
          for z in ZHAO_REDSHIFTS:
              label = str(z).replace(".", "_")
              extraction_manifest_fill_packet_rows.append({
                  "extraction_id": f"zhao_manual_extract_z_{label}",
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "paper_or_source_url": ZHAO_ABS_URL,
                  "measurement_label": f"Zhao tomographic bin z_eff={z}",
                  "redshift": z,
                  "observable": "f_sigma8",
                  "observed_value": "FILL_ONLY_AFTER_HUMAN_TABLE_CONFIRMATION",
                  "uncertainty_or_covariance_reference": "FILL_COVARIANCE_OR_QUOTED_UNCERTAINTY_REFERENCE",
                  "data_vector_reference": "FILL_TABLE_FILE_AND_ROW_COLUMN_LABEL",
                  "source_role": "primary_qso_growth_tomographic_literature_candidate",
                  "provenance_status": "same_survey_family_cross_release_needs_review",
                  "extraction_status": "manual_fill_required_not_scored",
                  "approval_status": "reviewed_not_scored_only_after_human_confirmation",
              })
          write_csv(OUT / "qso_literature_extraction_manifest_TEMPLATE_ZHAO_v4_258.csv", extraction_manifest_fill_packet_rows)

          observed_manifest_bridge_block_rows = []
          for z in ZHAO_REDSHIFTS:
              observed_manifest_bridge_block_rows.append({
                  "bridge_id": f"blocked_zhao_observed_bridge_z_{str(z).replace('.', '_')}",
                  "redshift": z,
                  "quantity": "f_sigma8",
                  "bridge_status": "blocked",
                  "required_before_bridge": "all_four_rows_reviewable_not_scored + covariance_or_uncertainty_policy + provenance_decision + separate_bridge_guard",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          manual_next_action_rows = [
              {
                  "next_action_id": "next_001",
                  "action": "Open v4_258_zhao_table_dump_review_digest.md",
                  "purpose": "see which files were dumped and why",
                  "status": "ready",
              },
              {
                  "next_action_id": "next_002",
                  "action": "Open cleaned widetable files from the output artifact",
                  "purpose": "find exact f_sigma8 table rows and columns",
                  "status": "manual_review_needed",
              },
              {
                  "next_action_id": "next_003",
                  "action": "Fill qso_literature_extraction_manifest_TEMPLATE_ZHAO_v4_258.csv only after table confirmation",
                  "purpose": "create reviewed-not-scored extraction rows",
                  "status": "blocked_until_human_confirmation",
              },
              {
                  "next_action_id": "next_004",
                  "action": "Do not fill external_observed_manifest.csv",
                  "purpose": "observed bridge is still blocked",
                  "status": "blocked",
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "zhao_table_dump_packet",
                  "permission_status": "written",
                  "reason": "Source table files and review digest are written.",
              },
              {
                  "permission_scope": "manual_zhao_fill",
                  "permission_status": "needed",
                  "reason": "No reviewable filled Zhao rows exist yet.",
              },
              {
                  "permission_scope": "qso_literature_extraction_manifest_template",
                  "permission_status": "written_template_only",
                  "reason": "Template can be filled only after human table confirmation.",
              },
              {
                  "permission_scope": "external_observed_manifest_bridge",
                  "permission_status": "blocked",
                  "reason": "A separate bridge guard is required after exact values/covariance/provenance review.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No reviewed observed/reference join exists.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "Table dump is not evidence.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No approved observed manifest or parameter values are ready.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
          ]

          readiness_rows = [
              {"readiness_id": "readiness_001", "requirement": "source_table_dump", "status": "ready" if any(row.get("file_status") == "dumped" for row in table_dump_rows) else "not_ready", "blocks": "manual fill if missing"},
              {"readiness_id": "readiness_002", "requirement": "cleaned_table_review_files", "status": "ready" if any(row.get("cleaned_dump_path") for row in table_dump_rows) else "not_ready", "blocks": "manual fill if missing"},
              {"readiness_id": "readiness_003", "requirement": "all_four_zhao_rows_reviewable", "status": "ready" if filled_reviewable_zhao_rows == 4 else "not_ready", "blocks": "observed bridge"},
