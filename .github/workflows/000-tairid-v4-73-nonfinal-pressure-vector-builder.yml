name: 000 TAIRID v4.73 Nonfinal Pressure Vector Builder

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-73-nonfinal-pressure-vector-builder.yml"

jobs:
  tairid-v4-73-nonfinal-pressure-vector-builder:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.73 nonfinal pressure vector builder
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_73_nonfinal_pressure_vector_builder

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_73_nonfinal_pressure_vector_builder")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_73_nonfinal_pressure_vector_builder"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not import Planck chains.",
              "This does not compute Planck reference uncertainty.",
              "This does not treat BOSS, eBOSS, ELG, WiggleZ, Planck, or KiDS as mutually independent by assumption.",
              "This builds a nonfinal pressure vector/status dashboard only.",
              "A pass means the lane map is readable and bounded, not that the lane is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_37_BOSS": {
                  "source_family": "BOSS_DR12",
                  "status": "partial BOSS-only covariance preview",
                  "row_count": 3,
                  "negative_count": 2,
                  "positive_count": 1,
                  "sqrt_chi2_preview": 1.1750788584363314,
                  "scope_boundary": "BOSS_only_not_full_RSD",
                  "final_use_allowed": False
              },
              "v4_43_ELG": {
                  "source_family": "eBOSS_ELG",
                  "status": "grid visible and parser-feasible but parked",
                  "simple_covariance_ready": False,
                  "final_use_allowed": False
              },
              "v4_44_eBOSS_LRG_QSO": {
                  "source_family": "eBOSS_LRG_QSO",
                  "status": "partial LRG/QSO covariance preview",
                  "row_count": 2,
                  "negative_count": 0,
                  "positive_count": 2,
                  "sqrt_chi2_preview": 1.9222323437114406,
                  "scope_boundary": "LRG_QSO_only_ELG_excluded",
                  "final_use_allowed": False
              },
              "v4_46_WiggleZ": {
                  "source_family": "WiggleZ",
                  "status": "formally nonfinal unresolved after locator retry",
                  "covariance_ready": False,
                  "final_use_allowed": False
              },
              "v4_50_growth_lane_handoff": {
                  "status": "growth lane mixed and role-dependent",
                  "all_negative_growth_story_allowed": False,
                  "final_RSD_pressure_allowed": False
              },
              "v4_71_Planck_reference": {
                  "status": "external literature expansion passed, no candidate accepted as covariance",
                  "reference_uncertainty_computed": False,
                  "external_reference_imported": False,
                  "final_RSD_pressure_allowed": False
              },
              "v4_72_combination_policy": {
                  "status": "cross-family combination policy passed",
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "ELG_covariance_ready": False,
                  "WiggleZ_covariance_ready": False,
                  "KiDS_merged_into_RSD": False,
                  "validation_claim_allowed": False
              }
          }

          PRESSURE_VECTOR_ROWS = [
              {
                  "family_id": "BOSS_DR12",
                  "lane": "RSD_growth",
                  "current_direction": "mixed_partial_preview",
                  "direction_detail": "2 negative rows, 1 positive row in BOSS-only preview",
                  "diagnostic_value": "sqrt_chi2_preview=1.1750788584363314",
                  "status": "partial_BOSS_only_covariance_preview",
                  "what_it_shows": "BOSS is not blank; it has a real but nonfinal covariance-aware preview.",
                  "main_blocker": "BOSS-only scope plus missing Planck reference uncertainty and combination policy details.",
                  "safe_claim_now": "BOSS partial preview is mixed and diagnostic only.",
                  "blocked_claim": "BOSS gives the final RSD pressure direction.",
                  "may_enter_final_score_now": False,
                  "next_needed": "Keep as diagnostic until Planck reference uncertainty and combination rules are ready."
              },
              {
                  "family_id": "eBOSS_LRG_QSO",
                  "lane": "RSD_growth",
                  "current_direction": "positive_partial_preview",
                  "direction_detail": "0 negative rows, 2 positive rows in LRG/QSO-only preview",
                  "diagnostic_value": "sqrt_chi2_preview=1.9222323437114406",
                  "status": "partial_LRG_QSO_covariance_preview_ELG_excluded",
                  "what_it_shows": "The eBOSS LRG/QSO subset points positive relative to the declared reference.",
                  "main_blocker": "ELG excluded, Planck reference uncertainty missing, and eBOSS internal scope not final.",
                  "safe_claim_now": "eBOSS LRG/QSO partial preview is positive but nonfinal.",
                  "blocked_claim": "eBOSS proves or disproves the full growth lane.",
                  "may_enter_final_score_now": False,
                  "next_needed": "Resolve ELG parser/exclusion and reference uncertainty."
              },
              {
                  "family_id": "eBOSS_ELG",
                  "lane": "RSD_growth",
                  "current_direction": "unknown_parser_needed",
                  "direction_detail": "ELG grid visible and parser-feasible, but not simple covariance-ready.",
                  "diagnostic_value": "no_final_covariance_value",
                  "status": "parked_or_parser_needed",
                  "what_it_shows": "ELG is real work left, not a solved input.",
                  "main_blocker": "Needs grid parser design or formal exclusion policy.",
                  "safe_claim_now": "ELG is visible but not yet usable as simple covariance.",
                  "blocked_claim": "Full eBOSS is covariance-aware.",
                  "may_enter_final_score_now": False,
                  "next_needed": "v4.74 ELG parser or exclusion policy."
              },
              {
                  "family_id": "WiggleZ",
                  "lane": "RSD_growth",
                  "current_direction": "unknown_unresolved",
                  "direction_detail": "Historical roots did not expose usable covariance/product files in GitHub locator retry.",
                  "diagnostic_value": "no_final_covariance_value",
                  "status": "formally_nonfinal_unresolved",
                  "what_it_shows": "WiggleZ remains a growth-family blocker.",
                  "main_blocker": "Usable product/covariance path not found yet.",
                  "safe_claim_now": "WiggleZ is unresolved and excluded from final scoring for now.",
                  "blocked_claim": "WiggleZ is covariance-ready.",
                  "may_enter_final_score_now": False,
                  "next_needed": "v4.75 WiggleZ source or exclusion policy."
              },
              {
                  "family_id": "Planck_reference",
                  "lane": "reference_uncertainty",
                  "current_direction": "missing_reference_uncertainty",
                  "direction_detail": "Planck fullGrid structure was mapped, sidecar fixtures were useful, but no posterior reference covariance is computed.",
                  "diagnostic_value": "reference_uncertainty_computed=false",
                  "status": "missing_reference_covariance",
                  "what_it_shows": "The reference lane is bounded but not solved.",
                  "main_blocker": "No local CAMB/CLASS solver and no external candidate accepted as covariance.",
                  "safe_claim_now": "Planck reference uncertainty remains missing.",
                  "blocked_claim": "Planck reference uncertainty is included.",
                  "may_enter_final_score_now": False,
                  "next_needed": "v4.76 Planck reference deep route."
              },
              {
                  "family_id": "KiDS_weak_lensing",
                  "lane": "separate_consolidation_pressure_context",
                  "current_direction": "separate_context_not_RSD_combined",
                  "direction_detail": "KiDS/S8 is a separate consolidation-pressure lane, not automatically part of RSD covariance.",
                  "diagnostic_value": "not_in_current_RSD_combination",
                  "status": "separate_lane",
                  "what_it_shows": "Weak-lensing pressure matters, but it needs its own bridge before mixing with RSD.",
                  "main_blocker": "No declared cross-observable bridge in this RSD combination policy.",
                  "safe_claim_now": "KiDS remains separate context for now.",
                  "blocked_claim": "KiDS proves the whole RSD/growth lane.",
                  "may_enter_final_score_now": False,
                  "next_needed": "Keep separate unless a bridge policy is built."
              }
          ]

          STATUS_COUNTS = {
              "total_family_rows": len(PRESSURE_VECTOR_ROWS),
              "diagnostic_partial_rows": sum(1 for row in PRESSURE_VECTOR_ROWS if "partial" in row["status"]),
              "parser_needed_rows": sum(1 for row in PRESSURE_VECTOR_ROWS if "parser" in row["status"] or "parked" in row["status"]),
              "unresolved_rows": sum(1 for row in PRESSURE_VECTOR_ROWS if "unresolved" in row["status"]),
              "reference_missing_rows": sum(1 for row in PRESSURE_VECTOR_ROWS if row["lane"] == "reference_uncertainty"),
              "separate_context_rows": sum(1 for row in PRESSURE_VECTOR_ROWS if row["lane"] == "separate_consolidation_pressure_context"),
              "final_score_allowed_rows": sum(1 for row in PRESSURE_VECTOR_ROWS if row["may_enter_final_score_now"] is True)
          }

          INTERPRETATION_GUARDS = [
              {
                  "guard_id": "mixed_direction_preserved",
                  "guard_text": "BOSS is mixed and eBOSS LRG/QSO is positive; do not flatten the lane into an all-negative story.",
                  "active": True
              },
              {
                  "guard_id": "reference_uncertainty_missing",
                  "guard_text": "A fixed Planck-like reference is not enough for final RSD pressure; reference covariance is still missing.",
                  "active": True
              },
              {
                  "guard_id": "ELG_not_ready",
                  "guard_text": "ELG is visible but parser-needed or parked.",
                  "active": True
              },
              {
                  "guard_id": "WiggleZ_not_ready",
                  "guard_text": "WiggleZ remains unresolved after locator retry.",
                  "active": True
              },
              {
                  "guard_id": "KiDS_not_RSD_combined",
                  "guard_text": "KiDS/S8 is separate consolidation-pressure context unless a cross-observable bridge is declared.",
                  "active": True
              },
              {
                  "guard_id": "no_final_score",
                  "guard_text": "This vector is a readable dashboard, not a final score.",
                  "active": True
              }
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_74_ELG_parser_or_exclusion_policy",
                  "purpose": "Resolve whether ELG gets a grid parser path or remains formally parked/excluded.",
                  "why_next": "Full eBOSS cannot be represented honestly while ELG status is unresolved."
              },
              {
                  "priority": 2,
                  "route_id": "v4_75_WiggleZ_source_or_exclusion_policy",
                  "purpose": "Retry WiggleZ product/covariance visibility or formally park it.",
                  "why_next": "WiggleZ is still an unresolved growth-family blocker."
              },
              {
                  "priority": 3,
                  "route_id": "v4_76_Planck_reference_deep_route",
                  "purpose": "Continue external candidate deep review, solver/container route, or verified posterior/covariance route.",
                  "why_next": "Planck reference uncertainty is the main missing layer before final RSD pressure."
              },
              {
                  "priority": 4,
                  "route_id": "v4_77_sprint_end_handoff",
                  "purpose": "Summarize all sprint results after ELG, WiggleZ, and Planck reference follow-up.",
                  "why_next": "Only after the three next blockers are checked."
              }
          ]

          ALLOWED_CLAIMS = [
              "The growth/RSD lane now has a nonfinal pressure-vector dashboard.",
              "BOSS partial preview is mixed.",
              "eBOSS LRG/QSO partial preview is positive relative to the declared reference.",
              "ELG is parser-needed or parked.",
              "WiggleZ is unresolved.",
              "Planck reference uncertainty is missing.",
              "KiDS/S8 remains separate consolidation-pressure context.",
              "Final RSD pressure remains blocked."
          ]

          BLOCKED_CLAIMS = [
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "BOSS and eBOSS were treated as independent by default.",
              "ELG was treated as covariance-ready.",
              "WiggleZ was treated as covariance-ready.",
              "KiDS weak-lensing pressure was merged into RSD covariance.",
              "All growth data point negative.",
              "eBOSS disproves KiDS.",
              "KiDS proves the full growth lane.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          failed_gates = []
          warnings = [
              "nonfinal_pressure_vector_only",
              "no_combined_score",
              "no_combined_covariance",
              "Planck_reference_uncertainty_missing",
              "ELG_parser_needed_or_parked",
              "WiggleZ_unresolved",
              "mixed_direction_caution_required",
              "not_validation"
          ]

          required_families = {
              "BOSS_DR12",
              "eBOSS_LRG_QSO",
              "eBOSS_ELG",
              "WiggleZ",
              "Planck_reference",
              "KiDS_weak_lensing"
          }

          present_families = {row["family_id"] for row in PRESSURE_VECTOR_ROWS}
          missing_families = sorted(required_families - present_families)

          if missing_families:
              failed_gates.append("missing_pressure_vector_families_" + "_".join(missing_families))

          if any(row["may_enter_final_score_now"] is not False for row in PRESSURE_VECTOR_ROWS):
              failed_gates.append("family_allowed_into_final_score_too_early")

          if STATUS_COUNTS["final_score_allowed_rows"] != 0:
              failed_gates.append("final_score_allowed_row_count_not_zero")

          if UPSTREAM_LOCKS["v4_72_combination_policy"]["final_RSD_pressure_score_computed"] is not False:
              failed_gates.append("v4_72_final_score_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_72_combination_policy"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("v4_72_reference_uncertainty_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_50_growth_lane_handoff"]["all_negative_growth_story_allowed"] is not False:
              failed_gates.append("v4_50_all_negative_boundary_not_carried")

          if not any(row["family_id"] == "BOSS_DR12" and row["current_direction"] == "mixed_partial_preview" for row in PRESSURE_VECTOR_ROWS):
              failed_gates.append("BOSS_mixed_direction_missing")

          if not any(row["family_id"] == "eBOSS_LRG_QSO" and row["current_direction"] == "positive_partial_preview" for row in PRESSURE_VECTOR_ROWS):
              failed_gates.append("eBOSS_positive_direction_missing")

          if not any(row["family_id"] == "Planck_reference" and row["current_direction"] == "missing_reference_uncertainty" for row in PRESSURE_VECTOR_ROWS):
              failed_gates.append("Planck_missing_reference_row_missing")

          if not all(row["active"] is True for row in INTERPRETATION_GUARDS):
              failed_gates.append("not_all_interpretation_guards_active")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "combined growth covariance",
              "reference uncertainty is included",
              "elg was treated as covariance-ready",
              "wigglez was treated as covariance-ready",
              "all growth data point negative",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "nonfinal_pressure_vector_builder_passed_ready_for_ELG_parser_or_exclusion_policy"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "required_families_present",
                  "pass": len(missing_families) == 0,
                  "result": f"{len(present_families)} required families present",
                  "boundary": "Presence is dashboard status only."
              },
              {
                  "rule_id": "all_rows_block_final_score",
                  "pass": all(row["may_enter_final_score_now"] is False for row in PRESSURE_VECTOR_ROWS),
                  "result": "all pressure-vector rows blocked from final score",
                  "boundary": "No final RSD pressure."
              },
              {
                  "rule_id": "mixed_direction_preserved",
                  "pass": (
                      any(row["family_id"] == "BOSS_DR12" and row["current_direction"] == "mixed_partial_preview" for row in PRESSURE_VECTOR_ROWS)
                      and any(row["family_id"] == "eBOSS_LRG_QSO" and row["current_direction"] == "positive_partial_preview" for row in PRESSURE_VECTOR_ROWS)
                  ),
                  "result": "BOSS mixed and eBOSS LRG/QSO positive directions preserved",
                  "boundary": "No all-negative growth story."
              },
              {
                  "rule_id": "Planck_reference_missing_preserved",
                  "pass": any(row["family_id"] == "Planck_reference" and row["current_direction"] == "missing_reference_uncertainty" for row in PRESSURE_VECTOR_ROWS),
                  "result": "Planck reference uncertainty remains missing",
                  "boundary": "No final RSD pressure."
              },
              {
                  "rule_id": "ELG_and_WiggleZ_blockers_visible",
                  "pass": (
                      any(row["family_id"] == "eBOSS_ELG" and "parser" in row["current_direction"] for row in PRESSURE_VECTOR_ROWS)
                      and any(row["family_id"] == "WiggleZ" and "unresolved" in row["current_direction"] for row in PRESSURE_VECTOR_ROWS)
                  ),
                  "result": "ELG and WiggleZ blockers visible",
                  "boundary": "No forced inclusion."
              },
              {
                  "rule_id": "KiDS_separate_context_preserved",
                  "pass": any(row["family_id"] == "KiDS_weak_lensing" and row["lane"] == "separate_consolidation_pressure_context" for row in PRESSURE_VECTOR_ROWS),
                  "result": "KiDS remains separate context",
                  "boundary": "No cross-observable merge."
              },
              {
                  "rule_id": "interpretation_guards_active",
                  "pass": all(row["active"] is True for row in INTERPRETATION_GUARDS),
                  "result": f"{len(INTERPRETATION_GUARDS)} interpretation guards active",
                  "boundary": "Dashboard is guarded."
              },
              {
                  "rule_id": "next_route_options_declared",
                  "pass": len(NEXT_ROUTE_OPTIONS) >= 4,
                  "result": f"{len(NEXT_ROUTE_OPTIONS)} next route options declared",
                  "boundary": "No route computes final pressure now."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 14,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final pressure claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not combine covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Nonfinal pressure vector only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_73_rules_passed")

          if failed_gates:
              readiness_label = "nonfinal_pressure_vector_builder_failed"
              next_allowed_step = "Repair nonfinal pressure vector before ELG, WiggleZ, or Planck deep-route continuation."
          else:
              readiness_label = "nonfinal_pressure_vector_builder_passed_ready_for_ELG_parser_or_exclusion_policy"
              next_allowed_step = (
                  "Proceed to v4.74 ELG parser or exclusion policy, then v4.75 WiggleZ source or exclusion policy, "
                  "then v4.76 Planck reference deep route. Do not compute final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "pressure_vector_row_count": len(PRESSURE_VECTOR_ROWS),
              "missing_required_family_count": len(missing_families),
              "diagnostic_partial_rows": STATUS_COUNTS["diagnostic_partial_rows"],
              "parser_needed_rows": STATUS_COUNTS["parser_needed_rows"],
              "unresolved_rows": STATUS_COUNTS["unresolved_rows"],
              "reference_missing_rows": STATUS_COUNTS["reference_missing_rows"],
              "separate_context_rows": STATUS_COUNTS["separate_context_rows"],
              "final_score_allowed_rows": STATUS_COUNTS["final_score_allowed_rows"],
              "interpretation_guard_count": len(INTERPRETATION_GUARDS),
              "allowed_claim_count": len(ALLOWED_CLAIMS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "next_route_option_count": len(NEXT_ROUTE_OPTIONS),
              "route_decision": route_decision,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "BOSS_eBOSS_independence_assumed": False,
              "ELG_covariance_ready": False,
              "WiggleZ_covariance_ready": False,
              "KiDS_merged_into_RSD": False,
              "all_negative_growth_story_allowed": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "pressure_vector_rows": PRESSURE_VECTOR_ROWS,
              "status_counts": STATUS_COUNTS,
              "interpretation_guards": INTERPRETATION_GUARDS,
              "allowed_claims": ALLOWED_CLAIMS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "BOSS_eBOSS_independence_assumed": False,
                  "ELG_covariance_ready": False,
                  "WiggleZ_covariance_ready": False,
                  "KiDS_merged_into_RSD": False,
                  "all_negative_growth_story_allowed": False,
                  "validation_claim_allowed": False
              }
          }

          json_path = OUTDIR / "tairid_v4_73_nonfinal_pressure_vector_builder.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "nonfinal_pressure_vector_rows_v4_73.csv",
              PRESSURE_VECTOR_ROWS,
              [
                  "family_id",
                  "lane",
                  "current_direction",
                  "direction_detail",
                  "diagnostic_value",
                  "status",
                  "what_it_shows",
                  "main_blocker",
                  "safe_claim_now",
                  "blocked_claim",
                  "may_enter_final_score_now",
                  "next_needed"
              ]
          )

          write_csv(
              OUTDIR / "interpretation_guards_v4_73.csv",
              INTERPRETATION_GUARDS,
              ["guard_id", "guard_text", "active"]
          )

          write_csv(
              OUTDIR / "allowed_claims_v4_73.csv",
              [{"allowed_claim": claim} for claim in ALLOWED_CLAIMS],
              ["allowed_claim"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_73.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_73.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_73.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.73 — Nonfinal Pressure Vector Builder")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
