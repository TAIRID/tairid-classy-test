name: TAIRID Cosmology v3.46 Growth Parser Design Target Review

on:
  workflow_dispatch:

jobs:
  growth-parser-design-target-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v3.46 growth parser design target review
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_46

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v3_46")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_46_growth_parser_design_target_review"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute new pressure scores.",
              "This does not parse final growth constraints.",
              "This reviews growth/consolidation parser-design targets from v3.45 only.",
              "The purpose is to choose the safest first source-specific growth parser target.",
              "No DES, KiDS, or HSC product may be promoted to model-anchor status in this workflow."
          ]

          PREVIOUS_MILESTONE = {
              "v3_45_status": "growth_consolidation_chain_covariance_inventory_passed_ready_for_parser_design",
              "v3_45_failed_gates": [],
              "candidate_count": 120,
              "target_queue_count": 40,
              "reachable_survey_count": 3,
              "total_chain_candidates": 16,
              "total_covariance_candidates": 0,
              "total_data_vector_candidates": 48,
              "total_archive_candidates": 22,
              "kids_ready": True,
              "des_context_recorded": True,
              "hsc_context_recorded": True,
              "next_rule": "Choose the safest DES/KiDS/HSC product family for source-specific parser implementation, still with no pressure scoring or refit."
          }

          REQUIRED_CONTRACT_FIELDS = [
              "source",
              "observable_role",
              "pressure_surface",
              "baseline",
              "parser_status",
              "provenance_status",
              "block_condition",
              "claim_boundary"
          ]

          TARGETS = [
              {
                  "target_id": "kids1000_3x2pt_fiducial_chains",
                  "source": "KiDS_1000",
                  "target_rank": 1,
                  "target_role": "primary_growth_chain_parser_target",
                  "observable_role": "weak_lensing_clustering_growth",
                  "pressure_surface": "consolidation_growth",
                  "baseline": "not_selected_parser_design_only",
                  "archive_url": "https://kids.strw.leidenuniv.nl/DR4/data_files/KiDS1000_3x2pt_fiducial_chains.tar.gz",
                  "readme_url": "https://kids.strw.leidenuniv.nl/DR4/data_files/KiDS1000_3x2pt_fiducial_chains_readme.txt",
                  "why_selected": "v3.45 found KiDS-1000 as the clearest source with chain/archive/readme products.",
                  "parser_status": "target_selected_parser_not_built",
                  "provenance_status": "official_public_kids_data_product_candidate",
                  "block_condition": "blocked_until_archive_member_inventory_and_chain_column_mapping_are_completed",
                  "claim_boundary": "parser_design_target_only_not_model_anchor"
              },
              {
                  "target_id": "kids1000_troster2021_chains",
                  "source": "KiDS_1000",
                  "target_rank": 2,
                  "target_role": "secondary_growth_chain_parser_target",
                  "observable_role": "weak_lensing_clustering_growth",
                  "pressure_surface": "consolidation_growth",
                  "baseline": "not_selected_parser_design_only",
                  "archive_url": "https://kids.strw.leidenuniv.nl/sci_data/troster2021_chains.tar.gz",
                  "readme_url": "",
                  "why_selected": "v3.45 found another KiDS chain archive candidate; useful only after the fiducial KiDS-1000 target.",
                  "parser_status": "secondary_target_parser_not_built",
                  "provenance_status": "official_public_kids_data_product_candidate",
                  "block_condition": "blocked_until_primary_kids1000_target_review_or_archive_inventory",
                  "claim_boundary": "parser_design_target_only_not_model_anchor"
              },
              {
                  "target_id": "des_y3_data_vector_config_context",
                  "source": "DES_Y3",
                  "target_rank": 3,
                  "target_role": "context_followup_not_first_parser_target",
                  "observable_role": "weak_lensing_clustering_growth",
                  "pressure_surface": "consolidation_growth",
                  "baseline": "not_selected_parser_design_only",
                  "archive_url": "",
                  "readme_url": "",
                  "why_selected": "v3.45 recorded DES Y3 context and many data-vector/config candidates, but no clean chain/posterior target from the automatic inventory.",
                  "parser_status": "context_recorded_followup_needed",
                  "provenance_status": "official_or_officially_linked_public_context",
                  "block_condition": "blocked_until_explicit_DES_chain_or_covariance_product_url_is_identified",
                  "claim_boundary": "context_only_not_model_anchor"
              },
              {
                  "target_id": "hsc_y3_data_vector_config_context",
                  "source": "HSC_Y3",
                  "target_rank": 4,
                  "target_role": "context_followup_not_first_parser_target",
                  "observable_role": "weak_lensing_clustering_growth",
                  "pressure_surface": "consolidation_growth",
                  "baseline": "not_selected_parser_design_only",
                  "archive_url": "",
                  "readme_url": "",
                  "why_selected": "v3.45 recorded HSC Y3 context and data-vector/config candidates, but no clean first chain/covariance target.",
                  "parser_status": "context_recorded_followup_needed",
                  "provenance_status": "official_public_hsc_context",
                  "block_condition": "blocked_until_explicit_HSC_chain_or_covariance_product_url_is_identified",
                  "claim_boundary": "context_only_not_model_anchor"
              }
          ]

          PARSER_REQUIREMENTS = [
              {
                  "requirement_id": "archive_member_inventory",
                  "applies_to": "kids1000_3x2pt_fiducial_chains",
                  "required": True,
                  "purpose": "List archive members before parsing chain columns.",
                  "block_if_missing": "Do not build growth parameter rows."
              },
              {
                  "requirement_id": "readme_or_metadata_review",
                  "applies_to": "kids1000_3x2pt_fiducial_chains",
                  "required": True,
                  "purpose": "Use README or metadata to identify chain format and parameter naming.",
                  "block_if_missing": "Do not infer S8/sigma8/Omega_m columns by guesswork."
              },
              {
                  "requirement_id": "parameter_mapping",
                  "applies_to": "kids1000_3x2pt_fiducial_chains",
                  "required": True,
                  "purpose": "Map S8, sigma8, Omega_m, weights, and sample columns if present.",
                  "block_if_missing": "Do not construct consolidation pressure rows."
              },
              {
                  "requirement_id": "family_boundary",
                  "applies_to": "all_growth_targets",
                  "required": True,
                  "purpose": "Keep KiDS, DES, and HSC as survey families, not duplicate independent anchors.",
                  "block_if_missing": "Do not aggregate growth rows."
              },
              {
                  "requirement_id": "no_pressure_score_before_parser",
                  "applies_to": "all_growth_targets",
                  "required": True,
                  "purpose": "Growth pressure scoring waits until source-specific parser rows exist.",
                  "block_if_missing": "Hard stop."
              }
          ]

          NEXT_TEST_QUEUE = [
              {
                  "priority": 1,
                  "next_test": "v3_47_kids1000_chain_archive_member_inventory",
                  "purpose": "Open the selected KiDS-1000 3x2pt fiducial chain archive/readme and inventory members, headers, chain files, and possible S8/sigma8/Omega_m mappings.",
                  "must_include": "archive URL, README URL, member inventory, parameter-name candidates, parser block conditions.",
                  "must_not_include": "growth pressure scoring, two-surface refit, model-anchor promotion, validation claim.",
                  "readiness_if_passes": "KiDS-1000 chain parser implementation may be designed."
              },
              {
                  "priority": 2,
                  "next_test": "later_des_y3_explicit_product_followup",
                  "purpose": "Find explicit DES Y3 chain/covariance/data release products rather than arXiv/context links.",
                  "must_include": "direct product URL, product role, parser status, provenance status.",
                  "must_not_include": "paper-only inference as data product.",
                  "readiness_if_passes": "DES may enter parser-design queue."
              },
              {
                  "priority": 3,
                  "next_test": "later_hsc_y3_explicit_product_followup",
                  "purpose": "Find explicit HSC Y3 public chain/covariance/data-vector products.",
                  "must_include": "direct product URL and release/provenance status.",
                  "must_not_include": "context-only promotion.",
                  "readiness_if_passes": "HSC may enter parser-design queue."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def request_url(url, method="GET", timeout=90, max_bytes=500000):
              if not url:
                  return {
                      "url": url,
                      "status": "",
                      "final_url": "",
                      "content_type": "",
                      "content_length": "",
                      "text_sample": "",
                      "reachable": False,
                      "error": "empty_url"
                  }

              req = urllib.request.Request(
                  url,
                  method=method,
                  headers={
                      "User-Agent": "TAIRID-v3.46-growth-parser-design-target-review/1.0",
                      "Accept": "*/*"
                  }
              )

              try:
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      body = b""
                      if method != "HEAD":
                          body = resp.read(max_bytes)
                      text = body.decode("utf-8", errors="replace") if body else ""
                      return {
                          "url": url,
                          "status": getattr(resp, "status", ""),
                          "final_url": resp.geturl(),
                          "content_type": resp.headers.get("Content-Type", ""),
                          "content_length": resp.headers.get("Content-Length", ""),
                          "text_sample": text[:20000],
                          "reachable": True,
                          "error": ""
                      }
              except Exception as e:
                  if method == "HEAD":
                      return request_url(url, method="GET", timeout=timeout, max_bytes=200000)

                  return {
                      "url": url,
                      "status": "",
                      "final_url": url,
                      "content_type": "",
                      "content_length": "",
                      "text_sample": "",
                      "reachable": False,
                      "error": f"{type(e).__name__}: {e}"
                  }

          def score_readme(text):
              low = text.lower()
              terms = {
                  "s8": ["s8", "s_8", "sigma8", "sigma_8"],
                  "omega_m": ["omega_m", "omegam", "omega matter", "om"],
                  "chain": ["chain", "chains", "sample", "samples", "posterior"],
                  "weight": ["weight", "weights", "loglike", "likelihood"],
                  "cosmology": ["cosmology", "lcdm", "wcdm", "omegak"],
                  "format": ["column", "columns", "parameter", "parameters", "file"]
              }

              matched = {}
              for category, vals in terms.items():
                  hits = sorted(set([v for v in vals if v in low]))
                  if hits:
                      matched[category] = hits

              score = sum(len(v) for v in matched.values())
              return score, matched

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          created_at = now_iso()

          product_probe_rows = []
          target_review_rows = []

          for target in TARGETS:
              archive_probe = request_url(target["archive_url"], method="HEAD") if target["archive_url"] else {
                  "reachable": False,
                  "status": "",
                  "content_type": "",
                  "content_length": "",
                  "error": "no_archive_url"
              }

              readme_probe = request_url(target["readme_url"], method="GET") if target["readme_url"] else {
                  "reachable": False,
                  "status": "",
                  "content_type": "",
                  "content_length": "",
                  "text_sample": "",
                  "error": "no_readme_url"
              }

              readme_score, readme_matches = score_readme(readme_probe.get("text_sample", ""))

              product_probe_rows.append({
                  "target_id": target["target_id"],
                  "source": target["source"],
                  "archive_url": target["archive_url"],
                  "archive_reachable": archive_probe.get("reachable", False),
                  "archive_status": archive_probe.get("status", ""),
                  "archive_content_type": archive_probe.get("content_type", ""),
                  "archive_content_length": archive_probe.get("content_length", ""),
                  "archive_error": archive_probe.get("error", ""),
                  "readme_url": target["readme_url"],
                  "readme_reachable": readme_probe.get("reachable", False),
                  "readme_status": readme_probe.get("status", ""),
                  "readme_content_type": readme_probe.get("content_type", ""),
                  "readme_content_length": readme_probe.get("content_length", ""),
                  "readme_score": readme_score,
                  "readme_matched_categories": ";".join(sorted(readme_matches.keys())),
                  "readme_matched_terms": json.dumps(readme_matches, sort_keys=True),
                  "readme_error": readme_probe.get("error", "")
              })

              target_ready = (
                  target["target_id"] == "kids1000_3x2pt_fiducial_chains"
                  and archive_probe.get("reachable", False) is True
                  and readme_probe.get("reachable", False) is True
                  and readme_score >= 2
              )

              target_review_rows.append({
                  "source": target["source"],
                  "target_id": target["target_id"],
                  "target_rank": target["target_rank"],
                  "target_role": target["target_role"],
                  "observable_role": target["observable_role"],
                  "pressure_surface": target["pressure_surface"],
                  "baseline": target["baseline"],
                  "parser_status": target["parser_status"],
                  "provenance_status": target["provenance_status"],
                  "archive_url": target["archive_url"],
                  "readme_url": target["readme_url"],
                  "archive_reachable": archive_probe.get("reachable", False),
                  "readme_reachable": readme_probe.get("reachable", False),
                  "readme_score": readme_score,
                  "primary_target_ready": target_ready,
                  "why_selected": target["why_selected"],
                  "block_condition": target["block_condition"],
                  "claim_boundary": target["claim_boundary"],
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "new_pressure_score_allowed_now": False
              })

          selected_primary = [
              row for row in target_review_rows
              if row["target_id"] == "kids1000_3x2pt_fiducial_chains"
          ]

          primary_ready = bool(selected_primary and selected_primary[0]["primary_target_ready"] is True)
          kids_archive_reachable = bool(selected_primary and selected_primary[0]["archive_reachable"] is True)
          kids_readme_reachable = bool(selected_primary and selected_primary[0]["readme_reachable"] is True)

          des_marked_followup = any(
              row["target_id"] == "des_y3_data_vector_config_context"
              and row["target_role"] == "context_followup_not_first_parser_target"
              for row in target_review_rows
          )

          hsc_marked_followup = any(
              row["target_id"] == "hsc_y3_data_vector_config_context"
              and row["target_role"] == "context_followup_not_first_parser_target"
              for row in target_review_rows
          )

          no_model_anchors = all(row["model_anchor_allowed_now"] is False for row in target_review_rows)
          no_refits = all(row["refit_allowed_now"] is False for row in target_review_rows)
          no_scores = all(row["new_pressure_score_allowed_now"] is False for row in target_review_rows)

          required_contract_present = True
          for row in target_review_rows:
              for field in REQUIRED_CONTRACT_FIELDS:
                  if field not in row or row[field] in ["", None]:
                      required_contract_present = False

          next_test_ok = (
              NEXT_TEST_QUEUE[0]["next_test"] == "v3_47_kids1000_chain_archive_member_inventory"
              and "growth pressure scoring" in NEXT_TEST_QUEUE[0]["must_not_include"]
              and "two-surface refit" in NEXT_TEST_QUEUE[0]["must_not_include"]
          )

          write_csv(
              OUTDIR / "growth_parser_target_review_v3_46.csv",
              target_review_rows,
              [
                  "source", "target_id", "target_rank", "target_role",
                  "observable_role", "pressure_surface", "baseline",
                  "parser_status", "provenance_status", "archive_url", "readme_url",
                  "archive_reachable", "readme_reachable", "readme_score",
                  "primary_target_ready", "why_selected", "block_condition",
                  "claim_boundary", "model_anchor_allowed_now",
                  "refit_allowed_now", "new_pressure_score_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "growth_parser_product_probe_v3_46.csv",
              product_probe_rows,
              [
                  "target_id", "source", "archive_url", "archive_reachable",
                  "archive_status", "archive_content_type", "archive_content_length",
                  "archive_error", "readme_url", "readme_reachable",
                  "readme_status", "readme_content_type", "readme_content_length",
                  "readme_score", "readme_matched_categories",
                  "readme_matched_terms", "readme_error"
              ]
          )

          write_csv(
              OUTDIR / "growth_parser_requirements_v3_46.csv",
              PARSER_REQUIREMENTS,
              [
                  "requirement_id", "applies_to", "required",
                  "purpose", "block_if_missing"
              ]
          )

          write_csv(
              OUTDIR / "next_test_queue_v3_46.csv",
              NEXT_TEST_QUEUE,
              [
                  "priority", "next_test", "purpose", "must_include",
                  "must_not_include", "readiness_if_passes"
              ]
          )

          audit_rows = [
              {
                  "audit_gate": "primary_kids1000_target_selected",
                  "pass": len(selected_primary) == 1,
                  "value": selected_primary[0]["target_id"] if selected_primary else "",
                  "boundary": "KiDS-1000 3x2pt fiducial chains should be the first parser target."
              },
              {
                  "audit_gate": "primary_archive_reachable",
                  "pass": kids_archive_reachable,
                  "value": kids_archive_reachable,
                  "boundary": "Primary KiDS archive must be reachable before archive inventory."
              },
              {
                  "audit_gate": "primary_readme_reachable",
                  "pass": kids_readme_reachable,
                  "value": kids_readme_reachable,
                  "boundary": "Primary KiDS README/metadata should be reachable before parser implementation."
              },
              {
                  "audit_gate": "primary_target_ready_for_archive_inventory",
                  "pass": primary_ready,
                  "value": primary_ready,
                  "boundary": "Primary target is ready only if archive and README are reachable and metadata terms are present."
              },
              {
                  "audit_gate": "des_marked_followup_not_primary",
                  "pass": des_marked_followup,
                  "value": des_marked_followup,
                  "boundary": "DES should not become first parser target without explicit product URL repair."
              },
              {
                  "audit_gate": "hsc_marked_followup_not_primary",
                  "pass": hsc_marked_followup,
                  "value": hsc_marked_followup,
                  "boundary": "HSC should not become first parser target without explicit product URL repair."
              },
              {
                  "audit_gate": "required_contract_fields_present",
                  "pass": required_contract_present,
                  "value": required_contract_present,
                  "boundary": "source/role/surface/baseline/parser/provenance/block/claim contract must persist."
              },
              {
                  "audit_gate": "no_new_pressure_scores",
                  "pass": no_scores,
                  "value": no_scores,
                  "boundary": "No pressure scores in v3.46."
              },
              {
                  "audit_gate": "no_model_anchors_promoted",
                  "pass": no_model_anchors,
                  "value": no_model_anchors,
                  "boundary": "No model anchors in v3.46."
              },
              {
                  "audit_gate": "no_refit_allowed",
                  "pass": no_refits,
                  "value": no_refits,
                  "boundary": "No refit in v3.46."
              },
              {
                  "audit_gate": "next_step_is_kids_archive_inventory",
                  "pass": next_test_ok,
                  "value": NEXT_TEST_QUEUE[0]["next_test"],
                  "boundary": "Next step should inspect KiDS archive members, not score growth."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No model claim is allowed."
              }
          ]

          write_csv(
              OUTDIR / "growth_parser_target_review_audit_v3_46.csv",
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          hard_failed = []

          if len(selected_primary) != 1:
              hard_failed.append("primary_kids1000_target_not_selected")
          if not kids_archive_reachable:
              hard_failed.append("primary_kids_archive_not_reachable")
          if not kids_readme_reachable:
              hard_failed.append("primary_kids_readme_not_reachable")
          if not primary_ready:
              hard_failed.append("primary_target_not_ready_for_archive_inventory")
          if not des_marked_followup:
              hard_failed.append("des_followup_boundary_missing")
          if not hsc_marked_followup:
              hard_failed.append("hsc_followup_boundary_missing")
          if not required_contract_present:
              hard_failed.append("required_contract_fields_missing")
          if not no_scores:
              hard_failed.append("new_pressure_score_guard_violation")
          if not no_model_anchors:
              hard_failed.append("model_anchor_promotion_violation")
          if not no_refits:
              hard_failed.append("refit_guard_violation")
          if not next_test_ok:
              hard_failed.append("next_test_guard_incomplete")

          if hard_failed:
              readiness_label = "growth_parser_design_target_review_needs_followup"
          else:
              readiness_label = "growth_parser_design_target_review_passed_kids1000_primary_ready_for_archive_inventory"

          next_step = (
              "Build v3.47 KiDS-1000 chain archive member inventory: inspect the selected KiDS-1000 3x2pt fiducial chain archive/readme for member structure, candidate chain files, parameter names, and parser rules, still with no pressure scoring or refit."
              if not hard_failed
              else "Inspect v3.46 outputs and repair KiDS target reachability or metadata before archive inventory."
          )

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "previous_milestone": PREVIOUS_MILESTONE,
              "truth_boundary": TRUTH_BOUNDARY,
              "target_count": len(target_review_rows),
              "primary_target": "kids1000_3x2pt_fiducial_chains",
              "primary_archive_reachable": kids_archive_reachable,
              "primary_readme_reachable": kids_readme_reachable,
              "primary_target_ready": primary_ready,
              "des_marked_followup": des_marked_followup,
              "hsc_marked_followup": hsc_marked_followup,
              "gate_result": {
                  "failed_gates": hard_failed,
                  "readiness_label": readiness_label,
                  "primary_target": "kids1000_3x2pt_fiducial_chains",
                  "primary_archive_reachable": kids_archive_reachable,
                  "primary_readme_reachable": kids_readme_reachable,
                  "primary_target_ready": primary_ready,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "new_pressure_scores_built": False,
                  "next_allowed_step": next_step
              }
          }

          json_path = OUTDIR / "tairid_cosmology_v3_46_growth_parser_design_target_review.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.46 — Growth Parser Design Target Review")
          md.append("")
          md.append(f"Created UTC: `{created_at}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(hard_failed) if hard_failed else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this review does")
          md.append("")
          md.append("v3.46 chooses the safest first growth/consolidation parser target from the v3.45 inventory.")
          md.append("")
          md.append("It selects KiDS-1000 3x2pt fiducial chains as the first parser-design target, while keeping DES and HSC as follow-up/context lanes until explicit products are repaired.")
          md.append("")
          md.append("It does not parse final growth constraints, does not compute pressure scores, and does not run a refit.")
          md.append("")
          md.append("## Results")
          md.append("")
