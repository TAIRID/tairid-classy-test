name: TAIRID Cosmology v3.23 DESI Family Mapping

on:
  workflow_dispatch:

jobs:
  desi-family-mapping:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scientific Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run TAIRID v3.23 DESI family mapping
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_23

          python - <<'PY'
          import csv
          import io
          import json
          import math
          import re
          import shutil
          import tarfile
          import urllib.request
          import zipfile
          from datetime import datetime, timezone
          from pathlib import Path

          import numpy as np

          OUTDIR = Path("artifacts/tairid_cosmology_v3_23")
          DOWNLOADS = OUTDIR / "downloads"
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOADS.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_23_desi_family_mapping"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a cosmological model.",
              "This does not rerun the old two-surface BIC model.",
              "This is a DESI family-mapping test only.",
              "DESI rows are separated by structural family before any later refit can be considered.",
              "BAO expansion-product rows may be mapped as reach/accessibility candidates.",
              "BAO ruler-length rows remain ruler-calibration diagnostics unless promoted by a later rule.",
              "Matter-density rows are not reach/geometry anchors in this workflow.",
              "The algebraic DESI H0 diagnostic remains blocked.",
              "A pass can only allow a later limited prototype refit decision; it still does not validate TAIRID."
          ]

          DESI_CHAIN_URLS = [
              "https://data.desi.lbl.gov/public/dr1/vac/dr1/bao-cosmo-params/v1.0/cobaya/base/desi-bao-all/chain.1.txt",
              "https://data.desi.lbl.gov/public/dr1/vac/dr1/bao-cosmo-params/v1.0/cobaya/base/desi-bao-all/chain.2.txt",
              "https://data.desi.lbl.gov/public/dr1/vac/dr1/bao-cosmo-params/v1.0/cobaya/base/desi-bao-all/chain.3.txt",
              "https://data.desi.lbl.gov/public/dr1/vac/dr1/bao-cosmo-params/v1.0/cobaya/base/desi-bao-all/chain.4.txt"
          ]

          PLANCK_ZIP_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
          PLANCK_MARGESTATS_PATH = "base/plikHM_TTTEEE_lowl_lowE/dist/base_plikHM_TTTEEE_lowl_lowE.margestats"

          KIDS_TARBALL_URL = "https://kids.strw.leidenuniv.nl/DR4/data_files/KiDS1000_cosmic_shear_data_release.tgz"
          KIDS_STATS = ["xipm", "bp", "cosebis"]

          DIRECT_DESI_REACH_CANDIDATES = [
              "H0rdrag",
              "rdrag",
              "hrdrag",
              "omegamh2",
              "omm",
              "omegam"
          ]

          STRUCTURAL_FAMILY_MAP = {
              "H0rdrag": {
                  "candidate_family": "bao_expansion_product",
                  "mapped_role": "reach_accessibility_candidate",
                  "mapped_surface": "reach_geometry",
                  "eligible_for_later_limited_refit": True,
                  "reason": "Direct BAO expansion-ruler product; closest DESI direct parameter family to reach/accessibility pressure."
              },
              "hrdrag": {
                  "candidate_family": "bao_expansion_product",
                  "mapped_role": "reach_accessibility_candidate",
                  "mapped_surface": "reach_geometry",
                  "eligible_for_later_limited_refit": True,
                  "reason": "Direct BAO expansion-ruler product; scaled counterpart of H0rdrag."
              },
              "rdrag": {
                  "candidate_family": "bao_ruler_length",
                  "mapped_role": "ruler_calibration_diagnostic",
                  "mapped_surface": "ruler_reference",
                  "eligible_for_later_limited_refit": False,
                  "reason": "Standard-ruler length is a calibration/ruler reference diagnostic, not a pure reach anchor here."
              },
              "omegamh2": {
                  "candidate_family": "physical_matter_density",
                  "mapped_role": "density_constraint_diagnostic",
                  "mapped_surface": "constraint_density",
                  "eligible_for_later_limited_refit": False,
                  "reason": "Physical matter density is a density/constraint diagnostic, not a reach/accessibility anchor."
              },
              "omm": {
                  "candidate_family": "matter_fraction",
                  "mapped_role": "density_constraint_diagnostic",
                  "mapped_surface": "constraint_density",
                  "eligible_for_later_limited_refit": False,
                  "reason": "Matter fraction is a density/constraint diagnostic, not a reach/accessibility anchor."
              },
              "omegam": {
                  "candidate_family": "matter_fraction",
                  "mapped_role": "density_constraint_diagnostic",
                  "mapped_surface": "constraint_density",
                  "eligible_for_later_limited_refit": False,
                  "reason": "Matter fraction is a density/constraint diagnostic, not a reach/accessibility anchor."
              }
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def download(url, path, timeout=300):
              path.parent.mkdir(parents=True, exist_ok=True)
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.23-desi-family-mapping/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed: HTTP {status}")
                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)
                  return {
                      "url": url,
                      "path": str(path),
                      "status": status,
                      "size_bytes": path.stat().st_size,
                      "content_type": resp.headers.get("Content-Type"),
                      "content_length_header": resp.headers.get("Content-Length")
                  }

          def token_is_numeric(token):
              try:
                  float(token)
                  return True
              except Exception:
                  return False

          def split_chain_text(text):
              comment_lines = []
              data_lines = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped:
                      continue
                  if stripped.startswith("#"):
                      comment_lines.append(stripped)
                  else:
                      data_lines.append(stripped)

              if not data_lines:
                  raise RuntimeError("No numeric chain rows found.")

              data = np.loadtxt(io.StringIO("\n".join(data_lines)))
              if data.ndim == 1:
                  data = data.reshape((1, -1))

              return comment_lines, data

          def detect_chain_header(comment_lines, ncols):
              candidates = []
              for line in comment_lines:
                  candidate = line.lstrip("#").strip()
                  if not candidate:
                      continue

                  tokens = re.split(r"\s+", candidate)
                  if len(tokens) != ncols:
                      continue

                  numeric_count = sum(1 for t in tokens if token_is_numeric(t))
                  parameterish_count = sum(
                      1 for t in tokens
                      if t in ["weight", "minuslogpost", "minuslogprior", "chi2"]
                      or t in ["omm", "omegam", "rdrag", "H0rdrag", "hrdrag", "omegamh2"]
                      or "--" in t
                      or "COSMOLOGICAL" in t.upper()
                  )

                  if numeric_count > 0:
                      continue

                  if parameterish_count < max(3, ncols // 5):
                      continue

                  candidates.append(tokens)

              if not candidates:
                  return [f"col_{i}" for i in range(ncols)], False

              return candidates[0], True

          def parse_chain_file(path):
              text = path.read_text(encoding="utf-8", errors="replace")
              comment_lines, data = split_chain_text(text)
              header, header_detected = detect_chain_header(comment_lines, data.shape[1])
              return header, data, header_detected

          def weight_array(header, data):
              col = {name: i for i, name in enumerate(header)}
              if "weight" in col:
                  return data[:, col["weight"]], "weight"
              return np.ones(data.shape[0]), None

          def weighted_quantile(values, weights, qs):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)
              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)
              values = values[mask]
              weights = weights[mask]

              if len(values) == 0:
                  return [None for _ in qs]

              if np.sum(weights) <= 0:
                  weights = np.ones_like(values)

              order = np.argsort(values)
              values = values[order]
              weights = weights[order]
              cumulative = np.cumsum(weights)
              cumulative = cumulative / cumulative[-1]

              return [float(np.interp(q, cumulative, values)) for q in qs]

          def summarize_parameter(values, weights):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)
              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)
              values = values[mask]
              weights = weights[mask]

              if len(values) == 0:
                  raise RuntimeError("No finite values available.")

              q16, q50, q84 = weighted_quantile(values, weights, [0.16, 0.50, 0.84])
              mean = float(np.average(values, weights=weights)) if np.sum(weights) > 0 else float(np.mean(values))
              sigma = (q84 - q16) / 2.0 if q16 is not None and q84 is not None else None

              return {
                  "mean": mean,
                  "q16": q16,
                  "q50": q50,
                  "q84": q84,
                  "sigma": sigma,
                  "min": float(np.min(values)),
                  "max": float(np.max(values)),
                  "row_count": int(len(values))
              }

          def parse_planck_margestats(text):
              rows = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("Marginalized") or stripped.startswith("parameter"):
                      continue

                  parts = stripped.split()
                  if len(parts) < 12:
                      continue

                  name_raw = parts[0]
                  name = name_raw.rstrip("*")

                  try:
                      rows.append({
                          "parameter_raw": name_raw,
                          "parameter": name,
                          "mean": float(parts[1]),
                          "sddev": float(parts[2]),
                          "lower1": float(parts[3]),
                          "upper1": float(parts[4]),
                          "lower2": float(parts[6]),
                          "upper2": float(parts[7]),
                          "lower3": float(parts[9]),
                          "upper3": float(parts[10]),
                          "label": " ".join(parts[12:]) if len(parts) > 12 else ""
                      })
                  except Exception:
                      continue

              return rows

          def load_planck_reference():
              planck_dir = DOWNLOADS / "Planck_2018"
              zip_path = planck_dir / "COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
              dl = download(PLANCK_ZIP_URL, zip_path)

              with zipfile.ZipFile(zip_path, "r") as zf:
                  if PLANCK_MARGESTATS_PATH not in zf.namelist():
                      raise RuntimeError(f"Missing Planck margestats product: {PLANCK_MARGESTATS_PATH}")
                  text = zf.read(PLANCK_MARGESTATS_PATH).decode("utf-8", errors="replace")

              rows = parse_planck_margestats(text)
              marg = {r["parameter"]: r for r in rows}

              return {
                  "download": dl,
                  "marginal_rows": marg,
                  "has_H0": "H0" in marg,
                  "has_S8": "S8" in marg,
                  "has_rdrag": "rdrag" in marg,
                  "has_omegam": "omegam" in marg,
                  "has_omegamh2": "omegamh2" in marg
              }

          def planck_param(planck, param):
              row = planck["marginal_rows"].get(param)
              if row is None:
                  return None
              return {
                  "parameter": param,
                  "mean": float(row["mean"]),
                  "sigma": float(row["sddev"]),
                  "source": "Planck_margestats_reference"
              }

          def planck_product(planck, a, b, product_name, scale=1.0):
              pa = planck_param(planck, a)
              pb = planck_param(planck, b)
              if pa is None or pb is None:
                  return None

              mean = pa["mean"] * pb["mean"] * scale
              sigma = scale * math.sqrt(
                  (pb["mean"] ** 2) * (pa["sigma"] ** 2)
                  + (pa["mean"] ** 2) * (pb["sigma"] ** 2)
              )

              return {
                  "parameter": product_name,
                  "mean": mean,
                  "sigma": sigma,
                  "source": "Planck_margestats_independent_error_fallback"
              }

          def load_desi_candidates(planck):
              desi_dir = DOWNLOADS / "DESI_DR1_BAO"
              desi_dir.mkdir(parents=True, exist_ok=True)

              parts = []
              header_ref = None
              header_detected_all = True
              downloads = []
              shape_rows = []

              for url in DESI_CHAIN_URLS:
                  fname = url.rstrip("/").split("/")[-1]
                  path = desi_dir / fname
                  downloads.append(download(url, path))

                  header, data, header_detected = parse_chain_file(path)

                  if header_ref is None:
                      header_ref = header
                  elif len(header) != len(header_ref):
                      raise RuntimeError(f"DESI header width mismatch in {fname}")

                  parts.append(data)
                  header_detected_all = header_detected_all and header_detected
                  shape_rows.append({
                      "file": fname,
                      "rows": int(data.shape[0]),
                      "columns": int(data.shape[1]),
                      "header_detected": header_detected
                  })

              data = np.vstack(parts)
              weights, weight_col = weight_array(header_ref, data)
              col = {name: i for i, name in enumerate(header_ref)}

              rows = []

              for param in DIRECT_DESI_REACH_CANDIDATES:
                  if param not in col:
                      continue

                  summary = summarize_parameter(data[:, col[param]], weights)

                  ref = None
                  comparison = ""

                  if param == "rdrag":
                      ref = planck_param(planck, "rdrag")
                      comparison = "Planck_rdrag"
                  elif param == "H0rdrag":
                      ref = planck_product(planck, "H0", "rdrag", "H0_times_rdrag")
                      comparison = "Planck_H0_times_rdrag"
                  elif param == "hrdrag":
                      ref = planck_product(planck, "H0", "rdrag", "h_times_rdrag", scale=0.01)
                      comparison = "Planck_h_times_rdrag"
                  elif param == "omegamh2":
                      ref = planck_param(planck, "omegamh2")
                      comparison = "Planck_omegamh2"
                  elif param in ["omm", "omegam"]:
                      ref = planck_param(planck, "omegam")
                      comparison = "Planck_omegam"

                  pressure = None
                  combined_sigma = None

                  if ref is not None and summary["sigma"] is not None:
                      combined_sigma = math.sqrt(summary["sigma"] ** 2 + ref["sigma"] ** 2)
                      pressure = (summary["q50"] - ref["mean"]) / combined_sigma if combined_sigma > 0 else None

                  mapping = STRUCTURAL_FAMILY_MAP.get(param, {
                      "candidate_family": "unmapped",
                      "mapped_role": "unmapped",
                      "mapped_surface": "unmapped",
                      "eligible_for_later_limited_refit": False,
                      "reason": "No predeclared structural mapping."
                  })

                  rows.append({
                      "source": "DESI_DR1_BAO",
                      "original_surface": "reach_geometry",
                      "parameter": param,
                      "candidate_family": mapping["candidate_family"],
                      "mapped_role": mapping["mapped_role"],
                      "mapped_surface": mapping["mapped_surface"],
                      "desi_q16": summary["q16"],
                      "desi_q50": summary["q50"],
                      "desi_q84": summary["q84"],
                      "desi_sigma": summary["sigma"],
                      "planck_comparison": comparison,
                      "planck_reference_value": ref["mean"] if ref else "",
                      "planck_reference_sigma": ref["sigma"] if ref else "",
                      "combined_sigma": combined_sigma if combined_sigma is not None else "",
                      "pressure_vs_planck_z": pressure if pressure is not None else "",
                      "pressure_sign": "positive" if pressure is not None and pressure > 0 else "negative" if pressure is not None and pressure < 0 else "unscored",
                      "predeclared_structural_mapping": True,
                      "eligible_for_later_limited_refit": mapping["eligible_for_later_limited_refit"] and pressure is not None,
                      "model_anchor_allowed_now": False,
                      "mapping_reason": mapping["reason"]
                  })

              # Keep blocked algebraic H0 visible.
              if "H0rdrag" in col and "rdrag" in col:
                  h0 = data[:, col["H0rdrag"]] / data[:, col["rdrag"]]
                  summary = summarize_parameter(h0, weights)
                  ref = planck_param(planck, "H0")
                  pressure = None
                  combined_sigma = None

                  if ref and summary["sigma"] is not None:
                      combined_sigma = math.sqrt(summary["sigma"] ** 2 + ref["sigma"] ** 2)
                      pressure = (summary["q50"] - ref["mean"]) / combined_sigma

                  rows.append({
                      "source": "DESI_DR1_BAO",
                      "original_surface": "reach_geometry",
                      "parameter": "H0_derived_from_H0rdrag_over_rdrag",
                      "candidate_family": "blocked_algebraic_h0",
                      "mapped_role": "blocked_algebraic_diagnostic",
                      "mapped_surface": "blocked",
                      "desi_q16": summary["q16"],
                      "desi_q50": summary["q50"],
                      "desi_q84": summary["q84"],
                      "desi_sigma": summary["sigma"],
                      "planck_comparison": "Planck_H0",
                      "planck_reference_value": ref["mean"] if ref else "",
                      "planck_reference_sigma": ref["sigma"] if ref else "",
                      "combined_sigma": combined_sigma if combined_sigma is not None else "",
                      "pressure_vs_planck_z": pressure if pressure is not None else "",
                      "pressure_sign": "positive" if pressure is not None and pressure > 0 else "negative" if pressure is not None and pressure < 0 else "unscored",
                      "predeclared_structural_mapping": True,
                      "eligible_for_later_limited_refit": False,
                      "model_anchor_allowed_now": False,
                      "mapping_reason": "Blocked because H0 is algebraically derived from H0rdrag/rdrag."
                  })

              return {
                  "downloads": downloads,
                  "combined_rows": int(data.shape[0]),
                  "combined_columns": int(data.shape[1]),
                  "header_detected_all": header_detected_all,
                  "weight_column": weight_col,
                  "shape_rows": shape_rows,
                  "mapped_rows": rows
              }

          def load_kids_growth(planck):
              kids_dir = DOWNLOADS / "KiDS_1000"
              kids_dir.mkdir(parents=True, exist_ok=True)
              tar_path = kids_dir / "KiDS1000_cosmic_shear_data_release.tgz"
              dl = download(KIDS_TARBALL_URL, tar_path)

              extract_dir = OUTDIR / "kids_1000_extracted"
              extract_dir.mkdir(parents=True, exist_ok=True)

              with tarfile.open(tar_path, "r:gz") as tf:
                  safe_members = []
                  for member in tf.getmembers():
                      target = (extract_dir / member.name).resolve()
                      if str(target).startswith(str(extract_dir.resolve())):
                          safe_members.append(member)
                  tf.extractall(extract_dir, members=safe_members)

              bases = [
                  p for p in extract_dir.iterdir()
                  if p.is_dir() and "KiDS1000" in p.name and "shear_data_release" in p.name
              ]
              if not bases:
                  raise RuntimeError("Could not find KiDS extracted base directory.")

              base = bases[0]
              planck_s8 = planck_param(planck, "S8")
              if planck_s8 is None:
                  raise RuntimeError("Planck S8 reference missing.")

              rows = []

              for stat in KIDS_STATS:
                  chain_path = base / "chains_and_config_files" / "main_chains_iterative_covariance" / stat / "chain" / "output_multinest_C.txt"
                  header, data, header_detected = parse_chain_file(chain_path)
                  col = {name: i for i, name in enumerate(header)}
                  if "COSMOLOGICAL_PARAMETERS--S_8" not in col:
                      raise RuntimeError(f"KiDS S8 column missing for {stat}.")

                  weights, weight_col = weight_array(header, data)
                  summary = summarize_parameter(data[:, col["COSMOLOGICAL_PARAMETERS--S_8"]], weights)
                  combined_sigma = math.sqrt(summary["sigma"] ** 2 + planck_s8["sigma"] ** 2)
                  pressure = (summary["q50"] - planck_s8["mean"]) / combined_sigma

                  rows.append({
                      "surface": "consolidation_growth",
                      "source": "KiDS_1000",
                      "family": "KiDS_1000",
                      "statistic": stat,
                      "s8_q16": summary["q16"],
                      "s8_q50": summary["q50"],
                      "s8_q84": summary["q84"],
                      "s8_sigma": summary["sigma"],
                      "pressure_vs_planck_z": pressure,
                      "pressure_sign": "negative" if pressure < 0 else "positive" if pressure > 0 else "zero",
                      "model_anchor_allowed": True,
                      "boundary_note": "KiDS chain-derived S8 row; same-survey family members, not independent surveys."
                  })

              return {
                  "download": dl,
                  "rows": rows,
                  "all_negative": all(r["pressure_sign"] == "negative" for r in rows),
                  "mean_pressure_z": float(np.mean([r["pressure_vs_planck_z"] for r in rows])),
                  "min_pressure_z": float(np.min([r["pressure_vs_planck_z"] for r in rows])),
                  "max_pressure_z": float(np.max([r["pressure_vs_planck_z"] for r in rows]))
              }

          def summarize_mapped_families(mapped_rows):
              direct = [
                  r for r in mapped_rows
                  if r["parameter"] != "H0_derived_from_H0rdrag_over_rdrag"
                  and r["pressure_vs_planck_z"] != ""
              ]

              families = sorted(set(r["candidate_family"] for r in direct))
              family_rows = []

              for family in families:
                  rows = [r for r in direct if r["candidate_family"] == family]
                  pressures = [float(r["pressure_vs_planck_z"]) for r in rows]
                  signs = sorted(set(r["pressure_sign"] for r in rows))
                  roles = sorted(set(r["mapped_role"] for r in rows))
                  surfaces = sorted(set(r["mapped_surface"] for r in rows))
                  eligible_rows = [r for r in rows if r["eligible_for_later_limited_refit"] is True]

                  representative = sorted(rows, key=lambda r: abs(float(r["pressure_vs_planck_z"])), reverse=True)[0]

                  family_rows.append({
                      "candidate_family": family,
                      "mapped_roles": ";".join(roles),
                      "mapped_surfaces": ";".join(surfaces),
                      "candidate_count": len(rows),
                      "eligible_count": len(eligible_rows),
                      "representative_parameter": representative["parameter"],
                      "representative_pressure_z": representative["pressure_vs_planck_z"],
                      "representative_sign": representative["pressure_sign"],
                      "mean_pressure_z": float(np.mean(pressures)),
                      "min_pressure_z": float(np.min(pressures)),
                      "max_pressure_z": float(np.max(pressures)),
                      "signs_present": ";".join(signs),
                      "family_coherent": len(signs) == 1,
                      "model_anchor_allowed_now": False,
                      "boundary_note": "Mapped family summary; not promoted to model anchor in this workflow."
                  })

              return family_rows

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "previous_milestone": {
                  "v3_22_status": "refit_decision_passed_reach_families_mixed_mapping_needed_before_refit",
                  "v3_22_next_allowed_step": "Build v3.23 DESI family-mapping test before refit."
              },
              "truth_boundary": TRUTH_BOUNDARY,
              "source_summaries": {},
              "gate_result": {}
          }

          print("TAIRID Cosmology v3.23 DESI family mapping")
          print("Truth boundary: family mapping only; no refit; no validation claim.")
          print()

          failed_gates = []

          try:
              planck = load_planck_reference()
              inventory["source_summaries"]["Planck_2018"] = {
                  "has_H0": planck["has_H0"],
                  "has_S8": planck["has_S8"],
                  "has_rdrag": planck["has_rdrag"],
                  "has_omegam": planck["has_omegam"],
                  "has_omegamh2": planck["has_omegamh2"],
                  "download": planck["download"]
              }
              print("Planck loaded.")
          except Exception as e:
              failed_gates.append("planck_load_failed")
              planck = None
              inventory["source_summaries"]["Planck_2018"] = {"error": f"{type(e).__name__}: {e}"}
              print(f"Planck failed: {type(e).__name__}: {e}")

          try:
              desi = load_desi_candidates(planck)
              inventory["source_summaries"]["DESI_DR1_BAO"] = {
                  "combined_rows": desi["combined_rows"],
                  "combined_columns": desi["combined_columns"],
                  "header_detected_all": desi["header_detected_all"],
                  "mapped_row_count": len(desi["mapped_rows"]),
                  "weight_column": desi["weight_column"],
                  "shape_rows": desi["shape_rows"]
              }
              print("DESI loaded and mapped.")
          except Exception as e:
              failed_gates.append("desi_mapping_failed")
              desi = {"mapped_rows": []}
              inventory["source_summaries"]["DESI_DR1_BAO"] = {"error": f"{type(e).__name__}: {e}"}
              print(f"DESI failed: {type(e).__name__}: {e}")

          try:
              kids = load_kids_growth(planck)
              inventory["source_summaries"]["KiDS_1000"] = {
                  "row_count": len(kids["rows"]),
                  "all_negative": kids["all_negative"],
                  "mean_pressure_z": kids["mean_pressure_z"],
                  "min_pressure_z": kids["min_pressure_z"],
                  "max_pressure_z": kids["max_pressure_z"]
              }
              print("KiDS loaded.")
          except Exception as e:
              failed_gates.append("kids_load_failed")
              kids = {"rows": [], "all_negative": False}
              inventory["source_summaries"]["KiDS_1000"] = {"error": f"{type(e).__name__}: {e}"}
              print(f"KiDS failed: {type(e).__name__}: {e}")

          mapped_rows = desi.get("mapped_rows", [])
          family_rows = summarize_mapped_families(mapped_rows)

          mapped_csv = OUTDIR / "desi_family_mapping_rows_v3_23.csv"
          mapped_fields = [
              "source", "original_surface", "parameter",
              "candidate_family", "mapped_role", "mapped_surface",
              "desi_q16", "desi_q50", "desi_q84", "desi_sigma",
              "planck_comparison", "planck_reference_value",
              "planck_reference_sigma", "combined_sigma",
              "pressure_vs_planck_z", "pressure_sign",
              "predeclared_structural_mapping",
              "eligible_for_later_limited_refit",
              "model_anchor_allowed_now", "mapping_reason"
          ]
          with mapped_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=mapped_fields)
              writer.writeheader()
              for row in mapped_rows:
                  writer.writerow({k: row.get(k) for k in mapped_fields})

          family_csv = OUTDIR / "desi_mapped_family_summary_v3_23.csv"
          family_fields = [
              "candidate_family", "mapped_roles", "mapped_surfaces",
              "candidate_count", "eligible_count",
              "representative_parameter", "representative_pressure_z",
              "representative_sign", "mean_pressure_z",
              "min_pressure_z", "max_pressure_z",
              "signs_present", "family_coherent",
              "model_anchor_allowed_now", "boundary_note"
          ]
          with family_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=family_fields)
              writer.writeheader()
              for row in family_rows:
                  writer.writerow(row)

          kids_csv = OUTDIR / "kids_growth_rows_v3_23.csv"
          with kids_csv.open("w", newline="", encoding="utf-8") as f:
              fieldnames = [
                  "surface", "source", "family", "statistic",
                  "s8_q16", "s8_q50", "s8_q84", "s8_sigma",
                  "pressure_vs_planck_z", "pressure_sign",
                  "model_anchor_allowed", "boundary_note"
              ]
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              for row in kids.get("rows", []):
                  writer.writerow(row)

          reach_accessibility_rows = [
              r for r in mapped_rows
              if r.get("mapped_role") == "reach_accessibility_candidate"
              and r.get("eligible_for_later_limited_refit") is True
          ]

          reach_accessibility_positive = (
              len(reach_accessibility_rows) > 0
              and all(r["pressure_sign"] == "positive" for r in reach_accessibility_rows)
          )

          reach_accessibility_coherent = (
              len(set(r["pressure_sign"] for r in reach_accessibility_rows)) == 1
              if reach_accessibility_rows else False
          )

          blocked_algebraic_rows = [
              r for r in mapped_rows
              if r["parameter"] == "H0_derived_from_H0rdrag_over_rdrag"
              and r["eligible_for_later_limited_refit"] is False
          ]

          density_rows_excluded = [
              r for r in mapped_rows
              if r.get("mapped_role") == "density_constraint_diagnostic"
              and r.get("eligible_for_later_limited_refit") is False
          ]

          ruler_rows_excluded = [
              r for r in mapped_rows
              if r.get("mapped_role") == "ruler_calibration_diagnostic"
              and r.get("eligible_for_later_limited_refit") is False
          ]

          kids_growth_ready = len(kids.get("rows", [])) == 3 and kids.get("all_negative") is True

          limited_mapped_refit_decision_allowed = (
              not failed_gates
              and reach_accessibility_positive
              and reach_accessibility_coherent
              and kids_growth_ready
              and len(blocked_algebraic_rows) == 1
              and len(density_rows_excluded) >= 2
              and len(ruler_rows_excluded) >= 1
          )

          audit_rows = [
              {
                  "audit_gate": "source_loads_completed",
                  "pass": len(failed_gates) == 0,
                  "value": ";".join(failed_gates) if failed_gates else "none",
                  "boundary": "All source loads must complete before mapping decision."
              },
              {
                  "audit_gate": "predeclared_mapping_applied",
                  "pass": all(r.get("predeclared_structural_mapping") is True for r in mapped_rows),
                  "value": len(mapped_rows),
                  "boundary": "Mapping must be structural, not chosen after seeing signs."
              },
              {
                  "audit_gate": "reach_accessibility_family_positive",
                  "pass": reach_accessibility_positive,
                  "value": ";".join([f"{r['parameter']}={r['pressure_vs_planck_z']}" for r in reach_accessibility_rows]),
                  "boundary": "Only BAO expansion-product rows are tested as reach/accessibility candidates."
              },
              {
                  "audit_gate": "density_rows_excluded_from_reach",
                  "pass": len(density_rows_excluded) >= 2,
                  "value": len(density_rows_excluded),
                  "boundary": "Matter density and matter fraction rows must not be mixed into reach/geometry."
              },
              {
                  "audit_gate": "ruler_length_excluded_from_reach_anchor",
                  "pass": len(ruler_rows_excluded) >= 1,
                  "value": len(ruler_rows_excluded),
                  "boundary": "rdrag is kept as ruler-calibration diagnostic here."
              },
              {
                  "audit_gate": "algebraic_h0_diagnostic_blocked",
                  "pass": len(blocked_algebraic_rows) == 1,
                  "value": len(blocked_algebraic_rows),
                  "boundary": "H0 from H0rdrag/rdrag remains blocked."
              },
              {
                  "audit_gate": "kids_growth_family_ready",
                  "pass": kids_growth_ready,
                  "value": kids.get("mean_pressure_z", ""),
                  "boundary": "KiDS growth rows must remain source-derived and negative."
              },
              {
                  "audit_gate": "limited_mapped_refit_decision_allowed",
                  "pass": limited_mapped_refit_decision_allowed,
                  "value": limited_mapped_refit_decision_allowed,
                  "boundary": "Allows only a later prototype refit decision, not validation."
              }
          ]

          audit_csv = OUTDIR / "desi_family_mapping_audit_v3_23.csv"
          with audit_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["audit_gate", "pass", "value", "boundary"])
              writer.writeheader()
              for row in audit_rows:
                  writer.writerow(row)

          if failed_gates:
              readiness_label = "desi_family_mapping_failed_source_followup_needed"
          elif limited_mapped_refit_decision_allowed:
              readiness_label = "desi_family_mapping_passed_ready_for_v3_24_limited_mapped_two_surface_refit"
          elif reach_accessibility_positive and kids_growth_ready:
              readiness_label = "desi_family_mapping_passed_review_needed_before_refit"
          else:
              readiness_label = "desi_family_mapping_passed_no_refit_allowed_more_reach_work_needed"

          if limited_mapped_refit_decision_allowed:
              next_step = "Build v3.24 limited mapped two-surface refit using only DESI BAO expansion-product reach candidates and KiDS growth anchors, with no validation claim."
          else:
              next_step = "Do not refit yet. Review DESI mapping output and improve reach-source interpretation before model comparison."

          inventory["mapped_row_count"] = len(mapped_rows)
          inventory["mapped_family_count"] = len(family_rows)
          inventory["reach_accessibility_candidate_count"] = len(reach_accessibility_rows)
          inventory["reach_accessibility_positive"] = reach_accessibility_positive
          inventory["kids_growth_ready"] = kids_growth_ready
          inventory["limited_mapped_refit_decision_allowed"] = limited_mapped_refit_decision_allowed

          inventory["gate_result"] = {
              "failed_gates": failed_gates,
              "readiness_label": readiness_label,
              "mapped_row_count": len(mapped_rows),
              "mapped_family_count": len(family_rows),
              "reach_accessibility_candidate_count": len(reach_accessibility_rows),
              "reach_accessibility_positive": reach_accessibility_positive,
              "kids_growth_ready": kids_growth_ready,
              "limited_mapped_refit_decision_allowed": limited_mapped_refit_decision_allowed,
              "model_claim_allowed": False,
              "old_two_surface_bic_rerun_allowed": False,
              "next_allowed_step": next_step
          }

          json_path = OUTDIR / "tairid_cosmology_v3_23_desi_family_mapping.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.23 — DESI Family Mapping")
          md.append("")
          md.append(f"Created UTC: `{inventory['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(failed_gates) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v3.23 maps DESI candidate families before any refit is allowed.")
          md.append("")
          md.append("- `H0rdrag` and `hrdrag` are mapped as BAO expansion-product reach/accessibility candidates.")
          md.append("- `rdrag` is mapped as a ruler-calibration diagnostic.")
          md.append("- `omegamh2`, `omm`, and `omegam` are mapped as density/constraint diagnostics.")
          md.append("- `H0rdrag/rdrag` remains blocked as an algebraic H0 diagnostic.")
          md.append("")
          md.append("## Results")
          md.append("")
          md.append(f"- Mapped DESI rows: `{len(mapped_rows)}`")
          md.append(f"- Mapped families: `{len(family_rows)}`")
          md.append(f"- Reach/accessibility candidate rows: `{len(reach_accessibility_rows)}`")
          md.append(f"- Reach/accessibility positive: `{reach_accessibility_positive}`")
          md.append(f"- KiDS growth ready: `{kids_growth_ready}`")
          md.append(f"- Limited mapped refit decision allowed: `{limited_mapped_refit_decision_allowed}`")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          if limited_mapped_refit_decision_allowed:
              md.append("The mapping gate passed. A later limited prototype refit is allowed, but only using the mapped reach/accessibility family and KiDS growth anchors. This is not validation.")
          else:
              md.append("The mapping gate passed as an audit, but it does not yet allow a refit.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `desi_family_mapping_rows_v3_23.csv`")
          md.append("- `desi_mapped_family_summary_v3_23.csv`")
          md.append("- `kids_growth_rows_v3_23.csv`")
          md.append("- `desi_family_mapping_audit_v3_23.csv`")
          md.append("- `tairid_cosmology_v3_23_desi_family_mapping.json`")
          md.append("- `tairid_cosmology_v3_23_desi_family_mapping.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_23_desi_family_mapping.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.23 DESI family mapping artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-23-desi-family-mapping
          path: artifacts/tairid_cosmology_v3_23/
