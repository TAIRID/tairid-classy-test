name: TAIRID v4.31 RSD Covariance Product Locator

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-31-rsd-covariance-product-locator.yml"

jobs:
  tairid-v4-31-rsd-covariance-product-locator:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.31 RSD covariance product locator
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_31_rsd_covariance_product_locator

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_31_rsd_covariance_product_locator")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_31_rsd_covariance_product_locator"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run an RSD likelihood.",
              "This does not compute a final RSD pressure score.",
              "This does not import or apply an RSD covariance matrix.",
              "This locates and classifies candidate public covariance/product lanes for future RSD testing.",
              "A pass means product locator lanes are documented, not that covariance-aware testing has been completed."
          ]

          SOURCE_PAGES = [
              {
                  "source_page_id": "sdss_final_bao_rsd_measurements",
                  "survey_scope": "SDSS_BOSS_eBOSS",
                  "url": "https://www.sdss4.org/science/final-bao-and-rsd-measurements/",
                  "expected_role": "official final BAO/RSD measurement page with links toward likelihoods, covariance matrices, chains, and SDSS products",
                  "expected_keywords": ["likelihood", "covariance", "cosmoMC", "BAO", "RSD", "f"],
                  "official_status": "official_locator_page"
              },
              {
                  "source_page_id": "boss_dr12_publications_results",
                  "survey_scope": "BOSS_DR12",
                  "url": "https://www.sdss3.org/science/boss_publications.php",
                  "expected_role": "official BOSS results page listing measurements, covariance matrices, likelihoods, figures, and SAS locations",
                  "expected_keywords": ["covariance", "likelihood", "measurements", "BOSS", "DR12", "RSD"],
                  "official_status": "official_locator_page"
              },
              {
                  "source_page_id": "cosmosis_boss_dr12_module",
                  "survey_scope": "BOSS_DR12",
                  "url": "https://cosmosis.readthedocs.io/en/latest/reference/standard_library/boss_dr12.html",
                  "expected_role": "implementation reference showing BOSS DR12 likelihood use of DM, H(z), and f_sigma8 style data",
                  "expected_keywords": ["boss", "DR12", "likelihood", "f", "sigma", "covariance"],
                  "official_status": "implementation_reference_not_primary_data"
              },
              {
                  "source_page_id": "wigglez_final_results_paper",
                  "survey_scope": "WiggleZ",
                  "url": "https://doi.org/10.1103/PhysRevD.86.103518",
                  "expected_role": "WiggleZ final results reference; covariance product path still needs review",
                  "expected_keywords": ["WiggleZ", "growth", "covariance", "survey"],
                  "official_status": "paper_reference_product_path_unresolved"
              }
          ]

          PRODUCT_LANES = [
              {
                  "product_lane_id": "boss_dr12_consensus_likelihood_covariance",
                  "survey_family": "BOSS_DR12",
                  "source_page_id": "boss_dr12_publications_results",
                  "product_type_needed": "covariance_or_gaussian_likelihood_for_DR12_consensus_BAO_RSD_or_full_shape_rows",
                  "current_locator_status": "official_locator_page_declared",
                  "direct_product_path_status": "not_imported_in_v4_31",
                  "covariance_imported_now": False,
                  "ready_for_pressure_now": False,
                  "boundary": "BOSS DR12 rows cannot be final-scored until exact covariance/likelihood product and row mapping are selected."
              },
              {
                  "product_lane_id": "boss_dr12_full_shape_measurement_covariance",
                  "survey_family": "BOSS_DR12",
                  "source_page_id": "boss_dr12_publications_results",
                  "product_type_needed": "correlation_function_or_power_spectrum_RSD_measurement_covariance",
                  "current_locator_status": "official_locator_page_declared",
                  "direct_product_path_status": "not_imported_in_v4_31",
                  "covariance_imported_now": False,
                  "ready_for_pressure_now": False,
                  "boundary": "Full-shape covariance must not be confused with the compressed f_sigma8 summary row without mapping."
              },
              {
                  "product_lane_id": "eboss_dr16_final_bao_rsd_likelihood_covariance",
                  "survey_family": "eBOSS_DR16",
                  "source_page_id": "sdss_final_bao_rsd_measurements",
                  "product_type_needed": "final SDSS BAO/RSD likelihoods covariance matrices or chains for LRG ELG QSO rows",
                  "current_locator_status": "official_locator_page_declared",
                  "direct_product_path_status": "not_imported_in_v4_31",
                  "covariance_imported_now": False,
                  "ready_for_pressure_now": False,
                  "boundary": "eBOSS rows remain published-summary until exact covariance product is selected."
              },
              {
                  "product_lane_id": "eboss_dr16_multitracer_covariance_candidates",
                  "survey_family": "eBOSS_DR16",
                  "source_page_id": "sdss_final_bao_rsd_measurements",
                  "product_type_needed": "compressed files or covariance matrices for eBOSS LRG ELG QSO BAO/RSD combinations",
                  "current_locator_status": "official_locator_page_declared",
                  "direct_product_path_status": "not_imported_in_v4_31",
                  "covariance_imported_now": False,
                  "ready_for_pressure_now": False,
                  "boundary": "Multi-tracer products may not map one-to-one to the summary rows and require mapping audit."
              },
              {
                  "product_lane_id": "wigglez_covariance_product_locator",
                  "survey_family": "WiggleZ",
                  "source_page_id": "wigglez_final_results_paper",
                  "product_type_needed": "WiggleZ covariance or published covariance statement for z=0.44,0.60,0.73 f_sigma8 rows",
                  "current_locator_status": "paper_reference_only_product_path_unresolved",
                  "direct_product_path_status": "unresolved_in_v4_31",
                  "covariance_imported_now": False,
                  "ready_for_pressure_now": False,
                  "boundary": "WiggleZ remains usable only for non-final preview until covariance/product status is repaired."
              },
              {
                  "product_lane_id": "cross_family_combination_policy",
                  "survey_family": "cross_family",
                  "source_page_id": "multiple",
                  "product_type_needed": "policy for combining or not combining BOSS WiggleZ and eBOSS RSD rows",
                  "current_locator_status": "policy_needed_not_data_product",
                  "direct_product_path_status": "not_applicable",
                  "covariance_imported_now": False,
                  "ready_for_pressure_now": False,
                  "boundary": "Even if within-family products are found, cross-family combination still needs independence and duplication policy."
              }
          ]

          PRODUCT_REQUIREMENTS = [
              {
                  "requirement_id": "exact_product_path_required",
                  "required_before_covariance_test": True,
                  "description": "A future covariance-aware test must name the exact downloadable file, table, likelihood directory, or covariance product.",
                  "failure_mode": "Using an undocumented covariance assumption."
              },
              {
                  "requirement_id": "row_mapping_required",
                  "required_before_covariance_test": True,
                  "description": "The product must map to the same rows or an explicitly different row set.",
                  "failure_mode": "Applying a covariance matrix to mismatched f_sigma8 rows."
              },
              {
                  "requirement_id": "BAO_RSD_role_mapping_required",
                  "required_before_covariance_test": True,
                  "description": "If the covariance product includes BAO/RSD together, BAO must remain boundary/ruler while f_sigma8 remains growth.",
                  "failure_mode": "BAO and RSD collapse into one reach/growth surface."
              },
              {
                  "requirement_id": "published_summary_status_preserved",
                  "required_before_covariance_test": True,
                  "description": "Current f_sigma8 rows stay published-summary rows unless a direct posterior/chain product is parsed.",
                  "failure_mode": "Promoting summary rows to direct parsed data."
              },
              {
                  "requirement_id": "wigglez_unresolved_status_preserved",
                  "required_before_covariance_test": True,
                  "description": "WiggleZ covariance/product path remains unresolved until located.",
                  "failure_mode": "Treating WiggleZ as covariance-ready without product review."
              },
              {
                  "requirement_id": "no_pressure_score_now",
                  "required_before_covariance_test": True,
                  "description": "v4.31 locates product lanes only and does not compute covariance-aware pressure.",
                  "failure_mode": "Locator becomes scoring test."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "An RSD covariance matrix was imported.",
              "The RSD comparison is covariance-aware now.",
              "Published summary rows are direct posterior-chain rows.",
              "BAO and RSD can be averaged into one reach/growth correction.",
              "WiggleZ is covariance-ready without a product locator.",
              "Cross-family RSD rows can be combined without an independence policy.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_32_RSD_product_path_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Turn locator pages into exact candidate product paths and decide whether each can map to the current f_sigma8 rows.",
                  "must_include": "exact product path, survey family, row mapping, BAO/RSD boundary, direct-vs-summary status.",
                  "must_not_include": "final pressure score or validation claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_33_RSD_reference_uncertainty_boundary_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Define how reference-model uncertainty would need to enter before stronger RSD comparison.",
                  "must_include": "reference parameter uncertainty, Planck-chain boundary, growth curve uncertainty, no final pressure claim.",
                  "must_not_include": "treating approximate reference curve as full posterior."
              },
              {
                  "priority": 3,
                  "next_test": "v4_34_cluster_mass_calibration_boundary_audit",
                  "role_focus": "cluster_abundance_growth",
                  "purpose": "Audit cluster abundance with mass calibration and selection boundaries.",
                  "must_include": "mass calibration, selection, source/product status, axis label.",
                  "must_not_include": "cluster proof claim."
              }
          ]

          def clean_text(text):
              text = re.sub(r"<script.*?</script>", " ", text or "", flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def fetch_text(url, timeout=90, byte_limit=2_000_000):
              try:
                  request = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "Mozilla/5.0 TAIRID-v4.31-RSD-covariance-product-locator",
                          "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
                      }
                  )
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "fetch_ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "fetch_ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def keyword_hits(text, keywords):
              lower = (text or "").lower()
              hits = []
              for keyword in keywords:
                  if keyword.lower() in lower:
                      hits.append(keyword)
              return hits

          failed_gates = []
          warnings = []

          source_page_rows = []

          for page in SOURCE_PAGES:
              fetched = fetch_text(page["url"])
              cleaned = clean_text(fetched["text"]) if fetched["fetch_ok"] else ""
              hits = keyword_hits(cleaned + " " + page["expected_role"], page["expected_keywords"])

              source_page_rows.append({
                  "source_page_id": page["source_page_id"],
                  "survey_scope": page["survey_scope"],
                  "url": page["url"],
                  "official_status": page["official_status"],
                  "expected_role": page["expected_role"],
                  "fetch_ok": fetched["fetch_ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"],
                  "keyword_hits": ";".join(hits),
                  "locator_signal": "locator_signal_present" if hits else "locator_signal_needs_manual_review",
                  "text_preview": cleaned[:500]
              })

          for lane in PRODUCT_LANES:
              if lane["covariance_imported_now"] is not False:
                  failed_gates.append(lane["product_lane_id"] + "_covariance_imported_now_violation")

              if lane["ready_for_pressure_now"] is not False:
                  failed_gates.append(lane["product_lane_id"] + "_ready_for_pressure_now_violation")

              if not lane.get("boundary"):
                  failed_gates.append(lane["product_lane_id"] + "_missing_boundary")

          needed_requirements = {
              "exact_product_path_required",
              "row_mapping_required",
              "BAO_RSD_role_mapping_required",
              "published_summary_status_preserved",
              "wigglez_unresolved_status_preserved",
              "no_pressure_score_now"
          }

          present_requirements = {
              row["requirement_id"]
              for row in PRODUCT_REQUIREMENTS
              if row["required_before_covariance_test"] is True
          }

          missing_requirements = sorted(needed_requirements - present_requirements)

          for item in missing_requirements:
              failed_gates.append("missing_product_requirement_" + item)

          official_locator_count = sum(
              1 for row in source_page_rows
              if row["official_status"] == "official_locator_page"
          )

          fetched_locator_count = sum(
              1 for row in source_page_rows
              if row["fetch_ok"] is True
          )

          if official_locator_count < 2:
              failed_gates.append("too_few_official_locator_pages_declared")

          if fetched_locator_count < 1:
              warnings.append("no_source_pages_fetched_successfully_network_or_site_issue")

          if not any(lane["survey_family"] == "WiggleZ" and "unresolved" in lane["direct_product_path_status"] for lane in PRODUCT_LANES):
              failed_gates.append("wigglez_unresolved_status_not_preserved")

          if not any(lane["survey_family"] == "cross_family" for lane in PRODUCT_LANES):
              failed_gates.append("cross_family_policy_lane_missing")

          blocked_claim_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "covariance matrix was imported",
              "covariance-aware",
              "direct posterior-chain",
              "wigglez",
              "cross-family",
              "likelihood"
          ]:
              if phrase not in blocked_claim_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          rule_results = [
              {
                  "rule_id": "official_locator_pages_declared",
                  "pass": official_locator_count >= 2,
                  "result": "official_SDSS_and_BOSS_locator_pages_declared",
                  "boundary": "Locator pages exist, but exact products are not imported yet."
              },
              {
                  "rule_id": "product_lanes_have_boundaries",
                  "pass": all(bool(row.get("boundary")) for row in PRODUCT_LANES),
                  "result": "all_product_lanes_have_boundaries",
                  "boundary": "No product lane can silently become final evidence."
              },
              {
                  "rule_id": "covariance_not_imported",
                  "pass": all(row["covariance_imported_now"] is False for row in PRODUCT_LANES),
                  "result": "no_covariance_imported_in_locator",
                  "boundary": "v4.31 is locator only."
              },
              {
                  "rule_id": "pressure_blocked_now",
                  "pass": all(row["ready_for_pressure_now"] is False for row in PRODUCT_LANES),
                  "result": "all_product_lanes_block_final_pressure_now",
                  "boundary": "No final RSD pressure score."
              },
              {
                  "rule_id": "requirements_present",
                  "pass": len(missing_requirements) == 0,
                  "result": "all_product_requirements_present",
                  "boundary": "Exact path, row mapping, BAO/RSD role mapping, and status boundaries are required."
              },
              {
                  "rule_id": "wigglez_unresolved_preserved",
                  "pass": any(row["survey_family"] == "WiggleZ" and "unresolved" in row["direct_product_path_status"] for row in PRODUCT_LANES),
                  "result": "WiggleZ_product_path_unresolved_status_preserved",
                  "boundary": "WiggleZ cannot enter covariance-aware testing yet."
              },
              {
                  "rule_id": "cross_family_policy_required",
                  "pass": any(row["survey_family"] == "cross_family" for row in PRODUCT_LANES),
                  "result": "cross_family_combination_policy_lane_present",
                  "boundary": "BOSS, WiggleZ, and eBOSS cannot be combined without independence policy."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_product_locator_rules_passed")

          warnings.append("product_locator_does_not_import_covariance")
          warnings.append("exact_product_paths_still_required_before_covariance_test")
          warnings.append("row_mapping_required_before_any_matrix_use")
          warnings.append("reference_uncertainty_still_missing")
          warnings.append("v4_29_remains_nonfinal_diagonal_preview")
          warnings.append("wigglez_product_path_unresolved")

          if failed_gates:
              readiness_label = "rsd_covariance_product_locator_failed"
              next_step = "Repair locator pages, product lanes, or status boundaries before product path audit."
          else:
              readiness_label = "rsd_covariance_product_locator_passed_ready_for_product_path_audit"
              next_step = (
                  "Proceed to v4.32 RSD product path audit. "
                  "Do not compute final pressure until exact covariance products, row mappings, and reference uncertainty boundaries are handled."
              )

          system_health = {
              "source_page_count": len(SOURCE_PAGES),
              "source_pages_fetched": fetched_locator_count,
              "official_locator_page_count": official_locator_count,
              "product_lane_count": len(PRODUCT_LANES),
              "product_requirement_count": len(PRODUCT_REQUIREMENTS),
              "missing_requirement_count": len(missing_requirements),
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "covariance_imported": False,
              "exact_covariance_product_selected": False,
              "row_mapping_complete": False,
              "wigglez_covariance_resolved": False,
              "cross_family_policy_complete": False,
              "final_pressure_score_allowed_now": False,
              "validation_claim_allowed": False
          }

          interpretation = (
              "v4.31 locates and classifies candidate RSD covariance/product lanes. "
              "The SDSS/BOSS locator pages are carried as official product roots, while exact covariance product paths are still not imported. "
              "BOSS and eBOSS now have official locator lanes; WiggleZ remains unresolved. "
              "No covariance-aware pressure test is allowed until exact product paths, row mappings, BAO/RSD role mapping, reference uncertainty, and cross-family policy are handled."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_pages": SOURCE_PAGES,
              "source_page_rows": source_page_rows,
              "product_lanes": PRODUCT_LANES,
              "product_requirements": PRODUCT_REQUIREMENTS,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_final_pressure_score_built": False,
                  "covariance_imported": False,
                  "exact_covariance_product_selected": False,
                  "likelihood_run": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "source_page_rows_v4_31.csv",
              source_page_rows,
              [
                  "source_page_id",
                  "survey_scope",
                  "url",
                  "official_status",
                  "expected_role",
                  "fetch_ok",
                  "http_status",
                  "content_type",
                  "bytes_read",
                  "error",
                  "keyword_hits",
                  "locator_signal",
                  "text_preview"
              ]
          )

          write_csv(
              OUTDIR / "product_lanes_v4_31.csv",
              PRODUCT_LANES,
              [
                  "product_lane_id",
                  "survey_family",
                  "source_page_id",
                  "product_type_needed",
                  "current_locator_status",
                  "direct_product_path_status",
                  "covariance_imported_now",
                  "ready_for_pressure_now",
                  "boundary"
              ]
          )

          write_csv(
              OUTDIR / "product_requirements_v4_31.csv",
              PRODUCT_REQUIREMENTS,
              [
                  "requirement_id",
                  "required_before_covariance_test",
                  "description",
                  "failure_mode"
              ]
          )

          write_csv(
              OUTDIR / "product_locator_rule_results_v4_31.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_31.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_31.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_31.csv",
              [system_health],
              [
                  "source_page_count",
                  "source_pages_fetched",
                  "official_locator_page_count",
                  "product_lane_count",
                  "product_requirement_count",
                  "missing_requirement_count",
                  "rule_pass_count",
                  "rule_total_count",
                  "covariance_imported",
                  "exact_covariance_product_selected",
                  "row_mapping_complete",
                  "wigglez_covariance_resolved",
                  "cross_family_policy_complete",
                  "final_pressure_score_allowed_now",
                  "validation_claim_allowed"
              ]
          )

          json_path = OUTDIR / "tairid_v4_31_rsd_covariance_product_locator.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.31 — RSD Covariance Product Locator")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("Candidate RSD covariance/product lanes were located and classified.")
          md.append("")
          md.append("This does not import covariance and does not compute pressure. It only prepares the next audit: exact product path and row mapping.")
          md.append("")
          md.append("## System health")
