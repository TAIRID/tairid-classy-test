name: TAIRID Clean Push Test 001

on:
  push:

jobs:
  clean-push-test-001:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Make output folder
        run: |
          mkdir -p tairid_clean_push_test_001_outputs

      - name: Write test result
        run: |
          echo "TAIRID Clean Push Test 001" > tairid_clean_push_test_001_outputs/result.txt
          echo "STATUS: workflow started from push" >> tairid_clean_push_test_001_outputs/result.txt
          echo "UTC time: $(date -u)" >> tairid_clean_push_test_001_outputs/result.txt
          echo "Workflow: $GITHUB_WORKFLOW" >> tairid_clean_push_test_001_outputs/result.txt
          echo "Branch/ref: $GITHUB_REF" >> tairid_clean_push_test_001_outputs/result.txt
          echo "Commit: $GITHUB_SHA" >> tairid_clean_push_test_001_outputs/result.txt
          echo "" >> tairid_clean_push_test_001_outputs/result.txt
          echo "Repository files:" >> tairid_clean_push_test_001_outputs/result.txt
          ls -la >> tairid_clean_push_test_001_outputs/result.txt

      - name: Upload test output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-clean-push-test-001-output
          path: |
            tairid_clean_push_test_001_outputs/**
