              {"gate": "inherited_v4_255_rows_equal_10", "passed": len(inherited_v4_255_rows) == 10, "detail": f"inherited_v4_255_rows = {len(inherited_v4_255_rows)}"},
              {"gate": "exact_file_review_rows_equal_4", "passed": len(exact_file_review_rows) == 4, "detail": f"exact_file_review_rows = {len(exact_file_review_rows)}"},
              {"gate": "extraction_manifest_fill_packet_rows_equal_4", "passed": len(extraction_manifest_fill_packet_rows) == 4, "detail": f"extraction_manifest_fill_packet_rows = {len(extraction_manifest_fill_packet_rows)}"},
              {"gate": "table_confirmation_question_rows_equal_8", "passed": len(table_confirmation_question_rows) == 8, "detail": f"table_confirmation_question_rows = {len(table_confirmation_question_rows)}"},
              {"gate": "covariance_fill_policy_rows_equal_5", "passed": len(covariance_fill_policy_rows) == 5, "detail": f"covariance_fill_policy_rows = {len(covariance_fill_policy_rows)}"},
              {"gate": "observed_manifest_bridge_block_rows_equal_4", "passed": len(observed_manifest_bridge_block_rows) == 4, "detail": f"observed_manifest_bridge_block_rows = {len(observed_manifest_bridge_block_rows)}"},
              {"gate": "manual_copy_paste_file_rows_equal_3", "passed": len(manual_copy_paste_file_rows) == 3, "detail": f"manual_copy_paste_file_rows = {len(manual_copy_paste_file_rows)}"},
              {"gate": "decision_gate_rows_equal_5", "passed": len(decision_gate_rows) == 5, "detail": f"decision_gate_rows = {len(decision_gate_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "extraction_manifest_status_rows_at_least_1", "passed": len(extraction_manifest_status_rows) >= 1, "detail": f"extraction_manifest_status_rows = {len(extraction_manifest_status_rows)}"},
              {"gate": "permission_rows_equal_10", "passed": len(permission_rows) == 10, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_9", "passed": len(readiness_rows) == 9, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "all_fill_packet_rows_not_filled", "passed": all(row["observed_value"] == "FILL_ONLY_AFTER_HUMAN_TABLE_CONFIRMATION" for row in extraction_manifest_fill_packet_rows), "detail": "all fill packet values remain placeholders"},
              {"gate": "all_observed_bridge_rows_blocked", "passed": all(row["manifest_fill_allowed"] is False and row["scoring_allowed"] is False and row["evidence_allowed"] is False for row in observed_manifest_bridge_block_rows), "detail": "all observed bridge rows blocked"},
              {"gate": "template_path_written", "passed": any(row["recommended_path"] == "data/cosmology/qso_literature_extraction_manifest.csv" for row in manual_copy_paste_file_rows), "detail": "qso literature extraction path written"},
              {"gate": "observed_manifest_creation_blocked", "passed": any(row["recommended_path"] == "data/cosmology/external_observed_manifest.csv" and row["can_be_created_now"] == "no_not_from_this_workflow" for row in manual_copy_paste_file_rows), "detail": "observed manifest creation blocked"},
              {"gate": "joint_zhao_scoring_blocked", "passed": any(row["permission_scope"] == "zhao_joint_scoring" and row["permission_status"] == "blocked_until_full_covariance_or_likelihood" for row in permission_rows), "detail": "Zhao joint scoring blocked"},
              {"gate": "external_manifest_fill_blocked", "passed": any(row["permission_scope"] == "external_observed_manifest_fill" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external observed manifest fill blocked"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external observed scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO evidence blocked"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric correction fit blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "manual_review_route_recommended", "passed": any(row["route"] == "review_manual_zhao_fill" and row["permission_status"] == "recommended_after_human_fill" for row in route_decision_rows), "detail": "manual review route recommended"},
              {"gate": "observed_manifest_fill_after_review_not_activated", "passed": any(row["test_id"] == "v4_257_external_observed_manifest_fill_after_review" and row["activated"] is False for row in next_rows), "detail": "observed manifest fill after review not activated"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no external observed scoring"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout approval"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_257_review_manual_zhao_fill_or_covariance_source_locator_retry", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_256_manual_zhao_table_extraction_fill_packet_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_256_inherited_v4_255_rows.csv", inherited_v4_255_rows)
          write_csv(OUT / "v4_256_exact_file_review_rows.csv", exact_file_review_rows)
          write_csv(OUT / "v4_256_extraction_manifest_fill_packet_rows.csv", extraction_manifest_fill_packet_rows)
          write_csv(OUT / "v4_256_table_confirmation_question_rows.csv", table_confirmation_question_rows)
          write_csv(OUT / "v4_256_covariance_fill_policy_rows.csv", covariance_fill_policy_rows)
          write_csv(OUT / "v4_256_observed_manifest_bridge_block_rows.csv", observed_manifest_bridge_block_rows)
          write_csv(OUT / "v4_256_manual_copy_paste_file_rows.csv", manual_copy_paste_file_rows)
          write_csv(OUT / "v4_256_decision_gate_rows.csv", decision_gate_rows)
          write_csv(OUT / "v4_256_observed_manifest_status_rows.csv", observed_manifest_status_rows)
          write_csv(OUT / "v4_256_extraction_manifest_status_rows.csv", extraction_manifest_status_rows)
          write_csv(OUT / "v4_256_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_256_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_256_failure_condition_rows.csv", failure_condition_rows)
          write_csv(OUT / "v4_256_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_256_route_decision_rows.csv", route_decision_rows)
          write_csv(OUT / "v4_256_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_256_rule_checks.csv", checks)

          # User-facing manual template CSV for copy/paste.
          write_csv(OUT / "qso_literature_extraction_manifest_TEMPLATE_ZHAO_v4_256.csv", extraction_manifest_fill_packet_rows)

          checklist_lines = [
              "# Zhao Manual Table Extraction Fill Packet v4.256",
              "",
              "Use this file to guide manual review. Do not score from this packet.",
              "",
              "## Files to review",
          ]
          for row in exact_file_review_rows:
              checklist_lines.extend([
                  f"- {row['file_name']}: {row['review_target']}",
                  f"  - Risk: {row['risk']}",
                  f"  - Required before value use: {row['required_before_value_use']}",
              ])
          checklist_lines.extend(["", "## Questions that must be answered"])
          for row in table_confirmation_question_rows:
              checklist_lines.append(f"- {row['question_id']}: {row['question']} Required answer: {row['required_answer_type']}. Blocks: {row['blocks']}.")
          checklist_lines.extend([
              "",
              "## Boundary",
              "This packet creates non-scoring extraction rows only. It does not create external observed manifest rows, does not approve a holdout source, and does not validate TAIRID.",
              "",
          ])
          (OUT / "v4_256_zhao_manual_fill_checklist.md").write_text("\n".join(checklist_lines), encoding="utf-8")

          packet_lines = [
              f"z={row['redshift']}: {row['observed_value']} / {row['uncertainty_or_covariance_reference']}"
              for row in extraction_manifest_fill_packet_rows
          ]

          policy_lines = [
              f"{row['fill_case']}: allowed={row['allowed_status']} blocked={row['blocked_status']}"
              for row in covariance_fill_policy_rows
          ]

          route_lines = [
              f"{row['route']}: {row['permission_status']} — {row['reason']}"
              for row in route_decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_255_rows": len(inherited_v4_255_rows),
              "exact_file_review_rows": len(exact_file_review_rows),
              "extraction_manifest_fill_packet_rows": len(extraction_manifest_fill_packet_rows),
              "table_confirmation_question_rows": len(table_confirmation_question_rows),
              "covariance_fill_policy_rows": len(covariance_fill_policy_rows),
              "observed_manifest_bridge_block_rows": len(observed_manifest_bridge_block_rows),
              "manual_copy_paste_file_rows": len(manual_copy_paste_file_rows),
              "decision_gate_rows": len(decision_gate_rows),
              "observed_manifest_status_rows": len(observed_manifest_status_rows),
              "extraction_manifest_status_rows": len(extraction_manifest_status_rows),
              "permission_rows": len(permission_rows),
              "readiness_rows": len(readiness_rows),
              "failure_condition_rows": len(failure_condition_rows),
              "decision_rows": len(decision_rows),
              "route_decision_rows": len(route_decision_rows),
              "next_rows": len(next_rows),
              "manifest_fill_allowed": False,
              "scoring_allowed": False,
              "approved_holdout_sources": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_256_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.256 Manual Zhao Table Extraction Fill Packet",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_255_rows = {summary['inherited_v4_255_rows']}",
              f"exact_file_review_rows = {summary['exact_file_review_rows']}",
              f"extraction_manifest_fill_packet_rows = {summary['extraction_manifest_fill_packet_rows']}",
              f"table_confirmation_question_rows = {summary['table_confirmation_question_rows']}",
              f"covariance_fill_policy_rows = {summary['covariance_fill_policy_rows']}",
              f"observed_manifest_bridge_block_rows = {summary['observed_manifest_bridge_block_rows']}",
              f"manual_copy_paste_file_rows = {summary['manual_copy_paste_file_rows']}",
              f"decision_gate_rows = {summary['decision_gate_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"extraction_manifest_status_rows = {summary['extraction_manifest_status_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"route_decision_rows = {summary['route_decision_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"manifest_fill_allowed = {summary['manifest_fill_allowed']}",
              f"scoring_allowed = {summary['scoring_allowed']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Extraction fill packet rows:",
              *packet_lines,
              "",
              "Covariance fill policy:",
              *policy_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.256 creates the manual Zhao table extraction fill packet. It gives four human-fill extraction rows, table review targets, confirmation questions, covariance policy, and observed-manifest bridge blocks. It does not fill exact values, does not fill external observed manifest rows, does not score, and does not approve evidence.",
              "",
              "Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_256_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_255_rows = {summary['inherited_v4_255_rows']}")
          print(f"exact_file_review_rows = {summary['exact_file_review_rows']}")
          print(f"extraction_manifest_fill_packet_rows = {summary['extraction_manifest_fill_packet_rows']}")
          print(f"table_confirmation_question_rows = {summary['table_confirmation_question_rows']}")
          print(f"covariance_fill_policy_rows = {summary['covariance_fill_policy_rows']}")
          print(f"observed_manifest_bridge_block_rows = {summary['observed_manifest_bridge_block_rows']}")
          print(f"manual_copy_paste_file_rows = {summary['manual_copy_paste_file_rows']}")
          print(f"decision_gate_rows = {summary['decision_gate_rows']}")
          print(f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}")
          print(f"extraction_manifest_status_rows = {summary['extraction_manifest_status_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"readiness_rows = {summary['readiness_rows']}")
          print(f"failure_condition_rows = {summary['failure_condition_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"route_decision_rows = {summary['route_decision_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"manifest_fill_allowed = {summary['manifest_fill_allowed']}")
          print(f"scoring_allowed = {summary['scoring_allowed']}")
          print(f"approved_holdout_sources = {summary['approved_holdout_sources']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.256 manual Zhao table extraction fill packet output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-256-manual-zhao-table-extraction-fill-packet-output
          path: |
            tairid_v4_256_manual_zhao_table_extraction_fill_packet_output/
            tairid-v4-256-manual-zhao-table-extraction-fill-packet-output.zip
