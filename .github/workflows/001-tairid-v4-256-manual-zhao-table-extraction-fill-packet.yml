          ]

          route_decision_rows = [
              {"route_id": "route_001", "route": "review_manual_zhao_fill", "permission_status": "recommended_after_human_fill", "reason": "Next automated step should validate a manually filled extraction manifest."},
              {"route_id": "route_002", "route": "covariance_source_locator_retry", "permission_status": "allowed", "reason": "Use if table review still lacks covariance path."},
              {"route_id": "route_003", "route": "external_observed_manifest_fill", "permission_status": "blocked", "reason": "Do not bridge to observed manifest yet."},
              {"route_id": "route_004", "route": "numeric_correction_fit", "permission_status": "blocked", "reason": "No approved observed manifest exists."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.256 is enough history for consolidation if needed."},
          ]

          next_rows = [
              {"priority": 1, "test_id": "v4_257_review_manual_zhao_fill", "purpose": "review any manually filled Zhao extraction manifest rows without scoring", "activated": True},
              {"priority": 2, "test_id": "v4_257_covariance_source_locator_retry", "purpose": "retry covariance/data-vector locator if needed", "activated": True},
              {"priority": 3, "test_id": "v4_257_external_observed_manifest_fill_after_review", "purpose": "prepare observed manifest rows only after exact values/covariance/provenance review", "activated": False},
