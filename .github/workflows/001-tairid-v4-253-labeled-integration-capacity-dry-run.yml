name: 001 TAIRID v4.253 - Labeled Integration Capacity Dry Run

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-253-labeled-integration-capacity-dry-run.yml"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"
      - "data/cosmology/qso_literature_extraction_manifest.csv"
      - "qso_literature_extraction_manifest.csv"

permissions:
  contents: read

jobs:
  labeled-integration-capacity-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.253 Labeled Integration Capacity Dry Run is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.253 labeled integration capacity dry run
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import itertools
          import json
          import math
          import zipfile

          VERSION = "v4.253"
          ROUTE = "labeled_integration_capacity_dry_run_after_v4_252"
          EXPECTED_RESULT = "v4_253_labeled_integration_capacity_dry_run_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_254_zhao_tomographic_table_extraction_guard_or_scale_review"

          OUT = Path("tairid_v4_253_labeled_integration_capacity_dry_run_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-253-labeled-integration-capacity-dry-run-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          EXTRACTION_MANIFEST_CANDIDATES = [
              Path("data/cosmology/qso_literature_extraction_manifest.csv"),
              Path("qso_literature_extraction_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_EXTRACTION_COLUMNS = [
              "extraction_id",
              "candidate_id",
              "paper_or_source_url",
              "measurement_label",
              "redshift",
              "observable",
              "observed_value",
              "uncertainty_or_covariance_reference",
              "data_vector_reference",
              "source_role",
              "provenance_status",
              "extraction_status",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def safe_float(value):
              try:
                  return float(value)
              except Exception:
                  return None

          def is_placeholder(value):
              text = str(value or "").strip().lower()
              return (
                  not text
                  or text.startswith("put_")
                  or "put_" in text
                  or text.startswith("do_not_fill")
                  or text in ["todo", "none", "na", "n/a", "template_not_filled"]
              )

          inherited_v4_252_rows = [
              {
                  "inherited_from": "v4.252",
                  "item": "rules",
                  "value": "36 / 36 passed",
                  "meaning": "DR14 QSO Covariance Supplement Locator passed.",
                  "carry_forward_status": "ready_for_labeled_integration_capacity_dry_run",
              },
              {
                  "inherited_from": "v4.252",
                  "item": "candidate_support_source_rows",
                  "value": 12,
                  "meaning": "Support routes for Hou, Gil-Marín, Ruggeri, and Zhao were listed.",
                  "carry_forward_status": "support_sources_available_as_locator_only",
              },
              {
                  "inherited_from": "v4.252",
                  "item": "covariance_candidate_status_rows",
                  "value": 4,
                  "meaning": "Candidate covariance statuses were produced.",
                  "carry_forward_status": "covariance_review_needed",
              },
              {
                  "inherited_from": "v4.252",
                  "item": "zhao_tomographic_next_rows",
                  "value": 3,
                  "meaning": "Zhao needs four values, covariance, and dependency flags.",
                  "carry_forward_status": "next_extraction_target",
              },
              {
                  "inherited_from": "v4.252",
                  "item": "approved_holdout_sources",
                  "value": 0,
                  "meaning": "No source was approved as a holdout.",
                  "carry_forward_status": "evidence_blocked",
              },
              {
                  "inherited_from": "v4.252",
                  "item": "manifest_fill_allowed",
                  "value": False,
                  "meaning": "No manifest fill is allowed yet.",
                  "carry_forward_status": "manifest_fill_blocked",
              },
              {
                  "inherited_from": "v4.252",
                  "item": "selected_next_route",
                  "value": "v4_253_zhao_tomographic_table_extraction_guard_or_handoff",
                  "meaning": "Original next route was Zhao extraction, but this workflow runs a pre-extraction integration capacity check first.",
                  "carry_forward_status": "temporarily_intercepted_for_scale_dry_run",
              },
          ]

          namespace_rows = [
              {"namespace": "cosmo.source", "meaning": "cosmology source family or tracer surface", "claim_status": "labels_only"},
              {"namespace": "cosmo.observable", "meaning": "cosmology observable or derived quantity", "claim_status": "labels_only"},
              {"namespace": "cosmo.value", "meaning": "extracted or candidate literature value", "claim_status": "not_scored"},
              {"namespace": "cosmo.reference", "meaning": "LCDM/reference calculator quantities", "claim_status": "reference_scaffold_only"},
              {"namespace": "cosmo.covariance", "meaning": "covariance, likelihood, uncertainty, or support status", "claim_status": "review_only"},
              {"namespace": "cosmo.provenance", "meaning": "same-release, same-family, independent, or support-only status", "claim_status": "review_only"},
              {"namespace": "cosmo.correction", "meaning": "TAIRID correction formula contract", "claim_status": "symbolic_only"},
              {"namespace": "guard.permission", "meaning": "allowed, blocked, review-only permission status", "claim_status": "guardrail"},
              {"namespace": "guard.failure", "meaning": "pre-written failure conditions", "claim_status": "guardrail"},
              {"namespace": "guard.readiness", "meaning": "what is ready or still missing", "claim_status": "guardrail"},
              {"namespace": "shape.signature", "meaning": "shape signatures from prior lattice work", "claim_status": "shape_only_not_cause"},
              {"namespace": "g1.neurotype", "meaning": "G1 dyslexia/aphantasia candidate labels", "claim_status": "separate_surface"},
              {"namespace": "matrix.permission", "meaning": "combined matrix permissions", "claim_status": "guardrail"},
              {"namespace": "extraction.task", "meaning": "manual extraction tasks", "claim_status": "not_scored"},
              {"namespace": "manifest.schema", "meaning": "observed/extraction manifest column definitions", "claim_status": "schema_only"},
          ]

          source_surface_rows = [
              {"source_id": "src_lrg_dr16", "source_family": "LRG", "source_role": "cosmology_control_or_current_context", "redshift": 0.698, "surface_status": "same_data_or_control_context"},
              {"source_id": "src_elg_dr16", "source_family": "ELG", "source_role": "compressed_geometry_or_current_context", "redshift": 0.845, "surface_status": "same_data_or_compressed_context"},
              {"source_id": "src_qso_dr16", "source_family": "QSO", "source_role": "current_pressure_lane_context", "redshift": 1.48, "surface_status": "same_data_context_not_holdout"},
              {"source_id": "src_qso_hou_dr14", "source_family": "QSO", "source_role": "literature_candidate", "redshift": 1.52, "surface_status": "cross_release_same_survey_family_needs_review"},
              {"source_id": "src_qso_gilmarin_dr14", "source_family": "QSO", "source_role": "literature_candidate", "redshift": 1.52, "surface_status": "cross_release_same_survey_family_needs_review"},
              {"source_id": "src_qso_ruggeri_dr14", "source_family": "QSO", "source_role": "literature_candidate_comparison", "redshift": 1.52, "surface_status": "cross_release_same_survey_family_needs_review"},
              {"source_id": "src_qso_zhao_dr14", "source_family": "QSO", "source_role": "tomographic_literature_candidate", "redshift": "0.98|1.23|1.52|1.94", "surface_status": "values_and_covariance_pending"},
              {"source_id": "src_qso_neveux_dr16", "source_family": "QSO", "source_role": "same_family_current_context", "redshift": 1.48, "surface_status": "blocked_as_independent_holdout"},
              {"source_id": "src_desi_dr1_context", "source_family": "DESI", "source_role": "future_search_context", "redshift": "release_level", "surface_status": "not_manifest_ready"},
              {"source_id": "src_bao_geometry_control", "source_family": "BAO", "source_role": "geometry_control", "redshift": "various", "surface_status": "not_primary_growth"},
              {"source_id": "src_g1_dyslexia", "source_family": "G1_DYSLEXIA", "source_role": "neurotype_candidate_shape", "redshift": "not_applicable", "surface_status": "separate_surface_shape_only"},
              {"source_id": "src_g1_aphantasia", "source_family": "G1_APHANTASIA", "source_role": "neurotype_candidate_shape", "redshift": "not_applicable", "surface_status": "separate_surface_shape_only"},
          ]

          observable_rows = [
              {"observable_id": "obs_fsigma8", "observable": "f_sigma8", "observable_type": "growth_RSD", "primary_qso_allowed_after_review": True},
              {"observable_id": "obs_df_sigma8_dz", "observable": "df_sigma8_dz", "observable_type": "growth_derivative_context", "primary_qso_allowed_after_review": False},
              {"observable_id": "obs_dm_rs", "observable": "D_M_over_r_sound", "observable_type": "geometry_transverse", "primary_qso_allowed_after_review": False},
              {"observable_id": "obs_dh_rs", "observable": "D_H_over_r_sound", "observable_type": "geometry_radial_or_pacing_secondary", "primary_qso_allowed_after_review": False},
              {"observable_id": "obs_dv_rs", "observable": "D_V_over_r_sound", "observable_type": "compressed_geometry", "primary_qso_allowed_after_review": False},
              {"observable_id": "obs_bao_likelihood", "observable": "BAO_likelihood", "observable_type": "geometry_likelihood", "primary_qso_allowed_after_review": False},
              {"observable_id": "obs_growth_likelihood", "observable": "growth_RSD_likelihood", "observable_type": "growth_likelihood", "primary_qso_allowed_after_review": True},
              {"observable_id": "obs_covariance", "observable": "covariance_matrix", "observable_type": "support", "primary_qso_allowed_after_review": False},
              {"observable_id": "obs_reference_value", "observable": "reference_value", "observable_type": "reference_scaffold", "primary_qso_allowed_after_review": False},
              {"observable_id": "obs_residual", "observable": "Delta_obs", "observable_type": "future_residual", "primary_qso_allowed_after_review": False},
              {"observable_id": "obs_shape_signature", "observable": "shape_signature", "observable_type": "relational_shape", "primary_qso_allowed_after_review": False},
              {"observable_id": "obs_viability", "observable": "viability_or_outcome", "observable_type": "G1_neurotype_axis", "primary_qso_allowed_after_review": False},
          ]

          extracted_value_rows = [
              {"value_id": "val_hou_fsigma8", "source_id": "src_qso_hou_dr14", "observable_id": "obs_fsigma8", "redshift": 1.52, "value": 0.396, "sigma": 0.079, "value_status": "extracted_not_scored"},
              {"value_id": "val_gilmarin_fsigma8", "source_id": "src_qso_gilmarin_dr14", "observable_id": "obs_fsigma8", "redshift": 1.52, "value": 0.420, "sigma": 0.076, "value_status": "extracted_not_scored"},
              {"value_id": "val_ruggeri_fsigma8", "source_id": "src_qso_ruggeri_dr14", "observable_id": "obs_fsigma8", "redshift": 1.52, "value": 0.430, "sigma": 0.050, "value_status": "extracted_not_scored"},
              {"value_id": "val_ruggeri_derivative", "source_id": "src_qso_ruggeri_dr14", "observable_id": "obs_df_sigma8_dz", "redshift": 1.52, "value": -0.160, "sigma": 0.080, "value_status": "context_not_scored"},
          ]

          zhao_placeholder_rows = []
          for i, z in enumerate([0.98, 1.23, 1.52, 1.94], start=1):
              zhao_placeholder_rows.append({
                  "placeholder_id": f"zhao_bin_{i:02d}",
                  "source_id": "src_qso_zhao_dr14",
                  "observable_id": "obs_fsigma8",
                  "redshift": z,
                  "value": "MISSING_NOT_GUESSED",
                  "sigma": "MISSING_NOT_GUESSED",
                  "covariance_status": "full_covariance_claim_needs_extraction",
                  "placeholder_status": "blocked_until_table_or_supplement_extraction",
              })

          reference_target_rows = []
          for source in source_surface_rows:
              if str(source["redshift"]).replace(".", "", 1).isdigit():
                  for observable in ["D_M_over_r_sound", "D_H_over_r_sound", "D_V_over_r_sound", "f_sigma8"]:
                      reference_target_rows.append({
                          "reference_target_id": f"ref_{source['source_id']}_{observable}",
                          "source_id": source["source_id"],
                          "source_family": source["source_family"],
                          "redshift": source["redshift"],
                          "quantity": observable,
                          "reference_status": "target_label_only_no_calculation",
                      })

          correction_contract_rows = [
              {"correction_id": "corr_gate", "symbol": "G(z)", "meaning": "prior frozen gate", "status": "frozen_not_refit"},
              {"correction_id": "corr_theta", "symbol": "theta", "meaning": "future correction amplitude", "status": "not_set_no_fit"},
              {"correction_id": "corr_w_axis", "symbol": "W_axis(q)", "meaning": "axis weight", "status": "direction_contract_only"},
              {"correction_id": "corr_s_source", "symbol": "S_source(s)", "meaning": "source role weight", "status": "source_role_contract_only"},
              {"correction_id": "corr_c_tairid", "symbol": "C_TAIRID(q,z,s)", "meaning": "symbolic correction", "status": "symbolic_only"},
              {"correction_id": "corr_delta", "symbol": "Delta_obs", "meaning": "observed minus reference", "status": "blocked_until_observed_manifest"},
              {"correction_id": "corr_r_tairid", "symbol": "R_TAIRID", "meaning": "future corrected reference", "status": "blocked_for_scoring"},
              {"correction_id": "corr_failure", "symbol": "failure_conditions", "meaning": "pre-score failure rows", "status": "frozen_guardrail"},
          ]

          failure_condition_rows = [
              {"failure_condition_id": "failure_001", "target": "QSO f_sigma8 primary pressure", "machine_condition": "if holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened", "status": "active_but_not_testable_without_approved_holdout_and_covariance"},
              {"failure_condition_id": "failure_002", "target": "QSO versus LRG growth contrast", "machine_condition": "if lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened", "status": "active_for_future_control_review"},
              {"failure_condition_id": "failure_003", "target": "QSO radial secondary support", "machine_condition": "if qso_radial_direction == '-' then secondary_support_weakened", "status": "active_for_future_secondary_review"},
              {"failure_condition_id": "failure_004", "target": "geometry compressed lane non-primary", "machine_condition": "if compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed", "status": "active_for_future_geometry_review"},
              {"failure_condition_id": "failure_005", "target": "external likelihood robustness", "machine_condition": "if external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover then baseline_pressure_not_tairid_specific", "status": "active_for_future_model_comparison"},
          ]

          shape_signature_rows = [
              {"shape_id": "shape_dyslexia_overall", "surface": "G1_DYSLEXIA", "signature": "++-", "meaning": "reach/pacing high, consolidation lower", "cause_claim_allowed": False},
              {"shape_id": "shape_dyslexia_four_axis", "surface": "G1_DYSLEXIA", "signature": "++--", "meaning": "viability-low version of G1 dyslexia candidate", "cause_claim_allowed": False},
              {"shape_id": "shape_aphantasia_conservative", "surface": "G1_APHANTASIA", "signature": "-+-", "meaning": "visual reach lower, burden higher, viability lower", "cause_claim_allowed": False},
              {"shape_id": "shape_aphantasia_four_axis", "surface": "G1_APHANTASIA", "signature": "-+--", "meaning": "viability-low version of G1 aphantasia candidate", "cause_claim_allowed": False},
              {"shape_id": "shape_lrg_elg_070", "surface": "COSMOLOGY_LRGxELG", "signature": "++-", "meaning": "prior same-data source-surface shape", "cause_claim_allowed": False},
              {"shape_id": "shape_lrg_elg_0845", "surface": "COSMOLOGY_LRGxELG", "signature": "-+-", "meaning": "prior same-data source-surface shape", "cause_claim_allowed": False},
              {"shape_id": "shape_qso_148", "surface": "COSMOLOGY_QSO", "signature": "-++", "meaning": "open QSO lane shape needing source-specific handling", "cause_claim_allowed": False},
          ]

          manifest_schema_rows = []
          for idx, column in enumerate(REQUIRED_OBSERVED_COLUMNS, start=1):
              manifest_schema_rows.append({
                  "schema_id": f"observed_schema_{idx:02d}",
                  "schema_type": "external_observed_manifest",
                  "column_name": column,
                  "required": True,
                  "status": "schema_label_only",
              })
          for idx, column in enumerate(REQUIRED_EXTRACTION_COLUMNS, start=1):
              manifest_schema_rows.append({
                  "schema_id": f"extraction_schema_{idx:02d}",
                  "schema_type": "qso_literature_extraction_manifest",
                  "column_name": column,
                  "required": True,
                  "status": "schema_label_only",
              })

          covariance_status_rows = [
              {"cov_id": "cov_hou", "source_id": "src_qso_hou_dr14", "covariance_status": "abstract_uncertainty_only_needs_policy_review", "manifest_allowed": False},
              {"cov_id": "cov_gilmarin", "source_id": "src_qso_gilmarin_dr14", "covariance_status": "abstract_uncertainty_only_needs_policy_review", "manifest_allowed": False},
              {"cov_id": "cov_ruggeri", "source_id": "src_qso_ruggeri_dr14", "covariance_status": "abstract_uncertainty_only_needs_policy_review", "manifest_allowed": False},
              {"cov_id": "cov_zhao", "source_id": "src_qso_zhao_dr14", "covariance_status": "full_covariance_claim_needs_extraction", "manifest_allowed": False},
              {"cov_id": "cov_dr16_current", "source_id": "src_qso_dr16", "covariance_status": "current_same_data_context_not_holdout", "manifest_allowed": False},
              {"cov_id": "cov_lrg_control", "source_id": "src_lrg_dr16", "covariance_status": "control_context_not_primary_qso", "manifest_allowed": False},
          ]

          provenance_status_rows = [
              {"provenance_id": "prov_dr16_current", "source_id": "src_qso_dr16", "provenance_status": "current_same_data_context", "holdout_allowed": False},
              {"provenance_id": "prov_hou_dr14", "source_id": "src_qso_hou_dr14", "provenance_status": "same_survey_family_cross_release_needs_review", "holdout_allowed": False},
              {"provenance_id": "prov_gilmarin_dr14", "source_id": "src_qso_gilmarin_dr14", "provenance_status": "same_survey_family_cross_release_needs_review", "holdout_allowed": False},
              {"provenance_id": "prov_ruggeri_dr14", "source_id": "src_qso_ruggeri_dr14", "provenance_status": "same_survey_family_cross_release_needs_review", "holdout_allowed": False},
              {"provenance_id": "prov_zhao_dr14", "source_id": "src_qso_zhao_dr14", "provenance_status": "same_survey_family_cross_release_needs_review", "holdout_allowed": False},
              {"provenance_id": "prov_g1_dyslexia", "source_id": "src_g1_dyslexia", "provenance_status": "separate_neurotype_surface", "holdout_allowed": False},
              {"provenance_id": "prov_g1_aphantasia", "source_id": "src_g1_aphantasia", "provenance_status": "separate_neurotype_surface", "holdout_allowed": False},
          ]

          variable_registry_rows = []
          registry_sources = {
              "namespace": namespace_rows,
              "source_surface": source_surface_rows,
              "observable": observable_rows,
              "extracted_value": extracted_value_rows,
              "zhao_placeholder": zhao_placeholder_rows,
              "reference_target": reference_target_rows,
              "correction_contract": correction_contract_rows,
              "failure_condition": failure_condition_rows,
              "shape_signature": shape_signature_rows,
              "manifest_schema": manifest_schema_rows,
              "covariance_status": covariance_status_rows,
              "provenance_status": provenance_status_rows,
          }
          for group_name, rows in registry_sources.items():
              for index, row in enumerate(rows, start=1):
                  variable_registry_rows.append({
                      "variable_id": f"var_{group_name}_{index:03d}",
                      "variable_group": group_name,
                      "label": row.get("source_id") or row.get("observable_id") or row.get("value_id") or row.get("reference_target_id") or row.get("correction_id") or row.get("failure_condition_id") or row.get("shape_id") or row.get("schema_id") or row.get("cov_id") or row.get("provenance_id") or row.get("namespace") or row.get("placeholder_id"),
                      "status": row.get("status") or row.get("surface_status") or row.get("value_status") or row.get("reference_status") or row.get("covariance_status") or row.get("provenance_status") or row.get("claim_status") or "labeled",
                      "scoring_allowed": False,
                      "evidence_allowed": False,
                  })

          integration_node_rows = []
          for row in source_surface_rows:
              integration_node_rows.append({
                  "node_id": row["source_id"],
                  "node_type": "source_surface",
                  "label": row["source_family"],
                  "status": row["surface_status"],
              })
          for row in observable_rows:
              integration_node_rows.append({
                  "node_id": row["observable_id"],
                  "node_type": "observable",
                  "label": row["observable"],
                  "status": row["observable_type"],
              })
          for row in extracted_value_rows:
              integration_node_rows.append({
                  "node_id": row["value_id"],
                  "node_type": "extracted_value",
                  "label": row["observable_id"],
                  "status": row["value_status"],
              })
          for row in reference_target_rows:
              integration_node_rows.append({
                  "node_id": row["reference_target_id"],
                  "node_type": "reference_target",
                  "label": row["quantity"],
                  "status": row["reference_status"],
              })
          for row in correction_contract_rows:
              integration_node_rows.append({
                  "node_id": row["correction_id"],
                  "node_type": "correction_contract",
                  "label": row["symbol"],
                  "status": row["status"],
              })
          for row in failure_condition_rows:
              integration_node_rows.append({
                  "node_id": row["failure_condition_id"],
                  "node_type": "failure_condition",
                  "label": row["target"],
                  "status": row["status"],
              })
          for row in shape_signature_rows:
              integration_node_rows.append({
                  "node_id": row["shape_id"],
                  "node_type": "shape_signature",
                  "label": row["signature"],
                  "status": "shape_only_not_cause",
              })

          integration_edge_rows = []
          edge_i = 0
          for value in extracted_value_rows:
              edge_i += 1
              integration_edge_rows.append({
                  "edge_id": f"edge_{edge_i:04d}",
                  "from_node": value["value_id"],
                  "to_node": value["source_id"],
                  "edge_type": "value_from_source",
                  "edge_status": "not_scored",
              })
              edge_i += 1
              integration_edge_rows.append({
                  "edge_id": f"edge_{edge_i:04d}",
                  "from_node": value["value_id"],
                  "to_node": value["observable_id"],
                  "edge_type": "value_has_observable",
                  "edge_status": "not_scored",
