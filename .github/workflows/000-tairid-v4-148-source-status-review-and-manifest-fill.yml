          if covariance_ingested:
              failed_gates.append("covariance_unexpectedly_ingested")
          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")
          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "tairid cosmology is validated",
              "standard cosmology is disproven",
              "final rsd pressure score",
              "source page is the same as extracted source data",
              "raw candidate file is the same as ingested covariance",
              "repository page is official without provenance review",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "source_status_review_manifest_fill_passed_manifest_rows_drafted_raw_candidates_ready_for_structure_probe"

          rule_results = [
              {"rule_id": "workflow_name_sorts_top", "pass": True, "result": "workflow name begins with 000 TAIRID", "boundary": "Navigation convenience only."},
              {"rule_id": "node24_opt_in_preserved", "pass": True, "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved", "boundary": "Warning cleanup only."},
              {"rule_id": "upstream_v4_147_carried", "pass": upstream["readiness_label"] == "external_source_fetch_or_manifest_fill_plan_passed_source_targets_recorded_ready_for_source_status_review_and_manifest_fill", "result": "v4.147 source fetch status carried", "boundary": "Carry-forward only."},
              {"rule_id": "source_status_inputs_present", "pass": len(SOURCE_STATUS_INPUTS) >= 18, "result": f"source_status_inputs={len(SOURCE_STATUS_INPUTS)}; fetched={fetched_count}; failed={failed_count}", "boundary": "Status inputs only."},
              {"rule_id": "package_review_records_complete", "pass": len(package_review_records) == 10, "result": f"package_review_records={len(package_review_records)}", "boundary": "Review records only."},
              {"rule_id": "manifest_draft_rows_complete", "pass": len(manifest_draft_rows) == 10, "result": f"manifest_draft_rows={len(manifest_draft_rows)}", "boundary": "Draft rows only, not completed manifest."},
              {"rule_id": "raw_candidates_identified", "pass": raw_candidate_count == 2, "result": f"raw_candidate_count={raw_candidate_count}", "boundary": "Raw candidates not ingested."},
              {"rule_id": "raw_structure_probe_needed", "pass": raw_probe_ready_count >= 1, "result": f"raw_probe_ready_package_count={raw_probe_ready_count}", "boundary": "Probe before parser."},
              {"rule_id": "manual_extraction_queue_built", "pass": len(manual_extraction_queue) >= 1, "result": f"manual_extraction_queue={len(manual_extraction_queue)}", "boundary": "Manual extraction still needed."},
              {"rule_id": "reference_gap_preserved", "pass": missing_reference_count >= 1, "result": f"missing_reference_package_count={missing_reference_count}", "boundary": "Reference data still missing."},
              {"rule_id": "manifest_not_completed", "pass": manifest_completed is False, "result": "manifest not completed", "boundary": "No package completion claim."},
              {"rule_id": "raw_candidates_not_ingested", "pass": raw_candidate_ingested is False, "result": "raw candidates not ingested", "boundary": "No covariance ingestion."},
              {"rule_id": "source_data_not_ingested", "pass": source_data_ingested is False, "result": "source data not ingested", "boundary": "No value extraction."},
              {"rule_id": "covariance_not_ingested", "pass": covariance_ingested is False, "result": "covariance not ingested", "boundary": "No combined eBOSS interpretation."},
              {"rule_id": "pressure_not_recomputed", "pass": pressure_recomputed is False, "result": "pressure not recomputed", "boundary": "No final score."},
              {"rule_id": "final_pressure_and_validation_blocked", "pass": final_pressure_ready is False, "result": "final pressure and validation remain blocked", "boundary": "No validation claim."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 15, "result": f"blocked_claims={len(BLOCKED_CLAIMS)}", "boundary": "No validation or final pressure claim."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "", "result": route_decision, "boundary": "Route decision does not validate the model."}
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_148_rules_passed")

          if failed_gates:
              readiness_label = "source_status_review_manifest_fill_failed"
              next_allowed_step = "Repair source status review before continuing."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.149 raw candidate file structure probe. "
                  "Inspect shape/header/order only; do not ingest covariance, recompute pressure, run BIC/likelihood/posterior comparison, or make validation claims."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "source_status_input_count": len(SOURCE_STATUS_INPUTS),
              "fetched_count_carried": fetched_count,
              "failed_source_count_carried": failed_count,
              "package_review_record_count": len(package_review_records),
              "manifest_draft_row_count": len(manifest_draft_rows),
              "raw_candidate_count": raw_candidate_count,
              "manual_extraction_queue_count": len(manual_extraction_queue),
              "manual_extract_ready_package_count": manual_extract_ready_count,
              "raw_probe_ready_package_count": raw_probe_ready_count,
              "missing_reference_package_count": missing_reference_count,
              "manifest_completed": manifest_completed,
              "raw_candidate_ingested": raw_candidate_ingested,
              "source_data_ingested": source_data_ingested,
              "covariance_ingested": covariance_ingested,
              "pressure_recomputed": pressure_recomputed,
              "reference_vector_still_missing": True,
              "reference_covariance_still_missing": True,
              "same_program_eBOSS_covariance_still_limited": True,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "source_status_inputs": SOURCE_STATUS_INPUTS,
              "package_status_rules": PACKAGE_STATUS_RULES,
              "package_review_records": package_review_records,
              "manifest_draft_rows": manifest_draft_rows,
              "raw_candidate_records": raw_candidate_records,
              "manual_extraction_queue": manual_extraction_queue,
              "gap_records": gap_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "raw_candidate_count": raw_candidate_count,
                  "manifest_draft_row_count": len(manifest_draft_rows),
                  "manifest_completed": False,
                  "source_data_ingested": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_148_source_status_review_and_manifest_fill.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "source_status_inputs_v4_148.csv",
              SOURCE_STATUS_INPUTS,
              ["source_id", "package_id", "source_family", "source_kind", "source_url_or_doi", "fetch_ok", "expected_term_score", "covariance_hint", "likelihood_hint", "fsigma8_hint", "manifest_action"]
          )

          write_csv(
              OUTDIR / "package_review_records_v4_148.csv",
              package_review_records,
              ["package_id", "source_record_count", "reachable_source_count", "failed_source_count", "raw_candidate_count", "covariance_hint_count", "fsigma8_hint_count", "status", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "manifest_draft_rows_v4_148.csv",
              manifest_draft_rows,
              ["package_id", "source_ids", "source_url_or_doi", "source_families", "provided_file_path", "source_status", "raw_candidate_paths", "extraction_status", "ingestion_ready", "next_manual_action", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "raw_candidate_records_v4_148.csv",
              raw_candidate_records,
              ["source_id", "package_id", "source_url_or_doi", "source_family", "required_next_probe", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "manual_extraction_queue_v4_148.csv",
              manual_extraction_queue,
              ["source_id", "package_id", "source_url_or_doi", "source_family", "manifest_action", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "gap_records_v4_148.csv",
              gap_records,
              ["package_id", "status", "gap", "blocks", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "package_status_rules_v4_148.csv",
              PACKAGE_STATUS_RULES,
              ["status", "meaning"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_148.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_148.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_148.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.148 — Source Status Review and Manifest Fill")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.148 reviews the reachable source status from v4.147 and drafts manifest rows. It does not extract values, ingest covariance, parse raw files, recompute pressure, or validate TAIRID.")
          md.append("")
          md.append("The useful result is that two raw LRGxELG candidate files are ready for a structure-only probe, while value/provenance sources are ready for manual extraction. Reference vector and reference covariance remain missing.")
          md.append("")
          md.append("## Package review")
          md.append("")
          md.append("| Package | Status | Reachable sources | Raw candidates |")
          md.append("|---|---|---:|---:|")
          for row in package_review_records:
              md.append(f"| `{row['package_id']}` | `{row['status']}` | `{row['reachable_source_count']}` | `{row['raw_candidate_count']}` |")
          md.append("")
          md.append("## Raw candidates for next probe")
          md.append("")
          md.append("| Source | URL |")
          md.append("|---|---|")
          for row in raw_candidate_records:
              md.append(f"| `{row['source_id']}` | `{row['source_url_or_doi']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_148_source_status_review_and_manifest_fill.json",
              "tairid_v4_148_source_status_review_and_manifest_fill.md",
              "source_status_inputs_v4_148.csv",
              "package_review_records_v4_148.csv",
              "manifest_draft_rows_v4_148.csv",
              "raw_candidate_records_v4_148.csv",
              "manual_extraction_queue_v4_148.csv",
              "gap_records_v4_148.csv",
              "package_status_rules_v4_148.csv",
              "next_route_options_v4_148.csv",
              "blocked_claims_v4_148.csv",
              "rule_results_v4_148.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_148_source_status_review_and_manifest_fill.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.148 source status review and manifest fill artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-148-source-status-review-and-manifest-fill
          path: artifacts/tairid_v4_148_source_status_review_and_manifest_fill/
