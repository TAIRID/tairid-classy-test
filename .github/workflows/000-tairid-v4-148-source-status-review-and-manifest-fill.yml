              elif package["status"] == "raw_structure_probe_ready":
                  gap = "raw candidate structure unknown"
              elif package["status"] == "manual_extract_ready":
                  gap = "source page details not manually extracted"
              elif package["status"] == "retry_or_alternate_source_needed":
