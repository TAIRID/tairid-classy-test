                  "status": package["status"],
                  "gap": gap,
                  "blocks": (
                      "reference parser"
                      if "reference" in package["package_id"] else
                      "observed covariance parser"
                      if "covariance" in package["package_id"] or "overlap" in package["package_id"] else
