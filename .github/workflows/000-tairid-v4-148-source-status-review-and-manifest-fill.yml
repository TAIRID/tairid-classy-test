              source_ids = " | ".join(row["source_id"] for row in candidate_sources)
              source_families = " | ".join(sorted(set(row["source_family"] for row in candidate_sources)))
              raw_paths = " | ".join(row["source_url_or_doi"] for row in candidate_sources if row["source_kind"] == "small_raw_candidate_file")
              manifest_draft_rows.append({
                  "package_id": package["package_id"],
                  "source_ids": source_ids,
                  "source_url_or_doi": source_urls,
                  "source_families": source_families,
                  "provided_file_path": "",
                  "source_status": package["status"],
                  "raw_candidate_paths": raw_paths,
