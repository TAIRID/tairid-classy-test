              reachable = [row for row in rows if row["fetch_ok"]]
              raw = [row for row in reachable if row["source_kind"] == "small_raw_candidate_file"]
              covariance_hint_count = sum(1 for row in reachable if row["covariance_hint"])
              fsigma8_hint_count = sum(1 for row in reachable if row["fsigma8_hint"])
              failed = [row for row in rows if not row["fetch_ok"]]

