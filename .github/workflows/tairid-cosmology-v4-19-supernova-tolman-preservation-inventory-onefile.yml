name: TAIRID Cosmology v4.19 Supernova Tolman Preservation Inventory Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-19-supernova-tolman-preservation-inventory-onefile.yml"

jobs:
  supernova-tolman-preservation-inventory-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.19 supernova Tolman preservation inventory onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_19_supernova_tolman_preservation_inventory_onefile

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_19_supernova_tolman_preservation_inventory_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_19_supernova_tolman_preservation_inventory_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine CMB, supernovae, BAO, KiDS, DES, HSC, or H0LiCOW into one posterior.",
              "This does not parse supernova light-curve data.",
              "This does not run a Tolman surface-brightness analysis.",
              "This inventories preservation sources and failure guards for supernova time dilation and Tolman dimming.",
              "A pass means TAIRID observation-surface language has preserved the correct guardrails, not that TAIRID cosmology is validated."
          ]

          SOURCE_ROOTS = [
              {
                  "source_id": "goldhaber_1996_sn_time_dilation",
                  "role_focus": "supernova_time_dilation",
                  "source_url": "https://arxiv.org/abs/astro-ph/9602124",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "supernova light curves broadened as expected from expansion",
                  "preservation_role": "time_dilation_guard"
              },
              {
                  "source_id": "blondin_2008_sn_spectral_time_dilation",
                  "role_focus": "supernova_time_dilation",
                  "source_url": "https://arxiv.org/abs/0804.3595",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "spectral aging rate consistent with 1/(1+z) and excludes tired-light/no-time-dilation models",
                  "preservation_role": "time_dilation_guard"
              },
              {
                  "source_id": "des_2024_slow_supernovae_time_dilation",
                  "role_focus": "supernova_time_dilation",
                  "source_url": "https://arxiv.org/abs/2406.05050",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "recent DES time-dilation measurement candidate",
                  "preservation_role": "time_dilation_guard"
              },
              {
                  "source_id": "lubin_sandage_2001_tolman_iv",
                  "role_focus": "tolman_surface_brightness",
                  "source_url": "https://arxiv.org/abs/astro-ph/0106566",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "Tolman surface-brightness depression and tired-light rejection",
                  "preservation_role": "tolman_dimming_guard"
              },
              {
                  "source_id": "sandage_lubin_2001_tolman_i",
                  "role_focus": "tolman_surface_brightness",
                  "source_url": "https://arxiv.org/abs/astro-ph/0102213",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "Tolman test calibration and local parameter boundary",
                  "preservation_role": "tolman_dimming_guard"
              },
              {
                  "source_id": "etherington_distance_duality_review",
                  "role_focus": "distance_duality_bridge",
                  "source_url": "https://arxiv.org/abs/2112.05701",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "distance-duality relation as propagation consistency guard",
                  "preservation_role": "distance_duality_guard"
              }
          ]

          PRESERVATION_LANES = [
              {
                  "lane_id": "supernova_time_dilation",
                  "tairid_role": "observation_surface_propagation_pacing_guard",
                  "standard_requirement": "Distant supernova light curves or spectral ages must preserve redshift-linked time dilation.",
                  "support_signal": "Source literature reports time dilation consistent with expansion or incompatible with no-time-dilation tired light.",
                  "failure_signal": "TAIRID language allows redshift without time dilation.",
                  "current_status_before_this_test": "not_tested_here",
                  "allowed_result": "preservation_inventory_only",
                  "blocked_claim": "TAIRID does not reject supernova time-dilation evidence."
              },
              {
                  "lane_id": "tolman_surface_brightness",
                  "tairid_role": "observation_surface_intensity_propagation_guard",
                  "standard_requirement": "Surface-brightness behavior must preserve Tolman-style redshift dimming constraints.",
                  "support_signal": "Source literature treats surface-brightness dimming as expansion-consistent and tired-light-sensitive.",
                  "failure_signal": "TAIRID collapses into simple photon energy loss without surface-brightness behavior.",
                  "current_status_before_this_test": "not_tested_here",
                  "allowed_result": "preservation_inventory_only",
                  "blocked_claim": "TAIRID does not become a tired-light model."
              },
              {
                  "lane_id": "distance_duality_bridge",
                  "tairid_role": "observation_surface_distance_coherence_guard",
                  "standard_requirement": "Luminosity distance and angular-diameter distance must remain coherently bounded before reach is reinterpreted.",
                  "support_signal": "Distance-duality source is present as a future bridge guard.",
                  "failure_signal": "TAIRID allows distance measures to drift independently without a boundary condition.",
                  "current_status_before_this_test": "conceptual_bridge",
                  "allowed_result": "bridge_inventory_only",
                  "blocked_claim": "TAIRID does not freely redefine distance."
              }
          ]

          BLOCKED_INTERPRETATIONS = [
              {
                  "claim": "TAIRID is validated by supernova time dilation.",
                  "status": "blocked",
                  "reason": "This inventory preserves a standard observation; it does not validate the theory."
              },
              {
                  "claim": "TAIRID rejects expansion evidence.",
                  "status": "blocked",
                  "reason": "Time dilation and Tolman dimming are preservation requirements, not discarded evidence."
              },
              {
                  "claim": "TAIRID can act like tired light.",
                  "status": "blocked",
                  "reason": "No-time-dilation or simple-energy-loss behavior is treated as a failure mode."
              },
              {
                  "claim": "Tolman dimming proves TAIRID.",
                  "status": "blocked",
                  "reason": "Tolman dimming is a guardrail, not a TAIRID proof."
              },
              {
                  "claim": "Distance can be redefined without distance-duality checks.",
                  "status": "blocked",
                  "reason": "Distance duality remains a boundary guard."
              }
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_20_distance_duality_and_bao_boundary_registry",
                  "role_focus": "observation_surface_and_boundary_ruler",
                  "purpose": "Preserve luminosity-distance/angular-diameter-distance relation and BAO ruler-boundary status before any reach reinterpretation.",
                  "why_next": "After time-dilation and Tolman guards, distance coherence is the next reach boundary.",
                  "must_include": "distance duality, BAO auxiliary status, no one-surface collapse.",
                  "must_not_include": "BAO validation claim or free distance redefinition."
              },
              {
                  "priority": 2,
                  "next_test": "v4_21_growth_expansion_RSD_cluster_CMB_lensing_inventory",
                  "role_focus": "consolidation_growth",
                  "purpose": "Return to growth/consolidation with RSD, cluster, and CMB-lensing inventories.",
                  "why_next": "Observation-surface preservation guards should be active before expanding growth evidence.",
                  "must_include": "source/product status, direct-vs-summary labels, no combined posterior claim.",
                  "must_not_include": "full likelihood fitting or validation language."
              },
              {
                  "priority": 3,
                  "next_test": "v4_22_inflation_jobs_requirement_ledger",
                  "role_focus": "viability_space_expansion",
                  "purpose": "List the required jobs inflation performs before TAIRID viability-space expansion can become more than a conceptual mapping.",
                  "why_next": "The inflation plate must be tested against standard requirements before model claims.",
                  "must_include": "smoothness, flatness, primordial spectrum, acoustic peaks, tensor bounds.",
                  "must_not_include": "claiming TAIRID replaces inflation."
              }
          ]

          KEYWORDS = {
              "time_dilation": [
                  "time dilation",
                  "dilated",
                  "dilation",
                  "1/(1+z)",
                  "1 + z",
                  "light curves",
                  "spectral ages",
                  "aging rate"
              ],
              "tolman": [
                  "Tolman",
                  "surface brightness",
                  "surface-brightness",
                  "(1+z)^4",
                  "tired light",
                  "expansion"
              ],
              "tired_light_failure": [
                  "tired light",
                  "no time dilation",
                  "non-expansion",
                  "static"
              ],
              "distance_duality": [
                  "distance duality",
                  "Etherington",
                  "luminosity distance",
                  "angular diameter distance",
                  "null geodesics",
                  "photons"
              ]
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def fetch_text(url, timeout=90, byte_limit=2_000_000):
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 TAIRID-v4.19-SN-Tolman-preservation-inventory",
                      "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
                  }
              )
              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def clean_text(text):
              text = re.sub(r"<script.*?</script>", " ", text or "", flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def keyword_hits(text, words):
              lower = (text or "").lower()
              hits = []
              for word in words:
                  if word.lower() in lower:
                      hits.append(word)
              return hits

          def classify_source(role_focus, text):
              cleaned = clean_text(text)
              time_hits = keyword_hits(cleaned, KEYWORDS["time_dilation"])
              tolman_hits = keyword_hits(cleaned, KEYWORDS["tolman"])
              tired_hits = keyword_hits(cleaned, KEYWORDS["tired_light_failure"])
              distance_hits = keyword_hits(cleaned, KEYWORDS["distance_duality"])

              if role_focus == "supernova_time_dilation":
                  if time_hits and tired_hits:
                      classification = "time_dilation_guard_with_tired_light_failure_signal"
                  elif time_hits:
                      classification = "time_dilation_guard_source"
                  else:
                      classification = "time_dilation_source_needs_manual_review"
              elif role_focus == "tolman_surface_brightness":
                  if tolman_hits and tired_hits:
                      classification = "tolman_guard_with_tired_light_failure_signal"
                  elif tolman_hits:
                      classification = "tolman_surface_brightness_guard_source"
                  else:
                      classification = "tolman_source_needs_manual_review"
              elif role_focus == "distance_duality_bridge":
                  if distance_hits:
                      classification = "distance_duality_bridge_guard_source"
                  else:
                      classification = "distance_duality_source_needs_manual_review"
              else:
                  classification = "unknown_role_source"

              return {
                  "classification": classification,
                  "time_dilation_hits": ";".join(time_hits),
                  "tolman_hits": ";".join(tolman_hits),
                  "tired_light_failure_hits": ";".join(tired_hits),
                  "distance_duality_hits": ";".join(distance_hits),
                  "text_preview": cleaned[:500]
              }

          source_rows = []

          for source in SOURCE_ROOTS:
              fetched = fetch_text(source["source_url"])
              classified = classify_source(source["role_focus"], fetched["text"] if fetched["ok"] else "")

              source_rows.append({
                  "source_id": source["source_id"],
                  "role_focus": source["role_focus"],
                  "source_url": source["source_url"],
                  "source_type": source["source_type"],
                  "expected_signal": source["expected_signal"],
                  "preservation_role": source["preservation_role"],
                  "fetch_ok": fetched["ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"],
                  **classified
              })

          failed_gates = []
          warnings = []

          reachable_sources = [row for row in source_rows if row["fetch_ok"]]
          if len(reachable_sources) < 3:
              failed_gates.append("too_few_preservation_sources_reachable")

          sn_sources = [row for row in source_rows if row["role_focus"] == "supernova_time_dilation"]
          tolman_sources = [row for row in source_rows if row["role_focus"] == "tolman_surface_brightness"]
          distance_sources = [row for row in source_rows if row["role_focus"] == "distance_duality_bridge"]

          sn_guard_ok = any(
              row["classification"] in [
                  "time_dilation_guard_with_tired_light_failure_signal",
                  "time_dilation_guard_source"
              ]
              for row in sn_sources
          )

          tolman_guard_ok = any(
              row["classification"] in [
                  "tolman_guard_with_tired_light_failure_signal",
                  "tolman_surface_brightness_guard_source"
              ]
              for row in tolman_sources
          )

          tired_light_failure_guard_ok = any(
              row["tired_light_failure_hits"]
              for row in source_rows
          )

          distance_bridge_ok = any(
              row["classification"] == "distance_duality_bridge_guard_source"
              for row in distance_sources
          )

          if not sn_guard_ok:
              failed_gates.append("supernova_time_dilation_guard_not_found")

          if not tolman_guard_ok:
              failed_gates.append("tolman_surface_brightness_guard_not_found")

          if not tired_light_failure_guard_ok:
              failed_gates.append("tired_light_failure_guard_not_found")

          if not distance_bridge_ok:
              warnings.append("distance_duality_bridge_source_needs_manual_review")

          warnings.append("preservation_inventory_is_not_data_reanalysis")
          warnings.append("time_dilation_and_tolman_are_guards_not_tairid_proof")

          lane_results = [
              {
                  "lane_id": "supernova_time_dilation",
                  "guard_pass": sn_guard_ok,
                  "result": "time_dilation_preservation_guard_present" if sn_guard_ok else "time_dilation_guard_missing",
                  "allowed_interpretation": "TAIRID observation-surface language must preserve time dilation.",
                  "blocked_interpretation": "TAIRID can ignore time dilation or become no-time-dilation tired light."
              },
              {
                  "lane_id": "tolman_surface_brightness",
                  "guard_pass": tolman_guard_ok,
                  "result": "tolman_preservation_guard_present" if tolman_guard_ok else "tolman_guard_missing",
                  "allowed_interpretation": "TAIRID observation-surface language must preserve surface-brightness dimming constraints.",
                  "blocked_interpretation": "TAIRID can collapse redshift into simple photon energy loss."
              },
              {
                  "lane_id": "tired_light_failure_guard",
                  "guard_pass": tired_light_failure_guard_ok,
                  "result": "tired_light_failure_mode_blocked" if tired_light_failure_guard_ok else "tired_light_guard_missing",
                  "allowed_interpretation": "Tired-light/static-light drift is treated as a failure mode.",
                  "blocked_interpretation": "TAIRID is a tired-light model."
              },
              {
                  "lane_id": "distance_duality_bridge",
                  "guard_pass": distance_bridge_ok,
                  "result": "distance_duality_bridge_source_present" if distance_bridge_ok else "distance_duality_bridge_needs_review",
                  "allowed_interpretation": "Distance-duality remains a future boundary guard.",
                  "blocked_interpretation": "TAIRID can freely redefine distance."
              }
          ]

          if failed_gates:
              readiness_label = "supernova_tolman_preservation_inventory_failed"
              next_step = "Repair preservation source inventory before moving to distance-duality or BAO boundary registry."
          else:
              readiness_label = "supernova_tolman_preservation_inventory_passed_ready_for_distance_duality_bao_boundary_registry"
              next_step = (
                  "Proceed to v4.20 distance-duality and BAO boundary registry. "
                  "Keep supernova time dilation and Tolman dimming as preservation guards, not TAIRID proof."
              )

          system_health = {
              "reachable_source_count": len(reachable_sources),
              "source_count": len(source_rows),
              "supernova_time_dilation_guard_present": sn_guard_ok,
              "tolman_surface_brightness_guard_present": tolman_guard_ok,
              "tired_light_failure_guard_present": tired_light_failure_guard_ok,
              "distance_duality_bridge_present": distance_bridge_ok,
              "tairid_validation_claim_allowed": False,
              "tired_light_claim_allowed": False,
              "expansion_evidence_rejection_allowed": False
          }

          interpretation = (
              "v4.19 inventories source lanes for supernova time dilation and Tolman surface-brightness dimming. "
              "This does not reanalyze data or validate TAIRID. "
              "It creates a preservation guard: any future TAIRID observation-surface or propagation reinterpretation must preserve time dilation, Tolman dimming, distance coherence, and must treat tired-light/static-light behavior as a failure mode."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_roots": SOURCE_ROOTS,
              "preservation_lanes": PRESERVATION_LANES,
              "source_rows": source_rows,
              "lane_results": lane_results,
              "blocked_interpretations": BLOCKED_INTERPRETATIONS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "inflation_replacement_claim_allowed": False,
                  "tired_light_claim_allowed": False,
                  "static_light_claim_allowed": False,
                  "expansion_evidence_rejection_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "combined_posterior_allowed": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "preservation_source_inventory_v4_19.csv",
              source_rows,
              [
                  "source_id",
                  "role_focus",
                  "source_url",
                  "source_type",
                  "expected_signal",
                  "preservation_role",
                  "fetch_ok",
                  "http_status",
                  "content_type",
                  "bytes_read",
                  "error",
                  "classification",
                  "time_dilation_hits",
                  "tolman_hits",
                  "tired_light_failure_hits",
                  "distance_duality_hits",
                  "text_preview"
              ]
          )

          write_csv(
              OUTDIR / "preservation_lane_results_v4_19.csv",
              lane_results,
              ["lane_id", "guard_pass", "result", "allowed_interpretation", "blocked_interpretation"]
          )

          write_csv(
              OUTDIR / "preservation_lanes_v4_19.csv",
              PRESERVATION_LANES,
              [
                  "lane_id",
                  "tairid_role",
                  "standard_requirement",
                  "support_signal",
                  "failure_signal",
                  "current_status_before_this_test",
                  "allowed_result",
                  "blocked_claim"
              ]
          )

          write_csv(
              OUTDIR / "blocked_interpretations_v4_19.csv",
              BLOCKED_INTERPRETATIONS,
              ["claim", "status", "reason"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_19.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "why_next", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_19.csv",
              [system_health],
              [
                  "reachable_source_count",
                  "source_count",
                  "supernova_time_dilation_guard_present",
                  "tolman_surface_brightness_guard_present",
                  "tired_light_failure_guard_present",
                  "distance_duality_bridge_present",
                  "tairid_validation_claim_allowed",
                  "tired_light_claim_allowed",
                  "expansion_evidence_rejection_allowed"
              ]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_preservation_inventory_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Supernova time dilation and Tolman dimming are preserved as observation-surface guardrails.",
                  "boundary": "Preservation inventory only, not validation."
              },
              {
                  "interpretation_id": "allowed_tired_light_failure_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Tired-light/static-light drift is treated as a failure mode for TAIRID cosmology.",
                  "boundary": "No tired-light reinterpretation."
              },
              {
                  "interpretation_id": "allowed_distance_duality_bridge_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Distance duality remains a future boundary guard before reach reinterpretation.",
                  "boundary": "No free distance redefinition."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID cosmology is validated.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_expansion_rejection_claim",
                  "status": "forbidden",
                  "wording": "TAIRID rejects expansion evidence.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_tired_light_claim",
                  "status": "forbidden",
                  "wording": "TAIRID is a tired-light model.",
                  "boundary": "Blocked."
              }
          ]

          write_csv(
              OUTDIR / "interpretation_boundaries_v4_19.csv",
              interpretation_rows,
              ["interpretation_id", "status", "wording", "boundary"]
          )

          json_path = OUTDIR / "tairid_cosmology_v4_19_supernova_tolman_preservation_inventory_onefile.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v4.19 — Supernova / Tolman Preservation Inventory")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This inventory checks whether TAIRID observation-surface language preserves supernova time dilation and Tolman surface-brightness dimming.")
          md.append("")
          md.append("These are preservation guards. They do not prove TAIRID. They prevent TAIRID from drifting into tired-light, static-light, or broken-propagation claims.")
