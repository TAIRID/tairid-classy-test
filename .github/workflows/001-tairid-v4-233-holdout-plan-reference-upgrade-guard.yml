name: 001 TAIRID v4.233 - Holdout Plan Reference Upgrade Guard

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-233-holdout-plan-reference-upgrade-guard.yml"

permissions:
  contents: read

jobs:
  holdout-plan-reference-upgrade-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.233 Holdout Plan Reference Upgrade Guard is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.233 holdout plan reference upgrade guard
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import zipfile

          VERSION = "v4.233"
          ROUTE = "holdout_plan_reference_upgrade_guard_after_v4_232"
          EXPECTED_RESULT = "v4_233_holdout_plan_reference_upgrade_guard_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_234_external_holdout_source_locator_or_stronger_lcdm_reference_scaffold"

          OUT = Path("tairid_v4_233_holdout_plan_reference_upgrade_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-233-holdout-plan-reference-upgrade-guard-output.zip"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          frozen_prediction_rows = [
              {
                  "freeze_id": "freeze_001_primary_qso_growth",
                  "source_family": "QSO_or_QSO_like_high_redshift_growth_surface",
                  "frozen_prediction": "f_sigma8 residual pressure remains positive against a stronger explicit reference if the TAIRID source-surface pressure lane is real.",
                  "expected_direction": "+",
                  "expected_pressure_class": "stable_positive_pressure_or_positive_with_zero_guard_band",
                  "failure_condition": "High-redshift QSO-like growth pressure becomes stable zero, stable negative, or mixed in a stronger reference/holdout test.",
                  "source_status": "frozen_from_v4_232_candidate_layer",
                  "evidence_status": "future_holdout_needed",
              },
              {
                  "freeze_id": "freeze_002_secondary_qso_radial",
                  "source_family": "QSO_or_QSO_like_high_redshift_radial_geometry",
                  "frozen_prediction": "D_H_over_r_sound should remain nonnegative or positive more often than negative if the radial pacing surface is coupled to the QSO pressure lane.",
                  "expected_direction": "+/0",
                  "expected_pressure_class": "positive_with_zero_guard_band_or_stable_zero_guard",
                  "failure_condition": "QSO-like radial geometry becomes stable negative under stronger reference/holdout data.",
                  "source_status": "secondary_prediction_only",
                  "evidence_status": "future_holdout_needed",
              },
              {
                  "freeze_id": "freeze_003_control_lrg_growth",
                  "source_family": "LRG_or_LRG_like_lower_redshift_growth_surface",
                  "frozen_prediction": "LRG-like growth should not show the same stable positive pressure as high-redshift QSO-like growth.",
                  "expected_direction": "0_or_not_stable_positive",
                  "expected_pressure_class": "stable_zero_guard_or_mixed_or_negative_with_zero_guard_band",
                  "failure_condition": "LRG-like lower-redshift growth shows the same stable positive pressure pattern as QSO-like high-redshift growth.",
                  "source_status": "control_prediction",
                  "evidence_status": "future_holdout_needed",
              },
              {
                  "freeze_id": "freeze_004_geometry_compressed_lane",
                  "source_family": "compressed_geometry_DV_like_lane",
                  "frozen_prediction": "Compressed geometry alone should not be promoted as the primary TAIRID pressure lane from current data.",
                  "expected_direction": "mostly_0_or_not_primary",
                  "expected_pressure_class": "stable_zero_guard_or_secondary_only",
                  "failure_condition": "Future workflows promote compressed geometry as the main evidence lane without source-surface justification.",
                  "source_status": "guardrail",
                  "evidence_status": "future_guard_needed",
              },
          ]

          holdout_eligibility_rule_rows = [
              {
                  "rule_id": "holdout_rule_001",
                  "rule": "A holdout source must not be the same exact eBOSS DR16 LRG/QSO files already used in v4.223-v4.232.",
                  "reason": "Same data cannot become independent evidence after the prediction was written.",
              },
              {
                  "rule_id": "holdout_rule_002",
                  "rule": "A holdout test must freeze the prediction before parsing or scoring the holdout surface.",
                  "reason": "Prevents tuning the prediction after seeing the result.",
              },
              {
                  "rule_id": "holdout_rule_003",
                  "rule": "A holdout test must preserve source family and tracer role.",
                  "reason": "QSO-like growth, LRG-like growth, geometry-only surfaces, and compressed lanes are not interchangeable.",
              },
              {
                  "rule_id": "holdout_rule_004",
                  "rule": "A holdout test must use an explicit reference/model value before calling anything a residual.",
                  "reason": "Prevents raw source differences from being mislabeled as residuals.",
              },
              {
                  "rule_id": "holdout_rule_005",
                  "rule": "A holdout test must keep covariance or likelihood handling explicit.",
                  "reason": "Diagonal-only, full covariance, inverse covariance, and grid likelihood are different surfaces.",
              },
              {
                  "rule_id": "holdout_rule_006",
                  "rule": "A holdout test must record failure conditions before running.",
                  "reason": "The prediction must be falsifiable inside the workflow.",
              },
              {
                  "rule_id": "holdout_rule_007",
                  "rule": "A holdout test must keep validation language blocked.",
                  "reason": "Even a matching holdout is still evidence-building, not proof.",
              },
              {
                  "rule_id": "holdout_rule_008",
                  "rule": "A holdout test must not allow a combined LRG/ELG/QSO matrix until source-surface guards pass.",
                  "reason": "Combined matrices can hide tracer-specific roles and dependencies.",
              },
          ]

          holdout_candidate_rows = [
              {
                  "candidate_id": "candidate_001",
                  "candidate_surface": "independent_high_z_qso_or_qso_like_fsigma8_surface",
                  "target_role": "primary_holdout_for_qso_growth_pressure",
                  "needed_data": "source-specific redshift, f_sigma8 or comparable growth observable, uncertainty/covariance, provenance",
                  "eligibility_status": "eligible_if_not_same_files_and_prediction_frozen_before_parse",
                  "blocked_use": "not usable if it reuses v4.223-v4.232 exact source files as the evidence surface",
              },
              {
                  "candidate_id": "candidate_002",
                  "candidate_surface": "independent_qso_radial_geometry_surface",
                  "target_role": "secondary_holdout_for_radial_pacing_pressure",
                  "needed_data": "D_H/r_s or equivalent radial distance observable with reference model comparison",
                  "eligibility_status": "eligible_as_secondary_if source role and reference are explicit",
                  "blocked_use": "not primary if growth observable is absent",
              },
              {
                  "candidate_id": "candidate_003",
                  "candidate_surface": "independent_lrg_or_lrg_like_growth_surface",
                  "target_role": "control_surface_against_qso_growth_pressure",
                  "needed_data": "LRG-like f_sigma8 or comparable growth observable with covariance/reference",
                  "eligibility_status": "eligible_control_if lower-redshift/source role is preserved",
                  "blocked_use": "not evidence for QSO pressure if it shares the same response",
              },
              {
                  "candidate_id": "candidate_004",
                  "candidate_surface": "geometry_only_bao_or_compressed_dv_surface",
                  "target_role": "geometry_control_not_primary_growth_holdout",
                  "needed_data": "D_V/r_s, D_M/r_s, D_H/r_s or likelihood table with clear axis translation",
                  "eligibility_status": "eligible_as_geometry_control_only",
                  "blocked_use": "not enough to test QSO growth prediction by itself",
              },
              {
                  "candidate_id": "candidate_005",
                  "candidate_surface": "mock_or_internal_resampling_of_current_sources",
                  "target_role": "pipeline_sanity_check_only",
                  "needed_data": "documented mock/resampling method",
                  "eligibility_status": "not_independent_holdout",
                  "blocked_use": "cannot count as external evidence",
              },
              {
                  "candidate_id": "candidate_006",
                  "candidate_surface": "stronger_lcdm_reference_for_existing_lrg_qso_sources",
                  "target_role": "reference_upgrade_not_holdout",
                  "needed_data": "stronger ΛCDM reference calculation or external likelihood reference values",
                  "eligibility_status": "needed_before_validation_language",
                  "blocked_use": "does not create independent holdout because it uses same source data",
              },
          ]

          reference_upgrade_requirement_rows = [
              {
                  "upgrade_id": "reference_upgrade_001",
                  "upgrade": "stronger_lcdm_distance_reference",
                  "why_needed": "Current D_M and D_H values are computed from an internal low-complexity projection bracket.",
                  "minimum_acceptance": "Explicit reference values for D_M/r_s and D_H/r_s at each source redshift with documented constants or external calculator outputs.",
              },
              {
                  "upgrade_id": "reference_upgrade_002",
                  "upgrade": "stronger_growth_reference",
                  "why_needed": "Current f_sigma8 reference uses a rough growth approximation rather than a full growth/likelihood calculation.",
                  "minimum_acceptance": "Explicit f_sigma8 reference at each source redshift with documented model, constants, and uncertainty/assumption handling.",
              },
              {
                  "upgrade_id": "reference_upgrade_003",
                  "upgrade": "likelihood_or_chisq_interpretation_boundary",
                  "why_needed": "Chi-square diagnostics are being used as source-surface pressure review, not formal model comparison.",
                  "minimum_acceptance": "Define whether future chi-square is diagnostic, likelihood comparison, or model selection before running.",
              },
              {
                  "upgrade_id": "reference_upgrade_004",
                  "upgrade": "source_covariance_preservation",
                  "why_needed": "LRG/QSO split axes have covariance; ELG remains a grid likelihood/compressed surface.",
                  "minimum_acceptance": "No diagonal-only substitution unless explicitly labeled and blocked from final claims.",
              },
              {
                  "upgrade_id": "reference_upgrade_005",
                  "upgrade": "TAIRID_correction_formula_or_sign_rule",
                  "why_needed": "A TAIRID-specific prediction must eventually become more than a sign expectation.",
                  "minimum_acceptance": "A frozen correction formula, sign rule, or source-surface transformation that can fail.",
              },
              {
                  "upgrade_id": "reference_upgrade_006",
                  "upgrade": "holdout_failure_ledger",
                  "why_needed": "The system needs to know what would weaken or reject the current TAIRID pressure lane.",
                  "minimum_acceptance": "Workflow writes pass/fail/weakening conditions before parsing holdout data.",
              },
          ]

          failure_condition_rows = [
              {
                  "failure_id": "failure_001",
                  "target_prediction": "QSO f_sigma8 primary pressure",
                  "failure_condition": "A stronger reference or independent holdout makes QSO-like f_sigma8 stable zero or stable negative.",
                  "effect_on_claim": "Primary TAIRID pressure lane weakens or fails.",
              },
              {
                  "failure_id": "failure_002",
                  "target_prediction": "QSO vs LRG growth contrast",
                  "failure_condition": "LRG-like growth shows the same stable positive pressure as QSO-like growth under comparable guards.",
                  "effect_on_claim": "The source-surface contrast weakens.",
              },
              {
                  "failure_id": "failure_003",
                  "target_prediction": "QSO radial secondary pressure",
                  "failure_condition": "QSO-like D_H/r_s becomes stable negative under stronger reference/holdout.",
                  "effect_on_claim": "Secondary pacing support weakens.",
              },
              {
                  "failure_id": "failure_004",
                  "target_prediction": "Geometry compressed lane as non-primary",
                  "failure_condition": "Compressed geometry becomes the only stable pressure lane while QSO growth disappears.",
                  "effect_on_claim": "The current source-surface interpretation must be rewritten.",
              },
              {
                  "failure_id": "failure_005",
                  "target_prediction": "Reference robustness",
                  "failure_condition": "A stronger ΛCDM reference absorbs all source-surface pressure without a TAIRID-specific leftover pattern.",
                  "effect_on_claim": "Baseline pressure was likely reference weakness, not TAIRID-specific evidence.",
              },
          ]

          testing_goal_rows = [
              {
                  "goal_id": "goal_001",
                  "goal": "Upgrade the reference model.",
                  "v4_233_status": "active_next_option",
                  "closure_need": "stronger ΛCDM reference before validation language",
              },
              {
                  "goal_id": "goal_002",
                  "goal": "Separate baseline pressure from TAIRID prediction.",
                  "v4_233_status": "candidate prediction layer frozen for future tests",
                  "closure_need": "holdout or stronger reference must test the frozen layer",
              },
              {
                  "goal_id": "goal_003",
                  "goal": "Preserve covariance and source surfaces.",
                  "v4_233_status": "guard maintained",
                  "closure_need": "do not blend QSO/LRG/ELG without source compatibility",
              },
              {
                  "goal_id": "goal_004",
                  "goal": "Add holdout logic.",
                  "v4_233_status": "holdout rules and failure conditions written",
                  "closure_need": "locate or ingest independent holdout source",
              },
              {
                  "goal_id": "goal_005",
                  "goal": "Compare against ΛCDM honestly.",
                  "v4_233_status": "not yet complete",
                  "closure_need": "explicit stronger reference and model comparison boundary",
              },
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "Do not count v4.232 as independent evidence.",
                  "basis": "Prediction layer was written after v4.231 and evaluated on the same source family.",
                  "next_action": "Use v4.233 freeze rows for future holdout or stronger reference.",
                  "claim_status": "evidence_blocked",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "Prioritize QSO growth holdout or stronger reference upgrade.",
                  "basis": "QSO f_sigma8 remains the primary pressure location.",
                  "next_action": "Run v4.234 locator/scaffold route.",
                  "claim_status": "test_design_ready",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "Keep combined matrix blocked.",
                  "basis": "ELG remains a non-split-axis source and combined surfaces could hide dependencies.",
                  "next_action": "Continue source-surface testing only.",
                  "claim_status": "combined_matrix_blocked",
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "frozen_prediction_layer_for_future_tests",
                  "permission_status": "allowed",
                  "reason": "Predictions and failure conditions are explicit and can be used prospectively.",
              },
              {
                  "permission_scope": "current_data_as_holdout_evidence",
                  "permission_status": "blocked",
                  "reason": "Current data were already reviewed before prediction layer was written.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No validation without holdout or stronger model comparison.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Source-surface compatibility has not been proven.",
              },
              {
                  "permission_scope": "next_source_locator_or_reference_upgrade",
                  "permission_status": "allowed",
                  "reason": "Next step may locate holdout sources or scaffold stronger ΛCDM reference.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_234_external_holdout_source_locator",
                  "purpose": "look for independent QSO-like growth surfaces and LRG-like control surfaces",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_234_stronger_lcdm_reference_scaffold",
                  "purpose": "create a stronger reference calculation boundary before validation language",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_234_holdout_failure_condition_checker",
                  "purpose": "make failure conditions machine-readable before parsing holdout data",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_234_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until source-surface guards pass",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before holdout plan"},
              {"gate": "frozen_prediction_rows_equal_4", "passed": len(frozen_prediction_rows) == 4, "detail": f"frozen_prediction_rows = {len(frozen_prediction_rows)}"},
              {"gate": "holdout_eligibility_rule_rows_equal_8", "passed": len(holdout_eligibility_rule_rows) == 8, "detail": f"holdout_eligibility_rule_rows = {len(holdout_eligibility_rule_rows)}"},
              {"gate": "holdout_candidate_rows_equal_6", "passed": len(holdout_candidate_rows) == 6, "detail": f"holdout_candidate_rows = {len(holdout_candidate_rows)}"},
              {"gate": "reference_upgrade_requirement_rows_equal_6", "passed": len(reference_upgrade_requirement_rows) == 6, "detail": f"reference_upgrade_requirement_rows = {len(reference_upgrade_requirement_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "testing_goal_rows_equal_5", "passed": len(testing_goal_rows) == 5, "detail": f"testing_goal_rows = {len(testing_goal_rows)}"},
              {"gate": "decision_rows_equal_3", "passed": len(decision_rows) == 3, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "permission_rows_equal_5", "passed": len(permission_rows) == 5, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "current_data_holdout_blocked", "passed": any(row["permission_scope"] == "current_data_as_holdout_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "current data as holdout evidence blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "future_holdout_allowed", "passed": any(row["permission_scope"] == "frozen_prediction_layer_for_future_tests" and row["permission_status"] == "allowed" for row in permission_rows), "detail": "future frozen prediction layer allowed"},
              {"gate": "qso_growth_primary_freeze_present", "passed": any(row["freeze_id"] == "freeze_001_primary_qso_growth" for row in frozen_prediction_rows), "detail": "QSO growth primary freeze present"},
              {"gate": "failure_conditions_machine_readable", "passed": all(row["failure_condition"] for row in failure_condition_rows), "detail": "failure conditions present"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_not_current_holdout", "passed": True, "detail": "current data cannot count as holdout"},
              {"gate": "truth_boundary_combined_matrix_blocked", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_234_external_holdout_source_locator_or_stronger_lcdm_reference_scaffold", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_233_holdout_plan_reference_upgrade_guard_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_233_frozen_prediction_rows.csv", frozen_prediction_rows)
          write_csv(OUT / "v4_233_holdout_eligibility_rule_rows.csv", holdout_eligibility_rule_rows)
          write_csv(OUT / "v4_233_holdout_candidate_rows.csv", holdout_candidate_rows)
          write_csv(OUT / "v4_233_reference_upgrade_requirement_rows.csv", reference_upgrade_requirement_rows)
          write_csv(OUT / "v4_233_failure_condition_rows.csv", failure_condition_rows)
          write_csv(OUT / "v4_233_testing_goal_rows.csv", testing_goal_rows)
          write_csv(OUT / "v4_233_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_233_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_233_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_233_rule_checks.csv", checks)

          freeze_lines = [
              f"{row['freeze_id']}: {row['source_family']} expects {row['expected_pressure_class']}"
              for row in frozen_prediction_rows
          ]

          decision_lines = [
              f"{row['decision_id']}: {row['decision']} Next: {row['next_action']}"
              for row in decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "frozen_prediction_rows": len(frozen_prediction_rows),
              "holdout_eligibility_rule_rows": len(holdout_eligibility_rule_rows),
              "holdout_candidate_rows": len(holdout_candidate_rows),
              "reference_upgrade_requirement_rows": len(reference_upgrade_requirement_rows),
              "failure_condition_rows": len(failure_condition_rows),
              "testing_goal_rows": len(testing_goal_rows),
              "decision_rows": len(decision_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "current_data_counts_as_holdout": False,
                  "claims_shared_cause": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_233_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.233 Holdout Plan Reference Upgrade Guard",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"frozen_prediction_rows = {summary['frozen_prediction_rows']}",
              f"holdout_eligibility_rule_rows = {summary['holdout_eligibility_rule_rows']}",
              f"holdout_candidate_rows = {summary['holdout_candidate_rows']}",
              f"reference_upgrade_requirement_rows = {summary['reference_upgrade_requirement_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"testing_goal_rows = {summary['testing_goal_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Frozen predictions:",
              *freeze_lines,
              "",
              "Decisions:",
              *decision_lines,
              "",
              "Clean meaning: v4.233 freezes the candidate TAIRID prediction layer for future tests, writes holdout eligibility rules, writes failure conditions, and keeps current data blocked from counting as holdout evidence.",
              "",
              "Truth boundary: no proof, no validation, no current-data holdout, no shared cause, no combined matrix.",
          ]
          (OUT / "v4_233_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"frozen_prediction_rows = {summary['frozen_prediction_rows']}")
          print(f"holdout_eligibility_rule_rows = {summary['holdout_eligibility_rule_rows']}")
          print(f"holdout_candidate_rows = {summary['holdout_candidate_rows']}")
          print(f"reference_upgrade_requirement_rows = {summary['reference_upgrade_requirement_rows']}")
          print(f"failure_condition_rows = {summary['failure_condition_rows']}")
          print(f"testing_goal_rows = {summary['testing_goal_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no current-data holdout, no shared cause, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.233 holdout plan reference upgrade guard output
