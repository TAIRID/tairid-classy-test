name: "!!! AAA CURRENT - TAIRID v4.409 eBOSS guarded residual staging no chi-square no support"

on:
  workflow_dispatch:

jobs:
  run-v4-409:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas

      - name: Run v4.409 eBOSS guarded residual staging
        run: |
          python3 <<'PY'

          import os, glob, zipfile, io, json, math, csv
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          VERSION = "v4.409"
          ROUTE_NAME = "v4_409_eboss_guarded_residual_staging_no_chi_square_no_support"
          EXPECTED_RESULT = "v4_409_eboss_guarded_residual_staging_passed_residuals_computed_no_chi_square_no_support_claims"
          OUTPUT_DIR = Path("tairid_v4_409_eboss_guarded_residual_staging_no_chi_square_no_support_output")
          OUTPUT_ZIP = Path("tairid-v4-409-eboss-guarded-residual-staging-no-chi-square-no-support-output.zip")

          CLAIM_BOUNDARY = (
              "eBOSS guarded residual staging gate only; this gate computes signed residuals and "
              "one-sigma residual units from the already loaded eBOSS LRG, ELG, and QSO observed "
              "f_sigma_8 values and the already staged baseline predictions; no covariance matrix "
              "values are loaded; no chi-square, likelihood, p-values, validated score, or TAIRID "
              "support claims are allowed"
          )

          def boolish(x):
              if isinstance(x, bool):
                  return x
              if isinstance(x, (int, float)):
                  return bool(x)
              if x is None:
                  return False
              return str(x).strip().lower() in {"true","1","yes","y"}

          def read_zip_member_recursive(zip_path, suffix):
              """Return bytes for first member whose name endswith suffix, descending into nested zips."""
              seen = set()
              def _read(blob, label):
                  if label in seen:
                      return None
                  seen.add(label)
                  try:
                      with zipfile.ZipFile(io.BytesIO(blob)) as z:
                          names = z.namelist()
                          for name in names:
                              if name.endswith(suffix):
                                  return z.read(name)
                          for name in names:
                              if name.lower().endswith(".zip"):
                                  got = _read(z.read(name), label + "::" + name)
                                  if got is not None:
                                      return got
                  except zipfile.BadZipFile:
                      return None
                  return None
              with open(zip_path, "rb") as f:
                  return _read(f.read(), str(zip_path))

          def find_input_zip():
              patterns = [
                  "**/tairid-v4-408-eboss-baseline-prediction-staging-no-residuals-no-support-output*.zip",
                  "**/*v4-408*baseline*prediction*no-residuals*no-support*.zip",
                  "**/*v4_408*baseline*prediction*no_residuals*no_support*.zip",
              ]
              hits = []
              for pat in patterns:
                  hits.extend([p for p in glob.glob(pat, recursive=True) if "v4-409" not in p and "v4_409" not in p])
              # de-duplicate, prefer newest
              hits = sorted(set(hits), key=lambda p: os.path.getmtime(p), reverse=True)
              return hits[0] if hits else None

          input_zip = find_input_zip()
          rule_checks = []
          def check(name, passed):
              rule_checks.append({"gate": name, "passed": bool(passed)})
              return bool(passed)

          check("input_408_zip_found", input_zip is not None)

          summary = {}
          residual_input = pd.DataFrame()
          prediction_rows = pd.DataFrame()

          if input_zip:
              summary_bytes = read_zip_member_recursive(input_zip, "v4_408_summary.json")
              residual_bytes = read_zip_member_recursive(input_zip, "v4_408_residual_input_packet_FOR_V4_409_NO_CHI_SQUARE_NO_SUPPORT.csv")
              prediction_bytes = read_zip_member_recursive(input_zip, "v4_408_eboss_baseline_prediction_staging_NO_RESIDUALS_NO_SUPPORT.csv")
              check("v4_408_summary_found", summary_bytes is not None)
              check("v4_408_residual_input_packet_found", residual_bytes is not None)
              check("v4_408_prediction_staging_file_found", prediction_bytes is not None)
              if summary_bytes:
                  summary = json.loads(summary_bytes.decode("utf-8"))
              if residual_bytes:
                  residual_input = pd.read_csv(io.BytesIO(residual_bytes))
              if prediction_bytes:
                  prediction_rows = pd.read_csv(io.BytesIO(prediction_bytes))
          else:
              check("v4_408_summary_found", False)
              check("v4_408_residual_input_packet_found", False)
              check("v4_408_prediction_staging_file_found", False)

          check("input_408_version_correct", summary.get("version") == "v4.408")
          check("input_408_expected_result_correct", summary.get("expected_result") == "v4_408_eboss_baseline_prediction_staging_passed_predictions_loaded_no_residuals_no_support_claims")
          check("input_408_failed_gates_none", summary.get("failed_gates") == "none")
          check("input_408_observed_value_rows_eq_3", int(summary.get("observed_value_rows", -1)) == 3)
          check("input_408_prediction_rows_eq_3", int(summary.get("prediction_rows", -1)) == 3)
          check("input_408_prediction_loaded_true", boolish(summary.get("prediction_loaded")) is True)
          check("input_408_residuals_computed_false", boolish(summary.get("residuals_computed")) is False)
          check("input_408_covariance_values_loaded_false", boolish(summary.get("covariance_values_loaded")) is False)
          check("input_408_new_chi_square_computed_false", boolish(summary.get("new_chi_square_computed")) is False)
          check("input_408_likelihood_computed_false", boolish(summary.get("likelihood_computed")) is False)
          check("input_408_p_values_computed_false", boolish(summary.get("p_values_computed")) is False)
          check("input_408_score_valid_false", boolish(summary.get("score_valid")) is False)
          check("input_408_support_allowed_false", boolish(summary.get("support_allowed")) is False)

          required_cols = {
              "tracer_or_sample_family",
              "effective_redshift_z",
              "observable",
              "observed_central_value",
              "observed_one_sigma_uncertainty",
              "baseline_prediction_fsigma8",
              "ready_for_residual_review",
              "may_compute_residual_in_v4_409",
              "may_compute_chi_square_in_v4_409",
              "covariance_values_loaded",
              "support_allowed",
          }
          check("residual_input_columns_present", required_cols.issubset(set(residual_input.columns)))
          check("residual_input_rows_eq_3", len(residual_input) == 3)
          check("residual_input_required_tracers_present", set(residual_input.get("tracer_or_sample_family", [])) == {"LRG","ELG","QSO"})
          if len(residual_input) > 0:
              check("all_ready_for_residual_review_true", residual_input["ready_for_residual_review"].map(boolish).all())
              check("all_may_compute_residual_true", residual_input["may_compute_residual_in_v4_409"].map(boolish).all())
              check("all_may_compute_chi_square_false", (~residual_input["may_compute_chi_square_in_v4_409"].map(boolish)).all())
              check("all_covariance_values_loaded_false", (~residual_input["covariance_values_loaded"].map(boolish)).all())
              check("all_support_allowed_false", (~residual_input["support_allowed"].map(boolish)).all())
              check("all_observed_values_finite", pd.to_numeric(residual_input["observed_central_value"], errors="coerce").notna().all())
              check("all_uncertainties_positive", (pd.to_numeric(residual_input["observed_one_sigma_uncertainty"], errors="coerce") > 0).all())
              check("all_predictions_finite", pd.to_numeric(residual_input["baseline_prediction_fsigma8"], errors="coerce").notna().all())
          else:
              for g in ["all_ready_for_residual_review_true","all_may_compute_residual_true","all_may_compute_chi_square_false",
                        "all_covariance_values_loaded_false","all_support_allowed_false","all_observed_values_finite",
                        "all_uncertainties_positive","all_predictions_finite"]:
                  check(g, False)

          # Compute signed residuals only. No chi-square sum is computed.
          residual_rows = []
          if len(residual_input) == 3 and required_cols.issubset(set(residual_input.columns)):
              order = {"LRG": 1, "ELG": 2, "QSO": 3}
              for _, row in residual_input.sort_values("tracer_or_sample_family", key=lambda s: s.map(order)).iterrows():
                  obs = float(row["observed_central_value"])
                  sig = float(row["observed_one_sigma_uncertainty"])
                  pred = float(row["baseline_prediction_fsigma8"])
                  resid = obs - pred
                  resid_sigma = resid / sig
                  if resid > 0:
                      polarity = "observed_above_baseline"
                  elif resid < 0:
                      polarity = "observed_below_baseline"
                  else:
                      polarity = "observed_equals_baseline"
                  residual_rows.append({
                      "v4_409_residual_id": f"V4_409_EBOSS_RESIDUAL_{order[row['tracer_or_sample_family']]:03d}",
                      "tracer_or_sample_family": row["tracer_or_sample_family"],
                      "effective_redshift_z": float(row["effective_redshift_z"]),
                      "observable": row["observable"],
                      "observed_central_value": obs,
                      "observed_one_sigma_uncertainty": sig,
                      "baseline_prediction_fsigma8": pred,
                      "signed_residual_observed_minus_baseline": resid,
                      "residual_in_one_sigma_units": resid_sigma,
                      "residual_polarity": polarity,
                      "residual_computed_now": True,
                      "covariance_values_loaded": False,
                      "chi_square_computed_now": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

          residual_df = pd.DataFrame(residual_rows)
          check("guarded_residual_rows_eq_3", len(residual_df) == 3)
          check("guarded_residuals_computed_true", len(residual_df) == 3 and residual_df["residual_computed_now"].map(boolish).all())
          check("guarded_chi_square_computed_now_false", len(residual_df) == 3 and (~residual_df["chi_square_computed_now"].map(boolish)).all())
          check("guarded_likelihood_p_values_score_support_false", len(residual_df) == 3 and 
                (~residual_df["likelihood_computed"].map(boolish)).all() and
                (~residual_df["p_values_computed"].map(boolish)).all() and
                (~residual_df["score_valid"].map(boolish)).all() and
                (~residual_df["support_allowed"].map(boolish)).all())

          # Residual polarity and diagnostic summaries (not a score)
          if len(residual_df) == 3:
              positive_rows = int((residual_df["signed_residual_observed_minus_baseline"] > 0).sum())
              negative_rows = int((residual_df["signed_residual_observed_minus_baseline"] < 0).sum())
              max_abs_sigma = float(residual_df["residual_in_one_sigma_units"].abs().max())
              largest_abs_row = residual_df.loc[residual_df["residual_in_one_sigma_units"].abs().idxmax()]
          else:
              positive_rows = negative_rows = 0
              max_abs_sigma = None
              largest_abs_row = {}

          polarity_summary = pd.DataFrame([{
              "v4_409_summary_row_id": "V4_409_RESIDUAL_POLARITY_SUMMARY_001",
              "positive_residual_rows": positive_rows,
              "negative_residual_rows": negative_rows,
              "zero_residual_rows": int(3 - positive_rows - negative_rows) if len(residual_df) == 3 else 0,
              "largest_absolute_residual_tracer": largest_abs_row.get("tracer_or_sample_family", None) if len(residual_df) == 3 else None,
              "largest_absolute_residual_sigma_units": max_abs_sigma,
              "chi_square_computed": False,
              "combined_score_computed": False,
              "support_allowed": False,
              "interpretation_boundary": "Residual polarity and one-sigma residual units are descriptive staging diagnostics only; they are not a chi-square, likelihood, p-value, validated score, or support claim."
          }])
          check("polarity_summary_rows_eq_1", len(polarity_summary) == 1)
          check("positive_plus_negative_rows_eq_3", len(residual_df) == 3 and positive_rows + negative_rows == 3)
          check("largest_abs_residual_identified", len(residual_df) == 3 and str(largest_abs_row.get("tracer_or_sample_family", "")) in {"LRG","ELG","QSO"})

          next_gate_packet = pd.DataFrame([
              {
                  "v4_410_input_id": f"V4_410_EBOSS_UNCERTAINTY_REVIEW_INPUT_{i+1:03d}",
                  "tracer_or_sample_family": r["tracer_or_sample_family"],
                  "effective_redshift_z": r["effective_redshift_z"],
                  "observable": r["observable"],
                  "observed_central_value": r["observed_central_value"],
                  "observed_one_sigma_uncertainty": r["observed_one_sigma_uncertainty"],
                  "baseline_prediction_fsigma8": r["baseline_prediction_fsigma8"],
                  "signed_residual_observed_minus_baseline": r["signed_residual_observed_minus_baseline"],
                  "residual_in_one_sigma_units": r["residual_in_one_sigma_units"],
                  "recommended_next_gate": "v4_410_eboss_uncertainty_covariance_treatment_review_before_any_chi_square",
                  "may_use_official_one_sigma_for_guarded_diagonal_dry_run_after_review": True,
                  "covariance_values_loaded": False,
                  "support_allowed": False,
              }
              for i, r in residual_df.iterrows()
          ]) if len(residual_df) == 3 else pd.DataFrame()
          check("v4_410_input_packet_rows_eq_3", len(next_gate_packet) == 3)

          limitations = pd.DataFrame([
              {"limitation_id": "V4_409_LIMIT_001", "limitation": "Residuals are descriptive only and are not a chi-square, likelihood, p-value, or validated score.", "status": "active_limit"},
              {"limitation_id": "V4_409_LIMIT_002", "limitation": "No eBOSS covariance values are loaded in this gate.", "status": "active_limit"},
              {"limitation_id": "V4_409_LIMIT_003", "limitation": "The three eBOSS tracer rows are not yet combined into a statistical diagnostic.", "status": "active_limit"},
              {"limitation_id": "V4_409_LIMIT_004", "limitation": "Official one-sigma uncertainties may only be used for a guarded diagonal dry run after explicit uncertainty-treatment review.", "status": "active_limit"},
          ])
          gaps = pd.DataFrame([
              {"gap_id": "V4_409_OPEN_GAP_001", "gap": "eBOSS uncertainty or covariance treatment remains open before any chi-square dry run.", "status": "open_next_gate"},
              {"gap_id": "V4_409_OPEN_GAP_002", "gap": "Covariance-source recovery remains open if a covariance-corrected eBOSS comparison is required.", "status": "open_later_gate"},
              {"gap_id": "V4_409_OPEN_GAP_003", "gap": "No eBOSS support interpretation exists at this stage.", "status": "blocked_here"},
          ])
          next_routes = pd.DataFrame([
              {"route": "v4_410_eboss_uncertainty_covariance_treatment_review_no_support", "recommendation": "primary_next", "description": "Review whether the official one-sigma uncertainties may support a guarded diagonal dry-run while covariance recovery remains separate."},
              {"route": "v4_410B_eboss_covariance_source_fetch_if_required", "recommendation": "alternate_if_needed", "description": "Use if the next gate decides no diagonal dry-run is acceptable without covariance recovery."},
              {"route": "halt_and_review_prediction_method", "recommendation": "fallback_only", "description": "Use only if the baseline prediction method is contested."},
          ])

          # Now add final gate checks
          new_chi_square_computed = False
          likelihood_computed = False
          p_values_computed = False
          score_valid = False
          support_allowed = False
          check("new_chi_square_computed_false", new_chi_square_computed is False)
          check("likelihood_computed_false", likelihood_computed is False)
          check("p_values_computed_false", p_values_computed is False)
          check("score_valid_false", score_valid is False)
          check("support_allowed_false", support_allowed is False)
          check("no_covariance_values_loaded", len(residual_df) == 3 and (~residual_df["covariance_values_loaded"].map(boolish)).all())

          failed = [r["gate"] for r in rule_checks if not r["passed"]]
          failed_gates = "none" if not failed else ";".join(failed)

          summary_out = {
              "version": VERSION,
              "route_name": ROUTE_NAME,
              "expected_result": EXPECTED_RESULT,
              "created_utc": datetime.now(timezone.utc).isoformat(),
              "input_version": "v4.408",
              "rules_passed": sum(1 for r in rule_checks if r["passed"]),
              "rules_total": len(rule_checks),
              "failed_gates": failed_gates,
              "observed_value_rows": int(summary.get("observed_value_rows", 0)),
              "prediction_rows": int(summary.get("prediction_rows", 0)),
              "guarded_residual_rows": len(residual_df),
              "positive_residual_rows": positive_rows,
              "negative_residual_rows": negative_rows,
              "LRG_signed_residual": float(residual_df.loc[residual_df["tracer_or_sample_family"]=="LRG", "signed_residual_observed_minus_baseline"].iloc[0]) if len(residual_df) == 3 else None,
              "ELG_signed_residual": float(residual_df.loc[residual_df["tracer_or_sample_family"]=="ELG", "signed_residual_observed_minus_baseline"].iloc[0]) if len(residual_df) == 3 else None,
              "QSO_signed_residual": float(residual_df.loc[residual_df["tracer_or_sample_family"]=="QSO", "signed_residual_observed_minus_baseline"].iloc[0]) if len(residual_df) == 3 else None,
              "LRG_residual_sigma_units": float(residual_df.loc[residual_df["tracer_or_sample_family"]=="LRG", "residual_in_one_sigma_units"].iloc[0]) if len(residual_df) == 3 else None,
              "ELG_residual_sigma_units": float(residual_df.loc[residual_df["tracer_or_sample_family"]=="ELG", "residual_in_one_sigma_units"].iloc[0]) if len(residual_df) == 3 else None,
              "QSO_residual_sigma_units": float(residual_df.loc[residual_df["tracer_or_sample_family"]=="QSO", "residual_in_one_sigma_units"].iloc[0]) if len(residual_df) == 3 else None,
              "largest_absolute_residual_tracer": largest_abs_row.get("tracer_or_sample_family", None) if len(residual_df) == 3 else None,
              "largest_absolute_residual_sigma_units": max_abs_sigma,
              "residuals_computed": len(residual_df) == 3,
              "covariance_values_loaded": False,
              "new_chi_square_computed": False,
              "likelihood_computed": False,
              "p_values_computed": False,
              "score_valid": False,
              "support_allowed": False,
              "claim_boundary": CLAIM_BOUNDARY,
              "selected_next_route": "v4_410_eboss_uncertainty_covariance_treatment_review_no_support",
          }

          OUTPUT_DIR.mkdir(parents=True, exist_ok=True)
          residual_df.to_csv(OUTPUT_DIR / "v4_409_eboss_guarded_residual_staging_NO_CHI_SQUARE_NO_SUPPORT.csv", index=False)
          polarity_summary.to_csv(OUTPUT_DIR / "v4_409_residual_polarity_summary_NO_SUPPORT.csv", index=False)
          next_gate_packet.to_csv(OUTPUT_DIR / "v4_409_input_packet_FOR_V4_410_UNCERTAINTY_COVARIANCE_REVIEW_NO_SUPPORT.csv", index=False)
          limitations.to_csv(OUTPUT_DIR / "v4_409_limitations_after_guarded_residual_staging.csv", index=False)
          gaps.to_csv(OUTPUT_DIR / "v4_409_gap_status_after_guarded_residual_staging.csv", index=False)
          next_routes.to_csv(OUTPUT_DIR / "v4_409_next_route_options.csv", index=False)
          pd.DataFrame(rule_checks).to_csv(OUTPUT_DIR / "v4_409_rule_checks.csv", index=False)
          with open(OUTPUT_DIR / "v4_409_summary.json", "w", encoding="utf-8") as f:
              json.dump(summary_out, f, indent=2, sort_keys=True)
          with open(OUTPUT_DIR / "v4_409_summary.md", "w", encoding="utf-8") as f:
              f.write(f"# v4.409 eBOSS guarded residual staging\n\n")
              f.write(f"Expected result: `{EXPECTED_RESULT}`\n\n")
              f.write(f"Rules: {summary_out['rules_passed']} / {summary_out['rules_total']}\n\n")
              f.write(f"Failed gates: `{failed_gates}`\n\n")
              if len(residual_df) == 3:
                  f.write("Residuals staged only:\n\n")
                  for _, row in residual_df.iterrows():
                      f.write(f"- {row['tracer_or_sample_family']}: observed={row['observed_central_value']}, baseline={row['baseline_prediction_fsigma8']}, residual={row['signed_residual_observed_minus_baseline']}, residual_sigma_units={row['residual_in_one_sigma_units']}\n")
              f.write("\nNo covariance values, chi-square, likelihoods, p-values, validated score, or support claims were produced.\n")

          if OUTPUT_ZIP.exists():
              OUTPUT_ZIP.unlink()
          with zipfile.ZipFile(OUTPUT_ZIP, "w", compression=zipfile.ZIP_DEFLATED) as z:
              for path in OUTPUT_DIR.rglob("*"):
                  z.write(path, path.as_posix())

          print(f"expected_result = {EXPECTED_RESULT}")
          print(f"rules_passed = {summary_out['rules_passed']} / {summary_out['rules_total']}")
          print(f"failed_gates = {failed_gates}")
          print(f"guarded_residual_rows = {summary_out['guarded_residual_rows']}")
          print(f"positive_residual_rows = {positive_rows}")
          print(f"negative_residual_rows = {negative_rows}")
          print(f"largest_absolute_residual_tracer = {summary_out['largest_absolute_residual_tracer']}")
          print(f"largest_absolute_residual_sigma_units = {summary_out['largest_absolute_residual_sigma_units']}")
          print(f"new_chi_square_computed = {summary_out['new_chi_square_computed']}")
          print(f"likelihood_computed = {summary_out['likelihood_computed']}")
          print(f"p_values_computed = {summary_out['p_values_computed']}")
          print(f"score_valid = {summary_out['score_valid']}")
          print(f"support_allowed = {summary_out['support_allowed']}")
          print(f"WROTE {OUTPUT_ZIP}")

          if failed:
              raise SystemExit(1)

          PY

      - name: Upload v4.409 output artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-409-eboss-guarded-residual-staging-no-chi-square-no-support-output
          path: tairid-v4-409-eboss-guarded-residual-staging-no-chi-square-no-support-output.zip
