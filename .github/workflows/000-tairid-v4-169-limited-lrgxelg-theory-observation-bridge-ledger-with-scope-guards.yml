name: 000 TAIRID v4.169 - Limited LRGxELG Theory Observation Bridge Ledger With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-169-limited-lrgxelg-theory-observation-bridge-ledger-with-scope-guards.yml"

permissions:
  contents: read

jobs:
  v4-169-theory-observation-bridge-ledger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.169 theory-observation bridge ledger
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_169_outputs
          cat > tairid_v4_169_outputs/run_v4_169.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          OUT = Path("tairid_v4_169_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "limited_lrgxelg_theory_observation_bridge_ledger_passed_gap_map_written_no_pressure_no_validation"

          BLOCKED_CLAIMS = [
              "no final pressure",
              "no full chi-square",
              "no likelihood",
              "no BIC",
              "no posterior comparison",
              "no Planck/reference covariance",
              "no QSO covariance",
              "no full eBOSS covariance",
              "no TAIRID validation",
              "no claim that LCDM-lite is ruled out",
              "no claim that TAIRID is confirmed",
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames)
                  w.writeheader()
                  for row in rows:
                      w.writerow(row)

          # Core facts carried forward from the completed v4.151-v4.168 lane.
          observed_values = {
              "DM_ov_rd_z0p70": 17.954174,
              "DH_ov_rd_z0p70": 21.221161,
              "fsigma8_z0p70": 0.433572,
              "DM_ov_rd_z0p845": 18.896851,
              "DH_ov_rd_z0p845": 20.910056,
              "fsigma8_z0p845": 0.296822,
          }

          lcdm_lite_reference = {
              "DM_ov_rd_z0p70": 17.5805195461,
              "DH_ov_rd_z0p70": 20.2449335870,
              "fsigma8_z0p70": 0.4618546966,
              "DM_ov_rd_z0p845": 20.3899796593,
              "DH_ov_rd_z0p845": 18.5350397709,
              "fsigma8_z0p845": 0.4480660425,
          }

          observed_sigma = {
              "DM_ov_rd_z0p70": 0.508712,
              "DH_ov_rd_z0p70": 1.197674,
              "fsigma8_z0p70": 0.050037,
              "DM_ov_rd_z0p845": 0.776274,
              "DH_ov_rd_z0p845": 2.861697,
              "fsigma8_z0p845": 0.081385,
          }

          z_map = {
              "DM_ov_rd_z0p70": 0.700,
              "DH_ov_rd_z0p70": 0.700,
              "fsigma8_z0p70": 0.700,
              "DM_ov_rd_z0p845": 0.845,
              "DH_ov_rd_z0p845": 0.845,
              "fsigma8_z0p845": 0.845,
          }

          role_map = {
              "DM_ov_rd_z0p70": "transverse_geometry_reach",
              "DH_ov_rd_z0p70": "radial_geometry_pacing_access",
              "fsigma8_z0p70": "growth_consolidation",
              "DM_ov_rd_z0p845": "transverse_geometry_reach",
              "DH_ov_rd_z0p845": "radial_geometry_pacing_access",
              "fsigma8_z0p845": "growth_consolidation",
          }

          labels = list(observed_values.keys())

          residual_rows = []
          for label in labels:
              obs = observed_values[label]
              ref = lcdm_lite_reference[label]
              resid = obs - ref
              percent = 100.0 * resid / ref
              sigma_units = resid / observed_sigma[label]
              residual_rows.append({
                  "label": label,
                  "z": z_map[label],
                  "role": role_map[label],
                  "observed_value": obs,
                  "lcdm_lite_reference_value": ref,
                  "observed_minus_reference": resid,
                  "percent_residual": percent,
                  "observed_sigma": observed_sigma[label],
                  "observed_sigma_units_preview_not_pressure": sigma_units,
              })

          write_csv(
              OUT / "v4_169_residual_context_ledger.csv",
              residual_rows,
              [
                  "label",
                  "z",
                  "role",
                  "observed_value",
                  "lcdm_lite_reference_value",
                  "observed_minus_reference",
                  "percent_residual",
                  "observed_sigma",
                  "observed_sigma_units_preview_not_pressure",
              ],
          )

          bridge_rows = [
              {
                  "tairid_theory_claim": "Propagation and consolidation should not appear only as one isolated number.",
                  "observable_proxy": "Coupled geometry-growth residual shape across DM/rd, DH/rd, and fsigma8.",
                  "current_observation": "The limited LRGxELG product shows mixed geometry-growth residuals: growth below LCDM-lite at both redshifts, radial geometry above LCDM-lite at both redshifts, and transverse geometry flipping sign.",
                  "status": "diagnostic_support_only",
                  "supporting_versions": "v4.154, v4.162, v4.164",
                  "gap_remaining": "Needs reference covariance, QSO covariance, full eBOSS covariance, and external model comparison before interpretation.",
              },
              {
                  "tairid_theory_claim": "A real boundary signal should survive covariance organization as a structured mode rather than vanish as loose scatter.",
                  "observable_proxy": "Observed covariance residual-mode lattice.",
                  "current_observation": "v4.166 found dominant Mode 3 with observed-covariance radius preview 3.230341 and energy fraction 0.377439, mainly geometry-heavy.",
                  "status": "diagnostic_support_only",
                  "supporting_versions": "v4.166",
                  "gap_remaining": "Observed covariance is not enough because reference covariance is missing.",
              },
              {
                  "tairid_theory_claim": "Adding bounded reference-side uncertainty should reshape but not automatically erase a real residual lattice.",
                  "observable_proxy": "Observed plus LCDM-lite sensitivity proxy lattice.",
                  "current_observation": "v4.167 slightly reduced the preview radius from 3.230341 to 3.151957 while keeping dominant mode M3.",
                  "status": "diagnostic_support_only",
                  "supporting_versions": "v4.167",
                  "gap_remaining": "Sensitivity proxy is not real Planck/reference covariance.",
              },
              {
                  "tairid_theory_claim": "The residual lattice should have interpretable driver-shape direction, but it should not be overread as fitted parameters.",
                  "observable_proxy": "Local LCDM-lite parameter-driver cosine attribution.",
                  "current_observation": "v4.168 found raw-value alignment strongest with Omega_m, while observed-sigma and fractional-reference spaces were strongest with sigma8_z0; H0 and rd are highly collinear.",
                  "status": "clarifies_mixed_driver_shape",
                  "supporting_versions": "v4.168 and v4.168b",
                  "gap_remaining": "Attribution shape is not fitting, not posterior inference, and not final pressure.",
              },
              {
                  "tairid_theory_claim": "A clean theory-observation bridge must identify where the theory gains traction and where it remains blocked.",
                  "observable_proxy": "Claim-status matrix and gap register.",
                  "current_observation": "The current lane supports a guarded shape language: twisted geometry-growth ribbon, geometry-heavy covariance mode, and mixed parameter-driver attribution.",
                  "status": "bridge_language_ready",
                  "supporting_versions": "v4.151 through v4.168",
                  "gap_remaining": "Must acquire or generate defensible reference covariance and broader eBOSS/QSO covariance context.",
              },
          ]

          write_csv(
              OUT / "v4_169_theory_observation_bridge_ledger.csv",
              bridge_rows,
              [
                  "tairid_theory_claim",
                  "observable_proxy",
                  "current_observation",
                  "status",
                  "supporting_versions",
                  "gap_remaining",
              ],
          )

          claim_status_rows = [
              {
                  "claim": "Limited LRGxELG parser is structurally ready.",
                  "status": "passed",
                  "allowed_wording": "The limited LRGxELG two-redshift product is parsed, pinned, and structurally normalized.",
                  "forbidden_wording": "The full eBOSS covariance is solved.",
              },
              {
                  "claim": "Observed geometry-growth shape is nontrivial.",
                  "status": "guarded_diagnostic",
                  "allowed_wording": "The observed limited product forms a twisted geometry-growth diagnostic shape.",
                  "forbidden_wording": "The universe is proven to follow TAIRID.",
              },
              {
                  "claim": "Residuals against LCDM-lite are numerically interesting.",
                  "status": "guarded_diagnostic",
                  "allowed_wording": "Against the LCDM-lite prototype, growth is low at both redshifts and radial geometry is high at both redshifts.",
                  "forbidden_wording": "LCDM is ruled out.",
              },
              {
                  "claim": "Observed covariance mode lattice has structure.",
                  "status": "guarded_diagnostic",
                  "allowed_wording": "Observed covariance organizes the residual into a geometry-heavy mode preview.",
                  "forbidden_wording": "This is final pressure.",
              },
              {
                  "claim": "Reference covariance gap is closed.",
                  "status": "not_closed",
                  "allowed_wording": "Reference covariance is still missing; only a sensitivity proxy exists.",
                  "forbidden_wording": "Reference uncertainty has been solved.",
              },
              {
                  "claim": "QSO/full eBOSS gap is closed.",
                  "status": "not_closed",
                  "allowed_wording": "QSO and full eBOSS covariance remain blockers.",
                  "forbidden_wording": "The full tracer family has been tested.",
              },
              {
                  "claim": "TAIRID cosmology is validated.",
                  "status": "blocked",
                  "allowed_wording": "The lane has diagnostic structures worth testing further.",
                  "forbidden_wording": "TAIRID is validated by eBOSS.",
              },
          ]

          write_csv(
              OUT / "v4_169_claim_status_matrix.csv",
              claim_status_rows,
              ["claim", "status", "allowed_wording", "forbidden_wording"],
          )

          gap_rows = [
              {
                  "gap_id": "G1",
                  "gap_name": "Reference covariance",
                  "why_it_matters": "Needed before full pressure, chi-square, likelihood, BIC, or posterior comparison.",
                  "current_status": "missing; only LCDM-lite sensitivity proxy exists",
                  "clean_next_action": "Acquire Planck/reference covariance or parameter samples for the limited six-slot vector.",
                  "risk_if_ignored": "Would overstate diagnostic sigma previews as final pressure.",
              },
              {
                  "gap_id": "G2",
                  "gap_name": "QSO covariance or likelihood",
                  "why_it_matters": "Needed to test whether the earlier ELG/QSO directional split survives full tracer context.",
                  "current_status": "missing",
                  "clean_next_action": "Locate official QSO DR16 covariance or likelihood route.",
                  "risk_if_ignored": "Would turn limited LRGxELG result into an unsupported eBOSS-family claim.",
              },
              {
                  "gap_id": "G3",
                  "gap_name": "Full eBOSS covariance and overlap model",
                  "why_it_matters": "Needed to prevent double counting or false independence across tracers.",
                  "current_status": "missing",
                  "clean_next_action": "Locate or construct defensible cross-tracer covariance/overlap treatment.",
                  "risk_if_ignored": "Would inflate apparent structure by treating coupled measurements as independent.",
              },
              {
                  "gap_id": "G4",
                  "gap_name": "External LCDM baseline",
                  "why_it_matters": "LCDM-lite is diagnostic only; official CAMB/CLASS or posterior-sample route is needed.",
                  "current_status": "CAMB/CLASS unavailable in v4.158b runner; LCDM-lite prototype used",
                  "clean_next_action": "Use downloadable parameter chains, precomputed grids, or external package route.",
                  "risk_if_ignored": "Would confuse prototype baseline with accepted cosmology reference.",
              },
              {
                  "gap_id": "G5",
                  "gap_name": "Theory-to-observation language",
                  "why_it_matters": "Needed so TAIRID claims stay tied to measured proxies rather than broad claims.",
                  "current_status": "this workflow writes the first bridge ledger",
                  "clean_next_action": "Use bridge ledger as the claim boundary for the next tests.",
                  "risk_if_ignored": "Would slide from diagnostic shape into proof language.",
              },
          ]

          write_csv(
              OUT / "v4_169_gap_register.csv",
              gap_rows,
              ["gap_id", "gap_name", "why_it_matters", "current_status", "clean_next_action", "risk_if_ignored"],
          )

          route_decision = {
              "version": "v4.169",
              "result_label": RESULT_LABEL,
              "clean_result": "The current lane has a defensible diagnostic bridge from TAIRID propagation/consolidation language to limited LRGxELG geometry-growth proxies, but final interpretation remains blocked.",
              "recommended_next_route": "limited_lrgxelg_reference_covariance_acquisition_or_chain_route_with_scope_guards",
              "why_next": "The theory-observation bridge is now explicit; the biggest quantitative gap is still defensible reference covariance or parameter samples.",
              "allowed_claim_level": "diagnostic_shape_and_gap_map_only",
              "blocked_claims": BLOCKED_CLAIMS,
              "key_numbers_carried_forward": {
                  "v4_164_largest_percent_residual": "fsigma8_z0p845 = -33.754855 percent",
                  "v4_166_observed_covariance_radius_preview_not_pressure": 3.230341,
                  "v4_167_observed_plus_proxy_radius_preview_not_pressure": 3.151957,
                  "v4_168_dominant_raw_value_driver": "Omega_m",
                  "v4_168_dominant_observed_sigma_driver": "sigma8_z0",
                  "v4_168_dominant_fractional_reference_driver": "sigma8_z0",
              },
          }

          with open(OUT / "v4_169_route_decision.json", "w", encoding="utf-8") as f:
              json.dump(route_decision, f, indent=2)

          with open(OUT / "v4_169_scope_guards.json", "w", encoding="utf-8") as f:
              json.dump({
                  "scope": "limited LRGxELG two-redshift bridge ledger only",
                  "uses_observed_values": True,
                  "uses_lcdm_lite_reference_values": True,
                  "uses_real_reference_covariance": False,
                  "computes_new_residuals": True,
                  "computes_pressure": False,
                  "computes_likelihood": False,
                  "computes_bic": False,
                  "computes_posterior_comparison": False,
                  "validates_tairid": False,
              }, f, indent=2)

          with open(OUT / "v4_169_blocked_claims.json", "w", encoding="utf-8") as f:
              json.dump({"blocked_claims": BLOCKED_CLAIMS}, f, indent=2)

          summary = []
          summary.append("# TAIRID v4.169 - Theory Observation Bridge Ledger")
          summary.append("")
          summary.append("Expected result: `" + RESULT_LABEL + "`")
          summary.append("")
          summary.append("## Clean result")
          summary.append("")
          summary.append("The current limited LRGxELG lane now has a guarded bridge between TAIRID language and observable proxies.")
          summary.append("The bridge is diagnostic only. It does not convert the result into proof or pressure.")
          summary.append("")
          summary.append("## Bridge in plain language")
          summary.append("")
          summary.append("TAIRID claim: propagation and consolidation should appear as coupled geometry-growth structure.")
          summary.append("Observable proxy: DM/rd, DH/rd, and fsigma8 residuals across z=0.70 and z=0.845.")
          summary.append("Current result: the data show a twisted geometry-growth shape, a geometry-heavy covariance-mode preview, and mixed parameter-driver attribution.")
          summary.append("")
          summary.append("## What this helps")
          summary.append("")
          summary.append("It closes the language gap between theory and observation. It does not close the quantitative covariance gap.")
          summary.append("")
          summary.append("## Main blockers")
          for gap in gap_rows:
              summary.append("- " + gap["gap_name"] + ": " + gap["current_status"])
          summary.append("")
          summary.append("## Next route")
          summary.append("")
          summary.append("`limited_lrgxelg_reference_covariance_acquisition_or_chain_route_with_scope_guards`")
          summary.append("")
          summary.append("## Boundary")
          for item in BLOCKED_CLAIMS:
              summary.append("- " + item)
          (OUT / "v4_169_summary.md").write_text("\n".join(summary), encoding="utf-8")

          rule_checks = {
              "version_is_v4_169": True,
              "result_label_present": RESULT_LABEL.endswith("no_pressure_no_validation"),
              "residual_rows_count_is_six": len(residual_rows) == 6,
              "bridge_rows_count_is_five": len(bridge_rows) == 5,
              "claim_status_rows_count_is_seven": len(claim_status_rows) == 7,
              "gap_rows_count_is_five": len(gap_rows) == 5,
              "residual_context_written": (OUT / "v4_169_residual_context_ledger.csv").exists(),
              "bridge_ledger_written": (OUT / "v4_169_theory_observation_bridge_ledger.csv").exists(),
              "claim_matrix_written": (OUT / "v4_169_claim_status_matrix.csv").exists(),
              "gap_register_written": (OUT / "v4_169_gap_register.csv").exists(),
              "route_decision_written": (OUT / "v4_169_route_decision.json").exists(),
              "scope_guards_written": (OUT / "v4_169_scope_guards.json").exists(),
              "blocked_claims_written": (OUT / "v4_169_blocked_claims.json").exists(),
              "summary_written": (OUT / "v4_169_summary.md").exists(),
              "reference_covariance_not_used": True,
              "pressure_not_computed": True,
              "likelihood_not_computed": True,
              "bic_not_computed": True,
              "posterior_not_computed": True,
              "validation_not_claimed": True,
              "next_route_selected": route_decision["recommended_next_route"] == "limited_lrgxelg_reference_covariance_acquisition_or_chain_route_with_scope_guards",
          }

          failed = [k for k, v in rule_checks.items() if not v]
          health = {
              "version": "v4.169",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rule_checks) - len(failed),
              "rule_total_count": len(rule_checks),
              "failed_gates": failed,
              "claim_boundary": "theory_observation_bridge_ledger_only_no_reference_covariance_no_pressure_no_validation",
          }

          with open(OUT / "v4_169_parser_health_report.json", "w", encoding="utf-8") as f:
              json.dump(health, f, indent=2)

          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.169 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_169_outputs/run_v4_169.py

      - name: Upload v4.169 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-169-limited-lrgxelg-theory-observation-bridge-ledger-output
          path: tairid_v4_169_outputs/
