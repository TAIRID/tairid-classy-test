name: "!!! AAA CURRENT - TAIRID v4.346 numeric baseline candidate builder no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-346-numeric-baseline-candidate-builder-no-scoring:
    name: "!!! AAA CURRENT - Run v4.346 numeric baseline candidate builder"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.345B input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.345B output ZIP by pattern..."
          INPUT_345B_ZIP="$(ls tairid-v4-345b-explicit-parameter-value-approval-gate-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_345B_ZIP" ]; then
            echo "Could not find v4.345B output ZIP."
            echo "Expected a file like:"
            echo "tairid-v4-345b-explicit-parameter-value-approval-gate-output.zip"
            exit 1
          fi

          echo "Using v4.345B ZIP:"
          echo "$INPUT_345B_ZIP"
          echo "INPUT_345B_ZIP=$INPUT_345B_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.346 baseline candidate script
        run: |
          cat > run_v4_346_numeric_baseline_candidate_builder_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values approved; numeric baseline candidate may be built here; no numeric baseline approval; no observed scoring; no support claims"

          REQUIRED_PARAMETERS = {
              "omega_m0",
              "sigma8_0",
              "growth_index_gamma",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def to_float(value):
              text = clean(value)
              if text == "":
                  raise ValueError("blank numeric value")
              return float(text)

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def main():
              input_345b = Path(os.environ["INPUT_345B_ZIP"])

              outdir = Path("tairid_v4_346_numeric_baseline_candidate_builder_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base345b = extract_zip(input_345b, "tairid_v4_346_345b_")

              summary345b_path = find_one(base345b, "v4_345b_summary.json")
              approved_values_path = find_one(base345b, "v4_345b_APPROVED_PARAMETER_VALUES_NO_BASELINE_NO_SCORING.csv")
              approval_ledger_path = find_one(base345b, "v4_345b_parameter_value_approval_ledger.csv")
              gap_status_path = find_one(base345b, "v4_345b_gap_status_after_parameter_value_approval_gate.csv")
              rules345b_path = find_one(base345b, "v4_345b_rule_checks.csv")

              summary345b = json.loads(summary345b_path.read_text())
              approved_values = pd.read_csv(approved_values_path)
              approval_ledger = pd.read_csv(approval_ledger_path)
              gap_status = pd.read_csv(gap_status_path)
              rules345b = pd.read_csv(rules345b_path)

              value_map = {}
              source_map = {}

              for _, row in approved_values.iterrows():
                  parameter = clean(row["parameter_or_method"])
                  value = to_float(row["approved_parameter_value"])
                  value_map[parameter] = value
                  source_map[parameter] = {
                      "approved_parameter_value_text": clean(row["approved_parameter_value_text"]),
                      "approved_parameter_uncertainty_text": clean(row["approved_parameter_uncertainty_text"]),
                      "approved_source_url": clean(row["approved_source_url"]),
                      "approved_source_quote": clean(row["approved_source_quote"]),
                      "approved_definition_context": clean(row["approved_definition_context"]),
                  }

              omega_m0 = value_map.get("omega_m0")
              sigma8_0 = value_map.get("sigma8_0")
              gamma = value_map.get("growth_index_gamma")

              baseline_rows = []
              for parameter in ["omega_m0", "sigma8_0", "growth_index_gamma"]:
                  src = source_map[parameter]
                  baseline_rows.append({
                      "v4_346_baseline_candidate_id": f"v4_346_baseline_candidate_{len(baseline_rows)+1:03d}",
                      "parameter_or_method": parameter,
                      "candidate_numeric_value": value_map[parameter],
                      "candidate_value_text": src["approved_parameter_value_text"],
                      "candidate_uncertainty_text": src["approved_parameter_uncertainty_text"],
                      "candidate_source_url": src["approved_source_url"],
                      "candidate_source_quote": src["approved_source_quote"],
                      "candidate_definition_context": src["approved_definition_context"],
                      "baseline_candidate_role": "approved_parameter_value_used_to_build_candidate_baseline",
                      "parameter_value_approved": True,
                      "numeric_baseline_candidate_value_filled": True,
                      "numeric_baseline_approved_now": False,
                      "observed_values_loaded": False,
                      "definition_match_confirmed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              baseline_candidate = pd.DataFrame(baseline_rows)

              baseline_object = {
                  "baseline_object_id": "v4_346_lcdm_growth_baseline_candidate",
                  "omega_m0": omega_m0,
                  "sigma8_0": sigma8_0,
                  "growth_index_gamma": gamma,
                  "growth_model_form": "f(z)=Omega_m(z)^gamma; f_sigma8 candidate baseline requires later calculator and observed-definition gate",
                  "status": "numeric_baseline_candidate_built_not_approved",
                  "parameter_values_approved": True,
                  "numeric_baseline_candidate_values_filled": True,
                  "numeric_baseline_approved": False,
                  "observed_values_loaded": False,
                  "definition_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
              }

              calculator_staging = pd.DataFrame([
                  {
                      "calculator_field": "omega_m0",
                      "candidate_value": omega_m0,
                      "field_status": "filled_from_v4_345b_approved_parameter_value",
                      "baseline_approval_status": "not_approved",
                  },
                  {
                      "calculator_field": "sigma8_0",
                      "candidate_value": sigma8_0,
                      "field_status": "filled_from_v4_345b_approved_parameter_value",
                      "baseline_approval_status": "not_approved",
                  },
                  {
                      "calculator_field": "growth_index_gamma",
                      "candidate_value": gamma,
                      "field_status": "filled_from_v4_345b_approved_parameter_value",
                      "baseline_approval_status": "not_approved",
                  },
              ])

              baseline_review_checklist = pd.DataFrame([
                  {
                      "check_id": "V4_346_CHECK_001",
                      "check": "Do the three baseline candidate values match the approved v4.345B parameter values?",
                      "required_before_baseline_approval": True,
                  },
                  {
                      "check_id": "V4_346_CHECK_002",
                      "check": "Is the growth model form appropriate for a later baseline calculator?",
                      "required_before_baseline_approval": True,
                  },
                  {
                      "check_id": "V4_346_CHECK_003",
                      "check": "Are uncertainties/source quotes preserved for audit?",
                      "required_before_baseline_approval": True,
                  },
                  {
                      "check_id": "V4_346_CHECK_004",
                      "check": "Are observed SDSS RSD values still not loaded?",
                      "required_before_baseline_approval": True,
                  },
                  {
                      "check_id": "V4_346_CHECK_005",
                      "check": "Is scoring still blocked?",
                      "required_before_baseline_approval": True,
                  },
                  {
                      "check_id": "V4_346_CHECK_006",
                      "check": "Are support claims still blocked?",
                      "required_before_baseline_approval": True,
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_346_GAP_001",
                      "gap": "Numeric baseline candidate built from approved parameter values.",
                      "status_after_v4_346": "candidate_built_not_approved",
                      "next_gate": "v4_347_explicit_numeric_baseline_approval_gate",
                  },
                  {
                      "gap_id": "V4_346_GAP_002",
                      "gap": "Numeric baseline approval remains blocked.",
                      "status_after_v4_346": "still_blocked",
                      "next_gate": "explicit_baseline_approval",
                  },
                  {
                      "gap_id": "V4_346_GAP_003",
                      "gap": "Observed SDSS RSD values remain unloaded.",
                      "status_after_v4_346": "still_blocked",
                      "next_gate": "later_observed_data_loading_gate",
                  },
                  {
                      "gap_id": "V4_346_GAP_004",
                      "gap": "Definition/covariance match remains unconfirmed.",
                      "status_after_v4_346": "still_blocked",
                      "next_gate": "later_definition_covariance_gate",
                  },
                  {
                      "gap_id": "V4_346_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_346": "still_blocked",
                      "next_gate": "later_support_interpretation_gate_only_after_scoring",
                  },
              ])

              hard_checks = {
                  "input_v4_345b_summary_found": summary345b.get("version") == "v4.345B",
                  "input_v4_345b_rules_all_passed": int(summary345b.get("rules_passed")) == int(summary345b.get("rules_total")),
                  "input_v4_345b_failed_gates_none": summary345b.get("failed_gates") == "none",
                  "input_v4_345b_parameter_values_approved_true": summary345b.get("parameter_values_approved") is True,
                  "input_v4_345b_approved_parameter_rows_3": summary345b.get("approved_parameter_value_rows") == 3,
                  "input_v4_345b_no_numeric_baseline_approval": summary345b.get("numeric_baseline_values_filled") is False and summary345b.get("approved_baseline_values") == 0,
                  "input_v4_345b_no_observed_values_loaded": summary345b.get("observed_values_loaded") is False,
                  "input_v4_345b_no_definition_match_confirmed": summary345b.get("definition_match_confirmed") is False,
                  "input_v4_345b_no_score_valid": summary345b.get("score_valid") is False,
                  "input_v4_345b_no_support_allowed": summary345b.get("support_allowed") is False,

                  "rules345b_all_passed": rules345b["passed"].astype(bool).all(),
                  "approved_values_rows_equal_3": len(approved_values) == 3,
                  "approval_ledger_rows_equal_3": len(approval_ledger) == 3,
                  "gap_status_rows_equal_5": len(gap_status) == 5,
                  "all_required_parameters_present": REQUIRED_PARAMETERS.issubset(set(approved_values["parameter_or_method"].apply(clean))),
                  "all_approved_values_nonblank": approved_values["approved_parameter_value"].apply(clean).ne("").all(),
                  "all_source_quotes_nonblank": approved_values["approved_source_quote"].apply(clean).ne("").all(),
                  "all_source_urls_nonblank": approved_values["approved_source_url"].apply(clean).ne("").all(),

                  "baseline_candidate_rows_equal_3": len(baseline_candidate) == 3,
                  "calculator_staging_rows_equal_3": len(calculator_staging) == 3,
                  "omega_m0_value_expected": abs(omega_m0 - 0.315) < 1e-12,
                  "sigma8_0_value_expected": abs(sigma8_0 - 0.811) < 1e-12,
                  "growth_index_gamma_value_expected": abs(gamma - 0.545455) < 1e-9,
                  "baseline_object_candidate_filled": baseline_object["numeric_baseline_candidate_values_filled"] is True,
                  "baseline_object_not_approved": baseline_object["numeric_baseline_approved"] is False,
                  "baseline_review_checklist_rows_equal_6": len(baseline_review_checklist) == 6,

                  "numeric_baseline_approval_false": false_col(baseline_candidate, "numeric_baseline_approved_now"),
                  "observed_values_loaded_false": false_col(baseline_candidate, "observed_values_loaded"),
                  "definition_match_confirmed_false": false_col(baseline_candidate, "definition_match_confirmed"),
                  "score_valid_false": false_col(baseline_candidate, "score_valid"),
                  "support_allowed_false": false_col(baseline_candidate, "support_allowed"),
                  "gap_update_rows_equal_5": len(gap_update) == 5,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary346 = {
                  "version": "v4.346",
                  "route_name": "v4_346_numeric_baseline_candidate_builder_no_observed_scoring_no_support_claims",
                  "expected_result": "v4_346_numeric_baseline_candidate_builder_passed_candidate_built_not_approved_no_scoring_no_claims",
                  "input_version": "v4.345B",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "approved_parameter_value_rows": int(len(approved_values)),
                  "baseline_candidate_rows": int(len(baseline_candidate)),
                  "numeric_baseline_candidate_values_filled": True,
                  "parameter_values_approved": True,
                  "numeric_baseline_values_filled": False,
                  "approved_baseline_values": 0,
                  "numeric_baseline_approved": False,
                  "observed_values_loaded": False,
                  "definition_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "v4_347_explicit_numeric_baseline_approval_gate_no_observed_scoring_no_support_claims",
              }

              baseline_candidate.to_csv(outdir / "v4_346_NUMERIC_BASELINE_CANDIDATE_NOT_APPROVED.csv", index=False)
              calculator_staging.to_csv(outdir / "v4_346_calculator_input_staging_NOT_BASELINE_APPROVED.csv", index=False)
              baseline_review_checklist.to_csv(outdir / "v4_346_numeric_baseline_review_checklist.csv", index=False)
              gap_update.to_csv(outdir / "v4_346_gap_status_after_baseline_candidate_builder.csv", index=False)
              approved_values.to_csv(outdir / "v4_346_input_v4_345b_approved_parameter_values_preserved.csv", index=False)
              approval_ledger.to_csv(outdir / "v4_346_input_v4_345b_approval_ledger_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_346_rule_checks.csv", index=False)

              (outdir / "v4_346_numeric_baseline_candidate_object.json").write_text(json.dumps(baseline_object, indent=2))
              (outdir / "v4_346_summary.json").write_text(json.dumps(summary346, indent=2))

              summary_md = f"""# TAIRID v4.346 Numeric Baseline Candidate Builder — No Observed Scoring, No Support Claims

          Expected result: `{summary346["expected_result"]}`

          {summary346["rules_passed"]} / {summary346["rules_total"]} rules passed

          failed_gates = {summary346["failed_gates"]}

          approved_parameter_value_rows = {summary346["approved_parameter_value_rows"]}

          baseline_candidate_rows = {summary346["baseline_candidate_rows"]}

          numeric_baseline_candidate_values_filled = true

          numeric_baseline_approved = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step builds a numeric baseline candidate from approved parameter values.

          It does **not** approve the numeric baseline.

          It does **not** load observed SDSS RSD values.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{summary346["selected_next_route"]}`
          """
              (outdir / "v4_346_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary346, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_346_numeric_baseline_candidate_builder_no_scoring.py

      - name: Run v4.346 numeric baseline candidate builder no scoring
        run: |
          python run_v4_346_numeric_baseline_candidate_builder_no_scoring.py

      - name: Upload v4.346 numeric baseline candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-346-numeric-baseline-candidate-builder-no-observed-scoring-no-support-claims-output
          path: |
            tairid_v4_346_numeric_baseline_candidate_builder_no_scoring_output/
            tairid_v4_346_numeric_baseline_candidate_builder_no_scoring_output.zip
