name: TAIRID Cosmology v4.21 Growth Expansion Inventory Onefile

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-cosmology-v4-21-growth-expansion-inventory-onefile.yml"

jobs:
  growth-expansion-inventory-onefile:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.21 growth expansion inventory onefile
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_21_growth_expansion_inventory_onefile

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_21_growth_expansion_inventory_onefile")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_21_growth_expansion_inventory_onefile"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine RSD, clusters, CMB lensing, KiDS, DES, HSC, H0LiCOW, BAO, or CMB into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run RSD, cluster, CMB-lensing, DES, HSC, KiDS, H0LiCOW, BAO, or CMB likelihoods.",
              "This inventories possible growth/consolidation expansion lanes after distance-duality and BAO boundary guards passed.",
              "A pass means candidate growth lanes are organized for later source/product selection, not that TAIRID cosmology is validated."
          ]

          SOURCE_ROOTS = [
              {
                  "source_id": "boss_dr12_consensus_bao_rsd",
                  "role_focus": "rsd_fsigma8_growth",
                  "source_url": "https://arxiv.org/abs/1607.03155",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "BOSS DR12 consensus constraints include BAO and redshift-space distortion growth information.",
                  "preservation_role": "RSD growth inventory source"
              },
              {
                  "source_id": "eboss_dr16_cosmology_rsd",
                  "role_focus": "rsd_fsigma8_growth",
                  "source_url": "https://arxiv.org/abs/2007.08991",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "eBOSS DR16 cosmology includes BAO and RSD growth constraints.",
                  "preservation_role": "RSD growth inventory source"
              },
              {
                  "source_id": "wigglez_growth_rate_rsd",
                  "role_focus": "rsd_fsigma8_growth",
                  "source_url": "https://arxiv.org/abs/1104.2948",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "WiggleZ growth-rate / redshift-space distortion source candidate.",
                  "preservation_role": "RSD growth inventory source"
              },
              {
                  "source_id": "planck_2015_sz_cluster_counts",
                  "role_focus": "cluster_abundance_growth",
                  "source_url": "https://arxiv.org/abs/1502.01597",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "Planck SZ cluster counts constrain sigma8, Omega_m, and growth-amplitude combinations.",
                  "preservation_role": "cluster growth inventory source"
              },
              {
                  "source_id": "des_y1_cluster_cosmology_candidate",
                  "role_focus": "cluster_abundance_growth",
                  "source_url": "https://arxiv.org/abs/2002.11124",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "DES cluster abundance and weak-lensing mass calibration candidate source.",
                  "preservation_role": "cluster growth inventory source"
              },
              {
                  "source_id": "planck_2018_cmb_lensing",
                  "role_focus": "cmb_lensing_growth",
                  "source_url": "https://arxiv.org/abs/1807.06210",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "Planck 2018 gravitational lensing constraints provide CMB-lensing growth information.",
                  "preservation_role": "CMB lensing growth inventory source"
              },
              {
                  "source_id": "act_dr6_cmb_lensing_candidate",
                  "role_focus": "cmb_lensing_growth",
                  "source_url": "https://arxiv.org/abs/2304.05203",
                  "source_type": "arxiv_abstract",
                  "expected_signal": "ACT DR6 CMB-lensing map or cosmology source candidate.",
                  "preservation_role": "CMB lensing growth inventory source"
              }
          ]

          GROWTH_LANES = [
              {
                  "lane_id": "rsd_fsigma8_growth",
                  "tairid_role": "growth_consolidation_velocity_field_guard",
                  "standard_requirement": "RSD / fσ8 sources measure growth through velocity-field and clustering anisotropy rather than weak lensing alone.",
                  "support_signal": "At least one RSD source is reachable and classified as a growth source.",
                  "failure_signal": "Growth expansion cannot find any RSD/fσ8 lane to inventory.",
                  "current_status_before_this_test": "not_in_v4_growth_family_yet",
                  "allowed_result": "inventory_source_lane_only",
                  "blocked_claim": "RSD does not validate TAIRID or replace a full growth likelihood."
              },
              {
                  "lane_id": "cluster_abundance_growth",
                  "tairid_role": "growth_consolidation_bound_structure_guard",
                  "standard_requirement": "Cluster abundance sources test structure growth through counts, mass calibration, and amplitude-sensitive constraints.",
                  "support_signal": "At least one cluster source is reachable and classified as growth/amplitude relevant.",
                  "failure_signal": "Cluster lane cannot be separated from mass-calibration or summary-only uncertainty.",
                  "current_status_before_this_test": "not_in_v4_growth_family_yet",
                  "allowed_result": "inventory_source_lane_only",
                  "blocked_claim": "Cluster counts do not by themselves prove TAIRID growth suppression."
              },
              {
                  "lane_id": "cmb_lensing_growth",
                  "tairid_role": "growth_consolidation_integrated_lensing_guard",
                  "standard_requirement": "CMB lensing sources test integrated structure growth between last scattering and now.",
                  "support_signal": "At least one CMB-lensing source is reachable and classified as a growth/lensing source.",
                  "failure_signal": "CMB lensing cannot be cleanly inventoried as growth/consolidation rather than CMB-background fitting.",
                  "current_status_before_this_test": "not_in_v4_growth_family_yet",
                  "allowed_result": "inventory_source_lane_only",
                  "blocked_claim": "CMB lensing does not validate TAIRID or replace Planck likelihood analysis."
              },
              {
                  "lane_id": "amplitude_axis_guard",
                  "tairid_role": "S8_sigma8_amplitude_pressure_boundary",
                  "standard_requirement": "New growth sources must be labeled by what they constrain: S8, sigma8, fσ8, Omega_m, or lensing amplitude.",
                  "support_signal": "Inventory keeps axis labels and source/product status separate.",
                  "failure_signal": "New growth sources are mixed into one unlabeled pressure score.",
                  "current_status_before_this_test": "active_from_v4_14_and_v4_15",
                  "allowed_result": "axis_label_guard_preserved",
                  "blocked_claim": "All growth observables are not automatically the same pressure surface."
              }
          ]

          BLOCKED_INTERPRETATIONS = [
              {
                  "claim": "TAIRID is validated by RSD, clusters, or CMB lensing.",
                  "status": "blocked",
                  "reason": "This is only an inventory of future growth/consolidation lanes."
              },
              {
                  "claim": "RSD, clusters, and CMB lensing can be averaged into the KiDS/DES/HSC pressure score immediately.",
                  "status": "blocked",
                  "reason": "Each source family needs source/product status and axis labels first."
              },
              {
                  "claim": "A CMB-lensing source replaces Planck baseline analysis.",
                  "status": "blocked",
                  "reason": "This inventory does not run a CMB likelihood or model comparison."
              },
              {
                  "claim": "Cluster counts prove growth suppression.",
                  "status": "blocked",
                  "reason": "Cluster counts depend on mass calibration, selection, and source-specific modeling."
              },
              {
                  "claim": "RSD proves the consolidation-growth interpretation.",
                  "status": "blocked",
                  "reason": "RSD is a future growth-check lane, not proof by itself."
              }
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_22_growth_product_boundary_selector",
                  "role_focus": "consolidation_growth",
                  "purpose": "Select one growth-expansion lane and classify whether it has direct data, published summary, infrastructure only, or conceptual status.",
                  "why_next": "The inventory tells us which lanes exist; the next step must decide which product can be safely used first.",
                  "must_include": "RSD fσ8, cluster, CMB-lensing product status, axis label, source role, blocked claims.",
                  "must_not_include": "combined posterior, likelihood fitting, BIC, validation claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_23_growth_axis_comparison_matrix",
                  "role_focus": "amplitude_decomposition",
                  "purpose": "Build an axis matrix showing whether each candidate source constrains S8, sigma8, fσ8, Omega_m, A_L, or related amplitude quantities.",
                  "why_next": "This prevents unlabeled growth observables from being forced into one pressure score.",
                  "must_include": "axis label, source family, evidence status, support/failure condition.",
                  "must_not_include": "one-surface collapse."
              },
              {
                  "priority": 3,
                  "next_test": "v4_24_inflation_jobs_requirement_ledger",
                  "role_focus": "viability_space_expansion",
                  "purpose": "List the required jobs inflation performs before TAIRID viability-space expansion can become more than conceptual mapping.",
                  "why_next": "After growth expansion is organized, the early-universe atlas needs a strict requirement ledger.",
                  "must_include": "smoothness, flatness, primordial spectrum, acoustic peaks, tensor bounds.",
                  "must_not_include": "claiming TAIRID replaces inflation."
              }
          ]

          KEYWORDS = {
              "rsd": [
                  "redshift-space distortion",
                  "redshift space distortion",
                  "RSD",
                  "fσ8",
                  "fsigma8",
                  "growth rate",
                  "growth of structure",
                  "peculiar velocity"
              ],
              "cluster": [
                  "cluster",
                  "clusters",
                  "cluster counts",
                  "Sunyaev",
                  "SZ",
                  "mass calibration",
                  "abundance",
                  "sigma8",
                  "S8",
                  "Omega_m"
              ],
              "cmb_lensing": [
                  "CMB lensing",
                  "gravitational lensing",
                  "lensing potential",
                  "CMB",
                  "Planck",
                  "ACT",
                  "convergence",
                  "matter fluctuations"
              ],
              "axis": [
                  "S8",
                  "sigma8",
                  "σ8",
                  "Omega_m",
                  "Ωm",
                  "fσ8",
                  "fsigma8",
                  "A_L",
                  "lensing amplitude"
              ]
          }

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def fetch_text(url, timeout=90, byte_limit=2_000_000):
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 TAIRID-v4.21-growth-expansion-inventory",
                      "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
                  }
              )
              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def clean_text(text):
              text = re.sub(r"<script.*?</script>", " ", text or "", flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def keyword_hits(text, words):
              lower = (text or "").lower()
              hits = []
              for word in words:
                  if word.lower() in lower:
                      hits.append(word)
              return hits

          def classify_source(role_focus, text, expected_signal):
              cleaned = clean_text(text)
              combined = cleaned + " " + expected_signal

              rsd_hits = keyword_hits(combined, KEYWORDS["rsd"])
              cluster_hits = keyword_hits(combined, KEYWORDS["cluster"])
              cmb_lensing_hits = keyword_hits(combined, KEYWORDS["cmb_lensing"])
              axis_hits = keyword_hits(combined, KEYWORDS["axis"])

              if role_focus == "rsd_fsigma8_growth":
                  if rsd_hits and axis_hits:
                      classification = "rsd_growth_axis_inventory_source"
                  elif rsd_hits:
                      classification = "rsd_growth_inventory_source"
                  else:
                      classification = "rsd_source_needs_manual_review"
              elif role_focus == "cluster_abundance_growth":
                  if cluster_hits and axis_hits:
                      classification = "cluster_growth_amplitude_inventory_source"
                  elif cluster_hits:
                      classification = "cluster_growth_inventory_source"
                  else:
                      classification = "cluster_source_needs_manual_review"
              elif role_focus == "cmb_lensing_growth":
                  if cmb_lensing_hits and axis_hits:
                      classification = "cmb_lensing_growth_axis_inventory_source"
                  elif cmb_lensing_hits:
                      classification = "cmb_lensing_growth_inventory_source"
                  else:
                      classification = "cmb_lensing_source_needs_manual_review"
              else:
                  classification = "unknown_growth_role_source"

              return {
                  "classification": classification,
                  "rsd_hits": ";".join(rsd_hits),
                  "cluster_hits": ";".join(cluster_hits),
                  "cmb_lensing_hits": ";".join(cmb_lensing_hits),
                  "axis_hits": ";".join(axis_hits),
                  "text_preview": cleaned[:500]
              }

          source_rows = []

          for source in SOURCE_ROOTS:
              fetched = fetch_text(source["source_url"])
              classified = classify_source(
                  source["role_focus"],
                  fetched["text"] if fetched["ok"] else "",
                  source["expected_signal"]
              )

              source_rows.append({
                  "source_id": source["source_id"],
                  "role_focus": source["role_focus"],
                  "source_url": source["source_url"],
                  "source_type": source["source_type"],
                  "expected_signal": source["expected_signal"],
                  "preservation_role": source["preservation_role"],
                  "fetch_ok": fetched["ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"],
                  **classified
              })

          failed_gates = []
          warnings = []

          reachable_sources = [row for row in source_rows if row["fetch_ok"]]

          if len(reachable_sources) < 4:
              warnings.append("fewer_than_four_growth_inventory_sources_reachable")

          rsd_sources = [row for row in source_rows if row["role_focus"] == "rsd_fsigma8_growth"]
          cluster_sources = [row for row in source_rows if row["role_focus"] == "cluster_abundance_growth"]
          cmb_lensing_sources = [row for row in source_rows if row["role_focus"] == "cmb_lensing_growth"]

          rsd_guard_ok = any(
              row["fetch_ok"] and row["classification"] in [
                  "rsd_growth_axis_inventory_source",
                  "rsd_growth_inventory_source"
              ]
              for row in rsd_sources
          )

          cluster_guard_ok = any(
              row["fetch_ok"] and row["classification"] in [
                  "cluster_growth_amplitude_inventory_source",
                  "cluster_growth_inventory_source"
              ]
              for row in cluster_sources
          )

          cmb_lensing_guard_ok = any(
              row["fetch_ok"] and row["classification"] in [
                  "cmb_lensing_growth_axis_inventory_source",
                  "cmb_lensing_growth_inventory_source"
              ]
              for row in cmb_lensing_sources
          )

          axis_label_guard_ok = any(row["axis_hits"] for row in source_rows)

          if not rsd_guard_ok:
              failed_gates.append("rsd_growth_inventory_guard_not_found")

          if not cluster_guard_ok:
              failed_gates.append("cluster_growth_inventory_guard_not_found")

          if not cmb_lensing_guard_ok:
              failed_gates.append("cmb_lensing_growth_inventory_guard_not_found")

          if not axis_label_guard_ok:
              failed_gates.append("growth_axis_label_guard_not_found")

          lane_results = [
              {
                  "lane_id": "rsd_fsigma8_growth",
                  "guard_pass": rsd_guard_ok,
                  "result": "rsd_growth_inventory_source_present" if rsd_guard_ok else "rsd_growth_source_missing",
                  "allowed_interpretation": "RSD / fσ8 can become a future growth/consolidation lane after product-status review.",
                  "blocked_interpretation": "RSD validates TAIRID or can be averaged into existing pressure rows immediately."
              },
              {
                  "lane_id": "cluster_abundance_growth",
                  "guard_pass": cluster_guard_ok,
                  "result": "cluster_growth_inventory_source_present" if cluster_guard_ok else "cluster_growth_source_missing",
                  "allowed_interpretation": "Cluster abundance can become a future growth/consolidation lane with mass-calibration boundaries.",
                  "blocked_interpretation": "Cluster counts prove TAIRID growth suppression."
              },
              {
                  "lane_id": "cmb_lensing_growth",
                  "guard_pass": cmb_lensing_guard_ok,
                  "result": "cmb_lensing_growth_inventory_source_present" if cmb_lensing_guard_ok else "cmb_lensing_growth_source_missing",
                  "allowed_interpretation": "CMB lensing can become a future integrated-growth lane with CMB-role boundaries.",
                  "blocked_interpretation": "CMB lensing replaces Planck baseline analysis or validates TAIRID."
              },
              {
                  "lane_id": "amplitude_axis_guard",
                  "guard_pass": axis_label_guard_ok,
                  "result": "axis_label_guard_present" if axis_label_guard_ok else "axis_label_guard_missing",
                  "allowed_interpretation": "Future growth rows must state whether they constrain S8, sigma8, fσ8, Omega_m, A_L, or another amplitude quantity.",
                  "blocked_interpretation": "All growth sources are one unlabeled pressure surface."
              }
          ]

          warnings.append("growth_expansion_inventory_is_not_data_reanalysis")
          warnings.append("new_growth_lanes_are_candidates_not_evidence_rows_yet")
          warnings.append("RSD_cluster_CMB_lensing_require_product_status_before_pressure_scores")

          if failed_gates:
              readiness_label = "growth_expansion_inventory_failed"
              next_step = "Repair missing growth inventory lanes before product-boundary selection."
          else:
              readiness_label = "growth_expansion_inventory_passed_ready_for_growth_product_boundary_selector"
              next_step = (
                  "Proceed to v4.22 growth product boundary selector. "
                  "Choose one lane first, label source/product status, and do not compute a combined posterior or validation claim."
              )

          system_health = {
              "reachable_source_count": len(reachable_sources),
              "source_count": len(source_rows),
              "rsd_growth_inventory_guard_present": rsd_guard_ok,
              "cluster_growth_inventory_guard_present": cluster_guard_ok,
              "cmb_lensing_growth_inventory_guard_present": cmb_lensing_guard_ok,
              "axis_label_guard_present": axis_label_guard_ok,
              "validation_claim_allowed": False,
              "combined_growth_posterior_allowed": False,
              "likelihood_run_allowed": False,
              "new_pressure_scores_built": False
          }

          interpretation = (
              "v4.21 inventories three possible growth/consolidation expansion lanes: RSD/fσ8, cluster abundance, and CMB lensing. "
              "This is not a data reanalysis and does not create new pressure scores. "
              "The purpose is to decide whether growth pressure can be tested beyond weak lensing while preserving source/product status, axis labels, and all truth boundaries."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_roots": SOURCE_ROOTS,
              "growth_lanes": GROWTH_LANES,
              "source_rows": source_rows,
              "lane_results": lane_results,
              "blocked_interpretations": BLOCKED_INTERPRETATIONS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "growth_law_proof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False,
                  "new_pressure_scores_built": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "combined_posterior_allowed": False,
                  "new_posterior_chain_parsed": False,
                  "one_surface_collapse_allowed": False,
                  "new_pressure_scores_built": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "growth_source_inventory_v4_21.csv",
              source_rows,
              [
                  "source_id",
                  "role_focus",
                  "source_url",
                  "source_type",
                  "expected_signal",
                  "preservation_role",
                  "fetch_ok",
                  "http_status",
                  "content_type",
                  "bytes_read",
                  "error",
                  "classification",
                  "rsd_hits",
                  "cluster_hits",
                  "cmb_lensing_hits",
                  "axis_hits",
                  "text_preview"
              ]
          )

          write_csv(
              OUTDIR / "growth_lane_results_v4_21.csv",
              lane_results,
              ["lane_id", "guard_pass", "result", "allowed_interpretation", "blocked_interpretation"]
          )

          write_csv(
              OUTDIR / "growth_lanes_v4_21.csv",
              GROWTH_LANES,
              [
                  "lane_id",
                  "tairid_role",
                  "standard_requirement",
                  "support_signal",
                  "failure_signal",
                  "current_status_before_this_test",
                  "allowed_result",
                  "blocked_claim"
              ]
          )

          write_csv(
              OUTDIR / "blocked_interpretations_v4_21.csv",
              BLOCKED_INTERPRETATIONS,
              ["claim", "status", "reason"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_21.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "why_next", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_21.csv",
              [system_health],
              [
                  "reachable_source_count",
                  "source_count",
                  "rsd_growth_inventory_guard_present",
                  "cluster_growth_inventory_guard_present",
                  "cmb_lensing_growth_inventory_guard_present",
                  "axis_label_guard_present",
                  "validation_claim_allowed",
                  "combined_growth_posterior_allowed",
                  "likelihood_run_allowed",
                  "new_pressure_scores_built"
              ]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_growth_inventory_statement",
                  "status": "allowed_with_boundary",
                  "wording": "RSD, cluster abundance, and CMB lensing were inventoried as possible future growth/consolidation lanes.",
                  "boundary": "Inventory only, not validation."
              },
              {
                  "interpretation_id": "allowed_axis_guard_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Future growth rows must label whether they constrain S8, sigma8, fσ8, Omega_m, A_L, or another amplitude quantity.",
                  "boundary": "No unlabeled pressure surface."
              },
              {
                  "interpretation_id": "allowed_product_status_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Each future source must be marked as direct parsed data, published summary, infrastructure only, or conceptual mapping before pressure scoring.",
                  "boundary": "No hidden evidence promotion."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID cosmology is validated.",
                  "boundary": "Blocked."
              },
