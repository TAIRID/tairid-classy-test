name: 000 TAIRID v4.124 Edge Anchor Sensitivity Bridge Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-124-edge-anchor-sensitivity-bridge-probe.yml"

jobs:
  tairid-v4-124-edge-anchor-sensitivity-bridge-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.124 edge anchor sensitivity bridge probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_124_edge_anchor_sensitivity_bridge_probe

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_124_edge_anchor_sensitivity_bridge_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_124_edge_anchor_sensitivity_bridge_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This computes guarded diagnostic bridge lanes only.",
              "This uses the v4.123 edge-anchor decisions: low-z remains primary with literature-error diagonal fallback; high-z is sensitivity-only pending source lock.",
              "A pass means edge decisions have been tested by bridge lanes and final claims remain blocked."
          ]

          UPSTREAM_LOCKS = {
              "v4_123_edge_anchor_review_probe": {
                  "readiness_label": "edge_anchor_review_probe_passed_low_z_literature_locked_high_z_sensitivity_only_ready_for_edge_anchor_sensitivity_bridge_probe",
                  "central_BOSS_core_preserved": True,
                  "low_z_literature_locked": True,
                  "low_z_primary_bridge_decision": "primary_with_literature_error_model",
                  "low_z_covariance_status": "literature_error_model_diagonal_fallback_labeled",
                  "high_z_source_lock_passed": False,
                  "high_z_primary_bridge_decision": "sensitivity_only_pending_source_lock",
                  "high_z_covariance_status": "not_source_locked_sensitivity_only",
                  "both_edge_decisions_recorded": True,
                  "next_bridge_lane_count": 4,
                  "bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_121_verified_bridge_sensitivity_audit": {
                  "readiness_label": "verified_bridge_sensitivity_audit_passed_pressure_stable_source_choice_material_not_final_ready_for_low_high_z_anchor_covariance_review_design",
                  "verified_BOSS_covariance_inserted": True,
                  "primary_verified_chi2": 1.721941483224999,
                  "primary_verified_pressure_z": 0.0,
                  "pressure_z_all_zero": True,
                  "diagnostic_pressure_stable": True,
                  "edge_anchor_covariance_incomplete": True,
                  "low_z_anchor_source_covariance_complete": False,
                  "high_z_anchor_source_covariance_complete": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          TARGET_VECTOR_ORDER = [
              {"position": 0, "z": 0.15, "target_name": "fsigma8z015", "source_role": "low_z_literature_error_diagonal_fallback_primary"},
              {"position": 1, "z": 0.38, "target_name": "fsigma8z038", "source_role": "BOSS_DR12_consensus_covtot_verified"},
              {"position": 2, "z": 0.51, "target_name": "fsigma8z051", "source_role": "BOSS_DR12_consensus_covtot_verified"},
              {"position": 3, "z": 0.61, "target_name": "fsigma8z061", "source_role": "BOSS_DR12_consensus_covtot_verified"},
              {"position": 4, "z": 2.33, "target_name": "fsigma8z233", "source_role": "high_z_sensitivity_only_not_source_locked"}
          ]

          REFERENCE_FSIGMA8_MEAN = [
              0.4618473025984107,
              0.47880399561515946,
              0.4766635460319918,
              0.4711826988812538,
              0.29766798079042817
          ]

          REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED = [
              [5.562209100820247e-05, 4.4037586707431904e-05, 3.754755889442331e-05, 3.297837710717998e-05, 4.737025053749357e-06],
              [4.4037586707431904e-05, 3.5891627510371965e-05, 3.12227605615546e-05, 2.789979758962016e-05, 6.095691128632226e-06],
              [3.754755889442331e-05, 3.12227605615546e-05, 2.752609243243442e-05, 2.4871160721047073e-05, 6.61700580879124e-06],
              [3.297837710717998e-05, 2.789979758962016e-05, 2.4871160721047073e-05, 2.2676250563482697e-05, 6.9020814479945925e-06],
              [4.737025053749357e-06, 6.095691128632226e-06, 6.61700580879124e-06, 6.9020814479945925e-06, 5.771821619405124e-06]
          ]

          OBSERVED_RSD_VECTOR = [
              {
                  "position": 0,
                  "z": 0.15,
                  "observed_fsigma8": 0.49,
                  "observed_sigma": 0.145,
                  "source_family": "SDSS_DR7_MGS",
                  "covariance_status": "literature_error_model_diagonal_fallback_labeled",
                  "primary_bridge_decision": "primary_with_literature_error_model"
              },
              {
                  "position": 1,
                  "z": 0.38,
                  "observed_fsigma8": 0.497,
                  "observed_sigma": 0.045,
                  "source_family": "BOSS_DR12_consensus",
                  "covariance_status": "verified_BOSS_consensus_covtot_subblock",
                  "primary_bridge_decision": "central_verified_core"
              },
              {
                  "position": 2,
                  "z": 0.51,
                  "observed_fsigma8": 0.458,
                  "observed_sigma": 0.038,
                  "source_family": "BOSS_DR12_consensus",
                  "covariance_status": "verified_BOSS_consensus_covtot_subblock",
                  "primary_bridge_decision": "central_verified_core"
              },
              {
                  "position": 3,
                  "z": 0.61,
                  "observed_fsigma8": 0.436,
                  "observed_sigma": 0.034,
                  "source_family": "BOSS_DR12_consensus",
                  "covariance_status": "verified_BOSS_consensus_covtot_subblock",
                  "primary_bridge_decision": "central_verified_core"
              },
              {
                  "position": 4,
                  "z": 2.33,
                  "observed_fsigma8": 0.364,
                  "observed_sigma": 0.106,
                  "source_family": "high_z_LyA_compilation_anchor",
                  "covariance_status": "not_source_locked_sensitivity_only",
                  "primary_bridge_decision": "sensitivity_only_pending_source_lock"
              }
          ]

          BOSS_VERIFIED_FSIGMA8_SUBBLOCK = [
              [0.00222683, 0.000877016, 0.000287067],
              [0.000877016, 0.00154972, 0.000724116],
              [0.000287067, 0.000724116, 0.00135237]
          ]

          EDGE_BRIDGE_LANE_PLAN = [
              {
                  "lane_id": "central_BOSS_only_verified_control",
                  "positions": [1, 2, 3],
                  "redshifts": [0.38, 0.51, 0.61],
                  "edge_status": "no_edges",
                  "purpose": "Clean verified BOSS covariance core control lane.",
                  "required": True
              },
              {
                  "lane_id": "low_z_plus_verified_BOSS_primary",
                  "positions": [0, 1, 2, 3],
                  "redshifts": [0.15, 0.38, 0.51, 0.61],
                  "edge_status": "low_z_primary_literature_error_model",
                  "purpose": "Primary next bridge after v4.123 edge decision.",
                  "required": True
              },
              {
                  "lane_id": "full_five_with_high_z_sensitivity",
                  "positions": [0, 1, 2, 3, 4],
                  "redshifts": [0.15, 0.38, 0.51, 0.61, 2.33],
                  "edge_status": "high_z_sensitivity_only_pending_source_lock",
                  "purpose": "Compare against previous five-slot bridge while keeping high-z sensitivity-only.",
                  "required": True
              },
              {
                  "lane_id": "high_z_only_edge_sensitivity",
                  "positions": [1, 2, 3, 4],
                  "redshifts": [0.38, 0.51, 0.61, 2.33],
                  "edge_status": "high_z_edge_without_low_z",
                  "purpose": "Reveal whether high-z anchor alone changes diagnostic pressure.",
                  "required": False
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The edge anchor sensitivity bridge probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The edge-reviewed bridge pressure is final.",
              "Zero pressure-z proves TAIRID.",
              "The high-z anchor is source-locked.",
              "The low-z literature-error diagonal fallback is full observed covariance.",
              "The central BOSS-only bridge is automatically final.",
              "No broader growth-family test is needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_125_growth_family_expansion_design",
                  "purpose": "Design a broader observed growth-family test beyond the current edge-reviewed bridge lanes.",
                  "why_next": "The current bridge remains pressure-stable; the next clean question is whether that persists across more independent growth observations."
              },
              {
                  "priority": 2,
                  "route_id": "v4_126_high_z_manual_source_locator",
                  "purpose": "Create a targeted manual locator for the z=2.33 high-z anchor if it remains scientifically important.",
                  "why_next": "The high-z point is sensitivity-only pending source lock."
              },
              {
                  "priority": 3,
                  "route_id": "v4_127_edge_review_claim_boundary_handoff",
                  "purpose": "Create a human-readable status handoff for the verified BOSS core and edge-anchor decisions.",
                  "why_next": "The result needs careful interpretation before public-facing language."
              },
              {
                  "priority": 4,
                  "route_id": "v4_128_external_comparison_plan",
                  "purpose": "Design an external comparison against standard ΛCDM growth pipelines and literature constraints.",
                  "why_next": "Diagnostic stability must be contextualized against normal cosmology before any stronger framing."
              }
          ]

          failed_gates = []
          warnings = [
              "diagnostic_bridge_only",
              "low_z_literature_error_model_not_full_covariance",
              "high_z_sensitivity_only_not_source_locked",
              "central_BOSS_core_preserved",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def diag(values):
              n = len(values)
              return [[float(values[i]) if i == j else 0.0 for j in range(n)] for i in range(n)]

          def subset_matrix(matrix, indexes):
              return [[float(matrix[i][j]) for j in indexes] for i in indexes]

          def subset_vector(vector, indexes):
              return [float(vector[i]) for i in indexes]

          def mat_add(a, b):
              return [[float(a[i][j]) + float(b[i][j]) for j in range(len(a[0]))] for i in range(len(a))]

          def mat_vec(a, v):
              return [sum(float(a[i][j]) * float(v[j]) for j in range(len(v))) for i in range(len(a))]

          def dot(a, b):
              return sum(float(x) * float(y) for x, y in zip(a, b))

          def mean(values):
              return sum(values) / len(values) if values else 0.0

          def sign(value):
              return 1.0 if value >= 0 else -1.0

          def inverse_matrix(a, tol=1e-20):
              n = len(a)
              rows = [[float(a[i][j]) for j in range(n)] + [1.0 if i == j else 0.0 for j in range(n)] for i in range(n)]
              for col in range(n):
                  pivot = max(range(col, n), key=lambda r: abs(rows[r][col]))
                  pivot_value = rows[pivot][col]
                  if abs(pivot_value) <= tol:
                      raise RuntimeError("singular_matrix_at_column_" + str(col))
                  if pivot != col:
                      rows[col], rows[pivot] = rows[pivot], rows[col]
                  pivot_value = rows[col][col]
                  for j in range(2 * n):
                      rows[col][j] /= pivot_value
                  for r in range(n):
                      if r != col:
                          factor = rows[r][col]
                          if abs(factor) > tol:
                              for j in range(2 * n):
                                  rows[r][j] -= factor * rows[col][j]
              return [row[n:] for row in rows]

          def matrix_rank(a, tol=1e-14):
              rows = [[float(x) for x in row] for row in a]
              if not rows:
                  return 0
              m = len(rows)
              n = len(rows[0])
              rank = 0
              col = 0
              while rank < m and col < n:
                  pivot = None
                  pivot_abs = tol
                  for r in range(rank, m):
                      value_abs = abs(rows[r][col])
                      if value_abs > pivot_abs:
                          pivot_abs = value_abs
                          pivot = r
                  if pivot is None:
                      col += 1
                      continue
                  rows[rank], rows[pivot] = rows[pivot], rows[rank]
                  pivot_value = rows[rank][col]
                  rows[rank] = [x / pivot_value for x in rows[rank]]
                  for r in range(m):
                      if r != rank:
                          factor = rows[r][col]
                          if abs(factor) > tol:
                              rows[r] = [rv - factor * pv for rv, pv in zip(rows[r], rows[rank])]
                  rank += 1
                  col += 1
              return rank

          def max_symmetry_error(a):
              n = len(a)
              return max(abs(float(a[i][j]) - float(a[j][i])) for i in range(n) for j in range(n))

          def diag_min(a):
              return min(float(a[i][i]) for i in range(len(a)))

          def frobenius_norm(a):
              return math.sqrt(sum(float(x) * float(x) for row in a for x in row))

          def condition_proxy(a, inv):
              return frobenius_norm(a) * frobenius_norm(inv)

          def compute_lane(lane, observed_values, reference_values, reference_covariance, observed_covariance):
              indexes = lane["positions"]
              obs = subset_vector(observed_values, indexes)
              ref = subset_vector(reference_values, indexes)
              residual = [o - r for o, r in zip(obs, ref)]
              c_ref = subset_matrix(reference_covariance, indexes)
              c_obs = subset_matrix(observed_covariance, indexes)
              total_covariance = mat_add(c_ref, c_obs)
              inv = inverse_matrix(total_covariance)
              projected = mat_vec(inv, residual)
              chi2 = dot(residual, projected)
              dof = len(indexes)
              pressure_z = sign(mean(residual)) * math.sqrt(max(chi2 - dof, 0.0))
              return {
                  "lane_id": lane["lane_id"],
                  "positions": ",".join(str(x) for x in indexes),
                  "redshifts": ",".join(str(x) for x in lane["redshifts"]),
                  "edge_status": lane["edge_status"],
                  "chi2": chi2,
                  "dof": dof,
                  "pressure_z": pressure_z,
                  "residual_mean": mean(residual),
                  "rank_total_covariance": matrix_rank(total_covariance),
                  "symmetry_error_total_covariance": max_symmetry_error(total_covariance),
                  "diag_min_total_covariance": diag_min(total_covariance),
                  "condition_proxy_total_covariance": condition_proxy(total_covariance, inv),
                  "computed": True,
                  "claim_scope": "guarded_diagnostic_not_final_pressure"
              }, total_covariance

          observed_values = [float(row["observed_fsigma8"]) for row in OBSERVED_RSD_VECTOR]
          observed_sigmas = [float(row["observed_sigma"]) for row in OBSERVED_RSD_VECTOR]
          reference_values = [float(x) for x in REFERENCE_FSIGMA8_MEAN]

          observed_covariance = diag([sigma * sigma for sigma in observed_sigmas])
          for local_i, full_i in enumerate([1, 2, 3]):
              for local_j, full_j in enumerate([1, 2, 3]):
                  observed_covariance[full_i][full_j] = float(BOSS_VERIFIED_FSIGMA8_SUBBLOCK[local_i][local_j])

          bridge_lane_records = []
          total_covariance_records = []
          lane_lookup = {}

          for lane in EDGE_BRIDGE_LANE_PLAN:
              result, total_cov = compute_lane(
                  lane,
                  observed_values,
                  reference_values,
                  REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED,
                  observed_covariance
              )
              bridge_lane_records.append(result)
              lane_lookup[lane["lane_id"]] = result
              indexes = lane["positions"]
              for i_local, i_full in enumerate(indexes):
                  for j_local, j_full in enumerate(indexes):
                      total_covariance_records.append({
                          "lane_id": lane["lane_id"],
                          "row_position": i_full,
                          "column_position": j_full,
                          "row_target": TARGET_VECTOR_ORDER[i_full]["target_name"],
                          "column_target": TARGET_VECTOR_ORDER[j_full]["target_name"],
                          "total_covariance_value": total_cov[i_local][j_local],
                          "record_scope": "edge_anchor_sensitivity_bridge_diagnostic_not_final_pressure"
                      })

          central = lane_lookup["central_BOSS_only_verified_control"]
          low_plus = lane_lookup["low_z_plus_verified_BOSS_primary"]
          full_five = lane_lookup["full_five_with_high_z_sensitivity"]
          high_only = lane_lookup["high_z_only_edge_sensitivity"]

          edge_sensitivity_records = [
              {
                  "comparison_id": "low_z_plus_BOSS_minus_central_BOSS_only",
                  "base_lane": low_plus["lane_id"],
                  "comparison_lane": central["lane_id"],
                  "delta_chi2": low_plus["chi2"] - central["chi2"],
                  "delta_pressure_z": low_plus["pressure_z"] - central["pressure_z"],
                  "interpretation": "Effect of retaining the low-z anchor as primary literature-error diagonal fallback."
              },
              {
                  "comparison_id": "full_five_high_z_sensitivity_minus_low_z_plus_BOSS",
                  "base_lane": full_five["lane_id"],
                  "comparison_lane": low_plus["lane_id"],
                  "delta_chi2": full_five["chi2"] - low_plus["chi2"],
                  "delta_pressure_z": full_five["pressure_z"] - low_plus["pressure_z"],
                  "interpretation": "Effect of adding the high-z anchor as sensitivity-only."
              },
              {
                  "comparison_id": "high_z_only_edge_minus_central_BOSS_only",
                  "base_lane": high_only["lane_id"],
                  "comparison_lane": central["lane_id"],
                  "delta_chi2": high_only["chi2"] - central["chi2"],
                  "delta_pressure_z": high_only["pressure_z"] - central["pressure_z"],
                  "interpretation": "Effect of high-z anchor without the low-z edge."
              },
              {
                  "comparison_id": "full_five_high_z_sensitivity_minus_central_BOSS_only",
                  "base_lane": full_five["lane_id"],
                  "comparison_lane": central["lane_id"],
                  "delta_chi2": full_five["chi2"] - central["chi2"],
                  "delta_pressure_z": full_five["pressure_z"] - central["pressure_z"],
                  "interpretation": "Effect of both edge anchors relative to the verified BOSS core."
              }
          ]

          observed_records = []
          for row in OBSERVED_RSD_VECTOR:
              pos = int(row["position"])
              observed_records.append({
                  **row,
                  "reference_fsigma8_mean": reference_values[pos],
                  "residual_observed_minus_reference": observed_values[pos] - reference_values[pos],
                  "observed_variance_used": observed_covariance[pos][pos],
                  "target_name": TARGET_VECTOR_ORDER[pos]["target_name"],
                  "source_role": TARGET_VECTOR_ORDER[pos]["source_role"]
              })

          pressure_z_all_zero = all(abs(float(row["pressure_z"])) <= 1e-12 for row in bridge_lane_records)
          all_chi2_below_dof = all(float(row["chi2"]) < float(row["dof"]) for row in bridge_lane_records)
          bridge_pressure_computed = all(row["computed"] is True and math.isfinite(float(row["chi2"])) for row in bridge_lane_records)
          all_total_covariances_rank_ok = all(row["rank_total_covariance"] == row["dof"] for row in bridge_lane_records)
          all_total_covariances_symmetric = all(float(row["symmetry_error_total_covariance"]) <= 1e-12 for row in bridge_lane_records)
          all_total_covariance_diagonal_positive = all(float(row["diag_min_total_covariance"]) > 0 for row in bridge_lane_records)
          low_z_primary_confirmed = low_plus["pressure_z"] == 0.0 and low_plus["chi2"] < low_plus["dof"]
          high_z_sensitivity_confirmed = full_five["pressure_z"] == 0.0 and high_only["pressure_z"] == 0.0

          if UPSTREAM_LOCKS["v4_123_edge_anchor_review_probe"]["central_BOSS_core_preserved"] is not True:
              failed_gates.append("upstream_central_BOSS_not_preserved")

          if UPSTREAM_LOCKS["v4_123_edge_anchor_review_probe"]["low_z_literature_locked"] is not True:
              failed_gates.append("upstream_low_z_not_literature_locked")

          if UPSTREAM_LOCKS["v4_123_edge_anchor_review_probe"]["high_z_primary_bridge_decision"] != "sensitivity_only_pending_source_lock":
              failed_gates.append("upstream_high_z_not_sensitivity_only")

          if not bridge_pressure_computed:
              failed_gates.append("bridge_pressure_not_computed")

          if not all_total_covariances_rank_ok:
              failed_gates.append("not_all_total_covariances_full_rank_for_lane")

          if not all_total_covariances_symmetric:
              failed_gates.append("not_all_total_covariances_symmetric")

          if not all_total_covariance_diagonal_positive:
              failed_gates.append("not_all_total_covariance_diagonals_positive")

          if not pressure_z_all_zero:
              failed_gates.append("pressure_z_not_zero_across_lanes")

          if not all_chi2_below_dof:
              failed_gates.append("at_least_one_lane_chi2_not_below_dof")

          if not low_z_primary_confirmed:
              failed_gates.append("low_z_primary_lane_not_confirmed")

          if not high_z_sensitivity_confirmed:
              failed_gates.append("high_z_sensitivity_lane_not_confirmed")

          if len(edge_sensitivity_records) < 4:
              failed_gates.append("edge_sensitivity_records_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "edge-reviewed bridge pressure is final",
              "zero pressure-z proves tairid",
              "high-z anchor is source-locked",
              "low-z literature-error diagonal fallback is full observed covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "edge_anchor_sensitivity_bridge_probe_passed_pressure_stable_edge_decisions_confirmed_not_final_ready_for_growth_family_expansion_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_edge_decisions_carried",
                  "pass": UPSTREAM_LOCKS["v4_123_edge_anchor_review_probe"]["both_edge_decisions_recorded"] is True,
                  "result": "v4.123 low-z and high-z decisions carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "required_bridge_lanes_computed",
                  "pass": bridge_pressure_computed and len(bridge_lane_records) == 4,
                  "result": f"bridge_lanes={len(bridge_lane_records)}",
                  "boundary": "Diagnostic lanes only."
              },
              {
                  "rule_id": "pressure_z_stable_zero",
                  "pass": pressure_z_all_zero,
                  "result": "pressure_z remained zero across all edge-sensitivity lanes",
                  "boundary": "Zero pressure-z is not validation."
              },
              {
                  "rule_id": "chi2_below_dof_all_lanes",
                  "pass": all_chi2_below_dof,
                  "result": f"central={central['chi2']}/{central['dof']}; low_plus={low_plus['chi2']}/{low_plus['dof']}; full_five={full_five['chi2']}/{full_five['dof']}; high_only={high_only['chi2']}/{high_only['dof']}",
                  "boundary": "Diagnostic non-pressure flag only."
              },
              {
                  "rule_id": "low_z_primary_lane_confirmed",
                  "pass": low_z_primary_confirmed,
                  "result": f"low_z_plus_BOSS chi2={low_plus['chi2']} pressure_z={low_plus['pressure_z']}",
                  "boundary": "Low-z remains literature-error fallback, not full covariance."
              },
              {
                  "rule_id": "high_z_sensitivity_only_confirmed",
                  "pass": high_z_sensitivity_confirmed,
                  "result": f"full_five pressure_z={full_five['pressure_z']}; high_only pressure_z={high_only['pressure_z']}",
                  "boundary": "High-z remains sensitivity-only pending source lock."
              },
              {
                  "rule_id": "rank_and_symmetry_gates_passed",
                  "pass": all_total_covariances_rank_ok and all_total_covariances_symmetric and all_total_covariance_diagonal_positive,
                  "result": "all lane covariance matrices are full-rank for their lane dimension, symmetric, and positive diagonal",
                  "boundary": "Numerical bridge health only."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": True,
                  "result": "final RSD pressure and TAIRID validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_124_rules_passed")

          if failed_gates:
              readiness_label = "edge_anchor_sensitivity_bridge_probe_failed"
              next_allowed_step = "Repair edge anchor sensitivity bridge probe before growth-family expansion design."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.125 growth family expansion design. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "central_BOSS_core_preserved": True,
              "low_z_literature_locked": True,
              "low_z_primary_bridge_decision": "primary_with_literature_error_model",
              "high_z_primary_bridge_decision": "sensitivity_only_pending_source_lock",
              "bridge_pressure_computed": bridge_pressure_computed,
              "pressure_z_all_zero": pressure_z_all_zero,
              "all_chi2_below_dof": all_chi2_below_dof,
              "central_BOSS_only_chi2": central["chi2"],
              "central_BOSS_only_pressure_z": central["pressure_z"],
              "low_z_plus_BOSS_chi2": low_plus["chi2"],
              "low_z_plus_BOSS_pressure_z": low_plus["pressure_z"],
              "full_five_high_z_sensitivity_chi2": full_five["chi2"],
              "full_five_high_z_sensitivity_pressure_z": full_five["pressure_z"],
              "high_z_only_edge_chi2": high_only["chi2"],
              "high_z_only_edge_pressure_z": high_only["pressure_z"],
              "low_z_delta_chi2_vs_BOSS_only": low_plus["chi2"] - central["chi2"],
              "high_z_delta_chi2_vs_low_z_plus_BOSS": full_five["chi2"] - low_plus["chi2"],
              "high_z_only_delta_chi2_vs_BOSS_only": high_only["chi2"] - central["chi2"],
              "low_z_anchor_source_covariance_complete": False,
              "high_z_anchor_source_covariance_complete": False,
              "high_z_source_lock_passed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "target_vector_order": TARGET_VECTOR_ORDER,
              "observed_RSD_vector": OBSERVED_RSD_VECTOR,
              "observed_records": observed_records,
              "reference_fsigma8_mean": REFERENCE_FSIGMA8_MEAN,
              "reference_fsigma8_covariance_regularized": REFERENCE_FSIGMA8_COVARIANCE_REGULARIZED,
              "BOSS_verified_fsigma8_subblock": BOSS_VERIFIED_FSIGMA8_SUBBLOCK,
              "observed_covariance_used": observed_covariance,
              "edge_bridge_lane_plan": EDGE_BRIDGE_LANE_PLAN,
              "bridge_lane_records": bridge_lane_records,
              "edge_sensitivity_records": edge_sensitivity_records,
              "total_covariance_records": total_covariance_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "pressure_z_all_zero": pressure_z_all_zero,
                  "all_chi2_below_dof": all_chi2_below_dof,
                  "low_z_primary_confirmed": low_z_primary_confirmed,
                  "high_z_sensitivity_confirmed": high_z_sensitivity_confirmed,
                  "bridge_pressure_computed": bridge_pressure_computed,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_124_edge_anchor_sensitivity_bridge_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "observed_records_v4_124.csv",
              observed_records,
              ["position", "z", "observed_fsigma8", "observed_sigma", "source_family", "covariance_status", "primary_bridge_decision", "reference_fsigma8_mean", "residual_observed_minus_reference", "observed_variance_used", "target_name", "source_role"]
          )

          write_csv(
              OUTDIR / "bridge_lane_records_v4_124.csv",
              bridge_lane_records,
              ["lane_id", "positions", "redshifts", "edge_status", "chi2", "dof", "pressure_z", "residual_mean", "rank_total_covariance", "symmetry_error_total_covariance", "diag_min_total_covariance", "condition_proxy_total_covariance", "computed", "claim_scope"]
          )

          write_csv(
              OUTDIR / "edge_sensitivity_records_v4_124.csv",
              edge_sensitivity_records,
              ["comparison_id", "base_lane", "comparison_lane", "delta_chi2", "delta_pressure_z", "interpretation"]
          )

          write_csv(
              OUTDIR / "total_covariance_records_v4_124.csv",
              total_covariance_records,
              ["lane_id", "row_position", "column_position", "row_target", "column_target", "total_covariance_value", "record_scope"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_124.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_124.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_124.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.124 — Edge Anchor Sensitivity Bridge Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.124 computes the edge-anchor sensitivity bridge lanes using the v4.123 decisions. The verified BOSS core is preserved, low-z remains primary with a literature-error diagonal fallback label, and high-z remains sensitivity-only pending source lock.")
          md.append("")
          md.append("All lanes remain diagnostic only. No final RSD pressure, likelihood, BIC, posterior comparison, or TAIRID validation is computed.")
          md.append("")
          md.append("## Bridge lanes")
          md.append("")
          md.append("| Lane | chi2 | dof | pressure_z |")
          md.append("|---|---:|---:|---:|")
          for row in bridge_lane_records:
              md.append(f"| `{row['lane_id']}` | `{row['chi2']}` | `{row['dof']}` | `{row['pressure_z']}` |")
          md.append("")
          md.append("## Edge sensitivity")
          md.append("")
          md.append("| Comparison | delta chi2 | delta pressure_z |")
          md.append("|---|---:|---:|")
          for row in edge_sensitivity_records:
              md.append(f"| `{row['comparison_id']}` | `{row['delta_chi2']}` | `{row['delta_pressure_z']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_124_edge_anchor_sensitivity_bridge_probe.json",
              "tairid_v4_124_edge_anchor_sensitivity_bridge_probe.md",
              "observed_records_v4_124.csv",
              "bridge_lane_records_v4_124.csv",
              "edge_sensitivity_records_v4_124.csv",
              "total_covariance_records_v4_124.csv",
              "blocked_claims_v4_124.csv",
              "next_route_options_v4_124.csv",
              "rule_results_v4_124.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_124_edge_anchor_sensitivity_bridge_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.124 edge anchor sensitivity bridge probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-124-edge-anchor-sensitivity-bridge-probe
          path: artifacts/tairid_v4_124_edge_anchor_sensitivity_bridge_probe/
