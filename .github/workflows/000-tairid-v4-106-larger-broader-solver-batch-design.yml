name: 000 TAIRID v4.106 Larger Broader Solver Batch Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-106-larger-broader-solver-batch-design.yml"

jobs:
  tairid-v4-106-larger-broader-solver-batch-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.106 larger broader solver batch design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_106_larger_broader_solver_batch_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_106_larger_broader_solver_batch_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_106_larger_broader_solver_batch_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse chain sample rows.",
              "This does not run CAMB.",
              "This does not compute weighted mean values.",
              "This does not compute a weighted covariance matrix.",
              "This does not compute Planck reference uncertainty.",
              "This designs a chunked CAMB solver route for the 1024-sample multi-file broader sample packets established by v4.105.",
              "A pass means the larger broader parse-plus-solver probe is specified and ready to run."
          ]

          UPSTREAM_LOCKS = {
              "v4_105_multi_file_broader_sample_parser_probe": {
                  "readiness_label": "multi_file_broader_sample_parser_probe_passed_ready_for_larger_broader_solver_batch_design",
                  "valid_sample_row_count": 1024,
                  "target_valid_rows_reached": True,
                  "minimum_valid_rows_reached": True,
                  "contributing_member_count": 4,
                  "preferred_member_count_reached": True,
                  "minimum_member_count_reached": True,
                  "effective_sample_size_preview": 624.5301884527668,
                  "dedupe_guard_ok": True,
                  "duplicate_hash_count": 0,
                  "sample_weights_ok": True,
                  "sample_loglike_ok": True,
                  "sample_primary_values_ok": True,
                  "future_CAMB_run_blocked": True,
                  "sample_packets_created": True,
                  "CAMB_run": False,
                  "weighted_mean_vector_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_104_multi_file_broader_chain_coverage_design": {
                  "readiness_label": "multi_file_broader_chain_coverage_design_passed_ready_for_multi_file_broader_sample_parser_probe",
                  "target_valid_rows_next_probe": 1024,
                  "minimum_valid_rows_next_probe": 512,
                  "preferred_sample_member_count": 4,
                  "minimum_sample_member_count": 2,
                  "Planck_reference_uncertainty_computed": False
              },
              "v4_103_reference_uncertainty_sufficiency_gate": {
                  "readiness_label": "reference_uncertainty_sufficiency_gate_passed_not_final_ready_for_multi_file_broader_chain_coverage_design",
                  "final_reference_uncertainty_rejected": True,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          SELECTED_ROOT = "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE"

          SOLVER_BATCH_TARGETS = {
              "target_solver_samples": 1024,
              "minimum_solver_samples": 512,
              "target_contributing_members": 4,
              "minimum_contributing_members": 2,
              "chunk_size": 16,
              "target_chunk_count": 64,
              "minimum_chunk_count": 32,
              "target_redshift_count": 5,
              "expected_output_vector_dimension": 10,
              "expected_vector_component_count": 10240,
              "minimum_vector_component_count": 5120,
              "locked_output_orientation": "reversed_raw_order",
              "parse_rows_again_in_solver_probe": True,
              "run_CAMB_now": False,
              "compute_weighted_mean_now": False,
              "compute_covariance_now": False,
              "compute_final_pressure_now": False
          }

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015"},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038"},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051"},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061"},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233"}
          ]

          OUTPUT_VECTOR_SCHEMA = [
              {"position": 0, "quantity": "sigma8z", "z": 0.15, "target_name": "sigma8z015"},
              {"position": 1, "quantity": "fsigma8", "z": 0.15, "target_name": "fsigma8z015"},
              {"position": 2, "quantity": "sigma8z", "z": 0.38, "target_name": "sigma8z038"},
              {"position": 3, "quantity": "fsigma8", "z": 0.38, "target_name": "fsigma8z038"},
              {"position": 4, "quantity": "sigma8z", "z": 0.51, "target_name": "sigma8z051"},
              {"position": 5, "quantity": "fsigma8", "z": 0.51, "target_name": "fsigma8z051"},
              {"position": 6, "quantity": "sigma8z", "z": 0.61, "target_name": "sigma8z061"},
              {"position": 7, "quantity": "fsigma8", "z": 0.61, "target_name": "fsigma8z061"},
              {"position": 8, "quantity": "sigma8z", "z": 2.33, "target_name": "sigma8z233"},
              {"position": 9, "quantity": "fsigma8", "z": 2.33, "target_name": "fsigma8z233"}
          ]

          MEMBER_SOLVER_BATCH_DESIGN = [
              {
                  "member_order": 1,
                  "member_name": SELECTED_ROOT + "_1.txt",
                  "expected_sample_rows": 256,
                  "expected_chunks": 16,
                  "minimum_sample_rows": 128,
                  "minimum_chunks": 8,
                  "solver_status": "design_only_not_run"
              },
              {
                  "member_order": 2,
                  "member_name": SELECTED_ROOT + "_2.txt",
                  "expected_sample_rows": 256,
                  "expected_chunks": 16,
                  "minimum_sample_rows": 128,
                  "minimum_chunks": 8,
                  "solver_status": "design_only_not_run"
              },
              {
                  "member_order": 3,
                  "member_name": SELECTED_ROOT + "_3.txt",
                  "expected_sample_rows": 256,
                  "expected_chunks": 16,
                  "minimum_sample_rows": 128,
                  "minimum_chunks": 8,
                  "solver_status": "design_only_not_run"
              },
              {
                  "member_order": 4,
                  "member_name": SELECTED_ROOT + "_4.txt",
                  "expected_sample_rows": 256,
                  "expected_chunks": 16,
                  "minimum_sample_rows": 128,
                  "minimum_chunks": 8,
                  "solver_status": "design_only_not_run"
              }
          ]

          CHUNKING_CONTRACT = []
          chunk_number = 1
          for member in MEMBER_SOLVER_BATCH_DESIGN:
              start_sample = (member["member_order"] - 1) * 256 + 1
              for local_chunk in range(1, 17):
                  chunk_start = start_sample + (local_chunk - 1) * 16
                  chunk_end = chunk_start + 15
                  CHUNKING_CONTRACT.append({
                      "chunk_number": chunk_number,
                      "member_name": member["member_name"],
                      "member_order": member["member_order"],
                      "local_chunk_number": local_chunk,
                      "sample_start": chunk_start,
                      "sample_end": chunk_end,
                      "expected_sample_count": 16,
                      "run_now": False
                  })
                  chunk_number += 1

          SOLVER_PROBE_CONTRACT = [
              {
                  "step": 1,
                  "action": "Install numpy, scipy, sympy, packaging, and camb with prefer-binary.",
                  "output": "Dependency/install record.",
                  "hard_boundary": "Dependency setup only."
              },
              {
                  "step": 2,
                  "action": "Reparse the same bounded multi-file sample packets from Planck fullGrid using v4.105 logic.",
                  "output": "1024 target sample packets, minimum 512, across at least two members.",
                  "hard_boundary": "No full chain import."
              },
              {
                  "step": 3,
                  "action": "Run CAMB in a fresh external Python runner over chunks of 16 sample packets.",
                  "output": "Per-chunk solver status and per-sample raw sigma8/fsigma8 arrays.",
                  "hard_boundary": "Bounded solver batch only."
              },
              {
                  "step": 4,
                  "action": "Apply locked reversed_raw_order orientation to raw CAMB arrays.",
                  "output": "Oriented sigma8z/fsigma8 vectors in ascending target redshift order.",
                  "hard_boundary": "Orientation application only."
              },
              {
                  "step": 5,
                  "action": "Write one 10-dimensional target vector per solved sample and preserve sample weights, member names, source line numbers, and line hashes.",
                  "output": "Sample output vector table and 10x component table.",
                  "hard_boundary": "Do not compute weighted mean or covariance in this solver probe."
              },
              {
                  "step": 6,
                  "action": "Gate success on solver count, chunk completion, vector completeness, weight preservation, and orientation preservation.",
                  "output": "Readiness for broader covariance mechanics probe.",
                  "hard_boundary": "No Planck reference uncertainty claim."
              }
          ]

          QUALITY_GATES_FOR_SOLVER_PROBE = [
              {
                  "gate_id": "minimum_sample_count",
                  "requirement": "At least 512 sample packets must be solved successfully.",
                  "failure_action": "Do not proceed to covariance mechanics."
              },
              {
                  "gate_id": "target_sample_count",
                  "requirement": "Target success is 1024 solved sample packets.",
                  "failure_action": "Pass may still be allowed only if minimum passes and warnings are carried."
              },
              {
                  "gate_id": "minimum_member_coverage",
                  "requirement": "Solved packets must come from at least two contributing chain members.",
                  "failure_action": "Do not proceed to covariance mechanics."
              },
              {
                  "gate_id": "preferred_member_coverage",
                  "requirement": "Preferred success is four contributing chain members.",
                  "failure_action": "Carry warning if not reached."
              },
              {
                  "gate_id": "output_vector_completeness",
                  "requirement": "Every solved sample must have a 10-value positive finite target vector.",
                  "failure_action": "Fail solver probe."
              },
              {
                  "gate_id": "weights_preserved",
                  "requirement": "Sample weights must be preserved beside output vectors.",
                  "failure_action": "Fail solver probe."
              },
              {
                  "gate_id": "orientation_preserved",
                  "requirement": "All raw CAMB output arrays must be reversed before vectorization.",
                  "failure_action": "Fail solver probe."
              },
              {
                  "gate_id": "mean_covariance_block",
                  "requirement": "Solver probe must not compute weighted mean, covariance, final pressure, or validation.",
                  "failure_action": "Fail claim-boundary gate."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A weighted covariance matrix was computed in v4.106.",
              "A weighted posterior mean vector was computed in v4.106.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The larger broader solver batch design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "A 1024-sample solver target is the same as final Planck reference uncertainty.",
              "The next solver probe will be enough for final RSD pressure.",
              "Design output is already solved sample vectors."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_107_larger_broader_parse_plus_solver_probe",
                  "purpose": "Reparse the 1024 target sample packets and run CAMB over them in 64 chunks of 16.",
                  "why_next": "Broader sample packets need solved sigma8z/fsigma8 output vectors before covariance mechanics."
              },
              {
                  "priority": 2,
                  "route_id": "v4_108_broader_covariance_mechanics_probe",
                  "purpose": "Compute broader weighted mean and covariance mechanics after solver output exists.",
                  "why_next": "Covariance mechanics require solved output vectors and preserved weights."
              },
              {
                  "priority": 3,
                  "route_id": "v4_109_broader_reference_uncertainty_sufficiency_gate",
                  "purpose": "Judge whether the broader covariance is still diagnostic or sufficient for provisional Planck reference uncertainty.",
                  "why_next": "Final RSD pressure remains blocked until sufficiency is tested."
              },
              {
                  "priority": 4,
                  "route_id": "v4_110_growth_RSD_reference_covariance_bridge_design",
                  "purpose": "Design how provisional Planck reference covariance would later connect to RSD observed covariance.",
                  "why_next": "Only after reference uncertainty sufficiency is addressed."
              }
          ]

          failed_gates = []
          warnings = [
              "solver_batch_design_only",
              "no_chain_rows_parsed",
              "no_CAMB_run",
              "no_sample_output_vectors_computed",
              "no_weighted_mean_computed",
              "no_covariance_computed",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          target_samples = SOLVER_BATCH_TARGETS["target_solver_samples"]
          minimum_samples = SOLVER_BATCH_TARGETS["minimum_solver_samples"]
          chunk_size = SOLVER_BATCH_TARGETS["chunk_size"]
          target_chunk_count = SOLVER_BATCH_TARGETS["target_chunk_count"]
          minimum_chunk_count = SOLVER_BATCH_TARGETS["minimum_chunk_count"]
          output_dim = SOLVER_BATCH_TARGETS["expected_output_vector_dimension"]

          if UPSTREAM_LOCKS["v4_105_multi_file_broader_sample_parser_probe"]["valid_sample_row_count"] != 1024:
              failed_gates.append("upstream_valid_sample_row_count_not_1024")

          if UPSTREAM_LOCKS["v4_105_multi_file_broader_sample_parser_probe"]["contributing_member_count"] < 4:
              failed_gates.append("upstream_contributing_member_count_below_4")

          if UPSTREAM_LOCKS["v4_105_multi_file_broader_sample_parser_probe"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          if target_samples != 1024:
              failed_gates.append("target_solver_samples_not_1024")

          if minimum_samples != 512:
              failed_gates.append("minimum_solver_samples_not_512")

          if chunk_size != 16:
              failed_gates.append("chunk_size_not_16")

          if target_chunk_count != 64:
              failed_gates.append("target_chunk_count_not_64")

          if minimum_chunk_count != 32:
              failed_gates.append("minimum_chunk_count_not_32")

          if len(CHUNKING_CONTRACT) != 64:
              failed_gates.append("chunking_contract_count_not_64")

          if len(OUTPUT_VECTOR_SCHEMA) != 10:
              failed_gates.append("output_vector_schema_not_10")

          if len(MEMBER_SOLVER_BATCH_DESIGN) != 4:
              failed_gates.append("member_solver_batch_design_not_4")

          member_expected_rows_sum = sum(row["expected_sample_rows"] for row in MEMBER_SOLVER_BATCH_DESIGN)
          member_expected_chunks_sum = sum(row["expected_chunks"] for row in MEMBER_SOLVER_BATCH_DESIGN)

          if member_expected_rows_sum != target_samples:
              failed_gates.append("member_expected_rows_do_not_sum_to_1024")

          if member_expected_chunks_sum != target_chunk_count:
              failed_gates.append("member_expected_chunks_do_not_sum_to_64")

          if len(SOLVER_PROBE_CONTRACT) < 6:
              failed_gates.append("solver_probe_contract_incomplete")

          if len(QUALITY_GATES_FOR_SOLVER_PROBE) < 8:
              failed_gates.append("quality_gates_incomplete")

          if SOLVER_BATCH_TARGETS["run_CAMB_now"] is not False:
              failed_gates.append("CAMB_run_allowed_too_early")

          if SOLVER_BATCH_TARGETS["compute_weighted_mean_now"] is not False:
              failed_gates.append("weighted_mean_computed_too_early")

          if SOLVER_BATCH_TARGETS["compute_covariance_now"] is not False:
              failed_gates.append("covariance_computed_too_early")

          if SOLVER_BATCH_TARGETS["compute_final_pressure_now"] is not False:
              failed_gates.append("final_pressure_allowed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "weighted covariance matrix was computed in v4.106",
              "weighted posterior mean vector was computed in v4.106",
              "final rsd pressure score",
              "validates tairid cosmology",
              "1024-sample solver target is the same as final planck reference uncertainty",
              "next solver probe will be enough for final rsd pressure",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "larger_broader_solver_batch_design_passed_ready_for_larger_broader_parse_plus_solver_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_broader_parser_carried",
                  "pass": UPSTREAM_LOCKS["v4_105_multi_file_broader_sample_parser_probe"]["valid_sample_row_count"] == 1024,
                  "result": "1024 parsed sample packets carried from v4.105",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "target_and_minimum_solver_samples_locked",
                  "pass": target_samples == 1024 and minimum_samples == 512,
                  "result": "target=1024 solver samples; minimum=512 solver samples",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "chunking_locked",
                  "pass": chunk_size == 16 and target_chunk_count == 64 and len(CHUNKING_CONTRACT) == 64,
                  "result": "64 chunks of 16 samples locked",
                  "boundary": "No CAMB run."
              },
              {
                  "rule_id": "member_batch_design_locked",
                  "pass": len(MEMBER_SOLVER_BATCH_DESIGN) == 4 and member_expected_rows_sum == target_samples,
                  "result": "four member batches of 256 samples each",
                  "boundary": "Member design only."
              },
              {
                  "rule_id": "output_vector_schema_locked",
                  "pass": len(OUTPUT_VECTOR_SCHEMA) == 10,
                  "result": "10-dimensional sigma8z/fsigma8 output vector declared",
                  "boundary": "No output vectors computed."
              },
              {
                  "rule_id": "solver_probe_contract_declared",
                  "pass": len(SOLVER_PROBE_CONTRACT) >= 6,
                  "result": f"{len(SOLVER_PROBE_CONTRACT)} solver probe steps declared",
                  "boundary": "Next workflow only."
              },
              {
                  "rule_id": "quality_gates_declared",
                  "pass": len(QUALITY_GATES_FOR_SOLVER_PROBE) >= 8,
                  "result": f"{len(QUALITY_GATES_FOR_SOLVER_PROBE)} quality gates declared",
                  "boundary": "No covariance computed."
              },
              {
                  "rule_id": "CAMB_and_covariance_still_blocked",
                  "pass": SOLVER_BATCH_TARGETS["run_CAMB_now"] is False and SOLVER_BATCH_TARGETS["compute_covariance_now"] is False,
                  "result": "no CAMB run and no covariance computation in v4.106",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "weighted_mean_and_final_pressure_blocked",
                  "pass": SOLVER_BATCH_TARGETS["compute_weighted_mean_now"] is False and SOLVER_BATCH_TARGETS["compute_final_pressure_now"] is False,
                  "result": "weighted mean and final pressure remain blocked",
                  "boundary": "No reference uncertainty."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_106_rules_passed")

          if failed_gates:
              readiness_label = "larger_broader_solver_batch_design_failed"
              next_allowed_step = "Repair solver batch design before larger broader parse-plus-solver probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.107 larger broader parse-plus-solver probe. "
                  "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "selected_root": SELECTED_ROOT,
              "upstream_valid_sample_row_count": UPSTREAM_LOCKS["v4_105_multi_file_broader_sample_parser_probe"]["valid_sample_row_count"],
              "upstream_contributing_member_count": UPSTREAM_LOCKS["v4_105_multi_file_broader_sample_parser_probe"]["contributing_member_count"],
              "upstream_effective_sample_size_preview": UPSTREAM_LOCKS["v4_105_multi_file_broader_sample_parser_probe"]["effective_sample_size_preview"],
              "target_solver_samples": target_samples,
              "minimum_solver_samples": minimum_samples,
              "chunk_size": chunk_size,
              "target_chunk_count": target_chunk_count,
              "minimum_chunk_count": minimum_chunk_count,
              "member_solver_batch_count": len(MEMBER_SOLVER_BATCH_DESIGN),
              "chunking_contract_count": len(CHUNKING_CONTRACT),
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "output_vector_dimension": output_dim,
              "expected_vector_component_count": SOLVER_BATCH_TARGETS["expected_vector_component_count"],
              "minimum_vector_component_count": SOLVER_BATCH_TARGETS["minimum_vector_component_count"],
              "locked_output_orientation": SOLVER_BATCH_TARGETS["locked_output_orientation"],
              "parse_rows_again_in_solver_probe": SOLVER_BATCH_TARGETS["parse_rows_again_in_solver_probe"],
              "chain_rows_parsed": False,
              "sample_packets_created": False,
              "CAMB_run": False,
              "sample_output_vectors_computed": False,
              "weighted_mean_vector_computed": False,
              "weighted_covariance_matrix_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "selected_root": SELECTED_ROOT,
              "solver_batch_targets": SOLVER_BATCH_TARGETS,
              "target_redshifts": TARGET_REDSHIFTS,
              "output_vector_schema": OUTPUT_VECTOR_SCHEMA,
              "member_solver_batch_design": MEMBER_SOLVER_BATCH_DESIGN,
              "chunking_contract": CHUNKING_CONTRACT,
              "solver_probe_contract": SOLVER_PROBE_CONTRACT,
              "quality_gates_for_solver_probe": QUALITY_GATES_FOR_SOLVER_PROBE,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "target_solver_samples": target_samples,
                  "minimum_solver_samples": minimum_samples,
                  "target_chunk_count": target_chunk_count,
                  "chunk_size": chunk_size,
                  "chain_rows_parsed": False,
