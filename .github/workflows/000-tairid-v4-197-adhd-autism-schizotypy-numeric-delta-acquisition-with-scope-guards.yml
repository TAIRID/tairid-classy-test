name: 000 TAIRID v4.197 - ADHD Autism Schizotypy Numeric Delta Acquisition With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-197-adhd-autism-schizotypy-numeric-delta-acquisition-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-197-adhd-autism-schizotypy-numeric-delta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.197 ADHD autism schizotypy numeric delta acquisition
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_197_outputs
          cat > tairid_v4_197_outputs/run_v4_197.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          OUT = Path("tairid_v4_197_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "adhd_autism_schizotypy_numeric_delta_acquisition_passed_templates_and_directional_targets_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "numeric delta targets are not validation",
              "directional targets are not external replication",
              "TAIRID not proved"
          ]

          V4_196_STATUS = {
              "version": "v4.196",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "manual_group_rows": 4,
              "relative_shape_rows": 2,
              "same_axis_count": 3,
              "different_axis_count": 1,
              "package_status": "manual_group_axis_table_and_data_acquisition_plan_written_no_validation",
              "selected_next_route": "rerun_v4_195_after_subject_axis_input_file_or_continue_to_adhd_autism_schizotypy_numeric_delta_acquisition"
          }

          LOCKED_SIGNATURE = {
              "shape_signature": "++-",
              "family": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low",
              "plain": "reach high / pacing high / growth low",
              "boundary": "relational shape only; not a shared cause claim"
          }

          TARGET_ROWS = [
              {
                  "lane": "ADHD",
                  "case_id": "ADHD_ds003500_selective_attention_width_over_depth",
                  "paper_or_lane_basis": "uploaded ADHD width-over-depth paper lane",
                  "expected_shape_signature": "++-",
                  "propagation_reach_axis": "signal width pressure / response variability / exploration width",
                  "expected_propagation_direction": "+",
                  "pacing_access_axis": "gate instability / update load / switch pressure",
                  "expected_pacing_direction": "+",
                  "consolidation_growth_axis": "task depth / selective-gate stability / task viability",
                  "expected_consolidation_direction": "-",
                  "current_anchor_kind": "directional",
                  "current_anchor": "higher width pressure, lower task depth, lower gate stability, lower viability",
                  "needed_numeric_delta": "group means or standardized deltas for width, gate instability, depth, viability"
              },
              {
                  "lane": "Autism",
                  "case_id": "Autism_measured_dispersion_search_correction",
                  "paper_or_lane_basis": "uploaded autism reference-field organization paper lane",
                  "expected_shape_signature": "++-",
                  "propagation_reach_axis": "dispersion/search spread / gaze or route dispersion",
                  "expected_propagation_direction": "+",
                  "pacing_access_axis": "search friction / update load / boundary friction",
                  "expected_pacing_direction": "+",
                  "consolidation_growth_axis": "boundary compaction / stable local consolidation on this measured surface",
                  "expected_consolidation_direction": "-",
                  "current_anchor_kind": "correction",
                  "current_anchor": "initial compact-depth prediction failed; measured lane favored dispersion/search and lower boundary compaction",
                  "needed_numeric_delta": "ASD-vs-TD dispersion/search and boundary-compaction deltas from eye-tracking outputs"
              },
              {
                  "lane": "Schizotypy",
                  "case_id": "Schizotypy_positive_reference_field_overreach",
                  "paper_or_lane_basis": "uploaded schizotypal reference-field overreach paper lane",
                  "expected_shape_signature": "++-",
                  "propagation_reach_axis": "semantic/reference reach / weak-lure acceptance / branch openness",
                  "expected_propagation_direction": "+",
                  "pacing_access_axis": "salience update / reference-switching pressure / ambiguity pull",
                  "expected_pacing_direction": "+",
                  "consolidation_growth_axis": "anchor specificity / rejection confidence / stable reality-testing output",
                  "expected_consolidation_direction": "-",
                  "current_anchor_kind": "directional",
                  "current_anchor": "weak/false-anchor acceptance and unrelated lure acceptance mattered more than target recognition",
                  "needed_numeric_delta": "target/lure/anchor integrity measures by positive trait lane"
              }
          ]

          INPUT_COLUMNS = [
              "lane",
              "case_id",
              "group_or_condition",
              "boundary_or_task",
              "propagation_reach_value",
              "reference_propagation_reach_value",
              "pacing_access_value",
              "reference_pacing_access_value",
              "consolidation_growth_value",
              "reference_consolidation_growth_value",
              "source_or_dataset",
              "notes"
          ]

          TEMPLATE_ROWS = [
              {
                  "lane": "ADHD",
                  "case_id": "ADHD_ds003500_selective_attention_width_over_depth",
                  "group_or_condition": "ADHD_or_control_or_group",
                  "boundary_or_task": "selective attention / response inhibition / width-depth task surface",
                  "propagation_reach_value": "width pressure numeric value",
                  "reference_propagation_reach_value": "control/reference width pressure numeric value",
                  "pacing_access_value": "gate instability or update-load numeric value",
                  "reference_pacing_access_value": "control/reference gate/update numeric value",
                  "consolidation_growth_value": "task depth or viability numeric value",
                  "reference_consolidation_growth_value": "control/reference depth/viability numeric value",
                  "source_or_dataset": "ADHD paper output table or ds003500 derivative",
                  "notes": "Expected shape ++- only if deltas resolve as +,+,-."
              },
              {
                  "lane": "Autism",
                  "case_id": "Autism_measured_dispersion_search_correction",
                  "group_or_condition": "ASD_or_TD_or_group",
                  "boundary_or_task": "eye-tracking / movie-viewing / social-stimulus surface",
                  "propagation_reach_value": "dispersion/search numeric value",
                  "reference_propagation_reach_value": "TD/reference dispersion/search numeric value",
                  "pacing_access_value": "search friction or update-load numeric value",
                  "reference_pacing_access_value": "TD/reference friction/update numeric value",
                  "consolidation_growth_value": "boundary compaction or stable consolidation numeric value",
                  "reference_consolidation_growth_value": "TD/reference compaction/consolidation numeric value",
                  "source_or_dataset": "autism paper output table or ASD eye-tracking derivative",
                  "notes": "Do not force compact-depth mode; this row is measured dispersion/search lane only."
              },
              {
                  "lane": "Schizotypy",
                  "case_id": "Schizotypy_positive_reference_field_overreach",
                  "group_or_condition": "positive_schizotypy_or_reference_group",
                  "boundary_or_task": "semantic/lure/anchor reference-field task",
                  "propagation_reach_value": "weak/unrelated lure acceptance or branch reach numeric value",
                  "reference_propagation_reach_value": "reference lure/reach numeric value",
                  "pacing_access_value": "salience/reference switching or ambiguity-pull numeric value",
                  "reference_pacing_access_value": "reference salience/switching numeric value",
                  "consolidation_growth_value": "anchor specificity or rejection confidence numeric value",
                  "reference_consolidation_growth_value": "reference anchor specificity numeric value",
                  "source_or_dataset": "schizotypy paper output table or lure/anchor derivative",
                  "notes": "Positive lane only; do not collapse disorganized or negative schizotypy into this row."
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def try_float(v):
              try:
                  if v is None or str(v).strip() == "":
                      return None
                  return float(v)
              except Exception:
                  return None

          def sign_from_delta(value, reference):
              v = try_float(value)
              r = try_float(reference)
              if v is None or r is None:
                  return ""
              delta = v - r
              if delta > 0:
                  return "+"
              if delta < 0:
                  return "-"
              return "0"

          def read_optional_inputs():
              paths = [
                  Path("data/neurotype/adhd_autism_schizotypy_numeric_delta_input.csv"),
                  Path("data/cross_domain/adhd_autism_schizotypy_numeric_delta_input.csv"),
                  Path("data/neurotype/neurotype_numeric_delta_input.csv"),
                  Path("data/cross_domain/neurotype_numeric_delta_input.csv")
              ]
              rows = []
              inventory = []
              for path in paths:
                  count = 0
                  if path.exists():
                      with open(path, newline="", encoding="utf-8") as f:
                          for row in csv.DictReader(f):
                              row["_source_file"] = str(path)
                              rows.append(row)
                              count += 1
                  inventory.append({"path": str(path), "exists": path.exists(), "rows_loaded": count})
              return rows, inventory

          input_rows, inventory_rows = read_optional_inputs()

          normalized_rows = []
          for row in input_rows:
              lane = str(row.get("lane", "")).strip()
              if lane not in ["ADHD", "Autism", "Schizotypy"]:
                  continue
              p_sign = sign_from_delta(row.get("propagation_reach_value"), row.get("reference_propagation_reach_value"))
              t_sign = sign_from_delta(row.get("pacing_access_value"), row.get("reference_pacing_access_value"))
              c_sign = sign_from_delta(row.get("consolidation_growth_value"), row.get("reference_consolidation_growth_value"))
              sig = p_sign + t_sign + c_sign if p_sign and t_sign and c_sign else ""
              normalized_rows.append({
                  "source_file": row.get("_source_file", ""),
                  "lane": lane,
                  "case_id": row.get("case_id", ""),
                  "group_or_condition": row.get("group_or_condition", ""),
                  "boundary_or_task": row.get("boundary_or_task", ""),
                  "propagation_reach_delta_sign": p_sign,
                  "pacing_access_delta_sign": t_sign,
                  "consolidation_growth_delta_sign": c_sign,
                  "resolved_shape_signature": sig,
                  "matches_expected_plus_plus_minus": sig == "++-",
                  "propagation_reach_value": row.get("propagation_reach_value", ""),
                  "reference_propagation_reach_value": row.get("reference_propagation_reach_value", ""),
                  "pacing_access_value": row.get("pacing_access_value", ""),
                  "reference_pacing_access_value": row.get("reference_pacing_access_value", ""),
                  "consolidation_growth_value": row.get("consolidation_growth_value", ""),
                  "reference_consolidation_growth_value": row.get("reference_consolidation_growth_value", ""),
                  "source_or_dataset": row.get("source_or_dataset", ""),
                  "notes": row.get("notes", "")
              })

          lane_summary = {}
          for row in normalized_rows:
              lane = row["lane"]
              lane_summary.setdefault(lane, {
                  "lane": lane,
                  "rows": 0,
                  "complete_signature_rows": 0,
                  "matches_expected_plus_plus_minus": 0,
                  "mismatches": 0
              })
              lane_summary[lane]["rows"] += 1
              if row["resolved_shape_signature"]:
                  lane_summary[lane]["complete_signature_rows"] += 1
                  if row["matches_expected_plus_plus_minus"]:
                      lane_summary[lane]["matches_expected_plus_plus_minus"] += 1
                  else:
                      lane_summary[lane]["mismatches"] += 1

          if normalized_rows:
              package_status = "numeric_delta_input_rows_loaded_and_classified"
              selected_next_route = "adhd_autism_schizotypy_numeric_delta_shape_review_with_scope_guards"
          else:
              package_status = "numeric_delta_input_missing_templates_written"
              selected_next_route = "adhd_autism_schizotypy_manual_numeric_delta_table_or_data_upload_with_scope_guards"

          claim_rows = [
              {
                  "claim": "ADHD, autism, and schizotypy are confirmed as ++-.",
                  "status": "blocked",
                  "safe_wording": "They are directional/correction target lanes until numeric deltas are supplied.",
                  "forbidden_wording": "They are confirmed as the same shape."
              },
              {
                  "claim": "The autism compact-depth row should be used here.",
                  "status": "blocked",
                  "safe_wording": "This workflow only tests the measured dispersion/search correction lane.",
                  "forbidden_wording": "Autism is always compact-depth or always dispersion."
              },
              {
                  "claim": "Numeric deltas, if supplied, can classify shape.",
                  "status": "allowed_as_preview",
                  "safe_wording": "Numeric deltas can classify the row direction in this harness.",
                  "forbidden_wording": "Numeric deltas validate cross-domain scaling."
              }
          ]

          write_csv(OUT / "v4_197_v4_196_status_review.csv", [V4_196_STATUS], list(V4_196_STATUS.keys()))
          (OUT / "v4_197_v4_196_status_review.json").write_text(json.dumps(V4_196_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_197_directional_delta_targets.csv", TARGET_ROWS, [
              "lane", "case_id", "paper_or_lane_basis", "expected_shape_signature",
              "propagation_reach_axis", "expected_propagation_direction",
              "pacing_access_axis", "expected_pacing_direction",
              "consolidation_growth_axis", "expected_consolidation_direction",
              "current_anchor_kind", "current_anchor", "needed_numeric_delta"
          ])
          write_csv(OUT / "candidate_data_neurotype_adhd_autism_schizotypy_numeric_delta_input.csv", TEMPLATE_ROWS, INPUT_COLUMNS)
          write_csv(OUT / "v4_197_numeric_delta_input_inventory.csv", inventory_rows, ["path", "exists", "rows_loaded"])
          write_csv(OUT / "v4_197_normalized_numeric_delta_rows.csv", normalized_rows, [
              "source_file", "lane", "case_id", "group_or_condition", "boundary_or_task",
              "propagation_reach_delta_sign", "pacing_access_delta_sign", "consolidation_growth_delta_sign",
              "resolved_shape_signature", "matches_expected_plus_plus_minus",
              "propagation_reach_value", "reference_propagation_reach_value",
              "pacing_access_value", "reference_pacing_access_value",
              "consolidation_growth_value", "reference_consolidation_growth_value",
              "source_or_dataset", "notes"
          ])
          write_csv(OUT / "v4_197_lane_delta_summary.csv", list(lane_summary.values()), [
              "lane", "rows", "complete_signature_rows", "matches_expected_plus_plus_minus", "mismatches"
          ])
          write_csv(OUT / "v4_197_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          route_decision = {
              "version": "v4.197",
              "result_label": RESULT_LABEL,
              "clean_result": "ADHD, autism, and schizotypy were converted into numeric-delta target lanes. If numeric input rows are present, they are classified; otherwise an input template is written.",
              "target_rows": len(TARGET_ROWS),
              "input_rows_loaded": len(input_rows),
              "normalized_delta_rows": len(normalized_rows),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "numeric delta acquisition or template only; not validation",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_197_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_197_scope_guards.json").write_text(json.dumps({
              "scope": "ADHD/autism/schizotypy numeric delta acquisition only",
              "numeric_delta_targets_are_validation": False,
              "directional_targets_are_external_replication": False,
              "autism_compact_depth_forced": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_197_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.197 - ADHD Autism Schizotypy Numeric Delta Acquisition",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.196 preserved the dyslexia/aphantasia shape but could not compute subject covariance. v4.197 moves to the next ready gap: exact numeric deltas for ADHD, autism, and schizotypy, which currently match the locked ++- shape only by directional/correction anchors.",
              "",
              "Target rows: `" + str(len(TARGET_ROWS)) + "`",
              "Input rows loaded: `" + str(len(input_rows)) + "`",
              "Normalized delta rows: `" + str(len(normalized_rows)) + "`",
              "",
              "Package status: `" + package_status + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_197_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_197_v4_196_status_review.csv",
              "v4_197_v4_196_status_review.json",
              "v4_197_directional_delta_targets.csv",
              "candidate_data_neurotype_adhd_autism_schizotypy_numeric_delta_input.csv",
              "v4_197_numeric_delta_input_inventory.csv",
              "v4_197_normalized_numeric_delta_rows.csv",
              "v4_197_lane_delta_summary.csv",
              "v4_197_claim_boundary_matrix.csv",
              "v4_197_route_decision.json",
              "v4_197_scope_guards.json",
              "v4_197_blocked_claims.json",
              "v4_197_summary.md"
          ]

          rules = {
              "version_is_v4_197": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_196_status_reviewed": V4_196_STATUS["rule_pass_count"] == 10,
              "target_rows_present": len(TARGET_ROWS) == 3,
              "template_written": (OUT / "candidate_data_neurotype_adhd_autism_schizotypy_numeric_delta_input.csv").exists(),
              "route_selected": bool(selected_next_route),
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True,
              "no_forced_autism_compact_depth": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.197",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "target_rows": len(TARGET_ROWS),
              "input_rows_loaded": len(input_rows),
              "normalized_delta_rows": len(normalized_rows),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "numeric_delta_acquisition_or_template_only_no_validation"
          }

          (OUT / "v4_197_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.197 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_197_outputs/run_v4_197.py

      - name: Upload v4.197 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-197-adhd-autism-schizotypy-numeric-delta-acquisition-output
          path: tairid_v4_197_outputs/
