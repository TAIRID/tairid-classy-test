name: TAIRID Cosmology v3.12.1 Source-Specific Ingestion Tolerance Fix

on:
  workflow_dispatch:

jobs:
  source-specific-ingestion-tolerance-fix:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scientific Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Run TAIRID v3.12.1 source-specific ingestion tolerance fix
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_12_1

          python - <<'PY'
          import csv
          import json
          import math
          import re
          import shutil
          import statistics
          import tarfile
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          import numpy as np
          from astropy.io import fits

          OUTDIR = Path("artifacts/tairid_cosmology_v3_12_1")
          DOWNLOADS = OUTDIR / "downloads"
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOADS.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_12_1_source_specific_ingestion_tolerance_fix"

          # v3.12 failed because the symmetry gate was too strict.
          # Observed Pantheon+SH0ES covariance symmetry max abs delta was about 3.0e-08.
          # This tolerance remains strict but does not fail on harmless text/float precision.
          COV_SYMMETRY_TOLERANCE = 1.0e-6

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a TAIRID cosmological model.",
              "This fixes the v3.12 numerical tolerance gate and rebuilds the same source-specific ingestion tables.",
              "A pass means the project can begin covariance-aware prototype construction from real files."
          ]

          URLS = {
              "pantheon_table": "https://raw.githubusercontent.com/PantheonPlusSH0ES/DataRelease/main/Pantheon%2B_Data/4_DISTANCES_AND_COVAR/Pantheon%2BSH0ES.dat",
              "pantheon_cov": "https://raw.githubusercontent.com/PantheonPlusSH0ES/DataRelease/main/Pantheon%2B_Data/4_DISTANCES_AND_COVAR/Pantheon%2BSH0ES_STAT%2BSYS.cov",
              "kids_tarball": "https://kids.strw.leidenuniv.nl/DR4/data_files/KiDS1000_cosmic_shear_data_release.tgz"
          }

          KIDS_STATS = ["xipm", "bp", "cosebis"]

          KIDS_PARAMETERS = [
              "COSMOLOGICAL_PARAMETERS--S_8",
              "COSMOLOGICAL_PARAMETERS--SIGMA_8",
              "COSMOLOGICAL_PARAMETERS--OMEGA_M",
              "cosmological_parameters--h0",
              "cosmological_parameters--omch2",
              "cosmological_parameters--ombh2",
              "cosmological_parameters--n_s",
              "cosmological_parameters--s_8_input",
              "halo_model_parameters--a",
              "intrinsic_alignment_parameters--a",
              "prior",
              "like",
              "post"
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def download(url, path, timeout=180):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.12.1-source-specific-ingestion/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed: HTTP {status}")
                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)
                  return {
                      "url": url,
                      "path": str(path),
                      "status": status,
                      "size_bytes": path.stat().st_size,
                      "content_type": resp.headers.get("Content-Type"),
                      "content_length_header": resp.headers.get("Content-Length")
                  }

          def safe_float(value):
              try:
                  x = float(value)
                  if math.isnan(x) or math.isinf(x):
                      return None
                  return x
              except Exception:
                  return None

          def weighted_quantile(values, weights, qs):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)
              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)

              values = values[mask]
              weights = weights[mask]

              if len(values) == 0:
                  return [None for _ in qs]

              if np.sum(weights) <= 0:
                  weights = np.ones_like(values)

              sorter = np.argsort(values)
              values = values[sorter]
              weights = weights[sorter]
              cumulative = np.cumsum(weights)
              cumulative = cumulative / cumulative[-1]

              return [float(np.interp(q, cumulative, values)) for q in qs]

          def parse_pantheon_table(path):
              with open(path, "r", encoding="utf-8", errors="replace") as f:
                  header = f.readline().strip().split()
                  rows = []
                  for line in f:
                      line = line.strip()
                      if not line:
                          continue
                      parts = line.split()
                      if len(parts) == len(header):
                          rows.append(dict(zip(header, parts)))

              required = [
                  "CID", "zHD", "zCMB", "zHEL",
                  "MU_SH0ES", "MU_SH0ES_ERR_DIAG",
                  "IS_CALIBRATOR", "USED_IN_SH0ES_HF"
              ]

              missing = [c for c in required if c not in header]

              normalized = []
              for i, row in enumerate(rows):
                  normalized.append({
                      "row_index": i,
                      "CID": row.get("CID"),
                      "zHD": safe_float(row.get("zHD")),
                      "zCMB": safe_float(row.get("zCMB")),
                      "zHEL": safe_float(row.get("zHEL")),
                      "MU_SH0ES": safe_float(row.get("MU_SH0ES")),
                      "MU_SH0ES_ERR_DIAG": safe_float(row.get("MU_SH0ES_ERR_DIAG")),
                      "IS_CALIBRATOR": int(float(row.get("IS_CALIBRATOR", 0))),
                      "USED_IN_SH0ES_HF": int(float(row.get("USED_IN_SH0ES_HF", 0)))
                  })

              return header, normalized, missing

          def parse_pantheon_covariance(path, n_expected):
              text = path.read_text(encoding="utf-8", errors="replace")
              arr = np.fromstring(text, sep=" ")

              if arr.size < 2:
                  raise RuntimeError("Pantheon covariance file did not parse into numeric values.")

              n = int(arr[0])
              values = arr[1:]

              if n != n_expected:
                  raise RuntimeError(f"Pantheon covariance dimension {n} does not match table rows {n_expected}.")

              if values.size != n * n:
                  raise RuntimeError(f"Pantheon covariance has {values.size} values after dimension; expected {n*n}.")

              cov = values.reshape((n, n))
              diag = np.diag(cov)
              symmetry_max_abs_delta = float(np.max(np.abs(cov - cov.T)))

              return {
                  "dimension": int(n),
                  "value_count": int(values.size),
                  "diag_min": float(np.min(diag)),
                  "diag_max": float(np.max(diag)),
                  "diag_mean": float(np.mean(diag)),
                  "diag_median": float(np.median(diag)),
                  "diag_positive_count": int(np.sum(diag > 0)),
                  "trace": float(np.trace(cov)),
                  "symmetry_max_abs_delta": symmetry_max_abs_delta,
                  "symmetry_tolerance_used": COV_SYMMETRY_TOLERANCE,
                  "symmetry_within_tolerance": symmetry_max_abs_delta <= COV_SYMMETRY_TOLERANCE,
                  "diag": diag
              }

          def write_pantheon_rows(rows, diag):
              path = OUTDIR / "pantheon_shoes_ingested_sn_rows.csv"
              with path.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "row_index", "CID", "zHD", "zCMB", "zHEL",
                      "MU_SH0ES", "MU_SH0ES_ERR_DIAG",
                      "COV_DIAG_VARIANCE", "COV_DIAG_SIGMA",
                      "IS_CALIBRATOR", "USED_IN_SH0ES_HF"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()

                  for row, var in zip(rows, diag):
                      out = dict(row)
                      out["COV_DIAG_VARIANCE"] = float(var)
                      out["COV_DIAG_SIGMA"] = float(math.sqrt(var)) if var >= 0 else None
                      writer.writerow(out)

              return path

          def write_pantheon_redshift_bins(rows, diag):
              bins = [
                  (0.0, 0.01),
                  (0.01, 0.023),
                  (0.023, 0.05),
                  (0.05, 0.10),
                  (0.10, 0.20),
                  (0.20, 0.50),
                  (0.50, 1.00),
                  (1.00, 2.50)
              ]

              path = OUTDIR / "pantheon_shoes_redshift_bin_summary.csv"

              with path.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "z_min", "z_max", "count",
                      "mean_zHD", "mean_MU_SH0ES",
                      "mean_diag_variance", "mean_diag_sigma",
                      "calibrator_count", "used_in_shoes_hf_count"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()

                  for lo, hi in bins:
                      selected = [
                          (row, float(diag[row["row_index"]]))
                          for row in rows
                          if row["zHD"] is not None and lo <= row["zHD"] < hi
                      ]

                      if not selected:
                          writer.writerow({"z_min": lo, "z_max": hi, "count": 0})
                          continue

                      zvals = [r["zHD"] for r, _ in selected if r["zHD"] is not None]
                      muvals = [r["MU_SH0ES"] for r, _ in selected if r["MU_SH0ES"] is not None]
                      vars_ = [v for _, v in selected]
                      sigmas = [math.sqrt(v) for v in vars_ if v >= 0]

                      writer.writerow({
                          "z_min": lo,
                          "z_max": hi,
                          "count": len(selected),
                          "mean_zHD": statistics.mean(zvals) if zvals else None,
                          "mean_MU_SH0ES": statistics.mean(muvals) if muvals else None,
                          "mean_diag_variance": statistics.mean(vars_) if vars_ else None,
                          "mean_diag_sigma": statistics.mean(sigmas) if sigmas else None,
                          "calibrator_count": sum(r["IS_CALIBRATOR"] for r, _ in selected),
                          "used_in_shoes_hf_count": sum(r["USED_IN_SH0ES_HF"] for r, _ in selected)
                      })

              return path

          def safe_extract_tar(tar_path):
              extract_dir = OUTDIR / "kids_1000_extracted"
              extract_dir.mkdir(parents=True, exist_ok=True)

              with tarfile.open(tar_path, "r:gz") as tf:
                  safe_members = []
                  for member in tf.getmembers():
                      target = (extract_dir / member.name).resolve()
                      if str(target).startswith(str(extract_dir.resolve())):
                          safe_members.append(member)
                  tf.extractall(extract_dir, members=safe_members)

              candidates = [
                  p for p in extract_dir.iterdir()
                  if p.is_dir() and "KiDS1000" in p.name and "shear_data_release" in p.name
              ]

              if not candidates:
                  raise RuntimeError("Could not find KiDS1000 extracted base directory.")

              return candidates[0]

          def read_chain_file(path):
              with open(path, "r", encoding="utf-8", errors="replace") as f:
                  first_line = f.readline().strip()

              if not first_line.startswith("#"):
                  raise RuntimeError(f"Chain file has no header line: {path}")

              header = first_line.replace("#", "").split()
              data = np.loadtxt(path, comments="#")

              if data.ndim == 1:
                  data = data.reshape((1, -1))

              if data.shape[1] != len(header):
                  raise RuntimeError(f"Chain column mismatch for {path}: data has {data.shape[1]}, header has {len(header)}")

              nsample = None
              with open(path, "r", encoding="utf-8", errors="replace") as f:
                  tail = f.readlines()[-10:]

              for line in tail:
                  m = re.search(r"#nsample\s*=\s*(\d+)", line)
                  if m:
                      nsample = int(m.group(1))

              if nsample is not None and 0 < nsample <= data.shape[0]:
                  data_used = data[-nsample:, :]
              else:
                  data_used = data

              return header, data, data_used, nsample

          def summarize_kids_chain(stat_name, path):
              header, data_all, data_used, nsample = read_chain_file(path)
              col = {name: i for i, name in enumerate(header)}

              if "weight" in col:
                  weights = data_used[:, col["weight"]]
              else:
                  weights = np.ones(data_used.shape[0])

              rows = []

              for param in KIDS_PARAMETERS:
                  if param not in col:
                      continue

                  values = data_used[:, col[param]]
                  q16, q50, q84 = weighted_quantile(values, weights, [0.16, 0.50, 0.84])

                  rows.append({
                      "statistic": stat_name,
                      "parameter": param,
                      "sample_rows_total": int(data_all.shape[0]),
                      "sample_rows_used": int(data_used.shape[0]),
                      "nsample_marker": nsample,
                      "weighted_mean": float(np.average(values, weights=weights)) if np.sum(weights) > 0 else float(np.mean(values)),
                      "weighted_q16": q16,
                      "weighted_q50": q50,
                      "weighted_q84": q84,
                      "min": float(np.min(values)),
                      "max": float(np.max(values))
                  })

              best_row = None
              if "post" in col:
                  post = data_used[:, col["post"]]
                  best_idx = int(np.argmax(post))
                  best_row = {
                      "statistic": stat_name,
                      "best_post_index": best_idx,
                      "best_post": float(data_used[best_idx, col["post"]]),
                      "best_like": float(data_used[best_idx, col["like"]]) if "like" in col else None,
                      "best_S8": float(data_used[best_idx, col["COSMOLOGICAL_PARAMETERS--S_8"]]) if "COSMOLOGICAL_PARAMETERS--S_8" in col else None,
                      "best_sigma8": float(data_used[best_idx, col["COSMOLOGICAL_PARAMETERS--SIGMA_8"]]) if "COSMOLOGICAL_PARAMETERS--SIGMA_8" in col else None,
                      "best_omega_m": float(data_used[best_idx, col["COSMOLOGICAL_PARAMETERS--OMEGA_M"]]) if "COSMOLOGICAL_PARAMETERS--OMEGA_M" in col else None,
                      "best_h0": float(data_used[best_idx, col["cosmological_parameters--h0"]]) if "cosmological_parameters--h0" in col else None
                  }

              file_summary = {
                  "statistic": stat_name,
                  "path": str(path),
                  "header_column_count": len(header),
                  "data_rows_total": int(data_all.shape[0]),
                  "data_rows_used": int(data_used.shape[0]),
                  "nsample_marker": nsample,
                  "has_weight": "weight" in col,
                  "has_S8": "COSMOLOGICAL_PARAMETERS--S_8" in col,
                  "has_sigma8": "COSMOLOGICAL_PARAMETERS--SIGMA_8" in col,
                  "has_omega_m": "COSMOLOGICAL_PARAMETERS--OMEGA_M" in col
              }

              return rows, best_row, file_summary

          def summarize_kids_fits(stat_name, path):
              rows = []

              with fits.open(path) as hdul:
                  for hdu in hdul:
                      ext_name = hdu.name
                      shape = None
                      row_count = None
                      column_names = []

                      if hdu.data is not None:
                          try:
                              shape = tuple(int(x) for x in hdu.data.shape)
                          except Exception:
                              shape = None

                          if hasattr(hdu.data, "columns"):
                              column_names = list(hdu.data.columns.names)
                              try:
                                  row_count = len(hdu.data)
                              except Exception:
                                  row_count = None

                      rows.append({
                          "statistic": stat_name,
                          "fits_file": path.name,
                          "extension": ext_name,
                          "hdu_type": type(hdu).__name__,
                          "shape": str(shape),
                          "row_count": row_count,
                          "column_names": ";".join(column_names[:30])
                      })

              return rows

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "v3_12_failure_diagnosis": {
                  "failure_type": "numerical_tolerance_gate_too_strict",
                  "old_symmetry_tolerance": 1.0e-8,
                  "new_symmetry_tolerance": COV_SYMMETRY_TOLERANCE
              },
              "downloads": {},
              "pantheon_summary": {},
              "kids_chain_file_summaries": [],
              "kids_summary": {},
              "gate_result": {}
          }

          print("TAIRID Cosmology v3.12.1 source-specific ingestion tolerance fix")
          print("Truth boundary: ingestion tables only; no model fit; no validation claim.")
          print()

          failed = []

          pantheon_dir = DOWNLOADS / "PantheonPlus_SH0ES"
          kids_dir = DOWNLOADS / "KiDS_1000"
          pantheon_dir.mkdir(parents=True, exist_ok=True)
          kids_dir.mkdir(parents=True, exist_ok=True)

          pantheon_table_path = pantheon_dir / "PantheonPlusSH0ES.dat"
          pantheon_cov_path = pantheon_dir / "PantheonPlusSH0ES_STAT_SYS.cov"
          kids_tar_path = kids_dir / "KiDS1000_cosmic_shear_data_release.tgz"

          try:
              inventory["downloads"]["pantheon_table"] = download(URLS["pantheon_table"], pantheon_table_path)
              inventory["downloads"]["pantheon_cov"] = download(URLS["pantheon_cov"], pantheon_cov_path)
              inventory["downloads"]["kids_tarball"] = download(URLS["kids_tarball"], kids_tar_path)
          except Exception as e:
              failed.append("download_failed")
              inventory["download_error"] = f"{type(e).__name__}: {e}"

          # Pantheon+SH0ES ingestion.
          try:
              header, pantheon_rows, missing = parse_pantheon_table(pantheon_table_path)
              cov_summary = parse_pantheon_covariance(pantheon_cov_path, len(pantheon_rows))
              diag = cov_summary.pop("diag")

              pantheon_rows_csv = write_pantheon_rows(pantheon_rows, diag)
              pantheon_bins_csv = write_pantheon_redshift_bins(pantheon_rows, diag)

              zvals = [r["zHD"] for r in pantheon_rows if r["zHD"] is not None]
              muvals = [r["MU_SH0ES"] for r in pantheon_rows if r["MU_SH0ES"] is not None]

              pantheon_pass = (
                  len(pantheon_rows) == cov_summary["dimension"]
                  and not missing
                  and cov_summary["diag_positive_count"] == cov_summary["dimension"]
                  and cov_summary["symmetry_within_tolerance"] is True
              )

              inventory["pantheon_summary"] = {
                  "surface": "reach_geometry",
                  "source": "PantheonPlus_SH0ES",
                  "row_count": len(pantheon_rows),
                  "header_column_count": len(header),
                  "required_columns_missing": missing,
                  "zHD_min": min(zvals),
                  "zHD_max": max(zvals),
                  "MU_SH0ES_min": min(muvals),
                  "MU_SH0ES_max": max(muvals),
                  "calibrator_count": sum(r["IS_CALIBRATOR"] for r in pantheon_rows),
                  "used_in_shoes_hf_count": sum(r["USED_IN_SH0ES_HF"] for r in pantheon_rows),
                  "covariance_summary": cov_summary,
                  "ingestion_tables": [
                      str(pantheon_rows_csv),
                      str(pantheon_bins_csv)
                  ],
                  "ingestion_pass": pantheon_pass
              }

              if not pantheon_pass:
                  failed.append("pantheon_ingestion_shape_gate_failed")

              print("Pantheon+SH0ES ingestion:")
              print(f"  rows: {len(pantheon_rows)}")
              print(f"  covariance dimension: {cov_summary['dimension']}")
              print(f"  covariance symmetry max abs delta: {cov_summary['symmetry_max_abs_delta']}")
              print(f"  symmetry tolerance used: {COV_SYMMETRY_TOLERANCE}")
              print(f"  pass: {pantheon_pass}")
              print()

          except Exception as e:
              failed.append("pantheon_ingestion_failed")
              inventory["pantheon_summary"] = {
                  "surface": "reach_geometry",
                  "source": "PantheonPlus_SH0ES",
                  "error": f"{type(e).__name__}: {e}",
                  "ingestion_pass": False
              }
              print(f"Pantheon+SH0ES ingestion failed: {type(e).__name__}: {e}")
              print()

          # KiDS-1000 ingestion.
          try:
              kids_base = safe_extract_tar(kids_tar_path)

              kids_parameter_rows = []
              kids_best_rows = []
              kids_fits_rows = []

              for stat in KIDS_STATS:
                  chain_path = kids_base / "chains_and_config_files" / "main_chains_iterative_covariance" / stat / "chain" / "output_multinest_C.txt"
                  if not chain_path.exists():
                      raise RuntimeError(f"Missing KiDS chain file: {chain_path}")

                  rows, best_row, chain_summary = summarize_kids_chain(stat, chain_path)
                  kids_parameter_rows.extend(rows)
                  if best_row:
                      kids_best_rows.append(best_row)
                  inventory["kids_chain_file_summaries"].append(chain_summary)

                  fits_candidates = sorted((kids_base / "data_fits").glob(f"{stat}_KIDS1000_*.fits"))
                  if not fits_candidates:
                      raise RuntimeError(f"Missing KiDS FITS file for {stat}")

                  kids_fits_rows.extend(summarize_kids_fits(stat, fits_candidates[0]))

              kids_param_csv = OUTDIR / "kids_1000_chain_parameter_summary.csv"
              with kids_param_csv.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "statistic", "parameter", "sample_rows_total", "sample_rows_used", "nsample_marker",
                      "weighted_mean", "weighted_q16", "weighted_q50", "weighted_q84",
                      "min", "max"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in kids_parameter_rows:
                      writer.writerow(row)

              kids_best_csv = OUTDIR / "kids_1000_best_posterior_summary.csv"
              with kids_best_csv.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "statistic", "best_post_index", "best_post", "best_like",
                      "best_S8", "best_sigma8", "best_omega_m", "best_h0"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in kids_best_rows:
                      writer.writerow(row)

              kids_fits_csv = OUTDIR / "kids_1000_fits_extension_summary.csv"
              with kids_fits_csv.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "statistic", "fits_file", "extension", "hdu_type",
                      "shape", "row_count", "column_names"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in kids_fits_rows:
                      writer.writerow(row)

              stats_with_s8 = sorted({
                  row["statistic"]
                  for row in kids_parameter_rows
                  if row["parameter"] == "COSMOLOGICAL_PARAMETERS--S_8"
              })

              stats_with_fits = sorted({
                  row["statistic"]
                  for row in kids_fits_rows
                  if row["extension"] != "PRIMARY"
              })

              kids_pass = (
                  sorted(stats_with_s8) == sorted(KIDS_STATS)
                  and len(kids_best_rows) == len(KIDS_STATS)
                  and sorted(stats_with_fits) == sorted(KIDS_STATS)
              )

              inventory["kids_summary"] = {
                  "surface": "consolidation_growth",
                  "source": "KiDS_1000",
                  "statistics": KIDS_STATS,
                  "parameter_summary_rows": len(kids_parameter_rows),
                  "best_posterior_rows": len(kids_best_rows),
                  "fits_extension_rows": len(kids_fits_rows),
                  "stats_with_S8": stats_with_s8,
                  "stats_with_fits_extensions": stats_with_fits,
                  "ingestion_tables": [
                      str(kids_param_csv),
                      str(kids_best_csv),
                      str(kids_fits_csv)
                  ],
                  "ingestion_pass": kids_pass
              }

              if not kids_pass:
                  failed.append("kids_ingestion_shape_gate_failed")

              print("KiDS-1000 ingestion:")
              print(f"  parameter summary rows: {len(kids_parameter_rows)}")
              print(f"  best-posterior rows: {len(kids_best_rows)}")
              print(f"  FITS extension rows: {len(kids_fits_rows)}")
              print(f"  stats with S8: {stats_with_s8}")
              print(f"  pass: {kids_pass}")
              print()

          except Exception as e:
              failed.append("kids_ingestion_failed")
              inventory["kids_summary"] = {
                  "surface": "consolidation_growth",
                  "source": "KiDS_1000",
                  "error": f"{type(e).__name__}: {e}",
                  "ingestion_pass": False
              }
              print(f"KiDS-1000 ingestion failed: {type(e).__name__}: {e}")
              print()

          pantheon_ok = inventory.get("pantheon_summary", {}).get("ingestion_pass") is True
          kids_ok = inventory.get("kids_summary", {}).get("ingestion_pass") is True

          if pantheon_ok and kids_ok:
              readiness_label = "source_specific_ingestion_tables_passed_ready_for_v3_13_covariance_aware_prototype"
          elif pantheon_ok and not kids_ok:
              readiness_label = "pantheon_ingestion_passed_kids_ingestion_needs_followup"
          elif kids_ok and not pantheon_ok:
              readiness_label = "kids_ingestion_passed_pantheon_ingestion_needs_followup"
          else:
              readiness_label = "source_specific_ingestion_failed_manual_followup_needed"

          inventory["gate_result"] = {
              "failed_gates": failed,
              "readiness_label": readiness_label,
              "pantheon_reach_ingestion_pass": pantheon_ok,
              "kids_growth_ingestion_pass": kids_ok,
              "model_claim_allowed": False,
              "next_allowed_step": (
                  "Build v3.13 covariance-aware prototype using Pantheon+SH0ES rows/covariance and KiDS-1000 S8 chain summaries."
                  if pantheon_ok and kids_ok
                  else "Use the uploaded artifact report to identify which source-specific ingestion gate failed before proceeding."
              )
          }

          json_path = OUTDIR / "tairid_cosmology_v3_12_1_source_specific_ingestion_tables.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          gate_csv = OUTDIR / "tairid_cosmology_v3_12_1_gate_summary.csv"
          with gate_csv.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(
                  f,
                  fieldnames=["source", "surface", "ingestion_pass", "main_rows", "secondary_rows", "notes"]
              )
              writer.writeheader()

              p = inventory.get("pantheon_summary", {})
              writer.writerow({
                  "source": "PantheonPlus_SH0ES",
                  "surface": "reach_geometry",
                  "ingestion_pass": pantheon_ok,
                  "main_rows": p.get("row_count"),
                  "secondary_rows": p.get("covariance_summary", {}).get("dimension"),
                  "notes": f"symmetry max delta={p.get('covariance_summary', {}).get('symmetry_max_abs_delta')}; tolerance={COV_SYMMETRY_TOLERANCE}"
              })

              k = inventory.get("kids_summary", {})
              writer.writerow({
                  "source": "KiDS_1000",
                  "surface": "consolidation_growth",
                  "ingestion_pass": kids_ok,
                  "main_rows": k.get("parameter_summary_rows"),
                  "secondary_rows": k.get("fits_extension_rows"),
                  "notes": f"stats with S8={k.get('stats_with_S8')}; best posterior rows={k.get('best_posterior_rows')}"
              })

          md = []
          md.append("# TAIRID Cosmology v3.12.1 — Source-Specific Ingestion Tolerance Fix")
          md.append("")
          md.append(f"Created UTC: `{inventory['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(failed) if failed else 'none'}`")
          md.append("")
          md.append("## v3.12 failure diagnosis")
          md.append("")
          md.append("v3.12 used a covariance symmetry tolerance of `1.0e-08`.")
          md.append("")
          md.append("The Pantheon+SH0ES covariance symmetry max absolute delta is small but can be about `3.0e-08`, so the gate was too tight for text/float precision.")
          md.append("")
          md.append(f"v3.12.1 uses `COV_SYMMETRY_TOLERANCE = {COV_SYMMETRY_TOLERANCE}`.")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## Results")
          md.append("")
          md.append("| Surface | Source | Ingestion pass | Main output | Secondary output |")
          md.append("|---|---|---:|---|---|")

          p = inventory.get("pantheon_summary", {})
          md.append(
              f"| reach_geometry | PantheonPlus_SH0ES | {pantheon_ok} | "
              f"{p.get('row_count')} SN rows | "
              f"{p.get('covariance_summary', {}).get('dimension')} covariance dimension |"
          )

          k = inventory.get("kids_summary", {})
          md.append(
              f"| consolidation_growth | KiDS_1000 | {kids_ok} | "
              f"{k.get('parameter_summary_rows')} chain-parameter rows | "
              f"{k.get('fits_extension_rows')} FITS extension rows |"
          )
          md.append("")
          md.append("## Interpretation")
          md.append("")
          md.append("A pass here means the source-specific ingestion step is repaired. It still does not test or validate TAIRID.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(inventory["gate_result"]["next_allowed_step"])
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `pantheon_shoes_ingested_sn_rows.csv`")
          md.append("- `pantheon_shoes_redshift_bin_summary.csv`")
          md.append("- `kids_1000_chain_parameter_summary.csv`")
          md.append("- `kids_1000_best_posterior_summary.csv`")
          md.append("- `kids_1000_fits_extension_summary.csv`")
          md.append("- `tairid_cosmology_v3_12_1_gate_summary.csv`")
          md.append("- `tairid_cosmology_v3_12_1_source_specific_ingestion_tables.json`")
          md.append("- `tairid_cosmology_v3_12_1_source_specific_ingestion_tables.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_12_1_source_specific_ingestion_tables.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.12.1 source-specific ingestion artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-12-1-source-specific-ingestion-tolerance-fix
          path: artifacts/tairid_cosmology_v3_12_1/
