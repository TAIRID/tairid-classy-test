name: TAIRID Cosmology v3.35 TDCOSMO Source Semantics Audit

on:
  workflow_dispatch:

jobs:
  tdcosmo-source-semantics-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scientific Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run TAIRID v3.35 TDCOSMO source semantics audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_35

          python - <<'PY'
          import csv
          import io
          import json
          import math
          import re
          import shutil
          import urllib.parse
          import urllib.request
          import zipfile
          from collections import Counter, defaultdict
          from datetime import datetime, timezone
          from pathlib import Path

          import numpy as np

          OUTDIR = Path("artifacts/tairid_cosmology_v3_35")
          DOWNLOADS = OUTDIR / "downloads"
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOADS.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_35_tdcosmo_source_semantics_audit"

          C_LIGHT_KM_S = 299792.458

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a cosmological model.",
              "This does not run a two-surface refit.",
              "This audits why TDCOSMO was positive while H0LiCOW was negative in v3.34.",
              "TDCOSMO rows remain diagnostic-only.",
              "H0LiCOW rows remain diagnostic-only.",
              "Source-specific pressure is not a failure and not a validation.",
              "Seed-table semantics, repeated redshift groups, missing Dd fields, and uncertainty compression are treated as source-product features to audit.",
              "No row may be promoted to model-anchor status in this workflow.",
              "A pass only means the time-delay lane is classified for the next eligibility/quarantine decision."
          ]

          PLANCK_ZIP_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
          PLANCK_MARGESTATS_PATH = "base/plikHM_TTTEEE_lowl_lowE/dist/base_plikHM_TTTEEE_lowl_lowE.margestats"

          TDCOSMO_TABLE_URL = "https://raw.githubusercontent.com/TDCOSMO/hierarchy_analysis_2020_public/master/TDLMC/tdlmc_rung3_posterior_table.csv"

          H0LICOW_RAW_BASE = "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/"

          H0LICOW_PRODUCTS = [
              {
                  "source": "H0LiCOW",
                  "family": "HE0435_1223",
                  "filename": "HE0435_Ddt_AO+HST.dat",
                  "z_lens": 0.4546,
                  "z_source": 1.693
              },
              {
                  "source": "H0LiCOW",
                  "family": "J1206_4332",
                  "filename": "J1206_final.csv",
                  "z_lens": 0.745,
                  "z_source": 1.789
              },
              {
                  "source": "H0LiCOW",
                  "family": "PG1115_080",
                  "filename": "PG1115_AO+HST_Dd_Ddt.dat",
                  "z_lens": 0.311,
                  "z_source": 1.722
              },
              {
                  "source": "H0LiCOW",
                  "family": "RXJ1131_1231",
                  "filename": "RXJ1131_AO+HST_Dd_Ddt.dat",
                  "z_lens": 0.295,
                  "z_source": 0.654
              },
              {
                  "source": "H0LiCOW",
                  "family": "WFI2033_4723",
                  "filename": "wfi2033_dt_bic.dat",
                  "z_lens": 0.6575,
                  "z_source": 1.662
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def safe_name(url_or_name):
              name = url_or_name.split("?")[0].rstrip("/").split("/")[-1]
              name = re.sub(r"[^A-Za-z0-9._-]+", "_", name)
              return name or "downloaded_product"

          def download(url, path, timeout=300):
              path.parent.mkdir(parents=True, exist_ok=True)
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.35-tdcosmo-source-semantics-audit/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed: HTTP {status}")
                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)
                  return {
                      "url": url,
                      "path": str(path),
                      "status": status,
                      "size_bytes": path.stat().st_size,
                      "content_type": resp.headers.get("Content-Type"),
                      "content_length_header": resp.headers.get("Content-Length")
                  }

          def parse_float_or_none(value):
              if value is None:
                  return None
              text = str(value).strip()
              if text in ["", "-", "--", "nan", "NaN", "NAN", "None", "null"]:
                  return None
              try:
                  x = float(text)
              except Exception:
                  return None
              if not math.isfinite(x):
                  return None
              return x

          def parse_planck_margestats(text):
              rows = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("Marginalized") or stripped.startswith("parameter"):
                      continue
                  parts = stripped.split()
                  if len(parts) < 12:
                      continue
                  name_raw = parts[0]
                  name = name_raw.rstrip("*")
                  try:
                      rows.append({
                          "parameter_raw": name_raw,
                          "parameter": name,
                          "mean": float(parts[1]),
                          "sddev": float(parts[2]),
                          "label": " ".join(parts[12:]) if len(parts) > 12 else ""
                      })
                  except Exception:
                      continue
              return rows

          def load_planck_reference():
              planck_dir = DOWNLOADS / "Planck_2018"
              zip_path = planck_dir / "COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
              download(PLANCK_ZIP_URL, zip_path)

              with zipfile.ZipFile(zip_path, "r") as zf:
                  if PLANCK_MARGESTATS_PATH not in zf.namelist():
                      raise RuntimeError(f"Missing Planck margestats product: {PLANCK_MARGESTATS_PATH}")
                  text = zf.read(PLANCK_MARGESTATS_PATH).decode("utf-8", errors="replace")

              marg = {r["parameter"]: r for r in parse_planck_margestats(text)}
              required = ["H0", "omegam", "rdrag"]
              missing = [p for p in required if p not in marg]
              if missing:
                  raise RuntimeError(f"Missing Planck reference parameters: {missing}")

              return {
                  "H0": float(marg["H0"]["mean"]),
                  "omegam": float(marg["omegam"]["mean"]),
                  "rdrag": float(marg["rdrag"]["mean"])
              }

          def E_z(z, omega_m):
              return math.sqrt(omega_m * (1.0 + z) ** 3 + (1.0 - omega_m))

          def comoving_distance_mpc(z, h0, omega_m):
              if z <= 0:
                  return 0.0

              n = 2000
              if n % 2:
                  n += 1

              xs = np.linspace(0.0, z, n + 1)
              ys = np.array([1.0 / E_z(float(x), omega_m) for x in xs])
              h = z / n

              integral = h / 3.0 * (
                  ys[0]
                  + ys[-1]
                  + 4.0 * np.sum(ys[1:-1:2])
                  + 2.0 * np.sum(ys[2:-2:2])
              )

              return C_LIGHT_KM_S / h0 * integral

          def angular_diameter_distance_mpc(z, h0, omega_m):
              return comoving_distance_mpc(z, h0, omega_m) / (1.0 + z)

          def angular_diameter_between_mpc(z_lens, z_source, h0, omega_m):
              if z_source <= z_lens:
                  return None
              dc_lens = comoving_distance_mpc(z_lens, h0, omega_m)
              dc_source = comoving_distance_mpc(z_source, h0, omega_m)
              return (dc_source - dc_lens) / (1.0 + z_source)

          def reference_ddt_mpc(z_lens, z_source, planck):
              d_l = angular_diameter_distance_mpc(z_lens, planck["H0"], planck["omegam"])
              d_s = angular_diameter_distance_mpc(z_source, planck["H0"], planck["omegam"])
              d_ls = angular_diameter_between_mpc(z_lens, z_source, planck["H0"], planck["omegam"])
              if d_ls is None or d_ls <= 0:
                  return None
              return (1.0 + z_lens) * d_l * d_s / d_ls

          def implied_h0_fixed_omegam(observed_ddt, reference_ddt, planck_h0):
              if observed_ddt is None or reference_ddt is None or observed_ddt <= 0:
                  return None
              return planck_h0 * reference_ddt / observed_ddt

          def weighted_quantile(values, weights, qs):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)

              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)
              values = values[mask]
              weights = weights[mask]

              if len(values) == 0:
                  return [None for _ in qs]

              if np.sum(weights) <= 0:
                  weights = np.ones_like(values)

              order = np.argsort(values)
              values = values[order]
              weights = weights[order]
              cumulative = np.cumsum(weights)
              cumulative = cumulative / cumulative[-1]

              return [float(np.interp(q, cumulative, values)) for q in qs]

          def summarize_distribution(values, weights=None):
              values = np.asarray(values, dtype=float)
              if weights is None:
                  weights = np.ones_like(values)
              else:
                  weights = np.asarray(weights, dtype=float)

              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)
              values = values[mask]
              weights = weights[mask]

              if len(values) == 0:
                  raise RuntimeError("No finite values available for distribution summary.")

              q16, q50, q84 = weighted_quantile(values, weights, [0.16, 0.50, 0.84])
              sigma = (q84 - q16) / 2.0 if q16 is not None and q84 is not None else None

              return {
                  "mean": float(np.average(values, weights=weights)) if np.sum(weights) > 0 else float(np.mean(values)),
                  "q16": q16,
                  "q50": q50,
                  "q84": q84,
                  "sigma": sigma,
                  "row_count": int(len(values)),
                  "min": float(np.min(values)),
                  "max": float(np.max(values))
              }

          def tokenize_line(line):
              return [t for t in re.split(r"[\s,;]+", line.strip()) if t]

          def parse_numeric_table(path):
              text = path.read_text(encoding="utf-8", errors="replace")
              header_tokens = []
              rows = []

              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if not line:
                      continue

                  if line.startswith("#"):
                      candidate = line.lstrip("#").strip()
                      tokens = tokenize_line(candidate)
                      if tokens and not header_tokens:
                          numeric_count = sum(1 for t in tokens if parse_float_or_none(t) is not None)
                          if numeric_count < len(tokens):
                              header_tokens = tokens
                      continue

                  tokens = tokenize_line(line)
                  floats = []
                  numeric_count = 0

                  for token in tokens:
                      x = parse_float_or_none(token)
                      if x is not None:
                          floats.append(x)
                          numeric_count += 1

                  if numeric_count >= 1:
                      rows.append(floats)
                  elif tokens and not header_tokens:
                      header_tokens = tokens

              if not rows:
                  raise RuntimeError(f"No numeric rows found in {path}")

              lengths = [len(r) for r in rows]
              common_len = Counter(lengths).most_common(1)[0][0]
              clean_rows = [r for r in rows if len(r) == common_len]

              if len(clean_rows) < 5:
                  raise RuntimeError(f"Too few clean numeric rows in {path}")

              data = np.asarray(clean_rows, dtype=float)
              return header_tokens, data

          def infer_ddt_and_weight_columns(header_tokens, data):
              ncols = data.shape[1]
              ddt_idx = None
              weight_idx = None

              if header_tokens and len(header_tokens) == ncols:
                  lowered = [h.lower() for h in header_tokens]
                  for i, name in enumerate(lowered):
                      if "ddt" in name or "d_dt" in name or "deltat" in name:
                          ddt_idx = i
                          break
                  for i, name in enumerate(lowered):
                      if any(term in name for term in ["weight", "prob", "pdf", "like"]):
                          weight_idx = i
                          break

              if ddt_idx is None:
                  candidates = []
                  for i in range(ncols):
                      col = data[:, i]
                      finite = col[np.isfinite(col)]
                      if len(finite) == 0:
                          continue
                      med = float(np.median(finite))
                      if 100.0 <= med <= 50000.0:
                          candidates.append((i, med))

                  if not candidates:
                      raise RuntimeError("Could not infer a Ddt-like distance column.")

                  ddt_idx = sorted(candidates, key=lambda x: x[1], reverse=True)[0][0]

              if weight_idx is None and ncols >= 2:
                  possible_weight_cols = []
                  for i in range(ncols):
                      if i == ddt_idx:
                          continue
                      col = data[:, i]
                      finite = col[np.isfinite(col)]
                      if len(finite) == 0:
                          continue
                      if np.all(finite >= 0):
                          med = float(np.median(finite))
                          maxv = float(np.max(finite))
                          if med < 100.0 and maxv > 0:
                              possible_weight_cols.append((i, med, maxv))

                  if possible_weight_cols:
                      weight_idx = sorted(possible_weight_cols, key=lambda x: x[1])[0][0]

              return ddt_idx, weight_idx

          def load_h0licow_rows(planck):
              outdir = DOWNLOADS / "H0LiCOW"
              outdir.mkdir(parents=True, exist_ok=True)

              rows = []
              source_rows = []
              skipped_rows = []

              for product in H0LICOW_PRODUCTS:
                  quoted = urllib.parse.quote(product["filename"], safe="")
                  url = H0LICOW_RAW_BASE + quoted
                  path = outdir / safe_name(product["filename"])

                  try:
                      dl = download(url, path)
                      header_tokens, data = parse_numeric_table(path)
                      ddt_idx, weight_idx = infer_ddt_and_weight_columns(header_tokens, data)

                      ddt_values = data[:, ddt_idx]
                      unit_adjustment = "none"

                      if np.nanmedian(ddt_values) < 100.0:
                          ddt_values = ddt_values * 1000.0
                          unit_adjustment = "gpc_to_mpc_assumption"

                      weights = data[:, weight_idx] if weight_idx is not None else np.ones_like(ddt_values)
                      summary = summarize_distribution(ddt_values, weights)

                      reference = reference_ddt_mpc(product["z_lens"], product["z_source"], planck)
                      pressure_z = None
                      pressure_sign = "unmapped"
                      finite_pressure = False

                      if reference is not None and summary["sigma"] is not None and summary["sigma"] > 0:
                          pressure_z = (summary["q50"] - reference) / summary["sigma"]
                          pressure_sign = "positive" if pressure_z > 0 else "negative" if pressure_z < 0 else "zero"
                          finite_pressure = math.isfinite(pressure_z)

                      implied_h0 = implied_h0_fixed_omegam(summary["q50"], reference, planck["H0"])

                      rows.append({
                          "source": "H0LiCOW",
                          "time_delay_lane": "h0licow_named_lens_posterior",
                          "family": product["family"],
                          "filename": product["filename"],
                          "z_lens": product["z_lens"],
                          "z_source": product["z_source"],
                          "name_semantics": "named_lens_product",
                          "standardized_observable": "Ddt_time_delay_distance",
                          "value_q16": summary["q16"],
                          "value_q50": summary["q50"],
                          "value_q84": summary["q84"],
                          "sigma": summary["sigma"],
                          "sample_count": summary["row_count"],
                          "reference_value": reference if reference is not None else "",
                          "pressure_z": pressure_z if pressure_z is not None else "",
                          "pressure_sign": pressure_sign,
                          "finite_pressure": finite_pressure,
                          "implied_H0_fixed_omegam": implied_h0 if implied_h0 is not None else "",
                          "ddt_column_index": ddt_idx,
                          "weight_column_index": weight_idx if weight_idx is not None else "",
                          "numeric_shape": f"{data.shape[0]}x{data.shape[1]}",
                          "unit_adjustment": unit_adjustment,
                          "included_in_model": False,
                          "model_anchor_allowed_now": False,
                          "diagnostic_only": True,
                          "boundary_note": "H0LiCOW named-lens Ddt posterior. Diagnostic only."
                      })

                      source_rows.append({
                          "source": "H0LiCOW",
                          "family": product["family"],
                          "downloaded": True,
                          "mapped": finite_pressure,
                          "file_size_bytes": dl["size_bytes"],
                          "numeric_shape": f"{data.shape[0]}x{data.shape[1]}",
                          "ddt_column_index": ddt_idx,
                          "weight_column_index": weight_idx if weight_idx is not None else "",
                          "unit_adjustment": unit_adjustment,
                          "error": ""
                      })

                  except Exception as e:
                      skipped_rows.append({
                          "source": "H0LiCOW",
                          "family": product["family"],
                          "filename": product["filename"],
                          "reason": f"{type(e).__name__}: {e}"
                      })
                      source_rows.append({
                          "source": "H0LiCOW",
                          "family": product["family"],
                          "downloaded": False,
                          "mapped": False,
                          "file_size_bytes": "",
                          "numeric_shape": "",
                          "ddt_column_index": "",
                          "weight_column_index": "",
                          "unit_adjustment": "",
                          "error": f"{type(e).__name__}: {e}"
                      })

              return rows, source_rows, skipped_rows

          def load_tdcosmo_rows(planck):
              td_dir = DOWNLOADS / "TDCOSMO_2020"
              td_dir.mkdir(parents=True, exist_ok=True)
              table_path = td_dir / safe_name(TDCOSMO_TABLE_URL)
              download(TDCOSMO_TABLE_URL, table_path)

              with table_path.open("r", encoding="utf-8", errors="replace", newline="") as f:
                  reader = csv.DictReader(f)
                  table_rows = list(reader)
                  fieldnames = reader.fieldnames or []

              required = ["name", "z_lens", "z_source", "Ddt_mean", "Ddt_sigma", "Dd_mean", "Dd_sigma", "flag"]
              missing = [c for c in required if c not in fieldnames]
              if missing:
                  raise RuntimeError(f"TDCOSMO posterior table missing columns: {missing}")

              rows = []
              skipped = []
              all_row_semantics = []
              missing_dd_count = 0
              seed_like_count = 0

              for i, row in enumerate(table_rows):
                  name = row.get("name", f"row_{i}")
                  is_seed_like = bool(re.match(r"^seed\d+$", str(name)))
                  if is_seed_like:
                      seed_like_count += 1

                  flag = parse_float_or_none(row.get("flag"))
                  z_lens = parse_float_or_none(row.get("z_lens"))
                  z_source = parse_float_or_none(row.get("z_source"))
                  ddt_mean = parse_float_or_none(row.get("Ddt_mean"))
                  ddt_sigma = parse_float_or_none(row.get("Ddt_sigma"))
                  dd_mean = parse_float_or_none(row.get("Dd_mean"))
                  dd_sigma = parse_float_or_none(row.get("Dd_sigma"))

                  if dd_mean is None or dd_sigma is None:
                      missing_dd_count += 1

                  all_row_semantics.append({
                      "source": "TDCOSMO_2020",
                      "name": name,
                      "row_index": i,
                      "is_seed_like": is_seed_like,
                      "z_lens": z_lens if z_lens is not None else "",
                      "z_source": z_source if z_source is not None else "",
                      "Ddt_mean_present": ddt_mean is not None,
                      "Ddt_sigma_present": ddt_sigma is not None,
                      "Dd_mean_present": dd_mean is not None,
                      "Dd_sigma_present": dd_sigma is not None,
                      "flag": flag if flag is not None else "",
                      "boundary_note": "TDCOSMO table-row semantics audit."
                  })

                  if flag is not None and flag < 0:
                      skipped.append({
                          "source": "TDCOSMO_2020",
                          "name": name,
                          "row_index": i,
                          "reason": "negative_flag",
                          "flag": row.get("flag")
                      })
                      continue

                  if z_lens is None or z_source is None or ddt_mean is None or ddt_sigma is None or ddt_sigma <= 0:
                      skipped.append({
                          "source": "TDCOSMO_2020",
                          "name": name,
                          "row_index": i,
                          "reason": "missing_or_invalid_Ddt_fields",
                          "flag": row.get("flag")
                      })
                      continue

                  reference = reference_ddt_mpc(z_lens, z_source, planck)
                  pressure_z = None
                  pressure_sign = "unmapped"
                  finite_pressure = False

                  if reference is not None and ddt_sigma > 0:
                      pressure_z = (ddt_mean - reference) / ddt_sigma
                      pressure_sign = "positive" if pressure_z > 0 else "negative" if pressure_z < 0 else "zero"
                      finite_pressure = math.isfinite(pressure_z)

                  implied_h0 = implied_h0_fixed_omegam(ddt_mean, reference, planck["H0"])

                  rows.append({
                      "source": "TDCOSMO_2020",
                      "time_delay_lane": "tdcosmo_seed_table",
                      "family": "TDCOSMO_time_delay",
                      "lens_name": name,
                      "row_index": i,
                      "name_semantics": "seed_table_row" if is_seed_like else "non_seed_row",
                      "z_lens": z_lens,
                      "z_source": z_source,
                      "redshift_group": f"{z_lens:.4f}_{z_source:.4f}",
                      "standardized_observable": "Ddt_time_delay_distance",
                      "value_q16": "",
                      "value_q50": ddt_mean,
                      "value_q84": "",
                      "sigma": ddt_sigma,
                      "sample_count": 1,
                      "reference_value": reference if reference is not None else "",
                      "pressure_z": pressure_z if pressure_z is not None else "",
                      "pressure_sign": pressure_sign,
                      "finite_pressure": finite_pressure,
                      "implied_H0_fixed_omegam": implied_h0 if implied_h0 is not None else "",
                      "tdcosmo_flag": flag if flag is not None else "",
                      "Dd_mean_present": dd_mean is not None,
                      "Dd_sigma_present": dd_sigma is not None,
                      "included_in_model": False,
                      "model_anchor_allowed_now": False,
                      "diagnostic_only": True,
                      "boundary_note": "TDCOSMO seed-table Ddt row. Diagnostic only."
                  })

              return {
                  "valid_rows": rows,
                  "skipped_rows": skipped,
                  "all_row_semantics": all_row_semantics,
                  "table_row_count": len(table_rows),
                  "missing_Dd_field_count": missing_dd_count,
                  "seed_like_count": seed_like_count
              }

          def summarize_rows(rows, lane_name):
              finite = [r for r in rows if r.get("finite_pressure") is True]
              pressures = [float(r["pressure_z"]) for r in finite]
              implied_h0 = [
                  float(r["implied_H0_fixed_omegam"])
                  for r in finite
                  if str(r.get("implied_H0_fixed_omegam", "")) not in ["", "nan"]
              ]

              return {
                  "lane": lane_name,
                  "row_count": len(rows),
                  "finite_pressure_count": len(finite),
                  "mean_pressure_z": float(np.mean(pressures)) if pressures else "",
                  "median_pressure_z": float(np.median(pressures)) if pressures else "",
                  "min_pressure_z": float(np.min(pressures)) if pressures else "",
                  "max_pressure_z": float(np.max(pressures)) if pressures else "",
                  "positive_count": sum(1 for p in pressures if p > 0),
                  "negative_count": sum(1 for p in pressures if p < 0),
                  "large_abs_gt_5_count": sum(1 for p in pressures if abs(p) > 5.0),
                  "extreme_abs_gt_10_count": sum(1 for p in pressures if abs(p) > 10.0),
                  "mean_implied_H0_fixed_omegam": float(np.mean(implied_h0)) if implied_h0 else "",
                  "median_implied_H0_fixed_omegam": float(np.median(implied_h0)) if implied_h0 else "",
                  "min_implied_H0_fixed_omegam": float(np.min(implied_h0)) if implied_h0 else "",
                  "max_implied_H0_fixed_omegam": float(np.max(implied_h0)) if implied_h0 else "",
                  "sign_from_mean": "positive" if pressures and float(np.mean(pressures)) > 0 else "negative" if pressures and float(np.mean(pressures)) < 0 else "unmapped",
                  "model_anchor_allowed": False,
                  "boundary_note": "Lane-level source semantics summary only."
              }

          def summarize_tdcosmo_clusters(td_rows):
              grouped = defaultdict(list)
              for row in td_rows:
                  grouped[row["redshift_group"]].append(row)

              out = []
              for group, rows in sorted(grouped.items()):
                  pressures = [float(r["pressure_z"]) for r in rows if r.get("finite_pressure") is True]
                  sigmas = [float(r["sigma"]) for r in rows]
                  implied = [
                      float(r["implied_H0_fixed_omegam"])
                      for r in rows
                      if str(r.get("implied_H0_fixed_omegam", "")) not in ["", "nan"]
                  ]

                  out.append({
                      "redshift_group": group,
                      "z_lens": rows[0]["z_lens"],
                      "z_source": rows[0]["z_source"],
                      "row_count": len(rows),
                      "mean_pressure_z": float(np.mean(pressures)) if pressures else "",
                      "median_pressure_z": float(np.median(pressures)) if pressures else "",
                      "min_pressure_z": float(np.min(pressures)) if pressures else "",
                      "max_pressure_z": float(np.max(pressures)) if pressures else "",
                      "mean_sigma": float(np.mean(sigmas)) if sigmas else "",
                      "min_sigma": float(np.min(sigmas)) if sigmas else "",
                      "max_sigma": float(np.max(sigmas)) if sigmas else "",
                      "mean_implied_H0_fixed_omegam": float(np.mean(implied)) if implied else "",
                      "median_implied_H0_fixed_omegam": float(np.median(implied)) if implied else "",
                      "positive_count": sum(1 for p in pressures if p > 0),
                      "negative_count": sum(1 for p in pressures if p < 0),
                      "boundary_note": "Repeated redshift-group semantics check; not a model fit."
                  })

              return out

          inventory = {
