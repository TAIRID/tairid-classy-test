name: 000 TAIRID v4.113 Observed RSD Covariance Bridge Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-113-observed-rsd-covariance-bridge-design.yml"

jobs:
  tairid-v4-113-observed-rsd-covariance-bridge-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.113 observed RSD covariance bridge design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_113_observed_rsd_covariance_bridge_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_113_observed_rsd_covariance_bridge_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_113_observed_rsd_covariance_bridge_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new weighted mean values.",
              "This does not compute a new covariance matrix.",
              "This does not compute observed RSD pressure.",
              "This designs the observed RSD covariance bridge after the regularized reference covariance became bridge-ready but not final.",
              "A pass means the observed-vector order, covariance formula, source-family boundaries, and sensitivity lanes are specified for the next probe."
          ]

          UPSTREAM_LOCKS = {
              "v4_112_regularized_covariance_sufficiency_gate": {
                  "readiness_label": "regularized_covariance_sufficiency_gate_passed_bridge_ready_not_final_ready_for_observed_RSD_covariance_bridge_design",
                  "regularized_covariance_bridge_ready": True,
                  "final_reference_uncertainty_sufficient": False,
                  "final_RSD_pressure_allowed": False,
                  "condition_number_high": True,
                  "observed_RSD_covariance_bridge_required": True,
                  "upstream_sample_output_vector_count": 1024,
                  "upstream_effective_sample_size": 624.5301884527668,
                  "full_regularized_rank_after": 10,
                  "fsigma8_regularized_rank_after": 5,
                  "full_regularized_condition_number_after": 100000000.0,
                  "fsigma8_regularized_condition_number_after": 100000000.0,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_111_1_regularized_reference_covariance_probe_variable_scope_repair": {
                  "readiness_label": "regularized_reference_covariance_probe_passed_ready_for_regularized_covariance_sufficiency_gate",
                  "regularized_covariance_matrix_computed": True,
                  "regularized_inverse_computed": True,
                  "pseudoinverse_comparison_computed": True,
                  "full_regularized_rank_after": 10,
                  "fsigma8_regularized_rank_after": 5,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          TARGET_VECTOR_ORDER = [
              {
                  "position": 0,
                  "z": 0.15,
                  "quantity": "fsigma8",
                  "reference_target_name": "fsigma8z015",
                  "observed_slot": "observed_fsigma8_z015",
                  "preferred_observed_family": "low_z_growth_anchor",
                  "design_status": "locked_for_next_probe"
              },
              {
                  "position": 1,
                  "z": 0.38,
                  "quantity": "fsigma8",
                  "reference_target_name": "fsigma8z038",
                  "observed_slot": "observed_fsigma8_z038",
                  "preferred_observed_family": "BOSS_DR12_consensus_like",
                  "design_status": "locked_for_next_probe"
              },
              {
                  "position": 2,
                  "z": 0.51,
                  "quantity": "fsigma8",
                  "reference_target_name": "fsigma8z051",
                  "observed_slot": "observed_fsigma8_z051",
                  "preferred_observed_family": "BOSS_DR12_consensus_like",
                  "design_status": "locked_for_next_probe"
              },
              {
                  "position": 3,
                  "z": 0.61,
                  "quantity": "fsigma8",
                  "reference_target_name": "fsigma8z061",
                  "observed_slot": "observed_fsigma8_z061",
                  "preferred_observed_family": "BOSS_DR12_consensus_like",
                  "design_status": "locked_for_next_probe"
              },
              {
                  "position": 4,
                  "z": 2.33,
                  "quantity": "fsigma8",
                  "reference_target_name": "fsigma8z233",
                  "observed_slot": "observed_fsigma8_z233",
                  "preferred_observed_family": "high_z_LyA_or_equivalent_growth_anchor",
                  "design_status": "locked_for_next_probe"
              }
          ]

          OBSERVED_RSD_BRIDGE_FORMULAS = [
              {
                  "formula_id": "residual_vector",
                  "symbolic_formula": "d = f_sigma8_observed - mu_reference_regularized",
                  "plain_language": "Difference between observed fσ8 values and the regularized Planck-reference fσ8 mean vector.",
                  "computed_now": False
              },
              {
                  "formula_id": "total_covariance",
                  "symbolic_formula": "C_total = C_observed + C_reference_regularized",
                  "plain_language": "Observed covariance plus regularized reference covariance, aligned in the same redshift/vector order.",
                  "computed_now": False
              },
              {
                  "formula_id": "diagnostic_pressure_chisq",
                  "symbolic_formula": "chi2 = d^T C_total_inverse d",
                  "plain_language": "Guarded diagnostic pressure against the regularized reference mean, not a final validation score.",
                  "computed_now": False
              },
              {
                  "formula_id": "diagnostic_pressure_z",
                  "symbolic_formula": "pressure_z = sign(mean(d)) * sqrt(max(chi2 - dof, 0))",
                  "plain_language": "Optional signed diagnostic pressure summary; must be sensitivity-audited before any stronger interpretation.",
                  "computed_now": False
              },
              {
                  "formula_id": "sensitivity_delta",
                  "symbolic_formula": "delta_pressure = pressure_primary - pressure_sensitivity_lane",
                  "plain_language": "Difference between primary eigen-floor route and pseudoinverse or diagonal-guard route.",
                  "computed_now": False
              }
          ]

          OBSERVED_COVARIANCE_POLICY = [
              {
                  "policy_id": "source_provided_covariance_preferred",
                  "requirement": "Use source-provided covariance when available for a matched observed vector.",
                  "reason": "Published covariance preserves correlations better than diagonal-only assumptions."
              },
              {
                  "policy_id": "diagonal_fallback_declared",
                  "requirement": "If source covariance is unavailable, diagonal fallback must be explicitly labeled as fallback, not full covariance.",
                  "reason": "Diagonal fallback underestimates or misstates correlation structure."
              },
              {
                  "policy_id": "redshift_order_lock",
                  "requirement": "Observed vector must be sorted and mapped to the exact reference order: 0.15, 0.38, 0.51, 0.61, 2.33.",
                  "reason": "A covariance bridge fails if rows/columns are misaligned."
              },
              {
                  "policy_id": "family_boundary_record",
                  "requirement": "Each observed point must preserve survey/source family, citation field, and whether it is independent or overlapping.",
                  "reason": "Repeated or overlapping measurements can fake evidence strength."
              },
              {
                  "policy_id": "total_covariance_lock",
                  "requirement": "Next probe must compute C_total = C_observed + C_reference_regularized before any residual pressure.",
                  "reason": "Pressure requires both observed uncertainty and reference uncertainty."
              },
              {
                  "policy_id": "regularization_sensitivity_required",
                  "requirement": "Next probe must compare primary eigen-floor inverse with pseudoinverse comparison and a conservative guard lane.",
                  "reason": "The reference covariance condition number is high."
              },
              {
                  "policy_id": "claim_boundary",
                  "requirement": "The bridge may compute diagnostic pressure but must not call it final RSD pressure or TAIRID validation.",
                  "reason": "This is still a guarded diagnostic pipeline."
              }
          ]

          NEXT_PROBE_INPUT_SCHEMA = [
              {"field": "position", "required": True, "purpose": "Index in the 5-vector."},
              {"field": "z", "required": True, "purpose": "Observed/reference redshift."},
              {"field": "observed_fsigma8", "required": True, "purpose": "Observed fσ8 value."},
              {"field": "observed_sigma", "required": True, "purpose": "Published one-sigma uncertainty or diagonal fallback uncertainty."},
              {"field": "source_family", "required": True, "purpose": "Survey/source family label."},
              {"field": "source_label", "required": True, "purpose": "Human-readable source label."},
              {"field": "covariance_source_status", "required": True, "purpose": "source_covariance, diagonal_fallback, or covariance_model."},
              {"field": "independence_warning", "required": True, "purpose": "Records overlap/duplication concerns."},
              {"field": "included_in_primary_bridge", "required": True, "purpose": "Whether this point is included in the primary bridge route."}
          ]

          SENSITIVITY_LANES_FOR_NEXT_PROBE = [
              {
                  "lane_id": "primary_eigen_floor_reference_plus_observed",
                  "description": "Use regularized reference covariance from eigen-floor policy plus observed covariance.",
                  "required_next": True,
                  "claim_scope": "guarded diagnostic pressure only"
              },
              {
                  "lane_id": "pseudoinverse_reference_plus_observed",
                  "description": "Use pseudoinverse comparison lane from reference covariance plus observed covariance.",
                  "required_next": True,
                  "claim_scope": "sensitivity comparison only"
              },
              {
                  "lane_id": "diagonal_observed_fallback_guard",
                  "description": "Use diagonal observed uncertainty fallback when no observed covariance is available.",
                  "required_next": True,
                  "claim_scope": "conservative fallback, not full covariance"
              },
              {
                  "lane_id": "reference_only_regularization_sensitivity",
                  "description": "Compare pressure sensitivity to the reference covariance regularization choice.",
                  "required_next": True,
                  "claim_scope": "regularization dependence audit"
              }
          ]

          QUALITY_GATES_FOR_NEXT_PROBE = [
              {
                  "gate_id": "observed_vector_complete",
                  "requirement": "Five observed fσ8 slots must be populated or explicitly parked with a failed bridge gate.",
                  "failure_action": "Do not compute bridge pressure."
              },
              {
                  "gate_id": "reference_vector_available",
                  "requirement": "Regularized reference fσ8 mean vector and covariance must be available from v4.111.1 artifacts or rebuilt internally.",
                  "failure_action": "Do not compute bridge pressure."
              },
              {
                  "gate_id": "covariance_alignment",
                  "requirement": "Observed covariance and reference covariance must have the same 5x5 redshift order.",
                  "failure_action": "Fail bridge probe."
              },
              {
                  "gate_id": "total_covariance_positive_definite_or_regularized",
                  "requirement": "C_total must be invertible or have a declared pseudoinverse/sensitivity route.",
                  "failure_action": "Fail bridge probe."
              },
              {
                  "gate_id": "sensitivity_lanes_reported",
                  "requirement": "Primary, pseudoinverse, and diagonal-fallback sensitivity lanes must be reported.",
                  "failure_action": "Fail bridge probe."
              },
              {
                  "gate_id": "condition_warning_carried",
                  "requirement": "High condition number from v4.112 must be carried into the bridge output.",
                  "failure_action": "Fail claim-boundary gate."
              },
              {
                  "gate_id": "final_claims_blocked",
                  "requirement": "The bridge probe must not call diagnostic pressure final RSD pressure or TAIRID validation.",
                  "failure_action": "Fail claim-boundary gate."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "Observed RSD covariance was computed in v4.113.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The observed RSD covariance bridge design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The next bridge pressure will be final.",
              "Regularized reference covariance alone is enough for final pressure.",
              "Diagonal fallback is the same as full observed covariance.",
              "The bridge design proves the model."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_114_observed_RSD_covariance_bridge_probe",
                  "purpose": "Populate the observed RSD vector/covariance, combine it with the regularized reference covariance, and compute a guarded diagnostic bridge pressure.",
                  "why_next": "v4.113 locks the ordering, formulas, sensitivity lanes, and claim boundaries."
              },
              {
                  "priority": 2,
                  "route_id": "v4_115_regularized_pressure_sensitivity_audit",
                  "purpose": "Audit whether the bridge pressure depends strongly on eigen-floor, pseudoinverse, diagonal observed fallback, or reference regularization.",
                  "why_next": "High condition number means sensitivity must be measured before interpretation."
              },
              {
                  "priority": 3,
                  "route_id": "v4_116_observed_covariance_source_upgrade",
                  "purpose": "Replace diagonal fallback with source-provided or literature-supported observed covariance where possible.",
                  "why_next": "Observed covariance quality controls pressure reliability."
              },
              {
                  "priority": 4,
                  "route_id": "v4_117_additional_chain_coverage_scaling_plan",
                  "purpose": "Expand reference chain support further if bridge sensitivity remains too high.",
                  "why_next": "More reference samples may reduce dependence on regularization."
              }
          ]

          failed_gates = []
          warnings = [
              "design_only",
              "no_observed_RSD_values_computed",
              "no_bridge_pressure_computed",
              "regularized_reference_bridge_ready_but_not_final",
              "high_condition_number_warning_carried",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_112_regularized_covariance_sufficiency_gate"]

          if upstream["regularized_covariance_bridge_ready"] is not True:
              failed_gates.append("upstream_regularized_bridge_ready_not_carried")

          if upstream["observed_RSD_covariance_bridge_required"] is not True:
              failed_gates.append("upstream_observed_bridge_requirement_not_carried")

          if upstream["final_RSD_pressure_allowed"] is not False:
              failed_gates.append("upstream_final_pressure_boundary_not_carried")

          if len(TARGET_VECTOR_ORDER) != 5:
              failed_gates.append("target_vector_order_not_5")

          if [row["z"] for row in TARGET_VECTOR_ORDER] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_not_locked")

          if len(OBSERVED_RSD_BRIDGE_FORMULAS) < 5:
              failed_gates.append("bridge_formulas_incomplete")

          if len(OBSERVED_COVARIANCE_POLICY) < 7:
              failed_gates.append("observed_covariance_policy_incomplete")

          required_schema_fields = {
              "position",
              "z",
              "observed_fsigma8",
              "observed_sigma",
              "source_family",
              "source_label",
              "covariance_source_status",
              "independence_warning",
              "included_in_primary_bridge"
          }

          schema_fields = {row["field"] for row in NEXT_PROBE_INPUT_SCHEMA}
          if schema_fields != required_schema_fields:
              failed_gates.append("next_probe_input_schema_incomplete")

          required_lanes = {row["lane_id"] for row in SENSITIVITY_LANES_FOR_NEXT_PROBE if row["required_next"]}
          if required_lanes != {
              "primary_eigen_floor_reference_plus_observed",
              "pseudoinverse_reference_plus_observed",
              "diagonal_observed_fallback_guard",
              "reference_only_regularization_sensitivity"
          }:
              failed_gates.append("required_sensitivity_lanes_not_locked")

          if len(QUALITY_GATES_FOR_NEXT_PROBE) < 7:
              failed_gates.append("quality_gates_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "observed rsd covariance was computed in v4.113",
              "final rsd pressure score",
              "validates tairid cosmology",
              "next bridge pressure will be final",
              "diagonal fallback is the same as full observed covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "observed_RSD_covariance_bridge_design_passed_ready_for_observed_RSD_covariance_bridge_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_regularized_bridge_ready_carried",
                  "pass": upstream["regularized_covariance_bridge_ready"] is True,
                  "result": "v4.112 regularized covariance bridge readiness carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "target_vector_order_locked",
                  "pass": [row["z"] for row in TARGET_VECTOR_ORDER] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "observed/reference vector order locked",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "bridge_formulas_declared",
                  "pass": len(OBSERVED_RSD_BRIDGE_FORMULAS) >= 5,
                  "result": f"{len(OBSERVED_RSD_BRIDGE_FORMULAS)} bridge formulas declared",
                  "boundary": "No pressure computed."
              },
              {
                  "rule_id": "observed_covariance_policy_declared",
                  "pass": len(OBSERVED_COVARIANCE_POLICY) >= 7,
                  "result": f"{len(OBSERVED_COVARIANCE_POLICY)} observed covariance policies declared",
                  "boundary": "No observed covariance computed."
              },
              {
                  "rule_id": "next_probe_input_schema_locked",
                  "pass": schema_fields == required_schema_fields,
                  "result": f"{len(NEXT_PROBE_INPUT_SCHEMA)} next-probe input fields declared",
                  "boundary": "Schema only."
              },
              {
                  "rule_id": "sensitivity_lanes_declared",
                  "pass": len(required_lanes) == 4,
                  "result": f"required sensitivity lanes={sorted(required_lanes)}",
                  "boundary": "No sensitivity computation."
              },
              {
                  "rule_id": "quality_gates_declared",
                  "pass": len(QUALITY_GATES_FOR_NEXT_PROBE) >= 7,
                  "result": f"{len(QUALITY_GATES_FOR_NEXT_PROBE)} next-probe quality gates declared",
                  "boundary": "No bridge pressure computed."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": upstream["final_RSD_pressure_allowed"] is False and upstream["TAIRID_validation_claim_allowed"] is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute pressure."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_113_rules_passed")

          if failed_gates:
              readiness_label = "observed_RSD_covariance_bridge_design_failed"
              next_allowed_step = "Repair observed RSD covariance bridge design before bridge probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.114 observed RSD covariance bridge probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "regularized_covariance_bridge_ready": upstream["regularized_covariance_bridge_ready"],
              "condition_number_high": upstream["condition_number_high"],
              "observed_RSD_covariance_bridge_required": upstream["observed_RSD_covariance_bridge_required"],
              "target_vector_dimension": len(TARGET_VECTOR_ORDER),
              "target_redshift_order": [row["z"] for row in TARGET_VECTOR_ORDER],
              "bridge_formula_count": len(OBSERVED_RSD_BRIDGE_FORMULAS),
              "observed_covariance_policy_count": len(OBSERVED_COVARIANCE_POLICY),
              "next_probe_input_schema_field_count": len(NEXT_PROBE_INPUT_SCHEMA),
              "required_sensitivity_lane_count": len(required_lanes),
              "quality_gate_count": len(QUALITY_GATES_FOR_NEXT_PROBE),
              "observed_RSD_values_computed": False,
              "observed_RSD_covariance_computed": False,
              "total_covariance_computed": False,
              "bridge_pressure_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "target_vector_order": TARGET_VECTOR_ORDER,
              "observed_RSD_bridge_formulas": OBSERVED_RSD_BRIDGE_FORMULAS,
              "observed_covariance_policy": OBSERVED_COVARIANCE_POLICY,
              "next_probe_input_schema": NEXT_PROBE_INPUT_SCHEMA,
              "sensitivity_lanes_for_next_probe": SENSITIVITY_LANES_FOR_NEXT_PROBE,
              "quality_gates_for_next_probe": QUALITY_GATES_FOR_NEXT_PROBE,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "observed_RSD_bridge_design_passed": not bool(failed_gates),
                  "observed_RSD_values_computed": False,
                  "observed_RSD_covariance_computed": False,
                  "total_covariance_computed": False,
                  "bridge_pressure_computed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_113_observed_RSD_covariance_bridge_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "target_vector_order_v4_113.csv",
              TARGET_VECTOR_ORDER,
              ["position", "z", "quantity", "reference_target_name", "observed_slot", "preferred_observed_family", "design_status"]
          )

          write_csv(
              OUTDIR / "observed_RSD_bridge_formulas_v4_113.csv",
              OBSERVED_RSD_BRIDGE_FORMULAS,
              ["formula_id", "symbolic_formula", "plain_language", "computed_now"]
          )

          write_csv(
              OUTDIR / "observed_covariance_policy_v4_113.csv",
              OBSERVED_COVARIANCE_POLICY,
              ["policy_id", "requirement", "reason"]
          )

          write_csv(
              OUTDIR / "next_probe_input_schema_v4_113.csv",
              NEXT_PROBE_INPUT_SCHEMA,
              ["field", "required", "purpose"]
          )

          write_csv(
              OUTDIR / "sensitivity_lanes_for_next_probe_v4_113.csv",
              SENSITIVITY_LANES_FOR_NEXT_PROBE,
              ["lane_id", "description", "required_next", "claim_scope"]
          )

          write_csv(
              OUTDIR / "quality_gates_for_next_probe_v4_113.csv",
              QUALITY_GATES_FOR_NEXT_PROBE,
              ["gate_id", "requirement", "failure_action"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_113.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_113.csv",
              NEXT_ROUTE_OPTIONS,
