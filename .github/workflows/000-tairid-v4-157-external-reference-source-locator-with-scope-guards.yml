              {
                  "condition": "if no likely external files were discovered",
                  "next_action": "request explicit reference package upload or build reproducible CAMB/CLASS reference generation plan",
                  "allowed": True,
                  "claim_boundary": "next_action_only_no_ingestion",
              },
              {
                  "condition": "before any pressure calculation",
                  "next_action": "lock reference vector, reference covariance/samples, QSO covariance/likelihood, full eBOSS covariance/overlap, and pressure methodology",
                  "allowed": True,
                  "claim_boundary": "next_action_only_no_ingestion",
              },
          ]

          def write_csv(path, rows, fieldnames=None):
              path = OUT / path
              if fieldnames is None:
                  fieldnames = sorted({k for row in rows for k in row.keys()}) if rows else ["empty"]
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)
              return str(path)

          write_csv("external_reference_source_targets_v4_157.csv", SOURCE_TARGETS)
          write_csv("external_reference_fetch_records_v4_157.csv", fetch_records)
          write_csv("external_reference_discovered_links_v4_157.csv", discovered_links)
          write_csv("dependency_to_external_source_targets_v4_157.csv", dependency_target_rows)
          write_csv("source_family_summary_v4_157.csv", source_family_summary_rows)
          write_csv("limited_lrgxelg_reference_slots_v4_157.csv", LIMITED_REFERENCE_SLOTS)
          write_csv("required_reference_dependencies_v4_157.csv", REQUIRED_DEPENDENCIES)
          write_csv("scope_guard_report_v4_157.csv", scope_guards)
          write_csv("blocked_claims_v4_157.csv", blocked_claim_rows)
          write_csv("parser_health_report_v4_157.csv", parser_health)
          write_csv("next_action_recommendations_v4_157.csv", next_action_rows)
          write_csv("rule_results_v4_157.csv", rules)

          result = {
              "manifest_status": manifest_status,
              "source_targets": SOURCE_TARGETS,
              "fetch_records": fetch_records,
              "discovered_links": discovered_links,
              "source_family_summary": source_family_summary_rows,
              "dependency_target_routes": dependency_target_rows,
              "limited_lrgxelg_reference_slots": LIMITED_REFERENCE_SLOTS,
              "required_dependencies": REQUIRED_DEPENDENCIES,
              "scope_guards": scope_guards,
              "blocked_claims": blocked_claim_rows,
              "next_action_recommendations": next_action_rows,
              "rules": rules,
          }

          with (OUT / "tairid_v4_157_external_reference_source_locator.json").open("w", encoding="utf-8") as f:
              json.dump(result, f, indent=2, sort_keys=True)

          md = []
          md.append("# 000 TAIRID v4.157 — External Reference Source Locator With Scope Guards")
          md.append(f"Created UTC: `{CREATED_UTC}`")
          md.append("")
          md.append("## Status")
          md.append(f"Expected result label: `{EXPECTED_RESULT_LABEL}`")
          md.append(f"Failed gates: `{failed_gates}`")
          md.append(f"Rule pass count: `{rule_pass_count} / {len(rules)}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("This workflow locates and records external source routes for the missing reference-side dependencies. It does not ingest scientific values, compute residuals, compute pressure, compare models, or validate TAIRID.")
          md.append("")
          md.append("## Locator summary")
          md.append(f"- Source targets attempted: `{len(SOURCE_TARGETS)}`")
          md.append(f"- Reachable source targets: `{reachable_count}`")
          md.append(f"- Discovered keyword-matching links recorded: `{len(discovered_links)}`")
          md.append(f"- Likely files by extension among discovered links: `{discovered_likely_file_count}`")
          md.append(f"- Parser-ready scientific candidates: `{parser_ready_candidate_count}`")
          md.append(f"- Selected next route: `{selected_next_route}`")
          md.append("")
          md.append("## Current dependency boundary")
          md.append("- Reference mean vector supplied: `False`")
          md.append("- Reference covariance or parameter samples supplied: `False`")
          md.append("- QSO covariance supplied: `False`")
          md.append("- Full eBOSS covariance/overlap supplied: `False`")
          md.append("- Pressure computed: `False`")
          md.append("- Residuals computed: `False`")
          md.append("- Validation claim allowed: `False`")
          md.append("")
          md.append("## Truth boundary")
          md.append("External source reachability is not data ingestion. Discovered links are not accepted as scientific inputs. This workflow does not compute final pressure, residuals against ΛCDM or TAIRID, likelihood, BIC, posterior comparison, QSO covariance, full eBOSS covariance, or validation. It only records source routes that may need later guarded triage.")
          md.append("")
          md.append("## Files produced")
          for filename in [
              "external_reference_source_targets_v4_157.csv",
              "external_reference_fetch_records_v4_157.csv",
              "external_reference_discovered_links_v4_157.csv",
              "dependency_to_external_source_targets_v4_157.csv",
              "source_family_summary_v4_157.csv",
              "limited_lrgxelg_reference_slots_v4_157.csv",
              "required_reference_dependencies_v4_157.csv",
              "scope_guard_report_v4_157.csv",
              "blocked_claims_v4_157.csv",
              "parser_health_report_v4_157.csv",
              "next_action_recommendations_v4_157.csv",
              "rule_results_v4_157.csv",
              "tairid_v4_157_external_reference_source_locator.json",
              "tairid_v4_157_external_reference_source_locator.md",
          ]:
              md.append(f"- `{filename}`")
          md.append("")
          md.append("## Next clean move if this passes")
          md.append("If likely external files are discovered, triage only those candidates under source/provenance guards. If no likely external files are discovered, request an explicit reference package upload or build a reproducible CAMB/CLASS reference-generation plan. Do not compute pressure until reference vector, reference covariance/parameter samples, QSO covariance, full eBOSS covariance/overlap, and final pressure methodology are resolved.")

          with (OUT / "tairid_v4_157_external_reference_source_locator.md").open("w", encoding="utf-8") as f:
              f.write("\n".join(md) + "\n")

          print(f"TAIRID {VERSION} complete.")
          print(f"Expected result label: {EXPECTED_RESULT_LABEL}")
          print(f"Failed gates: {failed_gates}")
          print(f"Rule pass count: {rule_pass_count} / {len(rules)}")
          print(f"Reachable source targets: {reachable_count} / {len(SOURCE_TARGETS)}")
          print(f"Discovered keyword-matching links: {len(discovered_links)}")
          print(f"Likely files by extension among discovered links: {discovered_likely_file_count}")
          print(f"Selected next route: {selected_next_route}")

          if failed_rules:
              raise SystemExit(1)
          PY

