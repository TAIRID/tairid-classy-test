name: 000 TAIRID v4.157 — External Reference Source Locator With Scope Guards

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-reference-source-locator:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run guarded external reference source locator
        shell: bash
        run: |
          python3 - <<'PY'
          import csv
          import datetime as _dt
          import hashlib
          import html.parser
          import json
          import os
          import re
          import socket
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          VERSION = "v4.157"
          OUT = Path("tairid_v4_157_external_reference_source_locator_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          EXPECTED_RESULT_LABEL = (
              "external_reference_source_locator_passed_source_reachability_and_dependency_targets_recorded_"
              "no_ingestion_no_pressure_no_validation"
          )

          CREATED_UTC = _dt.datetime.now(_dt.timezone.utc).isoformat()

          # This workflow is a locator, not an ingestion workflow.
          # It may fetch landing pages and record discovered links, but it must not parse scientific values,
          # compute residuals, compute pressure, compare models, or validate TAIRID.
          LIMITED_REFERENCE_SLOTS = [
              {"slot_id": "ref_DM_ov_rd_z0p70", "z": 0.700, "quantity": "DM_ov_rd", "family": "geometry"},
              {"slot_id": "ref_DH_ov_rd_z0p70", "z": 0.700, "quantity": "DH_ov_rd", "family": "geometry"},
              {"slot_id": "ref_fsigma8_z0p70", "z": 0.700, "quantity": "fsigma8", "family": "growth"},
              {"slot_id": "ref_DM_ov_rd_z0p845", "z": 0.845, "quantity": "DM_ov_rd", "family": "geometry"},
              {"slot_id": "ref_DH_ov_rd_z0p845", "z": 0.845, "quantity": "DH_ov_rd", "family": "geometry"},
              {"slot_id": "ref_fsigma8_z0p845", "z": 0.845, "quantity": "fsigma8", "family": "growth"},
          ]

          REQUIRED_DEPENDENCIES = [
              {
                  "dependency_id": "limited_lrgxelg_reference_mean_vector_6",
                  "scope": "limited_LRGxELG_two_redshift",
                  "needed_for": "future limited coupled residual or pressure attempt",
                  "required_content": "model/reference means for DM/rd, DH/rd, and fsigma8 at z=0.70 and z=0.845 in the observed six-row order",
                  "acceptable_forms": "CAMB/CLASS calculation with frozen cosmology; parameter-chain-derived predictions; documented published reference vector",
              },
              {
                  "dependency_id": "limited_lrgxelg_reference_covariance_or_samples",
                  "scope": "limited_LRGxELG_two_redshift",
                  "needed_for": "honest coupled residual uncertainty and reference sensitivity",
                  "required_content": "reference covariance for the six predicted quantities, or parameter/posterior samples allowing it to be generated",
                  "acceptable_forms": "Planck posterior samples; CLASS/CAMB sample propagation; documented covariance matrix",
              },
              {
                  "dependency_id": "expanded_12_redshift_growth_reference_vector",
                  "scope": "expanded_growth_lane",
                  "needed_for": "full growth/RSD pressure interpretation across prior expanded redshift targets",
                  "required_content": "reference fsigma8-like values at all expanded growth redshift targets used in the previous lane",
                  "acceptable_forms": "stored reference vector; reproducible CAMB/CLASS calculation; parameter-chain-derived vector",
              },
              {
                  "dependency_id": "expanded_12_redshift_reference_covariance_or_samples",
                  "scope": "expanded_growth_lane",
                  "needed_for": "pressure magnitude, correlated uncertainty, and final interpretation guard",
                  "required_content": "reference covariance or parameter samples spanning the expanded redshift vector",
                  "acceptable_forms": "Planck posterior samples; documented covariance; reproducible propagation from samples",
              },
              {
                  "dependency_id": "qso_covariance_or_likelihood",
                  "scope": "eBOSS_family",
                  "needed_for": "QSO counter-component covariance handling",
                  "required_content": "QSO value source plus covariance/likelihood and overlap notes with LRG/ELG products",
                  "acceptable_forms": "official SDSS/eBOSS source files; likelihood package; documented covariance table",
              },
              {
                  "dependency_id": "full_eboss_family_covariance_or_overlap_model",
                  "scope": "eBOSS_family",
                  "needed_for": "full LRG/ELG/QSO covariance/overlap interpretation",
                  "required_content": "cross-tracer covariance/overlap treatment or documented independence/combination rule",
                  "acceptable_forms": "official multi-tracer covariance; paper/language-supported overlap model; likelihood package",
              },
              {
                  "dependency_id": "final_pressure_methodology_spec",
                  "scope": "final_interpretation_guard",
                  "needed_for": "any future claim about pressure magnitude",
                  "required_content": "predeclared method for residuals, covariance combination, reference uncertainty, thresholds, and forbidden claims",
                  "acceptable_forms": "locked markdown/JSON methodology file with formulas and scope limits",
              },
          ]

          # Primary/official or high-context seed targets only. These are not accepted as data by this workflow.
          SOURCE_TARGETS = [
              {
                  "source_id": "sdss_dr16_release_page",
                  "family": "observed_eBOSS_context",
                  "dependency_links": "qso_covariance_or_likelihood;full_eboss_family_covariance_or_overlap_model",
                  "priority": "high",
                  "url": "https://www.sdss4.org/dr16/",
                  "expected_use": "Official SDSS DR16 release context and navigation only.",
              },
              {
                  "source_id": "sdss_eboss_survey_page",
                  "family": "observed_eBOSS_context",
                  "dependency_links": "qso_covariance_or_likelihood;full_eboss_family_covariance_or_overlap_model",
                  "priority": "high",
                  "url": "https://www.sdss4.org/surveys/eboss/",
                  "expected_use": "Official eBOSS survey context and data/results navigation only.",
              },
              {
                  "source_id": "sdss_eboss_cosmology_results_page",
                  "family": "observed_eBOSS_context",
                  "dependency_links": "qso_covariance_or_likelihood;full_eboss_family_covariance_or_overlap_model;final_pressure_methodology_spec",
                  "priority": "high",
                  "url": "https://www.sdss4.org/science/cosmology-results-from-eboss/",
                  "expected_use": "Official SDSS eBOSS cosmology-results context and navigation only.",
              },
              {
                  "source_id": "sdss_final_bao_rsd_measurements_table",
                  "family": "observed_eBOSS_context",
                  "dependency_links": "expanded_12_redshift_growth_reference_vector;qso_covariance_or_likelihood",
                  "priority": "high",
                  "url": "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/",
                  "expected_use": "Official final BAO/RSD measurement table context; not accepted as covariance.",
              },
              {
                  "source_id": "planck_2018_cosmological_parameters_arxiv",
                  "family": "reference_LCDM_context",
                  "dependency_links": "limited_lrgxelg_reference_mean_vector_6;limited_lrgxelg_reference_covariance_or_samples;expanded_12_redshift_reference_covariance_or_samples",
                  "priority": "high",
                  "url": "https://arxiv.org/abs/1807.06209",
                  "expected_use": "Planck 2018 parameter-paper context; not a parameter-chain ingestion.",
              },
              {
                  "source_id": "nasa_lambda_planck_esa_products",
                  "family": "reference_LCDM_context",
                  "dependency_links": "limited_lrgxelg_reference_covariance_or_samples;expanded_12_redshift_reference_covariance_or_samples",
                  "priority": "high",
                  "url": "https://lambda.gsfc.nasa.gov/product/planck/curr/planck_prod_esa.html",
                  "expected_use": "Planck Legacy Archive product navigation only; no chain ingestion here.",
              },
              {
                  "source_id": "esa_planck_cosmology_doi_page",
                  "family": "reference_LCDM_context",
                  "dependency_links": "limited_lrgxelg_reference_covariance_or_samples;expanded_12_redshift_reference_covariance_or_samples",
                  "priority": "high",
                  "url": "https://esdcdoi.esac.esa.int/doi/html/data/astronomy/planck/Cosmology.html",
                  "expected_use": "ESA Planck cosmology dataset landing-page context only.",
              },
              {
                  "source_id": "eboss_lrg_clustering_arxiv_2007_08993",
                  "family": "observed_eBOSS_context",
                  "dependency_links": "full_eboss_family_covariance_or_overlap_model",
                  "priority": "medium",
                  "url": "https://arxiv.org/abs/2007.08993",
                  "expected_use": "LRG paper context only; not accepted as raw covariance.",
              },
              {
                  "source_id": "eboss_qso_configuration_arxiv_2007_08998",
                  "family": "observed_eBOSS_QSO_context",
                  "dependency_links": "qso_covariance_or_likelihood;full_eboss_family_covariance_or_overlap_model",
                  "priority": "high",
                  "url": "https://arxiv.org/abs/2007.08998",
                  "expected_use": "QSO configuration-space paper context only; not accepted as QSO covariance.",
              },
              {
                  "source_id": "eboss_qso_power_spectrum_arxiv_2007_08999",
                  "family": "observed_eBOSS_QSO_context",
                  "dependency_links": "qso_covariance_or_likelihood;full_eboss_family_covariance_or_overlap_model",
                  "priority": "high",
                  "url": "https://arxiv.org/abs/2007.08999",
                  "expected_use": "QSO power-spectrum paper context only; not accepted as QSO covariance.",
              },
              {
                  "source_id": "eboss_lrgxelg_multitracer_arxiv_2007_09010",
                  "family": "observed_limited_LRGxELG_context",
                  "dependency_links": "full_eboss_family_covariance_or_overlap_model;final_pressure_methodology_spec",
                  "priority": "high",
                  "url": "https://arxiv.org/abs/2007.09010",
                  "expected_use": "LRGxELG multi-tracer paper context only; source product already pinned separately.",
              },
              {
                  "source_id": "eboss_multitracer_mocks_arxiv_2007_08997",
                  "family": "observed_eBOSS_covariance_context",
                  "dependency_links": "qso_covariance_or_likelihood;full_eboss_family_covariance_or_overlap_model",
                  "priority": "high",
                  "url": "https://arxiv.org/abs/2007.08997",
                  "expected_use": "Mock/covariance-context paper only; not accepted as covariance matrix.",
              },
          ]

          class LinkExtractor(html.parser.HTMLParser):
              def __init__(self, base_url):
                  super().__init__()
                  self.base_url = base_url
                  self.links = []

              def handle_starttag(self, tag, attrs):
                  if tag.lower() not in ("a", "link"):
                      return
                  attrs = dict(attrs)
                  href = attrs.get("href")
                  if not href:
                      return
                  url = urllib.parse.urljoin(self.base_url, href)
                  text = attrs.get("title") or attrs.get("aria-label") or ""
                  self.links.append((url, text))

          KEYWORDS = [
              "chain", "chains", "cov", "covariance", "likelihood", "bao", "rsd",
              "fsigma", "fsigma8", "f_sigma", "qso", "quasar", "lrg", "elg",
              "planck", "base_plik", "plik", "mcmc", "posterior", "mock", "mocks",
              "dr16", "eboss", "lcdm", "class", "camb", "fits", "dat", "txt", "zip", "tgz"
          ]

          def sha256_16(data):
              return hashlib.sha256(data).hexdigest()[:16]

          def fetch_url(url, timeout=20, max_bytes=3_000_000):
              started = time.time()
              record = {
                  "url": url,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "sha256_16": "",
                  "elapsed_seconds": "",
                  "error": "",
                  "text_preview": "",
              }
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.157-source-locator/1.0"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes + 1)
                      if len(data) > max_bytes:
                          data = data[:max_bytes]
                          record["error"] = "truncated_at_max_bytes_for_locator_only"
                      record["fetch_ok"] = True
                      record["status_code"] = getattr(resp, "status", "")
                      record["content_type"] = resp.headers.get("Content-Type", "")
                      record["bytes_read"] = len(data)
                      record["sha256_16"] = sha256_16(data)
                      try:
                          text = data.decode("utf-8", errors="replace")
                      except Exception:
                          text = ""
                      record["text_preview"] = re.sub(r"\s+", " ", text[:500]).strip()
                      return record, data
              except Exception as e:
                  record["error"] = repr(e)
                  return record, b""
              finally:
                  record["elapsed_seconds"] = round(time.time() - started, 3)

          fetch_records = []
          discovered_links = []
          dependency_target_rows = []

          for target in SOURCE_TARGETS:
              rec, data = fetch_url(target["url"])
              rec.update({
                  "source_id": target["source_id"],
                  "family": target["family"],
                  "dependency_links": target["dependency_links"],
                  "priority": target["priority"],
                  "expected_use": target["expected_use"],
                  "allowed_use": "source_locator_context_only_not_scientific_ingestion",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              })
              fetch_records.append(rec)

              for dep in target["dependency_links"].split(";"):
                  dependency_target_rows.append({
                      "dependency_id": dep,
                      "source_id": target["source_id"],
                      "source_family": target["family"],
                      "priority": target["priority"],
                      "url": target["url"],
                      "fetch_ok": rec["fetch_ok"],
                      "allowed_use": "candidate_source_route_only_not_data",
                      "claim_boundary": "dependency_route_mapping_only_no_ingestion",
                  })

              content_type = (rec.get("content_type") or "").lower()
              if rec["fetch_ok"] and (b"<a " in data[:500000].lower() or "html" in content_type):
                  text = data.decode("utf-8", errors="replace")
                  parser = LinkExtractor(target["url"])
                  try:
                      parser.feed(text)
                  except Exception:
                      pass
                  seen = set()
                  for url, link_text in parser.links:
                      if url in seen:
                          continue
                      seen.add(url)
                      lower_blob = (url + " " + link_text).lower()
                      hits = sorted({kw for kw in KEYWORDS if kw in lower_blob})
                      if not hits:
                          continue
                      ext = Path(urllib.parse.urlparse(url).path).suffix.lower()
                      likely_file = ext in {".txt", ".dat", ".csv", ".fits", ".fit", ".gz", ".zip", ".tgz", ".tar", ".ini", ".yaml", ".yml", ".json", ".cov"}
                      discovered_links.append({
                          "source_id": target["source_id"],
                          "parent_url": target["url"],
                          "discovered_url": url,
                          "link_text": re.sub(r"\s+", " ", link_text).strip()[:180],
                          "keyword_hits": ";".join(hits),
                          "extension": ext,
                          "likely_file_by_extension": likely_file,
                          "parser_ready": False,
                          "allowed_use": "discovered_link_candidate_only_requires_triage",
                          "claim_boundary": "link_discovery_only_not_scientific_ingestion",
                      })

          # Deduplicate discovered links and cap the report so the artifact stays readable.
          unique_links = []
          seen_keys = set()
          for row in discovered_links:
              key = row["discovered_url"]
              if key in seen_keys:
                  continue
              seen_keys.add(key)
              unique_links.append(row)
          discovered_links = unique_links[:300]

          family_summary = {}
          for target in SOURCE_TARGETS:
              family_summary.setdefault(target["family"], {"target_count": 0, "reachable_count": 0, "discovered_link_count": 0})
              family_summary[target["family"]]["target_count"] += 1
          for rec in fetch_records:
              if rec["fetch_ok"]:
                  family_summary[rec["family"]]["reachable_count"] += 1
          for link in discovered_links:
              family_summary.setdefault(link["source_id"], {"target_count": 0, "reachable_count": 0, "discovered_link_count": 0})
              family = next((t["family"] for t in SOURCE_TARGETS if t["source_id"] == link["source_id"]), link["source_id"])
              family_summary.setdefault(family, {"target_count": 0, "reachable_count": 0, "discovered_link_count": 0})
              family_summary[family]["discovered_link_count"] += 1

          source_family_summary_rows = []
          for family, vals in sorted(family_summary.items()):
              if not isinstance(vals, dict) or "target_count" not in vals:
                  continue
              source_family_summary_rows.append({
                  "family": family,
                  "target_count": vals["target_count"],
                  "reachable_count": vals["reachable_count"],
                  "discovered_link_count": vals["discovered_link_count"],
                  "claim_boundary": "family_summary_only_no_ingestion",
              })

          reachable_count = sum(1 for r in fetch_records if r["fetch_ok"])
          discovered_likely_file_count = sum(1 for r in discovered_links if r["likely_file_by_extension"])
          parser_ready_candidate_count = 0

          selected_next_route = (
              "external_reference_candidate_triage_with_scope_guards"
              if discovered_likely_file_count > 0
              else "manual_reference_package_upload_request_or_reproducible_CAMB_CLASS_reference_generation_plan"
          )

          scope_guards = [
              {
                  "guard_id": "source_locator_only",
                  "allowed": True,
                  "blocked_use": "scientific_ingestion_or_pressure",
                  "guard_text": "This workflow locates and records external source routes only; it does not ingest scientific values.",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "guard_id": "candidate_links_not_data",
                  "allowed": False,
                  "blocked_use": "accepting_discovered_links_as_data",
                  "guard_text": "Discovered links are candidates only and require later source/provenance triage before use.",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "guard_id": "reference_inputs_still_required",
                  "allowed": False,
                  "blocked_use": "final_RSD_pressure",
                  "guard_text": "Reference mean vector and reference covariance/parameter samples remain required before pressure interpretation.",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "guard_id": "not_QSO_covariance",
                  "allowed": False,
                  "blocked_use": "QSO_covariance_claim",
                  "guard_text": "This locator may identify QSO source routes, but it does not supply or ingest QSO covariance.",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "guard_id": "not_full_eboss_covariance",
                  "allowed": False,
                  "blocked_use": "full_eBOSS_family_covariance_or_overlap_solution",
                  "guard_text": "This locator does not solve full eBOSS covariance or cross-tracer overlap.",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "guard_id": "not_model_comparison",
                  "allowed": False,
                  "blocked_use": "BIC_likelihood_posterior_comparison",
                  "guard_text": "No BIC, likelihood, posterior comparison, model selection, or validation claim is allowed.",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
          ]

          blocked_claims = [
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A final RSD pressure score was computed.",
              "A residual against LCDM or TAIRID was computed.",
              "A final combined growth covariance was computed.",
              "A discovered external link is accepted as scientific data.",
              "The limited LRGxELG product is full eBOSS covariance.",
              "This workflow provides QSO covariance.",
              "The eBOSS family points are independent by default.",
              "BIC, likelihood, posterior comparison, or model selection has been run.",
              "Reference source locating supplies the missing reference vector.",
              "Public-facing validation claims are allowed.",
          ]
          blocked_claim_rows = [
              {"blocked_claim": c, "claim_boundary": "blocked_claim_preserved_v4_157"} for c in blocked_claims
          ]

          rules = [
              {
                  "rule": "external_source_targets_defined",
                  "pass": len(SOURCE_TARGETS) >= 10,
                  "detail": f"source_target_count={len(SOURCE_TARGETS)}",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "rule": "dependency_target_routes_written",
                  "pass": len(dependency_target_rows) >= len(REQUIRED_DEPENDENCIES),
                  "detail": f"dependency_target_route_count={len(dependency_target_rows)}",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "rule": "fetch_attempts_recorded",
                  "pass": len(fetch_records) == len(SOURCE_TARGETS),
                  "detail": f"fetch_attempt_count={len(fetch_records)}; reachable_count={reachable_count}",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "rule": "limited_reference_slots_carried_forward",
                  "pass": len(LIMITED_REFERENCE_SLOTS) == 6,
                  "detail": f"slot_count={len(LIMITED_REFERENCE_SLOTS)}",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "rule": "required_dependencies_carried_forward",
                  "pass": len(REQUIRED_DEPENDENCIES) == 7,
                  "detail": f"required_dependency_count={len(REQUIRED_DEPENDENCIES)}",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {
                  "rule": "discovered_links_not_parser_ready",
                  "pass": parser_ready_candidate_count == 0,
                  "detail": f"discovered_link_count={len(discovered_links)}; likely_file_by_extension_count={discovered_likely_file_count}; parser_ready_candidate_count={parser_ready_candidate_count}",
                  "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation",
              },
              {"rule": "no_scientific_ingestion", "pass": True, "detail": "No scientific values are parsed or accepted.", "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation"},
              {"rule": "no_pressure_computed", "pass": True, "detail": "No pressure calculation is performed.", "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation"},
              {"rule": "no_residuals_computed", "pass": True, "detail": "No residuals are computed.", "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation"},
              {"rule": "no_likelihood_or_bic_run", "pass": True, "detail": "No likelihood, BIC, or model comparison is run.", "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation"},
              {"rule": "no_posterior_comparison_run", "pass": True, "detail": "No posterior comparison is run.", "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation"},
              {"rule": "no_validation_claim_allowed", "pass": True, "detail": "Public-facing validation claims remain blocked.", "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation"},
              {"rule": "selected_next_route_is_guarded", "pass": selected_next_route in {"external_reference_candidate_triage_with_scope_guards", "manual_reference_package_upload_request_or_reproducible_CAMB_CLASS_reference_generation_plan"}, "detail": f"selected_next_route={selected_next_route}", "claim_boundary": "external_source_locator_only_no_ingestion_no_pressure_no_validation"},
          ]

          failed_rules = [r for r in rules if not r["pass"]]
          failed_gates = "none" if not failed_rules else ";".join(r["rule"] for r in failed_rules)
          rule_pass_count = sum(1 for r in rules if r["pass"])

          manifest_status = {
              "version": VERSION,
              "created_utc": CREATED_UTC,
              "expected_result_label": EXPECTED_RESULT_LABEL,
              "failed_gates": failed_gates,
              "rule_pass_count": f"{rule_pass_count} / {len(rules)}",
              "source_target_count": len(SOURCE_TARGETS),
              "reachable_source_count": reachable_count,
              "discovered_link_count": len(discovered_links),
              "discovered_likely_file_by_extension_count": discovered_likely_file_count,
              "parser_ready_candidate_count": parser_ready_candidate_count,
              "reference_mean_vector_supplied": False,
              "reference_covariance_or_samples_supplied": False,
              "qso_covariance_supplied": False,
              "full_eboss_covariance_or_overlap_supplied": False,
              "pressure_computed": False,
              "residuals_computed": False,
              "likelihood_or_bic_run": False,
              "posterior_comparison_run": False,
              "TAIRID_validation_claim_allowed": False,
              "selected_next_route": selected_next_route,
              "allowed_scope": "External source route locating only. No scientific ingestion, pressure, residuals, likelihood, BIC, posterior comparison, or validation claim.",
          }

          parser_health = [
              {"metric": "workflow_version", "value": VERSION, "claim_boundary": "locator_health_only"},
              {"metric": "expected_result_label", "value": EXPECTED_RESULT_LABEL, "claim_boundary": "locator_health_only"},
              {"metric": "failed_gates", "value": failed_gates, "claim_boundary": "locator_health_only"},
              {"metric": "rule_pass_count", "value": f"{rule_pass_count} / {len(rules)}", "claim_boundary": "locator_health_only"},
              {"metric": "source_target_count", "value": len(SOURCE_TARGETS), "claim_boundary": "locator_health_only"},
              {"metric": "reachable_source_count", "value": reachable_count, "claim_boundary": "locator_health_only"},
              {"metric": "discovered_link_count", "value": len(discovered_links), "claim_boundary": "locator_health_only"},
              {"metric": "parser_ready_candidate_count", "value": parser_ready_candidate_count, "claim_boundary": "locator_health_only"},
              {"metric": "selected_next_route", "value": selected_next_route, "claim_boundary": "locator_health_only"},
          ]

          next_action_rows = [
              {
                  "condition": "if likely external files were discovered",
                  "next_action": "run external_reference_candidate_triage_with_scope_guards",
                  "allowed": True,
                  "claim_boundary": "next_action_only_no_ingestion",
