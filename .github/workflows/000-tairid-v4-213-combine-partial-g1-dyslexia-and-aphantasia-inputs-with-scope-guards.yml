              "v4_212b_status_reviewed": V4_212B_STATUS["rule_pass_count"] == 13,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "combined_candidate_table_written": (OUT / "candidate_data_neurotype_combined_g1_dyslexia_aphantasia_subject_axis_input.csv").exists(),
