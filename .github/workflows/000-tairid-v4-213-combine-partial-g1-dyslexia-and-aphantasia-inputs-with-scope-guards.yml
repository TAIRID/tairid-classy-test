          summary = [
              "# TAIRID v4.213 - Combine Partial G1 Dyslexia And Aphantasia Inputs",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.212b made the aphantasia half stageable and v4.209 made the dyslexia half stageable. v4.213 rebuilds both halves from public sources and combines them into one guarded G1 candidate table.",
              "",
              "Downloaded count: `" + str(downloaded_count) + "`",
              "Combined candidate rows: `" + str(len(combined_rows)) + "`",
              "Complete rows: `" + str(complete_rows) + "`",
              "Placeholder rows: `" + str(placeholder_rows) + "`",
              "Dyslexia rows: `" + str(lane_counts.get("Dyslexia", 0)) + "`",
              "Aphantasia rows: `" + str(lane_counts.get("Aphantasia", 0)) + "`",
              "Both halves ready: `" + str(both_halves_ready) + "`",
