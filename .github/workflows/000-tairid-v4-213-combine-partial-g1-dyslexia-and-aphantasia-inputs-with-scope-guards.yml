name: 000 TAIRID v4.213 - Combine Partial G1 Dyslexia And Aphantasia Inputs With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-213-combine-partial-g1-dyslexia-and-aphantasia-inputs-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/public_sources/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-213-combine-partial-g1-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install parquet readers
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas pyarrow

      - name: Run v4.213 combine partial G1 dyslexia and aphantasia inputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_213_outputs
          cat > tairid_v4_213_outputs/run_v4_213.py <<'PY'
          import csv
          import io
          import json
          import math
          import os
          import re
          import shutil
          import tempfile
          import urllib.request
          import zipfile
          from pathlib import Path

          OUT = Path("tairid_v4_213_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "combine_partial_g1_dyslexia_and_aphantasia_inputs_passed_combined_candidate_table_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no dyslexia validation",
              "no aphantasia validation",
              "no clinical diagnosis claim",
              "no claim that G1 proves TAIRID",
              "no raw numbers moved between domains",
              "no unit equivalence across dyslexia and aphantasia surfaces",
              "no causal equivalence across dyslexia and aphantasia surfaces",
              "no publication-grade scaling law",
              "combined candidate table is not covariance",
              "combined candidate table is not validation",
              "aphantasia remains questionnaire-only",
              "dyslexia and aphantasia measurement surfaces are different",
              "TAIRID not proved"
          ]

          V4_212B_STATUS = {
              "version": "v4.212b",
              "rule_pass_count": 13,
              "rule_total_count": 13,
              "failed_gates": [],
              "downloaded_count": 1,
              "read_method": "pyarrow_read_table_safe_scalar_columns_only",
              "candidate_axis_rows": 114,
              "visual_specific_rows": 114,
              "delta_review_rows": 2,
              "conservative_three_axis_signature": "-+-",
              "conservative_four_axis_signature": "-+--",
              "visual_specific_three_axis_signature": "-+-",
              "visual_specific_four_axis_signature": "-+--",
              "package_status": "aphantasia_candidate_axis_rows_written_questionnaire_only_arrow_safe",
              "selected_next_route": "combine_partial_g1_dyslexia_and_aphantasia_inputs_with_scope_guards"
          }

          TARGET_CANONICAL_COLUMNS = [
              "lane",
              "subject_id",
              "group_or_condition",
              "boundary_or_task",
              "propagation_reach_value",
              "pacing_access_value",
              "consolidation_growth_value",
              "viability_or_outcome_value",
              "source_or_dataset",
              "notes"
          ]

          ETDD70_DOWNLOADS = [
              {
                  "file_name": "dyslexia_class_label.csv",
                  "download_url": "https://zenodo.org/api/records/13332134/files/dyslexia_class_label.csv/content",
                  "expected_size_bytes": 1357,
                  "purpose": "subject group labels"
              },
              {
                  "file_name": "data.zip",
                  "download_url": "https://zenodo.org/api/records/13332134/files/data.zip/content",
                  "expected_size_bytes": 133743551,
                  "purpose": "subject task metric tables"
              }
          ]

          APHANTASIA_DOWNLOAD = {
              "file_name": "aphantasia_data.parquet",
              "download_url": "https://huggingface.co/datasets/jmc255/aphantasia_drawing_dataset/resolve/main/aphantasia_data.parquet",
              "purpose": "safe scalar questionnaire fields for aphantasia candidate rows"
          }

          REQUIRED_ETDD70_COLUMNS = [
              "sid",
              "trialid",
              "n_fix_trial",
              "sum_fix_dur_trial",
              "dwell_time_trial",
              "mean_fix_dur_trial",
              "n_sacc_trial",
              "sum_sacc_dur_trial",
              "mean_sacc_dur_trial",
              "n_regress_trial",
              "n_progress_trial"
          ]

          OPTIONAL_ETDD70_COLUMNS = [
              "n_transit_trial",
              "n_between_line_regress_trial",
              "n_within_line_regress_trial",
              "dwell_time_rereading_aoi",
              "n_revisits_aoi",
              "ratio_progress_regress_trial",
              "skipped_aoi",
              "dwell_time_aoi",
              "n_fix_aoi",
              "mean_fix_dur_aoi"
          ]

          APHANTASIA_SAFE_COLUMNS = [
              "subject_id",
              "treatment",
              "demographics.vviq_score",
              "demographics.osiq_score"
          ]

          MAX_DOWNLOAD_BYTES = 500_000_000
          USER_AGENT = "TAIRID-v4.213-combined-G1-candidate-input/1.0"

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def safe_float(x):
              try:
                  if x is None or str(x).strip() == "":
                      return None
                  return float(str(x).strip())
              except Exception:
                  return None

          def safe_mean(values):
              vals = [v for v in values if v is not None and not math.isnan(v)]
              if not vals:
                  return None
              return sum(vals) / len(vals)

          def safe_sd(values):
              vals = [v for v in values if v is not None and not math.isnan(v)]
              if len(vals) < 2:
                  return None
              m = sum(vals) / len(vals)
              var = sum((v - m) ** 2 for v in vals) / (len(vals) - 1)
              return math.sqrt(var)

          def sign(x):
              if x is None:
                  return ""
              if x > 0:
                  return "+"
              if x < 0:
                  return "-"
              return "0"

          def z_values(values):
              vals = [safe_float(v) for v in values]
              clean = [v for v in vals if v is not None]
              if len(clean) < 2:
                  return [None for _ in vals]
              m = sum(clean) / len(clean)
              sd = safe_sd(clean)
              if sd is None or sd == 0:
                  return [0.0 if v is not None else None for v in vals]
              return [(v - m) / sd if v is not None else None for v in vals]

          def zscore_map(rows, columns):
              stats = {}
              for col in columns:
                  vals = [safe_float(r.get(col)) for r in rows]
                  vals = [v for v in vals if v is not None]
                  if len(vals) >= 2:
                      m = sum(vals) / len(vals)
                      sd = safe_sd(vals)
                      stats[col] = (m, sd if sd is not None else 0.0)
              return stats

          def z(row, col, stats):
              v = safe_float(row.get(col))
              if v is None or col not in stats:
                  return None
              m, sd = stats[col]
              if sd == 0:
                  return 0.0
              return (v - m) / sd

          def download_file(url, dest):
              if os.environ.get("TAIRID_LOCAL_NO_NETWORK") == "1":
                  return False, "download_skipped_local_no_network", "local check disables network"
              req = urllib.request.Request(url, headers={"User-Agent": USER_AGENT})
              try:
                  with urllib.request.urlopen(req, timeout=90) as resp:
                      content_len = resp.headers.get("Content-Length")
                      if content_len and int(content_len) > MAX_DOWNLOAD_BYTES:
                          return False, "skipped_size_guard", "content_length_exceeds_guard"
                      total = 0
                      with open(dest, "wb") as f:
                          while True:
                              chunk = resp.read(1024 * 1024)
                              if not chunk:
                                  break
                              total += len(chunk)
                              if total > MAX_DOWNLOAD_BYTES:
                                  return False, "failed_size_guard", "download_exceeded_guard"
                              f.write(chunk)
                  return True, "downloaded", ""
              except Exception as exc:
                  return False, "download_failed", type(exc).__name__ + ": " + str(exc)[:300]

          def read_csv_text_bytes(data):
              text = data.decode("utf-8-sig", errors="replace")
              first = text.splitlines()[0] if text.splitlines() else ""
              delimiter = "\t" if first.count("\t") > first.count(",") else ","
              reader = csv.DictReader(io.StringIO(text), delimiter=delimiter)
              return list(reader), reader.fieldnames or []

          def normalize_subject_id(x):
              s = str(x).strip()
              if s.endswith(".0"):
                  s = s[:-2]
              return s

          def task_from_filename(name):
              base = Path(name).name
              m = re.search(r"Subject_(\d+)_(T\d+)_(.+?)_metrics\.csv$", base)
              if m:
                  return m.group(1), m.group(2) + "_" + m.group(3)
              return "", base

          def build_dyslexia_rows(tmp_root, download_status_rows):
              paths = {}
              for item in ETDD70_DOWNLOADS:
                  dest = tmp_root / item["file_name"]
                  ok, status, error = download_file(item["download_url"], dest)
                  download_status_rows.append({
                      "source_lane": "Dyslexia",
                      "file_name": item["file_name"],
                      "purpose": item["purpose"],
                      "download_status": status,
                      "download_error": error,
                      "downloaded_size_bytes": dest.stat().st_size if dest.exists() else 0,
                      "claim_boundary": "download only; not validation"
                  })
                  if ok:
                      paths[item["file_name"]] = dest

              label_map = {}
              label_rows = []
              metric_file_rows = []
              metric_raw_rows = []
              candidate_rows = []

              if "dyslexia_class_label.csv" in paths:
                  rows, cols = read_csv_text_bytes(paths["dyslexia_class_label.csv"].read_bytes())
                  for row in rows:
                      sid = normalize_subject_id(row.get("subject_id", row.get("sid", row.get("id", ""))))
                      label = str(row.get("label", row.get("class_id", row.get("class", "")))).strip()
                      class_id = str(row.get("class_id", row.get("class", ""))).strip()
                      group = label if label else ("class_" + class_id if class_id else "unknown")
                      label_rows.append({
                          "subject_id": sid,
                          "class_id": class_id,
                          "label": label,
                          "group_or_condition": group
                      })
                      if sid:
                          label_map[sid] = group

              if "data.zip" in paths and zipfile.is_zipfile(paths["data.zip"]):
                  with zipfile.ZipFile(paths["data.zip"]) as zf:
                      metric_members = [
                          info for info in zf.infolist()
                          if (not info.is_dir())
                          and info.filename.lower().endswith("_metrics.csv")
                          and "__macosx" not in info.filename.lower()
                      ]
                      for info in metric_members:
                          subject_from_name, task_name = task_from_filename(info.filename)
                          try:
                              rows, cols = read_csv_text_bytes(zf.read(info))
                          except Exception as exc:
                              metric_file_rows.append({
                                  "metric_file": info.filename,
                                  "subject_id": subject_from_name,
                                  "task_name": task_name,
                                  "row_count": 0,
                                  "column_count": 0,
                                  "required_columns_present": False,
                                  "missing_required_columns": "read_failed:" + type(exc).__name__,
                                  "optional_columns_present": "",
                                  "claim_boundary": "file read failed"
                              })
                              continue

                          present = set(cols)
                          missing = [c for c in REQUIRED_ETDD70_COLUMNS if c not in present]
                          optional_present = [c for c in OPTIONAL_ETDD70_COLUMNS if c in present]
                          metric_file_rows.append({
                              "metric_file": info.filename,
                              "subject_id": subject_from_name,
                              "task_name": task_name,
                              "row_count": len(rows),
                              "column_count": len(cols),
                              "required_columns_present": len(missing) == 0,
                              "missing_required_columns": ";".join(missing),
                              "optional_columns_present": ";".join(optional_present),
                              "claim_boundary": "metric file inventory only"
                          })

                          if not rows or "sid" not in present:
                              continue
                          agg = {
                              "metric_file": info.filename,
                              "subject_id": subject_from_name,
                              "task_name": task_name,
                              "group_or_condition": label_map.get(subject_from_name, "label_missing")
                          }
                          for col in REQUIRED_ETDD70_COLUMNS + OPTIONAL_ETDD70_COLUMNS:
                              if col in present:
                                  vals = [safe_float(r.get(col)) for r in rows]
                                  vals = [v for v in vals if v is not None]
                                  agg[col + "_mean"] = safe_mean(vals)
                                  agg[col + "_n"] = len(vals)
                          metric_raw_rows.append(agg)

              if metric_raw_rows:
                  features = [
                      "n_fix_trial_mean",
                      "n_sacc_trial_mean",
                      "n_transit_trial_mean",
                      "mean_fix_dur_trial_mean",
                      "dwell_time_trial_mean",
                      "mean_sacc_dur_trial_mean",
                      "n_regress_trial_mean",
                      "n_revisits_aoi_mean",
                      "dwell_time_rereading_aoi_mean",
                      "n_between_line_regress_trial_mean",
                      "n_within_line_regress_trial_mean",
                      "sum_fix_dur_trial_mean"
                  ]
                  stats = zscore_map(metric_raw_rows, features)

                  for row in metric_raw_rows:
                      prop = safe_mean([
                          z(row, "n_fix_trial_mean", stats),
                          z(row, "n_sacc_trial_mean", stats),
                          z(row, "n_transit_trial_mean", stats)
                      ])
                      pacing = safe_mean([
                          z(row, "mean_fix_dur_trial_mean", stats),
                          z(row, "dwell_time_trial_mean", stats),
                          z(row, "mean_sacc_dur_trial_mean", stats)
                      ])
                      consolidation = safe_mean([
                          -z(row, "n_regress_trial_mean", stats) if z(row, "n_regress_trial_mean", stats) is not None else None,
                          -z(row, "n_revisits_aoi_mean", stats) if z(row, "n_revisits_aoi_mean", stats) is not None else None,
                          -z(row, "dwell_time_rereading_aoi_mean", stats) if z(row, "dwell_time_rereading_aoi_mean", stats) is not None else None,
                          -z(row, "n_between_line_regress_trial_mean", stats) if z(row, "n_between_line_regress_trial_mean", stats) is not None else None,
                          -z(row, "n_within_line_regress_trial_mean", stats) if z(row, "n_within_line_regress_trial_mean", stats) is not None else None
                      ])
                      viability = safe_mean([
                          -z(row, "dwell_time_trial_mean", stats) if z(row, "dwell_time_trial_mean", stats) is not None else None,
                          -z(row, "sum_fix_dur_trial_mean", stats) if z(row, "sum_fix_dur_trial_mean", stats) is not None else None,
                          -z(row, "n_fix_trial_mean", stats) if z(row, "n_fix_trial_mean", stats) is not None else None,
                          -z(row, "n_sacc_trial_mean", stats) if z(row, "n_sacc_trial_mean", stats) is not None else None
                      ])

                      if all(v is not None for v in [prop, pacing, consolidation, viability]):
                          candidate_rows.append({
                              "lane": "Dyslexia",
                              "subject_id": row.get("subject_id", ""),
                              "group_or_condition": row.get("group_or_condition", "label_missing"),
                              "boundary_or_task": "ETDD70_" + row.get("task_name", ""),
                              "propagation_reach_value": round(prop, 8),
                              "pacing_access_value": round(pacing, 8),
                              "consolidation_growth_value": round(consolidation, 8),
                              "viability_or_outcome_value": round(viability, 8),
                              "source_or_dataset": "ETDD70 public Zenodo record 13332134; candidate axis mapping from metrics CSV",
                              "notes": "Candidate dyslexia ETDD70 task-metric row; partial G1 dyslexia half; not covariance or validation."
                          })

              return candidate_rows, label_rows, metric_file_rows

          def build_aphantasia_rows(tmp_root, download_status_rows):
              dest = tmp_root / APHANTASIA_DOWNLOAD["file_name"]
              ok, status, error = download_file(APHANTASIA_DOWNLOAD["download_url"], dest)
              download_status_rows.append({
                  "source_lane": "Aphantasia",
                  "file_name": APHANTASIA_DOWNLOAD["file_name"],
                  "purpose": APHANTASIA_DOWNLOAD["purpose"],
                  "download_status": status,
                  "download_error": error,
                  "downloaded_size_bytes": dest.stat().st_size if dest.exists() else 0,
                  "claim_boundary": "download only; not validation"
              })
              if not ok:
                  return [], [], []

              import pyarrow.parquet as pq

              schema_names = list(pq.ParquetFile(dest).schema_arrow.names)
              missing = [c for c in APHANTASIA_SAFE_COLUMNS if c not in schema_names]
              column_review_rows = []
              for col in schema_names:
                  column_review_rows.append({
                      "column_name": col,
                      "used_in_candidate_mapping": col in APHANTASIA_SAFE_COLUMNS,
                      "read_status": "safe_scalar_selected" if col in APHANTASIA_SAFE_COLUMNS else "not_read_to_avoid_binary_or_image_decode",
                      "claim_boundary": "column review only; not validation"
                  })
              if missing:
                  return [], column_review_rows, [{"quality_check": "required_columns_present", "status": False, "detail": ";".join(missing), "claim_boundary": "mapping blocked"}]

              table = pq.read_table(dest, columns=APHANTASIA_SAFE_COLUMNS)
              df = table.to_pandas(types_mapper=None)
              work = df[APHANTASIA_SAFE_COLUMNS].copy()
              work = work.dropna(subset=APHANTASIA_SAFE_COLUMNS)
              work["subject_id"] = work["subject_id"].astype(str)
              work["group_or_condition"] = work["treatment"].astype(str)

              vviq_z = z_values(work["demographics.vviq_score"].tolist())
              osiq_z = z_values(work["demographics.osiq_score"].tolist())

              candidate_rows = []
              for idx, (_, row) in enumerate(work.iterrows()):
                  vviq = vviq_z[idx]
                  osiq = osiq_z[idx]
                  prop = vviq
                  pacing = -vviq if vviq is not None else None
                  consolidation = osiq
                  viability = safe_mean([vviq, osiq])
                  if all(v is not None for v in [prop, pacing, consolidation, viability]):
                      candidate_rows.append({
                          "lane": "Aphantasia",
                          "subject_id": row["subject_id"],
                          "group_or_condition": row["group_or_condition"],
                          "boundary_or_task": "Aphantasia_questionnaire_profile",
                          "propagation_reach_value": round(prop, 8),
                          "pacing_access_value": round(pacing, 8),
                          "consolidation_growth_value": round(consolidation, 8),
                          "viability_or_outcome_value": round(viability, 8),
                          "source_or_dataset": "Hugging Face jmc255/aphantasia_drawing_dataset; aphantasia_data.parquet",
                          "notes": "Candidate aphantasia questionnaire mapping; Arrow-safe scalar-column read only; VVIQ/OSIQ only; not drawing-performance scoring, covariance, or validation."
                      })

              quality_rows = [
                  {"quality_check": "safe_scalar_columns_read_only", "status": True, "detail": ";".join(APHANTASIA_SAFE_COLUMNS), "claim_boundary": "avoids image/binary decode failure"},
                  {"quality_check": "candidate_rows_written", "status": len(candidate_rows) >= 4, "detail": str(len(candidate_rows)), "claim_boundary": "candidate rows only"},
                  {"quality_check": "drawing_performance_scores_present", "status": False, "detail": "Aphantasia rows are questionnaire-only VVIQ/OSIQ candidate rows.", "claim_boundary": "keeps limitation visible"}
              ]
              return candidate_rows, column_review_rows, quality_rows

          def group_summary(rows):
              grouped = {}
              for row in rows:
                  key = (row["lane"], row["group_or_condition"], row["boundary_or_task"])
                  grouped.setdefault(key, []).append(row)

              out_rows = []
              for (lane, group, task), group_rows in sorted(grouped.items()):
                  def avg(col):
                      vals = [safe_float(r[col]) for r in group_rows]
                      vals = [v for v in vals if v is not None]
                      return round(safe_mean(vals), 8) if vals else ""
                  def sd(col):
                      vals = [safe_float(r[col]) for r in group_rows]
                      vals = [v for v in vals if v is not None]
                      result = safe_sd(vals)
                      return round(result, 8) if result is not None else ""
                  out_rows.append({
                      "lane": lane,
                      "group_or_condition": group,
                      "boundary_or_task": task,
                      "n_rows": len(group_rows),
                      "propagation_reach_mean": avg("propagation_reach_value"),
                      "pacing_access_mean": avg("pacing_access_value"),
                      "consolidation_growth_mean": avg("consolidation_growth_value"),
                      "viability_or_outcome_mean": avg("viability_or_outcome_value"),
                      "propagation_reach_sd": sd("propagation_reach_value"),
                      "pacing_access_sd": sd("pacing_access_value"),
                      "consolidation_growth_sd": sd("consolidation_growth_value"),
                      "viability_or_outcome_sd": sd("viability_or_outcome_value"),
                      "claim_boundary": "combined candidate group summary only; not validation"
                  })
              return out_rows

          def delta_review(rows):
              result_rows = []
              axes = [
                  ("propagation_reach", "propagation_reach_value"),
                  ("pacing_access", "pacing_access_value"),
                  ("consolidation_growth", "consolidation_growth_value"),
                  ("viability_or_outcome", "viability_or_outcome_value")
              ]

              for lane in sorted(set(r["lane"] for r in rows)):
                  lane_rows = [r for r in rows if r["lane"] == lane]
                  tasks = sorted(set(r["boundary_or_task"] for r in lane_rows))
                  for task in tasks + ([lane + "_ALL_TASKS"] if lane == "Dyslexia" else []):
                      if task.endswith("_ALL_TASKS"):
                          task_rows = lane_rows
                      else:
                          task_rows = [r for r in lane_rows if r["boundary_or_task"] == task]

                      by_group = {}
                      for row in task_rows:
                          by_group.setdefault(row["group_or_condition"], []).append(row)
                      group_names = sorted(by_group.keys())

                      if lane == "Dyslexia":
                          group_a = "dyslexic"
                          group_b = "non-dyslexic"
                          comparison = "dyslexic_minus_non_dyslexic"
                          expected3 = "++-"
                          expected4 = "++--"
                      else:
                          group_a = next((g for g in group_names if "aphantasia" in g.lower()), "")
                          group_b = next((g for g in group_names if any(k in g.lower() for k in ["control", "normal", "imagery"]) and g != group_a), "")
                          comparison = "aphantasia_minus_control"
                          expected3 = "-+-"
                          expected4 = "-+--"

                      if group_a not in by_group or group_b not in by_group:
                          continue

                      out = {
                          "lane": lane,
                          "comparison": comparison,
                          "boundary_or_task": task,
                          "case_group": group_a,
                          "reference_group": group_b,
                          "case_n": len(by_group[group_a]),
                          "reference_n": len(by_group[group_b]),
                          "expected_three_axis_signature": expected3,
                          "expected_four_axis_signature": expected4,
                          "claim_boundary": "candidate delta review only; not validation"
                      }
                      for axis_label, col in axes:
                          case_vals = [safe_float(r[col]) for r in by_group[group_a]]
                          ref_vals = [safe_float(r[col]) for r in by_group[group_b]]
                          delta = safe_mean(case_vals) - safe_mean(ref_vals)
                          out[axis_label + "_delta"] = round(delta, 8)
                          out[axis_label + "_sign"] = sign(delta)
                      sig3 = out["propagation_reach_sign"] + out["pacing_access_sign"] + out["consolidation_growth_sign"]
                      sig4 = sig3 + out["viability_or_outcome_sign"]
                      out["resolved_three_axis_signature"] = sig3
                      out["resolved_four_axis_signature"] = sig4
                      out["matches_expected_three_axis"] = sig3 == expected3
                      out["matches_expected_four_axis"] = sig4 == expected4
                      result_rows.append(out)
              return result_rows

          download_status_rows = []
          tmp_root = Path(tempfile.mkdtemp(prefix="tairid_v4_213_downloads_"))

          try:
              dyslexia_rows, dyslexia_label_rows, dyslexia_metric_file_rows = build_dyslexia_rows(tmp_root, download_status_rows)
              aphantasia_rows, aphantasia_column_review_rows, aphantasia_quality_rows = build_aphantasia_rows(tmp_root, download_status_rows)
          finally:
              shutil.rmtree(tmp_root, ignore_errors=True)

          combined_rows = dyslexia_rows + aphantasia_rows
          combined_group_summary = group_summary(combined_rows) if combined_rows else []
          combined_delta_review = delta_review(combined_rows) if combined_rows else []

          lane_counts = {}
          source_surface_rows = []
          for lane in sorted(set(r["lane"] for r in combined_rows)):
              lane_rows = [r for r in combined_rows if r["lane"] == lane]
              lane_counts[lane] = len(lane_rows)
              source_surface_rows.append({
                  "lane": lane,
                  "row_count": len(lane_rows),
                  "source_surface": "ETDD70 task metrics" if lane == "Dyslexia" else "VVIQ/OSIQ questionnaire-only",
                  "measurement_warning": "reading eye-tracking task metrics" if lane == "Dyslexia" else "questionnaire-only; no scored drawing-performance scalar",
                  "claim_boundary": "different measurement surfaces; do not claim unit equivalence"
              })

          complete_rows = 0
          placeholder_rows = 0
          for row in combined_rows:
              if all(str(row.get(col, "")).strip() != "" for col in TARGET_CANONICAL_COLUMNS):
                  complete_rows += 1
              blob = " ".join(str(v).lower() for v in row.values())
              if any(marker in blob for marker in ["replace_with", "placeholder", "manual_relative", "not_subject_data"]):
                  placeholder_rows += 1

          dyslexia_ready = lane_counts.get("Dyslexia", 0) >= 4
          aphantasia_ready = lane_counts.get("Aphantasia", 0) >= 4
          both_halves_ready = dyslexia_ready and aphantasia_ready
          downloaded_count = sum(1 for r in download_status_rows if r["download_status"] == "downloaded")

          if both_halves_ready:
              package_status = "combined_g1_candidate_table_written_both_halves_present"
              selected_next_route = "combined_g1_candidate_input_staging_validator_with_scope_guards"
          elif downloaded_count:
              package_status = "combined_g1_candidate_table_incomplete"
              selected_next_route = "repair_missing_g1_half_or_mapping_with_scope_guards"
          else:
              package_status = "g1_source_download_failed_or_network_unavailable"
              selected_next_route = "retry_g1_source_downloads_or_manual_upload_with_scope_guards"

          staging_manifest = [
              {
                  "staging_item": "combined_g1_candidate_subject_axis_input",
                  "candidate_file": "candidate_data_neurotype_combined_g1_dyslexia_aphantasia_subject_axis_input.csv",
                  "suggested_repo_path_if_accepted": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "row_count": len(combined_rows),
                  "dyslexia_rows": lane_counts.get("Dyslexia", 0),
                  "aphantasia_rows": lane_counts.get("Aphantasia", 0),
