                  "safe_wording": "The combined table only stages candidate rows for a later validator.",
                  "forbidden_wording": "G1 validates TAIRID."
              },
              {
                  "claim": "Dyslexia and aphantasia values have the same units.",
                  "status": "blocked",
                  "safe_wording": "They share normalized relational axes but come from different measurement surfaces.",
                  "forbidden_wording": "The units are equivalent."
              },
              {
                  "claim": "Aphantasia rows include drawing-performance scoring.",
                  "status": "blocked",
                  "safe_wording": "Aphantasia rows are VVIQ/OSIQ questionnaire-only candidate rows.",
                  "forbidden_wording": "The drawings are scored."
              },
              {
                  "claim": "Combined candidate rows are covariance.",
                  "status": "blocked",
                  "safe_wording": "Covariance/correlation comes only after staging validation.",
                  "forbidden_wording": "The combined table is covariance."
              }
          ]

          next_routes = [
              {
                  "priority": 1,
                  "route": selected_next_route,
                  "condition": package_status,
                  "next_action": "Validate the combined candidate G1 table for completeness, placeholders, lane balance, and source-surface boundaries."
              },
              {
                  "priority": 2,
                  "route": "g1_candidate_subject_axis_covariance_correlation_preview_with_scope_guards",
                  "condition": "after the combined G1 candidate input staging validator passes",
                  "next_action": "Run covariance/correlation preview without claiming validation."
              },
              {
                  "priority": 3,
                  "route": "aphantasia_drawing_feature_or_score_extraction_gap_with_scope_guards",
                  "condition": "questionnaire-only aphantasia mapping remains a limitation",
                  "next_action": "Find or build a separate drawing-performance scoring lane."
              }
          ]

          write_csv(OUT / "v4_213_v4_212b_status_review.csv", [V4_212B_STATUS], list(V4_212B_STATUS.keys()))
          (OUT / "v4_213_v4_212b_status_review.json").write_text(json.dumps(V4_212B_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_213_download_status.csv", download_status_rows, [
              "source_lane", "file_name", "purpose", "download_status", "download_error",
