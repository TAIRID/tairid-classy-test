              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_213_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_213_v4_212b_status_review.csv",
              "v4_213_v4_212b_status_review.json",
              "v4_213_download_status.csv",
              "v4_213_dyslexia_label_profile.csv",
              "v4_213_dyslexia_metric_file_inventory.csv",
