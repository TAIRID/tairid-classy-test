name: "!!! AAA CURRENT - TAIRID v4.368 post audit route decision no support"

on:
  workflow_dispatch:
    inputs:
      human_selected_post_audit_route:
        description: "Choose next route after v4.367 external audit. No support claims are allowed."
        required: true
        type: choice
        options:
          - "full_covariance_repair_lane"
          - "broader_source_lane"
          - "cautious_diagnostic_writeup"
          - "keep_blocked"
        default: "full_covariance_repair_lane"

jobs:
  run-v4-368-post-audit-route-decision-no-support:
    name: "!!! AAA CURRENT - Run v4.368 post audit route decision"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      HUMAN_SELECTED_POST_AUDIT_ROUTE: ${{ github.event.inputs.human_selected_post_audit_route }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.367 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.367 output ZIP by pattern..."
          INPUT_367_ZIP="$(ls tairid-v4-367-external-ai-audit-packet-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_367_ZIP" ]; then
            echo "Could not find v4.367 output ZIP."
            echo "Expected:"
            echo "tairid-v4-367-external-ai-audit-packet-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.367 ZIP:"
          echo "$INPUT_367_ZIP"
          echo "INPUT_367_ZIP=$INPUT_367_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.368 route decision script
        run: |
          cat > run_v4_368_post_audit_route_decision_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "post-audit route decision only; no new computation; no full covariance yet; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          ALLOWED_ROUTES = {
              "full_covariance_repair_lane",
              "broader_source_lane",
              "cautious_diagnostic_writeup",
              "keep_blocked",
          }

          ROUTE_NEXT = {
              "full_covariance_repair_lane": "v4_369_full_covariance_source_candidate_inventory_no_support_claims",
              "broader_source_lane": "v4_369_broader_sdss_eboss_observed_source_inventory_no_support_claims",
              "cautious_diagnostic_writeup": "v4_369_cautious_guarded_diagnostic_writeup_packet_no_support_claims",
              "keep_blocked": "hold_after_external_audit_no_support_claims",
          }

          ROUTE_REASON = {
              "full_covariance_repair_lane": "Targets the strongest technical limitation identified by external audit: diagonal-only covariance.",
              "broader_source_lane": "Expands beyond the three-row BOSS DR12 guarded diagnostic before stronger interpretation.",
              "cautious_diagnostic_writeup": "Documents the guarded diagnostic as exploratory only, with all limits and no support claim.",
              "keep_blocked": "Stops forward motion until the human chooses a route.",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def main():
              input_367 = Path(os.environ["INPUT_367_ZIP"])
              selected_route = os.environ.get("HUMAN_SELECTED_POST_AUDIT_ROUTE", "keep_blocked").strip()

              outdir = Path("tairid_v4_368_post_audit_route_decision_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base367 = extract_zip(input_367, "tairid_v4_368_367_")

              summary367_path = find_one(base367, "v4_367_summary.json")
              stage_ledger_path = find_one(base367, "v4_367_stage_ledger_through_guarded_diagnostic.csv")
              ruled_out_path = find_one(base367, "v4_367_ruled_out_and_open_gaps.csv")
              audit_questions_path = find_one(base367, "v4_367_external_ai_audit_questions.csv")
              findings_path = find_one(base367, "v4_367_guarded_diagnostic_findings_NO_SUPPORT.csv")
              evidence_manifest_path = find_one(base367, "v4_367_evidence_manifest.csv")
              computed_terms_path = find_one(base367, "v4_367_input_v4_366_computed_terms_preserved.csv")
              diagnostic_summary_path = find_one(base367, "v4_367_input_v4_366_diagnostic_summary_preserved.csv")
              limits_path = find_one(base367, "v4_367_input_v4_366_interpretation_limits_preserved.csv")
              rules367_path = find_one(base367, "v4_367_rule_checks.csv")

              summary367 = json.loads(summary367_path.read_text())
              stage_ledger = pd.read_csv(stage_ledger_path)
              ruled_out = pd.read_csv(ruled_out_path)
              audit_questions = pd.read_csv(audit_questions_path)
              findings = pd.read_csv(findings_path)
              evidence_manifest = pd.read_csv(evidence_manifest_path)
              computed_terms = pd.read_csv(computed_terms_path)
              diagnostic_summary = pd.read_csv(diagnostic_summary_path)
              limits = pd.read_csv(limits_path)
              rules367 = pd.read_csv(rules367_path)

              route_is_valid = selected_route in ALLOWED_ROUTES
              next_route = ROUTE_NEXT[selected_route] if route_is_valid else "invalid_route_repair_needed"
              route_reason = ROUTE_REASON[selected_route] if route_is_valid else "Selected route is not allowed."

              guarded_chi_square_sum = float(summary367["guarded_diagonal_chi_square_sum"])
              dof_candidate = int(summary367["degrees_of_freedom_candidate"])
              chi_square_term_rows = int(summary367["chi_square_term_rows"])

              route_options = pd.DataFrame([
                  {
                      "route_option": "full_covariance_repair_lane",
                      "route_status": "recommended_next_if_strengthening_test",
                      "what_it_accomplishes": "Attempts to repair the biggest limitation by locating or staging covariance information.",
                      "support_allowed": False,
                  },
                  {
                      "route_option": "broader_source_lane",
                      "route_status": "valid_next_if_expanding_data",
                      "what_it_accomplishes": "Adds more SDSS/eBOSS observed-source rows before stronger interpretation.",
                      "support_allowed": False,
                  },
                  {
                      "route_option": "cautious_diagnostic_writeup",
                      "route_status": "valid_next_if_documenting_only",
                      "what_it_accomplishes": "Writes the guarded result as exploratory only, with no support claim.",
                      "support_allowed": False,
                  },
                  {
                      "route_option": "keep_blocked",
                      "route_status": "valid_if_pausing",
                      "what_it_accomplishes": "Stops the lane after audit.",
                      "support_allowed": False,
                  },
              ])

              route_decision = pd.DataFrame([{
                  "v4_368_route_decision_id": "v4_368_route_decision_001",
                  "human_selected_post_audit_route": selected_route,
                  "route_is_valid": bool(route_is_valid),
                  "selected_next_route": next_route,
                  "route_reason": route_reason,
                  "guarded_diagonal_chi_square_sum": guarded_chi_square_sum,
                  "degrees_of_freedom_candidate": dof_candidate,
                  "chi_square_term_rows": chi_square_term_rows,
                  "external_audit_packet_ready": bool(summary367["external_audit_packet_ready"]),
                  "full_covariance_available": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
              }])

              selected_route_packet = pd.DataFrame([{
                  "v4_368_selected_route_packet_id": "v4_368_selected_route_001",
                  "selected_route": selected_route,
                  "selected_next_route": next_route,
                  "route_reason": route_reason,
                  "allowed_scope_next": "repair_or_documentation_only_no_support_claims",
                  "guarded_diagnostic_value_preserved": guarded_chi_square_sum,
                  "full_covariance_available": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
              }])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_368_GAP_001",
                      "gap": "Post-audit route selected.",
                      "status_after_v4_368": "selected_" + selected_route if route_is_valid else "invalid_route",
                      "next_gate": next_route,
                  },
                  {
                      "gap_id": "V4_368_GAP_002",
                      "gap": "Full covariance remains unavailable.",
                      "status_after_v4_368": "open_gap",
                      "next_gate": "v4_369_full_covariance_source_candidate_inventory_no_support_claims" if selected_route == "full_covariance_repair_lane" else "not_selected_now",
                  },
                  {
                      "gap_id": "V4_368_GAP_003",
                      "gap": "Broader source lane remains optional.",
                      "status_after_v4_368": "open_or_not_selected",
                      "next_gate": "v4_369_broader_sdss_eboss_observed_source_inventory_no_support_claims" if selected_route == "broader_source_lane" else "not_selected_now",
                  },
                  {
                      "gap_id": "V4_368_GAP_004",
                      "gap": "Likelihood, p-values, and valid scoring remain blocked.",
                      "status_after_v4_368": "still_blocked",
                      "next_gate": "later_only_after_covariance_or_scope_repair",
                  },
                  {
                      "gap_id": "V4_368_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_368": "still_blocked",
                      "next_gate": "no_support_claims_allowed_from_v4_368",
                  },
              ])

              post_audit_status = pd.DataFrame([
                  {
                      "status_id": "V4_368_STATUS_001",
                      "status": "external_audit_passed",
                      "detail": "External audit packet preserved the truth boundary and named limitations.",
                  },
                  {
                      "status_id": "V4_368_STATUS_002",
                      "status": "guarded_diagnostic_preserved",
                      "detail": f"guarded_diagonal_chi_square_sum={guarded_chi_square_sum}; dof_candidate={dof_candidate}; rows={chi_square_term_rows}.",
                  },
                  {
                      "status_id": "V4_368_STATUS_003",
                      "status": "support_still_blocked",
                      "detail": "support_allowed=false remains active.",
                  },
                  {
                      "status_id": "V4_368_STATUS_004",
                      "status": "selected_route_recorded",
                      "detail": selected_route,
                  },
              ])

              hard_checks = {
                  "input_v4_367_summary_found": summary367.get("version") == "v4.367",
                  "input_v4_367_rules_all_passed": summary_rules_all_passed(summary367),
                  "input_v4_367_failed_gates_none": summary367.get("failed_gates") == "none",
                  "input_v4_367_external_audit_packet_ready": summary367.get("external_audit_packet_ready") is True,
                  "input_v4_367_no_full_covariance": summary367.get("full_covariance_available") is False,
                  "input_v4_367_no_likelihood": summary367.get("likelihood_computed") is False,
                  "input_v4_367_no_p_values": summary367.get("p_values_computed") is False,
                  "input_v4_367_no_score_valid": summary367.get("score_valid") is False,
                  "input_v4_367_no_support_allowed": summary367.get("support_allowed") is False,

                  "rules367_all_passed": passed_column_all(rules367),
                  "stage_ledger_rows_at_least_9": len(stage_ledger) >= 9,
                  "ruled_out_rows_at_least_10": len(ruled_out) >= 10,
                  "audit_questions_rows_equal_7": len(audit_questions) == 7,
                  "findings_rows_equal_5": len(findings) == 5,
                  "evidence_manifest_rows_equal_9": len(evidence_manifest) == 9,
                  "computed_terms_rows_match_summary": len(computed_terms) == chi_square_term_rows,
                  "diagnostic_summary_rows_equal_6": len(diagnostic_summary) == 6,
                  "limits_rows_equal_5": len(limits) == 5,

                  "selected_route_is_valid": route_is_valid,
                  "route_options_rows_equal_4": len(route_options) == 4,
                  "route_decision_rows_equal_1": len(route_decision) == 1,
                  "selected_route_packet_rows_equal_1": len(selected_route_packet) == 1,
                  "gap_update_rows_equal_5": len(gap_update) == 5,
                  "post_audit_status_rows_equal_4": len(post_audit_status) == 4,

                  "findings_support_false": false_col(findings, "support_allowed"),
                  "route_decision_support_false": false_col(route_decision, "support_allowed"),
                  "selected_route_packet_support_false": false_col(selected_route_packet, "support_allowed"),
                  "route_decision_score_false": false_col(route_decision, "score_valid"),
                  "selected_route_packet_score_false": false_col(selected_route_packet, "score_valid"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary368 = {
                  "version": "v4.368",
                  "route_name": "v4_368_post_audit_route_decision_no_support_claims",
                  "expected_result": "v4_368_post_audit_route_decision_passed_no_support_claims",
                  "input_version": "v4.367",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "selected_post_audit_route": selected_route,
                  "selected_next_route": next_route,
                  "guarded_diagonal_chi_square_sum": guarded_chi_square_sum,
                  "degrees_of_freedom_candidate": dof_candidate,
                  "chi_square_term_rows": chi_square_term_rows,
                  "full_covariance_available": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
              }

              route_options.to_csv(outdir / "v4_368_post_audit_route_options_NO_SUPPORT.csv", index=False)
              route_decision.to_csv(outdir / "v4_368_post_audit_route_decision_NO_SUPPORT.csv", index=False)
              selected_route_packet.to_csv(outdir / "v4_368_selected_route_packet_NO_SUPPORT.csv", index=False)
              gap_update.to_csv(outdir / "v4_368_gap_status_after_post_audit_route_decision.csv", index=False)
              post_audit_status.to_csv(outdir / "v4_368_post_audit_status_summary.csv", index=False)
              stage_ledger.to_csv(outdir / "v4_368_input_v4_367_stage_ledger_preserved.csv", index=False)
              ruled_out.to_csv(outdir / "v4_368_input_v4_367_ruled_out_open_gaps_preserved.csv", index=False)
              findings.to_csv(outdir / "v4_368_input_v4_367_guarded_findings_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_368_rule_checks.csv", index=False)

              (outdir / "v4_368_summary.json").write_text(json.dumps(summary368, indent=2))

              summary_md = f"""# TAIRID v4.368 Post-Audit Route Decision — No Support Claims

          Expected result: `{summary368["expected_result"]}`

          {summary368["rules_passed"]} / {summary368["rules_total"]} rules passed

          failed_gates = {summary368["failed_gates"]}

          selected_post_audit_route = `{summary368["selected_post_audit_route"]}`

          selected_next_route = `{summary368["selected_next_route"]}`

          guarded_diagonal_chi_square_sum = {summary368["guarded_diagonal_chi_square_sum"]}

          full_covariance_available = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step records the post-audit route decision only.

          It does **not** compute anything new.

          It does **not** make support claims.
          """
              (outdir / "v4_368_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary368, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_368_post_audit_route_decision_no_support.py

      - name: Run v4.368 post audit route decision no support
        run: |
          python run_v4_368_post_audit_route_decision_no_support.py

      - name: Upload v4.368 post audit route decision artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-368-post-audit-route-decision-no-support-output
          path: |
            tairid_v4_368_post_audit_route_decision_no_support_output/
            tairid_v4_368_post_audit_route_decision_no_support_output.zip
