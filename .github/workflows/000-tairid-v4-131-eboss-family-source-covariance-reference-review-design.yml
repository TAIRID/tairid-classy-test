name: 000 TAIRID v4.131 eBOSS Family Source Covariance Reference Review Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-131-eboss-family-source-covariance-reference-review-design.yml"

jobs:
  tairid-v4-131-eboss-family-source-covariance-reference-review-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.131 eBOSS family source covariance reference review design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_131_eboss_family_source_covariance_reference_review_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_131_eboss_family_source_covariance_reference_review_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_131_eboss_family_source_covariance_reference_review_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This does not recompute the expanded bridge.",
              "This designs the eBOSS source, covariance, overlap, and reference-review route after v4.130 localized the only pressure flag to eBOSS.",
              "A pass means the eBOSS review probe has clear targets, checks, source/covariance branches, reference-upgrade branches, and blocked claims."
          ]

          UPSTREAM_LOCKS = {
              "v4_130_expanded_growth_sensitivity_audit": {
                  "readiness_label": "expanded_growth_sensitivity_audit_passed_eBOSS_pressure_local_not_global_ready_for_eBOSS_source_covariance_reference_review_design",
                  "expanded_bridge_pressure_computed_upstream": True,
                  "bridge_lane_count": 6,
                  "pressure_lane_count": 1,
                  "no_pressure_lane_count": 5,
                  "eBOSS_pressure_localized": True,
                  "eBOSS_pressure_z": -1.4177985723696922,
                  "eBOSS_chi2": 5.010152791813537,
                  "eBOSS_dof": 3,
                  "eBOSS_mixed_residual_signs": True,
                  "eBOSS_strongest_abs_residual_target": "z0850_eBOSS_ELG",
                  "eBOSS_strongest_abs_residual": -0.13197134286858048,
                  "eBOSS_reference_all_interpolation": True,
                  "eBOSS_same_program_covariance_limited": True,
                  "expanded_all_non_pressure": True,
                  "BOSS_core_non_pressure": True,
                  "low_z_BOSS_non_pressure": True,
                  "global_pressure_absent": True,
                  "family_local_pressure_needs_review": True,
                  "full_planck_posterior_available": False,
                  "final_pressure_ready": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_129_guarded_expanded_growth_bridge_probe": {
                  "readiness_label": "guarded_expanded_growth_bridge_probe_passed_eBOSS_family_pressure_localized_not_final_ready_for_expanded_growth_sensitivity_audit",
                  "expanded_bridge_pressure_computed": True,
                  "expanded_reference_target_support_exists": True,
                  "full_planck_posterior_available": False,
                  "interpolation_fallback_active": True,
                  "eBOSS_family_pressure_recorded": True,
                  "expanded_all_non_pressure": True,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          EBOSS_COMPONENTS_TO_REVIEW = [
              {
                  "component_id": "eBOSS_LRG_z0698",
                  "target_id": "z0698_eBOSS_LRG",
                  "z": 0.698,
                  "observed_fsigma8": 0.473,
                  "observed_sigma": 0.044,
                  "reference_fsigma8_support": 0.4623052016766069,
                  "residual_observed_minus_reference": 0.010694798323393095,
                  "residual_sign": "positive",
                  "current_reference_status": "interpolation_fallback_not_final",
                  "current_covariance_status": "same_program_diagonal_sensitivity_fallback",
                  "review_priority": 2,
                  "review_reason": "LRG is a same-program positive residual component in the local eBOSS pressure slice."
              },
              {
                  "component_id": "eBOSS_ELG_z0850",
                  "target_id": "z0850_eBOSS_ELG",
                  "z": 0.85,
                  "observed_fsigma8": 0.315,
                  "observed_sigma": 0.095,
                  "reference_fsigma8_support": 0.4469713428685805,
                  "residual_observed_minus_reference": -0.13197134286858048,
                  "residual_sign": "negative",
                  "current_reference_status": "interpolation_fallback_not_final",
                  "current_covariance_status": "same_program_diagonal_sensitivity_fallback",
                  "review_priority": 1,
                  "review_reason": "ELG carries the strongest absolute residual and drives concern inside the local eBOSS pressure slice."
              },
              {
                  "component_id": "eBOSS_QSO_z1480",
                  "target_id": "z1480_eBOSS_QSO",
                  "z": 1.48,
                  "observed_fsigma8": 0.462,
                  "observed_sigma": 0.045,
                  "reference_fsigma8_support": 0.3834165333353129,
                  "residual_observed_minus_reference": 0.07858346666468713,
                  "residual_sign": "positive",
                  "current_reference_status": "interpolation_fallback_not_final",
                  "current_covariance_status": "same_program_diagonal_sensitivity_fallback",
                  "review_priority": 3,
                  "review_reason": "QSO is positive while ELG is negative, so the eBOSS slice is mixed rather than one-directional."
              }
          ]

          EBOSS_REVIEW_DIMENSIONS = [
              {
                  "dimension_id": "value_source_lock",
                  "question": "Are the LRG, ELG, and QSO fσ8 values, uncertainties, effective redshifts, and observable definitions source-locked to the correct eBOSS files/papers?",
                  "required_next": True,
                  "failure_action": "Park or sensitivity-only any component that cannot be source-locked."
              },
              {
                  "dimension_id": "covariance_or_overlap_status",
                  "question": "Is there a source covariance, consensus covariance, or defensible overlap model for the eBOSS LRG/ELG/QSO family slice?",
                  "required_next": True,
                  "failure_action": "Keep eBOSS as diagonal sensitivity-only and block interpretation."
              },
              {
                  "dimension_id": "reference_support_upgrade",
                  "question": "Can the eBOSS redshifts receive stronger reference support than interpolation fallback?",
                  "required_next": True,
                  "failure_action": "Keep eBOSS pressure labeled reference-fallback-limited."
              },
              {
                  "dimension_id": "component_drilldown",
                  "question": "Does the eBOSS pressure survive when ELG, LRG, and QSO are tested one-at-a-time and leave-one-out?",
                  "required_next": True,
                  "failure_action": "Do not interpret the family pressure as one coherent effect."
              },
              {
                  "dimension_id": "family_lane_membership",
                  "question": "Should eBOSS remain a same-program family slice, be split by tracer, or move to sensitivity-only until covariance is found?",
                  "required_next": True,
                  "failure_action": "Do not merge eBOSS into a primary expanded bridge."
              }
          ]

          NEXT_PROBE_SOURCE_TARGETS = [
              {
                  "source_target_id": "eBOSS_LRG_primary_source_locator",
                  "component_id": "eBOSS_LRG_z0698",
                  "candidate_urls_or_locators": "official_SDSS_DR16_eBOSS_LRG_growth_or_arxiv_2007_08991",
                  "target_objects": "value_table,covariance_or_likelihood_file,effective_redshift,observable_definition",
                  "success_status": "source_locked_or_manual_needed"
              },
              {
                  "source_target_id": "eBOSS_ELG_primary_source_locator",
                  "component_id": "eBOSS_ELG_z0850",
                  "candidate_urls_or_locators": "official_SDSS_DR16_eBOSS_ELG_growth_or_arxiv_locator",
                  "target_objects": "value_table,covariance_or_likelihood_file,effective_redshift,observable_definition",
                  "success_status": "source_locked_or_manual_needed"
              },
              {
                  "source_target_id": "eBOSS_QSO_primary_source_locator",
                  "component_id": "eBOSS_QSO_z1480",
                  "candidate_urls_or_locators": "official_SDSS_DR16_eBOSS_QSO_growth_or_arxiv_locator",
                  "target_objects": "value_table,covariance_or_likelihood_file,effective_redshift,observable_definition",
                  "success_status": "source_locked_or_manual_needed"
              },
              {
                  "source_target_id": "eBOSS_DR16_combined_covariance_locator",
                  "component_id": "eBOSS_family",
                  "candidate_urls_or_locators": "official_SDSS_DR16_eBOSS_cosmology_or_likelihood_data_release",
                  "target_objects": "cross_tracer_covariance,consensus_covariance,likelihood_package,overlap_notes",
                  "success_status": "covariance_found_or_overlap_model_needed"
              },
              {
                  "source_target_id": "eBOSS_reference_upgrade_locator",
                  "component_id": "eBOSS_reference_targets",
                  "candidate_urls_or_locators": "CAMB_or_stored_chain_reference_support_design",
                  "target_objects": "reference_fsigma8_at_0.698_0.85_1.48,reference_covariance_or_declared_fallback",
                  "success_status": "reference_upgrade_ready_or_fallback_preserved"
              }
          ]

          EBOSS_REVIEW_LANE_PLAN = [
              {
                  "lane_id": "eBOSS_family_current_replay",
                  "members": "LRG_z0698,ELG_z0850,QSO_z1480",
                  "purpose": "Replay current family pressure under the same guarded assumptions.",
                  "required_next": True
              },
              {
                  "lane_id": "eBOSS_leave_one_out_without_LRG",
                  "members": "ELG_z0850,QSO_z1480",
                  "purpose": "Check whether LRG is stabilizing or driving the family pressure.",
                  "required_next": True
              },
              {
                  "lane_id": "eBOSS_leave_one_out_without_ELG",
                  "members": "LRG_z0698,QSO_z1480",
                  "purpose": "Check whether the strongest negative ELG residual drives the family pressure.",
                  "required_next": True
              },
              {
                  "lane_id": "eBOSS_leave_one_out_without_QSO",
                  "members": "LRG_z0698,ELG_z0850",
                  "purpose": "Check whether QSO counterbalances or strengthens the family pressure.",
                  "required_next": True
              },
              {
                  "lane_id": "eBOSS_single_LRG",
                  "members": "LRG_z0698",
                  "purpose": "Single-component diagnostic only.",
                  "required_next": True
              },
              {
                  "lane_id": "eBOSS_single_ELG",
                  "members": "ELG_z0850",
                  "purpose": "Single-component diagnostic for the strongest negative residual.",
                  "required_next": True
              },
              {
                  "lane_id": "eBOSS_single_QSO",
                  "members": "QSO_z1480",
                  "purpose": "Single-component diagnostic only.",
                  "required_next": True
              },
              {
                  "lane_id": "expanded_all_without_eBOSS",
                  "members": "all_expanded_non_eBOSS_candidates",
                  "purpose": "Check whether the expanded non-pressure result persists after removing eBOSS.",
                  "required_next": True
              }
          ]

          REVIEW_OUTCOME_RULES = [
              {
                  "outcome_id": "source_locked_covariance_found",
                  "condition": "values and covariance/overlap source are located",
                  "allowed_next": "rerun eBOSS review probe with upgraded covariance status",
                  "claim_boundary": "still diagnostic until sensitivity audited"
              },
              {
                  "outcome_id": "source_locked_no_covariance",
                  "condition": "values are source-locked but covariance is not located",
                  "allowed_next": "keep eBOSS diagonal sensitivity-only and run leave-one-out diagnostics",
                  "claim_boundary": "no final interpretation"
              },
              {
                  "outcome_id": "reference_upgrade_possible",
                  "condition": "CAMB/chain/stored reference support can be built for eBOSS redshifts",
                  "allowed_next": "replace interpolation fallback and rerun eBOSS diagnostics",
                  "claim_boundary": "still not final posterior unless covariance is complete"
              },
              {
                  "outcome_id": "manual_needed",
                  "condition": "automatic source/covariance/reference lookup is incomplete",
                  "allowed_next": "write manual locator targets and park final claims",
                  "claim_boundary": "no final interpretation"
              },
              {
                  "outcome_id": "pressure_disappears_under_review",
                  "condition": "local eBOSS pressure vanishes under source/covariance/reference cleanup",
                  "allowed_next": "record as artifact/fallback sensitivity and continue external comparison plan",
                  "claim_boundary": "not proof"
              },
              {
                  "outcome_id": "pressure_persists_under_review",
                  "condition": "local eBOSS pressure survives source/covariance/reference cleanup",
                  "allowed_next": "route to formal sensitivity audit and external standard cosmology comparison",
                  "claim_boundary": "still not proof or disproof"
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The eBOSS review design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The eBOSS local pressure flag is a final result.",
              "The eBOSS local pressure flag proves or disproves TAIRID.",
              "Same-program eBOSS points are independent by default.",
              "Interpolation fallback is equivalent to full CAMB/chain reference support.",
              "No eBOSS source/covariance review is needed.",
              "A successful review design is the same as a successful review probe."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_132_eBOSS_family_review_probe",
                  "purpose": "Attempt eBOSS source/covariance/reference-status review and build leave-one-out/single-component diagnostic readiness.",
                  "why_next": "v4.131 defines the exact eBOSS review targets and gate logic."
              },
              {
                  "priority": 2,
                  "route_id": "v4_133_eBOSS_leave_one_out_bridge_probe",
                  "purpose": "Compute eBOSS leave-one-out and single-component diagnostic lanes after source status is recorded.",
                  "why_next": "The pressure must be localized within eBOSS before interpretation."
              },
              {
                  "priority": 3,
                  "route_id": "v4_134_CAMB_or_chain_expanded_reference_upgrade_design",
                  "purpose": "Design stronger reference support for all expanded redshifts, replacing interpolation fallback where possible.",
                  "why_next": "Reference interpolation is still a major limitation."
              },
              {
                  "priority": 4,
                  "route_id": "v4_135_external_standard_cosmology_comparison_plan",
                  "purpose": "Design comparison language against normal ΛCDM growth pipelines and literature constraints.",
                  "why_next": "Any persistent local pressure must be contextualized before public-facing claims."
              }
          ]

          failed_gates = []
          warnings = [
              "design_only",
              "eBOSS_local_pressure_not_final",
              "same_program_covariance_review_required",
              "reference_interpolation_fallback_review_required",
              "leave_one_out_diagnostics_required_next",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_130_expanded_growth_sensitivity_audit"]

          if upstream["eBOSS_pressure_localized"] is not True:
              failed_gates.append("upstream_eBOSS_pressure_not_localized")

          if upstream["global_pressure_absent"] is not True:
              failed_gates.append("upstream_global_pressure_absence_not_carried")

          if upstream["family_local_pressure_needs_review"] is not True:
              failed_gates.append("upstream_family_review_need_not_carried")

          if upstream["eBOSS_reference_all_interpolation"] is not True:
              failed_gates.append("upstream_reference_fallback_not_carried")

          if upstream["eBOSS_same_program_covariance_limited"] is not True:
              failed_gates.append("upstream_same_program_covariance_limit_not_carried")

          if len(EBOSS_COMPONENTS_TO_REVIEW) != 3:
              failed_gates.append("eboss_component_count_incorrect")

          if not any(row["component_id"] == "eBOSS_ELG_z0850" and row["review_priority"] == 1 for row in EBOSS_COMPONENTS_TO_REVIEW):
              failed_gates.append("ELG_strongest_residual_not_prioritized")

          if len(EBOSS_REVIEW_DIMENSIONS) < 5:
              failed_gates.append("eboss_review_dimensions_incomplete")

          if len(NEXT_PROBE_SOURCE_TARGETS) < 5:
              failed_gates.append("next_probe_source_targets_incomplete")

          if len(EBOSS_REVIEW_LANE_PLAN) < 8:
              failed_gates.append("eboss_review_lane_plan_incomplete")

          if len(REVIEW_OUTCOME_RULES) < 6:
              failed_gates.append("review_outcome_rules_incomplete")

          if not all(row["required_next"] is True for row in EBOSS_REVIEW_LANE_PLAN):
              failed_gates.append("not_all_eboss_review_lanes_required")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "eboss local pressure flag is a final result",
              "eboss local pressure flag proves or disproves tairid",
              "same-program eboss points are independent by default",
              "no eboss source/covariance review is needed",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "eBOSS_family_source_covariance_reference_review_design_passed_ready_for_eBOSS_family_review_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_eBOSS_localization_carried",
                  "pass": upstream["eBOSS_pressure_localized"] is True and upstream["global_pressure_absent"] is True,
                  "result": "v4.130 local eBOSS pressure and global non-pressure carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "eBOSS_components_declared",
                  "pass": len(EBOSS_COMPONENTS_TO_REVIEW) == 3,
                  "result": "LRG, ELG, and QSO components declared",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "ELG_strongest_residual_prioritized",
                  "pass": any(row["component_id"] == "eBOSS_ELG_z0850" and row["review_priority"] == 1 for row in EBOSS_COMPONENTS_TO_REVIEW),
                  "result": "ELG z=0.85 is prioritized as strongest absolute residual",
                  "boundary": "Residual drilldown only."
              },
              {
                  "rule_id": "review_dimensions_declared",
                  "pass": len(EBOSS_REVIEW_DIMENSIONS) >= 5,
                  "result": f"review_dimension_count={len(EBOSS_REVIEW_DIMENSIONS)}",
                  "boundary": "No source fetch yet."
              },
              {
                  "rule_id": "source_targets_declared",
                  "pass": len(NEXT_PROBE_SOURCE_TARGETS) >= 5,
                  "result": f"source_target_count={len(NEXT_PROBE_SOURCE_TARGETS)}",
                  "boundary": "Locator design only."
              },
              {
                  "rule_id": "leave_one_out_lane_plan_declared",
                  "pass": len(EBOSS_REVIEW_LANE_PLAN) >= 8,
                  "result": f"review_lane_count={len(EBOSS_REVIEW_LANE_PLAN)}",
                  "boundary": "No bridge recomputation yet."
              },
              {
                  "rule_id": "outcome_rules_declared",
                  "pass": len(REVIEW_OUTCOME_RULES) >= 6,
                  "result": f"outcome_rule_count={len(REVIEW_OUTCOME_RULES)}",
                  "boundary": "No interpretation yet."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": True,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_131_rules_passed")

          if failed_gates:
              readiness_label = "eBOSS_family_source_covariance_reference_review_design_failed"
              next_allowed_step = "Repair eBOSS family review design before eBOSS family review probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.132 eBOSS family review probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_eBOSS_pressure_localized": upstream["eBOSS_pressure_localized"],
              "upstream_global_pressure_absent": upstream["global_pressure_absent"],
              "upstream_eBOSS_pressure_z": upstream["eBOSS_pressure_z"],
              "upstream_eBOSS_chi2": upstream["eBOSS_chi2"],
              "upstream_eBOSS_dof": upstream["eBOSS_dof"],
              "component_count": len(EBOSS_COMPONENTS_TO_REVIEW),
              "review_dimension_count": len(EBOSS_REVIEW_DIMENSIONS),
              "source_target_count": len(NEXT_PROBE_SOURCE_TARGETS),
              "review_lane_count": len(EBOSS_REVIEW_LANE_PLAN),
              "outcome_rule_count": len(REVIEW_OUTCOME_RULES),
              "ELG_strongest_residual_prioritized": True,
              "source_fetch_performed": False,
              "bridge_recomputed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "eBOSS_components_to_review": EBOSS_COMPONENTS_TO_REVIEW,
              "eBOSS_review_dimensions": EBOSS_REVIEW_DIMENSIONS,
              "next_probe_source_targets": NEXT_PROBE_SOURCE_TARGETS,
              "eBOSS_review_lane_plan": EBOSS_REVIEW_LANE_PLAN,
              "review_outcome_rules": REVIEW_OUTCOME_RULES,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "source_fetch_performed": False,
                  "bridge_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_131_eBOSS_family_source_covariance_reference_review_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "eBOSS_components_to_review_v4_131.csv",
              EBOSS_COMPONENTS_TO_REVIEW,
