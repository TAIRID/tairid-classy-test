name: Run TAIRID SH0ES compact ladder parameter map v1

on:
  workflow_dispatch:

jobs:
  run-shoes-compact-ladder-parameter-map-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy astropy matplotlib

      - name: Run SH0ES compact ladder parameter map v1
        run: |
          python run_shoes_compact_ladder_parameter_map_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-compact-ladder-parameter-map-v1-output
          path: |
            shoes_compact_ladder_parameter_map_v1_outputs/**
