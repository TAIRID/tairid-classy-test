name: 000 TAIRID v4.87 Reference Uncertainty Chain Sample Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-87-reference-uncertainty-chain-sample-design.yml"

jobs:
  tairid-v4-87-reference-uncertainty-chain-sample-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.87 reference uncertainty chain sample design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_87_reference_uncertainty_chain_sample_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_87_reference_uncertainty_chain_sample_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_87_reference_uncertainty_chain_sample_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not run CAMB.",
              "This does not compute Planck reference uncertainty.",
              "This does not compute a covariance matrix.",
              "This does not run likelihood, BIC, posterior comparison, or model selection.",
              "This designs the next chain-sample parser route after the single fixture residual audit passed.",
              "A pass means the reference-uncertainty sample path is specified and ready for a bounded tiny subset parser probe."
          ]

          UPSTREAM_LOCKS = {
              "v4_86_single_fixture_residual_audit": {
                  "readiness_label": "single_fixture_residual_audit_passed_ready_for_reference_uncertainty_chain_sample_design",
                  "single_fixture_residual_audit_run": True,
                  "single_fixture_residual_audit_passed": True,
                  "accepted_primary_variant": "theta_h0_none_contract_path",
                  "accepted_locked_orientation": "reversed_raw_order",
                  "primary_point_count": 5,
                  "primary_residual_count": 10,
                  "primary_combined_rms": 0.00018044389560315524,
                  "primary_combined_max_abs": 0.00026632780896707064,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_85_single_fixture_output_shape_and_orientation_lock": {
                  "locked_orientation": "reversed_raw_order",
                  "orientation_locked_for_next_test": True,
                  "Planck_reference_uncertainty_computed": False
              },
              "v4_84_3_camb_external_runner_json_decode_repair": {
                  "CAMB_imported": True,
                  "CAMB_version": "1.6.6",
                  "any_variant_complete_arrays": True,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          SELECTED_ROOT = "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE"

          CHAIN_MEMBER_DESIGN = [
              {
                  "member_role": "parameter_names",
                  "member_template": SELECTED_ROOT + ".paramnames",
                  "needed_for": "Map chain sample columns to parameter names.",
                  "bounded_probe_next": True,
                  "parse_now": False
              },
              {
                  "member_role": "minimum_point_fixture",
                  "member_template": SELECTED_ROOT + ".minimum",
                  "needed_for": "Preserve the point fixture already reproduced by CAMB.",
                  "bounded_probe_next": False,
                  "parse_now": False
              },
              {
                  "member_role": "chain_sample_file_1",
                  "member_template": SELECTED_ROOT + "_1.txt",
                  "needed_for": "Tiny bounded posterior sample-row probe.",
                  "bounded_probe_next": True,
                  "parse_now": False
              },
              {
                  "member_role": "chain_sample_file_2",
                  "member_template": SELECTED_ROOT + "_2.txt",
                  "needed_for": "Future multi-file posterior sample coverage after tiny probe.",
                  "bounded_probe_next": False,
                  "parse_now": False
              },
              {
                  "member_role": "chain_sample_file_3_or_more",
                  "member_template": SELECTED_ROOT + "_N.txt",
                  "needed_for": "Future full posterior coverage only after bounded probe succeeds.",
                  "bounded_probe_next": False,
                  "parse_now": False
              }
          ]

          CHAIN_SAMPLE_SCHEMA = [
              {
                  "column_position": 0,
                  "column_name": "sample_weight",
                  "meaning": "Posterior sample weight from Planck/CosmoMC chain row.",
                  "required": True,
                  "use_in_next_probe": True,
                  "failure_if_missing": True
              },
              {
                  "column_position": 1,
                  "column_name": "minus_loglike_or_loglike_proxy",
                  "meaning": "Likelihood diagnostic column; preserve but do not use as weight unless verified.",
                  "required": True,
                  "use_in_next_probe": True,
                  "failure_if_missing": False
              },
              {
                  "column_position": "2_plus_param_index",
                  "column_name": "parameter_values",
                  "meaning": "Parameter columns mapped by .paramnames order.",
                  "required": True,
                  "use_in_next_probe": True,
                  "failure_if_missing": True
              }
          ]

          PARAMETER_MAPPING_CONTRACT = [
              {
                  "source_parameter": "omegabh2",
                  "required_for": "CAMB set_cosmology",
                  "future_camb_name": "ombh2",
                  "mapping_operation": "identity",
                  "required_from_chain": True,
                  "point_fixture_value": 0.02237737
              },
              {
                  "source_parameter": "omegach2",
                  "required_for": "CAMB set_cosmology",
                  "future_camb_name": "omch2",
                  "mapping_operation": "identity",
                  "required_from_chain": True,
                  "point_fixture_value": 0.1201035
              },
              {
                  "source_parameter": "theta",
                  "required_for": "CAMB set_cosmology",
                  "future_camb_name": "cosmomc_theta",
                  "mapping_operation": "divide_by_100_if_chain_label_is_100theta_MC_else verify label",
                  "required_from_chain": True,
                  "point_fixture_value": 1.04092
              },
              {
                  "source_parameter": "tau",
                  "required_for": "CAMB set_cosmology",
                  "future_camb_name": "tau",
                  "mapping_operation": "identity",
                  "required_from_chain": True,
                  "point_fixture_value": 0.05430138
              },
              {
                  "source_parameter": "logA",
                  "required_for": "CAMB InitPower",
                  "future_camb_name": "As",
                  "mapping_operation": "As = exp(logA) / 1e10",
                  "required_from_chain": True,
                  "point_fixture_value": 3.044726
              },
              {
                  "source_parameter": "ns",
                  "required_for": "CAMB InitPower",
                  "future_camb_name": "ns",
                  "mapping_operation": "identity",
                  "required_from_chain": True,
                  "point_fixture_value": 0.9658923
              }
          ]

          TARGET_QUANTITY_SCHEMA = [
              {"z_key": "015", "z": 0.15, "quantity": "sigma8z", "target_name": "sigma8z015", "source": "CAMB get_sigma8 after orientation lock"},
              {"z_key": "015", "z": 0.15, "quantity": "fsigma8", "target_name": "fsigma8z015", "source": "CAMB get_fsigma8 after orientation lock"},
              {"z_key": "038", "z": 0.38, "quantity": "sigma8z", "target_name": "sigma8z038", "source": "CAMB get_sigma8 after orientation lock"},
              {"z_key": "038", "z": 0.38, "quantity": "fsigma8", "target_name": "fsigma8z038", "source": "CAMB get_fsigma8 after orientation lock"},
              {"z_key": "051", "z": 0.51, "quantity": "sigma8z", "target_name": "sigma8z051", "source": "CAMB get_sigma8 after orientation lock"},
              {"z_key": "051", "z": 0.51, "quantity": "fsigma8", "target_name": "fsigma8z051", "source": "CAMB get_fsigma8 after orientation lock"},
              {"z_key": "061", "z": 0.61, "quantity": "sigma8z", "target_name": "sigma8z061", "source": "CAMB get_sigma8 after orientation lock"},
              {"z_key": "061", "z": 0.61, "quantity": "fsigma8", "target_name": "fsigma8z061", "source": "CAMB get_fsigma8 after orientation lock"},
              {"z_key": "233", "z": 2.33, "quantity": "sigma8z", "target_name": "sigma8z233", "source": "CAMB get_sigma8 after orientation lock"},
              {"z_key": "233", "z": 2.33, "quantity": "fsigma8", "target_name": "fsigma8z233", "source": "CAMB get_fsigma8 after orientation lock"}
          ]

          COVARIANCE_DESIGN = [
              {
                  "object_name": "full_target_vector",
                  "dimension": 10,
                  "contents": "sigma8z and fsigma8 values at five target redshifts.",
                  "computed_now": False,
                  "needed_before_final_RSD_pressure": True
              },
              {
                  "object_name": "fsigma8_only_vector",
                  "dimension": 5,
                  "contents": "fsigma8 values at five RSD redshift targets.",
                  "computed_now": False,
                  "needed_before_final_RSD_pressure": True
              },
              {
                  "object_name": "weighted_mean_vector",
                  "dimension": 10,
                  "contents": "Weighted posterior mean across chain samples.",
                  "computed_now": False,
                  "needed_before_final_RSD_pressure": True
              },
              {
                  "object_name": "weighted_covariance_matrix",
                  "dimension": "10x10",
                  "contents": "Posterior covariance across sigma8z/fsigma8 redshift targets.",
                  "computed_now": False,
                  "needed_before_final_RSD_pressure": True
              },
              {
                  "object_name": "fsigma8_covariance_matrix",
                  "dimension": "5x5",
                  "contents": "Sub-covariance for fsigma8-only RSD comparison.",
                  "computed_now": False,
                  "needed_before_final_RSD_pressure": True
              }
          ]

          TINY_SUBSET_PARSER_CONTRACT = [
              {
                  "step": 1,
                  "action": "Use locked ZIP64 central directory offsets from previous manifest work.",
                  "output": "Locate selected root .paramnames and _1.txt chain sample member.",
                  "hard_boundary": "No full zip download."
              },
              {
                  "step": 2,
                  "action": "Fetch .paramnames by bounded range read.",
                  "output": "Column-name list and primary-parameter column indexes.",
                  "hard_boundary": "No posterior inference yet."
              },
              {
                  "step": 3,
                  "action": "Fetch a small prefix of one chain sample text member.",
                  "output": "First N valid sample rows with weight, loglike proxy, and primary inputs.",
                  "hard_boundary": "Tiny parser probe only."
              },
              {
                  "step": 4,
                  "action": "Verify row width equals 2 + parameter count.",
                  "output": "Schema pass/fail with row count.",
                  "hard_boundary": "Do not silently accept malformed rows."
              },
              {
                  "step": 5,
                  "action": "Build sample fixture packets but do not run all CAMB samples yet.",
                  "output": "Sample packet CSV for later bounded solver micro-batch.",
                  "hard_boundary": "No reference uncertainty computation yet."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A weighted covariance matrix was computed.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The reference uncertainty design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The single fixture residual audit is enough for final RSD pressure.",
              "The .minimum sidecar file is posterior covariance.",
              "A tiny subset parser probe is the same as full reference uncertainty."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_88_chain_sample_tiny_subset_parser_probe",
                  "purpose": "Bounded parser probe for .paramnames and a tiny prefix of one chain sample file.",
                  "why_next": "We need real sample rows and weights before any reference uncertainty computation."
              },
              {
                  "priority": 2,
                  "route_id": "v4_89_sample_packet_microbatch_solver_design",
                  "purpose": "Design a tiny CAMB micro-batch over parsed sample packets.",
                  "why_next": "Posterior uncertainty requires solver outputs across multiple weighted samples."
              },
              {
                  "priority": 3,
                  "route_id": "v4_90_weighted_covariance_formula_lock",
                  "purpose": "Lock the weighted covariance formula and redshift target ordering.",
                  "why_next": "Final RSD pressure requires a reference covariance, not a point fixture."
              },
              {
                  "priority": 4,
                  "route_id": "v4_91_ELG_or_WiggleZ_parallel_backlog",
                  "purpose": "Parallel route for parked growth-family incompleteness.",
                  "why_next": "ELG and WiggleZ remain incomplete."
              }
          ]

          failed_gates = []
          warnings = [
              "reference_uncertainty_design_only",
              "no_chain_sample_parse",
              "no_CAMB_run",
              "no_covariance_computation",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          required_parameters = {"omegabh2", "omegach2", "theta", "tau", "logA", "ns"}
          mapped_parameters = {row["source_parameter"] for row in PARAMETER_MAPPING_CONTRACT}

          required_targets = {
              "sigma8z015", "fsigma8z015",
              "sigma8z038", "fsigma8z038",
              "sigma8z051", "fsigma8z051",
              "sigma8z061", "fsigma8z061",
              "sigma8z233", "fsigma8z233"
          }
          declared_targets = {row["target_name"] for row in TARGET_QUANTITY_SCHEMA}

          if UPSTREAM_LOCKS["v4_86_single_fixture_residual_audit"]["single_fixture_residual_audit_passed"] is not True:
              failed_gates.append("upstream_single_fixture_residual_not_passed")

          if UPSTREAM_LOCKS["v4_86_single_fixture_residual_audit"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          if mapped_parameters != required_parameters:
              failed_gates.append("required_parameter_mapping_incomplete")

          if declared_targets != required_targets:
              failed_gates.append("target_quantity_schema_incomplete")

          if len(TARGET_QUANTITY_SCHEMA) != 10:
              failed_gates.append("target_quantity_count_not_10")

          if not any(row["column_name"] == "sample_weight" for row in CHAIN_SAMPLE_SCHEMA):
              failed_gates.append("sample_weight_column_missing")

          if not any(row["object_name"] == "weighted_covariance_matrix" and row["computed_now"] is False for row in COVARIANCE_DESIGN):
              failed_gates.append("weighted_covariance_design_missing")

          if not any(row["member_role"] == "chain_sample_file_1" and row["bounded_probe_next"] is True for row in CHAIN_MEMBER_DESIGN):
              failed_gates.append("chain_sample_file_1_not_selected_for_next_probe")

          if not any(row["member_role"] == "parameter_names" and row["bounded_probe_next"] is True for row in CHAIN_MEMBER_DESIGN):
              failed_gates.append("paramnames_not_selected_for_next_probe")

          if len(TINY_SUBSET_PARSER_CONTRACT) < 5:
              failed_gates.append("tiny_subset_parser_contract_too_short")

          if any(row["computed_now"] is not False for row in COVARIANCE_DESIGN):
              failed_gates.append("covariance_marked_computed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "weighted covariance matrix was computed",
              "final rsd pressure score",
              "validates tairid cosmology",
              "minimum sidecar file is posterior covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "reference_uncertainty_chain_sample_design_passed_ready_for_chain_sample_tiny_subset_parser_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_single_fixture_pass_carried",
                  "pass": UPSTREAM_LOCKS["v4_86_single_fixture_residual_audit"]["single_fixture_residual_audit_passed"] is True,
                  "result": "v4.86 point fixture residual audit passed",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "reference_uncertainty_not_computed",
                  "pass": True,
                  "result": "Planck reference uncertainty remains uncomputed",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "chain_members_declared",
                  "pass": len(CHAIN_MEMBER_DESIGN) >= 5,
                  "result": f"{len(CHAIN_MEMBER_DESIGN)} chain member design rows declared",
                  "boundary": "No member parsing yet."
              },
              {
                  "rule_id": "sample_schema_declared",
                  "pass": len(CHAIN_SAMPLE_SCHEMA) == 3,
                  "result": "weight, loglike proxy, and parameter columns declared",
                  "boundary": "No sample rows parsed."
              },
              {
                  "rule_id": "parameter_mapping_contract_complete",
                  "pass": mapped_parameters == required_parameters,
                  "result": "six CAMB input mappings declared",
                  "boundary": "No CAMB run."
              },
              {
                  "rule_id": "target_quantity_schema_complete",
                  "pass": declared_targets == required_targets and len(TARGET_QUANTITY_SCHEMA) == 10,
                  "result": "ten target quantities declared",
                  "boundary": "No covariance computed."
              },
              {
                  "rule_id": "covariance_design_declared_not_computed",
                  "pass": all(row["computed_now"] is False for row in COVARIANCE_DESIGN),
                  "result": "weighted covariance objects declared but not computed",
                  "boundary": "No posterior covariance."
              },
              {
                  "rule_id": "tiny_subset_parser_contract_declared",
                  "pass": len(TINY_SUBSET_PARSER_CONTRACT) >= 5,
                  "result": "bounded parser contract declared",
                  "boundary": "Next step only."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 14,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_87_rules_passed")

          if failed_gates:
              readiness_label = "reference_uncertainty_chain_sample_design_failed"
              next_allowed_step = "Repair reference uncertainty design before any chain sample parser probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.88 chain sample tiny subset parser probe. "
                  "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_single_fixture_residual_audit_passed": True,
              "selected_root": SELECTED_ROOT,
              "chain_member_design_count": len(CHAIN_MEMBER_DESIGN),
              "chain_sample_schema_count": len(CHAIN_SAMPLE_SCHEMA),
              "parameter_mapping_count": len(PARAMETER_MAPPING_CONTRACT),
              "target_quantity_count": len(TARGET_QUANTITY_SCHEMA),
              "covariance_design_count": len(COVARIANCE_DESIGN),
              "tiny_subset_parser_contract_step_count": len(TINY_SUBSET_PARSER_CONTRACT),
              "required_parameters_mapped": mapped_parameters == required_parameters,
              "required_targets_declared": declared_targets == required_targets,
              "chain_samples_parsed": False,
              "CAMB_run": False,
              "Planck_reference_uncertainty_computed": False,
              "weighted_covariance_matrix_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "selected_root": SELECTED_ROOT,
              "chain_member_design": CHAIN_MEMBER_DESIGN,
              "chain_sample_schema": CHAIN_SAMPLE_SCHEMA,
              "parameter_mapping_contract": PARAMETER_MAPPING_CONTRACT,
              "target_quantity_schema": TARGET_QUANTITY_SCHEMA,
              "covariance_design": COVARIANCE_DESIGN,
              "tiny_subset_parser_contract": TINY_SUBSET_PARSER_CONTRACT,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "chain_samples_parsed": False,
                  "CAMB_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_87_reference_uncertainty_chain_sample_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "chain_member_design_v4_87.csv",
              CHAIN_MEMBER_DESIGN,
              ["member_role", "member_template", "needed_for", "bounded_probe_next", "parse_now"]
          )

          write_csv(
              OUTDIR / "chain_sample_schema_v4_87.csv",
              CHAIN_SAMPLE_SCHEMA,
              ["column_position", "column_name", "meaning", "required", "use_in_next_probe", "failure_if_missing"]
          )

          write_csv(
              OUTDIR / "parameter_mapping_contract_v4_87.csv",
              PARAMETER_MAPPING_CONTRACT,
              ["source_parameter", "required_for", "future_camb_name", "mapping_operation", "required_from_chain", "point_fixture_value"]
          )

          write_csv(
              OUTDIR / "target_quantity_schema_v4_87.csv",
              TARGET_QUANTITY_SCHEMA,
              ["z_key", "z", "quantity", "target_name", "source"]
          )

          write_csv(
              OUTDIR / "covariance_design_v4_87.csv",
              COVARIANCE_DESIGN,
              ["object_name", "dimension", "contents", "computed_now", "needed_before_final_RSD_pressure"]
          )

          write_csv(
              OUTDIR / "tiny_subset_parser_contract_v4_87.csv",
              TINY_SUBSET_PARSER_CONTRACT,
              ["step", "action", "output", "hard_boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_87.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_87.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_87.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.87 — Reference Uncertainty Chain Sample Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
