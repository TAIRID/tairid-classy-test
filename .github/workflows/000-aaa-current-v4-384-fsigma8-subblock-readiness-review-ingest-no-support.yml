name: "!!! AAA CURRENT - TAIRID v4.384 fsigma8 subblock readiness review ingest no support"

on:
  workflow_dispatch:

jobs:
  run-v4-384-fsigma8-subblock-readiness-review-ingest-no-support:
    name: "!!! AAA CURRENT - Run v4.384 fsigma8 subblock readiness review ingest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.383 output ZIP and human-filled subblock review ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.383 output ZIP..."
          INPUT_383_ZIP="$(ls tairid-v4-383-fsigma8-subblock-readiness-no-values-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_383_ZIP" ]; then
            echo "Could not find v4.383 output ZIP."
            echo "Expected:"
            echo "tairid-v4-383-fsigma8-subblock-readiness-no-values-no-support-output.zip"
            exit 1
          fi

          echo "Finding human-filled v4.383 subblock readiness review ZIP..."
          HUMAN_FILLED_SUBBLOCK_REVIEW_ZIP="$(ls tairid-v4-383-human-filled-fsigma8-subblock-readiness-review-for-v4-384-no-values-no-support*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_SUBBLOCK_REVIEW_ZIP" ]; then
            echo "Could not find human-filled subblock readiness review ZIP."
            echo "Expected:"
            echo "tairid-v4-383-human-filled-fsigma8-subblock-readiness-review-for-v4-384-no-values-no-support.zip"
            exit 1
          fi

          echo "Using v4.383 ZIP:"
          echo "$INPUT_383_ZIP"

          echo "Using human-filled review ZIP:"
          echo "$HUMAN_FILLED_SUBBLOCK_REVIEW_ZIP"

          echo "INPUT_383_ZIP=$INPUT_383_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_SUBBLOCK_REVIEW_ZIP=$HUMAN_FILLED_SUBBLOCK_REVIEW_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.384 subblock readiness review ingest script
        run: |
          cat > run_v4_384_fsigma8_subblock_readiness_review_ingest_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "fsigma8 subblock-readiness review ingest only; final-consensus subblock index plans may be approved for later controlled value extraction; no covariance values loaded now; no covariance subblock extracted now; no full covariance available; no observed-row order matched by value; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          ALLOWED_SUBBLOCK_DECISIONS = {
              "approve_subblock_index_plan_for_later_controlled_value_extraction",
              "needs_mapping_repair",
              "reject_candidate_member",
              "keep_blocked",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def main():
              input_383 = Path(os.environ["INPUT_383_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_SUBBLOCK_REVIEW_ZIP"])

              outdir = Path("tairid_v4_384_fsigma8_subblock_readiness_review_ingest_no_values_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base383 = extract_zip(input_383, "tairid_v4_384_383_")
              basehuman = extract_zip(human_zip, "tairid_v4_384_human_")

              summary383_path = find_one(base383, "v4_383_summary.json")
              readiness_matrix_path = find_one(base383, "v4_383_fsigma8_subblock_readiness_matrix_NO_VALUES_NO_SUPPORT.csv")
              coordinate_plan_path = find_one(base383, "v4_383_fsigma8_subblock_coordinate_plan_NO_VALUES.csv")
              blank_review_path = find_one(base383, "v4_383_HUMAN_FILL_fsigma8_subblock_readiness_review_NO_VALUES_NO_SUPPORT.csv")
              family_priority_path = find_one(base383, "v4_383_family_candidate_priority_NO_VALUES.csv")
              readiness_summary_path = find_one(base383, "v4_383_subblock_readiness_summary_NO_VALUES.csv")
              route_status_path = find_one(base383, "v4_383_route_status_summary.csv")
              limitations383_path = find_one(base383, "v4_383_limitations_after_subblock_readiness.csv")
              gap383_path = find_one(base383, "v4_383_gap_status_after_subblock_readiness.csv")
              subblock_input_path = find_one(base383, "v4_383_input_v4_382_subblock_readiness_preserved.csv")
              approved_mappings_path = find_one(base383, "v4_383_input_v4_382_approved_mappings_preserved.csv")
              rules383_path = find_one(base383, "v4_383_rule_checks.csv")

              human_review_path = find_one_suffix(basehuman, "HUMAN_FILLED_fsigma8_subblock_readiness_review_NO_VALUES_NO_SUPPORT.csv")

              summary383 = json.loads(summary383_path.read_text())
              readiness_matrix = pd.read_csv(readiness_matrix_path)
              coordinate_plan = pd.read_csv(coordinate_plan_path)
              blank_review = pd.read_csv(blank_review_path)
              family_priority = pd.read_csv(family_priority_path)
              readiness_summary = pd.read_csv(readiness_summary_path)
              route_status = pd.read_csv(route_status_path)
              limitations383 = pd.read_csv(limitations383_path)
              gap383 = pd.read_csv(gap383_path)
              subblock_input = pd.read_csv(subblock_input_path)
              approved_mappings = pd.read_csv(approved_mappings_path)
              rules383 = pd.read_csv(rules383_path)
              human_review = pd.read_csv(human_review_path)

              for col in [
                  "human_subblock_readiness_decision",
                  "human_subblock_readiness_note",
                  "subblock_index_plan_approved_now",
              ]:
                  if col not in human_review.columns:
                      human_review[col] = ""

              ingest_rows = []

              for _, row in human_review.iterrows():
                  decision = clean(row["human_subblock_readiness_decision"])
                  approved = decision == "approve_subblock_index_plan_for_later_controlled_value_extraction"

                  if approved:
                      row_status = "approved_for_later_controlled_value_extraction_no_values_now"
                  elif decision == "needs_mapping_repair":
                      row_status = "blocked_needs_mapping_repair"
                  elif decision == "reject_candidate_member":
                      row_status = "rejected_candidate_member_for_current_lane"
                  elif decision == "keep_blocked":
                      row_status = "kept_blocked_as_fallback_no_values"
                  else:
                      row_status = "invalid_or_missing_subblock_readiness_decision"

                  ingest_rows.append({
                      "v4_384_subblock_review_id": f"v4_384_subblock_review_{len(ingest_rows)+1:03d}",
                      "v4_383_subblock_readiness_id": clean(row["v4_383_subblock_readiness_id"]),
                      "v4_382_mapping_review_id": clean(row["v4_382_mapping_review_id"]),
                      "selected_member_name": clean(row["selected_member_name"]),
                      "candidate_observable_family_from_filename": clean(row["candidate_observable_family_from_filename"]),
                      "candidate_consensus_family_from_filename": clean(row["candidate_consensus_family_from_filename"]),
                      "selected_mapping_hypothesis": clean(row["selected_mapping_hypothesis"]),
                      "selected_fsigma8_zero_based_indices": clean(row["selected_fsigma8_zero_based_indices"]),
                      "selected_fsigma8_one_based_indices": clean(row["selected_fsigma8_one_based_indices"]),
                      "candidate_subblock_size": int(float(row["candidate_subblock_size"])),
                      "candidate_subblock_coordinate_count": int(float(row["candidate_subblock_coordinate_count"])),
                      "candidate_observed_redshift_order": clean(row["candidate_observed_redshift_order"]),
                      "candidate_observed_row_ids": clean(row["candidate_observed_row_ids"]),
                      "human_subblock_readiness_decision": decision,
                      "human_subblock_readiness_note": clean(row["human_subblock_readiness_note"]),
                      "row_review_status": row_status,
                      "subblock_index_plan_approved_for_later_controlled_value_extraction": bool(approved),
                      "approved_for_controlled_value_extraction_now": False,
                      "covariance_subblock_extracted": False,
                      "raw_covariance_values_retained": False,
                      "usable_covariance_matrix_loaded": False,
                      "exact_covariance_member_approved": False,
                      "full_covariance_available": False,
                      "full_covariance_values_loaded": False,
                      "covariance_dimension_confirmed": False,
                      "observed_row_order_matched": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              review_ingest = pd.DataFrame(ingest_rows)

              approved_plans = review_ingest[
                  review_ingest["subblock_index_plan_approved_for_later_controlled_value_extraction"].astype(bool)
              ].copy()
              blocked_plans = review_ingest[review_ingest["row_review_status"] == "kept_blocked_as_fallback_no_values"].copy()
              repair_plans = review_ingest[review_ingest["row_review_status"] == "blocked_needs_mapping_repair"].copy()
              rejected_plans = review_ingest[review_ingest["row_review_status"] == "rejected_candidate_member_for_current_lane"].copy()
              invalid_rows = review_ingest[review_ingest["row_review_status"] == "invalid_or_missing_subblock_readiness_decision"].copy()

              approved_member_names = set(approved_plans["selected_member_name"].astype(str).tolist())

              extraction_coordinate_packet = coordinate_plan[
                  coordinate_plan["selected_member_name"].astype(str).isin(approved_member_names)
              ].copy()
              extraction_coordinate_packet["next_gate"] = "v4_385_controlled_covariance_subblock_extraction_dry_run_no_scoring_no_support"
              extraction_coordinate_packet["controlled_extraction_scope"] = "extract_3x3_subblock_values_later_no_scoring"
              extraction_coordinate_packet["coordinate_approved_for_later_value_extraction"] = True
              extraction_coordinate_packet["coordinate_value_loaded_now"] = False
              extraction_coordinate_packet["support_allowed"] = False

              controlled_extraction_packet = approved_plans.copy()
              controlled_extraction_packet["next_gate"] = "v4_385_controlled_covariance_subblock_extraction_dry_run_no_scoring_no_support"
              controlled_extraction_packet["controlled_extraction_scope"] = "controlled_final_consensus_3x3_subblock_extraction_dry_run_only"
              controlled_extraction_packet["extraction_priority"] = range(1, len(controlled_extraction_packet) + 1)
              controlled_extraction_packet["coordinate_rows_expected"] = 9
              controlled_extraction_packet["coordinate_rows_available"] = controlled_extraction_packet["selected_member_name"].apply(
                  lambda name: int((extraction_coordinate_packet["selected_member_name"].astype(str) == str(name)).sum())
              )
              controlled_extraction_packet["value_extraction_allowed_in_next_gate"] = True
              controlled_extraction_packet["covariance_subblock_extracted_now"] = False
              controlled_extraction_packet["full_covariance_values_loaded"] = False
              controlled_extraction_packet["score_valid"] = False
              controlled_extraction_packet["support_allowed"] = False

              extraction_order = pd.DataFrame([
                  {
                      "extraction_order_id": "V4_384_EXTRACT_ORDER_001",
                      "preferred_member_family": "final_consensus_dM_Hz_fsig",
                      "selected_member_count": int(((approved_plans["candidate_consensus_family_from_filename"] == "final_consensus") & (approved_plans["candidate_observable_family_from_filename"] == "dM_Hz_fsig")).sum()),
                      "role": "primary controlled extraction candidate",
                      "values_loaded_now": False,
                      "support_allowed": False,
                  },
                  {
                      "extraction_order_id": "V4_384_EXTRACT_ORDER_002",
                      "preferred_member_family": "final_consensus_dV_FAP_fsig",
                      "selected_member_count": int(((approved_plans["candidate_consensus_family_from_filename"] == "final_consensus") & (approved_plans["candidate_observable_family_from_filename"] == "dV_FAP_fsig")).sum()),
                      "role": "parallel final-consensus candidate for comparison before choosing one scoring lane",
                      "values_loaded_now": False,
                      "support_allowed": False,
                  },
              ])

              review_summary = pd.DataFrame([
                  {"summary_metric": "subblock_review_rows", "value": int(len(review_ingest)), "note": "Human subblock-readiness review rows ingested."},
                  {"summary_metric": "approved_subblock_index_plan_rows", "value": int(len(approved_plans)), "note": "Final-consensus rows approved for later controlled extraction only."},
                  {"summary_metric": "blocked_fallback_rows", "value": int(len(blocked_plans)), "note": "FS-consensus rows kept blocked as fallback/comparison."},
                  {"summary_metric": "controlled_extraction_packet_rows", "value": int(len(controlled_extraction_packet)), "note": "Rows allowed into v4.385 extraction dry run."},
                  {"summary_metric": "approved_coordinate_rows", "value": int(len(extraction_coordinate_packet)), "note": "Nine coordinate rows per approved member."},
                  {"summary_metric": "covariance_subblock_extracted", "value": 0, "note": "No subblock extracted in v4.384."},
                  {"summary_metric": "full_covariance_values_loaded", "value": 0, "note": "No covariance values loaded in v4.384."},
                  {"summary_metric": "support_allowed", "value": 0, "note": "No support claim is allowed."},
              ])

              route_status_384 = pd.DataFrame([
                  {"status_id": "V4_384_STATUS_001", "status": "subblock_readiness_review_ingested", "detail": f"{len(approved_plans)} final-consensus rows approved for later controlled value extraction."},
                  {"status_id": "V4_384_STATUS_002", "status": "fs_consensus_kept_blocked", "detail": f"{len(blocked_plans)} FS-consensus rows kept blocked as fallback/comparison."},
                  {"status_id": "V4_384_STATUS_003", "status": "no_subblock_extracted", "detail": "This gate approves only the next controlled extraction attempt."},
                  {"status_id": "V4_384_STATUS_004", "status": "support_still_blocked", "detail": "support_allowed=false remains active."},
              ])

              limitation_update = pd.DataFrame([
                  {"limit_id": "V4_384_LIMIT_001", "limit": "Subblock-readiness approval is not a covariance score.", "status": "active_limit"},
                  {"limit_id": "V4_384_LIMIT_002", "limit": "Only final-consensus rows proceed to the next extraction dry run.", "status": "active_limit"},
                  {"limit_id": "V4_384_LIMIT_003", "limit": "No covariance values are loaded in v4.384.", "status": "blocked_by_design"},
                  {"limit_id": "V4_384_LIMIT_004", "limit": "No observed-row order validation is performed in v4.384.", "status": "blocked_by_design"},
                  {"limit_id": "V4_384_LIMIT_005", "limit": "No likelihood, p-values, score, or support claim is allowed.", "status": "blocked_by_design"},
              ])

              gap_update = pd.DataFrame([
                  {"gap_id": "V4_384_GAP_001", "gap": "Subblock-readiness review ingested.", "status_after_v4_384": "final_consensus_subblock_plans_ready_for_controlled_extraction_dry_run", "next_gate": "v4_385_controlled_covariance_subblock_extraction_dry_run_no_scoring_no_support"},
                  {"gap_id": "V4_384_GAP_002", "gap": "Covariance subblock extraction remains unperformed.", "status_after_v4_384": "still_blocked_until_v4_385", "next_gate": "controlled_value_extraction_dry_run"},
                  {"gap_id": "V4_384_GAP_003", "gap": "Covariance values remain unloaded.", "status_after_v4_384": "still_blocked", "next_gate": "v4_385_extraction_dry_run"},
                  {"gap_id": "V4_384_GAP_004", "gap": "Observed-row order remains untested by values.", "status_after_v4_384": "still_blocked", "next_gate": "later_row_order_validation_gate"},
                  {"gap_id": "V4_384_GAP_005", "gap": "Support claims remain blocked.", "status_after_v4_384": "still_blocked", "next_gate": "no_support_claims_allowed_from_v4_384"},
              ])

              hard_checks = {
                  "input_v4_383_summary_found": summary383.get("version") == "v4.383",
                  "input_v4_383_rules_all_passed": summary_rules_all_passed(summary383),
                  "input_v4_383_failed_gates_none": summary383.get("failed_gates") == "none",
                  "input_v4_383_subblock_readiness_rows_4": summary383.get("subblock_readiness_rows") == 4,
                  "input_v4_383_valid_rows_4": summary383.get("valid_3x3_index_plan_rows") == 4,
                  "input_v4_383_coordinate_rows_36": summary383.get("subblock_coordinate_rows") == 36,
                  "input_v4_383_human_review_packet_rows_4": summary383.get("human_review_packet_rows") == 4,
                  "input_v4_383_zero_indices_258": summary383.get("selected_fsigma8_zero_based_indices") == "2|5|8",
                  "input_v4_383_one_indices_369": summary383.get("selected_fsigma8_one_based_indices") == "3|6|9",
                  "input_v4_383_candidate_subblock_size_3": summary383.get("candidate_subblock_size") == 3,
                  "input_v4_383_no_dimension_confirmed": summary383.get("dimension_order_mapping_confirmed_now") is False,
                  "input_v4_383_no_fsig_subblock": summary383.get("fsigma8_subblock_identified_now") is False,
                  "input_v4_383_no_subblock_extracted": summary383.get("covariance_subblock_extracted") is False,
                  "input_v4_383_raw_values_not_retained": summary383.get("raw_covariance_values_retained") is False,
                  "input_v4_383_matrix_not_loaded": summary383.get("usable_covariance_matrix_loaded") is False,
                  "input_v4_383_exact_member_not_approved": summary383.get("exact_covariance_member_approved") is False,
                  "input_v4_383_no_full_covariance": summary383.get("full_covariance_available") is False,
                  "input_v4_383_no_values_loaded": summary383.get("full_covariance_values_loaded") is False,
                  "input_v4_383_no_observed_order": summary383.get("observed_row_order_matched") is False,
                  "input_v4_383_no_likelihood": summary383.get("likelihood_computed") is False,
                  "input_v4_383_no_p_values": summary383.get("p_values_computed") is False,
                  "input_v4_383_no_score_valid": summary383.get("score_valid") is False,
                  "input_v4_383_no_support_allowed": summary383.get("support_allowed") is False,

                  "rules383_all_passed": passed_column_all(rules383),
                  "readiness_matrix_rows_equal_4": len(readiness_matrix) == 4,
                  "coordinate_plan_rows_equal_36": len(coordinate_plan) == 36,
                  "blank_review_rows_equal_4": len(blank_review) == 4,
                  "family_priority_rows_equal_4": len(family_priority) == 4,
                  "readiness_summary_rows_equal_8": len(readiness_summary) == 8,
                  "route_status_rows_equal_4": len(route_status) == 4,
                  "limitations383_rows_equal_5": len(limitations383) == 5,
                  "gap383_rows_equal_5": len(gap383) == 5,
                  "subblock_input_rows_equal_4": len(subblock_input) == 4,
                  "approved_mappings_rows_equal_4": len(approved_mappings) == 4,

                  "human_decisions_filled": human_review["human_subblock_readiness_decision"].apply(clean).ne("").all(),
                  "human_decisions_allowed": human_review["human_subblock_readiness_decision"].apply(clean).isin(ALLOWED_SUBBLOCK_DECISIONS).all(),
                  "review_ingest_rows_equal_human_review": len(review_ingest) == len(human_review),
                  "approved_plans_equal_2": len(approved_plans) == 2,
                  "blocked_plans_equal_2": len(blocked_plans) == 2,
                  "repair_plans_equal_0": len(repair_plans) == 0,
                  "rejected_plans_equal_0": len(rejected_plans) == 0,
                  "invalid_rows_equal_0": len(invalid_rows) == 0,
                  "approved_all_final_consensus": (approved_plans["candidate_consensus_family_from_filename"] == "final_consensus").all(),
                  "blocked_all_fs_consensus": (blocked_plans["candidate_consensus_family_from_filename"] == "FS_consensus").all(),
                  "controlled_extraction_packet_rows_equal_2": len(controlled_extraction_packet) == 2,
                  "extraction_coordinate_packet_rows_equal_18": len(extraction_coordinate_packet) == 18,
                  "extraction_order_rows_equal_2": len(extraction_order) == 2,
                  "review_summary_rows_equal_8": len(review_summary) == 8,
                  "route_status_384_rows_equal_4": len(route_status_384) == 4,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_subblock_extracted": false_col(review_ingest, "covariance_subblock_extracted") and false_col(controlled_extraction_packet, "covariance_subblock_extracted_now"),
                  "no_values_loaded": false_col(review_ingest, "full_covariance_values_loaded") and false_col(controlled_extraction_packet, "full_covariance_values_loaded") and false_col(extraction_coordinate_packet, "coordinate_value_loaded_now"),
                  "no_dimension_confirmed": false_col(review_ingest, "covariance_dimension_confirmed"),
                  "no_observed_row_order": false_col(review_ingest, "observed_row_order_matched"),
                  "no_likelihood": false_col(review_ingest, "likelihood_computed"),
                  "no_p_values": false_col(review_ingest, "p_values_computed"),
                  "no_score_valid": false_col(review_ingest, "score_valid") and false_col(controlled_extraction_packet, "score_valid"),
                  "no_support_allowed": false_col(review_ingest, "support_allowed") and false_col(controlled_extraction_packet, "support_allowed") and false_col(extraction_coordinate_packet, "support_allowed") and false_col(extraction_order, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary384 = {
                  "version": "v4.384",
                  "route_name": "v4_384_fsigma8_subblock_readiness_review_ingest_no_values_no_support_claims",
                  "expected_result": "v4_384_fsigma8_subblock_readiness_review_ingest_passed_final_consensus_selected_no_values_no_support_claims",
                  "input_version": "v4.383",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "subblock_review_rows": int(len(review_ingest)),
                  "approved_final_consensus_subblock_plan_rows": int(len(approved_plans)),
                  "blocked_fallback_subblock_plan_rows": int(len(blocked_plans)),
                  "controlled_extraction_packet_rows": int(len(controlled_extraction_packet)),
