name: 000 TAIRID v4.203 - Real Numeric Gap Closure Workbench With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-203-real-numeric-gap-closure-workbench-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-203-real-numeric-gap-closure-workbench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.203 real numeric gap closure workbench
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_203_outputs
          cat > tairid_v4_203_outputs/run_v4_203.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_203_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "real_numeric_gap_closure_workbench_passed_templates_inventory_and_readiness_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no cosmology validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved between domains",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "gap-closure readiness is not validation",
              "manual rows are not empirical subject data",
              "TAIRID not proved"
          ]

          V4_202_STATUS = {
              "version": "v4.202",
              "rule_pass_count": 11,
              "rule_total_count": 11,
              "failed_gates": [],
              "node_count": 26,
              "edge_count": 31,
              "signature_cluster_count": 6,
              "gap_count": 4,
              "package_status": "shape_lattice_preview_written_no_validation",
              "selected_next_route": "real_numeric_gap_closure_workbench_with_scope_guards"
          }

          REQUIRED_FILES = [
              {
                  "gap_id": "G1",
                  "gap_label": "Dyslexia / Aphantasia subject or group axis rows",
                  "canonical_path": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "alternate_path": "data/cross_domain/dyslexia_aphantasia_subject_axis_input.csv",
                  "required_columns": "lane;subject_id;group_or_condition;boundary_or_task;propagation_reach_value;pacing_access_value;consolidation_growth_value;viability_or_outcome_value;source_or_dataset;notes",
                  "minimum_rows_for_preview": 4,
                  "stronger_target": "at least 2 complete numeric rows per lane/group, preferably subject-level rows",
                  "why_needed": "Needed to compute axis summaries, covariance, and correlation for dyslexia and aphantasia."
              },
              {
                  "gap_id": "G2",
                  "gap_label": "ADHD / Autism / Schizotypy real numeric deltas",
                  "canonical_path": "data/neurotype/adhd_autism_schizotypy_numeric_delta_input.csv",
                  "alternate_path": "data/cross_domain/adhd_autism_schizotypy_numeric_delta_input.csv",
                  "required_columns": "lane;case_id;group_or_condition;boundary_or_task;propagation_reach_value;reference_propagation_reach_value;pacing_access_value;reference_pacing_access_value;consolidation_growth_value;reference_consolidation_growth_value;source_or_dataset;notes",
                  "minimum_rows_for_preview": 3,
                  "stronger_target": "one complete measured row each for ADHD, Autism, and Schizotypy; subject-level rows are better",
                  "why_needed": "Needed to replace manual +1/0/-1 rows with measured deltas."
              },
              {
                  "gap_id": "G3",
                  "gap_label": "Bipolar measured phase surfaces",
                  "canonical_path": "data/neurotype/bipolar_phase_numeric_surface_input.csv",
                  "alternate_path": "data/cross_domain/bipolar_phase_numeric_surface_input.csv",
                  "required_columns": "phase_label;subject_id;group_or_condition;boundary_or_task;propagation_value;reference_propagation_value;pacing_value;reference_pacing_value;consolidation_value;reference_consolidation_value;viability_value;reference_viability_value;source_or_dataset;notes",
                  "minimum_rows_for_preview": 4,
                  "stronger_target": "measured rows for depression, mania/hypomania, euthymia, and mixed/transition",
                  "why_needed": "Needed to test bipolar as phase movement rather than one static shape."
              },
              {
                  "gap_id": "G4",
                  "gap_label": "Holdout surface tests",
                  "canonical_path": "data/neurotype/holdout_surface_test_design_input.csv",
                  "alternate_path": "data/cross_domain/holdout_surface_test_design_input.csv",
                  "required_columns": "holdout_id;target_surface;reason_held_out;propagation_candidate;pacing_candidate;consolidation_candidate;viability_candidate;needed_dataset_or_task;source_or_dataset;notes",
                  "minimum_rows_for_preview": 3,
                  "stronger_target": "one targeted surface row for autism compact-depth, schizotypy disorganized/negative, and bipolar mixed transition",
                  "why_needed": "Needed to avoid forced matching and protect falsifiability."
              }
          ]

          TEMPLATES = {
              "candidate_data_neurotype_dyslexia_aphantasia_subject_axis_input.csv": [
                  {
                      "lane": "Dyslexia",
                      "subject_id": "replace_with_subject_or_group_id",
                      "group_or_condition": "dyslexic_or_control_or_group",
                      "boundary_or_task": "ETDD70 reading-flow surface",
                      "propagation_reach_value": "s_A or equivalent numeric value",
                      "pacing_access_value": "lambda_R or timing/load equivalent numeric value",
                      "consolidation_growth_value": "rho_R or re-entry/accuracy equivalent numeric value",
                      "viability_or_outcome_value": "V_data or reading viability/outcome numeric value",
                      "source_or_dataset": "ETDD70 / uploaded dyslexia table",
                      "notes": "Need real subject/group values here before covariance can be computed."
                  },
                  {
                      "lane": "Aphantasia",
                      "subject_id": "replace_with_subject_or_group_id",
                      "group_or_condition": "aphantasia_or_control_or_group",
                      "boundary_or_task": "visual imagery / reconstruction surface",
                      "propagation_reach_value": "visual imagery reach or inverse VVIQ-like numeric value",
                      "pacing_access_value": "burden/load/timing/mismatch numeric value",
                      "consolidation_growth_value": "reconstruction viability or accuracy numeric value",
                      "viability_or_outcome_value": "task viability/outcome or burden-adjusted performance numeric value",
                      "source_or_dataset": "aphantasia questionnaire/drawing/physiology output",
                      "notes": "Need real subject/group values here before covariance can be computed."
                  }
              ],
              "candidate_data_neurotype_adhd_autism_schizotypy_numeric_delta_input.csv": [
                  {
                      "lane": "ADHD",
                      "case_id": "ADHD_ds003500_selective_attention_width_over_depth",
                      "group_or_condition": "ADHD_or_control_or_group",
                      "boundary_or_task": "selective attention / response inhibition / width-depth task surface",
                      "propagation_reach_value": "width pressure numeric value",
                      "reference_propagation_reach_value": "control/reference width pressure numeric value",
                      "pacing_access_value": "gate instability or update-load numeric value",
                      "reference_pacing_access_value": "control/reference gate/update numeric value",
                      "consolidation_growth_value": "task depth or viability numeric value",
                      "reference_consolidation_growth_value": "control/reference depth/viability numeric value",
                      "source_or_dataset": "ADHD paper output table or ds003500 derivative",
                      "notes": "Expected shape ++- only if deltas resolve as +,+,-."
                  },
                  {
                      "lane": "Autism",
                      "case_id": "Autism_measured_dispersion_search_correction",
                      "group_or_condition": "ASD_or_TD_or_group",
                      "boundary_or_task": "eye-tracking / movie-viewing / social-stimulus surface",
                      "propagation_reach_value": "dispersion/search numeric value",
                      "reference_propagation_reach_value": "TD/reference dispersion/search numeric value",
                      "pacing_access_value": "search friction or update-load numeric value",
                      "reference_pacing_access_value": "TD/reference friction/update numeric value",
                      "consolidation_growth_value": "boundary compaction or stable consolidation numeric value",
                      "reference_consolidation_growth_value": "TD/reference compaction/consolidation numeric value",
                      "source_or_dataset": "autism paper output table or ASD eye-tracking derivative",
                      "notes": "Do not force compact-depth mode; this row is measured dispersion/search lane only."
                  },
                  {
                      "lane": "Schizotypy",
                      "case_id": "Schizotypy_positive_reference_field_overreach",
                      "group_or_condition": "positive_schizotypy_or_reference_group",
                      "boundary_or_task": "semantic/lure/anchor reference-field task",
                      "propagation_reach_value": "weak/unrelated lure acceptance or branch reach numeric value",
                      "reference_propagation_reach_value": "reference lure/reach numeric value",
                      "pacing_access_value": "salience/reference switching or ambiguity-pull numeric value",
                      "reference_pacing_access_value": "reference salience/switching numeric value",
                      "consolidation_growth_value": "anchor specificity or rejection confidence numeric value",
                      "reference_consolidation_growth_value": "reference anchor specificity numeric value",
                      "source_or_dataset": "schizotypy paper output table or lure/anchor derivative",
                      "notes": "Positive lane only; do not collapse disorganized or negative schizotypy into this row."
                  }
              ],
              "candidate_data_neurotype_bipolar_phase_numeric_surface_input.csv": [
                  {
                      "phase_label": "depression",
                      "subject_id": "replace_with_subject_or_group_id",
                      "group_or_condition": "depressed_bipolar_or_reference",
                      "boundary_or_task": "phase-cycling rhythm surface",
                      "propagation_value": "beta_swing or activity/reach metric",
                      "reference_propagation_value": "euthymic/control reference beta_swing or activity metric",
                      "pacing_value": "s_A_swing or update/rhythm metric",
                      "reference_pacing_value": "euthymic/control reference s_A_swing or rhythm metric",
                      "consolidation_value": "boundary compression or locked consolidation metric",
                      "reference_consolidation_value": "reference boundary compression metric",
                      "viability_value": "V_swing or function/viability metric",
                      "reference_viability_value": "reference V_swing or function/viability metric",
                      "source_or_dataset": "bipolar depression-side output table",
                      "notes": "Expected depression surface: --+ with viability low."
                  },
                  {
                      "phase_label": "mania_hypomania",
                      "subject_id": "replace_with_subject_or_group_id",
                      "group_or_condition": "mania_hypomania_or_reference",
                      "boundary_or_task": "phase-cycling rhythm surface",
                      "propagation_value": "activity expansion / beta / goal-directed reach metric",
                      "reference_propagation_value": "euthymic/control reference metric",
                      "pacing_value": "phase speed / sleep-rhythm disruption / update tempo metric",
                      "reference_pacing_value": "euthymic/control reference metric",
                      "consolidation_value": "sleep/rest consolidation or stable-output metric",
                      "reference_consolidation_value": "reference sleep/rest consolidation metric",
                      "viability_value": "regulated viability under high propagation",
                      "reference_viability_value": "reference viability metric",
                      "source_or_dataset": "bipolar mania/hypomania phase table",
                      "notes": "Expected mania/hypomania surface: ++- with viability low or unstable."
                  },
                  {
                      "phase_label": "euthymia",
                      "subject_id": "replace_with_subject_or_group_id",
                      "group_or_condition": "euthymic_reference",
                      "boundary_or_task": "reference rhythm surface",
                      "propagation_value": "reference propagation rhythm",
                      "reference_propagation_value": "same subject/control reference",
                      "pacing_value": "reference pacing rhythm",
                      "reference_pacing_value": "same subject/control reference",
                      "consolidation_value": "reference consolidation/stability",
                      "reference_consolidation_value": "same subject/control reference",
                      "viability_value": "baseline viability",
                      "reference_viability_value": "same subject/control reference",
                      "source_or_dataset": "bipolar euthymia reference table",
                      "notes": "Euthymia is a reference surface, not a pathology row."
                  },
                  {
                      "phase_label": "mixed_transition",
                      "subject_id": "replace_with_subject_or_group_id",
                      "group_or_condition": "mixed_transition_or_reference",
                      "boundary_or_task": "phase-overlap transition surface",
                      "propagation_value": "mixed propagation metric",
                      "reference_propagation_value": "reference propagation metric",
                      "pacing_value": "mixed timing/rhythm metric",
                      "reference_pacing_value": "reference timing metric",
                      "consolidation_value": "mixed consolidation/stability metric",
                      "reference_consolidation_value": "reference consolidation metric",
                      "viability_value": "mixed viability/load metric",
                      "reference_viability_value": "reference viability metric",
                      "source_or_dataset": "mixed/transition phase table",
                      "notes": "Mixed states may be contradictory; do not force them into a three-sign row."
                  }
              ],
              "candidate_data_neurotype_holdout_surface_test_design_input.csv": [
                  {
                      "holdout_id": "autism_compact_depth_future_surface",
                      "target_surface": "stable/local-fit/rule-bound/sensory-detail or special-interest-like task surface",
                      "reason_held_out": "current measured autism lane corrected toward dispersion/search; compact-depth may require a better matching surface",
                      "propagation_candidate": "local reach or rule-bound generalization",
                      "pacing_candidate": "update cost / sensory timing / transition cost",
                      "consolidation_candidate": "local consistency / detail retention / stable rule structure",
                      "viability_candidate": "task performance or stability under matched boundary",
                      "needed_dataset_or_task": "autism dataset with local detail/rule-bound task or sensory-stability surface",
                      "source_or_dataset": "to be filled",
                      "notes": "Do not treat this as current measured autism result."
                  },
                  {
                      "holdout_id": "schizotypy_disorganized_drift",
                      "target_surface": "intrusion / set-loss / drift / return-chain task",
                      "reason_held_out": "disorganized drift is not the same as positive reference overreach",
                      "propagation_candidate": "intrusion spread or drift breadth",
                      "pacing_candidate": "return-chain disruption or switching instability",
                      "consolidation_candidate": "coherent return / set maintenance",
                      "viability_candidate": "task stability or interpretation coherence",
                      "needed_dataset_or_task": "same-sample disorganized trait task battery",
                      "source_or_dataset": "to be filled",
                      "notes": "Do not collapse into positive schizotypy row."
                  },
                  {
                      "holdout_id": "schizotypy_negative_underreach",
                      "target_surface": "switching / maintenance / underreach / return-cost task",
                      "reason_held_out": "negative traits may involve underreach or return-cost rather than overreach",
                      "propagation_candidate": "reduced branch openness or underreach",
                      "pacing_candidate": "switch cost or maintenance drag",
                      "consolidation_candidate": "stable but narrowed output or return cost",
                      "viability_candidate": "function under maintenance/switch boundary",
                      "needed_dataset_or_task": "negative trait switching/maintenance measures",
                      "source_or_dataset": "to be filled",
                      "notes": "Do not force into overreach."
                  },
                  {
                      "holdout_id": "bipolar_mixed_transition_overlap",
                      "target_surface": "phase-overlap / mixed-transition instability surface",
                      "reason_held_out": "mixed transition is off-axis and cannot be forced into depression or mania",
                      "propagation_candidate": "mixed propagation indicator",
                      "pacing_candidate": "mixed rhythm instability",
                      "consolidation_candidate": "mixed consolidation conflict",
                      "viability_candidate": "phase-overlap load or function",
                      "needed_dataset_or_task": "bipolar mixed-state or transition phase data",
                      "source_or_dataset": "to be filled",
                      "notes": "Holdout until measured."
                  }
              ]
          }

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def read_csv_if_exists(path):
              if not path.exists():
                  return [], []
              with open(path, newline="", encoding="utf-8") as f:
                  reader = csv.DictReader(f)
                  return list(reader), reader.fieldnames or []

          def nonempty(value):
              return value is not None and str(value).strip() != ""

          inventory_rows = []
          readiness_rows = []
          missing_column_rows = []

          for spec in REQUIRED_FILES:
              paths = [Path(spec["canonical_path"]), Path(spec["alternate_path"])]
              loaded_rows = []
              found_paths = []
              found_columns = set()
              missing_cols = []
              required_cols = [c.strip() for c in spec["required_columns"].split(";") if c.strip()]
              for path in paths:
                  rows, cols = read_csv_if_exists(path)
                  if path.exists():
                      found_paths.append(str(path))
                      found_columns.update(cols)
                      loaded_rows.extend(rows)
              for col in required_cols:
                  if col not in found_columns:
                      missing_cols.append(col)
                      missing_column_rows.append({
                          "gap_id": spec["gap_id"],
                          "canonical_path": spec["canonical_path"],
                          "missing_column": col
                      })
              complete_rows = 0
              for row in loaded_rows:
                  if all(nonempty(row.get(col)) for col in required_cols):
                      complete_rows += 1
              min_rows = int(spec["minimum_rows_for_preview"])
              status = (
                  "ready_for_preview_ingestion" if complete_rows >= min_rows and not missing_cols
                  else "present_but_incomplete" if found_paths
                  else "missing"
              )
              inventory_rows.append({
                  "gap_id": spec["gap_id"],
                  "gap_label": spec["gap_label"],
                  "canonical_path": spec["canonical_path"],
                  "alternate_path": spec["alternate_path"],
                  "found_paths": ";".join(found_paths),
                  "rows_loaded": len(loaded_rows),
                  "complete_required_rows": complete_rows,
                  "required_column_count": len(required_cols),
                  "missing_column_count": len(missing_cols),
                  "minimum_rows_for_preview": min_rows,
                  "status": status,
                  "why_needed": spec["why_needed"]
              })
              readiness_rows.append({
                  "gap_id": spec["gap_id"],
                  "gap_label": spec["gap_label"],
                  "readiness_status": status,
                  "ready_for_preview": status == "ready_for_preview_ingestion",
                  "next_action": (
                      "rerun relevant classifier/preview workflow"
                      if status == "ready_for_preview_ingestion"
                      else "fill the candidate template and commit it to " + spec["canonical_path"]
                  ),
                  "stronger_target": spec["stronger_target"]
              })

          for filename, rows in TEMPLATES.items():
              if rows:
                  fieldnames = list(rows[0].keys())
              else:
                  fieldnames = []
              write_csv(OUT / filename, rows, fieldnames)

          write_csv(OUT / "v4_203_v4_202_status_review.csv", [V4_202_STATUS], list(V4_202_STATUS.keys()))
          (OUT / "v4_203_v4_202_status_review.json").write_text(json.dumps(V4_202_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_203_required_real_numeric_files.csv", REQUIRED_FILES, [
              "gap_id", "gap_label", "canonical_path", "alternate_path", "required_columns",
              "minimum_rows_for_preview", "stronger_target", "why_needed"
          ])
          write_csv(OUT / "v4_203_gap_input_inventory.csv", inventory_rows, [
              "gap_id", "gap_label", "canonical_path", "alternate_path", "found_paths",
              "rows_loaded", "complete_required_rows", "required_column_count", "missing_column_count",
              "minimum_rows_for_preview", "status", "why_needed"
          ])
          write_csv(OUT / "v4_203_missing_columns.csv", missing_column_rows, ["gap_id", "canonical_path", "missing_column"])
          write_csv(OUT / "v4_203_gap_readiness_scorecard.csv", readiness_rows, [
              "gap_id", "gap_label", "readiness_status", "ready_for_preview", "next_action", "stronger_target"
          ])

          ready_count = sum(1 for r in readiness_rows if r["ready_for_preview"] is True)
          missing_count = sum(1 for r in readiness_rows if r["readiness_status"] == "missing")
          incomplete_count = sum(1 for r in readiness_rows if r["readiness_status"] == "present_but_incomplete")

          claim_rows = [
              {
                  "claim": "A gap marked ready validates the theory.",
                  "status": "blocked",
                  "safe_wording": "Ready only means a file has enough required rows for the next preview workflow.",
                  "forbidden_wording": "Readiness validates TAIRID."
              },
              {
                  "claim": "Manual rows are empirical.",
                  "status": "blocked",
                  "safe_wording": "Manual rows can test workflow plumbing but must be replaced or clearly labeled.",
                  "forbidden_wording": "Manual rows are subject data."
              },
              {
                  "claim": "The workbench helps close gaps.",
                  "status": "allowed",
                  "safe_wording": "The workbench tells us exactly which files and columns are missing.",
                  "forbidden_wording": "The workbench closes the gaps by itself."
              }
          ]
          write_csv(OUT / "v4_203_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          next_routes = [
              {
                  "priority": 1,
                  "route": "fill_or_upload_real_numeric_gap_tables",
                  "condition": "if all or most gap files are missing",
                  "next_action": "copy candidate CSV outputs into data/neurotype/ and replace placeholders with real numeric values"
              },
              {
                  "priority": 2,
                  "route": "rerun_v4_195_v4_197_v4_199_after_inputs",
                  "condition": "if G1/G2/G3 files become ready",
                  "next_action": "rerun the subject-axis, delta, and phase classifiers"
              },
              {
                  "priority": 3,
                  "route": "shape_lattice_update_after_real_inputs_with_scope_guards",
                  "condition": "after real input classifiers write measured results",
                  "next_action": "compare measured rows against manual atlas rows"
              }
          ]
          write_csv(OUT / "v4_203_next_routes.csv", next_routes, ["priority", "route", "condition", "next_action"])

          selected_next_route = (
              "rerun_ready_numeric_classifiers_with_scope_guards"
              if ready_count > 0
              else "fill_or_upload_real_numeric_gap_tables_with_scope_guards"
          )

          route_decision = {
              "version": "v4.203",
              "result_label": RESULT_LABEL,
              "clean_result": "A real numeric gap-closure workbench was written. It inventories required files, checks readiness, writes candidate templates, and preserves claim boundaries.",
              "required_gap_files": len(REQUIRED_FILES),
              "ready_gap_count": ready_count,
              "missing_gap_count": missing_count,
              "incomplete_gap_count": incomplete_count,
              "candidate_templates_written": len(TEMPLATES),
              "selected_next_route": selected_next_route,
              "truth_boundary": "gap-closure readiness only; not validation, not unit equivalence, not causal equivalence",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_203_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_203_scope_guards.json").write_text(json.dumps({
              "scope": "real numeric gap-closure workbench for neurotype lattice inputs",
              "readiness_is_validation": False,
              "templates_are_data": False,
              "manual_rows_are_subject_data": False,
              "raw_numbers_moved_between_domains": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_203_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.203 - Real Numeric Gap Closure Workbench",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.202 produced the guarded lattice preview. v4.203 inventories the real numeric files needed to update that lattice with measured rows instead of manual or sign-only rows.",
              "",
              "Required gap files: `" + str(len(REQUIRED_FILES)) + "`",
              "Ready gap count: `" + str(ready_count) + "`",
              "Missing gap count: `" + str(missing_count) + "`",
              "Incomplete gap count: `" + str(incomplete_count) + "`",
              "Candidate templates written: `" + str(len(TEMPLATES)) + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_203_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_203_v4_202_status_review.csv",
              "v4_203_v4_202_status_review.json",
              "v4_203_required_real_numeric_files.csv",
              "v4_203_gap_input_inventory.csv",
              "v4_203_missing_columns.csv",
              "v4_203_gap_readiness_scorecard.csv",
              "candidate_data_neurotype_dyslexia_aphantasia_subject_axis_input.csv",
              "candidate_data_neurotype_adhd_autism_schizotypy_numeric_delta_input.csv",
              "candidate_data_neurotype_bipolar_phase_numeric_surface_input.csv",
              "candidate_data_neurotype_holdout_surface_test_design_input.csv",
              "v4_203_claim_boundary_matrix.csv",
              "v4_203_next_routes.csv",
              "v4_203_route_decision.json",
              "v4_203_scope_guards.json",
              "v4_203_blocked_claims.json",
              "v4_203_summary.md"
          ]

          rules = {
              "version_is_v4_203": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_202_status_reviewed": V4_202_STATUS["rule_pass_count"] == 11,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "required_files_listed": len(REQUIRED_FILES) == 4,
              "candidate_templates_written": len(TEMPLATES) == 4,
              "readiness_rows_present": len(readiness_rows) == 4,
              "selected_route_present": bool(selected_next_route),
              "no_validation_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.203",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "required_gap_files": len(REQUIRED_FILES),
              "ready_gap_count": ready_count,
              "missing_gap_count": missing_count,
              "incomplete_gap_count": incomplete_count,
              "candidate_templates_written": len(TEMPLATES),
              "package_status": "real_numeric_gap_closure_workbench_written_no_validation",
              "selected_next_route": selected_next_route,
              "claim_boundary": "gap_closure_readiness_only_no_validation"
          }

          (OUT / "v4_203_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.203 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_203_outputs/run_v4_203.py

      - name: Upload v4.203 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-203-real-numeric-gap-closure-workbench-output
          path: tairid_v4_203_outputs/
