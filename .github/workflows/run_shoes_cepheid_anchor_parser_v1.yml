name: Run TAIRID SH0ES Cepheid anchor parser v1

on:
  workflow_dispatch:

jobs:
  run-shoes-cepheid-anchor-parser-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy pandas scipy matplotlib requests astropy

      - name: Run SH0ES Cepheid anchor parser v1
        run: |
          python run_tairid_shoes_cepheid_anchor_parser_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-cepheid-anchor-parser-v1-output
          path: |
            shoes_cepheid_anchor_parser_v1_outputs/**
