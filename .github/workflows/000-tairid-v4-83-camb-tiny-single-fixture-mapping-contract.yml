name: 000 TAIRID v4.83 CAMB Tiny Single Fixture Mapping Contract

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-83-camb-tiny-single-fixture-mapping-contract.yml"

jobs:
  tairid-v4-83-camb-tiny-single-fixture-mapping-contract:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.83 CAMB tiny single fixture mapping contract
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_83_camb_tiny_single_fixture_mapping_contract

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_83_camb_tiny_single_fixture_mapping_contract")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_83_camb_tiny_single_fixture_mapping_contract"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install CAMB.",
              "This does not run CAMB.",
              "This does not run CLASS or any Boltzmann solver.",
              "This does not derive H0, Omega_m, sigma8, sigma8z, or fsigma8z.",
              "This maps the strict v4.82.8 minimum fixture packet into a future CAMB input contract.",
              "A pass means the input mapping is internally consistent and ready for a later tiny CAMB run, not that a solver result exists."
          ]

          UPSTREAM_LOCKS = {
              "v4_82_8_strict_minimum_fixture_packet_retry": {
                  "readiness_label": "strict_minimum_fixture_packet_retry_passed_ready_for_CAMB_tiny_single_fixture_mapping_contract",
                  "fixture_values_extracted": True,
                  "primary_found_count": 6,
                  "sidecar_found_count": 10,
                  "exact_token_guard_passed": True,
                  "sigma_fsigma_pair_values_distinct": True,
                  "chain_sample_rows_read": False,
                  "fixture_run_allowed_now": False,
                  "solver_cosmology_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              }
          }

          SOURCE_FIXTURE = {
              "root": "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE",
              "minimum_member_name": "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE.minimum",
              "primary_inputs": {
                  "omegabh2": {"value": 0.02237737, "label": "\\Omega_b h^2"},
                  "omegach2": {"value": 0.1201035, "label": "\\Omega_c h^2"},
                  "theta": {"value": 1.04092, "label": "100\\theta_{MC}"},
                  "tau": {"value": 0.05430138, "label": "\\tau"},
                  "logA": {"value": 3.044726, "label": "{\\rm{ln}}(10^{10} A_s)"},
                  "ns": {"value": 0.9658923, "label": "n_s"}
              },
              "sidecar_targets": {
                  "sigma8z015": {"value": 0.7498653, "label": "\\sigma_8(0.15)", "z": 0.15},
                  "fsigma8z015": {"value": 0.4605277, "label": "f\\sigma_8(0.15)", "z": 0.15},
                  "sigma8z038": {"value": 0.6642308, "label": "\\sigma_8(0.38)", "z": 0.38},
                  "fsigma8z038": {"value": 0.4779339, "label": "f\\sigma_8(0.38)", "z": 0.38},
                  "sigma8z051": {"value": 0.6214160, "label": "\\sigma_8(0.51)", "z": 0.51},
                  "fsigma8z051": {"value": 0.4760216, "label": "f\\sigma_8(0.51)", "z": 0.51},
                  "sigma8z061": {"value": 0.5911708, "label": "\\sigma_8(0.61)", "z": 0.61},
                  "fsigma8z061": {"value": 0.4706936, "label": "f\\sigma_8(0.61)", "z": 0.61},
                  "sigma8z233": {"value": 0.3069371, "label": "\\sigma_8(2.33)", "z": 2.33},
                  "fsigma8z233": {"value": 0.2979012, "label": "f\\sigma_8(2.33)", "z": 2.33}
              }
          }

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "CAMB was installed.",
              "CAMB was imported.",
              "CAMB was used to compute fsigma8.",
              "CAMB produced cosmology outputs.",
              "A CAMB fixture was run.",
              "H0 was derived.",
              "Omega_m was derived.",
              "sigma8 was derived.",
              "fsigma8 was derived.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_84_CAMB_tiny_single_fixture_smoke_run",
                  "purpose": "Install CAMB and run one tiny fixture using the locked mapping contract.",
                  "why_next": "The point fixture and mapping contract are now separate and auditable."
              },
              {
                  "priority": 2,
                  "route_id": "v4_84_1_CAMB_tiny_fixture_output_shape_probe",
                  "purpose": "If CAMB installs but output retrieval is uncertain, probe sigma8 and fsigma8 output shape only.",
                  "why_next": "CAMB redshift output ordering and result-object methods must be guarded."
              },
              {
                  "priority": 3,
                  "route_id": "v4_85_single_fixture_residual_audit",
                  "purpose": "Compare CAMB-computed sigma8z/fsigma8z against the .minimum sidecar targets for one point fixture.",
                  "why_next": "Only after the solver run passes should we calculate residuals."
              },
              {
                  "priority": 4,
                  "route_id": "v4_86_reference_uncertainty_chain_sample_design",
                  "purpose": "Design the posterior sample path after the single point fixture works.",
                  "why_next": "A point fixture is not Planck reference uncertainty."
              }
          ]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015"},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038"},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051"},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061"},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233"}
          ]

          failed_gates = []
          warnings = [
              "mapping_contract_only",
              "no_CAMB_install",
              "no_CAMB_import",
              "no_CAMB_run",
              "no_solver_cosmology_run",
              "no_full_chain_import",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          primary = SOURCE_FIXTURE["primary_inputs"]

          ombh2 = primary["omegabh2"]["value"]
          omch2 = primary["omegach2"]["value"]
          theta_100 = primary["theta"]["value"]
          tau = primary["tau"]["value"]
          logA = primary["logA"]["value"]
          ns = primary["ns"]["value"]

          theta_for_camb = theta_100 / 100.0
          As = math.exp(logA) / 1.0e10

          FIXED_SOLVER_ASSUMPTIONS = {
              "H0": None,
              "omk": 0.0,
              "mnu_eV": 0.06,
              "num_massive_neutrinos": 1,
              "neutrino_hierarchy": "degenerate",
              "Alens": 1.0,
              "nonlinear": False,
              "kmax": 2.0,
              "notes": [
                  "H0 is not supplied because cosmomc_theta is supplied.",
                  "theta from Planck .minimum is labelled 100theta_MC and is divided by 100 for CAMB cosmomc_theta.",
                  "logA is labelled ln(10^10 A_s), so As = exp(logA) / 1e10.",
                  "This contract does not claim these fixed assumptions are final for full posterior work."
              ]
          }

          mapping_records = [
              {
                  "source_name": "omegabh2",
                  "source_label": primary["omegabh2"]["label"],
                  "source_value": ombh2,
                  "mapping_operation": "identity",
                  "camb_location": "set_cosmology",
                  "camb_name": "ombh2",
                  "camb_value": ombh2,
                  "status": "mapped_locked"
              },
              {
                  "source_name": "omegach2",
                  "source_label": primary["omegach2"]["label"],
                  "source_value": omch2,
                  "mapping_operation": "identity",
                  "camb_location": "set_cosmology",
                  "camb_name": "omch2",
                  "camb_value": omch2,
                  "status": "mapped_locked"
              },
              {
                  "source_name": "theta",
                  "source_label": primary["theta"]["label"],
                  "source_value": theta_100,
                  "mapping_operation": "divide_by_100_because_label_is_100theta_MC",
                  "camb_location": "set_cosmology",
                  "camb_name": "cosmomc_theta",
                  "camb_value": theta_for_camb,
                  "status": "mapped_locked"
              },
              {
                  "source_name": "tau",
                  "source_label": primary["tau"]["label"],
                  "source_value": tau,
                  "mapping_operation": "identity",
                  "camb_location": "set_cosmology",
                  "camb_name": "tau",
                  "camb_value": tau,
                  "status": "mapped_locked"
              },
              {
                  "source_name": "logA",
                  "source_label": primary["logA"]["label"],
                  "source_value": logA,
                  "mapping_operation": "As_equals_exp_logA_divided_by_1e10",
                  "camb_location": "InitPower.set_params",
                  "camb_name": "As",
                  "camb_value": As,
                  "status": "mapped_locked"
              },
              {
                  "source_name": "ns",
                  "source_label": primary["ns"]["label"],
                  "source_value": ns,
                  "mapping_operation": "identity",
                  "camb_location": "InitPower.set_params",
                  "camb_name": "ns",
                  "camb_value": ns,
                  "status": "mapped_locked"
              }
          ]

          solver_target_records = []
          for row in TARGET_REDSHIFTS:
              sigma_name = row["sigma8z_name"]
              fsigma_name = row["fsigma8_name"]
              solver_target_records.append({
                  "z_key": row["z_key"],
                  "z": row["z"],
                  "expected_sigma8z_name": sigma_name,
                  "expected_sigma8z_value": SOURCE_FIXTURE["sidecar_targets"][sigma_name]["value"],
                  "expected_fsigma8_name": fsigma_name,
                  "expected_fsigma8_value": SOURCE_FIXTURE["sidecar_targets"][fsigma_name]["value"],
                  "future_output_source": "CAMBdata.get_sigma8_and_get_fsigma8_after_set_matter_power",
                  "comparison_allowed_now": False,
                  "reason_comparison_blocked": "No CAMB run in v4.83."
              })

          camb_input_contract = {
              "contract_status": "mapping_only_not_run",
              "python_imports_allowed_next": ["camb", "math", "json"],
              "camb_params_constructor": "camb.CAMBparams()",
              "set_cosmology_kwargs": {
                  "H0": None,
                  "ombh2": ombh2,
                  "omch2": omch2,
                  "cosmomc_theta": theta_for_camb,
                  "tau": tau,
                  "omk": 0.0,
                  "mnu": 0.06
              },
              "init_power_kwargs": {
                  "As": As,
                  "ns": ns
              },
              "matter_power_kwargs": {
                  "redshifts": [row["z"] for row in TARGET_REDSHIFTS],
                  "kmax": 2.0,
                  "nonlinear": False
              },
              "expected_sidecar_targets": {
                  key: value["value"] for key, value in SOURCE_FIXTURE["sidecar_targets"].items()
              },
              "run_allowed_in_this_workflow": False,
              "solver_outputs_allowed_in_this_workflow": False
          }

          snippet = f'''# Generated by TAIRID v4.83 mapping contract.
          # This snippet is for the NEXT workflow. It is not executed in v4.83.

          import camb
          import math
          import json

          target_redshifts = {[row["z"] for row in TARGET_REDSHIFTS]!r}

          pars = camb.CAMBparams()
          pars.set_cosmology(
              H0=None,
              ombh2={ombh2:.10g},
              omch2={omch2:.10g},
              cosmomc_theta={theta_for_camb:.10g},
              tau={tau:.10g},
              omk=0.0,
              mnu=0.06,
          )
          pars.InitPower.set_params(
              As={As:.12e},
              ns={ns:.10g},
          )
          pars.set_matter_power(
              redshifts=target_redshifts,
              kmax=2.0,
              nonlinear=False,
          )

          # Future run step only:
          # results = camb.get_results(pars)
          # sigma8_values = results.get_sigma8()
          # fsigma8_values = results.get_fsigma8()
          # print(json.dumps({{"sigma8": list(map(float, sigma8_values)), "fsigma8": list(map(float, fsigma8_values))}}, indent=2))
          '''

          theta_mapping_valid = 0.001 < theta_for_camb < 0.1
          theta_raw_would_fail_guard = not (0.001 < theta_100 < 0.1)
          logA_mapping_valid = 1.0e-9 < As < 3.5e-9

          if not UPSTREAM_LOCKS["v4_82_8_strict_minimum_fixture_packet_retry"]["fixture_values_extracted"]:
              failed_gates.append("upstream_fixture_values_not_extracted")

          if UPSTREAM_LOCKS["v4_82_8_strict_minimum_fixture_packet_retry"]["solver_cosmology_run"] is not False:
              failed_gates.append("upstream_solver_run_boundary_not_carried")

          if len(mapping_records) != 6:
              failed_gates.append("mapping_record_count_not_6")

          if len(solver_target_records) != 5:
              failed_gates.append("solver_target_record_count_not_5")

          if camb_input_contract["set_cosmology_kwargs"]["H0"] is not None:
              failed_gates.append("H0_not_none_with_theta_mapping")

          if mapping_records[2]["camb_name"] != "cosmomc_theta":
              failed_gates.append("theta_not_mapped_to_cosmomc_theta")

          if not theta_mapping_valid:
              failed_gates.append("theta_for_camb_outside_expected_range")

          if not theta_raw_would_fail_guard:
              failed_gates.append("theta_raw_100theta_not_flagged_as_unusable_directly")

          if not logA_mapping_valid:
              failed_gates.append("As_from_logA_outside_plausible_range")

          if mapping_records[4]["camb_name"] != "As":
              failed_gates.append("logA_not_mapped_to_As")

          if not all(row["status"] == "mapped_locked" for row in mapping_records):
              failed_gates.append("not_all_mapping_records_locked")

          if camb_input_contract["run_allowed_in_this_workflow"] is not False:
              failed_gates.append("run_allowed_too_early")

          if camb_input_contract["solver_outputs_allowed_in_this_workflow"] is not False:
              failed_gates.append("solver_outputs_allowed_too_early")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "camb was installed",
              "camb was imported",
              "a camb fixture was run",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "CAMB_tiny_single_fixture_mapping_contract_passed_ready_for_CAMB_tiny_single_fixture_smoke_run"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_v4_82_8_fixture_locked",
                  "pass": UPSTREAM_LOCKS["v4_82_8_strict_minimum_fixture_packet_retry"]["fixture_values_extracted"] is True,
                  "result": "strict minimum fixture packet carried forward",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "six_primary_mappings_declared",
                  "pass": len(mapping_records) == 6,
                  "result": f"{len(mapping_records)} primary mappings declared",
                  "boundary": "Mapping only."
              },
              {
                  "rule_id": "theta_divide_by_100_mapping",
                  "pass": theta_mapping_valid and theta_raw_would_fail_guard,
                  "result": f"theta_100={theta_100}; cosmomc_theta={theta_for_camb}",
                  "boundary": "No H0 derived."
              },
              {
                  "rule_id": "H0_omitted_when_using_theta",
                  "pass": camb_input_contract["set_cosmology_kwargs"]["H0"] is None,
                  "result": "H0=None in future set_cosmology call",
                  "boundary": "No H0 solve in this workflow."
              },
              {
                  "rule_id": "logA_to_As_mapping",
                  "pass": logA_mapping_valid,
                  "result": f"logA={logA}; As={As}",
                  "boundary": "No power spectrum calculation."
              },
              {
                  "rule_id": "target_redshifts_declared",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "five target redshifts carried",
                  "boundary": "No solver output."
              },
              {
                  "rule_id": "sidecar_targets_carried_as_expected_values_only",
                  "pass": len(SOURCE_FIXTURE["sidecar_targets"]) == 10,
                  "result": "ten sidecar point targets carried",
                  "boundary": "Targets are not covariance."
              },
              {
                  "rule_id": "future_snippet_written_but_not_executed",
                  "pass": True,
                  "result": "CAMB snippet written as file only",
                  "boundary": "No CAMB import or run."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 19,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
                  "rule_id": "no_solver_run_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_CAMB_run_no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Mapping contract only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_83_rules_passed")

          if failed_gates:
              readiness_label = "CAMB_tiny_single_fixture_mapping_contract_failed"
              next_allowed_step = "Repair mapping contract before installing or running CAMB."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.84 CAMB tiny single fixture smoke run. "
                  "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_fixture_root": SOURCE_FIXTURE["root"],
              "mapping_record_count": len(mapping_records),
              "solver_target_record_count": len(solver_target_records),
              "theta_100_raw": theta_100,
              "theta_for_camb_cosmomc_theta": theta_for_camb,
              "theta_mapping_valid": theta_mapping_valid,
              "theta_raw_direct_use_blocked": theta_raw_would_fail_guard,
              "logA": logA,
              "As_from_logA": As,
              "logA_mapping_valid": logA_mapping_valid,
              "H0_supplied": False,
              "H0_derived": False,
              "Omega_m_derived": False,
              "sigma8_derived": False,
              "fsigma8_derived": False,
              "CAMB_installed": False,
              "CAMB_imported": False,
              "CAMB_run": False,
              "solver_cosmology_run": False,
              "fixture_run_allowed_now": False,
              "Planck_reference_uncertainty_computed": False,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "source_fixture": SOURCE_FIXTURE,
              "fixed_solver_assumptions": FIXED_SOLVER_ASSUMPTIONS,
              "mapping_records": mapping_records,
              "solver_target_records": solver_target_records,
              "camb_input_contract": camb_input_contract,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "mapping_contract_complete": len(failed_gates) == 0,
                  "CAMB_installed": False,
                  "CAMB_imported": False,
                  "CAMB_run": False,
                  "fixture_run_allowed_now": False,
                  "solver_cosmology_run": False,
                  "H0_derived": False,
                  "Omega_m_derived": False,
                  "sigma8_derived": False,
                  "fsigma8_derived": False,
                  "Planck_reference_uncertainty_computed": False,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_83_camb_tiny_single_fixture_mapping_contract.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          (OUTDIR / "camb_tiny_fixture_snippet_v4_83.py").write_text(snippet, encoding="utf-8")

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "mapping_records_v4_83.csv",
              mapping_records,
              [
                  "source_name",
                  "source_label",
                  "source_value",
                  "mapping_operation",
                  "camb_location",
                  "camb_name",
                  "camb_value",
                  "status"
              ]
          )

          write_csv(
              OUTDIR / "solver_target_records_v4_83.csv",
              solver_target_records,
              [
                  "z_key",
                  "z",
                  "expected_sigma8z_name",
                  "expected_sigma8z_value",
                  "expected_fsigma8_name",
                  "expected_fsigma8_value",
                  "future_output_source",
                  "comparison_allowed_now",
                  "reason_comparison_blocked"
              ]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_83.csv",
