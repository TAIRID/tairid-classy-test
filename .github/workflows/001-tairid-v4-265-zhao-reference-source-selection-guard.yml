name: 001 TAIRID v4.265 - Zhao Reference Source Selection Guard

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-265-zhao-reference-source-selection-guard.yml"
      - "data/cosmology/zhao_reference_model_manifest.csv"
      - "zhao_reference_model_manifest.csv"
      - "data/cosmology/zhao_reference_source_selection.csv"
      - "zhao_reference_source_selection.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-reference-source-selection-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.265 Zhao Reference Source Selection Guard is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.265 Zhao reference source selection guard
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.265"
          ROUTE = "zhao_reference_manifest_validator_or_reference_source_selection_guard_after_v4_264"
          EXPECTED_RESULT = "v4_265_zhao_reference_source_selection_guard_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_266_zhao_reference_source_fetch_or_manual_fill_plan"

          OUT = Path("tairid_v4_265_zhao_reference_source_selection_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-265-zhao-reference-source-selection-guard-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REFERENCE_MODEL_MANIFEST_CANDIDATES = [
              Path("data/cosmology/zhao_reference_model_manifest.csv"),
              Path("zhao_reference_model_manifest.csv"),
          ]

          SOURCE_SELECTION_CANDIDATES = [
              Path("data/cosmology/zhao_reference_source_selection.csv"),
              Path("zhao_reference_source_selection.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_REFERENCE_COLUMNS = [
              "reference_id",
              "observed_id",
              "model_family",
              "model_label",
              "redshift",
              "quantity",
              "predicted_value",
              "prediction_source_or_method",
              "parameter_status",
              "approval_status",
          ]

          REQUIRED_SOURCE_SELECTION_COLUMNS = [
              "selection_id",
              "model_family",
              "model_label",
              "source_type",
              "source_path_or_citation",
              "freeze_status",
              "parameter_status",
              "reference_values_available",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def safe_float(value):
              try:
                  return float(str(value).strip())
              except Exception:
                  return None

          inherited_v4_264_rows = [
              {
                  "inherited_from": "v4.264",
                  "item": "rules",
                  "value": "45 / 45 passed",
                  "meaning": "Zhao Reference Model Manifest Template passed.",
                  "carry_forward_status": "ready_for_source_selection",
              },
              {
                  "inherited_from": "v4.264",
                  "item": "reference_template_rows",
                  "value": 4,
                  "meaning": "Four reference template rows exist.",
                  "carry_forward_status": "template_ready",
              },
              {
                  "inherited_from": "v4.264",
                  "item": "reference_predictions_filled",
                  "value": False,
                  "meaning": "Predicted values were not filled.",
                  "carry_forward_status": "predictions_missing",
              },
              {
                  "inherited_from": "v4.264",
                  "item": "reference_source_option_rows",
                  "value": 4,
                  "meaning": "Four legal source lanes were listed.",
                  "carry_forward_status": "source_lanes_ready",
              },
              {
                  "inherited_from": "v4.264",
                  "item": "residuals_computed",
                  "value": False,
                  "meaning": "No residuals were computed.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.264",
                  "item": "chi_square_computed",
                  "value": False,
                  "meaning": "No chi-square was computed.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.264",
                  "item": "selected_next_route",
                  "value": "v4_265_zhao_reference_manifest_validator_or_reference_source_selection_guard",
                  "meaning": "Current route should choose source lane or validate if already filled.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          reference_model_manifest_status_rows, reference_model_manifest_input_rows = read_manifest_status(
              REFERENCE_MODEL_MANIFEST_CANDIDATES, REQUIRED_REFERENCE_COLUMNS, "reference"
          )
          source_selection_status_rows, source_selection_input_rows = read_manifest_status(
              SOURCE_SELECTION_CANDIDATES, REQUIRED_SOURCE_SELECTION_COLUMNS, "source_selection"
          )

          zhao_candidate_rows = [
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_0_978",
                  "redshift": 0.978,
                  "quantity": "f_sigma8",
                  "observed_value": 0.379,
                  "sigma": 0.176,
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_23",
                  "redshift": 1.230,
                  "quantity": "f_sigma8",
                  "observed_value": 0.385,
                  "sigma": 0.099,
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_526",
                  "redshift": 1.526,
                  "quantity": "f_sigma8",
                  "observed_value": 0.342,
                  "sigma": 0.070,
              },
              {
                  "observed_id": "zhao_dr14_tomographic_fsigma8_z_1_944",
                  "redshift": 1.944,
                  "quantity": "f_sigma8",
                  "observed_value": 0.364,
                  "sigma": 0.106,
              },
          ]

          source_lane_rows = [
              {
                  "lane_id": "lane_001",
                  "model_family": "published_LCDM_or_survey_reference",
                  "source_type": "published_or_documented_external_reference",
                  "allowed_use": "fill predicted values if the paper/source/method is clearly named",
                  "blocked_use": "unstated baseline or silent switch",
                  "freeze_requirement": "external_or_documented_before_scoring",
                  "scientific_status": "possible_later_reference_not_scored",
              },
              {
                  "lane_id": "lane_002",
                  "model_family": "pre_frozen_pipeline_prediction",
                  "source_type": "prior_workflow_or_prior_file",
                  "allowed_use": "fill predicted values if freeze record predates residual scoring",
                  "blocked_use": "editing after seeing residual direction",
                  "freeze_requirement": "pre_frozen_file_or_commit_required",
                  "scientific_status": "possible_later_reference_not_scored",
              },
              {
                  "lane_id": "lane_003",
                  "model_family": "TAIRID_candidate_model",
                  "source_type": "declared deterministic rule or pre-frozen TAIRID vector",
                  "allowed_use": "future diagnostic if parameters are fixed before scoring",
                  "blocked_use": "fitting TAIRID correction to Zhao and treating it as evidence",
                  "freeze_requirement": "parameter_free_or_pre_frozen_required",
                  "scientific_status": "diagnostic_only_not_validation",
              },
              {
                  "lane_id": "lane_004",
                  "model_family": "software_only_mock",
                  "source_type": "dummy values for pipeline mechanics",
                  "allowed_use": "test validator and residual math plumbing only",
                  "blocked_use": "scientific interpretation",
                  "freeze_requirement": "label_as_mock",
                  "scientific_status": "software_test_only",
              },
          ]

          source_selection_template_rows = []
          for lane in source_lane_rows:
              source_selection_template_rows.append({
                  "selection_id": "select_" + lane["lane_id"],
                  "model_family": lane["model_family"],
                  "model_label": "FILL_ONE_SELECTED_LABEL_OR_DELETE_NON_SELECTED_ROWS",
                  "source_type": lane["source_type"],
                  "source_path_or_citation": "FILL_SOURCE_PATH_CITATION_OR_METHOD",
                  "freeze_status": lane["freeze_requirement"],
                  "parameter_status": "not_fit_to_zhao_in_this_workflow",
                  "reference_values_available": "false",
                  "approval_status": "source_selection_candidate_not_scored",
              })

          source_selection_policy_rows = [
              {
                  "policy_id": "policy_001",
                  "policy": "Only one real scientific source lane should be active for the next reference manifest fill.",
                  "allowed": "one selected lane plus documented source",
                  "blocked": "mixing baseline sources without explicit label",
              },
              {
                  "policy_id": "policy_002",
                  "policy": "A software mock lane may be used only to test plumbing.",
                  "allowed": "software_only_mock with no scientific interpretation",
                  "blocked": "using mock output as evidence",
              },
              {
                  "policy_id": "policy_003",
                  "policy": "Predicted values must be frozen before residual scoring.",
                  "allowed": "external_source, pre_frozen, parameter_free, or mock",
                  "blocked": "fit_to_zhao_in_this_workflow",
              },
              {
                  "policy_id": "policy_004",
                  "policy": "Reference source selection does not grant scoring permission.",
                  "allowed": "template/source planning",
                  "blocked": "residuals, chi-square, correction fitting",
              },
          ]

          source_selection_input_review_rows = []
          if not source_selection_input_rows:
              source_selection_input_review_rows.append({
                  "review_id": "source_review_001",
                  "status": "missing",
                  "meaning": "No source selection file exists yet.",
                  "next_action": "Use zhao_reference_source_selection_TEMPLATE_v4_265_NOT_SCORED.csv or select lane in the next workflow.",
                  "scoring_allowed": False,
              })
          else:
              for row in source_selection_input_rows:
                  model_family = row.get("model_family", "")
                  approved_family = model_family in [lane["model_family"] for lane in source_lane_rows]
                  not_fit = row.get("parameter_status") != "fit_to_zhao_in_this_workflow"
                  approval_ok = row.get("approval_status") == "source_selection_candidate_not_scored"
                  source_filled = bool(str(row.get("source_path_or_citation", "")).strip()) and "FILL_" not in str(row.get("source_path_or_citation", ""))
                  source_selection_input_review_rows.append({
                      "selection_id": row.get("selection_id", ""),
                      "model_family": model_family,
                      "approved_family": approved_family,
                      "source_path_filled": source_filled,
                      "parameter_status_ok": not_fit,
                      "approval_status_ok": approval_ok,
                      "review_status": "reviewable_not_scored" if approved_family and source_filled and not_fit and approval_ok else "missing_or_scope_issue",
                      "scoring_allowed": False,
                  })

          reference_manifest_route_rows = [
              {
                  "route_id": "ref_route_001",
                  "condition": "reference_model_manifest has 4 numeric predicted rows",
                  "current_status": "met" if len(reference_model_manifest_input_rows) == 4 and all(safe_float(row.get("predicted_value")) is not None for row in reference_model_manifest_input_rows) else "not_met",
                  "next_route": "reference_manifest_validator",
              },
              {
                  "route_id": "ref_route_002",
                  "condition": "source_selection exists but predicted rows are missing",
                  "current_status": "met" if source_selection_input_rows and not reference_model_manifest_input_rows else "not_met",
                  "next_route": "reference_source_fetch_or_manual_fill_plan",
              },
              {
                  "route_id": "ref_route_003",
                  "condition": "no source selection and no predicted rows",
                  "current_status": "met" if not source_selection_input_rows and not reference_model_manifest_input_rows else "not_met",
                  "next_route": "reference_source_selection_needed",
              },
              {
                  "route_id": "ref_route_004",
                  "condition": "software mock selected",
                  "current_status": "met" if any(row.get("model_family") == "software_only_mock" for row in source_selection_input_rows) else "not_met",
                  "next_route": "software_plumbing_only",
              },
          ]

          reference_fill_plan_rows = []
          for row in zhao_candidate_rows:
              reference_fill_plan_rows.append({
                  "observed_id": row["observed_id"],
                  "redshift": row["redshift"],
                  "quantity": row["quantity"],
                  "required_prediction": "numeric f_sigma8 predicted value",
                  "required_source": "selected reference source lane",
                  "required_status": "reference_candidate_not_scored",
                  "current_status": "missing_prediction",
              })

          anti_circularity_guard_rows = [
              {
                  "guard_id": "anti_001",
                  "risk": "prediction value adjusted after seeing Zhao data",
                  "required_guard": "source or freeze record must predate residual scoring",
                  "status": "defined_not_met",
              },
              {
                  "guard_id": "anti_002",
                  "risk": "TAIRID parameter tuned to Zhao and called evidence",
                  "required_guard": "parameter-free or pre-frozen TAIRID rule only",
                  "status": "defined_not_met",
              },
              {
                  "guard_id": "anti_003",
                  "risk": "published baseline silently changed",
                  "required_guard": "model family and source path/citation must be explicit",
                  "status": "defined_not_met",
              },
              {
                  "guard_id": "anti_004",
                  "risk": "software mock accidentally interpreted scientifically",
                  "required_guard": "software_only_mock label blocks scientific interpretation",
                  "status": "defined_not_met",
              },
          ]

          blocked_operation_rows = [
              {
                  "blocked_id": "blocked_001",
                  "operation": "fill_predicted_values_automatically",
                  "reason": "no selected source lane with documented values has passed",
                  "blocked": True,
              },
              {
                  "blocked_id": "blocked_002",
                  "operation": "validate_reference_manifest_now",
                  "reason": "reference manifest has no numeric prediction rows yet",
                  "blocked": len(reference_model_manifest_input_rows) == 0,
              },
              {
                  "blocked_id": "blocked_003",
                  "operation": "compute_residuals_now",
                  "reason": "reference vector missing",
                  "blocked": True,
              },
              {
                  "blocked_id": "blocked_004",
                  "operation": "compute_chi_square_now",
                  "reason": "reference vector and inverse-covariance guard missing",
                  "blocked": True,
              },
              {
                  "blocked_id": "blocked_005",
                  "operation": "fit_numeric_correction_now",
                  "reason": "no scoring guard and no approved observed manifest",
                  "blocked": True,
              },
              {
                  "blocked_id": "blocked_006",
                  "operation": "claim_validation_now",
                  "reason": "no residual scoring or external likelihood fit",
                  "blocked": True,
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "reference_source_selection_guard",
                  "permission_status": "written",
                  "reason": "Allowed source lanes and anti-circularity rules are written.",
              },
              {
                  "permission_scope": "source_selection_template",
                  "permission_status": "written_template_only",
                  "reason": "A source-selection template is written for later fill.",
              },
              {
                  "permission_scope": "reference_source_fetch_or_manual_fill_plan",
                  "permission_status": "allowed_next",
                  "reason": "Next route can select/fetch/manual-fill reference predictions without scoring.",
              },
              {
                  "permission_scope": "reference_manifest_validator",
                  "permission_status": "blocked_until_numeric_predictions_exist",
                  "reason": "Validator requires four numeric predicted values.",
              },
              {
                  "permission_scope": "residual_preview",
                  "permission_status": "blocked",
                  "reason": "Reference predictions are not available.",
              },
              {
                  "permission_scope": "chi_square",
                  "permission_status": "blocked",
                  "reason": "Reference vector and inverse-covariance guard are missing.",
              },
              {
                  "permission_scope": "live_external_observed_manifest_fill",
                  "permission_status": "blocked",
                  "reason": "Live observed manifest fill is still not approved.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No scoring guard exists.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "Source selection is not evidence.",
              },
              {
                  "permission_scope": "full_independent_holdout_language",
                  "permission_status": "blocked",
                  "reason": "Zhao provenance remains same-family/cross-release.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No scoring or approved observed manifest exists.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
          ]

          readiness_rows = [
              {"readiness_id": "readiness_001", "requirement": "source_lane_registry", "status": "ready", "blocks": "nothing"},
              {"readiness_id": "readiness_002", "requirement": "source_selection_template", "status": "ready_template_only", "blocks": "nothing"},
              {"readiness_id": "readiness_003", "requirement": "selected_reference_source", "status": "missing", "blocks": "reference prediction fill"},
              {"readiness_id": "readiness_004", "requirement": "four_numeric_predictions", "status": "missing", "blocks": "reference validator"},
              {"readiness_id": "readiness_005", "requirement": "reference_manifest_validator", "status": "blocked_until_filled", "blocks": "residual preview"},
              {"readiness_id": "readiness_006", "requirement": "inverse_covariance_guard", "status": "blocked", "blocks": "chi-square"},
              {"readiness_id": "readiness_007", "requirement": "numeric_correction_fit", "status": "blocked", "blocks": "model comparison"},
              {"readiness_id": "readiness_008", "requirement": "combined_matrix_permission", "status": "blocked", "blocks": "combined matrix"},
          ]

          failure_condition_rows = [
              {"failure_condition_id": "failure_001", "target": "QSO f_sigma8 primary pressure", "machine_condition": "if holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_002", "target": "QSO versus LRG growth contrast", "machine_condition": "if lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_003", "target": "QSO radial secondary support", "machine_condition": "if qso_radial_direction == '-' then secondary_support_weakened", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_004", "target": "geometry compressed lane non-primary", "machine_condition": "if compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_005", "target": "external likelihood robustness", "machine_condition": "if external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover then baseline_pressure_not_tairid_specific", "status": "defined_for_future_not_tested"},
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "Reference source selection is now the active gap.",
                  "basis": "The reference template exists, but no prediction vector or source lane is selected.",
                  "next_action": "Use a source-selection template or create a fetch/manual-fill plan.",
                  "claim_status": "planning_only",
              },
              {
                  "decision_id": "decision_002",
                  "decision": "Four legal source lanes are defined.",
                  "basis": "Published reference, pre-frozen pipeline, TAIRID candidate, and software mock are separated.",
                  "next_action": "Pick one lane before filling predicted values.",
                  "claim_status": "no_scoring",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "Residual scoring remains blocked.",
                  "basis": "No numeric predicted values exist and no anti-circularity guard has passed.",
                  "next_action": "Do not compute residuals or chi-square.",
                  "claim_status": "scoring_blocked",
              },
              {
                  "decision_id": "decision_004",
                  "decision": "Next route should create a fetch/manual-fill plan.",
                  "basis": "The project now needs the actual predicted f_sigma8 vector source.",
                  "next_action": "Proceed to v4.266.",
                  "claim_status": "no_validation",
              },
          ]

          route_decision_rows = [
              {"route_id": "route_001", "route": "zhao_reference_source_fetch_or_manual_fill_plan", "permission_status": "recommended", "reason": "Need actual predicted f_sigma8 values from a selected source lane."},
              {"route_id": "route_002", "route": "zhao_reference_manifest_validator", "permission_status": "blocked_until_predictions_filled", "reason": "Reference manifest is empty or placeholder-only."},
              {"route_id": "route_003", "route": "zhao_residual_preview_guard", "permission_status": "blocked", "reason": "No numeric predictions yet."},
              {"route_id": "route_004", "route": "external_observed_residual_scoring", "permission_status": "blocked", "reason": "No scoring guard has passed."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.265 is enough history for consolidation if needed."},
          ]

          next_rows = [
              {"priority": 1, "test_id": "v4_266_zhao_reference_source_fetch_or_manual_fill_plan", "purpose": "choose/fetch/manual-fill predicted f_sigma8 source without scoring", "activated": True},
              {"priority": 2, "test_id": "v4_266_zhao_reference_manifest_validator", "purpose": "validate only after predictions are filled", "activated": False},
              {"priority": 3, "test_id": "v4_266_zhao_residual_preview_guard", "purpose": "still blocked until reference manifest validates", "activated": False},
              {"priority": 4, "test_id": "v4_266_handoff_if_needed", "purpose": "consolidate v4.203-v4.265 if thread length is risky", "activated": True},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before source selection"},
              {"gate": "inherited_v4_264_rows_equal_7", "passed": len(inherited_v4_264_rows) == 7, "detail": f"inherited_v4_264_rows = {len(inherited_v4_264_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "reference_model_manifest_status_rows_at_least_1", "passed": len(reference_model_manifest_status_rows) >= 1, "detail": f"reference_model_manifest_status_rows = {len(reference_model_manifest_status_rows)}"},
              {"gate": "source_selection_status_rows_at_least_1", "passed": len(source_selection_status_rows) >= 1, "detail": f"source_selection_status_rows = {len(source_selection_status_rows)}"},
              {"gate": "zhao_candidate_rows_equal_4", "passed": len(zhao_candidate_rows) == 4, "detail": f"zhao_candidate_rows = {len(zhao_candidate_rows)}"},
              {"gate": "source_lane_rows_equal_4", "passed": len(source_lane_rows) == 4, "detail": f"source_lane_rows = {len(source_lane_rows)}"},
              {"gate": "source_selection_template_rows_equal_4", "passed": len(source_selection_template_rows) == 4, "detail": f"source_selection_template_rows = {len(source_selection_template_rows)}"},
              {"gate": "source_selection_policy_rows_equal_4", "passed": len(source_selection_policy_rows) == 4, "detail": f"source_selection_policy_rows = {len(source_selection_policy_rows)}"},
              {"gate": "source_selection_input_review_rows_at_least_1", "passed": len(source_selection_input_review_rows) >= 1, "detail": f"source_selection_input_review_rows = {len(source_selection_input_review_rows)}"},
              {"gate": "reference_manifest_route_rows_equal_4", "passed": len(reference_manifest_route_rows) == 4, "detail": f"reference_manifest_route_rows = {len(reference_manifest_route_rows)}"},
              {"gate": "reference_fill_plan_rows_equal_4", "passed": len(reference_fill_plan_rows) == 4, "detail": f"reference_fill_plan_rows = {len(reference_fill_plan_rows)}"},
              {"gate": "anti_circularity_guard_rows_equal_4", "passed": len(anti_circularity_guard_rows) == 4, "detail": f"anti_circularity_guard_rows = {len(anti_circularity_guard_rows)}"},
              {"gate": "blocked_operation_rows_equal_6", "passed": len(blocked_operation_rows) == 6, "detail": f"blocked_operation_rows = {len(blocked_operation_rows)}"},
              {"gate": "permission_rows_equal_13", "passed": len(permission_rows) == 13, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_8", "passed": len(readiness_rows) == 8, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(failure_condition_rows) == 5, "detail": f"failure_condition_rows = {len(failure_condition_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "reference_predictions_still_missing", "passed": len(reference_model_manifest_input_rows) == 0, "detail": f"reference_model_manifest_input_rows = {len(reference_model_manifest_input_rows)}"},
              {"gate": "source_selection_missing_or_review_only", "passed": all(row["scoring_allowed"] is False for row in source_selection_input_review_rows), "detail": "source selection review-only"},
              {"gate": "all_source_template_rows_not_scored", "passed": all(row["approval_status"] == "source_selection_candidate_not_scored" for row in source_selection_template_rows), "detail": "source templates non-scoring"},
              {"gate": "all_source_template_rows_not_fit_to_zhao", "passed": all(row["parameter_status"] == "not_fit_to_zhao_in_this_workflow" for row in source_selection_template_rows), "detail": "source templates not fit to Zhao"},
              {"gate": "all_blocked_operations_blocked", "passed": all(row["blocked"] is True for row in blocked_operation_rows), "detail": "all risky operations blocked"},
              {"gate": "source_selection_guard_written", "passed": any(row["permission_scope"] == "reference_source_selection_guard" and row["permission_status"] == "written" for row in permission_rows), "detail": "source selection guard written"},
              {"gate": "source_selection_template_written_only", "passed": any(row["permission_scope"] == "source_selection_template" and row["permission_status"] == "written_template_only" for row in permission_rows), "detail": "source selection template only"},
              {"gate": "reference_fetch_or_manual_fill_allowed_next", "passed": any(row["permission_scope"] == "reference_source_fetch_or_manual_fill_plan" and row["permission_status"] == "allowed_next" for row in permission_rows), "detail": "fetch/manual fill allowed next"},
              {"gate": "reference_validator_blocked_until_predictions", "passed": any(row["permission_scope"] == "reference_manifest_validator" and row["permission_status"] == "blocked_until_numeric_predictions_exist" for row in permission_rows), "detail": "reference validator blocked"},
              {"gate": "residual_preview_blocked", "passed": any(row["permission_scope"] == "residual_preview" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "residual preview blocked"},
              {"gate": "chi_square_blocked", "passed": any(row["permission_scope"] == "chi_square" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "chi-square blocked"},
              {"gate": "live_manifest_fill_blocked", "passed": any(row["permission_scope"] == "live_external_observed_manifest_fill" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "live manifest fill blocked"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO evidence blocked"},
              {"gate": "full_holdout_language_blocked", "passed": any(row["permission_scope"] == "full_independent_holdout_language" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "full holdout language blocked"},
