              {"gate": "reference_validator_not_activated", "passed": any(row["test_id"] == "v4_266_zhao_reference_manifest_validator" and row["activated"] is False for row in next_rows), "detail": "reference validator not activated"},
              {"gate": "residual_preview_not_activated", "passed": any(row["test_id"] == "v4_266_zhao_residual_preview_guard" and row["activated"] is False for row in next_rows), "detail": "residual preview not activated"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no external observed scoring"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout approval"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_266_zhao_reference_source_fetch_or_manual_fill_plan", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_265_zhao_reference_source_selection_guard_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_265_inherited_v4_264_rows.csv", inherited_v4_264_rows)
