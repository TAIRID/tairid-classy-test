name: 000 TAIRID v4.93 Bounded Larger Sample Parser Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-93-bounded-larger-sample-parser-design.yml"

jobs:
  tairid-v4-93-bounded-larger-sample-parser-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.93 bounded larger sample parser design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_93_bounded_larger_sample_parser_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_93_bounded_larger_sample_parser_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_93_bounded_larger_sample_parser_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse additional chain sample rows.",
              "This does not run CAMB.",
              "This does not compute weighted mean values.",
              "This does not compute a weighted covariance matrix.",
              "This does not compute Planck reference uncertainty.",
              "This designs the next larger bounded chain-sample parser probe after the v4.92 12-sample micro-covariance mechanics diagnostic passed.",
              "A pass means the larger bounded parser route is specified and ready for a parser probe, not that larger posterior uncertainty has been computed."
          ]

          UPSTREAM_LOCKS = {
              "v4_92_reference_uncertainty_micro_covariance_probe": {
                  "readiness_label": "reference_uncertainty_micro_covariance_probe_passed_ready_for_bounded_larger_sample_parser_design",
                  "micro_covariance_probe_run": True,
                  "micro_covariance_probe_passed": True,
                  "sample_count": 12,
                  "weight_total": 30.0,
                  "effective_sample_size": 9.183673469387756,
                  "effective_sample_size_fraction": 0.7653061224489797,
                  "target_vector_dimension": 10,
                  "weighted_mean_vector_computed": True,
                  "weighted_covariance_matrix_computed": True,
                  "fsigma8_covariance_matrix_computed": True,
                  "full_covariance_rank_estimate": 5,
                  "fsigma8_covariance_rank_estimate": 3,
                  "rank_limited_warning_required": True,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_91_weighted_covariance_formula_lock": {
                  "readiness_label": "weighted_covariance_formula_lock_passed_ready_for_reference_uncertainty_micro_covariance_probe",
                  "output_vector_dimension": 10,
                  "fsigma8_positions": [1, 3, 5, 7, 9],
                  "weighted_mean_vector_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "Planck_reference_uncertainty_computed": False
              },
              "v4_90_sample_packet_microbatch_solver_probe": {
                  "readiness_label": "sample_packet_microbatch_solver_probe_passed_ready_for_weighted_covariance_formula_lock",
                  "sample_output_vector_count": 12,
                  "all_output_vectors_complete": True,
                  "all_weights_preserved": True,
                  "all_orientations_reversed": True,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          SELECTED_ROOT = "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE"
          PARAMNAMES_MEMBER = SELECTED_ROOT + ".paramnames"
          PRIMARY_CHAIN_MEMBER = SELECTED_ROOT + "_1.txt"
          OPTIONAL_CHAIN_MEMBER_2 = SELECTED_ROOT + "_2.txt"

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "sigma8z_name": "sigma8z015", "fsigma8_name": "fsigma8z015"},
              {"z_key": "038", "z": 0.38, "sigma8z_name": "sigma8z038", "fsigma8_name": "fsigma8z038"},
              {"z_key": "051", "z": 0.51, "sigma8z_name": "sigma8z051", "fsigma8_name": "fsigma8z051"},
              {"z_key": "061", "z": 0.61, "sigma8z_name": "sigma8z061", "fsigma8_name": "fsigma8z061"},
              {"z_key": "233", "z": 2.33, "sigma8z_name": "sigma8z233", "fsigma8_name": "fsigma8z233"}
          ]

          LARGER_PARSER_LIMITS = {
              "design_status": "design_only_not_parsed",
              "next_probe_target_valid_rows": 64,
              "next_probe_min_valid_rows": 32,
              "next_probe_max_valid_rows": 64,
              "next_probe_primary_chain_member": PRIMARY_CHAIN_MEMBER,
              "next_probe_optional_chain_member_2": OPTIONAL_CHAIN_MEMBER_2,
              "next_probe_parse_member_2_now": False,
              "max_central_directory_read_bytes": 5_000_000,
              "max_paramnames_compressed_bytes": 100_000,
              "max_chain_prefix_compressed_bytes": 12_000_000,
              "stop_after_valid_rows": 64,
              "run_CAMB_now": False,
              "compute_weighted_mean_now": False,
              "compute_covariance_now": False,
              "compute_reference_uncertainty_now": False,
              "compute_final_pressure_now": False
          }

          SCALING_RATIONALE = [
              {
                  "reason_id": "micro_covariance_was_mechanics_only",
                  "plain_language": "v4.92 proved the weighted mean/covariance mechanics on 12 rows, but 12 rows cannot represent the full Planck posterior.",
                  "design_consequence": "Increase parsed rows before treating the covariance lane as meaningful."
              },
              {
                  "reason_id": "rank_limited_warning",
                  "plain_language": "A 10-dimensional covariance from 12 samples is rank-limited and sampling-noisy.",
                  "design_consequence": "Use the larger parser probe to reduce the rank/sampling warning before bigger solver batches."
              },
              {
                  "reason_id": "bounded_runtime_control",
                  "plain_language": "CAMB runs are heavier than parsing, so the next test should expand parsing before expanding solver execution.",
                  "design_consequence": "v4.94 parses a larger bounded sample batch but does not run CAMB."
              },
              {
                  "reason_id": "no_full_chain_import_yet",
                  "plain_language": "The project still uses range reads and bounded prefixes, not full chain imports.",
                  "design_consequence": "The next probe must label results as bounded-prefix sample packets only."
              }
          ]

          PARSER_MEMBER_PLAN = [
              {
                  "member_role": "parameter_names",
                  "member_name": PARAMNAMES_MEMBER,
                  "action_next_probe": "fetch_and_parse_by_bounded_range",
                  "required": True,
                  "parse_now": False
              },
              {
                  "member_role": "primary_chain_sample_prefix",
                  "member_name": PRIMARY_CHAIN_MEMBER,
                  "action_next_probe": "fetch_bounded_prefix_until_64_valid_rows_or_byte_guard",
                  "required": True,
                  "parse_now": False
              },
              {
                  "member_role": "optional_second_chain_member_visibility",
                  "member_name": OPTIONAL_CHAIN_MEMBER_2,
                  "action_next_probe": "confirm_manifest_presence_only_or_leave_parked",
                  "required": False,
                  "parse_now": False
              }
          ]

          REQUIRED_PRIMARY_PARAMETERS = [
              {"parameter_name": "omegabh2", "future_camb_name": "ombh2", "plausible_min": 0.005, "plausible_max": 0.04, "mapping_operation": "identity"},
              {"parameter_name": "omegach2", "future_camb_name": "omch2", "plausible_min": 0.05, "plausible_max": 0.30, "mapping_operation": "identity"},
              {"parameter_name": "theta", "future_camb_name": "cosmomc_theta", "plausible_min": 0.5, "plausible_max": 2.0, "mapping_operation": "divide_by_100_if_label_is_100theta_MC"},
              {"parameter_name": "tau", "future_camb_name": "tau", "plausible_min": 0.01, "plausible_max": 0.20, "mapping_operation": "identity"},
              {"parameter_name": "logA", "future_camb_name": "As", "plausible_min": 2.0, "plausible_max": 4.0, "mapping_operation": "As_equals_exp_logA_divided_by_1e10"},
              {"parameter_name": "ns", "future_camb_name": "ns", "plausible_min": 0.8, "plausible_max": 1.2, "mapping_operation": "identity"}
          ]

          SAMPLE_PACKET_SCHEMA = [
              {"field_name": "sample_number", "required": True, "meaning": "Sequential sample packet number inside the bounded parser probe."},
              {"field_name": "source_line_number", "required": True, "meaning": "Line number from the source chain prefix."},
              {"field_name": "sample_weight", "required": True, "meaning": "CosmoMC/Planck sample weight column."},
              {"field_name": "minus_loglike_or_proxy", "required": True, "meaning": "Likelihood diagnostic column, preserved but not used as weight unless later verified."},
              {"field_name": "omegabh2", "required": True, "meaning": "Baryon density input for CAMB."},
              {"field_name": "omegach2", "required": True, "meaning": "Cold dark matter density input for CAMB."},
              {"field_name": "theta", "required": True, "meaning": "Planck/CosmoMC theta-like parameter; mapping must preserve the divide-by-100 guard when label is 100theta_MC."},
              {"field_name": "tau", "required": True, "meaning": "Optical depth input for CAMB."},
              {"field_name": "logA", "required": True, "meaning": "ln(10^10 As); convert to As later."},
              {"field_name": "ns", "required": True, "meaning": "Scalar spectral index input for CAMB."},
              {"field_name": "cosmomc_theta_for_future_CAMB", "required": True, "meaning": "theta divided by 100 when label requires it."},
              {"field_name": "As_for_future_CAMB", "required": True, "meaning": "exp(logA)/1e10."},
              {"field_name": "future_CAMB_run_allowed_now", "required": True, "meaning": "Must remain false in parser probe."}
          ]

          NEXT_PARSER_QUALITY_GATES = [
              {"gate_id": "selected_members_found", "requirement": "Selected .paramnames and _1.txt chain sample members must be found in the ZIP64 central directory.", "hard_fail": True},
              {"gate_id": "paramnames_complete", "requirement": "All six primary parameters must be mapped from .paramnames to chain columns.", "hard_fail": True},
              {"gate_id": "bounded_prefix_only", "requirement": "The parser must stop at byte guard or 64 valid rows; no full chain sample file parse.", "hard_fail": True},
              {"gate_id": "minimum_valid_rows", "requirement": "At least 32 valid rows are needed for the larger parser probe to pass.", "hard_fail": True},
              {"gate_id": "target_valid_rows", "requirement": "The ideal next probe target is 64 valid rows.", "hard_fail": False},
              {"gate_id": "positive_weights", "requirement": "All parsed sample weights must be positive finite numbers.", "hard_fail": True},
              {"gate_id": "plausible_primary_values", "requirement": "All primary CAMB input parameters must fall inside conservative plausibility ranges.", "hard_fail": True},
              {"gate_id": "duplicate_line_guard", "requirement": "Line hashes should be unique across retained sample packets.", "hard_fail": True},
              {"gate_id": "effective_sample_size_preview", "requirement": "Compute weight total and ESS preview in the parser probe, but do not compute covariance.", "hard_fail": False},
              {"gate_id": "solver_block", "requirement": "The larger parser probe must not run CAMB.", "hard_fail": True},
              {"gate_id": "covariance_block", "requirement": "The larger parser probe must not compute weighted mean, covariance, Planck reference uncertainty, or final pressure.", "hard_fail": True}
          ]

          CHUNKING_PLAN_AFTER_PARSER = [
              {
                  "future_step": "v4_95_larger_sample_microbatch_solver_design",
                  "sample_count_basis": "Use v4.94 parsed rows, likely up to 64 valid sample packets.",
                  "solver_policy": "Design chunked CAMB execution before running; do not jump directly to full posterior."
              },
              {
                  "future_step": "v4_96_larger_sample_microbatch_solver_probe",
                  "sample_count_basis": "Run bounded chunks only after v4.95 design passes.",
                  "solver_policy": "Write output vectors and preserve weights; do not compute final pressure."
              },
              {
                  "future_step": "v4_97_larger_sample_covariance_diagnostic",
                  "sample_count_basis": "Compute diagnostic mean/covariance only after larger output vectors exist.",
                  "solver_policy": "Still label as bounded diagnostic unless enough posterior support exists."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A weighted covariance matrix was computed in v4.93.",
              "A weighted posterior mean vector was computed in v4.93.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The bounded larger sample parser design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The 12-sample micro covariance is enough for final RSD pressure.",
              "The next 64-row parser probe will be full Planck reference uncertainty.",
              "Designing the larger parser is the same as parsing larger samples."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_94_bounded_larger_sample_parser_probe",
                  "purpose": "Parse a larger bounded prefix from the selected Planck chain sample member, targeting 64 valid weighted sample packets.",
                  "why_next": "v4.92 showed the 12-sample covariance mechanics work but are rank-limited and not final."
              },
              {
                  "priority": 2,
                  "route_id": "v4_95_larger_sample_microbatch_solver_design",
                  "purpose": "Design chunked CAMB execution for the larger parsed sample packet set.",
                  "why_next": "A larger parser output should be converted into solver output vectors only after a design pass."
              },
              {
                  "priority": 3,
                  "route_id": "v4_96_larger_sample_microbatch_solver_probe",
                  "purpose": "Run CAMB over the larger bounded sample set in controlled chunks.",
                  "why_next": "Reference uncertainty needs output vectors across more than 12 weighted samples."
              },
              {
                  "priority": 4,
                  "route_id": "v4_97_larger_sample_covariance_diagnostic",
                  "purpose": "Compute a larger bounded covariance diagnostic after larger solver outputs exist.",
                  "why_next": "The full reference lane needs covariance mechanics to scale before final claims."
              }
          ]

          failed_gates = []
          warnings = [
              "larger_sample_parser_design_only",
              "no_additional_chain_rows_parsed",
              "no_CAMB_run",
              "no_weighted_mean_computed",
              "no_covariance_computed",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          required_primary = {"omegabh2", "omegach2", "theta", "tau", "logA", "ns"}
          declared_primary = {row["parameter_name"] for row in REQUIRED_PRIMARY_PARAMETERS}
          schema_fields = {row["field_name"] for row in SAMPLE_PACKET_SCHEMA}
          required_schema_fields = {
              "sample_number",
              "source_line_number",
              "sample_weight",
              "minus_loglike_or_proxy",
              "omegabh2",
              "omegach2",
              "theta",
              "tau",
              "logA",
              "ns",
              "cosmomc_theta_for_future_CAMB",
              "As_for_future_CAMB",
              "future_CAMB_run_allowed_now"
          }

          hard_gate_count = sum(1 for row in NEXT_PARSER_QUALITY_GATES if row["hard_fail"] is True)
          soft_gate_count = sum(1 for row in NEXT_PARSER_QUALITY_GATES if row["hard_fail"] is False)

          design_summary = {
              "selected_root": SELECTED_ROOT,
              "primary_chain_member": PRIMARY_CHAIN_MEMBER,
              "target_valid_rows_next_probe": LARGER_PARSER_LIMITS["next_probe_target_valid_rows"],
              "minimum_valid_rows_next_probe": LARGER_PARSER_LIMITS["next_probe_min_valid_rows"],
              "max_chain_prefix_compressed_bytes": LARGER_PARSER_LIMITS["max_chain_prefix_compressed_bytes"],
              "sample_packet_schema_fields": len(SAMPLE_PACKET_SCHEMA),
              "required_primary_parameters_declared": declared_primary == required_primary,
              "required_sample_packet_fields_declared": schema_fields == required_schema_fields,
              "quality_gate_count": len(NEXT_PARSER_QUALITY_GATES),
              "hard_quality_gate_count": hard_gate_count,
              "soft_quality_gate_count": soft_gate_count,
              "parse_larger_samples_now": False,
              "CAMB_run": False,
              "weighted_mean_vector_computed": False,
              "weighted_covariance_matrix_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "final_RSD_pressure_score_computed": False
          }

          if UPSTREAM_LOCKS["v4_92_reference_uncertainty_micro_covariance_probe"]["micro_covariance_probe_passed"] is not True:
              failed_gates.append("upstream_micro_covariance_probe_not_passed")

          if UPSTREAM_LOCKS["v4_92_reference_uncertainty_micro_covariance_probe"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_92_reference_uncertainty_micro_covariance_probe"]["rank_limited_warning_required"] is not True:
              failed_gates.append("rank_limited_warning_not_carried")

          if LARGER_PARSER_LIMITS["next_probe_target_valid_rows"] <= UPSTREAM_LOCKS["v4_92_reference_uncertainty_micro_covariance_probe"]["sample_count"]:
              failed_gates.append("larger_target_row_count_not_greater_than_micro_sample_count")

          if LARGER_PARSER_LIMITS["next_probe_min_valid_rows"] < 32:
              failed_gates.append("minimum_valid_rows_too_low")

          if LARGER_PARSER_LIMITS["run_CAMB_now"] is not False:
              failed_gates.append("CAMB_run_allowed_too_early")

          if LARGER_PARSER_LIMITS["compute_covariance_now"] is not False:
              failed_gates.append("covariance_compute_allowed_too_early")

          if declared_primary != required_primary:
              failed_gates.append("required_primary_parameters_not_declared")

          if schema_fields != required_schema_fields:
              failed_gates.append("sample_packet_schema_incomplete")

          if len(NEXT_PARSER_QUALITY_GATES) < 10:
              failed_gates.append("next_parser_quality_gates_incomplete")

          if not any(row["member_role"] == "primary_chain_sample_prefix" and row["required"] is True for row in PARSER_MEMBER_PLAN):
              failed_gates.append("primary_chain_sample_member_not_required")

          if len(CHUNKING_PLAN_AFTER_PARSER) < 3:
              failed_gates.append("post_parser_chunking_plan_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "weighted covariance matrix was computed in v4.93",
              "weighted posterior mean vector was computed in v4.93",
              "final rsd pressure score",
              "validates tairid cosmology",
              "next 64-row parser probe will be full planck reference uncertainty",
              "designing the larger parser is the same as parsing larger samples",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "bounded_larger_sample_parser_design_passed_ready_for_bounded_larger_sample_parser_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_micro_covariance_pass_carried",
                  "pass": UPSTREAM_LOCKS["v4_92_reference_uncertainty_micro_covariance_probe"]["micro_covariance_probe_passed"] is True,
                  "result": "v4.92 micro covariance mechanics passed",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "rank_warning_preserved",
                  "pass": UPSTREAM_LOCKS["v4_92_reference_uncertainty_micro_covariance_probe"]["rank_limited_warning_required"] is True,
                  "result": "12-sample covariance remains rank/sampling limited",
                  "boundary": "No final reference uncertainty claim."
              },
              {
                  "rule_id": "larger_row_target_declared",
                  "pass": LARGER_PARSER_LIMITS["next_probe_target_valid_rows"] == 64 and LARGER_PARSER_LIMITS["next_probe_min_valid_rows"] == 32,
                  "result": "target 64 valid rows, minimum 32 valid rows",
                  "boundary": "Parser target only."
              },
              {
                  "rule_id": "bounded_member_plan_declared",
                  "pass": len(PARSER_MEMBER_PLAN) == 3,
                  "result": "paramnames, primary chain prefix, and optional second member visibility declared",
                  "boundary": "No member parsed in v4.93."
              },
              {
                  "rule_id": "primary_parameter_schema_declared",
                  "pass": declared_primary == required_primary,
                  "result": "six primary CAMB parameters declared",
                  "boundary": "No CAMB run."
              },
              {
                  "rule_id": "sample_packet_schema_declared",
                  "pass": schema_fields == required_schema_fields,
                  "result": f"{len(SAMPLE_PACKET_SCHEMA)} sample packet fields declared",
                  "boundary": "No sample rows parsed in v4.93."
              },
              {
                  "rule_id": "next_parser_quality_gates_declared",
                  "pass": len(NEXT_PARSER_QUALITY_GATES) >= 10,
                  "result": f"{len(NEXT_PARSER_QUALITY_GATES)} parser quality gates declared",
                  "boundary": "Next probe guardrails."
              },
              {
                  "rule_id": "post_parser_chunking_plan_declared",
                  "pass": len(CHUNKING_PLAN_AFTER_PARSER) >= 3,
                  "result": "larger parser -> larger solver design -> larger solver probe -> covariance diagnostic path declared",
                  "boundary": "Future route only."
              },
              {
                  "rule_id": "no_new_parse_or_solver_run",
                  "pass": LARGER_PARSER_LIMITS["run_CAMB_now"] is False and design_summary["parse_larger_samples_now"] is False,
                  "result": "v4.93 is design only",
                  "boundary": "No additional chain rows parsed and no CAMB run."
              },
              {
                  "rule_id": "reference_uncertainty_still_blocked",
                  "pass": design_summary["Planck_reference_uncertainty_computed"] is False,
                  "result": "Planck reference uncertainty not computed",
                  "boundary": "No posterior covariance claim."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_93_rules_passed")

          if failed_gates:
              readiness_label = "bounded_larger_sample_parser_design_failed"
              next_allowed_step = "Repair the larger sample parser design before running any larger parser probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.94 bounded larger sample parser probe. "
                  "Do not run CAMB, compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_micro_sample_count": UPSTREAM_LOCKS["v4_92_reference_uncertainty_micro_covariance_probe"]["sample_count"],
              "upstream_effective_sample_size": UPSTREAM_LOCKS["v4_92_reference_uncertainty_micro_covariance_probe"]["effective_sample_size"],
              "upstream_rank_limited_warning_required": True,
              "selected_root": SELECTED_ROOT,
              "target_valid_rows_next_probe": LARGER_PARSER_LIMITS["next_probe_target_valid_rows"],
              "minimum_valid_rows_next_probe": LARGER_PARSER_LIMITS["next_probe_min_valid_rows"],
              "max_chain_prefix_compressed_bytes": LARGER_PARSER_LIMITS["max_chain_prefix_compressed_bytes"],
              "parser_member_plan_count": len(PARSER_MEMBER_PLAN),
              "required_primary_parameter_count": len(REQUIRED_PRIMARY_PARAMETERS),
              "sample_packet_schema_field_count": len(SAMPLE_PACKET_SCHEMA),
              "next_parser_quality_gate_count": len(NEXT_PARSER_QUALITY_GATES),
              "hard_quality_gate_count": hard_gate_count,
              "soft_quality_gate_count": soft_gate_count,
              "chunking_plan_step_count": len(CHUNKING_PLAN_AFTER_PARSER),
              "larger_samples_parsed": False,
