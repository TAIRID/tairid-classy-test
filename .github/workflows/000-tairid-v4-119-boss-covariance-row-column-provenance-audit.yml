          for filename in [
              "tairid_v4_119_BOSS_covariance_row_column_provenance_audit.json",
              "tairid_v4_119_BOSS_covariance_row_column_provenance_audit.md",
              "archive_member_records_v4_119.csv",
              "primary_selection_records_v4_119.csv",
              "row_column_mapping_records_v4_119.csv",
              "boss_fsigma8_subblock_records_v4_119.csv",
              "blocked_claims_v4_119.csv",
              "next_route_options_v4_119.csv",
              "rule_results_v4_119.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_119_BOSS_covariance_row_column_provenance_audit.md").write_text(
              "\n".join(md),
