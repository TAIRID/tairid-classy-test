name: 000 TAIRID v4.119 BOSS Covariance Row Column Provenance Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-119-boss-covariance-row-column-provenance-audit.yml"

jobs:
  tairid-v4-119-boss-covariance-row-column-provenance-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.119 BOSS covariance row column provenance audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_119_boss_covariance_row_column_provenance_audit

          python - <<'PY'
          import csv
          import io
          import json
          import math
          import tarfile
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_119_boss_covariance_row_column_provenance_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_119_boss_covariance_row_column_provenance_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This audits the exact BOSS DR12 covariance source, row order, column order, and primary-selection rule.",
              "This may extract a verified BOSS fσ8 covariance subblock, but does not recompute bridge pressure.",
              "A pass means the BOSS covariance provenance is locked for the next verified observed-covariance bridge probe."
          ]

          UPSTREAM_LOCKS = {
              "v4_118_observed_covariance_upgrade_sensitivity_audit": {
                  "readiness_label": "observed_covariance_upgrade_sensitivity_audit_passed_pressure_stable_source_covariance_material_ready_for_BOSS_row_column_provenance_audit",
                  "source_observed_covariance_ingested": True,
                  "covariance_upgrade_status": "BOSS_DR12_source_covariance_subblock_inserted_positions_1_2_3",
                  "boss_subblock_candidate_count": 16,
                  "primary_chi2": 1.2943386544372018,
                  "baseline_diagonal_chi2": 1.8857450832335483,
                  "primary_pressure_z": 0.0,
                  "baseline_diagonal_pressure_z": 0.0,
                  "max_abs_delta_chi2": 0.5914064287963465,
                  "max_abs_delta_pressure_z": 0.0,
                  "diagnostic_pressure_stable": True,
                  "pressure_z_all_zero": True,
                  "row_column_provenance_required": True,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_117_observed_covariance_upgrade_probe": {
                  "readiness_label": "observed_covariance_upgrade_probe_passed_source_covariance_ingested_diagnostic_only_ready_for_upgrade_sensitivity_audit",
                  "source_attempted": True,
                  "source_observed_covariance_ingested": True,
                  "observed_RSD_covariance_upgraded": True,
                  "boss_subblock_candidate_count": 16,
                  "covariance_candidate_count": 18,
                  "archive_member_count": 46,
                  "covariance_upgrade_status": "BOSS_DR12_source_covariance_subblock_inserted_positions_1_2_3",
                  "previous_auto_selected_member": "COMBINEDDR12_FS_consensus_dM_Hz/FS_SATPATHY_cov_z3.txt",
                  "previous_auto_selected_subblock_status": "direct_3x3_candidate",
                  "previous_auto_selection_rule": "first_usable_candidate",
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          SOURCE_TARBALL = {
              "target_id": "BOSS_DR12_consensus_Gaussian_likelihood_tarball",
              "url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/ALAM_ET_AL_2016_consensus_and_individual_Gaussian_constraints.tar.gz",
              "max_bytes": 2000000,
              "purpose": "Official SDSS/SAS BOSS DR12 consensus and individual Gaussian constraints tarball."
          }

          TARGET_PRIMARY_MEMBER = "COMBINEDDR12_FS_consensus_dM_Hz/FS_consensus_covtot_dM_Hz_fsig.txt"

          EXPECTED_BOSS_MAPPING = [
              {"matrix_index": 0, "redshift_bin": "z1", "z": 0.38, "observable": "dM", "bridge_position": "", "used_for_fsigma8_bridge": False},
              {"matrix_index": 1, "redshift_bin": "z1", "z": 0.38, "observable": "Hz", "bridge_position": "", "used_for_fsigma8_bridge": False},
              {"matrix_index": 2, "redshift_bin": "z1", "z": 0.38, "observable": "fsigma8", "bridge_position": 1, "used_for_fsigma8_bridge": True},
              {"matrix_index": 3, "redshift_bin": "z2", "z": 0.51, "observable": "dM", "bridge_position": "", "used_for_fsigma8_bridge": False},
              {"matrix_index": 4, "redshift_bin": "z2", "z": 0.51, "observable": "Hz", "bridge_position": "", "used_for_fsigma8_bridge": False},
              {"matrix_index": 5, "redshift_bin": "z2", "z": 0.51, "observable": "fsigma8", "bridge_position": 2, "used_for_fsigma8_bridge": True},
              {"matrix_index": 6, "redshift_bin": "z3", "z": 0.61, "observable": "dM", "bridge_position": "", "used_for_fsigma8_bridge": False},
              {"matrix_index": 7, "redshift_bin": "z3", "z": 0.61, "observable": "Hz", "bridge_position": "", "used_for_fsigma8_bridge": False},
              {"matrix_index": 8, "redshift_bin": "z3", "z": 0.61, "observable": "fsigma8", "bridge_position": 3, "used_for_fsigma8_bridge": True}
          ]

          PRIMARY_SELECTION_RULE = [
              {
                  "rule_id": "prefer_consensus_covtot_over_individual_covariances",
                  "requirement": "The primary BOSS covariance source must be the consensus total covariance file, not an individual-method 3x3 covariance.",
                  "reason": "v4.117 found many valid candidates; first usable candidate is not a reliable scientific selection rule.",
                  "pass_required": True
              },
              {
                  "rule_id": "target_member_exact_match",
                  "requirement": f"Archive must contain {TARGET_PRIMARY_MEMBER}.",
                  "reason": "This locks provenance to the intended consensus covariance file.",
                  "pass_required": True
              },
              {
                  "rule_id": "filename_semantics_match",
                  "requirement": "Target member name must contain consensus, covtot, dM, Hz, and fsig.",
                  "reason": "The filename carries the row/column observable family used for the extraction.",
                  "pass_required": True
              },
              {
                  "rule_id": "matrix_shape_is_9x9",
                  "requirement": "Target covariance file must parse as a 9x9 numeric matrix.",
                  "reason": "Three redshift bins times three observables each gives nine rows/columns.",
                  "pass_required": True
              },
              {
                  "rule_id": "extract_fsigma8_indexes_2_5_8",
                  "requirement": "Use matrix indexes 2, 5, and 8 for fσ8 at z=0.38, 0.51, and 0.61.",
                  "reason": "The expected ordering is dM, Hz, fsig repeated across the three BOSS redshift bins.",
                  "pass_required": True
              },
              {
                  "rule_id": "previous_auto_selection_marked_not_primary",
                  "requirement": "The previous v4.117 first-candidate selection must be marked as superseded by the consensus primary-selection rule.",
                  "reason": "The prior automatic candidate was usable numerically but not the best provenance-locked primary source.",
                  "pass_required": True
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The BOSS covariance row-column provenance audit validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The verified BOSS covariance bridge pressure is final.",
              "Automatic subblock extraction alone proves the model.",
              "The previous first-candidate BOSS covariance was the final primary source.",
              "No further verified bridge rerun is needed.",
              "The row-column provenance audit is a publication-grade cosmology result.",
              "Zero pressure-z proves TAIRID."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_120_verified_observed_covariance_bridge_probe",
                  "purpose": "Rerun the observed/reference bridge using the provenance-locked BOSS consensus fσ8 covariance subblock rather than the prior first-candidate source.",
                  "why_next": "v4.119 locks the primary covariance source and row/column mapping."
              },
              {
                  "priority": 2,
                  "route_id": "v4_121_verified_bridge_sensitivity_audit",
                  "purpose": "Compare the verified consensus bridge against v4.114 diagonal fallback and v4.117 first-candidate source bridge.",
                  "why_next": "The source choice materially changed chi2, so the verified rerun must be sensitivity-audited."
              },
              {
                  "priority": 3,
                  "route_id": "v4_122_growth_family_expansion_design",
                  "purpose": "Design additional observed growth-family coverage beyond the five-slot bridge vector.",
                  "why_next": "A broader observed-family test can check whether the no-pressure result persists."
              },
              {
                  "priority": 4,
                  "route_id": "v4_123_claim_boundary_review_handoff",
                  "purpose": "Create a human-readable status handoff after the verified bridge rerun and sensitivity audit.",
                  "why_next": "The result needs careful interpretation before public-facing language."
              }
          ]

          failed_gates = []
          warnings = [
              "provenance_audit_only",
              "no_bridge_pressure_computed",
              "no_final_RSD_pressure",
              "previous_v4_117_first_candidate_selection_superseded",
              "verified_bridge_rerun_required",
              "not_validation"
          ]

          def fetch_url(url, max_bytes):
              record = {
                  "url": url,
                  "ok": False,
                  "status": "",
                  "content_type": "",
                  "content_length_header": "",
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "error": ""
              }
              data = b""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={"User-Agent": "TAIRID-v4.119-boss-provenance-audit/1.0", "Accept": "*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=120) as response:
                      record["status"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      record["content_length_header"] = response.headers.get("Content-Length", "")
                      data = response.read(max_bytes + 1)
                      if len(data) > max_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_bytes]
                      record["bytes_read"] = len(data)
                      record["ok"] = True
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, data

          def parse_numeric_matrix(text):
              rows = []
              for line_number, raw_line in enumerate(text.splitlines(), start=1):
                  stripped = raw_line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  parts = stripped.replace(",", " ").split()
                  values = []
                  for part in parts:
                      try:
                          values.append(float(part))
                      except Exception:
                          pass
                  if values:
                      rows.append({"line_number": line_number, "values": values, "width": len(values)})
              if not rows:
                  return [], []
              width = rows[0]["width"]
              block = [row for row in rows if row["width"] == width]
              matrix = [row["values"][:width] for row in block[:width]]
              return matrix, block

          def max_symmetry_error(a):
              n = len(a)
              err = 0.0
              for i in range(n):
                  for j in range(n):
                      err = max(err, abs(float(a[i][j]) - float(a[j][i])))
              return err

          def diag_min(a):
              return min(float(a[i][i]) for i in range(len(a)))

          def matrix_rank(a, tol=1e-14):
              rows = [[float(x) for x in row] for row in a]
              if not rows:
                  return 0
              m = len(rows)
              n = len(rows[0])
              rank = 0
              col = 0
              while rank < m and col < n:
                  pivot = None
                  pivot_abs = tol
                  for r in range(rank, m):
                      value_abs = abs(rows[r][col])
                      if value_abs > pivot_abs:
                          pivot_abs = value_abs
                          pivot = r
                  if pivot is None:
                      col += 1
                      continue
                  rows[rank], rows[pivot] = rows[pivot], rows[rank]
                  pivot_value = rows[rank][col]
                  rows[rank] = [x / pivot_value for x in rows[rank]]
                  for r in range(m):
                      if r != rank:
                          factor = rows[r][col]
                          if abs(factor) > tol:
                              rows[r] = [rv - factor * pv for rv, pv in zip(rows[r], rows[rank])]
                  rank += 1
                  col += 1
              return rank

          def covariance_quality(matrix):
              try:
                  return {
                      "dimension": len(matrix),
                      "row_width": len(matrix[0]) if matrix else 0,
                      "rank": matrix_rank(matrix),
                      "symmetry_error": max_symmetry_error(matrix),
                      "diag_min": diag_min(matrix),
                      "positive_diag": diag_min(matrix) > 0,
                      "looks_symmetric": max_symmetry_error(matrix) <= 1e-12
                  }
              except Exception as exc:
                  return {
                      "dimension": len(matrix) if matrix else 0,
                      "row_width": len(matrix[0]) if matrix else 0,
                      "rank": 0,
                      "symmetry_error": "",
                      "diag_min": "",
                      "positive_diag": False,
                      "looks_symmetric": False,
                      "error": f"{type(exc).__name__}: {exc}"
                  }

          def extract_subblock(matrix, indexes):
              return [[float(matrix[i][j]) for j in indexes] for i in indexes]

          source_fetch_record, payload = fetch_url(SOURCE_TARBALL["url"], SOURCE_TARBALL["max_bytes"])
          source_fetch_record["target_id"] = SOURCE_TARBALL["target_id"]
          source_fetch_record["purpose"] = SOURCE_TARBALL["purpose"]

          archive_member_records = []
          target_member_found = False
          target_member_text = ""
          target_member_size = 0

          if source_fetch_record["ok"]:
              try:
                  with tarfile.open(fileobj=io.BytesIO(payload), mode="r:gz") as tar:
                      for member in tar.getmembers():
                          archive_member_records.append({
                              "member_name": member.name,
                              "size": member.size,
                              "is_file": member.isfile(),
                              "is_target_primary_member": member.name == TARGET_PRIMARY_MEMBER
                          })
                          if member.name == TARGET_PRIMARY_MEMBER and member.isfile():
                              target_member_found = True
                              target_member_size = member.size
                              extracted = tar.extractfile(member)
                              if extracted is not None:
                                  target_member_text = extracted.read(1000000).decode("utf-8", errors="replace")
              except Exception as exc:
                  failed_gates.append("tarball_parse_failed")
                  source_fetch_record["parse_error"] = f"{type(exc).__name__}: {exc}"

          target_matrix, target_rows = parse_numeric_matrix(target_member_text) if target_member_text else ([], [])
          target_quality = covariance_quality(target_matrix)

          filename_lower = TARGET_PRIMARY_MEMBER.lower()
          filename_semantics_match = all(term in filename_lower for term in ["consensus", "covtot", "dm", "hz", "fsig"])

          matrix_shape_9x9 = target_quality["dimension"] == 9 and target_quality["row_width"] == 9
          target_matrix_symmetric = bool(target_quality["looks_symmetric"])
          target_matrix_positive_diag = bool(target_quality["positive_diag"])
          target_matrix_rank_ok = target_quality["rank"] == 9

          fsigma8_indexes = [2, 5, 8]
          boss_fsigma8_subblock = extract_subblock(target_matrix, fsigma8_indexes) if matrix_shape_9x9 else []
          boss_fsigma8_quality = covariance_quality(boss_fsigma8_subblock)

          fsigma8_subblock_ok = (
              boss_fsigma8_quality["dimension"] == 3
              and boss_fsigma8_quality["row_width"] == 3
              and boss_fsigma8_quality["rank"] == 3
              and boss_fsigma8_quality["positive_diag"] is True
              and boss_fsigma8_quality["looks_symmetric"] is True
          )

          previous_auto_member = UPSTREAM_LOCKS["v4_117_observed_covariance_upgrade_probe"]["previous_auto_selected_member"]
          previous_auto_not_consensus_primary = previous_auto_member != TARGET_PRIMARY_MEMBER

          primary_source_locked = bool(
              source_fetch_record["ok"]
              and target_member_found
              and filename_semantics_match
              and matrix_shape_9x9
              and target_matrix_symmetric
              and target_matrix_positive_diag
              and target_matrix_rank_ok
              and fsigma8_subblock_ok
              and previous_auto_not_consensus_primary
          )

          primary_selection_records = []
          for rule in PRIMARY_SELECTION_RULE:
              rule_id = rule["rule_id"]
              if rule_id == "prefer_consensus_covtot_over_individual_covariances":
                  passed = previous_auto_not_consensus_primary and "consensus_covtot" in TARGET_PRIMARY_MEMBER
                  observed = f"previous={previous_auto_member}; new_primary={TARGET_PRIMARY_MEMBER}"
              elif rule_id == "target_member_exact_match":
                  passed = target_member_found
                  observed = f"target_member_found={target_member_found}"
              elif rule_id == "filename_semantics_match":
                  passed = filename_semantics_match
                  observed = f"filename_semantics_match={filename_semantics_match}"
              elif rule_id == "matrix_shape_is_9x9":
                  passed = matrix_shape_9x9
                  observed = f"dimension={target_quality['dimension']} row_width={target_quality['row_width']}"
              elif rule_id == "extract_fsigma8_indexes_2_5_8":
                  passed = fsigma8_subblock_ok
                  observed = f"indexes={fsigma8_indexes}; subblock_rank={boss_fsigma8_quality['rank']}"
              elif rule_id == "previous_auto_selection_marked_not_primary":
                  passed = previous_auto_not_consensus_primary
                  observed = f"previous_auto_not_consensus_primary={previous_auto_not_consensus_primary}"
              else:
                  passed = False
                  observed = "unknown_rule"
              primary_selection_records.append({
                  "rule_id": rule_id,
                  "requirement": rule["requirement"],
                  "observed": observed,
                  "pass": passed,
                  "reason": rule["reason"]
              })

          row_column_mapping_records = []
          for row in EXPECTED_BOSS_MAPPING:
              row_column_mapping_records.append({
                  **row,
                  "target_member": TARGET_PRIMARY_MEMBER,
                  "mapping_basis": "filename dM_Hz_fsig plus BOSS three-bin consensus order",
                  "mapping_status": "locked_for_verified_bridge_probe" if primary_source_locked else "not_locked"
              })

          subblock_records = []
          for i_local, i_full in enumerate(fsigma8_indexes):
              for j_local, j_full in enumerate(fsigma8_indexes):
                  subblock_records.append({
                      "subblock_row": i_local,
                      "subblock_column": j_local,
                      "source_matrix_row_index": i_full,
                      "source_matrix_column_index": j_full,
                      "row_z": EXPECTED_BOSS_MAPPING[i_full]["z"],
                      "column_z": EXPECTED_BOSS_MAPPING[j_full]["z"],
                      "row_observable": EXPECTED_BOSS_MAPPING[i_full]["observable"],
                      "column_observable": EXPECTED_BOSS_MAPPING[j_full]["observable"],
                      "covariance_value": boss_fsigma8_subblock[i_local][j_local] if fsigma8_subblock_ok else "",
                      "target_bridge_positions": f"{EXPECTED_BOSS_MAPPING[i_full]['bridge_position']},{EXPECTED_BOSS_MAPPING[j_full]['bridge_position']}",
                      "record_scope": "verified_BOSS_consensus_fsigma8_subblock_for_next_probe"
                  })

          if not source_fetch_record["ok"]:
              failed_gates.append("source_tarball_fetch_failed")

          if not target_member_found:
              failed_gates.append("target_consensus_covtot_member_not_found")

          if not filename_semantics_match:
              failed_gates.append("filename_semantics_not_verified")

          if not matrix_shape_9x9:
              failed_gates.append("target_matrix_not_9x9")

          if not target_matrix_symmetric:
              failed_gates.append("target_matrix_not_symmetric")

          if not target_matrix_positive_diag:
              failed_gates.append("target_matrix_diagonal_not_positive")

          if not target_matrix_rank_ok:
              failed_gates.append("target_matrix_not_full_rank_9")

          if not fsigma8_subblock_ok:
              failed_gates.append("fsigma8_subblock_not_valid")

          if not previous_auto_not_consensus_primary:
              failed_gates.append("previous_auto_selection_not_superseded")

          if not primary_source_locked:
              failed_gates.append("primary_source_not_locked")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "previous first-candidate boss covariance was the final primary source",
              "no further verified bridge rerun is needed",
              "zero pressure-z proves tairid",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "BOSS_covariance_row_column_provenance_audit_passed_primary_consensus_source_locked_ready_for_verified_observed_covariance_bridge_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_provenance_requirement_carried",
                  "pass": UPSTREAM_LOCKS["v4_118_observed_covariance_upgrade_sensitivity_audit"]["row_column_provenance_required"] is True,
                  "result": "v4.118 row/column provenance requirement carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "source_tarball_fetched",
                  "pass": source_fetch_record["ok"],
                  "result": f"bytes_read={source_fetch_record['bytes_read']}; status={source_fetch_record['status']}",
                  "boundary": "Source fetch only."
              },
              {
                  "rule_id": "target_consensus_member_found",
                  "pass": target_member_found,
                  "result": f"target_member={TARGET_PRIMARY_MEMBER}; size={target_member_size}",
                  "boundary": "Archive provenance."
              },
              {
                  "rule_id": "primary_selection_rule_passed",
                  "pass": all(row["pass"] for row in primary_selection_records),
                  "result": "consensus covtot file selected over previous first-candidate individual covariance",
                  "boundary": "Selection rule only."
              },
              {
                  "rule_id": "target_matrix_quality_passed",
                  "pass": matrix_shape_9x9 and target_matrix_symmetric and target_matrix_positive_diag and target_matrix_rank_ok,
                  "result": f"dimension={target_quality['dimension']} rank={target_quality['rank']} diag_min={target_quality['diag_min']}",
                  "boundary": "Matrix quality only."
              },
              {
                  "rule_id": "fsigma8_subblock_extracted",
                  "pass": fsigma8_subblock_ok,
                  "result": f"indexes={fsigma8_indexes}; subblock_rank={boss_fsigma8_quality['rank']} diag_min={boss_fsigma8_quality['diag_min']}",
                  "boundary": "Subblock provenance only."
              },
              {
                  "rule_id": "row_column_mapping_locked",
                  "pass": primary_source_locked and len(row_column_mapping_records) == 9,
                  "result": "dM, Hz, fsigma8 repeated across z=0.38, 0.51, 0.61; fsigma8 indexes 2,5,8",
                  "boundary": "Mapping for next verified bridge."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": True,
                  "result": "final RSD pressure and TAIRID validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_119_rules_passed")

          if failed_gates:
