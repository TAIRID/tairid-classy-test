              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Row/column mapping")
          md.append("")
          md.append("| Matrix index | z | Observable | Bridge position | Used |")
          md.append("|---:|---:|---|---:|---|")
