name: 001 TAIRID v4.250 - Primary QSO Literature Candidate Extraction Guard

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-250-primary-qso-literature-candidate-extraction-guard.yml"
      - "data/cosmology/qso_literature_extraction_manifest.csv"
      - "qso_literature_extraction_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  primary-qso-literature-candidate-extraction-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.250 Primary QSO Literature Candidate Extraction Guard is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.250 primary QSO literature candidate extraction guard
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import zipfile

          VERSION = "v4.250"
          ROUTE = "primary_qso_literature_candidate_extraction_guard_after_v4_249"
          EXPECTED_RESULT = "v4_250_primary_qso_literature_candidate_extraction_guard_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_251_extract_dr14_qso_values_or_handoff"

          OUT = Path("tairid_v4_250_primary_qso_literature_candidate_extraction_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-250-primary-qso-literature-candidate-extraction-guard-output.zip"

          EXTRACTION_MANIFEST_CANDIDATES = [
              Path("data/cosmology/qso_literature_extraction_manifest.csv"),
              Path("qso_literature_extraction_manifest.csv"),
          ]

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REQUIRED_EXTRACTION_COLUMNS = [
              "extraction_id",
              "candidate_id",
              "paper_or_source_url",
              "measurement_label",
              "redshift",
              "observable",
              "observed_value",
              "uncertainty_or_covariance_reference",
              "data_vector_reference",
              "source_role",
              "provenance_status",
              "extraction_status",
              "approval_status",
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def safe_float(value):
              try:
                  return float(value)
              except Exception:
                  return None

          def is_placeholder(value):
              text = str(value or "").strip().lower()
              return (
                  not text
                  or text.startswith("put_")
                  or "put_" in text
                  or text.startswith("do_not_fill")
                  or text in ["todo", "none", "na", "n/a", "template_not_filled"]
              )

          inherited_v4_249_rows = [
              {
                  "inherited_from": "v4.249",
                  "item": "rules",
                  "value": "34 / 34 passed",
                  "meaning": "Primary QSO Source Search Manifest Plan passed.",
                  "carry_forward_status": "ready_for_extraction_guard",
              },
              {
                  "inherited_from": "v4.249",
                  "item": "literature_candidates_present",
                  "value": True,
                  "meaning": "DR14 QSO growth/RSD literature candidates were identified.",
                  "carry_forward_status": "candidate_review_allowed",
              },
              {
                  "inherited_from": "v4.249",
                  "item": "manifest_ready_candidates",
                  "value": 0,
                  "meaning": "No candidate is ready to fill an observed manifest.",
                  "carry_forward_status": "manifest_fill_blocked",
              },
              {
                  "inherited_from": "v4.249",
                  "item": "approved_holdout_sources",
                  "value": 0,
                  "meaning": "No holdout source was approved.",
                  "carry_forward_status": "evidence_blocked",
              },
              {
                  "inherited_from": "v4.249",
                  "item": "observed_manifest_input_rows",
                  "value": 0,
                  "meaning": "No external observed rows exist.",
                  "carry_forward_status": "external_scoring_blocked",
              },
              {
                  "inherited_from": "v4.249",
                  "item": "manual_manifest_fill_after_extraction",
                  "value": "not_activated",
                  "meaning": "Manual manifest fill must wait until extraction review passes.",
                  "carry_forward_status": "manual_fill_blocked",
              },
              {
                  "inherited_from": "v4.249",
                  "item": "same_family_dr16_as_holdout",
                  "value": "blocked",
                  "meaning": "DR16 final QSO context cannot be used as independent holdout.",
                  "carry_forward_status": "same_family_guard_active",
              },
              {
                  "inherited_from": "v4.249",
                  "item": "selected_next_route",
                  "value": "v4_250_primary_qso_literature_candidate_extraction_guard_or_handoff",
                  "meaning": "Current workflow should review candidate extraction or prepare handoff.",
                  "carry_forward_status": "current_route",
              },
          ]

          qso_candidate_paper_rows = [
              {
                  "candidate_id": "qso_src_001_dr14_zarrouk_configuration_space",
                  "source_name": "eBOSS DR14 QSO configuration-space RSD measurement",
                  "source_url": "https://arxiv.org/abs/1801.03062",
                  "candidate_class": "primary_qso_growth_candidate_literature",
                  "redshift_scope": "z_eff_about_1_52",
                  "observable_scope": "f_sigma8_or_RSD_growth",
                  "extraction_priority": 1,
                  "same_family_status": "same_survey_family_cross_release_candidate_not_final_independent_holdout",
                  "manifest_ready": False,
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "source_name": "eBOSS DR14 QSO tomographic BAO/RSD measurement",
                  "source_url": "https://arxiv.org/abs/1801.03043",
                  "candidate_class": "primary_qso_growth_candidate_literature",
                  "redshift_scope": "four_tomographic_bins_reported_by_source",
                  "observable_scope": "f_sigma8_plus_BAO_quantities",
                  "extraction_priority": 1,
                  "same_family_status": "same_survey_family_cross_release_candidate_not_final_independent_holdout",
                  "manifest_ready": False,
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_003_dr14_gil_marin_power_spectrum",
                  "source_name": "eBOSS DR14 QSO power-spectrum RSD measurement",
                  "source_url": "https://arxiv.org/abs/1801.02689",
                  "candidate_class": "primary_qso_growth_candidate_literature",
                  "redshift_scope": "0_8_to_2_2",
                  "observable_scope": "RSD_growth_context_needs_exact_value_extraction",
                  "extraction_priority": 2,
                  "same_family_status": "same_survey_family_cross_release_candidate_not_final_independent_holdout",
                  "manifest_ready": False,
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_004_dr16_neveux_final_power_spectrum",
                  "source_name": "eBOSS DR16 final QSO power-spectrum BAO/RSD measurement",
                  "source_url": "https://arxiv.org/abs/2007.08999",
                  "candidate_class": "same_family_current_context",
                  "redshift_scope": "z_eff_about_1_48",
                  "observable_scope": "final_qso_context",
                  "extraction_priority": 9,
                  "same_family_status": "blocked_as_independent_holdout_context_only",
                  "manifest_ready": False,
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_005_desi_dr1_release",
                  "source_name": "DESI DR1 public release",
                  "source_url": "https://data.desi.lbl.gov/doc/releases/dr1/",
                  "candidate_class": "future_external_search_context",
                  "redshift_scope": "release_level",
                  "observable_scope": "raw_release_or_geometry_context_not_direct_fsigma8",
                  "extraction_priority": 4,
                  "same_family_status": "independent_context_not_manifest_ready",
                  "manifest_ready": False,
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_006_cobaya_bao_data",
                  "source_name": "Cobaya BAO data repository",
                  "source_url": "https://github.com/CobayaSampler/bao_data",
                  "candidate_class": "geometry_control_context",
                  "redshift_scope": "repository_level",
                  "observable_scope": "BAO_geometry_not_primary_growth",
                  "extraction_priority": 7,
                  "same_family_status": "not_primary_growth",
                  "manifest_ready": False,
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_007_rezaie_dr16_qso_systematics",
                  "source_name": "eBOSS DR16 QSO systematic weights repository",
                  "source_url": "https://github.com/mehdirezaie/eBOSSDR16QSOE",
                  "candidate_class": "supporting_context_only",
                  "redshift_scope": "0_8_to_2_2",
                  "observable_scope": "systematics_weights_not_direct_holdout",
                  "extraction_priority": 8,
                  "same_family_status": "same_dr16_family_support_only",
                  "manifest_ready": False,
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_008_sdss_eboss_overview",
                  "source_name": "SDSS eBOSS survey overview",
                  "source_url": "https://www.sdss4.org/surveys/eboss/",
                  "candidate_class": "survey_context_only",
                  "redshift_scope": "survey_level",
                  "observable_scope": "context_not_measurement",
                  "extraction_priority": 10,
                  "same_family_status": "context_only",
                  "manifest_ready": False,
                  "approved_as_holdout": False,
              },
          ]

          extraction_schema_rows = [
              {"column_name": "extraction_id", "required": True, "meaning": "unique extraction row id"},
              {"column_name": "candidate_id", "required": True, "meaning": "links to qso candidate source"},
              {"column_name": "paper_or_source_url", "required": True, "meaning": "paper/source being extracted"},
              {"column_name": "measurement_label", "required": True, "meaning": "table/figure/section measurement label"},
              {"column_name": "redshift", "required": True, "meaning": "z or effective redshift"},
              {"column_name": "observable", "required": True, "meaning": "f_sigma8, growth/RSD, BAO, or geometry observable"},
              {"column_name": "observed_value", "required": True, "meaning": "numeric observed value, not guessed"},
              {"column_name": "uncertainty_or_covariance_reference", "required": True, "meaning": "sigma, covariance, inverse covariance, likelihood, or source note"},
              {"column_name": "data_vector_reference", "required": True, "meaning": "where exact value came from"},
              {"column_name": "source_role", "required": True, "meaning": "primary candidate, secondary, control, context, or blocked"},
              {"column_name": "provenance_status", "required": True, "meaning": "independence/same-family status"},
              {"column_name": "extraction_status", "required": True, "meaning": "manual_extract_needed, extracted_not_scored, blocked"},
              {"column_name": "approval_status", "required": True, "meaning": "review-only status; never evidence"},
          ]

          extraction_plan_rows = [
              {
                  "plan_id": "extract_001_zarrouk_value",
                  "candidate_id": "qso_src_001_dr14_zarrouk_configuration_space",
                  "extraction_task": "extract exact f_sigma8 or RSD growth value and redshift",
                  "required_before_manifest": "exact value, uncertainty, table/section citation",
                  "status": "manual_extraction_required",
              },
              {
                  "plan_id": "extract_002_zarrouk_covariance",
                  "candidate_id": "qso_src_001_dr14_zarrouk_configuration_space",
                  "extraction_task": "locate uncertainty/covariance/likelihood support",
                  "required_before_manifest": "paired uncertainty or covariance policy",
                  "status": "manual_extraction_required",
              },
              {
                  "plan_id": "extract_003_zarrouk_provenance",
                  "candidate_id": "qso_src_001_dr14_zarrouk_configuration_space",
                  "extraction_task": "decide same-family cross-release status",
                  "required_before_manifest": "manual provenance decision",
                  "status": "manual_review_required",
              },
              {
                  "plan_id": "extract_004_zhao_values",
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "extraction_task": "extract all reported f_sigma8 redshift-bin values",
                  "required_before_manifest": "one row per redshift bin with exact values",
                  "status": "manual_extraction_required",
              },
              {
                  "plan_id": "extract_005_zhao_covariance",
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "extraction_task": "locate full covariance or uncertainty matrix",
                  "required_before_manifest": "covariance source or explicit limitation",
                  "status": "manual_extraction_required",
              },
              {
                  "plan_id": "extract_006_zhao_dependency",
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "extraction_task": "mark BAO/RSD dependency and derived-quantity status",
                  "required_before_manifest": "dependency flags",
                  "status": "manual_review_required",
              },
              {
                  "plan_id": "extract_007_gilmarin_values",
                  "candidate_id": "qso_src_003_dr14_gil_marin_power_spectrum",
                  "extraction_task": "extract exact RSD/growth value if available",
                  "required_before_manifest": "exact value or decision that it is not extractable",
                  "status": "manual_extraction_required",
              },
              {
                  "plan_id": "extract_008_gilmarin_covariance",
                  "candidate_id": "qso_src_003_dr14_gil_marin_power_spectrum",
                  "extraction_task": "locate covariance or uncertainty source",
                  "required_before_manifest": "covariance status",
                  "status": "manual_extraction_required",
              },
              {
                  "plan_id": "extract_009_gilmarin_role",
                  "candidate_id": "qso_src_003_dr14_gil_marin_power_spectrum",
                  "extraction_task": "decide whether power-spectrum RSD can serve primary candidate role",
                  "required_before_manifest": "role review",
                  "status": "manual_review_required",
              },
          ]

          candidate_extraction_readiness_rows = []
          for row in qso_candidate_paper_rows:
              if row["candidate_class"] == "primary_qso_growth_candidate_literature":
                  readiness = "manual_extraction_candidate_not_manifest_ready"
                  blocker = "needs exact value, uncertainty/covariance, and provenance decision"
              elif row["candidate_class"] == "same_family_current_context":
                  readiness = "blocked_as_independent_holdout"
                  blocker = "same-family/current-context guard"
              elif row["candidate_class"] == "geometry_control_context":
                  readiness = "control_only_not_primary_growth"
                  blocker = "geometry-only role"
              elif row["candidate_class"] == "future_external_search_context":
                  readiness = "future_search_context_not_manifest_ready"
                  blocker = "no direct f_sigma8/RSD product located here"
              else:
                  readiness = "not_manifest_candidate"
                  blocker = "context/support only"
              candidate_extraction_readiness_rows.append({
                  "candidate_id": row["candidate_id"],
                  "candidate_class": row["candidate_class"],
                  "extraction_readiness": readiness,
                  "main_blocker": blocker,
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          extraction_manifest_template_rows = [
              {
                  "extraction_id": "extract_row_001",
                  "candidate_id": "qso_src_001_dr14_zarrouk_configuration_space",
                  "paper_or_source_url": "https://arxiv.org/abs/1801.03062",
                  "measurement_label": "PUT_TABLE_OR_SECTION_LABEL_HERE",
                  "redshift": "PUT_EXACT_REDSHIFT_HERE",
                  "observable": "f_sigma8_or_RSD_growth",
                  "observed_value": "PUT_EXACT_VALUE_HERE",
                  "uncertainty_or_covariance_reference": "PUT_UNCERTAINTY_OR_COVARIANCE_REFERENCE_HERE",
                  "data_vector_reference": "PUT_VALUE_SOURCE_LOCATION_HERE",
                  "source_role": "primary_qso_growth_literature_candidate",
                  "provenance_status": "same_survey_family_cross_release_needs_review",
                  "extraction_status": "manual_extract_needed",
                  "approval_status": "not_scored_not_evidence",
              },
              {
                  "extraction_id": "extract_row_002",
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "paper_or_source_url": "https://arxiv.org/abs/1801.03043",
                  "measurement_label": "PUT_REDSHIFT_BIN_LABEL_HERE",
                  "redshift": "PUT_EXACT_REDSHIFT_HERE",
                  "observable": "f_sigma8",
                  "observed_value": "PUT_EXACT_VALUE_HERE",
                  "uncertainty_or_covariance_reference": "PUT_COVARIANCE_OR_UNCERTAINTY_REFERENCE_HERE",
                  "data_vector_reference": "PUT_VALUE_SOURCE_LOCATION_HERE",
                  "source_role": "primary_qso_growth_literature_candidate",
                  "provenance_status": "same_survey_family_cross_release_needs_review",
                  "extraction_status": "manual_extract_needed",
                  "approval_status": "not_scored_not_evidence",
              },
              {
                  "extraction_id": "extract_row_003",
                  "candidate_id": "qso_src_003_dr14_gil_marin_power_spectrum",
                  "paper_or_source_url": "https://arxiv.org/abs/1801.02689",
                  "measurement_label": "PUT_TABLE_OR_SECTION_LABEL_HERE",
                  "redshift": "PUT_EXACT_REDSHIFT_OR_RANGE_HERE",
                  "observable": "RSD_growth_or_f_sigma8_if_reported",
                  "observed_value": "PUT_EXACT_VALUE_HERE",
                  "uncertainty_or_covariance_reference": "PUT_UNCERTAINTY_OR_COVARIANCE_REFERENCE_HERE",
                  "data_vector_reference": "PUT_VALUE_SOURCE_LOCATION_HERE",
                  "source_role": "primary_qso_growth_literature_candidate_needs_role_review",
                  "provenance_status": "same_survey_family_cross_release_needs_review",
                  "extraction_status": "manual_extract_needed",
                  "approval_status": "not_scored_not_evidence",
              },
          ]

          extraction_manifest_status_rows = []
          extraction_manifest_input_rows = []
          found_extraction_manifests = [path for path in EXTRACTION_MANIFEST_CANDIDATES if path.exists()]

          if not found_extraction_manifests:
              extraction_manifest_status_rows.append({
                  "manifest_path": "",
                  "manifest_status": "missing",
                  "extraction_rows": 0,
                  "detail": "No QSO literature extraction manifest found. Template rows written only.",
              })
          else:
              for path in found_extraction_manifests:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in REQUIRED_EXTRACTION_COLUMNS if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      extraction_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          "extraction_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          for row in rows:
                              extraction_manifest_input_rows.append({col: row.get(col, "") for col in REQUIRED_EXTRACTION_COLUMNS})
                  except Exception as exc:
                      extraction_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          "extraction_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })

          extraction_manifest_validation_rows = []
          for row in extraction_manifest_input_rows:
              issues = []
              z = safe_float(row.get("redshift"))
              val = safe_float(row.get("observed_value"))
              if not row.get("extraction_id"):
                  issues.append("missing_extraction_id")
              if not row.get("candidate_id"):
                  issues.append("missing_candidate_id")
              if z is None:
                  issues.append("bad_or_missing_redshift")
              if val is None:
                  issues.append("bad_or_missing_observed_value")
              if is_placeholder(row.get("uncertainty_or_covariance_reference")):
                  issues.append("uncertainty_or_covariance_placeholder")
              if is_placeholder(row.get("data_vector_reference")):
                  issues.append("data_vector_reference_placeholder")
              if row.get("approval_status") in ["approved", "approved_for_scoring", "evidence"]:
                  issues.append("approval_status_too_strong_for_guard")
              extraction_manifest_validation_rows.append({
                  "extraction_id": row.get("extraction_id", ""),
                  "candidate_id": row.get("candidate_id", ""),
                  "observable": row.get("observable", ""),
                  "redshift": row.get("redshift", ""),
                  "validation_issues": "|".join(issues) if issues else "none",
                  "review_status": "reviewable_not_scored" if not issues else "blocked_by_extraction_issues",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          observed_manifest_status_rows = []
          observed_manifest_input_rows = []
          found_observed_manifests = [path for path in OBSERVED_MANIFEST_CANDIDATES if path.exists()]

          if not found_observed_manifests:
              observed_manifest_status_rows.append({
                  "manifest_path": "",
                  "manifest_status": "missing",
                  "observed_rows": 0,
                  "detail": "No external observed manifest found. Do not score.",
              })
          else:
              for path in found_observed_manifests:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in REQUIRED_OBSERVED_COLUMNS if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          "observed_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          for row in rows:
                              observed_manifest_input_rows.append({col: row.get(col, "") for col in REQUIRED_OBSERVED_COLUMNS})
                  except Exception as exc:
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          "observed_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })

          data_product_locator_rows = [
              {
                  "locator_id": "locator_001",
                  "candidate_id": "qso_src_001_dr14_zarrouk_configuration_space",
                  "next_search_need": "machine-readable table or exact f_sigma8 value/covariance for configuration-space result",
                  "allowed_next_action": "manual source extraction review",
              },
              {
                  "locator_id": "locator_002",
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "next_search_need": "tomographic f_sigma8 values and full covariance matrix or supplementary product",
                  "allowed_next_action": "manual source extraction review",
              },
              {
                  "locator_id": "locator_003",
                  "candidate_id": "qso_src_003_dr14_gil_marin_power_spectrum",
                  "next_search_need": "power-spectrum RSD growth value and covariance/supporting files",
                  "allowed_next_action": "manual source extraction review",
              },
              {
                  "locator_id": "locator_004",
                  "candidate_id": "qso_src_005_desi_dr1_release",
                  "next_search_need": "direct DESI QSO growth/RSD parameter product, not raw release only",
                  "allowed_next_action": "future external search",
              },
