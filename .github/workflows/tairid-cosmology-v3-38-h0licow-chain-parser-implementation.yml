name: TAIRID Cosmology v3.38 H0LiCOW Chain Parser Implementation

on:
  workflow_dispatch:

jobs:
  h0licow-chain-parser-implementation:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scientific Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run TAIRID v3.38 H0LiCOW chain parser implementation
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_38

          python - <<'PY'
          import csv
          import json
          import math
          import re
          import shutil
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          import numpy as np

          OUTDIR = Path("artifacts/tairid_cosmology_v3_38")
          DOWNLOADS = OUTDIR / "downloads"
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOADS.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_38_h0licow_chain_parser_implementation"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This parses selected H0LiCOW distance-chain products into a guarded ledger.",
              "This does not compute pressure scores.",
              "This does not compare H0LiCOW rows against Planck or any baseline.",
              "This does not promote H0LiCOW rows to model-anchor status.",
              "A pass means H0LiCOW chains are parsed well enough for a later pressure-design audit."
          ]

          PREVIOUS_MILESTONE = {
              "v3_37_status": "h0licow_chain_ingestion_design_passed_distance_chain_primary_ready_for_v3_38_parser",
              "v3_37_primary_design_role": "distance_chain_primary",
              "v3_37_failed_gates": [],
              "v3_37_next_rule": "Parse selected primary chain products into a guarded ledger with sample counts, column mapping, parser/provenance status, and no pressure score."
          }

          H0LICOW_DISTANCE_PRODUCTS = [
              {
                  "product_id": "HE0435_Ddt_AO_HST",
                  "lens_or_system": "HE0435",
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/HE0435_Ddt_AO%2BHST.dat",
                  "source_path": "h0licow_distance_chains/HE0435_Ddt_AO+HST.dat",
                  "parser_mode": "single_column_ddt",
                  "observable_role": "time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "column_plan": [
                      {"parameter": "Ddt_time_delay_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": ""}
                  ],
                  "block_condition": "blocked_until_lens_mapping_baseline_and_likelihood_context_are_reviewed"
              },
              {
                  "product_id": "RXJ1131_AO_HST_Dd_Ddt",
                  "lens_or_system": "RXJ1131",
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/RXJ1131_AO%2BHST_Dd_Ddt.dat",
                  "source_path": "h0licow_distance_chains/RXJ1131_AO+HST_Dd_Ddt.dat",
                  "parser_mode": "two_column_dd_dtt",
                  "observable_role": "time_delay_and_deflector_distance_reach",
                  "pressure_surface": "reach_geometry",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "column_plan": [
                      {"parameter": "Dd_deflector_angular_diameter_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": ""},
                      {"parameter": "Ddt_time_delay_distance", "column_index": 1, "unit": "Mpc", "weight_column_index": ""}
                  ],
                  "block_condition": "blocked_until_lens_mapping_baseline_and_likelihood_context_are_reviewed"
              },
              {
                  "product_id": "J1206_final",
                  "lens_or_system": "J1206",
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/J1206_final.csv",
                  "source_path": "h0licow_distance_chains/J1206_final.csv",
                  "parser_mode": "csv_ddt_dd",
                  "observable_role": "time_delay_and_deflector_distance_reach",
                  "pressure_surface": "reach_geometry",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "column_plan": [
                      {"parameter": "Ddt_time_delay_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": ""},
                      {"parameter": "Dd_deflector_angular_diameter_distance", "column_index": 1, "unit": "Mpc", "weight_column_index": ""}
                  ],
                  "block_condition": "blocked_until_lens_mapping_baseline_and_likelihood_context_are_reviewed"
              },
              {
                  "product_id": "WFI2033_dt_bic",
                  "lens_or_system": "WFI2033",
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/wfi2033_dt_bic.dat",
                  "source_path": "h0licow_distance_chains/wfi2033_dt_bic.dat",
                  "parser_mode": "csv_dt_weight",
                  "observable_role": "weighted_time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "column_plan": [
                      {"parameter": "Ddt_time_delay_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": 1}
                  ],
                  "block_condition": "blocked_until_weighted_likelihood_handling_and_baseline_context_are_reviewed"
              }
          ]

          SUPPORT_PRODUCTS = [
              {
                  "product_id": "H0_inference_notebook",
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/H0_inference_code/H0_inference.ipynb",
                  "source_path": "H0_inference_code/H0_inference.ipynb",
                  "support_role": "h0_inference_context_not_observational_chain"
              },
              {
                  "product_id": "H0_lensutils",
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/H0_inference_code/lensutils.py",
                  "source_path": "H0_inference_code/lensutils.py",
                  "support_role": "parser_context_not_observational_chain"
              }
          ]

          REQUIRED_CONTRACT_FIELDS = [
              "source",
              "observable_role",
              "pressure_surface",
              "baseline",
              "parser_status",
              "provenance_status",
              "block_condition",
              "claim_boundary"
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def safe_name(text):
              name = str(text).split("?")[0].rstrip("/").split("/")[-1]
              name = re.sub(r"[^A-Za-z0-9._-]+", "_", name)
              return name or "downloaded_product"

          def download(url, path, timeout=300):
              path.parent.mkdir(parents=True, exist_ok=True)
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.38-h0licow-chain-parser-implementation/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed: HTTP {status}")

                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)

                  return {
                      "url": url,
                      "path": str(path),
                      "status": status,
                      "size_bytes": path.stat().st_size,
                      "content_type": resp.headers.get("Content-Type"),
                      "content_length_header": resp.headers.get("Content-Length")
                  }

          def parse_float(value):
              try:
                  x = float(str(value).strip())
              except Exception:
                  return None
              if not math.isfinite(x):
                  return None
              return x

          def parse_numeric_rows(path):
              text = path.read_text(encoding="utf-8", errors="replace")
              rows = []
              skipped_rows = []
              header_lines = []
              comment_headers = []
              first_non_numeric_lines = []

              for row_index, line in enumerate(text.splitlines()):
                  original = line.rstrip("\n")
                  stripped = original.strip()

                  if not stripped:
                      continue

                  if stripped.startswith("#"):
                      comment_text = stripped.lstrip("#").strip()
                      comment_headers.append(comment_text)
                      if any(term in comment_text.lower() for term in ["dd", "ddt", "dt", "mpc", "weight", "column"]):
                          header_lines.append(comment_text)
                      continue

                  delimiter = "," if "," in stripped else None
                  if delimiter:
                      parts = [p.strip() for p in stripped.split(",")]
                  else:
                      parts = re.split(r"\s+", stripped)

                  values = [parse_float(p) for p in parts]
                  numeric_count = sum(v is not None for v in values)

                  if numeric_count == len(parts) and numeric_count > 0:
                      rows.append({
                          "row_index": row_index,
                          "raw_line": original,
                          "values": values
                      })
                  else:
                      first_non_numeric_lines.append(original[:300])
                      if any(term in stripped.lower() for term in ["dd", "ddt", "dt", "weight", "h0", "omega"]):
                          header_lines.append(stripped)
                      skipped_rows.append({
                          "row_index": row_index,
                          "reason": "non_numeric_or_header",
                          "raw_line": original[:300]
                      })

              return {
                  "text": text,
                  "rows": rows,
                  "skipped_rows": skipped_rows,
                  "header_lines": header_lines,
                  "comment_headers": comment_headers,
                  "first_non_numeric_lines": first_non_numeric_lines[:10]
              }

          def weighted_quantile(values, weights, q):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)

              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)
              values = values[mask]
              weights = weights[mask]

              if len(values) == 0:
                  return None

              if np.sum(weights) <= 0:
                  weights = np.ones_like(values)

              order = np.argsort(values)
              values = values[order]
              weights = weights[order]
              cumulative = np.cumsum(weights)
              cumulative = cumulative / cumulative[-1]
              return float(np.interp(q, cumulative, values))

          def summarize_values(values, weights=None):
              arr = np.asarray(values, dtype=float)
              arr = arr[np.isfinite(arr)]

              if len(arr) == 0:
                  return {
                      "sample_count": 0,
                      "finite_count": 0,
                      "weighted": False,
                      "effective_sample_count": "",
                      "mean": "",
                      "std": "",
                      "q16": "",
                      "q50": "",
                      "q84": "",
                      "min": "",
                      "max": ""
                  }

              if weights is not None:
                  w = np.asarray(weights, dtype=float)
                  mask = np.isfinite(values) & np.isfinite(w) & (w >= 0)
                  arr_w = np.asarray(values, dtype=float)[mask]
                  w = w[mask]

                  if len(arr_w) == 0 or np.sum(w) <= 0:
                      return summarize_values(arr, weights=None)

                  mean = float(np.average(arr_w, weights=w))
                  variance = float(np.average((arr_w - mean) ** 2, weights=w))
                  std = math.sqrt(max(variance, 0.0))
                  q16 = weighted_quantile(arr_w, w, 0.16)
                  q50 = weighted_quantile(arr_w, w, 0.50)
                  q84 = weighted_quantile(arr_w, w, 0.84)
                  eff_n = float((np.sum(w) ** 2) / np.sum(w ** 2)) if np.sum(w ** 2) > 0 else ""

                  return {
                      "sample_count": int(len(values)),
                      "finite_count": int(len(arr_w)),
                      "weighted": True,
                      "effective_sample_count": eff_n,
                      "mean": mean,
                      "std": std,
                      "q16": q16,
                      "q50": q50,
                      "q84": q84,
                      "min": float(np.min(arr_w)),
                      "max": float(np.max(arr_w))
                  }

              return {
                  "sample_count": int(len(values)),
                  "finite_count": int(len(arr)),
                  "weighted": False,
                  "effective_sample_count": "",
                  "mean": float(np.mean(arr)),
                  "std": float(np.std(arr)),
                  "q16": float(np.quantile(arr, 0.16)),
                  "q50": float(np.quantile(arr, 0.50)),
                  "q84": float(np.quantile(arr, 0.84)),
                  "min": float(np.min(arr)),
                  "max": float(np.max(arr))
              }

          def infer_header(parsed):
              headers = []

              for line in parsed["header_lines"][:5]:
                  headers.append(line)

              if not headers:
                  for line in parsed["first_non_numeric_lines"][:5]:
                      headers.append(line)

              return " | ".join(headers)[:700]

          def parse_product(product):
              local_path = DOWNLOADS / "H0LiCOW" / "distance_chains" / safe_name(product["source_path"])
              dl = download(product["url"], local_path)
              parsed = parse_numeric_rows(local_path)

              rows = parsed["rows"]
              max_columns = max((len(r["values"]) for r in rows), default=0)
              min_columns = min((len(r["values"]) for r in rows), default=0) if rows else 0

              product_summary = {
                  "source": "H0LiCOW",
                  "product_id": product["product_id"],
                  "lens_or_system": product["lens_or_system"],
                  "source_path": product["source_path"],
                  "url": product["url"],
                  "parser_mode": product["parser_mode"],
                  "download_status": dl["status"],
                  "download_size_bytes": dl["size_bytes"],
                  "numeric_row_count": len(rows),
                  "skipped_row_count": len(parsed["skipped_rows"]),
                  "min_numeric_columns": min_columns,
                  "max_numeric_columns": max_columns,
                  "inferred_header": infer_header(parsed),
                  "parser_status": "parsed_to_guarded_ledger" if rows else "downloaded_but_no_numeric_rows",
                  "provenance_status": product["provenance_status"],
                  "observable_role": product["observable_role"],
                  "pressure_surface": product["pressure_surface"],
                  "baseline": "not_selected_in_v3_38",
                  "block_condition": product["block_condition"],
                  "claim_boundary": "diagnostic_only_chain_parser_output_not_model_anchor",
                  "pressure_score_built": False,
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              }

              parameter_rows = []

              for col in product["column_plan"]:
                  column_index = int(col["column_index"])
                  weight_col = col.get("weight_column_index", "")
                  weight_col = "" if weight_col == "" else int(weight_col)

                  values = []
                  weights = []

                  for r in rows:
                      vals = r["values"]
                      if column_index >= len(vals):
                          continue

                      x = vals[column_index]
                      if x is None or not math.isfinite(x):
                          continue

                      values.append(float(x))

                      if weight_col != "":
                          if weight_col < len(vals):
                              w = vals[weight_col]
                              if w is not None and math.isfinite(w) and w >= 0:
                                  weights.append(float(w))
                              else:
                                  weights.append(0.0)
                          else:
                              weights.append(0.0)

                  stats = summarize_values(np.asarray(values, dtype=float), np.asarray(weights, dtype=float) if weight_col != "" else None)

                  parameter_rows.append({
                      "source": "H0LiCOW",
                      "product_id": product["product_id"],
                      "lens_or_system": product["lens_or_system"],
                      "source_path": product["source_path"],
                      "observable_role": product["observable_role"],
                      "pressure_surface": product["pressure_surface"],
                      "parameter": col["parameter"],
                      "unit": col["unit"],
                      "column_index": column_index,
                      "weight_column_index": weight_col,
                      "sample_count": stats["sample_count"],
                      "finite_count": stats["finite_count"],
                      "weighted": stats["weighted"],
                      "effective_sample_count": stats["effective_sample_count"],
                      "mean": stats["mean"],
                      "std": stats["std"],
                      "q16": stats["q16"],
                      "q50": stats["q50"],
                      "q84": stats["q84"],
                      "min": stats["min"],
                      "max": stats["max"],
                      "parser_status": product_summary["parser_status"],
                      "provenance_status": product["provenance_status"],
                      "baseline": "not_selected_in_v3_38",
                      "block_condition": product["block_condition"],
                      "claim_boundary": "diagnostic_only_chain_parser_output_not_model_anchor",
                      "pressure_score_built": False,
                      "model_anchor_allowed_now": False,
                      "refit_allowed_now": False,
                      "boundary_note": "Parsed H0LiCOW distance-chain parameter summary. No pressure score or baseline comparison is built in v3.38."
                  })

              raw_preview_rows = []
              for r in rows[:20]:
                  raw_preview_rows.append({
                      "source": "H0LiCOW",
                      "product_id": product["product_id"],
                      "row_index": r["row_index"],
                      "raw_line": r["raw_line"][:500],
                      "numeric_column_count": len(r["values"]),
                      "values_preview": ";".join(str(v) for v in r["values"][:8])
                  })

              skipped_preview_rows = []
              for r in parsed["skipped_rows"][:20]:
                  skipped_preview_rows.append({
                      "source": "H0LiCOW",
                      "product_id": product["product_id"],
                      "row_index": r["row_index"],
                      "reason": r["reason"],
                      "raw_line": r["raw_line"]
                  })

              return product_summary, parameter_rows, raw_preview_rows, skipped_preview_rows

          def inspect_support_product(product):
              local_path = DOWNLOADS / "H0LiCOW" / "support" / safe_name(product["source_path"])
              dl = download(product["url"], local_path)
              text = local_path.read_text(encoding="utf-8", errors="replace")
              lower = text.lower()

              return {
                  "source": "H0LiCOW",
                  "product_id": product["product_id"],
                  "source_path": product["source_path"],
                  "url": product["url"],
                  "support_role": product["support_role"],
                  "download_status": dl["status"],
                  "download_size_bytes": dl["size_bytes"],
                  "contains_h0": "h0" in lower,
                  "contains_ddt": "ddt" in lower,
                  "contains_likelihood": "likelihood" in lower,
                  "contains_chain": "chain" in lower or "sample" in lower,
                  "support_only": True,
                  "pressure_score_built": False,
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "boundary_note": "Support code/context only; not treated as observational chain."
              }

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "previous_milestone": PREVIOUS_MILESTONE,
              "truth_boundary": TRUTH_BOUNDARY,
              "gate_result": {}
          }

          print("TAIRID Cosmology v3.38 H0LiCOW chain parser implementation")
          print("Truth boundary: parser implementation only; no pressure score; no refit; no validation claim.")
          print()

          failed_gates = []
          source_errors = {}

          product_rows = []
          parameter_rows = []
          raw_preview_rows = []
          skipped_preview_rows = []
          support_rows = []

          for product in H0LICOW_DISTANCE_PRODUCTS:
              print(f"Parsing {product['product_id']}")
              try:
                  product_summary, param_rows, preview_rows, skipped_rows = parse_product(product)
                  product_rows.append(product_summary)
                  parameter_rows.extend(param_rows)
                  raw_preview_rows.extend(preview_rows)
                  skipped_preview_rows.extend(skipped_rows)
                  print(f"  rows={product_summary['numeric_row_count']} params={len(param_rows)} status={product_summary['parser_status']}")
              except Exception as e:
                  source_errors[product["product_id"]] = f"{type(e).__name__}: {e}"
                  failed_gates.append(f"{product['product_id']}_parse_failed")
                  product_rows.append({
                      "source": "H0LiCOW",
                      "product_id": product["product_id"],
                      "lens_or_system": product["lens_or_system"],
                      "source_path": product["source_path"],
                      "url": product["url"],
                      "parser_mode": product["parser_mode"],
                      "download_status": "",
                      "download_size_bytes": "",
                      "numeric_row_count": 0,
                      "skipped_row_count": "",
                      "min_numeric_columns": "",
                      "max_numeric_columns": "",
                      "inferred_header": "",
                      "parser_status": "parse_failed",
                      "provenance_status": product["provenance_status"],
                      "observable_role": product["observable_role"],
                      "pressure_surface": product["pressure_surface"],
                      "baseline": "not_selected_in_v3_38",
                      "block_condition": product["block_condition"],
                      "claim_boundary": "diagnostic_only_chain_parser_output_not_model_anchor",
                      "pressure_score_built": False,
                      "model_anchor_allowed_now": False,
                      "refit_allowed_now": False,
                      "error": source_errors[product["product_id"]]
                  })
                  print(f"  failed: {source_errors[product['product_id']]}")

          for product in SUPPORT_PRODUCTS:
              print(f"Inspecting support product {product['product_id']}")
              try:
                  support_rows.append(inspect_support_product(product))
              except Exception as e:
                  source_errors[product["product_id"]] = f"{type(e).__name__}: {e}"
                  support_rows.append({
                      "source": "H0LiCOW",
                      "product_id": product["product_id"],
                      "source_path": product["source_path"],
                      "url": product["url"],
                      "support_role": product["support_role"],
                      "download_status": "",
                      "download_size_bytes": "",
                      "contains_h0": "",
                      "contains_ddt": "",
                      "contains_likelihood": "",
                      "contains_chain": "",
                      "support_only": True,
                      "pressure_score_built": False,
                      "model_anchor_allowed_now": False,
                      "refit_allowed_now": False,
                      "boundary_note": "Support product failed inspection.",
                      "error": source_errors[product["product_id"]]
                  })

          product_csv = OUTDIR / "h0licow_chain_product_parse_summary_v3_38.csv"
          write_csv(
              product_csv,
              product_rows,
              [
                  "source", "product_id", "lens_or_system", "source_path",
                  "url", "parser_mode", "download_status", "download_size_bytes",
                  "numeric_row_count", "skipped_row_count",
                  "min_numeric_columns", "max_numeric_columns",
                  "inferred_header", "parser_status", "provenance_status",
                  "observable_role", "pressure_surface", "baseline",
                  "block_condition", "claim_boundary",
                  "pressure_score_built", "model_anchor_allowed_now",
                  "refit_allowed_now", "error"
              ]
          )

          parameter_csv = OUTDIR / "h0licow_chain_parameter_ledger_v3_38.csv"
          write_csv(
              parameter_csv,
              parameter_rows,
              [
                  "source", "product_id", "lens_or_system", "source_path",
                  "observable_role", "pressure_surface", "parameter", "unit",
                  "column_index", "weight_column_index",
                  "sample_count", "finite_count", "weighted",
                  "effective_sample_count", "mean", "std", "q16", "q50",
                  "q84", "min", "max", "parser_status",
                  "provenance_status", "baseline", "block_condition",
                  "claim_boundary", "pressure_score_built",
                  "model_anchor_allowed_now", "refit_allowed_now",
                  "boundary_note"
              ]
          )

          raw_preview_csv = OUTDIR / "h0licow_chain_raw_preview_rows_v3_38.csv"
          write_csv(
              raw_preview_csv,
              raw_preview_rows,
              [
                  "source", "product_id", "row_index", "raw_line",
                  "numeric_column_count", "values_preview"
              ]
          )

          skipped_csv = OUTDIR / "h0licow_chain_skipped_preview_rows_v3_38.csv"
          write_csv(
              skipped_csv,
              skipped_preview_rows,
              ["source", "product_id", "row_index", "reason", "raw_line"]
          )

          support_csv = OUTDIR / "h0licow_parser_support_context_v3_38.csv"
          write_csv(
              support_csv,
              support_rows,
              [
                  "source", "product_id", "source_path", "url", "support_role",
                  "download_status", "download_size_bytes",
                  "contains_h0", "contains_ddt", "contains_likelihood",
                  "contains_chain", "support_only", "pressure_score_built",
                  "model_anchor_allowed_now", "refit_allowed_now",
                  "boundary_note", "error"
              ]
          )

          parsed_products = [r for r in product_rows if r.get("parser_status") == "parsed_to_guarded_ledger"]
          numeric_products = [r for r in product_rows if int(r.get("numeric_row_count") or 0) > 0]
          parameter_rows_with_samples = [r for r in parameter_rows if int(r.get("finite_count") or 0) > 10]
          weighted_rows = [r for r in parameter_rows if r.get("weighted") is True or str(r.get("weighted")).lower() == "true"]

          ddt_rows = [r for r in parameter_rows if r.get("parameter") == "Ddt_time_delay_distance"]
          dd_rows = [r for r in parameter_rows if r.get("parameter") == "Dd_deflector_angular_diameter_distance"]

          pressure_score_count = sum(1 for r in parameter_rows if r.get("pressure_score_built") is True)
          model_anchor_count = sum(1 for r in parameter_rows if r.get("model_anchor_allowed_now") is True)
          refit_count = sum(1 for r in parameter_rows if r.get("refit_allowed_now") is True)

          contract_ok = True
          for row in parameter_rows:
              for field in REQUIRED_CONTRACT_FIELDS:
                  if field not in row or row.get(field) in ["", None]:
                      contract_ok = False

          audit_rows = [
              {
                  "audit_gate": "selected_distance_products_attempted",
                  "pass": len(product_rows) == len(H0LICOW_DISTANCE_PRODUCTS),
                  "value": len(product_rows),
                  "boundary": "All selected v3.37 primary distance products should be attempted."
              },
              {
                  "audit_gate": "distance_products_parsed",
                  "pass": len(parsed_products) >= 4,
                  "value": len(parsed_products),
                  "boundary": "Expected four primary H0LiCOW distance-chain products parsed."
              },
              {
                  "audit_gate": "numeric_rows_found",
                  "pass": len(numeric_products) >= 4,
                  "value": len(numeric_products),
                  "boundary": "Each selected chain product should contain numeric rows."
              },
              {
                  "audit_gate": "parameter_ledger_rows_created",
                  "pass": len(parameter_rows) >= 6,
                  "value": len(parameter_rows),
                  "boundary": "Expected Ddt and Dd parameter rows from parsed chains."
              },
              {
                  "audit_gate": "sample_counts_usable",
                  "pass": len(parameter_rows_with_samples) >= 6,
                  "value": len(parameter_rows_with_samples),
                  "boundary": "Each parameter row should have enough finite samples for later design review."
              },
              {
                  "audit_gate": "ddt_and_dd_lanes_present",
                  "pass": len(ddt_rows) >= 4 and len(dd_rows) >= 2,
                  "value": f"Ddt={len(ddt_rows)}; Dd={len(dd_rows)}",
                  "boundary": "Time-delay distance should be primary; deflector distance should be preserved when available."
              },
              {
                  "audit_gate": "weighted_chain_handled",
                  "pass": len(weighted_rows) >= 1,
                  "value": len(weighted_rows),
                  "boundary": "Weighted chains such as WFI2033 should be recognized as weighted."
              },
              {
                  "audit_gate": "support_context_inspected",
                  "pass": len(support_rows) >= 2,
                  "value": len(support_rows),
                  "boundary": "Inference/support code should be inspected as context, not evidence."
              },
              {
                  "audit_gate": "required_contract_fields_present",
                  "pass": contract_ok,
                  "value": contract_ok,
                  "boundary": "v3.36 source/role/surface/baseline/parser/provenance/block/claim contract must persist."
              },
              {
                  "audit_gate": "pressure_scores_not_built",
                  "pass": pressure_score_count == 0,
                  "value": pressure_score_count,
                  "boundary": "No pressure score may be built in v3.38."
              },
              {
                  "audit_gate": "model_anchors_not_promoted",
                  "pass": model_anchor_count == 0,
                  "value": model_anchor_count,
                  "boundary": "No H0LiCOW parameter row may become a model anchor."
              },
              {
                  "audit_gate": "refit_not_allowed",
                  "pass": refit_count == 0,
                  "value": refit_count,
                  "boundary": "No refit is allowed."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No model claim is allowed."
              }
          ]

          audit_csv = OUTDIR / "h0licow_chain_parser_implementation_audit_v3_38.csv"
          write_csv(
              audit_csv,
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          hard_failed = list(failed_gates)

          if len(parsed_products) < 4:
              hard_failed.append("fewer_than_four_distance_products_parsed")

          if len(parameter_rows) < 6:
              hard_failed.append("too_few_parameter_ledger_rows")

          if len(parameter_rows_with_samples) < 6:
              hard_failed.append("parameter_sample_counts_not_usable")

          if len(ddt_rows) < 4:
              hard_failed.append("ddt_rows_missing")

          if len(dd_rows) < 2:
              hard_failed.append("dd_rows_missing")

          if len(weighted_rows) < 1:
              hard_failed.append("weighted_chain_not_handled")

          if not contract_ok:
              hard_failed.append("required_contract_fields_missing")

          if pressure_score_count != 0:
              hard_failed.append("pressure_score_built_too_early")

          if model_anchor_count != 0:
              hard_failed.append("model_anchor_promotion_violation")

          if refit_count != 0:
              hard_failed.append("refit_guard_violation")

          if hard_failed:
              readiness_label = "h0licow_chain_parser_implementation_needs_followup"
          else:
              readiness_label = "h0licow_chain_parser_implementation_passed_ready_for_v3_39_pressure_design_audit"

          next_step = (
              "Build v3.39 H0LiCOW time-delay distance pressure-design audit: define lens mapping, baseline formulas, and eligibility rules without building pressure scores or running a refit."
              if not hard_failed
              else "Inspect v3.38 H0LiCOW parser outputs and repair chain parsing before pressure-design audit."
          )

          inventory.update({
              "product_count": len(product_rows),
              "parsed_product_count": len(parsed_products),
              "parameter_ledger_row_count": len(parameter_rows),
              "ddt_row_count": len(ddt_rows),
              "dd_row_count": len(dd_rows),
              "weighted_row_count": len(weighted_rows),
              "support_context_row_count": len(support_rows),
              "pressure_score_count": pressure_score_count,
              "model_anchor_count": model_anchor_count,
              "refit_count": refit_count,
              "source_errors": source_errors,
              "gate_result": {
                  "failed_gates": hard_failed,
                  "readiness_label": readiness_label,
                  "product_count": len(product_rows),
                  "parsed_product_count": len(parsed_products),
                  "parameter_ledger_row_count": len(parameter_rows),
                  "ddt_row_count": len(ddt_rows),
                  "dd_row_count": len(dd_rows),
                  "weighted_row_count": len(weighted_rows),
                  "support_context_row_count": len(support_rows),
                  "pressure_score_built": False,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "next_allowed_step": next_step
              }
          })

          json_path = OUTDIR / "tairid_cosmology_v3_38_h0licow_chain_parser_implementation.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.38 — H0LiCOW Chain Parser Implementation")
          md.append("")
          md.append(f"Created UTC: `{inventory['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(hard_failed) if hard_failed else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v3.38 parses selected H0LiCOW distance-chain products into a guarded ledger.")
          md.append("")
          md.append("It records sample counts, column mappings, distance summaries, parser status, provenance status, block conditions, and claim boundaries.")
          md.append("")
          md.append("It does not build pressure scores, does not compare against a baseline, and does not refit.")
          md.append("")
          md.append("## Results")
          md.append("")
          md.append(f"- Products attempted: `{len(product_rows)}`")
          md.append(f"- Products parsed: `{len(parsed_products)}`")
          md.append(f"- Parameter ledger rows: `{len(parameter_rows)}`")
          md.append(f"- Ddt rows: `{len(ddt_rows)}`")
          md.append(f"- Dd rows: `{len(dd_rows)}`")
          md.append(f"- Weighted rows: `{len(weighted_rows)}`")
          md.append(f"- Support/context rows: `{len(support_rows)}`")
          md.append(f"- Pressure scores built: `{pressure_score_count}`")
          md.append(f"- Model anchors: `{model_anchor_count}`")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          if not hard_failed:
              md.append("H0LiCOW distance chains are now parsed into a guarded ledger. The next step may design baseline and eligibility rules, but still should not score pressure or refit yet.")
          else:
              md.append("The H0LiCOW parser implementation found follow-up issues. Pressure design should wait until parsing is repaired.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `h0licow_chain_product_parse_summary_v3_38.csv`")
          md.append("- `h0licow_chain_parameter_ledger_v3_38.csv`")
          md.append("- `h0licow_chain_raw_preview_rows_v3_38.csv`")
          md.append("- `h0licow_chain_skipped_preview_rows_v3_38.csv`")
          md.append("- `h0licow_parser_support_context_v3_38.csv`")
          md.append("- `h0licow_chain_parser_implementation_audit_v3_38.csv`")
          md.append("- `tairid_cosmology_v3_38_h0licow_chain_parser_implementation.json`")
          md.append("- `tairid_cosmology_v3_38_h0licow_chain_parser_implementation.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_38_h0licow_chain_parser_implementation.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if hard_failed:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.38 H0LiCOW chain parser implementation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-38-h0licow-chain-parser-implementation
          path: artifacts/tairid_cosmology_v3_38/
