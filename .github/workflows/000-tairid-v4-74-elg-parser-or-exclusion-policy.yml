name: 000 TAIRID v4.74 ELG Parser or Exclusion Policy

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-74-elg-parser-or-exclusion-policy.yml"

jobs:
  tairid-v4-74-elg-parser-or-exclusion-policy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.74 ELG parser or exclusion policy
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_74_elg_parser_or_exclusion_policy

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_74_elg_parser_or_exclusion_policy")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_74_elg_parser_or_exclusion_policy"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not make ELG covariance-ready.",
              "This does not run an ELG likelihood.",
              "This does not parse ELG grid values.",
              "This locks the ELG parser/exclusion policy boundary only.",
              "A pass means ELG handling is bounded for this sprint, not that ELG is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_43_ELG": {
                  "source_family": "eBOSS_ELG",
                  "status": "grid visible and parser-feasible but parked",
                  "simple_covariance_ready": False,
                  "parser_feasible": True,
                  "final_use_allowed": False
              },
              "v4_44_eBOSS_LRG_QSO": {
                  "source_family": "eBOSS_LRG_QSO",
                  "status": "partial LRG/QSO covariance preview",
                  "ELG_included": False,
                  "final_use_allowed": False
              },
              "v4_72_combination_policy": {
                  "ELG_covariance_ready": False,
                  "final_RSD_pressure_score_computed": False,
                  "Planck_reference_uncertainty_computed": False
              },
              "v4_73_nonfinal_vector": {
                  "readiness_label": "nonfinal_pressure_vector_builder_passed_ready_for_ELG_parser_or_exclusion_policy",
                  "ELG_covariance_ready": False,
                  "final_RSD_pressure_score_computed": False
              }
          }

          ELG_CURRENT_STATUS = {
              "family_id": "eBOSS_ELG",
              "lane": "RSD_growth",
              "current_status": "grid_visible_parser_feasible_but_parked",
              "simple_covariance_ready": False,
              "parser_feasible": True,
              "included_in_eBOSS_LRG_QSO_preview": False,
              "may_enter_final_score_now": False,
              "safe_claim_now": "ELG is visible and parser-feasible, but not simple covariance-ready.",
              "blocked_claim": "Full eBOSS is covariance-aware."
          }

          ELG_ROUTE_OPTIONS = [
              {
                  "route_id": "A_ELG_grid_parser_route",
                  "status": "valid_future_route",
                  "allowed_now": True,
                  "purpose": "Design and later test a parser for the visible ELG grid likelihood product.",
                  "requires_before_final_use": "grid member names, parameter axes, likelihood interpretation, marginalization policy, and covariance/uncertainty rule",
                  "final_score_allowed_after_this_route_now": False
              },
              {
                  "route_id": "B_ELG_formal_park_or_exclusion_route",
                  "status": "valid_sprint_policy_if_parser_delayed",
                  "allowed_now": True,
                  "purpose": "Keep ELG explicitly parked/excluded from final RSD combination until a parser exists.",
                  "requires_before_final_use": "explicit exclusion note carried into any nonfinal vector or later handoff",
                  "final_score_allowed_after_this_route_now": False
              },
              {
                  "route_id": "C_treat_ELG_as_simple_covariance_now",
                  "status": "blocked",
                  "allowed_now": False,
                  "purpose": "Treat the visible ELG grid as if it were already a simple covariance matrix.",
                  "requires_before_final_use": "not allowed under current evidence",
                  "final_score_allowed_after_this_route_now": False
              }
          ]

          ELG_PARSER_REQUIREMENTS = [
              {"requirement_id": "source_product_identity", "required": True, "definition": "Record the exact ELG product, file/member name, and source path."},
              {"requirement_id": "grid_shape_and_axes", "required": True, "definition": "Identify grid dimensions, parameter axes, units, and ordering."},
              {"requirement_id": "likelihood_semantics", "required": True, "definition": "Determine whether stored values are likelihood, log-likelihood, delta-chi2, posterior, or another surface."},
              {"requirement_id": "target_mapping", "required": True, "definition": "Map ELG outputs to the RSD target quantity and redshift scope without assuming covariance."},
              {"requirement_id": "marginalization_policy", "required": True, "definition": "Define how nuisance dimensions are marginalized or fixed before any comparison."},
              {"requirement_id": "uncertainty_or_covariance_policy", "required": True, "definition": "Define whether the grid can yield an uncertainty/covariance or remains a likelihood-only input."},
              {"requirement_id": "nonduplication_scope", "required": True, "definition": "Declare how ELG relates to eBOSS LRG/QSO and any overlapping survey scope."}
          ]

          ELG_SPRINT_POLICY = [
              {"policy_id": "ELG_not_in_current_LRG_QSO_preview", "policy": "Do not relabel the v4.44 LRG/QSO preview as full eBOSS.", "active": True},
              {"policy_id": "ELG_not_simple_covariance_ready", "policy": "Do not treat the ELG grid likelihood as a simple covariance table.", "active": True},
              {"policy_id": "ELG_parser_backlog_created", "policy": "Carry an ELG parser route forward as a real backlog item.", "active": True},
              {"policy_id": "ELG_parked_until_parser", "policy": "If no parser is built in the current step, ELG remains parked/excluded from final RSD scoring.", "active": True},
              {"policy_id": "ELG_final_score_block", "policy": "Final RSD score remains blocked while ELG is unresolved or formally excluded only for a nonfinal dashboard.", "active": True}
          ]

          ALLOWED_CLAIMS = [
              "ELG is visible and parser-feasible.",
              "ELG is not simple covariance-ready.",
              "The current eBOSS LRG/QSO preview excludes ELG.",
              "ELG needs a parser or formal parked/exclusion label before final combination.",
              "This sprint can carry ELG as a parser backlog item while moving to WiggleZ next."
          ]

          BLOCKED_CLAIMS = [
              "ELG is covariance-ready.",
              "Full eBOSS is covariance-aware.",
              "ELG was parsed as a likelihood.",
              "ELG was parsed as covariance.",
              "ELG was included in a final RSD score.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "Planck reference uncertainty is included.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_75_WiggleZ_source_or_exclusion_policy",
                  "purpose": "Resolve or formally park WiggleZ next, following the sprint order.",
                  "why_next": "ELG policy is now bounded; WiggleZ is the next unsolved growth-family blocker."
              },
              {
                  "priority": 2,
                  "route_id": "v4_74_1_ELG_grid_member_probe",
                  "purpose": "Optional later ELG parser follow-up to locate/check ELG grid member shape.",
                  "why_next": "Needed before ELG can become usable data."
              },
              {
                  "priority": 3,
                  "route_id": "v4_76_Planck_reference_deep_route",
                  "purpose": "Continue Planck reference uncertainty route after WiggleZ.",
                  "why_next": "Reference uncertainty remains the main final-pressure blocker."
              },
              {
                  "priority": 4,
                  "route_id": "v4_77_sprint_end_handoff",
                  "purpose": "Summarize sprint after ELG policy, WiggleZ policy, and Planck reference route.",
                  "why_next": "Handoff only after the planned blockers are addressed."
              }
          ]

          failed_gates = []
          warnings = [
              "ELG_policy_only",
              "ELG_not_covariance_ready",
              "ELG_parser_not_implemented",
              "ELG_likelihood_not_run",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          if UPSTREAM_LOCKS["v4_43_ELG"]["parser_feasible"] is not True:
              failed_gates.append("v4_43_ELG_parser_feasible_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_43_ELG"]["simple_covariance_ready"] is not False:
              failed_gates.append("v4_43_ELG_covariance_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_44_eBOSS_LRG_QSO"]["ELG_included"] is not False:
              failed_gates.append("v4_44_ELG_exclusion_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_72_combination_policy"]["final_RSD_pressure_score_computed"] is not False:
              failed_gates.append("v4_72_final_score_boundary_not_carried")

          if ELG_CURRENT_STATUS["may_enter_final_score_now"] is not False:
              failed_gates.append("ELG_allowed_into_final_score_too_early")

          if not any(row["route_id"] == "A_ELG_grid_parser_route" and row["allowed_now"] is True for row in ELG_ROUTE_OPTIONS):
              failed_gates.append("ELG_parser_route_missing")

          if not any(row["route_id"] == "B_ELG_formal_park_or_exclusion_route" and row["allowed_now"] is True for row in ELG_ROUTE_OPTIONS):
              failed_gates.append("ELG_exclusion_route_missing")

          if not any(row["route_id"] == "C_treat_ELG_as_simple_covariance_now" and row["allowed_now"] is False for row in ELG_ROUTE_OPTIONS):
              failed_gates.append("ELG_simple_covariance_shortcut_not_blocked")

          if len(ELG_PARSER_REQUIREMENTS) < 7:
              failed_gates.append("ELG_parser_requirements_incomplete")

          if not all(row["active"] is True for row in ELG_SPRINT_POLICY):
              failed_gates.append("not_all_ELG_sprint_policies_active")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "elg is covariance-ready",
              "full eboss is covariance-aware",
              "elg was parsed as covariance",
              "final rsd pressure score",
              "combined growth covariance",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "ELG_parser_or_exclusion_policy_passed_ELG_parked_with_parser_backlog_ready_for_WiggleZ_policy_next"

          RULE_RESULTS = [
              {"rule_id": "workflow_name_sorts_top", "pass": True, "result": "workflow name begins with 000 TAIRID", "boundary": "Navigation convenience only."},
              {"rule_id": "ELG_visibility_and_parser_feasibility_carried", "pass": UPSTREAM_LOCKS["v4_43_ELG"]["parser_feasible"] is True, "result": "ELG parser-feasible status carried from v4.43", "boundary": "Feasible is not parsed."},
              {"rule_id": "ELG_not_simple_covariance_ready", "pass": UPSTREAM_LOCKS["v4_43_ELG"]["simple_covariance_ready"] is False, "result": "ELG remains not simple covariance-ready", "boundary": "Do not treat grid as covariance."},
              {"rule_id": "LRG_QSO_preview_remains_partial", "pass": UPSTREAM_LOCKS["v4_44_eBOSS_LRG_QSO"]["ELG_included"] is False, "result": "v4.44 LRG/QSO preview still excludes ELG", "boundary": "Do not call it full eBOSS."},
              {"rule_id": "ELG_parser_and_exclusion_routes_declared", "pass": len(ELG_ROUTE_OPTIONS) >= 3, "result": f"{len(ELG_ROUTE_OPTIONS)} ELG route options declared", "boundary": "Policy only."},
              {"rule_id": "ELG_parser_requirements_declared", "pass": len(ELG_PARSER_REQUIREMENTS) >= 7, "result": f"{len(ELG_PARSER_REQUIREMENTS)} parser requirements declared", "boundary": "No parser implemented."},
              {"rule_id": "ELG_sprint_policy_active", "pass": all(row["active"] is True for row in ELG_SPRINT_POLICY), "result": f"{len(ELG_SPRINT_POLICY)} sprint policies active", "boundary": "ELG remains guarded."},
              {"rule_id": "ELG_final_score_blocked", "pass": ELG_CURRENT_STATUS["may_enter_final_score_now"] is False, "result": "ELG blocked from final score now", "boundary": "No final RSD pressure."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 11, "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved", "boundary": "No validation or final score claim."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "undetermined", "result": route_decision, "boundary": "Route decision does not parse ELG or compute covariance."},
              {"rule_id": "no_final_pressure_or_validation", "pass": True, "result": "no_final_RSD_pressure_no_TAIRID_validation", "boundary": "ELG policy only."}
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_74_rules_passed")

          if failed_gates:
              readiness_label = "ELG_parser_or_exclusion_policy_failed"
              next_allowed_step = "Repair ELG parser/exclusion policy before moving to WiggleZ or ELG parser implementation."
          else:
              readiness_label = "ELG_parser_or_exclusion_policy_passed_ready_for_WiggleZ_source_or_exclusion_policy"
              next_allowed_step = (
                  "Proceed to v4.75 WiggleZ source or exclusion policy, while carrying ELG as parked with a parser backlog. "
                  "Do not compute final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "ELG_current_status": ELG_CURRENT_STATUS["current_status"],
              "ELG_parser_feasible": ELG_CURRENT_STATUS["parser_feasible"],
              "ELG_simple_covariance_ready": ELG_CURRENT_STATUS["simple_covariance_ready"],
              "ELG_included_in_LRG_QSO_preview": ELG_CURRENT_STATUS["included_in_eBOSS_LRG_QSO_preview"],
              "ELG_route_option_count": len(ELG_ROUTE_OPTIONS),
              "ELG_parser_requirement_count": len(ELG_PARSER_REQUIREMENTS),
              "ELG_sprint_policy_count": len(ELG_SPRINT_POLICY),
              "allowed_claim_count": len(ALLOWED_CLAIMS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "next_route_option_count": len(NEXT_ROUTE_OPTIONS),
              "route_decision": route_decision,
              "ELG_parser_implemented": False,
              "ELG_likelihood_run": False,
              "ELG_covariance_ready": False,
              "ELG_may_enter_final_score_now": False,
              "full_eBOSS_covariance_ready": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "ELG_current_status": ELG_CURRENT_STATUS,
              "ELG_route_options": ELG_ROUTE_OPTIONS,
              "ELG_parser_requirements": ELG_PARSER_REQUIREMENTS,
              "ELG_sprint_policy": ELG_SPRINT_POLICY,
              "allowed_claims": ALLOWED_CLAIMS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "ELG_parser_implemented": False,
                  "ELG_likelihood_run": False,
                  "ELG_covariance_ready": False,
                  "ELG_may_enter_final_score_now": False,
                  "full_eBOSS_covariance_ready": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_74_ELG_parser_or_exclusion_policy.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "ELG_route_options_v4_74.csv",
              ELG_ROUTE_OPTIONS,
              ["route_id", "status", "allowed_now", "purpose", "requires_before_final_use", "final_score_allowed_after_this_route_now"]
          )

          write_csv(
              OUTDIR / "ELG_parser_requirements_v4_74.csv",
              ELG_PARSER_REQUIREMENTS,
              ["requirement_id", "required", "definition"]
          )

          write_csv(
              OUTDIR / "ELG_sprint_policy_v4_74.csv",
              ELG_SPRINT_POLICY,
              ["policy_id", "policy", "active"]
          )

          write_csv(
              OUTDIR / "allowed_claims_v4_74.csv",
              [{"allowed_claim": claim} for claim in ALLOWED_CLAIMS],
              ["allowed_claim"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_74.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_74.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_74.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.74 — ELG Parser or Exclusion Policy")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This test locks the ELG handling boundary. ELG is visible and parser-feasible, but it is not simple covariance-ready.")
          md.append("")
          md.append("The v4.44 eBOSS LRG/QSO preview remains partial because ELG is excluded. ELG is carried as parked with a parser backlog unless a later ELG grid parser is built.")
          md.append("")
          md.append("This does not parse ELG, run an ELG likelihood, compute covariance, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Key boundary")
          md.append("")
          md.append("- ELG is not simple covariance-ready.")
          md.append("- Full eBOSS is not covariance-aware yet.")
          md.append("- ELG remains parked/excluded from final RSD scoring until a parser exists.")
          md.append("- The sprint can move to WiggleZ next while carrying the ELG parser backlog honestly.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_74_ELG_parser_or_exclusion_policy.json`")
          md.append("- `tairid_v4_74_ELG_parser_or_exclusion_policy.md`")
          md.append("- `ELG_route_options_v4_74.csv`")
          md.append("- `ELG_parser_requirements_v4_74.csv`")
          md.append("- `ELG_sprint_policy_v4_74.csv`")
          md.append("- `allowed_claims_v4_74.csv`")
          md.append("- `blocked_claims_v4_74.csv`")
          md.append("- `next_route_options_v4_74.csv`")
          md.append("- `rule_results_v4_74.csv`")
          md.append("")

          (OUTDIR / "tairid_v4_74_ELG_parser_or_exclusion_policy.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.74 ELG parser or exclusion policy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-74-elg-parser-or-exclusion-policy
          path: artifacts/tairid_v4_74_elg_parser_or_exclusion_policy/
