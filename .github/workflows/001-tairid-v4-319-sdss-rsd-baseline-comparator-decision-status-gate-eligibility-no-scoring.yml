name: 001 TAIRID v4.319 - SDSS RSD Baseline Comparator Decision Status Gate Eligibility No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-319-sdss-rsd-baseline-comparator-decision-status-gate-eligibility-no-scoring.yml"
      - ".github/workflows/**"
      - "github/workflows/**"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-baseline-comparator-decision-status-gate-eligibility-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.319 SDSS RSD Baseline Comparator Decision Status Gate Eligibility No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.319 SDSS RSD baseline comparator decision status gate eligibility no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv, json, re, zipfile

          VERSION = "v4.319"
          EXPECTED_RESULT = "v4_319_sdss_rsd_baseline_comparator_decision_status_gate_eligibility_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE_IF_READY = "v4_320_sdss_rsd_baseline_source_candidate_gate_eligibility_no_scoring"
          SELECTED_NEXT_ROUTE_IF_NOT_READY = "v4_320_sdss_rsd_baseline_decision_fix_or_handoff_no_scoring"

          OUT = Path("tairid_v4_319_sdss_rsd_baseline_comparator_decision_status_gate_eligibility_output")
          OUT.mkdir(parents=True, exist_ok=True)
          ZIP_NAME = "tairid-v4-319-sdss-rsd-baseline-comparator-decision-status-gate-eligibility-output.zip"

          TEMPLATE_PATTERNS = [
              r"SDSS[_-]RSD[_-]BASELINE[_-]COMPARATOR[_-]DECISION[_-]TEMPLATE[_-]v4[_-]316(?:[-_]\d+)?[_-]FILLABLE\.csv$",
              r"sdss[_-]rsd[_-]baseline[_-]comparator[_-]decision[_-]template[_-]v4[_-]316(?:[-_]\d+)?[_-]fillable\.csv$",
              r"SDSS[_-]RSD[_-]BASELINE[_-]COMPARATOR[_-]DECISIONS[_-]v4[_-]316(?:[-_]\d+)?\.csv$",
              r"sdss[_-]rsd[_-]baseline[_-]comparator[_-]decisions[_-]v4[_-]316(?:[-_]\d+)?\.csv$",
          ]

          EXACT_PATHS = [
              "SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_316_FILLABLE.csv",
              "sdss_rsd_baseline_comparator_decision_template_v4_316_fillable.csv",
              "data/SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_316_FILLABLE.csv",
              "data/sdss_rsd_baseline_comparator_decision_template_v4_316_fillable.csv",
              ".github/workflows/SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_316_FILLABLE.csv",
              ".github/workflows/sdss_rsd_baseline_comparator_decision_template_v4_316_fillable.csv",
          ]

          REQUIRED_FIELDS = [
              "decision_id",
              "question_id",
              "question",
              "human_decision",
              "allowed_decisions",
              "selected_source_url_or_citation",
              "quoted_or_precise_source_text",
              "answer_summary",
              "reviewer_note",
              "claim_limit_must_remain",
          ]

          BASELINE_QUESTIONS = {
              "baseline_q001": "independent comparator model/source",
              "baseline_q002": "source-provided/model-derived/separate script",
              "baseline_q003": "cosmological parameter set",
              "baseline_q004": "independence / no same-family circular support",
              "baseline_q005": "uncertainty or covariance policy",
              "baseline_q006": "null result policy",
          }
          ALLOWED_DECISIONS = {"accept_source_candidate", "edit_needed", "reject", "keep_blocked"}

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def safe_read_csv(path):
              try:
                  with Path(path).open("r", encoding="utf-8-sig", newline="") as f:
                      reader = csv.DictReader(f)
                      rows = list(reader)
                      fields = reader.fieldnames or []
                  return True, fields, rows, ""
              except Exception as exc:
                  return False, [], [], f"{type(exc).__name__}: {exc}"

          def norm(x):
              return str(x or "").strip()

          def find_decision_file():
              candidates = []
              seen = set()

              for raw in EXACT_PATHS:
                  p = Path(raw)
                  exists = p.exists()
                  read_ok, fields, rows, error = safe_read_csv(p) if exists else (False, [], [], "")
                  has_required = all(field in set(fields) for field in REQUIRED_FIELDS)
                  candidates.append({
                      "candidate_path": raw,
                      "candidate_type": "exact",
                      "exists": exists,
                      "read_ok": read_ok,
                      "row_count": len(rows),
                      "field_count": len(fields),
                      "has_required_fields": has_required,
                      "error": error,
                      "score_allowed": False,
                      "support_allowed": False,
                  })
                  seen.add(raw)

              for p in Path(".").rglob("*.csv"):
                  raw = p.as_posix().lstrip("./")
                  if raw in seen:
                      continue
                  name = p.name
                  pattern_match = any(re.search(pattern, name, re.I) for pattern in TEMPLATE_PATTERNS)
                  semantic_match = all(term in raw.lower() for term in ["sdss", "rsd", "baseline", "comparator", "decision"])
                  if not (pattern_match or semantic_match):
                      continue
                  read_ok, fields, rows, error = safe_read_csv(p)
                  has_required = all(field in set(fields) for field in REQUIRED_FIELDS)
                  duplicate_suffix = bool(re.search(r"[-_]\d+\.csv$", name))
                  candidates.append({
                      "candidate_path": raw,
                      "candidate_type": "fuzzy",
                      "exists": True,
                      "read_ok": read_ok,
                      "row_count": len(rows),
                      "field_count": len(fields),
                      "has_required_fields": has_required,
                      "duplicate_download_suffix_detected": duplicate_suffix,
                      "error": error,
                      "score_allowed": False,
                      "support_allowed": False,
                  })

              readable = [c for c in candidates if c["exists"] and c["read_ok"] and c["has_required_fields"]]
              readable = sorted(readable, key=lambda r: (r["candidate_type"] != "exact", not r.get("duplicate_download_suffix_detected", False), r["candidate_path"]))
              selected = readable[0]["candidate_path"] if readable else ""
              if selected:
                  _, fields, rows, _ = safe_read_csv(selected)
              else:
                  fields, rows = [], []
              return candidates, selected, fields, rows

          def review_decision(row, idx, source_path):
              decision = norm(row.get("human_decision")).lower()
              qid = norm(row.get("question_id"))
              source = norm(row.get("selected_source_url_or_citation"))
              quote = norm(row.get("quoted_or_precise_source_text"))
              summary = norm(row.get("answer_summary"))
              claim_limit = norm(row.get("claim_limit_must_remain")).lower()
              allowed_field = norm(row.get("allowed_decisions"))

              decision_known = decision in ALLOWED_DECISIONS
              question_known = qid in BASELINE_QUESTIONS
              accept = decision == "accept_source_candidate"
              keep_blocked = decision == "keep_blocked"
              has_source = bool(source)
              has_quote = len(quote) >= 12
              has_summary = len(summary) >= 8
              claim_limit_ok = claim_limit in ["no_scoring/no_claims", "no_scoring", "no_claims", "keep_blocked"]

              if accept and question_known and decision_known and has_source and has_quote and has_summary and claim_limit_ok:
                  eligibility_status = "eligible_for_baseline_source_gate_review_not_approved"
                  eligible = True
              elif keep_blocked and question_known and decision_known and claim_limit_ok:
                  eligibility_status = "kept_blocked_correctly"
                  eligible = False
              elif decision == "":
                  eligibility_status = "blank_decision_no_action"
                  eligible = False
              else:
                  eligibility_status = "not_eligible_needs_fix"
                  eligible = False

              return {
                  "review_id": f"baseline_status_review_{idx+1:03d}",
                  "source_path": source_path,
                  "decision_id": norm(row.get("decision_id")),
                  "question_id": qid,
                  "question_lane": BASELINE_QUESTIONS.get(qid, ""),
                  "human_decision": decision,
                  "decision_known": decision_known,
                  "question_known": question_known,
                  "is_accept_source_candidate": accept,
                  "is_keep_blocked": keep_blocked,
                  "has_source": has_source,
                  "has_quote": has_quote,
                  "has_summary": has_summary,
                  "claim_limit_ok": claim_limit_ok,
                  "allowed_decisions_field_present": bool(allowed_field),
                  "eligibility_status": eligibility_status,
                  "eligible_for_baseline_source_gate_review": eligible,
                  "baseline_approval_allowed_now": False,
                  "numeric_baseline_values_filled": False,
                  "definition_match_confirmed": False,
                  "score_allowed": False,
                  "support_allowed": False,
              }

          inherited_v4_317_rows = [
              {"inherited_from": "v4.317", "item": "rules", "value": "25 / 25 passed", "meaning": "Baseline decision ingest passed.", "carry_forward_status": "ready_for_status_gate_eligibility"},
              {"inherited_from": "v4.317", "item": "selected_decision_path", "value": "SDSS_RSD_BASELINE_COMPARATOR_DECISION_TEMPLATE_v4_316_FILLABLE.csv", "meaning": "Filled baseline decision template was found.", "carry_forward_status": "decision_template_available"},
              {"inherited_from": "v4.317", "item": "decision_rows_loaded", "value": 6, "meaning": "Six baseline decision rows were loaded.", "carry_forward_status": "decisions_loaded"},
              {"inherited_from": "v4.317", "item": "accepted_source_candidate_rows", "value": 4, "meaning": "Four source candidates were accepted for later review.", "carry_forward_status": "candidate_set"},
              {"inherited_from": "v4.317", "item": "keep_blocked_rows", "value": 2, "meaning": "Two high-risk rows remain blocked.", "carry_forward_status": "blocked_preserved"},
              {"inherited_from": "v4.317", "item": "baseline_values_filled", "value": False, "meaning": "No numeric baselines were filled.", "carry_forward_status": "not_filled"},
              {"inherited_from": "v4.317", "item": "score_valid", "value": False, "meaning": "No score is valid.", "carry_forward_status": "blocked"},
              {"inherited_from": "v4.317", "item": "selected_next_route", "value": "v4_318_sdss_rsd_baseline_comparator_decision_status_or_gate_eligibility_no_scoring", "meaning": "This v4.319 workflow uses the same intended route with a non-colliding version number.", "carry_forward_status": "renumbered_to_v4_319"},
          ]

          candidate_file_rows, selected_decision_path, selected_fields, selected_rows = find_decision_file()
          review_rows = [review_decision(row, idx, selected_decision_path) for idx, row in enumerate(selected_rows)]

          accepted_rows = [r for r in review_rows if r["is_accept_source_candidate"]]
          eligible_rows = [r for r in accepted_rows if r["eligible_for_baseline_source_gate_review"]]
          keep_blocked_rows = [r for r in review_rows if r["is_keep_blocked"]]
          invalid_or_fix_rows = [r for r in review_rows if r["eligibility_status"] == "not_eligible_needs_fix"]
          blank_rows = [r for r in review_rows if r["eligibility_status"] == "blank_decision_no_action"]

          required_accepted = {"baseline_q001", "baseline_q002", "baseline_q003", "baseline_q005"}
          required_blocked = {"baseline_q004", "baseline_q006"}
          accepted_qids = {r["question_id"] for r in eligible_rows}
          blocked_qids = {r["question_id"] for r in keep_blocked_rows}
          missing_accepted_qids = sorted(required_accepted - accepted_qids)
          missing_blocked_qids = sorted(required_blocked - blocked_qids)

          baseline_gate_eligibility_ready = (
              bool(selected_decision_path)
              and len(selected_rows) == 6
              and len(eligible_rows) == 4
              and len(keep_blocked_rows) == 2
              and not invalid_or_fix_rows
              and not blank_rows
              and not missing_accepted_qids
              and not missing_blocked_qids
          )

          selected_next_route = SELECTED_NEXT_ROUTE_IF_READY if baseline_gate_eligibility_ready else SELECTED_NEXT_ROUTE_IF_NOT_READY

          baseline_gate_candidate_rows = []
          for row in eligible_rows:
              baseline_gate_candidate_rows.append({
                  "candidate_id": f"baseline_source_gate_candidate_{len(baseline_gate_candidate_rows)+1:03d}",
                  "decision_id": row["decision_id"],
                  "question_id": row["question_id"],
                  "question_lane": row["question_lane"],
                  "candidate_status": "eligible_for_baseline_source_candidate_gate_review_not_approved",
                  "baseline_approval_allowed_now": False,
                  "numeric_baseline_values_filled": False,
                  "score_allowed": False,
                  "support_allowed": False,
              })

          status_rows = [
              {"status_id": "status_001", "metric": "selected_decision_path", "value": selected_decision_path, "meaning": "Filled template found, if present."},
              {"status_id": "status_002", "metric": "decision_rows_loaded", "value": len(selected_rows), "meaning": "Baseline decision rows loaded."},
              {"status_id": "status_003", "metric": "accepted_source_candidate_rows", "value": len(accepted_rows), "meaning": "Accepted source candidates."},
              {"status_id": "status_004", "metric": "eligible_baseline_gate_candidate_rows", "value": len(eligible_rows), "meaning": "Accepted rows eligible for later baseline-source gate review."},
              {"status_id": "status_005", "metric": "keep_blocked_rows", "value": len(keep_blocked_rows), "meaning": "Rows kept blocked."},
              {"status_id": "status_006", "metric": "invalid_or_fix_rows", "value": len(invalid_or_fix_rows), "meaning": "Rows needing repair."},
              {"status_id": "status_007", "metric": "missing_accepted_qids", "value": "|".join(missing_accepted_qids), "meaning": "Required accepted lanes missing, if any."},
              {"status_id": "status_008", "metric": "missing_blocked_qids", "value": "|".join(missing_blocked_qids), "meaning": "Required keep-blocked lanes missing, if any."},
              {"status_id": "status_009", "metric": "baseline_gate_eligibility_ready", "value": baseline_gate_eligibility_ready, "meaning": "Ready for baseline source-candidate gate eligibility workflow; still no approval."},
          ]

          gate_rows = [
              {"gate_id": "gate_001", "gate_object": "filled_baseline_decision_template_found", "gate_passed": bool(selected_decision_path), "gate_status": "found" if selected_decision_path else "missing", "reason": selected_decision_path or "No filled baseline decision template found."},
              {"gate_id": "gate_002", "gate_object": "accepted_source_candidates_present", "gate_passed": len(accepted_rows) > 0, "gate_status": "present" if accepted_rows else "none", "reason": "Accepted source candidates are later gate candidates only."},
              {"gate_id": "gate_003", "gate_object": "required_accept_block_pattern_preserved", "gate_passed": len(eligible_rows) == 4 and len(keep_blocked_rows) == 2, "gate_status": "preserved" if len(eligible_rows) == 4 and len(keep_blocked_rows) == 2 else "not_preserved", "reason": "Four accepted source-candidate rows and two keep-blocked rows expected."},
              {"gate_id": "gate_004", "gate_object": "baseline_gate_eligibility_ready", "gate_passed": baseline_gate_eligibility_ready, "gate_status": "ready" if baseline_gate_eligibility_ready else "not_ready", "reason": "Eligibility only. This is not baseline approval."},
              {"gate_id": "gate_005", "gate_object": "baseline_approval", "gate_passed": False, "gate_status": "not_approved", "reason": "v4.319 is status/gate-eligibility only."},
              {"gate_id": "gate_006", "gate_object": "definition_match_confirmation", "gate_passed": False, "gate_status": "not_confirmed", "reason": "Definition matches remain blocked."},
              {"gate_id": "gate_007", "gate_object": "diagonal_diagnostic_readiness", "gate_passed": False, "gate_status": "not_ready", "reason": "No scoring readiness without baseline approval and definition matches."},
              {"gate_id": "gate_008", "gate_object": "support_allowed", "gate_passed": False, "gate_status": "blocked", "reason": "No support language allowed."},
          ]

          blocked_rows = [
              {"blocked_id": "blocked_001", "operation": "approve_baseline_values_now", "reason": "eligibility is not baseline approval", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "fill_numeric_baseline_values_now", "reason": "no numeric comparator table is approved", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "confirm_definition_match_now", "reason": "definition-match lane has not run", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "run_diagonal_diagnostic_now", "reason": "diagnostic readiness is false", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "compute_residual_or_chi_square", "reason": "no approved numeric baseline and no definition matches", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "compute_p_value_or_likelihood", "reason": "full covariance/likelihood remains absent", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "claim_tairid_support", "reason": "support is blocked", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "claim_evidence_or_validation", "reason": "no score and no holdout", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_010", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "baseline_decision_status_gate_eligibility", "permission_status": "completed", "reason": "Baseline decision status and gate eligibility checked."},
              {"permission_scope": "baseline_source_candidate_gate_eligibility", "permission_status": "allowed_next" if baseline_gate_eligibility_ready else "blocked_until_fix", "reason": "Next workflow may inspect eligible accepted source candidates."},
              {"permission_scope": "baseline_approval", "permission_status": "blocked", "reason": "No baseline approval in this workflow."},
              {"permission_scope": "definition_match_confirmation", "permission_status": "blocked", "reason": "No definition match in this workflow."},
              {"permission_scope": "diagonal_diagnostic_score", "permission_status": "blocked", "reason": "No scoring readiness."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
          ]

          sdr_rows = [
              {"sdr_id": "sdr_001", "before_state": "baseline decisions were ingested but gate readiness was not separated", "after_state": "accepted/blocked pattern is explicit", "reduction_type": "decision state clarified"},
              {"sdr_id": "sdr_002", "before_state": "accepted source candidates could be mistaken for baseline approval", "after_state": "accepted source candidates are only eligibility candidates", "reduction_type": "decision/approval boundary preserved"},
              {"sdr_id": "sdr_003", "before_state": "risky independence/null-policy rows could leak forward", "after_state": "q004 and q006 remain keep_blocked", "reduction_type": "risk containment preserved"},
              {"sdr_id": "sdr_004", "before_state": "next step was broad", "after_state": "next step narrows to source-candidate gate eligibility", "reduction_type": "next route narrowed"},
              {"sdr_id": "sdr_005", "before_state": "baseline lane could drift toward scoring", "after_state": "all scoring and support remain blocked", "reduction_type": "claim discipline preserved"},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before status/gate eligibility"},
              {"gate": "inherited_v4_317_rows_equal_8", "passed": len(inherited_v4_317_rows) == 8, "detail": f"inherited_v4_317_rows = {len(inherited_v4_317_rows)}"},
              {"gate": "candidate_file_rows_recorded", "passed": len(candidate_file_rows) >= 0, "detail": f"candidate_file_rows = {len(candidate_file_rows)}"},
              {"gate": "review_rows_recorded", "passed": len(review_rows) >= 0, "detail": f"review_rows = {len(review_rows)}"},
              {"gate": "status_rows_equal_9", "passed": len(status_rows) == 9, "detail": f"status_rows = {len(status_rows)}"},
              {"gate": "baseline_gate_candidate_rows_recorded", "passed": len(baseline_gate_candidate_rows) >= 0, "detail": f"baseline_gate_candidate_rows = {len(baseline_gate_candidate_rows)}"},
              {"gate": "gate_rows_equal_8", "passed": len(gate_rows) == 8, "detail": f"gate_rows = {len(gate_rows)}"},
              {"gate": "blocked_rows_equal_10", "passed": len(blocked_rows) == 10, "detail": f"blocked_rows = {len(blocked_rows)}"},
              {"gate": "permission_rows_equal_6", "passed": len(permission_rows) == 6, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "sdr_rows_equal_5", "passed": len(sdr_rows) == 5, "detail": f"sdr_rows = {len(sdr_rows)}"},
              {"gate": "all_candidates_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in candidate_file_rows), "detail": "candidate files no score/support"},
              {"gate": "all_reviews_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in review_rows), "detail": "review rows no score/support"},
              {"gate": "all_gate_candidates_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in baseline_gate_candidate_rows), "detail": "gate candidates no score/support"},
              {"gate": "all_blocked_operations_blocked", "passed": all(r["blocked"] is True for r in blocked_rows), "detail": "all blocked"},
              {"gate": "baseline_approval_false", "passed": any(r["gate_object"] == "baseline_approval" and r["gate_passed"] is False for r in gate_rows), "detail": "baseline not approved"},
              {"gate": "definition_match_false", "passed": any(r["gate_object"] == "definition_match_confirmation" and r["gate_passed"] is False for r in gate_rows), "detail": "definition not confirmed"},
              {"gate": "diagnostic_readiness_false", "passed": any(r["gate_object"] == "diagonal_diagnostic_readiness" and r["gate_passed"] is False for r in gate_rows), "detail": "diagnostic not ready"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_support", "passed": True, "detail": "no support"},
              {"gate": "truth_boundary_no_score", "passed": True, "detail": "no score"},
              {"gate": "truth_boundary_no_p_value", "passed": True, "detail": "no p-value"},
              {"gate": "truth_boundary_no_likelihood", "passed": True, "detail": "no likelihood"},
              {"gate": "selected_next_route_written", "passed": selected_next_route in [SELECTED_NEXT_ROUTE_IF_READY, SELECTED_NEXT_ROUTE_IF_NOT_READY], "detail": f"selected_next_route = {selected_next_route}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_319_sdss_rsd_baseline_comparator_decision_status_gate_eligibility_no_scoring_passed_no_claims", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_319_inherited_v4_317_rows.csv", inherited_v4_317_rows)
          write_csv(OUT / "v4_319_baseline_decision_candidate_file_rows.csv", candidate_file_rows)
          write_csv(OUT / "v4_319_baseline_decision_status_review_rows.csv", review_rows)
          write_csv(OUT / "SDSS_RSD_BASELINE_DECISION_STATUS_REVIEW_v4_319_NO_APPROVAL.csv", review_rows)
          write_csv(OUT / "v4_319_status_rows.csv", status_rows)
          write_csv(OUT / "v4_319_baseline_gate_candidate_rows.csv", baseline_gate_candidate_rows)
          write_csv(OUT / "SDSS_RSD_BASELINE_SOURCE_GATE_CANDIDATES_v4_319_NOT_APPROVED.csv", baseline_gate_candidate_rows)
          write_csv(OUT / "v4_319_gate_decision_rows.csv", gate_rows)
          write_csv(OUT / "v4_319_blocked_operation_rows.csv", blocked_rows)
          write_csv(OUT / "v4_319_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_319_sdr_reduction_rows.csv", sdr_rows)
          write_csv(OUT / "v4_319_rule_checks.csv", checks)

          summary = {
              "version": VERSION,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
