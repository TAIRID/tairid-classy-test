name: "!!! AAA CURRENT - TAIRID v4.399A cautious diagnostic writeup packet no support"

on:
  workflow_dispatch:

jobs:
  run-v4-399A-cautious-diagnostic-writeup-packet-no-support:
    name: "!!! AAA CURRENT - Run v4.399A cautious diagnostic writeup packet"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.398B input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.398B output ZIP by pattern..."
          INPUT_398B_ZIP="$(ls tairid-v4-398B-robustness-external-audit-response-ingest-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_398B_ZIP" ]; then
            echo "Could not find v4.398B output ZIP."
            echo "Expected:"
            echo "tairid-v4-398B-robustness-external-audit-response-ingest-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.398B ZIP:"
          echo "$INPUT_398B_ZIP"
          echo "INPUT_398B_ZIP=$INPUT_398B_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.399A cautious diagnostic writeup packet script
        run: |
          cat > run_v4_399A_cautious_diagnostic_writeup_packet_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "cautious diagnostic writeup packet only; previously audited covariance-corrected and robustness diagnostic values may be summarized; no new chi-square computed; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def as_float(summary, key):
              return float(summary[key])

          def main():
              input_398B = Path(os.environ["INPUT_398B_ZIP"])

              outdir = Path("tairid_v4_399A_cautious_diagnostic_writeup_packet_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base398 = extract_zip(input_398B, "tairid_v4_399A_398B_")

              summary398_path = find_one(base398, "v4_398B_summary.json")
              clean_audits_path = find_one(base398, "v4_398B_clean_external_audit_responses_NO_SUPPORT.csv")
              audit_summary_path = find_one(base398, "v4_398B_audit_response_summary_NO_SUPPORT.csv")
              staging_packet_path = find_one(base398, "v4_398B_cautious_writeup_staging_packet_NO_SUPPORT.csv")
              route_decision_path = find_one(base398, "v4_398B_post_robustness_audit_route_decision_NO_SUPPORT.csv")
              comparison_path = find_one(base398, "v4_398B_input_v4_397B_primary_plus_alternate_comparison_preserved.csv")
              robustness_band_path = find_one(base398, "v4_398B_input_v4_397B_robustness_band_preserved.csv")
              limitations398_path = find_one(base398, "v4_398B_limitations_after_robustness_audit_response_ingest.csv")
              gap398_path = find_one(base398, "v4_398B_gap_status_after_robustness_audit_response_ingest.csv")
              rules398_path = find_one(base398, "v4_398B_rule_checks.csv")

              summary398 = json.loads(summary398_path.read_text())
              clean_audits = pd.read_csv(clean_audits_path)
              audit_summary = pd.read_csv(audit_summary_path)
              staging_packet = pd.read_csv(staging_packet_path)
              route_decision = pd.read_csv(route_decision_path)
              comparison = pd.read_csv(comparison_path)
              robustness_band = pd.read_csv(robustness_band_path)
              limitations398 = pd.read_csv(limitations398_path)
              gap398 = pd.read_csv(gap398_path)
              rules398 = pd.read_csv(rules398_path)

              prior_diag = as_float(summary398, "prior_guarded_diagonal_chi_square_sum")
              primary = as_float(summary398, "primary_dM_Hz_chi_square_dry_run_sum")
              alt_dv = as_float(summary398, "final_consensus_dV_FAP_chi_square")
              fs_consensus = as_float(summary398, "fs_consensus_chi_square")
              robust_min = as_float(summary398, "robustness_min_chi_square")
              robust_max = as_float(summary398, "robustness_max_chi_square")
              robust_width = as_float(summary398, "robustness_chi_square_range_width")

              diagnostic_values = pd.DataFrame([
                  {
                      "value_id": "V4_399A_VALUE_001",
                      "metric": "prior_guarded_diagonal_chi_square_sum",
                      "value": prior_diag,
                      "source_stage": "v4.366/v4.389 preserved prior",
                      "interpretation_boundary": "diagonal_reference_only_no_support",
                      "support_allowed": False,
                  },
                  {
                      "value_id": "V4_399A_VALUE_002",
