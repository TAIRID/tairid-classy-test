name: 000 TAIRID v4.208 - ETDD70 Candidate Column Mapping To G1 Axis Table With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-208-etdd70-candidate-column-mapping-to-g1-axis-table-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/public_sources/**"

permissions:
  contents: read

jobs:
  v4-208-etdd70-candidate-column-mapping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.208 ETDD70 candidate column mapping to G1 axis table
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_208_outputs
          cat > tairid_v4_208_outputs/run_v4_208.py <<'PY'
          import csv
          import io
          import json
          import math
          import os
          import re
          import shutil
          import tempfile
          import urllib.request
          import zipfile
          from pathlib import Path
          from statistics import mean

          OUT = Path("tairid_v4_208_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "etdd70_candidate_column_mapping_to_g1_axis_table_passed_partial_dyslexia_axis_candidates_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no dyslexia validation",
              "no clinical diagnosis claim",
              "no claim that ETDD70 proves TAIRID",
              "no raw numbers moved between domains",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "candidate axis rows are not covariance",
              "candidate axis mapping is not final parsing",
              "partial dyslexia rows do not close full G1",
              "TAIRID not proved"
          ]

          V4_207_STATUS = {
              "version": "v4.207",
              "rule_pass_count": 11,
              "rule_total_count": 11,
              "failed_gates": [],
              "downloaded_count": 6,
              "zip_member_rows": 1912,
              "tabular_profile_rows": 120,
              "axis_candidate_rows": 120,
              "package_status": "etdd70_files_downloaded_structure_candidates_found",
              "selected_next_route": "etdd70_candidate_column_mapping_to_g1_axis_table_with_scope_guards"
          }

          DOWNLOADS = [
              {
                  "file_name": "dyslexia_class_label.csv",
                  "download_url": "https://zenodo.org/api/records/13332134/files/dyslexia_class_label.csv/content",
                  "expected_size_bytes": 1357,
                  "purpose": "subject group labels"
              },
              {
                  "file_name": "data.zip",
                  "download_url": "https://zenodo.org/api/records/13332134/files/data.zip/content",
                  "expected_size_bytes": 133743551,
                  "purpose": "subject task metric/fixation/saccade tables"
              }
          ]

          TARGET_CANONICAL_COLUMNS = [
              "lane",
              "subject_id",
              "group_or_condition",
              "boundary_or_task",
              "propagation_reach_value",
              "pacing_access_value",
              "consolidation_growth_value",
              "viability_or_outcome_value",
              "source_or_dataset",
              "notes"
          ]

          MAX_DOWNLOAD_BYTES = 170_000_000
          USER_AGENT = "TAIRID-v4.208-ETDD70-axis-mapping/1.0"

          REQUIRED_METRIC_COLUMNS = [
              "sid",
              "trialid",
              "n_fix_trial",
              "sum_fix_dur_trial",
              "dwell_time_trial",
              "mean_fix_dur_trial",
              "n_sacc_trial",
              "sum_sacc_dur_trial",
              "mean_sacc_dur_trial",
              "n_regress_trial",
              "n_progress_trial"
          ]

          OPTIONAL_METRIC_COLUMNS = [
              "n_transit_trial",
              "n_between_line_regress_trial",
              "n_within_line_regress_trial",
              "dwell_time_rereading_aoi",
              "n_revisits_aoi",
              "ratio_progress_regress_trial",
              "skipped_aoi",
              "dwell_time_aoi",
              "n_fix_aoi",
              "mean_fix_dur_aoi"
          ]

          AXIS_RULES = [
              {
                  "axis": "propagation_reach_value",
                  "orientation": "higher means broader scan/reading-flow reach or higher movement volume",
                  "source_columns": "z(n_fix_trial), z(n_sacc_trial), optional z(n_transit_trial)",
                  "formula": "mean available z-scored scan-volume columns",
                  "truth_boundary": "candidate operational mapping only"
              },
              {
                  "axis": "pacing_access_value",
                  "orientation": "higher means higher timing/load/access pressure",
                  "source_columns": "z(mean_fix_dur_trial), z(dwell_time_trial), z(mean_sacc_dur_trial)",
                  "formula": "mean available z-scored timing/load columns",
                  "truth_boundary": "candidate operational mapping only"
              },
              {
                  "axis": "consolidation_growth_value",
                  "orientation": "higher means stronger clean consolidation, so regression/rereading burden is inverted",
                  "source_columns": "-z(n_regress_trial), -z(n_revisits_aoi), -z(dwell_time_rereading_aoi), -z(n_between_line_regress_trial), -z(n_within_line_regress_trial)",
                  "formula": "negative mean available z-scored regression/rereading burden columns",
                  "truth_boundary": "candidate operational mapping only"
              },
              {
                  "axis": "viability_or_outcome_value",
                  "orientation": "higher means easier/less costly reading viability, so time/fixation burden is inverted",
                  "source_columns": "-z(dwell_time_trial), -z(sum_fix_dur_trial), -z(n_fix_trial), -z(n_sacc_trial)",
                  "formula": "negative mean available z-scored burden columns",
                  "truth_boundary": "candidate operational mapping only"
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def safe_float(x):
              try:
                  if x is None or str(x).strip() == "":
                      return None
                  return float(str(x).strip())
              except Exception:
                  return None

          def safe_mean(values):
              vals = [v for v in values if v is not None and not math.isnan(v)]
              if not vals:
                  return None
              return sum(vals) / len(vals)

          def zscore_map(rows, columns):
              stats = {}
              for col in columns:
                  vals = [safe_float(r.get(col)) for r in rows]
                  vals = [v for v in vals if v is not None]
                  if len(vals) >= 2:
                      m = sum(vals) / len(vals)
                      var = sum((v - m) ** 2 for v in vals) / (len(vals) - 1)
                      sd = math.sqrt(var) if var > 0 else 0.0
                      stats[col] = (m, sd)
              return stats

          def z(row, col, stats):
              v = safe_float(row.get(col))
              if v is None or col not in stats:
                  return None
              m, sd = stats[col]
              if sd == 0:
                  return 0.0
              return (v - m) / sd

          def download_file(url, dest, expected_size):
              if os.environ.get("TAIRID_LOCAL_NO_NETWORK") == "1":
                  return False, "download_skipped_local_no_network", "local check disables network"
              if expected_size is not None and int(expected_size) > MAX_DOWNLOAD_BYTES:
                  return False, "skipped_size_guard", "expected_size_exceeds_guard"
              req = urllib.request.Request(url, headers={"User-Agent": USER_AGENT})
              try:
                  with urllib.request.urlopen(req, timeout=45) as resp:
                      content_len = resp.headers.get("Content-Length")
                      if content_len and int(content_len) > MAX_DOWNLOAD_BYTES:
                          return False, "skipped_size_guard", "content_length_exceeds_guard"
                      total = 0
                      with open(dest, "wb") as f:
                          while True:
                              chunk = resp.read(1024 * 1024)
                              if not chunk:
                                  break
                              total += len(chunk)
                              if total > MAX_DOWNLOAD_BYTES:
                                  return False, "failed_size_guard", "download_exceeded_guard"
                              f.write(chunk)
                  return True, "downloaded", ""
              except Exception as exc:
                  return False, "download_failed", type(exc).__name__ + ": " + str(exc)[:300]

          def read_csv_text_bytes(data):
              text = data.decode("utf-8-sig", errors="replace")
              first = text.splitlines()[0] if text.splitlines() else ""
              delimiter = "\t" if first.count("\t") > first.count(",") else ","
              reader = csv.DictReader(io.StringIO(text), delimiter=delimiter)
              return list(reader), reader.fieldnames or []

          def task_from_filename(name):
              base = Path(name).name
              m = re.search(r"Subject_(\d+)_(T\d+)_(.+?)_metrics\.csv$", base)
              if m:
                  return m.group(1), m.group(2) + "_" + m.group(3)
              m = re.search(r"Subject_(\d+)_(T\d+)_(.+?)_", base)
              if m:
                  return m.group(1), m.group(2) + "_" + m.group(3)
              return "", base

          def normalize_subject_id(x):
              s = str(x).strip()
              if s.endswith(".0"):
                  s = s[:-2]
              return s

          tmp_root = Path(tempfile.mkdtemp(prefix="tairid_v4_208_downloads_"))
          download_rows = []
          label_rows = []
          label_map = {}
          metric_file_rows = []
          metric_raw_rows = []
          axis_candidate_rows = []
          group_summary_rows = []

          try:
              paths = {}
              for item in DOWNLOADS:
                  dest = tmp_root / item["file_name"]
                  ok, status, error = download_file(item["download_url"], dest, item["expected_size_bytes"])
                  actual_size = dest.stat().st_size if dest.exists() else 0
                  download_rows.append({
                      "file_name": item["file_name"],
                      "purpose": item["purpose"],
                      "download_status": status,
                      "download_error": error,
                      "downloaded_size_bytes": actual_size,
                      "claim_boundary": "download only; not validation"
                  })
                  if ok:
                      paths[item["file_name"]] = dest

              if "dyslexia_class_label.csv" in paths:
                  rows, cols = read_csv_text_bytes(paths["dyslexia_class_label.csv"].read_bytes())
                  for row in rows:
                      sid = normalize_subject_id(row.get("subject_id", row.get("sid", row.get("id", ""))))
                      label = str(row.get("label", row.get("class_id", row.get("class", "")))).strip()
                      class_id = str(row.get("class_id", row.get("class", ""))).strip()
                      group = label if label else ("class_" + class_id if class_id else "unknown")
                      label_rows.append({
                          "subject_id": sid,
                          "class_id": class_id,
                          "label": label,
                          "group_or_condition": group
                      })
                      if sid:
                          label_map[sid] = group

              if "data.zip" in paths and zipfile.is_zipfile(paths["data.zip"]):
                  with zipfile.ZipFile(paths["data.zip"]) as zf:
                      metric_members = [
                          info for info in zf.infolist()
                          if (not info.is_dir())
                          and info.filename.lower().endswith("_metrics.csv")
                          and "__macosx" not in info.filename.lower()
                      ]
                      for info in metric_members:
                          subject_from_name, task_name = task_from_filename(info.filename)
                          try:
                              rows, cols = read_csv_text_bytes(zf.read(info))
                          except Exception as exc:
                              metric_file_rows.append({
                                  "metric_file": info.filename,
                                  "subject_id": subject_from_name,
                                  "task_name": task_name,
                                  "row_count": 0,
                                  "column_count": 0,
                                  "required_columns_present": False,
                                  "missing_required_columns": "read_failed:" + type(exc).__name__,
                                  "optional_columns_present": "",
                                  "claim_boundary": "file read failed"
                              })
                              continue

                          present = set(cols)
                          missing = [c for c in REQUIRED_METRIC_COLUMNS if c not in present]
                          optional_present = [c for c in OPTIONAL_METRIC_COLUMNS if c in present]
                          metric_file_rows.append({
                              "metric_file": info.filename,
                              "subject_id": subject_from_name,
                              "task_name": task_name,
                              "row_count": len(rows),
                              "column_count": len(cols),
                              "required_columns_present": len(missing) == 0,
                              "missing_required_columns": ";".join(missing),
                              "optional_columns_present": ";".join(optional_present),
                              "claim_boundary": "metric file inventory only"
                          })

                          # Aggregate per file into one subject-task raw row.
                          if not rows or "sid" not in present:
                              continue

                          agg = {
                              "metric_file": info.filename,
                              "subject_id": subject_from_name,
                              "task_name": task_name,
                              "group_or_condition": label_map.get(subject_from_name, "label_missing")
                          }
                          for col in REQUIRED_METRIC_COLUMNS + OPTIONAL_METRIC_COLUMNS:
                              if col in present:
                                  vals = [safe_float(r.get(col)) for r in rows]
                                  vals = [v for v in vals if v is not None]
                                  agg[col + "_mean"] = safe_mean(vals)
                                  agg[col + "_n"] = len(vals)
                          metric_raw_rows.append(agg)

              # Build z-scored candidate axis rows from subject-task metric aggregates.
              if metric_raw_rows:
                  # Rename aggregate means to simpler feature names for formulas.
                  features = [
                      "n_fix_trial_mean",
                      "n_sacc_trial_mean",
                      "n_transit_trial_mean",
                      "mean_fix_dur_trial_mean",
                      "dwell_time_trial_mean",
                      "mean_sacc_dur_trial_mean",
                      "n_regress_trial_mean",
                      "n_revisits_aoi_mean",
                      "dwell_time_rereading_aoi_mean",
                      "n_between_line_regress_trial_mean",
                      "n_within_line_regress_trial_mean",
                      "sum_fix_dur_trial_mean"
                  ]
                  stats = zscore_map(metric_raw_rows, features)

                  for row in metric_raw_rows:
                      prop = safe_mean([
                          z(row, "n_fix_trial_mean", stats),
                          z(row, "n_sacc_trial_mean", stats),
                          z(row, "n_transit_trial_mean", stats)
                      ])
                      pacing = safe_mean([
                          z(row, "mean_fix_dur_trial_mean", stats),
                          z(row, "dwell_time_trial_mean", stats),
                          z(row, "mean_sacc_dur_trial_mean", stats)
                      ])
                      consolidation = safe_mean([
                          -z(row, "n_regress_trial_mean", stats) if z(row, "n_regress_trial_mean", stats) is not None else None,
                          -z(row, "n_revisits_aoi_mean", stats) if z(row, "n_revisits_aoi_mean", stats) is not None else None,
                          -z(row, "dwell_time_rereading_aoi_mean", stats) if z(row, "dwell_time_rereading_aoi_mean", stats) is not None else None,
                          -z(row, "n_between_line_regress_trial_mean", stats) if z(row, "n_between_line_regress_trial_mean", stats) is not None else None,
                          -z(row, "n_within_line_regress_trial_mean", stats) if z(row, "n_within_line_regress_trial_mean", stats) is not None else None
                      ])
                      viability = safe_mean([
                          -z(row, "dwell_time_trial_mean", stats) if z(row, "dwell_time_trial_mean", stats) is not None else None,
                          -z(row, "sum_fix_dur_trial_mean", stats) if z(row, "sum_fix_dur_trial_mean", stats) is not None else None,
                          -z(row, "n_fix_trial_mean", stats) if z(row, "n_fix_trial_mean", stats) is not None else None,
                          -z(row, "n_sacc_trial_mean", stats) if z(row, "n_sacc_trial_mean", stats) is not None else None
                      ])

                      complete = all(v is not None for v in [prop, pacing, consolidation, viability])
                      axis_candidate_rows.append({
                          "lane": "Dyslexia",
                          "subject_id": row.get("subject_id", ""),
                          "group_or_condition": row.get("group_or_condition", "label_missing"),
                          "boundary_or_task": "ETDD70_" + row.get("task_name", ""),
                          "propagation_reach_value": round(prop, 8) if prop is not None else "",
                          "pacing_access_value": round(pacing, 8) if pacing is not None else "",
                          "consolidation_growth_value": round(consolidation, 8) if consolidation is not None else "",
                          "viability_or_outcome_value": round(viability, 8) if viability is not None else "",
                          "source_or_dataset": "ETDD70 public Zenodo record 13332134; candidate axis mapping from metrics CSV",
                          "notes": "Candidate z-scored subject-task row; partial G1 dyslexia only; mapping requires review before covariance.",
                          "complete_axis_row": complete,
                          "metric_file": row.get("metric_file", "")
                      })

              # Group summaries by group/task.
              grouped = {}
              for row in axis_candidate_rows:
                  if not row["complete_axis_row"]:
                      continue
                  key = (row["group_or_condition"], row["boundary_or_task"])
                  grouped.setdefault(key, []).append(row)
              for (group, task), rows in sorted(grouped.items()):
                  def avg(col):
                      vals = [safe_float(r[col]) for r in rows]
                      vals = [v for v in vals if v is not None]
                      return round(sum(vals) / len(vals), 8) if vals else ""
                  group_summary_rows.append({
                      "group_or_condition": group,
                      "boundary_or_task": task,
                      "n_rows": len(rows),
                      "propagation_reach_mean": avg("propagation_reach_value"),
                      "pacing_access_mean": avg("pacing_access_value"),
                      "consolidation_growth_mean": avg("consolidation_growth_value"),
                      "viability_or_outcome_mean": avg("viability_or_outcome_value"),
                      "claim_boundary": "candidate group summary only; not validation"
                  })

          finally:
              shutil.rmtree(tmp_root, ignore_errors=True)

          # Write canonical candidate table with only target columns.
          canonical_candidate_rows = [
              {col: row[col] for col in TARGET_CANONICAL_COLUMNS}
              for row in axis_candidate_rows
              if row.get("complete_axis_row")
          ]

          write_csv(OUT / "v4_208_v4_207_status_review.csv", [V4_207_STATUS], list(V4_207_STATUS.keys()))
          (OUT / "v4_208_v4_207_status_review.json").write_text(json.dumps(V4_207_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_208_download_status.csv", download_rows, [
              "file_name", "purpose", "download_status", "download_error", "downloaded_size_bytes", "claim_boundary"
          ])
          write_csv(OUT / "v4_208_class_label_profile.csv", label_rows, [
              "subject_id", "class_id", "label", "group_or_condition"
          ])
          write_csv(OUT / "v4_208_metric_file_inventory.csv", metric_file_rows, [
              "metric_file", "subject_id", "task_name", "row_count", "column_count",
              "required_columns_present", "missing_required_columns", "optional_columns_present", "claim_boundary"
          ])

          # Raw aggregate fields vary, so build fieldnames dynamically.
          raw_fields = sorted(set().union(*[set(r.keys()) for r in metric_raw_rows])) if metric_raw_rows else [
              "metric_file", "subject_id", "task_name", "group_or_condition"
          ]
          write_csv(OUT / "v4_208_metric_raw_subject_task_aggregates.csv", metric_raw_rows, raw_fields)

          write_csv(OUT / "v4_208_candidate_axis_mapping_rules.csv", AXIS_RULES, [
              "axis", "orientation", "source_columns", "formula", "truth_boundary"
          ])
          write_csv(OUT / "v4_208_g1_etdd70_candidate_subject_axis_rows_extended.csv", axis_candidate_rows, [
              "lane", "subject_id", "group_or_condition", "boundary_or_task",
              "propagation_reach_value", "pacing_access_value",
              "consolidation_growth_value", "viability_or_outcome_value",
              "source_or_dataset", "notes", "complete_axis_row", "metric_file"
          ])
          write_csv(OUT / "candidate_data_neurotype_g1_etdd70_dyslexia_subject_axis_input.csv", canonical_candidate_rows, TARGET_CANONICAL_COLUMNS)
          write_csv(OUT / "v4_208_g1_etdd70_candidate_group_summary.csv", group_summary_rows, [
              "group_or_condition", "boundary_or_task", "n_rows",
              "propagation_reach_mean", "pacing_access_mean",
              "consolidation_growth_mean", "viability_or_outcome_mean",
              "claim_boundary"
          ])

          downloaded_count = sum(1 for r in download_rows if r["download_status"] == "downloaded")
          metric_files_with_required = sum(1 for r in metric_file_rows if r.get("required_columns_present") is True)
          complete_axis_rows = len(canonical_candidate_rows)
          groups_present = sorted(set(r["group_or_condition"] for r in canonical_candidate_rows))

          if complete_axis_rows >= 4:
              package_status = "partial_g1_dyslexia_candidate_axis_rows_written"
              selected_next_route = "etdd70_candidate_axis_table_review_and_partial_g1_staging_with_scope_guards"
          elif downloaded_count:
              package_status = "etdd70_downloaded_but_axis_mapping_incomplete"
              selected_next_route = "etdd70_column_mapping_repair_with_scope_guards"
          else:
              package_status = "etdd70_download_failed_or_network_unavailable"
              selected_next_route = "etdd70_download_retry_or_manual_upload_with_scope_guards"

          claim_rows = [
              {
                  "claim": "Candidate ETDD70 axis rows close G1.",
                  "status": "blocked",
                  "safe_wording": "They only provide the dyslexia half of G1 and still require mapping review.",
                  "forbidden_wording": "G1 is closed."
              },
              {
                  "claim": "Candidate axis mapping validates TAIRID.",
                  "status": "blocked",
                  "safe_wording": "Candidate mapping is a parsing step, not validation.",
                  "forbidden_wording": "ETDD70 confirms TAIRID."
              },
              {
                  "claim": "Candidate rows can be staged for a guarded v4.195 rerun.",
                  "status": "allowed_with_boundary",
                  "safe_wording": "They can be reviewed and used as partial dyslexia-only G1 input.",
                  "forbidden_wording": "They replace the missing aphantasia half of G1."
              }
          ]
          write_csv(OUT / "v4_208_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          next_routes = [
              {
                  "priority": 1,
                  "route": selected_next_route,
                  "condition": package_status,
                  "next_action": "Review candidate axis mappings and decide whether to stage the dyslexia-only G1 file."
              },
              {
                  "priority": 2,
                  "route": "g1_aphantasia_public_or_uploaded_source_acquisition_with_scope_guards",
                  "condition": "after dyslexia candidate axis rows exist",
                  "next_action": "Acquire the aphantasia side so G1 is not dyslexia-only."
              },
              {
                  "priority": 3,
                  "route": "rerun_v4_195_after_both_g1_halves_are_staged",
                  "condition": "after dyslexia and aphantasia subject/group axis inputs exist",
                  "next_action": "Run covariance/correlation preview."
              }
          ]
          write_csv(OUT / "v4_208_next_routes.csv", next_routes, ["priority", "route", "condition", "next_action"])

          route_decision = {
              "version": "v4.208",
              "result_label": RESULT_LABEL,
              "clean_result": "ETDD70 metric CSV files were mapped into candidate dyslexia-only G1 subject-task axis rows using guarded z-scored operational rules.",
              "downloaded_count": downloaded_count,
              "label_rows": len(label_rows),
              "metric_file_rows": len(metric_file_rows),
              "metric_files_with_required_columns": metric_files_with_required,
              "raw_subject_task_aggregate_rows": len(metric_raw_rows),
              "complete_candidate_axis_rows": complete_axis_rows,
              "groups_present": groups_present,
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "candidate column mapping and partial dyslexia-only G1 rows; not covariance, not full G1, not validation",
              "blocked_claims": BLOCKED_CLAIMS
          }
          (OUT / "v4_208_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_208_scope_guards.json").write_text(json.dumps({
              "scope": "ETDD70 candidate column mapping to partial G1 dyslexia axis rows",
