name: "!!! AAA CURRENT - TAIRID v4.398B robustness audit response ingest no support"

on:
  workflow_dispatch:

jobs:
  run-v4-398B-robustness-audit-response-ingest-no-support:
    name: "!!! AAA CURRENT - Run v4.398B robustness audit response ingest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.397B output ZIP and human-filled robustness audit response ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.397B output ZIP..."
          INPUT_397B_ZIP="$(ls tairid-v4-397B-robustness-external-audit-packet-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_397B_ZIP" ]; then
            echo "Could not find v4.397B output ZIP."
            echo "Expected:"
            echo "tairid-v4-397B-robustness-external-audit-packet-no-support-output.zip"
            exit 1
          fi

          echo "Finding human-filled v4.397B robustness audit response ZIP..."
          HUMAN_FILLED_ROBUSTNESS_AUDIT_ZIP="$(ls tairid-v4-397B-human-filled-robustness-external-audit-response-for-v4-398B-no-support*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_ROBUSTNESS_AUDIT_ZIP" ]; then
            echo "Could not find human-filled robustness audit response ZIP."
            echo "Expected:"
            echo "tairid-v4-397B-human-filled-robustness-external-audit-response-for-v4-398B-no-support.zip"
            exit 1
          fi

          echo "Using v4.397B ZIP:"
          echo "$INPUT_397B_ZIP"

          echo "Using human-filled robustness audit ZIP:"
          echo "$HUMAN_FILLED_ROBUSTNESS_AUDIT_ZIP"

          echo "INPUT_397B_ZIP=$INPUT_397B_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_ROBUSTNESS_AUDIT_ZIP=$HUMAN_FILLED_ROBUSTNESS_AUDIT_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.398B robustness audit response ingest script
        run: |
          cat > run_v4_398B_robustness_audit_response_ingest_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "robustness external audit response ingest only; external audit responses may be recorded; no new chi-square computed; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          ALLOWED_AUDIT_DECISIONS = {
              "pass_no_corrections",
              "pass_with_minor_notes_no_corrections",
              "fail_requires_correction",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def as_bool(value):
              return clean(value).lower() in ["true", "1", "yes", "y"]

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def metric_value(df, metric_name, metric_col="summary_metric", value_col="value"):
              if metric_col not in df.columns or value_col not in df.columns:
                  return None
              rows = df[df[metric_col].astype(str) == metric_name]
              if len(rows) == 0:
                  return None
              return rows.iloc[0][value_col]

          def main():
              input_397b = Path(os.environ["INPUT_397B_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_ROBUSTNESS_AUDIT_ZIP"])

              outdir = Path("tairid_v4_398B_robustness_external_audit_response_ingest_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base397b = extract_zip(input_397b, "tairid_v4_398B_397B_")
              basehuman = extract_zip(human_zip, "tairid_v4_398B_human_")

              summary397b_path = find_one(base397b, "v4_397B_summary.json")
              findings_path = find_one(base397b, "v4_397B_guarded_robustness_findings_NO_SUPPORT.csv")
              open_gaps_path = find_one(base397b, "v4_397B_ruled_out_and_open_gaps.csv")
              stage_ledger_path = find_one(base397b, "v4_397B_stage_ledger_through_robustness_comparison.csv")
              audit_questions_path = find_one(base397b, "v4_397B_external_ai_audit_questions.csv")
              robustness_summary_path = find_one(base397b, "v4_397B_input_v4_396B_robustness_summary_preserved.csv")
              robustness_band_path = find_one(base397b, "v4_397B_input_v4_396B_robustness_band_preserved.csv")
              comparison_path = find_one(base397b, "v4_397B_input_v4_396B_primary_plus_alternate_comparison_preserved.csv")
              next_route_options_path = find_one(base397b, "v4_397B_next_route_options.csv")
              rules397b_path = find_one(base397b, "v4_397B_rule_checks.csv")

              human_response_path = find_one_suffix(basehuman, "HUMAN_FILLED_robustness_external_ai_audit_response_NO_SUPPORT.csv")

              summary397b = json.loads(summary397b_path.read_text())
              findings = pd.read_csv(findings_path)
              open_gaps = pd.read_csv(open_gaps_path)
              stage_ledger = pd.read_csv(stage_ledger_path)
              audit_questions = pd.read_csv(audit_questions_path)
              robustness_summary = pd.read_csv(robustness_summary_path)
              robustness_band = pd.read_csv(robustness_band_path)
              comparison = pd.read_csv(comparison_path)
              next_route_options = pd.read_csv(next_route_options_path)
              rules397b = pd.read_csv(rules397b_path)
              human_response = pd.read_csv(human_response_path)

              required_cols = [
                  "external_ai_system",
                  "audit_overall_decision",
                  "truth_boundary_preserved",
                  "improper_support_claim_detected",
                  "new_chi_square_computed_in_v4_397B_detected",
                  "likelihood_or_p_values_detected",
                  "score_valid_or_support_allowed_validated",
                  "prior_diagonal_primary_and_alternate_distinguished",
                  "robustness_values_supported_by_files",
                  "corrective_action_required",
                  "support_allowed",
              ]
              for col in required_cols:
                  if col not in human_response.columns:
                      human_response[col] = ""

              ingest_rows = []
              for _, row in human_response.iterrows():
                  decision = clean(row["audit_overall_decision"])
                  truth_ok = as_bool(row["truth_boundary_preserved"])
                  overclaim = as_bool(row["improper_support_claim_detected"])
                  new_chi_claim = as_bool(row["new_chi_square_computed_in_v4_397B_detected"])
                  likelihood_or_p = as_bool(row["likelihood_or_p_values_detected"])
                  score_support_validated = as_bool(row["score_valid_or_support_allowed_validated"])
                  values_supported = as_bool(row["robustness_values_supported_by_files"])
                  distinction_ok = as_bool(row["prior_diagonal_primary_and_alternate_distinguished"])
                  correction = as_bool(row["corrective_action_required"])

                  overall_pass = decision in {"pass_no_corrections", "pass_with_minor_notes_no_corrections"}
                  clean_audit = overall_pass and truth_ok and (not overclaim) and (not new_chi_claim) and (not likelihood_or_p) and (not score_support_validated) and values_supported and distinction_ok and (not correction)

                  ingest_rows.append({
                      "v4_398B_audit_response_ingest_id": f"v4_398B_audit_response_{len(ingest_rows)+1:03d}",
                      "external_ai_system": clean(row["external_ai_system"]),
                      "audit_packet_version_reviewed": clean(row.get("audit_packet_version_reviewed", "v4.397B")),
                      "audit_overall_decision": decision,
                      "audit_overall_pass": bool(overall_pass),
                      "truth_boundary_preserved": bool(truth_ok),
                      "improper_support_claim_detected": bool(overclaim),
                      "new_chi_square_computed_in_v4_397B_detected": bool(new_chi_claim),
                      "likelihood_or_p_values_detected": bool(likelihood_or_p),
                      "score_valid_or_support_allowed_validated": bool(score_support_validated),
                      "prior_diagonal_primary_and_alternate_distinguished": bool(distinction_ok),
                      "robustness_values_supported_by_files": bool(values_supported),
                      "corrective_action_required": bool(correction),
                      "audit_clean_for_next_route": bool(clean_audit),
                      "strongest_honest_conclusion": clean(row.get("strongest_honest_conclusion", "")),
                      "strongest_honest_criticism": clean(row.get("strongest_honest_criticism", "")),
                      "recommended_next_gate": clean(row.get("recommended_next_gate", "")),
                      "human_ingest_note": clean(row.get("human_ingest_note", "")),
                      "new_chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              audit_ingest = pd.DataFrame(ingest_rows)
              clean_rows = audit_ingest[audit_ingest["audit_clean_for_next_route"].astype(bool)].copy()
              overclaim_rows = audit_ingest[audit_ingest["improper_support_claim_detected"].astype(bool)].copy()
              correction_rows = audit_ingest[audit_ingest["corrective_action_required"].astype(bool)].copy()

              post_audit_route_decision = pd.DataFrame([
                  {
                      "route_option_id": "V4_398B_ROUTE_001",
                      "route_name": "v4_399A_cautious_diagnostic_writeup_packet_no_support_claims",
                      "route_status_after_v4_398B": "selected_next",
                      "reason": "External robustness audit response passed with no corrections; cautious diagnostic writeup is now the clean bounded route.",
                      "new_chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                  },
                  {
                      "route_option_id": "V4_398B_ROUTE_002",
                      "route_name": "broader_source_expansion_lane_later",
                      "route_status_after_v4_398B": "open_later",
                      "reason": "Broader observed-source families remain open before stronger scientific interpretation.",
                      "new_chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                  },
                  {
                      "route_option_id": "V4_398B_ROUTE_003",
                      "route_name": "support_claim_route",
                      "route_status_after_v4_398B": "blocked",
                      "reason": "support_allowed=false remains active; no TAIRID support claim is permitted.",
                      "new_chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                  },
              ])

              cautious_writeup_staging = pd.DataFrame([
                  {
                      "staging_id": "V4_398B_WRITEUP_STAGE_001",
                      "writeup_scope": "cautious_guarded_diagnostic_writeup_no_support",
                      "allowed_phrase": "The guarded covariance-corrected diagnostic and robustness comparison produced small chi-square dry-run values across the tested covariance candidates.",
                      "required_boundary": "Not a likelihood, not a p-value, not a validated score, and not a support claim.",
                      "must_include_prior_diagonal": True,
                      "must_include_primary_covariance": True,
                      "must_include_robustness_band": True,
                      "must_include_three_row_limitation": True,
                      "must_include_no_support_claim": True,
                      "new_chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                  }
              ])

              audit_response_summary = pd.DataFrame([
                  {"summary_metric": "external_robustness_audit_response_rows", "value": int(len(audit_ingest)), "note": "External robustness audit responses ingested."},
                  {"summary_metric": "audit_overall_pass_rows", "value": int(audit_ingest["audit_overall_pass"].astype(bool).sum()), "note": "Responses marked pass/no corrections or pass with no corrective action."},
                  {"summary_metric": "truth_boundary_preserved_rows", "value": int(audit_ingest["truth_boundary_preserved"].astype(bool).sum()), "note": "Audit responses preserving truth boundary."},
                  {"summary_metric": "overclaim_detected_rows", "value": int(len(overclaim_rows)), "note": "External audit rows detecting improper support overclaim."},
                  {"summary_metric": "corrective_action_required_rows", "value": int(len(correction_rows)), "note": "External audit rows requiring correction."},
                  {"summary_metric": "clean_for_next_route_rows", "value": int(len(clean_rows)), "note": "Rows clean enough to proceed."},
                  {"summary_metric": "likelihood_computed", "value": 0, "note": "No likelihood computed in v4.398B."},
                  {"summary_metric": "support_allowed", "value": 0, "note": "No support claim is allowed."},
              ])

              limitation_update = pd.DataFrame([
                  {"limit_id": "V4_398B_LIMIT_001", "limit": "Audit-response ingest is not a new diagnostic computation.", "status": "active_limit"},
                  {"limit_id": "V4_398B_LIMIT_002", "limit": "The robustness comparison remains a three-row BOSS DR12 diagnostic.", "status": "active_limit"},
                  {"limit_id": "V4_398B_LIMIT_003", "limit": "No likelihood or p-values are computed.", "status": "blocked_by_design"},
                  {"limit_id": "V4_398B_LIMIT_004", "limit": "score_valid remains false.", "status": "blocked_by_design"},
                  {"limit_id": "V4_398B_LIMIT_005", "limit": "support_allowed remains false; no support claim is allowed.", "status": "blocked_by_design"},
              ])

              gap_update = pd.DataFrame([
                  {"gap_id": "V4_398B_GAP_001", "gap": "External robustness audit response ingested.", "status_after_v4_398B": "closed_for_current_audit_response", "next_gate": "v4_399A_cautious_diagnostic_writeup_packet_no_support"},
                  {"gap_id": "V4_398B_GAP_002", "gap": "Cautious diagnostic writeup remains to be created.", "status_after_v4_398B": "open_next", "next_gate": "v4_399A_cautious_diagnostic_writeup_packet_no_support"},
                  {"gap_id": "V4_398B_GAP_003", "gap": "Broader observed-source expansion remains open.", "status_after_v4_398B": "open_later", "next_gate": "later_broader_source_expansion_lane"},
                  {"gap_id": "V4_398B_GAP_004", "gap": "Likelihood and p-values remain uncomputed.", "status_after_v4_398B": "still_blocked", "next_gate": "not_allowed_from_v4_398B"},
                  {"gap_id": "V4_398B_GAP_005", "gap": "Support claims remain blocked.", "status_after_v4_398B": "still_blocked", "next_gate": "no_support_claims_allowed_from_v4_398B"},
              ])

              hard_checks = {
                  "input_v4_397B_summary_found": summary397b.get("version") == "v4.397B",
                  "input_v4_397B_rules_all_passed": summary_rules_all_passed(summary397b),
                  "input_v4_397B_failed_gates_none": summary397b.get("failed_gates") == "none",
                  "input_v4_397B_prior_diagonal_value_preserved": abs(float(summary397b.get("prior_guarded_diagonal_chi_square_sum")) - 1.362038876169214) < 1e-12,
                  "input_v4_397B_primary_value_preserved": abs(float(summary397b.get("primary_dM_Hz_chi_square_dry_run_sum")) - 1.384804886905097) < 1e-12,
                  "input_v4_397B_robustness_min_preserved": abs(float(summary397b.get("robustness_min_chi_square")) - 1.2298323467773977) < 1e-12,
                  "input_v4_397B_robustness_max_preserved": abs(float(summary397b.get("robustness_max_chi_square")) - 1.384804886905097) < 1e-12,
                  "input_v4_397B_new_chi_square_false": summary397b.get("new_chi_square_computed") is False,
                  "input_v4_397B_likelihood_false": summary397b.get("likelihood_computed") is False,
                  "input_v4_397B_p_values_false": summary397b.get("p_values_computed") is False,
                  "input_v4_397B_score_valid_false": summary397b.get("score_valid") is False,
                  "input_v4_397B_support_allowed_false": summary397b.get("support_allowed") is False,

                  "rules397B_all_passed": passed_column_all(rules397b),
                  "findings_rows_at_least_8": len(findings) >= 8,
                  "open_gaps_rows_at_least_5": len(open_gaps) >= 5,
                  "stage_ledger_rows_at_least_1": len(stage_ledger) >= 1,
                  "audit_questions_rows_at_least_6": len(audit_questions) >= 6,
                  "robustness_summary_rows_at_least_1": len(robustness_summary) >= 1,
                  "robustness_band_rows_at_least_1": len(robustness_band) >= 1,
                  "comparison_rows_equal_4": len(comparison) == 4,
                  "next_route_options_rows_at_least_3": len(next_route_options) >= 3,

                  "human_response_rows_at_least_1": len(human_response) >= 1,
                  "human_decisions_allowed": human_response["audit_overall_decision"].apply(clean).isin(ALLOWED_AUDIT_DECISIONS).all(),
                  "audit_ingest_rows_equal_human_response": len(audit_ingest) == len(human_response),
                  "audit_overall_pass_rows_all": int(audit_ingest["audit_overall_pass"].astype(bool).sum()) == len(audit_ingest),
                  "truth_boundary_preserved_rows_all": int(audit_ingest["truth_boundary_preserved"].astype(bool).sum()) == len(audit_ingest),
                  "overclaim_detected_rows_zero": len(overclaim_rows) == 0,
                  "corrective_action_required_rows_zero": len(correction_rows) == 0,
                  "clean_for_next_route_rows_all": len(clean_rows) == len(audit_ingest),
                  "robustness_values_supported_all": audit_ingest["robustness_values_supported_by_files"].astype(bool).all(),
                  "diagnostics_distinguished_all": audit_ingest["prior_diagonal_primary_and_alternate_distinguished"].astype(bool).all(),
                  "post_audit_route_decision_rows_equal_3": len(post_audit_route_decision) == 3,
                  "cautious_writeup_staging_rows_equal_1": len(cautious_writeup_staging) == 1,
                  "audit_response_summary_rows_equal_8": len(audit_response_summary) == 8,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_new_chi_square_computed": false_col(audit_ingest, "new_chi_square_computed") and false_col(post_audit_route_decision, "new_chi_square_computed") and false_col(cautious_writeup_staging, "new_chi_square_computed"),
                  "no_likelihood_computed": false_col(audit_ingest, "likelihood_computed") and false_col(post_audit_route_decision, "likelihood_computed") and false_col(cautious_writeup_staging, "likelihood_computed"),
                  "no_p_values_computed": false_col(audit_ingest, "p_values_computed") and false_col(post_audit_route_decision, "p_values_computed") and false_col(cautious_writeup_staging, "p_values_computed"),
                  "no_score_valid": false_col(audit_ingest, "score_valid") and false_col(post_audit_route_decision, "score_valid") and false_col(cautious_writeup_staging, "score_valid"),
                  "no_support_allowed": false_col(audit_ingest, "support_allowed") and false_col(post_audit_route_decision, "support_allowed") and false_col(cautious_writeup_staging, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary398b = {
                  "version": "v4.398B",
                  "route_name": "v4_398B_robustness_external_audit_response_ingest_no_support_claims",
                  "expected_result": "v4_398B_robustness_external_audit_response_ingest_passed_no_corrections_no_support_claims",
                  "input_version": "v4.397B",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "external_robustness_audit_response_rows": int(len(audit_ingest)),
                  "audit_overall_pass_rows": int(audit_ingest["audit_overall_pass"].astype(bool).sum()),
                  "truth_boundary_preserved_rows": int(audit_ingest["truth_boundary_preserved"].astype(bool).sum()),
                  "overclaim_detected_rows": int(len(overclaim_rows)),
                  "corrective_action_required_rows": int(len(correction_rows)),
                  "clean_for_next_route_rows": int(len(clean_rows)),
                  "prior_guarded_diagonal_chi_square_sum": float(summary397b.get("prior_guarded_diagonal_chi_square_sum")),
                  "primary_dM_Hz_chi_square_dry_run_sum": float(summary397b.get("primary_dM_Hz_chi_square_dry_run_sum")),
                  "final_consensus_dV_FAP_chi_square": float(summary397b.get("final_consensus_dV_FAP_chi_square")),
                  "fs_consensus_chi_square": float(summary397b.get("fs_consensus_chi_square")),
                  "robustness_min_chi_square": float(summary397b.get("robustness_min_chi_square")),
                  "robustness_max_chi_square": float(summary397b.get("robustness_max_chi_square")),
                  "robustness_chi_square_range_width": float(summary397b.get("robustness_chi_square_range_width")),
                  "new_chi_square_computed": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "v4_399A_cautious_diagnostic_writeup_packet_no_support_claims",
              }

              audit_ingest.to_csv(outdir / "v4_398B_robustness_external_audit_response_ingest_ledger_NO_SUPPORT.csv", index=False)
              clean_rows.to_csv(outdir / "v4_398B_clean_external_audit_responses_NO_SUPPORT.csv", index=False)
              post_audit_route_decision.to_csv(outdir / "v4_398B_post_robustness_audit_route_decision_NO_SUPPORT.csv", index=False)
