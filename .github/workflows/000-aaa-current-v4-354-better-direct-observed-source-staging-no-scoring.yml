name: "!!! AAA CURRENT - TAIRID v4.354 better direct observed source staging no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-354-better-direct-observed-source-staging-no-scoring:
    name: "!!! AAA CURRENT - Run v4.354 better direct observed source staging"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.353 output ZIP and direct observed source CSV
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.353 output ZIP..."
          INPUT_353_ZIP="$(ls tairid-v4-353-manual-column-repair-ingest-no-values-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_353_ZIP" ]; then
            echo "Could not find v4.353 output ZIP."
            echo "Expected:"
            echo "tairid-v4-353-manual-column-repair-ingest-no-values-no-scoring-output.zip"
            exit 1
          fi

          echo "Finding direct observed source candidate CSV..."
          DIRECT_SOURCE_CSV="$(ls sdss_rsd_boss_dr12_direct_observed_source_candidate_v4_354_NO_VALUES_LOADED_NO_SCORING*.csv 2>/dev/null | head -n 1 || true)"

          if [ -z "$DIRECT_SOURCE_CSV" ]; then
            echo "Could not find direct observed source candidate CSV."
            echo "Expected:"
            echo "sdss_rsd_boss_dr12_direct_observed_source_candidate_v4_354_NO_VALUES_LOADED_NO_SCORING.csv"
            exit 1
          fi

          echo "Using v4.353 ZIP:"
          echo "$INPUT_353_ZIP"

          echo "Using direct observed source CSV:"
          echo "$DIRECT_SOURCE_CSV"

          echo "INPUT_353_ZIP=$INPUT_353_ZIP" >> "$GITHUB_ENV"
          echo "DIRECT_SOURCE_CSV=$DIRECT_SOURCE_CSV" >> "$GITHUB_ENV"

      - name: Write self-contained v4.354 source staging script
        run: |
          cat > run_v4_354_better_direct_observed_source_staging_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import hashlib
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values approved; numeric baseline approved; better direct observed source file may be staged here; no observed values loaded; no scoring; no support claims"

          REQUIRED_DIRECT_SOURCE_COLUMNS = [
              "survey_or_source",
              "tracer_or_sample",
              "effective_redshift_z",
              "observed_fsigma8",
              "observed_fsigma8_uncertainty",
              "covariance_or_error_model",
              "source_reference",
              "source_url",
          ]

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def main():
              input_353 = Path(os.environ["INPUT_353_ZIP"])
              source_csv = Path(os.environ["DIRECT_SOURCE_CSV"])

              outdir = Path("tairid_v4_354_better_direct_observed_source_staging_no_values_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base353 = extract_zip(input_353, "tairid_v4_354_353_")

              summary353_path = find_one(base353, "v4_353_summary.json")
              better_source_rows_path = find_one(base353, "v4_353_better_observed_source_needed_rows.csv")
              gap_status_path = find_one(base353, "v4_353_gap_status_after_manual_column_repair_ingest.csv")
              rules353_path = find_one(base353, "v4_353_rule_checks.csv")

              summary353 = json.loads(summary353_path.read_text())
              better_source_rows = pd.read_csv(better_source_rows_path)
              gap_status = pd.read_csv(gap_status_path)
              rules353 = pd.read_csv(rules353_path)

              header_columns = list(pd.read_csv(source_csv, nrows=0).columns)
              header_set = set(header_columns)
              required_present = set(REQUIRED_DIRECT_SOURCE_COLUMNS).issubset(header_set)

              source_stage = pd.DataFrame([
                  {
                      "v4_354_source_stage_id": "v4_354_direct_source_stage_001",
                      "repo_path": str(source_csv),
                      "file_name": source_csv.name,
                      "file_type": "csv",
                      "size_bytes": source_csv.stat().st_size,
                      "sha256": sha256_file(source_csv),
                      "header_columns_found": len(header_columns),
                      "header_columns_pipe": "|".join(header_columns),
                      "required_direct_source_columns_present": required_present,
                      "source_stage_status": "better_direct_observed_source_file_staged_header_only",
                      "observed_values_loaded": False,
                      "observed_rows_loaded": 0,
                      "schema_approved": False,
                      "definition_match_confirmed": False,
                      "covariance_match_confirmed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  }
              ])

              schema_map = pd.DataFrame([
                  {
                      "v4_354_schema_map_id": "v4_354_schema_map_001",
                      "source_stage_id": "v4_354_direct_source_stage_001",
                      "repo_path": str(source_csv),
                      "file_name": source_csv.name,
                      "schema_field_survey_or_source": "survey_or_source",
                      "schema_field_tracer_or_sample": "tracer_or_sample",
                      "schema_field_redshift_z": "effective_redshift_z",
                      "schema_field_observed_fsigma8": "observed_fsigma8",
                      "schema_field_observed_fsigma8_uncertainty": "observed_fsigma8_uncertainty",
                      "schema_field_covariance_or_error_model": "covariance_or_error_model",
                      "schema_field_source_reference": "source_reference",
                      "schema_field_source_url": "source_url",
                      "schema_map_status": "schema_candidate_prepared_from_direct_source_header_only",
                      "requires_human_schema_approval": True,
                      "schema_approved_now": False,
                      "observed_values_loaded": False,
                      "observed_rows_loaded": 0,
                      "definition_match_confirmed": False,
                      "covariance_match_confirmed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  }
              ])

              human_schema_review_packet = schema_map.copy()
              human_schema_review_packet["human_schema_review_decision"] = ""
              human_schema_review_packet["allowed_human_schema_review_decisions"] = "approve_schema_for_later_observed_value_loading|needs_manual_column_mapping|needs_better_source_file|reject_source_file|keep_blocked"
              human_schema_review_packet["human_schema_review_note"] = ""
              human_schema_review_packet["human_covariance_warning_acknowledgement"] = ""
              human_schema_review_packet["schema_approved_now"] = False

              checklist = pd.DataFrame([
                  {
                      "check_id": "V4_354_CHECK_001",
                      "check": "Direct observed source CSV is present in repo root.",
                      "required_before_schema_approval": True,
                  },
                  {
                      "check_id": "V4_354_CHECK_002",
                      "check": "Required direct-source header columns are present.",
                      "required_before_schema_approval": True,
                  },
                  {
                      "check_id": "V4_354_CHECK_003",
                      "check": "Only headers are inspected; observed rows are not loaded here.",
                      "required_before_schema_approval": True,
                  },
                  {
                      "check_id": "V4_354_CHECK_004",
                      "check": "Covariance/error-model limitations remain blocked for later review.",
                      "required_before_scoring": True,
                  },
                  {
                      "check_id": "V4_354_CHECK_005",
                      "check": "Definition matching remains unconfirmed.",
                      "required_before_scoring": True,
                  },
                  {
                      "check_id": "V4_354_CHECK_006",
                      "check": "Scoring and support claims remain blocked.",
                      "required_before_support_claims": True,
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_354_GAP_001",
                      "gap": "Better direct observed source file staged.",
                      "status_after_v4_354": "staged_header_only_not_loaded",
                      "next_gate": "v4_355_direct_source_schema_review_ingest_no_values_no_scoring",
                  },
                  {
                      "gap_id": "V4_354_GAP_002",
                      "gap": "Observed schema remains unapproved.",
                      "status_after_v4_354": "still_blocked",
                      "next_gate": "human_schema_review",
                  },
                  {
                      "gap_id": "V4_354_GAP_003",
                      "gap": "Observed values remain unloaded.",
                      "status_after_v4_354": "still_blocked",
                      "next_gate": "later_observed_value_loading_gate",
                  },
                  {
                      "gap_id": "V4_354_GAP_004",
                      "gap": "Definition/covariance matching remains unconfirmed.",
                      "status_after_v4_354": "still_blocked",
                      "next_gate": "later_definition_covariance_gate",
                  },
                  {
                      "gap_id": "V4_354_GAP_005",
                      "gap": "Scoring and support claims remain blocked.",
                      "status_after_v4_354": "still_blocked",
                      "next_gate": "later_scoring_and_support_gates",
                  },
              ])

              hard_checks = {
                  "input_v4_353_summary_found": summary353.get("version") == "v4.353",
                  "input_v4_353_rules_all_passed": summary_rules_all_passed(summary353),
                  "input_v4_353_failed_gates_none": summary353.get("failed_gates") == "none",
                  "input_v4_353_readiness_needs_better_source": summary353.get("readiness_status") == "blocked_needs_better_observed_value_source_file",
                  "input_v4_353_parameter_values_approved_true": summary353.get("parameter_values_approved") is True,
                  "input_v4_353_numeric_baseline_approved_true": summary353.get("numeric_baseline_approved") is True,
                  "input_v4_353_schema_approved_false": summary353.get("schema_approved") is False,
                  "input_v4_353_no_observed_values_loaded": summary353.get("observed_values_loaded") is False,
                  "input_v4_353_no_definition_match_confirmed": summary353.get("definition_match_confirmed") is False,
                  "input_v4_353_no_score_valid": summary353.get("score_valid") is False,
                  "input_v4_353_no_support_allowed": summary353.get("support_allowed") is False,

                  "rules353_all_passed": rules353["passed"].astype(bool).all(),
                  "better_source_rows_at_least_one": len(better_source_rows) >= 1,
                  "gap_status_rows_equal_5": len(gap_status) == 5,

                  "source_csv_exists": source_csv.exists(),
                  "source_csv_size_positive": source_csv.stat().st_size > 0,
                  "source_csv_sha256_nonblank": sha256_file(source_csv) != "",
                  "header_columns_found": len(header_columns) > 0,
                  "required_direct_source_columns_present": required_present,

                  "source_stage_rows_equal_1": len(source_stage) == 1,
                  "schema_map_rows_equal_1": len(schema_map) == 1,
                  "human_schema_review_packet_rows_equal_1": len(human_schema_review_packet) == 1,
                  "checklist_rows_equal_6": len(checklist) == 6,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "schema_approved_false": false_col(schema_map, "schema_approved_now") and false_col(human_schema_review_packet, "schema_approved_now"),
                  "observed_values_loaded_false": false_col(schema_map, "observed_values_loaded") and false_col(source_stage, "observed_values_loaded"),
                  "observed_rows_loaded_zero": int(source_stage["observed_rows_loaded"].sum()) == 0 and int(schema_map["observed_rows_loaded"].sum()) == 0,
                  "definition_match_confirmed_false": false_col(schema_map, "definition_match_confirmed"),
                  "covariance_match_confirmed_false": false_col(schema_map, "covariance_match_confirmed"),
                  "score_valid_false": false_col(schema_map, "score_valid"),
                  "support_allowed_false": false_col(schema_map, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary354 = {
                  "version": "v4.354",
                  "route_name": "v4_354_better_direct_observed_source_staging_no_values_no_scoring",
                  "expected_result": "v4_354_better_direct_observed_source_staging_passed_header_only_no_values_loaded_no_scoring_no_claims",
                  "input_version": "v4.353",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "source_stage_rows": int(len(source_stage)),
                  "schema_map_rows": int(len(schema_map)),
                  "required_direct_source_columns_present": bool(required_present),
                  "parameter_values_approved": True,
                  "numeric_baseline_values_filled": True,
                  "approved_baseline_values": 3,
                  "numeric_baseline_approved": True,
                  "schema_approved": False,
                  "observed_values_loaded": False,
                  "observed_rows_loaded": 0,
                  "definition_match_confirmed": False,
                  "covariance_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "human_fill_v4_354_schema_review_then_v4_355_direct_source_schema_review_ingest_no_values_no_scoring",
              }

              source_stage.to_csv(outdir / "v4_354_direct_observed_source_file_stage_HEADER_ONLY_NO_VALUES_LOADED.csv", index=False)
              schema_map.to_csv(outdir / "v4_354_direct_observed_source_schema_map_candidate_NO_VALUES_LOADED.csv", index=False)
              human_schema_review_packet.to_csv(outdir / "v4_354_HUMAN_FILL_direct_source_schema_review_NO_VALUES_NO_SCORING.csv", index=False)
              checklist.to_csv(outdir / "v4_354_direct_source_schema_review_checklist.csv", index=False)
              gap_update.to_csv(outdir / "v4_354_gap_status_after_better_direct_source_staging.csv", index=False)
              better_source_rows.to_csv(outdir / "v4_354_input_v4_353_better_source_needed_rows_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_354_rule_checks.csv", index=False)

              shutil.copy2(source_csv, outdir / source_csv.name)

              (outdir / "v4_354_summary.json").write_text(json.dumps(summary354, indent=2))

              summary_md = f"""# TAIRID v4.354 Better Direct Observed Source Staging — No Values, No Scoring

          Expected result: `{summary354["expected_result"]}`

          {summary354["rules_passed"]} / {summary354["rules_total"]} rules passed

          failed_gates = {summary354["failed_gates"]}

          source_stage_rows = {summary354["source_stage_rows"]}

          schema_map_rows = {summary354["schema_map_rows"]}

          required_direct_source_columns_present = {summary354["required_direct_source_columns_present"]}

          schema_approved = false

          observed_values_loaded = false

          observed_rows_loaded = 0

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step stages a better direct observed-source CSV by header only.

          It does **not** load observed values.

          It does **not** approve the observed schema.

          It does **not** confirm definition or covariance matching.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{summary354["selected_next_route"]}`
          """
              (outdir / "v4_354_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary354, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_354_better_direct_observed_source_staging_no_scoring.py

      - name: Run v4.354 better direct observed source staging no scoring
        run: |
          python run_v4_354_better_direct_observed_source_staging_no_scoring.py

      - name: Upload v4.354 better direct observed source staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-354-better-direct-observed-source-staging-no-values-no-scoring-output
          path: |
            tairid_v4_354_better_direct_observed_source_staging_no_values_no_scoring_output/
            tairid_v4_354_better_direct_observed_source_staging_no_values_no_scoring_output.zip
