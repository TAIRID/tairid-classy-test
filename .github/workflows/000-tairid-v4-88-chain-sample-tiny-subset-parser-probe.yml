name: 000 TAIRID v4.88 Chain Sample Tiny Subset Parser Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-88-chain-sample-tiny-subset-parser-probe.yml"

jobs:
  tairid-v4-88-chain-sample-tiny-subset-parser-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.88 chain sample tiny subset parser probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_88_chain_sample_tiny_subset_parser_probe

          python - <<'PY'
          import csv
          import hashlib
          import json
          import math
          import re
          import struct
          import urllib.request
          import zlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_88_chain_sample_tiny_subset_parser_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_88_chain_sample_tiny_subset_parser_probe"

          FULL_GRID_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip"

          FULLGRID_CONTENT_LENGTH_EXPECTED = 11805855817
          ZIP64_CENTRAL_DIRECTORY_OFFSET = 11803187830
          ZIP64_CENTRAL_DIRECTORY_SIZE = 2667889

          MAX_RANGE_READ_BYTES = 5_000_000
          MAX_PARAMNAMES_COMPRESSED_BYTES = 100_000
          MAX_CHAIN_COMPRESSED_PREFIX_BYTES = 2_500_000
          MAX_VALID_SAMPLE_ROWS = 12
          MIN_REQUIRED_VALID_SAMPLE_ROWS = 3

          SELECTED_ROOT = "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE"
          PARAMNAMES_MEMBER = SELECTED_ROOT + ".paramnames"
          CHAIN_SAMPLE_MEMBER = SELECTED_ROOT + "_1.txt"

          REQUIRED_PRIMARY_PARAMETERS = ["omegabh2", "omegach2", "theta", "tau", "logA", "ns"]

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not run CAMB.",
              "This does not compute Planck reference uncertainty.",
              "This does not compute a covariance matrix.",
              "This parses only a tiny bounded prefix of one Planck chain sample member.",
              "This preserves sample weights and primary parameter values for a future microbatch solver design.",
              "A pass means the selected .paramnames and a tiny chain sample subset are parseable, not that posterior uncertainty has been computed."
          ]

          UPSTREAM_LOCKS = {
              "v4_87_reference_uncertainty_chain_sample_design": {
                  "readiness_label": "reference_uncertainty_chain_sample_design_passed_ready_for_chain_sample_tiny_subset_parser_probe",
                  "selected_root": SELECTED_ROOT,
                  "chain_samples_parsed": False,
                  "CAMB_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_86_single_fixture_residual_audit": {
                  "readiness_label": "single_fixture_residual_audit_passed_ready_for_reference_uncertainty_chain_sample_design",
                  "single_fixture_residual_audit_passed": True,
                  "accepted_locked_orientation": "reversed_raw_order",
                  "primary_combined_rms": 0.00018044389560315524,
                  "primary_combined_max_abs": 0.00026632780896707064,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          PARAMETER_MAPPING_CONTRACT = [
              {"source_parameter": "omegabh2", "future_camb_name": "ombh2", "mapping_operation": "identity"},
              {"source_parameter": "omegach2", "future_camb_name": "omch2", "mapping_operation": "identity"},
              {"source_parameter": "theta", "future_camb_name": "cosmomc_theta", "mapping_operation": "divide_by_100_if_label_is_100theta_MC"},
              {"source_parameter": "tau", "future_camb_name": "tau", "mapping_operation": "identity"},
              {"source_parameter": "logA", "future_camb_name": "As", "mapping_operation": "As = exp(logA) / 1e10"},
              {"source_parameter": "ns", "future_camb_name": "ns", "mapping_operation": "identity"}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A full Planck posterior covariance was computed.",
              "A weighted covariance matrix was computed.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "The tiny subset parser validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The tiny subset parser is the same as full Planck reference uncertainty.",
              "The tiny subset parser is enough for final RSD pressure.",
              "A sample packet microbatch has already been run through CAMB."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_89_sample_packet_microbatch_solver_design",
                  "purpose": "Design how the parsed tiny sample packets would be run through CAMB in a bounded microbatch.",
                  "why_next": "The parser must first prove sample weights and primary inputs are available."
              },
              {
                  "priority": 2,
                  "route_id": "v4_90_sample_packet_microbatch_solver_probe",
                  "purpose": "Run CAMB over a tiny number of parsed weighted sample packets only after the design passes.",
                  "why_next": "Reference uncertainty requires output vectors across multiple weighted samples."
              },
              {
                  "priority": 3,
                  "route_id": "v4_91_weighted_covariance_formula_lock",
                  "purpose": "Lock weighted mean and covariance formulas after sample output vectors exist.",
                  "why_next": "Final RSD pressure needs covariance, not point fixtures."
              },
              {
                  "priority": 4,
                  "route_id": "v4_92_ELG_or_WiggleZ_parallel_backlog",
                  "purpose": "Parallel route for parked growth-family incompleteness.",
                  "why_next": "ELG and WiggleZ remain incomplete."
              }
          ]

          failed_gates = []
          warnings = [
              "tiny_subset_parser_probe_only",
              "bounded_member_range_reads_only",
              "no_CAMB_run",
              "no_covariance_computation",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def is_finite_number(value):
              try:
                  return math.isfinite(float(value))
              except Exception:
                  return False

          def is_plausible_primary_parameter(name, value):
              if not is_finite_number(value):
                  return False
              value = float(value)
              if name == "omegabh2":
                  return 0.005 < value < 0.04
              if name == "omegach2":
                  return 0.05 < value < 0.30
              if name == "theta":
                  return 0.5 < value < 2.0
              if name == "tau":
                  return 0.01 < value < 0.20
              if name == "logA":
                  return 2.0 < value < 4.0
              if name == "ns":
                  return 0.8 < value < 1.2
              return False

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }
              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={"User-Agent": "TAIRID-v4.88-chain-sample-parser/1.0", "Accept": "*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }
              data = b""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.88-chain-sample-parser/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )
                  with urllib.request.urlopen(req, timeout=180) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)
                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record, data

          def classify_member(name):
              lower = name.lower()
              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".paramnames"):
                  return "paramnames"
              if lower.endswith(".minimum"):
                  return "minimum"
              if re.search(r"_\d+\.txt$", name):
                  return "chain_sample_text_member"
              return "other"

          def parse_zip64_extra(extra_bytes, need_uncompressed, need_compressed, need_local_offset):
              result = {}
              pos = 0
              while pos + 4 <= len(extra_bytes):
                  header_id, data_size = struct.unpack_from("<HH", extra_bytes, pos)
                  data_start = pos + 4
                  data_end = data_start + data_size
                  if data_end > len(extra_bytes):
                      break

                  data = extra_bytes[data_start:data_end]
                  if header_id == 0x0001:
                      subpos = 0
                      if need_uncompressed and subpos + 8 <= len(data):
                          result["uncompressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_compressed and subpos + 8 <= len(data):
                          result["compressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_local_offset and subpos + 8 <= len(data):
                          result["local_header_offset"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                  pos = data_end
              return result

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0

              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break

                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)
                      compression_method = fields[4]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      extra_start = name_end
                      extra_end = extra_start + extra_len
                      comment_end = extra_end + comment_len

                      if comment_end > len(cd_bytes):
                          break

                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")
                      extra = cd_bytes[extra_start:extra_end]

                      zip64_extra = parse_zip64_extra(
                          extra,
                          need_uncompressed=uncompressed_size == 0xFFFFFFFF,
                          need_compressed=compressed_size == 0xFFFFFFFF,
                          need_local_offset=local_header_offset == 0xFFFFFFFF
                      )

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compression_method": compression_method,
                          "compressed_size": zip64_extra.get("compressed_size", compressed_size),
                          "uncompressed_size": zip64_extra.get("uncompressed_size", uncompressed_size),
                          "local_header_offset": zip64_extra.get("local_header_offset", local_header_offset),
                          "zip64_extra_used": bool(zip64_extra)
                      })

                      pos = comment_end

                  except Exception:
                      break

              return records

          def fetch_member_prefix(member_record, max_member_compressed_bytes):
              offset = int(member_record["local_header_offset"])
              compressed_size = int(member_record["compressed_size"])

              member_fetch = {
                  "member_name": member_record["member_name"],
                  "member_type": member_record["member_type"],
                  "compressed_size": compressed_size,
                  "uncompressed_size": member_record["uncompressed_size"],
                  "compression_method_from_central_directory": member_record["compression_method"],
                  "local_header_offset": offset,
                  "requested_compressed_bytes": min(compressed_size, max_member_compressed_bytes),
                  "full_compressed_member_requested": compressed_size <= max_member_compressed_bytes,
                  "payload_bytes_decompressed": 0,
                  "payload_sha256_16": "",
                  "ok": False,
                  "error": ""
              }

              try:
                  if compressed_size <= 0:
                      raise RuntimeError("compressed_size_not_positive")

                  header_record, header_data = range_probe(
                      "local_header_probe",
                      FULL_GRID_URL,
                      f"bytes={offset}-{offset + 4095}",
                      4096
                  )

                  if not header_record["ok"] or not header_record["server_honored_range"]:
                      raise RuntimeError("local_header_range_not_available")

                  if len(header_data) < 30 or header_data[:4] != b"PK\x03\x04":
                      raise RuntimeError("local_header_signature_not_found")

                  fields = struct.unpack_from("<4s5H3L2H", header_data, 0)
                  compression_method = fields[3]
                  file_name_len = fields[9]
                  extra_len = fields[10]
                  data_start = offset + 30 + file_name_len + extra_len

                  bytes_to_fetch = min(compressed_size, max_member_compressed_bytes)
                  data_end = data_start + bytes_to_fetch - 1

                  data_record, compressed_data = range_probe(
                      "member_payload_probe",
                      FULL_GRID_URL,
                      f"bytes={data_start}-{data_end}",
                      bytes_to_fetch + 1024
                  )

                  if not data_record["ok"] or not data_record["server_honored_range"]:
                      raise RuntimeError("member_payload_range_not_available")

                  if data_record["truncated_by_guard"]:
                      raise RuntimeError("member_payload_truncated_by_guard")

                  if compression_method == 0:
                      payload = compressed_data
                  elif compression_method == 8:
                      decompressor = zlib.decompressobj(-15)
                      payload = decompressor.decompress(compressed_data)
                  else:
                      raise RuntimeError(f"unsupported_compression_method_{compression_method}")

                  member_fetch["payload_bytes_decompressed"] = len(payload)
                  member_fetch["payload_sha256_16"] = hashlib.sha256(payload).hexdigest()[:16] if payload else ""
                  member_fetch["ok"] = True
                  return payload, member_fetch

              except Exception as exc:
                  member_fetch["error"] = f"{type(exc).__name__}: {exc}"
                  return b"", member_fetch

          def parse_paramnames_text(text):
              rows = []
              names = []
              for row_number, raw_line in enumerate(text.splitlines(), start=1):
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  parts = line.split(None, 1)
                  name = parts[0]
                  label = parts[1] if len(parts) > 1 else ""
                  rows.append({
                      "row_number": row_number,
                      "parameter_index_zero_based": len(names),
                      "parameter_name": name,
                      "parameter_label": label
                  })
                  names.append(name)
              return rows, names

          def parse_chain_prefix_text(text, expected_column_count, max_rows):
              valid_rows = []
              invalid_rows = []
              line_count = 0
              numeric_line_count = 0

              for line_number, raw_line in enumerate(text.splitlines(), start=1):
                  line_count += 1
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue

                  parts = line.split()
                  try:
                      numeric = [float(x) for x in parts]
                  except Exception:
                      invalid_rows.append({
                          "line_number": line_number,
                          "reason": "non_numeric",
                          "column_count": len(parts),
                          "line_text": line[:300]
                      })
                      continue

                  numeric_line_count += 1
                  width = len(numeric)

                  if width >= expected_column_count:
                      valid_rows.append({
                          "line_number": line_number,
                          "column_count": width,
                          "values": numeric,
                          "line_sha256_16": hashlib.sha256(line.encode("utf-8")).hexdigest()[:16]
                      })
                      if len(valid_rows) >= max_rows:
                          break
                  else:
                      invalid_rows.append({
                          "line_number": line_number,
                          "reason": "too_few_columns",
                          "column_count": width,
                          "line_text": line[:300]
                      })

              return {
                  "line_count_seen_until_stop": line_count,
                  "numeric_line_count_seen": numeric_line_count,
                  "valid_rows": valid_rows,
                  "invalid_rows": invalid_rows[:25]
              }

          def build_sample_packets(valid_rows, primary_index_records):
              packets = []
              for sample_number, row in enumerate(valid_rows, start=1):
                  values = row["values"]
                  weight = values[0]
                  minus_loglike = values[1]

                  packet = {
                      "sample_number": sample_number,
                      "source_line_number": row["line_number"],
                      "row_column_count": row["column_count"],
                      "sample_weight": weight,
                      "minus_loglike_or_proxy": minus_loglike,
                      "line_sha256_16": row["line_sha256_16"],
                      "row_width_status": "valid_width",
                      "packet_scope": "tiny_subset_sample_packet_not_covariance"
                  }

                  primary_values_ok = True

                  for item in primary_index_records:
                      name = item["parameter_name"]
                      column = int(item["chain_column_zero_based"])
                      value = values[column]
                      packet[name] = value
                      if not is_plausible_primary_parameter(name, value):
                          primary_values_ok = False

                  theta_value = packet.get("theta", "")
                  logA_value = packet.get("logA", "")

                  packet["cosmomc_theta_for_future_CAMB"] = float(theta_value) / 100.0 if is_finite_number(theta_value) else ""
                  packet["As_for_future_CAMB"] = math.exp(float(logA_value)) / 1.0e10 if is_finite_number(logA_value) else ""
                  packet["sample_weight_positive_finite"] = is_finite_number(weight) and float(weight) > 0
                  packet["minus_loglike_finite"] = is_finite_number(minus_loglike)
                  packet["primary_values_plausible"] = primary_values_ok
                  packet["future_CAMB_run_allowed_now"] = False

                  packets.append(packet)

              return packets

          head_record = head_probe("full_grid_head", FULL_GRID_URL)

          if not head_record["ok"]:
              failed_gates.append("full_grid_head_probe_failed")

          if head_record.get("content_length") and head_record["content_length"] != FULLGRID_CONTENT_LENGTH_EXPECTED:
              warnings.append("fullgrid_content_length_differs_from_locked_value")

          cd_start = ZIP64_CENTRAL_DIRECTORY_OFFSET
          cd_end = ZIP64_CENTRAL_DIRECTORY_OFFSET + ZIP64_CENTRAL_DIRECTORY_SIZE - 1

          cd_record, cd_data = range_probe(
              "full_grid_locked_zip64_central_directory_fetch",
              FULL_GRID_URL,
              f"bytes={cd_start}-{cd_end}",
              MAX_RANGE_READ_BYTES
          )

          if not cd_record["ok"]:
              failed_gates.append("central_directory_fetch_failed")
          if not cd_record.get("server_honored_range"):
              failed_gates.append("central_directory_range_not_honored")
          if cd_record.get("truncated_by_guard"):
              failed_gates.append("central_directory_truncated_by_guard")

          manifest_records = parse_central_directory(cd_data) if cd_data else []

          if not manifest_records:
              failed_gates.append("central_directory_manifest_records_not_parsed")

          manifest_by_name = {row["member_name"]: row for row in manifest_records}

          paramnames_record = manifest_by_name.get(PARAMNAMES_MEMBER)
          chain_record = manifest_by_name.get(CHAIN_SAMPLE_MEMBER)

          if paramnames_record is None:
              failed_gates.append("selected_paramnames_member_missing")

          if chain_record is None:
              failed_gates.append("selected_chain_sample_member_missing")

          member_fetch_records = []
          paramname_records = []
          primary_index_records = []
          chain_parse_summary = {
              "chain_member_name": CHAIN_SAMPLE_MEMBER,
              "expected_parameter_count": 0,
              "expected_column_count": 0,
              "valid_sample_row_count": 0,
              "invalid_row_count_recorded": 0,
              "line_count_seen_until_stop": 0,
              "numeric_line_count_seen": 0,
              "chain_prefix_only": True,
              "chain_samples_parsed": False
          }
          invalid_chain_rows = []
          sample_packets = []

          if paramnames_record is not None:
              payload, fetch_record = fetch_member_prefix(paramnames_record, MAX_PARAMNAMES_COMPRESSED_BYTES)
              member_fetch_records.append(fetch_record)

              if fetch_record["ok"]:
                  param_text = payload.decode("utf-8", errors="replace")
                  paramname_records, param_names = parse_paramnames_text(param_text)

                  column_index_by_name = {
                      name: index + 2 for index, name in enumerate(param_names)
                  }

                  for required_name in REQUIRED_PRIMARY_PARAMETERS:
                      present = required_name in column_index_by_name
                      primary_index_records.append({
                          "parameter_name": required_name,
                          "present": present,
                          "parameter_index_zero_based": param_names.index(required_name) if present else "",
                          "chain_column_zero_based": column_index_by_name.get(required_name, ""),
                          "parameter_label": next((row["parameter_label"] for row in paramname_records if row["parameter_name"] == required_name), ""),
                          "mapping_status": "mapped_from_paramnames" if present else "missing_from_paramnames"
                      })

                  chain_parse_summary["expected_parameter_count"] = len(param_names)
                  chain_parse_summary["expected_column_count"] = 2 + len(param_names)

          if chain_record is not None:
              payload, fetch_record = fetch_member_prefix(chain_record, MAX_CHAIN_COMPRESSED_PREFIX_BYTES)
              member_fetch_records.append(fetch_record)

              if fetch_record["ok"]:
                  chain_text = payload.decode("utf-8", errors="replace")
                  parse_result = parse_chain_prefix_text(
                      chain_text,
                      chain_parse_summary["expected_column_count"],
                      MAX_VALID_SAMPLE_ROWS
                  )

                  valid_rows = parse_result["valid_rows"]
                  invalid_chain_rows = parse_result["invalid_rows"]

                  sample_packets = build_sample_packets(valid_rows, primary_index_records)

                  chain_parse_summary.update({
                      "valid_sample_row_count": len(valid_rows),
                      "invalid_row_count_recorded": len(invalid_chain_rows),
                      "line_count_seen_until_stop": parse_result["line_count_seen_until_stop"],
                      "numeric_line_count_seen": parse_result["numeric_line_count_seen"],
                      "chain_prefix_only": not fetch_record["full_compressed_member_requested"],
                      "chain_samples_parsed": len(valid_rows) > 0
                  })

          required_primary_present = (
              len(primary_index_records) == len(REQUIRED_PRIMARY_PARAMETERS)
              and all(row["present"] for row in primary_index_records)
          )

          sample_count = len(sample_packets)
          sample_weights_ok = sample_count > 0 and all(row["sample_weight_positive_finite"] for row in sample_packets)
          sample_loglike_ok = sample_count > 0 and all(row["minus_loglike_finite"] for row in sample_packets)
          sample_primary_values_ok = sample_count > 0 and all(row["primary_values_plausible"] for row in sample_packets)
          future_camb_blocked = sample_count > 0 and all(row["future_CAMB_run_allowed_now"] is False for row in sample_packets)

          if not any(row["member_name"] == PARAMNAMES_MEMBER and row["ok"] for row in member_fetch_records):
              failed_gates.append("paramnames_fetch_failed")

          if not any(row["member_name"] == CHAIN_SAMPLE_MEMBER and row["ok"] for row in member_fetch_records):
              failed_gates.append("chain_sample_fetch_failed")

          if not paramname_records:
              failed_gates.append("paramnames_not_parsed")

          if not required_primary_present:
              failed_gates.append("required_primary_parameters_not_mapped")

          if chain_parse_summary["expected_column_count"] <= 2:
              failed_gates.append("expected_column_count_not_established")

          if sample_count < MIN_REQUIRED_VALID_SAMPLE_ROWS:
              failed_gates.append("not_enough_valid_sample_rows")

          if not sample_weights_ok:
              failed_gates.append("sample_weights_not_positive_finite")

          if not sample_loglike_ok:
              failed_gates.append("sample_loglike_proxy_not_finite")

          if not sample_primary_values_ok:
              failed_gates.append("sample_primary_values_not_plausible")

          if not future_camb_blocked:
              failed_gates.append("future_CAMB_run_not_blocked")

          if UPSTREAM_LOCKS["v4_87_reference_uncertainty_chain_sample_design"]["Planck_reference_uncertainty_computed"] is not False:
              failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "weighted covariance matrix was computed",
              "final rsd pressure score",
              "validates tairid cosmology",
              "tiny subset parser is the same as full planck reference uncertainty",
              "sample packet microbatch has already been run through camb",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "chain_sample_tiny_subset_parser_probe_passed_ready_for_sample_packet_microbatch_solver_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_reference_design_carried",
                  "pass": UPSTREAM_LOCKS["v4_87_reference_uncertainty_chain_sample_design"]["Planck_reference_uncertainty_computed"] is False,
                  "result": "v4.87 design carried without claiming reference uncertainty",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "central_directory_parsed",
                  "pass": bool(manifest_records),
                  "result": f"{len(manifest_records)} manifest records parsed",
                  "boundary": "Central directory only, not full zip download."
              },
              {
                  "rule_id": "selected_members_found",
                  "pass": paramnames_record is not None and chain_record is not None,
                  "result": f"paramnames_found={paramnames_record is not None}; chain_found={chain_record is not None}",
                  "boundary": "Selected root only."
              },
              {
                  "rule_id": "paramnames_parsed",
                  "pass": bool(paramname_records),
                  "result": f"{len(paramname_records)} parameter names parsed",
                  "boundary": "Column map only."
              },
              {
                  "rule_id": "primary_parameters_mapped",
                  "pass": required_primary_present,
                  "result": f"{sum(1 for row in primary_index_records if row['present'])} of {len(REQUIRED_PRIMARY_PARAMETERS)} required primary parameters mapped",
                  "boundary": "No CAMB run."
              },
              {
                  "rule_id": "chain_prefix_parsed",
                  "pass": sample_count >= MIN_REQUIRED_VALID_SAMPLE_ROWS,
                  "result": f"{sample_count} valid sample rows parsed from bounded chain prefix",
                  "boundary": "Tiny subset only, not full chain."
              },
              {
                  "rule_id": "sample_schema_valid",
                  "pass": sample_weights_ok and sample_loglike_ok and sample_primary_values_ok,
                  "result": f"weights_ok={sample_weights_ok}; loglike_ok={sample_loglike_ok}; primary_values_ok={sample_primary_values_ok}",
                  "boundary": "Sample packet validation only."
              },
              {
                  "rule_id": "future_CAMB_run_blocked",
                  "pass": future_camb_blocked,
                  "result": "sample packets created but CAMB run remains blocked",
                  "boundary": "No solver microbatch yet."
              },
              {
                  "rule_id": "reference_uncertainty_still_not_computed",
                  "pass": True,
                  "result": "Planck reference uncertainty not computed",
                  "boundary": "No posterior covariance."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 14,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_88_rules_passed")

          if failed_gates:
              readiness_label = "chain_sample_tiny_subset_parser_probe_failed"
              next_allowed_step = "Repair tiny subset chain parser before designing a sample-packet CAMB microbatch."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.89 sample packet microbatch solver design. "
                  "Do not compute Planck reference uncertainty, final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "selected_root": SELECTED_ROOT,
              "paramnames_member": PARAMNAMES_MEMBER,
              "chain_sample_member": CHAIN_SAMPLE_MEMBER,
              "head_ok": head_record["ok"],
              "head_content_length": head_record.get("content_length"),
              "central_directory_bytes_read": cd_record.get("bytes_read"),
              "manifest_member_count": len(manifest_records),
              "member_fetch_record_count": len(member_fetch_records),
              "paramname_record_count": len(paramname_records),
              "primary_index_record_count": len(primary_index_records),
              "required_primary_present": required_primary_present,
              "expected_parameter_count": chain_parse_summary["expected_parameter_count"],
              "expected_column_count": chain_parse_summary["expected_column_count"],
              "chain_valid_sample_row_count": chain_parse_summary["valid_sample_row_count"],
              "sample_packet_count": sample_count,
              "minimum_required_valid_sample_rows": MIN_REQUIRED_VALID_SAMPLE_ROWS,
              "sample_weights_ok": sample_weights_ok,
              "sample_loglike_ok": sample_loglike_ok,
              "sample_primary_values_ok": sample_primary_values_ok,
              "future_CAMB_run_blocked": future_camb_blocked,
              "chain_prefix_only": chain_parse_summary["chain_prefix_only"],
              "chain_samples_parsed": sample_count > 0,
              "CAMB_run": False,
              "Planck_reference_uncertainty_computed": False,
              "weighted_covariance_matrix_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_url": FULL_GRID_URL,
              "upstream_locks": UPSTREAM_LOCKS,
              "selected_root": SELECTED_ROOT,
              "selected_members": {
                  "paramnames_member": PARAMNAMES_MEMBER,
                  "chain_sample_member": CHAIN_SAMPLE_MEMBER
              },
              "parameter_mapping_contract": PARAMETER_MAPPING_CONTRACT,
              "head_record": head_record,
              "central_directory_range_record": cd_record,
              "member_fetch_records": member_fetch_records,
              "chain_parse_summary": chain_parse_summary,
              "paramname_records": paramname_records,
              "primary_index_records": primary_index_records,
              "invalid_chain_rows": invalid_chain_rows,
              "sample_packets": sample_packets,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "chain_samples_parsed": sample_count > 0,
                  "sample_packet_count": sample_count,
                  "CAMB_run": False,
                  "Planck_reference_uncertainty_computed": False,
                  "weighted_covariance_matrix_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_88_chain_sample_tiny_subset_parser_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "member_fetch_records_v4_88.csv",
              member_fetch_records,
              [
                  "member_name",
                  "member_type",
                  "compressed_size",
                  "uncompressed_size",
                  "compression_method_from_central_directory",
                  "local_header_offset",
                  "requested_compressed_bytes",
                  "full_compressed_member_requested",
                  "payload_bytes_decompressed",
                  "payload_sha256_16",
                  "ok",
                  "error"
              ]
          )

          write_csv(
              OUTDIR / "paramname_records_v4_88.csv",
              paramname_records,
              ["row_number", "parameter_index_zero_based", "parameter_name", "parameter_label"]
          )

          write_csv(
              OUTDIR / "primary_index_records_v4_88.csv",
              primary_index_records,
              [
                  "parameter_name",
                  "present",
                  "parameter_index_zero_based",
                  "chain_column_zero_based",
                  "parameter_label",
                  "mapping_status"
              ]
          )

          sample_packet_fields = [
              "sample_number",
              "source_line_number",
              "row_column_count",
              "sample_weight",
              "minus_loglike_or_proxy",
              "line_sha256_16",
              "row_width_status",
              "omegabh2",
              "omegach2",
              "theta",
              "tau",
              "logA",
              "ns",
              "cosmomc_theta_for_future_CAMB",
              "As_for_future_CAMB",
              "sample_weight_positive_finite",
              "minus_loglike_finite",
              "primary_values_plausible",
              "future_CAMB_run_allowed_now",
              "packet_scope"
          ]

          write_csv(
              OUTDIR / "sample_packets_v4_88.csv",
              sample_packets,
              sample_packet_fields
          )

          write_csv(
              OUTDIR / "invalid_chain_rows_v4_88.csv",
              invalid_chain_rows,
              ["line_number", "reason", "column_count", "line_text"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_88.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_88.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_88.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.88 — Chain Sample Tiny Subset Parser Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This workflow performs the first bounded parser probe on actual Planck chain sample rows for the selected root.")
          md.append("")
          md.append("It reads `.paramnames`, reads a small prefix of `_1.txt`, maps the six primary parameters, and writes tiny sample packets with weights.")
          md.append("")
          md.append("It does not run CAMB, compute Planck reference uncertainty, compute covariance, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## Selected members")
          md.append("")
          md.append(f"- Paramnames: `{PARAMNAMES_MEMBER}`")
          md.append(f"- Chain sample prefix: `{CHAIN_SAMPLE_MEMBER}`")
          md.append("")
          md.append("## Parser summary")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in chain_parse_summary.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Primary column map")
          md.append("")
          md.append("| Parameter | Present | Chain column | Label |")
          md.append("|---|---|---:|---|")
          for row in primary_index_records:
              md.append(f"| `{row['parameter_name']}` | `{row['present']}` | `{row['chain_column_zero_based']}` | `{row['parameter_label']}` |")
          md.append("")
          md.append("## Sample packets")
          md.append("")
          md.append("| Sample | Weight | omegabh2 | omegach2 | theta | tau | logA | ns |")
          md.append("|---:|---:|---:|---:|---:|---:|---:|---:|")
          for row in sample_packets:
              md.append(
                  f"| `{row['sample_number']}` | `{row['sample_weight']}` | `{row['omegabh2']}` | `{row['omegach2']}` | `{row['theta']}` | `{row['tau']}` | `{row['logA']}` | `{row['ns']}` |"
              )
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_88_chain_sample_tiny_subset_parser_probe.json",
              "tairid_v4_88_chain_sample_tiny_subset_parser_probe.md",
              "member_fetch_records_v4_88.csv",
              "paramname_records_v4_88.csv",
              "primary_index_records_v4_88.csv",
              "sample_packets_v4_88.csv",
              "invalid_chain_rows_v4_88.csv",
              "blocked_claims_v4_88.csv",
              "next_route_options_v4_88.csv",
              "rule_results_v4_88.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_88_chain_sample_tiny_subset_parser_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.88 chain sample tiny subset parser probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-88-chain-sample-tiny-subset-parser-probe
          path: artifacts/tairid_v4_88_chain_sample_tiny_subset_parser_probe/
