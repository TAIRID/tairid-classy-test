name: 000 TAIRID v4.200 - Bipolar Manual Phase Surface Table With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-200-bipolar-manual-phase-surface-table-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-200-bipolar-manual-phase-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.200 bipolar manual phase surface table
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_200_outputs
          cat > tairid_v4_200_outputs/run_v4_200.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_200_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "bipolar_manual_phase_surface_table_passed_manual_phase_artifacts_written_no_empirical_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves bipolar phase cycling",
              "no claim that bipolar phase cycling proves cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "manual phase rows are not empirical subject data",
              "manual phase rows are not external replication",
              "manual phase surface is not validation",
              "TAIRID not proved"
          ]

          V4_199_STATUS = {
              "version": "v4.199",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "phase_target_rows": 4,
              "input_rows_loaded": 0,
              "normalized_phase_rows": 0,
              "package_status": "bipolar_phase_numeric_input_missing_templates_written",
              "selected_next_route": "bipolar_manual_phase_surface_table_or_real_phase_data_upload_with_scope_guards"
          }

          # Manual phase rows preserve bipolar as movement through surfaces.
          # Values are relational signs only: 1 = above/expanded, -1 = below/reduced, 0 = reference, M = mixed.
          MANUAL_PHASE_ROWS = [
              {
                  "phase_label": "depression",
                  "row_kind": "manual_phase_relative_not_subject_data",
                  "group_or_condition": "depression_relative_to_euthymic_reference",
                  "boundary_or_task": "phase-cycling rhythm surface",
                  "propagation_value": "-1",
                  "reference_propagation_value": "0",
                  "pacing_value": "-1",
                  "reference_pacing_value": "0",
                  "consolidation_value": "1",
                  "reference_consolidation_value": "0",
                  "viability_value": "-1",
                  "reference_viability_value": "0",
                  "expected_three_axis_signature": "--+",
                  "expected_four_axis_signature": "--+-",
                  "known_anchor": "reduced beta_swing, reduced s_A_swing, reduced V_swing, positive boundary-compression score",
                  "truth_boundary": "+ consolidation means compressed/locked consolidation-heavy basin, not healthy consolidation"
              },
              {
                  "phase_label": "mania_hypomania",
                  "row_kind": "manual_phase_relative_not_subject_data",
                  "group_or_condition": "mania_hypomania_relative_to_euthymic_reference",
                  "boundary_or_task": "phase-cycling rhythm surface",
                  "propagation_value": "1",
                  "reference_propagation_value": "0",
                  "pacing_value": "1",
                  "reference_pacing_value": "0",
                  "consolidation_value": "-1",
                  "reference_consolidation_value": "0",
                  "viability_value": "-1",
                  "reference_viability_value": "0",
                  "expected_three_axis_signature": "++-",
                  "expected_four_axis_signature": "++--",
                  "known_anchor": "propagation-heavy activity expansion with rest/sleep consolidation reduced or destabilized",
                  "truth_boundary": "provisional support lane until raw phase data are reanalyzed"
              },
              {
                  "phase_label": "euthymia",
                  "row_kind": "manual_reference_surface_not_pathology",
                  "group_or_condition": "euthymic_reference",
                  "boundary_or_task": "reference rhythm surface",
                  "propagation_value": "0",
                  "reference_propagation_value": "0",
                  "pacing_value": "0",
                  "reference_pacing_value": "0",
                  "consolidation_value": "1",
                  "reference_consolidation_value": "0",
                  "viability_value": "1",
                  "reference_viability_value": "0",
                  "expected_three_axis_signature": "00+",
                  "expected_four_axis_signature": "00++",
                  "known_anchor": "subject-specific reference rhythm surface",
                  "truth_boundary": "reference surface, not a pathology row"
              },
              {
                  "phase_label": "mixed_transition",
                  "row_kind": "manual_mixed_holdout_not_three_sign_row",
                  "group_or_condition": "mixed_transition_relative_to_reference",
                  "boundary_or_task": "phase-overlap transition surface",
                  "propagation_value": "M",
                  "reference_propagation_value": "0",
                  "pacing_value": "M",
                  "reference_pacing_value": "0",
                  "consolidation_value": "M",
                  "reference_consolidation_value": "0",
                  "viability_value": "M",
                  "reference_viability_value": "0",
                  "expected_three_axis_signature": "MMM",
                  "expected_four_axis_signature": "MMMM",
                  "known_anchor": "mixed/transition states should not be forced into mania or depression",
                  "truth_boundary": "holdout row; not classified into one three-sign signature"
              }
          ]

          CANDIDATE_INPUT_ROWS = []
          for row in MANUAL_PHASE_ROWS:
              CANDIDATE_INPUT_ROWS.append({
                  "phase_label": row["phase_label"],
                  "subject_id": "manual_phase_surface",
                  "group_or_condition": row["group_or_condition"],
                  "boundary_or_task": row["boundary_or_task"],
                  "propagation_value": row["propagation_value"],
                  "reference_propagation_value": row["reference_propagation_value"],
                  "pacing_value": row["pacing_value"],
                  "reference_pacing_value": row["reference_pacing_value"],
                  "consolidation_value": row["consolidation_value"],
                  "reference_consolidation_value": row["reference_consolidation_value"],
                  "viability_value": row["viability_value"],
                  "reference_viability_value": row["reference_viability_value"],
                  "source_or_dataset": row["known_anchor"] + " | manual_phase_relative_not_subject_data",
                  "notes": row["truth_boundary"]
              })

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def sign_delta(value, reference):
              if value == "M" or reference == "M":
                  return "M"
              try:
                  v = float(value)
                  r = float(reference)
              except Exception:
                  return ""
              d = v - r
              if d > 0:
                  return "+"
              if d < 0:
                  return "-"
              return "0"

          resolved_rows = []
          for row in MANUAL_PHASE_ROWS:
              p = sign_delta(row["propagation_value"], row["reference_propagation_value"])
              t = sign_delta(row["pacing_value"], row["reference_pacing_value"])
              c = sign_delta(row["consolidation_value"], row["reference_consolidation_value"])
              v = sign_delta(row["viability_value"], row["reference_viability_value"])
              sig3 = p + t + c if p and t and c else ""
              sig4 = p + t + c + v if p and t and c and v else ""
              out = dict(row)
              out["resolved_propagation_sign"] = p
              out["resolved_pacing_sign"] = t
              out["resolved_consolidation_sign"] = c
              out["resolved_viability_sign"] = v
              out["resolved_three_axis_signature"] = sig3
              out["resolved_four_axis_signature"] = sig4
              out["matches_expected_three_axis"] = sig3 == row["expected_three_axis_signature"]
              out["matches_expected_four_axis"] = sig4 == row["expected_four_axis_signature"]
              out["match_boundary"] = "manual phase signature only; not empirical confirmation"
              resolved_rows.append(out)

          transition_edges = [
              {
                  "edge": "euthymia_to_depression",
                  "from_phase": "euthymia",
                  "to_phase": "depression",
                  "propagation_shift": "-",
                  "pacing_shift": "-",
                  "consolidation_shift": "compressed_up",
                  "viability_shift": "-",
                  "plain_read": "reference rhythm collapses into reduced reach, reduced pacing, locked consolidation, and lower viability"
              },
              {
                  "edge": "euthymia_to_mania_hypomania",
                  "from_phase": "euthymia",
                  "to_phase": "mania_hypomania",
                  "propagation_shift": "+",
                  "pacing_shift": "+",
                  "consolidation_shift": "-",
                  "viability_shift": "-",
                  "plain_read": "reference rhythm expands into high reach and high pacing while consolidation drops"
              },
              {
                  "edge": "depression_to_mixed_transition",
                  "from_phase": "depression",
                  "to_phase": "mixed_transition",
                  "propagation_shift": "M",
                  "pacing_shift": "M",
                  "consolidation_shift": "M",
                  "viability_shift": "M",
                  "plain_read": "mixed transition is not a clean linear move from depression"
              },
              {
                  "edge": "mania_hypomania_to_mixed_transition",
                  "from_phase": "mania_hypomania",
                  "to_phase": "mixed_transition",
                  "propagation_shift": "M",
                  "pacing_shift": "M",
                  "consolidation_shift": "M",
                  "viability_shift": "M",
                  "plain_read": "mixed transition is not a clean linear move from mania/hypomania"
              }
          ]

          acquisition_plan = [
              {
                  "priority": 1,
                  "phase": "depression",
                  "target_file": "data/neurotype/bipolar_phase_numeric_surface_input.csv",
                  "needed_real_numbers": "beta_swing, s_A_swing, V_swing, boundary compression score, reference values",
                  "next_action": "replace manual -1/-1/+1/-1 with measured depression-side values"
              },
              {
                  "priority": 2,
                  "phase": "mania_hypomania",
                  "target_file": "data/neurotype/bipolar_phase_numeric_surface_input.csv",
                  "needed_real_numbers": "activity expansion, sleep/rhythm disruption, rest consolidation, viability or functional stability",
                  "next_action": "replace manual +1/+1/-1/-1 with measured mania/hypomania values"
              },
              {
                  "priority": 3,
                  "phase": "euthymia",
                  "target_file": "data/neurotype/bipolar_phase_numeric_surface_input.csv",
                  "needed_real_numbers": "subject-specific baseline propagation, pacing, consolidation, viability",
                  "next_action": "build the reference rhythm surface"
              },
              {
                  "priority": 4,
                  "phase": "mixed_transition",
                  "target_file": "data/neurotype/bipolar_phase_numeric_surface_input.csv",
                  "needed_real_numbers": "multi-axis phase-overlap indicators and instability measures",
                  "next_action": "test mixed states as off-axis rather than forcing a clean signature"
              }
          ]

          claim_rows = [
              {
                  "claim": "Manual phase rows can be fed back into v4.199.",
                  "status": "allowed with boundary",
                  "safe_wording": "They can test classification plumbing, but remain manual and not empirical.",
                  "forbidden_wording": "Manual rows validate bipolar phase geometry."
              },
              {
                  "claim": "Bipolar has one shape.",
                  "status": "blocked",
                  "safe_wording": "Bipolar is handled as movement through phase surfaces.",
                  "forbidden_wording": "Bipolar is one static signature."
              },
              {
                  "claim": "Depression consolidation is healthy consolidation.",
                  "status": "blocked",
                  "safe_wording": "The depression + sign means compressed or locked consolidation-heavy basin.",
                  "forbidden_wording": "Depression is healthy consolidation."
              },
              {
                  "claim": "Mixed transition can be forced into a clean row.",
                  "status": "blocked",
                  "safe_wording": "Mixed/transition is a holdout/off-axis row until measured.",
                  "forbidden_wording": "Mixed state equals mania or depression."
              }
          ]

          phase_fields = [
              "phase_label", "row_kind", "group_or_condition", "boundary_or_task",
              "propagation_value", "reference_propagation_value",
              "pacing_value", "reference_pacing_value",
              "consolidation_value", "reference_consolidation_value",
              "viability_value", "reference_viability_value",
              "expected_three_axis_signature", "expected_four_axis_signature",
              "known_anchor", "truth_boundary",
              "resolved_propagation_sign", "resolved_pacing_sign", "resolved_consolidation_sign", "resolved_viability_sign",
              "resolved_three_axis_signature", "resolved_four_axis_signature",
              "matches_expected_three_axis", "matches_expected_four_axis", "match_boundary"
          ]

          candidate_fields = [
              "phase_label", "subject_id", "group_or_condition", "boundary_or_task",
              "propagation_value", "reference_propagation_value",
              "pacing_value", "reference_pacing_value",
              "consolidation_value", "reference_consolidation_value",
              "viability_value", "reference_viability_value",
              "source_or_dataset", "notes"
          ]

          write_csv(OUT / "v4_200_v4_199_status_review.csv", [V4_199_STATUS], list(V4_199_STATUS.keys()))
          (OUT / "v4_200_v4_199_status_review.json").write_text(json.dumps(V4_199_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_200_manual_bipolar_phase_surface_table.csv", resolved_rows, phase_fields)
          write_csv(OUT / "candidate_data_neurotype_bipolar_phase_numeric_surface_input.csv", CANDIDATE_INPUT_ROWS, candidate_fields)
          write_csv(OUT / "v4_200_bipolar_phase_transition_edges.csv", transition_edges, [
              "edge", "from_phase", "to_phase", "propagation_shift", "pacing_shift", "consolidation_shift", "viability_shift", "plain_read"
          ])
          write_csv(OUT / "v4_200_real_phase_data_acquisition_plan.csv", acquisition_plan, ["priority", "phase", "target_file", "needed_real_numbers", "next_action"])
          write_csv(OUT / "v4_200_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          selected_next_route = "rerun_v4_199_with_manual_phase_input_or_replace_with_real_phase_data_then_rerun"

          route_decision = {
              "version": "v4.200",
              "result_label": RESULT_LABEL,
              "clean_result": "v4.199 found no bipolar phase numeric input rows. v4.200 writes a manual phase-surface table and candidate input CSV while preserving that these are not empirical phase rows.",
              "manual_phase_rows": len(MANUAL_PHASE_ROWS),
              "rows_matching_expected_three_axis": sum(1 for r in resolved_rows if r["matches_expected_three_axis"]),
              "rows_matching_expected_four_axis": sum(1 for r in resolved_rows if r["matches_expected_four_axis"]),
              "candidate_input_rows": len(CANDIDATE_INPUT_ROWS),
              "selected_next_route": selected_next_route,
              "truth_boundary": "manual bipolar phase surface only; not empirical subject data, not external replication, not validation",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_200_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_200_scope_guards.json").write_text(json.dumps({
              "scope": "bipolar manual phase-surface table and candidate input CSV",
              "manual_rows_are_subject_data": False,
              "manual_rows_are_external_replication": False,
              "manual_rows_validate_shape": False,
              "one_static_bipolar_shape_claimed": False,
              "mixed_states_forced_into_mania_or_depression": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_200_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.200 - Bipolar Manual Phase Surface Table",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.199 passed but found no bipolar phase numeric rows. v4.200 writes a manual/corpus-grounded phase-surface table and a candidate CSV that can be used for a v4.199 rerun or replaced by real measured phase data.",
              "",
              "Manual phase rows: `" + str(len(MANUAL_PHASE_ROWS)) + "`",
              "Rows matching expected three-axis signatures: `" + str(sum(1 for r in resolved_rows if r["matches_expected_three_axis"])) + "`",
              "Rows matching expected four-axis signatures: `" + str(sum(1 for r in resolved_rows if r["matches_expected_four_axis"])) + "`",
              "Candidate input rows: `" + str(len(CANDIDATE_INPUT_ROWS)) + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_200_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_200_v4_199_status_review.csv",
              "v4_200_v4_199_status_review.json",
              "v4_200_manual_bipolar_phase_surface_table.csv",
              "candidate_data_neurotype_bipolar_phase_numeric_surface_input.csv",
              "v4_200_bipolar_phase_transition_edges.csv",
              "v4_200_real_phase_data_acquisition_plan.csv",
              "v4_200_claim_boundary_matrix.csv",
              "v4_200_route_decision.json",
              "v4_200_scope_guards.json",
              "v4_200_blocked_claims.json",
              "v4_200_summary.md"
          ]

          rules = {
              "version_is_v4_200": True,
              "result_label_present": RESULT_LABEL.endswith("no_empirical_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_199_status_reviewed": V4_199_STATUS["rule_pass_count"] == 10,
              "manual_phase_rows_present": len(MANUAL_PHASE_ROWS) == 4,
              "candidate_input_rows_present": len(CANDIDATE_INPUT_ROWS) == 4,
              "three_axis_matches_present": sum(1 for r in resolved_rows if r["matches_expected_three_axis"]) == 4,
              "four_axis_matches_present": sum(1 for r in resolved_rows if r["matches_expected_four_axis"]) == 4,
              "no_empirical_validation_claim": True,
              "no_one_static_bipolar_shape_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.200",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "manual_phase_rows": len(MANUAL_PHASE_ROWS),
              "rows_matching_expected_three_axis": sum(1 for r in resolved_rows if r["matches_expected_three_axis"]),
              "rows_matching_expected_four_axis": sum(1 for r in resolved_rows if r["matches_expected_four_axis"]),
              "candidate_input_rows": len(CANDIDATE_INPUT_ROWS),
              "package_status": "manual_bipolar_phase_surface_table_written_no_empirical_validation",
              "selected_next_route": selected_next_route,
              "claim_boundary": "manual_phase_surface_only_no_empirical_validation"
          }

          (OUT / "v4_200_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.200 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_200_outputs/run_v4_200.py

      - name: Upload v4.200 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-200-bipolar-manual-phase-surface-table-output
          path: tairid_v4_200_outputs/
