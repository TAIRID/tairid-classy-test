name: TAIRID v4.51.1 Planck External Manifest Source Packet

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-51-1-planck-external-manifest-source-packet.yml"

jobs:
  tairid-v4-51-1-planck-external-manifest-source-packet:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.51.1 Planck external manifest source packet
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_51_1_planck_external_manifest_source_packet

          python - <<'PY'
          import json
          import re
          import urllib.request
          import hashlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_51_1_planck_external_manifest_source_packet")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_51_1_planck_external_manifest_source_packet"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not import Planck chains.",
              "This does not include Planck reference uncertainty.",
              "This does not parse the full Planck full-grid zip manifest.",
              "This does not select a verified internal Planck chain member.",
              "This does not download the full COM_CosmoParams_fullGrid_R3.01.zip file.",
              "This only builds a guarded external source packet for later parser design."
          ]

          OFFICIAL_SOURCES = {
              "irsa_cosmoparams_index": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/",
              "esa_pr3_cosmology_doi_page": "https://esdcdoi.esac.esa.int/doi/html/data/astronomy/planck/Cosmology.html",
              "full_grid_irsa_zip": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip",
              "base_plikHM_irsa_zip": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_base-plikHM_R3.01.zip",
              "parameter_tables_irsa_zip": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_parameter-tables_R3.01.zip",
              "baseline_minimum_txt": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_PowerSpect_CMB-base-plikHM-TTTEEE-lowl-lowE-lensing-minimum_R3.01.txt"
          }

          CANDIDATE_CHAIN_ROOTS = [
              "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE",
              "base/plikHM_TTTEEE_lowl_lowE_lensing/base_plikHM_TTTEEE_lowl_lowE_lensing",
              "base/plikHM_TT_lowl_lowE/base_plikHM_TT_lowl_lowE",
              "base/plikHM_TT_lowl_lowE_lensing/base_plikHM_TT_lowl_lowE_lensing",
              "base/plikHM_TTTEEE_lowl_lowE_BAO/base_plikHM_TTTEEE_lowl_lowE_BAO"
          ]

          def small_fetch(label, url, max_bytes=300000):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "bytes_read": 0,
                  "sha256_16": None,
                  "error": None
              }

              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v4.51.1-source-packet/1.0",
                      "Accept": "*/*"
                  }
              )

              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      data = response.read(max_bytes + 1)
                      if len(data) > max_bytes:
                          data = data[:max_bytes]

                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16]

                      return record, data.decode("utf-8", errors="replace")

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
                  return record, ""

          def head_or_tiny_get(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "bytes_read": 0,
                  "method": "HEAD",
                  "error": None
              }

              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={
                          "User-Agent": "TAIRID-v4.51.1-source-packet/1.0",
                          "Accept": "*/*"
                      }
                  )

                  with urllib.request.urlopen(req, timeout=30) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      return record

              except Exception as head_exc:
                  record["method"] = "GET_FALLBACK_TINY"

                  try:
                      req = urllib.request.Request(
                          url,
                          headers={
                              "User-Agent": "TAIRID-v4.51.1-source-packet/1.0",
                              "Accept": "*/*"
                          }
                      )

                      with urllib.request.urlopen(req, timeout=30) as response:
                          data = response.read(4096)
                          record["ok"] = True
                          record["status"] = getattr(response, "status", None)
                          record["content_type"] = response.headers.get("Content-Type")
                          content_length = response.headers.get("Content-Length")
                          record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                          record["bytes_read"] = len(data)
                          return record

                  except Exception as get_exc:
                      record["error"] = f"HEAD failed: {type(head_exc).__name__}: {head_exc}; tiny GET failed: {type(get_exc).__name__}: {get_exc}"
                      return record

          def parse_index_products(index_text):
              pattern = r"COM_[A-Za-z0-9_.-]+\.(?:zip|txt|pdf|gz)"
              return sorted(set(re.findall(pattern, index_text)))

          def parse_minimum_parameters(text):
              found = {}
              pattern = re.compile(
                  r"^\s*(\d+)\s+([+-]?\d+\.\d+E[+-]?\d+)\s+([A-Za-z0-9_]+)\s+(.+?)\s*$",
                  re.MULTILINE
              )

              for index, value, name, label in pattern.findall(text):
                  if name.startswith(("fsigma8z", "sigma8z")) or name in {"sigma8", "S8", "omegam", "H0"}:
                      try:
                          found[name] = {
                              "index": int(index),
                              "value": float(value),
                              "label": label
                          }
                      except ValueError:
                          pass

              return found

          fetch_records = []

          full_grid_record = head_or_tiny_get("full_grid_irsa_zip", OFFICIAL_SOURCES["full_grid_irsa_zip"])
          base_record = head_or_tiny_get("base_plikHM_irsa_zip", OFFICIAL_SOURCES["base_plikHM_irsa_zip"])
          parameter_tables_record = head_or_tiny_get("parameter_tables_irsa_zip", OFFICIAL_SOURCES["parameter_tables_irsa_zip"])

          fetch_records.extend([full_grid_record, base_record, parameter_tables_record])

          index_record, index_text = small_fetch("irsa_cosmoparams_index", OFFICIAL_SOURCES["irsa_cosmoparams_index"])
          doi_record, doi_text = small_fetch("esa_pr3_cosmology_doi_page", OFFICIAL_SOURCES["esa_pr3_cosmology_doi_page"])
          minimum_record, minimum_text = small_fetch("baseline_minimum_txt", OFFICIAL_SOURCES["baseline_minimum_txt"], max_bytes=600000)

          fetch_records.extend([index_record, doi_record, minimum_record])

          index_products = parse_index_products(index_text)
          minimum_parameters = parse_minimum_parameters(minimum_text)

          candidate_manifest_notes = []
          for root in CANDIDATE_CHAIN_ROOTS:
              candidate_manifest_notes.append({
                  "candidate_root": root,
                  "status": "candidate_not_manifest_verified",
                  "expected_chain_files": [f"{root}_{i}.txt" for i in range(1, 9)],
                  "expected_side_files": [
                      f"{root}.paramnames",
                      f"{root}.ranges",
                      f"{root}.minimum",
                      f"{root}.bestfit",
                      f"{root}.likestats",
                      f"{root}.converge"
                  ],
                  "boundary": "Candidate naming only. Do not treat as verified internal zip manifest."
              })

          failed_gates = []
          warnings = []

          if not full_grid_record["ok"]:
              failed_gates.append("official_full_grid_container_not_visible")

          if "COM_CosmoParams_fullGrid_R3.01.zip" not in index_text:
              failed_gates.append("full_grid_product_not_confirmed_in_irsa_index")

          if "Cosmological Parameters Full Grid" not in doi_text and "fullGrid" not in doi_text:
              warnings.append("esa_doi_page_visible_but_expected_full_grid_phrase_not_confirmed")

          if not minimum_parameters:
              failed_gates.append("baseline_minimum_parameters_not_detected")

          if not any(name.startswith("fsigma8z") for name in minimum_parameters):
              failed_gates.append("fsigma8z_parameters_not_detected")

          if full_grid_record.get("bytes_read", 0) > 5000:
              failed_gates.append("full_grid_probe_read_too_many_bytes")

          warnings.extend([
              "candidate_chain_roots_are_not_verified_manifest",
              "reference_uncertainty_still_missing",
              "Planck_chains_not_imported",
              "full_grid_zip_not_downloaded",
              "final_RSD_pressure_not_computed",
              "not_validation"
          ])

          rule_results = [
              {
                  "rule_id": "official_sources_checked",
                  "pass": full_grid_record["ok"] and index_record["ok"],
                  "result": "official_Planck_PR3_source_locations_checked",
                  "boundary": "Source visibility only."
              },
              {
                  "rule_id": "no_full_grid_download",
                  "pass": full_grid_record.get("bytes_read", 0) <= 5000,
                  "result": "full_grid_checked_by_HEAD_or_tiny_fallback_only",
                  "boundary": "No full COM_CosmoParams_fullGrid_R3.01.zip download."
              },
              {
                  "rule_id": "irsa_index_product_visible",
                  "pass": "COM_CosmoParams_fullGrid_R3.01.zip" in index_text,
                  "result": "full_grid_product_visible_in_index",
                  "boundary": "Index visibility is not internal manifest parsing."
              },
              {
                  "rule_id": "baseline_minimum_parameters_visible",
                  "pass": bool(minimum_parameters),
                  "result": f"{len(minimum_parameters)} RSD_or_reference_adjacent_parameters_detected",
                  "boundary": "Minimum values are not posterior uncertainty."
              },
              {
                  "rule_id": "fsigma8z_parameters_visible",
                  "pass": any(name.startswith("fsigma8z") for name in minimum_parameters),
                  "result": "fsigma8z_parameters_detected_in_small_public_text_product",
                  "boundary": "Point values only; not propagated Planck covariance."
              },
              {
                  "rule_id": "candidate_manifest_marked_unverified",
                  "pass": all(row["status"] == "candidate_not_manifest_verified" for row in candidate_manifest_notes),
                  "result": "candidate_chain_roots_preserved_as_unverified",
                  "boundary": "No internal member selected."
              },
              {
                  "rule_id": "no_reference_uncertainty_claim",
                  "pass": True,
                  "result": "reference_uncertainty_still_missing",
                  "boundary": "No Planck posterior propagated to RSD targets."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Source packet only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_51_1_rules_passed")

          if failed_gates:
              readiness_label = "planck_external_manifest_source_packet_failed"
              next_allowed_step = "Repair official source visibility or baseline minimum parsing before parser design."
          else:
              readiness_label = "planck_external_manifest_source_packet_passed_ready_for_reference_uncertainty_parser_design"
              next_allowed_step = (
                  "Proceed to v4.52 Reference Uncertainty Parser Design. "
                  "Do not import Planck chains, compute reference uncertainty, or compute final RSD pressure yet."
              )

          system_health = {
              "official_fetch_count": len(fetch_records),
              "official_fetch_ok_count": sum(1 for row in fetch_records if row.get("ok") is True),
              "index_product_count": len(index_products),
              "minimum_parameter_count": len(minimum_parameters),
              "fsigma8z_parameter_count": sum(1 for name in minimum_parameters if name.startswith("fsigma8z")),
              "candidate_chain_root_count": len(candidate_manifest_notes),
              "full_grid_zip_downloaded": False,
              "Planck_chains_imported": False,
              "Planck_manifest_parsed": False,
              "internal_chain_member_selected": False,
              "reference_uncertainty_included": False,
              "final_RSD_pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "official_sources": OFFICIAL_SOURCES,
              "fetch_records": fetch_records,
              "index_products": index_products,
              "minimum_parameters": minimum_parameters,
              "candidate_manifest_notes": candidate_manifest_notes,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "full_grid_zip_downloaded": False,
                  "Planck_chains_imported": False,
                  "Planck_manifest_parsed": False,
                  "internal_chain_member_selected": False,
                  "reference_uncertainty_included": False,
                  "final_RSD_pressure_computed": False,
                  "validation_claim_allowed": False
              }
          }

          json_path = OUTDIR / "tairid_v4_51_1_planck_external_manifest_source_packet.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.51.1 — Planck External Manifest Source Packet")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This test checks official Planck PR3 source locations and small public text products without downloading the full Planck full-grid zip.")
          md.append("")
          md.append("It confirms whether a safe source packet exists for designing the later reference uncertainty parser.")
          md.append("")
          md.append("It does not import chains, parse the full manifest, select an internal member, include reference uncertainty, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Detected baseline minimum parameters")
          md.append("")
          md.append("| Parameter | Value | Label |")
          md.append("|---|---:|---|")
          for name, row in sorted(minimum_parameters.items()):
              md.append(f"| `{name}` | `{row['value']}` | `{row['label']}` |")
          md.append("")
          md.append("## Candidate chain roots")
          md.append("")
          md.append("These are candidate naming roots only. They are not verified internal zip manifest entries.")
          md.append("")
          for row in candidate_manifest_notes:
              md.append(f"- `{row['candidate_root']}` — `{row['status']}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_51_1_planck_external_manifest_source_packet.json`")
          md.append("- `tairid_v4_51_1_planck_external_manifest_source_packet.md`")
          md.append("")

          md_path = OUTDIR / "tairid_v4_51_1_planck_external_manifest_source_packet.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.51.1 Planck external manifest source packet artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-51-1-planck-external-manifest-source-packet
          path: artifacts/tairid_v4_51_1_planck_external_manifest_source_packet/
