name: TAIRID v4.325 SDSS RSD Parameter Human Review Packet No Scoring

on:
  workflow_dispatch:

jobs:
  build-v4-325-human-review-packet:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run v4.325 no-scoring human review packet builder
        run: |
          python run_tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring.py             --input tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output.zip             --output-dir tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring_output

      - name: Upload v4.325 no-scoring output artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-325-sdss-rsd-numeric-baseline-parameter-human-review-packet-no-scoring-output
          path: |
            tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring_output/
            tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring_output.zip
