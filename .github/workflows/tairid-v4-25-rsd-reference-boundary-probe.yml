name: TAIRID v4.25 RSD Reference Boundary Probe

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-25-rsd-reference-boundary-probe.yml"

jobs:
  tairid-v4-25-rsd-reference-boundary-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.25 RSD reference boundary probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_25_rsd_reference_boundary_probe

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_25_rsd_reference_boundary_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_25_rsd_reference_boundary_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine RSD, weak lensing, clusters, CMB lensing, KiDS, DES, HSC, H0LiCOW, BAO, or CMB into one posterior.",
              "This does not parse new posterior chains.",
              "This does not run an RSD likelihood.",
              "This does not compute a new RSD pressure score.",
              "This probes what a valid redshift-dependent f_sigma8 reference comparison would require.",
              "A pass means the RSD reference boundary is defined, not that TAIRID cosmology is validated."
          ]

          RSD_ROWS = [
              {
                  "row_id": "boss_dr12_z038_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.38,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.497,
                  "published_sigma": 0.045,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "boss_dr12_z051_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.51,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.458,
                  "published_sigma": 0.038,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "boss_dr12_z061_fsigma8",
                  "survey_family": "BOSS_DR12",
                  "tracer_or_sample": "galaxy_consensus",
                  "z_eff": 0.61,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.436,
                  "published_sigma": 0.034,
                  "evidence_status": "published_summary",
                  "bao_bundled": True,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "wigglez_z044_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.44,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.413,
                  "published_sigma": 0.080,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "wigglez_z060_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.60,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.390,
                  "published_sigma": 0.063,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "wigglez_z073_fsigma8",
                  "survey_family": "WiggleZ",
                  "tracer_or_sample": "galaxy_rsd",
                  "z_eff": 0.73,
                  "observable_axis": "f_sigma8",
                  "published_value": 0.437,
                  "published_sigma": 0.072,
                  "evidence_status": "published_summary",
                  "bao_bundled": False,
                  "row_status": "value_ready_reference_needed",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "eboss_dr16_lrg_z070_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "LRG",
                  "z_eff": 0.70,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "eboss_dr16_elg_z085_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "ELG",
                  "z_eff": 0.85,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "pressure_score_allowed_now": False
              },
              {
                  "row_id": "eboss_dr16_qso_z148_fsigma8",
                  "survey_family": "eBOSS_DR16",
                  "tracer_or_sample": "QSO",
                  "z_eff": 1.48,
                  "observable_axis": "f_sigma8",
                  "published_value": "",
                  "published_sigma": "",
                  "evidence_status": "published_summary_pending_value_review",
                  "bao_bundled": True,
                  "row_status": "blocked_until_value_review",
                  "pressure_score_allowed_now": False
              }
          ]

          REFERENCE_REQUIREMENTS = [
              {
                  "requirement_id": "redshift_dependent_reference_curve",
                  "required": True,
                  "description": "f_sigma8 must be compared against f_sigma8_ref(z), not against one scalar Planck S8 value.",
                  "failure_mode": "Treating f_sigma8 as interchangeable with S8.",
                  "status": "required_before_pressure"
              },
              {
                  "requirement_id": "reference_model_declared",
                  "required": True,
                  "description": "The comparison must declare whether the reference is Planck 2018 flat LCDM, a published RSD baseline, or a computed LCDM curve.",
                  "failure_mode": "Using an unnamed baseline.",
                  "status": "required_before_pressure"
              },
              {
                  "requirement_id": "growth_factor_definition",
                  "required": True,
                  "description": "A computed reference must define growth factor D(z), growth rate f(z), and sigma8(z).",
                  "failure_mode": "Computing an RSD residual without defining the growth model.",
                  "status": "required_before_pressure"
              },
              {
                  "requirement_id": "covariance_boundary",
                  "required": True,
                  "description": "Rows from the same survey family may be correlated; first pass may be diagonal-only but must label that limitation.",
                  "failure_mode": "Pretending independent rows are full-covariance evidence.",
                  "status": "required_before_pressure"
              },
              {
                  "requirement_id": "bao_rsd_separation",
                  "required": True,
                  "description": "BOSS/eBOSS products may bundle BAO and RSD, but BAO remains boundary/ruler while f_sigma8 is growth.",
                  "failure_mode": "Collapsing BAO and RSD into one reach/growth signal.",
                  "status": "active_guard"
              },
              {
                  "requirement_id": "pending_value_block",
                  "required": True,
                  "description": "Rows missing published f_sigma8 value or sigma remain blocked until value review.",
                  "failure_mode": "Scoring pending eBOSS rows before values/covariance are reviewed.",
                  "status": "active_guard"
              },
              {
                  "requirement_id": "no_pressure_score_now",
                  "required": True,
                  "description": "v4.25 defines the boundary only; it does not compute pressure.",
                  "failure_mode": "Boundary probe becomes a pressure-score test.",
                  "status": "active_guard"
              }
          ]

          REFERENCE_OPTIONS = [
              {
                  "option_id": "published_reference_baseline",
                  "status": "allowed_future",
                  "description": "Use a published f_sigma8 baseline or table from a source product.",
                  "boundary": "Must cite/source the baseline and keep survey covariance limitations visible."
              },
              {
                  "option_id": "computed_lcdm_growth_curve",
                  "status": "allowed_future_after_definition",
                  "description": "Compute f_sigma8_ref(z) from a declared flat LCDM reference.",
                  "boundary": "Must define growth equations, parameters, normalization, and limitations."
              },
              {
                  "option_id": "single_planck_S8_scalar",
                  "status": "blocked",
                  "description": "Compare all RSD/f_sigma8 rows to Planck S8 as if they are the same observable.",
                  "boundary": "Blocked because f_sigma8 is redshift-dependent and not S8."
              },
              {
                  "option_id": "BAO_RSD_combined_average",
                  "status": "blocked",
                  "description": "Average BAO/ruler and RSD/growth into one combined pressure surface.",
                  "boundary": "Blocked because BAO is boundary/ruler and RSD is growth."
              },
              {
                  "option_id": "likelihood_refit_now",
                  "status": "blocked",
                  "description": "Run a new RSD likelihood or cosmological refit.",
                  "boundary": "Blocked in this pipeline stage."
              }
          ]

          COMPARISON_STAGE_LADDER = [
              {
                  "stage": 0,
                  "stage_name": "boundary_probe",
                  "allowed_now": True,
                  "description": "Define redshift-dependent reference requirements and block invalid comparisons.",
                  "pressure_score_allowed": False
              },
              {
                  "stage": 1,
                  "stage_name": "reference_curve_builder",
                  "allowed_now": False,
                  "description": "Build or import f_sigma8_ref(z) with declared model/source.",
                  "pressure_score_allowed": False
              },
              {
                  "stage": 2,
                  "stage_name": "non_final_residual_preview",
                  "allowed_now": False,
                  "description": "Compute observed minus reference residuals with diagonal-only warning.",
                  "pressure_score_allowed": "limited_preview_only"
              },
              {
                  "stage": 3,
                  "stage_name": "covariance_aware_pressure_test",
                  "allowed_now": False,
                  "description": "Use covariance-aware source-specific RSD comparison.",
                  "pressure_score_allowed": True
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A new RSD pressure score was computed.",
              "f_sigma8 and S8 are the same axis.",
              "RSD rows can be scored against one scalar Planck S8 value.",
              "BAO and RSD can be averaged into one reach/growth correction.",
              "Pending eBOSS rows can be scored before value review.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_26_RSD_reference_curve_builder",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Build or import a declared f_sigma8_ref(z) reference curve without computing final pressure.",
                  "must_include": "reference model, redshift-specific values, growth equation/source, limitations.",
                  "must_not_include": "validation claim, likelihood refit, pretending f_sigma8 equals S8."
              },
              {
                  "priority": 2,
                  "next_test": "v4_27_RSD_value_review_for_eBOSS_rows",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Repair pending eBOSS f_sigma8 values and uncertainties before scoring.",
                  "must_include": "source, tracer, redshift, value, sigma, covariance warning.",
                  "must_not_include": "unreviewed value insertion."
              },
              {
                  "priority": 3,
                  "next_test": "v4_28_cluster_mass_calibration_boundary_audit",
                  "role_focus": "cluster_abundance_growth",
                  "purpose": "Audit cluster abundance with mass calibration and selection boundaries.",
                  "must_include": "mass calibration, selection, source/product status, axis label.",
                  "must_not_include": "cluster proof claim."
              }
          ]

          failed_gates = []
          warnings = []

          value_ready_rows = []
          pending_rows = []
          bao_bundled_rows = []

          for row in RSD_ROWS:
              if row["observable_axis"] != "f_sigma8":
                  failed_gates.append(row["row_id"] + "_axis_not_f_sigma8")

              if row["z_eff"] in ["", None]:
                  failed_gates.append(row["row_id"] + "_missing_z_eff")

              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append(row["row_id"] + "_pressure_score_allowed_violation")

              if row["bao_bundled"] is True:
                  bao_bundled_rows.append(row)

              if row["published_value"] in ["", None] or row["published_sigma"] in ["", None]:
                  pending_rows.append(row)
                  if row["row_status"] != "blocked_until_value_review":
                      failed_gates.append(row["row_id"] + "_pending_value_not_blocked")
              else:
                  value_ready_rows.append(row)
                  if row["row_status"] != "value_ready_reference_needed":
                      failed_gates.append(row["row_id"] + "_value_ready_status_wrong")

          required_ids = {row["requirement_id"] for row in REFERENCE_REQUIREMENTS if row["required"]}
          needed_ids = {
              "redshift_dependent_reference_curve",
              "reference_model_declared",
              "growth_factor_definition",
              "covariance_boundary",
              "bao_rsd_separation",
              "pending_value_block",
              "no_pressure_score_now"
          }

          missing_required = sorted(needed_ids - required_ids)
          for item in missing_required:
              failed_gates.append("missing_requirement_" + item)

          blocked_options = {row["option_id"] for row in REFERENCE_OPTIONS if row["status"] == "blocked"}

          for blocked in ["single_planck_S8_scalar", "BAO_RSD_combined_average", "likelihood_refit_now"]:
              if blocked not in blocked_options:
                  failed_gates.append("blocked_option_missing_" + blocked)

          if len(value_ready_rows) < 3:
              warnings.append("few_value_ready_RSD_rows")

          if pending_rows:
              warnings.append("pending_RSD_rows_require_value_review")

          if bao_bundled_rows:
              warnings.append("BAO_RSD_separation_required_for_bundled_rows")

          warnings.append("RSD_reference_boundary_probe_is_not_pressure_score")
          warnings.append("f_sigma8_requires_redshift_dependent_reference_curve")
          warnings.append("covariance_boundary_required_before_any_strong_claim")

          requirement_results = []
          for req in REFERENCE_REQUIREMENTS:
              requirement_results.append({
                  "requirement_id": req["requirement_id"],
                  "pass": req["requirement_id"] in needed_ids,
                  "status": req["status"],
                  "description": req["description"],
                  "failure_mode": req["failure_mode"]
              })

          option_results = []
          for opt in REFERENCE_OPTIONS:
              option_results.append({
                  "option_id": opt["option_id"],
                  "status": opt["status"],
                  "allowed_now": opt["status"] == "allowed_future" and False,
                  "description": opt["description"],
                  "boundary": opt["boundary"]
              })

          all_requirements_present = not missing_required
          pressure_score_allowed_now = False

          if failed_gates:
              readiness_label = "rsd_reference_boundary_probe_failed"
              next_step = "Repair RSD reference requirements before building a reference curve."
          else:
              readiness_label = "rsd_reference_boundary_probe_passed_ready_for_RSD_reference_curve_builder"
              next_step = (
                  "Proceed to v4.26 RSD reference curve builder. "
                  "Do not compute final pressure yet; first build or import f_sigma8_ref(z) with declared model/source and limitations."
              )

          system_health = {
              "rsd_row_count": len(RSD_ROWS),
              "value_ready_row_count": len(value_ready_rows),
              "pending_row_count": len(pending_rows),
              "bao_bundled_row_count": len(bao_bundled_rows),
              "reference_requirement_count": len(REFERENCE_REQUIREMENTS),
              "all_requirements_present": all_requirements_present,
              "invalid_single_S8_reference_blocked": "single_planck_S8_scalar" in blocked_options,
              "BAO_RSD_combined_average_blocked": "BAO_RSD_combined_average" in blocked_options,
              "likelihood_refit_now_blocked": "likelihood_refit_now" in blocked_options,
              "pressure_score_allowed_now": pressure_score_allowed_now,
              "validation_claim_allowed": False
          }

          interpretation = (
              "v4.25 defines the reference boundary for RSD/f_sigma8. "
              "The key result is that f_sigma8 cannot be compared to a single Planck S8 scalar. "
              "A valid comparison requires f_sigma8_ref(z), a declared reference model or published baseline, covariance limitations, BAO/RSD separation, and blocked pending rows. "
              "No RSD pressure score is computed in this test."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "rsd_rows": RSD_ROWS,
              "reference_requirements": REFERENCE_REQUIREMENTS,
              "requirement_results": requirement_results,
              "reference_options": REFERENCE_OPTIONS,
              "option_results": option_results,
              "comparison_stage_ladder": COMPARISON_STAGE_LADDER,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_pressure_scores_built": False,
                  "likelihood_run": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "rsd_rows_v4_25.csv",
              RSD_ROWS,
              [
                  "row_id",
                  "survey_family",
                  "tracer_or_sample",
                  "z_eff",
                  "observable_axis",
                  "published_value",
                  "published_sigma",
                  "evidence_status",
                  "bao_bundled",
                  "row_status",
                  "pressure_score_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "reference_requirements_v4_25.csv",
              REFERENCE_REQUIREMENTS,
              ["requirement_id", "required", "description", "failure_mode", "status"]
          )

          write_csv(
              OUTDIR / "requirement_results_v4_25.csv",
              requirement_results,
              ["requirement_id", "pass", "status", "description", "failure_mode"]
          )

          write_csv(
              OUTDIR / "reference_options_v4_25.csv",
              REFERENCE_OPTIONS,
              ["option_id", "status", "description", "boundary"]
          )

          write_csv(
              OUTDIR / "comparison_stage_ladder_v4_25.csv",
              COMPARISON_STAGE_LADDER,
              ["stage", "stage_name", "allowed_now", "description", "pressure_score_allowed"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_25.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_25.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_25.csv",
              [system_health],
              [
                  "rsd_row_count",
                  "value_ready_row_count",
                  "pending_row_count",
                  "bao_bundled_row_count",
                  "reference_requirement_count",
                  "all_requirements_present",
                  "invalid_single_S8_reference_blocked",
                  "BAO_RSD_combined_average_blocked",
                  "likelihood_refit_now_blocked",
                  "pressure_score_allowed_now",
                  "validation_claim_allowed"
              ]
          )

          json_path = OUTDIR / "tairid_v4_25_rsd_reference_boundary_probe.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.25 — RSD Reference Boundary Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("RSD/f_sigma8 can move forward only through a redshift-dependent reference curve or published baseline.")
          md.append("")
          md.append("It cannot be compared to one scalar Planck S8 value, and no pressure score is computed here.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Reference requirements")
          md.append("")
          md.append("| Requirement | Required | Status | Failure mode |")
          md.append("|---|---:|---|---|")
          for row in REFERENCE_REQUIREMENTS:
              md.append(
                  f"| `{row['requirement_id']}` | `{row['required']}` | `{row['status']}` | {row['failure_mode']} |"
              )
          md.append("")
          md.append("## Reference options")
          md.append("")
          md.append("| Option | Status | Boundary |")
          md.append("|---|---|---|")
          for row in REFERENCE_OPTIONS:
              md.append(f"| `{row['option_id']}` | `{row['status']}` | {row['boundary']} |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `rsd_rows_v4_25.csv`")
          md.append("- `reference_requirements_v4_25.csv`")
          md.append("- `requirement_results_v4_25.csv`")
          md.append("- `reference_options_v4_25.csv`")
          md.append("- `comparison_stage_ladder_v4_25.csv`")
          md.append("- `blocked_claims_v4_25.csv`")
          md.append("- `next_test_ladder_v4_25.csv`")
          md.append("- `system_health_v4_25.csv`")
          md.append("- `tairid_v4_25_rsd_reference_boundary_probe.json`")
          md.append("- `tairid_v4_25_rsd_reference_boundary_probe.md`")
          md.append("")

          md_path = OUTDIR / "tairid_v4_25_rsd_reference_boundary_probe.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.25 RSD reference boundary probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-25-rsd-reference-boundary-probe
          path: artifacts/tairid_v4_25_rsd_reference_boundary_probe/
