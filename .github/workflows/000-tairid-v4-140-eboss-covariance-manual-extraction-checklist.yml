name: 000 TAIRID v4.140 eBOSS Covariance Manual Extraction Checklist

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-140-eboss-covariance-manual-extraction-checklist.yml"

jobs:
  tairid-v4-140-eboss-covariance-manual-extraction-checklist:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.140 eBOSS covariance manual extraction checklist
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_140_eboss_covariance_manual_extraction_checklist

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_140_eboss_covariance_manual_extraction_checklist")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_140_eboss_covariance_manual_extraction_checklist"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not recompute eBOSS pressure.",
              "This creates a manual extraction checklist for eBOSS covariance, likelihood, overlap, value-table, and reference-support review.",
              "A pass means the next human/manual covariance extraction work is organized; it does not mean covariance has been extracted or ingested."
          ]

          UPSTREAM_LOCKS = {
              "v4_139_LCDM_reference_sensitivity_audit": {
                  "readiness_label": "LCDM_reference_sensitivity_audit_passed_sign_pattern_stable_pressure_magnitude_sensitive_ready_for_eBOSS_covariance_manual_extraction_checklist",
                  "scenario_count": 9,
                  "lane_record_count": 63,
                  "sign_pattern_stable": True,
                  "pressure_magnitude_sensitive": True,
                  "family_pressure_threshold_sensitive": True,
                  "qso_pressure_threshold_sensitive": True,
                  "ELG_negative_all_scenarios": True,
                  "QSO_positive_all_scenarios": True,
                  "without_ELG_positive_all_scenarios": True,
                  "without_QSO_neutral_or_negative_all_scenarios": True,
                  "family_pressure_min": -1.2582597222174072,
                  "family_pressure_max": 0.0,
                  "single_QSO_pressure_min": 0.0,
                  "single_QSO_pressure_max": 1.273586334339154,
                  "observed_covariance_ingested": False,
                  "full_posterior_covariance_available": False,
                  "CAMB_run": False,
                  "full_planck_chains_imported": False,
                  "full_planck_chain_sample_files_parsed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_134_eBOSS_covariance_locator_probe": {
                  "readiness_label": "eBOSS_covariance_locator_probe_passed_locator_status_recorded_covariance_not_ingested_ready_for_reference_upgrade_design",
                  "locator_target_count": 8,
                  "fetch_record_count": 8,
                  "fetched_count": 8,
                  "status_record_count": 8,
                  "all_targets_have_status": True,
                  "covariance_hint_count": 3,
                  "likelihood_hint_count": 0,
                  "matrix_or_file_hint_count": 2,
                  "manual_needed_count": 0,
                  "covariance_ingested": False,
                  "usable_covariance_locked": False,
                  "same_program_covariance_still_limited": True,
                  "reference_fallback_still_active": True,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          MANUAL_EXTRACTION_TARGETS = [
              {
                  "target_id": "official_SDSS_DR16_eBOSS_LSS_docs",
                  "source_family": "SDSS_DR16_eBOSS",
                  "priority": 1,
                  "what_to_open": "Official SDSS DR16 eBOSS LSS documentation and SAS directory tree.",
                  "what_to_extract": "Direct links or paths to LRG, ELG, QSO catalog products, mocks, likelihoods, covariance files, and consensus files.",
                  "success_condition": "A stable SDSS/SAS path or official documentation path is recorded for each relevant product.",
                  "failure_action": "Mark manual follow-up required; do not claim covariance ingestion."
              },
              {
                  "target_id": "eBOSS_consensus_cosmology_likelihood",
                  "source_family": "eBOSS_consensus",
                  "priority": 2,
                  "what_to_open": "eBOSS DR16 consensus cosmological parameters paper and ancillary files.",
                  "what_to_extract": "Consensus covariance matrix, likelihood package, BAO/RSD parameter vector, tracer overlap notes, and any combined-cosmology data products.",
                  "success_condition": "A usable covariance or likelihood package path is identified and its variables are mapped.",
                  "failure_action": "Keep covariance status as hint-only and continue manual search."
              },
              {
                  "target_id": "eBOSS_LRG_value_and_covariance",
                  "source_family": "eBOSS_LRG",
                  "priority": 3,
                  "what_to_open": "eBOSS DR16 LRG clustering/RSD source paper and linked data products.",
                  "what_to_extract": "Effective redshift, fσ8 value, uncertainty, AP/BAO parameters if coupled, covariance matrix, and tracer sample definition.",
                  "success_condition": "LRG value and uncertainty are source-locked and covariance/likelihood status is declared.",
                  "failure_action": "Keep LRG source status as locator-only."
              },
              {
                  "target_id": "eBOSS_ELG_value_and_covariance",
                  "source_family": "eBOSS_ELG",
                  "priority": 4,
                  "what_to_open": "eBOSS DR16 ELG clustering/RSD source paper and linked data products.",
                  "what_to_extract": "Effective redshift, fσ8 value, uncertainty, AP/BAO parameters if coupled, covariance matrix, and tracer sample definition.",
                  "success_condition": "ELG value and uncertainty are source-locked and covariance/likelihood status is declared.",
                  "failure_action": "Keep ELG as the strongest negative diagnostic component but not final."
              },
              {
                  "target_id": "eBOSS_QSO_value_and_covariance",
                  "source_family": "eBOSS_QSO",
                  "priority": 5,
                  "what_to_open": "eBOSS DR16 QSO clustering/RSD source paper and linked data products.",
                  "what_to_extract": "Effective redshift, fσ8 value, uncertainty, AP/BAO parameters if coupled, covariance matrix, and tracer sample definition.",
                  "success_condition": "QSO value and uncertainty are source-locked and covariance/likelihood status is declared.",
                  "failure_action": "Keep QSO as the positive diagnostic component but not final."
              },
              {
                  "target_id": "cross_tracer_overlap_or_independence_notes",
                  "source_family": "eBOSS_family",
                  "priority": 6,
                  "what_to_open": "DR16 papers, consensus products, mock documentation, and survey overlap notes.",
                  "what_to_extract": "Whether LRG, ELG, and QSO results can be treated independently, partially overlapping, or require a combined covariance.",
                  "success_condition": "An overlap/correlation treatment is documented with source support.",
                  "failure_action": "Do not merge eBOSS family into a primary final bridge."
              },
              {
                  "target_id": "covariance_file_format_mapping",
                  "source_family": "eBOSS_family",
                  "priority": 7,
                  "what_to_open": "Any identified covariance, likelihood, mock, or consensus data files.",
                  "what_to_extract": "File format, parameter order, dimensions, redshift mapping, units, and whether fσ8 is directly represented.",
                  "success_condition": "A machine-ingestion map can be written in the next workflow.",
                  "failure_action": "Create a manual extraction note instead of ingestion code."
              },
              {
                  "target_id": "reference_side_next_boundary",
                  "source_family": "reference_support",
                  "priority": 8,
                  "what_to_open": "v4.137 and v4.139 artifacts.",
                  "what_to_extract": "Which eBOSS sign features are stable and which pressure magnitudes are parameter-sensitive.",
                  "success_condition": "The covariance extraction notes preserve the boundary that sign is more stable than pressure magnitude.",
                  "failure_action": "Do not interpret any eBOSS pressure as final."
              }
          ]

          EXTRACTION_FIELDS = [
              {
                  "field_id": "source_url_or_path",
                  "required": True,
                  "description": "Stable URL, DOI, arXiv ID, SDSS SAS path, or repository path."
              },
              {
                  "field_id": "paper_or_product_title",
                  "required": True,
                  "description": "Human-readable title of the paper/product being used."
              },
              {
                  "field_id": "tracer_or_family",
                  "required": True,
                  "description": "LRG, ELG, QSO, combined eBOSS, or cross-tracer family."
              },
              {
                  "field_id": "effective_redshift",
                  "required": True,
                  "description": "The redshift for the value or covariance block."
              },
              {
                  "field_id": "observables_vector",
                  "required": True,
                  "description": "Parameter vector order, such as fσ8, DV/rd, DM/rd, DH/rd, F_AP, BAO/RSD variables, or consensus parameters."
              },
              {
                  "field_id": "fsigma8_value_and_uncertainty",
                  "required": True,
                  "description": "Value and uncertainty, if directly reported."
              },
              {
                  "field_id": "covariance_matrix_path_or_status",
                  "required": True,
                  "description": "Path to covariance or explicit status: found, hint-only, unavailable, or manual-needed."
              },
              {
                  "field_id": "covariance_dimension_and_order",
                  "required": True,
                  "description": "Dimension and parameter ordering if a covariance matrix is found."
              },
              {
                  "field_id": "likelihood_package_path_or_status",
                  "required": True,
                  "description": "Path to likelihood package or explicit status."
              },
              {
                  "field_id": "overlap_or_independence_note",
                  "required": True,
                  "description": "Source-backed note on whether tracers are independent, correlated, or combined."
              },
              {
                  "field_id": "ingestion_ready",
                  "required": True,
                  "description": "true only if the next workflow can parse the covariance/likelihood without guessing."
              },
              {
                  "field_id": "claim_boundary",
                  "required": True,
                  "description": "The extraction status must block final interpretation unless covariance is actually ingested and checked."
              }
          ]

          CHECKLIST_STEPS = [
              {
                  "step_id": "step_01_open_official_SDSS_DR16_LSS_docs",
                  "priority": 1,
                  "action": "Open official SDSS DR16 eBOSS LSS documentation and record all product-directory links.",
                  "output_needed": "official_lss_doc_paths"
              },
              {
                  "step_id": "step_02_find_consensus_likelihood_or_covariance",
                  "priority": 2,
                  "action": "Look for eBOSS DR16 consensus likelihood/covariance/parameter-vector products.",
                  "output_needed": "consensus_covariance_or_likelihood_status"
              },
              {
                  "step_id": "step_03_confirm_LRG_value_source",
                  "priority": 3,
                  "action": "Confirm LRG z≈0.698 fσ8 value, uncertainty, and observable definition from the source paper/product.",
                  "output_needed": "LRG_value_source_record"
              },
              {
                  "step_id": "step_04_confirm_ELG_value_source",
                  "priority": 4,
                  "action": "Confirm ELG z≈0.85 fσ8 value, uncertainty, and observable definition from the source paper/product.",
                  "output_needed": "ELG_value_source_record"
              },
              {
                  "step_id": "step_05_confirm_QSO_value_source",
                  "priority": 5,
                  "action": "Confirm QSO z≈1.48 fσ8 value, uncertainty, and observable definition from the source paper/product.",
                  "output_needed": "QSO_value_source_record"
              },
              {
                  "step_id": "step_06_check_cross_tracer_correlation",
                  "priority": 6,
                  "action": "Determine whether LRG, ELG, and QSO may be treated as independent, correlated, or only through a combined product.",
                  "output_needed": "cross_tracer_overlap_record"
              },
              {
                  "step_id": "step_07_map_covariance_file_format",
                  "priority": 7,
                  "action": "If a covariance or likelihood file is found, map its dimension, variable order, units, and parse path.",
                  "output_needed": "covariance_ingestion_map"
              },
              {
                  "step_id": "step_08_write_next_ingestion_or_manual_status",
                  "priority": 8,
                  "action": "Decide whether the next workflow can ingest covariance or must remain manual/hint-only.",
                  "output_needed": "next_workflow_decision"
              }
          ]

          STATUS_DECISION_RULES = [
              {
                  "status": "ingestion_ready",
                  "allowed_when": "A concrete covariance or likelihood file path exists, variable order is known, dimensions are known, and tracer mapping is known.",
                  "next_action": "Build covariance ingestion probe."
              },
              {
                  "status": "source_locked_covariance_not_found",
                  "allowed_when": "Value/source paper is confirmed but covariance or likelihood file is not found.",
                  "next_action": "Keep diagonal sensitivity treatment and document the limitation."
              },
              {
                  "status": "hint_only",
                  "allowed_when": "A page mentions covariance, mocks, or likelihood but no usable matrix/package is mapped.",
                  "next_action": "Manual follow-up before ingestion."
              },
              {
                  "status": "manual_needed",
                  "allowed_when": "The product cannot be confirmed from current locator/status records.",
                  "next_action": "Record exact missing item and continue manual search."
              },
              {
                  "status": "do_not_use",
                  "allowed_when": "Product is unrelated, obsolete, incompatible, or lacks enough metadata to map variables safely.",
                  "next_action": "Exclude from eBOSS rerun."
              }
          ]

          MANUAL_TEMPLATE_ROWS = []
          for target in MANUAL_EXTRACTION_TARGETS:
              MANUAL_TEMPLATE_ROWS.append({
                  "target_id": target["target_id"],
                  "source_family": target["source_family"],
                  "priority": target["priority"],
                  "source_url_or_path": "",
                  "paper_or_product_title": "",
                  "tracer_or_family": target["source_family"],
                  "effective_redshift": "",
                  "observables_vector": "",
                  "fsigma8_value_and_uncertainty": "",
                  "covariance_matrix_path_or_status": "",
                  "covariance_dimension_and_order": "",
                  "likelihood_package_path_or_status": "",
                  "overlap_or_independence_note": "",
                  "ingestion_ready": "false",
                  "manual_notes": target["what_to_extract"],
                  "claim_boundary": "not_extracted_not_ingested_not_final"
              })

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_141_eBOSS_covariance_ingestion_or_manual_status_probe",
                  "purpose": "Use the completed checklist status to decide whether covariance can be ingested or must remain manual/hint-only.",
                  "why_next": "v4.140 is a checklist; the next workflow should consume the filled status."
              },
              {
                  "priority": 2,
                  "route_id": "v4_142_CAMB_install_or_stored_chain_probe",
                  "purpose": "Try a bounded CAMB/stored-chain feasibility route if runtime support becomes available.",
                  "why_next": "Reference-side support remains approximate."
              },
              {
                  "priority": 3,
                  "route_id": "v4_143_external_standard_cosmology_comparison_plan",
                  "purpose": "Prepare cautious comparison language against normal ΛCDM/eBOSS growth work.",
                  "why_next": "The pattern is interesting but still limitation-bound."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "CAMB was run.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The eBOSS covariance manual extraction checklist validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "A checklist is the same as covariance ingestion.",
              "A filled source URL is enough to claim covariance.",
              "The eBOSS sign pattern is a final physical conclusion.",
              "Same-program eBOSS covariance is resolved.",
              "Observed covariance review is no longer needed."
          ]

          failed_gates = []
          warnings = [
              "manual_checklist_only",
              "covariance_not_ingested",
              "pressure_not_recomputed",
              "same_program_eBOSS_covariance_still_limited",
              "sign_stable_but_pressure_magnitude_sensitive",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_139_LCDM_reference_sensitivity_audit"]

          if upstream["sign_pattern_stable"] is not True:
              failed_gates.append("upstream_sign_pattern_not_stable")

          if upstream["pressure_magnitude_sensitive"] is not True:
              failed_gates.append("upstream_pressure_magnitude_sensitivity_not_carried")

          if upstream["observed_covariance_ingested"] is not False:
              failed_gates.append("upstream_observed_covariance_unexpectedly_ingested")

          if len(MANUAL_EXTRACTION_TARGETS) < 8:
              failed_gates.append("manual_extraction_targets_incomplete")

          if len(EXTRACTION_FIELDS) < 12:
              failed_gates.append("extraction_fields_incomplete")

          if len(CHECKLIST_STEPS) < 8:
              failed_gates.append("checklist_steps_incomplete")

          if len(STATUS_DECISION_RULES) < 5:
              failed_gates.append("status_decision_rules_incomplete")

          if len(MANUAL_TEMPLATE_ROWS) != len(MANUAL_EXTRACTION_TARGETS):
              failed_gates.append("manual_template_row_count_mismatch")

          covariance_ingested = False
          pressure_recomputed = False
          final_pressure_ready = False

          if covariance_ingested:
              failed_gates.append("covariance_unexpectedly_ingested")

          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "camb was run",
              "final rsd pressure score",
              "validates tairid cosmology",
              "checklist is the same as covariance ingestion",
              "same-program eboss covariance is resolved",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "eBOSS_covariance_manual_extraction_checklist_passed_ready_for_covariance_ingestion_or_manual_status_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_sensitivity_boundary_carried",
                  "pass": upstream["sign_pattern_stable"] is True and upstream["pressure_magnitude_sensitive"] is True,
                  "result": "v4.139 sign-stable / pressure-sensitive boundary carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "manual_targets_declared",
                  "pass": len(MANUAL_EXTRACTION_TARGETS) >= 8,
                  "result": f"manual_target_count={len(MANUAL_EXTRACTION_TARGETS)}",
                  "boundary": "Checklist only."
              },
              {
                  "rule_id": "extraction_fields_declared",
                  "pass": len(EXTRACTION_FIELDS) >= 12,
                  "result": f"field_count={len(EXTRACTION_FIELDS)}",
                  "boundary": "No extraction performed."
              },
              {
                  "rule_id": "checklist_steps_declared",
                  "pass": len(CHECKLIST_STEPS) >= 8,
                  "result": f"step_count={len(CHECKLIST_STEPS)}",
                  "boundary": "Manual workflow guidance only."
              },
              {
                  "rule_id": "status_decision_rules_declared",
                  "pass": len(STATUS_DECISION_RULES) >= 5,
                  "result": f"decision_rule_count={len(STATUS_DECISION_RULES)}",
                  "boundary": "No covariance ingestion."
              },
              {
                  "rule_id": "manual_template_rows_built",
                  "pass": len(MANUAL_TEMPLATE_ROWS) == len(MANUAL_EXTRACTION_TARGETS),
                  "result": f"template_rows={len(MANUAL_TEMPLATE_ROWS)}",
                  "boundary": "Blank template for manual fill-in."
              },
              {
                  "rule_id": "covariance_and_pressure_not_computed",
                  "pass": covariance_ingested is False and pressure_recomputed is False,
                  "result": "covariance not ingested and pressure not recomputed",
                  "boundary": "Checklist cannot become final result."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_140_rules_passed")

          if failed_gates:
              readiness_label = "eBOSS_covariance_manual_extraction_checklist_failed"
              next_allowed_step = "Repair checklist before covariance ingestion/manual status probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.141 eBOSS covariance ingestion or manual status probe after manual status is filled. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "manual_target_count": len(MANUAL_EXTRACTION_TARGETS),
              "extraction_field_count": len(EXTRACTION_FIELDS),
              "checklist_step_count": len(CHECKLIST_STEPS),
              "status_decision_rule_count": len(STATUS_DECISION_RULES),
              "manual_template_row_count": len(MANUAL_TEMPLATE_ROWS),
              "upstream_sign_pattern_stable": upstream["sign_pattern_stable"],
              "upstream_pressure_magnitude_sensitive": upstream["pressure_magnitude_sensitive"],
              "covariance_ingested": covariance_ingested,
              "pressure_recomputed": pressure_recomputed,
              "same_program_eBOSS_covariance_still_limited": True,
              "observed_covariance_review_still_needed": True,
              "CAMB_run": False,
              "full_planck_chains_imported": False,
              "full_planck_chain_sample_files_parsed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "manual_extraction_targets": MANUAL_EXTRACTION_TARGETS,
              "extraction_fields": EXTRACTION_FIELDS,
              "checklist_steps": CHECKLIST_STEPS,
              "status_decision_rules": STATUS_DECISION_RULES,
              "manual_template_rows": MANUAL_TEMPLATE_ROWS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_140_eboss_covariance_manual_extraction_checklist.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "manual_extraction_targets_v4_140.csv",
              MANUAL_EXTRACTION_TARGETS,
              ["target_id", "source_family", "priority", "what_to_open", "what_to_extract", "success_condition", "failure_action"]
          )

          write_csv(
              OUTDIR / "extraction_fields_v4_140.csv",
              EXTRACTION_FIELDS,
