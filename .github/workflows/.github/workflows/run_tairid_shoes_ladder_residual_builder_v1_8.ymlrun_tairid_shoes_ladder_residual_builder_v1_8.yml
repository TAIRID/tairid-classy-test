name: Run TAIRID SH0ES Ladder Residual Builder v1.8

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-ladder-residual-builder-v1-8:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_ladder_residual_builder_v1_8.py
          echo "v1.8 SH0ES ladder residual builder found."

      - name: Run TAIRID SH0ES Ladder Residual Builder v1.8
        run: |
          python run_tairid_shoes_ladder_residual_builder_v1_8.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-ladder-residual-builder-v1-8-output
          path: |
            tairid_shoes_ladder_residual_builder_v1_8_outputs/**
