name: 000 TAIRID v4.158 — Reference Generation Route Feasibility and Package Schema With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/000-tairid-v4-158-reference-generation-route-feasibility-and-package-schema-with-scope-guards.yml'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  reference_generation_route_feasibility_and_package_schema:
    name: Reference generation route feasibility and package schema
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Write v4.158 reference-package templates and guarded feasibility reports
        run: |
          python - <<'PY'
          import csv
          import hashlib
          import importlib.util
          import json
          import os
          import platform
          import subprocess
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          VERSION = "v4.158"
          TITLE = "TAIRID v4.158 — Reference Generation Route Feasibility and Package Schema With Scope Guards"
          EXPECTED_RESULT = "reference_generation_route_feasibility_and_package_schema_passed_templates_written_no_ingestion_no_pressure_no_validation"
          CREATED_UTC = datetime.now(timezone.utc).isoformat()

          ROOT = Path.cwd()
          OUT = ROOT / "tairid_v4_158_reference_generation_route_feasibility_and_package_schema_with_scope_guards"
          OUT.mkdir(parents=True, exist_ok=True)

          OBSERVED_ORDER = [
              {"index": 1, "name": "DM_ov_rd_z0p70", "z": 0.700, "component": "DM/rd", "component_family": "geometry", "unit_or_quantity": "dimensionless ratio", "required_reference_value": "FILL_ME", "required_reference_sigma": "FILL_ME", "notes": "Limited LRGxELG reference mean slot; no value generated here."},
              {"index": 2, "name": "DH_ov_rd_z0p70", "z": 0.700, "component": "DH/rd", "component_family": "geometry", "unit_or_quantity": "dimensionless ratio", "required_reference_value": "FILL_ME", "required_reference_sigma": "FILL_ME", "notes": "Limited LRGxELG reference mean slot; no value generated here."},
              {"index": 3, "name": "fsigma8_z0p70", "z": 0.700, "component": "fσ8", "component_family": "growth", "unit_or_quantity": "dimensionless growth statistic", "required_reference_value": "FILL_ME", "required_reference_sigma": "FILL_ME", "notes": "Limited LRGxELG reference mean slot; no value generated here."},
              {"index": 4, "name": "DM_ov_rd_z0p845", "z": 0.845, "component": "DM/rd", "component_family": "geometry", "unit_or_quantity": "dimensionless ratio", "required_reference_value": "FILL_ME", "required_reference_sigma": "FILL_ME", "notes": "Limited LRGxELG reference mean slot; no value generated here."},
              {"index": 5, "name": "DH_ov_rd_z0p845", "z": 0.845, "component": "DH/rd", "component_family": "geometry", "unit_or_quantity": "dimensionless ratio", "required_reference_value": "FILL_ME", "required_reference_sigma": "FILL_ME", "notes": "Limited LRGxELG reference mean slot; no value generated here."},
              {"index": 6, "name": "fsigma8_z0p845", "z": 0.845, "component": "fσ8", "component_family": "growth", "unit_or_quantity": "dimensionless growth statistic", "required_reference_value": "FILL_ME", "required_reference_sigma": "FILL_ME", "notes": "Limited LRGxELG reference mean slot; no value generated here."},
          ]

          REQUIRED_DEPENDENCIES = [
              {"dependency": "limited_lrgxelg_reference_mean_vector", "status": "missing_template_written", "minimum_needed": "six ordered reference values matching the limited observed order", "claim_boundary": "required_before_any_limited_residual_or_pressure"},
              {"dependency": "limited_lrgxelg_reference_covariance_or_parameter_samples", "status": "missing_template_written", "minimum_needed": "6x6 covariance for reference uncertainty or samples sufficient to estimate it", "claim_boundary": "required_before_any_limited_residual_or_pressure"},
              {"dependency": "expanded_12_redshift_growth_reference_vector", "status": "still_missing", "minimum_needed": "reference means for expanded growth redshift targets", "claim_boundary": "required_before_main_growth_pressure"},
              {"dependency": "expanded_12_redshift_reference_covariance_or_samples", "status": "still_missing", "minimum_needed": "reference covariance or parameter samples for expanded growth lane", "claim_boundary": "required_before_main_growth_pressure"},
              {"dependency": "qso_covariance_or_likelihood", "status": "still_missing", "minimum_needed": "QSO covariance/likelihood/provenance", "claim_boundary": "required_before_full_eboss_family_claims"},
              {"dependency": "full_eboss_family_covariance_or_overlap_model", "status": "still_missing", "minimum_needed": "cross-tracer overlap/covariance model for LRG, ELG, QSO family", "claim_boundary": "required_before_full_eboss_family_claims"},
              {"dependency": "final_pressure_methodology_spec", "status": "still_missing", "minimum_needed": "pre-registered residual/pressure/threshold method", "claim_boundary": "required_before_interpretive_pressure_claims"},
          ]

          CLAIM_BLOCKS = [
              {"claim": "final_pressure_computed", "allowed": False, "reason": "v4.158 only writes templates and feasibility reports."},
              {"claim": "residuals_computed", "allowed": False, "reason": "No reference mean vector is ingested or generated."},
              {"claim": "likelihood_or_BIC_computed", "allowed": False, "reason": "No likelihood, posterior, model comparison, or BIC route is run."},
              {"claim": "posterior_comparison_computed", "allowed": False, "reason": "No posterior samples are ingested or compared."},
              {"claim": "qso_covariance_available", "allowed": False, "reason": "This workflow does not locate or ingest QSO covariance."},
              {"claim": "full_eboss_family_covariance_available", "allowed": False, "reason": "This workflow does not solve cross-tracer overlap or full-family covariance."},
              {"claim": "tairid_validated", "allowed": False, "reason": "Template creation and route feasibility are not scientific validation."},
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def write_json(path, obj):
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(obj, f, indent=2, sort_keys=True)
                  f.write("\n")

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          # 1) Required reference mean vector template.
          mean_fields = ["index", "name", "z", "component", "component_family", "unit_or_quantity", "required_reference_value", "required_reference_sigma", "notes"]
          mean_path = OUT / "limited_lrgxelg_reference_mean_vector_template_v4_158.csv"
          write_csv(mean_path, OBSERVED_ORDER, mean_fields)

          # 2) 6x6 covariance matrix template.
          names = [r["name"] for r in OBSERVED_ORDER]
          cov_matrix_path = OUT / "limited_lrgxelg_reference_covariance_matrix_template_v4_158.csv"
          with open(cov_matrix_path, "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["variable"] + names)
              for row_name in names:
                  writer.writerow([row_name] + ["FILL_ME" for _ in names])

          # 3) Long-form covariance template.
          long_rows = []
          for i, row_name in enumerate(names, start=1):
              for j, col_name in enumerate(names, start=1):
                  long_rows.append({
                      "row_index": i,
                      "col_index": j,
                      "row_variable": row_name,
                      "col_variable": col_name,
                      "reference_covariance_value": "FILL_ME",
                      "required_symmetry_check": "FILL_ME",
                      "notes": "Manual/reference-generated covariance slot; no value generated here.",
                  })
          cov_long_path = OUT / "limited_lrgxelg_reference_covariance_long_template_v4_158.csv"
          write_csv(cov_long_path, long_rows, ["row_index", "col_index", "row_variable", "col_variable", "reference_covariance_value", "required_symmetry_check", "notes"])

          # 4) Optional correlation template.
          corr_matrix_path = OUT / "limited_lrgxelg_reference_correlation_matrix_template_optional_v4_158.csv"
          with open(corr_matrix_path, "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["variable"] + names)
              for row_name in names:
                  writer.writerow([row_name] + ["FILL_ME_OPTIONAL" for _ in names])

          # 5) Optional parameter-sample route template.
          sample_fields = [
              "sample_id",
              "source_model_or_chain",
              "H0",
              "Omega_m",
              "Omega_b",
              "sigma8",
              "ns",
              "rd",
              "DM_ov_rd_z0p70",
              "DH_ov_rd_z0p70",
              "fsigma8_z0p70",
              "DM_ov_rd_z0p845",
              "DH_ov_rd_z0p845",
              "fsigma8_z0p845",
              "sample_weight",
              "notes",
          ]
          sample_path = OUT / "limited_lrgxelg_reference_parameter_samples_template_v4_158.csv"
          sample_rows = [{field: "FILL_ME" for field in sample_fields}]
          sample_rows[0]["notes"] = "Optional route only. This workflow does not ingest or generate parameter samples."
          write_csv(sample_path, sample_rows, sample_fields)

          dependency_path = OUT / "reference_dependency_ledger_v4_158.csv"
          write_csv(dependency_path, REQUIRED_DEPENDENCIES, ["dependency", "status", "minimum_needed", "claim_boundary"])

          blocked_path = OUT / "blocked_claims_report_v4_158.csv"
          write_csv(blocked_path, CLAIM_BLOCKS, ["claim", "allowed", "reason"])

          scope_guard_rows = [
              {"guard": "no_scientific_values_ingested", "pass": True, "details": "Only FILL_ME templates and environment reports are written."},
              {"guard": "no_reference_vector_generated", "pass": True, "details": "No CAMB/CLASS run is used to produce reference values."},
              {"guard": "no_reference_covariance_generated", "pass": True, "details": "No covariance estimate is produced from values or samples."},
              {"guard": "no_pressure_or_residuals", "pass": True, "details": "No observed-reference comparison is performed."},
              {"guard": "no_model_comparison", "pass": True, "details": "No likelihood, BIC, posterior comparison, or validation metric is run."},
              {"guard": "no_qso_or_full_eboss_claim", "pass": True, "details": "QSO and full-family covariance remain missing blockers."},
          ]
          scope_path = OUT / "scope_guard_report_v4_158.csv"
          write_csv(scope_path, scope_guard_rows, ["guard", "pass", "details"])

          def module_available(module_name):
              return importlib.util.find_spec(module_name) is not None

          # Best-effort software route feasibility check. Import availability is not data.
          software_rows = []
          for module_name in ["camb", "classy", "numpy", "scipy", "astropy"]:
              before = module_available(module_name)
              attempted_install = False
              install_returncode = None
              after = before
              install_note = "not_attempted"
              if module_name in ["camb", "classy"] and not before:
                  attempted_install = True
                  install_note = "best_effort_pip_install_attempted"
                  try:
                      proc = subprocess.run(
                          [sys.executable, "-m", "pip", "install", module_name],
                          stdout=subprocess.PIPE,
                          stderr=subprocess.STDOUT,
                          text=True,
                          timeout=240,
                          check=False,
                      )
                      install_returncode = proc.returncode
                      (OUT / f"pip_install_{module_name}_log_v4_158.txt").write_text(proc.stdout[-12000:], encoding="utf-8")
                  except Exception as exc:
                      install_returncode = "exception"
                      install_note = f"best_effort_install_exception: {type(exc).__name__}: {exc}"
              after = module_available(module_name)
              software_rows.append({
                  "module": module_name,
                  "available_before_best_effort_install": before,
                  "best_effort_install_attempted": attempted_install,
                  "install_returncode": install_returncode,
                  "available_after_best_effort_install": after,
                  "claim_boundary": "software_import_availability_only_not_reference_data",
                  "note": install_note,
              })
          software_path = OUT / "software_route_feasibility_report_v4_158.csv"
          write_csv(software_path, software_rows, ["module", "available_before_best_effort_install", "best_effort_install_attempted", "install_returncode", "available_after_best_effort_install", "claim_boundary", "note"])

          camb_available = next(r for r in software_rows if r["module"] == "camb")["available_after_best_effort_install"]
          classy_available = next(r for r in software_rows if r["module"] == "classy")["available_after_best_effort_install"]

          rule_rows = [
              {"rule": "six_reference_slots_templated", "pass": len(OBSERVED_ORDER) == 6, "details": "Six limited LRGxELG slots are present."},
              {"rule": "observed_order_names_preserved", "pass": names == ["DM_ov_rd_z0p70", "DH_ov_rd_z0p70", "fsigma8_z0p70", "DM_ov_rd_z0p845", "DH_ov_rd_z0p845", "fsigma8_z0p845"], "details": ",".join(names)},
              {"rule": "mean_vector_template_written", "pass": mean_path.exists(), "details": str(mean_path.name)},
              {"rule": "covariance_matrix_template_written", "pass": cov_matrix_path.exists(), "details": str(cov_matrix_path.name)},
              {"rule": "covariance_long_template_has_36_slots", "pass": len(long_rows) == 36, "details": str(len(long_rows))},
              {"rule": "optional_correlation_template_written", "pass": corr_matrix_path.exists(), "details": str(corr_matrix_path.name)},
              {"rule": "optional_parameter_samples_template_written", "pass": sample_path.exists(), "details": str(sample_path.name)},
              {"rule": "dependency_ledger_written", "pass": dependency_path.exists() and len(REQUIRED_DEPENDENCIES) == 7, "details": "Seven dependency blockers recorded."},
              {"rule": "blocked_claims_written", "pass": blocked_path.exists() and all(not c["allowed"] for c in CLAIM_BLOCKS), "details": "All forbidden claims remain blocked."},
              {"rule": "scope_guards_written", "pass": scope_path.exists() and all(bool(r["pass"]) for r in scope_guard_rows), "details": "All scope guards pass."},
              {"rule": "software_route_report_written", "pass": software_path.exists(), "details": "Import feasibility report written."},
              {"rule": "no_scientific_values_ingested", "pass": True, "details": "Templates contain placeholders only."},
              {"rule": "no_reference_vector_generated", "pass": True, "details": "No reference means were generated."},
              {"rule": "no_reference_covariance_generated", "pass": True, "details": "No covariance was generated."},
              {"rule": "no_pressure_computed", "pass": True, "details": "No observed-reference pressure or residual calculation exists in this workflow."},
          ]
          failed_gates = [r["rule"] for r in rule_rows if not bool(r["pass"])]
          pass_count = sum(1 for r in rule_rows if bool(r["pass"]))
          selected_next_route = "manual_reference_package_triage_or_camb_class_limited_reference_vector_prototype_with_scope_guards"

          rule_path = OUT / "rule_gate_report_v4_158.csv"
          write_csv(rule_path, rule_rows, ["rule", "pass", "details"])

          health_rows = [
              {"metric": "workflow_version", "value": VERSION, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "expected_result_label", "value": EXPECTED_RESULT, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "failed_gates", "value": json.dumps(failed_gates), "claim_boundary": "route_feasibility_health_only"},
              {"metric": "rule_pass_count", "value": f"{pass_count} / {len(rule_rows)}", "claim_boundary": "route_feasibility_health_only"},
              {"metric": "reference_value_slots_templated", "value": len(OBSERVED_ORDER), "claim_boundary": "route_feasibility_health_only"},
              {"metric": "covariance_template_dimension", "value": "6x6", "claim_boundary": "route_feasibility_health_only"},
              {"metric": "camb_import_available_after_best_effort_install", "value": camb_available, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "classy_import_available_after_best_effort_install", "value": classy_available, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "scientific_values_ingested", "value": False, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "reference_vector_generated", "value": False, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "reference_covariance_generated", "value": False, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "pressure_computed", "value": False, "claim_boundary": "route_feasibility_health_only"},
              {"metric": "selected_next_route", "value": selected_next_route, "claim_boundary": "route_feasibility_health_only"},
          ]
          health_path = OUT / "parser_health_report_v4_158.csv"
          write_csv(health_path, health_rows, ["metric", "value", "claim_boundary"])

          methodology_lines = [
              f"# {TITLE}",
              "",
              f"Created UTC: `{CREATED_UTC}`",
              "",
              "## Status",
              f"Expected result label: `{EXPECTED_RESULT}`",
              f"Failed gates: `{failed_gates}`",
              f"Rule pass count: `{pass_count} / {len(rule_rows)}`",
              "",
              "## Plain-language result",
              "This workflow creates the exact manual reference-package templates needed for the limited LRGxELG two-redshift product and records whether common Python CAMB/CLASS routes are available in the GitHub runner. It does not ingest scientific reference values, generate a reference vector, generate a reference covariance, compute residuals, compute pressure, compare models, or validate TAIRID.",
              "",
              "## Templates written",
              "- `limited_lrgxelg_reference_mean_vector_template_v4_158.csv`",
              "- `limited_lrgxelg_reference_covariance_matrix_template_v4_158.csv`",
              "- `limited_lrgxelg_reference_covariance_long_template_v4_158.csv`",
              "- `limited_lrgxelg_reference_correlation_matrix_template_optional_v4_158.csv`",
              "- `limited_lrgxelg_reference_parameter_samples_template_v4_158.csv`",
              "",
              "## Required limited reference order",
          ]
          for item in OBSERVED_ORDER:
              methodology_lines.append(f"{item['index']}. `{item['name']}` — z={item['z']}, {item['component']}, {item['component_family']}")
          methodology_lines.extend([
              "",
              "## Software-route boundary",
              "CAMB or CLASS import availability is only a software feasibility signal. It is not reference data. A later workflow would still need an explicit cosmology, method, parameter source, value-generation logic, covariance/sampling route, provenance, and scientific review before any residual or pressure calculation.",
              "",
              "## Blocked claims",
          ])
          for block in CLAIM_BLOCKS:
              methodology_lines.append(f"- `{block['claim']}` remains blocked: {block['reason']}")
          methodology_lines.extend([
              "",
              "## Next clean route",
              selected_next_route,
              "",
          ])
          methodology_md = "\n".join(methodology_lines)
          md_path = OUT / "methodology_and_scope_notes_v4_158.md"
          md_path.write_text(methodology_md, encoding="utf-8")

          manifest = {
              "version": VERSION,
              "title": TITLE,
              "created_utc": CREATED_UTC,
              "expected_result_label": EXPECTED_RESULT,
              "failed_gates": failed_gates,
              "rule_pass_count": f"{pass_count} / {len(rule_rows)}",
              "reference_order": OBSERVED_ORDER,
              "required_dependencies": REQUIRED_DEPENDENCIES,
              "blocked_claims": CLAIM_BLOCKS,
              "software_route_feasibility": software_rows,
              "selected_next_route": selected_next_route,
              "truth_boundary": "Templates and software import feasibility only; no scientific values ingested, no reference vector/covariance generated, no pressure/residual/model comparison/validation.",
              "outputs": {},
          }
          for p in sorted(OUT.iterdir()):
              if p.is_file():
                  manifest["outputs"][p.name] = {"sha256": sha256_file(p), "bytes": p.stat().st_size}
          write_json(OUT / "manifest_v4_158.json", manifest)

          if failed_gates:
              print(f"{VERSION} FAILED gates: {failed_gates}")
              sys.exit(1)

          print(EXPECTED_RESULT)
          print(f"rule_pass_count={pass_count} / {len(rule_rows)}")
          print("failed_gates=[]")
          print("scientific_values_ingested=False")
          print("reference_vector_generated=False")
          print("reference_covariance_generated=False")
          print("pressure_computed=False")
          PY

      - name: Upload v4.158 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-158-reference-generation-route-feasibility-and-package-schema-with-scope-guards
          path: tairid_v4_158_reference_generation_route_feasibility_and_package_schema_with_scope_guards/
          if-no-files-found: error
