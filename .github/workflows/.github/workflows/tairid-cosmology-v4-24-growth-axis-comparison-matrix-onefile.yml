name: TAIRID Cosmology v4.24 Growth Axis Comparison Matrix Onefile
"on":
workflow_dispatch:
push:
paths:
- ".github/workflows/tairid-cosmology-v4-24-growth-axis-comparison-matrix-onefile.yml"
jobs:
growth-axis-comparison-matrix-onefile:
runs-on: ubuntu-latest
permissions:
  contents: read

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Run TAIRID v4.24 growth axis comparison matrix onefile
    shell: bash
    run: |
      mkdir -p artifacts/tairid_cosmology_v4_24_growth_axis_comparison_matrix_onefile

      python - <<'PY'
      import csv
      import json
      from datetime import datetime, timezone
      from pathlib import Path

      OUTDIR = Path("artifacts/tairid_cosmology_v4_24_growth_axis_comparison_matrix_onefile")
      OUTDIR.mkdir(parents=True, exist_ok=True)

      RUN_ID = "tairid_cosmology_v4_24_growth_axis_comparison_matrix_onefile"

      TRUTH_BOUNDARY = [
          "This is not a TAIRID validation test.",
          "This does not prove H0 correction.",
          "This does not prove new physics.",
          "This does not disprove standard cosmology.",
          "This does not fit a full cosmological model.",
          "This does not run a two-surface refit.",
          "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
          "This does not combine RSD, weak lensing, clusters, CMB lensing, KiDS, DES, HSC, H0LiCOW, BAO, or CMB into one posterior.",
          "This does not parse new posterior chains.",
          "This does not run an RSD, cluster, CMB-lensing, weak-lensing, BAO, H0LiCOW, or CMB likelihood.",
          "This does not compute a new growth pressure score.",
          "This builds an axis comparison matrix so unlike observables are not averaged into one pressure surface.",
          "A pass means the growth axes are organized for later role-specific testing, not that TAIRID cosmology is validated."
      ]

      AXIS_DEFINITIONS = [
          {
              "axis_id": "S8",
              "axis_type": "late_growth_amplitude_combo",
              "definition": "sigma8 * sqrt(Omega_m / 0.3)",
              "redshift_dependent": False,
              "primary_sources": "weak_lensing;3x2pt",
              "tairid_role": "consolidation_growth_amplitude_surface",
              "comparison_boundary": "Can be compared to Planck-derived S8 only with source-role and covariance boundary preserved.",
              "pressure_score_allowed_now": False
          },
          {
              "axis_id": "sigma8",
              "axis_type": "matter_fluctuation_amplitude",
              "definition": "rms matter fluctuation amplitude on 8 Mpc/h scale",
              "redshift_dependent": False,
              "primary_sources": "3x2pt_decomposition;clusters;CMB_context",
              "tairid_role": "amplitude_side_growth_decomposition",
              "comparison_boundary": "Can support amplitude-side reading, but cannot be treated as identical to S8 or f_sigma8.",
              "pressure_score_allowed_now": False
          },
          {
              "axis_id": "Omega_m",
              "axis_type": "matter_density_axis",
              "definition": "matter density fraction",
              "redshift_dependent": False,
              "primary_sources": "3x2pt_decomposition;clusters;CMB_context",
              "tairid_role": "density_axis_decomposition",
              "comparison_boundary": "Known mixed lane in current tests; must not be forced into shared negative pressure.",
              "pressure_score_allowed_now": False
          },
          {
              "axis_id": "f_sigma8",
              "axis_type": "redshift_dependent_growth_rate",
              "definition": "growth rate f(z) multiplied by sigma8(z)",
              "redshift_dependent": True,
              "primary_sources": "RSD",
              "tairid_role": "growth_consolidation_velocity_field_axis",
              "comparison_boundary": "Requires redshift-specific reference curve or published baseline before pressure scoring.",
              "pressure_score_allowed_now": False
          },
          {
              "axis_id": "cluster_amplitude",
              "axis_type": "bound_structure_abundance_amplitude",
              "definition": "cluster abundance amplitude constrained through counts, selection, and mass calibration",
              "redshift_dependent": True,
              "primary_sources": "cluster_counts;SZ;optical_clusters",
              "tairid_role": "growth_consolidation_bound_structure_axis",
              "comparison_boundary": "Requires mass-calibration and selection boundary before pressure scoring.",
              "pressure_score_allowed_now": False
          },
          {
              "axis_id": "cmb_lensing_amplitude",
              "axis_type": "integrated_lensing_growth",
              "definition": "integrated matter-lensing amplitude from CMB lensing reconstruction or lensing potential constraints",
              "redshift_dependent": True,
              "primary_sources": "Planck_lensing;ACT_lensing;SPT_lensing",
              "tairid_role": "integrated_growth_lensing_axis",
              "comparison_boundary": "Requires CMB baseline and lensing-role boundary before pressure scoring.",
              "pressure_score_allowed_now": False
          },
          {
              "axis_id": "BAO_ruler_boundary",
              "axis_type": "boundary_ruler_not_growth_axis",
              "definition": "baryon acoustic ruler / distance boundary",
              "redshift_dependent": True,
              "primary_sources": "BAO",
              "tairid_role": "boundary_ruler_guard",
              "comparison_boundary": "BAO remains boundary/ruler and is not a global reach anchor or growth pressure axis.",
              "pressure_score_allowed_now": False
          },
          {
              "axis_id": "Ddt_reach",
              "axis_type": "reach_geometry_not_growth_axis",
              "definition": "time-delay distance / reach geometry diagnostic",
              "redshift_dependent": True,
              "primary_sources": "H0LiCOW;time_delay_lenses",
              "tairid_role": "reach_positive_equivalent_lane",
              "comparison_boundary": "Reach lane stays separated from consolidation/growth lane.",
              "pressure_score_allowed_now": False
          }
      ]

      MATRIX_ROWS = [
          {
              "row_id": "kids_direct_3x2pt_S8",
              "source_family": "KiDS",
              "source_status": "direct_parsed_data",
              "lane": "three_by_two_growth",
              "axis_id": "S8",
              "axis_role": "late_growth_amplitude_combo",
              "z_eff": "integrated_low_redshift_lensing",
              "value_status": "value_ready_from_prior_direct_chain",
              "current_comparison_status": "prior_pressure_row_exists",
              "allowed_interpretation": "KiDS direct 3x2pt supports the growth/amplitude-side lane.",
              "blocked_interpretation": "KiDS direct 3x2pt validates TAIRID.",
              "pressure_score_allowed_now": False
          },
          {
              "row_id": "kids_direct_3x2pt_sigma8",
              "source_family": "KiDS",
              "source_status": "direct_parsed_data",
              "lane": "decomposition",
              "axis_id": "sigma8",
              "axis_role": "amplitude_side_decomposition",
              "z_eff": "integrated_low_redshift_lensing",
              "value_status": "value_ready_from_prior_direct_chain",
              "current_comparison_status": "prior_decomposition_row_exists",
              "allowed_interpretation": "sigma8 supports amplitude-side decomposition.",
              "blocked_interpretation": "sigma8 alone proves the cause of the growth tension.",
              "pressure_score_allowed_now": False
          },
          {
              "row_id": "kids_direct_3x2pt_Omega_m",
              "source_family": "KiDS",
              "source_status": "direct_parsed_data",
              "lane": "decomposition",
              "axis_id": "Omega_m",
              "axis_role": "matter_density_decomposition",
              "z_eff": "integrated_low_redshift_lensing",
              "value_status": "value_ready_from_prior_direct_chain",
              "current_comparison_status": "prior_decomposition_row_exists",
              "allowed_interpretation": "Omega_m is tracked as a separate axis.",
              "blocked_interpretation": "Omega_m must be forced into the same negative pressure pattern as S8.",
              "pressure_score_allowed_now": False
          },
          {
              "row_id": "des_hsc_kids_cosmic_shear_S8",
              "source_family": "KiDS_DES_HSC",
              "source_status": "published_summary",
              "lane": "lensing_only_growth",
              "axis_id": "S8",
              "axis_role": "weak_lensing_amplitude_combo",
              "z_eff": "integrated_low_redshift_lensing",
              "value_status": "summary_values_available",
              "current_comparison_status": "prior_role_explicit_growth_rows_exist",
              "allowed_interpretation": "Published weak-lensing S8 rows support a repeated growth/consolidation direction with strength warnings.",
              "blocked_interpretation": "DES and HSC are direct-chain rows.",
              "pressure_score_allowed_now": False
          },
          {
              "row_id": "rsd_boss_wigglez_fsigma8",
              "source_family": "BOSS_DR12_WiggleZ",
              "source_status": "published_summary",
              "lane": "rsd_growth",
              "axis_id": "f_sigma8",
              "axis_role": "redshift_dependent_growth_rate",
              "z_eff": "row_specific_required",
              "value_status": "six_rows_value_ready_three_rows_pending",
              "current_comparison_status": "boundary_audit_passed_no_pressure_score",
              "allowed_interpretation": "RSD/f_sigma8 is staged as a future growth-rate comparison lane.",
              "blocked_interpretation": "f_sigma8 can be averaged with S8 without a reference curve or axis bridge.",
              "pressure_score_allowed_now": False
          },
          {
              "row_id": "cluster_growth_candidate_axis",
              "source_family": "Planck_SZ_DES_clusters_future",
              "source_status": "published_summary_or_literature_inventory",
              "lane": "cluster_growth",
              "axis_id": "cluster_amplitude",
              "axis_role": "bound_structure_abundance_axis",
              "z_eff": "source_specific_required",
              "value_status": "not_selected_for_scoring",
              "current_comparison_status": "candidate_lane_inventory_only",
              "allowed_interpretation": "Clusters are future growth candidates after mass-calibration boundary audit.",
              "blocked_interpretation": "Cluster counts prove growth suppression.",
              "pressure_score_allowed_now": False
          },
          {
              "row_id": "cmb_lensing_candidate_axis",
              "source_family": "Planck_ACT_future",
              "source_status": "published_summary_or_literature_inventory",
              "lane": "cmb_lensing_growth",
              "axis_id": "cmb_lensing_amplitude",
              "axis_role": "integrated_growth_lensing_axis",
              "z_eff": "broad_integrated_kernel",
              "value_status": "not_selected_for_scoring",
              "current_comparison_status": "candidate_lane_inventory_only",
              "allowed_interpretation": "CMB lensing is a future integrated-growth candidate with CMB-role boundary.",
              "blocked_interpretation": "CMB lensing replaces Planck baseline analysis.",
              "pressure_score_allowed_now": False
          },
          {
              "row_id": "bao_boundary_guard",
              "source_family": "BAO",
              "source_status": "prior_diagnostic_review",
              "lane": "boundary_ruler",
              "axis_id": "BAO_ruler_boundary",
              "axis_role": "boundary_not_growth_axis",
              "z_eff": "redshift_specific_distance_boundary",
              "value_status": "not_growth_scored",
              "current_comparison_status": "boundary_guard_active",
              "allowed_interpretation": "BAO remains an auxiliary ruler boundary.",
              "blocked_interpretation": "BAO confirms the TAIRID reach surface or can be averaged into growth pressure.",
              "pressure_score_allowed_now": False
          },
          {
              "row_id": "h0licow_reach_guard",
              "source_family": "H0LiCOW",
              "source_status": "prior_diagnostic_review",
              "lane": "reach_geometry",
              "axis_id": "Ddt_reach",
              "axis_role": "reach_not_growth_axis",
              "z_eff": "lens_specific",
              "value_status": "prior_reach_lane_active",
              "current_comparison_status": "reach_positive_equivalent_preserved",
              "allowed_interpretation": "Reach lane stays separated from consolidation/growth lanes.",
              "blocked_interpretation": "Reach and growth can be collapsed into one universal correction.",
              "pressure_score_allowed_now": False
          }
      ]

      COMPARISON_RULES = [
          {
              "rule_id": "axis_id_required",
              "description": "Every row must have an explicit axis_id.",
              "failure_mode": "Unlabeled observable enters comparison."
          },
          {
              "rule_id": "evidence_status_required",
              "description": "Every row must state source status: direct parsed, published summary, inventory, prior review, or candidate.",
              "failure_mode": "Source gets silently promoted."
          },
          {
              "rule_id": "redshift_dependence_preserved",
              "description": "f_sigma8, BAO, CMB lensing, cluster amplitude, and reach rows must keep redshift or kernel dependence visible.",
              "failure_mode": "Redshift-dependent observables are treated like one scalar S8 row."
          },
          {
              "rule_id": "boundary_axes_not_growth_scored",
              "description": "BAO_ruler_boundary and Ddt_reach cannot be treated as growth-pressure axes.",
              "failure_mode": "Boundary or reach rows collapse into growth pressure."
          },
          {
              "rule_id": "no_pressure_scores_now",
              "description": "v4.24 creates the matrix only and computes no new pressure scores.",
              "failure_mode": "Matrix turns into scoring step."
          }
      ]

      BLOCKED_INTERPRETATIONS = [
          {
              "claim": "RSD/f_sigma8 and weak-lensing S8 are the same observable.",
              "status": "blocked",
              "reason": "f_sigma8 is redshift-dependent growth rate; S8 is a late-time amplitude-combination surface."
          },
          {
              "claim": "Cluster abundance can be scored without mass-calibration boundaries.",
              "status": "blocked",
              "reason": "Cluster rows require mass calibration and selection guards."
          },
          {
              "claim": "CMB lensing replaces the Planck baseline.",
              "status": "blocked",
              "reason": "CMB lensing is an integrated-growth lane with CMB-role boundary."
          },
          {
              "claim": "BAO is a growth pressure row.",
              "status": "blocked",
              "reason": "BAO is a boundary/ruler guard."
          },
          {
              "claim": "H0LiCOW reach and growth rows can be averaged into one pressure score.",
              "status": "blocked",
              "reason": "Reach and consolidation/growth remain separated."
          },
          {
              "claim": "TAIRID cosmology is validated.",
              "status": "blocked",
              "reason": "This is an axis matrix and does not validate a cosmological model."
          }
      ]

      NEXT_TEST_LADDER = [
          {
              "priority": 1,
              "next_test": "v4_25_RSD_planck_reference_boundary_probe",
              "role_focus": "rsd_fsigma8_growth",
              "purpose": "Define what an honest Planck/reference comparison would require for redshift-dependent f_sigma8.",
              "why_next": "RSD is bounded and axis-mapped, but f_sigma8 needs a redshift-dependent reference curve or published baseline before pressure scoring.",
              "must_include": "redshift dependence, reference-model boundary, covariance warning, no validation claim.",
              "must_not_include": "pretending f_sigma8 and S8 are the same axis."
          },
          {
              "priority": 2,
              "next_test": "v4_26_cluster_mass_calibration_boundary_audit",
              "role_focus": "cluster_abundance_growth",
              "purpose": "Audit cluster abundance with mass calibration and selection boundaries before any cluster growth-pressure scoring.",
              "why_next": "Clusters are growth-relevant but calibration-heavy.",
              "must_include": "mass calibration, selection, source/product status, axis label.",
              "must_not_include": "cluster proof claim."
          },
          {
              "priority": 3,
              "next_test": "v4_27_CMB_lensing_role_boundary_audit",
              "role_focus": "cmb_lensing_growth",
              "purpose": "Audit CMB lensing with CMB-baseline and integrated-growth boundaries.",
              "why_next": "CMB lensing is powerful but cannot be used as a Planck replacement without role separation.",
              "must_include": "Planck/ACT role separation, lensing amplitude, integrated-growth language.",
              "must_not_include": "Planck replacement claim."
          }
      ]

      failed_gates = []
      warnings = []

      axis_ids = {row["axis_id"] for row in AXIS_DEFINITIONS}

      for row in MATRIX_ROWS:
          if not row.get("axis_id"):
              failed_gates.append(f"{row.get('row_id', 'unknown')}_missing_axis_id")

          if row.get("axis_id") not in axis_ids:
              failed_gates.append(f"{row.get('row_id', 'unknown')}_axis_id_not_defined")

          if not row.get("source_status"):
              failed_gates.append(f"{row.get('row_id', 'unknown')}_missing_source_status")

          if not row.get("lane"):
              failed_gates.append(f"{row.get('row_id', 'unknown')}_missing_lane")

          if row.get("pressure_score_allowed_now") is not False:
              failed_gates.append(f"{row.get('row_id', 'unknown')}_pressure_score_allowed_violation")

      redshift_dependent_axes = {
          row["axis_id"]
          for row in AXIS_DEFINITIONS
          if row["redshift_dependent"] is True
      }

      for row in MATRIX_ROWS:
          if row["axis_id"] in redshift_dependent_axes:
              z = str(row.get("z_eff", "")).strip()
              if not z:
                  failed_gates.append(f"{row['row_id']}_missing_redshift_or_kernel_label")

      boundary_axis_rows = [
          row for row in MATRIX_ROWS
          if row["axis_id"] in ["BAO_ruler_boundary", "Ddt_reach"]
      ]

      if any(row["lane"] in ["lensing_only_growth", "three_by_two_growth", "rsd_growth", "cluster_growth", "cmb_lensing_growth"] for row in boundary_axis_rows):
          failed_gates.append("boundary_axis_assigned_to_growth_lane")

      if any(row["axis_id"] == "f_sigma8" and row["axis_role"] == "late_growth_amplitude_combo" for row in MATRIX_ROWS):
          failed_gates.append("f_sigma8_misclassified_as_S8_like_axis")

      if any(row["axis_id"] == "Omega_m" and "shared negative" in row["allowed_interpretation"] for row in MATRIX_ROWS):
          failed_gates.append("Omega_m_forced_into_shared_negative_pattern")

      rule_results = [
          {
              "rule_id": "axis_id_required",
              "pass": all(bool(row.get("axis_id")) and row.get("axis_id") in axis_ids for row in MATRIX_ROWS),
              "result": "all_rows_have_defined_axis_id",
              "boundary": "No unlabeled observable enters the matrix."
          },
          {
              "rule_id": "evidence_status_required",
              "pass": all(bool(row.get("source_status")) for row in MATRIX_ROWS),
              "result": "all_rows_have_source_status",
              "boundary": "No hidden evidence promotion."
          },
          {
              "rule_id": "redshift_dependence_preserved",
              "pass": all(bool(str(row.get("z_eff", "")).strip()) for row in MATRIX_ROWS if row["axis_id"] in redshift_dependent_axes),
              "result": "redshift_or_kernel_labels_preserved",
              "boundary": "f_sigma8 and other redshift-dependent observables are not treated as scalar S8."
          },
          {
              "rule_id": "boundary_axes_not_growth_scored",
              "pass": all(row["axis_id"] not in ["BAO_ruler_boundary", "Ddt_reach"] or row["lane"] in ["boundary_ruler", "reach_geometry"] for row in MATRIX_ROWS),
              "result": "boundary_and_reach_axes_kept_out_of_growth_scoring",
              "boundary": "BAO and H0LiCOW do not become growth-pressure rows."
          },
          {
              "rule_id": "no_pressure_scores_now",
              "pass": all(row.get("pressure_score_allowed_now") is False for row in MATRIX_ROWS),
              "result": "no_pressure_scores_allowed_in_axis_matrix",
              "boundary": "v4.24 is matrix only."
          }
      ]

      direct_parsed_rows = [row for row in MATRIX_ROWS if row["source_status"] == "direct_parsed_data"]
      published_summary_rows = [row for row in MATRIX_ROWS if row["source_status"] == "published_summary"]
      prior_review_rows = [row for row in MATRIX_ROWS if row["source_status"] == "prior_diagnostic_review"]
      candidate_rows = [row for row in MATRIX_ROWS if "inventory" in row["source_status"]]

      warnings.append("growth_axis_matrix_is_not_pressure_score")
      warnings.append("f_sigma8_requires_redshift_dependent_reference_before_scoring")
      warnings.append("cluster_and_CMB_lensing_axes_require_boundary_audits_before_scoring")
      warnings.append("BAO_and_H0LiCOW_are_not_growth_axes")

      all_rules_passed = all(row["pass"] for row in rule_results)

      if not all_rules_passed:
          failed_gates.append("not_all_axis_matrix_rules_passed")

      if failed_gates:
          readiness_label = "growth_axis_comparison_matrix_failed"
          next_step = "Repair axis labels, evidence status, redshift dependence, or boundary-lane assignments before RSD reference probing."
      else:
          readiness_label = "growth_axis_comparison_matrix_passed_ready_for_RSD_reference_boundary_probe"
          next_step = (
              "Proceed to v4.25 RSD/Planck reference boundary probe. "
              "Do not compute a pressure score yet; first define what a redshift-dependent f_sigma8 reference comparison requires."
          )

      system_health = {
          "axis_definition_count": len(AXIS_DEFINITIONS),
          "matrix_row_count": len(MATRIX_ROWS),
          "direct_parsed_row_count": len(direct_parsed_rows),
          "published_summary_row_count": len(published_summary_rows),
          "prior_review_row_count": len(prior_review_rows),
          "candidate_inventory_row_count": len(candidate_rows),
          "all_rules_passed": all_rules_passed,
          "pressure_score_allowed_now": False,
          "combined_posterior_allowed_now": False,
          "validation_claim_allowed": False,
          "f_sigma8_separate_from_S8": True,
          "BAO_boundary_preserved": True,
          "reach_growth_separation_preserved": True
      }

      interpretation = (
          "v4.24 builds the growth axis comparison matrix. "
          "It preserves S8, sigma8, Omega_m, f_sigma8, cluster amplitude, CMB lensing amplitude, BAO boundary, and H0LiCOW reach as different roles rather than one pressure surface. "
          "The result is that RSD/f_sigma8 can move forward only through a redshift-dependent reference boundary probe, not by being averaged into weak-lensing S8."
      )

      audit = {
          "run_id": RUN_ID,
          "created_at_utc": datetime.now(timezone.utc).isoformat(),
          "truth_boundary": TRUTH_BOUNDARY,
          "axis_definitions": AXIS_DEFINITIONS,
          "matrix_rows": MATRIX_ROWS,
          "comparison_rules": COMPARISON_RULES,
          "rule_results": rule_results,
          "blocked_interpretations": BLOCKED_INTERPRETATIONS,
          "next_test_ladder": NEXT_TEST_LADDER,
          "system_health": system_health,
          "interpretation": interpretation,
          "guardrail_check": {
              "validation_claim_allowed": False,
              "h0_solution_claim_allowed": False,
              "new_physics_claim_allowed": False,
              "standard_cosmology_disproof_claim_allowed": False,
              "growth_law_proof_claim_allowed": False,
              "refit_run": False,
              "bic_run": False,
              "likelihood_run": False,
              "posterior_model_comparison_run": False,
              "combined_posterior_built": False,
              "new_cosmological_model_fit": False,
              "new_posterior_chain_parsed": False,
              "one_surface_collapse_allowed": False,
              "new_pressure_scores_built": False
          },
          "gate_result": {
              "failed_gates": sorted(set(failed_gates)),
              "warnings": sorted(set(warnings)),
              "readiness_label": readiness_label,
              "next_allowed_step": next_step,
              "model_claim_allowed": False,
              "refit_allowed": False,
              "bic_allowed": False,
              "likelihood_allowed": False,
              "posterior_model_comparison_allowed": False,
              "combined_posterior_allowed": False,
              "new_posterior_chain_parsed": False,
              "one_surface_collapse_allowed": False,
              "new_pressure_scores_built": False
          }
      }

      def write_csv(path, rows, fieldnames):
          with path.open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              for row in rows:
                  writer.writerow({key: row.get(key, "") for key in fieldnames})

      write_csv(
          OUTDIR / "growth_axis_definitions_v4_24.csv",
          AXIS_DEFINITIONS,
          [
              "axis_id",
              "axis_type",
              "definition",
              "redshift_dependent",
              "primary_sources",
              "tairid_role",
              "comparison_boundary",
              "pressure_score_allowed_now"
          ]
      )

      write_csv(
          OUTDIR / "growth_axis_matrix_rows_v4_24.csv",
          MATRIX_ROWS,
          [
              "row_id",
              "source_family",
              "source_status",
              "lane",
              "axis_id",
              "axis_role",
              "z_eff",
              "value_status",
              "current_comparison_status",
              "allowed_interpretation",
              "blocked_interpretation",
              "pressure_score_allowed_now"
          ]
      )

      write_csv(
          OUTDIR / "growth_axis_rule_results_v4_24.csv",
          rule_results,
          ["rule_id", "pass", "result", "boundary"]
      )

      write_csv(
          OUTDIR / "blocked_interpretations_v4_24.csv",
          BLOCKED_INTERPRETATIONS,
          ["claim", "status", "reason"]
      )

      write_csv(
          OUTDIR / "next_test_ladder_v4_24.csv",
          NEXT_TEST_LADDER,
          ["priority", "next_test", "role_focus", "purpose", "why_next", "must_include", "must_not_include"]
      )

      write_csv(
