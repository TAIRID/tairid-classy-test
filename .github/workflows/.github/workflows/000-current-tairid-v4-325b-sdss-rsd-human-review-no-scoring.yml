name: "!!! CURRENT FIXED - TAIRID v4.325B SDSS RSD human review no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-325b-human-review-packet-no-scoring:
    name: "!!! CURRENT FIXED - Run v4.325B no-scoring human review packet"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Confirm required v4.325 files are present
        run: |
          echo "Current directory:"
          pwd

          echo "Repository root files:"
          ls -la

          echo "Checking Python script..."
          test -f run_tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring.py

          echo "Finding v4.324 input ZIP..."

          if [ -f "tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output.zip" ]; then
            echo "INPUT_ZIP=tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output.zip" >> "$GITHUB_ENV"
            echo "Found original v4.324 input ZIP name."

          elif [ -f "tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output-1.zip" ]; then
            echo "INPUT_ZIP=tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output-1.zip" >> "$GITHUB_ENV"
            echo "Found GitHub-renamed v4.324 input ZIP name with -1."

          elif [ -f "tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output-2.zip" ]; then
            echo "INPUT_ZIP=tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output-2.zip" >> "$GITHUB_ENV"
            echo "Found GitHub-renamed v4.324 input ZIP name with -2."

          else
            echo "Could not find the v4.324 input ZIP."
            echo "Expected one of these:"
            echo "tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output.zip"
            echo "tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output-1.zip"
            echo "tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output-2.zip"
            exit 1
          fi

      - name: Run v4.325B no-scoring human review packet builder
        run: |
          echo "Using input ZIP: $INPUT_ZIP"
          python run_tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring.py \
            --input "$INPUT_ZIP" \
            --output-dir tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring_output

      - name: Upload v4.325B no-scoring output artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-325b-sdss-rsd-numeric-baseline-parameter-human-review-packet-no-scoring-output
          path: |
            tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring_output/
            tairid_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring_output.zip
