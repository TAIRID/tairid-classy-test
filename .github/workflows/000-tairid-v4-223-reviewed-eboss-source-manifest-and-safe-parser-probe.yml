name: 000 TAIRID v4.223 - Reviewed eBOSS Source Manifest And Safe Parser Probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-v4-223-reviewed-eboss-source-parser-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.223 one-file reviewed manifest and safe parser probe
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.223"
          ROUTE = "reviewed_eboss_source_manifest_and_safe_parser_probe_after_v4_222"
          EXPECTED_RESULT = "reviewed_eboss_source_manifest_and_safe_parser_probe_passed_no_validation"
          SELECTED_NEXT_ROUTE = "source_specific_lrg_qso_axis_preview_with_elg_grid_likelihood_guard"

          OUT = Path("tairid_v4_223_reviewed_eboss_source_manifest_parser_probe_output")
          OUT.mkdir(parents=True, exist_ok=True)

          STAGE = OUT / "reviewed_source_preview"
          STAGE.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-223-reviewed-eboss-source-manifest-parser-probe-output.zip"

          BASE = "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16"

          REVIEWED_CANDIDATES = [
              {
                  "source": "LRG",
                  "surface_id": "lrg_dr16_bao_dmdh",
                  "role": "residual_or_measurement",
                  "quantity_set": "BAO_DMDH",
                  "raw_url": BASE + "/lrg/sdss_DR16_LRG_BAO_DMDH.txt",
                  "expected_parse_type": "measurement_table",
                  "expected_rows": 2,
                  "expected_cov_dim": "",
                  "review_status": "approved_candidate_for_parser_probe",
                  "review_reason": "source-specific DR16 LRG folder; not DR12 fallback",
              },
              {
                  "source": "LRG",
                  "surface_id": "lrg_dr16_bao_dmdh",
                  "role": "covariance",
                  "quantity_set": "BAO_DMDH",
                  "raw_url": BASE + "/lrg/sdss_DR16_LRG_BAO_DMDH_covtot.txt",
                  "expected_parse_type": "square_covariance",
                  "expected_rows": 2,
                  "expected_cov_dim": 2,
                  "review_status": "approved_candidate_for_parser_probe",
                  "review_reason": "source-specific DR16 LRG covariance paired to LRG BAO DMDH",
              },
              {
                  "source": "LRG",
                  "surface_id": "lrg_dr16_fsbao_dmdhfs8",
                  "role": "residual_or_measurement",
                  "quantity_set": "FSBAO_DMDHfs8",
                  "raw_url": BASE + "/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8.txt",
                  "expected_parse_type": "measurement_table",
                  "expected_rows": 3,
                  "expected_cov_dim": "",
                  "review_status": "approved_candidate_for_parser_probe",
                  "review_reason": "source-specific DR16 LRG full-shape/BAO table with D_M, D_H, and f_sigma8",
              },
              {
                  "source": "LRG",
                  "surface_id": "lrg_dr16_fsbao_dmdhfs8",
                  "role": "covariance",
                  "quantity_set": "FSBAO_DMDHfs8",
                  "raw_url": BASE + "/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8_covtot.txt",
                  "expected_parse_type": "square_covariance",
                  "expected_rows": 3,
                  "expected_cov_dim": 3,
                  "review_status": "approved_candidate_for_parser_probe",
                  "review_reason": "source-specific DR16 LRG covariance paired to LRG FSBAO DMDHfs8",
              },
              {
                  "source": "ELG",
                  "surface_id": "elg_dr16_bao_dvtable",
                  "role": "likelihood_table",
                  "quantity_set": "BAO_DVtable",
                  "raw_url": BASE + "/elg/sdss_DR16_ELG_BAO_DVtable.txt",
                  "expected_parse_type": "grid_or_likelihood_table",
                  "expected_rows": "many",
                  "expected_cov_dim": "",
                  "review_status": "approved_candidate_for_grid_probe",
                  "review_reason": "source-specific DR16 ELG folder; table likelihood rather than simple covariance pair",
              },
              {
                  "source": "ELG",
                  "surface_id": "elg_dr16_fsbao_gridlikelihood",
                  "role": "likelihood_grid",
                  "quantity_set": "FSBAO_DMDHfs8_grid",
                  "raw_url": BASE + "/elg/sdss_DR16_ELG_FSBAO_DMDHfs8gridlikelihood.txt",
                  "expected_parse_type": "deferred_large_grid",
                  "expected_rows": "many",
                  "expected_cov_dim": "",
                  "review_status": "deferred_large_grid_needs_dedicated_parser",
                  "review_reason": "source-specific DR16 ELG grid is too large for this light parser probe",
              },
              {
                  "source": "QSO",
                  "surface_id": "qso_dr16_bao_dmdh",
                  "role": "residual_or_measurement",
                  "quantity_set": "BAO_DMDH",
                  "raw_url": BASE + "/qso/sdss_DR16_QSO_BAO_DMDH.txt",
                  "expected_parse_type": "measurement_table",
                  "expected_rows": 2,
                  "expected_cov_dim": "",
                  "review_status": "approved_candidate_for_parser_probe",
                  "review_reason": "source-specific DR16 QSO folder; not LYxQSO cross-surface",
              },
              {
                  "source": "QSO",
                  "surface_id": "qso_dr16_bao_dmdh",
                  "role": "covariance",
                  "quantity_set": "BAO_DMDH",
                  "raw_url": BASE + "/qso/sdss_DR16_QSO_BAO_DMDH_covtot.txt",
                  "expected_parse_type": "square_covariance",
                  "expected_rows": 2,
                  "expected_cov_dim": 2,
                  "review_status": "approved_candidate_for_parser_probe",
                  "review_reason": "source-specific DR16 QSO covariance paired to QSO BAO DMDH",
              },
              {
                  "source": "QSO",
                  "surface_id": "qso_dr16_fsbao_dmdhfs8",
                  "role": "residual_or_measurement",
                  "quantity_set": "FSBAO_DMDHfs8",
                  "raw_url": BASE + "/qso/sdss_DR16_QSO_FSBAO_DMDHfs8.txt",
                  "expected_parse_type": "measurement_table",
                  "expected_rows": 3,
                  "expected_cov_dim": "",
                  "review_status": "approved_candidate_for_parser_probe",
                  "review_reason": "source-specific DR16 QSO full-shape/BAO table with D_M, D_H, and f_sigma8",
              },
              {
                  "source": "QSO",
                  "surface_id": "qso_dr16_fsbao_dmdhfs8",
                  "role": "covariance",
                  "quantity_set": "FSBAO_DMDHfs8",
                  "raw_url": BASE + "/qso/sdss_DR16_QSO_FSBAO_DMDHfs8_covtot.txt",
                  "expected_parse_type": "square_covariance",
                  "expected_rows": 3,
                  "expected_cov_dim": 3,
                  "review_status": "approved_candidate_for_parser_probe",
                  "review_reason": "source-specific DR16 QSO covariance paired to QSO FSBAO DMDHfs8",
              },
          ]

          REJECTED_V4_222_SEED_ROWS = [
              {
                  "rejected_source": "LRG",
                  "rejected_role": "residual_or_measurement",
                  "rejected_path_hint": "boss_dr12/sdss_DR12_LRG_BAO_DMDH.txt",
                  "rejection_reason": "DR12/BOSS fallback is not the source-specific DR16 LRG surface needed here",
                  "replacement_surface": "lrg_dr16_bao_dmdh or lrg_dr16_fsbao_dmdhfs8",
              },
              {
                  "rejected_source": "LRG",
                  "rejected_role": "covariance",
                  "rejected_path_hint": "boss_dr12/sdss_DR12_LRG_BAO_DMDH_covtot.txt",
                  "rejection_reason": "DR12/BOSS fallback covariance is not paired to the source-specific DR16 LRG surface",
                  "replacement_surface": "lrg_dr16_bao_dmdh or lrg_dr16_fsbao_dmdhfs8",
              },
              {
                  "rejected_source": "ELG",
                  "rejected_role": "covariance",
                  "rejected_path_hint": "mgs/sdss_MGS_FSBAO_DVfs8_covtot.txt",
                  "rejection_reason": "MGS is not ELG; cannot use MGS covariance for ELG",
                  "replacement_surface": "elg_dr16_bao_dvtable or elg_dr16_fsbao_gridlikelihood",
              },
              {
                  "rejected_source": "QSO",
                  "rejected_role": "residual_or_measurement",
                  "rejected_path_hint": "lya/sdss_DR16_LYxQSO_BAO_DMDHgrid.txt",
                  "rejection_reason": "LYxQSO is a cross-surface, not QSO auto/source-specific input",
                  "replacement_surface": "qso_dr16_bao_dmdh or qso_dr16_fsbao_dmdhfs8",
              },
          ]

          def write_csv(path, rows, fieldnames=None):
              rows = rows or []
              if fieldnames is None:
                  fieldnames = []
                  for row in rows:
                      for key in row:
                          if key not in fieldnames:
                              fieldnames.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def fetch_bytes(url, max_bytes=2_500_000):
              req = Request(url, headers={"User-Agent": "TAIRID-v4.223-reviewed-parser-probe"})
              with urlopen(req, timeout=45) as response:
                  data = response.read(max_bytes + 1)
                  if len(data) > max_bytes:
                      return None, "too_large_for_light_parser_probe"
                  return data, "downloaded"

          def safe_float(token):
              try:
                  return float(token)
              except Exception:
                  return None

          def numeric_rows_from_text(text):
              rows = []
              labels = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  parts = stripped.replace(",", " ").split()
                  nums = []
                  non_numeric = []
                  for part in parts:
                      value = safe_float(part)
                      if value is None:
                          non_numeric.append(part)
                      else:
                          nums.append(value)
                  if nums:
                      rows.append(nums)
                  if non_numeric:
                      labels.extend(non_numeric)
              return rows, labels

          def parse_content(candidate, data):
              if data is None:
                  return {
                      "parse_status": "not_parsed",
                      "download_status": "not_downloaded",
                      "numeric_rows": 0,
                      "numeric_cols_min": 0,
                      "numeric_cols_max": 0,
                      "label_tokens": "",
                      "matrix_square": False,
                      "matrix_symmetric": False,
                      "matrix_diagonal_positive": False,
                      "expected_shape_match": False,
                      "detail": "not downloaded",
                  }

              text = data.decode("utf-8", errors="replace")
              rows, labels = numeric_rows_from_text(text)
              col_counts = [len(row) for row in rows]
              cols_min = min(col_counts) if col_counts else 0
              cols_max = max(col_counts) if col_counts else 0
              numeric_rows = len(rows)

              parse_type = candidate["expected_parse_type"]

              matrix_square = False
              matrix_symmetric = False
              matrix_diagonal_positive = False
              expected_shape_match = False

              if parse_type == "square_covariance":
                  expected_dim = int(candidate["expected_cov_dim"])
                  matrix_square = numeric_rows == expected_dim and cols_min == expected_dim and cols_max == expected_dim
                  if matrix_square:
                      matrix_symmetric = True
                      matrix_diagonal_positive = True
                      for i in range(expected_dim):
                          if rows[i][i] <= 0:
                              matrix_diagonal_positive = False
                          for j in range(expected_dim):
                              if abs(rows[i][j] - rows[j][i]) > 1e-8:
                                  matrix_symmetric = False
                      expected_shape_match = matrix_square and matrix_symmetric and matrix_diagonal_positive
                  parse_status = "parsed_square_covariance" if expected_shape_match else "covariance_shape_needs_review"

              elif parse_type == "measurement_table":
                  expected_rows = int(candidate["expected_rows"])
                  expected_shape_match = numeric_rows == expected_rows and cols_min >= 2
                  parse_status = "parsed_measurement_table" if expected_shape_match else "measurement_shape_needs_review"

              elif parse_type == "grid_or_likelihood_table":
                  expected_shape_match = numeric_rows > 10 and cols_min >= 2
                  parse_status = "parsed_grid_or_likelihood_table" if expected_shape_match else "grid_shape_needs_review"

              else:
                  parse_status = "deferred_or_unknown_parse_type"

              return {
                  "parse_status": parse_status,
                  "download_status": "downloaded",
                  "numeric_rows": numeric_rows,
                  "numeric_cols_min": cols_min,
                  "numeric_cols_max": cols_max,
                  "label_tokens": "|".join(sorted(set(labels)))[:500],
                  "matrix_square": matrix_square,
                  "matrix_symmetric": matrix_symmetric,
                  "matrix_diagonal_positive": matrix_diagonal_positive,
                  "expected_shape_match": expected_shape_match,
                  "detail": "light parser probe only; no cosmology likelihood evaluation",
              }

          def local_filename(candidate):
              raw_name = candidate["raw_url"].split("/")[-1]
              return f"{candidate['source'].lower()}__{candidate['surface_id']}__{candidate['role']}__{raw_name}"

          reviewed_manifest_rows = []
          parser_probe_rows = []
          downloaded_count = 0
          deferred_count = 0

          for candidate in REVIEWED_CANDIDATES:
              row = dict(candidate)
              local_path = ""
              download_status = "not_attempted"

              if candidate["expected_parse_type"] == "deferred_large_grid":
                  data = None
                  download_status = "deferred_large_grid"
                  deferred_count += 1
              else:
                  try:
                      data, download_status = fetch_bytes(candidate["raw_url"])
                      if data is not None and download_status == "downloaded":
                          local_path = (STAGE / local_filename(candidate)).as_posix()
                          Path(local_path).write_bytes(data)
                          downloaded_count += 1
                  except Exception as exc:
                      data = None
                      download_status = f"download_failed:{type(exc).__name__}"

              parse = parse_content(candidate, data)
              parse["download_status"] = download_status

              row["local_preview_path"] = local_path
              row["download_status"] = download_status
              row["approved_for_next_parser"] = (
                  candidate["expected_parse_type"] != "deferred_large_grid"
                  and parse["expected_shape_match"] is True
              )
              row["proof_status"] = "not_proof"
              row["validation_status"] = "not_validation"
              reviewed_manifest_rows.append(row)

              parser_probe_row = {
                  "source": candidate["source"],
                  "surface_id": candidate["surface_id"],
                  "role": candidate["role"],
                  "quantity_set": candidate["quantity_set"],
                  "expected_parse_type": candidate["expected_parse_type"],
                  "raw_url": candidate["raw_url"],
                  "local_preview_path": local_path,
                  "download_status": download_status,
                  **parse,
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              }
              parser_probe_rows.append(parser_probe_row)

          def rows_for(surface_id, role=None):
              rows = [row for row in parser_probe_rows if row["surface_id"] == surface_id]
              if role is not None:
                  rows = [row for row in rows if row["role"] == role]
              return rows

          def first_row(surface_id, role):
              matches = rows_for(surface_id, role)
              return matches[0] if matches else None

          def pair_status(surface_id, expected_dim):
              measurement = first_row(surface_id, "residual_or_measurement")
              covariance = first_row(surface_id, "covariance")

              measurement_ok = bool(measurement and measurement["expected_shape_match"] is True)
              covariance_ok = bool(covariance and covariance["expected_shape_match"] is True)
              covariance_dim_ok = bool(covariance and int(covariance["numeric_rows"]) == expected_dim and int(covariance["numeric_cols_max"]) == expected_dim)

              if measurement_ok and covariance_ok and covariance_dim_ok:
                  status = "source_specific_pair_ready_for_axis_preview"
                  next_requirement = "build source-specific residual/axis preview; still not cosmology validation"
              else:
                  status = "source_specific_pair_needs_review"
                  next_requirement = "fix download, parse shape, or manifest pairing before axis preview"

              return {
                  "surface_id": surface_id,
                  "measurement_rows": measurement["numeric_rows"] if measurement else 0,
                  "covariance_rows": covariance["numeric_rows"] if covariance else 0,
                  "covariance_cols": covariance["numeric_cols_max"] if covariance else 0,
                  "expected_cov_dim": expected_dim,
                  "measurement_ok": measurement_ok,
                  "covariance_ok": covariance_ok,
                  "source_surface_status": status,
                  "next_requirement": next_requirement,
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              }

          source_surface_status_rows = [
              {"source": "LRG", "surface_role": "geometry_only_BAO", **pair_status("lrg_dr16_bao_dmdh", 2)},
              {"source": "LRG", "surface_role": "FSBAO_with_fsigma8", **pair_status("lrg_dr16_fsbao_dmdhfs8", 3)},
              {
                  "source": "ELG",
                  "surface_id": "elg_dr16_bao_dvtable",
                  "surface_role": "ELG_BAO_grid_or_likelihood_table",
                  "measurement_rows": first_row("elg_dr16_bao_dvtable", "likelihood_table")["numeric_rows"] if first_row("elg_dr16_bao_dvtable", "likelihood_table") else 0,
                  "covariance_rows": 0,
                  "covariance_cols": 0,
                  "expected_cov_dim": "",
                  "measurement_ok": bool(first_row("elg_dr16_bao_dvtable", "likelihood_table") and first_row("elg_dr16_bao_dvtable", "likelihood_table")["expected_shape_match"] is True),
                  "covariance_ok": False,
                  "source_surface_status": "elg_grid_table_ready_for_dedicated_likelihood_parser",
                  "next_requirement": "do not invent ELG covariance; build ELG table/grid parser separately",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              },
              {
                  "source": "ELG",
                  "surface_id": "elg_dr16_fsbao_gridlikelihood",
                  "surface_role": "ELG_FSBAO_large_grid",
                  "measurement_rows": 0,
                  "covariance_rows": 0,
                  "covariance_cols": 0,
                  "expected_cov_dim": "",
                  "measurement_ok": False,
                  "covariance_ok": False,
                  "source_surface_status": "deferred_large_grid_needs_dedicated_parser",
                  "next_requirement": "large grid is held for a later parser; do not treat it as missing covariance",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              },
              {"source": "QSO", "surface_role": "geometry_only_BAO", **pair_status("qso_dr16_bao_dmdh", 2)},
              {"source": "QSO", "surface_role": "FSBAO_with_fsigma8", **pair_status("qso_dr16_fsbao_dmdhfs8", 3)},
          ]

          axis_preview_readiness_rows = [
              {
                  "source": "LRG",
                  "surface_id": "lrg_dr16_fsbao_dmdhfs8",
                  "axis_preview_status": "ready_for_guarded_source_specific_axis_preview" if any(row["surface_id"] == "lrg_dr16_fsbao_dmdhfs8" and row["source_surface_status"] == "source_specific_pair_ready_for_axis_preview" for row in source_surface_status_rows) else "not_ready",
                  "axis_fields": "D_M_over_rd|D_H_over_rd|f_sigma8",
                  "truth_boundary": "axis preview only, not validation",
              },
              {
                  "source": "QSO",
                  "surface_id": "qso_dr16_fsbao_dmdhfs8",
                  "axis_preview_status": "ready_for_guarded_source_specific_axis_preview" if any(row["surface_id"] == "qso_dr16_fsbao_dmdhfs8" and row["source_surface_status"] == "source_specific_pair_ready_for_axis_preview" for row in source_surface_status_rows) else "not_ready",
                  "axis_fields": "D_M_over_rs|D_H_over_rs|f_sigma8",
                  "truth_boundary": "axis preview only, not validation",
              },
              {
                  "source": "ELG",
                  "surface_id": "elg_dr16_bao_dvtable",
                  "axis_preview_status": "held_for_grid_likelihood_parser",
                  "axis_fields": "DV_likelihood_grid_or_table",
                  "truth_boundary": "do not convert ELG table into fake covariance",
              },
          ]

          combination_permission_rows = [
              {
                  "combination_scope": "LRG_only",
                  "permission_status": "allowed_for_next_source_specific_axis_preview",
                  "blocked_reason": "not blocked as source-only; still not validation",
              },
              {
                  "combination_scope": "QSO_only",
                  "permission_status": "allowed_for_next_source_specific_axis_preview",
                  "blocked_reason": "not blocked as source-only; still not validation",
              },
              {
                  "combination_scope": "ELG_only",
                  "permission_status": "held_for_dedicated_grid_likelihood_parser",
                  "blocked_reason": "ELG table/grid handling differs from simple covariance pairs",
              },
              {
                  "combination_scope": "LRG_ELG_cross_surface",
                  "permission_status": "blocked",
                  "blocked_reason": "ELG requires grid parser before cross-surface comparison",
              },
              {
                  "combination_scope": "LRG_ELG_QSO_combined_matrix",
                  "permission_status": "blocked",
                  "blocked_reason": "combined matrix remains blocked until LRG/QSO axis previews and ELG grid parser pass",
              },
          ]

          prioritized_next_tests = [
              {
                  "priority": 1,
                  "test_id": "source_specific_lrg_qso_axis_preview",
                  "purpose": "build guarded residual/axis preview for LRG and QSO FSBAO pairs only",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "elg_bao_dvtable_likelihood_parser",
                  "purpose": "handle ELG as table/grid likelihood instead of forcing covariance",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "elg_fsbao_large_grid_parser_or_defer",
                  "purpose": "decide whether to parse the large ELG FSBAO grid in a dedicated workflow",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "combined_matrix_permission_recheck_after_source_parsers",
                  "purpose": "recheck combined LRG/ELG/QSO permission only after source-specific parsers pass",
                  "activated": True,
              },
          ]

          gates = [
              {
                  "gate": "reviewed_candidate_rows_equal_10",
                  "passed": len(reviewed_manifest_rows) == 10,
                  "detail": f"reviewed_candidate_rows = {len(reviewed_manifest_rows)}",
              },
              {
                  "gate": "rejected_v4_222_seed_rows_equal_4",
                  "passed": len(REJECTED_V4_222_SEED_ROWS) == 4,
                  "detail": f"rejected_v4_222_seed_rows = {len(REJECTED_V4_222_SEED_ROWS)}",
              },
              {
                  "gate": "downloaded_count_at_least_9",
                  "passed": downloaded_count >= 9,
                  "detail": f"downloaded_count = {downloaded_count}",
              },
              {
                  "gate": "deferred_large_grid_count_equal_1",
                  "passed": deferred_count == 1,
                  "detail": f"deferred_large_grid_count = {deferred_count}",
              },
              {
                  "gate": "parser_probe_rows_equal_10",
                  "passed": len(parser_probe_rows) == 10,
                  "detail": f"parser_probe_rows = {len(parser_probe_rows)}",
              },
              {
                  "gate": "lrg_bao_pair_ready",
                  "passed": any(row["surface_id"] == "lrg_dr16_bao_dmdh" and row["source_surface_status"] == "source_specific_pair_ready_for_axis_preview" for row in source_surface_status_rows),
                  "detail": "LRG BAO DMDH pair parsed",
              },
              {
                  "gate": "lrg_fsbao_pair_ready",
                  "passed": any(row["surface_id"] == "lrg_dr16_fsbao_dmdhfs8" and row["source_surface_status"] == "source_specific_pair_ready_for_axis_preview" for row in source_surface_status_rows),
                  "detail": "LRG FSBAO DMDHfs8 pair parsed",
              },
              {
                  "gate": "qso_bao_pair_ready",
                  "passed": any(row["surface_id"] == "qso_dr16_bao_dmdh" and row["source_surface_status"] == "source_specific_pair_ready_for_axis_preview" for row in source_surface_status_rows),
                  "detail": "QSO BAO DMDH pair parsed",
              },
              {
                  "gate": "qso_fsbao_pair_ready",
                  "passed": any(row["surface_id"] == "qso_dr16_fsbao_dmdhfs8" and row["source_surface_status"] == "source_specific_pair_ready_for_axis_preview" for row in source_surface_status_rows),
                  "detail": "QSO FSBAO DMDHfs8 pair parsed",
              },
              {
                  "gate": "elg_dvtable_grid_parsed",
                  "passed": any(row["surface_id"] == "elg_dr16_bao_dvtable" and row["source_surface_status"] == "elg_grid_table_ready_for_dedicated_likelihood_parser" for row in source_surface_status_rows),
                  "detail": "ELG DV table parsed as table/grid likelihood",
              },
              {
                  "gate": "elg_large_grid_deferred_not_failed",
                  "passed": any(row["surface_id"] == "elg_dr16_fsbao_gridlikelihood" and row["source_surface_status"] == "deferred_large_grid_needs_dedicated_parser" for row in source_surface_status_rows),
                  "detail": "ELG large FSBAO grid deferred without treating it as failure",
              },
              {
                  "gate": "source_surface_status_rows_equal_6",
                  "passed": len(source_surface_status_rows) == 6,
                  "detail": f"source_surface_status_rows = {len(source_surface_status_rows)}",
              },
              {
                  "gate": "axis_preview_readiness_rows_equal_3",
                  "passed": len(axis_preview_readiness_rows) == 3,
                  "detail": f"axis_preview_readiness_rows = {len(axis_preview_readiness_rows)}",
              },
              {
                  "gate": "combination_permission_rows_equal_5",
                  "passed": len(combination_permission_rows) == 5,
                  "detail": f"combination_permission_rows = {len(combination_permission_rows)}",
              },
              {
                  "gate": "combined_matrix_blocked",
                  "passed": any(row["combination_scope"] == "LRG_ELG_QSO_combined_matrix" and row["permission_status"] == "blocked" for row in combination_permission_rows),
                  "detail": "combined LRG/ELG/QSO matrix remains blocked",
              },
              {
                  "gate": "prioritized_next_tests_equal_4",
                  "passed": len(prioritized_next_tests) == 4,
                  "detail": f"prioritized_next_tests = {len(prioritized_next_tests)}",
              },
              {
                  "gate": "truth_boundary_not_proof",
                  "passed": True,
                  "detail": "truth boundary says this is not proof",
              },
              {
                  "gate": "truth_boundary_not_validation",
                  "passed": True,
                  "detail": "truth boundary says this is not cosmology validation",
              },
              {
                  "gate": "truth_boundary_not_shared_cause",
                  "passed": True,
                  "detail": "truth boundary says this does not claim shared cause",
              },
              {
                  "gate": "selected_next_route_written",
                  "passed": SELECTED_NEXT_ROUTE == "source_specific_lrg_qso_axis_preview_with_elg_grid_likelihood_guard",
                  "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              },
              {
                  "gate": "expected_result_written",
                  "passed": EXPECTED_RESULT == "reviewed_eboss_source_manifest_and_safe_parser_probe_passed_no_validation",
                  "detail": f"expected_result = {EXPECTED_RESULT}",
              },
              {
                  "gate": "one_file_workflow_no_external_python_required",
                  "passed": True,
                  "detail": "workflow embeds parser probe directly in YAML",
              },
          ]

          failed_gates = [row["gate"] for row in gates if not row["passed"]]

          write_csv(OUT / "v4_223_reviewed_manifest_rows.csv", reviewed_manifest_rows)
          write_csv(OUT / "v4_223_rejected_v4_222_seed_rows.csv", REJECTED_V4_222_SEED_ROWS)
          write_csv(OUT / "v4_223_parser_probe_rows.csv", parser_probe_rows)
          write_csv(OUT / "v4_223_source_surface_status_rows.csv", source_surface_status_rows)
          write_csv(OUT / "v4_223_axis_preview_readiness_rows.csv", axis_preview_readiness_rows)
          write_csv(OUT / "v4_223_combination_permission_rows.csv", combination_permission_rows)
          write_csv(OUT / "v4_223_prioritized_next_tests.csv", prioritized_next_tests)
          write_csv(OUT / "v4_223_rule_checks.csv", gates)

          source_lines = []
          for row in source_surface_status_rows:
              source_lines.append(
                  f"{row['source']} {row['surface_id']}: {row['source_surface_status']} "
                  f"(measurement_rows={row['measurement_rows']}, covariance={row['covariance_rows']}x{row['covariance_cols']})"
              )

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in gates if row["passed"]),
              "rules_total": len(gates),
              "failed_gates": failed_gates if failed_gates else "none",
              "reviewed_candidate_rows": len(reviewed_manifest_rows),
              "rejected_v4_222_seed_rows": len(REJECTED_V4_222_SEED_ROWS),
              "downloaded_count": downloaded_count,
              "deferred_large_grid_count": deferred_count,
              "parser_probe_rows": len(parser_probe_rows),
              "source_surface_status_rows": len(source_surface_status_rows),
              "axis_preview_readiness_rows": len(axis_preview_readiness_rows),
              "combination_permission_rows": len(combination_permission_rows),
              "prioritized_next_tests": len(prioritized_next_tests),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "claims_neurotype_data_proves_cosmology": False,
                  "claims_shared_cause": False,
                  "clean_meaning": "v4.223 reviews the v4.222 source candidates, rejects wrong-nearby seed files, safely parses source-specific LRG/QSO pairs, and holds ELG as a table/grid likelihood problem instead of inventing covariance.",
              },
          }

          (OUT / "v4_223_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_lines = [
              "# TAIRID v4.223",
              "",
              "Reviewed eBOSS Source Manifest And Safe Parser Probe",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"reviewed_candidate_rows = {summary['reviewed_candidate_rows']}",
              f"rejected_v4_222_seed_rows = {summary['rejected_v4_222_seed_rows']}",
              f"downloaded_count = {summary['downloaded_count']}",
              f"deferred_large_grid_count = {summary['deferred_large_grid_count']}",
              f"parser_probe_rows = {summary['parser_probe_rows']}",
              f"source_surface_status_rows = {summary['source_surface_status_rows']}",
              f"axis_preview_readiness_rows = {summary['axis_preview_readiness_rows']}",
              f"combination_permission_rows = {summary['combination_permission_rows']}",
              f"prioritized_next_tests = {summary['prioritized_next_tests']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Source readiness:",
              *source_lines,
              "",
              "Clean meaning:",
              "v4.223 corrects the v4.222 manifest seed. It rejects wrong-nearby candidates, uses source-specific DR16 LRG/QSO files, parses LRG and QSO measurement/covariance pairs, and holds ELG as a dedicated table/grid likelihood problem.",
              "",
              "Truth boundary:",
              "This does not validate cosmology, does not prove TAIRID, and does not claim neurotype data proves cosmology. Parsing source files is gap closure, not scientific confirmation.",
          ]
          (OUT / "v4_223_summary.md").write_text("\n".join(summary_lines) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"reviewed_candidate_rows = {summary['reviewed_candidate_rows']}")
          print(f"rejected_v4_222_seed_rows = {summary['rejected_v4_222_seed_rows']}")
          print(f"downloaded_count = {summary['downloaded_count']}")
          print(f"deferred_large_grid_count = {summary['deferred_large_grid_count']}")
          print(f"parser_probe_rows = {summary['parser_probe_rows']}")
          print(f"source_surface_status_rows = {summary['source_surface_status_rows']}")
          print(f"axis_preview_readiness_rows = {summary['axis_preview_readiness_rows']}")
          print(f"combination_permission_rows = {summary['combination_permission_rows']}")
          print(f"prioritized_next_tests = {summary['prioritized_next_tests']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no shared cause.")
          print(f"Output package: {ZIP_NAME}")

          if failed_gates:
              raise SystemExit(f"Failed gates: {failed_gates}")
          PY

      - name: Upload v4.223 output package
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-223-reviewed-eboss-source-manifest-parser-probe-output
          path: |
            tairid_v4_223_reviewed_eboss_source_manifest_parser_probe_output/
            tairid-v4-223-reviewed-eboss-source-manifest-parser-probe-output.zip
