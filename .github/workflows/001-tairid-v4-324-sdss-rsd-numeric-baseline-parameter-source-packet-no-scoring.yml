name: 001 TAIRID v4.324 - SDSS RSD Numeric Baseline Parameter Source Packet No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-no-scoring.yml"
      - ".github/workflows/**"
      - "github/workflows/**"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-numeric-baseline-parameter-source-packet-no-scoring:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Confirm workflow visibility
        run: echo "001 TAIRID v4.324 SDSS RSD Numeric Baseline Parameter Source Packet No Scoring is visible and running."
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run v4.324 SDSS RSD numeric baseline parameter source packet no scoring
        run: |
          python - <<'PY'

          from pathlib import Path
          import csv, json, re, zipfile, urllib.request, html
          VERSION='v4.324'
          EXPECTED_RESULT='v4_324_sdss_rsd_numeric_baseline_parameter_source_packet_no_scoring_passed_no_claims'
          NEXT='handoff_then_v4_325_sdss_rsd_numeric_baseline_parameter_human_review_packet_no_scoring'
          OUT=Path('tairid_v4_324_sdss_rsd_numeric_baseline_parameter_source_packet_output'); OUT.mkdir(exist_ok=True)
          ZIP_NAME='tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output.zip'
          SOURCES=['https://arxiv.org/abs/1807.06209','https://arxiv.org/abs/1807.06210','https://arxiv.org/abs/2007.08991','https://arxiv.org/abs/2007.08997','https://arxiv.org/abs/astro-ph/0507263','https://arxiv.org/abs/0704.0944','https://www.sdss4.org/science/final-bao-and-rsd-measurements/','https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/']
          SPECS=[('omega_m_source_context',['Omega_m','matter density','omegam']),('sigma8_source_context',['sigma8','S_8','amplitude of matter fluctuations']),('growth_index_method_context',['growth index','gamma','growth rate']),('lcdm_parameter_context',['LCDM','Planck','cosmological parameters']),('rsd_growth_context',['fsigma8','f sigma 8','redshift-space distortions','RSD']),('calculator_limit_context',['approximation','likelihood','covariance','model comparison','constraints'])]
          QUESTIONS=[('param_q001','omega_m0','What exact source-backed Omega_m0 / matter-density parameter may be used in the later dry-run calculator?','omega_m_source_context|lcdm_parameter_context'),('param_q002','sigma8_0','What exact source-backed sigma8_0 or equivalent normalization may be used in the later dry-run calculator?','sigma8_source_context|lcdm_parameter_context'),('param_q003','growth_index_gamma','What source or method justifies gamma = 0.55 or another growth-index approximation?','growth_index_method_context|calculator_limit_context'),('param_q004','lcdm_calculator_context','What standard-Lambda-CDM calculator context is allowed for the dry-run comparator?','lcdm_parameter_context|growth_index_method_context'),('param_q005','rsd_definition_bridge','What source ties the parameter calculator output to f_sigma8 / RSD comparison language?','rsd_growth_context|growth_index_method_context'),('param_q006','calculator_limit_policy','What limits must remain around growth-index approximation, covariance, likelihood, and model-comparison claims?','calculator_limit_context')]
          def write_csv(path, rows):
              fields=[]
              for r in rows:
                  for k in r:
                      if k not in fields: fields.append(k)
              with open(path,'w',newline='',encoding='utf-8') as f:
                  w=csv.DictWriter(f,fieldnames=fields); w.writeheader(); w.writerows(rows)
          def fetch(url):
              row={'url':url,'fetch_attempted':True,'fetch_ok':False,'bytes_read':0,'error':'','score_allowed':False,'support_allowed':False}
              data=b''
              try:
                  req=urllib.request.Request(url,headers={'User-Agent':'TAIRID-v4.324-no-claims'})
                  with urllib.request.urlopen(req,timeout=15) as resp:
                      data=resp.read(2500000); row['fetch_ok']=True; row['bytes_read']=len(data)
              except Exception as e: row['error']=type(e).__name__+': '+str(e)
              return row,data
          def clean(data):
              if not data: return ''
              t=data.decode('utf-8','replace')
              t=re.sub(r'<script.*?</script>',' ',t,flags=re.I|re.S); t=re.sub(r'<style.*?</style>',' ',t,flags=re.I|re.S); t=re.sub(r'<[^>]+>',' ',t)
              return html.unescape(' '.join(t.split()))
          def window(t,terms):
              low=t.lower(); hits=[]
              for term in terms:
                  idx=low.find(term.lower())
                  if idx>=0: hits.append(idx)
              if not hits: return ''
              i=min(hits); return t[max(0,i-540):i+540][:1600]
          fetch_rows=[]; quote_rows=[]
          for url in SOURCES:
              fr,data=fetch(url); fetch_rows.append(fr); txt=clean(data)
              for qc,terms in SPECS:
                  win=window(txt,terms)
                  quote_rows.append({'quote_id':f'parameter_quote_{len(quote_rows)+1:03d}','quote_class':qc,'source_url':url,'candidate_quote_window':win,'quote_status':'candidate_source_window_not_approval' if win else 'missing_or_unfetched_window','score_allowed':False,'support_allowed':False})
          candidates=[]
          for q in quote_rows:
              ok=bool(q['candidate_quote_window'])
              candidates.append({'candidate_id':f'parameter_source_candidate_{len(candidates)+1:03d}','candidate_class':q['quote_class'],'source_url':q['source_url'],'candidate_quote_available':ok,'candidate_quote_window':q['candidate_quote_window'],'candidate_use':'human_review_only_not_approved' if ok else 'not_available_or_fetch_failed','parameter_value_approved_now':False,'numeric_baseline_approved_now':False,'score_allowed':False,'support_allowed':False})
          packet=[]; template=[]
          for n,(qid,param,question,classes) in enumerate(QUESTIONS,1):
              wanted=set(classes.split('|'))
              matching=[c for c in candidates if c['candidate_class'] in wanted]
              avail=[c for c in matching if c['candidate_quote_available']]
              ranked=(avail[:4] if avail else matching[:4]) or [{'candidate_id':'','candidate_class':'','source_url':'','candidate_quote_available':False,'candidate_quote_window':''}]
              for c in ranked:
                  packet.append({'review_id':f'parameter_review_{len(packet)+1:03d}','question_id':qid,'parameter_or_method':param,'question':question,'candidate_id':c.get('candidate_id',''),'candidate_class':c.get('candidate_class',''),'source_url':c.get('source_url',''),'candidate_quote_available':c.get('candidate_quote_available',False),'candidate_quote_window':c.get('candidate_quote_window',''),'approval_status_now':'not_approved','score_allowed':False,'support_allowed':False})
              first=next((r for r in packet if r['question_id']==qid and r['candidate_quote_available']),{})
              template.append({'decision_id':f'parameter_decision_{n:03d}','question_id':qid,'parameter_or_method':param,'question':question,'human_decision':'','allowed_decisions':'accept_source_candidate|edit_needed|reject|keep_blocked','selected_source_url_or_citation':first.get('source_url',''),'quoted_or_precise_source_text':first.get('candidate_quote_window',''),'answer_summary':'','reviewer_note':'','claim_limit_must_remain':'no_scoring/no_claims','parameter_value_approval_allowed_now':False,'numeric_baseline_approval_allowed_now':False,'score_allowed':False,'support_allowed':False})
          checklist=[{'check_id':f'param_check_{i:03d}','review_check':txt,'required':True} for i,txt in enumerate(['Does the source justify the parameter or method, instead of merely mentioning it?','Does the decision avoid approving numeric values before a later parameter-value gate?','Does the decision keep observed SDSS scoring blocked?','Does the decision keep covariance and likelihood claims blocked?','Does the decision preserve no_scoring/no_claims?','Does the decision avoid treating dry-run calculator values as approved baselines?'],1)]
          gates=[{'gate':'fetch_rows_equal_8','passed':len(fetch_rows)==8},{'gate':'quote_rows_equal_48','passed':len(quote_rows)==48},{'gate':'candidates_equal_48','passed':len(candidates)==48},{'gate':'template_rows_equal_6','passed':len(template)==6},{'gate':'no_parameter_approval','passed':True},{'gate':'no_numeric_baseline_approval','passed':True},{'gate':'no_observed_scoring','passed':True},{'gate':'handoff_marker','passed':True}]
          failed=[g['gate'] for g in gates if not g['passed']]
          write_csv(OUT/'v4_324_source_fetch_rows.csv',fetch_rows)
          write_csv(OUT/'v4_324_source_quote_rows.csv',quote_rows)
          write_csv(OUT/'SDSS_RSD_NUMERIC_BASELINE_PARAMETER_SOURCE_PACKET_v4_324_NO_APPROVAL.csv',candidates)
          write_csv(OUT/'SDSS_RSD_NUMERIC_BASELINE_PARAMETER_HUMAN_REVIEW_PACKET_v4_324_NO_APPROVAL.csv',packet)
          write_csv(OUT/'SDSS_RSD_NUMERIC_BASELINE_PARAMETER_DECISION_TEMPLATE_v4_324_FILLABLE.csv',template)
          write_csv(OUT/'v4_324_review_checklist_rows.csv',checklist)
          write_csv(OUT/'v4_324_rule_checks.csv',gates)
          summary={'version':VERSION,'expected_result':EXPECTED_RESULT,'rules_passed':sum(g['passed'] for g in gates),'rules_total':len(gates),'failed_gates':failed if failed else 'none','source_fetch_rows':len(fetch_rows),'source_fetch_ok_rows':sum(1 for r in fetch_rows if r['fetch_ok']),'source_quote_rows':len(quote_rows),'parameter_source_candidate_rows':len(candidates),'candidate_quote_available_rows':sum(1 for r in candidates if r['candidate_quote_available']),'question_packet_rows':len(packet),'decision_template_rows':len(template),'parameter_values_approved':False,'numeric_baseline_values_filled':False,'approved_baseline_values':0,'observed_values_loaded':False,'score_valid':False,'support_allowed':False,'selected_next_route':NEXT,'handoff_recommended_now':True}
          (OUT/'v4_324_summary.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          (OUT/'v4_324_summary.md').write_text('\n'.join(['# TAIRID v4.324 SDSS RSD Numeric Baseline Parameter Source Packet No Scoring','',f"Expected result: {EXPECTED_RESULT}",f"{summary['rules_passed']} / {summary['rules_total']} rules passed",f"failed_gates = {summary['failed_gates']}",f"source_fetch_rows = {summary['source_fetch_rows']}",f"parameter_source_candidate_rows = {summary['parameter_source_candidate_rows']}",f"decision_template_rows = {summary['decision_template_rows']}",f"parameter_values_approved = {summary['parameter_values_approved']}",f"numeric_baseline_values_filled = {summary['numeric_baseline_values_filled']}",f"observed_values_loaded = {summary['observed_values_loaded']}",f"score_valid = {summary['score_valid']}",f"support_allowed = {summary['support_allowed']}",f"selected_next_route = {NEXT}",'','Handoff boundary: stop after v4.324, consolidate, then continue in a new thread with v4.325.','Truth boundary: no proof, no validation, no support, no observed scoring, no residual, no p-value, no likelihood.']),encoding='utf-8')
          (OUT/'SDSS_RSD_NUMERIC_BASELINE_PARAMETER_SOURCE_PACKET_v4_324_README.md').write_text('This workflow gathers parameter-source candidates and writes a fillable human-review template. It also marks a handoff boundary after v4.324. No parameter values, baselines, observed values, scores, support claims, evidence claims, or validation claims are approved.\n',encoding='utf-8')
          with zipfile.ZipFile(ZIP_NAME,'w',zipfile.ZIP_DEFLATED) as z:
              for p in sorted(OUT.rglob('*')):
                  if p.is_file(): z.write(p,p.as_posix())
          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"source_fetch_rows = {summary['source_fetch_rows']}")
          print(f"source_fetch_ok_rows = {summary['source_fetch_ok_rows']}")
          print(f"source_quote_rows = {summary['source_quote_rows']}")
          print(f"parameter_source_candidate_rows = {summary['parameter_source_candidate_rows']}")
          print(f"candidate_quote_available_rows = {summary['candidate_quote_available_rows']}")
          print(f"decision_template_rows = {summary['decision_template_rows']}")
          print(f"parameter_values_approved = {summary['parameter_values_approved']}")
          print(f"numeric_baseline_values_filled = {summary['numeric_baseline_values_filled']}")
          print(f"observed_values_loaded = {summary['observed_values_loaded']}")
          print(f"score_valid = {summary['score_valid']}")
          print(f"support_allowed = {summary['support_allowed']}")
          print(f"selected_next_route = {NEXT}")
          if failed: raise SystemExit('failed gates: '+str(failed))

          PY
      - name: Upload v4.324 SDSS RSD numeric baseline parameter source packet output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output
          path: |
            tairid_v4_324_sdss_rsd_numeric_baseline_parameter_source_packet_output/
            tairid-v4-324-sdss-rsd-numeric-baseline-parameter-source-packet-output.zip
