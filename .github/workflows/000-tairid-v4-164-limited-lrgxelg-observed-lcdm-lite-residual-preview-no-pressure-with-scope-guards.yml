name: 000 TAIRID v4.164 - Limited LRGxELG Observed LCDM Lite Residual Preview No Pressure With Scope Guards

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  limited-lrgxelg-observed-lcdm-lite-residual-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run guarded residual preview
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/tairid_v4_164_limited_lrgxelg_residual_preview
          cat > /tmp/tairid_v4_164_residual_preview.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path
          from statistics import mean

          OUT = Path("artifacts/tairid_v4_164_limited_lrgxelg_residual_preview")
          OUT.mkdir(parents=True, exist_ok=True)

          EXPECTED_LABEL = "limited_lrgxelg_observed_lcdm_lite_residual_preview_passed_residual_artifacts_written_no_pressure_no_validation"

          # Observed limited LRGxELG values carried forward from the pinned/parser-locked
          # two-redshift product. These are observed-side values only.
          # LCDM-lite references are the v4.159 diagnostic prototype values.
          # This workflow intentionally does not use CAMB, CLASS, Planck chains,
          # reference covariance, QSO covariance, or full eBOSS covariance.
          rows = [
              {
                  "order": 1,
                  "label": "DM_ov_rd_z0p70",
                  "z": 0.700,
                  "observable": "DM/rd",
                  "role": "geometry_transverse_reach",
                  "observed_value": 17.954174,
                  "observed_sigma": 0.508712,
                  "lcdm_lite_reference_value": 17.5805195461
              },
              {
                  "order": 2,
                  "label": "DH_ov_rd_z0p70",
                  "z": 0.700,
                  "observable": "DH/rd",
                  "role": "geometry_radial_pacing_access",
                  "observed_value": 21.221161,
                  "observed_sigma": 1.197674,
                  "lcdm_lite_reference_value": 20.2449335870
              },
              {
                  "order": 3,
                  "label": "fsigma8_z0p70",
                  "z": 0.700,
                  "observable": "fσ8",
                  "role": "growth_consolidation",
                  "observed_value": 0.433572,
                  "observed_sigma": 0.050037,
                  "lcdm_lite_reference_value": 0.4618546966
              },
              {
                  "order": 4,
                  "label": "DM_ov_rd_z0p845",
                  "z": 0.845,
                  "observable": "DM/rd",
                  "role": "geometry_transverse_reach",
                  "observed_value": 18.896851,
                  "observed_sigma": 0.776274,
                  "lcdm_lite_reference_value": 20.3899796593
              },
              {
                  "order": 5,
                  "label": "DH_ov_rd_z0p845",
                  "z": 0.845,
                  "observable": "DH/rd",
                  "role": "geometry_radial_pacing_access",
                  "observed_value": 20.910056,
                  "observed_sigma": 2.861697,
                  "lcdm_lite_reference_value": 18.5350397709
              },
              {
                  "order": 6,
                  "label": "fsigma8_z0p845",
                  "z": 0.845,
                  "observable": "fσ8",
                  "role": "growth_consolidation",
                  "observed_value": 0.296822,
                  "observed_sigma": 0.081385,
                  "lcdm_lite_reference_value": 0.4480660425
              }
          ]

          expected_order = [
              "DM_ov_rd_z0p70",
              "DH_ov_rd_z0p70",
              "fsigma8_z0p70",
              "DM_ov_rd_z0p845",
              "DH_ov_rd_z0p845",
              "fsigma8_z0p845"
          ]

          for r in rows:
              obs = float(r["observed_value"])
              ref = float(r["lcdm_lite_reference_value"])
              sig = float(r["observed_sigma"])
              residual = obs - ref
              fractional = residual / ref
              r["residual_observed_minus_lcdm_lite"] = residual
              r["fractional_residual"] = fractional
              r["percent_residual"] = 100.0 * fractional
              r["absolute_percent_residual"] = abs(100.0 * fractional)
              r["observed_sigma_units_preview_not_pressure"] = residual / sig
              r["absolute_observed_sigma_units_preview_not_pressure"] = abs(residual / sig)
              if residual > 0:
                  r["direction"] = "observed_above_lcdm_lite"
              elif residual < 0:
                  r["direction"] = "observed_below_lcdm_lite"
              else:
                  r["direction"] = "observed_equals_lcdm_lite"

          csv_fields = [
              "order",
              "label",
              "z",
              "observable",
              "role",
              "observed_value",
              "observed_sigma",
              "lcdm_lite_reference_value",
              "residual_observed_minus_lcdm_lite",
              "fractional_residual",
              "percent_residual",
              "absolute_percent_residual",
              "observed_sigma_units_preview_not_pressure",
              "absolute_observed_sigma_units_preview_not_pressure",
              "direction"
          ]

          with (OUT / "observed_lcdm_lite_residual_preview.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=csv_fields)
              writer.writeheader()
              for r in rows:
                  writer.writerow({k: r[k] for k in csv_fields})

          (OUT / "observed_lcdm_lite_residual_preview.json").write_text(
              json.dumps(rows, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          roles = sorted(set(r["role"] for r in rows))
          role_summary = []
          for role in roles:
              subset = [r for r in rows if r["role"] == role]
              role_summary.append({
                  "role": role,
                  "n": len(subset),
                  "mean_percent_residual": mean(r["percent_residual"] for r in subset),
                  "mean_absolute_percent_residual": mean(r["absolute_percent_residual"] for r in subset),
                  "max_absolute_percent_residual": max(r["absolute_percent_residual"] for r in subset),
                  "mean_observed_sigma_units_preview_not_pressure": mean(r["observed_sigma_units_preview_not_pressure"] for r in subset),
                  "max_absolute_observed_sigma_units_preview_not_pressure": max(r["absolute_observed_sigma_units_preview_not_pressure"] for r in subset)
              })

          with (OUT / "role_level_residual_summary.csv").open("w", newline="", encoding="utf-8") as f:
              fields = list(role_summary[0].keys())
              writer = csv.DictWriter(f, fieldnames=fields)
              writer.writeheader()
              for r in role_summary:
                  writer.writerow(r)

          (OUT / "role_level_residual_summary.json").write_text(
              json.dumps(role_summary, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          z_summary = []
          for z in sorted(set(r["z"] for r in rows)):
              subset = [r for r in rows if r["z"] == z]
              z_summary.append({
                  "z": z,
                  "n": len(subset),
                  "mean_percent_residual": mean(r["percent_residual"] for r in subset),
                  "mean_absolute_percent_residual": mean(r["absolute_percent_residual"] for r in subset),
                  "max_absolute_percent_residual": max(r["absolute_percent_residual"] for r in subset),
                  "largest_abs_percent_label": max(subset, key=lambda x: x["absolute_percent_residual"])["label"],
                  "largest_abs_observed_sigma_units_label": max(subset, key=lambda x: x["absolute_observed_sigma_units_preview_not_pressure"])["label"]
              })

          with (OUT / "redshift_level_residual_summary.csv").open("w", newline="", encoding="utf-8") as f:
              fields = list(z_summary[0].keys())
              writer = csv.DictWriter(f, fieldnames=fields)
              writer.writeheader()
              for r in z_summary:
                  writer.writerow(r)

          (OUT / "redshift_level_residual_summary.json").write_text(
              json.dumps(z_summary, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          max_abs_percent = max(rows, key=lambda r: r["absolute_percent_residual"])
          max_abs_sigma_preview = max(rows, key=lambda r: r["absolute_observed_sigma_units_preview_not_pressure"])

          # Pure-SVG bar chart. No third-party plotting dependency is needed.
          def write_percent_svg():
              width = 980
              height = 520
              left = 270
              right = 40
              top = 50
              row_h = 58
              axis_x = 560
              max_abs = max(r["absolute_percent_residual"] for r in rows)
              scale = 300 / max_abs if max_abs > 0 else 1
              parts = []
              parts.append(f'<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}" viewBox="0 0 {width} {height}">')
              parts.append('<rect width="100%" height="100%" fill="white"/>')
              parts.append('<text x="30" y="30" font-family="Arial" font-size="18" font-weight="bold">v4.164 Observed minus LCDM-lite percent residuals</text>')
              parts.append(f'<line x1="{axis_x}" y1="{top-10}" x2="{axis_x}" y2="{top+row_h*len(rows)}" stroke="black" stroke-width="1"/>')
              for i, r in enumerate(rows):
                  y = top + i * row_h
                  pct = r["percent_residual"]
                  bar_w = abs(pct) * scale
                  if pct >= 0:
                      x = axis_x
                  else:
                      x = axis_x - bar_w
                  parts.append(f'<text x="30" y="{y+22}" font-family="Arial" font-size="14">{r["label"]}</text>')
                  parts.append(f'<rect x="{x:.2f}" y="{y+6}" width="{bar_w:.2f}" height="24" fill="#808080"/>')
                  parts.append(f'<text x="{axis_x + 310}" y="{y+24}" font-family="Arial" font-size="14">{pct:+.3f}%</text>')
              parts.append('<text x="30" y="500" font-family="Arial" font-size="12">Diagnostic only: no reference covariance, no pressure, no validation.</text>')
              parts.append('</svg>')
              (OUT / "percent_residual_bar_chart.svg").write_text("\n".join(parts), encoding="utf-8")

          def write_sigma_svg():
              width = 980
              height = 520
              axis_x = 560
              top = 50
              row_h = 58
              max_abs = max(r["absolute_observed_sigma_units_preview_not_pressure"] for r in rows)
              scale = 300 / max_abs if max_abs > 0 else 1
              parts = []
              parts.append(f'<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}" viewBox="0 0 {width} {height}">')
              parts.append('<rect width="100%" height="100%" fill="white"/>')
              parts.append('<text x="30" y="30" font-family="Arial" font-size="18" font-weight="bold">v4.164 Observed-sigma units preview, not pressure</text>')
              parts.append(f'<line x1="{axis_x}" y1="{top-10}" x2="{axis_x}" y2="{top+row_h*len(rows)}" stroke="black" stroke-width="1"/>')
              for i, r in enumerate(rows):
                  y = top + i * row_h
                  val = r["observed_sigma_units_preview_not_pressure"]
                  bar_w = abs(val) * scale
                  x = axis_x if val >= 0 else axis_x - bar_w
                  parts.append(f'<text x="30" y="{y+22}" font-family="Arial" font-size="14">{r["label"]}</text>')
                  parts.append(f'<rect x="{x:.2f}" y="{y+6}" width="{bar_w:.2f}" height="24" fill="#808080"/>')
                  parts.append(f'<text x="{axis_x + 310}" y="{y+24}" font-family="Arial" font-size="14">{val:+.3f} observed-sigma units</text>')
              parts.append('<text x="30" y="500" font-family="Arial" font-size="12">Uses observed diagonal sigma only. This is not a full-covariance pressure statistic.</text>')
              parts.append('</svg>')
              (OUT / "observed_sigma_units_preview_bar_chart.svg").write_text("\n".join(parts), encoding="utf-8")

          write_percent_svg()
          write_sigma_svg()

          shape_read = {
              "diagnostic_interpretation": "Observed values differ from the LCDM-lite prototype in a mixed geometry-growth pattern. Growth is below LCDM-lite at both redshifts, radial geometry is above at both redshifts, and transverse geometry changes sign across redshift.",
              "not_allowed_interpretation": "This is not a pressure result and not evidence for or against TAIRID validation because reference covariance and full likelihood treatment are missing.",
              "largest_fractional_residual": {
                  "label": max_abs_percent["label"],
                  "percent_residual": max_abs_percent["percent_residual"]
              },
              "largest_observed_sigma_units_preview_not_pressure": {
                  "label": max_abs_sigma_preview["label"],
                  "observed_sigma_units_preview_not_pressure": max_abs_sigma_preview["observed_sigma_units_preview_not_pressure"]
              },
              "growth_direction": "observed_below_lcdm_lite_at_both_redshifts",
              "radial_geometry_direction": "observed_above_lcdm_lite_at_both_redshifts",
              "transverse_geometry_direction": "mixed_sign_across_redshift"
          }

          scope_guard_report = {
              "scope": "limited_lrgxelg_two_redshift_observed_lcdm_lite_residual_preview",
              "allowed": [
                  "compare observed six-slot values to v4.159 LCDM-lite prototype values",
                  "write residuals",
                  "write percent differences",
                  "write observed-diagonal-sigma preview values marked not pressure",
                  "write role-level and redshift-level summaries",
                  "write visual diagnostic SVG charts"
              ],
              "blocked": [
                  "final pressure",
                  "full covariance chi-square",
                  "likelihood",
                  "BIC",
                  "posterior comparison",
                  "Planck posterior reference claim",
                  "CAMB or CLASS reference claim",
                  "reference covariance claim",
                  "QSO covariance claim",
                  "full eBOSS covariance claim",
                  "TAIRID validation claim"
              ],
              "truth_boundary": "This workflow compares real observed limited LRGxELG numbers to a diagnostic LCDM-lite prototype reference vector. It does not include reference covariance and therefore does not compute final pressure."
          }

          blocked_claims_report = {
              "pressure_claim_blocked": True,
              "validation_claim_blocked": True,
              "qso_covariance_claim_blocked": True,
              "full_eboss_covariance_claim_blocked": True,
              "reference_covariance_claim_blocked": True,
              "planck_posterior_claim_blocked": True,
              "public_facing_proof_claim_blocked": True
          }

          dependency_status = {
              "observed_limited_lrgxelg_values": "embedded_from_prior_pinned_parser_lane",
              "lcdm_lite_reference_vector": "embedded_from_v4_159_prototype",
              "observed_covariance": "not_used_for_full_pressure_here",
              "reference_covariance": "missing",
              "qso_covariance": "missing",
              "full_eboss_covariance_or_overlap_model": "missing",
              "final_pressure_methodology": "not_active_in_this_workflow"
          }

          health_rules = [
              ("expected_row_count_is_six", len(rows) == 6),
              ("expected_order_matches", [r["label"] for r in rows] == expected_order),
              ("all_observed_values_finite", all(math.isfinite(r["observed_value"]) for r in rows)),
              ("all_reference_values_finite", all(math.isfinite(r["lcdm_lite_reference_value"]) for r in rows)),
              ("all_observed_sigmas_positive", all(r["observed_sigma"] > 0 for r in rows)),
              ("all_reference_values_positive", all(r["lcdm_lite_reference_value"] > 0 for r in rows)),
              ("all_residuals_finite", all(math.isfinite(r["residual_observed_minus_lcdm_lite"]) for r in rows)),
              ("all_fractional_residuals_finite", all(math.isfinite(r["fractional_residual"]) for r in rows)),
              ("all_sigma_preview_values_finite", all(math.isfinite(r["observed_sigma_units_preview_not_pressure"]) for r in rows)),
              ("role_summary_written", True),
              ("redshift_summary_written", True),
              ("percent_residual_svg_written", True),
              ("observed_sigma_units_svg_written", True),
              ("largest_fractional_residual_identified", bool(max_abs_percent["label"])),
              ("largest_observed_sigma_preview_identified", bool(max_abs_sigma_preview["label"])),
              ("growth_below_lcdm_lite_both_redshifts", all(r["residual_observed_minus_lcdm_lite"] < 0 for r in rows if r["role"] == "growth_consolidation")),
              ("radial_geometry_above_lcdm_lite_both_redshifts", all(r["residual_observed_minus_lcdm_lite"] > 0 for r in rows if r["role"] == "geometry_radial_pacing_access")),
              ("transverse_geometry_has_mixed_sign", len(set(1 if r["residual_observed_minus_lcdm_lite"] > 0 else -1 for r in rows if r["role"] == "geometry_transverse_reach")) == 2),
              ("no_pressure_computed", True),
              ("no_reference_covariance_generated", True),
              ("no_likelihood_or_bic_computed", True),
              ("no_qso_or_full_eboss_claim_made", True),
              ("no_validation_claim_made", True),
              ("expected_label_recorded", EXPECTED_LABEL.endswith("no_pressure_no_validation"))
          ]

          parser_health = {
              "rule_pass_count": sum(1 for _, ok in health_rules if ok),
              "rule_total_count": len(health_rules),
              "failed_gates": [name for name, ok in health_rules if not ok],
              "rules": [{"rule": name, "passed": bool(ok)} for name, ok in health_rules],
              "expected_result_label": EXPECTED_LABEL
          }

          summary = {
              "workflow": "TAIRID v4.164 - Limited LRGxELG observed LCDM-lite residual preview",
              "expected_result_label": EXPECTED_LABEL,
              "parser_health": parser_health,
              "largest_fractional_residual": shape_read["largest_fractional_residual"],
              "largest_observed_sigma_units_preview_not_pressure": shape_read["largest_observed_sigma_units_preview_not_pressure"],
              "shape_read": shape_read,
              "scope_guard_report": scope_guard_report,
              "blocked_claims_report": blocked_claims_report,
              "dependency_status": dependency_status,
              "selected_next_route": "limited_lrgxelg_residual_preview_review_and_covariance_boundary_decision_with_scope_guards"
          }

          (OUT / "shape_interpretation_report.json").write_text(json.dumps(shape_read, indent=2, sort_keys=True), encoding="utf-8")
          (OUT / "scope_guard_report.json").write_text(json.dumps(scope_guard_report, indent=2, sort_keys=True), encoding="utf-8")
          (OUT / "blocked_claims_report.json").write_text(json.dumps(blocked_claims_report, indent=2, sort_keys=True), encoding="utf-8")
          (OUT / "dependency_status_report.json").write_text(json.dumps(dependency_status, indent=2, sort_keys=True), encoding="utf-8")
          (OUT / "parser_health_report.json").write_text(json.dumps(parser_health, indent=2, sort_keys=True), encoding="utf-8")
          (OUT / "summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True), encoding="utf-8")

          md_lines = []
          md_lines.append("# TAIRID v4.164 - Limited LRGxELG Observed vs LCDM-lite Residual Preview")
          md_lines.append("")
          md_lines.append(f"Expected result: `{EXPECTED_LABEL}`")
          md_lines.append("")
          md_lines.append("## Truth boundary")
          md_lines.append("")
          md_lines.append("This compares real observed limited LRGxELG values against the v4.159 LCDM-lite prototype reference vector. It does not include reference covariance, so it does not compute final pressure, full chi-square, likelihood, BIC, posterior comparison, or validation.")
          md_lines.append("")
          md_lines.append("## Residual table")
          md_lines.append("")
          md_lines.append("| label | observed | LCDM-lite reference | residual | percent residual | observed-sigma units preview, not pressure |")
          md_lines.append("|---|---:|---:|---:|---:|---:|")
          for r in rows:
              md_lines.append(
                  f"| {r['label']} | {r['observed_value']:.10g} | {r['lcdm_lite_reference_value']:.10g} | "
                  f"{r['residual_observed_minus_lcdm_lite']:+.10g} | {r['percent_residual']:+.3f}% | "
                  f"{r['observed_sigma_units_preview_not_pressure']:+.3f} |"
              )
          md_lines.append("")
          md_lines.append("## Clean shape read")
          md_lines.append("")
          md_lines.append(shape_read["diagnostic_interpretation"])
          md_lines.append("")
          md_lines.append("Growth is below LCDM-lite at both redshifts. Radial geometry is above LCDM-lite at both redshifts. Transverse geometry changes sign across redshift.")
          md_lines.append("")
          md_lines.append("## Largest diagnostic differences")
          md_lines.append("")
          md_lines.append(f"Largest fractional residual: `{max_abs_percent['label']}` at `{max_abs_percent['percent_residual']:+.3f}%`.")
          md_lines.append(f"Largest observed-sigma-units preview: `{max_abs_sigma_preview['label']}` at `{max_abs_sigma_preview['observed_sigma_units_preview_not_pressure']:+.3f}` observed-sigma units.")
          md_lines.append("")
          md_lines.append("## Next route")
          md_lines.append("")
          md_lines.append("`limited_lrgxelg_residual_preview_review_and_covariance_boundary_decision_with_scope_guards`")
          md_lines.append("")
          md_lines.append("This next route should decide whether to stop, visualize, or build a covariance-boundary method. It still must not pretend that observed-sigma preview values are final pressure.")

          (OUT / "summary.md").write_text("\n".join(md_lines) + "\n", encoding="utf-8")

          if parser_health["failed_gates"]:
              raise SystemExit("Failed gates: " + ", ".join(parser_health["failed_gates"]))

          print(json.dumps({
              "expected_result_label": EXPECTED_LABEL,
              "rule_pass_count": parser_health["rule_pass_count"],
              "rule_total_count": parser_health["rule_total_count"],
              "failed_gates": parser_health["failed_gates"],
              "largest_fractional_residual_label": max_abs_percent["label"],
              "largest_fractional_residual_percent": max_abs_percent["percent_residual"],
              "largest_observed_sigma_preview_label": max_abs_sigma_preview["label"],
              "largest_observed_sigma_preview": max_abs_sigma_preview["observed_sigma_units_preview_not_pressure"]
          }, indent=2, sort_keys=True))
          PY
          python /tmp/tairid_v4_164_residual_preview.py

      - name: Upload v4.164 residual preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-164-limited-lrgxelg-observed-lcdm-lite-residual-preview-output
          path: artifacts/tairid_v4_164_limited_lrgxelg_residual_preview
          if-no-files-found: error
