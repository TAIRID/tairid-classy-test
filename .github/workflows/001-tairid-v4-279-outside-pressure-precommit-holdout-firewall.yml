                  "item": "elg_equivalent_packet_ready",
                  "value": False,
                  "meaning": "ELG packet remains unready.",
                  "carry_forward_status": "elg_packet_missing",
              },
              {
                  "inherited_from": "v4.278",
                  "item": "selected_next_route",
