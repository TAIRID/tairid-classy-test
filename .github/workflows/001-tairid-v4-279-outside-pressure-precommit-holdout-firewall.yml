                  "meaning": "Prior route was internal mapping; current route intentionally switches to outside pressure.",
                  "carry_forward_status": "route_override_for_external_pressure",
              },
          ]

          candidate_files = []
          for p in Path(".").rglob("*"):
              if p.is_file() and is_candidate_file(p):
                  try:
                      size = p.stat().st_size
                  except Exception:
                      size = None
                  candidate_files.append({
                      "path": p.as_posix(),
                      "suffix": p.suffix.lower(),
                      "size_bytes": size,
                      "origin_class": file_origin_class(p),
                      "use_as_evidence": False,
                      "allowed_use": "lead_only" if file_origin_class(p) != "internal_rail_artifact_or_workflow" else "internal_history_only",
                  })
          candidate_files = sorted(candidate_files, key=lambda row: row["path"])[:500]

          internal_files = [row for row in candidate_files if row["origin_class"] == "internal_rail_artifact_or_workflow"]
          possible_data_files = [row for row in candidate_files if row["origin_class"] == "possible_data_file_needs_provenance"]
