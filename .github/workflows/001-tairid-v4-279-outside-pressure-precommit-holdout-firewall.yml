                  "carry_forward_status": "mapping_leads_not_data",
              },
              {
                  "inherited_from": "v4.278",
                  "item": "elg_possible_schema_mapping_leads",
                  "value": 9,
                  "meaning": "ELG schema-mapping leads existed.",
                  "carry_forward_status": "mapping_leads_not_data",
              },
              {
                  "inherited_from": "v4.278",
                  "item": "candidate_reader_probe_completed",
                  "value": True,
                  "meaning": "Reader probe completed without validation.",
                  "carry_forward_status": "probe_ready",
              },
              {
                  "inherited_from": "v4.278",
                  "item": "schema_mapping_plan_allowed_next",
                  "value": True,
                  "meaning": "Internal schema mapping was allowed next.",
                  "carry_forward_status": "internal_path_available_but_not_outside_pressure",
              },
              {
                  "inherited_from": "v4.278",
                  "item": "lrg_equivalent_packet_ready",
                  "value": False,
