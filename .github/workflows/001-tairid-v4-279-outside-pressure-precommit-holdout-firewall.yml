name: 001 TAIRID v4.279 - Outside Pressure Precommit Holdout Firewall

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-279-outside-pressure-precommit-holdout-firewall.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  outside-pressure-precommit-holdout-firewall:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.279 Outside Pressure Precommit Holdout Firewall is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.279 outside pressure precommit holdout firewall
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import re
          import zipfile

          VERSION = "v4.279"
          ROUTE = "outside_pressure_precommit_holdout_firewall_after_v4_278"
          EXPECTED_RESULT = "v4_279_outside_pressure_precommit_holdout_firewall_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_280_external_primary_source_manifest_builder_or_fetch_probe_no_inference"

          OUT = Path("tairid_v4_279_outside_pressure_precommit_holdout_firewall_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-279-outside-pressure-precommit-holdout-firewall-output.zip"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def is_candidate_file(path):
              lower = path.as_posix().lower()
              if ".git/" in lower or "node_modules/" in lower:
                  return False
              if path.suffix.lower() not in [".csv", ".json", ".txt", ".md", ".yaml", ".yml", ".tsv"]:
                  return False
              keywords = ["lrg", "elg", "qso", "rsd", "fsigma", "f_sigma", "growth", "bao", "cov", "covariance", "zhao", "residual", "tracer", "desi", "eboss", "boss", "wigglez", "kids", "planck", "pantheon", "shoes"]
              return any(k in lower for k in keywords)

          def file_origin_class(path):
              p = path.as_posix().lower()
              if p.startswith("./"):
                  p = p[2:]
              internal_prefixes = [
                  ".github/workflows/",
                  "tairid_",
                  "results/",
                  "artifacts/",
              ]
              if any(p.startswith(prefix) for prefix in internal_prefixes):
                  return "internal_rail_artifact_or_workflow"
              if "output" in p or "package" in p or "summary" in p:
                  return "internal_rail_artifact_or_workflow"
              if p.startswith("data/") or p.endswith(".dat") or p.endswith(".fits") or p.endswith(".gz"):
                  return "possible_data_file_needs_provenance"
              return "unknown_or_context_file"

          inherited_v4_278_rows = [
              {
                  "inherited_from": "v4.278",
                  "item": "rules",
                  "value": "40 / 40 passed",
                  "meaning": "Candidate file reader probe passed.",
                  "carry_forward_status": "ready_for_outside_pressure_firewall",
              },
              {
                  "inherited_from": "v4.278",
                  "item": "candidate_file_rows",
                  "value": 187,
                  "meaning": "Candidate filename leads were found.",
                  "carry_forward_status": "leads_only_not_validated",
              },
              {
                  "inherited_from": "v4.278",
                  "item": "probe_rows",
                  "value": 120,
                  "meaning": "Headers/keys/tokens/tiny samples were inspected.",
                  "carry_forward_status": "schema_probe_only",
              },
              {
                  "inherited_from": "v4.278",
                  "item": "lrg_possible_schema_mapping_leads",
                  "value": 9,
