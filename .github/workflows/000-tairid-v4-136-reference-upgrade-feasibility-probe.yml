name: 000 TAIRID v4.136 Reference Upgrade Feasibility Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-136-reference-upgrade-feasibility-probe.yml"

jobs:
  tairid-v4-136-reference-upgrade-feasibility-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.136 reference upgrade feasibility probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_136_reference_upgrade_feasibility_probe

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_136_reference_upgrade_feasibility_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_136_reference_upgrade_feasibility_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not recompute eBOSS pressure.",
              "This checks whether the reference side can be upgraded beyond raw interpolation using repository files or a documented lightweight LCDM growth approximation.",
              "A pass means the strongest currently feasible reference-upgrade route is selected and bounded for the next diagnostic probe."
          ]

          UPSTREAM_LOCKS = {
              "v4_135_CAMB_chain_expanded_reference_upgrade_design": {
                  "readiness_label": "CAMB_chain_expanded_reference_upgrade_design_passed_ready_for_reference_upgrade_feasibility_probe",
                  "upstream_covariance_ingested": False,
                  "upstream_usable_covariance_locked": False,
                  "upstream_reference_fallback_still_active": True,
                  "expanded_reference_target_count": 12,
                  "reference_upgrade_option_count": 4,
                  "upgrade_requirement_count": 6,
                  "upgrade_gate_count": 6,
                  "eBOSS_priority_targets_present": True,
                  "CAMB_run": False,
                  "full_planck_chains_imported": False,
                  "reference_upgrade_computed": False,
                  "reference_covariance_upgraded": False,
                  "observed_eBOSS_covariance_still_limited": True,
                  "pressure_recomputed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_134_eBOSS_covariance_locator_probe": {
                  "readiness_label": "eBOSS_covariance_locator_probe_passed_locator_status_recorded_covariance_not_ingested_ready_for_reference_upgrade_design",
                  "covariance_ingested": False,
                  "usable_covariance_locked": False,
                  "same_program_covariance_still_limited": True,
                  "reference_fallback_still_active": True,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          EXPANDED_REFERENCE_TARGETS = [
              {"target_id": "z0067_6dFGS", "z": 0.067, "role": "low_z_independent_anchor", "current_support": "linear_extrapolation_below_prior_range"},
              {"target_id": "z0150_MGS", "z": 0.150, "role": "existing_low_z_anchor", "current_support": "carried_exact_prior_reference"},
              {"target_id": "z0380_BOSS", "z": 0.380, "role": "BOSS_core", "current_support": "carried_exact_prior_reference"},
              {"target_id": "z0440_WiggleZ", "z": 0.440, "role": "WiggleZ_mid_z", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0510_BOSS", "z": 0.510, "role": "BOSS_core", "current_support": "carried_exact_prior_reference"},
              {"target_id": "z0600_WiggleZ", "z": 0.600, "role": "WiggleZ_mid_z", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0610_BOSS", "z": 0.610, "role": "BOSS_core", "current_support": "carried_exact_prior_reference"},
              {"target_id": "z0698_eBOSS_LRG", "z": 0.698, "role": "eBOSS_LRG_two_driver_split_review", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0730_WiggleZ", "z": 0.730, "role": "WiggleZ_mid_z", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0800_VIPERS", "z": 0.800, "role": "VIPERS_high_mid_z", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0850_eBOSS_ELG", "z": 0.850, "role": "eBOSS_ELG_negative_component", "current_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z1480_eBOSS_QSO", "z": 1.480, "role": "eBOSS_QSO_positive_counter_component", "current_support": "linear_interpolation_between_prior_targets"}
          ]

          CARRIED_PRIOR_REFERENCE = {
              0.150: 0.4618473025984107,
              0.380: 0.4788039956151594,
              0.510: 0.4766635460319918,
              0.610: 0.4711826988812538
          }

          CURRENT_INTERPOLATION_REFERENCE = {
              0.067: 0.4557281481619318,
              0.150: 0.4618473025984107,
              0.380: 0.4788039956151594,
              0.440: 0.4778160958075436,
              0.510: 0.4766635460319918,
              0.600: 0.4717307835963276,
              0.610: 0.4711826988812538,
              0.698: 0.4623052016766069,
              0.730: 0.4590770208749171,
              0.800: 0.4520153753712207,
              0.850: 0.4469713428685805,
              1.480: 0.3834165333353129
          }

          # Fixed, explicit approximation parameters. These are not a Planck posterior.
          # They are used only to test whether a controlled non-interpolation reference route is feasible.
          LCDM_APPROXIMATION_PARAMETERS = {
              "Omega_m": 0.315,
              "Omega_lambda": 0.685,
              "sigma8_0": 0.811,
              "growth_index_gamma": 0.55,
              "integration_steps": 2400,
              "method": "flat_LCDM_Carroll_Press_Turner_growth_integral_plus_f_Omega_gamma"
          }

          REPOSITORY_SCAN_POLICY = {
              "scan_root": ".",
              "max_file_records": 120,
              "filename_keywords": [
                  "chain",
                  "chains",
                  "camb",
                  "class",
                  "planck",
                  "fsigma8",
                  "growth",
                  "reference",
                  "cov",
                  "covariance"
              ],
              "excluded_prefixes": [
                  ".git/",
                  "artifacts/",
                  "__pycache__/"
              ],
              "purpose": "Look for existing repository files that could support a stored-chain or stored-reference upgrade before falling back to a lightweight LCDM approximation."
          }

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "CAMB was run.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The reference upgrade feasibility probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The lightweight LCDM approximation is a full Planck posterior covariance.",
              "The feasibility probe is the same as a final reference upgrade.",
              "The eBOSS two-driver split is a final result.",
              "Same-program eBOSS covariance is resolved.",
              "No observed covariance review is needed after reference upgrade."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_137_lightweight_LCDM_growth_reference_probe",
                  "purpose": "Use the feasible lightweight LCDM approximation to build a full expanded reference vector and compare it to the old interpolation fallback.",
                  "why_next": "v4.136 selects feasibility; v4.137 should make the reference vector explicit as a diagnostic upgrade."
              },
              {
                  "priority": 2,
                  "route_id": "v4_138_eBOSS_component_rerun_with_LCDM_reference",
                  "purpose": "Rerun the eBOSS component split with the upgraded approximate LCDM reference vector.",
                  "why_next": "The eBOSS split may change when the reference side is no longer simple interpolation."
              },
              {
                  "priority": 3,
                  "route_id": "v4_139_CAMB_install_or_stored_chain_probe",
                  "purpose": "Try a bounded CAMB/stored-chain feasibility route if repository or runtime support becomes available.",
                  "why_next": "The lightweight approximation is useful but not full CAMB/chain posterior support."
              },
              {
                  "priority": 4,
                  "route_id": "v4_140_eBOSS_covariance_manual_extraction_checklist",
                  "purpose": "Create a human-readable checklist for extracting eBOSS covariance/likelihood support from SDSS/arXiv products.",
                  "why_next": "Observed-side covariance still blocks final interpretation."
              }
          ]

          failed_gates = []
          warnings = [
              "feasibility_probe_only",
              "CAMB_not_run",
              "full_planck_chains_not_imported",
              "lightweight_LCDM_approximation_not_full_posterior",
              "eBOSS_covariance_still_limited",
              "no_pressure_recompute",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def should_exclude(path_string):
              normalized = path_string.replace("\\", "/")
              return any(normalized.startswith(prefix) for prefix in REPOSITORY_SCAN_POLICY["excluded_prefixes"])

          def scan_repository_for_candidate_files():
              keywords = [kw.lower() for kw in REPOSITORY_SCAN_POLICY["filename_keywords"]]
              rows = []
              for path in Path(".").rglob("*"):
                  if len(rows) >= REPOSITORY_SCAN_POLICY["max_file_records"]:
                      break
                  if not path.is_file():
                      continue
                  path_string = str(path).replace("\\", "/")
                  if should_exclude(path_string):
                      continue
                  lower = path_string.lower()
                  if any(keyword in lower for keyword in keywords):
                      try:
                          size_bytes = path.stat().st_size
                      except OSError:
                          size_bytes = ""
                      matched = ",".join(keyword for keyword in keywords if keyword in lower)
                      rows.append({
                          "path": path_string,
                          "size_bytes": size_bytes,
                          "matched_keywords": matched,
                          "candidate_role": (
                              "possible_chain_or_reference_support"
                              if any(k in lower for k in ["chain", "planck", "camb", "class", "reference"])
                              else "possible_growth_or_covariance_context"
                          )
                      })
              return rows

          def E_of_a(a, omega_m, omega_lambda):
              return math.sqrt(omega_m / (a ** 3) + omega_lambda)

          def growth_integral_D(a, omega_m, omega_lambda, steps):
              # D(a) = 5 Omega_m E(a)/2 * integral_0^a da'/(a'^3 E(a')^3)
              # Simpson integration with a small positive lower bound. This is a feasibility approximation.
              eps = 1e-5
              if a <= eps:
                  return a
              n = int(steps)
              if n % 2 == 1:
                  n += 1
              h = (a - eps) / n

              def integrand(x):
                  e = E_of_a(x, omega_m, omega_lambda)
                  return 1.0 / ((x ** 3) * (e ** 3))

              total = integrand(eps) + integrand(a)
              for i in range(1, n):
                  total += (4.0 if i % 2 else 2.0) * integrand(eps + i * h)
              integral = total * h / 3.0
              return 2.5 * omega_m * E_of_a(a, omega_m, omega_lambda) * integral

          def fsigma8_lcdm_approx(z, params, D_at_1):
              omega_m = params["Omega_m"]
              omega_lambda = params["Omega_lambda"]
              sigma8_0 = params["sigma8_0"]
              gamma = params["growth_index_gamma"]
              steps = params["integration_steps"]
              a = 1.0 / (1.0 + z)
              D_z = growth_integral_D(a, omega_m, omega_lambda, steps) / D_at_1
              omega_m_z = (omega_m * ((1.0 + z) ** 3)) / (omega_m * ((1.0 + z) ** 3) + omega_lambda)
              f_z = omega_m_z ** gamma
              return f_z * sigma8_0 * D_z

          repository_candidate_files = scan_repository_for_candidate_files()
          stored_chain_candidate_count = sum(
              1 for row in repository_candidate_files
              if any(token in row["path"].lower() for token in ["chain", "planck", "camb", "class"])
          )
          stored_reference_candidate_count = sum(
              1 for row in repository_candidate_files
              if any(token in row["path"].lower() for token in ["reference", "fsigma8", "growth"])
          )

          D_at_1 = growth_integral_D(
              1.0,
              LCDM_APPROXIMATION_PARAMETERS["Omega_m"],
              LCDM_APPROXIMATION_PARAMETERS["Omega_lambda"],
              LCDM_APPROXIMATION_PARAMETERS["integration_steps"]
          )

          reference_feasibility_records = []
          for target in EXPANDED_REFERENCE_TARGETS:
              z = float(target["z"])
              approx_value = fsigma8_lcdm_approx(z, LCDM_APPROXIMATION_PARAMETERS, D_at_1)
              old_value = CURRENT_INTERPOLATION_REFERENCE[round(z, 3)]
              delta_vs_old = approx_value - old_value
              carried_prior_value = CARRIED_PRIOR_REFERENCE.get(round(z, 3), "")
              if carried_prior_value != "":
                  delta_vs_prior_exact = approx_value - float(carried_prior_value)
                  prior_alignment_status = "checked_against_carried_prior_exact"
              else:
                  delta_vs_prior_exact = ""
                  prior_alignment_status = "no_carried_prior_exact_at_this_redshift"

              reference_feasibility_records.append({
                  "target_id": target["target_id"],
                  "z": z,
                  "role": target["role"],
                  "old_support": target["current_support"],
                  "old_reference_value": old_value,
                  "lcdm_approx_reference_value": approx_value,
                  "delta_lcdm_minus_old_reference": delta_vs_old,
                  "carried_prior_exact_value": carried_prior_value,
                  "delta_lcdm_minus_prior_exact": delta_vs_prior_exact,
                  "prior_alignment_status": prior_alignment_status,
                  "new_support_status": "lightweight_LCDM_growth_approximation_feasible_not_full_posterior",
                  "claim_boundary": "diagnostic_reference_upgrade_feasibility_only"
              })

          prior_alignment_records = [
              row for row in reference_feasibility_records
              if row["prior_alignment_status"] == "checked_against_carried_prior_exact"
          ]
          max_abs_delta_vs_prior = max(abs(float(row["delta_lcdm_minus_prior_exact"])) for row in prior_alignment_records)
          mean_abs_delta_vs_prior = sum(abs(float(row["delta_lcdm_minus_prior_exact"])) for row in prior_alignment_records) / len(prior_alignment_records)

          eboss_reference_records = [
              row for row in reference_feasibility_records
              if row["target_id"] in ["z0698_eBOSS_LRG", "z0850_eBOSS_ELG", "z1480_eBOSS_QSO"]
          ]

          feasibility_decision_records = [
              {
                  "method_id": "stored_chain_table_upgrade",
                  "feasible_now": stored_chain_candidate_count > 0,
                  "evidence": f"stored_chain_candidate_count={stored_chain_candidate_count}",
                  "decision": "possible_manual_review_needed" if stored_chain_candidate_count > 0 else "not_available_from_repository_scan",
                  "claim_boundary": "not_imported"
              },
              {
                  "method_id": "CAMB_batch_reference_upgrade",
                  "feasible_now": False,
                  "evidence": "CAMB is not installed or run by this workflow",
                  "decision": "parked_for_future_install_probe",
                  "claim_boundary": "CAMB_not_run"
              },
              {
                  "method_id": "LCDM_growth_approximation_upgrade",
                  "feasible_now": True,
                  "evidence": f"all_targets={len(reference_feasibility_records)}; max_abs_delta_vs_prior={max_abs_delta_vs_prior}",
                  "decision": "selected_as_next_diagnostic_reference_upgrade",
                  "claim_boundary": "approximation_not_full_posterior"
              },
              {
                  "method_id": "carry_interpolation_fallback",
                  "feasible_now": True,
                  "evidence": "existing fallback remains available",
                  "decision": "fallback_preserved_but_not_preferred",
                  "claim_boundary": "fallback_not_final"
              }
          ]

          selected_upgrade_method = "LCDM_growth_approximation_upgrade"
          all_targets_supported_by_lcdm_approx = len(reference_feasibility_records) == len(EXPANDED_REFERENCE_TARGETS)
          eboss_targets_supported_by_lcdm_approx = len(eboss_reference_records) == 3
          prior_exact_alignment_passed = max_abs_delta_vs_prior < 0.01
          covariance_status_declared = "approximation_reference_variance_not_yet_built"
          reference_covariance_upgraded = False
          final_pressure_ready = False

          if UPSTREAM_LOCKS["v4_135_CAMB_chain_expanded_reference_upgrade_design"]["reference_upgrade_computed"] is not False:
              failed_gates.append("upstream_reference_upgrade_unexpectedly_computed")

          if UPSTREAM_LOCKS["v4_135_CAMB_chain_expanded_reference_upgrade_design"]["observed_eBOSS_covariance_still_limited"] is not True:
              failed_gates.append("upstream_observed_covariance_limit_not_carried")

          if len(EXPANDED_REFERENCE_TARGETS) != 12:
              failed_gates.append("expanded_reference_target_count_incorrect")

          if not all_targets_supported_by_lcdm_approx:
              failed_gates.append("not_all_targets_supported_by_lcdm_approx")

          if not eboss_targets_supported_by_lcdm_approx:
              failed_gates.append("not_all_eBOSS_targets_supported_by_lcdm_approx")

          if not prior_exact_alignment_passed:
              failed_gates.append("lcdm_approx_prior_alignment_failed")

          if selected_upgrade_method != "LCDM_growth_approximation_upgrade":
              failed_gates.append("selected_upgrade_method_unexpected")

          if reference_covariance_upgraded:
              failed_gates.append("reference_covariance_unexpectedly_upgraded")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_allowed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "camb was run",
              "final rsd pressure score",
              "validates tairid cosmology",
              "lightweight lcdm approximation is a full planck posterior covariance",
              "same-program eboss covariance is resolved",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "reference_upgrade_feasibility_probe_passed_lightweight_LCDM_growth_approximation_feasible_ready_for_lightweight_LCDM_reference_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_reference_design_carried",
                  "pass": UPSTREAM_LOCKS["v4_135_CAMB_chain_expanded_reference_upgrade_design"]["readiness_label"] == "CAMB_chain_expanded_reference_upgrade_design_passed_ready_for_reference_upgrade_feasibility_probe",
                  "result": "v4.135 reference upgrade design carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "repository_scan_completed",
                  "pass": isinstance(repository_candidate_files, list),
                  "result": f"candidate_files={len(repository_candidate_files)}; stored_chain_candidates={stored_chain_candidate_count}; stored_reference_candidates={stored_reference_candidate_count}",
                  "boundary": "Repository scan only."
              },
              {
                  "rule_id": "all_targets_supported_by_lcdm_approx",
                  "pass": all_targets_supported_by_lcdm_approx,
                  "result": f"target_count={len(reference_feasibility_records)}",
                  "boundary": "Approximation support only."
              },
              {
                  "rule_id": "eBOSS_targets_supported_by_lcdm_approx",
                  "pass": eboss_targets_supported_by_lcdm_approx,
                  "result": "z=0.698, z=0.85, and z=1.48 all supported",
                  "boundary": "Approximation support only."
              },
              {
                  "rule_id": "prior_exact_alignment_checked",
                  "pass": prior_exact_alignment_passed,
                  "result": f"max_abs_delta_vs_prior={max_abs_delta_vs_prior}; mean_abs_delta_vs_prior={mean_abs_delta_vs_prior}",
                  "boundary": "Alignment check only, not posterior validation."
              },
              {
                  "rule_id": "upgrade_method_selected",
                  "pass": selected_upgrade_method == "LCDM_growth_approximation_upgrade",
                  "result": selected_upgrade_method,
                  "boundary": "Selected as diagnostic next route, not final reference."
              },
              {
                  "rule_id": "reference_covariance_status_declared",
                  "pass": covariance_status_declared == "approximation_reference_variance_not_yet_built" and reference_covariance_upgraded is False,
                  "result": covariance_status_declared,
                  "boundary": "Covariance still not upgraded."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_136_rules_passed")

          if failed_gates:
              readiness_label = "reference_upgrade_feasibility_probe_failed"
              next_allowed_step = "Repair reference upgrade feasibility before lightweight LCDM reference probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.137 lightweight LCDM growth reference probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "repository_candidate_file_count": len(repository_candidate_files),
              "stored_chain_candidate_count": stored_chain_candidate_count,
              "stored_reference_candidate_count": stored_reference_candidate_count,
              "expanded_reference_target_count": len(EXPANDED_REFERENCE_TARGETS),
              "all_targets_supported_by_lcdm_approx": all_targets_supported_by_lcdm_approx,
              "eboss_targets_supported_by_lcdm_approx": eboss_targets_supported_by_lcdm_approx,
              "max_abs_delta_vs_prior_exact": max_abs_delta_vs_prior,
              "mean_abs_delta_vs_prior_exact": mean_abs_delta_vs_prior,
              "prior_exact_alignment_passed": prior_exact_alignment_passed,
              "selected_upgrade_method": selected_upgrade_method,
              "CAMB_run": False,
              "full_planck_chains_imported": False,
              "full_planck_chain_sample_files_parsed": False,
              "reference_upgrade_feasible": True,
              "reference_upgrade_computed": False,
              "reference_covariance_upgraded": reference_covariance_upgraded,
              "observed_eBOSS_covariance_still_limited": True,
              "pressure_recomputed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "expanded_reference_targets": EXPANDED_REFERENCE_TARGETS,
              "carried_prior_reference": CARRIED_PRIOR_REFERENCE,
              "current_interpolation_reference": CURRENT_INTERPOLATION_REFERENCE,
              "LCDM_approximation_parameters": LCDM_APPROXIMATION_PARAMETERS,
              "repository_scan_policy": REPOSITORY_SCAN_POLICY,
              "repository_candidate_files": repository_candidate_files,
              "reference_feasibility_records": reference_feasibility_records,
              "prior_alignment_records": prior_alignment_records,
              "eboss_reference_records": eboss_reference_records,
              "feasibility_decision_records": feasibility_decision_records,
              "selected_upgrade_method": selected_upgrade_method,
              "covariance_status_declared": covariance_status_declared,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "selected_upgrade_method": selected_upgrade_method,
                  "reference_upgrade_feasible": True,
                  "reference_upgrade_computed": False,
                  "reference_covariance_upgraded": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_136_reference_upgrade_feasibility_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "repository_candidate_files_v4_136.csv",
              repository_candidate_files,
              ["path", "size_bytes", "matched_keywords", "candidate_role"]
          )

          write_csv(
              OUTDIR / "reference_feasibility_records_v4_136.csv",
              reference_feasibility_records,
              ["target_id", "z", "role", "old_support", "old_reference_value", "lcdm_approx_reference_value", "delta_lcdm_minus_old_reference", "carried_prior_exact_value", "delta_lcdm_minus_prior_exact", "prior_alignment_status", "new_support_status", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "prior_alignment_records_v4_136.csv",
              prior_alignment_records,
              ["target_id", "z", "old_reference_value", "lcdm_approx_reference_value", "carried_prior_exact_value", "delta_lcdm_minus_prior_exact", "prior_alignment_status"]
          )

          write_csv(
              OUTDIR / "eboss_reference_records_v4_136.csv",
              eboss_reference_records,
              ["target_id", "z", "role", "old_reference_value", "lcdm_approx_reference_value", "delta_lcdm_minus_old_reference", "new_support_status"]
          )

          write_csv(
              OUTDIR / "feasibility_decision_records_v4_136.csv",
              feasibility_decision_records,
              ["method_id", "feasible_now", "evidence", "decision", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_136.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_136.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_136.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.136 — Reference Upgrade Feasibility Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.136 checks which reference-upgrade path is feasible before we rerun any eBOSS pressure. It does not run CAMB, import Planck chains, or compute final pressure.")
          md.append("")
          md.append("The strongest immediately feasible path is a documented lightweight LCDM growth approximation. It supports all 12 expanded redshifts and aligns closely with the carried exact prior reference points, but it is still not a full Planck posterior covariance.")
          md.append("")
          md.append("## Feasibility decision")
          md.append("")
          md.append("| Method | Feasible now | Decision |")
          md.append("|---|---|---|")
          for row in feasibility_decision_records:
              md.append(f"| `{row['method_id']}` | `{row['feasible_now']}` | `{row['decision']}` |")
          md.append("")
          md.append("## eBOSS reference preview")
          md.append("")
          md.append("| Target | z | Old reference | LCDM approximation | Delta |")
          md.append("|---|---:|---:|---:|---:|")
          for row in eboss_reference_records:
              md.append(f"| `{row['target_id']}` | `{row['z']}` | `{row['old_reference_value']}` | `{row['lcdm_approx_reference_value']}` | `{row['delta_lcdm_minus_old_reference']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_136_reference_upgrade_feasibility_probe.json",
              "tairid_v4_136_reference_upgrade_feasibility_probe.md",
              "repository_candidate_files_v4_136.csv",
              "reference_feasibility_records_v4_136.csv",
              "prior_alignment_records_v4_136.csv",
              "eboss_reference_records_v4_136.csv",
              "feasibility_decision_records_v4_136.csv",
              "blocked_claims_v4_136.csv",
              "next_route_options_v4_136.csv",
              "rule_results_v4_136.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_136_reference_upgrade_feasibility_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.136 reference upgrade feasibility probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-136-reference-upgrade-feasibility-probe
          path: artifacts/tairid_v4_136_reference_upgrade_feasibility_probe/
