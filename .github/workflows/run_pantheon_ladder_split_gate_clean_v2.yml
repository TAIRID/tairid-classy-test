name: Run TAIRID Pantheon ladder split gate clean v2

on:
  workflow_dispatch:

jobs:
  run-pantheon-ladder-split-gate-clean-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy matplotlib

      - name: Run Pantheon ladder split gate clean v2
        run: |
          python run_tairid_pantheon_ladder_split_gate_clean_v2.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-pantheon-ladder-split-gate-clean-v2-output
          path: |
            pantheon_ladder_split_gate_clean_v2_outputs/**
