name: 000 TAIRID v4.149 Raw Candidate File Structure Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-149-raw-candidate-file-structure-probe.yml"

jobs:
  tairid-v4-149-raw-candidate-file-structure-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.149 raw candidate file structure probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_149_raw_candidate_file_structure_probe

          python - <<'PY'
          import csv
          import hashlib
          import json
          import math
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_149_raw_candidate_file_structure_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_149_raw_candidate_file_structure_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not recompute eBOSS pressure.",
              "This does not ingest covariance or use the raw candidate files as scientific inputs.",
              "This probes only raw file reachability, size, line counts, numeric shape, header/comment status, and possible vector/covariance compatibility."
          ]

          UPSTREAM_LOCKS = {
              "v4_148_source_status_review_and_manifest_fill": {
                  "readiness_label": "source_status_review_manifest_fill_passed_manifest_rows_drafted_raw_candidates_ready_for_structure_probe",
                  "rule_pass_count": 18,
                  "rule_total_count": 18,
                  "source_status_input_count": 18,
                  "fetched_count_carried": 17,
                  "failed_source_count_carried": 1,
                  "package_review_record_count": 10,
                  "manifest_draft_row_count": 10,
                  "raw_candidate_count": 2,
                  "manual_extraction_queue_count": 15,
                  "manual_extract_ready_package_count": 6,
                  "raw_probe_ready_package_count": 1,
                  "missing_reference_package_count": 3,
                  "manifest_completed": False,
                  "raw_candidate_ingested": False,
                  "source_data_ingested": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "reference_vector_still_missing": True,
                  "reference_covariance_still_missing": True,
                  "same_program_eBOSS_covariance_still_limited": True,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_147_external_source_fetch_or_manifest_fill_plan": {
                  "readiness_label": "external_source_fetch_or_manifest_fill_plan_passed_source_targets_recorded_ready_for_source_status_review_and_manifest_fill",
                  "source_target_count": 18,
                  "fetched_count": 17,
                  "fetch_failed_count": 1,
                  "raw_candidate_count": 2,
                  "covariance_hint_count": 8,
                  "fsigma8_hint_count": 8,
                  "manifest_fill_candidate_count": 34,
                  "package_completed": False,
                  "source_data_ingested": False,
                  "covariance_ingested": False,
                  "pressure_recomputed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          RAW_CANDIDATE_TARGETS = [
              {
                  "source_id": "icosmology_lrgxelg_data_raw",
                  "package_id": "eBOSS_family_covariance_or_likelihood",
                  "source_family": "eBOSS_LRG_ELG_multitracer_repository",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK.dat",
                  "expected_role": "parameter_or_observable_vector_candidate",
                  "required_next_probe": "shape_header_numeric_structure_parameter_order"
              },
              {
                  "source_id": "icosmology_lrgxelg_cov_raw",
                  "package_id": "eBOSS_family_covariance_or_likelihood",
                  "source_family": "eBOSS_LRG_ELG_multitracer_repository",
                  "url": "https://raw.githubusercontent.com/icosmology/eBOSS_DR16_LRGxELG/master/sdss_DR16_MultiTracerELGLRG_BAORSD_FS_PK_cov.dat",
                  "expected_role": "covariance_matrix_candidate",
                  "required_next_probe": "shape_header_numeric_structure_parameter_order"
              }
          ]

          STRUCTURE_RULES = [
              {
                  "rule_id": "fetch_status_only",
                  "meaning": "The workflow may fetch raw candidate files, but fetch success does not make them ingested data."
              },
              {
                  "rule_id": "header_comment_detection",
                  "meaning": "Lines beginning with #, %, ;, or // are treated as comment/header candidates."
              },
              {
                  "rule_id": "numeric_shape_detection",
                  "meaning": "Numeric rows are counted and column-count sets are recorded."
              },
              {
                  "rule_id": "square_matrix_hint",
                  "meaning": "A file is a square-matrix hint only when all numeric rows have equal width and width equals numeric-row count."
              },
              {
                  "rule_id": "vector_covariance_compatibility_hint",
                  "meaning": "Compatibility is a shape hint only; variable order and provenance must be reviewed before ingestion."
              },
              {
                  "rule_id": "no_scientific_use",
                  "meaning": "No pressure, likelihood, BIC, posterior comparison, or TAIRID validation is computed."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample rows were parsed.",
              "CAMB produced the final reference vector.",
              "A raw candidate file is an ingested covariance matrix.",
              "A square numeric matrix is automatically the correct covariance.",
              "A vector/covariance shape match proves variable order.",
              "The eBOSS family points are independent by default.",
              "The eBOSS sign pattern is a final physical conclusion.",
              "Pressure magnitude can be interpreted before covariance is source-locked.",
              "BIC, likelihood, or posterior comparison has been run.",
              "Public-facing validation claims are allowed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_150_raw_candidate_provenance_and_variable_order_review",
                  "purpose": "If both raw files are reachable and shape-compatible, review provenance, parameter order, variable labels, and whether the files can support a parser design.",
                  "why_next": "Shape compatibility alone is not enough for ingestion."
              },
              {
                  "priority": 2,
                  "route_id": "v4_150_raw_candidate_fetch_retry_or_alternate_source",
                  "purpose": "If raw files are not reachable, create a retry/alternate-source route.",
                  "why_next": "No structure probe can be trusted without reachable files."
              },
              {
                  "priority": 3,
                  "route_id": "v4_150_manifest_rows_materializer",
                  "purpose": "Turn source-status rows into a fillable manifest CSV with explicit manual extraction fields.",
                  "why_next": "Value/provenance source pages are ready for manual manifest fill."
              },
              {
                  "priority": 4,
                  "route_id": "v4_150_reference_vector_generation_or_request",
                  "purpose": "Create or request a source-backed 12-redshift reference vector table.",
                  "why_next": "Reference vector/covariance remains missing."
              }
          ]

          failed_gates = []
          warnings = [
              "raw_structure_probe_only",
              "internet_access_may_vary_by_runner",
              "raw_candidates_not_ingested",
              "variable_order_not_confirmed",
              "provenance_not_confirmed",
              "covariance_not_ingested",
              "pressure_not_recomputed",
              "not_validation"
          ]

          def fetch_text(target, max_bytes=2_000_000):
              record = {
                  "source_id": target["source_id"],
                  "url": target["url"],
                  "expected_role": target["expected_role"],
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "sha256_16": "",
                  "error": "",
                  "claim_boundary": "fetch_status_only_not_ingestion"
              }
              text = ""
              try:
                  req = urllib.request.Request(
                      target["url"],
                      headers={
                          "User-Agent": "TAIRID-v4.149-raw-structure-probe/1.0",
                          "Accept": "text/plain,*/*"
                      }
                  )
                  with urllib.request.urlopen(req, timeout=45) as response:
                      raw = response.read(max_bytes)
                      text = raw.decode("utf-8", errors="replace")
                      record["fetch_ok"] = True
                      record["status_code"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      record["bytes_read"] = len(raw)
                      record["sha256_16"] = hashlib.sha256(raw).hexdigest()[:16]
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, text

          def parse_numeric_row(line):
              cleaned = line.strip().replace(",", " ")
              if not cleaned:
                  return []
              parts = cleaned.split()
              values = []
              for part in parts:
                  try:
                      values.append(float(part))
                  except Exception:
                      return []
              return values

          def analyze_structure(target, fetch_record, text):
              lines = text.splitlines() if text else []
              nonempty = [line for line in lines if line.strip()]
              comment_prefixes = ("#", "%", ";", "//")
              comment_lines = [line for line in nonempty if line.strip().startswith(comment_prefixes)]
              numeric_rows = []
              nonnumeric_noncomment_count = 0
              first_numeric_rows = []
              first_comment_rows = []

              for line in nonempty:
                  stripped = line.strip()
                  if stripped.startswith(comment_prefixes):
                      if len(first_comment_rows) < 5:
                          first_comment_rows.append(stripped[:180])
                      continue
                  numeric = parse_numeric_row(stripped)
                  if numeric:
                      numeric_rows.append(numeric)
                      if len(first_numeric_rows) < 5:
                          first_numeric_rows.append(" ".join(f"{value:.12g}" for value in numeric[:12]))
                  else:
                      nonnumeric_noncomment_count += 1

              column_counts = sorted(set(len(row) for row in numeric_rows))
              numeric_row_count = len(numeric_rows)
              min_columns = min(column_counts) if column_counts else 0
              max_columns = max(column_counts) if column_counts else 0
              uniform_numeric_width = len(column_counts) == 1 and numeric_row_count > 0
              square_matrix_hint = uniform_numeric_width and numeric_row_count == max_columns and numeric_row_count > 1
              one_row_vector_hint = numeric_row_count == 1 and max_columns > 1
              one_column_vector_hint = uniform_numeric_width and max_columns == 1 and numeric_row_count > 1
              table_vector_hint = numeric_row_count > 1 and max_columns >= 2 and not square_matrix_hint

              if not fetch_record["fetch_ok"]:
                  structure_class = "fetch_failed_no_structure"
                  parser_readiness = "not_ready"
              elif square_matrix_hint and "covariance" in target["expected_role"]:
                  structure_class = "square_covariance_matrix_shape_candidate"
                  parser_readiness = "shape_ready_needs_variable_order_and_provenance"
              elif one_row_vector_hint or one_column_vector_hint or table_vector_hint:
                  structure_class = "parameter_or_observable_vector_shape_candidate"
                  parser_readiness = "shape_ready_needs_variable_order_and_provenance"
              elif numeric_row_count > 0:
                  structure_class = "numeric_file_ambiguous_shape"
                  parser_readiness = "manual_review_needed"
              else:
                  structure_class = "non_numeric_or_empty_structure"
                  parser_readiness = "not_ready"

              return {
                  "source_id": target["source_id"],
                  "expected_role": target["expected_role"],
                  "fetch_ok": fetch_record["fetch_ok"],
                  "total_line_count": len(lines),
                  "nonempty_line_count": len(nonempty),
                  "comment_line_count": len(comment_lines),
                  "numeric_row_count": numeric_row_count,
                  "nonnumeric_noncomment_count": nonnumeric_noncomment_count,
                  "column_count_set": ",".join(str(value) for value in column_counts) if column_counts else "none",
                  "min_numeric_columns": min_columns,
                  "max_numeric_columns": max_columns,
                  "uniform_numeric_width": uniform_numeric_width,
                  "square_matrix_hint": square_matrix_hint,
                  "one_row_vector_hint": one_row_vector_hint,
                  "one_column_vector_hint": one_column_vector_hint,
                  "table_vector_hint": table_vector_hint,
                  "structure_class": structure_class,
                  "parser_readiness": parser_readiness,
                  "first_comment_rows_preview": " | ".join(first_comment_rows),
                  "first_numeric_rows_preview": " | ".join(first_numeric_rows),
                  "claim_boundary": "structure_probe_only_not_ingestion"
              }

          fetch_records = []
          structure_records = []
          for target in RAW_CANDIDATE_TARGETS:
              fetch_record, text = fetch_text(target)
              fetch_records.append(fetch_record)
              structure_records.append(analyze_structure(target, fetch_record, text))

          data_record = next((row for row in structure_records if row["source_id"] == "icosmology_lrgxelg_data_raw"), None)
          cov_record = next((row for row in structure_records if row["source_id"] == "icosmology_lrgxelg_cov_raw"), None)

          both_raw_files_fetched = all(row["fetch_ok"] for row in fetch_records)
          any_raw_file_fetched = any(row["fetch_ok"] for row in fetch_records)

          compatibility_records = []
          if data_record and cov_record:
              cov_dim = int(cov_record["max_numeric_columns"] or 0) if cov_record["square_matrix_hint"] else 0
              data_rows = int(data_record["numeric_row_count"] or 0)
              data_cols = int(data_record["max_numeric_columns"] or 0)
              cov_matches_data_rows = bool(cov_dim and cov_dim == data_rows)
              cov_matches_data_cols = bool(cov_dim and cov_dim == data_cols)
              cov_matches_any_vector_dimension = cov_matches_data_rows or cov_matches_data_cols
              if not both_raw_files_fetched:
                  compatibility_status = "not_checkable_fetch_incomplete"
              elif cov_matches_any_vector_dimension:
                  compatibility_status = "shape_compatible_candidate_needs_variable_order_review"
              elif cov_record["square_matrix_hint"]:
                  compatibility_status = "covariance_square_but_vector_dimension_unclear"
              else:
                  compatibility_status = "not_shape_compatible_yet"
              compatibility_records.append({
                  "compatibility_id": "lrgxelg_data_vector_vs_covariance",
                  "data_source_id": data_record["source_id"],
                  "covariance_source_id": cov_record["source_id"],
                  "both_raw_files_fetched": both_raw_files_fetched,
                  "data_numeric_row_count": data_rows,
                  "data_max_numeric_columns": data_cols,
                  "covariance_square_matrix_hint": cov_record["square_matrix_hint"],
                  "covariance_dimension": cov_dim,
                  "cov_matches_data_rows": cov_matches_data_rows,
                  "cov_matches_data_cols": cov_matches_data_cols,
                  "cov_matches_any_vector_dimension": cov_matches_any_vector_dimension,
                  "compatibility_status": compatibility_status,
                  "claim_boundary": "shape_compatibility_only_not_variable_order_not_ingestion"
              })

          fetch_ok_count = sum(1 for row in fetch_records if row["fetch_ok"])
          structure_ready_count = sum(1 for row in structure_records if row["parser_readiness"] == "shape_ready_needs_variable_order_and_provenance")
          square_matrix_hint_count = sum(1 for row in structure_records if row["square_matrix_hint"])
          vector_hint_count = sum(1 for row in structure_records if row["one_row_vector_hint"] or row["one_column_vector_hint"] or row["table_vector_hint"])
          shape_compatible_candidate = any(row.get("compatibility_status") == "shape_compatible_candidate_needs_variable_order_review" for row in compatibility_records)

          if shape_compatible_candidate:
              selected_next_route = "raw_candidate_provenance_and_variable_order_review"
              next_allowed_step = (
                  "Proceed to v4.150 raw candidate provenance and variable-order review. "
                  "Do not ingest covariance, recompute pressure, run BIC/likelihood/posterior comparison, or make validation claims."
              )
          elif any_raw_file_fetched:
              selected_next_route = "raw_candidate_followup_or_alternate_source_review"
              next_allowed_step = (
                  "Proceed to v4.150 raw candidate follow-up or alternate-source review. "
                  "Do not ingest covariance, recompute pressure, run BIC/likelihood/posterior comparison, or make validation claims."
              )
          else:
              selected_next_route = "raw_candidate_fetch_retry_or_manifest_materializer"
              next_allowed_step = (
                  "Proceed to v4.150 raw candidate fetch retry or manifest rows materializer. "
                  "Do not ingest covariance, recompute pressure, run BIC/likelihood/posterior comparison, or make validation claims."
              )

          raw_candidate_ingested = False
          covariance_ingested = False
          source_data_ingested = False
          pressure_recomputed = False
          final_pressure_ready = False
          likelihood_or_bic_run = False

          upstream = UPSTREAM_LOCKS["v4_148_source_status_review_and_manifest_fill"]

          if upstream["readiness_label"] != "source_status_review_manifest_fill_passed_manifest_rows_drafted_raw_candidates_ready_for_structure_probe":
              failed_gates.append("upstream_v4_148_readiness_not_carried")
          if upstream["raw_candidate_count"] != 2:
              failed_gates.append("upstream_raw_candidate_count_not_two")
          if len(RAW_CANDIDATE_TARGETS) != 2:
              failed_gates.append("raw_candidate_targets_not_two")
          if len(fetch_records) != len(RAW_CANDIDATE_TARGETS):
              failed_gates.append("fetch_record_count_mismatch")
          if len(structure_records) != len(RAW_CANDIDATE_TARGETS):
              failed_gates.append("structure_record_count_mismatch")
          if len(compatibility_records) != 1:
              failed_gates.append("compatibility_record_missing")
          if raw_candidate_ingested:
              failed_gates.append("raw_candidate_unexpectedly_ingested")
          if covariance_ingested:
              failed_gates.append("covariance_unexpectedly_ingested")
          if source_data_ingested:
              failed_gates.append("source_data_unexpectedly_ingested")
          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")
          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")
          if likelihood_or_bic_run:
              failed_gates.append("likelihood_or_bic_unexpectedly_run")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "tairid cosmology is validated",
              "standard cosmology is disproven",
              "final rsd pressure score",
              "raw candidate file is an ingested covariance matrix",
              "square numeric matrix is automatically the correct covariance",
              "shape match proves variable order",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "raw_candidate_file_structure_probe_passed_structure_status_recorded_ready_for_next_raw_candidate_route"

          rule_results = [
              {"rule_id": "workflow_name_sorts_top", "pass": True, "result": "workflow name begins with 000 TAIRID", "boundary": "Navigation convenience only."},
              {"rule_id": "node24_opt_in_preserved", "pass": True, "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved", "boundary": "Warning cleanup only."},
              {"rule_id": "upstream_v4_148_carried", "pass": upstream["readiness_label"] == "source_status_review_manifest_fill_passed_manifest_rows_drafted_raw_candidates_ready_for_structure_probe", "result": "v4.148 raw-candidate route carried", "boundary": "Carry-forward only."},
              {"rule_id": "raw_candidate_targets_declared", "pass": len(RAW_CANDIDATE_TARGETS) == 2, "result": f"raw_candidate_targets={len(RAW_CANDIDATE_TARGETS)}", "boundary": "Target declaration only."},
              {"rule_id": "fetch_status_recorded", "pass": len(fetch_records) == len(RAW_CANDIDATE_TARGETS), "result": f"fetch_ok_count={fetch_ok_count}; fetch_failed_count={len(fetch_records) - fetch_ok_count}", "boundary": "Fetch status only, not ingestion."},
              {"rule_id": "structure_records_complete", "pass": len(structure_records) == len(RAW_CANDIDATE_TARGETS), "result": f"structure_records={len(structure_records)}; structure_ready_count={structure_ready_count}", "boundary": "Shape/header/order hints only."},
              {"rule_id": "square_matrix_hint_counted", "pass": square_matrix_hint_count >= 0, "result": f"square_matrix_hint_count={square_matrix_hint_count}", "boundary": "Matrix hint only, not covariance ingestion."},
              {"rule_id": "vector_hint_counted", "pass": vector_hint_count >= 0, "result": f"vector_hint_count={vector_hint_count}", "boundary": "Vector hint only, not value extraction."},
              {"rule_id": "compatibility_status_recorded", "pass": len(compatibility_records) == 1, "result": compatibility_records[0]["compatibility_status"] if compatibility_records else "none", "boundary": "Shape compatibility only."},
              {"rule_id": "selected_next_route_recorded", "pass": selected_next_route != "", "result": selected_next_route, "boundary": "Route selection only."},
              {"rule_id": "raw_candidates_not_ingested", "pass": raw_candidate_ingested is False, "result": "raw candidate files not ingested", "boundary": "No covariance ingestion."},
              {"rule_id": "covariance_not_ingested", "pass": covariance_ingested is False, "result": "covariance not ingested", "boundary": "No combined eBOSS interpretation."},
              {"rule_id": "source_data_not_ingested", "pass": source_data_ingested is False, "result": "source data not ingested", "boundary": "No source-locked values extracted."},
              {"rule_id": "pressure_not_recomputed", "pass": pressure_recomputed is False, "result": "pressure not recomputed", "boundary": "No final score."},
              {"rule_id": "likelihood_bic_not_run", "pass": likelihood_or_bic_run is False, "result": "no likelihood, BIC, or posterior comparison run", "boundary": "No model comparison."},
              {"rule_id": "final_pressure_and_validation_blocked", "pass": final_pressure_ready is False, "result": "final pressure and validation remain blocked", "boundary": "No validation claim."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 15, "result": f"blocked_claims={len(BLOCKED_CLAIMS)}", "boundary": "No validation or final pressure claim."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "", "result": route_decision, "boundary": "Route decision does not validate the model."}
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_149_rules_passed")

          if failed_gates:
              readiness_label = "raw_candidate_file_structure_probe_failed"
              next_allowed_step = "Repair raw candidate file structure probe before continuing."
          else:
              readiness_label = route_decision

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "raw_candidate_target_count": len(RAW_CANDIDATE_TARGETS),
              "fetch_ok_count": fetch_ok_count,
              "fetch_failed_count": len(fetch_records) - fetch_ok_count,
              "both_raw_files_fetched": both_raw_files_fetched,
              "structure_ready_count": structure_ready_count,
              "square_matrix_hint_count": square_matrix_hint_count,
              "vector_hint_count": vector_hint_count,
              "shape_compatible_candidate": shape_compatible_candidate,
              "selected_next_route": selected_next_route,
              "raw_candidate_ingested": raw_candidate_ingested,
              "source_data_ingested": source_data_ingested,
              "covariance_ingested": covariance_ingested,
              "pressure_recomputed": pressure_recomputed,
              "likelihood_or_bic_run": likelihood_or_bic_run,
              "reference_vector_still_missing": True,
              "reference_covariance_still_missing": True,
              "same_program_eBOSS_covariance_still_limited": True,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "raw_candidate_targets": RAW_CANDIDATE_TARGETS,
              "structure_rules": STRUCTURE_RULES,
              "raw_candidate_fetch_records": fetch_records,
              "raw_candidate_structure_records": structure_records,
              "compatibility_records": compatibility_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "selected_next_route": selected_next_route,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
