              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.149 — Raw Candidate File Structure Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.149 probes the two raw LRGxELG candidate files identified in v4.148. It records fetch status, line counts, numeric shape, square-matrix hints, vector hints, and shape compatibility. It does not ingest covariance, extract values, recompute pressure, run likelihood/BIC/posterior comparison, or validate TAIRID.")
          md.append("")
          md.append("## Raw candidate structure summary")
          md.append("")
          md.append("| Source | Fetch OK | Structure class | Numeric rows | Column counts |")
          md.append("|---|---:|---|---:|---|")
