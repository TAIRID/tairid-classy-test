          )

          write_csv(
              OUTDIR / "blocked_claims_v4_149.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_149.csv",
