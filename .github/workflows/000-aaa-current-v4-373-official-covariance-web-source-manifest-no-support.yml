name: "!!! AAA CURRENT - TAIRID v4.373 official covariance web source manifest no support"

on:
  workflow_dispatch:

jobs:
  run-v4-373-official-covariance-web-source-manifest-no-support:
    name: "!!! AAA CURRENT - Run v4.373 official covariance source manifest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.372 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.372 output ZIP by pattern..."
          INPUT_372_ZIP="$(ls tairid-v4-372-exact-covariance-source-review-ingest-no-values-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_372_ZIP" ]; then
            echo "Could not find v4.372 output ZIP."
            echo "Expected:"
            echo "tairid-v4-372-exact-covariance-source-review-ingest-no-values-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.372 ZIP:"
          echo "$INPUT_372_ZIP"
          echo "INPUT_372_ZIP=$INPUT_372_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.373 official source manifest script
        run: |
          cat > run_v4_373_official_covariance_web_source_manifest_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "official covariance web/source manifest only; no source file downloaded; no exact covariance file staged; no covariance values loaded; no covariance dimensions confirmed; no observed-row order matched; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def main():
              input_372 = Path(os.environ["INPUT_372_ZIP"])

              outdir = Path("tairid_v4_373_official_covariance_web_source_manifest_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base372 = extract_zip(input_372, "tairid_v4_373_372_")

              summary372_path = find_one(base372, "v4_372_summary.json")
              review_ingest_path = find_one(base372, "v4_372_exact_source_review_ingest_ledger_NO_VALUES_NO_SUPPORT.csv")
              web_needed_path = find_one(base372, "v4_372_web_source_search_needed_rows_NO_VALUES.csv")
              rejected_path = find_one(base372, "v4_372_rejected_exact_source_candidates.csv")
              blocked_path = find_one(base372, "v4_372_blocked_exact_source_candidates.csv")
              prior_web_manifest_path = find_one(base372, "v4_372_official_web_source_search_manifest_NO_VALUES.csv")
              route_status_path = find_one(base372, "v4_372_route_status_summary.csv")
              limitations372_path = find_one(base372, "v4_372_limitations_after_exact_source_review.csv")
              gap372_path = find_one(base372, "v4_372_gap_status_after_exact_source_review.csv")
              locator_packet_path = find_one(base372, "v4_372_input_v4_371_locator_packet_preserved.csv")
              rules372_path = find_one(base372, "v4_372_rule_checks.csv")

              summary372 = json.loads(summary372_path.read_text())
              review_ingest = pd.read_csv(review_ingest_path)
              web_needed = pd.read_csv(web_needed_path)
              rejected = pd.read_csv(rejected_path)
              blocked = pd.read_csv(blocked_path)
              prior_web_manifest = pd.read_csv(prior_web_manifest_path)
              route_status = pd.read_csv(route_status_path)
              limitations372 = pd.read_csv(limitations372_path)
              gap372 = pd.read_csv(gap372_path)
              locator_packet = pd.read_csv(locator_packet_path)
              rules372 = pd.read_csv(rules372_path)

              official_source_candidates = pd.DataFrame([
                  {
                      "v4_373_official_source_id": "v4_373_official_source_001",
                      "source_label": "SDSS-III BOSS publications and results page",
                      "source_url": "https://www.sdss3.org/science/boss_publications.php",
                      "source_type": "official_index_page",
                      "source_role": "official index listing DR12 BOSS measurements, covariance matrices, likelihoods, figures, and SAS links",
                      "priority": 1,
                      "candidate_for_exact_covariance": False,
                      "candidate_for_source_index": True,
                      "download_attempted": False,
                      "source_file_fetched": False,
                      "exact_covariance_file_staged": False,
                      "covariance_values_loaded": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_373_official_source_id": "v4_373_official_source_002",
                      "source_label": "Alam et al DR12 consensus and individual Gaussian constraints tarball",
                      "source_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/ALAM_ET_AL_2016_consensus_and_individual_Gaussian_constraints.tar.gz",
                      "source_type": "official_sas_archive_candidate",
                      "source_role": "possible likelihood/constraint archive tied to final DR12 consensus values",
                      "priority": 2,
                      "candidate_for_exact_covariance": True,
                      "candidate_for_source_index": False,
                      "download_attempted": False,
                      "source_file_fetched": False,
                      "exact_covariance_file_staged": False,
                      "covariance_values_loaded": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_373_official_source_id": "v4_373_official_source_003",
                      "source_label": "Satpathy et al 2016 combined DR12 full-shape correlation-function multipoles archive",
                      "source_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Satpathy_etal_2016_COMBINEDDR12_full_shape_corrfunc_multipoles.zip",
                      "source_type": "official_sas_archive_candidate",
                      "source_role": "full-shape RSD/source-family candidate; may contain multipoles and covariance matrices for growth-rate lane",
                      "priority": 3,
                      "candidate_for_exact_covariance": True,
                      "candidate_for_source_index": False,
                      "download_attempted": False,
                      "source_file_fetched": False,
                      "exact_covariance_file_staged": False,
                      "covariance_values_loaded": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_373_official_source_id": "v4_373_official_source_004",
                      "source_label": "Sanchez et al 2016 combined DR12 full-shape wedges archive",
                      "source_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Sanchez_etal_2016a_COMBINEDDR12_fullshape_wedges.tar.gz",
                      "source_type": "official_sas_archive_candidate",
                      "source_role": "full-shape clustering wedges candidate with covariance material",
                      "priority": 4,
                      "candidate_for_exact_covariance": True,
                      "candidate_for_source_index": False,
                      "download_attempted": False,
                      "source_file_fetched": False,
                      "exact_covariance_file_staged": False,
                      "covariance_values_loaded": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_373_official_source_id": "v4_373_official_source_005",
                      "source_label": "Grieb et al 2016 combined DR12 power-spectrum wedges archive",
                      "source_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/GRIEB_ET_AL_2016_COMBINEDDR12_power_spectrum_wedges.tar.gz",
                      "source_type": "official_sas_archive_candidate",
                      "source_role": "Fourier-space wedges candidate with covariance material",
                      "priority": 5,
                      "candidate_for_exact_covariance": True,
                      "candidate_for_source_index": False,
                      "download_attempted": False,
                      "source_file_fetched": False,
                      "exact_covariance_file_staged": False,
                      "covariance_values_loaded": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_373_official_source_id": "v4_373_official_source_006",
                      "source_label": "Beutler et al DR12 combined full-shape power-spectrum archive",
                      "source_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Beutler_etal_DR12COMBINED_fullshape_powspec.tar.gz",
                      "source_type": "official_sas_archive_candidate",
                      "source_role": "Fourier-space multipoles/power-spectrum candidate with covariance material",
                      "priority": 6,
                      "candidate_for_exact_covariance": True,
                      "candidate_for_source_index": False,
                      "download_attempted": False,
                      "source_file_fetched": False,
                      "exact_covariance_file_staged": False,
                      "covariance_values_loaded": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "v4_373_official_source_id": "v4_373_official_source_007",
                      "source_label": "SDSS SAS DR12 BOSS clustering directory",
                      "source_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/",
                      "source_type": "official_sas_directory_candidate",
                      "source_role": "directory-level source for manual lookup if direct archive candidates need repair",
                      "priority": 7,
                      "candidate_for_exact_covariance": False,
                      "candidate_for_source_index": True,
                      "download_attempted": False,
                      "source_file_fetched": False,
                      "exact_covariance_file_staged": False,
                      "covariance_values_loaded": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
              ])

              official_source_candidates["full_covariance_available"] = False
              official_source_candidates["full_covariance_values_loaded"] = False
              official_source_candidates["covariance_dimension_confirmed"] = False
              official_source_candidates["observed_row_order_matched"] = False
              official_source_candidates["likelihood_computed"] = False
              official_source_candidates["p_values_computed"] = False
              official_source_candidates["score_valid"] = False
              official_source_candidates["support_allowed"] = False

              human_review_packet = official_source_candidates.copy()
              human_review_packet["human_official_source_review_decision"] = ""
              human_review_packet["allowed_human_official_source_review_decisions"] = "accept_for_later_download_or_header_staging|needs_better_source|reject_source|keep_blocked"
              human_review_packet["human_official_source_review_note"] = ""
              human_review_packet["official_source_accepted_now"] = False
              human_review_packet["download_attempted"] = False
              human_review_packet["source_file_fetched"] = False
              human_review_packet["exact_covariance_file_staged"] = False
              human_review_packet["covariance_values_loaded"] = False
              human_review_packet["support_allowed"] = False

              source_manifest_summary = pd.DataFrame([
                  {
                      "manifest_metric": "official_source_candidates",
                      "value": int(len(official_source_candidates)),
                      "note": "Official SDSS/BOSS source candidates listed for later review only.",
                  },
                  {
                      "manifest_metric": "download_attempted",
                      "value": 0,
                      "note": "No download attempted in v4.373.",
                  },
                  {
                      "manifest_metric": "exact_covariance_file_staged",
                      "value": 0,
                      "note": "No exact covariance file staged in v4.373.",
                  },
                  {
                      "manifest_metric": "covariance_values_loaded",
                      "value": 0,
                      "note": "No covariance values loaded in v4.373.",
                  },
                  {
                      "manifest_metric": "support_allowed",
                      "value": 0,
                      "note": "No support claim is allowed.",
                  },
              ])

              next_gate_plan = pd.DataFrame([
                  {
                      "next_step_id": "V4_373_NEXT_001",
                      "next_gate": "v4_374_official_covariance_source_review_ingest_no_values_no_support",
                      "goal": "Human accepts or rejects official source candidates for later download/header staging.",
                      "loads_values": False,
                      "support_allowed": False,
                  },
                  {
                      "next_step_id": "V4_373_NEXT_002",
                      "next_gate": "later_download_or_header_staging_gate",
                      "goal": "Only after human acceptance, try download/header staging for selected official source archive.",
                      "loads_values": False,
                      "support_allowed": False,
                  },
                  {
                      "next_step_id": "V4_373_NEXT_003",
                      "next_gate": "later_covariance_shape_order_gate",
                      "goal": "Only after staging, inspect whether covariance dimension/order can match the three observed rows.",
                      "loads_values": False,
                      "support_allowed": False,
                  },
              ])

              limitation_update = pd.DataFrame([
                  {
                      "limit_id": "V4_373_LIMIT_001",
                      "limit": "This step creates an official web/source manifest only.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_373_LIMIT_002",
                      "limit": "No source archive is downloaded or staged in v4.373.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_373_LIMIT_003",
                      "limit": "No covariance values are loaded in v4.373.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_373_LIMIT_004",
                      "limit": "No covariance dimension or observed-row order match is confirmed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_373_LIMIT_005",
                      "limit": "No likelihood, p-values, score, or support claim is allowed.",
                      "status": "blocked_by_design",
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_373_GAP_001",
                      "gap": "Official covariance web/source manifest created.",
                      "status_after_v4_373": "official_source_manifest_created_no_download_no_values",
                      "next_gate": "v4_374_official_covariance_source_review_ingest_no_values_no_support",
                  },
                  {
                      "gap_id": "V4_373_GAP_002",
                      "gap": "Exact covariance file remains unstaged.",
                      "status_after_v4_373": "still_open",
                      "next_gate": "human_official_source_review_then_download_or_header_staging",
                  },
                  {
                      "gap_id": "V4_373_GAP_003",
                      "gap": "Covariance values remain unloaded.",
                      "status_after_v4_373": "still_blocked",
                      "next_gate": "later_after_download_or_staging",
                  },
                  {
                      "gap_id": "V4_373_GAP_004",
                      "gap": "Covariance dimensions and observed-row order remain unconfirmed.",
                      "status_after_v4_373": "still_blocked",
                      "next_gate": "later_shape_and_order_gate",
                  },
                  {
                      "gap_id": "V4_373_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_373": "still_blocked",
                      "next_gate": "no_support_claims_allowed_from_v4_373",
                  },
              ])

              hard_checks = {
                  "input_v4_372_summary_found": summary372.get("version") == "v4.372",
                  "input_v4_372_rules_all_passed": summary_rules_all_passed(summary372),
                  "input_v4_372_failed_gates_none": summary372.get("failed_gates") == "none",
                  "input_v4_372_web_search_needed_rows_2": summary372.get("web_source_search_needed_rows") == 2,
                  "input_v4_372_exact_source_selected_0": summary372.get("exact_source_selected_rows") == 0,
                  "input_v4_372_no_exact_file_approved": summary372.get("exact_covariance_file_approved") is False,
                  "input_v4_372_no_file_staged": summary372.get("full_covariance_file_staged") is False,
                  "input_v4_372_no_full_covariance": summary372.get("full_covariance_available") is False,
                  "input_v4_372_no_values_loaded": summary372.get("full_covariance_values_loaded") is False,
                  "input_v4_372_no_dimension_confirmed": summary372.get("covariance_dimension_confirmed") is False,
                  "input_v4_372_no_row_order": summary372.get("observed_row_order_matched") is False,
                  "input_v4_372_no_likelihood": summary372.get("likelihood_computed") is False,
                  "input_v4_372_no_p_values": summary372.get("p_values_computed") is False,
                  "input_v4_372_no_score_valid": summary372.get("score_valid") is False,
                  "input_v4_372_no_support_allowed": summary372.get("support_allowed") is False,

                  "rules372_all_passed": passed_column_all(rules372),
                  "review_ingest_rows_match_summary": len(review_ingest) == int(summary372.get("review_ingest_rows")),
                  "web_needed_rows_match_summary": len(web_needed) == int(summary372.get("web_source_search_needed_rows")),
                  "rejected_rows_match_summary": len(rejected) == int(summary372.get("rejected_candidate_rows")),
                  "blocked_rows_match_summary": len(blocked) == int(summary372.get("blocked_candidate_rows")),
                  "prior_web_manifest_rows_equal_2": len(prior_web_manifest) == 2,
                  "route_status_rows_equal_4": len(route_status) == 4,
                  "limitations372_rows_equal_5": len(limitations372) == 5,
                  "gap372_rows_equal_5": len(gap372) == 5,
                  "locator_packet_rows_match_review": len(locator_packet) == len(review_ingest),

                  "official_source_candidates_rows_equal_7": len(official_source_candidates) == 7,
                  "official_source_has_sdss_index": (official_source_candidates["source_type"] == "official_index_page").any(),
                  "official_source_has_sas_archive_candidates": int((official_source_candidates["source_type"] == "official_sas_archive_candidate").sum()) >= 4,
                  "human_review_packet_rows_equal_candidates": len(human_review_packet) == len(official_source_candidates),
                  "source_manifest_summary_rows_equal_5": len(source_manifest_summary) == 5,
                  "next_gate_plan_rows_equal_3": len(next_gate_plan) == 3,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_download_attempted": false_col(official_source_candidates, "download_attempted") and false_col(human_review_packet, "download_attempted"),
                  "no_source_file_fetched": false_col(official_source_candidates, "source_file_fetched") and false_col(human_review_packet, "source_file_fetched"),
                  "no_exact_covariance_file_staged": false_col(official_source_candidates, "exact_covariance_file_staged") and false_col(human_review_packet, "exact_covariance_file_staged"),
                  "no_full_covariance_available": false_col(official_source_candidates, "full_covariance_available"),
                  "no_covariance_values_loaded": false_col(official_source_candidates, "covariance_values_loaded") and false_col(human_review_packet, "covariance_values_loaded"),
                  "no_covariance_dimension_confirmed": false_col(official_source_candidates, "covariance_dimension_confirmed"),
                  "no_observed_row_order_matched": false_col(official_source_candidates, "observed_row_order_matched"),
                  "no_likelihood_computed": false_col(official_source_candidates, "likelihood_computed"),
                  "no_p_values_computed": false_col(official_source_candidates, "p_values_computed"),
                  "no_score_valid": false_col(official_source_candidates, "score_valid"),
                  "no_support_allowed": false_col(official_source_candidates, "support_allowed") and false_col(human_review_packet, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary373 = {
                  "version": "v4.373",
                  "route_name": "v4_373_official_covariance_web_source_manifest_no_values_no_support_claims",
                  "expected_result": "v4_373_official_covariance_web_source_manifest_passed_no_download_no_values_no_support_claims",
                  "input_version": "v4.372",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "official_source_candidate_rows": int(len(official_source_candidates)),
                  "human_review_packet_rows": int(len(human_review_packet)),
                  "download_attempted": False,
                  "source_file_fetched": False,
                  "exact_covariance_file_staged": False,
                  "full_covariance_available": False,
                  "full_covariance_values_loaded": False,
                  "covariance_dimension_confirmed": False,
                  "observed_row_order_matched": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "human_fill_v4_373_official_source_review_then_v4_374_official_covariance_source_review_ingest_no_values_no_support_claims",
              }

              official_source_candidates.to_csv(outdir / "v4_373_official_covariance_source_candidates_NO_DOWNLOAD_NO_VALUES.csv", index=False)
              human_review_packet.to_csv(outdir / "v4_373_HUMAN_FILL_official_covariance_source_review_NO_VALUES_NO_SUPPORT.csv", index=False)
              source_manifest_summary.to_csv(outdir / "v4_373_source_manifest_summary_NO_VALUES.csv", index=False)
              next_gate_plan.to_csv(outdir / "v4_373_next_gate_plan_NO_VALUES_NO_SUPPORT.csv", index=False)
              limitation_update.to_csv(outdir / "v4_373_limitations_after_official_source_manifest.csv", index=False)
              gap_update.to_csv(outdir / "v4_373_gap_status_after_official_source_manifest.csv", index=False)
              web_needed.to_csv(outdir / "v4_373_input_v4_372_web_source_needed_rows_preserved.csv", index=False)
              prior_web_manifest.to_csv(outdir / "v4_373_input_v4_372_prior_web_manifest_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_373_rule_checks.csv", index=False)

              (outdir / "v4_373_summary.json").write_text(json.dumps(summary373, indent=2))

              summary_md = f"""# TAIRID v4.373 Official Covariance Web/Source Manifest — No Values, No Support Claims

          Expected result: `{summary373["expected_result"]}`

          {summary373["rules_passed"]} / {summary373["rules_total"]} rules passed

          failed_gates = {summary373["failed_gates"]}

          official_source_candidate_rows = {summary373["official_source_candidate_rows"]}

          human_review_packet_rows = {summary373["human_review_packet_rows"]}

          download_attempted = false

          source_file_fetched = false

          exact_covariance_file_staged = false

          full_covariance_available = false

          full_covariance_values_loaded = false

          covariance_dimension_confirmed = false

          observed_row_order_matched = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step creates an official web/source manifest only.

          It does **not** download or stage source files.

          It does **not** load covariance values.

          It does **not** confirm covariance dimensions or observed-row order.

          It does **not** compute likelihood or p-values.

          It does **not** make support claims.

