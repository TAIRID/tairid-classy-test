name: 000 TAIRID v4.189 - Uploaded Neurotype Corpus Grounded Shape Matrix Builder With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-189-uploaded-neurotype-corpus-grounded-shape-matrix-builder-with-scope-guards.yml"
      - "data/cross_domain/**"
      - "data/neurotype/**"

permissions:
  contents: read

jobs:
  v4-189-corpus-grounded-neurotype-shape-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.189 uploaded corpus grounded neurotype shape matrix builder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_189_outputs
          cat > tairid_v4_189_outputs/run_v4_189.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_189_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "uploaded_neurotype_corpus_grounded_shape_matrix_builder_passed_paper_grounded_rows_written_no_cross_domain_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "paper-grounded rows are not external replication",
              "TAIRID not proved"
          ]

          LOCKED_COSMOLOGY_SIGNATURES = {
              "++-": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low",
              "-+-": "LRGxELG_z0p845_like_reach_low_pacing_high_growth_low",
              "-++": "QSO_z1p48_like_reach_low_pacing_high_growth_high"
          }

          V4_188_ARTIFACT_REVIEW = {
              "version": "v4.188",
              "rule_pass_count": 8,
              "rule_total_count": 8,
              "failed_gates": [],
              "package_status": "seed_shapes_written_no_empirical_neurotype_input_found",
              "seed_rows": 7,
              "seed_direct_cosmology_signature_matches": 4,
              "empirical_rows_found": 0,
              "selected_next_route": "neurotype_empirical_summary_input_acquisition_or_upload_with_scope_guards",
              "meaning": "v4.188 built seed rows only. v4.189 replaces or qualifies those rows with uploaded-paper-grounded rows."
          }

          # Rows below are grounded in the uploaded neurotype papers.
          # Direction columns are relational signs only:
          # + means above/increased/wider/higher-load relative to comparison or reference.
          # - means below/reduced/narrower/weaker relative to comparison or reference.
          # 0 means reference/baseline/mixed/held out.
          # These are not unit-equivalent across domains.
          PAPER_GROUNDED_ROWS = [
              {
                  "domain": "neurotype_cognition",
                  "case_id": "ADHD_ds003500_selective_attention_width_over_depth",
                  "paper_file": "TAIRID_ADHD_Width_over_Depth_Vulnerability_Paper_v0_1_Pass6A.docx",
                  "evidence_level": "direct_computed_behavioral_lane",
                  "boundary_or_group": "OpenNeuro ds003500 selective-attention / response-inhibition surface",
                  "propagation_reach_direction": "+",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "-",
                  "consolidation_quality": "task depth / selective-gate stability lower",
                  "paper_grounded_fact": "ADHD showed higher signal-width pressure, lower task depth, lower selective-gate stability, higher width/gate instability, and lower task viability in ds003500.",
                  "corpus_boundary": "small sample; not diagnosis; reward/n-back lane still open"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "ADHD_EEG_arousal_constraint_lane",
                  "paper_file": "TAIRID_ADHD_Width_over_Depth_Vulnerability_Paper_v0_1_Pass6A.docx",
                  "evidence_level": "computed_constraint_lane",
                  "boundary_or_group": "Mendeley adult ADHD EEG proxy surface",
                  "propagation_reach_direction": "-",
                  "pacing_access_direction": "-",
                  "consolidation_growth_direction": "+",
                  "consolidation_quality": "EEG proxy showed higher depth under current definitions",
                  "paper_grounded_fact": "The EEG lane did not show simple higher-width ADHD; it constrains overgeneralization.",
                  "corpus_boundary": "segment labels unresolved; not main behavioral support"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Dyslexia_ETDD70_reading_flow_viability_window",
                  "paper_file": "TAIRID_ETDD70_Viability_Window_Paper_Draft_v0_1.docx",
                  "evidence_level": "direct_computed_eye_tracking_lane",
                  "boundary_or_group": "ETDD70 reading-flow surface",
                  "propagation_reach_direction": "+",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "-",
                  "consolidation_quality": "V_data lower; re-entry openness lower",
                  "paper_grounded_fact": "Repeated pattern: s_A up, lambda_R up, rho_R down, V_data down; four-axis model bAcc about 0.857 and AUC about 0.932.",
                  "corpus_boundary": "one dataset; operational axes; not diagnosis"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Aphantasia_visual_reconstruction_response_gap",
                  "paper_file": "TAIRID_Aphantasia_Reconstruction_Response_Geometry_v0_6.pdf",
                  "evidence_level": "direct_computed_two_shape_lane",
                  "boundary_or_group": "visual imagery / memory reconstruction demand",
                  "propagation_reach_direction": "-",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "-",
                  "consolidation_quality": "imagery-response / reconstruction viability lower",
                  "paper_grounded_fact": "Predicted and observed shape: rho_R lower, lambda_R higher, s_A mismatched or decoupled, V lower; drawing burden d about 1.013 and physiology burden d about 1.553.",
                  "corpus_boundary": "shape 1 lacks actual AMT scorer-output tables; not diagnostic"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Aphantasia_preserved_input_effort_support_lane",
                  "paper_file": "TAIRID_Aphantasia_Reconstruction_Response_Geometry_v0_6.pdf",
                  "evidence_level": "support_lane_not_primary_signature",
                  "boundary_or_group": "perception/input and effort/load channels",
                  "propagation_reach_direction": "0",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "0",
                  "consolidation_quality": "input/effort channels relatively preserved",
                  "paper_grounded_fact": "Safe claim: internal visual simulation/reconstruction gap while perception/input and effort/load remain more intact.",
                  "corpus_boundary": "not used as a direct cosmology-signature match row"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Autism_measured_dispersion_search_correction",
                  "paper_file": "TAIRID_Autism_Reference_Field_Organization_Paper_v0_1_Pass8U.docx",
                  "evidence_level": "direct_computed_model_correction_lane",
                  "boundary_or_group": "ASD-vs-TD eye-tracking / movie-viewing surface",
                  "propagation_reach_direction": "+",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "-",
                  "consolidation_quality": "lower measured boundary compaction; compact-depth not universal",
                  "paper_grounded_fact": "The starting high-depth/high-boundary prediction failed; stronger current signal was lower boundary precision/friction and higher dispersion/search.",
                  "corpus_boundary": "surface-dependent; not autism equals dispersed search"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Autism_compact_depth_future_mode_do_not_force",
                  "paper_file": "TAIRID_Autism_Reference_Field_Organization_Paper_v0_1_Pass8U.docx",
                  "evidence_level": "future_mode_candidate_not_current_primary_result",
                  "boundary_or_group": "stable, local-fit, rule-bound, sensory-detail, or special-interest-like task surfaces",
                  "propagation_reach_direction": "-",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "+",
                  "consolidation_quality": "candidate compact-depth mode",
                  "paper_grounded_fact": "Corrected model keeps compact-depth friction as one possible pathway but does not treat it as universal.",
                  "corpus_boundary": "must be tested on better surface; do not count as empirical match yet"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Bipolar_depressive_compressed_rhythm_basin",
                  "paper_file": "TAIRID_Bipolar_Phase_Cycling_Paper_Draft_Pass11.docx",
                  "evidence_level": "direct_computed_depression_side_lane",
                  "boundary_or_group": "Depresjon bipolar-II depressed subgroup vs controls",
                  "propagation_reach_direction": "-",
                  "pacing_access_direction": "-",
                  "consolidation_growth_direction": "+",
                  "consolidation_quality": "compressed or locked consolidation-heavy basin; not healthy consolidation",
                  "paper_grounded_fact": "Depression-side result: reduced beta_swing, reduced s_A_swing, reduced V_swing, and positive boundary-compression score.",
                  "corpus_boundary": "depression-side dataset only; no manic/euthymic raw reanalysis in this lane"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Bipolar_mania_hypomania_propagation_expansion",
                  "paper_file": "TAIRID_Bipolar_Phase_Cycling_Paper_Draft_Pass11.docx",
                  "evidence_level": "published_support_lane_raw_reanalysis_pending",
                  "boundary_or_group": "BipoSense/Zhang phase-support bridge",
                  "propagation_reach_direction": "+",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "-",
                  "consolidation_quality": "rest/consolidation reduced or destabilized",
                  "paper_grounded_fact": "Mania/hypomania is modeled as propagation-heavy activity expansion with P_eff/beta rising and sleep/rest consolidation reduced or destabilized.",
                  "corpus_boundary": "published support; raw TAIRID reanalysis pending"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Bipolar_euthymia_reference_rhythm",
                  "paper_file": "TAIRID_Bipolar_Phase_Cycling_Paper_Draft_Pass11.docx",
                  "evidence_level": "reference_state_lane",
                  "boundary_or_group": "subject-specific euthymic reference rhythm",
                  "propagation_reach_direction": "0",
                  "pacing_access_direction": "0",
                  "consolidation_growth_direction": "+",
                  "consolidation_quality": "reference rhythm / baseline viability",
                  "paper_grounded_fact": "Euthymia is the subject-specific rhythm surface against which depression, mania, and transition are measured.",
                  "corpus_boundary": "not a pathology row; reference surface"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Bipolar_mixed_transition_boundary_overlap",
                  "paper_file": "TAIRID_Bipolar_Phase_Cycling_Paper_Draft_Pass11.docx",
                  "evidence_level": "boundary_overlap_lane",
                  "boundary_or_group": "mixed or transition state",
                  "propagation_reach_direction": "M",
                  "pacing_access_direction": "M",
                  "consolidation_growth_direction": "M",
                  "consolidation_quality": "unstable phase mixture / off-axis overlap",
                  "paper_grounded_fact": "Mixed/transition states should not be forced into mania or depression; they may carry contradictory rhythm signatures.",
                  "corpus_boundary": "not classified into three-sign cosmology signature"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Schizotypy_positive_reference_field_overreach",
                  "paper_file": "TAIRID_Schizotypal_Reference_Field_Overreach_Paper_v0_3_Pass9S.docx",
                  "evidence_level": "computed_reach_plus_summary_anchor_lane",
                  "boundary_or_group": "positive/cognitive-perceptual schizotypy weak-anchor lane",
                  "propagation_reach_direction": "+",
                  "pacing_access_direction": "+",
                  "consolidation_growth_direction": "-",
                  "consolidation_quality": "anchor specificity / rejection confidence weaker",
                  "paper_grounded_fact": "Positive schizotypy fit weak/false-anchor acceptance most clearly; weakly related and unrelated lure acceptance mattered more than target recognition.",
                  "corpus_boundary": "not clinical schizophrenia; evidence lanes not same-sample"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Schizotypy_disorganized_drift_lane",
                  "paper_file": "TAIRID_Schizotypal_Reference_Field_Overreach_Paper_v0_3_Pass9S.docx",
                  "evidence_level": "trait_lane_separation",
                  "boundary_or_group": "disorganized schizotypy intrusion / set-loss / drift lane",
                  "propagation_reach_direction": "+",
                  "pacing_access_direction": "M",
                  "consolidation_growth_direction": "-",
                  "consolidation_quality": "poor return / drift; not just farther reach",
                  "paper_grounded_fact": "Disorganized traits fit intrusion, set-loss, drift, and return-chain instability rather than the same positive overreach lane.",
                  "corpus_boundary": "future same-sample task battery needed"
              },
              {
                  "domain": "neurotype_cognition",
                  "case_id": "Schizotypy_negative_underreach_return_cost_lane",
                  "paper_file": "TAIRID_Schizotypal_Reference_Field_Overreach_Paper_v0_3_Pass9S.docx",
                  "evidence_level": "unfinished_lane",
                  "boundary_or_group": "negative schizotypy switching/maintenance/underreach",
                  "propagation_reach_direction": "-",
                  "pacing_access_direction": "-",
                  "consolidation_growth_direction": "-",
                  "consolidation_quality": "underreach/maintenance cost; not positive overreach",
                  "paper_grounded_fact": "Negative traits should not be forced into overreach; the paper marks switching/maintenance, underreach, or return-cost as a major unfinished lane.",
                  "corpus_boundary": "unfinished lane; no match claim"
              }
          ]

          V4_188_SEED_ROWS = [
              {"case_id": "ADHD_width_over_depth_seed", "seed_signature": "++-", "seed_family": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low"},
              {"case_id": "autism_local_depth_update_cost_seed", "seed_signature": "--+", "seed_family": "low_reach_high_consolidation_non_cosmology_exact_variant"},
              {"case_id": "dyslexia_rerouting_timing_seed", "seed_signature": "+--", "seed_family": "high_reach_low_consolidation_non_cosmology_exact_variant"},
              {"case_id": "aphantasia_nonvisual_reconstruction_seed", "seed_signature": "-++", "seed_family": "QSO_z1p48_like_reach_low_pacing_high_growth_high"},
              {"case_id": "bipolar_mania_phase_seed", "seed_signature": "++-", "seed_family": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low"},
              {"case_id": "bipolar_depression_phase_seed", "seed_signature": "--+", "seed_family": "low_reach_high_consolidation_non_cosmology_exact_variant"},
              {"case_id": "schizotypy_reference_overreach_seed", "seed_signature": "++-", "seed_family": "LRGxELG_z0p70_like_reach_high_pacing_high_growth_low"}
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def classify_signature(p, t, c):
              if p in ["M", ""] or t in ["M", ""] or c in ["M", ""]:
                  signature = "".join([p, t, c])
                  family = "mixed_or_unclassified_boundary_shape"
                  direct = False
              else:
                  signature = p + t + c
                  family = LOCKED_COSMOLOGY_SIGNATURES.get(signature, "non_cosmology_exact_variant")
                  direct = signature in LOCKED_COSMOLOGY_SIGNATURES
              return signature, family, direct

          grounded_rows = []
          family_counts = {}
          direct_matches = 0
          do_not_force_rows = []

          for row in PAPER_GROUNDED_ROWS:
              signature, family, direct = classify_signature(
                  row["propagation_reach_direction"],
                  row["pacing_access_direction"],
                  row["consolidation_growth_direction"]
              )
              if direct:
                  direct_matches += 1
              family_counts[family] = family_counts.get(family, 0) + 1
              out = dict(row)
              out["shape_signature"] = signature
              out["shape_family"] = family
              out["direct_locked_cosmology_signature_match"] = direct
              out["match_boundary"] = "relational_shape_match_only_not_causal_or_unit_equivalence" if direct else "not_direct_locked_cosmology_signature"
              grounded_rows.append(out)
              if "do not" in row["corpus_boundary"].lower() or "not forced" in row["corpus_boundary"].lower() or "not classified" in row["corpus_boundary"].lower() or row["evidence_level"] in ["future_mode_candidate_not_current_primary_result", "unfinished_lane", "boundary_overlap_lane"]:
                  do_not_force_rows.append(out)

          correction_rows = [
              {
                  "v4_188_seed_case": "ADHD_width_over_depth_seed",
                  "paper_grounded_case": "ADHD_ds003500_selective_attention_width_over_depth",
                  "seed_signature": "++-",
                  "paper_signature": "++-",
                  "correction": "confirmed_with_direct_behavioral_lane",
                  "note": "Seed held, now paper-grounded."
              },
              {
                  "v4_188_seed_case": "autism_local_depth_update_cost_seed",
                  "paper_grounded_case": "Autism_measured_dispersion_search_correction",
                  "seed_signature": "--+",
                  "paper_signature": "++-",
                  "correction": "corrected_by_uploaded_paper",
                  "note": "Starting compact-depth/high-boundary model was too simple; measured lane favors dispersion/search and lower boundary compaction."
              },
              {
                  "v4_188_seed_case": "dyslexia_rerouting_timing_seed",
                  "paper_grounded_case": "Dyslexia_ETDD70_reading_flow_viability_window",
                  "seed_signature": "+--",
                  "paper_signature": "++-",
                  "correction": "corrected_by_uploaded_paper",
                  "note": "ETDD70 paper states s_A up, lambda_R up, rho_R down, V_data down; pacing/access should be treated as high load/expanded scale."
              },
              {
                  "v4_188_seed_case": "aphantasia_nonvisual_reconstruction_seed",
                  "paper_grounded_case": "Aphantasia_visual_reconstruction_response_gap",
                  "seed_signature": "-++",
                  "paper_signature": "-+-",
                  "correction": "corrected_by_uploaded_paper",
                  "note": "Paper-grounded primary lane is lower visual re-entry and lower imagery/reconstruction viability, with mismatch/decoupling high."
              },
              {
                  "v4_188_seed_case": "bipolar_mania_phase_seed",
                  "paper_grounded_case": "Bipolar_mania_hypomania_propagation_expansion",
                  "seed_signature": "++-",
                  "paper_signature": "++-",
                  "correction": "confirmed_but_evidence_level_changed",
                  "note": "Seed held, but current support is published full-cycle support with raw TAIRID reanalysis pending."
              },
              {
                  "v4_188_seed_case": "bipolar_depression_phase_seed",
                  "paper_grounded_case": "Bipolar_depressive_compressed_rhythm_basin",
                  "seed_signature": "--+",
                  "paper_signature": "--+",
                  "correction": "confirmed_with_quality_warning",
                  "note": "The + consolidation sign means compressed/locked consolidation-heavy basin, not healthy consolidation."
              },
              {
                  "v4_188_seed_case": "schizotypy_reference_overreach_seed",
                  "paper_grounded_case": "Schizotypy_positive_reference_field_overreach",
                  "seed_signature": "++-",
                  "paper_signature": "++-",
                  "correction": "confirmed_but_lane_split_added",
                  "note": "Positive/cognitive-perceptual lane fits; disorganized and negative lanes must be separated."
              }
          ]

          evidence_rows = []
          for row in grounded_rows:
              evidence_rows.append({
                  "case_id": row["case_id"],
                  "paper_file": row["paper_file"],
                  "evidence_level": row["evidence_level"],
                  "shape_signature": row["shape_signature"],
                  "direct_locked_cosmology_signature_match": row["direct_locked_cosmology_signature_match"],
                  "safe_use": "paper_grounded_shape_screen_only",
                  "unsafe_use": "validation_or_diagnosis_or_unit_equivalence"
              })

          recommended_input_rows = []
          for row in grounded_rows:
              if row["shape_signature"] and "M" not in row["shape_signature"] and row["shape_signature"] != "000":
                  recommended_input_rows.append({
                      "domain": row["domain"],
                      "case_id": row["case_id"],
                      "boundary_or_group": row["boundary_or_group"],
                      "propagation_reach_value": "",
                      "pacing_access_value": "",
                      "consolidation_growth_value": "",
                      "reference_or_expected_propagation": "",
                      "reference_or_expected_pacing": "",
                      "reference_or_expected_consolidation": "",
                      "propagation_direction": row["propagation_reach_direction"],
                      "pacing_direction": row["pacing_access_direction"],
                      "consolidation_direction": row["consolidation_growth_direction"],
                      "notes": row["paper_grounded_fact"] + " Boundary: " + row["corpus_boundary"],
                      "source_or_dataset": row["paper_file"] + " | " + row["evidence_level"]
                  })

          family_count_rows = [{"shape_family": k, "count": v} for k, v in sorted(family_counts.items(), key=lambda kv: (-kv[1], kv[0]))]

          paper_grounded_fields = [
              "domain", "case_id", "paper_file", "evidence_level", "boundary_or_group",
              "propagation_reach_direction", "pacing_access_direction", "consolidation_growth_direction",
              "consolidation_quality", "shape_signature", "shape_family",
              "direct_locked_cosmology_signature_match", "match_boundary",
              "paper_grounded_fact", "corpus_boundary"
          ]

          write_csv(OUT / "v4_189_v4_188_artifact_review.csv", [V4_188_ARTIFACT_REVIEW], list(V4_188_ARTIFACT_REVIEW.keys()))
          (OUT / "v4_189_v4_188_artifact_review.json").write_text(json.dumps(V4_188_ARTIFACT_REVIEW, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_189_v4_188_seed_rows_carried_forward.csv", V4_188_SEED_ROWS, ["case_id", "seed_signature", "seed_family"])
          write_csv(OUT / "v4_189_paper_grounded_neurotype_shape_matrix.csv", grounded_rows, paper_grounded_fields)
          write_csv(OUT / "v4_189_seed_vs_paper_correction_report.csv", correction_rows, ["v4_188_seed_case", "paper_grounded_case", "seed_signature", "paper_signature", "correction", "note"])
          write_csv(OUT / "v4_189_shape_family_counts.csv", family_count_rows, ["shape_family", "count"])
          write_csv(OUT / "v4_189_evidence_level_matrix.csv", evidence_rows, ["case_id", "paper_file", "evidence_level", "shape_signature", "direct_locked_cosmology_signature_match", "safe_use", "unsafe_use"])
          write_csv(OUT / "v4_189_do_not_force_flags.csv", do_not_force_rows, paper_grounded_fields)
          write_csv(OUT / "v4_189_recommended_neurotype_empirical_shape_input.csv", recommended_input_rows, [
              "domain", "case_id", "boundary_or_group", "propagation_reach_value", "pacing_access_value",
              "consolidation_growth_value", "reference_or_expected_propagation", "reference_or_expected_pacing",
              "reference_or_expected_consolidation", "propagation_direction", "pacing_direction",
              "consolidation_direction", "notes", "source_or_dataset"
          ])

          next_route = "neurotype_paper_grounded_shape_matrix_review_then_promote_recommended_input_with_scope_guards"

          route_decision = {
              "version": "v4.189",
              "result_label": RESULT_LABEL,
              "clean_result": "v4.188 seed rows were reviewed against uploaded neurotype papers. A paper-grounded shape matrix, correction report, and recommended empirical-input CSV were written.",
              "v4_188_seed_rows": V4_188_ARTIFACT_REVIEW["seed_rows"],
              "paper_grounded_rows": len(grounded_rows),
              "paper_grounded_direct_locked_cosmology_signature_matches": direct_matches,
              "do_not_force_flag_count": len(do_not_force_rows),
              "recommended_input_rows": len(recommended_input_rows),
              "package_status": "paper_grounded_shape_matrix_written_no_cross_domain_validation",
              "selected_next_route": next_route,
              "truth_boundary": "paper-grounded matrix, not external validation, diagnosis, unit equivalence, or TAIRID proof",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_189_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_189_scope_guards.json").write_text(json.dumps({
              "scope": "uploaded neurotype corpus grounded shape matrix builder only",
              "seed_rows_replaced_or_qualified": True,
              "paper_grounded_rows_are_external_validation": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "neurotype_validation_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_189_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.189 - Uploaded Neurotype Corpus Grounded Shape Matrix Builder",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.188 passed but contained seed rows only. v4.189 uses the uploaded neurotype papers to write a paper-grounded shape matrix and correction report.",
              "",
              "v4.188 seed rows: `" + str(V4_188_ARTIFACT_REVIEW["seed_rows"]) + "`",
              "Paper-grounded rows: `" + str(len(grounded_rows)) + "`",
              "Direct locked-cosmology signature matches: `" + str(direct_matches) + "`",
              "Do-not-force flags: `" + str(len(do_not_force_rows)) + "`",
              "Recommended input rows: `" + str(len(recommended_input_rows)) + "`",
              "",
              "## Important corrections",
              "",
              "- Autism seed was corrected: current paper says the simple high-depth/high-boundary prediction failed; measured lane favors dispersion/search and lower boundary compaction.",
              "- Dyslexia seed was corrected: ETDD70 paper-grounded shape is s_A up, lambda_R up, rho_R down, V_data down.",
              "- Aphantasia seed was corrected: the primary visual imagery/reconstruction lane has lower re-entry and lower imagery/reconstruction viability.",
              "- Bipolar depression was kept but qualified: consolidation-heavy means compressed/locked, not healthy consolidation.",
              "- Schizotypy was split by trait lane: positive overreach, disorganized drift, and negative underreach/return-cost cannot be collapsed into one row.",
              "",
              "## Selected next route",
              "",
              "`" + next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_189_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_189_v4_188_artifact_review.csv",
              "v4_189_v4_188_artifact_review.json",
              "v4_189_v4_188_seed_rows_carried_forward.csv",
              "v4_189_paper_grounded_neurotype_shape_matrix.csv",
              "v4_189_seed_vs_paper_correction_report.csv",
              "v4_189_shape_family_counts.csv",
              "v4_189_evidence_level_matrix.csv",
              "v4_189_do_not_force_flags.csv",
              "v4_189_recommended_neurotype_empirical_shape_input.csv",
              "v4_189_route_decision.json",
              "v4_189_scope_guards.json",
              "v4_189_blocked_claims.json",
              "v4_189_summary.md"
          ]

          rules = {
              "version_is_v4_189": True,
              "result_label_present": RESULT_LABEL.endswith("no_cross_domain_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_188_artifact_review_present": V4_188_ARTIFACT_REVIEW["rule_pass_count"] == 8,
              "paper_grounded_rows_present": len(grounded_rows) >= 12,
              "correction_report_present": len(correction_rows) == 7,
              "recommended_input_rows_present": len(recommended_input_rows) >= 10,
              "do_not_force_flags_present": len(do_not_force_rows) >= 3,
              "autism_correction_present": any(r["paper_grounded_case"] == "Autism_measured_dispersion_search_correction" and r["correction"] == "corrected_by_uploaded_paper" for r in correction_rows),
              "no_cross_domain_validation_claim": True,
              "no_unit_equivalence_claim": True,
              "no_clinical_diagnosis_claim": True,
              "next_route_selected": bool(next_route)
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.189",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "paper_grounded_rows": len(grounded_rows),
              "paper_grounded_direct_locked_cosmology_signature_matches": direct_matches,
              "do_not_force_flag_count": len(do_not_force_rows),
              "recommended_input_rows": len(recommended_input_rows),
              "package_status": route_decision["package_status"],
              "selected_next_route": next_route,
              "claim_boundary": "paper_grounded_shape_matrix_only_no_cross_domain_validation"
          }

          (OUT / "v4_189_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.189 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_189_outputs/run_v4_189.py

      - name: Upload v4.189 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-189-uploaded-neurotype-corpus-grounded-shape-matrix-output
          path: tairid_v4_189_outputs/
