name: Run TAIRID Table2 F160W threshold sweep v1.4

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-table2-f160w-threshold-sweep-v1-4:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy matplotlib astropy pandas

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_table2_f160w_threshold_sweep_v1_4.py
          echo "Script found."

      - name: Run TAIRID Table2 F160W threshold sweep v1.4
        run: |
          python run_tairid_table2_f160w_threshold_sweep_v1_4.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-table2-f160w-threshold-sweep-v1-4-output
          path: |
            tairid_table2_f160w_threshold_sweep_v1_4_outputs/**
