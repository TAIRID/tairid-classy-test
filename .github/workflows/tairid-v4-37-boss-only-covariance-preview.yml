          write_csv(
              OUTDIR / "boss_only_correlation_entries_v4_37.csv",
              correlation_entries,
              ["sub_i", "sub_j", "correlation_value", "covariance_applied_to_BOSS_only_preview", "pressure_score_allowed_now"]
          )

          write_csv(
              OUTDIR / "boss_only_inverse_covariance_entries_v4_37.csv",
              inverse_covariance_entries,
              ["sub_i", "sub_j", "inverse_covariance_value", "pressure_score_allowed_now"]
          )

          write_csv(
              OUTDIR / "boss_only_preview_summary_v4_37.csv",
              [preview_summary],
              [
                  "boss_only_row_count",
                  "negative_residual_count",
                  "positive_residual_count",
                  "zero_residual_count",
                  "mean_residual_observed_minus_reference",
                  "mean_diagonal_z_preview",
                  "boss_only_covariance_chi2_preview",
                  "boss_only_covariance_preview_dof",
                  "boss_only_covariance_sqrt_chi2_preview",
                  "covariance_used_for_BOSS_only_preview",
                  "reference_uncertainty_included",
                  "full_RSD_covariance_complete",
                  "final_pressure_score_built"
              ]
          )

          write_csv(
              OUTDIR / "boss_only_preview_rule_results_v4_37.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_37.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_37.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_37.csv",
              [system_health],
              [
                  "download_ok",
                  "boss_only_preview_row_count",
                  "negative_residual_count",
                  "positive_residual_count",
                  "zero_residual_count",
                  "mean_residual_observed_minus_reference",
                  "mean_diagonal_z_preview",
                  "boss_only_covariance_chi2_preview",
                  "boss_only_covariance_preview_dof",
                  "boss_only_covariance_sqrt_chi2_preview",
                  "covariance_used_for_BOSS_only_preview",
                  "reference_uncertainty_included",
                  "full_RSD_covariance_complete",
                  "final_pressure_score_built",
                  "likelihood_run",
                  "validation_claim_allowed",
                  "rule_pass_count",
                  "rule_total_count"
              ]
          )

          json_path = OUTDIR / "tairid_v4_37_boss_only_covariance_preview.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.37 — BOSS-only Covariance Residual Preview Guard")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("A BOSS-only covariance residual preview was computed using the extracted BOSS f_sigma8 covariance submatrix.")
          md.append("")
          md.append("This is not a full RSD pressure score. WiggleZ and eBOSS covariance are still unresolved, and reference uncertainty is still missing.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## BOSS-only residual rows")
          md.append("")
          md.append("| z | Observed | Reference | Residual | Diagonal z | Direction |")
          md.append("|---:|---:|---:|---:|---:|---|")
          for row in boss_residual_rows:
              md.append(
                  f"| `{row['z_eff']}` | `{row['observed_f_sigma8']:.6f}` | `{row['reference_f_sigma8']:.6f}` | "
                  f"`{row['residual_observed_minus_reference']:.6f}` | `{row['diagonal_z_preview']:.6f}` | `{row['direction']}` |"
              )
          md.append("")
          md.append("## Rule results")
          md.append("")
          md.append("| Rule | Pass | Result | Boundary |")
          md.append("|---|---:|---|---|")
          for row in rule_results:
              md.append(f"| `{row['rule_id']}` | `{row['pass']}` | `{row['result']}` | {row['boundary']} |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `boss_only_covariance_residual_rows_v4_37.csv`")
          md.append("- `boss_only_covariance_entries_v4_37.csv`")
          md.append("- `boss_only_correlation_entries_v4_37.csv`")
          md.append("- `boss_only_inverse_covariance_entries_v4_37.csv`")
          md.append("- `boss_only_preview_summary_v4_37.csv`")
          md.append("- `boss_only_preview_rule_results_v4_37.csv`")
          md.append("- `blocked_claims_v4_37.csv`")
          md.append("- `next_test_ladder_v4_37.csv`")
          md.append("- `system_health_v4_37.csv`")
          md.append("- `tairid_v4_37_boss_only_covariance_preview.json`")
          md.append("- `tairid_v4_37_boss_only_covariance_preview.md`")
          md.append("")

          md_path = OUTDIR / "tairid_v4_37_boss_only_covariance_preview.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

