name: Run TAIRID SH0ES Table2 Y Row Identity Probe v1.7

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-table2-y-row-identity-probe-v1-7:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_table2_y_row_identity_probe_v1_7.py
          echo "v1.7 SH0ES Table2 y row identity probe found."

      - name: Run TAIRID SH0ES Table2 Y Row Identity Probe v1.7
        run: |
          python run_tairid_shoes_table2_y_row_identity_probe_v1_7.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-table2-y-row-identity-probe-v1-7-output
          path: |
            tairid_shoes_table2_y_row_identity_probe_v1_7_outputs/**
