name: 001 TAIRID v4.289 - SDSS RSD Reference Page Probe And Row Meaning No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-289-sdss-rsd-reference-page-probe-and-row-meaning-no-scoring.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-reference-page-probe-row-meaning-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.289 SDSS RSD Reference Page Probe And Row Meaning No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.289 SDSS RSD reference page probe and row meaning no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import html
          import re
          import urllib.parse
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.289"
          ROUTE = "sdss_rsd_reference_page_probe_and_row_meaning_no_scoring_after_v4_288"
          EXPECTED_RESULT = "v4_289_sdss_rsd_reference_page_probe_and_row_meaning_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_290_sdss_rsd_baseline_value_fill_guard_no_scoring"

          OUT = Path("tairid_v4_289_sdss_rsd_reference_page_probe_row_meaning_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-289-sdss-rsd-reference-page-probe-row-meaning-output.zip"
          SOURCE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/"
          RELATED_PAGE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          MAX_BYTES = 2_000_000

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []
                  self.in_a = False
                  self.current_href = ""
                  self.current_text = []

              def handle_starttag(self, tag, attrs):
                  if tag.lower() == "a":
                      attrs = dict(attrs)
                      self.in_a = True
                      self.current_href = attrs.get("href", "")
                      self.current_text = []

              def handle_data(self, data):
                  if self.in_a:
                      self.current_text.append(data)

              def handle_endtag(self, tag):
                  if tag.lower() == "a" and self.in_a:
                      text = " ".join(" ".join(self.current_text).split())
                      self.links.append({"href": self.current_href, "text": text})
                      self.in_a = False
                      self.current_href = ""
                      self.current_text = []

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=MAX_BYTES, timeout=15):
              out = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.289-reference-probe-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      out["status_code"] = getattr(resp, "status", "")
                      out["content_type"] = resp.headers.get("Content-Type", "")
                      out["content_length_header"] = resp.headers.get("Content-Length", "")
                      out["final_url"] = resp.geturl()
                      out["bytes_read"] = len(data)
                      out["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      out["fetch_ok"] = True
              except Exception as exc:
                  out["error"] = f"{type(exc).__name__}: {exc}"
              return out, data

          def strip_html_text(data):
              if not data:
                  return ""
              text = data.decode("utf-8", errors="replace")
              text = re.sub(r"<script.*?</script>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.I | re.S)
              text = re.sub(r"<[^>]+>", " ", text)
              return html.unescape(" ".join(text.split()))

          def extract_candidate_links(base_url, data):
              if not data:
                  return []
              parser = LinkParser()
              parser.feed(data.decode("utf-8", errors="replace"))
              rows = []
              keywords = ["bao", "rsd", "eboss", "final", "measurement", "cosmo", "cosmology", "paper", "arxiv", "doi", "table", "data", "zhao", "alam"]
              seen = set()
              for link in parser.links:
                  href = link["href"].strip()
                  if not href:
                      continue
                  url = urllib.parse.urljoin(base_url, href).split("#")[0]
                  if url in seen:
                      continue
                  seen.add(url)
                  hay = (url + " " + link["text"]).lower()
                  if any(k in hay for k in keywords):
                      rows.append({
                          "candidate_url": url,
                          "link_text": link["text"],
                          "source_page": base_url,
                          "locator_basis": "discovered_link_keyword_match",
                          "score_allowed": False,
                      })
              return rows

          def ads_to_arxiv(url):
              m = re.search(r"abs/([0-9]{4})arXiv([0-9]{4}\.[0-9]{4,5})([A-Za-z]?)/abstract", url)
              if m:
                  suffix = m.group(3)
                  arxiv_id = m.group(2) + suffix
                  return "https://arxiv.org/abs/" + arxiv_id
              m2 = re.search(r"arxiv\.org/abs/([0-9]{4}\.[0-9]{4,5}[A-Za-z]?)", url)
              if m2:
                  return "https://arxiv.org/abs/" + m2.group(1)
              return ""

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              try:
                  fields["z_eff"] = float(fields["z_eff_text"])
              except Exception:
                  fields["z_eff"] = ""
              return fields

          def parse_column_contract_rows(tables):
              out = []
              for table_idx, table in enumerate(tables):
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      row_type = "redshift_function_row_candidate" if "(z)" in label_norm else "final_or_consensus_row_candidate"
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for value, sigma in measurement_pairs(cell):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              out.append({
                                  "contract_id": f"column_contract_bound_{len(out)+1:02d}",
                                  "bound_id": f"bound_{len(out)+1:02d}",
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "z_eff": fields["z_eff"],
                                  "z_range_text": fields["z_range_text"],
                                  "observable": "f_sigma8",
                                  "observed_value": value,
                                  "observed_sigma": sigma,
                                  "baseline_comparator_required": True,
                                  "covariance_policy_required": True,
                                  "score_allowed": False,
                                  "contract_status": "rebuilt_for_reference_probe_no_scoring",
                              })
              return out

          def count_terms(text):
              lower = text.lower()
              terms = {
                  "fsigma8": len(re.findall(r"f\s*σ\s*8|f\s*sigma\s*8|fsigma8|f\\sigma_8", lower)),
                  "rsd": lower.count("rsd") + lower.count("redshift-space distortion"),
                  "bao": lower.count("bao") + lower.count("baryon acoustic"),
                  "consensus": lower.count("consensus"),
                  "fiducial": lower.count("fiducial"),
                  "lcdm": lower.count("lcdm") + lower.count("Λcdm".lower()),
                  "growth": lower.count("growth"),
                  "covariance": lower.count("covariance"),
                  "likelihood": lower.count("likelihood"),
              }
              return terms

          def window_around_terms(text, terms, width=180):
              lower = text.lower()
              starts = []
              for term in terms:
                  idx = lower.find(term.lower())
                  if idx >= 0:
                      starts.append(idx)
              if not starts:
                  return ""
              idx = min(starts)
              return text[max(0, idx-width):idx+width].replace("\n", " ")[:500]

          inherited_v4_288_rows = [
              {"inherited_from": "v4.288", "item": "rules", "value": "45 / 45 passed", "meaning": "Baseline reference locator passed.", "carry_forward_status": "ready_for_reference_probe"},
              {"inherited_from": "v4.288", "item": "source_fetch_ok", "value": True, "meaning": "GitHub fetched the official SDSS table page.", "carry_forward_status": "source_page_available"},
              {"inherited_from": "v4.288", "item": "related_fetch_ok", "value": True, "meaning": "GitHub fetched the related SDSS overview page.", "carry_forward_status": "related_page_available"},
              {"inherited_from": "v4.288", "item": "column_contract_rows", "value": 12, "meaning": "Twelve SDSS f_sigma8 column contracts existed.", "carry_forward_status": "column_contracts_ready"},
              {"inherited_from": "v4.288", "item": "baseline_reference_candidate_rows", "value": 54, "meaning": "Fifty-four reference candidates were found.", "carry_forward_status": "reference_candidates_ready"},
              {"inherited_from": "v4.288", "item": "baseline_stub_locator_rows", "value": 12, "meaning": "Twelve baseline stub locators were written but empty.", "carry_forward_status": "baseline_stubs_empty"},
              {"inherited_from": "v4.288", "item": "baseline_values_filled", "value": False, "meaning": "No baseline values were filled.", "carry_forward_status": "baseline_missing"},
              {"inherited_from": "v4.288", "item": "row_meaning_confirmed", "value": False, "meaning": "Row meaning remained unconfirmed.", "carry_forward_status": "row_meaning_missing"},
              {"inherited_from": "v4.288", "item": "support_allowed", "value": False, "meaning": "Support remained blocked.", "carry_forward_status": "support_blocked"},
              {"inherited_from": "v4.288", "item": "selected_next_route", "value": "v4_289_sdss_rsd_reference_page_probe_and_row_meaning_no_scoring", "meaning": "Current route probes reference pages for row meaning without scoring.", "carry_forward_status": "current_route"},
          ]

          source_fetch_row, source_data = fetch_url(SOURCE_URL)
          related_fetch_row, related_data = fetch_url(RELATED_PAGE_URL)

          parser = SimpleTableParser()
          if source_data:
              parser.feed(source_data.decode("utf-8", errors="replace"))
          column_contract_rows = parse_column_contract_rows(parser.tables)

          discovered = extract_candidate_links(SOURCE_URL, source_data) + extract_candidate_links(RELATED_PAGE_URL, related_data)

          static_candidates = [
              {"candidate_url": SOURCE_URL, "link_text": "SDSS final BAO and RSD measurements table", "source_page": "static", "locator_basis": "official_table_page"},
              {"candidate_url": RELATED_PAGE_URL, "link_text": "SDSS final BAO and RSD measurements overview", "source_page": "static", "locator_basis": "official_related_page"},
              {"candidate_url": "https://www.sdss4.org/dr16/", "link_text": "SDSS DR16 release page", "source_page": "static", "locator_basis": "official_release_context"},
          ]

          raw_candidates = static_candidates + discovered
          deduped = []
          seen = set()
          for row in raw_candidates:
              url = row["candidate_url"].split("#")[0]
              if url in seen:
                  continue
              seen.add(url)
              new = dict(row)
              new["candidate_id"] = f"probe_candidate_{len(deduped)+1:03d}"
              new["score_allowed"] = False
              deduped.append(new)

          # Prioritize official SDSS pages and the likely final/eBOSS cosmology paper links before image/data noise.
          prioritized = []
          for row in deduped:
              url = row["candidate_url"].lower()
              text = row.get("link_text", "").lower()
              score = 0
              if "sdss4.org/science/final-bao-and-rsd-measurements" in url:
                  score += 50
              if "arxiv" in url or "ui.adsabs" in url:
                  score += 30
              if "alam" in text or "zhao" in text:
                  score += 20
              if "ross " in text or "raichoor" in text or "du mas" in text:
                  score += 10
              if "png" in url or "jpg" in url:
                  score -= 30
              if "dr17" in url:
                  score -= 10
              row = dict(row)
              row["priority_score"] = score
              row["arxiv_probe_url"] = ads_to_arxiv(row["candidate_url"])
              prioritized.append(row)
          prioritized = sorted(prioritized, key=lambda r: r["priority_score"], reverse=True)
          reference_probe_candidate_rows = prioritized[:18]

          reference_probe_rows = []
          for row in reference_probe_candidate_rows:
              urls_to_probe = [row["candidate_url"]]
              if row.get("arxiv_probe_url"):
                  urls_to_probe.append(row["arxiv_probe_url"])
              for probe_url in urls_to_probe:
                  fetch, data = fetch_url(probe_url, max_bytes=900000, timeout=12)
                  text = strip_html_text(data)
                  terms = count_terms(text)
                  relevance_score = (
                      terms["fsigma8"] * 5 +
                      terms["rsd"] * 3 +
                      terms["bao"] * 2 +
                      terms["consensus"] * 4 +
                      terms["fiducial"] +
                      terms["lcdm"] +
                      terms["growth"] * 2 +
                      terms["covariance"] +
                      terms["likelihood"]
                  )
                  reference_probe_rows.append({
                      "probe_id": f"ref_probe_{len(reference_probe_rows)+1:03d}",
                      "candidate_id": row["candidate_id"],
                      "candidate_url": row["candidate_url"],
                      "probe_url": probe_url,
                      "link_text": row.get("link_text", ""),
                      "fetch_ok": fetch["fetch_ok"],
                      "status_code": fetch["status_code"],
                      "content_type": fetch["content_type"],
                      "bytes_read": fetch["bytes_read"],
                      "sha256_first_bytes": fetch["sha256_first_bytes"],
                      "term_count_fsigma8": terms["fsigma8"],
                      "term_count_rsd": terms["rsd"],
                      "term_count_bao": terms["bao"],
                      "term_count_consensus": terms["consensus"],
                      "term_count_fiducial": terms["fiducial"],
                      "term_count_lcdm": terms["lcdm"],
                      "term_count_growth": terms["growth"],
                      "term_count_covariance": terms["covariance"],
                      "term_count_likelihood": terms["likelihood"],
                      "row_meaning_hint_window": window_around_terms(text, ["fσ8", "f sigma", "fsigma8", "consensus", "fiducial", "RSD"]),
                      "relevance_score_no_claim": relevance_score,
                      "probe_status": "reference_probe_only_not_baseline_value",
                      "score_allowed": False,
                      "support_allowed": False,
                  })

          # Row meaning remains guarded: hints can suggest which pages to read next, not confirm the row.
          best_probes = sorted(reference_probe_rows, key=lambda r: r["relevance_score_no_claim"], reverse=True)[:12]
          row_meaning_hint_rows = []
          for row_label in ["f σ 8 (z)", "f σ 8", "two-row relationship"]:
              for probe in best_probes[:6]:
                  row_meaning_hint_rows.append({
                      "hint_id": f"row_hint_{len(row_meaning_hint_rows)+1:03d}",
                      "row_label": row_label,
                      "probe_id": probe["probe_id"],
                      "probe_url": probe["probe_url"],
                      "link_text": probe["link_text"],
                      "relevance_score_no_claim": probe["relevance_score_no_claim"],
                      "hint_window": probe["row_meaning_hint_window"],
                      "hint_status": "candidate_hint_not_confirmation",
                      "row_meaning_confirmed": False,
                      "score_allowed": False,
                  })

          baseline_reference_map_rows = []
          for contract in column_contract_rows:
              baseline_reference_map_rows.append({
                  "baseline_map_id": f"baseline_map_{contract['bound_id']}",
                  "bound_id": contract["bound_id"],
                  "row_label": contract["row_label"],
                  "sample_or_tracer": contract["sample_or_tracer"],
                  "z_eff": contract["z_eff"],
                  "observed_value": contract["observed_value"],
                  "observed_sigma": contract["observed_sigma"],
                  "top_reference_probe_id": best_probes[0]["probe_id"] if best_probes else "NONE",
                  "top_reference_probe_url": best_probes[0]["probe_url"] if best_probes else "NONE",
                  "baseline_value": "NOT_FILLED",
                  "baseline_source": "NOT_SELECTED",
                  "row_meaning_source": "NOT_CONFIRMED",
                  "baseline_status": "reference_probe_candidates_only_not_filled",
                  "score_allowed": False,
                  "support_allowed": False,
              })

          row_meaning_review_rows = [
              {
                  "review_id": "row_review_001",
                  "row_label": "f σ 8 (z)",
                  "current_interpretation": "redshift_function_row_candidate_from_table_label",
                  "confirmation_status": "not_confirmed",
                  "needed_next": "source text explaining whether f_sigma8(z) is model-dependent function, displayed comparator, or alternate measurement row",
                  "score_allowed": False,
              },
              {
                  "review_id": "row_review_002",
                  "row_label": "f σ 8",
                  "current_interpretation": "final_or_consensus_row_candidate_from_table_label",
                  "confirmation_status": "not_confirmed",
                  "needed_next": "source text explaining whether this is the final consensus measurement row used for scoring",
                  "score_allowed": False,
              },
              {
                  "review_id": "row_review_003",
                  "row_label": "two-row relationship",
                  "current_interpretation": "two rows are variants until source meaning is confirmed",
                  "confirmation_status": "not_confirmed",
                  "needed_next": "source text explaining whether both rows are independent, derived, duplicate, or final-vs-intermediate",
                  "score_allowed": False,
              },
          ]

          no_score_policy_rows = [
              {"policy_id": "policy_001", "object": "reference_probe", "rule": "fetch success and term counts do not confirm row meaning or fill baseline values", "status": "active"},
              {"policy_id": "policy_002", "object": "row_meaning_hint", "rule": "hint windows guide reading only and cannot become scoring input", "status": "active"},
              {"policy_id": "policy_003", "object": "baseline_reference_map", "rule": "top reference probes are locator candidates only; baseline values remain NOT_FILLED", "status": "active"},
              {"policy_id": "policy_004", "object": "support_language", "rule": "same-family SDSS/eBOSS smoke data remains no-claims until baseline/covariance/source meaning pass later guards", "status": "active"},
          ]

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "confirm_row_meaning_now", "reason": "reference probes provide hints only, not confirmed source interpretation", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "fill_baseline_values_now", "reason": "baseline values are not extracted or mapped", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "score_sdss_rsd_rows", "reason": "baseline values, covariance, and row meaning are still missing", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "claim_tairid_support", "reason": "reference probing is not evidence", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "claim_baseline_advantage", "reason": "no baseline comparator has been computed", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "compute_p_value_or_likelihood", "reason": "no covariance or likelihood guard exists", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "approve_holdout_source", "reason": "SDSS/eBOSS remains same-family current lane", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "reference_page_probe", "permission_status": "attempted_no_scoring", "reason": "Candidate reference pages were probed for row-meaning terms."},
              {"permission_scope": "arxiv_probe", "permission_status": "attempted_where_locator_present", "reason": "ADS arXiv identifiers were converted to arXiv abs URLs where possible."},
