name: 001 TAIRID v4.287 - SDSS RSD Exact Column Contract And Baseline Stub No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-287-sdss-rsd-exact-column-contract-and-baseline-stub-no-scoring.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-exact-column-contract-baseline-stub-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.287 SDSS RSD Exact Column Contract And Baseline Stub No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.287 SDSS RSD exact column contract and baseline stub no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import hashlib
          import html
          import math
          import re
          import statistics
          import urllib.request
          import zipfile
          from html.parser import HTMLParser

          VERSION = "v4.287"
          ROUTE = "sdss_rsd_exact_column_contract_and_baseline_stub_no_scoring_after_v4_286"
          EXPECTED_RESULT = "v4_287_sdss_rsd_exact_column_contract_and_baseline_stub_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_288_sdss_rsd_baseline_reference_locator_no_scoring"

          OUT = Path("tairid_v4_287_sdss_rsd_exact_column_contract_baseline_stub_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-287-sdss-rsd-exact-column-contract-baseline-stub-output.zip"
          SOURCE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements-table/"
          MAX_BYTES = 2_000_000

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          class SimpleTableParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.tables = []
                  self.current_table = None
                  self.current_row = None
                  self.current_cell = None
                  self.in_table = False
                  self.in_row = False
                  self.in_cell = False

              def handle_starttag(self, tag, attrs):
                  tag = tag.lower()
                  if tag == "table":
                      self.in_table = True
                      self.current_table = []
                  elif self.in_table and tag == "tr":
                      self.in_row = True
                      self.current_row = []
                  elif self.in_table and self.in_row and tag in ["td", "th"]:
                      self.in_cell = True
                      self.current_cell = []

              def handle_data(self, data):
                  if self.in_cell and self.current_cell is not None:
                      self.current_cell.append(data)

              def handle_endtag(self, tag):
                  tag = tag.lower()
                  if tag in ["td", "th"] and self.in_cell:
                      cell = " ".join(" ".join(self.current_cell).split())
                      self.current_row.append(cell)
                      self.current_cell = None
                      self.in_cell = False
                  elif tag == "tr" and self.in_row:
                      if self.current_row:
                          self.current_table.append(self.current_row)
                      self.current_row = None
                      self.in_row = False
                  elif tag == "table" and self.in_table:
                      if self.current_table is not None:
                          self.tables.append(self.current_table)
                      self.current_table = None
                      self.in_table = False

          def fetch_url(url, max_bytes=MAX_BYTES, timeout=15):
              out = {
                  "url": url,
                  "fetch_attempted": True,
                  "fetch_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "content_length_header": "",
                  "final_url": "",
                  "bytes_read": 0,
                  "sha256_first_bytes": "",
                  "error": "",
              }
              data = b""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v4.287-column-contract-no-claims"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      data = resp.read(max_bytes)
                      out["status_code"] = getattr(resp, "status", "")
                      out["content_type"] = resp.headers.get("Content-Type", "")
                      out["content_length_header"] = resp.headers.get("Content-Length", "")
                      out["final_url"] = resp.geturl()
                      out["bytes_read"] = len(data)
                      out["sha256_first_bytes"] = hashlib.sha256(data).hexdigest() if data else ""
                      out["fetch_ok"] = True
              except Exception as exc:
                  out["error"] = f"{type(exc).__name__}: {exc}"
              return out, data

          def measurement_pairs(cell):
              pattern = re.compile(r"(?<![A-Za-z0-9])([0-9]+(?:\.[0-9]+)?)\s*(?:\+/-|±|\+-)\s*([0-9]+(?:\.[0-9]+)?)")
              return [(float(a), float(b)) for a, b in pattern.findall(str(cell))]

          def row_label(row):
              return row[0] if row else ""

          def is_fsigma_row(row):
              label = row_label(row).lower().replace(" ", "").replace("_", "")
              joined = " ".join(row).lower().replace(" ", "").replace("_", "")
              return ("fσ8" in label) or ("fsigma8" in label) or ("fσ8" in joined) or ("fsigma8" in joined)

          def infer_header_rows(table):
              header_rows = []
              for idx, row in enumerate(table[:8]):
                  joined = " ".join(row).lower()
                  has_measurements = bool(measurement_pairs(" ".join(row)))
                  label_has_data_terms = any(term in joined for term in ["z", "redshift", "sample", "tracer", "lya", "lrg", "elg", "qso", "void", "mgs", "boss", "eboss"])
                  if not has_measurements and (label_has_data_terms or idx <= 3):
                      header_rows.append(idx)
              return header_rows

          def bind_headers_to_row(table, row_idx):
              if not table:
                  return []
              max_cols = max(len(r) for r in table)
              header_indices = infer_header_rows(table)
              bindings = []
              for col_idx in range(1, max_cols):
                  parts = []
                  for hidx in header_indices:
                      row = table[hidx]
                      if col_idx < len(row) and row[col_idx].strip():
                          parts.append(row[col_idx].strip())
                  bindings.append({
                      "col_index": col_idx,
                      "bound_header": " / ".join(parts) if parts else f"column_{col_idx}",
                      "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                  })
              return bindings

          def split_bound_header(bound_header):
              parts = [p.strip() for p in str(bound_header).split("/") if p.strip()]
              # Based on observed SDSS table header structure from v4.286:
              # sample/tracer, imaging/source, bands, program, z_range, objects, z_eff.
              fields = {
                  "sample_or_tracer": parts[0] if len(parts) > 0 else "",
                  "imaging_or_source": parts[1] if len(parts) > 1 else "",
                  "bands_or_selection": parts[2] if len(parts) > 2 else "",
                  "program_or_targeting": parts[3] if len(parts) > 3 else "",
                  "z_range_text": parts[4] if len(parts) > 4 else "",
                  "object_count_text": parts[5] if len(parts) > 5 else "",
                  "z_eff_text": parts[6] if len(parts) > 6 else "",
              }
              z_eff = ""
              try:
                  z_eff = float(fields["z_eff_text"])
              except Exception:
                  z_eff = ""
              fields["z_eff"] = z_eff
              return fields

          def parse_bound_fsigma_rows(tables):
              bound_rows = []
              row_meaning_rows = []
              for table_idx, table in enumerate(tables):
                  header_indices = infer_header_rows(table)
                  for row_idx, row in enumerate(table):
                      if not is_fsigma_row(row):
                          continue
                      label = row_label(row)
                      label_norm = label.lower().replace(" ", "")
                      if "(z)" in label_norm:
                          row_type = "redshift_function_row_candidate"
                          future_score_role = "do_not_score_until_source_confirms_relation_to_final_row"
                      else:
                          row_type = "final_or_consensus_row_candidate"
                          future_score_role = "candidate_primary_row_only_after_source_confirmation"
                      row_meaning_rows.append({
                          "table_index": table_idx,
                          "row_index": row_idx,
                          "row_label": label,
                          "row_type_guess": row_type,
                          "future_score_role": future_score_role,
                          "header_rows_used": "|".join(str(h) for h in header_indices) if header_indices else "none",
                          "meaning_status": "needs_source_confirmation_before_scoring",
                          "score_allowed": False,
                      })
                      bindings = bind_headers_to_row(table, row_idx)
                      binding_by_col = {b["col_index"]: b for b in bindings}
                      for col_idx, cell in enumerate(row):
                          if col_idx == 0:
                              continue
                          for pair_idx, (value, sigma) in enumerate(measurement_pairs(cell), start=1):
                              bound = binding_by_col.get(col_idx, {"bound_header": f"column_{col_idx}", "header_rows_used": "none"})
                              fields = split_bound_header(bound["bound_header"])
                              bound_rows.append({
                                  "bound_id": f"bound_{len(bound_rows)+1:02d}",
                                  "source_url": SOURCE_URL,
                                  "table_index": table_idx,
                                  "row_index": row_idx,
                                  "col_index": col_idx,
                                  "row_label": label,
                                  "row_type_guess": row_type,
                                  "future_score_role": future_score_role,
                                  "sample_or_tracer": fields["sample_or_tracer"],
                                  "imaging_or_source": fields["imaging_or_source"],
                                  "bands_or_selection": fields["bands_or_selection"],
                                  "program_or_targeting": fields["program_or_targeting"],
                                  "z_range_text": fields["z_range_text"],
                                  "object_count_text": fields["object_count_text"],
                                  "z_eff_text": fields["z_eff_text"],
                                  "z_eff": fields["z_eff"],
                                  "bound_header": bound["bound_header"],
                                  "header_rows_used": bound["header_rows_used"],
                                  "value": value,
                                  "sigma": sigma,
                                  "cell_text": str(cell)[:240],
                                  "column_contract_status": "contracted_needs_source_confirmation",
                                  "baseline_stub_status": "baseline_required_not_filled",
                                  "score_allowed": False,
                                  "claim_status": "real_data_column_contracted_no_tairid_claim",
                              })
              return bound_rows, row_meaning_rows

          inherited_v4_286_rows = [
              {"inherited_from": "v4.286", "item": "rules", "value": "47 / 47 passed", "meaning": "Header binding review passed.", "carry_forward_status": "ready_for_column_contract"},
              {"inherited_from": "v4.286", "item": "fetch_ok", "value": True, "meaning": "GitHub fetched official SDSS page.", "carry_forward_status": "real_data_touched"},
              {"inherited_from": "v4.286", "item": "bound_fsigma8_rows", "value": 12, "meaning": "Twelve values were bound to candidate headers.", "carry_forward_status": "needs_column_contract"},
              {"inherited_from": "v4.286", "item": "row_meaning_rows", "value": 2, "meaning": "Two f_sigma8-like rows need meaning confirmation.", "carry_forward_status": "row_meaning_unconfirmed"},
              {"inherited_from": "v4.286", "item": "duplicate_or_variant_review_rows", "value": 3, "meaning": "Multiple f_sigma8 rows were blocked from merge/double count.", "carry_forward_status": "double_count_guard_active"},
              {"inherited_from": "v4.286", "item": "baseline_stub_written", "value": False, "meaning": "Baseline stub still missing.", "carry_forward_status": "baseline_needed"},
              {"inherited_from": "v4.286", "item": "covariance_handled", "value": False, "meaning": "No covariance handling.", "carry_forward_status": "covariance_missing"},
              {"inherited_from": "v4.286", "item": "support_allowed", "value": False, "meaning": "Support remained blocked.", "carry_forward_status": "support_blocked"},
              {"inherited_from": "v4.286", "item": "approved_holdout_sources", "value": 0, "meaning": "No holdout approved.", "carry_forward_status": "no_holdout_approved"},
              {"inherited_from": "v4.286", "item": "selected_next_route", "value": "v4_287_sdss_rsd_exact_column_contract_and_baseline_stub_no_scoring", "meaning": "Current route writes exact column contract and baseline stubs.", "carry_forward_status": "current_route"},
          ]

          fetch_row, data = fetch_url(SOURCE_URL)
          parser = SimpleTableParser()
          if data:
              parser.feed(data.decode("utf-8", errors="replace"))
          bound_rows, row_meaning_rows = parse_bound_fsigma_rows(parser.tables)

          column_contract_rows = []
          for row in bound_rows:
              column_contract_rows.append({
                  "contract_id": f"column_contract_{row['bound_id']}",
                  "bound_id": row["bound_id"],
                  "row_label": row["row_label"],
                  "row_type_guess": row["row_type_guess"],
                  "sample_or_tracer": row["sample_or_tracer"],
                  "z_eff": row["z_eff"],
                  "z_range_text": row["z_range_text"],
                  "observable": "f_sigma8",
                  "observed_value": row["value"],
                  "observed_sigma": row["sigma"],
                  "baseline_comparator_required": True,
                  "covariance_policy_required": True,
                  "row_meaning_confirmation_required": True,
                  "exact_publication_or_file_reference_required": True,
                  "score_allowed": False,
                  "contract_status": "column_contract_written_no_scoring",
              })

          baseline_stub_rows = []
          for row in bound_rows:
              baseline_stub_rows.append({
                  "baseline_stub_id": f"baseline_stub_{row['bound_id']}",
                  "bound_id": row["bound_id"],
                  "row_label": row["row_label"],
                  "sample_or_tracer": row["sample_or_tracer"],
                  "z_eff": row["z_eff"],
                  "observed_value": row["value"],
                  "observed_sigma": row["sigma"],
                  "baseline_model": "LCDM_or_published_SDSS_eBOSS_comparator_required",
                  "baseline_value": "NOT_FILLED",
                  "baseline_source": "NOT_FILLED",
                  "baseline_status": "required_not_filled",
                  "support_allowed": False,
                  "score_allowed": False,
              })

          variant_difference_rows = []
          rows_by_key = {}
          for row in bound_rows:
              key = (row["col_index"], row["sample_or_tracer"], row["z_eff_text"])
              rows_by_key.setdefault(key, []).append(row)
          for key, rows in rows_by_key.items():
              if len(rows) < 2:
                  continue
              a = next((r for r in rows if r["row_label"].replace(" ", "") == "fσ8(z)"), None)
              b = next((r for r in rows if r["row_label"].replace(" ", "") == "fσ8"), None)
              if a and b:
                  delta = float(b["value"]) - float(a["value"])
                  sigma_combined = math.sqrt(float(a["sigma"])**2 + float(b["sigma"])**2)
                  variant_difference_rows.append({
                      "variant_id": f"variant_{len(variant_difference_rows)+1:02d}",
                      "col_index": key[0],
                      "sample_or_tracer": key[1],
                      "z_eff_text": key[2],
                      "redshift_function_row_value": a["value"],
                      "redshift_function_row_sigma": a["sigma"],
                      "final_or_consensus_row_value": b["value"],
                      "final_or_consensus_row_sigma": b["sigma"],
                      "variant_delta_final_minus_function": delta,
                      "variant_delta_over_combined_sigma": delta / sigma_combined if sigma_combined else "",
                      "variant_status": "parser_integrity_review_not_physical_score",
                      "score_allowed": False,
                  })

          row_selection_policy_rows = [
              {
                  "policy_id": "row_policy_001",
                  "row_label": "f σ 8 (z)",
                  "row_type_guess": "redshift_function_row_candidate",
                  "future_use_policy": "do_not_score_or_merge_until source documentation confirms relation to final f_sigma8 row",
                  "current_status": "unconfirmed_no_scoring",
              },
              {
                  "policy_id": "row_policy_002",
                  "row_label": "f σ 8",
                  "row_type_guess": "final_or_consensus_row_candidate",
                  "future_use_policy": "candidate_primary_RSD_row only after source meaning and publication reference are confirmed",
                  "current_status": "unconfirmed_no_scoring",
              },
              {
                  "policy_id": "row_policy_003",
                  "row_label": "all_fsigma_rows",
                  "row_type_guess": "multiple_variant_rows",
                  "future_use_policy": "never score both rows together unless source confirms they are independent observables",
                  "current_status": "double_count_block_active",
              },
          ]

          contract_gap_rows = [
              {"gap_id": "gap_001", "gap": "baseline_values_missing", "meaning": "Baseline comparator values are placeholders only.", "needed_before_score": True},
              {"gap_id": "gap_002", "gap": "covariance_missing", "meaning": "Web summary uncertainties are not a full covariance policy.", "needed_before_score": True},
              {"gap_id": "gap_003", "gap": "row_meaning_unconfirmed", "meaning": "The relation between f_sigma8(z) and f_sigma8 rows is not confirmed.", "needed_before_score": True},
              {"gap_id": "gap_004", "gap": "exact_publication_or_file_reference_missing", "meaning": "Scoring needs exact source table/publication reference.", "needed_before_score": True},
              {"gap_id": "gap_005", "gap": "holdout_not_independent", "meaning": "SDSS/eBOSS remains same-family exploratory, not holdout support.", "needed_before_score": True},
          ]

          null_guard_rows = [
              {"guard_id": "null_001", "guard": "endpoint_metadata_not_signal", "status": "active", "support_allowed": False},
              {"guard_id": "null_002", "guard": "baseline_missing_blocks_support", "status": "active", "support_allowed": False},
              {"guard_id": "null_003", "guard": "row_variant_not_double_counted", "status": "active", "support_allowed": False},
              {"guard_id": "null_004", "guard": "descriptive_variant_delta_not_score", "status": "active", "support_allowed": False},
          ]

          descriptive_metric_rows = []
          values = [float(r["value"]) for r in bound_rows]
          if values:
              descriptive_metric_rows = [
                  {"metric_id": "metric_001", "metric_name": "column_contract_row_count", "metric_value": len(column_contract_rows), "score_status": "descriptive_not_tairid_score"},
                  {"metric_id": "metric_002", "metric_name": "baseline_stub_row_count", "metric_value": len(baseline_stub_rows), "score_status": "descriptive_not_tairid_score"},
                  {"metric_id": "metric_003", "metric_name": "variant_difference_row_count", "metric_value": len(variant_difference_rows), "score_status": "parser_integrity_not_tairid_score"},
                  {"metric_id": "metric_004", "metric_name": "mean_observed_value_all_bound_rows", "metric_value": statistics.mean(values), "score_status": "descriptive_not_tairid_score"},
              ]
          else:
              descriptive_metric_rows = [{"metric_id": "metric_001", "metric_name": "column_contract_row_count", "metric_value": 0, "score_status": "no_result_no_claim"}]

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "score_sdss_rsd_rows", "reason": "baseline values and covariance are not filled", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "claim_tairid_support", "reason": "column contracts and baseline stubs are not evidence", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "use_variant_delta_as_physical_result", "reason": "variant deltas are parser integrity checks only", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "merge_two_fsigma8_rows", "reason": "row meaning is unconfirmed", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "compute_p_value_or_likelihood", "reason": "no baseline/covariance likelihood guard exists", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "approve_holdout_source", "reason": "SDSS/eBOSS is same-family current lane", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "column_contract", "permission_status": "written_no_scoring", "reason": "Bound SDSS columns mapped to tracer/redshift fields."},
              {"permission_scope": "baseline_stub", "permission_status": "written_not_filled", "reason": "Baseline placeholders are written but no comparator values are filled."},
              {"permission_scope": "variant_difference_review", "permission_status": "written_parser_integrity_only", "reason": "Differences between f_sigma8 row variants are parser review only."},
              {"permission_scope": "baseline_reference_locator", "permission_status": "allowed_next", "reason": "Next workflow may locate baseline sources without scoring."},
              {"permission_scope": "external_scoring", "permission_status": "blocked", "reason": "No scoring allowed."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
              {"permission_scope": "validation_or_evidence_claim", "permission_status": "blocked", "reason": "No validation/evidence allowed."},
          ]

          readiness_rows = [
              {"readiness_id": "ready_001", "object": "sdss_fetch", "status": "ok" if fetch_row["fetch_ok"] else "failed_or_unavailable", "meaning": "Fetch status only."},
              {"readiness_id": "ready_002", "object": "column_contract", "status": f"{len(column_contract_rows)} rows", "meaning": "Column contracts written."},
              {"readiness_id": "ready_003", "object": "baseline_stub", "status": f"{len(baseline_stub_rows)} rows_not_filled", "meaning": "Baseline stubs written but empty."},
              {"readiness_id": "ready_004", "object": "row_meaning", "status": "still_unconfirmed", "meaning": "Still needs source confirmation."},
              {"readiness_id": "ready_005", "object": "baseline_reference_locator", "status": "ready_next", "meaning": "Next workflow can locate comparator source."},
              {"readiness_id": "ready_006", "object": "external_scoring", "status": "blocked", "meaning": "Still not allowed."},
          ]

          decision_rows = [
              {"decision_id": "decision_001", "decision": "Column contracts are now written for the bound SDSS f_sigma8 values.", "basis": "Headers are split into tracer/source/program/z-range/object-count/z-eff fields.", "next_action": "Locate baseline references next.", "claim_status": "method_scaffold_only"},
              {"decision_id": "decision_002", "decision": "Baseline stubs exist but are deliberately empty.", "basis": "No LCDM or published SDSS/eBOSS comparator values are filled.", "next_action": "Do not score.", "claim_status": "baseline_missing"},
              {"decision_id": "decision_003", "decision": "The two f_sigma8 rows are reviewed as variants, not independent scored rows.", "basis": "Variant deltas are parser-integrity diagnostics only.", "next_action": "Do not merge or double count.", "claim_status": "double_count_guard"},
              {"decision_id": "decision_004", "decision": "The next route is baseline reference locator.", "basis": "A comparator source is the next missing object before any score.", "next_action": SELECTED_NEXT_ROUTE, "claim_status": "safe_to_continue"},
          ]

          route_review_rows = [
              {"route_id": "route_001", "route": "sdss_rsd_baseline_reference_locator_no_scoring", "permission_status": "recommended", "reason": "Need published comparator or LCDM baseline reference before scoring."},
              {"route_id": "route_002", "route": "sdss_rsd_row_meaning_source_confirmation", "permission_status": "allowed_parallel", "reason": "Need source meaning for f_sigma8(z) versus f_sigma8."},
              {"route_id": "route_003", "route": "sdss_rsd_external_data_score", "permission_status": "blocked", "reason": "Scoring needs baseline values, covariance policy, source confirmation, and score guard."},
              {"route_id": "route_004", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.287 is a clean column-contract milestone."},
          ]

          sdr_reduction_rows = [
              {"sdr_id": "sdr_001", "before_state": "headers were bound as long strings", "after_state": "headers split into explicit contract fields", "reduction_type": "column meaning sharpened"},
              {"sdr_id": "sdr_002", "before_state": "baseline was a named gap", "after_state": "baseline stubs exist per bound row", "reduction_type": "baseline gap localized"},
              {"sdr_id": "sdr_003", "before_state": "two f_sigma8 rows could be conflated", "after_state": "variant differences reviewed but not scored", "reduction_type": "row variant risk reduced"},
