name: TAIRID Cosmology v3.36 Pressure-Lane Integration Checkpoint

on:
  workflow_dispatch:

jobs:
  pressure-lane-integration-checkpoint:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v3.36 pressure-lane integration checkpoint
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_36

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v3_36")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_36_pressure_lane_integration_checkpoint"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute new pressure scores.",
              "This integrates recovered project ideas from v3.35 into a pressure-lane checklist.",
              "Recovered ideas are workflow guardrails, not evidence.",
              "No row, lane, source, or recovered idea may become a model anchor in this workflow.",
              "A pass means the next pressure-specific test must obey the integration checklist."
          ]

          PREVIOUS_MILESTONE = {
              "v3_35_status": "project_corpus_pressure_lane_recovery_passed_ready_for_pressure_specific_next_test",
              "v3_35_failed_gates": [],
              "v3_35_matched_lanes": [
                  "boundary_holographic_surface",
                  "consolidation_growth",
                  "density_constraint",
                  "failure_guardrail_locked_closed",
                  "memory_inertia_trace",
                  "parser_provenance_likelihood",
                  "program_architecture_reusable",
                  "reach_geometry_accessibility",
                  "regime_threshold_activation",
                  "ruler_reference_calibration"
              ],
              "v3_35_matched_ideas": [
                  "recover_reach_consolidation_split",
                  "recover_holographic_boundary_lane",
                  "recover_semipermeable_leakage_gates",
                  "recover_covariance_likelihood_rule",
                  "recover_regime_activation_cross_surface",
                  "recover_ruler_reference_separation",
                  "recover_density_constraint_lane",
                  "recover_failure_memory_as_data",
                  "recover_pressure_surface_ontology"
              ]
          }

          REQUIRED_PRESSURE_SCORE_FIELDS = [
              {
                  "field": "source",
                  "required": True,
                  "purpose": "Names the dataset or product family.",
                  "failure_if_missing": "The row cannot be traced."
              },
              {
                  "field": "observable_role",
                  "required": True,
                  "purpose": "States whether the row is reach, ruler, density, growth, time-delay, or another role.",
                  "failure_if_missing": "The row may be mixed into the wrong surface."
              },
              {
                  "field": "pressure_surface",
                  "required": True,
                  "purpose": "Names the surface being tested: reach_geometry, consolidation_growth, ruler_reference, density_constraint, etc.",
                  "failure_if_missing": "The test collapses different surfaces into one bucket."
              },
              {
                  "field": "baseline",
                  "required": True,
                  "purpose": "States what the observed value is compared against.",
                  "failure_if_missing": "No pressure direction can be interpreted."
              },
              {
                  "field": "parser_status",
                  "required": True,
                  "purpose": "States whether the source is parsed, shape-only, provenance-blocked, or parked.",
                  "failure_if_missing": "The row may be used before it is trustworthy."
              },
              {
                  "field": "provenance_status",
                  "required": True,
                  "purpose": "States whether the source is direct, inferred, provisional, copied, archived, or seed/simulation-like.",
                  "failure_if_missing": "A weak or synthetic product may be mistaken for an observational anchor."
              },
              {
                  "field": "block_condition",
                  "required": True,
                  "purpose": "Names what prevents this row from becoming an anchor.",
                  "failure_if_missing": "The workflow cannot stop overclaiming."
              },
              {
                  "field": "claim_boundary",
                  "required": True,
                  "purpose": "Diagnostic-only, subfamily candidate, reach-anchor candidate, or model-anchor eligible.",
                  "failure_if_missing": "The result can be overstated."
              }
          ]

          PRESSURE_LANES = [
              {
                  "lane": "reach_geometry_accessibility",
                  "surface": "reach_geometry",
                  "allowed_use": "Test observable reach/accessibility pressure only after source-specific parser and baseline are known.",
                  "currently_active": True,
                  "current_examples": "H0LiCOW, SH0ES, H0, time-delay reach, local ladder",
                  "blocked_misuse": "Do not use one global correction for all reach/ruler/growth/density products.",
                  "next_action": "Resume H0LiCOW chain ingestion design."
              },
              {
                  "lane": "consolidation_growth",
                  "surface": "consolidation_growth",
                  "allowed_use": "Keep S8, weak lensing, clustering, and structure formation as their own consolidation lane.",
                  "currently_active": True,
                  "current_examples": "KiDS, DES, HSC, S8",
                  "blocked_misuse": "Do not mix growth pressure into reach pressure without an explicit bridge.",
                  "next_action": "Return after reach parser work is cleaner."
              },
              {
                  "lane": "ruler_reference_calibration",
                  "surface": "ruler_reference",
                  "allowed_use": "Keep BAO/CMB ruler and rdrag calibration separate from direct reach correction.",
                  "currently_active": True,
                  "current_examples": "BAO, rdrag, sound horizon, CMB ruler",
                  "blocked_misuse": "Do not reuse frozen low-z gate as BAO/CMB ruler correction.",
                  "next_action": "Carry BAO as mixed/subfamily diagnostic only."
              },
              {
                  "lane": "density_constraint",
                  "surface": "density_constraint",
                  "allowed_use": "Keep omegam, omm, omegamh2, and density parameters separate from reach.",
                  "currently_active": True,
                  "current_examples": "Planck density rows, DESI density rows",
                  "blocked_misuse": "Do not treat density movement as reach movement.",
                  "next_action": "Park until a density-specific audit is needed."
              },
              {
                  "lane": "regime_threshold_activation",
                  "surface": "cross_surface_activation",
                  "allowed_use": "Test activation across surfaces, not as SN-only threshold.",
                  "currently_active": False,
                  "current_examples": "threshold scans, regime separation, activation gates",
                  "blocked_misuse": "Do not claim SN threshold activation from the old failed scan.",
                  "next_action": "Revisit only after reach/growth/ruler lanes are cleaner."
              },
              {
                  "lane": "boundary_holographic_surface",
                  "surface": "interpretation_surface_localization",
                  "allowed_use": "Use later to interpret why pressure may localize on observational surfaces.",
                  "currently_active": False,
                  "current_examples": "holographic principle, boundary, horizon, surface encoding",
                  "blocked_misuse": "Do not claim holographic proof of TAIRID.",
                  "next_action": "Keep as later interpretation audit, not current evidence."
              },
              {
                  "lane": "memory_inertia_trace",
                  "surface": "failure_memory_and_prior_trace",
                  "allowed_use": "Use failed tests as rails and prior-collapse history.",
                  "currently_active": True,
                  "current_examples": "frozen gate rejection, BAO mixed result, DESI duplicate demotion",
                  "blocked_misuse": "Do not rerun blocked claims as if they were open.",
                  "next_action": "Apply as checklist before every new pressure test."
              },
              {
                  "lane": "parser_provenance_likelihood",
                  "surface": "evidence_quality",
                  "allowed_use": "Upgrade from summary anchors to source-specific chains, covariance, likelihoods, and direct parser evidence.",
                  "currently_active": True,
                  "current_examples": "H0LiCOW chain ingestion, covariance products, posterior chains",
                  "blocked_misuse": "Do not promote shape-ready data to pressure-scored data.",
                  "next_action": "Use for v3.37 H0LiCOW chain ingestion design."
              },
              {
                  "lane": "failure_guardrail_locked_closed",
                  "surface": "claim_boundary",
                  "allowed_use": "Keep blocked paths explicitly closed.",
                  "currently_active": True,
                  "current_examples": "frozen gate correction rejected, global BAO reach anchor blocked, TDCOSMO parked",
                  "blocked_misuse": "Do not revive a rejected correction without a new reason and new test.",
                  "next_action": "Carry into every future workflow."
              },
              {
                  "lane": "program_architecture_reusable",
                  "surface": "audit_architecture",
                  "allowed_use": "Reuse validator-style structure as source-preservation, gap-finding, and claim-boundary logic.",
                  "currently_active": True,
                  "current_examples": "source preservation, gap finder, bridge engine, pressure ledger",
                  "blocked_misuse": "Do not treat program architecture as proof of physics.",
                  "next_action": "Use as workflow design logic only."
              }
          ]

          BLOCKED_PATHS = [
              {
                  "blocked_path": "frozen_low_z_gate_as_SN_distance_correction",
                  "status": "locked_closed",
                  "reason": "Rejected by earlier testing.",
                  "allowed_reopen_condition": "Only if a new source-specific derivation and separate data test justify it."
              },
              {
                  "blocked_path": "frozen_low_z_gate_as_BAO_CMB_ruler_correction",
                  "status": "locked_closed",
                  "reason": "Would damage the ruler surface at high redshift.",
                  "allowed_reopen_condition": "Do not reopen as direct correction."
              },
              {
                  "blocked_path": "SN_threshold_activation_claim",
                  "status": "locked_closed",
                  "reason": "SN threshold activation did not beat smooth drift.",
                  "allowed_reopen_condition": "Only test activation cross-surface, not SN-only."
              },
              {
                  "blocked_path": "one_global_pressure_surface",
                  "status": "locked_closed",
                  "reason": "One global surface lost to two-surface and role-specific treatment.",
                  "allowed_reopen_condition": "Only as a null model for comparison."
              },
              {
                  "blocked_path": "DESI_mapped_reach_as_independent_anchor",
                  "status": "locked_closed",
                  "reason": "DESI H0rdrag and hrdrag were scaled counterparts.",
                  "allowed_reopen_condition": "DESI can return only through independent, non-duplicate source-specific treatment."
              },
              {
                  "blocked_path": "independent_BAO_as_global_reach_positive_anchor",
                  "status": "locked_closed",
                  "reason": "Independent BAO was mixed/subfamily only.",
                  "allowed_reopen_condition": "Only a later independent BAO audit with coherent signs could reopen."
              },
              {
                  "blocked_path": "TDCOSMO_seed_rows_as_observational_anchor",
                  "status": "parked",
                  "reason": "TDLMC seed-style rows require provenance review.",
                  "allowed_reopen_condition": "Needs clear observational provenance and parser review."
              },
              {
                  "blocked_path": "SH0ES_unlabeled_numeric_output_as_safe_H0_parser",
                  "status": "parked",
                  "reason": "Source text could not safely yield a clean H0 pressure row.",
                  "allowed_reopen_condition": "Needs a safer parser or better source product."
              }
          ]

          NEXT_TEST_QUEUE = [
              {
                  "priority": 1,
                  "next_test": "v3.37_h0licow_chain_ingestion_design",
                  "purpose": "Choose distance-chain or H0/cosmology-chain products for source-specific parsing.",
                  "must_include": "source, product path, chain role, parser status, provenance status, block condition",
                  "must_not_include": "pressure score, refit, model anchor promotion",
                  "readiness_if_passes": "H0LiCOW parser implementation may proceed."
              },
              {
                  "priority": 2,
                  "next_test": "v3.38_h0licow_chain_parser_implementation",
                  "purpose": "Parse selected H0LiCOW chain products into a guarded ledger.",
                  "must_include": "chain columns, sample counts, parameter mapping, provenance notes",
                  "must_not_include": "model claim or broad cosmology refit",
                  "readiness_if_passes": "H0LiCOW pressure-design audit may proceed."
              },
              {
                  "priority": 3,
                  "next_test": "later_growth_consolidation_chain_review",
                  "purpose": "Return to growth/consolidation with chain/covariance-aware sources.",
                  "must_include": "KiDS/DES/HSC family handling and covariance status",
                  "must_not_include": "mixing growth into reach",
                  "readiness_if_passes": "Cleaner two-surface comparison may become possible."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          created_at = now_iso()

          write_csv(
              OUTDIR / "pressure_lane_integration_contract_v3_36.csv",
              PRESSURE_LANES,
              [
                  "lane", "surface", "allowed_use", "currently_active",
                  "current_examples", "blocked_misuse", "next_action"
              ]
          )

          write_csv(
              OUTDIR / "pressure_score_required_fields_v3_36.csv",
              REQUIRED_PRESSURE_SCORE_FIELDS,
              ["field", "required", "purpose", "failure_if_missing"]
          )

          write_csv(
              OUTDIR / "blocked_paths_and_parking_lot_v3_36.csv",
              BLOCKED_PATHS,
              ["blocked_path", "status", "reason", "allowed_reopen_condition"]
          )

          write_csv(
              OUTDIR / "next_pressure_specific_test_queue_v3_36.csv",
              NEXT_TEST_QUEUE,
              [
                  "priority", "next_test", "purpose", "must_include",
                  "must_not_include", "readiness_if_passes"
              ]
          )

          required_lane_names = {lane["lane"] for lane in PRESSURE_LANES}
          previous_lane_names = set(PREVIOUS_MILESTONE["v3_35_matched_lanes"])
          previous_idea_names = set(PREVIOUS_MILESTONE["v3_35_matched_ideas"])

          active_lanes = [lane for lane in PRESSURE_LANES if lane["currently_active"] is True]
          blocked_closed = [row for row in BLOCKED_PATHS if row["status"] == "locked_closed"]
          parked = [row for row in BLOCKED_PATHS if row["status"] == "parked"]

          required_fields_present = all(
              field["required"] is True and field["field"]
              for field in REQUIRED_PRESSURE_SCORE_FIELDS
          )

          h0licow_next_defined = NEXT_TEST_QUEUE[0]["next_test"] == "v3.37_h0licow_chain_ingestion_design"
          no_refit_in_next = "refit" in NEXT_TEST_QUEUE[0]["must_not_include"]
          no_pressure_score_in_next = "pressure score" in NEXT_TEST_QUEUE[0]["must_not_include"]

          hard_failed = []

          if len(PRESSURE_LANES) < 10:
              hard_failed.append("pressure_lane_contract_too_small")

          if len(active_lanes) < 6:
              hard_failed.append("too_few_active_lanes")

          if not required_fields_present or len(REQUIRED_PRESSURE_SCORE_FIELDS) < 8:
              hard_failed.append("required_pressure_score_fields_incomplete")

          if len(blocked_closed) < 5:
              hard_failed.append("not_enough_locked_closed_paths_preserved")

          if len(parked) < 2:
              hard_failed.append("parking_lot_paths_missing")

          if not h0licow_next_defined:
              hard_failed.append("h0licow_next_test_not_defined")

          if not no_refit_in_next:
              hard_failed.append("next_test_refit_guard_missing")

          if not no_pressure_score_in_next:
              hard_failed.append("next_test_pressure_score_guard_missing")

          if not required_lane_names.intersection(previous_lane_names):
              hard_failed.append("v3_35_lanes_not_carried_forward")

          if len(previous_idea_names) < 8:
              hard_failed.append("v3_35_recovered_ideas_not_preserved")

          if hard_failed:
              readiness_label = "pressure_lane_integration_checkpoint_needs_followup"
          else:
              readiness_label = "pressure_lane_integration_checkpoint_passed_ready_for_v3_37_h0licow_chain_ingestion_design"

          next_step = (
              "Build v3.37 H0LiCOW chain ingestion design: choose distance-chain or H0/cosmology-chain products for source-specific parsing, still no pressure score and no refit."
              if not hard_failed
              else "Repair v3.36 pressure-lane checklist before continuing to H0LiCOW chain ingestion design."
          )

          audit_rows = [
              {
                  "audit_gate": "v3_35_recovery_carried_forward",
                  "pass": len(previous_idea_names) >= 8,
                  "value": len(previous_idea_names),
                  "boundary": "Recovered v3.35 ideas must become checklist constraints, not claims."
              },
              {
                  "audit_gate": "pressure_lane_contract_complete",
                  "pass": len(PRESSURE_LANES) >= 10,
                  "value": len(PRESSURE_LANES),
                  "boundary": "All recovered pressure lanes should be represented."
              },
              {
                  "audit_gate": "active_lanes_defined",
                  "pass": len(active_lanes) >= 6,
                  "value": len(active_lanes),
                  "boundary": "Enough lanes must remain active for the next testing phase."
              },
              {
                  "audit_gate": "required_pressure_score_fields_defined",
                  "pass": required_fields_present and len(REQUIRED_PRESSURE_SCORE_FIELDS) >= 8,
                  "value": len(REQUIRED_PRESSURE_SCORE_FIELDS),
                  "boundary": "Every future pressure score needs source, role, surface, baseline, parser, provenance, block condition, and claim boundary."
              },
              {
                  "audit_gate": "blocked_paths_preserved",
                  "pass": len(blocked_closed) >= 5,
                  "value": len(blocked_closed),
                  "boundary": "Failed tests must remain locked closed unless a new test justifies reopening."
              },
              {
                  "audit_gate": "parked_paths_preserved",
                  "pass": len(parked) >= 2,
                  "value": len(parked),
                  "boundary": "TDCOSMO and SH0ES remain parked until provenance/parser issues are fixed."
              },
              {
                  "audit_gate": "h0licow_next_test_ready",
                  "pass": h0licow_next_defined and no_refit_in_next and no_pressure_score_in_next,
                  "value": NEXT_TEST_QUEUE[0]["next_test"],
                  "boundary": "Next H0LiCOW step must be chain ingestion design, not pressure scoring."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No model claim is allowed."
              },
              {
                  "audit_gate": "refit_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No refit is allowed."
              }
          ]

          write_csv(
              OUTDIR / "pressure_lane_integration_audit_v3_36.csv",
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "previous_milestone": PREVIOUS_MILESTONE,
              "truth_boundary": TRUTH_BOUNDARY,
              "pressure_lane_count": len(PRESSURE_LANES),
              "active_lane_count": len(active_lanes),
              "required_pressure_score_field_count": len(REQUIRED_PRESSURE_SCORE_FIELDS),
              "blocked_closed_count": len(blocked_closed),
              "parked_count": len(parked),
              "next_test": NEXT_TEST_QUEUE[0],
              "gate_result": {
                  "failed_gates": hard_failed,
                  "readiness_label": readiness_label,
                  "pressure_lane_count": len(PRESSURE_LANES),
                  "active_lane_count": len(active_lanes),
                  "required_pressure_score_field_count": len(REQUIRED_PRESSURE_SCORE_FIELDS),
                  "blocked_closed_count": len(blocked_closed),
                  "parked_count": len(parked),
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "pressure_score_built": False,
                  "next_allowed_step": next_step
              }
          }

          json_path = OUTDIR / "tairid_cosmology_v3_36_pressure_lane_integration_checkpoint.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.36 — Pressure-Lane Integration Checkpoint")
          md.append("")
          md.append(f"Created UTC: `{created_at}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(hard_failed) if hard_failed else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this checkpoint does")
          md.append("")
          md.append("v3.36 converts the v3.35 corpus recovery into a hard checklist for the next pressure-specific tests.")
          md.append("")
          md.append("It does not score data, does not run a refit, and does not promote any source to model-anchor status.")
          md.append("")
          md.append("## Integrated lanes")
          md.append("")
          md.append("| Lane | Surface | Active | Next action |")
          md.append("|---|---|---:|---|")
          for lane in PRESSURE_LANES:
              md.append(f"| `{lane['lane']}` | `{lane['surface']}` | `{lane['currently_active']}` | {lane['next_action']} |")
          md.append("")
          md.append("## Blocked or parked paths")
          md.append("")
          md.append("| Path | Status | Reason |")
          md.append("|---|---|---|")
          for row in BLOCKED_PATHS:
              md.append(f"| `{row['blocked_path']}` | `{row['status']}` | {row['reason']} |")
          md.append("")
          md.append("## Required fields for future pressure scores")
          md.append("")
          for field in REQUIRED_PRESSURE_SCORE_FIELDS:
              md.append(f"- `{field['field']}` — {field['purpose']}")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `pressure_lane_integration_contract_v3_36.csv`")
          md.append("- `pressure_score_required_fields_v3_36.csv`")
          md.append("- `blocked_paths_and_parking_lot_v3_36.csv`")
          md.append("- `next_pressure_specific_test_queue_v3_36.csv`")
          md.append("- `pressure_lane_integration_audit_v3_36.csv`")
          md.append("- `tairid_cosmology_v3_36_pressure_lane_integration_checkpoint.json`")
          md.append("- `tairid_cosmology_v3_36_pressure_lane_integration_checkpoint.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_36_pressure_lane_integration_checkpoint.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if hard_failed:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.36 pressure-lane integration checkpoint artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-36-pressure-lane-integration-checkpoint
          path: artifacts/tairid_cosmology_v3_36/
