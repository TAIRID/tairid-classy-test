name: "!!! AAA CURRENT - TAIRID v4.362 guarded residual dry run no scoring"

on:
  workflow_dispatch:
    inputs:
      human_approves_v4_361_guarded_residual_dry_run:
        description: "Human explicitly approves the v4.361 guarded residual dry run? This computes residuals only, not chi-square, likelihood, p-values, scoring, or support."
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"

jobs:
  run-v4-362-guarded-residual-dry-run-no-scoring:
    name: "!!! AAA CURRENT - Run v4.362 guarded residual dry run"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      HUMAN_APPROVES_V4_361_RESIDUAL_DRY_RUN: ${{ github.event.inputs.human_approves_v4_361_guarded_residual_dry_run }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.361 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.361 output ZIP by pattern..."
          INPUT_361_ZIP="$(ls tairid-v4-361-guarded-baseline-prediction-dry-run-no-residuals-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_361_ZIP" ]; then
            echo "Could not find v4.361 output ZIP."
            echo "Expected:"
            echo "tairid-v4-361-guarded-baseline-prediction-dry-run-no-residuals-no-scoring-output.zip"
            exit 1
          fi

          echo "Using v4.361 ZIP:"
          echo "$INPUT_361_ZIP"
          echo "INPUT_361_ZIP=$INPUT_361_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.362 residual dry run script
        run: |
          cat > run_v4_362_guarded_residual_dry_run_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          import math
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values approved; numeric baseline approved; observed values loaded; definition/covariance guarded readiness confirmed; baseline predictions computed; guarded residuals may be dry-run computed here; no chi-square; no likelihood; no p-values; no scoring; no support claims"

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def finite_series(series):
              try:
                  return series.astype(float).apply(math.isfinite).all()
              except Exception:
                  return False

          def main():
              input_361 = Path(os.environ["INPUT_361_ZIP"])
              human_approves = os.environ.get("HUMAN_APPROVES_V4_361_RESIDUAL_DRY_RUN", "no").strip().lower()
              human_approval_recorded = human_approves == "yes"

              outdir = Path("tairid_v4_362_guarded_residual_dry_run_no_chi_square_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base361 = extract_zip(input_361, "tairid_v4_362_361_")

              summary361_path = find_one(base361, "v4_361_summary.json")
              prediction_dry_run_path = find_one(base361, "v4_361_guarded_baseline_prediction_DRY_RUN_NO_RESIDUALS_NO_SCORING.csv")
              computed_predictions_path = find_one(base361, "v4_361_COMPUTED_BASELINE_PREDICTIONS_NO_RESIDUALS_NO_SCORING.csv")
              formula_audit_path = find_one(base361, "v4_361_formula_audit_prediction_computed_only.csv")
              residual_boundary_361_path = find_one(base361, "v4_361_residual_and_scoring_boundary.csv")
              next_packet_361_path = find_one(base361, "v4_361_HUMAN_FILL_guarded_residual_dry_run_review_NO_SCORING.csv")
              gap361_path = find_one(base361, "v4_361_gap_status_after_prediction_dry_run.csv")
              readiness361_path = find_one(base361, "v4_361_input_v4_360_scoring_readiness_preserved.csv")
              rules361_path = find_one(base361, "v4_361_rule_checks.csv")

              summary361 = json.loads(summary361_path.read_text())
              prediction_dry_run = pd.read_csv(prediction_dry_run_path)
              computed_predictions = pd.read_csv(computed_predictions_path)
              formula_audit = pd.read_csv(formula_audit_path)
              residual_boundary_361 = pd.read_csv(residual_boundary_361_path)
              next_packet_361 = pd.read_csv(next_packet_361_path)
              gap361 = pd.read_csv(gap361_path)
              readiness361 = pd.read_csv(readiness361_path)
              rules361 = pd.read_csv(rules361_path)

              residual_rows = []

              source_rows = computed_predictions if human_approval_recorded else prediction_dry_run

              for _, row in source_rows.iterrows():
                  observed = float(row["observed_fsigma8_preserved_not_scored"])
                  uncertainty = float(row["observed_fsigma8_uncertainty_preserved_not_scored"])

                  if human_approval_recorded:
                      baseline = float(row["baseline_fsigma8_dry_run"])
                      residual_baseline_minus_observed = baseline - observed
                      residual_observed_minus_baseline = observed - baseline
                      normalized_residual_baseline_minus_observed = residual_baseline_minus_observed / uncertainty
                      absolute_normalized_residual = abs(normalized_residual_baseline_minus_observed)
                      residual_status = "guarded_residual_dry_run_computed_no_chi_square_no_scoring"
                      residuals_computed = True
                      normalized_residuals_computed = True
                  else:
                      baseline = ""
                      residual_baseline_minus_observed = ""
                      residual_observed_minus_baseline = ""
                      normalized_residual_baseline_minus_observed = ""
                      absolute_normalized_residual = ""
                      residual_status = "blocked_pending_explicit_human_residual_dry_run_approval"
                      residuals_computed = False
                      normalized_residuals_computed = False

                  residual_rows.append({
                      "v4_362_residual_dry_run_id": f"v4_362_residual_dry_run_{len(residual_rows)+1:03d}",
                      "v4_361_prediction_dry_run_id": clean(row["v4_361_prediction_dry_run_id"]),
                      "v4_357_observed_value_id": clean(row["v4_357_observed_value_id"]),

                      "survey_or_source": clean(row["survey_or_source"]),
                      "tracer_or_sample": clean(row["tracer_or_sample"]),
                      "effective_redshift_z": float(row["effective_redshift_z"]),
                      "observed_fsigma8": observed,
                      "observed_fsigma8_uncertainty": uncertainty,
                      "baseline_fsigma8_prediction": baseline,

                      "residual_baseline_minus_observed": residual_baseline_minus_observed,
                      "residual_observed_minus_baseline": residual_observed_minus_baseline,
                      "normalized_residual_baseline_minus_observed": normalized_residual_baseline_minus_observed,
                      "absolute_normalized_residual": absolute_normalized_residual,

                      "human_residual_dry_run_input": human_approves,
                      "human_residual_dry_run_recorded": human_approval_recorded,
                      "residual_status": residual_status,

                      "residuals_computed": residuals_computed,
                      "normalized_residuals_computed": normalized_residuals_computed,
                      "chi_square_computed": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              residual_dry_run = pd.DataFrame(residual_rows)
              computed_residuals = residual_dry_run[residual_dry_run["residuals_computed"].astype(bool)].copy()

              residual_summary = pd.DataFrame([
                  {
                      "residual_metric": "rows_available_for_residual_dry_run",
                      "value": int(len(source_rows)),
                      "note": "Rows available from v4.361 predictions.",
                  },
                  {
                      "residual_metric": "residual_rows_computed",
                      "value": int(len(computed_residuals)),
                      "note": "Raw and normalized residuals computed only if human approved.",
                  },
                  {
                      "residual_metric": "chi_square_computed",
                      "value": 0,
                      "note": "No chi-square is computed in v4.362.",
                  },
                  {
                      "residual_metric": "score_valid",
                      "value": 0,
                      "note": "No score is valid in v4.362.",
                  },
              ])

              residual_review_packet = residual_dry_run.copy()
              residual_review_packet["human_residual_review_decision"] = ""
              residual_review_packet["allowed_human_residual_review_decisions"] = "approve_residuals_for_later_guarded_chi_square_readiness|needs_prediction_repair|needs_observed_value_repair|needs_full_covariance_first|keep_blocked"
              residual_review_packet["human_residual_review_note"] = ""
              residual_review_packet["human_guarded_diagonal_warning_acknowledgement"] = ""
              residual_review_packet["residuals_approved_for_later_chi_square_readiness_now"] = False
              residual_review_packet["chi_square_computed"] = False
              residual_review_packet["score_valid"] = False
              residual_review_packet["support_allowed"] = False

              residual_boundary = pd.DataFrame([
                  {
                      "boundary_id": "V4_362_BOUNDARY_001",
                      "boundary": "Raw residuals may be computed as baseline minus observed and observed minus baseline.",
                      "status": "allowed_if_human_approved",
                  },
                  {
                      "boundary_id": "V4_362_BOUNDARY_002",
                      "boundary": "Signed normalized residuals may be computed for diagnostic review only.",
                      "status": "guarded_diagnostic_only",
                  },
                  {
                      "boundary_id": "V4_362_BOUNDARY_003",
                      "boundary": "No residual squares are summed; chi-square remains uncomputed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "boundary_id": "V4_362_BOUNDARY_004",
                      "boundary": "Likelihood and p-values remain uncomputed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "boundary_id": "V4_362_BOUNDARY_005",
                      "boundary": "No support claim is allowed from residual dry-run values.",
                      "status": "blocked_by_design",
                  },
              ])

              next_packet = pd.DataFrame([
                  {
                      "v4_362_next_gate_packet_id": "v4_362_next_gate_001",
                      "next_gate": "v4_363_guarded_residual_review_ingest_no_chi_square_no_scoring",
                      "human_guarded_residual_review_decision": "",
                      "allowed_human_guarded_residual_review_decisions": "approve_residuals_for_later_guarded_chi_square_readiness|needs_residual_repair|needs_full_covariance_first|keep_blocked",
                      "human_guarded_residual_review_note": "",
                      "residual_review_approved_now": False,
                      "residuals_computed": bool(human_approval_recorded),
                      "chi_square_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  }
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_362_GAP_001",
                      "gap": "Guarded residual dry run.",
                      "status_after_v4_362": "residuals_computed_no_chi_square_no_scoring" if human_approval_recorded else "blocked_pending_human_residual_approval",
                      "next_gate": "v4_363_guarded_residual_review_ingest_no_chi_square_no_scoring" if human_approval_recorded else "rerun_v4_362_with_human_approval_yes_if_accepted",
                  },
                  {
                      "gap_id": "V4_362_GAP_002",
                      "gap": "Chi-square remains uncomputed.",
                      "status_after_v4_362": "still_blocked",
                      "next_gate": "later_guarded_chi_square_readiness",
                  },
                  {
                      "gap_id": "V4_362_GAP_003",
                      "gap": "Likelihood and p-values remain uncomputed.",
                      "status_after_v4_362": "still_blocked",
                      "next_gate": "later_likelihood_or_p_value_gate_if_allowed",
                  },
                  {
                      "gap_id": "V4_362_GAP_004",
                      "gap": "Full covariance remains unavailable.",
                      "status_after_v4_362": "guarded_diagonal_only",
                      "next_gate": "full_covariance_repair_lane_if_needed",
                  },
                  {
                      "gap_id": "V4_362_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_362": "still_blocked",
                      "next_gate": "later_support_interpretation_gate_only_after_scoring",
                  },
              ])

              hard_checks = {
                  "input_v4_361_summary_found": summary361.get("version") == "v4.361",
                  "input_v4_361_rules_all_passed": summary_rules_all_passed(summary361),
                  "input_v4_361_failed_gates_none": summary361.get("failed_gates") == "none",
                  "input_v4_361_predictions_computed_true": summary361.get("baseline_prediction_computed") is True,
                  "input_v4_361_prediction_rows_3": summary361.get("baseline_prediction_computed_rows") == 3,
                  "input_v4_361_no_residuals_yet": summary361.get("residuals_computed") is False,
                  "input_v4_361_no_chi_square": summary361.get("chi_square_computed") is False,
                  "input_v4_361_no_likelihood": summary361.get("likelihood_computed") is False,
                  "input_v4_361_no_p_values": summary361.get("p_values_computed") is False,
                  "input_v4_361_no_score_valid": summary361.get("score_valid") is False,
                  "input_v4_361_no_support_allowed": summary361.get("support_allowed") is False,

                  "rules361_all_passed": rules361["passed"].astype(bool).all(),
                  "prediction_dry_run_rows_match_summary": len(prediction_dry_run) == int(summary361.get("prediction_rows")),
                  "computed_predictions_rows_match_summary": len(computed_predictions) == int(summary361.get("baseline_prediction_computed_rows")),
                  "formula_audit_rows_equal_4": len(formula_audit) == 4,
                  "residual_boundary_361_rows_equal_5": len(residual_boundary_361) == 5,
                  "next_packet_361_rows_equal_1": len(next_packet_361) == 1,
                  "gap361_rows_equal_5": len(gap361) == 5,
                  "readiness361_rows_equal_predictions": len(readiness361) == len(prediction_dry_run),

                  "human_approval_input_valid": human_approves in ["yes", "no"],
                  "residual_rows_equal_source_rows": len(residual_dry_run) == len(source_rows),
                  "computed_residuals_count_correct": len(computed_residuals) == (len(source_rows) if human_approval_recorded else 0),
                  "residuals_finite_if_yes": (finite_series(computed_residuals["residual_baseline_minus_observed"]) if human_approval_recorded else True),
                  "normalized_residuals_finite_if_yes": (finite_series(computed_residuals["normalized_residual_baseline_minus_observed"]) if human_approval_recorded else True),
                  "absolute_normalized_residuals_nonnegative_if_yes": (computed_residuals["absolute_normalized_residual"].astype(float).ge(0).all() if human_approval_recorded else True),

                  "residual_review_packet_rows_equal_residual_rows": len(residual_review_packet) == len(residual_dry_run),
                  "residual_summary_rows_equal_4": len(residual_summary) == 4,
                  "residual_boundary_rows_equal_5": len(residual_boundary) == 5,
                  "next_packet_rows_equal_1": len(next_packet) == 1,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "chi_square_computed_false": false_col(residual_dry_run, "chi_square_computed") and false_col(residual_review_packet, "chi_square_computed") and false_col(next_packet, "chi_square_computed"),
                  "likelihood_computed_false": false_col(residual_dry_run, "likelihood_computed"),
                  "p_values_computed_false": false_col(residual_dry_run, "p_values_computed"),
                  "score_valid_false": false_col(residual_dry_run, "score_valid") and false_col(residual_review_packet, "score_valid") and false_col(next_packet, "score_valid"),
                  "support_allowed_false": false_col(residual_dry_run, "support_allowed") and false_col(residual_review_packet, "support_allowed") and false_col(next_packet, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              if human_approval_recorded:
                  expected_result = "v4_362_guarded_residual_dry_run_passed_residuals_computed_no_chi_square_no_scoring_no_claims"
                  readiness_status = "guarded_residuals_computed_no_chi_square_no_scoring"
                  selected_next_route = "v4_363_guarded_residual_review_ingest_no_chi_square_no_scoring_no_support_claims"
              else:
                  expected_result = "v4_362_blocked_pending_human_residual_dry_run_approval_no_scoring_no_claims"
                  readiness_status = "blocked_pending_human_residual_dry_run_approval"
                  selected_next_route = "rerun_v4_362_with_human_approval_yes_if_accepted"

              summary362 = {
                  "version": "v4.362",
                  "route_name": "v4_362_guarded_residual_dry_run_no_chi_square_no_scoring_no_support_claims",
                  "expected_result": expected_result,
                  "input_version": "v4.361",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "readiness_status": readiness_status,
                  "human_residual_dry_run_input": human_approves,
                  "human_residual_dry_run_recorded": bool(human_approval_recorded),
                  "residual_rows": int(len(residual_dry_run)),
                  "residuals_computed_rows": int(len(computed_residuals)),
                  "residuals_computed": bool(human_approval_recorded),
                  "normalized_residuals_computed": bool(human_approval_recorded),
                  "chi_square_computed": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": selected_next_route,
              }

              residual_dry_run.to_csv(outdir / "v4_362_guarded_residual_DRY_RUN_NO_CHI_SQUARE_NO_SCORING.csv", index=False)
              computed_residuals.to_csv(outdir / "v4_362_COMPUTED_RESIDUALS_NO_CHI_SQUARE_NO_SCORING.csv", index=False)
              residual_summary.to_csv(outdir / "v4_362_residual_summary_NO_SCORE.csv", index=False)
              residual_review_packet.to_csv(outdir / "v4_362_HUMAN_FILL_guarded_residual_review_NO_CHI_SQUARE_NO_SCORING.csv", index=False)
              residual_boundary.to_csv(outdir / "v4_362_residual_boundary_no_chi_square_no_score.csv", index=False)
              next_packet.to_csv(outdir / "v4_362_next_gate_packet_no_chi_square_no_scoring.csv", index=False)
              gap_update.to_csv(outdir / "v4_362_gap_status_after_residual_dry_run.csv", index=False)
              prediction_dry_run.to_csv(outdir / "v4_362_input_v4_361_prediction_dry_run_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_362_rule_checks.csv", index=False)

              (outdir / "v4_362_summary.json").write_text(json.dumps(summary362, indent=2))

              summary_md = f"""# TAIRID v4.362 Guarded Residual Dry Run — No Chi-Square, No Scoring

          Expected result: `{summary362["expected_result"]}`

          {summary362["rules_passed"]} / {summary362["rules_total"]} rules passed

          failed_gates = {summary362["failed_gates"]}

          readiness_status = `{summary362["readiness_status"]}`

          human_residual_dry_run_input = `{human_approves}`

          residuals_computed = {summary362["residuals_computed"]}

          residuals_computed_rows = {summary362["residuals_computed_rows"]}

          normalized_residuals_computed = {summary362["normalized_residuals_computed"]}

          chi_square_computed = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step may compute guarded residuals only when the human input is `yes`.

          It does **not** compute chi-square.

          It does **not** compute likelihood.

          It does **not** compute p-values.

          It does **not** create a valid score.

          It does **not** make support claims.

          Next route: `{selected_next_route}`
          """
              (outdir / "v4_362_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary362, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_362_guarded_residual_dry_run_no_scoring.py

      - name: Run v4.362 guarded residual dry run no scoring
        run: |
          python run_v4_362_guarded_residual_dry_run_no_scoring.py

      - name: Upload v4.362 guarded residual dry run artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-362-guarded-residual-dry-run-no-chi-square-no-scoring-output
          path: |
            tairid_v4_362_guarded_residual_dry_run_no_chi_square_no_scoring_output/
            tairid_v4_362_guarded_residual_dry_run_no_chi_square_no_scoring_output.zip
