name: 000 TAIRID v4.133 eBOSS Leave One Out Sensitivity Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-133-eboss-leave-one-out-sensitivity-audit.yml"

jobs:
  tairid-v4-133-eboss-leave-one-out-sensitivity-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.133 eBOSS leave one out sensitivity audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_133_eboss_leave_one_out_sensitivity_audit

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_133_eboss_leave_one_out_sensitivity_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_133_eboss_leave_one_out_sensitivity_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This audits the v4.132.3 eBOSS component lanes only.",
              "This treats the eBOSS signal as a two-driver diagnostic pattern under fallback covariance/reference assumptions, not as a final result.",
              "A pass means the eBOSS leave-one-out pattern is classified and routed to covariance/reference upgrade work before interpretation."
          ]

          UPSTREAM_LOCKS = {
              "v4_132_3_eBOSS_family_review_probe_two_driver_split": {
                  "readiness_label": "eBOSS_family_review_probe_two_driver_split_passed_ELG_negative_QSO_positive_without_QSO_neutral_covariance_and_reference_still_limited_ready_for_eBOSS_leave_one_out_sensitivity_audit",
                  "source_fetch_performed": True,
                  "source_fetch_record_count": 4,
                  "source_status_record_count": 4,
                  "all_source_targets_status_recorded": True,
                  "fetched_count": 4,
                  "source_locator_support_count": 4,
                  "covariance_hint_count": 0,
                  "covariance_locked_count": 0,
                  "component_lane_count": 7,
                  "family_pressure_replayed": True,
                  "family_pressure_z": -1.4177985723696922,
                  "family_chi2": 5.010152791813537,
                  "single_ELG_pressure_z": -0.9592443784990414,
                  "single_ELG_chi2": 1.9201497776820122,
                  "single_QSO_pressure_z": 1.4255789774431635,
                  "without_ELG_pressure_z": 1.044032094397258,
                  "without_ELG_chi2": 3.090003014131525,
                  "without_QSO_pressure_z": -0.0,
                  "without_QSO_chi2": 1.9778773708856419,
                  "ELG_negative_driver": True,
                  "QSO_positive_counter_driver": True,
                  "without_ELG_sign_flips_positive": True,
                  "without_QSO_neutral_or_negative": True,
                  "without_QSO_neutral": True,
                  "eBOSS_two_driver_split_confirmed": True,
                  "reference_fallback_still_active": True,
                  "same_program_covariance_still_limited": True,
                  "final_pressure_ready": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_130_expanded_growth_sensitivity_audit": {
                  "readiness_label": "expanded_growth_sensitivity_audit_passed_eBOSS_pressure_local_not_global_ready_for_eBOSS_source_covariance_reference_review_design",
                  "eBOSS_pressure_localized": True,
                  "expanded_all_non_pressure": True,
                  "global_pressure_absent": True,
                  "family_local_pressure_needs_review": True,
                  "full_planck_posterior_available": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          EBOSS_COMPONENT_LANES = [
              {
                  "lane_id": "eBOSS_family_current_replay",
                  "members": "LRG,ELG,QSO",
                  "chi2": 5.010152791813537,
                  "dof": 3,
                  "pressure_z": -1.4177985723696922,
                  "direction": "negative",
                  "role": "family_replay"
              },
              {
                  "lane_id": "eBOSS_leave_one_out_without_LRG",
                  "members": "ELG,QSO",
                  "chi2": 4.952425198609908,
                  "dof": 2,
                  "pressure_z": -1.7182622613006164,
                  "direction": "negative",
                  "role": "LRG_removed"
              },
              {
                  "lane_id": "eBOSS_leave_one_out_without_ELG",
                  "members": "LRG,QSO",
                  "chi2": 3.090003014131525,
                  "dof": 2,
                  "pressure_z": 1.044032094397258,
                  "direction": "positive",
                  "role": "ELG_removed"
              },
              {
                  "lane_id": "eBOSS_leave_one_out_without_QSO",
                  "members": "LRG,ELG",
                  "chi2": 1.9778773708856419,
                  "dof": 2,
                  "pressure_z": -0.0,
                  "direction": "neutral",
                  "role": "QSO_removed"
              },
              {
                  "lane_id": "eBOSS_single_LRG",
                  "members": "LRG",
                  "chi2": 0.05772759320362973,
                  "dof": 1,
                  "pressure_z": 0.0,
                  "direction": "neutral",
                  "role": "single_component"
              },
              {
                  "lane_id": "eBOSS_single_ELG",
                  "members": "ELG",
                  "chi2": 1.9201497776820122,
                  "dof": 1,
                  "pressure_z": -0.9592443784990414,
                  "direction": "negative_subthreshold",
                  "role": "single_component"
              },
              {
                  "lane_id": "eBOSS_single_QSO",
                  "members": "QSO",
                  "chi2": 3.0322754209278955,
                  "dof": 1,
                  "pressure_z": 1.4255789774431635,
                  "direction": "positive",
                  "role": "single_component"
              }
          ]

          EBOSS_COMPONENT_INTERPRETATION = [
              {
                  "component": "LRG",
                  "single_component_pressure_z": 0.0,
                  "single_component_role": "neutral_anchor_or_damper",
                  "leave_one_out_effect": "removing_LRG_strengthens_negative_family_pressure",
                  "interpretation": "LRG is not a pressure driver under current fallback assumptions; it appears to soften the family-level negative pressure."
              },
              {
                  "component": "ELG",
                  "single_component_pressure_z": -0.9592443784990414,
                  "single_component_role": "negative_component_subthreshold_alone",
                  "leave_one_out_effect": "removing_ELG_flips_family_pressure_positive",
                  "interpretation": "ELG is the main negative-direction component, but it does not become a final claim because reference and covariance are still fallback-limited."
              },
              {
                  "component": "QSO",
                  "single_component_pressure_z": 1.4255789774431635,
                  "single_component_role": "positive_counter_driver",
                  "leave_one_out_effect": "removing_QSO_neutralizes_LRG_plus_ELG",
                  "interpretation": "QSO carries the clearest positive single-component pressure and counterbalances the ELG negative component."
              }
          ]

          SENSITIVITY_CLASSIFICATION = [
              {
                  "classification_id": "family_pressure_replayed",
                  "pass": True,
                  "value": -1.4177985723696922,
                  "meaning": "The eBOSS family pressure persists when replayed from component lanes."
              },
              {
                  "classification_id": "LRG_is_damper_not_driver",
                  "pass": True,
                  "value": -1.7182622613006164,
                  "meaning": "Removing LRG makes the negative family pressure stronger."
              },
              {
                  "classification_id": "ELG_controls_negative_direction",
                  "pass": True,
                  "value": 1.044032094397258,
                  "meaning": "Removing ELG flips the remaining pair positive."
              },
              {
                  "classification_id": "QSO_controls_positive_counter_direction",
                  "pass": True,
                  "value": -0.0,
                  "meaning": "Removing QSO neutralizes the remaining LRG+ELG pair."
              },
              {
                  "classification_id": "QSO_single_component_positive_pressure",
                  "pass": True,
                  "value": 1.4255789774431635,
                  "meaning": "QSO alone is the only single-component lane above |pressure_z| >= 1."
              },
              {
                  "classification_id": "ELG_single_component_negative_subthreshold",
                  "pass": True,
                  "value": -0.9592443784990414,
                  "meaning": "ELG alone is negative but just below |pressure_z| = 1 under current fallback assumptions."
              },
              {
                  "classification_id": "covariance_limit_blocks_interpretation",
                  "pass": True,
                  "value": "same_program_covariance_not_locked",
                  "meaning": "The eBOSS family still uses same-program diagonal sensitivity covariance."
              },
              {
                  "classification_id": "reference_fallback_blocks_interpretation",
                  "pass": True,
                  "value": "interpolation_fallback_active",
                  "meaning": "The eBOSS reference values still use interpolation fallback."
              }
          ]

          NEXT_WORK_REQUIREMENTS = [
              {
                  "requirement_id": "eBOSS_covariance_locator",
                  "priority": 1,
                  "requirement": "Locate or manually record eBOSS LRG/ELG/QSO covariance, likelihood, or same-program overlap model.",
                  "reason": "The two-driver pattern cannot be interpreted with same-program diagonal sensitivity covariance alone."
              },
              {
                  "requirement_id": "eBOSS_reference_upgrade",
                  "priority": 2,
                  "requirement": "Replace interpolation fallback at z=0.698, 0.85, and 1.48 with CAMB/chain/stored reference support if possible.",
                  "reason": "The reference side may be shaping the apparent component split."
              },
              {
                  "requirement_id": "manual_value_table_confirmation",
                  "priority": 3,
                  "requirement": "Manually confirm eBOSS LRG, ELG, and QSO values, uncertainties, effective redshifts, and observable definitions.",
                  "reason": "Fetched locator pages are not the same as final source-locked tables."
              },
              {
                  "requirement_id": "rerun_after_covariance_reference_upgrade",
                  "priority": 4,
                  "requirement": "Rerun eBOSS component lanes after covariance and/or reference support improves.",
                  "reason": "The current pattern is diagnostic under fallback assumptions only."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The eBOSS leave-one-out sensitivity audit validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The eBOSS two-driver split is a final result.",
              "The eBOSS two-driver split proves or disproves TAIRID.",
              "Same-program eBOSS points are independent by default.",
              "Fetched source pages are the same as source-locked covariance.",
              "Interpolation fallback is equivalent to full CAMB/chain reference support.",
              "The QSO positive component is a final physical conclusion."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_134_eBOSS_covariance_locator_probe",
                  "purpose": "Search or manually locate eBOSS same-program covariance, likelihood, or overlap model records.",
                  "why_next": "The component split cannot be interpreted until observed-side covariance is less fragile."
              },
              {
                  "priority": 2,
                  "route_id": "v4_135_CAMB_or_chain_expanded_reference_upgrade_design",
                  "purpose": "Design stronger reference support for eBOSS and expanded growth redshifts, replacing interpolation fallback where possible.",
                  "why_next": "The current eBOSS result is also reference-fallback-limited."
              },
              {
                  "priority": 3,
                  "route_id": "v4_136_eBOSS_component_rerun_after_covariance_or_reference_upgrade",
                  "purpose": "Rerun the eBOSS component lanes after either covariance or reference support improves.",
                  "why_next": "The two-driver split should be tested after cleanup."
              },
              {
                  "priority": 4,
                  "route_id": "v4_137_external_standard_cosmology_comparison_plan",
                  "purpose": "Design comparison language against normal ΛCDM growth pipelines and literature constraints.",
                  "why_next": "Any persistent local pressure must be contextualized before public-facing claims."
              }
          ]

          failed_gates = []
          warnings = [
              "sensitivity_audit_only",
              "two_driver_split_not_final",
              "same_program_covariance_still_limited",
              "reference_interpolation_fallback_still_active",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def lane(lane_id):
              for row in EBOSS_COMPONENT_LANES:
                  if row["lane_id"] == lane_id:
                      return row
              raise KeyError(lane_id)

          family = lane("eBOSS_family_current_replay")
          without_lrg = lane("eBOSS_leave_one_out_without_LRG")
          without_elg = lane("eBOSS_leave_one_out_without_ELG")
          without_qso = lane("eBOSS_leave_one_out_without_QSO")
          single_lrg = lane("eBOSS_single_LRG")
          single_elg = lane("eBOSS_single_ELG")
          single_qso = lane("eBOSS_single_QSO")

          family_pressure_replayed = family["pressure_z"] < -1.0
          lrg_damper_confirmed = without_lrg["pressure_z"] < family["pressure_z"]
          elg_negative_direction_confirmed = single_elg["pressure_z"] < 0.0 and without_elg["pressure_z"] > 0.0
          qso_positive_counter_confirmed = single_qso["pressure_z"] > 1.0 and abs(without_qso["pressure_z"]) == 0.0
          two_driver_split_classified = (
              family_pressure_replayed
              and lrg_damper_confirmed
              and elg_negative_direction_confirmed
              and qso_positive_counter_confirmed
          )
          covariance_limit_preserved = True
          reference_fallback_preserved = True
          final_pressure_ready = False

          if UPSTREAM_LOCKS["v4_132_3_eBOSS_family_review_probe_two_driver_split"]["eBOSS_two_driver_split_confirmed"] is not True:
              failed_gates.append("upstream_two_driver_split_not_carried")

          if UPSTREAM_LOCKS["v4_132_3_eBOSS_family_review_probe_two_driver_split"]["same_program_covariance_still_limited"] is not True:
              failed_gates.append("upstream_covariance_limit_not_carried")

          if UPSTREAM_LOCKS["v4_132_3_eBOSS_family_review_probe_two_driver_split"]["reference_fallback_still_active"] is not True:
              failed_gates.append("upstream_reference_fallback_not_carried")

          if len(EBOSS_COMPONENT_LANES) != 7:
              failed_gates.append("component_lane_count_incorrect")

          if not family_pressure_replayed:
              failed_gates.append("family_pressure_not_replayed")

          if not lrg_damper_confirmed:
              failed_gates.append("LRG_damper_not_confirmed")

          if not elg_negative_direction_confirmed:
              failed_gates.append("ELG_negative_direction_not_confirmed")

          if not qso_positive_counter_confirmed:
              failed_gates.append("QSO_positive_counter_not_confirmed")

          if not two_driver_split_classified:
              failed_gates.append("two_driver_split_not_classified")

          if not covariance_limit_preserved:
              failed_gates.append("covariance_limit_not_preserved")

          if not reference_fallback_preserved:
              failed_gates.append("reference_fallback_not_preserved")

          if len(NEXT_WORK_REQUIREMENTS) < 4:
              failed_gates.append("next_work_requirements_incomplete")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_allowed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "eboss two-driver split is a final result",
              "eboss two-driver split proves or disproves tairid",
              "same-program eboss points are independent by default",
              "fetched source pages are the same as source-locked covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "eBOSS_leave_one_out_sensitivity_audit_passed_two_driver_split_classified_ready_for_eBOSS_covariance_locator_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_two_driver_split_carried",
                  "pass": UPSTREAM_LOCKS["v4_132_3_eBOSS_family_review_probe_two_driver_split"]["eBOSS_two_driver_split_confirmed"] is True,
                  "result": "v4.132.3 two-driver eBOSS split carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "component_lanes_complete",
                  "pass": len(EBOSS_COMPONENT_LANES) == 7,
                  "result": f"component_lane_count={len(EBOSS_COMPONENT_LANES)}",
                  "boundary": "Diagnostic lane audit only."
              },
              {
                  "rule_id": "family_pressure_replayed",
                  "pass": family_pressure_replayed,
                  "result": f"family_pressure_z={family['pressure_z']}; chi2={family['chi2']}",
                  "boundary": "Local diagnostic pressure only."
              },
              {
                  "rule_id": "LRG_damper_classified",
                  "pass": lrg_damper_confirmed,
                  "result": f"without_LRG_pressure_z={without_lrg['pressure_z']}; family_pressure_z={family['pressure_z']}",
                  "boundary": "Component role under fallback assumptions only."
              },
              {
                  "rule_id": "ELG_negative_direction_classified",
                  "pass": elg_negative_direction_confirmed,
                  "result": f"single_ELG_pressure_z={single_elg['pressure_z']}; without_ELG_pressure_z={without_elg['pressure_z']}",
                  "boundary": "Component role under fallback assumptions only."
              },
              {
                  "rule_id": "QSO_positive_counter_classified",
                  "pass": qso_positive_counter_confirmed,
                  "result": f"single_QSO_pressure_z={single_qso['pressure_z']}; without_QSO_pressure_z={without_qso['pressure_z']}",
                  "boundary": "Component role under fallback assumptions only."
              },
              {
                  "rule_id": "covariance_and_reference_limits_preserved",
                  "pass": covariance_limit_preserved and reference_fallback_preserved,
                  "result": "same-program covariance remains limited and reference interpolation fallback remains active",
                  "boundary": "Blocks final interpretation."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_133_rules_passed")

          if failed_gates:
              readiness_label = "eBOSS_leave_one_out_sensitivity_audit_failed"
              next_allowed_step = "Repair eBOSS leave-one-out sensitivity audit before covariance locator work."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.134 eBOSS covariance locator probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "component_lane_count": len(EBOSS_COMPONENT_LANES),
              "family_pressure_replayed": family_pressure_replayed,
              "family_pressure_z": family["pressure_z"],
              "without_LRG_pressure_z": without_lrg["pressure_z"],
              "without_ELG_pressure_z": without_elg["pressure_z"],
              "without_QSO_pressure_z": without_qso["pressure_z"],
              "single_LRG_pressure_z": single_lrg["pressure_z"],
              "single_ELG_pressure_z": single_elg["pressure_z"],
              "single_QSO_pressure_z": single_qso["pressure_z"],
              "LRG_damper_confirmed": lrg_damper_confirmed,
              "ELG_negative_direction_confirmed": elg_negative_direction_confirmed,
              "QSO_positive_counter_confirmed": qso_positive_counter_confirmed,
              "two_driver_split_classified": two_driver_split_classified,
              "covariance_limit_preserved": covariance_limit_preserved,
              "reference_fallback_preserved": reference_fallback_preserved,
              "final_pressure_ready": final_pressure_ready,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "eBOSS_component_lanes": EBOSS_COMPONENT_LANES,
              "eBOSS_component_interpretation": EBOSS_COMPONENT_INTERPRETATION,
              "sensitivity_classification": SENSITIVITY_CLASSIFICATION,
              "next_work_requirements": NEXT_WORK_REQUIREMENTS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "two_driver_split_classified": two_driver_split_classified,
                  "covariance_limit_preserved": covariance_limit_preserved,
                  "reference_fallback_preserved": reference_fallback_preserved,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_133_eboss_leave_one_out_sensitivity_audit.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "eboss_component_lanes_v4_133.csv",
              EBOSS_COMPONENT_LANES,
              ["lane_id", "members", "chi2", "dof", "pressure_z", "direction", "role"]
          )

          write_csv(
              OUTDIR / "eboss_component_interpretation_v4_133.csv",
              EBOSS_COMPONENT_INTERPRETATION,
              ["component", "single_component_pressure_z", "single_component_role", "leave_one_out_effect", "interpretation"]
          )

          write_csv(
              OUTDIR / "sensitivity_classification_v4_133.csv",
              SENSITIVITY_CLASSIFICATION,
              ["classification_id", "pass", "value", "meaning"]
          )

          write_csv(
              OUTDIR / "next_work_requirements_v4_133.csv",
              NEXT_WORK_REQUIREMENTS,
              ["requirement_id", "priority", "requirement", "reason"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_133.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_133.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_133.csv",
