name: TAIRID v4.56 Planck FullGrid Bounded Member Identification Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-56-planck-fullgrid-bounded-member-identification-probe.yml"

jobs:
  tairid-v4-56-planck-fullgrid-bounded-member-identification-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.56 Planck fullGrid bounded member identification probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_56_planck_fullgrid_bounded_member_identification_probe

          python - <<'PY'
          import csv
          import json
          import re
          import struct
          import urllib.request
          import hashlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_56_planck_fullgrid_bounded_member_identification_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_56_planck_fullgrid_bounded_member_identification_probe"

          FULL_GRID_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip"

          MAX_RANGE_READ_BYTES = 8_000_000
          TAIL_PROBE_BYTES = 1_048_576
          MAX_CENTRAL_DIRECTORY_BYTES = 20_000_000

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import Planck chains.",
              "This does not parse chain sample rows.",
              "This does not compute Planck reference uncertainty.",
              "This only performs bounded HTTP range probes to see whether the fullGrid ZIP central directory can be safely identified.",
              "A pass means the fullGrid route has a guarded route decision, not that the manifest or uncertainty is solved."
          ]

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }

              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={
                          "User-Agent": "TAIRID-v4.56-fullgrid-bounded-probe/1.0",
                          "Accept": "*/*"
                      }
                  )

                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }

              data = b""

              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.56-fullgrid-bounded-probe/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )

                  with urllib.request.urlopen(req, timeout=120) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)

                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"

              return record, data

          def parse_total_from_content_range(content_range):
              if not content_range:
                  return None

              match = re.search(r"/(\d+)$", content_range.strip())
              if not match:
                  return None

              try:
                  return int(match.group(1))
              except ValueError:
                  return None

          def parse_eocd_from_tail(tail_bytes):
              marker = b"PK\x05\x06"
              index = tail_bytes.rfind(marker)

              if index < 0:
                  return {
                      "found": False,
                      "error": "EOCD marker not found in bounded tail bytes"
                  }

              try:
                  unpacked = struct.unpack_from("<4s4H2LH", tail_bytes, index)
                  signature = unpacked[0]
                  disk_number = unpacked[1]
                  central_directory_disk = unpacked[2]
                  disk_entries = unpacked[3]
                  total_entries = unpacked[4]
                  central_directory_size = unpacked[5]
                  central_directory_offset = unpacked[6]
                  comment_length = unpacked[7]

                  return {
                      "found": True,
                      "eocd_offset_in_tail": index,
                      "signature": signature.hex(),
                      "disk_number": disk_number,
                      "central_directory_disk": central_directory_disk,
                      "disk_entries": disk_entries,
                      "total_entries": total_entries,
                      "central_directory_size": central_directory_size,
                      "central_directory_offset": central_directory_offset,
                      "comment_length": comment_length,
                      "zip64_possible": central_directory_size == 0xFFFFFFFF or central_directory_offset == 0xFFFFFFFF or total_entries == 0xFFFF
                  }

              except Exception as exc:
                  return {
                      "found": False,
                      "error": f"{type(exc).__name__}: {exc}"
                  }

          def classify_member(name):
              lower = name.lower()

              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".paramnames"):
                  return "paramnames"
              if re.search(r"_\d+\.txt$", name):
                  return "chain_sample_text_member_not_read"
              if lower.endswith(".minimum"):
                  return "minimum"
              if lower.endswith(".bestfit"):
                  return "bestfit"
              if lower.endswith(".likestats"):
                  return "likestats"
              if lower.endswith(".ranges"):
                  return "ranges"
              if lower.endswith(".converge"):
                  return "converge"
              if lower.endswith(".txt"):
                  return "other_text_not_read"
              if lower.endswith(".pdf"):
                  return "pdf_not_read"
              return "other"

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0

              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break

                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compressed_size": compressed_size,
                          "uncompressed_size": uncompressed_size,
                          "local_header_offset": local_header_offset
                      })

                      pos = name_end + extra_len + comment_len

                  except Exception:
                      break

              return records

          def root_from_chain_member(name):
              match = re.match(r"^(.*)_\d+\.txt$", name)
              return match.group(1) if match else None

          def root_from_paramnames(name):
              if name.endswith(".paramnames"):
                  return name[:-len(".paramnames")]
              return None

          failed_gates = []
          warnings = [
              "fullgrid_bounded_member_identification_probe_only",
              "full_grid_not_downloaded",
              "chain_sample_rows_not_read",
              "reference_uncertainty_not_computed",
              "final_RSD_pressure_not_computed",
              "not_validation"
          ]

          head_record = head_probe("full_grid_head", FULL_GRID_URL)

          if not head_record["ok"]:
              failed_gates.append("full_grid_head_probe_failed")

          single_byte_record, single_byte_data = range_probe(
              "full_grid_single_byte_range_probe",
              FULL_GRID_URL,
              "bytes=0-0",
              MAX_RANGE_READ_BYTES
          )

          tail_record, tail_data = range_probe(
              "full_grid_tail_range_probe",
              FULL_GRID_URL,
              f"bytes=-{TAIL_PROBE_BYTES}",
              MAX_RANGE_READ_BYTES
          )

          range_supported = bool(single_byte_record.get("server_honored_range")) or bool(tail_record.get("server_honored_range"))
          content_length_known = head_record.get("content_length") or parse_total_from_content_range(single_byte_record.get("content_range")) or parse_total_from_content_range(tail_record.get("content_range"))

          if not range_supported:
              warnings.append("fullgrid_server_did_not_confirm_range_support")
              warnings.append("bounded_central_directory_manifest_parse_not_available_from_this_route")

          if single_byte_record.get("truncated_by_guard") or tail_record.get("truncated_by_guard"):
              warnings.append("server_returned_more_than_requested_guard_truncated_response")

          eocd = parse_eocd_from_tail(tail_data) if tail_record["ok"] and tail_record["server_honored_range"] else {
              "found": False,
              "error": "tail range not available or not honored"
          }

          manifest_records = []
          chain_roots = {}
          paramnames_roots = {}
          verified_roots = []

          central_directory_record = {
              "attempted": False,
              "range_header": None,
              "ok": False,
              "bytes_read": 0,
              "reason": None
          }

          if eocd.get("found") and not eocd.get("zip64_possible"):
              cd_size = eocd["central_directory_size"]
              cd_offset = eocd["central_directory_offset"]

              if cd_size <= 0:
                  central_directory_record["reason"] = "central_directory_size_not_positive"
                  warnings.append("central_directory_size_not_positive")
              elif cd_size > MAX_CENTRAL_DIRECTORY_BYTES:
                  central_directory_record["reason"] = "central_directory_too_large_for_guarded_probe"
                  warnings.append("central_directory_too_large_for_guarded_probe")
              elif not range_supported:
                  central_directory_record["reason"] = "range_not_supported"
                  warnings.append("cannot_fetch_central_directory_without_range_support")
              else:
                  end = cd_offset + cd_size - 1
                  range_header = f"bytes={cd_offset}-{end}"
                  central_directory_record["attempted"] = True
                  central_directory_record["range_header"] = range_header

                  cd_record, cd_data = range_probe(
                      "full_grid_central_directory_range_probe",
                      FULL_GRID_URL,
                      range_header,
                      max(MAX_RANGE_READ_BYTES, cd_size + 1000)
                  )

                  central_directory_record["ok"] = cd_record["ok"] and cd_record["server_honored_range"]
                  central_directory_record["bytes_read"] = cd_record["bytes_read"]
                  central_directory_record["reason"] = "central_directory_range_fetched" if central_directory_record["ok"] else "central_directory_range_not_fetched"

                  if central_directory_record["ok"]:
                      manifest_records = parse_central_directory(cd_data)

          elif eocd.get("found") and eocd.get("zip64_possible"):
              warnings.append("zip64_possible_central_directory_requires_zip64_locator_handling")
              central_directory_record["reason"] = "zip64_possible_not_parsed_in_this_probe"
          else:
              central_directory_record["reason"] = eocd.get("error", "EOCD not available")

          for row in manifest_records:
              chain_root = root_from_chain_member(row["member_name"])
              if chain_root:
                  chain_roots.setdefault(chain_root, []).append(row["member_name"])

              param_root = root_from_paramnames(row["member_name"])
              if param_root:
                  paramnames_roots[param_root] = row["member_name"]

          for root, param_member in sorted(paramnames_roots.items()):
              chain_members = sorted(chain_roots.get(root, []))
              if chain_members:
                  verified_roots.append({
                      "root": root,
                      "paramnames_member": param_member,
                      "chain_member_count": len(chain_members),
                      "chain_members_preview": ", ".join(chain_members[:5]),
                      "status": "verified_by_central_directory_filenames_only"
                  })

          if manifest_records:
              route_decision = "fullgrid_central_directory_parsed_ready_for_selective_member_extraction_design"
          elif not range_supported:
              route_decision = "fullgrid_range_unavailable_external_manifest_or_mirror_required"
          elif eocd.get("zip64_possible"):
              route_decision = "fullgrid_zip64_locator_handling_required_before_member_identification"
          else:
              route_decision = "fullgrid_bounded_member_identification_inconclusive_external_manifest_required"

          RULE_RESULTS = [
              {
                  "rule_id": "fullgrid_probe_attempted",
                  "pass": head_record["ok"] or single_byte_record["ok"] or tail_record["ok"],
                  "result": "fullGrid_HEAD_or_range_probe_attempted",
                  "boundary": "Probe only."
              },
              {
                  "rule_id": "no_fullgrid_download",
                  "pass": single_byte_record["bytes_read"] <= MAX_RANGE_READ_BYTES and tail_record["bytes_read"] <= MAX_RANGE_READ_BYTES,
                  "result": "bounded_range_reads_only",
                  "boundary": "No fullGrid download."
              },
              {
                  "rule_id": "range_support_recorded",
                  "pass": True,
                  "result": f"range_supported_{range_supported}",
                  "boundary": "Range support is an observed route condition, not a success requirement."
              },
              {
                  "rule_id": "eocd_status_recorded",
                  "pass": True,
                  "result": f"eocd_found_{eocd.get('found')}",
                  "boundary": "EOCD status only."
              },
              {
                  "rule_id": "central_directory_status_recorded",
                  "pass": True,
                  "result": central_directory_record.get("reason"),
                  "boundary": "Central directory parse is only allowed if bounded range works."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute uncertainty."
              },
              {
                  "rule_id": "no_chain_sample_rows_read",
                  "pass": True,
                  "result": "no_chain_samples_imported_or_read",
                  "boundary": "No Planck posterior samples used."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Bounded member-identification probe only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_56_rules_passed")

          if failed_gates:
              readiness_label = "planck_fullgrid_bounded_member_identification_probe_failed"
              next_allowed_step = "Repair bounded fullGrid probe before choosing the next route."
          else:
              readiness_label = "planck_fullgrid_bounded_member_identification_probe_passed_with_guarded_route_decision"
              next_allowed_step = (
                  "Proceed according to route_decision. If the central directory parsed, design selective member extraction. "
                  "If range access is unavailable or inconclusive, use an external manifest, mirror, or split source route. "
                  "Do not download fullGrid, import chain samples, compute reference uncertainty, or compute final RSD pressure yet."
              )

          system_health = {
              "head_ok": head_record["ok"],
              "head_content_length": head_record.get("content_length"),
              "head_accept_ranges": head_record.get("accept_ranges"),
              "content_length_known": bool(content_length_known),
              "content_length_value": content_length_known,
              "single_byte_probe_ok": single_byte_record["ok"],
              "single_byte_status": single_byte_record.get("status"),
              "single_byte_server_honored_range": single_byte_record.get("server_honored_range"),
              "single_byte_bytes_read": single_byte_record.get("bytes_read"),
              "tail_probe_ok": tail_record["ok"],
              "tail_status": tail_record.get("status"),
              "tail_server_honored_range": tail_record.get("server_honored_range"),
              "tail_bytes_read": tail_record.get("bytes_read"),
              "range_supported": range_supported,
              "eocd_found": eocd.get("found"),
              "zip64_possible": eocd.get("zip64_possible", False),
              "central_directory_attempted": central_directory_record["attempted"],
              "central_directory_ok": central_directory_record["ok"],
              "central_directory_bytes_read": central_directory_record["bytes_read"],
              "manifest_member_count": len(manifest_records),
              "verified_root_count": len(verified_roots),
              "route_decision": route_decision,
              "fullGrid_downloaded": False,
              "Planck_chains_imported": False,
              "chain_sample_rows_read": False,
              "reference_uncertainty_computed": False,
              "final_RSD_pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_url": FULL_GRID_URL,
              "head_record": head_record,
              "range_records": [
                  single_byte_record,
                  tail_record
              ],
              "eocd": eocd,
              "central_directory_record": central_directory_record,
              "manifest_records": manifest_records,
              "verified_roots": verified_roots,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "fullGrid_downloaded": False,
                  "Planck_chains_imported": False,
                  "chain_sample_rows_read": False,
                  "reference_uncertainty_computed": False,
                  "final_RSD_pressure_computed": False,
                  "validation_claim_allowed": False
              }
          }

          json_path = OUTDIR / "tairid_v4_56_planck_fullgrid_bounded_member_identification_probe.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "range_probe_records_v4_56.csv",
              [single_byte_record, tail_record],
              [
                  "label",
                  "url",
                  "range_header",
                  "ok",
                  "status",
                  "content_type",
                  "content_length",
                  "content_range",
                  "bytes_read",
                  "truncated_by_guard",
                  "server_honored_range",
                  "sha256_16",
                  "error"
              ]
          )

          write_csv(
              OUTDIR / "fullgrid_manifest_records_v4_56.csv",
              manifest_records,
              [
                  "member_name",
                  "member_type",
                  "compressed_size",
                  "uncompressed_size",
                  "local_header_offset"
              ]
          )

          write_csv(
              OUTDIR / "verified_roots_v4_56.csv",
              verified_roots,
              [
                  "root",
                  "paramnames_member",
                  "chain_member_count",
                  "chain_members_preview",
                  "status"
              ]
          )

          write_csv(
              OUTDIR / "route_decision_v4_56.csv",
              [
                  {
                      "route_decision": route_decision,
                      "range_supported": range_supported,
                      "eocd_found": eocd.get("found"),
                      "zip64_possible": eocd.get("zip64_possible", False),
                      "manifest_member_count": len(manifest_records),
                      "verified_root_count": len(verified_roots),
                      "fullGrid_downloaded": False,
                      "reference_uncertainty_computed": False,
                      "final_RSD_pressure_computed": False
                  }
              ],
              [
                  "route_decision",
                  "range_supported",
                  "eocd_found",
                  "zip64_possible",
                  "manifest_member_count",
                  "verified_root_count",
                  "fullGrid_downloaded",
                  "reference_uncertainty_computed",
                  "final_RSD_pressure_computed"
              ]
          )

          write_csv(
              OUTDIR / "rule_results_v4_56.csv",
              RULE_RESULTS,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# TAIRID v4.56 — Planck FullGrid Bounded Member Identification Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("This test performs bounded HTTP range probes against the Planck fullGrid ZIP to see whether its central directory can be safely identified without downloading the full file.")
          md.append("")
          md.append("It does not download fullGrid, import chains, read chain sample rows, compute Planck reference uncertainty, compute final RSD pressure, or validate TAIRID.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `tairid_v4_56_planck_fullgrid_bounded_member_identification_probe.json`")
          md.append("- `tairid_v4_56_planck_fullgrid_bounded_member_identification_probe.md`")
          md.append("- `range_probe_records_v4_56.csv`")
          md.append("- `fullgrid_manifest_records_v4_56.csv`")
          md.append("- `verified_roots_v4_56.csv`")
          md.append("- `route_decision_v4_56.csv`")
          md.append("- `rule_results_v4_56.csv`")
          md.append("")

          (OUTDIR / "tairid_v4_56_planck_fullgrid_bounded_member_identification_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.56 Planck fullGrid bounded member identification probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-56-planck-fullgrid-bounded-member-identification-probe
          path: artifacts/tairid_v4_56_planck_fullgrid_bounded_member_identification_probe/
