name: Run TAIRID Hubble gate observational pressure v1

on:
  workflow_dispatch:

jobs:
  run-hubble-gate-observational-pressure-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy matplotlib

      - name: Run Hubble gate observational pressure v1
        run: |
          python run_tairid_hubble_gate_observational_pressure_v1.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-hubble-gate-observational-pressure-v1-output
          path: |
            hubble_gate_observational_pressure_v1_outputs/**
