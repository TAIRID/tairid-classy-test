                  "decision": "Residual preview is now the next clean technical route.",
                  "basis": "Observed rows, reference rows, covariance, and inverse covariance are all staged.",
                  "next_action": "Compute residual preview only, not scoring.",
                  "claim_status": "preview_next",
              },
              {
                  "decision_id": "decision_003",
                  "decision": "Chi-square remains blocked.",
                  "basis": "Chi-square is scoring-adjacent and should not run until explicitly allowed.",
                  "next_action": "Keep chi-square out of v4.270 unless the guard explicitly defines it as blocked.",
                  "claim_status": "scoring_blocked",
              },
              {
                  "decision_id": "decision_004",
                  "decision": "All claim language remains blocked.",
                  "basis": "Inverse covariance validation is a structure guard, not evidence.",
                  "next_action": "Keep truth boundary active.",
                  "claim_status": "no_validation",
              },
          ]

          route_decision_rows = [
              {"route_id": "route_001", "route": "zhao_residual_preview_guard_no_scoring", "permission_status": "recommended", "reason": "Inverse covariance validated; residual preview can run without scoring."},
              {"route_id": "route_002", "route": "zhao_chi_square_scoring_guard", "permission_status": "blocked", "reason": "Chi-square requires separate explicit scoring/evidence guard."},
