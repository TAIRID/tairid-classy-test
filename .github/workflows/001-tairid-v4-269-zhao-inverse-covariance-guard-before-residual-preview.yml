name: 001 TAIRID v4.269 - Zhao Inverse Covariance Guard Before Residual Preview

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-269-zhao-inverse-covariance-guard-before-residual-preview.yml"
      - "data/cosmology/zhao_reference_model_manifest.csv"
      - "zhao_reference_model_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-inverse-covariance-guard-before-residual-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.269 Zhao Inverse Covariance Guard Before Residual Preview is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.269 Zhao inverse covariance guard
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.269"
          ROUTE = "zhao_inverse_covariance_guard_before_residual_preview_after_v4_268"
          EXPECTED_RESULT = "v4_269_zhao_inverse_covariance_guard_before_residual_preview_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_270_zhao_residual_preview_guard_no_scoring"

          OUT = Path("tairid_v4_269_zhao_inverse_covariance_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-269-zhao-inverse-covariance-guard-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REFERENCE_MODEL_MANIFEST_CANDIDATES = [
              Path("data/cosmology/zhao_reference_model_manifest.csv"),
              Path("zhao_reference_model_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_REFERENCE_COLUMNS = [
              "reference_id",
              "observed_id",
              "model_family",
              "model_label",
              "redshift",
              "quantity",
              "predicted_value",
              "prediction_source_or_method",
              "parameter_status",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def safe_float(value):
              try:
                  return float(str(value).strip())
              except Exception:
                  return None

          def determinant(matrix):
              n = len(matrix)
              a = [list(map(float, row)) for row in matrix]
              det = 1.0
              for i in range(n):
                  pivot = i
                  for r in range(i, n):
                      if abs(a[r][i]) > abs(a[pivot][i]):
                          pivot = r
                  if abs(a[pivot][i]) < 1e-18:
                      return 0.0
                  if pivot != i:
                      a[i], a[pivot] = a[pivot], a[i]
                      det *= -1.0
                  pivot_value = a[i][i]
                  det *= pivot_value
                  for r in range(i + 1, n):
                      factor = a[r][i] / pivot_value
                      for c in range(i, n):
                          a[r][c] -= factor * a[i][c]
              return det

          def principal_minor_rows(matrix, labels, prefix):
              rows = []
              n = len(matrix)
              def combinations(items, k):
                  if k == 0:
                      yield []
                  elif not items:
                      return
                  else:
                      first, rest = items[0], items[1:]
                      for combo in combinations(rest, k - 1):
                          yield [first] + combo
                      for combo in combinations(rest, k):
                          yield combo
              for size in range(1, n + 1):
                  for inds in combinations(list(range(n)), size):
                      sub = [[matrix[i][j] for j in inds] for i in inds]
                      det = determinant(sub)
                      rows.append({
                          "minor_id": f"{prefix}_minor_{len(rows)+1:02d}",
                          "size": size,
                          "indices": "|".join(str(i) for i in inds),
                          "labels": "|".join(labels[i] for i in inds),
                          "determinant": det,
                          "positive_definite_tolerance_pass": det > 1e-14,
                      })
              return rows

          def invert_matrix(matrix):
              n = len(matrix)
              a = [list(map(float, row)) + [1.0 if i == j else 0.0 for j in range(n)] for i, row in enumerate(matrix)]
              pivot_rows = []
              for col in range(n):
                  pivot = col
                  for r in range(col, n):
                      if abs(a[r][col]) > abs(a[pivot][col]):
                          pivot = r
                  pivot_abs = abs(a[pivot][col])
                  if pivot_abs < 1e-18:
                      raise ValueError("matrix is singular or near-singular")
                  if pivot != col:
                      a[col], a[pivot] = a[pivot], a[col]
                  pivot_value = a[col][col]
                  pivot_rows.append({
                      "pivot_step": col + 1,
                      "pivot_column": col + 1,
                      "pivot_abs": pivot_abs,
                      "pivot_value": pivot_value,
                  })
                  for c in range(2 * n):
                      a[col][c] /= pivot_value
                  for r in range(n):
                      if r == col:
                          continue
                      factor = a[r][col]
                      for c in range(2 * n):
                          a[r][c] -= factor * a[col][c]
              inv = [row[n:] for row in a]
              return inv, pivot_rows

          def matmul(a, b):
              rows = len(a)
              cols = len(b[0])
              inner = len(b)
              return [[sum(a[i][k] * b[k][j] for k in range(inner)) for j in range(cols)] for i in range(rows)]

          def max_abs_identity_error(product):
              max_err = 0.0
              for i in range(len(product)):
                  for j in range(len(product)):
                      target = 1.0 if i == j else 0.0
                      max_err = max(max_err, abs(product[i][j] - target))
              return max_err

          inherited_v4_268_rows = [
              {
                  "inherited_from": "v4.268",
                  "item": "rules",
                  "value": "50 / 50 passed",
                  "meaning": "Zhao Reference Manifest Validator LCDM No Scoring passed.",
                  "carry_forward_status": "ready_for_inverse_covariance_guard",
              },
              {
                  "inherited_from": "v4.268",
                  "item": "reference_manifest_validated",
                  "value": True,
                  "meaning": "LCDM reference packet validated as non-scoring input.",
                  "carry_forward_status": "reference_ready",
              },
              {
                  "inherited_from": "v4.268",
                  "item": "validated_reference_packet_rows",
                  "value": 4,
                  "meaning": "Four validated reference rows exist.",
                  "carry_forward_status": "reference_rows_ready",
              },
              {
                  "inherited_from": "v4.268",
                  "item": "zhao_observed_rows",
                  "value": 4,
                  "meaning": "Four Zhao observed rows exist.",
                  "carry_forward_status": "observed_rows_ready",
              },
              {
                  "inherited_from": "v4.268",
                  "item": "residuals_computed",
                  "value": False,
                  "meaning": "No residuals were computed.",
                  "carry_forward_status": "residuals_blocked_until_inverse_covariance",
              },
              {
                  "inherited_from": "v4.268",
                  "item": "chi_square_computed",
                  "value": False,
                  "meaning": "No chi-square was computed.",
                  "carry_forward_status": "chi_square_blocked",
              },
              {
                  "inherited_from": "v4.268",
                  "item": "scoring_allowed",
                  "value": False,
                  "meaning": "Scoring stayed blocked.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.268",
                  "item": "selected_next_route",
                  "value": "v4_269_zhao_inverse_covariance_guard_before_residual_preview",
                  "meaning": "Current route validates inverse covariance before residual preview.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          reference_model_manifest_status_rows, reference_model_manifest_input_rows = read_manifest_status(
              REFERENCE_MODEL_MANIFEST_CANDIDATES, REQUIRED_REFERENCE_COLUMNS, "reference"
          )

          zhao_rows = [
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_0_978", "redshift": 0.978, "observed_value": 0.379, "sigma": 0.176, "reference_value": 0.433944158},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_23", "redshift": 1.230, "observed_value": 0.385, "sigma": 0.099, "reference_value": 0.404912522},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_526", "redshift": 1.526, "observed_value": 0.342, "sigma": 0.070, "reference_value": 0.371533172},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_944", "redshift": 1.944, "observed_value": 0.364, "sigma": 0.106, "reference_value": 0.329409330},
          ]

          labels = [row["observed_id"] for row in zhao_rows]
          corr = [
              [1.0000, 0.5118, 0.2667, -0.0113],
              [0.5118, 1.0000, 0.6288, 0.0722],
              [0.2667, 0.6288, 1.0000, 0.4721],
              [-0.0113, 0.0722, 0.4721, 1.0000],
          ]

          cov = []
          for i, row in enumerate(zhao_rows):
              cov_row = []
              for j, col in enumerate(zhao_rows):
                  cov_row.append(corr[i][j] * float(row["sigma"]) * float(col["sigma"]))
              cov.append(cov_row)

          inv_cov, pivot_rows = invert_matrix(cov)
          product_left = matmul(cov, inv_cov)
          product_right = matmul(inv_cov, cov)
          identity_error_left = max_abs_identity_error(product_left)
          identity_error_right = max_abs_identity_error(product_right)
          cov_det = determinant(cov)
          inv_det = determinant(inv_cov)
          cov_norm_inf = max(sum(abs(x) for x in row) for row in cov)
          inv_norm_inf = max(sum(abs(x) for x in row) for row in inv_cov)
          condition_proxy_inf = cov_norm_inf * inv_norm_inf

          covariance_rows = []
          inverse_covariance_rows = []
          identity_check_rows = []
          for i in range(4):
              for j in range(4):
                  covariance_rows.append({
                      "row_index": i + 1,
                      "col_index": j + 1,
                      "row_observed_id": labels[i],
                      "col_observed_id": labels[j],
                      "correlation_value": corr[i][j],
                      "covariance_value": cov[i][j],
                      "source": "v4.260/v4.261 Zhao covariance reconstructed from widetable2 correlations and widetable1 sigmas",
                      "scoring_allowed": False,
                  })
                  inverse_covariance_rows.append({
                      "row_index": i + 1,
                      "col_index": j + 1,
                      "row_observed_id": labels[i],
                      "col_observed_id": labels[j],
                      "inverse_covariance_value": inv_cov[i][j],
                      "source": "v4.269 guarded inverse of reconstructed covariance",
                      "scoring_allowed": False,
                  })
                  target = 1.0 if i == j else 0.0
                  identity_check_rows.append({
                      "row_index": i + 1,
                      "col_index": j + 1,
                      "cov_times_inverse_value": product_left[i][j],
                      "inverse_times_cov_value": product_right[i][j],
                      "target_identity_value": target,
                      "left_abs_error": abs(product_left[i][j] - target),
                      "right_abs_error": abs(product_right[i][j] - target),
                      "identity_tolerance_pass": abs(product_left[i][j] - target) < 1e-8 and abs(product_right[i][j] - target) < 1e-8,
                  })

          covariance_principal_minor_rows = principal_minor_rows(cov, labels, "covariance")
          inverse_principal_minor_rows = principal_minor_rows(inv_cov, labels, "inverse_covariance")

          symmetry_check_rows = []
          for i in range(4):
              for j in range(4):
                  symmetry_check_rows.append({
                      "row_index": i + 1,
                      "col_index": j + 1,
                      "covariance_symmetry_error": abs(cov[i][j] - cov[j][i]),
                      "inverse_symmetry_error": abs(inv_cov[i][j] - inv_cov[j][i]),
                      "symmetry_tolerance_pass": abs(cov[i][j] - cov[j][i]) < 1e-12 and abs(inv_cov[i][j] - inv_cov[j][i]) < 1e-8,
                  })

          inverse_guard_summary_rows = [
              {
                  "summary_id": "inv_summary_001",
                  "object": "covariance_matrix",
                  "rows": 4,
                  "determinant": cov_det,
                  "norm_inf": cov_norm_inf,
                  "status": "positive_definite_review_only" if cov_det > 0 else "determinant_issue",
              },
              {
                  "summary_id": "inv_summary_002",
                  "object": "inverse_covariance_matrix",
                  "rows": 4,
                  "determinant": inv_det,
                  "norm_inf": inv_norm_inf,
                  "status": "inverse_written_review_only" if inv_det > 0 else "inverse_determinant_issue",
              },
              {
                  "summary_id": "inv_summary_003",
                  "object": "identity_check",
                  "rows": 16,
                  "max_left_identity_error": identity_error_left,
                  "max_right_identity_error": identity_error_right,
                  "status": "identity_guard_pass" if identity_error_left < 1e-8 and identity_error_right < 1e-8 else "identity_guard_issue",
              },
              {
                  "summary_id": "inv_summary_004",
                  "object": "condition_proxy",
                  "rows": 1,
                  "condition_proxy_inf_norm": condition_proxy_inf,
                  "status": "condition_proxy_recorded_not_interpreted",
              },
          ]

          inverse_covariance_packet_rows = []
          for row in inverse_covariance_rows:
              inverse_covariance_packet_rows.append({
                  **row,
                  "packet_status": "validated_inverse_covariance_candidate_no_scoring",
                  "residuals_allowed_next": True,
                  "chi_square_allowed_now": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          next_residual_contract_rows = [
              {
                  "contract_id": "contract_001",
                  "future_object": "residual_vector",
                  "requirement": "r_i = observed_value_i - reference_value_i using validated observed and reference packets",
                  "current_status": "allowed_next_preview_only",
              },
              {
                  "contract_id": "contract_002",
                  "future_object": "normalized_residual_vector",
                  "requirement": "n_i = r_i / sigma_i for descriptive preview",
                  "current_status": "allowed_next_preview_only",
              },
              {
                  "contract_id": "contract_003",
                  "future_object": "covariance_weighted_projection",
                  "requirement": "use inverse covariance only after explicit residual preview guard",
                  "current_status": "allowed_next_preview_only_not_scoring",
              },
              {
                  "contract_id": "contract_004",
                  "future_object": "chi_square_scoring",
                  "requirement": "requires separate scoring/evidence permission, not granted here",
                  "current_status": "blocked",
              },
          ]

          blocked_operation_rows = [
              {
                  "blocked_id": "blocked_001",
                  "operation": "compute_residuals_now",
                  "reason": "this workflow validates inverse covariance only; residual preview is next",
                  "blocked": True,
              },
              {
                  "blocked_id": "blocked_002",
                  "operation": "compute_chi_square_now",
                  "reason": "chi-square remains scoring-adjacent and needs later explicit guard",
                  "blocked": True,
              },
              {
                  "blocked_id": "blocked_003",
                  "operation": "fit_numeric_correction_now",
                  "reason": "inverse covariance guard is not a fitting workflow",
                  "blocked": True,
              },
              {
                  "blocked_id": "blocked_004",
                  "operation": "claim_primary_qso_evidence_now",
                  "reason": "inverse covariance validation is not evidence",
                  "blocked": True,
              },
              {
                  "blocked_id": "blocked_005",
                  "operation": "claim_full_holdout_now",
                  "reason": "Zhao remains same-survey-family cross-release candidate",
                  "blocked": True,
              },
              {
                  "blocked_id": "blocked_006",
                  "operation": "claim_validation_now",
                  "reason": "no residual scoring or external likelihood fit",
                  "blocked": True,
              },
          ]

          permission_rows = [
              {
                  "permission_scope": "inverse_covariance_guard",
                  "permission_status": "passed_no_scoring",
                  "reason": "Covariance matrix is invertible, symmetric, positive-definite under minors, and identity check passes.",
              },
              {
                  "permission_scope": "inverse_covariance_packet",
                  "permission_status": "written_not_scored",
                  "reason": "Validated inverse covariance packet is written for the next guard.",
              },
              {
                  "permission_scope": "residual_preview",
                  "permission_status": "allowed_next_preview_only",
                  "reason": "Observed rows, reference rows, covariance, and inverse covariance are now staged.",
              },
              {
                  "permission_scope": "chi_square",
                  "permission_status": "blocked",
                  "reason": "Chi-square scoring requires a later explicit scoring/evidence guard.",
              },
              {
                  "permission_scope": "live_external_observed_manifest_fill",
                  "permission_status": "blocked",
                  "reason": "Live observed manifest fill is still not approved.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No scoring guard exists.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "Inverse covariance validation is not evidence.",
              },
              {
                  "permission_scope": "full_independent_holdout_language",
                  "permission_status": "blocked",
                  "reason": "Zhao provenance remains same-family/cross-release.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No fitting is allowed in this guard.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
