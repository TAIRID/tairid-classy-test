              {"readiness_id": "readiness_004", "requirement": "inverse_covariance_matrix", "status": "validated_no_scoring", "blocks": "nothing"},
              {"readiness_id": "readiness_005", "requirement": "residual_preview", "status": "ready_next_preview_only", "blocks": "residual direction"},
              {"readiness_id": "readiness_006", "requirement": "chi_square", "status": "blocked", "blocks": "likelihood-style interpretation"},
              {"readiness_id": "readiness_007", "requirement": "numeric_correction_fit", "status": "blocked", "blocks": "model comparison"},
              {"readiness_id": "readiness_008", "requirement": "combined_matrix_permission", "status": "blocked", "blocks": "combined matrix"},
          ]

          failure_condition_rows = [
              {"failure_condition_id": "failure_001", "target": "QSO f_sigma8 primary pressure", "machine_condition": "if future_residual_direction in ['0','-','mixed_negative'] then primary_pressure_weakened", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_002", "target": "QSO versus LRG growth contrast", "machine_condition": "if future_lrg_growth_direction == future_qso_growth_direction == '+' then source_contrast_weakened", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_003", "target": "QSO radial secondary support", "machine_condition": "if future_qso_radial_direction == '-' then secondary_support_weakened", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_004", "target": "geometry compressed lane non-primary", "machine_condition": "if future_compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed", "status": "defined_for_future_not_tested"},
              {"failure_condition_id": "failure_005", "target": "external likelihood robustness", "machine_condition": "if future_external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover then baseline_pressure_not_tairid_specific", "status": "defined_for_future_not_tested"},
