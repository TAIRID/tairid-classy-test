          readiness_rows = [
              {"readiness_id": "readiness_001", "requirement": "observed_rows", "status": "ready_review_only", "blocks": "nothing"},
              {"readiness_id": "readiness_002", "requirement": "reference_rows", "status": "validated_no_scoring", "blocks": "nothing"},
