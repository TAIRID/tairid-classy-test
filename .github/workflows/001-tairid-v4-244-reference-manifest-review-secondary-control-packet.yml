name: 001 TAIRID v4.244 - Reference Manifest Review Secondary Control Packet

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-244-reference-manifest-review-secondary-control-packet.yml"

permissions:
  contents: read

