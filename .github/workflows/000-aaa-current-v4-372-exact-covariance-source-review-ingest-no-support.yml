name: "!!! AAA CURRENT - TAIRID v4.372 exact covariance source review ingest no support"

on:
  workflow_dispatch:

jobs:
  run-v4-372-exact-covariance-source-review-ingest-no-support:
    name: "!!! AAA CURRENT - Run v4.372 exact covariance source review ingest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.371 output ZIP and human-filled exact source review ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.371 output ZIP..."
          INPUT_371_ZIP="$(ls tairid-v4-371-full-covariance-exact-source-locator-no-values-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_371_ZIP" ]; then
            echo "Could not find v4.371 output ZIP."
            echo "Expected:"
            echo "tairid-v4-371-full-covariance-exact-source-locator-no-values-no-support-output.zip"
            exit 1
          fi

          echo "Finding human-filled exact source review ZIP..."
          HUMAN_FILLED_EXACT_SOURCE_REVIEW_ZIP="$(ls tairid-v4-371-human-filled-exact-covariance-source-review-for-v4-372-no-values-no-support*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_EXACT_SOURCE_REVIEW_ZIP" ]; then
            echo "Could not find human-filled exact source review ZIP."
            echo "Expected:"
            echo "tairid-v4-371-human-filled-exact-covariance-source-review-for-v4-372-no-values-no-support.zip"
            exit 1
          fi

          echo "Using v4.371 ZIP:"
          echo "$INPUT_371_ZIP"

          echo "Using human-filled exact source review ZIP:"
          echo "$HUMAN_FILLED_EXACT_SOURCE_REVIEW_ZIP"

          echo "INPUT_371_ZIP=$INPUT_371_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_EXACT_SOURCE_REVIEW_ZIP=$HUMAN_FILLED_EXACT_SOURCE_REVIEW_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.372 exact source review ingest script
        run: |
          cat > run_v4_372_exact_covariance_source_review_ingest_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "exact covariance source review ingest only; no exact covariance file staged; no covariance values loaded; no covariance dimensions confirmed; no row order matched; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          ALLOWED_EXACT_SOURCE_DECISIONS = {
              "stage_repo_candidate_header_only",
              "stage_manual_file_after_upload",
              "needs_web_source_search",
              "reject_candidate",
              "keep_blocked",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def main():
              input_371 = Path(os.environ["INPUT_371_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_EXACT_SOURCE_REVIEW_ZIP"])

              outdir = Path("tairid_v4_372_exact_covariance_source_review_ingest_no_values_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base371 = extract_zip(input_371, "tairid_v4_372_371_")
              basehuman = extract_zip(human_zip, "tairid_v4_372_human_")

              summary371_path = find_one(base371, "v4_371_summary.json")
              repo_ranked_path = find_one(base371, "v4_371_repo_covariance_candidates_ranked_NO_VALUES_LOADED.csv")
              top_repo_path = find_one(base371, "v4_371_top_repo_exact_source_candidates_NO_VALUES_LOADED.csv")
              locator_packet_path = find_one(base371, "v4_371_exact_covariance_source_locator_packet_NO_VALUES_NO_SUPPORT.csv")
              blank_review_path = find_one(base371, "v4_371_HUMAN_FILL_exact_covariance_source_review_NO_VALUES_NO_SUPPORT.csv")
              search_plan_path = find_one(base371, "v4_371_exact_source_search_plan_NO_VALUES.csv")
              limitations_path = find_one(base371, "v4_371_limitations_after_exact_source_locator.csv")
              gap371_path = find_one(base371, "v4_371_gap_status_after_exact_source_locator.csv")
              accepted_path = find_one(base371, "v4_371_input_v4_370_accepted_candidates_preserved.csv")
              rules371_path = find_one(base371, "v4_371_rule_checks.csv")

              human_review_path = find_one_suffix(basehuman, "HUMAN_FILLED_exact_covariance_source_review_NO_VALUES_NO_SUPPORT.csv")

              summary371 = json.loads(summary371_path.read_text())
              repo_ranked = pd.read_csv(repo_ranked_path)
              top_repo = pd.read_csv(top_repo_path)
              locator_packet = pd.read_csv(locator_packet_path)
              blank_review = pd.read_csv(blank_review_path)
              search_plan = pd.read_csv(search_plan_path)
              limitations = pd.read_csv(limitations_path)
              gap371 = pd.read_csv(gap371_path)
              accepted = pd.read_csv(accepted_path)
              rules371 = pd.read_csv(rules371_path)
              human_review = pd.read_csv(human_review_path)

              for col in [
                  "human_exact_source_decision",
                  "human_exact_source_url_or_file_path",
                  "human_exact_source_note",
                  "exact_source_approved_now",
              ]:
                  if col not in human_review.columns:
                      human_review[col] = ""

              ingest_rows = []

              for _, row in human_review.iterrows():
                  decision = clean(row["human_exact_source_decision"])
                  locator_type = clean(row["locator_type"])
                  repo_path = clean(row.get("candidate_or_repo_path", ""))
                  file_name = clean(row.get("candidate_file_name", ""))
                  url_or_path = clean(row["human_exact_source_url_or_file_path"])

                  if decision == "stage_repo_candidate_header_only":
                      row_status = "repo_candidate_selected_for_later_header_only_staging_not_values"
                      exact_source_selected = True
                      repo_header_staging_needed = True
                      manual_file_needed = False
                      web_source_search_needed = False
                  elif decision == "stage_manual_file_after_upload":
                      row_status = "manual_file_path_selected_for_later_header_only_staging_not_values"
                      exact_source_selected = True
                      repo_header_staging_needed = False
                      manual_file_needed = True
                      web_source_search_needed = False
                  elif decision == "needs_web_source_search":
                      row_status = "needs_official_web_source_search_before_exact_file_staging"
                      exact_source_selected = False
                      repo_header_staging_needed = False
                      manual_file_needed = False
                      web_source_search_needed = True
                  elif decision == "reject_candidate":
                      row_status = "rejected_as_exact_covariance_source"
                      exact_source_selected = False
                      repo_header_staging_needed = False
                      manual_file_needed = False
                      web_source_search_needed = False
                  elif decision == "keep_blocked":
                      row_status = "kept_blocked_no_exact_source_selected"
                      exact_source_selected = False
                      repo_header_staging_needed = False
                      manual_file_needed = False
                      web_source_search_needed = False
                  else:
                      row_status = "invalid_or_missing_exact_source_decision"
                      exact_source_selected = False
                      repo_header_staging_needed = False
                      manual_file_needed = False
                      web_source_search_needed = False

                  ingest_rows.append({
                      "v4_372_exact_source_review_id": f"v4_372_exact_source_review_{len(ingest_rows)+1:03d}",
                      "v4_371_locator_id": clean(row["v4_371_locator_id"]),
                      "locator_type": locator_type,
                      "source_candidate_id": clean(row["source_candidate_id"]),
                      "candidate_name": clean(row["candidate_name"]),
                      "candidate_role": clean(row["candidate_role"]),
                      "candidate_or_repo_path": repo_path,
                      "candidate_file_name": file_name,
                      "candidate_score": clean(row["candidate_score"]),
                      "human_exact_source_decision": decision,
                      "human_exact_source_url_or_file_path": url_or_path,
                      "human_exact_source_note": clean(row["human_exact_source_note"]),
                      "row_review_status": row_status,
                      "exact_source_selected_for_later_header_only_staging": exact_source_selected,
                      "repo_header_staging_needed": repo_header_staging_needed,
                      "manual_file_upload_needed": manual_file_needed,
                      "official_web_source_search_needed": web_source_search_needed,
                      "exact_covariance_file_approved": False,
                      "full_covariance_file_staged": False,
                      "full_covariance_available": False,
                      "full_covariance_values_loaded": False,
                      "covariance_dimension_confirmed": False,
                      "observed_row_order_matched": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              review_ingest = pd.DataFrame(ingest_rows)

              exact_source_selected_rows = review_ingest[review_ingest["exact_source_selected_for_later_header_only_staging"].astype(bool)].copy()
              repo_header_needed_rows = review_ingest[review_ingest["repo_header_staging_needed"].astype(bool)].copy()
              manual_upload_needed_rows = review_ingest[review_ingest["manual_file_upload_needed"].astype(bool)].copy()
              web_source_needed_rows = review_ingest[review_ingest["official_web_source_search_needed"].astype(bool)].copy()
              rejected_rows = review_ingest[review_ingest["row_review_status"] == "rejected_as_exact_covariance_source"].copy()
              blocked_rows = review_ingest[review_ingest["row_review_status"] == "kept_blocked_no_exact_source_selected"].copy()
              invalid_rows = review_ingest[review_ingest["row_review_status"] == "invalid_or_missing_exact_source_decision"].copy()

              official_web_source_manifest = pd.DataFrame([
                  {
                      "web_source_task_id": "V4_372_WEB_SOURCE_001",
                      "search_target": "Official SDSS/BOSS DR12 publications page or SAS file listing with measurements, covariance matrices, likelihoods, or figures.",
                      "needed_for_candidate_rows": int(len(web_source_needed_rows)),
                      "reason": "Human review found no exact repo covariance file and requested official web/source search.",
                      "covariance_values_loaded": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
                  {
                      "web_source_task_id": "V4_372_WEB_SOURCE_002",
                      "search_target": "Exact covariance matrix or likelihood package matching the loaded BOSS DR12 z=0.38, 0.51, 0.61 rows.",
                      "needed_for_candidate_rows": int(len(web_source_needed_rows)),
                      "reason": "The current diagonal diagnostic cannot become full-covariance without exact dimension and row-order match.",
                      "covariance_values_loaded": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  },
              ])

              route_status = pd.DataFrame([
                  {
                      "status_id": "V4_372_STATUS_001",
                      "status": "exact_source_review_ingested",
                      "detail": f"{len(web_source_needed_rows)} rows need official web/source search; {len(rejected_rows)} repo candidates rejected; {len(blocked_rows)} rows kept blocked.",
                  },
                  {
                      "status_id": "V4_372_STATUS_002",
                      "status": "no_exact_covariance_file_staged",
                      "detail": "No repo or manual exact covariance file was selected for staging.",
                  },
                  {
                      "status_id": "V4_372_STATUS_003",
                      "status": "web_source_search_needed",
                      "detail": "The next gate should create an official web/source manifest or locate an exact source URL/file.",
                  },
                  {
                      "status_id": "V4_372_STATUS_004",
                      "status": "support_still_blocked",
                      "detail": "support_allowed=false remains active.",
                  },
              ])

              limitation_update = pd.DataFrame([
                  {
                      "limit_id": "V4_372_LIMIT_001",
                      "limit": "No exact covariance file is selected or staged in v4.372.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_372_LIMIT_002",
                      "limit": "Official web/source search is required before exact covariance staging.",
                      "status": "open_gap",
                  },
                  {
                      "limit_id": "V4_372_LIMIT_003",
                      "limit": "No covariance values are loaded in v4.372.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_372_LIMIT_004",
                      "limit": "No covariance dimension or observed-row order match is confirmed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_372_LIMIT_005",
                      "limit": "No likelihood, p-values, score, or support claim is allowed.",
                      "status": "blocked_by_design",
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_372_GAP_001",
                      "gap": "Exact source review ingested.",
                      "status_after_v4_372": "web_source_search_needed_no_exact_file_staged",
                      "next_gate": "v4_373_official_covariance_web_source_manifest_no_values_no_support",
                  },
                  {
                      "gap_id": "V4_372_GAP_002",
                      "gap": "Exact covariance file remains unstaged.",
                      "status_after_v4_372": "still_open",
                      "next_gate": "official_web_source_search_or_manual_upload",
                  },
                  {
                      "gap_id": "V4_372_GAP_003",
                      "gap": "Covariance values remain unloaded.",
                      "status_after_v4_372": "still_blocked",
                      "next_gate": "later_after_exact_file_staged_and_header_checked",
                  },
                  {
                      "gap_id": "V4_372_GAP_004",
                      "gap": "Covariance dimensions and observed-row order remain unconfirmed.",
                      "status_after_v4_372": "still_blocked",
                      "next_gate": "later_shape_and_order_gate",
                  },
                  {
                      "gap_id": "V4_372_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_372": "still_blocked",
                      "next_gate": "no_support_claims_allowed_from_v4_372",
                  },
              ])

              hard_checks = {
                  "input_v4_371_summary_found": summary371.get("version") == "v4.371",
                  "input_v4_371_rules_all_passed": summary_rules_all_passed(summary371),
                  "input_v4_371_failed_gates_none": summary371.get("failed_gates") == "none",
                  "input_v4_371_no_exact_file_approved": summary371.get("exact_covariance_file_approved") is False,
                  "input_v4_371_no_file_staged": summary371.get("full_covariance_file_staged") is False,
                  "input_v4_371_no_full_covariance": summary371.get("full_covariance_available") is False,
                  "input_v4_371_no_values_loaded": summary371.get("full_covariance_values_loaded") is False,
                  "input_v4_371_no_dimension_confirmed": summary371.get("covariance_dimension_confirmed") is False,
                  "input_v4_371_no_row_order": summary371.get("observed_row_order_matched") is False,
                  "input_v4_371_no_likelihood": summary371.get("likelihood_computed") is False,
                  "input_v4_371_no_p_values": summary371.get("p_values_computed") is False,
                  "input_v4_371_no_score_valid": summary371.get("score_valid") is False,
                  "input_v4_371_no_support_allowed": summary371.get("support_allowed") is False,

                  "rules371_all_passed": passed_column_all(rules371),
                  "repo_ranked_rows_match_summary": len(repo_ranked) == int(summary371.get("repo_ranked_candidate_rows")),
                  "top_repo_rows_match_summary": len(top_repo) == int(summary371.get("top_repo_candidate_rows")),
                  "locator_packet_rows_match_summary": len(locator_packet) == int(summary371.get("locator_packet_rows")),
                  "blank_review_rows_match_locator": len(blank_review) == len(locator_packet),
                  "human_review_rows_match_locator": len(human_review) == len(locator_packet),
                  "search_plan_rows_equal_5": len(search_plan) == 5,
                  "limitations_rows_equal_5": len(limitations) == 5,
                  "gap371_rows_equal_5": len(gap371) == 5,
                  "accepted_rows_match_summary": len(accepted) == int(summary371.get("accepted_source_directions")),

                  "human_decisions_filled": human_review["human_exact_source_decision"].apply(clean).ne("").all(),
                  "human_decisions_allowed": human_review["human_exact_source_decision"].apply(clean).isin(ALLOWED_EXACT_SOURCE_DECISIONS).all(),
                  "review_ingest_rows_equal_human_review": len(review_ingest) == len(human_review),
                  "invalid_rows_equal_0": len(invalid_rows) == 0,
                  "web_source_needed_rows_equal_2": len(web_source_needed_rows) == 2,
                  "exact_source_selected_rows_equal_0": len(exact_source_selected_rows) == 0,
                  "repo_header_needed_rows_equal_0": len(repo_header_needed_rows) == 0,
                  "manual_upload_needed_rows_equal_0": len(manual_upload_needed_rows) == 0,
                  "rejected_rows_at_least_1": len(rejected_rows) >= 1,
                  "blocked_rows_at_least_1": len(blocked_rows) >= 1,
                  "official_web_source_manifest_rows_equal_2": len(official_web_source_manifest) == 2,
                  "route_status_rows_equal_4": len(route_status) == 4,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_exact_covariance_file_approved": false_col(review_ingest, "exact_covariance_file_approved"),
                  "no_full_covariance_file_staged": false_col(review_ingest, "full_covariance_file_staged"),
                  "no_full_covariance_available": false_col(review_ingest, "full_covariance_available"),
                  "no_covariance_values_loaded": false_col(review_ingest, "full_covariance_values_loaded"),
                  "no_covariance_dimension_confirmed": false_col(review_ingest, "covariance_dimension_confirmed"),
                  "no_observed_row_order_matched": false_col(review_ingest, "observed_row_order_matched"),
                  "no_likelihood_computed": false_col(review_ingest, "likelihood_computed"),
                  "no_p_values_computed": false_col(review_ingest, "p_values_computed"),
                  "no_score_valid": false_col(review_ingest, "score_valid"),
                  "no_support_allowed": false_col(review_ingest, "support_allowed") and false_col(official_web_source_manifest, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary372 = {
                  "version": "v4.372",
                  "route_name": "v4_372_exact_covariance_source_review_ingest_no_values_no_support_claims",
                  "expected_result": "v4_372_exact_covariance_source_review_ingest_passed_web_source_search_needed_no_values_no_support_claims",
                  "input_version": "v4.371",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "review_ingest_rows": int(len(review_ingest)),
                  "web_source_search_needed_rows": int(len(web_source_needed_rows)),
                  "rejected_candidate_rows": int(len(rejected_rows)),
                  "blocked_candidate_rows": int(len(blocked_rows)),
                  "exact_source_selected_rows": int(len(exact_source_selected_rows)),
                  "exact_covariance_file_approved": False,
                  "full_covariance_file_staged": False,
                  "full_covariance_available": False,
                  "full_covariance_values_loaded": False,
                  "covariance_dimension_confirmed": False,
                  "observed_row_order_matched": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "v4_373_official_covariance_web_source_manifest_no_values_no_support_claims",
              }

              review_ingest.to_csv(outdir / "v4_372_exact_source_review_ingest_ledger_NO_VALUES_NO_SUPPORT.csv", index=False)
              web_source_needed_rows.to_csv(outdir / "v4_372_web_source_search_needed_rows_NO_VALUES.csv", index=False)
              rejected_rows.to_csv(outdir / "v4_372_rejected_exact_source_candidates.csv", index=False)
              blocked_rows.to_csv(outdir / "v4_372_blocked_exact_source_candidates.csv", index=False)
              official_web_source_manifest.to_csv(outdir / "v4_372_official_web_source_search_manifest_NO_VALUES.csv", index=False)
              route_status.to_csv(outdir / "v4_372_route_status_summary.csv", index=False)
              limitation_update.to_csv(outdir / "v4_372_limitations_after_exact_source_review.csv", index=False)
              gap_update.to_csv(outdir / "v4_372_gap_status_after_exact_source_review.csv", index=False)
              human_review.to_csv(outdir / "v4_372_input_human_filled_exact_source_review_preserved.csv", index=False)
              locator_packet.to_csv(outdir / "v4_372_input_v4_371_locator_packet_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_372_rule_checks.csv", index=False)

              (outdir / "v4_372_summary.json").write_text(json.dumps(summary372, indent=2))

              summary_md = f"""# TAIRID v4.372 Exact Covariance Source Review Ingest — No Values, No Support Claims

          Expected result: `{summary372["expected_result"]}`

          {summary372["rules_passed"]} / {summary372["rules_total"]} rules passed

          failed_gates = {summary372["failed_gates"]}

          review_ingest_rows = {summary372["review_ingest_rows"]}

          web_source_search_needed_rows = {summary372["web_source_search_needed_rows"]}

          rejected_candidate_rows = {summary372["rejected_candidate_rows"]}

          blocked_candidate_rows = {summary372["blocked_candidate_rows"]}

          exact_source_selected_rows = {summary372["exact_source_selected_rows"]}

          exact_covariance_file_approved = false

          full_covariance_file_staged = false

          full_covariance_available = false

          full_covariance_values_loaded = false

          covariance_dimension_confirmed = false

          observed_row_order_matched = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step ingests the exact-source human review.

          It does **not** approve an exact covariance file.

