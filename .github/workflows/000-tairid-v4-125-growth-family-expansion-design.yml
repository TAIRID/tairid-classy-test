              ["lane_id", "families", "redshift_region", "purpose", "required_next"]
          )

          write_csv(
              OUTDIR / "quality_gates_for_next_probe_v4_125.csv",
              QUALITY_GATES_FOR_NEXT_PROBE,
              ["gate_id", "requirement", "failure_action"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_125.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_125.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_125.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.125 — Growth Family Expansion Design")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.124 showed the edge-reviewed bridge remains pressure-stable across central BOSS, low-z+BOSS, full-five high-z sensitivity, and high-z-only sensitivity lanes.")
          md.append("")
          md.append("v4.125 designs the next clean expansion: do not claim final pressure; inventory more observed growth families, record source/covariance status, preserve the verified BOSS core, and only then design an expanded bridge.")
          md.append("")
          md.append("## Growth family targets")
          md.append("")
          md.append("| Family | Region | Priority |")
          md.append("|---|---|---:|")
          for row in GROWTH_FAMILY_TARGETS:
              md.append(f"| `{row['family_id']}` | `{row['target_redshift_region']}` | `{row['priority']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_125_growth_family_expansion_design.json",
              "tairid_v4_125_growth_family_expansion_design.md",
              "current_bridge_state_v4_125.csv",
              "growth_family_targets_v4_125.csv",
              "expansion_policy_v4_125.csv",
              "next_probe_input_schema_v4_125.csv",
              "expanded_lane_plan_v4_125.csv",
              "quality_gates_for_next_probe_v4_125.csv",
              "blocked_claims_v4_125.csv",
              "next_route_options_v4_125.csv",
              "rule_results_v4_125.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_125_growth_family_expansion_design.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
