name: 000 TAIRID v4.125 Growth Family Expansion Design

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-125-growth-family-expansion-design.yml"

jobs:
  tairid-v4-125-growth-family-expansion-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.125 growth family expansion design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_125_growth_family_expansion_design

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_125_growth_family_expansion_design")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_125_growth_family_expansion_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This does not fetch new observed growth-family files yet.",
              "This designs the next expansion beyond the current edge-reviewed five-slot bridge.",
              "A pass means the next observed-growth family targets, lanes, gate rules, and claim boundaries are explicit."
          ]

          UPSTREAM_LOCKS = {
              "v4_124_edge_anchor_sensitivity_bridge_probe": {
                  "readiness_label": "edge_anchor_sensitivity_bridge_probe_passed_pressure_stable_edge_decisions_confirmed_not_final_ready_for_growth_family_expansion_design",
                  "central_BOSS_core_preserved": True,
                  "low_z_literature_locked": True,
                  "low_z_primary_bridge_decision": "primary_with_literature_error_model",
                  "high_z_primary_bridge_decision": "sensitivity_only_pending_source_lock",
                  "bridge_pressure_computed": True,
                  "pressure_z_all_zero": True,
                  "all_chi2_below_dof": True,
                  "central_BOSS_only_chi2": 1.2901571761240198,
                  "central_BOSS_only_pressure_z": -0.0,
                  "low_z_plus_BOSS_chi2": 1.3290301731197376,
                  "low_z_plus_BOSS_pressure_z": -0.0,
                  "full_five_high_z_sensitivity_chi2": 1.721941483224999,
                  "full_five_high_z_sensitivity_pressure_z": 0.0,
                  "high_z_only_edge_chi2": 1.6831404814747892,
                  "high_z_only_edge_pressure_z": 0.0,
                  "low_z_delta_chi2_vs_BOSS_only": 0.03887299699571778,
                  "high_z_delta_chi2_vs_low_z_plus_BOSS": 0.3929113101052615,
                  "high_z_only_delta_chi2_vs_BOSS_only": 0.3929833053507694,
                  "low_z_anchor_source_covariance_complete": False,
                  "high_z_anchor_source_covariance_complete": False,
                  "high_z_source_lock_passed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_123_edge_anchor_review_probe": {
                  "readiness_label": "edge_anchor_review_probe_passed_low_z_literature_locked_high_z_sensitivity_only_ready_for_edge_anchor_sensitivity_bridge_probe",
                  "central_BOSS_core_preserved": True,
                  "low_z_literature_locked": True,
                  "low_z_primary_bridge_decision": "primary_with_literature_error_model",
                  "low_z_covariance_status": "literature_error_model_diagonal_fallback_labeled",
                  "high_z_source_lock_passed": False,
                  "high_z_primary_bridge_decision": "sensitivity_only_pending_source_lock",
                  "high_z_covariance_status": "not_source_locked_sensitivity_only",
                  "both_edge_decisions_recorded": True,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          CURRENT_BRIDGE_STATE = [
              {
                  "state_id": "central_BOSS_verified_core",
                  "positions": "1,2,3",
                  "redshift_range": "0.38_to_0.61",
                  "current_status": "cleanest_locked_covariance_block",
                  "pressure_status": "zero_pressure_z",
                  "role_next": "control_core"
              },
              {
                  "state_id": "low_z_plus_BOSS_primary",
                  "positions": "0,1,2,3",
                  "redshift_range": "0.15_to_0.61",
                  "current_status": "primary_diagnostic_with_low_z_literature_error_diagonal_fallback",
                  "pressure_status": "zero_pressure_z",
                  "role_next": "primary_comparison_lane"
              },
              {
                  "state_id": "high_z_sensitivity",
                  "positions": "4",
                  "redshift_range": "2.33",
                  "current_status": "sensitivity_only_pending_source_lock",
                  "pressure_status": "zero_pressure_z_when_added",
                  "role_next": "do_not_use_as_primary_until_source_locked_or_replaced"
              }
          ]

          GROWTH_FAMILY_TARGETS = [
              {
                  "family_id": "low_z_independent_anchor_family",
                  "example_sources": "6dFGS_or_equivalent_low_z_growth",
                  "target_redshift_region": "z_less_than_0.15",
                  "role": "test_whether_low_z_behavior_matches_or_breaks_current_low_z_plus_BOSS_lane",
                  "priority": 1,
                  "allowed_status": "source_lock_required_before_primary",
                  "reason": "Current low-z support is one literature-locked diagonal-fallback point."
              },
              {
                  "family_id": "WiggleZ_growth_family",
                  "example_sources": "WiggleZ_z044_z060_z073_or_equivalent",
                  "target_redshift_region": "z_0.4_to_0.8",
                  "role": "independent mid-z growth-family comparison against verified BOSS core",
                  "priority": 2,
                  "allowed_status": "source_lock_or_literature_error_model_required",
                  "reason": "This tests whether the BOSS no-pressure result persists outside the BOSS family."
              },
              {
                  "family_id": "VIPERS_growth_family",
                  "example_sources": "VIPERS_z080_or_equivalent",
                  "target_redshift_region": "z_0.8",
                  "role": "high-mid-z galaxy growth check",
                  "priority": 3,
                  "allowed_status": "source_lock_or_literature_error_model_required",
                  "reason": "This bridges between BOSS-like redshifts and higher-z anchors."
              },
              {
                  "family_id": "eBOSS_LRG_ELG_QSO_family",
                  "example_sources": "eBOSS_LRG_z0698_ELG_z085_QSO_z148_or_equivalent",
                  "target_redshift_region": "z_0.7_to_1.5",
                  "role": "late-to-high-z observed growth expansion",
                  "priority": 4,
                  "allowed_status": "source_lock_or_literature_error_model_required",
                  "reason": "This tests whether the pressure-stable result persists into eBOSS-style higher-redshift growth."
              },
              {
                  "family_id": "high_z_LyA_or_replacement_family",
                  "example_sources": "source_locked_LyA_high_z_or_replacement_growth_anchor",
                  "target_redshift_region": "z_greater_than_2",
                  "role": "replace_or_lock_the_current_z233_sensitivity_anchor",
                  "priority": 5,
                  "allowed_status": "sensitivity_only_until_source_locked",
                  "reason": "Current high-z point is sensitivity-only pending source lock."
              }
          ]

          EXPANSION_POLICY = [
              {
                  "policy_id": "do_not_replace_verified_BOSS_core",
                  "requirement": "The verified BOSS core remains the control block unless a later formal source audit overturns it.",
                  "reason": "The current clean covariance core is the best-controlled observed block.",
                  "applied_now": False
              },
              {
                  "policy_id": "source_lock_before_primary",
                  "requirement": "No new growth-family point can enter a primary expanded bridge unless value, redshift, uncertainty, source family, and covariance/error status are recorded.",
                  "reason": "Unverified points would weaken the diagnostic.",
                  "applied_now": False
              },
              {
                  "policy_id": "family_overlap_guard_required",
                  "requirement": "Each added point must carry source-family and independence/overlap status.",
                  "reason": "Multiple points from one overlapping survey family cannot be treated as fully independent without covariance review.",
                  "applied_now": False
              },
              {
                  "policy_id": "tiered_bridge_lanes_required",
                  "requirement": "Next expansion must define tiered lanes: BOSS core, low-z+BOSS, BOSS+independent mid-z, eBOSS/high-z expansion, and full expanded diagnostic.",
                  "reason": "This shows whether any family introduces pressure or whether the no-pressure result persists.",
                  "applied_now": False
              },
              {
                  "policy_id": "diagonal_fallback_stays_labeled",
                  "requirement": "Any family without covariance remains diagonal-fallback or literature-error-model labeled and cannot be described as complete covariance.",
                  "reason": "Claim strength depends on covariance quality.",
                  "applied_now": False
              },
              {
                  "policy_id": "no_final_model_comparison",
                  "requirement": "Expanded growth-family diagnostics cannot be called likelihood, BIC, posterior comparison, final pressure, or validation.",
                  "reason": "This lane is still pressure-testing and source-provenance building.",
                  "applied_now": False
              }
          ]

          NEXT_PROBE_DESIGN = {
              "next_probe_name": "v4.126 growth family source inventory probe",
              "allowed_to_fetch_or_locator_check_growth_sources": True,
              "allowed_to_build_growth_family_inventory": True,
              "allowed_to_record_values_uncertainties_and_covariance_status": True,
              "allowed_to_choose_primary_vs_sensitivity_families": True,
              "allowed_to_compute_expanded_bridge_pressure": False,
              "allowed_to_compute_final_RSD_pressure": False,
              "allowed_to_validate_TAIRID": False,
              "primary_success_condition": "At least three non-BOSS growth-family targets receive explicit source/covariance status or a parked/manual-needed status.",
              "fallback_success_condition": "If sources are not fetchable automatically, workflow records manual locator targets without making final claims."
          }

          NEXT_PROBE_INPUT_SCHEMA = [
              {"field": "family_id", "required": True, "purpose": "Growth family being reviewed."},
              {"field": "candidate_id", "required": True, "purpose": "Specific candidate observation or source item."},
              {"field": "z", "required": True, "purpose": "Effective redshift."},
              {"field": "observed_fsigma8", "required": False, "purpose": "Observed fσ8 value if source-locked."},
              {"field": "observed_sigma", "required": False, "purpose": "Uncertainty if source-locked."},
              {"field": "source_family", "required": True, "purpose": "Survey/source family label."},
              {"field": "source_url_or_locator", "required": True, "purpose": "Official URL, paper, data path, DOI, or manual locator note."},
              {"field": "fetch_or_locator_status", "required": True, "purpose": "found, fetched, parsed, unavailable, manual_needed, or parked."},
              {"field": "covariance_status", "required": True, "purpose": "source_covariance, literature_error_model, diagonal_fallback, covariance_model_needed, sensitivity_only, or parked."},
              {"field": "independence_warning", "required": True, "purpose": "Overlap/dependence warning."},
              {"field": "primary_bridge_decision", "required": True, "purpose": "primary_candidate, sensitivity_only, replace_current_anchor, or park."},
              {"field": "claim_boundary", "required": True, "purpose": "diagnostic_only or parked."}
          ]

          EXPANDED_LANE_PLAN = [
              {
                  "lane_id": "verified_BOSS_core_control",
                  "families": "BOSS_DR12_verified_core",
                  "redshift_region": "0.38_to_0.61",
                  "purpose": "Continue the clean covariance core control lane.",
                  "required_next": True
              },
              {
                  "lane_id": "low_z_plus_BOSS_control",
                  "families": "low_z_MGS_literature_error_plus_BOSS_core",
                  "redshift_region": "0.15_to_0.61",
                  "purpose": "Carry current low-z+BOSS primary comparison forward.",
                  "required_next": True
              },
              {
                  "lane_id": "BOSS_plus_independent_mid_z",
                  "families": "BOSS_core_plus_WiggleZ_or_VIPERS",
                  "redshift_region": "0.38_to_0.8",
                  "purpose": "Check whether independent mid-z families preserve zero-pressure behavior.",
                  "required_next": True
              },
              {
                  "lane_id": "BOSS_plus_eBOSS_high_mid_z",
                  "families": "BOSS_core_plus_eBOSS_LRG_ELG_QSO",
                  "redshift_region": "0.38_to_1.5",
                  "purpose": "Check higher-redshift galaxy growth behavior without relying on the current z=2.33 anchor.",
                  "required_next": True
              },
              {
                  "lane_id": "expanded_full_sensitivity",
                  "families": "BOSS_core_plus_all_source_locked_or_sensitivity_families",
                  "redshift_region": "full_available_growth_range",
                  "purpose": "Full expanded diagnostic lane, still not final pressure.",
                  "required_next": True
              },
              {
                  "lane_id": "high_z_replacement_or_sensitivity_lane",
                  "families": "source_locked_high_z_or_parked_z233",
                  "redshift_region": "z_greater_than_2_if_source_locked",
                  "purpose": "Replace, lock, or keep high-z as sensitivity-only.",
                  "required_next": False
              }
          ]

          QUALITY_GATES_FOR_NEXT_PROBE = [
              {
                  "gate_id": "growth_family_targets_attempted",
                  "requirement": "At least three non-BOSS growth-family targets must be attempted or explicitly parked/manual-needed.",
                  "failure_action": "Do not proceed to expanded bridge."
              },
              {
                  "gate_id": "source_status_recorded",
                  "requirement": "Every candidate must have fetch/locator status and covariance status.",
                  "failure_action": "Fail source-inventory probe."
              },
              {
                  "gate_id": "verified_BOSS_core_preserved",
                  "requirement": "The verified BOSS core must stay available as the control lane.",
                  "failure_action": "Fail expansion design."
              },
              {
                  "gate_id": "independence_overlap_recorded",
                  "requirement": "Every candidate must carry source-family overlap/independence warning.",
                  "failure_action": "Fail claim-boundary gate."
              },
              {
                  "gate_id": "primary_vs_sensitivity_recorded",
                  "requirement": "Every candidate must be marked primary_candidate, sensitivity_only, replace_current_anchor, or park.",
                  "failure_action": "Fail source-inventory probe."
              },
              {
                  "gate_id": "no_final_claims",
                  "requirement": "The inventory probe must not compute final RSD pressure, likelihood, BIC, posterior comparison, or validation.",
                  "failure_action": "Fail claim-boundary gate."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The growth family expansion design validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The expanded growth bridge will be final.",
              "Zero pressure-z proves TAIRID.",
              "All growth-family candidates are independent by default.",
              "Diagonal fallback is the same as full observed covariance.",
              "The verified BOSS core alone is a complete cosmology test.",
              "No source inventory is needed before expansion."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_126_growth_family_source_inventory_probe",
                  "purpose": "Attempt or record source locators for non-BOSS growth-family targets and classify covariance/source status.",
                  "why_next": "v4.125 locks the expansion design; the next move is an inventory, not pressure."
              },
              {
                  "priority": 2,
                  "route_id": "v4_127_expanded_growth_bridge_design",
                  "purpose": "Design an expanded bridge after the inventory identifies which families are source-locked, sensitivity-only, or parked.",
                  "why_next": "Expanded bridge structure depends on what the inventory can source-lock."
              },
              {
                  "priority": 3,
                  "route_id": "v4_128_expanded_growth_bridge_probe",
                  "purpose": "Compute guarded expanded growth bridge lanes after source inventory and design are complete.",
                  "why_next": "Pressure should only be computed after source/covariance status is explicit."
              },
              {
                  "priority": 4,
                  "route_id": "v4_129_external_standard_cosmology_comparison_plan",
                  "purpose": "Design comparison language against normal ΛCDM growth pipelines/literature after expanded growth diagnostics.",
                  "why_next": "Diagnostic stability must be contextualized before any public-facing claim."
              }
          ]

          failed_gates = []
          warnings = [
              "design_only",
              "growth_family_expansion_not_yet_computed",
              "source_inventory_required_next",
              "verified_BOSS_core_preserved",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          upstream = UPSTREAM_LOCKS["v4_124_edge_anchor_sensitivity_bridge_probe"]

          if upstream["pressure_z_all_zero"] is not True:
              failed_gates.append("upstream_pressure_z_all_zero_not_carried")

          if upstream["all_chi2_below_dof"] is not True:
              failed_gates.append("upstream_all_chi2_below_dof_not_carried")

          if upstream["central_BOSS_core_preserved"] is not True:
              failed_gates.append("central_BOSS_core_not_preserved")

          if upstream["high_z_primary_bridge_decision"] != "sensitivity_only_pending_source_lock":
              failed_gates.append("high_z_sensitivity_status_not_carried")

          if len(GROWTH_FAMILY_TARGETS) < 5:
              failed_gates.append("growth_family_targets_incomplete")

          if len(EXPANSION_POLICY) < 6:
              failed_gates.append("expansion_policy_incomplete")

          if NEXT_PROBE_DESIGN["allowed_to_compute_expanded_bridge_pressure"] is not False:
              failed_gates.append("next_probe_pressure_allowed_too_early")

          if NEXT_PROBE_DESIGN["allowed_to_validate_TAIRID"] is not False:
              failed_gates.append("next_probe_validation_allowed_too_early")

          required_schema_fields = {
              "family_id",
              "candidate_id",
              "z",
              "observed_fsigma8",
              "observed_sigma",
              "source_family",
              "source_url_or_locator",
              "fetch_or_locator_status",
              "covariance_status",
              "independence_warning",
              "primary_bridge_decision",
              "claim_boundary"
          }
          schema_fields = {row["field"] for row in NEXT_PROBE_INPUT_SCHEMA}
          if schema_fields != required_schema_fields:
              failed_gates.append("next_probe_input_schema_incomplete")

          if len(EXPANDED_LANE_PLAN) < 6:
              failed_gates.append("expanded_lane_plan_incomplete")

          if len(QUALITY_GATES_FOR_NEXT_PROBE) < 6:
              failed_gates.append("quality_gates_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "expanded growth bridge will be final",
              "zero pressure-z proves tairid",
              "all growth-family candidates are independent by default",
              "diagonal fallback is the same as full observed covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "growth_family_expansion_design_passed_ready_for_growth_family_source_inventory_probe"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_edge_bridge_stability_carried",
                  "pass": upstream["pressure_z_all_zero"] is True and upstream["all_chi2_below_dof"] is True,
                  "result": "v4.124 pressure stability and non-pressure chi2 flags carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "verified_BOSS_core_preserved",
                  "pass": upstream["central_BOSS_core_preserved"] is True,
                  "result": "verified BOSS core remains the control block",
                  "boundary": "Do not disturb verified core."
              },
              {
                  "rule_id": "growth_family_targets_declared",
                  "pass": len(GROWTH_FAMILY_TARGETS) >= 5,
                  "result": f"{len(GROWTH_FAMILY_TARGETS)} growth family targets declared",
                  "boundary": "Design only."
              },
              {
                  "rule_id": "expansion_policy_declared",
                  "pass": len(EXPANSION_POLICY) >= 6,
                  "result": f"{len(EXPANSION_POLICY)} expansion policies declared",
                  "boundary": "No source inventory yet."
              },
              {
                  "rule_id": "next_probe_schema_locked",
                  "pass": schema_fields == required_schema_fields,
                  "result": f"{len(NEXT_PROBE_INPUT_SCHEMA)} next-probe schema fields declared",
                  "boundary": "Schema only."
              },
              {
                  "rule_id": "expanded_lane_plan_declared",
                  "pass": len(EXPANDED_LANE_PLAN) >= 6,
                  "result": f"{len(EXPANDED_LANE_PLAN)} expanded lane plans declared",
                  "boundary": "No expanded bridge computed."
              },
              {
                  "rule_id": "quality_gates_declared",
                  "pass": len(QUALITY_GATES_FOR_NEXT_PROBE) >= 6,
                  "result": f"{len(QUALITY_GATES_FOR_NEXT_PROBE)} quality gates declared",
                  "boundary": "No bridge pressure computed."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": NEXT_PROBE_DESIGN["allowed_to_compute_final_RSD_pressure"] is False and NEXT_PROBE_DESIGN["allowed_to_validate_TAIRID"] is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_125_rules_passed")

          if failed_gates:
              readiness_label = "growth_family_expansion_design_failed"
              next_allowed_step = "Repair growth family expansion design before source inventory probe."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.126 growth family source inventory probe. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_edge_bridge_pressure_z_all_zero": upstream["pressure_z_all_zero"],
              "upstream_edge_bridge_all_chi2_below_dof": upstream["all_chi2_below_dof"],
              "verified_BOSS_core_preserved": upstream["central_BOSS_core_preserved"],
              "low_z_primary_bridge_decision": upstream["low_z_primary_bridge_decision"],
              "high_z_primary_bridge_decision": upstream["high_z_primary_bridge_decision"],
              "growth_family_target_count": len(GROWTH_FAMILY_TARGETS),
              "expansion_policy_count": len(EXPANSION_POLICY),
              "next_probe_input_schema_field_count": len(NEXT_PROBE_INPUT_SCHEMA),
              "expanded_lane_plan_count": len(EXPANDED_LANE_PLAN),
              "quality_gate_count": len(QUALITY_GATES_FOR_NEXT_PROBE),
              "source_inventory_performed": False,
              "expanded_bridge_pressure_computed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "current_bridge_state": CURRENT_BRIDGE_STATE,
              "growth_family_targets": GROWTH_FAMILY_TARGETS,
              "expansion_policy": EXPANSION_POLICY,
              "next_probe_design": NEXT_PROBE_DESIGN,
              "next_probe_input_schema": NEXT_PROBE_INPUT_SCHEMA,
              "expanded_lane_plan": EXPANDED_LANE_PLAN,
              "quality_gates_for_next_probe": QUALITY_GATES_FOR_NEXT_PROBE,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
