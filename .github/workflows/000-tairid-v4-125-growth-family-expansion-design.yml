                  "source_inventory_performed": False,
                  "expanded_bridge_pressure_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_125_growth_family_expansion_design.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "current_bridge_state_v4_125.csv",
              CURRENT_BRIDGE_STATE,
              ["state_id", "positions", "redshift_range", "current_status", "pressure_status", "role_next"]
          )

          write_csv(
              OUTDIR / "growth_family_targets_v4_125.csv",
              GROWTH_FAMILY_TARGETS,
              ["family_id", "example_sources", "target_redshift_region", "role", "priority", "allowed_status", "reason"]
          )

          write_csv(
              OUTDIR / "expansion_policy_v4_125.csv",
              EXPANSION_POLICY,
              ["policy_id", "requirement", "reason", "applied_now"]
          )

          write_csv(
              OUTDIR / "next_probe_input_schema_v4_125.csv",
              NEXT_PROBE_INPUT_SCHEMA,
              ["field", "required", "purpose"]
          )

          write_csv(
              OUTDIR / "expanded_lane_plan_v4_125.csv",
