name: 000 TAIRID v4.162 - Limited LRGxELG Visual Shape Packet With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-162-limited-lrgxelg-visual-shape-packet-with-scope-guards.yml"

permissions:
  contents: read

jobs:
  limited-lrgxelg-visual-shape-packet:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install plotting dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib

      - name: Build v4.162 visual shape packet
        run: |
          cat > run_tairid_v4_162_visual_shape_packet.py <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          import numpy as np
          import pandas as pd

          import matplotlib
          matplotlib.use("Agg")
          import matplotlib.pyplot as plt
          from mpl_toolkits.mplot3d import Axes3D  # noqa: F401

          OUT = Path("tairid_v4_162_limited_lrgxelg_visual_shape_packet_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          CLAIM_BOUNDARY = "visual_shape_packet_only_no_residuals_no_pressure_no_likelihood_no_validation"

          # Observed limited LRGxELG two-redshift product values carried forward from v4.153/v4.154.
          # Scope: z=0.70 and z=0.845 only; DM/rd, DH/rd, fsigma8 only.
          rows = [
              {"row_index": 1, "row_id": "DM_ov_rd_z0p70", "z": 0.700, "observable": "DM_over_rd", "role": "geometry_transverse", "observed_value": 17.954174, "observed_sigma": 0.508712},
              {"row_index": 2, "row_id": "DH_ov_rd_z0p70", "z": 0.700, "observable": "DH_over_rd", "role": "geometry_radial", "observed_value": 21.221161, "observed_sigma": 1.197674},
              {"row_index": 3, "row_id": "fsigma8_z0p70", "z": 0.700, "observable": "fsigma8", "role": "growth", "observed_value": 0.433572, "observed_sigma": 0.050037},
              {"row_index": 4, "row_id": "DM_ov_rd_z0p845", "z": 0.845, "observable": "DM_over_rd", "role": "geometry_transverse", "observed_value": 18.896851, "observed_sigma": 0.776274},
              {"row_index": 5, "row_id": "DH_ov_rd_z0p845", "z": 0.845, "observable": "DH_over_rd", "role": "geometry_radial", "observed_value": 20.910056, "observed_sigma": 2.861697},
              {"row_index": 6, "row_id": "fsigma8_z0p845", "z": 0.845, "observable": "fsigma8", "role": "growth", "observed_value": 0.296822, "observed_sigma": 0.081385},
          ]

          # LCDM-lite prototype reference vector and one-at-a-time sensitivity corridor carried forward from v4.159/v4.161.
          reference = {
              "DM_ov_rd_z0p70":    {"reference_value": 17.5805195461, "corridor_min": 17.323344, "corridor_max": 17.845446, "largest_shift_driver": "H0_km_s_Mpc_minus"},
              "DH_ov_rd_z0p70":    {"reference_value": 20.2449335870, "corridor_min": 19.948782, "corridor_max": 20.550011, "largest_shift_driver": "H0_km_s_Mpc_minus"},
              "fsigma8_z0p70":     {"reference_value": 0.4618546966,  "corridor_min": 0.450466,  "corridor_max": 0.473243,  "largest_shift_driver": "sigma8_z0_minus"},
              "DM_ov_rd_z0p845":   {"reference_value": 20.3899796593, "corridor_min": 20.091706, "corridor_max": 20.697243, "largest_shift_driver": "H0_km_s_Mpc_minus"},
              "DH_ov_rd_z0p845":   {"reference_value": 18.5350397709, "corridor_min": 18.263901, "corridor_max": 18.814350, "largest_shift_driver": "H0_km_s_Mpc_minus"},
              "fsigma8_z0p845":    {"reference_value": 0.4480660425,  "corridor_min": 0.437018,  "corridor_max": 0.459114,  "largest_shift_driver": "sigma8_z0_plus"},
          }

          labels = [r["row_id"] for r in rows]
          sigma = np.array([r["observed_sigma"] for r in rows], dtype=float)

          corr = np.array([
              [1.0, -0.021718548195443162, 0.5516429840625605, 0.24764900063104792, 0.009239981153245924, 0.036856039048779765],
              [-0.021718548195443162, 1.0, -0.14109383247568927, 0.14219175082336047, 0.43026858179378596, -0.26618551513041844],
              [0.5516429840625605, -0.14109383247568927, 1.0, 0.011495380212674345, -0.19920543345265335, 0.15876512281762778],
              [0.24764900063104792, 0.14219175082336047, 0.011495380212674345, 1.0, -0.35737131901897323, 0.5642782828813311],
              [0.009239981153245924, 0.43026858179378596, -0.19920543345265335, -0.35737131901897323, 1.0, -0.7358297549513559],
              [0.036856039048779765, -0.26618551513041844, 0.15876512281762778, 0.5642782828813311, -0.7358297549513559, 1.0],
          ], dtype=float)

          cov = corr * np.outer(sigma, sigma)

          obs_df = pd.DataFrame(rows)
          obs_df["claim_boundary"] = CLAIM_BOUNDARY
          obs_df.to_csv(OUT / "observed_limited_lrgxelg_value_points_v4_162.csv", index=False)

          ref_records = []
          for r in rows:
              rr = reference[r["row_id"]]
              rec = dict(r)
              rec["reference_value"] = rr["reference_value"]
              rec["corridor_min"] = rr["corridor_min"]
              rec["corridor_max"] = rr["corridor_max"]
              rec["corridor_half_width"] = max(abs(rr["reference_value"] - rr["corridor_min"]), abs(rr["corridor_max"] - rr["reference_value"]))
              rec["largest_shift_driver"] = rr["largest_shift_driver"]
              rec["claim_boundary"] = "lcdm_lite_reference_corridor_visual_only_not_covariance_not_posterior"
              ref_records.append(rec)
          ref_df = pd.DataFrame(ref_records)
          ref_df.to_csv(OUT / "reference_prototype_points_and_corridors_v4_162.csv", index=False)

          corr_df = pd.DataFrame(corr, columns=labels)
          corr_df.insert(0, "row_parameter_label", labels)
          corr_df.insert(0, "row_index", list(range(1, 7)))
          corr_df["claim_boundary"] = "observed_correlation_shape_only_not_likelihood_not_pressure"
          corr_df.to_csv(OUT / "observed_correlation_matrix_v4_162.csv", index=False)

          same_pairs = [
              {"z_value": 0.700, "geometry_parameter_label": "DM_ov_rd_z0p70", "growth_parameter_label": "fsigma8_z0p70", "correlation": corr[0,2]},
              {"z_value": 0.700, "geometry_parameter_label": "DH_ov_rd_z0p70", "growth_parameter_label": "fsigma8_z0p70", "correlation": corr[1,2]},
              {"z_value": 0.845, "geometry_parameter_label": "DM_ov_rd_z0p845", "growth_parameter_label": "fsigma8_z0p845", "correlation": corr[3,5]},
              {"z_value": 0.845, "geometry_parameter_label": "DH_ov_rd_z0p845", "growth_parameter_label": "fsigma8_z0p845", "correlation": corr[4,5]},
          ]
          for p in same_pairs:
              p["abs_correlation"] = abs(p["correlation"])
              p["direction"] = "positive" if p["correlation"] > 0 else "negative" if p["correlation"] < 0 else "zero"
              p["claim_boundary"] = "same_redshift_geometry_growth_shape_not_pressure"
          same_df = pd.DataFrame(same_pairs)
          same_df.to_csv(OUT / "same_redshift_geometry_growth_surface_v4_162.csv", index=False)

          shape_report = []
          shape_report.append({
              "finding_id": "F01",
              "finding": "Observed LRGxELG points can be visualized as two geometry-growth states connected across redshift.",
              "plain_language": "This gives the user a 3D diagnostic shape: DM/rd, DH/rd, and fσ8 at z=0.70 and z=0.845.",
              "claim_boundary": CLAIM_BOUNDARY,
          })
          shape_report.append({
              "finding_id": "F02",
              "finding": "Same-redshift DM/rd and fσ8 correlations are positive at both redshifts.",
              "plain_language": "Transverse geometry and growth lean together in this limited product.",
              "claim_boundary": CLAIM_BOUNDARY,
          })
          shape_report.append({
              "finding_id": "F03",
              "finding": "Same-redshift DH/rd and fσ8 correlations are negative at both redshifts, and strongest at z=0.845.",
              "plain_language": "Radial geometry and growth oppose each other more strongly at the higher redshift in this limited product.",
              "claim_boundary": CLAIM_BOUNDARY,
          })
          shape_report.append({
              "finding_id": "F04",
              "finding": "The visual signature is a twisted geometry-growth diagnostic surface, not a smooth single-offset line.",
              "plain_language": "This helps the TAIRID lane because it shows coupled shape. It does not prove that TAIRID is correct.",
              "claim_boundary": CLAIM_BOUNDARY,
          })
          shape_df = pd.DataFrame(shape_report)
          shape_df.to_csv(OUT / "visual_shape_interpretation_records_v4_162.csv", index=False)

          # Helper functions for plotting.
          def row_value(row_id, key):
              return float(obs_df.loc[obs_df["row_id"] == row_id, key].iloc[0])

          def ref_value(row_id, key):
              return float(ref_df.loc[ref_df["row_id"] == row_id, key].iloc[0])

          def center_for(prefix, source="observed"):
              if source == "observed":
                  return np.array([
                      row_value(f"DM_ov_rd_{prefix}", "observed_value"),
                      row_value(f"DH_ov_rd_{prefix}", "observed_value"),
                      row_value(f"fsigma8_{prefix}", "observed_value") * 50.0,
                  ], dtype=float)
              return np.array([
                  ref_value(f"DM_ov_rd_{prefix}", "reference_value"),
                  ref_value(f"DH_ov_rd_{prefix}", "reference_value"),
                  ref_value(f"fsigma8_{prefix}", "reference_value") * 50.0,
              ], dtype=float)

          def scaled_cov_for(indices):
              sub = cov[np.ix_(indices, indices)]
              scale = np.diag([1.0, 1.0, 50.0])
              return scale @ sub @ scale

          def plot_ellipsoid(ax, center, cov3, label):
              vals, vecs = np.linalg.eigh(cov3)
              vals = np.clip(vals, 1e-12, None)
              radii = np.sqrt(vals)
              u = np.linspace(0.0, 2.0 * np.pi, 36)
              v = np.linspace(0.0, np.pi, 18)
              x = np.outer(np.cos(u), np.sin(v))
              y = np.outer(np.sin(u), np.sin(v))
              z = np.outer(np.ones_like(u), np.cos(v))
              sphere = np.stack([x, y, z], axis=-1)
              transform = vecs @ np.diag(radii)
              ell = sphere @ transform.T + center
              ax.plot_surface(ell[:, :, 0], ell[:, :, 1], ell[:, :, 2], alpha=0.22, linewidth=0)
              ax.text(center[0], center[1], center[2], label)

          # Figure 1: observed 3D geometry-growth state.
          fig = plt.figure(figsize=(9, 7))
          ax = fig.add_subplot(111, projection="3d")
          c70 = center_for("z0p70", "observed")
          c845 = center_for("z0p845", "observed")
          ax.scatter([c70[0], c845[0]], [c70[1], c845[1]], [c70[2], c845[2]], s=55)
          ax.plot([c70[0], c845[0]], [c70[1], c845[1]], [c70[2], c845[2]], linewidth=2)
          plot_ellipsoid(ax, c70, scaled_cov_for([0, 1, 2]), "z=0.70")
          plot_ellipsoid(ax, c845, scaled_cov_for([3, 4, 5]), "z=0.845")
          ax.set_title("v4.162 Observed Limited LRGxELG Geometry-Growth Shape")
          ax.set_xlabel("DM/rd transverse geometry")
          ax.set_ylabel("DH/rd radial geometry")
          ax.set_zlabel("fσ8 growth × 50 for visibility")
          fig.tight_layout()
          fig.savefig(OUT / "figure_observed_3d_geometry_growth_shape_v4_162.png", dpi=180)
          plt.close(fig)

          # Figure 2: LCDM-lite reference corridor visual.
          fig = plt.figure(figsize=(9, 7))
          ax = fig.add_subplot(111, projection="3d")
          r70 = center_for("z0p70", "reference")
          r845 = center_for("z0p845", "reference")
          ax.scatter([r70[0], r845[0]], [r70[1], r845[1]], [r70[2], r845[2]], s=55)
          ax.plot([r70[0], r845[0]], [r70[1], r845[1]], [r70[2], r845[2]], linewidth=2)

          def draw_corridor_box(prefix, label):
              dm_min = ref_value(f"DM_ov_rd_{prefix}", "corridor_min")
              dm_max = ref_value(f"DM_ov_rd_{prefix}", "corridor_max")
              dh_min = ref_value(f"DH_ov_rd_{prefix}", "corridor_min")
              dh_max = ref_value(f"DH_ov_rd_{prefix}", "corridor_max")
              fs_min = ref_value(f"fsigma8_{prefix}", "corridor_min") * 50.0
              fs_max = ref_value(f"fsigma8_{prefix}", "corridor_max") * 50.0
              corners = np.array([
                  [dm_min, dh_min, fs_min], [dm_max, dh_min, fs_min], [dm_max, dh_max, fs_min], [dm_min, dh_max, fs_min],
                  [dm_min, dh_min, fs_max], [dm_max, dh_min, fs_max], [dm_max, dh_max, fs_max], [dm_min, dh_max, fs_max],
              ])
              edges = [(0,1),(1,2),(2,3),(3,0),(4,5),(5,6),(6,7),(7,4),(0,4),(1,5),(2,6),(3,7)]
              for a, b in edges:
                  ax.plot([corners[a,0], corners[b,0]], [corners[a,1], corners[b,1]], [corners[a,2], corners[b,2]], linewidth=1)
              center = corners.mean(axis=0)
              ax.text(center[0], center[1], center[2], label)

          draw_corridor_box("z0p70", "z=0.70 corridor")
          draw_corridor_box("z0p845", "z=0.845 corridor")
          ax.set_title("v4.162 LCDM-lite Reference Sensitivity Corridor")
          ax.set_xlabel("DM/rd transverse geometry")
          ax.set_ylabel("DH/rd radial geometry")
          ax.set_zlabel("fσ8 growth × 50 for visibility")
          fig.tight_layout()
          fig.savefig(OUT / "figure_reference_corridor_3d_geometry_growth_shape_v4_162.png", dpi=180)
          plt.close(fig)

          # Figure 3: correlation heatmap.
          fig, ax = plt.subplots(figsize=(9, 8))
          im = ax.imshow(corr, vmin=-1.0, vmax=1.0)
          ax.set_title("v4.162 Observed Limited LRGxELG Correlation Matrix")
          ax.set_xticks(range(6))
          ax.set_yticks(range(6))
          ax.set_xticklabels(labels, rotation=45, ha="right")
          ax.set_yticklabels(labels)
          for i in range(6):
              for j in range(6):
                  ax.text(j, i, f"{corr[i,j]:.2f}", ha="center", va="center", fontsize=8)
          fig.colorbar(im, ax=ax, fraction=0.046, pad=0.04)
          fig.tight_layout()
          fig.savefig(OUT / "figure_observed_correlation_heatmap_v4_162.png", dpi=180)
          plt.close(fig)

          # Figure 4: same-redshift coupling bars.
          fig, ax = plt.subplots(figsize=(9, 5))
          bar_labels = [
              "z0.70 DM×growth",
              "z0.70 DH×growth",
              "z0.845 DM×growth",
              "z0.845 DH×growth",
          ]
          ax.bar(bar_labels, same_df["correlation"].values)
          ax.axhline(0.0, linewidth=1)
          ax.set_title("v4.162 Same-Redshift Geometry-Growth Coupling Signs")
          ax.set_ylabel("Observed correlation")
          ax.tick_params(axis="x", rotation=20)
          fig.tight_layout()
          fig.savefig(OUT / "figure_same_redshift_geometry_growth_coupling_bars_v4_162.png", dpi=180)
          plt.close(fig)

          # Markdown report.
          md = f"""# TAIRID v4.162 Limited LRGxELG Visual Shape Packet

          ## Scope

          This packet visualizes the limited LRGxELG two-redshift product only.

          It uses the observed limited product at z=0.70 and z=0.845, the v4.154 correlation shape, and the v4.161 LCDM-lite reference sensitivity corridor.

          ## Clean result

          The limited product can be shown as a 3D diagnostic geometry-growth shape.

          The axes are:

          - X: DM/rd, transverse geometry / reach
          - Y: DH/rd, radial geometry / pacing access
          - Z: fσ8 × 50, growth / consolidation display axis

          The factor of 50 is used only so fσ8 is visible on the same plot as distance ratios.

          ## Shape reading

          The observed shape is not six independent loose points. The same-redshift geometry-growth couplings are mixed.

          DM/rd and fσ8 are positive at both redshifts.

          DH/rd and fσ8 are negative at both redshifts, and the strongest same-redshift geometry-growth coupling is DH/rd z=0.845 with fσ8 z=0.845 at about -0.73583.

          The safe visual interpretation is a twisted geometry-growth diagnostic ribbon, not a final physical claim.

          ## Truth boundary

          This packet does not compute residuals, pressure, likelihood, BIC, posterior comparison, QSO covariance, full eBOSS covariance, or validation of TAIRID.

          The visual shape helps the user see the diagnostic structure. It does not prove the theory.
          """
          (OUT / "visual_shape_packet_summary_v4_162.md").write_text(md, encoding="utf-8")

          blocked_claims = pd.DataFrame([
              {"blocked_claim": "TAIRID validated by visual shape", "status": "blocked", "reason": "visual diagnostics are not validation"},
              {"blocked_claim": "pressure computed", "status": "blocked", "reason": "no residuals or covariance-weighted pressure calculation performed"},
              {"blocked_claim": "reference covariance supplied", "status": "blocked", "reason": "sensitivity corridor is not covariance"},
              {"blocked_claim": "QSO covariance supplied", "status": "blocked", "reason": "limited LRGxELG product only"},
              {"blocked_claim": "full eBOSS covariance supplied", "status": "blocked", "reason": "full family covariance/overlap still missing"},
              {"blocked_claim": "Planck posterior reference supplied", "status": "blocked", "reason": "LCDM-lite reference corridor only"},
          ])
          blocked_claims.to_csv(OUT / "blocked_claims_report_v4_162.csv", index=False)

          scope_guards = pd.DataFrame([
              {"guard": "limited_lrgxelg_scope_only", "status": "enforced", "detail": "z=0.70 and z=0.845 DM/rd, DH/rd, fσ8 only"},
              {"guard": "visual_packet_only", "status": "enforced", "detail": "figures and shape reports only"},
              {"guard": "no_residuals_or_pressure", "status": "enforced", "detail": "no observed-minus-reference table and no pressure calculation"},
              {"guard": "no_likelihood_bic_or_posterior", "status": "enforced", "detail": "no model comparison"},
              {"guard": "no_validation_claim", "status": "enforced", "detail": "diagnostic visualization only"},
          ])
          scope_guards.to_csv(OUT / "scope_guard_report_v4_162.csv", index=False)

          rules = [
              ("R01", "observed_value_points_written", (OUT / "observed_limited_lrgxelg_value_points_v4_162.csv").exists()),
              ("R02", "reference_corridor_points_written", (OUT / "reference_prototype_points_and_corridors_v4_162.csv").exists()),
              ("R03", "observed_correlation_matrix_written", (OUT / "observed_correlation_matrix_v4_162.csv").exists()),
              ("R04", "same_redshift_geometry_growth_surface_written", (OUT / "same_redshift_geometry_growth_surface_v4_162.csv").exists()),
              ("R05", "observed_3d_shape_png_written", (OUT / "figure_observed_3d_geometry_growth_shape_v4_162.png").exists()),
              ("R06", "reference_corridor_3d_png_written", (OUT / "figure_reference_corridor_3d_geometry_growth_shape_v4_162.png").exists()),
              ("R07", "correlation_heatmap_png_written", (OUT / "figure_observed_correlation_heatmap_v4_162.png").exists()),
              ("R08", "coupling_bar_png_written", (OUT / "figure_same_redshift_geometry_growth_coupling_bars_v4_162.png").exists()),
              ("R09", "shape_interpretation_records_written", (OUT / "visual_shape_interpretation_records_v4_162.csv").exists()),
              ("R10", "markdown_summary_written", (OUT / "visual_shape_packet_summary_v4_162.md").exists()),
              ("R11", "scope_guards_written", (OUT / "scope_guard_report_v4_162.csv").exists()),
              ("R12", "blocked_claims_written", (OUT / "blocked_claims_report_v4_162.csv").exists()),
              ("R13", "no_residuals_computed", True),
              ("R14", "no_pressure_computed", True),
              ("R15", "no_reference_covariance_generated", True),
              ("R16", "no_qso_or_full_eboss_covariance_supplied", True),
              ("R17", "no_likelihood_bic_or_posterior_comparison", True),
              ("R18", "no_validation_claim_allowed", True),
              ("R19", "next_route_selected", True),
          ]
          rule_df = pd.DataFrame([{"rule_id": r[0], "rule": r[1], "pass": bool(r[2])} for r in rules])
          rule_df.to_csv(OUT / "rule_audit_v4_162.csv", index=False)

          failed = rule_df.loc[~rule_df["pass"], "rule_id"].tolist()
          expected = "limited_lrgxelg_visual_shape_packet_passed_figures_written_no_residuals_no_pressure_no_validation"
          selected_next_route = "limited_lrgxelg_visual_shape_review_then_reference_source_or_covariance_route_with_scope_guards"

          health = pd.DataFrame([
              {"metric": "workflow_version", "value": "v4.162", "claim_boundary": CLAIM_BOUNDARY},
              {"metric": "expected_result_label", "value": expected, "claim_boundary": CLAIM_BOUNDARY},
              {"metric": "failed_gates", "value": json.dumps(failed), "claim_boundary": CLAIM_BOUNDARY},
              {"metric": "rule_pass_count", "value": f"{int(rule_df['pass'].sum())} / {len(rule_df)}", "claim_boundary": CLAIM_BOUNDARY},
              {"metric": "observed_value_points", "value": 6, "claim_boundary": CLAIM_BOUNDARY},
              {"metric": "reference_corridor_points", "value": 6, "claim_boundary": CLAIM_BOUNDARY},
              {"metric": "figures_written", "value": 4, "claim_boundary": CLAIM_BOUNDARY},
              {"metric": "residuals_computed", "value": False, "claim_boundary": CLAIM_BOUNDARY},
              {"metric": "pressure_computed", "value": False, "claim_boundary": CLAIM_BOUNDARY},
              {"metric": "validation_claim_allowed", "value": False, "claim_boundary": CLAIM_BOUNDARY},
              {"metric": "selected_next_route", "value": selected_next_route, "claim_boundary": CLAIM_BOUNDARY},
          ])
          health.to_csv(OUT / "parser_health_report_v4_162.csv", index=False)

          summary = {
              "workflow_version": "v4.162",
              "expected_result_label": expected,
              "failed_gates": failed,
              "rule_pass_count": f"{int(rule_df['pass'].sum())} / {len(rule_df)}",
              "figures_written": [
                  "figure_observed_3d_geometry_growth_shape_v4_162.png",
                  "figure_reference_corridor_3d_geometry_growth_shape_v4_162.png",
                  "figure_observed_correlation_heatmap_v4_162.png",
                  "figure_same_redshift_geometry_growth_coupling_bars_v4_162.png",
              ],
              "clean_result": "visual_shape_packet_written_for_limited_lrgxelg_product",
              "truth_boundary": "no_residuals_no_pressure_no_likelihood_no_bic_no_posterior_no_validation",
              "selected_next_route": selected_next_route,
          }
          (OUT / "summary_v4_162.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          if failed:
              raise SystemExit(f"v4.162 failed gates: {failed}")

          print(json.dumps(summary, indent=2))
          PY
          python run_tairid_v4_162_visual_shape_packet.py

      - name: Upload v4.162 visual shape packet artifacts
        uses: actions/upload-artifact@v4
        with:
