name: 001 TAIRID v4.280 - External Primary Source Manifest Builder Or Fetch Probe No Inference

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-280-external-primary-source-manifest-builder-or-fetch-probe-no-inference.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  external-primary-source-manifest-builder:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.280 External Primary Source Manifest Builder Or Fetch Probe No Inference is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.280 external primary source manifest builder
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import urllib.request
          import urllib.error
          import zipfile

          VERSION = "v4.280"
          ROUTE = "external_primary_source_manifest_builder_or_fetch_probe_no_inference_after_v4_279"
          EXPECTED_RESULT = "v4_280_external_primary_source_manifest_builder_or_fetch_probe_no_inference_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_281_external_source_precommit_card_freeze_no_fetch_scoring"

          OUT = Path("tairid_v4_280_external_primary_source_manifest_builder_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-280-external-primary-source-manifest-builder-output.zip"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def probe_url(url, timeout=8):
              row = {
                  "url": url,
                  "fetch_probe_attempted": True,
                  "fetch_probe_ok": False,
                  "status_code": "",
                  "content_type": "",
                  "final_url": "",
                  "error": "",
                  "probe_status": "nonbinding_fetch_probe_only",
              }
              try:
                  req = urllib.request.Request(url, method="HEAD", headers={"User-Agent": "TAIRID-v4.280-no-inference-probe"})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      row["status_code"] = getattr(resp, "status", "")
                      row["content_type"] = resp.headers.get("Content-Type", "")
                      row["final_url"] = resp.geturl()
                      row["fetch_probe_ok"] = True
                      return row
              except Exception as first_exc:
                  try:
                      req = urllib.request.Request(url, method="GET", headers={"User-Agent": "TAIRID-v4.280-no-inference-probe"})
                      with urllib.request.urlopen(req, timeout=timeout) as resp:
                          row["status_code"] = getattr(resp, "status", "")
                          row["content_type"] = resp.headers.get("Content-Type", "")
                          row["final_url"] = resp.geturl()
                          row["fetch_probe_ok"] = True
                          return row
                  except Exception as second_exc:
                      row["error"] = f"HEAD: {type(first_exc).__name__}: {first_exc}; GET: {type(second_exc).__name__}: {second_exc}"
                      return row

