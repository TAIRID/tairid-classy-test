          precommit_card_seed_rows = []
          for row in external_source_manifest_rows:
              if row["source_id"] == "external_negative_control_placeholder":
                  continue
              precommit_card_seed_rows.append({
                  "precommit_id": f"precommit_{row['source_id']}",
                  "source_id": row["source_id"],
