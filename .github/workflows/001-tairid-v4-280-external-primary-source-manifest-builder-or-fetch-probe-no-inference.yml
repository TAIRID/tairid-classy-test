              {"gate": "external_source_manifest_rows_equal_7", "passed": len(external_source_manifest_rows) == 7, "detail": f"external_source_manifest_rows = {len(external_source_manifest_rows)}"},
              {"gate": "fetch_probe_rows_at_least_6", "passed": len(fetch_probe_rows) >= 6, "detail": f"fetch_probe_rows = {len(fetch_probe_rows)}"},
              {"gate": "precommit_card_seed_rows_equal_6", "passed": len(precommit_card_seed_rows) == 6, "detail": f"precommit_card_seed_rows = {len(precommit_card_seed_rows)}"},
              {"gate": "source_kind_plan_rows_equal_6", "passed": len(source_kind_plan_rows) == 6, "detail": f"source_kind_plan_rows = {len(source_kind_plan_rows)}"},
              {"gate": "source_independence_review_rows_equal_7", "passed": len(source_independence_review_rows) == 7, "detail": f"source_independence_review_rows = {len(source_independence_review_rows)}"},
              {"gate": "fetch_probe_interpretation_rows_equal_4", "passed": len(fetch_probe_interpretation_rows) == 4, "detail": f"fetch_probe_interpretation_rows = {len(fetch_probe_interpretation_rows)}"},
              {"gate": "blocked_operation_rows_equal_7", "passed": len(blocked_operation_rows) == 7, "detail": f"blocked_operation_rows = {len(blocked_operation_rows)}"},
              {"gate": "permission_rows_equal_9", "passed": len(permission_rows) == 9, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_6", "passed": len(readiness_rows) == 6, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "decision_rows_equal_4", "passed": len(decision_rows) == 4, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "sdr_reduction_rows_equal_5", "passed": len(sdr_reduction_rows) == 5, "detail": f"sdr_reduction_rows = {len(sdr_reduction_rows)}"},
              {"gate": "all_manifest_rows_not_support_now", "passed": all(row["support_allowed_now"] is False for row in external_source_manifest_rows), "detail": "all manifest rows blocked from support now"},
              {"gate": "all_manifest_rows_precommit_required", "passed": all(row["precommit_required_before_support"] is True for row in external_source_manifest_rows), "detail": "all manifest rows require precommit"},
              {"gate": "all_manifest_rows_baseline_required", "passed": all(row["baseline_comparator_required"] is True for row in external_source_manifest_rows), "detail": "all manifest rows require baseline"},
              {"gate": "all_manifest_rows_failure_condition_required", "passed": all(row["failure_condition_required"] is True for row in external_source_manifest_rows), "detail": "all manifest rows require failure condition"},
              {"gate": "desi_source_present", "passed": any(row["source_id"] == "external_desi_dr1_release" for row in external_source_manifest_rows), "detail": "DESI DR1 release source present"},
              {"gate": "sdss_source_present", "passed": any(row["source_id"] == "external_sdss_dr16_eboss" for row in external_source_manifest_rows), "detail": "SDSS DR16 eBOSS source present"},
              {"gate": "pantheon_source_present", "passed": any(row["source_id"] == "external_pantheon_plus_shoes_datarelease" for row in external_source_manifest_rows), "detail": "Pantheon+SH0ES source present"},
              {"gate": "planck_source_present", "passed": any(row["source_id"] == "external_planck_legacy_archive" for row in external_source_manifest_rows), "detail": "Planck source present"},
              {"gate": "kids_source_present", "passed": any(row["source_id"] == "external_kids_science_data_products" for row in external_source_manifest_rows), "detail": "KiDS source present"},
              {"gate": "negative_control_placeholder_present", "passed": any(row["source_id"] == "external_negative_control_placeholder" for row in external_source_manifest_rows), "detail": "negative control placeholder present"},
              {"gate": "fetch_probe_nonbinding", "passed": all(row["inference_allowed"] is False and row["scoring_allowed"] is False for row in fetch_probe_rows), "detail": "fetch probe nonbinding"},
              {"gate": "all_precommit_seeds_not_frozen", "passed": all(row["freeze_status"] == "not_frozen" for row in precommit_card_seed_rows), "detail": "all precommit seeds not frozen"},
              {"gate": "external_manifest_written_permission", "passed": any(row["permission_scope"] == "external_primary_source_manifest" and row["permission_status"] == "written_candidate_only" for row in permission_rows), "detail": "external manifest written"},
              {"gate": "precommit_freeze_allowed_next", "passed": any(row["permission_scope"] == "external_source_precommit_freeze" and row["permission_status"] == "allowed_next" for row in permission_rows), "detail": "precommit freeze allowed next"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external scoring blocked"},
              {"gate": "holdout_approval_blocked", "passed": any(row["permission_scope"] == "holdout_approval" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "holdout approval blocked"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric fit blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "evidence_validation_blocked", "passed": any(row["permission_scope"] == "evidence_or_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "evidence/validation blocked"},
              {"gate": "all_blocked_operations_blocked", "passed": all(row["blocked"] is True for row in blocked_operation_rows), "detail": "blocked operations guarded"},
              {"gate": "precommit_freeze_route_recommended", "passed": any(row["route"] == "external_source_precommit_card_freeze_no_fetch_scoring" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "v4.281 route recommended"},
              {"gate": "external_score_not_activated", "passed": any(row["test_id"] == "v4_281_external_data_score" and row["activated"] is False for row in next_rows), "detail": "external scoring not activated"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no scoring"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout approval"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_281_external_source_precommit_card_freeze_no_fetch_scoring", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_280_external_primary_source_manifest_builder_or_fetch_probe_no_inference_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_280_inherited_v4_279_rows.csv", inherited_v4_279_rows)
          write_csv(OUT / "v4_280_external_source_manifest_rows.csv", external_source_manifest_rows)
          write_csv(OUT / "EXTERNAL_PRIMARY_SOURCE_MANIFEST_v4_280_CANDIDATE_NOT_SCORED.csv", external_source_manifest_rows)
          write_csv(OUT / "v4_280_fetch_probe_rows.csv", fetch_probe_rows)
          write_csv(OUT / "v4_280_precommit_card_seed_rows.csv", precommit_card_seed_rows)
          write_csv(OUT / "EXTERNAL_PRECOMMIT_CARD_SEEDS_v4_280_NOT_FROZEN.csv", precommit_card_seed_rows)
          write_csv(OUT / "v4_280_source_kind_plan_rows.csv", source_kind_plan_rows)
          write_csv(OUT / "v4_280_source_independence_review_rows.csv", source_independence_review_rows)
          write_csv(OUT / "v4_280_fetch_probe_interpretation_rows.csv", fetch_probe_interpretation_rows)
          write_csv(OUT / "v4_280_blocked_operation_rows.csv", blocked_operation_rows)
          write_csv(OUT / "v4_280_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_280_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_280_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_280_route_decision_rows.csv", route_decision_rows)
          write_csv(OUT / "v4_280_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_280_sdr_reduction_rows.csv", sdr_reduction_rows)
          write_csv(OUT / "v4_280_rule_checks.csv", checks)

          manifest_lines = [
              f"{row['source_id']}: {row['source_kind']} / {row['allowed_current_use']} / support_now={row['support_allowed_now']}"
              for row in external_source_manifest_rows
          ]

          fetch_lines = [
              f"{row['url']}: ok={row['fetch_probe_ok']} status={row['status_code']} error={'none' if not row['error'] else 'logged'}"
              for row in fetch_probe_rows
          ]

          route_lines = [
              f"{row['route']}: {row['permission_status']} — {row['reason']}"
              for row in route_decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_279_rows": len(inherited_v4_279_rows),
              "external_source_manifest_rows": len(external_source_manifest_rows),
              "fetch_probe_rows": len(fetch_probe_rows),
              "precommit_card_seed_rows": len(precommit_card_seed_rows),
              "source_kind_plan_rows": len(source_kind_plan_rows),
              "source_independence_review_rows": len(source_independence_review_rows),
              "fetch_probe_interpretation_rows": len(fetch_probe_interpretation_rows),
              "blocked_operation_rows": len(blocked_operation_rows),
              "permission_rows": len(permission_rows),
              "readiness_rows": len(readiness_rows),
              "decision_rows": len(decision_rows),
              "route_decision_rows": len(route_decision_rows),
              "next_rows": len(next_rows),
              "sdr_reduction_rows": len(sdr_reduction_rows),
              "external_manifest_written": True,
              "fetch_probe_completed_nonbinding": True,
              "precommit_seeds_written_not_frozen": True,
              "precommit_freeze_allowed_next": True,
              "external_scoring_allowed": False,
              "holdout_approval_allowed": False,
              "numeric_fit_allowed": False,
              "evidence_allowed": False,
              "validation_allowed": False,
              "combined_matrix_allowed": False,
              "approved_holdout_sources": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_280_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.280 External Primary Source Manifest Builder Or Fetch Probe No Inference",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_279_rows = {summary['inherited_v4_279_rows']}",
              f"external_source_manifest_rows = {summary['external_source_manifest_rows']}",
              f"fetch_probe_rows = {summary['fetch_probe_rows']}",
              f"precommit_card_seed_rows = {summary['precommit_card_seed_rows']}",
              f"source_kind_plan_rows = {summary['source_kind_plan_rows']}",
              f"source_independence_review_rows = {summary['source_independence_review_rows']}",
              f"fetch_probe_interpretation_rows = {summary['fetch_probe_interpretation_rows']}",
              f"blocked_operation_rows = {summary['blocked_operation_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"route_decision_rows = {summary['route_decision_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"sdr_reduction_rows = {summary['sdr_reduction_rows']}",
              f"external_manifest_written = {summary['external_manifest_written']}",
              f"fetch_probe_completed_nonbinding = {summary['fetch_probe_completed_nonbinding']}",
              f"precommit_seeds_written_not_frozen = {summary['precommit_seeds_written_not_frozen']}",
              f"precommit_freeze_allowed_next = {summary['precommit_freeze_allowed_next']}",
              f"external_scoring_allowed = {summary['external_scoring_allowed']}",
              f"holdout_approval_allowed = {summary['holdout_approval_allowed']}",
              f"numeric_fit_allowed = {summary['numeric_fit_allowed']}",
              f"evidence_allowed = {summary['evidence_allowed']}",
              f"validation_allowed = {summary['validation_allowed']}",
              f"combined_matrix_allowed = {summary['combined_matrix_allowed']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "External source manifest:",
              *manifest_lines,
              "",
              "Fetch probe:",
              *fetch_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.280 creates the first candidate external primary source manifest and performs nonbinding URL probes when possible. The fetch probe does not validate data. The manifest does not support TAIRID. Every source still requires a frozen precommit card, baseline comparator, failure condition, and later source-specific validation before any scoring or interpretation.",
              "",
              "Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_280_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_279_rows = {summary['inherited_v4_279_rows']}")
          print(f"external_source_manifest_rows = {summary['external_source_manifest_rows']}")
          print(f"fetch_probe_rows = {summary['fetch_probe_rows']}")
          print(f"precommit_card_seed_rows = {summary['precommit_card_seed_rows']}")
          print(f"source_kind_plan_rows = {summary['source_kind_plan_rows']}")
          print(f"source_independence_review_rows = {summary['source_independence_review_rows']}")
          print(f"fetch_probe_interpretation_rows = {summary['fetch_probe_interpretation_rows']}")
          print(f"blocked_operation_rows = {summary['blocked_operation_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"readiness_rows = {summary['readiness_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"route_decision_rows = {summary['route_decision_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"sdr_reduction_rows = {summary['sdr_reduction_rows']}")
          print(f"external_manifest_written = {summary['external_manifest_written']}")
          print(f"fetch_probe_completed_nonbinding = {summary['fetch_probe_completed_nonbinding']}")
          print(f"precommit_seeds_written_not_frozen = {summary['precommit_seeds_written_not_frozen']}")
          print(f"precommit_freeze_allowed_next = {summary['precommit_freeze_allowed_next']}")
          print(f"external_scoring_allowed = {summary['external_scoring_allowed']}")
          print(f"holdout_approval_allowed = {summary['holdout_approval_allowed']}")
          print(f"numeric_fit_allowed = {summary['numeric_fit_allowed']}")
          print(f"evidence_allowed = {summary['evidence_allowed']}")
          print(f"validation_allowed = {summary['validation_allowed']}")
          print(f"combined_matrix_allowed = {summary['combined_matrix_allowed']}")
          print(f"approved_holdout_sources = {summary['approved_holdout_sources']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.280 external primary source manifest builder output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-280-external-primary-source-manifest-builder-output
          path: |
            tairid_v4_280_external_primary_source_manifest_builder_output/
            tairid-v4-280-external-primary-source-manifest-builder-output.zip
