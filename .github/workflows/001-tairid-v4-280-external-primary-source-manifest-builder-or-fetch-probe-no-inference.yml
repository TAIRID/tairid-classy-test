          for idx, url in enumerate(urls_to_probe, start=1):
              probe = probe_url(url)
              fetch_probe_rows.append({
                  "probe_id": f"fetch_probe_{idx:02d}",
                  **probe,
                  "inference_allowed": False,
                  "scoring_allowed": False,
                  "notes": "Fetch status is nonbinding. URL reachability is not data validation.",
