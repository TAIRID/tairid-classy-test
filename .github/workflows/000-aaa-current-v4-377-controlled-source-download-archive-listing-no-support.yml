name: "!!! AAA CURRENT - TAIRID v4.377 controlled source download archive listing no support"

on:
  workflow_dispatch:

jobs:
  run-v4-377-controlled-source-download-archive-listing-no-support:
    name: "!!! AAA CURRENT - Run v4.377 controlled archive listing attempt"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Find v4.376 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.376 output ZIP by pattern..."
          INPUT_376_ZIP="$(ls tairid-v4-376-download-header-staging-review-ingest-no-values-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_376_ZIP" ]; then
            echo "Could not find v4.376 output ZIP."
            echo "Expected:"
            echo "tairid-v4-376-download-header-staging-review-ingest-no-values-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.376 ZIP:"
          echo "$INPUT_376_ZIP"
          echo "INPUT_376_ZIP=$INPUT_376_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.377 controlled archive listing script
        run: |
          cat > run_v4_377_controlled_source_download_archive_listing_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import tarfile
          import shutil
          import tempfile
          import os
          import hashlib
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd
          import requests

          CLAIM_BOUNDARY = "controlled official source download/archive-listing attempt only; archive members may be listed; no archive member contents parsed for covariance values; no covariance values loaded; no exact covariance file approved; no covariance dimensions confirmed; no observed-row order matched; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          MAX_DOWNLOAD_BYTES = 350 * 1024 * 1024

          MEMBER_KEYWORDS = [
              "cov", "covariance", "covmat", "matrix", "mocks",
              "likelihood", "fsigma", "fsigma8", "growth", "consensus",
              "dr12", "boss", "rsd", "redshift", "chain"
          ]

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def classify_member(name):
              lower = name.lower()
              hits = [k for k in MEMBER_KEYWORDS if k in lower]
              likely_covariance = any(k in lower for k in ["cov", "covariance", "covmat"])
              likely_likelihood = "likelihood" in lower or "chain" in lower
              likely_growth = any(k in lower for k in ["fsigma", "fsigma8", "growth", "rsd"])
              return hits, likely_covariance, likely_likelihood, likely_growth

          def download_file(url, dest):
              headers = {"User-Agent": "TAIRID-v4.377-controlled-header-listing-no-values"}
              head_status = ""
              content_length = ""

              try:
                  h = requests.head(url, allow_redirects=True, timeout=30, headers=headers)
                  head_status = str(h.status_code)
                  content_length = h.headers.get("content-length", "")
              except Exception as exc:
                  head_status = f"HEAD_error:{type(exc).__name__}"
                  content_length = ""

              if content_length:
                  try:
                      if int(content_length) > MAX_DOWNLOAD_BYTES:
                          return {
                              "fetched": False,
                              "status": "skipped_content_length_exceeds_controlled_limit",
                              "head_status": head_status,
                              "content_length": content_length,
                              "error": "",
                              "bytes_downloaded": 0,
                              "sha256": "",
                          }
                  except Exception:
                      pass

              try:
                  r = requests.get(url, stream=True, timeout=120, headers=headers)
                  status = str(r.status_code)
                  r.raise_for_status()

                  bytes_downloaded = 0
                  with dest.open("wb") as f:
                      for chunk in r.iter_content(chunk_size=1024 * 1024):
                          if not chunk:
                              continue
                          bytes_downloaded += len(chunk)
                          if bytes_downloaded > MAX_DOWNLOAD_BYTES:
                              return {
                                  "fetched": False,
                                  "status": "aborted_download_exceeds_controlled_limit",
                                  "head_status": head_status,
                                  "content_length": content_length,
                                  "error": "",
                                  "bytes_downloaded": bytes_downloaded,
                                  "sha256": "",
                              }
                          f.write(chunk)

                  return {
                      "fetched": True,
                      "status": f"fetched_http_{status}",
                      "head_status": head_status,
                      "content_length": content_length,
                      "error": "",
                      "bytes_downloaded": bytes_downloaded,
                      "sha256": sha256_file(dest),
                  }
              except Exception as exc:
                  return {
                      "fetched": False,
                      "status": "fetch_failed",
                      "head_status": head_status,
                      "content_length": content_length,
                      "error": f"{type(exc).__name__}: {exc}",
                      "bytes_downloaded": 0,
                      "sha256": "",
                  }

          def list_archive_members(path, source_id, source_label, source_url):
              rows = []
              archive_status = "not_inspected"
              archive_error = ""

              try:
                  if zipfile.is_zipfile(path):
                      with zipfile.ZipFile(path, "r") as z:
                          for info in z.infolist():
                              hits, likely_cov, likely_like, likely_growth = classify_member(info.filename)
                              rows.append({
                                  "v4_377_member_id": f"v4_377_member_{len(rows)+1:05d}",
                                  "source_id": source_id,
                                  "source_label": source_label,
                                  "source_url": source_url,
                                  "archive_format": "zip",
                                  "member_name": info.filename,
                                  "member_size_bytes": info.file_size,
                                  "member_compressed_size_bytes": info.compress_size,
                                  "member_is_dir": info.is_dir(),
                                  "keyword_hits": "|".join(hits),
                                  "candidate_covariance_like_member": bool(likely_cov),
                                  "candidate_likelihood_like_member": bool(likely_like),
                                  "candidate_growth_like_member": bool(likely_growth),
                                  "member_contents_read": False,
                                  "covariance_values_loaded": False,
                                  "support_allowed": False,
                                  "claim_boundary": CLAIM_BOUNDARY,
                              })
                      archive_status = "archive_listing_inspected_zip_no_values"
                  elif tarfile.is_tarfile(path):
                      with tarfile.open(path, "r:*") as t:
                          for info in t.getmembers():
                              hits, likely_cov, likely_like, likely_growth = classify_member(info.name)
                              rows.append({
                                  "v4_377_member_id": f"v4_377_member_{len(rows)+1:05d}",
                                  "source_id": source_id,
                                  "source_label": source_label,
                                  "source_url": source_url,
                                  "archive_format": "tar",
                                  "member_name": info.name,
                                  "member_size_bytes": info.size,
                                  "member_compressed_size_bytes": "",
                                  "member_is_dir": info.isdir(),
                                  "keyword_hits": "|".join(hits),
                                  "candidate_covariance_like_member": bool(likely_cov),
                                  "candidate_likelihood_like_member": bool(likely_like),
                                  "candidate_growth_like_member": bool(likely_growth),
                                  "member_contents_read": False,
                                  "covariance_values_loaded": False,
                                  "support_allowed": False,
                                  "claim_boundary": CLAIM_BOUNDARY,
                              })
                      archive_status = "archive_listing_inspected_tar_no_values"
                  else:
                      archive_status = "fetched_file_not_recognized_as_zip_or_tar"
              except Exception as exc:
                  archive_status = "archive_listing_failed"
                  archive_error = f"{type(exc).__name__}: {exc}"

              return rows, archive_status, archive_error

          def main():
              input_376 = Path(os.environ["INPUT_376_ZIP"])

              outdir = Path("tairid_v4_377_controlled_official_source_download_archive_listing_no_values_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              download_dir = outdir / "downloaded_archives_not_for_value_ingest"
              download_dir.mkdir(parents=True, exist_ok=True)

              base376 = extract_zip(input_376, "tairid_v4_377_376_")

              summary376_path = find_one(base376, "v4_376_summary.json")
              review_ingest_path = find_one(base376, "v4_376_download_header_staging_review_ingest_ledger_NO_DOWNLOAD_NO_VALUES_NO_SUPPORT.csv")
              approved_later_path = find_one(base376, "v4_376_APPROVED_FOR_LATER_controlled_download_header_attempt_NO_VALUES.csv")
              blocked_path = find_one(base376, "v4_376_blocked_sources_for_now.csv")
              attempt_packet_path = find_one(base376, "v4_376_controlled_download_or_archive_listing_attempt_packet_NO_VALUES_NO_SUPPORT.csv")
              route_status_path = find_one(base376, "v4_376_route_status_summary.csv")
              limitations376_path = find_one(base376, "v4_376_limitations_after_download_header_staging_review.csv")
              gap376_path = find_one(base376, "v4_376_gap_status_after_download_header_staging_review.csv")
              staging_plan_path = find_one(base376, "v4_376_input_v4_375_staging_plan_preserved.csv")
              rules376_path = find_one(base376, "v4_376_rule_checks.csv")

              summary376 = json.loads(summary376_path.read_text())
              review_ingest = pd.read_csv(review_ingest_path)
              approved_later = pd.read_csv(approved_later_path)
              blocked = pd.read_csv(blocked_path)
              attempt_packet = pd.read_csv(attempt_packet_path)
              route_status = pd.read_csv(route_status_path)
              limitations376 = pd.read_csv(limitations376_path)
              gap376 = pd.read_csv(gap376_path)
              staging_plan = pd.read_csv(staging_plan_path)
              rules376 = pd.read_csv(rules376_path)

              attempt_rows = []
              member_rows = []

              for _, row in attempt_packet.sort_values("attempt_order").iterrows():
                  source_label = clean(row["source_label"])
                  source_url = clean(row["source_url"])
                  source_id = clean(row["v4_376_staging_review_id"])
                  fmt = clean(row["archive_or_source_format"])
                  attempt_order = int(row["attempt_order"])

                  safe_name = f"attempt_{attempt_order:02d}_{Path(source_url).name or 'source'}"
                  dest = download_dir / safe_name

                  result = download_file(source_url, dest)

                  archive_status = "not_inspected_no_file_fetched"
                  archive_error = ""
                  listing_count = 0

                  if result["fetched"]:
                      rows, archive_status, archive_error = list_archive_members(dest, source_id, source_label, source_url)
                      member_rows.extend(rows)
                      listing_count = len(rows)

                  attempt_rows.append({
                      "v4_377_attempt_id": f"v4_377_controlled_attempt_{len(attempt_rows)+1:03d}",
                      "v4_376_staging_review_id": source_id,
                      "source_label": source_label,
                      "source_url": source_url,
                      "archive_or_source_format": fmt,
                      "attempt_order": attempt_order,
                      "download_attempted": True,
                      "source_file_fetched": bool(result["fetched"]),
                      "http_head_status": result["head_status"],
                      "reported_content_length": result["content_length"],
                      "download_status": result["status"],
                      "download_error": result["error"],
                      "bytes_downloaded": result["bytes_downloaded"],
                      "sha256_if_fetched": result["sha256"],
                      "archive_or_header_listing_inspected": bool(result["fetched"] and listing_count > 0),
                      "archive_listing_status": archive_status,
                      "archive_listing_error": archive_error,
                      "archive_member_rows_listed": int(listing_count),
                      "archive_member_contents_read": False,
                      "exact_covariance_file_staged": False,
                      "full_covariance_available": False,
                      "full_covariance_values_loaded": False,
                      "covariance_dimension_confirmed": False,
                      "observed_row_order_matched": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              download_attempts = pd.DataFrame(attempt_rows)

              member_columns = [
                  "v4_377_member_id", "source_id", "source_label", "source_url", "archive_format",
                  "member_name", "member_size_bytes", "member_compressed_size_bytes", "member_is_dir",
                  "keyword_hits", "candidate_covariance_like_member", "candidate_likelihood_like_member",
                  "candidate_growth_like_member", "member_contents_read", "covariance_values_loaded",
                  "support_allowed", "claim_boundary"
              ]
              archive_members = pd.DataFrame(member_rows, columns=member_columns)

              if len(archive_members):
                  candidate_members = archive_members[
                      archive_members["candidate_covariance_like_member"].astype(bool)
                      | archive_members["candidate_likelihood_like_member"].astype(bool)
                      | archive_members["candidate_growth_like_member"].astype(bool)
                  ].copy()
              else:
                  candidate_members = pd.DataFrame(columns=member_columns)

              human_member_review = candidate_members.copy()
              human_member_review["human_archive_member_review_decision"] = ""
              human_member_review["allowed_human_archive_member_review_decisions"] = "stage_member_header_only|needs_more_archive_search|reject_member|keep_blocked"
              human_member_review["human_archive_member_review_note"] = ""
              human_member_review["member_selected_for_later_header_only_staging"] = False
              human_member_review["member_contents_read"] = False
              human_member_review["covariance_values_loaded"] = False
              human_member_review["support_allowed"] = False

              fetched_count = int(download_attempts["source_file_fetched"].astype(bool).sum())
              inspected_count = int(download_attempts["archive_or_header_listing_inspected"].astype(bool).sum())
              member_count = int(len(archive_members))
              candidate_member_count = int(len(candidate_members))

              controlled_result_summary = pd.DataFrame([
                  {
                      "result_metric": "controlled_attempt_rows",
                      "value": int(len(download_attempts)),
                      "note": "Approved rows from v4.376 attempted under controlled scope.",
                  },
                  {
                      "result_metric": "source_files_fetched",
                      "value": fetched_count,
                      "note": "Fetched source files, if network and size limits allowed.",
                  },
                  {
                      "result_metric": "archive_or_header_listings_inspected",
                      "value": inspected_count,
                      "note": "Archive metadata/listings inspected only, not member contents.",
                  },
                  {
                      "result_metric": "archive_member_rows_listed",
                      "value": member_count,
                      "note": "Archive member metadata rows listed.",
                  },
                  {
                      "result_metric": "candidate_archive_member_rows",
                      "value": candidate_member_count,
                      "note": "Members flagged by covariance/likelihood/growth keywords.",
                  },
                  {
                      "result_metric": "covariance_values_loaded",
                      "value": 0,
                      "note": "No covariance values loaded.",
                  },
                  {
                      "result_metric": "support_allowed",
                      "value": 0,
                      "note": "No support claim is allowed.",
                  },
              ])

              failure_or_manual_needed = download_attempts[
                  ~download_attempts["source_file_fetched"].astype(bool)
              ].copy()

              next_gate = (
                  "human_fill_v4_377_archive_member_review_then_v4_378_archive_member_review_ingest_no_values_no_support_claims"
                  if candidate_member_count > 0
                  else "v4_377b_manual_download_or_source_repair_no_values_no_support_claims"
              )

              limitation_update = pd.DataFrame([
                  {
                      "limit_id": "V4_377_LIMIT_001",
                      "limit": "This step may fetch official archives and inspect archive member listings only.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_377_LIMIT_002",
                      "limit": "Archive member contents are not read in v4.377.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_377_LIMIT_003",
                      "limit": "No covariance values are loaded in v4.377.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_377_LIMIT_004",
                      "limit": "No covariance dimension or observed-row order match is confirmed.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_377_LIMIT_005",
                      "limit": "No likelihood, p-values, score, or support claim is allowed.",
                      "status": "blocked_by_design",
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_377_GAP_001",
                      "gap": "Controlled source download/archive-listing attempt completed.",
                      "status_after_v4_377": "archive_listing_available_no_values" if member_count > 0 else "download_or_listing_unresolved",
                      "next_gate": next_gate,
                  },
                  {
                      "gap_id": "V4_377_GAP_002",
                      "gap": "Exact covariance member/file remains unapproved.",
                      "status_after_v4_377": "candidate_members_available_for_review" if candidate_member_count > 0 else "still_open",
                      "next_gate": next_gate,
                  },
                  {
                      "gap_id": "V4_377_GAP_003",
                      "gap": "Covariance values remain unloaded.",
                      "status_after_v4_377": "still_blocked",
                      "next_gate": "later_after_member_header_review",
                  },
                  {
                      "gap_id": "V4_377_GAP_004",
                      "gap": "Covariance dimensions and observed-row order remain unconfirmed.",
                      "status_after_v4_377": "still_blocked",
                      "next_gate": "later_shape_and_order_gate",
                  },
                  {
                      "gap_id": "V4_377_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_377": "still_blocked",
                      "next_gate": "no_support_claims_allowed_from_v4_377",
                  },
              ])

              hard_checks = {
                  "input_v4_376_summary_found": summary376.get("version") == "v4.376",
                  "input_v4_376_rules_all_passed": summary_rules_all_passed(summary376),
                  "input_v4_376_failed_gates_none": summary376.get("failed_gates") == "none",
                  "input_v4_376_approved_rows_2": summary376.get("approved_for_later_controlled_attempt_rows") == 2,
                  "input_v4_376_controlled_packet_rows_2": summary376.get("controlled_attempt_packet_rows") == 2,
                  "input_v4_376_no_download_attempted": summary376.get("download_attempted") is False,
                  "input_v4_376_no_source_file_fetched": summary376.get("source_file_fetched") is False,
                  "input_v4_376_no_archive_listing": summary376.get("archive_or_header_listing_inspected") is False,
                  "input_v4_376_no_exact_file_staged": summary376.get("exact_covariance_file_staged") is False,
                  "input_v4_376_no_full_covariance": summary376.get("full_covariance_available") is False,
                  "input_v4_376_no_values_loaded": summary376.get("full_covariance_values_loaded") is False,
                  "input_v4_376_no_dimension_confirmed": summary376.get("covariance_dimension_confirmed") is False,
                  "input_v4_376_no_row_order": summary376.get("observed_row_order_matched") is False,
                  "input_v4_376_no_likelihood": summary376.get("likelihood_computed") is False,
                  "input_v4_376_no_p_values": summary376.get("p_values_computed") is False,
                  "input_v4_376_no_score_valid": summary376.get("score_valid") is False,
                  "input_v4_376_no_support_allowed": summary376.get("support_allowed") is False,

                  "rules376_all_passed": passed_column_all(rules376),
                  "review_ingest_rows_equal_7": len(review_ingest) == 7,
                  "approved_later_rows_equal_2": len(approved_later) == 2,
                  "blocked_rows_equal_5": len(blocked) == 5,
                  "attempt_packet_rows_equal_2": len(attempt_packet) == 2,
                  "route_status_rows_equal_4": len(route_status) == 4,
                  "limitations376_rows_equal_5": len(limitations376) == 5,
                  "gap376_rows_equal_5": len(gap376) == 5,
                  "staging_plan_rows_equal_7": len(staging_plan) == 7,

                  "download_attempt_rows_equal_packet": len(download_attempts) == len(attempt_packet),
                  "download_attempted_all_rows": true_col(download_attempts, "download_attempted"),
                  "archive_members_dataframe_exists": len(archive_members) >= 0,
                  "candidate_members_dataframe_exists": len(candidate_members) >= 0,
                  "human_member_review_rows_equal_candidate_members": len(human_member_review) == len(candidate_members),
                  "controlled_result_summary_rows_equal_7": len(controlled_result_summary) == 7,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_member_contents_read": false_col(archive_members, "member_contents_read") if len(archive_members) else True,
                  "no_exact_covariance_file_staged": false_col(download_attempts, "exact_covariance_file_staged"),
                  "no_full_covariance_available": false_col(download_attempts, "full_covariance_available"),
                  "no_covariance_values_loaded": false_col(download_attempts, "full_covariance_values_loaded") and (false_col(archive_members, "covariance_values_loaded") if len(archive_members) else True),
                  "no_covariance_dimension_confirmed": false_col(download_attempts, "covariance_dimension_confirmed"),
                  "no_observed_row_order_matched": false_col(download_attempts, "observed_row_order_matched"),
                  "no_likelihood_computed": false_col(download_attempts, "likelihood_computed"),
                  "no_p_values_computed": false_col(download_attempts, "p_values_computed"),
                  "no_score_valid": false_col(download_attempts, "score_valid"),
                  "no_support_allowed": false_col(download_attempts, "support_allowed") and (false_col(archive_members, "support_allowed") if len(archive_members) else True) and false_col(human_member_review, "support_allowed") if len(human_member_review) else true_col(pd.DataFrame([{"ok": True}]).rename(columns={"ok": "support_allowed"}), "support_allowed") == False,
              }

              hard_checks["no_support_allowed"] = (
                  false_col(download_attempts, "support_allowed")
                  and (false_col(archive_members, "support_allowed") if len(archive_members) else True)
                  and (false_col(human_member_review, "support_allowed") if len(human_member_review) else True)
              )

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary377 = {
                  "version": "v4.377",
                  "route_name": "v4_377_controlled_official_source_download_or_archive_listing_attempt_no_values_no_support_claims",
