name: 000 TAIRID v4.134 eBOSS Covariance Locator Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-134-eboss-covariance-locator-probe.yml"

jobs:
  tairid-v4-134-eboss-covariance-locator-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.134 eBOSS covariance locator probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_134_eboss_covariance_locator_probe

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_134_eboss_covariance_locator_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_134_eboss_covariance_locator_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck reference samples.",
              "This does not recompute eBOSS pressure.",
              "This is a covariance locator/status probe for the eBOSS LRG, ELG, and QSO family only.",
              "A pass means covariance/likelihood/source-locator status is recorded and the next route is declared, not that covariance has been fully ingested."
          ]

          UPSTREAM_LOCKS = {
              "v4_133_eBOSS_leave_one_out_sensitivity_audit": {
                  "readiness_label": "eBOSS_leave_one_out_sensitivity_audit_passed_two_driver_split_classified_ready_for_eBOSS_covariance_locator_probe",
                  "component_lane_count": 7,
                  "family_pressure_replayed": True,
                  "family_pressure_z": -1.4177985723696922,
                  "without_LRG_pressure_z": -1.7182622613006164,
                  "without_ELG_pressure_z": 1.044032094397258,
                  "without_QSO_pressure_z": -0.0,
                  "single_LRG_pressure_z": 0.0,
                  "single_ELG_pressure_z": -0.9592443784990414,
                  "single_QSO_pressure_z": 1.4255789774431635,
                  "LRG_damper_confirmed": True,
                  "ELG_negative_direction_confirmed": True,
                  "QSO_positive_counter_confirmed": True,
                  "two_driver_split_classified": True,
                  "covariance_limit_preserved": True,
                  "reference_fallback_preserved": True,
                  "final_pressure_ready": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_132_3_eBOSS_family_review_probe_two_driver_split": {
                  "readiness_label": "eBOSS_family_review_probe_two_driver_split_passed_ELG_negative_QSO_positive_without_QSO_neutral_covariance_and_reference_still_limited_ready_for_eBOSS_leave_one_out_sensitivity_audit",
                  "eBOSS_two_driver_split_confirmed": True,
                  "same_program_covariance_still_limited": True,
                  "reference_fallback_still_active": True,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          COVARIANCE_LOCATOR_TARGETS = [
              {
                  "locator_id": "sdss_dr16_eboss_root",
                  "component_scope": "eBOSS_family",
                  "url": "https://data.sdss.org/sas/dr16/eboss/",
                  "expected_terms": "eboss dr16 covariance likelihood clustering",
                  "target_objects": "top-level eBOSS SAS area; look for lss, clustering, likelihood, covariance paths",
                  "manual_followup": "Open SAS tree and search for likelihood, cov, covariance, consensus, BAO, RSD, LSS products."
              },
              {
                  "locator_id": "sdss_dr16_lss_catalogs",
                  "component_scope": "eBOSS_family",
                  "url": "https://data.sdss.org/sas/dr16/eboss/lss/catalogs/DR16/",
                  "expected_terms": "LRG ELG QSO random clustering catalogs",
                  "target_objects": "LSS catalog folder; not automatically a covariance lock",
                  "manual_followup": "Check whether covariance, mocks, or likelihood files are linked nearby."
              },
              {
                  "locator_id": "sdss_dr16_lss_public_doc",
                  "component_scope": "eBOSS_family",
                  "url": "https://www.sdss4.org/dr16/spectro/lss/",
                  "expected_terms": "eBOSS DR16 LSS catalogs LRG QSO ELG SAS",
                  "target_objects": "documentation page pointing to LRG/QSO/ELG catalogs",
                  "manual_followup": "Use official docs to navigate to data release product paths."
              },
              {
                  "locator_id": "eboss_lrg_arxiv_2007_08991",
                  "component_scope": "eBOSS_LRG",
                  "url": "https://arxiv.org/abs/2007.08991",
                  "expected_terms": "eBOSS DR16 LRG fsigma8 covariance consensus",
                  "target_objects": "LRG paper locator; value table and covariance references",
                  "manual_followup": "Check paper tables and linked ancillary files for covariance/likelihood products."
              },
              {
                  "locator_id": "eboss_elg_search_locator",
                  "component_scope": "eBOSS_ELG",
                  "url": "https://arxiv.org/search/?query=eBOSS+ELG+fsigma8+0.85&searchtype=all",
                  "expected_terms": "eBOSS ELG fsigma8 0.85 covariance",
                  "target_objects": "ELG paper search locator; needs manual table confirmation",
                  "manual_followup": "Open the best matching ELG DR16 clustering/RSD paper and check table/covariance support."
              },
              {
                  "locator_id": "eboss_qso_search_locator",
                  "component_scope": "eBOSS_QSO",
                  "url": "https://arxiv.org/search/?query=eBOSS+QSO+fsigma8+1.48&searchtype=all",
                  "expected_terms": "eBOSS QSO fsigma8 1.48 covariance",
                  "target_objects": "QSO paper search locator; needs manual table confirmation",
                  "manual_followup": "Open the best matching QSO DR16 clustering/RSD paper and check table/covariance support."
              },
              {
                  "locator_id": "eboss_consensus_search_locator",
                  "component_scope": "eBOSS_family",
                  "url": "https://arxiv.org/search/?query=eBOSS+DR16+consensus+cosmological+parameters+covariance&searchtype=all",
                  "expected_terms": "eBOSS DR16 consensus cosmological parameters covariance",
                  "target_objects": "consensus cosmology paper/search locator",
                  "manual_followup": "Look for consensus covariance matrix, likelihood package, or combined BAO/RSD product."
              },
              {
                  "locator_id": "eboss_multi_tracer_search_locator",
                  "component_scope": "eBOSS_LRG_ELG",
                  "url": "https://arxiv.org/search/?query=eBOSS+DR16+LRG+ELG+multi+tracer+fsigma8+covariance&searchtype=all",
                  "expected_terms": "eBOSS DR16 LRG ELG multi tracer covariance fsigma8",
                  "target_objects": "LRG/ELG overlap or multi-tracer path",
                  "manual_followup": "Check whether a multi-tracer result should replace separate LRG and ELG diagonal treatment."
              }
          ]

          REVIEW_CLASSIFICATION_RULES = [
              {
                  "rule_id": "fetch_success_is_not_covariance_lock",
                  "classification": "locator_only",
                  "meaning": "A fetched page or paper locator helps manual review but does not lock covariance."
              },
              {
                  "rule_id": "covariance_hint_needs_file_or_table",
                  "classification": "needs_manual_extraction",
                  "meaning": "A covariance word on a page is only a hint unless it points to a usable matrix, likelihood package, or table."
              },
              {
                  "rule_id": "same_program_covariance_not_independent",
                  "classification": "overlap_guard",
                  "meaning": "LRG, ELG, and QSO remain same-program family members unless a cross-tracer covariance or overlap model is identified."
              },
              {
                  "rule_id": "no_pressure_recompute_here",
                  "classification": "claim_boundary",
                  "meaning": "This locator probe cannot rerun eBOSS pressure or claim a final result."
              }
          ]

          COVARIANCE_STATUS_OUTCOMES = [
              {
                  "status_id": "covariance_file_or_likelihood_found",
                  "meaning": "A specific usable covariance/likelihood path is found.",
                  "allowed_next": "Design ingestion or manual extraction before rerunning eBOSS component lanes."
              },
              {
                  "status_id": "covariance_hint_only",
                  "meaning": "A paper or page mentions covariance/likelihood but no direct usable matrix is ingested.",
                  "allowed_next": "Manual locator/extraction step; keep eBOSS sensitivity-only."
              },
              {
                  "status_id": "value_source_locator_only",
                  "meaning": "A value/source paper is located but covariance remains unresolved.",
                  "allowed_next": "Use only as source-lock support, not as covariance completion."
              },
              {
                  "status_id": "manual_needed",
                  "meaning": "Automatic fetch or page parsing is incomplete.",
                  "allowed_next": "Record manual target and do not strengthen claim."
              }
          ]

          NEXT_WORK_REQUIREMENTS = [
              {
                  "requirement_id": "manual_covariance_path_review",
                  "priority": 1,
                  "requirement": "Manually inspect the highest-value SDSS SAS and paper locator results for covariance, likelihood, consensus, and mock products.",
                  "reason": "GitHub fetch can record locator status but cannot reliably inspect all directory trees or linked files."
              },
              {
                  "requirement_id": "eBOSS_reference_upgrade_design",
                  "priority": 2,
                  "requirement": "Design CAMB/chain/stored reference support for z=0.698, z=0.85, and z=1.48.",
                  "reason": "The eBOSS component pattern remains limited by interpolation reference fallback."
              },
              {
                  "requirement_id": "eBOSS_component_rerun_after_upgrade",
                  "priority": 3,
                  "requirement": "Rerun eBOSS component lanes only after covariance or reference support improves.",
                  "reason": "The current two-driver split is not final."
              }
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The eBOSS covariance locator probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "A covariance locator is the same as covariance ingestion.",
              "A fetched SDSS or arXiv page is a final covariance lock.",
              "The eBOSS two-driver split is a final result.",
              "The eBOSS two-driver split proves or disproves TAIRID.",
              "Same-program eBOSS points are independent by default.",
              "No reference upgrade is needed."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_135_CAMB_or_chain_expanded_reference_upgrade_design",
                  "purpose": "Design stronger reference support for eBOSS and expanded growth redshifts, replacing interpolation fallback where possible.",
                  "why_next": "v4.134 keeps covariance as locator/manual status; reference fallback is still the cleanest next controllable limitation."
              },
              {
                  "priority": 2,
                  "route_id": "v4_136_eBOSS_covariance_manual_extraction_checklist",
                  "purpose": "Create a human-readable checklist for extracting eBOSS covariance/likelihood support from SDSS/arXiv products.",
                  "why_next": "Automatic locator status is not enough for covariance ingestion."
              },
              {
                  "priority": 3,
                  "route_id": "v4_137_eBOSS_component_rerun_after_reference_or_covariance_upgrade",
                  "purpose": "Rerun eBOSS component lanes after either reference or covariance support improves.",
                  "why_next": "The two-driver split should be tested after at least one major limitation is improved."
              },
              {
                  "priority": 4,
                  "route_id": "v4_138_external_standard_cosmology_comparison_plan",
                  "purpose": "Design comparison language against normal ΛCDM growth pipelines and literature constraints.",
                  "why_next": "Any persistent local pressure must be contextualized before public-facing claims."
              }
          ]

          failed_gates = []
          warnings = [
              "locator_probe_only",
              "covariance_not_ingested",
              "same_program_covariance_still_limited_until_manual_review",
              "reference_interpolation_fallback_still_active",
              "no_pressure_recompute",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def fetch_text(url, max_bytes=350000):
              record = {
                  "url": url,
                  "ok": False,
                  "status": "",
                  "content_type": "",
                  "bytes_read": 0,
                  "error": ""
              }
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.134-eBOSS-covariance-locator/1.0",
                          "Accept": "text/html,text/plain,*/*"
                      }
                  )
                  with urllib.request.urlopen(req, timeout=120) as response:
                      record["status"] = getattr(response, "status", "")
                      record["content_type"] = response.headers.get("Content-Type", "")
                      raw = response.read(max_bytes)
                      record["bytes_read"] = len(raw)
                      text = raw.decode("utf-8", errors="replace")
                      record["ok"] = True
                      return record, text
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
                  return record, ""

          def normalize(text):
              return re.sub(r"\s+", " ", text.lower())

          def term_score(text, terms):
              words = [word.lower() for word in re.findall(r"[a-zA-Z0-9_.]+", terms)]
              if not words:
                  return 0
              return sum(1 for word in words if word in text)

          fetch_records = []
          locator_status_records = []

          for target in COVARIANCE_LOCATOR_TARGETS:
              fetch_record, text = fetch_text(target["url"])
              lower = normalize(text)
              score = term_score(lower, target["expected_terms"])
              covariance_hint = any(term in lower for term in ["covariance", "covmat", "cov", "likelihood", "mock", "consensus"])
              likelihood_hint = "likelihood" in lower
              mock_hint = "mock" in lower or "mocks" in lower
              matrix_hint = any(term in lower for term in [".fits", ".dat", ".txt", ".csv", "matrix", "covariance matrix"])

              if fetch_record["ok"] and covariance_hint and matrix_hint:
                  locator_status = "covariance_or_likelihood_hint_with_possible_file_reference"
                  covariance_status = "covariance_hint_only_manual_extraction_required"
              elif fetch_record["ok"] and covariance_hint:
                  locator_status = "covariance_or_likelihood_text_hint"
                  covariance_status = "covariance_hint_only_manual_extraction_required"
              elif fetch_record["ok"]:
                  locator_status = "locator_page_fetched_no_covariance_lock"
                  covariance_status = "covariance_not_locked"
              else:
                  locator_status = "fetch_failed_manual_needed"
                  covariance_status = "manual_needed"

              fetch_record["locator_id"] = target["locator_id"]
              fetch_record["component_scope"] = target["component_scope"]
              fetch_record["expected_term_score"] = score
              fetch_records.append(fetch_record)

              locator_status_records.append({
                  "locator_id": target["locator_id"],
                  "component_scope": target["component_scope"],
                  "url": target["url"],
                  "fetch_ok": fetch_record["ok"],
                  "expected_term_score": score,
                  "covariance_hint_present": covariance_hint,
                  "likelihood_hint_present": likelihood_hint,
                  "mock_hint_present": mock_hint,
                  "matrix_or_file_hint_present": matrix_hint,
                  "locator_status": locator_status,
                  "covariance_status": covariance_status,
                  "target_objects": target["target_objects"],
                  "manual_followup": target["manual_followup"],
                  "claim_boundary": "locator_status_only_not_covariance_ingestion"
              })

          fetched_count = sum(1 for row in fetch_records if row["ok"] is True)
          status_record_count = len(locator_status_records)
          covariance_hint_count = sum(1 for row in locator_status_records if row["covariance_hint_present"] is True)
          likelihood_hint_count = sum(1 for row in locator_status_records if row["likelihood_hint_present"] is True)
          matrix_or_file_hint_count = sum(1 for row in locator_status_records if row["matrix_or_file_hint_present"] is True)
          manual_needed_count = sum(1 for row in locator_status_records if row["covariance_status"] == "manual_needed")
          covariance_ingested = False
          usable_covariance_locked = False
          all_targets_have_status = status_record_count == len(COVARIANCE_LOCATOR_TARGETS)
          locator_probe_succeeded = all_targets_have_status and len(COVARIANCE_LOCATOR_TARGETS) >= 8

          if UPSTREAM_LOCKS["v4_133_eBOSS_leave_one_out_sensitivity_audit"]["two_driver_split_classified"] is not True:
              failed_gates.append("upstream_two_driver_split_not_carried")

          if UPSTREAM_LOCKS["v4_133_eBOSS_leave_one_out_sensitivity_audit"]["covariance_limit_preserved"] is not True:
              failed_gates.append("upstream_covariance_limit_not_carried")

          if not all_targets_have_status:
              failed_gates.append("not_all_locator_targets_have_status")

          if len(COVARIANCE_LOCATOR_TARGETS) < 8:
              failed_gates.append("covariance_locator_target_count_too_small")

          if fetched_count < 1:
              failed_gates.append("no_locator_pages_fetched")

          if covariance_ingested:
              failed_gates.append("covariance_ingestion_unexpectedly_claimed")

          if usable_covariance_locked:
              failed_gates.append("usable_covariance_unexpectedly_locked")

          if len(NEXT_WORK_REQUIREMENTS) < 3:
              failed_gates.append("next_work_requirements_incomplete")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "final rsd pressure score",
              "validates tairid cosmology",
              "covariance locator is the same as covariance ingestion",
              "fetched sdss or arxiv page is a final covariance lock",
              "same-program eboss points are independent by default",
              "no reference upgrade is needed",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "eBOSS_covariance_locator_probe_passed_locator_status_recorded_covariance_not_ingested_ready_for_reference_upgrade_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_two_driver_split_carried",
                  "pass": UPSTREAM_LOCKS["v4_133_eBOSS_leave_one_out_sensitivity_audit"]["two_driver_split_classified"] is True,
                  "result": "v4.133 two-driver split carried",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "locator_targets_declared",
                  "pass": len(COVARIANCE_LOCATOR_TARGETS) >= 8,
                  "result": f"locator_target_count={len(COVARIANCE_LOCATOR_TARGETS)}",
                  "boundary": "Locator probe only."
              },
              {
                  "rule_id": "locator_status_records_complete",
                  "pass": all_targets_have_status,
                  "result": f"status_record_count={status_record_count}",
                  "boundary": "Status records are not covariance ingestion."
              },
              {
                  "rule_id": "fetch_attempts_recorded",
                  "pass": len(fetch_records) == len(COVARIANCE_LOCATOR_TARGETS) and fetched_count >= 1,
                  "result": f"fetch_records={len(fetch_records)}; fetched_count={fetched_count}; manual_needed_count={manual_needed_count}",
                  "boundary": "Fetch failures become manual-needed records."
              },
              {
                  "rule_id": "covariance_hints_recorded_without_lock_claim",
                  "pass": covariance_ingested is False and usable_covariance_locked is False,
                  "result": f"covariance_hint_count={covariance_hint_count}; likelihood_hint_count={likelihood_hint_count}; matrix_or_file_hint_count={matrix_or_file_hint_count}",
                  "boundary": "Hints are not locks."
              },
              {
                  "rule_id": "same_program_covariance_limit_preserved",
                  "pass": UPSTREAM_LOCKS["v4_133_eBOSS_leave_one_out_sensitivity_audit"]["covariance_limit_preserved"] is True,
                  "result": "same-program covariance remains limited until manual extraction or ingestion",
                  "boundary": "Blocks interpretation."
              },
              {
                  "rule_id": "next_work_requirements_declared",
                  "pass": len(NEXT_WORK_REQUIREMENTS) >= 3,
                  "result": f"next_work_requirement_count={len(NEXT_WORK_REQUIREMENTS)}",
                  "boundary": "No pressure recompute."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": True,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_134_rules_passed")

          if failed_gates:
              readiness_label = "eBOSS_covariance_locator_probe_failed"
              next_allowed_step = "Repair eBOSS covariance locator probe before reference upgrade design."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.135 CAMB or chain expanded reference upgrade design. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "upstream_two_driver_split_classified": True,
              "locator_target_count": len(COVARIANCE_LOCATOR_TARGETS),
              "fetch_record_count": len(fetch_records),
              "fetched_count": fetched_count,
              "status_record_count": status_record_count,
              "all_targets_have_status": all_targets_have_status,
              "covariance_hint_count": covariance_hint_count,
              "likelihood_hint_count": likelihood_hint_count,
              "matrix_or_file_hint_count": matrix_or_file_hint_count,
              "manual_needed_count": manual_needed_count,
              "covariance_ingested": covariance_ingested,
              "usable_covariance_locked": usable_covariance_locked,
              "same_program_covariance_still_limited": True,
              "reference_fallback_still_active": True,
              "pressure_recomputed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "covariance_locator_targets": COVARIANCE_LOCATOR_TARGETS,
              "fetch_records": fetch_records,
              "locator_status_records": locator_status_records,
              "review_classification_rules": REVIEW_CLASSIFICATION_RULES,
              "covariance_status_outcomes": COVARIANCE_STATUS_OUTCOMES,
              "next_work_requirements": NEXT_WORK_REQUIREMENTS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "locator_probe_succeeded": locator_probe_succeeded,
                  "covariance_ingested": False,
                  "usable_covariance_locked": False,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_134_eboss_covariance_locator_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "fetch_records_v4_134.csv",
              fetch_records,
              ["locator_id", "component_scope", "url", "ok", "status", "content_type", "bytes_read", "error", "expected_term_score"]
          )

          write_csv(
              OUTDIR / "locator_status_records_v4_134.csv",
              locator_status_records,
              ["locator_id", "component_scope", "url", "fetch_ok", "expected_term_score", "covariance_hint_present", "likelihood_hint_present", "mock_hint_present", "matrix_or_file_hint_present", "locator_status", "covariance_status", "target_objects", "manual_followup", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "review_classification_rules_v4_134.csv",
              REVIEW_CLASSIFICATION_RULES,
              ["rule_id", "classification", "meaning"]
          )

          write_csv(
              OUTDIR / "covariance_status_outcomes_v4_134.csv",
              COVARIANCE_STATUS_OUTCOMES,
              ["status_id", "meaning", "allowed_next"]
          )

          write_csv(
              OUTDIR / "next_work_requirements_v4_134.csv",
              NEXT_WORK_REQUIREMENTS,
              ["requirement_id", "priority", "requirement", "reason"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_134.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_134.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_134.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.134 — eBOSS Covariance Locator Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.134 attempts eBOSS covariance and likelihood locator routes without pretending that a fetched page is a full covariance ingestion. The two-driver split from v4.133 is carried forward, but the eBOSS family remains same-program covariance-limited.")
          md.append("")
          md.append("The next clean target is reference support, because that limitation is controlled by our own pipeline design. Covariance extraction may still require manual review of SDSS/arXiv products.")
          md.append("")
          md.append("## Locator status")
          md.append("")
          md.append("| Locator | Scope | Fetch | Covariance status |")
          md.append("|---|---|---|---|")
          for row in locator_status_records:
              md.append(f"| `{row['locator_id']}` | `{row['component_scope']}` | `{row['fetch_ok']}` | `{row['covariance_status']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_134_eboss_covariance_locator_probe.json",
              "tairid_v4_134_eboss_covariance_locator_probe.md",
              "fetch_records_v4_134.csv",
              "locator_status_records_v4_134.csv",
              "review_classification_rules_v4_134.csv",
              "covariance_status_outcomes_v4_134.csv",
              "next_work_requirements_v4_134.csv",
              "blocked_claims_v4_134.csv",
              "next_route_options_v4_134.csv",
              "rule_results_v4_134.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_134_eboss_covariance_locator_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.134 eBOSS covariance locator probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-134-eboss-covariance-locator-probe
          path: artifacts/tairid_v4_134_eboss_covariance_locator_probe/
