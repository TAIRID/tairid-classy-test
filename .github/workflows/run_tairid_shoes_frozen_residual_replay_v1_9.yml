name: Run TAIRID SH0ES Frozen Residual Replay v1.9

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-shoes-frozen-residual-replay-v1-9:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_shoes_frozen_residual_replay_v1_9.py
          echo "v1.9 SH0ES frozen residual replay found."

      - name: Run TAIRID SH0ES Frozen Residual Replay v1.9
        run: |
          python run_tairid_shoes_frozen_residual_replay_v1_9.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-shoes-frozen-residual-replay-v1-9-output
          path: |
            tairid_shoes_frozen_residual_replay_v1_9_outputs/**
