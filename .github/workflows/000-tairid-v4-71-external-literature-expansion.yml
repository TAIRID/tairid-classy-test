name: 000 TAIRID v4.71 External Literature Expansion

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-71-external-literature-expansion.yml"

jobs:
  tairid-v4-71-external-literature-expansion:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.71 external literature expansion
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_71_external_literature_expansion

          python - <<'PY'
          import csv
          import json
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_71_external_literature_expansion")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_71_external_literature_expansion"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This expands external literature/source candidates after v4.70 found no candidate ready for covariance acceptance.",
              "A pass means the external candidate field is expanded and bounded, not that any paper/source is accepted as Planck RSD reference uncertainty."
          ]

          UPSTREAM_LOCKS = {
              "v4_68": {
                  "camb_available": False,
                  "classy_available": False,
                  "boltzmann_solver_available": False,
                  "solver_run": False,
                  "reference_uncertainty_computed": False
              },
              "v4_69": {
                  "source_candidate_count": 5,
                  "reachable_source_count": 5,
                  "official_reachable_source_count": 4,
                  "candidate_accepted_as_reference_uncertainty_now_count": 0,
                  "reference_uncertainty_computed": False
              },
              "v4_70": {
                  "readiness_label": "reference_candidate_review_passed_ready_for_external_literature_expansion_or_solver_install_branch",
                  "source_candidate_count": 5,
                  "candidate_review_record_count": 5,
                  "accepted_reference_uncertainty_now_count": 0,
                  "manual_review_still_required_count": 5,
                  "reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_allowed_now": False
              }
          }

          CORE_SOURCE_ANCHORS = [
              {
                  "source_id": "planck_2018_cosmological_parameters_arxiv",
                  "source_type": "primary_planck_publication",
                  "url": "https://arxiv.org/abs/1807.06209",
                  "role": "Primary Planck 2018 cosmological-parameters anchor.",
                  "candidate_use": "Planck model/provenance anchor only",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "planck_2018_cosmological_parameters_aanda",
                  "source_type": "primary_planck_publication",
                  "url": "https://www.aanda.org/articles/aa/full_html/2020/09/aa33910-18/aa33910-18.html",
                  "role": "Published Planck 2018 cosmological-parameters paper page.",
                  "candidate_use": "Planck model/provenance anchor only",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "planck_pr3_irsa_cosmoparams_index",
                  "source_type": "official_data_index",
                  "url": "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/",
                  "role": "Official Planck PR3 cosmological-parameters product index.",
                  "candidate_use": "Product discovery/provenance anchor only",
                  "accept_as_reference_uncertainty_now": False
              }
          ]

          EXPANDED_LITERATURE_CANDIDATES = [
              {
                  "source_id": "nunes_vagnozzi_2021_s8_rsd_arbitration",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/2106.01208",
                  "role": "RSD and S8 discrepancy discussion including Planck comparison.",
                  "candidate_use": "Context/source-expansion candidate; not a covariance packet.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "reyes_escamilla_2022_fsigma8_gp",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/2203.03574",
                  "role": "fσ8 reconstruction and Planck 2018 comparison candidate.",
                  "candidate_use": "Context/source-expansion candidate; not accepted as covariance.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "kazantzidis_perivolaropoulos_2018_fsigma8_tension",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/1803.01337",
                  "role": "Extended fσ8 RSD compilation and Planck15 comparison.",
                  "candidate_use": "Historical RSD compilation/context candidate; not Planck 2018 covariance.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "li_du_zhou_zhang_xu_2019_h0_fsigma8_gp",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/1911.12076",
                  "role": "H0 prior effects on fσ8 tension using Gaussian-process approach and Planck 2018 prior discussion.",
                  "candidate_use": "Method/context candidate; not accepted as Planck covariance.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "benisty_2020_s8_rsd_dataset",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/2005.03751",
                  "role": "S8 tension with RSD dataset and Planck 2018 comparison.",
                  "candidate_use": "Context/source-expansion candidate; not accepted as Planck covariance.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "yu_2022_boss_power_spectrum_rsd",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/2211.16794",
                  "role": "BOSS RSD measurements and Planck 2018 ΛCDM comparison.",
                  "candidate_use": "RSD measurement context candidate; not Planck posterior covariance.",
                  "accept_as_reference_uncertainty_now": False
              },
              {
                  "source_id": "murakami_2023_non_linearity_free_fsigma8_prediction",
                  "source_type": "external_literature",
                  "url": "https://arxiv.org/abs/2305.12812",
                  "role": "fσ8 prediction/method literature candidate.",
                  "candidate_use": "Method candidate; not accepted as Planck covariance.",
                  "accept_as_reference_uncertainty_now": False
              }
          ]

          ALL_SOURCE_CANDIDATES = CORE_SOURCE_ANCHORS + EXPANDED_LITERATURE_CANDIDATES

          REFERENCE_ACCEPTANCE_REQUIREMENTS = [
              {
                  "requirement_id": "same_target_redshifts_or_reproducible_interpolation",
                  "required": True,
                  "definition": "Must provide or allow reproducible derivation at z = 0.15, 0.38, 0.51, 0.61, 2.33."
              },
              {
                  "requirement_id": "posterior_samples_or_covariance",
                  "required": True,
                  "definition": "Must provide posterior samples, a covariance matrix, or a reproducible weighted sample route."
              },
              {
                  "requirement_id": "Planck_model_identity",
                  "required": True,
                  "definition": "Must identify the Planck likelihood/model/root assumptions."
              },
              {
                  "requirement_id": "weights_or_covariance_preserved",
                  "required": True,
                  "definition": "If samples are used, weights must be preserved; if covariance is used, covariance construction must be stated."
              },
              {
                  "requirement_id": "machine_readable_or_reproducible",
                  "required": True,
                  "definition": "Must be machine-readable or reproducible enough for a future GitHub audit."
              },
              {
                  "requirement_id": "not_context_only",
                  "required": True,
                  "definition": "Context papers, abstracts, source pages, and summary tables cannot be accepted as covariance by themselves."
              }
          ]

          REVIEW_CLASSIFICATION_POLICY = [
              {
                  "classification": "planck_provenance_anchor",
                  "accept_as_reference_uncertainty_now": False,
                  "reason": "Useful for provenance and model identity, but not enough as redshift covariance."
              },
              {
                  "classification": "external_context_literature",
                  "accept_as_reference_uncertainty_now": False,
                  "reason": "Useful for context or method routing, but not automatically a Planck posterior covariance packet."
              },
              {
                  "classification": "possible_future_data_source",
                  "accept_as_reference_uncertainty_now": False,
                  "reason": "Requires deeper inspection before acceptance."
              }
          ]

          BLOCKED_CLAIMS = [
              "An external paper was accepted as Planck RSD covariance.",
              "External reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "A final RSD pressure score was computed.",
              "TAIRID cosmology is validated.",
              "Full Planck chains were imported.",
              "Full chain sample files were parsed.",
              "CAMB or CLASS was installed.",
              "A solver was run.",
              "Minimum sidecars were treated as posterior covariance.",
              "Parameter tables were treated as posterior covariance.",
              "A context paper was treated as covariance.",
              "An arXiv abstract was treated as covariance.",
              "A source page was treated as covariance.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "route_id": "v4_72_external_candidate_deep_review",
                  "status": "recommended_next_lightweight",
                  "purpose": "Deep-review expanded candidates for machine-readable data, covariance, or posterior samples.",
                  "why": "v4.71 expands candidates but accepts none as covariance."
              },
              {
                  "route_id": "v4_72_solver_install_or_container_branch",
                  "status": "valid_heavier_branch",
                  "purpose": "Attempt CAMB/CLASS install or pinned container route, then validate against Planck sidecar fixtures.",
                  "why": "A solver remains the clean internal route if external covariance is not found."
              },
              {
                  "route_id": "v4_72_cross_family_combination_policy",
                  "status": "valid_parallel_blocker",
                  "purpose": "Define independence/duplication rules before final BOSS/eBOSS/WiggleZ/Planck combination.",
                  "why": "Even with reference uncertainty, final RSD pressure still needs combination policy."
              }
          ]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          def source_probe(source):
              record = {
                  "source_id": source["source_id"],
                  "source_type": source["source_type"],
                  "url": source["url"],
                  "ok": False,
                  "method_used": "",
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "bytes_sampled": 0,
                  "contains_planck_text": False,
                  "contains_fsigma8_text": False,
                  "contains_rsd_text": False,
                  "contains_covariance_text": False,
                  "contains_posterior_text": False,
                  "contains_chain_text": False,
                  "accept_as_reference_uncertainty_now": source["accept_as_reference_uncertainty_now"],
                  "error": ""
              }

              headers = {
                  "User-Agent": "TAIRID-v4.71-external-literature-expansion/1.0",
                  "Accept": "*/*"
              }

              try:
                  req = urllib.request.Request(source["url"], method="HEAD", headers=headers)
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["method_used"] = "HEAD"
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

              except Exception as head_exc:
                  try:
                      req = urllib.request.Request(source["url"], headers=headers)
                      with urllib.request.urlopen(req, timeout=90) as response:
                          record["ok"] = True
                          record["method_used"] = "GET_PREFIX"
                          record["status"] = getattr(response, "status", None)
                          record["content_type"] = response.headers.get("Content-Type")
                          content_length = response.headers.get("Content-Length")
                          record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

                          data = response.read(250000)
                          text = data.decode("utf-8", errors="replace").lower()
                          record["bytes_sampled"] = len(data)
                          record["contains_planck_text"] = "planck" in text
                          record["contains_fsigma8_text"] = "fsigma8" in text or "fσ8" in text or "f sigma" in text
                          record["contains_rsd_text"] = "rsd" in text or "redshift space distortion" in text
                          record["contains_covariance_text"] = "covariance" in text
                          record["contains_posterior_text"] = "posterior" in text
                          record["contains_chain_text"] = "chain" in text or "mcmc" in text

                  except Exception as get_exc:
                      record["error"] = f"HEAD failed: {type(head_exc).__name__}: {head_exc}; GET failed: {type(get_exc).__name__}: {get_exc}"

              return record

          failed_gates = []
          warnings = [
              "external_literature_expansion_only",
              "source_reachability_not_source_acceptance",
              "no_external_reference_accepted_as_uncertainty",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          source_records = [source_probe(source) for source in ALL_SOURCE_CANDIDATES]

          expansion_review_records = []
          for source in ALL_SOURCE_CANDIDATES:
              probe = next(row for row in source_records if row["source_id"] == source["source_id"])

              if source["source_type"].startswith("primary_planck") or source["source_type"] == "official_data_index":
                  classification = "planck_provenance_anchor"
              else:
                  classification = "external_context_literature"

              expansion_review_records.append({
                  "source_id": source["source_id"],
                  "source_type": source["source_type"],
                  "classification": classification,
                  "role": source["role"],
                  "candidate_use": source["candidate_use"],
                  "reachable": probe["ok"],
                  "contains_planck_text": probe["contains_planck_text"],
                  "contains_fsigma8_text": probe["contains_fsigma8_text"],
                  "contains_rsd_text": probe["contains_rsd_text"],
                  "contains_covariance_text": probe["contains_covariance_text"],
                  "contains_posterior_text": probe["contains_posterior_text"],
                  "accept_as_reference_uncertainty_now": False,
                  "manual_deep_review_required": True,
                  "reference_uncertainty_imported": False
              })

          reachable_count = sum(1 for row in source_records if row["ok"])
          expanded_literature_count = len(EXPANDED_LITERATURE_CANDIDATES)
          expanded_literature_reachable_count = sum(
              1 for row in expansion_review_records
              if row["source_type"] == "external_literature" and row["reachable"]
          )
          fsigma8_text_hit_count = sum(1 for row in source_records if row["contains_fsigma8_text"])
          rsd_text_hit_count = sum(1 for row in source_records if row["contains_rsd_text"])
          covariance_text_hit_count = sum(1 for row in source_records if row["contains_covariance_text"])
          posterior_text_hit_count = sum(1 for row in source_records if row["contains_posterior_text"])
          accepted_now_count = sum(1 for row in expansion_review_records if row["accept_as_reference_uncertainty_now"])

          if UPSTREAM_LOCKS["v4_70"]["readiness_label"] != "reference_candidate_review_passed_ready_for_external_literature_expansion_or_solver_install_branch":
              failed_gates.append("v4_70_readiness_not_carried")

          if UPSTREAM_LOCKS["v4_70"]["accepted_reference_uncertainty_now_count"] != 0:
              failed_gates.append("v4_70_acceptance_boundary_not_carried")

          if len(CORE_SOURCE_ANCHORS) < 3:
              failed_gates.append("core_source_anchors_incomplete")

          if expanded_literature_count < 5:
              failed_gates.append("expanded_literature_candidate_count_too_low")

          if reachable_count == 0:
              failed_gates.append("no_source_candidates_reachable")

          if accepted_now_count != 0:
              failed_gates.append("candidate_accepted_as_uncertainty_too_early")

          if len(REFERENCE_ACCEPTANCE_REQUIREMENTS) < 6:
              failed_gates.append("reference_acceptance_requirements_incomplete")

          if len(TARGET_REDSHIFTS) != 5:
              failed_gates.append("target_redshift_count_not_5")

          if [row["z"] for row in TARGET_REDSHIFTS] != [0.15, 0.38, 0.51, 0.61, 2.33]:
              failed_gates.append("target_redshift_order_changed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "external paper was accepted",
              "external reference uncertainty is included",
              "reference uncertainty is computed",
              "final rsd pressure",
              "validated",
              "full planck chains were imported",
              "solver was run",
              "context paper was treated as covariance",
              "arxiv abstract was treated as covariance",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = (
              "external_literature_expansion_passed_no_candidate_accepted_ready_for_deep_candidate_review_or_solver_branch"
          )

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "upstream_v4_70_boundary_carried",
                  "pass": UPSTREAM_LOCKS["v4_70"]["accepted_reference_uncertainty_now_count"] == 0,
                  "result": "v4.70 accepted no source as uncertainty",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "core_planck_anchors_preserved",
                  "pass": len(CORE_SOURCE_ANCHORS) >= 3,
                  "result": f"{len(CORE_SOURCE_ANCHORS)} core Planck anchors preserved",
                  "boundary": "Provenance only."
              },
              {
                  "rule_id": "expanded_literature_candidates_declared",
                  "pass": expanded_literature_count >= 5,
                  "result": f"{expanded_literature_count} expanded literature candidates declared",
                  "boundary": "Candidate expansion only."
              },
              {
                  "rule_id": "source_reachability_checked",
                  "pass": reachable_count > 0,
                  "result": f"{reachable_count} total sources reachable",
                  "boundary": "Reachability is not covariance."
              },
              {
                  "rule_id": "no_candidate_accepted_too_early",
                  "pass": accepted_now_count == 0,
                  "result": "0 candidates accepted as reference uncertainty now",
                  "boundary": "Deep review still required."
              },
              {
                  "rule_id": "reference_acceptance_requirements_declared",
                  "pass": len(REFERENCE_ACCEPTANCE_REQUIREMENTS) >= 6,
                  "result": f"{len(REFERENCE_ACCEPTANCE_REQUIREMENTS)} acceptance requirements declared",
                  "boundary": "No uncertainty imported."
              },
              {
                  "rule_id": "target_redshifts_locked",
                  "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33],
                  "result": "target redshift order locked",
                  "boundary": "Candidate expansion only."
              },
              {
                  "rule_id": "next_route_options_declared",
                  "pass": len(NEXT_ROUTE_OPTIONS) >= 3,
                  "result": f"{len(NEXT_ROUTE_OPTIONS)} next route options declared",
                  "boundary": "No route computes uncertainty now."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final pressure claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute uncertainty."
              },
              {
                  "rule_id": "no_reference_uncertainty_or_final_pressure",
                  "pass": True,
                  "result": "no_reference_uncertainty_no_final_RSD_pressure",
                  "boundary": "Literature expansion only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_71_rules_passed")

          if failed_gates:
              readiness_label = "external_literature_expansion_failed"
              next_allowed_step = "Repair external literature expansion before deep candidate review or solver branch."
          else:
              readiness_label = "external_literature_expansion_passed_ready_for_deep_candidate_review_or_solver_install_branch"
              next_allowed_step = (
                  "Proceed to v4.72 external candidate deep review, v4.72 solver install/container branch, or v4.72 cross-family combination policy. "
                  "Do not compute reference uncertainty or final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "core_source_anchor_count": len(CORE_SOURCE_ANCHORS),
              "expanded_literature_candidate_count": expanded_literature_count,
              "total_source_candidate_count": len(ALL_SOURCE_CANDIDATES),
              "reachable_source_count": reachable_count,
              "expanded_literature_reachable_count": expanded_literature_reachable_count,
              "fsigma8_text_hit_count": fsigma8_text_hit_count,
              "rsd_text_hit_count": rsd_text_hit_count,
              "covariance_text_hit_count": covariance_text_hit_count,
              "posterior_text_hit_count": posterior_text_hit_count,
              "accepted_reference_uncertainty_now_count": accepted_now_count,
              "reference_acceptance_requirement_count": len(REFERENCE_ACCEPTANCE_REQUIREMENTS),
              "target_redshift_count": len(TARGET_REDSHIFTS),
              "next_route_option_count": len(NEXT_ROUTE_OPTIONS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "route_decision": route_decision,
              "fullGrid_downloaded": False,
              "full_chains_imported": False,
              "full_chain_sample_files_parsed": False,
              "solver_installed": False,
              "solver_run": False,
              "external_reference_imported": False,
              "reference_uncertainty_computed": False,
              "final_RSD_pressure_score_allowed_now": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "core_source_anchors": CORE_SOURCE_ANCHORS,
              "expanded_literature_candidates": EXPANDED_LITERATURE_CANDIDATES,
              "all_source_candidates": ALL_SOURCE_CANDIDATES,
              "source_reachability_records": source_records,
              "expansion_review_records": expansion_review_records,
              "reference_acceptance_requirements": REFERENCE_ACCEPTANCE_REQUIREMENTS,
              "review_classification_policy": REVIEW_CLASSIFICATION_POLICY,
              "target_redshifts": TARGET_REDSHIFTS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "blocked_claims": BLOCKED_CLAIMS,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "fullGrid_downloaded": False,
                  "full_chains_imported": False,
                  "full_chain_sample_files_parsed": False,
                  "solver_installed": False,
                  "solver_run": False,
                  "external_reference_imported": False,
                  "reference_uncertainty_computed": False,
                  "final_RSD_pressure_computed": False,
                  "validation_claim_allowed": False
              }
          }

          json_path = OUTDIR / "tairid_v4_71_external_literature_expansion.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "all_source_candidates_v4_71.csv",
