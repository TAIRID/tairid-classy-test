              },
          ]

          route_decision_rows = [
              {"route_id": "route_001", "route": "zhao_chi_square_diagnostic_scalar_guard_no_evidence", "permission_status": "recommended", "reason": "A diagnostic scalar can close the distance-to-reference gap if kept non-evidence."},
              {"route_id": "route_002", "route": "source_comparison_residual_guard", "permission_status": "future_needed", "reason": "QSO-only residual direction cannot decide source-surface pattern."},
              {"route_id": "route_003", "route": "external_observed_residual_scoring", "permission_status": "blocked", "reason": "No scoring guard has passed."},
              {"route_id": "route_004", "route": "numeric_correction_fit", "permission_status": "blocked", "reason": "No fitting guard has passed."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.271 is enough for consolidation."},
          ]

          next_rows = [
              {"priority": 1, "test_id": "v4_272_zhao_chi_square_diagnostic_scalar_guard_no_evidence", "purpose": "compute diagnostic distance-to-reference scalar without evidence/scoring/fitting", "activated": True},
              {"priority": 2, "test_id": "v4_272_source_comparison_residual_guard", "purpose": "future source-surface comparison across QSO/LRG/ELG lanes", "activated": False},
