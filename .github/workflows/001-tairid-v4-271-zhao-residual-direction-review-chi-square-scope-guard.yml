              {"priority": 4, "test_id": "v4_272_handoff_if_needed", "purpose": "consolidate through residual-direction milestone", "activated": True},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before direction review"},
              {"gate": "inherited_v4_270_rows_equal_9", "passed": len(inherited_v4_270_rows) == 9, "detail": f"inherited_v4_270_rows = {len(inherited_v4_270_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "reference_model_manifest_status_rows_at_least_1", "passed": len(reference_model_manifest_status_rows) >= 1, "detail": f"reference_model_manifest_status_rows = {len(reference_model_manifest_status_rows)}"},
              {"gate": "residual_review_rows_equal_4", "passed": len(residual_review_rows) == 4, "detail": f"residual_review_rows = {len(residual_review_rows)}"},
              {"gate": "direction_classification_rows_equal_3", "passed": len(direction_classification_rows) == 3, "detail": f"direction_classification_rows = {len(direction_classification_rows)}"},
