name: 001 TAIRID v4.271 - Zhao Residual Direction Review Chi Square Scope Guard

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-271-zhao-residual-direction-review-chi-square-scope-guard.yml"
      - "data/cosmology/zhao_reference_model_manifest.csv"
      - "zhao_reference_model_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  zhao-residual-direction-review-chi-square-scope-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.271 Zhao Residual Direction Review Chi Square Scope Guard is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.271 Zhao residual direction review chi-square scope guard
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import math
          import zipfile

          VERSION = "v4.271"
          ROUTE = "zhao_residual_direction_review_and_chi_square_scope_guard_after_v4_270"
          EXPECTED_RESULT = "v4_271_zhao_residual_direction_review_chi_square_scope_guard_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_272_zhao_chi_square_diagnostic_scalar_guard_no_evidence"

          OUT = Path("tairid_v4_271_zhao_residual_direction_review_chi_square_scope_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-271-zhao-residual-direction-review-chi-square-scope-guard-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REFERENCE_MODEL_MANIFEST_CANDIDATES = [
              Path("data/cosmology/zhao_reference_model_manifest.csv"),
              Path("zhao_reference_model_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          REQUIRED_REFERENCE_COLUMNS = [
              "reference_id",
              "observed_id",
              "model_family",
              "model_label",
              "redshift",
              "quantity",
              "predicted_value",
              "prediction_source_or_method",
              "parameter_status",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def read_manifest_status(paths, required_columns, row_label):
              status_rows = []
              input_rows = []
              found = [path for path in paths if path.exists()]
              if not found:
                  status_rows.append({
                      "manifest_path": "",
                      "manifest_status": "missing",
                      f"{row_label}_rows": 0,
                      "detail": "No manifest found.",
                  })
                  return status_rows, input_rows

              for path in found:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in required_columns if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          f"{row_label}_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          input_rows.extend(rows)
                  except Exception as exc:
                      status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          f"{row_label}_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })
              return status_rows, input_rows

          def sign_label(x):
              if x > 0:
                  return "+"
              if x < 0:
                  return "-"
              return "0"

          inherited_v4_270_rows = [
              {
                  "inherited_from": "v4.270",
                  "item": "rules",
                  "value": "50 / 50 passed",
                  "meaning": "Zhao Residual Preview Guard No Scoring passed.",
                  "carry_forward_status": "ready_for_direction_review",
              },
              {
                  "inherited_from": "v4.270",
                  "item": "raw_residual_direction_signature",
                  "value": "---+",
                  "meaning": "Observed-minus-reference residuals were negative in the first three bins and positive in the fourth.",
                  "carry_forward_status": "direction_ready",
              },
              {
                  "inherited_from": "v4.270",
                  "item": "normalized_residual_direction_signature",
                  "value": "---+",
                  "meaning": "Diagonal normalization preserved the same sign pattern.",
                  "carry_forward_status": "direction_ready",
              },
              {
                  "inherited_from": "v4.270",
                  "item": "covariance_weighted_direction_signature",
                  "value": "-+-+",
                  "meaning": "Inverse-covariance projection changed component signs but was not chi-square.",
                  "carry_forward_status": "projection_ready",
              },
              {
                  "inherited_from": "v4.270",
                  "item": "residual_preview_computed",
                  "value": True,
                  "meaning": "Residual preview exists.",
                  "carry_forward_status": "preview_ready",
              },
              {
                  "inherited_from": "v4.270",
                  "item": "chi_square_computed",
                  "value": False,
                  "meaning": "Chi-square stayed blocked.",
                  "carry_forward_status": "chi_square_blocked",
              },
              {
                  "inherited_from": "v4.270",
                  "item": "chi_square_scalar_written",
                  "value": False,
                  "meaning": "No quadratic scalar was written.",
                  "carry_forward_status": "chi_square_blocked",
              },
              {
                  "inherited_from": "v4.270",
                  "item": "scoring_allowed",
                  "value": False,
                  "meaning": "Scoring stayed blocked.",
                  "carry_forward_status": "scoring_blocked",
              },
              {
                  "inherited_from": "v4.270",
                  "item": "selected_next_route",
                  "value": "v4_271_zhao_residual_direction_review_and_chi_square_scope_guard",
                  "meaning": "Current route reviews residual direction and chi-square scope.",
                  "carry_forward_status": "current_route",
              },
          ]

          observed_manifest_status_rows, observed_manifest_input_rows = read_manifest_status(
              OBSERVED_MANIFEST_CANDIDATES, REQUIRED_OBSERVED_COLUMNS, "observed"
          )
          reference_model_manifest_status_rows, reference_model_manifest_input_rows = read_manifest_status(
              REFERENCE_MODEL_MANIFEST_CANDIDATES, REQUIRED_REFERENCE_COLUMNS, "reference"
          )

          residual_rows = [
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_0_978", "redshift": 0.978, "observed_value": 0.379, "reference_value": 0.433944158, "sigma": 0.176},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_23", "redshift": 1.230, "observed_value": 0.385, "reference_value": 0.404912522, "sigma": 0.099},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_526", "redshift": 1.526, "observed_value": 0.342, "reference_value": 0.371533172, "sigma": 0.070},
              {"observed_id": "zhao_dr14_tomographic_fsigma8_z_1_944", "redshift": 1.944, "observed_value": 0.364, "reference_value": 0.329409330, "sigma": 0.106},
          ]

          # Inverse-covariance projection carried from v4.270, but not a chi-square scalar.
          covariance_weighted_projection_values = [-3.822229666, 1.018057008, -8.933802038, 3.083492978]

          residual_review_rows = []
          residual_vector = []
          normalized_vector = []
          for i, row in enumerate(residual_rows):
              residual = float(row["observed_value"]) - float(row["reference_value"])
              normalized = residual / float(row["sigma"])
              residual_vector.append(residual)
              normalized_vector.append(normalized)
              residual_review_rows.append({
                  "review_id": f"review_{i+1:02d}",
                  "observed_id": row["observed_id"],
                  "redshift": row["redshift"],
                  "residual_observed_minus_reference": residual,
                  "normalized_residual_diagonal_only": normalized,
                  "raw_direction": sign_label(residual),
                  "normalized_direction": sign_label(normalized),
                  "absolute_normalized_residual": abs(normalized),
                  "interpretation_scope": "per_bin_direction_review_only",
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          raw_signature = "".join(sign_label(x) for x in residual_vector)
          normalized_signature = "".join(sign_label(x) for x in normalized_vector)
          weighted_signature = "".join(sign_label(x) for x in covariance_weighted_projection_values)

          direction_classification_rows = [
              {
                  "classification_id": "class_001",
                  "object": "raw_residual_direction",
                  "signature": raw_signature,
                  "classification": "mixed_negative_dominant",
                  "supporting_count": "3 negative / 1 positive",
                  "plain_meaning": "Zhao sits below the fixed LCDM-style reference in three bins and above it in one bin.",
                  "allowed_claim": "direction preview only",
                  "blocked_claim": "simple all-positive QSO pressure",
              },
              {
                  "classification_id": "class_002",
                  "object": "diagonal_normalized_direction",
                  "signature": normalized_signature,
                  "classification": "mixed_negative_dominant",
                  "supporting_count": "3 negative / 1 positive",
                  "plain_meaning": "Dividing by quoted sigma does not change the direction pattern.",
                  "allowed_claim": "direction preview only",
                  "blocked_claim": "full covariance result",
              },
              {
                  "classification_id": "class_003",
                  "object": "covariance_weighted_projection_direction",
                  "signature": weighted_signature,
                  "classification": "mixed_alternating_projection",
                  "supporting_count": "2 negative / 2 positive",
                  "plain_meaning": "Inverse covariance changes the component-level projection signs.",
                  "allowed_claim": "projection preview only",
                  "blocked_claim": "chi-square or likelihood score",
              },
          ]

          qso_pressure_review_rows = [
              {
                  "review_id": "qso_pressure_001",
                  "hypothesis_phrase": "uniform positive QSO growth pressure",
                  "preview_result": "not_supported_by_raw_direction",
                  "basis": raw_signature,
                  "meaning": "The first residual preview does not show all-positive QSO pressure against this fixed LCDM-style reference.",
                  "claim_status": "weakens_simple_reading_not_final_failure",
              },
              {
                  "review_id": "qso_pressure_002",
                  "hypothesis_phrase": "mixed QSO residual surface",
                  "preview_result": "supported_as_preview",
                  "basis": raw_signature + " raw and " + weighted_signature + " weighted",
                  "meaning": "The current QSO lane should be treated as a mixed surface, not a single-sign lane.",
                  "claim_status": "preview_only",
              },
              {
                  "review_id": "qso_pressure_003",
                  "hypothesis_phrase": "source-comparison needed",
                  "preview_result": "yes",
                  "basis": "QSO alone cannot decide LRG/ELG/QSO contrast",
                  "meaning": "A later source-comparison residual lane is needed before broader cosmology interpretation.",
                  "claim_status": "future_needed",
              },
          ]

          chi_square_scope_rows = [
              {
                  "scope_id": "chi_scope_001",
                  "object": "quadratic_scalar",
                  "formula": "q = r^T C_inverse r",
                  "allowed_next": "diagnostic scalar only after explicit guard",
                  "blocked_now": "yes",
                  "reason": "v4.271 reviews scope but does not compute the scalar.",
              },
              {
                  "scope_id": "chi_scope_002",
                  "object": "evidence_language",
                  "formula": "none",
                  "allowed_next": "no",
                  "blocked_now": "yes",
                  "reason": "A chi-square-style diagnostic scalar is not proof or validation.",
              },
              {
                  "scope_id": "chi_scope_003",
                  "object": "model_fit",
                  "formula": "none",
                  "allowed_next": "no",
                  "blocked_now": "yes",
                  "reason": "No parameter fitting or correction tuning is allowed.",
              },
              {
                  "scope_id": "chi_scope_004",
                  "object": "source_surface_scope",
                  "formula": "QSO-only",
                  "allowed_next": "QSO-only diagnostic distance",
                  "blocked_now": "combined LRG/ELG/QSO matrix",
                  "reason": "Source surfaces remain separated.",
              },
              {
                  "scope_id": "chi_scope_005",
                  "object": "next_guard_permission",
                  "formula": "diagnostic-only q calculation",
                  "allowed_next": "yes, if labeled no evidence/no validation/no fitting",
                  "blocked_now": "external observed scoring",
                  "reason": "The next guard may compute the scalar only as a diagnostic distance-to-reference packet.",
              },
          ]

          sdr_trajectory_rows = [
              {
                  "trajectory_id": "sdr_001",
                  "stage": "before_v4_259",
                  "state": "Zhao candidate source known but values/covariance not staged",
                  "sdr_reduction_handle": "missing object became named object",
              },
              {
                  "trajectory_id": "sdr_002",
                  "stage": "v4_259_to_v4_260",
                  "state": "values and covariance support extracted/reconstructed",
                  "sdr_reduction_handle": "raw uncertainty converted into table-labeled numeric rows",
              },
              {
                  "trajectory_id": "sdr_003",
                  "stage": "v4_261_to_v4_268",
                  "state": "candidate observed rows and LCDM reference rows staged/validated",
                  "sdr_reduction_handle": "comparison objects aligned without scoring",
              },
              {
                  "trajectory_id": "sdr_004",
                  "stage": "v4_269_to_v4_270",
                  "state": "inverse covariance validated and residual preview computed",
                  "sdr_reduction_handle": "blocked residual question became a measured direction preview",
              },
              {
                  "trajectory_id": "sdr_005",
                  "stage": "v4_271",
                  "state": "direction interpreted as mixed-negative dominant, with chi-square still scoped",
                  "sdr_reduction_handle": "possible claim narrowed into allowed/blocked next paths",
              },
          ]

          failure_condition_review_rows = [
              {
                  "failure_condition_id": "failure_001",
                  "target": "QSO f_sigma8 primary pressure",
                  "v4_270_input": raw_signature,
                  "review_result": "simple_positive_pressure_weakened",
                  "meaning": "The preview does not support a clean all-positive QSO residual reading.",
                  "next_needed": "diagnostic scalar and source-comparison review",
              },
              {
                  "failure_condition_id": "failure_002",
                  "target": "QSO versus LRG growth contrast",
                  "v4_270_input": "QSO only",
                  "review_result": "cannot_evaluate",
                  "meaning": "Needs matched LRG/ELG residual lanes.",
                  "next_needed": "future source comparison guard",
              },
              {
                  "failure_condition_id": "failure_003",
                  "target": "QSO radial secondary support",
                  "v4_270_input": "f_sigma8 only",
                  "review_result": "cannot_evaluate",
                  "meaning": "RSD growth preview is not the radial geometry test.",
                  "next_needed": "future radial/geometry lane",
              },
              {
                  "failure_condition_id": "failure_004",
                  "target": "geometry compressed lane non-primary",
                  "v4_270_input": raw_signature,
                  "review_result": "open",
                  "meaning": "Direction preview alone cannot decide geometry interpretation.",
                  "next_needed": "source-surface comparison",
              },
              {
                  "failure_condition_id": "failure_005",
                  "target": "external likelihood robustness",
                  "v4_270_input": "no likelihood",
                  "review_result": "cannot_evaluate",
                  "meaning": "No likelihood/scoring test has run.",
                  "next_needed": "separate scoring guard if ever allowed",
              },
          ]

          next_guard_requirement_rows = [
              {
                  "requirement_id": "next_001",
                  "next_guard": "chi_square_diagnostic_scalar_guard_no_evidence",
                  "needed_object": "residual vector + validated inverse covariance",
                  "allowed_scope": "diagnostic distance-to-reference only",
                  "blocked_scope": "proof, validation, evidence, fitting",
                  "status": "allowed_next_with_hard_scope",
              },
              {
                  "requirement_id": "next_002",
                  "next_guard": "source_comparison_residual_guard",
                  "needed_object": "matched residual lanes for LRG/ELG/QSO",
                  "allowed_scope": "later source-surface comparison",
                  "blocked_scope": "combined matrix without guards",
                  "status": "future_needed",
              },
              {
                  "requirement_id": "next_003",
                  "next_guard": "holdout_provenance_review",
                  "needed_object": "independent source status",
                  "allowed_scope": "provenance review",
                  "blocked_scope": "calling Zhao full holdout now",
                  "status": "blocked",
              },
              {
                  "requirement_id": "next_004",
                  "next_guard": "handoff_or_milestone_review",
                  "needed_object": "v4.203-v4.271 checkpoint",
                  "allowed_scope": "history consolidation",
                  "blocked_scope": "claim inflation",
                  "status": "allowed",
              },
          ]

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "compute_chi_square_now", "reason": "this workflow reviews scope only", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "call_future_chi_square_evidence", "reason": "diagnostic scalar would not be evidence", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "fit_numeric_correction_now", "reason": "no fitting is allowed", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "claim_primary_qso_evidence_now", "reason": "direction review weakens simple positive QSO reading and is not evidence", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "claim_full_holdout_now", "reason": "Zhao remains same-survey-family cross-release candidate", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "claim_validation_now", "reason": "no external likelihood fit, no scoring gate, and no independent holdout approval", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "residual_direction_review", "permission_status": "completed_no_scoring", "reason": "Direction signatures reviewed as preview-only."},
              {"permission_scope": "chi_square_diagnostic_scalar_guard", "permission_status": "allowed_next_with_hard_scope", "reason": "A later scalar may be computed only as diagnostic distance-to-reference, not evidence."},
              {"permission_scope": "source_comparison_residual_guard", "permission_status": "future_needed", "reason": "QSO-only direction cannot decide source-surface contrast."},
              {"permission_scope": "chi_square_evidence_or_validation", "permission_status": "blocked", "reason": "No evidence or validation language is allowed."},
              {"permission_scope": "live_external_observed_manifest_fill", "permission_status": "blocked", "reason": "Live observed manifest fill is still not approved."},
              {"permission_scope": "external_observed_residual_scoring", "permission_status": "blocked", "reason": "No scoring guard exists."},
              {"permission_scope": "primary_qso_growth_evidence", "permission_status": "blocked", "reason": "Direction review is not evidence."},
              {"permission_scope": "full_independent_holdout_language", "permission_status": "blocked", "reason": "Zhao provenance remains same-family/cross-release."},
              {"permission_scope": "numeric_correction_fit", "permission_status": "blocked", "reason": "No fitting is allowed in this review."},
              {"permission_scope": "combined_lrg_elg_qso_matrix", "permission_status": "blocked", "reason": "Combined matrix remains blocked by source-surface guards."},
              {"permission_scope": "cosmology_validation_claim", "permission_status": "blocked", "reason": "No external likelihood fit or holdout scoring has run."},
          ]

          readiness_rows = [
              {"readiness_id": "readiness_001", "requirement": "residual_direction_review", "status": "completed_no_scoring", "blocks": "nothing"},
              {"readiness_id": "readiness_002", "requirement": "chi_square_diagnostic_scope", "status": "ready_next_with_hard_scope", "blocks": "diagnostic scalar"},
              {"readiness_id": "readiness_003", "requirement": "source_comparison_residual_lane", "status": "future_needed", "blocks": "source contrast"},
              {"readiness_id": "readiness_004", "requirement": "evidence_language", "status": "blocked", "blocks": "public claim"},
              {"readiness_id": "readiness_005", "requirement": "holdout_provenance", "status": "blocked", "blocks": "holdout label"},
              {"readiness_id": "readiness_006", "requirement": "numeric_correction_fit", "status": "blocked", "blocks": "model comparison"},
              {"readiness_id": "readiness_007", "requirement": "combined_matrix_permission", "status": "blocked", "blocks": "combined matrix"},
          ]

          decision_rows = [
              {
                  "decision_id": "decision_001",
                  "decision": "Residual direction review completed as preview-only.",
