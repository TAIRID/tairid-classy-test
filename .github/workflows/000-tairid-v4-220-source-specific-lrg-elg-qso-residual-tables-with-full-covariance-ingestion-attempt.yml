        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-220-source-specific-residual-covariance-attempt-output
          path: |
            tairid_v4_220_source_specific_residual_covariance_attempt_output/
            tairid-v4-220-source-specific-residual-covariance-attempt-output.zip
