name: TAIRID Cosmology v4.4.3 KiDS README Guided Parser Fallback

on:
  workflow_dispatch:

jobs:
  kids-readme-guided-parser-fallback:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.4.3 KiDS README guided parser fallback
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_4_3_kids_readme_guided_parser_fallback

          python - <<'PY'
          import csv
          import json
          import math
          import re
          import shutil
          import tarfile
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path
          from tempfile import TemporaryDirectory

          OUTDIR = Path("artifacts/tairid_cosmology_v4_4_3_kids_readme_guided_parser_fallback")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_4_3_kids_readme_guided_parser_fallback"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine KiDS, DES, and HSC into one posterior.",
              "This does not automatically replace the prior KiDS cosmic-shear row.",
              "This repairs the KiDS parser using the official README column order as a fallback for the fiducial 3x2pt file.",
              "A pass means KiDS direct-chain axes were recovered from the product, not that TAIRID is validated."
          ]

          KIDS_CHAIN_URL = "https://kids.strw.leidenuniv.nl/DR4/data_files/KiDS1000_3x2pt_fiducial_chains.tar.gz"
          KIDS_README_URL = "https://kids.strw.leidenuniv.nl/DR4/data_files/KiDS1000_3x2pt_fiducial_chains_readme.txt"

          ARCHIVE_PATH = OUTDIR / "KiDS1000_3x2pt_fiducial_chains.tar.gz"
          README_PATH = OUTDIR / "KiDS1000_3x2pt_fiducial_chains_readme.txt"

          FIDUCIAL_3X2PT_FILENAME = "samples_multinest_blindC_EE_nE_w.txt"

          PLANCK_AXIS_REFERENCE = {
              "S8": {"q50": 0.824821, "sigma_68": 0.012218},
              "sigma8": {"q50": 0.810123, "sigma_68": 0.006639},
              "Omega_m": {"q50": 0.310797, "sigma_68": 0.006153}
          }

          KIDS_CARRIED_3X2PT_S8_Q50 = 0.764565
          KIDS_PUBLISHED_COSMIC_SHEAR_S8_Q50 = 0.759

          EXPECTED_ROLES = {
              "samples_multinest_blindC_EE.txt": "cosmic_shear_bandpower",
              "samples_multinest_blindC_w.txt": "boss_dr12_galaxy_clustering",
              "samples_multinest_blindC_EE_nE.txt": "cosmic_shear_plus_ggl",
              "samples_multinest_blindC_EE_w.txt": "cosmic_shear_plus_galaxy_clustering",
              "samples_multinest_blindC_EE_nE_w.txt": "fiducial_3x2pt_cosmic_shear_ggl_galaxy_clustering"
          }

          # Official KiDS README order for the fiducial 3x2pt file:
          # 1-20 sampled/nuisance parameters,
          # 21-38 derived parameters,
          # 39-42 prior, like, post, weight.
          README_GUIDED_FIDUCIAL_HEADER = [
              "cosmological_parameters_omch2",
              "cosmological_parameters_ombh2",
              "cosmological_parameters_h0",
              "cosmological_parameters_n_s",
              "cosmological_parameters_s_8_input",
              "halo_model_parameters_a",
              "intrinsic_alignment_parameters_a",
              "nofz_shifts_p_1",
              "nofz_shifts_p_2",
              "nofz_shifts_p_3",
              "nofz_shifts_p_4",
              "nofz_shifts_p_5",
              "bias_parameters_b1_bin_1",
              "bias_parameters_b2_bin_1",
              "bias_parameters_gamma3_bin_1",
              "bias_parameters_a_vir_bin_1",
              "bias_parameters_b1_bin_2",
              "bias_parameters_b2_bin_2",
              "bias_parameters_gamma3_bin_2",
              "bias_parameters_a_vir_bin_2",
              "cosmological_parameters_s_8",
              "cosmological_parameters_sigma_8",
              "cosmological_parameters_sigma_12",
              "cosmological_parameters_a_s",
              "cosmological_parameters_omega_m",
              "cosmological_parameters_omega_nu",
              "cosmological_parameters_omega_lambda",
              "cosmological_parameters_cosmomc_theta",
              "nofz_shifts_bias_1",
              "nofz_shifts_bias_2",
              "nofz_shifts_bias_3",
              "nofz_shifts_bias_4",
              "nofz_shifts_bias_5",
              "delta_z_out_bin_1",
              "delta_z_out_bin_2",
              "delta_z_out_bin_3",
              "delta_z_out_bin_4",
              "delta_z_out_bin_5",
              "prior",
              "like",
              "post",
              "weight"
          ]

          S8_EXACT = {
              "s8",
              "s_8",
              "cosmological_parameters_s8",
              "cosmological_parameters_s_8"
          }

          SIGMA8_EXACT = {
              "sigma8",
              "sigma_8",
              "cosmological_parameters_sigma8",
              "cosmological_parameters_sigma_8"
          }

          OMEGAM_EXACT = {
              "omegam",
              "omega_m",
              "cosmological_parameters_omega_m"
          }

          WEIGHT_EXACT = {
              "weight",
              "multinest_weight"
          }

          SOURCE_LEDGER = [
              {
                  "source_id": "kids1000_3x2pt_fiducial_chains_tarball",
                  "family": "KiDS",
                  "source_url": KIDS_CHAIN_URL,
                  "used_for": "Direct KiDS 3x2pt fiducial chain README-guided parser fallback."
              },
              {
                  "source_id": "kids1000_3x2pt_fiducial_chains_readme",
                  "family": "KiDS",
                  "source_url": KIDS_README_URL,
                  "used_for": "Official README fallback column order for the fiducial 3x2pt file."
              },
              {
                  "source_id": "v4_2_planck_axis_reference",
                  "family": "Planck",
                  "source_url": "local_prior_artifact_values",
                  "used_for": "Planck chain-derived S8, sigma8, and Omega_m medians and widths carried forward for diagnostic comparison."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def finite(x):
              try:
                  return math.isfinite(float(x))
              except Exception:
                  return False

          def normalize_name(name):
              token = str(name).strip()
              token = token.lstrip("#").strip()
              token = token.replace("--", "_")
              token = token.replace("__", "_")
              token = token.replace("-", "_")
              token = token.replace("/", "_")
              token = token.replace("\\", "_")
              token = token.replace(".", "_")
              token = token.lower()
              token = re.sub(r"[^a-z0-9_]+", "_", token)
              token = re.sub(r"_+", "_", token).strip("_")
              return token

          def download_url(url, path, timeout=240):
              request = urllib.request.Request(
                  url,
                  headers={"User-Agent": "Mozilla/5.0 TAIRID-v4.4.3-KiDS-parser"}
              )
              with urllib.request.urlopen(request, timeout=timeout) as response:
                  with path.open("wb") as f:
                      shutil.copyfileobj(response, f)
                  return {
                      "ok": True,
                      "http_status": getattr(response, "status", 200),
                      "content_type": response.headers.get("Content-Type", ""),
                      "bytes": path.stat().st_size,
                      "error": ""
                  }

          def try_download_url(url, path):
              try:
                  return download_url(url, path)
              except Exception as exc:
                  return {
                      "ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes": 0,
                      "error": repr(exc)
                  }

          def safe_extract_tar(tar, path):
              base = path.resolve()
              for member in tar.getmembers():
                  target = (path / member.name).resolve()
                  if not str(target).startswith(str(base)):
                      raise RuntimeError(f"Blocked unsafe tar path: {member.name}")
              tar.extractall(path)

          def read_first_lines(path, n=12):
              lines = []
              try:
                  with path.open("r", encoding="utf-8", errors="ignore") as f:
                      for raw in f:
                          line = raw.rstrip("\n")
                          if line.strip():
                              lines.append(line[:500])
                          if len(lines) >= n:
                              break
              except Exception as exc:
                  lines.append(f"ERROR_READING_PREVIEW:{repr(exc)}")
              return lines

          def find_first_numeric_width(path):
              with path.open("r", encoding="utf-8", errors="ignore") as f:
                  for raw in f:
                      line = raw.strip()
                      if not line or line.startswith("#"):
                          continue
                      parts = line.replace(",", " ").split()
                      try:
                          floats = [float(x) for x in parts]
                      except Exception:
                          continue
                      if len(floats) >= 8:
                          return len(floats)
              return ""

          def split_possible_header(line):
              line = line.strip()
              line = line.lstrip("#").strip()
              parts = line.replace(",", " ").split()
              return [normalize_name(p) for p in parts if normalize_name(p)]

          def detect_inline_header(path):
              previews = read_first_lines(path, n=20)
              for line in previews:
                  parts = split_possible_header(line)
                  if len(parts) < 8:
                      continue

                  has_weight = "weight" in parts or parts[-1] == "weight"
                  has_accurate_s8 = any(p in S8_EXACT for p in parts)
                  has_sigma8 = any(p in SIGMA8_EXACT for p in parts)
                  has_omegam = any(p in OMEGAM_EXACT for p in parts)
                  has_cosmo = any("cosmological_parameters" in p for p in parts)

                  if has_weight and has_cosmo and (has_accurate_s8 or has_sigma8 or has_omegam):
                      return {
                          "header": parts,
                          "method": "inline_header_detected",
                          "preview_lines": previews
                      }

              return {
                  "header": [],
                  "method": "inline_header_not_detected",
                  "preview_lines": previews
              }

          def find_exact_column(header, exact_names, avoid_contains=None):
              avoid_contains = avoid_contains or []
              normalized = [normalize_name(h) for h in header]
              exact_set = {normalize_name(x) for x in exact_names}

              for idx, name in enumerate(normalized):
                  if any(block in name for block in avoid_contains):
                      continue
                  if name in exact_set:
                      return idx

              for idx, name in enumerate(normalized):
                  if any(block in name for block in avoid_contains):
                      continue
                  for exact in exact_set:
                      if name.endswith(exact):
                          return idx

              return None

          def weighted_quantile(values, quantiles, weights):
              pairs = []
              for v, w in zip(values, weights):
                  if finite(v) and finite(w) and float(w) > 0:
                      pairs.append((float(v), float(w)))

              if not pairs:
                  raise ValueError("No finite positive-weight samples remained.")

              pairs.sort(key=lambda x: x[0])
              total = sum(w for _, w in pairs)
              output = []

              for q in quantiles:
                  target = float(q) * total
                  cumulative = 0.0
                  chosen = pairs[-1][0]
                  for value, weight in pairs:
                      cumulative += weight
                      if cumulative >= target:
                          chosen = value
                          break
                  output.append(chosen)

              return output

          def weighted_mean_std(values, weights):
              pairs = []
              for v, w in zip(values, weights):
                  if finite(v) and finite(w) and float(w) > 0:
                      pairs.append((float(v), float(w)))

              if not pairs:
                  raise ValueError("No finite positive-weight samples remained.")

              total = sum(w for _, w in pairs)
              mean = sum(v * w for v, w in pairs) / total
              var = sum(w * (v - mean) ** 2 for v, w in pairs) / total
              return mean, math.sqrt(max(var, 0.0))

          def summarize_axis(values, weights):
              q16, q50, q84 = weighted_quantile(values, [0.16, 0.50, 0.84], weights)
              mean, std = weighted_mean_std(values, weights)
              return {
                  "q16": q16,
                  "q50": q50,
                  "q84": q84,
                  "sigma_68": (q84 - q16) / 2.0,
                  "weighted_mean": mean,
                  "weighted_std": std,
                  "sample_count": len(values)
              }

          def pressure_against_planck(axis, value, sigma):
              ref = PLANCK_AXIS_REFERENCE[axis]
              combined = math.sqrt(float(sigma) ** 2 + float(ref["sigma_68"]) ** 2)
              delta = float(value) - float(ref["q50"])
              z = delta / combined if combined > 0 else float("nan")

              if delta < 0:
                  direction = "negative"
              elif delta > 0:
                  direction = "positive"
              else:
                  direction = "zero"

              abs_z = abs(z)
              if abs_z >= 2.5:
                  strength = "strong"
              elif abs_z >= 1.5:
                  strength = "moderate"
              elif abs_z >= 0.25:
                  strength = "weak"
              else:
                  strength = "near_zero"

              return {
                  "axis": axis,
                  "observable_value": value,
                  "observable_sigma": sigma,
                  "planck_value": ref["q50"],
                  "planck_sigma": ref["sigma_68"],
                  "delta_observable_minus_planck": delta,
                  "combined_sigma": combined,
                  "pressure_z": z,
                  "direction": direction,
                  "strength": strength
              }

          def choose_header_for_file(path):
              detection = detect_inline_header(path)
              first_numeric_width = find_first_numeric_width(path)

              if detection["header"]:
                  return {
                      "header": detection["header"],
                      "method": detection["method"],
                      "first_numeric_width": first_numeric_width,
                      "preview_lines": detection["preview_lines"]
                  }

              if path.name == FIDUCIAL_3X2PT_FILENAME and first_numeric_width == 42:
                  return {
                      "header": README_GUIDED_FIDUCIAL_HEADER,
                      "method": "readme_guided_fiducial_42_column_fallback",
                      "first_numeric_width": first_numeric_width,
                      "preview_lines": detection["preview_lines"]
                  }

              return {
                  "header": [],
                  "method": "no_header_or_fallback_available",
                  "first_numeric_width": first_numeric_width,
                  "preview_lines": detection["preview_lines"]
              }

          def parse_sample_file(path):
              selected = choose_header_for_file(path)
              header = selected["header"]

              if not header:
                  return {
                      "parse_success": False,
                      "error": "header_not_detected_and_no_readme_fallback",
                      "header": [],
                      "header_method": selected["method"],
                      "first_numeric_width": selected["first_numeric_width"],
                      "preview_lines": selected["preview_lines"],
                      "axis_summaries": {},
                      "pressure_rows": [],
                      "rows_read": 0,
                      "rows_used": 0,
                      "rows_skipped": 0
                  }

              s8_idx = find_exact_column(header, S8_EXACT, avoid_contains=["input"])
              sigma8_idx = find_exact_column(header, SIGMA8_EXACT)
              omegam_idx = find_exact_column(header, OMEGAM_EXACT)
              weight_idx = find_exact_column(header, WEIGHT_EXACT)

              if weight_idx is None and len(header) >= 1 and normalize_name(header[-1]) == "weight":
                  weight_idx = len(header) - 1

              if weight_idx is None:
                  return {
                      "parse_success": False,
                      "error": "weight_column_not_detected",
                      "header": header,
                      "header_method": selected["method"],
                      "first_numeric_width": selected["first_numeric_width"],
                      "preview_lines": selected["preview_lines"],
                      "axis_summaries": {},
                      "pressure_rows": [],
                      "rows_read": 0,
                      "rows_used": 0,
                      "rows_skipped": 0
                  }

              axis_values = {"S8": [], "sigma8": [], "Omega_m": []}
              weights = []

              rows_read = 0
              rows_used = 0
              rows_skipped = 0

              with path.open("r", encoding="utf-8", errors="ignore") as f:
                  for raw in f:
                      line = raw.strip()
                      if not line or line.startswith("#"):
                          continue

                      parts = line.replace(",", " ").split()

                      try:
                          floats = [float(x) for x in parts]
                      except Exception:
                          rows_skipped += 1
                          continue

                      if len(floats) < len(header):
                          rows_skipped += 1
                          continue

                      rows_read += 1

                      weight = floats[weight_idx]
                      if not finite(weight) or weight <= 0:
                          rows_skipped += 1
                          continue

                      s8_value = floats[s8_idx] if s8_idx is not None and s8_idx < len(floats) and finite(floats[s8_idx]) else None
                      sigma8_value = floats[sigma8_idx] if sigma8_idx is not None and sigma8_idx < len(floats) and finite(floats[sigma8_idx]) else None
                      omegam_value = floats[omegam_idx] if omegam_idx is not None and omegam_idx < len(floats) and finite(floats[omegam_idx]) else None

                      if s8_value is None and sigma8_value is not None and omegam_value is not None and omegam_value > 0:
                          s8_value = sigma8_value * math.sqrt(omegam_value / 0.3)

                      if sigma8_value is None and s8_value is not None and omegam_value is not None and omegam_value > 0:
                          sigma8_value = s8_value / math.sqrt(omegam_value / 0.3)

                      used_any = False

                      if s8_value is not None:
                          axis_values["S8"].append(float(s8_value))
                          used_any = True
                      else:
                          axis_values["S8"].append(float("nan"))

                      if sigma8_value is not None:
                          axis_values["sigma8"].append(float(sigma8_value))
                          used_any = True
                      else:
                          axis_values["sigma8"].append(float("nan"))

                      if omegam_value is not None:
                          axis_values["Omega_m"].append(float(omegam_value))
                          used_any = True
                      else:
                          axis_values["Omega_m"].append(float("nan"))

                      if used_any:
                          weights.append(float(weight))
                          rows_used += 1
                      else:
                          rows_skipped += 1

              axis_summaries = {}
              pressure_rows = []

              for axis, values in axis_values.items():
                  clean_values = []
                  clean_weights = []

                  for value, weight in zip(values, weights):
                      if finite(value) and finite(weight) and weight > 0:
                          clean_values.append(float(value))
                          clean_weights.append(float(weight))

                  if len(clean_values) >= 50:
                      summary = summarize_axis(clean_values, clean_weights)
                      axis_summaries[axis] = summary
                      pressure_rows.append(pressure_against_planck(axis, summary["q50"], summary["sigma_68"]))

              return {
                  "parse_success": bool(axis_summaries),
                  "error": "" if axis_summaries else "no_axes_summarized",
                  "header": header,
                  "header_method": selected["method"],
                  "first_numeric_width": selected["first_numeric_width"],
                  "preview_lines": selected["preview_lines"],
                  "s8_column_found": s8_idx is not None,
                  "sigma8_column_found": sigma8_idx is not None,
                  "omegam_column_found": omegam_idx is not None,
                  "weight_column_found": weight_idx is not None,
                  "s8_column_index": s8_idx if s8_idx is not None else "",
                  "sigma8_column_index": sigma8_idx if sigma8_idx is not None else "",
                  "omegam_column_index": omegam_idx if omegam_idx is not None else "",
                  "weight_column_index": weight_idx if weight_idx is not None else "",
                  "header_column_count": len(header),
                  "rows_read": rows_read,
                  "rows_used": rows_used,
                  "rows_skipped": rows_skipped,
                  "axis_summaries": axis_summaries,
                  "pressure_rows": pressure_rows
              }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          created_at = now_iso()

          archive_download = try_download_url(KIDS_CHAIN_URL, ARCHIVE_PATH)
          readme_download = try_download_url(KIDS_README_URL, README_PATH)

          failed_gates = []
          warnings = []
          github_hard_failures = []

          sample_file_rows = []
          header_debug_rows = []
          axis_summary_rows = []
          pressure_rows = []
          main_result = None

          if not archive_download["ok"]:
              failed_gates.append("kids_chain_archive_download_failed")
              github_hard_failures.append("kids_chain_archive_download_failed")
          else:
              with TemporaryDirectory() as tmp_name:
                  tmp = Path(tmp_name)
                  extract_dir = tmp / "extracted"
                  extract_dir.mkdir(parents=True, exist_ok=True)

                  try:
                      with tarfile.open(ARCHIVE_PATH, "r:gz") as tar:
                          safe_extract_tar(tar, extract_dir)
                  except Exception as exc:
                      failed_gates.append(f"archive_extract_failed:{repr(exc)}")
                      github_hard_failures.append("archive_extract_failed")

                  if not github_hard_failures:
                      sample_paths = [
                          p for p in extract_dir.rglob("samples_multinest_*.txt")
                          if p.is_file() and not p.name.startswith("._")
                      ]

                      if not sample_paths:
                          failed_gates.append("no_samples_multinest_files_found")

                      for path in sorted(sample_paths):
                          parsed = parse_sample_file(path)
                          role = EXPECTED_ROLES.get(path.name, "unknown_sample_role")
                          rel = str(path.relative_to(extract_dir))

                          sample_file_rows.append({
                              "relative_path": rel,
                              "filename": path.name,
                              "role": role,
                              "size_bytes": path.stat().st_size,
                              "parse_success": parsed["parse_success"],
                              "error": parsed["error"],
                              "header_method": parsed.get("header_method", ""),
                              "header_column_count": parsed.get("header_column_count", ""),
                              "first_numeric_width": parsed.get("first_numeric_width", ""),
                              "rows_read": parsed.get("rows_read", ""),
                              "rows_used": parsed.get("rows_used", ""),
                              "rows_skipped": parsed.get("rows_skipped", ""),
                              "s8_column_found": parsed.get("s8_column_found", ""),
                              "sigma8_column_found": parsed.get("sigma8_column_found", ""),
                              "omegam_column_found": parsed.get("omegam_column_found", ""),
                              "weight_column_found": parsed.get("weight_column_found", ""),
                              "s8_column_index": parsed.get("s8_column_index", ""),
                              "sigma8_column_index": parsed.get("sigma8_column_index", ""),
                              "omegam_column_index": parsed.get("omegam_column_index", ""),
                              "weight_column_index": parsed.get("weight_column_index", "")
                          })

                          header_debug_rows.append({
                              "relative_path": rel,
                              "filename": path.name,
                              "role": role,
                              "header_method": parsed.get("header_method", ""),
                              "header_first_50": ";".join(parsed.get("header", [])[:50]),
                              "preview_lines": " || ".join(parsed.get("preview_lines", []))
                          })

                          for axis, summary in parsed["axis_summaries"].items():
                              axis_summary_rows.append({
                                  "relative_path": rel,
                                  "filename": path.name,
                                  "role": role,
                                  "axis": axis,
                                  "q16": summary["q16"],
                                  "q50": summary["q50"],
                                  "q84": summary["q84"],
                                  "sigma_68": summary["sigma_68"],
                                  "weighted_mean": summary["weighted_mean"],
                                  "weighted_std": summary["weighted_std"],
                                  "sample_count": summary["sample_count"]
                              })

                          for pressure in parsed["pressure_rows"]:
                              pressure_rows.append({
                                  "relative_path": rel,
                                  "filename": path.name,
                                  "role": role,
                                  **pressure
                              })

                          if path.name == FIDUCIAL_3X2PT_FILENAME:
                              main_result = {
                                  "relative_path": rel,
                                  "filename": path.name,
                                  "role": role,
                                  "parsed": parsed
                              }

          main_axis_summaries = {}
          main_pressure_rows = []
          diff_from_carried = ""
          carried_value_check = "main_result_not_available"

          if main_result is None:
              failed_gates.append("fiducial_3x2pt_file_not_found")
          elif not main_result["parsed"]["parse_success"]:
              failed_gates.append("fiducial_3x2pt_file_did_not_parse")
          else:
              main_axis_summaries = main_result["parsed"]["axis_summaries"]
              main_pressure_rows = main_result["parsed"]["pressure_rows"]

              if "S8" not in main_axis_summaries:
                  failed_gates.append("fiducial_3x2pt_s8_not_recovered")
              else:
                  diff_from_carried = abs(main_axis_summaries["S8"]["q50"] - KIDS_CARRIED_3X2PT_S8_Q50)
                  if diff_from_carried <= 0.001:
                      carried_value_check = "matches_carried_v3_58_3x2pt_s8_q50"
                  else:
                      carried_value_check = "does_not_match_carried_v3_58_3x2pt_s8_q50"
                      warnings.append("fiducial_3x2pt_s8_differs_from_carried_value_by_more_than_0_001")

              if "sigma8" not in main_axis_summaries:
                  warnings.append("fiducial_3x2pt_sigma8_not_recovered")

              if "Omega_m" not in main_axis_summaries:
                  warnings.append("fiducial_3x2pt_omegam_not_recovered")

          s8_pressure_main = None
          for row in main_pressure_rows:
              if row["axis"] == "S8":
                  s8_pressure_main = row

          if s8_pressure_main is None:
              if main_result is not None:
                  failed_gates.append("fiducial_3x2pt_s8_pressure_not_computed")
          else:
              if s8_pressure_main["direction"] != "negative":
                  failed_gates.append("fiducial_3x2pt_s8_pressure_not_negative_vs_planck")
              elif abs(s8_pressure_main["pressure_z"]) < 1.5:
                  warnings.append("fiducial_3x2pt_s8_pressure_below_moderate_1_5_sigma")

          parsed_file_count = sum(1 for row in sample_file_rows if row["parse_success"] is True)

          if failed_gates:
              readiness_label = "kids_readme_guided_parser_completed_followup_needed"
              next_step = "Inspect header_debug_v4_4_3.csv and kids_sample_file_parse_inventory_v4_4_3.csv before the next parser repair."
          else:
              readiness_label = "kids_readme_guided_parser_passed_direct_3x2pt_axes_recovered"
              next_step = (
                  "Proceed to v4.5 KiDS role-boundary pressure replacement audit. "
                  "Use the recovered direct 3x2pt chain axes, but keep KiDS cosmic shear and KiDS 3x2pt role-distinct."
              )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "truth_boundary": TRUTH_BOUNDARY,
              "source_ledger": SOURCE_LEDGER,
              "download_status": {
                  "archive": archive_download,
                  "readme": readme_download
              },
              "planck_axis_reference": PLANCK_AXIS_REFERENCE,
              "sample_file_rows": sample_file_rows,
              "header_debug_rows": header_debug_rows,
              "axis_summary_rows": axis_summary_rows,
              "pressure_rows": pressure_rows,
              "main_fiducial_result": {
                  "filename": FIDUCIAL_3X2PT_FILENAME,
                  "role": "fiducial_3x2pt_cosmic_shear_ggl_galaxy_clustering",
                  "axis_summaries": main_axis_summaries,
                  "pressure_rows": main_pressure_rows,
                  "diff_from_carried_3x2pt_s8_q50": diff_from_carried,
                  "carried_value_check": carried_value_check,
                  "published_cosmic_shear_s8_q50_for_role_boundary": KIDS_PUBLISHED_COSMIC_SHEAR_S8_Q50
              },
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_growth_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "automatic_row_replacement_allowed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "github_hard_failures": sorted(set(github_hard_failures)),
                  "readiness_label": readiness_label,
                  "parsed_file_count": parsed_file_count,
                  "sample_file_count": len(sample_file_rows),
                  "carried_value_check": carried_value_check,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "automatic_row_replacement_allowed": False
              }
          }

          write_csv(
              OUTDIR / "kids_sample_file_parse_inventory_v4_4_3.csv",
              sample_file_rows,
              [
                  "relative_path",
                  "filename",
                  "role",
                  "size_bytes",
                  "parse_success",
                  "error",
                  "header_method",
                  "header_column_count",
                  "first_numeric_width",
                  "rows_read",
                  "rows_used",
                  "rows_skipped",
                  "s8_column_found",
                  "sigma8_column_found",
                  "omegam_column_found",
                  "weight_column_found",
                  "s8_column_index",
                  "sigma8_column_index",
                  "omegam_column_index",
                  "weight_column_index"
              ]
          )

          write_csv(
              OUTDIR / "header_debug_v4_4_3.csv",
              header_debug_rows,
              [
                  "relative_path",
                  "filename",
                  "role",
                  "header_method",
                  "header_first_50",
                  "preview_lines"
              ]
          )

          write_csv(
              OUTDIR / "kids_axis_summary_v4_4_3.csv",
              axis_summary_rows,
              [
                  "relative_path",
                  "filename",
                  "role",
                  "axis",
                  "q16",
                  "q50",
                  "q84",
                  "sigma_68",
                  "weighted_mean",
                  "weighted_std",
                  "sample_count"
              ]
          )

          write_csv(
              OUTDIR / "kids_pressure_vs_planck_v4_4_3.csv",
              pressure_rows,
              [
                  "relative_path",
                  "filename",
                  "role",
                  "axis",
                  "observable_value",
                  "observable_sigma",
                  "planck_value",
                  "planck_sigma",
                  "delta_observable_minus_planck",
                  "combined_sigma",
                  "pressure_z",
                  "direction",
                  "strength"
              ]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_readme_guided_parser_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The KiDS fiducial 3x2pt sample file was parsed using inline headers where possible and README-guided fallback where needed.",
                  "boundary": "Parser repair only, not validation."
              },
              {
                  "interpretation_id": "allowed_direct_3x2pt_axis_statement",
                  "status": "allowed_with_boundary",
                  "wording": "Recovered fiducial KiDS 3x2pt axes may be used in a later role-boundary pressure replacement audit.",
                  "boundary": "This does not automatically replace the KiDS cosmic-shear row."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID is validated.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_model_comparison_claim",
                  "status": "forbidden",
                  "wording": "A likelihood, BIC, or model comparison was run.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_automatic_replacement_claim",
                  "status": "forbidden",
                  "wording": "The KiDS 3x2pt chain automatically replaces every prior KiDS row.",
                  "boundary": "Blocked."
              }
          ]

          write_csv(
              OUTDIR / "interpretation_boundaries_v4_4_3.csv",
              interpretation_rows,
              ["interpretation_id", "status", "wording", "boundary"]
          )

          json_path = OUTDIR / "tairid_cosmology_v4_4_3_kids_readme_guided_parser_fallback.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v4.4.3 — KiDS README-Guided Parser Fallback")
          md.append("")
          md.append(f"Created UTC: `{created_at}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append(f"GitHub hard failures: `{', '.join(sorted(set(github_hard_failures))) if github_hard_failures else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v4.4.1 and v4.4.2 found the file but did not recover axes. v4.4.3 adds an official README-guided 42-column fallback for the fiducial KiDS 3x2pt file.")
          md.append("")
          md.append("It only fails the GitHub job if download or extraction fails. Parser misses are recorded inside the artifact instead of crashing the workflow.")
          md.append("")
          md.append("## Download status")
          md.append("")
          md.append("| Product | OK | Bytes | Error |")
          md.append("|---|---:|---:|---|")
          md.append(f"| KiDS chain archive | `{archive_download['ok']}` | `{archive_download['bytes']}` | `{archive_download['error']}` |")
          md.append(f"| KiDS README | `{readme_download['ok']}` | `{readme_download['bytes']}` | `{readme_download['error']}` |")
          md.append("")
          md.append("## Sample file parse inventory")
          md.append("")
          md.append("| File | Role | Parsed | Header method | Rows used | Header cols | Data cols | S8 | sigma8 | Omega_m | Weight |")
          md.append("|---|---|---:|---|---:|---:|---:|---:|---:|---:|---:|")
          for row in sample_file_rows:
              md.append(
                  f"| `{row['filename']}` | `{row['role']}` | `{row['parse_success']}` | `{row['header_method']}` | "
                  f"`{row['rows_used']}` | `{row['header_column_count']}` | `{row['first_numeric_width']}` | "
                  f"`{row['s8_column_found']}` | `{row['sigma8_column_found']}` | `{row['omegam_column_found']}` | `{row['weight_column_found']}` |"
              )
          md.append("")
          md.append("## Fiducial 3x2pt main result")
          md.append("")
          if main_axis_summaries:
              md.append("| Axis | q16 | q50 | q84 | sigma 68 | sample count |")
              md.append("|---|---:|---:|---:|---:|---:|")
              for axis, summary in main_axis_summaries.items():
                  md.append(
                      f"| `{axis}` | `{summary['q16']:.12f}` | `{summary['q50']:.12f}` | "
                      f"`{summary['q84']:.12f}` | `{summary['sigma_68']:.12f}` | `{summary['sample_count']}` |"
                  )
              md.append("")
              md.append(f"Carried v3.58 3x2pt S8 q50 check: `{carried_value_check}`")
              md.append("")
              md.append(f"Absolute difference from carried 3x2pt S8 q50: `{diff_from_carried}`")
          else:
              md.append("No fiducial 3x2pt axis summary was recovered. Inspect `header_debug_v4_4_3.csv`.")
          md.append("")
          md.append("## Fiducial 3x2pt pressure vs Planck")
          md.append("")
          if main_pressure_rows:
              md.append("| Axis | Delta | Pressure z | Direction | Strength |")
              md.append("|---|---:|---:|---|---|")
              for row in main_pressure_rows:
                  md.append(
                      f"| `{row['axis']}` | `{row['delta_observable_minus_planck']:.12f}` | "
                      f"`{row['pressure_z']:.12f}` | `{row['direction']}` | `{row['strength']}` |"
                  )
          else:
              md.append("No fiducial 3x2pt pressure rows were recovered.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `kids_sample_file_parse_inventory_v4_4_3.csv`")
          md.append("- `header_debug_v4_4_3.csv`")
          md.append("- `kids_axis_summary_v4_4_3.csv`")
          md.append("- `kids_pressure_vs_planck_v4_4_3.csv`")
          md.append("- `interpretation_boundaries_v4_4_3.csv`")
          md.append("- `tairid_cosmology_v4_4_3_kids_readme_guided_parser_fallback.json`")
          md.append("- `tairid_cosmology_v4_4_3_kids_readme_guided_parser_fallback.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v4_4_3_kids_readme_guided_parser_fallback.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("Main fiducial result:")
          print(json.dumps(audit["main_fiducial_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if github_hard_failures:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.4.3 KiDS README guided parser fallback artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v4-4-3-kids-readme-guided-parser-fallback
          path: artifacts/tairid_cosmology_v4_4_3_kids_readme_guided_parser_fallback/
