name: TAIRID Cosmology v4.1 DES HSC Growth Family Repair

on:
  workflow_dispatch:

jobs:
  des-hsc-growth-family-repair:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.1 DES HSC growth family repair
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_1_des_hsc_growth_family

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_1_des_hsc_growth_family")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_1_des_hsc_growth_family_repair"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior, or model comparison.",
              "This does not promote weak-lensing surveys into model anchors.",
              "This does not combine KiDS, DES, and HSC into one posterior.",
              "This is a growth-family diagnostic repair: it checks whether the negative S8/growth direction repeats across independent weak-lensing families.",
              "A pass means the growth/consolidation-negative diagnostic direction repeats across more than KiDS alone, not that TAIRID is validated."
          ]

          # Carried from v4.0.1 Planck-chain S8 upgrade.
          PLANCK_CHAIN_S8_Q16 = 0.8128646
          PLANCK_CHAIN_S8_Q50 = 0.8248208
          PLANCK_CHAIN_S8_Q84 = 0.8373030
          PLANCK_CHAIN_S8_SIGMA = 0.0122192

          SOURCE_LEDGER = [
              {
                  "source_id": "kids_1000_fiducial_cosmic_shear",
                  "source_name": "KiDS-1000 Cosmology cosmic shear fiducial analysis",
                  "source_url": "https://arxiv.org/abs/2007.15633",
                  "used_for": "KiDS-1000 S8 = 0.759 +0.024 -0.021."
              },
              {
                  "source_id": "des_y3_3x2pt_combined",
                  "source_name": "DES Year 3 3x2pt combined large-scale-structure constraints",
                  "source_url": "https://ui.adsabs.harvard.edu/abs/2022PhRvD.105b3520A/abstract",
                  "used_for": "DES Y3 3x2pt S8 = 0.776 +/- 0.017."
              },
              {
                  "source_id": "des_y3_cosmic_shear",
                  "source_name": "DES Year 3 cosmic shear and robustness to data calibration",
                  "source_url": "https://researchportal.port.ac.uk/en/publications/dark-energy-survey-year-3-results-cosmology-from-cosmic-shear-and/",
                  "used_for": "DES Y3 cosmic shear S8 = 0.772 +0.018 -0.017."
              },
              {
                  "source_id": "hsc_y3_cosmic_shear_power_spectra",
                  "source_name": "HSC-Y3 Weak-Lensing Results public page",
                  "source_url": "https://hsc-release.mtk.nao.ac.jp/doc/index.php/wly3/",
                  "used_for": "HSC-Y3 S8 = 0.776 +0.032 -0.033."
              },
              {
                  "source_id": "v4_0_1_planck_chain_s8_artifact",
                  "source_name": "Prior TAIRID v4.0.1 GitHub artifact",
                  "source_url": "local_prior_run_artifact",
                  "used_for": "Planck chain-derived S8 q16/q50/q84 and sigma carried forward."
              }
          ]

          # Active rows.
          # sigma_plus is used for the main directional comparison because Planck S8 is above
          # all listed late-time weak-lensing/growth S8 medians.
          GROWTH_ROWS = [
              {
                  "row_id": "kids1000_fiducial_cosmic_shear",
                  "family": "KiDS",
                  "source": "KiDS-1000",
                  "observable_role": "cosmic_shear_growth",
                  "pressure_surface": "growth_consolidation",
                  "s8": 0.759,
                  "sigma_minus": 0.021,
                  "sigma_plus": 0.024,
                  "source_status": "published_summary_width",
                  "family_count_policy": "counts_once_as_KiDS_family"
              },
              {
                  "row_id": "des_y3_3x2pt_combined",
                  "family": "DES",
                  "source": "DES_Y3_3x2pt",
                  "observable_role": "galaxy_clustering_galaxy_galaxy_lensing_cosmic_shear_combined_growth",
                  "pressure_surface": "growth_consolidation",
                  "s8": 0.776,
                  "sigma_minus": 0.017,
                  "sigma_plus": 0.017,
                  "source_status": "published_summary_width",
                  "family_count_policy": "counts_once_inside_DES_family"
              },
              {
                  "row_id": "des_y3_cosmic_shear_only",
                  "family": "DES",
                  "source": "DES_Y3_cosmic_shear",
                  "observable_role": "cosmic_shear_growth",
                  "pressure_surface": "growth_consolidation",
                  "s8": 0.772,
                  "sigma_minus": 0.017,
                  "sigma_plus": 0.018,
                  "source_status": "published_summary_width",
                  "family_count_policy": "DES_sensitivity_row_not_extra_independent_family"
              },
              {
                  "row_id": "hsc_y3_cosmic_shear_power_spectra",
                  "family": "HSC",
                  "source": "HSC_Y3",
                  "observable_role": "cosmic_shear_growth",
                  "pressure_surface": "growth_consolidation",
                  "s8": 0.776,
                  "sigma_minus": 0.033,
                  "sigma_plus": 0.032,
                  "source_status": "published_summary_width",
                  "family_count_policy": "counts_once_as_HSC_family"
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def pressure_z(s8, sigma_plus, planck_s8, planck_sigma):
              directional_sigma = sigma_plus if planck_s8 >= s8 else sigma_plus
              combined_sigma = math.sqrt(directional_sigma ** 2 + planck_sigma ** 2)
              delta = s8 - planck_s8
              z = delta / combined_sigma
              return delta, combined_sigma, z, directional_sigma

          def classify_pressure(delta, z):
              abs_z = abs(z)

              if abs(delta) < 1e-6 or abs_z < 0.25:
                  return "near_zero_pressure_not_robust"

              if delta > 0:
                  return "flipped_positive_consolidation_negative_pattern_fails"

              if abs_z >= 2.5:
                  return "strong_diagnostic_survival"

              if abs_z >= 1.5:
                  return "direction_survives_strength_weakened"

              return "weak_negative_direction_only"

          pressure_rows = []

          for row in GROWTH_ROWS:
              delta, combined_sigma, z, directional_sigma = pressure_z(
                  s8=row["s8"],
                  sigma_plus=row["sigma_plus"],
                  planck_s8=PLANCK_CHAIN_S8_Q50,
                  planck_sigma=PLANCK_CHAIN_S8_SIGMA
              )

              grade = classify_pressure(delta, z)

              pressure_rows.append({
                  **row,
                  "planck_s8_q50": PLANCK_CHAIN_S8_Q50,
                  "planck_sigma": PLANCK_CHAIN_S8_SIGMA,
                  "directional_sigma_used": directional_sigma,
                  "delta_growth_minus_planck": delta,
                  "combined_sigma": combined_sigma,
                  "pressure_z": z,
                  "direction": "negative_consolidation_growth_pressure" if delta < 0 else "non_negative_or_flipped",
                  "survival_grade": grade,
                  "is_independent_family_primary": row["row_id"] in [
                      "kids1000_fiducial_cosmic_shear",
                      "des_y3_3x2pt_combined",
                      "hsc_y3_cosmic_shear_power_spectra"
                  ]
              })

          families = sorted(set(row["family"] for row in pressure_rows))
          family_rows = []

          for family in families:
              rows = [row for row in pressure_rows if row["family"] == family]
              primary_rows = [row for row in rows if row["is_independent_family_primary"]]
              evaluation_rows = primary_rows if primary_rows else rows

              negative_count = sum(1 for row in evaluation_rows if row["delta_growth_minus_planck"] < 0)
              flipped_count = sum(1 for row in evaluation_rows if row["delta_growth_minus_planck"] > 0)
              near_zero_count = sum(1 for row in evaluation_rows if row["survival_grade"] == "near_zero_pressure_not_robust")
              best_abs_z = max(abs(row["pressure_z"]) for row in evaluation_rows)
              representative = max(evaluation_rows, key=lambda row: abs(row["pressure_z"]))

              if flipped_count > 0:
                  family_status = "family_inconsistent_or_flipped"
              elif negative_count == len(evaluation_rows) and best_abs_z >= 2.5:
                  family_status = "strong_negative_growth_family"
              elif negative_count == len(evaluation_rows) and best_abs_z >= 1.5:
                  family_status = "direction_survives_strength_weakened_family"
              elif negative_count == len(evaluation_rows):
                  family_status = "weak_negative_growth_family"
              else:
                  family_status = "family_not_classified"

              family_rows.append({
                  "family": family,
                  "family_status": family_status,
                  "evaluation_row_count": len(evaluation_rows),
                  "all_row_count": len(rows),
                  "negative_count": negative_count,
                  "flipped_count": flipped_count,
                  "near_zero_count": near_zero_count,
                  "best_abs_pressure_z": best_abs_z,
                  "representative_row_id": representative["row_id"],
                  "representative_pressure_z": representative["pressure_z"],
                  "representative_s8": representative["s8"],
                  "representative_direction": representative["direction"],
                  "representative_grade": representative["survival_grade"]
              })

          robust_family_count = sum(
              1 for row in family_rows
              if row["family_status"] in [
                  "strong_negative_growth_family",
                  "direction_survives_strength_weakened_family"
              ]
          )

          weak_negative_family_count = sum(
              1 for row in family_rows
              if row["family_status"] == "weak_negative_growth_family"
          )

          flipped_family_count = sum(
              1 for row in family_rows
              if row["family_status"] == "family_inconsistent_or_flipped"
          )

          failed_gates = []
          warnings = []

          if len(family_rows) < 3:
              failed_gates.append("fewer_than_three_growth_families_present")

          if flipped_family_count > 0:
              failed_gates.append("one_or_more_growth_families_flipped_positive")

          if robust_family_count < 2:
              failed_gates.append("fewer_than_two_growth_families_reach_1_5_sigma_negative_direction")

          if weak_negative_family_count > 0:
              warnings.append("one_or_more_growth_families_negative_but_below_1_5_sigma")

          if any(abs(row["pressure_z"]) < 2.5 for row in pressure_rows if row["is_independent_family_primary"]):
              warnings.append("not_all_independent_growth_families_reach_strong_2_5_sigma_threshold")

          if failed_gates:
              readiness_label = "growth_family_repair_failed_or_needs_followup"
              next_step = (
                  "Do not integrate reach/consolidation yet. Inspect the growth-family rows and source choices before continuing."
              )
          else:
              if warnings:
                  readiness_label = "growth_family_repair_passed_pattern_repeats_with_strength_warnings"
                  next_step = (
                      "Proceed to v4.2 S8/sigma8/Omega_m decomposition. "
                      "The negative growth direction repeats across families, but strength is not uniform, so decomposition is needed before stronger claims."
                  )
              else:
                  readiness_label = "growth_family_repair_passed_strong_pattern_repeats"
                  next_step = (
                      "Proceed to v4.2 S8/sigma8/Omega_m decomposition. "
                      "The negative growth direction repeats strongly across the included families."
                  )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_ledger": SOURCE_LEDGER,
              "planck_chain_reference_from_v4_0_1": {
                  "planck_chain_s8_q16": PLANCK_CHAIN_S8_Q16,
                  "planck_chain_s8_q50": PLANCK_CHAIN_S8_Q50,
                  "planck_chain_s8_q84": PLANCK_CHAIN_S8_Q84,
                  "planck_chain_s8_sigma": PLANCK_CHAIN_S8_SIGMA,
                  "status": "carried_forward_not_refit"
              },
              "growth_pressure_rows": pressure_rows,
              "family_summary_rows": family_rows,
              "family_counts": {
                  "total_families": len(family_rows),
                  "robust_negative_family_count": robust_family_count,
                  "weak_negative_family_count": weak_negative_family_count,
                  "flipped_family_count": flipped_family_count
              },
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_growth_posterior_built": False,
                  "new_cosmological_model_fit": False
              },
              "gate_result": {
                  "failed_gates": failed_gates,
                  "warnings": warnings,
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False
              }
          }

          json_path = OUTDIR / "tairid_cosmology_v4_1_des_hsc_growth_family_repair.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          with (OUTDIR / "growth_family_pressure_rows_v4_1.csv").open("w", newline="", encoding="utf-8") as f:
              fieldnames = [
                  "row_id",
                  "family",
                  "source",
                  "observable_role",
                  "pressure_surface",
                  "s8",
                  "sigma_minus",
                  "sigma_plus",
                  "directional_sigma_used",
                  "planck_s8_q50",
                  "planck_sigma",
                  "delta_growth_minus_planck",
                  "combined_sigma",
                  "pressure_z",
                  "direction",
                  "survival_grade",
                  "source_status",
                  "family_count_policy",
                  "is_independent_family_primary"
              ]
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              for row in pressure_rows:
                  writer.writerow(row)

          with (OUTDIR / "growth_family_summary_v4_1.csv").open("w", newline="", encoding="utf-8") as f:
              fieldnames = [
                  "family",
                  "family_status",
                  "evaluation_row_count",
                  "all_row_count",
                  "negative_count",
                  "flipped_count",
                  "near_zero_count",
                  "best_abs_pressure_z",
                  "representative_row_id",
                  "representative_pressure_z",
                  "representative_s8",
                  "representative_direction",
                  "representative_grade"
              ]
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              for row in family_rows:
                  writer.writerow(row)

          with (OUTDIR / "source_ledger_v4_1.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["source_id", "source_name", "source_url", "used_for"])
              writer.writeheader()
              for row in SOURCE_LEDGER:
                  writer.writerow(row)

          with (OUTDIR / "interpretation_boundaries_v4_1.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["interpretation_id", "status", "wording", "boundary"])
              writer.writeheader()
              writer.writerows([
                  {
                      "interpretation_id": "allowed_growth_family_repair",
                      "status": "allowed_with_boundary",
                      "wording": "The growth/consolidation direction was checked across KiDS, DES, and HSC published S8 summary rows.",
                      "boundary": "Growth-family diagnostic only, not validation."
                  },
                  {
                      "interpretation_id": "allowed_pattern_repeats_statement",
                      "status": "allowed_with_boundary",
                      "wording": "If at least two independent growth families remain negative above 1.5 sigma and no family flips positive, the negative growth direction repeats beyond KiDS alone.",
                      "boundary": "This is a family-direction statement, not a model proof."
                  },
                  {
                      "interpretation_id": "allowed_strength_warning",
                      "status": "allowed_with_boundary",
                      "wording": "If one or more families are negative but below 1.5 sigma, the pattern is directionally repeated but not uniformly strong.",
                      "boundary": "This blocks overclaiming."
                  },
                  {
                      "interpretation_id": "forbidden_validation_claim",
                      "status": "forbidden",
                      "wording": "TAIRID is validated.",
                      "boundary": "Blocked."
                  },
                  {
                      "interpretation_id": "forbidden_new_physics_claim",
                      "status": "forbidden",
                      "wording": "New physics is proven.",
                      "boundary": "Blocked."
                  },
                  {
                      "interpretation_id": "forbidden_standard_cosmology_disproof",
                      "status": "forbidden",
                      "wording": "Standard cosmology is disproven.",
                      "boundary": "Blocked."
                  },
                  {
                      "interpretation_id": "forbidden_combined_posterior_claim",
                      "status": "forbidden",
                      "wording": "KiDS, DES, and HSC combine into a new posterior here.",
                      "boundary": "Blocked. This workflow builds no combined posterior."
                  }
              ])

          md = []
          md.append("# TAIRID Cosmology v4.1 — DES/HSC Growth-Family Repair")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(failed_gates) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(warnings) if warnings else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v4.0.1 repaired the Planck side of the KiDS/Planck row.")
          md.append("")
          md.append("v4.0.2 repaired the KiDS side with published KiDS uncertainty.")
          md.append("")
          md.append("v4.1 widens the growth/consolidation check to DES and HSC using published S8 summary widths.")
          md.append("")
          md.append("This does not combine the surveys into a new posterior. It only asks whether the negative growth direction repeats across independent families.")
          md.append("")
          md.append("## Planck reference carried forward")
          md.append("")
          md.append("| Field | Value |")
          md.append("|---|---:|")
          md.append(f"| Planck chain S8 q16 | `{PLANCK_CHAIN_S8_Q16:.12f}` |")
          md.append(f"| Planck chain S8 q50 | `{PLANCK_CHAIN_S8_Q50:.12f}` |")
          md.append(f"| Planck chain S8 q84 | `{PLANCK_CHAIN_S8_Q84:.12f}` |")
          md.append(f"| Planck chain sigma | `{PLANCK_CHAIN_S8_SIGMA:.12f}` |")
          md.append("")
          md.append("## Growth pressure rows")
          md.append("")
          md.append("| Row | Family | S8 | Sigma used | Pressure z | Direction | Grade |")
          md.append("|---|---|---:|---:|---:|---|---|")
          for row in pressure_rows:
              md.append(
                  f"| `{row['row_id']}` | `{row['family']}` | "
                  f"`{row['s8']:.12f}` | `{row['directional_sigma_used']:.12f}` | "
                  f"`{row['pressure_z']:.12f}` | `{row['direction']}` | `{row['survival_grade']}` |"
              )
          md.append("")
          md.append("## Family summary")
          md.append("")
          md.append("| Family | Status | Representative row | Representative pressure z |")
          md.append("|---|---|---|---:|")
          for row in family_rows:
              md.append(
                  f"| `{row['family']}` | `{row['family_status']}` | "
                  f"`{row['representative_row_id']}` | `{row['representative_pressure_z']:.12f}` |"
              )
          md.append("")
          md.append("## Gate result")
          md.append("")
          md.append(f"- Total families: `{len(family_rows)}`")
          md.append(f"- Robust negative families at or above 1.5 sigma: `{robust_family_count}`")
          md.append(f"- Weak negative families below 1.5 sigma: `{weak_negative_family_count}`")
          md.append(f"- Flipped families: `{flipped_family_count}`")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          if failed_gates:
              md.append("The growth-family repair did not pass. Do not integrate reach/consolidation yet.")
          elif warnings:
              md.append("The growth-family repair passed with warnings. The negative growth/consolidation direction repeats beyond KiDS alone, but strength is uneven across families.")
          else:
              md.append("The growth-family repair passed without warnings. The negative growth/consolidation direction repeats strongly across included families.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `growth_family_pressure_rows_v4_1.csv`")
          md.append("- `growth_family_summary_v4_1.csv`")
          md.append("- `source_ledger_v4_1.csv`")
          md.append("- `interpretation_boundaries_v4_1.csv`")
          md.append("- `tairid_cosmology_v4_1_des_hsc_growth_family_repair.json`")
          md.append("- `tairid_cosmology_v4_1_des_hsc_growth_family_repair.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v4_1_des_hsc_growth_family_repair.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("Family summary:")
          print(json.dumps(family_rows, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.1 DES HSC growth family repair artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v4-1-des-hsc-growth-family-repair
          path: artifacts/tairid_cosmology_v4_1_des_hsc_growth_family/
