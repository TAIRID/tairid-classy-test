          REQUIRED_EXTRACTION_COLUMNS = [
              "extraction_id",
              "candidate_id",
              "paper_or_source_url",
              "measurement_label",
              "redshift",
              "observable",
              "observed_value",
              "uncertainty_or_covariance_reference",
              "data_vector_reference",
              "source_role",
              "provenance_status",
              "extraction_status",
              "approval_status",
