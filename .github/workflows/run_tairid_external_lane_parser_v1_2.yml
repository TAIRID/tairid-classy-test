name: Run TAIRID External Lane Parser v1.2

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-external-lane-parser-v1-2:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_external_lane_parser_v1_2.py
          echo "v1.2 parser runner found."

      - name: Run TAIRID External Lane Parser v1.2
        run: |
          python run_tairid_external_lane_parser_v1_2.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-external-lane-parser-v1-2-output
          path: |
            tairid_external_lane_parser_v1_2_outputs/**
