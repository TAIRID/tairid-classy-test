name: TAIRID Cosmology v3.18 Anchor-Boundary Integration

on:
  workflow_dispatch:

jobs:
  anchor-boundary-integration:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scientific Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run TAIRID v3.18 anchor-boundary integration
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_18

          python - <<'PY'
          import csv
          import io
          import json
          import math
          import re
          import shutil
          import urllib.request
          import urllib.error
          import zipfile
          from datetime import datetime, timezone
          from pathlib import Path

          import numpy as np

          OUTDIR = Path("artifacts/tairid_cosmology_v3_18")
          DOWNLOADS = OUTDIR / "downloads"
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOADS.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_18_anchor_boundary_integration"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a cosmological model.",
              "This does not replace full DESI, Planck, HSC, Pantheon, KiDS, DES, or HSC likelihood analyses.",
              "This integrates passed ingestion products into a boundary-aware ledger.",
              "DESI DR1 BAO is treated as a reach/ruler chain-product diagnostic.",
              "Planck 2018 is treated as a CMB reference surface.",
              "HSC-Y3 is treated as a chain-only growth diagnostic because data vectors remain gated.",
              "No source is promoted beyond the boundary it actually passed."
          ]

          DESI_CHAIN_URLS = [
              "https://data.desi.lbl.gov/public/dr1/vac/dr1/bao-cosmo-params/v1.0/cobaya/base/desi-bao-all/chain.1.txt",
              "https://data.desi.lbl.gov/public/dr1/vac/dr1/bao-cosmo-params/v1.0/cobaya/base/desi-bao-all/chain.2.txt",
              "https://data.desi.lbl.gov/public/dr1/vac/dr1/bao-cosmo-params/v1.0/cobaya/base/desi-bao-all/chain.3.txt",
              "https://data.desi.lbl.gov/public/dr1/vac/dr1/bao-cosmo-params/v1.0/cobaya/base/desi-bao-all/chain.4.txt"
          ]

          PLANCK_ZIP_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
          PLANCK_MARGESTATS_PATH = "base/plikHM_TTTEEE_lowl_lowE/dist/base_plikHM_TTTEEE_lowl_lowE.margestats"
          PLANCK_COVMAT_PATH = "base/plikHM_TTTEEE_lowl_lowE/dist/base_plikHM_TTTEEE_lowl_lowE.covmat"
          PLANCK_PARAMNAMES_PATH = "base/plikHM_TTTEEE_lowl_lowE/base_plikHM_TTTEEE_lowl_lowE.paramnames"

          HSC_CHAIN_ZIP_URL = "https://hsc-release.mtk.nao.ac.jp/doc/wp-content/uploads/2025/11/chain-real-hscs19a-fid-dpz0.093-corrected-tol0.01-final.zip"
          HSC_GATED_DATA_VECTOR_URLS = [
              "https://hsc-release.mtk.nao.ac.jp/archive/filetree/shape_catalog_y3/dalal23/hsc_y3_fourier_space_data_vector.sacc",
              "https://hsc-release.mtk.nao.ac.jp/archive/filetree/shape_catalog_y3/li23/data/data_vector.fits",
              "https://hsc-release.mtk.nao.ac.jp/archive/filetree/shape_catalog_y3/dalal23/hsc_y3_fourier_cosmic_shear.txt"
          ]

          TARGET_PLANCK_PARAMS = [
              "H0", "S8", "sigma8", "omegam", "omegal",
              "omegabh2", "omegach2", "ns", "tau"
          ]

          TARGET_HSC_PARAMETERS = [
              "cosmological_parameters--omega_bh2",
              "cosmological_parameters--omega_ch2",
              "cosmological_parameters--ln_1010_a_s",
              "cosmological_parameters--n_s",
              "cosmological_parameters--omega_de",
              "COSMOLOGICAL_PARAMETERS--SIGMA_8",
              "prior",
              "like",
              "post",
              "weight"
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def download(url, path, timeout=300):
              path.parent.mkdir(parents=True, exist_ok=True)
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.18-anchor-boundary-integration/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed: HTTP {status}")

                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)

                  return {
                      "url": url,
                      "path": str(path),
                      "status": status,
                      "size_bytes": path.stat().st_size,
                      "content_type": resp.headers.get("Content-Type"),
                      "content_length_header": resp.headers.get("Content-Length")
                  }

          def probe_url(url, max_bytes=8192, timeout=45):
              result = {
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "bytes_read": 0,
                  "error": None
              }

              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v3.18-anchor-boundary-integration/1.0",
                          "Accept": "*/*",
                          "Range": f"bytes=0-{max_bytes - 1}"
                      }
                  )
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      body = resp.read(max_bytes)
                      status = getattr(resp, "status", None)
                      result.update({
                          "ok": status is not None and 200 <= status < 400,
                          "status": status,
                          "content_type": resp.headers.get("Content-Type"),
                          "content_length": resp.headers.get("Content-Length"),
                          "bytes_read": len(body)
                      })
              except Exception as e:
                  result.update({
                      "ok": False,
                      "status": getattr(e, "code", None),
                      "error": f"{type(e).__name__}: {e}"
                  })

              return result

          def weighted_quantile(values, weights, qs):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)

              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)
              values = values[mask]
              weights = weights[mask]

              if len(values) == 0:
                  return [None for _ in qs]

              if np.sum(weights) <= 0:
                  weights = np.ones_like(values)

              order = np.argsort(values)
              values = values[order]
              weights = weights[order]

              cumulative = np.cumsum(weights)
              cumulative = cumulative / cumulative[-1]

              return [float(np.interp(q, cumulative, values)) for q in qs]

          def summarize_parameter(values, weights):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)
              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)

              values = values[mask]
              weights = weights[mask]

              if len(values) == 0:
                  raise RuntimeError("No finite values available for parameter summary.")

              q16, q50, q84 = weighted_quantile(values, weights, [0.16, 0.50, 0.84])
              mean = float(np.average(values, weights=weights)) if np.sum(weights) > 0 else float(np.mean(values))

              return {
                  "weighted_mean": mean,
                  "q16": q16,
                  "q50": q50,
                  "q84": q84,
                  "sigma_half_width": (q84 - q16) / 2.0 if q16 is not None and q84 is not None else None,
                  "min": float(np.min(values)),
                  "max": float(np.max(values))
              }

          def split_chain_text(text):
              comment_lines = []
              data_lines = []

              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped:
                      continue
                  if stripped.startswith("#"):
                      comment_lines.append(stripped)
                  else:
                      data_lines.append(stripped)

              if not data_lines:
                  raise RuntimeError("No numeric chain rows found.")

              data = np.loadtxt(io.StringIO("\n".join(data_lines)))
              if data.ndim == 1:
                  data = data.reshape((1, -1))

              return comment_lines, data

          def token_is_numeric(token):
              try:
                  float(token)
                  return True
              except Exception:
                  return False

          def detect_chain_header(comment_lines, ncols):
              candidates = []

              for line in comment_lines:
                  candidate = line.lstrip("#").strip()
                  if not candidate:
                      continue

                  tokens = re.split(r"\s+", candidate)

                  if len(tokens) != ncols:
                      continue

                  numeric_token_count = sum(1 for t in tokens if token_is_numeric(t))
                  parameterish_count = sum(
                      1 for t in tokens
                      if "--" in t
                      or "COSMOLOGICAL" in t.upper()
                      or t in ["prior", "like", "post", "weight"]
                      or t in ["omm", "omegam", "rdrag", "H0rdrag", "hrdrag", "omegamh2"]
                  )

                  if numeric_token_count > 0:
                      continue

                  if parameterish_count < max(3, ncols // 5):
                      continue

                  candidates.append(tokens)

              if not candidates:
                  return [f"col_{i}" for i in range(ncols)], False

              return candidates[0], True

          def parse_chain_file(path):
              text = path.read_text(encoding="utf-8", errors="replace")
              comment_lines, data = split_chain_text(text)
              header, header_detected = detect_chain_header(comment_lines, data.shape[1])
              return header, data, header_detected

          def weight_array(header, data):
              col = {name: i for i, name in enumerate(header)}
              if "weight" in col:
                  return data[:, col["weight"]], "weight"
              return np.ones(data.shape[0]), None

          def parse_planck_margestats(text):
              rows = []

              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("Marginalized") or stripped.startswith("parameter"):
                      continue

                  parts = stripped.split()
                  if len(parts) < 12:
                      continue

                  name_raw = parts[0]
                  name = name_raw.rstrip("*")

                  try:
                      rows.append({
                          "parameter_raw": name_raw,
                          "parameter": name,
                          "mean": float(parts[1]),
                          "sddev": float(parts[2]),
                          "lower1": float(parts[3]),
                          "upper1": float(parts[4]),
                          "lower2": float(parts[6]),
                          "upper2": float(parts[7]),
                          "lower3": float(parts[9]),
                          "upper3": float(parts[10]),
                          "label": " ".join(parts[12:]) if len(parts) > 12 else ""
                      })
                  except Exception:
                      continue

              return rows

          def ingest_planck_reference():
              planck_dir = DOWNLOADS / "Planck_2018"
              planck_dir.mkdir(parents=True, exist_ok=True)

              zip_path = planck_dir / "COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
              dl = download(PLANCK_ZIP_URL, zip_path)

              with zipfile.ZipFile(zip_path, "r") as zf:
                  names = zf.namelist()

                  for required in [PLANCK_MARGESTATS_PATH, PLANCK_COVMAT_PATH, PLANCK_PARAMNAMES_PATH]:
                      if required not in names:
                          raise RuntimeError(f"Missing Planck product inside archive: {required}")

                  marg_text = zf.read(PLANCK_MARGESTATS_PATH).decode("utf-8", errors="replace")
                  cov_text = zf.read(PLANCK_COVMAT_PATH).decode("utf-8", errors="replace")
                  paramnames_text = zf.read(PLANCK_PARAMNAMES_PATH).decode("utf-8", errors="replace")

              all_rows = parse_planck_margestats(marg_text)
              target_set = {p.lower() for p in TARGET_PLANCK_PARAMS}
              target_rows = [r for r in all_rows if r["parameter"].lower() in target_set]

              params = [
                  line.strip().split()[0]
                  for line in paramnames_text.splitlines()
                  if line.strip()
              ]

              cov_lines = [
                  line for line in cov_text.splitlines()
                  if line.strip() and not line.strip().startswith("#")
              ]
              cov = np.loadtxt(io.StringIO("\n".join(cov_lines)))

              if cov.ndim != 2 or cov.shape[0] != cov.shape[1]:
                  raise RuntimeError("Planck covariance matrix did not parse as square.")

              param_lookup = {r["parameter"]: r for r in target_rows}

              target_csv = OUTDIR / "planck_reference_surface_v3_18.csv"
              with target_csv.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "source", "surface", "boundary_role",
                      "parameter", "mean", "sddev",
                      "lower1", "upper1", "lower2", "upper2",
                      "lower3", "upper3", "label"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()

                  for row in target_rows:
                      out = dict(row)
                      out["source"] = "Planck_2018"
                      out["surface"] = "cmb_reference"
                      out["boundary_role"] = "reference_surface_not_full_likelihood"
                      writer.writerow({k: out.get(k) for k in fieldnames})

              cov_csv = OUTDIR / "planck_reference_covmat_shape_v3_18.csv"
              with cov_csv.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(
                      f,
                      fieldnames=[
                          "source", "surface", "cov_rows", "cov_columns",
                          "paramname_count", "diag_min", "diag_max",
                          "symmetry_max_abs_delta"
                      ]
                  )
                  writer.writeheader()
                  writer.writerow({
                      "source": "Planck_2018",
                      "surface": "cmb_reference",
                      "cov_rows": int(cov.shape[0]),
                      "cov_columns": int(cov.shape[1]),
                      "paramname_count": len(params),
                      "diag_min": float(np.min(np.diag(cov))),
                      "diag_max": float(np.max(np.diag(cov))),
                      "symmetry_max_abs_delta": float(np.max(np.abs(cov - cov.T)))
                  })

              pass_flag = (
                  len(target_rows) >= 4
                  and "H0" in param_lookup
                  and "S8" in param_lookup
                  and cov.shape[0] == cov.shape[1]
              )

              return {
                  "source": "Planck_2018",
                  "surface": "cmb_reference",
                  "integration_pass": pass_flag,
                  "boundary_role": "reference_surface_not_full_likelihood",
                  "target_parameter_rows": len(target_rows),
                  "target_parameters_found": sorted(param_lookup.keys()),
                  "cov_shape": [int(cov.shape[0]), int(cov.shape[1])],
                  "reference_table": str(target_csv),
                  "cov_shape_table": str(cov_csv),
                  "download": dl,
                  "params": param_lookup,
                  "boundary": "Planck is integrated as a CMB reference surface only; not a full likelihood replacement and not proof of TAIRID."
              }

          def ingest_desi_reach(planck_params):
              desi_dir = DOWNLOADS / "DESI_DR1_BAO"
              desi_dir.mkdir(parents=True, exist_ok=True)

              all_data = []
              header_ref = None
              header_detected_all = True
              downloads = []
              shapes = []

              for url in DESI_CHAIN_URLS:
                  fname = url.rstrip("/").split("/")[-1]
                  path = desi_dir / fname
                  downloads.append(download(url, path))

                  header, data, header_detected = parse_chain_file(path)

                  if header_ref is None:
                      header_ref = header
                  elif len(header) != len(header_ref):
                      raise RuntimeError(f"DESI chain header length mismatch in {fname}")

                  header_detected_all = header_detected_all and header_detected
                  all_data.append(data)
                  shapes.append({
                      "file": fname,
                      "rows": int(data.shape[0]),
                      "columns": int(data.shape[1]),
                      "header_detected": header_detected
                  })

              combined = np.vstack(all_data)
              col = {name: i for i, name in enumerate(header_ref)}
              weights, weight_column = weight_array(header_ref, combined)

              summaries = []

              for param in ["hrdrag", "omm", "omegam", "omegamh2", "rdrag", "H0rdrag"]:
                  if param not in col:
                      continue

                  summary = summarize_parameter(combined[:, col[param]], weights)
                  summaries.append({
                      "source": "DESI_DR1_BAO",
                      "surface": "reach_geometry",
                      "boundary_role": "chain_derived_reach_ruler_diagnostic",
                      "parameter": param,
                      "row_count": int(combined.shape[0]),
                      "weighted_mean": summary["weighted_mean"],
                      "q16": summary["q16"],
                      "q50": summary["q50"],
                      "q84": summary["q84"],
                      "sigma_half_width": summary["sigma_half_width"],
                      "min": summary["min"],
                      "max": summary["max"],
                      "weight_column": weight_column,
                      "comparison_parameter": "",
                      "comparison_reference_mean": "",
                      "comparison_reference_sigma": "",
                      "pressure_vs_reference_z": "",
                      "boundary_note": "DESI BAO chain product; diagnostic until explicit likelihood-bound integration."
                  })

              derived_rows = []

              if "H0rdrag" in col and "rdrag" in col:
                  h0_derived = combined[:, col["H0rdrag"]] / combined[:, col["rdrag"]]
                  summary = summarize_parameter(h0_derived, weights)

                  planck_h0 = planck_params.get("H0")
                  pressure = None
                  combined_sigma = None

                  if planck_h0 and summary["sigma_half_width"] is not None:
                      combined_sigma = math.sqrt(summary["sigma_half_width"] ** 2 + planck_h0["sddev"] ** 2)
                      pressure = (summary["q50"] - planck_h0["mean"]) / combined_sigma

                  derived_rows.append({
                      "source": "DESI_DR1_BAO",
                      "surface": "reach_geometry",
                      "boundary_role": "derived_reach_ruler_diagnostic",
                      "parameter": "H0_derived_from_H0rdrag_over_rdrag",
                      "row_count": int(combined.shape[0]),
                      "weighted_mean": summary["weighted_mean"],
                      "q16": summary["q16"],
                      "q50": summary["q50"],
                      "q84": summary["q84"],
                      "sigma_half_width": summary["sigma_half_width"],
                      "min": summary["min"],
                      "max": summary["max"],
                      "weight_column": weight_column,
                      "comparison_parameter": "Planck_2018_H0",
                      "comparison_reference_mean": planck_h0["mean"] if planck_h0 else "",
                      "comparison_reference_sigma": planck_h0["sddev"] if planck_h0 else "",
                      "pressure_vs_reference_z": pressure if pressure is not None else "",
                      "boundary_note": "Derived from DESI BAO chain H0rdrag/rdrag; reach/ruler diagnostic only, not H0 solution."
                  })

              param_csv = OUTDIR / "desi_reach_ruler_chain_boundary_summary_v3_18.csv"
              with param_csv.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "source", "surface", "boundary_role",
                      "parameter", "row_count",
                      "weighted_mean", "q16", "q50", "q84",
                      "sigma_half_width", "min", "max", "weight_column",
                      "comparison_parameter", "comparison_reference_mean",
                      "comparison_reference_sigma", "pressure_vs_reference_z",
                      "boundary_note"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in summaries + derived_rows:
                      writer.writerow(row)

              shape_csv = OUTDIR / "desi_reach_ruler_chain_shape_v3_18.csv"
              with shape_csv.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(
                      f,
                      fieldnames=["file", "rows", "columns", "header_detected"]
                  )
                  writer.writeheader()
                  for row in shapes:
                      writer.writerow(row)

              pass_flag = (
                  combined.shape[0] > 1000
                  and combined.shape[1] > 5
                  and header_detected_all
                  and len(derived_rows) == 1
              )

              return {
                  "source": "DESI_DR1_BAO",
                  "surface": "reach_geometry",
                  "integration_pass": pass_flag,
                  "boundary_role": "chain_derived_reach_ruler_diagnostic",
                  "chain_file_count": len(DESI_CHAIN_URLS),
                  "combined_rows": int(combined.shape[0]),
                  "combined_columns": int(combined.shape[1]),
                  "parameter_summary_rows": len(summaries),
                  "derived_diagnostic_rows": len(derived_rows),
                  "parameter_summary_table": str(param_csv),
                  "chain_shape_table": str(shape_csv),
                  "downloads": downloads,
                  "boundary": "DESI is integrated as a reach/ruler chain diagnostic. It is not promoted to an H0 solution or full likelihood replacement."
              }

          def ingest_hsc_chain_only(planck_params):
              hsc_dir = DOWNLOADS / "HSC_Y3"
              hsc_dir.mkdir(parents=True, exist_ok=True)

              zip_path = hsc_dir / "hsc_y3_chain_candidate.zip"
              dl = download(HSC_CHAIN_ZIP_URL, zip_path)

              gated_probes = [probe_url(url) for url in HSC_GATED_DATA_VECTOR_URLS]

              with zipfile.ZipFile(zip_path, "r") as zf:
                  members = [name for name in zf.namelist() if name.lower().endswith(".txt")]
                  if not members:
                      raise RuntimeError("No TXT chain file found inside HSC ZIP.")

                  chain_member = members[0]
                  text = zf.read(chain_member).decode("utf-8", errors="replace")

              comment_lines, data = split_chain_text(text)
              header, header_detected = detect_chain_header(comment_lines, data.shape[1])
              col = {name: i for i, name in enumerate(header)}

              weights, weight_column = weight_array(header, data)

              parameter_rows = []

              for param in TARGET_HSC_PARAMETERS:
                  if param not in col:
                      continue

                  summary = summarize_parameter(data[:, col[param]], weights)

                  parameter_rows.append({
                      "source": "HSC_Y3",
                      "surface": "consolidation_growth",
                      "boundary_role": "chain_only_growth_diagnostic",
                      "parameter": param,
                      "row_count": int(data.shape[0]),
                      "weighted_mean": summary["weighted_mean"],
                      "q16": summary["q16"],
                      "q50": summary["q50"],
                      "q84": summary["q84"],
                      "sigma_half_width": summary["sigma_half_width"],
                      "min": summary["min"],
                      "max": summary["max"],
                      "weight_column": weight_column,
                      "comparison_parameter": "",
                      "comparison_reference_mean": "",
                      "comparison_reference_sigma": "",
                      "pressure_vs_reference_z": "",
                      "boundary_note": "HSC chain parameter; data vectors remain gated."
                  })

              derived_rows = []

              sigma_key = "COSMOLOGICAL_PARAMETERS--SIGMA_8"
              omega_de_key = "cosmological_parameters--omega_de"

              if sigma_key in col and omega_de_key in col:
                  sigma8 = data[:, col[sigma_key]]
                  omega_de = data[:, col[omega_de_key]]
                  omega_m_flat = 1.0 - omega_de

                  mask = (
                      np.isfinite(sigma8)
                      & np.isfinite(omega_m_flat)
                      & (omega_m_flat > 0)
                      & np.isfinite(weights)
                      & (weights >= 0)
                  )

                  derived_s8 = sigma8[mask] * np.sqrt(omega_m_flat[mask] / 0.3)
                  derived_weights = weights[mask]

                  summary = summarize_parameter(derived_s8, derived_weights)

                  planck_s8 = planck_params.get("S8")
                  pressure = None
                  combined_sigma = None

                  if planck_s8 and summary["sigma_half_width"] is not None:
                      combined_sigma = math.sqrt(summary["sigma_half_width"] ** 2 + planck_s8["sddev"] ** 2)
                      pressure = (summary["q50"] - planck_s8["mean"]) / combined_sigma

                  derived_rows.append({
                      "source": "HSC_Y3",
                      "surface": "consolidation_growth",
                      "boundary_role": "chain_only_derived_s8_diagnostic",
                      "parameter": "S8_flat_derived_from_sigma8_and_omega_de",
                      "row_count": int(len(derived_s8)),
                      "weighted_mean": summary["weighted_mean"],
                      "q16": summary["q16"],
                      "q50": summary["q50"],
                      "q84": summary["q84"],
                      "sigma_half_width": summary["sigma_half_width"],
                      "min": summary["min"],
                      "max": summary["max"],
                      "weight_column": weight_column,
                      "comparison_parameter": "Planck_2018_S8",
                      "comparison_reference_mean": planck_s8["mean"] if planck_s8 else "",
                      "comparison_reference_sigma": planck_s8["sddev"] if planck_s8 else "",
                      "pressure_vs_reference_z": pressure if pressure is not None else "",
                      "boundary_note": "Derived as sigma8 * sqrt((1 - omega_de)/0.3). Diagnostic only until HSC data-vector/likelihood ingestion is resolved."
                  })

              param_csv = OUTDIR / "hsc_chain_only_parameter_boundary_summary_v3_18.csv"
              with param_csv.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "source", "surface", "boundary_role",
                      "parameter", "row_count",
                      "weighted_mean", "q16", "q50", "q84",
                      "sigma_half_width", "min", "max", "weight_column",
                      "comparison_parameter", "comparison_reference_mean",
                      "comparison_reference_sigma", "pressure_vs_reference_z",
                      "boundary_note"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in parameter_rows + derived_rows:
                      writer.writerow(row)

              gated_csv = OUTDIR / "hsc_data_vector_gate_status_v3_18.csv"
              with gated_csv.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "url", "ok", "status", "content_type",
                      "content_length", "bytes_read", "error"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in gated_probes:
                      writer.writerow(row)

              header_csv = OUTDIR / "hsc_detected_chain_header_v3_18.csv"
              with header_csv.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=["column_index", "column_name"])
                  writer.writeheader()
                  for i, name in enumerate(header):
                      writer.writerow({"column_index": i, "column_name": name})

              gated_401_count = sum(1 for p in gated_probes if p["status"] == 401)

              pass_flag = (
                  data.shape[0] > 1000
                  and data.shape[1] >= 10
                  and header_detected
                  and sigma_key in col
                  and omega_de_key in col
                  and len(derived_rows) == 1
              )

              return {
                  "source": "HSC_Y3",
                  "surface": "consolidation_growth",
                  "integration_pass": pass_flag,
                  "boundary_role": "chain_only_growth_diagnostic",
                  "chain_member": chain_member,
                  "chain_rows": int(data.shape[0]),
                  "chain_columns": int(data.shape[1]),
                  "header_detected": header_detected,
                  "parameter_summary_rows": len(parameter_rows),
                  "derived_s8_rows": len(derived_rows),
                  "gated_probe_count": len(gated_probes),
                  "gated_401_count": gated_401_count,
                  "parameter_summary_table": str(param_csv),
                  "data_vector_gate_status_table": str(gated_csv),
                  "detected_header_table": str(header_csv),
                  "download": dl,
                  "boundary": "HSC is integrated as a repaired chain-only diagnostic. It is not a full growth anchor because data vectors remain gated."
              }

          def build_boundary_ledger(planck_result, desi_result, hsc_result):
              ledger_rows = []

              for param_name in ["H0", "S8", "sigma8", "omegam"]:
                  p = planck_result["params"].get(param_name)
                  if p:
                      ledger_rows.append({
                          "source": "Planck_2018",
                          "surface": "cmb_reference",
                          "boundary_role": "reference_surface_not_full_likelihood",
                          "parameter_or_entry": param_name,
                          "value": p["mean"],
                          "lower": p["lower1"],
                          "upper": p["upper1"],
                          "pressure_vs_reference_z": "",
                          "integrated": True,
                          "model_anchor_allowed": False,
                          "claim_allowed": "reference_only",
                          "boundary_note": "Planck parameter is available as a reference surface; this workflow does not run the full Planck likelihood."
                      })

              ledger_rows.append({
                  "source": "DESI_DR1_BAO",
                  "surface": "reach_geometry",
                  "boundary_role": "chain_derived_reach_ruler_diagnostic",
                  "parameter_or_entry": "DESI_BAO_chain_product",
                  "value": desi_result.get("combined_rows"),
                  "lower": "",
                  "upper": "",
                  "pressure_vs_reference_z": "",
                  "integrated": desi_result.get("integration_pass"),
                  "model_anchor_allowed": False,
                  "claim_allowed": "reach_ruler_diagnostic_only",
                  "boundary_note": desi_result.get("boundary")
              })

              ledger_rows.append({
                  "source": "HSC_Y3",
                  "surface": "consolidation_growth",
                  "boundary_role": "chain_only_growth_diagnostic",
                  "parameter_or_entry": "HSC_chain_only_product",
                  "value": hsc_result.get("chain_rows"),
                  "lower": "",
                  "upper": "",
                  "pressure_vs_reference_z": "",
                  "integrated": hsc_result.get("integration_pass"),
                  "model_anchor_allowed": False,
                  "claim_allowed": "chain_only_diagnostic_not_full_anchor",
                  "boundary_note": hsc_result.get("boundary")
              })

              ledger_csv = OUTDIR / "anchor_boundary_ledger_v3_18.csv"
              with ledger_csv.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "source", "surface", "boundary_role",
                      "parameter_or_entry", "value", "lower", "upper",
                      "pressure_vs_reference_z", "integrated",
                      "model_anchor_allowed", "claim_allowed", "boundary_note"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in ledger_rows:
                      writer.writerow(row)

              return ledger_rows, ledger_csv

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "previous_milestone": {
                  "v3_17_status": "targeted_ingestion_partial_pass_ready_for_limited_v3_18_boundary_integration",
                  "v3_17_1_status": "hsc_chain_parser_fix_passed_ready_for_v3_18_anchor_boundary_integration"
              },
              "truth_boundary": TRUTH_BOUNDARY,
              "source_results": {},
              "boundary_ledger": [],
              "gate_result": {}
          }

          print("TAIRID Cosmology v3.18 anchor-boundary integration")
          print("Truth boundary: boundary integration only; no model validation.")
          print()

          failed_gates = []

          try:
              planck_result = ingest_planck_reference()
              inventory["source_results"]["Planck_2018"] = {
                  k: v for k, v in planck_result.items() if k != "params"
              }
              print("Planck reference integration:")
              print(f"  pass: {planck_result['integration_pass']}")
              print(f"  target params: {planck_result['target_parameters_found']}")
              print()
          except Exception as e:
              failed_gates.append("planck_reference_integration_failed")
              planck_result = {
                  "source": "Planck_2018",
                  "surface": "cmb_reference",
                  "integration_pass": False,
                  "params": {},
                  "error": f"{type(e).__name__}: {e}"
              }
              inventory["source_results"]["Planck_2018"] = planck_result
              print(f"Planck failed: {type(e).__name__}: {e}")
              print()

          try:
              desi_result = ingest_desi_reach(planck_result.get("params", {}))
              inventory["source_results"]["DESI_DR1_BAO"] = desi_result
              print("DESI reach/ruler integration:")
              print(f"  pass: {desi_result['integration_pass']}")
              print(f"  rows: {desi_result['combined_rows']}")
              print(f"  derived diagnostics: {desi_result['derived_diagnostic_rows']}")
              print()
          except Exception as e:
              failed_gates.append("desi_reach_ruler_integration_failed")
              desi_result = {
                  "source": "DESI_DR1_BAO",
                  "surface": "reach_geometry",
                  "integration_pass": False,
                  "error": f"{type(e).__name__}: {e}"
              }
              inventory["source_results"]["DESI_DR1_BAO"] = desi_result
              print(f"DESI failed: {type(e).__name__}: {e}")
              print()

          try:
              hsc_result = ingest_hsc_chain_only(planck_result.get("params", {}))
              inventory["source_results"]["HSC_Y3"] = hsc_result
              print("HSC chain-only integration:")
              print(f"  pass: {hsc_result['integration_pass']}")
              print(f"  rows: {hsc_result['chain_rows']}")
              print(f"  gated 401: {hsc_result['gated_401_count']} / {hsc_result['gated_probe_count']}")
              print()
          except Exception as e:
              failed_gates.append("hsc_chain_only_integration_failed")
              hsc_result = {
                  "source": "HSC_Y3",
                  "surface": "consolidation_growth",
                  "integration_pass": False,
                  "error": f"{type(e).__name__}: {e}"
              }
              inventory["source_results"]["HSC_Y3"] = hsc_result
              print(f"HSC failed: {type(e).__name__}: {e}")
              print()

          try:
              ledger_rows, ledger_csv = build_boundary_ledger(planck_result, desi_result, hsc_result)
              inventory["boundary_ledger"] = ledger_rows
              inventory["boundary_ledger_table"] = str(ledger_csv)
          except Exception as e:
              failed_gates.append("boundary_ledger_write_failed")
              inventory["boundary_ledger_error"] = f"{type(e).__name__}: {e}"

          passed_sources = [
              name for name, result in inventory["source_results"].items()
              if result.get("integration_pass") is True
          ]

          if len(passed_sources) < 3:
              failed_gates.append("fewer_than_three_boundary_sources_integrated")

          if not failed_gates:
              readiness_label = "anchor_boundary_integration_passed_ready_for_v3_19_unified_surface_ledger"
          else:
              readiness_label = "anchor_boundary_integration_needs_followup"

          next_step = (
              "Build v3.19 unified surface ledger: merge KiDS chain-derived growth anchors, Pantheon reach diagnostic, DESI reach/ruler diagnostic, Planck CMB reference, and HSC chain-only diagnostic into one audited surface ledger without promoting diagnostic-only rows."
              if not failed_gates
              else "Fix failed boundary integration component before building the unified surface ledger."
          )

          inventory["gate_result"] = {
              "failed_gates": failed_gates,
              "readiness_label": readiness_label,
              "passed_sources": passed_sources,
              "model_claim_allowed": False,
              "next_allowed_step": next_step
          }

          summary_csv = OUTDIR / "anchor_boundary_integration_summary_v3_18.csv"
          with summary_csv.open("w", newline="", encoding="utf-8") as f:
              fieldnames = [
                  "source", "surface", "integration_pass",
                  "boundary_role", "primary_count",
                  "model_anchor_allowed", "boundary"
              ]
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()

              for name, result in inventory["source_results"].items():
                  primary_count = (
                      result.get("combined_rows")
                      or result.get("target_parameter_rows")
                      or result.get("chain_rows")
                  )
                  writer.writerow({
                      "source": name,
                      "surface": result.get("surface"),
                      "integration_pass": result.get("integration_pass"),
                      "boundary_role": result.get("boundary_role"),
                      "primary_count": primary_count,
                      "model_anchor_allowed": False,
                      "boundary": result.get("boundary") or result.get("error")
                  })

          json_path = OUTDIR / "tairid_cosmology_v3_18_anchor_boundary_integration.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.18 — Anchor-Boundary Integration")
          md.append("")
          md.append(f"Created UTC: `{inventory['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(failed_gates) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v3.18 integrates the products that passed v3.17 and v3.17.1 into a boundary-aware ledger.")
          md.append("")
          md.append("- Planck 2018 is integrated as a CMB reference surface.")
          md.append("- DESI DR1 BAO is integrated as a reach/ruler chain diagnostic.")
          md.append("- HSC-Y3 is integrated as a repaired chain-only growth diagnostic.")
          md.append("- No row is promoted beyond the boundary it passed.")
          md.append("")
          md.append("## Results")
          md.append("")
          md.append("| Source | Surface | Integration pass | Boundary role |")
          md.append("|---|---|---:|---|")
          for name, result in inventory["source_results"].items():
              md.append(
                  f"| {name} | {result.get('surface')} | {result.get('integration_pass')} | {result.get('boundary_role')} |"
              )
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `planck_reference_surface_v3_18.csv`")
          md.append("- `planck_reference_covmat_shape_v3_18.csv`")
          md.append("- `desi_reach_ruler_chain_boundary_summary_v3_18.csv`")
          md.append("- `desi_reach_ruler_chain_shape_v3_18.csv`")
          md.append("- `hsc_chain_only_parameter_boundary_summary_v3_18.csv`")
          md.append("- `hsc_data_vector_gate_status_v3_18.csv`")
          md.append("- `hsc_detected_chain_header_v3_18.csv`")
          md.append("- `anchor_boundary_ledger_v3_18.csv`")
          md.append("- `anchor_boundary_integration_summary_v3_18.csv`")
          md.append("- `tairid_cosmology_v3_18_anchor_boundary_integration.json`")
          md.append("- `tairid_cosmology_v3_18_anchor_boundary_integration.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_18_anchor_boundary_integration.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.18 anchor-boundary integration artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-18-anchor-boundary-integration
          path: artifacts/tairid_cosmology_v3_18/
