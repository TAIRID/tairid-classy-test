          md.append(f"Warnings: `{', '.join(warnings) if warnings else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v4.1 showed that the S8/growth direction is negative across KiDS, DES, and HSC, with uneven strength.")
          md.append("")
          md.append("v4.2 asks whether that pressure lives in S8 as a combined surface, in sigma8, in Omega_m, or in a tradeoff between them.")
          md.append("")
          md.append("This workflow computes Planck S8, sigma8, and Omega_m directly from the Planck chain. DES is decomposed because published DES Y3 gives both S8 and Omega_m. KiDS and HSC remain S8-only here until direct posterior products or published decomposition values are added.")
          md.append("")
          md.append("## Planck chain axis summary")
          md.append("")
          md.append("| Axis | q16 | q50 | q84 | sigma 68 |")
          md.append("|---|---:|---:|---:|---:|")
          for axis, summary in planck_axis_summary.items():
              md.append(
                  f"| `{axis}` | `{summary['q16']:.12f}` | `{summary['q50']:.12f}` | "
                  f"`{summary['q84']:.12f}` | `{summary['sigma_68']:.12f}` |"
              )
          md.append("")
          md.append("## Decomposition rows")
          md.append("")
          md.append("| Row | Family | Axis | Obs value | Planck value | Pressure z | Direction | Strength | Status |")
          md.append("|---|---|---|---:|---:|---:|---|---|---|")
          for row in decomposition_rows:
              md.append(
                  f"| `{row['row_id']}` | `{row['family']}` | `{row['axis']}` | "
                  f"`{row['observable_value']:.12f}` | `{row['planck_value']:.12f}` | "
                  f"`{row['pressure_z']:.12f}` | `{row['direction']}` | `{row['strength']}` | `{row['axis_status']}` |"
              )
          md.append("")
          md.append("## Decomposition readiness")
          md.append("")
          md.append("| Row | Family | Status | Needed next |")
          md.append("|---|---|---|---|")
          for row in readiness_rows:
              md.append(
                  f"| `{row['row_id']}` | `{row['family']}` | `{row['decomposition_status']}` | `{row['needed_next']}` |"
              )
          md.append("")
          md.append("## Interpretation")
          md.append("")
          md.append(decomposition_interpretation)
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `planck_axis_summary_v4_2.csv`")
          md.append("- `decomposition_rows_v4_2.csv`")
          md.append("- `decomposition_readiness_v4_2.csv`")
          md.append("- `source_ledger_v4_2.csv`")
          md.append("- `interpretation_boundaries_v4_2.csv`")
          md.append("- `tairid_cosmology_v4_2_s8_sigma8_omegam_decomposition.json`")
          md.append("- `tairid_cosmology_v4_2_s8_sigma8_omegam_decomposition.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v4_2_s8_sigma8_omegam_decomposition.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("Coverage summary:")
          print(json.dumps(audit["coverage_summary"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

