          json_path = OUTDIR / "tairid_cosmology_v4_2_s8_sigma8_omegam_decomposition.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          with (OUTDIR / "planck_axis_summary_v4_2.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["axis", "q16", "q50", "q84", "sigma_68", "weighted_mean", "weighted_std"])
              writer.writeheader()
              for axis, summary in planck_axis_summary.items():
                  writer.writerow({"axis": axis, **summary})

          with (OUTDIR / "decomposition_rows_v4_2.csv").open("w", newline="", encoding="utf-8") as f:
              fieldnames = [
                  "row_id",
                  "family",
                  "axis",
                  "observable_value",
                  "observable_sigma_used",
                  "planck_value",
                  "planck_sigma",
                  "delta_observable_minus_planck",
                  "combined_sigma",
                  "pressure_z",
                  "direction",
                  "strength",
                  "axis_status"
              ]
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              for row in decomposition_rows:
