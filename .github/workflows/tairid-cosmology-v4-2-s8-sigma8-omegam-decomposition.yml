              ]
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              for row in readiness_rows:
                  writer.writerow(row)

          with (OUTDIR / "source_ledger_v4_2.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["source_id", "source_name", "source_url", "used_for"])
              writer.writeheader()
              for row in SOURCE_LEDGER:
