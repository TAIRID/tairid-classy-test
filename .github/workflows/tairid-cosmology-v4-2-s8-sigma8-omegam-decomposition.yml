                  "omega_fallback_used": planck_loaded["omega_fallback_used"],
                  "skipped_line_count": planck_loaded["skipped_line_count"]
              },
              "planck_axis_summary": planck_axis_summary,
              "growth_inputs": GROWTH_INPUTS,
              "decomposition_rows": decomposition_rows,
              "readiness_rows": readiness_rows,
              "decomposition_interpretation": decomposition_interpretation,
              "coverage_summary": {
                  "active_families_with_decomposition": active_families_with_decomposition,
                  "s8_negative_families": s8_negative_families,
                  "omega_positive_decomposition_rows": [r["row_id"] for r in omega_positive_rows],
                  "sigma8_negative_decomposition_rows": [r["row_id"] for r in sigma8_negative_rows]
              },
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
