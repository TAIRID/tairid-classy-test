name: TAIRID Cosmology v4.2 S8 Sigma8 Omega_m Decomposition

on:
  workflow_dispatch:

jobs:
  s8-sigma8-omegam-decomposition:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.2 S8 sigma8 Omega_m decomposition
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_2_s8_sigma8_omegam_decomposition

          python - <<'PY'
          import csv
          import json
          import math
          import re
          import shutil
          import urllib.request
          import zipfile
          from datetime import datetime, timezone
          from pathlib import Path
          from tempfile import TemporaryDirectory

          OUTDIR = Path("artifacts/tairid_cosmology_v4_2_s8_sigma8_omegam_decomposition")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_2_s8_sigma8_omegam_decomposition"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior, or model comparison.",
              "This does not combine KiDS, DES, and HSC into one posterior.",
              "This does not claim full-family sigma8/Omega_m decomposition because KiDS and HSC direct posterior decomposition inputs are not active here.",
              "This is a diagnostic decomposition audit: it asks whether the available pressure appears on S8 alone, on sigma8, on Omega_m, or on a combination surface.",
              "A pass means the decomposition audit ran and preserved boundaries, not that TAIRID is validated."
          ]

          PLANCK_CHAIN_URL = (
              "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/"
              "COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
          )

          ZIP_PATH = OUTDIR / "COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"

          SIGMA8_ALIASES = {"sigma8", "sigma_8", "sig8"}
          OMEGAM_ALIASES = {"omegam", "omega_m", "omegam0", "omega_m_0", "omega_matter", "om"}
          DIRECT_S8_ALIASES = {"s8", "s_8", "s8omegamp5", "sigma8omegam05", "sigma8_omegam_0p5"}
          H0_ALIASES = {"h0", "hubble", "hubble0"}

          SOURCE_LEDGER = [
              {
                  "source_id": "planck_2018_pr3_cosmoparams",
                  "source_name": "Planck 2018 PR3 baseline cosmological parameter chain product",
                  "source_url": PLANCK_CHAIN_URL,
                  "used_for": "Planck chain-derived S8, sigma8, and Omega_m medians and widths."
              },
              {
                  "source_id": "des_y3_3x2pt_combined",
                  "source_name": "DES Year 3 3x2pt combined large-scale-structure constraints",
                  "source_url": "https://www.darkenergysurvey.org/des-year-3-cosmology-results-papers/",
                  "used_for": "DES Y3 S8 = 0.776 +/- 0.017 and Omega_m = 0.339 +0.032 -0.031."
              },
              {
                  "source_id": "kids_1000_fiducial_cosmic_shear",
                  "source_name": "KiDS-1000 cosmic shear public result",
                  "source_url": "https://kids.strw.leidenuniv.nl/DR4/KiDS-1000_cosmicshear.php",
                  "used_for": "S8-only row carried from v4.1; no active sigma8/Omega_m decomposition in this workflow."
              },
              {
                  "source_id": "hsc_y3_cosmic_shear_power_spectra",
                  "source_name": "HSC-Y3 cosmic shear power spectra result",
                  "source_url": "https://arxiv.org/abs/2304.00701",
                  "used_for": "S8-only row carried from v4.1; no active sigma8/Omega_m decomposition in this workflow."
              }
          ]

          GROWTH_INPUTS = [
              {
                  "row_id": "kids1000_fiducial_cosmic_shear",
                  "family": "KiDS",
                  "s8": 0.759,
                  "s8_sigma_plus": 0.024,
                  "s8_sigma_minus": 0.021,
                  "omegam": None,
                  "omegam_sigma_plus": None,
                  "omegam_sigma_minus": None,
                  "decomposition_status": "s8_only_decomposition_blocked_until_direct_posterior_or_published_omegam_sigma8"
              },
              {
                  "row_id": "des_y3_3x2pt_combined",
                  "family": "DES",
                  "s8": 0.776,
                  "s8_sigma_plus": 0.017,
                  "s8_sigma_minus": 0.017,
                  "omegam": 0.339,
                  "omegam_sigma_plus": 0.032,
                  "omegam_sigma_minus": 0.031,
                  "decomposition_status": "s8_and_omegam_available_sigma8_reconstructed"
              },
              {
                  "row_id": "hsc_y3_cosmic_shear_power_spectra",
                  "family": "HSC",
                  "s8": 0.776,
                  "s8_sigma_plus": 0.032,
                  "s8_sigma_minus": 0.033,
                  "omegam": None,
                  "omegam_sigma_plus": None,
                  "omegam_sigma_minus": None,
                  "decomposition_status": "s8_only_decomposition_blocked_until_direct_posterior_or_published_omegam_sigma8"
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def finite(x):
              try:
                  return math.isfinite(float(x))
              except Exception:
                  return False

          def normalize_param_name(name):
              token = str(name).strip().split()[0]
              token = token.rstrip("*")
              token = token.replace("\\", "")
              token = token.replace("Omega", "omega")
              token = token.replace("{", "").replace("}", "")
              token = token.replace("/", "_")
              token = token.lower()
              token = re.sub(r"[^a-z0-9_]+", "", token)
              return token

          def read_paramnames(path):
              names = []
              for raw in Path(path).read_text(errors="ignore").splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  names.append(normalize_param_name(line.split()[0]))
              return names

          def find_column(names, aliases):
              normalized_to_original = {normalize_param_name(name): name for name in names}
              for alias in aliases:
                  alias_norm = normalize_param_name(alias)
                  if alias_norm in normalized_to_original:
                      return normalized_to_original[alias_norm]
              return None

          def weighted_quantile(values, quantiles, weights):
              pairs = []
              for v, w in zip(values, weights):
                  if finite(v) and finite(w) and float(w) > 0:
                      pairs.append((float(v), float(w)))

              if not pairs:
                  raise ValueError("No finite positive-weight samples remained.")

              pairs.sort(key=lambda x: x[0])
              total_weight = sum(w for _, w in pairs)
              results = []

              for q in quantiles:
                  target = float(q) * total_weight
                  cumulative = 0.0
                  chosen = pairs[-1][0]
                  for value, weight in pairs:
                      cumulative += weight
                      if cumulative >= target:
                          chosen = value
                          break
                  results.append(chosen)

              return results

          def weighted_mean_std(values, weights):
              pairs = []
              for v, w in zip(values, weights):
                  if finite(v) and finite(w) and float(w) > 0:
                      pairs.append((float(v), float(w)))

              if not pairs:
                  raise ValueError("No finite positive-weight samples remained.")

              total_weight = sum(w for _, w in pairs)
              mean = sum(v * w for v, w in pairs) / total_weight
              variance = sum(w * (v - mean) ** 2 for v, w in pairs) / total_weight
              return mean, math.sqrt(max(variance, 0.0))

          def download_url(url, path):
              request = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(request, timeout=180) as response:
                  with path.open("wb") as f:
                      shutil.copyfileobj(response, f)

          def score_param_file(path, names):
              joined = str(path).lower().replace("_", "")
              score = 0

              for token in ["base", "plik", "ttteee", "lowl", "lowe"]:
                  if token in joined:
                      score += 5

              name_set = set(names)
              if bool(name_set & SIGMA8_ALIASES):
                  score += 20
              if bool(name_set & OMEGAM_ALIASES):
                  score += 20
              if bool(name_set & DIRECT_S8_ALIASES):
                  score += 10
              if {"omegabh2", "omegach2"}.issubset(name_set) and bool(name_set & H0_ALIASES):
                  score += 8

              penalties = ["omegak", "mnu", "w_", "alens", "nnu", "neff", "running"]
              score -= sum(5 for p in penalties if p in joined)
              return score

          def possible_chain_paths_for_param_file(param_path):
              stem = param_path.stem
              parent = param_path.parent
              paths = []

              for candidate in parent.glob("*.txt"):
                  lower = candidate.name.lower()
                  if any(block in lower for block in ["margestats", "likestats", "minimum", "bestfit"]):
                      continue
                  if lower.startswith(stem.lower()) and re.search(r"(_|\.)[0-9]+\.txt$", lower):
                      paths.append(candidate)

              if not paths:
                  for candidate in parent.rglob("*.txt"):
                      lower = candidate.name.lower()
                      if any(block in lower for block in ["margestats", "likestats", "minimum", "bestfit"]):
                          continue
                      if stem.lower() in lower and re.search(r"(_|\.)[0-9]+\.txt$", lower):
                          paths.append(candidate)

              return sorted(set(paths))

          def derived_from_row(row, col_index, direct_s8_col, sigma8_col, omegam_col, omegabh2_col, omegach2_col, omeganuh2_col, h0_col):
              sigma8 = row[col_index[sigma8_col]]

              if omegam_col is not None:
                  omegam = row[col_index[omegam_col]]
              else:
                  h0_value = row[col_index[h0_col]]
                  h = h0_value / 100.0
                  physical_matter = row[col_index[omegabh2_col]] + row[col_index[omegach2_col]]
                  if omeganuh2_col is not None:
                      physical_matter += row[col_index[omeganuh2_col]]
                  omegam = physical_matter / (h * h)

              if direct_s8_col is not None:
                  s8 = row[col_index[direct_s8_col]]
              else:
                  s8 = sigma8 * math.sqrt(omegam / 0.3)

              return s8, sigma8, omegam

          def load_planck_chain(zip_path):
              with TemporaryDirectory() as tmp_name:
                  tmp = Path(tmp_name)
                  with zipfile.ZipFile(zip_path) as zf:
                      zf.extractall(tmp)

                  products = []

                  for param_path in tmp.rglob("*.paramnames"):
                      names = read_paramnames(param_path)
                      if not names:
                          continue

                      name_set = set(names)
                      has_sigma8 = bool(name_set & SIGMA8_ALIASES)
                      has_omegam = bool(name_set & OMEGAM_ALIASES)
                      has_physical_omega_fallback = (
                          {"omegabh2", "omegach2"}.issubset(name_set)
                          and bool(name_set & H0_ALIASES)
                      )

                      if not (has_sigma8 and (has_omegam or has_physical_omega_fallback)):
                          continue

                      chain_paths = possible_chain_paths_for_param_file(param_path)
                      if not chain_paths:
                          continue

                      products.append({
                          "param_path": param_path,
                          "names": names,
                          "chain_paths": chain_paths,
                          "score": score_param_file(param_path, names)
                      })

                  if not products:
                      raise FileNotFoundError("No compatible Planck chain with sigma8 and Omega_m or fallback columns was found.")

                  products.sort(key=lambda p: p["score"], reverse=True)
                  selected = products[0]

                  names = selected["names"]
                  n_params = len(names)
                  col_index = {name: i for i, name in enumerate(names)}

                  direct_s8_col = find_column(names, DIRECT_S8_ALIASES)
                  sigma8_col = find_column(names, SIGMA8_ALIASES)
                  omegam_col = find_column(names, OMEGAM_ALIASES)
                  omegabh2_col = find_column(names, {"omegabh2"})
                  omegach2_col = find_column(names, {"omegach2"})
                  omeganuh2_col = find_column(names, {"omeganuh2"})
                  h0_col = find_column(names, H0_ALIASES)

                  s8_samples = []
                  sigma8_samples = []
                  omegam_samples = []
                  weights = []
                  readable_chain_count = 0
                  skipped_line_count = 0

                  for chain_path in selected["chain_paths"]:
                      rows_loaded_this_file = 0

                      with chain_path.open("r", encoding="utf-8", errors="ignore") as f:
                          for line in f:
                              stripped = line.strip()
                              if not stripped or stripped.startswith("#"):
                                  continue

                              parts = stripped.split()
                              if len(parts) < n_params + 2:
                                  skipped_line_count += 1
                                  continue

                              try:
                                  weight = float(parts[0])
                                  row = [float(x) for x in parts[2:2 + n_params]]
                                  s8, sigma8, omegam = derived_from_row(
                                      row,
                                      col_index,
                                      direct_s8_col,
                                      sigma8_col,
                                      omegam_col,
                                      omegabh2_col,
                                      omegach2_col,
                                      omeganuh2_col,
                                      h0_col
                                  )
                              except Exception:
                                  skipped_line_count += 1
                                  continue

                              if finite(s8) and finite(sigma8) and finite(omegam) and finite(weight) and weight > 0:
                                  s8_samples.append(float(s8))
                                  sigma8_samples.append(float(sigma8))
                                  omegam_samples.append(float(omegam))
                                  weights.append(float(weight))
                                  rows_loaded_this_file += 1
                              else:
                                  skipped_line_count += 1

                      if rows_loaded_this_file > 0:
                          readable_chain_count += 1

                  if not s8_samples:
                      raise ValueError("No finite positive-weight Planck samples were loaded.")

                  return {
                      "s8_samples": s8_samples,
                      "sigma8_samples": sigma8_samples,
                      "omegam_samples": omegam_samples,
                      "weights": weights,
                      "selected_paramnames_path": str(selected["param_path"].relative_to(tmp)),
                      "selected_chain_count": len(selected["chain_paths"]),
                      "readable_chain_count": readable_chain_count,
                      "selected_score": selected["score"],
                      "candidate_product_count": len(products),
                      "available_columns": names,
                      "direct_s8_column": direct_s8_col,
                      "sigma8_column": sigma8_col,
                      "omegam_column": omegam_col,
                      "omega_fallback_used": omegam_col is None,
                      "skipped_line_count": skipped_line_count
                  }

          def summarize_axis(values, weights):
              q16, q50, q84 = weighted_quantile(values, [0.16, 0.50, 0.84], weights)
              mean, std = weighted_mean_std(values, weights)
              return {
                  "q16": q16,
                  "q50": q50,
                  "q84": q84,
                  "sigma_68": (q84 - q16) / 2.0,
                  "weighted_mean": mean,
                  "weighted_std": std
              }

          def directional_sigma(obs_value, obs_sigma_minus, obs_sigma_plus, ref_value):
              if ref_value >= obs_value:
                  return obs_sigma_plus
              return obs_sigma_minus

          def z_pressure(obs_value, obs_sigma, ref_value, ref_sigma):
              combined = math.sqrt(obs_sigma ** 2 + ref_sigma ** 2)
              delta = obs_value - ref_value
              z = delta / combined
              return delta, combined, z

          def classify_axis(delta, z):
              abs_z = abs(z)
              if abs(delta) < 1e-9 or abs_z < 0.25:
                  return "near_zero"
              if abs_z >= 2.5:
                  return "strong"
              if abs_z >= 1.5:
                  return "moderate"
              return "weak"

          def reconstruct_sigma8_from_s8_omegam(s8, omegam):
              return s8 / math.sqrt(omegam / 0.3)

          def finite_difference_sigma8_uncertainty(s8, s8_minus, s8_plus, omegam, om_minus, om_plus):
              center = reconstruct_sigma8_from_s8_omegam(s8, omegam)

              corners = []
              for s8_candidate in [s8 - s8_minus, s8 + s8_plus]:
                  for om_candidate in [omegam - om_minus, omegam + om_plus]:
                      if om_candidate > 0:
                          corners.append(reconstruct_sigma8_from_s8_omegam(s8_candidate, om_candidate))

              if not corners:
                  return None, None, center

              lower = max(0.0, center - min(corners))
              upper = max(0.0, max(corners) - center)
              return lower, upper, center

          print("Downloading Planck baseline chain product...")
          print(PLANCK_CHAIN_URL)
          download_url(PLANCK_CHAIN_URL, ZIP_PATH)
          print(f"Downloaded: {ZIP_PATH} ({ZIP_PATH.stat().st_size} bytes)")

          planck_loaded = load_planck_chain(ZIP_PATH)

          planck_s8 = summarize_axis(planck_loaded["s8_samples"], planck_loaded["weights"])
          planck_sigma8 = summarize_axis(planck_loaded["sigma8_samples"], planck_loaded["weights"])
          planck_omegam = summarize_axis(planck_loaded["omegam_samples"], planck_loaded["weights"])

          planck_axis_summary = {
              "S8": planck_s8,
              "sigma8": planck_sigma8,
              "Omega_m": planck_omegam
          }

          decomposition_rows = []
          readiness_rows = []

          for row in GROWTH_INPUTS:
              s8_sigma = directional_sigma(
                  row["s8"],
                  row["s8_sigma_minus"],
                  row["s8_sigma_plus"],
                  planck_s8["q50"]
              )
              s8_delta, s8_combined, s8_z = z_pressure(
                  row["s8"],
                  s8_sigma,
                  planck_s8["q50"],
                  planck_s8["sigma_68"]
              )

              decomposition_rows.append({
                  "row_id": row["row_id"],
                  "family": row["family"],
                  "axis": "S8",
                  "observable_value": row["s8"],
                  "observable_sigma_used": s8_sigma,
                  "planck_value": planck_s8["q50"],
                  "planck_sigma": planck_s8["sigma_68"],
                  "delta_observable_minus_planck": s8_delta,
                  "combined_sigma": s8_combined,
                  "pressure_z": s8_z,
                  "direction": "negative" if s8_delta < 0 else "positive_or_zero",
                  "strength": classify_axis(s8_delta, s8_z),
                  "axis_status": "active"
              })

              if row["omegam"] is None:
                  readiness_rows.append({
                      "row_id": row["row_id"],
                      "family": row["family"],
                      "s8_available": True,
                      "omegam_available": False,
                      "sigma8_available_or_reconstructable": False,
                      "decomposition_status": row["decomposition_status"],
                      "needed_next": "direct posterior samples or published Omega_m and sigma8/derived sigma8 uncertainties"
                  })
                  continue

              om_sigma = directional_sigma(
                  row["omegam"],
                  row["omegam_sigma_minus"],
                  row["omegam_sigma_plus"],
                  planck_omegam["q50"]
              )
              om_delta, om_combined, om_z = z_pressure(
                  row["omegam"],
                  om_sigma,
                  planck_omegam["q50"],
                  planck_omegam["sigma_68"]
              )

              decomposition_rows.append({
                  "row_id": row["row_id"],
                  "family": row["family"],
                  "axis": "Omega_m",
                  "observable_value": row["omegam"],
                  "observable_sigma_used": om_sigma,
                  "planck_value": planck_omegam["q50"],
                  "planck_sigma": planck_omegam["sigma_68"],
                  "delta_observable_minus_planck": om_delta,
                  "combined_sigma": om_combined,
                  "pressure_z": om_z,
                  "direction": "negative" if om_delta < 0 else "positive_or_zero",
                  "strength": classify_axis(om_delta, om_z),
                  "axis_status": "active"
              })

              sigma8_minus, sigma8_plus, sigma8_center = finite_difference_sigma8_uncertainty(
                  row["s8"],
                  row["s8_sigma_minus"],
                  row["s8_sigma_plus"],
                  row["omegam"],
                  row["omegam_sigma_minus"],
                  row["omegam_sigma_plus"]
              )

              if sigma8_minus is not None and sigma8_plus is not None:
                  sigma8_sigma = directional_sigma(
                      sigma8_center,
                      sigma8_minus,
                      sigma8_plus,
                      planck_sigma8["q50"]
                  )
                  sig_delta, sig_combined, sig_z = z_pressure(
                      sigma8_center,
                      sigma8_sigma,
                      planck_sigma8["q50"],
                      planck_sigma8["sigma_68"]
                  )

                  decomposition_rows.append({
                      "row_id": row["row_id"],
                      "family": row["family"],
                      "axis": "sigma8_reconstructed_from_S8_and_Omega_m",
                      "observable_value": sigma8_center,
                      "observable_sigma_used": sigma8_sigma,
                      "planck_value": planck_sigma8["q50"],
                      "planck_sigma": planck_sigma8["sigma_68"],
                      "delta_observable_minus_planck": sig_delta,
                      "combined_sigma": sig_combined,
                      "pressure_z": sig_z,
                      "direction": "negative" if sig_delta < 0 else "positive_or_zero",
                      "strength": classify_axis(sig_delta, sig_z),
                      "axis_status": "active_reconstructed_not_direct_chain"
                  })

              readiness_rows.append({
                  "row_id": row["row_id"],
                  "family": row["family"],
                  "s8_available": True,
                  "omegam_available": True,
                  "sigma8_available_or_reconstructable": sigma8_minus is not None,
                  "decomposition_status": row["decomposition_status"],
                  "needed_next": "direct DES posterior chain would be stronger than finite-difference reconstruction"
              })

          active_families_with_decomposition = sorted(set(
              r["family"] for r in readiness_rows
              if r["omegam_available"] and r["sigma8_available_or_reconstructable"]
          ))

          s8_negative_families = sorted(set(
              r["family"] for r in decomposition_rows
              if r["axis"] == "S8" and r["delta_observable_minus_planck"] < 0
          ))

          omega_positive_rows = [
              r for r in decomposition_rows
              if r["axis"] == "Omega_m" and r["delta_observable_minus_planck"] > 0
          ]

          sigma8_negative_rows = [
              r for r in decomposition_rows
              if r["axis"] == "sigma8_reconstructed_from_S8_and_Omega_m" and r["delta_observable_minus_planck"] < 0
          ]

          failed_gates = []
          warnings = []

          if len(s8_negative_families) < 3:
              failed_gates.append("s8_negative_direction_not_preserved_across_three_families")

          if len(active_families_with_decomposition) < 1:
              failed_gates.append("no_family_has_active_omega_sigma_decomposition")

          if len(active_families_with_decomposition) < 2:
              warnings.append("full_family_decomposition_not_available_yet_only_DES_has_active_omegam_sigma8_reconstruction")

          if omega_positive_rows and sigma8_negative_rows:
              decomposition_interpretation = (
                  "In the active DES decomposition row, S8 is negative while Omega_m is higher than Planck and reconstructed sigma8 is lower than Planck. "
                  "That means the available decomposed pressure is not explained by low Omega_m alone; it is mainly an amplitude/sigma8-side deficit after accounting for Omega_m."
              )
          elif sigma8_negative_rows:
              decomposition_interpretation = (
                  "In the active decomposition rows, reconstructed sigma8 is lower than Planck. "
                  "This supports an amplitude-side contribution, but family coverage remains incomplete."
              )
          else:
              decomposition_interpretation = (
                  "The audit did not find an active sigma8-side negative decomposition row. "
                  "Do not infer where the pressure lives until direct posterior products are added."
              )

          if failed_gates:
              readiness_label = "s8_sigma8_omegam_decomposition_needs_followup"
              next_step = (
                  "Do not proceed to integrated reach/consolidation yet. Repair direct decomposition inputs first."
              )
          else:
              readiness_label = "s8_sigma8_omegam_decomposition_passed_with_family_coverage_warning"
              next_step = (
                  "Proceed to v4.3 direct posterior product inventory for KiDS/DES/HSC. "
                  "The decomposition audit ran, but full-family sigma8/Omega_m decomposition needs direct chains or published joint constraints."
              )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "truth_boundary": TRUTH_BOUNDARY,
              "source_ledger": SOURCE_LEDGER,
              "planck_chain_product": {
                  "download_url": PLANCK_CHAIN_URL,
                  "downloaded_bytes": ZIP_PATH.stat().st_size,
                  "selected_paramnames_path": planck_loaded["selected_paramnames_path"],
                  "selected_chain_count": planck_loaded["selected_chain_count"],
                  "readable_chain_count": planck_loaded["readable_chain_count"],
