          with (OUTDIR / "interpretation_boundaries_v4_2.csv").open("w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=["interpretation_id", "status", "wording", "boundary"])
              writer.writeheader()
              writer.writerows([
                  {
                      "interpretation_id": "allowed_decomposition_audit",
                      "status": "allowed_with_boundary",
                      "wording": "The available S8 pressure rows were compared against Planck chain-derived S8, sigma8, and Omega_m where decomposition inputs exist.",
                      "boundary": "Diagnostic decomposition audit only, not validation."
                  },
                  {
                      "interpretation_id": "allowed_des_decomposition_statement",
                      "status": "allowed_with_boundary",
                      "wording": "DES has enough published summary information for a limited S8/Omega_m/reconstructed-sigma8 decomposition.",
                      "boundary": "DES reconstruction is not a replacement for direct DES posterior-chain parsing."
                  },
