          with (OUTDIR / "decomposition_readiness_v4_2.csv").open("w", newline="", encoding="utf-8") as f:
              fieldnames = [
                  "row_id",
                  "family",
                  "s8_available",
                  "omegam_available",
                  "sigma8_available_or_reconstructable",
                  "decomposition_status",
