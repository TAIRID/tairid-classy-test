name: TAIRID Cosmology v3.13 Covariance-Aware Two-Source Prototype

on:
  workflow_dispatch:

jobs:
  covariance-aware-two-source-prototype:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scientific Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy astropy

      - name: Run TAIRID v3.13 covariance-aware two-source prototype
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_13

          python - <<'PY'
          import csv
          import json
          import math
          import re
          import shutil
          import statistics
          import tarfile
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          import numpy as np
          from astropy.io import fits

          OUTDIR = Path("artifacts/tairid_cosmology_v3_13")
          DOWNLOADS = OUTDIR / "downloads"
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOADS.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_13_covariance_aware_two_source_prototype"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full TAIRID cosmological model.",
              "This does not replace full likelihood analyses.",
              "Pantheon+SH0ES is used here as a covariance-aware reach/geometry prototype surface.",
              "KiDS-1000 is used here as a chain-level consolidation/growth prototype surface.",
              "The Planck-like S8 reference is a configurable comparison anchor, not a full Planck likelihood.",
              "A pass means the two-source covariance-aware prototype is technically ready for deeper modeling, not scientifically validated."
          ]

          URLS = {
              "pantheon_table": "https://raw.githubusercontent.com/PantheonPlusSH0ES/DataRelease/main/Pantheon%2B_Data/4_DISTANCES_AND_COVAR/Pantheon%2BSH0ES.dat",
              "pantheon_cov": "https://raw.githubusercontent.com/PantheonPlusSH0ES/DataRelease/main/Pantheon%2B_Data/4_DISTANCES_AND_COVAR/Pantheon%2BSH0ES_STAT%2BSYS.cov",
              "kids_tarball": "https://kids.strw.leidenuniv.nl/DR4/data_files/KiDS1000_cosmic_shear_data_release.tgz"
          }

          # This is a comparison anchor, not a full Planck likelihood.
          PLANCK_LIKE_S8_REFERENCE = 0.834
          PLANCK_LIKE_S8_SIGMA = 0.016

          # Fixed fiducial LCDM curve used only to produce covariance-aware SN residual-shape diagnostics.
          # The absolute SN intercept is analytically marginalized/fitted away by GLS below.
          FIDUCIAL_H0 = 70.0
          FIDUCIAL_OMEGA_M = 0.30
          C_LIGHT_KM_S = 299792.458

          PANTHEON_BINS = [
              (0.001, 0.010),
              (0.010, 0.023),
              (0.023, 0.050),
              (0.050, 0.100),
              (0.100, 0.200),
              (0.200, 0.500),
              (0.500, 1.000),
              (1.000, 2.500)
          ]

          KIDS_STATS = ["xipm", "bp", "cosebis"]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def download(url, path, timeout=180):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.13-covariance-aware-two-source-prototype/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed: HTTP {status}")
                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)
                  return {
                      "url": url,
                      "path": str(path),
                      "status": status,
                      "size_bytes": path.stat().st_size,
                      "content_type": resp.headers.get("Content-Type"),
                      "content_length_header": resp.headers.get("Content-Length")
                  }

          def safe_float(value):
              try:
                  x = float(value)
                  if math.isnan(x) or math.isinf(x):
                      return None
                  return x
              except Exception:
                  return None

          def parse_pantheon_table(path):
              with open(path, "r", encoding="utf-8", errors="replace") as f:
                  header = f.readline().strip().split()
                  rows = []
                  for line in f:
                      line = line.strip()
                      if not line:
                          continue
                      parts = line.split()
                      if len(parts) == len(header):
                          rows.append(dict(zip(header, parts)))

              required = [
                  "CID", "zHD", "zCMB", "zHEL",
                  "MU_SH0ES", "MU_SH0ES_ERR_DIAG",
                  "IS_CALIBRATOR", "USED_IN_SH0ES_HF"
              ]
              missing = [c for c in required if c not in header]

              normalized = []
              for i, row in enumerate(rows):
                  normalized.append({
                      "row_index": i,
                      "CID": row.get("CID"),
                      "zHD": safe_float(row.get("zHD")),
                      "zCMB": safe_float(row.get("zCMB")),
                      "zHEL": safe_float(row.get("zHEL")),
                      "MU_SH0ES": safe_float(row.get("MU_SH0ES")),
                      "MU_SH0ES_ERR_DIAG": safe_float(row.get("MU_SH0ES_ERR_DIAG")),
                      "IS_CALIBRATOR": int(float(row.get("IS_CALIBRATOR", 0))),
                      "USED_IN_SH0ES_HF": int(float(row.get("USED_IN_SH0ES_HF", 0)))
                  })

              return header, normalized, missing

          def parse_pantheon_covariance(path, n_expected):
              text = path.read_text(encoding="utf-8", errors="replace")
              arr = np.fromstring(text, sep=" ")

              if arr.size < 2:
                  raise RuntimeError("Pantheon covariance file did not parse into numeric values.")

              n = int(arr[0])
              values = arr[1:]

              if n != n_expected:
                  raise RuntimeError(f"Pantheon covariance dimension {n} does not match table rows {n_expected}.")
              if values.size != n * n:
                  raise RuntimeError(f"Pantheon covariance has {values.size} values after dimension; expected {n*n}.")

              cov = values.reshape((n, n))
              diag = np.diag(cov)

              return cov, {
                  "dimension": int(n),
                  "value_count": int(values.size),
                  "diag_min": float(np.min(diag)),
                  "diag_max": float(np.max(diag)),
                  "diag_mean": float(np.mean(diag)),
                  "diag_positive_count": int(np.sum(diag > 0)),
                  "trace": float(np.trace(cov)),
                  "symmetry_max_abs_delta": float(np.max(np.abs(cov - cov.T)))
              }

          def lcdm_mu(z_values, h0=FIDUCIAL_H0, omega_m=FIDUCIAL_OMEGA_M):
              z_values = np.asarray(z_values, dtype=float)
              out = np.zeros_like(z_values)

              def e_inv(z):
                  return 1.0 / math.sqrt(omega_m * (1.0 + z) ** 3 + (1.0 - omega_m))

              for i, z in enumerate(z_values):
                  if z <= 0:
                      out[i] = np.nan
                      continue

                  # Simpson integration with a modest fixed grid. Good enough for this diagnostic prototype.
                  n = 600
                  if n % 2 == 1:
                      n += 1
                  xs = np.linspace(0.0, z, n + 1)
                  ys = np.array([e_inv(float(x)) for x in xs])
                  h = z / n
                  integral = h / 3.0 * (ys[0] + ys[-1] + 4.0 * np.sum(ys[1:-1:2]) + 2.0 * np.sum(ys[2:-2:2]))

                  d_l_mpc = (C_LIGHT_KM_S / h0) * (1.0 + z) * integral
                  out[i] = 5.0 * math.log10(d_l_mpc) + 25.0

              return out

          def solve_covariance_weighted_offset(residuals, cov):
              ones = np.ones(len(residuals))
              inv_cov_residuals = np.linalg.solve(cov, residuals)
              inv_cov_ones = np.linalg.solve(cov, ones)

              numerator = float(ones @ inv_cov_residuals)
              denominator = float(ones @ inv_cov_ones)

              if denominator <= 0:
                  raise RuntimeError("Invalid GLS denominator for SN intercept fit.")

              offset = numerator / denominator
              offset_sigma = math.sqrt(1.0 / denominator)
              centered = residuals - offset

              chi2 = float(centered @ np.linalg.solve(cov, centered))
              dof = int(len(residuals) - 1)

              return offset, offset_sigma, centered, chi2, dof

          def covariance_weighted_bin_mean(values, cov_sub):
              n = len(values)
              ones = np.ones(n)

              inv_cov_values = np.linalg.solve(cov_sub, values)
              inv_cov_ones = np.linalg.solve(cov_sub, ones)

              denominator = float(ones @ inv_cov_ones)
              if denominator <= 0:
                  raise RuntimeError("Invalid bin GLS denominator.")

              mean = float((ones @ inv_cov_values) / denominator)
              sigma = math.sqrt(1.0 / denominator)
              z_score = mean / sigma if sigma > 0 else None

              return mean, sigma, z_score

          def pantheon_covariance_aware_surface(rows, cov):
              usable = [
                  r for r in rows
                  if r["zHD"] is not None and r["MU_SH0ES"] is not None
              ]

              if len(usable) != len(rows):
                  raise RuntimeError("Pantheon table has unusable zHD or MU_SH0ES rows.")

              z = np.array([r["zHD"] for r in usable], dtype=float)
              mu_obs = np.array([r["MU_SH0ES"] for r in usable], dtype=float)
              mu_fid = lcdm_mu(z)

              if not np.all(np.isfinite(mu_fid)):
                  raise RuntimeError("LCDM fiducial mu calculation produced non-finite values.")

              raw_residual = mu_obs - mu_fid

              offset, offset_sigma, centered_residual, chi2, dof = solve_covariance_weighted_offset(raw_residual, cov)

              row_table = OUTDIR / "pantheon_covaware_sn_residuals.csv"
              with row_table.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "row_index", "CID", "zHD", "MU_SH0ES",
                      "fiducial_mu_LCDM",
                      "raw_residual_mu_minus_fiducial",
                      "gls_intercept_offset",
                      "centered_residual_after_offset"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for r, mf, rr, cr in zip(usable, mu_fid, raw_residual, centered_residual):
                      writer.writerow({
                          "row_index": r["row_index"],
                          "CID": r["CID"],
                          "zHD": r["zHD"],
                          "MU_SH0ES": r["MU_SH0ES"],
                          "fiducial_mu_LCDM": float(mf),
                          "raw_residual_mu_minus_fiducial": float(rr),
                          "gls_intercept_offset": float(offset),
                          "centered_residual_after_offset": float(cr)
                      })

              bin_rows = []
              for lo, hi in PANTHEON_BINS:
                  idx = np.where((z >= lo) & (z < hi))[0]
                  if len(idx) == 0:
                      bin_rows.append({
                          "z_min": lo,
                          "z_max": hi,
                          "count": 0,
                          "cov_weighted_mean_centered_residual": None,
                          "cov_weighted_sigma": None,
                          "z_score": None,
                          "sign": "empty"
                      })
                      continue

                  cov_sub = cov[np.ix_(idx, idx)]
                  vals = centered_residual[idx]
                  mean, sigma, z_score = covariance_weighted_bin_mean(vals, cov_sub)

                  if z_score is None:
                      sign = "unknown"
                  elif z_score > 0:
                      sign = "positive"
                  elif z_score < 0:
                      sign = "negative"
                  else:
                      sign = "zero"

                  bin_rows.append({
                      "z_min": lo,
                      "z_max": hi,
                      "count": int(len(idx)),
                      "mean_z": float(np.mean(z[idx])),
                      "cov_weighted_mean_centered_residual": mean,
                      "cov_weighted_sigma": sigma,
                      "z_score": z_score,
                      "sign": sign
                  })

              bin_table = OUTDIR / "pantheon_covaware_redshift_bin_pressure.csv"
              with bin_table.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "z_min", "z_max", "count", "mean_z",
                      "cov_weighted_mean_centered_residual",
                      "cov_weighted_sigma", "z_score", "sign"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in bin_rows:
                      writer.writerow(row)

              finite_bin_z = [
                  float(r["z_score"]) for r in bin_rows
                  if r["z_score"] is not None and math.isfinite(float(r["z_score"]))
              ]

              return {
                  "surface": "reach_geometry",
                  "source": "PantheonPlus_SH0ES",
                  "row_count": len(rows),
                  "fiducial_h0": FIDUCIAL_H0,
                  "fiducial_omega_m": FIDUCIAL_OMEGA_M,
                  "gls_intercept_offset": offset,
                  "gls_intercept_offset_sigma": offset_sigma,
                  "chi2_after_intercept_fit": chi2,
                  "dof_after_intercept_fit": dof,
                  "chi2_per_dof_after_intercept_fit": chi2 / dof if dof > 0 else None,
                  "finite_bin_count": len(finite_bin_z),
                  "bin_z_score_min": min(finite_bin_z) if finite_bin_z else None,
                  "bin_z_score_max": max(finite_bin_z) if finite_bin_z else None,
                  "residual_row_table": str(row_table),
                  "bin_pressure_table": str(bin_table),
                  "interpretation": "SN-only covariance-aware residual-shape diagnostic after fitting one intercept; not an H0 solution."
              }

          def safe_extract_tar(tar_path):
              extract_dir = OUTDIR / "kids_1000_extracted"
              extract_dir.mkdir(parents=True, exist_ok=True)

              with tarfile.open(tar_path, "r:gz") as tf:
                  safe_members = []
                  for member in tf.getmembers():
                      target = (extract_dir / member.name).resolve()
                      if str(target).startswith(str(extract_dir.resolve())):
                          safe_members.append(member)
                  tf.extractall(extract_dir, members=safe_members)

              candidates = [
                  p for p in extract_dir.iterdir()
                  if p.is_dir() and "KiDS1000" in p.name and "shear_data_release" in p.name
              ]

              if not candidates:
                  raise RuntimeError("Could not find KiDS1000 extracted base directory.")

              return candidates[0]

          def weighted_quantile(values, weights, qs):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)
              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)

              values = values[mask]
              weights = weights[mask]

              if len(values) == 0:
                  return [None for _ in qs]

              if np.sum(weights) <= 0:
                  weights = np.ones_like(values)

              sorter = np.argsort(values)
              values = values[sorter]
              weights = weights[sorter]
              cumulative = np.cumsum(weights)
              cumulative = cumulative / cumulative[-1]

              return [float(np.interp(q, cumulative, values)) for q in qs]

          def read_chain_file(path):
              with open(path, "r", encoding="utf-8", errors="replace") as f:
                  first_line = f.readline().strip()

              if not first_line.startswith("#"):
                  raise RuntimeError(f"Chain file has no header line: {path}")

              header = first_line.replace("#", "").split()
              data = np.loadtxt(path, comments="#")

              if data.ndim == 1:
                  data = data.reshape((1, -1))

              if data.shape[1] != len(header):
                  raise RuntimeError(f"Chain column mismatch for {path}: data has {data.shape[1]}, header has {len(header)}")

              nsample = None
              with open(path, "r", encoding="utf-8", errors="replace") as f:
                  tail = f.readlines()[-10:]

              for line in tail:
                  m = re.search(r"#nsample\s*=\s*(\d+)", line)
                  if m:
                      nsample = int(m.group(1))

              if nsample is not None and 0 < nsample <= data.shape[0]:
                  data_used = data[-nsample:, :]
              else:
                  data_used = data

              return header, data_used, nsample

          def inspect_kids_covariance_fits(kids_base, stat):
              fits_candidates = sorted((kids_base / "data_fits").glob(f"{stat}_KIDS1000_*.fits"))
              if not fits_candidates:
                  raise RuntimeError(f"Missing KiDS FITS file for {stat}")

              path = fits_candidates[0]

              with fits.open(path) as hdul:
                  cov = None
                  data_vector_count = 0
                  nz_extension_count = 0

                  for hdu in hdul:
                      if hdu.name == "COVMAT":
                          cov = np.array(hdu.data, dtype=float)
                      elif hdu.name.startswith("NZ"):
                          nz_extension_count += 1
                      elif hdu.data is not None and hasattr(hdu.data, "columns"):
                          names = set(hdu.data.columns.names)
                          if "VALUE" in names:
                              data_vector_count += len(hdu.data)

                  if cov is None:
                      raise RuntimeError(f"No COVMAT extension found for {stat}.")

                  diag = np.diag(cov)

                  return {
                      "statistic": stat,
                      "fits_file": str(path),
                      "covariance_shape": list(cov.shape),
                      "covariance_diag_min": float(np.min(diag)),
                      "covariance_diag_max": float(np.max(diag)),
                      "covariance_diag_positive_count": int(np.sum(diag > 0)),
                      "covariance_symmetry_max_abs_delta": float(np.max(np.abs(cov - cov.T))),
                      "data_vector_row_count_from_VALUE_extensions": int(data_vector_count),
                      "nz_extension_count": int(nz_extension_count)
                  }

          def kids_growth_surface(kids_tar_path):
              kids_base = safe_extract_tar(kids_tar_path)

              rows = []
              best_rows = []
              cov_rows = []

              for stat in KIDS_STATS:
                  chain_path = kids_base / "chains_and_config_files" / "main_chains_iterative_covariance" / stat / "chain" / "output_multinest_C.txt"

                  if not chain_path.exists():
                      raise RuntimeError(f"Missing KiDS chain file: {chain_path}")

                  header, data, nsample = read_chain_file(chain_path)
                  col = {name: i for i, name in enumerate(header)}

                  if "COSMOLOGICAL_PARAMETERS--S_8" not in col:
                      raise RuntimeError(f"S8 column missing from {chain_path}")

                  s8 = data[:, col["COSMOLOGICAL_PARAMETERS--S_8"]]
                  weights = data[:, col["weight"]] if "weight" in col else np.ones(len(s8))
                  q16, q50, q84 = weighted_quantile(s8, weights, [0.16, 0.50, 0.84])

                  sigma = (q84 - q16) / 2.0 if q16 is not None and q84 is not None else None
                  combined_sigma = math.sqrt(sigma ** 2 + PLANCK_LIKE_S8_SIGMA ** 2) if sigma is not None else None
                  pressure_z = (q50 - PLANCK_LIKE_S8_REFERENCE) / combined_sigma if combined_sigma and combined_sigma > 0 else None

                  row = {
                      "surface": "consolidation_growth",
                      "source": "KiDS_1000",
                      "statistic": stat,
                      "sample_rows_used": int(data.shape[0]),
                      "nsample_marker": nsample,
                      "s8_q16": q16,
                      "s8_q50": q50,
                      "s8_q84": q84,
                      "s8_sigma_half_width": sigma,
                      "planck_like_s8_reference": PLANCK_LIKE_S8_REFERENCE,
                      "planck_like_s8_sigma": PLANCK_LIKE_S8_SIGMA,
                      "s8_pressure_vs_planck_like_z": pressure_z,
                      "sign": "negative" if pressure_z is not None and pressure_z < 0 else "positive_or_zero"
                  }

                  rows.append(row)

                  if "post" in col:
                      best_idx = int(np.argmax(data[:, col["post"]]))
                      best_rows.append({
                          "statistic": stat,
                          "best_post_index": best_idx,
                          "best_post": float(data[best_idx, col["post"]]),
                          "best_like": float(data[best_idx, col["like"]]) if "like" in col else None,
                          "best_S8": float(data[best_idx, col["COSMOLOGICAL_PARAMETERS--S_8"]]),
                          "best_sigma8": float(data[best_idx, col["COSMOLOGICAL_PARAMETERS--SIGMA_8"]]) if "COSMOLOGICAL_PARAMETERS--SIGMA_8" in col else None,
                          "best_omega_m": float(data[best_idx, col["COSMOLOGICAL_PARAMETERS--OMEGA_M"]]) if "COSMOLOGICAL_PARAMETERS--OMEGA_M" in col else None
                      })

                  cov_rows.append(inspect_kids_covariance_fits(kids_base, stat))

              s8_table = OUTDIR / "kids_s8_pressure_vs_planck_like.csv"
              with s8_table.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "surface", "source", "statistic",
                      "sample_rows_used", "nsample_marker",
                      "s8_q16", "s8_q50", "s8_q84", "s8_sigma_half_width",
                      "planck_like_s8_reference", "planck_like_s8_sigma",
                      "s8_pressure_vs_planck_like_z", "sign"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

              best_table = OUTDIR / "kids_best_posterior_surface_summary.csv"
              with best_table.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "statistic", "best_post_index", "best_post",
                      "best_like", "best_S8", "best_sigma8", "best_omega_m"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in best_rows:
                      writer.writerow(row)

              cov_table = OUTDIR / "kids_covariance_fits_shape_summary.csv"
              with cov_table.open("w", newline="", encoding="utf-8") as f:
                  fieldnames = [
                      "statistic", "fits_file", "covariance_shape",
                      "covariance_diag_min", "covariance_diag_max",
                      "covariance_diag_positive_count",
                      "covariance_symmetry_max_abs_delta",
                      "data_vector_row_count_from_VALUE_extensions",
                      "nz_extension_count"
                  ]
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in cov_rows:
                      out = dict(row)
                      out["covariance_shape"] = str(out["covariance_shape"])
                      writer.writerow(out)

              pressure_values = [
                  r["s8_pressure_vs_planck_like_z"]
                  for r in rows
                  if r["s8_pressure_vs_planck_like_z"] is not None
              ]

              all_negative = all(v < 0 for v in pressure_values) and len(pressure_values) == len(KIDS_STATS)

              return {
                  "surface": "consolidation_growth",
                  "source": "KiDS_1000",
                  "statistics": KIDS_STATS,
                  "planck_like_s8_reference": PLANCK_LIKE_S8_REFERENCE,
                  "planck_like_s8_sigma": PLANCK_LIKE_S8_SIGMA,
                  "pressure_rows": rows,
                  "best_posterior_rows": best_rows,
                  "covariance_fits_rows": cov_rows,
                  "all_growth_pressures_negative_vs_planck_like": all_negative,
                  "mean_growth_pressure_z": float(np.mean(pressure_values)) if pressure_values else None,
                  "min_growth_pressure_z": float(np.min(pressure_values)) if pressure_values else None,
                  "max_growth_pressure_z": float(np.max(pressure_values)) if pressure_values else None,
                  "s8_pressure_table": str(s8_table),
                  "best_posterior_table": str(best_table),
                  "covariance_shape_table": str(cov_table),
                  "interpretation": "Chain-level KiDS S8 pressure against a configurable Planck-like comparison anchor; not a full likelihood comparison."
              }

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "previous_milestone": {
                  "v3_12_1_status": "source_specific_ingestion_tables_passed_ready_for_v3_13_covariance_aware_prototype",
                  "v3_12_1_next_allowed_step": "Build v3.13 covariance-aware prototype using Pantheon+SH0ES rows/covariance and KiDS-1000 S8 chain summaries."
              },
              "truth_boundary": TRUTH_BOUNDARY,
              "downloads": {},
              "pantheon_reach_surface": {},
              "kids_growth_surface": {},
              "gate_result": {}
          }

          print("TAIRID Cosmology v3.13 covariance-aware two-source prototype")
          print("Truth boundary: prototype only; no model validation.")
          print()

          failed = []

          pantheon_dir = DOWNLOADS / "PantheonPlus_SH0ES"
          kids_dir = DOWNLOADS / "KiDS_1000"
          pantheon_dir.mkdir(parents=True, exist_ok=True)
          kids_dir.mkdir(parents=True, exist_ok=True)

          pantheon_table_path = pantheon_dir / "PantheonPlusSH0ES.dat"
          pantheon_cov_path = pantheon_dir / "PantheonPlusSH0ES_STAT_SYS.cov"
          kids_tar_path = kids_dir / "KiDS1000_cosmic_shear_data_release.tgz"

          try:
              inventory["downloads"]["pantheon_table"] = download(URLS["pantheon_table"], pantheon_table_path)
              inventory["downloads"]["pantheon_cov"] = download(URLS["pantheon_cov"], pantheon_cov_path)
              inventory["downloads"]["kids_tarball"] = download(URLS["kids_tarball"], kids_tar_path)
          except Exception as e:
              failed.append("download_failed")
              inventory["download_error"] = f"{type(e).__name__}: {e}"

          try:
              header, pantheon_rows, missing = parse_pantheon_table(pantheon_table_path)
              cov, cov_summary = parse_pantheon_covariance(pantheon_cov_path, len(pantheon_rows))

              if missing:
                  raise RuntimeError(f"Pantheon required columns missing: {missing}")
              if cov_summary["diag_positive_count"] != cov_summary["dimension"]:
                  raise RuntimeError("Pantheon covariance diagonal has non-positive entries.")

              pantheon_surface = pantheon_covariance_aware_surface(pantheon_rows, cov)
              pantheon_surface["covariance_summary"] = cov_summary
              pantheon_surface["header_column_count"] = len(header)

              inventory["pantheon_reach_surface"] = pantheon_surface

              print("Pantheon+SH0ES covariance-aware reach prototype:")
              print(f"  SN rows: {pantheon_surface['row_count']}")
              print(f"  covariance dimension: {cov_summary['dimension']}")
              print(f"  GLS intercept offset: {pantheon_surface['gls_intercept_offset']}")
              print(f"  chi2/dof after offset fit: {pantheon_surface['chi2_per_dof_after_intercept_fit']}")
              print(f"  finite bins: {pantheon_surface['finite_bin_count']}")
              print()

          except Exception as e:
              failed.append("pantheon_covariance_reach_prototype_failed")
              inventory["pantheon_reach_surface"] = {
                  "surface": "reach_geometry",
                  "source": "PantheonPlus_SH0ES",
                  "error": f"{type(e).__name__}: {e}"
              }
              print(f"Pantheon prototype failed: {type(e).__name__}: {e}")
              print()

          try:
              kids_surface = kids_growth_surface(kids_tar_path)
              inventory["kids_growth_surface"] = kids_surface

              print("KiDS-1000 chain-level growth prototype:")
              print(f"  all growth pressures negative vs Planck-like reference: {kids_surface['all_growth_pressures_negative_vs_planck_like']}")
              print(f"  mean growth pressure z: {kids_surface['mean_growth_pressure_z']}")
              print(f"  pressure range: {kids_surface['min_growth_pressure_z']} to {kids_surface['max_growth_pressure_z']}")
              print()

          except Exception as e:
              failed.append("kids_chain_growth_prototype_failed")
              inventory["kids_growth_surface"] = {
                  "surface": "consolidation_growth",
                  "source": "KiDS_1000",
                  "error": f"{type(e).__name__}: {e}"
              }
              print(f"KiDS prototype failed: {type(e).__name__}: {e}")
              print()

          pantheon_ok = "pantheon_covariance_reach_prototype_failed" not in failed
          kids_ok = "kids_chain_growth_prototype_failed" not in failed
          kids_negative = inventory.get("kids_growth_surface", {}).get("all_growth_pressures_negative_vs_planck_like") is True

          # Pattern support is reported but does not become proof.
          two_source_pattern_flag = pantheon_ok and kids_ok and kids_negative

          if pantheon_ok and kids_ok:
              readiness_label = "covariance_aware_two_source_prototype_passed_ready_for_v3_14_full_anchor_rebuild"
          elif pantheon_ok and not kids_ok:
              readiness_label = "pantheon_covariance_prototype_passed_kids_growth_prototype_needs_followup"
          elif kids_ok and not pantheon_ok:
              readiness_label = "kids_growth_prototype_passed_pantheon_covariance_prototype_needs_followup"
          else:
              readiness_label = "covariance_aware_two_source_prototype_failed_manual_followup_needed"

          inventory["gate_result"] = {
              "failed_gates": failed,
              "readiness_label": readiness_label,
              "pantheon_covariance_reach_prototype_pass": pantheon_ok,
              "kids_chain_growth_prototype_pass": kids_ok,
              "kids_growth_negative_vs_planck_like": kids_negative,
              "two_source_pattern_flag_not_validation": two_source_pattern_flag,
              "model_claim_allowed": False,
              "next_allowed_step": (
                  "Build v3.14 full anchor rebuild: replace hand-entered growth anchors with chain-derived S8 anchors and keep Pantheon covariance residual-shape diagnostics separate from H0 claims."
                  if pantheon_ok and kids_ok
                  else "Fix failed covariance-aware prototype component before expanding to v3.14."
              )
          }

          summary_csv = OUTDIR / "tairid_cosmology_v3_13_two_source_surface_summary.csv"
          with summary_csv.open("w", newline="", encoding="utf-8") as f:
              fieldnames = [
                  "surface", "source", "prototype_pass",
                  "primary_metric", "secondary_metric",
                  "pattern_flag", "truth_boundary_note"
              ]
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()

              p = inventory.get("pantheon_reach_surface", {})
              writer.writerow({
                  "surface": "reach_geometry",
                  "source": "PantheonPlus_SH0ES",
                  "prototype_pass": pantheon_ok,
                  "primary_metric": f"finite_bins={p.get('finite_bin_count')}",
                  "secondary_metric": f"chi2_per_dof={p.get('chi2_per_dof_after_intercept_fit')}",
                  "pattern_flag": "reach_covariance_shape_only_not_H0",
                  "truth_boundary_note": "SN residual-shape diagnostic only; not an H0 correction."
              })

              k = inventory.get("kids_growth_surface", {})
              writer.writerow({
                  "surface": "consolidation_growth",
                  "source": "KiDS_1000",
                  "prototype_pass": kids_ok,
                  "primary_metric": f"mean_growth_pressure_z={k.get('mean_growth_pressure_z')}",
                  "secondary_metric": f"all_negative={k.get('all_growth_pressures_negative_vs_planck_like')}",
                  "pattern_flag": "growth_negative_vs_planck_like" if k.get("all_growth_pressures_negative_vs_planck_like") else "growth_not_all_negative",
                  "truth_boundary_note": "Planck-like comparison anchor only; not a full Planck likelihood."
              })

          json_path = OUTDIR / "tairid_cosmology_v3_13_covariance_aware_two_source_prototype.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.13 — Covariance-Aware Two-Source Prototype")
          md.append("")
          md.append(f"Created UTC: `{inventory['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(failed) if failed else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("This test builds the first two-source covariance-aware prototype from real downloaded files.")
          md.append("")
          md.append("- Pantheon+SH0ES is treated as a reach/geometry covariance surface.")
          md.append("- KiDS-1000 is treated as a consolidation/growth chain surface.")
          md.append("- These surfaces are not forced into one correction term.")
          md.append("")
          md.append("## Results")
          md.append("")
          md.append("| Surface | Source | Prototype pass | Main diagnostic | Boundary |")
          md.append("|---|---|---:|---|---|")

          p = inventory.get("pantheon_reach_surface", {})
          md.append(
              f"| reach_geometry | PantheonPlus_SH0ES | {pantheon_ok} | "
              f"finite bins={p.get('finite_bin_count')}; chi2/dof={p.get('chi2_per_dof_after_intercept_fit')} | "
              f"SN residual-shape only; not H0 proof |"
          )

          k = inventory.get("kids_growth_surface", {})
          md.append(
              f"| consolidation_growth | KiDS_1000 | {kids_ok} | "
              f"mean growth pressure z={k.get('mean_growth_pressure_z')}; all negative={k.get('all_growth_pressures_negative_vs_planck_like')} | "
              f"Planck-like anchor only; not full likelihood |"
          )
          md.append("")
          md.append("## Pattern flag")
          md.append("")
          md.append(f"`two_source_pattern_flag_not_validation = {two_source_pattern_flag}`")
          md.append("")
          md.append("This flag means the prototype surfaces were built and the KiDS growth side remains negative relative to the configurable Planck-like comparison anchor. It does not validate TAIRID.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(inventory["gate_result"]["next_allowed_step"])
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `pantheon_covaware_sn_residuals.csv`")
          md.append("- `pantheon_covaware_redshift_bin_pressure.csv`")
          md.append("- `kids_s8_pressure_vs_planck_like.csv`")
          md.append("- `kids_best_posterior_surface_summary.csv`")
          md.append("- `kids_covariance_fits_shape_summary.csv`")
          md.append("- `tairid_cosmology_v3_13_two_source_surface_summary.csv`")
          md.append("- `tairid_cosmology_v3_13_covariance_aware_two_source_prototype.json`")
          md.append("- `tairid_cosmology_v3_13_covariance_aware_two_source_prototype.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_13_covariance_aware_two_source_prototype.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.13 covariance-aware two-source prototype artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-13-covariance-aware-two-source-prototype
          path: artifacts/tairid_cosmology_v3_13/
