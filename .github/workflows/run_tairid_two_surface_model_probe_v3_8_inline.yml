name: Run TAIRID Two Surface Model Probe v3.8 Inline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-two-surface-model-probe-v3-8-inline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib

      - name: Create and run TAIRID v3.8 inline script
        run: |
          cat > run_tairid_two_surface_model_probe_v3_8_inline.py <<'PY'
          #!/usr/bin/env python3
          """
          TAIRID Two-Surface Model Probe v3.8 Inline

          Purpose:
          v3.7 built separate reach/geometry and consolidation/growth surfaces.
          v3.8 tests whether a one-surface pressure description or a two-surface
          pressure description better matches the signed pressure anchors.

          This is not a cosmology solution. It is a penalized surface-shape probe.
          """

          import csv
          import json
          import math
          import re
          import traceback
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          import matplotlib.pyplot as plt
          import numpy as np

          OUTDIR = Path("tairid_two_surface_model_probe_v3_8_inline_outputs")
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOAD_DIR = OUTDIR / "downloaded"
          DOWNLOAD_DIR.mkdir(parents=True, exist_ok=True)

          C_LIGHT = 299792.458
          H0_SHAPE = 70.0

          PANTHEON_REPO = "PantheonPlusSH0ES/DataRelease"
          PANTHEON_BRANCHES = ["main", "master"]
          PANTHEON_DISTANCE_PATH = "Pantheon+_Data/4_DISTANCES_AND_COVAR/Pantheon+SH0ES.dat"

          BAO_REPO = "CobayaSampler/bao_data"
          BAO_BRANCHES = ["master", "main"]
          BAO_TARGETS = [
              "desi_2024_gaussian_bao_BGS_BRIGHT-21.5_GCcomb_z0.1-0.4_mean.txt",
              "desi_2024_gaussian_bao_LRG_GCcomb_z0.4-0.6_mean.txt",
              "desi_2024_gaussian_bao_LRG_GCcomb_z0.6-0.8_mean.txt",
              "desi_2024_gaussian_bao_LRG+ELG_LOPnotqso_GCcomb_z0.8-1.1_mean.txt",
              "desi_2024_gaussian_bao_ELG_LOPnotqso_GCcomb_z1.1-1.6_mean.txt",
              "desi_2024_gaussian_bao_QSO_GCcomb_z0.8-2.1_mean.txt",
              "desi_2024_gaussian_bao_Lya_GCcomb_mean.txt",
          ]

          PRIOR_LOCKS = {
              "v3_3_3": "frozen_gate_not_supported_as_sn_distance_pressure_term",
              "v3_4": "frozen_gate_rejected_as_bao_cmb_ruler_term",
              "v3_6": "regime_activation_supported_cross_surface_not_sn_distance",
              "v3_7": "reach_consolidation_surface_builder_ready_for_model_probe_not_validation",
              "rule": "No frozen-gate correction is allowed in v3.8.",
          }

          H0_ANCHORS = {
              "early": {"surface": "H0_EARLY_CMB_INFERRED", "value": 67.36, "sigma": 0.54},
              "late": {"surface": "H0_LOCAL_DISTANCE_LADDER", "value": 73.04, "sigma": 1.04},
          }

          S8_ANCHORS = [
              {"surface": "PLANCK_2018_S8", "value": 0.832, "sigma": 0.013, "role": "early"},
              {"surface": "DES_Y3_OPTIMIZED_S8", "value": 0.772, "sigma": 0.017, "role": "late"},
              {"surface": "KIDS_1000_FIDUCIAL_S8", "value": 0.759, "sigma": 0.0225, "role": "late"},
              {"surface": "KIDS_1000_UPDATED_S8", "value": 0.776, "sigma": 0.028, "role": "late"},
          ]

          CLAIMS = {
              "test_name": "TAIRID Two-Surface Model Probe v3.8 Inline",
              "primary_question": "Does a two-surface reach/consolidation pressure description beat a one-surface description after penalties?",
              "truth_boundary": "Penalized surface-shape probe only; no validation, no H0 correction, no new physics.",
          }


          def json_default(obj):
              if isinstance(obj, (np.integer,)):
                  return int(obj)
              if isinstance(obj, (np.floating,)):
                  return float(obj)
              if isinstance(obj, np.ndarray):
                  return obj.tolist()
              return str(obj)


          def write_json(path, obj):
              path.write_text(json.dumps(obj, indent=2, default=json_default), encoding="utf-8")


          def write_csv(path, rows):
              if not rows:
                  path.write_text("", encoding="utf-8")
                  return
              fields = []
              seen = set()
              for row in rows:
                  for key in row:
                      if key not in seen:
                          fields.append(key)
                          seen.add(key)
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields, extrasaction="ignore")
                  writer.writeheader()
                  writer.writerows(rows)


          def safe_name(text):
              return re.sub(r"[^A-Za-z0-9_.-]+", "_", str(text)).strip("_")[:180]


          def raw_url(repo, branch, repo_path):
              return f"https://raw.githubusercontent.com/{repo}/{branch}/{repo_path}"


          def fetch_text(repo, branches, repo_path, timeout=120):
              errors = []
              for branch in branches:
                  url = raw_url(repo, branch, repo_path)
                  try:
                      req = urllib.request.Request(url, headers={"User-Agent": "TAIRID-v3.8-two-surface-model-probe"})
                      with urllib.request.urlopen(req, timeout=timeout) as response:
                          data = response.read()
                      text = data.decode("utf-8", errors="replace")
                      if text.lower().lstrip().startswith("<!doctype html") or "404: not found" in text.lower()[:200]:
                          errors.append({"branch": branch, "url": url, "error": "html_or_not_found_payload"})
                          continue
                      return {"status": "downloaded", "branch": branch, "url": url, "bytes": len(data), "text": text, "errors": errors}
                  except Exception as exc:
                      errors.append({"branch": branch, "url": url, "error": repr(exc)})
              return {"status": "failed", "branch": None, "url": None, "bytes": 0, "text": "", "errors": errors}


          def to_float(value):
              try:
                  out = float(str(value).replace("D", "E"))
              except Exception:
                  return None
              return out if math.isfinite(out) else None


          def parse_distance_table(text):
              lines = [line.strip() for line in text.splitlines() if line.strip()]
              if not lines:
                  return {"columns": [], "rows": []}
              columns = lines[0].split()
              float_cols = {"zHD", "MU_SH0ES", "MU_SH0ES_ERR_DIAG", "IS_CALIBRATOR"}
              rows = []
              for idx, line in enumerate(lines[1:]):
                  parts = line.split()
                  if len(parts) < len(columns):
                      continue
                  row = dict(zip(columns, parts[:len(columns)]))
                  row["row_index"] = idx
                  for key in float_cols:
                      if key in row:
                          val = to_float(row[key])
                          if val is not None:
                              row[key] = val
                  rows.append(row)
              return {"columns": columns, "rows": rows}


          def select_sn_rows(rows):
              selected = []
              for row in rows:
                  z = row.get("zHD")
                  mu = row.get("MU_SH0ES")
                  sig = row.get("MU_SH0ES_ERR_DIAG")
                  if z is None or mu is None or sig is None:
                      continue
                  if not (0.01 < float(z) < 2.5 and float(sig) > 0):
                      continue
                  if int(float(row.get("IS_CALIBRATOR", 0))) == 1:
                      continue
                  selected.append(row)
              return selected


          def e_model(z, om):
              z = np.asarray(z, dtype=float)
              return np.sqrt(np.maximum(om * (1.0 + z) ** 3 + (1.0 - om), 1e-12))


          def cumulative_trapezoid(y, x):
              y = np.asarray(y, dtype=float)
              x = np.asarray(x, dtype=float)
              if len(y) < 2:
                  return np.zeros_like(y)
              area = (x[1:] - x[:-1]) * (y[1:] + y[:-1]) * 0.5
              return np.concatenate([[0.0], np.cumsum(area)])


          def distance_modulus(z_values, om):
              z_values = np.asarray(z_values, dtype=float)
              zmax = max(0.02, float(np.max(z_values)) * 1.001)
              grid = np.linspace(0.0, zmax, 5000)
              integral = cumulative_trapezoid(1.0 / e_model(grid, om), grid)
              dc = C_LIGHT / H0_SHAPE * np.interp(z_values, grid, integral)
              dl = (1.0 + z_values) * np.maximum(dc, 1e-12)
              return 5.0 * np.log10(dl) + 25.0


          def fit_sn_lcdm(z, mu, sigma):
              weights = 1.0 / np.maximum(sigma, 1e-6) ** 2
              best = None
              for om in np.linspace(0.10, 0.50, 81):
                  shape = distance_modulus(z, om)
                  offset = float(np.average(mu - shape, weights=weights))
                  residual = mu - (shape + offset)
                  chi2 = float(np.sum(weights * residual * residual))
                  row = {"Omega_m": float(om), "intercept": offset, "chi2": chi2, "n": int(len(z)), "k_params": 2}
                  if best is None or chi2 < best["chi2"]:
                      best = dict(row)
                      best["_residual"] = residual
              n = best["n"]
              best["bic"] = float(best["chi2"] + best["k_params"] * math.log(n))
              best["aic"] = float(best["chi2"] + 2 * best["k_params"])
              return best


          def sn_pressure_observations(sn_rows, z, residual):
              bins = [
                  ("SN_LOW_REACH", 0.01, 0.10),
                  ("SN_MID_REACH", 0.10, 0.50),
                  ("SN_HIGH_REACH", 0.50, 2.50),
              ]
              rows = []
              for label, zmin, zmax in bins:
                  mask = (z >= zmin) & (z < zmax)
                  n = int(np.sum(mask))
                  if n < 20:
                      continue
                  vals = residual[mask]
                  mean = float(np.mean(vals))
                  std = float(np.std(vals))
                  sem = std / math.sqrt(n) if n > 0 and std > 0 else None
                  zscore = mean / sem if sem and sem > 0 else 0.0
                  rows.append({
                      "observation_id": label,
                      "family": "reach_geometry",
                      "value": zscore,
                      "raw_value": mean,
                      "raw_sigma": sem,
                      "n": n,
                      "direction": "positive_reach_pressure" if zscore > 0 else "negative_reach_pressure",
                      "source": "Pantheon+SH0ES SN residual bin after LCDM reach fit",
                  })
              return rows


          def h0_pressure_observation():
              early = H0_ANCHORS["early"]
              late = H0_ANCHORS["late"]
              denom = math.sqrt(early["sigma"] ** 2 + late["sigma"] ** 2)
              zscore = (late["value"] - early["value"]) / denom
              return {
                  "observation_id": "H0_REACH_EARLY_LATE",
                  "family": "reach_geometry",
                  "value": zscore,
                  "raw_value": late["value"] - early["value"],
                  "raw_sigma": denom,
                  "n": 1,
                  "direction": "positive_reach_pressure",
                  "source": "declared H0 early/late anchor",
              }


          def s8_pressure_observations():
              early = S8_ANCHORS[0]
              rows = []
              for anchor in S8_ANCHORS[1:]:
                  denom = math.sqrt(early["sigma"] ** 2 + anchor["sigma"] ** 2)
                  zscore = (anchor["value"] - early["value"]) / denom
                  rows.append({
                      "observation_id": f"{anchor['surface']}_VS_PLANCK",
                      "family": "consolidation_growth",
                      "value": zscore,
                      "raw_value": anchor["value"] - early["value"],
                      "raw_sigma": denom,
                      "n": 1,
                      "direction": "negative_consolidation_pressure" if zscore < 0 else "positive_consolidation_pressure",
                      "source": "declared S8 early/late anchor",
                  })
              return rows


          def bao_coverage_rows():
              rows = []
              for target in BAO_TARGETS:
                  fetched = fetch_text(BAO_REPO, BAO_BRANCHES, target, timeout=60)
                  if fetched["status"] == "downloaded":
                      (DOWNLOAD_DIR / safe_name(target)).write_text(fetched["text"], encoding="utf-8")
                  z_match = re.search(r"z([0-9.]+)-([0-9.]+)", target)
                  if z_match:
                      z_eff = (float(z_match.group(1)) + float(z_match.group(2))) / 2.0
                  elif "Lya" in target:
                      z_eff = 2.33
                  elif "QSO" in target:
                      z_eff = 1.49
                  else:
                      z_eff = None
                  rows.append({
                      "file": target,
                      "status": fetched["status"],
                      "z_eff": z_eff,
                      "family": "reach_geometry",
                      "role": "coverage_lock_not_model_observation",
                      "truth_boundary": "BAO is used as reach-surface coverage in v3.8, not as a fitted likelihood.",
                  })
              return rows


          def fit_pressure_models(obs_rows):
              y = np.asarray([r["value"] for r in obs_rows], dtype=float)
              families = [r["family"] for r in obs_rows]
              n = len(y)

              def score(pred, k, name):
                  residual = y - pred
                  chi2 = float(np.sum(residual * residual))
                  return {
                      "model": name,
                      "k_params": k,
                      "n": n,
                      "chi2": chi2,
                      "aic": float(chi2 + 2 * k),
                      "bic": float(chi2 + k * math.log(n)),
                      "residual_std": float(np.std(residual)),
                  }

              null = score(np.zeros_like(y), 0, "null_zero_pressure")

              global_mean = float(np.mean(y))
              one = score(np.full_like(y, global_mean), 1, "one_global_pressure_surface")
              one["global_pressure_mean"] = global_mean

              reach_mask = np.asarray([f == "reach_geometry" for f in families], dtype=bool)
              cons_mask = np.asarray([f == "consolidation_growth" for f in families], dtype=bool)

              pred_two = np.zeros_like(y)
              reach_mean = float(np.mean(y[reach_mask])) if np.any(reach_mask) else 0.0
              cons_mean = float(np.mean(y[cons_mask])) if np.any(cons_mask) else 0.0
              pred_two[reach_mask] = reach_mean
              pred_two[cons_mask] = cons_mean

              two = score(pred_two, 2, "two_surface_reach_plus_consolidation")
              two["reach_pressure_mean"] = reach_mean
              two["consolidation_pressure_mean"] = cons_mean
              two["sign_pattern"] = "reach_positive_consolidation_negative" if reach_mean > 0 and cons_mean < 0 else "sign_pattern_not_matched"

              constrained = dict(two)
              constrained["model"] = "tairid_constrained_reach_positive_consolidation_negative"
              constrained["constraint_passed"] = reach_mean > 0 and cons_mean < 0

              models = [null, one, two, constrained]
              best_bic = min(m["bic"] for m in models)
              best_aic = min(m["aic"] for m in models)
              for m in models:
                  m["delta_bic_vs_best"] = float(m["bic"] - best_bic)
                  m["delta_aic_vs_best"] = float(m["aic"] - best_aic)

              return sorted(models, key=lambda r: (r["bic"], r["aic"]))


          def decide(obs_rows, bao_rows, model_rows):
              by_model = {r["model"]: r for r in model_rows}
              one = by_model["one_global_pressure_surface"]
              two = by_model["two_surface_reach_plus_consolidation"]
              constrained = by_model["tairid_constrained_reach_positive_consolidation_negative"]

              delta_bic_two_minus_one = two["bic"] - one["bic"]
              bao_ok = sum(1 for r in bao_rows if r["status"] == "downloaded") >= 5
              obs_ok = len(obs_rows) >= 7
              two_beats_one = delta_bic_two_minus_one <= -6.0
              signs_ok = constrained["constraint_passed"] is True

              gates = [
                  {
                      "gate": "G1_prior_locks_preserved",
                      "passed": PRIOR_LOCKS["v3_7"] == "reach_consolidation_surface_builder_ready_for_model_probe_not_validation",
                      "evidence": PRIOR_LOCKS,
                  },
                  {
                      "gate": "G2_pressure_observations_built",
                      "passed": obs_ok,
                      "evidence": {"observation_count": len(obs_rows)},
                  },
                  {
                      "gate": "G3_bao_reach_coverage_preserved",
                      "passed": bao_ok,
                      "evidence": {
                          "bao_downloaded_count": sum(1 for r in bao_rows if r["status"] == "downloaded"),
                          "target_count": len(bao_rows),
                      },
                  },
                  {
                      "gate": "G4_two_surface_beats_one_surface_penalty",
                      "passed": two_beats_one,
                      "evidence": {"delta_bic_two_minus_one": delta_bic_two_minus_one, "threshold": "<= -6"},
                  },
                  {
                      "gate": "G5_tairid_sign_constraint_passes",
                      "passed": signs_ok,
                      "evidence": {
                          "reach_mean": two["reach_pressure_mean"],
                          "consolidation_mean": two["consolidation_pressure_mean"],
                      },
                  },
                  {
                      "gate": "G6_no_frozen_gate_correction_reintroduced",
                      "passed": True,
                      "evidence": {"frozen_gate_correction": False},
                  },
                  {
                      "gate": "G7_no_validation_claim_allowed",
                      "passed": True,
                      "evidence": {
                          "validation_claim": False,
                          "h0_correction_claim": False,
                          "new_physics_claim": False,
                      },
                  },
              ]

              failed = [g["gate"] for g in gates if not g["passed"]]

              if not failed:
                  status = "two_surface_reach_consolidation_probe_supported_not_validation"
                  readiness = 9
                  next_wall = "Build v3.9 with real growth data ingestion or covariance-aware weak-lensing inputs."
              elif two_beats_one or signs_ok:
                  status = "two_surface_probe_partial_with_cautions"
                  readiness = 7
                  next_wall = "Two-surface direction is plausible, but penalty/coverage gates need strengthening."
              else:
                  status = "two_surface_probe_not_supported"
                  readiness = 5
                  next_wall = "Do not model reach/consolidation split yet."

              return {
                  "final_status": status,
                  "readiness_score_0_to_10": readiness,
                  "next_wall": next_wall,
                  "failed_gates": failed,
                  "gates": gates,
                  "model_ranking_by_bic": model_rows,
                  "truth_boundary": CLAIMS["truth_boundary"],
              }


          def make_plots(obs_rows, model_rows):
              try:
                  labels = [r["observation_id"] for r in obs_rows]
                  values = [r["value"] for r in obs_rows]
                  x = np.arange(len(labels))

                  plt.figure(figsize=(12, 5))
                  plt.bar(x, values)
                  plt.axhline(0.0, linewidth=1)
                  plt.xticks(x, labels, rotation=35, ha="right", fontsize=8)
                  plt.ylabel("signed pressure z-score")
                  plt.title("v3.8 reach/consolidation signed pressure observations")
                  plt.tight_layout()
                  plt.savefig(OUTDIR / "signed_pressure_observations_v3_8_inline.png", dpi=160)
                  plt.close()

                  labels = [r["model"] for r in model_rows]
                  vals = [r["delta_bic_vs_best"] for r in model_rows]
                  x = np.arange(len(labels))

                  plt.figure(figsize=(10, 5))
                  plt.bar(x, vals)
                  plt.xticks(x, labels, rotation=25, ha="right")
                  plt.ylabel("Delta BIC vs best")
                  plt.title("v3.8 one-surface vs two-surface pressure model")
                  plt.tight_layout()
                  plt.savefig(OUTDIR / "two_surface_model_delta_bic_v3_8_inline.png", dpi=160)
                  plt.close()

              except Exception as exc:
                  write_json(OUTDIR / "plot_error_v3_8_inline.json", {"error": repr(exc), "traceback": traceback.format_exc()})


          def write_handoff(decision):
              lines = [
                  "# TAIRID v3.8 Inline Handoff",
                  "",
                  "## Current status",
                  "",
                  f"- Final status: `{decision['final_status']}`",
                  f"- Readiness score: `{decision['readiness_score_0_to_10']}/10`",
                  f"- Next wall: {decision['next_wall']}",
                  "",
                  "## What v3.8 tested",
                  "",
                  "- One global pressure surface vs two separate pressure surfaces.",
                  "- Reach/geometry pressure built from H0 and SN residual bins.",
                  "- Consolidation/growth pressure built from S8 anchors.",
                  "- BAO used only as reach-coverage lock.",
                  "- No frozen-gate correction was reintroduced.",
                  "",
                  "## Model ranking by BIC",
                  "",
              ]

              for row in decision["model_ranking_by_bic"]:
                  lines.append(
                      f"- `{row['model']}`: BIC `{row['bic']:.6f}`, delta BIC `{row['delta_bic_vs_best']:.6f}`"
                  )

              lines.extend([
                  "",
                  "## Truth boundary",
                  "",
                  "- v3.8 is a penalized surface-shape probe only.",
                  "- It does not validate TAIRID.",
                  "- It does not prove H0 correction.",
                  "- It does not prove new physics.",
                  "- It does not disprove standard cosmology.",
                  "",
              ])

              return "\n".join(lines)


          def main():
              print("TAIRID Two-Surface Model Probe v3.8 Inline starting.")
              print("Boundary: surface-shape probe only; no validation, no H0 claim, no new physics claim.")

              write_json(OUTDIR / "claims_v3_8_inline.json", CLAIMS)
              write_json(OUTDIR / "prior_locks_v3_8_inline.json", PRIOR_LOCKS)

              distance_fetch = fetch_text(PANTHEON_REPO, PANTHEON_BRANCHES, PANTHEON_DISTANCE_PATH)
              write_csv(OUTDIR / "pantheon_download_ledger_v3_8_inline.csv", [{
                  "path": PANTHEON_DISTANCE_PATH,
                  "status": distance_fetch["status"],
                  "branch": distance_fetch["branch"],
                  "url": distance_fetch["url"],
                  "bytes": distance_fetch["bytes"],
                  "errors": json.dumps(distance_fetch["errors"], default=json_default),
              }])

              if distance_fetch["status"] == "downloaded":
                  (DOWNLOAD_DIR / safe_name(PANTHEON_DISTANCE_PATH)).write_text(distance_fetch["text"], encoding="utf-8")

              distance = parse_distance_table(distance_fetch["text"])
              sn_rows = select_sn_rows(distance["rows"])

              if len(sn_rows) < 1000:
                  raise RuntimeError(f"Not enough SN rows selected: {len(sn_rows)}")

              z = np.asarray([float(r["zHD"]) for r in sn_rows], dtype=float)
              mu = np.asarray([float(r["MU_SH0ES"]) for r in sn_rows], dtype=float)
              sigma = np.asarray([float(r["MU_SH0ES_ERR_DIAG"]) for r in sn_rows], dtype=float)

              sn_best = fit_sn_lcdm(z, mu, sigma)
              sn_obs = sn_pressure_observations(sn_rows, z, sn_best["_residual"])
              h0_obs = h0_pressure_observation()
              s8_obs = s8_pressure_observations()
              obs_rows = [h0_obs] + sn_obs + s8_obs

              public_sn_best = {k: v for k, v in sn_best.items() if not k.startswith("_")}
              write_json(OUTDIR / "sn_reach_fit_v3_8_inline.json", public_sn_best)
              write_csv(OUTDIR / "pressure_observations_v3_8_inline.csv", obs_rows)

              bao_rows = bao_coverage_rows()
              write_csv(OUTDIR / "bao_coverage_lock_v3_8_inline.csv", bao_rows)

              model_rows = fit_pressure_models(obs_rows)
              write_csv(OUTDIR / "pressure_model_comparison_v3_8_inline.csv", model_rows)

              decision = decide(obs_rows, bao_rows, model_rows)
              write_json(OUTDIR / "decision_v3_8_inline.json", decision)

              make_plots(obs_rows, model_rows)

              handoff = write_handoff(decision)
              (OUTDIR / "next_thread_handoff_after_v3_8_inline.md").write_text(handoff, encoding="utf-8")
              (OUTDIR / "next_thread_handoff_after_v3_8_inline.txt").write_text(handoff, encoding="utf-8")

              summary = {
                  "test_name": CLAIMS["test_name"],
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "boundary": CLAIMS["truth_boundary"],
                  "prior_locks": PRIOR_LOCKS,
                  "sn_fit": public_sn_best,
                  "pressure_observations": obs_rows,
                  "bao_coverage": {
                      "downloaded_count": sum(1 for r in bao_rows if r["status"] == "downloaded"),
                      "target_count": len(bao_rows),
                  },
