              json.dump(json_summary, f, indent=2, sort_keys=True)

          strongest_gg = json_summary["strongest_geometry_growth_pair"] or {}
          md = f"""# 000 TAIRID v4.154 — Limited LRGxELG Geometry-Growth Coupling Inspection With Scope Guards
          
          Created UTC: `{health_items['created_utc']}`
          
          ## Status
          
          Expected result label: `{health_items['expected_result_label']}`
          
          Failed gates: `{health_items['failed_gates']}`
          
          Rule pass count: `{health_items['rule_pass_count']} / {health_items['rule_total_count']}`
          
          ## Plain-language result
          
          This workflow inspects the covariance/correlation shape inside the already limited LRGxELG two-redshift BAO/RSD product. It separates geometry-like observables (`DM/rd`, `DH/rd`) from the growth-like observable (`fσ8`) and writes pairwise coupling diagnostics.
          
          It covers only:
          
          - `z = 0.70`: `DM/rd`, `DH/rd`, `fσ8`
          - `z = 0.845`: `DM/rd`, `DH/rd`, `fσ8`
          
          ## Coupling diagnostics
          
          - Pairwise off-diagonal records: `{health_items['pairwise_coupling_pair_count']}`
          - Geometry-growth pair records: `{health_items['geometry_growth_pair_count']}`
          - Same-redshift geometry-growth pair records: `{health_items['same_redshift_geometry_growth_pair_count']}`
          - Max absolute geometry-growth correlation: `{health_items['max_abs_geometry_growth_correlation']}`
          - Mixed same-redshift geometry-growth signs: `{health_items['mixed_same_redshift_geometry_growth_signs']}`
          - Strongest geometry-growth pair: `{strongest_gg.get('parameter_label_a', '')} x {strongest_gg.get('parameter_label_b', '')}`
          
          These are shape diagnostics only. They do not say the pattern is cosmological truth, TAIRID confirmation, or ΛCDM failure.
          
          ## Truth boundary
          
          This does not compute final pressure. It does not compute residuals against ΛCDM or TAIRID. It does not ingest the product into the main growth lane. It does not provide QSO covariance. It does not provide full eBOSS family covariance. It does not run BIC, likelihood, posterior comparison, or public-facing validation. It does not validate TAIRID.
          
          ## Health
          
          | Check | Value |
          |---|---:|
