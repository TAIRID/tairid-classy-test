          ])
          write_csv(os.path.join(OUTPUT_DIR, "pairwise_coupling_records_v4_154.csv"), pair_rows, [
              "pair_index", "parameter_label_a", "parameter_label_b", "observable_a", "observable_b", "family_a", "family_b", "z_a", "z_b", "relation_kind", "redshift_relation", "covariance", "correlation", "abs_correlation", "direction", "claim_boundary"
          ])
          write_csv(os.path.join(OUTPUT_DIR, "coupling_block_summary_v4_154.csv"), block_summary_rows, [
              "block_id", "pair_count", "mean_correlation", "mean_abs_correlation", "min_correlation", "max_correlation", "strongest_pair", "strongest_abs_correlation", "claim_boundary"
          ])
