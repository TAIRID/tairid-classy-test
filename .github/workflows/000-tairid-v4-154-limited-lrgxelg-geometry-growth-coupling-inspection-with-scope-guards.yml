          ])
          matrix_fields = ["row_index", "row_parameter_label"] + [r["parameter_label"] for r in values] + ["claim_boundary"]
          write_csv(os.path.join(OUTPUT_DIR, "diagnostic_limited_lrgxelg_correlation_matrix_v4_154.csv"), correlation_matrix_rows, matrix_fields)
          write_csv(os.path.join(OUTPUT_DIR, "diagonal_consistency_records_v4_154.csv"), diagonal_records, [
