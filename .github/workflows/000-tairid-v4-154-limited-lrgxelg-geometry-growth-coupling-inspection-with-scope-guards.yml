          | diagonal matches sigma | `{health_items['diagonal_matches_sigma']}` |
          | readme context present | `{health_items['readme_context_present']}` |
          | pressure recomputed | `{health_items['pressure_recomputed']}` |
          | residuals computed | `{health_items['residuals_computed']}` |
          | likelihood or BIC run | `{health_items['likelihood_or_bic_run']}` |
          | TAIRID validation claim allowed | `{health_items['TAIRID_validation_claim_allowed']}` |
          
          ## Files produced
          
          - `fetch_records_v4_154.csv`
          - `normalized_limited_lrgxelg_values_v4_154.csv`
          - `diagnostic_limited_lrgxelg_correlation_matrix_v4_154.csv`
          - `diagonal_consistency_records_v4_154.csv`
          - `pairwise_coupling_records_v4_154.csv`
          - `coupling_block_summary_v4_154.csv`
          - `same_redshift_geometry_growth_surface_v4_154.csv`
          - `scope_guard_report_v4_154.csv`
          - `blocked_claims_v4_154.csv`
          - `source_context_record_v4_154.csv`
          - `parser_health_report_v4_154.csv`
          - `rule_results_v4_154.csv`
          - `tairid_v4_154_limited_lrgxelg_geometry_growth_coupling_inspection.json`
          - `tairid_v4_154_limited_lrgxelg_geometry_growth_coupling_inspection.md`
          
          ## Next clean move if this passes
          
          Use the result to decide whether to prioritize source/provenance locking or reference-vector/reference-covariance acquisition. Do not move to final pressure until reference vector, reference covariance, QSO covariance, full eBOSS covariance/overlap, and final pressure methodology are resolved.
          """
          with open(os.path.join(OUTPUT_DIR, "tairid_v4_154_limited_lrgxelg_geometry_growth_coupling_inspection.md"), "w", encoding="utf-8") as f:
              f.write(md)

          print(json.dumps(json_summary, indent=2, sort_keys=True))
