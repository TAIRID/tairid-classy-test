              "z_value", "geometry_parameter_label", "geometry_observable", "growth_parameter_label", "correlation", "abs_correlation", "direction", "claim_boundary"
          ])
          write_csv(os.path.join(OUTPUT_DIR, "scope_guard_report_v4_154.csv"), [
              {
                  "guard_id": g["guard_id"],
                  "allowed": g["allowed"],
                  "blocked_use": g["blocked_use"],
                  "guard_text": g["guard_text"],
                  "claim_boundary": "scope_guard_enforced_in_limited_coupling_inspection"
              } for g in SCOPE_GUARDS
          ], ["guard_id", "allowed", "blocked_use", "guard_text", "claim_boundary"])
