          write_csv(OUT / "v4_273_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_273_rule_checks.csv", checks)

          scalar_lines = [
              f"{row['object']}: {row['value']} — {row['plain_meaning']}"
              for row in scalar_interpretation_rows
          ]

          lane_lines = [
              f"{row['source_lane']}: {row['current_status']} / next={row['next_action']}"
