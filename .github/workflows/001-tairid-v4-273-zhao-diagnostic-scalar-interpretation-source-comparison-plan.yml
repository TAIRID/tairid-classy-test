name: 001 TAIRID v4.273 - Zhao Diagnostic Scalar Interpretation Source Comparison Plan

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-273-zhao-diagnostic-scalar-interpretation-source-comparison-plan.yml"
      - "data/cosmology/zhao_reference_model_manifest.csv"
      - "zhao_reference_model_manifest.csv"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

