              {"gate": "diagnostic_scalar_value_preserved", "passed": abs(diagnostic_scalar - 0.9477680515843021) < 1e-15, "detail": f"diagnostic_scalar = {diagnostic_scalar}"},
              {"gate": "diagnostic_scalar_below_dof_reference", "passed": diagnostic_scalar < dof_reference, "detail": f"q = {diagnostic_scalar}; dof_reference = {dof_reference}"},
              {"gate": "raw_signature_preserved", "passed": raw_signature == "---+", "detail": f"raw_signature = {raw_signature}"},
              {"gate": "weighted_signature_preserved", "passed": weighted_signature == "-+-+", "detail": f"weighted_signature = {weighted_signature}"},
              {"gate": "source_inventory_qso_ready", "passed": any(row["source_lane"] == "QSO" and "diagnostic scalar exist" in row["current_status"] for row in source_lane_inventory_rows), "detail": "QSO lane ready as candidate"},
              {"gate": "source_inventory_lrg_needed", "passed": any(row["source_lane"] == "LRG" and row["current_status"].startswith("not matched") for row in source_lane_inventory_rows), "detail": "LRG lane needs inventory"},
              {"gate": "source_inventory_elg_needed", "passed": any(row["source_lane"] == "ELG" and row["current_status"].startswith("not matched") for row in source_lane_inventory_rows), "detail": "ELG lane needs inventory"},
              {"gate": "combined_lane_blocked", "passed": any(row["source_lane"] == "combined_LRG_ELG_QSO" and row["current_status"] == "blocked" for row in source_lane_inventory_rows), "detail": "combined lane blocked"},
              {"gate": "direction_and_scalar_separated", "passed": any(row["risk"] == "direction and scalar get merged into one claim" and row["status"] == "guarded" for row in comparison_risk_rows), "detail": "direction/scalar separation guarded"},
              {"gate": "qso_generalization_blocked", "passed": any(row["risk"] == "QSO-only result gets generalized to cosmology" and row["status"] == "guarded" for row in comparison_risk_rows), "detail": "QSO generalization blocked"},
              {"gate": "combined_matrix_premature_merge_guarded", "passed": any(row["risk"] == "combined matrix is built before lane equivalence" and row["status"] == "guarded" for row in comparison_risk_rows), "detail": "premature matrix merge guarded"},
              {"gate": "diagnostic_scalar_interpretation_complete", "passed": any(row["permission_scope"] == "diagnostic_scalar_interpretation" and row["permission_status"] == "completed_no_evidence" for row in permission_rows), "detail": "interpretation complete"},
              {"gate": "source_comparison_plan_written", "passed": any(row["permission_scope"] == "source_comparison_plan" and row["permission_status"] == "written" for row in permission_rows), "detail": "source comparison plan written"},
              {"gate": "lane_inventory_allowed_next", "passed": any(row["permission_scope"] == "source_separated_lane_inventory" and row["permission_status"] == "allowed_next" for row in permission_rows), "detail": "lane inventory allowed next"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "p_value_likelihood_blocked", "passed": any(row["permission_scope"] == "p_value_or_likelihood" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "p-value/likelihood blocked"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "QSO evidence blocked"},
              {"gate": "full_holdout_language_blocked", "passed": any(row["permission_scope"] == "full_independent_holdout_language" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "holdout language blocked"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric fit blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation blocked"},
              {"gate": "all_blocked_operations_blocked", "passed": all(row["blocked"] is True for row in blocked_operation_rows), "detail": "all risky operations blocked"},
              {"gate": "lane_inventory_route_recommended", "passed": any(row["route"] == "source_separated_residual_lane_inventory_for_lrg_elg_qso" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "v4.274 route recommended"},
              {"gate": "source_comparison_guard_not_activated", "passed": any(row["test_id"] == "v4_274_source_comparison_residual_guard" and row["activated"] is False for row in next_rows), "detail": "source comparison not activated yet"},
              {"gate": "combined_matrix_guard_not_activated", "passed": any(row["test_id"] == "v4_274_combined_matrix_guard" and row["activated"] is False for row in next_rows), "detail": "combined matrix guard not activated"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no external observed scoring"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout approval"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_274_source_separated_residual_lane_inventory_for_lrg_elg_qso", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_273_zhao_diagnostic_scalar_interpretation_source_comparison_plan_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_273_inherited_v4_272_rows.csv", inherited_v4_272_rows)
          write_csv(OUT / "v4_273_observed_manifest_status_rows.csv", observed_manifest_status_rows)
          write_csv(OUT / "v4_273_reference_model_manifest_status_rows.csv", reference_model_manifest_status_rows)
