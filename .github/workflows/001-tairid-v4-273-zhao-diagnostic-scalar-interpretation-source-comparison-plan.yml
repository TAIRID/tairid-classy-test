          ROUTE = "zhao_diagnostic_scalar_interpretation_and_source_comparison_plan_after_v4_272"
          EXPECTED_RESULT = "v4_273_zhao_diagnostic_scalar_interpretation_source_comparison_plan_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_274_source_separated_residual_lane_inventory_for_lrg_elg_qso"

          OUT = Path("tairid_v4_273_zhao_diagnostic_scalar_interpretation_source_comparison_plan_output")
