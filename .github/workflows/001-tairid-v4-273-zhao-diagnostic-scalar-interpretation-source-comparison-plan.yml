              "blocked_operation_rows": len(blocked_operation_rows),
              "permission_rows": len(permission_rows),
              "readiness_rows": len(readiness_rows),
              "decision_rows": len(decision_rows),
              "route_decision_rows": len(route_decision_rows),
              "next_rows": len(next_rows),
              "raw_residual_direction_signature": raw_signature,
              "normalized_residual_direction_signature": normalized_signature,
              "covariance_weighted_direction_signature": weighted_signature,
              "diagnostic_scalar_value": diagnostic_scalar,
              "diagnostic_scalar_interpretation_complete": True,
              "simple_positive_qso_pressure_weakened": True,
              "source_comparison_plan_written": True,
              "source_separated_lane_inventory_allowed_next": True,
              "combined_matrix_allowed": False,
              "p_value_computed": False,
              "likelihood_computed": False,
              "evidence_allowed": False,
              "scoring_allowed": False,
              "approved_holdout_sources": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_273_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.273 Zhao Diagnostic Scalar Interpretation Source Comparison Plan",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_272_rows = {summary['inherited_v4_272_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"reference_model_manifest_status_rows = {summary['reference_model_manifest_status_rows']}",
              f"scalar_interpretation_rows = {summary['scalar_interpretation_rows']}",
              f"source_lane_inventory_rows = {summary['source_lane_inventory_rows']}",
              f"source_comparison_contract_rows = {summary['source_comparison_contract_rows']}",
              f"comparison_risk_rows = {summary['comparison_risk_rows']}",
              f"sdr_reduction_rows = {summary['sdr_reduction_rows']}",
              f"next_lane_inventory_template_rows = {summary['next_lane_inventory_template_rows']}",
              f"blocked_operation_rows = {summary['blocked_operation_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"route_decision_rows = {summary['route_decision_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"raw_residual_direction_signature = {summary['raw_residual_direction_signature']}",
              f"normalized_residual_direction_signature = {summary['normalized_residual_direction_signature']}",
              f"covariance_weighted_direction_signature = {summary['covariance_weighted_direction_signature']}",
              f"diagnostic_scalar_value = {summary['diagnostic_scalar_value']}",
              f"diagnostic_scalar_interpretation_complete = {summary['diagnostic_scalar_interpretation_complete']}",
              f"simple_positive_qso_pressure_weakened = {summary['simple_positive_qso_pressure_weakened']}",
              f"source_comparison_plan_written = {summary['source_comparison_plan_written']}",
              f"source_separated_lane_inventory_allowed_next = {summary['source_separated_lane_inventory_allowed_next']}",
              f"combined_matrix_allowed = {summary['combined_matrix_allowed']}",
              f"p_value_computed = {summary['p_value_computed']}",
              f"likelihood_computed = {summary['likelihood_computed']}",
              f"evidence_allowed = {summary['evidence_allowed']}",
              f"scoring_allowed = {summary['scoring_allowed']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Scalar interpretation:",
              *scalar_lines,
              "",
              "Source lane inventory:",
              *lane_lines,
