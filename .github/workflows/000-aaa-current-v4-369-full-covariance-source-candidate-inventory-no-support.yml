name: "!!! AAA CURRENT - TAIRID v4.369 full covariance source candidate inventory no support"

on:
  workflow_dispatch:

jobs:
  run-v4-369-full-covariance-source-candidate-inventory-no-support:
    name: "!!! AAA CURRENT - Run v4.369 full covariance source candidate inventory"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.368 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.368 output ZIP by pattern..."
          INPUT_368_ZIP="$(ls tairid-v4-368-post-audit-route-decision-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_368_ZIP" ]; then
            echo "Could not find v4.368 output ZIP."
            echo "Expected:"
            echo "tairid-v4-368-post-audit-route-decision-no-support-output.zip"
            exit 1
          fi

          echo "Using v4.368 ZIP:"
          echo "$INPUT_368_ZIP"
          echo "INPUT_368_ZIP=$INPUT_368_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.369 full covariance candidate inventory script
        run: |
          cat > run_v4_369_full_covariance_source_candidate_inventory_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import hashlib
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "full covariance source candidate inventory only; no covariance values loaded; no full covariance available yet; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims"

          COVARIANCE_KEYWORDS = [
              "covariance", "covmat", "cov", "matrix", "likelihood", "boss", "eboss",
              "dr12", "dr16", "rsd", "fsigma8", "fsigma", "growth", "sdss"
          ]

          def sha256_file(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def passed_column_all(df):
              if "passed" not in df.columns:
                  return False
              return df["passed"].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def repo_candidate_scan(repo: Path) -> pd.DataFrame:
              rows = []
              for p in sorted(repo.rglob("*")):
                  if not p.is_file() or ".git" in p.parts:
                      continue
                  rel = str(p.relative_to(repo))
                  lower = rel.lower()
                  hits = [k for k in COVARIANCE_KEYWORDS if k in lower]
                  if hits:
                      rows.append({
                          "repo_candidate_id": f"v4_369_repo_covariance_candidate_{len(rows)+1:03d}",
                          "repo_path": rel,
                          "file_name": p.name,
                          "size_bytes": p.stat().st_size,
                          "sha256": sha256_file(p),
                          "keyword_hits": "|".join(hits),
                          "candidate_status": "repo_file_candidate_only_not_loaded",
                          "full_covariance_loaded": False,
                          "covariance_values_loaded": False,
                          "likelihood_computed": False,
                          "p_values_computed": False,
                          "score_valid": False,
                          "support_allowed": False,
                          "claim_boundary": CLAIM_BOUNDARY,
                      })
              if not rows:
                  rows.append({
                      "repo_candidate_id": "v4_369_repo_covariance_candidate_000",
                      "repo_path": "",
                      "file_name": "",
                      "size_bytes": 0,
                      "sha256": "",
                      "keyword_hits": "",
                      "candidate_status": "no_existing_repo_covariance_file_candidates_found",
                      "full_covariance_loaded": False,
                      "covariance_values_loaded": False,
                      "likelihood_computed": False,
                      "p_values_computed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })
              return pd.DataFrame(rows)

          def main():
              input_368 = Path(os.environ["INPUT_368_ZIP"])
              repo = Path(".").resolve()

              outdir = Path("tairid_v4_369_full_covariance_source_candidate_inventory_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base368 = extract_zip(input_368, "tairid_v4_369_368_")

              summary368_path = find_one(base368, "v4_368_summary.json")
              route_decision_path = find_one(base368, "v4_368_post_audit_route_decision_NO_SUPPORT.csv")
              selected_route_packet_path = find_one(base368, "v4_368_selected_route_packet_NO_SUPPORT.csv")
              route_options_path = find_one(base368, "v4_368_post_audit_route_options_NO_SUPPORT.csv")
              gap368_path = find_one(base368, "v4_368_gap_status_after_post_audit_route_decision.csv")
              stage_ledger_path = find_one(base368, "v4_368_input_v4_367_stage_ledger_preserved.csv")
              ruled_out_path = find_one(base368, "v4_368_input_v4_367_ruled_out_open_gaps_preserved.csv")
              findings_path = find_one(base368, "v4_368_input_v4_367_guarded_findings_preserved.csv")
              rules368_path = find_one(base368, "v4_368_rule_checks.csv")

              summary368 = json.loads(summary368_path.read_text())
              route_decision = pd.read_csv(route_decision_path)
              selected_route_packet = pd.read_csv(selected_route_packet_path)
              route_options = pd.read_csv(route_options_path)
              gap368 = pd.read_csv(gap368_path)
              stage_ledger = pd.read_csv(stage_ledger_path)
              ruled_out = pd.read_csv(ruled_out_path)
              findings = pd.read_csv(findings_path)
              rules368 = pd.read_csv(rules368_path)

              guarded_chi_square_sum = float(summary368["guarded_diagonal_chi_square_sum"])
              dof_candidate = int(summary368["degrees_of_freedom_candidate"])
              chi_square_term_rows = int(summary368["chi_square_term_rows"])

              repo_candidates = repo_candidate_scan(repo)

              seeded_candidates = pd.DataFrame([
                  {
                      "source_candidate_id": "v4_369_full_cov_source_candidate_001",
                      "candidate_name": "BOSS DR12 consensus / RSD full covariance matrix candidate",
                      "candidate_role": "possible_covariance_for_three_loaded_BOSS_DR12_rows",
                      "human_source_to_locate": "Locate official covariance matrix or likelihood package matching the loaded z=0.38,0.51,0.61 RSD/fsigma8 rows.",
                      "candidate_status": "source_candidate_not_loaded",
                  },
                  {
                      "source_candidate_id": "v4_369_full_cov_source_candidate_002",
                      "candidate_name": "SDSS/BOSS DR12 public covariance or likelihood release candidate",
                      "candidate_role": "possible_public_data_release_covariance",
                      "human_source_to_locate": "Locate public SDSS/BOSS covariance matrix, likelihood files, or tables tied to DR12 consensus measurements.",
                      "candidate_status": "source_candidate_not_loaded",
                  },
                  {
                      "source_candidate_id": "v4_369_full_cov_source_candidate_003",
                      "candidate_name": "eBOSS / SDSS DR16 RSD covariance candidate for broader lane",
                      "candidate_role": "possible_future_broader_source_covariance",
                      "human_source_to_locate": "Locate eBOSS/DR16 covariance resources if the repair lane expands beyond the three BOSS DR12 rows.",
                      "candidate_status": "source_candidate_not_loaded",
                  },
                  {
                      "source_candidate_id": "v4_369_full_cov_source_candidate_004",
                      "candidate_name": "Manual upload placeholder for exact covariance file",
                      "candidate_role": "human_supplied_covariance_file_path",
                      "human_source_to_locate": "Upload the exact covariance file if found, then run a later header/integrity gate.",
                      "candidate_status": "placeholder_not_loaded",
                  },
              ])

              for col in [
                  "full_covariance_file_uploaded",
                  "full_covariance_values_loaded",
                  "covariance_dimension_confirmed",
                  "observed_row_order_matched",
                  "likelihood_computed",
                  "p_values_computed",
                  "score_valid",
                  "support_allowed",
              ]:
                  seeded_candidates[col] = False

              seeded_candidates["claim_boundary"] = CLAIM_BOUNDARY

              human_review_packet = seeded_candidates.copy()
              human_review_packet["human_covariance_source_decision"] = ""
              human_review_packet["allowed_human_covariance_source_decisions"] = "accept_candidate_for_later_covariance_file_search|needs_better_source|reject_candidate|keep_blocked"
              human_review_packet["human_covariance_source_url_or_file_note"] = ""
              human_review_packet["human_covariance_source_note"] = ""
              human_review_packet["candidate_accepted_now"] = False

              repair_plan = pd.DataFrame([
                  {
                      "repair_step": "v4.369",
                      "goal": "Inventory full-covariance source candidates.",
                      "loads_covariance_values": False,
                      "support_allowed": False,
                  },
                  {
                      "repair_step": "v4.370",
                      "goal": "Human review selected covariance source candidates.",
                      "loads_covariance_values": False,
                      "support_allowed": False,
                  },
                  {
                      "repair_step": "v4.371",
                      "goal": "If a source is accepted, stage exact covariance file or source URL; header/integrity only.",
                      "loads_covariance_values": False,
                      "support_allowed": False,
                  },
                  {
                      "repair_step": "later",
                      "goal": "Only after dimensional/order checks, attempt full covariance ingestion.",
                      "loads_covariance_values": False,
                      "support_allowed": False,
                  },
              ])

              limitation_update = pd.DataFrame([
                  {
                      "limit_id": "V4_369_LIMIT_001",
                      "limit": "The prior chi-square remains diagonal-only.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_369_LIMIT_002",
                      "limit": "No covariance matrix is loaded in v4.369.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_369_LIMIT_003",
                      "limit": "No likelihood or p-values are computed in v4.369.",
                      "status": "blocked_by_design",
                  },
                  {
                      "limit_id": "V4_369_LIMIT_004",
                      "limit": "No valid full score exists in v4.369.",
                      "status": "score_valid_false",
                  },
                  {
                      "limit_id": "V4_369_LIMIT_005",
                      "limit": "No support claim is allowed.",
                      "status": "support_allowed_false",
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_369_GAP_001",
                      "gap": "Full covariance source candidate inventory created.",
                      "status_after_v4_369": "candidate_inventory_created_no_covariance_loaded",
                      "next_gate": "v4_370_full_covariance_source_candidate_human_review_no_support_claims",
                  },
                  {
                      "gap_id": "V4_369_GAP_002",
                      "gap": "Exact covariance file remains missing.",
                      "status_after_v4_369": "still_open",
                      "next_gate": "human_source_review_then_file_staging",
                  },
                  {
                      "gap_id": "V4_369_GAP_003",
                      "gap": "Covariance dimensions/order remain unconfirmed.",
                      "status_after_v4_369": "still_blocked",
                      "next_gate": "later_covariance_dimension_order_gate",
                  },
                  {
                      "gap_id": "V4_369_GAP_004",
                      "gap": "Likelihood, p-values, and score remain blocked.",
                      "status_after_v4_369": "still_blocked",
                      "next_gate": "later_only_after_covariance_ingestion_and_validation",
                  },
                  {
                      "gap_id": "V4_369_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_369": "still_blocked",
                      "next_gate": "no_support_claims_allowed_from_v4_369",
                  },
              ])

              hard_checks = {
                  "input_v4_368_summary_found": summary368.get("version") == "v4.368",
                  "input_v4_368_rules_all_passed": summary_rules_all_passed(summary368),
                  "input_v4_368_failed_gates_none": summary368.get("failed_gates") == "none",
                  "input_v4_368_route_full_covariance": summary368.get("selected_post_audit_route") == "full_covariance_repair_lane",
                  "input_v4_368_next_route_correct": summary368.get("selected_next_route") == "v4_369_full_covariance_source_candidate_inventory_no_support_claims",
                  "input_v4_368_no_full_covariance": summary368.get("full_covariance_available") is False,
                  "input_v4_368_no_likelihood": summary368.get("likelihood_computed") is False,
                  "input_v4_368_no_p_values": summary368.get("p_values_computed") is False,
                  "input_v4_368_no_score_valid": summary368.get("score_valid") is False,
                  "input_v4_368_no_support_allowed": summary368.get("support_allowed") is False,

                  "rules368_all_passed": passed_column_all(rules368),
                  "route_decision_rows_equal_1": len(route_decision) == 1,
                  "selected_route_packet_rows_equal_1": len(selected_route_packet) == 1,
                  "route_options_rows_equal_4": len(route_options) == 4,
                  "gap368_rows_equal_5": len(gap368) == 5,
                  "stage_ledger_rows_at_least_9": len(stage_ledger) >= 9,
                  "ruled_out_rows_at_least_10": len(ruled_out) >= 10,
                  "findings_rows_equal_5": len(findings) == 5,

                  "repo_candidate_inventory_has_rows": len(repo_candidates) >= 1,
                  "seeded_candidates_rows_equal_4": len(seeded_candidates) == 4,
                  "human_review_packet_rows_equal_candidates": len(human_review_packet) == len(seeded_candidates),
                  "repair_plan_rows_equal_4": len(repair_plan) == 4,
                  "limitation_update_rows_equal_5": len(limitation_update) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "no_full_covariance_uploaded": false_col(seeded_candidates, "full_covariance_file_uploaded"),
                  "no_full_covariance_values_loaded": false_col(seeded_candidates, "full_covariance_values_loaded"),
                  "no_covariance_dimension_confirmed": false_col(seeded_candidates, "covariance_dimension_confirmed"),
                  "no_observed_row_order_matched": false_col(seeded_candidates, "observed_row_order_matched"),
                  "no_likelihood_computed": false_col(seeded_candidates, "likelihood_computed"),
                  "no_p_values_computed": false_col(seeded_candidates, "p_values_computed"),
                  "no_score_valid": false_col(seeded_candidates, "score_valid") and false_col(route_decision, "score_valid"),
                  "no_support_allowed": false_col(seeded_candidates, "support_allowed") and false_col(route_decision, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary369 = {
                  "version": "v4.369",
                  "route_name": "v4_369_full_covariance_source_candidate_inventory_no_support_claims",
                  "expected_result": "v4_369_full_covariance_source_candidate_inventory_passed_no_covariance_loaded_no_support_claims",
                  "input_version": "v4.368",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "selected_repair_lane": "full_covariance_repair_lane",
                  "repo_covariance_candidate_rows": int(len(repo_candidates)),
                  "seeded_covariance_source_candidate_rows": int(len(seeded_candidates)),
                  "human_review_packet_rows": int(len(human_review_packet)),
                  "guarded_diagonal_chi_square_sum": guarded_chi_square_sum,
                  "degrees_of_freedom_candidate": dof_candidate,
                  "chi_square_term_rows": chi_square_term_rows,
                  "full_covariance_available": False,
                  "full_covariance_values_loaded": False,
                  "covariance_dimension_confirmed": False,
                  "observed_row_order_matched": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": "human_fill_v4_369_covariance_source_review_then_v4_370_full_covariance_source_candidate_review_no_support_claims",
              }

              repo_candidates.to_csv(outdir / "v4_369_repo_covariance_file_candidate_scan_NO_VALUES_LOADED.csv", index=False)
              seeded_candidates.to_csv(outdir / "v4_369_full_covariance_source_candidates_NO_COVARIANCE_LOADED.csv", index=False)
              human_review_packet.to_csv(outdir / "v4_369_HUMAN_FILL_full_covariance_source_candidate_review_NO_SUPPORT.csv", index=False)
              repair_plan.to_csv(outdir / "v4_369_full_covariance_repair_plan_NO_SUPPORT.csv", index=False)
              limitation_update.to_csv(outdir / "v4_369_limitations_after_covariance_candidate_inventory.csv", index=False)
              gap_update.to_csv(outdir / "v4_369_gap_status_after_full_covariance_source_candidate_inventory.csv", index=False)
              route_decision.to_csv(outdir / "v4_369_input_v4_368_route_decision_preserved.csv", index=False)
              findings.to_csv(outdir / "v4_369_input_v4_368_guarded_findings_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_369_rule_checks.csv", index=False)

              (outdir / "v4_369_summary.json").write_text(json.dumps(summary369, indent=2))

              summary_md = f"""# TAIRID v4.369 Full Covariance Source Candidate Inventory — No Support Claims

          Expected result: `{summary369["expected_result"]}`

          {summary369["rules_passed"]} / {summary369["rules_total"]} rules passed

          failed_gates = {summary369["failed_gates"]}

          selected_repair_lane = `{summary369["selected_repair_lane"]}`

          repo_covariance_candidate_rows = {summary369["repo_covariance_candidate_rows"]}

          seeded_covariance_source_candidate_rows = {summary369["seeded_covariance_source_candidate_rows"]}

          full_covariance_available = false

          full_covariance_values_loaded = false

          covariance_dimension_confirmed = false

          observed_row_order_matched = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step inventories candidate paths for full covariance repair.

          It does **not** load covariance values.

          It does **not** confirm covariance dimensions or row order.

          It does **not** compute likelihood or p-values.

          It does **not** make support claims.

          Next route: `{summary369["selected_next_route"]}`
          """
              (outdir / "v4_369_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary369, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_369_full_covariance_source_candidate_inventory_no_support.py

      - name: Run v4.369 full covariance source candidate inventory no support
        run: |
          python run_v4_369_full_covariance_source_candidate_inventory_no_support.py

      - name: Upload v4.369 full covariance source candidate inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-369-full-covariance-source-candidate-inventory-no-support-output
          path: |
            tairid_v4_369_full_covariance_source_candidate_inventory_no_support_output/
            tairid_v4_369_full_covariance_source_candidate_inventory_no_support_output.zip
