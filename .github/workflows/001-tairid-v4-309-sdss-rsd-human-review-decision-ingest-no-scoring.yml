name: 001 TAIRID v4.309 - SDSS RSD Human Review Decision Ingest No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-309-sdss-rsd-human-review-decision-ingest-no-scoring.yml"
      - ".github/workflows/**"
      - "github/workflows/**"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-human-review-decision-ingest-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.309 SDSS RSD Human Review Decision Ingest No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.309 SDSS RSD human review decision ingest no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv, json, re, zipfile

          VERSION = "v4.309"
          EXPECTED_RESULT = "v4_309_sdss_rsd_human_review_decision_ingest_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_310_sdss_rsd_review_decision_status_or_handoff_no_scoring"

          OUT = Path("tairid_v4_309_sdss_rsd_human_review_decision_ingest_output")
          OUT.mkdir(parents=True, exist_ok=True)
          ZIP_NAME = "tairid-v4-309-sdss-rsd-human-review-decision-ingest-output.zip"

          DECISION_PATTERNS = [
              r"sdss[_-]rsd[_-]human[_-]decision[_-]template[_-]v4[_-]308(?:[-_]\d+)?[_-]fillable\.csv$",
              r"SDSS[_-]RSD[_-]HUMAN[_-]DECISION[_-]TEMPLATE[_-]v4[_-]308(?:[-_]\d+)?[_-]FILLABLE\.csv$",
              r"sdss[_-]rsd[_-]human[_-]decisions[_-]v4[_-]308(?:[-_]\d+)?\.csv$",
              r"SDSS[_-]RSD[_-]HUMAN[_-]DECISIONS[_-]v4[_-]308(?:[-_]\d+)?\.csv$",
          ]

          EXACT_PATHS = [
              "data/SDSS_RSD_HUMAN_DECISION_TEMPLATE_v4_308_FILLABLE.csv",
              "data/sdss_rsd_human_decision_template_v4_308_fillable.csv",
              "SDSS_RSD_HUMAN_DECISION_TEMPLATE_v4_308_FILLABLE.csv",
              "sdss_rsd_human_decision_template_v4_308_fillable.csv",
              ".github/workflows/SDSS_RSD_HUMAN_DECISION_TEMPLATE_v4_308_FILLABLE.csv",
              ".github/workflows/sdss_rsd_human_decision_template_v4_308_fillable.csv",
          ]

          REQUIRED_FIELDS = [
              "decision_id",
              "answer_id",
              "target_id",
              "target_class",
              "human_decision",
              "allowed_decisions",
              "edited_source_url_or_citation",
              "edited_quoted_or_precise_source_text",
              "edited_answer_summary",
              "reviewer_note",
              "claim_limit_must_remain",
          ]

          ALLOWED_DECISIONS = {"accept_for_next_review", "edit_needed", "reject", "keep_blocked"}

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def safe_read_csv(path):
              try:
                  with Path(path).open("r", encoding="utf-8-sig", newline="") as f:
                      reader = csv.DictReader(f)
                      rows = list(reader)
                      fields = reader.fieldnames or []
                  return True, fields, rows, ""
              except Exception as exc:
                  return False, [], [], f"{type(exc).__name__}: {exc}"

          def norm(x):
              return str(x or "").strip()

          def find_decision_file():
              candidates = []
              seen = set()

              for raw in EXACT_PATHS:
                  p = Path(raw)
                  exists = p.exists()
                  read_ok, fields, rows, error = safe_read_csv(p) if exists else (False, [], [], "")
                  has_required = all(field in set(fields) for field in REQUIRED_FIELDS)
                  candidates.append({
                      "candidate_path": raw,
                      "candidate_type": "exact",
                      "exists": exists,
                      "read_ok": read_ok,
                      "row_count": len(rows),
                      "field_count": len(fields),
                      "has_required_fields": has_required,
                      "error": error,
                      "score_allowed": False,
                      "support_allowed": False,
                  })
                  seen.add(raw)

              for p in Path(".").rglob("*.csv"):
                  raw = p.as_posix().lstrip("./")
                  if raw in seen:
                      continue
                  name = p.name
                  pattern_match = any(re.search(pattern, name, re.I) for pattern in DECISION_PATTERNS)
                  semantic_match = all(term in raw.lower() for term in ["sdss", "rsd", "human", "decision"])
                  if not (pattern_match or semantic_match):
                      continue
                  read_ok, fields, rows, error = safe_read_csv(p)
                  has_required = all(field in set(fields) for field in REQUIRED_FIELDS)
                  duplicate_suffix = bool(re.search(r"[-_]\d+\.csv$", name))
                  candidates.append({
                      "candidate_path": raw,
                      "candidate_type": "fuzzy",
                      "exists": True,
                      "read_ok": read_ok,
                      "row_count": len(rows),
                      "field_count": len(fields),
                      "has_required_fields": has_required,
                      "duplicate_download_suffix_detected": duplicate_suffix,
                      "error": error,
                      "score_allowed": False,
                      "support_allowed": False,
                  })

              readable = [c for c in candidates if c["exists"] and c["read_ok"] and c["has_required_fields"]]
              readable = sorted(readable, key=lambda r: (r["candidate_type"] != "exact", not r.get("duplicate_download_suffix_detected", False), r["candidate_path"]))
              selected = readable[0]["candidate_path"] if readable else ""
              if selected:
                  _, fields, rows, _ = safe_read_csv(selected)
              else:
                  fields, rows = [], []
              return candidates, selected, fields, rows

          def review_decision(row, idx, source_path):
              decision = norm(row.get("human_decision")).lower()
              edited_source = norm(row.get("edited_source_url_or_citation"))
              edited_quote = norm(row.get("edited_quoted_or_precise_source_text"))
              edited_summary = norm(row.get("edited_answer_summary"))
              claim_limit = norm(row.get("claim_limit_must_remain")).lower()
              missing = [field for field in REQUIRED_FIELDS if field not in row]
              decision_blank = decision == ""
              decision_allowed = decision in ALLOWED_DECISIONS
              claim_limit_ok = claim_limit in ["", "no_scoring/no_claims", "no_scoring", "no_claims", "keep_blocked"]
              accept_has_text = True
              if decision == "accept_for_next_review":
                  accept_has_text = bool(edited_source and len(edited_quote) >= 12 and len(edited_summary) >= 8)

              if decision_blank:
                  status = "blank_decision_no_action"
              elif missing:
                  status = "invalid_missing_required_fields"
              elif not decision_allowed:
                  status = "invalid_decision_value"
              elif not claim_limit_ok:
                  status = "invalid_claim_limit"
              elif not accept_has_text:
                  status = "accept_missing_source_quote_or_summary"
              else:
                  status = "decision_reviewable_for_next_stage_not_approved"

              return {
                  "review_id": f"decision_review_{idx+1:03d}",
                  "source_path": source_path,
                  "decision_id": norm(row.get("decision_id")),
                  "answer_id": norm(row.get("answer_id")),
                  "target_id": norm(row.get("target_id")),
                  "target_class": norm(row.get("target_class")),
                  "human_decision": decision,
                  "decision_blank": decision_blank,
                  "decision_allowed": decision_allowed,
                  "claim_limit_ok": claim_limit_ok,
                  "has_edited_source": bool(edited_source),
                  "has_edited_quote": len(edited_quote) >= 12,
                  "has_edited_summary": len(edited_summary) >= 8,
                  "review_status": status,
                  "row_meaning_confirmed": False,
                  "baseline_approved": False,
                  "definition_match_confirmed": False,
                  "row_family_selected": False,
                  "gate_approval_allowed": False,
                  "score_allowed": False,
                  "support_allowed": False,
              }

          inherited_v4_308_rows = [
              {"inherited_from": "v4.308", "item": "rules", "value": "50 / 50 passed", "meaning": "Human review packet passed.", "carry_forward_status": "ready_for_decision_ingest"},
              {"inherited_from": "v4.308", "item": "source_fetch_ok_rows", "value": 6, "meaning": "GitHub fetched all six sources.", "carry_forward_status": "sources_available"},
              {"inherited_from": "v4.308", "item": "source_quote_rows", "value": 25, "meaning": "Candidate quote windows existed.", "carry_forward_status": "quote_windows_available"},
              {"inherited_from": "v4.308", "item": "draft_prefill_rows", "value": 20, "meaning": "Draft prefill rows existed.", "carry_forward_status": "draft_ready"},
              {"inherited_from": "v4.308", "item": "human_review_packet_rows", "value": 20, "meaning": "Human review packet rows existed.", "carry_forward_status": "review_packet_ready"},
              {"inherited_from": "v4.308", "item": "human_decision_template_rows", "value": 20, "meaning": "Blank human decision template rows existed.", "carry_forward_status": "decision_template_ready"},
              {"inherited_from": "v4.308", "item": "gate_approval_rows", "value": 0, "meaning": "No gate approval.", "carry_forward_status": "no_approval"},
              {"inherited_from": "v4.308", "item": "selected_next_route", "value": "v4_309_sdss_rsd_human_review_decision_ingest_no_scoring", "meaning": "Current route ingests human decisions.", "carry_forward_status": "current_route"},
          ]

          candidate_rows, selected_path, selected_fields, selected_rows = find_decision_file()
          review_rows = [review_decision(row, idx, selected_path) for idx, row in enumerate(selected_rows)]

          blank_rows = [r for r in review_rows if r["review_status"] == "blank_decision_no_action"]
          reviewable_rows = [r for r in review_rows if r["review_status"] == "decision_reviewable_for_next_stage_not_approved"]
          invalid_rows = [r for r in review_rows if r["review_status"].startswith("invalid") or r["review_status"] == "accept_missing_source_quote_or_summary"]
          accepted_rows = [r for r in reviewable_rows if r["human_decision"] == "accept_for_next_review"]
          edit_needed_rows = [r for r in reviewable_rows if r["human_decision"] == "edit_needed"]
          rejected_rows = [r for r in reviewable_rows if r["human_decision"] == "reject"]
          keep_blocked_rows = [r for r in reviewable_rows if r["human_decision"] == "keep_blocked"]

          decision_summary_rows = [
              {"summary_id": "decision_summary_001", "metric": "selected_decision_path", "value": selected_path, "meaning": "Human decision file selected for ingest, if any."},
              {"summary_id": "decision_summary_002", "metric": "decision_rows_loaded", "value": len(selected_rows), "meaning": "Rows loaded from decision template."},
              {"summary_id": "decision_summary_003", "metric": "blank_decision_rows", "value": len(blank_rows), "meaning": "Rows with no human decision filled."},
              {"summary_id": "decision_summary_004", "metric": "reviewable_decision_rows", "value": len(reviewable_rows), "meaning": "Rows with a valid human decision value; still not approved."},
              {"summary_id": "decision_summary_005", "metric": "accepted_for_next_review_rows", "value": len(accepted_rows), "meaning": "Rows marked accept_for_next_review; still not gate approval."},
              {"summary_id": "decision_summary_006", "metric": "edit_needed_rows", "value": len(edit_needed_rows), "meaning": "Rows marked edit_needed."},
              {"summary_id": "decision_summary_007", "metric": "rejected_rows", "value": len(rejected_rows), "meaning": "Rows marked reject."},
              {"summary_id": "decision_summary_008", "metric": "keep_blocked_rows", "value": len(keep_blocked_rows), "meaning": "Rows marked keep_blocked."},
          ]

          next_review_candidate_rows = [
              {
                  "candidate_id": f"next_review_candidate_{i+1:03d}",
                  "answer_id": row["answer_id"],
                  "target_id": row["target_id"],
                  "target_class": row["target_class"],
                  "decision_source_path": row["source_path"],
                  "human_decision": row["human_decision"],
                  "candidate_status": "eligible_for_gate_review_later_not_approved_now",
                  "gate_approval_allowed_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              }
              for i, row in enumerate(accepted_rows)
          ]

          gate_rows = [
              {"gate_id": "gate_001", "gate_object": "human_decision_file_found", "gate_passed": bool(selected_path), "gate_status": "found" if selected_path else "missing", "reason": selected_path or "No filled human decision template found in repo."},
              {"gate_id": "gate_002", "gate_object": "human_decision_rows_loaded", "gate_passed": len(selected_rows) > 0, "gate_status": "loaded" if selected_rows else "none_loaded", "reason": "Rows loaded only if decision template exists."},
              {"gate_id": "gate_003", "gate_object": "reviewable_decision_rows_present", "gate_passed": len(reviewable_rows) > 0, "gate_status": "present" if reviewable_rows else "none", "reason": "Blank decisions do not count."},
              {"gate_id": "gate_004", "gate_object": "accepted_for_next_review_rows_present", "gate_passed": len(accepted_rows) > 0, "gate_status": "present" if accepted_rows else "none", "reason": "Accept decisions remain next-review candidates only."},
              {"gate_id": "gate_005", "gate_object": "row_meaning_confirmation", "gate_passed": False, "gate_status": "not_confirmed", "reason": "v4.309 ingests decisions only; it does not approve gates."},
              {"gate_id": "gate_006", "gate_object": "baseline_approval", "gate_passed": False, "gate_status": "not_approved", "reason": "v4.309 ingests decisions only; it does not approve gates."},
              {"gate_id": "gate_007", "gate_object": "definition_match_confirmation", "gate_passed": False, "gate_status": "not_confirmed", "reason": "v4.309 ingests decisions only; it does not approve gates."},
              {"gate_id": "gate_008", "gate_object": "diagonal_diagnostic_readiness", "gate_passed": False, "gate_status": "not_ready", "reason": "No scoring readiness without approved gates."},
          ]

          blocked_rows = [
              {"blocked_id": "blocked_001", "operation": "confirm_row_meaning_now", "reason": "decision ingest is not gate approval", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "approve_baseline_values_now", "reason": "decision ingest is not gate approval", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "select_row_family_now", "reason": "row meaning is not confirmed", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "confirm_definition_match_now", "reason": "definition match not approved", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "run_diagonal_diagnostic_now", "reason": "diagnostic readiness is false", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "compute_residual_or_chi_square", "reason": "no approved baseline and no selected row family", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "compute_p_value_or_likelihood", "reason": "full covariance missing", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "claim_tairid_support", "reason": "same-family no-support ceiling", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "claim_evidence_or_validation", "reason": "no score and no holdout", "blocked": True},
              {"blocked_id": "blocked_010", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_011", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "human_review_decision_ingest", "permission_status": "completed", "reason": "Decision ingest/search completed."},
              {"permission_scope": "review_decision_status_or_handoff", "permission_status": "allowed_next", "reason": "Next workflow may decide whether decisions are missing, blank, or ready for later gate review."},
              {"permission_scope": "row_meaning_confirmation", "permission_status": "blocked", "reason": "No confirmation in this workflow."},
              {"permission_scope": "baseline_approval", "permission_status": "blocked", "reason": "No approval in this workflow."},
              {"permission_scope": "diagonal_diagnostic_score", "permission_status": "blocked", "reason": "Readiness still fails."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
              {"permission_scope": "validation_or_evidence_claim", "permission_status": "blocked", "reason": "No validation/evidence allowed."},
          ]

          readiness_rows = [
              {"readiness_id": "ready_001", "object": "decision_candidate_files", "status": str(len(candidate_rows)), "meaning": "Decision files searched/found."},
              {"readiness_id": "ready_002", "object": "selected_decision_path", "status": selected_path or "none", "meaning": "Selected decision template path, if any."},
              {"readiness_id": "ready_003", "object": "decision_rows_loaded", "status": str(len(selected_rows)), "meaning": "Decision rows loaded."},
              {"readiness_id": "ready_004", "object": "reviewable_decision_rows", "status": str(len(reviewable_rows)), "meaning": "Rows with nonblank valid human decisions."},
              {"readiness_id": "ready_005", "object": "accepted_for_next_review_rows", "status": str(len(accepted_rows)), "meaning": "Rows that might later undergo gate review, not approval now."},
              {"readiness_id": "ready_006", "object": "external_scoring", "status": "blocked", "meaning": "Still not allowed."},
          ]

          decision_rows = [
              {"decision_id": "decision_001", "decision": "Human decision ingest is complete.", "basis": "The workflow searched exact and fuzzy decision-template paths.", "next_action": "Summarize whether decisions are missing, blank, or reviewable.", "claim_status": "ingest_only"},
              {"decision_id": "decision_002", "decision": "No gate approval is possible in v4.309.", "basis": "Even accept_for_next_review means later gate review, not approval now.", "next_action": "Keep all scoring blocked.", "claim_status": "no_gate_approval"},
              {"decision_id": "decision_003", "decision": "The next route is review-decision status or handoff.", "basis": "If no filled decision template exists, the rail should stop pretending the content is reviewed.", "next_action": SELECTED_NEXT_ROUTE, "claim_status": "safe_to_continue"},
          ]

          route_rows = [
              {"route_id": "route_001", "route": "sdss_rsd_review_decision_status_or_handoff_no_scoring", "permission_status": "recommended", "reason": "Clarify whether decisions are missing, blank, or ready for later gate review."},
              {"route_id": "route_002", "route": "sdss_rsd_manual_answer_gate_approval", "permission_status": "blocked_until_reviewable_human_decisions", "reason": "No gate approval in v4.309."},
              {"route_id": "route_003", "route": "sdss_rsd_diagonal_diagnostic_score", "permission_status": "blocked_until_gate_decision_and_readiness", "reason": "No scoring readiness."},
              {"route_id": "route_004", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.309 is a clean decision-ingest milestone."},
          ]

          sdr_rows = [
              {"sdr_id": "sdr_001", "before_state": "human review packet existed but decision ingest was undefined", "after_state": "decision template search and ingest are explicit", "reduction_type": "review-decision path operationalized"},
              {"sdr_id": "sdr_002", "before_state": "blank decisions could be confused with approval", "after_state": "blank decisions are no action", "reduction_type": "blank/decision boundary enforced"},
              {"sdr_id": "sdr_003", "before_state": "accept could be confused with gate approval", "after_state": "accept_for_next_review is only later review eligibility", "reduction_type": "decision/approval boundary preserved"},
              {"sdr_id": "sdr_004", "before_state": "missing decision file could lead to false progress", "after_state": "missing file is a clear status outcome", "reduction_type": "false progress prevented"},
              {"sdr_id": "sdr_005", "before_state": "decision ingest could invite scoring pressure", "after_state": "all scoring and claims remain blocked", "reduction_type": "claim discipline preserved"},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before decision ingest"},
              {"gate": "inherited_v4_308_rows_equal_8", "passed": len(inherited_v4_308_rows) == 8, "detail": f"inherited_v4_308_rows = {len(inherited_v4_308_rows)}"},
              {"gate": "decision_candidate_rows_recorded", "passed": len(candidate_rows) >= 0, "detail": f"decision_candidate_rows = {len(candidate_rows)}"},
              {"gate": "decision_summary_rows_equal_8", "passed": len(decision_summary_rows) == 8, "detail": f"decision_summary_rows = {len(decision_summary_rows)}"},
              {"gate": "decision_review_rows_recorded", "passed": len(review_rows) >= 0, "detail": f"decision_review_rows = {len(review_rows)}"},
              {"gate": "next_review_candidate_rows_recorded", "passed": len(next_review_candidate_rows) >= 0, "detail": f"next_review_candidate_rows = {len(next_review_candidate_rows)}"},
              {"gate": "gate_rows_equal_8", "passed": len(gate_rows) == 8, "detail": f"gate_rows = {len(gate_rows)}"},
              {"gate": "blocked_rows_equal_11", "passed": len(blocked_rows) == 11, "detail": f"blocked_rows = {len(blocked_rows)}"},
              {"gate": "permission_rows_equal_7", "passed": len(permission_rows) == 7, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_6", "passed": len(readiness_rows) == 6, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "decision_rows_equal_3", "passed": len(decision_rows) == 3, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "route_rows_equal_4", "passed": len(route_rows) == 4, "detail": f"route_rows = {len(route_rows)}"},
              {"gate": "sdr_rows_equal_5", "passed": len(sdr_rows) == 5, "detail": f"sdr_rows = {len(sdr_rows)}"},
              {"gate": "all_candidates_no_score_support", "passed": all(row["score_allowed"] is False and row["support_allowed"] is False for row in candidate_rows), "detail": "decision candidates no score/support"},
              {"gate": "all_reviews_no_score_support", "passed": all(row["score_allowed"] is False and row["support_allowed"] is False for row in review_rows), "detail": "decision reviews no score/support"},
              {"gate": "all_reviews_no_gate_approval", "passed": all(row["gate_approval_allowed"] is False for row in review_rows), "detail": "decision reviews no approval"},
              {"gate": "all_next_review_candidates_no_score_support", "passed": all(row["score_allowed"] is False and row["support_allowed"] is False for row in next_review_candidate_rows), "detail": "next review candidates no score/support"},
              {"gate": "row_meaning_gate_not_approved", "passed": any(row["gate_object"] == "row_meaning_confirmation" and row["gate_passed"] is False for row in gate_rows), "detail": "row meaning false"},
              {"gate": "baseline_gate_not_approved", "passed": any(row["gate_object"] == "baseline_approval" and row["gate_passed"] is False for row in gate_rows), "detail": "baseline false"},
              {"gate": "definition_gate_not_approved", "passed": any(row["gate_object"] == "definition_match_confirmation" and row["gate_passed"] is False for row in gate_rows), "detail": "definition false"},
              {"gate": "diagnostic_readiness_false", "passed": any(row["gate_object"] == "diagonal_diagnostic_readiness" and row["gate_passed"] is False for row in gate_rows), "detail": "diagnostic false"},
              {"gate": "all_blocked_operations_blocked", "passed": all(row["blocked"] is True for row in blocked_rows), "detail": "all blocked"},
              {"gate": "decision_ingest_permission_completed", "passed": any(row["permission_scope"] == "human_review_decision_ingest" and row["permission_status"] == "completed" for row in permission_rows), "detail": "decision ingest completed"},
              {"gate": "status_or_handoff_allowed_next", "passed": any(row["permission_scope"] == "review_decision_status_or_handoff" and row["permission_status"] == "allowed_next" for row in permission_rows), "detail": "status/handoff next"},
              {"gate": "baseline_approval_permission_blocked", "passed": any(row["permission_scope"] == "baseline_approval" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "baseline approval blocked"},
              {"gate": "diagonal_score_permission_blocked", "passed": any(row["permission_scope"] == "diagonal_diagnostic_score" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "diagonal blocked"},
              {"gate": "support_blocked", "passed": any(row["permission_scope"] == "support_language" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "support blocked"},
              {"gate": "validation_evidence_blocked", "passed": any(row["permission_scope"] == "validation_or_evidence_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation/evidence blocked"},
              {"gate": "next_route_recommended", "passed": any(row["route"] == "sdss_rsd_review_decision_status_or_handoff_no_scoring" and row["permission_status"] == "recommended" for row in route_rows), "detail": "v4.310 recommended"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_support", "passed": True, "detail": "no support"},
              {"gate": "truth_boundary_no_p_value", "passed": True, "detail": "no p-value"},
              {"gate": "truth_boundary_no_likelihood", "passed": True, "detail": "no likelihood"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout"},
              {"gate": "truth_boundary_no_combined_matrix", "passed": True, "detail": "combined matrix blocked"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_310_sdss_rsd_review_decision_status_or_handoff_no_scoring", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_309_sdss_rsd_human_review_decision_ingest_no_scoring_passed_no_claims", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_309_inherited_v4_308_rows.csv", inherited_v4_308_rows)
          write_csv(OUT / "v4_309_human_decision_candidate_file_rows.csv", candidate_rows)
          write_csv(OUT / "v4_309_human_decision_review_rows.csv", review_rows)
          write_csv(OUT / "SDSS_RSD_HUMAN_DECISION_INGEST_REVIEW_v4_309_NO_APPROVAL.csv", review_rows)
          write_csv(OUT / "v4_309_decision_summary_rows.csv", decision_summary_rows)
          write_csv(OUT / "v4_309_next_review_candidate_rows.csv", next_review_candidate_rows)
          write_csv(OUT / "v4_309_gate_decision_rows.csv", gate_rows)
          write_csv(OUT / "v4_309_blocked_operation_rows.csv", blocked_rows)
          write_csv(OUT / "v4_309_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_309_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_309_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_309_route_review_rows.csv", route_rows)
          write_csv(OUT / "v4_309_sdr_reduction_rows.csv", sdr_rows)
          write_csv(OUT / "v4_309_rule_checks.csv", checks)

          readme = [
              "# SDSS RSD Human Review Decision Ingest v4.309",
              "",
              "This workflow searches for a filled human decision template from v4.308.",
              "",
              "Accepted decision values are: `accept_for_next_review`, `edit_needed`, `reject`, and `keep_blocked`.",
              "",
              "Blank decisions are no action. `accept_for_next_review` is still not gate approval. It only means the row can later be reviewed by a gate workflow.",
              "",
              "Truth boundary: no proof, no validation, no support, no scoring, no p-value, no likelihood, no gate approval.",
          ]
          (OUT / "SDSS_RSD_HUMAN_DECISION_INGEST_v4_309_README.md").write_text("\n".join(readme), encoding="utf-8")

          summary = {
              "version": VERSION,
              "route": "sdss_rsd_human_review_decision_ingest_no_scoring_after_v4_308",
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "decision_candidate_files": len(candidate_rows),
              "selected_decision_path": selected_path,
              "decision_rows_loaded": len(selected_rows),
              "blank_decision_rows": len(blank_rows),
              "reviewable_decision_rows": len(reviewable_rows),
              "invalid_decision_rows": len(invalid_rows),
              "accepted_for_next_review_rows": len(accepted_rows),
              "edit_needed_rows": len(edit_needed_rows),
              "rejected_rows": len(rejected_rows),
              "keep_blocked_rows": len(keep_blocked_rows),
              "next_review_candidate_rows": len(next_review_candidate_rows),
              "gate_decision_rows": len(gate_rows),
              "gate_approval_rows": sum(1 for row in gate_rows if row["gate_object"] in ["row_meaning_confirmation", "baseline_approval", "definition_match_confirmation", "diagonal_diagnostic_readiness"] and row["gate_passed"]),
              "row_meaning_confirmed": False,
              "baseline_values_filled": False,
              "approved_baseline_values": 0,
              "row_family_selected": False,
              "definition_match_confirmed": False,
              "diagonal_diagnostic_allowed_now": False,
              "score_valid": False,
              "support_allowed": False,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "supports_tairid": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False
              },
          }

          (OUT / "v4_309_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.309 SDSS RSD Human Review Decision Ingest No Scoring",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"decision_candidate_files = {summary['decision_candidate_files']}",
              f"selected_decision_path = {summary['selected_decision_path']}",
              f"decision_rows_loaded = {summary['decision_rows_loaded']}",
              f"blank_decision_rows = {summary['blank_decision_rows']}",
              f"reviewable_decision_rows = {summary['reviewable_decision_rows']}",
              f"invalid_decision_rows = {summary['invalid_decision_rows']}",
              f"accepted_for_next_review_rows = {summary['accepted_for_next_review_rows']}",
              f"edit_needed_rows = {summary['edit_needed_rows']}",
              f"rejected_rows = {summary['rejected_rows']}",
              f"keep_blocked_rows = {summary['keep_blocked_rows']}",
              f"next_review_candidate_rows = {summary['next_review_candidate_rows']}",
              f"gate_approval_rows = {summary['gate_approval_rows']}",
              f"row_meaning_confirmed = {summary['row_meaning_confirmed']}",
              f"baseline_values_filled = {summary['baseline_values_filled']}",
              f"approved_baseline_values = {summary['approved_baseline_values']}",
              f"row_family_selected = {summary['row_family_selected']}",
              f"definition_match_confirmed = {summary['definition_match_confirmed']}",
              f"diagonal_diagnostic_allowed_now = {summary['diagonal_diagnostic_allowed_now']}",
              f"score_valid = {summary['score_valid']}",
              f"support_allowed = {summary['support_allowed']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Clean meaning: v4.309 searches for and reviews a filled human decision template. It does not approve any gate. Blank decisions are no action. accept_for_next_review only means later review eligibility, not approval.",
              "",
              "Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no residual, no chi-square, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.",
          ]
          (OUT / "v4_309_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"decision_candidate_files = {summary['decision_candidate_files']}")
          print(f"selected_decision_path = {summary['selected_decision_path']}")
          print(f"decision_rows_loaded = {summary['decision_rows_loaded']}")
          print(f"blank_decision_rows = {summary['blank_decision_rows']}")
          print(f"reviewable_decision_rows = {summary['reviewable_decision_rows']}")
          print(f"invalid_decision_rows = {summary['invalid_decision_rows']}")
          print(f"accepted_for_next_review_rows = {summary['accepted_for_next_review_rows']}")
          print(f"edit_needed_rows = {summary['edit_needed_rows']}")
          print(f"rejected_rows = {summary['rejected_rows']}")
          print(f"keep_blocked_rows = {summary['keep_blocked_rows']}")
          print(f"next_review_candidate_rows = {summary['next_review_candidate_rows']}")
          print(f"gate_approval_rows = {summary['gate_approval_rows']}")
          print(f"row_meaning_confirmed = {summary['row_meaning_confirmed']}")
          print(f"baseline_values_filled = {summary['baseline_values_filled']}")
          print(f"approved_baseline_values = {summary['approved_baseline_values']}")
          print(f"row_family_selected = {summary['row_family_selected']}")
          print(f"definition_match_confirmed = {summary['definition_match_confirmed']}")
          print(f"diagonal_diagnostic_allowed_now = {summary['diagonal_diagnostic_allowed_now']}")
          print(f"score_valid = {summary['score_valid']}")
          print(f"support_allowed = {summary['support_allowed']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no residual, no chi-square, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

