name: 001 TAIRID v4.249 - Primary QSO Source Search Manifest Plan

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-249-primary-qso-source-search-manifest-plan.yml"
      - "data/cosmology/external_observed_manifest.csv"
      - "external_observed_manifest.csv"

permissions:
  contents: read

jobs:
  primary-qso-source-search-manifest-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.249 Primary QSO Source Search Manifest Plan is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.249 primary QSO source search manifest plan
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import json
          import zipfile

          VERSION = "v4.249"
          ROUTE = "primary_qso_source_search_or_manual_observed_manifest_fill_plan_after_v4_248"
          EXPECTED_RESULT = "v4_249_primary_qso_source_search_manifest_plan_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_250_primary_qso_literature_candidate_extraction_guard_or_handoff"

          OUT = Path("tairid_v4_249_primary_qso_source_search_manifest_plan_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-249-primary-qso-source-search-manifest-plan-output.zip"

          OBSERVED_MANIFEST_CANDIDATES = [
              Path("data/cosmology/external_observed_manifest.csv"),
              Path("external_observed_manifest.csv"),
          ]

          REQUIRED_OBSERVED_COLUMNS = [
              "observed_id",
              "target_id",
              "source_family",
              "source_role",
              "redshift",
              "quantity",
              "observed_value",
              "observed_sigma_or_likelihood",
              "data_path_or_url",
              "covariance_path_or_url",
              "reference_model_path_or_method",
              "failure_condition_id",
              "approval_status",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def safe_float(value):
              try:
                  return float(value)
              except Exception:
                  return None

          def is_placeholder(value):
              text = str(value or "").strip().lower()
              return (
                  not text
                  or text.startswith("put_")
                  or "put_" in text
                  or text.startswith("do_not_fill")
                  or text in ["todo", "none", "na", "n/a", "template_not_filled"]
              )

          def probe_url(url):
              if not url or not str(url).startswith(("http://", "https://")):
                  return "not_url", "", ""
              try:
                  req = Request(url, headers={"User-Agent": "TAIRID-v4.249-primary-qso-source-search"})
                  with urlopen(req, timeout=20) as response:
                      return f"http_{response.status}", response.headers.get("content-type", ""), response.headers.get("content-length", "")
              except Exception as exc:
                  return "probe_failed", "", f"{type(exc).__name__}: {exc}"

          inherited_v4_248_rows = [
              {
                  "inherited_from": "v4.248",
                  "item": "rules",
                  "value": "32 / 32 passed",
                  "meaning": "Four Need Review External Source Search passed.",
                  "carry_forward_status": "ready_for_primary_source_search_plan",
              },
              {
                  "inherited_from": "v4.248",
                  "item": "primary_qso_source_search",
                  "value": "recommended",
                  "meaning": "Primary QSO source search is the recommended route.",
                  "carry_forward_status": "active_route",
              },
              {
                  "inherited_from": "v4.248",
                  "item": "manual_manifest_fill",
                  "value": "blocked_until_source_review",
                  "meaning": "Manual manifest fill cannot happen before source review.",
                  "carry_forward_status": "manifest_fill_blocked",
              },
              {
                  "inherited_from": "v4.248",
                  "item": "observed_manifest_input_rows",
                  "value": 0,
                  "meaning": "No external observed rows exist.",
                  "carry_forward_status": "observed_scoring_blocked",
              },
              {
                  "inherited_from": "v4.248",
                  "item": "primary_qso_holdout",
                  "value": "missing",
                  "meaning": "No clean primary QSO growth holdout exists.",
                  "carry_forward_status": "primary_evidence_lane_blocked",
              },
              {
                  "inherited_from": "v4.248",
                  "item": "combined_matrix",
                  "value": "blocked",
                  "meaning": "Combined matrix remains blocked.",
                  "carry_forward_status": "source_separation_required",
              },
              {
                  "inherited_from": "v4.248",
                  "item": "numeric_correction_fit",
                  "value": "blocked",
                  "meaning": "No numeric TAIRID correction fit is allowed.",
                  "carry_forward_status": "fit_blocked",
              },
              {
                  "inherited_from": "v4.248",
                  "item": "selected_next_route",
                  "value": "v4_249_primary_qso_source_search_or_manual_observed_manifest_fill_plan",
                  "meaning": "Current workflow should focus on primary QSO source search and manual manifest plan.",
                  "carry_forward_status": "current_route",
              },
          ]

          primary_qso_candidate_source_rows = [
              {
                  "candidate_id": "qso_src_001_dr14_zarrouk_configuration_space",
                  "candidate_family": "QSO_or_QSO_like",
                  "candidate_role": "primary_qso_growth_literature_candidate",
                  "source_name": "eBOSS DR14 QSO configuration-space RSD measurement",
                  "source_url": "https://arxiv.org/abs/1801.03062",
                  "redshift_info": "z_eff=1.52",
                  "growth_observable_status": "contains_fsigma8_reported_in_paper",
                  "covariance_status": "uncertainty_reported_needs_machine_readable_covariance_review",
                  "same_release_status": "not_exact_current_dr16_file_but_same_survey_family",
                  "manifest_status": "manual_extraction_candidate_not_manifest_ready",
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_002_dr14_zhao_tomographic",
                  "candidate_family": "QSO_or_QSO_like",
                  "candidate_role": "primary_qso_growth_literature_candidate",
                  "source_name": "eBOSS DR14 QSO tomographic BAO/RSD measurement",
                  "source_url": "https://arxiv.org/abs/1801.03043",
                  "redshift_info": "z_eff=0.98|1.23|1.52|1.94",
                  "growth_observable_status": "reports_fsigma8_at_four_redshifts",
                  "covariance_status": "paper_says_full_data_covariance_matrix_provided_needs_extraction",
                  "same_release_status": "not_exact_current_dr16_file_but_same_survey_family",
                  "manifest_status": "manual_extraction_candidate_not_manifest_ready",
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_003_dr14_gil_marin_power_spectrum",
                  "candidate_family": "QSO_or_QSO_like",
                  "candidate_role": "primary_qso_growth_literature_candidate",
                  "source_name": "eBOSS DR14 QSO power-spectrum RSD measurement",
                  "source_url": "https://arxiv.org/abs/1801.02689",
                  "redshift_info": "0.8<z<2.2",
                  "growth_observable_status": "contains_RSD_growth_analysis_needs_value_extraction",
                  "covariance_status": "covariance_status_needs_review",
                  "same_release_status": "not_exact_current_dr16_file_but_same_survey_family",
                  "manifest_status": "manual_extraction_candidate_not_manifest_ready",
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_004_dr16_neveux_final_power_spectrum",
                  "candidate_family": "QSO_or_QSO_like",
                  "candidate_role": "same_family_current_context",
                  "source_name": "eBOSS DR16 final QSO power-spectrum BAO/RSD measurement",
                  "source_url": "https://arxiv.org/abs/2007.08999",
                  "redshift_info": "z_eff=1.480",
                  "growth_observable_status": "contains_final_qso_full_shape_growth_context",
                  "covariance_status": "current_family_covariance_context",
                  "same_release_status": "blocked_same_dr16_family_or_current_context",
                  "manifest_status": "blocked_as_independent_primary_holdout",
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_005_desi_dr1_release",
                  "candidate_family": "DESI_QSO_or_QSO_like",
                  "candidate_role": "future_source_search_context",
                  "source_name": "DESI DR1 public release",
                  "source_url": "https://data.desi.lbl.gov/doc/releases/dr1/",
                  "redshift_info": "release_level",
                  "growth_observable_status": "not_direct_fsigma8_summary",
                  "covariance_status": "needs_parameter_product_or_likelihood_not_raw_release_only",
                  "same_release_status": "independent_release_context_not_manifest_ready",
                  "manifest_status": "not_primary_growth_until_parameter_product_found",
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_006_cobaya_bao_data",
                  "candidate_family": "BAO_geometry",
                  "candidate_role": "geometry_control_context",
                  "source_name": "Cobaya BAO data repository",
                  "source_url": "https://github.com/CobayaSampler/bao_data",
                  "redshift_info": "repository_level",
                  "growth_observable_status": "geometry_bao_not_growth_primary",
                  "covariance_status": "covariance_possible_for_bao_geometry",
                  "same_release_status": "not_primary_qso_growth",
                  "manifest_status": "geometry_control_only",
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_007_rezaie_dr16_qso_systematics",
                  "candidate_family": "QSO_or_QSO_like",
                  "candidate_role": "supporting_quasar_clustering_context",
                  "source_name": "eBOSS DR16 QSO systematic weights repository",
                  "source_url": "https://github.com/mehdirezaie/eBOSSDR16QSOE",
                  "redshift_info": "0.8<z<2.2",
                  "growth_observable_status": "not_direct_fsigma8_holdout",
                  "covariance_status": "synthetic_catalog_errorbars_context",
                  "same_release_status": "blocked_same_dr16_family_or_support_only",
                  "manifest_status": "support_only_not_primary_holdout",
                  "approved_as_holdout": False,
              },
              {
                  "candidate_id": "qso_src_008_sdss_eboss_overview",
                  "candidate_family": "QSO_or_QSO_like",
                  "candidate_role": "survey_context_only",
                  "source_name": "SDSS eBOSS survey overview",
                  "source_url": "https://www.sdss4.org/surveys/eboss/",
                  "redshift_info": "survey_level",
                  "growth_observable_status": "survey_context_not_measurement",
                  "covariance_status": "not_applicable",
                  "same_release_status": "context_only",
                  "manifest_status": "not_manifest_candidate",
                  "approved_as_holdout": False,
              },
          ]

          candidate_probe_rows = []
          for row in primary_qso_candidate_source_rows:
              status, content_type, detail = probe_url(row["source_url"])
              candidate_probe_rows.append({
                  "candidate_id": row["candidate_id"],
                  "source_url": row["source_url"],
                  "probe_status": status,
                  "content_type": content_type,
                  "probe_detail": detail,
                  "probe_role": "reachability_only_not_source_approval",
              })

          candidate_review_rows = []
          for row in primary_qso_candidate_source_rows:
              issues = []
              if row["approved_as_holdout"] is not False:
                  issues.append("should_not_be_approved")
              if row["manifest_status"] in ["blocked_as_independent_primary_holdout", "support_only_not_primary_holdout", "not_manifest_candidate", "not_primary_growth_until_parameter_product_found", "geometry_control_only"]:
                  issues.append("not_primary_manifest_ready")
              if row["same_release_status"].startswith("blocked"):
                  issues.append("same_release_or_support_block")
              if "not_direct" in row["growth_observable_status"] or "not_growth" in row["growth_observable_status"]:
                  issues.append("not_direct_growth_primary")
              if "needs" in row["covariance_status"]:
                  issues.append("covariance_or_extraction_review_needed")
              if "literature_candidate" in row["candidate_role"] and "fsigma8" in row["growth_observable_status"]:
                  review_status = "reviewable_primary_qso_literature_candidate_not_manifest_ready"
              elif "literature_candidate" in row["candidate_role"] and "RSD" in row["growth_observable_status"]:
                  review_status = "reviewable_primary_qso_rsd_literature_candidate_needs_value_review"
              elif row["candidate_role"] == "same_family_current_context":
                  review_status = "blocked_same_family_current_context"
              elif row["candidate_role"] == "geometry_control_context":
                  review_status = "geometry_control_only"
              elif row["candidate_role"] == "future_source_search_context":
                  review_status = "future_search_context_not_observed_manifest"
              else:
                  review_status = "not_primary_holdout"

              candidate_review_rows.append({
                  "candidate_id": row["candidate_id"],
                  "candidate_role": row["candidate_role"],
                  "review_status": review_status,
                  "review_issues": "|".join(issues) if issues else "needs_manual_review",
                  "manifest_fill_allowed": False,
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          source_search_conclusion_rows = [
              {
                  "conclusion_id": "conclusion_001",
                  "conclusion": "Literature-level DR14 QSO growth candidates exist.",
                  "basis": "DR14 QSO papers report f_sigma8/RSD measurements and at least one claims covariance availability.",
                  "meaning": "The route can move from blind search to candidate extraction review.",
                  "claim_status": "candidate_sources_only_not_evidence",
              },
              {
                  "conclusion_id": "conclusion_002",
                  "conclusion": "No candidate is manifest-ready yet.",
                  "basis": "No machine-readable observed manifest row or reviewed covariance/source pairing exists in the repo.",
                  "meaning": "Manual observed manifest fill remains blocked.",
                  "claim_status": "manifest_fill_blocked",
              },
              {
                  "conclusion_id": "conclusion_003",
                  "conclusion": "DR16 final QSO context remains blocked as independent holdout.",
                  "basis": "Current same-family DR16 source was already used in the same-data pressure lane.",
                  "meaning": "Use DR16 context only for continuity or parser checks.",
                  "claim_status": "same_family_holdout_blocked",
              },
              {
                  "conclusion_id": "conclusion_004",
                  "conclusion": "DESI/BAO repositories are useful for future search but are not current primary QSO growth rows.",
                  "basis": "Current located DESI/BAO route is release/geometry context, not direct f_sigma8 holdout.",
                  "meaning": "Keep them as search context or geometry controls.",
                  "claim_status": "context_or_control_only",
              },
          ]

          manual_observed_manifest_fill_plan_rows = [
              {
                  "fill_step": "step_001",
                  "manual_action": "Select one literature candidate only after confirming it reports QSO-like f_sigma8 or comparable growth.",
                  "required_before_fill": "human/source review confirms observable and redshift",
                  "auto_fill_allowed": False,
              },
              {
                  "fill_step": "step_002",
                  "manual_action": "Locate the value table and uncertainty/covariance source.",
                  "required_before_fill": "observed value and sigma/covariance/likelihood are identified",
                  "auto_fill_allowed": False,
              },
              {
                  "fill_step": "step_003",
                  "manual_action": "Map the source to target_id, source_family, source_role, redshift, quantity, observed_value, and covariance path.",
                  "required_before_fill": "reference join compatibility is checked",
                  "auto_fill_allowed": False,
              },
              {
                  "fill_step": "step_004",
                  "manual_action": "Set approval_status to reviewed_primary_holdout_not_scored only if the primary candidate passes all acceptance criteria.",
                  "required_before_fill": "acceptance criteria all yes",
                  "auto_fill_allowed": False,
              },
              {
                  "fill_step": "step_005",
                  "manual_action": "Run a later parser/scoring guard only after manifest review and parameter freeze choices.",
                  "required_before_fill": "scoring workflow separate from this plan",
                  "auto_fill_allowed": False,
              },
          ]

          observed_manifest_status_rows = []
          observed_manifest_input_rows = []
          found_manifests = [path for path in OBSERVED_MANIFEST_CANDIDATES if path.exists()]

          if not found_manifests:
              observed_manifest_status_rows.append({
                  "manifest_path": "",
                  "manifest_status": "missing",
                  "observed_rows": 0,
                  "detail": "No external observed manifest found. Candidate extraction review is the next route.",
              })
          else:
              for path in found_manifests:
                  try:
                      with path.open("r", encoding="utf-8-sig", newline="") as f:
                          reader = csv.DictReader(f)
                          rows = list(reader)
                          columns = reader.fieldnames or []
                      missing = [col for col in REQUIRED_OBSERVED_COLUMNS if col not in columns]
                      status = "schema_ok" if not missing else "schema_missing_columns"
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": status,
                          "observed_rows": len(rows),
                          "detail": "missing=" + "|".join(missing) if missing else "all required columns present",
                      })
                      if not missing:
                          for row in rows:
                              observed_manifest_input_rows.append({col: row.get(col, "") for col in REQUIRED_OBSERVED_COLUMNS})
                  except Exception as exc:
                      observed_manifest_status_rows.append({
                          "manifest_path": path.as_posix(),
                          "manifest_status": "read_failed",
                          "observed_rows": 0,
                          "detail": f"{type(exc).__name__}: {exc}",
                      })

          observed_manifest_validation_rows = []
          for row in observed_manifest_input_rows:
              issues = []
              z = safe_float(row.get("redshift"))
              val = safe_float(row.get("observed_value"))
              if not row.get("observed_id"):
                  issues.append("missing_observed_id")
              if not row.get("target_id"):
                  issues.append("missing_target_id")
              if z is None or z < 0:
                  issues.append("bad_redshift")
              if val is None:
                  issues.append("bad_observed_value")
              if is_placeholder(row.get("data_path_or_url")):
                  issues.append("data_source_placeholder")
              if is_placeholder(row.get("covariance_path_or_url")):
                  issues.append("covariance_placeholder")
              if is_placeholder(row.get("reference_model_path_or_method")):
                  issues.append("reference_method_placeholder")
              if row.get("source_role") == "primary_qso_growth_holdout" and row.get("approval_status") != "reviewed_primary_holdout_not_scored":
                  issues.append("primary_holdout_not_reviewed")
              if row.get("approval_status") in ["approved_for_scoring", "approved", "evidence"]:
                  issues.append("approval_status_too_strong_for_guard")

              observed_manifest_validation_rows.append({
                  "observed_id": row.get("observed_id", ""),
                  "source_family": row.get("source_family", ""),
                  "source_role": row.get("source_role", ""),
                  "quantity": row.get("quantity", ""),
                  "redshift": row.get("redshift", ""),
                  "validation_issues": "|".join(issues) if issues else "none",
                  "review_status": "reviewable_not_scored" if not issues else "blocked_by_manifest_issues",
                  "scoring_allowed": False,
                  "evidence_allowed": False,
              })

          permission_rows = [
              {
                  "permission_scope": "primary_qso_literature_candidate_review",
                  "permission_status": "allowed_review_only",
                  "reason": "Candidate sources can be reviewed for extraction readiness.",
              },
              {
                  "permission_scope": "manual_manifest_fill",
                  "permission_status": "blocked_until_candidate_extraction_review",
                  "reason": "No candidate is manifest-ready.",
              },
              {
                  "permission_scope": "external_observed_residual_scoring",
                  "permission_status": "blocked",
                  "reason": "No reviewed observed manifest and reference join exists.",
              },
              {
                  "permission_scope": "primary_qso_growth_evidence",
                  "permission_status": "blocked",
                  "reason": "Candidate sources are not evidence.",
              },
              {
                  "permission_scope": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No observed source and no parameter freeze values are ready.",
              },
              {
                  "permission_scope": "same_family_dr16_as_holdout",
                  "permission_status": "blocked",
                  "reason": "DR16 final context is same-family/current pressure context.",
              },
              {
                  "permission_scope": "secondary_control_review",
                  "permission_status": "allowed_review_only",
                  "reason": "Secondary/control lanes remain separate.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No external likelihood fit or holdout scoring has run.",
              },
          ]

          readiness_rows = [
              {
                  "readiness_id": "readiness_001",
                  "requirement": "primary_qso_candidate_sources",
                  "status": "literature_candidates_present",
                  "blocks": "manifest fill until extraction review",
              },
              {
                  "readiness_id": "readiness_002",
                  "requirement": "machine_readable_observed_values",
                  "status": "missing",
                  "blocks": "observed manifest fill",
              },
              {
                  "readiness_id": "readiness_003",
                  "requirement": "machine_readable_covariance_or_likelihood",
                  "status": "missing_or_unverified",
                  "blocks": "scoring",
              },
              {
                  "readiness_id": "readiness_004",
                  "requirement": "observed_manifest",
                  "status": "missing" if not found_manifests else "present_needs_review",
                  "blocks": "residual scoring",
              },
              {
                  "readiness_id": "readiness_005",
                  "requirement": "parameter_freeze_values",
                  "status": "not_ready",
                  "blocks": "numeric correction fit",
              },
              {
                  "readiness_id": "readiness_006",
                  "requirement": "combined_matrix_permission",
                  "status": "blocked",
                  "blocks": "combined matrix",
              },
          ]

          route_decision_rows = [
              {
                  "route_id": "route_001",
                  "route": "primary_qso_literature_candidate_extraction_guard",
                  "permission_status": "recommended",
                  "reason": "DR14 QSO growth candidates exist but need extraction/covariance review before manifest fill.",
              },
              {
                  "route_id": "route_002",
                  "route": "manual_observed_manifest_fill",
                  "permission_status": "blocked_until_extraction_review",
                  "reason": "No candidate is manifest-ready.",
              },
              {
                  "route_id": "route_003",
                  "route": "external_source_search_beyond_literature",
                  "permission_status": "allowed",
                  "reason": "Future DESI or other QSO growth products may be better holdouts if located.",
              },
              {
                  "route_id": "route_004",
                  "route": "numeric_correction_fit",
                  "permission_status": "blocked",
                  "reason": "No observed manifest or parameter freeze values are ready.",
              },
              {
                  "route_id": "route_005",
                  "route": "handoff",
                  "permission_status": "allowed_after_v4_250_or_if_context_limit",
                  "reason": "The cosmology lane now has a clear next branch and may need consolidation soon.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_250_primary_qso_literature_candidate_extraction_guard",
                  "purpose": "review DR14 QSO candidate papers for extractable f_sigma8 values and covariance/uncertainty",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_250_external_source_search_beyond_dr14",
                  "purpose": "search for better independent QSO-like growth products, especially DESI-like RSD if available",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_250_manual_manifest_fill_after_extraction",
                  "purpose": "only after extraction review, prepare manual observed manifest rows",
                  "activated": False,
              },
              {
                  "priority": 4,
                  "test_id": "v4_250_handoff_if_needed",
                  "purpose": "consolidate v4.203-v4.249 if thread length becomes a risk",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before primary QSO source search plan"},
              {"gate": "inherited_v4_248_rows_equal_8", "passed": len(inherited_v4_248_rows) == 8, "detail": f"inherited_v4_248_rows = {len(inherited_v4_248_rows)}"},
              {"gate": "primary_qso_candidate_source_rows_equal_8", "passed": len(primary_qso_candidate_source_rows) == 8, "detail": f"primary_qso_candidate_source_rows = {len(primary_qso_candidate_source_rows)}"},
              {"gate": "candidate_probe_rows_equal_8", "passed": len(candidate_probe_rows) == 8, "detail": f"candidate_probe_rows = {len(candidate_probe_rows)}"},
              {"gate": "candidate_review_rows_equal_8", "passed": len(candidate_review_rows) == 8, "detail": f"candidate_review_rows = {len(candidate_review_rows)}"},
              {"gate": "source_search_conclusion_rows_equal_4", "passed": len(source_search_conclusion_rows) == 4, "detail": f"source_search_conclusion_rows = {len(source_search_conclusion_rows)}"},
              {"gate": "manual_observed_manifest_fill_plan_rows_equal_5", "passed": len(manual_observed_manifest_fill_plan_rows) == 5, "detail": f"manual_observed_manifest_fill_plan_rows = {len(manual_observed_manifest_fill_plan_rows)}"},
              {"gate": "observed_manifest_status_rows_at_least_1", "passed": len(observed_manifest_status_rows) >= 1, "detail": f"observed_manifest_status_rows = {len(observed_manifest_status_rows)}"},
              {"gate": "observed_manifest_validation_rows_match_inputs", "passed": len(observed_manifest_validation_rows) == len(observed_manifest_input_rows), "detail": f"observed_manifest_validation_rows = {len(observed_manifest_validation_rows)}, observed_manifest_input_rows = {len(observed_manifest_input_rows)}"},
              {"gate": "permission_rows_equal_9", "passed": len(permission_rows) == 9, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "readiness_rows_equal_6", "passed": len(readiness_rows) == 6, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "route_decision_rows_equal_5", "passed": len(route_decision_rows) == 5, "detail": f"route_decision_rows = {len(route_decision_rows)}"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "literature_candidates_present", "passed": sum(1 for row in candidate_review_rows if "literature_candidate" in row["review_status"]) >= 2, "detail": "DR14 QSO literature candidates present"},
              {"gate": "no_candidate_auto_approved", "passed": all(row["approved_as_holdout"] is False for row in primary_qso_candidate_source_rows), "detail": "no source candidate auto-approved"},
              {"gate": "no_manifest_fill_allowed", "passed": all(row["manifest_fill_allowed"] is False for row in candidate_review_rows), "detail": "no candidate can fill manifest automatically"},
              {"gate": "no_candidate_scoring_allowed", "passed": all(row["scoring_allowed"] is False for row in candidate_review_rows), "detail": "no candidate scoring allowed"},
              {"gate": "no_candidate_evidence_allowed", "passed": all(row["evidence_allowed"] is False for row in candidate_review_rows), "detail": "no candidate evidence allowed"},
              {"gate": "manual_manifest_fill_blocked", "passed": any(row["permission_scope"] == "manual_manifest_fill" and row["permission_status"] == "blocked_until_candidate_extraction_review" for row in permission_rows), "detail": "manual manifest fill blocked"},
              {"gate": "external_scoring_blocked", "passed": any(row["permission_scope"] == "external_observed_residual_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "external observed scoring blocked"},
              {"gate": "primary_qso_evidence_blocked", "passed": any(row["permission_scope"] == "primary_qso_growth_evidence" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "primary QSO evidence blocked"},
              {"gate": "numeric_fit_blocked", "passed": any(row["permission_scope"] == "numeric_correction_fit" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "numeric correction fit blocked"},
              {"gate": "same_family_dr16_blocked", "passed": any(row["permission_scope"] == "same_family_dr16_as_holdout" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "same-family DR16 as holdout blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "extraction_guard_recommended", "passed": any(row["route"] == "primary_qso_literature_candidate_extraction_guard" and row["permission_status"] == "recommended" for row in route_decision_rows), "detail": "extraction guard recommended"},
              {"gate": "manual_manifest_fill_not_activated", "passed": any(row["test_id"] == "v4_250_manual_manifest_fill_after_extraction" and row["activated"] is False for row in next_rows), "detail": "manual manifest fill after extraction not activated yet"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "no external observed scoring"},
              {"gate": "truth_boundary_no_numeric_fit", "passed": True, "detail": "no numeric correction fit"},
              {"gate": "truth_boundary_no_holdout_approval", "passed": True, "detail": "no holdout source approved"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_250_primary_qso_literature_candidate_extraction_guard_or_handoff", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_249_primary_qso_source_search_manifest_plan_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_249_inherited_v4_248_rows.csv", inherited_v4_248_rows)
          write_csv(OUT / "v4_249_primary_qso_candidate_source_rows.csv", primary_qso_candidate_source_rows)
          write_csv(OUT / "v4_249_candidate_probe_rows.csv", candidate_probe_rows)
          write_csv(OUT / "v4_249_candidate_review_rows.csv", candidate_review_rows)
          write_csv(OUT / "v4_249_source_search_conclusion_rows.csv", source_search_conclusion_rows)
          write_csv(OUT / "v4_249_manual_observed_manifest_fill_plan_rows.csv", manual_observed_manifest_fill_plan_rows)
          write_csv(OUT / "v4_249_observed_manifest_status_rows.csv", observed_manifest_status_rows)
          write_csv(OUT / "v4_249_observed_manifest_validation_rows.csv", observed_manifest_validation_rows)
          write_csv(OUT / "v4_249_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_249_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_249_route_decision_rows.csv", route_decision_rows)
          write_csv(OUT / "v4_249_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_249_rule_checks.csv", checks)

          candidate_lines = [
              f"{row['candidate_id']}: {row['review_status']} — {row['review_issues']}"
              for row in candidate_review_rows
          ]

          conclusion_lines = [
              f"{row['conclusion_id']}: {row['conclusion']} — {row['claim_status']}"
              for row in source_search_conclusion_rows
          ]

          route_lines = [
              f"{row['route']}: {row['permission_status']} — {row['reason']}"
              for row in route_decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_v4_248_rows": len(inherited_v4_248_rows),
              "primary_qso_candidate_source_rows": len(primary_qso_candidate_source_rows),
              "candidate_probe_rows": len(candidate_probe_rows),
              "candidate_review_rows": len(candidate_review_rows),
              "source_search_conclusion_rows": len(source_search_conclusion_rows),
              "manual_observed_manifest_fill_plan_rows": len(manual_observed_manifest_fill_plan_rows),
              "observed_manifest_status_rows": len(observed_manifest_status_rows),
              "observed_manifest_input_rows": len(observed_manifest_input_rows),
              "observed_manifest_validation_rows": len(observed_manifest_validation_rows),
              "permission_rows": len(permission_rows),
              "readiness_rows": len(readiness_rows),
              "route_decision_rows": len(route_decision_rows),
              "next_rows": len(next_rows),
              "literature_candidates_present": True,
              "manifest_ready_candidates": 0,
              "approved_holdout_sources": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_249_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.249 Primary QSO Source Search Manifest Plan",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_v4_248_rows = {summary['inherited_v4_248_rows']}",
              f"primary_qso_candidate_source_rows = {summary['primary_qso_candidate_source_rows']}",
              f"candidate_probe_rows = {summary['candidate_probe_rows']}",
              f"candidate_review_rows = {summary['candidate_review_rows']}",
              f"source_search_conclusion_rows = {summary['source_search_conclusion_rows']}",
              f"manual_observed_manifest_fill_plan_rows = {summary['manual_observed_manifest_fill_plan_rows']}",
              f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}",
              f"observed_manifest_input_rows = {summary['observed_manifest_input_rows']}",
              f"observed_manifest_validation_rows = {summary['observed_manifest_validation_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"route_decision_rows = {summary['route_decision_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"literature_candidates_present = {summary['literature_candidates_present']}",
              f"manifest_ready_candidates = {summary['manifest_ready_candidates']}",
              f"approved_holdout_sources = {summary['approved_holdout_sources']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Candidate review:",
              *candidate_lines,
              "",
              "Conclusions:",
              *conclusion_lines,
              "",
              "Route decisions:",
              *route_lines,
              "",
              "Clean meaning: v4.249 moves the primary QSO search from blank search to literature-candidate review. DR14 QSO growth/RSD candidates are present, but no source is manifest-ready, no source is approved as holdout evidence, and manual manifest fill remains blocked until extraction and covariance review.",
              "",
              "Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_249_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_v4_248_rows = {summary['inherited_v4_248_rows']}")
          print(f"primary_qso_candidate_source_rows = {summary['primary_qso_candidate_source_rows']}")
          print(f"candidate_probe_rows = {summary['candidate_probe_rows']}")
          print(f"candidate_review_rows = {summary['candidate_review_rows']}")
          print(f"source_search_conclusion_rows = {summary['source_search_conclusion_rows']}")
          print(f"manual_observed_manifest_fill_plan_rows = {summary['manual_observed_manifest_fill_plan_rows']}")
          print(f"observed_manifest_status_rows = {summary['observed_manifest_status_rows']}")
          print(f"observed_manifest_input_rows = {summary['observed_manifest_input_rows']}")
          print(f"observed_manifest_validation_rows = {summary['observed_manifest_validation_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"readiness_rows = {summary['readiness_rows']}")
          print(f"route_decision_rows = {summary['route_decision_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"literature_candidates_present = {summary['literature_candidates_present']}")
          print(f"manifest_ready_candidates = {summary['manifest_ready_candidates']}")
          print(f"approved_holdout_sources = {summary['approved_holdout_sources']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no external observed scoring, no numeric correction fit, no approved holdout source, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.249 primary QSO source search manifest plan output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-249-primary-qso-source-search-manifest-plan-output
          path: |
            tairid_v4_249_primary_qso_source_search_manifest_plan_output/
            tairid-v4-249-primary-qso-source-search-manifest-plan-output.zip
