name: "!!! AAA CURRENT - TAIRID v4.413 eBOSS covariance likelihood source reopen no support"

on:
  workflow_dispatch:

jobs:
  run-v4-413:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run v4.413 eBOSS covariance likelihood source reopen
        shell: bash
        run: |
          python3 <<'PY'
          import csv, io, json, math, os, glob, zipfile
          from pathlib import Path
          from datetime import datetime, timezone

          VERSION = "v4.413"
          ROUTE_NAME = "v4_413_eboss_covariance_likelihood_source_reopen_no_support"
          EXPECTED_RESULT = "v4_413_eboss_covariance_likelihood_source_reopen_passed_fetch_plan_created_no_values_no_support_claims"
          OUTDIR = Path("tairid_v4_413_eboss_covariance_likelihood_source_reopen_no_support_output")
          OUTZIP = Path("tairid-v4-413-eboss-covariance-likelihood-source-reopen-no-values-no-support-output.zip")

          OFFICIAL_PAGE_URL = "https://www.sdss4.org/science/final-bao-and-rsd-measurements/"
          SVN_REPOSITORY_URL = "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/"
          MULTITRACER_CF_ZIP_URL = "https://www.sdss4.org/wp-content/uploads/2020/07/MultiTracer_CF_BAORSD_measurements.zip"
          MULTITRACER_PK_ZIP_URL = "https://www.sdss4.org/wp-content/uploads/2020/07/MultiTracer_PK_BAORSD_measurements.zip"


          def read_csv_text(text):
              return list(csv.DictReader(io.StringIO(text)))

          def csv_write(path, rows, fieldnames=None):
              path = OUTDIR / path
              path.parent.mkdir(parents=True, exist_ok=True)
              if fieldnames is None:
                  keys = []
                  for row in rows:
                      for k in row.keys():
                          if k not in keys:
                              keys.append(k)
                  fieldnames = keys
              with path.open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames)
                  w.writeheader()
                  for row in rows:
                      w.writerow(row)

          def find_input_zip():
              pats = [
                  "tairid-v4-412-eboss-vs-boss-diagnostic-comparison-no-support-output*.zip",
                  "**/tairid-v4-412-eboss-vs-boss-diagnostic-comparison-no-support-output*.zip",
              ]
              hits = []
              for pat in pats:
                  hits.extend(glob.glob(pat, recursive=True))
              hits = sorted(set(hits))
              if not hits:
                  raise FileNotFoundError("Missing v4.412 output zip")
              return Path(hits[0])

          def get_zip_reader(path):
              outer_bytes = path.read_bytes()
              outer = zipfile.ZipFile(io.BytesIO(outer_bytes))
              names = outer.namelist()
              inner_zip_names = [n for n in names if n.endswith(".zip")]
              if len(names) == 1 and inner_zip_names:
                  return zipfile.ZipFile(io.BytesIO(outer.read(inner_zip_names[0])))
              return outer

          def read_member_by_suffix(z, suffix):
              matches = [n for n in z.namelist() if n.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Missing member ending with {suffix}")
              return z.read(matches[0]).decode("utf-8")

          def as_bool(x):
              if isinstance(x, bool):
                  return x
              return str(x).strip().lower() in ("true", "1", "yes", "y")

          def finite(x):
              try:
                  return math.isfinite(float(x))
              except Exception:
                  return False

          def near(a, b, tol=1e-12):
              return abs(float(a)-float(b)) <= tol

          OUTDIR.mkdir(parents=True, exist_ok=True)
          input_zip = find_input_zip()
          z = get_zip_reader(input_zip)
          summary_412 = json.loads(read_member_by_suffix(z, "v4_412_summary.json"))
          comparison_rows = read_csv_text(read_member_by_suffix(z, "v4_412_boss_eboss_diagnostic_comparison_NO_SUPPORT.csv"))
          delta_rows = read_csv_text(read_member_by_suffix(z, "v4_412_boss_vs_eboss_metric_deltas_NO_SUPPORT.csv"))
          shape_rows = read_csv_text(read_member_by_suffix(z, "v4_412_eboss_shape_findings_NO_SUPPORT.csv"))
          route_rows_412 = read_csv_text(read_member_by_suffix(z, "v4_412_next_route_decision_NO_SUPPORT.csv"))
          rule_rows_412 = read_csv_text(read_member_by_suffix(z, "v4_412_rule_checks.csv"))

          # Extract key metrics from v4.412 summary only; do not recompute any metric.
          eb = float(summary_412["eboss_guarded_diagonal_chi_square_dry_run_sum"])
          boss_full = float(summary_412["boss_primary_fullcov_chi_square_dry_run_sum"])
          ratio = float(summary_412["eboss_to_boss_primary_fullcov_ratio"])
          diff = float(summary_412["eboss_minus_boss_primary_fullcov_chi_square"])
          selected_next = summary_412.get("selected_next_route", "")

          source_manifest_rows = [
              {
                  "source_target_id": "V4_413_SOURCE_001",
                  "source_family": "SDSS_DR16_eBOSS_BAO_RSD",
                  "source_name": "SDSS final BAO and RSD measurements official page",
                  "source_role": "official_context_and_table_anchor",
                  "target_url": OFFICIAL_PAGE_URL,
                  "target_type": "html_page",
                  "intended_next_action": "preserve_context_and_table_anchor",
                  "values_to_load_now": False,
                  "covariance_values_to_load_now": False,
                  "support_allowed": False,
              },
              {
                  "source_target_id": "V4_413_SOURCE_002",
                  "source_family": "SDSS_DR16_eBOSS_BAO_RSD",
                  "source_name": "SDSS DR16cosmo SVN repository root",
                  "source_role": "official_likelihood_covariance_chain_repository_root",
                  "target_url": SVN_REPOSITORY_URL,
                  "target_type": "repository_listing_or_known_path_root",
                  "intended_next_action": "fetch_listing_or_capture_access_failure_and_request_exact_member_path",
                  "values_to_load_now": False,
                  "covariance_values_to_load_now": False,
                  "support_allowed": False,
              },
              {
                  "source_target_id": "V4_413_SOURCE_003",
                  "source_family": "SDSS_DR16_eBOSS_multi_tracer",
                  "source_name": "MultiTracer configuration-space BAO/RSD compressed measurement packet",
                  "source_role": "candidate_parameter_and_covariance_archive_for_lrg_elg_multi_tracer_crosscheck",
                  "target_url": MULTITRACER_CF_ZIP_URL,
                  "target_type": "compressed_file",
                  "intended_next_action": "download_and_list_members_only_before_any_value_loading",
                  "values_to_load_now": False,
                  "covariance_values_to_load_now": False,
                  "support_allowed": False,
              },
              {
                  "source_target_id": "V4_413_SOURCE_004",
                  "source_family": "SDSS_DR16_eBOSS_multi_tracer",
                  "source_name": "MultiTracer Fourier-space BAO/RSD compressed measurement packet",
                  "source_role": "candidate_parameter_and_covariance_archive_for_lrg_elg_multi_tracer_crosscheck",
                  "target_url": MULTITRACER_PK_ZIP_URL,
                  "target_type": "compressed_file",
                  "intended_next_action": "download_and_list_members_only_before_any_value_loading",
                  "values_to_load_now": False,
                  "covariance_values_to_load_now": False,
                  "support_allowed": False,
              },
          ]

          reopen_reason_rows = [
              {
                  "reason_id": "V4_413_REOPEN_001",
                  "reason": "eBOSS guarded diagonal chi-square dry run is materially higher than the prior BOSS covariance-corrected dry run.",
                  "eBOSS_guarded_diagonal_chi_square": eb,
                  "BOSS_primary_fullcov_chi_square": boss_full,
                  "difference": diff,
                  "ratio": ratio,
                  "required_action": "reopen covariance or likelihood source material before interpreting the contrast",
                  "support_allowed": False,
              },
              {
                  "reason_id": "V4_413_REOPEN_002",
                  "reason": "The current eBOSS metric is diagonal only and therefore not directly comparable to the covariance-corrected BOSS result.",
                  "eBOSS_guarded_diagonal_chi_square": eb,
                  "BOSS_primary_fullcov_chi_square": boss_full,
                  "difference": diff,
                  "ratio": ratio,
                  "required_action": "capture exact covariance or likelihood source availability before computing any covariance-aware metric",
                  "support_allowed": False,
              },
              {
                  "reason_id": "V4_413_REOPEN_003",
                  "reason": "The largest eBOSS diagonal term is QSO, so tracer-specific covariance or likelihood treatment may matter.",
                  "eBOSS_guarded_diagonal_chi_square": eb,
                  "BOSS_primary_fullcov_chi_square": boss_full,
                  "difference": diff,
                  "ratio": ratio,
                  "required_action": "preserve LRG ELG QSO tracer separation while sourcing covariance material",
                  "support_allowed": False,
              },
          ]

          fetch_plan_rows = []
          for row in source_manifest_rows:
              fetch_plan_rows.append({
                  "fetch_plan_id": row["source_target_id"].replace("SOURCE", "FETCH"),
                  "target_url": row["target_url"],
                  "target_type": row["target_type"],
                  "fetch_priority": "primary" if row["source_target_id"] in ("V4_413_SOURCE_001", "V4_413_SOURCE_002") else "secondary_crosscheck",
                  "allowed_v4_414_operation": "fetch_headers_and_capture_raw_bytes_or_listing_metadata_only",
                  "forbidden_v4_414_operation": "load_covariance_values_or_compute_new_chi_square",
                  "expected_output": "raw_source_capture_or_access_status_for_human_review",
                  "support_allowed": False,
              })

          tracer_need_rows = []
          for tracer, z_eff in [("LRG", 0.70), ("ELG", 0.85), ("QSO", 1.48)]:
              tracer_need_rows.append({
                  "tracer_need_id": f"V4_413_TRACER_NEED_{tracer}",
                  "tracer": tracer,
                  "z_eff": z_eff,
                  "needed_material": "covariance_or_likelihood_material_matching_BAO_plus_RSD_fsigma8_row_or_exact_official_equivalent",
                  "reason": "needed before comparing eBOSS diagonal-only metric against BOSS covariance-corrected metric",
                  "values_to_load_now": False,
                  "support_allowed": False,
              })

          open_questions_rows = [
              {"open_question_id": "V4_413_OPEN_001", "question": "Can the SDSS DR16cosmo repository expose a crawlable or directly addressable covariance/likelihood member for the accepted eBOSS rows?", "required_before": "covariance_corrected_eBOSS_metric", "status": "open", "support_allowed": False},
              {"open_question_id": "V4_413_OPEN_002", "question": "Do LRG, ELG, and QSO require separate tracer likelihood treatment rather than a shared three-row covariance shortcut?", "required_before": "stronger_interpretation", "status": "open", "support_allowed": False},
              {"open_question_id": "V4_413_OPEN_003", "question": "Do the MultiTracer packets apply only to LRG/ELG crosschecks rather than the full LRG/ELG/QSO official-page trio?", "required_before": "source_member_acceptance", "status": "open", "support_allowed": False},
          ]

          limitations_rows = [
              {"limit_id": "V4_413_LIMIT_001", "limitation": "The current eBOSS comparison remains diagonal-only.", "status": "active", "support_allowed": False},
              {"limit_id": "V4_413_LIMIT_002", "limitation": "No eBOSS covariance values are loaded in this gate.", "status": "active", "support_allowed": False},
              {"limit_id": "V4_413_LIMIT_003", "limitation": "No likelihood, p-values, validated score, or TAIRID support claim is produced.", "status": "active", "support_allowed": False},
              {"limit_id": "V4_413_LIMIT_004", "limitation": "The SDSS repository may require member-level path discovery beyond simple listing crawl.", "status": "active", "support_allowed": False},
          ]

          next_route_rows = [
              {"route_id": "V4_413_ROUTE_001", "route_name": "v4_414_eboss_covariance_likelihood_exact_source_fetch_no_values_no_support", "recommended": True, "reason": "Fetch and archive exact source material or access-status evidence before any covariance-aware eBOSS metric.", "support_allowed": False},
              {"route_id": "V4_413_ROUTE_002", "route_name": "v4_414_alt_stop_after_diagonal_eboss_metric_no_support", "recommended": False, "reason": "Stopping at a diagonal-only contrast would leave the eBOSS-BOSS difference unresolved.", "support_allowed": False},
          ]

          summary_preserved_rows = [{
              "version": summary_412.get("version"),
              "expected_result": summary_412.get("expected_result"),
              "eboss_guarded_diagonal_chi_square_dry_run_sum": eb,
              "boss_primary_fullcov_chi_square_dry_run_sum": boss_full,
              "eboss_minus_boss_primary_fullcov_chi_square": diff,
              "eboss_to_boss_primary_fullcov_ratio": ratio,
              "largest_eboss_diagonal_term_tracer": summary_412.get("largest_eboss_diagonal_term_tracer"),
              "new_chi_square_computed_in_v4_413": False,
              "support_allowed": False,
          }]

          # Write outputs.
          csv_write("v4_413_input_v4_412_summary_preserved_NO_SUPPORT.csv", summary_preserved_rows)
          csv_write("v4_413_covariance_likelihood_source_reopen_manifest_NO_VALUES_NO_SUPPORT.csv", source_manifest_rows)
          csv_write("v4_413_reopen_reason_ledger_NO_SUPPORT.csv", reopen_reason_rows)
          csv_write("v4_413_v4_414_exact_source_fetch_plan_NO_VALUES_NO_SUPPORT.csv", fetch_plan_rows)
          csv_write("v4_413_tracer_covariance_need_map_NO_VALUES_NO_SUPPORT.csv", tracer_need_rows)
          csv_write("v4_413_open_questions_before_covariance_metric.csv", open_questions_rows)
          csv_write("v4_413_limitations.csv", limitations_rows)
          csv_write("v4_413_next_route_decision_NO_SUPPORT.csv", next_route_rows)

          summary_out = {
              "version": VERSION,
              "route_name": ROUTE_NAME,
              "expected_result": EXPECTED_RESULT,
              "input_version": "v4.412",
              "created_utc": datetime.now(timezone.utc).isoformat(),
              "source_reopen_manifest_rows": len(source_manifest_rows),
              "primary_official_source_rows": 2,
              "secondary_crosscheck_source_rows": 2,
              "fetch_plan_rows": len(fetch_plan_rows),
              "tracer_covariance_need_rows": len(tracer_need_rows),
              "open_question_rows": len(open_questions_rows),
              "limitation_rows": len(limitations_rows),
              "eboss_guarded_diagonal_chi_square_dry_run_sum": eb,
              "boss_primary_fullcov_chi_square_dry_run_sum": boss_full,
              "eboss_minus_boss_primary_fullcov_chi_square": diff,
              "eboss_to_boss_primary_fullcov_ratio": ratio,
              "largest_eboss_diagonal_term_tracer": summary_412.get("largest_eboss_diagonal_term_tracer"),
              "new_observed_values_loaded": False,
              "covariance_values_loaded": False,
              "new_chi_square_computed": False,
              "likelihood_computed": False,
              "p_values_computed": False,
              "score_valid": False,
              "support_allowed": False,
              "selected_next_route": "v4_414_eboss_covariance_likelihood_exact_source_fetch_no_values_no_support",
          }

          checks = []
          def add_check(name, passed, detail=""):
              checks.append({"check_name": name, "passed": bool(passed), "detail": detail})

          add_check("input_v4_412_expected_result", summary_412.get("expected_result") == "v4_412_eboss_vs_boss_diagnostic_comparison_passed_metric_contrast_created_no_support_claims", summary_412.get("expected_result", ""))
          add_check("input_v4_412_failed_gates_none", summary_412.get("failed_gates") == "none", str(summary_412.get("failed_gates")))
          add_check("input_selected_next_route_v4_413", selected_next == "v4_413_eboss_covariance_likelihood_source_reopen_no_support", selected_next)
          add_check("input_new_chi_square_computed_false", summary_412.get("new_chi_square_computed") is False, str(summary_412.get("new_chi_square_computed")))
          add_check("input_likelihood_false", summary_412.get("likelihood_computed") is False, str(summary_412.get("likelihood_computed")))
          add_check("input_p_values_false", summary_412.get("p_values_computed") is False, str(summary_412.get("p_values_computed")))
          add_check("input_score_valid_false", summary_412.get("score_valid") is False, str(summary_412.get("score_valid")))
          add_check("input_support_allowed_false", summary_412.get("support_allowed") is False, str(summary_412.get("support_allowed")))
          add_check("input_metric_difference_positive", diff > 0, str(diff))
          add_check("input_metric_ratio_gt_1", ratio > 1, str(ratio))
          add_check("comparison_rows_equal_4", len(comparison_rows) == 4, str(len(comparison_rows)))
          add_check("delta_rows_equal_4", len(delta_rows) == 4, str(len(delta_rows)))
          add_check("shape_rows_equal_6", len(shape_rows) == 6, str(len(shape_rows)))
          add_check("v4_412_rules_all_passed", all(as_bool(r.get("passed")) for r in rule_rows_412), str(len(rule_rows_412)))
          add_check("source_reopen_manifest_rows_equal_4", len(source_manifest_rows) == 4, str(len(source_manifest_rows)))
          add_check("primary_official_source_rows_equal_2", sum(1 for r in source_manifest_rows if r["source_target_id"] in ("V4_413_SOURCE_001", "V4_413_SOURCE_002")) == 2, "official page + repository root")
          add_check("secondary_crosscheck_source_rows_equal_2", sum(1 for r in source_manifest_rows if r["source_target_id"] in ("V4_413_SOURCE_003", "V4_413_SOURCE_004")) == 2, "multitracer CF + PK")
          add_check("official_page_target_present", any(r["target_url"] == OFFICIAL_PAGE_URL for r in source_manifest_rows), OFFICIAL_PAGE_URL)
          add_check("svn_repository_target_present", any(r["target_url"] == SVN_REPOSITORY_URL for r in source_manifest_rows), SVN_REPOSITORY_URL)
          add_check("multitracer_cf_target_present", any(r["target_url"] == MULTITRACER_CF_ZIP_URL for r in source_manifest_rows), "CF zip")
          add_check("multitracer_pk_target_present", any(r["target_url"] == MULTITRACER_PK_ZIP_URL for r in source_manifest_rows), "PK zip")
          add_check("fetch_plan_rows_equal_4", len(fetch_plan_rows) == 4, str(len(fetch_plan_rows)))
          add_check("fetch_plan_has_no_value_loading", all("load_covariance" not in r["allowed_v4_414_operation"] for r in fetch_plan_rows), "metadata/raw capture only")
          add_check("tracer_need_rows_equal_3", len(tracer_need_rows) == 3, str(len(tracer_need_rows)))
          add_check("tracer_need_has_lrg_elg_qso", {r["tracer"] for r in tracer_need_rows} == {"LRG", "ELG", "QSO"}, str({r["tracer"] for r in tracer_need_rows}))
          add_check("open_questions_rows_equal_3", len(open_questions_rows) == 3, str(len(open_questions_rows)))
          add_check("limitations_rows_equal_4", len(limitations_rows) == 4, str(len(limitations_rows)))
          add_check("next_route_rows_equal_2", len(next_route_rows) == 2, str(len(next_route_rows)))
          add_check("recommended_next_route_v4_414", sum(1 for r in next_route_rows if as_bool(r["recommended"]) and r["route_name"] == "v4_414_eboss_covariance_likelihood_exact_source_fetch_no_values_no_support") == 1, "v4.414 selected")
          add_check("no_new_observed_values_loaded", summary_out["new_observed_values_loaded"] is False, "false")
          add_check("no_covariance_values_loaded", summary_out["covariance_values_loaded"] is False, "false")
          add_check("no_new_chi_square_computed", summary_out["new_chi_square_computed"] is False, "false")
          add_check("no_likelihood_computed", summary_out["likelihood_computed"] is False, "false")
          add_check("no_p_values_computed", summary_out["p_values_computed"] is False, "false")
          add_check("score_valid_false", summary_out["score_valid"] is False, "false")
          add_check("support_allowed_false", summary_out["support_allowed"] is False, "false")
          add_check("all_manifest_support_false", all(not as_bool(r["support_allowed"]) for r in source_manifest_rows+reopen_reason_rows+fetch_plan_rows+tracer_need_rows+open_questions_rows+limitations_rows+next_route_rows), "support blocked in all output ledgers")
          add_check("expected_result_label", EXPECTED_RESULT.endswith("no_values_no_support_claims"), EXPECTED_RESULT)
          add_check("source_reopen_not_final_interpretation", True, "source reopen before covariance-aware metric")
          add_check("artifact_created", True, str(OUTZIP))

          failed = [c for c in checks if not c["passed"]]
          summary_out["rules_total"] = len(checks)
          summary_out["rules_passed"] = len(checks) - len(failed)
          summary_out["failed_gates"] = ";".join(c["check_name"] for c in failed) if failed else "none"

          csv_write("v4_413_rule_checks.csv", checks, fieldnames=["check_name", "passed", "detail"])
          (OUTDIR / "v4_413_summary.json").write_text(json.dumps(summary_out, indent=2, sort_keys=True), encoding="utf-8")
          (OUTDIR / "v4_413_summary.md").write_text(
              f"# {VERSION} eBOSS covariance/likelihood source reopen\n\n"
              f"Expected result: `{EXPECTED_RESULT}`\n\n"
              f"Rules: {summary_out['rules_passed']} / {summary_out['rules_total']} passed.\n\n"
              f"Failed gates: `{summary_out['failed_gates']}`\n\n"
              f"This gate creates an exact-source fetch plan for eBOSS covariance/likelihood source material. "
              f"It does not load covariance values, compute a new chi-square, compute likelihood, compute p-values, validate score, or permit support claims.\n",
              encoding="utf-8",
          )

          if OUTZIP.exists():
              OUTZIP.unlink()
          with zipfile.ZipFile(OUTZIP, "w", compression=zipfile.ZIP_DEFLATED) as z_out:
              for p in sorted(OUTDIR.rglob("*")):
                  if p.is_file():
                      z_out.write(p, p.as_posix())

          print(f"{summary_out['rules_passed']} / {summary_out['rules_total']} rules passed")
          print(f"failed_gates = {summary_out['failed_gates']}")
          print(f"source_reopen_manifest_rows = {summary_out['source_reopen_manifest_rows']}")
          print(f"primary_official_source_rows = {summary_out['primary_official_source_rows']}")
          print(f"secondary_crosscheck_source_rows = {summary_out['secondary_crosscheck_source_rows']}")
          print(f"fetch_plan_rows = {summary_out['fetch_plan_rows']}")
          print(f"tracer_covariance_need_rows = {summary_out['tracer_covariance_need_rows']}")
          print(f"eBOSS_guarded_diagonal_chi_square = {summary_out['eboss_guarded_diagonal_chi_square_dry_run_sum']}")
          print(f"BOSS_primary_fullcov_chi_square = {summary_out['boss_primary_fullcov_chi_square_dry_run_sum']}")
          print(f"new_observed_values_loaded = {str(summary_out['new_observed_values_loaded']).lower()}")
          print(f"covariance_values_loaded = {str(summary_out['covariance_values_loaded']).lower()}")
          print(f"new_chi_square_computed = {str(summary_out['new_chi_square_computed']).lower()}")
          print(f"support_allowed = {str(summary_out['support_allowed']).lower()}")

          if failed:
              raise SystemExit(1)
          PY

      - name: Upload v4.413 artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-413-eboss-covariance-likelihood-source-reopen-no-values-no-support-output
          path: tairid-v4-413-eboss-covariance-likelihood-source-reopen-no-values-no-support-output.zip
          if-no-files-found: error
