name: 000 TAIRID v4.201 - Six Neurotype Shape Atlas And Gap Ledger With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-201-six-neurotype-shape-atlas-and-gap-ledger-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-201-six-neurotype-shape-atlas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.201 six-neurotype shape atlas and gap ledger
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_201_outputs
          cat > tairid_v4_201_outputs/run_v4_201.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_201_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "six_neurotype_shape_atlas_and_gap_ledger_passed_atlas_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "shape atlas is not validation",
              "manual rows are not empirical subject data",
              "TAIRID not proved"
          ]

          V4_200_STATUS = {
              "version": "v4.200",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "manual_phase_rows": 4,
              "rows_matching_expected_three_axis": 4,
              "rows_matching_expected_four_axis": 4,
              "candidate_input_rows": 4,
              "package_status": "manual_bipolar_phase_surface_table_written_no_empirical_validation",
              "selected_next_route": "rerun_v4_199_with_manual_phase_input_or_replace_with_real_phase_data_then_rerun"
          }

          LOCKED_COSMOLOGY_SIGNATURES = {
              "++-": "LRGxELG z=0.70-like: reach high / pacing high / growth low",
              "-+-": "LRGxELG z=0.845-like: reach low / pacing high / growth low",
              "-++": "QSO z=1.48-like: reach low / pacing high / growth high"
          }

          ATLAS_ROWS = [
              {
                  "neurotype_lane": "ADHD",
                  "case_or_phase": "width_over_depth_selective_attention",
                  "shape_signature": "++-",
                  "viability_direction": "-",
                  "shape_plain_read": "reach high, pacing/gate pressure high, task depth/consolidation low",
                  "locked_cosmology_signature_match": "++-",
                  "evidence_tier": "paper_grounded_directional_manual_delta",
                  "strongest_anchor": "higher width pressure; lower task depth; lower gate stability; lower viability",
                  "current_gap": "needs exact numeric deltas for width, gate instability, depth, and viability",
                  "do_not_force": "do not treat ADHD as universally high reach in every task"
              },
              {
                  "neurotype_lane": "Autism",
                  "case_or_phase": "measured_dispersion_search_correction",
                  "shape_signature": "++-",
                  "viability_direction": "-",
                  "shape_plain_read": "measured surface shows dispersion/search and friction high with boundary compaction lower",
                  "locked_cosmology_signature_match": "++-",
                  "evidence_tier": "paper_grounded_correction_manual_delta",
                  "strongest_anchor": "initial compact-depth prediction failed; measured lane favored dispersion/search and lower boundary compaction",
                  "current_gap": "needs exact ASD-vs-TD dispersion/search and boundary-compaction deltas",
                  "do_not_force": "do not claim autism is always compact-depth or always dispersion-search"
              },
              {
                  "neurotype_lane": "Dyslexia",
                  "case_or_phase": "ETDD70_reading_flow_viability_window",
                  "shape_signature": "++-",
                  "viability_direction": "-",
                  "shape_plain_read": "reading-flow scale/load high, re-entry/viability low",
                  "locked_cosmology_signature_match": "++-",
                  "evidence_tier": "numeric_ready_paper_grounded",
                  "strongest_anchor": "bAcc=0.857; AUC=0.932; s_A up; lambda_R up; rho_R down; V_data down",
                  "current_gap": "needs subject/group axis rows and covariance/correlation",
                  "do_not_force": "do not generalize one reading-flow dataset to all dyslexia contexts"
              },
              {
                  "neurotype_lane": "Aphantasia",
                  "case_or_phase": "visual_reconstruction_response_gap",
                  "shape_signature": "-+-",
                  "viability_direction": "-",
                  "shape_plain_read": "visual reach low, mismatch/burden high, reconstruction viability low",
                  "locked_cosmology_signature_match": "-+-",
                  "evidence_tier": "numeric_ready_paper_grounded",
                  "strongest_anchor": "drawing burden d=1.013; physiology burden d=1.553; visual re-entry lower; V lower",
                  "current_gap": "needs subject/group imagery, burden, reconstruction viability, and covariance/correlation rows",
                  "do_not_force": "do not treat nonvisual reconstruction as absent cognition"
              },
              {
                  "neurotype_lane": "Bipolar",
                  "case_or_phase": "depression_compressed_rhythm_basin",
                  "shape_signature": "--+",
                  "viability_direction": "-",
                  "shape_plain_read": "reach low, pacing low, consolidation compressed/locked high, viability low",
                  "locked_cosmology_signature_match": "none",
                  "evidence_tier": "phase_specific_manual_surface_direct_depression_side_anchor",
                  "strongest_anchor": "reduced beta_swing, reduced s_A_swing, reduced V_swing, positive boundary-compression",
                  "current_gap": "needs measured phase rows and subject/reference rhythm values",
                  "do_not_force": "do not call compressed consolidation healthy consolidation"
              },
              {
                  "neurotype_lane": "Bipolar",
                  "case_or_phase": "mania_hypomania_propagation_expansion",
                  "shape_signature": "++-",
                  "viability_direction": "-",
                  "shape_plain_read": "reach high, pacing high, consolidation/rest stability low, viability unstable",
                  "locked_cosmology_signature_match": "++-",
                  "evidence_tier": "phase_specific_manual_surface_published_support_pending_raw_reanalysis",
                  "strongest_anchor": "propagation-heavy activity expansion with sleep/rest consolidation reduced or destabilized",
                  "current_gap": "needs measured mania/hypomania phase rows",
                  "do_not_force": "do not collapse bipolar into one static shape"
              },
              {
                  "neurotype_lane": "Bipolar",
                  "case_or_phase": "euthymia_reference_rhythm",
                  "shape_signature": "00+",
                  "viability_direction": "+",
                  "shape_plain_read": "reference rhythm with stable consolidation and viability",
                  "locked_cosmology_signature_match": "none",
                  "evidence_tier": "reference_surface",
                  "strongest_anchor": "subject-specific rhythm surface against which phases are measured",
                  "current_gap": "needs subject-specific baseline rhythm values",
                  "do_not_force": "do not treat euthymia as pathology"
              },
              {
                  "neurotype_lane": "Bipolar",
                  "case_or_phase": "mixed_transition_boundary_overlap",
                  "shape_signature": "MMMM",
                  "viability_direction": "M",
                  "shape_plain_read": "off-axis/mixed phase overlap that should not be forced into a clean row",
                  "locked_cosmology_signature_match": "holdout",
                  "evidence_tier": "holdout_manual_phase_surface",
                  "strongest_anchor": "mixed/transition states should not be forced into mania or depression",
                  "current_gap": "needs measured mixed-state overlap indicators",
                  "do_not_force": "do not force mixed transition into depression or mania"
              },
              {
                  "neurotype_lane": "Schizotypy",
                  "case_or_phase": "positive_reference_field_overreach",
                  "shape_signature": "++-",
                  "viability_direction": "-",
                  "shape_plain_read": "semantic/reference reach high, salience/update pull high, anchor specificity low",
                  "locked_cosmology_signature_match": "++-",
                  "evidence_tier": "paper_grounded_directional_manual_delta",
                  "strongest_anchor": "weak/false-anchor and unrelated-lure acceptance mattered more than target recognition",
                  "current_gap": "needs target/lure/anchor integrity values by trait lane",
                  "do_not_force": "do not collapse positive, disorganized, and negative schizotypy into one row"
              }
          ]

          HOLDOUT_ROWS = [
              {
                  "held_out_row": "Autism_compact_depth_future_mode",
                  "reason": "paper says compact-depth may exist on a better matching surface but current measured lane corrected toward dispersion/search",
                  "needed_test": "stable/local-fit/rule-bound/sensory-detail task surface"
              },
              {
                  "held_out_row": "Schizotypy_disorganized_drift_lane",
                  "reason": "intrusion, set-loss, drift, and return-chain instability are not the same as positive overreach",
                  "needed_test": "same-sample disorganized trait task battery"
              },
              {
                  "held_out_row": "Schizotypy_negative_underreach_return_cost_lane",
                  "reason": "negative traits may involve underreach, maintenance cost, or return-cost rather than overreach",
                  "needed_test": "switching/maintenance and underreach measures"
              },
              {
                  "held_out_row": "Bipolar_mixed_transition",
                  "reason": "mixed states are explicitly off-axis and not forced into a three-sign shape",
                  "needed_test": "measured overlap/instability phase indicators"
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          signature_counts = {}
          lane_counts = {}
          evidence_counts = {}
          for row in ATLAS_ROWS:
              signature_counts[row["shape_signature"]] = signature_counts.get(row["shape_signature"], 0) + 1
              lane_counts[row["neurotype_lane"]] = lane_counts.get(row["neurotype_lane"], 0) + 1
              evidence_counts[row["evidence_tier"]] = evidence_counts.get(row["evidence_tier"], 0) + 1

          signature_rows = []
          for sig, count in sorted(signature_counts.items(), key=lambda kv: (-kv[1], kv[0])):
              signature_rows.append({
                  "shape_signature": sig,
                  "count": count,
                  "locked_cosmology_meaning_if_any": LOCKED_COSMOLOGY_SIGNATURES.get(sig, "not a locked cosmology signature or is holdout/reference")
              })

          lane_rows = []
          for lane, count in sorted(lane_counts.items()):
              lane_rows.append({"neurotype_lane": lane, "atlas_row_count": count})

          evidence_rows = []
          for tier, count in sorted(evidence_counts.items()):
              evidence_rows.append({"evidence_tier": tier, "count": count})

          gap_ledger = [
              {
                  "gap_id": "G1_subject_or_group_axis_rows",
                  "status": "open",
                  "affected_lanes": "Dyslexia; Aphantasia",
                  "why_it_matters": "needed for covariance/correlation rather than sign-only or manual axis rows",
                  "next_action": "create data/neurotype/dyslexia_aphantasia_subject_axis_input.csv"
              },
              {
                  "gap_id": "G2_real_numeric_delta_rows",
                  "status": "open",
                  "affected_lanes": "ADHD; Autism; Schizotypy",
                  "why_it_matters": "manual +1/0/-1 rows test structure only; real deltas are needed",
                  "next_action": "replace manual delta rows with measured output-table deltas"
              },
              {
                  "gap_id": "G3_bipolar_phase_data",
                  "status": "open",
                  "affected_lanes": "Bipolar depression; mania/hypomania; euthymia; mixed transition",
                  "why_it_matters": "phase motion cannot be tested without measured phase surfaces",
                  "next_action": "create data/neurotype/bipolar_phase_numeric_surface_input.csv"
              },
              {
                  "gap_id": "G4_holdout_surface_tests",
                  "status": "open",
                  "affected_lanes": "Autism compact-depth; schizotypy disorganized/negative; bipolar mixed transition",
                  "why_it_matters": "prevents forced matching and protects falsifiability",
                  "next_action": "design targeted surface tests instead of folding them into core rows"
              },
              {
                  "gap_id": "G5_cross_domain_lattice_preview",
                  "status": "ready_for_guarded_preview",
                  "affected_lanes": "all current atlas rows",
                  "why_it_matters": "can visualize relational shape distribution without claiming validation",
                  "next_action": "build cross-domain shape lattice preview using atlas rows and locked cosmology signatures"
              }
          ]

          readiness_summary = [
              {
                  "category": "numeric_ready",
                  "rows": "Dyslexia_ETDD70; Aphantasia_visual_reconstruction",
                  "meaning": "exact numeric anchors exist, but subject/group covariance is still missing"
              },
              {
                  "category": "directional_or_correction_ready",
                  "rows": "ADHD_width_over_depth; Autism_dispersion_search; Schizotypy_positive_overreach",
                  "meaning": "paper-grounded direction/correction exists, but exact numeric deltas are missing"
              },
              {
                  "category": "phase_surface_ready",
                  "rows": "Bipolar depression; mania/hypomania; euthymia; mixed transition",
                  "meaning": "phase structure is preserved, but measured phase data are missing"
              },
              {
                  "category": "holdout_do_not_force",
                  "rows": "Autism compact-depth; schizotypy disorganized; schizotypy negative; bipolar mixed transition",
                  "meaning": "these rows protect the model from forced matching"
              }
          ]

          next_routes = [
              {
                  "priority": 1,
                  "route": "cross_domain_shape_lattice_preview_neurotype_to_cosmology_with_scope_guards",
                  "why": "The six-neurotype atlas is now complete enough for a guarded lattice visualization/preview.",
                  "boundary": "shape distribution only, no validation"
              },
              {
                  "priority": 2,
                  "route": "real_numeric_gap_closure_workbench_with_scope_guards",
                  "why": "Creates one place to collect missing subject/group/delta/phase tables.",
                  "boundary": "data acquisition only"
              },
              {
                  "priority": 3,
                  "route": "rerun_covariance_and_delta_classifiers_after_real_inputs",
                  "why": "Rerun v4.195, v4.197, and v4.199 once real numeric rows exist.",
                  "boundary": "classification preview only until external replication"
              }
          ]

          claim_rows = [
              {
                  "claim": "The six-neurotype shape atlas is complete proof.",
                  "status": "blocked",
                  "safe_wording": "The atlas consolidates current paper-grounded/manual shape work and exposes remaining gaps.",
                  "forbidden_wording": "The atlas validates TAIRID."
              },
              {
                  "claim": "The same signature means the same cause.",
                  "status": "blocked",
                  "safe_wording": "A matching signature is a relational shape comparison only.",
                  "forbidden_wording": "ADHD, dyslexia, mania, schizotypy, and cosmology share the same mechanism."
              },
              {
                  "claim": "The atlas can be visualized as a lattice.",
                  "status": "allowed_with_boundary",
                  "safe_wording": "A lattice preview can show how signatures cluster and where gaps remain.",
                  "forbidden_wording": "The lattice proves cross-domain scaling."
              },
              {
                  "claim": "Manual rows are data.",
                  "status": "blocked",
                  "safe_wording": "Manual rows preserve shape and test workflow plumbing only.",
                  "forbidden_wording": "Manual rows are empirical subject data."
              }
          ]

          atlas_fields = [
              "neurotype_lane", "case_or_phase", "shape_signature", "viability_direction",
              "shape_plain_read", "locked_cosmology_signature_match", "evidence_tier",
              "strongest_anchor", "current_gap", "do_not_force"
          ]

          write_csv(OUT / "v4_201_v4_200_status_review.csv", [V4_200_STATUS], list(V4_200_STATUS.keys()))
          (OUT / "v4_201_v4_200_status_review.json").write_text(json.dumps(V4_200_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_201_six_neurotype_shape_atlas.csv", ATLAS_ROWS, atlas_fields)
          write_csv(OUT / "v4_201_shape_signature_distribution.csv", signature_rows, ["shape_signature", "count", "locked_cosmology_meaning_if_any"])
          write_csv(OUT / "v4_201_neurotype_lane_row_counts.csv", lane_rows, ["neurotype_lane", "atlas_row_count"])
          write_csv(OUT / "v4_201_evidence_tier_counts.csv", evidence_rows, ["evidence_tier", "count"])
          write_csv(OUT / "v4_201_holdout_do_not_force_rows.csv", HOLDOUT_ROWS, ["held_out_row", "reason", "needed_test"])
          write_csv(OUT / "v4_201_gap_ledger.csv", gap_ledger, ["gap_id", "status", "affected_lanes", "why_it_matters", "next_action"])
          write_csv(OUT / "v4_201_readiness_summary.csv", readiness_summary, ["category", "rows", "meaning"])
          write_csv(OUT / "v4_201_next_routes.csv", next_routes, ["priority", "route", "why", "boundary"])
          write_csv(OUT / "v4_201_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          selected_next_route = "cross_domain_shape_lattice_preview_neurotype_to_cosmology_with_scope_guards"

          route_decision = {
              "version": "v4.201",
              "result_label": RESULT_LABEL,
              "clean_result": "The six-neurotype work from v4.188-v4.200 was consolidated into one guarded shape atlas, with signature distribution, holdouts, and a gap ledger.",
              "atlas_rows": len(ATLAS_ROWS),
              "unique_shape_signatures": len(signature_counts),
              "holdout_rows": len(HOLDOUT_ROWS),
              "open_gap_count": len([g for g in gap_ledger if g["status"] == "open"]),
              "ready_for_guarded_lattice_preview": True,
              "selected_next_route": selected_next_route,
              "truth_boundary": "shape atlas and gap ledger only; not validation, not unit equivalence, not causal equivalence",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_201_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_201_scope_guards.json").write_text(json.dumps({
              "scope": "six-neurotype shape atlas and gap ledger only",
              "atlas_is_validation": False,
              "manual_rows_are_subject_data": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_201_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.201 - Six Neurotype Shape Atlas And Gap Ledger",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "The six-neurotype lane is now consolidated into one guarded shape atlas. This preserves ADHD, autism, dyslexia, aphantasia, bipolar phase movement, and schizotypy without pretending that manual rows are empirical data.",
              "",
              "Atlas rows: `" + str(len(ATLAS_ROWS)) + "`",
              "Unique shape signatures: `" + str(len(signature_counts)) + "`",
              "Holdout/do-not-force rows: `" + str(len(HOLDOUT_ROWS)) + "`",
              "Open gap count: `" + str(len([g for g in gap_ledger if g["status"] == "open"])) + "`",
              "",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_201_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_201_v4_200_status_review.csv",
              "v4_201_v4_200_status_review.json",
              "v4_201_six_neurotype_shape_atlas.csv",
              "v4_201_shape_signature_distribution.csv",
              "v4_201_neurotype_lane_row_counts.csv",
              "v4_201_evidence_tier_counts.csv",
              "v4_201_holdout_do_not_force_rows.csv",
              "v4_201_gap_ledger.csv",
              "v4_201_readiness_summary.csv",
              "v4_201_next_routes.csv",
              "v4_201_claim_boundary_matrix.csv",
              "v4_201_route_decision.json",
              "v4_201_scope_guards.json",
              "v4_201_blocked_claims.json",
              "v4_201_summary.md"
          ]

          rules = {
              "version_is_v4_201": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_200_status_reviewed": V4_200_STATUS["rule_pass_count"] == 10,
              "atlas_rows_present": len(ATLAS_ROWS) >= 9,
              "six_lanes_present": len(lane_counts) == 6,
              "holdout_rows_present": len(HOLDOUT_ROWS) >= 4,
              "gap_ledger_present": len(gap_ledger) >= 5,
              "lattice_preview_route_selected": selected_next_route == "cross_domain_shape_lattice_preview_neurotype_to_cosmology_with_scope_guards",
              "no_validation_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.201",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "atlas_rows": len(ATLAS_ROWS),
              "unique_shape_signatures": len(signature_counts),
              "six_lanes_present": len(lane_counts) == 6,
              "holdout_rows": len(HOLDOUT_ROWS),
              "open_gap_count": len([g for g in gap_ledger if g["status"] == "open"]),
              "package_status": "six_neurotype_shape_atlas_written_no_validation",
              "selected_next_route": selected_next_route,
              "claim_boundary": "shape_atlas_and_gap_ledger_only_no_validation"
          }

          (OUT / "v4_201_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.201 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_201_outputs/run_v4_201.py

      - name: Upload v4.201 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-201-six-neurotype-shape-atlas-and-gap-ledger-output
          path: tairid_v4_201_outputs/
