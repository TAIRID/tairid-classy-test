          md.append("")
          if not hard_failed:
              md.append("The design passed. The next honest move is not a refit. The growth/consolidation side needs a source-specific chain or covariance inventory so it can be brought closer to H0LiCOW's parser quality.")
          else:
              md.append("The design found a boundary or bookkeeping problem. Growth/consolidation inventory should wait until this design is repaired.")
          md.append("")
