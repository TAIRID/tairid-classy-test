name: TAIRID Cosmology v3.44 Guarded Two-Surface Comparison Design

on:
  workflow_dispatch:

jobs:
  guarded-two-surface-comparison-design:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v3.44 guarded two-surface comparison design
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_44

          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v3_44")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_44_guarded_two_surface_comparison_design"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute new pressure scores.",
              "This workflow designs comparison rules only.",
              "H0LiCOW is carried only as a diagnostic non-BAO reach-lane candidate.",
              "BAO remains mixed/subfamily diagnostic and is excluded from global reach-anchor aggregation.",
              "Growth/consolidation remains provisional because the current growth side is still based on summary-anchor prototypes.",
              "Published summary anchors are not enough for a stronger model claim.",
              "No lane, surface, source, or rule may be promoted to model-anchor status in this workflow."
          ]

          PREVIOUS_MILESTONES = {
              "v3_8_two_surface_probe": {
                  "status": "two_surface_reach_consolidation_probe_supported_not_validation",
                  "two_surface_bic": 22.5726,
                  "one_global_surface_bic": 52.9203,
                  "delta_bic_two_minus_one": -30.3477,
                  "reach_mean": 1.8646,
                  "consolidation_mean": -2.4756
              },
              "v3_9_growth_anchor_robustness": {
                  "status": "expanded_growth_anchor_robustness_supports_two_surface_probe_not_validation",
                  "two_surface_bic": 25.0079,
                  "one_global_surface_bic": 60.7862,
                  "delta_bic_two_minus_one": -35.7783,
                  "reach_mean": 1.8646,
                  "consolidation_mean": -1.9233,
                  "family_balanced_reach_mean": 2.8588,
                  "family_balanced_consolidation_mean": -2.0900,
                  "leave_one_anchor_out_preserved": "12/12"
              },
              "v3_41_h0licow": {
                  "status": "h0licow_reach_lane_eligibility_passed_coherent_negative_ddt_candidate",
                  "raw_ddt_pressure": "negative",
                  "normalized_direction": "reach_positive_equivalent",
                  "pressure_row_count": 3,
                  "positive_count": 0,
                  "negative_count": 3,
                  "mean_pressure_z": -1.6268644558220158,
                  "median_pressure_z": -0.9014283075552302
              },
              "v3_42_reach_lane_contrast": {
                  "status": "reach_lane_contrast_integration_passed_h0licow_candidate_bao_mixed_ready_for_growth_contrast",
                  "h0licow_candidate_ok": True,
                  "bao_global_blocked": True,
                  "parked_lanes": ["shoes_local_ladder", "tdcosmo_time_delay"],
                  "blocked_lanes": ["desi_mapped_reach"]
              },
              "v3_43_reach_consolidation_checkpoint": {
                  "status": "reach_consolidation_contrast_checkpoint_passed_ready_for_guarded_two_surface_comparison_design",
                  "h0licow_normalized_direction": "reach_positive_equivalent",
                  "growth_consolidation_direction": "consolidation_negative",
                  "bao_status": "mixed_subfamily_diagnostic_not_global_reach_anchor",
                  "blocked_and_parked_rail_count": 8
              }
          }

          REQUIRED_CONTRACT_FIELDS = [
              "source",
              "observable_role",
              "pressure_surface",
              "baseline",
              "parser_status",
              "provenance_status",
              "block_condition",
              "claim_boundary"
          ]

          SURFACE_ADMISSION_ROWS = [
              {
                  "surface_id": "h0licow_time_delay_reach",
                  "source": "H0LiCOW",
                  "observable_role": "time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "baseline": "Planck_2018_flat_LCDM_reference",
                  "parser_status": "source_specific_chain_parsed_pressure_reviewed_v3_38_to_v3_41",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "raw_pressure_status": "coherent_negative_Ddt",
                  "normalized_surface_direction": "reach_positive_equivalent",
                  "admission_role": "primary_reach_candidate_diagnostic_only",
                  "admission_allowed": True,
                  "aggregation_allowed_now": False,
                  "reason": "H0LiCOW is the cleanest current non-BAO reach candidate, but remains diagnostic-only.",
                  "block_condition": "blocked_from_model_anchor_and_refit_until_later_guarded_comparison",
                  "claim_boundary": "diagnostic_candidate_only_not_validation",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "new_pressure_score_allowed_now": False
              },
              {
                  "surface_id": "bao_mixed_ruler_reference",
                  "source": "SDSS_eBOSS_BOSS_BAO",
                  "observable_role": "bao_reach_ruler_mixed",
                  "pressure_surface": "ruler_reference_and_reach_geometry_mixed",
                  "baseline": "Planck_2018_flat_LCDM_reference",
                  "parser_status": "source_specific_bao_rows_reviewed_v3_31_v3_32",
                  "provenance_status": "public_bao_products_clean_eBOSS_plus_provisional_BOSS",
                  "raw_pressure_status": "mixed_subfamily_only",
                  "normalized_surface_direction": "not_global_reach_anchor",
                  "admission_role": "auxiliary_ruler_mixed_diagnostic_only",
                  "admission_allowed": True,
                  "aggregation_allowed_now": False,
                  "reason": "BAO can inform ruler/reference behavior but cannot be folded into a global reach-positive anchor.",
                  "block_condition": "blocked_from_global_reach_anchor_due_to_mixed_subfamily_behavior",
                  "claim_boundary": "diagnostic_only_not_model_anchor",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "new_pressure_score_allowed_now": False
              },
              {
                  "surface_id": "growth_consolidation_summary_pattern",
                  "source": "DES_KiDS_HSC_growth_summary_anchors_from_v3_9",
                  "observable_role": "weak_lensing_clustering_growth",
                  "pressure_surface": "consolidation_growth",
                  "baseline": "Planck_like_growth_reference_from_prior_summary_anchor_prototype",
                  "parser_status": "summary_anchor_prototype_only_chain_covariance_upgrade_required",
                  "provenance_status": "published_summary_anchor_family_prototype",
                  "raw_pressure_status": "negative_growth_consolidation",
                  "normalized_surface_direction": "consolidation_negative",
                  "admission_role": "provisional_consolidation_candidate_requires_upgrade",
                  "admission_allowed": True,
                  "aggregation_allowed_now": False,
                  "reason": "Growth/consolidation has the right prior direction but does not yet match H0LiCOW's source-specific parser quality.",
                  "block_condition": "blocked_from_stronger_comparison_until_chain_or_covariance_ingestion",
                  "claim_boundary": "prototype_diagnostic_only_not_validation",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "new_pressure_score_allowed_now": False
              },
              {
                  "surface_id": "shoes_local_ladder_parked",
                  "source": "PantheonPlus_SH0ES",
                  "observable_role": "local_ladder_H0_reach",
                  "pressure_surface": "reach_geometry",
                  "baseline": "not_safe_selected",
                  "parser_status": "parked_parser_followup_needed",
                  "provenance_status": "source_reachable_but_unlabeled_numeric_output_not_safe_for_pressure_row",
                  "raw_pressure_status": "not_scored",
                  "normalized_surface_direction": "parked",
                  "admission_role": "excluded_until_parser_repair",
                  "admission_allowed": False,
                  "aggregation_allowed_now": False,
                  "reason": "No source-safe H0 pressure row was extracted.",
                  "block_condition": "blocked_until_safer_SH0ES_parser_or_better_source_product",
                  "claim_boundary": "parked_not_evidence",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "new_pressure_score_allowed_now": False
              },
              {
                  "surface_id": "tdcosmo_time_delay_parked",
                  "source": "TDCOSMO",
                  "observable_role": "time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "baseline": "not_safe_selected",
                  "parser_status": "parked_provenance_review_needed",
                  "provenance_status": "TDLMC_seed_style_rows_flagged_for_review",
                  "raw_pressure_status": "not_scored",
                  "normalized_surface_direction": "parked",
                  "admission_role": "excluded_until_provenance_repair",
                  "admission_allowed": False,
                  "aggregation_allowed_now": False,
                  "reason": "Seed-style rows cannot be used as observational anchors.",
                  "block_condition": "blocked_until_observational_provenance_and_parser_review",
                  "claim_boundary": "parked_not_evidence",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "new_pressure_score_allowed_now": False
              },
              {
                  "surface_id": "desi_mapped_reach_blocked",
                  "source": "DESI",
                  "observable_role": "bao_reach_density_ruler",
                  "pressure_surface": "reach_geometry_or_ruler_reference_pending_role_specific_rebuild",
                  "baseline": "not_active",
                  "parser_status": "blocked_as_independent_anchor",
                  "provenance_status": "mapped_rows_showed_scaled_counterpart_risk",
                  "raw_pressure_status": "not_active",
                  "normalized_surface_direction": "blocked",
                  "admission_role": "excluded_until_independent_nonduplicate_rebuild",
                  "admission_allowed": False,
                  "aggregation_allowed_now": False,
                  "reason": "Mapped DESI rows showed scaled-counterpart risk.",
                  "block_condition": "blocked_until_independent_non_duplicate_source_specific_treatment",
                  "claim_boundary": "blocked_not_evidence",
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False,
                  "new_pressure_score_allowed_now": False
              }
          ]

          SIGN_NORMALIZATION_RULES = [
              {
                  "rule_id": "h0licow_ddt_negative_to_reach_positive_equivalent",
                  "applies_to": "H0LiCOW Ddt time-delay distance",
                  "raw_sign": "negative_Ddt_pressure",
                  "normalized_direction": "reach_positive_equivalent",
                  "reason": "Shorter Ddt than Planck-reference baseline corresponds to local-H0-high-equivalent direction.",
                  "allowed_use": "Use only as sign-normalized diagnostic reach direction.",
                  "forbidden_use": "Do not claim this proves H0 correction or TAIRID."
              },
              {
                  "rule_id": "growth_negative_remains_consolidation_negative",
                  "applies_to": "S8 weak-lensing / growth summary-anchor prototype",
                  "raw_sign": "negative_growth_pressure",
                  "normalized_direction": "consolidation_negative",
                  "reason": "Late weak-lensing/growth anchors sit below Planck-like S8 direction in the current prototype.",
                  "allowed_use": "Carry as provisional consolidation direction.",
                  "forbidden_use": "Do not treat summary anchors as full likelihood validation."
              },
              {
                  "rule_id": "bao_mixed_stays_ruler_mixed",
                  "applies_to": "Independent BAO rows and subfamilies",
                  "raw_sign": "mixed_subfamily_pressure",
                  "normalized_direction": "not_global_reach_anchor",
                  "reason": "BAO mixes ruler/reference and reach behavior and did not show one coherent global reach sign.",
                  "allowed_use": "Use BAO as auxiliary ruler/mixed diagnostic.",
                  "forbidden_use": "Do not aggregate BAO into reach-positive surface."
              }
          ]

          COMPARISON_DESIGN_ROWS = [
              {
                  "design_step": 1,
                  "step_name": "surface_role_separation",
                  "purpose": "Keep reach, ruler/reference, density, and growth/consolidation separate.",
                  "required_inputs": "surface_id, observable_role, pressure_surface, parser_status, provenance_status",
                  "output": "role-specific surface ledger",
                  "allowed_now": True,
                  "blocked_now": False
              },
              {
                  "design_step": 2,
                  "step_name": "sign_normalization_without_refit",
                  "purpose": "Translate raw observable signs into surface-direction labels without fitting a model.",
                  "required_inputs": "raw_pressure_status, normalized_surface_direction, normalization_reason",
                  "output": "sign-normalized diagnostic table",
                  "allowed_now": True,
                  "blocked_now": False
              },
              {
                  "design_step": 3,
                  "step_name": "comparison_eligibility_check",
                  "purpose": "Decide whether each lane may enter a later comparison.",
                  "required_inputs": "admission_role, admission_allowed, aggregation_allowed_now, block_condition",
                  "output": "comparison admission table",
                  "allowed_now": True,
                  "blocked_now": False
              },
              {
                  "design_step": 4,
                  "step_name": "guarded_two_surface_comparison_implementation",
                  "purpose": "Later compare reach-positive-equivalent vs consolidation-negative behavior.",
                  "required_inputs": "source-specific reach and source-specific growth/consolidation inputs with comparable provenance quality",
                  "output": "future comparison only after growth upgrade",
                  "allowed_now": False,
                  "blocked_now": True
              },
              {
                  "design_step": 5,
                  "step_name": "bic_or_refit_stage",
                  "purpose": "Run model comparison or refit.",
                  "required_inputs": "full likelihoods or covariance-aware chains for both surfaces",
                  "output": "not allowed in this lane yet",
                  "allowed_now": False,
                  "blocked_now": True
              }
          ]

          IMPLEMENTATION_BLOCKERS = [
              {
                  "blocker_id": "growth_side_quality_gap",
                  "blocker": "Growth/consolidation side is still summary-anchor prototype.",
                  "why_it_matters": "H0LiCOW now has source-specific chain parsing, but growth/consolidation has not yet received the same upgrade.",
                  "required_fix": "Run DES/KiDS/HSC chain or covariance ingestion inventory before any stronger two-surface comparison."
              },
              {
                  "blocker_id": "bao_global_anchor_block",
                  "blocker": "BAO is mixed/subfamily only.",
                  "why_it_matters": "BAO cannot be used as the main reach anchor.",
                  "required_fix": "Keep BAO as auxiliary ruler/reference diagnostic unless a later source-specific audit changes that."
              },
              {
                  "blocker_id": "parked_reach_lanes",
                  "blocker": "SH0ES and TDCOSMO are parked.",
                  "why_it_matters": "They cannot support the reach side until parser/provenance issues are repaired.",
                  "required_fix": "Run separate parser/provenance repair workflows before using either lane."
              },
              {
                  "blocker_id": "weighted_wfi_block",
                  "blocker": "WFI2033 is weighted and blocked.",
                  "why_it_matters": "Weighted likelihood handling needs review before it can join H0LiCOW Ddt scoring.",
                  "required_fix": "Run weight/likelihood handling review."
              }
          ]

          NEXT_TEST_QUEUE = [
              {
                  "priority": 1,
                  "next_test": "v3_45_growth_consolidation_chain_covariance_inventory",
                  "purpose": "Find DES/KiDS/HSC chain or covariance products so the growth/consolidation side can be upgraded beyond summary anchors.",
                  "must_include": "DES/KiDS/HSC source products, chain/covariance availability, S8 or growth parameter mapping, family handling, block conditions.",
                  "must_not_include": "new model refit, validation claim, mixing growth into reach.",
                  "readiness_if_passes": "Growth/consolidation parser design may proceed."
              },
              {
                  "priority": 2,
                  "next_test": "later_guarded_two_surface_comparison_implementation",
                  "purpose": "Implement the comparison only after growth/consolidation has comparable source-specific quality.",
                  "must_include": "H0LiCOW reach candidate, upgraded growth/consolidation inputs, BAO auxiliary status, explicit sign normalization.",
                  "must_not_include": "global BAO reach anchor, parked lanes, model-anchor promotion.",
                  "readiness_if_passes": "A stronger contrast audit may become possible."
              },
              {
                  "priority": 3,
                  "next_test": "later_shoes_or_tdcosmo_repair",
                  "purpose": "Repair parked reach lanes.",
                  "must_include": "safe parser or provenance path.",
                  "must_not_include": "unlabeled numeric assumptions or seed-style observational claims.",
                  "readiness_if_passes": "Parked lanes may return to diagnostic contrast."
              }
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          created_at = now_iso()

          write_csv(
              OUTDIR / "surface_admission_rules_v3_44.csv",
              SURFACE_ADMISSION_ROWS,
              [
                  "surface_id", "source", "observable_role", "pressure_surface",
                  "baseline", "parser_status", "provenance_status",
                  "raw_pressure_status", "normalized_surface_direction",
                  "admission_role", "admission_allowed", "aggregation_allowed_now",
                  "reason", "block_condition", "claim_boundary",
                  "model_anchor_allowed_now", "refit_allowed_now",
                  "new_pressure_score_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "sign_normalization_rules_v3_44.csv",
              SIGN_NORMALIZATION_RULES,
              [
                  "rule_id", "applies_to", "raw_sign", "normalized_direction",
                  "reason", "allowed_use", "forbidden_use"
              ]
          )

          write_csv(
              OUTDIR / "comparison_design_steps_v3_44.csv",
              COMPARISON_DESIGN_ROWS,
              [
                  "design_step", "step_name", "purpose", "required_inputs",
                  "output", "allowed_now", "blocked_now"
              ]
          )

          write_csv(
              OUTDIR / "comparison_implementation_blockers_v3_44.csv",
              IMPLEMENTATION_BLOCKERS,
              ["blocker_id", "blocker", "why_it_matters", "required_fix"]
          )

          write_csv(
              OUTDIR / "next_test_queue_v3_44.csv",
              NEXT_TEST_QUEUE,
              [
                  "priority", "next_test", "purpose", "must_include",
                  "must_not_include", "readiness_if_passes"
              ]
          )

          # Audit.
          h0licow = [r for r in SURFACE_ADMISSION_ROWS if r["surface_id"] == "h0licow_time_delay_reach"]
          growth = [r for r in SURFACE_ADMISSION_ROWS if r["surface_id"] == "growth_consolidation_summary_pattern"]
          bao = [r for r in SURFACE_ADMISSION_ROWS if r["surface_id"] == "bao_mixed_ruler_reference"]

          h0licow_admitted = (
              len(h0licow) == 1
              and h0licow[0]["admission_allowed"] is True
              and h0licow[0]["normalized_surface_direction"] == "reach_positive_equivalent"
              and h0licow[0]["aggregation_allowed_now"] is False
          )

          growth_provisional = (
              len(growth) == 1
              and growth[0]["admission_allowed"] is True
              and growth[0]["normalized_surface_direction"] == "consolidation_negative"
              and growth[0]["parser_status"] == "summary_anchor_prototype_only_chain_covariance_upgrade_required"
              and growth[0]["aggregation_allowed_now"] is False
          )

          bao_auxiliary_only = (
              len(bao) == 1
              and bao[0]["admission_role"] == "auxiliary_ruler_mixed_diagnostic_only"
              and bao[0]["normalized_surface_direction"] == "not_global_reach_anchor"
              and bao[0]["aggregation_allowed_now"] is False
          )

          comparison_implementation_blocked = any(
              row["step_name"] == "guarded_two_surface_comparison_implementation"
              and row["allowed_now"] is False
              and row["blocked_now"] is True
              for row in COMPARISON_DESIGN_ROWS
          )

          refit_stage_blocked = any(
              row["step_name"] == "bic_or_refit_stage"
              and row["allowed_now"] is False
              and row["blocked_now"] is True
              for row in COMPARISON_DESIGN_ROWS
          )

          no_model_anchors = all(row["model_anchor_allowed_now"] is False for row in SURFACE_ADMISSION_ROWS)
          no_refits = all(row["refit_allowed_now"] is False for row in SURFACE_ADMISSION_ROWS)
          no_new_scores = all(row["new_pressure_score_allowed_now"] is False for row in SURFACE_ADMISSION_ROWS)

          required_contract_present = True
          for row in SURFACE_ADMISSION_ROWS:
              for field in REQUIRED_CONTRACT_FIELDS:
                  if field not in row or row[field] in ["", None]:
                      required_contract_present = False

          growth_upgrade_next = NEXT_TEST_QUEUE[0]["next_test"] == "v3_45_growth_consolidation_chain_covariance_inventory"
          next_test_guards = (
              "new model refit" in NEXT_TEST_QUEUE[0]["must_not_include"]
              and "validation claim" in NEXT_TEST_QUEUE[0]["must_not_include"]
              and "mixing growth into reach" in NEXT_TEST_QUEUE[0]["must_not_include"]
          )

          audit_rows = [
              {
                  "audit_gate": "h0licow_admitted_diagnostic_only",
                  "pass": h0licow_admitted,
                  "value": json.dumps(h0licow[0] if h0licow else {}, sort_keys=True),
                  "boundary": "H0LiCOW may enter only as diagnostic reach candidate, not model anchor."
              },
              {
                  "audit_gate": "growth_marked_provisional_upgrade_required",
                  "pass": growth_provisional,
                  "value": json.dumps(growth[0] if growth else {}, sort_keys=True),
                  "boundary": "Growth/consolidation must not be treated as source-specific yet."
              },
              {
                  "audit_gate": "bao_auxiliary_only_not_global_anchor",
                  "pass": bao_auxiliary_only,
                  "value": json.dumps(bao[0] if bao else {}, sort_keys=True),
                  "boundary": "BAO remains auxiliary/mixed, not global reach anchor."
              },
              {
                  "audit_gate": "comparison_implementation_blocked_now",
                  "pass": comparison_implementation_blocked,
                  "value": comparison_implementation_blocked,
                  "boundary": "v3.44 designs the comparison but does not implement it."
              },
              {
                  "audit_gate": "refit_stage_blocked",
                  "pass": refit_stage_blocked,
                  "value": refit_stage_blocked,
                  "boundary": "No BIC, refit, or model comparison may be run here."
              },
              {
                  "audit_gate": "implementation_blockers_recorded",
                  "pass": len(IMPLEMENTATION_BLOCKERS) >= 4,
                  "value": len(IMPLEMENTATION_BLOCKERS),
                  "boundary": "Known blockers must be written before moving on."
              },
              {
                  "audit_gate": "required_contract_fields_present",
                  "pass": required_contract_present,
                  "value": required_contract_present,
                  "boundary": "source/role/surface/baseline/parser/provenance/block/claim contract must persist."
              },
              {
                  "audit_gate": "no_new_pressure_scores",
                  "pass": no_new_scores,
                  "value": no_new_scores,
                  "boundary": "No new pressure scores in v3.44."
              },
              {
                  "audit_gate": "no_model_anchors_promoted",
                  "pass": no_model_anchors,
                  "value": no_model_anchors,
                  "boundary": "No model anchors in v3.44."
              },
              {
                  "audit_gate": "no_refit_allowed",
                  "pass": no_refits,
                  "value": no_refits,
                  "boundary": "No refit in v3.44."
              },
              {
                  "audit_gate": "next_step_is_growth_upgrade_inventory",
                  "pass": growth_upgrade_next and next_test_guards,
                  "value": NEXT_TEST_QUEUE[0]["next_test"],
                  "boundary": "Next step should upgrade growth/consolidation data quality, not refit."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No model claim is allowed."
              }
          ]

          write_csv(
              OUTDIR / "guarded_two_surface_design_audit_v3_44.csv",
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          hard_failed = []

          if not h0licow_admitted:
              hard_failed.append("h0licow_not_admitted_correctly")
          if not growth_provisional:
              hard_failed.append("growth_not_marked_as_provisional")
          if not bao_auxiliary_only:
              hard_failed.append("bao_auxiliary_status_missing")
          if not comparison_implementation_blocked:
              hard_failed.append("comparison_implementation_not_blocked")
          if not refit_stage_blocked:
              hard_failed.append("refit_stage_not_blocked")
          if len(IMPLEMENTATION_BLOCKERS) < 4:
              hard_failed.append("implementation_blockers_missing")
          if not required_contract_present:
              hard_failed.append("required_contract_fields_missing")
          if not no_new_scores:
