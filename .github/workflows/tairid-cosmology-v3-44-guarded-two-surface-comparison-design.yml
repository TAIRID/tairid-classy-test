          md.append("")
          md.append(f"Failed gates: `{', '.join(hard_failed) if hard_failed else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this design does")
          md.append("")
          md.append("v3.44 defines how a later two-surface comparison must treat reach, BAO/ruler, and growth/consolidation without running a refit or adding new pressure scores.")
