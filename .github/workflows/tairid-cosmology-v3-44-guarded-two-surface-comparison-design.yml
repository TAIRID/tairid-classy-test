          md.append("- `tairid_cosmology_v3_44_guarded_two_surface_comparison_design.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_44_guarded_two_surface_comparison_design.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

