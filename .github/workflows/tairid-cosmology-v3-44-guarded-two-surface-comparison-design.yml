                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "new_pressure_scores_built": False,
                  "next_allowed_step": next_step
              }
          }

          json_path = OUTDIR / "tairid_cosmology_v3_44_guarded_two_surface_comparison_design.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.44 — Guarded Two-Surface Comparison Design")
