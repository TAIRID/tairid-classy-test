name: 000 TAIRID v4.137 Lightweight LCDM Growth Reference Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-137-lightweight-lcdm-growth-reference-probe.yml"

jobs:
  tairid-v4-137-lightweight-lcdm-growth-reference-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.137 lightweight LCDM growth reference probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_137_lightweight_lcdm_growth_reference_probe

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_137_lightweight_lcdm_growth_reference_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_137_lightweight_lcdm_growth_reference_probe"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This does not recompute the eBOSS pressure lanes.",
              "This computes a bounded lightweight LCDM growth reference vector and a diagonal approximation-variance support ledger only.",
              "A pass means the old interpolation reference can be replaced by a stronger diagnostic reference vector for the next eBOSS rerun, not by a full posterior covariance."
          ]

          UPSTREAM_LOCKS = {
              "v4_136_reference_upgrade_feasibility_probe": {
                  "readiness_label": "reference_upgrade_feasibility_probe_passed_lightweight_LCDM_growth_approximation_feasible_ready_for_lightweight_LCDM_reference_probe",
                  "repository_candidate_file_count": 120,
                  "stored_chain_candidate_count": 60,
                  "stored_reference_candidate_count": 45,
                  "expanded_reference_target_count": 12,
                  "all_targets_supported_by_lcdm_approx": True,
                  "eboss_targets_supported_by_lcdm_approx": True,
                  "max_abs_delta_vs_prior_exact": 0.0027298708323023058,
                  "mean_abs_delta_vs_prior_exact": 0.0025621752281033833,
                  "prior_exact_alignment_passed": True,
                  "selected_upgrade_method": "LCDM_growth_approximation_upgrade",
                  "CAMB_run": False,
                  "full_planck_chains_imported": False,
                  "full_planck_chain_sample_files_parsed": False,
                  "reference_upgrade_feasible": True,
                  "reference_upgrade_computed": False,
                  "reference_covariance_upgraded": False,
                  "observed_eBOSS_covariance_still_limited": True,
                  "pressure_recomputed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_134_eBOSS_covariance_locator_probe": {
                  "readiness_label": "eBOSS_covariance_locator_probe_passed_locator_status_recorded_covariance_not_ingested_ready_for_reference_upgrade_design",
                  "covariance_ingested": False,
                  "usable_covariance_locked": False,
                  "same_program_covariance_still_limited": True,
                  "reference_fallback_still_active": True,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          EXPANDED_REFERENCE_TARGETS = [
              {"target_id": "z0067_6dFGS", "z": 0.067, "role": "low_z_independent_anchor", "old_support": "linear_extrapolation_below_prior_range"},
              {"target_id": "z0150_MGS", "z": 0.150, "role": "existing_low_z_anchor", "old_support": "carried_exact_prior_reference"},
              {"target_id": "z0380_BOSS", "z": 0.380, "role": "BOSS_core", "old_support": "carried_exact_prior_reference"},
              {"target_id": "z0440_WiggleZ", "z": 0.440, "role": "WiggleZ_mid_z", "old_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0510_BOSS", "z": 0.510, "role": "BOSS_core", "old_support": "carried_exact_prior_reference"},
              {"target_id": "z0600_WiggleZ", "z": 0.600, "role": "WiggleZ_mid_z", "old_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0610_BOSS", "z": 0.610, "role": "BOSS_core", "old_support": "carried_exact_prior_reference"},
              {"target_id": "z0698_eBOSS_LRG", "z": 0.698, "role": "eBOSS_LRG_two_driver_split_review", "old_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0730_WiggleZ", "z": 0.730, "role": "WiggleZ_mid_z", "old_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0800_VIPERS", "z": 0.800, "role": "VIPERS_high_mid_z", "old_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z0850_eBOSS_ELG", "z": 0.850, "role": "eBOSS_ELG_negative_component", "old_support": "linear_interpolation_between_prior_targets"},
              {"target_id": "z1480_eBOSS_QSO", "z": 1.480, "role": "eBOSS_QSO_positive_counter_component", "old_support": "linear_interpolation_between_prior_targets"}
          ]

          CURRENT_INTERPOLATION_REFERENCE = {
              0.067: 0.4557281481619318,
              0.150: 0.4618473025984107,
              0.380: 0.4788039956151594,
              0.440: 0.4778160958075436,
              0.510: 0.4766635460319918,
              0.600: 0.4717307835963276,
              0.610: 0.4711826988812538,
              0.698: 0.4623052016766069,
              0.730: 0.4590770208749171,
              0.800: 0.4520153753712207,
              0.850: 0.4469713428685805,
              1.480: 0.3834165333353129
          }

          CARRIED_PRIOR_REFERENCE = {
              0.150: 0.4618473025984107,
              0.380: 0.4788039956151594,
              0.510: 0.4766635460319918,
              0.610: 0.4711826988812538
          }

          LCDM_APPROXIMATION_PARAMETERS = {
              "Omega_m": 0.315,
              "Omega_lambda": 0.685,
              "sigma8_0": 0.811,
              "growth_index_gamma": 0.55,
              "integration_steps": 2400,
              "method": "flat_LCDM_Carroll_Press_Turner_growth_integral_plus_f_Omega_gamma"
          }

          APPROXIMATION_VARIANCE_POLICY = {
              "policy_id": "diagnostic_diagonal_reference_variance",
              "variance_floor": 1.0e-5,
              "delta_multiplier": 4.0,
              "prior_alignment_multiplier": 4.0,
              "description": "Diagonal-only reference variance support is built from a conservative floor plus old-reference delta and prior-alignment residuals. It is not a full Planck posterior covariance."
          }

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "CAMB was run.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The lightweight LCDM growth reference probe validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The lightweight LCDM reference is a full Planck posterior covariance.",
              "The diagonal approximation variance is a final covariance matrix.",
              "The eBOSS two-driver split is a final result.",
              "Same-program eBOSS covariance is resolved.",
              "No observed covariance review is needed after reference upgrade."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_138_eBOSS_component_rerun_with_LCDM_reference",
                  "purpose": "Rerun the eBOSS component lanes using the lightweight LCDM reference vector instead of interpolation fallback.",
                  "why_next": "v4.137 builds the reference vector; v4.138 tests whether the two-driver split survives reference cleanup."
              },
              {
                  "priority": 2,
                  "route_id": "v4_139_LCDM_reference_sensitivity_audit",
                  "purpose": "Audit how sensitive the LCDM reference vector is to the chosen Omega_m, sigma8, and growth-index assumptions.",
                  "why_next": "The reference upgrade is approximate and must be sensitivity checked."
              },
              {
                  "priority": 3,
                  "route_id": "v4_140_CAMB_install_or_stored_chain_probe",
                  "purpose": "Try a bounded CAMB/stored-chain feasibility route if repository or runtime support becomes available.",
                  "why_next": "The lightweight approximation is useful but not full CAMB/chain posterior support."
              },
              {
                  "priority": 4,
                  "route_id": "v4_141_eBOSS_covariance_manual_extraction_checklist",
                  "purpose": "Create a human-readable checklist for extracting eBOSS covariance/likelihood support from SDSS/arXiv products.",
                  "why_next": "Observed-side covariance still blocks final interpretation."
              }
          ]

          failed_gates = []
          warnings = [
              "diagnostic_reference_probe_only",
              "CAMB_not_run",
              "full_planck_chains_not_imported",
              "lightweight_LCDM_approximation_not_full_posterior",
              "diagonal_reference_variance_not_final_covariance",
              "eBOSS_covariance_still_limited",
              "no_pressure_recompute",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def E_of_a(a, omega_m, omega_lambda):
              return math.sqrt(omega_m / (a ** 3) + omega_lambda)

          def growth_integral_D(a, omega_m, omega_lambda, steps):
              eps = 1e-5
              if a <= eps:
                  return a
              n = int(steps)
              if n % 2 == 1:
                  n += 1
              h = (a - eps) / n

              def integrand(x):
                  e = E_of_a(x, omega_m, omega_lambda)
                  return 1.0 / ((x ** 3) * (e ** 3))

              total = integrand(eps) + integrand(a)
              for i in range(1, n):
                  total += (4.0 if i % 2 else 2.0) * integrand(eps + i * h)
              integral = total * h / 3.0
              return 2.5 * omega_m * E_of_a(a, omega_m, omega_lambda) * integral

          def fsigma8_lcdm_approx(z, params, D_at_1):
              omega_m = params["Omega_m"]
              omega_lambda = params["Omega_lambda"]
              sigma8_0 = params["sigma8_0"]
              gamma = params["growth_index_gamma"]
              steps = params["integration_steps"]
              a = 1.0 / (1.0 + z)
              D_z = growth_integral_D(a, omega_m, omega_lambda, steps) / D_at_1
              omega_m_z = (omega_m * ((1.0 + z) ** 3)) / (omega_m * ((1.0 + z) ** 3) + omega_lambda)
              f_z = omega_m_z ** gamma
              return f_z * sigma8_0 * D_z

          D_at_1 = growth_integral_D(
              1.0,
              LCDM_APPROXIMATION_PARAMETERS["Omega_m"],
              LCDM_APPROXIMATION_PARAMETERS["Omega_lambda"],
              LCDM_APPROXIMATION_PARAMETERS["integration_steps"]
          )

          raw_records = []
          prior_deltas = []
          for target in EXPANDED_REFERENCE_TARGETS:
              z = round(float(target["z"]), 3)
              old_value = CURRENT_INTERPOLATION_REFERENCE[z]
              lcdm_value = fsigma8_lcdm_approx(z, LCDM_APPROXIMATION_PARAMETERS, D_at_1)
              delta_old = lcdm_value - old_value
              carried = CARRIED_PRIOR_REFERENCE.get(z, "")
              if carried != "":
                  delta_prior = lcdm_value - float(carried)
                  prior_deltas.append(delta_prior)
                  alignment_status = "checked_against_carried_prior_exact"
              else:
                  delta_prior = ""
                  alignment_status = "no_carried_prior_exact_at_this_redshift"
              raw_records.append({
                  "target_id": target["target_id"],
                  "z": z,
                  "role": target["role"],
                  "old_support": target["old_support"],
                  "old_reference_value": old_value,
                  "lcdm_reference_value": lcdm_value,
                  "delta_lcdm_minus_old_reference": delta_old,
                  "carried_prior_exact_value": carried,
                  "delta_lcdm_minus_prior_exact": delta_prior,
                  "prior_alignment_status": alignment_status
              })

          max_abs_delta_vs_prior = max(abs(x) for x in prior_deltas)
          mean_abs_delta_vs_prior = sum(abs(x) for x in prior_deltas) / len(prior_deltas)
          rms_delta_vs_prior = math.sqrt(sum(x * x for x in prior_deltas) / len(prior_deltas))

          reference_records = []
          for row in raw_records:
              delta_old_abs = abs(float(row["delta_lcdm_minus_old_reference"]))
              variance_support = max(
                  APPROXIMATION_VARIANCE_POLICY["variance_floor"],
                  (APPROXIMATION_VARIANCE_POLICY["delta_multiplier"] * delta_old_abs) ** 2,
                  (APPROXIMATION_VARIANCE_POLICY["prior_alignment_multiplier"] * rms_delta_vs_prior) ** 2
              )
              reference_records.append({
                  **row,
                  "reference_variance_support": variance_support,
                  "reference_sigma_support": math.sqrt(variance_support),
                  "reference_support_status": "lightweight_LCDM_growth_approximation_not_full_posterior",
                  "variance_status": "diagonal_approximation_variance_not_full_covariance",
                  "claim_boundary": "diagnostic_reference_upgrade_only"
              })

          covariance_records = []
          for i, row in enumerate(reference_records):
              for j, col in enumerate(reference_records):
                  covariance_records.append({
                      "row_target_id": row["target_id"],
                      "column_target_id": col["target_id"],
                      "row_z": row["z"],
                      "column_z": col["z"],
                      "covariance_value": row["reference_variance_support"] if i == j else 0.0,
                      "covariance_status": (
                          "diagonal_approximation_variance_not_full_covariance"
                          if i == j else
                          "off_diagonal_unavailable_zeroed_diagnostic_fallback"
                      ),
                      "record_scope": "lightweight_LCDM_reference_support_not_final_posterior"
                  })

          eboss_reference_records = [
              row for row in reference_records
              if row["target_id"] in ["z0698_eBOSS_LRG", "z0850_eBOSS_ELG", "z1480_eBOSS_QSO"]
          ]
          prior_alignment_records = [
              row for row in reference_records
              if row["prior_alignment_status"] == "checked_against_carried_prior_exact"
          ]

          comparison_summary_records = [
              {
                  "summary_id": "target_support",
                  "value": len(reference_records),
                  "status": "all_12_targets_supported",
                  "boundary": "diagnostic LCDM approximation only"
              },
              {
                  "summary_id": "prior_alignment_max_abs_delta",
                  "value": max_abs_delta_vs_prior,
                  "status": "prior_alignment_passed_under_0p01",
                  "boundary": "not posterior validation"
              },
              {
                  "summary_id": "prior_alignment_mean_abs_delta",
                  "value": mean_abs_delta_vs_prior,
                  "status": "prior_alignment_checked",
                  "boundary": "not posterior validation"
              },
              {
                  "summary_id": "eboss_lrg_delta_vs_old",
                  "value": next(row["delta_lcdm_minus_old_reference"] for row in eboss_reference_records if row["target_id"] == "z0698_eBOSS_LRG"),
                  "status": "small_reference_shift",
                  "boundary": "not pressure rerun"
              },
              {
                  "summary_id": "eboss_elg_delta_vs_old",
                  "value": next(row["delta_lcdm_minus_old_reference"] for row in eboss_reference_records if row["target_id"] == "z0850_eBOSS_ELG"),
                  "status": "small_reference_shift",
                  "boundary": "not pressure rerun"
              },
              {
                  "summary_id": "eboss_qso_delta_vs_old",
                  "value": next(row["delta_lcdm_minus_old_reference"] for row in eboss_reference_records if row["target_id"] == "z1480_eBOSS_QSO"),
                  "status": "largest_eBOSS_reference_shift",
                  "boundary": "not pressure rerun"
              }
          ]

          all_targets_supported = len(reference_records) == 12
          eboss_targets_supported = len(eboss_reference_records) == 3
          prior_alignment_passed = max_abs_delta_vs_prior < 0.01
          covariance_matrix_complete = len(covariance_records) == len(reference_records) * len(reference_records)
          full_posterior_covariance_available = False
          reference_upgrade_computed = True
          reference_covariance_upgraded = False
          diagnostic_variance_support_built = True
          pressure_recomputed = False
          final_pressure_ready = False

          if UPSTREAM_LOCKS["v4_136_reference_upgrade_feasibility_probe"]["selected_upgrade_method"] != "LCDM_growth_approximation_upgrade":
              failed_gates.append("upstream_selected_method_not_LCDM_approx")

          if UPSTREAM_LOCKS["v4_136_reference_upgrade_feasibility_probe"]["observed_eBOSS_covariance_still_limited"] is not True:
              failed_gates.append("upstream_observed_covariance_limit_not_carried")

          if not all_targets_supported:
              failed_gates.append("not_all_targets_supported")

          if not eboss_targets_supported:
              failed_gates.append("not_all_eboss_targets_supported")

          if not prior_alignment_passed:
              failed_gates.append("prior_alignment_failed")

          if not covariance_matrix_complete:
              failed_gates.append("diagnostic_covariance_matrix_incomplete")

          if full_posterior_covariance_available:
              failed_gates.append("full_posterior_covariance_unexpectedly_available")

          if pressure_recomputed:
              failed_gates.append("pressure_unexpectedly_recomputed")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "camb was run",
              "final rsd pressure score",
              "validates tairid cosmology",
              "lightweight lcdm reference is a full planck posterior covariance",
              "diagonal approximation variance is a final covariance matrix",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "lightweight_LCDM_growth_reference_probe_passed_reference_vector_built_ready_for_eBOSS_component_rerun_with_LCDM_reference"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_feasibility_carried",
                  "pass": UPSTREAM_LOCKS["v4_136_reference_upgrade_feasibility_probe"]["selected_upgrade_method"] == "LCDM_growth_approximation_upgrade",
                  "result": "v4.136 selected lightweight LCDM growth approximation",
                  "boundary": "Carry-forward only."
              },
              {
                  "rule_id": "reference_vector_built",
                  "pass": reference_upgrade_computed and all_targets_supported,
                  "result": f"reference_target_count={len(reference_records)}",
                  "boundary": "Diagnostic approximation only."
              },
              {
                  "rule_id": "eBOSS_reference_targets_built",
                  "pass": eboss_targets_supported,
                  "result": "LRG, ELG, and QSO all have lightweight LCDM reference values",
                  "boundary": "Reference support only."
              },
              {
                  "rule_id": "prior_alignment_passed",
                  "pass": prior_alignment_passed,
                  "result": f"max_abs_delta_vs_prior={max_abs_delta_vs_prior}; rms_delta_vs_prior={rms_delta_vs_prior}",
                  "boundary": "Not posterior validation."
              },
              {
                  "rule_id": "diagonal_variance_support_built",
                  "pass": diagnostic_variance_support_built and covariance_matrix_complete,
                  "result": f"covariance_records={len(covariance_records)}",
                  "boundary": "Diagonal approximation variance, not full covariance."
              },
              {
                  "rule_id": "full_posterior_covariance_blocked",
                  "pass": full_posterior_covariance_available is False and reference_covariance_upgraded is False,
                  "result": "full posterior covariance is not available",
                  "boundary": "Blocks final pressure."
              },
              {
                  "rule_id": "observed_covariance_limit_preserved",
                  "pass": UPSTREAM_LOCKS["v4_136_reference_upgrade_feasibility_probe"]["observed_eBOSS_covariance_still_limited"] is True,
                  "result": "same-program eBOSS covariance remains limited",
                  "boundary": "Reference upgrade alone cannot finalize eBOSS."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False and pressure_recomputed is False,
                  "result": "pressure was not recomputed and final pressure remains blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_137_rules_passed")

          if failed_gates:
              readiness_label = "lightweight_LCDM_growth_reference_probe_failed"
              next_allowed_step = "Repair lightweight LCDM growth reference probe before eBOSS component rerun."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.138 eBOSS component rerun with lightweight LCDM reference. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "selected_reference_method": "lightweight_LCDM_growth_approximation",
              "reference_upgrade_computed": reference_upgrade_computed,
              "reference_target_count": len(reference_records),
              "eboss_reference_target_count": len(eboss_reference_records),
              "all_targets_supported": all_targets_supported,
              "prior_alignment_passed": prior_alignment_passed,
              "max_abs_delta_vs_prior_exact": max_abs_delta_vs_prior,
              "mean_abs_delta_vs_prior_exact": mean_abs_delta_vs_prior,
              "rms_delta_vs_prior_exact": rms_delta_vs_prior,
              "diagnostic_variance_support_built": diagnostic_variance_support_built,
              "covariance_record_count": len(covariance_records),
              "full_posterior_covariance_available": full_posterior_covariance_available,
              "reference_covariance_upgraded": reference_covariance_upgraded,
              "observed_eBOSS_covariance_still_limited": True,
              "CAMB_run": False,
              "full_planck_chains_imported": False,
              "full_planck_chain_sample_files_parsed": False,
              "pressure_recomputed": pressure_recomputed,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "LCDM_approximation_parameters": LCDM_APPROXIMATION_PARAMETERS,
              "approximation_variance_policy": APPROXIMATION_VARIANCE_POLICY,
              "expanded_reference_targets": EXPANDED_REFERENCE_TARGETS,
              "reference_records": reference_records,
              "prior_alignment_records": prior_alignment_records,
              "eboss_reference_records": eboss_reference_records,
              "covariance_records": covariance_records,
              "comparison_summary_records": comparison_summary_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "reference_upgrade_computed": reference_upgrade_computed,
                  "diagnostic_variance_support_built": diagnostic_variance_support_built,
                  "reference_covariance_upgraded": reference_covariance_upgraded,
                  "pressure_recomputed": pressure_recomputed,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_137_lightweight_lcdm_growth_reference_probe.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "reference_records_v4_137.csv",
              reference_records,
              ["target_id", "z", "role", "old_support", "old_reference_value", "lcdm_reference_value", "delta_lcdm_minus_old_reference", "carried_prior_exact_value", "delta_lcdm_minus_prior_exact", "prior_alignment_status", "reference_variance_support", "reference_sigma_support", "reference_support_status", "variance_status", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "prior_alignment_records_v4_137.csv",
              prior_alignment_records,
              ["target_id", "z", "old_reference_value", "lcdm_reference_value", "carried_prior_exact_value", "delta_lcdm_minus_prior_exact", "reference_sigma_support", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "eboss_reference_records_v4_137.csv",
              eboss_reference_records,
              ["target_id", "z", "role", "old_reference_value", "lcdm_reference_value", "delta_lcdm_minus_old_reference", "reference_variance_support", "reference_sigma_support", "reference_support_status", "variance_status"]
          )

          write_csv(
              OUTDIR / "covariance_records_v4_137.csv",
              covariance_records,
              ["row_target_id", "column_target_id", "row_z", "column_z", "covariance_value", "covariance_status", "record_scope"]
          )

          write_csv(
              OUTDIR / "comparison_summary_records_v4_137.csv",
              comparison_summary_records,
              ["summary_id", "value", "status", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_137.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_137.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_137.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.137 — Lightweight LCDM Growth Reference Probe")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.137 replaces the raw interpolation reference with a documented lightweight LCDM growth reference vector for all 12 expanded redshifts. This is stronger than interpolation, but it is still not CAMB, not Planck posterior covariance, and not final pressure.")
          md.append("")
          md.append("The eBOSS redshifts now have a consistent diagnostic reference vector ready for a rerun. Observed-side eBOSS covariance remains limited, so the next rerun still cannot become final validation.")
          md.append("")
          md.append("## eBOSS reference upgrade preview")
          md.append("")
          md.append("| Target | z | Old reference | LCDM reference | Delta |")
          md.append("|---|---:|---:|---:|---:|")
          for row in eboss_reference_records:
              md.append(f"| `{row['target_id']}` | `{row['z']}` | `{row['old_reference_value']}` | `{row['lcdm_reference_value']}` | `{row['delta_lcdm_minus_old_reference']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_137_lightweight_lcdm_growth_reference_probe.json",
              "tairid_v4_137_lightweight_lcdm_growth_reference_probe.md",
              "reference_records_v4_137.csv",
              "prior_alignment_records_v4_137.csv",
              "eboss_reference_records_v4_137.csv",
              "covariance_records_v4_137.csv",
              "comparison_summary_records_v4_137.csv",
              "blocked_claims_v4_137.csv",
              "next_route_options_v4_137.csv",
              "rule_results_v4_137.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_137_lightweight_lcdm_growth_reference_probe.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

