name: Run TAIRID Cosmology Failure Mode Atlas v3.0 Fresh

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-cosmology-failure-mode-atlas-v3-0-fresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy matplotlib

      - name: Confirm fresh script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_cosmology_failure_mode_atlas_v3_0_fresh.py
          echo "v3.0 FRESH TAIRID cosmology failure-mode atlas builder found."

      - name: Run TAIRID Cosmology Failure Mode Atlas v3.0 Fresh
        run: |
          python run_tairid_cosmology_failure_mode_atlas_v3_0_fresh.py

      - name: Upload fresh outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-failure-mode-atlas-v3-0-fresh-output
          path: |
            tairid_cosmology_failure_mode_atlas_v3_0_fresh_outputs/**
