name: "!!! AAA CURRENT - TAIRID v4.355 direct source schema review ingest no scoring"

on:
  workflow_dispatch:

jobs:
  run-v4-355-direct-source-schema-review-ingest-no-scoring:
    name: "!!! AAA CURRENT - Run v4.355 direct source schema review ingest"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.354 output ZIP and human-filled schema review ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.354 output ZIP..."
          INPUT_354_ZIP="$(ls tairid-v4-354-better-direct-observed-source-staging-no-values-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_354_ZIP" ]; then
            echo "Could not find v4.354 output ZIP."
            echo "Expected:"
            echo "tairid-v4-354-better-direct-observed-source-staging-no-values-no-scoring-output.zip"
            exit 1
          fi

          echo "Finding human-filled direct source schema review ZIP..."
          HUMAN_FILLED_SCHEMA_ZIP="$(ls tairid-v4-354-human-filled-direct-source-schema-review-for-v4-355-no-values-no-scoring*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_SCHEMA_ZIP" ]; then
            echo "Could not find human-filled schema review ZIP."
            echo "Expected:"
            echo "tairid-v4-354-human-filled-direct-source-schema-review-for-v4-355-no-values-no-scoring.zip"
            exit 1
          fi

          echo "Using v4.354 ZIP:"
          echo "$INPUT_354_ZIP"

          echo "Using human-filled schema review ZIP:"
          echo "$HUMAN_FILLED_SCHEMA_ZIP"

          echo "INPUT_354_ZIP=$INPUT_354_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_SCHEMA_ZIP=$HUMAN_FILLED_SCHEMA_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.355 schema review ingest script
        run: |
          cat > run_v4_355_direct_source_schema_review_ingest_no_scoring.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values approved; numeric baseline approved; direct observed-source schema may be approved here; no observed values loaded; no scoring; no support claims"

          ALLOWED_SCHEMA_DECISIONS = {
              "approve_schema_for_later_observed_value_loading",
              "needs_manual_column_mapping",
              "needs_better_source_file",
              "reject_source_file",
              "keep_blocked",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def main():
              input_354 = Path(os.environ["INPUT_354_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_SCHEMA_ZIP"])

              outdir = Path("tairid_v4_355_direct_source_schema_review_ingest_no_values_no_scoring_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base354 = extract_zip(input_354, "tairid_v4_355_354_")
              basehuman = extract_zip(human_zip, "tairid_v4_355_human_")

              summary354_path = find_one(base354, "v4_354_summary.json")
              source_stage_path = find_one(base354, "v4_354_direct_observed_source_file_stage_HEADER_ONLY_NO_VALUES_LOADED.csv")
              schema_map_path = find_one(base354, "v4_354_direct_observed_source_schema_map_candidate_NO_VALUES_LOADED.csv")
              blank_review_path = find_one(base354, "v4_354_HUMAN_FILL_direct_source_schema_review_NO_VALUES_NO_SCORING.csv")
              checklist_path = find_one(base354, "v4_354_direct_source_schema_review_checklist.csv")
              gap_status_path = find_one(base354, "v4_354_gap_status_after_better_direct_source_staging.csv")
              better_source_rows_path = find_one(base354, "v4_354_input_v4_353_better_source_needed_rows_preserved.csv")
              rules354_path = find_one(base354, "v4_354_rule_checks.csv")

              filled_review_path = find_one_suffix(basehuman, "HUMAN_FILLED_direct_source_schema_review_NO_VALUES_NO_SCORING.csv")

              summary354 = json.loads(summary354_path.read_text())
              source_stage = pd.read_csv(source_stage_path)
              schema_map = pd.read_csv(schema_map_path)
              blank_review = pd.read_csv(blank_review_path)
              checklist = pd.read_csv(checklist_path)
              gap_status = pd.read_csv(gap_status_path)
              better_source_rows = pd.read_csv(better_source_rows_path)
              rules354 = pd.read_csv(rules354_path)
              filled_review = pd.read_csv(filled_review_path)

              for col in [
                  "human_schema_review_decision",
                  "human_schema_review_note",
                  "human_covariance_warning_acknowledgement",
              ]:
                  if col not in filled_review.columns:
                      filled_review[col] = ""

              ingest_rows = []

              for _, row in filled_review.iterrows():
                  decision = clean(row["human_schema_review_decision"])

                  if decision == "approve_schema_for_later_observed_value_loading":
                      row_ingest_status = "schema_approved_for_later_observed_value_loading_not_loaded"
                      schema_approved_now = True
                  elif decision == "needs_manual_column_mapping":
                      row_ingest_status = "blocked_needs_manual_column_mapping"
                      schema_approved_now = False
                  elif decision == "needs_better_source_file":
                      row_ingest_status = "blocked_needs_better_source_file"
                      schema_approved_now = False
                  elif decision in ["reject_source_file", "keep_blocked"]:
                      row_ingest_status = "blocked_or_rejected"
                      schema_approved_now = False
                  else:
                      row_ingest_status = "invalid_or_missing_schema_decision"
                      schema_approved_now = False

                  ingest_rows.append({
                      "v4_355_schema_ingest_id": f"v4_355_schema_ingest_{len(ingest_rows)+1:03d}",
                      "v4_354_schema_map_id": clean(row["v4_354_schema_map_id"]),
                      "source_stage_id": clean(row["source_stage_id"]),
                      "repo_path": clean(row["repo_path"]),
                      "file_name": clean(row["file_name"]),

                      "schema_field_survey_or_source": clean(row["schema_field_survey_or_source"]),
                      "schema_field_tracer_or_sample": clean(row["schema_field_tracer_or_sample"]),
                      "schema_field_redshift_z": clean(row["schema_field_redshift_z"]),
                      "schema_field_observed_fsigma8": clean(row["schema_field_observed_fsigma8"]),
                      "schema_field_observed_fsigma8_uncertainty": clean(row["schema_field_observed_fsigma8_uncertainty"]),
                      "schema_field_covariance_or_error_model": clean(row["schema_field_covariance_or_error_model"]),
                      "schema_field_source_reference": clean(row["schema_field_source_reference"]),
                      "schema_field_source_url": clean(row["schema_field_source_url"]),

                      "human_schema_review_decision": decision,
                      "human_schema_review_note": clean(row["human_schema_review_note"]),
                      "human_covariance_warning_acknowledgement": clean(row["human_covariance_warning_acknowledgement"]),

                      "row_ingest_status": row_ingest_status,
                      "schema_approved_now": schema_approved_now,
                      "observed_values_loaded": False,
                      "observed_rows_loaded": 0,
                      "definition_match_confirmed": False,
                      "covariance_match_confirmed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              ingest = pd.DataFrame(ingest_rows)

              approved_schema_rows = ingest[ingest["schema_approved_now"].astype(bool)].copy()
              invalid_rows = ingest[ingest["row_ingest_status"] == "invalid_or_missing_schema_decision"].copy()
              blocked_rows = ingest[
                  ingest["row_ingest_status"].isin([
                      "blocked_needs_manual_column_mapping",
                      "blocked_needs_better_source_file",
                      "blocked_or_rejected",
                  ])
              ].copy()

              if len(approved_schema_rows) > 0:
                  readiness_status = "schema_approved_for_later_observed_value_loading_not_loaded"
                  selected_next_route = "v4_356_observed_value_loading_dry_run_no_scoring_no_support_claims"
              elif len(blocked_rows) > 0:
                  readiness_status = "blocked_schema_not_approved"
                  selected_next_route = "repair_schema_or_source_file_then_rerun_v4_355"
              else:
                  readiness_status = "blocked_invalid_or_missing_schema_review"
                  selected_next_route = "fix_human_schema_review_packet_then_rerun_v4_355"

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_355_GAP_001",
                      "gap": "Direct observed-source schema review ingested.",
                      "status_after_v4_355": readiness_status,
                      "next_gate": selected_next_route,
                  },
                  {
                      "gap_id": "V4_355_GAP_002",
                      "gap": "Observed values remain unloaded.",
                      "status_after_v4_355": "still_blocked",
                      "next_gate": "v4_356_observed_value_loading_dry_run",
                  },
                  {
                      "gap_id": "V4_355_GAP_003",
                      "gap": "Definition matching remains unconfirmed.",
                      "status_after_v4_355": "still_blocked",
                      "next_gate": "later_definition_match_gate",
                  },
                  {
                      "gap_id": "V4_355_GAP_004",
                      "gap": "Covariance matching remains unconfirmed.",
                      "status_after_v4_355": "still_blocked",
                      "next_gate": "later_covariance_match_gate",
                  },
                  {
                      "gap_id": "V4_355_GAP_005",
                      "gap": "Scoring and support claims remain blocked.",
                      "status_after_v4_355": "still_blocked",
                      "next_gate": "later_scoring_and_support_gates",
                  },
              ])

              hard_checks = {
                  "input_v4_354_summary_found": summary354.get("version") == "v4.354",
                  "input_v4_354_rules_all_passed": summary_rules_all_passed(summary354),
                  "input_v4_354_failed_gates_none": summary354.get("failed_gates") == "none",
                  "input_v4_354_parameter_values_approved_true": summary354.get("parameter_values_approved") is True,
                  "input_v4_354_numeric_baseline_approved_true": summary354.get("numeric_baseline_approved") is True,
                  "input_v4_354_schema_not_approved_yet": summary354.get("schema_approved") is False,
                  "input_v4_354_no_observed_values_loaded": summary354.get("observed_values_loaded") is False,
                  "input_v4_354_no_score_valid": summary354.get("score_valid") is False,
                  "input_v4_354_no_support_allowed": summary354.get("support_allowed") is False,

                  "rules354_all_passed": rules354["passed"].astype(bool).all(),
                  "source_stage_rows_equal_1": len(source_stage) == 1,
                  "schema_map_rows_equal_1": len(schema_map) == 1,
                  "blank_review_rows_equal_1": len(blank_review) == 1,
                  "filled_review_rows_equal_1": len(filled_review) == 1,
                  "checklist_rows_equal_6": len(checklist) == 6,
                  "gap_status_rows_equal_5": len(gap_status) == 5,
                  "better_source_rows_at_least_one": len(better_source_rows) >= 1,

                  "schema_decision_filled": filled_review["human_schema_review_decision"].apply(clean).ne("").all(),
                  "schema_decision_allowed": filled_review["human_schema_review_decision"].apply(clean).isin(ALLOWED_SCHEMA_DECISIONS).all(),
                  "ingest_rows_equal_1": len(ingest) == 1,
                  "invalid_rows_equal_0": len(invalid_rows) == 0,
                  "approved_schema_rows_equal_1": len(approved_schema_rows) == 1,
                  "blocked_rows_equal_0": len(blocked_rows) == 0,

                  "schema_approved_true_in_approved_rows": approved_schema_rows["schema_approved_now"].astype(bool).all(),
                  "observed_values_loaded_false": false_col(ingest, "observed_values_loaded"),
                  "observed_rows_loaded_zero": int(ingest["observed_rows_loaded"].sum()) == 0,
                  "definition_match_confirmed_false": false_col(ingest, "definition_match_confirmed"),
                  "covariance_match_confirmed_false": false_col(ingest, "covariance_match_confirmed"),
                  "score_valid_false": false_col(ingest, "score_valid"),
                  "support_allowed_false": false_col(ingest, "support_allowed"),
                  "gap_update_rows_equal_5": len(gap_update) == 5,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary355 = {
                  "version": "v4.355",
                  "route_name": "v4_355_direct_source_schema_review_ingest_no_values_no_scoring",
                  "expected_result": "v4_355_direct_source_schema_review_ingest_passed_schema_approved_no_values_loaded_no_scoring_no_claims",
                  "input_version": "v4.354",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "readiness_status": readiness_status,
                  "schema_review_rows": int(len(filled_review)),
                  "schema_approved_rows": int(len(approved_schema_rows)),
                  "parameter_values_approved": True,
                  "numeric_baseline_values_filled": True,
                  "approved_baseline_values": 3,
                  "numeric_baseline_approved": True,
                  "schema_approved": bool(len(approved_schema_rows) > 0),
                  "observed_values_loaded": False,
                  "observed_rows_loaded": 0,
                  "definition_match_confirmed": False,
                  "covariance_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": selected_next_route,
              }

              ingest.to_csv(outdir / "v4_355_direct_source_schema_review_ingest_ledger_NO_VALUES_NO_SCORING.csv", index=False)
              approved_schema_rows.to_csv(outdir / "v4_355_APPROVED_SCHEMA_FOR_LATER_OBSERVED_VALUE_LOADING_NO_VALUES_LOADED.csv", index=False)
              gap_update.to_csv(outdir / "v4_355_gap_status_after_direct_source_schema_review_ingest.csv", index=False)
              filled_review.to_csv(outdir / "v4_355_input_human_filled_schema_review_preserved.csv", index=False)
              blank_review.to_csv(outdir / "v4_355_input_blank_v4_354_schema_review_preserved.csv", index=False)
              source_stage.to_csv(outdir / "v4_355_input_v4_354_source_stage_preserved.csv", index=False)
              schema_map.to_csv(outdir / "v4_355_input_v4_354_schema_map_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_355_rule_checks.csv", index=False)

              (outdir / "v4_355_summary.json").write_text(json.dumps(summary355, indent=2))

              summary_md = f"""# TAIRID v4.355 Direct Source Schema Review Ingest — No Values, No Scoring

          Expected result: `{summary355["expected_result"]}`

          {summary355["rules_passed"]} / {summary355["rules_total"]} rules passed

          failed_gates = {summary355["failed_gates"]}

          readiness_status = `{summary355["readiness_status"]}`

          schema_approved_rows = {summary355["schema_approved_rows"]}

          schema_approved = {summary355["schema_approved"]}

          observed_values_loaded = false

          observed_rows_loaded = 0

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step approves the direct observed-source schema for later value loading.

          It does **not** load observed values.

          It does **not** confirm definition or covariance matching.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{summary355["selected_next_route"]}`
          """
              (outdir / "v4_355_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary355, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_355_direct_source_schema_review_ingest_no_scoring.py

      - name: Run v4.355 direct source schema review ingest no scoring
        run: |
          python run_v4_355_direct_source_schema_review_ingest_no_scoring.py

      - name: Upload v4.355 direct source schema review ingest artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-355-direct-source-schema-review-ingest-no-values-no-scoring-output
          path: |
            tairid_v4_355_direct_source_schema_review_ingest_no_values_no_scoring_output/
            tairid_v4_355_direct_source_schema_review_ingest_no_values_no_scoring_output.zip
