name: 000 TAIRID v4.196 - Dyslexia Aphantasia Manual Group Axis Table And Data Acquisition With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-196-dyslexia-aphantasia-manual-group-axis-table-and-data-acquisition-with-scope-guards.yml"
      - "data/neurotype/**"
      - "data/cross_domain/**"

permissions:
  contents: read

jobs:
  v4-196-dyslexia-aphantasia-manual-group-axis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.196 manual group axis table and data acquisition plan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_196_outputs
          cat > tairid_v4_196_outputs/run_v4_196.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_196_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "dyslexia_aphantasia_manual_group_axis_table_and_data_acquisition_passed_manual_group_table_written_no_subject_covariance_no_validation"

          BLOCKED_CLAIMS = [
              "no cross-domain validation",
              "no neurotype validation",
              "no clinical diagnosis claim",
              "no claim that cosmology proves neurotypes",
              "no claim that neurotypes prove cosmology",
              "no raw numbers moved from cosmology to cognition",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "manual group-axis table is not subject-level covariance",
              "manual group-axis table is not external replication",
              "TAIRID not proved"
          ]

          V4_195_STATUS = {
              "version": "v4.195",
              "rule_pass_count": 10,
              "rule_total_count": 10,
              "failed_gates": [],
              "input_rows_loaded": 0,
              "normalized_dyslexia_aphantasia_rows": 0,
              "covariance_long_rows": 0,
              "package_status": "subject_axis_input_missing_or_insufficient_templates_written",
              "selected_next_route": "dyslexia_aphantasia_subject_axis_data_acquisition_or_manual_table_with_scope_guards"
          }

          # These are manual relational group-axis rows only.
          # They preserve the shape already built in v4.194, but they are not subject-level data.
          MANUAL_GROUP_AXIS_ROWS = [
              {
                  "lane": "Dyslexia",
                  "row_id": "dyslexia_control_reference_manual_zero",
                  "row_kind": "manual_reference_zero_row",
                  "group_or_condition": "reference_control",
                  "boundary_or_task": "ETDD70 reading-flow surface",
                  "propagation_reach_axis": "s_A / reading-flow scale expansion",
                  "propagation_reach_value": "0",
                  "pacing_access_axis": "lambda_R / residue-load pacing pressure",
                  "pacing_access_value": "0",
                  "consolidation_growth_axis": "rho_R and V_data / re-entry viability",
                  "consolidation_growth_value": "0",
                  "viability_or_outcome_axis": "V_data / reading viability",
                  "viability_or_outcome_value": "0",
                  "known_numeric_anchor": "model bAcc=0.857; AUC=0.932",
                  "shape_signature": "000",
                  "notes": "Reference zero row for manual relational comparison only; not subject data."
              },
              {
                  "lane": "Dyslexia",
                  "row_id": "dyslexia_etdd70_relative_manual_shape",
                  "row_kind": "manual_group_relative_shape_row",
                  "group_or_condition": "dyslexia_relative_to_reference",
                  "boundary_or_task": "ETDD70 reading-flow surface",
                  "propagation_reach_axis": "s_A / reading-flow scale expansion",
                  "propagation_reach_value": "1",
                  "pacing_access_axis": "lambda_R / residue-load pacing pressure",
                  "pacing_access_value": "1",
                  "consolidation_growth_axis": "rho_R and V_data / re-entry viability",
                  "consolidation_growth_value": "-1",
                  "viability_or_outcome_axis": "V_data / reading viability",
                  "viability_or_outcome_value": "-1",
                  "known_numeric_anchor": "model bAcc=0.857; AUC=0.932; s_A up; lambda_R up; rho_R down; V_data down",
                  "shape_signature": "++-",
                  "notes": "Manual paper-grounded relative shape row; not subject data and not covariance."
              },
              {
                  "lane": "Aphantasia",
                  "row_id": "aphantasia_control_reference_manual_zero",
                  "row_kind": "manual_reference_zero_row",
                  "group_or_condition": "reference_control",
                  "boundary_or_task": "visual imagery / reconstruction surface",
                  "propagation_reach_axis": "internal visual simulation / visual reach",
                  "propagation_reach_value": "0",
                  "pacing_access_axis": "lambda_R and burden / mismatch pressure",
                  "pacing_access_value": "0",
                  "consolidation_growth_axis": "imagery/reconstruction viability",
                  "consolidation_growth_value": "0",
                  "viability_or_outcome_axis": "task viability or burden-adjusted performance",
                  "viability_or_outcome_value": "0",
                  "known_numeric_anchor": "drawing burden d=1.013; physiology burden d=1.553",
                  "shape_signature": "000",
                  "notes": "Reference zero row for manual relational comparison only; not subject data."
              },
              {
                  "lane": "Aphantasia",
                  "row_id": "aphantasia_visual_gap_relative_manual_shape",
                  "row_kind": "manual_group_relative_shape_row",
                  "group_or_condition": "aphantasia_relative_to_reference",
                  "boundary_or_task": "visual imagery / reconstruction surface",
                  "propagation_reach_axis": "internal visual simulation / visual reach",
                  "propagation_reach_value": "-1",
                  "pacing_access_axis": "lambda_R and burden / mismatch pressure",
                  "pacing_access_value": "1",
                  "consolidation_growth_axis": "imagery/reconstruction viability",
                  "consolidation_growth_value": "-1",
                  "viability_or_outcome_axis": "task viability or burden-adjusted performance",
                  "viability_or_outcome_value": "-1",
                  "known_numeric_anchor": "drawing burden d=1.013; physiology burden d=1.553; rho_R lower; lambda_R higher; V lower",
                  "shape_signature": "-+-",
                  "notes": "Manual paper-grounded relative shape row; not subject data and not covariance."
              }
          ]

          SUBJECT_INPUT_TEMPLATE = [
              {
                  "lane": "Dyslexia",
                  "subject_id": "replace_with_subject_or_group_id",
                  "group_or_condition": "dyslexic_or_control_or_group",
                  "boundary_or_task": "ETDD70 reading-flow surface",
                  "propagation_reach_value": "s_A or equivalent numeric value",
                  "pacing_access_value": "lambda_R or timing/load equivalent numeric value",
                  "consolidation_growth_value": "rho_R or re-entry/accuracy equivalent numeric value",
                  "viability_or_outcome_value": "V_data or reading viability/outcome numeric value",
                  "source_or_dataset": "ETDD70 / uploaded dyslexia table",
                  "notes": "Need real subject/group values here before covariance can be computed."
              },
              {
                  "lane": "Aphantasia",
                  "subject_id": "replace_with_subject_or_group_id",
                  "group_or_condition": "aphantasia_or_control_or_group",
                  "boundary_or_task": "visual imagery / reconstruction surface",
                  "propagation_reach_value": "visual imagery reach or inverse VVIQ-like numeric value",
                  "pacing_access_value": "burden/load/timing/mismatch numeric value",
                  "consolidation_growth_value": "reconstruction viability or accuracy numeric value",
                  "viability_or_outcome_value": "task viability/outcome or burden-adjusted performance numeric value",
                  "source_or_dataset": "aphantasia questionnaire/drawing/physiology output",
                  "notes": "Need real subject/group values here before covariance can be computed."
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          def safe_float(v):
              try:
                  return float(v)
              except Exception:
                  return None

          def sign(v):
              x = safe_float(v)
              if x is None:
                  return ""
              if x > 0:
                  return "+"
              if x < 0:
                  return "-"
              return "0"

          relative_rows = [r for r in MANUAL_GROUP_AXIS_ROWS if r["row_kind"] == "manual_group_relative_shape_row"]
          comparison_rows = []
          for axis_key, axis_name in [
              ("propagation_reach_value", "propagation_reach"),
              ("pacing_access_value", "pacing_access"),
              ("consolidation_growth_value", "consolidation_growth"),
              ("viability_or_outcome_value", "viability_or_outcome")
          ]:
              dys = next(r for r in relative_rows if r["lane"] == "Dyslexia")
              aph = next(r for r in relative_rows if r["lane"] == "Aphantasia")
              dys_sign = sign(dys[axis_key])
              aph_sign = sign(aph[axis_key])
              comparison_rows.append({
                  "axis": axis_name,
                  "dyslexia_manual_sign": dys_sign,
                  "aphantasia_manual_sign": aph_sign,
                  "same_or_different": "same" if dys_sign == aph_sign else "different",
                  "plain_read": (
                      "both high or pressured" if dys_sign == aph_sign == "+"
                      else "both low or reduced" if dys_sign == aph_sign == "-"
                      else "different relational direction"
                  ),
                  "claim_boundary": "manual relational comparison only; not covariance"
              })

          minimum_requirements = [
              {
                  "requirement": "Subject or group rows",
                  "minimum": "At least 2 complete rows per lane/group for covariance to be mathematically writable; more is needed for meaningful covariance.",
                  "why": "One manual relative row cannot produce honest covariance."
              },
              {
                  "requirement": "Complete axis columns",
                  "minimum": "propagation_reach_value, pacing_access_value, consolidation_growth_value, and viability_or_outcome_value must all be numeric.",
                  "why": "Covariance needs aligned numeric axes."
              },
              {
                  "requirement": "Within-lane scaling",
                  "minimum": "Dyslexia and aphantasia values must be scaled within their own lane before relational comparison.",
                  "why": "The units are not the same across fields or tasks."
              },
              {
                  "requirement": "Source labels",
                  "minimum": "Each row must name source_or_dataset and boundary_or_task.",
                  "why": "A shape without a boundary is not interpretable."
              }
          ]

          acquisition_plan = [
              {
                  "priority": 1,
                  "lane": "Dyslexia",
                  "target_file_to_create": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "needed_values": "subject or group rows for s_A, lambda_R, rho_R, V_data",
                  "best_source": "ETDD70 output tables or paper supplement",
                  "next_action": "fill template with dyslexia/control rows"
              },
              {
                  "priority": 2,
                  "lane": "Aphantasia",
                  "target_file_to_create": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "needed_values": "subject or group rows for imagery reach, burden/mismatch, reconstruction viability, outcome",
                  "best_source": "aphantasia questionnaire/drawing/physiology output tables",
                  "next_action": "fill template with aphantasia/control rows"
              },
              {
                  "priority": 3,
                  "lane": "Both",
                  "target_file_to_create": "data/neurotype/dyslexia_aphantasia_subject_axis_input.csv",
                  "needed_values": "enough rows per lane for covariance/correlation",
                  "best_source": "subject-level CSV preferred; group-level repeated surfaces acceptable as weaker preview",
                  "next_action": "rerun v4.195 after adding the file"
              }
          ]

          claim_rows = [
              {
                  "claim": "Manual table preserves the current shape.",
                  "status": "allowed",
                  "safe_wording": "The manual table preserves the paper-grounded relational signs from v4.194.",
                  "forbidden_wording": "The manual table is subject-level evidence."
              },
              {
                  "claim": "Manual rows can produce covariance.",
                  "status": "blocked",
                  "safe_wording": "Manual rows show shape only; covariance needs multiple real numeric rows.",
                  "forbidden_wording": "The manual table closes covariance."
              },
              {
                  "claim": "Dyslexia and aphantasia are the same.",
                  "status": "blocked",
                  "safe_wording": "They share pacing/access high and viability low, but reach differs.",
                  "forbidden_wording": "They are the same geometry in every axis."
              }
          ]

          row_fields = [
              "lane", "row_id", "row_kind", "group_or_condition", "boundary_or_task",
              "propagation_reach_axis", "propagation_reach_value",
              "pacing_access_axis", "pacing_access_value",
              "consolidation_growth_axis", "consolidation_growth_value",
              "viability_or_outcome_axis", "viability_or_outcome_value",
              "known_numeric_anchor", "shape_signature", "notes"
          ]

          template_fields = [
              "lane", "subject_id", "group_or_condition", "boundary_or_task",
              "propagation_reach_value", "pacing_access_value",
              "consolidation_growth_value", "viability_or_outcome_value",
              "source_or_dataset", "notes"
          ]

          write_csv(OUT / "v4_196_v4_195_status_review.csv", [V4_195_STATUS], list(V4_195_STATUS.keys()))
          (OUT / "v4_196_v4_195_status_review.json").write_text(json.dumps(V4_195_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_196_manual_group_axis_table.csv", MANUAL_GROUP_AXIS_ROWS, row_fields)
          write_csv(OUT / "v4_196_manual_axis_comparison.csv", comparison_rows, ["axis", "dyslexia_manual_sign", "aphantasia_manual_sign", "same_or_different", "plain_read", "claim_boundary"])
          write_csv(OUT / "candidate_data_neurotype_dyslexia_aphantasia_subject_axis_input.csv", SUBJECT_INPUT_TEMPLATE, template_fields)
          write_csv(OUT / "v4_196_subject_axis_minimum_requirements.csv", minimum_requirements, ["requirement", "minimum", "why"])
          write_csv(OUT / "v4_196_data_acquisition_plan.csv", acquisition_plan, ["priority", "lane", "target_file_to_create", "needed_values", "best_source", "next_action"])
          write_csv(OUT / "v4_196_claim_boundary_matrix.csv", claim_rows, ["claim", "status", "safe_wording", "forbidden_wording"])

          same_axis_count = sum(1 for r in comparison_rows if r["same_or_different"] == "same")
          different_axis_count = sum(1 for r in comparison_rows if r["same_or_different"] == "different")

          selected_next_route = "rerun_v4_195_after_subject_axis_input_file_or_continue_to_adhd_autism_schizotypy_numeric_delta_acquisition"

          route_decision = {
              "version": "v4.196",
              "result_label": RESULT_LABEL,
              "clean_result": "The missing-subject-data result from v4.195 was converted into a manual group-axis table plus a data-acquisition template. No subject-level covariance was computed.",
              "manual_group_rows": len(MANUAL_GROUP_AXIS_ROWS),
              "relative_shape_rows": len(relative_rows),
              "same_axis_count": same_axis_count,
              "different_axis_count": different_axis_count,
              "candidate_input_template_written": True,
              "selected_next_route": selected_next_route,
              "truth_boundary": "manual group-axis table and acquisition plan only; not subject covariance or validation",
              "blocked_claims": BLOCKED_CLAIMS
          }

          (OUT / "v4_196_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_196_scope_guards.json").write_text(json.dumps({
              "scope": "manual dyslexia/aphantasia group-axis table and subject data acquisition plan",
              "manual_table_is_subject_level_data": False,
              "manual_table_is_covariance": False,
              "subject_covariance_computed": False,
              "axis_values_are_cross_domain_units": False,
              "raw_numbers_moved_from_cosmology": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "clinical_diagnosis_claimed": False,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_196_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.196 - Dyslexia Aphantasia Manual Group Axis Table And Data Acquisition",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.195 passed but found no subject/group axis input rows. v4.196 preserves the current dyslexia/aphantasia relational shape as a manual group-axis table and writes the exact data-acquisition template needed to rerun covariance extraction.",
              "",
              "Manual group rows: `" + str(len(MANUAL_GROUP_AXIS_ROWS)) + "`",
              "Relative shape rows: `" + str(len(relative_rows)) + "`",
              "Shared axes: `" + str(same_axis_count) + "`",
              "Different axes: `" + str(different_axis_count) + "`",
              "",
              "## Boundary",
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_196_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required = [
              "v4_196_v4_195_status_review.csv",
              "v4_196_v4_195_status_review.json",
              "v4_196_manual_group_axis_table.csv",
              "v4_196_manual_axis_comparison.csv",
              "candidate_data_neurotype_dyslexia_aphantasia_subject_axis_input.csv",
              "v4_196_subject_axis_minimum_requirements.csv",
              "v4_196_data_acquisition_plan.csv",
              "v4_196_claim_boundary_matrix.csv",
              "v4_196_route_decision.json",
              "v4_196_scope_guards.json",
              "v4_196_blocked_claims.json",
              "v4_196_summary.md"
          ]

          rules = {
              "version_is_v4_196": True,
              "result_label_present": RESULT_LABEL.endswith("no_subject_covariance_no_validation"),
              "all_outputs_written": all((OUT / p).exists() for p in required),
              "v4_195_status_reviewed": V4_195_STATUS["rule_pass_count"] == 10,
              "manual_group_rows_present": len(MANUAL_GROUP_AXIS_ROWS) == 4,
              "relative_shape_rows_present": len(relative_rows) == 2,
              "axis_comparison_has_four_axes": len(comparison_rows) == 4,
              "template_written": (OUT / "candidate_data_neurotype_dyslexia_aphantasia_subject_axis_input.csv").exists(),
              "no_subject_covariance_claim": True,
              "no_validation_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.196",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "manual_group_rows": len(MANUAL_GROUP_AXIS_ROWS),
              "relative_shape_rows": len(relative_rows),
              "same_axis_count": same_axis_count,
              "different_axis_count": different_axis_count,
              "package_status": "manual_group_axis_table_and_data_acquisition_plan_written_no_validation",
              "selected_next_route": selected_next_route,
              "claim_boundary": "manual_group_axis_table_only_no_subject_covariance_no_validation"
          }

          (OUT / "v4_196_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.196 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_196_outputs/run_v4_196.py

      - name: Upload v4.196 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-196-dyslexia-aphantasia-manual-group-axis-table-and-data-acquisition-output
          path: tairid_v4_196_outputs/
