name: 001 TAIRID v4.235 - Locator Review Reference Manifest

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-235-locator-review-reference-manifest.yml"

permissions:
  contents: read

jobs:
  locator-review-reference-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.235 Locator Review Reference Manifest is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.235 locator review reference manifest
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import json
          import time
          import zipfile

          VERSION = "v4.235"
          ROUTE = "review_locator_results_or_fill_stronger_lcdm_reference_manifest_after_v4_234"
          EXPECTED_RESULT = "v4_235_locator_review_reference_manifest_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_236_stronger_lcdm_reference_manifest_scaffold_or_broader_holdout_locator"

          OUT = Path("tairid_v4_235_locator_review_reference_manifest_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-235-locator-review-reference-manifest-output.zip"

          CURRENT_USED_SOURCE_URLS = [
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8_covtot.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/qso/sdss_DR16_QSO_FSBAO_DMDHfs8.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/qso/sdss_DR16_QSO_FSBAO_DMDHfs8_covtot.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/elg/sdss_DR16_ELG_BAO_DVtable.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/elg/sdss_DR16_ELG_FSBAO_DMDHfs8gridlikelihood.txt",
          ]

          # Same-release / mirror patterns are blocked from independent holdout evidence.
          # They may still be useful for parser comparison, but not for new evidence.
          CURRENT_EQUIVALENT_PATTERNS = [
              "sdss_dr16_baoplus_qso_fsbao_dmdhfs8",
              "sdss_dr16_qso_fsbao_dmdhfs8",
              "sdss_dr16_baoplus_lrg_fsbao_dmdhfs8",
              "sdss_dr16_lrg_fsbao_dmdhfs8",
              "sdss_dr16_elg_bao_dvtable",
              "sdss_dr16_elg_fsbao_dmdhfs8gridlikelihood",
          ]

          LOCATOR_TARGETS = [
              {"target_id": "cosmosis_standard_library_main", "owner": "cosmosis-developers", "repo": "cosmosis-standard-library", "branch": "main"},
              {"target_id": "cosmosis_standard_library_master", "owner": "cosmosis-developers", "repo": "cosmosis-standard-library", "branch": "master"},
              {"target_id": "cobaya_bao_data_main", "owner": "CobayaSampler", "repo": "bao_data", "branch": "main"},
              {"target_id": "cobaya_bao_data_master", "owner": "CobayaSampler", "repo": "bao_data", "branch": "master"},
              {"target_id": "cobaya_repository_main", "owner": "CobayaSampler", "repo": "cobaya", "branch": "main"},
              {"target_id": "cobaya_repository_master", "owner": "CobayaSampler", "repo": "cobaya", "branch": "master"},
          ]

          FROZEN_PREDICTIONS = [
              {"freeze_id": "freeze_001_primary_qso_growth", "source_family": "QSO_or_QSO_like_high_redshift_growth_surface", "expected_direction": "+", "status": "frozen_before_future_holdout"},
              {"freeze_id": "freeze_002_secondary_qso_radial", "source_family": "QSO_or_QSO_like_high_redshift_radial_geometry", "expected_direction": "+/0", "status": "frozen_before_future_holdout"},
              {"freeze_id": "freeze_003_control_lrg_growth", "source_family": "LRG_or_LRG_like_lower_redshift_growth_surface", "expected_direction": "0_or_not_stable_positive", "status": "frozen_before_future_holdout"},
              {"freeze_id": "freeze_004_geometry_compressed_lane", "source_family": "compressed_geometry_DV_like_lane", "expected_direction": "mostly_0_or_not_primary", "status": "guardrail"},
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def github_tree_url(owner, repo, branch):
              return f"https://api.github.com/repos/{owner}/{repo}/git/trees/{branch}?recursive=1"

          def github_raw_url(owner, repo, branch, path_text):
              return f"https://raw.githubusercontent.com/{owner}/{repo}/{branch}/{path_text}"

          def fetch_json(url, timeout=30):
              req = Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v4.235-locator-review",
                      "Accept": "application/vnd.github+json",
                  },
              )
              with urlopen(req, timeout=timeout) as response:
                  return json.loads(response.read().decode("utf-8", errors="replace"))

          def lower(text):
              return str(text or "").lower()

          def suffix_for(path_text):
              name = lower(path_text).split("/")[-1]
              if name.endswith(".tar.gz"):
                  return ".tar.gz"
              if "." not in name:
                  return ""
              return "." + name.split(".")[-1]

          def should_keep_path(path_text):
              text = lower(path_text)
              suffix = suffix_for(path_text)
              if suffix not in [".txt", ".dat", ".csv", ".tsv", ".json", ".yaml", ".yml", ".ini", ".py", ".gz", ".zip"]:
                  return False
              terms = [
                  "qso", "quasar", "lrg", "elg", "lya", "lyxqso",
                  "fsigma", "fsigma8", "growth", "rsd", "bao",
                  "dmdh", "dv", "wigglez", "vipers", "6df", "mgs",
                  "dr16", "dr12", "desi", "cov", "invcov", "likelihood"
              ]
              return any(term in text for term in terms)

          def initial_family(path_text):
              text = lower(path_text)
              if ("qso" in text or "quasar" in text) and any(term in text for term in ["fsigma", "fsigma8", "fsbao", "growth", "rsd"]):
                  return "primary_qso_growth_like"
              if ("qso" in text or "quasar" in text) and any(term in text for term in ["dmdh", "dh", "bao"]):
                  return "secondary_qso_radial_or_geometry_like"
              if "lrg" in text and any(term in text for term in ["fsigma", "fsigma8", "fsbao", "growth", "rsd"]):
                  return "lrg_growth_control_like"
              if any(term in text for term in ["wigglez", "vipers", "mgs", "6df", "6dfgs"]) and any(term in text for term in ["fsigma", "fsigma8", "growth", "rsd"]):
                  return "non_qso_growth_like"
              if "desi" in text and ("qso" in text or "lrg" in text or "elg" in text):
                  return "possible_external_desi_like"
              if any(term in text for term in ["dv", "dmdh", "bao"]) and "cov" not in text:
                  return "geometry_control_like"
              return "not_holdout_or_cross_surface"

          def strict_review(path_text, raw_url, family):
              text = lower(path_text)
              raw = lower(raw_url)
              current_urls = [lower(url) for url in CURRENT_USED_SOURCE_URLS]

              if raw in current_urls:
                  return "rejected_exact_current_source", "Exact source URL already used in v4.223-v4.232."

              if any(pattern in text for pattern in CURRENT_EQUIVALENT_PATTERNS):
                  return "rejected_same_release_or_mirror_surface", "Same SDSS DR16/eBOSS surface or mirror-like candidate; useful for parser check only, not holdout evidence."

              if "lyxqso" in text or "lya" in text:
                  return "held_cross_surface_special_review", "LyA / LyxQSO cross-surface needs separate source model and cannot be used as direct QSO growth holdout."

              if "desi" in text:
                  if "qso" in text and any(term in text for term in ["fsigma", "growth", "rsd"]):
                      return "reviewable_future_holdout_candidate", "Possible DESI QSO-like growth holdout; must verify observable and covariance."
                  if "qso" in text and "bao" in text:
                      return "reviewable_geometry_control_candidate", "Possible DESI QSO geometry control, not primary growth holdout."
                  return "reviewable_external_candidate_needs_role_check", "DESI-like external candidate needs tracer/observable review."

              if family == "non_qso_growth_like":
                  return "reviewable_control_candidate", "Possible growth control surface, but not QSO primary holdout."

              if "dr12" in text or "boss_dr12" in text:
                  return "reviewable_control_candidate", "Older BOSS/DR12-like source may be a control, not the primary high-z QSO holdout."

              if family in ["primary_qso_growth_like", "secondary_qso_radial_or_geometry_like", "lrg_growth_control_like", "geometry_control_like"]:
                  return "needs_manual_review_not_approved", "Candidate passed broad locator but not strict holdout approval."

              return "not_holdout", "Candidate is not eligible as holdout under strict review."

          def score_review(family, strict_status):
              if strict_status == "reviewable_future_holdout_candidate":
                  return 100
              if strict_status == "reviewable_control_candidate":
                  return 70
              if strict_status == "reviewable_geometry_control_candidate":
                  return 55
              if strict_status == "reviewable_external_candidate_needs_role_check":
                  return 45
              if strict_status == "needs_manual_review_not_approved":
                  return 10
              if strict_status.startswith("rejected"):
                  return -50
              if strict_status.startswith("held"):
                  return -10
              return 0

          target_status_rows = []
          broad_candidate_rows = []

          for target in LOCATOR_TARGETS:
              tree_url = github_tree_url(target["owner"], target["repo"], target["branch"])
              try:
                  payload = fetch_json(tree_url)
                  tree = payload.get("tree", [])
                  fetch_status = "fetched"
                  error = ""
              except Exception as exc:
                  tree = []
                  fetch_status = "fetch_failed"
                  error = f"{type(exc).__name__}: {exc}"

              target_status_rows.append({
                  "target_id": target["target_id"],
                  "owner": target["owner"],
                  "repo": target["repo"],
                  "branch": target["branch"],
                  "tree_url": tree_url,
                  "fetch_status": fetch_status,
                  "tree_count": len(tree),
                  "error": error,
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

              for item in tree:
                  if item.get("type") != "blob":
                      continue
                  path_text = item.get("path", "")
                  if not should_keep_path(path_text):
                      continue
                  raw_url = github_raw_url(target["owner"], target["repo"], target["branch"], path_text)
                  family = initial_family(path_text)
                  strict_status, strict_reason = strict_review(path_text, raw_url, family)
                  score = score_review(family, strict_status)
                  approved = False

                  broad_candidate_rows.append({
                      "target_id": target["target_id"],
                      "owner": target["owner"],
                      "repo": target["repo"],
                      "branch": target["branch"],
                      "path": path_text,
                      "suffix": suffix_for(path_text),
                      "raw_url": raw_url,
                      "broad_family": family,
                      "strict_review_status": strict_status,
                      "strict_review_reason": strict_reason,
                      "review_score": score,
                      "approved_as_holdout": approved,
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

              time.sleep(0.25)

          broad_candidate_rows.sort(key=lambda row: (-int(row["review_score"]), row["strict_review_status"], row["raw_url"]))

          strict_status_values = [
              "reviewable_future_holdout_candidate",
              "reviewable_control_candidate",
              "reviewable_geometry_control_candidate",
              "reviewable_external_candidate_needs_role_check",
              "needs_manual_review_not_approved",
              "held_cross_surface_special_review",
              "rejected_same_release_or_mirror_surface",
              "rejected_exact_current_source",
              "not_holdout",
          ]

          strict_summary_rows = []
          for status in strict_status_values:
              rows = [row for row in broad_candidate_rows if row["strict_review_status"] == status]
              strict_summary_rows.append({
                  "strict_review_status": status,
                  "candidate_rows": len(rows),
                  "top_candidate_url": rows[0]["raw_url"] if rows else "",
                  "summary_status": "present" if rows else "none",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

          top_review_rows = []
          for idx, row in enumerate(broad_candidate_rows[:40], start=1):
              out = dict(row)
              out["rank"] = idx
              top_review_rows.append(out)

          stronger_lcdm_reference_manifest_rows = [
              {
                  "reference_row_id": "lcdm_ref_001",
                  "source": "LRG",
                  "surface_id": "lrg_dr16_fsbao_dmdhfs8",
                  "redshift": "source_redshift",
                  "quantity": "D_M_over_r_sound",
                  "reference_value": "PUT_STRONGER_LCDM_REFERENCE_VALUE_HERE",
                  "reference_method": "PUT_METHOD_OR_EXTERNAL_REFERENCE_HERE",
                  "status": "template_not_filled",
              },
              {
                  "reference_row_id": "lcdm_ref_002",
                  "source": "LRG",
                  "surface_id": "lrg_dr16_fsbao_dmdhfs8",
                  "redshift": "source_redshift",
                  "quantity": "D_H_over_r_sound",
                  "reference_value": "PUT_STRONGER_LCDM_REFERENCE_VALUE_HERE",
                  "reference_method": "PUT_METHOD_OR_EXTERNAL_REFERENCE_HERE",
                  "status": "template_not_filled",
              },
              {
                  "reference_row_id": "lcdm_ref_003",
                  "source": "LRG",
                  "surface_id": "lrg_dr16_fsbao_dmdhfs8",
                  "redshift": "source_redshift",
                  "quantity": "f_sigma8",
                  "reference_value": "PUT_STRONGER_LCDM_REFERENCE_VALUE_HERE",
                  "reference_method": "PUT_METHOD_OR_EXTERNAL_REFERENCE_HERE",
                  "status": "template_not_filled",
              },
              {
                  "reference_row_id": "lcdm_ref_004",
                  "source": "QSO",
                  "surface_id": "qso_dr16_fsbao_dmdhfs8",
                  "redshift": "source_redshift",
                  "quantity": "D_M_over_r_sound",
                  "reference_value": "PUT_STRONGER_LCDM_REFERENCE_VALUE_HERE",
                  "reference_method": "PUT_METHOD_OR_EXTERNAL_REFERENCE_HERE",
                  "status": "template_not_filled",
              },
              {
                  "reference_row_id": "lcdm_ref_005",
                  "source": "QSO",
                  "surface_id": "qso_dr16_fsbao_dmdhfs8",
                  "redshift": "source_redshift",
                  "quantity": "D_H_over_r_sound",
                  "reference_value": "PUT_STRONGER_LCDM_REFERENCE_VALUE_HERE",
                  "reference_method": "PUT_METHOD_OR_EXTERNAL_REFERENCE_HERE",
                  "status": "template_not_filled",
              },
              {
                  "reference_row_id": "lcdm_ref_006",
                  "source": "QSO",
                  "surface_id": "qso_dr16_fsbao_dmdhfs8",
                  "redshift": "source_redshift",
                  "quantity": "f_sigma8",
                  "reference_value": "PUT_STRONGER_LCDM_REFERENCE_VALUE_HERE",
                  "reference_method": "PUT_METHOD_OR_EXTERNAL_REFERENCE_HERE",
                  "status": "template_not_filled",
              },
          ]

          holdout_manifest_template_rows = [
              {
                  "manifest_row_id": "holdout_001",
                  "target_role": "primary_qso_growth_holdout",
                  "source_or_tracer": "QSO_or_QSO_like",
                  "observable": "f_sigma8_or_comparable_growth",
                  "candidate_url": "PUT_REVIEWED_NON_CURRENT_HOLDOUT_URL_HERE",
                  "covariance_url": "PUT_COVARIANCE_OR_LIKELIHOOD_URL_HERE",
                  "status": "template_not_filled",
              },
              {
                  "manifest_row_id": "holdout_002",
                  "target_role": "qso_radial_secondary",
                  "source_or_tracer": "QSO_or_QSO_like",
                  "observable": "D_H_over_r_sound_or_equivalent",
                  "candidate_url": "PUT_REVIEWED_NON_CURRENT_HOLDOUT_URL_HERE",
                  "covariance_url": "PUT_COVARIANCE_OR_LIKELIHOOD_URL_HERE",
                  "status": "template_not_filled",
              },
              {
                  "manifest_row_id": "holdout_003",
                  "target_role": "lrg_growth_control",
                  "source_or_tracer": "LRG_or_LRG_like",
                  "observable": "f_sigma8_or_comparable_growth",
                  "candidate_url": "PUT_REVIEWED_CONTROL_URL_HERE",
                  "covariance_url": "PUT_COVARIANCE_OR_LIKELIHOOD_URL_HERE",
                  "status": "template_not_filled",
              },
              {
                  "manifest_row_id": "holdout_004",
                  "target_role": "geometry_control",
                  "source_or_tracer": "BAO_or_geometry",
                  "observable": "D_M_D_H_D_V_or_likelihood_coordinate",
                  "candidate_url": "PUT_REVIEWED_GEOMETRY_CONTROL_URL_HERE",
                  "covariance_url": "PUT_COVARIANCE_OR_LIKELIHOOD_URL_HERE",
                  "status": "template_not_filled",
              },
          ]

          decision_rows = []
          reviewable_primary = [row for row in broad_candidate_rows if row["strict_review_status"] == "reviewable_future_holdout_candidate"]
          same_release_blocked = [row for row in broad_candidate_rows if row["strict_review_status"] == "rejected_same_release_or_mirror_surface"]

          if reviewable_primary:
              decision_rows.append({
                  "decision_id": "decision_001",
                  "decision": "Possible external primary holdout candidates exist, but none are approved.",
                  "basis": f"reviewable_future_holdout_candidate rows = {len(reviewable_primary)}",
                  "next_action": "Manually review top candidates and fill holdout manifest only after source/covariance verification.",
                  "claim_status": "candidate_only_not_evidence",
              })
          else:
              decision_rows.append({
                  "decision_id": "decision_001",
                  "decision": "No clean primary QSO growth holdout candidate was approved by strict review.",
                  "basis": "Locator produced candidates but strict review blocks approval.",
                  "next_action": "Prioritize stronger LCDM reference manifest or broaden source search.",
                  "claim_status": "no_approved_holdout",
              })

          decision_rows.append({
              "decision_id": "decision_002",
              "decision": "Same-release or mirror candidates are blocked from holdout evidence.",
              "basis": f"same-release/mirror rows blocked = {len(same_release_blocked)}",
              "next_action": "Use these only for parser comparison if needed, not as new evidence.",
              "claim_status": "mirror_holdout_blocked",
          })

          decision_rows.append({
              "decision_id": "decision_003",
              "decision": "Stronger LCDM reference manifest is now the safest closure route.",
              "basis": "Holdout locator found candidates but no approval should happen automatically.",
              "next_action": "Fill or scaffold stronger reference values before another pressure claim.",
              "claim_status": "reference_upgrade_priority",
          })

          permission_rows = [
              {
                  "permission_scope": "top_candidate_review",
                  "permission_status": "allowed",
                  "reason": "Candidates can be reviewed manually/source-specifically.",
              },
              {
                  "permission_scope": "automatic_holdout_approval",
                  "permission_status": "blocked",
                  "reason": "Locator review cannot approve evidence automatically.",
              },
              {
                  "permission_scope": "same_release_mirror_as_holdout",
                  "permission_status": "blocked",
                  "reason": "Same-release or mirror files are not independent holdout evidence.",
              },
              {
                  "permission_scope": "stronger_lcdm_reference_manifest",
                  "permission_status": "allowed_as_next_scaffold",
                  "reason": "Reference upgrade is needed before validation language.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No validation without approved holdout or stronger reference comparison.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_236_stronger_lcdm_reference_manifest_scaffold",
                  "purpose": "turn the stronger LCDM reference template into explicit reference rows or a reproducible calculation scaffold",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_236_broader_holdout_locator",
                  "purpose": "search beyond the current GitHub locator targets for independent QSO-like growth surfaces",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_236_review_desi_geometry_controls",
                  "purpose": "review DESI-like geometry candidates as controls, not primary QSO growth evidence",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_236_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until source-surface guards pass",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before strict locator review"},
              {"gate": "locator_targets_equal_6", "passed": len(LOCATOR_TARGETS) == 6, "detail": f"locator_targets = {len(LOCATOR_TARGETS)}"},
              {"gate": "target_status_rows_equal_6", "passed": len(target_status_rows) == 6, "detail": f"target_status_rows = {len(target_status_rows)}"},
              {"gate": "broad_candidate_rows_written", "passed": isinstance(broad_candidate_rows, list), "detail": f"broad_candidate_rows = {len(broad_candidate_rows)}"},
              {"gate": "strict_summary_rows_equal_9", "passed": len(strict_summary_rows) == 9, "detail": f"strict_summary_rows = {len(strict_summary_rows)}"},
              {"gate": "top_review_rows_at_most_40", "passed": len(top_review_rows) <= 40, "detail": f"top_review_rows = {len(top_review_rows)}"},
              {"gate": "frozen_prediction_rows_equal_4", "passed": len(FROZEN_PREDICTIONS) == 4, "detail": f"frozen_prediction_rows = {len(FROZEN_PREDICTIONS)}"},
              {"gate": "stronger_reference_manifest_rows_equal_6", "passed": len(stronger_lcdm_reference_manifest_rows) == 6, "detail": f"stronger_reference_manifest_rows = {len(stronger_lcdm_reference_manifest_rows)}"},
              {"gate": "holdout_manifest_template_rows_equal_4", "passed": len(holdout_manifest_template_rows) == 4, "detail": f"holdout_manifest_template_rows = {len(holdout_manifest_template_rows)}"},
              {"gate": "decision_rows_equal_3", "passed": len(decision_rows) == 3, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "permission_rows_equal_6", "passed": len(permission_rows) == 6, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "automatic_holdout_approval_blocked", "passed": any(row["permission_scope"] == "automatic_holdout_approval" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "automatic holdout approval blocked"},
              {"gate": "same_release_mirror_blocked", "passed": any(row["permission_scope"] == "same_release_mirror_as_holdout" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "same release mirror holdout blocked"},
              {"gate": "stronger_lcdm_reference_manifest_allowed", "passed": any(row["permission_scope"] == "stronger_lcdm_reference_manifest" and row["permission_status"] == "allowed_as_next_scaffold" for row in permission_rows), "detail": "stronger LCDM reference manifest allowed as scaffold"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_auto_holdout_approval", "passed": True, "detail": "no automatic holdout approval"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_236_stronger_lcdm_reference_manifest_scaffold_or_broader_holdout_locator", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_235_locator_review_reference_manifest_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_235_target_status_rows.csv", target_status_rows)
          write_csv(OUT / "v4_235_strict_candidate_review_rows.csv", broad_candidate_rows)
          write_csv(OUT / "v4_235_strict_summary_rows.csv", strict_summary_rows)
          write_csv(OUT / "v4_235_top_candidate_review_rows.csv", top_review_rows)
          write_csv(OUT / "v4_235_frozen_prediction_rows.csv", FROZEN_PREDICTIONS)
          write_csv(OUT / "v4_235_stronger_lcdm_reference_manifest_rows.csv", stronger_lcdm_reference_manifest_rows)
          write_csv(OUT / "v4_235_holdout_manifest_template_rows.csv", holdout_manifest_template_rows)
          write_csv(OUT / "v4_235_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_235_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_235_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_235_rule_checks.csv", checks)

          summary_lines = [
              f"{row['strict_review_status']}: rows={row['candidate_rows']}, top={row['top_candidate_url']}"
              for row in strict_summary_rows
          ]

          decision_lines = [
              f"{row['decision_id']}: {row['decision']} Next: {row['next_action']}"
              for row in decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "locator_targets": len(LOCATOR_TARGETS),
              "target_status_rows": len(target_status_rows),
              "strict_candidate_review_rows": len(broad_candidate_rows),
              "strict_summary_rows": len(strict_summary_rows),
              "top_review_rows": len(top_review_rows),
              "frozen_prediction_rows": len(FROZEN_PREDICTIONS),
              "stronger_reference_manifest_rows": len(stronger_lcdm_reference_manifest_rows),
              "holdout_manifest_template_rows": len(holdout_manifest_template_rows),
              "decision_rows": len(decision_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "approves_holdout_candidate": False,
                  "same_release_mirror_allowed_as_holdout": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_235_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.235 Locator Review Reference Manifest",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"locator_targets = {summary['locator_targets']}",
              f"target_status_rows = {summary['target_status_rows']}",
              f"strict_candidate_review_rows = {summary['strict_candidate_review_rows']}",
              f"strict_summary_rows = {summary['strict_summary_rows']}",
              f"top_review_rows = {summary['top_review_rows']}",
              f"frozen_prediction_rows = {summary['frozen_prediction_rows']}",
              f"stronger_reference_manifest_rows = {summary['stronger_reference_manifest_rows']}",
              f"holdout_manifest_template_rows = {summary['holdout_manifest_template_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Strict candidate summary:",
              *summary_lines,
              "",
              "Decisions:",
              *decision_lines,
              "",
              "Clean meaning: v4.235 reviews locator candidates more strictly. Same-release or mirror candidates are blocked from holdout evidence. No candidate is automatically approved. The safer closure route is stronger LCDM reference manifest or broader holdout locating.",
              "",
              "Truth boundary: no proof, no validation, no approved holdout candidate, no same-release mirror as holdout, no combined matrix.",
          ]
          (OUT / "v4_235_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"locator_targets = {summary['locator_targets']}")
          print(f"target_status_rows = {summary['target_status_rows']}")
          print(f"strict_candidate_review_rows = {summary['strict_candidate_review_rows']}")
          print(f"strict_summary_rows = {summary['strict_summary_rows']}")
          print(f"top_review_rows = {summary['top_review_rows']}")
          print(f"frozen_prediction_rows = {summary['frozen_prediction_rows']}")
          print(f"stronger_reference_manifest_rows = {summary['stronger_reference_manifest_rows']}")
          print(f"holdout_manifest_template_rows = {summary['holdout_manifest_template_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no approved holdout candidate, no same-release mirror as holdout, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.235 locator review reference manifest output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-235-locator-review-reference-manifest-output
          path: |
            tairid_v4_235_locator_review_reference_manifest_output/
            tairid-v4-235-locator-review-reference-manifest-output.zip
