name: 000 TAIRID v4.82.4 Sidecar Format Profiler

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-82-4-sidecar-format-profiler.yml"

jobs:
  tairid-v4-82-4-sidecar-format-profiler:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.82.4 sidecar format profiler
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_82_4_sidecar_format_profiler

          python - <<'PY'
          import csv
          import hashlib
          import json
          import re
          import struct
          import urllib.request
          import zlib
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_82_4_sidecar_format_profiler")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_82_4_sidecar_format_profiler"

          FULL_GRID_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_fullGrid_R3.01.zip"

          FULLGRID_CONTENT_LENGTH_EXPECTED = 11805855817
          ZIP64_CENTRAL_DIRECTORY_OFFSET = 11803187830
          ZIP64_CENTRAL_DIRECTORY_SIZE = 2667889

          MAX_RANGE_READ_BYTES = 5_000_000
          MAX_MINIMUM_COMPRESSED_BYTES = 400_000
          MAX_MINIMUM_FILES_TO_PROFILE = 6
          MAX_SAMPLE_LINES_PER_FILE = 80

          SELECTED_PREFIXES = [
              "base/plikHM_TTTEEE_lowl_lowE/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing/",
              "base/plikHM_TT_lowl_lowE/",
              "base/plikHM_TT_lowl_lowE_lensing/",
              "base/plikHM_TTTEEE_lowl_lowE_BAO/",
              "base/plikHM_TTTEEE_lowl_lowE_lensing_BAO/"
          ]

          TARGET_REDSHIFTS = [
              {"z_key": "015", "z": 0.15, "fsigma8_name": "fsigma8z015", "sigma8z_name": "sigma8z015"},
              {"z_key": "038", "z": 0.38, "fsigma8_name": "fsigma8z038", "sigma8z_name": "sigma8z038"},
              {"z_key": "051", "z": 0.51, "fsigma8_name": "fsigma8z051", "sigma8z_name": "sigma8z051"},
              {"z_key": "061", "z": 0.61, "fsigma8_name": "fsigma8z061", "sigma8z_name": "sigma8z061"},
              {"z_key": "233", "z": 2.33, "fsigma8_name": "fsigma8z233", "sigma8z_name": "sigma8z233"}
          ]

          SIDE_CAR_TARGET_NAMES = []
          for row in TARGET_REDSHIFTS:
              SIDE_CAR_TARGET_NAMES.append(row["sigma8z_name"])
              SIDE_CAR_TARGET_NAMES.append(row["fsigma8_name"])

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse full chain sample files.",
              "This does not compute Planck reference uncertainty.",
              "This does not install or run CAMB, CLASS, or any Boltzmann solver.",
              "This does not derive H0, Omega_m, sigma8, sigma8z, or fsigma8z.",
              "This profiles the .minimum sidecar row format so the next extractor can be written correctly.",
              "A pass means the sidecar format is profiled, not that exact fixture values are accepted for CAMB."
          ]

          UPSTREAM_LOCKS = {
              "v4_82_3_parser_escape_repair": {
                  "status": "failed",
                  "observed_rule_pass_count": "10/17",
                  "known_issue": "exact-token extraction still failed or sidecar row format assumption remained wrong",
                  "fixture_run_allowed_now": False,
                  "Planck_reference_uncertainty_computed": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_82_1_single_fixture_value_extraction_repair": {
                  "status": "passed_but_not_final",
                  "known_issue": "rejected label artifact 8.0 but still had sidecar target ambiguity",
                  "fixture_run_allowed_now": False,
                  "solver_cosmology_run": False,
                  "Planck_reference_uncertainty_computed": False
              }
          }

          BLOCKED_CLAIMS = [
              "The exact sidecar extractor is repaired.",
              "The sidecar values are accepted for CAMB.",
              "A CAMB fixture was run.",
              "CAMB was used to compute fsigma8.",
              "CAMB produced cosmology outputs.",
              "H0 was derived.",
              "Omega_m was derived.",
              "sigma8 was derived.",
              "fsigma8 was derived.",
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "Sidecar minimum files were treated as posterior covariance.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_82_5_sidecar_exact_extractor_from_profile",
                  "purpose": "Use the sidecar format profile to write the exact extractor correctly.",
                  "why_next": "We need the observed row layout before running CAMB."
              },
              {
                  "priority": 2,
                  "route_id": "v4_83_CAMB_tiny_single_fixture_run",
                  "purpose": "Run one tiny CAMB fixture only after exact sidecar extraction is repaired.",
                  "why_next": "CAMB should not run on ambiguous sidecar targets."
              },
              {
                  "priority": 3,
                  "route_id": "v4_83_ELG_grid_member_probe",
                  "purpose": "Parallel route: continue parked ELG backlog.",
                  "why_next": "Full eBOSS remains incomplete without ELG handling."
              },
              {
                  "priority": 4,
                  "route_id": "v4_83_WiggleZ_product_locator_followup",
                  "purpose": "Parallel route: continue parked WiggleZ backlog.",
                  "why_next": "WiggleZ remains unresolved."
              }
          ]

          FLOAT_RE = re.compile(r"[-+]?(?:\d+\.\d*|\.\d+|\d+)(?:[eE][-+]?\d+)?")

          def head_probe(label, url):
              record = {
                  "label": label,
                  "url": url,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "accept_ranges": None,
                  "error": None
              }
              try:
                  req = urllib.request.Request(
                      url,
                      method="HEAD",
                      headers={"User-Agent": "TAIRID-v4.82.4-sidecar-format-profiler/1.0", "Accept": "*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["accept_ranges"] = response.headers.get("Accept-Ranges")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record

          def range_probe(label, url, range_header, max_read_bytes):
              record = {
                  "label": label,
                  "url": url,
                  "range_header": range_header,
                  "ok": False,
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "content_range": None,
                  "bytes_read": 0,
                  "truncated_by_guard": False,
                  "server_honored_range": False,
                  "sha256_16": None,
                  "error": None
              }
              data = b""
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "TAIRID-v4.82.4-sidecar-format-profiler/1.0",
                          "Accept": "*/*",
                          "Range": range_header
                      }
                  )
                  with urllib.request.urlopen(req, timeout=180) as response:
                      record["ok"] = True
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      record["content_range"] = response.headers.get("Content-Range")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None
                      record["server_honored_range"] = record["status"] == 206 or bool(record["content_range"])

                      data = response.read(max_read_bytes + 1)
                      if len(data) > max_read_bytes:
                          record["truncated_by_guard"] = True
                          data = data[:max_read_bytes]

                      record["bytes_read"] = len(data)
                      record["sha256_16"] = hashlib.sha256(data).hexdigest()[:16] if data else None

              except Exception as exc:
                  record["error"] = f"{type(exc).__name__}: {exc}"
              return record, data

          def classify_member(name):
              lower = name.lower()
              if name.endswith("/"):
                  return "directory"
              if lower.endswith(".minimum"):
                  return "minimum"
              if lower.endswith(".paramnames"):
                  return "paramnames"
              if re.search(r"_\d+\.txt$", name):
                  return "chain_sample_text_member_prefix_only"
              return "other"

          def parse_zip64_extra(extra_bytes, need_uncompressed, need_compressed, need_local_offset):
              result = {}
              pos = 0
              while pos + 4 <= len(extra_bytes):
                  header_id, data_size = struct.unpack_from("<HH", extra_bytes, pos)
                  data_start = pos + 4
                  data_end = data_start + data_size
                  if data_end > len(extra_bytes):
                      break

                  data = extra_bytes[data_start:data_end]
                  if header_id == 0x0001:
                      subpos = 0
                      if need_uncompressed and subpos + 8 <= len(data):
                          result["uncompressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_compressed and subpos + 8 <= len(data):
                          result["compressed_size"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                      if need_local_offset and subpos + 8 <= len(data):
                          result["local_header_offset"] = struct.unpack_from("<Q", data, subpos)[0]
                          subpos += 8
                  pos = data_end
              return result

          def parse_central_directory(cd_bytes):
              records = []
              pos = 0

              while pos + 46 <= len(cd_bytes):
                  if cd_bytes[pos:pos + 4] != b"PK\x01\x02":
                      break

                  try:
                      fields = struct.unpack_from("<4s6H3L5H2L", cd_bytes, pos)
                      compression_method = fields[4]
                      compressed_size = fields[8]
                      uncompressed_size = fields[9]
                      file_name_len = fields[10]
                      extra_len = fields[11]
                      comment_len = fields[12]
                      local_header_offset = fields[16]

                      name_start = pos + 46
                      name_end = name_start + file_name_len
                      extra_start = name_end
                      extra_end = extra_start + extra_len
                      comment_end = extra_end + comment_len

                      if comment_end > len(cd_bytes):
                          break

                      name = cd_bytes[name_start:name_end].decode("utf-8", errors="replace")
                      extra = cd_bytes[extra_start:extra_end]

                      zip64_extra = parse_zip64_extra(
                          extra,
                          need_uncompressed=uncompressed_size == 0xFFFFFFFF,
                          need_compressed=compressed_size == 0xFFFFFFFF,
                          need_local_offset=local_header_offset == 0xFFFFFFFF
                      )

                      records.append({
                          "member_name": name,
                          "member_type": classify_member(name),
                          "compression_method": compression_method,
                          "compressed_size": zip64_extra.get("compressed_size", compressed_size),
                          "uncompressed_size": zip64_extra.get("uncompressed_size", uncompressed_size),
                          "local_header_offset": zip64_extra.get("local_header_offset", local_header_offset),
                          "zip64_extra_used": bool(zip64_extra)
                      })

                      pos = comment_end

                  except Exception:
                      break

              return records

          def fetch_member_bytes(member_record, max_member_compressed_bytes):
              offset = int(member_record["local_header_offset"])
              compressed_size = int(member_record["compressed_size"])

              if compressed_size <= 0:
                  raise RuntimeError("compressed_size_not_positive")

              header_record, header_data = range_probe(
                  "local_header_probe",
                  FULL_GRID_URL,
                  f"bytes={offset}-{offset + 4095}",
                  4096
              )

              if not header_record["ok"] or not header_record["server_honored_range"]:
                  raise RuntimeError("local_header_range_not_available")

              if len(header_data) < 30:
                  raise RuntimeError("local_header_too_short")

              if header_data[:4] != b"PK\x03\x04":
                  raise RuntimeError("local_header_signature_not_found")

              fields = struct.unpack_from("<4s5H3L2H", header_data, 0)
              compression_method = fields[3]
              file_name_len = fields[9]
              extra_len = fields[10]
              data_start = offset + 30 + file_name_len + extra_len

              bytes_to_fetch = min(compressed_size, max_member_compressed_bytes)
              data_end = data_start + bytes_to_fetch - 1

              data_record, compressed_data = range_probe(
                  "member_payload_probe",
                  FULL_GRID_URL,
                  f"bytes={data_start}-{data_end}",
                  bytes_to_fetch + 1024
              )

              if not data_record["ok"] or not data_record["server_honored_range"]:
                  raise RuntimeError("member_payload_range_not_available")

              if data_record["truncated_by_guard"]:
                  raise RuntimeError("member_payload_truncated_by_guard")

              if compression_method == 0:
                  payload = compressed_data
              elif compression_method == 8:
                  decompressor = zlib.decompressobj(-15)
                  payload = decompressor.decompress(compressed_data)
              else:
                  raise RuntimeError(f"unsupported_compression_method_{compression_method}")

              return payload, compression_method, data_record

          def line_has_exact_token(line, token):
              return re.search(r"(?<![A-Za-z0-9_])" + re.escape(token) + r"(?![A-Za-z0-9_])", line) is not None

          def profile_line(member_name, line_number, line, target_name=""):
              stripped = line.strip()
              tokens = stripped.split()
              float_tokens = FLOAT_RE.findall(stripped)

              exact_tokens = []
              substring_tokens = []
              for target in SIDE_CAR_TARGET_NAMES:
                  if line_has_exact_token(stripped, target):
                      exact_tokens.append(target)
                  elif target in stripped:
                      substring_tokens.append(target)

              return {
                  "member_name": member_name,
                  "line_number": line_number,
                  "target_name": target_name,
                  "has_target_substring": bool(target_name and target_name in stripped),
                  "has_target_exact_token": bool(target_name and line_has_exact_token(stripped, target_name)),
                  "exact_targets_on_line": ",".join(exact_tokens),
                  "substring_only_targets_on_line": ",".join(substring_tokens),
                  "token_count": len(tokens),
                  "float_count": len(float_tokens),
                  "first_token": tokens[0] if tokens else "",
                  "second_token": tokens[1] if len(tokens) > 1 else "",
                  "third_token": tokens[2] if len(tokens) > 2 else "",
                  "last_token": tokens[-1] if tokens else "",
                  "first_float": float_tokens[0] if float_tokens else "",
                  "second_float": float_tokens[1] if len(float_tokens) > 1 else "",
                  "line_text": stripped[:500]
              }

          failed_gates = []
          warnings = [
              "sidecar_format_profile_only",
              "no_sidecar_values_accepted_for_CAMB",
              "no_CAMB_run",
              "no_solver_cosmology_run",
              "no_full_chain_import",
              "no_reference_uncertainty_computed",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          head_record = head_probe("full_grid_head", FULL_GRID_URL)

          if not head_record["ok"]:
              failed_gates.append("full_grid_head_probe_failed")

          if head_record.get("content_length") and head_record["content_length"] != FULLGRID_CONTENT_LENGTH_EXPECTED:
              warnings.append("fullgrid_content_length_differs_from_locked_value")

          cd_start = ZIP64_CENTRAL_DIRECTORY_OFFSET
          cd_end = ZIP64_CENTRAL_DIRECTORY_OFFSET + ZIP64_CENTRAL_DIRECTORY_SIZE - 1

          cd_record, cd_data = range_probe(
              "full_grid_locked_zip64_central_directory_fetch",
              FULL_GRID_URL,
              f"bytes={cd_start}-{cd_end}",
              MAX_RANGE_READ_BYTES
          )

          if not cd_record["ok"]:
              failed_gates.append("central_directory_fetch_failed")
          if not cd_record.get("server_honored_range"):
              failed_gates.append("central_directory_range_not_honored")
          if cd_record.get("truncated_by_guard"):
              failed_gates.append("central_directory_truncated_by_guard")

          manifest_records = parse_central_directory(cd_data) if cd_data else []

          if not manifest_records:
              failed_gates.append("central_directory_manifest_records_not_parsed")

          minimum_members = [
              row for row in manifest_records
              if row["member_type"] == "minimum"
              and any(row["member_name"].startswith(prefix) for prefix in SELECTED_PREFIXES)
          ]

          minimum_members = sorted(minimum_members, key=lambda row: row["member_name"])[:MAX_MINIMUM_FILES_TO_PROFILE]

          if not minimum_members:
              failed_gates.append("no_selected_minimum_members_found")

          sidecar_file_records = []
          sidecar_format_records = []
          sidecar_target_line_records = []
          sidecar_sample_line_records = []
          profile_errors = []

          for member in minimum_members:
              member_name = member["member_name"]
              try:
                  payload, compression_method, payload_record = fetch_member_bytes(
                      member,
                      MAX_MINIMUM_COMPRESSED_BYTES
                  )
                  text = payload.decode("utf-8", errors="replace")
                  lines = text.splitlines()

                  nonempty_lines = [line for line in lines if line.strip()]
                  sidecar_file_records.append({
                      "member_name": member_name,
                      "compressed_size": member["compressed_size"],
                      "uncompressed_size": member["uncompressed_size"],
                      "compression_method": compression_method,
                      "line_count": len(lines),
                      "nonempty_line_count": len(nonempty_lines),
                      "payload_sha256_16": hashlib.sha256(payload).hexdigest()[:16],
                      "fetched_ok": True,
                      "error": ""
                  })

                  for idx, line in enumerate(lines[:MAX_SAMPLE_LINES_PER_FILE], start=1):
                      if not line.strip():
                          continue
                      sidecar_sample_line_records.append(profile_line(member_name, idx, line))

                  for idx, line in enumerate(lines, start=1):
                      if not line.strip():
                          continue

                      profiled = profile_line(member_name, idx, line)
                      if profiled["exact_targets_on_line"] or profiled["substring_only_targets_on_line"]:
                          sidecar_format_records.append(profiled)

                      for target in SIDE_CAR_TARGET_NAMES:
                          if target in line:
                              sidecar_target_line_records.append(profile_line(member_name, idx, line, target))

              except Exception as exc:
                  profile_errors.append({
                      "member_name": member_name,
                      "error": f"{type(exc).__name__}: {exc}"
                  })

                  sidecar_file_records.append({
                      "member_name": member_name,
                      "compressed_size": member.get("compressed_size", ""),
                      "uncompressed_size": member.get("uncompressed_size", ""),
                      "compression_method": "",
                      "line_count": "",
                      "nonempty_line_count": "",
                      "payload_sha256_16": "",
                      "fetched_ok": False,
                      "error": f"{type(exc).__name__}: {exc}"
                  })

          fetched_minimum_count = sum(1 for row in sidecar_file_records if row["fetched_ok"])
          exact_target_line_count = sum(1 for row in sidecar_target_line_records if row["has_target_exact_token"])
          substring_target_line_count = sum(1 for row in sidecar_target_line_records if row["has_target_substring"])
          substring_only_target_line_count = sum(
              1 for row in sidecar_target_line_records
              if row["has_target_substring"] and not row["has_target_exact_token"]
          )

          token_shape_counts = {}
          for row in sidecar_format_records:
              shape = f"tokens={row['token_count']};floats={row['float_count']};first={row['first_token']};third={row['third_token']}"
              token_shape_counts[shape] = token_shape_counts.get(shape, 0) + 1

          sidecar_shape_summary_records = [
              {"shape": shape, "count": count}
              for shape, count in sorted(token_shape_counts.items(), key=lambda item: (-item[1], item[0]))
          ]

          if fetched_minimum_count == 0:
              failed_gates.append("no_minimum_files_fetched")

          if len(sidecar_target_line_records) == 0:
              failed_gates.append("no_target_lines_found_in_minimum_files")

          if len(sidecar_format_records) == 0:
              failed_gates.append("no_sidecar_format_records_written")

          if any(row["fetched_ok"] is False for row in sidecar_file_records) and fetched_minimum_count == 0:
              failed_gates.append("all_minimum_profile_fetches_failed")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "exact sidecar extractor is repaired",
              "sidecar values are accepted for camb",
              "a camb fixture was run",
              "planck reference uncertainty is computed",
              "sidecar minimum files were treated as posterior covariance",
              "final rsd pressure score",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "sidecar_format_profiler_passed_ready_for_exact_extractor_design"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "central_directory_available",
                  "pass": bool(manifest_records),
                  "result": f"{len(manifest_records)} manifest records parsed",
                  "boundary": "Central directory only, not fullGrid download."
              },
              {
                  "rule_id": "minimum_members_selected",
                  "pass": len(minimum_members) > 0,
                  "result": f"{len(minimum_members)} selected .minimum members",
                  "boundary": "Profiler only."
              },
              {
                  "rule_id": "minimum_files_fetched",
                  "pass": fetched_minimum_count > 0,
                  "result": f"{fetched_minimum_count} .minimum files fetched",
                  "boundary": "Bounded member range reads only."
              },
              {
                  "rule_id": "target_lines_profiled",
                  "pass": len(sidecar_target_line_records) > 0,
                  "result": f"{len(sidecar_target_line_records)} target-containing sidecar lines profiled",
                  "boundary": "Target lines are not accepted values."
              },
              {
                  "rule_id": "format_records_written",
                  "pass": len(sidecar_format_records) > 0,
                  "result": f"{len(sidecar_format_records)} format records written",
                  "boundary": "Format profile only."
              },
              {
                  "rule_id": "shape_summary_written",
                  "pass": len(sidecar_shape_summary_records) > 0,
                  "result": f"{len(sidecar_shape_summary_records)} token-shape summaries written",
                  "boundary": "Used to design next extractor."
              },
              {
                  "rule_id": "exact_and_substring_counts_recorded",
                  "pass": True,
                  "result": f"exact={exact_target_line_count}; substring={substring_target_line_count}; substring_only={substring_only_target_line_count}",
                  "boundary": "Counts only."
              },
              {
                  "rule_id": "sidecar_values_not_accepted_for_CAMB",
                  "pass": True,
                  "result": "no sidecar values accepted for CAMB in this profiler",
                  "boundary": "No CAMB fixture run."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 19,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not compute covariance."
              },
              {
