                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "Sidecar format profiler only."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_82_4_rules_passed")

          if failed_gates:
              readiness_label = "sidecar_format_profiler_failed"
              next_allowed_step = "Repair sidecar format profiler before writing the next exact extractor."
          else:
