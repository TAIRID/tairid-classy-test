name: TAIRID Cosmology v3.41 H0LiCOW Reach-Lane Eligibility Review

on:
  workflow_dispatch:

jobs:
  h0licow-reach-lane-eligibility-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scientific Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run TAIRID v3.41 H0LiCOW reach-lane eligibility review
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_41

          python - <<'PY'
          import csv
          import json
          import math
          import re
          import shutil
          import urllib.request
          import zipfile
          from datetime import datetime, timezone
          from pathlib import Path

          import numpy as np

          OUTDIR = Path("artifacts/tairid_cosmology_v3_41")
          DOWNLOADS = OUTDIR / "downloads"
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOADS.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_41_h0licow_reach_lane_eligibility_review"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This reviews v3.40.1 H0LiCOW guarded Ddt pressure diagnostics for reach-lane eligibility only.",
              "H0LiCOW Ddt rows remain diagnostic-only.",
              "Negative Ddt pressure is interpreted only as shorter-than-Planck-reference time-delay distance, not as proof.",
              "Weighted WFI2033 remains blocked for likelihood/weight handling review.",
              "Dd deflector-distance rows remain secondary and are not primary-scored.",
              "No H0LiCOW row may be promoted to model-anchor status.",
              "A pass means H0LiCOW may be carried as a non-BAO reach-lane candidate into a later contrast audit."
          ]

          PREVIOUS_MILESTONE = {
              "v3_40_1_status": "h0licow_guarded_pressure_weighted_block_fix_passed_ready_for_v3_41_reach_lane_eligibility_review",
              "v3_40_1_failed_gates": [],
              "v3_40_1_pressure_row_count": 3,
              "v3_40_1_blocked_row_count": 3,
              "v3_40_1_ddt_pressure_count": 3,
              "v3_40_1_weighted_blocked_count": 1,
              "v3_40_1_dd_secondary_blocked_count": 2,
              "v3_40_1_mean_pressure_z": -1.6268644558220158,
              "v3_40_1_median_pressure_z": -0.9014283075552302,
              "v3_40_1_positive_count": 0,
              "v3_40_1_negative_count": 3,
              "v3_40_1_dominant_sign": "negative",
              "v3_40_1_next_rule": "Review whether the guarded H0LiCOW Ddt pressure pattern is coherent enough to become a reach-lane candidate, with no refit and no model-anchor promotion."
          }

          PLANCK_ZIP_URL = "https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
          PLANCK_MARGESTATS_PATH = "base/plikHM_TTTEEE_lowl_lowE/dist/base_plikHM_TTTEEE_lowl_lowE.margestats"

          C_LIGHT = 299792.458

          H0LICOW_DISTANCE_PRODUCTS = [
              {
                  "product_id": "HE0435_Ddt_AO_HST",
                  "lens_or_system": "HE0435",
                  "preferred_lens_objects": ["HE0435_AO_HST", "HE0435_HST"],
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/HE0435_Ddt_AO%2BHST.dat",
                  "source_path": "h0licow_distance_chains/HE0435_Ddt_AO+HST.dat",
                  "weighted_product": False,
                  "column_plan": [
                      {"parameter": "Ddt_time_delay_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": ""}
                  ]
              },
              {
                  "product_id": "RXJ1131_AO_HST_Dd_Ddt",
                  "lens_or_system": "RXJ1131",
                  "preferred_lens_objects": ["RXJ1131_AO_HST", "RXJ1131_HST"],
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/RXJ1131_AO%2BHST_Dd_Ddt.dat",
                  "source_path": "h0licow_distance_chains/RXJ1131_AO+HST_Dd_Ddt.dat",
                  "weighted_product": False,
                  "column_plan": [
                      {"parameter": "Dd_deflector_angular_diameter_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": ""},
                      {"parameter": "Ddt_time_delay_distance", "column_index": 1, "unit": "Mpc", "weight_column_index": ""}
                  ]
              },
              {
                  "product_id": "J1206_final",
                  "lens_or_system": "J1206",
                  "preferred_lens_objects": ["J1206"],
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/J1206_final.csv",
                  "source_path": "h0licow_distance_chains/J1206_final.csv",
                  "weighted_product": False,
                  "column_plan": [
                      {"parameter": "Ddt_time_delay_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": ""},
                      {"parameter": "Dd_deflector_angular_diameter_distance", "column_index": 1, "unit": "Mpc", "weight_column_index": ""}
                  ]
              },
              {
                  "product_id": "WFI2033_dt_bic",
                  "lens_or_system": "WFI2033",
                  "preferred_lens_objects": ["WFI2033"],
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/wfi2033_dt_bic.dat",
                  "source_path": "h0licow_distance_chains/wfi2033_dt_bic.dat",
                  "weighted_product": True,
                  "column_plan": [
                      {"parameter": "Ddt_time_delay_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": 1}
                  ]
              }
          ]

          SUPPORT_PRODUCTS = [
              {
                  "product_id": "H0_inference_notebook",
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/H0_inference_code/H0_inference.ipynb"
              },
              {
                  "product_id": "H0_lensutils",
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/H0_inference_code/lensutils.py"
              }
          ]

          REQUIRED_CONTRACT_FIELDS = [
              "source",
              "observable_role",
              "pressure_surface",
              "baseline",
              "parser_status",
              "provenance_status",
              "block_condition",
              "claim_boundary"
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def safe_name(text):
              name = str(text).split("?")[0].rstrip("/").split("/")[-1]
              name = re.sub(r"[^A-Za-z0-9._-]+", "_", name)
              return name or "downloaded_product"

          def download(url, path, timeout=300):
              path.parent.mkdir(parents=True, exist_ok=True)
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.41-h0licow-reach-lane-eligibility-review/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed: HTTP {status}")

                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)

                  return {
                      "url": url,
                      "path": str(path),
                      "status": status,
                      "size_bytes": path.stat().st_size,
                      "content_type": resp.headers.get("Content-Type"),
                      "content_length_header": resp.headers.get("Content-Length")
                  }

          def parse_float(value):
              try:
                  x = float(str(value).strip())
              except Exception:
                  return None
              if not math.isfinite(x):
                  return None
              return x

          def parse_numeric_rows(path):
              text = path.read_text(encoding="utf-8", errors="replace")
              rows = []

              for row_index, line in enumerate(text.splitlines()):
                  original = line.rstrip("\n")
                  stripped = original.strip()

                  if not stripped or stripped.startswith("#"):
                      continue

                  parts = [p.strip() for p in stripped.split(",")] if "," in stripped else re.split(r"\s+", stripped)
                  values = [parse_float(p) for p in parts]
                  numeric_count = sum(v is not None for v in values)

                  if numeric_count == len(parts) and numeric_count > 0:
                      rows.append({
                          "row_index": row_index,
                          "raw_line": original,
                          "values": values
                      })

              return rows

          def summarize_values(values, weights=None):
              arr = np.asarray(values, dtype=float)
              arr = arr[np.isfinite(arr)]

              if len(arr) == 0:
                  return {
                      "sample_count": 0,
                      "finite_count": 0,
                      "weighted": False,
                      "effective_sample_count": "",
                      "q16": "",
                      "q50": "",
                      "q84": "",
                      "sigma_from_16_84": ""
                  }

              if weights is not None:
                  raw_values = np.asarray(values, dtype=float)
                  w = np.asarray(weights, dtype=float)
                  mask = np.isfinite(raw_values) & np.isfinite(w) & (w >= 0)
                  raw_values = raw_values[mask]
                  w = w[mask]

                  if len(raw_values) > 0 and np.sum(w) > 0:
                      order = np.argsort(raw_values)
                      raw_values = raw_values[order]
                      w = w[order]
                      cw = np.cumsum(w) / np.sum(w)

                      q16 = float(np.interp(0.16, cw, raw_values))
                      q50 = float(np.interp(0.50, cw, raw_values))
                      q84 = float(np.interp(0.84, cw, raw_values))
                      eff_n = float((np.sum(w) ** 2) / np.sum(w ** 2)) if np.sum(w ** 2) > 0 else ""

                      return {
                          "sample_count": int(len(values)),
                          "finite_count": int(len(raw_values)),
                          "weighted": True,
                          "effective_sample_count": eff_n,
                          "q16": q16,
                          "q50": q50,
                          "q84": q84,
                          "sigma_from_16_84": float((q84 - q16) / 2.0)
                      }

              q16 = float(np.quantile(arr, 0.16))
              q50 = float(np.quantile(arr, 0.50))
              q84 = float(np.quantile(arr, 0.84))

              return {
                  "sample_count": int(len(values)),
                  "finite_count": int(len(arr)),
                  "weighted": False,
                  "effective_sample_count": "",
                  "q16": q16,
                  "q50": q50,
                  "q84": q84,
                  "sigma_from_16_84": float((q84 - q16) / 2.0)
              }

          def notebook_to_text(path):
              raw = json.loads(path.read_text(encoding="utf-8", errors="replace"))
              chunks = []
              for cell in raw.get("cells", []):
                  src = cell.get("source", "")
                  chunks.append("".join(src) if isinstance(src, list) else str(src))
              return "\n".join(chunks)

          def parse_lens_definitions_from_notebook(notebook_text):
              lens_map = {}
              pattern = re.compile(
                  r'(?P<var>[A-Za-z_]\w*)\s*=\s*lu\.(?:GLEELens|LenstronomyLens)\((?P<body>.*?)(?:\n\s*\)\s*\n)',
                  re.DOTALL
              )

              for match in pattern.finditer(notebook_text):
                  var = match.group("var")
                  body = match.group("body")

                  name_m = re.search(r'name\s*=\s*"([^"]+)"', body)
                  long_m = re.search(r'longname\s*=\s*"([^"]+)"', body)
                  zl_m = re.search(r'zlens\s*=\s*([0-9.]+)', body)
                  zs_m = re.search(r'zsource\s*=\s*([0-9.]+)', body)

                  if not (name_m and zl_m and zs_m):
                      continue

                  record = {
                      "object_var": var,
                      "name": name_m.group(1),
                      "longname": long_m.group(1) if long_m else "",
                      "zlens": float(zl_m.group(1)),
                      "zsource": float(zs_m.group(1)),
                      "mapping_source": "H0_inference_notebook"
                  }

                  lens_map[var] = record
                  lens_map[record["name"]] = record

              return lens_map

          def parse_planck_margestats(text):
              rows = []
              for line in text.splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("Marginalized") or stripped.startswith("parameter"):
                      continue

                  parts = stripped.split()
                  if len(parts) < 12:
                      continue

                  name = parts[0].rstrip("*")

                  try:
                      rows.append({
                          "parameter": name,
                          "mean": float(parts[1]),
                          "sddev": float(parts[2])
                      })
                  except Exception:
                      continue

              return rows

          def load_planck_reference():
              planck_dir = DOWNLOADS / "Planck_2018"
              zip_path = planck_dir / "COM_CosmoParams_base-plikHM-TTTEEE-lowl-lowE_R3.00.zip"
              dl = download(PLANCK_ZIP_URL, zip_path)

              with zipfile.ZipFile(zip_path, "r") as zf:
                  if PLANCK_MARGESTATS_PATH not in zf.namelist():
                      raise RuntimeError(f"Missing Planck margestats product: {PLANCK_MARGESTATS_PATH}")
                  text = zf.read(PLANCK_MARGESTATS_PATH).decode("utf-8", errors="replace")

              rows = parse_planck_margestats(text)
              marg = {r["parameter"]: r for r in rows}

              for required in ["H0", "omegam"]:
                  if required not in marg:
                      raise RuntimeError(f"Missing Planck reference parameter: {required}")

              return {
                  "H0": float(marg["H0"]["mean"]),
                  "H0_sigma": float(marg["H0"]["sddev"]),
                  "omegam": float(marg["omegam"]["mean"]),
                  "omegam_sigma": float(marg["omegam"]["sddev"]),
                  "baseline_family": "Planck_2018_flat_LCDM_reference"
              }

          def E_z(z, om):
              return math.sqrt(om * (1.0 + z) ** 3 + (1.0 - om))

          def integrate_simpson(func, a, b, n=1600):
              if b <= a:
                  return 0.0
              if n % 2 == 1:
                  n += 1

              h = (b - a) / n
              s = func(a) + func(b)

              for i in range(1, n):
                  x = a + i * h
                  s += (4 if i % 2 == 1 else 2) * func(x)

              return s * h / 3.0

          def comoving_distance(z, H0, om):
              integral = integrate_simpson(lambda x: 1.0 / E_z(x, om), 0.0, z)
              return (C_LIGHT / H0) * integral

          def angular_diameter_distance(z, H0, om):
              return comoving_distance(z, H0, om) / (1.0 + z)

          def angular_diameter_between(z1, z2, H0, om):
              if z2 <= z1:
                  return None
              dc1 = comoving_distance(z1, H0, om)
              dc2 = comoving_distance(z2, H0, om)
              return (dc2 - dc1) / (1.0 + z2)

          def ddt_baseline(z_lens, z_source, H0, om):
              d_l = angular_diameter_distance(z_lens, H0, om)
              d_s = angular_diameter_distance(z_source, H0, om)
              d_ls = angular_diameter_between(z_lens, z_source, H0, om)

              if d_ls is None or d_ls <= 0:
                  return None

              return (1.0 + z_lens) * d_l * d_s / d_ls

          def baseline_sigma_finite_difference(z_lens, z_source, planck):
              base = ddt_baseline(z_lens, z_source, planck["H0"], planck["omegam"])

              if base is None:
                  return None, None

              variance = 0.0

              for name, mean, sigma in [
                  ("H0", planck["H0"], planck["H0_sigma"]),
                  ("omegam", planck["omegam"], planck["omegam_sigma"])
              ]:
                  if sigma <= 0:
                      continue

                  plus = dict(planck)
                  minus = dict(planck)
                  plus[name] = mean + sigma
                  minus[name] = mean - sigma

                  if name == "omegam":
                      plus[name] = min(max(plus[name], 0.01), 0.99)
                      minus[name] = min(max(minus[name], 0.01), 0.99)

                  f_plus = ddt_baseline(z_lens, z_source, plus["H0"], plus["omegam"])
                  f_minus = ddt_baseline(z_lens, z_source, minus["H0"], minus["omegam"])

                  if f_plus is None or f_minus is None:
                      continue

                  variance += ((f_plus - f_minus) / 2.0) ** 2

              return math.sqrt(max(variance, 0.0)), base

          def parse_product_parameter_rows(product):
              local_path = DOWNLOADS / "H0LiCOW" / "distance_chains" / safe_name(product["source_path"])
              dl = download(product["url"], local_path)
              numeric_rows = parse_numeric_rows(local_path)

              parameter_rows = []

              for col in product["column_plan"]:
                  parameter = col["parameter"]
                  column_index = int(col["column_index"])
                  weight_col = col.get("weight_column_index", "")
                  weight_col = "" if weight_col == "" else int(weight_col)

                  values = []
                  weights = []

                  for r in numeric_rows:
                      vals = r["values"]

                      if column_index >= len(vals):
                          continue

                      x = vals[column_index]
                      if x is None or not math.isfinite(x):
                          continue

                      values.append(float(x))

                      if weight_col != "":
                          if weight_col < len(vals):
                              w = vals[weight_col]
                              weights.append(float(w) if w is not None and math.isfinite(w) and w >= 0 else 0.0)
                          else:
                              weights.append(0.0)

                  stats = summarize_values(values, weights if weight_col != "" else None)

                  parameter_rows.append({
                      "source": "H0LiCOW",
                      "product_id": product["product_id"],
                      "lens_or_system": product["lens_or_system"],
                      "source_path": product["source_path"],
                      "parameter": parameter,
                      "unit": col["unit"],
                      "weighted_product": product["weighted_product"],
                      "weighted": stats["weighted"],
                      "sample_count": stats["sample_count"],
                      "finite_count": stats["finite_count"],
                      "q16": stats["q16"],
                      "q50": stats["q50"],
                      "q84": stats["q84"],
                      "sigma_from_16_84": stats["sigma_from_16_84"],
                      "effective_sample_count": stats["effective_sample_count"],
                      "parser_status": "parsed_to_guarded_ledger" if stats["finite_count"] else "downloaded_but_no_finite_values",
                      "provenance_status": "direct_public_h0licow_github_distance_chain",
                      "download_status": dl["status"],
                      "download_size_bytes": dl["size_bytes"]
                  })

              return parameter_rows

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "previous_milestone": PREVIOUS_MILESTONE,
              "truth_boundary": TRUTH_BOUNDARY,
              "gate_result": {}
          }

          print("TAIRID Cosmology v3.41 H0LiCOW reach-lane eligibility review")
          print("Truth boundary: eligibility review only; no refit; no validation claim.")
          print()

          failed_gates = []
          source_errors = {}

          pressure_rows = []
          blocked_rows = []
          eligibility_rows = []
          lens_mapping_rows = []

          try:
              planck = load_planck_reference()
              inventory["planck_reference"] = {
                  "H0": planck["H0"],
                  "H0_sigma": planck["H0_sigma"],
                  "omegam": planck["omegam"],
                  "omegam_sigma": planck["omegam_sigma"],
                  "baseline_family": planck["baseline_family"]
              }
              print("Planck baseline reference loaded.")
          except Exception as e:
              planck = None
              source_errors["Planck_2018"] = f"{type(e).__name__}: {e}"
              failed_gates.append("planck_reference_load_failed")
              print(f"Planck failed: {source_errors['Planck_2018']}")

          try:
              notebook_path = DOWNLOADS / "H0LiCOW" / "support" / "H0_inference.ipynb"
              nb_dl = download(SUPPORT_PRODUCTS[0]["url"], notebook_path)
              notebook_text = notebook_to_text(notebook_path)
              lens_map = parse_lens_definitions_from_notebook(notebook_text)
              print(f"Lens definitions parsed: {len(lens_map)}")
          except Exception as e:
              lens_map = {}
              source_errors["H0LiCOW_support_context"] = f"{type(e).__name__}: {e}"
              failed_gates.append("h0licow_support_context_failed")
              print(f"H0LiCOW support context failed: {source_errors['H0LiCOW_support_context']}")

          for product in H0LICOW_DISTANCE_PRODUCTS:
              try:
                  mapped = None
                  mapped_object = ""

                  for candidate in product["preferred_lens_objects"]:
                      if candidate in lens_map:
                          mapped = lens_map[candidate]
                          mapped_object = candidate
                          break

                  mapping_status = "lens_mapping_resolved" if mapped else "lens_mapping_missing"

                  lens_mapping_rows.append({
                      "source": "H0LiCOW",
                      "product_id": product["product_id"],
                      "lens_or_system": product["lens_or_system"],
                      "mapped_lens_object": mapped_object,
                      "mapping_status": mapping_status,
                      "zlens": mapped["zlens"] if mapped else "",
                      "zsource": mapped["zsource"] if mapped else "",
                      "pressure_score_built": False,
                      "model_anchor_allowed_now": False,
                      "refit_allowed_now": False
                  })

                  parameter_rows = parse_product_parameter_rows(product)

                  for row in parameter_rows:
                      is_ddt = row["parameter"] == "Ddt_time_delay_distance"
                      is_dd = row["parameter"] == "Dd_deflector_angular_diameter_distance"
                      is_weighted = bool(row["weighted_product"]) or bool(row["weighted"])
                      finite_count = int(row["finite_count"] or 0)

                      common = {
                          "source": "H0LiCOW",
                          "product_id": product["product_id"],
                          "lens_or_system": product["lens_or_system"],
                          "mapped_lens_object": mapped_object,
                          "mapping_status": mapping_status,
                          "zlens": mapped["zlens"] if mapped else "",
                          "zsource": mapped["zsource"] if mapped else "",
                          "observable_role": "time_delay_reach" if is_ddt else "deflector_distance_secondary_reach",
                          "pressure_surface": "reach_geometry",
                          "parameter": row["parameter"],
                          "unit": row["unit"],
                          "sample_count": row["sample_count"],
                          "finite_count": row["finite_count"],
                          "q16": row["q16"],
                          "q50": row["q50"],
                          "q84": row["q84"],
                          "observed_value": row["q50"],
                          "observed_sigma": row["sigma_from_16_84"],
                          "weighted_product": is_weighted,
                          "parser_status": row["parser_status"],
                          "provenance_status": row["provenance_status"],
                          "baseline": "Planck_2018_flat_LCDM_reference",
                          "claim_boundary": "diagnostic_only_pressure_row_not_model_anchor",
                          "included_in_model": False,
                          "model_anchor_allowed_now": False,
                          "refit_allowed_now": False
                      }

                      if mapping_status != "lens_mapping_resolved":
                          blocked_rows.append({
                              **common,
                              "block_condition": "blocked_lens_mapping_missing",
                              "blocked_reason": "Lens redshift mapping is missing.",
                              "pressure_score_built": False
                          })
                          continue

                      if is_weighted:
                          blocked_rows.append({
                              **common,
                              "block_condition": "blocked_weighted_likelihood_review_required",
                              "blocked_reason": "Weighted WFI2033 row remains blocked until likelihood/weight handling review.",
                              "pressure_score_built": False
                          })
                          continue

                      if is_dd:
                          blocked_rows.append({
                              **common,
                              "block_condition": "blocked_secondary_dd_row_not_primary_scoring_lane",
                              "blocked_reason": "Dd remains secondary; v3.41 reviews Ddt reach eligibility only.",
                              "pressure_score_built": False
                          })
                          continue

                      if not is_ddt or finite_count < 1000 or planck is None:
                          blocked_rows.append({
                              **common,
                              "block_condition": "blocked_not_eligible_for_v3_41",
                              "blocked_reason": "Only mapped, unweighted Ddt rows with usable samples and Planck reference are eligible.",
                              "pressure_score_built": False
                          })
                          continue

                      sigma_baseline, baseline_value = baseline_sigma_finite_difference(
                          float(mapped["zlens"]),
                          float(mapped["zsource"]),
                          planck
                      )

                      observed_value = float(row["q50"])
                      observed_sigma = float(row["sigma_from_16_84"])
                      combined_sigma = math.sqrt(observed_sigma ** 2 + sigma_baseline ** 2)
                      residual = observed_value - baseline_value
                      pressure_z = residual / combined_sigma if combined_sigma > 0 else None

                      sign = "positive" if pressure_z is not None and pressure_z > 0 else "negative" if pressure_z is not None and pressure_z < 0 else "zero"

                      pressure_rows.append({
                          **common,
                          "baseline_family": planck["baseline_family"],
                          "baseline_formula": "(1 + z_lens) * D_A(0,z_lens) * D_A(0,z_source) / D_A(z_lens,z_source)",
                          "baseline_value": baseline_value,
                          "baseline_sigma_finite_difference": sigma_baseline,
                          "combined_sigma": combined_sigma,
                          "residual_observed_minus_baseline": residual,
                          "pressure_z": pressure_z if pressure_z is not None else "",
                          "pressure_sign": sign,
                          "absolute_pressure_z": abs(pressure_z) if pressure_z is not None else "",
                          "block_condition": "not_anchor_eligible_diagnostic_only",
                          "pressure_score_built": True,
                          "distance_interpretation": "shorter_than_planck_reference" if sign == "negative" else "longer_than_planck_reference" if sign == "positive" else "matched_reference",
                          "h0_equivalent_interpretation": "local_H0_high_equivalent_direction" if sign == "negative" else "local_H0_low_equivalent_direction" if sign == "positive" else "neutral",
                          "boundary_note": "Eligibility-review pressure diagnostic only; no refit and no model-anchor promotion."
                      })

              except Exception as e:
                  source_errors[product["product_id"]] = f"{type(e).__name__}: {e}"
                  failed_gates.append(f"{product['product_id']}_processing_failed")

          pressures = [float(r["pressure_z"]) for r in pressure_rows if r.get("pressure_z") != ""]
          pressure_count = len(pressure_rows)
          negative_count = sum(1 for p in pressures if p < 0)
          positive_count = sum(1 for p in pressures if p > 0)
          coherent_negative = pressure_count >= 3 and negative_count == pressure_count
          coherent_positive = pressure_count >= 3 and positive_count == pressure_count
          mean_pressure = float(np.mean(pressures)) if pressures else ""
          median_pressure = float(np.median(pressures)) if pressures else ""
          max_abs_pressure = float(np.max(np.abs(pressures))) if pressures else ""
          min_abs_pressure = float(np.min(np.abs(pressures))) if pressures else ""

          weighted_blocked_count = sum(1 for r in blocked_rows if r["block_condition"] == "blocked_weighted_likelihood_review_required")
          dd_blocked_count = sum(1 for r in blocked_rows if r["block_condition"] == "blocked_secondary_dd_row_not_primary_scoring_lane")
          model_anchor_count = sum(1 for r in pressure_rows + blocked_rows if r.get("model_anchor_allowed_now") is True)
          refit_count = sum(1 for r in pressure_rows + blocked_rows if r.get("refit_allowed_now") is True)
          included_in_model_count = sum(1 for r in pressure_rows + blocked_rows if r.get("included_in_model") is True)

          contract_ok = True
          for row in pressure_rows + blocked_rows:
              for field in REQUIRED_CONTRACT_FIELDS:
                  if field not in row or row.get(field) in ["", None]:
                      contract_ok = False

          if coherent_negative:
              family_eligibility_status = "eligible_non_bao_time_delay_reach_candidate_diagnostic_only"
              sign_interpretation = "coherent_negative_Ddt_pressure_shorter_than_Planck_reference_local_H0_high_equivalent"
              next_role = "carry_as_H0LiCOW_non_BAO_reach_candidate"
          elif coherent_positive:
              family_eligibility_status = "eligible_non_bao_time_delay_reach_candidate_diagnostic_only_opposite_direction"
              sign_interpretation = "coherent_positive_Ddt_pressure_longer_than_Planck_reference_local_H0_low_equivalent"
              next_role = "carry_as_H0LiCOW_non_BAO_reach_candidate_with_opposite_sign"
          else:
              family_eligibility_status = "mixed_or_insufficient_h0licow_diagnostic_only"
              sign_interpretation = "mixed_or_insufficient_Ddt_pressure"
              next_role = "keep_H0LiCOW_diagnostic_only_until_more_lenses_or_weight_review"

          eligibility_rows.append({
              "source": "H0LiCOW",
              "pressure_family": "eligible_unweighted_Ddt_only",
              "pressure_surface": "reach_geometry",
              "observable_role": "time_delay_reach",
              "pressure_row_count": pressure_count,
              "blocked_row_count": len(blocked_rows),
              "weighted_blocked_count": weighted_blocked_count,
              "dd_secondary_blocked_count": dd_blocked_count,
              "mean_pressure_z": mean_pressure,
              "median_pressure_z": median_pressure,
              "positive_count": positive_count,
              "negative_count": negative_count,
              "coherent_negative": coherent_negative,
              "coherent_positive": coherent_positive,
              "max_absolute_pressure_z": max_abs_pressure,
              "min_absolute_pressure_z": min_abs_pressure,
              "family_eligibility_status": family_eligibility_status,
              "sign_interpretation": sign_interpretation,
              "next_role": next_role,
              "claim_boundary": "reach_lane_candidate_diagnostic_only_not_model_anchor",
              "model_anchor_allowed_now": False,
              "refit_allowed_now": False
          })

          write_csv(
              OUTDIR / "h0licow_reach_lane_eligibility_pressure_rows_v3_41.csv",
              pressure_rows,
              [
                  "source", "product_id", "lens_or_system", "mapped_lens_object",
                  "mapping_status", "zlens", "zsource", "observable_role",
                  "pressure_surface", "parameter", "unit", "sample_count",
                  "finite_count", "q16", "q50", "q84", "observed_value",
                  "observed_sigma", "weighted_product", "baseline",
                  "baseline_family", "baseline_formula", "baseline_value",
                  "baseline_sigma_finite_difference", "combined_sigma",
                  "residual_observed_minus_baseline", "pressure_z",
                  "pressure_sign", "absolute_pressure_z",
                  "distance_interpretation", "h0_equivalent_interpretation",
                  "parser_status", "provenance_status", "block_condition",
                  "claim_boundary", "included_in_model", "pressure_score_built",
                  "model_anchor_allowed_now", "refit_allowed_now", "boundary_note"
              ]
          )

          write_csv(
              OUTDIR / "h0licow_reach_lane_eligibility_blocked_rows_v3_41.csv",
              blocked_rows,
              [
                  "source", "product_id", "lens_or_system", "mapped_lens_object",
                  "mapping_status", "zlens", "zsource", "observable_role",
                  "pressure_surface", "parameter", "unit", "sample_count",
                  "finite_count", "q16", "q50", "q84", "observed_value",
                  "observed_sigma", "weighted_product", "baseline",
                  "parser_status", "provenance_status", "block_condition",
                  "blocked_reason", "claim_boundary", "included_in_model",
                  "pressure_score_built", "model_anchor_allowed_now", "refit_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "h0licow_reach_lane_eligibility_family_summary_v3_41.csv",
              eligibility_rows,
              [
                  "source", "pressure_family", "pressure_surface", "observable_role",
                  "pressure_row_count", "blocked_row_count", "weighted_blocked_count",
                  "dd_secondary_blocked_count", "mean_pressure_z", "median_pressure_z",
                  "positive_count", "negative_count", "coherent_negative",
                  "coherent_positive", "max_absolute_pressure_z", "min_absolute_pressure_z",
                  "family_eligibility_status", "sign_interpretation", "next_role",
                  "claim_boundary", "model_anchor_allowed_now", "refit_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "h0licow_reach_lane_eligibility_lens_mapping_v3_41.csv",
              lens_mapping_rows,
              [
                  "source", "product_id", "lens_or_system", "mapped_lens_object",
                  "mapping_status", "zlens", "zsource", "pressure_score_built",
                  "model_anchor_allowed_now", "refit_allowed_now"
              ]
          )

          audit_rows = [
              {
                  "audit_gate": "pressure_rows_available",
                  "pass": pressure_count >= 3,
                  "value": pressure_count,
                  "boundary": "Need at least three eligible H0LiCOW Ddt pressure rows for family eligibility review."
              },
              {
                  "audit_gate": "coherent_direction_recorded",
                  "pass": coherent_negative or coherent_positive,
                  "value": sign_interpretation,
                  "boundary": "Direction may be recorded as diagnostic, not proof."
              },
              {
                  "audit_gate": "negative_ddt_interpreted_as_h0_high_equivalent",
                  "pass": coherent_negative,
                  "value": sign_interpretation,
                  "boundary": "Shorter Ddt relative to Planck is interpreted as local-H0-high-equivalent direction only."
              },
              {
                  "audit_gate": "weighted_wfi_remains_blocked",
                  "pass": weighted_blocked_count >= 1,
                  "value": weighted_blocked_count,
                  "boundary": "Weighted WFI2033 remains blocked for likelihood review."
              },
              {
                  "audit_gate": "dd_secondary_remains_blocked",
                  "pass": dd_blocked_count >= 2,
                  "value": dd_blocked_count,
                  "boundary": "Dd rows remain secondary and are not primary-scored."
              },
              {
                  "audit_gate": "required_contract_fields_present",
                  "pass": contract_ok,
                  "value": contract_ok,
                  "boundary": "source/role/surface/baseline/parser/provenance/block/claim contract must persist."
              },
              {
                  "audit_gate": "model_rows_not_included",
                  "pass": included_in_model_count == 0,
                  "value": included_in_model_count,
                  "boundary": "Eligibility review cannot enter a fitted model."
              },
              {
                  "audit_gate": "model_anchors_not_promoted",
                  "pass": model_anchor_count == 0,
                  "value": model_anchor_count,
                  "boundary": "No H0LiCOW row may become a model anchor."
              },
              {
                  "audit_gate": "refit_not_allowed",
                  "pass": refit_count == 0,
                  "value": refit_count,
                  "boundary": "No refit is allowed."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No model claim is allowed."
              }
          ]

          write_csv(
              OUTDIR / "h0licow_reach_lane_eligibility_audit_v3_41.csv",
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          hard_failed = list(failed_gates)

          if pressure_count < 3:
              hard_failed.append("too_few_h0licow_pressure_rows")
          if not (coherent_negative or coherent_positive):
              hard_failed.append("h0licow_direction_not_coherent")
          if weighted_blocked_count < 1:
              hard_failed.append("weighted_wfi_not_blocked")
          if dd_blocked_count < 2:
              hard_failed.append("dd_secondary_rows_not_blocked")
          if not contract_ok:
              hard_failed.append("required_contract_fields_missing")
          if included_in_model_count != 0:
              hard_failed.append("model_inclusion_violation")
          if model_anchor_count != 0:
              hard_failed.append("model_anchor_promotion_violation")
          if refit_count != 0:
              hard_failed.append("refit_guard_violation")

          if hard_failed:
              readiness_label = "h0licow_reach_lane_eligibility_review_needs_followup"
          elif coherent_negative:
              readiness_label = "h0licow_reach_lane_eligibility_passed_coherent_negative_ddt_candidate"
          else:
              readiness_label = "h0licow_reach_lane_eligibility_passed_coherent_positive_ddt_candidate"

          next_step = (
              "Build v3.42 reach-lane contrast integration: compare H0LiCOW coherent negative Ddt pressure, BAO mixed/subfamily pressure, and parked SH0ES/TDCOSMO lanes without refit or model-anchor promotion."
              if not hard_failed
              else "Inspect v3.41 H0LiCOW eligibility outputs and repair pressure, blocking, or contract issues before reach-lane contrast integration."
          )

          inventory.update({
              "pressure_row_count": pressure_count,
              "blocked_row_count": len(blocked_rows),
              "weighted_blocked_count": weighted_blocked_count,
              "dd_secondary_blocked_count": dd_blocked_count,
              "mean_pressure_z": mean_pressure,
              "median_pressure_z": median_pressure,
              "positive_count": positive_count,
              "negative_count": negative_count,
              "coherent_negative": coherent_negative,
              "coherent_positive": coherent_positive,
              "family_eligibility_status": family_eligibility_status,
              "sign_interpretation": sign_interpretation,
              "model_anchor_count": model_anchor_count,
              "refit_count": refit_count,
              "source_errors": source_errors,
              "gate_result": {
                  "failed_gates": hard_failed,
                  "readiness_label": readiness_label,
                  "pressure_row_count": pressure_count,
                  "blocked_row_count": len(blocked_rows),
                  "weighted_blocked_count": weighted_blocked_count,
                  "dd_secondary_blocked_count": dd_blocked_count,
                  "mean_pressure_z": mean_pressure,
                  "median_pressure_z": median_pressure,
                  "positive_count": positive_count,
                  "negative_count": negative_count,
                  "coherent_negative": coherent_negative,
                  "coherent_positive": coherent_positive,
                  "family_eligibility_status": family_eligibility_status,
                  "sign_interpretation": sign_interpretation,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "next_allowed_step": next_step
              }
          })

          json_path = OUTDIR / "tairid_cosmology_v3_41_h0licow_reach_lane_eligibility_review.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.41 — H0LiCOW Reach-Lane Eligibility Review")
          md.append("")
          md.append(f"Created UTC: `{inventory['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(hard_failed) if hard_failed else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v3.41 reviews the guarded H0LiCOW Ddt pressure pattern for reach-lane eligibility.")
          md.append("")
          md.append("It does not run a refit, does not promote anchors, and does not claim TAIRID is validated.")
          md.append("")
          md.append("## Results")
          md.append("")
          md.append(f"- Pressure rows: `{pressure_count}`")
          md.append(f"- Blocked rows: `{len(blocked_rows)}`")
          md.append(f"- Weighted WFI2033 blocked: `{weighted_blocked_count}`")
          md.append(f"- Dd secondary rows blocked: `{dd_blocked_count}`")
          md.append(f"- Mean pressure z: `{mean_pressure}`")
          md.append(f"- Median pressure z: `{median_pressure}`")
          md.append(f"- Positive / negative rows: `{positive_count}` / `{negative_count}`")
          md.append(f"- Coherent negative Ddt pressure: `{coherent_negative}`")
          md.append(f"- Family eligibility status: `{family_eligibility_status}`")
          md.append(f"- Sign interpretation: `{sign_interpretation}`")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          if not hard_failed:
              md.append("H0LiCOW qualifies as a non-BAO time-delay reach-lane candidate in diagnostic form. Its eligible Ddt rows are coherently negative relative to the Planck-reference baseline, which is recorded as a shorter-Ddt / local-H0-high-equivalent direction. This is not a model claim.")
          else:
              md.append("H0LiCOW eligibility review found blockers. Reach-lane contrast integration should wait.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `h0licow_reach_lane_eligibility_pressure_rows_v3_41.csv`")
          md.append("- `h0licow_reach_lane_eligibility_blocked_rows_v3_41.csv`")
          md.append("- `h0licow_reach_lane_eligibility_family_summary_v3_41.csv`")
          md.append("- `h0licow_reach_lane_eligibility_lens_mapping_v3_41.csv`")
          md.append("- `h0licow_reach_lane_eligibility_audit_v3_41.csv`")
          md.append("- `tairid_cosmology_v3_41_h0licow_reach_lane_eligibility_review.json`")
          md.append("- `tairid_cosmology_v3_41_h0licow_reach_lane_eligibility_review.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_41_h0licow_reach_lane_eligibility_review.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if hard_failed:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.41 H0LiCOW reach-lane eligibility review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-41-h0licow-reach-lane-eligibility-review
          path: artifacts/tairid_cosmology_v3_41/
