name: 000 TAIRID v4.75 WiggleZ Source or Exclusion Policy

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-75-wigglez-source-or-exclusion-policy.yml"

jobs:
  tairid-v4-75-wigglez-source-or-exclusion-policy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.75 WiggleZ source or exclusion policy
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_75_wigglez_source_or_exclusion_policy

          python - <<'PY'
          import csv
          import json
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_75_wigglez_source_or_exclusion_policy")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_75_wigglez_source_or_exclusion_policy"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a combined growth score.",
              "This does not compute a combined covariance.",
              "This does not make WiggleZ covariance-ready.",
              "This does not import WiggleZ likelihoods.",
              "This does not parse WiggleZ power spectra, windows, covariance, or CosmoMC modules.",
              "This checks WiggleZ source anchors and locks a source/exclusion policy only.",
              "A pass means WiggleZ handling is bounded for this sprint, not that WiggleZ is solved."
          ]

          UPSTREAM_LOCKS = {
              "v4_46_WiggleZ": {
                  "source_family": "WiggleZ",
                  "status": "formally nonfinal unresolved after locator retry",
                  "covariance_ready": False,
                  "product_visibility_failed": True,
                  "final_use_allowed": False
              },
              "v4_72_combination_policy": {
                  "WiggleZ_covariance_ready": False,
                  "final_RSD_pressure_score_computed": False,
                  "Planck_reference_uncertainty_computed": False
              },
              "v4_73_nonfinal_vector": {
                  "readiness_label": "nonfinal_pressure_vector_builder_passed_ready_for_ELG_parser_or_exclusion_policy",
                  "WiggleZ_covariance_ready": False,
                  "final_RSD_pressure_score_computed": False
              },
              "v4_74_ELG_policy": {
                  "readiness_label": "ELG_parser_or_exclusion_policy_passed_ready_for_WiggleZ_source_or_exclusion_policy",
                  "ELG_covariance_ready": False,
                  "final_RSD_pressure_score_computed": False
              }
          }

          WIGGLEZ_CURRENT_STATUS = {
              "family_id": "WiggleZ",
              "lane": "RSD_growth",
              "current_status": "historical_product_path_known_in_literature_but_not_covariance_ready_in_pipeline",
              "covariance_ready": False,
              "source_anchors_exist": True,
              "product_path_verified_now": False,
              "likelihood_or_covariance_imported": False,
              "may_enter_final_score_now": False,
              "safe_claim_now": "WiggleZ has source/literature anchors, but no usable covariance/product route is accepted in this pipeline yet.",
              "blocked_claim": "WiggleZ is covariance-ready."
          }

          WIGGLEZ_SOURCE_CANDIDATES = [
              {
                  "source_id": "wigglez_final_cosmology_arxiv_1210_2130",
                  "source_type": "primary_cosmology_publication",
                  "url": "https://arxiv.org/abs/1210.2130",
                  "role": "Final data release and cosmological results paper anchor.",
                  "candidate_use": "provenance_and_product_description_anchor",
                  "accept_as_covariance_now": False
              },
              {
                  "source_id": "wigglez_final_cosmology_prd",
                  "source_type": "primary_cosmology_publication",
                  "url": "https://link.aps.org/doi/10.1103/PhysRevD.86.103518",
                  "role": "Published PhysRevD final cosmological-results paper anchor.",
                  "candidate_use": "publication_anchor",
                  "accept_as_covariance_now": False
              },
              {
                  "source_id": "wigglez_mnras_final_data_release",
                  "source_type": "final_data_release_publication",
                  "url": "https://academic.oup.com/mnras/article/474/3/4151/4644843",
                  "role": "Later final data release paper/page that describes available cosmology products.",
                  "candidate_use": "product_description_anchor",
                  "accept_as_covariance_now": False
              },
              {
                  "source_id": "wigglez_historical_smp_data_url",
                  "source_type": "historical_product_url",
                  "url": "http://www.smp.uq.edu.au/wigglez-data",
                  "role": "Historical WiggleZ cosmology product URL cited by WiggleZ papers.",
                  "candidate_use": "needs_reachability_and_product_mapping",
                  "accept_as_covariance_now": False
              },
              {
                  "source_id": "wigglez_cds_final_data_release_catalogue",
                  "source_type": "catalogue_archive",
                  "url": "https://cdsarc.cds.unistra.fr/viz-bin/cat/J/MNRAS/474/4151",
                  "role": "CDS catalogue entry for the later WiggleZ final data release.",
                  "candidate_use": "catalogue/archive anchor, not automatically RSD covariance",
                  "accept_as_covariance_now": False
              }
          ]

          WIGGLEZ_ACCEPTANCE_REQUIREMENTS = [
              {
                  "requirement_id": "exact_product_identity",
                  "required": True,
                  "definition": "Must identify the exact WiggleZ product file/module used for RSD/growth comparison."
              },
              {
                  "requirement_id": "observable_match",
                  "required": True,
                  "definition": "Must determine whether the product is fσ8, growth rate f, power spectrum, BAO, distance, or another observable."
              },
              {
                  "requirement_id": "redshift_scope",
                  "required": True,
                  "definition": "Must map the product redshifts and survey bins before comparison."
              },
              {
                  "requirement_id": "covariance_or_likelihood_semantics",
                  "required": True,
                  "definition": "Must determine whether the available object is a covariance matrix, likelihood module, window function, power spectrum, or summary table."
              },
              {
                  "requirement_id": "machine_readable_access",
                  "required": True,
                  "definition": "Must be accessible enough for a future GitHub audit, or explicitly kept out of the scored lane."
              },
              {
                  "requirement_id": "nonduplication_scope",
                  "required": True,
                  "definition": "Must declare whether WiggleZ overlaps with, complements, or stays separate from BOSS/eBOSS in the combination policy."
              },
              {
                  "requirement_id": "not_context_only",
                  "required": True,
                  "definition": "Publication/source reachability alone cannot be treated as covariance."
              }
          ]

          WIGGLEZ_ROUTE_OPTIONS = [
              {
                  "route_id": "A_WiggleZ_product_locator_followup",
                  "status": "valid_future_route",
                  "allowed_now": True,
                  "purpose": "Use reachable source anchors to locate actual WiggleZ cosmology products, module files, covariance files, or documented mirrors.",
                  "requires_before_final_use": "exact product path, file listing, observable meaning, covariance/likelihood semantics, redshift-bin mapping",
                  "final_score_allowed_after_this_route_now": False
              },
              {
                  "route_id": "B_WiggleZ_formal_park_or_exclusion_route",
                  "status": "valid_sprint_policy_if_product_path_unresolved",
                  "allowed_now": True,
                  "purpose": "Keep WiggleZ explicitly parked/excluded from final RSD combination until product mapping is verified.",
                  "requires_before_final_use": "explicit exclusion note carried into nonfinal vector and sprint handoff",
                  "final_score_allowed_after_this_route_now": False
              },
              {
                  "route_id": "C_treat_WiggleZ_as_covariance_ready_now",
                  "status": "blocked",
                  "allowed_now": False,
                  "purpose": "Treat WiggleZ as if a valid covariance/product route has already been imported.",
                  "requires_before_final_use": "not allowed under current evidence",
                  "final_score_allowed_after_this_route_now": False
              }
          ]

          WIGGLEZ_SPRINT_POLICY = [
              {
                  "policy_id": "WiggleZ_has_source_anchors",
                  "policy": "Carry WiggleZ source anchors forward instead of treating WiggleZ as nonexistent.",
                  "active": True
              },
              {
                  "policy_id": "WiggleZ_not_covariance_ready",
                  "policy": "Do not treat literature/source reachability as a covariance import.",
                  "active": True
              },
              {
                  "policy_id": "WiggleZ_product_mapping_backlog_created",
                  "policy": "Carry a WiggleZ product locator/product-mapping route forward as a real backlog item.",
                  "active": True
              },
              {
                  "policy_id": "WiggleZ_parked_until_product_mapping",
                  "policy": "If no product is mapped in this step, WiggleZ remains parked/excluded from final RSD scoring.",
                  "active": True
              },
              {
                  "policy_id": "WiggleZ_final_score_block",
                  "policy": "Final RSD score remains blocked while WiggleZ is unresolved or formally excluded only for a nonfinal dashboard.",
                  "active": True
              }
          ]

          ALLOWED_CLAIMS = [
              "WiggleZ source anchors exist.",
              "WiggleZ remains unresolved in the current pipeline.",
              "WiggleZ is not covariance-ready now.",
              "WiggleZ needs exact product mapping or formal parked/exclusion labeling before final combination.",
              "This sprint can carry WiggleZ as parked with a source/product-mapping backlog while moving to Planck reference next."
          ]

          BLOCKED_CLAIMS = [
              "WiggleZ is covariance-ready.",
              "WiggleZ products were imported.",
              "WiggleZ likelihood was run.",
              "WiggleZ covariance was parsed.",
              "WiggleZ was included in a final RSD score.",
              "A final RSD pressure score was computed.",
              "A combined growth covariance was computed.",
              "Planck reference uncertainty is included.",
              "TAIRID cosmology is validated.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_76_Planck_reference_deep_route",
                  "purpose": "Continue the hardest missing layer: Planck reference uncertainty.",
                  "why_next": "ELG and WiggleZ are now bounded as parked/backlog items; Planck reference uncertainty remains the main final-pressure blocker."
              },
              {
                  "priority": 2,
                  "route_id": "v4_75_1_WiggleZ_product_locator_followup",
                  "purpose": "Optional later WiggleZ follow-up to locate actual product/module files or mirrors.",
                  "why_next": "Needed before WiggleZ can become usable data."
              },
              {
                  "priority": 3,
                  "route_id": "v4_77_sprint_end_handoff",
                  "purpose": "Summarize sprint after Planck reference follow-up.",
                  "why_next": "Handoff only after the planned blockers are addressed."
              }
          ]

          def source_probe(source):
              record = {
                  "source_id": source["source_id"],
                  "source_type": source["source_type"],
                  "url": source["url"],
                  "ok": False,
                  "method_used": "",
                  "status": None,
                  "content_type": None,
                  "content_length": None,
                  "bytes_sampled": 0,
                  "contains_wigglez_text": False,
                  "contains_covariance_text": False,
                  "contains_power_spectrum_text": False,
                  "contains_cosmomc_text": False,
                  "contains_window_text": False,
                  "accept_as_covariance_now": source["accept_as_covariance_now"],
                  "error": ""
              }

              headers = {
                  "User-Agent": "TAIRID-v4.75-WiggleZ-source-or-exclusion-policy/1.0",
                  "Accept": "*/*"
              }

              try:
                  req = urllib.request.Request(source["url"], method="HEAD", headers=headers)
                  with urllib.request.urlopen(req, timeout=60) as response:
                      record["ok"] = True
                      record["method_used"] = "HEAD"
                      record["status"] = getattr(response, "status", None)
                      record["content_type"] = response.headers.get("Content-Type")
                      content_length = response.headers.get("Content-Length")
                      record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

              except Exception as head_exc:
                  try:
                      req = urllib.request.Request(source["url"], headers=headers)
                      with urllib.request.urlopen(req, timeout=90) as response:
                          record["ok"] = True
                          record["method_used"] = "GET_PREFIX"
                          record["status"] = getattr(response, "status", None)
                          record["content_type"] = response.headers.get("Content-Type")
                          content_length = response.headers.get("Content-Length")
                          record["content_length"] = int(content_length) if content_length and content_length.isdigit() else None

                          data = response.read(250000)
                          text = data.decode("utf-8", errors="replace").lower()
                          record["bytes_sampled"] = len(data)
                          record["contains_wigglez_text"] = "wigglez" in text
                          record["contains_covariance_text"] = "covariance" in text
                          record["contains_power_spectrum_text"] = "power spectrum" in text or "power spectra" in text
                          record["contains_cosmomc_text"] = "cosmomc" in text
                          record["contains_window_text"] = "window function" in text or "window functions" in text

                  except Exception as get_exc:
                      record["error"] = f"HEAD failed: {type(head_exc).__name__}: {head_exc}; GET failed: {type(get_exc).__name__}: {get_exc}"

              return record

          failed_gates = []
          warnings = [
              "WiggleZ_policy_only",
              "source_reachability_not_covariance_acceptance",
              "WiggleZ_not_covariance_ready",
              "WiggleZ_products_not_imported",
              "WiggleZ_likelihood_not_run",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          source_records = [source_probe(source) for source in WIGGLEZ_SOURCE_CANDIDATES]

          reachable_source_count = sum(1 for row in source_records if row["ok"])
          accepted_covariance_now_count = sum(1 for row in WIGGLEZ_SOURCE_CANDIDATES if row["accept_as_covariance_now"] is True)
          covariance_text_hit_count = sum(1 for row in source_records if row["contains_covariance_text"])
          power_spectrum_text_hit_count = sum(1 for row in source_records if row["contains_power_spectrum_text"])
          cosmomc_text_hit_count = sum(1 for row in source_records if row["contains_cosmomc_text"])
          wigglez_text_hit_count = sum(1 for row in source_records if row["contains_wigglez_text"])

          if UPSTREAM_LOCKS["v4_46_WiggleZ"]["covariance_ready"] is not False:
              failed_gates.append("v4_46_WiggleZ_covariance_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_72_combination_policy"]["final_RSD_pressure_score_computed"] is not False:
              failed_gates.append("v4_72_final_score_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_74_ELG_policy"]["readiness_label"] != "ELG_parser_or_exclusion_policy_passed_ready_for_WiggleZ_source_or_exclusion_policy":
              failed_gates.append("v4_74_readiness_not_carried")

          if WIGGLEZ_CURRENT_STATUS["may_enter_final_score_now"] is not False:
              failed_gates.append("WiggleZ_allowed_into_final_score_too_early")

          if len(WIGGLEZ_SOURCE_CANDIDATES) < 5:
              failed_gates.append("WiggleZ_source_candidate_count_too_low")

          if reachable_source_count == 0:
              failed_gates.append("no_WiggleZ_source_candidates_reachable")

          if accepted_covariance_now_count != 0:
              failed_gates.append("WiggleZ_source_accepted_as_covariance_too_early")

          if not any(row["route_id"] == "A_WiggleZ_product_locator_followup" and row["allowed_now"] is True for row in WIGGLEZ_ROUTE_OPTIONS):
              failed_gates.append("WiggleZ_product_locator_route_missing")

          if not any(row["route_id"] == "B_WiggleZ_formal_park_or_exclusion_route" and row["allowed_now"] is True for row in WIGGLEZ_ROUTE_OPTIONS):
              failed_gates.append("WiggleZ_exclusion_route_missing")

          if not any(row["route_id"] == "C_treat_WiggleZ_as_covariance_ready_now" and row["allowed_now"] is False for row in WIGGLEZ_ROUTE_OPTIONS):
              failed_gates.append("WiggleZ_covariance_shortcut_not_blocked")

          if len(WIGGLEZ_ACCEPTANCE_REQUIREMENTS) < 7:
              failed_gates.append("WiggleZ_acceptance_requirements_incomplete")

          if not all(row["active"] is True for row in WIGGLEZ_SPRINT_POLICY):
              failed_gates.append("not_all_WiggleZ_sprint_policies_active")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "wigglez is covariance-ready",
              "wigglez products were imported",
              "wigglez likelihood was run",
              "wigglez covariance was parsed",
              "final rsd pressure score",
              "combined growth covariance",
              "validated",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "WiggleZ_source_or_exclusion_policy_passed_WiggleZ_parked_with_product_mapping_backlog_ready_for_Planck_reference_deep_route"

          RULE_RESULTS = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "WiggleZ_prior_unresolved_boundary_carried",
                  "pass": UPSTREAM_LOCKS["v4_46_WiggleZ"]["covariance_ready"] is False,
                  "result": "WiggleZ remains nonfinal from prior locator retry",
                  "boundary": "Unresolved is not covariance-ready."
              },
              {
                  "rule_id": "WiggleZ_source_candidates_declared",
                  "pass": len(WIGGLEZ_SOURCE_CANDIDATES) >= 5,
                  "result": f"{len(WIGGLEZ_SOURCE_CANDIDATES)} WiggleZ source candidates declared",
                  "boundary": "Source candidates are not covariance."
              },
              {
                  "rule_id": "WiggleZ_source_reachability_checked",
                  "pass": reachable_source_count > 0,
                  "result": f"{reachable_source_count} WiggleZ source candidates reachable",
                  "boundary": "Reachability is not product import."
              },
              {
                  "rule_id": "WiggleZ_no_source_accepted_as_covariance_now",
                  "pass": accepted_covariance_now_count == 0,
                  "result": "0 WiggleZ sources accepted as covariance now",
                  "boundary": "Product mapping still required."
              },
              {
                  "rule_id": "WiggleZ_product_locator_and_exclusion_routes_declared",
                  "pass": len(WIGGLEZ_ROUTE_OPTIONS) >= 3,
                  "result": f"{len(WIGGLEZ_ROUTE_OPTIONS)} WiggleZ route options declared",
                  "boundary": "Policy only."
              },
              {
                  "rule_id": "WiggleZ_acceptance_requirements_declared",
                  "pass": len(WIGGLEZ_ACCEPTANCE_REQUIREMENTS) >= 7,
                  "result": f"{len(WIGGLEZ_ACCEPTANCE_REQUIREMENTS)} WiggleZ acceptance requirements declared",
                  "boundary": "No product accepted now."
              },
              {
                  "rule_id": "WiggleZ_sprint_policy_active",
                  "pass": all(row["active"] is True for row in WIGGLEZ_SPRINT_POLICY),
                  "result": f"{len(WIGGLEZ_SPRINT_POLICY)} WiggleZ sprint policies active",
                  "boundary": "WiggleZ remains guarded."
              },
              {
                  "rule_id": "WiggleZ_final_score_blocked",
                  "pass": WIGGLEZ_CURRENT_STATUS["may_enter_final_score_now"] is False,
                  "result": "WiggleZ blocked from final score now",
                  "boundary": "No final RSD pressure."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 11,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "undetermined",
                  "result": route_decision,
                  "boundary": "Route decision does not parse WiggleZ or compute covariance."
              },
              {
                  "rule_id": "no_final_pressure_or_validation",
                  "pass": True,
                  "result": "no_final_RSD_pressure_no_TAIRID_validation",
                  "boundary": "WiggleZ policy only."
              }
          ]

          if not all(row["pass"] for row in RULE_RESULTS):
              failed_gates.append("not_all_v4_75_rules_passed")

          if failed_gates:
              readiness_label = "WiggleZ_source_or_exclusion_policy_failed"
              next_allowed_step = "Repair WiggleZ source/exclusion policy before moving to Planck reference deep route."
          else:
              readiness_label = "WiggleZ_source_or_exclusion_policy_passed_ready_for_Planck_reference_deep_route"
              next_allowed_step = (
                  "Proceed to v4.76 Planck reference deep route, while carrying WiggleZ as parked with a product-mapping backlog. "
                  "Do not compute final RSD pressure yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "WiggleZ_current_status": WIGGLEZ_CURRENT_STATUS["current_status"],
              "WiggleZ_source_anchor_count": len(WIGGLEZ_SOURCE_CANDIDATES),
              "WiggleZ_reachable_source_count": reachable_source_count,
              "WiggleZ_covariance_text_hit_count": covariance_text_hit_count,
              "WiggleZ_power_spectrum_text_hit_count": power_spectrum_text_hit_count,
              "WiggleZ_cosmomc_text_hit_count": cosmomc_text_hit_count,
              "WiggleZ_text_hit_count": wigglez_text_hit_count,
              "WiggleZ_accepted_covariance_now_count": accepted_covariance_now_count,
              "WiggleZ_route_option_count": len(WIGGLEZ_ROUTE_OPTIONS),
              "WiggleZ_acceptance_requirement_count": len(WIGGLEZ_ACCEPTANCE_REQUIREMENTS),
              "WiggleZ_sprint_policy_count": len(WIGGLEZ_SPRINT_POLICY),
              "allowed_claim_count": len(ALLOWED_CLAIMS),
              "blocked_claim_count": len(BLOCKED_CLAIMS),
              "next_route_option_count": len(NEXT_ROUTE_OPTIONS),
              "route_decision": route_decision,
              "WiggleZ_product_imported": False,
              "WiggleZ_likelihood_run": False,
              "WiggleZ_covariance_parsed": False,
              "WiggleZ_covariance_ready": False,
              "WiggleZ_may_enter_final_score_now": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in RULE_RESULTS if row["pass"]),
              "rule_total_count": len(RULE_RESULTS)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "WiggleZ_current_status": WIGGLEZ_CURRENT_STATUS,
              "WiggleZ_source_candidates": WIGGLEZ_SOURCE_CANDIDATES,
              "WiggleZ_source_reachability_records": source_records,
              "WiggleZ_acceptance_requirements": WIGGLEZ_ACCEPTANCE_REQUIREMENTS,
              "WiggleZ_route_options": WIGGLEZ_ROUTE_OPTIONS,
              "WiggleZ_sprint_policy": WIGGLEZ_SPRINT_POLICY,
              "allowed_claims": ALLOWED_CLAIMS,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": RULE_RESULTS,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "WiggleZ_product_imported": False,
                  "WiggleZ_likelihood_run": False,
                  "WiggleZ_covariance_parsed": False,
                  "WiggleZ_covariance_ready": False,
                  "WiggleZ_may_enter_final_score_now": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_75_WiggleZ_source_or_exclusion_policy.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
