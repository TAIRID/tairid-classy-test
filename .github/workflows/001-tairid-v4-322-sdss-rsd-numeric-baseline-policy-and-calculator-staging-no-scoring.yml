name: 001 TAIRID v4.322 - SDSS RSD Numeric Baseline Policy And Calculator Staging No Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-322-sdss-rsd-numeric-baseline-policy-and-calculator-staging-no-scoring.yml"
      - ".github/workflows/**"
      - "github/workflows/**"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-numeric-baseline-policy-and-calculator-staging-no-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.322 SDSS RSD Numeric Baseline Policy And Calculator Staging No Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.322 SDSS RSD numeric baseline policy and calculator staging no scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv, json, zipfile

          VERSION = "v4.322"
          EXPECTED_RESULT = "v4_322_sdss_rsd_numeric_baseline_policy_and_calculator_staging_no_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_323_sdss_rsd_numeric_baseline_calculator_dry_run_no_observed_scoring"

          OUT = Path("tairid_v4_322_sdss_rsd_numeric_baseline_policy_and_calculator_staging_output")
          OUT.mkdir(parents=True, exist_ok=True)
          ZIP_NAME = "tairid-v4-322-sdss-rsd-numeric-baseline-policy-and-calculator-staging-output.zip"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          inherited_v4_321_rows = [
              {"inherited_from": "v4.321", "item": "rules", "value": "26 / 26 passed", "meaning": "Baseline source-candidate gate confirmation passed.", "carry_forward_status": "ready_for_numeric_baseline_staging"},
              {"inherited_from": "v4.321", "item": "source_candidate_gate_confirmed", "value": True, "meaning": "Four source-candidate gates were confirmed.", "carry_forward_status": "confirmed"},
              {"inherited_from": "v4.321", "item": "confirmed_source_candidate_rows", "value": 4, "meaning": "Four source candidates confirmed.", "carry_forward_status": "confirmed_candidates"},
              {"inherited_from": "v4.321", "item": "kept_blocked_rows", "value": 2, "meaning": "Independence/null-policy risk rows stayed blocked.", "carry_forward_status": "risk_control_preserved"},
              {"inherited_from": "v4.321", "item": "baseline_values_filled", "value": False, "meaning": "No numeric baseline values were filled.", "carry_forward_status": "open_gap"},
              {"inherited_from": "v4.321", "item": "numeric_baseline_values_filled", "value": False, "meaning": "No numeric comparator table exists yet.", "carry_forward_status": "open_gap"},
              {"inherited_from": "v4.321", "item": "score_valid", "value": False, "meaning": "No scoring is allowed.", "carry_forward_status": "blocked"},
              {"inherited_from": "v4.321", "item": "selected_next_route", "value": "v4_322_sdss_rsd_numeric_baseline_policy_and_calculator_staging_no_scoring", "meaning": "Current workflow.", "carry_forward_status": "current_route"},
          ]

          policy_rows = [
              {
                  "policy_id": "numeric_policy_001",
                  "policy_area": "baseline_family",
                  "policy_statement": "The selected observed row family remains BAO+RSD f_sigma8, inherited from v4.314.",
                  "required_for_later_scoring": True,
                  "approved_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
              {
                  "policy_id": "numeric_policy_002",
                  "policy_area": "comparator_kind",
                  "policy_statement": "The comparator must be generated by a separate reproducible baseline calculator or source-backed parameter pipeline; it must not reuse the observed SDSS row as its own baseline.",
                  "required_for_later_scoring": True,
                  "approved_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
              {
                  "policy_id": "numeric_policy_003",
                  "policy_area": "parameter_context",
                  "policy_statement": "Planck/standard-Lambda-CDM parameter context is allowed only as a candidate calculator context until a later source-backed parameter gate approves exact values.",
                  "required_for_later_scoring": True,
                  "approved_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
              {
                  "policy_id": "numeric_policy_004",
                  "policy_area": "independence_guard",
                  "policy_statement": "Independence and same-family circularity remain blocked; a later gate must explicitly decide whether the comparator is independent enough for any support language.",
                  "required_for_later_scoring": True,
                  "approved_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
              {
                  "policy_id": "numeric_policy_005",
                  "policy_area": "covariance_guard",
                  "policy_statement": "Diagonal-only diagnostics may not produce p-values, likelihood claims, support claims, validation claims, or evidence claims.",
                  "required_for_later_scoring": True,
                  "approved_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
              {
                  "policy_id": "numeric_policy_006",
                  "policy_area": "null_rule",
                  "policy_statement": "If the standard comparator is equal or better, the result must weaken, block, or neutralize support rather than be reframed as positive evidence.",
                  "required_for_later_scoring": True,
                  "approved_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
          ]

          calculator_input_rows = [
              {"input_id": "input_001", "input_name": "z", "meaning": "Redshift for each selected BAO+RSD f_sigma8 observed row.", "status_now": "not_loaded_here", "required_later": True},
              {"input_id": "input_002", "input_name": "observed_fsigma8", "meaning": "Observed f_sigma8 values from the selected source family.", "status_now": "not_loaded_here", "required_later": True},
              {"input_id": "input_003", "input_name": "observed_sigma_or_covariance", "meaning": "Uncertainty/covariance for the selected observed rows.", "status_now": "blocked_until_definition_and_covariance_gate", "required_later": True},
              {"input_id": "input_004", "input_name": "omega_m", "meaning": "Matter-density parameter for standard comparator calculator.", "status_now": "candidate_only_not_approved", "required_later": True},
              {"input_id": "input_005", "input_name": "sigma8_0", "meaning": "Present-day sigma8 or equivalent normalization for standard comparator calculator.", "status_now": "candidate_only_not_approved", "required_later": True},
              {"input_id": "input_006", "input_name": "growth_index_or_growth_solver", "meaning": "Either a simple growth-index approximation or a later proper growth solver.", "status_now": "staged_only_not_approved", "required_later": True},
              {"input_id": "input_007", "input_name": "hubble_function_context", "meaning": "Expansion model context needed by any growth calculator.", "status_now": "staged_only_not_approved", "required_later": True},
          ]

          calculator_method_rows = [
              {
                  "method_id": "method_001",
                  "method_name": "growth_index_approximation_dry_run",
                  "method_status": "allowed_for_later_dry_run_only",
                  "method_outline": "Use f(z) approximately equal to Omega_m(z)^gamma and combine with a normalization proxy only in a later dry run.",
                  "why_not_scoring_now": "No exact parameter gate, no observed-row definition-match gate, and no covariance gate are approved.",
              },
              {
                  "method_id": "method_002",
                  "method_name": "source_backed_external_calculator",
                  "method_status": "preferred_later",
                  "method_outline": "Use a reproducible external/standard cosmology calculator if exact source-backed parameter inputs and method are later approved.",
                  "why_not_scoring_now": "Exact calculator source and numeric inputs are not yet approved.",
              },
              {
                  "method_id": "method_003",
                  "method_name": "full_likelihood_not_available",
                  "method_status": "blocked",
                  "method_outline": "Do not compute likelihood or p-values without full covariance/likelihood support.",
                  "why_not_scoring_now": "The full likelihood/covariance gate is absent.",
              },
          ]

          calculator_manifest_rows = [
              {
                  "manifest_id": "manifest_001",
                  "artifact_name": "SDSS_RSD_NUMERIC_BASELINE_CALCULATOR_STAGING_v4_322.json",
                  "artifact_role": "Machine-readable staging manifest for later dry-run calculator.",
                  "writes_numeric_values_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
              {
                  "manifest_id": "manifest_002",
                  "artifact_name": "SDSS_RSD_NUMERIC_BASELINE_POLICY_v4_322_NO_SCORING.csv",
                  "artifact_role": "Policy guardrail table for the numeric baseline lane.",
                  "writes_numeric_values_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
              {
                  "manifest_id": "manifest_003",
                  "artifact_name": "SDSS_RSD_NUMERIC_BASELINE_DRY_RUN_INPUT_TEMPLATE_v4_322_FILLABLE.csv",
                  "artifact_role": "Optional later input template; not required yet and not a score file.",
                  "writes_numeric_values_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
          ]

          dry_run_input_template_rows = [
              {
                  "row_id": "dry_input_001",
                  "z": "",
                  "observed_fsigma8": "",
                  "observed_sigma": "",
                  "row_source_url_or_citation": "",
                  "definition_match_status": "not_confirmed",
                  "covariance_status": "not_approved",
                  "comparator_model_status": "not_approved",
                  "numeric_baseline_value": "",
                  "baseline_value_status": "not_filled",
                  "score_allowed": False,
                  "support_allowed": False,
              }
          ]

          staging_manifest = {
              "version": VERSION,
              "staging_type": "numeric_baseline_policy_and_calculator_staging_no_scoring",
              "selected_observed_row_family": "BAO+RSD f_sigma8 row",
              "source_candidate_gate_confirmed": True,
              "numeric_values_written_now": False,
              "observed_values_loaded_now": False,
              "baseline_values_filled": False,
              "approved_baseline_values": 0,
              "score_valid": False,
              "support_allowed": False,
              "allowed_next_dry_run_type": "calculator_dry_run_no_observed_scoring",
              "required_before_scoring": [
                  "exact numeric parameter gate",
                  "observed row definition-match gate",
                  "covariance/uncertainty policy gate",
                  "numeric baseline values filled and reviewed",
                  "explicit no-support/equal-or-better null rule",
              ],
              "blocked_claims": [
                  "proof",
                  "validation",
                  "support",
                  "evidence",
                  "p-value",
                  "likelihood",
                  "residual score",
                  "chi-square",
                  "combined matrix",
              ],
          }

          gate_rows = [
              {"gate_id": "gate_001", "gate_object": "inherited_source_candidate_gate_confirmed", "gate_passed": True, "gate_status": "confirmed", "reason": "v4.321 confirmed source-candidate gates."},
              {"gate_id": "gate_002", "gate_object": "numeric_policy_rows_written", "gate_passed": len(policy_rows) == 6, "gate_status": "written", "reason": "Six numeric baseline policy rows written."},
              {"gate_id": "gate_003", "gate_object": "calculator_input_rows_written", "gate_passed": len(calculator_input_rows) == 7, "gate_status": "written", "reason": "Calculator input requirements written."},
              {"gate_id": "gate_004", "gate_object": "calculator_method_rows_written", "gate_passed": len(calculator_method_rows) == 3, "gate_status": "written", "reason": "Calculator method options staged."},
              {"gate_id": "gate_005", "gate_object": "numeric_baseline_values_filled", "gate_passed": False, "gate_status": "not_filled", "reason": "v4.322 is staging only."},
              {"gate_id": "gate_006", "gate_object": "baseline_approval", "gate_passed": False, "gate_status": "not_approved", "reason": "No numeric baseline is approved."},
              {"gate_id": "gate_007", "gate_object": "definition_match_confirmation", "gate_passed": False, "gate_status": "not_confirmed", "reason": "Definition matches remain blocked."},
              {"gate_id": "gate_008", "gate_object": "diagonal_diagnostic_readiness", "gate_passed": False, "gate_status": "not_ready", "reason": "No scoring readiness."},
          ]

          blocked_rows = [
              {"blocked_id": "blocked_001", "operation": "approve_baseline_values_now", "reason": "staging is not approval", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "fill_numeric_baseline_values_now", "reason": "calculator input gates are not approved", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "load_observed_values_now", "reason": "definition-match lane has not run", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "run_diagonal_diagnostic_now", "reason": "diagnostic readiness is false", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "compute_residual_or_chi_square", "reason": "no approved numeric baseline and no definition matches", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "compute_p_value_or_likelihood", "reason": "full covariance/likelihood remains absent", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "claim_tairid_support", "reason": "support is blocked", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "claim_evidence_or_validation", "reason": "no score and no holdout", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_010", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "numeric_baseline_policy_and_calculator_staging", "permission_status": "completed", "reason": "Policy and calculator staging artifacts written."},
              {"permission_scope": "numeric_baseline_calculator_dry_run_no_observed_scoring", "permission_status": "allowed_next", "reason": "Next workflow may dry-run calculator structure without observed scoring."},
              {"permission_scope": "numeric_baseline_values", "permission_status": "blocked", "reason": "No numeric baseline values filled here."},
              {"permission_scope": "definition_match_confirmation", "permission_status": "blocked", "reason": "Definition match not confirmed."},
              {"permission_scope": "diagonal_diagnostic_score", "permission_status": "blocked", "reason": "No scoring readiness."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
          ]

          sdr_rows = [
              {"sdr_id": "sdr_001", "before_state": "source candidates were confirmed but numeric baseline path was vague", "after_state": "numeric policy and calculator inputs are explicitly staged", "reduction_type": "calculator path clarified"},
              {"sdr_id": "sdr_002", "before_state": "calculator staging could be mistaken for baseline approval", "after_state": "numeric values and baseline approval remain false", "reduction_type": "staging/approval boundary preserved"},
              {"sdr_id": "sdr_003", "before_state": "dry-run calculator could leak into observed scoring", "after_state": "observed values and residual scoring remain blocked", "reduction_type": "dry-run/scoring boundary preserved"},
              {"sdr_id": "sdr_004", "before_state": "next testing scale was vague", "after_state": "next step is calculator dry run without observed scoring", "reduction_type": "next route narrowed"},
              {"sdr_id": "sdr_005", "before_state": "baseline lane could drift toward support language", "after_state": "support and evidence claims remain blocked", "reduction_type": "claim discipline preserved"},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before numeric baseline staging"},
              {"gate": "inherited_v4_321_rows_equal_8", "passed": len(inherited_v4_321_rows) == 8, "detail": f"inherited_v4_321_rows = {len(inherited_v4_321_rows)}"},
              {"gate": "policy_rows_equal_6", "passed": len(policy_rows) == 6, "detail": f"policy_rows = {len(policy_rows)}"},
              {"gate": "calculator_input_rows_equal_7", "passed": len(calculator_input_rows) == 7, "detail": f"calculator_input_rows = {len(calculator_input_rows)}"},
              {"gate": "calculator_method_rows_equal_3", "passed": len(calculator_method_rows) == 3, "detail": f"calculator_method_rows = {len(calculator_method_rows)}"},
              {"gate": "calculator_manifest_rows_equal_3", "passed": len(calculator_manifest_rows) == 3, "detail": f"calculator_manifest_rows = {len(calculator_manifest_rows)}"},
              {"gate": "dry_run_input_template_rows_equal_1", "passed": len(dry_run_input_template_rows) == 1, "detail": f"dry_run_input_template_rows = {len(dry_run_input_template_rows)}"},
              {"gate": "gate_rows_equal_8", "passed": len(gate_rows) == 8, "detail": f"gate_rows = {len(gate_rows)}"},
              {"gate": "blocked_rows_equal_10", "passed": len(blocked_rows) == 10, "detail": f"blocked_rows = {len(blocked_rows)}"},
              {"gate": "permission_rows_equal_6", "passed": len(permission_rows) == 6, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "sdr_rows_equal_5", "passed": len(sdr_rows) == 5, "detail": f"sdr_rows = {len(sdr_rows)}"},
              {"gate": "all_policy_rows_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in policy_rows), "detail": "policy no score/support"},
              {"gate": "all_manifest_rows_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in calculator_manifest_rows), "detail": "manifest no score/support"},
              {"gate": "all_dry_input_rows_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in dry_run_input_template_rows), "detail": "dry input no score/support"},
              {"gate": "all_blocked_operations_blocked", "passed": all(r["blocked"] is True for r in blocked_rows), "detail": "all blocked"},
              {"gate": "numeric_values_not_filled", "passed": any(r["gate_object"] == "numeric_baseline_values_filled" and r["gate_passed"] is False for r in gate_rows), "detail": "numeric baseline not filled"},
              {"gate": "baseline_approval_false", "passed": any(r["gate_object"] == "baseline_approval" and r["gate_passed"] is False for r in gate_rows), "detail": "baseline not approved"},
              {"gate": "definition_match_false", "passed": any(r["gate_object"] == "definition_match_confirmation" and r["gate_passed"] is False for r in gate_rows), "detail": "definition not confirmed"},
              {"gate": "diagnostic_readiness_false", "passed": any(r["gate_object"] == "diagonal_diagnostic_readiness" and r["gate_passed"] is False for r in gate_rows), "detail": "diagnostic not ready"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_support", "passed": True, "detail": "no support"},
              {"gate": "truth_boundary_no_score", "passed": True, "detail": "no score"},
              {"gate": "truth_boundary_no_p_value", "passed": True, "detail": "no p-value"},
              {"gate": "truth_boundary_no_likelihood", "passed": True, "detail": "no likelihood"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_323_sdss_rsd_numeric_baseline_calculator_dry_run_no_observed_scoring", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_322_sdss_rsd_numeric_baseline_policy_and_calculator_staging_no_scoring_passed_no_claims", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_322_inherited_v4_321_rows.csv", inherited_v4_321_rows)
          write_csv(OUT / "SDSS_RSD_NUMERIC_BASELINE_POLICY_v4_322_NO_SCORING.csv", policy_rows)
          write_csv(OUT / "v4_322_calculator_input_rows.csv", calculator_input_rows)
          write_csv(OUT / "v4_322_calculator_method_rows.csv", calculator_method_rows)
          write_csv(OUT / "v4_322_calculator_manifest_rows.csv", calculator_manifest_rows)
          write_csv(OUT / "SDSS_RSD_NUMERIC_BASELINE_DRY_RUN_INPUT_TEMPLATE_v4_322_FILLABLE.csv", dry_run_input_template_rows)
          write_csv(OUT / "v4_322_gate_decision_rows.csv", gate_rows)
          write_csv(OUT / "v4_322_blocked_operation_rows.csv", blocked_rows)
          write_csv(OUT / "v4_322_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_322_sdr_reduction_rows.csv", sdr_rows)
          write_csv(OUT / "v4_322_rule_checks.csv", checks)
          (OUT / "SDSS_RSD_NUMERIC_BASELINE_CALCULATOR_STAGING_v4_322.json").write_text(json.dumps(staging_manifest, indent=2), encoding="utf-8")

          readme = [
              "# SDSS RSD Numeric Baseline Policy And Calculator Staging v4.322",
              "",
              "This workflow stages the numeric baseline policy and calculator path after v4.321 confirmed source-candidate gates.",
              "",
              "It does not load observed values, does not fill numeric comparator values, does not approve a baseline, and does not score anything.",
              "",
              "The next permitted step is a calculator dry run with no observed scoring.",
          ]
          (OUT / "SDSS_RSD_NUMERIC_BASELINE_POLICY_AND_CALCULATOR_STAGING_v4_322_README.md").write_text("\n".join(readme), encoding="utf-8")

          summary = {
              "version": VERSION,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_source_candidate_gate_confirmed": True,
              "policy_rows": len(policy_rows),
              "calculator_input_rows": len(calculator_input_rows),
              "calculator_method_rows": len(calculator_method_rows),
              "calculator_manifest_rows": len(calculator_manifest_rows),
              "dry_run_input_template_rows": len(dry_run_input_template_rows),
              "numeric_baseline_values_filled": False,
              "baseline_values_filled": False,
              "approved_baseline_values": 0,
              "baseline_approved": False,
              "observed_values_loaded": False,
              "definition_match_confirmed": False,
              "diagonal_diagnostic_allowed_now": False,
              "score_valid": False,
              "support_allowed": False,
              "gate_decision_rows": len(gate_rows),
              "gate_approval_rows": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "supports_tairid": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False
              },
          }

          (OUT / "v4_322_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.322 SDSS RSD Numeric Baseline Policy And Calculator Staging No Scoring",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_source_candidate_gate_confirmed = {summary['inherited_source_candidate_gate_confirmed']}",
              f"policy_rows = {summary['policy_rows']}",
              f"calculator_input_rows = {summary['calculator_input_rows']}",
              f"calculator_method_rows = {summary['calculator_method_rows']}",
              f"calculator_manifest_rows = {summary['calculator_manifest_rows']}",
              f"dry_run_input_template_rows = {summary['dry_run_input_template_rows']}",
              f"numeric_baseline_values_filled = {summary['numeric_baseline_values_filled']}",
              f"baseline_values_filled = {summary['baseline_values_filled']}",
              f"approved_baseline_values = {summary['approved_baseline_values']}",
              f"observed_values_loaded = {summary['observed_values_loaded']}",
              f"definition_match_confirmed = {summary['definition_match_confirmed']}",
              f"diagonal_diagnostic_allowed_now = {summary['diagonal_diagnostic_allowed_now']}",
              f"score_valid = {summary['score_valid']}",
              f"support_allowed = {summary['support_allowed']}",
              f"gate_approval_rows = {summary['gate_approval_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Clean meaning: v4.322 stages the numeric baseline policy and calculator path. It still does not load observed values, fill comparator values, approve baselines, or score.",
              "",
