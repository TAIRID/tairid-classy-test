              for row in external_likelihood_boundary_rows
          ]

          decision_lines = [
              f"{row['decision_id']}: {row['decision']} Next: {row['next_action']}"
              for row in decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "inherited_result_rows": len(inherited_result_rows),
              "frozen_prediction_rows": len(frozen_prediction_rows),
              "external_likelihood_boundary_rows": len(external_likelihood_boundary_rows),
              "evidence_level_rows": len(evidence_level_rows),
              "broader_holdout_locator_plan_rows": len(broader_holdout_locator_plan_rows),
              "external_likelihood_manifest_template_rows": len(external_likelihood_manifest_template_rows),
              "likelihood_readiness_rows": len(likelihood_readiness_rows),
              "failure_condition_rows": len(failure_condition_rows),
              "decision_rows": len(decision_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "approves_holdout_source": False,
                  "is_external_likelihood_fit": False,
                  "same_data_counts_as_holdout": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_238_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.238 External Likelihood Boundary Holdout Plan",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"inherited_result_rows = {summary['inherited_result_rows']}",
              f"frozen_prediction_rows = {summary['frozen_prediction_rows']}",
              f"external_likelihood_boundary_rows = {summary['external_likelihood_boundary_rows']}",
              f"evidence_level_rows = {summary['evidence_level_rows']}",
              f"broader_holdout_locator_plan_rows = {summary['broader_holdout_locator_plan_rows']}",
              f"external_likelihood_manifest_template_rows = {summary['external_likelihood_manifest_template_rows']}",
              f"likelihood_readiness_rows = {summary['likelihood_readiness_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "External likelihood boundary:",
              *boundary_lines,
              "",
              "Likelihood readiness:",
              *readiness_lines,
              "",
              "Decisions:",
              *decision_lines,
              "",
              "Clean meaning: v4.238 defines what must exist before the project can call a result an external likelihood comparison or holdout-supported evidence. It does not approve a holdout source and does not run a likelihood fit.",
              "",
              "Truth boundary: no proof, no validation, no approved holdout, no external likelihood fit, no same-data holdout, no combined matrix.",
          ]
          (OUT / "v4_238_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"inherited_result_rows = {summary['inherited_result_rows']}")
          print(f"frozen_prediction_rows = {summary['frozen_prediction_rows']}")
          print(f"external_likelihood_boundary_rows = {summary['external_likelihood_boundary_rows']}")
          print(f"evidence_level_rows = {summary['evidence_level_rows']}")
          print(f"broader_holdout_locator_plan_rows = {summary['broader_holdout_locator_plan_rows']}")
          print(f"external_likelihood_manifest_template_rows = {summary['external_likelihood_manifest_template_rows']}")
          print(f"likelihood_readiness_rows = {summary['likelihood_readiness_rows']}")
          print(f"failure_condition_rows = {summary['failure_condition_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no approved holdout, no external likelihood fit, no same-data holdout, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.238 external likelihood boundary holdout plan output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-238-external-likelihood-boundary-holdout-plan-output
          path: |
            tairid_v4_238_external_likelihood_boundary_holdout_plan_output/
            tairid-v4-238-external-likelihood-boundary-holdout-plan-output.zip
