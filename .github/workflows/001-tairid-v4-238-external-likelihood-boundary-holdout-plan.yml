              },
              {
                  "failure_id": "failure_003",
                  "prediction": "QSO radial secondary support",
                  "failure_condition": "qso_radial_direction == '-' under stronger reference or holdout",
                  "effect": "secondary pacing support weakens",
              },
              {
                  "failure_id": "failure_004",
                  "prediction": "geometry compressed lane non-primary",
                  "failure_condition": "compressed_geometry_primary and qso_growth_not_positive",
                  "effect": "current pressure interpretation must be rewritten",
              },
              {
                  "failure_id": "failure_005",
                  "prediction": "reference robustness",
                  "failure_condition": "external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover",
