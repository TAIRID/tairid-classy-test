                  "blocked": "calling diagnostics validation",
              },
              {
                  "boundary_id": "likelihood_boundary_006",
                  "boundary_name": "failure_conditions",
                  "minimum_requirement": "Failure or weakening conditions must be machine-readable before scoring.",
                  "allowed": "pass/fail/weakening rows written before parsing holdout",
                  "blocked": "posthoc success criteria",
              },
              {
                  "boundary_id": "likelihood_boundary_007",
                  "boundary_name": "source_family_role",
                  "minimum_requirement": "Tracer role must be preserved.",
                  "allowed": "QSO-like growth tests QSO growth; LRG-like growth tests control; geometry tests geometry",
                  "blocked": "using geometry-only as primary QSO growth evidence",
              },
              {
                  "boundary_id": "likelihood_boundary_008",
                  "boundary_name": "claim_language",
