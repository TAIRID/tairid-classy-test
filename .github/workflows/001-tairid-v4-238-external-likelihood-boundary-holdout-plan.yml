                  "expected_pressure_class": "stable_zero_guard_or_not_same_as_QSO",
                  "failure_condition": "lrg_growth_direction == qso_growth_direction == '+'",
                  "status": "control_frozen_for_future_test",
              },
              {
                  "freeze_id": "freeze_004_geometry_compressed_lane",
                  "source_family": "compressed_geometry_DV_like_lane",
                  "observable": "D_V_or_compressed_geometry_likelihood",
