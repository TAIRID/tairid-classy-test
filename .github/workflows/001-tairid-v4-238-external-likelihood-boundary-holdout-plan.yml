                  "approval_status": "not_approved_until_manifest_review",
              },
              {
                  "plan_id": "locator_plan_002",
                  "target_family": "QSO_radial_geometry_secondary",
                  "search_need": "D_H/r_s or comparable radial BAO observable for QSO-like source",
                  "example_source_types": "QSO BAO radial geometry with covariance or likelihood",
                  "approval_status": "secondary_only_not_primary_growth_evidence",
              },
              {
                  "plan_id": "locator_plan_003",
                  "target_family": "LRG_growth_control",
                  "search_need": "lower-redshift or LRG-like f_sigma8 control surface",
                  "example_source_types": "BOSS/DR12, DESI LRG, independent RSD compilation",
