name: 001 TAIRID v4.238 - External Likelihood Boundary Holdout Plan

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-238-external-likelihood-boundary-holdout-plan.yml"

permissions:
  contents: read

jobs:
  external-likelihood-boundary-holdout-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.238 External Likelihood Boundary Holdout Plan is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.238 external likelihood boundary holdout plan
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import zipfile

          VERSION = "v4.238"
          ROUTE = "external_likelihood_boundary_holdout_plan_after_v4_237"
          EXPECTED_RESULT = "v4_238_external_likelihood_boundary_holdout_plan_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_239_external_likelihood_manifest_or_holdout_source_acquisition_guard"

          OUT = Path("tairid_v4_238_external_likelihood_boundary_holdout_plan_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-238-external-likelihood-boundary-holdout-plan-output.zip"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          inherited_result_rows = [
              {
                  "inherited_from": "v4.237",
                  "result_id": "result_001",
                  "result": "QSO f_sigma8 survived stronger same-data reference as stable_positive_pressure.",
                  "claim_status": "candidate_pressure_only",
                  "blocked_read": "not holdout, not validation, not external likelihood fit",
              },
              {
                  "inherited_from": "v4.237",
                  "result_id": "result_002",
                  "result": "QSO D_H_over_r_sound survived as positive_with_zero_guard_band.",
                  "claim_status": "secondary_candidate_pressure_only",
                  "blocked_read": "not primary proof lane",
              },
              {
                  "inherited_from": "v4.237",
                  "result_id": "result_003",
                  "result": "LRG f_sigma8 stayed stable_zero_guard.",
                  "claim_status": "control_pattern_survived",
                  "blocked_read": "not evidence by itself",
              },
              {
                  "inherited_from": "v4.237",
                  "result_id": "result_004",
                  "result": "Workflow readiness read was 8/10, cosmology evidence 3/10, TAIRID-specific evidence 2/10.",
