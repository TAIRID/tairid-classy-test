                  "blocked": "same exact files, same-release mirror files, or copied current surfaces",
              },
              {
                  "boundary_id": "likelihood_boundary_002",
                  "boundary_name": "reference_model_explicitness",
                  "minimum_requirement": "Every residual must have an explicit model/reference value before scoring.",
                  "allowed": "documented ΛCDM calculation, external likelihood prediction, or frozen reference manifest",
                  "blocked": "raw source-to-source difference called a residual",
              },
              {
                  "boundary_id": "likelihood_boundary_003",
                  "boundary_name": "covariance_likelihood_surface",
                  "minimum_requirement": "The covariance or likelihood surface type must be declared before scoring.",
                  "allowed": "full covariance, inverse covariance, diagonal-only diagnostic, grid likelihood",
                  "blocked": "fake covariance or hidden diagonal substitution",
              },
              {
                  "boundary_id": "likelihood_boundary_004",
                  "boundary_name": "parameter_freeze",
                  "minimum_requirement": "Model parameters or correction rules must be frozen before holdout scoring.",
                  "allowed": "pre-run parameter manifest or fixed correction/sign rule",
                  "blocked": "retuning after looking at holdout residuals",
              },
              {
                  "boundary_id": "likelihood_boundary_005",
                  "boundary_name": "comparison_type",
                  "minimum_requirement": "Declare whether the workflow is diagnostic, likelihood comparison, or model selection.",
