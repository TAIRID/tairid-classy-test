              {"gate": "frozen_prediction_rows_equal_4", "passed": len(frozen_prediction_rows) == 4, "detail": f"frozen_prediction_rows = {len(frozen_prediction_rows)}"},
              {"gate": "external_likelihood_boundary_rows_equal_8", "passed": len(external_likelihood_boundary_rows) == 8, "detail": f"external_likelihood_boundary_rows = {len(external_likelihood_boundary_rows)}"},
