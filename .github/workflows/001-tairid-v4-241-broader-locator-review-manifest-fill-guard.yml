name: 001 TAIRID v4.241 - Broader Locator Review Manifest Fill Guard

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-241-broader-locator-review-manifest-fill-guard.yml"

permissions:
  contents: read

jobs:
  broader-locator-review-manifest-fill-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.241 Broader Locator Review Manifest Fill Guard is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.241 broader locator review manifest fill guard
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv
          import json
          import time
          import zipfile

          VERSION = "v4.241"
          ROUTE = "review_broader_locator_results_or_external_manifest_fill_guard_after_v4_240"
          EXPECTED_RESULT = "v4_241_broader_locator_review_manifest_fill_guard_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_242_external_reference_boundary_or_manual_manifest_fill_scaffold"

          OUT = Path("tairid_v4_241_broader_locator_review_manifest_fill_guard_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-241-broader-locator-review-manifest-fill-guard-output.zip"

          CURRENT_USED_SOURCE_URLS = [
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/lrg/sdss_DR16_LRG_FSBAO_DMDHfs8_covtot.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/qso/sdss_DR16_QSO_FSBAO_DMDHfs8.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/qso/sdss_DR16_QSO_FSBAO_DMDHfs8_covtot.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/elg/sdss_DR16_ELG_BAO_DVtable.txt",
              "https://raw.githubusercontent.com/cosmosis-developers/cosmosis-standard-library/main/likelihood/eboss_dr16/elg/sdss_DR16_ELG_FSBAO_DMDHfs8gridlikelihood.txt",
          ]

          SAME_RELEASE_PATTERNS = [
              "sdss_dr16_baoplus_qso_fsbao_dmdhfs8",
              "sdss_dr16_qso_fsbao_dmdhfs8",
              "sdss_dr16_baoplus_lrg_fsbao_dmdhfs8",
              "sdss_dr16_lrg_fsbao_dmdhfs8",
              "sdss_dr16_elg_bao_dvtable",
              "sdss_dr16_elg_fsbao_dmdhfs8gridlikelihood",
              "eboss_dr16/qso/sdss_dr16_qso_fsbao",
              "eboss_dr16/lrg/sdss_dr16_lrg_fsbao",
              "eboss_dr16/elg/sdss_dr16_elg",
              "sdss_dr16_dr16",
          ]

          LOCATOR_TARGETS = [
              {"target_id": "cosmosis_standard_library_main", "owner": "cosmosis-developers", "repo": "cosmosis-standard-library", "branch": "main", "role": "known_current_and_other_likelihood_repository"},
              {"target_id": "cosmosis_standard_library_master", "owner": "cosmosis-developers", "repo": "cosmosis-standard-library", "branch": "master", "role": "fallback_known_likelihood_repository"},
              {"target_id": "cobaya_bao_data_main", "owner": "CobayaSampler", "repo": "bao_data", "branch": "main", "role": "possible_external_bao_data_repository"},
              {"target_id": "cobaya_bao_data_master", "owner": "CobayaSampler", "repo": "bao_data", "branch": "master", "role": "fallback_possible_external_bao_data_repository"},
              {"target_id": "cobaya_repository_main", "owner": "CobayaSampler", "repo": "cobaya", "branch": "main", "role": "possible_likelihood_examples_or_data_registry"},
              {"target_id": "cobaya_repository_master", "owner": "CobayaSampler", "repo": "cobaya", "branch": "master", "role": "fallback_possible_likelihood_examples_or_data_registry"},
              {"target_id": "cosmodesi_desilike_main", "owner": "cosmodesi", "repo": "desilike", "branch": "main", "role": "possible_DESI_like_likelihood_repository"},
              {"target_id": "cosmodesi_desilike_master", "owner": "cosmodesi", "repo": "desilike", "branch": "master", "role": "fallback_possible_DESI_like_likelihood_repository"},
              {"target_id": "desihub_desilike_main", "owner": "desihub", "repo": "desilike", "branch": "main", "role": "possible_DESI_like_likelihood_repository_alt_org"},
              {"target_id": "desihub_desilike_master", "owner": "desihub", "repo": "desilike", "branch": "master", "role": "fallback_possible_DESI_like_likelihood_repository_alt_org"},
              {"target_id": "montepython_public_master", "owner": "brinckmann", "repo": "montepython_public", "branch": "master", "role": "possible_external_likelihood_repository"},
              {"target_id": "montepython_public_main", "owner": "brinckmann", "repo": "montepython_public", "branch": "main", "role": "fallback_possible_external_likelihood_repository"},
          ]

          FROZEN_PREDICTIONS = [
              {"freeze_id": "freeze_001_primary_qso_growth", "source_family": "QSO_or_QSO_like_high_redshift_growth_surface", "observable": "f_sigma8_or_comparable_growth", "expected_direction": "+", "failure_condition_id": "failure_001"},
              {"freeze_id": "freeze_002_secondary_qso_radial", "source_family": "QSO_or_QSO_like_high_redshift_radial_geometry", "observable": "D_H_over_r_sound_or_equivalent", "expected_direction": "+/0", "failure_condition_id": "failure_003"},
              {"freeze_id": "freeze_003_control_lrg_growth", "source_family": "LRG_or_LRG_like_lower_redshift_growth_surface", "observable": "f_sigma8_or_comparable_growth", "expected_direction": "0_or_not_stable_positive", "failure_condition_id": "failure_002"},
              {"freeze_id": "freeze_004_geometry_compressed_lane", "source_family": "compressed_geometry_DV_like_lane", "observable": "D_V_or_compressed_geometry_likelihood", "expected_direction": "mostly_0_or_not_primary", "failure_condition_id": "failure_004"},
          ]

          FAILURE_CONDITIONS = [
              {"failure_condition_id": "failure_001", "target": "QSO f_sigma8 primary pressure", "machine_condition": "if holdout_qso_growth_direction in ['0','-','mixed_negative'] then primary_pressure_weakened"},
              {"failure_condition_id": "failure_002", "target": "QSO versus LRG growth contrast", "machine_condition": "if lrg_growth_direction == qso_growth_direction == '+' then source_contrast_weakened"},
              {"failure_condition_id": "failure_003", "target": "QSO radial secondary support", "machine_condition": "if qso_radial_direction == '-' then secondary_support_weakened"},
              {"failure_condition_id": "failure_004", "target": "geometry compressed lane non-primary", "machine_condition": "if compressed_geometry_primary and qso_growth_not_positive then current_interpretation_rewrite_needed"},
              {"failure_condition_id": "failure_005", "target": "external likelihood robustness", "machine_condition": "if external_likelihood_absorbs_all_pressure_without_tairid_specific_leftover then baseline_pressure_not_tairid_specific"},
          ]

          REVIEW_STATUSES = [
              "reviewable_primary_qso_growth_candidate",
              "reviewable_qso_radial_secondary_candidate",
              "reviewable_lrg_growth_control_candidate",
              "reviewable_non_qso_growth_control_candidate",
              "reviewable_external_source_needs_role_check",
              "reviewable_geometry_control_candidate",
              "support_file_needs_pairing",
              "held_cross_surface_special_review",
              "rejected_current_or_same_release_surface",
              "not_reviewable_holdout",
          ]

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def lower(text):
              return str(text or "").lower()

          def github_tree_url(owner, repo, branch):
              return f"https://api.github.com/repos/{owner}/{repo}/git/trees/{branch}?recursive=1"

          def github_raw_url(owner, repo, branch, path_text):
              return f"https://raw.githubusercontent.com/{owner}/{repo}/{branch}/{path_text}"

          def fetch_json(url, timeout=30):
              req = Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v4.241-broader-locator-review",
                      "Accept": "application/vnd.github+json",
                  },
              )
              with urlopen(req, timeout=timeout) as response:
                  return json.loads(response.read().decode("utf-8", errors="replace"))

          def suffix_for(path_text):
              name = lower(path_text).split("/")[-1]
              if name.endswith(".tar.gz"):
                  return ".tar.gz"
              if "." not in name:
                  return ""
              return "." + name.split(".")[-1]

          def is_data_like(path_text):
              suffix = suffix_for(path_text)
              return suffix in [".txt", ".dat", ".csv", ".tsv", ".json", ".yaml", ".yml", ".ini", ".py", ".gz", ".zip", ".fits", ".fits.gz"]

          def is_relevant_path(path_text):
              text = lower(path_text)
              if not is_data_like(path_text):
                  return False
              terms = [
                  "qso", "quasar", "lrg", "elg", "lya", "lyxqso", "desi",
                  "fsigma", "fsigma8", "growth", "rsd", "bao", "dmdh",
                  "dv", "wigglez", "vipers", "6df", "6dfgs", "mgs",
                  "boss", "eboss", "dr12", "dr16", "cov", "invcov",
                  "likelihood", "pantheon", "growthrate", "redshiftspace"
              ]
              return any(term in text for term in terms)

          def is_current_exact_or_same_release(raw_url, path_text):
              raw = lower(raw_url)
              text = lower(path_text)
              if raw in [lower(url) for url in CURRENT_USED_SOURCE_URLS]:
                  return True
              return any(pattern in text or pattern in raw for pattern in SAME_RELEASE_PATTERNS)

          def candidate_family(path_text):
              text = lower(path_text)

              if ("qso" in text or "quasar" in text) and any(t in text for t in ["fsigma", "fsigma8", "growth", "rsd", "fsbao"]):
                  return "primary_qso_growth_like"
              if ("qso" in text or "quasar" in text) and any(t in text for t in ["dh", "dmdh", "bao", "dv"]):
                  return "qso_radial_or_geometry_like"
              if "lrg" in text and any(t in text for t in ["fsigma", "fsigma8", "growth", "rsd", "fsbao"]):
                  return "lrg_growth_control_like"
              if any(t in text for t in ["wigglez", "vipers", "6df", "6dfgs", "mgs"]) and any(t in text for t in ["fsigma", "fsigma8", "growth", "rsd"]):
                  return "non_qso_growth_control_like"
              if "desi" in text and ("qso" in text or "lrg" in text or "elg" in text) and any(t in text for t in ["bao", "rsd", "fsigma", "growth", "likelihood"]):
                  return "desi_like_external_candidate"
              if "lya" in text or "lyxqso" in text:
                  return "lya_cross_surface_special_review"
              if any(t in text for t in ["dv", "dmdh", "bao"]) and "cov" not in text:
                  return "geometry_control_like"
              if "cov" in text or "invcov" in text or "likelihood" in text:
                  return "supporting_covariance_or_likelihood_file"
              return "not_holdout_or_parser_support"

          def review_status_for(path_text, raw_url, family):
              text = lower(path_text)

              if is_current_exact_or_same_release(raw_url, path_text):
                  return "rejected_current_or_same_release_surface", "Current/same-release/mirror surface cannot count as independent holdout."

              if family == "primary_qso_growth_like":
                  return "reviewable_primary_qso_growth_candidate", "Potential primary QSO-like growth holdout; needs human source review and covariance check."

              if family == "desi_like_external_candidate":
                  if "qso" in text and any(t in text for t in ["fsigma", "growth", "rsd"]):
                      return "reviewable_primary_qso_growth_candidate", "Possible DESI QSO-like growth holdout; must verify observable and covariance."
                  return "reviewable_external_source_needs_role_check", "DESI-like external candidate; needs tracer/observable role review."

              if family == "qso_radial_or_geometry_like":
                  return "reviewable_qso_radial_secondary_candidate", "QSO-like geometry/radial candidate; secondary only unless growth observable exists."

              if family == "lrg_growth_control_like":
                  return "reviewable_lrg_growth_control_candidate", "Potential LRG-like growth control surface."

              if family == "non_qso_growth_control_like":
                  return "reviewable_non_qso_growth_control_candidate", "Potential non-QSO growth control surface."

              if family == "geometry_control_like":
                  return "reviewable_geometry_control_candidate", "Geometry control candidate, not primary QSO growth evidence."

              if family == "lya_cross_surface_special_review":
                  return "held_cross_surface_special_review", "LyA/cross-surface source needs separate modeling before use."

              if family == "supporting_covariance_or_likelihood_file":
                  return "support_file_needs_pairing", "Potential covariance/likelihood file; must be paired with data source."

              return "not_reviewable_holdout", "Not reviewable as holdout under current rules."

          def score_candidate(status, path_text):
              score = 0
              if status == "reviewable_primary_qso_growth_candidate":
                  score += 100
              elif status == "reviewable_lrg_growth_control_candidate":
                  score += 75
              elif status == "reviewable_non_qso_growth_control_candidate":
                  score += 65
              elif status == "reviewable_qso_radial_secondary_candidate":
                  score += 60
              elif status == "reviewable_external_source_needs_role_check":
                  score += 55
              elif status == "reviewable_geometry_control_candidate":
                  score += 40
              elif status == "support_file_needs_pairing":
                  score += 15
              elif status == "held_cross_surface_special_review":
                  score += 5
              elif status == "rejected_current_or_same_release_surface":
                  score -= 50
              else:
                  score -= 5

              text = lower(path_text)
              if "cov" in text or "invcov" in text:
                  score += 8
              if "fsigma" in text or "fsigma8" in text:
                  score += 10
              if "qso" in text:
                  score += 8
              if "desi" in text:
                  score += 6
              return score

          target_status_rows = []
          candidate_rows = []

          for target in LOCATOR_TARGETS:
              tree_url = github_tree_url(target["owner"], target["repo"], target["branch"])
              try:
                  payload = fetch_json(tree_url)
                  tree = payload.get("tree", [])
                  fetch_status = "fetched"
                  error = ""
              except Exception as exc:
                  tree = []
                  fetch_status = "fetch_failed"
                  error = f"{type(exc).__name__}: {exc}"

              target_status_rows.append({
                  "target_id": target["target_id"],
                  "owner": target["owner"],
                  "repo": target["repo"],
                  "branch": target["branch"],
                  "role": target["role"],
                  "tree_url": tree_url,
                  "fetch_status": fetch_status,
                  "tree_count": len(tree),
                  "error": error,
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

              for item in tree:
                  if item.get("type") != "blob":
                      continue
                  path_text = item.get("path", "")
                  if not is_relevant_path(path_text):
                      continue

                  raw_url = github_raw_url(target["owner"], target["repo"], target["branch"], path_text)
                  family = candidate_family(path_text)
                  status, reason = review_status_for(path_text, raw_url, family)
                  score = score_candidate(status, path_text)

                  candidate_rows.append({
                      "target_id": target["target_id"],
                      "owner": target["owner"],
                      "repo": target["repo"],
                      "branch": target["branch"],
                      "path": path_text,
                      "suffix": suffix_for(path_text),
                      "raw_url": raw_url,
                      "candidate_family": family,
                      "review_status": status,
                      "review_reason": reason,
                      "review_score": score,
                      "approved_as_holdout": False,
                      "manifest_fill_allowed": False,
                      "scoring_allowed": False,
                      "proof_status": "not_proof",
                      "validation_status": "not_validation",
                  })

              time.sleep(0.2)

          candidate_rows.sort(key=lambda row: (-int(row["review_score"]), row["review_status"], row["raw_url"]))

          candidate_summary_rows = []
          for status in REVIEW_STATUSES:
              rows = [row for row in candidate_rows if row["review_status"] == status]
              candidate_summary_rows.append({
                  "review_status": status,
                  "candidate_rows": len(rows),
                  "top_candidate_url": rows[0]["raw_url"] if rows else "",
                  "summary_status": "present" if rows else "none",
                  "proof_status": "not_proof",
                  "validation_status": "not_validation",
              })

          manual_review_queue_rows = []
          queue_statuses = [
              "reviewable_primary_qso_growth_candidate",
              "reviewable_qso_radial_secondary_candidate",
              "reviewable_lrg_growth_control_candidate",
              "reviewable_non_qso_growth_control_candidate",
              "reviewable_external_source_needs_role_check",
              "reviewable_geometry_control_candidate",
          ]
          for rank, row in enumerate([r for r in candidate_rows if r["review_status"] in queue_statuses][:50], start=1):
              out = dict(row)
              out["rank"] = rank
              out["manual_review_status"] = "needs_human_source_covariance_role_review"
              manual_review_queue_rows.append(out)

          primary_count = sum(1 for row in candidate_rows if row["review_status"] == "reviewable_primary_qso_growth_candidate")
          secondary_qso_count = sum(1 for row in candidate_rows if row["review_status"] == "reviewable_qso_radial_secondary_candidate")
          lrg_control_count = sum(1 for row in candidate_rows if row["review_status"] == "reviewable_lrg_growth_control_candidate")
          geometry_control_count = sum(1 for row in candidate_rows if row["review_status"] == "reviewable_geometry_control_candidate")
          external_role_count = sum(1 for row in candidate_rows if row["review_status"] == "reviewable_external_source_needs_role_check")

          manifest_fill_recommendation_rows = [
              {
                  "manifest_role": "primary_qso_growth_holdout",
                  "candidate_count": primary_count,
                  "manifest_fill_status": "blocked_no_clean_primary_candidate" if primary_count == 0 else "manual_review_required_before_fill",
                  "recommended_action": "Do not fill primary QSO growth manifest unless a reviewed non-current growth candidate is confirmed.",
                  "auto_fill_allowed": False,
              },
              {
                  "manifest_role": "qso_radial_secondary",
                  "candidate_count": secondary_qso_count,
                  "manifest_fill_status": "manual_review_required_secondary_only" if secondary_qso_count else "blocked_no_secondary_candidate",
                  "recommended_action": "Can be reviewed as secondary radial/geometry support only, not primary growth evidence.",
                  "auto_fill_allowed": False,
              },
              {
                  "manifest_role": "lrg_growth_control",
                  "candidate_count": lrg_control_count,
                  "manifest_fill_status": "manual_review_required_control_only" if lrg_control_count else "blocked_no_lrg_control_candidate",
                  "recommended_action": "Can be reviewed as control, not QSO primary support.",
                  "auto_fill_allowed": False,
              },
              {
                  "manifest_role": "geometry_control",
                  "candidate_count": geometry_control_count,
                  "manifest_fill_status": "manual_review_required_geometry_control_only" if geometry_control_count else "blocked_no_geometry_candidate",
                  "recommended_action": "Can be reviewed as geometry control only.",
                  "auto_fill_allowed": False,
              },
              {
                  "manifest_role": "external_source_needs_role_check",
                  "candidate_count": external_role_count,
                  "manifest_fill_status": "manual_role_review_required" if external_role_count else "blocked_no_role_check_candidate",
                  "recommended_action": "Review tracer/observable role before any manifest fill.",
                  "auto_fill_allowed": False,
              },
          ]

          external_manifest_template_rows = [
              {
                  "manifest_id": "ext_like_001",
                  "comparison_role": "primary_qso_growth_holdout",
                  "source_family": "QSO_or_QSO_like",
                  "observable": "f_sigma8_or_comparable_growth",
                  "data_path_or_url": "PUT_REVIEWED_EXTERNAL_QSO_GROWTH_DATA_URL_HERE",
                  "covariance_path_or_url": "PUT_QSO_GROWTH_COVARIANCE_OR_LIKELIHOOD_URL_HERE",
                  "reference_model_path_or_method": "PUT_EXTERNAL_OR_REPRODUCIBLE_LCDM_REFERENCE_HERE",
                  "comparison_type": "holdout_candidate_not_scored",
                  "failure_condition_id": "failure_001",
                  "approval_status": "template_not_filled",
              },
              {
                  "manifest_id": "ext_like_002",
                  "comparison_role": "qso_radial_secondary",
                  "source_family": "QSO_or_QSO_like",
                  "observable": "D_H_over_r_sound_or_equivalent",
                  "data_path_or_url": "PUT_REVIEWED_EXTERNAL_QSO_RADIAL_DATA_URL_HERE",
                  "covariance_path_or_url": "PUT_QSO_RADIAL_COVARIANCE_OR_LIKELIHOOD_URL_HERE",
                  "reference_model_path_or_method": "PUT_EXTERNAL_OR_REPRODUCIBLE_LCDM_REFERENCE_HERE",
                  "comparison_type": "holdout_candidate_not_scored",
                  "failure_condition_id": "failure_003",
                  "approval_status": "template_not_filled",
              },
              {
                  "manifest_id": "ext_like_003",
                  "comparison_role": "lrg_growth_control",
                  "source_family": "LRG_or_LRG_like",
                  "observable": "f_sigma8_or_comparable_growth",
                  "data_path_or_url": "PUT_REVIEWED_EXTERNAL_LRG_CONTROL_DATA_URL_HERE",
                  "covariance_path_or_url": "PUT_LRG_CONTROL_COVARIANCE_OR_LIKELIHOOD_URL_HERE",
                  "reference_model_path_or_method": "PUT_EXTERNAL_OR_REPRODUCIBLE_LCDM_REFERENCE_HERE",
                  "comparison_type": "holdout_candidate_not_scored",
                  "failure_condition_id": "failure_002",
                  "approval_status": "template_not_filled",
              },
              {
                  "manifest_id": "ext_like_004",
                  "comparison_role": "geometry_control",
                  "source_family": "BAO_or_geometry_only",
                  "observable": "D_V_D_M_D_H_or_likelihood_coordinate",
                  "data_path_or_url": "PUT_REVIEWED_EXTERNAL_GEOMETRY_DATA_URL_HERE",
                  "covariance_path_or_url": "PUT_GEOMETRY_COVARIANCE_OR_LIKELIHOOD_URL_HERE",
                  "reference_model_path_or_method": "PUT_EXTERNAL_OR_REPRODUCIBLE_LCDM_REFERENCE_HERE",
                  "comparison_type": "holdout_candidate_not_scored",
                  "failure_condition_id": "failure_004",
                  "approval_status": "template_not_filled",
              },
              {
                  "manifest_id": "ext_like_005",
                  "comparison_role": "model_comparison_boundary",
                  "source_family": "reference_model",
                  "observable": "likelihood_or_chisq_status",
                  "data_path_or_url": "PUT_COMPARISON_SCRIPT_OR_MANIFEST_HERE",
                  "covariance_path_or_url": "PUT_COVARIANCE_POLICY_HERE",
                  "reference_model_path_or_method": "PUT_LCDM_AND_TAIRID_MODEL_BOUNDARY_HERE",
                  "comparison_type": "external_likelihood_boundary_only",
                  "failure_condition_id": "failure_005",
                  "approval_status": "template_not_filled",
              },
          ]

          readiness_rows = [
              {
                  "readiness_id": "readiness_001",
                  "requirement": "primary_qso_growth_holdout_candidate",
                  "status": "missing" if primary_count == 0 else "needs_manual_review",
                  "blocks": "primary holdout manifest fill",
              },
              {
                  "readiness_id": "readiness_002",
                  "requirement": "secondary_or_control_candidates",
                  "status": "present" if (secondary_qso_count + lrg_control_count + geometry_control_count + external_role_count) > 0 else "missing",
                  "blocks": "secondary/control manifest fill until manually reviewed",
              },
              {
                  "readiness_id": "readiness_003",
                  "requirement": "manual_source_covariance_review",
                  "status": "needed",
                  "blocks": "manifest fill and parser scoring",
              },
              {
                  "readiness_id": "readiness_004",
                  "requirement": "external_likelihood_or_holdout_scoring",
                  "status": "blocked",
                  "blocks": "evidence language",
              },
              {
                  "readiness_id": "readiness_005",
                  "requirement": "tairid_correction_formula_or_transform",
                  "status": "not_yet_built",
                  "blocks": "model-vs-model comparison",
              },
              {
                  "readiness_id": "readiness_006",
                  "requirement": "combined_matrix_permission",
                  "status": "blocked",
                  "blocks": "combined LRG/ELG/QSO matrix",
              },
          ]

          decision_rows = []

          if primary_count == 0:
              decision_rows.append({
                  "decision_id": "decision_001",
                  "decision": "Primary QSO growth manifest fill remains blocked.",
                  "basis": "reviewable_primary_qso_growth_candidate rows = 0",
                  "next_action": "Do not create a primary QSO growth holdout manifest from secondary/control candidates.",
                  "claim_status": "primary_holdout_missing",
              })
          else:
              decision_rows.append({
                  "decision_id": "decision_001",
                  "decision": "Primary QSO growth candidates need manual review before manifest fill.",
                  "basis": f"reviewable_primary_qso_growth_candidate rows = {primary_count}",
                  "next_action": "Review source/covariance/provenance before manifest fill.",
                  "claim_status": "manual_review_needed",
              })

          decision_rows.append({
              "decision_id": "decision_002",
              "decision": "Secondary and control candidates may be reviewed, but not promoted.",
              "basis": f"secondary/control/role-check candidate rows = {secondary_qso_count + lrg_control_count + geometry_control_count + external_role_count}",
              "next_action": "Use them only for secondary/control manifest rows after manual review.",
              "claim_status": "control_only_not_evidence",
          })

          decision_rows.append({
              "decision_id": "decision_003",
              "decision": "Next route should build the external reference boundary or a manual manifest-fill scaffold.",
              "basis": "Primary holdout remains missing; scoring is still blocked.",
              "next_action": "Move to v4.242 with external reference boundary or manual manifest scaffold.",
              "claim_status": "scoring_blocked",
          })

          permission_rows = [
              {
                  "permission_scope": "manual_candidate_review",
                  "permission_status": "allowed",
                  "reason": "Candidate rows can be reviewed by source, observable, covariance, and provenance.",
              },
              {
                  "permission_scope": "automatic_manifest_fill",
                  "permission_status": "blocked",
                  "reason": "No row may fill a manifest automatically.",
              },
              {
                  "permission_scope": "primary_qso_growth_manifest_fill",
                  "permission_status": "blocked_without_reviewed_primary_candidate",
                  "reason": "Primary QSO growth candidate is missing or unreviewed.",
              },
              {
                  "permission_scope": "secondary_control_manifest_fill",
                  "permission_status": "blocked_until_manual_review",
                  "reason": "Secondary/control rows need source/covariance review first.",
              },
              {
                  "permission_scope": "holdout_scoring",
                  "permission_status": "blocked",
                  "reason": "No reviewed manifest exists.",
              },
              {
                  "permission_scope": "cosmology_validation_claim",
                  "permission_status": "blocked",
                  "reason": "No holdout scoring or external likelihood fit has run.",
              },
              {
                  "permission_scope": "combined_lrg_elg_qso_matrix",
                  "permission_status": "blocked",
                  "reason": "Combined matrix remains blocked by source-surface guards.",
              },
          ]

          next_rows = [
              {
                  "priority": 1,
                  "test_id": "v4_242_external_reference_boundary_scaffold",
                  "purpose": "define external reference/model-comparison boundary while primary holdout remains missing",
                  "activated": True,
              },
              {
                  "priority": 2,
                  "test_id": "v4_242_manual_manifest_fill_scaffold",
                  "purpose": "create a safe manual-fill scaffold that does not auto-promote candidates",
                  "activated": True,
              },
              {
                  "priority": 3,
                  "test_id": "v4_242_secondary_control_candidate_review",
                  "purpose": "review secondary/control candidates without treating them as primary QSO growth evidence",
                  "activated": True,
              },
              {
                  "priority": 4,
                  "test_id": "v4_242_combined_matrix_permission_recheck",
                  "purpose": "combined matrix remains blocked until source-surface guards pass",
                  "activated": True,
              },
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before broader locator review"},
              {"gate": "locator_targets_equal_12", "passed": len(LOCATOR_TARGETS) == 12, "detail": f"locator_targets = {len(LOCATOR_TARGETS)}"},
              {"gate": "target_status_rows_equal_12", "passed": len(target_status_rows) == 12, "detail": f"target_status_rows = {len(target_status_rows)}"},
              {"gate": "candidate_rows_written", "passed": isinstance(candidate_rows, list), "detail": f"candidate_rows = {len(candidate_rows)}"},
              {"gate": "candidate_summary_rows_equal_10", "passed": len(candidate_summary_rows) == 10, "detail": f"candidate_summary_rows = {len(candidate_summary_rows)}"},
              {"gate": "manual_review_queue_rows_at_most_50", "passed": len(manual_review_queue_rows) <= 50, "detail": f"manual_review_queue_rows = {len(manual_review_queue_rows)}"},
              {"gate": "manifest_fill_recommendation_rows_equal_5", "passed": len(manifest_fill_recommendation_rows) == 5, "detail": f"manifest_fill_recommendation_rows = {len(manifest_fill_recommendation_rows)}"},
              {"gate": "external_manifest_template_rows_equal_5", "passed": len(external_manifest_template_rows) == 5, "detail": f"external_manifest_template_rows = {len(external_manifest_template_rows)}"},
              {"gate": "frozen_prediction_rows_equal_4", "passed": len(FROZEN_PREDICTIONS) == 4, "detail": f"frozen_prediction_rows = {len(FROZEN_PREDICTIONS)}"},
              {"gate": "failure_condition_rows_equal_5", "passed": len(FAILURE_CONDITIONS) == 5, "detail": f"failure_condition_rows = {len(FAILURE_CONDITIONS)}"},
              {"gate": "readiness_rows_equal_6", "passed": len(readiness_rows) == 6, "detail": f"readiness_rows = {len(readiness_rows)}"},
              {"gate": "decision_rows_equal_3", "passed": len(decision_rows) == 3, "detail": f"decision_rows = {len(decision_rows)}"},
              {"gate": "permission_rows_equal_7", "passed": len(permission_rows) == 7, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "automatic_manifest_fill_blocked", "passed": any(row["permission_scope"] == "automatic_manifest_fill" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "automatic manifest fill blocked"},
              {"gate": "holdout_scoring_blocked", "passed": any(row["permission_scope"] == "holdout_scoring" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "holdout scoring blocked"},
              {"gate": "validation_claim_blocked", "passed": any(row["permission_scope"] == "cosmology_validation_claim" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "validation claim blocked"},
              {"gate": "combined_matrix_blocked", "passed": any(row["permission_scope"] == "combined_lrg_elg_qso_matrix" and row["permission_status"] == "blocked" for row in permission_rows), "detail": "combined matrix blocked"},
              {"gate": "no_candidate_auto_approved", "passed": all(row["approved_as_holdout"] is False and row["scoring_allowed"] is False and row["manifest_fill_allowed"] is False for row in candidate_rows), "detail": "no candidate automatically approved, scoreable, or fillable"},
              {"gate": "all_manifest_recommendations_no_autofill", "passed": all(row["auto_fill_allowed"] is False for row in manifest_fill_recommendation_rows), "detail": "all manifest recommendations block auto-fill"},
              {"gate": "next_rows_equal_4", "passed": len(next_rows) == 4, "detail": f"next_rows = {len(next_rows)}"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_scoring", "passed": True, "detail": "review guard does not score"},
              {"gate": "truth_boundary_no_auto_manifest_fill", "passed": True, "detail": "no automatic manifest fill"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_242_external_reference_boundary_or_manual_manifest_fill_scaffold", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_241_broader_locator_review_manifest_fill_guard_passed_no_validation", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_241_target_status_rows.csv", target_status_rows)
          write_csv(OUT / "v4_241_candidate_rows.csv", candidate_rows)
          write_csv(OUT / "v4_241_candidate_summary_rows.csv", candidate_summary_rows)
          write_csv(OUT / "v4_241_manual_review_queue_rows.csv", manual_review_queue_rows)
          write_csv(OUT / "v4_241_manifest_fill_recommendation_rows.csv", manifest_fill_recommendation_rows)
          write_csv(OUT / "v4_241_external_manifest_template_rows.csv", external_manifest_template_rows)
          write_csv(OUT / "v4_241_frozen_prediction_rows.csv", FROZEN_PREDICTIONS)
          write_csv(OUT / "v4_241_failure_condition_rows.csv", FAILURE_CONDITIONS)
          write_csv(OUT / "v4_241_readiness_rows.csv", readiness_rows)
          write_csv(OUT / "v4_241_decision_rows.csv", decision_rows)
          write_csv(OUT / "v4_241_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_241_prioritized_next_rows.csv", next_rows)
          write_csv(OUT / "v4_241_rule_checks.csv", checks)

          summary_lines = [
              f"{row['review_status']}: rows={row['candidate_rows']}, top={row['top_candidate_url']}"
              for row in candidate_summary_rows
          ]

          recommendation_lines = [
              f"{row['manifest_role']}: {row['manifest_fill_status']} (candidates={row['candidate_count']})"
              for row in manifest_fill_recommendation_rows
          ]

          decision_lines = [
              f"{row['decision_id']}: {row['decision']} Next: {row['next_action']}"
              for row in decision_rows
          ]

          summary = {
              "version": VERSION,
              "route": ROUTE,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "locator_targets": len(LOCATOR_TARGETS),
              "target_status_rows": len(target_status_rows),
              "candidate_rows": len(candidate_rows),
              "candidate_summary_rows": len(candidate_summary_rows),
              "manual_review_queue_rows": len(manual_review_queue_rows),
              "primary_qso_growth_candidate_rows": primary_count,
              "qso_radial_secondary_candidate_rows": secondary_qso_count,
              "lrg_growth_control_candidate_rows": lrg_control_count,
              "geometry_control_candidate_rows": geometry_control_count,
              "external_role_check_candidate_rows": external_role_count,
              "manifest_fill_recommendation_rows": len(manifest_fill_recommendation_rows),
              "external_manifest_template_rows": len(external_manifest_template_rows),
              "frozen_prediction_rows": len(FROZEN_PREDICTIONS),
              "failure_condition_rows": len(FAILURE_CONDITIONS),
              "readiness_rows": len(readiness_rows),
              "decision_rows": len(decision_rows),
              "permission_rows": len(permission_rows),
              "next_rows": len(next_rows),
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "scores_holdout": False,
                  "auto_fills_manifest": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False,
              },
          }

          (OUT / "v4_241_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.241 Broader Locator Review Manifest Fill Guard",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"locator_targets = {summary['locator_targets']}",
              f"target_status_rows = {summary['target_status_rows']}",
              f"candidate_rows = {summary['candidate_rows']}",
              f"candidate_summary_rows = {summary['candidate_summary_rows']}",
              f"manual_review_queue_rows = {summary['manual_review_queue_rows']}",
              f"primary_qso_growth_candidate_rows = {summary['primary_qso_growth_candidate_rows']}",
              f"qso_radial_secondary_candidate_rows = {summary['qso_radial_secondary_candidate_rows']}",
              f"lrg_growth_control_candidate_rows = {summary['lrg_growth_control_candidate_rows']}",
              f"geometry_control_candidate_rows = {summary['geometry_control_candidate_rows']}",
              f"external_role_check_candidate_rows = {summary['external_role_check_candidate_rows']}",
              f"manifest_fill_recommendation_rows = {summary['manifest_fill_recommendation_rows']}",
              f"external_manifest_template_rows = {summary['external_manifest_template_rows']}",
              f"frozen_prediction_rows = {summary['frozen_prediction_rows']}",
              f"failure_condition_rows = {summary['failure_condition_rows']}",
              f"readiness_rows = {summary['readiness_rows']}",
              f"decision_rows = {summary['decision_rows']}",
              f"permission_rows = {summary['permission_rows']}",
              f"next_rows = {summary['next_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Candidate summary:",
              *summary_lines,
              "",
              "Manifest fill recommendations:",
              *recommendation_lines,
              "",
              "Decisions:",
              *decision_lines,
              "",
              "Clean meaning: v4.241 reviews the broader locator results and blocks primary QSO growth manifest fill when no clean primary candidate exists. Secondary and control candidates remain review-only, not evidence.",
              "",
              "Truth boundary: no proof, no validation, no holdout scoring, no automatic manifest fill, no evidence approval, no external likelihood fit, no combined matrix.",
          ]
          (OUT / "v4_241_summary.md").write_text("\n".join(summary_md) + "\n", encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"locator_targets = {summary['locator_targets']}")
          print(f"target_status_rows = {summary['target_status_rows']}")
          print(f"candidate_rows = {summary['candidate_rows']}")
          print(f"candidate_summary_rows = {summary['candidate_summary_rows']}")
          print(f"manual_review_queue_rows = {summary['manual_review_queue_rows']}")
          print(f"primary_qso_growth_candidate_rows = {summary['primary_qso_growth_candidate_rows']}")
          print(f"qso_radial_secondary_candidate_rows = {summary['qso_radial_secondary_candidate_rows']}")
          print(f"lrg_growth_control_candidate_rows = {summary['lrg_growth_control_candidate_rows']}")
          print(f"geometry_control_candidate_rows = {summary['geometry_control_candidate_rows']}")
          print(f"external_role_check_candidate_rows = {summary['external_role_check_candidate_rows']}")
          print(f"manifest_fill_recommendation_rows = {summary['manifest_fill_recommendation_rows']}")
          print(f"external_manifest_template_rows = {summary['external_manifest_template_rows']}")
          print(f"frozen_prediction_rows = {summary['frozen_prediction_rows']}")
          print(f"failure_condition_rows = {summary['failure_condition_rows']}")
          print(f"readiness_rows = {summary['readiness_rows']}")
          print(f"decision_rows = {summary['decision_rows']}")
          print(f"permission_rows = {summary['permission_rows']}")
          print(f"next_rows = {summary['next_rows']}")
          print(f"selected_next_route = {SELECTED_NEXT_ROUTE}")
          print("Truth boundary: no proof, no validation, no holdout scoring, no automatic manifest fill, no evidence approval, no external likelihood fit, no combined matrix.")
          print(f"Output package: {ZIP_NAME}")

          if failed:
              raise SystemExit(f"Failed gates: {failed}")
          PY

      - name: Upload v4.241 broader locator review manifest fill guard output
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-241-broader-locator-review-manifest-fill-guard-output
          path: |
            tairid_v4_241_broader_locator_review_manifest_fill_guard_output/
            tairid-v4-241-broader-locator-review-manifest-fill-guard-output.zip
