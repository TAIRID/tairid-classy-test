name: Run TAIRID growth observation chi-square v4

on:
  workflow_dispatch:

jobs:
  run-growth-observation-chisq-v4:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools and Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran libgsl-dev
          python -m pip install --upgrade pip setuptools wheel cython numpy scipy matplotlib
          python -m pip install classy || python -m pip install classy-community

      - name: Run growth observation chi-square v3 script
        run: python run_tairid_growth_observation_chisq_v3.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-growth-observation-chisq-v4-output
          path: |
            *.txt
            *.csv
            *.json
            *.png
