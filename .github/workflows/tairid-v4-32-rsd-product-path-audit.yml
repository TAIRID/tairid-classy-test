name: TAIRID v4.32 RSD Product Path Audit

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tairid-v4-32-rsd-product-path-audit.yml"

jobs:
  tairid-v4-32-rsd-product-path-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.32 RSD product path audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_32_rsd_product_path_audit

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_32_rsd_product_path_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_32_rsd_product_path_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not run an RSD likelihood.",
              "This does not compute a final RSD pressure score.",
              "This does not import or apply an RSD covariance matrix.",
              "This audits exact candidate product paths and row-mapping status for future RSD covariance work.",
              "A pass means candidate product paths are recorded and bounded, not that covariance-aware testing has been completed."
          ]

          LOCATOR_PAGES = [
              {
                  "source_page_id": "sdss_final_bao_rsd_measurements",
                  "survey_scope": "SDSS_BOSS_eBOSS",
                  "url": "https://www.sdss4.org/science/final-bao-and-rsd-measurements/",
                  "expected_role": "official SDSS final BAO/RSD locator page",
                  "primary_lane": "eBOSS_DR16_and_SDSS_final_products"
              },
              {
                  "source_page_id": "boss_dr12_publications_results",
                  "survey_scope": "BOSS_DR12",
                  "url": "https://www.sdss3.org/science/boss_publications.php",
                  "expected_role": "official BOSS publications/results page with measurement and covariance product links",
                  "primary_lane": "BOSS_DR12_products"
              }
          ]

          SEEDED_PRODUCT_CANDIDATES = [
              {
                  "candidate_id": "sdss_dr16_cosmo_root",
                  "survey_family": "SDSS_BOSS_eBOSS",
                  "source_page_id": "sdss_final_bao_rsd_measurements",
                  "candidate_url": "https://svn.sdss.org/public/data/eboss/DR16cosmo/tags/v1_0_1/",
                  "candidate_kind": "directory_root",
                  "expected_contents": "final SDSS/eBOSS cosmology likelihoods covariance matrices chains or compressed products",
                  "mapping_status": "root_found_child_product_selection_needed",
                  "usable_for_current_fsigma8_rows_now": False
              },
              {
                  "candidate_id": "boss_dr12_consensus_gaussian_constraints",
                  "survey_family": "BOSS_DR12",
                  "source_page_id": "boss_dr12_publications_results",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/ALAM_ET_AL_2016_consensus_and_individual_Gaussian_constraints.tar.gz",
                  "candidate_kind": "compressed_likelihood_constraints_candidate",
                  "expected_contents": "DR12 consensus and individual Gaussian constraints",
                  "mapping_status": "candidate_exact_path_found_row_mapping_needed",
                  "usable_for_current_fsigma8_rows_now": False
              },
              {
                  "candidate_id": "boss_dr12_corrfunc_fullshape_multipoles",
                  "survey_family": "BOSS_DR12",
                  "source_page_id": "boss_dr12_publications_results",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Satpathy_etal_2016_COMBINEDDR12_full_shape_corrfunc_multipoles.zip",
                  "candidate_kind": "full_shape_measurement_covariance_candidate",
                  "expected_contents": "correlation function multipoles and covariance matrices",
                  "mapping_status": "candidate_exact_path_found_not_same_as_compressed_fsigma8_rows_until_mapped",
                  "usable_for_current_fsigma8_rows_now": False
              },
              {
                  "candidate_id": "boss_dr12_power_spectrum_fullshape",
                  "survey_family": "BOSS_DR12",
                  "source_page_id": "boss_dr12_publications_results",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Beutler_etal_DR12COMBINED_fullshape_powspec.tar.gz",
                  "candidate_kind": "full_shape_power_spectrum_candidate",
                  "expected_contents": "Fourier-space multipoles covariance matrices and window functions",
                  "mapping_status": "candidate_exact_path_found_not_same_as_compressed_fsigma8_rows_until_mapped",
                  "usable_for_current_fsigma8_rows_now": False
              },
              {
                  "candidate_id": "boss_dr12_wedges_configuration_space",
                  "survey_family": "BOSS_DR12",
                  "source_page_id": "boss_dr12_publications_results",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Sanchez_etal_2016a_COMBINEDDR12_fullshape_wedges.tar.gz",
                  "candidate_kind": "full_shape_wedges_candidate",
                  "expected_contents": "configuration-space wedges and covariance matrices",
                  "mapping_status": "candidate_exact_path_found_not_same_as_compressed_fsigma8_rows_until_mapped",
                  "usable_for_current_fsigma8_rows_now": False
              },
              {
                  "candidate_id": "boss_dr12_power_spectrum_wedges",
                  "survey_family": "BOSS_DR12",
                  "source_page_id": "boss_dr12_publications_results",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/GRIEB_ET_AL_2016_COMBINEDDR12_power_spectrum_wedges.tar.gz",
                  "candidate_kind": "full_shape_wedges_candidate",
                  "expected_contents": "Fourier-space wedges covariance matrices and window functions",
                  "mapping_status": "candidate_exact_path_found_not_same_as_compressed_fsigma8_rows_until_mapped",
                  "usable_for_current_fsigma8_rows_now": False
              },
              {
                  "candidate_id": "boss_dr12_bao_corrfunc_boundary_product",
                  "survey_family": "BOSS_DR12",
                  "source_page_id": "boss_dr12_publications_results",
                  "candidate_url": "https://data.sdss.org/sas/dr12/boss/papers/clustering/Ross_etal_2016_COMBINEDDR12_corrfunc.zip",
                  "candidate_kind": "BAO_boundary_product_candidate",
                  "expected_contents": "BAO correlation-function measurements and covariance matrices",
                  "mapping_status": "candidate_exact_path_found_BAO_boundary_not_RSD_growth",
                  "usable_for_current_fsigma8_rows_now": False
              },
              {
                  "candidate_id": "wigglez_product_unresolved",
                  "survey_family": "WiggleZ",
                  "source_page_id": "wigglez_final_results_paper",
                  "candidate_url": "",
                  "candidate_kind": "unresolved_product_path",
                  "expected_contents": "WiggleZ covariance for z=0.44,0.60,0.73 f_sigma8 rows",
                  "mapping_status": "unresolved_remains_nonfinal_preview_only",
                  "usable_for_current_fsigma8_rows_now": False
              }
          ]

          PRODUCT_PATH_REQUIREMENTS = [
              {
                  "requirement_id": "exact_candidate_paths_recorded",
                  "required": True,
                  "description": "Candidate product paths must be recorded before any covariance-aware RSD test.",
                  "failure_mode": "Covariance work proceeds from vague locator pages."
              },
              {
                  "requirement_id": "row_mapping_not_assumed",
                  "required": True,
                  "description": "Exact paths do not automatically map to current f_sigma8 rows.",
                  "failure_mode": "A full-shape covariance product is applied to compressed f_sigma8 rows without mapping."
              },
              {
                  "requirement_id": "BAO_boundary_products_labeled",
                  "required": True,
                  "description": "BAO products must remain boundary/ruler products, not growth pressure products.",
                  "failure_mode": "BAO covariance is mistaken for RSD growth covariance."
              },
              {
                  "requirement_id": "direct_product_not_imported",
                  "required": True,
                  "description": "This test may locate product paths but must not download/apply covariance.",
                  "failure_mode": "Path audit turns into covariance analysis."
              },
              {
                  "requirement_id": "wigglez_unresolved_preserved",
                  "required": True,
                  "description": "WiggleZ remains unresolved until exact covariance/product path is found.",
                  "failure_mode": "WiggleZ becomes covariance-ready without product path."
              },
              {
                  "requirement_id": "pressure_score_blocked",
                  "required": True,
                  "description": "No pressure score is allowed from a product path audit.",
                  "failure_mode": "Candidate products are treated as evidence of TAIRID."
              }
          ]

          BLOCKED_CLAIMS = [
              "TAIRID cosmology is validated.",
              "A final RSD pressure score was computed.",
              "An RSD covariance matrix was imported.",
              "The RSD comparison is covariance-aware now.",
              "A candidate product path automatically maps to the current f_sigma8 rows.",
              "Full-shape products are identical to compressed f_sigma8 summary rows without mapping.",
              "BAO products are growth-pressure products.",
              "WiggleZ is covariance-ready without a product path.",
              "A likelihood, BIC, refit, or model comparison was run."
          ]

          NEXT_TEST_LADDER = [
              {
                  "priority": 1,
                  "next_test": "v4_33_RSD_row_mapping_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Audit whether exact BOSS/eBOSS product candidates map to the current f_sigma8 rows or require a different row set.",
                  "must_include": "candidate product, row set, current f_sigma8 rows, mapping status, BAO/RSD boundary.",
                  "must_not_include": "covariance application, final pressure score, validation claim."
              },
              {
                  "priority": 2,
                  "next_test": "v4_34_RSD_reference_uncertainty_boundary_audit",
                  "role_focus": "rsd_fsigma8_growth",
                  "purpose": "Define how reference-model uncertainty would need to enter before a stronger RSD comparison.",
                  "must_include": "reference parameter uncertainty, Planck-chain boundary, growth curve uncertainty.",
                  "must_not_include": "treating approximate reference curve as full posterior."
              },
              {
                  "priority": 3,
                  "next_test": "v4_35_cluster_mass_calibration_boundary_audit",
                  "role_focus": "cluster_abundance_growth",
                  "purpose": "Audit cluster abundance with mass calibration and selection boundaries.",
                  "must_include": "mass calibration, selection, source/product status, axis label.",
                  "must_not_include": "cluster proof claim."
              }
          ]

          def fetch_text(url, timeout=90, byte_limit=2_000_000):
              try:
                  request = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "Mozilla/5.0 TAIRID-v4.32-RSD-product-path-audit",
                          "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
                      }
                  )
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")
                      return {
                          "fetch_ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "fetch_ok": False,
                      "http_status": "",
                      "content_type": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def clean_text(text):
              text = re.sub(r"<script.*?</script>", " ", text or "", flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<style.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
              text = re.sub(r"<[^>]+>", " ", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def extract_links(base_url, html_text):
              links = []
              for match in re.finditer(r'<a\s+[^>]*href=["\']([^"\']+)["\'][^>]*>(.*?)</a>', html_text or "", flags=re.IGNORECASE | re.DOTALL):
                  href = match.group(1).strip()
                  label = clean_text(match.group(2))
                  absolute = urllib.parse.urljoin(base_url, href)
                  links.append({"href": absolute, "label": label})
              return links

          def classify_product_url(url, label):
              combined = (url + " " + label).lower()

              if "wigglez" in combined:
                  survey_family = "WiggleZ"
              elif "eboss" in combined or "dr16cosmo" in combined:
                  survey_family = "eBOSS_DR16_or_SDSS_final"
              elif "dr12" in combined or "boss" in combined:
                  survey_family = "BOSS_DR12"
              else:
                  survey_family = "unknown_or_general"

              if any(word in combined for word in ["covariance", "covmat", "cov_"]):
                  product_class = "covariance_candidate"
              elif any(word in combined for word in ["likelihood", "gaussian", "constraints"]):
                  product_class = "likelihood_or_constraints_candidate"
              elif any(word in combined for word in ["cosmomc", "chains", "chain"]):
                  product_class = "chain_candidate"
              elif any(word in combined for word in [".tar.gz", ".zip", ".tgz", ".dat", ".txt", ".fits"]):
                  product_class = "downloadable_product_candidate"
              else:
                  product_class = "link_needs_manual_review"

              if "bao" in combined and "rsd" not in combined and "fsigma" not in combined and "f_sigma" not in combined:
                  role_mapping = "BAO_boundary_candidate_not_RSD_growth_until_reviewed"
              elif "rsd" in combined or "fsigma" in combined or "f_sigma" in combined or "fullshape" in combined or "full_shape" in combined:
                  role_mapping = "possible_RSD_or_full_shape_candidate_mapping_needed"
              elif product_class in ["likelihood_or_constraints_candidate", "covariance_candidate", "downloadable_product_candidate"]:
                  role_mapping = "candidate_product_mapping_needed"
              else:
                  role_mapping = "manual_review_needed"

              return survey_family, product_class, role_mapping

          fetched_pages = []
          discovered_link_rows = []

          for page in LOCATOR_PAGES:
              fetched = fetch_text(page["url"])
              links = extract_links(page["url"], fetched["text"]) if fetched["fetch_ok"] else []

              fetched_pages.append({
                  "source_page_id": page["source_page_id"],
                  "survey_scope": page["survey_scope"],
                  "url": page["url"],
                  "expected_role": page["expected_role"],
                  "fetch_ok": fetched["fetch_ok"],
                  "http_status": fetched["http_status"],
                  "content_type": fetched["content_type"],
                  "bytes_read": fetched["bytes_read"],
                  "error": fetched["error"],
                  "link_count": len(links)
              })

              for idx, link in enumerate(links):
                  survey_family, product_class, role_mapping = classify_product_url(link["href"], link["label"])
                  if product_class != "link_needs_manual_review" or any(k in (link["href"] + " " + link["label"]).lower() for k in ["covariance", "likelihood", "chain", "cosmomc", "bao", "rsd", "clustering"]):
                      discovered_link_rows.append({
                          "source_page_id": page["source_page_id"],
                          "link_index": idx,
                          "label": link["label"],
                          "url": link["href"],
                          "survey_family_guess": survey_family,
                          "product_class": product_class,
                          "role_mapping_status": role_mapping,
                          "usable_now": False
                      })

          candidate_rows = []

          for seeded in SEEDED_PRODUCT_CANDIDATES:
              candidate_rows.append({
                  "candidate_id": seeded["candidate_id"],
                  "survey_family": seeded["survey_family"],
                  "source_page_id": seeded["source_page_id"],
                  "candidate_url": seeded["candidate_url"],
                  "candidate_kind": seeded["candidate_kind"],
                  "expected_contents": seeded["expected_contents"],
                  "mapping_status": seeded["mapping_status"],
                  "usable_for_current_fsigma8_rows_now": seeded["usable_for_current_fsigma8_rows_now"],
                  "covariance_imported_now": False,
                  "pressure_score_allowed_now": False,
                  "candidate_source": "seeded_from_locator_page_links_or_known_product_roots"
              })

          failed_gates = []
          warnings = []

          exact_nonempty_candidates = [row for row in candidate_rows if row["candidate_url"]]
          boss_candidates = [row for row in candidate_rows if row["survey_family"] == "BOSS_DR12" and row["candidate_url"]]
          eboss_candidates = [row for row in candidate_rows if row["survey_family"] in ["SDSS_BOSS_eBOSS", "eBOSS_DR16_or_SDSS_final"] and row["candidate_url"]]
          wigglez_unresolved = [row for row in candidate_rows if row["survey_family"] == "WiggleZ" and not row["candidate_url"]]

          if len(exact_nonempty_candidates) < 3:
              failed_gates.append("too_few_exact_candidate_paths_recorded")

          if len(boss_candidates) < 2:
              failed_gates.append("too_few_BOSS_candidate_paths_recorded")

          if len(eboss_candidates) < 1:
              failed_gates.append("eBOSS_or_SDSS_final_candidate_root_missing")

          if not wigglez_unresolved:
              failed_gates.append("WiggleZ_unresolved_status_not_preserved")

          for row in candidate_rows:
              if row["covariance_imported_now"] is not False:
                  failed_gates.append(row["candidate_id"] + "_covariance_imported_now_violation")
              if row["pressure_score_allowed_now"] is not False:
                  failed_gates.append(row["candidate_id"] + "_pressure_allowed_now_violation")
              if row["usable_for_current_fsigma8_rows_now"] is not False:
                  failed_gates.append(row["candidate_id"] + "_usable_now_without_mapping_violation")

          needed_requirements = {
              "exact_candidate_paths_recorded",
              "row_mapping_not_assumed",
              "BAO_boundary_products_labeled",
              "direct_product_not_imported",
              "wigglez_unresolved_preserved",
              "pressure_score_blocked"
          }

          present_requirements = {row["requirement_id"] for row in PRODUCT_PATH_REQUIREMENTS if row["required"] is True}
          missing_requirements = sorted(needed_requirements - present_requirements)

          for item in missing_requirements:
              failed_gates.append("missing_product_path_requirement_" + item)

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "final rsd pressure score",
              "covariance matrix was imported",
              "automatically maps",
              "full-shape products",
              "bao products",
              "wigglez",
              "likelihood"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          warnings.append("product_path_audit_does_not_import_covariance")
          warnings.append("row_mapping_still_required_before_covariance_use")
          warnings.append("WiggleZ_remains_unresolved_for_covariance_ready_status")
          warnings.append("BAO_products_remain_boundary_products")
          warnings.append("reference_uncertainty_still_missing")
          warnings.append("v4_29_RSD_preview_remains_nonfinal")

          if not any(page["fetch_ok"] for page in fetched_pages):
              warnings.append("locator_page_fetch_failed_or_network_blocked_using_seeded_candidates")

          rule_results = [
              {
                  "rule_id": "exact_candidate_paths_recorded",
                  "pass": len(exact_nonempty_candidates) >= 3,
                  "result": "candidate_paths_recorded",
                  "boundary": "Candidate paths are not covariance use."
              },
              {
                  "rule_id": "BOSS_candidate_paths_present",
                  "pass": len(boss_candidates) >= 2,
                  "result": "BOSS_candidate_paths_present",
                  "boundary": "BOSS paths still need row mapping."
              },
              {
                  "rule_id": "eBOSS_or_SDSS_final_root_present",
                  "pass": len(eboss_candidates) >= 1,
                  "result": "SDSS_final_eBOSS_root_present",
                  "boundary": "Directory/root still needs child product selection."
              },
              {
                  "rule_id": "WiggleZ_unresolved_preserved",
                  "pass": len(wigglez_unresolved) >= 1,
                  "result": "WiggleZ_unresolved_status_preserved",
                  "boundary": "WiggleZ cannot be covariance-ready yet."
              },
              {
                  "rule_id": "no_covariance_imported",
                  "pass": all(row["covariance_imported_now"] is False for row in candidate_rows),
                  "result": "no_covariance_imported",
                  "boundary": "Path audit only."
              },
              {
                  "rule_id": "no_pressure_score_allowed",
                  "pass": all(row["pressure_score_allowed_now"] is False for row in candidate_rows),
                  "result": "no_pressure_score_allowed",
                  "boundary": "No RSD pressure score."
              },
              {
                  "rule_id": "row_mapping_not_assumed",
                  "pass": all(row["usable_for_current_fsigma8_rows_now"] is False for row in candidate_rows),
                  "result": "all_candidates_require_mapping_or_remain_unusable",
                  "boundary": "Candidate products do not automatically map to current f_sigma8 rows."
              },
              {
                  "rule_id": "requirements_present",
                  "pass": len(missing_requirements) == 0,
                  "result": "all_product_path_requirements_present",
                  "boundary": "Exact paths, row mapping, BAO boundary, and no-pressure guards are explicit."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_product_path_audit_rules_passed")

          if failed_gates:
              readiness_label = "rsd_product_path_audit_failed"
              next_step = "Repair candidate product paths or mapping guards before row-mapping audit."
          else:
              readiness_label = "rsd_product_path_audit_passed_ready_for_row_mapping_audit"
              next_step = (
                  "Proceed to v4.33 RSD row mapping audit. "
                  "Do not import covariance or compute pressure until candidate products are mapped to the correct RSD row set."
              )

          system_health = {
              "locator_page_count": len(LOCATOR_PAGES),
              "locator_pages_fetched": sum(1 for page in fetched_pages if page["fetch_ok"]),
              "discovered_candidate_link_count": len(discovered_link_rows),
              "seeded_candidate_count": len(candidate_rows),
              "exact_nonempty_candidate_count": len(exact_nonempty_candidates),
              "boss_candidate_count": len(boss_candidates),
              "eboss_or_sdss_candidate_count": len(eboss_candidates),
              "wigglez_unresolved_count": len(wigglez_unresolved),
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results),
              "covariance_imported": False,
              "row_mapping_complete": False,
              "candidate_paths_usable_now": False,
              "final_pressure_score_allowed_now": False,
              "validation_claim_allowed": False
          }

          interpretation = (
              "v4.32 records exact candidate product paths and product roots for later RSD covariance work. "
              "BOSS has several exact product candidates; SDSS/eBOSS has a final cosmology product root; WiggleZ remains unresolved. "
              "No covariance is imported, no row mapping is assumed, and no pressure score is computed. "
              "The next required move is to check whether any candidate product actually maps to the current f_sigma8 rows."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "locator_pages": LOCATOR_PAGES,
              "fetched_pages": fetched_pages,
              "discovered_link_rows": discovered_link_rows,
              "seeded_product_candidates": SEEDED_PRODUCT_CANDIDATES,
              "candidate_rows": candidate_rows,
              "product_path_requirements": PRODUCT_PATH_REQUIREMENTS,
              "rule_results": rule_results,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_test_ladder": NEXT_TEST_LADDER,
              "system_health": system_health,
              "interpretation": interpretation,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "new_final_pressure_score_built": False,
                  "covariance_imported": False,
                  "row_mapping_complete": False,
                  "likelihood_run": False,
                  "refit_run": False,
                  "bic_run": False,
                  "posterior_model_comparison_run": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "locator_page_fetches_v4_32.csv",
              fetched_pages,
              ["source_page_id", "survey_scope", "url", "expected_role", "fetch_ok", "http_status", "content_type", "bytes_read", "error", "link_count"]
          )

          write_csv(
              OUTDIR / "discovered_product_links_v4_32.csv",
              discovered_link_rows,
              ["source_page_id", "link_index", "label", "url", "survey_family_guess", "product_class", "role_mapping_status", "usable_now"]
          )

          write_csv(
              OUTDIR / "candidate_product_paths_v4_32.csv",
              candidate_rows,
              [
                  "candidate_id",
                  "survey_family",
                  "source_page_id",
                  "candidate_url",
                  "candidate_kind",
                  "expected_contents",
                  "mapping_status",
                  "usable_for_current_fsigma8_rows_now",
                  "covariance_imported_now",
                  "pressure_score_allowed_now",
                  "candidate_source"
              ]
          )

          write_csv(
              OUTDIR / "product_path_requirements_v4_32.csv",
              PRODUCT_PATH_REQUIREMENTS,
              ["requirement_id", "required", "description", "failure_mode"]
          )

          write_csv(
              OUTDIR / "product_path_rule_results_v4_32.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_32.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_test_ladder_v4_32.csv",
              NEXT_TEST_LADDER,
              ["priority", "next_test", "role_focus", "purpose", "must_include", "must_not_include"]
          )

          write_csv(
              OUTDIR / "system_health_v4_32.csv",
              [system_health],
              [
                  "locator_page_count",
                  "locator_pages_fetched",
                  "discovered_candidate_link_count",
                  "seeded_candidate_count",
                  "exact_nonempty_candidate_count",
                  "boss_candidate_count",
                  "eboss_or_sdss_candidate_count",
                  "wigglez_unresolved_count",
                  "rule_pass_count",
                  "rule_total_count",
                  "covariance_imported",
                  "row_mapping_complete",
                  "candidate_paths_usable_now",
                  "final_pressure_score_allowed_now",
                  "validation_claim_allowed"
              ]
          )

          json_path = OUTDIR / "tairid_v4_32_rsd_product_path_audit.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID v4.32 — RSD Product Path Audit")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("Exact candidate RSD product paths were recorded, but no covariance was imported and no row mapping is assumed.")
          md.append("")
          md.append("BOSS has candidate products. SDSS/eBOSS has a final product root. WiggleZ remains unresolved. The next step is row mapping.")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Candidate product paths")
          md.append("")
          md.append("| Candidate | Survey | Kind | Mapping status | Usable now |")
          md.append("|---|---|---|---|---:|")
          for row in candidate_rows:
              md.append(
                  f"| `{row['candidate_id']}` | `{row['survey_family']}` | `{row['candidate_kind']}` | "
                  f"`{row['mapping_status']}` | `{row['usable_for_current_fsigma8_rows_now']}` |"
              )
          md.append("")
          md.append("## Rule results")
          md.append("")
          md.append("| Rule | Pass | Result | Boundary |")
          md.append("|---|---:|---|---|")
          for row in rule_results:
              md.append(f"| `{row['rule_id']}` | `{row['pass']}` | `{row['result']}` | {row['boundary']} |")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `locator_page_fetches_v4_32.csv`")
          md.append("- `discovered_product_links_v4_32.csv`")
          md.append("- `candidate_product_paths_v4_32.csv`")
          md.append("- `product_path_requirements_v4_32.csv`")
          md.append("- `product_path_rule_results_v4_32.csv`")
          md.append("- `blocked_claims_v4_32.csv`")
          md.append("- `next_test_ladder_v4_32.csv`")
          md.append("- `system_health_v4_32.csv`")
          md.append("- `tairid_v4_32_rsd_product_path_audit.json`")
          md.append("- `tairid_v4_32_rsd_product_path_audit.md`")
          md.append("")

          md_path = OUTDIR / "tairid_v4_32_rsd_product_path_audit.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.32 RSD product path audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-32-rsd-product-path-audit
          path: artifacts/tairid_v4_32_rsd_product_path_audit/
