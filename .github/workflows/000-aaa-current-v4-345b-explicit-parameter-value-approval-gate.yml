name: "!!! AAA CURRENT - TAIRID v4.345B explicit parameter value approval gate"

on:
  workflow_dispatch:
    inputs:
      human_approves_v4_344_staged_parameter_values:
        description: "Human explicitly approves the three staged parameter values from v4.344? This approves parameter values only, not baseline, observed scoring, or support."
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"

jobs:
  run-v4-345b-explicit-parameter-value-approval-gate:
    name: "!!! AAA CURRENT - Run v4.345B explicit parameter value approval gate"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      HUMAN_APPROVES_V4_344_VALUES: ${{ github.event.inputs.human_approves_v4_344_staged_parameter_values }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.344 input ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.344 output ZIP by pattern..."
          INPUT_344_ZIP="$(ls tairid-v4-344-value-review-decision-ingest-no-parameter-approval-no-baseline-no-scoring-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_344_ZIP" ]; then
            echo "Could not find v4.344 output ZIP."
            echo "Expected a file like:"
            echo "tairid-v4-344-value-review-decision-ingest-no-parameter-approval-no-baseline-no-scoring-output.zip"
            exit 1
          fi

          echo "Using v4.344 ZIP:"
          echo "$INPUT_344_ZIP"
          echo "INPUT_344_ZIP=$INPUT_344_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.345B approval gate script
        run: |
          cat > run_v4_345b_explicit_parameter_value_approval_gate.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "parameter values may be explicitly approved here; no numeric baseline approval; no observed scoring; no support claims"

          CORE_VALUE_PARAMETERS = {"omega_m0", "sigma8_0", "growth_index_gamma"}

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def main():
              input_344 = Path(os.environ["INPUT_344_ZIP"])
              human_approves = os.environ.get("HUMAN_APPROVES_V4_344_VALUES", "no").strip().lower()
              human_approval_recorded = human_approves == "yes"

              outdir = Path("tairid_v4_345b_explicit_parameter_value_approval_gate_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base344 = extract_zip(input_344, "tairid_v4_345b_344_")

              summary344_path = find_one(base344, "v4_344_summary.json")
              staging_path = find_one(base344, "v4_344_parameter_value_approval_gate_staging_NOT_APPROVED.csv")
              ingest_path = find_one(base344, "v4_344_value_review_decision_ingest_ledger_NO_PARAMETER_APPROVAL_NO_SCORING.csv")
              gap_status_path = find_one(base344, "v4_344_gap_status_after_value_review_decision_ingest_no_scoring.csv")
              rules344_path = find_one(base344, "v4_344_rule_checks.csv")

              summary344 = json.loads(summary344_path.read_text())
              staging = pd.read_csv(staging_path)
              ingest = pd.read_csv(ingest_path)
              gap_status = pd.read_csv(gap_status_path)
              rules344 = pd.read_csv(rules344_path)

              approval_rows = []

              for _, row in staging.iterrows():
                  parameter = clean(row["parameter_or_method"])
                  candidate_numeric_value = clean(row["candidate_numeric_value"])
                  candidate_value_text = clean(row["candidate_value_text_as_written"])
                  candidate_uncertainty = clean(row["candidate_uncertainty_text"])
                  candidate_source_url = clean(row["candidate_source_url"])
                  candidate_quote = clean(row["candidate_exact_quote"])
                  candidate_definition_context = clean(row["candidate_definition_context"])

                  if human_approval_recorded:
                      approval_status = "parameter_value_approved"
                      parameter_value_approved_now = True
                  else:
                      approval_status = "blocked_pending_explicit_human_approval"
                      parameter_value_approved_now = False

                  approval_rows.append({
                      "v4_345b_parameter_value_id": f"v4_345b_param_value_{len(approval_rows)+1:03d}",
                      "question_id": clean(row["question_id"]),
                      "parameter_or_method": parameter,
                      "approved_parameter_value": candidate_numeric_value if human_approval_recorded else "",
                      "approved_parameter_value_text": candidate_value_text if human_approval_recorded else "",
                      "approved_parameter_uncertainty_text": candidate_uncertainty if human_approval_recorded else "",
                      "approved_source_url": candidate_source_url if human_approval_recorded else "",
                      "approved_source_quote": candidate_quote if human_approval_recorded else "",
                      "approved_definition_context": candidate_definition_context if human_approval_recorded else "",
                      "human_approval_input": human_approves,
                      "human_approval_recorded": human_approval_recorded,
                      "approval_status": approval_status,
                      "approval_scope": "parameter_value_approval_only_no_baseline_no_observed_scoring_no_support",
                      "parameter_value_approved_now": parameter_value_approved_now,
                      "numeric_baseline_approved_now": False,
                      "numeric_baseline_values_filled": False,
                      "observed_values_loaded": False,
                      "definition_match_confirmed": False,
                      "score_valid": False,
                      "support_allowed": False,
                      "claim_boundary": CLAIM_BOUNDARY,
                  })

              approval_ledger = pd.DataFrame(approval_rows)
              approved_values = approval_ledger[approval_ledger["parameter_value_approved_now"].astype(bool)].copy()

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_345B_GAP_001",
                      "gap": "Explicit parameter value approval gate.",
                      "status_after_v4_345b": "closed_parameter_values_approved" if human_approval_recorded else "blocked_pending_human_approval",
                      "next_gate": "numeric_baseline_candidate_builder" if human_approval_recorded else "rerun_v4_345b_with_human_approval_yes_if_accepted",
                  },
                  {
                      "gap_id": "V4_345B_GAP_002",
                      "gap": "Numeric baseline approval.",
                      "status_after_v4_345b": "still_blocked",
                      "next_gate": "v4_346_numeric_baseline_candidate_builder",
                  },
                  {
                      "gap_id": "V4_345B_GAP_003",
                      "gap": "Observed SDSS RSD values loaded.",
                      "status_after_v4_345b": "still_blocked",
                      "next_gate": "later_observed_data_gate",
                  },
                  {
                      "gap_id": "V4_345B_GAP_004",
                      "gap": "Definition/covariance match confirmed.",
                      "status_after_v4_345b": "still_blocked",
                      "next_gate": "later_definition_covariance_gate",
                  },
                  {
                      "gap_id": "V4_345B_GAP_005",
                      "gap": "Support claims.",
                      "status_after_v4_345b": "still_blocked",
                      "next_gate": "later_support_interpretation_gate_only_after_scoring",
                  },
              ])

              hard_checks = {
                  "input_v4_344_summary_found": summary344.get("version") == "v4.344",
                  "input_v4_344_rules_all_passed": summary_rules_all_passed(summary344),
                  "input_v4_344_failed_gates_none": summary344.get("failed_gates") == "none",
                  "input_v4_344_no_parameter_approval_yet": summary344.get("parameter_values_approved") is False,
                  "input_v4_344_no_numeric_baseline_approval": summary344.get("numeric_baseline_values_filled") is False and summary344.get("approved_baseline_values") == 0,
                  "input_v4_344_no_observed_values_loaded": summary344.get("observed_values_loaded") is False,
                  "input_v4_344_no_definition_match_confirmed": summary344.get("definition_match_confirmed") is False,
                  "input_v4_344_no_score_valid": summary344.get("score_valid") is False,
                  "input_v4_344_no_support_allowed": summary344.get("support_allowed") is False,

                  "rules344_all_passed": rules344["passed"].astype(bool).all(),
                  "staging_rows_equal_3": len(staging) == 3,
                  "ingest_rows_equal_3": len(ingest) == 3,
                  "gap_status_rows_equal_5": len(gap_status) == 5,
                  "all_core_parameters_present": CORE_VALUE_PARAMETERS.issubset(set(staging["parameter_or_method"].apply(clean))),
                  "all_staging_rows_ready_for_approval_gate": staging["ready_for_v4_345_parameter_value_approval_gate"].astype(bool).all(),
                  "candidate_numeric_values_present_all_rows": staging["candidate_numeric_value"].apply(clean).ne("").all(),
                  "candidate_quotes_present_all_rows": staging["candidate_exact_quote"].apply(clean).ne("").all(),
                  "candidate_source_urls_present_all_rows": staging["candidate_source_url"].apply(clean).ne("").all(),

                  "human_approval_input_valid": human_approves in ["yes", "no"],
                  "approval_ledger_rows_equal_3": len(approval_ledger) == 3,
                  "approved_value_rows_correct_for_input": len(approved_values) == (3 if human_approval_recorded else 0),
                  "approved_values_have_all_core_parameters_if_yes": (CORE_VALUE_PARAMETERS.issubset(set(approved_values["parameter_or_method"])) if human_approval_recorded else True),
                  "approved_values_nonblank_if_yes": (approved_values["approved_parameter_value"].apply(clean).ne("").all() if human_approval_recorded else True),

                  "numeric_baseline_approval_false": false_col(approval_ledger, "numeric_baseline_approved_now"),
                  "numeric_baseline_values_filled_false": false_col(approval_ledger, "numeric_baseline_values_filled"),
                  "observed_values_loaded_false": false_col(approval_ledger, "observed_values_loaded"),
                  "definition_match_confirmed_false": false_col(approval_ledger, "definition_match_confirmed"),
                  "score_valid_false": false_col(approval_ledger, "score_valid"),
                  "support_allowed_false": false_col(approval_ledger, "support_allowed"),
                  "gap_update_rows_equal_5": len(gap_update) == 5,
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              if human_approval_recorded:
                  expected_result = "v4_345b_explicit_parameter_value_approval_gate_passed_parameter_values_approved_no_baseline_no_scoring_no_claims"
                  selected_next_route = "v4_346_numeric_baseline_candidate_builder_no_observed_scoring_no_support_claims"
              else:
                  expected_result = "v4_345b_blocked_pending_explicit_human_parameter_value_approval_no_baseline_no_scoring_no_claims"
                  selected_next_route = "rerun_v4_345b_with_human_approves_v4_344_staged_parameter_values_yes_if_human_accepts"

              summary345b = {
                  "version": "v4.345B",
                  "route_name": "v4_345b_explicit_parameter_value_approval_gate",
                  "expected_result": expected_result,
                  "input_version": "v4.344",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "human_approval_input": human_approves,
                  "human_approval_recorded": human_approval_recorded,
                  "approved_parameter_value_rows": int(len(approved_values)),
                  "parameter_values_approved": bool(human_approval_recorded),
                  "numeric_baseline_values_filled": False,
                  "approved_baseline_values": 0,
                  "numeric_baseline_approved": False,
                  "observed_values_loaded": False,
                  "definition_match_confirmed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": selected_next_route,
              }

              approval_ledger.to_csv(outdir / "v4_345b_parameter_value_approval_ledger.csv", index=False)
              approved_values.to_csv(outdir / "v4_345b_APPROVED_PARAMETER_VALUES_NO_BASELINE_NO_SCORING.csv", index=False)
              gap_update.to_csv(outdir / "v4_345b_gap_status_after_parameter_value_approval_gate.csv", index=False)
              staging.to_csv(outdir / "v4_345b_input_v4_344_staging_preserved.csv", index=False)
              ingest.to_csv(outdir / "v4_345b_input_v4_344_ingest_ledger_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_345b_rule_checks.csv", index=False)

              (outdir / "v4_345b_summary.json").write_text(json.dumps(summary345b, indent=2))

              summary_md = f"""# TAIRID v4.345B Explicit Parameter Value Approval Gate

          Expected result: `{summary345b["expected_result"]}`

          {summary345b["rules_passed"]} / {summary345b["rules_total"]} rules passed

          failed_gates = {summary345b["failed_gates"]}

          human_approval_input = `{human_approves}`

          human_approval_recorded = `{human_approval_recorded}`

          approved_parameter_value_rows = {summary345b["approved_parameter_value_rows"]}

          parameter_values_approved = {summary345b["parameter_values_approved"]}

          Claim boundary: {CLAIM_BOUNDARY}.

          This step may approve parameter values only when the human input is `yes`.

          It does **not** approve a numeric baseline.

          It does **not** load observed SDSS RSD values.

          It does **not** compute residuals, chi-square, likelihood, p-values, or scores.

          It does **not** make support claims.

          Next route: `{selected_next_route}`
          """
              (outdir / "v4_345b_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary345b, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_345b_explicit_parameter_value_approval_gate.py

      - name: Run v4.345B explicit parameter value approval gate
        run: |
          python run_v4_345b_explicit_parameter_value_approval_gate.py

      - name: Upload v4.345B parameter value approval artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-345b-explicit-parameter-value-approval-gate-output
          path: |
            tairid_v4_345b_explicit_parameter_value_approval_gate_output/
            tairid_v4_345b_explicit_parameter_value_approval_gate_output.zip
