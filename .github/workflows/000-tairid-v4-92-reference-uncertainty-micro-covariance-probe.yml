name: 000 TAIRID v4.92 Reference Uncertainty Micro Covariance Probe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-92-reference-uncertainty-micro-covariance-probe.yml"

jobs:
  tairid-v4-92-reference-uncertainty-micro-covariance-probe:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.92 reference uncertainty micro covariance probe
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_92_reference_uncertainty_micro_covariance_probe

          python - <<'PY'
          import base64, csv, json, math, zlib
          from datetime import datetime, timezone
          from pathlib import Path
          OUTDIR=Path("artifacts/tairid_v4_92_reference_uncertainty_micro_covariance_probe")
          OUTDIR.mkdir(parents=True, exist_ok=True)
          RUN_ID="tairid_v4_92_reference_uncertainty_micro_covariance_probe"
          SAMPLES=json.loads(zlib.decompress(base64.b64decode("""""")).decode())
          SCHEMA=[(0,"sigma8z",0.15,"sigma8z015"),(1,"fsigma8",0.15,"fsigma8z015"),(2,"sigma8z",0.38,"sigma8z038"),(3,"fsigma8",0.38,"fsigma8z038"),(4,"sigma8z",0.51,"sigma8z051"),(5,"fsigma8",0.51,"fsigma8z051"),(6,"sigma8z",0.61,"sigma8z061"),(7,"fsigma8",0.61,"fsigma8z061"),(8,"sigma8z",2.33,"sigma8z233"),(9,"fsigma8",2.33,"fsigma8z233")]
          FSIGMA8_POS=[1,3,5,7,9]
          TRUTH_BOUNDARY=["This is not a TAIRID validation test.","This does not prove new physics, solve H0, or disprove standard cosmology.","This does not compute final RSD pressure, BIC, likelihood, posterior comparison, or model selection.","This does not download the full Planck fullGrid zip, import full Planck chains, parse more chain files, or run CAMB.","This computes only a tiny 12-sample weighted mean/covariance mechanics diagnostic from v4.90 output vectors.","This is not final Planck reference uncertainty and not TAIRID validation."]
          UPSTREAM_LOCKS={"v4_91_weighted_covariance_formula_lock":{"readiness_label":"weighted_covariance_formula_lock_passed_ready_for_reference_uncertainty_micro_covariance_probe","upstream_sample_output_vector_count":12,"output_vector_dimension":10,"fsigma8_positions":[1,3,5,7,9],"weighted_mean_vector_computed":False,"weighted_covariance_matrix_computed":False,"Planck_reference_uncertainty_computed":False,"final_RSD_pressure_score_computed":False},"v4_90_sample_packet_microbatch_solver_probe":{"readiness_label":"sample_packet_microbatch_solver_probe_passed_ready_for_weighted_covariance_formula_lock","sample_output_vectors_computed":True,"sample_output_vector_count":12,"all_output_vectors_complete":True,"all_weights_preserved":True,"weighted_mean_vector_computed":False,"weighted_covariance_matrix_computed":False,"Planck_reference_uncertainty_computed":False}}
          BLOCKED_CLAIMS=["Planck reference uncertainty is included.","Final Planck reference uncertainty is computed.","Full Planck chains were imported.","Full Planck chain sample files were parsed.","A full Planck posterior covariance was computed.","The 12-sample micro covariance is final Planck reference uncertainty.","A final RSD pressure score was computed.","A combined growth covariance was computed.","The micro covariance probe validates TAIRID cosmology.","Standard cosmology is disproven.","A likelihood, BIC, or posterior model comparison was run.","The 12-sample micro covariance is enough for final RSD pressure.","The tiny subset replaces the full Planck posterior.","The covariance diagnostic should be used as a publication-grade reference covariance."]
          NEXT_ROUTE_OPTIONS=[{"priority":1,"route_id":"v4_93_bounded_larger_sample_parser_design","purpose":"Design expansion from 12 parsed rows to a larger bounded sample batch while preserving weights and output-vector schema.","why_next":"The 12-sample covariance proves mechanics only; credible reference uncertainty needs more posterior support."},{"priority":2,"route_id":"v4_94_full_reference_uncertainty_scaling_plan","purpose":"Define how many chain rows/files are needed before reporting Planck reference covariance.","why_next":"Final pressure needs a credible posterior covariance, not a tiny subset diagnostic."},{"priority":3,"route_id":"v4_95_RSD_observed_covariance_rejoin_design","purpose":"Plan how Planck reference covariance will later combine with observed RSD covariance.","why_next":"Only after reference uncertainty scales can RSD pressure be rebuilt safely."},{"priority":4,"route_id":"v4_96_ELG_or_WiggleZ_parallel_backlog","purpose":"Parallel route for parked growth-family incompleteness.","why_next":"ELG and WiggleZ remain incomplete."}]
          failed_gates=[]
          warnings=["tiny_12_sample_micro_covariance_probe_only","weighted_mean_and_covariance_computed_for_mechanics_only","rank_and_sampling_limit_warning_required","not_final_Planck_reference_uncertainty","no_final_RSD_pressure","not_validation"]
          def finite(x):
              try:return math.isfinite(float(x))
              except Exception:return False
          def rank(M,tol=1e-14):
              a=[[float(v) for v in r] for r in M]
              if not a:return 0
              m,n,rnk,row=len(a),len(a[0]),0,0
              for col in range(n):
                  piv=max(range(row,m),key=lambda rr:abs(a[rr][col]))
                  if abs(a[piv][col])<=tol:continue
                  a[row],a[piv]=a[piv],a[row]; pv=a[row][col]
                  a[row]=[v/pv for v in a[row]]
                  for rr in range(m):
                      if rr!=row and abs(a[rr][col])>tol:
                          f=a[rr][col]; a[rr]=[a[rr][cc]-f*a[row][cc] for cc in range(n)]
                  rnk+=1; row+=1
                  if row==m:break
              return rnk
          def write_csv(path,rows,fields):
              with path.open("w",newline="",encoding="utf-8") as f:
                  w=csv.DictWriter(f,fieldnames=fields); w.writeheader()
                  for row in rows:w.writerow({k:row.get(k,"") for k in fields})
          n,d=len(SAMPLES),10
          weights=[float(s["w"]) for s in SAMPLES]
          vectors=[[float(v) for v in s["x"]] for s in SAMPLES]
          W=sum(weights); p=[w/W for w in weights] if W>0 else []
          Neff=W*W/sum(w*w for w in weights) if weights and sum(w*w for w in weights)>0 else 0.0
          mu=[sum(p[i]*vectors[i][j] for i in range(n)) for j in range(d)]
          C=[[sum(p[i]*(vectors[i][a]-mu[a])*(vectors[i][b]-mu[b]) for i in range(n)) for b in range(d)] for a in range(d)]
          Csym=[[(C[a][b]+C[b][a])/2 for b in range(d)] for a in range(d)]
          C5=[[Csym[a][b] for b in FSIGMA8_POS] for a in FSIGMA8_POS]
          def maxsym(M):return max(abs(M[i][j]-M[j][i]) for i in range(len(M)) for j in range(len(M))) if M else float("inf")
          def mindiag(M):return min(M[i][i] for i in range(len(M))) if M else float("inf")
          def tr(M):return sum(M[i][i] for i in range(len(M))) if M else 0.0
          sample_weight_records=[{"sample_number":s["n"],"source_line_number":s["line"],"sample_weight":s["w"],"normalized_weight":p[i],"minus_loglike_or_proxy":s["like"],"target_vector_len":len(s["x"]),"target_vector_finite":all(finite(x) and float(x)>0 for x in s["x"]),"weight_scope":"tiny_subset_weight_not_full_posterior"} for i,s in enumerate(SAMPLES)]
          mean_records=[{"position":pos,"quantity":q,"z":z,"target_name":name,"weighted_mean":mu[pos],"mean_scope":"tiny_12_sample_weighted_mean_not_final_reference_uncertainty"} for pos,q,z,name in SCHEMA]
          cov_records=[]
          for a,(_,q1,z1,n1) in enumerate(SCHEMA):
              for b,(_,q2,z2,n2) in enumerate(SCHEMA):cov_records.append({"row_position":a,"row_target_name":n1,"row_quantity":q1,"row_z":z1,"col_position":b,"col_target_name":n2,"col_quantity":q2,"col_z":z2,"covariance_value":Csym[a][b],"covariance_scope":"tiny_12_sample_micro_covariance_not_final_reference_uncertainty"})
          fsigma8_mean_records=[{"fsigma8_index":i,"full_position":pos,"z":SCHEMA[pos][2],"target_name":SCHEMA[pos][3],"weighted_mean":mu[pos],"mean_scope":"tiny_12_sample_fsigma8_mean_not_final_reference_uncertainty"} for i,pos in enumerate(FSIGMA8_POS)]
          fsigma8_cov_records=[]
          for a,pos_a in enumerate(FSIGMA8_POS):
              for b,pos_b in enumerate(FSIGMA8_POS):fsigma8_cov_records.append({"row_fsigma8_index":a,"row_full_position":pos_a,"row_target_name":SCHEMA[pos_a][3],"row_z":SCHEMA[pos_a][2],"col_fsigma8_index":b,"col_full_position":pos_b,"col_target_name":SCHEMA[pos_b][3],"col_z":SCHEMA[pos_b][2],"covariance_value":C5[a][b],"covariance_scope":"tiny_12_sample_fsigma8_micro_covariance_not_final_reference_uncertainty"})
          diag={"sample_count":n,"vector_dimension":d,"weight_total":W,"effective_sample_size":Neff,"effective_sample_size_fraction":Neff/n if n else 0.0,"full_covariance_shape":"10x10","fsigma8_covariance_shape":"5x5","full_covariance_rank_estimate":rank(Csym),"fsigma8_covariance_rank_estimate":rank(C5),"full_covariance_max_symmetry_error":maxsym(Csym),"fsigma8_covariance_max_symmetry_error":maxsym(C5),"full_covariance_min_diagonal":mindiag(Csym),"fsigma8_covariance_min_diagonal":mindiag(C5),"full_covariance_trace":tr(Csym),"fsigma8_covariance_trace":tr(C5),"rank_limited_warning_required":True,"micro_covariance_probe_passed":False,"diagnostic_scope":"tiny_12_sample_micro_covariance_mechanics_only"}
          quality=[{"gate_id":"sample_count_12","pass":n==12,"result":n,"boundary":"Tiny subset only."},{"gate_id":"weight_total_positive","pass":W>0,"result":W,"boundary":"Weight normalization only."},{"gate_id":"all_weights_positive_finite","pass":all(r["sample_weight"]>0 and finite(r["sample_weight"]) for r in sample_weight_records),"result":"checked","boundary":"Input quality only."},{"gate_id":"all_vectors_dimension_10","pass":all(len(s["x"])==10 for s in SAMPLES),"result":"checked","boundary":"Output vector shape."},{"gate_id":"all_vectors_positive_finite","pass":all(all(finite(x) and float(x)>0 for x in s["x"]) for s in SAMPLES),"result":"checked","boundary":"Output vector quality."},{"gate_id":"mean_vector_dimension_10","pass":len(mu)==10,"result":len(mu),"boundary":"Micro mean only."},{"gate_id":"full_covariance_shape_10x10","pass":len(Csym)==10 and all(len(r)==10 for r in Csym),"result":"10x10","boundary":"Micro covariance only."},{"gate_id":"fsigma8_covariance_shape_5x5","pass":len(C5)==5 and all(len(r)==5 for r in C5),"result":"5x5","boundary":"RSD sub-covariance diagnostic only."},{"gate_id":"full_covariance_symmetric","pass":maxsym(Csym)<=1e-14,"result":maxsym(Csym),"boundary":"Numerical symmetry check."},{"gate_id":"fsigma8_covariance_symmetric","pass":maxsym(C5)<=1e-14,"result":maxsym(C5),"boundary":"Numerical symmetry check."},{"gate_id":"full_covariance_nonnegative_diagonal","pass":mindiag(Csym)>=-1e-18,"result":mindiag(Csym),"boundary":"Basic covariance sanity."},{"gate_id":"fsigma8_covariance_nonnegative_diagonal","pass":mindiag(C5)>=-1e-18,"result":mindiag(C5),"boundary":"Basic covariance sanity."},{"gate_id":"trace_positive","pass":tr(Csym)>0 and tr(C5)>0,"result":f"C10={tr(Csym)}; C5={tr(C5)}","boundary":"Variation exists in tiny sample."},{"gate_id":"rank_limited_warning_preserved","pass":True,"result":f"C10_rank={diag['full_covariance_rank_estimate']}; effective_N={Neff}","boundary":"Tiny sample is mechanics-only, not final."}]
          diag["micro_covariance_probe_passed"]=all(r["pass"] for r in quality)
          accept={"micro_covariance_probe_run":True,"micro_covariance_probe_passed":diag["micro_covariance_probe_passed"],"weighted_mean_vector_computed":True,"weighted_covariance_matrix_computed":True,"fsigma8_covariance_matrix_computed":True,"sample_count":n,"target_vector_dimension":d,"effective_sample_size":Neff,"rank_limited_warning_required":True,"result_interpretation":"The weighted mean/covariance mechanics work on the tiny 12-sample subset.","not_interpretation":"This is not full Planck reference uncertainty, not final RSD pressure, and not TAIRID validation.","Planck_reference_uncertainty_computed":False,"combined_growth_covariance_computed":False,"final_RSD_pressure_score_computed":False,"TAIRID_validation_claim_allowed":False}
          if UPSTREAM_LOCKS["v4_91_weighted_covariance_formula_lock"]["Planck_reference_uncertainty_computed"] is not False:failed_gates.append("upstream_reference_uncertainty_boundary_not_carried")
          if n!=12:failed_gates.append("sample_count_not_12")
          if len(mu)!=10:failed_gates.append("mean_vector_dimension_not_10")
          if len(cov_records)!=100:failed_gates.append("covariance_long_count_not_100")
          if len(fsigma8_cov_records)!=25:failed_gates.append("fsigma8_covariance_long_count_not_25")
          if not diag["micro_covariance_probe_passed"]:failed_gates.append("micro_covariance_quality_gates_failed")
          if accept["Planck_reference_uncertainty_computed"] is not False:failed_gates.append("reference_uncertainty_computed_too_early")
          if accept["final_RSD_pressure_score_computed"] is not False:failed_gates.append("final_RSD_pressure_computed_too_early")
          blocked_text=" | ".join(BLOCKED_CLAIMS).lower()
          for phrase in ["planck reference uncertainty is included","full planck chains were imported","full planck posterior covariance was computed","12-sample micro covariance is final planck reference uncertainty","final rsd pressure score","validates tairid cosmology","12-sample micro covariance is enough for final rsd pressure","publication-grade reference covariance","bic"]:
              if phrase not in blocked_text:failed_gates.append("blocked_claim_missing_"+phrase.replace(" ","_"))
          route_decision="reference_uncertainty_micro_covariance_probe_passed_ready_for_bounded_larger_sample_parser_design"
          rule_results=[{"rule_id":"workflow_name_sorts_top","pass":True,"result":"workflow name begins with 000 TAIRID","boundary":"Navigation convenience only."},{"rule_id":"node24_opt_in_preserved","pass":True,"result":"FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved","boundary":"Warning cleanup only."},{"rule_id":"upstream_formula_lock_carried","pass":UPSTREAM_LOCKS["v4_91_weighted_covariance_formula_lock"]["upstream_sample_output_vector_count"]==12,"result":"v4.91 formula lock carried forward","boundary":"Carry-forward only."},{"rule_id":"weighted_mean_vector_computed_as_micro_probe","pass":len(mu)==10 and all(finite(x) for x in mu),"result":"10 weighted means computed","boundary":"Tiny subset diagnostic only."},{"rule_id":"full_covariance_matrix_computed_as_micro_probe","pass":len(Csym)==10 and all(len(r)==10 for r in Csym),"result":"10x10 C matrix computed","boundary":"Not final reference covariance."},{"rule_id":"fsigma8_covariance_matrix_extracted","pass":len(C5)==5 and all(len(r)==5 for r in C5),"result":"5x5 fsigma8 sub-covariance extracted","boundary":"RSD diagnostic only."},{"rule_id":"quality_gates_passed","pass":all(r["pass"] for r in quality),"result":f"{sum(1 for r in quality if r['pass'])} of {len(quality)} quality gates passed","boundary":"Mechanics only."},{"rule_id":"rank_limited_warning_preserved","pass":diag["rank_limited_warning_required"] is True,"result":f"C10 rank={diag['full_covariance_rank_estimate']}; effective N={Neff}","boundary":"Tiny subset is not final posterior support."},{"rule_id":"reference_uncertainty_still_blocked","pass":accept["Planck_reference_uncertainty_computed"] is False,"result":"Planck reference uncertainty not computed","boundary":"No final reference covariance."},{"rule_id":"final_pressure_still_blocked","pass":accept["final_RSD_pressure_score_computed"] is False,"result":"Final RSD pressure not computed","boundary":"No final growth-lane claim."},{"rule_id":"blocked_claims_preserved","pass":len(BLOCKED_CLAIMS)>=14,"result":f"{len(BLOCKED_CLAIMS)} blocked claims preserved","boundary":"No validation or final score claim."},{"rule_id":"route_decision_recorded","pass":route_decision!="","result":route_decision,"boundary":"Route decision does not compute final pressure."}]
          if not all(r["pass"] for r in rule_results):failed_gates.append("not_all_v4_92_rules_passed")
          readiness_label="reference_uncertainty_micro_covariance_probe_failed" if failed_gates else route_decision
          next_allowed_step="Repair micro covariance mechanics before scaling sample parsing." if failed_gates else "Proceed to v4.93 bounded larger sample parser design. Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
          system_health={"workflow_name_sort_prefix":"000 TAIRID","node24_opt_in_added":True,"sample_count":n,"target_vector_dimension":d,"weight_total":W,"effective_sample_size":Neff,"effective_sample_size_fraction":Neff/n if n else 0.0,"weighted_mean_vector_computed":True,"weighted_covariance_matrix_computed":True,"fsigma8_covariance_matrix_computed":True,"mean_vector_record_count":len(mean_records),"covariance_long_record_count":len(cov_records),"fsigma8_mean_record_count":len(fsigma8_mean_records),"fsigma8_covariance_long_record_count":len(fsigma8_cov_records),"quality_gate_pass_count":sum(1 for r in quality if r["pass"]),"quality_gate_total_count":len(quality),"full_covariance_rank_estimate":diag["full_covariance_rank_estimate"],"fsigma8_covariance_rank_estimate":diag["fsigma8_covariance_rank_estimate"],"rank_limited_warning_required":True,"Planck_reference_uncertainty_computed":False,"fullGrid_downloaded":False,"full_chains_imported":False,"full_chain_sample_files_parsed":False,"combined_growth_covariance_computed":False,"final_RSD_pressure_score_computed":False,"TAIRID_validation_claim_allowed":False,"rule_pass_count":sum(1 for r in rule_results if r["pass"]),"rule_total_count":len(rule_results)}
          audit={"run_id":RUN_ID,"created_at_utc":datetime.now(timezone.utc).isoformat(),"truth_boundary":TRUTH_BOUNDARY,"upstream_locks":UPSTREAM_LOCKS,"output_vector_schema":[{"position":a,"quantity":b,"z":c,"target_name":d} for a,b,c,d in SCHEMA],"sample_weight_records":sample_weight_records,"sample_output_vectors":SAMPLES,"mean_vector_records":mean_records,"covariance_long_records":cov_records,"fsigma8_mean_records":fsigma8_mean_records,"fsigma8_covariance_long_records":fsigma8_cov_records,"diagnostic_record":diag,"quality_gate_records":quality,"acceptance_record":accept,"blocked_claims":BLOCKED_CLAIMS,"next_route_options":NEXT_ROUTE_OPTIONS,"route_decision":route_decision,"rule_results":rule_results,"system_health":system_health,"gate_result":{"failed_gates":sorted(set(failed_gates)),"warnings":sorted(set(warnings)),"readiness_label":readiness_label,"next_allowed_step":next_allowed_step,"micro_covariance_probe_run":accept["micro_covariance_probe_run"],"micro_covariance_probe_passed":accept["micro_covariance_probe_passed"],"weighted_mean_vector_computed":True,"weighted_covariance_matrix_computed":True,"fsigma8_covariance_matrix_computed":True,"Planck_reference_uncertainty_computed":False,"combined_growth_covariance_computed":False,"final_RSD_pressure_score_computed":False,"TAIRID_validation_claim_allowed":False}}
          (OUTDIR/"tairid_v4_92_reference_uncertainty_micro_covariance_probe.json").write_text(json.dumps(audit,indent=2,sort_keys=True),encoding="utf-8")
          write_csv(OUTDIR/"sample_weight_records_v4_92.csv",sample_weight_records,["sample_number","source_line_number","sample_weight","normalized_weight","minus_loglike_or_proxy","target_vector_len","target_vector_finite","weight_scope"])
          write_csv(OUTDIR/"mean_vector_records_v4_92.csv",mean_records,["position","quantity","z","target_name","weighted_mean","mean_scope"])
          write_csv(OUTDIR/"covariance_long_records_v4_92.csv",cov_records,["row_position","row_target_name","row_quantity","row_z","col_position","col_target_name","col_quantity","col_z","covariance_value","covariance_scope"])
          write_csv(OUTDIR/"fsigma8_mean_records_v4_92.csv",fsigma8_mean_records,["fsigma8_index","full_position","z","target_name","weighted_mean","mean_scope"])
          write_csv(OUTDIR/"fsigma8_covariance_long_records_v4_92.csv",fsigma8_cov_records,["row_fsigma8_index","row_full_position","row_target_name","row_z","col_fsigma8_index","col_full_position","col_target_name","col_z","covariance_value","covariance_scope"])
          write_csv(OUTDIR/"diagnostic_record_v4_92.csv",[diag],list(diag.keys()))
          write_csv(OUTDIR/"quality_gate_records_v4_92.csv",quality,["gate_id","pass","result","boundary"])
          write_csv(OUTDIR/"blocked_claims_v4_92.csv",[{"blocked_claim":c} for c in BLOCKED_CLAIMS],["blocked_claim"])
          write_csv(OUTDIR/"next_route_options_v4_92.csv",NEXT_ROUTE_OPTIONS,["priority","route_id","purpose","why_next"])
          write_csv(OUTDIR/"rule_results_v4_92.csv",rule_results,["rule_id","pass","result","boundary"])
          md=["# 000 TAIRID v4.92 — Reference Uncertainty Micro Covariance Probe","",f"Created UTC: `{audit['created_at_utc']}`","","## Status","",f"Readiness label: `{readiness_label}`","",f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`","","## Plain-language result","","This workflow applies the v4.91 weighted mean/covariance formulas to the 12 tiny v4.90 sample output vectors.","","It computes a tiny weighted mean vector, a 10x10 covariance, and a 5x5 fsigma8 sub-covariance as a mechanics diagnostic only.","","This is not final Planck reference uncertainty, not final RSD pressure, not likelihood/BIC/model comparison, and not TAIRID validation.","","## Acceptance record","","| Check | Value |","|---|---|"]
          for k,v in accept.items():md.append(f"| `{k}` | `{v}` |")
          md += ["","## Weighted mean vector","","| Position | z | Quantity | Target | Weighted mean |","|---:|---:|---|---|---:|"]
          for r in mean_records:md.append(f"| `{r['position']}` | `{r['z']}` | `{r['quantity']}` | `{r['target_name']}` | `{r['weighted_mean']}` |")
          md += ["","## System health","","| Check | Value |","|---|---|"]
          for k,v in system_health.items():md.append(f"| `{k}` | `{v}` |")
          md += ["","## Route decision","",f"`{route_decision}`","","## Next allowed step","",next_allowed_step,"","## Files produced",""]
          for fn in ["tairid_v4_92_reference_uncertainty_micro_covariance_probe.json","tairid_v4_92_reference_uncertainty_micro_covariance_probe.md","sample_weight_records_v4_92.csv","mean_vector_records_v4_92.csv","covariance_long_records_v4_92.csv","fsigma8_mean_records_v4_92.csv","fsigma8_covariance_long_records_v4_92.csv","diagnostic_record_v4_92.csv","quality_gate_records_v4_92.csv","blocked_claims_v4_92.csv","next_route_options_v4_92.csv","rule_results_v4_92.csv"]:md.append(f"- `{fn}`")
          (OUTDIR/"tairid_v4_92_reference_uncertainty_micro_covariance_probe.md").write_text("\n".join(md),encoding="utf-8")
          print("Gate result:");print(json.dumps(audit["gate_result"],indent=2));print();print("System health:");print(json.dumps(system_health,indent=2));print();print("Wrote artifacts into:");print(f"  {OUTDIR}")
          if failed_gates:raise SystemExit(2)
          raise SystemExit(0)
          PY

      - name: Upload TAIRID v4.92 reference uncertainty micro covariance probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-92-reference-uncertainty-micro-covariance-probe
          path: artifacts/tairid_v4_92_reference_uncertainty_micro_covariance_probe/
