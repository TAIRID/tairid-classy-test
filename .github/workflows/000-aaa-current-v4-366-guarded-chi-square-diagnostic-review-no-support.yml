name: "!!! AAA CURRENT - TAIRID v4.366 guarded chi-square diagnostic review no support"

on:
  workflow_dispatch:

jobs:
  run-v4-366-guarded-chi-square-diagnostic-review-no-support:
    name: "!!! AAA CURRENT - Run v4.366 guarded chi-square diagnostic review"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Find v4.365 output ZIP and human-filled chi-square review ZIP
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root files:"
          ls -la

          echo "Finding v4.365 output ZIP..."
          INPUT_365_ZIP="$(ls tairid-v4-365-guarded-diagonal-chi-square-dry-run-no-likelihood-no-support-output*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$INPUT_365_ZIP" ]; then
            echo "Could not find v4.365 output ZIP."
            echo "Expected:"
            echo "tairid-v4-365-guarded-diagonal-chi-square-dry-run-no-likelihood-no-support-output.zip"
            exit 1
          fi

          echo "Finding human-filled v4.365 chi-square review ZIP..."
          HUMAN_FILLED_CHI_SQUARE_REVIEW_ZIP="$(ls tairid-v4-365-human-filled-guarded-chi-square-review-for-v4-366-no-support*.zip 2>/dev/null | head -n 1 || true)"

          if [ -z "$HUMAN_FILLED_CHI_SQUARE_REVIEW_ZIP" ]; then
            echo "Could not find human-filled chi-square review ZIP."
            echo "Expected:"
            echo "tairid-v4-365-human-filled-guarded-chi-square-review-for-v4-366-no-support.zip"
            exit 1
          fi

          echo "Using v4.365 ZIP:"
          echo "$INPUT_365_ZIP"

          echo "Using human-filled chi-square review ZIP:"
          echo "$HUMAN_FILLED_CHI_SQUARE_REVIEW_ZIP"

          echo "INPUT_365_ZIP=$INPUT_365_ZIP" >> "$GITHUB_ENV"
          echo "HUMAN_FILLED_CHI_SQUARE_REVIEW_ZIP=$HUMAN_FILLED_CHI_SQUARE_REVIEW_ZIP" >> "$GITHUB_ENV"

      - name: Write self-contained v4.366 diagnostic review script
        run: |
          cat > run_v4_366_guarded_chi_square_diagnostic_review_no_support.py <<'PY'
          #!/usr/bin/env python3

          import json
          import zipfile
          import shutil
          import tempfile
          import os
          from pathlib import Path
          from datetime import datetime, timezone
          import pandas as pd

          CLAIM_BOUNDARY = "guarded diagonal chi-square diagnostic may be reviewed here for external audit staging only; no full covariance; no likelihood; no p-values; score_valid remains false; no support claims"

          ALLOWED_REVIEW_DECISIONS = {
              "approve_guarded_chi_square_diagnostic_for_external_audit",
              "needs_residual_repair",
              "needs_full_covariance_first",
              "keep_blocked",
          }

          def extract_zip(path: Path, prefix: str) -> Path:
              tmp = Path(tempfile.mkdtemp(prefix=prefix))
              with zipfile.ZipFile(path, "r") as z:
                  z.extractall(tmp)

              for nested_zip in list(tmp.rglob("*.zip")):
                  try:
                      nested_out = tmp / (nested_zip.stem + "_unzipped")
                      nested_out.mkdir(exist_ok=True)
                      with zipfile.ZipFile(nested_zip, "r") as z2:
                          z2.extractall(nested_out)
                  except zipfile.BadZipFile:
                      pass

              return tmp

          def find_one(base: Path, filename: str) -> Path:
              matches = list(base.rglob(filename))
              if not matches:
                  raise FileNotFoundError(f"Could not find {filename}")
              return matches[0]

          def find_one_suffix(base: Path, suffix: str) -> Path:
              matches = [p for p in base.rglob("*") if p.is_file() and p.name.endswith(suffix)]
              if not matches:
                  raise FileNotFoundError(f"Could not find file ending with {suffix}")
              return matches[0]

          def clean(value):
              if pd.isna(value):
                  return ""
              return str(value).strip()

          def false_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["false", "0", "", "nan", "none"]).all()

          def true_col(df, col):
              if col not in df.columns:
                  return False
              return df[col].fillna(False).astype(str).str.strip().str.lower().isin(["true", "1", "yes"]).all()

          def summary_rules_all_passed(summary):
              try:
                  return int(summary.get("rules_passed")) == int(summary.get("rules_total"))
              except Exception:
                  return False

          def main():
              input_365 = Path(os.environ["INPUT_365_ZIP"])
              human_zip = Path(os.environ["HUMAN_FILLED_CHI_SQUARE_REVIEW_ZIP"])

              outdir = Path("tairid_v4_366_guarded_chi_square_diagnostic_review_no_support_output")
              if outdir.exists():
                  shutil.rmtree(outdir)
              outdir.mkdir(parents=True)

              base365 = extract_zip(input_365, "tairid_v4_366_365_")
              basehuman = extract_zip(human_zip, "tairid_v4_366_human_")

              summary365_path = find_one(base365, "v4_365_summary.json")
              chi_terms_path = find_one(base365, "v4_365_guarded_diagonal_chi_square_DRY_RUN_NO_LIKELIHOOD_NO_SUPPORT.csv")
              computed_terms_path = find_one(base365, "v4_365_COMPUTED_CHI_SQUARE_TERMS_GUARDED_DIAGONAL_ONLY.csv")
              diagnostic_summary_path = find_one(base365, "v4_365_guarded_diagonal_chi_square_summary_NO_P_VALUES_NO_SUPPORT.csv")
              blank_review_path = find_one(base365, "v4_365_HUMAN_FILL_guarded_chi_square_diagnostic_review_NO_SUPPORT.csv")
              boundary365_path = find_one(base365, "v4_365_boundary_no_likelihood_no_p_values_no_support.csv")
              gap365_path = find_one(base365, "v4_365_gap_status_after_guarded_chi_square_dry_run.csv")
              readiness365_path = find_one(base365, "v4_365_input_v4_364_chi_square_readiness_preserved.csv")
              rules365_path = find_one(base365, "v4_365_rule_checks.csv")

              human_review_path = find_one_suffix(basehuman, "HUMAN_FILLED_guarded_chi_square_diagnostic_review_NO_SUPPORT.csv")

              summary365 = json.loads(summary365_path.read_text())
              chi_terms = pd.read_csv(chi_terms_path)
              computed_terms = pd.read_csv(computed_terms_path)
              diagnostic_summary = pd.read_csv(diagnostic_summary_path)
              blank_review = pd.read_csv(blank_review_path)
              boundary365 = pd.read_csv(boundary365_path)
              gap365 = pd.read_csv(gap365_path)
              readiness365 = pd.read_csv(readiness365_path)
              rules365 = pd.read_csv(rules365_path)
              human_review = pd.read_csv(human_review_path)

              for col in [
                  "human_guarded_chi_square_review_decision",
                  "human_guarded_chi_square_review_note",
                  "human_diagonal_only_warning_acknowledgement",
              ]:
                  if col not in human_review.columns:
                      human_review[col] = ""

              decision = clean(human_review.iloc[0]["human_guarded_chi_square_review_decision"]) if len(human_review) else ""
              warning_ack = clean(human_review.iloc[0]["human_diagonal_only_warning_acknowledgement"]) if len(human_review) else ""

              diagnostic_review_approved = decision == "approve_guarded_chi_square_diagnostic_for_external_audit"

              if diagnostic_review_approved:
                  review_status = "guarded_chi_square_diagnostic_approved_for_external_audit_no_support"
                  selected_next_route = "v4_367_external_ai_audit_packet_through_guarded_diagnostic_no_support_claims"
              elif decision == "needs_full_covariance_first":
                  review_status = "blocked_needs_full_covariance_first"
                  selected_next_route = "full_covariance_repair_lane_before_external_audit"
              elif decision == "needs_residual_repair":
                  review_status = "blocked_needs_residual_repair"
                  selected_next_route = "return_to_residual_repair_lane"
              else:
                  review_status = "blocked_or_invalid_guarded_chi_square_review"
                  selected_next_route = "repair_human_chi_square_review_then_rerun_v4_366"

              guarded_chi_square_sum = float(summary365.get("guarded_diagonal_chi_square_sum"))
              dof_candidate = int(summary365.get("degrees_of_freedom_candidate"))
              chi_term_rows = int(summary365.get("chi_square_term_rows"))

              review_ledger = pd.DataFrame([{
                  "v4_366_review_id": "v4_366_guarded_chi_square_review_001",
                  "human_guarded_chi_square_review_decision": decision,
                  "human_guarded_chi_square_review_note": clean(human_review.iloc[0]["human_guarded_chi_square_review_note"]) if len(human_review) else "",
                  "human_diagonal_only_warning_acknowledgement": warning_ack,
                  "review_status": review_status,
                  "diagnostic_review_approved_for_external_audit": bool(diagnostic_review_approved),
                  "guarded_diagonal_chi_square_sum": guarded_chi_square_sum,
                  "degrees_of_freedom_candidate": dof_candidate,
                  "chi_square_term_rows": chi_term_rows,
                  "covariance_scope": "guarded_diagonal_diagnostic_only",
                  "full_covariance_available": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
              }])

              audit_staging = pd.DataFrame([{
                  "audit_stage_id": "V4_366_AUDIT_STAGE_001",
                  "audit_packet_scope": "through_v4_365_guarded_diagonal_chi_square_diagnostic",
                  "guarded_diagonal_chi_square_sum": guarded_chi_square_sum,
                  "degrees_of_freedom_candidate": dof_candidate,
                  "chi_square_term_rows": chi_term_rows,
                  "included_rows": int(len(computed_terms)),
                  "include_parameter_baseline_history": True,
                  "include_observed_loading_history": True,
                  "include_definition_covariance_history": True,
                  "include_prediction_residual_history": True,
                  "include_guarded_chi_square_terms": True,
                  "full_covariance_available": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "external_audit_ready": bool(diagnostic_review_approved),
                  "claim_boundary": CLAIM_BOUNDARY,
              }])

              interpretation_limits = pd.DataFrame([
                  {
                      "limit_id": "V4_366_LIMIT_001",
                      "plain_language_limit": "This is a guarded diagonal chi-square diagnostic only.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_366_LIMIT_002",
                      "plain_language_limit": "The run did not use a full covariance matrix.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_366_LIMIT_003",
                      "plain_language_limit": "The run did not compute likelihood or p-values.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_366_LIMIT_004",
                      "plain_language_limit": "score_valid remains false because this is not a full scoring stage.",
                      "status": "active_limit",
                  },
                  {
                      "limit_id": "V4_366_LIMIT_005",
                      "plain_language_limit": "support_allowed remains false; no support claim is allowed from v4.366.",
                      "status": "active_limit",
                  },
              ])

              gap_update = pd.DataFrame([
                  {
                      "gap_id": "V4_366_GAP_001",
                      "gap": "Guarded chi-square diagnostic reviewed for external audit.",
                      "status_after_v4_366": review_status,
                      "next_gate": selected_next_route,
                  },
                  {
                      "gap_id": "V4_366_GAP_002",
                      "gap": "Full covariance remains unavailable.",
                      "status_after_v4_366": "guarded_diagonal_only",
                      "next_gate": "full_covariance_repair_lane_if_needed",
                  },
                  {
                      "gap_id": "V4_366_GAP_003",
                      "gap": "Likelihood and p-values remain uncomputed.",
                      "status_after_v4_366": "still_blocked",
                      "next_gate": "later_likelihood_or_p_value_gate_if_allowed",
                  },
                  {
                      "gap_id": "V4_366_GAP_004",
                      "gap": "Validated score remains unavailable.",
                      "status_after_v4_366": "score_valid_false",
                      "next_gate": "later_score_gate_only_if_truth_boundary_allows",
                  },
                  {
                      "gap_id": "V4_366_GAP_005",
                      "gap": "Support claims remain blocked.",
                      "status_after_v4_366": "still_blocked",
                      "next_gate": "external_audit_packet_no_support_claims",
                  },
              ])

              hard_checks = {
                  "input_v4_365_summary_found": summary365.get("version") == "v4.365",
                  "input_v4_365_rules_all_passed": summary_rules_all_passed(summary365),
                  "input_v4_365_failed_gates_none": summary365.get("failed_gates") == "none",
                  "input_v4_365_chi_square_computed_true": summary365.get("chi_square_computed") is True,
                  "input_v4_365_no_likelihood": summary365.get("likelihood_computed") is False,
                  "input_v4_365_no_p_values": summary365.get("p_values_computed") is False,
                  "input_v4_365_no_full_covariance": summary365.get("full_covariance_available") is False,
                  "input_v4_365_no_score_valid": summary365.get("score_valid") is False,
                  "input_v4_365_no_support_allowed": summary365.get("support_allowed") is False,

                  "rules365_all_passed": rules365["passed"].astype(bool).all(),
                  "chi_terms_rows_match_summary": len(chi_terms) == int(summary365.get("chi_square_term_rows")),
                  "computed_terms_rows_match_summary": len(computed_terms) == int(summary365.get("chi_square_term_computed_rows")),
                  "diagnostic_summary_rows_equal_6": len(diagnostic_summary) == 6,
                  "blank_review_rows_equal_1": len(blank_review) == 1,
                  "human_review_rows_equal_1": len(human_review) == 1,
                  "boundary365_rows_equal_5": len(boundary365) == 5,
                  "gap365_rows_equal_5": len(gap365) == 5,
                  "readiness365_rows_match_terms": len(readiness365) == len(chi_terms),

                  "human_review_decision_filled": decision != "",
                  "human_review_decision_allowed": decision in ALLOWED_REVIEW_DECISIONS,
                  "diagonal_warning_acknowledged": warning_ack != "",
                  "diagnostic_review_approved": bool(diagnostic_review_approved),
                  "review_ledger_rows_equal_1": len(review_ledger) == 1,
                  "audit_staging_rows_equal_1": len(audit_staging) == 1,
                  "interpretation_limits_rows_equal_5": len(interpretation_limits) == 5,
                  "gap_update_rows_equal_5": len(gap_update) == 5,

                  "computed_terms_all_chi_square_terms_computed": true_col(computed_terms, "chi_square_term_computed"),
                  "computed_terms_chi_square_computed_true": true_col(computed_terms, "chi_square_computed"),
                  "likelihood_computed_false": false_col(computed_terms, "likelihood_computed") and false_col(review_ledger, "likelihood_computed"),
                  "p_values_computed_false": false_col(computed_terms, "p_values_computed") and false_col(review_ledger, "p_values_computed"),
                  "full_covariance_available_false": false_col(computed_terms, "full_covariance_available") and false_col(review_ledger, "full_covariance_available"),
                  "score_valid_false": false_col(computed_terms, "score_valid") and false_col(review_ledger, "score_valid"),
                  "support_allowed_false": false_col(computed_terms, "support_allowed") and false_col(review_ledger, "support_allowed"),
              }

              rule_checks = pd.DataFrame([
                  {"gate": k, "passed": bool(v)} for k, v in hard_checks.items()
              ])
              failed = rule_checks.loc[~rule_checks["passed"], "gate"].tolist()

              summary366 = {
                  "version": "v4.366",
                  "route_name": "v4_366_guarded_chi_square_diagnostic_review_no_support_claims",
                  "expected_result": "v4_366_guarded_chi_square_diagnostic_review_passed_external_audit_ready_no_support_claims",
                  "input_version": "v4.365",
                  "created_utc": datetime.now(timezone.utc).isoformat(),
                  "rules_passed": int(rule_checks["passed"].sum()),
                  "rules_total": int(len(rule_checks)),
                  "failed_gates": "none" if not failed else "|".join(failed),
                  "readiness_status": review_status,
                  "guarded_diagonal_chi_square_sum": guarded_chi_square_sum,
                  "degrees_of_freedom_candidate": dof_candidate,
                  "chi_square_term_rows": chi_term_rows,
                  "diagnostic_review_approved_for_external_audit": bool(diagnostic_review_approved),
                  "external_audit_ready": bool(diagnostic_review_approved),
                  "full_covariance_available": False,
                  "likelihood_computed": False,
                  "p_values_computed": False,
                  "score_valid": False,
                  "support_allowed": False,
                  "claim_boundary": CLAIM_BOUNDARY,
                  "selected_next_route": selected_next_route,
              }

              review_ledger.to_csv(outdir / "v4_366_guarded_chi_square_diagnostic_review_ledger_NO_SUPPORT.csv", index=False)
              audit_staging.to_csv(outdir / "v4_366_external_ai_audit_staging_NO_SUPPORT.csv", index=False)
              interpretation_limits.to_csv(outdir / "v4_366_interpretation_limits_NO_SUPPORT.csv", index=False)
              gap_update.to_csv(outdir / "v4_366_gap_status_after_diagnostic_review.csv", index=False)
              human_review.to_csv(outdir / "v4_366_input_human_filled_chi_square_review_preserved.csv", index=False)
              computed_terms.to_csv(outdir / "v4_366_input_v4_365_computed_chi_square_terms_preserved.csv", index=False)
              diagnostic_summary.to_csv(outdir / "v4_366_input_v4_365_chi_square_summary_preserved.csv", index=False)
              rule_checks.to_csv(outdir / "v4_366_rule_checks.csv", index=False)

              (outdir / "v4_366_summary.json").write_text(json.dumps(summary366, indent=2))

              summary_md = f"""# TAIRID v4.366 Guarded Chi-Square Diagnostic Review — No Support Claims

          Expected result: `{summary366["expected_result"]}`

          {summary366["rules_passed"]} / {summary366["rules_total"]} rules passed

          failed_gates = {summary366["failed_gates"]}

          readiness_status = `{summary366["readiness_status"]}`

          guarded_diagonal_chi_square_sum = {summary366["guarded_diagonal_chi_square_sum"]}

          degrees_of_freedom_candidate = {summary366["degrees_of_freedom_candidate"]}

          diagnostic_review_approved_for_external_audit = {summary366["diagnostic_review_approved_for_external_audit"]}

          external_audit_ready = {summary366["external_audit_ready"]}

          full_covariance_available = false

          likelihood_computed = false

          p_values_computed = false

          score_valid = false

          support_allowed = false

          Claim boundary: {CLAIM_BOUNDARY}.

          This step reviews the guarded diagonal chi-square diagnostic for external audit staging.

          It does **not** compute likelihood.

          It does **not** compute p-values.

          It does **not** use full covariance.

          It does **not** create a general valid score.

          It does **not** make support claims.

          Next route: `{summary366["selected_next_route"]}`
          """
              (outdir / "v4_366_summary.md").write_text(summary_md)

              zip_path = outdir.with_suffix(".zip")
              if zip_path.exists():
                  zip_path.unlink()

              with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
                  for p in sorted(outdir.rglob("*")):
                      z.write(p, p.relative_to(outdir.parent))

              print(json.dumps(summary366, indent=2))
              print(f"WROTE {zip_path}")

              if failed:
                  raise SystemExit(1)

          if __name__ == "__main__":
              main()
          PY

          python -m py_compile run_v4_366_guarded_chi_square_diagnostic_review_no_support.py

      - name: Run v4.366 guarded chi-square diagnostic review no support
        run: |
          python run_v4_366_guarded_chi_square_diagnostic_review_no_support.py

      - name: Upload v4.366 guarded chi-square diagnostic review artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-366-guarded-chi-square-diagnostic-review-no-support-output
          path: |
            tairid_v4_366_guarded_chi_square_diagnostic_review_no_support_output/
            tairid_v4_366_guarded_chi_square_diagnostic_review_no_support_output.zip
