name: Run TAIRID Boundary Polarity Battery v0.9

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-boundary-polarity-battery-v0-9:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy matplotlib astropy

      - name: Confirm scripts exist
        run: |
          pwd
          ls -la
          test -f run_tairid_boundary_polarity_battery_v0_8.py
          test -f run_tairid_boundary_polarity_battery_v0_9.py
          echo "v0.8 script and v0.9 anti-overfit runner found."

      - name: Run TAIRID Boundary Polarity Battery v0.9
        run: |
          python run_tairid_boundary_polarity_battery_v0_9.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-boundary-polarity-battery-v0-9-output
          path: |
            tairid_boundary_polarity_battery_v0_9_outputs/**
            run_tairid_table2_f160w_quantile_bands_v1_5_importable_for_v1_6.py
