name: 000 TAIRID v4.218 - Cosmology Tracer Source Surface Ledger For LRG ELG QSO With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-218-cosmology-tracer-source-surface-ledger-for-lrg-elg-qso-with-scope-guards.yml"
      - "data/**"
      - "outputs/**"
      - "artifacts/**"

permissions:
  contents: read

jobs:
  v4-218-cosmology-tracer-source-surface-ledger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.218 cosmology tracer/source-surface ledger
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tairid_v4_218_outputs
          cat > tairid_v4_218_outputs/run_v4_218.py <<'PY'
          import csv
          import json
          from pathlib import Path

          OUT = Path("tairid_v4_218_outputs")
          OUT.mkdir(parents=True, exist_ok=True)

          RESULT_LABEL = "cosmology_tracer_source_surface_ledger_for_lrg_elg_qso_passed_surface_ledger_written_no_validation"

          BLOCKED_CLAIMS = [
              "no cosmology validation",
              "no neurotype validation",
              "no cross-domain validation",
              "no claim that neurotype data proves cosmology",
              "no claim that G1 proves TAIRID",
              "no claim that shared signature means shared cause",
              "no raw numbers moved between domains",
              "no unit equivalence across domains",
              "no causal equivalence across domains",
              "no publication-grade scaling law",
              "source-surface ledger is not validation",
              "tracer role table is not a cosmology result",
              "LRG ELG and QSO are not interchangeable by default",
              "combined tracer matrices are diagnostic until covariance and source surfaces are handled",
              "TAIRID not proved"
          ]

          V4_217_STATUS = {
              "version": "v4.217",
              "result_label": "return_to_cosmology_covariance_shape_method_transfer_passed_method_transfer_audit_written_no_validation",
              "rule_pass_count": 13,
              "rule_total_count": 13,
              "failed_gates": [],
              "method_lessons": 4,
              "cosmology_registry_rows": 3,
              "axis_translation_rows": 4,
              "test_design_rules": 4,
              "prioritized_gap_tests": 4,
              "package_status": "cosmology_method_transfer_audit_written_ready_for_tracer_source_surface_ledger",
              "selected_next_route": "cosmology_tracer_source_surface_ledger_for_lrg_elg_qso_with_scope_guards"
          }

          TRACER_ROLE_TABLE = [
              {
                  "tracer_family": "LRG",
                  "plain_name": "luminous red galaxy tracer surface",
                  "role_in_current_preview": "lower-to-mid redshift galaxy structure tracer / consolidation-leaning reference surface",
                  "likely_strength": "large-scale structure continuity and relatively stable galaxy clustering reference",
                  "known_risk": "selection function, fiducial compression, covariance sharing, and redshift-bin dependence",
                  "combination_rule": "may combine only after source-surface ledger and covariance dependency check",
                  "claim_boundary": "tracer role only; not physical mechanism proof"
              },
              {
                  "tracer_family": "ELG",
                  "plain_name": "emission line galaxy tracer surface",
                  "role_in_current_preview": "higher-redshift star-forming galaxy tracer / propagation-sensitive structure surface",
                  "likely_strength": "extends reach into a different population and redshift behavior than LRG",
                  "known_risk": "not interchangeable with LRG; population selection can change apparent growth/geometry pressure",
                  "combination_rule": "LRGxELG can be diagnostic, but LRG and ELG must remain separately labeled",
                  "claim_boundary": "tracer role only; not physical mechanism proof"
              },
              {
                  "tracer_family": "QSO",
                  "plain_name": "quasar tracer surface",
                  "role_in_current_preview": "high-redshift sparse tracer / extended reach surface",
                  "likely_strength": "tests whether the shape persists at higher redshift and different object population",
                  "known_risk": "sparser sampling, stronger selection effects, and different tracer bias than galaxy tracers",
                  "combination_rule": "do not fold into LRG/ELG combined matrix until QSO-specific role and covariance are handled",
                  "claim_boundary": "tracer role only; not physical mechanism proof"
              }
          ]

          SOURCE_SURFACE_LEDGER = [
              {
                  "surface_id": "LRGxELG_z0p70",
                  "tracer_family": "LRGxELG",
                  "redshift_or_bin": "z=0.70",
                  "prior_shape_signature": "++-",
                  "surface_type": "cross-tracer preview surface",
                  "source_surface_status": "mixed LRG and ELG tracer surface",
                  "allowed_interpretation": "shape-priority clue; candidate coupled surface to audit",
                  "blocked_interpretation": "proof that LRG and ELG are physically equivalent or that TAIRID is validated",
                  "required_next_check": "separate LRG role, ELG role, covariance/dependency handling, and residual direction",
                  "claim_boundary": "cosmology preview only; not validation"
              },
              {
                  "surface_id": "LRGxELG_z0p845",
                  "tracer_family": "LRGxELG",
                  "redshift_or_bin": "z=0.845",
                  "prior_shape_signature": "-+-",
                  "surface_type": "cross-tracer preview surface",
                  "source_surface_status": "mixed LRG and ELG tracer surface",
                  "allowed_interpretation": "shape-priority clue; candidate transition or role-shift surface to audit",
                  "blocked_interpretation": "proof of a phase transition or proof that G1 aphantasia validates cosmology",
                  "required_next_check": "same as z=0.70 plus explicit redshift-position comparison",
                  "claim_boundary": "cosmology preview only; not validation"
              },
              {
                  "surface_id": "QSO_z1p48",
                  "tracer_family": "QSO",
                  "redshift_or_bin": "z=1.48",
                  "prior_shape_signature": "-++",
                  "surface_type": "single high-redshift tracer preview surface",
                  "source_surface_status": "QSO-only high-redshift tracer surface",
                  "allowed_interpretation": "separate high-redshift tracer behavior requiring its own covariance/source audit",
                  "blocked_interpretation": "proof that QSO belongs in the same surface as LRGxELG",
                  "required_next_check": "QSO-specific covariance, bias, redshift, and dependency handling",
                  "claim_boundary": "cosmology preview only; not validation"
              }
          ]

          COMBINATION_PERMISSION_MATRIX = [
              {
                  "combination": "LRG_only",
                  "permission_level": "allowed_as_single_surface_preview",
                  "required_before_matrix": "document LRG bin, variable source, covariance source, and fiducial assumptions",
                  "blocked_claim": "LRG alone validates cosmology",
                  "safe_use": "single-source diagnostic surface"
              },
              {
                  "combination": "ELG_only",
                  "permission_level": "allowed_as_single_surface_preview",
                  "required_before_matrix": "document ELG bin, variable source, covariance source, and fiducial assumptions",
                  "blocked_claim": "ELG alone validates cosmology",
                  "safe_use": "single-source diagnostic surface"
              },
              {
                  "combination": "QSO_only",
                  "permission_level": "allowed_as_single_surface_preview",
                  "required_before_matrix": "document QSO bin, tracer bias risk, covariance source, and fiducial assumptions",
                  "blocked_claim": "QSO high-redshift behavior proves model truth",
                  "safe_use": "high-redshift diagnostic surface"
              },
              {
                  "combination": "LRG_plus_ELG",
                  "permission_level": "diagnostic_only_until_covariance_dependency_audit",
                  "required_before_matrix": "source-surface ledger, cross-covariance handling, role split, redshift bin split",
                  "blocked_claim": "LRG and ELG are interchangeable",
                  "safe_use": "cross-tracer diagnostic matrix only"
              },
              {
                  "combination": "LRG_plus_ELG_plus_QSO",
                  "permission_level": "blocked_for_interpretive_matrix_until_all_surface_guards_pass",
                  "required_before_matrix": "separate all tracer roles, covariance dependencies, redshift roles, and derived quantity flags",
                  "blocked_claim": "all tracers can be combined as one unit-equivalent surface",
                  "safe_use": "inventory only until guards pass"
              }
          ]

          COVARIANCE_LAYER_REQUIREMENTS = [
              {
                  "layer": "residual_direction",
                  "question_answered": "which way each tracer/bin leans against the reference model",
                  "must_be_separate_from": "covariance coupling and eigenmodes",
                  "artifact_required_next": "cosmology_residual_signature_table.csv",
                  "claim_boundary": "directional diagnostic only"
              },
              {
                  "layer": "covariance_coupling",
                  "question_answered": "which variables move together after source and covariance rules are set",
                  "must_be_separate_from": "raw residual sign and tracer role",
                  "artifact_required_next": "cosmology_covariance_mode_table.csv",
                  "claim_boundary": "coupling preview only"
              },
              {
                  "layer": "eigenmode_structure",
                  "question_answered": "dominant shape modes in the covariance/correlation matrix",
                  "must_be_separate_from": "proof language or physical mechanism",
                  "artifact_required_next": "cosmology_eigenmode_preview.csv",
                  "claim_boundary": "mode preview only"
              },
              {
                  "layer": "tracer_role",
                  "question_answered": "whether LRG, ELG, and QSO are functioning as different source surfaces",
                  "must_be_separate_from": "combined matrix interpretation",
                  "artifact_required_next": "tracer_role_table.csv",
                  "claim_boundary": "role ledger only"
              },
              {
                  "layer": "dependency_and_derivation",
                  "question_answered": "which quantities are derived, fiducial-dependent, compressed, or reused across sources",
                  "must_be_separate_from": "independent evidence claims",
                  "artifact_required_next": "derived_quantity_dependency_ledger.csv",
                  "claim_boundary": "dependency audit only"
              }
          ]

          SHAPE_PERSISTENCE_AUDIT_PLAN = [
              {
                  "audit_step": "A1",
                  "name": "LRG/ELG/QSO source-surface split",
                  "input_needed": "tracer family, redshift bin, observable, covariance source",
                  "pass_condition": "each row has a tracer role and surface boundary",
                  "failure_meaning": "do not compute combined interpretive matrix yet",
                  "claim_boundary": "surface split only"
              },
              {
                  "audit_step": "A2",
                  "name": "residual signature table",
                  "input_needed": "local residual or pressure direction per tracer/bin",
                  "pass_condition": "signature assigned without mixing covariance interpretation",
                  "failure_meaning": "shape persistence cannot be tested",
                  "claim_boundary": "directional preview only"
              },
              {
                  "audit_step": "A3",
                  "name": "covariance/dependency ledger",
                  "input_needed": "covariance matrix source, shared assumptions, derived quantities",
                  "pass_condition": "each variable is marked independent, derived, compressed, or shared",
                  "failure_meaning": "matrix may be structurally misleading",
                  "claim_boundary": "dependency audit only"
              },
              {
                  "audit_step": "A4",
                  "name": "shape persistence after split",
                  "input_needed": "split signatures and guarded covariance/eigenmode rows",
                  "pass_condition": "++-, -+-, or -++ persists after guards without forcing",
                  "failure_meaning": "prior shape was likely artifact of mixing surfaces",
                  "claim_boundary": "persistence preview only; not validation"
              }
          ]

          NEXT_ROUTES = [
              {
                  "priority": 1,
                  "route": "cosmology_residual_direction_vs_covariance_mode_split_with_scope_guards",
                  "condition": "tracer/source-surface ledger written",
                  "next_action": "Build separate residual signature, covariance mode, and eigenmode tables for LRG/ELG/QSO."
              },
              {
                  "priority": 2,
                  "route": "cosmology_derived_quantity_dependency_audit_with_scope_guards",
                  "condition": "before interpreting covariance as independent structure",
                  "next_action": "Flag derived, compressed, fiducial-dependent, and shared quantities."
              },
              {
                  "priority": 3,
                  "route": "clean_thread_handoff_after_v4_218",
                  "condition": "user requested one more test then handoff",
                  "next_action": "Consolidate v4.203-v4.218 into a compact new-thread handoff."
              }
          ]

          READINESS_SCORECARD = [
              {
                  "check": "v4_217_method_transfer_available",
                  "status": True,
                  "value": "passed",
                  "required": "passed",
                  "claim_boundary": "method transfer only"
              },
              {
                  "check": "tracer_role_table_written",
                  "status": len(TRACER_ROLE_TABLE) == 3,
                  "value": len(TRACER_ROLE_TABLE),
                  "required": 3,
                  "claim_boundary": "role ledger only"
              },
              {
                  "check": "source_surface_ledger_written",
                  "status": len(SOURCE_SURFACE_LEDGER) == 3,
                  "value": len(SOURCE_SURFACE_LEDGER),
                  "required": 3,
                  "claim_boundary": "source-surface ledger only"
              },
              {
                  "check": "combination_permissions_written",
                  "status": len(COMBINATION_PERMISSION_MATRIX) >= 5,
                  "value": len(COMBINATION_PERMISSION_MATRIX),
                  "required": "at least 5",
                  "claim_boundary": "prevents premature combined matrices"
              },
              {
                  "check": "covariance_layers_separated",
                  "status": len(COVARIANCE_LAYER_REQUIREMENTS) >= 5,
                  "value": len(COVARIANCE_LAYER_REQUIREMENTS),
                  "required": "at least 5",
                  "claim_boundary": "method guard only"
              },
              {
                  "check": "handoff_ready_after_this_test",
                  "status": True,
                  "value": "ready",
                  "required": "ready",
                  "claim_boundary": "workflow planning only"
              }
          ]

          CLAIM_ROWS = [
              {
                  "claim": "This tracer ledger validates cosmology.",
                  "status": "blocked",
                  "safe_wording": "This ledger only prepares cleaner cosmology tests.",
                  "forbidden_wording": "This proves the cosmology lane."
              },
              {
                  "claim": "LRG, ELG, and QSO can be merged as one source surface.",
                  "status": "blocked",
                  "safe_wording": "They must stay separated until covariance, bias, redshift, and dependency guards pass.",
                  "forbidden_wording": "All tracers are interchangeable."
              },
              {
                  "claim": "The same signature means the same physical cause.",
                  "status": "blocked",
                  "safe_wording": "Same signature only prioritizes a test.",
                  "forbidden_wording": "Same signature proves shared mechanism."
              },
              {
                  "claim": "The next handoff can claim proof.",
                  "status": "blocked",
                  "safe_wording": "The handoff should describe progress, open gaps, and guarded next steps.",
                  "forbidden_wording": "The handoff says TAIRID is proved."
              }
          ]

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow(row)

          package_status = "cosmology_tracer_source_surface_ledger_written_ready_for_handoff_or_residual_covariance_split"
          selected_next_route = "clean_thread_handoff_after_v4_218"

          write_csv(OUT / "v4_218_v4_217_status_review.csv", [V4_217_STATUS], list(V4_217_STATUS.keys()))
          (OUT / "v4_218_v4_217_status_review.json").write_text(json.dumps(V4_217_STATUS, indent=2), encoding="utf-8")
          write_csv(OUT / "v4_218_tracer_role_table.csv", TRACER_ROLE_TABLE, [
              "tracer_family", "plain_name", "role_in_current_preview",
              "likely_strength", "known_risk", "combination_rule", "claim_boundary"
          ])
          write_csv(OUT / "v4_218_source_surface_ledger.csv", SOURCE_SURFACE_LEDGER, [
              "surface_id", "tracer_family", "redshift_or_bin", "prior_shape_signature",
              "surface_type", "source_surface_status", "allowed_interpretation",
              "blocked_interpretation", "required_next_check", "claim_boundary"
          ])
          write_csv(OUT / "v4_218_combination_permission_matrix.csv", COMBINATION_PERMISSION_MATRIX, [
              "combination", "permission_level", "required_before_matrix",
              "blocked_claim", "safe_use"
          ])
          write_csv(OUT / "v4_218_covariance_layer_requirements.csv", COVARIANCE_LAYER_REQUIREMENTS, [
              "layer", "question_answered", "must_be_separate_from",
              "artifact_required_next", "claim_boundary"
          ])
          write_csv(OUT / "v4_218_shape_persistence_audit_plan.csv", SHAPE_PERSISTENCE_AUDIT_PLAN, [
              "audit_step", "name", "input_needed", "pass_condition",
              "failure_meaning", "claim_boundary"
          ])
          write_csv(OUT / "v4_218_readiness_scorecard.csv", READINESS_SCORECARD, [
              "check", "status", "value", "required", "claim_boundary"
          ])
          write_csv(OUT / "v4_218_claim_boundary_matrix.csv", CLAIM_ROWS, [
              "claim", "status", "safe_wording", "forbidden_wording"
          ])
          write_csv(OUT / "v4_218_next_routes.csv", NEXT_ROUTES, [
              "priority", "route", "condition", "next_action"
          ])

          route_decision = {
              "version": "v4.218",
              "result_label": RESULT_LABEL,
              "clean_result": "The cosmology tracer/source-surface ledger was written for LRG, ELG, and QSO. The workflow blocks treating tracer families as interchangeable and prepares the next residual-vs-covariance split or a clean handoff.",
              "tracer_role_rows": len(TRACER_ROLE_TABLE),
              "source_surface_rows": len(SOURCE_SURFACE_LEDGER),
              "combination_permission_rows": len(COMBINATION_PERMISSION_MATRIX),
              "covariance_layer_rows": len(COVARIANCE_LAYER_REQUIREMENTS),
              "shape_persistence_audit_rows": len(SHAPE_PERSISTENCE_AUDIT_PLAN),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "truth_boundary": "source-surface ledger only; not cosmology validation, not proof",
              "blocked_claims": BLOCKED_CLAIMS
          }
          (OUT / "v4_218_route_decision.json").write_text(json.dumps(route_decision, indent=2), encoding="utf-8")
          (OUT / "v4_218_scope_guards.json").write_text(json.dumps({
              "scope": "cosmology tracer/source-surface ledger for LRG ELG QSO",
              "source_surface_ledger_is_validation": False,
              "tracer_families_interchangeable": False,
              "same_signature_is_same_cause": False,
              "combined_matrix_allowed_without_guards": False,
              "raw_numbers_moved_between_domains": False,
              "unit_equivalence_claimed": False,
              "causal_equivalence_claimed": False,
              "next_thread_handoff_ready": True,
              "TAIRID_proved": False
          }, indent=2), encoding="utf-8")
          (OUT / "v4_218_blocked_claims.json").write_text(json.dumps({"blocked_claims": BLOCKED_CLAIMS}, indent=2), encoding="utf-8")

          summary = [
              "# TAIRID v4.218 - Cosmology Tracer Source Surface Ledger For LRG ELG QSO",
              "",
              "Expected result: `" + RESULT_LABEL + "`",
              "",
              "## Clean result",
              "",
              "v4.217 returned us to cosmology by method transfer. v4.218 writes the required LRG/ELG/QSO tracer and source-surface ledger before any new combined cosmology matrix.",
              "",
              "Tracer role rows: `" + str(len(TRACER_ROLE_TABLE)) + "`",
              "Source surface rows: `" + str(len(SOURCE_SURFACE_LEDGER)) + "`",
              "Combination permission rows: `" + str(len(COMBINATION_PERMISSION_MATRIX)) + "`",
              "Covariance layer rows: `" + str(len(COVARIANCE_LAYER_REQUIREMENTS)) + "`",
              "Shape persistence audit rows: `" + str(len(SHAPE_PERSISTENCE_AUDIT_PLAN)) + "`",
              "",
              "Package status: `" + package_status + "`",
              "Selected next route: `" + selected_next_route + "`",
              "",
              "## Boundary"
          ]
          for claim in BLOCKED_CLAIMS:
              summary.append("- " + claim)
          (OUT / "v4_218_summary.md").write_text("\n".join(summary), encoding="utf-8")

          required_outputs = [
              "v4_218_v4_217_status_review.csv",
              "v4_218_v4_217_status_review.json",
              "v4_218_tracer_role_table.csv",
              "v4_218_source_surface_ledger.csv",
              "v4_218_combination_permission_matrix.csv",
              "v4_218_covariance_layer_requirements.csv",
              "v4_218_shape_persistence_audit_plan.csv",
              "v4_218_readiness_scorecard.csv",
              "v4_218_claim_boundary_matrix.csv",
              "v4_218_next_routes.csv",
              "v4_218_route_decision.json",
              "v4_218_scope_guards.json",
              "v4_218_blocked_claims.json",
              "v4_218_summary.md"
          ]

          rules = {
              "version_is_v4_218": True,
              "result_label_present": RESULT_LABEL.endswith("no_validation"),
              "v4_217_status_reviewed": V4_217_STATUS["rule_pass_count"] == 13,
              "all_outputs_written": all((OUT / p).exists() for p in required_outputs),
              "tracer_role_table_written": (OUT / "v4_218_tracer_role_table.csv").exists(),
              "source_surface_ledger_written": (OUT / "v4_218_source_surface_ledger.csv").exists(),
              "combination_permission_matrix_written": (OUT / "v4_218_combination_permission_matrix.csv").exists(),
              "covariance_layer_requirements_written": (OUT / "v4_218_covariance_layer_requirements.csv").exists(),
              "shape_persistence_audit_plan_written": (OUT / "v4_218_shape_persistence_audit_plan.csv").exists(),
              "handoff_route_selected": selected_next_route == "clean_thread_handoff_after_v4_218",
              "no_cosmology_validation_claim": True,
              "no_tracer_interchangeability_claim": True,
              "no_unit_equivalence_claim": True
          }

          failed = [name for name, ok in rules.items() if not ok]
          health = {
              "version": "v4.218",
              "result_label": RESULT_LABEL,
              "rule_pass_count": len(rules) - len(failed),
              "rule_total_count": len(rules),
              "failed_gates": failed,
              "tracer_role_rows": len(TRACER_ROLE_TABLE),
              "source_surface_rows": len(SOURCE_SURFACE_LEDGER),
              "combination_permission_rows": len(COMBINATION_PERMISSION_MATRIX),
              "covariance_layer_rows": len(COVARIANCE_LAYER_REQUIREMENTS),
              "shape_persistence_audit_rows": len(SHAPE_PERSISTENCE_AUDIT_PLAN),
              "package_status": package_status,
              "selected_next_route": selected_next_route,
              "claim_boundary": "cosmology_tracer_source_surface_ledger_only_no_validation"
          }
          (OUT / "v4_218_parser_health_report.json").write_text(json.dumps(health, indent=2), encoding="utf-8")
          print(json.dumps(health, indent=2))
          if failed:
              raise SystemExit("v4.218 failed gates: " + ", ".join(failed))
          PY
          python tairid_v4_218_outputs/run_v4_218.py

      - name: Upload v4.218 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-218-cosmology-tracer-source-surface-ledger-for-lrg-elg-qso-output
          path: tairid_v4_218_outputs/
