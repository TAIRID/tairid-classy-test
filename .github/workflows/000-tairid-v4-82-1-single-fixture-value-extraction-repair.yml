              {"rule_id": "fixture_run_still_blocked", "pass": fixture_packet.get("fixture_run_allowed_now") is False, "result": "fixture run remains blocked until v4.83", "boundary": "No CAMB run in v4.82.1."},
              {"rule_id": "blocked_shortcuts_preserved", "pass": all(row["status"] == "blocked" for row in BLOCKED_SHORTCUTS), "result": f"{len(BLOCKED_SHORTCUTS)} blocked shortcuts preserved", "boundary": "No fake parameter conversion."},
              {"rule_id": "target_redshifts_locked", "pass": [row["z"] for row in TARGET_REDSHIFTS] == [0.15, 0.38, 0.51, 0.61, 2.33], "result": "target redshift order locked", "boundary": "No fsigma8 calculation."},
              {"rule_id": "next_route_options_declared", "pass": len(NEXT_ROUTE_OPTIONS) >= 4, "result": f"{len(NEXT_ROUTE_OPTIONS)} next route options declared", "boundary": "Future work only."},
              {"rule_id": "blocked_claims_preserved", "pass": len(BLOCKED_CLAIMS) >= 18, "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved", "boundary": "No validation or final score claim."},
              {"rule_id": "route_decision_recorded", "pass": route_decision != "undetermined", "result": route_decision, "boundary": "Route decision does not compute covariance."},
              {"rule_id": "no_final_pressure_or_validation", "pass": True, "result": "no_final_RSD_pressure_no_TAIRID_validation", "boundary": "Single fixture value extraction repair only."}
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_82_1_rules_passed")

          if failed_gates:
