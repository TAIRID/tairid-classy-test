name: TAIRID Cosmology v4.10 HSC Chainutils Boundary Audit

on:
  workflow_dispatch:

jobs:
  hsc-chainutils-boundary-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.10 HSC chainutils boundary audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v4_10_hsc_chainutils_boundary_audit

          python - <<'PY'
          import csv
          import json
          import re
          import urllib.request
          import urllib.parse
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_cosmology_v4_10_hsc_chainutils_boundary_audit")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v4_10_hsc_chainutils_boundary_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute BIC, likelihood, posterior model comparison, or model selection.",
              "This does not combine KiDS, DES, and HSC into one posterior.",
              "This does not parse HSC posterior chains.",
              "This audits whether the v4.9 selected HSC chainutils.py file is actual posterior data or chain-reading utility code.",
              "A pass means the HSC product role was classified correctly, not that HSC posterior parsing succeeded."
          ]

          CHAINUTILS_URL = "https://raw.githubusercontent.com/HSC-S19A-cosmology-analysis/hscs19a3x2pt-likelihood/main/hscs19a3x2ptlikelihood/chainutils.py"
          REPO_API = "https://api.github.com/repos/HSC-S19A-cosmology-analysis/hscs19a3x2pt-likelihood"
          REPO_RAW_BASE = "https://raw.githubusercontent.com/HSC-S19A-cosmology-analysis/hscs19a3x2pt-likelihood"

          SOURCE_LEDGER = [
              {
                  "source_id": "v4_9_selected_hsc_candidate",
                  "family": "HSC",
                  "source_type": "prior_artifact_selected_candidate",
                  "source_url": CHAINUTILS_URL,
                  "used_for": "v4.9 selected this as a reachable chain candidate; v4.10 audits whether it is code or posterior data."
              },
              {
                  "source_id": "hsc_s19a_likelihood_repository",
                  "family": "HSC",
                  "source_type": "github_repository",
                  "source_url": "https://github.com/HSC-S19A-cosmology-analysis/hscs19a3x2pt-likelihood",
                  "used_for": "Repository tree inspection for real chain/sample/data products."
              },
              {
                  "source_id": "v4_9_hsc_config_path_expansion",
                  "family": "HSC",
                  "source_type": "prior_artifact",
                  "used_for": "v4.9 found config/data-vector products and selected chainutils.py as a reachable chain-like candidate."
              }
          ]

          HIGH_VALUE_CHAIN_WORDS = [
              "chain",
              "chains",
              "posterior",
              "posteriors",
              "mcmc",
              "multinest",
              "samples",
              "sample"
          ]

          CODE_WORDS = [
              "def ",
              "class ",
              "import ",
              "from ",
              "return ",
              "argparse",
              "numpy",
              "pandas",
              "matplotlib"
          ]

          DATA_EXTENSIONS = [
              ".txt",
              ".dat",
              ".csv",
              ".h5",
              ".hdf5",
              ".npz",
              ".npy",
              ".fits",
              ".fit",
              ".pkl",
              ".pickle",
              ".tar",
              ".tar.gz",
              ".tgz",
              ".zip",
              ".gz"
          ]

          CONFIG_EXTENSIONS = [
              ".py",
              ".ini",
              ".yaml",
              ".yml",
              ".json",
              ".md"
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def fetch_text(url, timeout=90, byte_limit=5_000_000):
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 TAIRID-v4.10-HSC-chainutils-boundary-audit",
                      "Accept": "*/*"
                  }
              )

              try:
                  with urllib.request.urlopen(request, timeout=timeout) as response:
                      body = response.read(byte_limit)
                      charset = response.headers.get_content_charset() or "utf-8"
                      text = body.decode(charset, errors="replace")

                      return {
                          "ok": True,
                          "http_status": getattr(response, "status", 200),
                          "content_type": response.headers.get("Content-Type", ""),
                          "content_length_header": response.headers.get("Content-Length", ""),
                          "bytes_read": len(body),
                          "text": text,
                          "error": ""
                      }
              except Exception as exc:
                  return {
                      "ok": False,
                      "http_status": "",
                      "content_type": "",
                      "content_length_header": "",
                      "bytes_read": 0,
                      "text": "",
                      "error": repr(exc)
                  }

          def fetch_json(url, timeout=90):
              result = fetch_text(url, timeout=timeout, byte_limit=10_000_000)
              if not result["ok"]:
                  return result, None

              try:
                  return result, json.loads(result["text"])
              except Exception as exc:
                  result["ok"] = False
                  result["error"] = f"json_parse_error:{repr(exc)}"
                  return result, None

          def score_repo_path(path):
              lower = path.lower()
              score = 0
              reasons = []

              for word in HIGH_VALUE_CHAIN_WORDS:
                  if word in lower:
                      score += 12
                      reasons.append(f"chain_word:{word}")

              for ext in DATA_EXTENSIONS:
                  if lower.endswith(ext) or ext in lower:
                      score += 8
                      reasons.append(f"data_extension:{ext}")

              for ext in CONFIG_EXTENSIONS:
                  if lower.endswith(ext):
                      score += 2
                      reasons.append(f"code_or_config_extension:{ext}")

              if "output" in lower or "results" in lower or "chains" in lower or "samples" in lower:
                  score += 8
                  reasons.append("result_path_language")

              if "test" in lower or "docs" in lower or "__pycache__" in lower:
                  score -= 5
                  reasons.append("low_priority_path")

              return score, ";".join(reasons)

          def classify_repo_path(path, score, reasons):
              lower = path.lower()
              reasons_lower = reasons.lower()

              if lower.endswith(".py"):
                  if "chain" in lower:
                      return "chain_utility_code_not_posterior_data"
                  return "source_code_not_posterior_data"

              if "data_extension" in reasons_lower and any(word in lower for word in ["chain", "posterior", "sample", "mcmc", "multinest"]):
                  return "possible_posterior_data_product"

              if "data_extension" in reasons_lower:
                  return "possible_supporting_data_product"

              if lower.endswith((".ini", ".yaml", ".yml", ".json")):
                  return "configuration_product_not_chain_samples"

              if lower.endswith(".md"):
                  return "documentation_product"

              return "context_product"

          def extract_python_symbols(text):
              function_names = re.findall(r"^\s*def\s+([A-Za-z_][A-Za-z0-9_]*)\s*\(", text, flags=re.MULTILINE)
              class_names = re.findall(r"^\s*class\s+([A-Za-z_][A-Za-z0-9_]*)\s*[\(:]", text, flags=re.MULTILINE)
              imports = re.findall(r"^\s*(?:import|from)\s+([A-Za-z0-9_\.]+)", text, flags=re.MULTILINE)

              return {
                  "function_names": function_names,
                  "class_names": class_names,
                  "imports": imports
              }

          def extract_string_path_candidates(text):
              rows = []

              string_pattern = re.compile(r"""['"]([^'"]{3,240})['"]""")
              for match in string_pattern.finditer(text or ""):
                  value = match.group(1).strip()
                  lower = value.lower()

                  if not value:
                      continue

                  looks_path_like = (
                      "/" in value
                      or "\\" in value
                      or any(lower.endswith(ext) for ext in DATA_EXTENSIONS + CONFIG_EXTENSIONS)
                      or any(word in lower for word in HIGH_VALUE_CHAIN_WORDS)
                  )

                  if not looks_path_like:
                      continue

                  score = 0
                  reasons = []

                  for word in HIGH_VALUE_CHAIN_WORDS:
                      if word in lower:
                          score += 10
                          reasons.append(f"chain_word:{word}")

                  for ext in DATA_EXTENSIONS:
                      if lower.endswith(ext) or ext in lower:
                          score += 6
                          reasons.append(f"data_extension:{ext}")

                  if "/" in value or "\\" in value:
                      score += 3
                      reasons.append("path_like_string")

                  if score <= 0:
                      continue

                  rows.append({
                      "string_value": value,
                      "candidate_score": score,
                      "score_reasons": ";".join(reasons)
                  })

              rows.sort(key=lambda row: row["candidate_score"], reverse=True)
              return rows

          def analyze_chainutils(text):
              lower = text.lower()
              code_hits = [word.strip() for word in CODE_WORDS if word in text]
              chain_hits = [word for word in HIGH_VALUE_CHAIN_WORDS if word in lower]
              symbols = extract_python_symbols(text)
              string_candidates = extract_string_path_candidates(text)

              code_score = len(code_hits) + len(symbols["function_names"]) + len(symbols["class_names"]) + len(symbols["imports"])
              chain_language_score = len(chain_hits)

              if code_score >= 5 and chain_language_score >= 1:
                  classification = "chain_utility_code_not_chain_samples"
              elif code_score >= 5:
                  classification = "python_code_not_chain_samples"
              elif chain_language_score >= 2:
                  classification = "chain_language_present_but_not_enough_to_parse"
              else:
                  classification = "unknown_text_product"

              return {
                  "classification": classification,
                  "code_score": code_score,
                  "chain_language_score": chain_language_score,
                  "code_hits": code_hits,
                  "chain_hits": chain_hits,
                  "function_names": symbols["function_names"],
                  "class_names": symbols["class_names"],
                  "imports": symbols["imports"],
                  "string_path_candidates": string_candidates
              }

          def repo_default_branch():
              result, data = fetch_json(REPO_API)
              if result["ok"] and isinstance(data, dict):
                  return data.get("default_branch") or "main", result
              return "main", result

          def fetch_repo_tree(branch):
              tree_url = f"{REPO_API}/git/trees/{branch}?recursive=1"
              result, data = fetch_json(tree_url)

              if result["ok"] and isinstance(data, dict):
                  return result, data.get("tree", [])

              return result, []

          created_at = now_iso()

          chainutils_fetch = fetch_text(CHAINUTILS_URL)
          chainutils_analysis = analyze_chainutils(chainutils_fetch["text"]) if chainutils_fetch["ok"] else {
              "classification": "chainutils_not_fetchable",
              "code_score": 0,
              "chain_language_score": 0,
              "code_hits": [],
              "chain_hits": [],
              "function_names": [],
              "class_names": [],
              "imports": [],
              "string_path_candidates": []
          }

          default_branch, repo_meta_fetch = repo_default_branch()
          repo_tree_fetch, repo_tree = fetch_repo_tree(default_branch)

          repo_rows = []
          possible_data_rows = []
          possible_code_rows = []

          for item in repo_tree:
              if item.get("type") != "blob":
                  continue

              path = item.get("path", "")
              if not path:
                  continue

              score, reasons = score_repo_path(path)
              classification = classify_repo_path(path, score, reasons)
              raw_url = f"{REPO_RAW_BASE}/{default_branch}/{path}"

              row = {
                  "path": path,
                  "raw_url": raw_url,
                  "size": item.get("size", ""),
                  "candidate_score": score,
                  "score_reasons": reasons,
                  "classification": classification
              }

              if score > 0:
                  repo_rows.append(row)

              if classification in ["possible_posterior_data_product", "possible_supporting_data_product"]:
                  possible_data_rows.append(row)

              if classification in ["chain_utility_code_not_posterior_data", "source_code_not_posterior_data"]:
                  possible_code_rows.append(row)

          repo_rows.sort(key=lambda row: row["candidate_score"], reverse=True)
          possible_data_rows.sort(key=lambda row: row["candidate_score"], reverse=True)
          possible_code_rows.sort(key=lambda row: row["candidate_score"], reverse=True)

          failed_gates = []
          warnings = []

          if not chainutils_fetch["ok"]:
              failed_gates.append("chainutils_not_fetchable")

          if not repo_tree_fetch["ok"]:
              warnings.append("hsc_repo_tree_not_fetchable")

          actual_chain_data_candidates = [
              row for row in possible_data_rows
              if row["classification"] == "possible_posterior_data_product"
          ]

          if chainutils_analysis["classification"] == "chain_utility_code_not_chain_samples":
              warnings.append("v4_9_selected_candidate_is_chain_utility_code_not_chain_samples")

          if not actual_chain_data_candidates:
              warnings.append("no_actual_hsc_posterior_chain_data_file_found_in_repo_tree")

          if possible_data_rows and not actual_chain_data_candidates:
              warnings.append("supporting_data_products_exist_but_not_confirmed_as_posterior_chains")

          if failed_gates:
              readiness_label = "hsc_chainutils_boundary_audit_failed"
              next_step = "Repair chainutils/repository access before further HSC direct-product work."
          elif actual_chain_data_candidates:
              readiness_label = "hsc_chainutils_boundary_audit_completed_possible_chain_data_found"
              next_step = (
                  "Proceed to v4.11 HSC possible-chain data fetch/parser probe for the highest-scoring actual data candidate. "
                  "Do not run likelihood or combine surveys."
              )
          else:
              readiness_label = "hsc_chainutils_boundary_audit_completed_code_not_chain"
              next_step = (
                  "Proceed to v4.11 HSC SACC/likelihood boundary audit or park HSC as a published-summary row. "
                  "Do not claim HSC posterior-chain parsing."
              )

          selector_decision = {
              "v4_9_selected_url": CHAINUTILS_URL,
              "v4_9_selected_product_classification_after_audit": chainutils_analysis["classification"],
              "actual_posterior_chain_data_found": bool(actual_chain_data_candidates),
              "possible_data_candidate_count": len(possible_data_rows),
              "possible_code_candidate_count": len(possible_code_rows),
              "next_action": next_step
          }

          interpretation = (
              "v4.10 audits the v4.9 selected HSC chainutils.py file. "
              "If chainutils.py is classified as utility code, then v4.9 found a useful code path, not posterior samples. "
              "That means HSC should remain a published-summary row until an actual HSC posterior-chain product is found or a separate likelihood/SACC lane is built."
          )

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": created_at,
              "truth_boundary": TRUTH_BOUNDARY,
              "source_ledger": SOURCE_LEDGER,
              "chainutils_fetch": {
                  "ok": chainutils_fetch["ok"],
                  "http_status": chainutils_fetch["http_status"],
                  "content_type": chainutils_fetch["content_type"],
                  "content_length_header": chainutils_fetch["content_length_header"],
                  "bytes_read": chainutils_fetch["bytes_read"],
                  "error": chainutils_fetch["error"]
              },
              "chainutils_analysis": {
                  "classification": chainutils_analysis["classification"],
                  "code_score": chainutils_analysis["code_score"],
                  "chain_language_score": chainutils_analysis["chain_language_score"],
                  "code_hits": chainutils_analysis["code_hits"],
                  "chain_hits": chainutils_analysis["chain_hits"],
                  "function_names": chainutils_analysis["function_names"],
                  "class_names": chainutils_analysis["class_names"],
                  "imports": chainutils_analysis["imports"]
              },
              "chainutils_string_path_candidates": chainutils_analysis["string_path_candidates"][:100],
              "repo_fetch": {
                  "repo_meta_ok": repo_meta_fetch["ok"],
                  "repo_tree_ok": repo_tree_fetch["ok"],
                  "default_branch": default_branch,
                  "repo_meta_error": repo_meta_fetch["error"],
                  "repo_tree_error": repo_tree_fetch["error"]
              },
              "repo_candidate_rows_top_100": repo_rows[:100],
              "possible_data_rows": possible_data_rows,
              "possible_code_rows_top_50": possible_code_rows[:50],
              "selector_decision": selector_decision,
              "interpretation": interpretation,
              "guardrail_check": {
                  "validation_claim_allowed": False,
                  "h0_solution_claim_allowed": False,
                  "new_physics_claim_allowed": False,
                  "standard_cosmology_disproof_claim_allowed": False,
                  "refit_run": False,
                  "bic_run": False,
                  "likelihood_run": False,
                  "posterior_model_comparison_run": False,
                  "combined_growth_posterior_built": False,
                  "new_cosmological_model_fit": False,
                  "posterior_chain_parsed": False
              },
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_step,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "bic_allowed": False,
                  "likelihood_allowed": False,
                  "posterior_model_comparison_allowed": False,
                  "posterior_chain_parsed": False
              }
          }

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "hsc_chainutils_symbols_v4_10.csv",
              [
                  {
                      "symbol_type": "function",
                      "symbol_name": name
                  }
                  for name in chainutils_analysis["function_names"]
              ] + [
                  {
                      "symbol_type": "class",
                      "symbol_name": name
                  }
                  for name in chainutils_analysis["class_names"]
              ] + [
                  {
                      "symbol_type": "import",
                      "symbol_name": name
                  }
                  for name in chainutils_analysis["imports"]
              ],
              ["symbol_type", "symbol_name"]
          )

          write_csv(
              OUTDIR / "hsc_chainutils_string_path_candidates_v4_10.csv",
              chainutils_analysis["string_path_candidates"][:300],
              ["string_value", "candidate_score", "score_reasons"]
          )

          write_csv(
              OUTDIR / "hsc_repo_candidate_rows_v4_10.csv",
              repo_rows[:300],
              [
                  "path",
                  "raw_url",
                  "size",
                  "candidate_score",
                  "score_reasons",
                  "classification"
              ]
          )

          write_csv(
              OUTDIR / "hsc_possible_data_rows_v4_10.csv",
              possible_data_rows,
              [
                  "path",
                  "raw_url",
                  "size",
                  "candidate_score",
                  "score_reasons",
                  "classification"
              ]
          )

          write_csv(
              OUTDIR / "hsc_selector_decision_v4_10.csv",
              [selector_decision],
              [
                  "v4_9_selected_url",
                  "v4_9_selected_product_classification_after_audit",
                  "actual_posterior_chain_data_found",
                  "possible_data_candidate_count",
                  "possible_code_candidate_count",
                  "next_action"
              ]
          )

          interpretation_rows = [
              {
                  "interpretation_id": "allowed_chainutils_boundary_statement",
                  "status": "allowed_with_boundary",
                  "wording": "The v4.9 selected chainutils.py product was audited to decide whether it is utility code or posterior sample data.",
                  "boundary": "Boundary audit only, not posterior parsing."
              },
              {
                  "interpretation_id": "allowed_code_path_statement",
                  "status": "allowed_with_boundary",
                  "wording": "If chainutils.py is utility code, it may guide later product discovery but is not itself a posterior-chain replacement row.",
                  "boundary": "Blocks false chain claims."
              },
              {
                  "interpretation_id": "allowed_hsc_summary_boundary",
                  "status": "allowed_with_boundary",
                  "wording": "If no actual HSC posterior samples are found, HSC remains a published-summary row for the growth-family checkpoint.",
                  "boundary": "No direct-chain HSC replacement claim."
              },
              {
                  "interpretation_id": "forbidden_posterior_parse_claim",
                  "status": "forbidden",
                  "wording": "HSC posterior chains were parsed.",
                  "boundary": "Blocked unless a later parser actually parses sample rows."
              },
              {
                  "interpretation_id": "forbidden_validation_claim",
                  "status": "forbidden",
                  "wording": "TAIRID is validated.",
                  "boundary": "Blocked."
              },
              {
                  "interpretation_id": "forbidden_likelihood_claim",
                  "status": "forbidden",
                  "wording": "An HSC likelihood was run.",
                  "boundary": "Blocked."
              }
          ]

          write_csv(
              OUTDIR / "interpretation_boundaries_v4_10.csv",
              interpretation_rows,
              ["interpretation_id", "status", "wording", "boundary"]
          )

          json_path = OUTDIR / "tairid_cosmology_v4_10_hsc_chainutils_boundary_audit.json"
          json_path.write_text(json.dumps(audit, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v4.10 — HSC Chainutils Boundary Audit")
          md.append("")
          md.append(f"Created UTC: `{created_at}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append(f"Warnings: `{', '.join(sorted(set(warnings))) if warnings else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v4.9 selected `chainutils.py` as a reachable chain-like HSC candidate. v4.10 audits whether that file is actual posterior sample data or only utility code for reading chains.")
          md.append("")
          md.append("This does not parse HSC posterior chains and does not run any HSC likelihood.")
          md.append("")
          md.append("## Chainutils classification")
          md.append("")
          md.append("| Field | Value |")
          md.append("|---|---|")
          md.append(f"| Fetch OK | `{chainutils_fetch['ok']}` |")
          md.append(f"| Classification | `{chainutils_analysis['classification']}` |")
          md.append(f"| Code score | `{chainutils_analysis['code_score']}` |")
          md.append(f"| Chain-language score | `{chainutils_analysis['chain_language_score']}` |")
          md.append(f"| Function count | `{len(chainutils_analysis['function_names'])}` |")
          md.append(f"| Class count | `{len(chainutils_analysis['class_names'])}` |")
          md.append(f"| Import count | `{len(chainutils_analysis['imports'])}` |")
          md.append("")
          md.append("## Repository scan")
          md.append("")
          md.append("| Count | Value |")
          md.append("|---|---:|")
          md.append(f"| Candidate repo rows | `{len(repo_rows)}` |")
          md.append(f"| Possible posterior/supporting data rows | `{len(possible_data_rows)}` |")
          md.append(f"| Actual posterior chain data candidates | `{len(actual_chain_data_candidates)}` |")
          md.append("")
          md.append("## Selector decision")
          md.append("")
          md.append("| Field | Value |")
          md.append("|---|---|")
          for key, value in selector_decision.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          md.append(interpretation)
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `hsc_chainutils_symbols_v4_10.csv`")
          md.append("- `hsc_chainutils_string_path_candidates_v4_10.csv`")
          md.append("- `hsc_repo_candidate_rows_v4_10.csv`")
          md.append("- `hsc_possible_data_rows_v4_10.csv`")
          md.append("- `hsc_selector_decision_v4_10.csv`")
          md.append("- `interpretation_boundaries_v4_10.csv`")
