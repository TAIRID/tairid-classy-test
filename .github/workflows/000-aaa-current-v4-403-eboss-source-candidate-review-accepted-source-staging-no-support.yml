name: "!!! AAA CURRENT - TAIRID v4.403 eBOSS source candidate review accepted source staging no support"

on:
  workflow_dispatch:

jobs:
  run-v4-403:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run v4.403 eBOSS source candidate review accepted source staging no support
        run: |
          cat > run_tairid_v4_403_eboss_source_candidate_review_accepted_source_staging_no_support.py <<'PY'
          
          import csv, json, zipfile, os, glob, io, math
          from pathlib import Path
          from datetime import datetime, timezone
          
          VERSION = 'v4.403'
          ROUTE_NAME = 'v4_403_eboss_source_candidate_review_and_accepted_source_staging_no_values_no_support_claims'
          EXPECTED_RESULT = 'v4_403_eboss_source_candidate_review_accepted_source_staging_passed_no_values_no_support_claims'
          NEXT_ROUTE = 'v4_404_eboss_observed_value_and_covariance_availability_gate_no_values_no_support_claims'
          CLAIM_BOUNDARY = 'eBOSS source candidate review and accepted-source staging only; accepted sources may be carried to an availability gate; no new observed values loaded; no covariance values loaded; no new chi-square computed; no likelihood; no p-values; score_valid remains false; support_allowed remains false; no support claims'
          OUTDIR = Path('tairid_v4_403_eboss_source_candidate_review_accepted_source_staging_no_support_output')
          OUTZIP = Path('tairid-v4-403-eboss-source-candidate-review-accepted-source-staging-no-values-no-support-output.zip')
          
          INPUT_402_PATTERN = '**/tairid-v4-402-eboss-official-source-inventory-manifest-no-values-no-support-output*.zip'
          HUMAN_REVIEW_PATTERN = '**/tairid-v4-402-human-filled-eboss-source-candidate-review-for-v4-403-no-values-no-support*.zip'
          
          FALSE_STRINGS = {'false','0','no','n',''}
          TRUE_STRINGS = {'true','1','yes','y'}
          
          def boolify(x):
              if isinstance(x, bool): return x
              if x is None: return False
              s = str(x).strip().lower()
              if s in TRUE_STRINGS: return True
              if s in FALSE_STRINGS: return False
              return False
          
          def find_one(pattern):
              hits = sorted([Path(p) for p in glob.glob(pattern, recursive=True) if Path(p).is_file()])
              if not hits:
                  return None
              return hits[0]
          
          def read_zip_json(zp, suffix):
              with zipfile.ZipFile(zp) as z:
                  names=[n for n in z.namelist() if n.endswith(suffix)]
                  if not names: raise FileNotFoundError(f'Missing {suffix} in {zp}')
                  return json.loads(z.read(names[0]).decode('utf-8-sig'))
          
          def read_zip_csv(zp, suffix):
              with zipfile.ZipFile(zp) as z:
                  names=[n for n in z.namelist() if n.endswith(suffix)]
                  if not names: raise FileNotFoundError(f'Missing {suffix} in {zp}')
                  return list(csv.DictReader(io.StringIO(z.read(names[0]).decode('utf-8-sig'))))
          
          def write_csv(path, rows, fieldnames=None):
              path = OUTDIR / path
              if fieldnames is None:
                  fieldnames = sorted({k for r in rows for k in r.keys()}) if rows else []
              with open(path, 'w', newline='', encoding='utf-8') as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames)
                  w.writeheader(); w.writerows(rows)
          
          def write_json(path, obj):
              with open(OUTDIR / path, 'w', encoding='utf-8') as f:
                  json.dump(obj, f, indent=2)
          
          def write_text(path, text):
              with open(OUTDIR / path, 'w', encoding='utf-8') as f:
                  f.write(text)
          
          def val(summary, key, default=None):
              return summary.get(key, default)
          
          input_402_zip = find_one(INPUT_402_PATTERN)
          human_zip = find_one(HUMAN_REVIEW_PATTERN)
          rule_checks=[]
          def check(gate, passed): rule_checks.append({'gate':gate,'passed':bool(passed)})
          
          check('input_402_zip_found', input_402_zip is not None)
          check('human_filled_review_zip_found', human_zip is not None)
          if input_402_zip is None or human_zip is None:
              OUTDIR.mkdir(exist_ok=True)
              write_csv('v4_403_rule_checks.csv', rule_checks, ['gate','passed'])
              raise SystemExit('Missing required input zip(s).')
          
          summary402 = read_zip_json(input_402_zip, 'v4_402_summary.json')
          review_template = read_zip_csv(input_402_zip, 'v4_402_HUMAN_FILL_eboss_source_candidate_review_NO_VALUES_NO_SUPPORT.csv')
          source_manifest = read_zip_csv(input_402_zip, 'v4_402_eboss_official_source_inventory_manifest_NO_VALUES_NO_SUPPORT.csv')
          requirements = read_zip_csv(input_402_zip, 'v4_402_next_gate_exact_source_requirements_NO_VALUES_NO_SUPPORT.csv')
          human_review = read_zip_csv(human_zip, 'v4_402_HUMAN_FILLED_eboss_source_candidate_review_FOR_v4_403_NO_VALUES_NO_SUPPORT.csv')
          
          check('input_402_summary_version_correct', summary402.get('version')=='v4.402')
          check('input_402_expected_result_correct', summary402.get('expected_result')=='v4_402_eboss_official_source_inventory_manifest_passed_no_values_no_support_claims')
          check('input_402_rules_all_passed', summary402.get('rules_passed')==summary402.get('rules_total') and summary402.get('failed_gates')=='none')
          check('input_402_selected_next_route_is_v4_403', summary402.get('selected_next_route')=='v4_403_eboss_source_candidate_review_and_accepted_source_staging_no_values_no_support_claims')
          check('input_402_no_observed_values_loaded', summary402.get('new_observed_values_loaded') is False)
          check('input_402_no_covariance_values_loaded', summary402.get('covariance_values_loaded') is False)
          check('input_402_no_new_chi_square', summary402.get('new_chi_square_computed') is False)
          check('input_402_no_likelihood', summary402.get('likelihood_computed') is False)
          check('input_402_no_p_values', summary402.get('p_values_computed') is False)
          check('input_402_score_valid_false', summary402.get('score_valid') is False)
          check('input_402_support_allowed_false', summary402.get('support_allowed') is False)
          check('input_review_template_rows_equal_3', len(review_template)==3)
          check('input_source_manifest_rows_equal_9', len(source_manifest)==9)
          check('input_requirements_rows_equal_9', len(requirements)==9)
          
          check('human_review_rows_equal_3', len(human_review)==3)
          template_ids = {r['v4_402_review_id'] for r in review_template}
          human_ids = {r.get('v4_402_review_id','') for r in human_review}
          check('human_review_ids_match_template', human_ids==template_ids)
          check('human_decisions_all_approve_for_accepted_source_staging', all(r.get('human_exact_source_decision')=='approve_for_accepted_source_staging' for r in human_review))
          check('human_all_approve_for_staging_now_true', all(boolify(r.get('approve_for_source_candidate_staging_now')) for r in human_review))
          check('human_observed_values_to_load_now_false', all(not boolify(r.get('observed_values_to_load_now')) for r in human_review))
          check('human_covariance_values_to_load_now_false', all(not boolify(r.get('covariance_values_to_load_now')) for r in human_review))
          check('human_new_chi_square_false', all(not boolify(r.get('new_chi_square_computed')) for r in human_review))
          check('human_score_valid_false', all(not boolify(r.get('score_valid')) for r in human_review))
          check('human_support_allowed_false', all(not boolify(r.get('support_allowed')) for r in human_review))
          
          approved = [r for r in human_review if r.get('human_exact_source_decision')=='approve_for_accepted_source_staging' and boolify(r.get('approve_for_source_candidate_staging_now'))]
          accepted_tracers = [r.get('tracer_or_sample_family') for r in approved]
          check('accepted_source_candidate_rows_equal_3', len(approved)==3)
          check('accepted_tracers_are_lrg_elg_qso', set(accepted_tracers)=={'LRG','ELG','QSO'})
          
          # Exact source locators remain non-value locators; no numeric observed/covariance values loaded here.
          source_locator_by_tracer = {
              'LRG': 'SDSS-IV/eBOSS DR16 final BAO/RSD measurements page and public likelihood/covariance products; companion LRG clustering papers/data products. Exact values deferred to v4.404+.',
              'ELG': 'SDSS-IV/eBOSS DR16 final BAO/RSD measurements page and public likelihood/covariance products; companion ELG clustering papers/data products. Exact values deferred to v4.404+.',
              'QSO': 'SDSS-IV/eBOSS DR16 final BAO/RSD measurements page and public likelihood/covariance products; companion QSO clustering papers/data products. Exact values deferred to v4.404+.',
          }
          source_paper_family_by_tracer = {
              'LRG': 'eBOSS DR16 LRG/CMASS BAO+RSD clustering consensus papers and associated public data products',
              'ELG': 'eBOSS DR16 ELG BAO+RSD clustering papers and associated public data products',
              'QSO': 'eBOSS DR16 QSO BAO+RSD clustering papers and associated public data products',
          }
          accepted_source_rows=[]
          for i,r in enumerate(approved,1):
              tracer = r['tracer_or_sample_family']
              accepted_source_rows.append({
                  'v4_403_accepted_source_id': f'V4_403_ACCEPTED_SOURCE_{i:03d}',
                  'selected_family': r['selected_family'],
                  'survey_or_release_family': r['survey_or_release_family'],
                  'tracer_or_sample_family': tracer,
                  'source_family_label': r['source_family_label'],
                  'accepted_source_locator_non_value': source_locator_by_tracer[tracer],
                  'accepted_paper_or_product_family_non_value': source_paper_family_by_tracer[tracer],
                  'human_exact_source_decision': r['human_exact_source_decision'],
                  'human_exact_source_notes': r.get('human_exact_source_notes',''),
                  'accepted_for_next_gate': True,
                  'observed_values_loaded_now': False,
                  'covariance_values_loaded_now': False,
                  'new_chi_square_computed': False,
                  'likelihood_computed': False,
                  'p_values_computed': False,
                  'score_valid': False,
                  'support_allowed': False,
                  'claim_boundary': CLAIM_BOUNDARY,
              })
          accepted_source_role_rows=[]
          accepted_families={r['selected_family'] for r in approved}
          for j,r in enumerate([r for r in source_manifest if r.get('selected_family') in accepted_families],1):
              accepted_source_role_rows.append({
                  'v4_403_role_stage_id': f'V4_403_ROLE_STAGE_{j:03d}',
                  'source_from_v4_402_candidate_id': r.get('v4_402_source_candidate_id'),
                  'selected_family': r.get('selected_family'),
                  'survey_or_release_family': r.get('survey_or_release_family'),
                  'tracer_or_sample_family': r.get('tracer_or_sample_family'),
                  'source_role': r.get('source_role'),
                  'source_family_label': r.get('source_family_label'),
                  'source_description': r.get('source_description'),
                  'must_confirm_before_values': r.get('must_confirm_before_values'),
                  'accepted_for_availability_gate': True,
                  'observed_values_loaded_now': False,
                  'covariance_values_loaded_now': False,
                  'new_chi_square_computed': False,
                  'likelihood_computed': False,
                  'p_values_computed': False,
                  'score_valid': False,
                  'support_allowed': False,
                  'claim_boundary': CLAIM_BOUNDARY,
              })
          
          availability_packet_rows=[]
          for k,r in enumerate([r for r in requirements if r.get('selected_family') in accepted_families],1):
              availability_packet_rows.append({
                  'v4_403_availability_gate_id': f'V4_403_AVAILABILITY_REQ_{k:03d}',
                  'source_from_v4_402_requirement_id': r.get('v4_402_requirement_id'),
                  'selected_family': r.get('selected_family'),
                  'tracer_or_sample_family': r.get('tracer_or_sample_family'),
                  'requirement_type': r.get('requirement_type'),
                  'required_confirmation_before_values': r.get('requirement'),
                  'next_gate_action': 'confirm_available_exact_source_or_park_before_values',
                  'values_loaded_now': False,
                  'covariance_values_loaded_now': False,
                  'new_chi_square_computed': False,
                  'support_allowed': False,
                  'claim_boundary': CLAIM_BOUNDARY,
              })
          
          check('accepted_source_role_rows_equal_9', len(accepted_source_role_rows)==9)
          check('availability_packet_rows_equal_9', len(availability_packet_rows)==9)
          roles_by_tracer={t:0 for t in ['LRG','ELG','QSO']}
          for r in accepted_source_role_rows:
              if r.get('tracer_or_sample_family') in roles_by_tracer:
                  roles_by_tracer[r.get('tracer_or_sample_family')]+=1
          check('role_staging_covers_three_roles_per_tracer', all(v==3 for v in roles_by_tracer.values()))
          check('accepted_source_rows_no_values_loaded', all(not boolify(r.get('observed_values_loaded_now')) and not boolify(r.get('covariance_values_loaded_now')) for r in accepted_source_rows))
          check('role_stage_rows_no_values_loaded', all(not boolify(r.get('observed_values_loaded_now')) and not boolify(r.get('covariance_values_loaded_now')) for r in accepted_source_role_rows))
          check('availability_packet_no_values_loaded', all(not boolify(r.get('values_loaded_now')) and not boolify(r.get('covariance_values_loaded_now')) for r in availability_packet_rows))
          
          route_rows=[
              {'status_id':'V4_403_STATUS_001','status':'source_candidate_review_ingested','detail':'Human-approved eBOSS LRG, ELG, and QSO source candidates were ingested.'},
              {'status_id':'V4_403_STATUS_002','status':'accepted_source_staging_created','detail':'Accepted sources were staged for a later availability gate only; no values loaded.'},
              {'status_id':'V4_403_STATUS_003','status':'next_route_selected','detail':NEXT_ROUTE},
              {'status_id':'V4_403_STATUS_004','status':'support_still_blocked','detail':'support_allowed=false remains active.'},
          ]
          gap_rows=[
              {'gap_id':'V4_403_GAP_001','gap':'Exact observed value and uncertainty availability must still be confirmed per tracer.','status_after_v4_403':'selected_next','next_gate':'v4_404_availability_gate'},
              {'gap_id':'V4_403_GAP_002','gap':'Covariance/likelihood availability and compatibility must still be confirmed.','status_after_v4_403':'selected_next','next_gate':'v4_404_availability_gate'},
              {'gap_id':'V4_403_GAP_003','gap':'No observed eBOSS values are loaded yet.','status_after_v4_403':'still_blocked','next_gate':'after_availability_confirmation'},
              {'gap_id':'V4_403_GAP_004','gap':'No support claim is permitted.','status_after_v4_403':'still_blocked','next_gate':'no_support_claims_allowed'},
          ]
          limit_rows=[
              {'limit_id':'V4_403_LIMIT_001','limit':'This is an accepted-source staging gate only, not a numeric observed-data test.','status':'active_limit'},
              {'limit_id':'V4_403_LIMIT_002','limit':'Accepted source locators are non-value provenance anchors; exact values remain unloaded.','status':'active_limit'},
              {'limit_id':'V4_403_LIMIT_003','limit':'No covariance values or likelihood objects are loaded in v4.403.','status':'blocked_by_design'},
              {'limit_id':'V4_403_LIMIT_004','limit':'No chi-square, likelihood, p-values, score validation, or support claim is allowed.','status':'blocked_by_design'},
          ]
          
          summary = {
              'version': VERSION,
              'route_name': ROUTE_NAME,
              'expected_result': EXPECTED_RESULT,
              'input_version': 'v4.402',
              'created_utc': datetime.now(timezone.utc).isoformat(),
              'rules_passed': None,
              'rules_total': None,
              'failed_gates': None,
              'human_review_rows': len(human_review),
              'accepted_source_candidate_rows': len(accepted_source_rows),
              'accepted_tracer_rows': len(set(accepted_tracers)),
              'accepted_source_role_rows': len(accepted_source_role_rows),
              'availability_packet_rows': len(availability_packet_rows),
              'lrg_accepted_rows': sum(1 for r in accepted_source_rows if r['tracer_or_sample_family']=='LRG'),
              'elg_accepted_rows': sum(1 for r in accepted_source_rows if r['tracer_or_sample_family']=='ELG'),
              'qso_accepted_rows': sum(1 for r in accepted_source_rows if r['tracer_or_sample_family']=='QSO'),
              'prior_guarded_diagonal_chi_square_sum': summary402.get('prior_guarded_diagonal_chi_square_sum'),
              'primary_dM_Hz_chi_square_dry_run_sum': summary402.get('primary_dM_Hz_chi_square_dry_run_sum'),
              'robustness_min_chi_square': summary402.get('robustness_min_chi_square'),
              'robustness_max_chi_square': summary402.get('robustness_max_chi_square'),
              'robustness_chi_square_range_width': summary402.get('robustness_chi_square_range_width'),
              'new_observed_values_loaded': False,
              'covariance_values_loaded': False,
              'new_chi_square_computed': False,
              'likelihood_computed': False,
              'p_values_computed': False,
              'score_valid': False,
              'support_allowed': False,
              'claim_boundary': CLAIM_BOUNDARY,
              'selected_next_route': NEXT_ROUTE,
          }
          check('route_rows_equal_4', len(route_rows)==4)
          check('gap_rows_equal_4', len(gap_rows)==4)
          check('limitations_rows_equal_4', len(limit_rows)==4)
          check('summary_human_review_rows_equal_3', summary['human_review_rows']==3)
          check('summary_accepted_source_candidate_rows_equal_3', summary['accepted_source_candidate_rows']==3)
          check('summary_accepted_source_role_rows_equal_9', summary['accepted_source_role_rows']==9)
          check('summary_availability_packet_rows_equal_9', summary['availability_packet_rows']==9)
          check('summary_lrg_elg_qso_each_one', summary['lrg_accepted_rows']==summary['elg_accepted_rows']==summary['qso_accepted_rows']==1)
          check('summary_no_new_observed_values_loaded', summary['new_observed_values_loaded'] is False)
          check('summary_no_covariance_values_loaded', summary['covariance_values_loaded'] is False)
          check('summary_no_new_chi_square', summary['new_chi_square_computed'] is False)
          check('summary_no_likelihood', summary['likelihood_computed'] is False)
          check('summary_no_p_values', summary['p_values_computed'] is False)
          check('summary_score_valid_false', summary['score_valid'] is False)
          check('summary_support_allowed_false', summary['support_allowed'] is False)
          check('selected_next_route_is_v4_404', summary['selected_next_route']==NEXT_ROUTE)
          
          failed=[r['gate'] for r in rule_checks if not r['passed']]
          summary['rules_passed'] = len(rule_checks)-len(failed)
          summary['rules_total'] = len(rule_checks)
          summary['failed_gates'] = 'none' if not failed else ';'.join(failed)
          
          OUTDIR.mkdir(exist_ok=True)
          write_csv('v4_403_eboss_source_candidate_review_ingest_ledger_NO_VALUES_NO_SUPPORT.csv', human_review, list(human_review[0].keys()))
          write_csv('v4_403_ACCEPTED_eboss_sources_FOR_AVAILABILITY_GATE_NO_VALUES_NO_SUPPORT.csv', accepted_source_rows, list(accepted_source_rows[0].keys()))
          write_csv('v4_403_accepted_source_role_staging_NO_VALUES_NO_SUPPORT.csv', accepted_source_role_rows, list(accepted_source_role_rows[0].keys()))
          write_csv('v4_403_next_gate_observed_value_covariance_availability_packet_NO_VALUES_NO_SUPPORT.csv', availability_packet_rows, list(availability_packet_rows[0].keys()))
          write_csv('v4_403_route_status_summary.csv', route_rows, list(route_rows[0].keys()))
          write_csv('v4_403_gap_status_after_accepted_source_staging.csv', gap_rows, list(gap_rows[0].keys()))
          write_csv('v4_403_limitations_after_accepted_source_staging.csv', limit_rows, list(limit_rows[0].keys()))
          write_csv('v4_403_rule_checks.csv', rule_checks, ['gate','passed'])
          write_json('v4_403_summary.json', summary)
          md = f'''# TAIRID {VERSION} eBOSS Source Candidate Review / Accepted Source Staging\n\nExpected result: `{EXPECTED_RESULT}`\n\nRules: {summary['rules_passed']} / {summary['rules_total']} passed.\n\nFailed gates: {summary['failed_gates']}\n\nAccepted source candidates: {summary['accepted_source_candidate_rows']}\n\nAccepted source role rows: {summary['accepted_source_role_rows']}\n\nAvailability packet rows: {summary['availability_packet_rows']}\n\nBoundary: no observed values loaded, no covariance values loaded, no chi-square, no likelihood, no p-values, score_valid=false, support_allowed=false.\n\nNext route: `{NEXT_ROUTE}`\n'''
          write_text('v4_403_summary.md', md)
          
          with zipfile.ZipFile(OUTZIP, 'w', zipfile.ZIP_DEFLATED) as z:
              for p in sorted(OUTDIR.rglob('*')):
                  if p.is_file(): z.write(p, p.as_posix())
          
          print(json.dumps(summary, indent=2))
          print('WROTE', OUTZIP)
          if failed:
              raise SystemExit(1)
          PY
          python run_tairid_v4_403_eboss_source_candidate_review_accepted_source_staging_no_support.py

      - name: Upload v4.403 eBOSS source candidate review accepted source staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: tairid-v4-403-eboss-source-candidate-review-accepted-source-staging-no-values-no-support-output
          path: |
            tairid-v4-403-eboss-source-candidate-review-accepted-source-staging-no-values-no-support-output.zip
            tairid_v4_403_eboss_source_candidate_review_accepted_source_staging_no_support_output/
