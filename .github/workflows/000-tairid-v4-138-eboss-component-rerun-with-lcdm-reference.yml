name: 000 TAIRID v4.138 eBOSS Component Rerun with LCDM Reference

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/000-tairid-v4-138-eboss-component-rerun-with-lcdm-reference.yml"

jobs:
  tairid-v4-138-eboss-component-rerun-with-lcdm-reference:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TAIRID v4.138 eBOSS component rerun with LCDM reference
        shell: bash
        run: |
          mkdir -p artifacts/tairid_v4_138_eboss_component_rerun_with_lcdm_reference

          python - <<'PY'
          import csv
          import json
          import math
          from datetime import datetime, timezone
          from pathlib import Path

          OUTDIR = Path("artifacts/tairid_v4_138_eboss_component_rerun_with_lcdm_reference")
          OUTDIR.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_v4_138_eboss_component_rerun_with_lcdm_reference"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove new physics.",
              "This does not solve H0.",
              "This does not disprove standard cosmology.",
              "This does not compute final RSD pressure.",
              "This does not compute a final combined growth score.",
              "This does not compute a final combined growth covariance.",
              "This does not download the full Planck fullGrid zip.",
              "This does not import full Planck chains.",
              "This does not parse Planck chain sample rows.",
              "This does not run CAMB.",
              "This does not compute new Planck posterior samples.",
              "This reruns only the eBOSS component lanes using the v4.137 lightweight LCDM diagnostic reference.",
              "This uses diagonal approximation variance and same-program diagonal observed treatment; it is not a full covariance result.",
              "A pass means the eBOSS two-driver pattern was tested against the cleaner LCDM diagnostic reference and routed to sensitivity audit, not final interpretation."
          ]

          UPSTREAM_LOCKS = {
              "v4_137_lightweight_LCDM_growth_reference_probe": {
                  "readiness_label": "lightweight_LCDM_growth_reference_probe_passed_reference_vector_built_ready_for_eBOSS_component_rerun_with_LCDM_reference",
                  "selected_reference_method": "lightweight_LCDM_growth_approximation",
                  "reference_upgrade_computed": True,
                  "reference_target_count": 12,
                  "eboss_reference_target_count": 3,
                  "all_targets_supported": True,
                  "prior_alignment_passed": True,
                  "max_abs_delta_vs_prior_exact": 0.0027298708323023058,
                  "mean_abs_delta_vs_prior_exact": 0.0025621752281033833,
                  "rms_delta_vs_prior_exact": 0.0025685721011188115,
                  "diagnostic_variance_support_built": True,
                  "covariance_record_count": 144,
                  "full_posterior_covariance_available": False,
                  "reference_covariance_upgraded": False,
                  "observed_eBOSS_covariance_still_limited": True,
                  "CAMB_run": False,
                  "full_planck_chains_imported": False,
                  "full_planck_chain_sample_files_parsed": False,
                  "pressure_recomputed": False,
                  "Planck_reference_uncertainty_computed": False,
                  "combined_growth_covariance_computed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_133_eBOSS_leave_one_out_sensitivity_audit": {
                  "readiness_label": "eBOSS_leave_one_out_sensitivity_audit_passed_two_driver_split_classified_ready_for_eBOSS_covariance_locator_probe",
                  "family_pressure_replayed": True,
                  "family_pressure_z": -1.4177985723696922,
                  "without_LRG_pressure_z": -1.7182622613006164,
                  "without_ELG_pressure_z": 1.044032094397258,
                  "without_QSO_pressure_z": -0.0,
                  "single_LRG_pressure_z": 0.0,
                  "single_ELG_pressure_z": -0.9592443784990414,
                  "single_QSO_pressure_z": 1.4255789774431635,
                  "LRG_damper_confirmed": True,
                  "ELG_negative_direction_confirmed": True,
                  "QSO_positive_counter_confirmed": True,
                  "two_driver_split_classified": True,
                  "covariance_limit_preserved": True,
                  "reference_fallback_preserved": True,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              },
              "v4_134_eBOSS_covariance_locator_probe": {
                  "readiness_label": "eBOSS_covariance_locator_probe_passed_locator_status_recorded_covariance_not_ingested_ready_for_reference_upgrade_design",
                  "covariance_ingested": False,
                  "usable_covariance_locked": False,
                  "same_program_covariance_still_limited": True,
                  "reference_fallback_still_active": True,
                  "pressure_recomputed": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          EBOSS_COMPONENTS_LCDM_REFERENCE = [
              {
                  "component_id": "eBOSS_LRG_z0698",
                  "target_id": "z0698_eBOSS_LRG",
                  "z": 0.698,
                  "observed_fsigma8": 0.473,
                  "observed_sigma": 0.044,
                  "old_interpolation_reference": 0.4623052016766069,
                  "lcdm_reference": 0.461920741383061,
                  "lcdm_reference_variance": 0.0001055610022183,
                  "reference_support_status": "lightweight_LCDM_growth_approximation_not_full_posterior",
                  "variance_status": "diagonal_approximation_variance_not_full_covariance",
                  "observed_covariance_status": "same_program_diagonal_sensitivity_fallback",
                  "component_role_from_v4_133": "neutral_anchor_or_damper"
              },
              {
                  "component_id": "eBOSS_ELG_z0850",
                  "target_id": "z0850_eBOSS_ELG",
                  "z": 0.850,
                  "observed_fsigma8": 0.315,
                  "observed_sigma": 0.095,
                  "old_interpolation_reference": 0.4469713428685805,
                  "lcdm_reference": 0.4474721580390906,
                  "lcdm_reference_variance": 0.0001055610022183,
                  "reference_support_status": "lightweight_LCDM_growth_approximation_not_full_posterior",
                  "variance_status": "diagonal_approximation_variance_not_full_covariance",
                  "observed_covariance_status": "same_program_diagonal_sensitivity_fallback",
                  "component_role_from_v4_133": "negative_component_subthreshold_alone"
              },
              {
                  "component_id": "eBOSS_QSO_z1480",
                  "target_id": "z1480_eBOSS_QSO",
                  "z": 1.480,
                  "observed_fsigma8": 0.462,
                  "observed_sigma": 0.045,
                  "old_interpolation_reference": 0.3834165333353129,
                  "lcdm_reference": 0.3763728744177307,
                  "lcdm_reference_variance": 0.0007938100951557,
                  "reference_support_status": "lightweight_LCDM_growth_approximation_not_full_posterior",
                  "variance_status": "diagonal_approximation_variance_not_full_covariance",
                  "observed_covariance_status": "same_program_diagonal_sensitivity_fallback",
                  "component_role_from_v4_133": "positive_counter_driver"
              }
          ]

          OLD_INTERPOLATION_LANE_RESULTS = [
              {"lane_id": "eBOSS_family_current_replay", "old_pressure_z": -1.4177985723696922, "old_chi2": 5.010152791813537, "old_dof": 3},
              {"lane_id": "eBOSS_leave_one_out_without_LRG", "old_pressure_z": -1.7182622613006164, "old_chi2": 4.952425198609908, "old_dof": 2},
              {"lane_id": "eBOSS_leave_one_out_without_ELG", "old_pressure_z": 1.044032094397258, "old_chi2": 3.090003014131525, "old_dof": 2},
              {"lane_id": "eBOSS_leave_one_out_without_QSO", "old_pressure_z": -0.0, "old_chi2": 1.9778773708856419, "old_dof": 2},
              {"lane_id": "eBOSS_single_LRG", "old_pressure_z": 0.0, "old_chi2": 0.05772759320362973, "old_dof": 1},
              {"lane_id": "eBOSS_single_ELG", "old_pressure_z": -0.9592443784990414, "old_chi2": 1.9201497776820122, "old_dof": 1},
              {"lane_id": "eBOSS_single_QSO", "old_pressure_z": 1.4255789774431635, "old_chi2": 3.0322754209278955, "old_dof": 1}
          ]

          EBOSS_RERUN_LANES = [
              {"lane_id": "eBOSS_family_LCDM_reference", "members": ["eBOSS_LRG_z0698", "eBOSS_ELG_z0850", "eBOSS_QSO_z1480"], "purpose": "Replay eBOSS family with LCDM diagnostic reference."},
              {"lane_id": "eBOSS_without_LRG_LCDM_reference", "members": ["eBOSS_ELG_z0850", "eBOSS_QSO_z1480"], "purpose": "Test family without LRG damper."},
              {"lane_id": "eBOSS_without_ELG_LCDM_reference", "members": ["eBOSS_LRG_z0698", "eBOSS_QSO_z1480"], "purpose": "Test remaining positive-side pair after removing ELG."},
              {"lane_id": "eBOSS_without_QSO_LCDM_reference", "members": ["eBOSS_LRG_z0698", "eBOSS_ELG_z0850"], "purpose": "Test remaining neutral/negative pair after removing QSO."},
              {"lane_id": "eBOSS_single_LRG_LCDM_reference", "members": ["eBOSS_LRG_z0698"], "purpose": "Single LRG component."},
              {"lane_id": "eBOSS_single_ELG_LCDM_reference", "members": ["eBOSS_ELG_z0850"], "purpose": "Single ELG component."},
              {"lane_id": "eBOSS_single_QSO_LCDM_reference", "members": ["eBOSS_QSO_z1480"], "purpose": "Single QSO component."}
          ]

          BLOCKED_CLAIMS = [
              "Planck reference uncertainty is included.",
              "Planck reference uncertainty is computed as final.",
              "Full Planck chains were imported.",
              "Full Planck chain sample files were parsed.",
              "CAMB was run.",
              "A final RSD pressure score was computed.",
              "A final combined growth covariance was computed.",
              "The eBOSS LCDM-reference rerun validates TAIRID cosmology.",
              "Standard cosmology is disproven.",
              "A likelihood, BIC, or posterior model comparison was run.",
              "The lightweight LCDM reference is a full Planck posterior covariance.",
              "The diagonal approximation variance is a final covariance matrix.",
              "The eBOSS LCDM-reference two-driver split is a final result.",
              "Same-program eBOSS covariance is resolved.",
              "No observed covariance review is needed after this rerun."
          ]

          NEXT_ROUTE_OPTIONS = [
              {
                  "priority": 1,
                  "route_id": "v4_139_LCDM_reference_sensitivity_audit",
                  "purpose": "Audit whether the eBOSS rerun result is sensitive to Omega_m, sigma8, and growth-index assumptions.",
                  "why_next": "v4.138 uses a lightweight approximation, so the approximation itself must be varied before interpretation."
              },
              {
                  "priority": 2,
                  "route_id": "v4_140_eBOSS_covariance_manual_extraction_checklist",
                  "purpose": "Create a human-readable checklist for extracting eBOSS covariance/likelihood support from SDSS/arXiv products.",
                  "why_next": "Observed-side covariance still blocks final interpretation."
              },
              {
                  "priority": 3,
                  "route_id": "v4_141_CAMB_install_or_stored_chain_probe",
                  "purpose": "Try a bounded CAMB/stored-chain feasibility route if repository or runtime support becomes available.",
                  "why_next": "CAMB/chain support would be stronger than the lightweight LCDM approximation."
              },
              {
                  "priority": 4,
                  "route_id": "v4_142_external_standard_cosmology_comparison_plan",
                  "purpose": "Design comparison language against normal ΛCDM growth pipelines and literature constraints.",
                  "why_next": "Any persistent local pressure must be contextualized before public-facing claims."
              }
          ]

          failed_gates = []
          warnings = [
              "diagnostic_eboss_rerun_only",
              "lightweight_LCDM_reference_not_full_posterior",
              "diagonal_reference_variance_not_final_covariance",
              "same_program_observed_covariance_still_limited",
              "no_final_RSD_pressure",
              "not_validation"
          ]

          def sign(value):
              return 1.0 if value >= 0 else -1.0

          def compute_lane(lane, components):
              selected = [row for row in components if row["component_id"] in lane["members"]]
              residuals = [float(row["observed_fsigma8"]) - float(row["lcdm_reference"]) for row in selected]
              variances = [
                  float(row["observed_sigma"]) ** 2 + float(row["lcdm_reference_variance"])
                  for row in selected
              ]
              chi2 = sum((r * r) / v for r, v in zip(residuals, variances))
              dof = len(selected)
              residual_mean = sum(residuals) / len(residuals)
              pressure_z = sign(residual_mean) * math.sqrt(max(chi2 - dof, 0.0))
              return {
                  "lane_id": lane["lane_id"],
                  "members": ",".join(lane["members"]),
                  "member_count": dof,
                  "chi2": chi2,
                  "dof": dof,
                  "pressure_z": pressure_z,
                  "abs_pressure_z": abs(pressure_z),
                  "residual_mean": residual_mean,
                  "purpose": lane["purpose"],
                  "claim_scope": "diagnostic_eBOSS_LCDM_reference_rerun_not_final"
              }

          component_records = []
          for row in EBOSS_COMPONENTS_LCDM_REFERENCE:
              residual_old = float(row["observed_fsigma8"]) - float(row["old_interpolation_reference"])
              residual_lcdm = float(row["observed_fsigma8"]) - float(row["lcdm_reference"])
              component_records.append({
                  **row,
                  "residual_old_reference": residual_old,
                  "residual_lcdm_reference": residual_lcdm,
                  "delta_lcdm_reference_minus_old_reference": float(row["lcdm_reference"]) - float(row["old_interpolation_reference"]),
                  "total_variance_used": float(row["observed_sigma"]) ** 2 + float(row["lcdm_reference_variance"]),
                  "claim_boundary": "component_residual_diagnostic_only"
              })

          lane_records = [compute_lane(lane, EBOSS_COMPONENTS_LCDM_REFERENCE) for lane in EBOSS_RERUN_LANES]

          old_lookup = {row["lane_id"]: row for row in OLD_INTERPOLATION_LANE_RESULTS}
          mapping = {
              "eBOSS_family_LCDM_reference": "eBOSS_family_current_replay",
              "eBOSS_without_LRG_LCDM_reference": "eBOSS_leave_one_out_without_LRG",
              "eBOSS_without_ELG_LCDM_reference": "eBOSS_leave_one_out_without_ELG",
              "eBOSS_without_QSO_LCDM_reference": "eBOSS_leave_one_out_without_QSO",
              "eBOSS_single_LRG_LCDM_reference": "eBOSS_single_LRG",
              "eBOSS_single_ELG_LCDM_reference": "eBOSS_single_ELG",
              "eBOSS_single_QSO_LCDM_reference": "eBOSS_single_QSO"
          }

          lane_comparison_records = []
          for row in lane_records:
              old = old_lookup[mapping[row["lane_id"]]]
              lane_comparison_records.append({
                  "lane_id": row["lane_id"],
                  "old_interpolation_lane_id": mapping[row["lane_id"]],
                  "old_chi2": old["old_chi2"],
                  "new_chi2": row["chi2"],
                  "delta_chi2_new_minus_old": row["chi2"] - old["old_chi2"],
                  "old_pressure_z": old["old_pressure_z"],
                  "new_pressure_z": row["pressure_z"],
                  "delta_pressure_z_new_minus_old": row["pressure_z"] - old["old_pressure_z"],
                  "old_dof": old["old_dof"],
                  "new_dof": row["dof"],
                  "interpretation": "LCDM reference rerun shift; diagnostic only"
              })

          def get_lane(lane_id):
              for row in lane_records:
                  if row["lane_id"] == lane_id:
                      return row
              raise KeyError(lane_id)

          family = get_lane("eBOSS_family_LCDM_reference")
          without_lrg = get_lane("eBOSS_without_LRG_LCDM_reference")
          without_elg = get_lane("eBOSS_without_ELG_LCDM_reference")
          without_qso = get_lane("eBOSS_without_QSO_LCDM_reference")
          single_lrg = get_lane("eBOSS_single_LRG_LCDM_reference")
          single_elg = get_lane("eBOSS_single_ELG_LCDM_reference")
          single_qso = get_lane("eBOSS_single_QSO_LCDM_reference")

          family_pressure_persists = family["pressure_z"] < -1.0
          without_lrg_negative_persists = without_lrg["pressure_z"] < -1.0
          without_elg_positive_weakened = 0.0 < without_elg["pressure_z"] < 1.0
          without_qso_neutral_persists = abs(without_qso["pressure_z"]) == 0.0
          single_lrg_neutral_persists = abs(single_lrg["pressure_z"]) == 0.0
          single_elg_negative_subthreshold_persists = -1.0 < single_elg["pressure_z"] < 0.0
          single_qso_positive_persists = single_qso["pressure_z"] > 1.0

          two_driver_pattern_survives_with_weaker_positive_pair = (
              family_pressure_persists
              and without_lrg_negative_persists
              and without_elg_positive_weakened
              and without_qso_neutral_persists
              and single_lrg_neutral_persists
              and single_elg_negative_subthreshold_persists
              and single_qso_positive_persists
          )

          classification_records = [
              {
                  "classification_id": "family_negative_pressure_persists",
                  "pass": family_pressure_persists,
                  "value": family["pressure_z"],
                  "meaning": "The eBOSS family still has a local negative pressure flag with LCDM reference."
              },
              {
                  "classification_id": "without_LRG_negative_pressure_persists",
                  "pass": without_lrg_negative_persists,
                  "value": without_lrg["pressure_z"],
                  "meaning": "Removing LRG still strengthens the negative lane, preserving the damper interpretation."
              },
              {
                  "classification_id": "without_ELG_positive_pair_weakened",
                  "pass": without_elg_positive_weakened,
                  "value": without_elg["pressure_z"],
                  "meaning": "Removing ELG leaves a positive pair, but it drops below |pressure_z| >= 1 under LCDM reference."
              },
              {
                  "classification_id": "without_QSO_neutral_persists",
                  "pass": without_qso_neutral_persists,
                  "value": without_qso["pressure_z"],
                  "meaning": "Removing QSO still neutralizes the LRG+ELG pair."
              },
              {
                  "classification_id": "single_QSO_positive_persists",
                  "pass": single_qso_positive_persists,
                  "value": single_qso["pressure_z"],
                  "meaning": "QSO remains the positive single-component pressure driver."
              },
              {
                  "classification_id": "single_ELG_negative_subthreshold_persists",
                  "pass": single_elg_negative_subthreshold_persists,
                  "value": single_elg["pressure_z"],
                  "meaning": "ELG remains negative and just below |pressure_z| >= 1."
              },
              {
                  "classification_id": "observed_covariance_limit_blocks_final_interpretation",
                  "pass": True,
                  "value": "same_program_diagonal_sensitivity_fallback",
                  "meaning": "The eBOSS observed covariance is still not ingested."
              },
              {
                  "classification_id": "reference_is_diagnostic_not_final",
                  "pass": True,
                  "value": "lightweight_LCDM_growth_approximation",
                  "meaning": "The reference improved beyond interpolation but is not CAMB/Planck posterior covariance."
              }
          ]

          rerun_summary_records = [
              {
                  "summary_id": "main_change_from_interpolation_to_lcdm",
                  "value": "positive_without_ELG_lane_weakens_below_abs_pressure_1",
                  "detail": "The old without-ELG lane was pressure_z 1.044; LCDM reference rerun gives 0.813, so the direction remains positive but the pressure flag weakens."
              },
              {
                  "summary_id": "main_persistent_structure",
                  "value": "family_negative_and_QSO_positive_single_component_remain",
                  "detail": "The family lane remains negative and the QSO single-component lane remains positive above |pressure_z| >= 1."
              },
              {
                  "summary_id": "main_remaining_limit",
                  "value": "same_program_observed_covariance_not_ingested",
                  "detail": "The rerun improves reference support but observed eBOSS covariance remains diagonal sensitivity fallback."
              }
          ]

          full_posterior_covariance_available = False
          observed_covariance_ingested = False
          final_pressure_ready = False

          if UPSTREAM_LOCKS["v4_137_lightweight_LCDM_growth_reference_probe"]["reference_upgrade_computed"] is not True:
              failed_gates.append("upstream_reference_upgrade_not_computed")

          if UPSTREAM_LOCKS["v4_137_lightweight_LCDM_growth_reference_probe"]["full_posterior_covariance_available"] is not False:
              failed_gates.append("upstream_full_posterior_boundary_not_carried")

          if UPSTREAM_LOCKS["v4_134_eBOSS_covariance_locator_probe"]["usable_covariance_locked"] is not False:
              failed_gates.append("upstream_observed_covariance_unexpectedly_locked")

          if len(lane_records) != 7:
              failed_gates.append("lane_record_count_incorrect")

          if not family_pressure_persists:
              failed_gates.append("family_negative_pressure_not_persistent")

          if not single_qso_positive_persists:
              failed_gates.append("single_QSO_positive_not_persistent")

          if not without_elg_positive_weakened:
              failed_gates.append("without_ELG_positive_weakened_pattern_not_confirmed")

          if not without_qso_neutral_persists:
              failed_gates.append("without_QSO_neutral_not_confirmed")

          if not two_driver_pattern_survives_with_weaker_positive_pair:
              failed_gates.append("two_driver_pattern_with_weaker_positive_pair_not_confirmed")

          if full_posterior_covariance_available:
              failed_gates.append("full_posterior_covariance_unexpectedly_available")

          if observed_covariance_ingested:
              failed_gates.append("observed_covariance_unexpectedly_ingested")

          if final_pressure_ready:
              failed_gates.append("final_pressure_unexpectedly_ready")

          blocked_text = " | ".join(BLOCKED_CLAIMS).lower()
          for phrase in [
              "planck reference uncertainty is included",
              "full planck chains were imported",
              "camb was run",
              "final rsd pressure score",
              "validates tairid cosmology",
              "lightweight lcdm reference is a full planck posterior covariance",
              "same-program eboss covariance is resolved",
              "bic"
          ]:
              if phrase not in blocked_text:
                  failed_gates.append("blocked_claim_missing_" + phrase.replace(" ", "_"))

          route_decision = "eBOSS_component_rerun_with_LCDM_reference_passed_two_driver_pattern_survives_positive_pair_weakened_ready_for_LCDM_reference_sensitivity_audit"

          rule_results = [
              {
                  "rule_id": "workflow_name_sorts_top",
                  "pass": True,
                  "result": "workflow name begins with 000 TAIRID",
                  "boundary": "Navigation convenience only."
              },
              {
                  "rule_id": "node24_opt_in_preserved",
                  "pass": True,
                  "result": "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true preserved",
                  "boundary": "Warning cleanup only."
              },
              {
                  "rule_id": "upstream_lcdm_reference_carried",
                  "pass": UPSTREAM_LOCKS["v4_137_lightweight_LCDM_growth_reference_probe"]["reference_upgrade_computed"] is True,
                  "result": "v4.137 lightweight LCDM reference vector carried",
                  "boundary": "Diagnostic reference only."
              },
              {
                  "rule_id": "eboss_component_lanes_recomputed",
                  "pass": len(lane_records) == 7,
                  "result": f"lane_count={len(lane_records)}",
                  "boundary": "eBOSS component lanes only."
              },
              {
                  "rule_id": "family_negative_pressure_persists",
                  "pass": family_pressure_persists,
                  "result": f"family_pressure_z={family['pressure_z']}; chi2={family['chi2']}",
                  "boundary": "Local diagnostic pressure only."
              },
              {
                  "rule_id": "qso_positive_single_component_persists",
                  "pass": single_qso_positive_persists,
                  "result": f"single_QSO_pressure_z={single_qso['pressure_z']}; chi2={single_qso['chi2']}",
                  "boundary": "Component role under approximation only."
              },
              {
                  "rule_id": "positive_pair_weakened_but_direction_preserved",
                  "pass": without_elg_positive_weakened,
                  "result": f"without_ELG_pressure_z={without_elg['pressure_z']}",
                  "boundary": "Approximate reference effect, not final comparison."
              },
              {
                  "rule_id": "without_qso_neutral_persists",
                  "pass": without_qso_neutral_persists,
                  "result": f"without_QSO_pressure_z={without_qso['pressure_z']}",
                  "boundary": "Component role under approximation only."
              },
              {
                  "rule_id": "covariance_and_reference_boundaries_preserved",
                  "pass": full_posterior_covariance_available is False and observed_covariance_ingested is False,
                  "result": "reference is lightweight LCDM approximation and observed covariance remains un-ingested",
                  "boundary": "Blocks final interpretation."
              },
              {
                  "rule_id": "final_pressure_and_validation_blocked",
                  "pass": final_pressure_ready is False,
                  "result": "final pressure and validation remain blocked",
                  "boundary": "No final score."
              },
              {
                  "rule_id": "blocked_claims_preserved",
                  "pass": len(BLOCKED_CLAIMS) >= 15,
                  "result": f"{len(BLOCKED_CLAIMS)} blocked claims preserved",
                  "boundary": "No validation or final score claim."
              },
              {
                  "rule_id": "route_decision_recorded",
                  "pass": route_decision != "",
                  "result": route_decision,
                  "boundary": "Route decision does not validate the model."
              }
          ]

          if not all(row["pass"] for row in rule_results):
              failed_gates.append("not_all_v4_138_rules_passed")

          if failed_gates:
              readiness_label = "eBOSS_component_rerun_with_LCDM_reference_failed"
              next_allowed_step = "Repair eBOSS LCDM-reference rerun before sensitivity audit."
          else:
              readiness_label = route_decision
              next_allowed_step = (
                  "Proceed to v4.139 LCDM reference sensitivity audit. "
                  "Do not compute final RSD pressure, BIC, likelihood, posterior comparison, or validation yet."
              )

          system_health = {
              "workflow_name_sort_prefix": "000 TAIRID",
              "node24_opt_in_added": True,
              "reference_method": "lightweight_LCDM_growth_approximation",
              "lane_count": len(lane_records),
              "family_pressure_persists": family_pressure_persists,
              "family_pressure_z": family["pressure_z"],
              "without_LRG_pressure_z": without_lrg["pressure_z"],
              "without_ELG_pressure_z": without_elg["pressure_z"],
              "without_QSO_pressure_z": without_qso["pressure_z"],
              "single_LRG_pressure_z": single_lrg["pressure_z"],
              "single_ELG_pressure_z": single_elg["pressure_z"],
              "single_QSO_pressure_z": single_qso["pressure_z"],
              "two_driver_pattern_survives_with_weaker_positive_pair": two_driver_pattern_survives_with_weaker_positive_pair,
              "positive_pair_weakened_below_abs_pressure_1": without_elg_positive_weakened,
              "full_posterior_covariance_available": full_posterior_covariance_available,
              "observed_covariance_ingested": observed_covariance_ingested,
              "same_program_eBOSS_covariance_still_limited": True,
              "CAMB_run": False,
              "full_planck_chains_imported": False,
              "full_planck_chain_sample_files_parsed": False,
              "Planck_reference_uncertainty_computed": False,
              "combined_growth_covariance_computed": False,
              "final_RSD_pressure_score_computed": False,
              "TAIRID_validation_claim_allowed": False,
              "rule_pass_count": sum(1 for row in rule_results if row["pass"]),
              "rule_total_count": len(rule_results)
          }

          audit = {
              "run_id": RUN_ID,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "truth_boundary": TRUTH_BOUNDARY,
              "upstream_locks": UPSTREAM_LOCKS,
              "eboss_components_lcdm_reference": EBOSS_COMPONENTS_LCDM_REFERENCE,
              "component_records": component_records,
              "old_interpolation_lane_results": OLD_INTERPOLATION_LANE_RESULTS,
              "lane_records": lane_records,
              "lane_comparison_records": lane_comparison_records,
              "classification_records": classification_records,
              "rerun_summary_records": rerun_summary_records,
              "blocked_claims": BLOCKED_CLAIMS,
              "next_route_options": NEXT_ROUTE_OPTIONS,
              "route_decision": route_decision,
              "rule_results": rule_results,
              "system_health": system_health,
              "gate_result": {
                  "failed_gates": sorted(set(failed_gates)),
                  "warnings": sorted(set(warnings)),
                  "readiness_label": readiness_label,
                  "next_allowed_step": next_allowed_step,
                  "two_driver_pattern_survives_with_weaker_positive_pair": two_driver_pattern_survives_with_weaker_positive_pair,
                  "full_posterior_covariance_available": False,
                  "observed_covariance_ingested": False,
                  "final_RSD_pressure_score_computed": False,
                  "TAIRID_validation_claim_allowed": False
              }
          }

          (OUTDIR / "tairid_v4_138_eboss_component_rerun_with_lcdm_reference.json").write_text(
              json.dumps(audit, indent=2, sort_keys=True),
              encoding="utf-8"
          )

          def write_csv(path, rows, fieldnames):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({key: row.get(key, "") for key in fieldnames})

          write_csv(
              OUTDIR / "component_records_v4_138.csv",
              component_records,
              ["component_id", "target_id", "z", "observed_fsigma8", "observed_sigma", "old_interpolation_reference", "lcdm_reference", "lcdm_reference_variance", "residual_old_reference", "residual_lcdm_reference", "delta_lcdm_reference_minus_old_reference", "total_variance_used", "component_role_from_v4_133", "claim_boundary"]
          )

          write_csv(
              OUTDIR / "lane_records_v4_138.csv",
              lane_records,
              ["lane_id", "members", "member_count", "chi2", "dof", "pressure_z", "abs_pressure_z", "residual_mean", "purpose", "claim_scope"]
          )

          write_csv(
              OUTDIR / "lane_comparison_records_v4_138.csv",
              lane_comparison_records,
              ["lane_id", "old_interpolation_lane_id", "old_chi2", "new_chi2", "delta_chi2_new_minus_old", "old_pressure_z", "new_pressure_z", "delta_pressure_z_new_minus_old", "old_dof", "new_dof", "interpretation"]
          )

          write_csv(
              OUTDIR / "classification_records_v4_138.csv",
              classification_records,
              ["classification_id", "pass", "value", "meaning"]
          )

          write_csv(
              OUTDIR / "rerun_summary_records_v4_138.csv",
              rerun_summary_records,
              ["summary_id", "value", "detail"]
          )

          write_csv(
              OUTDIR / "blocked_claims_v4_138.csv",
              [{"blocked_claim": claim} for claim in BLOCKED_CLAIMS],
              ["blocked_claim"]
          )

          write_csv(
              OUTDIR / "next_route_options_v4_138.csv",
              NEXT_ROUTE_OPTIONS,
              ["priority", "route_id", "purpose", "why_next"]
          )

          write_csv(
              OUTDIR / "rule_results_v4_138.csv",
              rule_results,
              ["rule_id", "pass", "result", "boundary"]
          )

          md = []
          md.append("# 000 TAIRID v4.138 — eBOSS Component Rerun with LCDM Reference")
          md.append("")
          md.append(f"Created UTC: `{audit['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(sorted(set(failed_gates))) if failed_gates else 'none'}`")
          md.append("")
          md.append("## Plain-language result")
          md.append("")
          md.append("v4.138 reruns the eBOSS component lanes with the v4.137 lightweight LCDM reference instead of the older interpolation reference. The two-driver structure survives, but the positive without-ELG pair weakens below |pressure_z| >= 1.")
          md.append("")
          md.append("This is still diagnostic only. The reference is not CAMB or Planck posterior covariance, and the eBOSS observed covariance is still not ingested.")
          md.append("")
          md.append("## LCDM-reference eBOSS lanes")
          md.append("")
          md.append("| Lane | chi2 | dof | pressure_z |")
          md.append("|---|---:|---:|---:|")
          for row in lane_records:
              md.append(f"| `{row['lane_id']}` | `{row['chi2']}` | `{row['dof']}` | `{row['pressure_z']}` |")
          md.append("")
          md.append("## System health")
          md.append("")
          md.append("| Check | Value |")
          md.append("|---|---|")
          for key, value in system_health.items():
              md.append(f"| `{key}` | `{value}` |")
          md.append("")
          md.append("## Route decision")
          md.append("")
          md.append(f"`{route_decision}`")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_allowed_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          for filename in [
              "tairid_v4_138_eboss_component_rerun_with_lcdm_reference.json",
              "tairid_v4_138_eboss_component_rerun_with_lcdm_reference.md",
              "component_records_v4_138.csv",
              "lane_records_v4_138.csv",
              "lane_comparison_records_v4_138.csv",
              "classification_records_v4_138.csv",
              "rerun_summary_records_v4_138.csv",
              "blocked_claims_v4_138.csv",
              "next_route_options_v4_138.csv",
              "rule_results_v4_138.csv"
          ]:
              md.append(f"- `{filename}`")

          (OUTDIR / "tairid_v4_138_eboss_component_rerun_with_lcdm_reference.md").write_text(
              "\n".join(md),
              encoding="utf-8"
          )

          print("Gate result:")
          print(json.dumps(audit["gate_result"], indent=2))
          print()
          print("System health:")
          print(json.dumps(system_health, indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

