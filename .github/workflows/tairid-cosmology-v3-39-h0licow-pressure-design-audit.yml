name: TAIRID Cosmology v3.39 H0LiCOW Pressure Design Audit

on:
  workflow_dispatch:

jobs:
  h0licow-pressure-design-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scientific Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Run TAIRID v3.39 H0LiCOW pressure design audit
        shell: bash
        run: |
          mkdir -p artifacts/tairid_cosmology_v3_39

          python - <<'PY'
          import csv
          import json
          import math
          import re
          import shutil
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          import numpy as np

          OUTDIR = Path("artifacts/tairid_cosmology_v3_39")
          DOWNLOADS = OUTDIR / "downloads"
          OUTDIR.mkdir(parents=True, exist_ok=True)
          DOWNLOADS.mkdir(parents=True, exist_ok=True)

          RUN_ID = "tairid_cosmology_v3_39_h0licow_pressure_design_audit"

          TRUTH_BOUNDARY = [
              "This is not a TAIRID validation test.",
              "This does not prove H0 correction.",
              "This does not prove new physics.",
              "This does not disprove standard cosmology.",
              "This does not fit a full cosmological model.",
              "This does not run a two-surface refit.",
              "This does not compute pressure scores.",
              "This does not compare observed H0LiCOW distances against a numeric baseline.",
              "This defines lens mapping, baseline formulas, and eligibility rules after v3.38 parsing.",
              "H0LiCOW rows remain diagnostic-only.",
              "No H0LiCOW row may be promoted to model-anchor status.",
              "A pass means eligible H0LiCOW rows may move to a guarded pressure-construction workflow."
          ]

          PREVIOUS_MILESTONE = {
              "v3_38_status": "h0licow_chain_parser_implementation_passed_ready_for_v3_39_pressure_design_audit",
              "v3_38_failed_gates": [],
              "v3_38_product_count": 4,
              "v3_38_parsed_product_count": 4,
              "v3_38_parameter_ledger_row_count": 6,
              "v3_38_ddt_row_count": 4,
              "v3_38_dd_row_count": 2,
              "v3_38_weighted_row_count": 1,
              "v3_38_next_rule": "Define lens mapping, baseline formulas, and eligibility rules without building pressure scores or running a refit."
          }

          H0LICOW_DISTANCE_PRODUCTS = [
              {
                  "product_id": "HE0435_Ddt_AO_HST",
                  "lens_or_system": "HE0435",
                  "preferred_lens_objects": ["HE0435_AO_HST", "HE0435_HST"],
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/HE0435_Ddt_AO%2BHST.dat",
                  "source_path": "h0licow_distance_chains/HE0435_Ddt_AO+HST.dat",
                  "parser_mode": "single_column_ddt",
                  "observable_role": "time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "weighted_product": False,
                  "column_plan": [
                      {"parameter": "Ddt_time_delay_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": ""}
                  ],
                  "block_condition": "blocked_until_baseline_family_and_likelihood_context_are_selected"
              },
              {
                  "product_id": "RXJ1131_AO_HST_Dd_Ddt",
                  "lens_or_system": "RXJ1131",
                  "preferred_lens_objects": ["RXJ1131_AO_HST", "RXJ1131_HST"],
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/RXJ1131_AO%2BHST_Dd_Ddt.dat",
                  "source_path": "h0licow_distance_chains/RXJ1131_AO+HST_Dd_Ddt.dat",
                  "parser_mode": "two_column_dd_dtt",
                  "observable_role": "time_delay_and_deflector_distance_reach",
                  "pressure_surface": "reach_geometry",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "weighted_product": False,
                  "column_plan": [
                      {"parameter": "Dd_deflector_angular_diameter_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": ""},
                      {"parameter": "Ddt_time_delay_distance", "column_index": 1, "unit": "Mpc", "weight_column_index": ""}
                  ],
                  "block_condition": "blocked_until_baseline_family_and_likelihood_context_are_selected"
              },
              {
                  "product_id": "J1206_final",
                  "lens_or_system": "J1206",
                  "preferred_lens_objects": ["J1206"],
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/J1206_final.csv",
                  "source_path": "h0licow_distance_chains/J1206_final.csv",
                  "parser_mode": "csv_ddt_dd",
                  "observable_role": "time_delay_and_deflector_distance_reach",
                  "pressure_surface": "reach_geometry",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "weighted_product": False,
                  "column_plan": [
                      {"parameter": "Ddt_time_delay_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": ""},
                      {"parameter": "Dd_deflector_angular_diameter_distance", "column_index": 1, "unit": "Mpc", "weight_column_index": ""}
                  ],
                  "block_condition": "blocked_until_baseline_family_and_likelihood_context_are_selected"
              },
              {
                  "product_id": "WFI2033_dt_bic",
                  "lens_or_system": "WFI2033",
                  "preferred_lens_objects": ["WFI2033"],
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/h0licow_distance_chains/wfi2033_dt_bic.dat",
                  "source_path": "h0licow_distance_chains/wfi2033_dt_bic.dat",
                  "parser_mode": "csv_dt_weight",
                  "observable_role": "weighted_time_delay_reach",
                  "pressure_surface": "reach_geometry",
                  "provenance_status": "direct_public_h0licow_github_distance_chain",
                  "weighted_product": True,
                  "column_plan": [
                      {"parameter": "Ddt_time_delay_distance", "column_index": 0, "unit": "Mpc", "weight_column_index": 1}
                  ],
                  "block_condition": "blocked_until_weighted_likelihood_handling_is_reviewed"
              }
          ]

          SUPPORT_PRODUCTS = [
              {
                  "product_id": "H0_inference_notebook",
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/H0_inference_code/H0_inference.ipynb",
                  "source_path": "H0_inference_code/H0_inference.ipynb",
                  "support_role": "lens_mapping_and_inference_context"
              },
              {
                  "product_id": "H0_lensutils",
                  "url": "https://raw.githubusercontent.com/shsuyu/H0LiCOW-public/master/H0_inference_code/lensutils.py",
                  "source_path": "H0_inference_code/lensutils.py",
                  "support_role": "baseline_formula_context"
              }
          ]

          REQUIRED_CONTRACT_FIELDS = [
              "source",
              "observable_role",
              "pressure_surface",
              "baseline",
              "parser_status",
              "provenance_status",
              "block_condition",
              "claim_boundary"
          ]

          C_LIGHT = 299792.458

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def safe_name(text):
              name = str(text).split("?")[0].rstrip("/").split("/")[-1]
              name = re.sub(r"[^A-Za-z0-9._-]+", "_", name)
              return name or "downloaded_product"

          def download(url, path, timeout=300):
              path.parent.mkdir(parents=True, exist_ok=True)
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "TAIRID-v3.39-h0licow-pressure-design-audit/1.0",
                      "Accept": "*/*"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  status = getattr(resp, "status", None)
                  if status is None or not (200 <= status < 400):
                      raise RuntimeError(f"Download failed: HTTP {status}")

                  with open(path, "wb") as f:
                      shutil.copyfileobj(resp, f)

                  return {
                      "url": url,
                      "path": str(path),
                      "status": status,
                      "size_bytes": path.stat().st_size,
                      "content_type": resp.headers.get("Content-Type"),
                      "content_length_header": resp.headers.get("Content-Length")
                  }

          def parse_float(value):
              try:
                  x = float(str(value).strip())
              except Exception:
                  return None
              if not math.isfinite(x):
                  return None
              return x

          def parse_numeric_rows(path):
              text = path.read_text(encoding="utf-8", errors="replace")
              rows = []
              skipped_rows = []
              header_lines = []
              comment_headers = []
              first_non_numeric_lines = []

              for row_index, line in enumerate(text.splitlines()):
                  original = line.rstrip("\n")
                  stripped = original.strip()

                  if not stripped:
                      continue

                  if stripped.startswith("#"):
                      comment_text = stripped.lstrip("#").strip()
                      comment_headers.append(comment_text)
                      if any(term in comment_text.lower() for term in ["dd", "ddt", "dt", "mpc", "weight", "column"]):
                          header_lines.append(comment_text)
                      continue

                  delimiter = "," if "," in stripped else None
                  if delimiter:
                      parts = [p.strip() for p in stripped.split(",")]
                  else:
                      parts = re.split(r"\s+", stripped)

                  values = [parse_float(p) for p in parts]
                  numeric_count = sum(v is not None for v in values)

                  if numeric_count == len(parts) and numeric_count > 0:
                      rows.append({
                          "row_index": row_index,
                          "raw_line": original,
                          "values": values
                      })
                  else:
                      first_non_numeric_lines.append(original[:300])
                      if any(term in stripped.lower() for term in ["dd", "ddt", "dt", "weight", "h0", "omega"]):
                          header_lines.append(stripped)
                      skipped_rows.append({
                          "row_index": row_index,
                          "reason": "non_numeric_or_header",
                          "raw_line": original[:300]
                      })

              return {
                  "text": text,
                  "rows": rows,
                  "skipped_rows": skipped_rows,
                  "header_lines": header_lines,
                  "comment_headers": comment_headers,
                  "first_non_numeric_lines": first_non_numeric_lines[:10]
              }

          def weighted_quantile(values, weights, q):
              values = np.asarray(values, dtype=float)
              weights = np.asarray(weights, dtype=float)

              mask = np.isfinite(values) & np.isfinite(weights) & (weights >= 0)
              values = values[mask]
              weights = weights[mask]

              if len(values) == 0:
                  return None

              if np.sum(weights) <= 0:
                  weights = np.ones_like(values)

              order = np.argsort(values)
              values = values[order]
              weights = weights[order]
              cumulative = np.cumsum(weights)
              cumulative = cumulative / cumulative[-1]
              return float(np.interp(q, cumulative, values))

          def summarize_values(values, weights=None):
              arr = np.asarray(values, dtype=float)
              arr = arr[np.isfinite(arr)]

              if len(arr) == 0:
                  return {
                      "sample_count": 0,
                      "finite_count": 0,
                      "weighted": False,
                      "effective_sample_count": "",
                      "mean": "",
                      "std": "",
                      "q16": "",
                      "q50": "",
                      "q84": "",
                      "min": "",
                      "max": ""
                  }

              if weights is not None:
                  raw_values = np.asarray(values, dtype=float)
                  w = np.asarray(weights, dtype=float)
                  mask = np.isfinite(raw_values) & np.isfinite(w) & (w >= 0)
                  arr_w = raw_values[mask]
                  w = w[mask]

                  if len(arr_w) == 0 or np.sum(w) <= 0:
                      return summarize_values(arr, weights=None)

                  mean = float(np.average(arr_w, weights=w))
                  variance = float(np.average((arr_w - mean) ** 2, weights=w))
                  std = math.sqrt(max(variance, 0.0))
                  q16 = weighted_quantile(arr_w, w, 0.16)
                  q50 = weighted_quantile(arr_w, w, 0.50)
                  q84 = weighted_quantile(arr_w, w, 0.84)
                  eff_n = float((np.sum(w) ** 2) / np.sum(w ** 2)) if np.sum(w ** 2) > 0 else ""

                  return {
                      "sample_count": int(len(values)),
                      "finite_count": int(len(arr_w)),
                      "weighted": True,
                      "effective_sample_count": eff_n,
                      "mean": mean,
                      "std": std,
                      "q16": q16,
                      "q50": q50,
                      "q84": q84,
                      "min": float(np.min(arr_w)),
                      "max": float(np.max(arr_w))
                  }

              return {
                  "sample_count": int(len(values)),
                  "finite_count": int(len(arr)),
                  "weighted": False,
                  "effective_sample_count": "",
                  "mean": float(np.mean(arr)),
                  "std": float(np.std(arr)),
                  "q16": float(np.quantile(arr, 0.16)),
                  "q50": float(np.quantile(arr, 0.50)),
                  "q84": float(np.quantile(arr, 0.84)),
                  "min": float(np.min(arr)),
                  "max": float(np.max(arr))
              }

          def parse_lens_definitions_from_notebook(notebook_text):
              lens_map = {}
              pattern = re.compile(
                  r'(?P<var>[A-Za-z_]\w*)\s*=\s*lu\.(?:GLEELens|LenstronomyLens)\((?P<body>.*?)(?:\n\s*\)\s*\n)',
                  re.DOTALL
              )

              for match in pattern.finditer(notebook_text):
                  var = match.group("var")
                  body = match.group("body")

                  name_m = re.search(r'name\s*=\s*"([^"]+)"', body)
                  long_m = re.search(r'longname\s*=\s*"([^"]+)"', body)
                  zl_m = re.search(r'zlens\s*=\s*([0-9.]+)', body)
                  zs_m = re.search(r'zsource\s*=\s*([0-9.]+)', body)

                  if not (name_m and zl_m and zs_m):
                      continue

                  record = {
                      "object_var": var,
                      "name": name_m.group(1),
                      "longname": long_m.group(1) if long_m else "",
                      "zlens": float(zl_m.group(1)),
                      "zsource": float(zs_m.group(1)),
                      "mapping_source": "H0_inference_notebook"
                  }

                  lens_map[var] = record
                  lens_map[record["name"]] = record

              return lens_map

          def notebook_to_text(path):
              raw = json.loads(path.read_text(encoding="utf-8", errors="replace"))
              chunks = []
              for cell in raw.get("cells", []):
                  src = cell.get("source", "")
                  if isinstance(src, list):
                      chunks.append("".join(src))
                  else:
                      chunks.append(str(src))
              return "\n".join(chunks)

          def parse_product(product):
              local_path = DOWNLOADS / "H0LiCOW" / "distance_chains" / safe_name(product["source_path"])
              dl = download(product["url"], local_path)
              parsed = parse_numeric_rows(local_path)

              rows = parsed["rows"]
              max_columns = max((len(r["values"]) for r in rows), default=0)
              min_columns = min((len(r["values"]) for r in rows), default=0) if rows else 0

              product_summary = {
                  "source": "H0LiCOW",
                  "product_id": product["product_id"],
                  "lens_or_system": product["lens_or_system"],
                  "source_path": product["source_path"],
                  "url": product["url"],
                  "parser_mode": product["parser_mode"],
                  "download_status": dl["status"],
                  "download_size_bytes": dl["size_bytes"],
                  "numeric_row_count": len(rows),
                  "skipped_row_count": len(parsed["skipped_rows"]),
                  "min_numeric_columns": min_columns,
                  "max_numeric_columns": max_columns,
                  "parser_status": "parsed_to_guarded_ledger" if rows else "downloaded_but_no_numeric_rows",
                  "provenance_status": product["provenance_status"],
                  "observable_role": product["observable_role"],
                  "pressure_surface": product["pressure_surface"],
                  "baseline": "formula_design_only_no_numeric_baseline_in_v3_39",
                  "block_condition": product["block_condition"],
                  "claim_boundary": "diagnostic_only_pressure_design_not_model_anchor",
                  "weighted_product": product["weighted_product"],
                  "pressure_score_built": False,
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              }

              parameter_rows = []

              for col in product["column_plan"]:
                  column_index = int(col["column_index"])
                  weight_col = col.get("weight_column_index", "")
                  weight_col = "" if weight_col == "" else int(weight_col)

                  values = []
                  weights = []

                  for r in rows:
                      vals = r["values"]
                      if column_index >= len(vals):
                          continue

                      x = vals[column_index]
                      if x is None or not math.isfinite(x):
                          continue

                      values.append(float(x))

                      if weight_col != "":
                          if weight_col < len(vals):
                              w = vals[weight_col]
                              if w is not None and math.isfinite(w) and w >= 0:
                                  weights.append(float(w))
                              else:
                                  weights.append(0.0)
                          else:
                              weights.append(0.0)

                  stats = summarize_values(np.asarray(values, dtype=float), np.asarray(weights, dtype=float) if weight_col != "" else None)

                  parameter_rows.append({
                      "source": "H0LiCOW",
                      "product_id": product["product_id"],
                      "lens_or_system": product["lens_or_system"],
                      "source_path": product["source_path"],
                      "observable_role": product["observable_role"],
                      "pressure_surface": product["pressure_surface"],
                      "parameter": col["parameter"],
                      "unit": col["unit"],
                      "column_index": column_index,
                      "weight_column_index": weight_col,
                      "sample_count": stats["sample_count"],
                      "finite_count": stats["finite_count"],
                      "weighted": stats["weighted"],
                      "effective_sample_count": stats["effective_sample_count"],
                      "mean": stats["mean"],
                      "std": stats["std"],
                      "q16": stats["q16"],
                      "q50": stats["q50"],
                      "q84": stats["q84"],
                      "min": stats["min"],
                      "max": stats["max"],
                      "parser_status": product_summary["parser_status"],
                      "provenance_status": product["provenance_status"],
                      "baseline": "formula_design_only_no_numeric_baseline_in_v3_39",
                      "block_condition": product["block_condition"],
                      "claim_boundary": "diagnostic_only_pressure_design_not_model_anchor",
                      "pressure_score_built": False,
                      "model_anchor_allowed_now": False,
                      "refit_allowed_now": False
                  })

              return product_summary, parameter_rows

          def ddt_baseline_formula():
              return "(1 + z_lens) * D_A(0,z_lens) * D_A(0,z_source) / D_A(z_lens,z_source)"

          def dd_baseline_formula():
              return "D_A(0,z_lens)"

          def baseline_parameter_requirements(parameter):
              if parameter == "Ddt_time_delay_distance":
                  return "z_lens,z_source,H0,Omega_m,curvature_assumption,dark_energy_assumption"
              if parameter == "Dd_deflector_angular_diameter_distance":
                  return "z_lens,H0,Omega_m,curvature_assumption,dark_energy_assumption"
              return "unknown"

          def formula_for_parameter(parameter):
              if parameter == "Ddt_time_delay_distance":
                  return ddt_baseline_formula()
              if parameter == "Dd_deflector_angular_diameter_distance":
                  return dd_baseline_formula()
              return "unknown"

          def eligibility_for_row(row, product, mapping_status):
              finite_count = int(row.get("finite_count") or 0)
              parameter = row["parameter"]
              weighted = row["weighted"] is True or str(row["weighted"]).lower() == "true"

              if mapping_status != "lens_mapping_resolved":
                  return {
                      "eligibility_status": "blocked_lens_mapping_missing",
                      "pressure_construction_allowed_next": False,
                      "eligibility_reason": "Lens redshift mapping is required before pressure construction."
                  }

              if finite_count < 1000:
                  return {
                      "eligibility_status": "blocked_too_few_samples",
                      "pressure_construction_allowed_next": False,
                      "eligibility_reason": "Finite chain sample count is too small."
                  }

              if weighted:
                  return {
                      "eligibility_status": "weighted_chain_formula_ready_but_weight_review_required",
                      "pressure_construction_allowed_next": False,
                      "eligibility_reason": "Weighted likelihood handling must be reviewed before pressure construction."
                  }

              if parameter == "Ddt_time_delay_distance":
                  return {
                      "eligibility_status": "eligible_for_guarded_ddt_pressure_construction_next",
                      "pressure_construction_allowed_next": True,
                      "eligibility_reason": "Unweighted Ddt row has mapping, formula, and usable sample count."
                  }

              if parameter == "Dd_deflector_angular_diameter_distance":
                  return {
                      "eligibility_status": "secondary_dd_distance_formula_ready",
                      "pressure_construction_allowed_next": False,
                      "eligibility_reason": "Dd is preserved as secondary reach information; next scoring should begin with Ddt."
                  }

              return {
                  "eligibility_status": "blocked_unknown_parameter",
                  "pressure_construction_allowed_next": False,
                  "eligibility_reason": "Parameter is not recognized for baseline design."
              }

          def write_csv(path, rows, fields):
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fields})

          inventory = {
              "run_id": RUN_ID,
              "created_at_utc": now_iso(),
              "previous_milestone": PREVIOUS_MILESTONE,
              "truth_boundary": TRUTH_BOUNDARY,
              "gate_result": {}
          }

          print("TAIRID Cosmology v3.39 H0LiCOW pressure design audit")
          print("Truth boundary: pressure design only; no pressure score; no refit; no validation claim.")
          print()

          failed_gates = []
          source_errors = {}

          # 1. Download support context and parse lens mappings.
          support_rows = []
          lens_mapping_rows = []
          lens_map = {}

          try:
              notebook_path = DOWNLOADS / "H0LiCOW" / "support" / "H0_inference.ipynb"
              lensutils_path = DOWNLOADS / "H0LiCOW" / "support" / "lensutils.py"

              nb_dl = download(SUPPORT_PRODUCTS[0]["url"], notebook_path)
              lu_dl = download(SUPPORT_PRODUCTS[1]["url"], lensutils_path)

              notebook_text = notebook_to_text(notebook_path)
              lens_map = parse_lens_definitions_from_notebook(notebook_text)

              lensutils_text = lensutils_path.read_text(encoding="utf-8", errors="replace").lower()

              support_rows.append({
                  "source": "H0LiCOW",
                  "product_id": "H0_inference_notebook",
                  "source_path": SUPPORT_PRODUCTS[0]["source_path"],
                  "download_status": nb_dl["status"],
                  "download_size_bytes": nb_dl["size_bytes"],
                  "support_role": "lens_mapping_and_inference_context",
                  "lens_definition_count": len(lens_map),
                  "contains_h0": "h0" in notebook_text.lower(),
                  "contains_ddt": "ddt" in notebook_text.lower(),
                  "contains_likelihood": "likelihood" in notebook_text.lower(),
                  "support_only": True,
                  "pressure_score_built": False,
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              })

              support_rows.append({
                  "source": "H0LiCOW",
                  "product_id": "H0_lensutils",
                  "source_path": SUPPORT_PRODUCTS[1]["source_path"],
                  "download_status": lu_dl["status"],
                  "download_size_bytes": lu_dl["size_bytes"],
                  "support_role": "baseline_formula_context",
                  "lens_definition_count": "",
                  "contains_h0": "h0" in lensutils_text,
                  "contains_ddt": "ddt" in lensutils_text,
                  "contains_likelihood": "likelihood" in lensutils_text,
                  "support_only": True,
                  "pressure_score_built": False,
                  "model_anchor_allowed_now": False,
                  "refit_allowed_now": False
              })

              print(f"Lens definitions parsed from notebook: {len(lens_map)}")

          except Exception as e:
              source_errors["support_context"] = f"{type(e).__name__}: {e}"
              failed_gates.append("support_context_download_or_parse_failed")
              print(f"Support context failed: {source_errors['support_context']}")

          # 2. Parse chains again and attach lens mapping + design rules.
          product_rows = []
          parameter_rows = []
          design_rows = []

          for product in H0LICOW_DISTANCE_PRODUCTS:
              print(f"Designing {product['product_id']}")
              try:
                  product_summary, parsed_rows = parse_product(product)
                  product_rows.append(product_summary)
                  parameter_rows.extend(parsed_rows)

                  mapped = None
                  mapped_object = ""

                  for candidate in product["preferred_lens_objects"]:
                      if candidate in lens_map:
                          mapped = lens_map[candidate]
                          mapped_object = candidate
                          break

                  mapping_status = "lens_mapping_resolved" if mapped else "lens_mapping_missing"

                  lens_mapping_rows.append({
                      "source": "H0LiCOW",
                      "product_id": product["product_id"],
                      "lens_or_system": product["lens_or_system"],
                      "preferred_lens_objects": ";".join(product["preferred_lens_objects"]),
                      "mapped_lens_object": mapped_object,
                      "mapping_status": mapping_status,
                      "zlens": mapped["zlens"] if mapped else "",
                      "zsource": mapped["zsource"] if mapped else "",
                      "longname": mapped["longname"] if mapped else "",
                      "mapping_source": mapped["mapping_source"] if mapped else "",
                      "pressure_score_built": False,
                      "model_anchor_allowed_now": False,
                      "refit_allowed_now": False
                  })

                  for row in parsed_rows:
                      eligibility = eligibility_for_row(row, product, mapping_status)
                      baseline_formula = formula_for_parameter(row["parameter"])
                      baseline_requirements = baseline_parameter_requirements(row["parameter"])

                      design_rows.append({
                          "source": "H0LiCOW",
                          "product_id": product["product_id"],
                          "lens_or_system": product["lens_or_system"],
                          "mapped_lens_object": mapped_object,
                          "mapping_status": mapping_status,
                          "zlens": mapped["zlens"] if mapped else "",
                          "zsource": mapped["zsource"] if mapped else "",
                          "observable_role": row["observable_role"],
                          "pressure_surface": row["pressure_surface"],
                          "parameter": row["parameter"],
                          "unit": row["unit"],
                          "sample_count": row["sample_count"],
                          "finite_count": row["finite_count"],
                          "weighted": row["weighted"],
                          "effective_sample_count": row["effective_sample_count"],
                          "q16": row["q16"],
                          "q50": row["q50"],
                          "q84": row["q84"],
                          "baseline": "formula_ready_no_numeric_baseline_in_v3_39",
                          "baseline_family": "flat_LCDM_or_source_selected_baseline_to_be_chosen_in_next_workflow",
                          "baseline_formula": baseline_formula,
                          "baseline_parameters_required": baseline_requirements,
                          "parser_status": row["parser_status"],
                          "provenance_status": row["provenance_status"],
                          "block_condition": product["block_condition"],
                          "claim_boundary": row["claim_boundary"],
                          "eligibility_status": eligibility["eligibility_status"],
                          "pressure_construction_allowed_next": eligibility["pressure_construction_allowed_next"],
                          "eligibility_reason": eligibility["eligibility_reason"],
                          "pressure_score_built": False,
                          "model_anchor_allowed_now": False,
                          "refit_allowed_now": False,
                          "boundary_note": "Pressure-design row only. Formula and eligibility are defined; no baseline comparison or pressure score is built."
                      })

                  print(f"  mapping={mapping_status} design_rows={len(parsed_rows)}")

              except Exception as e:
                  source_errors[product["product_id"]] = f"{type(e).__name__}: {e}"
                  failed_gates.append(f"{product['product_id']}_design_failed")
                  print(f"  failed: {source_errors[product['product_id']]}")

          # 3. Output files.
          write_csv(
              OUTDIR / "h0licow_pressure_design_product_summary_v3_39.csv",
              product_rows,
              [
                  "source", "product_id", "lens_or_system", "source_path", "url",
                  "parser_mode", "download_status", "download_size_bytes",
                  "numeric_row_count", "skipped_row_count", "min_numeric_columns",
                  "max_numeric_columns", "parser_status", "provenance_status",
                  "observable_role", "pressure_surface", "baseline",
                  "block_condition", "claim_boundary", "weighted_product",
                  "pressure_score_built", "model_anchor_allowed_now",
                  "refit_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "h0licow_pressure_design_lens_mapping_v3_39.csv",
              lens_mapping_rows,
              [
                  "source", "product_id", "lens_or_system", "preferred_lens_objects",
                  "mapped_lens_object", "mapping_status", "zlens", "zsource",
                  "longname", "mapping_source", "pressure_score_built",
                  "model_anchor_allowed_now", "refit_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "h0licow_pressure_design_parameter_ledger_v3_39.csv",
              parameter_rows,
              [
                  "source", "product_id", "lens_or_system", "source_path",
                  "observable_role", "pressure_surface", "parameter", "unit",
                  "column_index", "weight_column_index",
                  "sample_count", "finite_count", "weighted",
                  "effective_sample_count", "mean", "std", "q16", "q50",
                  "q84", "min", "max", "parser_status",
                  "provenance_status", "baseline", "block_condition",
                  "claim_boundary", "pressure_score_built",
                  "model_anchor_allowed_now", "refit_allowed_now"
              ]
          )

          write_csv(
              OUTDIR / "h0licow_pressure_design_rules_v3_39.csv",
              design_rows,
              [
                  "source", "product_id", "lens_or_system", "mapped_lens_object",
                  "mapping_status", "zlens", "zsource", "observable_role",
                  "pressure_surface", "parameter", "unit", "sample_count",
                  "finite_count", "weighted", "effective_sample_count",
                  "q16", "q50", "q84", "baseline", "baseline_family",
                  "baseline_formula", "baseline_parameters_required",
                  "parser_status", "provenance_status", "block_condition",
                  "claim_boundary", "eligibility_status",
                  "pressure_construction_allowed_next", "eligibility_reason",
                  "pressure_score_built", "model_anchor_allowed_now",
                  "refit_allowed_now", "boundary_note"
              ]
          )

          write_csv(
              OUTDIR / "h0licow_pressure_design_support_context_v3_39.csv",
              support_rows,
              [
                  "source", "product_id", "source_path", "download_status",
                  "download_size_bytes", "support_role", "lens_definition_count",
                  "contains_h0", "contains_ddt", "contains_likelihood",
                  "support_only", "pressure_score_built",
                  "model_anchor_allowed_now", "refit_allowed_now"
              ]
          )

          # 4. Audit.
          mapped_count = sum(1 for r in lens_mapping_rows if r["mapping_status"] == "lens_mapping_resolved")
          ddt_design_rows = [r for r in design_rows if r["parameter"] == "Ddt_time_delay_distance"]
          dd_design_rows = [r for r in design_rows if r["parameter"] == "Dd_deflector_angular_diameter_distance"]
          eligible_ddt_rows = [
              r for r in ddt_design_rows
              if r["pressure_construction_allowed_next"] is True
          ]
          weighted_blocked_rows = [
              r for r in design_rows
              if (r["weighted"] is True or str(r["weighted"]).lower() == "true")
              and r["pressure_construction_allowed_next"] is False
          ]
          formula_ready_rows = [
              r for r in design_rows
              if r["baseline_formula"] not in ["", "unknown"]
          ]

          pressure_score_count = sum(1 for r in design_rows if r["pressure_score_built"] is True)
          model_anchor_count = sum(1 for r in design_rows if r["model_anchor_allowed_now"] is True)
          refit_count = sum(1 for r in design_rows if r["refit_allowed_now"] is True)

          contract_ok = True
          for row in design_rows:
              for field in REQUIRED_CONTRACT_FIELDS:
                  if field not in row or row.get(field) in ["", None]:
                      contract_ok = False

          audit_rows = [
              {
                  "audit_gate": "support_context_loaded",
                  "pass": len(support_rows) >= 2 and len(lens_map) >= 4,
                  "value": f"support_rows={len(support_rows)}; lens_definitions={len(lens_map)}",
                  "boundary": "H0 inference notebook and lensutils should be loaded as support context."
              },
              {
                  "audit_gate": "selected_products_redesigned",
                  "pass": len(product_rows) == len(H0LICOW_DISTANCE_PRODUCTS),
                  "value": len(product_rows),
                  "boundary": "All v3.38 selected distance products should enter v3.39 design."
              },
              {
                  "audit_gate": "lens_mapping_resolved",
                  "pass": mapped_count >= 4,
                  "value": mapped_count,
                  "boundary": "Each selected product should map to a lens object with lens/source redshift."
              },
              {
                  "audit_gate": "ddt_design_rows_present",
                  "pass": len(ddt_design_rows) >= 4,
                  "value": len(ddt_design_rows),
                  "boundary": "Ddt time-delay distance rows remain the primary H0LiCOW reach lane."
              },
              {
                  "audit_gate": "dd_secondary_rows_preserved",
                  "pass": len(dd_design_rows) >= 2,
                  "value": len(dd_design_rows),
                  "boundary": "Dd rows should be preserved as secondary distance information."
              },
              {
                  "audit_gate": "baseline_formulas_ready",
                  "pass": len(formula_ready_rows) == len(design_rows) and len(design_rows) >= 6,
                  "value": f"formula_ready={len(formula_ready_rows)}; design_rows={len(design_rows)}",
                  "boundary": "Every design row should have a formula, not a pressure score."
              },
              {
                  "audit_gate": "eligible_unweighted_ddt_rows_ready_next",
                  "pass": len(eligible_ddt_rows) >= 3,
                  "value": len(eligible_ddt_rows),
                  "boundary": "At least three unweighted Ddt rows should be ready for guarded pressure construction."
              },
              {
                  "audit_gate": "weighted_rows_blocked_for_review",
                  "pass": len(weighted_blocked_rows) >= 1,
                  "value": len(weighted_blocked_rows),
                  "boundary": "Weighted WFI2033-like rows should not advance without weight/likelihood review."
              },
              {
                  "audit_gate": "required_contract_fields_present",
                  "pass": contract_ok,
                  "value": contract_ok,
                  "boundary": "v3.36 source/role/surface/baseline/parser/provenance/block/claim contract must persist."
              },
              {
                  "audit_gate": "pressure_scores_not_built",
                  "pass": pressure_score_count == 0,
                  "value": pressure_score_count,
                  "boundary": "No pressure score may be built in v3.39."
              },
              {
                  "audit_gate": "model_anchors_not_promoted",
                  "pass": model_anchor_count == 0,
                  "value": model_anchor_count,
                  "boundary": "No H0LiCOW row may become a model anchor."
              },
              {
                  "audit_gate": "refit_not_allowed",
                  "pass": refit_count == 0,
                  "value": refit_count,
                  "boundary": "No refit is allowed."
              },
              {
                  "audit_gate": "model_claim_allowed",
                  "pass": False,
                  "value": False,
                  "boundary": "No model claim is allowed."
              }
          ]

          write_csv(
              OUTDIR / "h0licow_pressure_design_audit_v3_39.csv",
              audit_rows,
              ["audit_gate", "pass", "value", "boundary"]
          )

          hard_failed = list(failed_gates)

          if len(support_rows) < 2 or len(lens_map) < 4:
              hard_failed.append("support_context_or_lens_definitions_missing")

          if len(product_rows) < 4:
              hard_failed.append("selected_products_missing")

          if mapped_count < 4:
              hard_failed.append("lens_mapping_incomplete")

          if len(ddt_design_rows) < 4:
              hard_failed.append("ddt_design_rows_missing")

          if len(dd_design_rows) < 2:
              hard_failed.append("dd_secondary_rows_missing")

          if len(formula_ready_rows) != len(design_rows) or len(design_rows) < 6:
              hard_failed.append("baseline_formula_design_incomplete")

          if len(eligible_ddt_rows) < 3:
              hard_failed.append("too_few_unweighted_ddt_rows_ready_next")

          if len(weighted_blocked_rows) < 1:
              hard_failed.append("weighted_chain_not_blocked_for_review")

          if not contract_ok:
              hard_failed.append("required_contract_fields_missing")

          if pressure_score_count != 0:
              hard_failed.append("pressure_score_built_too_early")

          if model_anchor_count != 0:
              hard_failed.append("model_anchor_promotion_violation")

          if refit_count != 0:
              hard_failed.append("refit_guard_violation")

          if hard_failed:
              readiness_label = "h0licow_pressure_design_audit_needs_followup"
          else:
              readiness_label = "h0licow_pressure_design_audit_passed_unweighted_ddt_ready_weighted_wfi_blocked"

          next_step = (
              "Build v3.40 H0LiCOW guarded pressure construction for eligible unweighted Ddt rows only; keep weighted WFI2033 and Dd secondary rows blocked from primary scoring, and do not run a refit."
              if not hard_failed
              else "Inspect v3.39 H0LiCOW pressure-design outputs and repair mapping/formula/eligibility issues before pressure construction."
          )

          inventory.update({
              "product_count": len(product_rows),
              "parameter_row_count": len(parameter_rows),
              "design_row_count": len(design_rows),
              "lens_mapping_row_count": len(lens_mapping_rows),
              "mapped_count": mapped_count,
              "ddt_design_row_count": len(ddt_design_rows),
              "dd_design_row_count": len(dd_design_rows),
              "eligible_unweighted_ddt_row_count": len(eligible_ddt_rows),
              "weighted_blocked_row_count": len(weighted_blocked_rows),
              "formula_ready_row_count": len(formula_ready_rows),
              "pressure_score_count": pressure_score_count,
              "model_anchor_count": model_anchor_count,
              "refit_count": refit_count,
              "source_errors": source_errors,
              "gate_result": {
                  "failed_gates": hard_failed,
                  "readiness_label": readiness_label,
                  "product_count": len(product_rows),
                  "parameter_row_count": len(parameter_rows),
                  "design_row_count": len(design_rows),
                  "mapped_count": mapped_count,
                  "ddt_design_row_count": len(ddt_design_rows),
                  "dd_design_row_count": len(dd_design_rows),
                  "eligible_unweighted_ddt_row_count": len(eligible_ddt_rows),
                  "weighted_blocked_row_count": len(weighted_blocked_rows),
                  "formula_ready_row_count": len(formula_ready_rows),
                  "pressure_score_built": False,
                  "model_claim_allowed": False,
                  "refit_allowed": False,
                  "next_allowed_step": next_step
              }
          })

          json_path = OUTDIR / "tairid_cosmology_v3_39_h0licow_pressure_design_audit.json"
          json_path.write_text(json.dumps(inventory, indent=2, sort_keys=True), encoding="utf-8")

          md = []
          md.append("# TAIRID Cosmology v3.39 — H0LiCOW Pressure Design Audit")
          md.append("")
          md.append(f"Created UTC: `{inventory['created_at_utc']}`")
          md.append("")
          md.append("## Status")
          md.append("")
          md.append(f"Readiness label: `{readiness_label}`")
          md.append("")
          md.append(f"Failed gates: `{', '.join(hard_failed) if hard_failed else 'none'}`")
          md.append("")
          md.append("## Truth boundary")
          md.append("")
          for line in TRUTH_BOUNDARY:
              md.append(f"- {line}")
          md.append("")
          md.append("## What this test does")
          md.append("")
          md.append("v3.39 defines H0LiCOW lens mapping, baseline formulas, and eligibility rules after v3.38 parsed the distance-chain products.")
          md.append("")
          md.append("It does not compute pressure scores, does not compare observed values against Planck or any baseline, and does not run a refit.")
          md.append("")
          md.append("## Results")
          md.append("")
          md.append(f"- Products redesigned: `{len(product_rows)}`")
          md.append(f"- Parameter rows carried forward: `{len(parameter_rows)}`")
          md.append(f"- Design rows: `{len(design_rows)}`")
          md.append(f"- Lens mappings resolved: `{mapped_count}`")
          md.append(f"- Ddt design rows: `{len(ddt_design_rows)}`")
          md.append(f"- Dd secondary rows: `{len(dd_design_rows)}`")
          md.append(f"- Eligible unweighted Ddt rows for next step: `{len(eligible_ddt_rows)}`")
          md.append(f"- Weighted rows blocked for review: `{len(weighted_blocked_rows)}`")
          md.append(f"- Pressure scores built: `{pressure_score_count}`")
          md.append(f"- Model anchors: `{model_anchor_count}`")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          if not hard_failed:
              md.append("H0LiCOW now has mapped lens systems, formula-ready Ddt rows, preserved Dd secondary rows, and an explicit block on weighted-chain promotion. The next workflow may build guarded pressure diagnostics for eligible unweighted Ddt rows only.")
          else:
              md.append("H0LiCOW pressure design found blockers. Pressure construction should wait until mapping, formulas, or eligibility rows are repaired.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `h0licow_pressure_design_product_summary_v3_39.csv`")
          md.append("- `h0licow_pressure_design_lens_mapping_v3_39.csv`")
          md.append("- `h0licow_pressure_design_parameter_ledger_v3_39.csv`")
          md.append("- `h0licow_pressure_design_rules_v3_39.csv`")
          md.append("- `h0licow_pressure_design_support_context_v3_39.csv`")
          md.append("- `h0licow_pressure_design_audit_v3_39.csv`")
          md.append("- `tairid_cosmology_v3_39_h0licow_pressure_design_audit.json`")
          md.append("- `tairid_cosmology_v3_39_h0licow_pressure_design_audit.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_39_h0licow_pressure_design_audit.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if hard_failed:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

      - name: Upload TAIRID v3.39 H0LiCOW pressure design audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tairid-cosmology-v3-39-h0licow-pressure-design-audit
          path: artifacts/tairid_cosmology_v3_39/
