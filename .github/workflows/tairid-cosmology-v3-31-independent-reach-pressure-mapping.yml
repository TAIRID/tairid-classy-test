          md.append(f"- Extreme pressure rows |z| > 10: `{len(extreme_pressure_rows)}`")
          md.append(f"- Mixed-sign families: `{', '.join(inventory['mixed_sign_families']) if inventory['mixed_sign_families'] else 'none'}`")
          md.append(f"- KiDS growth ready: `{inventory['kids_growth_ready']}`")
          md.append(f"- KiDS mean growth pressure: `{inventory['kids_growth_mean_pressure_z']}`")
          md.append("")
          md.append("## Interpretation")
          md.append("")
          if not failed_gates:
              md.append("The independent reach rows now have comparable diagnostic pressure coordinates. The next step is interpretation, not refit: we need to inspect whether the reach side behaves as one surface or splits into BAO transverse/radial/time-delay sub-surfaces.")
          else:
              md.append("Pressure mapping did not clear all gates. No interpretation or refit should proceed until the failed gates are repaired.")
          md.append("")
          md.append("## Next allowed step")
          md.append("")
          md.append(next_step)
          md.append("")
          md.append("## Files produced")
          md.append("")
          md.append("- `independent_reach_pressure_mapped_rows_v3_31.csv`")
          md.append("- `independent_reach_pressure_family_summary_v3_31.csv`")
          md.append("- `kids_growth_comparison_rows_v3_31.csv`")
          md.append("- `tdcosmo_pressure_mapping_skipped_rows_v3_31.csv`")
          md.append("- `independent_reach_pressure_mapping_audit_v3_31.csv`")
          md.append("- `tairid_cosmology_v3_31_independent_reach_pressure_mapping.json`")
          md.append("- `tairid_cosmology_v3_31_independent_reach_pressure_mapping.md`")
          md.append("")

          md_path = OUTDIR / "tairid_cosmology_v3_31_independent_reach_pressure_mapping.md"
          md_path.write_text("\n".join(md), encoding="utf-8")

          print("Gate result:")
          print(json.dumps(inventory["gate_result"], indent=2))
          print()
          print("Wrote artifacts into:")
          print(f"  {OUTDIR}")

          if failed_gates:
              raise SystemExit(2)

          raise SystemExit(0)
          PY

