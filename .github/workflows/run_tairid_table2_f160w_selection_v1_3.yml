name: Run TAIRID Table2 F160W selection v1.3

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tairid-table2-f160w-selection-v1-3:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy matplotlib astropy pandas

      - name: Confirm script exists
        run: |
          pwd
          ls -la
          test -f run_tairid_table2_f160w_selection_v1_3.py
          echo "Script found."

      - name: Run TAIRID Table2 F160W selection v1.3
        run: |
          python run_tairid_table2_f160w_selection_v1_3.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-table2-f160w-selection-v1-3-output
          path: |
            tairid_table2_f160w_selection_v1_3_outputs/**
