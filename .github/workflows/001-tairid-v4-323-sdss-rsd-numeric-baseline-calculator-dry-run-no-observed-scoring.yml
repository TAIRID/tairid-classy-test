name: 001 TAIRID v4.323 - SDSS RSD Numeric Baseline Calculator Dry Run No Observed Scoring

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-323-sdss-rsd-numeric-baseline-calculator-dry-run-no-observed-scoring.yml"
      - ".github/workflows/**"
      - "github/workflows/**"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"
      - "*.tsv"

permissions:
  contents: read

jobs:
  sdss-rsd-numeric-baseline-calculator-dry-run-no-observed-scoring:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.323 SDSS RSD Numeric Baseline Calculator Dry Run No Observed Scoring is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.323 SDSS RSD numeric baseline calculator dry run no observed scoring
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv, json, math, zipfile

          VERSION = "v4.323"
          EXPECTED_RESULT = "v4_323_sdss_rsd_numeric_baseline_calculator_dry_run_no_observed_scoring_passed_no_claims"
          SELECTED_NEXT_ROUTE = "v4_324_sdss_rsd_numeric_baseline_parameter_source_packet_no_scoring"

          OUT = Path("tairid_v4_323_sdss_rsd_numeric_baseline_calculator_dry_run_output")
          OUT.mkdir(parents=True, exist_ok=True)
          ZIP_NAME = "tairid-v4-323-sdss-rsd-numeric-baseline-calculator-dry-run-output.zip"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def omega_m_z(z, omega_m0):
              omega_l0 = 1.0 - omega_m0
              ez2 = omega_m0 * (1.0 + z) ** 3 + omega_l0
              return omega_m0 * (1.0 + z) ** 3 / ez2

          def growth_f(z, omega_m0, gamma):
              return omega_m_z(z, omega_m0) ** gamma

          def integrate_growth_D(z, omega_m0, gamma, n=800):
              if z <= 0:
                  return 1.0
              dz = z / n
              acc = 0.0
              for i in range(n + 1):
                  zz = i * dz
                  weight = 0.5 if i in (0, n) else 1.0
                  acc += weight * growth_f(zz, omega_m0, gamma) / (1.0 + zz)
              integral = acc * dz
              return math.exp(-integral)

          inherited_v4_322_rows = [
              {"inherited_from": "v4.322", "item": "rules", "value": "27 / 27 passed", "meaning": "Numeric baseline policy and calculator staging passed.", "carry_forward_status": "ready_for_dry_run"},
              {"inherited_from": "v4.322", "item": "inherited_source_candidate_gate_confirmed", "value": True, "meaning": "Source-candidate gates were confirmed.", "carry_forward_status": "confirmed"},
              {"inherited_from": "v4.322", "item": "policy_rows", "value": 6, "meaning": "Numeric policy guardrails were staged.", "carry_forward_status": "policy_available"},
              {"inherited_from": "v4.322", "item": "calculator_input_rows", "value": 7, "meaning": "Calculator input requirements were staged.", "carry_forward_status": "inputs_staged"},
              {"inherited_from": "v4.322", "item": "calculator_method_rows", "value": 3, "meaning": "Calculator method options were staged.", "carry_forward_status": "methods_staged"},
              {"inherited_from": "v4.322", "item": "observed_values_loaded", "value": False, "meaning": "No observed values were loaded.", "carry_forward_status": "no_observed_values"},
              {"inherited_from": "v4.322", "item": "score_valid", "value": False, "meaning": "No score was valid.", "carry_forward_status": "blocked"},
              {"inherited_from": "v4.322", "item": "selected_next_route", "value": "v4_323_sdss_rsd_numeric_baseline_calculator_dry_run_no_observed_scoring", "meaning": "Current workflow.", "carry_forward_status": "current_route"},
          ]

          candidate_parameter_rows = [
              {
                  "parameter_id": "param_001",
                  "parameter_name": "omega_m0",
                  "candidate_value": 0.315,
                  "candidate_role": "matter density for dry-run Lambda-CDM growth-index calculator",
                  "source_status": "candidate_only_not_approved",
                  "approved_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
              {
                  "parameter_id": "param_002",
                  "parameter_name": "sigma8_0",
                  "candidate_value": 0.811,
                  "candidate_role": "normalization placeholder for dry-run f_sigma8 calculator",
                  "source_status": "candidate_only_not_approved",
                  "approved_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
              {
                  "parameter_id": "param_003",
                  "parameter_name": "gamma",
                  "candidate_value": 0.55,
                  "candidate_role": "growth-index approximation placeholder",
                  "source_status": "method_placeholder_not_approved",
                  "approved_now": False,
                  "score_allowed": False,
                  "support_allowed": False,
              },
          ]

          z_grid = [0.00, 0.25, 0.50, 0.75, 1.00, 1.25, 1.50, 2.00]
          omega_m0 = 0.315
          sigma8_0 = 0.811
          gamma = 0.55

          dry_run_rows = []
          for z in z_grid:
              omz = omega_m_z(z, omega_m0)
              fz = growth_f(z, omega_m0, gamma)
              Dz = integrate_growth_D(z, omega_m0, gamma)
              sig8z = sigma8_0 * Dz
              fs8 = fz * sig8z
              dry_run_rows.append({
                  "dry_run_id": f"dry_run_{len(dry_run_rows)+1:03d}",
                  "z": round(z, 6),
                  "omega_m_z": round(omz, 9),
                  "growth_f_approx": round(fz, 9),
                  "growth_D_approx": round(Dz, 9),
                  "sigma8_z_dry_run": round(sig8z, 9),
                  "fsigma8_dry_run": round(fs8, 9),
                  "dry_run_value_status": "calculator_structure_only_not_approved_baseline",
                  "observed_value_loaded": False,
                  "residual_computed": False,
                  "score_allowed": False,
                  "support_allowed": False,
              })

          calculator_validation_rows = [
              {
                  "validation_id": "calc_check_001",
                  "check_name": "dry_run_rows_written",
                  "check_passed": len(dry_run_rows) == len(z_grid),
                  "meaning": "Dry-run grid was written.",
              },
              {
                  "validation_id": "calc_check_002",
                  "check_name": "finite_values",
                  "check_passed": all(math.isfinite(r["fsigma8_dry_run"]) for r in dry_run_rows),
                  "meaning": "Dry-run values are finite.",
              },
              {
                  "validation_id": "calc_check_003",
                  "check_name": "positive_values",
                  "check_passed": all(r["fsigma8_dry_run"] > 0 for r in dry_run_rows),
                  "meaning": "Dry-run values are positive.",
              },
              {
                  "validation_id": "calc_check_004",
                  "check_name": "growth_D_normalized_at_zero",
                  "check_passed": abs(dry_run_rows[0]["growth_D_approx"] - 1.0) < 1e-9,
                  "meaning": "Growth D is normalized at z=0.",
              },
              {
                  "validation_id": "calc_check_005",
                  "check_name": "observed_values_not_loaded",
                  "check_passed": all(r["observed_value_loaded"] is False for r in dry_run_rows),
                  "meaning": "No observed SDSS values were loaded.",
              },
              {
                  "validation_id": "calc_check_006",
                  "check_name": "residuals_not_computed",
                  "check_passed": all(r["residual_computed"] is False for r in dry_run_rows),
                  "meaning": "No residuals were computed.",
              },
          ]

          dry_run_policy_rows = [
              {"policy_id": "dry_policy_001", "policy": "Dry-run values are calculator sanity outputs only; they are not approved baseline values.", "active": True},
              {"policy_id": "dry_policy_002", "policy": "Observed values are not loaded in v4.323, so no comparison to data is made.", "active": True},
              {"policy_id": "dry_policy_003", "policy": "Residuals, chi-square, p-values, likelihoods, support claims, and validation claims remain blocked.", "active": True},
              {"policy_id": "dry_policy_004", "policy": "Exact parameter source gates must run before candidate parameters can become approved calculator inputs.", "active": True},
              {"policy_id": "dry_policy_005", "policy": "Definition-match and covariance gates must run before any observed diagnostic can be considered.", "active": True},
          ]

          next_gap_rows = [
              {
                  "gap_id": "gap_001",
                  "gap": "Exact parameter source packet is not yet approved.",
                  "why_it_matters": "Candidate omega_m0, sigma8_0, and gamma cannot become approved inputs without source review.",
              },
              {
                  "gap_id": "gap_002",
                  "gap": "Observed SDSS row values are not loaded or definition-matched.",
                  "why_it_matters": "No observed comparison can happen without row-level definition matching.",
              },
              {
                  "gap_id": "gap_003",
                  "gap": "Observed uncertainty/covariance policy is not approved.",
                  "why_it_matters": "No residual, chi-square, p-value, or likelihood can be meaningful without uncertainty/covariance handling.",
              },
              {
                  "gap_id": "gap_004",
                  "gap": "Independence/null-rule gate is still blocked.",
                  "why_it_matters": "Even a future match cannot be treated as support unless circularity and null policy are resolved.",
              },
          ]

          gate_rows = [
              {"gate_id": "gate_001", "gate_object": "inherited_source_candidate_gate_confirmed", "gate_passed": True, "gate_status": "confirmed", "reason": "v4.321 confirmed source-candidate gates."},
              {"gate_id": "gate_002", "gate_object": "candidate_parameters_written", "gate_passed": len(candidate_parameter_rows) == 3, "gate_status": "written_candidate_only", "reason": "Candidate parameters written but not approved."},
              {"gate_id": "gate_003", "gate_object": "dry_run_grid_written", "gate_passed": len(dry_run_rows) == 8, "gate_status": "written", "reason": "Dry-run calculator grid written."},
              {"gate_id": "gate_004", "gate_object": "calculator_validation_passed", "gate_passed": all(r["check_passed"] for r in calculator_validation_rows), "gate_status": "passed", "reason": "Calculator structure checks passed."},
              {"gate_id": "gate_005", "gate_object": "observed_values_loaded", "gate_passed": False, "gate_status": "not_loaded", "reason": "v4.323 is no observed scoring."},
              {"gate_id": "gate_006", "gate_object": "numeric_baseline_values_approved", "gate_passed": False, "gate_status": "not_approved", "reason": "Dry-run values are not approved baselines."},
              {"gate_id": "gate_007", "gate_object": "definition_match_confirmation", "gate_passed": False, "gate_status": "not_confirmed", "reason": "Definition matches remain blocked."},
              {"gate_id": "gate_008", "gate_object": "diagonal_diagnostic_readiness", "gate_passed": False, "gate_status": "not_ready", "reason": "No scoring readiness."},
          ]

          blocked_rows = [
              {"blocked_id": "blocked_001", "operation": "approve_baseline_values_now", "reason": "dry-run values are not approved baseline values", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "load_observed_values_now", "reason": "definition-match lane has not run", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "run_diagonal_diagnostic_now", "reason": "diagnostic readiness is false", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "compute_residual_or_chi_square", "reason": "observed values are not loaded and baselines are not approved", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "compute_p_value_or_likelihood", "reason": "full covariance/likelihood remains absent", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "claim_tairid_support", "reason": "support is blocked", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "claim_evidence_or_validation", "reason": "no score and no holdout", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "fit_numeric_correction", "reason": "no fitting allowed", "blocked": True},
              {"blocked_id": "blocked_009", "operation": "build_combined_matrix", "reason": "combined matrix remains blocked", "blocked": True},
          ]

          permission_rows = [
              {"permission_scope": "numeric_baseline_calculator_dry_run_no_observed_scoring", "permission_status": "completed", "reason": "Calculator structure dry run completed."},
              {"permission_scope": "numeric_baseline_parameter_source_packet", "permission_status": "allowed_next", "reason": "Next workflow may gather/structure exact parameter source candidates."},
              {"permission_scope": "observed_value_loading", "permission_status": "blocked", "reason": "Definition match not confirmed."},
              {"permission_scope": "numeric_baseline_approval", "permission_status": "blocked", "reason": "Dry-run values are not approved."},
              {"permission_scope": "diagonal_diagnostic_score", "permission_status": "blocked", "reason": "No scoring readiness."},
              {"permission_scope": "support_language", "permission_status": "blocked", "reason": "No support allowed."},
          ]

          sdr_rows = [
              {"sdr_id": "sdr_001", "before_state": "calculator path was staged but untested", "after_state": "calculator structure produces finite dry-run values", "reduction_type": "calculator feasibility checked"},
              {"sdr_id": "sdr_002", "before_state": "dry-run could be mistaken for real baseline", "after_state": "dry-run values are labeled not-approved and no observed values are loaded", "reduction_type": "dry-run/baseline boundary preserved"},
              {"sdr_id": "sdr_003", "before_state": "next parameter gap was broad", "after_state": "exact parameter source packet is identified as next route", "reduction_type": "next gap clarified"},
              {"sdr_id": "sdr_004", "before_state": "calculator success could invite scoring pressure", "after_state": "observed loading, residuals, chi-square, p-values, and likelihoods remain blocked", "reduction_type": "false progress blocked"},
              {"sdr_id": "sdr_005", "before_state": "baseline lane could drift toward support language", "after_state": "support and evidence claims remain blocked", "reduction_type": "claim discipline preserved"},
          ]

          checks = [
              {"gate": "workflow_visible_step_executed", "passed": True, "detail": "echo step completed before dry run"},
              {"gate": "inherited_v4_322_rows_equal_8", "passed": len(inherited_v4_322_rows) == 8, "detail": f"inherited_v4_322_rows = {len(inherited_v4_322_rows)}"},
              {"gate": "candidate_parameter_rows_equal_3", "passed": len(candidate_parameter_rows) == 3, "detail": f"candidate_parameter_rows = {len(candidate_parameter_rows)}"},
              {"gate": "dry_run_rows_equal_8", "passed": len(dry_run_rows) == 8, "detail": f"dry_run_rows = {len(dry_run_rows)}"},
              {"gate": "calculator_validation_rows_equal_6", "passed": len(calculator_validation_rows) == 6, "detail": f"calculator_validation_rows = {len(calculator_validation_rows)}"},
              {"gate": "calculator_validation_all_passed", "passed": all(r["check_passed"] for r in calculator_validation_rows), "detail": "calculator validation all passed"},
              {"gate": "dry_run_policy_rows_equal_5", "passed": len(dry_run_policy_rows) == 5, "detail": f"dry_run_policy_rows = {len(dry_run_policy_rows)}"},
              {"gate": "next_gap_rows_equal_4", "passed": len(next_gap_rows) == 4, "detail": f"next_gap_rows = {len(next_gap_rows)}"},
              {"gate": "gate_rows_equal_8", "passed": len(gate_rows) == 8, "detail": f"gate_rows = {len(gate_rows)}"},
              {"gate": "blocked_rows_equal_9", "passed": len(blocked_rows) == 9, "detail": f"blocked_rows = {len(blocked_rows)}"},
              {"gate": "permission_rows_equal_6", "passed": len(permission_rows) == 6, "detail": f"permission_rows = {len(permission_rows)}"},
              {"gate": "sdr_rows_equal_5", "passed": len(sdr_rows) == 5, "detail": f"sdr_rows = {len(sdr_rows)}"},
              {"gate": "all_parameters_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in candidate_parameter_rows), "detail": "parameters no score/support"},
              {"gate": "all_dry_run_rows_no_score_support", "passed": all(r["score_allowed"] is False and r["support_allowed"] is False for r in dry_run_rows), "detail": "dry run no score/support"},
              {"gate": "observed_values_not_loaded", "passed": all(r["observed_value_loaded"] is False for r in dry_run_rows), "detail": "observed values not loaded"},
              {"gate": "residuals_not_computed", "passed": all(r["residual_computed"] is False for r in dry_run_rows), "detail": "residuals not computed"},
              {"gate": "all_blocked_operations_blocked", "passed": all(r["blocked"] is True for r in blocked_rows), "detail": "all blocked"},
              {"gate": "numeric_baselines_not_approved", "passed": any(r["gate_object"] == "numeric_baseline_values_approved" and r["gate_passed"] is False for r in gate_rows), "detail": "numeric baselines not approved"},
              {"gate": "definition_match_false", "passed": any(r["gate_object"] == "definition_match_confirmation" and r["gate_passed"] is False for r in gate_rows), "detail": "definition not confirmed"},
              {"gate": "diagnostic_readiness_false", "passed": any(r["gate_object"] == "diagonal_diagnostic_readiness" and r["gate_passed"] is False for r in gate_rows), "detail": "diagnostic not ready"},
              {"gate": "truth_boundary_not_proof", "passed": True, "detail": "not proof"},
              {"gate": "truth_boundary_not_validation", "passed": True, "detail": "not validation"},
              {"gate": "truth_boundary_no_support", "passed": True, "detail": "no support"},
              {"gate": "truth_boundary_no_observed_score", "passed": True, "detail": "no observed score"},
              {"gate": "truth_boundary_no_p_value", "passed": True, "detail": "no p-value"},
              {"gate": "truth_boundary_no_likelihood", "passed": True, "detail": "no likelihood"},
              {"gate": "selected_next_route_written", "passed": SELECTED_NEXT_ROUTE == "v4_324_sdss_rsd_numeric_baseline_parameter_source_packet_no_scoring", "detail": f"selected_next_route = {SELECTED_NEXT_ROUTE}"},
              {"gate": "expected_result_written", "passed": EXPECTED_RESULT == "v4_323_sdss_rsd_numeric_baseline_calculator_dry_run_no_observed_scoring_passed_no_claims", "detail": f"expected_result = {EXPECTED_RESULT}"},
          ]

          failed = [row["gate"] for row in checks if not row["passed"]]

          write_csv(OUT / "v4_323_inherited_v4_322_rows.csv", inherited_v4_322_rows)
          write_csv(OUT / "v4_323_candidate_parameter_rows.csv", candidate_parameter_rows)
          write_csv(OUT / "SDSS_RSD_NUMERIC_BASELINE_CALCULATOR_DRY_RUN_VALUES_v4_323_NOT_APPROVED.csv", dry_run_rows)
          write_csv(OUT / "v4_323_calculator_validation_rows.csv", calculator_validation_rows)
          write_csv(OUT / "v4_323_dry_run_policy_rows.csv", dry_run_policy_rows)
          write_csv(OUT / "v4_323_next_gap_rows.csv", next_gap_rows)
          write_csv(OUT / "v4_323_gate_decision_rows.csv", gate_rows)
          write_csv(OUT / "v4_323_blocked_operation_rows.csv", blocked_rows)
          write_csv(OUT / "v4_323_permission_rows.csv", permission_rows)
          write_csv(OUT / "v4_323_sdr_reduction_rows.csv", sdr_rows)
          write_csv(OUT / "v4_323_rule_checks.csv", checks)

          manifest = {
              "version": VERSION,
              "dry_run_type": "calculator_structure_only_no_observed_scoring",
              "candidate_parameters_approved": False,
              "dry_run_values_approved_as_baseline": False,
              "observed_values_loaded": False,
              "residuals_computed": False,
              "score_valid": False,
              "support_allowed": False,
              "selected_next_route": SELECTED_NEXT_ROUTE,
          }
          (OUT / "SDSS_RSD_NUMERIC_BASELINE_CALCULATOR_DRY_RUN_MANIFEST_v4_323.json").write_text(json.dumps(manifest, indent=2), encoding="utf-8")

          readme = [
              "# SDSS RSD Numeric Baseline Calculator Dry Run v4.323",
              "",
              "This workflow dry-runs the calculator structure only. It uses candidate placeholder parameters and a redshift grid to verify that the calculator path can produce finite values.",
              "",
              "It does not load observed SDSS values. It does not approve parameter values. It does not approve numeric baseline values. It does not compute residuals or scores.",
              "",
              "The next permitted step is a parameter source packet, not observed scoring.",
          ]
          (OUT / "SDSS_RSD_NUMERIC_BASELINE_CALCULATOR_DRY_RUN_v4_323_README.md").write_text("\n".join(readme), encoding="utf-8")

          summary = {
              "version": VERSION,
              "expected_result": EXPECTED_RESULT,
              "rules_passed": sum(1 for row in checks if row["passed"]),
              "rules_total": len(checks),
              "failed_gates": failed if failed else "none",
              "candidate_parameter_rows": len(candidate_parameter_rows),
              "dry_run_rows": len(dry_run_rows),
              "calculator_validation_rows": len(calculator_validation_rows),
              "calculator_validation_all_passed": all(r["check_passed"] for r in calculator_validation_rows),
              "dry_run_policy_rows": len(dry_run_policy_rows),
              "observed_values_loaded": False,
              "residuals_computed": False,
              "numeric_baseline_values_filled": False,
              "baseline_values_filled": False,
              "approved_baseline_values": 0,
              "baseline_approved": False,
              "definition_match_confirmed": False,
              "diagonal_diagnostic_allowed_now": False,
              "score_valid": False,
              "support_allowed": False,
              "gate_decision_rows": len(gate_rows),
              "gate_approval_rows": 0,
              "selected_next_route": SELECTED_NEXT_ROUTE,
              "truth_boundary": {
                  "proves_tairid": False,
                  "validates_cosmology": False,
                  "supports_tairid": False,
                  "scores_external_observed_data": False,
                  "fits_numeric_correction": False,
                  "approves_holdout_source": False,
                  "approves_evidence": False,
                  "runs_external_likelihood_fit": False,
                  "combined_matrix_allowed": False
              },
          }

          (OUT / "v4_323_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")

          summary_md = [
              "# TAIRID v4.323 SDSS RSD Numeric Baseline Calculator Dry Run No Observed Scoring",
              "",
              f"Expected result: {EXPECTED_RESULT}",
              "",
              f"{summary['rules_passed']} / {summary['rules_total']} rules passed",
              f"failed_gates = {summary['failed_gates']}",
              f"candidate_parameter_rows = {summary['candidate_parameter_rows']}",
              f"dry_run_rows = {summary['dry_run_rows']}",
              f"calculator_validation_rows = {summary['calculator_validation_rows']}",
              f"calculator_validation_all_passed = {summary['calculator_validation_all_passed']}",
              f"observed_values_loaded = {summary['observed_values_loaded']}",
              f"residuals_computed = {summary['residuals_computed']}",
              f"numeric_baseline_values_filled = {summary['numeric_baseline_values_filled']}",
              f"approved_baseline_values = {summary['approved_baseline_values']}",
              f"definition_match_confirmed = {summary['definition_match_confirmed']}",
              f"diagonal_diagnostic_allowed_now = {summary['diagonal_diagnostic_allowed_now']}",
              f"score_valid = {summary['score_valid']}",
              f"support_allowed = {summary['support_allowed']}",
              f"gate_approval_rows = {summary['gate_approval_rows']}",
              f"selected_next_route = {SELECTED_NEXT_ROUTE}",
              "",
              "Clean meaning: v4.323 dry-runs the numeric baseline calculator structure only. It does not load observed values, approve parameters, approve baseline values, compute residuals, or score.",
              "",
              "Truth boundary: no proof, no validation, no TAIRID support, no external observed scoring, no residual, no chi-square, no p-value, no likelihood, no numeric correction fit, no approved holdout source, no evidence approval, no combined matrix.",
          ]
          (OUT / "v4_323_summary.md").write_text("\n".join(summary_md), encoding="utf-8")

          with zipfile.ZipFile(ZIP_NAME, "w", zipfile.ZIP_DEFLATED) as z:
              for path in sorted(OUT.rglob("*")):
                  if path.is_file():
                      z.write(path, path.as_posix())

          print(EXPECTED_RESULT)
          print(f"{summary['rules_passed']} / {summary['rules_total']} rules passed")
          print(f"failed_gates = {summary['failed_gates']}")
          print(f"candidate_parameter_rows = {summary['candidate_parameter_rows']}")
          print(f"dry_run_rows = {summary['dry_run_rows']}")
          print(f"calculator_validation_rows = {summary['calculator_validation_rows']}")
