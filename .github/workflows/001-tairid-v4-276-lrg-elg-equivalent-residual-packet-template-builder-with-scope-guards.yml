name: 001 TAIRID v4.276 - LRG ELG Equivalent Residual Packet Template Builder With Scope Guards

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/001-tairid-v4-276-lrg-elg-equivalent-residual-packet-template-builder-with-scope-guards.yml"
      - "data/**"
      - "results/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
      - "*.txt"
      - "*.md"

permissions:
  contents: read

jobs:
  lrg-elg-equivalent-residual-packet-template-builder:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm workflow visibility
        run: |
          echo "001 TAIRID v4.276 LRG ELG Equivalent Residual Packet Template Builder With Scope Guards is visible and running."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run v4.276 LRG ELG equivalent residual packet template builder
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import json
          import zipfile

          VERSION = "v4.276"
          ROUTE = "lrg_elg_equivalent_residual_packet_template_builder_with_scope_guards_after_v4_275"
          EXPECTED_RESULT = "v4_276_lrg_elg_equivalent_residual_packet_template_builder_with_scope_guards_passed_no_validation"
          SELECTED_NEXT_ROUTE = "v4_277_lrg_elg_equivalent_packet_candidate_reader_selection_or_manual_fill_validator"

          OUT = Path("tairid_v4_276_lrg_elg_equivalent_residual_packet_template_builder_output")
          OUT.mkdir(parents=True, exist_ok=True)

          ZIP_NAME = "tairid-v4-276-lrg-elg-equivalent-residual-packet-template-builder-output.zip"

          def write_csv(path, rows):
              rows = rows or []
              fields = []
              for row in rows:
                  for key in row:
                      if key not in fields:
                          fields.append(key)
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fields)
                  writer.writeheader()
                  writer.writerows(rows)

          def is_candidate_file(path):
              lower = path.as_posix().lower()
              if ".git/" in lower or "node_modules/" in lower:
                  return False
              if path.suffix.lower() not in [".csv", ".json", ".txt", ".md", ".yaml", ".yml", ".tsv"]:
                  return False
              keywords = ["lrg", "elg", "qso", "rsd", "fsigma", "f_sigma", "growth", "bao", "cov", "covariance", "zhao", "residual", "tracer"]
              return any(k in lower for k in keywords)

          def lane_guess(path):
              lower = path.as_posix().lower()
              lanes = []
              if "lrg" in lower:
                  lanes.append("LRG")
              if "elg" in lower:
                  lanes.append("ELG")
              if "qso" in lower or "zhao" in lower:
                  lanes.append("QSO")
              return "|".join(lanes) if lanes else "unknown"

          inherited_v4_275_rows = [
              {
                  "inherited_from": "v4.275",
                  "item": "rules",
                  "value": "42 / 42 passed",
                  "meaning": "LRG/ELG equivalent residual packet gap locator passed.",
                  "carry_forward_status": "ready_for_template_builder",
              },
              {
                  "inherited_from": "v4.275",
                  "item": "candidate_file_rows",
                  "value": 184,
                  "meaning": "Filename scan found 184 possible candidate leads.",
                  "carry_forward_status": "leads_only_not_validated",
              },
              {
                  "inherited_from": "v4.275",
                  "item": "lane_gap_rows",
                  "value": 12,
                  "meaning": "Six LRG packet gaps and six ELG packet gaps were identified.",
                  "carry_forward_status": "gaps_named",
              },
              {
                  "inherited_from": "v4.275",
                  "item": "equivalent_packet_template_rows",
                  "value": 16,
                  "meaning": "Initial LRG/ELG template field list was written.",
                  "carry_forward_status": "schema_seed_ready",
              },
              {
                  "inherited_from": "v4.275",
                  "item": "lrg_equivalent_packet_ready",
                  "value": False,
                  "meaning": "LRG equivalent packet is not ready.",
                  "carry_forward_status": "lrg_packet_missing",
              },
              {
                  "inherited_from": "v4.275",
                  "item": "elg_equivalent_packet_ready",
                  "value": False,
                  "meaning": "ELG equivalent packet is not ready.",
                  "carry_forward_status": "elg_packet_missing",
              },
              {
                  "inherited_from": "v4.275",
                  "item": "template_builder_allowed_next",
                  "value": True,
                  "meaning": "Template builder was allowed next.",
                  "carry_forward_status": "current_permission",
              },
              {
                  "inherited_from": "v4.275",
                  "item": "source_comparison_allowed",
                  "value": False,
                  "meaning": "Source comparison stayed blocked.",
                  "carry_forward_status": "source_comparison_blocked",
              },
              {
                  "inherited_from": "v4.275",
                  "item": "combined_matrix_allowed",
                  "value": False,
                  "meaning": "Combined matrix stayed blocked.",
                  "carry_forward_status": "combined_matrix_blocked",
              },
              {
                  "inherited_from": "v4.275",
                  "item": "selected_next_route",
                  "value": "v4_276_lrg_elg_equivalent_residual_packet_template_builder_with_scope_guards",
                  "meaning": "Current route builds LRG/ELG equivalent packet templates.",
                  "carry_forward_status": "current_route",
              },
          ]

          candidate_files = []
          for p in Path(".").rglob("*"):
              if p.is_file() and is_candidate_file(p):
                  try:
                      size = p.stat().st_size
                  except Exception:
                      size = None
                  candidate_files.append({
                      "path": p.as_posix(),
                      "suffix": p.suffix.lower(),
                      "size_bytes": size,
                      "lane_guess": lane_guess(p),
                      "candidate_status": "filename_lead_only_not_validated",
                  })
          candidate_files = sorted(candidate_files, key=lambda row: row["path"])[:300]

          candidate_file_summary_rows = [
              {
                  "summary_id": "summary_001",
                  "object": "candidate_files_scanned",
                  "value": len(candidate_files),
                  "meaning": "Repo files with relevant names. These are leads only, not validated data.",
              },
              {
                  "summary_id": "summary_002",
                  "object": "lrg_filename_leads",
                  "value": sum(1 for row in candidate_files if "LRG" in row["lane_guess"]),
                  "meaning": "Possible LRG leads by filename.",
              },
              {
                  "summary_id": "summary_003",
                  "object": "elg_filename_leads",
                  "value": sum(1 for row in candidate_files if "ELG" in row["lane_guess"]),
                  "meaning": "Possible ELG leads by filename.",
              },
              {
                  "summary_id": "summary_004",
                  "object": "qso_or_zhao_filename_leads",
                  "value": sum(1 for row in candidate_files if "QSO" in row["lane_guess"]),
                  "meaning": "Possible QSO/Zhao leads by filename.",
              },
          ]

          qso_equivalence_target_rows = [
              {
                  "target_id": "qso_target_001",
                  "source_lane": "QSO",
                  "required_packet_object": "observed_packet",
                  "qso_status": "ready_candidate",
                  "equivalence_requirement_for_LRG_ELG": "observed values must be explicitly named and redshift-indexed",
              },
              {
                  "target_id": "qso_target_002",
                  "source_lane": "QSO",
                  "required_packet_object": "reference_packet",
                  "qso_status": "validated_no_scoring",
                  "equivalence_requirement_for_LRG_ELG": "reference values must be fixed before residual preview and not fit to the lane",
              },
              {
                  "target_id": "qso_target_003",
                  "source_lane": "QSO",
                  "required_packet_object": "covariance_policy",
                  "qso_status": "validated_no_scoring",
                  "equivalence_requirement_for_LRG_ELG": "full covariance, reconstructed covariance, or explicit diagonal-only limitation must be recorded",
              },
              {
                  "target_id": "qso_target_004",
                  "source_lane": "QSO",
                  "required_packet_object": "residual_preview",
                  "qso_status": "computed_preview_only",
                  "equivalence_requirement_for_LRG_ELG": "residuals remain blocked until observed/reference/covariance policy validates",
              },
              {
                  "target_id": "qso_target_005",
                  "source_lane": "QSO",
                  "required_packet_object": "diagnostic_distance",
