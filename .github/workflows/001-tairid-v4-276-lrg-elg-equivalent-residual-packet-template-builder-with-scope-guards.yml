          permission_rows = [
              {"permission_scope": "LRG_ELG_template_builder", "permission_status": "completed_no_data_validation", "reason": "Schemas and manual templates are written."},
              {"permission_scope": "candidate_reader_selection", "permission_status": "allowed_next", "reason": "Next workflow can choose manual fill or safe candidate reader route."},
              {"permission_scope": "manual_fill_validator", "permission_status": "allowed_if_user_commits_filled_templates", "reason": "Future validator can check completed template rows."},
              {"permission_scope": "LRG_residual_preview", "permission_status": "blocked", "reason": "LRG packet is not filled/validated."},
              {"permission_scope": "ELG_residual_preview", "permission_status": "blocked", "reason": "ELG packet is not filled/validated."},
              {"permission_scope": "source_comparison_residual_guard", "permission_status": "blocked_until_LRG_ELG_packets", "reason": "Comparison requires validated lane packets."},
