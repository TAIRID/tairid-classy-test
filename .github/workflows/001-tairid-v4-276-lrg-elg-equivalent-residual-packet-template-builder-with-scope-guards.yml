              },
              {
                  "guard_id": "guard_005",
                  "guard": "no_source_comparison_without_packet_parity",
                  "meaning": "Source comparison requires packet parity.",
                  "status": "active",
              },
              {
                  "guard_id": "guard_006",
                  "guard": "no_combined_matrix",
                  "meaning": "Combined LRG/ELG/QSO matrix remains blocked.",
                  "status": "active",
              },
          ]

          blocked_operation_rows = [
              {"blocked_id": "blocked_001", "operation": "compute_LRG_residuals_now", "reason": "LRG template is not filled or validated", "blocked": True},
              {"blocked_id": "blocked_002", "operation": "compute_ELG_residuals_now", "reason": "ELG template is not filled or validated", "blocked": True},
              {"blocked_id": "blocked_003", "operation": "compute_LRG_ELG_diagnostic_scalars_now", "reason": "residual previews do not exist", "blocked": True},
              {"blocked_id": "blocked_004", "operation": "source_comparison_now", "reason": "packet parity is missing", "blocked": True},
              {"blocked_id": "blocked_005", "operation": "combined_matrix_now", "reason": "source-separated diagnostics and dependency audit are missing", "blocked": True},
              {"blocked_id": "blocked_006", "operation": "p_value_or_likelihood_now", "reason": "no scoring guard exists", "blocked": True},
              {"blocked_id": "blocked_007", "operation": "numeric_correction_fit_now", "reason": "no fitting guard exists", "blocked": True},
              {"blocked_id": "blocked_008", "operation": "validation_or_evidence_claim_now", "reason": "no validation/evidence guard exists", "blocked": True},
