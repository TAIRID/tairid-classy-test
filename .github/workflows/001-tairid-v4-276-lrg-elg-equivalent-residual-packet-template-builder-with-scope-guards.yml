          route_decision_rows = [
              {"route_id": "route_001", "route": "lrg_elg_equivalent_packet_candidate_reader_selection_or_manual_fill_validator", "permission_status": "recommended", "reason": "Need to choose safe candidate reader route or manual-filled template validator."},
