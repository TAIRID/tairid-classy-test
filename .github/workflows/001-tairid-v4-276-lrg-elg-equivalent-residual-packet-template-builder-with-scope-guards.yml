                      "provenance_status": "FILL_SURVEY_FAMILY_RELEASE_HOLDOUT_STATUS",
                      "approval_status": "candidate_not_scored_not_evidence",
                      "notes": "template row only; do not score",
                  },
                  {
                      "source_lane": lane,
                      "packet_id": f"{lane.lower()}_packet_ROW_002",
                      "observed_id": f"FILL_{lane}_OBSERVED_ID_OPTIONAL_SECOND_ROW",
                      "source_family": "FILL_SURVEY_OR_CATALOG",
                      "source_release": "FILL_RELEASE_OR_VERSION",
                      "source_role": lane,
                      "redshift": "FILL_NUMERIC_EFFECTIVE_REDSHIFT",
                      "quantity": "FILL_QUANTITY",
                      "observed_value": "FILL_NUMERIC_OBSERVED_VALUE_OR_MISSING",
                      "observed_sigma_or_likelihood": "FILL_SIGMA_OR_LIKELIHOOD_LABEL_OR_MISSING",
                      "reference_value": "FILL_NUMERIC_REFERENCE_VALUE_OR_RECALCULATE",
                      "reference_source_or_method": "FILL_FIXED_REFERENCE_SOURCE_OR_METHOD",
                      "covariance_policy": "FILL_full_covariance_OR_reconstructed_covariance_OR_diagonal_only_limited_OR_missing",
                      "covariance_path_or_method": "FILL_PATH_OR_METHOD_OR_MISSING",
                      "inverse_covariance_status": "blocked_until_covariance_policy_validates",
                      "residual_preview_status": "blocked_until_packet_validates",
                      "diagnostic_distance_status": "blocked_until_residual_preview_validates",
                      "provenance_status": "FILL_SURVEY_FAMILY_RELEASE_HOLDOUT_STATUS",
                      "approval_status": "candidate_not_scored_not_evidence",
                      "notes": "template row only; add rows as needed",
                  },
              ])

          candidate_reader_requirement_rows = [
              {
                  "reader_id": "reader_001",
                  "source_lane": "LRG",
                  "reader_requirement": "find candidate file path before parsing",
                  "allowed_status": "allowed_if_candidate_files_exist",
                  "blocked_status": "do_not_parse_unknown_schema_as_data",
              },
              {
                  "reader_id": "reader_002",
                  "source_lane": "LRG",
                  "reader_requirement": "map columns to packet schema exactly",
                  "allowed_status": "allowed_next",
                  "blocked_status": "do_not_infer_missing_reference_or_covariance",
              },
              {
                  "reader_id": "reader_003",
                  "source_lane": "ELG",
                  "reader_requirement": "find candidate file path before parsing",
                  "allowed_status": "allowed_if_candidate_files_exist",
                  "blocked_status": "do_not_parse_unknown_schema_as_data",
              },
              {
                  "reader_id": "reader_004",
                  "source_lane": "ELG",
                  "reader_requirement": "map columns to packet schema exactly",
                  "allowed_status": "allowed_next",
                  "blocked_status": "do_not_infer_missing_reference_or_covariance",
              },
              {
                  "reader_id": "reader_005",
                  "source_lane": "LRG_ELG",
                  "reader_requirement": "write missing fields as MISSING or RECALCULATE",
                  "allowed_status": "required",
                  "blocked_status": "do_not_fill_by_guessing",
              },
              {
                  "reader_id": "reader_006",
                  "source_lane": "LRG_ELG",
                  "reader_requirement": "keep approval_status candidate_not_scored_not_evidence",
                  "allowed_status": "required",
                  "blocked_status": "do_not_score",
              },
          ]

          validation_contract_rows = [
              {
                  "contract_id": "contract_001",
                  "future_validator": "schema_presence",
                  "requirement": "all required schema fields present",
                  "current_status": "template_ready",
              },
              {
                  "contract_id": "contract_002",
                  "future_validator": "numeric_fields",
                  "requirement": "redshift, observed_value, observed_sigma, and reference_value numeric when not marked MISSING or RECALCULATE",
                  "current_status": "blocked_until_filled",
              },
              {
                  "contract_id": "contract_003",
                  "future_validator": "reference_not_fit_to_lane",
                  "requirement": "reference source/method must be fixed before residual preview",
                  "current_status": "blocked_until_filled",
              },
              {
                  "contract_id": "contract_004",
                  "future_validator": "covariance_policy",
                  "requirement": "full, reconstructed, diagonal-only-limited, or missing policy must be explicit",
