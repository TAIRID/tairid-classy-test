                  "status": "blocked_until_LRG_ELG_packets_validate",
                  "meaning": "Comparison stays blocked.",
              },
              {
                  "readiness_id": "ready_007",
                  "object": "combined_matrix",
                  "status": "blocked",
                  "meaning": "Combined matrix stays blocked.",
              },
          ]

          scope_guard_rows = [
              {
                  "guard_id": "guard_001",
                  "guard": "templates_are_not_data",
