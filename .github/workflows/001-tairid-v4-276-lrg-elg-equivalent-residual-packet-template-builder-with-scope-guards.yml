              {"route_id": "route_003", "route": "manual_fill_validator", "permission_status": "allowed_if_filled_templates_exist", "reason": "Use if user commits filled LRG/ELG packet templates."},
              {"route_id": "route_004", "route": "source_comparison_residual_guard", "permission_status": "blocked_until_LRG_ELG_packets", "reason": "Comparison requires validated packets."},
              {"route_id": "route_005", "route": "handoff", "permission_status": "allowed", "reason": "v4.203-v4.276 is a clean template-builder milestone."},
