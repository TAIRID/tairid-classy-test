              },
              {
                  "contract_id": "contract_006",
                  "future_validator": "no_scoring",
                  "requirement": "approval status remains candidate_not_scored_not_evidence",
                  "current_status": "template_ready",
              },
          ]

          lane_readiness_rows = [
              {
