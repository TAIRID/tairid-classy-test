                  "basis": "We need either safe candidate readers or committed manual-filled templates.",
                  "next_action": "Proceed to v4.277 candidate reader selection/manual fill validator.",
                  "claim_status": "safe_to_continue",
              },
              {
                  "decision_id": "decision_004",
