          ]

          packet_schema_rows = []
          schema_fields = [
              ("source_lane", "LRG_or_ELG", "required"),
              ("packet_id", "unique_packet_row_id", "required"),
              ("observed_id", "unique_observed_row_id", "required"),
              ("source_family", "survey_or_catalog_family", "required"),
              ("source_release", "release_or_version_label", "required"),
              ("source_role", "LRG_or_ELG_tracer_role", "required"),
              ("redshift", "numeric_effective_redshift", "required"),
              ("quantity", "named_quantity_such_as_f_sigma8_or_translated_quantity", "required"),
              ("observed_value", "numeric_or_MISSING", "required_later"),
              ("observed_sigma_or_likelihood", "numeric_sigma_or_likelihood_label_or_MISSING", "required_later"),
              ("reference_value", "numeric_fixed_reference_or_RECALCULATE", "required_later"),
              ("reference_source_or_method", "fixed_reference_source_method_or_RECALCULATE", "required_later"),
              ("covariance_policy", "full_covariance|reconstructed_covariance|diagonal_only_limited|missing", "required"),
              ("covariance_path_or_method", "path_or_method_or_missing", "required"),
              ("inverse_covariance_status", "validated|blocked|not_applicable_diagonal_only|missing", "required"),
              ("residual_preview_status", "blocked_until_packet_validates", "required"),
              ("diagnostic_distance_status", "blocked_until_residual_preview_validates", "required"),
              ("provenance_status", "survey_family_release_holdout_status", "required"),
              ("approval_status", "candidate_not_scored_not_evidence", "required"),
              ("notes", "plain_text_notes", "optional"),
          ]
          for lane in ["LRG", "ELG"]:
              for idx, (field, meaning, required_status) in enumerate(schema_fields, start=1):
                  packet_schema_rows.append({
                      "schema_id": f"{lane.lower()}_schema_{idx:02d}",
                      "source_lane": lane,
                      "field_name": field,
                      "field_meaning": meaning,
                      "required_status": required_status,
                      "template_status": "written",
                  })

          manual_fill_template_rows = []
          for lane in ["LRG", "ELG"]:
              manual_fill_template_rows.extend([
                  {
                      "source_lane": lane,
                      "packet_id": f"{lane.lower()}_packet_ROW_001",
                      "observed_id": f"FILL_{lane}_OBSERVED_ID",
                      "source_family": "FILL_SURVEY_OR_CATALOG",
                      "source_release": "FILL_RELEASE_OR_VERSION",
                      "source_role": lane,
                      "redshift": "FILL_NUMERIC_EFFECTIVE_REDSHIFT",
                      "quantity": "FILL_QUANTITY",
                      "observed_value": "FILL_NUMERIC_OBSERVED_VALUE_OR_MISSING",
                      "observed_sigma_or_likelihood": "FILL_SIGMA_OR_LIKELIHOOD_LABEL_OR_MISSING",
                      "reference_value": "FILL_NUMERIC_REFERENCE_VALUE_OR_RECALCULATE",
                      "reference_source_or_method": "FILL_FIXED_REFERENCE_SOURCE_OR_METHOD",
                      "covariance_policy": "FILL_full_covariance_OR_reconstructed_covariance_OR_diagonal_only_limited_OR_missing",
                      "covariance_path_or_method": "FILL_PATH_OR_METHOD_OR_MISSING",
                      "inverse_covariance_status": "blocked_until_covariance_policy_validates",
