name: Run TAIRID Hubble gate window probe clean v2

on:
  workflow_dispatch:

jobs:
  run-hubble-gate-window-probe-clean-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip numpy scipy matplotlib

      - name: Run Hubble gate window probe clean v2
        run: |
          python run_tairid_hubble_gate_window_probe_clean_v2.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: tairid-hubble-gate-window-probe-clean-v2-output
          path: |
            hubble_gate_window_probe_clean_v2_outputs/**
